<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Intersection Node - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* list A pointer / A nodes  */
            --accent-blue:   #06b6d4;   /* head / links              */
            --accent-green:  #22c55e;   /* intersection / found      */
            --accent-red:    #f43f5e;   /* no-intersection / miss    */
            --accent-purple: #a855f7;   /* list B pointer / B nodes  */
            --accent-teal:   #14b8a6;   /* shared tail nodes         */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(6, 182, 212, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(245,165,36,0.22), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"], input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.18); background: rgba(6, 182, 212, 0.06); }
        .list-input { width: 150px; }
        .shared-input { width: 120px; }

        button {
            height: 34px; border-radius: 9px; padding: 0 16px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 94%; margin: 28px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-orange), var(--accent-green), var(--accent-purple)); box-shadow: 0 0 12px rgba(34,197,94,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.12); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% 50%, rgba(6,182,212,0.07), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }

        /* ───────── multi-rail intersection stage (A top, found-node middle, B bottom) ───────── */
        .merge-stage { display: flex; flex-direction: column; gap: 6px; padding: 14px 14px 16px; }
        .rail-row { display: flex; align-items: stretch; gap: 12px; }
        .rail-row.result .rail-scroll { background: rgba(34,197,94,0.04); border-color: rgba(34,197,94,0.18); }
        .rail-tag { flex: 0 0 auto; align-self: center; font-family: var(--mono); font-size: 11px; font-weight: 800; letter-spacing: 0.5px; padding: 5px 10px; border-radius: 8px; min-width: 62px; text-align: center; }
        .rail-tag.l1  { background: rgba(245,165,36,0.14); color: var(--accent-orange); border: 1px solid rgba(245,165,36,0.4); }
        .rail-tag.l2  { background: rgba(168,85,247,0.14); color: var(--accent-purple); border: 1px solid rgba(168,85,247,0.4); }
        .rail-tag.res { background: rgba(34,197,94,0.14);  color: var(--accent-green);  border: 1px solid rgba(34,197,94,0.4); }
        .rail-scroll { position: relative; flex: 1 1 auto; min-width: 0; overflow-x: auto; overflow-y: visible; padding: 30px 8px; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; scrollbar-width: thin; }
        .rail-scroll::-webkit-scrollbar { height: 7px; }
        .rail-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .list-rail { position: relative; display: flex; align-items: center; gap: 8px; min-height: 56px; width: max-content; margin: 0 auto; }

        .node-unit { display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; flex: 0 0 auto; will-change: transform; }
        .node {
            min-width: 54px; height: 54px; display: flex; align-items: center; justify-content: center;
            border-radius: 14px; font-size: 19px; font-weight: 800; font-family: var(--mono);
            transition: background 0.4s ease, border-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease, outline-color 0.3s ease;
            border: 2px solid var(--border-main); background: rgba(255, 255, 255, 0.05); color: var(--text-main);
            position: relative; outline: 2px solid transparent; outline-offset: 3px;
        }
        .node.from-l1 { background: linear-gradient(180deg, #ffd27a, #f5a524); border-color: var(--accent-orange); color: #3a2400; box-shadow: 0 0 14px rgba(245,165,36,0.30); }
        .node.from-l2 { background: linear-gradient(180deg, #d2adff, #a855f7); border-color: var(--accent-purple); color: #1a0533; box-shadow: 0 0 14px rgba(168,85,247,0.30); }
        .node.shared { background: linear-gradient(180deg, #5eead4, #14b8a6); border-color: var(--accent-teal); color: #042f2a; box-shadow: 0 0 14px rgba(20,184,166,0.30); }
        .node.settled { background: linear-gradient(180deg, #2fe08f, #21c275); border-color: #34d399; color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.35); }
        .node.found { background: linear-gradient(180deg, #2fe08f, #21c275); border-color: #34d399; color: #06251a; box-shadow: 0 0 20px rgba(34,197,94,0.6); outline-color: var(--accent-green); }
        .node.l1-ring { outline-color: var(--accent-orange); }
        .node.l2-ring { outline-color: var(--accent-purple); }
        .node.compare { animation: breathe 1.6s ease-in-out infinite; }
        .node-index { font-size: 10px; color: var(--text-dim); font-family: var(--mono); height: 12px; font-weight: 600; }
        .node-index.shared-lbl { color: var(--accent-teal); font-weight: 800; }

        .arrow { flex: 0 0 auto; display: flex; align-items: center; height: 54px; filter: drop-shadow(0 0 6px rgba(6,182,212,0.35)); }
        .arrow svg { display: block; overflow: visible; }
        .arrow .ln { stroke: var(--accent-blue); stroke-width: 2.5; }
        .arrow .hd { fill: var(--accent-blue); }
        .arrow.a-l1 .ln { stroke: var(--accent-orange); } .arrow.a-l1 .hd { fill: var(--accent-orange); }
        .arrow.a-l2 .ln { stroke: var(--accent-purple); } .arrow.a-l2 .hd { fill: var(--accent-purple); }
        .arrow.a-shared .ln { stroke: var(--accent-teal); } .arrow.a-shared .hd { fill: var(--accent-teal); }
        .arrow.a-res .ln { stroke: var(--accent-green); } .arrow.a-res .hd { fill: var(--accent-green); }

        .nullterm { flex: 0 0 auto; min-width: 48px; height: 54px; display: flex; align-items: center; justify-content: center; border-radius: 14px; border: 2px dashed var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 13px; font-weight: 700; background: rgba(255,255,255,0.02); }
        .res-empty { flex: 0 0 auto; height: 54px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-family: var(--mono); font-size: 13px; font-weight: 700; opacity: 0.7; }

        /* pointer pills on stalks — position driven by JS spring (one per rail) */
        .ptr { position: absolute; left: 0; display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; z-index: 4; transition: opacity 0.3s ease; will-change: transform; }
        .ptr.above { top: -28px; }
        .ptr.below { bottom: -28px; }
        .ptr .tag { font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 8px; white-space: nowrap; }
        .ptr .stalk { width: 2px; height: 14px; }
        .ptr.l1ptr   .tag { background: var(--accent-orange); color: #3a2400; box-shadow: 0 0 14px rgba(245,165,36,0.6); }
        .ptr.l1ptr   .stalk { background: var(--accent-orange); }
        .ptr.l2ptr   .tag { background: var(--accent-purple); color: #1a0533; box-shadow: 0 0 14px rgba(168,85,247,0.6); }
        .ptr.l2ptr   .stalk { background: var(--accent-purple); }

        .action-stage { position: relative; min-height: 104px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
        .float-tile { width: 64px; height: 64px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 26px; font-weight: 800; opacity: 0; transform: scale(0.5); border: 2px solid transparent; will-change: transform; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 20px; letter-spacing: 0.5px; min-height: 24px; text-align: center; transition: color 0.3s ease; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }

        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(34,197,94,0.12); border-left-color: var(--accent-green); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 4px 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.l1 b { color: var(--accent-orange); }
        .pill.l2 b { color: var(--accent-purple); }
        .pill.r b { color: var(--accent-green); }
        .legend-inline { margin-left: auto; display: flex; gap: 14px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; font-size: 11px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; display: inline-block; }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes drawLine { to { stroke-dashoffset: 0; } }
        @keyframes fadeHead { to { opacity: 1; } }
        @keyframes breathe { 0%,100%{ box-shadow: 0 0 16px var(--glow), inset 0 0 10px rgba(255,255,255,0.06); } 50%{ box-shadow: 0 0 30px var(--glow), inset 0 0 14px rgba(255,255,255,0.12); } }
        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 190px) rotate(var(--rot)); } }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">List A =</label>
        <input type="text" id="l1-input" class="list-input" placeholder="4->1">
        <label class="ui-label">List B =</label>
        <input type="text" id="l2-input" class="list-input" placeholder="5->6->1">
        <label class="ui-label">shared =</label>
        <input type="text" id="target-input" class="shared-input" placeholder="8->4->5">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([4,1], [5,6,1], [8,4,5])">Ex 1: intersect</button>
        <button onclick="loadExample([2,6,4], [1,5], [])">Ex 2: no intersect</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Find Intersection Node <span class="sub">&middot; Length-Difference Two-Pointer &middot; O(m + n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="merge-stage" id="merge-stage">
                    <div class="rail-row" id="row-l1">
                        <span class="rail-tag l1">A</span>
                        <div class="rail-scroll" id="scroll-l1">
                            <div class="list-rail" id="rail-l1">
                                <div class="ptr above l1ptr" id="ptr-l1"><div class="tag">pA</div><div class="stalk"></div></div>
                            </div>
                        </div>
                    </div>
                    <div class="rail-row result" id="row-result">
                        <span class="rail-tag res">&#8745;</span>
                        <div class="rail-scroll" id="scroll-result">
                            <div class="list-rail" id="rail-result"></div>
                        </div>
                    </div>
                    <div class="rail-row" id="row-l2">
                        <span class="rail-tag l2">B</span>
                        <div class="rail-scroll" id="scroll-l2">
                            <div class="list-rail" id="rail-l2">
                                <div class="ptr below l2ptr" id="ptr-l2"><div class="stalk"></div><div class="tag">pB</div></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="float-tile" id="float-tile"><span id="float-val"></span></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="reset()">&#8634; Reset</button>
            <button onclick="back()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="next()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>

                        <div class="state-strip">
                            <span class="pill l1">pA <b id="val-l1">&mdash;</b></span>
                            <span class="pill l2">pB <b id="val-l2">&mdash;</b></span>
                            <span class="pill r">found <b id="val-tail">&mdash;</b></span>
                            <span class="legend-inline">
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,#ffd27a,#f5a524); border:2px solid var(--accent-orange)"></span>A node</span>
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,#d2adff,#a855f7); border:2px solid var(--accent-purple)"></span>B node</span>
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,#5eead4,#14b8a6); border:2px solid var(--accent-teal)"></span>shared tail</span>
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,#2fe08f,#21c275); border:2px solid #34d399"></span>intersection</span>
                            </span>
                        </div>

                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring + FLIP, zero deps — see VISUALIZATION_STYLE_GUIDE sec 4c) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) {
                const a = (-stiffness * x - damping * v) / mass;
                v += a * dt; x += v * dt; out.push(1 - x);
                if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break;
            }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(340, 30, 1);
        const SPRING_POP = sampleSpring(540, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            flip(el, dx, dy) {
                if (REDUCED || (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5)) return;
                const kf = SPRING_POS.map(p => ({ transform: `translate(${(dx*(1-p)).toFixed(2)}px, ${(dy*(1-p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
            },
            enter(el, delay = 0) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p*1.6).toFixed(3),
                    transform: `translateY(${(-18*(1-p)).toFixed(2)}px) scale(${(0.45+0.55*p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', delay, fill: 'backwards' });
            },
            pop(el) {
                el.getAnimations().forEach(a => a.cancel());
                if (REDUCED) { el.style.opacity = '1'; el.style.transform = 'scale(1)'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p*2).toFixed(3),
                    transform: `scale(${(0.5+0.5*p).toFixed(3)}) translateY(${(10*(1-p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'forwards' });
            },
            glide(el, x) {
                const prev = el._x; el.style.opacity = '1';
                const commit = `translateX(${x}px) translateX(-50%)`;
                if (REDUCED || prev == null || Math.abs(x - prev) < 0.5) { el._x = x; el.style.transform = commit; return; }
                const dx = x - prev;
                const kf = SPRING_POS.map(p => ({ transform: `translateX(${(prev+dx*p).toFixed(2)}px) translateX(-50%)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el.style.transform = commit;
            },
        };

        // ───────── State ─────────
        // Identity model: shared-tail nodes carry keys 's0','s1',... and appear on BOTH rails as the SAME identity.
        let aBase = [];    // List A full chain: [{key:'a0'|'s0', val, shared:bool}]
        let bBase = [];    // List B full chain: [{key:'b0'|'s0', val, shared:bool}]
        let sharedKeys = new Set();   // keys belonging to the shared tail
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1800, 900, 450];
        let els = {};      // global key -> DOM element (nodes 'k:'+key, arrows 'r:'+key, nullterms 'null-<rail>', 'found')

        const CODE = [
            [['kw','def '],['fn','getIntersection'],['src','(headA, headB):']],
            [['src','    lenA, lenB = length(headA), length(headB)']],
            [['src','    pA, pB = headA, headB']],
            [['kw','    if '],['src','lenA > lenB: advance pA by lenA - lenB']],
            [['kw','    else'],['src',':            advance pB by lenB - lenA']],
            [['kw','    while '],['src','pA '],['kw','and'],['src',' pB:']],
            [['kw','        if '],['src','pA is pB:']],
            [['kw','            return '],['src','pA']],
            [['src','        pA, pB = pA.next, pB.next']],
            [['kw','    return '],['src','null']],
        ];
        const TILE_COLORS = {
            orange: { bg: 'rgba(245,165,36,0.18)', fg: '#ffe2b0', bd: '#f5a524', glow: 'rgba(245,165,36,0.55)' },
            purple: { bg: 'rgba(168,85,247,0.18)', fg: '#e9d5ff', bd: '#a855f7', glow: 'rgba(168,85,247,0.55)' },
            teal:   { bg: 'rgba(20,184,166,0.18)', fg: '#99f6e4', bd: '#14b8a6', glow: 'rgba(20,184,166,0.55)' },
            green:  { bg: 'rgba(34,197,94,0.18)',  fg: '#bbf7d0', bd: '#22c55e', glow: 'rgba(34,197,94,0.55)' },
            red:    { bg: 'rgba(244,63,94,0.18)',  fg: '#fecdd3', bd: '#f43f5e', glow: 'rgba(244,63,94,0.55)' },
        };
        const ARR = String.fromCharCode(8594);   // →
        const CHK = String.fromCharCode(10003);   // ✓
        const DASH = String.fromCharCode(8212);   // —

        function buildCodePanel() {
            const panel = document.getElementById('code-panel');
            panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div');
                line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(lineArr) {
            document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', lineArr && lineArr.includes(+el.dataset.line)));
        }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap');
            const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        function init() { buildCodePanel(); loadExample([4,1], [5,6,1], [8,4,5]); }

        function parseList(str) {
            if (!str || str.trim() === "") return [];
            return str.split('->').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        }

        // loadExample(uniqueA, uniqueB, shared) — shared is the array of shared-tail values (empty => no intersection)
        function loadExample(uniqueA, uniqueB, shared) {
            shared = shared || [];
            // shared nodes get their OWN identity keys 's0','s1',... shared by BOTH rails
            const sharedNodes = shared.map((v, k) => ({ key: 's' + k, val: v, shared: true }));
            sharedKeys = new Set(sharedNodes.map(n => n.key));
            aBase = uniqueA.map((v, i) => ({ key: 'a' + i, val: v, shared: false })).concat(sharedNodes);
            bBase = uniqueB.map((v, j) => ({ key: 'b' + j, val: v, shared: false })).concat(sharedNodes);
            document.getElementById('l1-input').value = uniqueA.length ? uniqueA.join('->') : 'null';
            document.getElementById('l2-input').value = uniqueB.length ? uniqueB.join('->') : 'null';
            document.getElementById('target-input').value = shared.length ? shared.join('->') : '';
            resetDom();
            generateSteps();
            reset();
        }

        function loadCustom() {
            const uA = parseList(document.getElementById('l1-input').value.trim());
            const uB = parseList(document.getElementById('l2-input').value.trim());
            const sh = parseList(document.getElementById('target-input').value.trim());
            loadExample(uA, uB, sh);
        }

        // ───────── step generation (length-difference two-pointer over node identities) ─────────
        function generateSteps() {
            steps = [];
            const joinVals = (arr) => arr.length ? arr.map(n => n.val).join(' ' + ARR + ' ') : 'null';

            const lenA = aBase.length, lenB = bBase.length;
            // base snapshot: full A on rail A, full B on rail B, no found node yet
            const snap = (extra) => Object.assign({
                aChain: aBase.slice(), bChain: bBase.slice(), foundNode: null,
            }, extra);

            // index pointers into the full chains
            let pa = 0, pb = 0;

            // STEP 0 — init / lengths
            steps.push(snap({
                type: 'init', codeLine: [1],
                paKey: lenA ? aBase[0].key : null, pbKey: lenB ? bBase[0].key : null,
                action: `lenA = ${lenA}, lenB = ${lenB}`, actionColor: '#7dd3fc', tile: null,
                panel: `Find the node where two lists first <b>share identity</b>. Measure both lengths: <code>lenA = ${lenA}</code>, <code>lenB = ${lenB}</code>.`,
                log: `A = ${joinVals(aBase)}\nB = ${joinVals(bBase)}\nlenA = ${lenA}, lenB = ${lenB}`, logColor: 'var(--text-dim)'
            }));

            // STEP — align the longer pointer
            const diff = Math.abs(lenA - lenB);
            if (lenA > lenB) {
                for (let s = 0; s < diff; s++) {
                    pa++;
                    steps.push(snap({
                        type: 'advance', codeLine: [3],
                        paKey: pa < lenA ? aBase[pa].key : null, pbKey: lenB ? bBase[0].key : null,
                        action: `advance pA (${s + 1}/${diff})`, actionColor: 'var(--accent-orange)',
                        tile: pa < lenA ? aBase[pa].val : null, tileColor: 'orange',
                        panel: `List A is longer by <b>${diff}</b>. Advance <span style="color:var(--accent-orange)">pA</span> forward so both pointers are equidistant from the tail. <code>pA ${ARR} ${pa < lenA ? aBase[pa].val : 'null'}</code>`,
                        log: `lenA > lenB -> advance pA to ${pa < lenA ? aBase[pa].val : 'null'}`, logColor: 'var(--accent-orange)'
                    }));
                }
            } else if (lenB > lenA) {
                for (let s = 0; s < diff; s++) {
                    pb++;
                    steps.push(snap({
                        type: 'advance', codeLine: [4],
                        paKey: lenA ? aBase[0].key : null, pbKey: pb < lenB ? bBase[pb].key : null,
                        action: `advance pB (${s + 1}/${diff})`, actionColor: 'var(--accent-purple)',
                        tile: pb < lenB ? bBase[pb].val : null, tileColor: 'purple',
                        panel: `List B is longer by <b>${diff}</b>. Advance <span style="color:var(--accent-purple)">pB</span> forward so both pointers are equidistant from the tail. <code>pB ${ARR} ${pb < lenB ? bBase[pb].val : 'null'}</code>`,
                        log: `lenB > lenA -> advance pB to ${pb < lenB ? bBase[pb].val : 'null'}`, logColor: 'var(--accent-purple)'
                    }));
                }
            } else {
                steps.push(snap({
                    type: 'aligned', codeLine: [3, 4],
                    paKey: lenA ? aBase[0].key : null, pbKey: lenB ? bBase[0].key : null,
                    action: 'lengths equal', actionColor: '#7dd3fc', tile: null,
                    panel: `Lengths are equal ${ARR} no advance needed. Both pointers start at their heads.`,
                    log: `lenA == lenB -> no advance`, logColor: 'var(--text-dim)'
                }));
            }

            // STEP — lockstep walk, compare identity
            let foundKey = null;
            while (pa < lenA && pb < lenB) {
                const na = aBase[pa], nb = bBase[pb];
                const same = na.key === nb.key;   // SAME identity (shared node)
                if (same) {
                    foundKey = na.key;
                    steps.push(snap({
                        type: 'found', codeLine: [6, 7], complete: true, bold: true, confetti: true,
                        paKey: na.key, pbKey: nb.key, foundNode: na,
                        action: `${CHK} intersection = ${na.val}`, actionColor: 'var(--accent-green)',
                        tile: na.val, tileColor: 'green',
                        panel: `<span style="color:var(--accent-green)">pA</span> and <span style="color:var(--accent-green)">pB</span> reference the <b>same node</b> ${ARR} intersection found at <code>${na.val}</code>.`,
                        log: `pA (${na.val}) is pB (${nb.val}) -> SAME node -> intersection = ${na.val}`, logColor: 'var(--accent-green)'
                    }));
                    break;
                } else {
                    steps.push(snap({
                        type: 'compare', codeLine: [6, 8],
                        paKey: na.key, pbKey: nb.key, compareKeys: [na.key, nb.key],
                        action: `${na.val} != ${nb.val}`, actionColor: '#7dd3fc', tile: null,
                        panel: `Compare identities: <code>pA (${na.val})</code> is not <code>pB (${nb.val})</code> ${ARR} different nodes, step both forward.`,
                        log: `pA (${na.val}) != pB (${nb.val}) -> advance both`, logColor: 'var(--text-dim)'
                    }));
                    pa++; pb++;
                }
            }

            // FINAL (no intersection)
            if (foundKey === null) {
                steps.push(snap({
                    type: 'final', complete: true, bold: true, miss: true, codeLine: [9],
                    paKey: null, pbKey: null, foundNode: null,
                    action: 'no intersection', actionColor: 'var(--accent-red)', tile: DASH, tileColor: 'red',
                    panel: `Both pointers reached <code>null</code> with no shared identity ${ARR} lists do not intersect ${ARR} <code>null</code>.`,
                    log: `both pointers null, no shared node -> return null`, logColor: 'var(--accent-red)'
                }));
            }
        }

        function resetDom() {
            // keep the pointer pills, clear everything else; forget node/arrow elements
            ['rail-l1', 'rail-l2', 'rail-result'].forEach(id => {
                const rail = document.getElementById(id);
                Array.from(rail.children).forEach(ch => { if (!ch.classList.contains('ptr')) rail.removeChild(ch); });
            });
            els = {};
            confettiArmed = true;
            ['ptr-l1', 'ptr-l2'].forEach(id => { const p = document.getElementById(id); p.style.opacity = '0'; p._x = null; });
        }

        function arrowSVG() {
            return `<svg viewBox="0 0 40 24" width="40" height="24">
                <line class="ln" x1="2" y1="12" x2="28" y2="12" stroke-linecap="round"/>
                <polygon class="hd" points="27,6 39,12 27,18"/></svg>`;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti');
            if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#14b8a6'];
            for (let i = 0; i < 42; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 230) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p);
                setTimeout(() => p.remove(), 1900);
            }
        }

        // build the ordered DOM list (units + arrows + nullterm) for one list rail ('l1'=A, 'l2'=B)
        function layoutRail(units, rail, step, freshNodes) {
            const ordered = [];
            const baseTint = rail === 'l1' ? 'from-l1' : 'from-l2';
            const ringClass = rail === 'l1' ? 'l1-ring' : 'l2-ring';
            const ptrKey = rail === 'l1' ? step.paKey : step.pbKey;

            for (let i = 0; i < units.length; i++) {
                const nd = units[i];
                const isShared = sharedKeys.has(nd.key);
                // shared nodes share identity across rails: give them a per-rail DOM key so each rail renders its own
                const nkey = 'k:' + rail + ':' + nd.key;
                let unit = els[nkey];
                if (!unit) {
                    unit = document.createElement('div');
                    unit.className = 'node-unit';
                    unit.innerHTML = `<div class="node"></div><div class="node-index"></div>`;
                    els[nkey] = unit;
                    freshNodes.push(unit.firstChild);
                }
                const nodeEl = unit.firstChild;
                nodeEl.textContent = nd.val;
                const lbl = unit.lastChild;
                const isFound = step.foundNode && step.foundNode.key === nd.key;
                const tint = isFound ? 'found' : (isShared ? 'shared' : baseTint);
                nodeEl.className = 'node ' + tint
                    + (ptrKey === nd.key && !isFound ? ' ' + ringClass : '')
                    + (step.compareKeys && step.compareKeys.includes(nd.key) && !isFound ? ' compare' : '');
                if (nodeEl.classList.contains('compare')) nodeEl.style.setProperty('--glow', rail === 'l1' ? 'rgba(245,165,36,0.55)' : 'rgba(168,85,247,0.55)');
                lbl.textContent = isShared ? 'shared' : '';
                lbl.className = 'node-index' + (isShared ? ' shared-lbl' : '');
                ordered.push(unit);

                if (i < units.length - 1) {
                    const nextShared = sharedKeys.has(units[i + 1].key);
                    const akey = 'r:' + rail + ':' + nd.key;
                    let arr = els[akey];
                    if (!arr) { arr = document.createElement('div'); arr.innerHTML = arrowSVG(); els[akey] = arr; }
                    arr.className = 'arrow ' + (nextShared ? 'a-shared' : (rail === 'l1' ? 'a-l1' : 'a-l2'));
                    ordered.push(arr);
                }
            }
            const nullKey = 'null-' + rail;
            let nul = els[nullKey];
            if (!nul) { nul = document.createElement('div'); nul.className = 'nullterm'; nul.textContent = 'null'; els[nullKey] = nul; }
            ordered.push(nul);
            return ordered;
        }

        // build the middle "intersection" rail — empty placeholder, or the popped-in found node
        function layoutResult(step, freshNodes) {
            const ordered = [];
            if (step.foundNode) {
                const nd = step.foundNode;
                const nkey = 'found';
                let unit = els[nkey];
                if (!unit) {
                    unit = document.createElement('div');
                    unit.className = 'node-unit';
                    unit.innerHTML = `<div class="node found"></div><div class="node-index"></div>`;
                    els[nkey] = unit;
                    freshNodes.push(unit.firstChild);
                }
                unit.firstChild.textContent = nd.val;
                unit.firstChild.className = 'node found';
                unit.lastChild.textContent = 'intersection';
                unit.lastChild.className = 'node-index';
                ordered.push(unit);
            } else {
                const ekey = 'res-empty';
                let emp = els[ekey];
                if (!emp) { emp = document.createElement('div'); emp.className = 'res-empty'; els[ekey] = emp; }
                emp.textContent = (step.complete && step.miss) ? 'null' : ('waiting ' + DASH + ' no intersection yet');
                ordered.push(emp);
            }
            return ordered;
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const railEls = { l1: document.getElementById('rail-l1'), l2: document.getElementById('rail-l2'), result: document.getElementById('rail-result') };

            // FLIP — record FIRST rects (viewport) for every live node BEFORE any DOM mutation
            const firstRects = {};
            Object.keys(els).forEach(k => { if (k.startsWith('k:') && els[k].isConnected) firstRects[k] = els[k].getBoundingClientRect(); });

            const freshNodes = [];
            const ordered = {
                l1: layoutRail(step.aChain, 'l1', step, freshNodes),
                l2: layoutRail(step.bChain, 'l2', step, freshNodes),
                result: layoutResult(step, freshNodes),
            };

            // commit each rail in order
            ['l1', 'result', 'l2'].forEach(rail => { ordered[rail].forEach(el => railEls[rail].appendChild(el)); });

            // remove any element no longer used anywhere
            const used = new Set([...ordered.l1, ...ordered.l2, ...ordered.result]);
            Object.keys(els).forEach(k => {
                if (!used.has(els[k])) { if (els[k].parentNode) els[k].parentNode.removeChild(els[k]); delete els[k]; }
            });

            // FLIP play — survivors spring from old position to new
            Object.keys(firstRects).forEach(k => {
                const el = els[k]; if (!el || !el.isConnected) return;
                const last = el.getBoundingClientRect();
                Motion.flip(el, firstRects[k].left - last.left, firstRects[k].top - last.top);
            });
            freshNodes.forEach((nodeEl, n) => {
                if (nodeEl.classList.contains('found')) Motion.pop(nodeEl);
                else Motion.enter(nodeEl, freshNodes.length > 1 ? n * 28 : 0);
            });

            // narration
            const mainPanel = document.getElementById('main-panel');
            mainPanel.innerHTML = step.panel || '&mdash;';
            mainPanel.classList.toggle('done', !!step.complete && !step.miss);
            mainPanel.classList.toggle('miss', !!step.miss);

            // action word + floating tile
            const aw = document.getElementById('action-word');
            aw.textContent = step.action || '';
            aw.style.color = step.actionColor || 'var(--text-dim)';
            const ft = document.getElementById('float-tile');
            if (step.tile !== null && step.tile !== undefined) {
                document.getElementById('float-val').textContent = step.tile;
                const c = TILE_COLORS[step.tileColor] || TILE_COLORS.green;
                ft.style.background = c.bg; ft.style.color = c.fg; ft.style.borderColor = c.bd; ft.style.boxShadow = '0 0 26px ' + c.glow;
                Motion.pop(ft);
            } else {
                ft.getAnimations().forEach(a => a.cancel());
                ft.style.opacity = '0'; ft.style.transform = 'scale(0.5)';
            }

            // confetti once on intersection found
            if (step.complete && step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } }
            else if (!step.complete) { confettiArmed = true; }

            // pointers (one per list rail)
            positionPointer('ptr-l1', step.paKey, 'l1');
            positionPointer('ptr-l2', step.pbKey, 'l2');

            // state pills
            document.getElementById('val-l1').textContent = step.paKey ? keyVal(step.paKey) : 'null';
            document.getElementById('val-l2').textContent = step.pbKey ? keyVal(step.pbKey) : 'null';
            document.getElementById('val-tail').textContent = step.foundNode ? step.foundNode.val : (step.complete && step.miss ? 'null' : 'null');
            highlightCode(step.codeLine);

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            // cumulative log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px'; line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.textContent = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        // value shown in a pill for a given node key in the CURRENT step
        function keyVal(key) {
            if (!key) return 'null';
            const s = steps[stepIndex];
            const all = [].concat(s.aChain, s.bChain);
            const nd = all.find(n => n.key === key);
            return nd ? nd.val : 'null';
        }

        function positionPointer(id, key, rail) {
            const ptr = document.getElementById(id);
            const unit = key ? els['k:' + rail + ':' + key] : null;
            if (!unit || !unit.isConnected) { ptr.style.opacity = '0'; ptr._x = null; return; }
            Motion.glide(ptr, unit.offsetLeft + unit.offsetWidth / 2);
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) { stepIndex = 0; renderStep(0); }
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase();
            if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); next(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); back(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });

        let rT;
        window.addEventListener('resize', () => { clearTimeout(rT); rT = setTimeout(() => { ['ptr-l1','ptr-l2'].forEach(id => { document.getElementById(id)._x = null; }); renderStep(stepIndex); }, 120); });
        window.onload = init;
    </script>
</body>
</html>
