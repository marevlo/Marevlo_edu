<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flatten Multilevel List - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* current node          */
            --accent-blue:   #06b6d4;   /* next links / arrows    */
            --accent-green:  #22c55e;   /* settled / flattened    */
            --accent-red:    #f43f5e;   /* tail of spliced child  */
            --accent-purple: #a855f7;   /* child-start node       */
            --accent-teal:   #2dd4bf;   /* child pointer arcs     */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(45, 212, 191, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(45,212,191,0.26), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"], input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-teal); box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.18); background: rgba(45, 212, 191, 0.06); }
        .head-input { width: 300px; }

        button {
            height: 34px; border-radius: 9px; padding: 0 16px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(45, 212, 191, 0.5); box-shadow: 0 0 18px rgba(45, 212, 191, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(45,212,191,0.22), rgba(45,212,191,0.10)); border-color: rgba(45, 212, 191, 0.45); color: #99f6e4; min-width: 80px; }

        .shell { width: var(--shell); max-width: 94%; margin: 28px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #99f6e4; background: rgba(45,212,191,0.12); border: 1px solid rgba(45,212,191,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-teal), var(--accent-purple)); box-shadow: 0 0 12px rgba(45,212,191,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(45,212,191,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #d8f6f0; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-teal); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(45,212,191,0.14); color: #5eead4; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(45,212,191,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); padding: 8px 0; position: relative; }

        /* one wrapper holds every level rail, stacked vertically; a single overlay draws all child arcs */
        .levels { display: flex; flex-direction: column; }
        .rail-block { display: flex; flex-direction: column; }
        .rail-label { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); padding: 6px 22px 0; }
        .rail-label.lvl0 { color: var(--accent-blue); }
        .rail-label.lvlsub { color: var(--accent-purple); }

        .list-wrapper { display: flex; align-items: center; justify-content: flex-start; position: relative; overflow: visible; min-height: 92px; padding: 12px 22px; }
        .list-rail { display: flex; align-items: center; gap: 8px; }
        /* sub-rails indent further per nesting level */
        .list-rail.indent1 { margin-left: 64px; }
        .list-rail.indent2 { margin-left: 128px; }
        .list-rail.indent3 { margin-left: 192px; }

        .node-unit { display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; flex: 0 0 auto; will-change: transform; }
        .node {
            min-width: 56px; height: 56px; display: flex; align-items: center; justify-content: center;
            border-radius: 14px; font-size: 20px; font-weight: 800; font-family: var(--mono);
            transition: background 0.4s ease, border-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease, outline-color 0.3s ease;
            border: 2px solid var(--border-main); background: rgba(255, 255, 255, 0.05); color: var(--text-main);
            position: relative; outline: 2px solid transparent; outline-offset: 3px;
        }
        .node.settled { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.18); }
        /* current node under inspection */
        .node.current { outline-color: var(--accent-orange); box-shadow: 0 0 18px rgba(245,165,36,0.45); }
        /* a node that owns a child pointer (purple) */
        .node.has-child { border-color: var(--accent-purple); box-shadow: 0 0 16px rgba(168,85,247,0.4); }
        /* head of a child sub-list */
        .node.child-start { outline-color: var(--accent-purple); box-shadow: 0 0 18px rgba(168,85,247,0.45); }
        /* tail of the sub-list just spliced in */
        .node.child-tail { outline-color: var(--accent-red); box-shadow: 0 0 16px rgba(244,63,94,0.4); }
        /* a node freshly merged into the main rail */
        .node.inserted { background: linear-gradient(180deg, #2fe08f, #21c275); border-color: #34d399; color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.4); }
        /* the fully flattened final rail */
        .node.fully-done { background: linear-gradient(180deg, #2fe08f, #21c275); border-color: #34d399; color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.35); }
        .node-index { font-size: 11px; color: var(--text-dim); font-family: var(--mono); height: 14px; font-weight: 600; }

        .arrow { flex: 0 0 auto; display: flex; align-items: center; height: 56px; filter: drop-shadow(0 0 6px rgba(6,182,212,0.45)); }
        .arrow svg { display: block; overflow: visible; }
        .arrow .ln { stroke: var(--accent-blue); stroke-width: 2.5; }
        .arrow .hd { fill: var(--accent-blue); }
        .arrow.to-null { filter: drop-shadow(0 0 4px rgba(139,152,179,0.25)); }
        .arrow.to-null .ln { stroke: var(--text-dim); }
        .arrow.to-null .hd { fill: var(--text-dim); }
        .arrow.new { filter: drop-shadow(0 0 9px rgba(34,197,94,0.65)); }
        .arrow.new .ln { stroke: var(--accent-green); stroke-dasharray: 36; stroke-dashoffset: 36; animation: drawLine 0.7s ease forwards; }
        .arrow.new .hd { fill: var(--accent-green); opacity: 0; animation: fadeHead 0.3s ease 0.55s forwards; }

        .nullterm { flex: 0 0 auto; min-width: 50px; height: 56px; display: flex; align-items: center; justify-content: center; border-radius: 14px; border: 2px dashed var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 13px; font-weight: 700; background: rgba(255,255,255,0.02); }
        .rail-empty { font-family: var(--mono); font-size: 14px; color: var(--text-dim); padding: 0 8px; }

        /* CHILD-POINTER ARC overlay (one svg over the whole levels stack; cleared & rebuilt each render) */
        .childoverlay { position: absolute; left: 0; top: 0; pointer-events: none; z-index: 3; overflow: visible; }
        .childoverlay .ca-ln { fill: none; stroke: var(--accent-teal); stroke-width: 2.4; opacity: 0.9; stroke-dasharray: 6 5; }
        .childoverlay .ca-ln.fresh { animation: dashFlow 0.8s ease forwards; }
        .childoverlay .ca-ln.fading { animation: dashFade 0.6s ease forwards; }
        .childoverlay .ca-hd { fill: var(--accent-teal); opacity: 0.95; }
        .childoverlay .ca-hd.fading { animation: dashFade 0.6s ease forwards; }
        .childoverlay .ca-tag { font-family: var(--mono); font-size: 9px; font-weight: 800; fill: var(--accent-teal); opacity: 0.9; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-teal); width: 110px; cursor: pointer; }

        #confetti-host { position: relative; height: 0; }
        #confetti { position: absolute; left: 0; right: 0; top: -40px; height: 120px; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(45,212,191,0.4); background: rgba(45,212,191,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }

        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(45,212,191,0.12); border-left-color: var(--accent-teal); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 4px 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-orange); }
        .pill.h b { color: var(--accent-purple); }
        .pill.t b { color: var(--accent-green); }
        .legend-inline { margin-left: auto; display: flex; gap: 14px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; font-size: 11px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; display: inline-block; }
        .swatch-arc { width: 18px; height: 0; border-top: 2.5px dashed var(--accent-teal); margin-right: 6px; display: inline-block; }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes drawLine { to { stroke-dashoffset: 0; } }
        @keyframes fadeHead { to { opacity: 1; } }
        @keyframes dashFlow { from { stroke-dashoffset: 60; opacity: 0.2; } to { stroke-dashoffset: 0; opacity: 0.9; } }
        @keyframes dashFade { from { opacity: 0.9; } to { opacity: 0; } }
        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 190px) rotate(var(--rot)); } }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">multilevel list</label>
        <button onclick="loadExample(1)">Ex 1 (1-2-3-4-5, child at 2, then 7)</button>
        <button onclick="loadExample(2)">Ex 2 (1, child 2-3, child 4)</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Flatten Multilevel List <span class="sub">&middot; DFS Splice &middot; O(n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <svg class="childoverlay" id="child-overlay" aria-hidden="true"></svg>
                <div class="levels" id="levels"></div>
            </div>
        </div>

        <div id="confetti-host"><div id="confetti"></div></div>

        <div class="controls">
            <button onclick="reset()">&#8634; Reset</button>
            <button onclick="back()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="next()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>

                        <div class="state-strip">
                            <span class="pill c">current <b id="val-current">&mdash;</b></span>
                            <span class="pill h">child head <b id="val-child">&mdash;</b></span>
                            <span class="pill t">flattened len <b id="val-tail">&mdash;</b></span>
                            <span class="legend-inline">
                                <span class="legend-item"><span class="dot" style="background:rgba(245,165,36,0.15); border:2px solid var(--accent-orange)"></span>current</span>
                                <span class="legend-item"><span class="dot" style="background:rgba(168,85,247,0.15); border:2px solid var(--accent-purple)"></span>has child</span>
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,#2fe08f,#21c275); border:2px solid #34d399"></span>spliced in</span>
                                <span class="legend-item"><span class="swatch-arc"></span>child pointer</span>
                            </span>
                        </div>

                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ---------- Motion engine (spring + FLIP, zero deps) ----------
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) {
                const a = (-stiffness * x - damping * v) / mass;
                v += a * dt; x += v * dt; out.push(1 - x);
                if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break;
            }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(340, 30, 1);
        const SPRING_POP = sampleSpring(540, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            // FLIP across BOTH axes -- child nodes glide UP into the main rail (dx & dy)
            flip(el, dx, dy) {
                if (REDUCED || (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5)) return;
                const kf = SPRING_POS.map(p => ({ transform: `translate(${(dx*(1-p)).toFixed(2)}px, ${(dy*(1-p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
            },
            enter(el, delay = 0) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p*1.6).toFixed(3),
                    transform: `translateY(${(-18*(1-p)).toFixed(2)}px) scale(${(0.45+0.55*p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', delay, fill: 'backwards' });
            },
            pop(el) {
                el.getAnimations().forEach(a => a.cancel());
                if (REDUCED) { el.style.opacity = '1'; el.style.transform = 'scale(1)'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p*2).toFixed(3),
                    transform: `scale(${(0.5+0.5*p).toFixed(3)}) translateY(${(10*(1-p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'forwards' });
            },
        };

        // ---------- State ----------
        // A node model: { key, val, childKey (key of its child sub-list head | null) }.
        // nextMap is implicit via per-level ordering. We keep an explicit tree per example
        // and DERIVE every step's level layout from a working copy that we splice during DFS.
        let exId = 1;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1800, 900, 450];
        // per-rail element caches: railEls[level] = { 'k:<key>': unit, 'r:<key>': arrow, ... }
        let railEls = [];

        const CODE = [
            [['kw','def '],['fn','flatten'],['src','(head):']],
            [['src','    cur = head']],
            [['kw','    while '],['src','cur:']],
            [['kw','        if '],['src','cur.child:']],
            [['src','            child = cur.child']],
            [['src','            tail  = last_of(child)']],
            [['src','            tail.next = cur.next']],
            [['src','            cur.next  = child']],
            [['src','            cur.child = None']],
            [['src','        cur = cur.next']],
            [['kw','    return '],['src','head']],
        ];
        const ARR = String.fromCharCode(8594);   // ->
        const CHK = String.fromCharCode(10003);   // check
        const DASH = String.fromCharCode(8212);   // em dash

        // ---------- Example multilevel structures ----------
        // Each node: { val, children: [ ...child nodes... ] }.
        // Ex1 main 1->2->3->4->5 ; node 2 has child 6->7->8 ; node 7 has child 9->10.
        // Ex2 main 1 ; node 1 has child 2->3 ; child node 2 has child 4.
        // DFS pre-order flatten:  Ex1 = 1,2,6,7,9,10,8,3,4,5  ;  Ex2 = 1,2,4,3.
        let __k = 0;
        function mk(val, children) { return { key: 'n' + (__k++), val: val, children: children || [] }; }
        function buildExample(id) {
            __k = 0;
            if (id === 2) {
                return [ mk(1, [ mk(2, [ mk(4) ]), mk(3) ]) ];
            }
            return [ mk(1), mk(2, [ mk(6), mk(7, [ mk(9), mk(10) ]), mk(8) ]), mk(3), mk(4), mk(5) ];
        }

        function buildCodePanel() {
            const panel = document.getElementById('code-panel');
            panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div');
                line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(lineArr) {
            document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', lineArr && lineArr.includes(+el.dataset.line)));
        }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap');
            const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        function init() { buildCodePanel(); loadExample(1); }

        function loadExample(id) {
            exId = id;
            resetDom();
            generateSteps();
            reset();
        }

        // ---------- Snapshot model ----------
        // A "layout" is an array of levels; each level is { indent, nodes:[{key,val,childKey}] }.
        // level 0 is the main rail; deeper levels are sub-rails (indented). childKey on a node
        // points at the head key of a sub-list shown on a deeper level (drives the child arc).
        // We flatten by DFS: when a node has a child, splice the whole child chain into the main
        // rail right after that node, null the child pointer, and continue.

        // Build the initial multilevel layout from the tree (assigns levels by nesting depth).
        function initialLayout(tree) {
            const levels = [];
            function place(arr, lvl, parentKey) {
                if (!levels[lvl]) levels[lvl] = { indent: lvl, nodes: [] };
                arr.forEach(n => {
                    const childKey = n.children.length ? n.children[0].key : null;
                    levels[lvl].nodes.push({ key: n.key, val: n.val, childKey: childKey });
                });
                // recurse into each child group, one nesting level deeper
                arr.forEach(n => { if (n.children.length) place(n.children, lvl + 1, n.key); });
            }
            place(tree, 0, null);
            return levels;
        }

        function cloneLayout(layout) {
            return layout.map(lv => ({ indent: lv.indent, nodes: lv.nodes.map(nd => ({ ...nd })) }));
        }

        // helper: find a node's [levelIdx, nodeIdx] by key
        function locate(layout, key) {
            for (let l = 0; l < layout.length; l++) {
                const j = layout[l].nodes.findIndex(n => n.key === key);
                if (j !== -1) return [l, j];
            }
            return [-1, -1];
        }

        // Flatten order via DFS over the ORIGINAL tree (ground truth for the verifier / final).
        function dfsFlatten(tree) {
            const out = [];
            (function rec(arr) { arr.forEach(n => { out.push(n.val); if (n.children.length) rec(n.children); }); })(tree);
            return out;
        }

        // ---------- Step generation ----------
        function generateSteps() {
            steps = [];
            const tree = buildExample(exId);
            const finalOrder = dfsFlatten(tree);
            const finalStr = finalOrder.join(' ' + ARR + ' ');

            let layout = initialLayout(tree);
            const childArcsOf = (lay) => {
                // arcs: for each node with childKey, an arc from that node down to the child head
                const arcs = [];
                lay.forEach(lv => lv.nodes.forEach(nd => { if (nd.childKey) arcs.push({ from: nd.key, to: nd.childKey }); }));
                return arcs;
            };

            // INIT
            steps.push({
                codeLine: [0, 1],
                layout: cloneLayout(layout),
                arcs: childArcsOf(layout),
                currentKey: null, childHeadKey: null, childTailKey: null, insertedKeys: [], drawArrowKey: null, freshArc: null, fadingArc: null,
                flatLen: layout[0].nodes.length,
                panel: `Flatten the multilevel list. Walk the main rail; whenever a node has a <b>child</b>, splice the entire child sub-list in between the node and its next, then null the child pointer.`,
                log: `main = ${layout[0].nodes.map(n => n.val).join(' -> ')}\ncur = head`, logColor: 'var(--text-dim)'
            });

            // DFS splice walk over level 0 of the working layout. Because we always splice child
            // chains into level 0 right after the current node, a single left-to-right scan of
            // level 0 visits nodes in DFS pre-order.
            let pos = 0;
            let guard = 0;
            while (pos < layout[0].nodes.length && guard++ < 500) {
                const cur = layout[0].nodes[pos];

                // visit current
                steps.push({
                    codeLine: [2, 3],
                    layout: cloneLayout(layout),
                    arcs: childArcsOf(layout),
                    currentKey: cur.key, childHeadKey: null, childTailKey: null, insertedKeys: [], drawArrowKey: null, freshArc: null, fadingArc: null,
                    flatLen: pos + 1,
                    panel: `Visit node <b>${cur.val}</b>. ${cur.childKey ? 'It has a <b>child</b> pointer.' : 'No child here &mdash; advance.'}`,
                    log: `cur = ${cur.val}${cur.childKey ? '  (has child)' : ''}`, logColor: cur.childKey ? 'var(--accent-purple)' : 'var(--accent-orange)'
                });

                if (cur.childKey) {
                    // locate the child sub-list (a contiguous run on a deeper level starting at childKey)
                    const [cl, cj] = locate(layout, cur.childKey);
                    const childLevel = layout[cl];
                    const childNodes = childLevel.nodes.slice(cj); // from head to end of that sub-rail
                    const childTail = childNodes[childNodes.length - 1];

                    // highlight the child sub-list (arc still present)
                    steps.push({
                        codeLine: [4, 5],
                        layout: cloneLayout(layout),
                        arcs: childArcsOf(layout),
                        currentKey: cur.key, childHeadKey: cur.childKey, childTailKey: childTail.key, insertedKeys: [], drawArrowKey: null, freshArc: { from: cur.key, to: cur.childKey }, fadingArc: null,
                        flatLen: pos + 1,
                        panel: `child = <b>${childNodes.map(n => n.val).join(' ' + ARR + ' ')}</b>. Find its <b>tail</b> (${childTail.val}). The tail's next will become <code>cur.next</code>.`,
                        log: `child head = ${childNodes[0].val}, tail = ${childTail.val}`, logColor: 'var(--accent-purple)'
                    });

                    // SPLICE: build the new layout. cur.next chain after cur on level 0 gets pushed
                    // behind the child run; child run moves up into level 0; child pointer nulled.
                    const newLayout = cloneLayout(layout);
                    // remove child run from its sub-level
                    const [ncl] = [cl];
                    const survivorsBelow = newLayout[ncl].nodes.slice(0, cj); // nodes before child head stay (none here, head is at cj)
                    newLayout[ncl].nodes = survivorsBelow;
                    // a node in the child run might itself own a child (childKey) pointing yet deeper -- preserve.
                    const movedRun = childNodes.map(n => ({ ...n }));
                    // splice moved run into level 0 right after pos; null cur's childKey
                    const lvl0 = newLayout[0].nodes;
                    const curRef = lvl0[pos];
                    curRef.childKey = null;
                    lvl0.splice(pos + 1, 0, ...movedRun);
                    // drop now-empty sub-levels (compact) but keep deeper non-empty ones; re-index indents
                    const compacted = [newLayout[0]];
                    for (let l = 1; l < newLayout.length; l++) {
                        if (newLayout[l].nodes.length > 0) { newLayout[l].indent = compacted.length; compacted.push(newLayout[l]); }
                    }
                    // reassign indent values so they stack 0..k
                    compacted.forEach((lv, i) => lv.indent = i);

                    steps.push({
                        codeLine: [6, 7, 8],
                        layout: compacted,
                        arcs: childArcsOf(compacted),
                        currentKey: cur.key, childHeadKey: cur.childKey, childTailKey: childTail.key,
                        insertedKeys: movedRun.map(n => n.key),
                        drawArrowKey: cur.key, freshArc: null, fadingArc: { from: cur.key, to: cur.childKey },
                        flatLen: pos + 1 + movedRun.length,
                        panel: `<span style="color:var(--accent-green)">Splice:</span> <code>tail.next = cur.next</code>, <code>cur.next = child</code>, <code>cur.child = None</code>. The child nodes glide up into the main rail.`,
                        log: `spliced ${movedRun.map(n => n.val).join(',')} after ${cur.val}\ncur.child = None`, logColor: 'var(--accent-green)'
                    });

                    layout = compacted;
                }

                pos++;
            }

            // FINAL -- single flat level
            steps.push({
                codeLine: [10], complete: true, bold: true, confetti: true,
                layout: cloneLayout(layout),
                arcs: [],
                currentKey: null, childHeadKey: null, childTailKey: null, insertedKeys: [], drawArrowKey: null, freshArc: null, fadingArc: null,
                allDone: true,
                flatLen: layout[0].nodes.length,
                panel: `Fully flattened: <code>${finalStr}</code>. One level, all child pointers null. Done in <b>O(n)</b>.`,
                log: `return head\nflattened = ${finalOrder.join(' -> ')}`, logColor: 'var(--accent-green)'
            });

            // expose ground truth for verifier
            steps._finalOrder = finalOrder.slice();
            steps._finalRendered = layout[0].nodes.map(n => n.val);
        }

        function resetDom() {
            document.getElementById('levels').innerHTML = '';
            railEls = [];
            confettiArmed = true;
        }

        function arrowSVG() {
            return `<svg viewBox="0 0 40 24" width="40" height="24">
                <line class="ln" x1="2" y1="12" x2="28" y2="12" stroke-linecap="round"/>
                <polygon class="hd" points="27,6 39,12 27,18"/></svg>`;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti');
            if (!host || REDUCED) return;
            const colors = ['#22c55e', '#2dd4bf', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 42; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 230) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p);
                setTimeout(() => p.remove(), 1900);
            }
        }

        // ---------- Rail / level rendering (reconciler with cross-rail FLIP, stable keys) ----------
        // We keep ONE element cache keyed by node key across ALL levels so a node that moves from
        // a sub-rail up into the main rail keeps its identity and FLIPs (dx AND dy) into place.
        let nodeEls = {};   // 'k:<key>' -> node-unit element (level-agnostic, persistent)
        let arrowEls = {};  // 'r:<key>' -> arrow element following node <key>
        let miscEls = {};   // null terminators per level: 'null:<level>'

        function ensureLevelRow(level, indent) {
            const wrap = document.getElementById('levels');
            let block = railEls[level] && railEls[level].block;
            if (!block) {
                block = document.createElement('div');
                block.className = 'rail-block';
                const label = document.createElement('div');
                label.className = 'rail-label ' + (level === 0 ? 'lvl0' : 'lvlsub');
                label.textContent = level === 0 ? 'Main rail' : ('Sub-list - level ' + level);
                const lw = document.createElement('div'); lw.className = 'list-wrapper';
                const rail = document.createElement('div'); rail.className = 'list-rail';
                lw.appendChild(rail); block.appendChild(label); block.appendChild(lw);
                wrap.appendChild(block);
                railEls[level] = { block, label, rail };
            }
            const r = railEls[level];
            r.label.textContent = level === 0 ? 'Main rail' : ('Sub-list - level ' + level);
            r.rail.className = 'list-rail' + (indent > 0 ? ' indent' + Math.min(indent, 3) : '');
            r.block.style.display = '';
            return r.rail;
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;
            const layout = step.layout;

            // FLIP -- record FIRST rects of every persistent node (across all levels) before mutation
            const firstRects = {};
            Object.keys(nodeEls).forEach(k => { if (nodeEls[k].isConnected) firstRects[k] = nodeEls[k].getBoundingClientRect(); });

            const usedNodes = new Set();
            const usedArrows = new Set();
            const usedMisc = new Set();
            const freshNodes = [];

            for (let l = 0; l < layout.length; l++) {
                const lv = layout[l];
                const rail = ensureLevelRow(l, lv.indent);
                const ordered = [];

                for (let i = 0; i < lv.nodes.length; i++) {
                    const nd = lv.nodes[i];
                    const nkey = 'k:' + nd.key;
                    let unit = nodeEls[nkey], isFresh = false;
                    if (!unit) {
                        isFresh = true;
                        unit = document.createElement('div');
                        unit.className = 'node-unit';
                        unit.innerHTML = `<div class="node"></div><div class="node-index"></div>`;
                        nodeEls[nkey] = unit;
                    }
                    usedNodes.add(nkey);
                    const nodeEl = unit.firstChild;
                    nodeEl.textContent = nd.val;
                    unit.lastChild.textContent = (l === 0 && i === 0) ? 'head' : '';

                    nodeEl.className = 'node settled';
                    if (step.allDone) nodeEl.classList.add('fully-done');
                    if (nd.childKey) nodeEl.classList.add('has-child');
                    if (step.currentKey === nd.key) nodeEl.classList.add('current');
                    if (step.childHeadKey === nd.key) nodeEl.classList.add('child-start');
                    if (step.childTailKey === nd.key) nodeEl.classList.add('child-tail');
                    if (step.insertedKeys && step.insertedKeys.indexOf(nd.key) !== -1) nodeEl.classList.add('inserted');

                    if (isFresh) freshNodes.push({ nodeEl, idx: i, level: l });
                    ordered.push(unit);

                    // forward arrow to the next node on this rail
                    if (i < lv.nodes.length - 1) {
                        const akey = 'r:' + nd.key;
                        let arr = arrowEls[akey];
                        if (!arr) { arr = document.createElement('div'); arr.className = 'arrow'; arr.innerHTML = arrowSVG(); arrowEls[akey] = arr; }
                        arr.className = 'arrow';
                        if (step.drawArrowKey === nd.key) arr.classList.add('new');
                        usedArrows.add(akey);
                        ordered.push(arr);
                    }
                }

                // tail -> null terminator for this rail
                if (lv.nodes.length > 0) {
                    const tailKey = lv.nodes[lv.nodes.length - 1].key;
                    const takey = 'r:tail:' + l;
                    let tarr = arrowEls[takey];
                    if (!tarr) { tarr = document.createElement('div'); tarr.className = 'arrow to-null'; tarr.innerHTML = arrowSVG(); arrowEls[takey] = tarr; }
                    tarr.className = 'arrow to-null';
                    if (step.drawArrowKey === tailKey) tarr.classList.add('new');
                    usedArrows.add(takey);
                    ordered.push(tarr);

                    const mkey = 'null:' + l;
                    let nul = miscEls[mkey];
                    if (!nul) { nul = document.createElement('div'); nul.className = 'nullterm'; nul.textContent = 'null'; miscEls[mkey] = nul; }
                    usedMisc.add(mkey);
                    ordered.push(nul);
                }

                // reconcile this rail in order
                Array.from(rail.children).forEach(ch => { if (ordered.indexOf(ch) === -1) rail.removeChild(ch); });
                ordered.forEach(el => rail.appendChild(el));
            }

            // hide level rows that no longer exist
            for (let l = layout.length; l < railEls.length; l++) {
                if (railEls[l] && railEls[l].block) railEls[l].block.style.display = 'none';
            }

            // drop element caches that went unused
            Object.keys(nodeEls).forEach(k => { if (!usedNodes.has(k)) { if (nodeEls[k].parentNode) nodeEls[k].parentNode.removeChild(nodeEls[k]); delete nodeEls[k]; } });
            Object.keys(arrowEls).forEach(k => { if (!usedArrows.has(k)) { if (arrowEls[k].parentNode) arrowEls[k].parentNode.removeChild(arrowEls[k]); delete arrowEls[k]; } });
            Object.keys(miscEls).forEach(k => { if (!usedMisc.has(k)) { if (miscEls[k].parentNode) miscEls[k].parentNode.removeChild(miscEls[k]); delete miscEls[k]; } });

            // FLIP play -- survivors (incl. child nodes that moved UP into the main rail) spring in x AND y
            Object.keys(firstRects).forEach(k => {
                const el = nodeEls[k]; if (!el || !el.isConnected) return;
                const last = el.getBoundingClientRect();
                Motion.flip(el, firstRects[k].left - last.left, firstRects[k].top - last.top);
            });
            const stagger = freshNodes.length > 1;
            freshNodes.forEach(({ nodeEl, idx: i }) => Motion.enter(nodeEl, stagger ? i * 55 : 0));

            // child-pointer arcs (curved, dashed teal, parent DOWN to child head)
            drawChildArcs(step);

            // narration
            const mainPanel = document.getElementById('main-panel');
            mainPanel.innerHTML = step.panel || '&mdash;';
            mainPanel.classList.toggle('done', !!step.complete);

            // confetti once at completion
            if (step.complete && step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } }
            else if (!step.complete) { confettiArmed = true; }

            // state pills
            const curVal = step.currentKey ? findVal(layout, step.currentKey) : DASH;
            const childVal = step.childHeadKey ? findVal(layout, step.childHeadKey) : DASH;
            document.getElementById('val-current').textContent = curVal;
            document.getElementById('val-child').textContent = childVal;
            document.getElementById('val-tail').textContent = step.flatLen != null ? step.flatLen : DASH;
            highlightCode(step.codeLine);

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            // cumulative log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px'; line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.textContent = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function findVal(layout, key) {
            for (const lv of layout) { const nd = lv.nodes.find(n => n.key === key); if (nd) return nd.val; }
            return DASH;
        }

        // ---------- CHILD-POINTER ARCS (adapted from drawRandomArcs / drawBackEdge geometry) ----------
        // Each arc goes from the BOTTOM edge of the parent node DOWN to the TOP edge of the child
        // sub-list head on a deeper rail. Curved cubic Bezier, dashed teal, arrowhead into the child.
        function drawChildArcs(step) {
            const svg = document.getElementById('child-overlay');
            const screen = svg.parentNode; // .stage-screen
            while (svg.firstChild) svg.removeChild(svg.firstChild);
            const arcs = step.arcs || [];
            if (arcs.length === 0) { svg.style.display = 'none'; return; }

            const wr = screen.getBoundingClientRect();
            const SVGNS = 'http://www.w3.org/2000/svg';
            let drew = false;

            arcs.forEach(arc => {
                const src = nodeEls['k:' + arc.from];
                const dst = nodeEls['k:' + arc.to];
                if (!src || !dst || !src.isConnected || !dst.isConnected) return;
                const sr = src.getBoundingClientRect();
                const dr = dst.getBoundingClientRect();
                const sx = (sr.left + sr.right) / 2 - wr.left;
                const sy = sr.bottom - wr.top;             // leave parent's bottom edge
                const ex = (dr.left + dr.right) / 2 - wr.left;
                const ey = dr.top - wr.top;                // arrive at child head's top edge
                drew = true;

                const isFresh = step.freshArc && step.freshArc.from === arc.from && step.freshArc.to === arc.to;
                const isFading = step.fadingArc && step.fadingArc.from === arc.from && step.fadingArc.to === arc.to;

                // elbow-ish curved arc: drop down, bow toward the child column, arrive from above
                const midY = (sy + ey) / 2;
                const cx1 = sx, cy1 = midY + 6;
                const cx2 = ex, cy2 = midY - 6;
                const endY = ey - 2;
                const d = `M ${sx} ${sy} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${ex} ${endY}`;

                const path = document.createElementNS(SVGNS, 'path');
                path.setAttribute('class', 'ca-ln' + (isFresh ? ' fresh' : '') + (isFading ? ' fading' : ''));
                path.setAttribute('d', d);
                svg.appendChild(path);

                // arrowhead pointing DOWN into the child head's top edge
                const hw = 5;
                const tipY = ey - 1;
                const baseY = ey - 11;
                const hd = document.createElementNS(SVGNS, 'polygon');
                hd.setAttribute('class', 'ca-hd' + (isFading ? ' fading' : ''));
                hd.setAttribute('points', `${ex - hw},${baseY} ${ex + hw},${baseY} ${ex},${tipY}`);
                svg.appendChild(hd);

                // 'child' label near the source
                const t = document.createElementNS(SVGNS, 'text');
                t.setAttribute('class', 'ca-tag'); t.setAttribute('x', sx + 8); t.setAttribute('y', sy + 14);
                t.setAttribute('text-anchor', 'start'); t.textContent = 'child';
                svg.appendChild(t);
            });

            svg.setAttribute('width', screen.clientWidth);
            svg.setAttribute('height', screen.clientHeight);
            svg.style.width = screen.clientWidth + 'px';
            svg.style.height = screen.clientHeight + 'px';
            svg.style.display = drew ? 'block' : 'none';
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) { stepIndex = 0; renderStep(0); }
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase();
            if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); next(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); back(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });

        let rT;
        window.addEventListener('resize', () => { clearTimeout(rT); rT = setTimeout(() => { renderStep(stepIndex); }, 120); });
        window.onload = init;
    </script>
</body>
</html>
