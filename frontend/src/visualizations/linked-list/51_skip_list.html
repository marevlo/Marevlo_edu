<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skip List - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* search cursor   */
            --accent-blue:   #06b6d4;   /* links / express */
            --accent-green:  #22c55e;   /* found / settled */
            --accent-red:    #f43f5e;   /* not found       */
            --accent-purple: #a855f7;   /* level / lane     */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 920px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(6, 182, 212, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(6,182,212,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"], input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.18); background: rgba(6, 182, 212, 0.06); }
        .head-input { width: 220px; }
        .target-input { width: 86px; }

        button {
            height: 34px; border-radius: 9px; padding: 0 16px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 94%; margin: 28px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.12); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { margin: 14px; border-radius: 14px; background: radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .grid-wrapper { position: relative; overflow-x: auto; overflow-y: visible; padding: 26px 22px 18px; scrollbar-width: thin; }
        .grid-wrapper::-webkit-scrollbar { height: 7px; }
        .grid-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        /* a level rail: a label on the left + a positioned lane of node cells */
        .level-row { display: flex; align-items: center; gap: 12px; }
        .level-row + .level-row { margin-top: 10px; }
        .level-tag { flex: 0 0 auto; width: 64px; font-family: var(--mono); font-size: 11px; font-weight: 800; color: var(--accent-purple); text-align: right; letter-spacing: 0.4px; }
        .level-tag .small { display: block; font-weight: 600; font-size: 9.5px; color: var(--text-dim); letter-spacing: 0.2px; }
        .lane { position: relative; flex: 1 1 auto; height: 56px; }
        .lane svg.links { position: absolute; left: 0; top: 0; height: 56px; overflow: visible; pointer-events: none; z-index: 1; }
        .lane svg.links .ln { stroke: rgba(6,182,212,0.55); stroke-width: 2.5; fill: none; }
        .lane svg.links .hd { fill: rgba(6,182,212,0.55); }
        .lane svg.links .ln.lit { stroke: var(--accent-orange); }
        .lane svg.links .hd.lit { fill: var(--accent-orange); }
        .lane svg.links .ln.walked { stroke: var(--accent-green); }
        .lane svg.links .hd.walked { fill: var(--accent-green); }

        .cell {
            position: absolute; top: 0; width: 50px; height: 50px; transform: translateX(-50%);
            display: flex; align-items: center; justify-content: center;
            border-radius: 13px; font-size: 18px; font-weight: 800; font-family: var(--mono);
            transition: background 0.35s ease, border-color 0.35s ease, color 0.35s ease, box-shadow 0.35s ease, outline-color 0.25s ease;
            border: 2px solid var(--border-main); background: rgba(255, 255, 255, 0.05); color: var(--text-main);
            z-index: 2; outline: 2px solid transparent; outline-offset: 3px; will-change: transform;
        }
        .cell.head-cell { font-size: 12px; font-weight: 700; color: var(--accent-blue); border-style: dashed; border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .cell.nil-cell { font-size: 12px; font-weight: 700; color: var(--text-dim); border-style: dashed; }
        .cell.visited { background: rgba(245,165,36,0.12); border-color: rgba(245,165,36,0.45); }
        .cell.cursor { outline-color: var(--accent-orange); box-shadow: 0 0 18px rgba(245,165,36,0.45); }
        .cell.found { background: linear-gradient(180deg, #2fe08f, #21c275); border-color: #34d399; color: #06251a; box-shadow: 0 0 24px rgba(34,197,94,0.6); animation: breathe 1.8s ease-in-out infinite; --glow: rgba(34,197,94,0.6); }
        .cell.inserted { background: linear-gradient(180deg, #2fe08f, #21c275); border-color: #34d399; color: #06251a; box-shadow: 0 0 18px rgba(34,197,94,0.45); }

        /* search cursor pill (the pointer pill) — JS spring positioned over the active level */
        .cursor-pill { position: absolute; left: 0; top: 0; display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; z-index: 6; transition: opacity 0.3s ease; will-change: transform; }
        .cursor-pill .tag { font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 8px; white-space: nowrap; background: var(--accent-orange); color: #3a2400; box-shadow: 0 0 14px rgba(245,165,36,0.6); }
        .cursor-pill .stalk { width: 2px; height: 13px; background: var(--accent-orange); }

        .action-stage { position: relative; min-height: 104px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
        .float-tile { width: 64px; height: 64px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 26px; font-weight: 800; opacity: 0; transform: scale(0.5); border: 2px solid transparent; will-change: transform; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 20px; letter-spacing: 0.5px; min-height: 24px; text-align: center; transition: color 0.3s ease; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }

        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 4px 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-orange); }
        .pill.l b { color: var(--accent-purple); }
        .pill.t b { color: var(--accent-blue); }
        .legend-inline { margin-left: auto; display: flex; gap: 14px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; font-size: 11px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; display: inline-block; }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes breathe { 0%,100%{ box-shadow: 0 0 16px var(--glow), inset 0 0 10px rgba(255,255,255,0.06); } 50%{ box-shadow: 0 0 30px var(--glow), inset 0 0 14px rgba(255,255,255,0.12); } }
        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 190px) rotate(var(--rot)); } }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">sorted keys =</label>
        <input type="text" id="head-input" class="head-input" placeholder="1->3->5->7->9->12->17->19">
        <label class="ui-label">search =</label>
        <input type="number" id="target-input" class="target-input" placeholder="17">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,3,5,7,9,12,17,19,21,25], 17)">Ex 1: found</button>
        <button onclick="loadExample([1,3,5,7,9,12,17,19,21,25], 16)">Ex 2: miss</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Skip List <span class="sub">&middot; Layered Ordered Lists &middot; O(log n) search</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="grid-wrapper" id="grid-wrapper">
                    <div id="levels-host"></div>
                    <div class="cursor-pill" id="cursor-pill"><div class="tag">cursor</div><div class="stalk"></div></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="float-tile" id="float-tile"><span id="float-val"></span></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="reset()">&#8634; Reset</button>
            <button onclick="back()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="next()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>

                        <div class="state-strip">
                            <span class="pill c">cursor <b id="val-current">&mdash;</b></span>
                            <span class="pill l">level <b id="val-length">&mdash;</b></span>
                            <span class="pill t">target <b id="val-target">&mdash;</b></span>
                            <span class="legend-inline">
                                <span class="legend-item"><span class="dot" style="background:rgba(245,165,36,0.15); border:2px solid var(--accent-orange)"></span>search cursor</span>
                                <span class="legend-item"><span class="dot" style="background:rgba(245,165,36,0.12); border:2px solid rgba(245,165,36,0.45)"></span>visited</span>
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,#2fe08f,#21c275); border:2px solid #34d399"></span>found</span>
                            </span>
                        </div>

                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ----- Motion engine (spring + FLIP, zero deps) -----
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) {
                const a = (-stiffness * x - damping * v) / mass;
                v += a * dt; x += v * dt; out.push(1 - x);
                if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break;
            }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(340, 30, 1);
        const SPRING_POP = sampleSpring(540, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            enter(el, delay = 0) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p*1.6).toFixed(3),
                    transform: `translateX(-50%) translateY(${(-16*(1-p)).toFixed(2)}px) scale(${(0.5+0.5*p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', delay, fill: 'backwards' });
            },
            pop(el) {
                el.getAnimations().forEach(a => a.cancel());
                if (REDUCED) { el.style.opacity = '1'; el.style.transform = 'scale(1)'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p*2).toFixed(3),
                    transform: `scale(${(0.5+0.5*p).toFixed(3)}) translateY(${(10*(1-p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'forwards' });
            },
            glide(el, x, y) {
                const prevX = el._x, prevY = el._y; el.style.opacity = '1';
                const commit = `translate(${x}px, ${y}px) translateX(-50%)`;
                if (REDUCED || prevX == null || (Math.abs(x - prevX) < 0.5 && Math.abs(y - prevY) < 0.5)) {
                    el._x = x; el._y = y; el.style.transform = commit; return;
                }
                const dx = x - prevX, dy = y - prevY;
                const kf = SPRING_POS.map(p => ({ transform: `translate(${(prevX+dx*p).toFixed(2)}px, ${(prevY+dy*p).toFixed(2)}px) translateX(-50%)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el._y = y; el.style.transform = commit;
            },
        };

        // ----- State -----
        let nodes = [];          // sorted key values (level-0 list)
        let targetVal = 17;
        let levelOf = [];        // levelOf[i] = top level index node i reaches (0-based)
        let maxLevel = 0;        // highest level index present
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1800, 900, 450];

        const CODE = [
            [['kw','def '],['fn','search'],['src','(target):']],
            [['src','    node = head;  lvl = top_level']],
            [['kw','    while '],['src','lvl >= 0:']],
            [['kw','        while '],['src','node.next[lvl] '],['kw','and'],['src',' node.next[lvl].val < target:']],
            [['src','            node = node.next[lvl]    ']],
            [['kw','        if '],['src','node.next[lvl] '],['kw','and'],['src',' node.next[lvl].val == target:']],
            [['kw','            return '],['src','True']],
            [['src','        lvl -= 1                     ']],
            [['kw','    return '],['src','False']],
        ];
        const TILE_COLORS = {
            green: { bg: 'rgba(34,197,94,0.18)',  fg: '#bbf7d0', bd: '#22c55e', glow: 'rgba(34,197,94,0.55)' },
            red:   { bg: 'rgba(244,63,94,0.18)',  fg: '#fecdd3', bd: '#f43f5e', glow: 'rgba(244,63,94,0.55)' },
        };
        const ARR = String.fromCharCode(8594);   // ->
        const CHK = String.fromCharCode(10003);   // check

        // layout constants
        const CELL_W = 50, GAP = 34, HEAD_X = 50, ROW_H = 66;

        function buildCodePanel() {
            const panel = document.getElementById('code-panel');
            panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div');
                line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(lineArr) {
            document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', lineArr && lineArr.includes(+el.dataset.line)));
        }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap');
            const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        function init() { buildCodePanel(); loadExample([1,3,5,7,9,12,17,19,21,25], 17); }

        function parseHead(str) {
            if (!str || str.trim() === "") return [];
            return str.split('->').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        }

        // Deterministic level assignment: a node reaches level L if its index is a
        // multiple of 2^L (classic perfect skip list). Guarantees columns line up and
        // higher lanes are sparse express lanes — no randomness so simulation is stable.
        function assignLevels() {
            levelOf = nodes.map((_, i) => {
                let lv = 0;
                while (((i + 1) % (1 << (lv + 1))) === 0) lv++;
                return lv;
            });
            // head (conceptually before index 0) spans all levels; ensure index 0 is on level 0 at least
            maxLevel = nodes.length ? Math.max(0, ...levelOf) : 0;
        }

        function loadExample(arr, target) {
            nodes = [...arr];
            targetVal = parseInt(target);
            document.getElementById('head-input').value = nodes.length ? nodes.join('->') : 'null';
            document.getElementById('target-input').value = targetVal;
            assignLevels();
            generateSteps();
            reset();
        }

        function loadCustom() {
            const headStr = document.getElementById('head-input').value.trim();
            const tStr = document.getElementById('target-input').value;
            const parsedNodes = parseHead(headStr).slice().sort((a, b) => a - b);
            const parsedTarget = parseInt(tStr);
            if (!isNaN(parsedTarget)) loadExample(parsedNodes, parsedTarget);
            else alert("Please enter sorted keys (e.g. 1->3->5->7) and a numeric search target.");
        }

        // does node i exist on level lv?
        function onLevel(i, lv) { return levelOf[i] >= lv; }

        // next node index above `from` (exclusive) that exists on level lv, or null
        function nextOnLevel(fromIdx, lv) {
            for (let i = fromIdx + 1; i < nodes.length; i++) if (onLevel(i, lv)) return i;
            return null;
        }
        // first node index on level lv (from head), or null
        function firstOnLevel(lv) {
            for (let i = 0; i < nodes.length; i++) if (onLevel(i, lv)) return i;
            return null;
        }

        // ----- step generation — skip-list search as a descent -----
        // cursor is represented as { idx: -1 means head, lv } ; visited set of "lv:idx" express links walked
        function generateSteps() {
            steps = [];
            const t = targetVal;
            const n = nodes.length;

            if (n === 0) {
                steps.push({ type: 'final', complete: true, miss: true, codeLine: [8], cursorIdx: -1, lv: 0,
                    found: false, walked: [], visited: [],
                    action: 'empty', actionColor: 'var(--accent-red)', tile: null, result: false,
                    panel: `Empty skip list ${ARR} <b>${t}</b> not found.`,
                    log: `list empty -> search(${t}) = False`, logColor: 'var(--accent-red)' });
                return;
            }

            const listStr = nodes.join(' ' + ARR + ' ');
            steps.push({
                type: 'init', codeLine: [0, 1], cursorIdx: -1, lv: maxLevel, found: false, walked: [], visited: [],
                action: 'start at head, top level', actionColor: '#7dd3fc', tile: null,
                panel: `Search <b>${t}</b>. Start the cursor at the <b>head</b> on the top level (L${maxLevel}). Move right while next &lt; ${t}, drop a level when next &gt; ${t}.`,
                log: `skip list = ${listStr}\nsearch(${t}): cursor = head, lvl = ${maxLevel}`, logColor: 'var(--text-dim)'
            });

            let cursorIdx = -1;          // -1 = head
            let found = false;
            let foundIdx = null;
            const walked = [];           // committed express links walked, "lv:from->to"
            const visited = new Set();   // visited node indices (for shading)

            for (let lv = maxLevel; lv >= 0; lv--) {
                // walk right on this level while next exists and next.val < t
                while (true) {
                    const nxt = (cursorIdx === -1) ? firstOnLevel(lv) : nextOnLevel(cursorIdx, lv);
                    if (nxt !== null && nodes[nxt] < t) {
                        walked.push(lv + ':' + cursorIdx + '>' + nxt);
                        cursorIdx = nxt;
                        visited.add(cursorIdx);
                        steps.push({
                            type: 'walk', codeLine: [3, 4], cursorIdx, lv, found: false,
                            walked: walked.slice(), visited: [...visited],
                            action: `${nodes[cursorIdx]} < ${t} ${ARR} move right`, actionColor: 'var(--accent-orange)', tile: null,
                            panel: `On <b>L${lv}</b>: next key <b>${nodes[cursorIdx]}</b> &lt; ${t} ${ARR} advance the cursor right (skipping over lower nodes).`,
                            log: `L${lv}: ${nodes[cursorIdx]} < ${t} -> move right to ${nodes[cursorIdx]}`, logColor: 'var(--accent-orange)'
                        });
                    } else {
                        break;
                    }
                }
                // peek: is next on this level the target?
                const peek = (cursorIdx === -1) ? firstOnLevel(lv) : nextOnLevel(cursorIdx, lv);
                if (peek !== null && nodes[peek] === t) {
                    foundIdx = peek;
                    found = true;
                    walked.push(lv + ':' + cursorIdx + '>' + peek);
                    visited.add(peek);
                    steps.push({
                        type: 'found', complete: true, bold: true, confetti: true, codeLine: [5, 6],
                        cursorIdx: peek, lv, found: true, foundIdx: peek, walked: walked.slice(), visited: [...visited],
                        action: CHK + ' found ' + t, actionColor: 'var(--accent-green)', tile: t, tileColor: 'green',
                        panel: `On <b>L${lv}</b>: next key <b>${t}</b> == target ${ARR} <b>found!</b> Located in O(log n) hops via express lanes.`,
                        result: true,
                        log: `L${lv}: next == ${t} -> search(${t}) = True (FOUND)`, logColor: 'var(--accent-green)'
                    });
                    break;
                }
                // drop a level (or finish at the bottom)
                if (lv > 0) {
                    const peekStr = peek === null ? 'null' : nodes[peek];
                    steps.push({
                        type: 'drop', codeLine: [7], cursorIdx, lv: lv - 1, found: false,
                        walked: walked.slice(), visited: [...visited],
                        action: `next ${peekStr === 'null' ? 'is null' : '> ' + t} ${ARR} drop to L${lv - 1}`, actionColor: 'var(--accent-purple)', tile: null,
                        panel: `On <b>L${lv}</b>: next is <b>${peekStr}</b> ${peek === null ? '(end of lane)' : '&gt; ' + t} ${ARR} drop down to <b>L${lv - 1}</b> at the same column.`,
                        log: `L${lv}: next (${peekStr}) ${peek === null ? 'null' : '> ' + t} -> drop to L${lv - 1}`, logColor: 'var(--accent-purple)'
                    });
                }
            }

            if (!found) {
                const where = cursorIdx === -1 ? 'head' : nodes[cursorIdx];
                steps.push({
                    type: 'final', complete: true, miss: true, codeLine: [8], cursorIdx, lv: 0, found: false,
                    walked: walked.slice(), visited: [...visited],
                    action: t + ' not found', actionColor: 'var(--accent-red)', tile: null, result: false,
                    panel: `Bottom level reached after <b>${where}</b>; the next key is not <b>${t}</b> ${ARR} <b>not found.</b>`,
                    log: `L0: next != ${t} -> search(${t}) = False (NOT FOUND)`, logColor: 'var(--accent-red)'
                });
            }
        }

        // ----- rendering -----
        function colX(i) {
            // i = -1 is head column; otherwise node column
            if (i === -1) return HEAD_X;
            return HEAD_X + (CELL_W + GAP) + i * (CELL_W + GAP);
        }
        // y (top) of a given level row inside the grid; level maxLevel is the top row
        function rowY(lv) { return (maxLevel - lv) * ROW_H; }

        // total content width
        function contentWidth() {
            const last = colX(nodes.length - 1);
            return last + CELL_W + GAP; // room for trailing nil
        }

        function buildLevels() {
            const host = document.getElementById('levels-host');
            host.innerHTML = '';
            host.style.position = 'relative';
            host.style.height = ((maxLevel + 1) * ROW_H) + 'px';
            const w = contentWidth();

            for (let lv = maxLevel; lv >= 0; lv--) {
                const row = document.createElement('div');
                row.className = 'level-row';
                row.style.position = 'absolute';
                row.style.left = '0'; row.style.right = '0';
                row.style.top = rowY(lv) + 'px';

                const tag = document.createElement('div');
                tag.className = 'level-tag';
                tag.innerHTML = `L${lv}<span class="small">${lv === 0 ? 'full list' : 'express'}</span>`;
                row.appendChild(tag);

                const lane = document.createElement('div');
                lane.className = 'lane';
                lane.style.minWidth = w + 'px';

                // svg link layer
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('class', 'links');
                svg.setAttribute('width', w);
                svg.setAttribute('height', 56);
                svg.dataset.lv = lv;
                lane.appendChild(svg);

                // head cell
                const head = document.createElement('div');
                head.className = 'cell head-cell';
                head.style.left = colX(-1) + 'px';
                head.textContent = 'head';
                head.dataset.lv = lv; head.dataset.idx = '-1';
                lane.appendChild(head);

                // node cells present on this level
                for (let i = 0; i < nodes.length; i++) {
                    if (!onLevel(i, lv)) continue;
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.left = colX(i) + 'px';
                    cell.textContent = nodes[i];
                    cell.dataset.lv = lv; cell.dataset.idx = i;
                    lane.appendChild(cell);
                }
                row.appendChild(lane);
                host.appendChild(row);
            }
            // animate cells in (bottom row first reads natural)
            if (!REDUCED) {
                const cells = host.querySelectorAll('.cell');
                cells.forEach((c, i) => Motion.enter(c, Math.min(i * 22, 400)));
            }
            // draw the static link arrows per lane
            drawAllLinks();
        }

        function laneSvg(lv) {
            return document.querySelector(`#levels-host svg.links[data-lv="${lv}"]`);
        }

        // draw forward express links for each level: head -> first, then between consecutive nodes on lv, then -> nil
        function drawAllLinks() {
            for (let lv = maxLevel; lv >= 0; lv--) {
                const svg = laneSvg(lv);
                if (!svg) continue;
                svg.innerHTML = '';
                // build the ordered sequence of column indices on this level: head(-1), nodes..., nil
                const seq = [-1];
                for (let i = 0; i < nodes.length; i++) if (onLevel(i, lv)) seq.push(i);
                const cy = 25;
                for (let s = 0; s < seq.length; s++) {
                    const from = seq[s];
                    const to = (s + 1 < seq.length) ? seq[s + 1] : null;
                    const x1 = colX(from) + (from === -1 ? CELL_W / 2 - 2 : CELL_W / 2 - 2);
                    let x2;
                    if (to === null) { x2 = colX(nodes.length - 1) + CELL_W + GAP - 6; }
                    else { x2 = colX(to) - CELL_W / 2 - 4; }
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('class', 'ln');
                    line.setAttribute('x1', x1 + CELL_W / 2 - (CELL_W / 2 - 2));
                    line.setAttribute('y1', cy); line.setAttribute('x2', x2); line.setAttribute('y2', cy);
                    line.setAttribute('stroke-linecap', 'round');
                    line.dataset.from = from; line.dataset.to = (to === null ? 'nil' : to);
                    svg.appendChild(line);
                    const hd = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                    hd.setAttribute('class', 'hd');
                    hd.setAttribute('points', `${x2-2},${cy-5} ${x2+7},${cy} ${x2-2},${cy+5}`);
                    hd.dataset.from = from; hd.dataset.to = (to === null ? 'nil' : to);
                    svg.appendChild(hd);
                }
                // trailing nil cell once per lane (right edge)
                if (!svg.parentNode.querySelector('.nil-cell')) {
                    const nil = document.createElement('div');
                    nil.className = 'cell nil-cell';
                    nil.style.left = (colX(nodes.length - 1) + CELL_W + GAP) + 'px';
                    nil.textContent = 'nil';
                    svg.parentNode.appendChild(nil);
                }
            }
        }

        function fireConfetti() {
            const host = document.getElementById('confetti');
            if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 42; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 230) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p);
                setTimeout(() => p.remove(), 1900);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;
            const host = document.getElementById('levels-host');

            const walkedSet = new Set(step.walked || []);
            const visitedSet = new Set(step.visited || []);

            // cells: state classes
            host.querySelectorAll('.cell').forEach(cell => {
                const i = parseInt(cell.dataset.idx);
                const lv = parseInt(cell.dataset.lv);
                if (cell.classList.contains('nil-cell') || cell.classList.contains('head-cell')) {
                    // head/nil keep base classes; cursor may sit on head
                    cell.classList.toggle('cursor', step.cursorIdx === i && lv === step.lv);
                    return;
                }
                cell.classList.toggle('visited', visitedSet.has(i) && !(step.found && step.foundIdx === i));
                cell.classList.toggle('found', !!step.found && step.foundIdx === i && lv === step.lv);
                cell.classList.toggle('cursor', step.cursorIdx === i && lv === step.lv && !(step.found && step.foundIdx === i));
            });

            // links: lit (current level active link) + walked (already traversed)
            host.querySelectorAll('svg.links').forEach(svg => {
                const lv = parseInt(svg.dataset.lv);
                svg.querySelectorAll('.ln, .hd').forEach(el => {
                    const from = parseInt(el.dataset.from);
                    const toRaw = el.dataset.to;
                    const to = toRaw === 'nil' ? null : parseInt(toRaw);
                    const key = lv + ':' + from + '>' + (to === null ? 'nil' : to);
                    el.classList.toggle('walked', walkedSet.has(key));
                    el.classList.remove('lit');
                });
            });

            // narration
            const mainPanel = document.getElementById('main-panel');
            mainPanel.innerHTML = step.panel || '&mdash;';
            mainPanel.classList.toggle('done', !!step.complete && !step.miss);
            mainPanel.classList.toggle('miss', !!step.miss);

            // action word + float tile
            const aw = document.getElementById('action-word');
            aw.textContent = step.action || '';
            aw.style.color = step.actionColor || 'var(--text-dim)';
            const ft = document.getElementById('float-tile');
            if (step.tile !== null && step.tile !== undefined) {
                document.getElementById('float-val').textContent = step.tile;
                const c = TILE_COLORS[step.tileColor] || TILE_COLORS.green;
                ft.style.background = c.bg; ft.style.color = c.fg; ft.style.borderColor = c.bd; ft.style.boxShadow = '0 0 26px ' + c.glow;
                Motion.pop(ft);
            } else {
                ft.getAnimations().forEach(a => a.cancel());
                ft.style.opacity = '0'; ft.style.transform = 'scale(0.5)';
            }

            // confetti once on found
            if (step.complete && step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } }
            else if (!step.complete) { confettiArmed = true; }

            // cursor pill — over the active cell on the active level
            positionCursor(step.cursorIdx, step.lv);

            // state pills
            document.getElementById('val-current').textContent = step.cursorIdx === -1 ? 'head' : (nodes[step.cursorIdx] !== undefined ? nodes[step.cursorIdx] : '—');
            document.getElementById('val-length').textContent = 'L' + step.lv;
            document.getElementById('val-target').textContent = targetVal;
            highlightCode(step.codeLine);

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            // cumulative log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px'; line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.textContent = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function positionCursor(idx, lv) {
            const pill = document.getElementById('cursor-pill');
            const host = document.getElementById('levels-host');
            const wrap = document.getElementById('grid-wrapper');
            // find the cell element for this idx+lv
            let cell = null;
            host.querySelectorAll('.cell').forEach(c => {
                if (parseInt(c.dataset.idx) === idx && parseInt(c.dataset.lv) === lv) cell = c;
            });
            if (!cell) { pill.style.opacity = '0'; pill._x = null; pill._y = null; return; }
            const cr = cell.getBoundingClientRect();
            const wr = wrap.getBoundingClientRect();
            const x = cr.left - wr.left + wrap.scrollLeft + cr.width / 2;
            const y = cr.top - wr.top + wrap.scrollTop - 26;
            Motion.glide(pill, x, y);
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); buildLevels(); stepIndex = 0; confettiArmed = true; renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) { stepIndex = 0; renderStep(0); }
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase();
            if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); next(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); back(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });

        let rT;
        window.addEventListener('resize', () => { clearTimeout(rT); rT = setTimeout(() => { const p = document.getElementById('cursor-pill'); p._x = null; p._y = null; renderStep(stepIndex); }, 120); });
        window.onload = init;
    </script>
</body>
</html>
