<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insert at End - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --text-log: #67e8f9;
            --accent-orange: #f5a524;   /* new node     */
            --accent-blue:   #06b6d4;   /* head / links */
            --accent-green:  #22c55e;   /* newly linked */
            --accent-red:    #f85149;
            --accent-purple: #a855f7;   /* current ptr  */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(6, 182, 212, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after {
            content: ''; position: fixed; border-radius: 50%; filter: blur(70px);
            pointer-events: none; z-index: 0; opacity: 0.45;
        }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(6,182,212,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        /* INPUT BAR (top toolbar) */
        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"], input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            outline: none; border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.18); background: rgba(6, 182, 212, 0.06);
        }
        .head-input { width: 240px; }
        .data-input { width: 76px; }

        button {
            height: 34px; border-radius: 9px; padding: 0 16px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        /* APP SHELL — one width, consistent vertical rhythm */
        .shell { width: var(--shell); max-width: 94%; margin: 28px auto 0; display: flex; flex-direction: column; gap: 16px; }

        /* header */
        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge {
            font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc;
            background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3);
            padding: 4px 10px; border-radius: 999px; white-space: nowrap;
        }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s ease; }

        /* narration — the single source of truth for "what's happening" */
        .narration {
            background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px;
            padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5;
            min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s;
        }
        .narration::before { content: '▸'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '✓'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.12); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        /* HERO: the list stage */
        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen {
            margin: 14px; border-radius: 14px;
            background: radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .list-wrapper {
            display: flex; align-items: center; justify-content: flex-start;
            min-height: 200px; position: relative; overflow-x: auto; overflow-y: visible;
            padding: 36px 18px 56px; scrollbar-width: thin;
        }
        .list-wrapper::-webkit-scrollbar { height: 7px; }
        .list-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .list-rail { display: flex; align-items: center; gap: 6px; margin: 0 auto; }

        .node-unit { display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; flex: 0 0 auto; }
        .node {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 14px; font-size: 19px; font-weight: 800; font-family: var(--mono);
            transition: background 0.4s ease, border-color 0.4s ease, color 0.4s ease, transform 0.4s cubic-bezier(0.34, 1.3, 0.64, 1), box-shadow 0.4s ease;
            border: 2px solid var(--border-main); background: rgba(255, 255, 255, 0.05); color: var(--text-main); position: relative;
        }
        .node.enter { animation: nodeEnter 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) both; }
        .node.new-node {
            background: rgba(245, 165, 36, 0.14); border-color: var(--accent-orange); color: #ffd591;
            box-shadow: 0 0 22px rgba(245, 165, 36, 0.55), inset 0 0 12px rgba(245, 165, 36, 0.15);
            animation: breathe 2s ease-in-out infinite; --glow: rgba(245, 165, 36, 0.6);
        }
        /* a fresh new node must BOTH drop in AND keep breathing (one `animation` decl, comma-separated) */
        .node.new-node.enter { animation: nodeEnter 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) both, breathe 2s ease-in-out 0.5s infinite; }
        .node.current {
            border-color: var(--accent-purple); color: #e9d5ff; background: rgba(168, 85, 247, 0.12);
            box-shadow: 0 0 22px rgba(168, 85, 247, 0.55), inset 0 0 12px rgba(168, 85, 247, 0.15);
            animation: breathe 2s ease-in-out infinite; --glow: rgba(168, 85, 247, 0.6);
        }
        .node.current::after { content: ''; position: absolute; inset: -3px; border-radius: 16px; border: 2px solid var(--accent-purple); opacity: 0; animation: pulseRing 1.6s ease-out infinite; pointer-events: none; }
        .node-index { font-size: 11px; color: var(--text-dim); font-family: var(--mono); height: 14px; font-weight: 600; }

        .arrow { flex: 0 0 auto; display: flex; align-items: center; height: 58px; filter: drop-shadow(0 0 6px rgba(6,182,212,0.45)); }
        .arrow svg { display: block; overflow: visible; }
        .arrow .ln { stroke: var(--accent-blue); stroke-width: 2.5; }
        .arrow .hd { fill: var(--accent-blue); }
        .arrow.to-null { filter: drop-shadow(0 0 4px rgba(139,152,179,0.25)); }
        .arrow.to-null .ln { stroke: var(--text-dim); }
        .arrow.to-null .hd { fill: var(--text-dim); }
        .arrow.new { filter: drop-shadow(0 0 9px rgba(34,197,94,0.65)); }
        .arrow.new .ln { stroke: var(--accent-green); stroke-dasharray: 36; stroke-dashoffset: 36; animation: drawLine 0.7s ease forwards; }
        .arrow.new .hd { fill: var(--accent-green); opacity: 0; animation: fadeHead 0.3s ease 0.55s forwards; }

        .nullterm {
            flex: 0 0 auto; min-width: 52px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 14px; border: 2px dashed var(--border-main); color: var(--text-dim);
            font-family: var(--mono); font-size: 13px; font-weight: 700; background: rgba(255,255,255,0.02);
        }

        .ptr {
            position: absolute; bottom: 14px; left: 0; display: flex; flex-direction: column; align-items: center;
            font-family: var(--mono); font-size: 11px; font-weight: 700; gap: 1px; opacity: 0; pointer-events: none;
            transition: transform 0.45s cubic-bezier(0.34, 1.1, 0.64, 1), opacity 0.3s ease;
        }
        .ptr .cap { font-size: 14px; line-height: 10px; }
        .ptr.current { color: var(--accent-purple); }
        .ptr.newptr  { color: var(--accent-orange); }

        /* CONTROLS */
        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* DETAILS DISCLOSURE (code · state · log) */
        .details-toggle {
            align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer;
            background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim);
            font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
        }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }

        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        /* compact state strip + inline legend */
        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 4px 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); }
        .pill.n b { color: var(--accent-orange); }
        .pill.h b { color: var(--accent-blue); }
        .pill.o b { color: var(--accent-green); }
        .legend-inline { margin-left: auto; display: flex; gap: 14px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; font-size: 11px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; display: inline-block; }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes nodeEnter { 0%{opacity:0; transform:translateY(-14px) scale(0.6)} 100%{opacity:1; transform:translateY(0) scale(1)} }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }
        @keyframes fadeHead { to { opacity: 1; } }
        @keyframes breathe { 0%,100%{ box-shadow: 0 0 16px var(--glow), inset 0 0 10px rgba(255,255,255,0.04); } 50%{ box-shadow: 0 0 30px var(--glow), inset 0 0 14px rgba(255,255,255,0.08); } }
        @keyframes pulseRing { 0%{transform:scale(1); opacity:0.7} 100%{transform:scale(1.45); opacity:0} }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">head =</label>
        <input type="text" id="head-input" class="head-input" placeholder="1->2->3">
        <label class="ui-label">data =</label>
        <input type="number" id="data-input" class="data-input" placeholder="4">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,2,3], 4)">Ex 1</button>
        <button onclick="loadExample([], 5)">Ex 2</button>
    </div>

    <div class="shell">
        <!-- header -->
        <div class="title-row">
            <h1>Insert at End <span class="sub">· Singly Linked List</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <!-- narration -->
        <div class="narration" id="main-panel">&mdash;</div>

        <!-- hero list -->
        <div class="stage-card">
            <div class="stage-screen">
                <div class="list-wrapper" id="list-wrapper">
                    <div class="list-rail" id="list-container"></div>
                    <div class="ptr current" id="ptr-current"><span class="cap">&#9650;</span><span>current</span></div>
                    <div class="ptr newptr" id="ptr-new"><span class="cap">&#9650;</span><span>new_node</span></div>
                </div>
            </div>
        </div>

        <!-- controls -->
        <div class="controls">
            <button onclick="reset()">&#8634; Reset</button>
            <button onclick="back()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="next()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <!-- details disclosure -->
        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>

                        <div class="state-strip">
                            <span class="pill c">current <b id="val-current">&mdash;</b></span>
                            <span class="pill n">new_node <b id="val-new">&mdash;</b></span>
                            <span class="pill h">head <b id="val-head">&mdash;</b></span>
                            <span class="pill">data <b id="val-data">&mdash;</b></span>
                            <span class="pill o">steps&middot;O(n) <b id="val-ops">0</b></span>
                            <span class="legend-inline">
                                <span class="legend-item"><span class="dot" style="background:rgba(168,85,247,0.15); border:2px solid var(--accent-purple)"></span>current</span>
                                <span class="legend-item"><span class="dot" style="background:rgba(245,165,36,0.15); border:2px solid var(--accent-orange)"></span>new</span>
                                <span class="legend-item"><span class="dot" style="background:var(--accent-green); border:2px solid var(--accent-green)"></span>linked</span>
                            </span>
                        </div>

                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let nodes = [];
        let insertVal = 4;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        // Persistent DOM registry: key -> element (enables smooth transitions)
        let els = {};

        // ---- Algorithm source (rendered once, highlighted per step) ----
        const CODE = [
            [['kw','def '],['fn','insert_at_end'],['src','(head, data):']],
            [['src','    new_node = '],['fn','Node'],['src','(data)']],
            [['kw','    if '],['src','head '],['kw','is None'],['src',':']],
            [['kw','        return '],['src','new_node']],
            [['src','    current = head']],
            [['kw','    while '],['src','current.next '],['kw','is not None'],['src',':']],
            [['src','        current = current.next']],
            [['src','    current.next = new_node']],
            [['kw','    return '],['src','head']],
        ];

        function buildCodePanel() {
            const panel = document.getElementById('code-panel');
            panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div');
                line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span');
                lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }

        function highlightCode(lineArr) {
            document.querySelectorAll('.code-line').forEach(el => {
                el.classList.toggle('active', lineArr && lineArr.includes(+el.dataset.line));
            });
        }

        function toggleDetails() {
            const wrap = document.getElementById('details-wrap');
            const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        function init() { buildCodePanel(); loadExample([1,2,3], 4); }

        function parseHead(str) {
            if (!str || str.trim() === "") return [];
            return str.split('->').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        }

        function loadExample(arr, data) {
            nodes = [...arr];
            insertVal = parseInt(data);
            document.getElementById('head-input').value = nodes.length ? nodes.join('->') : 'null';
            document.getElementById('data-input').value = insertVal;
            resetDom();
            generateSteps();
            reset();
        }

        function loadCustom() {
            const headStr = document.getElementById('head-input').value.trim();
            const dStr = document.getElementById('data-input').value;
            const parsedNodes = parseHead(headStr);
            const parsedData = parseInt(dStr);
            if (!isNaN(parsedData)) loadExample(parsedNodes, parsedData);
            else alert("Please enter a valid head list (e.g. 1->2->3 or leave empty for null) and a data value.");
        }

        function generateSteps() {
            steps = [];
            const n = nodes.length;
            const isEmpty = n === 0;
            let comps = 0;

            steps.push({
                type: 'init', current: null, newNode: null, comps,
                headVal: nodes.length ? nodes[0] : 'null', listState: [...nodes], codeLine: [1],
                panel: `Initialize: create new node with data <b>${insertVal}</b>. List is ${nodes.length ? nodes.join('&#8594;') : 'empty (head = null)'}.`,
                log: `Initialize\nNew node created (data=${insertVal})\nhead = ${nodes.length ? nodes.join('->') : 'null'}`,
                logColor: 'var(--text-dim)'
            });

            if (isEmpty) {
                steps.push({
                    type: 'empty', current: null, newNode: 0, comps,
                    headVal: insertVal, listState: [insertVal], codeLine: [2, 3], newArrowIdx: 0,
                    panel: `<span style="color:var(--accent-green)">head is null</span> &#8594; set <code>head = new node(${insertVal})</code>`,
                    log: `head is null -> head = new Node(${insertVal})\nResult: ${insertVal}`,
                    logColor: 'var(--accent-green)'
                });
            } else {
                steps.push({
                    type: 'create', current: 0, newNode: null, comps,
                    headVal: nodes[0], listState: [...nodes], codeLine: [4],
                    panel: `Create new node (data = ${insertVal}). Set <code>current = head</code> (node ${nodes[0]}).`,
                    log: `New node created\ncurrent = head (value ${nodes[0]})`,
                    logColor: 'var(--accent-purple)'
                });

                for (let i = 0; i < n; i++) {
                    const isLast = (i === n - 1);
                    comps++;
                    steps.push({
                        type: 'traverse', current: i, newNode: null, comps,
                        headVal: nodes[0], listState: [...nodes], codeLine: isLast ? [5] : [5, 6],
                        panel: isLast
                            ? `Current node = <b>${nodes[i]}</b>. <code>current.next is null</code> &#8594; exit loop.`
                            : `Current node = <b>${nodes[i]}</b>. <code>current.next = ${nodes[i+1]}</code> &#8594; move forward.`,
                        log: `current = ${nodes[i]}\n${isLast ? 'current.next == null -> stop' : 'current = current.next'}`,
                        logColor: isLast ? 'var(--accent-orange)' : 'var(--accent-purple)'
                    });

                    if (isLast) {
                        steps.push({
                            type: 'link', current: i, newNode: 0, comps,
                            headVal: nodes[0], listState: [...nodes, insertVal], codeLine: [7], newArrowIdx: n - 1,
                            panel: `<span style="color:var(--accent-green)">Last node found.</span> Set <code>current.next = new node(${insertVal})</code>.`,
                            log: `current.next = new Node(${insertVal})\nList now: ${nodes.join('->')}->${insertVal}`,
                            logColor: 'var(--accent-green)'
                        });
                    }
                }
            }

            steps.push({
                type: 'final', current: null, newNode: 0, comps,
                headVal: nodes.length ? nodes[0] : insertVal,
                listState: isEmpty ? [insertVal] : [...nodes, insertVal], complete: true, codeLine: [8],
                panel: `Insertion complete in <b>O(n)</b> time. Final list: <b>${isEmpty ? insertVal : nodes.join('&#8594;') + '&#8594;' + insertVal}</b>`,
                log: `Final Result: ${isEmpty ? insertVal : nodes.join('->') + '->' + insertVal}`,
                logColor: 'var(--accent-green)', bold: true
            });
        }

        function resetDom() { els = {}; document.getElementById('list-container').innerHTML = ''; }

        function arrowSVG() {
            return `<svg viewBox="0 0 40 24" width="40" height="24">
                <line class="ln" x1="2" y1="12" x2="28" y2="12" stroke-linecap="round"/>
                <polygon class="hd" points="27,6 39,12 27,18"/></svg>`;
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;
            const container = document.getElementById('list-container');
            const state = step.listState;
            const isNewLast = step.type === 'link' || step.type === 'empty' || step.type === 'final';

            const ordered = [];

            for (let i = 0; i < state.length; i++) {
                const nkey = 'n' + i;
                let unit = els[nkey];
                let isFresh = false;
                if (!unit) {
                    isFresh = true;
                    unit = document.createElement('div');
                    unit.className = 'node-unit';
                    unit.innerHTML = `<div class="node"></div><div class="node-index"></div>`;
                    els[nkey] = unit;
                }
                const nodeEl = unit.firstChild;
                nodeEl.textContent = state[i];
                unit.lastChild.textContent = (i === 0) ? 'head' : '';
                nodeEl.classList.toggle('current', step.current === i);
                nodeEl.classList.toggle('new-node', isNewLast && i === state.length - 1);
                if (isFresh) nodeEl.classList.add('enter');
                ordered.push(unit);

                if (i < state.length - 1) {
                    const akey = 'a' + i;
                    let arr = els[akey];
                    if (!arr) { arr = document.createElement('div'); arr.className = 'arrow'; arr.innerHTML = arrowSVG(); els[akey] = arr; }
                    arr.classList.remove('to-null');
                    arr.classList.toggle('new', step.newArrowIdx === i);
                    ordered.push(arr);
                }
            }
            if (state.length > 0) {
                const tkey = 'a' + (state.length - 1);
                let tarr = els[tkey];
                if (!tarr) { tarr = document.createElement('div'); tarr.className = 'arrow'; tarr.innerHTML = arrowSVG(); els[tkey] = tarr; }
                tarr.classList.add('to-null');
                tarr.classList.toggle('new', step.newArrowIdx === state.length - 1);
                ordered.push(tarr);

                let nul = els['null'];
                if (!nul) { nul = document.createElement('div'); nul.className = 'nullterm'; nul.textContent = 'null'; els['null'] = nul; }
                ordered.push(nul);
            }

            const used = new Set(ordered);
            Array.from(container.children).forEach(ch => { if (!used.has(ch)) container.removeChild(ch); });
            Object.keys(els).forEach(k => { if (!used.has(els[k])) delete els[k]; });
            ordered.forEach(el => container.appendChild(el));

            const mainPanel = document.getElementById('main-panel');
            mainPanel.innerHTML = step.panel || '&mdash;';
            mainPanel.classList.toggle('done', !!step.complete);

            document.getElementById('val-current').textContent = step.current !== null ? step.current : '—';
            document.getElementById('val-new').textContent = step.newNode !== null ? insertVal : '—';
            document.getElementById('val-head').textContent = step.headVal;
            document.getElementById('val-data').textContent = insertVal;
            document.getElementById('val-ops').textContent = step.comps;
            highlightCode(step.codeLine);

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / (steps.length - 1)) * 100}%`;

            positionPointer('ptr-current', step.current);
            positionPointer('ptr-new', isNewLast ? state.length - 1 : null);

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px'; line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.textContent = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function positionPointer(id, nodeIdx) {
            const ptr = document.getElementById(id);
            if (nodeIdx === null || nodeIdx === undefined || !els['n' + nodeIdx]) { ptr.style.opacity = '0'; return; }
            const unit = els['n' + nodeIdx];
            const center = unit.offsetLeft + unit.offsetWidth / 2;
            ptr.style.transform = `translateX(${center}px) translateX(-50%)`;
            ptr.style.opacity = '1';
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) { stepIndex = 0; renderStep(0); }
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase();
            if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); next(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); back(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });

        window.addEventListener('resize', () => renderStep(stepIndex));
        window.onload = init;
    </script>
</body>
</html>
