<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRU + frequency - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* current op / move */
            --accent-blue:   #06b6d4;   /* next links      */
            --accent-green:  #22c55e;   /* hit / done      */
            --accent-red:    #f43f5e;   /* miss / evict    */
            --accent-purple: #a855f7;   /* prev links / map */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(6, 182, 212, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(6,182,212,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"], input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.18); background: rgba(6, 182, 212, 0.06); }
        .head-input { width: 340px; }
        .target-input { width: 64px; }

        button {
            height: 34px; border-radius: 9px; padding: 0 16px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 94%; margin: 28px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        /* operation feed + capacity badge */
        .feed-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .cap-badge { display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 12px; font-weight: 700; color: #d8b4fe; background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.35); padding: 5px 12px; border-radius: 999px; white-space: nowrap; }
        .cap-badge b { color: #fff; font-size: 14px; }
        .op-feed { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; flex: 1; }
        .op-chip {
            font-family: var(--mono); font-size: 11.5px; font-weight: 700; padding: 4px 10px; border-radius: 8px;
            background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim);
            white-space: nowrap; transition: background 0.25s, border-color 0.25s, color 0.25s, transform 0.25s, box-shadow 0.25s;
        }
        .op-chip.done { color: #86efac; border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.07); }
        .op-chip.done::before { content: '\2713 '; color: var(--accent-green); }
        .op-chip.current { color: #fde68a; border-color: var(--accent-orange); background: rgba(245,165,36,0.14); transform: translateY(-1px); box-shadow: 0 0 14px rgba(245,165,36,0.35); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.12); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { margin: 14px; border-radius: 14px; background: radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .list-wrapper { display: flex; align-items: center; justify-content: flex-start; min-height: 196px; position: relative; overflow-x: auto; overflow-y: visible; padding: 52px 18px 52px; scrollbar-width: thin; }
        .list-wrapper::-webkit-scrollbar { height: 7px; }
        .list-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .list-rail { display: flex; align-items: center; gap: 8px; margin: 0 auto; }

        /* end tags MRU / LRU */
        .endtag { flex: 0 0 auto; min-width: 48px; height: 58px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; border-radius: 14px; border: 2px dashed var(--border-main); font-family: var(--mono); font-size: 11px; font-weight: 800; background: rgba(255,255,255,0.02); }
        .endtag.mru { border-color: rgba(34,197,94,0.45); color: #86efac; }
        .endtag.lru { border-color: rgba(244,63,94,0.45); color: #fda4af; }
        .endtag .sub { font-size: 9px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.3px; }

        .empty-note { font-family: var(--mono); font-size: 13px; color: var(--text-dim); padding: 0 18px; }

        .node-unit { display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; flex: 0 0 auto; will-change: transform; }
        .node {
            min-width: 64px; height: 58px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
            border-radius: 14px; font-family: var(--mono);
            transition: background 0.4s ease, border-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease, outline-color 0.3s ease;
            border: 2px solid var(--border-main); background: rgba(255, 255, 255, 0.05); color: var(--text-main);
            position: relative; outline: 2px solid transparent; outline-offset: 3px;
        }
        .node .k { font-size: 10px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.3px; }
        .node .v { font-size: 20px; font-weight: 800; line-height: 1; }
        /* settled = a normal committed cache entry (green) */
        .node.settled { background: linear-gradient(180deg, rgba(34,197,94,0.16), rgba(34,197,94,0.07)); border-color: rgba(52,211,153,0.55); box-shadow: 0 0 12px rgba(34,197,94,0.18); }
        .node.settled .k { color: #6ee7b7; }
        /* node touched by current op (hit / put / move) */
        .node.active { background: linear-gradient(180deg, #fbbf4d, #f5a524); border-color: var(--accent-orange); color: #3a2400; box-shadow: 0 0 24px rgba(245,165,36,0.55); }
        .node.active .k { color: #5a3a00; }
        /* the most-frequent node, spotlighted on getMostFrequent */
        .node.freqmax { background: linear-gradient(180deg, rgba(168,85,247,0.28), rgba(168,85,247,0.12)); border-color: var(--accent-purple); color: #f3e8ff; box-shadow: 0 0 24px rgba(168,85,247,0.55); }
        .node.freqmax .k { color: #e9d5ff; }
        /* the LRU node about to be evicted */
        .node.evict { background: linear-gradient(180deg, #fb7185, #f43f5e); border-color: var(--accent-red); color: #3a0010; box-shadow: 0 0 24px rgba(244,63,94,0.6); animation: breathe 1.6s ease-in-out infinite; --glow: rgba(244,63,94,0.6); }
        .node.evict .k { color: #5a0010; }
        .node-index { font-size: 11px; color: var(--text-dim); font-family: var(--mono); height: 14px; font-weight: 600; }

        /* frequency badge floating above each node */
        .freq-badge {
            position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
            font-family: var(--mono); font-size: 9.5px; font-weight: 800; white-space: nowrap;
            padding: 2px 7px; border-radius: 999px; color: #a5f3fc;
            background: rgba(6,182,212,0.14); border: 1px solid rgba(6,182,212,0.4);
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }
        .node.freqmax + .freq-badge, .freq-badge.hot { color: #e9d5ff; background: rgba(168,85,247,0.18); border-color: rgba(168,85,247,0.55); }

        /* bidirectional connector: top line = next (blue, rightward), bottom line = prev (purple, leftward) */
        .arrow { flex: 0 0 auto; display: flex; align-items: center; height: 58px; }
        .arrow svg { display: block; overflow: visible; }
        .arrow .ln-next { stroke: var(--accent-blue); stroke-width: 2.4; stroke-linecap: round; }
        .arrow .hd-next { fill: var(--accent-blue); }
        .arrow .ln-prev { stroke: var(--accent-purple); stroke-width: 2.4; stroke-linecap: round; opacity: 0.55; }
        .arrow .hd-prev { fill: var(--accent-purple); opacity: 0.55; }

        .action-stage { position: relative; min-height: 104px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
        .float-tile { min-width: 64px; padding: 0 10px; height: 64px; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: var(--mono); font-weight: 800; opacity: 0; transform: scale(0.5); border: 2px solid transparent; will-change: transform; }
        .float-tile .ft-k { font-size: 11px; opacity: 0.8; }
        .float-tile .ft-v { font-size: 24px; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 20px; letter-spacing: 0.5px; min-height: 24px; text-align: center; transition: color 0.3s ease; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }

        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        /* hash map panel */
        .map-body { padding: 12px 16px 14px; display: flex; flex-direction: column; gap: 6px; min-height: 40px; }
        .map-row { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 13px; padding: 5px 12px; border-radius: 9px; background: rgba(168,85,247,0.06); border: 1px solid rgba(168,85,247,0.18); transition: background 0.3s, border-color 0.3s; }
        .map-row .mk { color: #d8b4fe; font-weight: 800; min-width: 54px; }
        .map-row .marrow { color: var(--text-dim); }
        .map-row .mnode { color: #7dd3fc; }
        .map-row .mnode b { color: #e8eefb; }
        .map-row .mfreq { margin-left: auto; color: #a5f3fc; font-size: 11.5px; font-weight: 700; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 1px 8px; border-radius: 999px; }
        .map-row.touched { background: rgba(245,165,36,0.12); border-color: rgba(245,165,36,0.4); }
        .map-row.hot .mfreq { color: #e9d5ff; background: rgba(168,85,247,0.18); border-color: rgba(168,85,247,0.5); }
        .map-empty { font-family: var(--mono); font-size: 13px; color: var(--text-dim); font-style: italic; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 4px 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.p b { color: var(--accent-orange); }
        .pill.c b { color: var(--accent-blue); }
        .pill.h b { color: var(--accent-purple); }
        .legend-inline { margin-left: auto; display: flex; gap: 14px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; font-size: 11px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; display: inline-block; }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes breathe { 0%,100%{ box-shadow: 0 0 16px var(--glow), inset 0 0 10px rgba(255,255,255,0.06); } 50%{ box-shadow: 0 0 30px var(--glow), inset 0 0 14px rgba(255,255,255,0.12); } }
        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 190px) rotate(var(--rot)); } }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">capacity =</label>
        <input type="number" id="target-input" class="target-input" placeholder="2" value="2">
        <label class="ui-label">ops =</label>
        <input type="text" id="head-input" class="head-input" placeholder="put 1 10; put 2 20; get 1; put 3 30; freq">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(2, [['put',1,10],['put',2,20],['get',1],['put',3,30],['freq']])">Ex 1 (cap 2)</button>
        <button onclick="loadExample(2, [['put',1,5],['put',2,5],['get',1],['get',2],['get',1],['freq']])">Ex 2 (cap 2)</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>LRU + frequency <span class="sub">&middot; LRU eviction + access counts &middot; O(n) getMostFrequent</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="feed-row">
            <span class="cap-badge">capacity <b id="cap-val">2</b></span>
            <div class="op-feed" id="op-feed"></div>
        </div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="list-wrapper" id="list-wrapper">
                    <div class="list-rail" id="list-container"></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="float-tile" id="float-tile"><span class="ft-k" id="float-key"></span><span class="ft-v" id="float-val"></span></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="reset()">&#8634; Reset</button>
            <button onclick="back()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="next()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, hash map &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>

                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Hash Map (key &#8594; node, freq)</div>
                            <div class="map-body" id="map-panel"></div>
                        </div>

                        <div class="state-strip">
                            <span class="pill p">op <b id="val-op">&mdash;</b></span>
                            <span class="pill c">size <b id="val-size">&mdash;</b></span>
                            <span class="pill h">result <b id="val-result">&mdash;</b></span>
                            <span class="legend-inline">
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,#fbbf4d,#f5a524); border:2px solid var(--accent-orange)"></span>touched</span>
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,rgba(168,85,247,0.28),rgba(168,85,247,0.12)); border:2px solid var(--accent-purple)"></span>most frequent</span>
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,rgba(34,197,94,0.16),rgba(34,197,94,0.07)); border:2px solid #34d399"></span>cached</span>
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,#fb7185,#f43f5e); border:2px solid var(--accent-red)"></span>evict</span>
                            </span>
                        </div>

                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // --------- Motion engine (spring + FLIP, zero deps) ---------
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) {
                const a = (-stiffness * x - damping * v) / mass;
                v += a * dt; x += v * dt; out.push(1 - x);
                if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break;
            }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(340, 30, 1);
        const SPRING_POP = sampleSpring(540, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            flip(el, dx, dy) {
                if (REDUCED || (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5)) return;
                const kf = SPRING_POS.map(p => ({ transform: `translate(${(dx*(1-p)).toFixed(2)}px, ${(dy*(1-p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
            },
            enter(el, delay = 0) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p*1.6).toFixed(3),
                    transform: `translateY(${(-18*(1-p)).toFixed(2)}px) scale(${(0.45+0.55*p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', delay, fill: 'backwards' });
            },
            pop(el) {
                el.getAnimations().forEach(a => a.cancel());
                if (REDUCED) { el.style.opacity = '1'; el.style.transform = 'scale(1)'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p*2).toFixed(3),
                    transform: `scale(${(0.5+0.5*p).toFixed(3)}) translateY(${(10*(1-p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'forwards' });
            },
            // exit: an evicted node lifts away (fades + scales + drifts up). Fixed-position clone, so survivors can FLIP into the gap.
            exit(rect, kText, vText) {
                if (REDUCED) return;
                const c = document.createElement('div');
                c.innerHTML = `<span style="font-size:11px;opacity:0.8">${kText}</span><span style="font-size:20px">${vText}</span>`;
                c.style.cssText = `position:fixed; left:${rect.left}px; top:${rect.top}px; width:${rect.width}px; height:${rect.height}px;
                    display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:14px; font-family:var(--mono); font-weight:800;
                    background:linear-gradient(180deg,#fb7185,#f43f5e); color:#3a0010; border:2px solid #f43f5e; box-shadow:0 0 24px rgba(244,63,94,0.6);
                    z-index:60; pointer-events:none;`;
                document.body.appendChild(c);
                const a = c.animate(
                    [{ opacity: 1, transform: 'translateY(0) scale(1) rotate(0)' },
                     { opacity: 0, transform: 'translateY(-52px) scale(0.55) rotate(8deg)' }],
                    { duration: 560, easing: 'cubic-bezier(.4,0,.7,1)' });
                a.onfinish = () => c.remove(); a.oncancel = () => c.remove();
            },
        };

        // --------- State ---------
        let capacity = 2;
        let ops = [];           // array of ['put',k,v] | ['get',k] | ['freq']
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1800, 900, 450];
        let els = {};

        const CODE = [
            [['kw','def '],['fn','get'],['src','(key):']],
            [['kw','    if '],['src','key '],['kw','not in '],['src','map: '],['kw','return '],['src','-1']],
            [['src','    map[key].freq += 1; move_to_front(map[key])']],
            [['kw','    return '],['src','map[key].val']],
            [['src','']],
            [['kw','def '],['fn','put'],['src','(key, val):']],
            [['kw','    if '],['src','key '],['kw','in '],['src','map: node.val=val; node.freq+=1; move_front']],
            [['kw','    else'],['src',': node = add_front(key,val,freq=1); map[key]=node']],
            [['kw','        if '],['src','size > capacity: del map[tail.key]; remove(tail)']],
            [['src','']],
            [['kw','def '],['fn','get_most_frequent'],['src','():']],
            [['kw','    return '],['src','max(map.values(), key=lambda n: n.freq).val']],
        ];
        const TILE_COLORS = {
            red:    { bg: 'rgba(244,63,94,0.18)',  fg: '#fecdd3', bd: '#f43f5e', glow: 'rgba(244,63,94,0.55)' },
            green:  { bg: 'rgba(34,197,94,0.18)',  fg: '#bbf7d0', bd: '#22c55e', glow: 'rgba(34,197,94,0.55)' },
            orange: { bg: 'rgba(245,165,36,0.18)', fg: '#fde68a', bd: '#f5a524', glow: 'rgba(245,165,36,0.55)' },
            purple: { bg: 'rgba(168,85,247,0.18)', fg: '#e9d5ff', bd: '#a855f7', glow: 'rgba(168,85,247,0.55)' },
        };
        const ARR = String.fromCharCode(8594), CHK = String.fromCharCode(10003), DASH = String.fromCharCode(8212);

        function buildCodePanel() {
            const panel = document.getElementById('code-panel');
            panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div');
                line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(lineArr) {
            document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', lineArr && lineArr.includes(+el.dataset.line)));
        }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap');
            const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, hash map & log' : 'Show code, hash map & log';
        }

        function init() {
            buildCodePanel();
            loadExample(2, [['put',1,10],['put',2,20],['get',1],['put',3,30],['freq']]);
        }

        // parse "put 1 10; get 2; freq" -> [['put',1,10],['get',2],['freq']]
        function parseOps(str) {
            if (!str || str.trim() === '') return [];
            const out = [];
            str.split(';').forEach(seg => {
                const parts = seg.trim().split(/[\s,]+/).filter(s => s.length);
                if (!parts.length) return;
                const cmd = parts[0].toLowerCase();
                if (cmd === 'put') {
                    const k = parseInt(parts[1]), v = parseInt(parts[2]);
                    if (!isNaN(k) && !isNaN(v)) out.push(['put', k, v]);
                } else if (cmd === 'get') {
                    const k = parseInt(parts[1]);
                    if (!isNaN(k)) out.push(['get', k]);
                } else if (cmd === 'freq' || cmd === 'getmostfrequent' || cmd === 'mostfrequent') {
                    out.push(['freq']);
                }
            });
            return out;
        }

        function opLabel(op) {
            if (op[0] === 'put') return `put(${op[1]},${op[2]})`;
            if (op[0] === 'get') return `get(${op[1]})`;
            return 'mostFrequent()';
        }

        function loadExample(cap, opsArr) {
            capacity = cap;
            ops = opsArr.map(o => o.slice());
            document.getElementById('target-input').value = capacity;
            document.getElementById('head-input').value = ops.map(o => o[0] === 'put' ? `put ${o[1]} ${o[2]}` : (o[0] === 'get' ? `get ${o[1]}` : 'freq')).join('; ');
            resetDom();
            generateSteps();
            reset();
        }

        function loadCustom() {
            const cap = parseInt(document.getElementById('target-input').value);
            const parsedOps = parseOps(document.getElementById('head-input').value);
            if (isNaN(cap) || cap < 1) { alert('Please enter a capacity >= 1.'); return; }
            if (!parsedOps.length) { alert('Please enter ops like: put 1 10; put 2 20; get 1; freq'); return; }
            loadExample(cap, parsedOps);
        }

        // ----- DLL model (head = MRU, tail = LRU). Each node tracks an access freq (starts 1). -----
        // Eviction policy is plain LRU (evict tail). freq is an access counter used only by getMostFrequent().
        function generateSteps() {
            steps = [];
            const map = new Map();          // cache key -> node object {nkey, k, v, freq}
            let order = [];                 // array of node objects, index 0 = MRU
            let uid = 0;

            const snap = () => order.map(n => ({ key: n.nkey, k: n.k, v: n.v, freq: n.freq }));
            const mapSnap = () => order.map(n => ({ k: n.k, nkey: n.nkey, v: n.v, freq: n.freq }));
            const moveFront = (node) => { order = order.filter(n => n !== node); order.unshift(node); };

            // STEP 0 -- init
            steps.push({
                type: 'init', codeLine: [0, 5, 10], opIndex: -1, nodes: [], map: [],
                activeKey: null, freqKey: null, size: 0, result: '-',
                action: 'LRU + FREQ', actionColor: '#7dd3fc', tile: null,
                panel: `LRU cache with <b>capacity ${capacity}</b>. Eviction is plain <b>LRU</b> (drop the tail). Every <code>get</code> hit and <code>put</code> update bumps that key's <b>access count</b>; <code>mostFrequent()</code> scans the map for the highest count.`,
                log: `capacity = ${capacity}\n${ops.length} operations queued`, logColor: 'var(--text-dim)'
            });

            ops.forEach((op, oi) => {
                if (op[0] === 'get') {
                    const k = op[1];
                    if (map.has(k)) {
                        const node = map.get(k);
                        node.freq += 1;
                        moveFront(node);
                        steps.push({
                            type: 'get-hit', codeLine: [2, 3], opIndex: oi, nodes: snap(), map: mapSnap(),
                            activeKey: node.nkey, freqKey: null, touchedMapKey: k, size: order.length, result: String(node.v),
                            action: 'HIT ' + ARR + ' ' + node.v, actionColor: 'var(--accent-green)', tile: { k, v: node.v }, tileColor: 'green',
                            panel: `<code>get(${k})</code> &#8594; <span style="color:var(--accent-green)">HIT</span>. Return <b>${node.v}</b>, bump access count to <b>${node.freq}</b>, move key <b>${k}</b> to the MRU front.`,
                            log: `get(${k}) = ${node.v}  (hit, freq=${node.freq}, move to front)`, logColor: 'var(--accent-green)'
                        });
                    } else {
                        steps.push({
                            type: 'get-miss', codeLine: [1], opIndex: oi, nodes: snap(), map: mapSnap(),
                            activeKey: null, freqKey: null, touchedMapKey: null, size: order.length, result: '-1', miss: true,
                            action: 'MISS ' + ARR + ' -1', actionColor: 'var(--accent-red)', tile: { k, v: '-1' }, tileColor: 'red',
                            panel: `<code>get(${k})</code> &#8594; <span style="color:var(--accent-red)">MISS</span>. Key <b>${k}</b> is not in the map, return <b>-1</b>.`,
                            log: `get(${k}) = -1  (miss)`, logColor: 'var(--accent-red)'
                        });
                    }
                } else if (op[0] === 'put') {
                    const k = op[1], v = op[2];
                    if (map.has(k)) {
                        const node = map.get(k);
                        node.v = v;
                        node.freq += 1;
                        moveFront(node);
                        steps.push({
                            type: 'put-update', codeLine: [6], opIndex: oi, nodes: snap(), map: mapSnap(),
                            activeKey: node.nkey, freqKey: null, touchedMapKey: k, size: order.length, result: 'set',
                            action: 'UPDATE ' + k + ':' + v, actionColor: 'var(--accent-orange)', tile: { k, v }, tileColor: 'orange',
                            panel: `<code>put(${k}, ${v})</code>: key <b>${k}</b> exists &#8594; update value to <b>${v}</b>, bump access count to <b>${node.freq}</b>, move to the MRU front.`,
                            log: `put(${k},${v})  (update, freq=${node.freq}, move to front)`, logColor: 'var(--accent-orange)'
                        });
                    } else {
                        const node = { nkey: 'n' + (uid++), k, v, freq: 1 };
                        order.unshift(node);
                        map.set(k, node);
                        let evictedKey = null, evictedVal = null;
                        if (order.length > capacity) {
                            const lru = order[order.length - 1];
                            evictedKey = lru.k; evictedVal = lru.v;
                            order = order.slice(0, order.length - 1);
                            map.delete(lru.k);
                        }
                        steps.push({
                            type: 'put-insert', codeLine: evictedKey !== null ? [7, 8] : [7], opIndex: oi,
                            nodes: snap(), map: mapSnap(),
                            activeKey: node.nkey, freqKey: null, touchedMapKey: k, size: order.length,
                            result: evictedKey !== null ? ('evict ' + evictedKey) : 'add',
                            action: evictedKey !== null ? ('EVICT ' + evictedKey + ' ' + DASH + ' add ' + k) : ('ADD ' + k + ':' + v),
                            actionColor: evictedKey !== null ? 'var(--accent-red)' : 'var(--accent-green)',
                            tile: { k, v }, tileColor: evictedKey !== null ? 'red' : 'green',
                            evicted: evictedKey,
                            panel: evictedKey !== null
                                ? `<code>put(${k}, ${v})</code>: new key (freq 1). Cache is full &#8594; <span style="color:var(--accent-red)">EVICT LRU key ${evictedKey}</span>, then insert <b>${k}:${v}</b> at the MRU front.`
                                : `<code>put(${k}, ${v})</code>: new key &#8594; insert <b>${k}:${v}</b> (freq 1) at the MRU front (size ${order.length}/${capacity}).`,
                            log: evictedKey !== null
                                ? `put(${k},${v})  (evict ${evictedKey}:${evictedVal}, add ${k} freq=1)`
                                : `put(${k},${v})  (add freq=1, size ${order.length}/${capacity})`,
                            logColor: evictedKey !== null ? 'var(--accent-red)' : 'var(--accent-green)'
                        });
                    }
                } else { // freq / getMostFrequent
                    // scan map for max freq; first-encountered wins on ties (insertion order of Map)
                    let maxFreq = -1, maxNode = null;
                    for (const node of map.values()) {
                        if (node.freq > maxFreq) { maxFreq = node.freq; maxNode = node; }
                    }
                    const resVal = maxNode ? maxNode.v : -1;
                    steps.push({
                        type: 'freq', codeLine: [11], opIndex: oi, nodes: snap(), map: mapSnap(),
                        activeKey: null, freqKey: maxNode ? maxNode.nkey : null, touchedMapKey: maxNode ? maxNode.k : null,
                        size: order.length, result: String(resVal),
                        action: 'FREQ ' + ARR + ' ' + resVal, actionColor: 'var(--accent-purple)',
                        tile: maxNode ? { k: maxNode.k, v: maxNode.v } : null, tileColor: 'purple',
                        panel: maxNode
                            ? `<code>mostFrequent()</code>: scan access counts &#8594; key <b>${maxNode.k}</b> has the highest (<b>freq ${maxNode.freq}</b>). Return its value <b>${resVal}</b>.`
                            : `<code>mostFrequent()</code>: cache is empty &#8594; return <b>-1</b>.`,
                        log: maxNode
                            ? `mostFrequent() = ${resVal}  (key ${maxNode.k}, freq ${maxNode.freq})`
                            : `mostFrequent() = -1  (empty)`,
                        logColor: 'var(--accent-purple)'
                    });
                }
            });

            // FINAL
            const finalOrder = order.map(n => `${n.k}:${n.v}(f${n.freq})`).join(', ');
            steps.push({
                type: 'final', complete: true, bold: true, confetti: true, codeLine: [], opIndex: ops.length,
                nodes: snap(), map: mapSnap(), activeKey: null, freqKey: null, size: order.length, result: 'done',
                action: CHK + ' DONE', actionColor: 'var(--accent-green)', tile: null,
                panel: `All ${ops.length} ops complete. Final recency order (MRU &#8594; LRU): <code>${finalOrder || 'empty'}</code>.`,
                log: `done. final (MRU->LRU): ${finalOrder || 'empty'}`, logColor: 'var(--accent-green)'
            });
        }

        function resetDom() { els = {}; document.getElementById('list-container').innerHTML = ''; confettiArmed = true; }

        // bidirectional DLL connector: top = next (blue, rightward), bottom = prev (purple, leftward)
        function arrowSVG() {
            return `<svg viewBox="0 0 44 30" width="44" height="30">
                <line class="ln-next" x1="4" y1="9" x2="34" y2="9"/><polygon class="hd-next" points="33,4 43,9 33,14"/>
                <line class="ln-prev" x1="10" y1="21" x2="40" y2="21"/><polygon class="hd-prev" points="11,16 1,21 11,26"/></svg>`;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti');
            if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 42; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 230) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p);
                setTimeout(() => p.remove(), 1900);
            }
        }

        function renderOpFeed(opIndex) {
            const feed = document.getElementById('op-feed');
            feed.innerHTML = '';
            ops.forEach((op, i) => {
                const chip = document.createElement('div');
                chip.className = 'op-chip';
                if (i < opIndex) chip.classList.add('done');
                else if (i === opIndex) chip.classList.add('current');
                chip.textContent = opLabel(op);
                feed.appendChild(chip);
            });
        }

        function renderMap(mapState, touchedKey, hotKey) {
            const panel = document.getElementById('map-panel');
            panel.innerHTML = '';
            if (!mapState.length) {
                const e = document.createElement('div'); e.className = 'map-empty'; e.textContent = 'empty';
                panel.appendChild(e); return;
            }
            // sorted by key for stable reading
            mapState.slice().sort((a, b) => a.k - b.k).forEach(row => {
                const r = document.createElement('div');
                let cls = 'map-row';
                if (touchedKey !== null && touchedKey !== undefined && row.k === touchedKey) cls += ' touched';
                if (hotKey !== null && hotKey !== undefined && row.k === hotKey) cls += ' hot';
                r.className = cls;
                r.innerHTML = `<span class="mk">${row.k}</span><span class="marrow">${ARR}</span><span class="mnode">node(<b>${row.k}:${row.v}</b>)</span><span class="mfreq">freq ${row.freq}</span>`;
                panel.appendChild(r);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;
            const container = document.getElementById('list-container');
            const nodesArr = step.nodes;

            // FLIP -- record FIRST rects before any DOM mutation
            const firstRects = {};
            Object.keys(els).forEach(k => { if (k.startsWith('k:') && els[k].isConnected) firstRects[k] = els[k].getBoundingClientRect(); });

            const ordered = [];
            const freshNodes = [];

            // LEFT end tag = MRU / head
            let mtag = els['mru'];
            if (!mtag) { mtag = document.createElement('div'); mtag.className = 'endtag mru'; mtag.innerHTML = `MRU<span class="sub">head</span>`; els['mru'] = mtag; }
            ordered.push(mtag);

            if (nodesArr.length === 0) {
                let note = els['empty'];
                if (!note) { note = document.createElement('div'); note.className = 'empty-note'; note.textContent = 'cache is empty'; els['empty'] = note; }
                ordered.push(note);
            }

            for (let i = 0; i < nodesArr.length; i++) {
                const nd = nodesArr[i];
                const nkey = 'k:' + nd.key;
                let unit = els[nkey], isFresh = false;
                if (!unit) {
                    isFresh = true;
                    unit = document.createElement('div');
                    unit.className = 'node-unit';
                    unit.innerHTML = `<div class="node"><span class="k"></span><span class="v"></span></div><div class="freq-badge"></div><div class="node-index"></div>`;
                    els[nkey] = unit;
                }
                const nodeEl = unit.firstChild;
                nodeEl.querySelector('.k').textContent = 'k=' + nd.k;
                nodeEl.querySelector('.v').textContent = nd.v;
                const badge = unit.querySelector('.freq-badge');
                badge.textContent = 'f ' + nd.freq;
                unit.lastChild.textContent = i === 0 ? 'MRU' : (i === nodesArr.length - 1 ? 'LRU' : '');
                const isActive = step.activeKey === nd.key;
                const isFreq = step.freqKey === nd.key;
                nodeEl.classList.toggle('active', isActive);
                nodeEl.classList.toggle('freqmax', isFreq && !isActive);
                nodeEl.classList.toggle('settled', !isActive && !isFreq);
                badge.classList.toggle('hot', isFreq);
                if (isFresh) freshNodes.push({ nodeEl, idx: i });
                ordered.push(unit);

                if (i < nodesArr.length - 1) {
                    const akey = 'r:' + nd.key;
                    let arr = els[akey];
                    if (!arr) { arr = document.createElement('div'); arr.className = 'arrow'; arr.innerHTML = arrowSVG(); els[akey] = arr; }
                    ordered.push(arr);
                }
            }

            // RIGHT end tag = LRU / tail
            let ltag = els['lru'];
            if (!ltag) { ltag = document.createElement('div'); ltag.className = 'endtag lru'; ltag.innerHTML = `LRU<span class="sub">tail</span>`; els['lru'] = ltag; }
            ordered.push(ltag);

            // reconcile -- exit any node-unit that's leaving (evicted), then remove + forget
            const used = new Set(ordered);
            Object.keys(firstRects).forEach(k => {
                if (!used.has(els[k])) {
                    const nodeEl = els[k].firstChild;
                    Motion.exit(firstRects[k], nodeEl.querySelector('.k').textContent, nodeEl.querySelector('.v').textContent);
                }
            });
            Array.from(container.children).forEach(ch => { if (!used.has(ch)) container.removeChild(ch); });
            Object.keys(els).forEach(k => { if (k !== 'empty' && k !== 'mru' && k !== 'lru' && !used.has(els[k])) delete els[k]; });
            if (els['empty'] && !used.has(els['empty']) && els['empty'].parentNode) els['empty'].parentNode.removeChild(els['empty']);
            ordered.forEach(el => container.appendChild(el));

            // FLIP play -- survivors spring to new positions; fresh nodes spring-enter
            Object.keys(firstRects).forEach(k => {
                const el = els[k]; if (!el || !el.isConnected) return;
                const last = el.getBoundingClientRect();
                Motion.flip(el, firstRects[k].left - last.left, firstRects[k].top - last.top);
            });
            freshNodes.forEach(({ nodeEl }) => Motion.enter(nodeEl, 0));

            // op feed + hash map
            renderOpFeed(step.opIndex);
            renderMap(step.map || [], step.touchedMapKey, step.type === 'freq' ? step.touchedMapKey : null);

            // narration
            const mainPanel = document.getElementById('main-panel');
            mainPanel.innerHTML = step.panel || '&mdash;';
            mainPanel.classList.toggle('done', !!step.complete);
            mainPanel.classList.toggle('miss', !!step.miss);

            // action word + floating tile
            const aw = document.getElementById('action-word');
            aw.textContent = step.action || '';
            aw.style.color = step.actionColor || 'var(--text-dim)';
            const ft = document.getElementById('float-tile');
            if (step.tile !== null && step.tile !== undefined) {
                document.getElementById('float-key').textContent = 'k=' + step.tile.k;
                document.getElementById('float-val').textContent = step.tile.v;
                const c = TILE_COLORS[step.tileColor] || TILE_COLORS.green;
                ft.style.background = c.bg; ft.style.color = c.fg; ft.style.borderColor = c.bd; ft.style.boxShadow = '0 0 26px ' + c.glow;
                Motion.pop(ft);
            } else {
                ft.getAnimations().forEach(a => a.cancel());
                ft.style.opacity = '0'; ft.style.transform = 'scale(0.5)';
            }

            // confetti only when all ops complete
            if (step.complete && step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } }
            else if (!step.complete) { confettiArmed = true; }

            // state pills
            document.getElementById('cap-val').textContent = capacity;
            document.getElementById('val-op').textContent = step.opIndex >= 0 && step.opIndex < ops.length ? opLabel(ops[step.opIndex]) : (DASH);
            document.getElementById('val-size').textContent = step.size + ' / ' + capacity;
            document.getElementById('val-result').textContent = step.result;
            highlightCode(step.codeLine);

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / (steps.length - 1)) * 100}%`;

            // cumulative log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px'; line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.textContent = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) { stepIndex = 0; renderStep(0); }
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase();
            if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); next(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); back(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });

        let rT;
        window.addEventListener('resize', () => { clearTimeout(rT); rT = setTimeout(() => { renderStep(stepIndex); }, 120); });
        window.onload = init;
    </script>
</body>
</html>
