<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kth Node From End - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* slow pointer    */
            --accent-blue:   #06b6d4;   /* head / links    */
            --accent-green:  #22c55e;   /* answer / done   */
            --accent-red:    #f43f5e;
            --accent-purple: #a855f7;   /* fast pointer    */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(6, 182, 212, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(6,182,212,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.18); background: rgba(6, 182, 212, 0.06); }
        .head-input { width: 230px; }
        .k-input { width: 70px; text-align: center; }

        button {
            height: 34px; border-radius: 9px; padding: 0 16px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 94%; margin: 28px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.45); background: rgba(244,63,94,0.07); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.12); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { margin: 14px; border-radius: 14px; background: radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .list-wrapper { display: flex; align-items: center; justify-content: flex-start; min-height: 200px; position: relative; overflow-x: auto; overflow-y: visible; padding: 56px 18px 56px; scrollbar-width: thin; }
        .list-wrapper::-webkit-scrollbar { height: 7px; }
        .list-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .list-rail { display: flex; align-items: center; gap: 8px; margin: 0 auto; }

        .node-unit { display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; flex: 0 0 auto; will-change: transform; }
        .node {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 14px; font-size: 20px; font-weight: 800; font-family: var(--mono);
            transition: background 0.45s ease, border-color 0.45s ease, color 0.45s ease, box-shadow 0.45s ease, outline-color 0.3s ease;
            border: 2px solid var(--border-main); background: rgba(255, 255, 255, 0.05); color: var(--text-main);
            position: relative; outline: 2px solid transparent; outline-offset: 3px;
        }
        /* the answer node goes green */
        .node.settled { background: linear-gradient(180deg, #2fe08f, #21c275); border-color: #34d399; color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.35); }
        /* orange ring marks where slow is */
        .node.slow-ring { outline-color: var(--accent-orange); box-shadow: 0 0 22px rgba(245,165,36,0.45); }
        /* purple ring marks where fast is */
        .node.fast-ring { outline-color: var(--accent-purple); box-shadow: 0 0 22px rgba(168,85,247,0.45); }
        .node.both-ring { outline-color: var(--accent-orange); box-shadow: 0 0 22px rgba(245,165,36,0.45), 0 0 22px rgba(168,85,247,0.4); }
        .node-index { font-size: 11px; color: var(--text-dim); font-family: var(--mono); height: 14px; font-weight: 600; }

        .arrow { flex: 0 0 auto; display: flex; align-items: center; height: 58px; filter: drop-shadow(0 0 6px rgba(6,182,212,0.45)); }
        .arrow svg { display: block; overflow: visible; }
        .arrow .ln { stroke: var(--accent-blue); stroke-width: 2.5; }
        .arrow .hd { fill: var(--accent-blue); }
        .arrow.walked .ln { stroke: var(--accent-green); }
        .arrow.walked .hd { fill: var(--accent-green); }
        .arrow.walked { filter: drop-shadow(0 0 7px rgba(34,197,94,0.5)); }
        .arrow.to-null { filter: drop-shadow(0 0 4px rgba(139,152,179,0.25)); }
        .arrow.to-null .ln { stroke: var(--text-dim); }
        .arrow.to-null .hd { fill: var(--text-dim); }

        .nullterm { flex: 0 0 auto; min-width: 52px; height: 58px; display: flex; align-items: center; justify-content: center; border-radius: 14px; border: 2px dashed var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 13px; font-weight: 700; background: rgba(255,255,255,0.02); transition: border-color 0.3s, color 0.3s; }
        .nullterm.reached { border-color: var(--accent-purple); color: #e9d5ff; box-shadow: 0 0 14px rgba(168,85,247,0.3); }

        /* pointer pill on stalk — position driven by JS spring */
        .ptr { position: absolute; left: 0; display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; z-index: 4; transition: opacity 0.3s ease; will-change: transform; }
        .ptr.above { top: 6px; }
        .ptr.below { bottom: 6px; flex-direction: column-reverse; }
        .ptr .tag { font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 8px; white-space: nowrap; }
        .ptr .stalk { width: 2px; height: 16px; }
        .ptr.fastptr .tag { background: var(--accent-purple); color: #fff; box-shadow: 0 0 14px rgba(168,85,247,0.6); }
        .ptr.fastptr .stalk { background: var(--accent-purple); }
        .ptr.slowptr .tag { background: var(--accent-orange); color: #3a2400; box-shadow: 0 0 14px rgba(245,165,36,0.6); }
        .ptr.slowptr .stalk { background: var(--accent-orange); }

        /* action zone */
        .action-stage { position: relative; min-height: 104px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 20px; letter-spacing: 0.5px; min-height: 24px; text-align: center; transition: color 0.3s ease; }
        .output-console { display: flex; align-items: center; gap: 10px; font-family: var(--mono); flex-wrap: wrap; justify-content: center; max-width: 100%; }
        .out-label { font-size: 12px; color: var(--text-dim); }
        .out-chips { display: flex; gap: 6px; flex-wrap: wrap; min-height: 36px; align-items: center; }
        .out-chips .empty { color: var(--text-dim); font-size: 13px; font-style: italic; }
        .out-chip { min-width: 36px; height: 36px; padding: 0 11px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px;
            background: rgba(34,197,94,0.16); border: 1px solid #34d399; color: #bbf7d0; box-shadow: 0 0 12px rgba(34,197,94,0.3); will-change: transform; }
        .out-chip.miss { background: rgba(244,63,94,0.16); border-color: var(--accent-red); color: #fecdd3; box-shadow: 0 0 12px rgba(244,63,94,0.3); }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }

        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 4px 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.f b { color: var(--accent-purple); }
        .pill.s b { color: var(--accent-orange); }
        .pill.k b { color: var(--accent-blue); }
        .legend-inline { margin-left: auto; display: flex; gap: 14px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; font-size: 11px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; display: inline-block; }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 190px) rotate(var(--rot)); } }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">head =</label>
        <input type="text" id="head-input" class="head-input" placeholder="1->2->3->4->5">
        <label class="ui-label">k =</label>
        <input type="text" id="k-input" class="k-input" placeholder="2" value="2">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,2,3,4,5],2)">Ex 1</button>
        <button onclick="loadExample([10,20,30],3)">Ex 2</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Kth Node From End <span class="sub">&middot; Two-Pointer Gap &middot; O(n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="list-wrapper" id="list-wrapper">
                    <div class="list-rail" id="list-container"></div>
                    <div class="ptr above fastptr" id="ptr-fast"><div class="tag">fast</div><div class="stalk"></div></div>
                    <div class="ptr below slowptr" id="ptr-slow"><div class="stalk"></div><div class="tag">slow</div></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="action-word" id="action-word"></div>
            <div class="output-console">
                <span class="out-label">kth from end:</span>
                <span class="out-chips" id="out-chips"><span class="empty">(searching&hellip;)</span></span>
            </div>
        </div>

        <div class="controls">
            <button onclick="reset()">&#8634; Reset</button>
            <button onclick="back()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="next()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>

                        <div class="state-strip">
                            <span class="pill f">fast <b id="val-fast">&mdash;</b></span>
                            <span class="pill s">slow <b id="val-slow">&mdash;</b></span>
                            <span class="pill k">k <b id="val-k">&mdash;</b></span>
                            <span class="legend-inline">
                                <span class="legend-item"><span class="dot" style="background:rgba(168,85,247,0.15); border:2px solid var(--accent-purple)"></span>fast</span>
                                <span class="legend-item"><span class="dot" style="background:rgba(245,165,36,0.15); border:2px solid var(--accent-orange)"></span>slow</span>
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,#2fe08f,#21c275); border:2px solid #34d399"></span>answer</span>
                            </span>
                        </div>

                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring + FLIP, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) {
                const a = (-stiffness * x - damping * v) / mass;
                v += a * dt; x += v * dt; out.push(1 - x);
                if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break;
            }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(340, 30, 1);
        const SPRING_POP = sampleSpring(540, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            flip(el, dx, dy) {
                if (REDUCED || (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5)) return;
                const kf = SPRING_POS.map(p => ({ transform: `translate(${(dx*(1-p)).toFixed(2)}px, ${(dy*(1-p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
            },
            enter(el, delay = 0) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p*1.6).toFixed(3),
                    transform: `translateY(${(-18*(1-p)).toFixed(2)}px) scale(${(0.45+0.55*p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', delay, fill: 'backwards' });
            },
            pop(el) {
                el.getAnimations().forEach(a => a.cancel());
                if (REDUCED) { el.style.opacity = '1'; el.style.transform = 'scale(1)'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p*2).toFixed(3),
                    transform: `scale(${(0.5+0.5*p).toFixed(3)}) translateY(${(10*(1-p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'forwards' });
            },
            glide(el, x) {
                const prev = el._x; el.style.opacity = '1';
                const commit = `translateX(${x}px) translateX(-50%)`;
                if (REDUCED || prev == null || Math.abs(x - prev) < 0.5) { el._x = x; el.style.transform = commit; return; }
                const dx = x - prev;
                const kf = SPRING_POS.map(p => ({ transform: `translateX(${(prev+dx*p).toFixed(2)}px) translateX(-50%)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el.style.transform = commit;
            },
        };

        // ───────── State ─────────
        let nodes = [];
        let k = 2;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 800, 420];
        let els = {};

        // Glyphs (encoding-proof)
        const ARR = String.fromCharCode(8594);   // →
        const CHK = String.fromCharCode(10003);   // ✓
        const CRX = String.fromCharCode(10007);   // ✗
        const NEQ = String.fromCharCode(8800);    // ≠

        const CODE = [
            [['kw','def '],['fn','kth_from_end'],['src','(head, k):']],
            [['src','    fast = slow = head']],
            [['kw','    for '],['src','i '],['kw','in '],['fn','range'],['src','(k):']],
            [['kw','        if '],['src','fast '],['kw','is None'],['src',': return None']],
            [['src','        fast = fast.next']],
            [['kw','    while '],['src','fast '],['kw','is not None'],['src',':']],
            [['src','        fast = fast.next']],
            [['src','        slow = slow.next']],
            [['kw','    return '],['src','slow']],
        ];

        function buildCodePanel() {
            const panel = document.getElementById('code-panel');
            panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div');
                line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(lineArr) {
            document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', lineArr && lineArr.includes(+el.dataset.line)));
        }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap');
            const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        function init() { buildCodePanel(); loadExample([1,2,3,4,5], 2); }

        function parseHead(str) {
            if (!str || str.trim() === "") return [];
            return str.split('->').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        }
        function loadExample(arr, kk) {
            nodes = [...arr];
            k = kk;
            document.getElementById('head-input').value = nodes.length ? nodes.join('->') : 'null';
            document.getElementById('k-input').value = k;
            resetDom();
            generateSteps();
            reset();
        }
        function loadCustom() {
            nodes = parseHead(document.getElementById('head-input').value.trim());
            k = parseInt(document.getElementById('k-input').value) || 1;
            resetDom();
            generateSteps();
            reset();
        }

        // ───────── Algorithm: kth from end via two pointers ─────────
        // fast advances k steps, then fast & slow advance together until fast == null.
        // slow then points at the kth node from the end.
        function generateSteps() {
            steps = [];
            const base = nodes.map((v, i) => ({ key: 'o' + i, val: v }));
            const n = base.length;
            const listStr = n ? nodes.join(' &#8594; ') : 'null';
            const valOf = (idx) => (idx != null && idx >= 0 && idx < n) ? base[idx].val : 'null';

            // idx convention: 0..n-1 are nodes, n means "null" (past the tail), null means unset
            steps.push({
                codeLine: [1], nodes: base.slice(),
                fastIdx: n ? 0 : n, slowIdx: n ? 0 : n,
                action: 'fast = slow = head', actionColor: 'var(--accent-blue)',
                panel: `Two pointers <code>fast</code> and <code>slow</code> both start at <code>head</code>. List = <code>${listStr}</code>, looking for the <b>${k}</b>th node from the end.`,
                log: `fast = slow = head (${valOf(n ? 0 : null)})`, logColor: 'var(--text-dim)'
            });

            // Empty list short-circuit
            if (n === 0) {
                steps.push({
                    miss: true, complete: true, bold: true, codeLine: [3],
                    nodes: [], fastIdx: n, slowIdx: n,
                    action: CRX + ' empty list', actionColor: 'var(--accent-red)',
                    panel: `<span style="color:var(--accent-red)">The list is empty</span> &#8594; there is no ${k}th node. Return <code>null</code>.`,
                    log: `head is null ${ARR} return null`, logColor: 'var(--accent-red)'
                });
                return;
            }

            // Phase 1: advance fast k steps
            let fast = 0; // index of fast (0..n; n == null)
            for (let i = 0; i < k; i++) {
                // check fast is None before advancing
                if (fast >= n) {
                    steps.push({
                        miss: true, complete: true, bold: true, codeLine: [2, 3],
                        nodes: base.slice(), fastIdx: n, slowIdx: 0,
                        action: CRX + ' k out of range', actionColor: 'var(--accent-red)',
                        panel: `On gap step ${i + 1} of ${k}, <code>fast</code> is already <b>null</b> &#8594; <b>k = ${k}</b> exceeds the list length (${n}). Return <code>null</code>.`,
                        log: `fast is null after ${i} hops, k=${k} > len=${n} ${ARR} return null`, logColor: 'var(--accent-red)'
                    });
                    return;
                }
                fast = fast + 1;
                steps.push({
                    codeLine: [2, 4], nodes: base.slice(),
                    fastIdx: fast, slowIdx: 0, gapStep: i + 1,
                    action: 'fast = fast.next  (' + (i + 1) + '/' + k + ')', actionColor: 'var(--accent-purple)',
                    panel: `Open the gap: advance <code>fast</code> by ${k}. Hop ${i + 1} of ${k} &#8594; fast now at <code>${valOf(fast === n ? null : fast)}</code>.`,
                    log: `gap hop ${i + 1}/${k}: fast ${ARR} ${fast >= n ? 'null' : valOf(fast)}`, logColor: 'var(--accent-purple)'
                });
            }

            steps.push({
                codeLine: [5], nodes: base.slice(),
                fastIdx: fast, slowIdx: 0, gapReady: true,
                action: 'gap of ' + k + ' opened', actionColor: 'var(--accent-blue)',
                panel: `The gap of <b>${k}</b> is set: <code>fast</code> is ${k} ahead of <code>slow</code>. Now move both together until <code>fast</code> falls off the end.`,
                log: `gap ready: fast=${fast >= n ? 'null' : valOf(fast)}, slow=${valOf(0)}`, logColor: 'var(--accent-blue)'
            });

            // Phase 2: move both until fast == null
            let slow = 0;
            while (fast < n) {
                fast = fast + 1;
                slow = slow + 1;
                steps.push({
                    codeLine: [5, 6, 7], nodes: base.slice(),
                    fastIdx: fast, slowIdx: slow,
                    action: 'advance both', actionColor: 'var(--accent-orange)',
                    panel: `<code>fast</code> is not null &#8594; step both. fast &#8594; <code>${fast >= n ? 'null' : valOf(fast)}</code>, slow &#8594; <code>${valOf(slow)}</code>.`,
                    log: `both step: fast=${fast >= n ? 'null' : valOf(fast)}, slow=${valOf(slow)}`, logColor: 'var(--accent-orange)'
                });
            }

            // Phase 3: fast is null, slow is the answer
            steps.push({
                complete: true, bold: true, confetti: true, codeLine: [5, 8],
                nodes: base.slice(), fastIdx: n, slowIdx: slow, answerIdx: slow,
                action: CHK + ' ' + k + 'th from end = ' + valOf(slow), actionColor: 'var(--accent-green)',
                panel: `<span style="color:var(--accent-green)">fast is null</span> &#8594; <code>slow</code> stopped at the answer. The <b>${k}</b>th node from the end is <b>${valOf(slow)}</b>.`,
                log: `fast is null ${ARR} return slow = ${valOf(slow)}`, logColor: 'var(--accent-green)'
            });
        }

        function resetDom() { els = {}; document.getElementById('list-container').innerHTML = ''; confettiArmed = true; }

        function arrowSVG() {
            return `<svg viewBox="0 0 40 24" width="40" height="24">
                <line class="ln" x1="2" y1="12" x2="28" y2="12" stroke-linecap="round"/>
                <polygon class="hd" points="27,6 39,12 27,18"/></svg>`;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti');
            if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 42; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 230) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p);
                setTimeout(() => p.remove(), 1900);
            }
        }

        function renderOutput(step) {
            const host = document.getElementById('out-chips');
            if (!step.complete) {
                host.innerHTML = '<span class="empty">(searching&hellip;)</span>';
                return;
            }
            // build a single answer chip (or miss chip)
            host.innerHTML = '';
            const chip = document.createElement('span');
            if (step.miss) {
                chip.className = 'out-chip miss';
                chip.textContent = 'null';
            } else {
                chip.className = 'out-chip';
                chip.textContent = step.nodes[step.answerIdx] ? step.nodes[step.answerIdx].val : 'null';
            }
            host.appendChild(chip);
            Motion.pop(chip);
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;
            const container = document.getElementById('list-container');
            const nodesArr = step.nodes;
            const n = nodesArr.length;

            const firstRects = {};
            Object.keys(els).forEach(k2 => { if (k2.startsWith('k:') && els[k2].isConnected) firstRects[k2] = els[k2].getBoundingClientRect(); });

            const ordered = [];
            const freshNodes = [];
            const fastIdx = step.fastIdx;
            const slowIdx = step.slowIdx;
            const walkedTo = Math.max(slowIdx == null ? -1 : slowIdx, fastIdx == null ? -1 : Math.min(fastIdx, n));

            for (let i = 0; i < n; i++) {
                const nd = nodesArr[i];
                const nkey = 'k:' + nd.key;
                let unit = els[nkey], isFresh = false;
                if (!unit) {
                    isFresh = true;
                    unit = document.createElement('div');
                    unit.className = 'node-unit';
                    unit.innerHTML = `<div class="node"></div><div class="node-index"></div>`;
                    els[nkey] = unit;
                }
                const nodeEl = unit.firstChild;
                nodeEl.textContent = nd.val;
                unit.lastChild.textContent = i;

                const isSlow = (slowIdx === i);
                const isFast = (fastIdx === i);
                const isAnswer = (step.answerIdx === i);
                nodeEl.classList.toggle('settled', isAnswer);
                nodeEl.classList.toggle('both-ring', !isAnswer && isSlow && isFast);
                nodeEl.classList.toggle('slow-ring', !isAnswer && isSlow && !isFast);
                nodeEl.classList.toggle('fast-ring', !isAnswer && isFast && !isSlow);
                if (isFresh) freshNodes.push({ nodeEl, idx: i });
                ordered.push(unit);

                if (i < n - 1) {
                    const akey = 'r:' + nd.key;
                    let arr = els[akey];
                    if (!arr) { arr = document.createElement('div'); arr.className = 'arrow'; arr.innerHTML = arrowSVG(); els[akey] = arr; }
                    arr.classList.remove('to-null');
                    arr.classList.toggle('walked', i < walkedTo);
                    ordered.push(arr);
                }
            }
            if (n > 0) {
                const lastKey = nodesArr[n - 1].key;
                const tkey = 'r:' + lastKey;
                let tarr = els[tkey];
                if (!tarr) { tarr = document.createElement('div'); tarr.className = 'arrow'; tarr.innerHTML = arrowSVG(); els[tkey] = tarr; }
                tarr.classList.add('to-null');
                tarr.classList.toggle('walked', fastIdx === n);
                ordered.push(tarr);
            }
            let nul = els['nullterm'];
            if (!nul) { nul = document.createElement('div'); nul.className = 'nullterm'; nul.textContent = 'null'; els['nullterm'] = nul; }
            // null reached when fast falls off the tail
            nul.classList.toggle('reached', fastIdx === n && n > 0);
            ordered.push(nul);

            const used = new Set(ordered);
            Array.from(container.children).forEach(ch => { if (!used.has(ch)) container.removeChild(ch); });
            Object.keys(els).forEach(k2 => { if (!used.has(els[k2])) delete els[k2]; });
            ordered.forEach(el => container.appendChild(el));

            Object.keys(firstRects).forEach(k2 => {
                const el = els[k2]; if (!el || !el.isConnected) return;
                const last = el.getBoundingClientRect();
                Motion.flip(el, firstRects[k2].left - last.left, firstRects[k2].top - last.top);
            });
            const stagger = freshNodes.length > 1;
            freshNodes.forEach(({ nodeEl, idx: i }) => Motion.enter(nodeEl, stagger ? i * 55 : 0));

            const mainPanel = document.getElementById('main-panel');
            mainPanel.innerHTML = step.panel || '&mdash;';
            mainPanel.classList.toggle('done', !!step.complete && !step.miss);
            mainPanel.classList.toggle('miss', !!step.miss);

            const aw = document.getElementById('action-word');
            aw.textContent = step.action || '';
            aw.style.color = step.actionColor || 'var(--text-dim)';
            renderOutput(step);

            if (step.complete && step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } }
            else if (!step.complete) { confettiArmed = true; }

            const fastVal = (fastIdx != null && fastIdx >= 0 && fastIdx < n) ? nodesArr[fastIdx].val : (fastIdx === n ? 'null' : '—');
            const slowVal = (slowIdx != null && slowIdx >= 0 && slowIdx < n) ? nodesArr[slowIdx].val : (slowIdx === n ? 'null' : '—');
            document.getElementById('val-fast').textContent = fastVal;
            document.getElementById('val-slow').textContent = slowVal;
            document.getElementById('val-k').textContent = k;
            highlightCode(step.codeLine);

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / (steps.length - 1)) * 100}%`;

            positionPointer('ptr-fast', fastIdx, n);
            positionPointer('ptr-slow', slowIdx, n);

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let m = 0; m <= idx; m++) {
                if (steps[m].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px'; line.style.whiteSpace = 'pre-wrap';
                    if (steps[m].logColor) line.style.color = steps[m].logColor;
                    if (steps[m].bold) line.style.fontWeight = 'bold';
                    line.textContent = steps[m].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        // idx in [0,n-1] points to a node; idx === n means "null" (park on nullterm); else hide
        function positionPointer(id, idx, n) {
            const ptr = document.getElementById(id);
            if (idx == null) { ptr.style.opacity = '0'; ptr._x = null; return; }
            let target = null;
            if (idx >= 0 && idx < n) {
                const nd = steps[stepIndex].nodes[idx];
                target = els['k:' + nd.key];
            } else if (idx === n) {
                target = els['nullterm'];
            }
            if (!target) { ptr.style.opacity = '0'; ptr._x = null; return; }
            Motion.glide(ptr, target.offsetLeft + target.offsetWidth / 2);
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) { stepIndex = 0; renderStep(0); }
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase();
            if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); next(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); back(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });

        let rT;
        window.addEventListener('resize', () => { clearTimeout(rT); rT = setTimeout(() => {
            document.getElementById('ptr-fast')._x = null;
            document.getElementById('ptr-slow')._x = null;
            renderStep(stepIndex);
        }, 120); });
        window.onload = init;
    </script>
</body>
</html>
