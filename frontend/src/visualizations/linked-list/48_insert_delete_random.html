<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insert Delete GetRandom O(1) - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* current op target */
            --accent-blue:   #06b6d4;   /* array rail / links */
            --accent-green:  #22c55e;   /* inserted / kept   */
            --accent-red:    #f43f5e;   /* removed node      */
            --accent-purple: #a855f7;   /* hash map          */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(6, 182, 212, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(6,182,212,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"], input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.18); background: rgba(6, 182, 212, 0.06); }
        .ops-input { width: 300px; }

        button {
            height: 34px; border-radius: 9px; padding: 0 16px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 94%; margin: 28px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.12); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { margin: 14px; border-radius: 14px; background: radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); padding: 6px 0; }

        .struct-label { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); padding: 12px 22px 2px; display: flex; align-items: center; gap: 8px; }
        .struct-label .pip { width: 7px; height: 7px; border-radius: 50%; }
        .struct-label .pip.arr { background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .struct-label .pip.map { background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }

        /* ARRAY rail */
        .rail-wrapper { display: flex; align-items: center; justify-content: flex-start; min-height: 116px; position: relative; overflow-x: auto; overflow-y: visible; padding: 16px 18px 18px; scrollbar-width: thin; }
        .rail-wrapper::-webkit-scrollbar { height: 7px; }
        .rail-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .list-rail { display: flex; align-items: flex-start; gap: 10px; margin: 0 auto; }

        .node-unit { display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; flex: 0 0 auto; will-change: transform; }
        .node {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 14px; font-size: 20px; font-weight: 800; font-family: var(--mono);
            transition: background 0.4s ease, border-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease, outline-color 0.3s ease;
            border: 2px solid var(--border-main); background: rgba(255, 255, 255, 0.05); color: var(--text-main);
            position: relative; outline: 2px solid transparent; outline-offset: 3px;
        }
        .node.settled { background: linear-gradient(180deg, #2fe08f, #21c275); border-color: #34d399; color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.35); }
        .node.target  { background: linear-gradient(180deg, #fbbf5c, #f5a524); border-color: var(--accent-orange); color: #3a2400; box-shadow: 0 0 24px rgba(245,165,36,0.6); }
        .node.to-remove { background: linear-gradient(180deg, #fb7185, #f43f5e); border-color: var(--accent-red); color: #3a0010; box-shadow: 0 0 24px rgba(244,63,94,0.6); }
        .node.pulse { background: linear-gradient(180deg, #67e8f9, #06b6d4); border-color: var(--accent-blue); color: #042027; --glow: rgba(6,182,212,0.65); animation: breathe 1.2s ease-in-out infinite; }
        .node.swap-ring { outline-color: var(--accent-orange); }
        .node-index { font-size: 11px; color: var(--text-dim); font-family: var(--mono); height: 14px; font-weight: 600; }

        .rail-empty { font-family: var(--mono); font-size: 14px; color: var(--text-dim); padding: 18px 6px; }

        /* HASH MAP panel */
        .map-wrapper { display: flex; align-items: center; justify-content: flex-start; min-height: 92px; position: relative; overflow-x: auto; overflow-y: visible; padding: 8px 18px 18px; scrollbar-width: thin; }
        .map-wrapper::-webkit-scrollbar { height: 7px; }
        .map-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .map-rail { display: flex; align-items: center; gap: 10px; margin: 0 auto; }
        .map-entry { display: flex; align-items: center; gap: 7px; flex: 0 0 auto; padding: 8px 12px; border-radius: 12px; border: 2px solid rgba(168,85,247,0.35); background: rgba(168,85,247,0.08); font-family: var(--mono); font-weight: 800; font-size: 15px; will-change: transform; transition: border-color 0.3s ease, box-shadow 0.3s ease; }
        .map-entry .mk { color: #e9d5ff; }
        .map-entry .marrow { color: var(--accent-purple); font-weight: 800; }
        .map-entry .mv { color: #c4cee0; }
        .map-entry.hot { border-color: var(--accent-orange); box-shadow: 0 0 18px rgba(245,165,36,0.5); }
        .map-entry.changed { border-color: var(--accent-green); box-shadow: 0 0 18px rgba(34,197,94,0.5); }
        .map-empty { font-family: var(--mono); font-size: 14px; color: var(--text-dim); padding: 8px 6px; }

        .action-stage { position: relative; min-height: 104px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
        .float-tile { width: 64px; height: 64px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 26px; font-weight: 800; opacity: 0; transform: scale(0.5); border: 2px solid transparent; will-change: transform; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 20px; letter-spacing: 0.5px; min-height: 24px; text-align: center; transition: color 0.3s ease; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }

        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 4px 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.o b { color: var(--accent-orange); }
        .pill.l b { color: var(--accent-blue); }
        .pill.r b { color: var(--accent-green); }
        .legend-inline { margin-left: auto; display: flex; gap: 14px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; font-size: 11px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; display: inline-block; }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes breathe { 0%,100%{ box-shadow: 0 0 16px var(--glow), inset 0 0 10px rgba(255,255,255,0.06); } 50%{ box-shadow: 0 0 30px var(--glow), inset 0 0 14px rgba(255,255,255,0.12); } }
        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 190px) rotate(var(--rot)); } }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">ops =</label>
        <input type="text" id="ops-input" class="ops-input" placeholder="insert 1, insert 2, remove 1, getRandom">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(1)">Ex 1</button>
        <button onclick="loadExample(2)">Ex 2</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Insert Delete GetRandom O(1) <span class="sub">&middot; Dynamic Array + Hash Map &middot; O(1)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="struct-label"><span class="pip arr"></span> Array <span style="text-transform:none; font-weight:600; letter-spacing:0; color:var(--text-dim)">(value at each index)</span></div>
                <div class="rail-wrapper" id="rail-wrapper">
                    <div class="list-rail" id="array-container"></div>
                </div>
                <div class="struct-label"><span class="pip map"></span> Hash Map <span style="text-transform:none; font-weight:600; letter-spacing:0; color:var(--text-dim)">(value &#8594; index)</span></div>
                <div class="map-wrapper" id="map-wrapper">
                    <div class="map-rail" id="map-container"></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="float-tile" id="float-tile"><span id="float-val"></span></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="reset()">&#8634; Reset</button>
            <button onclick="back()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="next()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>

                        <div class="state-strip">
                            <span class="pill o">op <b id="val-op">&mdash;</b></span>
                            <span class="pill l">array len <b id="val-len">&mdash;</b></span>
                            <span class="pill r">return <b id="val-ret">&mdash;</b></span>
                            <span class="legend-inline">
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,#2fe08f,#21c275); border:2px solid #34d399"></span>array member</span>
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,#fbbf5c,#f5a524); border:2px solid var(--accent-orange)"></span>target</span>
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,#fb7185,#f43f5e); border:2px solid var(--accent-red)"></span>remove</span>
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,#67e8f9,#06b6d4); border:2px solid var(--accent-blue)"></span>random</span>
                            </span>
                        </div>

                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // Motion engine (spring + FLIP, zero deps)
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) {
                const a = (-stiffness * x - damping * v) / mass;
                v += a * dt; x += v * dt; out.push(1 - x);
                if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break;
            }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(340, 30, 1);
        const SPRING_POP = sampleSpring(540, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            flip(el, dx, dy) {
                if (REDUCED || (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5)) return;
                const kf = SPRING_POS.map(p => ({ transform: `translate(${(dx*(1-p)).toFixed(2)}px, ${(dy*(1-p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
            },
            enter(el, delay = 0) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p*1.6).toFixed(3),
                    transform: `translateY(${(-18*(1-p)).toFixed(2)}px) scale(${(0.45+0.55*p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', delay, fill: 'backwards' });
            },
            pop(el) {
                el.getAnimations().forEach(a => a.cancel());
                if (REDUCED) { el.style.opacity = '1'; el.style.transform = 'scale(1)'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p*2).toFixed(3),
                    transform: `scale(${(0.5+0.5*p).toFixed(3)}) translateY(${(10*(1-p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'forwards' });
            },
            // exit: a removed node lifts away (fades + scales + drifts up). Fixed-position clone, so survivors can FLIP into the gap.
            exit(rect, text) {
                if (REDUCED) return;
                const c = document.createElement('div');
                c.textContent = text;
                c.style.cssText = `position:fixed; left:${rect.left}px; top:${rect.top}px; width:${rect.width}px; height:${rect.height}px;
                    display:flex; align-items:center; justify-content:center; border-radius:14px; font-family:var(--mono); font-size:20px; font-weight:800;
                    background:linear-gradient(180deg,#fb7185,#f43f5e); color:#3a0010; border:2px solid #f43f5e; box-shadow:0 0 24px rgba(244,63,94,0.6);
                    z-index:60; pointer-events:none;`;
                document.body.appendChild(c);
                const a = c.animate(
                    [{ opacity: 1, transform: 'translateY(0) scale(1) rotate(0)' },
                     { opacity: 0, transform: 'translateY(-52px) scale(0.55) rotate(10deg)' }],
                    { duration: 520, easing: 'cubic-bezier(.4,0,.7,1)' });
                a.onfinish = () => c.remove(); a.oncancel = () => c.remove();
            },
        };

        // State
        let ops = [];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1800, 900, 450];
        let els = {};        // 'k:'+key -> array node-unit element
        let mapEls = {};     // 'm:'+value -> map entry element

        // Original example op sequences (preserved from the source file)
        const example1 = [
            { op: 'insert', val: 1 },
            { op: 'insert', val: 2 },
            { op: 'remove', val: 1 },
            { op: 'getRandom' }
        ];
        const example2 = [
            { op: 'insert', val: 1 },
            { op: 'insert', val: 1 },
            { op: 'remove', val: 2 },
            { op: 'getRandom' }
        ];

        const CODE = [
            [['kw','def '],['fn','insert'],['src','(val):']],
            [['kw','    if '],['src','val '],['kw','in '],['src','idx: '],['kw','return '],['src','False']],
            [['src','    idx[val] = len(arr); arr.append(val)']],
            [['kw','    return '],['src','True']],
            [['kw','def '],['fn','remove'],['src','(val):']],
            [['kw','    if '],['src','val '],['kw','not in '],['src','idx: '],['kw','return '],['src','False']],
            [['src','    i, last = idx[val], arr[-1]']],
            [['src','    arr[i] = last; idx[last] = i']],
            [['src','    arr.pop(); del idx[val]']],
            [['kw','    return '],['src','True']],
            [['kw','def '],['fn','getRandom'],['src','():']],
            [['kw','    return '],['src','arr[randint(0, len(arr)-1)]']],
        ];
        const TILE_COLORS = {
            green:  { bg: 'rgba(34,197,94,0.18)',  fg: '#bbf7d0', bd: '#22c55e', glow: 'rgba(34,197,94,0.55)' },
            red:    { bg: 'rgba(244,63,94,0.18)',  fg: '#fecdd3', bd: '#f43f5e', glow: 'rgba(244,63,94,0.55)' },
            orange: { bg: 'rgba(245,165,36,0.18)', fg: '#fde68a', bd: '#f5a524', glow: 'rgba(245,165,36,0.55)' },
            blue:   { bg: 'rgba(6,182,212,0.18)',  fg: '#a5f3fc', bd: '#06b6d4', glow: 'rgba(6,182,212,0.55)' },
        };
        const ARR = String.fromCharCode(8594);   // ->
        const CHK = String.fromCharCode(10003);   // check
        const NE  = String.fromCharCode(8800);    // not-equal

        // deterministic PRNG so getRandom replays identically each run (LCG)
        let rngState = 0x2545f4914f6cdd1d >>> 0;
        function seedRng(s) { rngState = (s >>> 0) || 1; }
        function rnd() { rngState = (1664525 * rngState + 1013904223) >>> 0; return rngState / 4294967296; }

        function buildCodePanel() {
            const panel = document.getElementById('code-panel');
            panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div');
                line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(lineArr) {
            document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', lineArr && lineArr.includes(+el.dataset.line)));
        }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap');
            const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        function init() { buildCodePanel(); loadExample(1); }

        function parseOps(str) {
            if (!str || !str.trim()) return [];
            const out = [];
            str.split(',').forEach(tok => {
                const parts = tok.trim().split(/\s+/);
                if (!parts.length || !parts[0]) return;
                const name = parts[0].toLowerCase();
                if (name === 'insert' || name === 'remove') {
                    const v = parseInt(parts[1]);
                    if (!isNaN(v)) out.push({ op: name, val: v });
                } else if (name === 'getrandom') {
                    out.push({ op: 'getRandom' });
                }
            });
            return out;
        }

        function opsToStr(arr) {
            return arr.map(o => o.op === 'getRandom' ? 'getRandom' : `${o.op} ${o.val}`).join(', ');
        }

        function loadExample(exId) {
            ops = (exId === 2 ? example2 : example1).map(o => ({ ...o }));
            document.getElementById('ops-input').value = opsToStr(ops);
            resetDom();
            generateSteps();
            reset();
        }

        function loadCustom() {
            const parsed = parseOps(document.getElementById('ops-input').value);
            if (!parsed.length) { alert('Enter ops like: insert 1, insert 2, remove 1, getRandom'); return; }
            ops = parsed;
            document.getElementById('ops-input').value = opsToStr(ops);
            resetDom();
            generateSteps();
            reset();
        }

        // ----- step generation: correct RandomizedSet (array + hash map) -----
        function generateSteps() {
            steps = [];
            seedRng(0x9e3779b9);   // reset PRNG so getRandom is reproducible
            // array of {key, val}; map value -> index
            let arr = [];
            const map = {};        // val -> index
            let keyCounter = 0;

            const snapMap = () => { const m = {}; arr.forEach((n, i) => { m[n.val] = i; }); return m; };
            const snapArr = () => arr.map(n => ({ key: n.key, val: n.val }));

            steps.push({
                type: 'init', codeLine: [0, 4, 10], arr: [], map: {},
                action: 'RandomizedSet()', actionColor: '#7dd3fc', tile: null,
                panel: `Empty <b>RandomizedSet</b>: dynamic <code>array</code> + <code>value &#8594; index</code> hash map. Every op is amortized <b>O(1)</b>.`,
                log: 'arr = [], idx = {}', logColor: 'var(--text-dim)'
            });

            for (const op of ops) {
                if (op.op === 'insert') {
                    const present = (op.val in map);
                    if (present) {
                        steps.push({
                            type: 'insert-dup', codeLine: [0, 1], arr: snapArr(), map: snapMap(),
                            hotMap: op.val, target: op.val,
                            action: `insert(${op.val}) ${ARR} False`, actionColor: 'var(--accent-red)', tile: op.val, tileColor: 'red',
                            ret: 'False', opLabel: `insert(${op.val})`,
                            panel: `<code>insert(${op.val})</code>: <b>${op.val}</b> already in the map ${ARR} <span style="color:var(--accent-red)">return False</span> (no change).`,
                            log: `insert(${op.val}) = False  (already present)`, logColor: 'var(--accent-red)'
                        });
                    } else {
                        const newIdx = arr.length;
                        const nk = 'o' + (keyCounter++);
                        arr.push({ key: nk, val: op.val });
                        map[op.val] = newIdx;
                        steps.push({
                            type: 'insert', codeLine: [2, 3], arr: snapArr(), map: snapMap(),
                            enterKey: nk, hotMap: op.val, changedMap: op.val, target: op.val,
                            action: `insert(${op.val}) ${ARR} True`, actionColor: 'var(--accent-green)', tile: op.val, tileColor: 'green',
                            ret: 'True', opLabel: `insert(${op.val})`,
                            panel: `<code>insert(${op.val})</code>: append <b>${op.val}</b> at index <b>${newIdx}</b>, set <code>idx[${op.val}] = ${newIdx}</code> ${ARR} <span style="color:var(--accent-green)">True</span>.`,
                            log: `insert(${op.val}) = True  (arr[${newIdx}] = ${op.val}, idx[${op.val}] = ${newIdx})`, logColor: 'var(--accent-green)'
                        });
                    }
                } else if (op.op === 'remove') {
                    const present = (op.val in map);
                    if (!present) {
                        steps.push({
                            type: 'remove-miss', codeLine: [4, 5], arr: snapArr(), map: snapMap(),
                            target: op.val,
                            action: `remove(${op.val}) ${ARR} False`, actionColor: 'var(--accent-red)', tile: op.val, tileColor: 'red',
                            ret: 'False', opLabel: `remove(${op.val})`,
                            panel: `<code>remove(${op.val})</code>: <b>${op.val}</b> not in the map ${ARR} <span style="color:var(--accent-red)">return False</span>.`,
                            log: `remove(${op.val}) = False  (not present)`, logColor: 'var(--accent-red)'
                        });
                    } else {
                        const i = map[op.val];
                        const lastIdx = arr.length - 1;
                        const lastVal = arr[lastIdx].val;
                        const targetKey = arr[i].key;
                        const lastKey = arr[lastIdx].key;

                        if (i === lastIdx) {
                            // target IS the last element: just pop (no swap)
                            arr.pop();
                            delete map[op.val];
                            steps.push({
                                type: 'remove', codeLine: [6, 7, 8, 9], arr: snapArr(), map: snapMap(),
                                exitKey: targetKey, exitText: op.val, target: op.val,
                                action: `remove(${op.val}) ${ARR} True`, actionColor: 'var(--accent-green)', tile: op.val, tileColor: 'green',
                                ret: 'True', opLabel: `remove(${op.val})`,
                                panel: `<code>remove(${op.val})</code>: <b>${op.val}</b> is already the last element (index ${lastIdx}) ${ARR} just <code>pop()</code> and delete <code>idx[${op.val}]</code> ${ARR} <span style="color:var(--accent-green)">True</span>.`,
                                log: `remove(${op.val}) = True  (was last, popped)`, logColor: 'var(--accent-green)'
                            });
                        } else {
                            // STEP A: show the swap of target (idx i) with last (idx lastIdx) via FLIP
                            // perform swap in the data model
                            const tmp = arr[i];
                            arr[i] = arr[lastIdx];
                            arr[lastIdx] = tmp;
                            map[lastVal] = i;
                            // map[op.val] now logically points at lastIdx (the slot to be popped)
                            steps.push({
                                type: 'remove-swap', codeLine: [6, 7], arr: snapArr(), map: snapMap(),
                                swapKeys: [targetKey, lastKey], hotMap: lastVal, changedMap: lastVal, target: op.val,
                                action: `swap idx ${i} ${String.fromCharCode(8596)} ${lastIdx}`, actionColor: 'var(--accent-orange)', tile: null,
                                opLabel: `remove(${op.val})`,
                                panel: `<code>remove(${op.val})</code>: swap target at index <b>${i}</b> with the last element <b>${lastVal}</b> (index ${lastIdx}); update <code>idx[${lastVal}] = ${i}</code>.`,
                                log: `swap arr[${i}] <-> arr[${lastIdx}];  idx[${lastVal}] = ${i}`, logColor: 'var(--accent-orange)'
                            });
                            // STEP B: pop the last (now the target value) + delete from map
                            arr.pop();
                            delete map[op.val];
                            steps.push({
                                type: 'remove', codeLine: [8, 9], arr: snapArr(), map: snapMap(),
                                exitKey: targetKey, exitText: op.val, target: op.val,
                                action: `remove(${op.val}) ${ARR} True`, actionColor: 'var(--accent-green)', tile: op.val, tileColor: 'green',
                                ret: 'True', opLabel: `remove(${op.val})`,
                                panel: `<code>arr.pop()</code> removes <b>${op.val}</b> from the end and <code>del idx[${op.val}]</code> ${ARR} <span style="color:var(--accent-green)">True</span>.`,
                                log: `pop() removes ${op.val}; del idx[${op.val}]  ${ARR} remove = True`, logColor: 'var(--accent-green)'
                            });
                        }
                    }
                } else if (op.op === 'getRandom') {
                    if (arr.length === 0) {
                        steps.push({
                            type: 'random-empty', codeLine: [10, 11], arr: snapArr(), map: snapMap(),
                            action: `getRandom() ${ARR} -`, actionColor: 'var(--accent-red)', tile: null,
                            ret: '-', opLabel: 'getRandom()',
                            panel: `<code>getRandom()</code>: the array is empty ${ARR} nothing to return.`,
                            log: `getRandom() = -  (empty)`, logColor: 'var(--accent-red)'
                        });
                    } else {
                        const ri = Math.floor(rnd() * arr.length);
                        const rv = arr[ri].val;
                        steps.push({
                            type: 'random', codeLine: [10, 11], arr: snapArr(), map: snapMap(),
                            pulseKey: arr[ri].key, randIdx: ri, target: rv,
                            action: `getRandom() ${ARR} ${rv}`, actionColor: 'var(--accent-blue)', tile: rv, tileColor: 'blue',
                            ret: rv, opLabel: 'getRandom()',
                            panel: `<code>getRandom()</code>: pick uniform index <b>${ri}</b> of ${arr.length} ${ARR} return <b>${rv}</b>. Every element equally likely.`,
                            log: `getRandom() = ${rv}  (index ${ri})`, logColor: 'var(--accent-blue)'
                        });
                    }
                }
            }

            // FINAL
            const finalArr = arr.map(n => n.val);
            steps.push({
                type: 'final', complete: true, bold: true, confetti: true, codeLine: [], arr: snapArr(), map: snapMap(),
                action: CHK + ' done', actionColor: 'var(--accent-green)', tile: null,
                ret: '-', opLabel: 'done',
                panel: `All operations done in amortized <b>O(1)</b>. Final array: <code>[${finalArr.join(', ')}]</code>.`,
                log: `final arr = [${finalArr.join(', ')}]`, logColor: 'var(--accent-green)'
            });
        }

        function resetDom() {
            els = {}; mapEls = {};
            document.getElementById('array-container').innerHTML = '';
            document.getElementById('map-container').innerHTML = '';
            confettiArmed = true;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti');
            if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 42; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 230) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p);
                setTimeout(() => p.remove(), 1900);
            }
        }

        // render the ARRAY rail (keyed node-units) with FLIP for swaps + exit for pops + enter for inserts
        function renderArray(step) {
            const container = document.getElementById('array-container');
            const arr = step.arr || [];

            // FLIP -- record FIRST rects before any DOM mutation
            const firstRects = {};
            Object.keys(els).forEach(k => { if (els[k].isConnected) firstRects[k] = els[k].getBoundingClientRect(); });

            if (arr.length === 0) {
                // exit any leaving nodes first
                Object.keys(firstRects).forEach(k => {
                    const key = k.slice(2);
                    Motion.exit(firstRects[k], step.exitText !== undefined && step.exitKey === key ? step.exitText : els[k].firstChild.textContent);
                });
                container.innerHTML = '';
                els = {};
                const empty = document.createElement('div'); empty.className = 'rail-empty'; empty.textContent = 'empty array';
                container.appendChild(empty);
                return;
            }

            const ordered = [];
            const freshNodes = [];
            for (let i = 0; i < arr.length; i++) {
                const nd = arr[i];
                const nkey = 'k:' + nd.key;
                let unit = els[nkey], isFresh = false;
                if (!unit) {
                    isFresh = true;
                    unit = document.createElement('div');
                    unit.className = 'node-unit';
                    unit.innerHTML = `<div class="node"></div><div class="node-index"></div>`;
                    els[nkey] = unit;
                }
                const nodeEl = unit.firstChild;
                nodeEl.textContent = nd.val;
                unit.lastChild.textContent = 'idx ' + i;
                const isRemoveTarget = step.exitKey === nd.key;
                const isSwap = step.swapKeys && step.swapKeys.includes(nd.key);
                const isTargetVal = step.target !== undefined && step.target !== null && nd.val === step.target;
                const isPulse = step.pulseKey === nd.key;
                nodeEl.className = 'node settled'
                    + (isRemoveTarget ? ' to-remove' : '')
                    + (isPulse ? ' pulse' : '')
                    + (isSwap ? ' swap-ring' : '')
                    + (!isRemoveTarget && !isPulse && !isSwap && step.type !== 'random' && isTargetVal ? ' target' : '');
                if (isPulse) nodeEl.style.setProperty('--glow', 'rgba(6,182,212,0.65)');
                if (isFresh) freshNodes.push(nodeEl);
                ordered.push(unit);
            }

            // reconcile -- exit any node-unit that's leaving, then remove + forget
            const used = new Set(ordered);
            Object.keys(firstRects).forEach(k => {
                if (!used.has(els[k])) {
                    const key = k.slice(2);
                    const txt = (step.exitText !== undefined && step.exitKey === key) ? step.exitText : els[k].firstChild.textContent;
                    Motion.exit(firstRects[k], txt);
                }
            });
            Array.from(container.children).forEach(ch => { if (!used.has(ch)) container.removeChild(ch); });
            Object.keys(els).forEach(k => { if (!used.has(els[k])) delete els[k]; });
            ordered.forEach(el => container.appendChild(el));

            // FLIP play -- survivors / swapped nodes spring to new positions
            Object.keys(firstRects).forEach(k => {
                const el = els[k]; if (!el || !el.isConnected) return;
                const last = el.getBoundingClientRect();
                Motion.flip(el, firstRects[k].left - last.left, firstRects[k].top - last.top);
            });
            freshNodes.forEach(nodeEl => Motion.enter(nodeEl, 0));
        }

        // render the HASH MAP panel (keyed entries by value) -- FLIP-ready, index text updates in place
        function renderMap(step) {
            const container = document.getElementById('map-container');
            const map = step.map || {};
            const keys = Object.keys(map);

            const firstRects = {};
            Object.keys(mapEls).forEach(k => { if (mapEls[k].isConnected) firstRects[k] = mapEls[k].getBoundingClientRect(); });

            if (keys.length === 0) {
                container.innerHTML = '';
                mapEls = {};
                const empty = document.createElement('div'); empty.className = 'map-empty'; empty.textContent = '{ } empty';
                container.appendChild(empty);
                return;
            }

            const ordered = [];
            const fresh = [];
            // stable order by ascending index so the map roughly tracks the array layout
            keys.sort((a, b) => map[a] - map[b]).forEach(valStr => {
                const mkey = 'm:' + valStr;
                let entry = mapEls[mkey], isFresh = false;
                if (!entry) {
                    isFresh = true;
                    entry = document.createElement('div');
                    entry.className = 'map-entry';
                    entry.innerHTML = `<span class="mk"></span><span class="marrow">${ARR}</span><span class="mv"></span>`;
                    mapEls[mkey] = entry;
                }
                entry.querySelector('.mk').textContent = valStr;
                entry.querySelector('.mv').textContent = map[valStr];
                const isHot = step.hotMap !== undefined && String(step.hotMap) === valStr;
                const isChanged = step.changedMap !== undefined && String(step.changedMap) === valStr;
                entry.classList.toggle('hot', isHot && !isChanged);
                entry.classList.toggle('changed', isChanged);
                if (isFresh) fresh.push(entry);
                ordered.push(entry);
            });

            const used = new Set(ordered);
            Array.from(container.children).forEach(ch => { if (!used.has(ch)) container.removeChild(ch); });
            Object.keys(mapEls).forEach(k => { if (!used.has(mapEls[k])) delete mapEls[k]; });
            ordered.forEach(el => container.appendChild(el));

            Object.keys(firstRects).forEach(k => {
                const el = mapEls[k]; if (!el || !el.isConnected) return;
                const last = el.getBoundingClientRect();
                Motion.flip(el, firstRects[k].left - last.left, firstRects[k].top - last.top);
            });
            fresh.forEach(el => Motion.enter(el, 0));
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            renderArray(step);
            renderMap(step);

            // narration
            const mainPanel = document.getElementById('main-panel');
            mainPanel.innerHTML = step.panel || '&mdash;';
            const miss = (step.type === 'insert-dup' || step.type === 'remove-miss' || step.type === 'random-empty');
            mainPanel.classList.toggle('done', !!step.complete);
            mainPanel.classList.toggle('miss', miss);

            // action word + float tile
            const aw = document.getElementById('action-word');
            aw.textContent = step.action || '';
            aw.style.color = step.actionColor || 'var(--text-dim)';
            const ft = document.getElementById('float-tile');
            if (step.tile !== null && step.tile !== undefined) {
                document.getElementById('float-val').textContent = step.tile;
                const c = TILE_COLORS[step.tileColor] || TILE_COLORS.green;
                ft.style.background = c.bg; ft.style.color = c.fg; ft.style.borderColor = c.bd; ft.style.boxShadow = '0 0 26px ' + c.glow;
                Motion.pop(ft);
            } else {
                ft.getAnimations().forEach(a => a.cancel());
                ft.style.opacity = '0'; ft.style.transform = 'scale(0.5)';
            }

            // confetti once on completion
            if (step.complete && step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } }
            else if (!step.complete) { confettiArmed = true; }

            // state pills
            document.getElementById('val-op').textContent = step.opLabel || step.type;
            document.getElementById('val-len').textContent = (step.arr || []).length;
            document.getElementById('val-ret').textContent = (step.ret !== undefined && step.ret !== null) ? step.ret : String.fromCharCode(8212);
            highlightCode(step.codeLine);

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            // cumulative log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px'; line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.textContent = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; resetDom(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) { stepIndex = 0; resetDom(); renderStep(0); }
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase();
            if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); next(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); back(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });

        let rT;
        window.addEventListener('resize', () => { clearTimeout(rT); rT = setTimeout(() => renderStep(stepIndex), 120); });
        window.onload = init;
    </script>
</body>
</html>
