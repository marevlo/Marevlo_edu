<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplify Path (Unix) - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* the '..' pop marker             */
            --accent-blue:   #06b6d4;    /* cursor / chrome                */
            --accent-green:  #22c55e;    /* pushed dir / result            */
            --accent-red:    #f43f5e;    /* skip / pop                     */
            --accent-purple: #a855f7;    /* stack frame / push-pop         */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 280px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(168, 85, 247, 0.5); box-shadow: 0 0 18px rgba(168, 85, 247, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(168,85,247,0.22), rgba(168,85,247,0.10)); border-color: rgba(168, 85, 247, 0.45); color: #e9d5ff; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #e9d5ff; background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); box-shadow: 0 0 12px rgba(168,85,247,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(168,85,247,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #ede9fe; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-purple); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(168,85,247,0.14); color: #d8b4fe; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(168,85,247,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); padding: 26px 18px 22px; }

        /* input token-row with cursor */
        .row-wrap { position: relative; display: flex; justify-content: center; margin-bottom: 26px; }
        .row-rail { position: relative; display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; }
        .ch { position: relative; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .ch .box {
            min-width: 44px; height: 44px; padding: 0 9px; display: flex; align-items: center; justify-content: center;
            border-radius: 11px; font-size: 17px; font-weight: 800; font-family: var(--mono);
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.05); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s; }
        .ch .idx { font-size: 10px; color: var(--text-dim); font-family: var(--mono); }
        .ch.done .box  { opacity: 0.42; }
        .ch.cursor .box { border-color: var(--accent-blue); background: rgba(6,182,212,0.16); color: #a5f3fc; box-shadow: 0 0 20px rgba(6,182,212,0.5); transform: translateY(-3px) scale(1.06); }
        .ch.skip .box { color: var(--accent-red); border-color: rgba(244,63,94,0.4); }
        .ch.dotdot .box { color: var(--accent-orange); border-color: rgba(245,165,36,0.45); }
        .ch.name .box { color: #bbf7d0; }
        .ch.empty .box { color: var(--text-dim); font-size: 13px; font-weight: 600; }

        /* the two work areas */
        .work { display: flex; gap: 18px; align-items: flex-end; justify-content: center; min-height: 200px; }
        .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .col-label { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); }
        .stack-box { width: 240px; min-height: 168px; border: 1px dashed var(--border-main); border-radius: 14px; padding: 10px; display: flex; flex-direction: column-reverse; gap: 8px; justify-content: flex-start; background: rgba(255,255,255,0.02); }
        .frame { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 12px; border-radius: 10px;
            border: 2px solid var(--accent-purple); background: rgba(168,85,247,0.14); color: #e9d5ff; font-family: var(--mono); font-weight: 700; font-size: 14px; will-change: transform; }
        .frame .slash { color: var(--accent-blue); font-weight: 800; }
        .frame.top { box-shadow: 0 0 18px rgba(168,85,247,0.45); border-color: #c084fc; }
        .frame.popping { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 18px rgba(244,63,94,0.4); }
        .stack-empty { color: var(--text-dim); font-family: var(--mono); font-size: 12px; align-self: center; margin: auto; }

        .tokchip { font-family: var(--mono); font-size: 15px; font-weight: 800; padding: 10px 16px; border-radius: 11px; border: 2px solid var(--accent-purple); background: rgba(168,85,247,0.14); color: #e9d5ff; min-width: 110px; text-align: center; transition: all 0.3s; }
        .tokchip.skip { border-color: var(--accent-red); background: rgba(244,63,94,0.14); color: #fecdd3; }
        .tokchip.dotdot { border-color: var(--accent-orange); background: rgba(245,165,36,0.14); color: #ffd591; }
        .tokchip.name { border-color: var(--accent-green); background: rgba(34,197,94,0.14); color: #bbf7d0; }
        .tokchip.none { opacity: 0.4; border-style: dashed; }
        .tok-meaning { font-family: var(--mono); font-size: 11px; color: var(--text-dim); min-height: 14px; text-align: center; }

        .action-stage { position: relative; min-height: 78px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .result-track { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: center; min-height: 32px; }
        .res-tile { min-width: 26px; height: 34px; padding: 0 7px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 16px; font-weight: 800; border: 2px solid var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.9), rgba(33,194,117,0.9)); color: #06251a; box-shadow: 0 0 12px rgba(34,197,94,0.35); }
        .res-slash { min-width: 20px; height: 34px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 16px; font-weight: 800; border: 2px solid rgba(6,182,212,0.5); background: rgba(6,182,212,0.12); color: #a5f3fc; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-purple); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(168,85,247,0.12); border-left-color: var(--accent-purple); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">path =</label>
        <input type="text" id="str-input" placeholder="/home//foo/../bar/./baz" maxlength="40">
        <button onclick="loadCustom()">Simplify</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">/home//foo/../bar/./baz</button>
        <button onclick="loadExample(1)">/../</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Simplify Path <span class="sub">&middot; Unix canonical path &middot; split by <code style="font-family:var(--mono)">/</code>, one stack of directories &middot; O(n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="row-wrap"><div class="row-rail" id="row-rail"></div></div>
                <div class="work">
                    <div class="col">
                        <div class="col-label">dir stack (top &#8593;)</div>
                        <div class="stack-box" id="stack-box"></div>
                    </div>
                    <div class="col">
                        <div class="col-label">current token</div>
                        <div class="tokchip none" id="tokchip">&mdash;</div>
                        <div class="tok-meaning" id="tok-meaning"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="result-track" id="result-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // --------- Motion engine ---------
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `scale(${(0.4 + 0.6 * p).toFixed(3)}) translateY(${(12 * (1 - p)).toFixed(1)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'backwards' });
            },
        };

        // --------- State ---------
        let currentPath = "/home//foo/../bar/./baz";
        let tokens = [];       // currentPath.split('/')
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 760, 360];
        const chEls = {};      // input token tiles 'i'
        const frameEls = {};   // stack frames 'depth'

        const CODE = [
            [['kw','def '],['fn','simplify'],['src','(path):']],
            [['src','  stack = []']],
            [['kw','  for '],['src','tok in path.split("/"):']],
            [['kw','    if '],['src','tok == "" or tok == ".": continue']],
            [['kw','    elif '],['src','tok == "..":']],
            [['kw','      if '],['src','stack: stack.pop()']],
            [['kw','    else'],['src',': stack.push(tok)']],
            [['kw','  return '],['src','"/" + "/".join(stack)']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokensArr, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokensArr.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code & log' : 'Show code & log';
        }

        // --------- helpers ---------
        function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function tokKind(t) {
            if (t === '' || t === '.') return 'skip';
            if (t === '..') return 'dotdot';
            return 'name';
        }
        function tokLabel(t) {
            if (t === '') return '""';
            return t;
        }
        function pathOf(stack) { return stack.length === 0 ? '/' : '/' + stack.join('/'); }

        // --------- step generation ---------
        function generateSteps() {
            steps = [];
            tokens = currentPath.split('/');
            let stack = [];
            // popMark: index of a frame currently being popped (for one render), removed after
            const snap = (cursor, extra) => Object.assign({
                cursor, stack: stack.slice(), token: cursor >= 0 && cursor < tokens.length ? tokens[cursor] : null,
                popping: -1, freshFrame: -1
            }, extra);

            steps.push(snap(-1, {
                code: [0, 1], action: 'START', actionColor: 'var(--accent-purple)',
                panel: `Simplify <code>"${esc(currentPath)}"</code>. Split on <code>/</code> into <b>${tokens.length}</b> tokens, then walk them keeping a <b>stack</b> of directory names.`,
                log: `init  path = "${currentPath}"  tokens = ${JSON.stringify(tokens)}`
            }));

            for (let i = 0; i < tokens.length; i++) {
                const tok = tokens[i];
                const kind = tokKind(tok);

                if (kind === 'skip') {
                    const why = tok === '' ? 'an empty segment (from a leading or doubled <code>/</code>)' : 'the current directory <code>.</code>';
                    steps.push(snap(i, { code: [2, 3], action: 'skip', actionColor: 'var(--accent-red)',
                        panel: `Token <code>${esc(tokLabel(tok))}</code> is ${why} &#8594; <b>skip</b> it, stack unchanged.`,
                        log: `tok ${JSON.stringify(tok)}  skip` }));
                } else if (kind === 'dotdot') {
                    if (stack.length > 0) {
                        const popped = stack[stack.length - 1];
                        const popDepth = stack.length - 1;
                        // first show the pop highlight on the top frame
                        steps.push(snap(i, { code: [2, 4, 5], action: `pop "${popped}"`, actionColor: 'var(--accent-red)', popping: popDepth,
                            panel: `Token <code>..</code> means &ldquo;go up&rdquo; &#8594; <b>pop</b> the top directory <code>"${esc(popped)}"</code> off the stack.`,
                            log: `tok ".."  pop "${popped}"` }));
                        stack.pop();
                        // then a snapshot with it gone (reuse same cursor so it reads as the result of the pop)
                    } else {
                        steps.push(snap(i, { code: [2, 4, 5], action: '.. at root', actionColor: 'var(--accent-red)',
                            panel: `Token <code>..</code> but the stack is <b>empty</b> (already at root) &#8594; nothing to pop, <b>skip</b>.`,
                            log: `tok ".."  stack empty, skip` }));
                    }
                } else {
                    stack.push(tok);
                    const depth = stack.length - 1;
                    steps.push(snap(i, { code: [2, 6], action: `push "${tok}"`, actionColor: 'var(--accent-green)', freshFrame: depth,
                        panel: `Token <code>${esc(tok)}</code> is a real directory name &#8594; <b>push</b> it onto the stack.`,
                        log: `tok "${tok}"  push` }));
                }
            }

            const finalPath = pathOf(stack);
            steps.push(snap(tokens.length, { complete: true, confetti: true, code: [7], action: `✓ "${finalPath}"`, actionColor: 'var(--accent-green)', result: finalPath, stack: stack.slice(),
                panel: `All tokens processed &#8594; join the stack with <code>/</code> under root: simplified path = <code>"${esc(finalPath)}"</code>.`,
                log: `done  result = "${finalPath}"` }));
        }

        // --------- render (persistent DOM) ---------
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // input token-row
            const rail = document.getElementById('row-rail');
            const used = new Set();
            tokens.forEach((tok, i) => {
                used.add(String(i));
                let el = chEls[i];
                if (!el) { el = document.createElement('div'); el.className = 'ch'; el.innerHTML = `<div class="box"></div><div class="idx"></div>`; chEls[i] = el; }
                el.querySelector('.box').textContent = tok === '' ? '""' : tok;
                el.querySelector('.idx').textContent = i;
                const kind = tokKind(tok);
                let cls = 'ch';
                if (i < step.cursor) cls += ' done';
                if (i === step.cursor) cls += ' cursor';
                if (tok === '') cls += ' empty';
                if (kind === 'skip') cls += ' skip'; else if (kind === 'dotdot') cls += ' dotdot'; else cls += ' name';
                el.className = cls;
                rail.appendChild(el);
            });
            Object.keys(chEls).forEach(k => { if (!used.has(k)) { chEls[k].remove(); delete chEls[k]; } });

            // stack frames (bottom = depth 0; column-reverse renders depth 0 at bottom)
            const box = document.getElementById('stack-box');
            const usedF = new Set();
            if (step.stack.length === 0) {
                box.querySelectorAll('.frame').forEach(f => f.remove());
                Object.keys(frameEls).forEach(k => delete frameEls[k]);
                if (!box.querySelector('.stack-empty')) { const e = document.createElement('div'); e.className = 'stack-empty'; e.textContent = 'empty (root /)'; box.appendChild(e); }
            } else {
                const emp = box.querySelector('.stack-empty'); if (emp) emp.remove();
                step.stack.forEach((name, d) => {
                    usedF.add(String(d));
                    let el = frameEls[d];
                    const fresh = !el;
                    if (!el) { el = document.createElement('div'); el.className = 'frame'; frameEls[d] = el; }
                    el.innerHTML = `<span class="slash">/</span><span>${esc(name)}</span>`;
                    let cls = 'frame';
                    if (d === step.stack.length - 1) cls += ' top';
                    if (d === step.popping) cls += ' popping';
                    el.className = cls;
                    box.appendChild(el);
                    if (fresh || step.freshFrame === d) Motion.pop(el);
                });
                Object.keys(frameEls).forEach(k => { if (!usedF.has(k)) { frameEls[k].remove(); delete frameEls[k]; } });
            }

            // current token chip
            const tc = document.getElementById('tokchip');
            const tm = document.getElementById('tok-meaning');
            if (step.token === null) {
                tc.textContent = '—'; tc.className = 'tokchip none'; tm.textContent = '';
            } else {
                const kind = tokKind(step.token);
                tc.textContent = step.token === '' ? '""' : step.token;
                tc.className = 'tokchip ' + kind;
                tm.textContent = kind === 'skip' ? '"" or "."  -> skip'
                               : kind === 'dotdot' ? '".."  -> pop / go up'
                               : 'dir name  -> push';
            }

            // result track (final canonical path tiles)
            const rt = document.getElementById('result-track'); rt.innerHTML = '';
            if (step.complete && step.result) {
                if (step.stack.length === 0) {
                    const t = document.createElement('div'); t.className = 'res-slash'; t.textContent = '/'; rt.appendChild(t);
                } else {
                    step.stack.forEach(name => {
                        const sl = document.createElement('div'); sl.className = 'res-slash'; sl.textContent = '/'; rt.appendChild(sl);
                        const t = document.createElement('div'); t.className = 'res-tile'; t.textContent = name; rt.appendChild(t);
                    });
                }
            }

            // narration / action / chrome
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${esc(s.log)}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // --------- controls ---------
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(chEls).forEach(k => { chEls[k].remove(); delete chEls[k]; });
            Object.keys(frameEls).forEach(k => { frameEls[k].remove(); delete frameEls[k]; });
            document.getElementById('stack-box').innerHTML = ''; confettiArmed = true;
        }
        function loadPath(p) { pause(); currentPath = p; clearDom(); generateSteps(); renderStep(0); }
        function loadCustom() {
            let v = (document.getElementById('str-input').value || '').trim();
            // tolerate quoted input like "/a/b"
            if (v.length >= 2 && ((v[0] === '"' && v[v.length-1] === '"') || (v[0] === "'" && v[v.length-1] === "'"))) v = v.slice(1, -1);
            v = v.slice(0, 40);
            if (!v.length) v = '/';
            if (v[0] !== '/') v = '/' + v;
            loadPath(v);
        }
        const EXAMPLES = ['/home//foo/../bar/./baz', '/../'];
        function loadExample(n) { const ex = EXAMPLES[n]; document.getElementById('str-input').value = ex; loadPath(ex); }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('str-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
