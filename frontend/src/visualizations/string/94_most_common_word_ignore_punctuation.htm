<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Most Common Word (Ignore Punctuation) - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* value in motion / token     */
            --accent-blue:   #06b6d4;   /* scan pointer / chrome       */
            --accent-green:  #22c55e;   /* winner / counted            */
            --accent-red:    #f43f5e;   /* banned / punctuation        */
            --accent-purple: #a855f7;   /* current word / focus        */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 360px; max-width: 60vw;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .str-stage { position: relative; width: 100%; min-height: 250px; overflow-x: auto; overflow-y: hidden; scrollbar-width: thin; display: flex; flex-direction: column; align-items: stretch; justify-content: flex-start; gap: 16px; padding: 36px 18px 40px; }
        .str-stage::-webkit-scrollbar { height: 7px; }
        .str-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        .rail-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--text-dim); margin: 0 auto 2px; }
        .row-rail { position: relative; display: flex; flex-wrap: wrap; gap: 6px 8px; margin: 0 auto; max-width: 100%; justify-content: center; }

        /* char tile (the core string-domain unit) */
        .ch { position: relative; display: flex; flex-direction: column; align-items: center; gap: 5px; will-change: transform; }
        .ch .box {
            min-width: 30px; height: 40px; padding: 0 4px; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-size: 18px; font-weight: 800; font-family: var(--mono);
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.05); color: var(--text-main);
            transition: background 0.4s, border-color 0.4s, color 0.4s, box-shadow 0.4s, transform 0.4s cubic-bezier(.34,1.3,.64,1);
        }
        .ch .box.space { color: var(--text-dim); font-size: 13px; }
        .ch.current .box  { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 18px rgba(168,85,247,0.5), inset 0 0 12px rgba(168,85,247,0.12); transform: translateY(-3px); }
        .ch.window .box   { border-color: rgba(168,85,247,0.5); background: rgba(168,85,247,0.08); color: #e9d5ff; }
        .ch.settled .box  { border-color: var(--accent-green); background: rgba(34,197,94,0.14); color: #bbf7d0; }
        .ch.punct .box    { border-color: rgba(244,63,94,0.35); background: rgba(244,63,94,0.06); color: #fda4af; opacity: 0.55; }
        .ch.dim .box      { opacity: 0.32; }

        /* gliding scan pointer */
        .ptr { position: absolute; left: 0; top: 0; display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; z-index: 6; will-change: transform; }
        .ptr.above { bottom: 100%; margin-bottom: 6px; }
        .ptr.below { top: 100%; margin-top: 6px; flex-direction: column-reverse; }
        .ptr .tag { font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 8px; white-space: nowrap; }
        .ptr .stalk { width: 2px; height: 14px; }
        .ptr.p-purple .tag { background: var(--accent-purple); color: #1a0533; box-shadow: 0 0 14px rgba(168,85,247,0.6); } .ptr.p-purple .stalk { background: var(--accent-purple); }
        .ptr.p-blue   .tag { background: var(--accent-blue);   color: #04222a; box-shadow: 0 0 14px rgba(6,182,212,0.6); }  .ptr.p-blue .stalk { background: var(--accent-blue); }
        .ptr.p-orange .tag { background: var(--accent-orange); color: #3a2400; box-shadow: 0 0 14px rgba(245,165,36,0.6); } .ptr.p-orange .stalk { background: var(--accent-orange); }
        .ptr.p-green  .tag { background: var(--accent-green);  color: #052b16; box-shadow: 0 0 14px rgba(34,197,94,0.6); }  .ptr.p-green .stalk { background: var(--accent-green); }

        /* word -> count chip table (the aux structure) */
        .chip-rail { position: relative; display: flex; flex-wrap: wrap; gap: 8px; margin: 0 auto; max-width: 100%; justify-content: center; min-height: 44px; align-items: center; }
        .chip-empty { font-family: var(--mono); font-size: 12px; color: var(--text-dim); opacity: 0.7; }
        .chip {
            display: inline-flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 13px; font-weight: 700;
            border-radius: 10px; padding: 6px 10px; border: 2px solid var(--border-main); background: rgba(255,255,255,0.05); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s cubic-bezier(.34,1.3,.64,1);
            will-change: transform;
        }
        .chip .cnt { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 5px; border-radius: 7px; font-size: 12px; background: rgba(255,255,255,0.08); color: var(--text-dim); }
        .chip.active  { border-color: var(--accent-purple); background: rgba(168,85,247,0.14); color: #e9d5ff; box-shadow: 0 0 16px rgba(168,85,247,0.4); transform: translateY(-2px); }
        .chip.active .cnt { background: rgba(168,85,247,0.3); color: #f3e8ff; }
        .chip.banned  { border-color: var(--accent-red); background: rgba(244,63,94,0.12); color: #fecdd3; opacity: 0.85; }
        .chip.banned .cnt { background: rgba(244,63,94,0.28); color: #fecdd3; }
        .chip.banned .word { text-decoration: line-through; }
        .chip.winner  { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.92), rgba(33,194,117,0.92)); color: #06251a; box-shadow: 0 0 18px rgba(34,197,94,0.5); }
        .chip.winner .cnt { background: rgba(0,0,0,0.18); color: #06251a; }

        .action-stage { position: relative; min-height: 96px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .float-tile { min-width: 56px; height: 50px; padding: 0 14px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 20px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.5); opacity: 0; transform: scale(.5); transition: opacity .25s, transform .4s cubic-bezier(.34,1.5,.64,1); }
        .float-tile.show { opacity: 1; transform: scale(1); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line .st { color: #c3e88d; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.l b { color: var(--accent-purple); } .pill.r b { color: var(--accent-blue); } .pill.s b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">paragraph =</label>
        <input type="text" id="para-input" placeholder="Bob hit a ball, the hit BALL flew far after it was hit.">
        <label class="ui-label">banned =</label>
        <input type="text" id="ban-input" placeholder="hit" style="width:120px">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Ex 1</button>
        <button onclick="loadExample(1)">Ex 2</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Most Common Word <span class="sub">&middot; ignore case &amp; punctuation &middot; exclude banned &middot; O(n) scan</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="str-stage" id="str-stage">
                    <div class="rail-label">paragraph &middot; scan char by char</div>
                    <div class="row-rail" id="row-rail"></div>
                    <div class="rail-label">word &#8594; count table &middot; banned excluded</div>
                    <div class="chip-rail" id="chip-rail"></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="float-tile" id="float-tile"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill l">word <b id="st-word">&mdash;</b></span>
                            <span class="pill r">count <b id="st-count">&mdash;</b></span>
                            <span class="pill s">best <b id="st-best">&mdash;</b></span>
                            <span class="pill">banned <b id="st-banned">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring + FLIP, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            // FLIP: el is already at its NEW spot; animate FROM (dx,dy) = old - new.
            flip(el, dx, dy) {
                if (REDUCED || (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5)) return;
                const kf = SPRING_POS.map(p => ({ transform: `translate(${(dx * (1 - p)).toFixed(2)}px, ${(dy * (1 - p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
            },
            // spring-glide a pointer pill along X (keeps the -50% centre offset). Stores el._x.
            glide(el, x) {
                const prev = el._x; el.style.opacity = '1';
                const commit = `translateX(${x.toFixed(2)}px) translateX(-50%)`;
                if (REDUCED || prev == null || Math.abs(x - prev) < 0.5) { el._x = x; el.style.transform = commit; return; }
                const dx = x - prev;
                const kf = SPRING_POS.map(p => ({ transform: `translateX(${(prev + dx * p).toFixed(2)}px) translateX(-50%)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el.style.transform = commit;
            },
            pop(el) {
                if (REDUCED) { el.style.opacity = '1'; el.style.transform = 'scale(1)'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `scale(${(0.5 + 0.5 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'forwards' });
            },
        };

        // ───────── State ─────────
        let currentParagraph = "Bob hit a ball, the hit BALL flew far after it was hit.";
        let currentBanned = ["hit"];
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 760, 360];
        const tileEls = {};   // 'i' -> .ch element  (keyed by char position)
        const ptrEls = {};    // pointer name -> pill element
        const chipEls = {};   // word -> chip element

        const CODE = [
            [['kw','def '],['fn','mostCommonWord'],['src','(p, banned):']],
            [['src','  ban = set(banned)']],
            [['src','  words = '],['fn','re.findall'],['src',"(r'[a-z]+', p.lower())"]],
            [['src','  count = {}; best, ans = 0, '],['st',"''"]],
            [['kw','  for '],['src','w '],['kw','in '],['src','words:']],
            [['kw','    if '],['src','w '],['kw','in '],['src','ban: '],['kw','continue']],
            [['src','    count[w] += 1']],
            [['kw','    if '],['src','count[w] > best:']],
            [['src','      best, ans = count[w], w']],
            [['kw','  return '],['src','ans']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── tokenizer: positions of each word in the original char stream ─────────
        // returns { display: [{ch, isWord}], words: [{text, start, end}] }
        function tokenize(p) {
            const display = [];
            const words = [];
            let cur = '', curStart = -1;
            const isAlpha = (c) => /[a-zA-Z]/.test(c);
            for (let i = 0; i < p.length; i++) {
                const ch = p[i];
                const word = isAlpha(ch);
                display.push({ ch: ch === ' ' ? '·' : ch, raw: ch, isWord: word });
                if (word) {
                    if (cur === '') curStart = i;
                    cur += ch.toLowerCase();
                } else if (cur !== '') {
                    words.push({ text: cur, start: curStart, end: i - 1 });
                    cur = '';
                }
            }
            if (cur !== '') words.push({ text: cur, start: curStart, end: p.length - 1 });
            return { display, words };
        }

        // ───────── step generation ─────────
        function generateSteps() {
            steps = [];
            const P = currentParagraph;
            const { display, words } = tokenize(P);
            const bannedSet = new Set(currentBanned.map(w => String(w).toLowerCase().trim()).filter(Boolean));
            const bannedArr = [...bannedSet];
            const count = {};        // word -> running count
            const order = [];        // chip display order
            let best = 0, ans = '';

            // helper: chips snapshot in stable order
            const chipSnap = (activeWord, winnerWord) => order.map(w => ({
                word: w, count: count[w], banned: bannedSet.has(w),
                active: w === activeWord, winner: !!winnerWord && w === winnerWord
            }));

            // tile state builder: dim everything except current word window (+ settled past words)
            const tileStates = (curStart, curEnd, settledEnd) => display.map((d, i) => {
                if (!d.isWord) return 'punct';
                if (curStart != null && i >= curStart && i <= curEnd) return (i === curStart ? 'current' : 'window');
                if (settledEnd != null && i <= settledEnd) return 'settled';
                return 'dim';
            });

            const base = (extra) => Object.assign({
                display, chips: [], code: [], ptrs: [],
                word: null, count: null, best, ans, bannedArr,
                states: display.map(d => d.isWord ? 'dim' : 'punct')
            }, extra);

            // INIT
            steps.push(base({
                code: [0, 1], action: 'START', actionColor: 'var(--accent-blue)',
                chips: chipSnap(),
                panel: `Find the most common word in the paragraph &mdash; lowercase, strip punctuation, and exclude the banned word${bannedArr.length === 1 ? '' : 's'} <code>${bannedArr.length ? bannedArr.map(b => '"' + b + '"').join(', ') : '(none)'}</code>.`,
                log: `init  banned = ${JSON.stringify(bannedArr)}  (${words.length} words)`
            }));

            // SPLIT / clean overview
            steps.push(base({
                code: [2, 3], action: 'TOKENIZE', actionColor: 'var(--accent-orange)',
                states: display.map(d => d.isWord ? 'window' : 'punct'),
                chips: chipSnap(),
                panel: `Lowercase &amp; split on non-letters &#8594; <b>${words.length}</b> word${words.length === 1 ? '' : 's'}. Punctuation tiles are dimmed and skipped.`,
                log: `split words = [${words.map(w => w.text).join(', ')}]`
            }));

            // scan each word
            for (let k = 0; k < words.length; k++) {
                const w = words[k];
                const settledEnd = k > 0 ? words[k - 1].end : null;
                const isBanned = bannedSet.has(w.text);

                // focus this word
                steps.push(base({
                    code: [4], action: 'WORD "' + w.text + '"', actionColor: 'var(--accent-purple)',
                    word: w.text, tile: w.text,
                    states: tileStates(w.start, w.end, settledEnd),
                    ptr: { i: w.start, color: 'purple', label: 'scan' },
                    chips: chipSnap(w.text),
                    panel: `Word ${k + 1} of ${words.length}: <code>"${w.text}"</code>. Is it banned?`,
                    log: `word  "${w.text}"`
                }));

                if (isBanned) {
                    // ensure chip exists so it shows red (count it as seen but excluded? LeetCode skips entirely)
                    if (!order.includes(w.text)) order.push(w.text);
                    if (count[w.text] == null) count[w.text] = 0;
                    steps.push(base({
                        code: [5], action: 'BANNED ✗', actionColor: 'var(--accent-red)', miss: true,
                        word: w.text,
                        states: tileStates(w.start, w.end, settledEnd),
                        ptr: { i: w.start, color: 'blue', label: 'skip' },
                        chips: chipSnap(w.text),
                        panel: `<code>"${w.text}"</code> is <b>banned</b> &#8594; skip it (don't count, never a candidate).`,
                        log: `  banned -> skip "${w.text}"`
                    }));
                    continue;
                }

                // count it
                if (!order.includes(w.text)) order.push(w.text);
                count[w.text] = (count[w.text] || 0) + 1;
                const c = count[w.text];
                steps.push(base({
                    code: [6], action: 'count "' + w.text + '" = ' + c, actionColor: 'var(--accent-green)',
                    word: w.text, count: c,
                    states: tileStates(w.start, w.end, settledEnd),
                    ptr: { i: w.start, color: 'green', label: '+1' },
                    chips: chipSnap(w.text),
                    bump: w.text,
                    panel: `Not banned &#8594; <code>count["${w.text}"]</code> becomes <b>${c}</b>.`,
                    log: `  count["${w.text}"] = ${c}`
                }));

                // compare to best
                if (c > best) {
                    const prevBest = best;
                    best = c; ans = w.text;
                    steps.push(base({
                        code: [7, 8], action: 'NEW BEST ★', actionColor: 'var(--accent-green)',
                        word: w.text, count: c, best, ans,
                        states: tileStates(w.start, w.end, settledEnd),
                        ptr: { i: w.start, color: 'green', label: 'best' },
                        chips: chipSnap(w.text, w.text),
                        panel: `<b>${c} &gt; ${prevBest}</b> &#8594; new leader! Best so far is <code>"${w.text}"</code> with <b>${c}</b>.`,
                        log: `  new best -> "${w.text}" (${c})`
                    }));
                } else {
                    steps.push(base({
                        code: [7], action: 'count ' + c + ' ≤ best ' + best, actionColor: 'var(--accent-blue)',
                        word: w.text, count: c, best, ans,
                        states: tileStates(w.start, w.end, settledEnd),
                        ptr: { i: w.start, color: 'blue', label: 'keep' },
                        chips: chipSnap(w.text, ans),
                        panel: `<b>${c} &#8804; ${best}</b> &#8594; leader stays <code>"${ans}"</code> (${best}).`,
                        log: `  ${c} <= best ${best}, leader stays "${ans}"`
                    }));
                }
            }

            // FINAL
            const settledEnd = words.length ? words[words.length - 1].end : null;
            steps.push(base({
                complete: true, confetti: true, code: [9], action: '✓ "' + ans + '"', actionColor: 'var(--accent-green)',
                word: ans, count: best, best, ans,
                states: display.map((d, i) => d.isWord ? (settledEnd != null && i <= settledEnd ? 'settled' : 'dim') : 'punct'),
                chips: chipSnap(null, ans),
                result: ans,
                panel: `All words scanned. Most common non-banned word: <code>"${ans}"</code> &times; <b>${best}</b>.`,
                log: `done  result = "${ans}" (count ${best})`
            }));
        }

        // ───────── render (persistent DOM + FLIP) ─────────
        function tileCenterX(i) {
            const el = tileEls[i];
            if (!el) return 0;
            return el.offsetLeft + el.offsetWidth / 2;
        }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const rail = document.getElementById('row-rail');
            const n = step.display.length;

            // reconcile char tiles (keyed by position)
            const used = new Set();
            for (let i = 0; i < n; i++) {
                used.add(String(i));
                let el = tileEls[i];
                if (!el) {
                    el = document.createElement('div'); el.className = 'ch';
                    el.innerHTML = `<div class="box"></div>`;
                    tileEls[i] = el;
                }
                const d = step.display[i];
                const box = el.querySelector('.box');
                box.textContent = d.ch;
                box.classList.toggle('space', d.raw === ' ');
                el.className = 'ch ' + (step.states[i] || 'dim');
                rail.appendChild(el); // re-append in order (moves, no recreate)
            }
            Object.keys(tileEls).forEach(k => { if (!used.has(k)) { tileEls[k].remove(); delete tileEls[k]; } });

            // single scan pointer (reconcile by fixed name 'scan')
            const want = step.ptr;
            Object.keys(ptrEls).forEach(name => { if (!want || name !== 'scan') { ptrEls[name].style.opacity = '0'; ptrEls[name]._x = null; } });
            if (want) {
                let pill = ptrEls['scan'];
                if (!pill) {
                    pill = document.createElement('div');
                    pill.innerHTML = `<div class="tag"></div><div class="stalk"></div>`;
                    rail.appendChild(pill); ptrEls['scan'] = pill;
                }
                pill.className = 'ptr above p-' + want.color;
                pill.querySelector('.tag').textContent = want.label;
                if (want.i == null || !tileEls[want.i]) { pill.style.opacity = '0'; pill._x = null; }
                else Motion.glide(pill, tileCenterX(want.i));
            }

            // reconcile word->count chips (keyed by word, FLIP on reorder/bump)
            renderChips(step);

            // floating tile (the active word token)
            const ft = document.getElementById('float-tile');
            if (step.tile != null) { ft.textContent = step.tile; ft.classList.add('show'); Motion.pop(ft); }
            else ft.classList.remove('show');

            // narration / action / chrome
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            mp.classList.toggle('miss', !!step.miss);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            document.getElementById('st-word').textContent = step.word != null ? '"' + step.word + '"' : '—';
            document.getElementById('st-count').textContent = step.count != null ? step.count : '—';
            document.getElementById('st-best').textContent = step.ans ? '"' + step.ans + '" (' + step.best + ')' : '—';
            document.getElementById('st-banned').textContent = (step.bannedArr && step.bannedArr.length) ? step.bannedArr.join(', ') : '—';

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function renderChips(step) {
            const rail = document.getElementById('chip-rail');
            const chips = step.chips || [];

            // empty placeholder
            let placeholder = rail.querySelector('.chip-empty');
            if (!chips.length) {
                if (!placeholder) { placeholder = document.createElement('div'); placeholder.className = 'chip-empty'; placeholder.textContent = 'count table is empty'; rail.appendChild(placeholder); }
            } else if (placeholder) { placeholder.remove(); }

            // FIRST positions
            const firstRects = {};
            chips.forEach(c => { const el = chipEls[c.word]; if (el && el.isConnected) firstRects[c.word] = el.getBoundingClientRect(); });

            const used = new Set();
            chips.forEach(c => {
                used.add(c.word);
                let el = chipEls[c.word];
                if (!el) {
                    el = document.createElement('div'); el.className = 'chip';
                    el.innerHTML = `<span class="word"></span><span class="cnt"></span>`;
                    chipEls[c.word] = el;
                }
                el.querySelector('.word').textContent = c.word;
                el.querySelector('.cnt').textContent = c.count;
                let cls = 'chip';
                if (c.banned) cls += ' banned';
                else if (c.winner) cls += ' winner';
                else if (c.active) cls += ' active';
                el.className = cls;
                rail.appendChild(el);
            });
            Object.keys(chipEls).forEach(w => { if (!used.has(w)) { chipEls[w].remove(); delete chipEls[w]; } });

            // LAST + FLIP
            chips.forEach(c => {
                const el = chipEls[c.word]; if (!el) return;
                const last = el.getBoundingClientRect();
                if (firstRects[c.word]) Motion.flip(el, firstRects[c.word].left - last.left, firstRects[c.word].top - last.top);
            });
            // pop the bumped chip
            if (step.bump && chipEls[step.bump]) Motion.pop(chipEls[step.bump]);
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(tileEls).forEach(k => { tileEls[k].remove(); delete tileEls[k]; });
            Object.keys(ptrEls).forEach(k => { ptrEls[k].remove(); delete ptrEls[k]; });
            Object.keys(chipEls).forEach(k => { chipEls[k].remove(); delete chipEls[k]; });
            const cr = document.getElementById('chip-rail'); if (cr) cr.innerHTML = '';
            confettiArmed = true;
        }
        function loadData(paragraph, banned) {
            pause(); currentParagraph = paragraph; currentBanned = banned; clearDom(); generateSteps(); renderStep(0);
        }
        function loadCustom() {
            const p = (document.getElementById('para-input').value || '').trim();
            const b = (document.getElementById('ban-input').value || '').trim();
            const banned = b.split(/[\s,]+/).map(x => x.trim()).filter(Boolean);
            if (p.length) loadData(p, banned);
        }
        const EXAMPLES = [
            { paragraph: "Bob hit a ball, the hit BALL flew far after it was hit.", banned: ["hit"] },
            { paragraph: "a, a, a, a, b,b,b,c, c", banned: ["a"] }
        ];
        function loadExample(n) {
            const ex = EXAMPLES[n];
            document.getElementById('para-input').value = ex.paragraph;
            document.getElementById('ban-input').value = ex.banned.join(', ');
            loadData(ex.paragraph, ex.banned);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('para-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        document.getElementById('ban-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
