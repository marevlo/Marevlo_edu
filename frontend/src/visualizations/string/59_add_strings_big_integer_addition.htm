<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Strings (Big Integer Addition) - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* carry / value in motion      */
            --accent-blue:   #06b6d4;   /* num2 row / chrome            */
            --accent-green:  #22c55e;   /* settled / result digit       */
            --accent-red:    #f43f5e;   /* overflow / new top digit     */
            --accent-purple: #a855f7;   /* num1 row / column cursor     */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 150px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .str-stage { position: relative; width: 100%; min-height: 300px; overflow-x: auto; overflow-y: hidden; scrollbar-width: thin; display: flex; align-items: center; justify-content: center; padding: 46px 18px 46px; }
        .str-stage::-webkit-scrollbar { height: 7px; }
        .str-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        /* the right-aligned addition grid: 3 stacked rows of columns */
        .add-grid { position: relative; display: flex; flex-direction: column; gap: 12px; margin: 0 auto; }
        .grid-row { position: relative; display: grid; gap: 10px; justify-content: end; align-items: center; }
        .row-lead { display: flex; align-items: center; justify-content: flex-end; }
        .row-tag { font-family: var(--mono); font-size: 12px; font-weight: 800; padding: 3px 9px; border-radius: 8px; white-space: nowrap; }
        .row-tag.t-num1 { color: #e9d5ff; background: rgba(168,85,247,0.16); border: 1px solid rgba(168,85,247,0.4); }
        .row-tag.t-num2 { color: #a5f3fc; background: rgba(6,182,212,0.16); border: 1px solid rgba(6,182,212,0.4); }
        .row-tag.t-sum  { color: #bbf7d0; background: rgba(34,197,94,0.16); border: 1px solid rgba(34,197,94,0.4); }
        .row-plus { font-family: var(--mono); font-size: 22px; font-weight: 800; color: var(--text-dim); }
        .grid-sep { height: 2px; border-radius: 999px; background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.25), rgba(255,255,255,0.05)); margin: 2px 0; }

        /* char tile (the core digit unit) */
        .ch { position: relative; display: flex; flex-direction: column; align-items: center; gap: 6px; will-change: transform; }
        .ch .box {
            min-width: 52px; height: 56px; padding: 0 6px; display: flex; align-items: center; justify-content: center;
            border-radius: 13px; font-size: 24px; font-weight: 800; font-family: var(--mono);
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.05); color: var(--text-main);
            transition: background 0.4s, border-color 0.4s, color 0.4s, box-shadow 0.4s, transform 0.4s cubic-bezier(.34,1.3,.64,1);
        }
        .ch .idx { font-size: 11px; color: var(--text-dim); font-family: var(--mono); height: 13px; }
        .ch.current .box { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 20px rgba(168,85,247,0.5), inset 0 0 12px rgba(168,85,247,0.12); }
        .ch.current2 .box { border-color: var(--accent-blue); background: rgba(6,182,212,0.16); color: #a5f3fc; box-shadow: 0 0 20px rgba(6,182,212,0.5), inset 0 0 12px rgba(6,182,212,0.12); }
        .ch.colcue .box { border-color: rgba(245,165,36,0.55); background: rgba(245,165,36,0.08); }
        .ch.consumed .box { border-color: var(--accent-green); background: rgba(34,197,94,0.12); color: #bbf7d0; }
        .ch.pad .box { border-style: dashed; border-color: rgba(255,255,255,0.14); background: rgba(255,255,255,0.02); color: var(--text-dim); }
        .ch.settled .box { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.9), rgba(33,194,117,0.9)); color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.4); }
        .ch.fresh .box { border-color: var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0; box-shadow: 0 0 20px rgba(34,197,94,0.45); }
        .ch.carryhi .box { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 20px rgba(244,63,94,0.45); }
        .ch.empty .box { border-color: transparent; background: transparent; box-shadow: none; }
        .ch.dim .box { opacity: 0.4; }

        /* gliding column cursor pill (a vertical highlight that glides to the active column) */
        .col-cursor { position: absolute; top: -10px; bottom: -10px; width: 64px; border-radius: 16px; border: 2px dashed rgba(245,165,36,0.55); background: rgba(245,165,36,0.06); box-shadow: 0 0 24px rgba(245,165,36,0.20) inset; opacity: 0; pointer-events: none; z-index: 0; will-change: transform; }

        .ptr { position: absolute; left: 0; top: 0; display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; z-index: 6; will-change: transform; }
        .ptr.above { bottom: 100%; margin-bottom: 6px; }
        .ptr .tag { font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 8px; white-space: nowrap; }
        .ptr .stalk { width: 2px; height: 14px; }
        .ptr.p-orange .tag { background: var(--accent-orange); color: #3a2400; box-shadow: 0 0 14px rgba(245,165,36,0.6); } .ptr.p-orange .stalk { background: var(--accent-orange); }

        .action-stage { position: relative; min-height: 96px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .float-row { display: flex; align-items: center; gap: 14px; min-height: 60px; }
        .float-tile { width: 56px; height: 56px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 24px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.5); opacity: 0; transform: scale(.5); transition: opacity .25s, transform .4s cubic-bezier(.34,1.5,.64,1); }
        .float-tile.show { opacity: 1; transform: scale(1); }
        .carry-pill { display: inline-flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 14px; font-weight: 800; padding: 8px 14px; border-radius: 999px; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.12); color: #ffd591; box-shadow: 0 0 18px rgba(245,165,36,0.35); opacity: 0; transform: scale(.7); transition: opacity .25s, transform .35s cubic-bezier(.34,1.5,.64,1), border-color .3s, color .3s, background .3s; }
        .carry-pill.show { opacity: 1; transform: scale(1); }
        .carry-pill.zero { border-color: rgba(255,255,255,0.16); background: rgba(255,255,255,0.04); color: var(--text-dim); box-shadow: none; }
        .carry-pill .cv { font-size: 18px; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.i b { color: var(--accent-purple); } .pill.j b { color: var(--accent-blue); } .pill.c b { color: var(--accent-orange); } .pill.r b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">num1 =</label>
        <input type="text" id="a-input" placeholder="123" maxlength="14">
        <label class="ui-label">num2 =</label>
        <input type="text" id="b-input" placeholder="456" maxlength="14">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">"123"+"456"</button>
        <button onclick="loadExample(1)">"999"+"1"</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Add Strings <span class="sub">&middot; big-integer addition, digit by digit &middot; O(max(m,n)) time</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="str-stage" id="str-stage">
                    <div class="add-grid" id="add-grid">
                        <div class="col-cursor" id="col-cursor"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="float-row">
                <div class="float-tile" id="float-tile"></div>
                <div class="carry-pill" id="carry-pill"><span>carry</span> <span class="cv" id="carry-val">0</span></div>
            </div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill i">i <b id="st-i">&mdash;</b></span>
                            <span class="pill j">j <b id="st-j">&mdash;</b></span>
                            <span class="pill c">carry <b id="st-carry">0</b></span>
                            <span class="pill r">result <b id="st-res">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring + FLIP, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            // FLIP: el is already at its NEW spot; animate FROM (dx,dy) = old - new.
            flip(el, dx, dy) {
                if (REDUCED || (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5)) return;
                const kf = SPRING_POS.map(p => ({ transform: `translate(${(dx * (1 - p)).toFixed(2)}px, ${(dy * (1 - p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
            },
            // spring-glide a positioned box along X (raw translateX, no centre offset). Stores el._x.
            slide(el, x) {
                const prev = el._x; el.style.opacity = '1';
                const commit = `translateX(${x.toFixed(2)}px)`;
                if (REDUCED || prev == null || Math.abs(x - prev) < 0.5) { el._x = x; el.style.transform = commit; return; }
                const dx = x - prev;
                const kf = SPRING_POS.map(p => ({ transform: `translateX(${(prev + dx * p).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el.style.transform = commit;
            },
            pop(el) {
                if (REDUCED) { el.style.opacity = '1'; el.style.transform = 'scale(1)'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `scale(${(0.5 + 0.5 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'forwards' });
            },
        };

        // ───────── State ─────────
        let currentA = "123";
        let currentB = "456";
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 760, 360];
        // persistent DOM caches, keyed by stable ids
        const aEls = {};   // 'a<pos>' columns of num1 row
        const bEls = {};   // 'b<pos>' columns of num2 row
        const rEls = {};   // 'r<pos>' columns of result row
        let cursorEl = null;

        const CODE = [
            [['kw','def '],['fn','addStrings'],['src','(num1, num2):']],
            [['src','  i, j = len(num1)-1, len(num2)-1']],
            [['src','  carry, res = 0, []']],
            [['kw','  while '],['src','i >= 0 or j >= 0 or carry:']],
            [['src','    d1 = int(num1[i]) if i >= 0 else 0']],
            [['src','    d2 = int(num2[j]) if j >= 0 else 0']],
            [['src','    total = d1 + d2 + carry']],
            [['src','    res.append(total % 10)']],
            [['src','    carry = total // 10']],
            [['src','    i -= 1; j -= 1']],
            [['kw','  return '],['src',"''.join(map(str, reversed(res)))"]],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── step generation ─────────
        // Layout model: total columns W = max(m, n) + 1 (extra column for a possible final carry).
        // Columns indexed 0..W-1 left-to-right. Right-most column is W-1 (units place).
        function generateSteps() {
            steps = [];
            const A = currentA, B = currentB;
            const m = A.length, n = B.length;
            const W = Math.max(m, n) + 1;            // +1 reserves room for a leading carry digit
            // right-aligned column index for a given string position
            const aColAt = (pos) => W - 1 - (m - 1 - pos);   // pos in [0,m-1]
            const bColAt = (pos) => W - 1 - (n - 1 - pos);
            // the column being processed when i (a-index) = ia, j (b-index) = jb, k-th from right (k>=0)
            const colFromRight = (k) => W - 1 - k;

            let i = m - 1, j = n - 1, carry = 0;
            const resByCol = {};   // col -> digit char already written to result row
            let k = 0;             // how many columns processed from the right

            // helper to build the three row-state arrays for a snapshot
            const blank = () => Array(W).fill('empty');
            function buildA(activeCol, consumedThru) {
                const arr = blank();
                for (let p = 0; p < m; p++) {
                    const c = aColAt(p);
                    arr[c] = (c === activeCol) ? 'current' : (consumedThru != null && c > consumedThru ? 'consumed' : 'idle');
                }
                return arr;
            }
            function buildB(activeCol, consumedThru) {
                const arr = blank();
                for (let p = 0; p < n; p++) {
                    const c = bColAt(p);
                    arr[c] = (c === activeCol) ? 'current2' : (consumedThru != null && c > consumedThru ? 'consumed' : 'idle');
                }
                return arr;
            }
            function buildR(highlightCol, freshKind) {
                const arr = blank();
                Object.keys(resByCol).forEach(c => { arr[+c] = (+c === highlightCol) ? (freshKind || 'fresh') : 'settled'; });
                return arr;
            }
            // char for each column of each row (so the DOM shows the digit even when padded)
            function charsA() { const a = Array(W).fill(''); for (let p = 0; p < m; p++) a[aColAt(p)] = A[p]; return a; }
            function charsB() { const a = Array(W).fill(''); for (let p = 0; p < n; p++) a[bColAt(p)] = B[p]; return a; }
            function charsR() { const a = Array(W).fill(''); Object.keys(resByCol).forEach(c => a[+c] = resByCol[c]); return a; }

            const snap = (extra) => Object.assign({
                W,
                aChars: charsA(), bChars: charsB(), rChars: charsR(),
                aStates: blank(), bStates: blank(), rStates: blank(),
                i, j, carry, cursorCol: null,
                result: charsR().join('').replace(/^$/,'')
            }, extra);

            // INIT
            steps.push(snap({
                code: [0, 1, 2],
                action: 'START', actionColor: 'var(--accent-blue)',
                aStates: buildA(null, null), bStates: buildB(null, null), rStates: buildR(null),
                carryShow: true,
                panel: `Add <code>"${A}"</code> + <code>"${B}"</code> as a big integer. Line the digits up on the right, then add each column from the <b>right</b> with a running <b>carry</b>.`,
                log: `init  num1="${A}" (m=${m}), num2="${B}" (n=${n}), carry=0`
            }));

            // main loop: while i >= 0 or j >= 0 or carry > 0
            while (i >= 0 || j >= 0 || carry > 0) {
                const col = colFromRight(k);
                const d1 = i >= 0 ? +A[i] : 0;
                const d2 = j >= 0 ? +B[j] : 0;
                const total = d1 + d2 + carry;
                const newDigit = total % 10;
                const newCarry = Math.floor(total / 10);

                const aTxt = i >= 0 ? `num1[${i}]=${d1}` : `num1 done &rarr; 0`;
                const bTxt = j >= 0 ? `num2[${j}]=${d2}` : `num2 done &rarr; 0`;

                // (1) focus the column: show the two digits being added + incoming carry
                steps.push(snap({
                    code: [3, 4, 5],
                    cursorCol: col,
                    action: 'COLUMN ' + (k + 1), actionColor: 'var(--accent-orange)',
                    aStates: buildA(i >= 0 ? col : null, col), bStates: buildB(j >= 0 ? col : null, col), rStates: buildR(null),
                    carryShow: true, carryVal: carry,
                    panel: `Column ${k + 1} from the right: <code>${aTxt}</code>, <code>${bTxt}</code>, carry <b>${carry}</b>.`,
                    log: `col ${k + 1}: d1=${d1}, d2=${d2}, carry=${carry}`
                }));

                // (2) compute total = d1 + d2 + carry  (float the sum digit)
                steps.push(snap({
                    code: [6],
                    cursorCol: col,
                    action: `${d1} + ${d2} + ${carry} = ${total}`, actionColor: 'var(--accent-orange)',
                    aStates: buildA(i >= 0 ? col : null, col), bStates: buildB(j >= 0 ? col : null, col), rStates: buildR(null),
                    floatTile: String(total), carryShow: true, carryVal: carry,
                    panel: `total = ${d1} + ${d2} + ${carry} = <b>${total}</b>.`,
                    log: `total = ${d1} + ${d2} + ${carry} = ${total}`
                }));

                // commit: write digit, update carry
                resByCol[col] = String(newDigit);
                carry = newCarry;
                k++;

                const topCarryCol = (col === 0);   // wrote into the reserved leading column
                const freshKind = (topCarryCol && newDigit > 0 && i < 0 && j < 0) ? 'carryhi' : 'fresh';

                // (3) write digit % 10, set carry = total // 10  (spring the result digit in)
                steps.push(snap({
                    code: [7, 8, 9],
                    cursorCol: col,
                    action: 'write ' + newDigit + (newCarry ? '  &middot; carry ' + newCarry : ''), actionColor: 'var(--accent-green)',
                    aStates: buildA(null, col), bStates: buildB(null, col),
                    rStates: buildR(col, freshKind),
                    floatTile: String(total),
                    carryShow: true, carryVal: newCarry, popResult: col,
                    panel: `Write <b>${total} % 10 = ${newDigit}</b> into the result. Carry over <code>${total} // 10 = ${newCarry}</code>.`,
                    log: `write digit=${newDigit}, carry=${newCarry}`
                }));

                if (i >= 0) i--;
                if (j >= 0) j--;
            }

            // FINAL
            const finalCols = Object.keys(resByCol).map(Number).sort((x, y) => x - y);
            let finalResult = finalCols.map(c => resByCol[c]).join('');
            if (finalResult === '') finalResult = '0';

            steps.push(snap({
                complete: true, confetti: true, code: [10],
                action: '✓ SUM = ' + finalResult, actionColor: 'var(--accent-green)',
                aStates: buildA(null, -1), bStates: buildB(null, -1),
                rStates: (function () { const a = blank(); finalCols.forEach(c => a[c] = 'settled'); return a; })(),
                carryShow: true, carryVal: 0,
                result: finalResult,
                panel: `All columns done and no carry left. <code>"${A}" + "${B}" = "${finalResult}"</code>.`,
                log: `done  result = "${finalResult}"`
            }));
        }

        // ───────── render (persistent DOM + FLIP) ─────────
        function columnCenterX(rowEl, col) {
            // returns x of the centre of column `col` relative to the .add-grid (for cursor positioning)
            const cell = rowEl && rowEl.querySelector('[data-col="' + col + '"]');
            const grid = document.getElementById('add-grid');
            if (!cell || !grid) return 0;
            const cr = cell.getBoundingClientRect();
            const gr = grid.getBoundingClientRect();
            return (cr.left - gr.left) + cr.width / 2;
        }

        function reconcileRow(rowEl, prefix, cache, chars, states, W, idxRow) {
            const used = new Set();
            for (let c = 0; c < W; c++) {
                const id = prefix + c;
                used.add(id);
                let el = cache[id];
                if (!el) {
                    el = document.createElement('div');
                    el.dataset.col = c;
                    el.innerHTML = `<div class="box"></div><div class="idx"></div>`;
                    cache[id] = el;
                }
                el.querySelector('.box').textContent = chars[c] || '';
                // index label: only the num1 / num2 rows carry an index (their string position)
                const idxLbl = el.querySelector('.idx');
                idxLbl.textContent = idxRow != null && states[c] !== 'empty' && chars[c] !== '' ? idxRow[c] : '';
                el.className = 'ch ' + (states[c] || 'empty');
                rowEl.appendChild(el);
            }
            Object.keys(cache).forEach(id => { if (!used.has(id)) { cache[id].remove(); delete cache[id]; } });
        }

        function ensureGrid(W) {
            const grid = document.getElementById('add-grid');
            // rows are created once; cleared/rebuilt only on full reset (clearDom)
            let rowA = document.getElementById('grid-row-a');
            if (!rowA) {
                // num1 row
                rowA = document.createElement('div'); rowA.className = 'grid-row'; rowA.id = 'grid-row-a';
                const tagA = document.createElement('div'); tagA.className = 'row-lead';
                tagA.innerHTML = '<span class="row-tag t-num1">num1</span>';
                rowA.appendChild(tagA);
                // num2 row
                const rowB = document.createElement('div'); rowB.className = 'grid-row'; rowB.id = 'grid-row-b';
                const tagB = document.createElement('div'); tagB.className = 'row-lead';
                tagB.innerHTML = '<span class="row-plus">+</span><span class="row-tag t-num2" style="margin-left:8px">num2</span>';
                rowB.appendChild(tagB);
                // separator
                const sep = document.createElement('div'); sep.className = 'grid-sep'; sep.id = 'grid-sep';
                // result row
                const rowR = document.createElement('div'); rowR.className = 'grid-row'; rowR.id = 'grid-row-r';
                const tagR = document.createElement('div'); tagR.className = 'row-lead';
                tagR.innerHTML = '<span class="row-tag t-sum">sum</span>';
                rowR.appendChild(tagR);

                grid.appendChild(rowA); grid.appendChild(rowB); grid.appendChild(sep); grid.appendChild(rowR);
            }
            // keep the grid template columns in sync with W (lead column + W digit columns)
            const tmpl = `auto repeat(${W}, 60px)`;
            document.getElementById('grid-row-a').style.gridTemplateColumns = tmpl;
            document.getElementById('grid-row-b').style.gridTemplateColumns = tmpl;
            document.getElementById('grid-row-r').style.gridTemplateColumns = tmpl;
            document.getElementById('grid-sep').style.gridColumn = '1 / -1';
        }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const W = step.W;
            ensureGrid(W);
            const rowA = document.getElementById('grid-row-a');
            const rowB = document.getElementById('grid-row-b');
            const rowR = document.getElementById('grid-row-r');

            // index labels for num1 / num2 rows (string position per column)
            const idxA = Array(W).fill(''); { const m = currentA.length; for (let p = 0; p < m; p++) idxA[W - 1 - (m - 1 - p)] = p; }
            const idxB = Array(W).fill(''); { const n = currentB.length; for (let p = 0; p < n; p++) idxB[W - 1 - (n - 1 - p)] = p; }

            reconcileRow(rowA, 'a', aEls, step.aChars, step.aStates, W, idxA);
            reconcileRow(rowB, 'b', bEls, step.bChars, step.bStates, W, idxB);
            reconcileRow(rowR, 'r', rEls, step.rChars, step.rStates, W, null);

            // pop the freshly written result digit
            if (step.popResult != null) {
                const el = rEls['r' + step.popResult];
                if (el) Motion.pop(el.querySelector('.box'));
            }

            // glide the column cursor over the active column
            cursorEl = document.getElementById('col-cursor');
            if (step.cursorCol != null) {
                const cx = columnCenterX(rowA, step.cursorCol);
                cursorEl.style.left = '0px';
                Motion.slide(cursorEl, cx - 32); // box is 64px wide, centre it
                cursorEl.style.opacity = '1';
            } else {
                cursorEl.style.opacity = '0'; cursorEl._x = null;
            }

            // floating sum tile (value in motion)
            const ft = document.getElementById('float-tile');
            if (step.floatTile != null) { ft.textContent = step.floatTile; ft.classList.add('show'); Motion.pop(ft); }
            else ft.classList.remove('show');

            // carry pill
            const cp = document.getElementById('carry-pill');
            if (step.carryShow) {
                const cv = step.carryVal != null ? step.carryVal : step.carry;
                document.getElementById('carry-val').textContent = cv;
                cp.classList.add('show');
                cp.classList.toggle('zero', !cv);
            } else { cp.classList.remove('show'); }

            // narration / action / chrome
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            mp.classList.toggle('miss', !!step.miss);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            document.getElementById('st-i').textContent = step.i != null && step.i >= 0 ? step.i : '—';
            document.getElementById('st-j').textContent = step.j != null && step.j >= 0 ? step.j : '—';
            document.getElementById('st-carry').textContent = step.carryVal != null ? step.carryVal : (step.carry || 0);
            document.getElementById('st-res').textContent = '"' + (step.result || '') + '"';

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            ['a', 'b', 'r'].forEach(pre => {
                const cache = pre === 'a' ? aEls : pre === 'b' ? bEls : rEls;
                Object.keys(cache).forEach(k => { cache[k].remove(); delete cache[k]; });
            });
            // drop the row scaffolding so it rebuilds at the new width
            ['grid-row-a', 'grid-row-b', 'grid-sep', 'grid-row-r'].forEach(id => { const e = document.getElementById(id); if (e) e.remove(); });
            const cur = document.getElementById('col-cursor'); if (cur) { cur.style.opacity = '0'; cur._x = null; }
            confettiArmed = true;
        }

        function sanitize(v) {
            // keep digits only; strip a wrapping pair of quotes a user may type
            v = (v || '').trim();
            if (v.startsWith('"') && v.endsWith('"') && v.length >= 2) v = v.slice(1, -1);
            v = v.replace(/[^0-9]/g, '').slice(0, 14);
            // normalise leading zeros but keep a single 0
            v = v.replace(/^0+(?=\d)/, '');
            return v;
        }

        function loadPair(a, b) {
            pause();
            currentA = a.length ? a : '0';
            currentB = b.length ? b : '0';
            clearDom(); generateSteps(); renderStep(0);
        }
        function loadCustom() {
            const a = sanitize(document.getElementById('a-input').value);
            const b = sanitize(document.getElementById('b-input').value);
            document.getElementById('a-input').value = a;
            document.getElementById('b-input').value = b;
            loadPair(a, b);
        }
        function loadExample(n) {
            const ex = [['123', '456'], ['999', '1']][n];
            document.getElementById('a-input').value = ex[0];
            document.getElementById('b-input').value = ex[1];
            loadPair(ex[0], ex[1]);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('a-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        document.getElementById('b-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
