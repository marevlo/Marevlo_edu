<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Version Numbers - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* value in motion / parse     */
            --accent-blue:   #06b6d4;   /* v2 revision / chrome        */
            --accent-green:  #22c55e;   /* equal / done                */
            --accent-red:    #f43f5e;   /* difference found            */
            --accent-purple: #a855f7;   /* v1 revision / cursor        */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 130px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .str-stage { position: relative; width: 100%; min-height: 240px; overflow-x: auto; overflow-y: hidden; scrollbar-width: thin; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; padding: 40px 18px 46px; }
        .str-stage::-webkit-scrollbar { height: 7px; }
        .str-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        /* one version line: a label + a row of revision-blocks */
        .ver-line { position: relative; display: flex; align-items: center; gap: 14px; }
        .ver-label { font-family: var(--mono); font-size: 13px; font-weight: 800; color: var(--text-dim); width: 30px; text-align: right; }
        .ver-label.v1 { color: #e9d5ff; } .ver-label.v2 { color: #a5f3fc; }
        .row-rail { position: relative; display: flex; gap: 12px; align-items: center; }

        /* a revision-block = group of char tiles split by '.', wrapped in a frame */
        .blk { position: relative; display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 7px 9px 9px; border-radius: 14px; border: 2px solid transparent; background: transparent; transition: background 0.4s, border-color 0.4s, box-shadow 0.4s, transform 0.4s cubic-bezier(.34,1.3,.64,1); will-change: transform; }
        .blk .tiles { display: flex; gap: 5px; }
        .blk .blabel { font-size: 10.5px; color: var(--text-dim); font-family: var(--mono); letter-spacing: .3px; }
        .blk.cursor   { border-color: rgba(245,165,36,0.55); background: rgba(245,165,36,0.06); box-shadow: 0 0 22px rgba(245,165,36,0.22); }
        .blk.equal    { border-color: rgba(34,197,94,0.45); background: rgba(34,197,94,0.07); box-shadow: 0 0 16px rgba(34,197,94,0.18); }
        .blk.win      { border-color: var(--accent-green); background: rgba(34,197,94,0.12); box-shadow: 0 0 22px rgba(34,197,94,0.4); }
        .blk.lose     { border-color: rgba(244,63,94,0.5); background: rgba(244,63,94,0.10); box-shadow: 0 0 22px rgba(244,63,94,0.32); }
        .blk.dim .tiles { opacity: 0.42; }
        .blk.dim .blabel { opacity: 0.42; }

        /* char tile (the core string-domain unit) */
        .ch { position: relative; display: flex; align-items: center; justify-content: center; will-change: transform; }
        .ch .box {
            min-width: 40px; height: 50px; padding: 0 6px; display: flex; align-items: center; justify-content: center;
            border-radius: 11px; font-size: 21px; font-weight: 800; font-family: var(--mono);
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.05); color: var(--text-main);
            transition: background 0.4s, border-color 0.4s, color 0.4s, box-shadow 0.4s, transform 0.4s cubic-bezier(.34,1.3,.64,1);
        }
        .ch.v1 .box.lit { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 18px rgba(168,85,247,0.45), inset 0 0 12px rgba(168,85,247,0.12); }
        .ch.v2 .box.lit { border-color: var(--accent-blue); background: rgba(6,182,212,0.16); color: #a5f3fc; box-shadow: 0 0 18px rgba(6,182,212,0.45), inset 0 0 12px rgba(6,182,212,0.12); }
        .ch .box.zero   { border-style: dashed; color: var(--text-dim); background: rgba(255,255,255,0.03); }
        .ch .box.lead   { opacity: 0.45; }
        .ch .box.matched{ border-color: var(--accent-green); background: rgba(34,197,94,0.14); color: #bbf7d0; }
        .ch .box.bad    { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 16px rgba(244,63,94,0.35); }
        .ch .box.dot    { min-width: 24px; border: none; background: transparent; color: var(--text-dim); font-size: 24px; font-weight: 900; box-shadow: none; }

        /* gliding cursor pill (sits above the v1 line, glides between revision blocks) */
        .ptr { position: absolute; left: 0; top: 0; bottom: 100%; margin-bottom: 8px; display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; z-index: 6; will-change: transform; }
        .ptr .tag { font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 8px; white-space: nowrap; }
        .ptr .stalk { width: 2px; height: 14px; }
        .ptr.p-orange .tag { background: var(--accent-orange); color: #3a2400; box-shadow: 0 0 14px rgba(245,165,36,0.6); } .ptr.p-orange .stalk { background: var(--accent-orange); }

        .action-stage { position: relative; min-height: 96px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .float-row { display: flex; align-items: center; gap: 14px; }
        .float-tile { min-width: 56px; height: 56px; padding: 0 10px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 24px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.5); opacity: 0; transform: scale(.5); transition: opacity .25s, transform .4s cubic-bezier(.34,1.5,.64,1); }
        .float-tile.v1c { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 22px rgba(168,85,247,0.5); }
        .float-tile.v2c { border-color: var(--accent-blue); background: rgba(6,182,212,0.16); color: #a5f3fc; box-shadow: 0 0 22px rgba(6,182,212,0.5); }
        .float-row.show .float-tile { opacity: 1; transform: scale(1); }
        .float-op { font-family: var(--mono); font-size: 26px; font-weight: 900; color: var(--text-dim); opacity: 0; transition: opacity .3s, color .3s; }
        .float-row.show .float-op { opacity: 1; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.i b { color: var(--accent-orange); } .pill.a b { color: var(--accent-purple); } .pill.bv b { color: var(--accent-blue); } .pill.s b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">v1 =</label>
        <input type="text" id="v1-input" placeholder="1.01" maxlength="20">
        <label class="ui-label">v2 =</label>
        <input type="text" id="v2-input" placeholder="1.001" maxlength="20">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">"1.01" vs "1.001"</button>
        <button onclick="loadExample(1)">"1.0" vs "1.0.0"</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Compare Version Numbers <span class="sub">&middot; split on &#8216;.&#8217; &middot; compare revisions as ints &middot; missing parts = 0</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="str-stage" id="str-stage">
                    <div class="ver-line">
                        <div class="ver-label v1">v1</div>
                        <div class="row-rail" id="rail-1"></div>
                    </div>
                    <div class="ver-line">
                        <div class="ver-label v2">v2</div>
                        <div class="row-rail" id="rail-2"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="float-row" id="float-row">
                <div class="float-tile v1c" id="float-a"></div>
                <div class="float-op" id="float-op"></div>
                <div class="float-tile v2c" id="float-b"></div>
            </div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill i">rev <b id="st-rev">&mdash;</b></span>
                            <span class="pill a">r1 <b id="st-r1">&mdash;</b></span>
                            <span class="pill bv">r2 <b id="st-r2">&mdash;</b></span>
                            <span class="pill s">result <b id="st-res">0</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // --------- Motion engine (spring + FLIP, zero deps) ---------
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            // spring-glide a pointer pill along X (keeps the -50% centre offset). Stores el._x.
            glide(el, x) {
                const prev = el._x; el.style.opacity = '1';
                const commit = `translateX(${x.toFixed(2)}px) translateX(-50%)`;
                if (REDUCED || prev == null || Math.abs(x - prev) < 0.5) { el._x = x; el.style.transform = commit; return; }
                const dx = x - prev;
                const kf = SPRING_POS.map(p => ({ transform: `translateX(${(prev + dx * p).toFixed(2)}px) translateX(-50%)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el.style.transform = commit;
            },
            pop(el) {
                if (REDUCED) { el.style.opacity = '1'; el.style.transform = 'scale(1)'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `scale(${(0.5 + 0.5 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'forwards' });
            },
        };

        // --------- State ---------
        let currentV1 = "1.01";
        let currentV2 = "1.001";
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 760, 360];
        // persistent DOM: one map per rail, keyed by stable char-position id
        const tileEls = [{}, {}];   // [railIdx]['k'] -> .ch element
        const ptrEls = {};          // pointer name -> pill element

        const CODE = [
            [['kw','def '],['fn','compare'],['src','(v1, v2):']],
            [['src','  a = v1.split(".")']],
            [['src','  b = v2.split(".")']],
            [['kw','  for '],['src','i in range(max(len(a), len(b))):']],
            [['src','    r1 = int(a[i]) if i < len(a) else 0']],
            [['src','    r2 = int(b[i]) if i < len(b) else 0']],
            [['kw','    if '],['src','r1 < r2: '],['kw','return '],['src','-1']],
            [['kw','    if '],['src','r1 > r2: '],['kw','return '],['src','1']],
            [['kw','  return '],['src','0']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // --------- helpers ---------
        // Turn "1.01" into a flat tile list with stable ids, marking which block each char belongs to,
        // and inserting non-interactive '.' separator tiles between blocks.
        function buildTileModel(ver) {
            const revs = ver.split('.');
            const tiles = [];           // {id, ch, blk, isDot, lead}
            let id = 0;
            revs.forEach((rev, b) => {
                if (b > 0) { tiles.push({ id: 'd' + id, ch: '.', blk: -1, isDot: true }); id++; }
                // detect leading zeros (so we can dim them, since int() drops them)
                const trimmed = rev.replace(/^0+(?=\d)/, '');
                const leadCount = rev.length - trimmed.length;
                for (let k = 0; k < rev.length; k++) {
                    tiles.push({ id: 't' + id, ch: rev[k], blk: b, isDot: false, lead: k < leadCount });
                    id++;
                }
                if (rev.length === 0) { /* empty revision (e.g. trailing dot) renders no tiles */ }
            });
            return { revs, tiles };
        }

        // --------- step generation ---------
        function generateSteps() {
            steps = [];
            const m1 = buildTileModel(currentV1);
            const m2 = buildTileModel(currentV2);
            const revs1 = m1.revs, revs2 = m2.revs;
            const maxLen = Math.max(revs1.length, revs2.length);

            // block-state arrays default everything to 'idle'
            const baseBlk = () => ({ 1: Array(revs1.length).fill('idle'), 2: Array(revs2.length).fill('idle') });

            const snap = (extra) => Object.assign({
                m1, m2, rev: -1, r1: '—', r2: '—', result: 0,
                blkState: baseBlk(), litBlk: { 1: -1, 2: -1 }, badBlk: { 1: -1, 2: -1 },
                ptr: null
            }, extra);

            steps.push(snap({
                code: [0, 1, 2],
                action: 'SPLIT on ‘.’', actionColor: 'var(--accent-blue)',
                panel: `Compare <code>"${currentV1}"</code> vs <code>"${currentV2}"</code>. Split each on <code>'.'</code>: v1 &#8594; [${revs1.join(', ')}], v2 &#8594; [${revs2.join(', ')}]. Walk revision by revision.`,
                log: `init  v1="${currentV1}" -> [${revs1.join(',')}]   v2="${currentV2}" -> [${revs2.join(',')}]`
            }));

            let result = 0, decided = false, decidedAt = -1;

            for (let i = 0; i < maxLen; i++) {
                const r1Str = i < revs1.length ? revs1[i] : null;
                const r2Str = i < revs2.length ? revs2[i] : null;
                const r1 = r1Str == null || r1Str === '' ? 0 : parseInt(r1Str, 10);
                const r2 = r2Str == null || r2Str === '' ? 0 : parseInt(r2Str, 10);

                // STEP A: focus this revision block on both rows, parse to ints
                const st = baseBlk();
                if (i < revs1.length) st[1][i] = 'cursor';
                if (i < revs2.length) st[2][i] = 'cursor';
                steps.push(snap({
                    rev: i, r1, r2, result,
                    code: [3, 4, 5],
                    blkState: st, litBlk: { 1: i < revs1.length ? i : -1, 2: i < revs2.length ? i : -1 },
                    ptr: { name: 'rev', blk: i },
                    float: { a: r1, b: r2, op: '?', opColor: 'var(--text-dim)' },
                    action: 'parse rev ' + i, actionColor: 'var(--accent-orange)',
                    panel: `Revision <b>${i}</b>: parse v1’s <code>"${r1Str == null ? '(missing &#8594; 0)' : r1Str}"</code> = <b>${r1}</b>, v2’s <code>"${r2Str == null ? '(missing &#8594; 0)' : r2Str}"</code> = <b>${r2}</b> as integers (leading zeros drop).`,
                    log: `rev ${i}  r1=int("${r1Str == null ? '' : r1Str}")=${r1}   r2=int("${r2Str == null ? '' : r2Str}")=${r2}`
                }));

                if (r1 === r2) {
                    // STEP B: equal -> both blocks turn green, continue
                    const ste = baseBlk();
                    if (i < revs1.length) ste[1][i] = 'equal';
                    if (i < revs2.length) ste[2][i] = 'equal';
                    steps.push(snap({
                        rev: i, r1, r2, result,
                        code: [6, 7],
                        blkState: ste, litBlk: { 1: i < revs1.length ? i : -1, 2: i < revs2.length ? i : -1 },
                        ptr: { name: 'rev', blk: i },
                        float: { a: r1, b: r2, op: '=', opColor: 'var(--accent-green)' },
                        action: r1 + ' = ' + r2 + ' — equal', actionColor: 'var(--accent-green)',
                        panel: `<b>${r1} = ${r2}</b> — this revision is equal. Neither <code>r1 &lt; r2</code> nor <code>r1 &gt; r2</code> fires; move to the next revision.`,
                        log: `      ${r1} == ${r2}  equal, continue`
                    }));
                } else {
                    // STEP B: difference -> winner green, loser red, decide result and STOP
                    result = r1 < r2 ? -1 : 1;
                    decided = true; decidedAt = i;
                    const std = baseBlk();
                    const v1Win = r1 > r2;
                    if (i < revs1.length) std[1][i] = v1Win ? 'win' : 'lose';
                    if (i < revs2.length) std[2][i] = v1Win ? 'lose' : 'win';
                    const codeLine = r1 < r2 ? [6] : [7];
                    steps.push(snap({
                        rev: i, r1, r2, result,
                        code: codeLine,
                        blkState: std, litBlk: { 1: -1, 2: -1 }, badBlk: { 1: v1Win ? -1 : (i < revs1.length ? i : -1), 2: v1Win ? (i < revs2.length ? i : -1) : -1 },
                        ptr: { name: 'rev', blk: i },
                        float: { a: r1, b: r2, op: r1 < r2 ? '<' : '>', opColor: 'var(--accent-red)' },
                        miss: true,
                        action: r1 + (r1 < r2 ? ' < ' : ' > ') + r2 + ' — return ' + result, actionColor: 'var(--accent-red)',
                        panel: `<b>${r1} ${r1 < r2 ? '&lt;' : '&gt;'} ${r2}</b> — the versions differ at revision ${i}. Return <code>${result}</code> immediately; later revisions don’t matter.`,
                        log: `      ${r1} ${r1 < r2 ? '<' : '>'} ${r2}  -> return ${result}`
                    }));
                    break;
                }
            }

            // FINAL snapshot
            const finalSt = baseBlk();
            for (let k = 0; k < revs1.length; k++) finalSt[1][k] = (decided && k === decidedAt) ? (result === 1 ? 'win' : 'lose') : (decided && k > decidedAt ? 'idle' : 'equal');
            for (let k = 0; k < revs2.length; k++) finalSt[2][k] = (decided && k === decidedAt) ? (result === -1 ? 'win' : 'lose') : (decided && k > decidedAt ? 'idle' : 'equal');
            const verdict = result === 0 ? 'versions are EQUAL' : (result === 1 ? 'v1 is GREATER' : 'v1 is SMALLER');
            steps.push(snap({
                complete: true, confetti: true, rev: decided ? decidedAt : maxLen, r1: '—', r2: '—', result,
                code: decided ? (result === -1 ? [6] : [7]) : [8],
                blkState: finalSt, badBlk: decided ? { 1: result === -1 ? decidedAt : -1, 2: result === 1 ? decidedAt : -1 } : { 1: -1, 2: -1 },
                action: '✓ result = ' + result, actionColor: 'var(--accent-green)',
                float: { a: '', b: '', op: result, opColor: 'var(--accent-green)' },
                panel: decided
                    ? `Decided at revision ${decidedAt}: <b>${verdict}</b>. <code>compare(v1, v2) = ${result}</code>.`
                    : `Every revision matched (missing trailing parts counted as 0). <b>${verdict}</b>. <code>compare(v1, v2) = ${result}</code>.`,
                log: `done  compare("${currentV1}", "${currentV2}") = ${result}`
            }));
        }

        // --------- render (persistent DOM) ---------
        function blkCenterX(railIdx, blk) {
            const rail = document.getElementById(railIdx === 1 ? 'rail-1' : 'rail-2');
            if (!rail) return 0;
            const el = rail.querySelector(`.blk[data-blk="${blk}"]`);
            if (!el) return 0;
            return el.offsetLeft + el.offsetWidth / 2;
        }

        // Build / reconcile one rail. Blocks are stable by data-blk; tiles stable by id.
        function renderRail(railIdx, model, step) {
            const rail = document.getElementById(railIdx === 1 ? 'rail-1' : 'rail-2');
            const map = tileEls[railIdx - 1];
            const blkState = step.blkState[railIdx];
            const litBlk = step.litBlk[railIdx];
            const badBlk = step.badBlk[railIdx];
            const usedTiles = new Set();
            const usedBlks = new Set();

            // ensure block frames exist (keyed by data-blk), plus a separate frame for each dot
            // we render in tile order, grouping consecutive tiles of same block under one .blk frame
            let segIdx = 0;
            let i = 0;
            const tiles = model.tiles;
            // First pass: figure out block frames we need (by block index b>=0). Dots live as their own tiny frames.
            // We rebuild the ordered child list each render using existing nodes when possible.
            const orderedChildren = [];

            // group tiles
            let k = 0;
            while (k < tiles.length) {
                const t = tiles[k];
                if (t.isDot) {
                    const dkey = 'dot-' + t.id;
                    let frame = rail.querySelector(`.blk[data-key="${dkey}"]`);
                    if (!frame) {
                        frame = document.createElement('div'); frame.className = 'blk'; frame.dataset.key = dkey;
                        frame.innerHTML = `<div class="tiles"><div class="ch"><div class="box dot">.</div></div></div><div class="blabel">&nbsp;</div>`;
                    }
                    usedBlks.add(dkey);
                    orderedChildren.push(frame);
                    k++;
                    continue;
                }
                const b = t.blk;
                const bkey = 'blk-' + b;
                let frame = rail.querySelector(`.blk[data-key="${bkey}"]`);
                if (!frame) {
                    frame = document.createElement('div'); frame.className = 'blk'; frame.dataset.key = bkey;
                    const tilesWrap = document.createElement('div'); tilesWrap.className = 'tiles';
                    const lbl = document.createElement('div'); lbl.className = 'blabel';
                    frame.append(tilesWrap, lbl);
                }
                frame.dataset.blk = b;
                usedBlks.add(bkey);
                const tilesWrap = frame.querySelector('.tiles');
                const lbl = frame.querySelector('.blabel');
                // collect all consecutive tiles of this block
                const localTiles = [];
                while (k < tiles.length && !tiles[k].isDot && tiles[k].blk === b) { localTiles.push(tiles[k]); k++; }
                // reconcile tiles inside this block
                localTiles.forEach(tt => {
                    usedTiles.add(tt.id);
                    let cell = map[tt.id];
                    if (!cell) {
                        cell = document.createElement('div'); cell.className = 'ch';
                        cell.innerHTML = `<div class="box"></div>`;
                        map[tt.id] = cell;
                    }
                    cell.className = 'ch ' + (railIdx === 1 ? 'v1' : 'v2');
                    const box = cell.querySelector('.box');
                    box.textContent = tt.ch;
                    let boxCls = 'box';
                    if (tt.lead) boxCls += ' lead';
                    if (litBlk === b) boxCls += ' lit';
                    if (badBlk === b) boxCls += ' bad';
                    if ((blkState[b] === 'equal' || blkState[b] === 'win') && badBlk !== b) boxCls += ' matched';
                    box.className = boxCls;
                    tilesWrap.appendChild(cell);
                });
                lbl.textContent = 'rev ' + b + ' = ' + (model.revs[b] === '' ? '0' : parseInt(model.revs[b] || '0', 10));
                // block frame state class
                let frameCls = 'blk';
                const stt = blkState[b];
                if (stt && stt !== 'idle') frameCls += ' ' + stt;
                frame.className = frameCls;
                orderedChildren.push(frame);
            }

            // append in correct order (moves nodes, no recreate)
            orderedChildren.forEach(c => rail.appendChild(c));
            // reap unused block frames
            Array.from(rail.querySelectorAll('.blk')).forEach(f => {
                if (!usedBlks.has(f.dataset.key)) f.remove();
            });
            // reap unused tile cells
            Object.keys(map).forEach(id => { if (!usedTiles.has(id)) { map[id].remove(); delete map[id]; } });
        }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            renderRail(1, step.m1, step);
            renderRail(2, step.m2, step);

            // cursor pill (glides between revision blocks on the v1 rail)
            const rail1 = document.getElementById('rail-1');
            const wantPtr = step.ptr;
            if (!wantPtr) {
                if (ptrEls.rev) { ptrEls.rev.style.opacity = '0'; ptrEls.rev._x = null; }
            } else {
                let pill = ptrEls.rev;
                if (!pill) {
                    pill = document.createElement('div');
                    pill.innerHTML = `<div class="tag"></div><div class="stalk"></div>`;
                    rail1.appendChild(pill); ptrEls.rev = pill;
                } else if (pill.parentElement !== rail1) {
                    rail1.appendChild(pill);
                }
                pill.className = 'ptr p-orange';
                pill.querySelector('.tag').textContent = 'rev ' + wantPtr.blk;
                const frame = rail1.querySelector(`.blk[data-blk="${wantPtr.blk}"]`);
                if (!frame) { pill.style.opacity = '0'; pill._x = null; }
                else Motion.glide(pill, frame.offsetLeft + frame.offsetWidth / 2);
            }

            // floating compare tiles (value in motion)
            const fr = document.getElementById('float-row');
            const fa = document.getElementById('float-a');
            const fb = document.getElementById('float-b');
            const fop = document.getElementById('float-op');
            if (step.float) {
                fr.classList.add('show');
                fa.textContent = step.float.a;
                fb.textContent = step.float.b;
                fa.style.display = step.float.a === '' ? 'none' : '';
                fb.style.display = step.float.b === '' ? 'none' : '';
                fop.textContent = step.float.op;
                fop.style.color = step.float.opColor || 'var(--text-dim)';
                Motion.pop(fa); Motion.pop(fb);
            } else {
                fr.classList.remove('show');
            }

            // narration / action / chrome
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            mp.classList.toggle('miss', !!step.miss && !step.complete);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            document.getElementById('st-rev').textContent = step.rev != null && step.rev >= 0 ? step.rev : '—';
            document.getElementById('st-r1').textContent = step.r1;
            document.getElementById('st-r2').textContent = step.r2;
            document.getElementById('st-res').textContent = step.result;

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // --------- controls ---------
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            ['rail-1', 'rail-2'].forEach(id => { const r = document.getElementById(id); if (r) r.innerHTML = ''; });
            tileEls[0] = {}; tileEls[1] = {};
            Object.keys(ptrEls).forEach(k => { delete ptrEls[k]; });
            confettiArmed = true;
        }
        function loadVersions(v1, v2) { pause(); currentV1 = v1; currentV2 = v2; clearDom(); generateSteps(); renderStep(0); }
        function loadCustom() {
            const a = (document.getElementById('v1-input').value || '').trim().slice(0, 20);
            const b = (document.getElementById('v2-input').value || '').trim().slice(0, 20);
            if (a.length && b.length) loadVersions(a, b);
        }
        function loadExample(n) {
            const ex = [['1.01', '1.001'], ['1.0', '1.0.0']][n];
            document.getElementById('v1-input').value = ex[0];
            document.getElementById('v2-input').value = ex[1];
            loadVersions(ex[0], ex[1]);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        ['v1-input', 'v2-input'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
