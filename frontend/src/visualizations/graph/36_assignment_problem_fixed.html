<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Problem (Hungarian Algorithm) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
            
            --line-color: rgba(227, 179, 65, 0.7); /* Orange tint for lines */
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .med-input { width: 350px; font-family: monospace; font-size: 13px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            min-width: 450px;
        }

        #matrix-container {
            display: grid;
            gap: 4px;
            position: relative;
        }

        .matrix-cell {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            background: #21262d;
            border: 2px solid var(--border-main);
            color: var(--text-main);
            transition: all 0.3s ease;
            position: relative;
        }

        /* Line Drawing Pseudo-elements */
        .matrix-cell.covered-row::before {
            content: ''; position: absolute; top: 50%; left: -6px; right: -6px; height: 4px; 
            background: var(--line-color); transform: translateY(-50%); z-index: 10; pointer-events: none;
            border-radius: 2px;
        }
        .matrix-cell.covered-col::after {
            content: ''; position: absolute; left: 50%; top: -6px; bottom: -6px; width: 4px; 
            background: var(--line-color); transform: translateX(-50%); z-index: 10; pointer-events: none;
            border-radius: 2px;
        }

        /* Highlight States */
        .matrix-cell.highlight-zero { color: var(--accent-green); border-color: var(--accent-green); background: rgba(63, 185, 80, 0.1); }
        .matrix-cell.highlight-min { color: var(--accent-red); border-color: var(--accent-red); box-shadow: 0 0 10px rgba(248,81,73,0.3); z-index: 5; transform: scale(1.1); }
        .matrix-cell.highlight-assign { background: var(--accent-green); color: #000; border-color: #fff; box-shadow: 0 0 15px var(--accent-green); z-index: 15; transform: scale(1.15);}

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 300px; max-width: 350px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 100px;}
        
        .stats-row { display: flex; justify-content: space-between; font-family: monospace; font-size: 14px; margin-bottom: 4px; border-bottom: 1px solid var(--border-main); padding-bottom: 4px;}
        .stats-val { font-weight: bold; color: var(--text-main); }
        
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">cost matrix =</label>
        <input type="text" id="m-input" class="med-input" placeholder="[[3, 5], [2, 4]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[[3, 5], [2, 4]]')">Ex 1</button>
        <button onclick="loadExample('[[1, 2, 3], [4, 5, 6], [7, 8, 9]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area">
            <div id="matrix-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange); text-align:center;">Hungarian Algorithm Status</div>
                <div class="stats-row"><span>Matrix Size (N):</span> <span class="stats-val" id="stat-n">0</span></div>
                <div class="stats-row"><span>Lines Drawn:</span> <span class="stats-val" id="stat-lines" style="color:var(--accent-orange)">0</span></div>
                <div class="stats-row" style="border:none;"><span>Status:</span> <span class="stats-val" id="stat-opt" style="color:var(--text-dim)">Initializing...</span></div>
            </div>
            
            <div class="result-display">
                <span class="ui-label">minimum total cost =</span>
                <span id="res-val">—</span>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Operation</span>
            <span class="info-value" id="val-op" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Lines vs N</span>
            <span class="info-value" id="val-lines" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Min Uncovered Value</span>
            <span class="info-value" id="val-min" style="color: var(--accent-red);">—</span>
        </div>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#21262d;"></span> Matrix Element</div>
        <div class="legend-item"><span class="dot" style="background:rgba(63, 185, 80, 0.1); border-color:var(--accent-green)"></span> Zero (0)</div>
        <div class="legend-item"><span class="dot" style="background:var(--line-color);"></span> Covering Line</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-red); box-shadow:0 0 8px var(--accent-red)"></span> Min Target</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border-color:#fff"></span> Final Optimal Assignment</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let originalMatrix = [[3, 5], [2, 4]];
        let N = 2;
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample('[[3, 5], [2, 4]]'); }

        function loadExample(mStr) {
            document.getElementById('m-input').value = mStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                const valStr = document.getElementById('m-input').value;
                let parsed = JSON.parse(valStr);
                
                if (!Array.isArray(parsed) || !Array.isArray(parsed[0])) throw "Must be 2D array";
                N = parsed.length;
                for (let i=0; i<N; i++) {
                    if (parsed[i].length !== N) throw "Matrix must be square (N x N).";
                }
                
                originalMatrix = parsed;
                buildGridDom();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Expected a square 2D JSON array (e.g., [[3,5],[2,4]]).");
            }
        }

        function buildGridDom() {
            const container = document.getElementById('matrix-container');
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${N}, 60px)`;
            
            for(let r = 0; r < N; r++) {
                for(let c = 0; c < N; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'matrix-cell';
                    cell.id = `cell-${r}-${c}`;
                    container.appendChild(cell);
                }
            }
        }

        function deepCopy(arr) {
            return arr.map(row => [...row]);
        }

        function generateSteps() {
            steps = [];
            let mat = deepCopy(originalMatrix);

            steps.push({
                type: 'init', mat: deepCopy(mat),
                panel: `<b>Hungarian Algorithm Initialization</b><br>We begin with the <b>${N}x${N}</b> cost matrix. The goal is to find an assignment with the minimum total cost.`,
                statusText: `Ready to start.`,
                log: `Initialized ${N}x${N} matrix.`
            });

            // 1. Row Reduction
            let rowMins = [];
            for(let i=0; i<N; i++) {
                let min = Math.min(...mat[i]);
                rowMins.push(min);
            }
            steps.push({
                type: 'row_min', mat: deepCopy(mat), rowMins: rowMins,
                panel: `<b>Step 1: Row Reduction</b><br>First, we find the minimum value in each row: [${rowMins.join(', ')}].`,
                statusText: `Finding row minimums...`,
                log: `\nRow Reduction: Minimums are [${rowMins.join(', ')}]`
            });

            for(let i=0; i<N; i++) {
                for(let j=0; j<N; j++) {
                    mat[i][j] -= rowMins[i];
                }
            }
            steps.push({
                type: 'row_sub', mat: deepCopy(mat),
                panel: `<b>Step 1: Row Reduction</b><br>Subtract the minimum value of each row from all elements in that row.`,
                statusText: `Row minimums subtracted.`,
                log: `Subtracted row minimums from each row.`
            });

            // 2. Col Reduction
            let colMins = [];
            for(let j=0; j<N; j++) {
                let min = Infinity;
                for(let i=0; i<N; i++) min = Math.min(min, mat[i][j]);
                colMins.push(min);
            }
            steps.push({
                type: 'col_min', mat: deepCopy(mat), colMins: colMins,
                panel: `<b>Step 2: Column Reduction</b><br>Next, we find the minimum value in each column: [${colMins.join(', ')}].`,
                statusText: `Finding column minimums...`,
                log: `\nColumn Reduction: Minimums are [${colMins.join(', ')}]`
            });

            for(let j=0; j<N; j++) {
                for(let i=0; i<N; i++) {
                    mat[i][j] -= colMins[j];
                }
            }
            steps.push({
                type: 'col_sub', mat: deepCopy(mat),
                panel: `<b>Step 2: Column Reduction</b><br>Subtract the minimum value of each column from all elements in that column. Matrix is now fully reduced.`,
                statusText: `Column minimums subtracted.`,
                log: `Subtracted col minimums from each col.`
            });

            let optimal = false;
            let matchU = [];
            let iterations = 0;

            while(!optimal && iterations < 10) { // Safety break
                iterations++;

                // Find bipartite matching
                matchU = new Array(N).fill(-1);
                let matchV = new Array(N).fill(-1);
                
                function dfsMatch(u, visited) {
                    for(let v=0; v<N; v++) {
                        if(mat[u][v] === 0 && !visited[v]) {
                            visited[v] = true;
                            if(matchV[v] === -1 || dfsMatch(matchV[v], visited)) {
                                matchV[v] = u;
                                matchU[u] = v;
                                return true;
                            }
                        }
                    }
                    return false;
                }

                let matchCount = 0;
                for(let i=0; i<N; i++) {
                    let visited = new Array(N).fill(false);
                    if(dfsMatch(i, visited)) matchCount++;
                }

                // Min vertex cover
                let markedU = new Array(N).fill(false);
                let markedV = new Array(N).fill(false);
                let q = [];
                for(let i=0; i<N; i++) {
                    if(matchU[i] === -1) {
                        markedU[i] = true;
                        q.push(i);
                    }
                }

                while(q.length > 0) {
                    let u = q.shift();
                    for(let v=0; v<N; v++) {
                        if(mat[u][v] === 0 && matchU[u] !== v && !markedV[v]) {
                            markedV[v] = true;
                            if(matchV[v] !== -1 && !markedU[matchV[v]]) {
                                markedU[matchV[v]] = true;
                                q.push(matchV[v]);
                            }
                        }
                    }
                }

                let coveredRows = [];
                let coveredCols = [];
                for(let i=0; i<N; i++) {
                    if(!markedU[i]) coveredRows.push(i);
                    if(markedV[i]) coveredCols.push(i);
                }

                let totalLines = coveredRows.length + coveredCols.length;

                steps.push({
                    type: 'cover', mat: deepCopy(mat), coveredRows: coveredRows, coveredCols: coveredCols, lines: totalLines,
                    panel: `<b>Step 3: Cover Zeros</b><br>Draw the minimum number of lines to cover all zeros in the matrix.<br>Number of lines drawn: <b style="color:var(--accent-orange)">${totalLines}</b>.`,
                    statusText: `Covering zeros with lines...`,
                    log: `\nCover Zeros: Drawn ${totalLines} lines to cover all zeros.`
                });

                if(totalLines === N) {
                    optimal = true;
                    steps.push({
                        type: 'optimal', mat: deepCopy(mat), coveredRows: coveredRows, coveredCols: coveredCols, lines: totalLines,
                        panel: `<b>Check Optimality:</b> Number of lines (${totalLines}) <b style="color:var(--accent-green)">EQUALS</b> matrix size N (${N}).<br>An optimal assignment exists! Proceeding to final assignment.`,
                        statusText: `Optimal configuration reached!`,
                        log: `Lines (${totalLines}) == N (${N}). Optimal assignment found.`,
                        logColor: 'var(--accent-green)'
                    });
                } else {
                    // Find min uncovered
                    let minUncovered = Infinity;
                    let minCoords = [];
                    for(let i=0; i<N; i++) {
                        for(let j=0; j<N; j++) {
                            if(!coveredRows.includes(i) && !coveredCols.includes(j)) {
                                if (mat[i][j] < minUncovered) {
                                    minUncovered = mat[i][j];
                                    minCoords = [{r: i, c: j}];
                                } else if (mat[i][j] === minUncovered) {
                                    minCoords.push({r: i, c: j});
                                }
                            }
                        }
                    }

                    steps.push({
                        type: 'min_uncovered', mat: deepCopy(mat), coveredRows: coveredRows, coveredCols: coveredCols, minUncovered: minUncovered, minCoords: minCoords, lines: totalLines,
                        panel: `<b>Check Optimality:</b> Number of lines (${totalLines}) <b style="color:var(--accent-red)">is LESS THAN</b> matrix size N (${N}).<br>We must adjust the matrix. Find the minimum uncovered value: <b style="color:var(--accent-red)">${minUncovered}</b>.`,
                        statusText: `Sub-optimal. Finding minimum uncovered value...`,
                        log: `Lines (${totalLines}) < N (${N}). Min uncovered value is ${minUncovered}.`
                    });

                    // Adjust matrix
                    for(let i=0; i<N; i++) {
                        for(let j=0; j<N; j++) {
                            if(!coveredRows.includes(i) && !coveredCols.includes(j)) {
                                mat[i][j] -= minUncovered;
                            } else if(coveredRows.includes(i) && coveredCols.includes(j)) {
                                mat[i][j] += minUncovered;
                            }
                        }
                    }

                    steps.push({
                        type: 'adjusted', mat: deepCopy(mat), coveredRows: [], coveredCols: [], lines: 0,
                        panel: `<b>Step 4: Matrix Adjustment</b><br>Subtract ${minUncovered} from all uncovered elements, and add ${minUncovered} to all elements covered by TWO lines (intersections).<br>Repeating the Line Covering step...`,
                        statusText: `Matrix adjusted. Restarting cover process.`,
                        log: `Adjusted matrix. Subtract ${minUncovered} from uncovered, add to double-covered.`
                    });
                }
            }

            // Assignment Result
            let totalCost = 0;
            let assignmentList = [];
            for(let i=0; i<N; i++) {
                let j = matchU[i];
                let cost = originalMatrix[i][j];
                totalCost += cost;
                assignmentList.push(`  Row ${i} ➔ Col ${j} (Cost: ${cost})`);
            }

            steps.push({
                type: 'final', mat: deepCopy(mat), matchU: matchU, origMat: originalMatrix,
                panel: `<b>Algorithm Complete!</b><br>The selected zeros represent the optimal independent assignment.<br>Total Minimum Cost: <b style="color:var(--accent-green); font-size:18px;">${totalCost}</b>`,
                complete: true, result: totalCost,
                statusText: `Finished.`,
                log: `\nFinal Optimal Assignment:\n${assignmentList.join('\n')}\nTotal Minimum Cost: ${totalCost}`,
                logColor: 'var(--accent-blue)'
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Matrix
            for(let r=0; r<N; r++){
                for(let c=0; c<N; c++){
                    let cell = document.getElementById(`cell-${r}-${c}`);
                    if(!cell) continue;

                    // Text value
                    if (step.type === 'final') {
                        // In final step, show original costs
                        cell.innerText = originalMatrix[r][c];
                    } else {
                        cell.innerText = step.mat[r][c];
                    }

                    // Reset Classes
                    cell.className = 'matrix-cell';
                    if (step.mat[r][c] === 0) cell.classList.add('highlight-zero');

                    // Row/Col Highlights
                    if (step.type === 'row_min' && step.rowMins) {
                        if (step.mat[r][c] === step.rowMins[r]) cell.classList.add('highlight-min');
                    }
                    if (step.type === 'col_min' && step.colMins) {
                        if (step.mat[r][c] === step.colMins[c]) cell.classList.add('highlight-min');
                    }

                    // Line Covers
                    if (step.coveredRows && step.coveredRows.includes(r)) cell.classList.add('covered-row');
                    if (step.coveredCols && step.coveredCols.includes(c)) cell.classList.add('covered-col');

                    // Min Uncovered
                    if (step.type === 'min_uncovered' && step.minCoords) {
                        step.minCoords.forEach(coord => {
                            if (coord.r === r && coord.c === c) cell.classList.add('highlight-min');
                        });
                    }

                    // Final Assignment
                    if (step.type === 'final' && step.matchU) {
                        if (step.matchU[r] === c) cell.classList.add('highlight-assign');
                    }
                }
            }

            // Update Stats
            document.getElementById('stat-n').innerText = N;
            document.getElementById('stat-lines').innerText = step.lines !== undefined ? step.lines : '—';
            
            let statusStr = "Running";
            if (step.type === 'optimal' || step.type === 'final') statusStr = "Optimal";
            if (step.type === 'init') statusStr = "Initializing";
            document.getElementById('stat-opt').innerText = statusStr;
            document.getElementById('stat-opt').style.color = statusStr === "Optimal" ? "var(--accent-green)" : "var(--text-dim)";

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            let opStr = "—";
            if (step.type.includes('row')) opStr = "Row Reduction";
            if (step.type.includes('col')) opStr = "Column Reduction";
            if (step.type.includes('cover')) opStr = "Draw Lines";
            if (step.type === 'min_uncovered' || step.type === 'adjusted') opStr = "Adjust Matrix";
            if (step.type === 'optimal' || step.type === 'final') opStr = "Assign";
            document.getElementById('val-op').innerText = opStr;

            let eqStr = "—";
            if (step.lines !== undefined) {
                eqStr = `${step.lines} ${step.lines === N ? '==' : '<'} ${N}`;
            }
            document.getElementById('val-lines').innerText = eqStr;
            document.getElementById('val-min').innerText = step.minUncovered !== undefined ? step.minUncovered : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
