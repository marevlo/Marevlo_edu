<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Problem (Hungarian Algorithm) - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* covering lines / answer        */
            --accent-blue:   #06b6d4;   /* reduction targets / chrome     */
            --accent-green:  #22c55e;   /* zeros / chosen assignment      */
            --accent-red:    #f43f5e;   /* min uncovered value            */
            --accent-purple: #a855f7;   /* current operation              */
            --line-color: rgba(245, 165, 36, 0.85);
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 130px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"].med-input { width: 300px; }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .grid-stage { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; padding: 30px 22px; display: flex; justify-content: center; align-items: center; gap: 34px; flex-wrap: wrap; }
        .grid-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .grid-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        /* -- cost matrix -- */
        .matrix-block { display: grid; gap: 6px; }
        .matrix-block .corner { background: transparent; border: none; box-shadow: none; }
        .matrix-block .head {
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 12px; font-weight: 800; letter-spacing: 0.4px;
            color: var(--text-dim); width: 52px; height: 26px; text-transform: none;
            transition: color 0.3s;
        }
        .matrix-block .head.lit { color: var(--accent-purple); }
        .matrix-block .head.lit2 { color: var(--accent-blue); }
        .matrix-block .head.assigned { color: var(--accent-green); }
        .matrix-cell {
            position: relative; width: 52px; height: 52px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 19px; font-weight: 800;
            border-radius: 10px; border: 2px solid var(--border-main);
            background: rgba(255,255,255,0.04); color: var(--text-main); will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .matrix-cell.zero { color: var(--accent-green); border-color: rgba(34,197,94,0.55); background: rgba(34,197,94,0.10); }
        .matrix-cell.rowmin { border-color: var(--accent-blue); background: rgba(6,182,212,0.16); color: #a5f3fc; box-shadow: 0 0 14px rgba(6,182,212,0.35); }
        .matrix-cell.colmin { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 14px rgba(168,85,247,0.35); }
        .matrix-cell.minu { border-color: var(--accent-red); background: rgba(244,63,94,0.14); color: #fecdd3; box-shadow: 0 0 18px rgba(244,63,94,0.5); transform: scale(1.08); z-index: 4; }
        .matrix-cell.assign { border-color: var(--accent-orange); background: linear-gradient(180deg, rgba(245,165,36,0.9), rgba(227,150,30,0.9)); color: #2a1903; box-shadow: 0 0 20px rgba(245,165,36,0.55); transform: scale(1.10); z-index: 6; }
        /* covering lines */
        .matrix-cell.cov-row::before {
            content: ''; position: absolute; top: 50%; left: -9px; right: -9px; height: 4px;
            background: var(--line-color); transform: translateY(-50%); z-index: 8; pointer-events: none;
            border-radius: 2px; box-shadow: 0 0 8px rgba(245,165,36,0.6);
        }
        .matrix-cell.cov-col::after {
            content: ''; position: absolute; left: 50%; top: -9px; bottom: -9px; width: 4px;
            background: var(--line-color); transform: translateX(-50%); z-index: 8; pointer-events: none;
            border-radius: 2px; box-shadow: 0 0 8px rgba(245,165,36,0.6);
        }

        /* -- assignment summary tiles -- */
        .assign-panel { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; min-width: 196px; }
        .assign-title { font-family: var(--mono); font-size: 11px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .assign-rows { display: flex; flex-direction: column; gap: 7px; }
        .assign-pair {
            display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 13px;
            padding: 6px 11px; border-radius: 10px; border: 1px solid var(--border-main);
            background: rgba(255,255,255,0.03); color: var(--text-dim);
            transition: border-color 0.35s, background 0.35s, color 0.35s, transform 0.3s; transform: translateX(-6px); opacity: 0.35;
        }
        .assign-pair.on { border-color: rgba(245,165,36,0.5); background: rgba(245,165,36,0.12); color: #ffd591; transform: translateX(0); opacity: 1; }
        .assign-pair .arrow { color: var(--accent-orange); font-weight: 800; }
        .assign-pair .cost { margin-left: auto; color: var(--text-main); font-weight: 800; }
        .assign-pair.on .cost { color: #ffe7bd; }
        .assign-total { font-family: var(--mono); font-size: 14px; color: var(--text-dim); margin-top: 2px; }
        .assign-total b { color: var(--accent-green); font-size: 22px; font-weight: 800; transition: color 0.3s; }
        .assign-total.lit b { text-shadow: 0 0 18px rgba(34,197,94,0.6); }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 18px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); } .pill.b b { color: var(--accent-orange); } .pill.g b { color: var(--accent-green); } .pill.r b { color: var(--accent-red); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 120px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">cost matrix =</label>
        <input type="text" id="m-input" class="med-input" placeholder="[[3, 5], [2, 4]]">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample('[[3, 5], [2, 4]]')">Ex 1</button>
        <button onclick="loadExample('[[1, 2, 3], [4, 5, 6], [7, 8, 9]]')">Ex 2</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Assignment Problem <span class="sub">&middot; Hungarian Algorithm &middot; min &Sigma; cost of a perfect worker&#8594;job matching &middot; O(n&sup3;)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="grid-stage" id="grid-stage">
                    <div class="matrix-block" id="matrix-container"></div>
                    <div class="assign-panel">
                        <div class="assign-title">Assignment</div>
                        <div class="assign-rows" id="assign-rows"></div>
                        <div class="assign-total" id="assign-total">min cost = <b id="assign-total-val">&mdash;</b></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill c">operation <b id="st-op">&mdash;</b></span>
                            <span class="pill b">lines vs N <b id="st-lines">&mdash;</b></span>
                            <span class="pill r">min uncovered <b id="st-min">&mdash;</b></span>
                            <span class="pill g">min cost <b id="st-ans">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // --------- Motion engine (spring pop, zero deps) ---------
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.55 + 0.5 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // --------- State ---------
        let originalMatrix = [[3, 5], [2, 4]];
        let N = 2;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        const delays = [2200, 1100, 520];
        const cellEls = {};   // 'r,c' -> matrix cell element

        // --------- Code panel (the real algorithm) ---------
        const CODE = [
            [['kw','def '],['fn','hungarian'],['src','(cost):  # n x n']],
            [['src','  for i in rows: cost[i] -= min(cost[i])']],
            [['src','  for j in cols: cost[:,j] -= min(cost[:,j])']],
            [['kw','  while '],['src','True:']],
            [['src','    lines = min lines covering all zeros']],
            [['kw','    if '],['src','lines == n: break          # optimal']],
            [['src','    d = min uncovered entry']],
            [['src','    uncovered -= d ; double-covered += d']],
            [['src','  match = max matching on zero cells']],
            [['kw','  return '],['src','sum(orig[i][match[i]])']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // --------- step generation (genuine Hungarian simulation) ---------
        function deepCopy(arr) { return arr.map(row => row.slice()); }

        function generateSteps() {
            steps = [];
            let mat = deepCopy(originalMatrix);

            const snap = (extra) => Object.assign({
                mat: deepCopy(mat), rowMin: null, colMin: null,
                coveredRows: [], coveredCols: [], minCoords: [], minUncovered: undefined,
                lines: undefined, op: '\u2014', assignment: null, showCost: false,
            }, extra);

            steps.push(snap({
                code: [0],
                op: 'Init',
                panel: `Minimize the total cost of a perfect worker&#8594;job assignment on this <b>${N}&times;${N}</b> cost matrix. Pick exactly one cell per row and per column so the sum is smallest.`,
                log: `init  ${N}x${N} cost matrix`
            }));

            // -- Step 1: row reduction --
            const rowMins = mat.map(r => Math.min(...r));
            steps.push(snap({
                code: [1], op: 'Row reduce', rowMin: rowMins.slice(),
                panel: `<b>Row reduction.</b> Find the smallest entry of each row &#8594; <code>[${rowMins.join(', ')}]</code>. Subtracting it from its row creates a zero without changing which assignment is optimal.`,
                log: `row mins = [${rowMins.join(', ')}]`
            }));
            for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) mat[i][j] -= rowMins[i];
            steps.push(snap({
                code: [1], op: 'Row reduce',
                panel: `<b>Row reduction done.</b> Each row now contains at least one <code>0</code> (shown green). Cost differences are preserved.`,
                log: `subtracted row mins`
            }));

            // -- Step 2: column reduction --
            const colMins = [];
            for (let j = 0; j < N; j++) { let m = Infinity; for (let i = 0; i < N; i++) m = Math.min(m, mat[i][j]); colMins.push(m); }
            steps.push(snap({
                code: [2], op: 'Col reduce', colMin: colMins.slice(),
                panel: `<b>Column reduction.</b> Find the smallest entry of each column &#8594; <code>[${colMins.join(', ')}]</code> and subtract it from its column.`,
                log: `col mins = [${colMins.join(', ')}]`
            }));
            for (let j = 0; j < N; j++) for (let i = 0; i < N; i++) mat[i][j] -= colMins[j];
            steps.push(snap({
                code: [2], op: 'Col reduce',
                panel: `<b>Reduced matrix ready.</b> Every row and column owns a <code>0</code>. We now test whether the zeros already permit a full assignment.`,
                log: `subtracted col mins`
            }));

            // -- Step 3+: cover / adjust loop --
            let optimal = false, matchU = [], iterations = 0;
            while (!optimal && iterations < 30) {
                iterations++;

                // maximum matching on zero cells (Kuhn)
                matchU = new Array(N).fill(-1);
                const matchV = new Array(N).fill(-1);
                function dfsMatch(u, visited) {
                    for (let v = 0; v < N; v++) {
                        if (mat[u][v] === 0 && !visited[v]) {
                            visited[v] = true;
                            if (matchV[v] === -1 || dfsMatch(matchV[v], visited)) { matchV[v] = u; matchU[u] = v; return true; }
                        }
                    }
                    return false;
                }
                for (let i = 0; i < N; i++) { dfsMatch(i, new Array(N).fill(false)); }

                // Konig minimum vertex cover from the matching
                const markedU = new Array(N).fill(false), markedV = new Array(N).fill(false), q = [];
                for (let i = 0; i < N; i++) if (matchU[i] === -1) { markedU[i] = true; q.push(i); }
                while (q.length) {
                    const u = q.shift();
                    for (let v = 0; v < N; v++) {
                        if (mat[u][v] === 0 && matchU[u] !== v && !markedV[v]) {
                            markedV[v] = true;
                            if (matchV[v] !== -1 && !markedU[matchV[v]]) { markedU[matchV[v]] = true; q.push(matchV[v]); }
                        }
                    }
                }
                const coveredRows = [], coveredCols = [];
                for (let i = 0; i < N; i++) { if (!markedU[i]) coveredRows.push(i); if (markedV[i]) coveredCols.push(i); }
                const totalLines = coveredRows.length + coveredCols.length;

                steps.push(snap({
                    code: [3, 4], op: 'Cover zeros', coveredRows: coveredRows.slice(), coveredCols: coveredCols.slice(), lines: totalLines,
                    panel: `<b>Cover all zeros</b> with the fewest straight lines. Here <code>${totalLines}</code> ${totalLines === 1 ? 'line covers' : 'lines cover'} every zero (orange).`,
                    log: `cover: ${totalLines} line${totalLines === 1 ? '' : 's'} cover all zeros`
                }));

                if (totalLines === N) {
                    optimal = true;
                    steps.push(snap({
                        code: [5], op: 'Optimal', coveredRows: coveredRows.slice(), coveredCols: coveredCols.slice(), lines: totalLines,
                        panel: `Lines <code>${totalLines}</code> <b>=</b> N <code>${N}</code> &#8594; the zeros already admit a complete assignment. <b>Optimal!</b>`,
                        log: `lines (${totalLines}) == N (${N}) -> optimal`,
                        logColor: 'var(--accent-green)'
                    }));
                } else {
                    let minU = Infinity, minCoords = [];
                    for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) {
                        if (!coveredRows.includes(i) && !coveredCols.includes(j)) {
                            if (mat[i][j] < minU) { minU = mat[i][j]; minCoords = [[i, j]]; }
                            else if (mat[i][j] === minU) minCoords.push([i, j]);
                        }
                    }
                    steps.push(snap({
                        code: [5, 6], op: 'Find min', coveredRows: coveredRows.slice(), coveredCols: coveredCols.slice(), lines: totalLines,
                        minUncovered: minU, minCoords: minCoords.slice(),
                        panel: `Lines <code>${totalLines}</code> <b>&lt;</b> N <code>${N}</code> &#8594; not optimal yet. Find the smallest <b>uncovered</b> entry: <code>${minU}</code> (red).`,
                        log: `lines (${totalLines}) < N (${N}); min uncovered = ${minU}`
                    }));
                    for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) {
                        const rc = coveredRows.includes(i), cc = coveredCols.includes(j);
                        if (!rc && !cc) mat[i][j] -= minU;
                        else if (rc && cc) mat[i][j] += minU;
                    }
                    steps.push(snap({
                        code: [7], op: 'Adjust',
                        panel: `<b>Adjust.</b> Subtract <code>${minU}</code> from every uncovered cell and add <code>${minU}</code> to cells covered twice (line intersections). New zeros appear &#8594; cover again.`,
                        log: `adjust: -${minU} uncovered, +${minU} double-covered`
                    }));
                }
            }

            // -- final assignment & cost --
            let totalCost = 0; const lines = [];
            for (let i = 0; i < N; i++) { const j = matchU[i]; const c = originalMatrix[i][j]; totalCost += c; lines.push(`R${i}->C${j}=${c}`); }

            steps.push(snap({
                code: [8, 9], op: 'Assign', assignment: matchU.slice(), showCost: true, complete: true, confetti: false,
                result: totalCost,
                panel: `<b>Done.</b> The chosen zeros give a perfect assignment; reading the original costs back, the minimum total cost is <b>${totalCost}</b>.`,
                log: `assign: ${lines.join('  ')}  |  min cost = ${totalCost}`,
                logColor: 'var(--accent-orange)'
            }));
        }

        // --------- render (persistent DOM) ---------
        function buildGridDom() {
            const container = document.getElementById('matrix-container');
            container.innerHTML = '';
            Object.keys(cellEls).forEach(k => delete cellEls[k]);
            // header row + (header col + N cells) per row
            container.style.gridTemplateColumns = `repeat(${N + 1}, auto)`;

            // top-left corner
            const corner = document.createElement('div'); corner.className = 'corner head'; container.appendChild(corner);
            // column headers (jobs)
            for (let c = 0; c < N; c++) {
                const h = document.createElement('div'); h.className = 'head'; h.id = `colh-${c}`; h.textContent = 'J' + c; container.appendChild(h);
            }
            for (let r = 0; r < N; r++) {
                const rh = document.createElement('div'); rh.className = 'head'; rh.id = `rowh-${r}`; rh.textContent = 'W' + r; container.appendChild(rh);
                for (let c = 0; c < N; c++) {
                    const cell = document.createElement('div'); cell.className = 'matrix-cell'; cell.id = `cell-${r}-${c}`;
                    cellEls[`${r},${c}`] = cell; container.appendChild(cell);
                }
            }

            // assignment summary rows
            const rowsEl = document.getElementById('assign-rows'); rowsEl.innerHTML = '';
            for (let r = 0; r < N; r++) {
                const p = document.createElement('div'); p.className = 'assign-pair'; p.id = `apair-${r}`;
                p.innerHTML = `<span>W${r}</span><span class="arrow">&#8594;</span><span id="apair-j-${r}">J?</span><span class="cost" id="apair-c-${r}">&mdash;</span>`;
                rowsEl.appendChild(p);
            }
        }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            const rowMinSet = step.rowMin;
            const colMinSet = step.colMin;
            const minSet = new Set((step.minCoords || []).map(c => c[0] + ',' + c[1]));
            const assign = step.assignment;

            for (let r = 0; r < N; r++) {
                for (let c = 0; c < N; c++) {
                    const cell = cellEls[`${r},${c}`]; if (!cell) continue;
                    const v = step.showCost ? originalMatrix[r][c] : step.mat[r][c];
                    const prev = cell.textContent;
                    const newTxt = String(v);
                    cell.textContent = newTxt;

                    let cls = 'matrix-cell';
                    if (!step.showCost && step.mat[r][c] === 0) cls += ' zero';
                    // reduction-target highlight (only on the row/col reduce steps)
                    if (rowMinSet && !step.showCost && step.mat[r][c] === rowMinSet[r]) cls += ' rowmin';
                    if (colMinSet && !step.showCost && step.mat[r][c] === colMinSet[c]) cls += ' colmin';
                    if (minSet.has(r + ',' + c)) cls += ' minu';
                    if (step.coveredRows && step.coveredRows.includes(r)) cls += ' cov-row';
                    if (step.coveredCols && step.coveredCols.includes(c)) cls += ' cov-col';
                    if (assign && assign[r] === c) cls += ' assign';

                    cell.className = cls;
                    if (prev !== newTxt) Motion.pop(cell);
                }
            }

            // header lighting
            for (let r = 0; r < N; r++) {
                const rh = document.getElementById(`rowh-${r}`); if (rh) { rh.className = 'head' + (assign ? ' assigned' : (rowMinSet ? ' lit' : '')); }
            }
            for (let c = 0; c < N; c++) {
                const ch = document.getElementById(`colh-${c}`); if (ch) { ch.className = 'head' + (assign ? ' assigned' : (colMinSet ? ' lit2' : '')); }
            }

            // assignment summary
            for (let r = 0; r < N; r++) {
                const p = document.getElementById(`apair-${r}`);
                const jEl = document.getElementById(`apair-j-${r}`);
                const cEl = document.getElementById(`apair-c-${r}`);
                if (!p) continue;
                if (assign) {
                    const j = assign[r];
                    p.classList.add('on');
                    jEl.textContent = 'J' + j;
                    cEl.textContent = originalMatrix[r][j];
                } else {
                    p.classList.remove('on');
                    jEl.textContent = 'J?';
                    cEl.textContent = '\u2014';
                }
            }
            const tot = document.getElementById('assign-total'); const totVal = document.getElementById('assign-total-val');
            if (step.showCost) { totVal.textContent = step.result; tot.classList.add('lit'); }
            else { totVal.textContent = '\u2014'; tot.classList.remove('lit'); }

            // narration
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);

            highlightCode(step.code);

            // state pills
            document.getElementById('st-op').textContent = step.op || '\u2014';
            document.getElementById('st-lines').textContent = (step.lines !== undefined) ? `${step.lines} ${step.lines === N ? '=' : '<'} ${N}` : '\u2014';
            document.getElementById('st-min').textContent = (step.minUncovered !== undefined) ? step.minUncovered : '\u2014';
            document.getElementById('st-ans').textContent = step.showCost ? step.result : '\u2026';

            // badge + progress
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            // log
            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s =>
                `<div style="margin:3px 0;white-space:pre-wrap;${s.logColor ? 'color:' + s.logColor + ';' : ''}">${s.log}</div>`
            ).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        // --------- controls ---------
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function loadMatrix(parsed) {
            pause();
            originalMatrix = parsed; N = parsed.length;
            buildGridDom(); generateSteps(); renderStep(0);
        }
        function loadCustom() {
            try {
                const parsed = JSON.parse(document.getElementById('m-input').value);
                if (!Array.isArray(parsed) || !Array.isArray(parsed[0])) throw 0;
                const n = parsed.length;
                for (let i = 0; i < n; i++) { if (!Array.isArray(parsed[i]) || parsed[i].length !== n) throw 0; for (const x of parsed[i]) if (typeof x !== 'number' || !isFinite(x)) throw 0; }
                loadMatrix(parsed);
            } catch (e) {
                alert('Invalid format. Expected a square 2-D numeric JSON array, e.g. [[3,5],[2,4]].');
            }
        }
        function loadExample(mStr) {
            document.getElementById('m-input').value = mStr;
            loadCustom();
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('m-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => { if (steps.length) renderStep(stepIdx); });

        buildCodePanel();
        window.onload = () => loadExample('[[3, 5], [2, 4]]');
    </script>
</body>
</html>
