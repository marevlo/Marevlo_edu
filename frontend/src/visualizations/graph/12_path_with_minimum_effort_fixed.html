<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path with Minimum Effort - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .large-input { width: 350px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            min-width: 350px;
        }

        #grid-container {
            display: grid;
            gap: 8px;
        }

        .grid-cell {
            width: 60px;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #21262d;
            border: 2px solid var(--border-main);
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .h-val { font-size: 18px; font-weight: bold; color: var(--text-main); font-family: 'Courier New', monospace;}
        .e-val { font-size: 11px; color: var(--text-dim); font-family: monospace; background: var(--bg-input); padding: 2px 4px; border-radius: 4px; margin-top: 2px; border: 1px solid var(--border-main);}

        /* Cell States */
        .grid-cell.in-pq { border-color: var(--accent-blue); box-shadow: inset 0 0 12px rgba(56,139,253,0.2); }
        .grid-cell.processed { background: #0f2a1a; border-color: var(--accent-green); }
        .grid-cell.processed .h-val { color: var(--accent-green); }
        .grid-cell.active-node { border-color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 15px rgba(227,179,65,0.4); z-index: 2; background: #332200; }
        .grid-cell.active-node .h-val { color: var(--accent-orange); }
        .grid-cell.neighbor-node { border-color: var(--accent-purple); transform: scale(1.1); box-shadow: 0 0 10px rgba(163,113,247,0.4); z-index: 2; }
        .grid-cell.final-path { background: var(--accent-green); border-color: #fff; box-shadow: 0 0 15px var(--accent-green); transform: scale(1.05); z-index: 3;}
        .grid-cell.final-path .h-val { color: #000; }
        .grid-cell.final-path .e-val { background: #000; color: var(--accent-green); border-color: #000;}

        /* Queue Side */
        .arrays-col { display: flex; flex-direction: column; gap: 20px; min-width: 320px; max-width: 400px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 150px; max-height: 340px; overflow-y: auto;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .pq-tile {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            background: #0d213f; border: 1px solid var(--accent-blue); color: var(--text-main);
            padding: 6px 12px; border-radius: 6px; font-family: monospace; font-size: 13px;
        }
        .pq-tile .eff { color: var(--accent-orange); font-weight: bold; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 700px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 700px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 12px var(--accent-green); font-size: 28px !important;}

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">grid =</label>
        <input type="text" id="g-input" class="large-input" placeholder="[[1,2,2],[3,8,2],[5,3,5]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[[1,2,2],[3,8,2],[5,3,5]]')">Ex 1</button>
        <button onclick="loadExample('[[1,2,3],[3,8,4],[5,3,5]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area">
            <div id="grid-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">Priority Queue (Min-Heap):</div>
                <div class="tiles-wrapper" id="pq-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 8px;">Sorted by Effort ascending. Format: [Effort, (r, c)]</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Cell (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Neighbor Cell (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Edge Diff |u - v|</span>
            <span class="info-value" id="val-diff" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">minimum effort =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-input); border:1px solid var(--border-main)"></span> E: Current Effort</div>
        <div class="legend-item"><span class="dot" style="background:#0d213f; border:1px solid var(--accent-blue)"></span> In Priority Queue</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Processed / Settled</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border:2px solid var(--accent-orange)"></span> Active Popped Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border:2px solid var(--accent-purple)"></span> Neighbor Evaluation</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let grid = [[1,2,2],[3,8,2],[5,3,5]];
        let M = 3;
        let N = 3;
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];
        const INF = Infinity;

        function init() { loadExample('[[1,2,2],[3,8,2],[5,3,5]]'); }

        function loadExample(jsonStr) {
            document.getElementById('g-input').value = jsonStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                const valStr = document.getElementById('g-input').value;
                grid = JSON.parse(valStr);
                if (!Array.isArray(grid) || !Array.isArray(grid[0])) throw "Must be a 2D array";
                M = grid.length;
                N = grid[0].length;
                buildGridDom();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Expected a 2D JSON array (e.g., [[1,2],[3,4]]).");
            }
        }

        function buildGridDom() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${N}, 60px)`;
            
            for(let r = 0; r < M; r++) {
                for(let c = 0; c < N; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.id = `cell-${r}-${c}`;
                    container.appendChild(cell);
                }
            }
        }

        function deepCopy2D(arr) {
            return arr.map(row => [...row]);
        }
        function clonePQ(pq) {
            return pq.map(item => ({...item}));
        }

        function generateSteps() {
            steps = [];
            
            let efforts = Array.from({length: M}, () => new Array(N).fill(INF));
            let parents = Array.from({length: M}, () => new Array(N).fill(null));
            let processed = new Set();
            let pq = []; // Min-Heap representation: array of {eff, r, c}

            efforts[0][0] = 0;
            pq.push({eff: 0, r: 0, c: 0});

            steps.push({
                type: 'init',
                efforts: deepCopy2D(efforts), pq: clonePQ(pq), processed: new Set(processed),
                active: null, neighbor: null, diff: null,
                panel: `Initialize <b>Dijkstra's Algorithm</b> for Minimax Path.<br>Set Effort to <code>(0,0)</code> as 0. All others to ∞. Push <code>(0,0)</code> to Priority Queue.`,
                statusText: `Setup complete. Click Play to begin.`,
                log: `Initialized Dijkstra. Start node (0,0) pushed to PQ with effort 0.`
            });

            const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];

            while (pq.length > 0) {
                // Simulate min-heap pop
                pq.sort((a, b) => a.eff - b.eff);
                let curr = pq.shift();
                let r = curr.r, c = curr.c, currEff = curr.eff;

                let key = `${r},${c}`;
                if (processed.has(key)) continue;

                steps.push({
                    type: 'pop',
                    efforts: deepCopy2D(efforts), pq: clonePQ(pq), processed: new Set(processed),
                    active: {r, c}, neighbor: null, diff: null,
                    panel: `<b>Pop Min-Effort Node:</b> Extracted <code>(${r}, ${c})</code> with current path effort <b style="color:var(--accent-orange)">${currEff}</b>.`,
                    statusText: `Processing node (${r}, ${c})...`,
                    log: `\nPopped (${r}, ${c}) from PQ. Current path effort: ${currEff}.`
                });

                if (r === M - 1 && c === N - 1) {
                    processed.add(key);
                    steps.push({
                        type: 'reached',
                        efforts: deepCopy2D(efforts), pq: clonePQ(pq), processed: new Set(processed),
                        active: {r, c}, neighbor: null, diff: null,
                        panel: `<b>Target Reached!</b> We popped the destination <code>(${M-1}, ${N-1})</code>.<br>Dijkstra guarantees this is the minimum possible effort path.`,
                        statusText: `Destination reached!`,
                        log: `Destination (${M-1}, ${N-1}) reached with optimal effort ${currEff}. Terminating search.`
                    });
                    break;
                }

                processed.add(key);

                for (let [dr, dc] of dirs) {
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < M && nc >= 0 && nc < N) {
                        
                        let nKey = `${nr},${nc}`;
                        if (processed.has(nKey)) continue; // Optimization: skip processed

                        let diff = Math.abs(grid[r][c] - grid[nr][nc]);
                        let newEff = Math.max(currEff, diff);

                        steps.push({
                            type: 'check_neighbor',
                            efforts: deepCopy2D(efforts), pq: clonePQ(pq), processed: new Set(processed),
                            active: {r, c}, neighbor: {r: nr, c: nc}, diff: diff,
                            panel: `Evaluating neighbor <code>(${nr}, ${nc})</code>.<br>Height difference: <code>|${grid[r][c]} - ${grid[nr][nc]}| = ${diff}</code>.<br>New path max effort: <code>max(${currEff}, ${diff}) = ${newEff}</code>.`,
                            statusText: `Checking edge to (${nr}, ${nc})...`,
                            log: `  Checking neighbor (${nr}, ${nc}): diff = |${grid[r][c]} - ${grid[nr][nc]}| = ${diff}. New max effort = ${newEff}.`
                        });

                        if (newEff < efforts[nr][nc]) {
                            efforts[nr][nc] = newEff;
                            parents[nr][nc] = {r, c};
                            pq.push({eff: newEff, r: nr, c: nc});
                            
                            steps.push({
                                type: 'relax',
                                efforts: deepCopy2D(efforts), pq: clonePQ(pq), processed: new Set(processed),
                                active: {r, c}, neighbor: {r: nr, c: nc}, diff: diff,
                                panel: `Found a better path to <code>(${nr}, ${nc})</code>!<br>Update its effort to <b style="color:var(--accent-green)">${newEff}</b> and push it to the Priority Queue.`,
                                statusText: `Relaxed node (${nr}, ${nc}).`,
                                log: `    -> Improved! Updated effort to ${newEff} and pushed to PQ.`
                            });
                        } else {
                            steps.push({
                                type: 'skip',
                                efforts: deepCopy2D(efforts), pq: clonePQ(pq), processed: new Set(processed),
                                active: {r, c}, neighbor: {r: nr, c: nc}, diff: diff,
                                panel: `The new effort <b>${newEff}</b> is not better than the known effort <b>${efforts[nr][nc] === INF ? '∞' : efforts[nr][nc]}</b>.<br>Ignore this path.`,
                                statusText: `No improvement. Skipping.`,
                                log: `    -> No improvement (existing: ${efforts[nr][nc]}). Skipped.`
                            });
                        }
                    }
                }

                steps.push({
                    type: 'settled',
                    efforts: deepCopy2D(efforts), pq: clonePQ(pq), processed: new Set(processed),
                    active: null, neighbor: null, diff: null,
                    panel: `Finished checking neighbors for <code>(${r}, ${c})</code>.<br>Node is now marked as Processed/Settled.`,
                    statusText: `Settled node (${r}, ${c}).`,
                    log: `Settled node (${r}, ${c}).`
                });
            }

            // Trace path back
            let finalPath = [];
            let currNode = {r: M-1, c: N-1};
            while(currNode) {
                finalPath.push(`${currNode.r},${currNode.c}`);
                currNode = parents[currNode.r][currNode.c];
            }

            let finalEffort = efforts[M-1][N-1];

            steps.push({
                type: 'final',
                efforts: deepCopy2D(efforts), pq: clonePQ(pq), processed: new Set(processed),
                active: null, neighbor: null, diff: null, finalPath: finalPath,
                panel: `<b>Algorithm Complete!</b><br>The Minimum Effort path has a maximum jump height of <b style="color:var(--accent-green); font-size:18px;">${finalEffort}</b>.`,
                complete: true,
                result: finalEffort,
                statusText: `Finished.`,
                log: `\nFinal Minimum Effort: ${finalEffort}`,
                logColor: 'var(--accent-green)'
            });
        }

        function formatEff(val) {
            return val === INF ? '∞' : val;
        }

        function renderPQ(pq) {
            const container = document.getElementById('pq-tiles');
            container.innerHTML = '';
            
            if (pq.length === 0) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace;">{ empty }</span>';
                return;
            }

            // Sort just for display consistency
            let dispPq = [...pq].sort((a,b) => a.eff - b.eff);
            
            dispPq.forEach(item => {
                const tile = document.createElement('div');
                tile.className = 'pq-tile';
                tile.innerHTML = `[<span class="eff">${item.eff}</span>, (${item.r}, ${item.c})]`;
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Grid Nodes
            for(let r=0; r<M; r++){
                for(let c=0; c<N; c++){
                    let cell = document.getElementById(`cell-${r}-${c}`);
                    if(!cell) continue;

                    cell.className = 'grid-cell';

                    let effStr = formatEff(step.efforts[r][c]);
                    cell.innerHTML = `<div class="h-val">${grid[r][c]}</div><div class="e-val">E: ${effStr}</div>`;

                    let key = `${r},${c}`;

                    // Apply states strictly in visual priority order
                    if (step.finalPath && step.finalPath.includes(key)) {
                        cell.classList.add('final-path');
                    } else if (step.active && step.active.r === r && step.active.c === c) {
                        cell.classList.add('active-node');
                    } else if (step.neighbor && step.neighbor.r === r && step.neighbor.c === c) {
                        cell.classList.add('neighbor-node');
                    } else if (step.processed.has(key)) {
                        cell.classList.add('processed');
                    } else if (step.pq.some(item => item.r === r && item.c === c)) {
                        cell.classList.add('in-pq');
                    }
                }
            }

            renderPQ(step.pq);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.active !== null ? `(${step.active.r}, ${step.active.c})` : '—';
            document.getElementById('val-v').innerText = step.neighbor !== null ? `(${step.neighbor.r}, ${step.neighbor.c})` : '—';
            document.getElementById('val-diff').innerText = step.diff !== null ? step.diff : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
