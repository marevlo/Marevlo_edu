<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min-Cost Max-Flow &middot; Graph</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:300px;} .small-input{width:48px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto; position:relative;}
svg.graph{display:block; width:430px; max-width:100%; height:auto;}

.edge{stroke:var(--border-main); stroke-width:2; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.saturated{stroke:rgba(248,81,73,.45);}
.edge.spfa{stroke:var(--accent-purple); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.edge.path{stroke:var(--accent-orange); stroke-width:4; filter:drop-shadow(0 0 6px rgba(245,165,36,.6)); stroke-dasharray:8; animation:dash 1s linear infinite;}
.edge.residual{stroke-dasharray:4 4; opacity:.7;}

.elabel{font-family:var(--mono); font-weight:700; font-size:11px; text-anchor:middle; dominant-baseline:central; fill:var(--text-dim); transition:fill .35s;}
.elabel-bg{fill:#0c1322; stroke:var(--border-main); stroke-width:1; transition:stroke .35s;}
.edge-g.spfa-g .elabel{fill:#e9d5ff;} .edge-g.spfa-g .elabel-bg{stroke:var(--accent-purple);}
.edge-g.path-g .elabel{fill:#ffd591;} .edge-g.path-g .elabel-bg{stroke:var(--accent-orange);}
.edge-g.sat-g .elabel{fill:rgba(248,81,73,.85);} .edge-g.sat-g .elabel-bg{stroke:rgba(248,81,73,.4);}

.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s, stroke-width .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode.source .nc{stroke:var(--accent-blue); fill:rgba(6,182,212,.10); filter:drop-shadow(0 0 6px rgba(6,182,212,.4));}
.gnode.source .nl{fill:#a5f3fc;}
.gnode.sink .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.10); filter:drop-shadow(0 0 6px rgba(245,165,36,.4));}
.gnode.sink .nl{fill:#ffd591;}
.gnode.inqueue .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.10); filter:drop-shadow(0 0 6px rgba(168,85,247,.4)); stroke-width:2.5;}
.gnode.active .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.18); filter:drop-shadow(0 0 12px rgba(168,85,247,.6)); stroke-width:3;}
.gnode.active .nl{fill:#e9d5ff;}
.gnode.onpath .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.18); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.gnode.onpath .nl{fill:#ffd591;}

.side{display:flex; flex-direction:column; gap:12px; min-width:240px; flex:1 1 240px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel.s .cap{color:var(--accent-orange);} .panel.q .cap{color:var(--accent-purple);} .panel.d .cap{color:var(--accent-blue);}
.stat-row{display:flex; justify-content:space-between; align-items:center; font-family:var(--mono); font-size:13px; padding:4px 0; border-bottom:1px solid rgba(255,255,255,.06);}
.stat-row:last-child{border-bottom:none;}
.stat-row .lbl{color:var(--text-dim); font-size:12px;}
.stat-row .v{font-weight:800;}
.stat-row .v.flow{color:#a5f3fc;} .stat-row .v.cost{color:#bbf7d0;} .stat-row .v.bot{color:#ffd591;}
.tiles{display:flex; gap:8px; flex-wrap:wrap; min-height:48px; align-content:flex-start;}
.tcol{display:flex; flex-direction:column; align-items:center; gap:4px;}
.tcol .idx{font-family:var(--mono); font-size:10px; color:var(--text-dim);}
.tile{min-width:36px; height:34px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.tile.q{border-color:rgba(168,85,247,.45); background:rgba(168,85,247,.12); color:#e9d5ff;}
.tile.d{border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.12); color:#a5f3fc;}
.tile.upd{border-color:rgba(34,197,94,.5); background:rgba(34,197,94,.14); color:#bbf7d0;}
.tiles .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-purple);} .pill.n b{color:var(--text-main);} .pill.p b{color:var(--accent-orange);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-15;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>V =</label>
  <input type="text" id="v-input" class="small-input" value="3">
  <label>s =</label>
  <input type="text" id="s-input" class="small-input" value="0">
  <label>t =</label>
  <input type="text" id="t-input" class="small-input" value="2">
  <label>edges[u,v,cap,cost] =</label>
  <input type="text" id="e-input" class="large-input" value="[[0,1,2,3],[1,2,1,5]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(3,0,2,'[[0,1,2,3],[1,2,1,5]]')">Ex 1</button>
  <button onclick="loadExample(4,0,3,'[[0,1,2,1],[0,2,1,2],[1,3,2,1],[2,3,1,2]]')">Ex 2</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Min-Cost Max-Flow <span class="sub">&middot; cheapest augmenting paths (SPFA)</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 430 380"></svg></div>
      <div class="side">
        <div class="panel s">
          <div class="cap">NETWORK STATE</div>
          <div class="stat-row"><span class="lbl">Path bottleneck</span><span class="v bot" id="stat-bot">&minus;</span></div>
          <div class="stat-row"><span class="lbl">Total max flow</span><span class="v flow" id="stat-flow">0</span></div>
          <div class="stat-row"><span class="lbl">Total min cost</span><span class="v cost" id="stat-cost">0</span></div>
        </div>
        <div class="panel q"><div class="cap">SPFA QUEUE</div><div class="tiles" id="q-tiles"></div></div>
        <div class="panel d"><div class="cap">DIST[ ] &middot; cost from source</div><div class="tiles" id="dist-tiles"></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8634; Reset</button>
    <button onclick="back()">&#8592; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &#8594;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&#8592; &#8594;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">active u = <b id="pill-u">&minus;</b></span>
        <span class="pill n">neighbor v = <b id="pill-v">&minus;</b></span>
        <span class="pill p">path = <b id="pill-path">&minus;</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>source</span>
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>sink / path</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>SPFA active</span>
          <span class="li"><span class="dot" style="background:rgba(248,81,73,.5)"></span>saturated</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','minCostMaxFlow'],['src','(s, t):']],
  [['kw','  while'],['src',' true:']],
  [['src','    dist[*]=INF; dist[s]=0; queue=[s]']],
  [['kw','    while'],['src',' queue:  u = queue.pop()']],
  [['kw','      for'],['src',' edge (u'],['src','&#8594;'],['src','v) with residual>0:']],
  [['kw','        if'],['src',' dist[u]+cost < dist[v]:']],
  [['src','          dist[v]=dist[u]+cost; push v']],
  [['kw','    if'],['src',' dist[t]==INF:  '],['kw','break'],['src','   # max flow reached']],
  [['src','    bottleneck = min residual along path']],
  [['src','    augment flow; flow+=b; cost+=b*dist[t]']],
  [['kw','  return'],['src',' (flow, cost)']],
];

let V_count=3, sourceNode=0, sinkNode=2;
let originalEdges=[[0,1,2,3],[1,2,1,5]];
let nodeCoords={}, nodeEls={};
let edgeGroups={};        // forward edge key "u-v" -> {g, line, label, bg, u, v, cost}
let steps=[], stepIndex=0, timer=null;
const delays=[2400,1300,650];
const INF=Infinity;
let confettiArmed=true;

function init(){ buildCode(); loadExample(3,0,2,'[[0,1,2,3],[1,2,1,5]]'); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.innerHTML=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(v,src,snk,eStr){
  document.getElementById('v-input').value=v;
  document.getElementById('s-input').value=src;
  document.getElementById('t-input').value=snk;
  document.getElementById('e-input').value=eStr;
  parseAndGen();
}
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    V_count=parseInt(document.getElementById('v-input').value);
    sourceNode=parseInt(document.getElementById('s-input').value);
    sinkNode=parseInt(document.getElementById('t-input').value);
    originalEdges=JSON.parse(document.getElementById('e-input').value.replace(/\(/g,'[').replace(/\)/g,']'));
    if(isNaN(V_count)||isNaN(sourceNode)||isNaN(sinkNode)||!Array.isArray(originalEdges)) throw 'bad';
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid format. V, s, t must be integers and edges a valid array of [u,v,cap,cost].'); }
}

// ---- persistent DOM skeleton (built once per load) ----
function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; nodeCoords={}; nodeEls={}; edgeGroups={};

  // defs: arrowheads
  const NS='http://www.w3.org/2000/svg';
  const defs=document.createElementNS(NS,'defs');
  defs.innerHTML=`
    <marker id="ah-normal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="rgba(255,255,255,.32)"/></marker>
    <marker id="ah-spfa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#a855f7"/></marker>
    <marker id="ah-path" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#f5a524"/></marker>
    <marker id="ah-sat" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="rgba(248,81,73,.6)"/></marker>`;
  svg.appendChild(defs);

  // layered layout by BFS distance from source over forward edges
  let levels=new Array(V_count).fill(-1); levels[sourceNode]=0;
  let adj=Array.from({length:V_count},()=>[]);
  for(const e of originalEdges){ if(e[0]<V_count&&e[1]<V_count) adj[e[0]].push(e[1]); }
  let bq=[sourceNode];
  while(bq.length){ const u=bq.shift(); for(const v of adj[u]){ if(levels[v]===-1){ levels[v]=levels[u]+1; bq.push(v);} } }
  let maxLvl=Math.max(0,...levels);
  for(let i=0;i<V_count;i++){ if(levels[i]===-1){ maxLvl++; levels[i]=maxLvl; } }
  if(levels[sinkNode]!==Math.max(...levels)) levels[sinkNode]=Math.max(...levels)+1;

  let groups={};
  for(let i=0;i<V_count;i++){ (groups[levels[i]]=groups[levels[i]]||[]).push(i); }
  const lvlKeys=Object.keys(groups).map(Number).sort((a,b)=>a-b);
  const W=430,H=360,padX=44;
  const xStep=(W-2*padX)/Math.max(1,(lvlKeys.length-1));
  lvlKeys.forEach((l,li)=>{
    const arr=groups[l]; const yStep=H/(arr.length+1);
    arr.forEach((nId,idx)=>{
      const x=lvlKeys.length===1? W/2 : padX+xStep*li;
      const y=30+yStep*(idx+1);
      nodeCoords[nId]={x,y};
    });
  });

  // edge groups (forward edges only as persistent skeleton)
  originalEdges.forEach((e,i)=>{
    const u=e[0],v=e[1],cost=e[3];
    const p1=nodeCoords[u], p2=nodeCoords[v]; if(!p1||!p2) return;
    const g=document.createElementNS(NS,'g'); g.setAttribute('class','edge-g'); g.id='eg'+i;
    const line=document.createElementNS(NS,'line'); line.setAttribute('class','edge'); line.setAttribute('marker-end','url(#ah-normal)');
    const bg=document.createElementNS(NS,'rect'); bg.setAttribute('class','elabel-bg'); bg.setAttribute('rx','4'); bg.setAttribute('height','16');
    const tx=document.createElementNS(NS,'text'); tx.setAttribute('class','elabel');
    g.appendChild(line); g.appendChild(bg); g.appendChild(tx); svg.appendChild(g);
    edgeGroups[u+'-'+v]={g,line,bg,tx,u,v,cost};
  });

  // node groups on top
  for(let id=0; id<V_count; id++){
    const p=nodeCoords[id]; if(!p) continue;
    const g=document.createElementNS(NS,'g'); g.setAttribute('class','gnode'); g.id='gn'+id;
    const c=document.createElementNS(NS,'circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',20);
    const t=document.createElementNS(NS,'text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=id;
    g.appendChild(c); g.appendChild(t); svg.appendChild(g); nodeEls[id]=g;
  }
}

// ---- genuine algorithm simulation -> immutable per-step snapshots ----
function generateSteps(){
  steps=[];
  // residual graph: each directed pair has flow/cap; forward edges from input, reverse edges cap 0
  let adj=Array.from({length:V_count},()=>[]);
  let E=[]; // edge objects {u,v,cap,flow,cost,rev}
  function addEdge(u,v,cap,cost){
    const f={u,v,cap,flow:0,cost}, r={u:v,v:u,cap:0,flow:0,cost:-cost};
    f.rev=r; r.rev=f; E.push(f,r); adj[u].push(f); adj[v].push(r);
  }
  for(const e of originalEdges) addEdge(e[0],e[1],e[2],e[3]);

  let maxFlow=0, minCost=0;

  // snapshot of forward-edge residual usage for rendering (key "u-v" -> {flow,cap,cost,residual})
  function edgeSnap(){
    // read residual usage of each original forward edge by matching on (u,v,cap,cost)
    const snap={};
    for(const e of originalEdges){
      const u=e[0],v=e[1];
      const f=E.find(x=>x.u===u&&x.v===v&&x.cap===e[2]&&x.cost===e[3]);
      if(f) snap[u+'-'+v]={flow:f.flow,cap:f.cap,cost:f.cost,residual:f.cap-f.flow};
    }
    return snap;
  }

  function push(o){
    steps.push({
      type:o.type, code:o.code, narr:o.narr, log:o.log, logColor:o.logColor||null,
      dist:o.dist?[...o.dist]:null, q:o.q?[...o.q]:[], updatedIdx:(o.updatedIdx===undefined?null:o.updatedIdx),
      u:(o.u===undefined?null:o.u), v:(o.v===undefined?null:o.v),
      spfaEdge:o.spfaEdge||null, pathNodes:o.pathNodes?[...o.pathNodes]:[], pathEdges:o.pathEdges?[...o.pathEdges]:[],
      bottleneck:(o.bottleneck===undefined?null:o.bottleneck),
      maxFlow, minCost, edges:edgeSnap(),
      complete:!!o.complete, result:o.result||null
    });
  }

  push({type:'init', code:[0], dist:new Array(V_count).fill(INF), q:[],
    narr:`<b>Successive Shortest Paths.</b> Repeatedly send flow along the <b>cheapest</b> augmenting path from source <code>${sourceNode}</code> to sink <code>${sinkNode}</code>.`,
    log:`init MCMF  source=${sourceNode} sink=${sinkNode}  V=${V_count}`});

  let guard=0;
  while(guard++<200){
    let dist=new Array(V_count).fill(INF);
    let parent=new Array(V_count).fill(null);
    let inQ=new Array(V_count).fill(false);
    dist[sourceNode]=0; inQ[sourceNode]=true;
    let q=[sourceNode];

    push({type:'spfa_start', code:[2], dist, q,
      narr:`<b>SPFA</b> from source. Set <code>dist[${sourceNode}]=0</code>, all others <code>&infin;</code>; enqueue <code>${sourceNode}</code>.`,
      log:`SPFA start  queue=[${sourceNode}]`});

    while(q.length){
      const u=q.shift(); inQ[u]=false;
      push({type:'spfa_pop', code:[3], dist, q, u,
        narr:`Pop <code>${u}</code> from queue. Relax its outgoing residual edges.`,
        log:`  pop ${u}`});
      for(const e of adj[u]){
        const residual=e.cap-e.flow;
        if(residual>0 && dist[u]!==INF && dist[u]+e.cost<dist[e.v]){
          dist[e.v]=dist[u]+e.cost; parent[e.v]=e;
          if(!inQ[e.v]){ q.push(e.v); inQ[e.v]=true; }
          push({type:'spfa_relax', code:[4,5,6], dist, q, u, v:e.v, updatedIdx:e.v,
            spfaEdge:{u,v:e.v},
            narr:`Relax <code>${u}&#8594;${e.v}</code> (cost ${e.cost>=0?'+':''}${e.cost}, residual ${residual}). Cheaper &rarr; <code>dist[${e.v}]=${dist[e.v]}</code>.`,
            log:`    relax ${u}->${e.v}  dist[${e.v}]=${dist[e.v]}`});
        }
      }
    }

    if(dist[sinkNode]===INF){
      push({type:'no_path', code:[7], dist, q:[],
        narr:`Sink <code>${sinkNode}</code> is <b>unreachable</b> in the residual graph &mdash; no augmenting path remains. Maximum flow achieved.`,
        log:`  dist[${sinkNode}]=INF  no augmenting path`});
      break;
    }

    // reconstruct cheapest path
    let pathNodes=[sinkNode], pathEdges=[], bottleneck=INF, cur=sinkNode;
    while(cur!==sourceNode){ const e=parent[cur]; bottleneck=Math.min(bottleneck,e.cap-e.flow); pathEdges.unshift(e); cur=e.u; pathNodes.unshift(cur); }
    const pathCost=dist[sinkNode];
    const pathFwd=pathEdges.map(e=>e.u+'-'+e.v);

    push({type:'path_found', code:[8], dist, q:[], pathNodes, pathEdges:pathFwd, bottleneck,
      narr:`Cheapest path <code>${pathNodes.join(' &#8594; ')}</code>, cost/unit = <b>${pathCost}</b>. Bottleneck = min residual = <b>${bottleneck}</b>.`,
      log:`  path ${pathNodes.join('->')}  cost/unit=${pathCost}  bottleneck=${bottleneck}`});

    // augment
    for(const e of pathEdges){ e.flow+=bottleneck; e.rev.flow-=bottleneck; }
    maxFlow+=bottleneck; const added=bottleneck*pathCost; minCost+=added;

    push({type:'augment', code:[9], dist, q:[], pathNodes, pathEdges:pathFwd, bottleneck,
      narr:`Augment <b>${bottleneck}</b> unit(s) along the path. Flow += ${bottleneck}, cost += ${bottleneck}&times;${pathCost} = ${added}. &nbsp;Total flow=<b>${maxFlow}</b>, cost=<b>${minCost}</b>.`,
      log:`  augment +${bottleneck}  flow=${maxFlow}  cost=${minCost}`});
  }

  push({type:'final', code:[10], dist:new Array(V_count).fill(INF), q:[],
    narr:`<b>Done.</b> Maximum flow = <b>${maxFlow}</b> with minimum total cost = <b>${minCost}</b>.`,
    log:`done.  maxFlow=${maxFlow}  minCost=${minCost}`, logColor:'var(--accent-green)',
    complete:true, result:`(${maxFlow}, ${minCost})`});
}

// ---- pure render of steps[idx] over the persistent skeleton ----
function fmt(v){ return v===INF? '&#8734;' : v; }
function fmtPlain(v){ return v===INF? 'INF' : v; }

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const inQ=new Set(step.q);
  const onPath=new Set(step.pathNodes||[]);

  // nodes
  for(let id=0; id<V_count; id++){
    const g=nodeEls[id]; if(!g) continue;
    g.classList.remove('source','sink','inqueue','active','onpath');
    if(id===sourceNode) g.classList.add('source');
    if(id===sinkNode) g.classList.add('sink');
    if(onPath.has(id)) g.classList.add('onpath');
    else{
      if(inQ.has(id)) g.classList.add('inqueue');
      if(step.u===id || step.v===id) g.classList.add('active');
    }
  }

  // edges: re-derive highlight + label geometry from snapshot
  const pathSet=new Set(step.pathEdges||[]);
  const spfaKey=step.spfaEdge? step.spfaEdge.u+'-'+step.spfaEdge.v : null;
  for(const key in edgeGroups){
    const eg=edgeGroups[key];
    const snap=step.edges? step.edges[key] : null;
    const flow=snap?snap.flow:0, cap=eg.cost!==undefined?(snap?snap.cap:0):0;
    const residual=snap?snap.residual:(originalCapOf(key));
    const isPath=pathSet.has(key);
    const isSpfa=spfaKey===key;
    const saturated=snap? (snap.residual<=0) : false;

    eg.g.classList.remove('spfa-g','path-g','sat-g');
    eg.line.classList.remove('spfa','path','residual','saturated');

    // geometry (shrink to node radius)
    const p1=nodeCoords[eg.u], p2=nodeCoords[eg.v];
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1;
    const sShrink=22, tShrink=26;
    const x1=p1.x+(dx/len)*sShrink, y1=p1.y+(dy/len)*sShrink;
    const x2=p2.x-(dx/len)*tShrink, y2=p2.y-(dy/len)*tShrink;
    eg.line.setAttribute('x1',x1); eg.line.setAttribute('y1',y1);
    eg.line.setAttribute('x2',x2); eg.line.setAttribute('y2',y2);

    if(isPath){ eg.line.classList.add('path'); eg.g.classList.add('path-g'); eg.line.setAttribute('marker-end','url(#ah-path)'); }
    else if(isSpfa){ eg.line.classList.add('spfa'); eg.g.classList.add('spfa-g'); eg.line.setAttribute('marker-end','url(#ah-spfa)'); }
    else if(saturated){ eg.line.classList.add('saturated'); eg.g.classList.add('sat-g'); eg.line.setAttribute('marker-end','url(#ah-sat)'); }
    else{ eg.line.setAttribute('marker-end','url(#ah-normal)'); }

    // label: flow/cap (cost)
    const capVal=snap?snap.cap:'?';
    const labelStr=`${flow}/${capVal} ($${eg.cost})`;
    const midX=(x1+x2)/2, midY=(y1+y2)/2 - 11;
    eg.tx.setAttribute('x',midX); eg.tx.setAttribute('y',midY); eg.tx.textContent=labelStr;
    const w=labelStr.length*6.6+8;
    eg.bg.setAttribute('x',midX-w/2); eg.bg.setAttribute('y',midY-8); eg.bg.setAttribute('width',w);
  }

  // queue tiles
  fillQueue(step.q);
  // dist tiles
  fillDist(step.dist, step.updatedIdx);

  // stats
  document.getElementById('stat-bot').innerHTML = step.bottleneck!=null? step.bottleneck : '&minus;';
  document.getElementById('stat-flow').textContent = step.maxFlow;
  document.getElementById('stat-cost').textContent = step.minCost;

  // narration + code + pills + progress + badge
  const narr=document.getElementById('narration'); narr.innerHTML=step.narr; narr.classList.toggle('done',!!step.complete);
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });
  document.getElementById('pill-u').innerHTML = step.u!=null? step.u : '&minus;';
  document.getElementById('pill-v').innerHTML = step.v!=null? step.v : '&minus;';
  document.getElementById('pill-path').innerHTML = (step.pathNodes&&step.pathNodes.length)? '['+step.pathNodes.join('&#8594;')+']' : '&minus;';
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  // log (cumulative)
  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].logColor) d.style.color=steps[k].logColor; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function originalCapOf(key){ const e=originalEdges.find(x=>x[0]+'-'+x[1]===key); return e?e[2]:0; }

function fillQueue(q){
  const c=document.getElementById('q-tiles'); c.innerHTML='';
  if(!q||!q.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; c.appendChild(e); return; }
  q.forEach(v=>{ const t=document.createElement('div'); t.className='tile q'; t.textContent=v; c.appendChild(t); });
}
function fillDist(dist,updatedIdx){
  const c=document.getElementById('dist-tiles'); c.innerHTML='';
  if(!dist||!dist.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; c.appendChild(e); return; }
  dist.forEach((val,i)=>{
    const col=document.createElement('div'); col.className='tcol';
    const t=document.createElement('div'); t.className='tile '+(i===updatedIdx?'upd':'d'); t.innerHTML=fmt(val);
    const ix=document.createElement('div'); ix.className='idx'; ix.textContent='['+i+']';
    col.appendChild(t); col.appendChild(ix); c.appendChild(col);
    if(i===updatedIdx) Motion.pop(t);
  });
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
