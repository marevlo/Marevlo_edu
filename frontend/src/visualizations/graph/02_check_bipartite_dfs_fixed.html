<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Bipartite Graph (DFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
            
            --color-0: #e3b341; /* Group 0 color (Orange) */
            --color-1: #388bfd; /* Group 1 color (Blue) */
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 350px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAY */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        .graph-area {
            position: relative;
            width: 400px;
            height: 300px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 14px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.active { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 12px rgba(255,255,255,0.3); z-index: 2; }
        .node.color-0 { background: #332200; border-color: var(--color-0); color: var(--color-0); }
        .node.color-1 { background: #001a33; border-color: var(--color-1); color: var(--color-1); }
        .node.conflict { background: #3a0d0d; border-color: var(--accent-red); color: var(--accent-red); box-shadow: 0 0 15px var(--accent-red); animation: shake 0.4s infinite; z-index: 3;}

        @keyframes shake {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-53%, -50%) rotate(-5deg); }
            50% { transform: translate(-50%, -50%) rotate(0deg); }
            75% { transform: translate(-47%, -50%) rotate(5deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }

        .array-row { display: flex; align-items: center; gap: 12px; min-height: 50px; justify-content: center; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 10px; color: var(--text-dim); font-family: monospace; }
        
        .tile.color-0 { border-color: var(--color-0); color: var(--color-0); }
        .tile.color-1 { border-color: var(--color-1); color: var(--color-1); }
        .tile.conflict { border-color: var(--accent-red); color: var(--accent-red); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 600px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 100px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 18px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-red); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim {
            stroke-dasharray: 6;
            animation: dash 1s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -12; }
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">graph =</label>
        <input type="text" id="g-input" placeholder="[[1,2,3],[0,2],[0,1,3],[0,2]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([[1,2,3],[0,2],[0,1,3],[0,2]])">Ex 1 (False)</button>
        <button onclick="loadExample([[1,3],[0,2],[1,3],[0,2]])">Ex 2 (True)</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="array-row">
            <div class="ui-label">colors array:</div>
            <div class="tiles-wrapper" id="colors-tiles"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Target Color</span>
            <span class="info-value" id="val-color" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">is bipartite? =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--color-0)"></span> Color 0 (Set A)</div>
        <div class="legend-item"><span class="dot" style="background:var(--color-1)"></span> Color 1 (Set B)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple)"></span> Exploring Edge</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red)"></span> Conflict (Same Color)</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let graph = [[1,2,3],[0,2],[0,1,3],[0,2]];
        let nodeCoords = [];
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([[1,2,3],[0,2],[0,1,3],[0,2]]); }

        function loadExample(newGraph) {
            graph = JSON.parse(JSON.stringify(newGraph));
            document.getElementById('g-input').value = JSON.stringify(graph);
            setupGraph();
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('g-input').value;
            try {
                const parsed = JSON.parse(valStr);
                if (Array.isArray(parsed)) {
                    loadExample(parsed);
                } else {
                    alert("Invalid format. Expected array of arrays (e.g., [[1,2], [0], [0]]).");
                }
            } catch(e) {
                alert("Invalid JSON format.");
            }
        }

        function setupGraph() {
            const n = graph.length;
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = [];

            const cx = 200;
            const cy = 150;
            const radius = 100;

            for (let i = 0; i < n; i++) {
                const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords.push({x, y});

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            const n = graph.length;
            let colors = new Array(n).fill(-1);
            let isBipartite = true;

            let edges = [];
            for (let u = 0; u < n; u++) {
                for (let v of graph[u]) {
                    if (u < v) edges.push([u, v]);
                }
            }

            steps.push({
                type: 'init',
                u: null, v: null, color: null,
                colors: [...colors],
                activeEdge: null, conflictEdge: null,
                panel: `Initialize a <code>colors</code> array with -1 for all ${n} vertices.<br>We will use DFS to color vertices with alternating colors (0 and 1).`,
                statusText: `Vertices= ${n}. Click Play to begin DFS Coloring.`,
                log: `n=${n}. Starting DFS Bipartite Check. Initialized colors array to -1.`
            });

            // DFS Function
            function dfs(u, color, depth) {
                colors[u] = color;
                
                steps.push({
                    type: 'visit',
                    u: u, v: null, color: color,
                    colors: [...colors],
                    activeEdge: null, conflictEdge: null,
                    panel: `Visiting Node <code>${u}</code>.<br>Assigned <span style="color:var(--color-${color})">Color ${color}</span>.`,
                    statusText: `Colored node ${u} with color ${color}.`,
                    log: `${"  ".repeat(depth)}DFS(${u}): Assigned color ${color} to node ${u}.`
                });

                for (let v of graph[u]) {
                    let nextColor = 1 - color;

                    steps.push({
                        type: 'check_edge',
                        u: u, v: v, color: nextColor,
                        colors: [...colors],
                        activeEdge: [u, v], conflictEdge: null,
                        panel: `Checking neighbor <code>${v}</code> of node <code>${u}</code>.<br>Neighbor should be <span style="color:var(--color-${nextColor})">Color ${nextColor}</span>.`,
                        statusText: `Exploring edge (${u}, ${v})...`,
                        log: `${"  ".repeat(depth)}  Checking edge ${u} -> ${v}. Target color for ${v} is ${nextColor}.`
                    });

                    if (colors[v] === -1) {
                        // Unvisited
                        if (!dfs(v, nextColor, depth + 1)) return false;
                    } else if (colors[v] === color) {
                        // Conflict!
                        steps.push({
                            type: 'conflict',
                            u: u, v: v, color: null,
                            colors: [...colors],
                            activeEdge: null, conflictEdge: [u, v],
                            panel: `<span style="color:var(--accent-red)">Conflict detected!</span><br>Node <code>${u}</code> and Node <code>${v}</code> both have Color ${color}.<br>The graph is NOT bipartite.`,
                            statusText: `Graph cannot be colored with 2 colors.`,
                            log: `${"  ".repeat(depth)}  Conflict! ${u} and ${v} are both color ${color}. Returning false.`,
                            logColor: 'var(--accent-red)'
                        });
                        return false;
                    } else {
                        // Already colored correctly
                        steps.push({
                            type: 'already_correct',
                            u: u, v: v, color: null,
                            colors: [...colors],
                            activeEdge: [u, v], conflictEdge: null,
                            panel: `Neighbor <code>${v}</code> is already colored with <span style="color:var(--color-${colors[v]})">Color ${colors[v]}</span>. No conflict.`,
                            statusText: `Edge (${u}, ${v}) is valid.`,
                            log: `${"  ".repeat(depth)}  Node ${v} already correctly colored as ${colors[v]}.`
                        });
                    }
                }

                steps.push({
                    type: 'backtrack',
                    u: u, v: null, color: null,
                    colors: [...colors],
                    activeEdge: null, conflictEdge: null,
                    panel: `Finished exploring all neighbors of Node <code>${u}</code>. Backtracking.`,
                    statusText: `Backtracking from node ${u}.`,
                    log: `${"  ".repeat(depth)}Finished DFS(${u}). Backtracking.`
                });

                return true;
            }

            for (let i = 0; i < n; i++) {
                if (colors[i] === -1) {
                    steps.push({
                        type: 'component_start',
                        u: i, v: null, color: 0,
                        colors: [...colors],
                        activeEdge: null, conflictEdge: null,
                        panel: `Node <code>${i}</code> is unvisited. Starting a new DFS component here with <span style="color:var(--color-0)">Color 0</span>.`,
                        statusText: `Starting DFS from node ${i}...`,
                        log: `\nNode ${i} is uncolored. Starting new DFS component.`
                    });

                    if (!dfs(i, 0, 0)) {
                        isBipartite = false;
                        break;
                    }
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final',
                u: null, v: null, color: null,
                colors: [...colors],
                activeEdge: null, conflictEdge: steps[steps.length-1].conflictEdge,
                panel: isBipartite ? 'All nodes colored without any conflicts. The graph is Bipartite!' : 'DFS terminated early due to a conflict. The graph is NOT Bipartite.',
                complete: true,
                result: isBipartite ? 'True' : 'False',
                isBipartite: isBipartite,
                statusText: isBipartite ? `Done. Graph is Bipartite.` : `Done. Graph contains odd-length cycle.`,
                log: `Final Result: isBipartite = ${isBipartite}`,
                logColor: isBipartite ? 'var(--accent-green)' : 'var(--accent-red)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            
            let drawnEdges = new Set();
            for (let u = 0; u < graph.length; u++) {
                for (let v of graph[u]) {
                    let edgeKey = u < v ? `${u}-${v}` : `${v}-${u}`;
                    if (drawnEdges.has(edgeKey)) continue;
                    drawnEdges.add(edgeKey);

                    const p1 = nodeCoords[u];
                    const p2 = nodeCoords[v];
                    
                    let isConflict = step.conflictEdge && ((step.conflictEdge[0] === u && step.conflictEdge[1] === v) || (step.conflictEdge[0] === v && step.conflictEdge[1] === u));
                    let isActive = step.activeEdge && ((step.activeEdge[0] === u && step.activeEdge[1] === v) || (step.activeEdge[0] === v && step.activeEdge[1] === u));

                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', p1.x);
                    line.setAttribute('y1', p1.y);
                    line.setAttribute('x2', p2.x);
                    line.setAttribute('y2', p2.y);

                    if (isConflict) {
                        line.setAttribute('stroke', 'var(--accent-red)');
                        line.setAttribute('stroke-width', '4');
                    } else if (isActive) {
                        line.setAttribute('stroke', 'var(--accent-purple)');
                        line.setAttribute('stroke-width', '3');
                        line.classList.add('line-anim');
                    } else {
                        line.setAttribute('stroke', 'var(--border-main)');
                        line.setAttribute('stroke-width', '2');
                    }
                    
                    if (isConflict || isActive) {
                        setTimeout(() => svg.appendChild(line), 0); 
                    } else {
                        svg.appendChild(line);
                    }
                }
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            const nodes = document.querySelectorAll('.node');
            nodes.forEach(node => {
                const id = parseInt(node.id.split('-')[1]);
                node.className = 'node';
                
                if (step.colors[id] === 0) node.classList.add('color-0');
                if (step.colors[id] === 1) node.classList.add('color-1');
                
                if (step.u === id || step.v === id) node.classList.add('active');

                if (step.conflictEdge && (step.conflictEdge[0] === id || step.conflictEdge[1] === id)) {
                    node.classList.add('conflict');
                }
            });

            drawEdges(step);

            // Render Array
            const arrContainer = document.getElementById('colors-tiles');
            arrContainer.innerHTML = '';
            step.colors.forEach((c, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = 'tile';
                if (c === 0) tile.classList.add('color-0');
                if (c === 1) tile.classList.add('color-1');
                if (step.conflictEdge && (step.conflictEdge[0] === i || step.conflictEdge[1] === i)) {
                    tile.classList.add('conflict');
                }

                tile.innerText = c;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                arrContainer.appendChild(wrapper);
            });

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            let colorDisplay = step.color !== null ? `<span style="color:var(--color-${step.color})">${step.color}</span>` : '—';
            document.getElementById('val-u').innerText = step.u !== null ? step.u : '—';
            document.getElementById('val-v').innerText = step.v !== null ? step.v : '—';
            document.getElementById('val-color').innerHTML = colorDisplay;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            
            if (step.complete) {
                resVal.className = step.isBipartite ? 'pop' : 'pop-false';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
