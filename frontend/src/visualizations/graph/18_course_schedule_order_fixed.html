<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Schedule Order (Kahn's BFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 280px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 380px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 3; color: var(--accent-orange); }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 2; color: var(--accent-purple); }
        .node.processed { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .node.in-queue { border-color: var(--accent-blue); box-shadow: inset 0 0 8px rgba(56,139,253,0.3); }
        .node.cycle { background: #3a0d0d; border-color: var(--accent-red); color: var(--accent-red); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 80px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        .tile {
            min-width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.queue-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.res-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile.ind-tile { border-color: #6e5518; color: var(--accent-orange); background: #2a200a; }
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; }
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes highlightFlash { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.5); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); filter: brightness(1); } }
        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 730px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 730px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 12px var(--accent-green); font-size: 26px !important;}
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 12px var(--accent-red); font-size: 26px !important;}

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 730px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">numCourses =</label>
        <input type="text" id="n-input" class="small-input" placeholder="4">
        <label class="ui-label">prerequisites =</label>
        <input type="text" id="req-input" class="med-input" placeholder="[[1,0],[2,0],[3,1],[3,2]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(4, '[[1,0],[2,0],[3,1],[3,2]]')">Ex 1</button>
        <button onclick="loadExample(3, '[[1,0],[2,1],[0,2]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">In-Degree Array:</div>
                <div class="tiles-wrapper" id="indegree-tiles"></div>
                <div style="font-size: 10px; color: var(--text-dim); margin-top: 4px;">Number of unresolved prerequisites</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">BFS Queue (Ready Courses):</div>
                <div class="tiles-wrapper" id="queue-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">Ordering Result:</div>
                <div class="tiles-wrapper" id="result-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Course (Pop)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Updating Dependent</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">New In-Degree</span>
            <span class="info-value" id="val-deg" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">final course ordering =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Active Course (Taking Now)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Updating Prerequisite</div>
        <div class="legend-item"><span class="dot" style="background:#0d213f; border-color:var(--accent-blue)"></span> In Queue (Ready)</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Completed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let numCourses = 4;
        let prereqs = [[1,0],[2,0],[3,1],[3,2]];
        let adj = {};
        let edges = [];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];

        function init() { loadExample(4, '[[1,0],[2,0],[3,1],[3,2]]'); }

        function loadExample(n, rStr) {
            document.getElementById('n-input').value = n;
            document.getElementById('req-input').value = rStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                numCourses = parseInt(document.getElementById('n-input').value);
                prereqs = JSON.parse(document.getElementById('req-input').value);
                if (isNaN(numCourses) || numCourses < 0) throw "Invalid N";
                
                // Build Adjacency List
                // Problem states [a,b] means to take 'a' you must take 'b'. So edge is b -> a
                adj = {};
                for(let i=0; i<numCourses; i++) adj[i] = [];
                edges = [];
                
                for (let pair of prereqs) {
                    let a = pair[0], b = pair[1];
                    adj[b].push(a);
                    edges.push({u: b, v: a}); // Edge goes from prereq to dependent
                }

                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure prerequisites is a valid array of pairs like [[1,0]].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (numCourses === 0) return;

            const cx = 225;
            const cy = 190;
            const radius = 130;

            for (let i = 0; i < numCourses; i++) {
                const angle = (Math.PI * 2 * i) / numCourses - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let inDegree = new Array(numCourses).fill(0);
            for (let e of edges) inDegree[e.v]++;
            
            let queue = [];
            let result = [];

            steps.push({
                type: 'init', queue: [...queue], inDegree: [...inDegree], result: [...result],
                activeU: null, activeV: null, pushed: null, updatedIndIdx: null,
                panel: `<b>Kahn's Algorithm (Topological Sort)</b><br>Calculated the <code>In-Degree</code> array (number of prerequisites for each course).`,
                statusText: `Initialization complete.`,
                log: `Initialized Graph. In-Degree array: [${inDegree.join(', ')}]`
            });

            // Find initial zero indegrees
            let newZeroes = [];
            for (let i = 0; i < numCourses; i++) {
                if (inDegree[i] === 0) {
                    queue.push(i);
                    newZeroes.push(i);
                }
            }

            steps.push({
                type: 'init_queue', queue: [...queue], inDegree: [...inDegree], result: [...result],
                activeU: null, activeV: null, pushed: null, updatedIndIdx: null,
                panel: `Courses with <code>In-Degree = 0</code> have no prerequisites.<br>Enqueue courses <b>[${newZeroes.join(', ')}]</b> to start.`,
                statusText: `Enqueued ready courses.`,
                log: `Courses with 0 in-degree: [${newZeroes.join(', ')}]. Enqueued.`
            });

            while(queue.length > 0) {
                let u = queue.shift();
                result.push(u);

                steps.push({
                    type: 'dequeue', queue: [...queue], inDegree: [...inDegree], result: [...result],
                    activeU: u, activeV: null, pushed: null, popped: u, updatedIndIdx: null,
                    panel: `<b>Dequeue Course <code>${u}</code></b> and add it to our final Ordering.<br>This course is now "taken". We can resolve its dependencies.`,
                    statusText: `Processing Course ${u}...`,
                    log: `\nDequeue course ${u}, Result=[${result.join(', ')}]`
                });

                let neighbors = adj[u] || [];
                
                if (neighbors.length === 0) {
                    steps.push({
                        type: 'no_neighbors', queue: [...queue], inDegree: [...inDegree], result: [...result],
                        activeU: u, activeV: null, pushed: null, updatedIndIdx: null,
                        panel: `Course <b>${u}</b> is not a prerequisite for any other courses.`,
                        statusText: `No dependent courses for ${u}.`,
                        log: `  Course ${u} has no dependents.`
                    });
                }

                for(let v of neighbors) {
                    inDegree[v]--;
                    
                    steps.push({
                        type: 'decrement', queue: [...queue], inDegree: [...inDegree], result: [...result],
                        activeU: u, activeV: v, pushed: null, updatedIndIdx: v,
                        panel: `Course <b>${v}</b> requires Course <b>${u}</b>.<br>Since ${u} is taken, we decrement <code>inDegree[${v}]</code> to <b>${inDegree[v]}</b>.`,
                        statusText: `Decremented in-degree for ${v}.`,
                        log: `  Update dependent ${v}: inDegree[${v}] = ${inDegree[v]}`
                    });

                    if (inDegree[v] === 0) {
                        queue.push(v);
                        
                        steps.push({
                            type: 'enqueue', queue: [...queue], inDegree: [...inDegree], result: [...result],
                            activeU: u, activeV: v, pushed: v, updatedIndIdx: v,
                            panel: `<code>inDegree[${v}]</code> is now 0!<br>All prerequisites for Course <b>${v}</b> are met. <b style="color:var(--accent-green)">Enqueue ${v}</b>.`,
                            statusText: `Course ${v} is ready! Enqueued.`,
                            log: `    -> In-degree of ${v} reached 0. Enqueued. Queue=[${queue.join(', ')}]`,
                            logColor: 'var(--accent-green)'
                        });
                    }
                }
            }

            let isCycle = result.length !== numCourses;

            steps.push({
                type: 'final', queue: [...queue], inDegree: [...inDegree], result: [...result],
                activeU: null, activeV: null, pushed: null, updatedIndIdx: null, isCycle: isCycle,
                panel: isCycle ? 
                    `<b style="color:var(--accent-red)">Cycle Detected!</b><br>Queue is empty, but we only placed ${result.length} out of ${numCourses} courses.<br>Remaining courses have mutually dependent prerequisites. Returning <code>[]</code>.` :
                    `<b style="color:var(--accent-green)">Success!</b><br>Queue is empty and all ${numCourses} courses are placed.<br>Valid topological order found!`,
                complete: true, result: isCycle ? '[]' : `[${result.join(', ')}]`,
                statusText: isCycle ? `Algorithm Failed: Cycle Detected.` : `Algorithm Complete.`,
                log: isCycle ? `\nQueue empty. Result length (${result.length}) != numCourses (${numCourses}). Cycle detected. Return []` : `\nQueue empty. Valid ordering found: [${result.join(', ')}]`,
                logColor: isCycle ? 'var(--accent-red)' : 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            edges.forEach(e => {
                const p1 = nodeCoords[e.u];
                const p2 = nodeCoords[e.v];
                if(!p1 || !p2) return;

                let isChecking = step.activeU !== null && step.activeV !== null && 
                                 step.activeU === e.u && step.activeV === e.v;
                                 
                // If the prerequisite is already in the result array, fade the edge
                let isResolved = step.result && step.result.includes(e.u);

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrinkTarget = nodeRadius + 5; 
                const shrinkSource = nodeRadius + 2; 
                
                line.setAttribute('x1', p1.x + (dx/len)*shrinkSource); 
                line.setAttribute('y1', p1.y + (dy/len)*shrinkSource);
                line.setAttribute('x2', p2.x - (dx/len)*shrinkTarget); 
                line.setAttribute('y2', p2.y - (dy/len)*shrinkTarget);

                if (isChecking) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('marker-end', 'url(#arrow-active)');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('marker-end', 'url(#arrow-normal)');
                    if (isResolved) line.setAttribute('opacity', '0.2');
                    svg.appendChild(line);
                }
            });
        }

        function renderArray(containerId, arr, tileClass, stepData, targetKey) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            if (arr.length === 0 && !stepData.popped) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            // Render Popped Tile Visually Leaving Queue
            if (containerId === 'queue-tiles' && stepData.type === 'dequeue' && stepData.popped !== null) {
                const popTile = document.createElement('div');
                popTile.className = `tile ${tileClass} popping`;
                popTile.innerText = stepData.popped;
                container.appendChild(popTile);
            }

            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile ${tileClass}`;
                
                if (stepData.pushed === val && targetKey === 'queue') {
                    tile.classList.add('pushing');
                }
                if (stepData.updatedIndIdx === i && targetKey === 'indegree') {
                    tile.classList.add('highlight-update');
                }
                
                tile.innerText = val;
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = targetKey === 'indegree' ? `[${i}]` : ` `;

                wrapper.appendChild(tile);
                if (targetKey === 'indegree') wrapper.appendChild(idxLabel);
                
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<numCourses; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (step.result.includes(i)) el.classList.add('processed');
                else if (step.queue.includes(i)) el.classList.add('in-queue');
                
                if (step.isCycle && step.inDegree[i] > 0) el.classList.add('cycle');
                
                if (step.activeU === i) el.classList.add('active-u');
                if (step.activeV === i) el.classList.add('active-v');
            }

            drawEdges(step);

            // Render Arrays
            renderArray('indegree-tiles', step.inDegree, 'ind-tile', step, 'indegree');
            renderArray('queue-tiles', step.queue, 'queue-tile', step, 'queue');
            renderArray('result-tiles', step.result, 'res-tile', step, 'result');

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.activeU !== null ? step.activeU : '—';
            document.getElementById('val-v').innerText = step.activeV !== null ? step.activeV : '—';
            
            document.getElementById('val-deg').innerText = step.updatedIndIdx !== null ? step.inDegree[step.updatedIndIdx] : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.className = step.isCycle ? 'pop-false' : 'pop';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
