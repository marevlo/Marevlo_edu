<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortest Path K Edges Constraint - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 400px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.source { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(56,139,253,0.3); color: var(--accent-blue); background: rgba(56,139,253,0.1); }
        .node.target { border-color: var(--accent-green); box-shadow: 0 0 10px rgba(63,185,80,0.3); color: var(--accent-green); background: rgba(63,185,80,0.1); }
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 3; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 2; color: var(--accent-purple); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 320px; max-width: 400px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 100px;}
        
        .table-wrapper {
            display: grid;
            gap: 4px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .table-row {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .table-header {
            width: 40px; text-align: center; font-size: 12px; color: var(--text-dim); font-family: monospace; font-weight: bold;
        }
        .tile {
            min-width: 44px; height: 36px; display: flex; align-items: center; justify-content: center;
            border-radius: 4px; font-size: 14px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.dist-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.pq-tile { background: #1a150b; border-color: var(--accent-orange); color: var(--text-main); padding: 0 8px; width: auto; font-size: 13px;}
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes highlightFlash { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.5); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); filter: brightness(1); } }
        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 830px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 830px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 14px; font-weight: 700; text-align: center; word-break: break-all;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 15px var(--accent-red); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1.1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 830px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }

        .edge-label { font-family: monospace; font-weight: bold; font-size: 13px; text-anchor: middle; dominant-baseline: central; }
        .edge-bg { fill: var(--bg-surface); stroke: var(--border-main); stroke-width: 1px; rx: 4px; }
        .edge-exp .edge-bg { stroke: var(--accent-red); fill: #3a0d0d; }
        .edge-exp .edge-label { fill: var(--accent-red); }
        .edge-active .edge-bg { stroke: var(--accent-purple); }
        .edge-active .edge-label { fill: var(--accent-purple); }
        
        .tiles-wrapper-flex { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1,2], [0,2,5], [1,2,1], [1,3,6], [2,3,3]]">
        <label class="ui-label">K=</label>
        <input type="text" id="k-input" class="small-input" placeholder="1">
        <label class="ui-label">thresh=</label>
        <input type="text" id="th-input" class="small-input" placeholder="4">
        <label class="ui-label">src=</label>
        <input type="text" id="s-input" class="small-input" placeholder="0">
        <label class="ui-label">dst=</label>
        <input type="text" id="t-input" class="small-input" placeholder="3">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[[0,1,2], [0,2,5], [1,2,1], [1,3,6], [2,3,3]]', 1, 4, 0, 3)">Ex 1</button>
        <button onclick="loadExample('[[0,1,10], [0,2,1], [1,2,2], [1,3,1], [2,3,10]]', 0, 5, 0, 3)">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-exp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-red)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">dist[node][k_used]:</div>
                <div class="table-wrapper" id="dist-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Rows=Nodes, Cols=k_used (0 to K)</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">Priority Queue (Min-Heap):</div>
                <div class="tiles-wrapper-flex" id="pq-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Format: [dist, node, k_used]</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Popped State</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Relaxation Condition</span>
            <span class="info-value" id="val-eq" style="color: var(--text-main); font-size:13px;">new_dist < dist[v][new_k]</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">minimum path cost =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Popped Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Edge</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--border-main); border-width:2px;"></span> Normal Edge</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-red); border-width:2px;"></span> Expensive Edge (> thresh)</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 0;
        let sourceNode = 0;
        let destNode = 3;
        let K_val = 1;
        let threshold = 4;
        let edgesList = [[0,1,2], [0,2,5], [1,2,1], [1,3,6], [2,3,3]];
        let nodeCoords = {};
        let nodes = [];
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];
        const INF = Infinity;

        function init() { loadExample('[[0,1,2], [0,2,5], [1,2,1], [1,3,6], [2,3,3]]', 1, 4, 0, 3); }

        function loadExample(eStr, k, th, src, dst) {
            document.getElementById('e-input').value = eStr;
            document.getElementById('k-input').value = k;
            document.getElementById('th-input').value = th;
            document.getElementById('s-input').value = src;
            document.getElementById('t-input').value = dst;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                K_val = parseInt(document.getElementById('k-input').value);
                threshold = parseInt(document.getElementById('th-input').value);
                sourceNode = parseInt(document.getElementById('s-input').value);
                destNode = parseInt(document.getElementById('t-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(K_val) || isNaN(threshold) || isNaN(sourceNode) || isNaN(destNode) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                let maxNode = Math.max(sourceNode, destNode);
                edgesList.forEach(e => {
                    maxNode = Math.max(maxNode, e[0], e[1]);
                });
                V_count = maxNode + 1;
                nodes = Array.from({length: V_count}, (_, i) => i);
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure K, thresh, src, dst are integers and edges is a valid array of [u, v, w].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            const cx = 225;
            const cy = 200;
            const radius = 130;

            for (let i = 0; i < V_count; i++) {
                // Layout from left to right roughly
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function formatDist(val) { return val === INF ? '∞' : val; }
        function clonePQ(pq) { return pq.map(item => ({...item})); }
        function cloneDist(dist) { return dist.map(row => [...row]); }

        function generateSteps() {
            steps = [];
            
            let dist = Array.from({length: V_count}, () => new Array(K_val + 1).fill(INF));
            let pq = []; // Array of {d, u, k}

            let adj = {};
            for(let i=0; i<V_count; i++) adj[i] = [];
            for(let [u,v,w] of edgesList) adj[u].push({v, w});

            dist[sourceNode][0] = 0;
            pq.push({d: 0, u: sourceNode, k: 0});

            steps.push({
                type: 'init', dist: cloneDist(dist), pq: clonePQ(pq),
                u: null, v: null, w: null, k_u: null, updatedNode: null, updatedK: null, poppedItem: null, pushedItem: null,
                panel: `<b>Modified Dijkstra with State</b><br>State representation: <code>(Node, Expensive Edges Used)</code>.<br>Initialize <code>dist[${sourceNode}][0] = 0</code>, all others to ∞.<br>Push initial state <code>(dist=0, u=${sourceNode}, k=0)</code> to Min-Heap.`,
                statusText: `Initialization complete.`,
                log: `Initialized dist array and Priority Queue. Source = ${sourceNode}, K = ${K_val}, Threshold = ${threshold}.`
            });

            while (pq.length > 0) {
                pq.sort((a,b) => a.d - b.d);
                let curr = pq.shift();
                let u = curr.u;
                let d = curr.d;
                let k_u = curr.k;

                steps.push({
                    type: 'pop', dist: cloneDist(dist), pq: clonePQ(pq),
                    u: u, v: null, w: null, k_u: k_u, updatedNode: null, updatedK: null, poppedItem: curr, pushedItem: null,
                    panel: `<b>Pop Min-Heap:</b> Extract state <b>(dist=${d}, u=${u}, k=${k_u})</b>.<br>Checking if this distance is valid or stale...`,
                    statusText: `Processing node ${u} with ${k_u} expensive edges...`,
                    log: `\nPopped (dist=${d}, u=${u}, k=${k_u}) from heap.`
                });

                if (d > dist[u][k_u]) {
                    steps.push({
                        type: 'stale', dist: cloneDist(dist), pq: clonePQ(pq),
                        u: u, v: null, w: null, k_u: k_u, updatedNode: null, updatedK: null, poppedItem: null, pushedItem: null,
                        panel: `Extracted distance <b>${d}</b> is greater than current known <code>dist[${u}][${k_u}] = ${dist[u][k_u]}</code>.<br>This is a stale entry (Lazy Deletion). <b style="color:var(--accent-red)">Skip.</b>`,
                        statusText: `Skipped stale entry.`,
                        log: `  -> Stale entry (${d} > ${dist[u][k_u]}). Skipped.`
                    });
                    continue;
                }

                steps.push({
                    type: 'process', dist: cloneDist(dist), pq: clonePQ(pq),
                    u: u, v: null, w: null, k_u: k_u, updatedNode: null, updatedK: null, poppedItem: null, pushedItem: null,
                    panel: `Distance to <b>${u}</b> using <b>${k_u}</b> expensive edges is finalized at <b>${d}</b>.<br>Now relaxing all its outgoing edges.`,
                    statusText: `Relaxing edges from (u=${u}, k=${k_u})...`,
                    log: `  State (u=${u}, k=${k_u}) finalized. Relaxing neighbors...`
                });

                let neighbors = adj[u] || [];
                if (neighbors.length === 0) {
                    steps.push({
                        type: 'no_neighbors', dist: cloneDist(dist), pq: clonePQ(pq),
                        u: u, v: null, w: null, k_u: k_u, updatedNode: null, updatedK: null, poppedItem: null, pushedItem: null,
                        panel: `Node <b>${u}</b> has no outgoing edges.`,
                        statusText: `No neighbors to relax.`,
                        log: `    No outgoing edges.`
                    });
                }

                for (let neighbor of neighbors) {
                    let v = neighbor.v;
                    let w = neighbor.w;
                    let is_expensive = w > threshold;
                    let next_k = k_u + (is_expensive ? 1 : 0);
                    let new_dist = d + w;

                    steps.push({
                        type: 'check', dist: cloneDist(dist), pq: clonePQ(pq),
                        u: u, v: v, w: w, k_u: k_u, updatedNode: null, updatedK: null, poppedItem: null, pushedItem: null,
                        panel: `Checking edge <b>${u} ➔ ${v}</b> (weight <b>${w}</b>).<br>Is it expensive? <b>${is_expensive ? 'Yes' : 'No'}</b> (threshold=${threshold}).<br>New k_used = <code>${k_u} + ${is_expensive?1:0} = ${next_k}</code>.`,
                        statusText: `Evaluating edge ${u}➔${v}...`,
                        log: `    Check neighbor ${v}: weight=${w}, expensive=${is_expensive}. next_k=${next_k}.`
                    });

                    if (next_k > K_val) {
                        steps.push({
                            type: 'skip_k', dist: cloneDist(dist), pq: clonePQ(pq),
                            u: u, v: v, w: w, k_u: k_u, updatedNode: null, updatedK: null, poppedItem: null, pushedItem: null,
                            panel: `<code>next_k (${next_k}) > K (${K_val})</code>.<br><b style="color:var(--accent-red)">Constraint Violated!</b> We cannot use this expensive edge. Skip.`,
                            statusText: `Constraint violated. Edge skipped.`,
                            log: `      -> Constraint violated (next_k=${next_k} > K=${K_val}). Skipped.`
                        });
                        continue;
                    }

                    steps.push({
                        type: 'relax_check', dist: cloneDist(dist), pq: clonePQ(pq),
                        u: u, v: v, w: w, k_u: k_u, updatedNode: null, updatedK: null, poppedItem: null, pushedItem: null,
                        panel: `Valid state transition! Check distance:<br>Is <code>new_dist (${new_dist}) < dist[${v}][${next_k}] (${formatDist(dist[v][next_k])})</code>?`,
                        statusText: `Checking distance update for ${v}...`,
                        log: `      -> Valid state. Check if ${new_dist} < ${formatDist(dist[v][next_k])}.`
                    });

                    if (new_dist < dist[v][next_k]) {
                        dist[v][next_k] = new_dist;
                        let newItem = {d: new_dist, u: v, k: next_k};
                        pq.push(newItem);

                        steps.push({
                            type: 'relax', dist: cloneDist(dist), pq: clonePQ(pq),
                            u: u, v: v, w: w, k_u: k_u, updatedNode: v, updatedK: next_k, poppedItem: null, pushedItem: newItem,
                            panel: `<b style="color:var(--accent-green)">Yes!</b> Found a shorter path to <b>${v}</b> using <b>${next_k}</b> expensive edges.<br>Update <code>dist[${v}][${next_k}] = ${new_dist}</code> and push to Heap.`,
                            statusText: `Relaxed state (v=${v}, k=${next_k}).`,
                            log: `        -> Updated dist[${v}][${next_k}] = ${new_dist}. Pushed to heap.`,
                            logColor: 'var(--accent-green)'
                        });
                    } else {
                        steps.push({
                            type: 'skip_relax', dist: cloneDist(dist), pq: clonePQ(pq),
                            u: u, v: v, w: w, k_u: k_u, updatedNode: null, updatedK: null, poppedItem: null, pushedItem: null,
                            panel: `<b style="color:var(--accent-red)">No.</b> This path is not strictly shorter than the known distance for this state.<br>Do not update.`,
                            statusText: `No update needed.`,
                            log: `        -> No update.`
                        });
                    }
                }
            }

            let minFinalDist = INF;
            for (let k = 0; k <= K_val; k++) {
                if (dist[destNode][k] < minFinalDist) {
                    minFinalDist = dist[destNode][k];
                }
            }
            let finalRes = minFinalDist === INF ? -1 : minFinalDist;

            steps.push({
                type: 'final', dist: cloneDist(dist), pq: clonePQ(pq),
                u: null, v: null, w: null, k_u: null, updatedNode: null, updatedK: null, poppedItem: null, pushedItem: null,
                panel: `<b>Priority Queue is empty!</b> Algorithm is complete.<br>Minimum distance to Destination <b>${destNode}</b> across all valid <code>k_used</code> states is ` + 
                       (finalRes === -1 ? `<b style="color:var(--accent-red)">unreachable (-1)</b>.` : `<b style="color:var(--accent-green); font-size:18px;">${finalRes}</b>.`),
                complete: true, result: finalRes, isError: finalRes === -1,
                statusText: `Algorithm Finished.`,
                log: `\nHeap empty. Algorithm complete.\nFinal Min Cost: ${finalRes}`,
                logColor: finalRes === -1 ? 'var(--accent-red)' : 'var(--accent-blue)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            edgesList.forEach(e => {
                const u = e[0], v = e[1], w = e[2];
                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.u === u && step.v === v;
                let isExpensive = w > threshold;

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrinkTarget = nodeRadius + 5; 
                const shrinkSource = nodeRadius + 2; 
                
                const x1 = p1.x + (dx/len)*shrinkSource; 
                const y1 = p1.y + (dy/len)*shrinkSource;
                const x2 = p2.x - (dx/len)*shrinkTarget; 
                const y2 = p2.y - (dy/len)*shrinkTarget;

                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                if (isChecking) g.classList.add('edge-active');
                else if (isExpensive) g.classList.add('edge-exp');

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);

                if (isChecking) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('marker-end', 'url(#arrow-active)');
                    line.classList.add('line-anim');
                    line.setAttribute('stroke-dasharray', '6');
                } else if (isExpensive) {
                    line.setAttribute('stroke', 'var(--accent-red)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('marker-end', 'url(#arrow-exp)');
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('marker-end', 'url(#arrow-normal)');
                }

                g.appendChild(line);

                // Add Weight Label
                const midX = (x1 + x2) / 2;
                const midY = (y1 + y2) / 2 - 10;
                
                const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                bg.setAttribute('x', midX - 12);
                bg.setAttribute('y', midY - 8);
                bg.setAttribute('width', 24);
                bg.setAttribute('height', 16);
                bg.setAttribute('class', 'edge-bg');
                
                const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                txt.setAttribute('x', midX);
                txt.setAttribute('y', midY);
                txt.setAttribute('class', 'edge-label');
                if (!isChecking && !isExpensive) txt.setAttribute('fill', 'var(--text-dim)');
                txt.textContent = w;

                g.appendChild(bg);
                g.appendChild(txt);

                if (isChecking) {
                    setTimeout(() => svg.appendChild(g), 0);
                } else {
                    svg.appendChild(g);
                }
            });
        }

        function renderPQ(step) {
            const container = document.getElementById('pq-tiles');
            container.innerHTML = '';
            
            if (step.pq.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            if (step.poppedItem && step.type === 'pop') {
                const pTile = document.createElement('div');
                pTile.className = `tile pq-tile popping`;
                pTile.innerText = `[${step.poppedItem.d}, u${step.poppedItem.u}, k${step.poppedItem.k}]`;
                container.appendChild(pTile);
            }

            // visually sort for stability
            let dispPq = [...step.pq].sort((a,b) => a.d - b.d);

            dispPq.forEach(item => {
                const tile = document.createElement('div');
                tile.className = 'tile pq-tile';
                tile.innerText = `[${item.d}, u${item.u}, k${item.k}]`;
                
                if (step.pushedItem && step.pushedItem.u === item.u && step.pushedItem.d === item.d && step.pushedItem.k === item.k) {
                    tile.classList.add('pushing');
                }
                container.appendChild(tile);
            });
        }

        function renderTable(step) {
            const container = document.getElementById('dist-tiles');
            container.innerHTML = '';
            
            // Header Row
            const headerRow = document.createElement('div');
            headerRow.className = 'table-row';
            let emptyH = document.createElement('div');
            emptyH.className = 'table-header';
            emptyH.innerText = 'n \\ k';
            headerRow.appendChild(emptyH);
            for (let k = 0; k <= K_val; k++) {
                let colH = document.createElement('div');
                colH.className = 'table-header';
                colH.innerText = `${k}`;
                headerRow.appendChild(colH);
            }
            container.appendChild(headerRow);

            for (let i = 0; i < V_count; i++) {
                const row = document.createElement('div');
                row.className = 'table-row';
                
                let rowH = document.createElement('div');
                rowH.className = 'table-header';
                rowH.innerText = `u${i}`;
                row.appendChild(rowH);

                for (let k = 0; k <= K_val; k++) {
                    const tile = document.createElement('div');
                    tile.className = `tile dist-tile`;
                    
                    if (step.updatedNode === i && step.updatedK === k) {
                        tile.classList.add('highlight-update');
                    }
                    
                    tile.innerText = formatDist(step.dist[i][k]);
                    row.appendChild(tile);
                }
                container.appendChild(row);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                if (i === sourceNode) el.classList.add('source');
                if (i === destNode) el.classList.add('target');
                
                if (step.u === i) el.classList.add('active-u');
                if (step.v === i) el.classList.add('active-v');
            }

            drawEdges(step);
            renderTable(step);
            renderPQ(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? `(u=${step.u}, k=${step.k_u})` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `u=${step.v}` : '—';
            
            let eqStr = 'new_dist < dist[v][new_k]';
            if (step.type === 'relax_check' || step.type === 'relax' || step.type === 'skip_relax') {
                let is_exp = step.w > threshold;
                let nxt_k = step.k_u + (is_exp ? 1 : 0);
                let n_d = step.dist[step.u][step.k_u] + step.w;
                eqStr = `${n_d} < ${formatDist(step.dist[step.v][nxt_k])}`;
            }
            document.getElementById('val-eq').innerText = eqStr;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.className = step.isError ? 'pop-false' : 'pop';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
