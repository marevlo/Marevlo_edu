<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Minimum Steps (BFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 450px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .grid-board {
            display: grid;
            gap: 6px;
        }

        .grid-cell {
            width: 50px; height: 50px;
            background: #21262d;
            border: 2px solid var(--border-main);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-dim); font-weight: bold; font-size: 13px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        .grid-cell.start { border-color: var(--accent-blue); box-shadow: inset 0 0 10px rgba(56,139,253,0.4); color: var(--accent-blue); }
        .grid-cell.target { border-color: var(--accent-green); box-shadow: inset 0 0 10px rgba(63,185,80,0.4); color: var(--accent-green); }
        
        .grid-cell.visited { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .grid-cell.queued { border-color: var(--accent-orange); color: var(--accent-orange); }
        
        .grid-cell.active-u { transform: scale(1.15); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 4; background: #332200; color: var(--accent-orange); }
        .grid-cell.active-v { transform: scale(1.1); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 3; color: var(--accent-purple); }
        
        .grid-cell.path { background: var(--accent-green); border-color: #fff; color: #000; box-shadow: 0 0 15px var(--accent-green); z-index: 5; transform: scale(1.05);}

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 280px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        
        .tile {
            height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 13px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main); padding: 0 10px;
        }
        
        .tile.q-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        
        .tile.pushing { animation: pushAnim 0.3s ease; border-color: var(--accent-green); box-shadow: 0 0 8px var(--accent-green);}
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }
        .pop-error { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 15px var(--accent-red); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">R,C =</label>
        <input type="text" id="dim-input" class="small-input" placeholder="3,3">
        <label class="ui-label">Start =</label>
        <input type="text" id="s-input" class="small-input" placeholder="0,0">
        <label class="ui-label">Target =</label>
        <input type="text" id="t-input" class="small-input" placeholder="2,2">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('3,3', '0,0', '2,2')">3x3</button>
        <button onclick="loadExample('4,5', '0,0', '3,4')">4x5</button>
        <button onclick="loadExample('3,3', '1,1', '0,2')">Center Start</button>
    </div>

    <div class="visual-container">
        <div class="graph-area">
            <div class="grid-board" id="grid-board"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">BFS Queue:</div>
                <div class="tiles-wrapper" id="q-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Format: [(r,c) d:dist]</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Cell (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Distance</span>
            <span class="info-value" id="val-dist" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">minimum steps =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="border-color:var(--accent-blue); background:rgba(56,139,253,0.1)"></span> Start</div>
        <div class="legend-item"><span class="dot" style="border-color:var(--accent-green); background:rgba(63,185,80,0.1)"></span> Target</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Visited</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange)"></span> In Queue</div>
        <div class="legend-item"><span class="dot" style="background:#332200; border-color:var(--accent-orange)"></span> Active Cell</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border-color:#fff;"></span> Shortest Path</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let R = 3;
        let C = 3;
        let srcR = 0, srcC = 0;
        let dstR = 2, dstC = 2;
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample('3,3', '0,0', '2,2'); }

        function loadExample(dimStr, sStr, tStr) {
            document.getElementById('dim-input').value = dimStr;
            document.getElementById('s-input').value = sStr;
            document.getElementById('t-input').value = tStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                let dims = document.getElementById('dim-input').value.split(',').map(Number);
                let start = document.getElementById('s-input').value.split(',').map(Number);
                let target = document.getElementById('t-input').value.split(',').map(Number);
                
                if (dims.length !== 2 || start.length !== 2 || target.length !== 2 || 
                    dims.some(isNaN) || start.some(isNaN) || target.some(isNaN)) {
                    throw "Invalid format";
                }
                
                R = dims[0];
                C = dims[1];
                srcR = start[0]; srcC = start[1];
                dstR = target[0]; dstC = target[1];
                
                if (R <= 0 || C <= 0 || srcR < 0 || srcR >= R || srcC < 0 || srcC >= C || 
                    dstR < 0 || dstR >= R || dstC < 0 || dstC >= C) {
                    alert("Coordinates out of bounds.");
                    return;
                }
                
                if (R > 8 || C > 8) {
                    alert("Max grid size is 8x8 for visual clarity.");
                    return;
                }

                setupGrid();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Use row,col format (e.g., '3,3').");
            }
        }

        function setupGrid() {
            const container = document.getElementById('grid-board');
            container.innerHTML = '';
            
            container.style.gridTemplateColumns = `repeat(${C}, 50px)`;
            container.style.gridTemplateRows = `repeat(${R}, 50px)`;

            for (let r = 0; r < R; r++) {
                for (let c = 0; c < C; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.id = `cell-${r}-${c}`;
                    cell.innerText = `(${r},${c})`;
                    container.appendChild(cell);
                }
            }
        }

        function cloneQ(q) { return q.map(item => ({...item, path: [...item.path]})); }
        function cloneV(v) { return v.map(row => [...row]); }

        function generateSteps() {
            steps = [];
            
            let visited = Array.from({length: R}, () => Array(C).fill(false));
            let q = [{r: srcR, c: srcC, d: 0, path: [[srcR, srcC]]}];
            visited[srcR][srcC] = true;

            steps.push({
                type: 'init',
                q: cloneQ(q),
                visited: cloneV(visited),
                u: null, v: null, path: [],
                pushedItem: null, poppedItem: null,
                panel: `<b>Grid Minimum Steps (Level-order BFS)</b><br>To find the shortest path in an unweighted grid, we use Breadth-First Search.<br>Initialize the Queue with the start cell <b>(${srcR}, ${srcC})</b> at distance 0.`,
                statusText: `Initialization complete.`,
                log: `Initialized BFS. Grid=${R}x${C}, Start=(${srcR},${srcC}), Target=(${dstR},${dstC}).`
            });

            let found = false;
            let dirs = [[0,1], [1,0], [0,-1], [-1,0]]; // Right, Down, Left, Up

            while (q.length > 0) {
                let curr = q.shift();
                
                steps.push({
                    type: 'dequeue',
                    q: cloneQ(q),
                    visited: cloneV(visited),
                    u: curr, v: null, path: [],
                    pushedItem: null, poppedItem: curr,
                    panel: `<b>Dequeue:</b> Extract Cell <b>(${curr.r}, ${curr.c})</b> from the queue.<br>Current distance from start is <b>${curr.d}</b>. Checking its 4-directional neighbors...`,
                    statusText: `Processing Cell (${curr.r}, ${curr.c})...`,
                    log: `\nDequeued (${curr.r}, ${curr.c}), dist=${curr.d}.`
                });

                if (curr.r === dstR && curr.c === dstC) {
                    found = true;
                    steps.push({
                        type: 'target_found',
                        q: cloneQ(q),
                        visited: cloneV(visited),
                        u: curr, v: null, path: curr.path,
                        pushedItem: null, poppedItem: null,
                        panel: `<b style="color:var(--accent-green); font-size:16px;">Target Reached!</b><br>Because BFS explores level-by-level, the first time we pop the target cell, we are guaranteed to have found the shortest path.<br>Minimum Steps = <b>${curr.d}</b>.`,
                        statusText: `Target (${curr.r}, ${curr.c}) found!`,
                        log: `  -> TARGET (${curr.r}, ${curr.c}) reached! Minimum steps = ${curr.d}.`,
                        complete: true, res: curr.d, isError: false
                    });
                    break;
                }

                for (let d of dirs) {
                    let nr = curr.r + d[0];
                    let nc = curr.c + d[1];

                    steps.push({
                        type: 'check',
                        q: cloneQ(q),
                        visited: cloneV(visited),
                        u: curr, v: {r: nr, c: nc}, path: [],
                        pushedItem: null, poppedItem: null,
                        panel: `Checking neighbor <b>(${nr}, ${nc})</b>...<br>Is it within grid boundaries and unvisited?`,
                        statusText: `Evaluating neighbor (${nr}, ${nc})...`,
                        log: `  Check neighbor (${nr}, ${nc}).`
                    });

                    if (nr >= 0 && nr < R && nc >= 0 && nc < C) {
                        if (!visited[nr][nc]) {
                            visited[nr][nc] = true;
                            let pushItem = {r: nr, c: nc, d: curr.d + 1, path: [...curr.path, [nr, nc]]};
                            q.push(pushItem);

                            steps.push({
                                type: 'enqueue',
                                q: cloneQ(q),
                                visited: cloneV(visited),
                                u: curr, v: {r: nr, c: nc}, path: [],
                                pushedItem: pushItem, poppedItem: null,
                                panel: `<b style="color:var(--accent-green)">Valid & Unvisited.</b><br>Mark <b>(${nr}, ${nc})</b> as visited and Enqueue it with distance <b>${curr.d + 1}</b>.`,
                                statusText: `Enqueued (${nr}, ${nc}).`,
                                log: `    -> Valid. Enqueued (${nr}, ${nc}) with dist=${curr.d+1}.`
                            });
                        } else {
                            steps.push({
                                type: 'skip_vis',
                                q: cloneQ(q),
                                visited: cloneV(visited),
                                u: curr, v: {r: nr, c: nc}, path: [],
                                pushedItem: null, poppedItem: null,
                                panel: `<b style="color:var(--accent-red)">No.</b> Neighbor <b>(${nr}, ${nc})</b> has already been visited (or is in the queue).<br>We already have a shorter or equal path to it. Skip.`,
                                statusText: `Already visited. Skipped.`,
                                log: `    -> Already visited. Skipped.`
                            });
                        }
                    } else {
                        steps.push({
                            type: 'skip_oob',
                            q: cloneQ(q),
                            visited: cloneV(visited),
                            u: curr, v: {r: nr, c: nc}, path: [],
                            pushedItem: null, poppedItem: null,
                            panel: `<b style="color:var(--accent-red)">Out of Bounds!</b><br>Neighbor <b>(${nr}, ${nc})</b> is outside the grid. Skip.`,
                            statusText: `Out of bounds. Skipped.`,
                            log: `    -> Out of bounds. Skipped.`
                        });
                    }
                }
            }

            if (!found) {
                steps.push({
                    type: 'not_found',
                    q: cloneQ(q),
                    visited: cloneV(visited),
                    u: null, v: null, path: [],
                    pushedItem: null, poppedItem: null,
                    panel: `<b>Queue Empty!</b><br>The BFS queue is empty and the target <b>(${dstR}, ${dstC})</b> was never reached.<br>The target is <b style="color:var(--accent-red)">unreachable</b> from the start cell.`,
                    statusText: `Algorithm Finished. Target Unreachable.`,
                    log: `\nQueue empty. Target unreachable.`,
                    complete: true, res: "Unreachable", isError: true
                });
            }
        }

        function renderQueue(step) {
            const container = document.getElementById('q-tiles');
            container.innerHTML = '';
            
            if (step.q.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            if (step.poppedItem && step.type === 'dequeue') {
                const pTile = document.createElement('div');
                pTile.className = `tile q-tile popping`;
                pTile.innerText = `[(${step.poppedItem.r},${step.poppedItem.c}) d:${step.poppedItem.d}]`;
                container.appendChild(pTile);
            }

            step.q.forEach(item => {
                const tile = document.createElement('div');
                tile.className = 'tile q-tile';
                tile.innerText = `[(${item.r},${item.c}) d:${item.d}]`;
                
                if (step.pushedItem && step.pushedItem.r === item.r && step.pushedItem.c === item.c) {
                    tile.classList.add('pushing');
                }
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Grid
            for(let r=0; r<R; r++) {
                for(let c=0; c<C; c++) {
                    const el = document.getElementById(`cell-${r}-${c}`);
                    if(!el) continue;
                    
                    el.className = 'grid-cell';
                    
                    if (r === srcR && c === srcC) el.classList.add('start');
                    if (r === dstR && c === dstC) el.classList.add('target');
                    
                    if (step.visited[r][c] && !el.classList.contains('start') && !el.classList.contains('target')) {
                        el.classList.add('visited');
                    }
                    
                    if (step.q.some(item => item.r === r && item.c === c)) {
                        el.classList.add('queued');
                    }

                    if (step.path && step.path.some(p => p[0] === r && p[1] === c)) {
                        el.classList.add('path');
                    }

                    if (step.u && step.u.r === r && step.u.c === c && !step.complete) el.classList.add('active-u');
                    if (step.v && step.v.r === r && step.v.c === c && !step.complete) el.classList.add('active-v');
                }
            }

            renderQueue(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? `(${step.u.r}, ${step.u.c})` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `(${step.v.r}, ${step.v.c})` : '—';
            document.getElementById('val-dist').innerText = step.u !== null ? step.u.d : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.res : '—';
            if (step.complete) {
                resVal.className = step.isError ? 'pop-error' : 'pop';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
