<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Minimum Steps (BFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* active cell u (dequeued)        */
            --accent-blue:   #06b6d4;   /* start / queue / wavefront        */
            --accent-green:  #22c55e;   /* target / visited / final path    */
            --accent-red:    #f85149;   /* out of bounds / unreachable      */
            --accent-purple: #a855f7;   /* neighbor v / cursor              */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .small-input { width: 64px; text-align: center; }
        input:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; flex-shrink: 0; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.fail { border-color: rgba(248,81,73,0.4); background: rgba(248,81,73,0.06); }
        .narration.fail::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .grid-stage { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; padding: 22px; display: flex; justify-content: center; align-items: flex-start; gap: 34px; flex-wrap: wrap; }
        .grid-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .grid-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        .board-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .board-title { font-family: var(--mono); font-size: 11px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .grid-board { display: grid; gap: 6px; }
        .grid-cell {
            position: relative;
            width: 56px; height: 56px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 9px; font-family: var(--mono); font-weight: 800; font-size: 12px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-dim);
            will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s, opacity 0.35s;
        }
        .grid-cell .coord { font-size: 11px; opacity: 0.85; }
        .grid-cell .dist { font-size: 13px; font-weight: 900; min-height: 14px; line-height: 1; }

        /* wavefront coloring by distance layer -- progressively lighter blue */
        .grid-cell.visited { border-color: rgba(6,182,212,0.45); background: rgba(6,182,212,0.10); color: #a5f3fc; }
        .grid-cell.queued  { border-color: rgba(245,165,36,0.55); background: rgba(245,165,36,0.08); color: #ffd591; }

        .grid-cell.start  { border-color: var(--accent-blue); box-shadow: inset 0 0 12px rgba(6,182,212,0.4); color: #a5f3fc; }
        .grid-cell.target { border-color: var(--accent-green); box-shadow: inset 0 0 12px rgba(34,197,94,0.4); color: #86efac; }

        .grid-cell.active-u { transform: scale(1.1); box-shadow: 0 0 22px rgba(245,165,36,0.6), inset 0 0 12px rgba(245,165,36,0.18); border-color: var(--accent-orange); z-index: 4; background: rgba(245,165,36,0.16); color: #ffd591; }
        .grid-cell.active-v { transform: scale(1.08); box-shadow: 0 0 16px rgba(168,85,247,0.55); border-color: var(--accent-purple); z-index: 3; color: #d8b4fe; }
        .grid-cell.active-v.oob { border-color: var(--accent-red); box-shadow: 0 0 16px rgba(248,81,73,0.5); color: #ff9a91; }

        .grid-cell.path { background: linear-gradient(180deg, rgba(47,224,143,0.9), rgba(33,194,117,0.9)); border-color: #fff; color: #06251a; box-shadow: 0 0 18px rgba(34,197,94,0.5); z-index: 5; transform: scale(1.04); }

        .grid-cell .ring { position: absolute; inset: 4px; border-radius: 6px; pointer-events: none; }
        .grid-cell.start  .ring { border: 1.5px dashed rgba(6,182,212,0.7); }
        .grid-cell.target .ring { border: 1.5px dashed rgba(34,197,94,0.7); }

        /* BFS queue column */
        .queue-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; min-width: 170px; }
        .queue-col { display: flex; flex-direction: column; gap: 6px; align-items: stretch; width: 170px; min-height: 46px; }
        .q-tile { font-family: var(--mono); font-size: 12.5px; font-weight: 700; padding: 8px 11px; border-radius: 9px; border: 1.5px solid rgba(6,182,212,0.35); background: rgba(6,182,212,0.10); color: #a5f3fc; white-space: nowrap; will-change: transform, opacity; text-align: center; }
        .q-tile.head { border-color: var(--accent-orange); background: rgba(245,165,36,0.14); color: #ffd591; box-shadow: 0 0 14px rgba(245,165,36,0.3); }
        .q-empty { font-family: var(--mono); font-size: 12px; color: var(--text-dim); opacity: 0.6; }
        .q-hint { font-family: var(--mono); font-size: 10.5px; color: var(--text-dim); opacity: 0.7; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.u b { color: var(--accent-orange); } .pill.v b { color: var(--accent-purple); } .pill.d b { color: var(--accent-blue); } .pill.r b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 120px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        .confetti-piece { position: fixed; width: 9px; height: 14px; top: -20px; z-index: 200; pointer-events: none; border-radius: 2px; }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">R,C =</label>
        <input type="text" id="dim-input" class="small-input" placeholder="3,3">
        <label class="ui-label">start =</label>
        <input type="text" id="s-input" class="small-input" placeholder="0,0">
        <label class="ui-label">target =</label>
        <input type="text" id="t-input" class="small-input" placeholder="2,2">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample('3,3','0,0','2,2')">3&times;3</button>
        <button onclick="loadExample('4,5','0,0','3,4')">4&times;5</button>
        <button onclick="loadExample('3,3','1,1','0,2')">Center start</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Grid Minimum Steps <span class="sub">&middot; unweighted BFS &middot; 4-connected &middot; shortest path start &#8594; target &middot; O(R&middot;C)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="grid-stage" id="grid-stage">
                    <div class="board-wrap">
                        <div class="board-title">Grid</div>
                        <div class="grid-board" id="grid-board"></div>
                    </div>
                    <div class="queue-wrap">
                        <div class="board-title">BFS queue (front&#8594;back)</div>
                        <div class="queue-col" id="queue-col"></div>
                        <div class="q-hint">[(r,c) d:dist]</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill u">active u <b id="st-u">&mdash;</b></span>
                            <span class="pill v">neighbor v <b id="st-v">&mdash;</b></span>
                            <span class="pill d">dist(u) <b id="st-dist">&mdash;</b></span>
                            <span class="pill">|queue| <b id="st-qlen">&mdash;</b></span>
                            <span class="pill r">min steps <b id="st-res">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // --------- Motion engine (spring pop, zero deps) ---------
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.7 + 0.4 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
            enter(el) {
                if (REDUCED) return;
                el.animate([{ opacity: 0, transform: 'translateY(8px) scale(0.9)' }, { opacity: 1, transform: 'translateY(0) scale(1)' }], { duration: 260, easing: 'cubic-bezier(0.34,1.2,0.64,1)' });
            },
        };

        // --------- State (preserves the original file's grid / examples / default) ---------
        let R = 3, C = 3;
        let SR = 0, SC = 0;   // start
        let TR = 2, TC = 2;   // target
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        const delays = [1500, 750, 350];
        const cellEls = {};   // 'r,c' -> grid cell element
        const tileEls = {};   // queue tile key -> element

        const CODE = [
            [['kw','def '],['fn','minSteps'],['src','(R, C, start, target):']],
            [['src','  q = deque([(start, 0)])']],
            [['src','  visited = {start}']],
            [['kw','  while '],['src','q:']],
            [['src','    (r, c), d = q.popleft()']],
            [['kw','    if '],['src','(r, c) == target: '],['kw','return '],['src','d']],
            [['kw','    for '],['src','(nr, nc) '],['kw','in '],['src','neighbors(r, c):']],
            [['kw','      if '],['src','in_bounds and (nr,nc) not in visited:']],
            [['src','        visited.add((nr, nc))']],
            [['src','        q.append(((nr, nc), d + 1))']],
            [['kw','  return '],['src','-1   # target unreachable']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // --------- step generation (genuine BFS simulation, immutable snapshots) ---------
        // directions: Right, Down, Left, Up
        const DIRS = [[0,1],[1,0],[0,-1],[-1,0]];
        const DIRWORD = { '0,1':'right', '1,0':'down', '0,-1':'left', '-1,0':'up' };

        function generateSteps() {
            steps = [];
            const visited = Array.from({ length: R }, () => Array(C).fill(false));
            const dist = Array.from({ length: R }, () => Array(C).fill(-1));
            // queue of { r, c, d, path }
            let q = [{ r: SR, c: SC, d: 0, path: [[SR, SC]] }];
            visited[SR][SC] = true; dist[SR][SC] = 0;

            const snap = (extra) => Object.assign({
                R, C, sr: SR, sc: SC, tr: TR, tc: TC,
                queue: q.map(it => ({ r: it.r, c: it.c, d: it.d })),
                visited: visited.map(row => row.slice()),
                dist: dist.map(row => row.slice()),
                u: null, v: null, oob: false, path: [],
                complete: false, result: null, res: null,
            }, extra);

            steps.push(snap({
                code: [0, 1, 2], u: { r: SR, c: SC, d: 0 },
                panel: `<b>Grid minimum steps</b> via level-order <b>BFS</b>. In an unweighted grid the first time BFS reaches a cell it does so along a shortest path. Seed the queue with start <code>(${SR}, ${SC})</code> at distance <b>0</b> and mark it visited.`,
                log: `init  ${R}&times;${C} grid &middot; start (${SR},${SC}) &middot; target (${TR},${TC})`
            }));

            let found = false;
            let answer = null;
            let answerPath = null;

            while (q.length > 0) {
                const u = q.shift();

                steps.push(snap({
                    code: [3, 4], u,
                    panel: `<b>Dequeue</b> the front cell <code>(${u.r}, ${u.c})</code> at distance <b>${u.d}</b>. We will scan its 4 neighbours (right, down, left, up) and enqueue any unvisited in-bounds cell.`,
                    log: `pop   (${u.r},${u.c})  d=${u.d}`
                }));

                if (u.r === TR && u.c === TC) {
                    found = true; answer = u.d; answerPath = u.path;
                    steps.push(snap({
                        code: [5], u, path: u.path, complete: true, result: 'done', res: u.d,
                        panel: `<b style="color:#86efac">Target reached.</b> Because BFS expands strictly in distance order, the first pop of <code>(${TR}, ${TC})</code> is along a shortest route. <b>Minimum steps = ${u.d}</b>. The green cells trace one shortest path.`,
                        log: `done  target (${TR},${TC}) popped &#8594; min steps = ${u.d}`
                    }));
                    break;
                }

                for (let i = 0; i < DIRS.length; i++) {
                    const [dr, dc] = DIRS[i];
                    const nr = u.r + dr, nc = u.c + dc;
                    const key = dr + ',' + dc;

                    const inBounds = nr >= 0 && nr < R && nc >= 0 && nc < C;

                    if (!inBounds) {
                        steps.push(snap({
                            code: [6, 7], u, v: { r: nr, c: nc }, oob: true,
                            panel: `Look <b>${DIRWORD[key]}</b> &#8594; neighbour <code>(${nr}, ${nc})</code> is <b style="color:#ff9a91">out of bounds</b>. Skip it.`,
                            log: `  ${DIRWORD[key].padEnd(5)} (${nr},${nc})  out of bounds &#8594; skip`
                        }));
                        continue;
                    }

                    if (visited[nr][nc]) {
                        steps.push(snap({
                            code: [6, 7], u, v: { r: nr, c: nc },
                            panel: `Look <b>${DIRWORD[key]}</b> &#8594; neighbour <code>(${nr}, ${nc})</code> is <b>already visited</b> (a shorter or equal route exists). Skip it.`,
                            log: `  ${DIRWORD[key].padEnd(5)} (${nr},${nc})  visited &#8594; skip`
                        }));
                        continue;
                    }

                    // valid, unvisited -> mark + enqueue
                    visited[nr][nc] = true;
                    dist[nr][nc] = u.d + 1;
                    q.push({ r: nr, c: nc, d: u.d + 1, path: [...u.path, [nr, nc]] });

                    steps.push(snap({
                        code: [7, 8, 9], u, v: { r: nr, c: nc },
                        panel: `Look <b>${DIRWORD[key]}</b> &#8594; neighbour <code>(${nr}, ${nc})</code> is <b style="color:#86efac">in-bounds and unvisited</b>. Mark visited and <b>enqueue</b> it at distance <b>${u.d + 1}</b>.`,
                        log: `  ${DIRWORD[key].padEnd(5)} (${nr},${nc})  enqueue d=${u.d + 1}`
                    }));
                }
            }

            if (!found) {
                steps.push(snap({
                    code: [10], complete: true, result: 'fail', res: -1,
                    panel: `<b>Queue empty.</b> BFS exhausted every reachable cell without ever popping the target <code>(${TR}, ${TC})</code>. The target is <b style="color:#ff9a91">unreachable</b>; return <b>-1</b>.`,
                    log: `done  queue empty &#8594; target unreachable, return -1`
                }));
            }
        }

        // --------- render (persistent DOM) ---------
        function buildBoard() {
            const board = document.getElementById('grid-board');
            board.innerHTML = '';
            Object.keys(cellEls).forEach(k => delete cellEls[k]);
            board.style.gridTemplateColumns = `repeat(${C}, 56px)`;
            board.style.gridTemplateRows = `repeat(${R}, 56px)`;
            for (let r = 0; r < R; r++) {
                for (let c = 0; c < C; c++) {
                    const el = document.createElement('div');
                    el.className = 'grid-cell';
                    el.innerHTML = `<span class="ring"></span><span class="coord">(${r},${c})</span><span class="dist"></span>`;
                    board.appendChild(el);
                    cellEls[r + ',' + c] = el;
                }
            }
        }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            for (let r = 0; r < R; r++) {
                for (let c = 0; c < C; c++) {
                    const el = cellEls[r + ',' + c]; if (!el) continue;
                    const isStart = (r === step.sr && c === step.sc);
                    const isTarget = (r === step.tr && c === step.tc);
                    const inQueue = step.queue.some(it => it.r === r && it.c === c);
                    const onPath = step.path && step.path.some(p => p[0] === r && p[1] === c);
                    const isU = step.u && step.u.r === r && step.u.c === c;
                    const isV = step.v && step.v.r === r && step.v.c === c;

                    let cls = 'grid-cell';
                    // base layer: visited / queued
                    if (step.visited[r][c]) cls += ' visited';
                    if (inQueue) cls += ' queued';
                    // start / target markers
                    if (isStart) cls += ' start';
                    if (isTarget) cls += ' target';
                    // final path overlay
                    if (onPath) cls += ' path';
                    // active overlays (suppressed once complete so the path reads cleanly)
                    if (!step.complete) {
                        if (isU) cls += ' active-u';
                        if (isV) cls += ' active-v' + (step.oob ? ' oob' : '');
                    }
                    el.className = cls;

                    const distEl = el.querySelector('.dist');
                    const d = step.dist[r][c];
                    distEl.textContent = d >= 0 ? ('d' + d) : '';
                }
            }

            // --- BFS queue column (persistent, keyed by r,c,d) ---
            const col = document.getElementById('queue-col');
            const used = new Set();
            const queue = step.queue;
            if (queue.length === 0) {
                Object.keys(tileEls).forEach(k => { tileEls[k].remove(); delete tileEls[k]; });
                if (!col.querySelector('.q-empty')) col.innerHTML = '<div class="q-empty">{ empty }</div>';
            } else {
                const emptyEl = col.querySelector('.q-empty'); if (emptyEl) emptyEl.remove();
                queue.forEach((it, i) => {
                    const tkey = it.r + ',' + it.c + ':' + it.d;
                    used.add(tkey);
                    let te = tileEls[tkey];
                    const fresh = !te;
                    if (fresh) { te = document.createElement('div'); te.className = 'q-tile'; tileEls[tkey] = te; }
                    te.textContent = `[(${it.r},${it.c}) d:${it.d}]`;
                    te.classList.toggle('head', i === 0);
                    col.appendChild(te);
                    if (fresh) Motion.enter(te);
                });
                Object.keys(tileEls).forEach(k => { if (!used.has(k)) { tileEls[k].remove(); delete tileEls[k]; } });
            }

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', step.complete && step.result === 'done');
            mp.classList.toggle('fail', step.complete && step.result === 'fail');
            highlightCode(step.code);

            // state pills
            document.getElementById('st-u').textContent = step.u ? `(${step.u.r},${step.u.c})` : '—';
            document.getElementById('st-v').textContent = step.v ? `(${step.v.r},${step.v.c})` : '—';
            document.getElementById('st-dist').textContent = step.u ? step.u.d : '—';
            document.getElementById('st-qlen').textContent = step.queue.length;
            document.getElementById('st-res').textContent = step.complete ? step.res : '—';

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;

            if (step.complete && step.result === 'done' && idx === steps.length - 1) fireConfetti();
        }

        // --------- confetti on success ---------
        let confettiFired = false;
        function fireConfetti() {
            if (REDUCED || confettiFired) return;
            confettiFired = true;
            const colors = ['#06b6d4', '#a855f7', '#22c55e', '#f5a524', '#e8eefb'];
            for (let i = 0; i < 70; i++) {
                const p = document.createElement('div');
                p.className = 'confetti-piece';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.background = colors[i % colors.length];
                p.style.opacity = (0.7 + Math.random() * 0.3).toFixed(2);
                document.body.appendChild(p);
                const dx = (Math.random() * 2 - 1) * 160;
                const dy = window.innerHeight + 60;
                const rot = (Math.random() * 2 - 1) * 720;
                p.animate(
                    [{ transform: 'translate(0,0) rotate(0deg)' }, { transform: `translate(${dx}px, ${dy}px) rotate(${rot}deg)` }],
                    { duration: 1600 + Math.random() * 900, easing: 'cubic-bezier(0.2,0.6,0.4,1)' }
                ).onfinish = () => p.remove();
            }
        }

        // --------- controls ---------
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(tileEls).forEach(k => { tileEls[k].remove(); delete tileEls[k]; });
            document.getElementById('queue-col').innerHTML = '';
        }
        function loadData() {
            pause(); confettiFired = false;
            clearDom();
            buildBoard();
            generateSteps();
            renderStep(0);
        }

        function loadExample(dimStr, sStr, tStr) {
            document.getElementById('dim-input').value = dimStr;
            document.getElementById('s-input').value = sStr;
            document.getElementById('t-input').value = tStr;
            parseAndLoad();
        }
        function loadCustom() { parseAndLoad(); }

        function parseAndLoad() {
            const dims = document.getElementById('dim-input').value.split(',').map(s => parseInt(s.trim(), 10));
            const start = document.getElementById('s-input').value.split(',').map(s => parseInt(s.trim(), 10));
            const target = document.getElementById('t-input').value.split(',').map(s => parseInt(s.trim(), 10));
            if (dims.length !== 2 || start.length !== 2 || target.length !== 2 ||
                dims.some(isNaN) || start.some(isNaN) || target.some(isNaN)) return;
            const r = dims[0], c = dims[1];
            if (r <= 0 || c <= 0 || r > 8 || c > 8) return;
            if (start[0] < 0 || start[0] >= r || start[1] < 0 || start[1] >= c) return;
            if (target[0] < 0 || target[0] >= r || target[1] < 0 || target[1] >= c) return;
            R = r; C = c; SR = start[0]; SC = start[1]; TR = target[0]; TC = target[1];
            loadData();
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        ['dim-input', 's-input', 't-input'].forEach(id => document.getElementById(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); }));

        buildCodePanel();
        window.onload = () => loadExample('3,3', '0,0', '2,2');
    </script>
</body>
</html>
