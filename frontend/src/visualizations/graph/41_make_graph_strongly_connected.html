<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Graph Strongly Connected - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
            
            --scc-0: #e3b341;
            --scc-1: #388bfd;
            --scc-2: #3fb950;
            --scc-3: #f85149;
            --scc-4: #a371f7;
            --scc-5: #ff7b72;
            --scc-6: #d2a8ff;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 500px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .scc-node-0 { background: rgba(227, 179, 65, 0.15); border-color: var(--scc-0); color: var(--scc-0); box-shadow: 0 0 10px rgba(227,179,65,0.3);}
        .scc-node-1 { background: rgba(56, 139, 253, 0.15); border-color: var(--scc-1); color: var(--scc-1); box-shadow: 0 0 10px rgba(56,139,253,0.3);}
        .scc-node-2 { background: rgba(63, 185, 80, 0.15); border-color: var(--scc-2); color: var(--scc-2); box-shadow: 0 0 10px rgba(63,185,80,0.3);}
        .scc-node-3 { background: rgba(248, 81, 73, 0.15); border-color: var(--scc-3); color: var(--scc-3); box-shadow: 0 0 10px rgba(248,81,73,0.3);}
        .scc-node-4 { background: rgba(163, 113, 247, 0.15); border-color: var(--scc-4); color: var(--scc-4); box-shadow: 0 0 10px rgba(163,113,247,0.3);}

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 320px; max-width: 400px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        
        .stats-row { display: flex; justify-content: space-between; font-family: monospace; font-size: 14px; margin-bottom: 4px; border-bottom: 1px solid var(--border-main); padding-bottom: 4px;}
        .stats-val { font-weight: bold; color: var(--text-main); }
        
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        .scc-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px;}
        
        .scc-badge {
            padding: 4px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; font-family: monospace;
            border: 1px solid currentColor; background: rgba(255,255,255,0.05);
        }
        .deg-val { font-family: monospace; font-size: 14px; font-weight: bold; min-width: 50px; text-align: center;}
        .deg-zero { color: var(--accent-red); animation: pulseZero 1s infinite alternate; }

        @keyframes pulseZero { 0% { text-shadow: 0 0 5px var(--accent-red); } 100% { text-shadow: 0 0 15px var(--accent-red); transform: scale(1.1); } }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 850px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 850px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1.1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 850px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
        
        .edge-scc { stroke-dasharray: 4; opacity: 0.4; }
        .edge-cross { stroke-width: 3; }
        .edge-highlight { stroke: var(--accent-purple); stroke-width: 4; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="3">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1], [1,2]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(3, '[[0,1], [1,2]]')">Ex 1</button>
        <button onclick="loadExample(4, '[[0,1], [1,2], [2,3]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange); text-align:center;">DAG of SCCs (Degrees)</div>
                <div class="stats-row">
                    <span style="flex:1;">SCC ID</span>
                    <span style="flex:1; text-align:center;">In-Degree</span>
                    <span style="flex:1; text-align:center;">Out-Degree</span>
                </div>
                <div id="deg-container"></div>
            </div>
            <div class="result-display">
                <span class="ui-label">min edges to add =</span>
                <span id="res-val">—</span>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Total SCCs Found</span>
            <span class="info-value" id="val-scc-count" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">SCCs with In-Degree 0</span>
            <span class="info-value" id="val-zero-in" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">SCCs with Out-Degree 0</span>
            <span class="info-value" id="val-zero-out" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Formula</span>
            <span class="info-value" id="val-formula" style="color: var(--text-main); font-size:13px;">max(zeroIn, zeroOut)</span>
        </div>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--scc-0)"></span> SCC 0</div>
        <div class="legend-item"><span class="dot" style="background:var(--scc-1)"></span> SCC 1</div>
        <div class="legend-item"><span class="dot" style="background:var(--scc-2)"></span> SCC 2</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--border-main); border-style:dashed;"></span> Internal SCC Edge</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--border-main); border-width:3px;"></span> Cross-SCC Edge (DAG)</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 3;
        let edgesList = [[0,1], [1,2]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [3200, 1600, 800];

        const sccColors = ['var(--scc-0)', 'var(--scc-1)', 'var(--scc-2)', 'var(--scc-3)', 'var(--scc-4)', 'var(--scc-5)', 'var(--scc-6)'];

        function init() { loadExample(3, '[[0,1], [1,2]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || !Array.isArray(edgesList)) throw "Invalid inputs";
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is an integer and edges is a valid array of [u, v].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            const cx = 250;
            const cy = 200;
            const radius = 140;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        // Kosaraju's Algorithm internally to generate step data
        function getSCCs() {
            let adj = Array.from({length: V_count}, () => []);
            let revAdj = Array.from({length: V_count}, () => []);
            for (let [u, v] of edgesList) {
                adj[u].push(v);
                revAdj[v].push(u);
            }

            let visited = new Array(V_count).fill(false);
            let stack = [];

            function fillOrder(v) {
                visited[v] = true;
                for (let next of adj[v]) {
                    if (!visited[next]) fillOrder(next);
                }
                stack.push(v);
            }

            for (let i = 0; i < V_count; i++) {
                if (!visited[i]) fillOrder(i);
            }

            visited.fill(false);
            let sccs = [];
            let sccMap = new Array(V_count).fill(-1);

            function dfsUtil(v, currentSCC) {
                visited[v] = true;
                currentSCC.push(v);
                sccMap[v] = sccs.length;
                for (let next of revAdj[v]) {
                    if (!visited[next]) dfsUtil(next, currentSCC);
                }
            }

            while (stack.length > 0) {
                let v = stack.pop();
                if (!visited[v]) {
                    let currentSCC = [];
                    dfsUtil(v, currentSCC);
                    sccs.push(currentSCC);
                }
            }

            return { sccs, sccMap };
        }

        function generateSteps() {
            steps = [];
            
            let { sccs, sccMap } = getSCCs();
            let sccCount = sccs.length;

            steps.push({
                type: 'init', sccMap: new Array(V_count).fill(-1), sccCount: 0, sccs: [], inDeg: {}, outDeg: {},
                zeroIn: 0, zeroOut: 0, activeEdge: null,
                panel: `<b>Make Graph Strongly Connected</b><br>To find the minimum edges required to make a directed graph Strongly Connected, we first group cycles into <b>Strongly Connected Components (SCCs)</b>.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. V=${V_count}, E=${edgesList.length}.`
            });

            steps.push({
                type: 'scc_found', sccMap: sccMap, sccCount: sccCount, sccs: sccs, inDeg: {}, outDeg: {},
                zeroIn: 0, zeroOut: 0, activeEdge: null,
                panel: `<b>Step 1: Identify SCCs</b><br>Using an algorithm like Kosaraju's or Tarjan's, we identified <b>${sccCount}</b> Strongly Connected Components.<br>Nodes belonging to the same SCC are highlighted with the same color.`,
                statusText: `Found ${sccCount} SCCs.`,
                log: `\nFound ${sccCount} SCCs: ${JSON.stringify(sccs)}`
            });

            if (sccCount === 1) {
                steps.push({
                    type: 'final', sccMap: sccMap, sccCount: sccCount, sccs: sccs, inDeg: {0:0}, outDeg: {0:0},
                    zeroIn: 0, zeroOut: 0, activeEdge: null,
                    panel: `<b>Algorithm Complete!</b><br>The graph consists of a single SCC, meaning it is already Strongly Connected. We need to add <b>0</b> edges.`,
                    complete: true, result: 0,
                    statusText: `Graph is already strongly connected.`,
                    log: `\nSingle SCC. Result: 0`,
                    logColor: 'var(--accent-green)'
                });
                return;
            }

            steps.push({
                type: 'condense', sccMap: sccMap, sccCount: sccCount, sccs: sccs, inDeg: {}, outDeg: {},
                zeroIn: 0, zeroOut: 0, activeEdge: null,
                panel: `<b>Step 2: Condense the Graph</b><br>We treat each SCC as a single "meta-node". Now, we examine all edges to find connections <i>between</i> different SCCs to build a Directed Acyclic Graph (DAG).`,
                statusText: `Condensing graph...`,
                log: `\nCondensing graph into DAG of SCCs.`
            });

            let inDegree = new Array(sccCount).fill(0);
            let outDegree = new Array(sccCount).fill(0);
            let dagEdges = new Set();

            for (let [u, v] of edgesList) {
                let sccU = sccMap[u];
                let sccV = sccMap[v];
                
                if (sccU !== sccV) {
                    let edgeKey = `${sccU}-${sccV}`;
                    if (!dagEdges.has(edgeKey)) {
                        dagEdges.add(edgeKey);
                        outDegree[sccU]++;
                        inDegree[sccV]++;
                        
                        steps.push({
                            type: 'cross_edge', sccMap: sccMap, sccCount: sccCount, sccs: sccs, 
                            inDeg: {...inDegree}, outDeg: {...outDegree}, zeroIn: 0, zeroOut: 0, activeEdge: [u, v],
                            panel: `Edge <b>${u} ➔ ${v}</b> crosses from SCC ${sccU} to SCC ${sccV}.<br>Incrementing <code>Out-Degree</code> for SCC ${sccU} and <code>In-Degree</code> for SCC ${sccV}.`,
                            statusText: `Found cross-SCC edge ${u}->${v}.`,
                            log: `  Cross-edge ${u}->${v}: OutDeg[SCC${sccU}]++, InDeg[SCC${sccV}]++`
                        });
                    }
                }
            }

            let zeroInCount = 0;
            let zeroOutCount = 0;
            for (let i = 0; i < sccCount; i++) {
                if (inDegree[i] === 0) zeroInCount++;
                if (outDegree[i] === 0) zeroOutCount++;
            }

            steps.push({
                type: 'calc_zeros', sccMap: sccMap, sccCount: sccCount, sccs: sccs, 
                inDeg: {...inDegree}, outDeg: {...outDegree}, zeroIn: zeroInCount, zeroOut: zeroOutCount, activeEdge: null,
                panel: `<b>Step 3: Count Zero Degrees</b><br>Count the number of condensed components with In-Degree = 0 (<b style="color:var(--accent-red)">${zeroInCount}</b>) and Out-Degree = 0 (<b style="color:var(--accent-red)">${zeroOutCount}</b>).<br>These are the "sources" and "sinks" of our DAG.`,
                statusText: `Counting sources and sinks in DAG...`,
                log: `\nZero In-Degree SCCs: ${zeroInCount}. Zero Out-Degree SCCs: ${zeroOutCount}.`
            });

            let ans = Math.max(zeroInCount, zeroOutCount);

            steps.push({
                type: 'final', sccMap: sccMap, sccCount: sccCount, sccs: sccs, 
                inDeg: {...inDegree}, outDeg: {...outDegree}, zeroIn: zeroInCount, zeroOut: zeroOutCount, activeEdge: null,
                panel: `<b>Algorithm Complete!</b><br>To make the graph strongly connected, we must connect all "sinks" back to "sources".<br>Result = <code>max(zeroIn, zeroOut)</code> = <code>max(${zeroInCount}, ${zeroOutCount})</code> = <b style="color:var(--accent-green); font-size:18px;">${ans}</b>.`,
                complete: true, result: ans,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Minimum edges to add = ${ans}`,
                logColor: 'var(--accent-blue)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            edgesList.forEach(e => {
                const u = e[0];
                const v = e[1];
                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let sccU = step.sccMap[u];
                let sccV = step.sccMap[v];
                let isInternal = (sccU !== -1 && sccV !== -1 && sccU === sccV);
                let isCross = (sccU !== -1 && sccV !== -1 && sccU !== sccV);
                let isActive = step.activeEdge && step.activeEdge[0] === u && step.activeEdge[1] === v;

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrinkTarget = nodeRadius + 6; 
                const shrinkSource = nodeRadius + 2; 
                
                const x1 = p1.x + (dx/len)*shrinkSource; 
                const y1 = p1.y + (dy/len)*shrinkSource;
                const x2 = p2.x - (dx/len)*shrinkTarget; 
                const y2 = p2.y - (dy/len)*shrinkTarget;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);

                if (isActive) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('marker-end', 'url(#arrow-active)');
                    line.classList.add('line-anim');
                    line.setAttribute('stroke-dasharray', '8');
                    setTimeout(() => svg.appendChild(line), 0);
                } else if (isInternal) {
                    line.setAttribute('stroke', 'var(--text-dim)');
                    line.setAttribute('stroke-width', '1.5');
                    line.setAttribute('marker-end', 'url(#arrow-normal)');
                    line.classList.add('edge-scc');
                    svg.appendChild(line);
                } else if (isCross) {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '3');
                    line.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(line);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(line);
                }
            });
        }

        function renderDegrees(step) {
            const container = document.getElementById('deg-container');
            container.innerHTML = '';
            
            if (step.sccCount === 0) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">Waiting for SCCs...</span>';
                return;
            }

            for(let i=0; i<step.sccCount; i++) {
                const row = document.createElement('div');
                row.className = 'scc-row';
                
                const sccBadge = document.createElement('div');
                sccBadge.className = 'scc-badge';
                sccBadge.innerText = `SCC ${i}`;
                sccBadge.style.color = sccColors[i % sccColors.length];
                
                const inDeg = step.inDeg[i] !== undefined ? step.inDeg[i] : 0;
                const outDeg = step.outDeg[i] !== undefined ? step.outDeg[i] : 0;
                
                const inSpan = document.createElement('div');
                inSpan.className = 'deg-val';
                inSpan.style.flex = "1";
                inSpan.innerText = inDeg;
                if (inDeg === 0 && step.type === 'calc_zeros' || step.type === 'final') {
                    if (inDeg === 0) inSpan.classList.add('deg-zero');
                }

                const outSpan = document.createElement('div');
                outSpan.className = 'deg-val';
                outSpan.style.flex = "1";
                outSpan.innerText = outDeg;
                if (outDeg === 0 && step.type === 'calc_zeros' || step.type === 'final') {
                    if (outDeg === 0) outSpan.classList.add('deg-zero');
                }

                row.appendChild(sccBadge);
                row.appendChild(inSpan);
                row.appendChild(outSpan);
                container.appendChild(row);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                let sccId = step.sccMap[i];
                if (sccId !== -1) {
                    el.classList.add(`scc-node-${sccId % 7}`);
                }
            }

            drawEdges(step);
            renderDegrees(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-scc-count').innerText = step.sccCount > 0 ? step.sccCount : '—';
            document.getElementById('val-zero-in').innerText = step.type === 'calc_zeros' || step.type === 'final' ? step.zeroIn : '—';
            document.getElementById('val-zero-out').innerText = step.type === 'calc_zeros' || step.type === 'final' ? step.zeroOut : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
