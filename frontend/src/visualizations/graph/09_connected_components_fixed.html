<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connected Components (DFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
            
            /* Component Colors */
            --comp-1: #388bfd; /* Blue */
            --comp-2: #e3b341; /* Orange */
            --comp-3: #3fb950; /* Green */
            --comp-4: #a371f7; /* Purple */
            --comp-5: #f85149; /* Red */
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 60px; text-align: center; }
        .med-input { width: 300px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 400px;
            height: 350px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.active { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 12px rgba(255,255,255,0.3); z-index: 2; border-color: #fff; }

        .arrays-col { display: flex; flex-direction: column; gap: 20px; min-width: 250px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 110px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 14px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-dim);
        }

        .comp-1 { border-color: var(--comp-1) !important; color: var(--comp-1) !important; background: rgba(56, 139, 253, 0.1) !important; }
        .comp-2 { border-color: var(--comp-2) !important; color: var(--comp-2) !important; background: rgba(227, 179, 65, 0.1) !important; }
        .comp-3 { border-color: var(--comp-3) !important; color: var(--comp-3) !important; background: rgba(63, 185, 80, 0.1) !important; }
        .comp-4 { border-color: var(--comp-4) !important; color: var(--comp-4) !important; background: rgba(163, 113, 247, 0.1) !important; }
        .comp-5 { border-color: var(--comp-5) !important; color: var(--comp-5) !important; background: rgba(248, 81, 73, 0.1) !important; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 700px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 700px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 12px var(--accent-green); font-size: 28px !important;}

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim {
            stroke-dasharray: 6;
            animation: dash 1s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -12; }
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="text" id="n-input" class="small-input" placeholder="5">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1],[1,2],[3,4]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(5, '[[0,1],[1,2],[3,4]]')">Ex 1</button>
        <button onclick="loadExample(4, '[[0,1],[2,3]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label">visited Array:</div>
                <div class="tiles-wrapper" id="visited-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Vertex (i)</span>
            <span class="info-value" id="val-i" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">DFS Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Component Count</span>
            <span class="info-value" id="val-count" style="color: var(--accent-green);">0</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">total components =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#fff"></span> Active Processing</div>
        <div class="legend-item"><span class="dot" style="background:var(--comp-1)"></span> Component 1</div>
        <div class="legend-item"><span class="dot" style="background:var(--comp-2)"></span> Component 2</div>
        <div class="legend-item"><span class="dot" style="background:var(--comp-3)"></span> Component 3</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple)"></span> Edge Traversal</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let N = 5;
        let edgesList = [[0,1],[1,2],[3,4]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2000, 1000, 500];

        function init() { loadExample(5, '[[0,1],[1,2],[3,4]]'); }

        function loadExample(n_val, e_str) {
            document.getElementById('n-input').value = n_val;
            document.getElementById('e-input').value = e_str;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                N = parseInt(document.getElementById('n-input').value);
                const eStr = document.getElementById('e-input').value.replace(/'/g, '"');
                
                edgesList = JSON.parse(eStr);
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure N is an integer and edges is a valid JSON array.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            const cx = 200;
            const cy = 175;
            const radius = 120;

            for (let i = 0; i < N; i++) {
                const angle = (Math.PI * 2 * i) / N - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let adj = Array.from({length: N}, () => []);
            for(let [u, v] of edgesList) {
                adj[u].push(v);
                adj[v].push(u); // Undirected
            }

            let visited = new Array(N).fill(false);
            let compId = new Array(N).fill(0);
            let count = 0;

            steps.push({
                type: 'init', i: null, u: null, v: null, count: 0,
                visited: [...visited], compId: [...compId], activeEdge: null,
                panel: `Initialize <b>Connected Components</b>.<br>Set <code>visited</code> array to False for all ${N} vertices. Set <code>count = 0</code>.`,
                statusText: `Ready to traverse.`,
                log: `Starting Connected Components (DFS).\nInitialized visited array.`
            });

            function dfs(u, depth) {
                let pad = "  ".repeat(depth);
                
                visited[u] = true;
                compId[u] = count;

                steps.push({
                    type: 'dfs_visit', i: outer_i, u: u, v: null, count: count,
                    visited: [...visited], compId: [...compId], activeEdge: null,
                    panel: `<code>dfs(${u})</code>: Mark vertex <b>${u}</b> as visited and assign to Component ${count}.<br>Checking its neighbors...`,
                    statusText: `Visiting node ${u}...`,
                    log: `${pad}dfs(${u}): marked visited=T. Component=${count}.`
                });

                if (adj[u].length === 0) {
                    steps.push({
                        type: 'no_neighbors', i: outer_i, u: u, v: null, count: count,
                        visited: [...visited], compId: [...compId], activeEdge: null,
                        panel: `Vertex <b>${u}</b> has no neighbors.`,
                        statusText: `No neighbors for ${u}.`,
                        log: `${pad}  No neighbors.`
                    });
                }

                for (let v of adj[u]) {
                    steps.push({
                        type: 'check_edge', i: outer_i, u: u, v: v, count: count,
                        visited: [...visited], compId: [...compId], activeEdge: [u, v],
                        panel: `Checking neighbor <b>${v}</b> of vertex <b>${u}</b>.`,
                        statusText: `Exploring edge (${u}-${v})...`,
                        log: `${pad}  Checking neighbor ${v}...`
                    });

                    if (!visited[v]) {
                        steps.push({
                            type: 'recurse', i: outer_i, u: u, v: v, count: count,
                            visited: [...visited], compId: [...compId], activeEdge: [u, v],
                            panel: `Neighbor <b>${v}</b> is not visited.<br>Recursively calling <code>dfs(${v})</code>.`,
                            statusText: `Neighbor unvisited. Recursing...`,
                            log: `${pad}  -> ${v} is unvisited. Recursing dfs(${v}).`
                        });
                        dfs(v, depth + 1);
                    } else {
                        steps.push({
                            type: 'skip_edge', i: outer_i, u: u, v: v, count: count,
                            visited: [...visited], compId: [...compId], activeEdge: [u, v],
                            panel: `Neighbor <b>${v}</b> is already visited. Skipping.`,
                            statusText: `Neighbor already visited.`,
                            log: `${pad}  -> ${v} is already visited.`
                        });
                    }
                }

                steps.push({
                    type: 'backtrack', i: outer_i, u: u, v: null, count: count,
                    visited: [...visited], compId: [...compId], activeEdge: null,
                    panel: `Finished processing all neighbors of <b>${u}</b>. Backtracking.`,
                    statusText: `Finished dfs(${u}).`,
                    log: `${pad}Finished dfs(${u}). Backtracking.`
                });
            }

            let outer_i = 0;
            for (; outer_i < N; outer_i++) {
                steps.push({
                    type: 'outer_loop', i: outer_i, u: null, v: null, count: count,
                    visited: [...visited], compId: [...compId], activeEdge: null,
                    panel: `<b>Main Loop:</b> Check vertex <b>${outer_i}</b>.`,
                    statusText: `Checking vertex ${outer_i}...`,
                    log: `\nMain Loop: Check vertex ${outer_i}`
                });

                if (!visited[outer_i]) {
                    count++;
                    steps.push({
                        type: 'new_comp', i: outer_i, u: null, v: null, count: count,
                        visited: [...visited], compId: [...compId], activeEdge: null,
                        panel: `Vertex <b>${outer_i}</b> is unvisited!<br>This means we found a new connected component.<br>Increment <code>count</code> to <b style="color:var(--accent-green);">${count}</b> and start DFS.`,
                        statusText: `New component found! count = ${count}.`,
                        log: `  -> Unvisited! Found new component. count=${count}. Starting dfs(${outer_i})`
                    });
                    
                    dfs(outer_i, 1);
                } else {
                    steps.push({
                        type: 'already_visited', i: outer_i, u: null, v: null, count: count,
                        visited: [...visited], compId: [...compId], activeEdge: null,
                        panel: `Vertex <b>${outer_i}</b> is already visited (belongs to Component ${compId[outer_i]}).<br>Skip to next vertex.`,
                        statusText: `Vertex ${outer_i} already visited.`,
                        log: `  -> Already visited. Skipping.`
                    });
                }
            }

            steps.push({
                type: 'final', i: null, u: null, v: null, count: count,
                visited: [...visited], compId: [...compId], activeEdge: null,
                panel: `Iterated through all vertices.<br>Total Connected Components found: <b style="color:var(--accent-green); font-size:18px;">${count}</b>.`,
                complete: true,
                result: count,
                statusText: `Algorithm completed.`,
                log: `\nFinished processing all vertices.\nFinal Result = ${count}`,
                logColor: 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            
            let drawnEdges = new Set();
            for (let edge of edgesList) {
                let u = edge[0];
                let v = edge[1];
                let key = u < v ? `${u}-${v}` : `${v}-${u}`;
                
                if (drawnEdges.has(key)) continue;
                drawnEdges.add(key);

                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) continue;

                let isExploring = step.activeEdge && ((step.activeEdge[0] === u && step.activeEdge[1] === v) || (step.activeEdge[0] === v && step.activeEdge[1] === u));

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', p1.x);
                line.setAttribute('y1', p1.y);
                line.setAttribute('x2', p2.x);
                line.setAttribute('y2', p2.y);

                if (isExploring) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    svg.appendChild(line);
                }
            }
        }

        function getCompClass(id) {
            if (id === 0) return '';
            let val = ((id - 1) % 5) + 1;
            return `comp-${val}`;
        }

        function renderArray(containerId, step) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            step.visited.forEach((isVis, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = 'tile';
                
                if (isVis) {
                    tile.innerText = 'T';
                    tile.className += ' ' + getCompClass(step.compId[i]);
                } else {
                    tile.innerText = 'F';
                }
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                
                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<N; i++) {
                const node = document.getElementById(`node-${i}`);
                if(!node) continue;
                
                // reset classes
                node.className = 'node';
                
                if (step.visited[i]) {
                    node.className += ' ' + getCompClass(step.compId[i]);
                }

                // highlight active node in dfs or main loop
                if (step.u === i || (step.type === 'outer_loop' && step.i === i)) {
                    node.classList.add('active');
                }
            }

            drawEdges(step);
            renderArray('visited-tiles', step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-u').innerText = step.u !== null ? step.u : '—';
            document.getElementById('val-count').innerText = step.count;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) resVal.classList.add('pop');
            else resVal.classList.remove('pop');

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
