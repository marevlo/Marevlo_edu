<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build Adjacency List &middot; Graph</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:300px;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
select{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 10px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s; cursor:pointer;
}
select:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto;}
svg.graph{display:block; width:380px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.established{stroke:rgba(34,197,94,.55); stroke-width:2.6; filter:drop-shadow(0 0 4px rgba(34,197,94,.4));}
.edge.checking{stroke:var(--accent-purple); stroke-width:3.6; filter:drop-shadow(0 0 7px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.ehead{fill:var(--border-main); transition:fill .35s, opacity .35s; opacity:0;}
.ehead.show{opacity:1;}
.ehead.established{fill:rgba(34,197,94,.7);}
.ehead.checking{fill:var(--accent-purple);}
.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s, stroke-width .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode.activeu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.gnode.activeu .nl{fill:#ffd591;}
.gnode.activev .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 12px rgba(168,85,247,.6)); stroke-width:3;}
.gnode.activev .nl{fill:#e9d5ff;}

.side{display:flex; flex-direction:column; gap:12px; min-width:240px; flex:1 1 240px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px; color:var(--accent-blue);}
.adj-list{display:flex; flex-direction:column; gap:7px; max-height:300px; overflow-y:auto;}
.adj-list::-webkit-scrollbar{width:8px;}
.adj-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}
.adj-row{display:flex; align-items:center; gap:9px;}
.adj-key{min-width:34px; height:34px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px;
  background:rgba(6,182,212,.12); border:1.5px solid rgba(6,182,212,.45); color:#a5f3fc;
  transition:transform .3s cubic-bezier(.34,1.4,.64,1), background .3s, border-color .3s, color .3s;}
.adj-row.active .adj-key{background:rgba(245,165,36,.16); border-color:var(--accent-orange); color:#ffd591;}
.adj-arrow{font-family:var(--mono); color:var(--text-dim); font-size:13px;}
.adj-values{display:flex; gap:6px; flex-wrap:wrap; flex:1; align-items:center;
  padding:5px 7px; min-height:34px; border-radius:9px; background:rgba(255,255,255,.02); border:1px dashed var(--border-main);}
.adj-empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
.adj-tile{min-width:30px; height:30px; padding:0 7px; display:flex; align-items:center; justify-content:center;
  border-radius:8px; font-family:var(--mono); font-weight:800; font-size:13px;
  border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.adj-tile.fresh{border-color:rgba(34,197,94,.5); background:rgba(34,197,94,.12); color:#bbf7d0;}

#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.e b{color:var(--accent-blue);} .pill.u b{color:var(--accent-orange);} .pill.n b{color:var(--accent-purple);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>edges =</label>
  <input type="text" id="e-input" class="large-input" value="[[1, 2], [2, 3], [1, 3]]">
  <label>type =</label>
  <select id="d-input">
    <option value="false">Undirected</option>
    <option value="true">Directed</option>
  </select>
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample('[[1, 2], [2, 3], [1, 3]]','false')">Ex 1</button>
  <button onclick="loadExample('[[0, 1], [0, 2], [1, 2], [2, 3]]','true')">Ex 2</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Build Adjacency List <span class="sub">&middot; edge list &rarr; neighbor map</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 380 340"></svg></div>
      <div class="side">
        <div class="panel"><div class="cap" id="adj-cap">ADJACENCY LIST</div><div class="adj-list" id="adj-list"></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8634; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill e">edge = <b id="pill-edge">&mdash;</b></span>
        <span class="pill u">from u = <b id="pill-u">&mdash;</b></span>
        <span class="pill n">to v = <b id="pill-v">&mdash;</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>from u</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>to v / active edge</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>established / new neighbor</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','buildAdjList'],['src','(edges, directed):']],
  [['src','  adj = { node: [] for node in nodes }']],
  [['kw','  for'],['src',' (u, v) '],['kw','in'],['src',' edges:']],
  [['src','    adj[u].append(v)']],
  [['kw','    if not'],['src',' directed:']],
  [['src','      adj[v].append(u)']],
  [['kw','  return'],['src',' adj']],
];

let edgesInput=[[1,2],[2,3],[1,3]];
let isDirected=false;
let uniqueNodes=[];
let coord={};
let steps=[], stepIndex=0, timer=null;
const delays=[1900,1000,520];
const gnodes={};
let confettiArmed=true;

function init(){ buildCode(); loadExample('[[1, 2], [2, 3], [1, 3]]','false'); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(eStr,dirStr){ document.getElementById('e-input').value=eStr; document.getElementById('d-input').value=dirStr; parseAndGen(); }
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    const eStr=document.getElementById('e-input').value.replace(/\(/g,'[').replace(/\)/g,']');
    edgesInput=JSON.parse(eStr);
    isDirected=document.getElementById('d-input').value==='true';
    if(!Array.isArray(edgesInput)) throw 'bad';
    const set=new Set();
    edgesInput.forEach(e=>{ if(!Array.isArray(e)||e.length<2) throw 'bad'; set.add(e[0]); set.add(e[1]); });
    uniqueNodes=Array.from(set).sort((a,b)=>{ const na=Number(a),nb=Number(b); if(!isNaN(na)&&!isNaN(nb)) return na-nb; return String(a)<String(b)?-1:1; });
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid format. Use an array of pairs like [[1,2],[2,3]].'); }
}
function arrowPath(){ return 'M 0 0 L 9 4 L 0 8 Z'; }
function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; coord={}; for(const k in gnodes) delete gnodes[k];
  const N=uniqueNodes.length; if(!N) return;
  const cx=190, cy=170, R=Math.min(125, 60+N*9);
  uniqueNodes.forEach((id,i)=>{ const ang=(Math.PI*2*i)/N - Math.PI/2; coord[id]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)}; });
  const NR=20, GAP=isDirected?7:0;
  // edges first (one SVG element per directed/undirected pair drawn from edge list, deduped by id)
  const drawn=new Set();
  edgesInput.forEach((e,i)=>{
    const u=e[0], v=e[1]; const p1=coord[u], p2=coord[v]; if(!p1||!p2) return;
    const key=isDirected?(u+'>'+v):[String(u),String(v)].sort().join('~');
    if(drawn.has(key)) return; drawn.add(key);
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1; const ux=dx/len, uy=dy/len;
    const x1=p1.x+ux*NR, y1=p1.y+uy*NR, x2=p2.x-ux*(NR+GAP), y2=p2.y-uy*(NR+GAP);
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line'); ln.setAttribute('class','edge'); ln.id='edge_'+key;
    ln.setAttribute('x1',x1); ln.setAttribute('y1',y1); ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
    ln.dataset.u=u; ln.dataset.v=v; ln.dataset.key=key; svg.appendChild(ln);
    // arrowhead (only meaningful for directed graphs)
    const head=document.createElementNS('http://www.w3.org/2000/svg','path');
    head.setAttribute('class','ehead'); head.id='head_'+key;
    const ang=Math.atan2(dy,dx)*180/Math.PI;
    head.setAttribute('d',arrowPath());
    head.setAttribute('transform',`translate(${x2},${y2}) rotate(${ang}) translate(-9,-4)`);
    head.dataset.key=key; svg.appendChild(head);
    if(isDirected) head.classList.add('show');
  });
  // nodes on top
  uniqueNodes.forEach(id=>{ const p=coord[id];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode'); g.id='gn'+id;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',NR);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=id;
    g.appendChild(c); g.appendChild(t); svg.appendChild(g); gnodes[id]=g; });
  document.getElementById('adj-cap').textContent='ADJACENCY LIST '+(isDirected?'(directed)':'(undirected)');
}

function edgeKey(u,v){ return isDirected?(u+'>'+v):[String(u),String(v)].sort().join('~'); }

function generateSteps(){
  steps=[];
  const adj={}; uniqueNodes.forEach(n=>adj[n]=[]);
  const estab=[]; // {u,v} pairs established so far (for edge highlight)
  function snap(o){
    const adjCopy={}; for(const k in adj) adjCopy[k]=[...adj[k]];
    steps.push({adj:adjCopy, estab:estab.map(e=>({u:e.u,v:e.v})),
      activeKey:o.activeKey??null, u:o.u??null, v:o.v??null, edge:o.edge??null,
      updatedKey:o.updatedKey??null, fresh:o.fresh??null,
      code:o.code, narr:o.narr, log:o.log, logColor:o.logColor, complete:o.complete});
  }
  const dirWord=isDirected?'Directed':'Undirected';
  snap({code:[1], narr:`<b>Build Adjacency List</b> &mdash; start with an empty neighbor list for every node <code>[${uniqueNodes.join(', ')}]</code>. Graph is <b>${dirWord}</b>.`,
    log:`init empty adj for nodes [${uniqueNodes.join(', ')}]  (${dirWord})`});

  for(const e of edgesInput){
    const u=e[0], v=e[1]; const k=edgeKey(u,v);
    snap({code:[2], activeKey:k, u, v, edge:[u,v],
      narr:`Read edge <code>[${u}, ${v}]</code> from the list. Highlight it in the graph.`,
      log:`process edge [${u}, ${v}]`});

    adj[u].push(v);
    snap({code:[3], activeKey:k, u, v, edge:[u,v], updatedKey:u, fresh:{node:u,val:v},
      narr:`Edge <code>${u}</code> &rarr; <code>${v}</code>: append <b>${v}</b> to <code>adj[${u}]</code>.`,
      log:`  adj[${u}].append(${v})  ->  adj[${u}]=[${adj[u].join(', ')}]`, logColor:'var(--accent-green)'});

    if(!isDirected){
      adj[v].push(u);
      snap({code:[4,5], activeKey:k, u:v, v:u, edge:[u,v], updatedKey:v, fresh:{node:v,val:u},
        narr:`Undirected &rarr; edge goes both ways: append <b>${u}</b> to <code>adj[${v}]</code>.`,
        log:`  undirected: adj[${v}].append(${u})  ->  adj[${v}]=[${adj[v].join(', ')}]`, logColor:'var(--accent-green)'});
    }

    estab.push({u,v});
    snap({code:[2], edge:[u,v],
      narr:`Edge <code>[${u}, ${v}]</code> is now established in the adjacency list.`,
      log:`edge [${u}, ${v}] done`});
  }

  // final answer string (all keys, including empty lists)
  const parts=uniqueNodes.map(n=>`${n}: [${adj[n].join(', ')}]`);
  const resStr='{ '+parts.join(',  ')+' }';
  snap({code:[6], complete:true,
    narr:`All ${edgesInput.length} edges processed &mdash; adjacency list complete: <code>${resStr.replace(/</g,'&lt;')}</code>.`,
    log:`done. adj = ${resStr}`, logColor:'var(--accent-blue)'});
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  // nodes
  uniqueNodes.forEach(n=>{ const g=gnodes[n]; if(!g) return; g.classList.remove('activeu','activev');
    if(step.u===n) g.classList.add('activeu');
    if(step.v===n) g.classList.add('activev');
  });
  // edges: derive established + checking purely from step
  const estabKeys=new Set(step.estab.map(e=>edgeKey(e.u,e.v)));
  const checkKey = step.edge ? edgeKey(step.edge[0],step.edge[1]) : null;
  document.querySelectorAll('.edge').forEach(ln=>{
    const key=ln.dataset.key; ln.classList.remove('established','checking');
    if(checkKey && key===checkKey) ln.classList.add('checking');
    else if(estabKeys.has(key)) ln.classList.add('established');
  });
  document.querySelectorAll('.ehead').forEach(h=>{
    const key=h.dataset.key; h.classList.remove('established','checking');
    if(!isDirected){ h.classList.remove('show'); return; }
    h.classList.add('show');
    if(checkKey && key===checkKey) h.classList.add('checking');
    else if(estabKeys.has(key)) h.classList.add('established');
  });

  renderAdj(step);

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr; narr.classList.toggle('done',!!step.complete);
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });
  document.getElementById('pill-edge').innerHTML=step.edge?`[${step.edge[0]}, ${step.edge[1]}]`:'&mdash;';
  document.getElementById('pill-u').innerHTML=step.u!=null?step.u:'&mdash;';
  document.getElementById('pill-v').innerHTML=step.v!=null?step.v:'&mdash;';
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;
  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].logColor) d.style.color=steps[k].logColor; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;
  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

// adjacency-list panel: persistent rows per node, reconcile tiles by index
function renderAdj(step){
  const host=document.getElementById('adj-list');
  // build skeleton once per input (one row per node)
  if(host.childElementCount!==uniqueNodes.length || host.dataset.sig!==uniqueNodes.join(',')){
    host.innerHTML=''; host.dataset.sig=uniqueNodes.join(',');
    uniqueNodes.forEach(n=>{
      const row=document.createElement('div'); row.className='adj-row'; row.id='adjrow_'+n;
      const key=document.createElement('div'); key.className='adj-key'; key.textContent=n;
      const arr=document.createElement('span'); arr.className='adj-arrow'; arr.innerHTML='&rarr;';
      const vals=document.createElement('div'); vals.className='adj-values'; vals.id='adjvals_'+n;
      row.appendChild(key); row.appendChild(arr); row.appendChild(vals); host.appendChild(row);
    });
  }
  uniqueNodes.forEach(n=>{
    const row=document.getElementById('adjrow_'+n); const vals=document.getElementById('adjvals_'+n);
    row.classList.toggle('active', step.updatedKey===n);
    const list=step.adj[n]||[];
    if(!list.length){ vals.innerHTML='<span class="adj-empty">[ ]</span>'; return; }
    if(vals.querySelector('.adj-empty')) vals.innerHTML='';
    // reconcile tiles by index
    while(vals.childElementCount>list.length) vals.removeChild(vals.lastChild);
    list.forEach((val,i)=>{
      let tile=vals.children[i];
      if(!tile){ tile=document.createElement('div'); tile.className='adj-tile'; vals.appendChild(tile); }
      if(tile.textContent!==String(val)) tile.textContent=val;
      const isFresh = step.fresh && step.fresh.node===n && i===list.length-1 && String(step.fresh.val)===String(val);
      tile.classList.toggle('fresh', !!isFresh);
      if(isFresh) Motion.pop(tile);
    });
  });
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea'||t==='select') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
