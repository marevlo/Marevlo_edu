<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Adjacency List - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .med-input { width: 350px; font-family: monospace; }
        select {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 3; color: var(--accent-orange); }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 2; color: var(--accent-purple); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 300px; max-width: 400px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 100px; max-height: 400px; overflow-y: auto;}
        
        .adj-row {
            display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
        }
        .adj-key {
            min-width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            background: #0d213f; border: 1px solid var(--accent-blue); color: var(--accent-blue);
            transition: all 0.3s ease;
        }
        .adj-key.active { background: #332200; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.1); }
        
        .adj-values {
            display: flex; gap: 6px; flex-wrap: wrap; flex: 1;
            padding: 4px; background: var(--bg-page); border-radius: 6px; border: 1px dashed var(--border-main);
            min-height: 40px; align-items: center;
        }
        
        .adj-val-tile {
            min-width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 4px; font-size: 14px; font-weight: bold; font-family: 'Courier New', monospace;
            background: #21262d; border: 1px solid var(--border-main); color: var(--text-main);
            transition: all 0.3s ease;
        }
        .adj-val-tile.new-entry { animation: popEntry 0.5s ease; background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }

        @keyframes popEntry { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center; word-break: break-all;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 18px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; text-align: center; max-width: 750px;}
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 12px var(--accent-green); transform: scale(1.05); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1.05)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[1, 2], [2, 3], [1, 3]]">
        <label class="ui-label">Type =</label>
        <select id="d-input">
            <option value="false">Undirected</option>
            <option value="true">Directed</option>
        </select>
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[[1, 2], [2, 3], [1, 3]]', 'false')">Ex 1</button>
        <button onclick="loadExample('[[0, 1], [0, 2], [1, 2], [2, 3]]', 'true')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">Adjacency List:</div>
                <div id="adj-container" style="margin-top: 8px;"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Edge</span>
            <span class="info-value" id="val-edge" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Source Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Target Node (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">final adjacency list =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Source Node (u)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Target Node (v)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Active Edge</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-input); border-color:var(--border-main)"></span> Established Edge</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> New Neighbor Added</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let edgesInput = [[1, 2], [2, 3], [1, 3]];
        let isDirected = false;
        let uniqueNodes = [];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];

        function init() { loadExample('[[1, 2], [2, 3], [1, 3]]', 'false'); }

        function loadExample(eStr, dirStr) {
            document.getElementById('e-input').value = eStr;
            document.getElementById('d-input').value = dirStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                const eStr = document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']');
                edgesInput = JSON.parse(eStr);
                isDirected = document.getElementById('d-input').value === 'true';
                
                if (!Array.isArray(edgesInput)) throw "Invalid edges";
                
                let nodesSet = new Set();
                edgesInput.forEach(e => {
                    if (!Array.isArray(e) || e.length < 2) throw "Invalid edge format";
                    nodesSet.add(e[0]);
                    nodesSet.add(e[1]);
                });
                
                uniqueNodes = Array.from(nodesSet).sort((a,b) => a-b);
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure edges is a valid array of pairs like [[1,2], [2,3]].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            const N = uniqueNodes.length;
            if (N === 0) return;

            const cx = 225;
            const cy = 200;
            const radius = 130;

            for (let i = 0; i < N; i++) {
                const nId = uniqueNodes[i];
                const angle = (Math.PI * 2 * i) / N - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[nId] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${nId}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = nId;
                container.appendChild(node);
            }
        }

        function deepCopyAdj(adj) {
            let copy = {};
            for (let k in adj) {
                copy[k] = [...adj[k]];
            }
            return copy;
        }

        function generateSteps() {
            steps = [];
            
            let adj = {};
            uniqueNodes.forEach(n => adj[n] = []);
            let currentEdges = [];

            steps.push({
                type: 'init', adj: deepCopyAdj(adj), currentEdges: [...currentEdges],
                activeEdge: null, activeU: null, activeV: null, updatedKey: null, newNeighbor: null,
                panel: `<b>Build Adjacency List</b><br>Initialize an empty map/array for the Adjacency List.<br>Graph is set to <b style="color:var(--accent-orange)">${isDirected ? 'Directed' : 'Undirected'}</b>.`,
                statusText: `Initialization complete.`,
                log: `Initialized empty Adjacency List for nodes [${uniqueNodes.join(', ')}]. Graph is ${isDirected ? 'Directed' : 'Undirected'}.`
            });

            for (let edge of edgesInput) {
                let u = edge[0];
                let v = edge[1];

                steps.push({
                    type: 'process', adj: deepCopyAdj(adj), currentEdges: [...currentEdges],
                    activeEdge: [u, v], activeU: u, activeV: v, updatedKey: null, newNeighbor: null,
                    panel: `Processing edge <b>[${u}, ${v}]</b>.`,
                    statusText: `Reading edge [${u}, ${v}]...`,
                    log: `\nProcessing edge [${u}, ${v}].`
                });

                adj[u].push(v);
                
                steps.push({
                    type: 'add_u_v', adj: deepCopyAdj(adj), currentEdges: [...currentEdges],
                    activeEdge: [u, v], activeU: u, activeV: v, updatedKey: u, newNeighbor: v,
                    panel: `Edge goes from <b>${u}</b> to <b>${v}</b>.<br>Add <b>${v}</b> to <code>adj[${u}]</code>'s list of neighbors.`,
                    statusText: `Added ${v} to adj[${u}].`,
                    log: `  -> Added ${v} to adj[${u}].`,
                    logColor: 'var(--accent-green)'
                });

                if (!isDirected) {
                    adj[v].push(u);
                    steps.push({
                        type: 'add_v_u', adj: deepCopyAdj(adj), currentEdges: [...currentEdges],
                        activeEdge: [v, u], activeU: v, activeV: u, updatedKey: v, newNeighbor: u,
                        panel: `Because the graph is <b style="color:var(--accent-orange)">Undirected</b>, the edge goes both ways.<br>Add <b>${u}</b> to <code>adj[${v}]</code>'s list of neighbors.`,
                        statusText: `Added ${u} to adj[${v}].`,
                        log: `  -> Undirected: Added ${u} to adj[${v}].`,
                        logColor: 'var(--accent-green)'
                    });
                }

                currentEdges.push({u, v});

                steps.push({
                    type: 'done_edge', adj: deepCopyAdj(adj), currentEdges: [...currentEdges],
                    activeEdge: null, activeU: null, activeV: null, updatedKey: null, newNeighbor: null,
                    panel: `Finished processing edge <b>[${u}, ${v}]</b>. It is now established in the graph.`,
                    statusText: `Edge [${u}, ${v}] fully processed.`,
                    log: `Edge [${u}, ${v}] integrated.`
                });
            }

            // Formatting output to match JSON examples nicely
            let resFormat = [];
            for (let n of uniqueNodes) {
                if (adj[n].length > 0) {
                    resFormat.push(`[${n}, [${adj[n].join(', ')}]]`);
                }
            }
            let resStr = `[${resFormat.join(', ')}]`;

            steps.push({
                type: 'final', adj: deepCopyAdj(adj), currentEdges: [...currentEdges],
                activeEdge: null, activeU: null, activeV: null, updatedKey: null, newNeighbor: null,
                panel: `<b>Algorithm Complete!</b><br>The Adjacency List has been successfully built from the edge list.`,
                complete: true, result: resStr,
                statusText: `Algorithm Complete.`,
                log: `\nFinished building adjacency list.\nResult: ${resStr}`,
                logColor: 'var(--accent-blue)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            // Draw established edges
            step.currentEdges.forEach(e => {
                const p1 = nodeCoords[e.u];
                const p2 = nodeCoords[e.v];
                if(!p1 || !p2) return;

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrinkTarget = isDirected ? nodeRadius + 5 : nodeRadius; 
                const shrinkSource = nodeRadius; 
                
                const x1 = p1.x + (dx/len)*shrinkSource; 
                const y1 = p1.y + (dy/len)*shrinkSource;
                const x2 = p2.x - (dx/len)*shrinkTarget; 
                const y2 = p2.y - (dy/len)*shrinkTarget;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);

                line.setAttribute('stroke', 'var(--border-main)');
                line.setAttribute('stroke-width', '2');
                if (isDirected) line.setAttribute('marker-end', 'url(#arrow-normal)');
                
                svg.appendChild(line);
            });

            // Draw Active Edge
            if (step.activeEdge) {
                const u = step.activeEdge[0];
                const v = step.activeEdge[1];
                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                
                if(p1 && p2) {
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const len = Math.hypot(dx, dy);
                    const shrinkTarget = isDirected ? nodeRadius + 5 : nodeRadius; 
                    const shrinkSource = nodeRadius; 
                    
                    const x1 = p1.x + (dx/len)*shrinkSource; 
                    const y1 = p1.y + (dy/len)*shrinkSource;
                    const x2 = p2.x - (dx/len)*shrinkTarget; 
                    const y2 = p2.y - (dy/len)*shrinkTarget;

                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                    line.setAttribute('x2', x2); line.setAttribute('y2', y2);

                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('stroke-dasharray', '8');
                    line.classList.add('line-anim');
                    if (isDirected) line.setAttribute('marker-end', 'url(#arrow-active)');
                    
                    svg.appendChild(line);
                }
            }
        }

        function renderAdjList(step) {
            const container = document.getElementById('adj-container');
            container.innerHTML = '';
            
            uniqueNodes.forEach(node => {
                const row = document.createElement('div');
                row.className = 'adj-row';
                
                const keyBox = document.createElement('div');
                keyBox.className = 'adj-key';
                if (step.updatedKey === node) keyBox.classList.add('active');
                keyBox.innerText = node;
                
                const valBox = document.createElement('div');
                valBox.className = 'adj-values';
                
                let neighbors = step.adj[node];
                if (neighbors.length === 0) {
                    valBox.innerHTML = `<span style="color:var(--text-dim); font-size:12px; font-family:monospace; margin-left:8px;">[]</span>`;
                } else {
                    neighbors.forEach((neighbor, idx) => {
                        const vTile = document.createElement('div');
                        vTile.className = 'adj-val-tile';
                        
                        // Highlight the newly added neighbor in the specific row
                        if (step.updatedKey === node && idx === neighbors.length - 1 && step.newNeighbor === neighbor) {
                            vTile.classList.add('new-entry');
                        }
                        
                        vTile.innerText = neighbor;
                        valBox.appendChild(vTile);
                    });
                }
                
                row.appendChild(keyBox);
                row.appendChild(valBox);
                container.appendChild(row);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<uniqueNodes.length; i++) {
                const n = uniqueNodes[i];
                const el = document.getElementById(`node-${n}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (step.activeU === n) el.classList.add('active-u');
                if (step.activeV === n) el.classList.add('active-v');
            }

            drawEdges(step);
            renderAdjList(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-edge').innerText = step.activeEdge !== null ? `[${step.activeEdge[0]}, ${step.activeEdge[1]}]` : '—';
            document.getElementById('val-u').innerText = step.activeU !== null ? step.activeU : '—';
            document.getElementById('val-v').innerText = step.activeV !== null ? step.activeV : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
