<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bellman&minus;Ford Shortest Path</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:360px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration.bad{border-color:rgba(248,81,73,.45); background:rgba(248,81,73,.07); color:#ffd7d3;}
.narration.bad::before{content:'\26A0'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:360px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto;}
svg.graph{display:block; width:400px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.checking{stroke:var(--accent-purple); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.edge.relaxed{stroke:var(--accent-green); stroke-width:3; filter:drop-shadow(0 0 5px rgba(34,197,94,.55));}
.edge.cycle{stroke:var(--accent-red); stroke-width:3.5; filter:drop-shadow(0 0 8px rgba(248,81,73,.7)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.arrow-head{fill:var(--border-main); transition:fill .35s;}
.arrow-head.checking{fill:var(--accent-purple);}
.arrow-head.relaxed{fill:var(--accent-green);}
.arrow-head.cycle{fill:var(--accent-red);}
.elabel{font-family:var(--mono); font-weight:800; font-size:12px; text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.elabel .ebg{fill:#090d18;}
.elabel text{fill:var(--text-dim);}
.elabel.neg text{fill:#ffb4ad;}
.elabel.checking .ebg{stroke:var(--accent-purple); stroke-width:1;}
.elabel.checking text{fill:#e9d5ff;}
.elabel.relaxed .ebg{stroke:var(--accent-green); stroke-width:1; fill:#0f2a1a;}
.elabel.relaxed text{fill:#bbf7d0;}
.elabel.cycle .ebg{stroke:var(--accent-red); stroke-width:1; fill:#3a0d0d;}
.elabel.cycle text{fill:#ffd7d3;}
.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:14px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode .nd{font-family:var(--mono); font-weight:700; font-size:11px; fill:var(--text-dim); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode.reached .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.10); }
.gnode.reached .nd{fill:#bbf7d0;}
.gnode.src .nc{stroke:var(--accent-blue); fill:rgba(6,182,212,.14); filter:drop-shadow(0 0 8px rgba(6,182,212,.4));}
.gnode.src .nl{fill:#a5f3fc;}
.gnode.fromu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.gnode.fromu .nl{fill:#ffd591;}
.gnode.tov .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 12px rgba(168,85,247,.6)); stroke-width:3;}
.gnode.tov .nl{fill:#e9d5ff;}
.gnode.incycle .nc{stroke:var(--accent-red); fill:rgba(248,81,73,.18); filter:drop-shadow(0 0 12px rgba(248,81,73,.7)); stroke-width:3;}
.gnode.incycle .nl{fill:#ffd7d3;}

.side{display:flex; flex-direction:column; gap:12px; min-width:240px; flex:1 1 240px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel.d .cap{color:var(--accent-blue);} .panel.p .cap{color:var(--accent-orange);} .panel.r .cap{color:var(--accent-purple);}
.dist-grid{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start;}
.dcell{display:flex; flex-direction:column; align-items:center; gap:3px;}
.dcell .idx{font-family:var(--mono); font-size:10px; color:var(--text-dim);}
.dcell .box{min-width:40px; height:36px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:13px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1), border-color .3s, background .3s, color .3s;}
.dcell .box.inf{color:var(--text-dim);}
.dcell .box.src{border-color:rgba(6,182,212,.5); background:rgba(6,182,212,.12); color:#a5f3fc;}
.dcell .box.changed{border-color:rgba(34,197,94,.5); background:rgba(34,197,94,.12); color:#bbf7d0;}
.dcell .box.neg{border-color:rgba(248,81,73,.5); background:rgba(248,81,73,.12); color:#ffd7d3;}
.passrow{display:flex; gap:7px; flex-wrap:wrap; align-content:flex-start;}
.pchip{min-width:30px; height:30px; padding:0 9px; display:flex; align-items:center; justify-content:center;
  border-radius:8px; font-family:var(--mono); font-weight:800; font-size:12px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-dim);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1), border-color .3s, background .3s, color .3s;}
.pchip.done{border-color:rgba(245,165,36,.45); background:rgba(245,165,36,.12); color:#ffd591;}
.pchip.now{border-color:rgba(6,182,212,.55); background:rgba(6,182,212,.16); color:#a5f3fc; transform:scale(1.05);}
.pchip.extra{border-color:rgba(248,81,73,.5); background:rgba(248,81,73,.12); color:#ffd7d3;}
.verdict-box .box{min-width:100%; height:auto; padding:8px 10px; font-size:13px; text-align:center; line-height:1.35;}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;} .code-line .cm{color:#6b7a99; font-style:italic;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-orange);} .pill.n b{color:var(--accent-purple);} .pill.s b{color:var(--accent-blue);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 240px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>V =</label>
  <input type="text" id="v-input" class="small-input" value="5">
  <label>edges [u,v,w] =</label>
  <input type="text" id="e-input" class="large-input" value="[[0,1,-1],[0,2,4],[1,2,3],[1,3,2],[1,4,2],[3,2,5],[3,1,1],[4,3,-3]]">
  <label>src =</label>
  <input type="text" id="s-input" class="small-input" value="0">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(5,'[[0,1,-1],[0,2,4],[1,2,3],[1,3,2],[1,4,2],[3,2,5],[3,1,1],[4,3,-3]]',0)">Ex 1</button>
  <button onclick="loadExample(3,'[[0,1,1],[1,2,-1],[2,1,-2]]',0)">Ex 2 (neg cycle)</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Bellman&minus;Ford Shortest Path <span class="sub">&middot; relax all edges V&minus;1 times</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 400 380"></svg></div>
      <div class="side">
        <div class="panel d"><div class="cap">dist[] FROM SOURCE <span id="cap-src">0</span></div><div class="dist-grid" id="dist-grid"></div></div>
        <div class="panel p"><div class="cap">RELAXATION PASSES (need V&minus;1 = <span id="need-passes">4</span>)</div><div class="passrow" id="pass-row"></div></div>
        <div class="panel r"><div class="cap">RESULT</div><div class="dist-grid verdict-box" id="verdict-box"><span class="dcell"><span class="box inf" id="verdict">&hellip;</span></span></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">edge u = <b id="pill-u">&mdash;</b></span>
        <span class="pill n">&rarr; v = <b id="pill-v">&mdash;</b></span>
        <span class="pill s">pass <b id="pill-pass">0</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>source</span>
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>from u</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>to v</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>relaxed</span>
          <span class="li"><span class="dot" style="background:var(--accent-red)"></span>neg cycle</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','bellmanFord'],['src','(V, edges, src):']],
  [['src','  dist = [∞]*V;  dist[src] = 0']],
  [['kw','  for'],['src',' i '],['kw','in'],['src',' range(V-1):']],
  [['kw','    for'],['src',' (u,v,w) '],['kw','in'],['src',' edges:']],
  [['kw','      if'],['src',' dist[u]+w < dist[v]:']],
  [['src','        dist[v] = dist[u]+w']],
  [['cm','  // V-th pass → any relax = neg cycle']],
  [['kw','  for'],['src',' (u,v,w) '],['kw','in'],['src',' edges:']],
  [['kw','    if'],['src',' dist[u]+w < dist[v]:'],['kw',' return'],['src',' "NEG CYCLE"']],
  [['kw','  return'],['src',' dist']],
];

let V=5, edgesList=[[0,1,-1],[0,2,4],[1,2,3],[1,3,2],[1,4,2],[3,2,5],[3,1,1],[4,3,-3]], SRC=0;
let nodes=[], coord={};
let steps=[], stepIndex=0, timer=null;
const delays=[1700,900,460];
const gnodes={};
let confettiArmed=true;
const fmt=d=>d===Infinity?'∞':String(d);
const fmtW=w=>w<0?'&minus;'+Math.abs(w):String(w);

function init(){ buildCode(); loadExample(5,'[[0,1,-1],[0,2,4],[1,2,3],[1,3,2],[1,4,2],[3,2,5],[3,1,1],[4,3,-3]]',0); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(v,e,s){ document.getElementById('v-input').value=v; document.getElementById('e-input').value=e; document.getElementById('s-input').value=s; parseAndGen(); }
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    V=parseInt(document.getElementById('v-input').value,10);
    SRC=parseInt(document.getElementById('s-input').value,10);
    const eStr=document.getElementById('e-input').value.replace(/'/g,'"');
    edgesList=JSON.parse(eStr).map(e=>[Number(e[0]),Number(e[1]),Number(e[2])]);
    if(!Number.isInteger(V)||V<1) throw new Error('V');
    if(!Number.isInteger(SRC)||SRC<0||SRC>=V) throw new Error('src');
    nodes=[]; for(let i=0;i<V;i++) nodes.push(i);
    document.getElementById('need-passes').textContent=Math.max(V-1,0);
    document.getElementById('cap-src').textContent=SRC;
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid input. Use integer V, src in [0,V), and edges like [[u,v,w],...] with weights.'); }
}
function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; coord={}; for(const k in gnodes) delete gnodes[k];
  const cx=200, cy=190, R=Math.min(140, 60+V*12);
  nodes.forEach((id,i)=>{ const ang=(Math.PI*2*i)/V - Math.PI/2; coord[id]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)}; });

  const NS='http://www.w3.org/2000/svg';
  const pairSet=new Set(edgesList.map(([u,v])=>u+'>'+v));
  edgesList.forEach((e,i)=>{
    const [u,v,w]=e; const p1=coord[u], p2=coord[v]; if(!p1||!p2) return;
    const bidir=pairSet.has(v+'>'+u);
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1; const ux=dx/len, uy=dy/len;
    const rad=22;
    const sx=p1.x+ux*rad, sy=p1.y+uy*rad;
    const ex=p2.x-ux*(rad+8), ey=p2.y-uy*(rad+8);
    const off=bidir?16:0; const px=-uy*off, py=ux*off;
    const mx=(sx+ex)/2+px, my=(sy+ey)/2+py;
    const path=document.createElementNS(NS,'path'); path.setAttribute('class','edge'); path.id='e'+i;
    path.setAttribute('d',`M ${sx} ${sy} Q ${mx} ${my} ${ex} ${ey}`);
    path.setAttribute('fill','none');
    path.dataset.u=u; path.dataset.v=v; path.dataset.i=i; svg.appendChild(path);
    // arrow head at target end, oriented along the curve tangent (Q end tangent = ex-mx)
    const tx=ex-mx, ty=ey-my, tl=Math.hypot(tx,ty)||1; const ax=tx/tl, ay=ty/tl;
    const nx=-ay, ny=ax; const ah=10, aw=5.5;
    const tipx=ex+ax*2, tipy=ey+ay*2;
    const b1x=ex-ax*ah+nx*aw, b1y=ey-ay*ah+ny*aw;
    const b2x=ex-ax*ah-nx*aw, b2y=ey-ay*ah-ny*aw;
    const head=document.createElementNS(NS,'polygon'); head.setAttribute('class','arrow-head'); head.id='ah'+i;
    head.setAttribute('points',`${tipx},${tipy} ${b1x},${b1y} ${b2x},${b2y}`);
    head.dataset.i=i; svg.appendChild(head);
    // weight label at mid of curve (slightly off the line)
    const lx=mx+px*0.7, ly=my+py*0.7;
    const g=document.createElementNS(NS,'g'); g.setAttribute('class','elabel'+(w<0?' neg':'')); g.id='el'+i;
    const txt=document.createElementNS(NS,'text'); txt.setAttribute('x',lx); txt.setAttribute('y',ly);
    txt.textContent=(w<0?'−'+Math.abs(w):String(w));
    const bb=document.createElementNS(NS,'rect'); bb.setAttribute('class','ebg');
    const half=(txt.textContent.length*4)+5; bb.setAttribute('x',lx-half); bb.setAttribute('y',ly-8);
    bb.setAttribute('width',half*2); bb.setAttribute('height',16); bb.setAttribute('rx',4);
    g.appendChild(bb); g.appendChild(txt); svg.appendChild(g);
  });
  // nodes on top
  nodes.forEach(id=>{ const p=coord[id];
    const g=document.createElementNS(NS,'g'); g.setAttribute('class','gnode'); g.id='gn'+id;
    const c=document.createElementNS(NS,'circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',22);
    const t=document.createElementNS(NS,'text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y-5); t.textContent=id;
    const dlab=document.createElementNS(NS,'text'); dlab.setAttribute('class','nd'); dlab.setAttribute('x',p.x); dlab.setAttribute('y',p.y+9); dlab.id='nd'+id; dlab.textContent='∞';
    g.appendChild(c); g.appendChild(t); g.appendChild(dlab); svg.appendChild(g); gnodes[id]=g; });
}

function generateSteps(){
  steps=[];
  const dist=new Array(V).fill(Infinity); dist[SRC]=0;
  const passesNeeded=Math.max(V-1,0);
  function snap(o){ steps.push({
    dist:[...dist], pass:o.pass, edgeI:o.edgeI??null, u:o.u??null, v:o.v??null,
    changedNode:o.changedNode??null, negEdge:o.negEdge??false, cycleNodes:o.cycleNodes||null,
    code:o.code, narr:o.narr, log:o.log, complete:o.complete, bad:o.bad,
    verdict:o.verdict??null }); }

  snap({pass:0, code:[1], narr:`<b>Bellman&ndash;Ford</b> from source <code>${SRC}</code>. Set <code>dist[${SRC}]=0</code> and every other <code>dist=&infin;</code>. Relax all edges <b>${passesNeeded}</b> time(s), then one extra pass to test for a negative cycle.`, log:`init dist=[${dist.map(fmt).join(',')}]  passes needed = V-1 = ${passesNeeded}`});

  // V-1 relaxation passes
  for(let pass=1; pass<=passesNeeded; pass++){
    snap({pass, code:[3], narr:`<b>Pass ${pass}</b> of ${passesNeeded}: walk every edge once and relax wherever a shorter path to <code>v</code> appears.`, log:`-- pass ${pass}/${passesNeeded} --`});
    edgesList.forEach((e,ei)=>{
      const [u,v,w]=e;
      const du=dist[u], can=du!==Infinity && du+w<dist[v];
      snap({pass, edgeI:ei, u, v, code:[4,5], negEdge:w<0,
        narr:`Pass ${pass}: examine edge <code>${u}&rarr;${v}</code> (w=${fmtW(w)}). Is <code>dist[${u}]+w = ${du===Infinity?'&infin;':du+w} &lt; dist[${v}] = ${fmt(dist[v])}</code>?`,
        log:`pass ${pass}: edge ${u}->${v} w=${w}  dist[${u}]+w=${du===Infinity?'INF':du+w}  dist[${v}]=${fmt(dist[v])}`});
      if(can){
        dist[v]=du+w;
        snap({pass, edgeI:ei, u, v, code:[6], changedNode:v, negEdge:w<0,
          narr:`Yes &rarr; <b>relax</b>: <code>dist[${v}] = ${dist[v]}</code>. Found a shorter route to <code>${v}</code>.`,
          log:`  relax dist[${v}] = ${dist[v]}`});
      }
    });
  }

  // V-th pass: one more relaxation; any improvement => negative cycle
  let neg=false, badEdge=null;
  snap({pass:passesNeeded+1, code:[7,8], narr:`<b>V&minus;th pass.</b> After ${passesNeeded} passes, true shortest paths must be settled. If <i>any</i> edge can <b>still</b> relax, a negative cycle is bleeding distance downward.`, log:`-- V-th pass: probing for further relaxation --`});
  for(let ei=0; ei<edgesList.length && !neg; ei++){
    const [u,v,w]=edgesList[ei];
    const du=dist[u], can=du!==Infinity && du+w<dist[v];
    snap({pass:passesNeeded+1, edgeI:ei, u, v, code:[9], negEdge:w<0,
      narr:`V&minus;th pass: can edge <code>${u}&rarr;${v}</code> still relax? <code>dist[${u}]+w = ${du===Infinity?'&infin;':du+w}</code> vs <code>dist[${v}] = ${fmt(dist[v])}</code>.`,
      log:`extra: edge ${u}->${v} w=${w}  ${du===Infinity?'INF':du+w} vs ${fmt(dist[v])}`});
    if(can){ neg=true; badEdge=[u,v,w]; }
  }

  if(neg){
    const cyc=findCycleNodes(badEdge);
    snap({pass:passesNeeded+1, edgeI:edgeIndexOf(badEdge), u:badEdge[0], v:badEdge[1], code:[9], negEdge:badEdge[2]<0,
      cycleNodes:cyc, bad:true, verdict:'CYCLE',
      narr:`Edge <code>${badEdge[0]}&rarr;${badEdge[1]}</code> <b>still relaxes</b> after V&minus;1 passes &rarr; a <b>NEGATIVE CYCLE</b> exists. Distances would shrink forever.`,
      log:`extra: edge ${badEdge[0]}->${badEdge[1]} STILL relaxes => NEGATIVE CYCLE`});
    snap({pass:passesNeeded+1, code:[9], cycleNodes:cyc, bad:true, complete:true, verdict:'CYCLE',
      narr:`<b>Result: NEGATIVE CYCLE.</b> The graph contains a negative-weight cycle (highlighted in red). Shortest paths from <code>${SRC}</code> are undefined.`,
      log:`RESULT: negative cycle detected -> shortest paths undefined`});
  } else {
    const distStr=dist.map(fmt).join(', ');
    snap({pass:passesNeeded+1, code:[10], complete:true, verdict:'OK', verdictDist:distStr,
      narr:`No edge relaxed in the V&minus;th pass &rarr; distances are stable. <b>Done.</b> Shortest <code>dist = [${distStr}]</code>.`,
      log:`extra pass: no relaxation. RESULT: dist=[${dist.map(fmt).join(',')}]`,
      });
    steps[steps.length-1].verdictDist=distStr;
  }
}

function edgeIndexOf(be){ for(let i=0;i<edgesList.length;i++){ const e=edgesList[i]; if(e[0]===be[0]&&e[1]===be[1]&&e[2]===be[2]) return i; } return null; }
// Walk forward from the relaxing edge following outgoing edges until a node repeats -> the cycle.
function findCycleNodes(badEdge){
  const adj={}; edgesList.forEach(([u,v])=>{ (adj[u]=adj[u]||[]).push(v); });
  const start=badEdge[1];
  const path=[]; const seen=new Set(); let cur=start;
  for(let guard=0; guard<V+2; guard++){
    if(seen.has(cur)){ const li=path.indexOf(cur); return path.slice(li); }
    seen.add(cur); path.push(cur);
    const outs=adj[cur]||[]; if(!outs.length) break;
    let nxt=outs.find(x=>seen.has(x)); if(nxt===undefined){ nxt=outs[outs.length-1]; }
    cur=nxt;
  }
  return [badEdge[0],badEdge[1]];
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const passesNeeded=Math.max(V-1,0);
  const cyc=new Set(step.cycleNodes||[]);

  nodes.forEach(n=>{ const g=gnodes[n]; if(!g) return;
    g.classList.remove('reached','src','fromu','tov','incycle');
    const d=step.dist[n];
    if(d!==Infinity && n!==SRC) g.classList.add('reached');
    if(n===SRC) g.classList.add('src');
    if(step.u===n) g.classList.add('fromu');
    if(step.v===n) g.classList.add('tov');
    if(cyc.has(n)) g.classList.add('incycle');
    const dlab=document.getElementById('nd'+n); if(dlab) dlab.textContent=fmt(d);
    if(step.changedNode===n){ const c=g.querySelector('.nc'); if(c) Motion.pop(c); }
  });

  const cycleEdge=(u,v)=> cyc.size>0 && cyc.has(u) && cyc.has(v) && hasEdge(u,v);
  document.querySelectorAll('.edge').forEach(p=>{
    p.classList.remove('checking','relaxed','cycle');
    const u=+p.dataset.u, v=+p.dataset.v, ei=+p.dataset.i;
    const head=document.getElementById('ah'+ei); if(head) head.classList.remove('checking','relaxed','cycle');
    const lab=document.getElementById('el'+ei); if(lab) lab.classList.remove('checking','relaxed','cycle');
    let cls=null;
    if(step.bad && cycleEdge(u,v)) cls='cycle';
    else if(step.edgeI===ei) cls=(step.changedNode===v)?'relaxed':'checking';
    if(cls){ p.classList.add(cls); if(head) head.classList.add(cls); if(lab) lab.classList.add(cls); }
  });

  // dist panel
  const dg=document.getElementById('dist-grid'); dg.innerHTML='';
  step.dist.forEach((d,i)=>{
    const cell=document.createElement('div'); cell.className='dcell';
    const box=document.createElement('div'); box.className='box'+(d===Infinity?' inf':'');
    if(i===SRC && d!==Infinity) box.classList.add('src');
    if(step.changedNode===i) box.classList.add('changed');
    if(step.bad && cyc.has(i)) box.classList.add('neg');
    box.textContent=fmt(d);
    const idxl=document.createElement('div'); idxl.className='idx'; idxl.textContent='['+i+']';
    cell.appendChild(box); cell.appendChild(idxl); dg.appendChild(cell);
    if(step.changedNode===i) Motion.pop(box);
  });

  // pass chips
  const pr=document.getElementById('pass-row'); pr.innerHTML='';
  for(let p=1;p<=passesNeeded;p++){
    const chip=document.createElement('div'); chip.className='pchip';
    if(step.pass>p) chip.classList.add('done');
    if(step.pass===p) chip.classList.add('now');
    chip.textContent='P'+p; pr.appendChild(chip);
  }
  { const ex=document.createElement('div'); ex.className='pchip'+(step.pass>passesNeeded?' extra now':'');
    ex.textContent='V'; pr.appendChild(ex); }

  // verdict
  const vb=document.getElementById('verdict');
  if(step.verdict==='CYCLE'){ vb.textContent='NEGATIVE CYCLE → paths undefined'; vb.className='box neg'; }
  else if(step.verdict==='OK'){ vb.textContent='dist = ['+step.verdictDist+']'; vb.className='box changed'; }
  else { vb.textContent='…'; vb.className='box inf'; }

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done', !!step.complete && !step.bad);
  narr.classList.toggle('bad', !!step.bad);

  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i+1)); });

  document.getElementById('pill-u').textContent=step.u!=null?step.u:'—';
  document.getElementById('pill-v').textContent=step.v!=null?step.v:'—';
  document.getElementById('pill-pass').textContent=step.pass>passesNeeded?'V (extra)':step.pass;
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete&&!steps[k].bad) d.style.color='var(--accent-green)';
    if(steps[k].bad) d.style.color='var(--accent-red)'; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ if(!step.bad) fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function hasEdge(u,v){ return edgesList.some(e=>e[0]===u&&e[1]===v); }

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
</body>
