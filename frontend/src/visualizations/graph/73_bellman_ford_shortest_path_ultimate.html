<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellman-Ford Algorithm - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 450px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 500px;
            height: 450px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 2;
        }
        
        .node.source { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(56,139,253,0.4); color: var(--accent-blue); background: rgba(56,139,253,0.1); }
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 4; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 3; color: var(--accent-purple); }
        .node.cycle-node { background: rgba(248,81,73,0.2); border-color: var(--accent-red); color: var(--accent-red); box-shadow: 0 0 15px var(--accent-red); animation: shake 0.4s infinite; z-index: 5;}

        @keyframes shake {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-53%, -50%) rotate(-5deg); }
            50% { transform: translate(-50%, -50%) rotate(0deg); }
            75% { transform: translate(-47%, -50%) rotate(5deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 44px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.dist-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; filter: brightness(1.5); background: rgba(63,185,80,0.3); border-color: var(--accent-green); color: #fff;}

        @keyframes highlightFlash { 0% { transform: scale(1); box-shadow: 0 0 0 transparent;} 50% { transform: scale(1.2); box-shadow: 0 0 10px var(--accent-green);} 100% { transform: scale(1); box-shadow: 0 0 0 transparent;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 850px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 850px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; text-align: center; max-width: 800px; word-break: break-all;}
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.05); }
        .pop-error { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 15px var(--accent-red); transform: scale(1.05); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1.05)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 850px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 850px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }

        .edge-label { font-family: monospace; font-weight: bold; font-size: 12px; text-anchor: middle; dominant-baseline: central; fill: var(--text-main); }
        .edge-bg { fill: var(--bg-surface); stroke: var(--border-main); stroke-width: 1px; rx: 4px; }
        .edge-active .edge-bg { stroke: var(--accent-purple); }
        .edge-active .edge-label { fill: var(--accent-purple); }
        .edge-relax .edge-bg { stroke: var(--accent-green); fill: #0f2a1a;}
        .edge-relax .edge-label { fill: var(--accent-green); }
        .edge-cycle .edge-bg { stroke: var(--accent-red); fill: #3a0d0d;}
        .edge-cycle .edge-label { fill: var(--accent-red); }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="5">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1,-1],[0,2,4],[1,2,3],[1,3,2],[1,4,2],[3,2,5],[3,1,1],[4,3,-3]]">
        <label class="ui-label">src =</label>
        <input type="text" id="s-input" class="small-input" placeholder="0">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(5, '[[0,1,-1],[0,2,4],[1,2,3],[1,3,2],[1,4,2],[3,2,5],[3,1,1],[4,3,-3]]', 0)">Ex 1</button>
        <button onclick="loadExample(3, '[[0,1,1],[1,2,-1],[2,1,-2]]', 0)">Ex 2 (Neg Cycle)</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                    <marker id="arrow-relax" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-green)" />
                    </marker>
                    <marker id="arrow-cycle" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-red)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-red); font-size: 16px; text-align: center;">
                    Iteration: <span id="val-iter" style="font-family: monospace; font-weight: bold; font-size: 24px;">0</span> / <span id="val-iter-max" style="font-family: monospace; font-size: 18px;"></span>
                </div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">Distance Array:</div>
                <div class="tiles-wrapper" id="dist-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Shortest distance from source</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Relaxation Condition</span>
            <span class="info-value" id="val-cond" style="color: var(--text-main); font-size:13px;">dist[u] + weight < dist[v]</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">final distance array =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:rgba(56,139,253,0.1); border-color:var(--accent-blue); border-width:2px;"></span> Source Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> From Node (u)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Edge</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-green); border-width:2px;"></span> Relaxed Edge</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-red); border-width:2px; border-style:dashed;"></span> Negative Cycle Edge</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 5;
        let edgesList = [[0,1,-1],[0,2,4],[1,2,3],[1,3,2],[1,4,2],[3,2,5],[3,1,1],[4,3,-3]];
        let srcNode = 0;
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [3000, 1500, 750];
        const INF = Infinity;

        function init() { loadExample(5, '[[0,1,-1],[0,2,4],[1,2,3],[1,3,2],[1,4,2],[3,2,5],[3,1,1],[4,3,-3]]', 0); }

        function loadExample(v, eStr, s) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            document.getElementById('s-input').value = s;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                srcNode = parseInt(document.getElementById('s-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || isNaN(srcNode) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                document.getElementById('val-iter-max').innerText = V_count - 1;
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V and src are integers and edges is a valid array of [u, v, w].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 250;
            const cy = 225;
            const radius = 160;

            // Place nodes in a circle for generic layout
            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function formatDist(val) { return val === INF ? '∞' : val; }

        function generateSteps() {
            steps = [];
            
            let dist = new Array(V_count).fill(INF);
            dist[srcNode] = 0;

            steps.push({
                type: 'init', dist: [...dist], iter: 0,
                u: null, v: null, w: null, edgeState: null, updatedIdx: null, cycleNode: null,
                panel: `<b>Bellman-Ford Algorithm</b><br>Finds shortest paths from a single source, allowing for negative edge weights.<br>Initialize <code>dist</code> array with ∞, and <code>dist[${srcNode}] = 0</code>.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. V=${V_count}, Source=${srcNode}.`
            });

            // V-1 Relaxations
            for (let i = 1; i < V_count; i++) {
                steps.push({
                    type: 'iter_start', dist: [...dist], iter: i,
                    u: null, v: null, w: null, edgeState: null, updatedIdx: null, cycleNode: null,
                    panel: `<b>Iteration ${i} of ${V_count - 1}</b><br>Relax all edges. A simple shortest path can have at most V-1 edges.`,
                    statusText: `Starting Iteration ${i}...`,
                    log: `\n--- Iteration ${i} ---`
                });

                for (let edge of edgesList) {
                    let u = edge[0];
                    let v = edge[1];
                    let w = edge[2];

                    steps.push({
                        type: 'check', dist: [...dist], iter: i,
                        u: u, v: v, w: w, edgeState: 'active', updatedIdx: null, cycleNode: null,
                        panel: `Evaluating edge <b>${u} ➔ ${v}</b> (weight: <b>${w}</b>).<br>Is <code>dist[${u}] + ${w} < dist[${v}]</code>?<br>(<code>${formatDist(dist[u])} + ${w} < ${formatDist(dist[v])}</code>)`,
                        statusText: `Evaluating edge ${u}➔${v} (weight ${w})...`,
                        log: `  Check edge ${u}->${v} (w=${w}).`
                    });

                    if (dist[u] !== INF && dist[u] + w < dist[v]) {
                        dist[v] = dist[u] + w;
                        
                        steps.push({
                            type: 'relax', dist: [...dist], iter: i,
                            u: u, v: v, w: w, edgeState: 'relax', updatedIdx: v, cycleNode: null,
                            panel: `<b style="color:var(--accent-green)">Yes! Shorter path found.</b><br>Update <code>dist[${v}] = ${dist[v]}</code>.`,
                            statusText: `Relaxed edge ${u}➔${v}.`,
                            log: `    -> Relaxed! dist[${v}]=${dist[v]}.`,
                            logColor: 'var(--accent-green)'
                        });
                    } else {
                        steps.push({
                            type: 'skip', dist: [...dist], iter: i,
                            u: u, v: v, w: w, edgeState: 'active', updatedIdx: null, cycleNode: null,
                            panel: `<b style="color:var(--accent-red)">No.</b> Path is not strictly shorter or <b>${u}</b> is unreachable. Skip.`,
                            statusText: `No update needed.`,
                            log: `    -> Suboptimal or unreachable. Skipped.`
                        });
                    }
                }
            }

            // Cycle Detection Phase
            steps.push({
                type: 'cycle_start', dist: [...dist], iter: 'Check',
                u: null, v: null, w: null, edgeState: null, updatedIdx: null, cycleNode: null,
                panel: `<b>Negative Cycle Detection Phase</b><br>If any edge can STILL be relaxed after V-1 iterations, it implies a negative-weight cycle exists in the graph.`,
                statusText: `Starting Cycle Detection...`,
                log: `\n--- Checking for Negative Cycles ---`,
                logColor: 'var(--accent-orange)'
            });

            let hasCycle = false;
            let cycleEdge = null;

            for (let edge of edgesList) {
                let u = edge[0];
                let v = edge[1];
                let w = edge[2];

                steps.push({
                    type: 'check_cycle', dist: [...dist], iter: 'Check',
                    u: u, v: v, w: w, edgeState: 'active', updatedIdx: null, cycleNode: null,
                    panel: `Checking edge <b>${u} ➔ ${v}</b> (weight: <b>${w}</b>).<br>Can it still be relaxed? (<code>${formatDist(dist[u])} + ${w} < ${formatDist(dist[v])}</code>)`,
                    statusText: `Checking edge ${u}➔${v} for cycles...`,
                    log: `  Check cycle edge ${u}->${v}.`
                });

                if (dist[u] !== INF && dist[u] + w < dist[v]) {
                    hasCycle = true;
                    cycleEdge = [u, v];

                    steps.push({
                        type: 'cycle_found', dist: [...dist], iter: 'Check',
                        u: u, v: v, w: w, edgeState: 'cycle', updatedIdx: null, cycleNode: v,
                        panel: `<b style="color:var(--accent-red); font-size:16px;">Negative Cycle Detected!</b><br>Edge <b>${u} ➔ ${v}</b> can STILL be relaxed (<code>${dist[u]} + ${w} < ${dist[v]}</code>).<br>The distances can decrease infinitely.`,
                        statusText: `Negative Cycle Detected!`,
                        log: `    => NEGATIVE CYCLE DETECTED via edge ${u}->${v}!`,
                        logColor: 'var(--accent-red)'
                    });
                    break; 
                } else {
                    steps.push({
                        type: 'cycle_skip', dist: [...dist], iter: 'Check',
                        u: u, v: v, w: w, edgeState: 'active', updatedIdx: null, cycleNode: null,
                        panel: `No, it cannot be relaxed. This edge is stable.`,
                        statusText: `Edge is stable.`,
                        log: `    -> Stable.`
                    });
                }
            }

            let resultStr = `[${dist.map(x => formatDist(x)).join(', ')}]`;

            steps.push({
                type: 'final', dist: [...dist], iter: hasCycle ? 'Check' : V_count - 1,
                u: null, v: null, w: null, edgeState: null, updatedIdx: null, cycleNode: null,
                panel: hasCycle ? 
                    `<b>Algorithm Aborted!</b><br>A negative weight cycle was detected in the graph. Shortest paths are undefined.` :
                    `<b>Algorithm Complete!</b><br>No negative cycles detected.<br>The final shortest distances are <b style="color:var(--accent-green); font-size:16px;">${resultStr}</b>.`,
                complete: true, result: hasCycle ? "Negative Cycle Detected" : resultStr, isError: hasCycle,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. ${hasCycle ? 'Failed: Negative Cycle' : 'Success: ' + resultStr}`,
                logColor: hasCycle ? 'var(--accent-red)' : 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawn = new Set();

            edgesList.forEach(e => {
                const u = e[0];
                const v = e[1];
                const w = e[2];
                
                let key = `${u}->${v}`;
                if (drawn.has(key)) return;
                drawn.add(key);

                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.u !== null && step.v !== null && step.u === u && step.v === v;

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrinkTarget = nodeRadius + 6; 
                const shrinkSource = nodeRadius + 2; 

                // Handle bidirectional curve
                let hasReverse = edgesList.some(re => re[0]===v && re[1]===u);
                let dStr = "";
                let cx, cy;

                if (hasReverse) {
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const nx = -dy / len;
                    const ny = dx / len;
                    const curveOffset = 25; 
                    cx = midX + nx * curveOffset;
                    cy = midY + ny * curveOffset;
                    
                    const x1 = p1.x + (dx/len)*shrinkSource; 
                    const y1 = p1.y + (dy/len)*shrinkSource;
                    const x2 = p2.x - (dx/len)*shrinkTarget; 
                    const y2 = p2.y - (dy/len)*shrinkTarget;
                    dStr = `M ${x1},${y1} Q ${cx},${cy} ${x2},${y2}`;
                } else {
                    cx = (p1.x + p2.x) / 2;
                    cy = (p1.y + p2.y) / 2;
                    const x1 = p1.x + (dx/len)*shrinkSource; 
                    const y1 = p1.y + (dy/len)*shrinkSource;
                    const x2 = p2.x - (dx/len)*shrinkTarget; 
                    const y2 = p2.y - (dy/len)*shrinkTarget;
                    dStr = `M ${x1},${y1} L ${x2},${y2}`;
                }

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', dStr);
                path.setAttribute('fill', 'transparent');

                if (isChecking) {
                    if (step.edgeState === 'relax') {
                        path.setAttribute('stroke', 'var(--accent-green)');
                        path.setAttribute('stroke-width', '4');
                        path.setAttribute('marker-end', 'url(#arrow-relax)');
                    } else if (step.edgeState === 'cycle') {
                        path.setAttribute('stroke', 'var(--accent-red)');
                        path.setAttribute('stroke-width', '4');
                        path.setAttribute('marker-end', 'url(#arrow-cycle)');
                        path.setAttribute('stroke-dasharray', '8');
                        path.classList.add('line-anim');
                    } else {
                        path.setAttribute('stroke', 'var(--accent-purple)');
                        path.setAttribute('stroke-width', '4');
                        path.setAttribute('marker-end', 'url(#arrow-active)');
                        path.setAttribute('stroke-dasharray', '6');
                        path.classList.add('line-anim');
                    }
                    setTimeout(() => svg.appendChild(path), 0);
                } else {
                    path.setAttribute('stroke', 'var(--border-main)');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(path);
                }

                // Add Weight Label
                const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                bg.setAttribute('x', cx - 14);
                bg.setAttribute('y', cy - 9);
                bg.setAttribute('width', 28);
                bg.setAttribute('height', 18);
                
                if (isChecking && step.edgeState === 'relax') bg.setAttribute('class', 'edge-bg edge-relax');
                else if (isChecking && step.edgeState === 'cycle') bg.setAttribute('class', 'edge-bg edge-cycle');
                else if (isChecking) bg.setAttribute('class', 'edge-bg edge-active');
                else bg.setAttribute('class', 'edge-bg');
                
                const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                txt.setAttribute('x', cx);
                txt.setAttribute('y', cy);
                
                if (isChecking && step.edgeState === 'relax') txt.setAttribute('class', 'edge-label edge-relax');
                else if (isChecking && step.edgeState === 'cycle') txt.setAttribute('class', 'edge-label edge-cycle');
                else if (isChecking) txt.setAttribute('class', 'edge-label edge-active');
                else txt.setAttribute('class', 'edge-label');
                
                txt.textContent = w;

                if (isChecking) {
                    setTimeout(() => {
                        svg.appendChild(bg);
                        svg.appendChild(txt);
                    }, 0);
                } else {
                    svg.appendChild(bg);
                    svg.appendChild(txt);
                }
            });
        }

        function renderArray(containerId, arr, tileClass, stepData) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile ${tileClass}`;
                
                if (stepData.updatedIdx === i) {
                    tile.classList.add('highlight-update');
                }
                
                if (val === Infinity) {
                    tile.innerText = '∞';
                    tile.style.background = '#21262d';
                    tile.style.borderColor = 'var(--border-main)';
                    tile.style.color = 'var(--text-dim)';
                } else {
                    tile.innerText = val;
                }
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                if (i === srcNode) el.classList.add('source');
                
                if (step.cycleNode === i) el.classList.add('cycle-node');
                
                if (step.u === i && !step.complete) el.classList.add('active-u');
                if (step.v === i && !step.complete) el.classList.add('active-v');
            }

            drawEdges(step);
            renderArray('dist-tiles', step.dist, 'dist-tile', step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-iter').innerText = step.iter;
            document.getElementById('val-u').innerText = step.u !== null ? `${step.u}` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `${step.v}` : '—';

            let eqStr = 'dist[u] + weight < dist[v]';
            if (step.u !== null && step.v !== null && step.w !== null) {
                let du = step.dist[step.u] === Infinity ? '∞' : step.dist[step.u];
                let w = step.w;
                let dv = step.dist[step.v] === Infinity ? '∞' : step.dist[step.v];
                if (step.dist[step.u] === Infinity) {
                    eqStr = `∞ + ${w} < ${dv}`;
                } else {
                    eqStr = `${du} + ${w} < ${dv}`;
                }
            }
            document.getElementById('val-cond').innerText = eqStr;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.className = step.isError ? 'pop-error' : 'pop';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
