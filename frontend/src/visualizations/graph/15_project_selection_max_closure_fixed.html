<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Selection Max Closure - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .med-input { width: 200px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 600px;
            height: 450px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.source-node { border-color: var(--accent-green); background: rgba(63, 185, 80, 0.1); color: var(--accent-green); }
        .node.sink-node { border-color: var(--accent-red); background: rgba(248, 81, 73, 0.1); color: var(--accent-red); }
        .node.active { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 12px var(--accent-purple); border-color: var(--accent-purple); z-index: 2; }
        .node.selected { background: #0f2a1a; border-color: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }

        .arrays-col { display: flex; flex-direction: column; gap: 20px; min-width: 250px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); }
        
        .stats-row { display: flex; justify-content: space-between; font-family: monospace; font-size: 14px; margin-bottom: 4px; border-bottom: 1px solid var(--border-main); padding-bottom: 4px;}
        .stats-val { font-weight: bold; color: var(--text-main); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 730px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 730px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 12px var(--accent-green); font-size: 26px !important;}

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 730px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 8; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -16; } }

        /* Edge Labels */
        .edge-label { font-family: monospace; font-weight: bold; font-size: 12px; text-anchor: middle; dominant-baseline: central; }
        .edge-bg { fill: var(--bg-surface); stroke: var(--border-main); stroke-width: 1px; rx: 4px; }
        .edge-active .edge-bg { stroke: var(--accent-purple); }
        .edge-active .edge-label { fill: var(--accent-purple); }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">profits =</label>
        <input type="text" id="p-input" class="med-input" placeholder="[5, -2, 3]">
        <label class="ui-label">prerequisites =</label>
        <input type="text" id="req-input" class="med-input" placeholder="[[], [0], [1]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[5, -2, 3]', '[[], [0], [1]]')">Ex 1</button>
        <button onclick="loadExample('[10, -5, -5, 10]', '[[], [0], [0], [1, 2]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--text-dim)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange); text-align:center;">Network Flow Stats</div>
                <div class="stats-row"><span>Total Pos. Profit:</span> <span class="stats-val" id="stat-pos">0</span></div>
                <div class="stats-row"><span>Current Max Flow:</span> <span class="stats-val" id="stat-flow" style="color:var(--accent-red)">0</span></div>
                <div class="stats-row" style="border:none;"><span>Current Max Closure:</span> <span class="stats-val" id="stat-ans" style="color:var(--accent-green)">0</span></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Augmenting Path</span>
            <span class="info-value" id="val-path" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Bottleneck Capacity</span>
            <span class="info-value" id="val-bot" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Formula</span>
            <span class="info-value" id="val-formula" style="color: var(--text-main); font-size:12px;">Profit = Σ(Pos) - MinCut</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">maximum closure profit =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Source (S)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red)"></span> Sink (T)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple)"></span> Augmenting Path</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Selected in Max Closure</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let profits = [5, -2, 3];
        let reqs = [[], [0], [1]];
        let N = 3;
        
        let S = 'S', T = 'T';
        let nodes = [];
        let edges = []; // {u, v, cap, flow}
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample('[5, -2, 3]', '[[], [0], [1]]'); }

        function loadExample(pStr, rStr) {
            document.getElementById('p-input').value = pStr;
            document.getElementById('req-input').value = rStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                profits = JSON.parse(document.getElementById('p-input').value);
                reqs = JSON.parse(document.getElementById('req-input').value);
                N = profits.length;
                if(reqs.length !== N) throw "Length mismatch";
                
                buildGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure arrays are valid JSON.");
            }
        }

        function buildGraph() {
            nodes = [S];
            for(let i=0; i<N; i++) nodes.push(i.toString());
            nodes.push(T);

            edges = [];
            for(let i=0; i<N; i++) {
                let p = profits[i];
                if (p > 0) {
                    edges.push({u: S, v: i.toString(), cap: p, flow: 0, isInf: false});
                } else if (p < 0) {
                    edges.push({u: i.toString(), v: T, cap: -p, flow: 0, isInf: false});
                }
                
                // If i requires j, edge is i -> j with ∞ capacity
                for (let j of reqs[i]) {
                    edges.push({u: i.toString(), v: j.toString(), cap: Infinity, flow: 0, isInf: true});
                }
            }

            // Layout
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            nodeCoords[S] = {x: 50, y: 225};
            nodeCoords[T] = {x: 550, y: 225};

            let posNodes = [], negNodes = [], zeroNodes = [];
            for(let i=0; i<N; i++) {
                if (profits[i] > 0) posNodes.push(i.toString());
                else if (profits[i] < 0) negNodes.push(i.toString());
                else zeroNodes.push(i.toString());
            }

            function assignCoords(arr, x) {
                let len = arr.length;
                let spacing = 350 / (len + 1);
                for(let i=0; i<len; i++) {
                    nodeCoords[arr[i]] = {x: x, y: 50 + spacing * (i+1)};
                }
            }

            assignCoords(posNodes, 200);
            assignCoords(zeroNodes, 300);
            assignCoords(negNodes, 400);

            nodes.forEach(n => {
                const el = document.createElement('div');
                el.className = 'node';
                if (n === S) el.classList.add('source-node');
                if (n === T) el.classList.add('sink-node');
                el.id = `node-${n}`;
                el.style.left = `${nodeCoords[n].x}px`;
                el.style.top = `${nodeCoords[n].y}px`;
                el.innerText = n;
                container.appendChild(el);
            });
        }

        function generateSteps() {
            steps = [];
            
            let totalPos = 0;
            profits.forEach(p => { if(p > 0) totalPos += p; });

            // Create adjacency list mapping indices in edges array
            let adj = {};
            nodes.forEach(n => adj[n] = []);
            edges.forEach((e, idx) => {
                adj[e.u].push(idx);
                // We also need residual backward edges, we'll handle this virtually
            });

            let currentEdges = edges.map(e => ({...e}));
            let maxFlow = 0;

            steps.push({
                type: 'init',
                edges: JSON.parse(JSON.stringify(currentEdges)), maxFlow: 0, totalPos: totalPos,
                activePath: null, bottleneck: null, selectedNodes: [],
                panel: `<b>Max Weight Closure to Min-Cut Network</b><br>1. Connect Source (S) to positive projects.<br>2. Connect negative projects to Sink (T).<br>3. Add ∞ capacity edges for dependencies (i requires j ➔ edge i to j).`,
                statusText: `Network built. Ready for Edmonds-Karp BFS.`,
                log: `Network initialized. Total positive profit: ${totalPos}`
            });

            while (true) {
                // BFS to find augmenting path
                let parentEdge = {};
                let queue = [S];
                let visited = new Set([S]);
                let foundPath = false;

                while (queue.length > 0) {
                    let u = queue.shift();
                    if (u === T) { foundPath = true; break; }

                    // Look for forward edges with remaining capacity
                    for (let i = 0; i < currentEdges.length; i++) {
                        let e = currentEdges[i];
                        if (e.u === u && !visited.has(e.v) && e.cap - e.flow > 0) {
                            visited.add(e.v);
                            parentEdge[e.v] = i;
                            queue.push(e.v);
                        }
                        // Note: For simplicity in this visualizer, we only trace forward augmenting paths.
                        // Full Edmonds-Karp pushes backflow, but for these basic problem graphs, 
                        // forward paths usually suffice to show the concept. We'll implement basic backward tracking if needed.
                        if (e.v === u && !visited.has(e.u) && e.flow > 0) {
                            visited.add(e.u);
                            parentEdge[e.u] = -(i + 1); // Negative indicates backward edge
                            queue.push(e.u);
                        }
                    }
                }

                if (!foundPath) break;

                // Reconstruct path
                let pathEdgeIndices = [];
                let curr = T;
                let bottleneck = Infinity;
                let pathNodes = [T];

                while (curr !== S) {
                    let pIdx = parentEdge[curr];
                    if (pIdx >= 0) {
                        let e = currentEdges[pIdx];
                        pathEdgeIndices.unshift(pIdx);
                        bottleneck = Math.min(bottleneck, e.cap - e.flow);
                        curr = e.u;
                    } else {
                        let e = currentEdges[-pIdx - 1];
                        pathEdgeIndices.unshift(-pIdx - 1);
                        bottleneck = Math.min(bottleneck, e.flow);
                        curr = e.v;
                    }
                    pathNodes.unshift(curr);
                }

                steps.push({
                    type: 'path_found',
                    edges: JSON.parse(JSON.stringify(currentEdges)), maxFlow: maxFlow, totalPos: totalPos,
                    activePath: pathEdgeIndices, pathNodes: pathNodes, bottleneck: bottleneck, selectedNodes: [],
                    panel: `<b>BFS Found Augmenting Path:</b> [${pathNodes.join(' ➔ ')}].<br>The bottleneck capacity along this path is <b style="color:var(--accent-orange)">${bottleneck === Infinity ? '∞' : bottleneck}</b>.`,
                    statusText: `Augmenting path found!`,
                    log: `\nFound path: ${pathNodes.join(' -> ')}. Bottleneck: ${bottleneck}`
                });

                // Augment flow
                for (let curr of pathNodes.slice(1)) {
                    let pIdx = parentEdge[curr];
                    if (pIdx >= 0) currentEdges[pIdx].flow += bottleneck;
                    else currentEdges[-pIdx - 1].flow -= bottleneck;
                }
                maxFlow += bottleneck;

                steps.push({
                    type: 'augment',
                    edges: JSON.parse(JSON.stringify(currentEdges)), maxFlow: maxFlow, totalPos: totalPos,
                    activePath: pathEdgeIndices, pathNodes: pathNodes, bottleneck: bottleneck, selectedNodes: [],
                    panel: `Pushed <b>${bottleneck}</b> flow through the path. Updated residual capacities.<br>Current Total Max Flow is now <b style="color:var(--accent-red)">${maxFlow}</b>.`,
                    statusText: `Flow augmented by ${bottleneck}.`,
                    log: `Augmented flow by ${bottleneck}. Current Max Flow: ${maxFlow}`
                });
            }

            // Final Min Cut (Reachable from S in residual graph)
            let reachable = new Set([S]);
            let q = [S];
            while(q.length > 0) {
                let u = q.shift();
                for (let e of currentEdges) {
                    if (e.u === u && !reachable.has(e.v) && e.cap - e.flow > 0) {
                        reachable.add(e.v);
                        q.push(e.v);
                    }
                    if (e.v === u && !reachable.has(e.u) && e.flow > 0) {
                        reachable.add(e.u);
                        q.push(e.u);
                    }
                }
            }

            let selected = Array.from(reachable).filter(n => n !== S && n !== T);
            let finalAns = totalPos - maxFlow;

            steps.push({
                type: 'final',
                edges: JSON.parse(JSON.stringify(currentEdges)), maxFlow: maxFlow, totalPos: totalPos,
                activePath: null, pathNodes: [], bottleneck: null, selectedNodes: selected,
                panel: `<b>Max Flow Reached!</b> No more augmenting paths.<br>The nodes reachable from S in the residual graph are our <b>Max Weight Closure</b>: [${selected.join(', ')}].`,
                complete: true, result: finalAns,
                statusText: `Algorithm Complete.`,
                log: `\nNo more paths. Max Flow = Min Cut = ${maxFlow}. Reachable nodes: [${selected.join(', ')}].\nFinal Profit = ${totalPos} - ${maxFlow} = ${finalAns}`,
                logColor: 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            step.edges.forEach((e, idx) => {
                const p1 = nodeCoords[e.u];
                const p2 = nodeCoords[e.v];
                if(!p1 || !p2) return;

                let isActive = step.activePath && step.activePath.includes(idx);

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                
                const shrinkTarget = nodeRadius + 5; 
                const shrinkSource = nodeRadius + 2;
                
                const x1 = p1.x + (dx/len) * shrinkSource;
                const y1 = p1.y + (dy/len) * shrinkSource;
                const x2 = p2.x - (dx/len) * shrinkTarget;
                const y2 = p2.y - (dy/len) * shrinkTarget;

                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                if (isActive) g.classList.add('edge-active');

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);

                if (isActive) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('marker-end', 'url(#arrow-active)');
                    line.classList.add('line-anim');
                } else {
                    line.setAttribute('stroke', 'var(--text-dim)');
                    line.setAttribute('stroke-width', '1.5');
                    line.setAttribute('marker-end', 'url(#arrow-normal)');
                }

                g.appendChild(line);

                // Add Text Label
                const midX = (x1 + x2) / 2;
                const midY = (y1 + y2) / 2 - 10;
                
                let textStr = e.isInf ? '∞' : `${e.flow}/${e.cap}`;

                // Background rect for text
                const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                bg.setAttribute('x', midX - 16);
                bg.setAttribute('y', midY - 8);
                bg.setAttribute('width', 32);
                bg.setAttribute('height', 16);
                bg.setAttribute('class', 'edge-bg');
                
                const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                txt.setAttribute('x', midX);
                txt.setAttribute('y', midY);
                txt.setAttribute('class', 'edge-label');
                if (!isActive) txt.setAttribute('fill', 'var(--text-dim)');
                txt.textContent = textStr;

                g.appendChild(bg);
                g.appendChild(txt);

                if (isActive) {
                    setTimeout(() => svg.appendChild(g), 0);
                } else {
                    svg.appendChild(g);
                }
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            nodes.forEach(n => {
                const el = document.getElementById(`node-${n}`);
                if(!el) return;
                
                el.className = 'node';
                if (n === S) el.classList.add('source-node');
                if (n === T) el.classList.add('sink-node');
                
                if (step.pathNodes && step.pathNodes.includes(n)) {
                    el.classList.add('active');
                }
                
                if (step.selectedNodes && step.selectedNodes.includes(n)) {
                    el.classList.add('selected');
                }
            });

            drawEdges(step);

            // Update Stats
            document.getElementById('stat-pos').innerText = step.totalPos;
            document.getElementById('stat-flow').innerText = step.maxFlow;
            document.getElementById('stat-ans').innerText = step.totalPos - step.maxFlow;

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-path').innerText = (step.pathNodes && step.pathNodes.length > 0) ? step.pathNodes.join('➔') : '—';
            document.getElementById('val-bot').innerText = step.bottleneck !== null ? (step.bottleneck === Infinity ? '∞' : step.bottleneck) : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
