<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detect Cycle in Directed Graph &middot; Kahn BFS</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:300px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration.fail{border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.07);}
.narration.fail::before{content:'\2717'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap; position:relative;}

.graph-wrap{flex:0 0 auto;}
svg.graph{display:block; width:400px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2; transition:stroke .35s, stroke-width .35s, opacity .35s; marker-end:url(#arrow-normal);}
.edge.resolved{opacity:.22;}
.edge.peeled{opacity:.18;}
.edge.checking{stroke:var(--accent-purple); stroke-width:3.5; marker-end:url(#arrow-active); filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.edge.cycle{stroke:var(--accent-red); stroke-width:3.5; marker-end:url(#arrow-cycle); filter:drop-shadow(0 0 7px rgba(248,81,73,.65)); stroke-dasharray:8; animation:dash 1s linear infinite;}
.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode .nd{font-family:var(--mono); font-weight:700; font-size:10px; fill:var(--accent-orange); text-anchor:middle; dominant-baseline:central; opacity:.9;}
.gnode.inqueue .nc{stroke:var(--accent-blue); fill:rgba(6,182,212,.10); filter:drop-shadow(0 0 6px rgba(6,182,212,.4));}
.gnode.done .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.12); filter:drop-shadow(0 0 6px rgba(34,197,94,.4));}
.gnode.done .nl{fill:#bbf7d0;}
.gnode.activeu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.gnode.activeu .nl{fill:#ffd591;}
.gnode.activev .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 12px rgba(168,85,247,.6)); stroke-width:3;}
.gnode.activev .nl{fill:#e9d5ff;}
.gnode.cycle .nc{stroke:var(--accent-red); fill:rgba(248,81,73,.16); filter:drop-shadow(0 0 10px rgba(248,81,73,.6)); stroke-width:3;}
.gnode.cycle .nl{fill:#ffc2bf;}

.side{display:flex; flex-direction:column; gap:12px; min-width:240px; flex:1 1 240px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel .sub{font-family:var(--mono); font-size:10px; color:var(--text-dim); margin-top:6px;}
.panel.d .cap{color:var(--accent-orange);} .panel.q .cap{color:var(--accent-blue);} .panel.r .cap{color:var(--accent-green);}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start;}
.tcell{display:flex; flex-direction:column; align-items:center; gap:3px;}
.tcell .ix{font-family:var(--mono); font-size:10px; color:var(--text-dim);}
.tile{min-width:34px; height:34px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.tile.d{border-color:rgba(245,165,36,.45); background:rgba(245,165,36,.12); color:#ffd591;}
.tile.d.zero{border-color:rgba(34,197,94,.5); background:rgba(34,197,94,.12); color:#bbf7d0;}
.tile.q{border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.12); color:#a5f3fc;}
.tile.r{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.1); color:#bbf7d0;}
.tiles .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
.count-row{display:flex; align-items:baseline; gap:8px; font-family:var(--mono);}
.count-row .big{font-size:22px; font-weight:800; color:#bbf7d0;}
.count-row .of{font-size:13px; color:var(--text-dim);}
.count-row.cyc .big{color:#ffc2bf;}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-orange);} .pill.n b{color:var(--accent-purple);} .pill.s b{color:var(--accent-green);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>V =</label>
  <input type="text" id="v-input" class="small-input" value="3">
  <label>edges =</label>
  <input type="text" id="e-input" class="large-input" value="[[0,1],[1,2],[2,0]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(3,'[[0,1],[1,2],[2,0]]')">Ex 1 (Cycle)</button>
  <button onclick="loadExample(4,'[[0,1],[1,2],[2,3]]')">Ex 2 (Acyclic)</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Detect Cycle in Directed Graph <span class="sub">&middot; Kahn&#39;s BFS (in-degree peeling)</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 400 380">
        <defs>
          <marker id="arrow-normal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="rgba(255,255,255,.28)"></path>
          </marker>
          <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="#a855f7"></path>
          </marker>
          <marker id="arrow-cycle" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="#f85149"></path>
          </marker>
        </defs>
      </svg></div>
      <div class="side">
        <div class="panel d"><div class="cap">IN-DEGREE[ ] &middot; incoming edges</div><div class="tiles" id="d-tiles"></div></div>
        <div class="panel q"><div class="cap">QUEUE (FIFO) &middot; in-degree 0</div><div class="tiles" id="q-tiles"></div></div>
        <div class="panel r"><div class="cap">PROCESSED &middot; peeled off</div>
          <div class="tiles" id="r-tiles"></div>
          <div class="count-row" id="count-row"><span class="big" id="count-big">0</span><span class="of">/ <span id="count-tot">0</span> nodes</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">node u = <b id="pill-u">&mdash;</b></span>
        <span class="pill n">edge to v = <b id="pill-v">&mdash;</b></span>
        <span class="pill s">processed <b id="pill-cnt">0</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>peeling u</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>target v</span>
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>in queue</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>processed</span>
          <span class="li"><span class="dot" style="background:var(--accent-red)"></span>in cycle</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','hasCycle'],['src','(V, edges):']],
  [['src','  build adj & indeg  (edge u->v adds indeg[v])']],
  [['src','  queue = [ i for indeg[i]==0 ];  processed = 0']],
  [['kw','  while'],['src',' queue:']],
  [['src','    u = queue.popleft();  processed += 1']],
  [['kw','    for'],['src',' v '],['kw','in'],['src',' adj[u]:']],
  [['src','      indeg[v] -= 1']],
  [['kw','      if'],['src',' indeg[v] == 0:  queue.push(v)']],
  [['kw','  return'],['src',' processed < V        '],['src','# True => cycle']],
];

let V_count=3, edgesList=[[0,1],[1,2],[2,0]];
let adj={}, edges=[], coord={};
let steps=[], stepIndex=0, timer=null;
const delays=[2000,1050,520];
const gnodes={};
let confettiArmed=true;

function init(){ buildCode(); loadExample(3,'[[0,1],[1,2],[2,0]]'); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(v,eStr){ document.getElementById('v-input').value=v; document.getElementById('e-input').value=eStr; parseAndGen(); }
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    V_count=parseInt(document.getElementById('v-input').value,10);
    edgesList=JSON.parse(document.getElementById('e-input').value.replace(/\(/g,'[').replace(/\)/g,']'));
    if(isNaN(V_count)||V_count<0||!Array.isArray(edgesList)) throw new Error('bad input');
    // directed edge [u,v] => u -> v ; indegree[v]++
    adj={}; edges=[];
    for(let i=0;i<V_count;i++) adj[i]=[];
    for(const pair of edgesList){ const u=pair[0], v=pair[1];
      if(u<0||u>=V_count||v<0||v>=V_count) throw new Error('edge out of range');
      adj[u].push(v); edges.push({u, v}); }
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid input. V must be a non-negative integer and edges a JSON array of directed pairs like [[0,1],[1,2]] with each endpoint in [0, V-1].'); }
}
function setupGraph(){
  const svg=document.getElementById('graph');
  Array.from(svg.querySelectorAll('.edge,.gnode')).forEach(el=>el.remove());
  coord={}; for(const k in gnodes) delete gnodes[k];
  const N=V_count; if(N===0) return;
  const cx=200, cy=185, R=Math.min(135, 64+N*9);
  for(let i=0;i<N;i++){ const ang=(Math.PI*2*i)/N - Math.PI/2; coord[i]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)}; }
  // edges first (directed, shortened to node rims with arrowheads)
  const rim=22;
  edges.forEach((e,i)=>{ const p1=coord[e.u], p2=coord[e.v]; if(!p1||!p2) return;
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1;
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line'); ln.setAttribute('class','edge'); ln.id='e'+i;
    ln.setAttribute('x1',(p1.x+(dx/len)*(rim+1)).toFixed(1)); ln.setAttribute('y1',(p1.y+(dy/len)*(rim+1)).toFixed(1));
    ln.setAttribute('x2',(p2.x-(dx/len)*(rim+7)).toFixed(1)); ln.setAttribute('y2',(p2.y-(dy/len)*(rim+7)).toFixed(1));
    ln.dataset.u=e.u; ln.dataset.v=e.v; svg.appendChild(ln); });
  // nodes on top
  for(let i=0;i<N;i++){ const p=coord[i];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode'); g.id='gn'+i;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',20);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y-2); t.textContent=i;
    const d=document.createElementNS('http://www.w3.org/2000/svg','text'); d.setAttribute('class','nd'); d.setAttribute('x',p.x); d.setAttribute('y',p.y+12); d.id='nd'+i;
    g.appendChild(c); g.appendChild(t); g.appendChild(d); svg.appendChild(g); gnodes[i]=g; }
}

function generateSteps(){
  steps=[];
  const inDeg=new Array(V_count).fill(0);
  for(const e of edges) inDeg[e.v]++;
  const queue=[]; const processed=[];
  function snap(o){ steps.push({ inDeg:[...inDeg], queue:[...queue], processed:[...processed],
    u:o.u??null, v:o.v??null, pushed:o.pushed??null, updIdx:o.updIdx??null,
    code:o.code, narr:o.narr, log:o.log, complete:o.complete??false, isCycle:o.isCycle??false }); }

  snap({code:[1], narr:`<b>Kahn&#39;s algorithm.</b> Build the directed graph (edge <code>u&rarr;v</code> adds 1 to <code>in-degree[v]</code>) and count incoming edges. Start: <code>[${inDeg.join(', ')}]</code>.`,
    log:`build graph. in-degree=[${inDeg.join(', ')}]`});

  const seeds=[];
  for(let i=0;i<V_count;i++){ if(inDeg[i]===0){ queue.push(i); seeds.push(i); } }
  snap({code:[2], narr:`Nodes with <code>in-degree = 0</code> have no incoming edges &rarr; enqueue them as peel-off candidates. Queue = <code>[${seeds.join(', ')}]</code>${seeds.length===0?' &mdash; <b>nothing to peel!</b>':''}.`,
    log:`zero in-degree: [${seeds.join(', ')}]  queue=[${queue.join(',')}]`});

  while(queue.length){
    const u=queue.shift(); processed.push(u);
    snap({code:[3,4], u, narr:`Dequeue <code>${u}</code> and <b>peel it off</b> (processed = <b>${processed.length}</b>). Relax the edges leaving <code>${u}</code>.`,
      log:`peel ${u}  processed=${processed.length}  [${processed.join(',')}]`});
    const nb=adj[u]||[];
    for(const v of nb){
      inDeg[v]--;
      snap({code:[5,6], u, v, updIdx:v, narr:`Edge <code>${u}&rarr;${v}</code> removed &rarr; decrement <code>in-degree[${v}]</code> to <b>${inDeg[v]}</b>.`,
        log:`  relax ${u}->${v}  in-degree[${v}]=${inDeg[v]}`});
      if(inDeg[v]===0){
        queue.push(v);
        snap({code:[7], u, v, pushed:v, updIdx:v, narr:`<code>in-degree[${v}] = 0</code> &mdash; node <code>${v}</code> now has no incoming edges. <b>Enqueue ${v}</b>. Queue = <code>[${queue.join(', ')}]</code>.`,
          log:`    in-degree[${v}]=0  enqueue ${v}  queue=[${queue.join(',')}]`});
      }
    }
  }

  const isCycle = processed.length!==V_count;
  if(isCycle){
    const stuck=[...Array(V_count).keys()].filter(i=>inDeg[i]>0);
    snap({code:[8], complete:true, isCycle:true,
      narr:`<b>Cycle detected.</b> Queue is empty but only <code>${processed.length}/${V_count}</code> nodes were peeled. Nodes <code>[${stuck.join(', ')}]</code> still have <code>in-degree &gt; 0</code> &mdash; they depend on each other in a loop. <code>hasCycle = True</code>.`,
      log:`done. processed ${processed.length}/${V_count} -> CYCLE, return True`});
  } else {
    snap({code:[8], complete:true, isCycle:false,
      narr:`Queue empty and all <code>${V_count}</code> nodes peeled. A full topological order exists, so the graph is acyclic. <code>hasCycle = False</code>.`,
      log:`done. processed ${processed.length}/${V_count} -> no cycle, return False`});
  }
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const inq=new Set(step.queue), placed=new Set(step.processed);
  const cycleSet = step.isCycle ? new Set([...Array(V_count).keys()].filter(i=>step.inDeg[i]>0)) : new Set();
  for(let n=0;n<V_count;n++){ const g=gnodes[n]; if(!g) continue;
    g.classList.remove('inqueue','done','activeu','activev','cycle');
    if(placed.has(n)) g.classList.add('done');
    else if(inq.has(n)) g.classList.add('inqueue');
    if(cycleSet.has(n)) g.classList.add('cycle');
    if(step.u===n && !step.complete) g.classList.add('activeu');
    if(step.v===n && !step.complete) g.classList.add('activev');
    const d=document.getElementById('nd'+n); if(d) d.textContent = placed.has(n) ? '✓' : 'd'+step.inDeg[n];
    if(step.pushed===n){ const c=g.querySelector('.nc'); if(c) Motion.pop(c); }
  }
  // edges: directed u->v checking; cycle edges when both endpoints stuck; fade once source peeled
  document.querySelectorAll('.edge').forEach(ln=>{ ln.classList.remove('checking','resolved','peeled','cycle');
    const eu=Number(ln.dataset.u), ev=Number(ln.dataset.v);
    const checking = step.u!=null && step.v!=null && step.u===eu && step.v===ev && !step.complete;
    if(checking){ ln.classList.add('checking'); }
    else if(step.isCycle && cycleSet.has(eu) && cycleSet.has(ev)){ ln.classList.add('cycle'); }
    else if(placed.has(eu)){ ln.classList.add('peeled'); } });

  fillDeg(step); fillTiles('q-tiles', step.queue, 'q', step.pushed); fillTiles('r-tiles', step.processed, 'r', null);
  document.getElementById('count-big').textContent=step.processed.length;
  document.getElementById('count-tot').textContent=V_count;
  document.getElementById('count-row').classList.toggle('cyc', !!step.complete && !!step.isCycle);

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done', !!step.complete && !step.isCycle);
  narr.classList.toggle('fail', !!step.complete && !!step.isCycle);
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i+1)); });
  document.getElementById('pill-u').textContent=step.u!=null?step.u:'—';
  document.getElementById('pill-v').textContent=(step.u!=null&&step.v!=null)?(step.u+'→'+step.v):'—';
  document.getElementById('pill-cnt').textContent=step.processed.length;
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;
  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color=steps[k].isCycle?'var(--accent-red)':'var(--accent-green)'; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;
  if(step.complete && !step.isCycle){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}
function fillDeg(step){
  const c=document.getElementById('d-tiles'); c.innerHTML='';
  if(!step.inDeg.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; c.appendChild(e); return; }
  step.inDeg.forEach((val,i)=>{
    const w=document.createElement('div'); w.className='tcell';
    const t=document.createElement('div'); t.className='tile d'+(val===0?' zero':''); t.textContent=val;
    if(step.updIdx===i) Motion.pop(t);
    const ix=document.createElement('div'); ix.className='ix'; ix.textContent='['+i+']';
    w.appendChild(t); w.appendChild(ix); c.appendChild(w);
  });
}
function fillTiles(id, arr, cls, pushed){
  const c=document.getElementById(id); c.innerHTML='';
  if(!arr.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; c.appendChild(e); return; }
  arr.forEach(v=>{ const t=document.createElement('div'); t.className='tile '+cls; t.textContent=v;
    if(pushed!=null && v===pushed) Motion.pop(t); c.appendChild(t); });
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
