<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detect Cycle in Undirected Graph (DFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 3; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 2; color: var(--accent-purple); }
        .node.visited { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .node.cycle-node { background: #3a0d0d; border-color: var(--accent-red); color: var(--accent-red); box-shadow: 0 0 15px var(--accent-red); animation: shake 0.4s infinite; z-index: 4;}

        @keyframes shake {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-53%, -50%) rotate(-5deg); }
            50% { transform: translate(-50%, -50%) rotate(0deg); }
            75% { transform: translate(-47%, -50%) rotate(5deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 44px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.stack-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); padding: 0 8px; width: auto; font-size: 13px;}
        .tile.vis-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile.parent-tile { background: #1a150b; border-color: var(--accent-orange); color: var(--accent-orange); }
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; filter: brightness(1.5);}
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes highlightFlash { 0% { transform: scale(1); } 50% { transform: scale(1.2); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); } }
        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 15px var(--accent-red); transform: scale(1.1); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="4">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1], [1,2], [2,3], [3,0]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(4, '[[0,1], [1,2], [2,3], [3,0]]')">Ex 1 (Cycle)</button>
        <button onclick="loadExample(3, '[[0,1], [1,2]]')">Ex 2 (No Cycle)</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">Visited Array:</div>
                <div class="tiles-wrapper" id="vis-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Has the node been discovered?</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">Parent Array:</div>
                <div class="tiles-wrapper" id="parent-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Which node discovered this node?</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">DFS Call Stack:</div>
                <div class="tiles-wrapper" id="stack-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Cycle Condition</span>
            <span class="info-value" id="val-cond" style="color: var(--text-main); font-size:13px;">visited[v] && v != parent[u]</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">contains cycle? =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Active Node (u)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Neighbor (v)</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Visited Node</div>
        <div class="legend-item"><span class="dot" style="background:#3a0d0d; border-color:var(--accent-red)"></span> Cycle Detected!</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 4;
        let edgesList = [[0,1], [1,2], [2,3], [3,0]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample(4, '[[0,1], [1,2], [2,3], [3,0]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is an integer and edges is a valid array of [u, v].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 225;
            const cy = 200;
            const radius = 130;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let adj = Array.from({length: V_count}, () => []);
            for (let [u,v] of edgesList) {
                adj[u].push(v);
                adj[v].push(u); // Undirected graph
            }

            let visited = new Array(V_count).fill(false);
            let parent = new Array(V_count).fill(-1);
            let callStack = [];
            
            let cycleFound = false;
            let cycleEdge = null;

            steps.push({
                type: 'init', visited: [...visited], parent: [...parent], callStack: [...callStack],
                u: null, v: null, poppedItem: null, pushedItem: null, updatedNode: null, cycleEdge: null,
                panel: `<b>Detect Cycle (DFS)</b><br>We will perform Depth-First Search. To avoid falsely detecting a cycle when looking back at the node we just came from, we track the <code>parent</code> of each node.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. V=${V_count}.`
            });

            function dfs(u, p, depth) {
                let pad = "  ".repeat(depth);
                
                visited[u] = true;
                parent[u] = p;
                callStack.push(u);

                steps.push({
                    type: 'visit', visited: [...visited], parent: [...parent], callStack: [...callStack],
                    u: u, v: null, poppedItem: null, pushedItem: u, updatedNode: u, cycleEdge: null,
                    panel: `<code>dfs(${u}, parent=${p})</code>: Mark Node <b>${u}</b> as Visited.<br>Record its parent <code>parent[${u}] = ${p}</code> and add it to the DFS Call Stack.`,
                    statusText: `Visiting Node ${u}...`,
                    log: `\n${pad}dfs(${u}, parent=${p}): Marked visited.`
                });

                let neighbors = adj[u] || [];
                if (neighbors.length === 0) {
                    steps.push({
                        type: 'no_neighbors', visited: [...visited], parent: [...parent], callStack: [...callStack],
                        u: u, v: null, poppedItem: null, pushedItem: null, updatedNode: null, cycleEdge: null,
                        panel: `Node <b>${u}</b> has no neighbors.`,
                        statusText: `No neighbors.`,
                        log: `${pad}  Node ${u} has no neighbors.`
                    });
                }

                for (let v of neighbors) {
                    steps.push({
                        type: 'check', visited: [...visited], parent: [...parent], callStack: [...callStack],
                        u: u, v: v, poppedItem: null, pushedItem: null, updatedNode: null, cycleEdge: null,
                        panel: `Checking neighbor <b>${v}</b> of Node <b>${u}</b>.<br>Is <code>${v}</code> visited?`,
                        statusText: `Evaluating edge ${u} — ${v}...`,
                        log: `${pad}  Evaluating neighbor ${v}...`
                    });

                    if (!visited[v]) {
                        steps.push({
                            type: 'recurse', visited: [...visited], parent: [...parent], callStack: [...callStack],
                            u: u, v: v, poppedItem: null, pushedItem: null, updatedNode: null, cycleEdge: null,
                            panel: `Neighbor <b>${v}</b> is <b style="color:var(--accent-green)">unvisited</b>.<br>Recursively call <code>dfs(node=${v}, parent=${u})</code>.`,
                            statusText: `Recursing into Node ${v}...`,
                            log: `${pad}    -> Unvisited. Recursing dfs(${v}, parent=${u}).`
                        });
                        
                        if (dfs(v, u, depth + 1)) return true;
                        
                        steps.push({
                            type: 'backtrack', visited: [...visited], parent: [...parent], callStack: [...callStack],
                            u: u, v: null, poppedItem: null, pushedItem: null, updatedNode: null, cycleEdge: null,
                            panel: `Returned from <code>dfs(${v})</code> back to <b>${u}</b>.<br>Continuing to check remaining neighbors of <b>${u}</b>.`,
                            statusText: `Backtracked to Node ${u}.`,
                            log: `${pad}  <- Backtracked from ${v} to ${u}.`
                        });

                    } else if (v !== p) {
                        cycleEdge = [u, v];

                        steps.push({
                            type: 'cycle_found', visited: [...visited], parent: [...parent], callStack: [...callStack],
                            u: u, v: v, poppedItem: null, pushedItem: null, updatedNode: null, cycleEdge: cycleEdge,
                            panel: `<b style="color:var(--accent-red); font-size:16px;">Cycle Detected!</b><br>Neighbor <b>${v}</b> is already visited, AND it is <b>NOT</b> the parent of <b>${u}</b> (<code>${v} != ${p}</code>).<br>This means we found a cross-edge forming a cycle!`,
                            statusText: `Cycle detected at edge ${u}-${v}!`,
                            log: `${pad}    -> Visited AND v(${v}) != parent[${u}](${p}). CYCLE DETECTED!`,
                            logColor: 'var(--accent-red)'
                        });
                        return true;
                    } else {
                        steps.push({
                            type: 'skip_parent', visited: [...visited], parent: [...parent], callStack: [...callStack],
                            u: u, v: v, poppedItem: null, pushedItem: null, updatedNode: null, cycleEdge: null,
                            panel: `Neighbor <b>${v}</b> is already visited, BUT it is the parent of <b>${u}</b> (<code>${v} == ${p}</code>).<br>This is just the edge we arrived from. <b style="color:var(--text-dim)">Skip.</b>`,
                            statusText: `Skipping parent edge ${u}-${v}.`,
                            log: `${pad}    -> Visited but is parent (${v}). Skipped.`
                        });
                    }
                }
                
                let popped = callStack.pop();
                steps.push({
                    type: 'finish', visited: [...visited], parent: [...parent], callStack: [...callStack],
                    u: u, v: null, poppedItem: popped, pushedItem: null, updatedNode: null, cycleEdge: null,
                    panel: `Finished exploring all neighbors of <b>${u}</b>.<br>Pop <b>${u}</b> from the DFS Call Stack and return.`,
                    statusText: `Finished Node ${u}.`,
                    log: `${pad}Finished dfs(${u}).`
                });

                return false;
            }

            for (let i = 0; i < V_count; i++) {
                if (!visited[i]) {
                    steps.push({
                        type: 'new_component', visited: [...visited], parent: [...parent], callStack: [...callStack],
                        u: i, v: null, poppedItem: null, pushedItem: null, updatedNode: null, cycleEdge: null,
                        panel: `Node <b>${i}</b> is unvisited. Starting a new DFS component from <b>${i}</b>.`,
                        statusText: `Starting DFS from Node ${i}.`,
                        log: `\nNode ${i} is unvisited. Starting DFS.`
                    });

                    if (dfs(i, -1, 0)) {
                        cycleFound = true;
                        break;
                    }
                }
            }

            steps.push({
                type: 'final', visited: [...visited], parent: [...parent], callStack: [...callStack],
                u: null, v: null, poppedItem: null, pushedItem: null, updatedNode: null, cycleEdge: cycleEdge,
                panel: cycleFound ? 
                    `<b>Algorithm Terminated.</b><br>A cycle was successfully detected in the graph.` :
                    `<b>Algorithm Complete!</b><br>All connected components were fully explored. No cycles exist in the graph.`,
                complete: true, result: cycleFound ? 'True' : 'False', isCycle: cycleFound,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Result: ${cycleFound}`,
                logColor: cycleFound ? 'var(--accent-red)' : 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawn = new Set();

            edgesList.forEach(e => {
                const u = e[0];
                const v = e[1];
                
                let key = u < v ? `${u}-${v}` : `${v}-${u}`;
                if (drawn.has(key)) return;
                drawn.add(key);

                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.u !== null && step.v !== null && 
                                 ((step.u === u && step.v === v) || (step.u === v && step.v === u));

                let isCycle = step.cycleEdge && 
                              ((step.cycleEdge[0] === u && step.cycleEdge[1] === v) || 
                               (step.cycleEdge[0] === v && step.cycleEdge[1] === u));

                // Tree edge logic: if parent[v] == u or parent[u] == v
                let isTree = false;
                if ((step.parent[v] === u && step.visited[v]) || (step.parent[u] === v && step.visited[u])) {
                    isTree = true;
                }

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrink = nodeRadius + 2; 
                
                line.setAttribute('x1', p1.x + (dx/len)*shrink); 
                line.setAttribute('y1', p1.y + (dy/len)*shrink);
                line.setAttribute('x2', p2.x - (dx/len)*shrink); 
                line.setAttribute('y2', p2.y - (dy/len)*shrink);

                if (isCycle) {
                    line.setAttribute('stroke', 'var(--accent-red)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('stroke-dasharray', '8');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else if (isChecking) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('stroke-dasharray', '6');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else if (isTree) {
                    line.setAttribute('stroke', 'var(--accent-green)');
                    line.setAttribute('stroke-width', '3');
                    svg.appendChild(line);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('stroke-dasharray', '4');
                    svg.appendChild(line);
                }
            });
        }

        function renderStack(step) {
            const container = document.getElementById('stack-tiles');
            container.innerHTML = '';
            
            if (step.callStack.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            step.callStack.forEach((val, index) => {
                const tile = document.createElement('div');
                tile.className = `tile stack-tile`;
                if (step.pushedItem === val && index === step.callStack.length - 1) {
                    tile.classList.add('pushing');
                }
                tile.innerText = val;
                
                container.appendChild(tile);
                
                // Add separator except for the last item
                if (index < step.callStack.length - 1 || step.poppedItem !== null) {
                    const sep = document.createElement('span');
                    sep.innerText = '➔';
                    sep.style.color = 'var(--text-dim)';
                    sep.style.fontSize = '12px';
                    container.appendChild(sep);
                }
            });

            if (step.poppedItem !== null && step.type === 'finish') {
                const popTile = document.createElement('div');
                popTile.className = `tile stack-tile popping`;
                popTile.innerText = step.poppedItem;
                container.appendChild(popTile);
            }
        }

        function renderArray(containerId, arr, tileClass, formatFn, stepData) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile ${tileClass}`;
                
                if (stepData.updatedNode === i) {
                    tile.classList.add('highlight-update');
                }
                
                tile.innerText = formatFn(val);
                
                // Color tweaks for visual clarity
                if (tileClass === 'vis-tile' && !val) {
                    tile.style.background = '#21262d';
                    tile.style.borderColor = 'var(--border-main)';
                    tile.style.color = 'var(--text-dim)';
                }
                if (tileClass === 'parent-tile' && val === -1) {
                    tile.style.background = '#21262d';
                    tile.style.borderColor = 'var(--border-main)';
                    tile.style.color = 'var(--text-dim)';
                }
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (step.visited[i]) el.classList.add('visited');
                
                if (step.u === i && !step.complete) el.classList.add('active-u');
                if (step.v === i && !step.complete) el.classList.add('active-v');
                
                if (step.cycleEdge && (step.cycleEdge[0] === i || step.cycleEdge[1] === i)) {
                    el.classList.add('cycle-node');
                }
            }

            drawEdges(step);
            renderStack(step);
            
            renderArray('vis-tiles', step.visited, 'vis-tile', v => v ? 'T' : 'F', step);
            renderArray('parent-tiles', step.parent, 'parent-tile', v => v, step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? `${step.u}` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `${step.v}` : '—';

            let eqStr = 'visited[v] && v != parent[u]';
            if (step.u !== null && step.v !== null) {
                let isVis = step.visited[step.v];
                let parentU = step.parent[step.u];
                eqStr = `${isVis} && ${step.v} != ${parentU}`;
            }
            document.getElementById('val-cond').innerText = eqStr;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.className = step.isCycle ? 'pop' : 'pop-false';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
