<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euler Path (Hierholzer) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.active { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 3; color: var(--accent-orange); background: #332200; }
        .node.neighbor { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 2; color: var(--accent-purple); }
        .node.dead-end { background: #3a0d0d; border-color: var(--accent-red); color: var(--accent-red); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 100px;}
        
        .stack-wrapper {
            display: flex; flex-direction: column-reverse; gap: 6px; align-items: center; 
            max-height: 150px; overflow-y: auto; padding: 4px; background: var(--bg-page); border: 1px inset var(--border-main); border-radius: 6px;
            min-height: 100px;
        }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile {
            min-width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.stack-tile { width: 80%; min-height: 36px; background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.path-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }
        .tile.new-path { animation: flashPath 0.6s ease; }

        @keyframes pushAnim { 0%{transform:translateY(-15px); opacity:0;} 100%{transform:translateY(0); opacity:1;} }
        @keyframes flashPath { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.5); box-shadow: 0 0 10px var(--accent-green); } 100% { transform: scale(1); filter: brightness(1); } }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center; word-break: break-all;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 15px var(--accent-red); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="3">
        <label class="ui-label">edges (undirected) =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1], [1,2], [2,0]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(3, '[[0,1], [1,2], [2,0]]')">Ex 1</button>
        <button onclick="loadExample(4, '[[0,1], [1,2], [2,3], [3,0], [0,2]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue); text-align:center;">DFS Stack (LIFO)</div>
                <div class="stack-wrapper" id="stack-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">Final Path (Built Backwards):</div>
                <div class="tiles-wrapper" id="path-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (curr)</span>
            <span class="info-value" id="val-curr" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Traversing Edge To</span>
            <span class="info-value" id="val-nxt" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Remaining Edges</span>
            <span class="info-value" id="val-rem" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">euler path / circuit =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#332200; border-color:var(--accent-orange); border-width:2px;"></span> Current Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Traversing Edge</div>
        <div class="legend-item"><span class="dot" style="background:#3a0d0d; border-color:var(--accent-red); border-width:2px;"></span> Dead End (No Unused Edges)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--border-main); border-width:2px;"></span> Available Edge</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--text-dim); border-width:1px; border-style:dashed;"></span> Used Edge</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 3;
        let edgesList = [[0,1], [1,2], [2,0]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];

        function init() { loadExample(3, '[[0,1], [1,2], [2,0]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                const eStr = document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']');
                edgesList = JSON.parse(eStr);
                
                if (isNaN(V_count) || V_count <= 0 || !Array.isArray(edgesList)) throw "Invalid Inputs";
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is a positive integer and edges is a valid JSON array.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            const cx = 225;
            const cy = 200;
            const radius = 140;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function countRemainingEdges(adj) {
            let sum = 0;
            for(let u=0; u<V_count; u++) sum += adj[u].length;
            return sum / 2; // undirected
        }

        function generateSteps() {
            steps = [];
            
            let adj = Array.from({length: V_count}, () => []);
            let degrees = new Array(V_count).fill(0);
            
            for (let e of edgesList) {
                let u = e[0], v = e[1];
                adj[u].push(v);
                adj[v].push(u);
                degrees[u]++;
                degrees[v]++;
            }

            let oddNodes = [];
            for (let i = 0; i < V_count; i++) {
                if (degrees[i] % 2 !== 0) oddNodes.push(i);
            }

            let startNode = 0;
            let isValid = true;
            let errorMsg = "";

            if (oddNodes.length === 0) {
                // Find first node with edges
                for (let i = 0; i < V_count; i++) {
                    if (degrees[i] > 0) { startNode = i; break; }
                }
            } else if (oddNodes.length === 2) {
                startNode = oddNodes[0];
            } else {
                isValid = false;
                errorMsg = `Graph has ${oddNodes.length} nodes with odd degrees. Euler Path requires 0 or 2 odd degree nodes.`;
            }

            let usedEdges = new Set();
            let stack = [];
            let path = [];
            let curr = startNode;

            steps.push({
                type: 'init', adj: JSON.parse(JSON.stringify(adj)), usedEdges: new Set(usedEdges),
                stack: [...stack], path: [...path], curr: curr, nxt: null, isError: !isValid,
                panel: `<b>Hierholzer's Algorithm Initialization</b><br>Counted degrees: ${oddNodes.length} nodes have odd degrees.<br>` + 
                       (isValid ? `Valid graph! Starting at Node <b>${startNode}</b>.` : `<b style="color:var(--accent-red)">Invalid Graph!</b> ${errorMsg}`),
                statusText: isValid ? `Ready to find path.` : `Algorithm Aborted.`,
                log: `Init: Odd degree nodes = [${oddNodes}]. Start Node = ${startNode}.`
            });

            if (!isValid) {
                steps[0].complete = true;
                steps[0].result = "No Euler Path Possible";
                return;
            }

            // Algorithm loop
            while (stack.length > 0 || adj[curr].length > 0) {
                
                if (adj[curr].length > 0) {
                    // Has neighbors to explore
                    let nxt = adj[curr][0];
                    
                    steps.push({
                        type: 'explore', adj: JSON.parse(JSON.stringify(adj)), usedEdges: new Set(usedEdges),
                        stack: [...stack], path: [...path], curr: curr, nxt: nxt,
                        panel: `Node <b>${curr}</b> has unused edges.<br>Push <b>${curr}</b> to the Stack, and traverse the edge to <b>${nxt}</b>.`,
                        statusText: `Traversing edge ${curr} — ${nxt}...`,
                        log: `\nNode ${curr} has neighbors. Push ${curr} to Stack. Traverse to ${nxt}.`
                    });

                    stack.push(curr);
                    
                    // Remove edge u-v
                    adj[curr].splice(adj[curr].indexOf(nxt), 1);
                    adj[nxt].splice(adj[nxt].indexOf(curr), 1);
                    
                    // Create normalized edge key for UI
                    let eKey = curr < nxt ? `${curr}-${nxt}` : `${nxt}-${curr}`;
                    
                    // Handle multigraphs visually by maintaining counts, but here we just add to set
                    // If multiple edges exist between same nodes, our visualizer just marks it used once, which is a visual limitation
                    // Let's assume standard simple graphs for the visualization or append a random ID if needed.
                    // For now, we'll append a counter to the key if it already exists.
                    let counter = 0;
                    while(usedEdges.has(`${eKey}_${counter}`)) counter++;
                    usedEdges.add(`${eKey}_${counter}`);

                    curr = nxt;
                    
                    steps.push({
                        type: 'after_explore', adj: JSON.parse(JSON.stringify(adj)), usedEdges: new Set(usedEdges),
                        stack: [...stack], path: [...path], curr: curr, nxt: null,
                        panel: `Arrived at Node <b>${curr}</b>. Edge is marked as Used and removed from adjacency list.`,
                        statusText: `Arrived at ${curr}.`,
                        log: `  -> Edge removed. Current node is now ${curr}. Stack=[${stack.join(', ')}].`
                    });

                } else {
                    // Dead end
                    steps.push({
                        type: 'dead_end', adj: JSON.parse(JSON.stringify(adj)), usedEdges: new Set(usedEdges),
                        stack: [...stack], path: [...path], curr: curr, nxt: null,
                        panel: `Node <b>${curr}</b> has <b style="color:var(--accent-red)">NO unused edges left</b> (Dead End).<br>Add <b>${curr}</b> to the Final Path.`,
                        statusText: `Dead end at ${curr}. Adding to path.`,
                        log: `\nNode ${curr} has no unused edges (Dead End). Add to Path.`
                    });

                    path.unshift(curr); // Path is built backwards!
                    
                    let popped = stack.length > 0 ? stack[stack.length-1] : null;

                    steps.push({
                        type: 'backtrack', adj: JSON.parse(JSON.stringify(adj)), usedEdges: new Set(usedEdges),
                        stack: [...stack], path: [...path], curr: curr, nxt: null, poppedItem: popped, newPathNode: curr,
                        panel: stack.length > 0 ? `<b>Backtracking:</b> Pop the Stack to return to Node <b>${popped}</b> to check for remaining unexplored branches.` : `Stack is empty! Traversal is finished.`,
                        statusText: stack.length > 0 ? `Backtracking to ${popped}...` : `Traversal finished.`,
                        log: stack.length > 0 ? `  -> Prepend ${curr} to Path. Path=[${path.join(', ')}]. Pop Stack to ${popped}.` : `  -> Prepend ${curr} to Path. Stack empty.`
                    });

                    if (stack.length > 0) {
                        curr = stack.pop();
                    }
                }
            }

            steps.push({
                type: 'final', adj: JSON.parse(JSON.stringify(adj)), usedEdges: new Set(usedEdges),
                stack: [...stack], path: [...path], curr: null, nxt: null,
                panel: `<b>Algorithm Complete!</b><br>All edges have been traversed exactly once.<br>The Final Eulerian Path/Circuit is <b style="color:var(--accent-green)">[${path.join(', ')}]</b>.`,
                complete: true, result: `[${path.join(', ')}]`,
                statusText: `Algorithm Complete.`,
                log: `\nAlgorithm Finished. Final Path: [${path.join(', ')}]`,
                logColor: 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            // Track how many times an edge has been drawn to handle the used logic
            let drawnUsed = new Set();

            edgesList.forEach((e, idx) => {
                const u = e[0];
                const v = e[1];
                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let eKey = u < v ? `${u}-${v}` : `${v}-${u}`;
                
                // Determine if this specific edge instance is "used"
                let counter = 0;
                while(drawnUsed.has(`${eKey}_${counter}`)) counter++;
                let currentEdgeId = `${eKey}_${counter}`;
                
                let isUsed = step.usedEdges.has(currentEdgeId);
                if (isUsed) drawnUsed.add(currentEdgeId);

                let isTraversing = step.type === 'explore' && 
                                   ((step.curr === u && step.nxt === v) || (step.curr === v && step.nxt === u)) &&
                                   !isUsed; // Only highlight if it's the one currently being destroyed

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrink = nodeRadius; 
                
                line.setAttribute('x1', p1.x + (dx/len)*shrink); 
                line.setAttribute('y1', p1.y + (dy/len)*shrink);
                line.setAttribute('x2', p2.x - (dx/len)*shrink); 
                line.setAttribute('y2', p2.y - (dy/len)*shrink);

                if (isTraversing) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    setTimeout(() => svg.appendChild(line), 0);
                    
                    // We also mark this instance as used visually immediately so we don't pick it up again if multigraph
                    drawnUsed.add(currentEdgeId); 
                } else if (isUsed) {
                    line.setAttribute('stroke', 'var(--text-dim)');
                    line.setAttribute('stroke-width', '1.5');
                    line.setAttribute('stroke-dasharray', '4');
                    line.setAttribute('opacity', '0.3');
                    svg.appendChild(line);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2.5');
                    svg.appendChild(line);
                }
            });
        }

        function renderStack(step) {
            const container = document.getElementById('stack-tiles');
            container.innerHTML = '';
            
            if (step.stack.length === 0 && !step.poppedItem && step.poppedItem !== 0) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:12px; margin-top:8px;">{ empty }</span>';
                return;
            }

            step.stack.forEach(val => {
                const tile = document.createElement('div');
                tile.className = 'tile stack-tile';
                
                // If it was just pushed
                if (step.type === 'explore' && step.curr === val && val === step.stack[step.stack.length-1]) {
                    tile.classList.add('pushing');
                }
                
                tile.innerText = val;
                container.appendChild(tile);
            });

            if (step.type === 'backtrack' && step.poppedItem !== null) {
                const pTile = document.createElement('div');
                pTile.className = 'tile stack-tile popping';
                pTile.innerText = step.poppedItem;
                container.appendChild(pTile);
            }
        }

        function renderPath(step) {
            const container = document.getElementById('path-tiles');
            container.innerHTML = '';
            
            if (step.path.length === 0) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            step.path.forEach((val, idx) => {
                const tile = document.createElement('div');
                tile.className = 'tile path-tile';
                
                // Path array is unshifted, so index 0 is the newest addition
                if (step.type === 'backtrack' && idx === 0 && val === step.newPathNode) {
                    tile.classList.add('new-path');
                }
                
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (step.curr === i) {
                    el.classList.add('active');
                    if (step.type === 'dead_end') el.classList.add('dead-end');
                }
                if (step.nxt === i) el.classList.add('neighbor');
            }

            drawEdges(step);
            renderStack(step);
            renderPath(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-curr').innerText = step.curr !== null ? step.curr : '—';
            document.getElementById('val-nxt').innerText = step.nxt !== null ? step.nxt : '—';
            
            let remEdges = step.adj ? countRemainingEdges(step.adj) : 0;
            document.getElementById('val-rem').innerText = step.isError ? '—' : remEdges;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.className = step.isError ? 'pop-false' : 'pop';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
