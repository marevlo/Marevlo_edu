<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condensation Graph - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;

            /* SCC Colors */
            --scc-0: #e3b341;
            --scc-1: #388bfd;
            --scc-2: #3fb950;
            --scc-3: #f85149;
            --scc-4: #a371f7;
            --scc-5: #ff7b72;
            --scc-6: #d2a8ff;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 480px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 2;
        }
        
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 4; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 3; color: var(--accent-purple); }

        .scc-node-0 { background: rgba(227, 179, 65, 0.15); border-color: var(--scc-0); color: var(--scc-0); box-shadow: 0 0 15px rgba(227,179,65,0.4); z-index: 5;}
        .scc-node-1 { background: rgba(56, 139, 253, 0.15); border-color: var(--scc-1); color: var(--scc-1); box-shadow: 0 0 15px rgba(56,139,253,0.4); z-index: 5;}
        .scc-node-2 { background: rgba(63, 185, 80, 0.15); border-color: var(--scc-2); color: var(--scc-2); box-shadow: 0 0 15px rgba(63,185,80,0.4); z-index: 5;}
        .scc-node-3 { background: rgba(248, 81, 73, 0.15); border-color: var(--scc-3); color: var(--scc-3); box-shadow: 0 0 15px rgba(248,81,73,0.4); z-index: 5;}
        .scc-node-4 { background: rgba(163, 113, 247, 0.15); border-color: var(--scc-4); color: var(--scc-4); box-shadow: 0 0 15px rgba(163,113,247,0.4); z-index: 5;}

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 100px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile {
            min-width: 38px; height: 34px; display: flex; align-items: center; justify-content: center;
            border-radius: 4px; font-size: 14px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main); padding: 0 8px;
        }

        .tile.scc-tile { flex-direction: column; height: auto; padding: 6px; align-items: flex-start; }
        .scc-title { font-size: 10px; color: var(--text-dim); margin-bottom: 4px;}
        .scc-nodes { font-size: 14px; }
        
        .tile.edge-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile.dup-tile { background: #3a0d0d; border-color: var(--accent-red); color: var(--accent-red); }
        
        .tile.pushing { animation: pushAnim 0.3s ease; }
        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 14px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 18px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; text-align: center; word-break: break-all; max-width: 800px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.05); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1.05)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="4">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1], [1,2], [2,0], [1,3]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(4, '[[0,1], [1,2], [2,0], [1,3]]')">Ex 1</button>
        <button onclick="loadExample(5, '[[0,1], [1,2], [2,0], [1,3], [3,4], [4,3]]')">Ex 2</button>
        <button onclick="loadExample(3, '[[0,1], [1,2], [2,0], [0,2]]')">Ex 3</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                    <marker id="arrow-cond" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-green)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">Identified SCCs:</div>
                <div class="tiles-wrapper" id="scc-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">Condensation Edges:</div>
                <div class="tiles-wrapper" id="edge-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Edge (u ➔ v)</span>
            <span class="info-value" id="val-edge" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">SCC of u</span>
            <span class="info-value" id="val-su" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">SCC of v</span>
            <span class="info-value" id="val-sv" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Edge Type</span>
            <span class="info-value" id="val-type" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">condensation graph (DAG) =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Active Node u</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Active Node v</div>
        <div class="legend-item"><span class="dot" style="background:var(--scc-0); border-color:transparent;"></span> Grouped into SCC</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-green); border-width:2px;"></span> Cross-SCC Edge (Condensation)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--border-main); border-width:2px; opacity:0.4"></span> Internal SCC Edge</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 4;
        let edgesList = [[0,1], [1,2], [2,0], [1,3]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample(4, '[[0,1], [1,2], [2,0], [1,3]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is an integer and edges is a valid 2D array.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 225;
            const cy = 240;
            const radius = 150;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        // Hidden Tarjan's implementation to compute SCCs natively
        function computeSCCs() {
            let adj = Array.from({length: V_count}, () => []);
            for(let [u,v] of edgesList) adj[u].push(v);

            let index = 0;
            let stack = [];
            let indices = new Array(V_count).fill(-1);
            let lowlink = new Array(V_count).fill(-1);
            let onStack = new Array(V_count).fill(false);
            let sccs = [];
            let sccMap = new Array(V_count).fill(-1);

            function strongconnect(v) {
                indices[v] = index;
                lowlink[v] = index;
                index++;
                stack.push(v);
                onStack[v] = true;

                for (let w of adj[v]) {
                    if (indices[w] === -1) {
                        strongconnect(w);
                        lowlink[v] = Math.min(lowlink[v], lowlink[w]);
                    } else if (onStack[w]) {
                        lowlink[v] = Math.min(lowlink[v], indices[w]);
                    }
                }

                if (lowlink[v] === indices[v]) {
                    let scc = [];
                    let w;
                    do {
                        w = stack.pop();
                        onStack[w] = false;
                        scc.push(w);
                        sccMap[w] = sccs.length;
                    } while (w !== v);
                    sccs.push(scc.sort((a,b)=>a-b));
                }
            }

            for(let i=0; i<V_count; i++) {
                if(indices[i] === -1) strongconnect(i);
            }
            return { sccs, sccMap };
        }

        function generateSteps() {
            steps = [];
            let { sccs, sccMap } = computeSCCs();
            
            let sccEdgesSet = new Set();
            let sccEdgesList = [];
            let processedEdges = new Set();

            steps.push({
                type: 'init', sccs: [], sccMap: new Array(V_count).fill(-1), condEdges: [], processedEdges: new Set(),
                u: null, v: null, su: null, sv: null,
                panel: `<b>Condensation Graph</b><br>The goal is to compress a directed graph into a Directed Acyclic Graph (DAG) where each node represents a Strongly Connected Component (SCC).<br>We start with the original graph.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. V=${V_count}.`
            });

            steps.push({
                type: 'sccs_found', sccs: sccs, sccMap: sccMap, condEdges: [], processedEdges: new Set(),
                u: null, v: null, su: null, sv: null,
                panel: `<b>Step 1: Identify SCCs</b><br>Using Tarjan's or Kosaraju's algorithm, we group all mutually reachable vertices into Strongly Connected Components.<br>Nodes with the same color belong to the same SCC.`,
                statusText: `SCCs identified.`,
                log: `\nIdentified ${sccs.length} SCCs: ${sccs.map((s,i) => `S${i}=[${s.join(',')}]`).join(' ')}`
            });

            for (let i = 0; i < edgesList.length; i++) {
                let u = edgesList[i][0];
                let v = edgesList[i][1];
                let su = sccMap[u];
                let sv = sccMap[v];
                
                processedEdges.add(`${u}->${v}`);

                steps.push({
                    type: 'check_edge', sccs: sccs, sccMap: sccMap, condEdges: [...sccEdgesList], processedEdges: new Set(processedEdges),
                    u: u, v: v, su: su, sv: sv,
                    panel: `<b>Step 2: Process Edges</b><br>Evaluating edge <b>${u} ➔ ${v}</b>.<br>Node ${u} is in <b>S${su}</b>, Node ${v} is in <b>S${sv}</b>.`,
                    statusText: `Evaluating edge ${u}➔${v}...`,
                    log: `\nEvaluating edge ${u}->${v}...`
                });

                if (su === sv) {
                    steps.push({
                        type: 'internal_edge', sccs: sccs, sccMap: sccMap, condEdges: [...sccEdgesList], processedEdges: new Set(processedEdges),
                        u: u, v: v, su: su, sv: sv,
                        panel: `Both nodes belong to the same component <b>S${su}</b>.<br>This is an <b style="color:var(--text-dim)">Internal Edge</b>. It is absorbed during condensation. Skip.`,
                        statusText: `Internal edge. Skipped.`,
                        log: `  -> Both in S${su}. Internal edge ignored.`
                    });
                } else {
                    let eKey = `${su}->${sv}`;
                    if (!sccEdgesSet.has(eKey)) {
                        sccEdgesSet.add(eKey);
                        sccEdgesList.push([su, sv]);
                        
                        steps.push({
                            type: 'add_cond_edge', sccs: sccs, sccMap: sccMap, condEdges: [...sccEdgesList], processedEdges: new Set(processedEdges),
                            u: u, v: v, su: su, sv: sv, pushedEdge: eKey,
                            panel: `Nodes belong to different components (<b>S${su}</b> and <b>S${sv}</b>).<br>This is a <b style="color:var(--accent-green)">Cross-SCC Edge</b>. We add an edge <b>S${su} ➔ S${sv}</b> to the Condensation Graph.`,
                            statusText: `Added condensation edge S${su}➔S${sv}.`,
                            log: `  -> Cross-edge. Added S${su}->S${sv} to Condensation Graph.`,
                            logColor: 'var(--accent-green)'
                        });
                    } else {
                        steps.push({
                            type: 'duplicate_cond_edge', sccs: sccs, sccMap: sccMap, condEdges: [...sccEdgesList], processedEdges: new Set(processedEdges),
                            u: u, v: v, su: su, sv: sv,
                            panel: `Nodes belong to different components (<b>S${su}</b> and <b>S${sv}</b>).<br>However, the edge <b>S${su} ➔ S${sv}</b> <b style="color:var(--accent-red)">already exists</b> in the Condensation Graph. Skip.`,
                            statusText: `Duplicate condensation edge. Skipped.`,
                            log: `  -> Cross-edge S${su}->S${sv} already exists. Skipped.`
                        });
                    }
                }
            }

            let resultStr = `Nodes: [${sccs.map((s,i)=>`S${i}`).join(', ')}], Edges: [${sccEdgesList.map(e=>`S${e[0]}->S${e[1]}`).join(', ')}]`;

            steps.push({
                type: 'final', sccs: sccs, sccMap: sccMap, condEdges: [...sccEdgesList], processedEdges: new Set(processedEdges),
                u: null, v: null, su: null, sv: null,
                panel: `<b>Algorithm Complete!</b><br>All edges processed. The original graph has been successfully reduced to its Condensation Graph (a DAG).`,
                complete: true, result: resultStr,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Condensation Graph: ${resultStr}`,
                logColor: 'var(--accent-blue)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawn = new Set();

            edgesList.forEach(e => {
                const u = e[0];
                const v = e[1];
                
                let key = `${u}->${v}`;
                if (drawn.has(key)) return;
                drawn.add(key);

                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.u === u && step.v === v;
                let isProcessed = step.processedEdges && step.processedEdges.has(key);
                let isInternal = step.sccMap[u] !== -1 && step.sccMap[u] === step.sccMap[v];
                let isCond = step.sccMap[u] !== -1 && step.sccMap[u] !== step.sccMap[v];

                let hasReverse = edgesList.some(re => re[0]===v && re[1]===u);
                let dStr = "";
                
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrink = nodeRadius + 2; 

                if (hasReverse) {
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const nx = -dy / len;
                    const ny = dx / len;
                    const curveOffset = 20; 
                    const cx = midX + nx * curveOffset;
                    const cy = midY + ny * curveOffset;
                    
                    const x1 = p1.x + (dx/len)*shrink; 
                    const y1 = p1.y + (dy/len)*shrink;
                    const x2 = p2.x - (dx/len)*shrink; 
                    const y2 = p2.y - (dy/len)*shrink;
                    dStr = `M ${x1},${y1} Q ${cx},${cy} ${x2},${y2}`;
                } else {
                    const x1 = p1.x + (dx/len)*shrink; 
                    const y1 = p1.y + (dy/len)*shrink;
                    const x2 = p2.x - (dx/len)*shrink; 
                    const y2 = p2.y - (dy/len)*shrink;
                    dStr = `M ${x1},${y1} L ${x2},${y2}`;
                }

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', dStr);
                path.setAttribute('fill', 'transparent');

                if (isChecking) {
                    path.setAttribute('stroke', 'var(--accent-purple)');
                    path.setAttribute('stroke-width', '4');
                    path.setAttribute('marker-end', 'url(#arrow-active)');
                    path.classList.add('line-anim');
                    path.setAttribute('stroke-dasharray', '8');
                    setTimeout(() => svg.appendChild(path), 0);
                } else if (isProcessed && isInternal) {
                    path.setAttribute('stroke', 'var(--border-main)');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('opacity', '0.3');
                    path.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(path);
                } else if (isProcessed && isCond) {
                    path.setAttribute('stroke', 'var(--accent-green)');
                    path.setAttribute('stroke-width', '3');
                    path.setAttribute('marker-end', 'url(#arrow-cond)');
                    svg.appendChild(path);
                } else {
                    path.setAttribute('stroke', 'var(--border-main)');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(path);
                }
            });
        }

        function renderSCCs(step) {
            const container = document.getElementById('scc-tiles');
            container.innerHTML = '';
            
            if (step.sccs.length === 0) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ pending }</span>';
                return;
            }

            step.sccs.forEach((scc, index) => {
                const cIdx = index % 7;
                const tile = document.createElement('div');
                tile.className = `tile scc-tile`;
                tile.style.borderColor = `var(--scc-${cIdx})`;
                tile.style.boxShadow = `0 0 5px var(--scc-${cIdx})`;
                
                tile.innerHTML = `<div class="scc-title" style="color:var(--scc-${cIdx})">S${index}</div><div class="scc-nodes">[${scc.join(',')}]</div>`;
                container.appendChild(tile);
            });
        }

        function renderCondEdges(step) {
            const container = document.getElementById('edge-tiles');
            container.innerHTML = '';
            
            if (step.condEdges.length === 0 && step.type !== 'init') {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">[ none ]</span>';
                return;
            } else if (step.type === 'init') {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ pending }</span>';
                return;
            }

            step.condEdges.forEach(e => {
                const tile = document.createElement('div');
                tile.className = `tile edge-tile`;
                
                let eStr = `S${e[0]}➔S${e[1]}`;
                if (step.pushedEdge === eStr) {
                    tile.classList.add('pushing');
                }
                
                tile.innerText = eStr;
                container.appendChild(tile);
            });

            if (step.type === 'duplicate_cond_edge') {
                const dupTile = document.createElement('div');
                dupTile.className = `tile dup-tile popping`;
                dupTile.innerText = `S${step.su}➔S${step.sv}`;
                container.appendChild(dupTile);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (step.sccMap[i] !== -1) {
                    let cIdx = step.sccMap[i] % 7;
                    el.classList.add(`scc-node-${cIdx}`);
                }
                
                if (step.u === i && !step.complete) el.classList.add('active-u');
                if (step.v === i && !step.complete) el.classList.add('active-v');
            }

            drawEdges(step);
            renderSCCs(step);
            renderCondEdges(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-edge').innerText = (step.u !== null && step.v !== null) ? `${step.u} ➔ ${step.v}` : '—';
            document.getElementById('val-su').innerText = step.su !== null ? `S${step.su}` : '—';
            document.getElementById('val-sv').innerText = step.sv !== null ? `S${step.sv}` : '—';

            let typeStr = '—';
            if (step.type === 'internal_edge') typeStr = 'Internal (Ignored)';
            if (step.type === 'add_cond_edge') typeStr = 'Cross-SCC (Added)';
            if (step.type === 'duplicate_cond_edge') typeStr = 'Cross-SCC (Duplicate)';
            document.getElementById('val-type').innerText = typeStr;
            
            if(step.type === 'internal_edge') document.getElementById('val-type').style.color = 'var(--text-dim)';
            else if(step.type === 'add_cond_edge') document.getElementById('val-type').style.color = 'var(--accent-green)';
            else if(step.type === 'duplicate_cond_edge') document.getElementById('val-type').style.color = 'var(--accent-red)';
            else document.getElementById('val-type').style.color = 'var(--text-main)';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
