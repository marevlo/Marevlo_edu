<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Condensation Graph &middot; SCC DAG</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
  --scc-0:#06b6d4; --scc-1:#a855f7; --scc-2:#f5a524; --scc-3:#22c55e; --scc-4:#f85149; --scc-5:#ec4899; --scc-6:#38bdf8;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:300px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px; position:relative;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:420px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto; position:relative;}
svg.graph{display:block; width:430px; max-width:100%; height:auto;}
.phase-tag{position:absolute; top:8px; left:12px; font-family:var(--mono); font-size:11px; font-weight:700;
  color:var(--text-dim); background:rgba(255,255,255,.04); border:1px solid var(--border-main); padding:3px 10px; border-radius:999px;}

.edge{stroke:var(--border-main); stroke-width:2; fill:none; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.internal{stroke:var(--border-main); opacity:.28;}
.edge.cross{stroke:var(--accent-green); stroke-width:3; filter:drop-shadow(0 0 5px rgba(34,197,94,.5));}
.edge.checking{stroke:var(--accent-purple); stroke-width:4; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:8; animation:dash 1s linear infinite;}
.edge.dagedge{stroke:var(--accent-green); stroke-width:3; filter:drop-shadow(0 0 6px rgba(34,197,94,.5));}

.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s, stroke-width .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode.activeu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.65)); stroke-width:3;}
.gnode.activeu .nl{fill:#ffd591;}
.gnode.activev .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 12px rgba(168,85,247,.6)); stroke-width:3;}
.gnode.activev .nl{fill:#e9d5ff;}

.snode .sc{fill:rgba(255,255,255,.04); stroke:var(--border-main); stroke-width:2.5; transition:fill .35s, stroke .35s, filter .35s;}
.snode .sl{font-family:var(--mono); font-weight:800; font-size:15px; text-anchor:middle; dominant-baseline:central;}
.snode .smembers{font-family:var(--mono); font-size:11px; text-anchor:middle; dominant-baseline:central; fill:var(--text-dim);}

.side{display:flex; flex-direction:column; gap:12px; min-width:230px; flex:1 1 230px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel.scc .cap{color:var(--accent-blue);} .panel.ce .cap{color:var(--accent-green);}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start;}
.tile{min-width:34px; height:34px; padding:0 9px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:13px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.tile.scc-tile{flex-direction:column; height:auto; padding:6px 9px; align-items:center; gap:2px;}
.tile.scc-tile .stt{font-size:10px; font-weight:700;}
.tile.scc-tile .smm{font-size:13px;}
.tile.edge-tile{border-color:rgba(34,197,94,.45); background:rgba(34,197,94,.10); color:#bbf7d0;}
.tile.dup-tile{border-color:rgba(248,81,73,.45); background:rgba(248,81,73,.10); color:#ffb4ae;}
.tiles .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.e b{color:var(--accent-purple);} .pill.su b{color:var(--accent-orange);} .pill.t b{color:var(--accent-green);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-16;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 240px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>V =</label>
  <input type="text" id="v-input" class="small-input" value="4">
  <label>edges =</label>
  <input type="text" id="e-input" class="large-input" value="[[0,1],[1,2],[2,0],[1,3]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick='loadExample(4,"[[0,1],[1,2],[2,0],[1,3]]")'>Ex 1</button>
  <button onclick='loadExample(5,"[[0,1],[1,2],[2,0],[1,3],[3,4],[4,3]]")'>Ex 2</button>
  <button onclick='loadExample(3,"[[0,1],[1,2],[2,0],[0,2]]")'>Ex 3</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Condensation Graph <span class="sub">&middot; collapse SCCs into a DAG</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap">
        <span class="phase-tag" id="phase-tag">Original directed graph</span>
        <svg class="graph" id="graph" viewBox="0 0 430 460"></svg>
      </div>
      <div class="side">
        <div class="panel scc"><div class="cap">IDENTIFIED SCCs</div><div class="tiles" id="scc-tiles"></div></div>
        <div class="panel ce"><div class="cap">CONDENSATION EDGES (DAG)</div><div class="tiles" id="edge-tiles"></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8634; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill e">edge <b id="pill-e">&mdash;</b></span>
        <span class="pill su">SCC(u)&#8594;SCC(v) <b id="pill-su">&mdash;</b></span>
        <span class="pill t">cond edges <b id="pill-cnt">0</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>node u</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>node v</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>cross-SCC</span>
          <span class="li"><span class="dot" style="background:var(--border-main)"></span>internal</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','condensation'],['src','(V, edges):']],
  [['src','  scc, sccMap = tarjanSCC(V, edges)']],
  [['src','  condEdges = set()']],
  [['kw','  for'],['src',' (u, v) '],['kw','in'],['src',' edges:']],
  [['kw','    if'],['src',' sccMap[u] == sccMap[v]: ']],
  [['kw','      continue'],['src','   # internal edge']],
  [['src','    condEdges.add( (sccMap[u], sccMap[v]) )']],
  [['kw','  return'],['src',' scc, condEdges   # a DAG']],
];

let V_count=4, edgesList=[[0,1],[1,2],[2,0],[1,3]];
let coord={}, sccColorOf=[];
let sccData={sccs:[],sccMap:[]};
let steps=[], stepIndex=0, timer=null;
const delays=[2200,1100,560];
const gnodes={}, snodes={};
let confettiArmed=true;

function init(){ buildCode(); loadExample(4,"[[0,1],[1,2],[2,0],[1,3]]"); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(v,eStr){ document.getElementById('v-input').value=v; document.getElementById('e-input').value=eStr; parseAndGen(); }
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    V_count=parseInt(document.getElementById('v-input').value,10);
    edgesList=JSON.parse(document.getElementById('e-input').value.replace(/\(/g,'[').replace(/\)/g,']'));
    if(isNaN(V_count)||!Array.isArray(edgesList)) throw 'bad';
    sccData=computeSCCs();
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid format. V must be an integer and edges a valid 2D array.'); }
}

// Tarjan's SCC -> {sccs (sorted member lists), sccMap (vertex -> scc index)}
function computeSCCs(){
  const adj=Array.from({length:V_count},()=>[]);
  for(const [u,v] of edgesList){ if(u<V_count&&v<V_count) adj[u].push(v); }
  let index=0; const stack=[]; const indices=new Array(V_count).fill(-1);
  const low=new Array(V_count).fill(-1); const on=new Array(V_count).fill(false);
  const sccs=[]; const sccMap=new Array(V_count).fill(-1);
  function strongconnect(v){
    indices[v]=index; low[v]=index; index++; stack.push(v); on[v]=true;
    for(const w of adj[v]){
      if(indices[w]===-1){ strongconnect(w); low[v]=Math.min(low[v],low[w]); }
      else if(on[w]){ low[v]=Math.min(low[v],indices[w]); }
    }
    if(low[v]===indices[v]){
      const scc=[]; let w;
      do{ w=stack.pop(); on[w]=false; scc.push(w); sccMap[w]=sccs.length; }while(w!==v);
      sccs.push(scc.sort((a,b)=>a-b));
    }
  }
  for(let i=0;i<V_count;i++){ if(indices[i]===-1) strongconnect(i); }
  return {sccs, sccMap};
}

function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; coord={};
  for(const k in gnodes) delete gnodes[k]; for(const k in snodes) delete snodes[k];
  // arrowhead marker defs
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  function mk(id,color){
    const m=document.createElementNS('http://www.w3.org/2000/svg','marker');
    m.setAttribute('id',id); m.setAttribute('viewBox','0 0 10 10'); m.setAttribute('refX','9'); m.setAttribute('refY','5');
    m.setAttribute('markerWidth','6'); m.setAttribute('markerHeight','6'); m.setAttribute('orient','auto-start-reverse');
    const p=document.createElementNS('http://www.w3.org/2000/svg','path'); p.setAttribute('d','M 0 0 L 10 5 L 0 10 z'); p.setAttribute('fill',color);
    m.appendChild(p); return m;
  }
  defs.appendChild(mk('ah-normal','rgba(255,255,255,.45)'));
  defs.appendChild(mk('ah-internal','rgba(255,255,255,.30)'));
  defs.appendChild(mk('ah-cross','#22c55e'));
  defs.appendChild(mk('ah-active','#a855f7'));
  svg.appendChild(defs);

  // ---- ORIGINAL GRAPH layout (top region) : circle of V nodes ----
  const cx=215, cy=170, R=Math.min(135, 60+V_count*10);
  for(let i=0;i<V_count;i++){
    const ang=(Math.PI*2*i)/V_count - Math.PI/2;
    coord[i]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)};
  }
  // edges group (original) - one path per directed edge (dedup identical u->v)
  const eg=document.createElementNS('http://www.w3.org/2000/svg','g'); eg.id='edge-group'; svg.appendChild(eg);
  const drawn=new Set(); const r=20;
  edgesList.forEach((e)=>{
    const u=e[0], v=e[1]; if(u>=V_count||v>=V_count) return;
    const key=u+'->'+v; if(drawn.has(key)) return; drawn.add(key);
    const p1=coord[u], p2=coord[v]; if(!p1||!p2) return;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','edge'); path.id='ed_'+u+'_'+v;
    path.dataset.u=u; path.dataset.v=v; eg.appendChild(path);
  });
  positionEdges(r);

  // nodes (original) on top
  for(let i=0;i<V_count;i++){
    const p=coord[i];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode'); g.id='gn'+i;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',r);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=i;
    g.appendChild(c); g.appendChild(t); svg.appendChild(g); gnodes[i]=g;
  }

  // ---- CONDENSATION DAG layout (bottom region) : super-nodes in a row ----
  buildSuperNodes(svg);
}

function positionEdges(r){
  const has=(a,b)=>edgesList.some(e=>e[0]===a&&e[1]===b);
  document.querySelectorAll('#edge-group .edge').forEach(path=>{
    const u=+path.dataset.u, v=+path.dataset.v;
    const p1=coord[u], p2=coord[v]; if(!p1||!p2) return;
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1; const shrink=r+3;
    const x1=p1.x+(dx/len)*shrink, y1=p1.y+(dy/len)*shrink;
    const x2=p2.x-(dx/len)*shrink, y2=p2.y-(dy/len)*shrink;
    if(has(v,u)){ // curve to separate the two anti-parallel arcs
      const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2; const nx=-dy/len, ny=dx/len; const off=22;
      path.setAttribute('d',`M ${x1},${y1} Q ${mx+nx*off},${my+ny*off} ${x2},${y2}`);
    } else {
      path.setAttribute('d',`M ${x1},${y1} L ${x2},${y2}`);
    }
  });
}

function buildSuperNodes(svg){
  const sccs=sccData.sccs; const n=sccs.length;
  const baseY=370; const r=30;
  const usableW=390; const gap=n>1?usableW/(n-1):0; const startX=n>1?20:215;
  scoord={};
  for(let i=0;i<n;i++){
    const x=n>1?(startX+gap*i):215; const y=baseY;
    scoord[i]={x,y};
  }
  // super-edges group (DAG) - hidden until final phase
  const seg=document.createElementNS('http://www.w3.org/2000/svg','g'); seg.id='super-edge-group'; svg.appendChild(seg);
  // super nodes
  for(let i=0;i<n;i++){
    const p=scoord[i];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','snode'); g.id='sn'+i;
    g.style.opacity='0'; g.style.transition='opacity .4s ease';
    const col=`var(--scc-${i%7})`;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','sc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',r);
    c.style.stroke=col; c.style.fill=`color-mix(in srgb, ${col} 14%, transparent)`; c.style.filter=`drop-shadow(0 0 8px color-mix(in srgb, ${col} 45%, transparent))`;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','sl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y-5); t.textContent='S'+i; t.style.fill=col;
    const m=document.createElementNS('http://www.w3.org/2000/svg','text'); m.setAttribute('class','smembers'); m.setAttribute('x',p.x); m.setAttribute('y',p.y+12); m.textContent='{'+sccs[i].join(',')+'}';
    g.appendChild(c); g.appendChild(t); g.appendChild(m); svg.appendChild(g); snodes[i]=g;
  }
}
let scoord={};

function generateSteps(){
  steps=[];
  const {sccs, sccMap}=sccData;
  const condSet=new Set(); const condList=[]; const processed=new Set();

  function snap(o){
    steps.push({
      phase:o.phase, sccsShown:o.sccsShown, condEdges:condList.map(e=>[...e]),
      processed:new Set(processed),
      u:o.u??null, v:o.v??null, su:o.su??null, sv:o.sv??null,
      pushedEdge:o.pushedEdge??null, dup:o.dup??false, internal:o.internal??false,
      code:o.code, narr:o.narr, log:o.log, logColor:o.logColor??null,
      result:o.result??null, complete:o.complete??false
    });
  }

  snap({phase:'original', sccsShown:false, code:[0],
    narr:`Goal: compress this <b>directed graph</b> into a <b>DAG</b> &mdash; each super-node is one strongly-connected component (SCC).`,
    log:`init: V=${V_count}, edges=${edgesList.length}`});

  snap({phase:'colored', sccsShown:true, code:[1],
    narr:`Run <b>Tarjan</b> to find SCCs. Found <code>${sccs.length}</code> component${sccs.length===1?'':'s'} &mdash; each color is one SCC.`,
    log:`SCCs: ${sccs.map((s,i)=>`S${i}={${s.join(',')}}`).join('  ')}`, logColor:'var(--accent-blue)'});

  for(let i=0;i<edgesList.length;i++){
    const u=edgesList[i][0], v=edgesList[i][1];
    if(u>=V_count||v>=V_count) continue;
    const su=sccMap[u], sv=sccMap[v];
    processed.add(u+'->'+v);
    snap({phase:'colored', sccsShown:true, code:[3], u, v, su, sv,
      narr:`Process edge <code>${u}&#8594;${v}</code>. <code>${u}</code>&isin;<b>S${su}</b>, <code>${v}</code>&isin;<b>S${sv}</b>.`,
      log:`edge ${u}->${v}: S${su} ? S${sv}`});
    if(su===sv){
      snap({phase:'colored', sccsShown:true, code:[4,5], u, v, su, sv, internal:true,
        narr:`Both ends in <b>S${su}</b> &rarr; <b>internal edge</b>, absorbed by condensation. <b>Skip.</b>`,
        log:`  internal (both in S${su}) -> skip`});
    } else {
      const eKey=su+'->'+sv;
      if(!condSet.has(eKey)){
        condSet.add(eKey); condList.push([su,sv]);
        snap({phase:'colored', sccsShown:true, code:[6], u, v, su, sv, pushedEdge:eKey,
          narr:`Different components &rarr; <b style="color:#7ee787">cross-SCC edge</b>. Add <code>S${su}&#8594;S${sv}</code> to the DAG.`,
          log:`  cross-SCC -> add S${su}->S${sv}`, logColor:'var(--accent-green)'});
      } else {
        snap({phase:'colored', sccsShown:true, code:[6], u, v, su, sv, dup:true,
          narr:`Cross-SCC, but <code>S${su}&#8594;S${sv}</code> <b style="color:#ffb4ae">already in the set</b> &rarr; duplicate. <b>Skip.</b>`,
          log:`  cross-SCC S${su}->S${sv} already present -> skip`});
      }
    }
  }

  const resultStr=`nodes=[${sccs.map((s,i)=>`S${i}`).join(', ')}]  edges=[${condList.map(e=>`S${e[0]}->S${e[1]}`).join(', ')||'none'}]`;
  snap({phase:'dag', sccsShown:true, code:[7],
    narr:`<b>Done.</b> Collapse each SCC into a super-node &rarr; the <b>condensation DAG</b>: <code>${condList.map(e=>`S${e[0]}&#8594;S${e[1]}`).join(', ')||'no edges'}</code>.`,
    log:`condensation DAG: ${resultStr}`, logColor:'var(--accent-blue)', result:resultStr, complete:true});
}

function positionSuperEdges(){
  const seg=document.getElementById('super-edge-group'); if(!seg) return; seg.innerHTML='';
  const last=steps[steps.length-1]; if(!last) return;
  const r=30;
  last.condEdges.forEach(([a,b])=>{
    const p1=scoord[a], p2=scoord[b]; if(!p1||!p2) return;
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1; const shrink=r+4;
    const x1=p1.x+(dx/len)*shrink, y1=p1.y+(dy/len)*shrink;
    const x2=p2.x-(dx/len)*shrink, y2=p2.y-(dy/len)*shrink;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','edge dagedge'); path.setAttribute('marker-end','url(#ah-cross)');
    // arc up so parallel super-edges stay visible
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2; const nx=-dy/len, ny=dx/len; const off=34;
    path.setAttribute('d',`M ${x1},${y1} Q ${mx+nx*off},${my+ny*off} ${x2},${y2}`);
    path.style.opacity='0'; path.style.transition='opacity .4s ease';
    seg.appendChild(path);
    requestAnimationFrame(()=>{ path.style.opacity='1'; });
  });
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;

  // phase tag
  const pt=document.getElementById('phase-tag');
  pt.textContent = step.phase==='dag' ? 'Condensation DAG (super-nodes)' :
                   step.phase==='colored' ? 'Original graph, colored by SCC' : 'Original directed graph';

  // original nodes: color by scc + active highlight
  for(let i=0;i<V_count;i++){
    const g=gnodes[i]; if(!g) return; g.classList.remove('activeu','activev');
    const c=g.querySelector('.nc');
    if(step.sccsShown && sccData.sccMap[i]!==-1){
      const col=`var(--scc-${sccData.sccMap[i]%7})`;
      c.style.stroke=col; c.style.fill=`color-mix(in srgb, ${col} 13%, transparent)`;
      c.style.filter=`drop-shadow(0 0 6px color-mix(in srgb, ${col} 45%, transparent))`;
      g.querySelector('.nl').style.fill=col;
    } else {
      c.style.stroke=''; c.style.fill=''; c.style.filter=''; g.querySelector('.nl').style.fill='';
    }
    if(!step.complete && step.u===i) g.classList.add('activeu');
    if(!step.complete && step.v===i) g.classList.add('activev');
  }
  // dim original graph + nodes when in DAG phase
  const eg=document.getElementById('edge-group');
  const dagPhase = step.phase==='dag';
  for(let i=0;i<V_count;i++){ if(gnodes[i]) gnodes[i].style.opacity = dagPhase?0.16:1; }
  if(eg) eg.style.opacity = dagPhase?0.12:1;

  // original edges classes + markers
  document.querySelectorAll('#edge-group .edge').forEach(path=>{
    const u=+path.dataset.u, v=+path.dataset.v;
    path.classList.remove('internal','cross','checking');
    const su=sccData.sccMap[u], sv=sccData.sccMap[v];
    const checking = !step.complete && step.u===u && step.v===v && step.phase!=='dag';
    const proc = step.processed.has(u+'->'+v);
    if(checking){ path.classList.add('checking'); path.setAttribute('marker-end','url(#ah-active)'); }
    else if(step.sccsShown && su!==-1 && su===sv){ path.classList.add('internal'); path.setAttribute('marker-end','url(#ah-internal)'); }
    else if(step.sccsShown && su!==-1 && su!==sv && proc){ path.classList.add('cross'); path.setAttribute('marker-end','url(#ah-cross)'); }
    else { path.setAttribute('marker-end','url(#ah-normal)'); }
  });

  // super nodes visibility
  const showSuper = dagPhase;
  for(const k in snodes){ snodes[k].style.opacity = showSuper?1:0; }
  if(showSuper){ positionSuperEdges(); for(const k in snodes){ const c=snodes[k].querySelector('.sc'); if(c) Motion.pop(c); } }
  else { const seg=document.getElementById('super-edge-group'); if(seg) seg.innerHTML=''; }

  // side panels
  renderSCCs(step); renderCondEdges(step);

  // narration
  const narr=document.getElementById('narration'); narr.innerHTML=step.narr; narr.classList.toggle('done',!!step.complete);
  // code
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });
  // pills
  document.getElementById('pill-e').textContent = (step.u!=null&&step.v!=null)?`${step.u}→${step.v}`:'—';
  document.getElementById('pill-su').textContent = (step.su!=null&&step.sv!=null)?`S${step.su}→S${step.sv}`:'—';
  document.getElementById('pill-cnt').textContent = step.condEdges.length;
  // progress + badge
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;
  // log
  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].logColor) d.style.color=steps[k].logColor; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function renderSCCs(step){
  const c=document.getElementById('scc-tiles'); c.innerHTML='';
  if(!step.sccsShown || sccData.sccs.length===0){
    const e=document.createElement('span'); e.className='empty'; e.textContent='{ pending }'; c.appendChild(e); return;
  }
  sccData.sccs.forEach((scc,i)=>{
    const col=`var(--scc-${i%7})`;
    const t=document.createElement('div'); t.className='tile scc-tile';
    t.style.borderColor=col; t.style.boxShadow=`0 0 6px color-mix(in srgb, ${col} 50%, transparent)`;
    t.innerHTML=`<div class="stt" style="color:${col}">S${i}</div><div class="smm">{${scc.join(',')}}</div>`;
    c.appendChild(t);
  });
}

function renderCondEdges(step){
  const c=document.getElementById('edge-tiles'); c.innerHTML='';
  if(!step.sccsShown){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ pending }'; c.appendChild(e); return; }
  if(step.condEdges.length===0 && !step.dup){ const e=document.createElement('span'); e.className='empty'; e.textContent='[ none yet ]'; c.appendChild(e); return; }
  step.condEdges.forEach(([a,b])=>{
    const t=document.createElement('div'); t.className='tile edge-tile';
    const eStr=`S${a}→S${b}`;
    if(step.pushedEdge===a+'->'+b) Motion.pop(t);
    t.textContent=eStr; c.appendChild(t);
  });
  if(step.dup){
    const t=document.createElement('div'); t.className='tile dup-tile';
    t.textContent=`S${step.su}→S${step.sv}`; c.appendChild(t);
  }
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
</body>
</html>
