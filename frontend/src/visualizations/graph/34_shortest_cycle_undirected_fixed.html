<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortest Cycle Undirected (BFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 380px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.source-node { border-color: var(--accent-blue); box-shadow: 0 0 12px rgba(56,139,253,0.4); color: var(--accent-blue); background: rgba(56,139,253,0.1); }
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 3; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 2; color: var(--accent-purple); }
        .node.visited { border-color: var(--accent-green); color: var(--accent-green); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 100px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.dist-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.q-tile { background: #1a150b; border-color: var(--accent-orange); color: var(--accent-orange); }
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes highlightFlash { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.5); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); filter: brightness(1); } }
        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center; word-break: break-all;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 15px var(--accent-red); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1.1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="4">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1], [1,2], [2,3], [3,0], [1,3]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(4, '[[0,1], [1,2], [2,3], [3,0], [1,3]]')">Ex 1</button>
        <button onclick="loadExample(4, '[[0,1], [1,2], [2,3]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">Distance Array (from Source):</div>
                <div class="tiles-wrapper" id="dist-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">For current BFS source.</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">BFS Queue:</div>
                <div class="tiles-wrapper" id="q-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">BFS Source</span>
            <span class="info-value" id="val-src" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Active Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Shortest Cycle Formula</span>
            <span class="info-value" id="val-eq" style="color: var(--text-main); font-size:13px;">dist[u] + dist[v] + 1</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">global shortest cycle length =</span>
        <span id="res-val">∞</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-blue); border-width:2px;"></span> BFS Source Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Dequeued Node (u)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Neighbor (v)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-red); border-width:3px;"></span> Cycle Found!</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 4;
        let edgesList = [[0,1], [1,2], [2,3], [3,0], [1,3]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];
        const INF = Infinity;

        function init() { loadExample(4, '[[0,1], [1,2], [2,3], [3,0], [1,3]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is an integer and edges is a valid array of [u, v].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            const cx = 225;
            const cy = 190;
            const radius = 130;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function formatDist(val) { return val === INF ? '∞' : val; }

        function generateSteps() {
            steps = [];
            
            let adj = Array.from({length: V_count}, () => []);
            for (let [u,v] of edgesList) {
                adj[u].push(v);
                adj[v].push(u);
            }

            let minCycle = INF;

            steps.push({
                type: 'init', dist: new Array(V_count).fill(INF), q: [], minCycle: minCycle,
                src: null, u: null, v: null, updatedIdx: null, cycleEdge: null,
                panel: `<b>Shortest Cycle in Undirected Graph</b><br>To find the globally shortest cycle, we run a Breadth-First Search (BFS) starting from <b>every</b> node. Minimum cycle length starts at ∞.`,
                statusText: `Initialization complete.`,
                log: `Initialized graph. Ready to run BFS from all nodes.`
            });

            for (let i = 0; i < V_count; i++) {
                let dist = new Array(V_count).fill(INF);
                let parent = new Array(V_count).fill(-1);
                let q = [i];
                dist[i] = 0;

                steps.push({
                    type: 'start_bfs', dist: [...dist], q: [...q], minCycle: minCycle,
                    src: i, u: null, v: null, updatedIdx: i, cycleEdge: null,
                    panel: `<b>BFS from Source ${i}</b><br>Set <code>dist[${i}] = 0</code> and push to Queue.`,
                    statusText: `Starting BFS from Node ${i}...`,
                    log: `\n--- Starting BFS from Source ${i} ---`
                });

                while (q.length > 0) {
                    let u = q.shift();

                    steps.push({
                        type: 'dequeue', dist: [...dist], q: [...q], minCycle: minCycle,
                        src: i, u: u, v: null, updatedIdx: null, cycleEdge: null, poppedItem: u,
                        panel: `<b>Dequeue:</b> Active Node is <b>${u}</b> at distance <b>${dist[u]}</b> from source.<br>Checking neighbors...`,
                        statusText: `Exploring Node ${u}...`,
                        log: `Dequeued ${u}. dist[${u}]=${dist[u]}`
                    });

                    for (let v of adj[u]) {
                        steps.push({
                            type: 'check_neighbor', dist: [...dist], q: [...q], minCycle: minCycle,
                            src: i, u: u, v: v, updatedIdx: null, cycleEdge: null,
                            panel: `Evaluating edge <b>${u} — ${v}</b>.`,
                            statusText: `Checking edge ${u}-${v}...`,
                            log: `  Checking neighbor ${v}...`
                        });

                        if (dist[v] === INF) {
                            dist[v] = dist[u] + 1;
                            parent[v] = u;
                            q.push(v);
                            
                            steps.push({
                                type: 'tree_edge', dist: [...dist], q: [...q], minCycle: minCycle,
                                src: i, u: u, v: v, updatedIdx: v, cycleEdge: null, pushedItem: v,
                                panel: `Node <b>${v}</b> is <b style="color:var(--accent-green)">unvisited</b> (dist = ∞).<br>Set <code>dist[${v}] = dist[${u}] + 1 = <b>${dist[v]}</b></code> and enqueue it.`,
                                statusText: `Discovered unvisited node ${v}.`,
                                log: `    -> Unvisited. dist[${v}]=${dist[v]}, parent=${u}. Enqueued.`
                            });
                        } else if (parent[u] !== v) {
                            // Cycle detected!
                            let cycleLen = dist[u] + dist[v] + 1;
                            let isNewMin = cycleLen < minCycle;
                            
                            if (isNewMin) {
                                minCycle = cycleLen;
                            }

                            steps.push({
                                type: 'cycle_edge', dist: [...dist], q: [...q], minCycle: minCycle,
                                src: i, u: u, v: v, updatedIdx: null, cycleEdge: [u, v], isNewMin: isNewMin,
                                panel: `Node <b>${v}</b> is already visited and is NOT the parent of <b>${u}</b>.<br><b style="color:var(--accent-red); font-size:16px;">Cycle Detected!</b> Length = <code>dist[${u}] + dist[${v}] + 1 = ${dist[u]} + ${dist[v]} + 1 = <b>${cycleLen}</b></code>.` +
                                       (isNewMin ? `<br><b style="color:var(--accent-green)">New Shortest Cycle found!</b> Updated to ${minCycle}.` : `<br>Not shorter than current minimum (${minCycle}).`),
                                statusText: `Cycle of length ${cycleLen} detected!`,
                                log: `    -> Back-edge! Cycle length = ${cycleLen}. ` + (isNewMin ? `New minimum!` : `Not minimum.`),
                                logColor: isNewMin ? 'var(--accent-red)' : ''
                            });
                        } else {
                            steps.push({
                                type: 'parent_edge', dist: [...dist], q: [...q], minCycle: minCycle,
                                src: i, u: u, v: v, updatedIdx: null, cycleEdge: null,
                                panel: `Node <b>${v}</b> is the parent of <b>${u}</b> in the BFS tree.<br>This is just the edge we came from. <b style="color:var(--text-dim)">Skip.</b>`,
                                statusText: `Skipped parent edge.`,
                                log: `    -> Parent edge. Skipped.`
                            });
                        }
                    }
                }
            }

            let finalRes = minCycle === INF ? -1 : minCycle;

            steps.push({
                type: 'final', dist: new Array(V_count).fill(INF), q: [], minCycle: minCycle,
                src: null, u: null, v: null, updatedIdx: null, cycleEdge: null,
                panel: `<b>Algorithm Complete!</b><br>We've run BFS from every node.` + 
                       (finalRes === -1 ? ` No cycles were found in the graph. Returning <b style="color:var(--accent-red)">-1</b>.` : ` The globally shortest cycle has length <b style="color:var(--accent-green); font-size:18px;">${finalRes}</b>.`),
                complete: true, result: finalRes,
                statusText: `Finished.`,
                log: `\nAlgorithm Complete. Shortest Cycle = ${finalRes}`,
                logColor: 'var(--accent-blue)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawn = new Set();

            edgesList.forEach(e => {
                const u = e[0];
                const v = e[1];
                let key = u < v ? `${u}-${v}` : `${v}-${u}`;
                if (drawn.has(key)) return;
                drawn.add(key);

                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.u !== null && step.v !== null && 
                                 ((step.u === u && step.v === v) || (step.u === v && step.v === u));

                let isCycle = step.cycleEdge && 
                              ((step.cycleEdge[0] === u && step.cycleEdge[1] === v) || 
                               (step.cycleEdge[0] === v && step.cycleEdge[1] === u));

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrink = nodeRadius + 2; 
                
                line.setAttribute('x1', p1.x + (dx/len)*shrink); 
                line.setAttribute('y1', p1.y + (dy/len)*shrink);
                line.setAttribute('x2', p2.x - (dx/len)*shrink); 
                line.setAttribute('y2', p2.y - (dy/len)*shrink);

                if (isCycle) {
                    line.setAttribute('stroke', 'var(--accent-red)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('stroke-dasharray', '8');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else if (isChecking) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('stroke-dasharray', '6');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    svg.appendChild(line);
                }
            });
        }

        function renderQueue(step) {
            const container = document.getElementById('q-tiles');
            container.innerHTML = '';
            
            if (step.q.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            if (step.poppedItem !== undefined && step.poppedItem !== null && step.type === 'dequeue') {
                const popTile = document.createElement('div');
                popTile.className = `tile q-tile popping`;
                popTile.innerText = step.poppedItem;
                container.appendChild(popTile);
            }

            step.q.forEach(val => {
                const tile = document.createElement('div');
                tile.className = `tile q-tile`;
                if (step.pushedItem === val) {
                    tile.classList.add('pushing');
                }
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderDistances(step) {
            const container = document.getElementById('dist-tiles');
            container.innerHTML = '';
            
            if (!step.dist) return;

            step.dist.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile dist-tile`;
                if (step.updatedIdx === i) {
                    tile.classList.add('highlight-update');
                }
                tile.innerText = formatDist(val);
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (step.dist && step.dist[i] !== INF) el.classList.add('visited');
                if (step.src === i) el.classList.add('source-node');
                
                if (step.u === i) el.classList.add('active-u');
                if (step.v === i) el.classList.add('active-v');
            }

            drawEdges(step);

            renderQueue(step);
            renderDistances(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-src').innerText = step.src !== null ? step.src : '—';
            document.getElementById('val-u').innerText = step.u !== null ? step.u : '—';
            document.getElementById('val-v').innerText = step.v !== null ? step.v : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.minCycle === INF ? '∞' : step.minCycle;
            
            if (step.complete || step.isNewMin) {
                resVal.className = (step.result === -1) ? 'pop-false' : 'pop';
                // trigger reflow
                resVal.style.animation = 'none';
                resVal.offsetHeight;
                resVal.style.animation = null;
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
