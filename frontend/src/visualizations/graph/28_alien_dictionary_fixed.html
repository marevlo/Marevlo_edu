<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alien Dictionary &middot; Graph</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:330px;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'▸'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'✓'; color:var(--accent-green);}
.narration.fail{border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.06);}
.narration.fail::before{content:'✕'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto;}
svg.graph{display:block; width:380px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.resolved{opacity:.22;}
.edge.checking{stroke:var(--accent-purple); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.edge.relaxing{stroke:var(--accent-orange); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(245,165,36,.6));}
.ehead path{fill:var(--border-main); transition:fill .35s;}
.ehead.checking path{fill:var(--accent-purple);}
.ehead.relaxing path{fill:var(--accent-orange);}
.ehead.resolved{opacity:.22;}
.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:16px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode .ind{font-family:var(--mono); font-weight:700; font-size:10px; fill:var(--accent-orange); text-anchor:middle; dominant-baseline:central; transition:fill .35s, opacity .35s;}
.gnode.inqueue .nc{stroke:var(--accent-blue); fill:rgba(6,182,212,.10); filter:drop-shadow(0 0 6px rgba(6,182,212,.4));}
.gnode.inqueue .nl{fill:#a5f3fc;}
.gnode.processed .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.12); filter:drop-shadow(0 0 6px rgba(34,197,94,.4));}
.gnode.processed .nl{fill:#bbf7d0;} .gnode.processed .ind{opacity:.25;}
.gnode.activeu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.gnode.activeu .nl{fill:#ffd591;}
.gnode.activev .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 12px rgba(168,85,247,.6)); stroke-width:3;}
.gnode.activev .nl{fill:#e9d5ff;}
.gnode.cycle .nc{stroke:var(--accent-red); fill:rgba(248,81,73,.16); filter:drop-shadow(0 0 10px rgba(248,81,73,.55)); stroke-width:3;}
.gnode.cycle .nl{fill:#fca5a5;} .gnode.cycle .ind{fill:#fca5a5;}

.side{display:flex; flex-direction:column; gap:12px; min-width:230px; flex:1 1 230px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel .sub{font-family:var(--mono); font-size:10px; color:var(--text-dim); margin-top:7px;}
.panel.i .cap{color:var(--accent-orange);} .panel.q .cap{color:var(--accent-blue);} .panel.r .cap{color:var(--accent-green);}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start;}
.tcol{display:flex; flex-direction:column; align-items:center; gap:3px;}
.tcol .lbl{font-family:var(--mono); font-size:10px; color:var(--text-dim);}
.tile{min-width:34px; height:34px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.tile.i{border-color:rgba(245,165,36,.45); background:rgba(245,165,36,.12); color:#ffd591;}
.tile.q{border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.12); color:#a5f3fc;}
.tile.r{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.1); color:#bbf7d0;}
.tiles .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}

.cmp-card{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.cmp-card .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px; color:var(--accent-purple);}
.cmp-words{display:flex; flex-direction:column; gap:3px; font-family:var(--mono); font-size:20px; letter-spacing:6px; font-weight:800; line-height:1.25;}
.cmp-words .cu{color:var(--accent-orange); text-shadow:0 0 8px rgba(245,165,36,.6);}
.cmp-words .cv{color:var(--accent-purple); text-shadow:0 0 8px rgba(168,85,247,.6);}
.cmp-words .cdim{color:var(--text-dim); opacity:.55;}
.cmp-words .cbad{color:var(--accent-red); text-shadow:0 0 8px rgba(248,81,73,.6);}
.cmp-empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}

#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-orange);} .pill.n b{color:var(--accent-purple);} .pill.s b{color:var(--accent-green);}
.pill.res b{color:#a5f3fc;}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>words =</label>
  <input type="text" id="w-input" class="large-input" value='["wrt","wrf","er","ett","rftt"]'>
  <button onclick="loadCustom()">Load</button>
  <button onclick='loadExample(["wrt","wrf","er","ett","rftt"])'>Ex 1</button>
  <button onclick='loadExample(["z","x","z"])'>Ex 2</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Alien Dictionary <span class="sub">&middot; topological sort of letters</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 380 360"></svg></div>
      <div class="side">
        <div class="cmp-card"><div class="cap">WORD COMPARE</div><div id="cmp-box"><span class="cmp-empty">&mdash;</span></div></div>
        <div class="panel i"><div class="cap">IN&minus;DEGREE (prerequisites)</div><div class="tiles" id="i-tiles"></div></div>
        <div class="panel q"><div class="cap">BFS QUEUE (ready letters)</div><div class="tiles" id="q-tiles"></div></div>
        <div class="panel r"><div class="cap">TOPOLOGICAL ORDER</div><div class="tiles" id="r-tiles"></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">↺ Reset</button>
    <button onclick="back()">← Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next →</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">← →</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">▾</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">before u = <b id="pill-u">—</b></span>
        <span class="pill n">after v = <b id="pill-v">—</b></span>
        <span class="pill s">placed <b id="pill-cnt">0</b></span>
        <span class="pill res">order = <b id="pill-res">—</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>active u</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>dependent v</span>
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>in queue</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>placed</span>
          <span class="li"><span class="dot" style="background:var(--accent-red)"></span>cycle</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','alienOrder'],['src','(words):']],
  [['src','  # 1. build letter graph from adjacent words']],
  [['kw','  for'],['src',' (w1, w2) '],['kw','in'],['src',' pairs(words):']],
  [['kw','    for'],['src',' (a, b) '],['kw','in'],['src',' zip(w1, w2):']],
  [['kw','      if'],['src',' a != b: addEdge(a, b); '],['kw','break']],
  [['src','  # 2. Kahn topological sort']],
  [['src','  queue = [c for c if indeg[c] == 0]']],
  [['kw','  while'],['src',' queue:']],
  [['src','    u = queue.popleft();  order += u']],
  [['kw','    for'],['src',' v '],['kw','in'],['src',' adj[u]:']],
  [['kw','      if'],['src',' --indeg[v] == 0: queue.push(v)']],
  [['kw','  return'],['src',' order '],['kw','if'],['src',' len==N '],['kw','else'],['src',' ""']],
];

let wordsList=["wrt","wrf","er","ett","rftt"];
let chars=[], edges=[], coord={};
let steps=[], stepIndex=0, timer=null;
const delays=[2000,1050,520];
const gnodes={};
let confettiArmed=true;

function init(){ buildCode(); loadExample(["wrt","wrf","er","ett","rftt"]); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(arr){ document.getElementById('w-input').value=JSON.stringify(arr); parseAndGen(); }
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    wordsList=JSON.parse(document.getElementById('w-input').value);
    if(!Array.isArray(wordsList)||wordsList.length===0||!wordsList.every(w=>typeof w==='string')) throw 0;
    const seen=new Set(); chars=[];
    for(const w of wordsList){ for(const c of w){ if(!seen.has(c)){ seen.add(c); chars.push(c); } } }
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid format. Provide a JSON array of strings, e.g. ["wrt","wrf"].'); }
}

// circular layout; build node <g> (circle + letter + indegree badge) ONCE per load
function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; coord={}; for(const k in gnodes) delete gnodes[k];
  // arrowhead markers (directed graph)
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML=
    '<marker id="ah-n" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="var(--border-main)"/></marker>'+
    '<marker id="ah-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="var(--accent-purple)"/></marker>'+
    '<marker id="ah-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="var(--accent-orange)"/></marker>';
  svg.appendChild(defs);

  const N=chars.length; const cx=190, cy=180, R=Math.min(130, 62+N*10);
  chars.forEach((id,i)=>{ const ang=(Math.PI*2*i)/N - Math.PI/2; coord[id]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)}; });

  // edges: ALL possible precedence edges discovered across the full run, drawn once, toggled per step
  const edgeLayer=document.createElementNS('http://www.w3.org/2000/svg','g');
  edgeLayer.id='edge-layer'; svg.appendChild(edgeLayer);

  // nodes on top
  chars.forEach(id=>{ const p=coord[id];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode'); g.id='gn'+id;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',21);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=id;
    const b=document.createElementNS('http://www.w3.org/2000/svg','text'); b.setAttribute('class','ind'); b.setAttribute('x',p.x+18); b.setAttribute('y',p.y-18); b.textContent='0'; b.id='ind'+id;
    g.appendChild(c); g.appendChild(t); g.appendChild(b); svg.appendChild(g); gnodes[id]=g; });
}

// build the persistent edge DOM once we know the final edge set (after steps generated)
function buildEdgeDOM(){
  const layer=document.getElementById('edge-layer'); if(!layer) return; layer.innerHTML='';
  edges.forEach((e,i)=>{
    const p1=coord[e.u], p2=coord[e.v]; if(!p1||!p2) return;
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1;
    const sx=p1.x+(dx/len)*23, sy=p1.y+(dy/len)*23, tx=p2.x-(dx/len)*27, ty=p2.y-(dy/len)*27;
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('class','edge'); ln.id='e'+i;
    ln.setAttribute('x1',sx); ln.setAttribute('y1',sy); ln.setAttribute('x2',tx); ln.setAttribute('y2',ty);
    ln.setAttribute('marker-end','url(#ah-n)'); ln.dataset.u=e.u; ln.dataset.v=e.v;
    layer.appendChild(ln);
  });
}

function generateSteps(){
  steps=[]; edges=[];
  const adj={}, indeg={}, edgeSet=new Set();
  for(const c of chars){ adj[c]=[]; indeg[c]=0; }

  function snap(o){ steps.push({
    indeg:{...indeg}, queue:[...(o.queue||[])], result:[...(o.result||[])], placed:[...(o.placed||[])],
    edges:edges.map(e=>({u:e.u,v:e.v})), checkEdge:o.checkEdge||null, relaxEdge:o.relaxEdge||null,
    u:o.u??null, v:o.v??null, pop:o.pop??null, cmp:o.cmp||null, cycleNodes:o.cycleNodes||null,
    code:o.code, narr:o.narr, log:o.log, logColor:o.logColor||null, complete:o.complete||false,
    ok:o.ok||false, finalRes:o.finalRes??null }); }

  snap({code:[1], narr:`<b>Alien Dictionary.</b> Unique letters in first-seen order: <code>${chars.join(' ')}</code>. Compare adjacent words to build a precedence graph.`,
    log:`extract letters: {${chars.join(', ')}}`});

  // ---- Phase 1: build graph from adjacent word pairs ----
  let invalid=false;
  for(let i=0;i<wordsList.length-1 && !invalid;i++){
    const w1=wordsList[i], w2=wordsList[i+1], minLen=Math.min(w1.length,w2.length);
    snap({code:[2], cmp:{w1,w2,idx:-1,kind:'scan'},
      narr:`Compare adjacent words <code>${w1}</code> and <code>${w2}</code> &mdash; scan for the first differing letter.`,
      log:`compare "${w1}" vs "${w2}"`});
    let found=false;
    for(let j=0;j<minLen;j++){
      if(w1[j]!==w2[j]){
        const u=w1[j], v=w2[j], key=u+'>'+v;
        if(!edgeSet.has(key)){
          edgeSet.add(key); adj[u].push(v); indeg[v]++; edges.push({u,v});
          snap({code:[3,4], u, v, checkEdge:{u,v}, cmp:{w1,w2,idx:j,kind:'diff'},
            narr:`First difference at index ${j}: <code>${u}</code> vs <code>${v}</code> &rarr; <b>${u}</b> precedes <b>${v}</b>. Add edge <code>${u}&#8594;${v}</code>; in&minus;degree[<code>${v}</code>] = <b>${indeg[v]}</b>.`,
            log:`  diff@${j}: ${u}<${v}  add edge ${u}->${v}  indeg[${v}]=${indeg[v]}`, logColor:'var(--accent-orange)'});
        } else {
          snap({code:[3,4], u, v, checkEdge:{u,v}, cmp:{w1,w2,idx:j,kind:'diff'},
            narr:`First difference at index ${j}: <code>${u}</code> vs <code>${v}</code>. Edge <code>${u}&#8594;${v}</code> already exists &rarr; skip.`,
            log:`  diff@${j}: ${u}<${v}  edge already present`});
        }
        found=true; break;
      }
    }
    if(!found && w1.length>w2.length){
      invalid=true;
      snap({code:[3], cmp:{w1,w2,idx:minLen,kind:'bad'},
        narr:`<b>Invalid prefix.</b> <code>${w1}</code> precedes <code>${w2}</code> but <code>${w2}</code> is a prefix of <code>${w1}</code>. A longer word cannot come before its own prefix.`,
        log:`  invalid: "${w2}" is a prefix of longer "${w1}"`, logColor:'var(--accent-red)'});
    }
  }

  if(invalid){
    snap({code:[11], complete:true, ok:false, finalRes:'""',
      narr:`No valid ordering exists (invalid prefix) &rarr; return <code>""</code>.`,
      log:`halt: invalid prefix. result = ""`, logColor:'var(--accent-red)'});
    return;
  }

  // ---- Phase 2: Kahn's topological sort ----
  const queue=[]; for(const c of chars){ if(indeg[c]===0) queue.push(c); }
  snap({code:[5,6,7], queue:[...queue],
    narr:`Graph built. <b>Kahn's algorithm:</b> seed the queue with every letter whose in&minus;degree is <code>0</code> &rarr; <code>[${queue.join(', ')}]</code>.`,
    log:`kahn init  queue=[${queue.join(', ')}]`});

  const result=[];
  while(queue.length){
    const u=queue.shift(); result.push(u);
    snap({code:[8], queue:[...queue], result:[...result], placed:[...result], u, pop:u,
      narr:`Dequeue <code>${u}</code> (in&minus;degree 0) &rarr; append to topological order. Order so far: <code>${result.join('')||'—'}</code>.`,
      log:`dequeue ${u}  order="${result.join('')}"`});
    for(const v of adj[u]){
      indeg[v]--;
      const relax=inResultDeps(result,u,v);
      snap({code:[9,10], queue:[...queue], result:[...result], placed:[...result], u, v, relaxEdge:{u,v},
        narr:`<code>${u}&#8594;${v}</code> resolved &rarr; decrement in&minus;degree[<code>${v}</code>] to <b>${indeg[v]}</b>.`,
        log:`  edge ${u}->${v}: indeg[${v}]=${indeg[v]}`});
      if(indeg[v]===0){
        queue.push(v);
        snap({code:[10], queue:[...queue], result:[...result], placed:[...result], u, v, relaxEdge:{u,v},
          narr:`in&minus;degree[<code>${v}</code>] reached <code>0</code> &rarr; all prerequisites met. <b>Enqueue ${v}</b>.`,
          log:`    indeg[${v}]=0  enqueue ${v}  queue=[${queue.join(', ')}]`, logColor:'var(--accent-blue)'});
      }
    }
  }

  const ok=result.length===chars.length;
  const cyc = ok ? null : chars.filter(c=>indeg[c]>0);
  snap({code:[11], queue:[], result:[...result], placed:[...result], complete:true, ok, cycleNodes:cyc,
    finalRes: ok ? `"${result.join('')}"` : '""',
    narr: ok
      ? `<b>Done.</b> All ${chars.length} letters placed with no contradictions. Alien alphabet order = <code>${result.join('')}</code>.`
      : `<b>Cycle detected.</b> Only ${result.length} of ${chars.length} letters placed &rarr; contradictory constraints. Return <code>""</code>.`,
    log: ok ? `done. valid order = "${result.join('')}"` : `cycle: placed ${result.length}/${chars.length}. result = ""`,
    logColor: ok ? 'var(--accent-green)' : 'var(--accent-red)'});
}
// helper: is edge u->v part of the resolved portion (both ends not pending)
function inResultDeps(result,u,v){ return result.includes(u); }

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  if(!document.getElementById('e0') && edges.length) buildEdgeDOM();

  const inq=new Set(step.queue), placed=new Set(step.placed||step.result);
  const cyc=new Set(step.cycleNodes||[]);
  chars.forEach(n=>{ const g=gnodes[n]; if(!g) return;
    g.classList.remove('inqueue','processed','activeu','activev','cycle');
    if(placed.has(n)) g.classList.add('processed');
    if(inq.has(n)) g.classList.add('inqueue');
    if(cyc.has(n)) g.classList.add('cycle');
    if(step.u===n) g.classList.add('activeu');
    if(step.v===n) g.classList.add('activev');
    const badge=document.getElementById('ind'+n);
    if(badge){ const prev=badge.textContent; const now=String(step.indeg[n]); badge.textContent=now;
      if(prev!==now && step.v===n){ const c=g.querySelector('.nc'); if(c) Motion.pop(c); } }
  });

  // edges: pure re-derivation of highlight state from the step
  const built=new Set(step.edges.map(e=>e.u+'>'+e.v));
  document.querySelectorAll('.edge').forEach(ln=>{
    const key=ln.dataset.u+'>'+ln.dataset.v;
    ln.classList.remove('checking','relaxing','resolved');
    if(!built.has(key)){ ln.style.opacity='0'; ln.setAttribute('marker-end','url(#ah-n)'); return; }
    ln.style.opacity='';
    const chk=step.checkEdge && step.checkEdge.u===ln.dataset.u && step.checkEdge.v===ln.dataset.v;
    const rlx=step.relaxEdge && step.relaxEdge.u===ln.dataset.u && step.relaxEdge.v===ln.dataset.v;
    if(chk){ ln.classList.add('checking'); ln.setAttribute('marker-end','url(#ah-c)'); }
    else if(rlx){ ln.classList.add('relaxing'); ln.setAttribute('marker-end','url(#ah-r)'); }
    else { ln.setAttribute('marker-end','url(#ah-n)');
      if((step.placed||step.result).includes(ln.dataset.u)) ln.classList.add('resolved'); }
  });

  fillTiles('i-tiles', chars.map(c=>({k:c, val:step.indeg[c]})), 'i', true);
  fillTiles('q-tiles', step.queue.map(c=>({k:c, val:c})), 'q', false);
  fillTiles('r-tiles', (step.result||[]).map(c=>({k:c, val:c})), 'r', false);

  renderCmp(step.cmp);

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done', step.complete && step.ok);
  narr.classList.toggle('fail', step.complete && !step.ok);

  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });
  document.getElementById('pill-u').textContent=step.u!=null?step.u:'—';
  document.getElementById('pill-v').textContent=step.v!=null?step.v:'—';
  document.getElementById('pill-cnt').textContent=(step.result||[]).length;
  document.getElementById('pill-res').textContent=step.finalRes!=null?step.finalRes:'—';
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].logColor) d.style.color=steps[k].logColor; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete && step.ok){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fillTiles(id, arr, cls, isIndeg){
  const c=document.getElementById(id); c.innerHTML='';
  if(!arr.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; c.appendChild(e); return; }
  arr.forEach(o=>{
    if(isIndeg){
      const col=document.createElement('div'); col.className='tcol';
      const t=document.createElement('div'); t.className='tile '+cls; t.textContent=o.val; col.appendChild(t);
      const l=document.createElement('div'); l.className='lbl'; l.textContent='['+o.k+']'; col.appendChild(l);
      c.appendChild(col);
    } else {
      const t=document.createElement('div'); t.className='tile '+cls; t.textContent=o.val; c.appendChild(t);
    }
  });
}

function renderCmp(cmp){
  const box=document.getElementById('cmp-box');
  if(!cmp){ box.innerHTML='<span class="cmp-empty">&mdash;</span>'; return; }
  const {w1,w2,idx,kind}=cmp;
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  function row(word,other,top){
    let h='<div>';
    for(let i=0;i<word.length;i++){
      const ch=esc(word[i]);
      if(kind==='bad' && i>=idx){ h+=`<span class="cbad">${ch}</span>`; }
      else if(kind==='diff' && i===idx){ h+=`<span class="${top?'cu':'cv'}">${ch}</span>`; }
      else if(i<idx){ h+=`<span class="cdim">${ch}</span>`; }
      else if(kind==='scan'){ h+=`<span>${ch}</span>`; }
      else { h+=`<span class="cdim">${ch}</span>`; }
    }
    return h+'</div>';
  }
  box.innerHTML='<div class="cmp-words">'+row(w1,w2,true)+row(w2,w1,false)+'</div>';
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
