<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BFS Traversal - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .large-input { width: 350px; font-family: monospace; font-size: 12px; }
        .small-input { width: 60px; text-align: center; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 400px;
            height: 350px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 3; color: var(--accent-orange); }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 2; color: var(--accent-purple); }
        .node.visited { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .node.in-queue { border-color: var(--accent-blue); box-shadow: inset 0 0 8px rgba(56,139,253,0.3); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 80px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile {
            min-width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.queue-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.res-tile { background: #332200; border-color: var(--accent-orange); color: var(--accent-orange); }
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 730px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 730px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 12px var(--accent-green); font-size: 24px !important;}

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 730px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">adjList =</label>
        <input type="text" id="g-input" class="large-input" placeholder='{"0":[1,3], "1":[0,2], "2":[1], "3":[0]}'>
        <label class="ui-label">source =</label>
        <input type="text" id="s-input" class="small-input" placeholder="0">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('{\x220\x22:[1,3], \x221\x22:[0,2], \x222\x22:[1], \x223\x22:[0]}', '0')">Ex 1</button>
        <button onclick="loadExample('{\x220\x22:[1], \x221\x22:[0,2,4], \x222\x22:[1,3], \x223\x22:[2], \x224\x22:[1]}', '1')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">BFS Queue (FIFO):</div>
                <div class="tiles-wrapper" id="queue-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">Visited Set:</div>
                <div class="tiles-wrapper" id="visited-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">Result Order:</div>
                <div class="tiles-wrapper" id="result-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (Dequeue)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Visited Status</span>
            <span class="info-value" id="val-status" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">final traversal result =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Popped / Active Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Neighbor</div>
        <div class="legend-item"><span class="dot" style="background:#0d213f; border-color:var(--accent-blue)"></span> In Queue</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Visited & Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let adjList = {"0":[1,3], "1":[0,2], "2":[1], "3":[0]};
        let sourceNode = "0";
        let nodes = [];
        let edges = [];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];

        function init() { loadExample('{"0":[1,3], "1":[0,2], "2":[1], "3":[0]}', '0'); }

        function loadExample(adjStr, srcStr) {
            document.getElementById('g-input').value = adjStr;
            document.getElementById('s-input').value = srcStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                adjList = JSON.parse(document.getElementById('g-input').value);
                sourceNode = document.getElementById('s-input').value.trim();
                
                nodes = Object.keys(adjList);
                if (!nodes.includes(sourceNode)) {
                    if (nodes.length > 0) sourceNode = nodes[0];
                    document.getElementById('s-input').value = sourceNode;
                }

                edges = [];
                let seen = new Set();
                for (let u in adjList) {
                    for (let v of adjList[u]) {
                        let key = [u, v.toString()].sort().join('-');
                        if (!seen.has(key)) {
                            seen.add(key);
                            edges.push({u: u, v: v.toString()});
                        }
                    }
                }

                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure adjacency list is valid JSON.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            const N = nodes.length;
            if (N === 0) return;

            const cx = 200;
            const cy = 175;
            const radius = 120;

            for (let i = 0; i < N; i++) {
                const nId = nodes[i];
                const angle = (Math.PI * 2 * i) / N - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[nId] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${nId}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = nId;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let visited = new Set();
            let queue = [];
            let result = [];

            if (!nodes.includes(sourceNode)) {
                steps.push({
                    type: 'error', queue: [], visited: [], result: [],
                    activeU: null, activeV: null, pushed: null,
                    panel: "Source node not found in graph.", complete: true, result: "[]",
                    statusText: "Error", log: "Error: Source node invalid."
                });
                return;
            }

            visited.add(sourceNode);
            queue.push(sourceNode);

            steps.push({
                type: 'init', queue: [...queue], visited: Array.from(visited), result: [...result],
                activeU: null, activeV: null, pushed: sourceNode,
                panel: `<b>BFS Initialization</b><br>Start at source node <b>${sourceNode}</b>. Add it to the <code>Visited Set</code> and push it onto the <code>Queue</code>.`,
                statusText: `Ready to start BFS loop.`,
                log: `Starting BFS from node ${sourceNode}.\nQueue=[${sourceNode}], Visited={${sourceNode}}, Result=[]`
            });

            while(queue.length > 0) {
                let u = queue.shift();
                result.push(u);

                steps.push({
                    type: 'dequeue', queue: [...queue], visited: Array.from(visited), result: [...result],
                    activeU: u, activeV: null, pushed: null, popped: u,
                    panel: `<b>Dequeue Node <code>${u}</code></b>.<br>Add <code>${u}</code> to the <code>Result Array</code>. Now process all its neighbors.`,
                    statusText: `Processing node ${u}...`,
                    log: `\nDequeue ${u}, Result=[${result.join(', ')}]`
                });

                let neighbors = adjList[u] || [];
                
                if (neighbors.length === 0) {
                    steps.push({
                        type: 'no_neighbors', queue: [...queue], visited: Array.from(visited), result: [...result],
                        activeU: u, activeV: null, pushed: null,
                        panel: `Node <b>${u}</b> has no neighbors to explore.`,
                        statusText: `No neighbors for ${u}.`,
                        log: `  Node ${u} has no neighbors.`
                    });
                }

                for(let v of neighbors) {
                    v = v.toString();
                    
                    steps.push({
                        type: 'check', queue: [...queue], visited: Array.from(visited), result: [...result],
                        activeU: u, activeV: v, pushed: null,
                        panel: `Checking neighbor <b>${v}</b> of active node <b>${u}</b>.<br>Is <code>${v}</code> in the Visited Set?`,
                        statusText: `Evaluating neighbor ${v}...`,
                        log: `  Process neighbor ${v}:`
                    });

                    if (!visited.has(v)) {
                        visited.add(v);
                        queue.push(v);
                        
                        steps.push({
                            type: 'enqueue', queue: [...queue], visited: Array.from(visited), result: [...result],
                            activeU: u, activeV: v, pushed: v,
                            panel: `Neighbor <b>${v}</b> is <b style="color:var(--accent-green)">NOT visited</b>.<br>Mark it as visited and Enqueue it for future processing.`,
                            statusText: `Enqueued unvisited node ${v}.`,
                            log: `    -> Not visited. Marked visited and Enqueued ${v}. Queue=[${queue.join(', ')}]`,
                            logColor: 'var(--accent-green)'
                        });
                    } else {
                        steps.push({
                            type: 'skip', queue: [...queue], visited: Array.from(visited), result: [...result],
                            activeU: u, activeV: v, pushed: null,
                            panel: `Neighbor <b>${v}</b> is <b style="color:var(--accent-red)">already visited</b>.<br>Skip it to avoid cycles.`,
                            statusText: `Skipped visited node ${v}.`,
                            log: `    -> Already visited. Skipped.`
                        });
                    }
                }
            }

            steps.push({
                type: 'final', queue: [...queue], visited: Array.from(visited), result: [...result],
                activeU: null, activeV: null, pushed: null,
                panel: `<b>Queue is empty!</b> BFS Traversal is complete.<br>All reachable nodes have been processed in level-order.`,
                complete: true, result: `[${result.join(', ')}]`,
                statusText: `Algorithm Complete.`,
                log: `\nQueue empty. BFS Complete.\nFinal Result: [${result.join(', ')}]`,
                logColor: 'var(--accent-blue)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            edges.forEach(e => {
                const p1 = nodeCoords[e.u];
                const p2 = nodeCoords[e.v];
                if(!p1 || !p2) return;

                let isChecking = step.activeU && step.activeV && 
                                 ((step.activeU === e.u && step.activeV === e.v) || 
                                  (step.activeU === e.v && step.activeV === e.u));

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                
                // Keep lines slightly off the circles
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrink = nodeRadius + 2; 
                
                line.setAttribute('x1', p1.x + (dx/len)*shrink); 
                line.setAttribute('y1', p1.y + (dy/len)*shrink);
                line.setAttribute('x2', p2.x - (dx/len)*shrink); 
                line.setAttribute('y2', p2.y - (dy/len)*shrink);

                if (isChecking) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    svg.appendChild(line);
                }
            });
        }

        function renderArray(containerId, arr, tileClass, stepData, targetKey) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            if (arr.length === 0 && !stepData.popped) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            // Render Popped Tile Visually Leaving Queue
            if (containerId === 'queue-tiles' && stepData.type === 'dequeue' && stepData.popped) {
                const popTile = document.createElement('div');
                popTile.className = `tile ${tileClass} popping`;
                popTile.innerText = stepData.popped;
                container.appendChild(popTile);
            }

            arr.forEach(val => {
                const tile = document.createElement('div');
                tile.className = `tile ${tileClass}`;
                if (stepData.pushed === val && targetKey === 'queue') {
                    tile.classList.add('pushing');
                }
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            nodes.forEach(n => {
                const el = document.getElementById(`node-${n}`);
                if(!el) return;
                
                el.className = 'node';
                
                if (step.visited.includes(n)) el.classList.add('visited');
                if (step.queue.includes(n)) el.classList.add('in-queue');
                
                if (step.activeU === n) el.classList.add('active-u');
                if (step.activeV === n) el.classList.add('active-v');
            });

            drawEdges(step);

            // Render Arrays
            renderArray('queue-tiles', step.queue, 'queue-tile', step, 'queue');
            renderArray('visited-tiles', step.visited, 'res-tile', step, 'visited');
            renderArray('result-tiles', step.result, 'res-tile', step, 'result');

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.activeU !== null ? step.activeU : '—';
            document.getElementById('val-v').innerText = step.activeV !== null ? step.activeV : '—';
            
            let statText = '—';
            if (step.type === 'check' || step.type === 'enqueue' || step.type === 'skip') {
                statText = step.visited.includes(step.activeV) && step.type !== 'enqueue' ? 'Visited' : 'Unvisited';
                if (step.type === 'enqueue') statText = 'Unvisited -> Visited';
            }
            document.getElementById('val-status').innerText = statText;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
