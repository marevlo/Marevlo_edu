<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimum Edges to Reverse &middot; 0-1 BFS</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:280px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration.fail{border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.06);}
.narration.fail::before{content:'\2715'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}
.narration .no{color:#fca5a5;} .narration .yes{color:#86efac;}
.narration .c0{color:#86efac;} .narration .c1{color:#fca5a5;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px; position:relative;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:360px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto;}
svg.graph{display:block; width:430px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.fwd{stroke:var(--accent-green); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(34,197,94,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.edge.rev{stroke:var(--accent-red); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(248,81,73,.6)); stroke-dasharray:6; animation:dashrev 1s linear infinite;}
.edge.relaxed{stroke:var(--accent-blue); stroke-width:3; filter:drop-shadow(0 0 5px rgba(6,182,212,.5));}
.ehead{fill:var(--border-main); transition:fill .35s;}
.ehead.fwd{fill:var(--accent-green);}
.ehead.rev{fill:var(--accent-red);}
.ehead.relaxed{fill:var(--accent-blue);}
.elabel-bg{fill:#0c1322; stroke:var(--border-main); stroke-width:1; transition:stroke .35s;}
.elabel{font-family:var(--mono); font-weight:800; font-size:12px; fill:var(--text-dim); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.elabel-bg.fwd{stroke:var(--accent-green);} .elabel.fwd{fill:#bbf7d0;}
.elabel-bg.rev{stroke:var(--accent-red);} .elabel.rev{fill:#fecaca;}

.revcurve{fill:none; stroke:var(--accent-red); stroke-width:3; stroke-dasharray:6; animation:dashrev 1s linear infinite; filter:drop-shadow(0 0 6px rgba(248,81,73,.55)); opacity:0; transition:opacity .2s;}
.revcurve.show{opacity:1;}
.revhead{fill:var(--accent-red); opacity:0; transition:opacity .2s;}
.revhead.show{opacity:1;}
.revlbl-bg{fill:#0c1322; stroke:var(--accent-red); stroke-width:1; opacity:0; transition:opacity .2s;}
.revlbl{font-family:var(--mono); font-weight:800; font-size:12px; fill:#fecaca; text-anchor:middle; dominant-baseline:central; opacity:0; transition:opacity .2s;}
.revlbl-bg.show,.revlbl.show{opacity:1;}

.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode .nd{font-family:var(--mono); font-weight:800; font-size:11px; fill:#7dd3fc; text-anchor:middle; dominant-baseline:central;}
.gnode.source .nc{stroke:var(--accent-blue); stroke-dasharray:3 3;}
.gnode.dest .nc{stroke:var(--accent-green); stroke-dasharray:2 3; stroke-width:2.5;}
.gnode.visited .nc{fill:rgba(6,182,212,.10); filter:drop-shadow(0 0 5px rgba(6,182,212,.3));}
.gnode.indeque .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.08);}
.gnode.activeu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.gnode.activeu .nl{fill:#ffd591;}
.gnode.activev .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 12px rgba(168,85,247,.6)); stroke-width:3;}
.gnode.activev .nl{fill:#e9d5ff;}

.side{display:flex; flex-direction:column; gap:12px; min-width:240px; flex:1 1 240px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px; display:flex; justify-content:space-between; gap:8px; align-items:baseline;}
.panel .cap .hint{font-weight:500; color:var(--text-dim); letter-spacing:0;}
.panel.d .cap{color:var(--accent-blue);} .panel.q .cap{color:var(--accent-orange);}
.dist-grid{display:flex; gap:7px; flex-wrap:wrap;}
.dcell{display:flex; flex-direction:column; align-items:center; gap:3px;}
.dcell .di{font-family:var(--mono); font-size:10px; color:var(--text-dim);}
.tile{min-width:40px; height:34px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1), border-color .3s, background .3s, color .3s;}
.tile.dist{border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.12); color:#a5f3fc;}
.tile.dist.inf{color:var(--text-dim); background:rgba(255,255,255,.04); border-color:var(--border-main);}
.tile.dist.updated{border-color:rgba(34,197,94,.55); background:rgba(34,197,94,.14); color:#bbf7d0;}
.tile.q{border-color:rgba(245,165,36,.45); background:rgba(245,165,36,.12); color:#ffd591; min-width:auto;}
.tile.q.front{border-color:rgba(34,197,94,.6); background:rgba(34,197,94,.16); color:#bbf7d0;}
.tile.q.back{border-color:rgba(248,81,73,.6); background:rgba(248,81,73,.14); color:#fecaca;}
.tile.q.popping{border-color:rgba(245,165,36,.6); background:rgba(245,165,36,.22); opacity:.55;}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start; align-items:center;}
.tiles .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
.tiles .dq-end{font-family:var(--mono); font-size:10px; color:var(--text-dim); align-self:center;}
.result-row{display:flex; align-items:center; gap:10px; font-family:var(--mono); font-size:12px; color:var(--text-dim);}
.result-row b{font-size:20px; font-weight:800; color:var(--text-dim); transition:color .3s, text-shadow .3s;}
.result-row b.ok{color:var(--accent-green); text-shadow:0 0 14px rgba(34,197,94,.6);}
.result-row b.bad{color:var(--accent-red); text-shadow:0 0 14px rgba(248,81,73,.6);}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;} .code-line .cm{color:#5c6b85;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-orange);} .pill.n b{color:var(--accent-purple);} .pill.c b{color:var(--accent-blue);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes dashrev{to{stroke-dashoffset:12;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>V =</label>
  <input type="text" id="v-input" class="small-input" value="4">
  <label>edges =</label>
  <input type="text" id="e-input" class="large-input" value="[[0,1],[1,2],[2,3],[0,2],[1,3]]">
  <label>src =</label>
  <input type="text" id="s-input" class="small-input" value="0">
  <label>dest =</label>
  <input type="text" id="t-input" class="small-input" value="3">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(4,'[[0,1],[1,2],[2,3],[0,2],[1,3]]',0,3)">Ex 1</button>
  <button onclick="loadExample(3,'[[0,1],[1,2],[2,0]]',0,2)">Ex 2</button>
  <button onclick="loadExample(5,'[[0,1],[2,1],[2,3],[4,3]]',0,3)">Ex 3</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Minimum Edges to Reverse <span class="sub">&middot; 0-1 BFS &middot; forward edge costs 0, reverse costs 1</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 430 400"></svg></div>
      <div class="side">
        <div class="panel d"><div class="cap"><span>DIST[] <span class="hint">min reversals from src</span></span></div><div class="dist-grid" id="d-tiles"></div></div>
        <div class="panel q"><div class="cap"><span>0-1 BFS DEQUE</span><span class="hint">front &rarr; back</span></div><div class="tiles" id="q-tiles"></div></div>
        <div class="panel"><div class="result-row">min edges to reverse =&nbsp;<b id="res-val">&mdash;</b></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8634; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">pop u = <b id="pill-u">&mdash;</b></span>
        <span class="pill n">relax v = <b id="pill-v">&mdash;</b></span>
        <span class="pill c">cost <b id="pill-cost">&mdash;</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>popped u</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>cost 0 (forward)</span>
          <span class="li"><span class="dot" style="background:var(--accent-red)"></span>cost 1 (reverse)</span>
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>dist updated</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ if(!el) return; el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const INF=Infinity;
const fmt=v=>v===INF?'∞':v;          // infinity glyph for live JS strings

const CODE=[
  [['fn','minReversals'],['src','(edges, V, src, dest):']],
  [['cm','  # build implicit graph']],
  [['kw','  for'],['src',' (u, v) '],['kw','in'],['src',' edges:']],
  [['src','    adj[u] += [(v, 0)]   '],['cm','# forward, free']],
  [['src','    adj[v] += [(u, 1)]   '],['cm','# reverse, costs 1']],
  [['src','  dist = [∞]*V;  dist[src] = 0']],
  [['src','  dq = deque([src])']],
  [['kw','  while'],['src',' dq:']],
  [['src','    u = dq.popleft()']],
  [['kw','    if'],['src',' u == dest: '],['kw','return'],['src',' dist[u]']],
  [['kw','    for'],['src',' (v, w) '],['kw','in'],['src',' adj[u]:']],
  [['kw','      if'],['src',' dist[u] + w < dist[v]:']],
  [['src','        dist[v] = dist[u] + w']],
  [['kw','        if'],['src',' w == 0: dq.appendleft(v)']],
  [['kw','        else'],['src',':       dq.append(v)']],
  [['kw','  return'],['src',' -1   '],['cm','# dest unreachable']],
];

let V_count=4, srcNode=0, destNode=3, edgesList=[[0,1],[1,2],[2,3],[0,2],[1,3]];
let nodes=[], coord={}, adj={};
let steps=[], stepIndex=0, timer=null;
const delays=[1900,1000,520];
const gnodes={};
let confettiArmed=true;

function init(){ buildCode(); loadExample(4,'[[0,1],[1,2],[2,3],[0,2],[1,3]]',0,3); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(v,eStr,s,d){
  document.getElementById('v-input').value=v; document.getElementById('e-input').value=eStr;
  document.getElementById('s-input').value=s; document.getElementById('t-input').value=d; parseAndGen();
}
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    V_count=parseInt(document.getElementById('v-input').value,10);
    srcNode=parseInt(document.getElementById('s-input').value,10);
    destNode=parseInt(document.getElementById('t-input').value,10);
    edgesList=JSON.parse(document.getElementById('e-input').value.replace(/\(/g,'[').replace(/\)/g,']'));
    if(isNaN(V_count)||isNaN(srcNode)||isNaN(destNode)||!Array.isArray(edgesList)) throw 'bad';
    if(srcNode<0||srcNode>=V_count){ srcNode=0; document.getElementById('s-input').value=0; }
    if(destNode<0||destNode>=V_count){ destNode=V_count-1; document.getElementById('t-input').value=destNode; }
    nodes=[]; for(let i=0;i<V_count;i++) nodes.push(i);
    // implicit 0-1 graph: forward edge cost 0, reverse edge cost 1
    adj={}; for(let i=0;i<V_count;i++) adj[i]=[];
    for(const e of edgesList){ const u=e[0],v=e[1]; if(adj[u]&&adj[v]){ adj[u].push({v,w:0}); adj[v].push({v:u,w:1}); } }
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid input. V, src, dest are integers; edges is an array of [u, v].'); }
}
function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; coord={}; for(const k in gnodes) delete gnodes[k];
  const N=V_count; const cx=215, cy=200, R=Math.min(150, 70+N*9);
  nodes.forEach((id,i)=>{ const ang=(Math.PI*2*i)/N - Math.PI/2; coord[id]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)}; });
  const NS='http://www.w3.org/2000/svg', r=22, gap=4;
  // directed weighted edges (forward = cost 0) first
  edgesList.forEach((e,i)=>{ const u=e[0],v=e[1]; const p1=coord[u], p2=coord[v]; if(!p1||!p2) return;
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1, ux=dx/len, uy=dy/len;
    const x1=p1.x+ux*(r+gap), y1=p1.y+uy*(r+gap), x2=p2.x-ux*(r+gap+6), y2=p2.y-uy*(r+gap+6);
    const ln=document.createElementNS(NS,'line'); ln.setAttribute('class','edge'); ln.id='e'+i;
    ln.setAttribute('x1',x1); ln.setAttribute('y1',y1); ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
    svg.appendChild(ln);
    const ah=7; const bx=x2-ux*ah, by=y2-uy*ah; const px=-uy, py=ux;
    const head=document.createElementNS(NS,'polygon'); head.setAttribute('class','ehead'); head.id='eh'+i;
    head.setAttribute('points',`${x2},${y2} ${bx+px*ah*0.7},${by+py*ah*0.7} ${bx-px*ah*0.7},${by-py*ah*0.7}`);
    svg.appendChild(head);
    // weight label (0 = free) offset to one side
    const mx=(x1+x2)/2 + px*10, my=(y1+y2)/2 + py*10;
    const bg=document.createElementNS(NS,'rect'); bg.setAttribute('class','elabel-bg'); bg.id='elb'+i;
    bg.setAttribute('x',mx-9); bg.setAttribute('y',my-9); bg.setAttribute('width',18); bg.setAttribute('height',18); bg.setAttribute('rx',5);
    svg.appendChild(bg);
    const tx=document.createElementNS(NS,'text'); tx.setAttribute('class','elabel'); tx.id='elt'+i;
    tx.setAttribute('x',mx); tx.setAttribute('y',my); tx.textContent='0'; svg.appendChild(tx);
  });
  // persistent reverse-evaluation overlay (one curve, repositioned per step)
  const rc=document.createElementNS(NS,'path'); rc.setAttribute('class','revcurve'); rc.id='revcurve'; svg.appendChild(rc);
  const rh=document.createElementNS(NS,'polygon'); rh.setAttribute('class','revhead'); rh.id='revhead'; svg.appendChild(rh);
  const rbg=document.createElementNS(NS,'rect'); rbg.setAttribute('class','revlbl-bg'); rbg.id='revlblbg'; rbg.setAttribute('width',18); rbg.setAttribute('height',18); rbg.setAttribute('rx',5); svg.appendChild(rbg);
  const rt=document.createElementNS(NS,'text'); rt.setAttribute('class','revlbl'); rt.id='revlbl'; rt.textContent='1'; svg.appendChild(rt);
  // nodes on top
  nodes.forEach(id=>{ const p=coord[id];
    const g=document.createElementNS(NS,'g'); g.setAttribute('class','gnode'); g.id='gn'+id;
    if(id===srcNode) g.classList.add('source');
    if(id===destNode) g.classList.add('dest');
    const c=document.createElementNS(NS,'circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',r);
    const t=document.createElementNS(NS,'text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y-4); t.textContent=id;
    const dd=document.createElementNS(NS,'text'); dd.setAttribute('class','nd'); dd.setAttribute('x',p.x); dd.setAttribute('y',p.y+9); dd.id='nd'+id; dd.textContent='∞';
    g.appendChild(c); g.appendChild(t); g.appendChild(dd); svg.appendChild(g); gnodes[id]=g; });
}

function generateSteps(){
  steps=[];
  const dist=new Array(V_count).fill(INF);
  const visited=new Array(V_count).fill(false);
  let dq=[]; let result=null;
  function snap(o){ steps.push({
    dist:[...dist], visited:[...visited], deque:[...dq],
    u:o.u??null, v:o.v??null, w:o.w??null, updatedIdx:o.updatedIdx??null,
    popped:o.popped??null, pushed:o.pushed??null, pushSide:o.pushSide??null,
    code:o.code, narr:o.narr, log:o.log, complete:o.complete, fail:o.fail,
    result:(result===null?'—':result) });
  }
  dist[srcNode]=0; dq.push(srcNode);
  snap({code:[6,7], pushed:srcNode, pushSide:'front',
    narr:`<b>0-1 BFS</b> from source <code>${srcNode}</code> to dest <code>${destNode}</code>. Each original edge is free (<span class="c0">cost 0</span> forward) but can be reversed for <span class="c1">cost 1</span>. Set <code>dist[${srcNode}]=0</code> and seed the deque.`,
    log:`init: dist[${srcNode}]=0  deque=[${srcNode}]  (src=${srcNode}, dest=${destNode})`});

  while(dq.length){
    const u=dq.shift();
    visited[u]=true;
    snap({code:[8,9], u, popped:u,
      narr:`Pop the <b>front</b> of the deque: node <code>${u}</code> with <code>dist[${u}]=${dist[u]}</code>. In 0-1 BFS the front always holds the smallest distance, so this is final.`,
      log:`pop front -> ${u}  (dist=${dist[u]})  deque=[${dq.join(', ')||' '}]`});

    if(u===destNode){
      result=dist[u];
      snap({code:[10], u, complete:true,
        narr:`Popped the <b>destination</b> <code>${destNode}</code>. 0-1 BFS guarantees the first pop is optimal &mdash; minimum reversals = <b class="yes">${dist[u]}</b>.`,
        log:`reached dest ${destNode} with dist=${dist[u]} -> answer ${dist[u]}`});
      break;
    }

    const nb=adj[u]||[];
    for(const {v,w} of nb){
      const nd=dist[u]+w;
      const kind = w===0 ? '<span class="c0">forward (cost 0)</span>' : '<span class="c1">reverse (cost 1)</span>';
      snap({code:[11], u, v, w,
        narr:`Relax ${kind} edge <code>${u}&#8594;${v}</code>: is <code>${dist[u]} + ${w} = ${nd}</code> &lt; <code>dist[${v}]=${fmt(dist[v])}</code>?`,
        log:`  relax ${u}->${v} w=${w}: ${nd} < ${fmt(dist[v])} ?`});
      if(nd<dist[v]){
        dist[v]=nd;
        let side;
        if(w===0){ dq.unshift(v); side='front'; } else { dq.push(v); side='back'; }
        snap({code:w===0?[12,13]:[12,14], u, v, w, updatedIdx:v, pushed:v, pushSide:side,
          narr:`<span class="yes">Yes</span> &mdash; set <code>dist[${v}]=${nd}</code> and ${w===0?`since cost is 0, <b class="c0">push ${v} to the FRONT</b> (process next)`:`since cost is 1, <b class="c1">push ${v} to the BACK</b> (defer)`}.`,
          log:`    yes -> dist[${v}]=${nd}, push ${side} (${v})`});
      } else {
        snap({code:[11], u, v, w,
          narr:`<span class="no">No</span> &mdash; <code>${nd}</code> is not better than <code>${fmt(dist[v])}</code>. Leave <code>dist[${v}]</code> unchanged.`,
          log:`    no -> keep dist[${v}]=${fmt(dist[v])}`});
      }
    }
  }

  if(result===null){
    result=-1;
    snap({code:[15], complete:true, fail:true,
      narr:`Deque is empty and we never popped <code>${destNode}</code>. The destination is unreachable even with reversals &mdash; answer is <b class="no">-1</b>.`,
      log:`deque empty, dest ${destNode} unreached -> answer -1`});
  }
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const inDeque=new Set(step.deque);
  // nodes
  nodes.forEach(n=>{ const g=gnodes[n]; if(!g) return;
    g.classList.remove('visited','indeque','activeu','activev');
    if(step.visited[n]) g.classList.add('visited');
    if(inDeque.has(n)) g.classList.add('indeque');
    if(step.u===n && !step.complete) g.classList.add('activeu');
    if(step.v===n && !step.complete) g.classList.add('activev');
    const dd=document.getElementById('nd'+n); if(dd) dd.textContent=fmt(step.dist[n]);
    if(step.pushed===n){ const c=g.querySelector('.nc'); Motion.pop(c); }
  });
  // forward edges: highlight when actively evaluated as a cost-0 forward edge
  edgesList.forEach((e,i)=>{
    const u=e[0], v=e[1];
    const line=document.getElementById('e'+i), head=document.getElementById('eh'+i),
          lb=document.getElementById('elb'+i), lt=document.getElementById('elt'+i);
    [line,head,lb,lt].forEach(el=>{ if(el) el.classList.remove('fwd','rev','relaxed'); });
    // active forward check is exactly when step is traversing original edge u->v with w=0
    const checkingFwd = step.u===u && step.v===v && step.w===0 && !step.complete;
    if(checkingFwd){ [line,head,lb,lt].forEach(el=>el&&el.classList.add('fwd')); }
  });
  // reverse-evaluation overlay: active when w===1 (original edge is v->u, traversed backward u->v)
  const rc=document.getElementById('revcurve'), rh=document.getElementById('revhead'),
        rbg=document.getElementById('revlblbg'), rt=document.getElementById('revlbl');
  if(step.w===1 && step.u!=null && step.v!=null && !step.complete){
    const p1=coord[step.u], p2=coord[step.v];
    if(p1&&p2){
      const r=22, gap=4;
      const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1, ux=dx/len, uy=dy/len;
      const nx=-uy, ny=ux, curve=28;
      const x1=p1.x+ux*(r+gap), y1=p1.y+uy*(r+gap);
      const x2=p2.x-ux*(r+gap+6), y2=p2.y-uy*(r+gap+6);
      const cxq=(p1.x+p2.x)/2 + nx*curve, cyq=(p1.y+p2.y)/2 + ny*curve;
      rc.setAttribute('d',`M ${x1},${y1} Q ${cxq},${cyq} ${x2},${y2}`); rc.classList.add('show');
      // arrowhead at x2 along tangent from control point
      const tdx=x2-cxq, tdy=y2-cyq, tl=Math.hypot(tdx,tdy)||1, tux=tdx/tl, tuy=tdy/tl;
      const ah=7, bx=x2-tux*ah, by=y2-tuy*ah, ppx=-tuy, ppy=tux;
      rh.setAttribute('points',`${x2},${y2} ${bx+ppx*ah*0.7},${by+ppy*ah*0.7} ${bx-ppx*ah*0.7},${by-ppy*ah*0.7}`);
      rh.classList.add('show');
      rbg.setAttribute('x',cxq-9); rbg.setAttribute('y',cyq-9); rbg.classList.add('show');
      rt.setAttribute('x',cxq); rt.setAttribute('y',cyq); rt.classList.add('show');
    }
  } else {
    rc.classList.remove('show'); rh.classList.remove('show'); rbg.classList.remove('show'); rt.classList.remove('show');
  }

  fillDist(step); fillDeque(step);

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done',!!step.complete && !step.fail);
  narr.classList.toggle('fail',!!step.fail);
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i+1)); });
  document.getElementById('pill-u').textContent=step.u!=null?step.u:'—';
  document.getElementById('pill-v').textContent=step.v!=null?step.v:'—';
  document.getElementById('pill-cost').textContent=step.w!=null?step.w:'—';
  // result tile
  const rv=document.getElementById('res-val'); rv.className='';
  if(step.complete){ rv.textContent=step.result; rv.classList.add(step.fail?'bad':'ok'); }
  else rv.textContent='—';
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;
  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const dv=document.createElement('div'); dv.textContent=steps[k].log;
    if(steps[k].complete) dv.style.color=steps[k].fail?'var(--accent-red)':'var(--accent-green)'; log.appendChild(dv);} }
  log.scrollTop=log.scrollHeight;
  if(step.complete && !step.fail){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fillDist(step){
  const c=document.getElementById('d-tiles'); c.innerHTML='';
  step.dist.forEach((val,i)=>{
    const cell=document.createElement('div'); cell.className='dcell';
    const t=document.createElement('div'); t.className='tile dist';
    if(val===INF) t.classList.add('inf');
    if(step.updatedIdx===i){ t.classList.add('updated'); Motion.pop(t); }
    t.textContent=fmt(val);
    const di=document.createElement('div'); di.className='di'; di.textContent='['+i+']';
    cell.appendChild(t); cell.appendChild(di); c.appendChild(cell);
  });
}
function fillDeque(step){
  const c=document.getElementById('q-tiles'); c.innerHTML='';
  const items=[];
  if(step.popped!=null){ items.push({v:step.popped,pop:true,side:null}); }
  step.deque.forEach((v,i)=>{ items.push({v,pop:false,idx:i}); });
  if(!items.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; c.appendChild(e); return; }
  const f=document.createElement('span'); f.className='dq-end'; f.textContent='front'; c.appendChild(f);
  items.forEach(it=>{
    const t=document.createElement('div'); t.className='tile q'; t.textContent=it.v;
    if(it.pop){ t.classList.add('popping'); }
    else {
      if(step.pushed===it.v && step.pushSide==='front' && it.idx===0){ t.classList.add('front'); Motion.pop(t); }
      else if(step.pushed===it.v && step.pushSide==='back' && it.idx===step.deque.length-1){ t.classList.add('back'); Motion.pop(t); }
    }
    c.appendChild(t);
  });
  const b=document.createElement('span'); b.className='dq-end'; b.textContent='back'; c.appendChild(b);
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
