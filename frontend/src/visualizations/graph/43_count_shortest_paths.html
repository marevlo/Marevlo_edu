<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Count Shortest Paths &middot; Graph</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:300px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'▸'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'✓'; color:var(--accent-green);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}
.narration b.g{color:#bbf7d0;} .narration b.o{color:#ffd591;} .narration b.p{color:#e9d5ff;} .narration b.r{color:#fca5a5;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:360px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap; position:relative;}

.graph-wrap{flex:0 0 auto;}
svg.graph{display:block; width:430px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.checking{stroke:var(--accent-purple); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.edge.new{stroke:var(--accent-green); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(34,197,94,.6));}
.edge.add{stroke:var(--accent-blue); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(6,182,212,.6));}
.edge.skip{stroke:var(--accent-red); stroke-width:3; filter:drop-shadow(0 0 5px rgba(248,81,73,.5)); opacity:.85;}
.edge.tree{stroke:rgba(34,197,94,.45); stroke-width:2.5;}

.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode .nbadge{font-family:var(--mono); font-weight:800; font-size:10px; fill:var(--text-dim); text-anchor:middle; dominant-baseline:central;}
.gnode.discovered .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.10);}
.gnode.discovered .nl{fill:#bbf7d0;}
.gnode.inqueue .nc{stroke:var(--accent-blue); fill:rgba(6,182,212,.10); filter:drop-shadow(0 0 6px rgba(6,182,212,.35));}
.gnode.activeu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.gnode.activeu .nl{fill:#ffd591;}
.gnode.activev .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 12px rgba(168,85,247,.6)); stroke-width:3;}
.gnode.activev .nl{fill:#e9d5ff;}
.gnode.src .nc{stroke:var(--accent-blue); stroke-width:3;}
.gnode.dest .nc{stroke-dasharray:4 3;}
.gnode.dest.done .nc{stroke:var(--accent-green); stroke-width:3.5; filter:drop-shadow(0 0 12px rgba(34,197,94,.7)); stroke-dasharray:none;}

.side{display:flex; flex-direction:column; gap:12px; min-width:250px; flex:1 1 250px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px; display:flex; justify-content:space-between;}
.panel .cap .hint{font-weight:500; color:var(--text-dim);}
.panel.d .cap{color:var(--accent-blue);} .panel.c .cap{color:var(--accent-orange);} .panel.q .cap{color:#a5f3fc;}
.arr{display:flex; gap:7px; flex-wrap:wrap; align-content:flex-start;}
.cell{display:flex; flex-direction:column; align-items:center; gap:3px;}
.cell .idx{font-family:var(--mono); font-size:10px; color:var(--text-dim);}
.tile{min-width:38px; height:34px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1), background .3s, border-color .3s, color .3s;}
.tile.d{border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.12); color:#a5f3fc;}
.tile.c{border-color:rgba(245,165,36,.45); background:rgba(245,165,36,.12); color:#ffd591;}
.tile.inf{color:var(--text-dim); border-color:var(--border-main); background:rgba(255,255,255,.04);}
.tile.hl-d{border-color:var(--accent-blue); box-shadow:0 0 10px rgba(6,182,212,.5);}
.tile.hl-c{border-color:var(--accent-orange); box-shadow:0 0 10px rgba(245,165,36,.55);}
.tile.qt{min-width:34px; border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.12); color:#a5f3fc;}
.qrow{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start;}
.qrow .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}

#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-orange);} .pill.n b{color:var(--accent-purple);} .pill.cmp b{color:#a5f3fc;} .pill.ans b{color:var(--accent-green);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:130px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 240px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>adjList =</label>
  <input type="text" id="g-input" class="large-input" value='{"0":[1,2],"1":[3],"2":[3],"3":[]}'>
  <label>src =</label>
  <input type="text" id="s-input" class="small-input" value="0">
  <label>dest =</label>
  <input type="text" id="d-input" class="small-input" value="3">
  <button onclick="loadCustom()">Load</button>
  <button onclick='loadExample({"0":[1,2],"1":[3],"2":[3],"3":[]},"0","3")'>Ex 1</button>
  <button onclick='loadExample({"0":[1],"1":[2],"2":[0,3],"3":[]},"0","3")'>Ex 2</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Count Shortest Paths <span class="sub">&middot; BFS layers &middot; dist[] &amp; ways[]</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 430 400"></svg></div>
      <div class="side">
        <div class="panel d"><div class="cap"><span>dist[]</span><span class="hint">min layer from src</span></div><div class="arr" id="dist-arr"></div></div>
        <div class="panel c"><div class="cap"><span>ways[]</span><span class="hint"># shortest paths</span></div><div class="arr" id="ways-arr"></div></div>
        <div class="panel q"><div class="cap"><span>BFS QUEUE (FIFO)</span></div><div class="qrow" id="q-tiles"></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">u = <b id="pill-u">&mdash;</b></span>
        <span class="pill n">v = <b id="pill-v">&mdash;</b></span>
        <span class="pill cmp">dist[u]+1 vs dist[v] = <b id="pill-cmp">&mdash;</b></span>
        <span class="pill ans">ways[dest] = <b id="pill-ans">&mdash;</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>active u</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>neighbor v</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>new path</span>
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>+ path</span>
          <span class="li"><span class="dot" style="background:var(--accent-red)"></span>longer, skip</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ if(!el) return; el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.55+0.45*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const INF='&#8734;';
const CODE=[
  [['fn','countShortestPaths'],['src','(adj, src, dest):']],
  [['src','  dist[*]='],['kw','inf'],['src',';  ways[*]=0']],
  [['src','  dist[src]=0;  ways[src]=1;  queue=[src]']],
  [['kw','  while'],['src',' queue:']],
  [['src','    u = queue.popleft()']],
  [['kw','    for'],['src',' v '],['kw','in'],['src',' adj[u]:']],
  [['kw','      if'],['src',' dist[v] == '],['kw','inf'],['src',':']],
  [['src','        dist[v]=dist[u]+1;  ways[v]=ways[u];  push v']],
  [['kw','      elif'],['src',' dist[v] == dist[u]+1:']],
  [['src','        ways[v] += ways[u]']],
  [['kw','  return'],['src',' ways[dest]']],
];

let adjList={"0":[1,2],"1":[3],"2":[3],"3":[]}, sourceNode="0", destNode="3";
let nodes=[], edges=[], coord={};
let steps=[], stepIndex=0, timer=null;
const delays=[1900,1000,520];
const gnodes={};
let confettiArmed=true;

function init(){ buildCode(); loadExample({"0":[1,2],"1":[3],"2":[3],"3":[]},"0","3"); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(adj,src,dest){ document.getElementById('g-input').value=JSON.stringify(adj); document.getElementById('s-input').value=src; document.getElementById('d-input').value=dest; parseAndGen(); }
function loadCustom(){ parseAndGen(); }

function parseAndGen(){
  try{
    adjList=JSON.parse(document.getElementById('g-input').value);
    sourceNode=document.getElementById('s-input').value.trim();
    destNode=document.getElementById('d-input').value.trim();
    nodes=Object.keys(adjList);
    edges=[];
    for(const u in adjList){ for(const v of adjList[u]){ const vs=String(v); if(!nodes.includes(vs)) nodes.push(vs); edges.push({u, v:vs}); } }
    nodes=Array.from(new Set(nodes)).sort((a,b)=>(a.length-b.length)||(a<b?-1:1));
    if(!nodes.includes(sourceNode)){ sourceNode=nodes[0]||"0"; document.getElementById('s-input').value=sourceNode; }
    if(!nodes.includes(destNode)){ destNode=nodes[nodes.length-1]||sourceNode; document.getElementById('d-input').value=destNode; }
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid adjacency list JSON.'); }
}

function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; coord={}; for(const k in gnodes) delete gnodes[k];

  // BFS layering for layout
  const levels={}; let q=[sourceNode]; levels[sourceNode]=0;
  while(q.length){ const u=q.shift(); for(let v of (adjList[u]||[])){ v=String(v); if(levels[v]===undefined){ levels[v]=levels[u]+1; q.push(v); } } }
  let maxLvl=0; const grp={};
  nodes.forEach(w=>{ let l=levels[w]!==undefined?levels[w]:-1; (grp[l]=grp[l]||[]).push(w); if(l>maxLvl) maxLvl=l; });
  if(grp[-1]){ maxLvl++; grp[maxLvl]=grp[-1]; delete grp[-1]; }

  const W=430,H=400, sX=58, eX=W-58;
  const xStep = maxLvl>0 ? (eX-sX)/maxLvl : 0;
  for(const l in grp){
    const col=grp[l]; const x=sX+(parseInt(l)*xStep); const yStep=H/(col.length+1);
    col.forEach((id,i)=>{ coord[id]={x, y:yStep*(i+1)}; });
  }

  // arrowhead defs (directed graph)
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML=`
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="rgba(255,255,255,.28)"/></marker>
    <marker id="ah-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#a855f7"/></marker>
    <marker id="ah-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#22c55e"/></marker>
    <marker id="ah-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#06b6d4"/></marker>
    <marker id="ah-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#f85149"/></marker>`;
  svg.appendChild(defs);

  const R=21;
  // edges (directed: arrowheads, trimmed to circle edge)
  edges.forEach((e,i)=>{ const p1=coord[e.u], p2=coord[e.v]; if(!p1||!p2) return;
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1;
    const x1=p1.x+(dx/len)*(R+2), y1=p1.y+(dy/len)*(R+2);
    const x2=p2.x-(dx/len)*(R+7), y2=p2.y-(dy/len)*(R+7);
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line'); ln.setAttribute('class','edge'); ln.id='e'+i;
    ln.setAttribute('x1',x1); ln.setAttribute('y1',y1); ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
    ln.setAttribute('marker-end','url(#ah)');
    ln.dataset.u=e.u; ln.dataset.v=e.v; svg.appendChild(ln); });

  // nodes
  nodes.forEach(id=>{ const p=coord[id];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode'); g.id='gn'+id;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',R);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y-3); t.textContent=id;
    const b=document.createElementNS('http://www.w3.org/2000/svg','text'); b.setAttribute('class','nbadge'); b.setAttribute('x',p.x); b.setAttribute('y',p.y+11); b.id='nb'+id; b.textContent='';
    g.appendChild(c); g.appendChild(t); g.appendChild(b); svg.appendChild(g); gnodes[id]=g; });
}

function generateSteps(){
  steps=[]; const dist={}, ways={}, tree=new Set();
  nodes.forEach(n=>{ dist[n]=Infinity; ways[n]=0; });
  let queue=[];
  function snap(o){ steps.push({ dist:{...dist}, ways:{...ways}, queue:[...queue], tree:[...tree],
    u:o.u??null, v:o.v??null, pushed:o.pushed??null, hlDist:o.hlDist??null, hlWays:o.hlWays??null,
    edgeState:o.edgeState??null, code:o.code, narr:o.narr, log:o.log, complete:o.complete }); }

  dist[sourceNode]=0; ways[sourceNode]=1; queue.push(sourceNode);
  snap({ code:[1,2], hlDist:sourceNode, hlWays:sourceNode,
    narr:`Initialize: <code>dist[*]=&#8734;</code>, <code>ways[*]=0</code>. Source <code>${sourceNode}</code>: <code>dist=0</code>, <code>ways=1</code>. Enqueue it.`,
    log:`init  dist[${sourceNode}]=0 ways[${sourceNode}]=1  queue=[${sourceNode}]` });

  while(queue.length){
    const u=queue.shift();
    snap({ code:[4], u, narr:`Dequeue <code>${u}</code> (<b class="o">dist=${dist[u]}</b>, <b class="o">ways=${ways[u]}</b>). Relax each outgoing edge.`,
      log:`dequeue ${u}  dist=${dist[u]} ways=${ways[u]}` });
    const nb=(adjList[u]||[]).map(String);
    for(const v of nb){
      const cand=dist[u]+1; const dv=dist[v]===Infinity?'&#8734;':dist[v];
      snap({ code:[5,6], u, v, edgeState:'check',
        narr:`Edge <code>${u}&rarr;${v}</code>: candidate <code>dist[${u}]+1 = ${cand}</code> vs <code>dist[${v}] = ${dv}</code>.`,
        log:`  edge ${u}->${v}  ${cand} vs ${dv}` });
      if(dist[v]===Infinity){
        dist[v]=cand; ways[v]=ways[u]; queue.push(v); tree.add(u+'>'+v);
        snap({ code:[6,7], u, v, pushed:v, hlDist:v, hlWays:v, edgeState:'new',
          narr:`<b class="g">New shortest path</b> to <code>${v}</code>: set <code>dist[${v}]=${dist[v]}</code>, inherit <code>ways[${v}]=ways[${u}]=${ways[v]}</code>. Enqueue.`,
          log:`    NEW  dist[${v}]=${dist[v]} ways[${v}]=${ways[v]}  enqueue` });
      } else if(dist[v]===cand){
        ways[v]+=ways[u]; tree.add(u+'>'+v);
        snap({ code:[8,9], u, v, hlWays:v, edgeState:'add',
          narr:`Tie: <code>dist[${u}]+1 == dist[${v}]</code>. <b>Another shortest path</b> &rarr; <code>ways[${v}] += ways[${u}]</code> = <b class="g">${ways[v]}</b>.`,
          log:`    TIE  ways[${v}] += ${ways[u]}  -> ${ways[v]}` });
      } else {
        snap({ code:[8], u, v, edgeState:'skip',
          narr:`<code>dist[${u}]+1 = ${cand} &gt; dist[${v}] = ${dist[v]}</code>: longer path. <b class="r">Skip</b> &mdash; does not affect shortest-path count.`,
          log:`    SKIP  ${cand} > ${dist[v]}` });
      }
    }
  }

  const ans=(dist[destNode]===Infinity)?0:ways[destNode];
  const reach=dist[destNode]!==Infinity;
  snap({ code:[10], hlWays:destNode, complete:true,
    narr:reach
      ? `Queue empty &mdash; BFS done. Shortest distance to <code>${destNode}</code> is <b>${dist[destNode]}</b>; number of shortest paths <code>ways[${destNode}]</code> = <b class="g">${ans}</b>.`
      : `Queue empty &mdash; BFS done. Destination <code>${destNode}</code> is <b class="r">unreachable</b> &rarr; <code>ways[${destNode}]</code> = <b>0</b>.`,
    log:`done.  ways[${destNode}] = ${ans}` });
}

function fmt(x){ return x===Infinity?INF:x; }

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const inq=new Set(step.queue), treeSet=new Set(step.tree);

  // nodes
  nodes.forEach(n=>{ const g=gnodes[n]; if(!g) return;
    g.classList.remove('discovered','inqueue','activeu','activev','src','dest','done');
    if(step.dist[n]!==Infinity) g.classList.add('discovered');
    if(inq.has(n)) g.classList.add('inqueue');
    if(n===sourceNode) g.classList.add('src');
    if(n===destNode){ g.classList.add('dest'); if(step.complete && step.dist[n]!==Infinity) g.classList.add('done'); }
    if(step.u===n) g.classList.add('activeu');
    if(step.v===n) g.classList.add('activev');
    const badge=document.getElementById('nb'+n);
    if(badge){ badge.textContent = step.dist[n]===Infinity ? '' : ('d'+step.dist[n]+' w'+step.ways[n]); }
    if(step.pushed===n){ const c=g.querySelector('.nc'); Motion.pop(c); }
  });

  // edges
  document.querySelectorAll('.edge').forEach(ln=>{
    ln.classList.remove('checking','new','add','skip','tree');
    const key=ln.dataset.u+'>'+ln.dataset.v;
    const isActive = step.u!=null && step.v!=null && ln.dataset.u===step.u && ln.dataset.v===step.v;
    if(isActive && step.edgeState){
      if(step.edgeState==='new'){ ln.classList.add('new'); ln.setAttribute('marker-end','url(#ah-g)'); }
      else if(step.edgeState==='add'){ ln.classList.add('add'); ln.setAttribute('marker-end','url(#ah-b)'); }
      else if(step.edgeState==='skip'){ ln.classList.add('skip'); ln.setAttribute('marker-end','url(#ah-r)'); }
      else { ln.classList.add('checking'); ln.setAttribute('marker-end','url(#ah-p)'); }
    } else if(treeSet.has(key)){
      ln.classList.add('tree'); ln.setAttribute('marker-end','url(#ah)');
    } else {
      ln.setAttribute('marker-end','url(#ah)');
    }
  });

  // dist / ways arrays
  fillArr('dist-arr', step.dist, 'd', step.hlDist);
  fillArr('ways-arr', step.ways, 'c', step.hlWays);

  // queue
  const qc=document.getElementById('q-tiles'); qc.innerHTML='';
  if(!step.queue.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; qc.appendChild(e); }
  else step.queue.forEach(v=>{ const t=document.createElement('div'); t.className='tile qt'; t.textContent=v; if(step.pushed===v) Motion.pop(t); qc.appendChild(t); });

  // narration
  const narr=document.getElementById('narration'); narr.innerHTML=step.narr; narr.classList.toggle('done',!!step.complete);

  // code highlight
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i+1)); });

  // pills
  document.getElementById('pill-u').textContent=step.u!=null?step.u:'—';
  document.getElementById('pill-v').textContent=step.v!=null?step.v:'—';
  if(step.u!=null && step.v!=null){
    const cand=step.dist[step.u]+1;
    const dv=step.dist[step.v]===Infinity?'∞':step.dist[step.v];
    document.getElementById('pill-cmp').textContent=cand+' vs '+dv;
  } else document.getElementById('pill-cmp').textContent='—';
  document.getElementById('pill-ans').textContent = step.complete ? (step.dist[destNode]===Infinity?0:step.ways[destNode]) : (step.ways[destNode]!=null?step.ways[destNode]:'—');

  // progress + badge
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  // log
  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color='var(--accent-green)'; log.appendChild(d); } }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fillArr(id, map, cls, hl){
  const c=document.getElementById(id); c.innerHTML='';
  nodes.forEach(n=>{
    const cell=document.createElement('div'); cell.className='cell';
    const t=document.createElement('div');
    const isInf=(cls==='d' && map[n]===Infinity);
    t.className='tile '+cls+(isInf?' inf':'')+(hl===n?(' hl-'+cls):'');
    t.innerHTML=fmt(map[n]);
    if(hl===n) Motion.pop(t);
    const ix=document.createElement('div'); ix.className='idx'; ix.textContent='['+n+']';
    cell.appendChild(t); cell.appendChild(ix); c.appendChild(cell);
  });
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<42;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
