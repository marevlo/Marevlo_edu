<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Cost Grid Path (Dijkstra) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .grid-area {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 400px;
            min-height: 400px;
        }

        .grid-wrapper {
            display: grid;
            gap: 6px;
        }

        .grid-cell {
            width: 70px; height: 70px;
            background: #21262d;
            border: 2px solid var(--border-main);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4px 6px;
            transition: all 0.3s ease;
            position: relative;
        }

        .cell-coord { font-size: 10px; color: var(--text-dim); }
        .cell-cost { font-size: 18px; font-weight: bold; color: var(--text-main); text-align: center; margin-top: -4px;}
        .cell-dist { font-size: 11px; color: var(--accent-blue); text-align: right; font-weight: bold; }

        /* Cell States */
        .grid-cell.in-pq { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(56,139,253,0.2); }
        .grid-cell.settled { border-color: var(--accent-green); background: #0f2a1a; }
        .grid-cell.active-u { border-color: var(--accent-orange); box-shadow: 0 0 15px var(--accent-orange); transform: scale(1.15); z-index: 10; background: #332200; }
        .grid-cell.active-v { border-color: var(--accent-purple); box-shadow: 0 0 12px var(--accent-purple); transform: scale(1.1); z-index: 9; }
        .grid-cell.path-node { border-color: var(--accent-green); background: var(--accent-green); color: #000; box-shadow: 0 0 20px var(--accent-green); transform: scale(1.05); z-index: 5;}
        .grid-cell.path-node .cell-coord, .grid-cell.path-node .cell-dist { color: #000; font-weight: bold; }
        .grid-cell.path-node .cell-cost { color: #000; }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile {
            min-width: 44px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 14px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main); padding: 0 8px;
        }
        
        .tile.pq-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.popping { transform: scale(1.1); opacity: 0; }
        .tile.pushing { animation: pushAnim 0.3s ease; border-color: var(--accent-green); box-shadow: 0 0 8px var(--accent-green);}

        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Grid =</label>
        <input type="text" id="g-input" class="med-input" placeholder="[[1,3,1],[1,5,1],[4,2,1]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[[1,3,1],[1,5,1],[4,2,1]]')">Ex 1</button>
        <button onclick="loadExample('[[1,2,3],[4,5,6]]')">Ex 2</button>
        <button onclick="loadExample('[[1,2],[1,1]]')">Ex 3</button>
    </div>

    <div class="visual-container">
        <div class="grid-area" id="grid-area">
            <div class="grid-wrapper" id="grid-wrapper"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">Priority Queue (Min-Heap):</div>
                <div class="tiles-wrapper" id="pq-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Format: [dist, (r, c)]</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Cell (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Relaxation Condition</span>
            <span class="info-value" id="val-cond" style="color: var(--text-main); font-size:13px;">dist[u] + cost[v] < dist[v]</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">minimum path cost =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Popped Cell</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Neighbor</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-blue); border-width:2px;"></span> In Priority Queue</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Settled (Min Cost Found)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border-color:var(--accent-green)"></span> Final Optimal Path</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let grid = [[1,3,1],[1,5,1],[4,2,1]];
        let R = 3;
        let C = 3;
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];
        const INF = Infinity;

        function init() { loadExample('[[1,3,1],[1,5,1],[4,2,1]]'); }

        function loadExample(str) {
            document.getElementById('g-input').value = str;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                grid = JSON.parse(document.getElementById('g-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (!Array.isArray(grid) || grid.length === 0 || !Array.isArray(grid[0])) {
                    throw "Invalid inputs";
                }
                R = grid.length;
                C = grid[0].length;
                
                setupGrid();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure the grid is a valid 2D array of numbers.");
            }
        }

        function setupGrid() {
            const container = document.getElementById('grid-wrapper');
            container.innerHTML = '';
            
            container.style.gridTemplateColumns = `repeat(${C}, 70px)`;
            container.style.gridTemplateRows = `repeat(${R}, 70px)`;

            for (let r = 0; r < R; r++) {
                for (let c = 0; c < C; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.id = `cell-${r}-${c}`;
                    
                    const coord = document.createElement('div');
                    coord.className = 'cell-coord';
                    coord.innerText = `(${r},${c})`;

                    const cost = document.createElement('div');
                    cost.className = 'cell-cost';
                    cost.innerText = grid[r][c];

                    const dist = document.createElement('div');
                    dist.className = 'cell-dist';
                    dist.id = `dist-${r}-${c}`;
                    dist.innerText = '∞';

                    cell.appendChild(coord);
                    cell.appendChild(cost);
                    cell.appendChild(dist);

                    container.appendChild(cell);
                }
            }
        }

        function formatDist(val) { return val === INF ? '∞' : val; }

        function clonePQ(pq) { return pq.map(item => ({...item})); }

        function cloneMatrix(mat) { return mat.map(row => [...row]); }

        function generateSteps() {
            steps = [];
            
            let dist = Array.from({length: R}, () => new Array(C).fill(INF));
            let settled = Array.from({length: R}, () => new Array(C).fill(false));
            let prev = Array.from({length: R}, () => new Array(C).fill(null));
            let pq = []; // Array of {d, r, c}

            dist[0][0] = grid[0][0];
            pq.push({d: grid[0][0], r: 0, c: 0});

            steps.push({
                type: 'init', dist: cloneMatrix(dist), pq: clonePQ(pq), settled: cloneMatrix(settled), finalPath: [],
                u: null, v: null, poppedItem: null, pushedItem: null,
                panel: `<b>Minimum Cost Grid Path (Dijkstra's Algorithm)</b><br>We traverse the grid finding the cheapest path to the bottom-right cell.<br>Initialize <code>dist[0][0] = ${grid[0][0]}</code> (the cost of the start cell itself) and push it to the Min-Heap.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. Grid is ${R}x${C}. Start cell (0,0) cost=${grid[0][0]}.`
            });

            const dirs = [[0, 1], [1, 0], [0, -1], [-1, 0]]; // Right, Down, Left, Up

            while (pq.length > 0) {
                pq.sort((a,b) => a.d - b.d);
                let curr = pq.shift();
                let d = curr.d;
                let r = curr.r;
                let c = curr.c;

                steps.push({
                    type: 'dequeue', dist: cloneMatrix(dist), pq: clonePQ(pq), settled: cloneMatrix(settled), finalPath: [],
                    u: [r,c], v: null, poppedItem: curr, pushedItem: null,
                    panel: `<b>Pop Min-Heap:</b> Extract Cell <b>(${r}, ${c})</b> with accumulated distance <b>${d}</b>.<br>Checking adjacent valid cells...`,
                    statusText: `Processing Cell (${r}, ${c})...`,
                    log: `\nPopped Cell (${r}, ${c}) with dist=${d}.`
                });

                if (settled[r][c]) {
                    steps.push({
                        type: 'stale', dist: cloneMatrix(dist), pq: clonePQ(pq), settled: cloneMatrix(settled), finalPath: [],
                        u: [r,c], v: null, poppedItem: null, pushedItem: null,
                        panel: `Cell <b>(${r}, ${c})</b> is already settled. This is a stale entry in the heap. <b style="color:var(--text-dim)">Skip.</b>`,
                        statusText: `Skipping settled cell.`,
                        log: `  -> Already settled. Skipped.`
                    });
                    continue;
                }

                settled[r][c] = true;

                if (r === R - 1 && c === C - 1) {
                    steps.push({
                        type: 'target_found', dist: cloneMatrix(dist), pq: clonePQ(pq), settled: cloneMatrix(settled), finalPath: [],
                        u: [r,c], v: null, poppedItem: null, pushedItem: null,
                        panel: `<b style="color:var(--accent-green); font-size:16px;">Destination Reached!</b><br>We successfully reached the bottom-right cell <b>(${r}, ${c})</b>.<br>Minimum total cost = <b>${d}</b>. Initiating path backtracking...`,
                        statusText: `Target (${r}, ${c}) reached!`,
                        log: `  -> TARGET (${r}, ${c}) reached with dist ${d}.`,
                        logColor: 'var(--accent-green)'
                    });
                    break;
                }

                for (let [dr, dc] of dirs) {
                    let nr = r + dr;
                    let nc = c + dc;

                    if (nr >= 0 && nr < R && nc >= 0 && nc < C) {
                        steps.push({
                            type: 'check', dist: cloneMatrix(dist), pq: clonePQ(pq), settled: cloneMatrix(settled), finalPath: [],
                            u: [r,c], v: [nr,nc], poppedItem: null, pushedItem: null,
                            panel: `Evaluating adjacent cell <b>(${nr}, ${nc})</b> (Intrinsic cost: <b>${grid[nr][nc]}</b>).<br>Is <code>dist[${r}][${c}] + ${grid[nr][nc]} < dist[${nr}][${nc}]</code>?<br>(<code>${d} + ${grid[nr][nc]} < ${formatDist(dist[nr][nc])}</code>)`,
                            statusText: `Evaluating Cell (${nr}, ${nc})...`,
                            log: `  Check neighbor (${nr}, ${nc}): ${d} + ${grid[nr][nc]} < ${formatDist(dist[nr][nc])}?`
                        });

                        if (d + grid[nr][nc] < dist[nr][nc]) {
                            dist[nr][nc] = d + grid[nr][nc];
                            prev[nr][nc] = [r, c];
                            let pushItem = {d: dist[nr][nc], r: nr, c: nc};
                            pq.push(pushItem);

                            steps.push({
                                type: 'relax', dist: cloneMatrix(dist), pq: clonePQ(pq), settled: cloneMatrix(settled), finalPath: [],
                                u: [r,c], v: [nr,nc], poppedItem: null, pushedItem: pushItem,
                                panel: `<b style="color:var(--accent-green)">Yes!</b> Shorter path found.<br>Update <code>dist[${nr}][${nc}] = ${dist[nr][nc]}</code> and enqueue <code>[${dist[nr][nc]}, (${nr}, ${nc})]</code>.`,
                                statusText: `Relaxed cell (${nr}, ${nc}).`,
                                log: `    -> Relaxed! dist[${nr}][${nc}]=${dist[nr][nc]}. Enqueued.`,
                                logColor: 'var(--accent-blue)'
                            });
                        } else {
                            steps.push({
                                type: 'skip', dist: cloneMatrix(dist), pq: clonePQ(pq), settled: cloneMatrix(settled), finalPath: [],
                                u: [r,c], v: [nr,nc], poppedItem: null, pushedItem: null,
                                panel: `<b style="color:var(--accent-red)">No.</b> <code>${d + grid[nr][nc]} >= ${formatDist(dist[nr][nc])}</code>.<br>Current path is already optimal. Skip.`,
                                statusText: `No update needed.`,
                                log: `    -> Suboptimal distance. Skipped.`
                            });
                        }
                    }
                }
            }

            let path = [];
            let curr = [R-1, C-1];
            while (curr) {
                path.push(curr);
                curr = prev[curr[0]][curr[1]];
            }
            path.reverse();

            steps.push({
                type: 'final', dist: cloneMatrix(dist), pq: clonePQ(pq), settled: cloneMatrix(settled), finalPath: path,
                u: null, v: null, poppedItem: null, pushedItem: null,
                panel: `<b>Algorithm Complete!</b><br>The optimal path has been traced backwards.<br>The minimum cost grid path is <b style="color:var(--accent-green); font-size:18px;">${dist[R-1][C-1]}</b>.`,
                complete: true, result: dist[R-1][C-1],
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Path: ${path.map(p => `(${p[0]},${p[1]})`).join('->')}. Cost: ${dist[R-1][C-1]}`,
                logColor: 'var(--accent-green)'
            });
        }

        function renderPQ(step) {
            const container = document.getElementById('pq-tiles');
            container.innerHTML = '';
            
            if (step.pq.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            if (step.poppedItem && step.type === 'dequeue') {
                const pTile = document.createElement('div');
                pTile.className = `tile pq-tile popping`;
                pTile.innerText = `[${step.poppedItem.d}, (${step.poppedItem.r},${step.poppedItem.c})]`;
                container.appendChild(pTile);
            }

            let dispPq = [...step.pq].sort((a,b) => a.d - b.d);

            dispPq.forEach(item => {
                const tile = document.createElement('div');
                tile.className = 'tile pq-tile';
                tile.innerText = `[${item.d}, (${item.r},${item.c})]`;
                
                if (step.pushedItem && step.pushedItem.r === item.r && step.pushedItem.c === item.c && step.pushedItem.d === item.d) {
                    tile.classList.add('pushing');
                }
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Grid
            for(let r=0; r<R; r++) {
                for(let c=0; c<C; c++) {
                    const el = document.getElementById(`cell-${r}-${c}`);
                    const distEl = document.getElementById(`dist-${r}-${c}`);
                    if(!el || !distEl) continue;
                    
                    el.className = 'grid-cell';
                    
                    // Base states
                    if (step.settled[r][c]) {
                        el.classList.add('settled');
                    } else if (step.pq.some(p => p.r === r && p.c === c)) {
                        el.classList.add('in-pq');
                    }
                    
                    // Highlights
                    if (step.u && step.u[0] === r && step.u[1] === c && !step.complete) {
                        el.classList.add('active-u');
                    }
                    if (step.v && step.v[0] === r && step.v[1] === c && !step.complete) {
                        el.classList.add('active-v');
                    }
                    
                    // Path
                    if (step.finalPath && step.finalPath.some(p => p[0] === r && p[1] === c)) {
                        el.classList.add('path-node');
                    }

                    // Dist Update
                    distEl.innerText = formatDist(step.dist[r][c]);
                }
            }

            renderPQ(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? `(${step.u[0]}, ${step.u[1]})` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `(${step.v[0]}, ${step.v[1]})` : '—';

            let eqStr = 'dist[u] + cost[v] < dist[v]';
            if (step.u !== null && step.v !== null) {
                let du = step.dist[step.u[0]][step.u[1]];
                let w = grid[step.v[0]][step.v[1]];
                let dv = step.dist[step.v[0]][step.v[1]] === INF ? '∞' : step.dist[step.v[0]][step.v[1]];
                eqStr = `${du} + ${w} < ${dv}`;
            }
            document.getElementById('val-cond').innerText = eqStr;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
