<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Union-Find Implementation - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
            
            --color-parent: #388bfd;
            --color-rank: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        #n-input { width: 50px; text-align: center; }
        #ops-input { width: 500px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 400px;
            height: 350px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.active { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 12px rgba(227,179,65,0.4); border-color: var(--accent-orange); color: var(--accent-orange); z-index: 2; }
        .node.root-found { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }

        .arrays-col { display: flex; flex-direction: column; gap: 20px; min-width: 300px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 110px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile.parent-tile { border-color: #1a3b6e; color: var(--color-parent); background: #0a172e; }
        .tile.rank-tile { border-color: #3b1e61; color: var(--color-rank); background: #160a26; }

        .tile.highlight-update { animation: highlightFlash 0.6s ease; }
        @keyframes highlightFlash { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.5); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); filter: brightness(1); } }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 730px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 730px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 730px; max-width: 90%; height: 150px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim {
            stroke-dasharray: 6;
            animation: dash 1s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -12; }
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="text" id="n-input" placeholder="5">
        <label class="ui-label">operations =</label>
        <input type="text" id="ops-input" placeholder='[["union",0,1], ["union",2,3], ["find",0], ["find",3], ["union",1,2], ["find",0]]'>
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(5, '[[\x22union\x22,0,1], [\x22union\x22,2,3], [\x22find\x22,0], [\x22find\x22,3], [\x22union\x22,1,2], [\x22find\x22,0]]')">Ex 1</button>
        <button onclick="loadExample(4, '[[\x22find\x22,1], [\x22union\x22,0,1], [\x22union\x22,1,2], [\x22union\x22,0,2], [\x22find\x22,2]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--color-parent);">Parent Array (Pointers to Root):</div>
                <div class="tiles-wrapper" id="parent-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--color-rank);">Rank Array (Tree Depth Upper Bound):</div>
                <div class="tiles-wrapper" id="rank-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Operation</span>
            <span class="info-value" id="val-op" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Active Element(s)</span>
            <span class="info-value" id="val-active" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Found Root</span>
            <span class="info-value" id="val-root" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">final parent array =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Active Node</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Found Root</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple)"></span> Traversing / Compressing Edge</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border: 2px solid var(--border-main)"></span> Standard Edge (Child ➔ Parent)</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let N = 5;
        let opsList = [["union",0,1], ["union",2,3], ["find",0], ["find",3], ["union",1,2], ["find",0]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];

        function init() { loadExample(5, '[["union",0,1], ["union",2,3], ["find",0], ["find",3], ["union",1,2], ["find",0]]'); }

        function loadExample(n_val, ops_str) {
            document.getElementById('n-input').value = n_val;
            document.getElementById('ops-input').value = ops_str;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                N = parseInt(document.getElementById('n-input').value);
                const opsStr = document.getElementById('ops-input').value;
                opsList = JSON.parse(opsStr);

                if (isNaN(N) || N <= 0) throw "Invalid N";
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure N is positive and operations is a valid JSON array.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            const cx = 200;
            const cy = 175;
            const radius = 120;

            for (let i = 0; i < N; i++) {
                const angle = (Math.PI * 2 * i) / N - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            let parentArr = Array.from({length: N}, (_, i) => i);
            let rankArr = new Array(N).fill(0);

            function pushStep(opStr, panelStr, statusStr, logStr, activeNodes=[], activeEdge=null, rootFound=null, type='process', updatedParentIdx=null, updatedRankIdx=null) {
                steps.push({
                    type: type,
                    parent: [...parentArr], rank: [...rankArr],
                    activeNodes: activeNodes, activeEdge: activeEdge,
                    opStr: opStr, rootFound: rootFound,
                    updatedParentIdx: updatedParentIdx, updatedRankIdx: updatedRankIdx,
                    panel: panelStr, statusText: statusStr, log: logStr
                });
            }

            pushStep(`Initialization`, `Initialize Union-Find with ${N} elements.<br>Each element is its own parent (roots of their own sets). Rank array is 0.`, `Ready.`, `Initialized DSU with N=${N}`);

            function find(i, opContext) {
                pushStep(opContext, `<b>Find(${i})</b>: Starting search for the root of <code>${i}</code>.`, `Finding root of ${i}...`, `\nExecuting Find(${i})`, [i]);
                
                let curr = i;
                let path = [curr];
                
                while (parentArr[curr] !== curr) {
                    let p = parentArr[curr];
                    pushStep(opContext, `Node <code>${curr}</code> is not its own parent.<br>Traversing up the tree to its parent <code>${p}</code>.`, `Traversing to ${p}...`, `  ${curr} -> ${p}`, [curr, p], [curr, p]);
                    curr = p;
                    path.push(curr);
                }
                
                let root = curr;
                pushStep(opContext, `Node <code>${root}</code> is its own parent.<br><b style="color:var(--accent-green)">Root found: ${root}</b>.`, `Root of ${i} is ${root}.`, `  Root found: ${root}`, [root], null, root);

                // Path compression
                if (path.length > 2) {
                    let compressed = false;
                    for (let k = 0; k < path.length - 1; k++) {
                        let node = path[k];
                        if (parentArr[node] !== root) {
                            parentArr[node] = root;
                            compressed = true;
                            pushStep(opContext, `<b>Path Compression</b>: Optimizing the tree by pointing <code>${node}</code> directly to root <code>${root}</code>.`, `Compressing path...`, `  Path compression: parent[${node}] = ${root}`, [node, root], [node, root], root, 'process', node, null);
                        }
                    }
                    if (compressed) {
                        pushStep(opContext, `Path compression complete. Tree is now flatter.`, `Path compressed.`, `  Path compression finished.`, [root], null, root);
                    }
                }

                return root;
            }

            for (let op of opsList) {
                let type = op[0];
                
                if (type === 'find') {
                    let u = op[1];
                    let opStr = `Find(${u})`;
                    let root = find(u, opStr);
                    pushStep(opStr, `<b>Result of Find(${u})</b> is <b style="color:var(--accent-green)">${root}</b>.`, `Find(${u}) completed.`, `Result: Find(${u}) -> ${root}`, [root], null, root);
                    
                } else if (type === 'union') {
                    let u = op[1];
                    let v = op[2];
                    let opStr = `Union(${u}, ${v})`;
                    
                    pushStep(opStr, `<b>Union(${u}, ${v})</b>: First, we need to find the roots of both elements to see if they belong to different sets.`, `Executing Union(${u}, ${v})...`, `\nExecuting Union(${u}, ${v})`, [u, v]);
                    
                    let rootU = find(u, opStr);
                    let rootV = find(v, opStr);

                    if (rootU === rootV) {
                        pushStep(opStr, `Roots are the same (<code>${rootU}</code>).<br>Elements <code>${u}</code> and <code>${v}</code> are already in the same set. Cycle detected! No action taken.`, `Already unioned.`, `  Roots match (${rootU} == ${rootV}). No action taken.`, [rootU], null, rootU);
                    } else {
                        let logStr = '';
                        if (rankArr[rootU] < rankArr[rootV]) {
                            parentArr[rootU] = rootV;
                            logStr = `  rank[${rootU}] < rank[${rootV}]. Attached ${rootU} under ${rootV}.`;
                            pushStep(opStr, `Roots differ. <code>rank[${rootU}] < rank[${rootV}]</code>.<br>Attaching smaller tree under larger tree:<br>Setting <code>parent[${rootU}] = ${rootV}</code>.`, `Union by rank...`, logStr, [rootU, rootV], [rootU, rootV], null, 'process', rootU, null);
                        } else if (rankArr[rootU] > rankArr[rootV]) {
                            parentArr[rootV] = rootU;
                            logStr = `  rank[${rootU}] > rank[${rootV}]. Attached ${rootV} under ${rootU}.`;
                            pushStep(opStr, `Roots differ. <code>rank[${rootU}] > rank[${rootV}]</code>.<br>Attaching smaller tree under larger tree:<br>Setting <code>parent[${rootV}] = ${rootU}</code>.`, `Union by rank...`, logStr, [rootV, rootU], [rootV, rootU], null, 'process', rootV, null);
                        } else {
                            parentArr[rootV] = rootU;
                            rankArr[rootU]++;
                            logStr = `  Ranks equal. Attached ${rootV} under ${rootU}. Increased rank of ${rootU} to ${rankArr[rootU]}.`;
                            pushStep(opStr, `Roots differ and ranks are equal.<br>Setting <code>parent[${rootV}] = ${rootU}</code> and incrementing <code>rank[${rootU}]</code> to ${rankArr[rootU]}.`, `Union by rank (equal)...`, logStr, [rootV, rootU], [rootV, rootU], null, 'process', rootV, rootU);
                        }
                    }
                }
            }

            pushStep(`Complete`, `<b>All operations complete!</b>`, `Algorithm finished.`, `\nFinished processing all operations.`);
            steps[steps.length - 1].complete = true;
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            
            const lines = svg.querySelectorAll('line');
            lines.forEach(l => l.remove());

            const nodeRadius = 22;

            for (let i = 0; i < N; i++) {
                let parent = step.parent[i];
                if (parent === i) continue; // Root node, no edge

                const p1 = nodeCoords[i]; // Child
                const p2 = nodeCoords[parent]; // Parent
                if(!p1 || !p2) continue;

                let isActiveEdge = step.activeEdge && ((step.activeEdge[0] === i && step.activeEdge[1] === parent) || (step.activeEdge[0] === parent && step.activeEdge[1] === i));

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrink = nodeRadius + 4; 
                
                const x1 = p1.x + (dx/len) * shrink;
                const y1 = p1.y + (dy/len) * shrink;
                const x2 = p2.x - (dx/len) * shrink;
                const y2 = p2.y - (dy/len) * shrink;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);

                if (isActiveEdge) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '3');
                    line.setAttribute('marker-end', 'url(#arrow-active)');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(line);
                }
            }
        }

        function renderArray(containerId, array, typeClass, updatedIndex) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            array.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile ${typeClass}`;
                tile.innerText = val;
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                
                if (updatedIndex === i) {
                    tile.classList.add('highlight-update');
                }

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<N; i++) {
                const node = document.getElementById(`node-${i}`);
                if(!node) continue;
                node.className = 'node';
                
                if (step.rootFound === i) node.classList.add('root-found');
                else if (step.activeNodes.includes(i)) node.classList.add('active');
            }

            drawEdges(step);

            // Render Arrays
            renderArray('parent-tiles', step.parent, 'parent-tile', step.updatedParentIdx);
            renderArray('rank-tiles', step.rank, 'rank-tile', step.updatedRankIdx);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-op').innerText = step.opStr !== null ? step.opStr : '—';
            document.getElementById('val-active').innerText = step.activeNodes.length > 0 ? step.activeNodes.join(', ') : '—';
            document.getElementById('val-root').innerHTML = step.rootFound !== null ? `<b>${step.rootFound}</b>` : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? `[${step.parent.join(', ')}]` : '—';
            if (step.complete) resVal.classList.add('pop');
            else resVal.classList.remove('pop');

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
