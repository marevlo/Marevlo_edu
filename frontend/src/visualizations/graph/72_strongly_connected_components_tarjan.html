<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strongly Connected Components (Tarjan's Algorithm) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;

            /* SCC Colors */
            --scc-0: #e3b341;
            --scc-1: #388bfd;
            --scc-2: #3fb950;
            --scc-3: #f85149;
            --scc-4: #a371f7;
            --scc-5: #ff7b72;
            --scc-6: #d2a8ff;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 480px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 2;
        }
        
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 4; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 3; color: var(--accent-purple); }
        
        .node.in-stack { box-shadow: 0 0 10px var(--accent-blue); border-color: var(--accent-blue); }

        .scc-node-0 { background: rgba(227, 179, 65, 0.15); border-color: var(--scc-0); color: var(--scc-0); box-shadow: 0 0 15px rgba(227,179,65,0.4); z-index: 5;}
        .scc-node-1 { background: rgba(56, 139, 253, 0.15); border-color: var(--scc-1); color: var(--scc-1); box-shadow: 0 0 15px rgba(56,139,253,0.4); z-index: 5;}
        .scc-node-2 { background: rgba(63, 185, 80, 0.15); border-color: var(--scc-2); color: var(--scc-2); box-shadow: 0 0 15px rgba(63,185,80,0.4); z-index: 5;}
        .scc-node-3 { background: rgba(248, 81, 73, 0.15); border-color: var(--scc-3); color: var(--scc-3); box-shadow: 0 0 15px rgba(248,81,73,0.4); z-index: 5;}
        .scc-node-4 { background: rgba(163, 113, 247, 0.15); border-color: var(--scc-4); color: var(--scc-4); box-shadow: 0 0 15px rgba(163,113,247,0.4); z-index: 5;}

        .arrays-col { display: flex; flex-direction: column; gap: 12px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 6px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 75px;}
        .tiles-wrapper { display: flex; gap: 6px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 38px; height: 34px; display: flex; align-items: center; justify-content: center;
            border-radius: 4px; font-size: 14px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.disc-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.low-tile { background: #1a150b; border-color: var(--accent-orange); color: var(--accent-orange); }
        .tile.stack-tile { background: #1f1f1f; border-color: var(--text-dim); color: var(--text-main); }
        .tile.in-stack-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; filter: brightness(1.5);}
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes highlightFlash { 0% { transform: scale(1); } 50% { transform: scale(1.2); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); } }
        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 14px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; text-align: center; word-break: break-all; max-width: 800px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.05); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1.05)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="4">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1], [1,2], [2,0], [1,3]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(4, '[[0,1], [1,2], [2,0], [1,3]]')">Ex 1</button>
        <button onclick="loadExample(5, '[[0,1], [1,2], [2,0], [1,3], [3,4], [4,3]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                    <marker id="arrow-tree" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-green)" />
                    </marker>
                    <marker id="arrow-back" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-orange)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">Discovery Time (disc):</div>
                <div class="tiles-wrapper" id="disc-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">Lowest Link (low):</div>
                <div class="tiles-wrapper" id="low-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">In Stack (inStack):</div>
                <div class="tiles-wrapper" id="instack-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--text-main);">DFS Path Stack:</div>
                <div class="tiles-wrapper" id="stack-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Global Time</span>
            <span class="info-value" id="val-time" style="color: var(--accent-blue);">0</span>
        </div>
        <div class="info-cell">
            <span class="info-label">SCC Condition</span>
            <span class="info-value" id="val-cond" style="color: var(--text-main);">low[u] == disc[u]</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">strongly connected components =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Active Node (u)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Neighbor (v)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-green); border-width:2px;"></span> Tree Edge</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px; border-style:dashed;"></span> Back Edge</div>
        <div class="legend-item"><span class="dot" style="background:var(--scc-0); border-color:transparent;"></span> Formed SCC</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 4;
        let edgesList = [[0,1], [1,2], [2,0], [1,3]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample(4, '[[0,1], [1,2], [2,0], [1,3]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is an integer and edges is a valid 2D array.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 225;
            const cy = 240;
            const radius = 150;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let adj = Array.from({length: V_count}, () => []);
            for (let [u,v] of edgesList) {
                adj[u].push(v);
            }

            let disc = new Array(V_count).fill(-1);
            let low = new Array(V_count).fill(-1);
            let inStack = new Array(V_count).fill(false);
            let stack = [];
            let sccMap = new Array(V_count).fill(-1);
            let sccs = [];
            let time = 0;

            let treeEdges = [];
            let backEdges = [];
            let crossEdges = [];

            steps.push({
                type: 'init', disc: [...disc], low: [...low], inStack: [...inStack], stack: [...stack], sccMap: [...sccMap], time: time, treeEdges: [...treeEdges], backEdges: [...backEdges], crossEdges: [...crossEdges],
                u: null, v: null, updatedDisc: null, updatedLow: null, poppedItem: null, pushedItem: null,
                panel: `<b>Tarjan's Algorithm for SCCs</b><br>We track two values per node: <code>disc</code> (Discovery Time) and <code>low</code> (Lowest reachable time).<br>We also maintain a <code>stack</code> to track nodes in the current DFS path or valid back-edges.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. V=${V_count}.`
            });

            function dfs(u, depth) {
                let pad = "  ".repeat(depth);
                time++;
                disc[u] = time;
                low[u] = time;
                stack.push(u);
                inStack[u] = true;

                steps.push({
                    type: 'visit', disc: [...disc], low: [...low], inStack: [...inStack], stack: [...stack], sccMap: [...sccMap], time: time, treeEdges: [...treeEdges], backEdges: [...backEdges], crossEdges: [...crossEdges],
                    u: u, v: null, updatedDisc: u, updatedLow: u, poppedItem: null, pushedItem: u,
                    panel: `<b>DFS Visit Node ${u}:</b><br>Assign <code>disc[${u}] = ${time}</code> and <code>low[${u}] = ${time}</code>.<br>Push <b>${u}</b> onto the active path stack.`,
                    statusText: `Visiting Node ${u}...`,
                    log: `\n${pad}DFS(${u}): Set disc=${time}, low=${time}. Pushed to stack.`
                });

                let neighbors = adj[u] || [];
                if (neighbors.length === 0) {
                    steps.push({
                        type: 'no_neighbors', disc: [...disc], low: [...low], inStack: [...inStack], stack: [...stack], sccMap: [...sccMap], time: time, treeEdges: [...treeEdges], backEdges: [...backEdges], crossEdges: [...crossEdges],
                        u: u, v: null, updatedDisc: null, updatedLow: null, poppedItem: null, pushedItem: null,
                        panel: `Node <b>${u}</b> has no outgoing edges.`,
                        statusText: `No neighbors for Node ${u}.`,
                        log: `${pad}  Node ${u} has no neighbors.`
                    });
                }

                for (let v of neighbors) {
                    steps.push({
                        type: 'check', disc: [...disc], low: [...low], inStack: [...inStack], stack: [...stack], sccMap: [...sccMap], time: time, treeEdges: [...treeEdges], backEdges: [...backEdges], crossEdges: [...crossEdges],
                        u: u, v: v, updatedDisc: null, updatedLow: null, poppedItem: null, pushedItem: null,
                        panel: `Checking directed edge <b>${u} ➔ ${v}</b>.<br>Is <b>${v}</b> unvisited? Or is it in the active stack?`,
                        statusText: `Evaluating edge ${u} ➔ ${v}...`,
                        log: `${pad}  Evaluating edge ${u}->${v}...`
                    });

                    if (disc[v] === -1) {
                        treeEdges.push([u, v]);
                        
                        steps.push({
                            type: 'recurse', disc: [...disc], low: [...low], inStack: [...inStack], stack: [...stack], sccMap: [...sccMap], time: time, treeEdges: [...treeEdges], backEdges: [...backEdges], crossEdges: [...crossEdges],
                            u: u, v: v, updatedDisc: null, updatedLow: null, poppedItem: null, pushedItem: null,
                            panel: `Node <b>${v}</b> is unvisited (<code>disc[${v}] == -1</code>). This is a <b style="color:var(--accent-green)">Tree Edge</b>.<br>Recursively call <code>DFS(${v})</code>.`,
                            statusText: `Recursing into Node ${v}...`,
                            log: `${pad}    -> Unvisited. Recursing into DFS(${v}).`
                        });

                        dfs(v, depth + 1);

                        let minLow = Math.min(low[u], low[v]);
                        let lowUpdated = minLow !== low[u];
                        low[u] = minLow;

                        steps.push({
                            type: 'update_low_tree', disc: [...disc], low: [...low], inStack: [...inStack], stack: [...stack], sccMap: [...sccMap], time: time, treeEdges: [...treeEdges], backEdges: [...backEdges], crossEdges: [...crossEdges],
                            u: u, v: v, updatedDisc: null, updatedLow: lowUpdated ? u : null, poppedItem: null, pushedItem: null,
                            panel: `Returned from <code>DFS(${v})</code> to <b>${u}</b>.<br>Update <code>low[${u}] = min(low[${u}], low[${v}]) = min(${low[u]}, ${low[v]}) = <b>${low[u]}</b></code>.`,
                            statusText: `Backtracked to ${u}. Updated low.`,
                            log: `${pad}  <- Backtracked from ${v} to ${u}. Update low[${u}] = min(${low[u]}, ${low[v]}) = ${low[u]}.`
                        });

                    } else if (inStack[v]) {
                        backEdges.push([u, v]);
                        let minLow = Math.min(low[u], disc[v]);
                        let lowUpdated = minLow !== low[u];
                        low[u] = minLow;

                        steps.push({
                            type: 'update_low_back', disc: [...disc], low: [...low], inStack: [...inStack], stack: [...stack], sccMap: [...sccMap], time: time, treeEdges: [...treeEdges], backEdges: [...backEdges], crossEdges: [...crossEdges],
                            u: u, v: v, updatedDisc: null, updatedLow: lowUpdated ? u : null, poppedItem: null, pushedItem: null,
                            panel: `Node <b>${v}</b> is already visited AND in the active stack! This is a <b style="color:var(--accent-orange)">Back Edge</b>.<br>Update <code>low[${u}] = min(low[${u}], disc[${v}]) = min(${low[u]}, ${disc[v]}) = <b>${low[u]}</b></code>.`,
                            statusText: `Back-edge found to ${v}.`,
                            log: `${pad}    -> Back-edge to ${v} (in stack). Update low[${u}] = min(${low[u]}, ${disc[v]}) = ${low[u]}.`
                        });
                    } else {
                        crossEdges.push([u, v]);
                        steps.push({
                            type: 'cross_edge', disc: [...disc], low: [...low], inStack: [...inStack], stack: [...stack], sccMap: [...sccMap], time: time, treeEdges: [...treeEdges], backEdges: [...backEdges], crossEdges: [...crossEdges],
                            u: u, v: v, updatedDisc: null, updatedLow: null, poppedItem: null, pushedItem: null,
                            panel: `Node <b>${v}</b> is visited but <b style="color:var(--accent-red)">NOT</b> in the active stack. This is a Cross Edge to an already fully processed SCC.<br>We ignore it. <b style="color:var(--text-dim)">Skip.</b>`,
                            statusText: `Cross edge to ${v}. Skipped.`,
                            log: `${pad}    -> Cross edge to ${v} (not in stack). Skipped.`
                        });
                    }
                }

                steps.push({
                    type: 'check_scc', disc: [...disc], low: [...low], inStack: [...inStack], stack: [...stack], sccMap: [...sccMap], time: time, treeEdges: [...treeEdges], backEdges: [...backEdges], crossEdges: [...crossEdges],
                    u: u, v: null, updatedDisc: null, updatedLow: null, poppedItem: null, pushedItem: null,
                    panel: `Finished exploring neighbors of <b>${u}</b>.<br>Check SCC condition: Is <code>low[${u}] == disc[${u}]</code>? (<code>${low[u]} == ${disc[u]}</code>)`,
                    statusText: `Checking SCC condition for ${u}...`,
                    log: `${pad}Check SCC condition for ${u}: low=${low[u]}, disc=${disc[u]}.`
                });

                if (low[u] === disc[u]) {
                    let currentSCC = [];
                    let w;
                    
                    steps.push({
                        type: 'scc_found', disc: [...disc], low: [...low], inStack: [...inStack], stack: [...stack], sccMap: [...sccMap], time: time, treeEdges: [...treeEdges], backEdges: [...backEdges], crossEdges: [...crossEdges],
                        u: u, v: null, updatedDisc: null, updatedLow: null, poppedItem: null, pushedItem: null,
                        panel: `<b style="color:var(--accent-green)">Yes!</b> Node <b>${u}</b> is the root of a Strongly Connected Component.<br>We will pop nodes from the stack until <b>${u}</b> is popped to form the SCC.`,
                        statusText: `SCC root found at ${u}!`,
                        log: `${pad}  => SCC root found at ${u}. Popping stack...`,
                        logColor: 'var(--accent-green)'
                    });

                    do {
                        w = stack.pop();
                        inStack[w] = false;
                        currentSCC.push(w);
                        sccMap[w] = sccs.length;
                        
                        steps.push({
                            type: 'scc_pop', disc: [...disc], low: [...low], inStack: [...inStack], stack: [...stack], sccMap: [...sccMap], time: time, treeEdges: [...treeEdges], backEdges: [...backEdges], crossEdges: [...crossEdges],
                            u: u, v: null, updatedDisc: null, updatedLow: null, poppedItem: w, pushedItem: null,
                            panel: `Popping Node <b>${w}</b> from the stack and adding it to the current SCC.<br>Set <code>inStack[${w}] = False</code>.`,
                            statusText: `Popped ${w} into SCC.`,
                            log: `${pad}    Popped ${w} into SCC ${sccs.length}.`
                        });
                    } while (w !== u);

                    sccs.push([...currentSCC]);

                    steps.push({
                        type: 'scc_complete', disc: [...disc], low: [...low], inStack: [...inStack], stack: [...stack], sccMap: [...sccMap], time: time, treeEdges: [...treeEdges], backEdges: [...backEdges], crossEdges: [...crossEdges],
                        u: u, v: null, updatedDisc: null, updatedLow: null, poppedItem: null, pushedItem: null,
                        panel: `<b>SCC Completed!</b><br>The newly formed Strongly Connected Component is <b style="color:var(--accent-orange)">[${currentSCC.join(', ')}]</b>.`,
                        statusText: `SCC formed: [${currentSCC.join(', ')}].`,
                        log: `${pad}  => Formed SCC: [${currentSCC.join(', ')}]`,
                        logColor: 'var(--accent-orange)'
                    });

                } else {
                    steps.push({
                        type: 'scc_skip', disc: [...disc], low: [...low], inStack: [...inStack], stack: [...stack], sccMap: [...sccMap], time: time, treeEdges: [...treeEdges], backEdges: [...backEdges], crossEdges: [...crossEdges],
                        u: u, v: null, updatedDisc: null, updatedLow: null, poppedItem: null, pushedItem: null,
                        panel: `<b style="color:var(--accent-red)">No.</b> Node <b>${u}</b> is not the root of an SCC (it reaches an earlier node).<br>It remains in the stack for now. Backtrack to caller.`,
                        statusText: `Node ${u} is not an SCC root.`,
                        log: `${pad}  -> Not an SCC root. Returning.`
                    });
                }
            }

            for (let i = 0; i < V_count; i++) {
                if (disc[i] === -1) {
                    dfs(i, 0);
                }
            }

            let resultStr = `[${sccs.map(scc => `[${scc.join(',')}]`).join(', ')}]`;

            steps.push({
                type: 'final', disc: [...disc], low: [...low], inStack: [...inStack], stack: [...stack], sccMap: [...sccMap], time: time, treeEdges: [...treeEdges], backEdges: [...backEdges], crossEdges: [...crossEdges],
                u: null, v: null, updatedDisc: null, updatedLow: null, poppedItem: null, pushedItem: null,
                panel: `<b>Algorithm Complete!</b><br>All nodes have been processed and grouped.<br>The Strongly Connected Components are <b style="color:var(--accent-green); font-size:18px;">${resultStr}</b>.`,
                complete: true, result: resultStr,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. SCCs: ${resultStr}`,
                logColor: 'var(--accent-blue)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawn = new Set();

            edgesList.forEach(e => {
                const u = e[0];
                const v = e[1];
                
                let key = `${u}->${v}`;
                if (drawn.has(key)) return;
                drawn.add(key);

                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.u !== null && step.v !== null && step.u === u && step.v === v;
                let isTree = step.treeEdges && step.treeEdges.some(te => te[0] === u && te[1] === v);
                let isBack = step.backEdges && step.backEdges.some(be => be[0] === u && be[1] === v);

                let hasReverse = edgesList.some(re => re[0]===v && re[1]===u);
                let dStr = "";
                
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrink = nodeRadius + 2; 

                if (hasReverse) {
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const nx = -dy / len;
                    const ny = dx / len;
                    const curveOffset = 20; 
                    const cx = midX + nx * curveOffset;
                    const cy = midY + ny * curveOffset;
                    
                    const x1 = p1.x + (dx/len)*shrink; 
                    const y1 = p1.y + (dy/len)*shrink;
                    const x2 = p2.x - (dx/len)*shrink; 
                    const y2 = p2.y - (dy/len)*shrink;
                    dStr = `M ${x1},${y1} Q ${cx},${cy} ${x2},${y2}`;
                } else {
                    const x1 = p1.x + (dx/len)*shrink; 
                    const y1 = p1.y + (dy/len)*shrink;
                    const x2 = p2.x - (dx/len)*shrink; 
                    const y2 = p2.y - (dy/len)*shrink;
                    dStr = `M ${x1},${y1} L ${x2},${y2}`;
                }

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', dStr);
                path.setAttribute('fill', 'transparent');

                if (isChecking) {
                    path.setAttribute('stroke', 'var(--accent-purple)');
                    path.setAttribute('stroke-width', '4');
                    path.setAttribute('marker-end', 'url(#arrow-active)');
                    path.classList.add('line-anim');
                    path.setAttribute('stroke-dasharray', '8');
                    setTimeout(() => svg.appendChild(path), 0);
                } else if (isTree) {
                    path.setAttribute('stroke', 'var(--accent-green)');
                    path.setAttribute('stroke-width', '3');
                    path.setAttribute('marker-end', 'url(#arrow-tree)');
                    svg.appendChild(path);
                } else if (isBack) {
                    path.setAttribute('stroke', 'var(--accent-orange)');
                    path.setAttribute('stroke-width', '3');
                    path.setAttribute('stroke-dasharray', '6');
                    path.setAttribute('marker-end', 'url(#arrow-back)');
                    svg.appendChild(path);
                } else {
                    path.setAttribute('stroke', 'var(--border-main)');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(path);
                }
            });
        }

        function renderStack(step) {
            const container = document.getElementById('stack-tiles');
            container.innerHTML = '';
            
            if (step.stack.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            step.stack.forEach((val, index) => {
                const tile = document.createElement('div');
                tile.className = `tile stack-tile`;
                if (step.pushedItem === val && index === step.stack.length - 1) {
                    tile.classList.add('pushing');
                }
                tile.innerText = val;
                container.appendChild(tile);
            });

            if (step.poppedItem !== null && step.type === 'scc_pop') {
                const popTile = document.createElement('div');
                popTile.className = `tile stack-tile popping`;
                popTile.innerText = step.poppedItem;
                container.appendChild(popTile);
            }
        }

        function renderArray(containerId, arr, tileClass, stepData, updateKey) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile ${tileClass}`;
                
                if (stepData[updateKey] === i) {
                    tile.classList.add('highlight-update');
                }
                
                if (tileClass === 'in-stack-tile') {
                    tile.innerText = val ? 'T' : 'F';
                    if (!val) {
                        tile.style.background = '#21262d';
                        tile.style.borderColor = 'var(--border-main)';
                        tile.style.color = 'var(--text-dim)';
                    }
                } else {
                    if (val === -1) {
                        tile.innerText = '—';
                        tile.style.background = '#21262d';
                        tile.style.borderColor = 'var(--border-main)';
                        tile.style.color = 'var(--text-dim)';
                    } else {
                        tile.innerText = val;
                    }
                }
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (step.inStack[i]) {
                    el.classList.add('in-stack');
                }
                
                if (step.sccMap[i] !== -1) {
                    let cIdx = step.sccMap[i] % 7;
                    el.classList.add(`scc-node-${cIdx}`);
                }
                
                if (step.u === i && !step.complete) el.classList.add('active-u');
                if (step.v === i && !step.complete) el.classList.add('active-v');
            }

            drawEdges(step);
            renderStack(step);
            
            renderArray('disc-tiles', step.disc, 'disc-tile', step, 'updatedDisc');
            renderArray('low-tiles', step.low, 'low-tile', step, 'updatedLow');
            renderArray('instack-tiles', step.inStack, 'in-stack-tile', step, 'none');

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? `${step.u}` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `${step.v}` : '—';
            document.getElementById('val-time').innerText = step.time;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
