<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Min Cut &middot; Stoer&ndash;Wagner</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:300px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.45); background:rgba(34,197,94,.07);}
.narration.done::before{content:'\2702'; color:var(--accent-green);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto;}
svg.graph{display:block; width:430px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2; opacity:.5; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.tree{stroke:var(--accent-purple); stroke-width:3; opacity:1; filter:drop-shadow(0 0 5px rgba(168,85,247,.55));}
.edge.cut{stroke:var(--accent-orange); stroke-width:3.5; opacity:1; stroke-dasharray:8; animation:dash 1s linear infinite; filter:drop-shadow(0 0 6px rgba(245,165,36,.6));}
.edge.best{stroke:var(--accent-green); stroke-width:4; opacity:1; filter:drop-shadow(0 0 7px rgba(34,197,94,.7));}
.elabel-bg{fill:#0b1322; stroke:var(--border-main); stroke-width:1; transition:stroke .35s;}
.elabel-bg.cut{stroke:var(--accent-orange);} .elabel-bg.best{stroke:var(--accent-green);} .elabel-bg.tree{stroke:var(--accent-purple);}
.elabel{font-family:var(--mono); font-weight:700; font-size:11px; fill:var(--text-dim); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.elabel.cut{fill:#ffd591;} .elabel.best{fill:#bbf7d0;} .elabel.tree{fill:#e9d5ff;}
.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s, opacity .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:13px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode.absorbed .nc{opacity:.18; stroke-dasharray:3;} .gnode.absorbed .nl{opacity:.3;}
.gnode.inA .nc{stroke:var(--accent-blue); fill:rgba(6,182,212,.16); filter:drop-shadow(0 0 8px rgba(6,182,212,.5)); stroke-width:3;}
.gnode.inA .nl{fill:#a5f3fc;}
.gnode.last .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.18); filter:drop-shadow(0 0 11px rgba(245,165,36,.65)); stroke-width:3.5;}
.gnode.last .nl{fill:#ffd591;}
.gnode.prev .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.18); filter:drop-shadow(0 0 9px rgba(168,85,247,.55)); stroke-width:3;}
.gnode.prev .nl{fill:#e9d5ff;}
.gnode.setA .nc{stroke:var(--accent-blue); fill:rgba(6,182,212,.16); filter:drop-shadow(0 0 9px rgba(6,182,212,.5)); stroke-width:3;}
.gnode.setA .nl{fill:#a5f3fc;}
.gnode.setB .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.16); filter:drop-shadow(0 0 9px rgba(34,197,94,.5)); stroke-width:3;}
.gnode.setB .nl{fill:#bbf7d0;}

.side{display:flex; flex-direction:column; gap:12px; min-width:230px; flex:1 1 230px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel.stat .cap{color:var(--accent-orange);} .panel.sset .cap{color:var(--accent-blue);}
.stat-row{display:flex; justify-content:space-between; align-items:center; font-family:var(--mono); font-size:13px; padding:4px 0; border-bottom:1px solid rgba(255,255,255,.05); color:var(--text-dim);}
.stat-row:last-child{border-bottom:none;}
.stat-row b{font-weight:800;}
.stat-row .phase{color:#a5f3fc;} .stat-row .cop{color:var(--accent-orange);} .stat-row .best{color:#bbf7d0;}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start;}
.tile{min-width:34px; height:34px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.tile.a{border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.1); color:#a5f3fc;}
.tile.last{border-color:rgba(245,165,36,.5); background:rgba(245,165,36,.12); color:#ffd591;}
.tiles .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.ph b{color:var(--accent-blue);} .pill.co b{color:var(--accent-orange);} .pill.bs b{color:var(--accent-green);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-16;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>V =</label>
  <input type="text" id="v-input" class="small-input" value="3">
  <label>edges =</label>
  <input type="text" id="e-input" class="large-input" value="[[0,1,2],[1,2,3],[0,2,1]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(3,'[[0,1,2],[1,2,3],[0,2,1]]')">Ex 1</button>
  <button onclick="loadExample(4,'[[0,1,3],[1,2,4],[2,3,5],[3,0,2],[0,2,1]]')">Ex 2</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Global Minimum Cut <span class="sub">&middot; Stoer&ndash;Wagner maximum-adjacency ordering</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 430 380"></svg></div>
      <div class="side">
        <div class="panel stat">
          <div class="cap">PHASE STATISTICS</div>
          <div class="stat-row"><span>Phase</span><b class="phase" id="stat-phase">&mdash;</b></div>
          <div class="stat-row"><span>Cut-of-the-phase</span><b class="cop" id="stat-cop">&mdash;</b></div>
          <div class="stat-row"><span>Best global cut</span><b class="best" id="stat-best">&infin;</b></div>
        </div>
        <div class="panel sset">
          <div class="cap">MAX-ADJACENCY ORDER &middot; SET A</div>
          <div class="tiles" id="a-tiles"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill ph">phase <b id="pill-phase">&mdash;</b></span>
        <span class="pill co">cut-of-phase <b id="pill-cop">&mdash;</b></span>
        <span class="pill bs">best cut <b id="pill-best">&infin;</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>set A (ordered)</span>
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>last vertex (cut-of-phase)</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>global min cut</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','stoerWagner'],['src','(V, edges):']],
  [['src','  build weighted adjacency matrix w[][]']],
  [['kw','  while'],['src',' more than 1 super-node remains:']],
  [['src','    A = [start];  maximum-adjacency ordering:']],
  [['kw','    while'],['src',' A != all: add vertex with max w(A, .)']],
  [['src','    s = 2nd-last added, t = last added']],
  [['src','    cutOfPhase = total weight from t to A\\{t}']],
  [['kw','    if'],['src',' cutOfPhase < best: best = cutOfPhase']],
  [['src','    merge t into s (combine edge weights)']],
  [['kw','  return'],['src',' best  # global minimum cut']],
];

let V_count=3;
let originalEdges=[[0,1,2],[1,2,3],[0,2,1]];
let nodeCoords={};
let steps=[], stepIndex=0, timer=null;
const delays=[2600,1300,650];
const gnodes={};
let confettiArmed=true;

function init(){ buildCode(); loadExample(3,'[[0,1,2],[1,2,3],[0,2,1]]'); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(v,eStr){
  document.getElementById('v-input').value=v; document.getElementById('e-input').value=eStr;
  parseAndGen();
}
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    V_count=parseInt(document.getElementById('v-input').value,10);
    originalEdges=JSON.parse(document.getElementById('e-input').value.replace(/\(/g,'[').replace(/\)/g,']'));
    if(isNaN(V_count)||V_count<2||!Array.isArray(originalEdges)) throw 'bad';
    if(V_count>8){ alert('For clarity keep V <= 8.'); return; }
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid input. V must be an integer >= 2 and edges a list of [u, v, weight].'); }
}

function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; nodeCoords={}; for(const k in gnodes) delete gnodes[k];
  const W=430,H=380, cx=215, cy=190, R=140;
  for(let i=0;i<V_count;i++){
    const ang=(Math.PI*2*i)/V_count - Math.PI/2;
    nodeCoords[i]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)};
  }
  // edges (line + weight label) — built ONCE, keyed by id
  originalEdges.forEach((e,i)=>{
    const u=e[0], v=e[1]; const p1=nodeCoords[u], p2=nodeCoords[v]; if(!p1||!p2) return;
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('class','edge'); ln.id='e'+i;
    ln.setAttribute('x1',p1.x); ln.setAttribute('y1',p1.y); ln.setAttribute('x2',p2.x); ln.setAttribute('y2',p2.y);
    svg.appendChild(ln);
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
    const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
    bg.setAttribute('class','elabel-bg'); bg.id='elb'+i; bg.setAttribute('rx',4);
    bg.setAttribute('x',mx-13); bg.setAttribute('y',my-9); bg.setAttribute('width',26); bg.setAttribute('height',18);
    svg.appendChild(bg);
    const tx=document.createElementNS('http://www.w3.org/2000/svg','text');
    tx.setAttribute('class','elabel'); tx.id='el'+i; tx.setAttribute('x',mx); tx.setAttribute('y',my);
    tx.textContent=e[2];
    svg.appendChild(tx);
  });
  // nodes on top
  for(let id=0; id<V_count; id++){
    const p=nodeCoords[id]; if(!p) continue;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode'); g.id='gn'+id;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',20);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=id;
    g.appendChild(c); g.appendChild(t); svg.appendChild(g); gnodes[id]=g;
  }
}

function generateSteps(){
  steps=[];
  // weighted adjacency matrix over super-nodes (indexed by an original vertex id)
  let w=Array.from({length:V_count},()=>new Array(V_count).fill(0));
  for(const e of originalEdges){ const u=e[0],v=e[1],c=e[2]; if(u===v) continue; w[u][v]+=c; w[v][u]+=c; }
  let present=[...Array(V_count).keys()];
  let merged=present.map(i=>[i]);   // original vertices absorbed into super-node i
  let best=Infinity, bestPartition=null;

  // helper: collect original-vertex sets for a super-node membership snapshot
  const memberStr=arr=>arr.slice().sort((a,b)=>a-b).join(',');

  steps.push({
    code:[0,1], phase:0, present:present.slice(), merged:merged.map(a=>a.slice()),
    A:[], lastNode:null, prevNode:null, cutOfPhase:null, best:Infinity, bestPartition:null,
    treeIds:[], cutIds:[], bestIds:[], absorbed:{},
    narr:`<b>Stoer&ndash;Wagner</b> finds the global minimum cut of a weighted undirected graph. Each phase runs a <b>maximum-adjacency ordering</b>, records the <code>cut-of-the-phase</code>, then merges the last two vertices. Labels show edge weights.`,
    log:`init  V=${V_count}  edges=${originalEdges.length}  best=infinity`
  });

  let phaseNo=0;
  while(present.length>1){
    phaseNo++;
    const start=present[0];
    let A=[start];
    let inA=new Set(A);
    let wsum=new Array(V_count).fill(0);
    for(const x of present) wsum[x]=w[start][x];
    let prev=start, last=start;

    // build absorbed map (original vertices NOT a super-node head are dimmed)
    const absorbed={};
    for(let id=0; id<V_count; id++){ if(!present.includes(id)) absorbed[id]=true; }

    // phase start step
    steps.push({
      code:[2,3], phase:phaseNo, present:present.slice(), merged:merged.map(a=>a.slice()),
      A:A.slice(), lastNode:last, prevNode:null, cutOfPhase:null, best, bestPartition,
      treeIds:[], cutIds:[], bestIds:bestIdsFor(bestPartition), absorbed,
      narr:`<b>Phase ${phaseNo}</b> &middot; ${present.length} super-nodes remain. Start the maximum-adjacency order at <code>${start}</code> and repeatedly add the vertex most tightly connected to set <code>A</code>.`,
      log:`phase ${phaseNo}  super-nodes={${present.map(p=>'{'+memberStr(merged[p])+'}').join(' ')}}  start A=[${start}]`
    });

    while(A.length<present.length){
      let sel=-1, mx=-1;
      for(const x of present){ if(!inA.has(x) && wsum[x]>mx){ mx=wsum[x]; sel=x; } }
      A.push(sel); inA.add(sel); prev=last; last=sel;
      for(const x of present){ if(!inA.has(x)) wsum[x]+=w[sel][x]; }
      // edges currently inside A (the adjacency "tree" so far) for highlight
      steps.push({
        code:[4], phase:phaseNo, present:present.slice(), merged:merged.map(a=>a.slice()),
        A:A.slice(), lastNode:last, prevNode:(A.length>1?prev:null), cutOfPhase:null, best, bestPartition,
        treeIds:edgesInsideIds(A,merged), cutIds:[], bestIds:bestIdsFor(bestPartition), absorbed,
        narr:`Added vertex <code>${last}</code> (connection weight to <code>A</code> = <b>${mx}</b>). Set <code>A</code> is now <code>[${A.join(', ')}]</code>.`,
        log:`  add ${last}  w(A,${last})=${mx}  A=[${A.join(',')}]`
      });
    }

    // cut-of-the-phase = weight from last super-node to the rest of A
    let cutPhase=0;
    for(const x of present){ if(x!==last) cutPhase+=w[last][x]; }
    const isBetter = cutPhase<best;
    if(isBetter){ best=cutPhase; bestPartition=merged[last].slice(); }

    steps.push({
      code:[5,6,7], phase:phaseNo, present:present.slice(), merged:merged.map(a=>a.slice()),
      A:A.slice(), lastNode:last, prevNode:prev, cutOfPhase:cutPhase, best, bestPartition,
      treeIds:[], cutIds:cutEdgesIds(merged[last],present,merged), bestIds:isBetter?bestIdsFor(bestPartition):bestIdsFor(bestPartition), absorbed,
      narr:`Last added is <code>${last}</code>, previous is <code>${prev}</code>. The <b>cut-of-the-phase</b> separates <code>{${memberStr(merged[last])}}</code> from the rest &mdash; its weight is <b>${cutPhase}</b>.` +
           (isBetter?` That is a <b style="color:#bbf7d0">new global minimum</b>.`:` Current best stays <b>${best}</b>.`),
      log:`  cut-of-phase = ${cutPhase}  (separating {${memberStr(merged[last])}})` + (isBetter?`  NEW BEST=${best}`:`  best stays ${best}`)
    });

    // merge t=last into s=prev
    const s=prev, t=last;
    for(const x of present){ if(x!==s && x!==t){ w[s][x]+=w[t][x]; w[x][s]+=w[x][t]; } }
    merged[s]=merged[s].concat(merged[t]);
    present=present.filter(x=>x!==t);

    const absorbed2={};
    for(let id=0; id<V_count; id++){ if(!present.includes(id)) absorbed2[id]=true; }
    steps.push({
      code:[8], phase:phaseNo, present:present.slice(), merged:merged.map(a=>a.slice()),
      A:[], lastNode:null, prevNode:null, cutOfPhase:null, best, bestPartition,
      treeIds:[], cutIds:[], bestIds:bestIdsFor(bestPartition), absorbed:absorbed2,
      narr:`Merge <code>${t}</code> into <code>${s}</code>: super-node <code>${s}</code> now represents <code>{${memberStr(merged[s])}}</code>. Edge weights to shared neighbours are summed.`,
      log:`  merge ${t} -> ${s}   super-node ${s} = {${memberStr(merged[s])}}`
    });
  }

  // final
  const finalA = bestPartition.slice().sort((a,b)=>a-b);
  const finalB = [...Array(V_count).keys()].filter(i=>!bestPartition.includes(i)).sort((a,b)=>a-b);
  steps.push({
    code:[9], phase:phaseNo, present:[...Array(V_count).keys()], merged:null,
    A:[], lastNode:null, prevNode:null, cutOfPhase:null, best, bestPartition,
    treeIds:[], cutIds:[], bestIds:bestIdsFor(bestPartition),
    setA:finalA, setB:finalB, absorbed:{},
    narr:`<b>Global minimum cut found.</b> Partition <code>{${finalA.join(', ')}}</code> | <code>{${finalB.join(', ')}}</code> has the smallest cut weight across all phases &mdash; the global min cut is <b>${best}</b>.`,
    log:`done  global min cut = ${best}   {${finalA.join(',')}} | {${finalB.join(',')}}`,
    complete:true, result:best
  });

  // ---- helpers (closures over originalEdges) ----
  function bestIdsFor(partition){
    if(!partition) return [];
    const inP=new Set(partition);
    const ids=[];
    originalEdges.forEach((e,i)=>{ const a=inP.has(e[0]), b=inP.has(e[1]); if(a!==b) ids.push(i); });
    return ids;
  }
}

// edges crossing from super-node-set 'sideOrig' (orig vertices) to the rest, restricted to present super-nodes
function cutEdgesIds(sideOrig, present, merged){
  const inSide=new Set(sideOrig);
  // present original vertices = union of merged[p] for p in present
  const presentOrig=new Set();
  present.forEach(p=>merged[p].forEach(o=>presentOrig.add(o)));
  const ids=[];
  originalEdges.forEach((e,i)=>{
    const u=e[0],v=e[1];
    if(!presentOrig.has(u)||!presentOrig.has(v)) return;
    if(inSide.has(u)!==inSide.has(v)) ids.push(i);
  });
  return ids;
}
// edges with both endpoints inside the union of super-nodes currently in A
function edgesInsideIds(A, merged){
  const inA=new Set();
  A.forEach(p=>merged[p].forEach(o=>inA.add(o)));
  const ids=[];
  originalEdges.forEach((e,i)=>{ if(inA.has(e[0])&&inA.has(e[1])) ids.push(i); });
  return ids;
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;

  // node membership: map each original vertex to its super-node head (present)
  let headOf={};
  if(step.merged){
    step.present.forEach(p=>{ step.merged[p].forEach(o=>{ headOf[o]=p; }); });
  }
  const Aset=new Set(step.A||[]);
  for(let n=0;n<V_count;n++){
    const g=gnodes[n]; if(!g) continue;
    g.classList.remove('absorbed','inA','last','prev','setA','setB');
    if(step.complete){
      if((step.setA||[]).includes(n)) g.classList.add('setA');
      else g.classList.add('setB');
      continue;
    }
    // dim absorbed vertices (those not currently a super-node head)
    if(step.absorbed && step.absorbed[n]){ g.classList.add('absorbed'); continue; }
    if(headOf[n]!==undefined && headOf[n]!==n){ g.classList.add('absorbed'); continue; }
    if(n===step.lastNode) g.classList.add('last');
    else if(n===step.prevNode) g.classList.add('prev');
    else if(Aset.has(n)) g.classList.add('inA');
  }

  const treeIds=new Set(step.treeIds||[]);
  const cutIds=new Set(step.cutIds||[]);
  const bestIds=new Set(step.bestIds||[]);
  originalEdges.forEach((e,i)=>{
    const ln=document.getElementById('e'+i), bg=document.getElementById('elb'+i), tx=document.getElementById('el'+i);
    if(!ln) return;
    ln.classList.remove('tree','cut','best'); bg.classList.remove('tree','cut','best'); tx.classList.remove('tree','cut','best');
    let cls=null;
    if(step.complete && bestIds.has(i)) cls='best';
    else if(cutIds.has(i)) cls='cut';
    else if(!step.complete && bestIds.has(i)) cls='best';
    else if(treeIds.has(i)) cls='tree';
    if(cls){ ln.classList.add(cls); bg.classList.add(cls); tx.classList.add(cls); }
  });

  // A tiles
  fillTiles('a-tiles', step.A||[], step.lastNode);

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr; narr.classList.toggle('done',!!step.complete);
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });

  document.getElementById('stat-phase').innerHTML=step.phase?step.phase:'&mdash;';
  document.getElementById('stat-cop').innerHTML=step.cutOfPhase!=null?step.cutOfPhase:'&mdash;';
  document.getElementById('stat-best').innerHTML=step.best===Infinity?'&infin;':step.best;
  document.getElementById('pill-phase').innerHTML=step.phase?step.phase:'&mdash;';
  document.getElementById('pill-cop').innerHTML=step.cutOfPhase!=null?step.cutOfPhase:'&mdash;';
  document.getElementById('pill-best').innerHTML=step.best===Infinity?'&infin;':step.best;

  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color='var(--accent-green)'; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fillTiles(id, arr, lastNode){
  const c=document.getElementById(id); c.innerHTML='';
  if(!arr.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ ordering… }'; c.appendChild(e); return; }
  arr.forEach(v=>{ const t=document.createElement('div'); t.className='tile '+(v===lastNode?'last':'a'); t.textContent=v; c.appendChild(t); if(!REDUCED) Motion.pop(t); });
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
