<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Minimum Cut (Subset Partition) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 420px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 2;
        }
        
        .node.set-a { background: rgba(56, 139, 253, 0.15); border-color: var(--accent-blue); color: var(--accent-blue); box-shadow: 0 0 10px rgba(56, 139, 253, 0.4); }
        .node.set-b { background: rgba(227, 179, 65, 0.15); border-color: var(--accent-orange); color: var(--accent-orange); box-shadow: 0 0 10px rgba(227, 179, 65, 0.4); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.mask-tile-1 { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.mask-tile-0 { background: #1a150b; border-color: var(--accent-orange); color: var(--accent-orange); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }

        .edge-label { font-family: monospace; font-weight: bold; font-size: 12px; text-anchor: middle; dominant-baseline: central; fill: var(--text-main); }
        .edge-bg { fill: var(--bg-surface); stroke: var(--border-main); stroke-width: 1px; rx: 4px; }
        .edge-cut .edge-bg { stroke: var(--accent-red); }
        .edge-cut .edge-label { fill: var(--accent-red); }
        .edge-best .edge-bg { stroke: var(--accent-green); }
        .edge-best .edge-label { fill: var(--accent-green); }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="3">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1,2], [1,2,3], [0,2,1]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(3, '[[0,1,2], [1,2,3], [0,2,1]]')">Ex 1</button>
        <button onclick="loadExample(4, '[[0,1,3], [1,2,4], [2,3,5], [3,0,2], [0,2,1]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--text-main);">Partition Bitmask:</div>
                <div class="tiles-wrapper" id="mask-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">1 = Set A (Blue), 0 = Set B (Orange)</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-red);">Current Cut Weight:</div>
                <div style="font-size: 24px; font-weight:bold; color: var(--accent-red); text-align:center; font-family:monospace; margin-top:4px;" id="curr-cut-val">—</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">Best Min Cut Found:</div>
                <div style="font-size: 24px; font-weight:bold; color: var(--accent-green); text-align:center; font-family:monospace; margin-top:4px;" id="min-cut-val">∞</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Set A (Blue)</span>
            <span class="info-value" id="val-setA" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Set B (Orange)</span>
            <span class="info-value" id="val-setB" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Cut Edges (A to B)</span>
            <span class="info-value" id="val-edges" style="color: var(--accent-red);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">global minimum cut weight =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:rgba(56,139,253,0.15); border-color:var(--accent-blue); border-width:2px;"></span> Node in Set A</div>
        <div class="legend-item"><span class="dot" style="background:rgba(227,179,65,0.15); border-color:var(--accent-orange); border-width:2px;"></span> Node in Set B</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--border-main); border-width:2px;"></span> Internal Edge (Ignored)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-red); border-width:3px; border-style:dashed;"></span> Cut Edge (A ↔ B)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-green); border-width:3px;"></span> Best Min Cut Edge</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 3;
        let edgesList = [[0,1,2], [1,2,3], [0,2,1]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [3000, 1500, 750];

        function init() { loadExample(3, '[[0,1,2], [1,2,3], [0,2,1]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                if (V_count > 6) {
                    alert("For visualization purposes, V should be <= 6 to limit the number of subsets.");
                    return;
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is an integer and edges is a valid array of [u, v, weight].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 225;
            const cy = 210;
            const radius = 140;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let minCutVal = Infinity;
            let bestMask = -1;
            let bestEdges = [];
            
            // To prevent duplicate symmetric cuts (e.g. A={0}, B={1,2} vs A={1,2}, B={0})
            // We only iterate up to (1<<(V-1)) - 1. This keeps node (V-1) always in Set B (bit 0).
            let maxMask = (1 << V_count) - 1;
            let limitMask = (1 << (V_count - 1)) - 1;

            steps.push({
                type: 'init', mask: null, setA: [], setB: [], cutEdges: [], cutWeight: 0, minCutVal: minCutVal, bestMask: null,
                panel: `<b>Global Minimum Cut (Subset Partition Evaluation)</b><br>To find the Global Minimum Cut, we can evaluate every possible valid partition of vertices into two non-empty sets, <b>Set A</b> and <b>Set B</b>.<br>We iterate through all valid binary masks to represent these subsets.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. V=${V_count}. Evaluating partitions.`
            });

            for (let mask = 1; mask <= limitMask; mask++) {
                let setA = [];
                let setB = [];
                
                for (let i = 0; i < V_count; i++) {
                    if ((mask & (1 << i)) !== 0) {
                        setA.push(i);
                    } else {
                        setB.push(i);
                    }
                }

                let cutEdges = [];
                let cutWeight = 0;

                edgesList.forEach((e, idx) => {
                    let u = e[0], v = e[1], w = e[2];
                    let uInA = setA.includes(u);
                    let vInA = setA.includes(v);
                    
                    if (uInA !== vInA) {
                        cutEdges.push({u, v, w, idx});
                        cutWeight += w;
                    }
                });

                steps.push({
                    type: 'eval', mask: mask, setA: [...setA], setB: [...setB], cutEdges: [...cutEdges], cutWeight: cutWeight, minCutVal: minCutVal, bestMask: bestMask,
                    panel: `<b>Evaluate Partition: Mask ${mask.toString(2).padStart(V_count, '0')}</b><br>Vertices are split into Set A = {${setA.join(',')}} and Set B = {${setB.join(',')}}.<br>Identifying edges that cross the cut...`,
                    statusText: `Evaluating Mask ${mask}...`,
                    log: `\nTesting Partition: A={${setA.join(',')}}, B={${setB.join(',')}}`
                });

                let isBetter = cutWeight < minCutVal;
                
                if (isBetter) {
                    minCutVal = cutWeight;
                    bestMask = mask;
                    bestEdges = [...cutEdges];

                    steps.push({
                        type: 'update', mask: mask, setA: [...setA], setB: [...setB], cutEdges: [...cutEdges], cutWeight: cutWeight, minCutVal: minCutVal, bestMask: bestMask,
                        panel: `<b style="color:var(--accent-green)">New Minimum Cut Found!</b><br>The sum of weights crossing the cut is <b>${cutWeight}</b>.<br>Since ${cutWeight} < ${minCutVal === cutWeight ? '∞' : 'previous min'}, we update the global minimum cut.`,
                        statusText: `Updated Global Min Cut to ${cutWeight}.`,
                        log: `  -> Cut weight = ${cutWeight}. NEW MINIMUM!`,
                        logColor: 'var(--accent-green)'
                    });
                } else {
                    steps.push({
                        type: 'skip', mask: mask, setA: [...setA], setB: [...setB], cutEdges: [...cutEdges], cutWeight: cutWeight, minCutVal: minCutVal, bestMask: bestMask,
                        panel: `<b style="color:var(--accent-red)">Suboptimal Cut.</b><br>The sum of weights crossing the cut is <b>${cutWeight}</b>.<br>Since ${cutWeight} $\\ge$ ${minCutVal}, we ignore this partition.`,
                        statusText: `Suboptimal partition. Skipped.`,
                        log: `  -> Cut weight = ${cutWeight}. Suboptimal, skipped.`
                    });
                }
            }

            // Final Step showing only the best cut
            let finalSetA = [];
            let finalSetB = [];
            for (let i = 0; i < V_count; i++) {
                if ((bestMask & (1 << i)) !== 0) finalSetA.push(i);
                else finalSetB.push(i);
            }

            steps.push({
                type: 'final', mask: bestMask, setA: [...finalSetA], setB: [...finalSetB], cutEdges: [...bestEdges], cutWeight: minCutVal, minCutVal: minCutVal, bestMask: bestMask,
                panel: `<b>Algorithm Complete!</b><br>All distinct valid partitions have been evaluated.<br>The Global Minimum Cut weight is <b style="color:var(--accent-green); font-size:18px;">${minCutVal}</b>, separating {${finalSetA.join(',')}} from {${finalSetB.join(',')}}.`,
                complete: true, result: minCutVal,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Global Min Cut = ${minCutVal}`,
                logColor: 'var(--accent-blue)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            
            edgesList.forEach((e, idx) => {
                const u = e[0];
                const v = e[1];
                const w = e[2];
                
                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isCut = step.cutEdges && step.cutEdges.some(ce => ce.idx === idx);
                let isFinal = step.type === 'final' && isCut;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', p1.x); 
                line.setAttribute('y1', p1.y);
                line.setAttribute('x2', p2.x); 
                line.setAttribute('y2', p2.y);

                if (isFinal) {
                    line.setAttribute('stroke', 'var(--accent-green)');
                    line.setAttribute('stroke-width', '4');
                } else if (isCut) {
                    line.setAttribute('stroke', 'var(--accent-red)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('stroke-dasharray', '8');
                    line.classList.add('line-anim');
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('opacity', '0.4');
                }

                svg.appendChild(line);

                // Add Weight Label
                const midX = (p1.x + p2.x) / 2;
                const midY = (p1.y + p2.y) / 2;
                
                const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                bg.setAttribute('x', midX - 12);
                bg.setAttribute('y', midY - 8);
                bg.setAttribute('width', 24);
                bg.setAttribute('height', 16);
                
                if (isFinal) bg.setAttribute('class', 'edge-bg edge-best');
                else if (isCut) bg.setAttribute('class', 'edge-bg edge-cut');
                else bg.setAttribute('class', 'edge-bg');
                
                const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                txt.setAttribute('x', midX);
                txt.setAttribute('y', midY);
                
                if (isFinal) txt.setAttribute('class', 'edge-label edge-best');
                else if (isCut) txt.setAttribute('class', 'edge-label edge-cut');
                else txt.setAttribute('class', 'edge-label');
                txt.textContent = w;

                svg.appendChild(bg);
                svg.appendChild(txt);
            });
        }

        function renderMaskArray(step) {
            const container = document.getElementById('mask-tiles');
            container.innerHTML = '';
            
            if (step.mask === null) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">—</span>';
                return;
            }

            for(let i=0; i<V_count; i++) {
                let bit = (step.mask & (1 << i)) ? 1 : 0;

                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile mask-tile-${bit}`;
                tile.innerText = bit;
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                if (step.setA && step.setA.includes(i)) {
                    el.classList.add('set-a');
                } else if (step.setB && step.setB.includes(i)) {
                    el.classList.add('set-b');
                }
            }

            drawEdges(step);
            renderMaskArray(step);

            // Update Arrays Right
            document.getElementById('curr-cut-val').innerText = step.cutWeight !== null && step.type !== 'init' && step.type !== 'final' ? step.cutWeight : '—';
            document.getElementById('min-cut-val').innerText = step.minCutVal === Infinity ? '∞' : step.minCutVal;

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-setA').innerText = step.setA && step.setA.length > 0 ? `{${step.setA.join(',')}}` : '∅';
            document.getElementById('val-setB').innerText = step.setB && step.setB.length > 0 ? `{${step.setB.join(',')}}` : '∅';
            
            let edgeStr = '—';
            if (step.cutEdges && step.cutEdges.length > 0) {
                edgeStr = step.cutEdges.map(ce => `(${ce.u}-${ce.v})`).join(', ');
            }
            document.getElementById('val-edges').innerText = edgeStr;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
