<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hopcroft&minus;Karp Matching &middot; Graph</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.set-input{width:96px;} .edge-input{width:230px;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}
.narration .ok{color:#bbf7d0;} .narration .bad{color:#fca5a5;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:360px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto; position:relative;}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}
svg.graph{display:block; width:380px; max-width:100%; height:auto;}
.set-label{font-family:var(--mono); font-weight:800; font-size:13px; letter-spacing:.05em; text-anchor:middle; dominant-baseline:central;}
.set-label.l{fill:var(--accent-orange);} .set-label.r{fill:var(--accent-blue);}

.edge{stroke:var(--border-main); stroke-width:2; fill:none; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.layer{stroke:var(--accent-blue); stroke-width:2.5; stroke-dasharray:6; animation:dash 1s linear infinite; opacity:.9;}
.edge.exploring{stroke:var(--accent-purple); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.edge.matched{stroke:var(--accent-green); stroke-width:4; filter:drop-shadow(0 0 6px rgba(34,197,94,.55));}
.edge.path{stroke:var(--accent-green); stroke-width:4; stroke-dasharray:7; animation:dash 1s linear infinite; filter:drop-shadow(0 0 6px rgba(34,197,94,.6));}

.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s;}
.gnode.l .nc{stroke:var(--accent-orange);}
.gnode.r .nc{stroke:var(--accent-blue);}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode .dlbl{font-family:var(--mono); font-weight:700; font-size:10px; fill:var(--accent-blue); text-anchor:middle; dominant-baseline:central; opacity:0; transition:opacity .3s;}
.gnode.showdist .dlbl{opacity:1;}
.gnode.matched .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.14); filter:drop-shadow(0 0 6px rgba(34,197,94,.45));}
.gnode.matched .nl{fill:#bbf7d0;}
.gnode.free .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.10);}
.gnode.layer0 .nc{stroke:var(--accent-blue); fill:rgba(6,182,212,.12); filter:drop-shadow(0 0 6px rgba(6,182,212,.4));}
.gnode.active .nc{stroke-width:3.5; filter:drop-shadow(0 0 12px rgba(245,165,36,.6));}
.gnode.active.l .nc{fill:rgba(245,165,36,.18);}
.gnode.active.l .nl{fill:#ffd591;}
.gnode.exploring .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.18); stroke-width:3.5; filter:drop-shadow(0 0 12px rgba(168,85,247,.6));}
.gnode.exploring .nl{fill:#e9d5ff;}

.side{display:flex; flex-direction:column; gap:12px; min-width:230px; flex:1 1 230px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel.l .cap{color:var(--accent-orange);} .panel.r .cap{color:var(--accent-blue);} .panel.m .cap{color:var(--accent-green);}
.maprow{display:flex; flex-wrap:wrap; gap:6px; min-height:34px; align-content:flex-start;}
.mtile{display:flex; align-items:center; gap:4px; padding:4px 8px; border-radius:9px; font-family:var(--mono); font-weight:700; font-size:13px;
  border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-dim);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1), border-color .3s, background .3s, color .3s;}
.mtile .k{color:var(--text-main);}
.mtile.set{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.1); color:#bbf7d0;}
.mtile.set .k{color:#bbf7d0;}
.matchbig{font-family:var(--mono); font-weight:800; font-size:30px; color:var(--text-dim); transition:color .3s, transform .3s;}
.matchbig.grew{color:var(--accent-green); text-shadow:0 0 14px rgba(34,197,94,.6);}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;} .code-line .cm{color:#5f6b85;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.ph b{color:var(--accent-blue);} .pill.u b{color:var(--accent-orange);} .pill.v b{color:var(--accent-purple);} .pill.s b{color:var(--accent-green);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>L =</label>
  <input type="text" id="u-input" class="set-input" value="0, 1, 2">
  <label>R =</label>
  <input type="text" id="v-input" class="set-input" value="3, 4, 5">
  <label>edges =</label>
  <input type="text" id="e-input" class="edge-input" value="[[0,3],[0,4],[1,4],[2,5]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample([0,1,2],[3,4,5],'[[0,3],[0,4],[1,4],[2,5]]')">Ex 1</button>
  <button onclick="loadExample([0,1],[2,3],'[[0,2],[0,3],[1,2]]')">Ex 2</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Hopcroft&minus;Karp Matching <span class="sub">&middot; maximum bipartite matching</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div class="graph-wrap">
        <div id="confetti"></div>
        <svg class="graph" id="graph" viewBox="0 0 380 360"></svg>
      </div>
      <div class="side">
        <div class="panel m"><div class="cap">MATCHING SIZE</div><div class="matchbig" id="match-big">0</div></div>
        <div class="panel l"><div class="cap">matchL[u] &rarr; r</div><div class="maprow" id="ml-tiles"></div></div>
        <div class="panel r"><div class="cap">matchR[r] &rarr; u</div><div class="maprow" id="mr-tiles"></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8634; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill ph">phase <b id="pill-phase">0</b></span>
        <span class="pill u">L node u = <b id="pill-u">&mdash;</b></span>
        <span class="pill v">R node r = <b id="pill-v">&mdash;</b></span>
        <span class="pill s">matching <b id="pill-cnt">0</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>BFS layer</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>DFS explore</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>matched</span>
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>free L</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','hopcroftKarp'],['src','(L, R, adj):']],
  [['src','  matchL[*] = matchR[*] = -1;  matching = 0']],
  [['kw','  while'],['fn',' BFS'],['src','():'],['cm','   # build layered graph from free L']],
  [['src','    dist[u]=0 for free u; else INF; queue free L']],
  [['kw','    for'],['src',' u in queue, r in adj[u]: relax dist[matchR[r]]']],
  [['kw','    for'],['src',' u in free L:']],
  [['kw','      if'],['fn',' DFS'],['src','(u): matching += 1'],['cm','   # augment']],
  [['fn','  DFS'],['src','(u):']],
  [['kw','    for'],['src',' r in adj[u]:  w = matchR[r]']],
  [['kw','      if'],['src',' w==-1 '],['kw','or'],['src',' (dist[w]==dist[u]+1 '],['kw','and'],['fn',' DFS'],['src','(w)):']],
  [['src','        matchL[u]=r; matchR[r]=u; '],['kw','return'],['src',' true']],
  [['kw','  return'],['src',' matching']],
];

let L_set=[0,1,2], R_set=[3,4,5], edgesList=[[0,3],[0,4],[1,4],[2,5]];
let adj={};
let coord={};
let steps=[], stepIndex=0, timer=null;
const delays=[1700,900,460];
const gnodes={};
let prevMatch=0, prevIdx=-1;
let confettiArmed=true;

function init(){ buildCode(); loadExample([0,1,2],[3,4,5],'[[0,3],[0,4],[1,4],[2,5]]'); }

function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}

function loadExample(uArr,vArr,eStr){
  document.getElementById('u-input').value=uArr.join(', ');
  document.getElementById('v-input').value=vArr.join(', ');
  document.getElementById('e-input').value=eStr;
  parseAndGen();
}
function loadCustom(){ parseAndGen(); }

function parseSet(str){ return str.split(',').map(x=>parseInt(x.trim())).filter(x=>!isNaN(x)); }

function parseAndGen(){
  try{
    L_set=parseSet(document.getElementById('u-input').value);
    R_set=parseSet(document.getElementById('v-input').value);
    const eStr=document.getElementById('e-input').value;
    const m=eStr.match(/[\[(]\s*\d+\s*,\s*\d+\s*[\])]/g)||[];
    const lSet=new Set(L_set), rSet=new Set(R_set);
    edgesList=m.map(s=>{const p=s.match(/\d+/g); return [parseInt(p[0]),parseInt(p[1])];})
               .filter(e=>lSet.has(e[0])&&rSet.has(e[1]));
    if(!L_set.length||!R_set.length){ alert('Provide valid L and R vertex sets.'); return; }
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid input.'); }
}

function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; coord={}; for(const k in gnodes) delete gnodes[k];
  adj={}; L_set.forEach(u=>adj[u]=[]); edgesList.forEach(([u,v])=>adj[u].push(v));
  const W=380, topPad=58, rowGap=Math.min(64, 240/Math.max(L_set.length,R_set.length,1));
  const xL=110, xR=270;
  function place(arr,x){ arr.forEach((id,i)=>{ coord[id]={x, y:topPad+i*rowGap+22}; }); }
  place(L_set,xL); place(R_set,xR);

  // column titles
  const tl=document.createElementNS('http://www.w3.org/2000/svg','text');
  tl.setAttribute('class','set-label l'); tl.setAttribute('x',xL); tl.setAttribute('y',30); tl.textContent='Set L'; svg.appendChild(tl);
  const tr=document.createElementNS('http://www.w3.org/2000/svg','text');
  tr.setAttribute('class','set-label r'); tr.setAttribute('x',xR); tr.setAttribute('y',30); tr.textContent='Set R'; svg.appendChild(tr);

  // edges first (under nodes)
  edgesList.forEach((e,i)=>{ const p1=coord[e[0]], p2=coord[e[1]]; if(!p1||!p2) return;
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line'); ln.setAttribute('class','edge'); ln.id='e'+i;
    ln.setAttribute('x1',p1.x); ln.setAttribute('y1',p1.y); ln.setAttribute('x2',p2.x); ln.setAttribute('y2',p2.y);
    ln.dataset.u=e[0]; ln.dataset.v=e[1]; svg.appendChild(ln); });

  // nodes on top
  function node(id,cls){ const p=coord[id];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode '+cls); g.id='gn'+id;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',18);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=id;
    const d=document.createElementNS('http://www.w3.org/2000/svg','text'); d.setAttribute('class','dlbl');
    d.setAttribute('x',p.x); d.setAttribute('y',p.y-28); d.textContent='';
    g.appendChild(c); g.appendChild(t); g.appendChild(d); svg.appendChild(g); gnodes[id]=g; }
  L_set.forEach(id=>node(id,'l')); R_set.forEach(id=>node(id,'r'));
  const maxRows=Math.max(L_set.length,R_set.length,1);
  svg.setAttribute('viewBox',`0 0 380 ${topPad+maxRows*rowGap+44}`);
}

const INF=Infinity;
function generateSteps(){
  steps=[];
  const matchL={}, matchR={}, dist={};
  L_set.forEach(u=>matchL[u]=-1); R_set.forEach(v=>matchR[v]=-1);
  let matching=0, phase=0;

  function base(o){
    return Object.assign({
      matchL:{...matchL}, matchR:{...matchR}, dist:{...dist},
      phase, matching, activeU:null, activeR:null, activeEdge:null,
      layer0:[], showDist:false, pathEdges:[]
    }, o);
  }
  function snap(o){ steps.push(base(o)); }

  snap({ code:[1], dist:{},
    narr:`<b>Hopcroft&minus;Karp</b> maximum matching. Set <code>matchL</code> &amp; <code>matchR</code> to &minus;1 (all free). Matching size starts at <b>0</b>.`,
    log:`init matchL/matchR = -1 for all vertices` });

  // BFS that records layered-graph construction
  function bfs(){
    const q=[];
    L_set.forEach(u=>{ if(matchL[u]===-1){ dist[u]=0; q.push(u); } else dist[u]=INF; });
    const free0=L_set.filter(u=>matchL[u]===-1);
    snap({ code:[2,3], layer0:[...free0], showDist:true,
      narr:`<b>Phase ${phase+1} &middot; BFS</b>: free L nodes <code>[${free0.join(', ')||'none'}]</code> form layer&nbsp;0. Build the layered graph.`,
      log:`BFS phase ${phase+1}: free L = [${free0.join(',')}], dist=0` });
    let found=false;
    while(q.length){
      const u=q.shift();
      for(const r of adj[u]){
        const w=matchR[r];
        if(w===-1){
          found=true;
          snap({ code:[4], activeU:u, activeR:r, activeEdge:[u,r], showDist:true, layer0:[...free0],
            narr:`BFS from <code>${u}</code>: edge to free R node <code>${r}</code> &mdash; an <b class="ok">augmenting path exists</b> this phase.`,
            log:`  BFS ${u} -> ${r} : R[${r}] free, augmenting path reachable` });
        } else if(dist[w]===INF){
          dist[w]=dist[u]+1; q.push(w);
          snap({ code:[4], activeU:u, activeR:r, activeEdge:[u,r], showDist:true, layer0:[...free0],
            narr:`BFS from <code>${u}</code> through matched <code>${r}</code> reaches L node <code>${w}</code> &rarr; set <code>dist[${w}] = ${dist[w]}</code>.`,
            log:`  BFS ${u} -> ${r} matched to ${w}, dist[${w}]=${dist[w]}` });
        }
      }
    }
    return found;
  }

  // DFS along layered graph; records exploration + augmentation
  function dfs(u, depth){
    for(const r of adj[u]){
      const w=matchR[r];
      snap({ code:[8], activeU:u, activeR:r, activeEdge:[u,r], showDist:true,
        narr:`<b>Phase ${phase} &middot; DFS</b> from <code>${u}</code>: try edge to <code>${r}</code> (matched to <code>${w===-1?'free':'L'+w}</code>).`,
        log:`${'  '.repeat(depth)}DFS ${u} -> ${r} (matchR=${w})` });
      if(w===-1){
        matchL[u]=r; matchR[r]=u;
        snap({ code:[9,10], activeU:u, activeR:r, activeEdge:[u,r],
          narr:`<code>${r}</code> is <b class="ok">free</b> &rarr; match <code>${u}</code>&mdash;<code>${r}</code> and unwind the augmenting path.`,
          log:`${'  '.repeat(depth)}match L[${u}]-R[${r}] (R was free)` });
        return true;
      } else if(dist[w]===dist[u]+1){
        snap({ code:[9], activeU:u, activeR:r, activeEdge:[u,r], showDist:true,
          narr:`<code>${r}</code> is taken by <code>${w}</code>; it sits on the next layer &rarr; recurse DFS into <code>${w}</code>.`,
          log:`${'  '.repeat(depth)}R[${r}] taken by L[${w}], recurse (in layer)` });
        if(dfs(w, depth+1)){
          matchL[u]=r; matchR[r]=u;
          snap({ code:[10], activeU:u, activeR:r, activeEdge:[u,r],
            narr:`Alternate found for <code>${w}</code> &rarr; <b class="ok">rematch</b> <code>${u}</code>&mdash;<code>${r}</code> along the augmenting path.`,
            log:`${'  '.repeat(depth)}rematch L[${u}]-R[${r}]` });
          return true;
        }
      } else {
        snap({ code:[9], activeU:u, activeR:r, activeEdge:[u,r], showDist:true,
          narr:`<code>${r}</code> &rarr; <code>${w}</code> is not on the next BFS layer &rarr; skip (keeps paths shortest).`,
          log:`${'  '.repeat(depth)}R[${r}] -> L[${w}] not in next layer, skip` });
      }
    }
    dist[u]=INF;
    snap({ code:[8], activeU:u,
      narr:`<code>${u}</code> has no augmenting edge in this layered graph &rarr; <b class="bad">dead end</b>, set <code>dist[${u}] = &infin;</code>.`,
      log:`${'  '.repeat(depth)}L[${u}] dead end, dist=INF` });
    return false;
  }

  while(bfs()){
    phase++;
    snap({ code:[5], showDist:true,
      narr:`<b>Phase ${phase} &middot; DFS</b>: run DFS from every free L node, augmenting along shortest layered paths.`,
      log:`-- phase ${phase}: DFS augment from free L nodes --` });
    for(const u of L_set){
      if(matchL[u]===-1){
        snap({ code:[6], activeU:u, showDist:true,
          narr:`Free L node <code>${u}</code>: search for an augmenting path with DFS.`,
          log:`start DFS from free L[${u}]` });
        if(dfs(u,1)){
          matching++;
          snap({ code:[6], activeU:u,
            narr:`Augmenting path completed &rarr; matching grows to <b class="ok">${matching}</b>.`,
            log:`augmented! matching = ${matching}` });
        } else {
          snap({ code:[6], activeU:u,
            narr:`No augmenting path from <code>${u}</code> this phase &rarr; it stays unmatched for now.`,
            log:`no augmenting path for L[${u}] this phase` });
        }
      }
    }
  }
  // final BFS found nothing
  snap({ code:[3], showDist:false,
    narr:`<b>BFS finds no more augmenting paths</b> &mdash; the matching is maximum.`,
    log:`BFS: no free L reaches a free R. stop.` });

  snap({ code:[11], showDist:false,
    narr:`<b>Done.</b> Maximum bipartite matching size = <b class="ok">${matching}</b>. Pairs: ${matchPairs(matchL)||'none'}.`,
    log:`FINAL: maximum matching size = ${matching}`, complete:true, result:matching });
}

function matchPairs(matchL){
  return L_set.filter(u=>matchL[u]!==-1).map(u=>`${u}&mdash;${matchL[u]}`).join(', ');
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const layer0=new Set(step.layer0);
  const matchedL=new Set(L_set.filter(u=>step.matchL[u]!==-1));
  const matchedR=new Set(R_set.filter(r=>step.matchR[r]!==-1));

  // L nodes
  L_set.forEach(u=>{ const g=gnodes[u]; if(!g) return;
    g.classList.remove('matched','free','layer0','active','exploring','showdist');
    if(matchedL.has(u)) g.classList.add('matched'); else g.classList.add('free');
    if(layer0.has(u)) g.classList.add('layer0');
    if(step.activeU===u) g.classList.add('active');
    const d=g.querySelector('.dlbl');
    if(step.showDist && step.dist[u]!==undefined && step.dist[u]!==INF){ g.classList.add('showdist'); d.textContent='d='+step.dist[u]; }
    else d.textContent='';
  });
  // R nodes
  R_set.forEach(r=>{ const g=gnodes[r]; if(!g) return;
    g.classList.remove('matched','free','layer0','active','exploring','showdist');
    if(matchedR.has(r)) g.classList.add('matched');
    if(step.activeR===r) g.classList.add('exploring');
  });

  // pop newly matched edge endpoints
  if(prevIdx!==idx){
    const prevML = prevIdx>=0 && steps[prevIdx] ? steps[prevIdx].matchL : {};
    L_set.forEach(u=>{ if(step.matchL[u]!==-1 && (prevML[u]===undefined||prevML[u]===-1)){
      const c=gnodes[u]&&gnodes[u].querySelector('.nc'); if(c) Motion.pop(c);
      const rc=gnodes[step.matchL[u]]&&gnodes[step.matchL[u]].querySelector('.nc'); if(rc) Motion.pop(rc);
    }});
  }

  // edges
  document.querySelectorAll('.edge').forEach(ln=>{ ln.classList.remove('matched','exploring','layer','path');
    const u=parseInt(ln.dataset.u), v=parseInt(ln.dataset.v);
    const isMatched=step.matchL[u]===v;
    const isExploring=step.activeEdge && step.activeEdge[0]===u && step.activeEdge[1]===v;
    if(isExploring && isMatched) ln.classList.add('path');
    else if(isExploring) ln.classList.add('exploring');
    else if(isMatched) ln.classList.add('matched');
  });

  // side panels
  fillMap('ml-tiles', L_set, step.matchL);
  fillMap('mr-tiles', R_set, step.matchR);
  const big=document.getElementById('match-big'); big.textContent=step.matching;
  big.classList.toggle('grew', !!step.complete);

  // narration + code
  const narr=document.getElementById('narration'); narr.innerHTML=step.narr; narr.classList.toggle('done',!!step.complete);
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i+1)); });

  document.getElementById('pill-phase').textContent=step.phase;
  document.getElementById('pill-u').textContent=step.activeU!=null?step.activeU:'\u2014';
  document.getElementById('pill-v').textContent=step.activeR!=null?step.activeR:'\u2014';
  document.getElementById('pill-cnt').textContent=step.matching;
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color='var(--accent-green)'; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
  prevIdx=idx;
}

function fillMap(id, keys, map){
  const c=document.getElementById(id); c.innerHTML='';
  keys.forEach(k=>{ const t=document.createElement('div'); const val=map[k]!==undefined?map[k]:-1;
    t.className='mtile'+(val!==-1?' set':'');
    const ks=document.createElement('span'); ks.className='k'; ks.textContent=k+':';
    const vs=document.createElement('span'); vs.textContent=(val===-1?'\u22121':val); // minus-1
    t.appendChild(ks); t.appendChild(vs); c.appendChild(t); });
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; prevIdx=-1; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
</body>
