<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bipartite Matching (DFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .u-input { width: 120px; }
        .v-input { width: 120px; }
        .e-input { width: 300px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        .graph-area {
            position: relative;
            display: flex;
            justify-content: space-between;
            width: 450px;
            min-height: 200px;
            padding: 20px 50px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
        }

        #edges-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .nodes-col {
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 1;
            align-items: center;
        }

        .col-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .node {
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 15px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease; position: relative;
        }
        
        .node.u-node { border-color: var(--accent-orange); }
        .node.v-node { border-color: var(--accent-blue); }
        
        .node.active { transform: scale(1.15); box-shadow: 0 0 12px rgba(255,255,255,0.3); z-index: 2; }
        .node.matched { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .node.exploring { border-color: var(--accent-purple); box-shadow: 0 0 10px var(--accent-purple); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 700px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 14px; font-weight: 700; text-align: center; word-break: break-all;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 18px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim {
            stroke-dasharray: 6;
            animation: dash 1s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -12; }
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">U =</label>
        <input type="text" id="u-input" class="u-input" placeholder="0, 1, 2">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="v-input" placeholder="3, 4, 5">
        <label class="ui-label">Edges =</label>
        <input type="text" id="e-input" class="e-input" placeholder="[0,3], [0,4], [1,4], [2,5]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([0,1,2], [3,4,5], '[[0,3],[0,4],[1,4],[2,5]]')">Ex 1</button>
        <button onclick="loadExample([0,1], [2,3], '[[0,2],[0,3],[1,2]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-col" id="col-u">
                <div class="col-title">Set U</div>
                <div id="u-nodes-container"></div>
            </div>
            <div class="nodes-col" id="col-v">
                <div class="col-title">Set V</div>
                <div id="v-nodes-container"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active U Node</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Active V Node</span>
            <span class="info-value" id="val-v" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">matchU Array</span>
            <span class="info-value" id="val-matchU" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">matchV Array</span>
            <span class="info-value" id="val-matchV" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">maximum matching size =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border:2px solid var(--accent-orange)"></span> U Vertex</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border:2px solid var(--accent-blue)"></span> V Vertex</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple)"></span> Exploring / DFS</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Matched</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Unmatched Edge</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let U_set = [0, 1, 2];
        let V_set = [3, 4, 5];
        let edgesList = [[0,3],[0,4],[1,4],[2,5]];
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([0,1,2], [3,4,5], '[[0,3],[0,4],[1,4],[2,5]]'); }

        window.addEventListener('resize', () => {
            if (steps.length > 0) drawEdges(steps[stepIndex]);
        });

        function loadExample(uArr, vArr, eStr) {
            U_set = [...uArr];
            V_set = [...vArr];
            document.getElementById('u-input').value = U_set.join(', ');
            document.getElementById('v-input').value = V_set.join(', ');
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            const uStr = document.getElementById('u-input').value;
            const vStr = document.getElementById('v-input').value;
            const eStr = document.getElementById('e-input').value;
            
            U_set = uStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            V_set = vStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            
            if (U_set.length > 0 && V_set.length > 0) {
                document.getElementById('e-input').value = eStr;
                parseAndGenerate();
            } else {
                alert("Please provide valid U and V vertices.");
            }
        }

        function parseAndGenerate() {
            const eStr = document.getElementById('e-input').value;
            const matches = eStr.match(/\[\s*(\d+)\s*,\s*(\d+)\s*\]|\(\s*(\d+)\s*,\s*(\d+)\s*\)/g);
            edgesList = [];
            if (matches) {
                edgesList = matches.map(m => {
                    const parts = m.match(/\d+/g);
                    return [parseInt(parts[0]), parseInt(parts[1])];
                });
            }
            
            buildGraphDom();
            generateSteps();
            reset();
        }

        function buildGraphDom() {
            const uCont = document.getElementById('u-nodes-container');
            const vCont = document.getElementById('v-nodes-container');
            uCont.innerHTML = '';
            vCont.innerHTML = '';

            U_set.forEach(u => {
                const div = document.createElement('div');
                div.className = 'node u-node';
                div.id = `node-${u}`;
                div.innerText = u;
                uCont.appendChild(div);
            });

            V_set.forEach(v => {
                const div = document.createElement('div');
                div.className = 'node v-node';
                div.id = `node-${v}`;
                div.innerText = v;
                vCont.appendChild(div);
            });
        }

        function formatMatchMap(keys, map) {
            let res = keys.map(k => map[k] !== undefined ? map[k] : -1);
            return `[${res.join(', ')}]`;
        }

        function generateSteps() {
            steps = [];
            let matchU = {};
            let matchV = {};
            
            U_set.forEach(u => matchU[u] = -1);
            V_set.forEach(v => matchV[v] = -1);

            steps.push({
                type: 'init',
                matchU: {...matchU}, matchV: {...matchV},
                activeU: null, activeV: null, activeEdge: null,
                panel: 'Initialize <code>matchU</code> and <code>matchV</code> arrays to -1 (unmatched).<br>We will use DFS to find augmenting paths.',
                statusText: `Nodes mapped. Click Play to begin Brute Force DFS Matching.`,
                log: `Initialize matchU and matchV to -1. Starting DFS.`
            });

            let matchesCount = 0;

            for (let i = 0; i < U_set.length; i++) {
                let u = U_set[i];
                let visited = new Set();

                steps.push({
                    type: 'outer',
                    matchU: {...matchU}, matchV: {...matchV},
                    activeU: u, activeV: null, activeEdge: null,
                    panel: `<b>Outer Loop:</b> Processing unmatched node <code>U[${u}]</code>.<br>Start a Depth-First Search (DFS) to find an augmenting path.`,
                    statusText: `Initiating DFS from U[${u}]...`,
                    log: `\n--- DFS Start: Find path for U[${u}] ---`
                });

                function dfs(curr_u, depth) {
                    let neighbors = edgesList.filter(e => e[0] === curr_u).map(e => e[1]);
                    
                    for (let v of neighbors) {
                        if (visited.has(v)) continue;
                        visited.add(v);

                        steps.push({
                            type: 'explore',
                            matchU: {...matchU}, matchV: {...matchV},
                            activeU: curr_u, activeV: v, activeEdge: [curr_u, v],
                            panel: `DFS explores edge (<code>${curr_u}</code> → <code>${v}</code>).`,
                            statusText: `Checking if V[${v}] is available...`,
                            log: `${"  ".repeat(depth)}Exploring edge ${curr_u} -> ${v}`
                        });

                        if (matchV[v] === -1) {
                            steps.push({
                                type: 'found',
                                matchU: {...matchU}, matchV: {...matchV},
                                activeU: curr_u, activeV: v, activeEdge: [curr_u, v],
                                panel: `<span style="color:var(--accent-green)">Node <code>V[${v}]</code> is unmatched!</span><br>Augmenting path found. We can match ${curr_u} and ${v}.`,
                                statusText: `Found unmatched target node!`,
                                log: `${"  ".repeat(depth)}Found unmatched V[${v}]. Path established.`
                            });
                            
                            matchV[v] = curr_u;
                            matchU[curr_u] = v;
                            
                            steps.push({
                                type: 'matched',
                                matchU: {...matchU}, matchV: {...matchV},
                                activeU: curr_u, activeV: v, activeEdge: [curr_u, v],
                                panel: `Successfully matched <code>U[${curr_u}]</code> with <code>V[${v}]</code>.`,
                                statusText: `Matches updated.`,
                                log: `${"  ".repeat(depth)}Match updated: U[${curr_u}]-V[${v}] ✓`
                            });
                            return true;
                        } else {
                            let next_u = matchV[v];
                            steps.push({
                                type: 'conflict',
                                matchU: {...matchU}, matchV: {...matchV},
                                activeU: curr_u, activeV: v, activeEdge: [curr_u, v],
                                panel: `Node <code>V[${v}]</code> is already matched to <code>U[${next_u}]</code>.<br>Recursively DFS from <code>U[${next_u}]</code> to find it an alternate match.`,
                                statusText: `Conflict! V[${v}] is taken. Recursively finding alternate path...`,
                                log: `${"  ".repeat(depth)}V[${v}] is matched to U[${next_u}]. DFS from U[${next_u}] to find alternate.`
                            });

                            if (dfs(next_u, depth + 1)) {
                                matchV[v] = curr_u;
                                matchU[curr_u] = v;
                                steps.push({
                                    type: 'rematched',
                                    matchU: {...matchU}, matchV: {...matchV},
                                activeU: curr_u, activeV: v, activeEdge: [curr_u, v],
                                    panel: `Alternate match was found for <code>U[${next_u}]</code>.<br>We can now safely rematch <code>U[${curr_u}]</code> to <code>V[${v}]</code>.`,
                                    statusText: `Reassigning matches along the augmenting path.`,
                                    log: `${"  ".repeat(depth)}Rematching U[${curr_u}]-V[${v}] ✓`
                                });
                                return true;
                            } else {
                                steps.push({
                                    type: 'backtrack',
                                    matchU: {...matchU}, matchV: {...matchV},
                                    activeU: curr_u, activeV: v, activeEdge: [curr_u, v],
                                    panel: `<span style="color:var(--accent-red)">Failed to find alternate match for <code>U[${next_u}]</code>.</span><br>Backtracking from <code>V[${v}]</code>.`,
                                    statusText: `No alternate path found. Backtracking...`,
                                    log: `${"  ".repeat(depth)}Backtracking from V[${v}] ✗`
                                });
                            }
                        }
                    }
                    return false;
                }

                if (dfs(u, 1)) {
                    matchesCount++;
                    steps.push({
                        type: 'success',
                        matchU: {...matchU}, matchV: {...matchV},
                        activeU: null, activeV: null, activeEdge: null,
                        panel: `DFS finished successfully for <code>U[${u}]</code>.<br>Total Matches so far: <b>${matchesCount}</b>`,
                        statusText: `Matched U[${u}]. Returning to outer loop.`,
                        log: `End DFS for U[${u}]: Success. Total matches=${matchesCount}`
                    });
                } else {
                    steps.push({
                        type: 'fail',
                        matchU: {...matchU}, matchV: {...matchV},
                        activeU: u, activeV: null, activeEdge: null,
                        panel: `DFS failed to find an augmenting path for <code>U[${u}]</code>. It remains unmatched.`,
                        statusText: `Unable to match U[${u}].`,
                        log: `End DFS for U[${u}]: Failed. Remains unmatched.`
                    });
                }
            }

            steps.push({
                type: 'final',
                matchU: {...matchU}, matchV: {...matchV},
                activeU: null, activeV: null, activeEdge: null,
                panel: `DFS Bipartite Matching Complete!<br>Maximum Matching Size is <span style="color:var(--accent-green); font-weight:bold;">${matchesCount}</span>.`,
                statusText: `Algorithm completed.`,
                log: `Final Result: Maximum matching size = ${matchesCount}`,
                complete: true,
                result: matchesCount
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const areaRect = document.getElementById('graph-area').getBoundingClientRect();

            edgesList.forEach(edge => {
                const u = edge[0];
                const v = edge[1];
                const isMatched = step.matchU[u] === v;
                const isExploring = step.activeEdge && step.activeEdge[0] === u && step.activeEdge[1] === v;

                const uNode = document.getElementById(`node-${u}`);
                const vNode = document.getElementById(`node-${v}`);
                
                if(!uNode || !vNode) return;

                const uRect = uNode.getBoundingClientRect();
                const vRect = vNode.getBoundingClientRect();

                const x1 = uRect.left + uRect.width/2 - areaRect.left;
                const y1 = uRect.top + uRect.height/2 - areaRect.top;
                const x2 = vRect.left + vRect.width/2 - areaRect.left;
                const y2 = vRect.top + vRect.height/2 - areaRect.top;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1);
                line.setAttribute('y1', y1);
                line.setAttribute('x2', x2);
                line.setAttribute('y2', y2);

                if (isMatched) {
                    line.setAttribute('stroke', 'var(--accent-green)');
                    line.setAttribute('stroke-width', '4');
                    if (isExploring) {
                        line.classList.add('line-anim');
                    }
                } else if (isExploring) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '3');
                    line.classList.add('line-anim');
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '1.5');
                }

                svg.appendChild(line);
            });
        }

        function updateNodeStyles(step) {
            const allNodes = document.querySelectorAll('.node');
            allNodes.forEach(node => {
                node.classList.remove('active', 'matched', 'exploring');
                
                const id = parseInt(node.id.split('-')[1]);
                
                if (node.classList.contains('u-node')) {
                    if (step.matchU[id] !== -1) node.classList.add('matched');
                    if (step.activeU === id) node.classList.add('active');
                } else {
                    if (step.matchV[id] !== -1) node.classList.add('matched');
                    if (step.activeV === id) {
                        node.classList.add('active');
                        node.classList.add('exploring');
                    }
                }
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            updateNodeStyles(step);
            drawEdges(step);

            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.activeU !== null ? step.activeU : '—';
            document.getElementById('val-v').innerText = step.activeV !== null ? step.activeV : '—';
            
            document.getElementById('val-matchU').innerText = formatMatchMap(U_set, step.matchU);
            document.getElementById('val-matchV').innerText = formatMatchMap(V_set, step.matchV);

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => {
            setTimeout(init, 100);
        };
    </script>
</body>
</html>
