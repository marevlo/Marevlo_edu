<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Feedback Vertex Set (Brute Force) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.removed { opacity: 0.3; border-style: dashed; background: #000; color: #555; }
        .node.cycle { background: rgba(248,81,73,0.15); border-color: var(--accent-red); color: var(--accent-red); box-shadow: 0 0 15px rgba(248,81,73,0.4); animation: pulseRed 1s infinite alternate; }
        .node.acyclic { background: rgba(63,185,80,0.15); border-color: var(--accent-green); color: var(--accent-green); box-shadow: 0 0 15px rgba(63,185,80,0.2); }

        @keyframes pulseRed {
            0% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-50%, -50%) scale(1.1); }
        }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 350px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.bit-1 { background: #3a0d0d; border-color: var(--accent-red); color: var(--accent-red); }
        .tile.bit-0 { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }

        .solution-list {
            font-family: monospace;
            font-size: 14px;
            color: var(--accent-blue);
            max-height: 120px;
            overflow-y: auto;
            padding: 8px;
            background: #000000;
            border: 1px inset var(--border-main);
            border-radius: 4px;
        }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 830px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 830px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 830px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="3">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1], [1,2], [2,0]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(3, '[[0,1], [1,2], [2,0]]')">Ex 1 (Triangle)</button>
        <button onclick="loadExample(4, '[[0,1], [1,2], [2,3], [3,0]]')">Ex 2 (4-Cycle)</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-cycle" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-red)" />
                    </marker>
                    <marker id="arrow-acyclic" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-green)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--text-main);">Current Mask (Subset):</div>
                <div class="tiles-wrapper" id="mask-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">1 = Remove, 0 = Keep</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange); display:flex; justify-content:space-between;">
                    <span>Best Size (Min):</span>
                    <span id="best-size-badge" style="font-weight:bold;">∞</span>
                </div>
                <div class="ui-label" style="color: var(--accent-blue); margin-top: 8px;">Optimal Subsets:</div>
                <div class="solution-list" id="solution-list">—</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Mask</span>
            <span class="info-value" id="val-mask" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Removed Vertices (S)</span>
            <span class="info-value" id="val-s" style="color: var(--accent-red);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Is Remaining Acyclic?</span>
            <span class="info-value" id="val-acyclic" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">minimum feedback vertex set size =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#21262d;"></span> Normal Node</div>
        <div class="legend-item"><span class="dot" style="background:#000; border-style:dashed;"></span> Removed Node</div>
        <div class="legend-item"><span class="dot" style="background:rgba(248,81,73,0.15); border-color:var(--accent-red);"></span> Cycle Found</div>
        <div class="legend-item"><span class="dot" style="background:rgba(63,185,80,0.15); border-color:var(--accent-green);"></span> Acyclic (Valid)</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 3;
        let edgesList = [[0,1], [1,2], [2,0]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample(3, '[[0,1], [1,2], [2,0]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                // Filter malformed
                edgesList = edgesList.filter(e => Array.isArray(e) && e.length >= 2);
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is an integer and edges is a valid array of [u, v].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 225;
            const cy = 200;
            const radius = 130;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let best_size = Infinity;
            let best_sets = [];
            let max_mask = (1 << V_count);

            steps.push({
                type: 'init', mask: null, S: [], cycle: null, best_size, best_sets,
                panel: `<b>Minimum Feedback Vertex Set (Brute Force)</b><br>To find the minimum set of vertices whose removal makes the directed graph acyclic, we will enumerate all <b>${max_mask}</b> possible subsets of vertices.<br>We use a bitmask from 0 to ${max_mask - 1}.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. V=${V_count}, max_mask=${max_mask}.`
            });

            for (let mask = 0; mask < max_mask; mask++) {
                let S = [];
                let remaining = [];
                for (let i = 0; i < V_count; i++) {
                    if (mask & (1 << i)) S.push(i);
                    else remaining.push(i);
                }

                let active_edges = edgesList.filter(e => !S.includes(e[0]) && !S.includes(e[1]));

                steps.push({
                    type: 'subset', mask, S, cycle: null, best_size, best_sets,
                    panel: `<b>Test Mask ${mask}:</b> Subset S = {${S.join(',')}}.<br>Removing these vertices and all incident edges from the graph.`,
                    statusText: `Testing mask ${mask}...`,
                    log: `\nTesting Mask ${mask} (Binary: ${mask.toString(2).padStart(V_count, '0')}). Subset S={${S.join(',')}}`
                });

                // Cycle detection on remaining graph
                let adj = {};
                remaining.forEach(u => adj[u] = []);
                active_edges.forEach(e => adj[e[0]].push(e[1]));

                let visited = new Set();
                let recStack = new Set();
                let cycle = null;

                function dfs(u, path) {
                    visited.add(u);
                    recStack.add(u);
                    path.push(u);

                    for (let v of adj[u]) {
                        if (!visited.has(v)) {
                            if (dfs(v, path)) return true;
                        } else if (recStack.has(v)) {
                            let cycleStartIndex = path.indexOf(v);
                            cycle = path.slice(cycleStartIndex);
                            cycle.push(v);
                            return true;
                        }
                    }
                    recStack.delete(u);
                    path.pop();
                    return false;
                }

                for (let u of remaining) {
                    if (!visited.has(u)) {
                        if (dfs(u, [])) break;
                    }
                }

                steps.push({
                    type: 'cycle_check', mask, S, cycle, best_size, best_sets,
                    panel: cycle ? 
                        `DFS on remaining graph found a <b style="color:var(--accent-red)">Cycle: ${cycle.join(' ➔ ')}</b>.<br>This subset does NOT make the graph acyclic. Invalid.` :
                        `<b style="color:var(--accent-green)">No cycles detected!</b> The remaining graph is a DAG.<br>This subset is a valid Feedback Vertex Set.`,
                    statusText: cycle ? `Cycle detected.` : `Acyclic graph confirmed.`,
                    log: cycle ? `  -> Cycle detected: ${cycle.join('->')}` : `  -> Graph is Acyclic!`,
                    logColor: cycle ? 'var(--accent-red)' : 'var(--accent-green)'
                });

                if (!cycle) {
                    let updated = false;
                    if (S.length < best_size) {
                        best_size = S.length;
                        best_sets = [[...S]];
                        updated = true;
                    } else if (S.length === best_size) {
                        best_sets.push([...S]);
                        updated = true;
                    }

                    steps.push({
                        type: 'update', mask, S, cycle, best_size, best_sets,
                        panel: updated ? 
                            `Valid Set size is <b>${S.length}</b>. This is $\\le$ the minimum found so far.<br><b style="color:var(--accent-blue)">Updating optimal solutions list.</b>` :
                            `Valid Set size is <b>${S.length}</b>, but our current minimum is <b>${best_size}</b>. <b style="color:var(--text-dim)">Ignored.</b>`,
                        statusText: updated ? `Updated best solution.` : `Sub-optimal valid set. Ignored.`,
                        log: updated ? `  => New or tied minimum size ${S.length} found. Updating best.` : `  => Size ${S.length} > minimum ${best_size}. Ignored.`
                    });
                }
            }

            steps.push({
                type: 'final', mask: null, S: [], cycle: null, best_size, best_sets,
                panel: `<b>Algorithm Complete!</b><br>All $2^${V_count}$ subsets tested.<br>Minimum Feedback Vertex Set size is <b style="color:var(--accent-green); font-size:18px;">${best_size}</b>.`,
                complete: true, result: best_size,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Minimum Size = ${best_size}.`,
                logColor: 'var(--accent-blue)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';

            let drawn = new Set();

            edgesList.forEach(e => {
                const u = e[0];
                const v = e[1];
                
                // Simple directed edges, no bidirectional offset needed for these examples but handled broadly
                let key = `${u}-${v}`;
                if (drawn.has(key)) return;
                drawn.add(key);

                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isRemoved = step.S && (step.S.includes(u) || step.S.includes(v));
                
                let isCycle = false;
                if (step.cycle) {
                    for (let i=0; i<step.cycle.length-1; i++) {
                        if (step.cycle[i] === u && step.cycle[i+1] === v) {
                            isCycle = true; break;
                        }
                    }
                }

                let isAcyclic = !isRemoved && (step.type === 'update' || (step.type === 'cycle_check' && !step.cycle));

                // Draw path with curve if bidirectional
                let hasReverse = edgesList.some(re => re[0]===v && re[1]===u);
                let dStr = "";
                if (hasReverse) {
                    // Curving
                    let dx = p2.x - p1.x, dy = p2.y - p1.y;
                    let dr = Math.sqrt(dx * dx + dy * dy) * 1.5;
                    dStr = `M ${p1.x},${p1.y} A ${dr},${dr} 0 0,1 ${p2.x},${p2.y}`;
                } else {
                    dStr = `M ${p1.x},${p1.y} L ${p2.x},${p2.y}`;
                }

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', dStr);
                path.setAttribute('fill', 'transparent');

                if (isRemoved) {
                    path.setAttribute('stroke', 'var(--border-main)');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('stroke-dasharray', '4');
                    path.setAttribute('opacity', '0.2');
                } else if (isCycle) {
                    path.setAttribute('stroke', 'var(--accent-red)');
                    path.setAttribute('stroke-width', '4');
                    path.setAttribute('marker-end', 'url(#arrow-cycle)');
                } else if (isAcyclic) {
                    path.setAttribute('stroke', 'var(--accent-green)');
                    path.setAttribute('stroke-width', '3');
                    path.setAttribute('marker-end', 'url(#arrow-acyclic)');
                } else {
                    path.setAttribute('stroke', 'var(--border-main)');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('marker-end', 'url(#arrow-normal)');
                }

                svg.appendChild(path);
            });
        }

        function renderMaskArray(step) {
            const container = document.getElementById('mask-tiles');
            container.innerHTML = '';
            
            if (step.mask === null) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">—</span>';
                return;
            }

            for(let i=0; i<V_count; i++) {
                let bit = (step.mask & (1 << i)) ? 1 : 0;

                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile bit-${bit}`;
                tile.innerText = bit;
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                let inS = step.S && step.S.includes(i);
                let inCycle = step.cycle && step.cycle.includes(i);
                let isAcyclic = !inS && (step.type === 'update' || (step.type === 'cycle_check' && !step.cycle));

                if (inS) el.classList.add('removed');
                else if (inCycle) el.classList.add('cycle');
                else if (isAcyclic) el.classList.add('acyclic');
            }

            drawEdges(step);
            renderMaskArray(step);

            // Update Arrays Right
            document.getElementById('best-size-badge').innerText = step.best_size === Infinity ? '∞' : step.best_size;
            
            let solHtml = '';
            if (step.best_sets && step.best_sets.length > 0) {
                solHtml = step.best_sets.map(s => `{${s.join(', ')}}`).join('<br>');
            } else {
                solHtml = '<span style="color:var(--text-dim)">None yet</span>';
            }
            document.getElementById('solution-list').innerHTML = solHtml;

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            let mStr = step.mask !== null ? step.mask.toString(2).padStart(V_count, '0') : '—';
            document.getElementById('val-mask').innerText = mStr;
            document.getElementById('val-s').innerText = step.S && step.S.length > 0 ? `{${step.S.join(', ')}}` : '∅';
            
            let acyclicStr = '—';
            if (step.type === 'cycle_check' || step.type === 'update') {
                acyclicStr = step.cycle ? 'False' : 'True';
            }
            document.getElementById('val-acyclic').innerText = acyclicStr;
            document.getElementById('val-acyclic').style.color = acyclicStr === 'False' ? 'var(--accent-red)' : 'var(--accent-green)';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
