<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimum Feedback Vertex Set &middot; Graph</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:300px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'▸'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'✓'; color:var(--accent-green);}
.narration.bad{border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.06);}
.narration.bad::before{content:'✕'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px; position:relative;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:360px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto;}
svg.graph{display:block; width:400px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2; fill:none; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.removed{stroke:rgba(255,255,255,.10); stroke-dasharray:5; opacity:.35;}
.edge.acyclic{stroke:var(--accent-green); stroke-width:2.6; filter:drop-shadow(0 0 4px rgba(34,197,94,.5));}
.edge.cycle{stroke:var(--accent-red); stroke-width:3.4; filter:drop-shadow(0 0 6px rgba(248,81,73,.6)); stroke-dasharray:8; animation:dash 1s linear infinite;}
.ahead{transition:fill .35s, opacity .35s;}
.ahead.normal{fill:var(--border-main);}
.ahead.removed{fill:rgba(255,255,255,.10); opacity:.35;}
.ahead.acyclic{fill:var(--accent-green);}
.ahead.cycle{fill:var(--accent-red);}

.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s, stroke-width .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode.removed .nc{stroke:rgba(255,255,255,.14); fill:rgba(255,255,255,.02); stroke-dasharray:4;}
.gnode.removed .nl{fill:#4b5772;}
.gnode.cycle .nc{stroke:var(--accent-red); fill:rgba(248,81,73,.14); filter:drop-shadow(0 0 10px rgba(248,81,73,.55)); stroke-width:3;}
.gnode.cycle .nl{fill:#ffb4ae;}
.gnode.acyclic .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.12); filter:drop-shadow(0 0 7px rgba(34,197,94,.4));}
.gnode.acyclic .nl{fill:#bbf7d0;}

.side{display:flex; flex-direction:column; gap:12px; min-width:240px; flex:1 1 240px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;}
.panel.m .cap{color:var(--accent-blue);} .panel.b .cap{color:var(--accent-orange);} .panel.sol .cap{color:var(--accent-green);}
.cap .hint{font-weight:500; color:var(--text-dim); letter-spacing:0;}

.bits{display:flex; gap:7px; flex-wrap:wrap; min-height:48px; align-content:flex-start;}
.bitcell{display:flex; flex-direction:column; align-items:center; gap:4px;}
.bit{min-width:34px; height:34px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1), background .3s, border-color .3s, color .3s;}
.bit.one{border-color:rgba(248,81,73,.5); background:rgba(248,81,73,.14); color:#ffb4ae;}
.bit.zero{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.1); color:#bbf7d0;}
.bidx{font-family:var(--mono); font-size:10px; color:var(--text-dim);}
.bits .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim); align-self:center;}

.best-val{font-family:var(--mono); font-weight:800; font-size:14px; color:#ffd591;}
.sol-list{font-family:var(--mono); font-size:13px; line-height:1.6; color:#bbf7d0; min-height:24px;
  max-height:96px; overflow-y:auto; padding:2px 0;}
.sol-list .none{color:var(--text-dim);}
.sol-list::-webkit-scrollbar{width:7px;}
.sol-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.s b{color:var(--accent-red);} .pill.a b{color:var(--accent-green);} .pill.k b{color:var(--accent-orange);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-16;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>V =</label>
  <input type="text" id="v-input" class="small-input" value="3">
  <label>edges =</label>
  <input type="text" id="e-input" class="large-input" value="[[0,1],[1,2],[2,0]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(3,'[[0,1],[1,2],[2,0]]')">Ex 1 (Triangle)</button>
  <button onclick="loadExample(4,'[[0,1],[1,2],[2,3],[3,0]]')">Ex 2 (4-Cycle)</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Minimum Feedback Vertex Set <span class="sub">&middot; brute-force subset enumeration</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 400 360"></svg></div>
      <div class="side">
        <div class="panel m"><div class="cap"><span>SUBSET MASK</span><span class="hint">1=remove &middot; 0=keep</span></div><div class="bits" id="mask-bits"></div></div>
        <div class="panel b"><div class="cap"><span>BEST SIZE (MIN)</span><span class="best-val" id="best-val">&infin;</span></div><div style="font-size:11px;color:var(--text-dim);font-family:var(--mono)">smallest valid feedback set so far</div></div>
        <div class="panel sol"><div class="cap"><span>OPTIMAL SUBSETS</span></div><div class="sol-list" id="sol-list"><span class="none">&mdash; none yet &mdash;</span></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill s">removed S = <b id="pill-s">&mdash;</b></span>
        <span class="pill a">acyclic? <b id="pill-a">&mdash;</b></span>
        <span class="pill k">best = <b id="pill-k">&infin;</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:rgba(255,255,255,.14)"></span>removed</span>
          <span class="li"><span class="dot" style="background:var(--accent-red)"></span>cycle</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>acyclic</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','minFVS'],['src','(V, edges):']],
  [['src','  best = INF;  sols = []']],
  [['kw','  for'],['src',' mask in 0 .. 2^V - 1:']],
  [['src','    S = bits set in mask;  keep = rest']],
  [['src','    G2 = edges with both ends kept']],
  [['kw','    if'],['src',' isAcyclic(G2):  ']],
  [['kw','      if'],['src',' |S| < best:  best=|S|; sols=[S]']],
  [['kw','      elif'],['src',' |S| == best:  sols.push(S)']],
  [['kw','  return'],['src',' best, sols']],
];

let V_count=3, edgesList=[[0,1],[1,2],[2,0]];
let coord={}; const gnodes={}; let edgeEls=[];
let steps=[], stepIndex=0, timer=null;
const delays=[2000,1050,520];
let confettiArmed=true;

function init(){ buildCode(); loadExample(3,'[[0,1],[1,2],[2,0]]'); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(v,eStr){ document.getElementById('v-input').value=v; document.getElementById('e-input').value=eStr; parseAndGen(); }
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    V_count=parseInt(document.getElementById('v-input').value,10);
    let raw=JSON.parse(document.getElementById('e-input').value.replace(/\(/g,'[').replace(/\)/g,']'));
    if(isNaN(V_count)||!Array.isArray(raw)) throw 'bad';
    if(V_count<1) V_count=1; if(V_count>8) V_count=8;
    edgesList=raw.filter(e=>Array.isArray(e)&&e.length>=2).map(e=>[e[0],e[1]]).filter(e=>e[0]>=0&&e[0]<V_count&&e[1]>=0&&e[1]<V_count);
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid format. V must be an integer and edges a valid array of [u, v].'); }
}

function setupGraph(){
  const svg=document.getElementById('graph'); coord={}; edgeEls=[]; for(const k in gnodes) delete gnodes[k];
  // keep <defs>; clear everything else once per input-load
  const defs='<defs></defs>';
  svg.innerHTML=defs;
  const cx=200, cy=180, R=Math.min(135, 70+V_count*9);
  for(let i=0;i<V_count;i++){ const ang=(Math.PI*2*i)/V_count - Math.PI/2; coord[i]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)}; }

  // Build each directed edge ONCE as a path + arrowhead polygon, keyed by index.
  const reverse=new Set(edgesList.map(e=>e[0]+'->'+e[1]));
  edgesList.forEach((e,i)=>{
    const u=e[0], w=e[1]; const p1=coord[u], p2=coord[w]; if(!p1||!p2) return;
    const hasRev=reverse.has(w+'->'+u);
    const geo=edgeGeometry(p1,p2,hasRev,u===w);
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','edge'); path.setAttribute('d',geo.d); path.id='e'+i;
    const head=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    head.setAttribute('class','ahead normal'); head.setAttribute('points',geo.head); head.id='eh'+i;
    svg.appendChild(path); svg.appendChild(head);
    edgeEls.push({path,head,u,w});
  });

  // Nodes on top, persistent by id.
  for(let i=0;i<V_count;i++){ const p=coord[i];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode'); g.id='gn'+i;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',20);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=i;
    g.appendChild(c); g.appendChild(t); svg.appendChild(g); gnodes[i]=g;
  }
}

// Returns the trimmed edge path (stopping at node radius) plus an arrowhead polygon at the target.
function edgeGeometry(p1,p2,curved,selfLoop){
  const r=21, ah=9, aw=7;
  if(selfLoop){
    // small self loop above the node
    const x=p1.x, y=p1.y;
    const d=`M ${x-10} ${y-16} C ${x-34} ${y-52}, ${x+34} ${y-52}, ${x+10} ${y-16}`;
    const hx=x+10, hy=y-16; const ang=Math.atan2(hy-(y-40), hx-(x+24));
    return {d, head:arrowPts(hx,hy,ang,ah,aw)};
  }
  const dx=p2.x-p1.x, dy=p2.y-p1.y; const len=Math.hypot(dx,dy)||1;
  const ux=dx/len, uy=dy/len;
  if(curved){
    // perpendicular bow so opposite edges don't overlap
    const nx=-uy, ny=ux, bow=14;
    const mx=(p1.x+p2.x)/2 + nx*bow, my=(p1.y+p2.y)/2 + ny*bow;
    // start/end trimmed toward the curved control midpoint
    const s1x=p1.x + (mx-p1.x)/Math.hypot(mx-p1.x,my-p1.y)*r;
    const s1y=p1.y + (my-p1.y)/Math.hypot(mx-p1.x,my-p1.y)*r;
    const dex=p2.x-mx, dey=p2.y-my; const del=Math.hypot(dex,dey)||1;
    const e2x=p2.x - dex/del*r, e2y=p2.y - dey/del*r;
    const ang=Math.atan2(e2y-my, e2x-mx);
    return {d:`M ${s1x} ${s1y} Q ${mx} ${my} ${e2x} ${e2y}`, head:arrowPts(e2x,e2y,ang,ah,aw)};
  }
  const sx=p1.x+ux*r, sy=p1.y+uy*r, ex=p2.x-ux*r, ey=p2.y-uy*r;
  const ang=Math.atan2(ey-sy, ex-sx);
  return {d:`M ${sx} ${sy} L ${ex} ${ey}`, head:arrowPts(ex,ey,ang,ah,aw)};
}
function arrowPts(x,y,ang,ah,aw){
  const bx=x-Math.cos(ang)*ah, by=y-Math.sin(ang)*ah;
  const px=-Math.sin(ang)*aw, py=Math.cos(ang)*aw;
  return `${x.toFixed(1)},${y.toFixed(1)} ${(bx+px).toFixed(1)},${(by+py).toFixed(1)} ${(bx-px).toFixed(1)},${(by-py).toFixed(1)}`;
}

// ===== Algorithm: enumerate every subset S of vertices to remove; keep the smallest S
// whose removal leaves a directed-acyclic remaining graph. Snapshots are immutable. =====
function generateSteps(){
  steps=[];
  const maxMask=(1<<V_count);
  let best=Infinity, sols=[];
  steps.push({code:[0,1], mask:null, S:[], cycle:null, best, sols:[],
    narr:`<b>Minimum Feedback Vertex Set.</b> Find the fewest vertices whose removal makes the graph <b>acyclic</b>. Brute force: test all <code>2^${V_count} = ${maxMask}</code> subsets.`,
    log:`init  V=${V_count}  edges=${edgesList.length}  masks=0..${maxMask-1}`});

  for(let mask=0; mask<maxMask; mask++){
    const S=[], keep=[];
    for(let i=0;i<V_count;i++){ if(mask&(1<<i)) S.push(i); else keep.push(i); }
    const bin=mask.toString(2).padStart(V_count,'0');
    steps.push({code:[2,3], mask, S:[...S], cycle:null, best, sols:sols.map(a=>[...a]),
      narr:`Mask <code>${mask}</code> = <code>${bin}</code> &rarr; remove <b>S = {${S.join(', ')||'&empty;'}}</b>. Delete those vertices and their incident edges.`,
      log:`mask ${mask} (${bin})  S={${S.join(',')}}`});

    // Build remaining adjacency and run DFS cycle detection on the kept subgraph.
    const adj={}; keep.forEach(u=>adj[u]=[]);
    edgesList.forEach(e=>{ if(adj[e[0]]!==undefined && adj[e[1]]!==undefined) adj[e[0]].push(e[1]); });
    const visited=new Set(), stack=new Set(); let cycle=null;
    function dfs(u,path){
      visited.add(u); stack.add(u); path.push(u);
      for(const v of adj[u]){
        if(!visited.has(v)){ if(dfs(v,path)) return true; }
        else if(stack.has(v)){ const st=path.indexOf(v); cycle=path.slice(st); cycle.push(v); return true; }
      }
      stack.delete(u); path.pop(); return false;
    }
    for(const u of keep){ if(!visited.has(u)){ if(dfs(u,[])) break; } }

    steps.push({code:[4,5], mask, S:[...S], cycle:cycle?[...cycle]:null, best, sols:sols.map(a=>[...a]),
      narr: cycle
        ? `DFS on the remaining graph found a <b>cycle</b> <code>${cycle.join(' &rarr; ')}</code>. Not acyclic &mdash; this subset is <b>invalid</b>.`
        : `DFS finds <b>no back-edge</b> &mdash; the remaining graph is a <b>DAG</b>. <code>S = {${S.join(', ')||'&empty;'}}</code> is a valid feedback vertex set.`,
      bad: !!cycle, good: !cycle,
      log: cycle ? `  cycle ${cycle.join('->')}  -> invalid` : `  acyclic  -> valid set size ${S.length}`});

    if(!cycle){
      let updated=false, tie=false;
      if(S.length<best){ best=S.length; sols=[[...S]]; updated=true; }
      else if(S.length===best){ sols.push([...S]); updated=true; tie=true; }
      steps.push({code: updated?[6,7]:[5], mask, S:[...S], cycle:null, best, sols:sols.map(a=>[...a]),
        narr: updated
          ? (tie
              ? `Size <b>${S.length}</b> ties the current best. Add <code>{${S.join(', ')||'&empty;'}}</code> to the optimal list. Best stays <code>${best}</code>.`
              : `Size <b>${S.length}</b> beats the old best. New minimum = <code>${best}</code>; optimal list reset to <code>{${S.join(', ')||'&empty;'}}</code>.`)
          : `Valid, but size <b>${S.length}</b> exceeds best <code>${best}</code>. Keep it out of the optimal list.`,
        good:true,
        log: updated ? `  update best=${best}  sols=${sols.length}` : `  size ${S.length} > best ${best}  skip`});
    }
  }

  steps.push({code:[8], mask:null, S:[], cycle:null, best, sols:sols.map(a=>[...a]), complete:true, result:best,
    narr:`All <code>${maxMask}</code> subsets tested. <b>Minimum feedback vertex set size = ${best}</b>. Optimal sets: ${sols.map(s=>`<code>{${s.join(', ')||'&empty;'}}</code>`).join(', ')}.`,
    log:`done. minimum FVS size = ${best}  (${sols.length} optimal set${sols.length===1?'':'s'})`});
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const removed=new Set(step.S);
  const cyc=step.cycle?new Set(step.cycle):new Set();
  const validVis = step.good && step.cycle===null;

  // Nodes: toggle classes only.
  for(let i=0;i<V_count;i++){ const g=gnodes[i]; if(!g) continue;
    g.classList.remove('removed','cycle','acyclic');
    if(removed.has(i)) g.classList.add('removed');
    else if(cyc.has(i)) g.classList.add('cycle');
    else if(validVis) g.classList.add('acyclic');
    if(step.pulse===i){ const c=g.querySelector('.nc'); if(c) Motion.pop(c); }
  }

  // Cycle edges: consecutive pairs along the cycle path.
  const cycEdges=new Set();
  if(step.cycle){ for(let i=0;i<step.cycle.length-1;i++) cycEdges.add(step.cycle[i]+'->'+step.cycle[i+1]); }
  edgeEls.forEach((eo,i)=>{
    const {path,head,u,w}=eo;
    path.classList.remove('removed','acyclic','cycle');
    head.classList.remove('normal','removed','acyclic','cycle');
    const isRemoved = removed.has(u)||removed.has(w);
    const isCycle = cycEdges.has(u+'->'+w);
    if(isRemoved){ path.classList.add('removed'); head.classList.add('removed'); }
    else if(isCycle){ path.classList.add('cycle'); head.classList.add('cycle'); }
    else if(validVis){ path.classList.add('acyclic'); head.classList.add('acyclic'); }
    else { head.classList.add('normal'); }
  });

  renderMaskBits(step);

  document.getElementById('best-val').innerHTML = step.best===Infinity?'&infin;':step.best;
  const sl=document.getElementById('sol-list');
  if(step.sols && step.sols.length){ sl.innerHTML=step.sols.map(s=>'{'+(s.join(', ')||'∅')+'}').join('<br>'); }
  else sl.innerHTML='<span class="none">&mdash; none yet &mdash;</span>';

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done', !!step.complete);
  narr.classList.toggle('bad', !!step.bad && !step.complete);

  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', (step.code||[]).includes(i)); });

  document.getElementById('pill-s').textContent = step.mask!=null ? '{'+(step.S.join(', ')||'∅')+'}' : '—';
  let av='—'; if(step.cycle) av='no'; else if(step.good) av='yes';
  document.getElementById('pill-a').textContent=av;
  document.getElementById('pill-k').innerHTML = step.best===Infinity?'&infin;':step.best;

  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color='var(--accent-green)';
    else if(steps[k].bad) d.style.color='var(--accent-red)';
    else if(steps[k].good) d.style.color='var(--accent-green)';
    log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function renderMaskBits(step){
  const c=document.getElementById('mask-bits'); c.innerHTML='';
  if(step.mask===null){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ no subset }'; c.appendChild(e); return; }
  for(let i=0;i<V_count;i++){
    const bit=(step.mask&(1<<i))?1:0;
    const wrap=document.createElement('div'); wrap.className='bitcell';
    const b=document.createElement('div'); b.className='bit '+(bit?'one':'zero'); b.textContent=bit;
    const idx=document.createElement('div'); idx.className='bidx'; idx.textContent='['+i+']';
    wrap.appendChild(b); wrap.appendChild(idx); c.appendChild(wrap);
  }
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
