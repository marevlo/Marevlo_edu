<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check MST Uniqueness - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        #e-input { width: 400px; }
        .small-input { width: 60px; text-align: center; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        .graph-area {
            position: relative;
            width: 500px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 14px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.active { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 12px rgba(255,255,255,0.3); z-index: 2; border-color: var(--text-main); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 700px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 700px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 18px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-red); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 4px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim {
            stroke-dasharray: 6;
            animation: dash 1s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -12; }
        }

        /* Edge Text */
        .edge-label {
            font-family: monospace;
            font-weight: bold;
            font-size: 14px;
            text-anchor: middle;
            dominant-baseline: central;
        }
        .edge-bg { fill: var(--bg-surface); }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="3">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" placeholder="[[0,1,1], [1,2,2], [0,2,3]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(3, '[[0,1,1], [1,2,2], [0,2,3]]')">Ex 1 (True)</button>
        <button onclick="loadExample(4, '[[0,1,1], [1,2,1], [2,3,1], [3,0,1], [0,2,2], [1,3,2]]')">Ex 2 (False)</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Phase</span>
            <span class="info-value" id="val-phase" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Base MST Weight</span>
            <span class="info-value" id="val-mst-wt" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Candidate Weight</span>
            <span class="info-value" id="val-cand-wt" style="color: var(--accent-blue);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">is MST unique? =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> MST Edge</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple)"></span> Processing (Kruskal)</div>
        <div class="legend-item"><span class="dot" style="background:var(--border-main)"></span> Non-MST / Ignored</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red); border-bottom: 2px dashed var(--bg-surface)"></span> Temporarily Removed</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border-bottom: 2px dashed var(--bg-surface)"></span> Candidate Replacement</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        class DSU {
            constructor(n) { this.parent = Array.from({length:n}, (_,i)=>i); }
            find(i) {
                if(this.parent[i] !== i) this.parent[i] = this.find(this.parent[i]);
                return this.parent[i];
            }
            union(i, j) {
                let rootI = this.find(i), rootJ = this.find(j);
                if(rootI !== rootJ) { this.parent[rootI] = rootJ; return true; }
                return false;
            }
        }

        let V_count = 3;
        let allEdges = [];
        let nodeCoords = [];
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];

        function init() { loadExample(3, '[[0,1,1], [1,2,2], [0,2,3]]'); }

        function loadExample(v, eStr) {
            V_count = parseInt(v);
            document.getElementById('v-input').value = V_count;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            V_count = parseInt(document.getElementById('v-input').value.trim());
            if(isNaN(V_count) || V_count < 1) { alert("Invalid V"); return; }
            parseAndGenerate();
        }

        function parseAndGenerate() {
            const eStr = document.getElementById('e-input').value;
            try {
                let parsed = JSON.parse(eStr.replace(/\(/g, '[').replace(/\)/g, ']'));
                // map to objects with IDs
                allEdges = parsed.map((e, i) => ({
                    id: `e${i}`, u: e[0], v: e[1], w: e[2]
                }));
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format for edges. Use [[u,v,w], ...]");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = [];

            const cx = 250;
            const cy = 200;
            const radius = 130;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords.push({x, y});

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function cloneState(mst, active, removed, candidate, nonMst) {
            return {
                mst: [...mst],
                active: active,
                removed: removed,
                candidate: candidate,
                nonMst: [...nonMst]
            };
        }

        function generateSteps() {
            steps = [];
            
            // Phase 1: Kruskal's Algorithm
            let sortedEdges = [...allEdges].sort((a,b) => a.w - b.w);
            let dsu = new DSU(V_count);
            let mst = [];
            let mstWeight = 0;
            let nonMst = [];

            steps.push({
                type: 'init',
                phase: 'Phase 1: Finding MST',
                mstWt: 0, candWt: null,
                edgeState: cloneState([], null, null, null, allEdges),
                panel: `<b>Phase 1: Kruskal's Algorithm</b><br>Sorting all edges by weight to construct the base Minimum Spanning Tree.`,
                statusText: `Starting Phase 1...`,
                log: `Sorting edges by weight...`
            });

            for(let e of sortedEdges) {
                steps.push({
                    type: 'kruskal_check',
                    phase: 'Phase 1: Finding MST',
                    mstWt: mstWeight, candWt: null,
                    edgeState: cloneState(mst, e, null, null, allEdges.filter(x => !mst.includes(x) && x !== e)),
                    panel: `Evaluating edge (<code>${e.u}</code>-<code>${e.v}</code>) with weight <b>${e.w}</b>.<br>Checking if it creates a cycle using Union-Find.`,
                    statusText: `Evaluating edge (${e.u}, ${e.v})...`,
                    log: `Kruskal: Checking edge (${e.u}-${e.v}), weight ${e.w}`
                });

                if(dsu.union(e.u, e.v)) {
                    mst.push(e);
                    mstWeight += e.w;
                    steps.push({
                        type: 'kruskal_add',
                        phase: 'Phase 1: Finding MST',
                        mstWt: mstWeight, candWt: null,
                        edgeState: cloneState(mst, null, null, null, allEdges.filter(x => !mst.includes(x))),
                        panel: `Edge (<code>${e.u}</code>-<code>${e.v}</code>) does not create a cycle.<br><span style="color:var(--accent-green)">Added to MST.</span> Current Weight: <b>${mstWeight}</b>`,
                        statusText: `Added to MST.`,
                        log: `  -> Added to MST. Running weight: ${mstWeight}`
                    });
                } else {
                    nonMst.push(e);
                    steps.push({
                        type: 'kruskal_skip',
                        phase: 'Phase 1: Finding MST',
                        mstWt: mstWeight, candWt: null,
                        edgeState: cloneState(mst, null, null, null, allEdges.filter(x => !mst.includes(x))),
                        panel: `Edge (<code>${e.u}</code>-<code>${e.v}</code>) creates a cycle.<br><span style="color:var(--text-dim)">Skipped and marked as non-MST.</span>`,
                        statusText: `Cycle detected. Skipped.`,
                        log: `  -> Cycle detected. Skipped.`
                    });
                }
            }

            if (mst.length < V_count - 1) {
                steps.push({
                    type: 'final',
                    phase: 'Error',
                    mstWt: mstWeight, candWt: null,
                    edgeState: cloneState(mst, null, null, null, nonMst),
                    panel: `<span style="color:var(--accent-red)">Graph is disconnected!</span><br>A valid MST cannot be formed.`,
                    complete: true, result: 'False',
                    statusText: `Algorithm aborted.`,
                    log: `\nError: Graph disconnected. Aborting.`
                });
                return;
            }

            steps.push({
                type: 'phase2_start',
                phase: 'Phase 2: Edge Replacement',
                mstWt: mstWeight, candWt: null,
                edgeState: cloneState(mst, null, null, null, nonMst),
                panel: `<b>Phase 2: Second-Best MST</b><br>Base MST completed with total weight <span style="color:var(--accent-green); font-weight:bold;">${mstWeight}</span>.<br>We will now try replacing each MST edge to see if an equal-weight tree exists.`,
                statusText: `Starting edge replacements...`,
                log: `\n--- Base MST Found. Weight: ${mstWeight} ---\nStarting Second-Best replacement search...`
            });

            let isUnique = true;
            let secondBestGlobal = Infinity;

            outer: for(let e_mst of mst) {
                
                steps.push({
                    type: 'remove_edge',
                    phase: 'Phase 2: Edge Replacement',
                    mstWt: mstWeight, candWt: null,
                    edgeState: cloneState(mst.filter(x => x !== e_mst), null, e_mst, null, nonMst),
                    panel: `Temporarily <span style="color:var(--accent-red)">removing</span> MST edge (<code>${e_mst.u}</code>-<code>${e_mst.v}</code>) [w: ${e_mst.w}].<br>This splits the MST into two disconnected components.`,
                    statusText: `Removed edge (${e_mst.u}-${e_mst.v}).`,
                    log: `\nTesting removal of MST edge (${e_mst.u}-${e_mst.v}) [w:${e_mst.w}].`
                });

                let tempDsu = new DSU(V_count);
                for(let e of mst) {
                    if(e !== e_mst) tempDsu.union(e.u, e.v);
                }

                let bestRep = null;
                let bestRepWt = Infinity;

                for(let e_non of nonMst) {
                    let connects = tempDsu.find(e_non.u) !== tempDsu.find(e_non.v);
                    
                    steps.push({
                        type: 'eval_candidate',
                        phase: 'Phase 2: Edge Replacement',
                        mstWt: mstWeight, candWt: null,
                        edgeState: cloneState(mst.filter(x => x !== e_mst), null, e_mst, e_non, nonMst.filter(x => x !== e_non)),
                        panel: `Evaluating non-MST edge (<code>${e_non.u}</code>-<code>${e_non.v}</code>) [w: ${e_non.w}].<br>` +
                               (connects ? `<span style="color:var(--accent-blue)">It successfully reconnects the two components.</span>` : `It does not reconnect the two components (cycle).`),
                        statusText: `Checking non-MST edge (${e_non.u}-${e_non.v})...`,
                        log: `  Checking candidate (${e_non.u}-${e_non.v}) [w:${e_non.w}]... ${connects ? 'Reconnects!' : 'Fails (cycle).'}`
                    });

                    if(connects) {
                        if(e_non.w < bestRepWt) {
                            bestRepWt = e_non.w;
                            bestRep = e_non;
                        }
                    }
                }

                if (bestRep) {
                    let candWt = mstWeight - e_mst.w + bestRep.w;
                    if (candWt < secondBestGlobal) secondBestGlobal = candWt;

                    steps.push({
                        type: 'found_candidate',
                        phase: 'Phase 2: Edge Replacement',
                        mstWt: mstWeight, candWt: candWt,
                        edgeState: cloneState(mst.filter(x => x !== e_mst), null, e_mst, bestRep, nonMst.filter(x => x !== bestRep)),
                        panel: `Best replacement found: (<code>${bestRep.u}</code>-<code>${bestRep.v}</code>) [w: ${bestRep.w}].<br>
                                New Tree Weight = ${mstWeight} - ${e_mst.w} + ${bestRep.w} = <b style="color:var(--accent-blue)">${candWt}</b>`,
                        statusText: `Best candidate yields weight ${candWt}.`,
                        log: `  -> Best replacement is (${bestRep.u}-${bestRep.v}). Candidate tree weight: ${candWt}`
                    });

                    if (candWt === mstWeight) {
                        isUnique = false;
                        steps.push({
                            type: 'duplicate_found',
                            phase: 'Phase 2: Edge Replacement',
                            mstWt: mstWeight, candWt: candWt,
                            edgeState: cloneState(mst.filter(x => x !== e_mst), null, null, bestRep, nonMst.filter(x => x !== bestRep)),
                            panel: `<span style="color:var(--accent-red); font-size:16px;">Alternative MST Found!</span><br>
                                    We created a different tree with the exact same minimum weight (${mstWeight}).<br>Therefore, the MST is <b>NOT UNIQUE</b>.`,
                            statusText: `Alternative MST found. Stopping search.`,
                            log: `\nAlternative MST found! Weight ${candWt} == ${mstWeight}. Search terminated.`
                        });
                        break outer;
                    }
                } else {
                    steps.push({
                        type: 'no_candidate',
                        phase: 'Phase 2: Edge Replacement',
                        mstWt: mstWeight, candWt: null,
                        edgeState: cloneState(mst.filter(x => x !== e_mst), null, e_mst, null, nonMst),
                        panel: `No valid replacement edges found to reconnect the graph without edge (<code>${e_mst.u}</code>-<code>${e_mst.v}</code>).`,
                        statusText: `No valid replacements for this edge.`,
                        log: `  -> No valid reconnecting edge found.`
                    });
                }
            }

            if (isUnique) {
                steps.push({
                    type: 'final',
                    phase: 'Complete',
                    mstWt: mstWeight, candWt: secondBestGlobal === Infinity ? 'None' : secondBestGlobal,
                    edgeState: cloneState(mst, null, null, null, nonMst),
                    panel: `Checked all MST edges. No alternative tree could achieve the minimum weight of ${mstWeight}.<br>
                            The Second-Best MST has weight ${secondBestGlobal}.<br>
                            <span style="color:var(--accent-green); font-size:16px;">The MST is UNIQUE!</span>`,
                    complete: true, result: 'True', isUnique: true,
                    statusText: `Algorithm completed. MST is Unique.`,
                    log: `\nAll edges checked. Second best weight: ${secondBestGlobal}. MST is Unique.`
                });
            } else {
                // Ensure last step shows False result
                steps[steps.length - 1].complete = true;
                steps[steps.length - 1].result = 'False';
                steps[steps.length - 1].isUnique = false;
            }
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const st = step.edgeState;

            // Helper to draw a single line
            const drawLine = (e, role) => {
                const p1 = nodeCoords[e.u];
                const p2 = nodeCoords[e.v];
                if(!p1 || !p2) return;

                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', p1.x);
                line.setAttribute('y1', p1.y);
                line.setAttribute('x2', p2.x);
                line.setAttribute('y2', p2.y);

                let isDashed = false;

                if(role === 'mst') {
                    line.setAttribute('stroke', 'var(--accent-green)');
                    line.setAttribute('stroke-width', '4');
                } else if(role === 'active') {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.classList.add('line-anim');
                } else if(role === 'removed') {
                    line.setAttribute('stroke', 'var(--accent-red)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('stroke-dasharray', '8, 8');
                    isDashed = true;
                } else if(role === 'candidate') {
                    line.setAttribute('stroke', 'var(--accent-blue)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('stroke-dasharray', '8, 8');
                    line.classList.add('line-anim');
                    isDashed = true;
                } else {
                    // nonMst
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                }

                g.appendChild(line);

                // Add Weight Label
                const midX = (p1.x + p2.x) / 2;
                const midY = (p1.y + p2.y) / 2;
                
                const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                bg.setAttribute('x', midX - 10);
                bg.setAttribute('y', midY - 10);
                bg.setAttribute('width', 20);
                bg.setAttribute('height', 20);
                bg.setAttribute('rx', 4);
                bg.setAttribute('class', 'edge-bg');
                
                const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                txt.setAttribute('x', midX);
                txt.setAttribute('y', midY);
                txt.setAttribute('class', 'edge-label');
                txt.setAttribute('fill', role === 'nonMst' ? 'var(--text-dim)' : 'var(--text-main)');
                txt.textContent = e.w;

                g.appendChild(bg);
                g.appendChild(txt);

                // Re-order drawing based on importance (active/candidates on top)
                if(role === 'nonMst' || role === 'mst') {
                    svg.appendChild(g);
                } else {
                    setTimeout(() => svg.appendChild(g), 0);
                }
            };

            // Draw in order of background to foreground
            if(st.nonMst) st.nonMst.forEach(e => drawLine(e, 'nonMst'));
            if(st.mst) st.mst.forEach(e => drawLine(e, 'mst'));
            if(st.removed) drawLine(st.removed, 'removed');
            if(st.active) drawLine(st.active, 'active');
            if(st.candidate) drawLine(st.candidate, 'candidate');
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes (Highlight nodes of active/candidate/removed edges)
            const activeNodes = new Set();
            const st = step.edgeState;
            if(st.active) { activeNodes.add(st.active.u); activeNodes.add(st.active.v); }
            if(st.removed) { activeNodes.add(st.removed.u); activeNodes.add(st.removed.v); }
            if(st.candidate) { activeNodes.add(st.candidate.u); activeNodes.add(st.candidate.v); }

            const nodes = document.querySelectorAll('.node');
            nodes.forEach(node => {
                const id = parseInt(node.id.replace('node-', ''));
                if (activeNodes.has(id)) node.classList.add('active');
                else node.classList.remove('active');
            });

            drawEdges(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-phase').innerText = step.phase;
            document.getElementById('val-mst-wt').innerText = step.mstWt !== null ? step.mstWt : '—';
            document.getElementById('val-cand-wt').innerText = step.candWt !== null ? step.candWt : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            
            if (step.complete) {
                resVal.className = step.isUnique ? 'pop' : 'pop-false';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
