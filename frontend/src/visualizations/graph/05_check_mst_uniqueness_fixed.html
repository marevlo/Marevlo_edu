<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check MST Uniqueness &middot; Graph</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:330px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'▸'; color:var(--accent-blue); align-self:flex-start; margin-top:2px;}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'✓'; color:var(--accent-green);}
.narration.fail{border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.06);}
.narration.fail::before{content:'✕'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto;}
svg.graph{display:block; width:400px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.tree{stroke:var(--accent-green); stroke-width:3.5; filter:drop-shadow(0 0 5px rgba(34,197,94,.55));}
.edge.active{stroke:var(--accent-purple); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.edge.removed{stroke:var(--accent-red); stroke-width:3.5; stroke-dasharray:8 8; opacity:.9;}
.edge.candidate{stroke:var(--accent-blue); stroke-width:3.5; stroke-dasharray:8 8; filter:drop-shadow(0 0 6px rgba(6,182,212,.55)); animation:dash 1s linear infinite;}
.elabel-bg{fill:#0b1322; stroke:var(--border-main); stroke-width:1; transition:fill .35s, stroke .35s;}
.elabel-bg.tree{stroke:rgba(34,197,94,.5);}
.elabel-bg.active{stroke:rgba(168,85,247,.6);}
.elabel-bg.removed{stroke:rgba(248,81,73,.6);}
.elabel-bg.candidate{stroke:rgba(6,182,212,.6);}
.elabel{font-family:var(--mono); font-weight:800; font-size:12px; fill:var(--text-dim); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.elabel.tree{fill:#bbf7d0;} .elabel.active{fill:#e9d5ff;} .elabel.removed{fill:#fca5a5;} .elabel.candidate{fill:#a5f3fc;}
.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode.active .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.gnode.active .nl{fill:#ffd591;}

.side{display:flex; flex-direction:column; gap:12px; min-width:230px; flex:1 1 230px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel.q .cap{color:var(--accent-orange);} .panel.v .cap{color:var(--accent-green);} .panel.r .cap{color:var(--accent-blue);}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start;}
.tile{min-width:34px; height:34px; padding:0 9px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:13px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.tile.q{border-color:rgba(245,165,36,.45); background:rgba(245,165,36,.12); color:#ffd591;}
.tile.v{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.1); color:#bbf7d0;}
.tile.r{border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.12); color:#a5f3fc;}
.tiles .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
.metric-row{display:flex; gap:8px; flex-wrap:wrap;}
.metric{flex:1 1 70px; background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:10px; padding:8px 10px; text-align:center;}
.metric .ml{font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:.03em;}
.metric .mv{font-family:var(--mono); font-size:17px; font-weight:800; margin-top:2px;}
.metric.base .mv{color:var(--accent-green);} .metric.cand .mv{color:var(--accent-blue);} .metric.phase .mv{color:var(--accent-orange); font-size:13px;}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;} .code-line .cm{color:#5b6b86; font-style:italic;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-orange);} .pill.n b{color:var(--accent-green);} .pill.s b{color:var(--accent-blue);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>V =</label>
  <input type="text" id="v-input" class="small-input" value="3">
  <label>edges =</label>
  <input type="text" id="e-input" class="large-input" value="[[0,1,1],[1,2,2],[0,2,3]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(3,'[[0,1,1],[1,2,2],[0,2,3]]')">Ex 1 (Unique)</button>
  <button onclick="loadExample(4,'[[0,1,1],[1,2,1],[2,3,1],[3,0,1],[0,2,2],[1,3,2]]')">Ex 2 (Not unique)</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Check MST Uniqueness <span class="sub">&middot; Kruskal + edge-swap test</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 400 400"></svg></div>
      <div class="side">
        <div class="panel q"><div class="cap">MST EDGES (chosen)</div><div class="tiles" id="t-tiles"></div></div>
        <div class="panel r"><div class="cap">NON-TREE EDGES</div><div class="tiles" id="n-tiles"></div></div>
        <div class="metric-row">
          <div class="metric phase"><div class="ml">PHASE</div><div class="mv" id="m-phase">&minus;</div></div>
          <div class="metric base"><div class="ml">MST WT</div><div class="mv" id="m-base">&minus;</div></div>
          <div class="metric cand"><div class="ml">SWAP WT</div><div class="mv" id="m-cand">&minus;</div></div>
        </div>
        <div class="panel v"><div class="cap">VERDICT &mdash; is MST unique?</div>
          <div class="tiles" id="verdict-box"><span class="empty">running&hellip;</span></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">phase <b id="pill-phase">&minus;</b></span>
        <span class="pill n">MST weight <b id="pill-base">&minus;</b></span>
        <span class="pill s">best swap <b id="pill-cand">&minus;</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>MST edge</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>processing</span>
          <span class="li"><span class="dot" style="background:var(--accent-red)"></span>removed</span>
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>candidate</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','mstIsUnique'],['src','(V, edges):']],
  [['src','  edges.sort(by weight)']],
  [['cm','  # Phase 1 — Kruskal builds base MST']],
  [['kw','  for'],['src',' (u,v,w) '],['kw','in'],['src',' edges:']],
  [['kw','    if'],['src',' find(u) != find(v): union; mst.add((u,v,w))']],
  [['kw','    else'],['src',': nonTree.add((u,v,w))']],
  [['cm','  # Phase 2 — try to swap each MST edge out']],
  [['kw','  for'],['src',' e '],['kw','in'],['src',' mst:']],
  [['src','    split mst at e -> two components']],
  [['kw','    for'],['src',' f '],['kw','in'],['src',' nonTree that reconnects them:']],
  [['kw','      if'],['src',' weight - e.w + f.w == weight: '],['kw','return'],['src',' False']],
  [['kw','  return'],['src',' True']],
];

class DSU{ constructor(n){this.p=Array.from({length:n},(_,i)=>i);}
  find(i){while(this.p[i]!==i){this.p[i]=this.p[this.p[i]];i=this.p[i];}return i;}
  union(i,j){const a=this.find(i),b=this.find(j);if(a!==b){this.p[a]=b;return true;}return false;} }

let V_count=3, allEdges=[], coord=[];
let steps=[], stepIndex=0, timer=null;
const delays=[1900,1000,520];
let confettiArmed=true;

function init(){ buildCode(); loadExample(3,'[[0,1,1],[1,2,2],[0,2,3]]'); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(v,eStr){ document.getElementById('v-input').value=v; document.getElementById('e-input').value=eStr; parseAndGen(); }
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    V_count=parseInt(document.getElementById('v-input').value.trim(),10);
    if(isNaN(V_count)||V_count<1){ alert('Invalid V'); return; }
    const eStr=document.getElementById('e-input').value.replace(/\(/g,'[').replace(/\)/g,']');
    const parsed=JSON.parse(eStr);
    allEdges=parsed.map((e,i)=>({id:'e'+i, u:e[0], v:e[1], w:e[2]}));
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid format for edges. Use [[u,v,w], ...]'); }
}

function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; coord=[];
  const cx=200, cy=200, R=Math.min(150, 80+V_count*9);
  for(let i=0;i<V_count;i++){ const ang=(Math.PI*2*i)/V_count - Math.PI/2; coord.push({x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)}); }
  // edges (line + label bg + label) built ONCE, keyed by id; only classes/attrs toggle per step
  allEdges.forEach(e=>{ const p1=coord[e.u], p2=coord[e.v]; if(!p1||!p2) return;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.id='eg-'+e.id;
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line'); ln.setAttribute('class','edge'); ln.id='el-'+e.id;
    ln.setAttribute('x1',p1.x); ln.setAttribute('y1',p1.y); ln.setAttribute('x2',p2.x); ln.setAttribute('y2',p2.y);
    g.appendChild(ln);
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
    const bg=document.createElementNS('http://www.w3.org/2000/svg','rect'); bg.setAttribute('class','elabel-bg'); bg.id='eb-'+e.id;
    bg.setAttribute('x',mx-11); bg.setAttribute('y',my-10); bg.setAttribute('width',22); bg.setAttribute('height',20); bg.setAttribute('rx',5);
    const tx=document.createElementNS('http://www.w3.org/2000/svg','text'); tx.setAttribute('class','elabel'); tx.id='et-'+e.id;
    tx.setAttribute('x',mx); tx.setAttribute('y',my); tx.textContent=e.w;
    g.appendChild(bg); g.appendChild(tx); svg.appendChild(g); });
  // nodes on top, keyed by id
  for(let i=0;i<V_count;i++){ const p=coord[i];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode'); g.id='gn'+i;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',20);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=i;
    g.appendChild(c); g.appendChild(t); svg.appendChild(g); }
}

// snapshot helper: store ids only -> renderStep is a pure function of the snapshot
function snap(o){
  steps.push({
    mstIds:[...o.mstIds], nonIds:[...o.nonIds],
    activeId:o.activeId??null, removedId:o.removedId??null, candId:o.candId??null,
    nodes:o.nodes?[...o.nodes]:[],
    phase:o.phase, baseWt:o.baseWt??null, candWt:o.candWt??null,
    code:o.code, narr:o.narr, log:o.log, complete:o.complete??false, result:o.result??null, unique:o.unique
  });
}

function generateSteps(){
  steps=[];
  const sorted=[...allEdges].sort((a,b)=>a.w-b.w || a.u-b.u || a.v-b.v);
  const dsu=new DSU(V_count);
  const mst=[]; const nonTree=[]; let mstWeight=0;

  snap({mstIds:[], nonIds:[], phase:'Kruskal', baseWt:0, code:[1],
    narr:`<b>Phase 1 &mdash; Kruskal.</b> Sort all edges by weight, then add them one by one with union-find. Sorted order: <code>${sorted.map(e=>e.w).join(' &le; ')}</code>.`,
    log:`sort edges by weight: [${sorted.map(e=>'('+e.u+'-'+e.v+',w'+e.w+')').join(' ')}]`});

  for(const e of sorted){
    const curNon=allEdges.filter(x=>!mst.includes(x)&&x!==e).map(x=>x.id);
    snap({mstIds:mst.map(x=>x.id), nonIds:nonTree.map(x=>x.id), activeId:e.id, nodes:[e.u,e.v], phase:'Kruskal', baseWt:mstWeight, code:[3,4],
      narr:`Consider edge <code>${e.u}&ndash;${e.v}</code> with weight <b>${e.w}</b>. Does <code>find(${e.u})</code> equal <code>find(${e.v})</code>? If not, it joins two components.`,
      log:`check edge (${e.u}-${e.v}) w=${e.w}`});
    if(dsu.union(e.u,e.v)){
      mst.push(e); mstWeight+=e.w;
      snap({mstIds:mst.map(x=>x.id), nonIds:nonTree.map(x=>x.id), nodes:[e.u,e.v], phase:'Kruskal', baseWt:mstWeight, code:[4],
        narr:`No cycle &rarr; <b style="color:#86efac">add to MST</b>. Running tree weight = <code>${mstWeight}</code>.`,
        log:`  add (${e.u}-${e.v}) -> MST weight ${mstWeight}`});
    } else {
      nonTree.push(e);
      snap({mstIds:mst.map(x=>x.id), nonIds:nonTree.map(x=>x.id), nodes:[e.u,e.v], phase:'Kruskal', baseWt:mstWeight, code:[5],
        narr:`Both endpoints already connected &rarr; edge <code>${e.u}&ndash;${e.v}</code> would make a cycle. Set it aside as a <b>non-tree edge</b>.`,
        log:`  cycle -> non-tree edge (${e.u}-${e.v})`});
    }
  }

  if(mst.length<V_count-1){
    snap({mstIds:mst.map(x=>x.id), nonIds:nonTree.map(x=>x.id), phase:'Disconnected', baseWt:mstWeight, code:[11],
      narr:`Only <code>${mst.length}</code> tree edges for <code>${V_count}</code> nodes &mdash; the graph is <b style="color:#fca5a5">disconnected</b>, so no spanning tree exists.`,
      log:`graph disconnected -> no MST`, complete:true, result:'False', unique:false});
    return;
  }

  snap({mstIds:mst.map(x=>x.id), nonIds:nonTree.map(x=>x.id), phase:'Swap test', baseWt:mstWeight, code:[6],
    narr:`<b>Base MST built</b>, total weight <b style="color:#86efac">${mstWeight}</b>. <b>Phase 2:</b> remove each tree edge and look for an equal-weight non-tree edge that could swap in. If one exists, the MST is <b>not unique</b>.`,
    log:`base MST weight = ${mstWeight}\nphase 2: edge-swap uniqueness test`});

  let isUnique=true; let bestSwapGlobal=Infinity;

  outer:
  for(const e_mst of mst){
    snap({mstIds:mst.filter(x=>x!==e_mst).map(x=>x.id), nonIds:nonTree.map(x=>x.id), removedId:e_mst.id, nodes:[e_mst.u,e_mst.v], phase:'Swap test', baseWt:mstWeight, code:[7,8],
      narr:`Remove MST edge <code>${e_mst.u}&ndash;${e_mst.v}</code> [w ${e_mst.w}]. The tree splits into <b>two components</b>; only a non-tree edge crossing the cut can reconnect them.`,
      log:`remove MST edge (${e_mst.u}-${e_mst.v}) w=${e_mst.w} -> 2 components`});

    const t=new DSU(V_count);
    for(const e of mst){ if(e!==e_mst) t.union(e.u,e.v); }

    let bestRep=null, bestRepW=Infinity;
    for(const f of nonTree){
      const reconnects = t.find(f.u)!==t.find(f.v);
      snap({mstIds:mst.filter(x=>x!==e_mst).map(x=>x.id), nonIds:nonTree.filter(x=>x!==f).map(x=>x.id), removedId:e_mst.id, candId:f.id, nodes:[f.u,f.v], phase:'Swap test', baseWt:mstWeight, code:[9],
        narr:`Try non-tree edge <code>${f.u}&ndash;${f.v}</code> [w ${f.w}]. ${reconnects?`<b style="color:#7dd3fc">It bridges the two components</b> &mdash; a valid replacement.`:`Both endpoints are in the same component &rarr; it does not bridge the cut.`}`,
        log:`  candidate (${f.u}-${f.v}) w=${f.w} -> ${reconnects?'reconnects':'same side, skip'}`});
      if(reconnects && f.w<bestRepW){ bestRepW=f.w; bestRep=f; }
    }

    if(bestRep){
      const candWt=mstWeight - e_mst.w + bestRep.w;
      if(candWt<bestSwapGlobal) bestSwapGlobal=candWt;
      snap({mstIds:mst.filter(x=>x!==e_mst).map(x=>x.id), nonIds:nonTree.filter(x=>x!==bestRep).map(x=>x.id), removedId:e_mst.id, candId:bestRep.id, nodes:[bestRep.u,bestRep.v], phase:'Swap test', baseWt:mstWeight, candWt:candWt, code:[10],
        narr:`Cheapest reconnecting edge is <code>${bestRep.u}&ndash;${bestRep.v}</code> [w ${bestRep.w}]. Swapped tree weight = ${mstWeight} &minus; ${e_mst.w} + ${bestRep.w} = <b style="color:#7dd3fc">${candWt}</b>.`,
        log:`  best swap = (${bestRep.u}-${bestRep.v}) -> tree weight ${candWt}`});
      if(candWt===mstWeight){
        isUnique=false;
        snap({mstIds:mst.filter(x=>x!==e_mst).map(x=>x.id), nonIds:nonTree.filter(x=>x!==bestRep).map(x=>x.id), candId:bestRep.id, nodes:[bestRep.u,bestRep.v], phase:'Not unique', baseWt:mstWeight, candWt:candWt, code:[10],
          narr:`Swapped weight <code>${candWt}</code> equals the MST weight <code>${mstWeight}</code> &mdash; a <b style="color:#fca5a5">different spanning tree</b> ties the minimum. The MST is <b style="color:#fca5a5">NOT UNIQUE</b>.`,
          log:`equal-weight swap found (${candWt} == ${mstWeight}) -> NOT UNIQUE`, complete:true, result:'False', unique:false});
        break outer;
      }
    } else {
      snap({mstIds:mst.filter(x=>x!==e_mst).map(x=>x.id), nonIds:nonTree.map(x=>x.id), removedId:e_mst.id, nodes:[e_mst.u,e_mst.v], phase:'Swap test', baseWt:mstWeight, code:[9],
        narr:`No non-tree edge can reconnect the cut left by <code>${e_mst.u}&ndash;${e_mst.v}</code>. This edge is irreplaceable.`,
        log:`  no reconnecting edge for (${e_mst.u}-${e_mst.v})`});
    }
  }

  if(isUnique){
    snap({mstIds:mst.map(x=>x.id), nonIds:nonTree.map(x=>x.id), phase:'Unique', baseWt:mstWeight, candWt:(bestSwapGlobal===Infinity?null:bestSwapGlobal), code:[11],
      narr:`Every MST edge was tested and no equal-weight swap exists${bestSwapGlobal===Infinity?'':` (best alternative tree weighs <code>${bestSwapGlobal}</code> &gt; <code>${mstWeight}</code>)`}. The MST is <b style="color:#86efac">UNIQUE</b>.`,
      log:`all edges tested, no tie${bestSwapGlobal===Infinity?'':' (2nd best = '+bestSwapGlobal+')'} -> UNIQUE`, complete:true, result:'True', unique:true});
  }
}

function setEdgeRole(id, role){
  const ln=document.getElementById('el-'+id), bg=document.getElementById('eb-'+id), tx=document.getElementById('et-'+id);
  if(ln){ ln.classList.remove('tree','active','removed','candidate'); if(role) ln.classList.add(role); }
  if(bg){ bg.classList.remove('tree','active','removed','candidate'); if(role&&role!=='dim') bg.classList.add(role); }
  if(tx){ tx.classList.remove('tree','active','removed','candidate'); if(role&&role!=='dim') tx.classList.add(role); }
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;

  // edges: re-derive role for every edge id from the snapshot (pure)
  const mstSet=new Set(step.mstIds), nonSet=new Set(step.nonIds);
  allEdges.forEach(e=>{
    let role=null;
    if(e.id===step.activeId) role='active';
    else if(e.id===step.removedId) role='removed';
    else if(e.id===step.candId) role='candidate';
    else if(mstSet.has(e.id)) role='tree';
    // non-tree / untouched -> default dim styling (no class)
    setEdgeRole(e.id, role);
  });

  // nodes: only the active/removed/candidate endpoints glow
  const activeNodes=new Set(step.nodes);
  for(let i=0;i<V_count;i++){ const g=document.getElementById('gn'+i); if(!g) continue;
    g.classList.toggle('active', activeNodes.has(i));
    if(activeNodes.has(i)){ const c=g.querySelector('.nc'); if(c) Motion.pop(c); } }

  // side tiles
  const fmt=ids=>ids.map(id=>{const e=allEdges.find(x=>x.id===id); return e?`${e.u}-${e.v}`:id;});
  fillTiles('t-tiles', fmt(step.mstIds), 'q');
  fillTiles('n-tiles', fmt(step.nonIds), 'r');

  // metrics
  document.getElementById('m-phase').textContent=step.phase;
  document.getElementById('m-base').innerHTML=step.baseWt!=null?step.baseWt:'&minus;';
  document.getElementById('m-cand').innerHTML=step.candWt!=null?step.candWt:'&minus;';

  // verdict
  const vb=document.getElementById('verdict-box');
  if(step.complete){ const t=document.createElement('div');
    t.className='tile '+(step.unique?'v':'r'); t.style.minWidth='auto'; t.style.padding='0 14px';
    t.textContent=step.result+(step.unique?'  (unique)':'  (not unique)'); vb.innerHTML=''; vb.appendChild(t); Motion.pop(t);
  } else { vb.innerHTML='<span class="empty">running&hellip;</span>'; }

  // narration
  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done', !!step.complete && step.unique===true);
  narr.classList.toggle('fail', !!step.complete && step.unique===false);

  // code highlight
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i+1)); });

  // pills
  document.getElementById('pill-phase').textContent=step.phase;
  document.getElementById('pill-base').innerHTML=step.baseWt!=null?step.baseWt:'&minus;';
  document.getElementById('pill-cand').innerHTML=step.candWt!=null?step.candWt:'&minus;';

  // progress + badge
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  // log up to idx
  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color=steps[k].unique?'var(--accent-green)':'var(--accent-red)'; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete && step.unique===true){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fillTiles(id, arr, cls){
  const c=document.getElementById(id); c.innerHTML='';
  if(!arr.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ none }'; c.appendChild(e); return; }
  arr.forEach(v=>{ const t=document.createElement('div'); t.className='tile '+cls; t.textContent=v; c.appendChild(t); });
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
