<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clone Graph (DFS with HashMap) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        #g-input { width: 350px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & HASH MAP */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        .graphs-wrapper {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .graph-box { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .col-title { font-size: 14px; font-weight: bold; color: var(--text-dim); font-family: monospace; letter-spacing: 1px;}

        .graph-area {
            position: relative;
            width: 320px;
            height: 280px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        .edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 14px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        /* Node states */
        .orig-node.active { border-color: var(--accent-orange); box-shadow: 0 0 10px rgba(227,179,65,0.4); transform: translate(-50%, -50%) scale(1.15); z-index: 2; color: var(--accent-orange);}
        .orig-node.neighbor { border-color: var(--accent-purple); color: var(--accent-purple); }
        .orig-node.visited { background: #1a150b; border-color: #6e5518; color: #6e5518; }
        
        .clone-node { visibility: hidden; opacity: 0; border-color: var(--accent-green); color: var(--accent-green); }
        .clone-node.exists { visibility: visible; opacity: 1; background: #0f2a1a;}
        .clone-node.active { box-shadow: 0 0 12px var(--accent-green); transform: translate(-50%, -50%) scale(1.15); z-index: 2; background: #153c24;}
        .clone-node.neighbor { border-color: var(--accent-purple); color: var(--accent-purple); box-shadow: 0 0 10px var(--accent-purple); }

        /* Hash Map Section */
        .map-section { display: flex; flex-direction: column; gap: 8px; align-items: center; width: 100%; max-width: 670px; background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 8px; padding: 12px; min-height: 80px;}
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; width: 100%;}
        .map-entry {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: var(--bg-page); border: 1px solid var(--border-main); border-radius: 6px; padding: 6px 12px;
            font-family: monospace; font-size: 14px; font-weight: bold; transition: all 0.3s;
        }
        .map-entry.new { border-color: var(--accent-green); box-shadow: 0 0 8px rgba(63,185,80,0.3); }
        .map-key { color: var(--accent-orange); }
        .map-val { color: var(--accent-green); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 670px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 670px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; text-align: center; word-break: break-all; max-width: 650px;}
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 670px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim {
            stroke-dasharray: 6;
            animation: dash 1s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -12; }
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">adjList =</label>
        <input type="text" id="g-input" placeholder="[[2,4],[1,3],[2,4],[1,3]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[[2,4],[1,3],[2,4],[1,3]]')">Ex 1</button>
        <button onclick="loadExample('[[]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graphs-wrapper">
            <div class="graph-box">
                <div class="col-title">Original Graph</div>
                <div class="graph-area" id="orig-graph-area">
                    <svg class="edges-svg" id="orig-edges-svg"></svg>
                    <div class="nodes-container" id="orig-nodes-container"></div>
                </div>
            </div>
            <div class="graph-box">
                <div class="col-title">Cloned Graph</div>
                <div class="graph-area" id="clone-graph-area">
                    <svg class="edges-svg" id="clone-edges-svg"></svg>
                    <div class="nodes-container" id="clone-nodes-container"></div>
                </div>
            </div>
        </div>

        <div class="map-section">
            <div class="ui-label">Visited Hash Map (Original ➔ Clone)</div>
            <div class="tiles-wrapper" id="map-tiles">
                <span style="color:var(--text-dim); font-size:13px; font-family:monospace;">{ empty }</span>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Neighbor Node (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Returned Clone</span>
            <span class="info-value" id="val-clone" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">final cloned adjList =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border:2px solid var(--accent-orange)"></span> Orig Active</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border:2px solid var(--accent-purple)"></span> Neighbor</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Clone Created</div>
        <div class="legend-item"><span class="dot" style="background:#1a150b; border:2px solid #6e5518"></span> Orig Visited</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let adjList = [[2,4],[1,3],[2,4],[1,3]];
        let nodeCoords = {};
        let originalEdges = [];
        let N = 0;
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];

        function init() { loadExample('[[2,4],[1,3],[2,4],[1,3]]'); }

        function loadExample(jsonStr) {
            document.getElementById('g-input').value = jsonStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            const valStr = document.getElementById('g-input').value;
            try {
                adjList = JSON.parse(valStr);
                if (!Array.isArray(adjList)) throw "Must be array";
                N = adjList.length;
                setupGraphs();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid JSON format. Expected adjacency list (e.g., [[2,4],[1,3]...])");
            }
        }

        function setupGraphs() {
            const origCont = document.getElementById('orig-nodes-container');
            const cloneCont = document.getElementById('clone-nodes-container');
            origCont.innerHTML = '';
            cloneCont.innerHTML = '';
            nodeCoords = {};
            originalEdges = [];

            if (N === 0) return;

            const cx = 160;
            const cy = 140;
            const radius = 90;

            // Pre-calculate positions
            for (let i = 1; i <= N; i++) {
                // Adjust angle so node 1 is at top
                const angle = (Math.PI * 2 * (i-1)) / N - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                // Create Original Node
                const oNode = document.createElement('div');
                oNode.className = 'node orig-node';
                oNode.id = `o-node-${i}`;
                oNode.style.left = `${x}px`; oNode.style.top = `${y}px`;
                oNode.innerText = i;
                origCont.appendChild(oNode);

                // Create Clone Node
                const cNode = document.createElement('div');
                cNode.className = 'node clone-node';
                cNode.id = `c-node-${i}`;
                cNode.style.left = `${x}px`; cNode.style.top = `${y}px`;
                cNode.innerText = `${i}'`;
                cloneCont.appendChild(cNode);
            }

            // Extract all unique original edges (1-based indices)
            let drawn = new Set();
            for (let u = 1; u <= N; u++) {
                const neighbors = adjList[u-1] || [];
                for (let v of neighbors) {
                    let key = [u,v].sort((a,b)=>a-b).join('-');
                    if (!drawn.has(key)) {
                        drawn.add(key);
                        originalEdges.push([u, v]);
                    }
                }
            }
        }

        function generateSteps() {
            steps = [];
            let visitedMap = {};
            let clonedEdges = [];
            let finalAdjList = Array.from({length: N}, () => []);

            steps.push({
                type: 'init', u: null, v: null, clone_res: null,
                visitedMap: {...visitedMap}, clonedEdges: [...clonedEdges],
                panel: "Initialize <b>Clone Graph</b>. <br>Create an empty Hash Map to track mapping from Original Nodes to Cloned Nodes.",
                statusText: `Graphs mapped. Click Play to start DFS.`,
                log: `Starting DFS with HashMap Clone Graph algorithm.\nTotal original nodes: ${N}`
            });

            if (N === 0) {
                steps.push({
                    type: 'final', complete: true, result: '[]',
                    visitedMap: {}, clonedEdges: [],
                    panel: `Graph is empty. Return null/empty array.`,
                    statusText: `Done.`, log: `Empty graph. Terminated.`
                });
                return;
            }

            function dfs(u, depth) {
                let pad = "  ".repeat(depth);
                
                steps.push({
                    type: 'visit', u: u, v: null, clone_res: null,
                    visitedMap: {...visitedMap}, clonedEdges: [...clonedEdges],
                    panel: `DFS Visit Original Node <b style="color:var(--accent-orange)">${u}</b>.<br>Checking if it exists in the Hash Map...`,
                    statusText: `Exploring Node ${u}...`,
                    log: `${pad}dfs(${u}) called.`
                });

                if (visitedMap[u]) {
                    steps.push({
                        type: 'in_map', u: u, v: null, clone_res: `${u}'`,
                        visitedMap: {...visitedMap}, clonedEdges: [...clonedEdges],
                        panel: `Node <b style="color:var(--accent-orange)">${u}</b> is ALREADY in the Hash Map!<br>Returning its existing clone <b style="color:var(--accent-green)">${u}'</b> to prevent cycles.`,
                        statusText: `Node ${u} found in map. Returning clone.`,
                        log: `${pad}  Node ${u} already in map. Returning Clone ${u}'.`
                    });
                    return u; // returning the ID of the clone, which matches original for viz
                }

                // Not in map -> Clone it
                visitedMap[u] = u; // conceptually u -> u'
                
                steps.push({
                    type: 'clone', u: u, v: null, clone_res: `${u}'`,
                    visitedMap: {...visitedMap}, clonedEdges: [...clonedEdges],
                    panel: `Node <b style="color:var(--accent-orange)">${u}</b> is NOT in map.<br>Created new Clone <b style="color:var(--accent-green)">${u}'</b> and added mapping.`,
                    statusText: `Created Clone ${u}'.`,
                    log: `${pad}  Created Clone ${u}'. Added ${u} -> ${u}' to map.`,
                    isNewMapEntry: u
                });

                const neighbors = adjList[u-1] || [];
                
                if (neighbors.length === 0) {
                    steps.push({
                        type: 'no_neighbors', u: u, v: null, clone_res: `${u}'`,
                        visitedMap: {...visitedMap}, clonedEdges: [...clonedEdges],
                        panel: `Original Node <b style="color:var(--accent-orange)">${u}</b> has no neighbors.`,
                        statusText: `No neighbors to process for Node ${u}.`,
                        log: `${pad}  Node ${u} has no neighbors.`
                    });
                }

                for (let v of neighbors) {
                    steps.push({
                        type: 'check_neighbor', u: u, v: v, clone_res: null,
                        visitedMap: {...visitedMap}, clonedEdges: [...clonedEdges],
                        panel: `Checking neighbor <b style="color:var(--accent-purple)">${v}</b> of Original Node <b style="color:var(--accent-orange)">${u}</b>.<br>Recursively calling <code>dfs(${v})</code>.`,
                        statusText: `Recursively cloning neighbor ${v}...`,
                        log: `${pad}  Neighbor ${v}: Recursively calling dfs(${v})`
                    });

                    let clone_v = dfs(v, depth + 1);

                    // Add to final adj list 
                    finalAdjList[u-1].push(clone_v);

                    // Visually add edge if not duplicate (undirected visual)
                    let edgeStr = [u, clone_v].sort((a,b)=>a-b).join('-');
                    let edgeExists = clonedEdges.some(e => [e[0],e[1]].sort((a,b)=>a-b).join('-') === edgeStr);
                    
                    if (!edgeExists) {
                        clonedEdges.push([u, clone_v]);
                    }

                    steps.push({
                        type: 'add_edge', u: u, v: v, clone_res: `${clone_v}'`,
                        visitedMap: {...visitedMap}, clonedEdges: [...clonedEdges],
                        panel: `<code>dfs(${v})</code> returned Clone <b style="color:var(--accent-green)">${clone_v}'</b>.<br>Added connection: <b style="color:var(--accent-green)">${u}' ➔ ${clone_v}'</b> in the Cloned Graph.`,
                        statusText: `Connected Clone ${u}' to Clone ${clone_v}'.`,
                        log: `${pad}  Connected Clone ${u}' -> Clone ${clone_v}'.`
                    });
                }

                steps.push({
                    type: 'backtrack', u: u, v: null, clone_res: `${u}'`,
                    visitedMap: {...visitedMap}, clonedEdges: [...clonedEdges],
                    panel: `Finished processing all neighbors for Original Node <b style="color:var(--accent-orange)">${u}</b>.<br>Returning its completed Clone <b style="color:var(--accent-green)">${u}'</b>.`,
                    statusText: `Finished dfs(${u}). Backtracking.`,
                    log: `${pad}Finished dfs(${u}). Returning Clone ${u}'.`
                });

                return u;
            }

            dfs(1, 0);

            steps.push({
                type: 'final', u: null, v: null, clone_res: null,
                visitedMap: {...visitedMap}, clonedEdges: [...clonedEdges],
                panel: `<span style="color:var(--accent-green); font-size: 16px;">DFS Graph Cloning Complete!</span><br>All nodes and edges have been perfectly replicated.`,
                complete: true,
                result: JSON.stringify(finalAdjList),
                statusText: `Algorithm completed.`,
                log: `\nFinal Cloned Adjacency List generated.`,
                logColor: 'var(--accent-green)'
            });
        }

        function drawOrigEdges(step) {
            const svg = document.getElementById('orig-edges-svg');
            svg.innerHTML = '';
            
            for (let edge of originalEdges) {
                const u = edge[0]; const v = edge[1];
                const p1 = nodeCoords[u]; const p2 = nodeCoords[v];
                if(!p1 || !p2) continue;

                let isExploring = (step.u === u && step.v === v) || (step.u === v && step.v === u);

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y);
                line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y);

                if (isExploring) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '3');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    svg.appendChild(line);
                }
            }
        }

        function drawCloneEdges(step) {
            const svg = document.getElementById('clone-edges-svg');
            svg.innerHTML = '';
            
            for (let edge of step.clonedEdges || []) {
                const u = edge[0]; const v = edge[1];
                const p1 = nodeCoords[u]; const p2 = nodeCoords[v];
                if(!p1 || !p2) continue;

                let isNew = step.type === 'add_edge' && ((step.u === u && step.v === v) || (step.u === v && step.v === u));

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y);
                line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y);

                if (isNew) {
                    line.setAttribute('stroke', 'var(--accent-green)');
                    line.setAttribute('stroke-width', '4');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else {
                    line.setAttribute('stroke', 'var(--accent-green)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('opacity', '0.6');
                    svg.appendChild(line);
                }
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Original Nodes
            for(let i=1; i<=N; i++) {
                const oNode = document.getElementById(`o-node-${i}`);
                if(!oNode) continue;
                oNode.className = 'node orig-node';
                
                if (step.visitedMap && step.visitedMap[i]) oNode.classList.add('visited');
                if (step.u === i) oNode.classList.add('active');
                if (step.v === i) oNode.classList.add('neighbor');
            }

            // Render Cloned Nodes
            for(let i=1; i<=N; i++) {
                const cNode = document.getElementById(`c-node-${i}`);
                if(!cNode) continue;
                cNode.className = 'node clone-node';
                
                if (step.visitedMap && step.visitedMap[i]) cNode.classList.add('exists');
                if (step.u === i && step.type !== 'check_neighbor') cNode.classList.add('active'); // active u'
                if (step.v === i && step.type === 'add_edge') cNode.classList.add('neighbor');
            }

            drawOrigEdges(step);
            drawCloneEdges(step);

            // Render Hash Map
            const mapContainer = document.getElementById('map-tiles');
            mapContainer.innerHTML = '';
            const keys = Object.keys(step.visitedMap || {});
            if (keys.length === 0) {
                mapContainer.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace;">{ empty }</span>';
            } else {
                keys.forEach(k => {
                    const entry = document.createElement('div');
                    entry.className = 'map-entry';
                    if (step.isNewMapEntry == k) entry.classList.add('new');
                    
                    entry.innerHTML = `<span class="map-key">${k}</span> ➔ <span class="map-val">${k}'</span>`;
                    mapContainer.appendChild(entry);
                });
            }

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? step.u : '—';
            document.getElementById('val-v').innerText = step.v !== null ? step.v : '—';
            document.getElementById('val-clone').innerHTML = step.clone_res ? `<b>${step.clone_res}</b>` : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) resVal.classList.add('pop');
            else resVal.classList.remove('pop');

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
