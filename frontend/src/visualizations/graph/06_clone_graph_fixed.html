<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clone Graph &middot; Graph</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:330px;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}
.narration b.u{color:#ffd591;} .narration b.v{color:#e9d5ff;} .narration b.c{color:#bbf7d0;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; gap:16px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graphs{display:flex; gap:14px; flex-wrap:wrap; justify-content:center; flex:1 1 auto;}
.graph-box{display:flex; flex-direction:column; align-items:center; gap:8px;}
.col-title{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;}
.col-title.orig{color:var(--accent-orange);} .col-title.clone{color:var(--accent-green);}
svg.graph{display:block; width:300px; max-width:100%; height:auto;
  background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:12px;}

.edge{stroke:var(--border-main); stroke-width:2; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.checking{stroke:var(--accent-purple); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.edge.cloned{stroke:var(--accent-green); stroke-width:2.5; opacity:.65; filter:drop-shadow(0 0 4px rgba(34,197,94,.4));}
.edge.cloned.fresh{stroke-width:4; opacity:1; filter:drop-shadow(0 0 7px rgba(34,197,94,.7)); stroke-dasharray:7; animation:dash 1s linear infinite;}

.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s, stroke-width .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:14px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
/* original-side states */
.gnode.visited .nc{stroke:#6e5518; fill:rgba(245,165,36,.06);}
.gnode.visited .nl{fill:#a98c47;}
.gnode.activeu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.gnode.activeu .nl{fill:#ffd591;}
.gnode.neighbor .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.14); filter:drop-shadow(0 0 10px rgba(168,85,247,.55)); stroke-width:3;}
.gnode.neighbor .nl{fill:#e9d5ff;}
/* clone-side states: hidden until created */
.gnode.clone{opacity:0; transition:opacity .4s ease, fill .35s, stroke .35s, filter .35s;}
.gnode.clone .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.10);}
.gnode.clone .nl{fill:#bbf7d0;}
.gnode.clone.exists{opacity:1;}
.gnode.clone.activeu .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.20); filter:drop-shadow(0 0 12px rgba(34,197,94,.65)); stroke-width:3;}
.gnode.clone.activeu .nl{fill:#dcfce7;}
.gnode.clone.neighbor .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 10px rgba(168,85,247,.6)); stroke-width:3;}
.gnode.clone.neighbor .nl{fill:#e9d5ff;}

.side{display:flex; flex-direction:column; gap:12px; min-width:220px; flex:1 1 220px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel.m .cap{color:var(--accent-blue);} .panel.s .cap{color:var(--accent-orange);}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start;}
.map-entry{display:flex; align-items:center; gap:6px; min-height:34px; padding:0 10px;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:13px;
  border:1.5px solid var(--border-main); background:rgba(255,255,255,.04);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1), border-color .3s, box-shadow .3s;}
.map-entry.new{border-color:rgba(34,197,94,.5); box-shadow:0 0 10px rgba(34,197,94,.3);}
.map-key{color:#ffd591;} .map-arrow{color:var(--text-dim); font-weight:600;} .map-val{color:#bbf7d0;}
.tiles .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
.stack-row{display:flex; flex-wrap:wrap; gap:6px;}
.frame{min-width:30px; height:30px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:8px; font-family:var(--mono); font-weight:800; font-size:13px;
  border:1.5px solid rgba(245,165,36,.4); background:rgba(245,165,36,.10); color:#ffd591;}
.frame.top{border-color:var(--accent-orange); box-shadow:0 0 10px rgba(245,165,36,.35); background:rgba(245,165,36,.2);}

#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-orange);} .pill.n b{color:var(--accent-purple);} .pill.c b{color:var(--accent-green);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>adjList =</label>
  <input type="text" id="g-input" class="large-input" value="[[2,4],[1,3],[2,4],[1,3]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample('[[2,4],[1,3],[2,4],[1,3]]')">Ex 1</button>
  <button onclick="loadExample('[[2],[1,3],[2]]')">Ex 2</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Clone Graph <span class="sub">&middot; deep-copy a graph via DFS + hashmap</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graphs">
        <div class="graph-box">
          <div class="col-title orig">Original</div>
          <svg class="graph" id="orig-graph" viewBox="0 0 300 280"></svg>
        </div>
        <div class="graph-box">
          <div class="col-title clone">Clone</div>
          <svg class="graph" id="clone-graph" viewBox="0 0 300 280"></svg>
        </div>
      </div>
      <div class="side">
        <div class="panel m"><div class="cap">VISITED MAP (orig &#8594; clone)</div><div class="tiles" id="map-tiles"></div></div>
        <div class="panel s"><div class="cap">DFS CALL STACK</div><div class="stack-row" id="stack-tiles"></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&#8592; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &#8594;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&#8592; &#8594;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">node u = <b id="pill-u">&mdash;</b></span>
        <span class="pill n">neighbor v = <b id="pill-v">&mdash;</b></span>
        <span class="pill c">returns <b id="pill-c">&mdash;</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>active u</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>neighbor v</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>clone created</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','cloneGraph'],['src','(node):']],
  [['src','  visited = {}        # orig '],['kw','->'],['src',' clone']],
  [['kw','  def'],['fn',' dfs'],['src','(u):']],
  [['kw','    if'],['src',' u '],['kw','in'],['src',' visited:']],
  [['kw','      return'],['src',' visited[u]   # avoid cycles']],
  [['src',"    clone = Node(u.val)  # copy node"]],
  [['src','    visited[u] = clone']],
  [['kw','    for'],['src',' v '],['kw','in'],['src',' u.neighbors:']],
  [['src','      clone.neighbors.append(dfs(v))']],
  [['kw','    return'],['src',' clone']],
  [['kw','  return'],['fn',' dfs'],['src','(node)']],
];

let adjList=[[2,4],[1,3],[2,4],[1,3]];
let nodeCoords={}, origEdges=[], N=0;
let steps=[], stepIndex=0, timer=null;
const delays=[1900,1000,520];
let confettiArmed=true;

function init(){ buildCode(); loadExample('[[2,4],[1,3],[2,4],[1,3]]'); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(jsonStr){ document.getElementById('g-input').value=jsonStr; parseAndGen(); }
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    const parsed=JSON.parse(document.getElementById('g-input').value);
    if(!Array.isArray(parsed)) throw 'not array';
    adjList=parsed; N=adjList.length;
    setupGraphs(); generateSteps(); reset();
  }catch(e){ alert('Invalid adjacency list JSON. Expected e.g. [[2,4],[1,3],[2,4],[1,3]]'); }
}

function setupGraphs(){
  const oSvg=document.getElementById('orig-graph'), cSvg=document.getElementById('clone-graph');
  oSvg.innerHTML=''; cSvg.innerHTML=''; nodeCoords={}; origEdges=[];
  if(N===0) return;
  const cx=150, cy=140, R=Math.min(100, 50+N*9);
  for(let i=1;i<=N;i++){
    const ang=(Math.PI*2*(i-1))/N - Math.PI/2;
    nodeCoords[i]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)};
  }
  // unique undirected edges (1-based)
  const drawn=new Set();
  for(let u=1;u<=N;u++){ for(const v of (adjList[u-1]||[])){
    const key=[u,v].sort((a,b)=>a-b).join('-');
    if(!drawn.has(key)){ drawn.add(key); origEdges.push([u,v]); }
  } }
  // edges
  origEdges.forEach((e,i)=>{
    const p1=nodeCoords[e[0]], p2=nodeCoords[e[1]]; if(!p1||!p2) return;
    [['orig-graph','oe'],['clone-graph','ce']].forEach(([svgId,pre])=>{
      const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
      ln.setAttribute('class','edge'); ln.id=pre+i;
      ln.setAttribute('x1',p1.x); ln.setAttribute('y1',p1.y); ln.setAttribute('x2',p2.x); ln.setAttribute('y2',p2.y);
      ln.dataset.a=e[0]; ln.dataset.b=e[1];
      document.getElementById(svgId).appendChild(ln);
    });
  });
  // nodes
  for(let i=1;i<=N;i++){ const p=nodeCoords[i];
    const mkNode=(svgId,cls,label)=>{
      const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class',cls); g.id=(cls.includes('clone')?'cn':'on')+i;
      const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',18);
      const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=label;
      g.appendChild(c); g.appendChild(t); document.getElementById(svgId).appendChild(g);
    };
    mkNode('orig-graph','gnode', String(i));
    mkNode('clone-graph','gnode clone', i+"'");
  }
}

function generateSteps(){
  steps=[]; const visited={}; let clonedEdges=[]; const stack=[];
  const finalAdj=Array.from({length:N},()=>[]);
  const mapSnap=()=>({...visited});
  function snap(o){ steps.push({
    type:o.type, u:o.u??null, v:o.v??null, ret:o.ret??null,
    map:mapSnap(), clonedEdges:clonedEdges.map(e=>[...e]), stack:[...stack],
    code:o.code, narr:o.narr, log:o.log, newKey:o.newKey??null,
    edgeUV:o.edgeUV??null, complete:o.complete, result:o.result }); }

  snap({type:'init', code:[0,1], narr:`<b>cloneGraph</b> deep-copies the graph. Start a <code>visited</code> map (original node &#8594; its clone) to avoid re-cloning and infinite cycles.`, log:`init clone of ${N}-node graph. visited={}`});

  if(N===0){
    snap({type:'final', code:[10], complete:true, result:'[]', narr:`Graph is empty &#8594; return <code>null</code>. Nothing to clone.`, log:`empty graph; return null`});
    return;
  }

  function dfs(u, depth){
    const pad='  '.repeat(depth);
    stack.push(u);
    snap({type:'visit', u, code:[2,3], narr:`<code>dfs(${u})</code>: is <b class="u">${u}</b> already in <code>visited</code>?`, log:`${pad}dfs(${u})`});
    if(visited[u]){
      snap({type:'in_map', u, ret:u, code:[3,4], narr:`<b class="u">${u}</b> is already cloned &#8594; return existing clone <b class="c">${u}'</b> (this is what prevents revisiting cycles).`, log:`${pad}  ${u} in map -> return ${u}'`});
      stack.pop();
      return u;
    }
    visited[u]=u;
    snap({type:'clone', u, ret:u, code:[5,6], newKey:u, narr:`<b class="u">${u}</b> is new &#8594; create clone <b class="c">${u}'</b> and record <code>${u} &#8594; ${u}'</code> in the map.`, log:`${pad}  clone ${u}'; map[${u}]=${u}'`});
    const nb=adjList[u-1]||[];
    if(nb.length===0){
      snap({type:'no_nb', u, ret:u, code:[7], narr:`<b class="u">${u}</b> has no neighbors &#8594; clone <b class="c">${u}'</b> stays isolated.`, log:`${pad}  ${u} has no neighbors`});
    }
    for(const v of nb){
      snap({type:'check', u, v, code:[7,8], narr:`Neighbor <b class="v">${v}</b> of <b class="u">${u}</b>: recurse <code>dfs(${v})</code> to get its clone.`, log:`${pad}  neighbor ${v} -> dfs(${v})`});
      const cv=dfs(v, depth+1);
      finalAdj[u-1].push(cv);
      const key=[u,cv].sort((a,b)=>a-b).join('-');
      if(!clonedEdges.some(e=>[e[0],e[1]].sort((a,b)=>a-b).join('-')===key)) clonedEdges.push([u,cv]);
      snap({type:'add_edge', u, v, ret:cv, edgeUV:[u,cv], code:[8], narr:`<code>dfs(${v})</code> returned <b class="c">${cv}'</b> &#8594; wire clone edge <b class="c">${u}' &#8212; ${cv}'</b> into the copy.`, log:`${pad}  wire ${u}' -- ${cv}'`});
    }
    snap({type:'backtrack', u, ret:u, code:[9], narr:`All neighbors of <b class="u">${u}</b> handled &#8594; return finished clone <b class="c">${u}'</b>.`, log:`${pad}return ${u}'`});
    stack.pop();
    return u;
  }
  dfs(1,0);
  snap({type:'final', code:[10], complete:true, result:JSON.stringify(finalAdj),
    narr:`Done &#8212; every node and edge mirrored. Cloned adjList = <code>${JSON.stringify(finalAdj)}</code>.`,
    log:`done. clone adjList = ${JSON.stringify(finalAdj)}`});
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const mapKeys=Object.keys(step.map).map(Number);
  const mapSet=new Set(mapKeys);

  // original-side nodes
  for(let i=1;i<=N;i++){ const g=document.getElementById('on'+i); if(!g) continue;
    g.className='gnode';
    if(mapSet.has(i)) g.classList.add('visited');
    if(step.u===i) { g.classList.remove('visited'); g.classList.add('activeu'); }
    if(step.v===i) g.classList.add('neighbor');
  }
  // clone-side nodes
  for(let i=1;i<=N;i++){ const g=document.getElementById('cn'+i); if(!g) continue;
    g.className='gnode clone';
    if(mapSet.has(i)) g.classList.add('exists');
    if(step.u===i && (step.type==='clone'||step.type==='in_map'||step.type==='add_edge'||step.type==='backtrack'||step.type==='no_nb')) g.classList.add('activeu');
    if(step.v===i && step.type==='add_edge') g.classList.add('neighbor');
    if(step.newKey===i){ const c=g.querySelector('.nc'); if(c) Motion.pop(c); }
  }
  // original edges: highlight the one being explored
  origEdges.forEach((e,i)=>{ const ln=document.getElementById('oe'+i); if(!ln) return;
    ln.classList.remove('checking');
    const exploring = step.u!=null && step.v!=null && ((e[0]===step.u&&e[1]===step.v)||(e[0]===step.v&&e[1]===step.u));
    if(exploring) ln.classList.add('checking');
  });
  // clone edges: present if in clonedEdges; fresh if just wired
  const cloneSet=new Set((step.clonedEdges||[]).map(e=>[e[0],e[1]].sort((a,b)=>a-b).join('-')));
  const freshKey = step.edgeUV ? [step.edgeUV[0],step.edgeUV[1]].sort((a,b)=>a-b).join('-') : null;
  origEdges.forEach((e,i)=>{ const ln=document.getElementById('ce'+i); if(!ln) return;
    ln.classList.remove('cloned','fresh');
    const key=[e[0],e[1]].sort((a,b)=>a-b).join('-');
    if(cloneSet.has(key)){ ln.classList.add('cloned'); if(step.type==='add_edge'&&key===freshKey) ln.classList.add('fresh'); }
  });

  // visited map tiles
  const mc=document.getElementById('map-tiles'); mc.innerHTML='';
  if(!mapKeys.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; mc.appendChild(e); }
  else mapKeys.forEach(k=>{ const d=document.createElement('div'); d.className='map-entry'+(step.newKey===k?' new':'');
    d.innerHTML=`<span class="map-key">${k}</span><span class="map-arrow">&#8594;</span><span class="map-val">${k}'</span>`; mc.appendChild(d); });

  // call stack
  const sc=document.getElementById('stack-tiles'); sc.innerHTML='';
  if(!step.stack.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; sc.appendChild(e); }
  else step.stack.forEach((u,i)=>{ const f=document.createElement('div'); f.className='frame'+(i===step.stack.length-1?' top':''); f.textContent='dfs('+u+')'; sc.appendChild(f); });

  // narration + code + pills
  const narr=document.getElementById('narration'); narr.innerHTML=step.narr; narr.classList.toggle('done',!!step.complete);
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });
  document.getElementById('pill-u').textContent=step.u!=null?step.u:'—';
  document.getElementById('pill-v').textContent=step.v!=null?step.v:'—';
  document.getElementById('pill-c').textContent=step.ret!=null?step.ret+"'":'—';
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color='var(--accent-green)'; log.appendChild(d); } }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
</body>
