<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nodes in Cycles &middot; Directed Graph</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:300px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration.cyc{border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.06);}
.narration.cyc::before{content:'\21BB'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{position:relative; margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:360px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto;}
svg.graph{display:block; width:420px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2; fill:none; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.tree{stroke:var(--accent-blue); stroke-width:3; filter:drop-shadow(0 0 5px rgba(6,182,212,.55));}
.edge.checking{stroke:var(--accent-purple); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.edge.cycle{stroke:var(--accent-red); stroke-width:3.2; filter:drop-shadow(0 0 6px rgba(248,81,73,.6));}
.edge.dim{stroke:rgba(255,255,255,.07); stroke-width:1.6;}
.ahead{fill:var(--border-main); transition:fill .35s;}
.ahead.tree{fill:var(--accent-blue);}
.ahead.checking{fill:var(--accent-purple);}
.ahead.cycle{fill:var(--accent-red);}
.ahead.dim{fill:rgba(255,255,255,.07);}

.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s, stroke-width .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode .nidx{font-family:var(--mono); font-weight:700; font-size:9px; fill:var(--text-dim); text-anchor:middle; dominant-baseline:central; opacity:0; transition:opacity .35s, fill .35s;}
.gnode.show-idx .nidx{opacity:1;}
.gnode.onstack .nc{stroke:var(--accent-blue); fill:rgba(6,182,212,.10); filter:drop-shadow(0 0 6px rgba(6,182,212,.4));}
.gnode.visited .nc{stroke:rgba(168,85,247,.5); fill:rgba(168,85,247,.07);}
.gnode.activeu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.gnode.activeu .nl{fill:#ffd591;}
.gnode.activev .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 12px rgba(168,85,247,.6)); stroke-width:3;}
.gnode.activev .nl{fill:#e9d5ff;}
.gnode.cycle .nc{stroke:var(--accent-red); fill:rgba(248,81,73,.16); filter:drop-shadow(0 0 12px rgba(248,81,73,.55)); stroke-width:3;}
.gnode.cycle .nl{fill:#ffc9c4;}
.gnode.acyclic .nc{stroke:rgba(34,197,94,.45); fill:rgba(34,197,94,.06);}
.gnode.acyclic .nl{fill:#86b8a0;}
.gnode.acyclic{opacity:.55;}

.side{display:flex; flex-direction:column; gap:12px; min-width:230px; flex:1 1 230px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel.s .cap{color:var(--accent-blue);} .panel.c .cap{color:var(--accent-purple);} .panel.r .cap{color:var(--accent-red);}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start;}
.tile{min-width:34px; height:34px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.tile.s{border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.12); color:#a5f3fc;}
.tile.c{border-color:rgba(168,85,247,.45); background:rgba(168,85,247,.12); color:#e9d5ff;}
.tile.r{border-color:rgba(248,81,73,.5); background:rgba(248,81,73,.14); color:#ffc9c4;}
.tiles .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}

.idtable{display:flex; flex-wrap:wrap; gap:6px;}
.idcell{display:flex; flex-direction:column; align-items:center; gap:3px;}
.idcell .ik{font-family:var(--mono); font-size:10px; color:var(--text-dim);}
.idcell .iv{min-width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:8px;
  font-family:var(--mono); font-weight:800; font-size:13px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main); transition:all .3s;}
.idcell .iv.set{border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.10); color:#a5f3fc;}
.idcell .iv.upd{border-color:var(--accent-orange); background:rgba(245,165,36,.14); color:#ffd591; box-shadow:0 0 8px rgba(245,165,36,.4);}

#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-orange);} .pill.n b{color:var(--accent-purple);} .pill.s b{color:var(--accent-red);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>V =</label>
  <input type="text" id="v-input" class="small-input" value="4">
  <label>edges =</label>
  <input type="text" id="e-input" class="large-input" value="[[0,1],[1,2],[2,0],[3,0]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(4,'[[0,1],[1,2],[2,0],[3,0]]')">Ex 1</button>
  <button onclick="loadExample(5,'[[0,1],[1,2],[2,3],[3,4]]')">Ex 2 (Line)</button>
  <button onclick="loadExample(3,'[[0,1],[1,2],[2,1]]')">Ex 3 (Cycle)</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Nodes in Cycles <span class="sub">&middot; directed graph &middot; Tarjan SCC</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 420 380"></svg></div>
      <div class="side">
        <div class="panel s"><div class="cap">DFS STACK (on-stack)</div><div class="tiles" id="stk-tiles"></div></div>
        <div class="panel c"><div class="cap">low-link / index</div><div class="idtable" id="ll-tiles"></div></div>
        <div class="panel r"><div class="cap">NODES IN CYCLES (result)</div><div class="tiles" id="r-tiles"></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">node u = <b id="pill-u">&mdash;</b></span>
        <span class="pill n">neighbor v = <b id="pill-v">&mdash;</b></span>
        <span class="pill s">cycle nodes <b id="pill-cnt">0</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>active u</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>neighbor v</span>
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>on stack</span>
          <span class="li"><span class="dot" style="background:var(--accent-red)"></span>in cycle</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>acyclic</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','tarjanSCC'],['src','(V, adj):']],
  [['src','  idx=0; stack=[]; low=[]; num=[]; onStk=[]']],
  [['kw','  for'],['src',' s in V: '],['kw','if'],['src',' num[s]==-1: dfs(s)']],
  [['fn','  def dfs'],['src','(u):']],
  [['src','    num[u]=low[u]=idx++;  stack.push(u); onStk[u]=1']],
  [['kw','    for'],['src',' v '],['kw','in'],['src',' adj[u]:']],
  [['kw','      if'],['src',' num[v]==-1: dfs(v); low[u]=min(low[u],low[v])']],
  [['kw','      elif'],['src',' onStk[v]: low[u]=min(low[u],num[v])']],
  [['kw','    if'],['src',' low[u]==num[u]:  '],['kw','# SCC root']],
  [['src','      pop comp until u;  if |comp|>1 or self-loop: cycle']],
  [['kw','  return'],['src',' cycleNodes']],
];

let V_count=4, edgesList=[[0,1],[1,2],[2,0],[3,0]];
let nodes=[], coord={}, hasReverse={}, selfLoops=new Set();
let steps=[], stepIndex=0, timer=null;
const delays=[2000,1050,520];
const gnodes={}, gedges={};
let confettiArmed=true;

function init(){ buildCode(); loadExample(4,'[[0,1],[1,2],[2,0],[3,0]]'); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(v,eStr){ document.getElementById('v-input').value=v; document.getElementById('e-input').value=eStr; parseAndGen(); }
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    V_count=parseInt(document.getElementById('v-input').value,10);
    edgesList=JSON.parse(document.getElementById('e-input').value.replace(/\(/g,'[').replace(/\)/g,']'));
    if(isNaN(V_count)||V_count<0||!Array.isArray(edgesList)) throw 0;
    edgesList=edgesList.filter(e=>Array.isArray(e)&&e.length===2&&e[0]>=0&&e[0]<V_count&&e[1]>=0&&e[1]<V_count).map(e=>[Number(e[0]),Number(e[1])]);
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid format. V must be an integer and edges a valid array of [u, v].'); }
}

function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; coord={};
  for(const k in gnodes) delete gnodes[k]; for(const k in gedges) delete gedges[k];
  hasReverse={}; selfLoops=new Set(); nodes=[];
  for(let i=0;i<V_count;i++) nodes.push(i);

  // arrowhead marker defs (directed graph -> arrowheads on every edge)
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML='';
  svg.appendChild(defs);

  const cx=210, cy=190, R=Math.min(140, 70+V_count*9);
  nodes.forEach(id=>{ const ang=(Math.PI*2*id)/Math.max(1,V_count) - Math.PI/2; coord[id]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)}; });

  // detect reverse pairs + self loops for curve rendering
  const eset=new Set(edgesList.map(e=>e[0]+'>'+e[1]));
  edgesList.forEach(e=>{ if(e[0]===e[1]) selfLoops.add(e[0]); if(eset.has(e[1]+'>'+e[0])) hasReverse[e[0]+'>'+e[1]]=true; });

  // edges first (path + arrowhead polygon), keyed by index
  edgesList.forEach((e,i)=>{
    const u=e[0], v=e[1], p1=coord[u], p2=coord[v]; if(!p1||!p2) return;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.id='eg'+i;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','edge');
    const head=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    head.setAttribute('class','ahead');
    const geo=edgeGeometry(u,v);
    path.setAttribute('d',geo.d);
    head.setAttribute('points',geo.head);
    g.appendChild(path); g.appendChild(head); svg.appendChild(g);
    gedges[i]={g, path, head, u, v};
  });

  // nodes on top
  nodes.forEach(id=>{ const p=coord[id];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode'); g.id='gn'+id;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',21);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y-3); t.textContent=id;
    const ix=document.createElementNS('http://www.w3.org/2000/svg','text'); ix.setAttribute('class','nidx'); ix.setAttribute('x',p.x); ix.setAttribute('y',p.y+11); ix.id='nidx'+id; ix.textContent='';
    g.appendChild(c); g.appendChild(t); g.appendChild(ix); svg.appendChild(g); gnodes[id]=g; });
}

// returns {d: path-d, head: arrowhead polygon points}
function edgeGeometry(u,v){
  const r=21;
  if(u===v){
    // self-loop: small loop above the node
    const p=coord[u]; const lx=p.x, ly=p.y;
    const d=`M ${lx-9},${ly-r+2} C ${lx-34},${ly-r-44} ${lx+34},${ly-r-44} ${lx+9},${ly-r+2}`;
    // arrowhead near right entry pointing down-left into node
    const hx=lx+9, hy=ly-r+2;
    const head=arrowPoly(hx, hy-16, hx, hy);
    return {d, head};
  }
  const p1=coord[u], p2=coord[v];
  const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1;
  const ux=dx/len, uy=dy/len;
  if(hasReverse[u+'>'+v]){
    const nx=-uy, ny=ux, off=18;
    const mx=(p1.x+p2.x)/2 + nx*off, my=(p1.y+p2.y)/2 + ny*off;
    const x1=p1.x+ux*(r+1), y1=p1.y+uy*(r+1);
    const x2=p2.x-ux*(r+9), y2=p2.y-uy*(r+9);
    // tangent at end of quadratic ~ direction from control point to end
    const tx=x2-mx, ty=y2-my, tl=Math.hypot(tx,ty)||1;
    const head=arrowPoly(x2-(tx/tl)*12, y2-(ty/tl)*12, x2, y2);
    return {d:`M ${x1},${y1} Q ${mx},${my} ${x2},${y2}`, head};
  }
  const x1=p1.x+ux*(r+1), y1=p1.y+uy*(r+1);
  const x2=p2.x-ux*(r+9), y2=p2.y-uy*(r+9);
  const head=arrowPoly(x2-ux*12, y2-uy*12, x2, y2);
  return {d:`M ${x1},${y1} L ${x2},${y2}`, head};
}
function arrowPoly(bx,by,tx,ty){
  const dx=tx-bx, dy=ty-by, len=Math.hypot(dx,dy)||1, ux=dx/len, uy=dy/len, nx=-uy, ny=ux, w=5;
  const p1=`${tx.toFixed(1)},${ty.toFixed(1)}`;
  const p2=`${(bx+nx*w).toFixed(1)},${(by+ny*w).toFixed(1)}`;
  const p3=`${(bx-nx*w).toFixed(1)},${(by-ny*w).toFixed(1)}`;
  return `${p1} ${p2} ${p3}`;
}

function generateSteps(){
  steps=[];
  const adj=Array.from({length:V_count},()=>[]);
  for(const [u,v] of edgesList) adj[u].push(v);

  const num=new Array(V_count).fill(-1);
  const low=new Array(V_count).fill(-1);
  const onStk=new Array(V_count).fill(false);
  const stack=[];
  const cycle=new Set();
  const adjacencyHasSelf=id=>selfLoops.has(id);
  let idx=0;

  function snap(o){
    steps.push({
      num:[...num], low:[...low], onStk:[...onStk], stack:[...stack],
      visited:num.map(n=>n!==-1), cycle:[...cycle].sort((a,b)=>a-b),
      u:o.u==null?null:o.u, v:o.v==null?null:o.v, updated:o.updated==null?null:o.updated,
      pushed:o.pushed==null?null:o.pushed, checkEdge:o.checkEdge||null,
      code:o.code, narr:o.narr, log:o.log, complete:!!o.complete, hasCycle:o.hasCycle
    });
  }

  snap({code:[0,1], narr:`<b>Tarjan SCC</b> on the directed graph. A node lies on a cycle iff it is in a strongly-connected component of size &gt; 1, or has a self-loop. We DFS and track <code>num</code> (discovery) &amp; <code>low</code> (lowest reachable).`, log:`init: idx=0, stack=[], all num=-1`});

  function dfs(u){
    num[u]=low[u]=idx++; stack.push(u); onStk[u]=true;
    snap({code:[4], u, pushed:u, narr:`Visit <code>${u}</code> &rarr; assign <code>num=low=${num[u]}</code>, push onto stack.`, log:`dfs(${u})  num=${num[u]} low=${low[u]}  stack=[${stack.join(',')}]`});
    for(const v of adj[u]){
      snap({code:[5,6], u, v, checkEdge:[u,v], narr:`Explore edge <code>${u} &rarr; ${v}</code>.`, log:`  edge ${u}->${v}`});
      if(num[v]===-1){
        snap({code:[6], u, v, checkEdge:[u,v], narr:`<code>${v}</code> not yet visited &rarr; recurse into it.`, log:`    ${v} unvisited, recurse`});
        dfs(v);
        const before=low[u]; low[u]=Math.min(low[u],low[v]);
        snap({code:[6], u, v, checkEdge:[u,v], updated:u, narr:`Back at <code>${u}</code>: <code>low[${u}] = min(${before}, low[${v}]=${low[v]}) = ${low[u]}</code>.`, log:`    low[${u}]=min(${before},${low[v]})=${low[u]}`});
      } else if(onStk[v]){
        const before=low[u]; low[u]=Math.min(low[u],num[v]);
        snap({code:[7], u, v, checkEdge:[u,v], updated:u, narr:`<code>${v}</code> is on the stack (back-edge!) &rarr; <code>low[${u}] = min(${before}, num[${v}]=${num[v]}) = ${low[u]}</code>.`, log:`    ${v} on-stack, low[${u}]=min(${before},${num[v]})=${low[u]}`});
      } else {
        snap({code:[7], u, v, checkEdge:[u,v], narr:`<code>${v}</code> already finished (not on stack) &rarr; cross-edge, ignore.`, log:`    ${v} done, skip`});
      }
    }
    if(low[u]===num[u]){
      // pop one SCC
      const comp=[]; let w;
      do{ w=stack.pop(); onStk[w]=false; comp.push(w); }while(w!==u);
      const isCycle = comp.length>1 || adjacencyHasSelf(u);
      if(isCycle){ comp.forEach(n=>cycle.add(n)); }
      snap({code:[8,9], u, narr: isCycle
          ? `<code>low[${u}]==num[${u}]</code> &rarr; SCC root. Pop component <code>{${comp.slice().sort((a,b)=>a-b).join(', ')}}</code> &mdash; size ${comp.length}${adjacencyHasSelf(u)?' (self-loop)':''} &rarr; <b style="color:#ffc9c4">these nodes are in a cycle</b>.`
          : `<code>low[${u}]==num[${u}]</code> &rarr; SCC root. Component <code>{${u}}</code> is a single node with no self-loop &rarr; <b style="color:#86b8a0">acyclic</b>.`,
        log:`  SCC root ${u}: comp={${comp.slice().sort((a,b)=>a-b).join(',')}} ${isCycle?'CYCLE':'acyclic'}`, hasCycle:isCycle});
    }
  }

  for(let s=0;s<V_count;s++){
    if(num[s]===-1){
      snap({code:[2], narr:`Start a new DFS tree from unvisited node <code>${s}</code>.`, log:`root scan: start dfs(${s})`});
      dfs(s);
    }
  }

  const result=[...cycle].sort((a,b)=>a-b);
  snap({code:[10], narr: result.length
      ? `Done. Nodes lying on a directed cycle: <code>[${result.join(', ')}]</code>. The rest form a DAG.`
      : `Done. Every SCC has size 1 with no self-loop &rarr; the graph is a <b>DAG</b>, so <b>no node lies on a cycle</b>: <code>[]</code>.`,
    log:`COMPLETE. nodes in cycles = [${result.join(', ')}]`, complete:true, hasCycle:result.length>0});
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const onstk=new Set(step.stack), cyc=new Set(step.cycle);

  nodes.forEach(n=>{ const g=gnodes[n]; if(!g) return;
    g.classList.remove('onstack','visited','activeu','activev','cycle','acyclic','show-idx');
    if(step.visited[n]){ g.classList.add('visited','show-idx'); }
    if(onstk.has(n)) g.classList.add('onstack');
    if(step.complete){
      if(cyc.has(n)) g.classList.add('cycle'); else g.classList.add('acyclic');
    } else {
      if(cyc.has(n)) g.classList.add('cycle');
      if(step.u===n) g.classList.add('activeu');
      if(step.v===n) g.classList.add('activev');
    }
    const ixEl=document.getElementById('nidx'+n);
    if(ixEl) ixEl.textContent = step.visited[n] ? (step.num[n]+'/'+step.low[n]) : '';
    if(step.pushed===n){ const c=g.querySelector('.nc'); if(c) Motion.pop(c); }
  });

  // edges
  for(const i in gedges){
    const ge=gedges[i]; const {u,v}=ge;
    ge.path.classList.remove('tree','checking','cycle','dim');
    ge.head.classList.remove('tree','checking','cycle','dim');
    const checking = step.checkEdge && step.checkEdge[0]===u && step.checkEdge[1]===v;
    const bothCyc = cyc.has(u) && cyc.has(v);
    if(checking){ ge.path.classList.add('checking'); ge.head.classList.add('checking'); }
    else if(step.complete){
      if(bothCyc){ ge.path.classList.add('cycle'); ge.head.classList.add('cycle'); }
      else{ ge.path.classList.add('dim'); ge.head.classList.add('dim'); }
    }
    else if(bothCyc){ ge.path.classList.add('cycle'); ge.head.classList.add('cycle'); }
  }

  fillTiles('stk-tiles', step.stack, 's');
  fillIdTable(step);
  fillTiles('r-tiles', step.cycle, 'r');

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done', !!step.complete && !step.hasCycle);
  narr.classList.toggle('cyc', (!!step.complete && !!step.hasCycle));

  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });
  document.getElementById('pill-u').textContent=step.u!=null?step.u:'—';
  document.getElementById('pill-v').textContent=step.v!=null?step.v:'—';
  document.getElementById('pill-cnt').textContent=step.cycle.length;
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color = steps[k].hasCycle?'var(--accent-red)':'var(--accent-green)'; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete && !step.hasCycle){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else if(!step.complete) confettiArmed=true;
}

function fillTiles(id, arr, cls){
  const c=document.getElementById(id); c.innerHTML='';
  if(!arr.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; c.appendChild(e); return; }
  arr.forEach(v=>{ const t=document.createElement('div'); t.className='tile '+cls; t.textContent=v; c.appendChild(t); });
}
function fillIdTable(step){
  const c=document.getElementById('ll-tiles'); c.innerHTML='';
  for(let i=0;i<V_count;i++){
    const cell=document.createElement('div'); cell.className='idcell';
    const k=document.createElement('div'); k.className='ik'; k.textContent='['+i+']';
    const val=document.createElement('div'); val.className='iv';
    if(step.visited[i]){ val.classList.add('set'); val.textContent=step.num[i]+'/'+step.low[i]; }
    else val.textContent='·/·';
    if(step.updated===i) val.classList.add('upd');
    cell.appendChild(val); cell.appendChild(k); c.appendChild(cell);
  }
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
