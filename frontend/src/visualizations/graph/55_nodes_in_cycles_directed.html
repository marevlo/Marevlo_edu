<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nodes in Cycles (Kahn's Algorithm) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 3; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 2; color: var(--accent-purple); }
        .node.safe { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); opacity: 0.6; }
        .node.cycle { background: #3a0d0d; border-color: var(--accent-red); color: var(--accent-red); box-shadow: 0 0 15px rgba(248,81,73,0.4); animation: pulseRed 1.5s infinite alternate; z-index: 4; }

        @keyframes pulseRed {
            0% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 25px rgba(248,81,73,0.8); }
        }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 44px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.indegree-tile { background: #1a150b; border-color: var(--accent-orange); color: var(--accent-orange); }
        .tile.indegree-zero { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile.q-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); padding: 0 8px; width: auto;}
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; filter: brightness(1.5);}
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes highlightFlash { 0% { transform: scale(1); } 50% { transform: scale(1.2); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); } }
        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 15px var(--accent-red); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="4">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1],[1,2],[2,0],[3,0]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(4, '[[0,1],[1,2],[2,0],[3,0]]')">Ex 1</button>
        <button onclick="loadExample(5, '[[0,1],[1,2],[2,3],[3,4]]')">Ex 2 (Line)</button>
        <button onclick="loadExample(3, '[[0,1],[1,2],[2,1]]')">Ex 3 (Self-Loop)</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                    <marker id="arrow-removed" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(48, 54, 61, 0.4)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">In-Degree Array:</div>
                <div class="tiles-wrapper" id="indegree-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Number of incoming edges remaining</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">BFS Queue (Safe Nodes):</div>
                <div class="tiles-wrapper" id="q-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Nodes with In-Degree = 0</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Safe Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Removing Edge to (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Safe Nodes Found</span>
            <span class="info-value" id="val-safe" style="color: var(--accent-green);">0</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">nodes trapped in cycles =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Popped Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Removing Edge</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Safe (Not in Cycle)</div>
        <div class="legend-item"><span class="dot" style="background:#3a0d0d; border-color:var(--accent-red)"></span> Trapped in Cycle</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 4;
        let edgesList = [[0,1],[1,2],[2,0],[3,0]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample(4, '[[0,1],[1,2],[2,0],[3,0]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is an integer and edges is a valid array of [u, v].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 225;
            const cy = 200;
            const radius = 130;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let indegree = new Array(V_count).fill(0);
            let adj = Array.from({length: V_count}, () => []);
            
            for (let [u,v] of edgesList) {
                adj[u].push(v);
                indegree[v]++;
            }

            let queue = [];
            let safeNodes = [];
            let removedEdges = new Set();

            steps.push({
                type: 'init', indegree: [...indegree], queue: [...queue], safeNodes: [...safeNodes], removedEdges: new Set(removedEdges), cycleNodes: null,
                u: null, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                panel: `<b>Kahn's Algorithm for Cycle Detection</b><br>Calculate the In-Degree of all nodes. Nodes with <code>In-Degree = 0</code> cannot be part of a cycle because no path leads back to them.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. Calculated indegrees.`
            });

            for (let i = 0; i < V_count; i++) {
                if (indegree[i] === 0) queue.push(i);
            }

            steps.push({
                type: 'enqueue_initial', indegree: [...indegree], queue: [...queue], safeNodes: [...safeNodes], removedEdges: new Set(removedEdges), cycleNodes: null,
                u: null, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                panel: `Enqueue all nodes with <code>In-Degree = 0</code> to start processing.<br>Queue: <b style="color:var(--accent-blue)">[${queue.join(', ')}]</b>`,
                statusText: `Initial queue populated.`,
                log: `Enqueued initial 0-indegree nodes: [${queue.join(', ')}]`
            });

            while (queue.length > 0) {
                let u = queue.shift();
                safeNodes.push(u);

                steps.push({
                    type: 'dequeue', indegree: [...indegree], queue: [...queue], safeNodes: [...safeNodes], removedEdges: new Set(removedEdges), cycleNodes: null,
                    u: u, v: null, updatedNode: null, poppedItem: u, pushedItem: null,
                    panel: `<b>Dequeue Node <code>${u}</code></b><br>Since it had 0 In-Degree, it is guaranteed <b style="color:var(--accent-green)">Safe</b> (not in a cycle).<br>We simulate its removal by deleting all its outgoing edges.`,
                    statusText: `Processing Node ${u}...`,
                    log: `\nDequeue ${u}. Marked Safe.`
                });

                let neighbors = adj[u] || [];
                if (neighbors.length === 0) {
                    steps.push({
                        type: 'no_neighbors', indegree: [...indegree], queue: [...queue], safeNodes: [...safeNodes], removedEdges: new Set(removedEdges), cycleNodes: null,
                        u: u, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                        panel: `Node <b>${u}</b> has no outgoing edges to remove.`,
                        statusText: `No outgoing edges for ${u}.`,
                        log: `  Node ${u} has no outgoing edges.`
                    });
                }

                for (let v of neighbors) {
                    removedEdges.add(`${u}-${v}`);
                    indegree[v]--;

                    steps.push({
                        type: 'remove_edge', indegree: [...indegree], queue: [...queue], safeNodes: [...safeNodes], removedEdges: new Set(removedEdges), cycleNodes: null,
                        u: u, v: v, updatedNode: v, poppedItem: null, pushedItem: null,
                        panel: `Remove edge <b>${u} ➔ ${v}</b>.<br>Decrement In-Degree of Node <b>${v}</b> to <b style="color:var(--accent-orange)">${indegree[v]}</b>.`,
                        statusText: `Removing edge ${u}➔${v}.`,
                        log: `  Remove edge ${u}->${v}. indegree[${v}] = ${indegree[v]}.`
                    });

                    if (indegree[v] === 0) {
                        queue.push(v);
                        steps.push({
                            type: 'enqueue', indegree: [...indegree], queue: [...queue], safeNodes: [...safeNodes], removedEdges: new Set(removedEdges), cycleNodes: null,
                            u: u, v: v, updatedNode: v, poppedItem: null, pushedItem: v,
                            panel: `Node <b>${v}</b> now has <code>In-Degree = 0</code>!<br>It can no longer be part of a cycle. <b style="color:var(--accent-blue)">Enqueue ${v}</b>.`,
                            statusText: `Node ${v} is safe. Enqueuing.`,
                            log: `    -> indegree[${v}] == 0. Enqueue ${v}.`,
                            logColor: 'var(--accent-blue)'
                        });
                    }
                }
            }

            let cycleNodes = [];
            for (let i = 0; i < V_count; i++) {
                if (!safeNodes.includes(i)) {
                    cycleNodes.push(i);
                }
            }

            steps.push({
                type: 'final', indegree: [...indegree], queue: [...queue], safeNodes: [...safeNodes], removedEdges: new Set(removedEdges), cycleNodes: cycleNodes,
                u: null, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                panel: cycleNodes.length > 0 ? 
                    `<b style="color:var(--accent-red); font-size:16px;">Cycles Detected!</b><br>The queue is empty, but some nodes still have In-Degree > 0.<br>These remaining nodes are trapped in cycles: <b>[${cycleNodes.join(', ')}]</b>.` :
                    `<b>Algorithm Complete!</b><br>All nodes reached In-Degree 0 and were marked Safe. The graph is a Directed Acyclic Graph (DAG), meaning there are <b>no nodes in cycles</b>.`,
                complete: true, result: `[${cycleNodes.join(', ')}]`,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Cycle Nodes: [${cycleNodes.join(', ')}]`,
                logColor: cycleNodes.length > 0 ? 'var(--accent-red)' : 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawn = new Set(); // For curves on bidirectional

            edgesList.forEach(e => {
                const u = e[0];
                const v = e[1];
                
                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.u === u && step.v === v;
                let isRemoved = step.removedEdges.has(`${u}-${v}`);
                
                // Identify cycle edges at the end
                let isCycleEdge = false;
                if (step.complete && step.cycleNodes && step.cycleNodes.length > 0) {
                    if (step.cycleNodes.includes(u) && step.cycleNodes.includes(v) && !isRemoved) {
                        isCycleEdge = true;
                    }
                }

                // Draw path with curve if bidirectional
                let hasReverse = edgesList.some(re => re[0]===v && re[1]===u);
                let dStr = "";
                
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrinkTarget = nodeRadius + 6; 
                const shrinkSource = nodeRadius + 2; 

                if (hasReverse) {
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const nx = -dy / len;
                    const ny = dx / len;
                    const curveOffset = 20; 
                    const cx = midX + nx * curveOffset;
                    const cy = midY + ny * curveOffset;
                    
                    const x1 = p1.x + (dx/len)*shrinkSource; 
                    const y1 = p1.y + (dy/len)*shrinkSource;
                    const x2 = p2.x - (dx/len)*shrinkTarget; 
                    const y2 = p2.y - (dy/len)*shrinkTarget;
                    dStr = `M ${x1},${y1} Q ${cx},${cy} ${x2},${y2}`;
                } else {
                    const x1 = p1.x + (dx/len)*shrinkSource; 
                    const y1 = p1.y + (dy/len)*shrinkSource;
                    const x2 = p2.x - (dx/len)*shrinkTarget; 
                    const y2 = p2.y - (dy/len)*shrinkTarget;
                    dStr = `M ${x1},${y1} L ${x2},${y2}`;
                }

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', dStr);
                path.setAttribute('fill', 'transparent');

                if (isChecking) {
                    path.setAttribute('stroke', 'var(--accent-purple)');
                    path.setAttribute('stroke-width', '4');
                    path.setAttribute('marker-end', 'url(#arrow-active)');
                    path.classList.add('line-anim');
                    path.setAttribute('stroke-dasharray', '6');
                    setTimeout(() => svg.appendChild(path), 0);
                } else if (isCycleEdge) {
                    path.setAttribute('stroke', 'var(--accent-red)');
                    path.setAttribute('stroke-width', '3');
                    path.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(path);
                } else if (isRemoved) {
                    path.setAttribute('stroke', 'rgba(48, 54, 61, 0.4)');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('marker-end', 'url(#arrow-removed)');
                    path.setAttribute('stroke-dasharray', '4');
                    svg.appendChild(path);
                } else {
                    path.setAttribute('stroke', 'var(--border-main)');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(path);
                }
            });
        }

        function renderQueue(step) {
            const container = document.getElementById('q-tiles');
            container.innerHTML = '';
            
            if (step.queue.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            if (step.poppedItem !== null && step.type === 'dequeue') {
                const popTile = document.createElement('div');
                popTile.className = `tile q-tile popping`;
                popTile.innerText = step.poppedItem;
                container.appendChild(popTile);
            }

            step.queue.forEach(val => {
                const tile = document.createElement('div');
                tile.className = `tile q-tile`;
                if (step.pushedItem === val) {
                    tile.classList.add('pushing');
                }
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderIndegree(step) {
            const container = document.getElementById('indegree-tiles');
            container.innerHTML = '';
            
            step.indegree.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile indegree-tile`;
                
                if (step.updatedNode === i) {
                    tile.classList.add('highlight-update');
                } else if (val === 0 && !step.safeNodes.includes(i) && step.type !== 'init') {
                    // Highlight when it just reaches 0 before being processed
                    tile.classList.add('indegree-zero');
                }
                
                // Dim tile if node is already safe
                if (step.safeNodes.includes(i)) {
                    tile.style.background = '#21262d';
                    tile.style.borderColor = 'var(--border-main)';
                    tile.style.color = 'var(--text-dim)';
                }
                
                tile.innerText = val;
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (step.safeNodes.includes(i)) {
                    el.classList.add('safe');
                }
                
                if (step.complete && step.cycleNodes && step.cycleNodes.includes(i)) {
                    el.classList.add('cycle');
                }
                
                if (step.u === i && !step.complete) el.classList.add('active-u');
                if (step.v === i && !step.complete) el.classList.add('active-v');
            }

            drawEdges(step);
            renderIndegree(step);
            renderQueue(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? `${step.u}` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `${step.v}` : '—';
            document.getElementById('val-safe').innerText = step.safeNodes.length;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.className = step.cycleNodes && step.cycleNodes.length > 0 ? 'pop' : 'pop-false';
                // Green if empty, Red if items
                if(step.cycleNodes && step.cycleNodes.length === 0) resVal.style.color = 'var(--accent-green)';
            } else {
                resVal.className = '';
                resVal.style.color = 'var(--text-dim)';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
