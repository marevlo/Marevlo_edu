<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connected Components (DSU) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 300px; font-family: monospace;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.active-u { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 3; color: var(--accent-orange); }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 15px var(--accent-blue); border-color: var(--accent-blue); z-index: 2; color: var(--accent-blue); }
        .node.root-node { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 100px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 16px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.parent-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.highlight-update { animation: highlightFlash 0.6s ease; background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }

        @keyframes highlightFlash { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.5); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); filter: brightness(1); } }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 730px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 730px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 28px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 730px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="text" id="n-input" class="small-input" placeholder="5">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1],[1,2],[3,4]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(5, '[[0,1],[1,2],[3,4]]')">Ex 1</button>
        <button onclick="loadExample(4, '[[0,1],[2,3],[1,2]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">Parent Array:</div>
                <div class="tiles-wrapper" id="parent-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Points to the representative root of the set.</div>
            </div>
            
            <div class="result-display">
                <span class="ui-label">Connected Components =</span>
                <span id="res-val">—</span>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Edge (u, v)</span>
            <span class="info-value" id="val-edge" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Find(u) Root</span>
            <span class="info-value" id="val-root-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Find(v) Root</span>
            <span class="info-value" id="val-root-v" style="color: var(--accent-blue);">—</span>
        </div>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Node u</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-blue); border-width:2px;"></span> Node v</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Processing Edge</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Union (Edge Added)</div>
        <div class="legend-item"><span class="dot" style="background:#3a0d0d; border-color:var(--accent-red)"></span> Cycle (Edge Ignored)</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let N_count = 5;
        let edgesList = [[0,1],[1,2],[3,4]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];

        function init() { loadExample(5, '[[0,1],[1,2],[3,4]]'); }

        function loadExample(n, eStr) {
            document.getElementById('n-input').value = n;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                N_count = parseInt(document.getElementById('n-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(N_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure n is an integer and edges is a valid array of [u, v].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            const cx = 225;
            const cy = 200;
            const radius = 140;

            for (let i = 0; i < N_count; i++) {
                const angle = (Math.PI * 2 * i) / N_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let parent = Array.from({length: N_count}, (_, i) => i);
            let components = N_count;
            let unionEdges = [];
            let cycleEdges = [];

            steps.push({
                type: 'init',
                parent: [...parent], components: components, unionEdges: [...unionEdges], cycleEdges: [...cycleEdges],
                activeEdge: null, rootU: null, rootV: null, updatedIdx: null,
                panel: `<b>Disjoint Set Union (DSU)</b><br>Initialize the <code>parent</code> array where each of the ${N_count} nodes is its own parent (root).<br>Initial connected components = <b>${components}</b>.`,
                statusText: `Initialization complete.`,
                log: `Initialized DSU. Nodes: ${N_count}. Components: ${components}.`
            });

            function find(i) {
                let root = i;
                while (parent[root] !== root) root = parent[root];
                return root;
            }

            for (let [u, v] of edgesList) {
                steps.push({
                    type: 'process',
                    parent: [...parent], components: components, unionEdges: [...unionEdges], cycleEdges: [...cycleEdges],
                    activeEdge: [u, v], rootU: null, rootV: null, updatedIdx: null,
                    panel: `Processing edge <b>(${u}, ${v})</b>.<br>First, perform <code>Find(${u})</code> and <code>Find(${v})</code> to get their respective root parents.`,
                    statusText: `Evaluating edge (${u}, ${v})...`,
                    log: `\nProcessing edge (${u}, ${v}).`
                });

                let rootU = find(u);
                let rootV = find(v);

                steps.push({
                    type: 'find',
                    parent: [...parent], components: components, unionEdges: [...unionEdges], cycleEdges: [...cycleEdges],
                    activeEdge: [u, v], rootU: rootU, rootV: rootV, updatedIdx: null,
                    panel: `<code>Find(${u}) = <b>${rootU}</b></code>.<br><code>Find(${v}) = <b>${rootV}</b></code>.<br>Are the roots different?`,
                    statusText: `Found roots: ${rootU} and ${rootV}.`,
                    log: `  Find(${u}) -> ${rootU}. Find(${v}) -> ${rootV}.`
                });

                if (rootU !== rootV) {
                    parent[rootV] = rootU; // Standard Union without rank for simpler visualization
                    components--;
                    unionEdges.push([u, v]);

                    steps.push({
                        type: 'union',
                        parent: [...parent], components: components, unionEdges: [...unionEdges], cycleEdges: [...cycleEdges],
                        activeEdge: [u, v], rootU: rootU, rootV: rootV, updatedIdx: rootV,
                        panel: `Roots differ! <b style="color:var(--accent-green)">Union Action:</b> Set <code>parent[${rootV}] = ${rootU}</code>.<br>Nodes are now connected. Decrement component count to <b>${components}</b>.`,
                        statusText: `Unioned sets containing ${u} and ${v}.`,
                        log: `  -> Roots differ. Union! parent[${rootV}] = ${rootU}. Components: ${components}.`,
                        logColor: 'var(--accent-green)'
                    });
                } else {
                    cycleEdges.push([u, v]);
                    steps.push({
                        type: 'skip',
                        parent: [...parent], components: components, unionEdges: [...unionEdges], cycleEdges: [...cycleEdges],
                        activeEdge: [u, v], rootU: rootU, rootV: rootV, updatedIdx: null,
                        panel: `Roots are the same (<b>${rootU}</b>). Nodes <b>${u}</b> and <b>${v}</b> are already in the same component.<br><b style="color:var(--accent-red)">Cycle Detected.</b> Edge is ignored.`,
                        statusText: `Cycle detected! Skipped edge.`,
                        log: `  -> Same root. Cycle detected. Edge ignored.`,
                        logColor: 'var(--accent-red)'
                    });
                }
            }

            steps.push({
                type: 'final',
                parent: [...parent], components: components, unionEdges: [...unionEdges], cycleEdges: [...cycleEdges],
                activeEdge: null, rootU: null, rootV: null, updatedIdx: null,
                panel: `<b>Algorithm Complete!</b><br>All edges have been processed.<br>The graph has a total of <b style="color:var(--accent-green); font-size:18px;">${components}</b> connected component(s).`,
                complete: true, result: components,
                statusText: `Finished.`,
                log: `\nAlgorithm Finished. Total Connected Components: ${components}`,
                logColor: 'var(--accent-blue)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            // Draw all provided edges with different styles based on state
            edgesList.forEach((e, idx) => {
                const u = e[0];
                const v = e[1];
                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.activeEdge && ((step.activeEdge[0] === u && step.activeEdge[1] === v) || (step.activeEdge[0] === v && step.activeEdge[1] === u));
                
                let isUnion = false;
                step.unionEdges.forEach(ue => {
                    if ((ue[0] === u && ue[1] === v) || (ue[0] === v && ue[1] === u)) isUnion = true;
                });

                let isCycle = false;
                step.cycleEdges.forEach(ce => {
                    if ((ce[0] === u && ce[1] === v) || (ce[0] === v && ce[1] === u)) isCycle = true;
                });

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrink = nodeRadius + 2; 
                
                line.setAttribute('x1', p1.x + (dx/len)*shrink); 
                line.setAttribute('y1', p1.y + (dy/len)*shrink);
                line.setAttribute('x2', p2.x - (dx/len)*shrink); 
                line.setAttribute('y2', p2.y - (dy/len)*shrink);

                if (isChecking) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else if (isUnion) {
                    line.setAttribute('stroke', 'var(--accent-green)');
                    line.setAttribute('stroke-width', '3');
                    svg.appendChild(line);
                } else if (isCycle) {
                    line.setAttribute('stroke', 'var(--accent-red)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('stroke-dasharray', '6');
                    line.setAttribute('opacity', '0.5');
                    svg.appendChild(line);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('opacity', '0.5');
                    svg.appendChild(line);
                }
            });
        }

        function renderArray(step) {
            const container = document.getElementById('parent-tiles');
            container.innerHTML = '';
            
            step.parent.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile parent-tile`;
                
                if (step.updatedIdx === i) {
                    tile.classList.add('highlight-update');
                }
                
                tile.innerText = val;
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<N_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                // Highlight roots
                if (step.parent[i] === i) el.classList.add('root-node');
                
                // Highlight active edge nodes
                if (step.activeEdge) {
                    if (i === step.activeEdge[0]) el.classList.add('active-u');
                    if (i === step.activeEdge[1]) el.classList.add('active-v');
                }
            }

            drawEdges(step);
            renderArray(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-edge').innerText = step.activeEdge !== null ? `(${step.activeEdge[0]}, ${step.activeEdge[1]})` : '—';
            document.getElementById('val-root-u').innerText = step.rootU !== null ? step.rootU : '—';
            document.getElementById('val-root-v').innerText = step.rootV !== null ? step.rootV : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.components;
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
