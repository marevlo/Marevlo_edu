<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connected Components &middot; Union-Find</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:340px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration.cycle{border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.06);}
.narration.cycle::before{content:'\26A0'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; flex-direction:column; gap:16px; align-items:center;
  position:relative;}

.stage-row{display:flex; gap:22px; width:100%; justify-content:center; align-items:center; flex-wrap:wrap;}
.graph-wrap{flex:0 0 auto;}
svg.graph-svg{display:block; height:auto;}

/* edges */
.gedge{stroke:var(--border-main); stroke-width:2; opacity:.5; transition:stroke .35s, opacity .35s, stroke-width .35s;}
.gedge.checking{stroke:var(--accent-purple); stroke-width:4; opacity:1; stroke-dasharray:6; animation:dash 1s linear infinite;
  filter:drop-shadow(0 0 6px rgba(168,85,247,.6));}
.gedge.union{stroke:var(--accent-green); stroke-width:3; opacity:1; filter:drop-shadow(0 0 5px rgba(34,197,94,.5));}
.gedge.cycle{stroke:var(--accent-red); stroke-width:2; opacity:.55; stroke-dasharray:6;}

/* nodes */
.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode.root .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.12); filter:drop-shadow(0 0 7px rgba(34,197,94,.45));}
.gnode.root .nl{fill:#bbf7d0;}
.gnode.au .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.gnode.au .nl{fill:#ffd591;}
.gnode.av .nc{stroke:var(--accent-blue); fill:rgba(6,182,212,.16); filter:drop-shadow(0 0 12px rgba(6,182,212,.6)); stroke-width:3;}
.gnode.av .nl{fill:#a5f3fc;}
.crown{font-size:12px; fill:var(--accent-green); text-anchor:middle; pointer-events:none;}

/* component-count chip in hero */
.comp-chip{display:flex; flex-direction:column; align-items:center; gap:6px; min-width:150px;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:14px; padding:18px 22px;}
.comp-chip .lbl{font-family:var(--mono); font-size:11px; color:var(--text-dim); text-align:center;}
.comp-chip .val{font-family:var(--mono); font-weight:800; font-size:40px; color:var(--accent-blue); line-height:1; transition:color .3s, transform .3s;}
.comp-chip .val.pop{color:var(--accent-green); text-shadow:0 0 18px rgba(34,197,94,.6); transform:scale(1.08);}

.arrays{display:flex; flex-direction:column; gap:12px; width:100%; max-width:640px;}
.arr{display:flex; align-items:center; gap:12px;}
.arr .cap{font-family:var(--mono); font-size:11px; font-weight:700; width:62px; text-align:right; color:var(--accent-blue);}
.cells{display:flex; gap:7px; flex-wrap:wrap;}
.cell{position:relative; min-width:40px; height:40px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:15px; border:2px solid rgba(6,182,212,.3); background:rgba(255,255,255,.05); color:#a5f3fc;
  transition:transform .3s cubic-bezier(.34,1.4,.64,1), border-color .35s, background .35s;}
.cell .ix{position:absolute; top:-14px; left:0; right:0; text-align:center; font-size:9px; color:var(--text-dim); font-weight:600;}
.cell.changed{border-color:var(--accent-green); background:rgba(34,197,94,.14); color:#bbf7d0;}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.o b{color:var(--accent-orange);} .pill.s b{color:var(--accent-green);} .pill.c b{color:var(--accent-blue);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-12;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>n =</label>
  <input type="text" id="n-input" class="small-input" value="5">
  <label>edges =</label>
  <input type="text" id="e-input" class="large-input" value="[[0,1],[1,2],[3,4]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(5,'[[0,1],[1,2],[3,4]]')">Ex 1</button>
  <button onclick="loadExample(4,'[[0,1],[2,3],[1,2]]')">Ex 2</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Connected Components <span class="sub">&middot; via Union-Find (DSU)</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="stage-row">
        <div class="graph-wrap"><svg class="graph-svg" id="graph" viewBox="0 0 450 400" width="380"></svg></div>
        <div class="comp-chip">
          <span class="lbl">connected<br>components</span>
          <span class="val" id="comp-val">&mdash;</span>
        </div>
      </div>
      <div class="arrays">
        <div class="arr"><span class="cap">parent</span><div class="cells" id="parent-cells"></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&#8592; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &#8594;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&#8592; &#8594;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill o">edge <b id="pill-edge">&mdash;</b></span>
        <span class="pill c">roots <b id="pill-roots">&mdash;</b></span>
        <span class="pill s">components <b id="pill-comp">&mdash;</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>find(u)</span>
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>find(v)</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>union / root</span>
          <span class="li"><span class="dot" style="background:var(--accent-red)"></span>cycle</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---- zero-dependency spring engine (parity with reference) ---- */
function sampleSpring(t,{stiffness=400,damping=32,mass=1}={}){
  const w0=Math.sqrt(stiffness/mass), zeta=damping/(2*Math.sqrt(stiffness*mass));
  if(zeta<1){const wd=w0*Math.sqrt(1-zeta*zeta);
    return 1-Math.exp(-zeta*w0*t)*(Math.cos(wd*t)+(zeta*w0/wd)*Math.sin(wd*t));}
  return 1-Math.exp(-w0*t)*(1+w0*t);
}
const Motion={
  pop(el){ if(!el||REDUCED) return;
    const start=performance.now(), dur=420;
    function frame(now){ const t=Math.min(1,(now-start)/dur); const s=1+0.10*(1-sampleSpring(t*3.2,{stiffness:520,damping:18}));
      el.style.transform='scale('+s+')'; if(t<1) requestAnimationFrame(frame); else el.style.transform=''; }
    requestAnimationFrame(frame);
  }
};

/* ---- real algorithm code shown in the panel ---- */
const CODE=[
  [['fn','find'],['src','(i):']],
  [['kw','  while'],['src',' parent[i] != i: i = parent[i]']],
  [['kw','  return'],['src',' i']],
  [['fn','countComponents'],['src','(n, edges):']],
  [['src','  parent = [0..n-1];  comp = n']],
  [['kw','  for'],['src',' (u, v) in edges:']],
  [['src','    ru, rv = find(u), find(v)']],
  [['kw','    if'],['src',' ru != rv:']],
  [['src','      parent[rv] = ru;  comp--']],
  [['kw','  return'],['src',' comp']],
];

let N=5, edges=[[0,1],[1,2],[3,4]];
let steps=[], stepIndex=0, timer=null;
const delays=[1800,950,480];
const gnodes={}; let nodeCoords={};
let confettiArmed=true;

function init(){ buildCode(); loadExample(5,'[[0,1],[1,2],[3,4]]'); }

function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}

function loadExample(n,eStr){ document.getElementById('n-input').value=n; document.getElementById('e-input').value=eStr; parseAndGen(); }
function loadCustom(){ parseAndGen(); }

function parseAndGen(){
  try{
    N=parseInt(document.getElementById('n-input').value);
    edges=JSON.parse(document.getElementById('e-input').value.replace(/\(/g,'[').replace(/\)/g,']'));
    if(!(N>0)||!Array.isArray(edges)) throw 0;
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid n or edges JSON. Use an integer n and an array of [u,v] pairs.'); }
}

/* Build the SVG skeleton ONCE per load: circular layout of nodes + persistent edge lines keyed by id. */
function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; for(const k in gnodes) delete gnodes[k]; nodeCoords={};
  const cx=225, cy=200, radius=140, r=22;

  for(let i=0;i<N;i++){
    const angle=(Math.PI*2*i)/N - Math.PI/2;
    nodeCoords[i]={x:cx+radius*Math.cos(angle), y:cy+radius*Math.sin(angle)};
  }
  // edges first (drawn under nodes), persistent <line> per edge index
  edges.forEach((e,idx)=>{
    const u=e[0], v=e[1]; const p1=nodeCoords[u], p2=nodeCoords[v]; if(!p1||!p2) return;
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1, sh=r+2;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('class','gedge'); line.id='ge'+idx;
    line.setAttribute('x1',p1.x+(dx/len)*sh); line.setAttribute('y1',p1.y+(dy/len)*sh);
    line.setAttribute('x2',p2.x-(dx/len)*sh); line.setAttribute('y2',p2.y-(dy/len)*sh);
    svg.appendChild(line);
  });
  // nodes
  for(let i=0;i<N;i++){
    const {x,y}=nodeCoords[i];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode'); g.id='gn'+i;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r',r);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',x); t.setAttribute('y',y); t.textContent=i;
    const cr=document.createElementNS('http://www.w3.org/2000/svg','text'); cr.setAttribute('class','crown'); cr.setAttribute('x',x); cr.setAttribute('y',y-30); cr.id='cr'+i; cr.textContent='';
    g.appendChild(c); g.appendChild(t); g.appendChild(cr); svg.appendChild(g); gnodes[i]=g;
  }
}

/* Genuinely simulate the algorithm; push immutable per-step snapshots. */
function generateSteps(){
  steps=[];
  const parent=Array.from({length:N},(_,i)=>i);
  let comp=N; const unionEdgeIdx=[], cycleEdgeIdx=[];
  function find(i){ let root=i; while(parent[root]!==root) root=parent[root]; return root; }

  steps.push({code:[3,4], parent:[...parent], comp, unions:[...unionEdgeIdx], cycles:[...cycleEdgeIdx],
    edge:null, ru:null, rv:null, changed:null,
    narr:`Initialize DSU over <code>${N}</code> nodes &mdash; each node is its own parent, so we start with <b>${N}</b> components. Union each edge's endpoints; the survivors are the roots.`,
    log:`init n=${N}: parent=[${parent.join(',')}], components=${N}`});

  edges.forEach((e,idx)=>{
    const u=e[0], v=e[1];
    steps.push({code:[5,6], parent:[...parent], comp, unions:[...unionEdgeIdx], cycles:[...cycleEdgeIdx],
      edge:idx, ru:null, rv:null, changed:null,
      narr:`Process edge <code>(${u}, ${v})</code>: run <code>find(${u})</code> and <code>find(${v})</code> to get each endpoint's set root.`,
      log:`edge (${u},${v}): find roots`});

    const ru=find(u), rv=find(v);

    if(ru!==rv){
      parent[rv]=ru; comp--; unionEdgeIdx.push(idx);
      steps.push({code:[7,8], parent:[...parent], comp, unions:[...unionEdgeIdx], cycles:[...cycleEdgeIdx],
        edge:idx, ru, rv, changed:rv, union:true,
        narr:`Roots differ: <code>find(${u})=${ru}</code>, <code>find(${v})=${rv}</code>. <b>Union</b> &mdash; set <code>parent[${rv}]=${ru}</code> and drop the component count to <b>${comp}</b>.`,
        log:`  roots ${ru} != ${rv} -> union, parent[${rv}]=${ru}, components=${comp}`});
    } else {
      cycleEdgeIdx.push(idx);
      steps.push({code:[7], parent:[...parent], comp, unions:[...unionEdgeIdx], cycles:[...cycleEdgeIdx],
        edge:idx, ru, rv, changed:null, cycle:true,
        narr:`Both endpoints share root <code>${ru}</code> &mdash; <code>${u}</code> and <code>${v}</code> are already connected. This edge closes a cycle, so the component count is unchanged at <b>${comp}</b>.`,
        log:`  roots ${ru} == ${rv} -> already connected (cycle), skip`});
    }
  });

  steps.push({code:[9], parent:[...parent], comp, unions:[...unionEdgeIdx], cycles:[...cycleEdgeIdx],
    edge:null, ru:null, rv:null, changed:null, complete:true,
    narr:`All edges processed. Distinct roots remain, giving <b>${comp}</b> connected component${comp===1?'':'s'}. Final <code>parent=[${parent.join(', ')}]</code>.`,
    log:`done. components=${comp}, parent=[${parent.join(',')}]`});
}

/* renderStep is a pure function of steps[idx]; only toggles classes/attributes on persistent DOM. */
function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const unionSet=new Set(step.unions||[]), cycleSet=new Set(step.cycles||[]);

  // edges: re-derive highlight state
  edges.forEach((e,i)=>{
    const ln=document.getElementById('ge'+i); if(!ln) return;
    ln.classList.remove('checking','union','cycle');
    if(step.edge===i) ln.classList.add('checking');
    else if(unionSet.has(i)) ln.classList.add('union');
    else if(cycleSet.has(i)) ln.classList.add('cycle');
  });

  // nodes
  for(let i=0;i<N;i++){
    const g=gnodes[i]; if(!g) continue; g.classList.remove('root','au','av');
    if(step.parent[i]===i) g.classList.add('root');
    if(step.edge!=null){ const e=edges[step.edge];
      if(i===e[0]) g.classList.add('au');
      if(i===e[1]) g.classList.add('av');
    }
    const cr=document.getElementById('cr'+i); if(cr) cr.textContent=(step.parent[i]===i)?'▲':'';
  }

  // parent array cells
  fillCells('parent-cells', step.parent, step.changed);

  // narration
  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done', !!step.complete);
  narr.classList.toggle('cycle', !!step.cycle);

  // code highlight
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });

  // component chip
  const cv=document.getElementById('comp-val'); cv.textContent=step.comp;
  cv.classList.toggle('pop', !!step.complete);
  if(step.complete) Motion.pop(cv);

  // state pills
  document.getElementById('pill-edge').textContent = step.edge!=null ? `(${edges[step.edge][0]}, ${edges[step.edge][1]})` : '—';
  document.getElementById('pill-roots').textContent = (step.ru!=null) ? `${step.ru} / ${step.rv}` : '—';
  document.getElementById('pill-comp').textContent = step.comp;

  // progress + step badge
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  // log (cumulative)
  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color='var(--accent-green)';
    else if(steps[k].cycle) d.style.color='var(--accent-red)';
    else if(steps[k].union) d.style.color='#bbf7d0';
    log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fillCells(id, arr, changed){
  const c=document.getElementById(id); c.innerHTML='';
  arr.forEach((v,i)=>{ const t=document.createElement('div'); t.className='cell'+(changed===i?' changed':'');
    t.innerHTML=`${v}<span class="ix">${i}</span>`; c.appendChild(t); });
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
