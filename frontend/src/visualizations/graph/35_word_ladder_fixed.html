<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Ladder &middot; Graph</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:300px;} .small-input{width:70px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'▸'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'✓'; color:var(--accent-green);}
.narration.fail{border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.06);}
.narration.fail::before{content:'✕'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:1 1 420px; min-width:300px;}
svg.graph{display:block; width:100%; max-width:520px; height:auto; margin:0 auto;}
.edge{stroke:var(--border-main); stroke-width:2; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.tree{stroke:var(--accent-green); stroke-width:3.5; filter:drop-shadow(0 0 5px rgba(34,197,94,.55));}
.edge.checking{stroke:var(--accent-purple); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:13px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode.start .nc{stroke:var(--accent-blue); stroke-dasharray:4 3;}
.gnode.target .nc{stroke:var(--accent-red); stroke-dasharray:4 3;}
.gnode.inqueue .nc{stroke:var(--accent-blue); fill:rgba(6,182,212,.10); filter:drop-shadow(0 0 6px rgba(6,182,212,.4));}
.gnode.visited .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.12); filter:drop-shadow(0 0 6px rgba(34,197,94,.4)); stroke-dasharray:none;}
.gnode.visited .nl{fill:#bbf7d0;}
.gnode.activeu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3; stroke-dasharray:none;}
.gnode.activeu .nl{fill:#ffd591;}
.gnode.activev .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 12px rgba(168,85,247,.6)); stroke-width:3; stroke-dasharray:none;}
.gnode.activev .nl{fill:#e9d5ff;}
.gnode.path .nc{stroke:#fff; fill:rgba(34,197,94,.30); filter:drop-shadow(0 0 12px rgba(34,197,94,.75)); stroke-width:3; stroke-dasharray:none;}
.gnode.path .nl{fill:#fff;}
.lvl-label{font-family:var(--mono); font-size:10px; font-weight:700; fill:var(--text-dim); text-anchor:middle;}

.side{display:flex; flex-direction:column; gap:12px; min-width:215px; flex:1 1 215px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel.q .cap{color:var(--accent-blue);} .panel.v .cap{color:var(--accent-green);} .panel.r .cap{color:var(--accent-orange);}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start;}
.tile{min-width:34px; height:34px; padding:0 9px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:13px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.tile.q{border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.12); color:#a5f3fc;}
.tile.v{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.1); color:#bbf7d0;}
.tile.r{border-color:rgba(245,165,36,.45); background:rgba(245,165,36,.12); color:#ffd591;}
.tile.arrow{border:none; background:none; color:var(--text-dim); min-width:14px; padding:0; font-weight:700;}
.tiles .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-orange);} .pill.n b{color:var(--accent-purple);} .pill.l b{color:var(--accent-blue);} .pill.s b{color:var(--accent-green);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>start =</label>
  <input type="text" id="s-input" class="small-input" value="hit">
  <label>end =</label>
  <input type="text" id="t-input" class="small-input" value="cog">
  <label>wordList =</label>
  <input type="text" id="l-input" class="large-input" value='["hot","dot","dog","lot","log","cog"]'>
  <button onclick="loadCustom()">Load</button>
  <button onclick='loadExample("hit","cog","[&quot;hot&quot;,&quot;dot&quot;,&quot;dog&quot;,&quot;lot&quot;,&quot;log&quot;,&quot;cog&quot;]")'>Ex 1</button>
  <button onclick='loadExample("hit","cog","[&quot;hot&quot;,&quot;dot&quot;,&quot;dog&quot;,&quot;lot&quot;,&quot;log&quot;]")'>Ex 2 (No Path)</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Word Ladder <span class="sub">&middot; shortest transformation via BFS</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 520 380"></svg></div>
      <div class="side">
        <div class="panel q"><div class="cap">BFS QUEUE (FIFO)</div><div class="tiles" id="q-tiles"></div></div>
        <div class="panel v"><div class="cap">VISITED SET</div><div class="tiles" id="v-tiles"></div></div>
        <div class="panel r"><div class="cap">LADDER (path so far)</div><div class="tiles" id="r-tiles"></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">word u = <b id="pill-u">&mdash;</b></span>
        <span class="pill n">mutation v = <b id="pill-v">&mdash;</b></span>
        <span class="pill l">depth <b id="pill-len">&mdash;</b></span>
        <span class="pill s">visited <b id="pill-cnt">0</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>active u</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>mutation v</span>
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>in queue</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>visited</span>
          <span class="li"><span class="dot" style="background:#fff"></span>ladder</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','ladderLength'],['src','(start, end, words):']],
  [['src','  q = [(start, 1)];  visited = {start}']],
  [['kw','  while'],['src',' q:']],
  [['src','    (word, depth) = q.popleft()']],
  [['kw','    if'],['src',' word == end: '],['kw','return'],['src',' depth']],
  [['kw','    for'],['src',' v '],['kw','in'],['src',' mutations(word) ∩ words:']],
  [['kw','      if'],['src',' v '],['kw','not in'],['src',' visited:']],
  [['src','        visited.add(v);  q.push((v, depth+1))']],
  [['kw','  return'],['src',' 0   # no transformation']],
];

let startWord="hit", endWord="cog", wordList=["hot","dot","dog","lot","log","cog"];
let allWords=[], adjList={}, coord={}, levels={};
let steps=[], stepIndex=0, timer=null;
const delays=[1700,900,460];
const gnodes={};
let confettiArmed=true;

function init(){ buildCode(); loadExample("hit","cog",'["hot","dot","dog","lot","log","cog"]'); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(s,t,wStr){ document.getElementById('s-input').value=s; document.getElementById('t-input').value=t; document.getElementById('l-input').value=wStr; parseAndGen(); }
function loadCustom(){ parseAndGen(); }

function isOneCharDiff(a,b){ if(a.length!==b.length) return false; let d=0; for(let i=0;i<a.length;i++){ if(a[i]!==b[i]) d++; if(d>1) return false; } return d===1; }

function parseAndGen(){
  try{
    startWord=document.getElementById('s-input').value.trim();
    endWord=document.getElementById('t-input').value.trim();
    wordList=JSON.parse(document.getElementById('l-input').value.replace(/'/g,'"'));
    if(!Array.isArray(wordList)) throw new Error('wordList must be an array');
    const wSet=new Set(wordList);
    allWords = wSet.has(startWord) ? Array.from(wSet) : [startWord, ...Array.from(wSet)];
    // build implicit graph: words 1 letter apart are adjacent
    adjList={}; allWords.forEach(w=>adjList[w]=[]);
    for(let i=0;i<allWords.length;i++){ for(let j=i+1;j<allWords.length;j++){
      if(isOneCharDiff(allWords[i],allWords[j])){ adjList[allWords[i]].push(allWords[j]); adjList[allWords[j]].push(allWords[i]); }
    }}
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid input. start/end must be words and wordList a JSON array of strings.'); }
}

function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; coord={}; levels={}; for(const k in gnodes) delete gnodes[k];
  // BFS levels for a clean left-to-right layered layout
  const q=[startWord]; levels[startWord]=0;
  while(q.length){ const u=q.shift(); for(const v of adjList[u]){ if(levels[v]===undefined){ levels[v]=levels[u]+1; q.push(v); } } }
  let maxLvl=0; const groups={};
  allWords.forEach(w=>{ let l=levels[w]!==undefined?levels[w]:-1; (groups[l]=groups[l]||[]).push(w); if(l>maxLvl) maxLvl=l; });
  if(groups[-1]){ maxLvl++; groups[maxLvl]=groups[-1]; delete groups[-1]; }
  const W=520, H=380, x0=58, x1=W-58;
  const xStep = maxLvl>0 ? (x1-x0)/maxLvl : 0;
  // level captions
  const lvlKeys=Object.keys(groups).map(Number).sort((a,b)=>a-b);
  lvlKeys.forEach(l=>{
    const x=x0+l*xStep;
    const cap=document.createElementNS('http://www.w3.org/2000/svg','text');
    cap.setAttribute('class','lvl-label'); cap.setAttribute('x',x); cap.setAttribute('y',18);
    const reachable = allWords.some(w=>levels[w]===l);
    cap.textContent = reachable ? ('depth '+(l+1)) : 'unreached';
    svg.appendChild(cap);
    const words=groups[l]; const yStep=(H-30)/(words.length+1);
    words.forEach((w,idx)=>{ coord[w]={x, y:34+yStep*(idx+1)}; });
  });
  // edges first
  let ei=0; const drawn=new Set();
  for(const u in adjList){ for(const v of adjList[u]){
    const key=u<v?u+'~'+v:v+'~'+u; if(drawn.has(key)) continue; drawn.add(key);
    const p1=coord[u], p2=coord[v]; if(!p1||!p2) continue;
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line'); ln.setAttribute('class','edge'); ln.id='e'+(ei++);
    ln.setAttribute('x1',p1.x); ln.setAttribute('y1',p1.y); ln.setAttribute('x2',p2.x); ln.setAttribute('y2',p2.y);
    ln.dataset.a=u; ln.dataset.b=v; svg.appendChild(ln);
  }}
  // nodes on top
  allWords.forEach(w=>{ const p=coord[w]; if(!p) return;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode'); g.id='gn'+w;
    if(w===startWord) g.classList.add('start'); if(w===endWord) g.classList.add('target');
    const rw=Math.max(22, 9*w.length+8);
    const c=document.createElementNS('http://www.w3.org/2000/svg','rect'); c.setAttribute('class','nc');
    c.setAttribute('x',p.x-rw); c.setAttribute('y',p.y-17); c.setAttribute('width',rw*2); c.setAttribute('height',34); c.setAttribute('rx',17);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=w;
    g.appendChild(c); g.appendChild(t); svg.appendChild(g); gnodes[w]=g;
  });
}

function generateSteps(){
  steps=[];
  const wSet=new Set(wordList);
  const visited=new Set(), queue=[], parent={}, depth={};
  function snap(o){ steps.push({ queue:queue.map(x=>x.w), visited:[...visited], ladder:o.ladder||[],
    u:o.u??null, v:o.v??null, depth:o.depth??null, pushed:o.pushed??null, tree:[...(o.tree||[])],
    code:o.code, narr:o.narr, log:o.log, complete:o.complete, fail:o.fail }); }

  if(!wSet.has(endWord)){
    snap({code:[8], narr:`End word <code>${endWord}</code> is <b>not</b> in the word list &mdash; no transformation is possible. Return <code>0</code>.`,
      log:`endWord "${endWord}" not in wordList -> 0`, complete:true, fail:true });
    return;
  }

  queue.push({w:startWord,d:1}); visited.add(startWord); depth[startWord]=1;
  const tree=new Set();
  snap({code:[1], narr:`<b>BFS</b> from <code>${startWord}</code> toward <code>${endWord}</code>. Seed the queue with <code>(${startWord}, 1)</code> and mark it visited.`,
    log:`init  queue=[(${startWord},1)]  target=${endWord}`, tree });

  let answer=0;
  while(queue.length){
    const {w:u,d:du}=queue.shift();
    snap({code:[2,3], u, depth:du, narr:`Dequeue <code>${u}</code> at depth <b>${du}</b>. Generate its 1-letter mutations that are in the list.`,
      log:`dequeue ${u}  depth=${du}`, tree });
    if(u===endWord){
      answer=du;
      snap({code:[4], u, depth:du, narr:`<code>${u}</code> equals the end word &mdash; shortest ladder found at length <b>${du}</b>!`,
        log:`reached ${endWord} at depth ${du}`, tree });
      break;
    }
    for(const v of (adjList[u]||[])){
      if(!wSet.has(v) && v!==startWord) continue;
      snap({code:[5,6], u, v, depth:du, narr:`Mutation <code>${v}</code> differs from <code>${u}</code> by one letter &mdash; has it been visited?`,
        log:`  mutation ${v}`, tree });
      if(!visited.has(v)){
        visited.add(v); queue.push({w:v,d:du+1}); parent[v]=u; depth[v]=du+1; tree.add([u,v].sort().join('~'));
        snap({code:[7], u, v, pushed:v, depth:du, narr:`<code>${v}</code> is <b>new</b> &rarr; mark visited, set depth <b>${du+1}</b>, enqueue. Queue front advances.`,
          log:`    enqueue ${v}  depth=${du+1}`, tree });
      } else {
        snap({code:[6], u, v, depth:du, narr:`<code>${v}</code> already visited &rarr; skip (BFS guarantees the first visit is the shortest).`,
          log:`    ${v} visited, skip`, tree });
      }
    }
  }

  if(answer>0){
    const path=[]; let cur=endWord; while(cur){ path.unshift(cur); cur=parent[cur]; }
    const tree=new Set(); for(let i=0;i<path.length-1;i++) tree.add([path[i],path[i+1]].sort().join('~'));
    snap({code:[4], ladder:path, depth:answer, tree,
      narr:`<b>Done.</b> Shortest ladder has length <b>${answer}</b>: <code>${path.join(' &rarr; ')}</code>.`,
      log:`done. ladder=[${path.join(' -> ')}] length=${answer}`, complete:true });
  } else {
    snap({code:[8], narr:`Queue empty &mdash; <code>${endWord}</code> is unreachable. No valid ladder exists. Return <code>0</code>.`,
      log:`queue empty. ${endWord} unreachable -> 0`, complete:true, fail:true });
  }
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const inq=new Set(step.queue), vis=new Set(step.visited), pathSet=new Set(step.ladder||[]);
  allWords.forEach(n=>{ const g=gnodes[n]; if(!g) return;
    g.classList.remove('inqueue','visited','activeu','activev','path');
    if(vis.has(n)) g.classList.add('visited');
    if(inq.has(n)) g.classList.add('inqueue');
    if(step.u===n) g.classList.add('activeu');
    if(step.v===n) g.classList.add('activev');
    if(pathSet.has(n)) g.classList.add('path');
    if(step.pushed===n){ const c=g.querySelector('.nc'); if(c) Motion.pop(c); }
  });
  const treeSet=new Set(step.tree);
  document.querySelectorAll('.edge').forEach(ln=>{ ln.classList.remove('tree','checking');
    const key=[ln.dataset.a,ln.dataset.b].sort().join('~');
    const checking = step.u!=null && step.v!=null && ((ln.dataset.a===step.u&&ln.dataset.b===step.v)||(ln.dataset.a===step.v&&ln.dataset.b===step.u));
    if(checking) ln.classList.add('checking'); else if(treeSet.has(key)) ln.classList.add('tree'); });

  fillTiles('q-tiles', step.queue, 'q');
  fillTiles('v-tiles', step.visited, 'v');
  fillLadder('r-tiles', step.ladder||[]);

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done', !!step.complete && !step.fail);
  narr.classList.toggle('fail', !!step.fail);
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });
  document.getElementById('pill-u').textContent=step.u!=null?step.u:'—';
  document.getElementById('pill-v').textContent=step.v!=null?step.v:'—';
  document.getElementById('pill-len').textContent=step.depth!=null?step.depth:'—';
  document.getElementById('pill-cnt').textContent=step.visited.length;
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;
  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].fail) d.style.color='var(--accent-red)'; else if(steps[k].complete) d.style.color='var(--accent-green)'; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;
  if(step.complete && !step.fail){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fillTiles(id, arr, cls){
  const c=document.getElementById(id); c.innerHTML='';
  if(!arr.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; c.appendChild(e); return; }
  arr.forEach(v=>{ const t=document.createElement('div'); t.className='tile '+cls; t.textContent=v; c.appendChild(t); });
}
function fillLadder(id, arr){
  const c=document.getElementById(id); c.innerHTML='';
  if(!arr.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ pending }'; c.appendChild(e); return; }
  arr.forEach((v,i)=>{ if(i>0){ const a=document.createElement('div'); a.className='tile arrow'; a.textContent='→'; c.appendChild(a); }
    const t=document.createElement('div'); t.className='tile r'; t.textContent=v; c.appendChild(t); });
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
