<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Ladder (BFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 70px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 20px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 550px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            padding: 0 12px; height: 32px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 14px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.source { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(56,139,253,0.3); }
        .node.target { border-color: var(--accent-red); }
        .node.active-u { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 3; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 2; color: var(--accent-purple); }
        .node.visited { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .node.path-node { background: var(--accent-green); border-color: #fff; color: #000; box-shadow: 0 0 15px var(--accent-green); z-index: 4; transform: translate(-50%, -50%) scale(1.1);}

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 100px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile {
            padding: 0 10px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 14px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.q-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.vis-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 830px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 830px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.05); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 15px var(--accent-red); transform: scale(1.05); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1.05)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 830px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">start =</label>
        <input type="text" id="s-input" class="small-input" placeholder="hit">
        <label class="ui-label">end =</label>
        <input type="text" id="t-input" class="small-input" placeholder="cog">
        <label class="ui-label">wordList =</label>
        <input type="text" id="l-input" class="med-input" placeholder="['hot','dot','dog','lot','log','cog']">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('hit', 'cog', '[\x22hot\x22,\x22dot\x22,\x22dog\x22,\x22lot\x22,\x22log\x22,\x22cog\x22]')">Ex 1</button>
        <button onclick="loadExample('hit', 'cog', '[\x22hot\x22,\x22dot\x22,\x22dog\x22,\x22lot\x22,\x22log\x22]')">Ex 2 (No Path)</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">BFS Queue:</div>
                <div class="tiles-wrapper" id="q-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Queue stores the word.</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">Visited Set:</div>
                <div class="tiles-wrapper" id="vis-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Words removed from wordList.</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Word (Pop)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Path Length</span>
            <span class="info-value" id="val-len" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">shortest transformation sequence =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Popped / Active Word</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Valid Neighbor</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Visited (In Dictionary)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border-color:#fff"></span> Shortest Path Component</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let startWord = "hit";
        let endWord = "cog";
        let wordList = ["hot","dot","dog","lot","log","cog"];
        
        let allWords = [];
        let adjList = {};
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample('hit', 'cog', '["hot","dot","dog","lot","log","cog"]'); }

        function loadExample(s, t, wStr) {
            document.getElementById('s-input').value = s;
            document.getElementById('t-input').value = t;
            document.getElementById('l-input').value = wStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function isOneCharDiff(w1, w2) {
            if (w1.length !== w2.length) return false;
            let diffs = 0;
            for (let i = 0; i < w1.length; i++) {
                if (w1[i] !== w2[i]) diffs++;
                if (diffs > 1) return false;
            }
            return diffs === 1;
        }

        function parseAndGenerate() {
            try {
                startWord = document.getElementById('s-input').value.trim();
                endWord = document.getElementById('t-input').value.trim();
                wordList = JSON.parse(document.getElementById('l-input').value.replace(/'/g, '"'));
                
                if (!Array.isArray(wordList)) throw "wordList must be array";
                
                let wSet = new Set(wordList);
                if (!wSet.has(startWord)) {
                    allWords = [startWord, ...Array.from(wSet)];
                } else {
                    allWords = Array.from(wSet);
                }

                // Build implicit graph
                adjList = {};
                allWords.forEach(w => adjList[w] = []);
                for (let i = 0; i < allWords.length; i++) {
                    for (let j = i + 1; j < allWords.length; j++) {
                        if (isOneCharDiff(allWords[i], allWords[j])) {
                            adjList[allWords[i]].push(allWords[j]);
                            adjList[allWords[j]].push(allWords[i]);
                        }
                    }
                }

                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure start/end are strings and wordList is a valid JSON array of strings.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            // Calculate BFS levels to layout nodes beautifully
            let levels = {};
            let q = [startWord];
            levels[startWord] = 0;
            
            while(q.length > 0) {
                let u = q.shift();
                for (let v of adjList[u]) {
                    if (levels[v] === undefined) {
                        levels[v] = levels[u] + 1;
                        q.push(v);
                    }
                }
            }

            let maxLvl = 0;
            let lvlGroups = {};
            allWords.forEach(w => {
                let l = levels[w] !== undefined ? levels[w] : -1; // -1 for unreachable
                if (!lvlGroups[l]) lvlGroups[l] = [];
                lvlGroups[l].push(w);
                if (l > maxLvl) maxLvl = l;
            });

            // Assign unreachable to the far right
            if (lvlGroups[-1]) {
                maxLvl++;
                lvlGroups[maxLvl] = lvlGroups[-1];
                delete lvlGroups[-1];
            }

            const width = 550;
            const height = 400;
            const startX = 60;
            const endX = width - 60;
            const xStep = maxLvl > 0 ? (endX - startX) / maxLvl : 0;

            for (let l in lvlGroups) {
                let wordsInLvl = lvlGroups[l];
                let x = startX + (parseInt(l) * xStep);
                
                let yStep = height / (wordsInLvl.length + 1);
                
                wordsInLvl.forEach((w, idx) => {
                    let y = yStep * (idx + 1);
                    nodeCoords[w] = {x, y};

                    const node = document.createElement('div');
                    node.className = 'node';
                    if (w === startWord) node.classList.add('source');
                    if (w === endWord) node.classList.add('target');
                    node.id = `node-${w}`;
                    node.style.left = `${x}px`;
                    node.style.top = `${y}px`;
                    node.innerText = w;
                    container.appendChild(node);
                });
            }
        }

        function generateSteps() {
            steps = [];
            
            let wordSet = new Set(wordList);
            let visited = new Set();
            let queue = [];
            let parents = {}; // To reconstruct path
            let pathLengths = {};
            
            if (!wordSet.has(endWord)) {
                steps.push({
                    type: 'error', queue: [], visited: [], finalPath: [],
                    u: null, v: null, poppedItem: null, pushedItem: null, pathLen: null,
                    panel: `The end word <b>"${endWord}"</b> is not in the wordList.<br>There is no valid transformation sequence.`,
                    complete: true, result: "[]", isError: true,
                    statusText: `Error: endWord missing.`,
                    log: `endWord "${endWord}" not in dictionary. Halting.`
                });
                return;
            }

            queue.push(startWord);
            visited.add(startWord);
            wordSet.delete(startWord);
            pathLengths[startWord] = 1;

            steps.push({
                type: 'init', queue: [...queue], visited: Array.from(visited), finalPath: [],
                u: null, v: null, poppedItem: null, pushedItem: null, pathLen: null,
                panel: `<b>Word Ladder (BFS)</b><br>Initialize Queue with the start word <b>"${startWord}"</b>. Mark it as visited (path length = 1).`,
                statusText: `Ready to search.`,
                log: `Initialized BFS. Queue=[${startWord}], Target=${endWord}`
            });

            let found = false;

            while (queue.length > 0 && !found) {
                let u = queue.shift();
                let currLen = pathLengths[u];

                steps.push({
                    type: 'dequeue', queue: [...queue], visited: Array.from(visited), finalPath: [],
                    u: u, v: null, poppedItem: u, pushedItem: null, pathLen: currLen,
                    panel: `<b>Dequeue:</b> Active Word is <b>"${u}"</b>.<br>Current transformation path length is <b>${currLen}</b>. Generating valid 1-letter mutations...`,
                    statusText: `Processing word "${u}"...`,
                    log: `\nDequeue "${u}". Path length=${currLen}.`
                });

                if (u === endWord) {
                    found = true;
                    break;
                }

                // In standard algorithm, we change 'a'-'z', but we already built adjList
                let neighbors = adjList[u] || [];
                
                for (let v of neighbors) {
                    // Only process if it's still in the unvisited wordSet (or we track via visited set)
                    if (!visited.has(v) && wordList.includes(v)) {
                        
                        steps.push({
                            type: 'check_neighbor', queue: [...queue], visited: Array.from(visited), finalPath: [],
                            u: u, v: v, poppedItem: null, pushedItem: null, pathLen: currLen,
                            panel: `Mutation <b>"${v}"</b> differs by exactly 1 character and exists in the dictionary.<br>Checking if it has been visited...`,
                            statusText: `Evaluating valid mutation "${v}"...`,
                            log: `  Checking valid mutation "${v}"...`
                        });

                        visited.add(v);
                        queue.push(v);
                        parents[v] = u;
                        pathLengths[v] = currLen + 1;

                        steps.push({
                            type: 'enqueue', queue: [...queue], visited: Array.from(visited), finalPath: [],
                            u: u, v: v, poppedItem: null, pushedItem: v, pathLen: currLen,
                            panel: `Word <b>"${v}"</b> is unvisited! <br>Mark as visited, set its path length to ${currLen + 1}, and Enqueue it.`,
                            statusText: `Enqueued "${v}".`,
                            log: `    -> Unvisited. Marked visited and Enqueued.`,
                            logColor: 'var(--accent-green)'
                        });

                        if (v === endWord) {
                            found = true;
                            steps.push({
                                type: 'target_found', queue: [...queue], visited: Array.from(visited), finalPath: [],
                                u: u, v: v, poppedItem: null, pushedItem: null, pathLen: currLen + 1,
                                panel: `<b style="color:var(--accent-red); font-size:16px;">Target Reached!</b><br>We successfully transformed into <b>"${endWord}"</b>!`,
                                statusText: `Target word found!`,
                                log: `    -> TARGET FOUND! Breaking search.`,
                                logColor: 'var(--accent-red)'
                            });
                            break;
                        }
                    }
                }
            }

            if (found) {
                let path = [];
                let curr = endWord;
                while (curr) {
                    path.unshift(curr);
                    curr = parents[curr];
                }

                steps.push({
                    type: 'final', queue: [...queue], visited: Array.from(visited), finalPath: path,
                    u: null, v: null, poppedItem: null, pushedItem: null, pathLen: path.length,
                    panel: `<b>Algorithm Complete!</b><br>Shortest transformation sequence requires <b style="color:var(--accent-green); font-size:18px;">${path.length}</b> words:<br><code>[${path.join(' ➔ ')}]</code>.`,
                    complete: true, result: `[${path.map(w=>`"${w}"`).join(', ')}]`, isError: false,
                    statusText: `Algorithm Complete.`,
                    log: `\nTarget reached. Shortest Path: [${path.join(' -> ')}]. Length: ${path.length}`,
                    logColor: 'var(--accent-green)'
                });
            } else {
                steps.push({
                    type: 'final', queue: [...queue], visited: Array.from(visited), finalPath: [],
                    u: null, v: null, poppedItem: null, pushedItem: null, pathLen: 0,
                    panel: `<b>Queue Empty!</b><br>All possible valid transformations explored without reaching <b>"${endWord}"</b>.<br>No valid sequence exists.`,
                    complete: true, result: `[]`, isError: true,
                    statusText: `Failed: Target unreachable.`,
                    log: `\nQueue empty. Target unreachable. Return [].`,
                    logColor: 'var(--accent-red)'
                });
            }
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            
            let drawn = new Set();

            for (let u in adjList) {
                for (let v of adjList[u]) {
                    let key = u < v ? `${u}-${v}` : `${v}-${u}`;
                    if (drawn.has(key)) continue;
                    drawn.add(key);

                    const p1 = nodeCoords[u];
                    const p2 = nodeCoords[v];
                    if(!p1 || !p2) continue;

                    let isChecking = step.u !== null && step.v !== null && 
                                     ((step.u === u && step.v === v) || (step.u === v && step.v === u));

                    // Check if edge is part of the final path
                    let isPathEdge = false;
                    if (step.finalPath && step.finalPath.length > 0) {
                        for (let i=0; i<step.finalPath.length-1; i++) {
                            let p_u = step.finalPath[i], p_v = step.finalPath[i+1];
                            if ((p_u === u && p_v === v) || (p_u === v && p_v === u)) {
                                isPathEdge = true; break;
                            }
                        }
                    }

                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    
                    // Simple padding
                    let pad = 16; 
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const len = Math.hypot(dx, dy);
                    
                    line.setAttribute('x1', p1.x + (dx/len)*pad); 
                    line.setAttribute('y1', p1.y + (dy/len)*pad);
                    line.setAttribute('x2', p2.x - (dx/len)*pad); 
                    line.setAttribute('y2', p2.y - (dy/len)*pad);

                    if (isPathEdge) {
                        line.setAttribute('stroke', 'var(--accent-green)');
                        line.setAttribute('stroke-width', '4');
                        svg.appendChild(line);
                    } else if (isChecking) {
                        line.setAttribute('stroke', 'var(--accent-purple)');
                        line.setAttribute('stroke-width', '3');
                        line.setAttribute('stroke-dasharray', '6');
                        line.classList.add('line-anim');
                        setTimeout(() => svg.appendChild(line), 0);
                    } else {
                        line.setAttribute('stroke', 'var(--border-main)');
                        line.setAttribute('stroke-width', '1.5');
                        svg.appendChild(line);
                    }
                }
            }
        }

        function renderQueue(step) {
            const container = document.getElementById('q-tiles');
            container.innerHTML = '';
            
            if (step.queue.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            if (step.poppedItem !== null && step.type === 'dequeue') {
                const popTile = document.createElement('div');
                popTile.className = `tile q-tile popping`;
                popTile.innerText = step.poppedItem;
                container.appendChild(popTile);
            }

            step.queue.forEach(val => {
                const tile = document.createElement('div');
                tile.className = `tile q-tile`;
                if (step.pushedItem === val) {
                    tile.classList.add('pushing');
                }
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderVisited(step) {
            const container = document.getElementById('vis-tiles');
            container.innerHTML = '';
            
            if (step.visited.length === 0) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            step.visited.forEach(val => {
                const tile = document.createElement('div');
                tile.className = `tile vis-tile`;
                if (step.pushedItem === val) {
                    tile.classList.add('pushing');
                }
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            allWords.forEach(w => {
                const el = document.getElementById(`node-${w}`);
                if(!el) return;
                
                el.className = 'node';
                
                if (w === startWord) el.classList.add('source');
                if (w === endWord) el.classList.add('target');
                
                if (step.visited.includes(w)) el.classList.add('visited');
                if (step.finalPath && step.finalPath.includes(w)) el.classList.add('path-node');
                
                if (step.u === w && !step.complete) el.classList.add('active-u');
                if (step.v === w && !step.complete) el.classList.add('active-v');
            });

            drawEdges(step);
            renderQueue(step);
            renderVisited(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? `"${step.u}"` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `"${step.v}"` : '—';
            document.getElementById('val-len').innerText = step.pathLen !== null ? step.pathLen : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.className = step.isError ? 'pop-false' : 'pop';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
