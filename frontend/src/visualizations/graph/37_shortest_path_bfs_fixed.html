<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortest Path (BFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 400px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.source { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(56,139,253,0.4); color: var(--accent-blue); background: rgba(56,139,253,0.1); }
        .node.target { border-color: var(--accent-red); box-shadow: 0 0 10px rgba(248,81,73,0.4); color: var(--accent-red); background: rgba(248,81,73,0.1); }
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 3; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 2; color: var(--accent-purple); }
        .node.visited { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .node.path-node { background: var(--accent-green); border-color: #fff; color: #000; box-shadow: 0 0 15px var(--accent-green); z-index: 4; transform: translate(-50%, -50%) scale(1.1);}

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 100px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; padding: 0 8px;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.q-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.dist-tile { background: #1a150b; border-color: #6e5518; color: var(--text-main); }
        .tile.vis-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes highlightFlash { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.5); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); filter: brightness(1); } }
        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center; word-break: break-all;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 15px var(--accent-red); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">graph =</label>
        <input type="text" id="g-input" class="med-input" placeholder='{"0": [1, 2], "1": [3], "2": [3], "3": []}'>
        <label class="ui-label">source =</label>
        <input type="text" id="s-input" class="small-input" placeholder="0">
        <label class="ui-label">dest =</label>
        <input type="text" id="t-input" class="small-input" placeholder="3">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('{\x220\x22: [1, 2], \x221\x22: [3], \x222\x22: [3], \x223\x22: []}', '0', '3')">Ex 1</button>
        <button onclick="loadExample('{\x220\x22: [1], \x221\x22: [2], \x222\x22: [0, 3], \x223\x22: []}', '0', '3')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                    <marker id="arrow-path" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-green)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">BFS Queue:</div>
                <div class="tiles-wrapper" id="q-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Queue maintains BFS frontier.</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">Distances:</div>
                <div class="tiles-wrapper" id="dist-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Shortest path lengths from source.</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Path Length</span>
            <span class="info-value" id="val-len" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">shortest path length =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:rgba(56,139,253,0.1); border-color:var(--accent-blue); border-width:2px;"></span> Source</div>
        <div class="legend-item"><span class="dot" style="background:rgba(248,81,73,0.1); border-color:var(--accent-red); border-width:2px;"></span> Destination</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Popped Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Neighbor Check</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Visited</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border-color:#fff"></span> Shortest Path</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let graphAdj = {"0": [1, 2], "1": [3], "2": [3], "3": []};
        let sourceNode = "0";
        let targetNode = "3";
        
        let nodes = [];
        let edges = [];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample('{"0": [1, 2], "1": [3], "2": [3], "3": []}', '0', '3'); }

        function loadExample(gStr, sStr, tStr) {
            document.getElementById('g-input').value = gStr;
            document.getElementById('s-input').value = sStr;
            document.getElementById('t-input').value = tStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                let parsedGraph = JSON.parse(document.getElementById('g-input').value);
                sourceNode = document.getElementById('s-input').value.trim();
                targetNode = document.getElementById('t-input').value.trim();
                
                if (typeof parsedGraph !== 'object') throw "Graph must be an object";

                graphAdj = {};
                nodes = Object.keys(parsedGraph);
                edges = [];
                
                for (let u of nodes) {
                    graphAdj[u] = [];
                    for (let v of parsedGraph[u]) {
                        let vStr = v.toString();
                        graphAdj[u].push(vStr);
                        edges.push({u: u, v: vStr});
                        if (!nodes.includes(vStr)) nodes.push(vStr);
                    }
                }
                
                nodes = Array.from(new Set(nodes)).sort((a,b) => a.localeCompare(b));
                
                if (!nodes.includes(sourceNode) || !nodes.includes(targetNode)) {
                    throw "Source or Target not found in graph.";
                }

                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure Graph is a valid JSON adjacency list, and Source/Destination exist in the graph.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            const cx = 225;
            const cy = 200;
            const radius = 130;
            const N = nodes.length;

            for (let i = 0; i < N; i++) {
                const nId = nodes[i];
                const angle = (Math.PI * 2 * i) / N - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[nId] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${nId}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = nId;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let visited = new Set();
            let queue = [];
            let dist = {};
            let parent = {};

            nodes.forEach(n => dist[n] = Infinity);

            visited.add(sourceNode);
            queue.push(sourceNode);
            dist[sourceNode] = 0;
            parent[sourceNode] = null;

            steps.push({
                type: 'init', queue: [...queue], visited: Array.from(visited), dist: {...dist},
                u: null, v: null, poppedItem: null, pushedItem: null, updatedNode: null, path: [],
                panel: `<b>BFS Shortest Path</b><br>Start at source Node <b>${sourceNode}</b>. Set its distance to 0, mark as visited, and push to Queue.`,
                statusText: `Initialization complete.`,
                log: `Initialized BFS. Source=${sourceNode}, Destination=${targetNode}.`
            });

            let found = false;

            if (sourceNode === targetNode) {
                found = true;
                steps.push({
                    type: 'target_found', queue: [...queue], visited: Array.from(visited), dist: {...dist},
                    u: sourceNode, v: null, poppedItem: null, pushedItem: null, updatedNode: null, path: [sourceNode],
                    panel: `Source is the same as the destination! Distance is 0.`,
                    statusText: `Target found.`,
                    log: `Source == Destination.`
                });
            }

            while(queue.length > 0 && !found) {
                let u = queue.shift();
                
                steps.push({
                    type: 'dequeue', queue: [...queue], visited: Array.from(visited), dist: {...dist},
                    u: u, v: null, poppedItem: u, pushedItem: null, updatedNode: null, path: [],
                    panel: `<b>Dequeue Node <code>${u}</code></b>.<br>Current shortest path length to <code>${u}</code> is <b>${dist[u]}</b>. Processing neighbors...`,
                    statusText: `Exploring Node ${u}...`,
                    log: `\nDequeue ${u}. dist[${u}]=${dist[u]}.`
                });

                let neighbors = graphAdj[u] || [];
                
                if (neighbors.length === 0) {
                    steps.push({
                        type: 'no_neighbors', queue: [...queue], visited: Array.from(visited), dist: {...dist},
                        u: u, v: null, poppedItem: null, pushedItem: null, updatedNode: null, path: [],
                        panel: `Node <b>${u}</b> has no outgoing edges.`,
                        statusText: `No neighbors for ${u}.`,
                        log: `  Node ${u} has no neighbors.`
                    });
                }

                for(let v of neighbors) {
                    steps.push({
                        type: 'check', queue: [...queue], visited: Array.from(visited), dist: {...dist},
                        u: u, v: v, poppedItem: null, pushedItem: null, updatedNode: null, path: [],
                        panel: `Checking neighbor <b>${v}</b> of Node <b>${u}</b>.<br>Is <code>${v}</code> visited?`,
                        statusText: `Evaluating edge ${u} ➔ ${v}...`,
                        log: `  Evaluate edge ${u}->${v}.`
                    });

                    if (!visited.has(v)) {
                        visited.add(v);
                        dist[v] = dist[u] + 1;
                        parent[v] = u;
                        queue.push(v);
                        
                        steps.push({
                            type: 'enqueue', queue: [...queue], visited: Array.from(visited), dist: {...dist},
                            u: u, v: v, poppedItem: null, pushedItem: v, updatedNode: v, path: [],
                            panel: `Neighbor <b>${v}</b> is <b style="color:var(--accent-green)">unvisited</b>.<br>Mark as visited, set <code>dist[${v}] = dist[${u}] + 1 = <b>${dist[v]}</b></code>, and Enqueue it.`,
                            statusText: `Discovered Node ${v}.`,
                            log: `    -> Unvisited. dist[${v}]=${dist[v]}, parent[${v}]=${u}. Enqueue ${v}.`,
                            logColor: 'var(--accent-green)'
                        });

                        if (v === targetNode) {
                            found = true;
                            
                            // Reconstruct path
                            let path = [];
                            let curr = targetNode;
                            while(curr !== null && curr !== undefined) {
                                path.unshift(curr);
                                curr = parent[curr];
                            }

                            steps.push({
                                type: 'target_found', queue: [...queue], visited: Array.from(visited), dist: {...dist},
                                u: u, v: v, poppedItem: null, pushedItem: null, updatedNode: v, path: path,
                                panel: `<b style="color:var(--accent-red); font-size:16px;">Destination Reached!</b><br>We found the shortest path to <b>${targetNode}</b>. Length = <b>${dist[v]}</b>.<br>Since this is BFS on an unweighted graph, this is guaranteed to be the shortest path.`,
                                statusText: `Target found! Halting search.`,
                                log: `    -> Target ${targetNode} found! Shortest path length = ${dist[v]}.`,
                                logColor: 'var(--accent-red)'
                            });
                            break;
                        }
                    } else {
                        steps.push({
                            type: 'skip', queue: [...queue], visited: Array.from(visited), dist: {...dist},
                            u: u, v: v, poppedItem: null, pushedItem: null, updatedNode: null, path: [],
                            panel: `Neighbor <b>${v}</b> is <b style="color:var(--accent-red)">already visited</b>.<br>We already know a shorter or equal path to it. Skip.`,
                            statusText: `Skipped visited Node ${v}.`,
                            log: `    -> Already visited. Skipped.`
                        });
                    }
                }
            }

            if (!found && sourceNode !== targetNode) {
                steps.push({
                    type: 'final', queue: [...queue], visited: Array.from(visited), dist: {...dist},
                    u: null, v: null, poppedItem: null, pushedItem: null, updatedNode: null, path: [],
                    panel: `<b>Queue is empty!</b><br>We explored all reachable nodes, but the destination <b>${targetNode}</b> was never found. Path length is <b>-1</b>.`,
                    complete: true, result: "-1", isError: true,
                    statusText: `Algorithm Complete. Target Unreachable.`,
                    log: `\nQueue empty. Destination ${targetNode} is unreachable. Return -1.`,
                    logColor: 'var(--accent-red)'
                });
            } else {
                // Reconstruct final path
                let path = [];
                let curr = targetNode;
                while(curr !== null && curr !== undefined) {
                    path.unshift(curr);
                    curr = parent[curr];
                }

                steps.push({
                    type: 'final', queue: [...queue], visited: Array.from(visited), dist: {...dist},
                    u: null, v: null, poppedItem: null, pushedItem: null, updatedNode: null, path: path,
                    panel: `<b>Algorithm Complete!</b><br>The shortest path is <b style="color:var(--accent-green)">[${path.join(' ➔ ')}]</b> with length <b style="color:var(--accent-green); font-size:18px;">${dist[targetNode]}</b>.`,
                    complete: true, result: dist[targetNode], isError: false,
                    statusText: `Algorithm Complete.`,
                    log: `\nAlgorithm Complete. Shortest Path: [${path.join(' -> ')}]. Result: ${dist[targetNode]}`,
                    logColor: 'var(--accent-blue)'
                });
            }
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let pathEdges = new Set();
            if (step.path && step.path.length > 1) {
                for (let i = 0; i < step.path.length - 1; i++) {
                    pathEdges.add(`${step.path[i]}-${step.path[i+1]}`);
                }
            }

            edges.forEach(e => {
                const p1 = nodeCoords[e.u];
                const p2 = nodeCoords[e.v];
                if(!p1 || !p2) return;

                let isChecking = step.u === e.u && step.v === e.v;
                let isPath = pathEdges.has(`${e.u}-${e.v}`);

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrinkTarget = nodeRadius + 5; 
                const shrinkSource = nodeRadius + 2; 
                
                line.setAttribute('x1', p1.x + (dx/len)*shrinkSource); 
                line.setAttribute('y1', p1.y + (dy/len)*shrinkSource);
                line.setAttribute('x2', p2.x - (dx/len)*shrinkTarget); 
                line.setAttribute('y2', p2.y - (dy/len)*shrinkTarget);

                if (isPath) {
                    line.setAttribute('stroke', 'var(--accent-green)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('marker-end', 'url(#arrow-path)');
                    svg.appendChild(line);
                } else if (isChecking) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('marker-end', 'url(#arrow-active)');
                    line.classList.add('line-anim');
                    line.setAttribute('stroke-dasharray', '6');
                    setTimeout(() => svg.appendChild(line), 0);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(line);
                }
            });
        }

        function renderQueue(step) {
            const container = document.getElementById('q-tiles');
            container.innerHTML = '';
            
            if (step.queue.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            if (step.poppedItem !== null && step.type === 'dequeue') {
                const popTile = document.createElement('div');
                popTile.className = `tile q-tile popping`;
                popTile.innerText = step.poppedItem;
                container.appendChild(popTile);
            }

            step.queue.forEach(val => {
                const tile = document.createElement('div');
                tile.className = `tile q-tile`;
                if (step.pushedItem === val) {
                    tile.classList.add('pushing');
                }
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderDistances(step) {
            const container = document.getElementById('dist-tiles');
            container.innerHTML = '';
            
            nodes.forEach((n) => {
                let val = step.dist[n];
                if (val === undefined || val === Infinity) return;

                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile dist-tile`;
                if (step.updatedNode === n) {
                    tile.classList.add('highlight-update');
                }
                tile.innerText = `${n}➔${val}`;
                
                wrapper.appendChild(tile);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            nodes.forEach(n => {
                const el = document.getElementById(`node-${n}`);
                if(!el) return;
                
                el.className = 'node';
                
                if (n === sourceNode) el.classList.add('source');
                if (n === targetNode) el.classList.add('target');
                
                if (step.visited.includes(n)) el.classList.add('visited');
                if (step.path.includes(n)) el.classList.add('path-node');
                
                if (step.u === n && !step.complete) el.classList.add('active-u');
                if (step.v === n && !step.complete) el.classList.add('active-v');
            });

            drawEdges(step);

            renderQueue(step);
            renderDistances(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? step.u : '—';
            document.getElementById('val-v').innerText = step.v !== null ? step.v : '—';
            document.getElementById('val-len').innerText = step.u !== null && step.dist[step.u] !== undefined ? step.dist[step.u] : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.className = step.isError ? 'pop-false' : 'pop';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
