<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Leaf Nodes (Iterative DFS Stack) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .large-input { width: 450px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 20px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 500px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #edges-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 15px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.active { transform: translate(-50%, -50%) scale(1.25); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 3; color: var(--accent-orange);}
        .node.pushing { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 2; }
        .node.leaf { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); box-shadow: 0 0 10px rgba(63,185,80,0.4); }
        .node.visited { border-color: #58a6ff; opacity: 0.7; }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 300px; }
        
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 110px;}
        
        .stack-wrapper { 
            display: flex; flex-direction: column-reverse; gap: 4px; align-items: center; 
            max-height: 250px; overflow-y: auto; padding: 4px; background: var(--bg-page); border: 1px inset var(--border-main); border-radius: 6px;
            min-height: 200px;
        }
        
        .stack-tile {
            width: 100%; height: 36px; display: flex; align-items: center; justify-content: center;
            border-radius: 4px; font-size: 14px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #0d213f; border: 1px solid var(--accent-blue);
            color: var(--text-main);
        }
        .stack-tile.popping { background: #332200; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.05); }
        .stack-tile.pushing { animation: pushAnim 0.4s ease; background: #2d144a; border-color: var(--accent-purple); }

        @keyframes pushAnim { 0%{transform:translateY(-15px); opacity:0;} 100%{transform:translateY(0); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 770px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 770px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 28px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.25)} 100%{transform:scale(1.1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 770px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim {
            stroke-dasharray: 6;
            animation: dash 1s linear infinite;
        }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Tree JSON =</label>
        <input type="text" id="g-input" class="large-input" placeholder='{"val":"1", "children":[{"val":"2"}]}'>
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('{\x22val\x22:\x221\x22, \x22children\x22: [{\x22val\x22:\x222\x22}, {\x22val\x22:\x223\x22, \x22children\x22: [{\x22val\x22:\x224\x22}, {\x22val\x22:\x225\x22}]}]}')">Ex 1</button>
        <button onclick="loadExample('{\x22val\x22:\x22A\x22, \x22children\x22: [{\x22val\x22:\x22B\x22, \x22children\x22: [{\x22val\x22:\x22C\x22}]}, {\x22val\x22:\x22D\x22}, {\x22val\x22:\x22E\x22, \x22children\x22:[{\x22val\x22:\x22F\x22}, {\x22val\x22:\x22G\x22, \x22children\x22: [{\x22val\x22:\x22H\x22}]}]}]}')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="text-align:center; color: var(--accent-blue);">DFS Stack (LIFO)</div>
                <div class="stack-wrapper" id="stack-tiles">
                    <span style="color:var(--text-dim); font-size:12px;">{ empty }</span>
                </div>
            </div>
            
            <div class="result-display">
                <span class="ui-label">Leaf Count =</span>
                <span id="res-val">0</span>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node</span>
            <span class="info-value" id="val-active" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Is Leaf? (No Children)</span>
            <span class="info-value" id="val-isleaf" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Pushed to Stack</span>
            <span class="info-value" id="val-pushed" style="color: var(--accent-purple);">—</span>
        </div>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-input); border:1px solid var(--border-main)"></span> Unprocessed</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border:2px solid var(--accent-orange)"></span> Active (Popped) Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border:2px solid var(--accent-purple)"></span> Pushing Child</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Verified Leaf Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border:1px solid #58a6ff"></span> Processed (Not Leaf)</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let rawTree = {"val":"1", "children":[{"val":"2"}, {"val":"3", "children": [{"val":"4"}, {"val":"5"}]}]};
        
        let nodes = [];
        let edges = [];
        let idCounter = 0;
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];

        function init() { 
            loadExample('{"val":"1", "children":[{"val":"2"}, {"val":"3", "children": [{"val":"4"}, {"val":"5"}]}]}'); 
        }

        function loadExample(jsonStr) {
            document.getElementById('g-input').value = jsonStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                const valStr = document.getElementById('g-input').value;
                rawTree = JSON.parse(valStr);
                
                nodes = [];
                edges = [];
                idCounter = 0;
                
                flattenTree(rawTree, null, 0);
                calculateLayout();
                buildGraphDom();
                
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Expected a tree JSON object. e.g. {\"val\": \"1\", \"children\": []}");
            }
        }

        function flattenTree(nodeObj, parentId, depth) {
            if (!nodeObj) return null;
            
            let id = idCounter++;
            let n = {
                id: id,
                val: nodeObj.val !== undefined ? nodeObj.val : id,
                depth: depth,
                childrenIds: [],
                x: 0,
                y: 0
            };
            nodes.push(n);
            
            if (parentId !== null) {
                edges.push({ u: parentId, v: id });
                nodes[parentId].childrenIds.push(id);
            }
            
            if (nodeObj.children && Array.isArray(nodeObj.children)) {
                nodeObj.children.forEach(childObj => {
                    flattenTree(childObj, id, depth + 1);
                });
            }
            return id;
        }

        function calculateLayout() {
            if (nodes.length === 0) return;
            
            let leafX = 40;
            const xSpacing = 60;
            const ySpacing = 70;
            const startY = 40;

            function postOrder(nodeId) {
                let node = nodes[nodeId];
                node.y = startY + node.depth * ySpacing;
                
                if (node.childrenIds.length === 0) {
                    node.x = leafX;
                    leafX += xSpacing;
                } else {
                    let sumX = 0;
                    node.childrenIds.forEach(childId => {
                        postOrder(childId);
                        sumX += nodes[childId].x;
                    });
                    node.x = sumX / node.childrenIds.length;
                }
            }

            postOrder(0); // Root is always id 0

            // Center the tree horizontally
            let minX = Math.min(...nodes.map(n => n.x));
            let maxX = Math.max(...nodes.map(n => n.x));
            let treeWidth = maxX - minX;
            let offset = (500 - treeWidth) / 2 - minX;

            nodes.forEach(n => { n.x += offset; });
        }

        function buildGraphDom() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            
            nodes.forEach(n => {
                const el = document.createElement('div');
                el.className = 'node';
                el.id = `node-${n.id}`;
                el.style.left = `${n.x}px`;
                el.style.top = `${n.y}px`;
                el.innerText = n.val;
                container.appendChild(el);
            });
        }

        function generateSteps() {
            steps = [];
            
            if (nodes.length === 0) {
                steps.push({
                    type: 'empty', stack: [], leafCount: 0,
                    panel: "Tree is empty.", complete: true, result: 0
                });
                return;
            }

            let stack = [0]; // Store IDs
            let leafCount = 0;
            let visitedLeaves = new Set();
            let processedNodes = new Set();

            steps.push({
                type: 'init', stack: [...stack], leafCount: 0,
                visitedLeaves: new Set(visitedLeaves), processedNodes: new Set(processedNodes),
                activeNode: null, pushingNodes: [], activeEdges: [],
                panel: `<b>Iterative DFS Stack</b><br>Start by pushing the root node <b>${nodes[0].val}</b> onto the stack. Initialize Leaf Count = 0.`,
                statusText: `Ready to traverse.`,
                log: `Algorithm initialized. Stack pushed Root Node [${nodes[0].val}].`
            });

            while (stack.length > 0) {
                let currId = stack.pop();
                let node = nodes[currId];
                
                steps.push({
                    type: 'pop', stack: [...stack], leafCount: leafCount,
                    visitedLeaves: new Set(visitedLeaves), processedNodes: new Set(processedNodes),
                    activeNode: currId, pushingNodes: [], activeEdges: [],
                    panel: `<b>Pop Stack:</b> Extracted node <b style="color:var(--accent-orange)">${node.val}</b>.<br>Checking if it has any children...`,
                    statusText: `Evaluating Node ${node.val}...`,
                    log: `\nPopped Node [${node.val}] from Stack.`
                });

                if (node.childrenIds.length === 0) {
                    // LEAF
                    leafCount++;
                    visitedLeaves.add(currId);
                    processedNodes.add(currId);
                    
                    steps.push({
                        type: 'leaf', stack: [...stack], leafCount: leafCount,
                        visitedLeaves: new Set(visitedLeaves), processedNodes: new Set(processedNodes),
                        activeNode: currId, pushingNodes: [], activeEdges: [],
                        panel: `Node <b style="color:var(--accent-orange)">${node.val}</b> has <b style="color:var(--accent-green)">NO children</b>.<br>It is a Leaf Node! Increment Leaf Count to <b>${leafCount}</b>.`,
                        statusText: `Leaf found! Count = ${leafCount}.`,
                        log: `  -> Node [${node.val}] has no children. Leaf count incremented to ${leafCount}.`,
                        logColor: 'var(--accent-green)'
                    });
                } else {
                    // INTERNAL NODE
                    processedNodes.add(currId);
                    
                    let childrenToPush = [...node.childrenIds].reverse(); // Right-to-Left so Left is processed first in DFS
                    let pushingVals = childrenToPush.map(cid => nodes[cid].val);
                    let activeEdges = childrenToPush.map(cid => ({u: currId, v: cid}));
                    
                    steps.push({
                        type: 'internal', stack: [...stack], leafCount: leafCount,
                        visitedLeaves: new Set(visitedLeaves), processedNodes: new Set(processedNodes),
                        activeNode: currId, pushingNodes: childrenToPush, activeEdges: activeEdges,
                        panel: `Node <b style="color:var(--accent-orange)">${node.val}</b> has children. It is NOT a leaf.<br>Pushing its children <b>[${pushingVals.join(', ')}]</b> onto the stack in reverse order so we visit left-to-right.`,
                        statusText: `Pushing children to stack...`,
                        log: `  -> Node [${node.val}] has children. Pushing [${pushingVals.join(', ')}] to Stack.`
                    });

                    childrenToPush.forEach(cid => stack.push(cid));

                    steps.push({
                        type: 'after_push', stack: [...stack], leafCount: leafCount,
                        visitedLeaves: new Set(visitedLeaves), processedNodes: new Set(processedNodes),
                        activeNode: currId, pushingNodes: [], activeEdges: [],
                        panel: `Children successfully added to the stack.<br>Moving to the next iteration.`,
                        statusText: `Stack updated.`,
                        log: `  -> Stack is now: [${stack.map(id => nodes[id].val).join(', ')}]`
                    });
                }
            }

            steps.push({
                type: 'final', stack: [...stack], leafCount: leafCount,
                visitedLeaves: new Set(visitedLeaves), processedNodes: new Set(processedNodes),
                activeNode: null, pushingNodes: [], activeEdges: [],
                panel: `<b>Stack is empty!</b> Traversal is complete.<br>Total number of leaf nodes found: <b style="color:var(--accent-green); font-size:18px;">${leafCount}</b>.`,
                complete: true, result: leafCount,
                statusText: `Algorithm finished.`,
                log: `\nStack empty. Traversal complete. Final Leaf Count: ${leafCount}`,
                logColor: 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            
            edges.forEach(e => {
                const p1 = nodes[e.u];
                const p2 = nodes[e.v];
                
                let isPushing = step.activeEdges && step.activeEdges.some(ae => ae.u === e.u && ae.v === e.v);

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y);
                line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y);

                if (isPushing) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    svg.appendChild(line);
                }
            });
        }

        function renderStack(stackIds, step) {
            const container = document.getElementById('stack-tiles');
            container.innerHTML = '';
            
            if (stackIds.length === 0 && step.type !== 'pop') {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:12px; margin-top: 10px;">{ empty }</span>';
                return;
            }

            // Draw stack elements. Render from bottom to top visually (using flex column-reverse)
            stackIds.forEach(id => {
                const tile = document.createElement('div');
                tile.className = 'stack-tile';
                
                // If it was just pushed in the 'internal' step
                if (step.type === 'internal' && step.pushingNodes.includes(id)) {
                    tile.classList.add('pushing');
                }
                
                tile.innerText = nodes[id].val;
                container.appendChild(tile);
            });

            // If we just popped, visually show the popped tile leaving
            if (step.type === 'pop') {
                const poppedTile = document.createElement('div');
                poppedTile.className = 'stack-tile popping';
                poppedTile.innerText = nodes[step.activeNode].val;
                container.appendChild(poppedTile);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            nodes.forEach(n => {
                let el = document.getElementById(`node-${n.id}`);
                if(!el) return;
                
                el.className = 'node';
                
                if (step.visitedLeaves && step.visitedLeaves.has(n.id)) {
                    el.classList.add('leaf');
                } else if (step.processedNodes && step.processedNodes.has(n.id)) {
                    el.classList.add('visited');
                }
                
                if (step.activeNode === n.id) {
                    el.classList.add('active');
                }
                
                if (step.pushingNodes && step.pushingNodes.includes(n.id)) {
                    el.classList.add('pushing');
                }
            });

            drawEdges(step);
            renderStack(step.stack, step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-active').innerText = step.activeNode !== null ? nodes[step.activeNode].val : '—';
            
            if (step.type === 'leaf') {
                document.getElementById('val-isleaf').innerHTML = `<b style="color:var(--accent-green)">Yes</b>`;
            } else if (step.type === 'internal' || step.type === 'after_push') {
                document.getElementById('val-isleaf').innerHTML = `<b style="color:var(--accent-red)">No</b>`;
            } else {
                document.getElementById('val-isleaf').innerText = '—';
            }
            
            let pushedStr = (step.pushingNodes && step.pushingNodes.length > 0) ? step.pushingNodes.map(id => nodes[id].val).join(', ') : '—';
            document.getElementById('val-pushed').innerText = pushedStr;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.leafCount !== undefined ? step.leafCount : '0';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
