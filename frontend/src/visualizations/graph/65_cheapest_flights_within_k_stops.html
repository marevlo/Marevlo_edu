<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheapest Flights Within K Stops (BFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 420px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 2;
        }
        
        .node.source { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(56,139,253,0.4); color: var(--accent-blue); background: rgba(56,139,253,0.1); }
        .node.target { border-color: var(--accent-green); box-shadow: 0 0 10px rgba(63,185,80,0.4); color: var(--accent-green); background: rgba(63,185,80,0.1); }
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 4; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 3; color: var(--accent-purple); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 380px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 44px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.dist-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.q-tile { background: #1a150b; border-color: var(--accent-orange); color: var(--text-main); padding: 0 8px; width: auto; font-size: 13px;}
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; filter: brightness(1.5); background: rgba(56,139,253,0.3); color: #fff;}
        .tile.pushing { animation: pushAnim 0.3s ease; border-color: var(--accent-green); box-shadow: 0 0 8px var(--accent-green);}
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes highlightFlash { 0% { transform: scale(1); box-shadow: 0 0 0 transparent;} 50% { transform: scale(1.2); box-shadow: 0 0 10px var(--accent-blue);} 100% { transform: scale(1); box-shadow: 0 0 0 transparent;} }
        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 850px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 850px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }
        .pop-error { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 15px var(--accent-red); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 850px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 850px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }

        .edge-label { font-family: monospace; font-weight: bold; font-size: 12px; text-anchor: middle; dominant-baseline: central; fill: var(--text-main); }
        .edge-bg { fill: var(--bg-surface); stroke: var(--border-main); stroke-width: 1px; rx: 4px; }
        .edge-active .edge-bg { stroke: var(--accent-purple); }
        .edge-active .edge-label { fill: var(--accent-purple); }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="text" id="v-input" class="small-input" placeholder="4">
        <label class="ui-label">flights =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1,100], [1,2,100], [0,2,500]]">
        <label class="ui-label">src =</label>
        <input type="text" id="s-input" class="small-input" placeholder="0">
        <label class="ui-label">dst =</label>
        <input type="text" id="d-input" class="small-input" placeholder="2">
        <label class="ui-label">K =</label>
        <input type="text" id="k-input" class="small-input" placeholder="1">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(3, '[[0,1,100], [1,2,100], [0,2,500]]', 0, 2, 1)">Ex 1</button>
        <button onclick="loadExample(3, '[[0,1,100], [1,2,100], [0,2,500]]', 0, 2, 0)">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">Min Cost Array:</div>
                <div class="tiles-wrapper" id="dist-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Cheapest cost to reach node</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">BFS Queue:</div>
                <div class="tiles-wrapper" id="q-tiles"></div>
                <div style="font-size: 10px; color: var(--text-dim); margin-top: 4px;">Format: [node, cost, stops]</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active City (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Flight (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Stops vs K</span>
            <span class="info-value" id="val-stops" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Cost Condition</span>
            <span class="info-value" id="val-cond" style="color: var(--text-main); font-size:13px;">curr_cost + price < min_cost[v]</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">cheapest price =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:rgba(56,139,253,0.1); border-color:var(--accent-blue); border-width:2px;"></span> Source</div>
        <div class="legend-item"><span class="dot" style="background:rgba(63,185,80,0.1); border-color:var(--accent-green); border-width:2px;"></span> Destination</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Popped Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Flight</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 3;
        let edgesList = [[0,1,100], [1,2,100], [0,2,500]];
        let srcNode = 0;
        let dstNode = 2;
        let K_stops = 1;
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [3000, 1500, 750];
        const INF = Infinity;

        function init() { loadExample(3, '[[0,1,100], [1,2,100], [0,2,500]]', 0, 2, 1); }

        function loadExample(v, eStr, s, d, k) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            document.getElementById('s-input').value = s;
            document.getElementById('d-input').value = d;
            document.getElementById('k-input').value = k;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                srcNode = parseInt(document.getElementById('s-input').value);
                dstNode = parseInt(document.getElementById('d-input').value);
                K_stops = parseInt(document.getElementById('k-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || isNaN(srcNode) || isNaN(dstNode) || isNaN(K_stops) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V, src, dst, K are integers and flights is a valid array of [u, v, price].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 225;
            const cy = 210;
            const radius = 140;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function formatDist(val) { return val === INF ? '∞' : val; }

        function cloneQueue(q) { return q.map(item => ({...item})); }

        function generateSteps() {
            steps = [];
            
            let adj = Array.from({length: V_count}, () => []);
            for (let [u,v,w] of edgesList) {
                adj[u].push({v, w});
            }

            let dist = new Array(V_count).fill(INF);
            let queue = []; // Array of {u, cost, stops}

            dist[srcNode] = 0;
            queue.push({u: srcNode, cost: 0, stops: 0});

            steps.push({
                type: 'init', dist: [...dist], queue: cloneQueue(queue),
                u: null, v: null, w: null, current_cost: null, current_stops: null, updatedIdx: null, pushedItem: null, poppedItem: null,
                panel: `<b>Cheapest Flights Within K Stops</b><br>Using Level-wise BFS to track the minimum cost while strictly limiting the depth to <code>K + 1</code> edges (which is <code>K=${K_stops}</code> intermediate stops).<br>Initialize <code>min_cost[${srcNode}] = 0</code> and push <code>[${srcNode}, 0, 0]</code> to the queue.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. V=${V_count}, Source=${srcNode}, Dest=${dstNode}, Max Stops (K)=${K_stops}.`
            });

            while (queue.length > 0) {
                let curr = queue.shift(); 
                let u = curr.u;
                let cost = curr.cost;
                let stops = curr.stops;

                steps.push({
                    type: 'dequeue', dist: [...dist], queue: cloneQueue(queue),
                    u: u, v: null, w: null, current_cost: cost, current_stops: stops, updatedIdx: null, pushedItem: null, poppedItem: curr,
                    panel: `<b>Pop BFS Queue:</b> Extract state <code>[u=${u}, cost=${cost}, stops=${stops}]</code>.<br>Current accumulated price to reach ${u} is <b>${cost}</b> using <b>${stops}</b> stops.`,
                    statusText: `Processing City ${u}...`,
                    log: `\nPopped state [u=${u}, cost=${cost}, stops=${stops}].`
                });

                if (stops > K_stops) {
                    steps.push({
                        type: 'stops_exceeded', dist: [...dist], queue: cloneQueue(queue),
                        u: u, v: null, w: null, current_cost: cost, current_stops: stops, updatedIdx: null, pushedItem: null, poppedItem: null,
                        panel: `<b style="color:var(--accent-red)">Stops Limit Exceeded!</b><br>Current stops (<b>${stops}</b>) is greater than allowed K (<b>${K_stops}</b>).<br>We cannot explore further from this path. <b style="color:var(--text-dim)">Skip.</b>`,
                        statusText: `Path exceeded K stops. Skipped.`,
                        log: `  -> Exceeded max stops (${stops} > ${K_stops}). Skipped.`,
                        logColor: 'var(--accent-red)'
                    });
                    continue;
                }

                let neighbors = adj[u] || [];
                if (neighbors.length === 0) {
                    steps.push({
                        type: 'no_neighbors', dist: [...dist], queue: cloneQueue(queue),
                        u: u, v: null, w: null, current_cost: cost, current_stops: stops, updatedIdx: null, pushedItem: null, poppedItem: null,
                        panel: `City <b>${u}</b> has no outgoing flights.`,
                        statusText: `No outgoing flights.`,
                        log: `  No outgoing flights from ${u}.`
                    });
                }

                for (let edge of neighbors) {
                    let v = edge.v;
                    let w = edge.w;

                    steps.push({
                        type: 'check', dist: [...dist], queue: cloneQueue(queue),
                        u: u, v: v, w: w, current_cost: cost, current_stops: stops, updatedIdx: null, pushedItem: null, poppedItem: null,
                        panel: `Evaluating flight to City <b>${v}</b> (price: <b>${w}</b>).<br>Is <code>curr_cost (${cost}) + price (${w}) < min_cost[${v}] (${formatDist(dist[v])})</code>?`,
                        statusText: `Evaluating flight ${u}➔${v} (price ${w})...`,
                        log: `  Check flight ${u}->${v}. Price=${w}.`
                    });

                    let next_cost = cost + w;

                    if (next_cost < dist[v]) {
                        dist[v] = next_cost;
                        let pushItem = {u: v, cost: next_cost, stops: stops + 1};
                        queue.push(pushItem);

                        steps.push({
                            type: 'relax', dist: [...dist], queue: cloneQueue(queue),
                            u: u, v: v, w: w, current_cost: cost, current_stops: stops, updatedIdx: v, pushedItem: pushItem, poppedItem: null,
                            panel: `<b style="color:var(--accent-green)">Yes! Cheaper path found.</b><br>Update <code>min_cost[${v}] = ${next_cost}</code>.<br>Push new state <code>[${v}, ${next_cost}, ${stops + 1}]</code> to the BFS queue.`,
                            statusText: `Relaxed cost to City ${v}.`,
                            log: `    -> Relaxed! min_cost[${v}]=${next_cost}. Enqueued [${v}, ${next_cost}, ${stops+1}].`,
                            logColor: 'var(--accent-blue)'
                        });
                    } else {
                        steps.push({
                            type: 'skip_dist', dist: [...dist], queue: cloneQueue(queue),
                            u: u, v: v, w: w, current_cost: cost, current_stops: stops, updatedIdx: null, pushedItem: null, poppedItem: null,
                            panel: `<b style="color:var(--accent-red)">No.</b> <code>${next_cost} >= ${formatDist(dist[v])}</code>.<br>This flight does not offer a cheaper route to ${v}. Skip.`,
                            statusText: `Price suboptimal. Skipped.`,
                            log: `    -> Suboptimal price. Skipped.`
                        });
                    }
                }
            }

            let finalRes = dist[dstNode] === INF ? -1 : dist[dstNode];

            steps.push({
                type: 'final', dist: [...dist], queue: cloneQueue(queue),
                u: null, v: null, w: null, current_cost: null, current_stops: null, updatedIdx: null, pushedItem: null, poppedItem: null,
                panel: finalRes === -1 ? 
                    `<b>BFS Queue is empty!</b><br>Destination <b>${dstNode}</b> was never reached within ${K_stops} stops. Output <b style="color:var(--accent-red)">-1</b>.` :
                    `<b>Algorithm Complete!</b><br>The cheapest price to reach <b>${dstNode}</b> from <b>${srcNode}</b> with at most ${K_stops} stops is <b style="color:var(--accent-green); font-size:18px;">${finalRes}</b>.`,
                complete: true, result: finalRes, isError: finalRes === -1,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Cheapest Price = ${finalRes}`,
                logColor: finalRes === -1 ? 'var(--accent-red)' : 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawn = new Set();

            edgesList.forEach(e => {
                const u = e[0];
                const v = e[1];
                const w = e[2];
                
                let key = `${u}->${v}`;
                if (drawn.has(key)) return;
                drawn.add(key);

                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.u !== null && step.v !== null && step.u === u && step.v === v;

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrinkTarget = nodeRadius + 6; 
                const shrinkSource = nodeRadius + 2; 

                // Handle bidirectional curve
                let hasReverse = edgesList.some(re => re[0]===v && re[1]===u);
                let dStr = "";
                let cx, cy;

                if (hasReverse) {
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const nx = -dy / len;
                    const ny = dx / len;
                    const curveOffset = 20; 
                    cx = midX + nx * curveOffset;
                    cy = midY + ny * curveOffset;
                    
                    const x1 = p1.x + (dx/len)*shrinkSource; 
                    const y1 = p1.y + (dy/len)*shrinkSource;
                    const x2 = p2.x - (dx/len)*shrinkTarget; 
                    const y2 = p2.y - (dy/len)*shrinkTarget;
                    dStr = `M ${x1},${y1} Q ${cx},${cy} ${x2},${y2}`;
                } else {
                    cx = (p1.x + p2.x) / 2;
                    cy = (p1.y + p2.y) / 2;
                    const x1 = p1.x + (dx/len)*shrinkSource; 
                    const y1 = p1.y + (dy/len)*shrinkSource;
                    const x2 = p2.x - (dx/len)*shrinkTarget; 
                    const y2 = p2.y - (dy/len)*shrinkTarget;
                    dStr = `M ${x1},${y1} L ${x2},${y2}`;
                }

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', dStr);
                path.setAttribute('fill', 'transparent');

                if (isChecking) {
                    path.setAttribute('stroke', 'var(--accent-purple)');
                    path.setAttribute('stroke-width', '4');
                    path.setAttribute('marker-end', 'url(#arrow-active)');
                    path.classList.add('line-anim');
                    path.setAttribute('stroke-dasharray', '6');
                    setTimeout(() => svg.appendChild(path), 0);
                } else {
                    path.setAttribute('stroke', 'var(--border-main)');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(path);
                }

                // Add Weight Label
                const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                bg.setAttribute('x', cx - 14);
                bg.setAttribute('y', cy - 9);
                bg.setAttribute('width', 28);
                bg.setAttribute('height', 18);
                bg.setAttribute('class', isChecking ? 'edge-bg edge-active' : 'edge-bg');
                
                const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                txt.setAttribute('x', cx);
                txt.setAttribute('y', cy);
                txt.setAttribute('class', isChecking ? 'edge-label edge-active' : 'edge-label');
                txt.textContent = w;

                if (isChecking) {
                    setTimeout(() => {
                        svg.appendChild(bg);
                        svg.appendChild(txt);
                    }, 0);
                } else {
                    svg.appendChild(bg);
                    svg.appendChild(txt);
                }
            });
        }

        function renderQueue(step) {
            const container = document.getElementById('q-tiles');
            container.innerHTML = '';
            
            if (step.queue.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            if (step.poppedItem && step.type === 'dequeue') {
                const pTile = document.createElement('div');
                pTile.className = `tile q-tile popping`;
                pTile.innerText = `[n${step.poppedItem.u}, c${step.poppedItem.cost}, s${step.poppedItem.stops}]`;
                container.appendChild(pTile);
            }

            step.queue.forEach(item => {
                const tile = document.createElement('div');
                tile.className = 'tile q-tile';
                tile.innerText = `[n${item.u}, c${item.cost}, s${item.stops}]`;
                
                if (step.pushedItem && step.pushedItem.u === item.u && step.pushedItem.cost === item.cost && step.pushedItem.stops === item.stops) {
                    tile.classList.add('pushing');
                }
                container.appendChild(tile);
            });
        }

        function renderArray(containerId, arr, tileClass, stepData) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile ${tileClass}`;
                
                if (stepData.updatedIdx === i) {
                    tile.classList.add('highlight-update');
                }
                
                if (val === Infinity) {
                    tile.innerText = '∞';
                    tile.style.background = '#21262d';
                    tile.style.borderColor = 'var(--border-main)';
                    tile.style.color = 'var(--text-dim)';
                } else {
                    tile.innerText = val;
                }
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                if (i === srcNode) el.classList.add('source');
                if (i === dstNode) el.classList.add('target');
                
                if (step.u === i && !step.complete) el.classList.add('active-u');
                if (step.v === i && !step.complete) el.classList.add('active-v');
            }

            drawEdges(step);
            renderArray('dist-tiles', step.dist, 'dist-tile', step);
            renderQueue(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? `${step.u}` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `${step.v}` : '—';
            
            let stopsStr = '—';
            if (step.current_stops !== null) {
                stopsStr = `${step.current_stops} vs ${K_stops}`;
                if (step.current_stops > K_stops) stopsStr = `<span style="color:var(--accent-red)">${stopsStr} (Exceeded)</span>`;
            }
            document.getElementById('val-stops').innerHTML = stopsStr;

            let eqStr = 'curr_cost + price < min_cost[v]';
            if (step.u !== null && step.v !== null && step.w !== null && step.current_cost !== null) {
                let curr_c = step.current_cost;
                let w = step.w;
                let min_cv = step.dist[step.v] === Infinity ? '∞' : step.dist[step.v];
                eqStr = `${curr_c} + ${w} < ${min_cv}`;
            }
            document.getElementById('val-cond').innerText = eqStr;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.className = step.isError ? 'pop-error' : 'pop';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
