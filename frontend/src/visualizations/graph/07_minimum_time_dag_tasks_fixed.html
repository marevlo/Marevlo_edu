<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Time DAG Tasks - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
            
            --color-queue: #388bfd;
            --color-dp: #3fb950;
            --color-indegree: #e3b341;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 150px; }
        .large-input { width: 250px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 400px;
            height: 380px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node-wrapper {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .node {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 15px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }
        
        .node-dur {
            font-size: 11px;
            color: var(--text-dim);
            font-family: monospace;
            background: var(--bg-page);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border-main);
        }
        
        .node-wrapper.active .node { transform: scale(1.15); box-shadow: 0 0 12px rgba(227,179,65,0.4); border-color: var(--accent-orange); color: var(--accent-orange); }
        .node-wrapper.neighbor .node { border-color: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); color: var(--accent-purple); }
        .node-wrapper.processed .node { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }

        .arrays-col { display: flex; flex-direction: column; gap: 20px; min-width: 300px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 110px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        .tile {
            min-width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile.indegree-tile { border-color: #6e5518; color: var(--color-indegree); background: #2a200a; }
        .tile.dp-tile { border-color: #1a4224; color: var(--color-dp); background: #0a1f12; }
        .tile.queue-tile { border-color: #1a3b6e; color: var(--color-queue); background: #0a172e; }
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; }
        @keyframes highlightFlash { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.5); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); filter: brightness(1); } }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 730px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 730px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 100px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 12px var(--accent-green); font-size: 30px !important;}

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 730px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim {
            stroke-dasharray: 6;
            animation: dash 1s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -12; }
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="text" id="n-input" class="small-input" placeholder="3">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1],[0,2]]">
        <label class="ui-label">durations =</label>
        <input type="text" id="d-input" class="large-input" placeholder="[1,2,3]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(3, '[[0,1],[0,2]]', '[1,2,3]')">Ex 1</button>
        <button onclick="loadExample(4, '[[0,1],[1,2],[0,3]]', '[2,1,3,1]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--color-indegree);">Indegree Array (Dependencies):</div>
                <div class="tiles-wrapper" id="indegree-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--color-queue);">Queue (Ready Tasks):</div>
                <div class="tiles-wrapper" id="queue-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--color-dp);">DP Array (Min Completion Time):</div>
                <div class="tiles-wrapper" id="dp-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Processing (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Updating (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Equation</span>
            <span class="info-value" id="val-eq" style="color: var(--text-main); font-size:13px;">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">minimum total time =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Processing Task</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple)"></span> Dependent Neighbor</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Task Completed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let N = 3;
        let edgesList = [[0,1],[0,2]];
        let durations = [1,2,3];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];

        function init() { loadExample(3, '[[0,1],[0,2]]', '[1,2,3]'); }

        function loadExample(n_val, e_str, d_str) {
            document.getElementById('n-input').value = n_val;
            document.getElementById('e-input').value = e_str;
            document.getElementById('d-input').value = d_str;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                N = parseInt(document.getElementById('n-input').value);
                const eStr = document.getElementById('e-input').value.replace(/'/g, '"');
                const dStr = document.getElementById('d-input').value.replace(/'/g, '"');
                
                edgesList = JSON.parse(eStr);
                durations = JSON.parse(dStr);

                if (durations.length !== N) throw "Durations length must match n";
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure arrays are valid JSON and n matches durations length.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            const cx = 200;
            const cy = 190;
            const radius = 120;

            for (let i = 0; i < N; i++) {
                const angle = (Math.PI * 2 * i) / N - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const wrapper = document.createElement('div');
                wrapper.className = 'node-wrapper';
                wrapper.id = `node-wrap-${i}`;
                wrapper.style.left = `${x}px`;
                wrapper.style.top = `${y}px`;

                const node = document.createElement('div');
                node.className = 'node';
                node.innerText = i;

                const dur = document.createElement('div');
                dur.className = 'node-dur';
                dur.innerText = `w:${durations[i]}`;

                wrapper.appendChild(node);
                wrapper.appendChild(dur);
                container.appendChild(wrapper);
            }
        }

        function generateSteps() {
            steps = [];
            
            let adj = Array.from({length: N}, () => []);
            let indegree = new Array(N).fill(0);
            
            for(let [u, v] of edgesList) {
                adj[u].push(v);
                indegree[v]++;
            }

            let dp = [...durations];
            let queue = [];
            for(let i=0; i<N; i++) {
                if(indegree[i] === 0) queue.push(i);
            }

            steps.push({
                type: 'init', u: null, v: null, updatedNode: null,
                indegree: [...indegree], dp: [...dp], queue: [...queue], processed: [],
                panel: `Initialize Kahn's Algorithm DP.<br>Set <code>DP</code> array to base durations. Enqueue tasks with 0 indegree (no dependencies).`,
                statusText: `Setup complete. Click Play to begin.`,
                log: `Initializing Kahn's BFS DP.\nDurations: [${durations.join(', ')}]\nQueue starts with: [${queue.join(', ')}]`
            });

            let processed = [];
            let maxTotalTime = 0;

            while (queue.length > 0) {
                let u = queue.shift();

                steps.push({
                    type: 'dequeue', u: u, v: null, updatedNode: null,
                    indegree: [...indegree], dp: [...dp], queue: [...queue], processed: [...processed],
                    panel: `<b>Dequeue Task <code>${u}</code></b>.<br>Its minimum completion time is locked at <b>${dp[u]}</b>. Now processing its dependents...`,
                    statusText: `Processing Task ${u}...`,
                    log: `\nDequeued Task ${u}. Current finish time: ${dp[u]}`
                });

                if (adj[u].length === 0) {
                    steps.push({
                        type: 'no_neighbors', u: u, v: null, updatedNode: null,
                        indegree: [...indegree], dp: [...dp], queue: [...queue], processed: [...processed],
                        panel: `Task <code>${u}</code> has no dependent tasks.`,
                        statusText: `No neighbors for Task ${u}.`,
                        log: `  Task ${u} has no dependents.`
                    });
                }

                for (let v of adj[u]) {
                    let oldDp = dp[v];
                    let newVal = Math.max(dp[v], dp[u] + durations[v]);
                    dp[v] = newVal;
                    indegree[v]--;

                    steps.push({
                        type: 'update', u: u, v: v, updatedNode: v,
                        indegree: [...indegree], dp: [...dp], queue: [...queue], processed: [...processed],
                        panel: `Updating dependent Task <code>${v}</code>.<br><code>dp[${v}] = max(${oldDp}, ${dp[u]} + ${durations[v]}) = <b>${newVal}</b></code>.<br>Decremented indegree of <code>${v}</code> to ${indegree[v]}.`,
                        statusText: `Updated DP for Task ${v}.`,
                        log: `  Edge ${u}->${v}: dp[${v}] updated to max(${oldDp}, ${dp[u]}+${durations[v]}) = ${newVal}. Indegree[${v}] is now ${indegree[v]}.`
                    });

                    if (indegree[v] === 0) {
                        queue.push(v);
                        steps.push({
                            type: 'enqueue', u: u, v: v, updatedNode: v,
                            indegree: [...indegree], dp: [...dp], queue: [...queue], processed: [...processed],
                            panel: `Indegree of Task <code>${v}</code> reached 0! All its dependencies are satisfied.<br>Enqueuing Task <code>${v}</code>.`,
                            statusText: `Task ${v} ready. Added to queue.`,
                            log: `  -> Indegree of ${v} is 0. Enqueued ${v}.`
                        });
                    }
                }

                processed.push(u);
                
                steps.push({
                    type: 'processed', u: null, v: null, updatedNode: null,
                    indegree: [...indegree], dp: [...dp], queue: [...queue], processed: [...processed],
                    panel: `Finished resolving dependencies for Task <code>${u}</code>. Marked as complete.`,
                    statusText: `Task ${u} fully processed.`,
                    log: `Finished processing Task ${u}.`
                });
            }

            maxTotalTime = Math.max(...dp);

            steps.push({
                type: 'final', u: null, v: null, updatedNode: null,
                indegree: [...indegree], dp: [...dp], queue: [...queue], processed: [...processed],
                panel: `Queue is empty. DAG traversal complete.<br>The minimum time to finish all tasks is the max value in the DP array: <b style="color:var(--accent-green);">${maxTotalTime}</b>.`,
                complete: true,
                result: maxTotalTime,
                statusText: `Algorithm completed.`,
                log: `\nQueue empty. Traversal complete.\nResult = max(DP) = ${maxTotalTime}`,
                logColor: 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            
            // clear lines, keep defs
            const lines = svg.querySelectorAll('line');
            lines.forEach(l => l.remove());

            const nodeRadius = 20;

            for (let edge of edgesList) {
                const u = edge[0]; const v = edge[1];
                const p1 = nodeCoords[u]; const p2 = nodeCoords[v];
                if(!p1 || !p2) continue;

                let isExploring = (step.u === u && step.v === v);

                // Calculate edge shrinking to not hide arrow under node
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrinkTarget = nodeRadius + 4; 
                const shrinkSource = nodeRadius + 2;
                
                const x1 = p1.x + (dx/len) * shrinkSource;
                const y1 = p1.y + (dy/len) * shrinkSource;
                const x2 = p2.x - (dx/len) * shrinkTarget;
                const y2 = p2.y - (dy/len) * shrinkTarget;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);

                if (isExploring) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '3');
                    line.setAttribute('marker-end', 'url(#arrow-active)');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(line);
                }
            }
        }

        function renderArray(containerId, array, typeClass, updatedIndex) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if (array.length === 0) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }
            array.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile ${typeClass}`;
                tile.innerText = val;
                
                // For queue, index represents nothing specific, just order. For others, it's the node ID.
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = typeClass.includes('queue') ? ` ` : `[${i}]`;
                
                if (updatedIndex === i && !typeClass.includes('queue')) {
                    tile.classList.add('highlight-update');
                }

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<N; i++) {
                const wrap = document.getElementById(`node-wrap-${i}`);
                if(!wrap) continue;
                wrap.className = 'node-wrapper';
                
                if (step.processed.includes(i)) wrap.classList.add('processed');
                if (step.u === i) wrap.classList.add('active');
                if (step.v === i) wrap.classList.add('neighbor');
            }

            drawEdges(step);

            // Render Arrays
            renderArray('indegree-tiles', step.indegree, 'indegree-tile', step.updatedNode);
            renderArray('queue-tiles', step.queue, 'queue-tile', -1);
            renderArray('dp-tiles', step.dp, 'dp-tile', step.updatedNode);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? step.u : '—';
            document.getElementById('val-v').innerText = step.v !== null ? step.v : '—';
            
            if (step.type === 'update') {
                document.getElementById('val-eq').innerHTML = `dp[${step.v}] = max(dp[${step.v}], dp[${step.u}]+${durations[step.v]})`;
            } else {
                document.getElementById('val-eq').innerText = '—';
            }

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) resVal.classList.add('pop');
            else resVal.classList.remove('pop');

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
