<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bipartite Matching &middot; Graph</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:300px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration.fail{border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.06);}
.narration.fail::before{content:'\2717'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}
.narration b.good{color:#bbf7d0;} .narration b.bad{color:#fca5a5;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto; position:relative;}
svg.graph{display:block; width:400px; max-width:100%; height:auto;}
.col-cap{font-family:var(--mono); font-weight:800; font-size:12px; letter-spacing:.05em; text-anchor:middle;}
.col-cap.l{fill:var(--accent-orange);} .col-cap.r{fill:var(--accent-blue);}

.edge{stroke:var(--border-main); stroke-width:2; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.matched{stroke:var(--accent-green); stroke-width:4; filter:drop-shadow(0 0 5px rgba(34,197,94,.55));}
.edge.checking{stroke:var(--accent-purple); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}

.gnode .nc{stroke-width:2; transition:fill .35s, stroke .35s, filter .35s, r .25s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:13px; text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode.lcol .nc{fill:rgba(245,165,36,.06); stroke:var(--accent-orange);} .gnode.lcol .nl{fill:#ffd591;}
.gnode.rcol .nc{fill:rgba(6,182,212,.06); stroke:var(--accent-blue);} .gnode.rcol .nl{fill:#a5f3fc;}
.gnode.matched .nc{fill:rgba(34,197,94,.14); stroke:var(--accent-green); filter:drop-shadow(0 0 6px rgba(34,197,94,.4));} .gnode.matched .nl{fill:#bbf7d0;}
.gnode.activeu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.18); filter:drop-shadow(0 0 13px rgba(245,165,36,.65)); stroke-width:3;} .gnode.activeu .nl{fill:#ffe1a8;}
.gnode.activev .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.18); filter:drop-shadow(0 0 13px rgba(168,85,247,.65)); stroke-width:3;} .gnode.activev .nl{fill:#e9d5ff;}

.side{display:flex; flex-direction:column; gap:12px; min-width:230px; flex:1 1 230px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:4px;}
.panel .hint{font-family:var(--mono); font-size:10.5px; color:var(--text-dim); margin-bottom:9px;}
.panel.m .cap{color:var(--accent-blue);} .panel.v .cap{color:var(--accent-orange);}
.tiles{display:flex; gap:8px; flex-wrap:wrap; align-content:flex-start;}
.tcell{display:flex; flex-direction:column; align-items:center; gap:4px;}
.tcell .idx{font-family:var(--mono); font-size:10px; color:var(--text-dim);}
.tile{min-width:40px; height:38px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.tile.m{border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.12); color:#a5f3fc;}
.tile.m.empty-slot{border-color:var(--border-main); background:rgba(255,255,255,.04); color:var(--text-dim);}
.tile.v.on{border-color:rgba(245,165,36,.5); background:rgba(245,165,36,.14); color:#ffd591;}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-orange);} .pill.n b{color:var(--accent-purple);} .pill.s b{color:var(--accent-green);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>L =</label>
  <input type="text" id="l-input" class="small-input" value="3">
  <label>R =</label>
  <input type="text" id="r-input" class="small-input" value="3">
  <label>edges =</label>
  <input type="text" id="e-input" class="large-input" value="[[0,0],[0,1],[1,1],[2,2]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(3,3,'[[0,0],[0,1],[1,1],[2,2]]')">Ex 1</button>
  <button onclick="loadExample(4,4,'[[0,1],[1,0],[1,1],[2,0],[2,2],[3,2]]')">Ex 2</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Maximum Bipartite Matching <span class="sub">&middot; augmenting paths (Kuhn DFS)</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 400 360"></svg></div>
      <div class="side">
        <div class="panel m">
          <div class="cap">matchR[]</div>
          <div class="hint">L-node assigned to each R-node</div>
          <div class="tiles" id="m-tiles"></div>
        </div>
        <div class="panel v">
          <div class="cap">visited[] (R, this DFS)</div>
          <div class="hint">R-nodes seen on current path</div>
          <div class="tiles" id="v-tiles"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&#8592; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &#8594;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&#8592; &#8594;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">L-node u = <b id="pill-u">&mdash;</b></span>
        <span class="pill n">R-node v = <b id="pill-v">&mdash;</b></span>
        <span class="pill s">matches <b id="pill-cnt">0</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>active L</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>evaluating R</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>matched</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','maxMatching'],['src','(adj, L, R):']],
  [['src','  matchR = [-1]*R;  result = 0']],
  [['kw','  for'],['src',' u '],['kw','in'],['src',' range(L):']],
  [['src','    visited = [false]*R']],
  [['kw','    if'],['src',' dfs(u): result += 1']],
  [['fn','  dfs'],['src','(u):']],
  [['kw','    for'],['src',' v '],['kw','in'],['src',' adj[u]:']],
  [['kw','      if'],['kw',' not'],['src',' visited[v]:']],
  [['src','        visited[v] = true']],
  [['kw','        if'],['src',' matchR[v]==-1 '],['kw','or'],['src',' dfs(matchR[v]):']],
  [['src','          matchR[v] = u;  '],['kw','return'],['src',' true']],
  [['kw','    return'],['src',' false']],
];

let L_count=3, R_count=3, edgesList=[[0,0],[0,1],[1,1],[2,2]];
let adj={}, coord={};
let steps=[], stepIndex=0, timer=null;
const delays=[2200,1100,560];
const gnodes={};
let confettiArmed=true;

function init(){ buildCode(); loadExample(3,3,'[[0,0],[0,1],[1,1],[2,2]]'); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(l,r,eStr){
  document.getElementById('l-input').value=l;
  document.getElementById('r-input').value=r;
  document.getElementById('e-input').value=eStr;
  parseAndGen();
}
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    L_count=parseInt(document.getElementById('l-input').value,10);
    R_count=parseInt(document.getElementById('r-input').value,10);
    edgesList=JSON.parse(document.getElementById('e-input').value.replace(/\(/g,'[').replace(/\)/g,']'));
    if(isNaN(L_count)||isNaN(R_count)||L_count<1||R_count<1||!Array.isArray(edgesList)) throw 'Invalid inputs';
    adj={};
    for(let i=0;i<L_count;i++) adj[i]=[];
    for(const e of edgesList){ if(e[0]>=L_count||e[1]>=R_count||e[0]<0||e[1]<0) throw 'Edge out of bounds'; adj[e[0]].push(e[1]); }
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid format. L and R must be positive integers, edges a valid array of [L_idx, R_idx].'); }
}

function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; coord={}; for(const k in gnodes) delete gnodes[k];
  const NS='http://www.w3.org/2000/svg';
  const lX=110, rX=290, startY=64, span=232;
  const lGap=L_count>1?span/(L_count-1):0, rGap=R_count>1?span/(R_count-1):0;
  for(let i=0;i<L_count;i++) coord['L'+i]={x:lX, y:(L_count>1?startY+i*lGap:startY+span/2)};
  for(let j=0;j<R_count;j++) coord['R'+j]={x:rX, y:(R_count>1?startY+j*rGap:startY+span/2)};

  const capL=document.createElementNS(NS,'text'); capL.setAttribute('class','col-cap l'); capL.setAttribute('x',lX); capL.setAttribute('y',34); capL.textContent='SET L'; svg.appendChild(capL);
  const capR=document.createElementNS(NS,'text'); capR.setAttribute('class','col-cap r'); capR.setAttribute('x',rX); capR.setAttribute('y',34); capR.textContent='SET R'; svg.appendChild(capR);

  const r=21;
  edgesList.forEach((e,i)=>{
    const p1=coord['L'+e[0]], p2=coord['R'+e[1]]; if(!p1||!p2) return;
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1;
    const ln=document.createElementNS(NS,'line'); ln.setAttribute('class','edge'); ln.id='e'+i;
    ln.setAttribute('x1',p1.x+(dx/len)*(r+2)); ln.setAttribute('y1',p1.y+(dy/len)*(r+2));
    ln.setAttribute('x2',p2.x-(dx/len)*(r+2)); ln.setAttribute('y2',p2.y-(dy/len)*(r+2));
    ln.dataset.u=e[0]; ln.dataset.v=e[1]; svg.appendChild(ln);
  });
  for(let i=0;i<L_count;i++) makeNode(svg,'L'+i,'lcol',r);
  for(let j=0;j<R_count;j++) makeNode(svg,'R'+j,'rcol',r);
}
function makeNode(svg,id,col,r){
  const NS='http://www.w3.org/2000/svg'; const p=coord[id];
  const g=document.createElementNS(NS,'g'); g.setAttribute('class','gnode '+col); g.id='gn'+id;
  const c=document.createElementNS(NS,'circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',r);
  const t=document.createElementNS(NS,'text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=id;
  g.appendChild(c); g.appendChild(t); svg.appendChild(g); gnodes[id]=g;
}

function generateSteps(){
  steps=[];
  let matchR=new Array(R_count).fill(-1);
  let matches=0;
  let visited=new Array(R_count).fill(false);
  function snap(o){ steps.push({
    matchR:[...matchR], visited:[...visited], matches,
    u:o.u??null, v:o.v??null, matchPop:o.matchPop??null, visPop:o.visPop??null,
    code:o.code, narr:o.narr, log:o.log, complete:o.complete, fail:o.fail }); }

  snap({code:[0,1],
    narr:`<b>Maximum Bipartite Matching</b> via augmenting paths. Init <code>matchR = [-1]&times;${R_count}</code>, then try to match each L-node with a DFS.`,
    log:`init  L=${L_count}  R=${R_count}  matchR=[${matchR.join(',')}]`});

  for(let u=0;u<L_count;u++){
    visited.fill(false);
    snap({code:[2,3], u,
      narr:`Process <code>L${u}</code> &rarr; clear <code>visited[]</code> and run DFS to find an augmenting path.`,
      log:`-- DFS for L${u}  (visited reset)`});

    function dfs(cu,depth){
      const pad='  '.repeat(depth);
      const nb=adj[cu]||[];
      for(const v of nb){
        snap({code:[6,7], u:cu, v,
          narr:`Edge <code>L${cu} &rarr; R${v}</code>. Is <code>R${v}</code> unvisited on this path?`,
          log:`${pad}check L${cu}-R${v}`});
        if(!visited[v]){
          visited[v]=true;
          snap({code:[8], u:cu, v, visPop:v,
            narr:`<code>R${v}</code> is unvisited &rarr; set <code>visited[${v}]=true</code>. Is it free or reassignable?`,
            log:`${pad}  R${v} unvisited -> mark visited`});
          if(matchR[v]===-1){
            matchR[v]=cu;
            snap({code:[9,10], u:cu, v, matchPop:v,
              narr:`<b class="good">Free!</b> <code>R${v}</code> is unmatched &rarr; augment: <code>matchR[${v}] = L${cu}</code>.`,
              log:`${pad}  R${v} free => matchR[${v}]=L${cu}  (augment)`});
            return true;
          } else {
            const pu=matchR[v];
            snap({code:[9], u:cu, v,
              narr:`<code>R${v}</code> is taken by <code>L${pu}</code>. Recurse: can <code>L${pu}</code> move elsewhere?`,
              log:`${pad}  R${v} held by L${pu} -> recurse dfs(L${pu})`});
            if(dfs(pu,depth+1)){
              matchR[v]=cu;
              snap({code:[10], u:cu, v, matchPop:v,
                narr:`<b class="good">Rerouted!</b> <code>L${pu}</code> moved, so claim <code>matchR[${v}] = L${cu}</code>.`,
                log:`${pad}  L${pu} rerouted => matchR[${v}]=L${cu}`});
              return true;
            } else {
              snap({code:[6], u:cu, v,
                narr:`<b class="bad">No.</b> <code>L${pu}</code> can&rsquo;t move. Backtrack and try another neighbor of <code>L${cu}</code>.`,
                log:`${pad}  L${pu} stuck -> backtrack`});
            }
          }
        } else {
          snap({code:[7], u:cu, v,
            narr:`<code>R${v}</code> is <b class="bad">already visited</b> on this path &rarr; skip (prevents cycles).`,
            log:`${pad}  R${v} visited -> skip`});
        }
      }
      snap({code:[11], u:cu,
        narr:`No neighbor of <code>L${cu}</code> works on this path &rarr; <code>return false</code>.`,
        log:`${pad}L${cu} -> no path (false)`});
      return false;
    }

    if(dfs(u,0)){
      matches++;
      snap({code:[4], u,
        narr:`Augmenting path found for <code>L${u}</code> &rarr; matches = <b class="good">${matches}</b>.`,
        log:`L${u} matched.  total=${matches}`});
    } else {
      snap({code:[4], u,
        narr:`No augmenting path for <code>L${u}</code> &rarr; it stays unmatched. matches = <b>${matches}</b>.`,
        log:`L${u} unmatched.  total=${matches}`});
    }
  }

  const matchedPairs=[];
  matchR.forEach((lu,rv)=>{ if(lu!==-1) matchedPairs.push('L'+lu+'-R'+rv); });
  snap({code:[],
    narr:`All L-nodes processed. <b>Maximum matching size = <b class="good">${matches}</b></b>${matchedPairs.length?` &middot; ${matchedPairs.join(', ')}`:''}.`,
    log:`done. maximum matching = ${matches}`, complete:true, result:matches});
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const matchedR=new Set(); const matchedL=new Set();
  step.matchR.forEach((lu,rv)=>{ if(lu!==-1){ matchedR.add('R'+rv); matchedL.add('L'+lu); } });

  for(let i=0;i<L_count;i++){ const g=gnodes['L'+i]; if(!g) continue;
    g.classList.remove('matched','activeu','activev');
    if(matchedL.has('L'+i)) g.classList.add('matched');
    if(step.u===i) g.classList.add('activeu');
  }
  for(let j=0;j<R_count;j++){ const g=gnodes['R'+j]; if(!g) continue;
    g.classList.remove('matched','activeu','activev');
    if(matchedR.has('R'+j)) g.classList.add('matched');
    if(step.v===j) g.classList.add('activev');
  }

  document.querySelectorAll('.edge').forEach(ln=>{ ln.classList.remove('matched','checking');
    const eu=+ln.dataset.u, ev=+ln.dataset.v;
    const checking = step.u!=null && step.v!=null && step.u===eu && step.v===ev;
    const isMatched = step.matchR[ev]===eu;
    if(isMatched) ln.classList.add('matched'); else if(checking) ln.classList.add('checking');
  });

  fillMatch(step); fillVisited(step);

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done',!!step.complete);
  narr.classList.toggle('fail',!!step.fail);

  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });
  document.getElementById('pill-u').innerHTML=step.u!=null?'L'+step.u:'&mdash;';
  document.getElementById('pill-v').innerHTML=step.v!=null?'R'+step.v:'&mdash;';
  document.getElementById('pill-cnt').textContent=step.matches;
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color='var(--accent-green)'; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fillMatch(step){
  const c=document.getElementById('m-tiles'); c.innerHTML='';
  for(let i=0;i<R_count;i++){
    const cell=document.createElement('div'); cell.className='tcell';
    const t=document.createElement('div'); t.className='tile m';
    const val=step.matchR[i];
    if(val===-1){ t.classList.add('empty-slot'); t.innerHTML='&mdash;'; }
    else { t.textContent='L'+val; }
    if(step.matchPop===i) Motion.pop(t);
    const idx=document.createElement('div'); idx.className='idx'; idx.textContent='R'+i;
    cell.appendChild(t); cell.appendChild(idx); c.appendChild(cell);
  }
}
function fillVisited(step){
  const c=document.getElementById('v-tiles'); c.innerHTML='';
  for(let i=0;i<R_count;i++){
    const cell=document.createElement('div'); cell.className='tcell';
    const on=step.visited[i];
    const t=document.createElement('div'); t.className='tile v'+(on?' on':''); t.textContent=on?'T':'F';
    if(step.visPop===i) Motion.pop(t);
    const idx=document.createElement('div'); idx.className='idx'; idx.textContent='R'+i;
    cell.appendChild(t); cell.appendChild(idx); c.appendChild(cell);
  }
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
