<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Problem (Backtracking/Min Cost) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
        }

        .col-label {
            position: absolute;
            top: 10px;
            font-family: monospace;
            font-weight: bold;
            color: var(--text-dim);
            font-size: 14px;
        }
        .label-l { left: 80px; }
        .label-r { right: 85px; }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 15px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node-l { border-color: var(--accent-orange); color: var(--accent-orange); background: rgba(227, 179, 65, 0.05); }
        .node-r { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(56, 139, 253, 0.05); }
        
        .node.active-worker { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); z-index: 3; }
        .node.active-task { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 12px var(--accent-purple); border-color: var(--accent-purple); color: var(--accent-purple); z-index: 2; }
        .node.assigned { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .node.used { background: #3a0d0d; border-color: var(--accent-red); color: var(--accent-red); opacity: 0.7;}

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 44px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.assign-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.used-tile { background: #3a0d0d; border-color: var(--accent-red); color: var(--accent-red); }
        .tile.used-free { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; filter: brightness(1.5);}

        @keyframes highlightFlash { 0% { transform: scale(1); } 50% { transform: scale(1.2); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); } }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }

        .edge-label { font-family: monospace; font-size: 12px; text-anchor: middle; dominant-baseline: central; fill: var(--text-main); font-weight: bold;}
        .edge-bg { fill: var(--bg-surface); stroke: var(--border-main); stroke-width: 1px; rx: 4px; }
        .edge-active .edge-bg { stroke: var(--accent-purple); }
        .edge-active .edge-label { fill: var(--accent-purple); }
        .edge-assigned .edge-bg { stroke: var(--accent-green); fill: #0f2a1a;}
        .edge-assigned .edge-label { fill: var(--accent-green); }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Cost Matrix =</label>
        <input type="text" id="m-input" class="med-input" placeholder="[[1,2], [3,4]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[[1,2], [3,4]]')">Ex 1</button>
        <button onclick="loadExample('[[2,9,3], [1,5,8], [7,4,6]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <div class="col-label label-l">Workers</div>
            <div class="col-label label-r">Tasks</div>
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">Assignment Array:</div>
                <div class="tiles-wrapper" id="assign-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Task assigned to each worker</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-red);">Used Tasks Array:</div>
                <div class="tiles-wrapper" id="used-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">T = Taken, F = Free</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Worker</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Task</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Cost</span>
            <span class="info-value" id="val-curr" style="color: var(--text-main);">0</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Min Cost Found</span>
            <span class="info-value" id="val-min" style="color: var(--accent-green);">∞</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">optimal minimum cost =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Active Worker</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Task</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Assigned Pair</div>
        <div class="legend-item"><span class="dot" style="background:#3a0d0d; border-color:var(--accent-red)"></span> Task Used/Unavailable</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let costMatrix = [[1,2], [3,4]];
        let N = 2;
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample('[[1,2], [3,4]]'); }

        function loadExample(mStr) {
            document.getElementById('m-input').value = mStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                costMatrix = JSON.parse(document.getElementById('m-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (!Array.isArray(costMatrix) || costMatrix.length === 0 || !Array.isArray(costMatrix[0])) {
                    throw "Invalid inputs";
                }
                N = costMatrix.length;
                for (let i=0; i<N; i++) {
                    if (costMatrix[i].length !== N) throw "Matrix must be square";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure the input is a valid square 2D JSON array.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (N === 0) return;

            let lX = 100, rX = 350;
            let startY = 70;
            let height = 280;

            let spacing = N > 1 ? height / (N - 1) : 0;

            for (let i = 0; i < N; i++) {
                let y = N > 1 ? startY + (i * spacing) : 210;
                nodeCoords[`W${i}`] = {x: lX, y: y};

                const el = document.createElement('div');
                el.className = 'node node-l';
                el.id = `node-W${i}`;
                el.style.left = `${lX}px`;
                el.style.top = `${y}px`;
                el.innerText = `W${i}`;
                container.appendChild(el);
            }

            for (let i = 0; i < N; i++) {
                let y = N > 1 ? startY + (i * spacing) : 210;
                nodeCoords[`T${i}`] = {x: rX, y: y};

                const el = document.createElement('div');
                el.className = 'node node-r';
                el.id = `node-T${i}`;
                el.style.left = `${rX}px`;
                el.style.top = `${y}px`;
                el.innerText = `T${i}`;
                container.appendChild(el);
            }
        }

        function generateSteps() {
            steps = [];
            
            let min_cost = Infinity;
            let best_assignment = [];
            let assignment = new Array(N).fill(-1);
            let used = new Array(N).fill(false);

            steps.push({
                type: 'init', worker: null, task: null, current_cost: 0, min_cost: min_cost,
                assignment: [...assignment], used: [...used], updatedWorker: null, updatedTask: null,
                panel: `<b>Assignment Problem (Backtracking Variation)</b><br>We will find the minimum cost to assign ${N} workers to ${N} tasks.<br>We use DFS Backtracking with pruning. Initial Minimum Cost = $\\infty$.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. N=${N}.`
            });

            function solve(worker, current_cost, depth) {
                let pad = "  ".repeat(depth);

                steps.push({
                    type: 'call', worker, task: null, current_cost, min_cost,
                    assignment: [...assignment], used: [...used], updatedWorker: null, updatedTask: null,
                    panel: `<b>Backtrack Step:</b> Evaluating <b>Worker ${worker}</b>.<br>Current accumulated cost is <b>${current_cost}</b>.`,
                    statusText: `Evaluating Worker ${worker}...`,
                    log: `\n${pad}backtrack(worker=${worker}): Current cost = ${current_cost}.`
                });

                if (worker === N) {
                    if (current_cost < min_cost) {
                        min_cost = current_cost;
                        best_assignment = [...assignment];
                        
                        steps.push({
                            type: 'new_best', worker: null, task: null, current_cost, min_cost,
                            assignment: [...assignment], used: [...used], updatedWorker: null, updatedTask: null,
                            panel: `<b style="color:var(--accent-green); font-size:16px;">New Optimal Assignment Found!</b><br>All workers assigned. Total Cost = <b>${current_cost}</b>, which is strictly less than our previous best.<br>Update <code>min_cost = ${min_cost}</code>.`,
                            statusText: `New minimum cost found: ${min_cost}.`,
                            log: `${pad}=> All assigned! NEW MIN COST: ${min_cost}.`,
                            logColor: 'var(--accent-green)'
                        });
                    } else {
                        steps.push({
                            type: 'leaf', worker: null, task: null, current_cost, min_cost,
                            assignment: [...assignment], used: [...used], updatedWorker: null, updatedTask: null,
                            panel: `All workers assigned, but total cost <b>${current_cost}</b> is $\\ge$ current <code>min_cost</code> (<b>${min_cost}</b>).<br>Discard this assignment.`,
                            statusText: `Sub-optimal complete assignment.`,
                            log: `${pad}=> All assigned. Cost ${current_cost} >= min_cost ${min_cost}. Discarding.`
                        });
                    }
                    return;
                }

                for (let task = 0; task < N; task++) {
                    let cost = costMatrix[worker][task];

                    steps.push({
                        type: 'try', worker, task, current_cost, min_cost,
                        assignment: [...assignment], used: [...used], updatedWorker: null, updatedTask: null,
                        panel: `Worker <b>${worker}</b> tries Task <b>${task}</b> (Cost: <b>${cost}</b>).<br>Checking if Task ${task} is available...`,
                        statusText: `Checking Task ${task} availability...`,
                        log: `${pad}  Worker ${worker} tries Task ${task} (cost=${cost}).`
                    });

                    if (used[task]) {
                        steps.push({
                            type: 'skip_used', worker, task, current_cost, min_cost,
                            assignment: [...assignment], used: [...used], updatedWorker: null, updatedTask: null,
                            panel: `Task <b>${task}</b> is <b style="color:var(--accent-red)">already used</b> by Worker ${assignment.indexOf(task)}.<br>Skip to next available task.`,
                            statusText: `Task ${task} is taken. Skipping.`,
                            log: `${pad}    -> Task ${task} is already used. Skipping.`
                        });
                        continue;
                    }

                    if (current_cost + cost >= min_cost) {
                        steps.push({
                            type: 'prune', worker, task, current_cost, min_cost,
                            assignment: [...assignment], used: [...used], updatedWorker: null, updatedTask: null,
                            panel: `<b style="color:var(--accent-red)">Pruning Branch!</b><br><code>current_cost (${current_cost}) + cost (${cost}) = ${current_cost + cost}</code>, which is $\\ge$ <code>min_cost (${min_cost})</code>.<br>No need to explore this branch further. Skip.`,
                            statusText: `Pruning branch to save time.`,
                            log: `${pad}    -> Pruned! ${current_cost}+${cost} >= ${min_cost}.`,
                            logColor: 'var(--accent-red)'
                        });
                        continue;
                    }

                    // Do
                    used[task] = true;
                    assignment[worker] = task;
                    
                    steps.push({
                        type: 'assign', worker, task, current_cost: current_cost + cost, min_cost,
                        assignment: [...assignment], used: [...used], updatedWorker: worker, updatedTask: task,
                        panel: `Task <b>${task}</b> is available and cost is promising.<br>Temporarily assign <b>Worker ${worker} ➔ Task ${task}</b>.<br>Update <code>current_cost = ${current_cost + cost}</code>. Recursing to next worker...`,
                        statusText: `Assigned W${worker} ➔ T${task}. Recursing...`,
                        log: `${pad}    => Assigned W${worker}->T${task}. New current_cost = ${current_cost + cost}. Recursing...`,
                        logColor: 'var(--accent-blue)'
                    });

                    // Recurse
                    solve(worker + 1, current_cost + cost, depth + 1);

                    // Undo
                    used[task] = false;
                    assignment[worker] = -1;

                    steps.push({
                        type: 'backtrack', worker, task, current_cost, min_cost,
                        assignment: [...assignment], used: [...used], updatedWorker: worker, updatedTask: task,
                        panel: `<b>Backtracking:</b> Return to Worker <b>${worker}</b>.<br>Undo assignment <b>Worker ${worker} ➔ Task ${task}</b> and free up Task ${task}.<br>Restore <code>current_cost = ${current_cost}</code>.`,
                        statusText: `Backtracking from T${task}.`,
                        log: `${pad}  <- Backtracked. Undid W${worker}->T${task}.`
                    });
                }
            }

            solve(0, 0, 0);

            steps.push({
                type: 'final', worker: null, task: null, current_cost: 0, min_cost: min_cost,
                assignment: [...best_assignment], used: new Array(N).fill(true), updatedWorker: null, updatedTask: null,
                panel: `<b>Algorithm Complete!</b><br>The entire state space has been explored (with pruning).<br>Optimal minimum cost is <b style="color:var(--accent-green); font-size:18px;">${min_cost}</b>.`,
                complete: true, result: min_cost,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Minimum Cost = ${min_cost}`,
                logColor: 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            for (let w = 0; w < N; w++) {
                for (let t = 0; t < N; t++) {
                    const p1 = nodeCoords[`W${w}`];
                    const p2 = nodeCoords[`T${t}`];
                    if(!p1 || !p2) continue;

                    let cost = costMatrix[w][t];
                    let isAssigned = step.assignment[w] === t;
                    let isTrying = step.worker === w && step.task === t && (step.type === 'try' || step.type === 'skip_used' || step.type === 'prune');

                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const len = Math.hypot(dx, dy);
                    const shrink = nodeRadius + 2; 
                    
                    const x1 = p1.x + (dx/len)*shrink; 
                    const y1 = p1.y + (dy/len)*shrink;
                    const x2 = p2.x - (dx/len)*shrink; 
                    const y2 = p2.y - (dy/len)*shrink;

                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                    line.setAttribute('x2', x2); line.setAttribute('y2', y2);

                    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

                    if (isAssigned) {
                        line.setAttribute('stroke', 'var(--accent-green)');
                        line.setAttribute('stroke-width', '4');
                        g.classList.add('edge-assigned');
                    } else if (isTrying) {
                        line.setAttribute('stroke', 'var(--accent-purple)');
                        line.setAttribute('stroke-width', '4');
                        line.setAttribute('stroke-dasharray', '6');
                        line.classList.add('line-anim');
                        g.classList.add('edge-active');
                    } else {
                        line.setAttribute('stroke', 'var(--border-main)');
                        line.setAttribute('stroke-width', '1.5');
                        line.setAttribute('opacity', '0.2');
                    }

                    g.appendChild(line);

                    // Only show labels for active, assigned, or small graphs to reduce clutter
                    if (isAssigned || isTrying || N <= 3) {
                        const midX = (x1 + x2) / 2;
                        const midY = (y1 + y2) / 2;
                        
                        const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        bg.setAttribute('x', midX - 12);
                        bg.setAttribute('y', midY - 8);
                        bg.setAttribute('width', 24);
                        bg.setAttribute('height', 16);
                        bg.setAttribute('class', 'edge-bg');
                        
                        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        txt.setAttribute('x', midX);
                        txt.setAttribute('y', midY);
                        txt.setAttribute('class', 'edge-label');
                        if (!isChecking && !isAssigned) txt.setAttribute('fill', 'var(--text-dim)');
                        txt.textContent = cost;

                        g.appendChild(bg);
                        g.appendChild(txt);
                    }

                    if (isTrying || isAssigned) {
                        setTimeout(() => svg.appendChild(g), 0);
                    } else {
                        // Draw background lines first
                        svg.insertBefore(g, svg.firstChild);
                    }
                    
                    let isChecking = isTrying; // local scope fix
                }
            }
        }

        function renderArray(containerId, arr, type, stepData) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                
                if (type === 'assign') {
                    tile.className = `tile assign-tile`;
                    if (stepData.updatedWorker === i) tile.classList.add('highlight-update');
                    tile.innerText = val === -1 ? '—' : `T${val}`;
                    
                    const idxLabel = document.createElement('div');
                    idxLabel.className = 'tile-index';
                    idxLabel.innerText = `[W${i}]`;
                    wrapper.appendChild(tile);
                    wrapper.appendChild(idxLabel);
                } else if (type === 'used') {
                    tile.className = `tile ${val ? 'used-tile' : 'used-free'}`;
                    if (stepData.updatedTask === i) tile.classList.add('highlight-update');
                    tile.innerText = val ? 'T' : 'F';
                    
                    const idxLabel = document.createElement('div');
                    idxLabel.className = 'tile-index';
                    idxLabel.innerText = `[T${i}]`;
                    wrapper.appendChild(tile);
                    wrapper.appendChild(idxLabel);
                }

                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<N; i++) {
                const elW = document.getElementById(`node-W${i}`);
                if(elW) {
                    elW.className = 'node node-l';
                    if (step.assignment[i] !== -1) elW.classList.add('assigned');
                    if (step.worker === i && !step.complete) elW.classList.add('active-worker');
                }
                
                const elT = document.getElementById(`node-T${i}`);
                if(elT) {
                    elT.className = 'node node-r';
                    if (step.used[i]) elT.classList.add('used');
                    if (Object.values(step.assignment).includes(i)) elT.classList.add('assigned');
                    if (step.task === i && !step.complete) elT.classList.add('active-task');
                }
            }

            drawEdges(step);
            
            renderArray('assign-tiles', step.assignment, 'assign', step);
            renderArray('used-tiles', step.used, 'used', step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.worker !== null ? `W${step.worker}` : '—';
            document.getElementById('val-v').innerText = step.task !== null ? `T${step.task}` : '—';
            document.getElementById('val-curr').innerText = step.current_cost;
            document.getElementById('val-min').innerText = step.min_cost === Infinity ? '∞' : step.min_cost;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
