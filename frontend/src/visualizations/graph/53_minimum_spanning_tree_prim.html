<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Spanning Tree (Prim's Algorithm) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 2;
        }
        
        .node.in-mst { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); box-shadow: 0 0 10px rgba(63,185,80,0.3); }
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 4; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 3; color: var(--accent-purple); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 44px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.key-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.parent-tile { background: #1a150b; border-color: var(--accent-orange); color: var(--accent-orange); }
        .tile.mst-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile.mst-false { background: #21262d; border-color: var(--border-main); color: var(--text-dim); }
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; filter: brightness(1.5);}

        @keyframes highlightFlash { 0% { transform: scale(1); } 50% { transform: scale(1.2); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); } }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center; word-break: break-all;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }

        .edge-label { font-family: monospace; font-weight: bold; font-size: 13px; text-anchor: middle; dominant-baseline: central; }
        .edge-bg { fill: var(--bg-surface); stroke: var(--border-main); stroke-width: 1px; rx: 4px; }
        .edge-active .edge-bg { stroke: var(--accent-purple); }
        .edge-active .edge-label { fill: var(--accent-purple); }
        .edge-mst .edge-bg { stroke: var(--accent-green); fill: #0f2a1a;}
        .edge-mst .edge-label { fill: var(--accent-green); }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="4">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1,10],[0,2,6],[0,3,5],[1,3,15],[2,3,4]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(4, '[[0,1,10],[0,2,6],[0,3,5],[1,3,15],[2,3,4]]')">Ex 1</button>
        <button onclick="loadExample(5, '[[0,1,2],[0,3,6],[1,2,3],[1,3,8],[1,4,5],[2,4,7],[3,4,9]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">minEdge (Key) Array:</div>
                <div class="tiles-wrapper" id="key-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Minimum weight edge to connect to MST</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">Parent Array:</div>
                <div class="tiles-wrapper" id="parent-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Node in MST that provides the minEdge</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">inMST Array:</div>
                <div class="tiles-wrapper" id="inmst-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Total MST Weight</span>
            <span class="info-value" id="val-weight" style="color: var(--accent-green);">0</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">minimum spanning tree total weight =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Expanding Node (u)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Edge</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Node in MST</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-green); border-width:3px;"></span> Edge in MST</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 4;
        let edgesList = [[0,1,10],[0,2,6],[0,3,5],[1,3,15],[2,3,4]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];
        const INF = Infinity;

        function init() { loadExample(4, '[[0,1,10],[0,2,6],[0,3,5],[1,3,15],[2,3,4]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is an integer and edges is a valid array of [u, v, w].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 225;
            const cy = 200;
            const radius = 130;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function formatDist(val) { return val === INF ? '∞' : val; }

        function generateSteps() {
            steps = [];
            
            let adj = Array.from({length: V_count}, () => []);
            for (let [u, v, w] of edgesList) {
                adj[u].push({v, w});
                adj[v].push({v: u, w}); // Undirected
            }

            let minEdge = new Array(V_count).fill(INF);
            let parent = new Array(V_count).fill(-1);
            let inMST = new Array(V_count).fill(false);
            let mstEdges = [];
            let totalWeight = 0;

            minEdge[0] = 0;

            steps.push({
                type: 'init', minEdge: [...minEdge], parent: [...parent], inMST: [...inMST], mstEdges: [...mstEdges], totalWeight,
                u: null, v: null, w: null, updatedNode: null,
                panel: `<b>Prim's Minimum Spanning Tree Algorithm</b><br>Initialize all <code>minEdge</code> values to Infinity and <code>inMST</code> to False.<br>We start by setting <code>minEdge[0] = 0</code> to pick node 0 first.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. V=${V_count}. Set minEdge[0] = 0.`
            });

            for (let count = 0; count < V_count; count++) {
                
                // 1. Pick minimum key vertex not yet in MST
                let u = -1;
                let minVal = INF;
                for (let i = 0; i < V_count; i++) {
                    if (!inMST[i] && minEdge[i] < minVal) {
                        minVal = minEdge[i];
                        u = i;
                    }
                }

                if (u === -1) {
                    // Graph is disconnected
                    steps.push({
                        type: 'disconnected', minEdge: [...minEdge], parent: [...parent], inMST: [...inMST], mstEdges: [...mstEdges], totalWeight,
                        u: null, v: null, w: null, updatedNode: null,
                        panel: `<b>Graph Disconnected!</b><br>Cannot find any more reachable vertices. The algorithm halts.`,
                        statusText: `Graph is disconnected.`,
                        log: `Cannot find reachable vertex. Halting.`
                    });
                    break;
                }

                inMST[u] = true;
                
                if (parent[u] !== -1) {
                    mstEdges.push({u: parent[u], v: u, w: minVal});
                    totalWeight += minVal;
                }

                steps.push({
                    type: 'add_mst', minEdge: [...minEdge], parent: [...parent], inMST: [...inMST], mstEdges: [...mstEdges], totalWeight,
                    u: u, v: null, w: null, updatedNode: u,
                    panel: `<b>Find Min & Add to MST:</b> Node <b>${u}</b> has the smallest <code>minEdge</code> (${formatDist(minVal)}) among non-MST nodes.<br>Mark <code>inMST[${u}] = True</code>.` +
                           (parent[u] !== -1 ? ` Add edge <b>${parent[u]} — ${u}</b> to the MST. Total Weight is now <b>${totalWeight}</b>.` : ` (First node, no parent edge).`),
                    statusText: `Added Node ${u} to MST.`,
                    log: `\nAdded ${u} to MST. ` + (parent[u] !== -1 ? `Edge from ${parent[u]}, weight ${minVal}.` : ``)
                });

                // 2. Update minEdge and parent for adjacent vertices
                let neighbors = adj[u] || [];
                
                if (neighbors.length === 0) {
                    steps.push({
                        type: 'no_neighbors', minEdge: [...minEdge], parent: [...parent], inMST: [...inMST], mstEdges: [...mstEdges], totalWeight,
                        u: u, v: null, w: null, updatedNode: null,
                        panel: `Node <b>${u}</b> has no outgoing edges.`,
                        statusText: `No neighbors.`,
                        log: `  Node ${u} has no neighbors.`
                    });
                }

                for (let edge of neighbors) {
                    let v = edge.v;
                    let w = edge.w;

                    steps.push({
                        type: 'check', minEdge: [...minEdge], parent: [...parent], inMST: [...inMST], mstEdges: [...mstEdges], totalWeight,
                        u: u, v: v, w: w, updatedNode: null,
                        panel: `Evaluating edge <b>${u} — ${v}</b> (weight: <b>${w}</b>).<br>Is <b>${v}</b> not in MST, and is <code>${w} < minEdge[${v}]</code>?`,
                        statusText: `Evaluating edge ${u}—${v}...`,
                        log: `  Check neighbor ${v}: weight ${w} < minEdge[${v}] (${formatDist(minEdge[v])})?`
                    });

                    if (inMST[v]) {
                        steps.push({
                            type: 'skip_mst', minEdge: [...minEdge], parent: [...parent], inMST: [...inMST], mstEdges: [...mstEdges], totalWeight,
                            u: u, v: v, w: w, updatedNode: null,
                            panel: `Node <b>${v}</b> is already in the MST. Adding this edge would create a cycle. <b style="color:var(--text-dim)">Skip.</b>`,
                            statusText: `Neighbor ${v} already in MST. Skipped.`,
                            log: `    -> ${v} already in MST. Skipped.`
                        });
                    } else if (w < minEdge[v]) {
                        minEdge[v] = w;
                        parent[v] = u;

                        steps.push({
                            type: 'relax', minEdge: [...minEdge], parent: [...parent], inMST: [...inMST], mstEdges: [...mstEdges], totalWeight,
                            u: u, v: v, w: w, updatedNode: v,
                            panel: `<b style="color:var(--accent-green)">Yes!</b> This edge provides a cheaper connection to the growing MST.<br>Update <code>minEdge[${v}] = ${w}</code> and <code>parent[${v}] = ${u}</code>.`,
                            statusText: `Updated minEdge for ${v}.`,
                            log: `    -> Yes. Updated minEdge[${v}] = ${w}, parent[${v}] = ${u}.`,
                            logColor: 'var(--accent-green)'
                        });
                    } else {
                        steps.push({
                            type: 'skip_weight', minEdge: [...minEdge], parent: [...parent], inMST: [...inMST], mstEdges: [...mstEdges], totalWeight,
                            u: u, v: v, w: w, updatedNode: null,
                            panel: `<b style="color:var(--accent-red)">No.</b> Weight ${w} is greater than or equal to current <code>minEdge[${v}] (${formatDist(minEdge[v])})</code>.<br>We already have a better connection to ${v}. Skip.`,
                            statusText: `No update needed for ${v}.`,
                            log: `    -> No update (${w} >= ${formatDist(minEdge[v])}).`
                        });
                    }
                }
            }

            steps.push({
                type: 'final', minEdge: [...minEdge], parent: [...parent], inMST: [...inMST], mstEdges: [...mstEdges], totalWeight,
                u: null, v: null, w: null, updatedNode: null,
                panel: `<b>Algorithm Complete!</b><br>All vertices have been added to the Minimum Spanning Tree.<br>Total MST Weight is <b style="color:var(--accent-green); font-size:18px;">${totalWeight}</b>.`,
                complete: true, result: totalWeight,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Total MST Weight: ${totalWeight}`,
                logColor: 'var(--accent-blue)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawn = new Set();

            edgesList.forEach(e => {
                const u = e[0], v = e[1], w = e[2];
                let key = u < v ? `${u}-${v}` : `${v}-${u}`;
                if (drawn.has(key)) return;
                drawn.add(key);

                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.u !== null && step.v !== null && 
                                 ((step.u === u && step.v === v) || (step.u === v && step.v === u));

                let isMST = false;
                if (step.mstEdges) {
                    step.mstEdges.forEach(me => {
                        if ((me.u === u && me.v === v) || (me.u === v && me.v === u)) {
                            isMST = true;
                        }
                    });
                }

                // If both nodes are in MST but this edge is not in MST, it's discarded (dashed)
                let bothInMST = step.inMST && step.inMST[u] && step.inMST[v];
                let isDiscarded = bothInMST && !isMST;

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrink = nodeRadius + 2; 
                
                const x1 = p1.x + (dx/len)*shrink; 
                const y1 = p1.y + (dy/len)*shrink;
                const x2 = p2.x - (dx/len)*shrink; 
                const y2 = p2.y - (dy/len)*shrink;

                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                if (isChecking) g.classList.add('edge-active');
                else if (isMST) g.classList.add('edge-mst');

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);

                if (isMST) {
                    line.setAttribute('stroke', 'var(--accent-green)');
                    line.setAttribute('stroke-width', '4');
                } else if (isChecking) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('stroke-dasharray', '8');
                    line.classList.add('line-anim');
                } else if (isDiscarded) {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('stroke-dasharray', '4');
                    line.setAttribute('opacity', '0.4');
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                }

                g.appendChild(line);

                // Add Weight Label
                const midX = (x1 + x2) / 2;
                const midY = (y1 + y2) / 2 - 10;
                
                const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                bg.setAttribute('x', midX - 12);
                bg.setAttribute('y', midY - 8);
                bg.setAttribute('width', 24);
                bg.setAttribute('height', 16);
                bg.setAttribute('class', 'edge-bg');
                
                const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                txt.setAttribute('x', midX);
                txt.setAttribute('y', midY);
                txt.setAttribute('class', 'edge-label');
                if (!isChecking && !isMST) txt.setAttribute('fill', 'var(--text-dim)');
                txt.textContent = w;

                g.appendChild(bg);
                g.appendChild(txt);

                if (isChecking) {
                    setTimeout(() => svg.appendChild(g), 0);
                } else {
                    svg.appendChild(g);
                }
            });
        }

        function renderArray(containerId, arr, tileClass, formatFn, stepData) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            for(let i=0; i<V_count; i++) {
                let val = arr[i];
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                
                // Specific dynamic classes
                if (tileClass === 'inmst-tile') {
                    tile.className = `tile ${val ? 'mst-tile' : 'mst-false'}`;
                    tile.innerText = val ? 'T' : 'F';
                } else {
                    tile.className = `tile ${tileClass}`;
                    if (val === Infinity) {
                        tile.innerText = '∞';
                        tile.style.background = '#21262d';
                        tile.style.borderColor = 'var(--border-main)';
                        tile.style.color = 'var(--text-dim)';
                    } else if (val === -1 && tileClass === 'parent-tile') {
                        tile.innerText = '-1';
                        tile.style.background = '#21262d';
                        tile.style.borderColor = 'var(--border-main)';
                        tile.style.color = 'var(--text-dim)';
                    } else {
                        tile.innerText = formatFn ? formatFn(val) : val;
                    }
                }
                
                if (stepData.updatedNode === i && tileClass !== 'inmst-tile') {
                    tile.classList.add('highlight-update');
                } else if (stepData.updatedNode === i && tileClass === 'inmst-tile' && stepData.type === 'add_mst') {
                    tile.classList.add('highlight-update');
                }
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (step.inMST[i]) el.classList.add('in-mst');
                
                if (step.u === i && !step.complete) el.classList.add('active-u');
                if (step.v === i && !step.complete) el.classList.add('active-v');
            }

            drawEdges(step);

            renderArray('key-tiles', step.minEdge, 'key-tile', v => v, step);
            renderArray('parent-tiles', step.parent, 'parent-tile', v => v, step);
            renderArray('inmst-tiles', step.inMST, 'inmst-tile', null, step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? `${step.u}` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `${step.v}` : '—';
            document.getElementById('val-weight').innerText = step.totalWeight;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
