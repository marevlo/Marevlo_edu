<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reorder Routes to Root (BFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 420px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 2;
        }
        
        .node.root { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(56,139,253,0.4); color: var(--accent-blue); background: rgba(56,139,253,0.1); }
        .node.visited { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 4; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 3; color: var(--accent-purple); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 40px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.vis-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile.q-tile { background: #1a150b; border-color: var(--accent-orange); color: var(--text-main); padding: 0 8px; width: auto; font-size: 13px;}
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; filter: brightness(1.5);}
        .tile.pushing { animation: pushAnim 0.3s ease; border-color: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue);}
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes highlightFlash { 0% { transform: scale(1); } 50% { transform: scale(1.2); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); } }
        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 15px var(--accent-red); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }

    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="text" id="v-input" class="small-input" placeholder="6">
        <label class="ui-label">connections =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1],[1,3],[2,3],[4,0],[4,5]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(6, '[[0,1],[1,3],[2,3],[4,0],[4,5]]')">Ex 1</button>
        <button onclick="loadExample(5, '[[1,0],[1,2],[3,2],[3,4]]')">Ex 2</button>
        <button onclick="loadExample(3, '[[1,0],[2,0]]')">Ex 3</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-checking" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                    <marker id="arrow-valid" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-green)" />
                    </marker>
                    <marker id="arrow-flipped" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-red)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-red); display:flex; justify-content:space-between;">
                    <span>Total Flips Needed:</span>
                </div>
                <div style="font-size: 28px; font-weight: bold; color: var(--accent-red); text-align: center; font-family: monospace;" id="flip-counter">0</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">Visited Array:</div>
                <div class="tiles-wrapper" id="vis-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Nodes reachable from 0</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">BFS Queue:</div>
                <div class="tiles-wrapper" id="q-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Edge Original Direction</span>
            <span class="info-value" id="val-dir" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">minimum edge flips =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:rgba(56,139,253,0.1); border-color:var(--accent-blue); border-width:2px;"></span> Capital (0)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Popped Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-green); border-width:3px;"></span> Edge Correct (Towards 0)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-red); border-width:3px; border-style:dashed;"></span> Edge Flipped (Away from 0)</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let N_count = 6;
        let edgesList = [[0,1],[1,3],[2,3],[4,0],[4,5]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample(6, '[[0,1],[1,3],[2,3],[4,0],[4,5]]'); }

        function loadExample(n, eStr) {
            document.getElementById('v-input').value = n;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                N_count = parseInt(document.getElementById('v-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(N_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure n is an integer and connections is a valid array of [u, v].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (N_count === 0) return;

            const cx = 225;
            const cy = 210;
            const radius = 140;

            // Place node 0 in the center
            nodeCoords[0] = {x: cx, y: cy};
            
            // Place other nodes around it
            let otherNodesCount = N_count - 1;
            for (let i = 1; i < N_count; i++) {
                const angle = ((i - 1) * 2 * Math.PI) / otherNodesCount - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};
            }

            for (let i = 0; i < N_count; i++) {
                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${nodeCoords[i].x}px`;
                node.style.top = `${nodeCoords[i].y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let adj = Array.from({length: N_count}, () => []);
            for (let [u, v] of edgesList) {
                adj[u].push({v: v, orig: true});   // Original edge: u -> v
                adj[v].push({v: u, orig: false});  // Artificial reverse: v -> u
            }

            let visited = new Array(N_count).fill(false);
            let queue = [0];
            visited[0] = true;
            let flips = 0;
            let edgeStates = {}; 

            steps.push({
                type: 'init', queue: [...queue], visited: [...visited], flips: flips, edgeStates: {...edgeStates},
                u: null, v: null, origDir: null, poppedItem: null, pushedItem: null, updatedNode: null,
                panel: `<b>Reorder Routes to Make All Paths Lead to the City Zero</b><br>We want every node to have a path leading to <b>0</b>. We can traverse the tree starting from 0 using BFS.<br>If we traverse an edge in its original direction (away from 0), we must flip it. Initialize BFS from node 0.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. N=${N_count}. Graph is treated as undirected.`
            });

            while (queue.length > 0) {
                let u = queue.shift();

                steps.push({
                    type: 'dequeue', queue: [...queue], visited: [...visited], flips: flips, edgeStates: {...edgeStates},
                    u: u, v: null, origDir: null, poppedItem: u, pushedItem: null, updatedNode: null,
                    panel: `<b>Dequeue:</b> Active Node is <b>${u}</b>.<br>Checking all connected neighbors...`,
                    statusText: `Processing Node ${u}...`,
                    log: `\nDequeue Node ${u}.`
                });

                let neighbors = adj[u] || [];
                if (neighbors.length === 0) {
                    steps.push({
                        type: 'no_neighbors', queue: [...queue], visited: [...visited], flips: flips, edgeStates: {...edgeStates},
                        u: u, v: null, origDir: null, poppedItem: null, pushedItem: null, updatedNode: null,
                        panel: `Node <b>${u}</b> has no connected edges.`,
                        statusText: `No neighbors.`,
                        log: `  Node ${u} has no neighbors.`
                    });
                }

                for (let edge of neighbors) {
                    let v = edge.v;
                    let orig = edge.orig;
                    let origU = orig ? u : v;
                    let origV = orig ? v : u;
                    let eKey = `${origU}-${origV}`;

                    if (!visited[v]) {
                        
                        let tempStates = {...edgeStates};
                        tempStates[eKey] = 'checking';

                        steps.push({
                            type: 'check', queue: [...queue], visited: [...visited], flips: flips, edgeStates: tempStates,
                            u: u, v: v, origDir: `${origU} ➔ ${origV}`, poppedItem: null, pushedItem: null, updatedNode: null,
                            panel: `Evaluating connection between <b>${u}</b> and <b>${v}</b>.<br>Original edge direction: <b>${origU} ➔ ${origV}</b>.`,
                            statusText: `Evaluating edge between ${u} and ${v}...`,
                            log: `  Check connection ${u} - ${v}. Original is ${origU} -> ${origV}.`
                        });

                        if (orig) {
                            flips++;
                            edgeStates[eKey] = 'flipped';
                            
                            steps.push({
                                type: 'flip', queue: [...queue], visited: [...visited], flips: flips, edgeStates: {...edgeStates},
                                u: u, v: v, origDir: `${origU} ➔ ${origV}`, poppedItem: null, pushedItem: null, updatedNode: null,
                                panel: `Edge is <b>${u} ➔ ${v}</b>. It points <b style="color:var(--accent-red)">AWAY</b> from city 0.<br>We must reverse it! Increment flips to <b>${flips}</b>.`,
                                statusText: `Edge points away. Flipped!`,
                                log: `    -> Edge ${u} -> ${v} points away. Flipped! Total flips = ${flips}.`,
                                logColor: 'var(--accent-red)'
                            });
                        } else {
                            edgeStates[eKey] = 'valid';
                            
                            steps.push({
                                type: 'valid', queue: [...queue], visited: [...visited], flips: flips, edgeStates: {...edgeStates},
                                u: u, v: v, origDir: `${origU} ➔ ${origV}`, poppedItem: null, pushedItem: null, updatedNode: null,
                                panel: `Edge is <b>${v} ➔ ${u}</b>. It already points <b style="color:var(--accent-green)">TOWARDS</b> city 0.<br>No flip needed.`,
                                statusText: `Edge points towards 0. Valid.`,
                                log: `    -> Edge ${v} -> ${u} is towards 0. Valid.`,
                                logColor: 'var(--accent-green)'
                            });
                        }

                        visited[v] = true;
                        queue.push(v);

                        steps.push({
                            type: 'enqueue', queue: [...queue], visited: [...visited], flips: flips, edgeStates: {...edgeStates},
                            u: u, v: v, origDir: null, poppedItem: null, pushedItem: v, updatedNode: v,
                            panel: `Mark Node <b>${v}</b> as visited and push it to the BFS Queue.`,
                            statusText: `Enqueued Node ${v}.`,
                            log: `      -> Visited ${v} and enqueued.`
                        });

                    } else {
                        steps.push({
                            type: 'skip', queue: [...queue], visited: [...visited], flips: flips, edgeStates: {...edgeStates},
                            u: u, v: v, origDir: null, poppedItem: null, pushedItem: null, updatedNode: null,
                            panel: `Node <b>${v}</b> is already visited. <b style="color:var(--text-dim)">Skip.</b>`,
                            statusText: `Skipped visited node ${v}.`,
                            log: `  -> Node ${v} already visited. Skipped.`
                        });
                    }
                }
            }

            steps.push({
                type: 'final', queue: [...queue], visited: [...visited], flips: flips, edgeStates: {...edgeStates},
                u: null, v: null, origDir: null, poppedItem: null, pushedItem: null, updatedNode: null,
                panel: `<b>Algorithm Complete!</b><br>All cities are now reachable by city 0 via traversing backwards.<br>Total number of edge flips required is <b style="color:var(--accent-red); font-size:18px;">${flips}</b>.`,
                complete: true, result: flips,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Minimum Flips = ${flips}`,
                logColor: 'var(--accent-blue)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            edgesList.forEach(e => {
                const origU = e[0];
                const origV = e[1];
                let eKey = `${origU}-${origV}`;
                let state = step.edgeStates[eKey];
                
                const p1 = nodeCoords[origU];
                const p2 = nodeCoords[origV];
                if(!p1 || !p2) return;

                // Adjust arrow logic based on state
                let startNode = p1;
                let endNode = p2;
                let isChecking = state === 'checking';
                let isFlipped = state === 'flipped';
                let isValid = state === 'valid';

                if (isFlipped) {
                    // Visually flip the arrow direction
                    startNode = p2;
                    endNode = p1;
                }

                const dx = endNode.x - startNode.x;
                const dy = endNode.y - startNode.y;
                const len = Math.hypot(dx, dy);
                const shrinkTarget = nodeRadius + 6; 
                const shrinkSource = nodeRadius + 2; 
                
                const x1 = startNode.x + (dx/len)*shrinkSource; 
                const y1 = startNode.y + (dy/len)*shrinkSource;
                const x2 = endNode.x - (dx/len)*shrinkTarget; 
                const y2 = endNode.y - (dy/len)*shrinkTarget;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); 
                line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); 
                line.setAttribute('y2', y2);

                if (isChecking) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('marker-end', 'url(#arrow-checking)');
                    line.classList.add('line-anim');
                    line.setAttribute('stroke-dasharray', '8');
                    setTimeout(() => svg.appendChild(line), 0);
                } else if (isValid) {
                    line.setAttribute('stroke', 'var(--accent-green)');
                    line.setAttribute('stroke-width', '3');
                    line.setAttribute('marker-end', 'url(#arrow-valid)');
                    svg.appendChild(line);
                } else if (isFlipped) {
                    line.setAttribute('stroke', 'var(--accent-red)');
                    line.setAttribute('stroke-width', '3');
                    line.setAttribute('marker-end', 'url(#arrow-flipped)');
                    line.setAttribute('stroke-dasharray', '4');
                    svg.appendChild(line);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(line);
                }
            });
        }

        function renderQueue(step) {
            const container = document.getElementById('q-tiles');
            container.innerHTML = '';
            
            if (step.queue.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            if (step.poppedItem !== null && step.type === 'dequeue') {
                const popTile = document.createElement('div');
                popTile.className = `tile q-tile popping`;
                popTile.innerText = step.poppedItem;
                container.appendChild(popTile);
            }

            step.queue.forEach(val => {
                const tile = document.createElement('div');
                tile.className = `tile q-tile`;
                if (step.pushedItem === val) {
                    tile.classList.add('pushing');
                }
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderArray(containerId, arr, tileClass, stepData) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile ${tileClass}`;
                
                if (stepData.updatedNode === i && tileClass === 'vis-tile') {
                    tile.classList.add('highlight-update');
                }
                
                tile.innerText = val ? 'T' : 'F';
                
                if (!val) {
                    tile.style.background = '#21262d';
                    tile.style.borderColor = 'var(--border-main)';
                    tile.style.color = 'var(--text-dim)';
                }
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<N_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                if (i === 0) el.classList.add('root');
                
                if (step.visited[i] && i !== 0) el.classList.add('visited');
                
                if (step.u === i && !step.complete) el.classList.add('active-u');
                if (step.v === i && !step.complete) el.classList.add('active-v');
            }

            drawEdges(step);
            renderArray('vis-tiles', step.visited, 'vis-tile', step);
            renderQueue(step);
            
            document.getElementById('flip-counter').innerText = step.flips;

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? `${step.u}` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `${step.v}` : '—';
            document.getElementById('val-dir').innerText = step.origDir !== null ? step.origDir : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
