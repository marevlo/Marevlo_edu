<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Cut from Max Flow (Ford-Fulkerson) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 300px; font-family: monospace; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 550px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.source-node { border-color: var(--accent-blue); color: var(--accent-blue); box-shadow: 0 0 10px rgba(56,139,253,0.3); }
        .node.sink-node { border-color: var(--accent-orange); color: var(--accent-orange); box-shadow: 0 0 10px rgba(227,179,65,0.3); }
        .node.active { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-purple); border-color: var(--accent-purple); z-index: 3; }
        .node.reachable { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); box-shadow: 0 0 10px rgba(63,185,80,0.4); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 100px;}
        
        .stats-row { display: flex; justify-content: space-between; font-family: monospace; font-size: 14px; margin-bottom: 4px; border-bottom: 1px solid var(--border-main); padding-bottom: 4px;}
        .stats-val { font-weight: bold; color: var(--text-main); }
        
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        .tile {
            min-width: 40px; height: 32px; display: flex; align-items: center; justify-content: center; padding: 0 8px;
            border-radius: 6px; font-size: 14px; font-weight: bold; font-family: 'Courier New', monospace;
            background: #21262d; border: 1px solid var(--border-main); color: var(--text-main);
        }
        .tile.reachable-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 15px var(--accent-red); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 8; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -16; } }

        .edge-label { font-family: monospace; font-weight: bold; font-size: 13px; text-anchor: middle; dominant-baseline: central; }
        .edge-bg { fill: var(--bg-surface); stroke: var(--border-main); stroke-width: 1px; rx: 4px; }
        .edge-active .edge-bg { stroke: var(--accent-purple); }
        .edge-active .edge-label { fill: var(--accent-purple); }
        .edge-cut .edge-bg { stroke: var(--accent-red); fill: #3a0d0d; }
        .edge-cut .edge-label { fill: var(--accent-red); }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="4">
        <label class="ui-label">source =</label>
        <input type="text" id="s-input" class="small-input" placeholder="0">
        <label class="ui-label">sink =</label>
        <input type="text" id="t-input" class="small-input" placeholder="3">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1,3], [0,2,2], [1,2,1], [1,3,4], [2,3,5]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(4, 0, 3, '[[0,1,3], [0,2,2], [1,2,1], [1,3,4], [2,3,5]]')">Ex 1</button>
        <button onclick="loadExample(3, 0, 2, '[[0,1,5], [1,2,3]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--text-dim)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                    <marker id="arrow-cut" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-red)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange); text-align:center;">Network Statistics</div>
                <div class="stats-row"><span>Augmented Path Bottleneck:</span> <span class="stats-val" id="stat-bot">0</span></div>
                <div class="stats-row"><span>Total Max Flow:</span> <span class="stats-val" id="stat-flow" style="color:var(--accent-blue)">0</span></div>
                <div class="stats-row" style="border:none;"><span>Min Cut Capacity:</span> <span class="stats-val" id="stat-cut" style="color:var(--accent-red)">0</span></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">Set S (Reachable from Source):</div>
                <div class="tiles-wrapper" id="set-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Augmenting Path</span>
            <span class="info-value" id="val-path" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Residual Edge Evaluated</span>
            <span class="info-value" id="val-edge" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Cut Edges Identified</span>
            <span class="info-value" id="val-cutedges" style="color: var(--accent-red); font-size:12px;">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">minimum cut capacity =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-input); border-color:var(--accent-blue); border-width:2px;"></span> Source (S)</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-input); border-color:var(--accent-orange); border-width:2px;"></span> Sink (T)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Augmenting DFS Path</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Reachable Node (Set S)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-red); border-width:2px;"></span> Min-Cut Edge</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 4;
        let sourceNode = 0;
        let sinkNode = 3;
        let originalEdges = [[0,1,3], [0,2,2], [1,2,1], [1,3,4], [2,3,5]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample(4, 0, 3, '[[0,1,3], [0,2,2], [1,2,1], [1,3,4], [2,3,5]]'); }

        function loadExample(v, src, snk, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('s-input').value = src;
            document.getElementById('t-input').value = snk;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                sourceNode = parseInt(document.getElementById('s-input').value);
                sinkNode = parseInt(document.getElementById('t-input').value);
                originalEdges = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || isNaN(sourceNode) || isNaN(sinkNode) || !Array.isArray(originalEdges)) {
                    throw "Invalid Inputs";
                }

                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V, source, sink are integers, and edges is a valid array of [u, v, cap].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            // Simple hierarchical layout based on BFS distance from source
            let levels = new Array(V_count).fill(-1);
            levels[sourceNode] = 0;
            let q = [sourceNode];
            let adj = Array.from({length: V_count}, () => []);
            for (let e of originalEdges) adj[e[0]].push(e[1]);

            while(q.length > 0) {
                let u = q.shift();
                for (let v of adj[u]) {
                    if (levels[v] === -1) {
                        levels[v] = levels[u] + 1;
                        q.push(v);
                    }
                }
            }
            
            // Assign disconnected nodes to a far level
            let maxLvl = Math.max(...levels);
            for(let i=0; i<V_count; i++) {
                if (levels[i] === -1) { maxLvl++; levels[i] = maxLvl; }
            }
            if (levels[sinkNode] !== maxLvl) {
                // Ensure sink is at the far right
                levels[sinkNode] = Math.max(...levels) + 1;
            }

            let lvlGroups = {};
            for(let i=0; i<V_count; i++) {
                let l = levels[i];
                if(!lvlGroups[l]) lvlGroups[l] = [];
                lvlGroups[l].push(i);
            }

            let maxLevelFound = Math.max(...Object.keys(lvlGroups).map(Number));
            let width = 550;
            let height = 400;
            let xSpacing = width / (maxLevelFound + 2);

            for(let l in lvlGroups) {
                let nodesInLvl = lvlGroups[l];
                let ySpacing = height / (nodesInLvl.length + 1);
                nodesInLvl.forEach((nId, idx) => {
                    let x = xSpacing * (parseInt(l) + 1);
                    let y = ySpacing * (idx + 1);
                    nodeCoords[nId] = {x, y};

                    const el = document.createElement('div');
                    el.className = 'node';
                    if (nId === sourceNode) el.classList.add('source-node');
                    if (nId === sinkNode) el.classList.add('sink-node');
                    el.id = `node-${nId}`;
                    el.style.left = `${x}px`;
                    el.style.top = `${y}px`;
                    el.innerText = nId;
                    container.appendChild(el);
                });
            }
        }

        function cloneEdges(edgesArr) {
            return edgesArr.map(e => ({...e}));
        }

        function generateSteps() {
            steps = [];
            
            // Internal structure: originalEdges mapped to objects {u, v, cap, flow, id}
            let graphEdges = originalEdges.map((e, idx) => ({ u: e[0], v: e[1], cap: e[2], flow: 0, id: idx }));
            let maxFlow = 0;

            steps.push({
                type: 'init', edges: cloneEdges(graphEdges), maxFlow: maxFlow,
                activePath: null, bottleneck: null, reachable: [], cutEdges: [],
                panel: `<b>Ford-Fulkerson (DFS)</b><br>Initialize the flow network. The capacity of the minimum cut equals the maximum flow from Source (<b>${sourceNode}</b>) to Sink (<b>${sinkNode}</b>).`,
                statusText: `Initialization complete.`,
                log: `Network initialized. Source=${sourceNode}, Sink=${sinkNode}.`
            });

            while(true) {
                let parent = new Array(V_count).fill(null);
                let visited = new Array(V_count).fill(false);
                
                // Simple DFS to find an augmenting path
                function dfs(u) {
                    if (u === sinkNode) return true;
                    visited[u] = true;
                    
                    for (let e of graphEdges) {
                        // Forward edge with capacity
                        if (e.u === u && !visited[e.v] && e.cap - e.flow > 0) {
                            parent[e.v] = { e: e, dir: 1, from: u };
                            if (dfs(e.v)) return true;
                        }
                        // Backward edge with flow to cancel
                        if (e.v === u && !visited[e.u] && e.flow > 0) {
                            parent[e.u] = { e: e, dir: -1, from: u };
                            if (dfs(e.u)) return true;
                        }
                    }
                    return false;
                }

                let found = dfs(sourceNode);
                if (!found) break;

                // Reconstruct path
                let curr = sinkNode;
                let bottleneck = Infinity;
                let pathEdgeRefs = [];
                let pathNodes = [sinkNode];

                while(curr !== sourceNode) {
                    let p = parent[curr];
                    if (p.dir === 1) bottleneck = Math.min(bottleneck, p.e.cap - p.e.flow);
                    else bottleneck = Math.min(bottleneck, p.e.flow);
                    
                    pathEdgeRefs.unshift(p);
                    curr = p.from;
                    pathNodes.unshift(curr);
                }

                let activePathIds = pathEdgeRefs.map(p => p.e.id);

                steps.push({
                    type: 'path_found', edges: cloneEdges(graphEdges), maxFlow: maxFlow,
                    activePath: activePathIds, pathNodes: pathNodes, bottleneck: bottleneck, reachable: [], cutEdges: [],
                    panel: `<b>DFS Found Augmenting Path:</b> [${pathNodes.join(' ➔ ')}].<br>The minimum residual capacity along this path is <b style="color:var(--accent-orange)">${bottleneck}</b>.`,
                    statusText: `Augmenting path found!`,
                    log: `\nFound path: ${pathNodes.join(' -> ')}. Bottleneck: ${bottleneck}`
                });

                // Augment Flow
                for (let p of pathEdgeRefs) {
                    if (p.dir === 1) p.e.flow += bottleneck;
                    else p.e.flow -= bottleneck;
                }
                maxFlow += bottleneck;

                steps.push({
                    type: 'augment', edges: cloneEdges(graphEdges), maxFlow: maxFlow,
                    activePath: activePathIds, pathNodes: pathNodes, bottleneck: bottleneck, reachable: [], cutEdges: [],
                    panel: `Pushed <b>${bottleneck}</b> flow through the path. Updated residual capacities (shown as <code>Flow/Cap</code>).<br>Current Total Max Flow is now <b style="color:var(--accent-blue)">${maxFlow}</b>.`,
                    statusText: `Flow augmented by ${bottleneck}.`,
                    log: `Augmented flow. Current Max Flow: ${maxFlow}`
                });
            }

            steps.push({
                type: 'max_flow_reached', edges: cloneEdges(graphEdges), maxFlow: maxFlow,
                activePath: null, pathNodes: [], bottleneck: null, reachable: [], cutEdges: [],
                panel: `No more augmenting paths found. <b>Maximum Flow is ${maxFlow}</b>.<br>Now, perform a final DFS from Source to find all nodes reachable via positive residual capacity.`,
                statusText: `Max flow finalized. Searching for Min Cut...`,
                log: `\nNo more paths. Max Flow = ${maxFlow}. Starting Min-Cut DFS.`
            });

            // Min-Cut DFS
            let reachable = new Set([sourceNode]);
            let q = [sourceNode];
            while(q.length > 0) {
                let u = q.shift();
                for (let e of graphEdges) {
                    if (e.u === u && !reachable.has(e.v) && e.cap - e.flow > 0) {
                        reachable.add(e.v);
                        q.push(e.v);
                    }
                    if (e.v === u && !reachable.has(e.u) && e.flow > 0) {
                        reachable.add(e.u);
                        q.push(e.u);
                    }
                }
            }

            let sSet = Array.from(reachable).sort((a,b) => a-b);
            
            steps.push({
                type: 's_set', edges: cloneEdges(graphEdges), maxFlow: maxFlow,
                activePath: null, pathNodes: [], bottleneck: null, reachable: sSet, cutEdges: [],
                panel: `Nodes reachable from Source in the residual graph form <b>Set S</b>: [${sSet.join(', ')}].<br>Nodes not reachable form <b>Set T</b>.`,
                statusText: `Set S identified.`,
                log: `Reachable nodes (Set S) = [${sSet.join(', ')}]`
            });

            // Identify Cut Edges
            let cutEdges = [];
            let cutCap = 0;
            for (let e of graphEdges) {
                if (reachable.has(e.u) && !reachable.has(e.v)) {
                    cutEdges.push(e);
                    cutCap += e.cap;
                }
            }
            
            let cutEdgeIds = cutEdges.map(e => e.id);
            let cutEdgeStrs = cutEdges.map(e => `(${e.u}➔${e.v})`);

            steps.push({
                type: 'final', edges: cloneEdges(graphEdges), maxFlow: maxFlow,
                activePath: null, pathNodes: [], bottleneck: null, reachable: sSet, cutEdges: cutEdgeIds, cutEdgeStrs: cutEdgeStrs,
                panel: `<b>Min Cut Found!</b><br>Edges crossing from Set S to Set T define the minimum cut. Their combined capacity is exactly equal to the Max Flow (<b style="color:var(--accent-red); font-size:16px;">${cutCap}</b>).`,
                complete: true, result: cutCap,
                statusText: `Algorithm Complete.`,
                log: `Cut edges identified: ${cutEdgeStrs.join(', ')}. Cut Capacity = ${cutCap}.`,
                logColor: 'var(--accent-red)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            step.edges.forEach(e => {
                const p1 = nodeCoords[e.u];
                const p2 = nodeCoords[e.v];
                if(!p1 || !p2) return;

                let isActive = step.activePath && step.activePath.includes(e.id);
                let isCut = step.cutEdges && step.cutEdges.includes(e.id);

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                
                const shrinkTarget = nodeRadius + 5; 
                const shrinkSource = nodeRadius + 2; 
                
                const x1 = p1.x + (dx/len) * shrinkSource;
                const y1 = p1.y + (dy/len) * shrinkSource;
                const x2 = p2.x - (dx/len) * shrinkTarget;
                const y2 = p2.y - (dy/len) * shrinkTarget;

                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                if (isActive) g.classList.add('edge-active');
                if (isCut) g.classList.add('edge-cut');

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);

                if (isCut) {
                    line.setAttribute('stroke', 'var(--accent-red)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('marker-end', 'url(#arrow-cut)');
                } else if (isActive) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('marker-end', 'url(#arrow-active)');
                    line.classList.add('line-anim');
                } else {
                    line.setAttribute('stroke', 'var(--text-dim)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('marker-end', 'url(#arrow-normal)');
                }

                g.appendChild(line);

                // Add Text Label
                const midX = (x1 + x2) / 2;
                const midY = (y1 + y2) / 2 - 10;
                
                let textStr = `${e.flow}/${e.cap}`;

                const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                bg.setAttribute('x', midX - 16);
                bg.setAttribute('y', midY - 8);
                bg.setAttribute('width', 32);
                bg.setAttribute('height', 16);
                bg.setAttribute('class', 'edge-bg');
                
                const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                txt.setAttribute('x', midX);
                txt.setAttribute('y', midY);
                txt.setAttribute('class', 'edge-label');
                if (!isActive && !isCut) txt.setAttribute('fill', 'var(--text-dim)');
                txt.textContent = textStr;

                g.appendChild(bg);
                g.appendChild(txt);

                if (isActive || isCut) {
                    setTimeout(() => svg.appendChild(g), 0);
                } else {
                    svg.appendChild(g);
                }
            });
        }

        function renderSet(reachableArr) {
            const container = document.getElementById('set-tiles');
            container.innerHTML = '';
            
            if (reachableArr.length === 0) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:4px;">{ Evaluating... }</span>';
                return;
            }

            reachableArr.forEach(val => {
                const tile = document.createElement('div');
                tile.className = `tile reachable-tile`;
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                if (i === sourceNode) el.classList.add('source-node');
                if (i === sinkNode) el.classList.add('sink-node');
                
                if (step.pathNodes && step.pathNodes.includes(i)) {
                    el.classList.add('active');
                }
                
                if (step.reachable && step.reachable.includes(i)) {
                    el.classList.add('reachable');
                }
            }

            drawEdges(step);
            renderSet(step.reachable || []);

            // Update Stats
            document.getElementById('stat-bot').innerText = step.bottleneck !== null ? step.bottleneck : '0';
            document.getElementById('stat-flow').innerText = step.maxFlow;
            document.getElementById('stat-cut').innerText = step.complete ? step.result : '—';

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-path').innerText = (step.pathNodes && step.pathNodes.length > 0) ? `[${step.pathNodes.join('➔')}]` : '—';
            document.getElementById('val-edge').innerText = step.activePath !== null ? 'Updating Flow' : '—';
            document.getElementById('val-cutedges').innerText = (step.cutEdgeStrs && step.cutEdgeStrs.length > 0) ? step.cutEdgeStrs.join(', ') : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
