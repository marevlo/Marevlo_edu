<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Path Exists (Union-Find) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
            
            --color-parent: #388bfd;
            --color-rank: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        #g-input { width: 300px; }
        .small-input { width: 60px; text-align: center; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 400px;
            height: 320px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 14px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.active { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 12px rgba(255,255,255,0.3); z-index: 2; border-color: var(--accent-orange); }
        .node.start-node { border-color: var(--accent-green); }
        .node.target-node { border-color: var(--accent-red); }

        .arrays-col { display: flex; flex-direction: column; gap: 20px; min-width: 250px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 100px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        .tile {
            min-width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 14px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile.parent-tile { background: #0d213f; border-color: var(--color-parent); color: var(--color-parent); }
        .tile.rank-tile { background: #1a0f2e; border-color: var(--color-rank); color: var(--color-rank); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 700px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 100px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 18px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-red); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim {
            stroke-dasharray: 6;
            animation: dash 1s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -12; }
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">graph =</label>
        <input type="text" id="g-input" placeholder='{"0":[1,2], "1":[0,3], "2":[0], "3":[1]}'>
        <label class="ui-label">start =</label>
        <input type="text" id="s-input" class="small-input" placeholder="0">
        <label class="ui-label">target =</label>
        <input type="text" id="t-input" class="small-input" placeholder="3">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample({'0':[1,2], '1':[0,3], '2':[0], '3':[1]}, 0, 3)">Ex 1</button>
        <button onclick="loadExample({'0':[1], '1':[0,2], '2':[1]}, 0, 2)">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label">Parent Array (root pointers):</div>
                <div class="tiles-wrapper" id="parent-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label">Rank Array (tree heights):</div>
                <div class="tiles-wrapper" id="rank-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Edge (u, v)</span>
            <span class="info-value" id="val-edge" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">find(u) -> rootU</span>
            <span class="info-value" id="val-rootU" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">find(v) -> rootV</span>
            <span class="info-value" id="val-rootV" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">path exists? =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border:2px solid var(--accent-green)"></span> Start</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border:2px solid var(--accent-red)"></span> Target</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border:2px solid var(--accent-orange)"></span> Active Node</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple)"></span> Processing Edge</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Unioned Edge</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let graph = {"0":[1,2], "1":[0,3], "2":[0], "3":[1]};
        let startNode = 0;
        let targetNode = 3;
        let nodeCoords = {};
        let uniqueNodes = [];
        let allEdges = [];
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample({"0":[1,2], "1":[0,3], "2":[0], "3":[1]}, 0, 3); }

        function loadExample(newGraph, start, target) {
            graph = newGraph;
            startNode = parseInt(start);
            targetNode = parseInt(target);
            document.getElementById('g-input').value = JSON.stringify(graph);
            document.getElementById('s-input').value = startNode;
            document.getElementById('t-input').value = targetNode;
            setupGraph();
            generateSteps();
            reset();
        }

        function loadCustom() {
            const gStr = document.getElementById('g-input').value;
            startNode = parseInt(document.getElementById('s-input').value.trim());
            targetNode = parseInt(document.getElementById('t-input').value.trim());
            try {
                let fixedStr = gStr.replace(/'/g, '"');
                const parsed = JSON.parse(fixedStr);
                
                let normalizedGraph = {};
                for(let k in parsed) {
                    normalizedGraph[parseInt(k)] = parsed[k].map(v => parseInt(v));
                }
                
                graph = normalizedGraph;
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid JSON format for graph.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            let nodeSet = new Set(Object.keys(graph).map(k => parseInt(k)));
            for(let k in graph) graph[k].forEach(v => nodeSet.add(parseInt(v)));
            
            uniqueNodes = Array.from(nodeSet).sort((a,b) => a-b);
            const n = uniqueNodes.length;

            const cx = 200;
            const cy = 160;
            const radius = 110;

            for (let i = 0; i < n; i++) {
                const nodeId = uniqueNodes[i];
                const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[nodeId] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${nodeId}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = nodeId;
                
                container.appendChild(node);
            }

            // Extract unique undirected edges
            allEdges = [];
            let drawnEdges = new Set();
            for (let u in graph) {
                let numU = parseInt(u);
                for (let v of graph[u]) {
                    let numV = parseInt(v);
                    let edgeKey = numU < numV ? `${numU}-${numV}` : `${numV}-${numU}`;
                    if (!drawnEdges.has(edgeKey)) {
                        drawnEdges.add(edgeKey);
                        allEdges.push([numU, numV]);
                    }
                }
            }
        }

        function generateSteps() {
            steps = [];
            const maxNodeId = uniqueNodes.length > 0 ? Math.max(...uniqueNodes) : 0;
            let parentArr = Array.from({length: maxNodeId + 1}, (_, i) => i);
            let rankArr = new Array(maxNodeId + 1).fill(0);
            
            let unionedEdgesList = []; // Track successfully unioned edges

            function findRoot(i, parent) {
                if (parent[i] !== i) {
                    parent[i] = findRoot(parent[i], parent); // Path compression
                }
                return parent[i];
            }

            steps.push({
                type: 'init',
                u: null, v: null, activeEdge: null, rootU: null, rootV: null,
                parent: [...parentArr], rank: [...rankArr], unionedEdges: [...unionedEdgesList],
                panel: `Initialize <b>Union-Find</b>.<br>Set each node as its own parent, and all ranks to 0.`,
                statusText: `Nodes mapped. Click Play to begin Edge Processing.`,
                log: `Starting Union-Find (Disjoint Set) pre-processing.\nStart Node: ${startNode}, Target Node: ${targetNode}`
            });

            for (let edge of allEdges) {
                let u = edge[0];
                let v = edge[1];

                steps.push({
                    type: 'process',
                    u: u, v: v, activeEdge: [u, v], rootU: null, rootV: null,
                    parent: [...parentArr], rank: [...rankArr], unionedEdges: [...unionedEdgesList],
                    panel: `Processing edge (<code>${u}</code>, <code>${v}</code>).<br>Finding the root representative for both nodes.`,
                    statusText: `Processing edge (${u}, ${v})...`,
                    log: `\nProcessing edge (${u}, ${v})`
                });

                let rootU = findRoot(u, parentArr);
                let rootV = findRoot(v, parentArr);

                steps.push({
                    type: 'find',
                    u: u, v: v, activeEdge: [u, v], rootU: rootU, rootV: rootV,
                    parent: [...parentArr], rank: [...rankArr], unionedEdges: [...unionedEdgesList],
                    panel: `Root of <code>${u}</code> is <code>${rootU}</code>. Root of <code>${v}</code> is <code>${rootV}</code>.`,
                    statusText: `Found roots: ${rootU} and ${rootV}.`,
                    log: `  find(${u}) -> ${rootU}, find(${v}) -> ${rootV}`
                });

                if (rootU !== rootV) {
                    let logStr = '';
                    if (rankArr[rootU] < rankArr[rootV]) {
                        parentArr[rootU] = rootV;
                        logStr = `  rank[${rootU}] < rank[${rootV}]. Attached ${rootU} under ${rootV}.`;
                    } else if (rankArr[rootU] > rankArr[rootV]) {
                        parentArr[rootV] = rootU;
                        logStr = `  rank[${rootU}] > rank[${rootV}]. Attached ${rootV} under ${rootU}.`;
                    } else {
                        parentArr[rootV] = rootU;
                        rankArr[rootU]++;
                        logStr = `  Ranks equal. Attached ${rootV} under ${rootU}. Increased rank of ${rootU}.`;
                    }
                    
                    unionedEdgesList.push([u, v]);

                    steps.push({
                        type: 'union',
                        u: u, v: v, activeEdge: [u, v], rootU: rootU, rootV: rootV,
                        parent: [...parentArr], rank: [...rankArr], unionedEdges: [...unionedEdgesList],
                        panel: `Roots differ. <b>Union</b> operation performed.<br>Merged the sets containing <code>${u}</code> and <code>${v}</code>.`,
                        statusText: `Unioned sets of ${u} and ${v}.`,
                        log: logStr
                    });
                } else {
                    steps.push({
                        type: 'cycle',
                        u: u, v: v, activeEdge: [u, v], rootU: rootU, rootV: rootV,
                        parent: [...parentArr], rank: [...rankArr], unionedEdges: [...unionedEdgesList],
                        panel: `Nodes <code>${u}</code> and <code>${v}</code> share the same root (<code>${rootU}</code>).<br>They are already in the same connected component.`,
                        statusText: `Nodes already connected. Skipping...`,
                        log: `  Roots are same. Nodes already connected.`
                    });
                }
            }

            // Final Query
            steps.push({
                type: 'query_start',
                u: startNode, v: targetNode, activeEdge: null, rootU: null, rootV: null,
                parent: [...parentArr], rank: [...rankArr], unionedEdges: [...unionedEdgesList],
                panel: `Graph pre-processing complete.<br>Now querying if a path exists between Start <code>${startNode}</code> and Target <code>${targetNode}</code>.`,
                statusText: `Checking find(${startNode}) == find(${targetNode})...`,
                log: `\nPreprocessing done. Executing query: path exists between ${startNode} and ${targetNode}?`
            });

            let finalRootStart = findRoot(startNode, parentArr);
            let finalRootTarget = findRoot(targetNode, parentArr);
            let pathExists = (finalRootStart === finalRootTarget);

            steps.push({
                type: 'final',
                u: startNode, v: targetNode, activeEdge: null, rootU: finalRootStart, rootV: finalRootTarget,
                parent: [...parentArr], rank: [...rankArr], unionedEdges: [...unionedEdgesList],
                panel: pathExists ? 
                    `<code>find(${startNode}) == find(${targetNode})</code> is <span style="color:var(--accent-green)">True</span>.<br>Both belong to the same set. Path exists!` : 
                    `<code>find(${startNode}) == find(${targetNode})</code> is <span style="color:var(--accent-red)">False</span>.<br>They belong to different sets. No path exists.`,
                complete: true,
                result: pathExists ? 'True' : 'False',
                isSuccess: pathExists,
                statusText: `Algorithm completed.`,
                log: `  find(${startNode}) -> ${finalRootStart}\n  find(${targetNode}) -> ${finalRootTarget}\nFinal Result: Path Exists = ${pathExists}`,
                logColor: pathExists ? 'var(--accent-green)' : 'var(--accent-red)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            
            // Draw all base edges
            for (let edge of allEdges) {
                const u = edge[0];
                const v = edge[1];
                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) continue;
                
                let isUnioned = step.unionedEdges && step.unionedEdges.some(e => (e[0]===u && e[1]===v) || (e[0]===v && e[1]===u));
                let isActive = step.activeEdge && ((step.activeEdge[0] === u && step.activeEdge[1] === v) || (step.activeEdge[0] === v && step.activeEdge[1] === u));

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', p1.x);
                line.setAttribute('y1', p1.y);
                line.setAttribute('x2', p2.x);
                line.setAttribute('y2', p2.y);

                if (isActive) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '3');
                    line.classList.add('line-anim');
                } else if (isUnioned) {
                    line.setAttribute('stroke', 'var(--accent-blue)');
                    line.setAttribute('stroke-width', '2.5');
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '1.5');
                }
                
                if (isActive) {
                    setTimeout(() => svg.appendChild(line), 0); 
                } else {
                    svg.appendChild(line);
                }
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            const nodes = document.querySelectorAll('.node');
            nodes.forEach(node => {
                const idStr = node.id.replace('node-', '');
                const id = parseInt(idStr);
                node.className = 'node'; 
                
                if (id === startNode) node.classList.add('start-node');
                if (id === targetNode) node.classList.add('target-node');
                
                if (step.u === id || step.v === id) node.classList.add('active');
            });

            drawEdges(step);

            // Render Parent Array
            const pContainer = document.getElementById('parent-tiles');
            pContainer.innerHTML = '';
            uniqueNodes.forEach(nodeId => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = 'tile parent-tile';
                tile.innerText = step.parent[nodeId];
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${nodeId}]`;
                
                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                pContainer.appendChild(wrapper);
            });

            // Render Rank Array
            const rContainer = document.getElementById('rank-tiles');
            rContainer.innerHTML = '';
            uniqueNodes.forEach(nodeId => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = 'tile rank-tile';
                tile.innerText = step.rank[nodeId];
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${nodeId}]`;
                
                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                rContainer.appendChild(wrapper);
            });

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            let edgeStr = (step.u !== null && step.v !== null && !step.complete && step.type !== 'query_start') ? `(${step.u}, ${step.v})` : '—';
            document.getElementById('val-edge').innerText = edgeStr;
            document.getElementById('val-rootU').innerText = step.rootU !== null ? step.rootU : '—';
            document.getElementById('val-rootV').innerText = step.rootV !== null ? step.rootV : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            
            if (step.complete) {
                resVal.className = step.isSuccess ? 'pop' : 'pop-false';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
