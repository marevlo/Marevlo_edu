<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Bipartite Graph (BFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
            
            /* Coloring Scheme */
            --color-unassigned: #21262d;
            --color-0: rgba(56, 139, 253, 0.2);
            --color-0-border: var(--accent-blue);
            --color-1: rgba(227, 179, 65, 0.2);
            --color-1-border: var(--accent-orange);
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: var(--color-unassigned); border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.color-0 { background: var(--color-0); border-color: var(--color-0-border); color: var(--color-0-border); box-shadow: 0 0 10px rgba(56,139,253,0.3); }
        .node.color-1 { background: var(--color-1); border-color: var(--color-1-border); color: var(--color-1-border); box-shadow: 0 0 10px rgba(227,179,65,0.3); }
        
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); z-index: 3; box-shadow: 0 0 15px currentColor;}
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); z-index: 2; border-color: var(--accent-purple); box-shadow: 0 0 12px var(--accent-purple);}
        .node.conflict { background: #3a0d0d; border-color: var(--accent-red); color: var(--accent-red); animation: shake 0.4s infinite; z-index: 4;}

        @keyframes shake {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-53%, -50%) rotate(-5deg); }
            50% { transform: translate(-50%, -50%) rotate(0deg); }
            75% { transform: translate(-47%, -50%) rotate(5deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: var(--color-unassigned); border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.color-0 { background: #0d213f; border-color: var(--color-0-border); color: var(--color-0-border); }
        .tile.color-1 { background: #2a200a; border-color: var(--color-1-border); color: var(--color-1-border); }
        .tile.q-tile { background: #1f1f1f; border-color: var(--border-main); color: var(--text-main); height: 36px; min-width: 36px;}
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; }
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes highlightFlash { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.5); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); filter: brightness(1); } }
        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center; word-break: break-all;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 15px var(--accent-red); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1.1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">graph (adjacency list) =</label>
        <input type="text" id="g-input" class="med-input" placeholder="[[1,3],[0,2],[1,3],[0,2]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[[1,3],[0,2],[1,3],[0,2]]')">Ex 1 (True)</button>
        <button onclick="loadExample('[[1,2],[0,2],[0,1]]')">Ex 2 (False)</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--text-main);">Colors Array:</div>
                <div class="tiles-wrapper" id="color-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">-1: Uncolored, 0: Blue, 1: Orange</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--text-main);">BFS Queue:</div>
                <div class="tiles-wrapper" id="q-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Nodes to process</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Color Assignment</span>
            <span class="info-value" id="val-color" style="color: var(--text-main); font-size:13px;">1 - color[u]</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">is graph bipartite? =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--color-0); border-color:var(--color-0-border)"></span> Color 0</div>
        <div class="legend-item"><span class="dot" style="background:var(--color-1); border-color:var(--color-1-border)"></span> Color 1</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--text-main); border-width:2px;"></span> Active Node (u)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Neighbor Check</div>
        <div class="legend-item"><span class="dot" style="background:#3a0d0d; border-color:var(--accent-red)"></span> Conflict / Cycle Detected</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let graph = [[1,3],[0,2],[1,3],[0,2]];
        let V_count = 4;
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample('[[1,3],[0,2],[1,3],[0,2]]'); }

        function loadExample(gStr) {
            document.getElementById('g-input').value = gStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                let inputVal = document.getElementById('g-input').value.replace(/\(/g, '[').replace(/\)/g, ']');
                graph = JSON.parse(inputVal);
                
                if (!Array.isArray(graph)) {
                    throw "Invalid inputs";
                }
                V_count = graph.length;
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure graph is a valid 2D array representing an adjacency list.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            const cx = 225;
            const cy = 200;
            const radius = 140;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let colors = new Array(V_count).fill(-1);
            let queue = [];
            let hasConflict = false;
            let conflictEdge = null;

            steps.push({
                type: 'init', colors: [...colors], queue: [...queue],
                u: null, v: null, updatedColor: null, pushed: null, popped: null, conflictEdge: null,
                panel: `<b>Check Bipartite (BFS Coloring)</b><br>A graph is bipartite if we can color all nodes using 2 colors such that no adjacent nodes have the same color.<br>Initialize <code>colors</code> array with -1.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. V = ${V_count}. Colors array set to -1.`
            });

            for (let i = 0; i < V_count; i++) {
                if (colors[i] === -1) {
                    steps.push({
                        type: 'new_comp', colors: [...colors], queue: [...queue],
                        u: i, v: null, updatedColor: null, pushed: null, popped: null, conflictEdge: null,
                        panel: `Node <b>${i}</b> is unvisited (part of a new disconnected component).<br>We will start a BFS traversal from here.`,
                        statusText: `Found uncolored component starting at ${i}.`,
                        log: `\nNode ${i} is uncolored. Starting new BFS component.`
                    });

                    colors[i] = 0;
                    queue.push(i);

                    steps.push({
                        type: 'color_start', colors: [...colors], queue: [...queue],
                        u: i, v: null, updatedColor: i, pushed: i, popped: null, conflictEdge: null,
                        panel: `Assign <b>Color 0</b> to Node <b>${i}</b> and enqueue it to begin BFS.`,
                        statusText: `Colored Node ${i} with 0.`,
                        log: `  -> Assigned color 0 to node ${i} and enqueued.`
                    });

                    while(queue.length > 0) {
                        let u = queue.shift();
                        
                        steps.push({
                            type: 'dequeue', colors: [...colors], queue: [...queue],
                            u: u, v: null, updatedColor: null, pushed: null, popped: u, conflictEdge: null,
                            panel: `<b>Dequeue Node <code>${u}</code></b> (Color: <b>${colors[u]}</b>).<br>We will now check all its neighbors and assign them the opposite color (<code>1 - ${colors[u]}</code>).`,
                            statusText: `Processing Node ${u}...`,
                            log: `\nDequeue node ${u} (Color ${colors[u]}).`
                        });

                        let neighbors = graph[u] || [];

                        for (let v of neighbors) {
                            steps.push({
                                type: 'check', colors: [...colors], queue: [...queue],
                                u: u, v: v, updatedColor: null, pushed: null, popped: null, conflictEdge: null,
                                panel: `Evaluating edge <b>${u} — ${v}</b>.`,
                                statusText: `Checking neighbor ${v}...`,
                                log: `  Checking neighbor ${v}...`
                            });

                            if (colors[v] === -1) {
                                colors[v] = 1 - colors[u];
                                queue.push(v);
                                
                                steps.push({
                                    type: 'color', colors: [...colors], queue: [...queue],
                                    u: u, v: v, updatedColor: v, pushed: v, popped: null, conflictEdge: null,
                                    panel: `Neighbor <b>${v}</b> is uncolored.<br>Assign it the opposite color: <code>1 - ${colors[u]} = <b>${colors[v]}</b></code> and enqueue it.`,
                                    statusText: `Colored Node ${v} with ${colors[v]}.`,
                                    log: `    -> Uncolored. Assigned color ${colors[v]}. Enqueued.`
                                });
                            } else if (colors[v] === colors[u]) {
                                hasConflict = true;
                                conflictEdge = [u, v];
                                
                                steps.push({
                                    type: 'conflict', colors: [...colors], queue: [...queue],
                                    u: u, v: v, updatedColor: null, pushed: null, popped: null, conflictEdge: conflictEdge,
                                    panel: `<b style="color:var(--accent-red); font-size:16px;">Conflict Detected!</b><br>Neighbor <b>${v}</b> is already colored with the <b>SAME</b> color (<b>${colors[v]}</b>) as <b>${u}</b>.<br>This means there's an odd-length cycle. The graph is NOT bipartite.`,
                                    statusText: `Conflict at edge ${u}-${v}! Halting.`,
                                    log: `    -> CONFLICT! ${v} has the same color (${colors[v]}) as ${u}.`,
                                    logColor: 'var(--accent-red)'
                                });
                                break;
                            } else {
                                steps.push({
                                    type: 'safe', colors: [...colors], queue: [...queue],
                                    u: u, v: v, updatedColor: null, pushed: null, popped: null, conflictEdge: null,
                                    panel: `Neighbor <b>${v}</b> is already assigned the opposite color (<b>${colors[v]}</b>).<br>This edge is valid. Skip.`,
                                    statusText: `Valid edge ${u}-${v}.`,
                                    log: `    -> Already has opposite color (${colors[v]}). Safe.`
                                });
                            }
                        }
                        if (hasConflict) break;
                    }
                }
                if (hasConflict) break;
            }

            steps.push({
                type: 'final', colors: [...colors], queue: [...queue],
                u: null, v: null, updatedColor: null, pushed: null, popped: null, conflictEdge: conflictEdge,
                panel: hasConflict ? 
                       `<b>Algorithm Terminated.</b><br>A coloring conflict was found. The graph cannot be divided into two independent sets.` :
                       `<b>Algorithm Complete!</b><br>All nodes successfully colored without any conflicts. The graph is bipartite.`,
                complete: true, isBipartite: !hasConflict, result: !hasConflict ? 'True' : 'False',
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Result: ${!hasConflict}`,
                logColor: hasConflict ? 'var(--accent-red)' : 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;
            let drawn = new Set();

            for (let u = 0; u < V_count; u++) {
                let neighbors = graph[u] || [];
                for (let v of neighbors) {
                    let key = u < v ? `${u}-${v}` : `${v}-${u}`;
                    if (drawn.has(key)) continue;
                    drawn.add(key);

                    const p1 = nodeCoords[u];
                    const p2 = nodeCoords[v];
                    if(!p1 || !p2) continue;

                    let isChecking = step.u !== null && step.v !== null && 
                                     ((step.u === u && step.v === v) || (step.u === v && step.v === u));

                    let isConflict = step.conflictEdge && 
                                     ((step.conflictEdge[0] === u && step.conflictEdge[1] === v) || 
                                      (step.conflictEdge[0] === v && step.conflictEdge[1] === u));

                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const len = Math.hypot(dx, dy);
                    const shrink = nodeRadius + 2; 
                    
                    line.setAttribute('x1', p1.x + (dx/len)*shrink); 
                    line.setAttribute('y1', p1.y + (dy/len)*shrink);
                    line.setAttribute('x2', p2.x - (dx/len)*shrink); 
                    line.setAttribute('y2', p2.y - (dy/len)*shrink);

                    if (isConflict) {
                        line.setAttribute('stroke', 'var(--accent-red)');
                        line.setAttribute('stroke-width', '4');
                        line.setAttribute('stroke-dasharray', '8');
                        line.classList.add('line-anim');
                        setTimeout(() => svg.appendChild(line), 0);
                    } else if (isChecking) {
                        line.setAttribute('stroke', 'var(--accent-purple)');
                        line.setAttribute('stroke-width', '4');
                        line.setAttribute('stroke-dasharray', '6');
                        line.classList.add('line-anim');
                        setTimeout(() => svg.appendChild(line), 0);
                    } else {
                        line.setAttribute('stroke', 'var(--border-main)');
                        line.setAttribute('stroke-width', '2');
                        svg.appendChild(line);
                    }
                }
            }
        }

        function renderQueue(step) {
            const container = document.getElementById('q-tiles');
            container.innerHTML = '';
            
            if (step.queue.length === 0 && step.popped === null) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            if (step.popped !== null && step.type === 'dequeue') {
                const popTile = document.createElement('div');
                popTile.className = `tile q-tile popping`;
                popTile.innerText = step.popped;
                container.appendChild(popTile);
            }

            step.queue.forEach(val => {
                const tile = document.createElement('div');
                tile.className = `tile q-tile`;
                if (step.pushed === val) {
                    tile.classList.add('pushing');
                }
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderColors(step) {
            const container = document.getElementById('color-tiles');
            container.innerHTML = '';

            step.colors.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile`;
                
                if (val === 0) tile.classList.add('color-0');
                else if (val === 1) tile.classList.add('color-1');
                
                if (step.updatedColor === i) {
                    tile.classList.add('highlight-update');
                }
                tile.innerText = val;
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                let col = step.colors[i];
                if (col === 0) el.classList.add('color-0');
                if (col === 1) el.classList.add('color-1');
                
                if (step.u === i) el.classList.add('active-u');
                if (step.v === i) el.classList.add('active-v');
                
                if (step.conflictEdge && (step.conflictEdge[0] === i || step.conflictEdge[1] === i)) {
                    el.classList.add('conflict');
                }
            }

            drawEdges(step);
            renderQueue(step);
            renderColors(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? `${step.u}` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `${step.v}` : '—';
            
            let colorEq = '1 - color[u]';
            if (step.u !== null && step.colors[step.u] !== -1) {
                colorEq = `1 - ${step.colors[step.u]} = ${1 - step.colors[step.u]}`;
            }
            document.getElementById('val-color').innerText = colorEq;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.className = step.isBipartite ? 'pop' : 'pop-false';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
