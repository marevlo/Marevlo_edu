<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Eulerian Graph &middot; Degrees + Connectivity</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:300px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration.fail{border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.06);}
.narration.fail::before{content:'\2715'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto;}
svg.graph{display:block; width:400px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2.5; transition:stroke .35s, stroke-width .35s, opacity .35s; stroke-linecap:round;}
.edge.traversing{stroke:var(--accent-purple); stroke-width:4; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.edge.tree{stroke:var(--accent-green); stroke-width:3; opacity:.85;}
.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode.visited .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.10); filter:drop-shadow(0 0 5px rgba(34,197,94,.35));}
.gnode.visited .nl{fill:#bbf7d0;}
.gnode.odd .nc{stroke:var(--accent-red); stroke-width:3; filter:drop-shadow(0 0 7px rgba(248,81,73,.45));}
.gnode.odd .nl{fill:#fca5a5;}
.gnode.activeu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.gnode.activeu .nl{fill:#ffd591;}
.gnode.activev .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 12px rgba(168,85,247,.6)); stroke-width:3;}
.gnode.activev .nl{fill:#e9d5ff;}
.deg-badge{font-family:var(--mono); font-weight:800; font-size:11px; text-anchor:middle; dominant-baseline:central; fill:var(--text-dim); transition:fill .35s;}
.deg-badge.odd{fill:#fca5a5;} .deg-badge.even{fill:#86efac;}

.side{display:flex; flex-direction:column; gap:12px; min-width:230px; flex:1 1 230px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel.d .cap{color:var(--accent-blue);} .panel.q .cap{color:var(--accent-orange);} .panel.v .cap{color:var(--accent-green);}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start;}
.dwrap{display:flex; flex-direction:column; align-items:center; gap:3px;}
.didx{font-family:var(--mono); font-size:10px; color:var(--text-dim);}
.tile{min-width:34px; height:34px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1), background .3s, border-color .3s, color .3s;}
.tile.d{border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.12); color:#a5f3fc;}
.tile.deven{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.1); color:#bbf7d0;}
.tile.dodd{border-color:rgba(248,81,73,.45); background:rgba(248,81,73,.12); color:#fca5a5;}
.tile.q{border-color:rgba(245,165,36,.45); background:rgba(245,165,36,.12); color:#ffd591;}
.tiles .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.o b{color:var(--accent-red);} .pill.c b{color:var(--accent-purple);} .pill.t b{color:var(--accent-green);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>V =</label>
  <input type="text" id="v-input" class="small-input" value="5">
  <label>edges (undirected) =</label>
  <input type="text" id="e-input" class="large-input" value="[[0,1],[1,2],[2,3],[3,4],[4,0]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(5,'[[0,1],[1,2],[2,3],[3,4],[4,0]]')">Circuit</button>
  <button onclick="loadExample(4,'[[0,1],[0,2],[1,2],[2,3]]')">Path</button>
  <button onclick="loadExample(4,'[[0,1],[0,2],[0,3]]')">Neither</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Check Eulerian Graph <span class="sub">&middot; odd-degree count &amp; connectivity</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 400 360"></svg></div>
      <div class="side">
        <div class="panel d"><div class="cap">DEGREE OF EACH VERTEX</div><div class="tiles" id="d-tiles"></div></div>
        <div class="panel q"><div class="cap">BFS QUEUE (CONNECTIVITY)</div><div class="tiles" id="q-tiles"></div></div>
        <div class="panel v"><div class="cap">VERDICT</div><div class="tiles" id="r-tiles"></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8634; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill o">odd-degree <b id="pill-odd">0</b></span>
        <span class="pill c">connected <b id="pill-conn">&mdash;</b></span>
        <span class="pill t">visited <b id="pill-vis">0</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>active node</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>edge / neighbor</span>
          <span class="li"><span class="dot" style="background:var(--accent-red)"></span>odd degree</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>visited / even</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','isEulerian'],['src','(adj, deg):']],
  [['src','  odd = count v where deg[v] is odd']],
  [['kw','  if'],['src',' odd != 0 and odd != 2: return "Neither"']],
  [['src','  start = first v with deg[v] > 0']],
  [['src','  BFS(start): mark reachable vertices']],
  [['kw','    while'],['src',' queue: u = queue.pop()']],
  [['kw','      for'],['src',' v in adj[u]: if !seen[v]: enqueue v']],
  [['kw','  if'],['src',' any deg[v]>0 unvisited: return "Neither"']],
  [['kw','  return'],['src',' odd==0 ? "Circuit" : "Path"']],
];

let V_count=5, edgesList=[[0,1],[1,2],[2,3],[3,4],[4,0]];
let coord={};
let steps=[], stepIndex=0, timer=null;
const delays=[2200,1100,560];
const gnodes={};
let confettiArmed=true;

function init(){ buildCode(); loadExample(5,'[[0,1],[1,2],[2,3],[3,4],[4,0]]'); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(v,eStr){ document.getElementById('v-input').value=v; document.getElementById('e-input').value=eStr; parseAndGen(); }
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    V_count=parseInt(document.getElementById('v-input').value,10);
    const eStr=document.getElementById('e-input').value.replace(/\(/g,'[').replace(/\)/g,']');
    edgesList=JSON.parse(eStr);
    if(isNaN(V_count)||V_count<=0||!Array.isArray(edgesList)) throw 'Invalid';
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid format. V must be a positive integer and edges a JSON array like [[0,1],[1,2]].'); }
}
function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; coord={}; for(const k in gnodes) delete gnodes[k];
  const N=V_count; const cx=200, cy=180, R=Math.min(135, 70+N*9);
  for(let i=0;i<N;i++){ const ang=(Math.PI*2*i)/N - Math.PI/2; coord[i]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)}; }
  const nodeR=20;
  // edges first; only one physical line per undirected pair, keyed by stable id e<idx>
  const drawn=new Set();
  edgesList.forEach((e,i)=>{ const p1=coord[e[0]], p2=coord[e[1]]; if(!p1||!p2) return;
    const a=Math.min(e[0],e[1]), b=Math.max(e[0],e[1]); const key=a+'-'+b; if(drawn.has(key)) return; drawn.add(key);
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1;
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line'); ln.setAttribute('class','edge'); ln.id='edge-'+key;
    ln.setAttribute('x1',(p1.x+dx/len*nodeR).toFixed(2)); ln.setAttribute('y1',(p1.y+dy/len*nodeR).toFixed(2));
    ln.setAttribute('x2',(p2.x-dx/len*nodeR).toFixed(2)); ln.setAttribute('y2',(p2.y-dy/len*nodeR).toFixed(2));
    svg.appendChild(ln); });
  // nodes on top, with a degree badge that hangs just outside the circle
  for(let id=0; id<N; id++){ const p=coord[id]; if(!p) continue;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode'); g.id='gn'+id;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',nodeR);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=id;
    // push badge outward along the radial direction
    const ang=(Math.PI*2*id)/N - Math.PI/2;
    const bx=p.x+Math.cos(ang)*(nodeR+12), by=p.y+Math.sin(ang)*(nodeR+12);
    const bd=document.createElementNS('http://www.w3.org/2000/svg','text'); bd.setAttribute('class','deg-badge'); bd.setAttribute('x',bx); bd.setAttribute('y',by); bd.id='db'+id; bd.textContent='0';
    g.appendChild(c); g.appendChild(t); g.appendChild(bd); svg.appendChild(g); gnodes[id]=g; }
}

function edgeKey(u,v){ const a=Math.min(u,v), b=Math.max(u,v); return a+'-'+b; }

// Each snapshot is immutable. renderStep is a pure function of steps[idx]:
// degrees[], visited[], queue[], treeEdges[] (keys), the active node/neighbor, and the
// running verdict are all carried so the skeleton only ever toggles classes/text.
function generateSteps(){
  steps=[];
  const adj=Array.from({length:V_count},()=>[]);
  const degrees=new Array(V_count).fill(0);
  edgesList.forEach(e=>{ const u=e[0], v=e[1];
    if(u<0||u>=V_count||v<0||v>=V_count) return;
    adj[u].push(v); adj[v].push(u); });

  function snap(o){ steps.push({
    degrees:[...o.degrees], visited:[...(o.visited||new Array(V_count).fill(false))],
    queue:[...(o.queue||[])], tree:[...(o.tree||[])],
    odd:o.odd??null, connected:o.connected??null, u:o.u??null, v:o.v??null, activeEdge:o.activeEdge??null,
    bump:o.bump??null, qpush:o.qpush??null, code:o.code, narr:o.narr, log:o.log,
    complete:o.complete, fail:o.fail, result:o.result, resColor:o.resColor }); }

  // INIT
  snap({ degrees, code:[0],
    narr:`<b>Check Eulerian Graph.</b> A connected undirected graph has an Euler trail iff exactly <b>0</b> or <b>2</b> vertices have odd degree (0 &rarr; circuit, 2 &rarr; path). First compute every degree.`,
    log:`init: V=${V_count}, E=${edgesList.length}. compute degrees, then connectivity.` });

  // PHASE 1 -- degree calculation, one edge at a time
  edgesList.forEach((e,i)=>{ const u=e[0], v=e[1];
    if(u<0||u>=V_count||v<0||v>=V_count) return;
    degrees[u]++; degrees[v]++;
    snap({ degrees, activeEdge:[u,v], bump:[u,v], code:[1], u, v,
      narr:`Edge <code>(${u}, ${v})</code> &rarr; increment both endpoints. deg[${u}]=<b>${degrees[u]}</b>, deg[${v}]=<b>${degrees[v]}</b>.`,
      log:`deg: edge (${u},${v}) -> deg[${u}]=${degrees[u]}, deg[${v}]=${degrees[v]}` });
  });

  let odd=0; const oddNodes=[];
  for(let i=0;i<V_count;i++){ if(degrees[i]%2!==0){ odd++; oddNodes.push(i); } }

  snap({ degrees, odd, code:[1],
    narr:`All degrees computed. Odd-degree vertices: <code>[${oddNodes.join(', ')}]</code> &rarr; count = <b style="color:${odd===0||odd===2?'var(--accent-green)':'var(--accent-red)'}">${odd}</b>.`,
    log:`odd-degree vertices = [${oddNodes.join(',')}]  count=${odd}` });

  // EARLY EXIT -- degree parity already rules out an Euler trail
  if(odd!==0 && odd!==2){
    snap({ degrees, odd, connected:null, code:[2], complete:true, fail:true, result:'Neither', resColor:'var(--accent-red)',
      narr:`<b style="color:var(--accent-red)">Neither.</b> ${odd} vertices have odd degree &mdash; an Euler trail allows only 0 or 2. No connectivity check needed.`,
      log:`verdict: odd count = ${odd} (not 0 or 2) -> NEITHER` });
    return;
  }

  // PHASE 2 -- connectivity via BFS over vertices with non-zero degree
  let start=-1;
  for(let i=0;i<V_count;i++){ if(degrees[i]>0){ start=i; break; } }

  const visited=new Array(V_count).fill(false);
  let queue=[], tree=[], connected=true;

  if(start===-1){
    // no edges at all -> trivially connected; with odd==0 this is a (degenerate) circuit
    connected=true;
    snap({ degrees, odd, connected:true, code:[4],
      narr:`No vertex has a positive degree &rarr; the graph has no edges. Connectivity holds trivially.`,
      log:`no edges -> trivially connected` });
  } else {
    snap({ degrees, odd, connected:null, code:[3], u:start,
      narr:`Now verify all edges lie in <b>one</b> component. Start BFS from the first non-isolated vertex, node <code>${start}</code>.`,
      log:`bfs: start = ${start} (first vertex with deg>0)` });

    queue=[start]; visited[start]=true;
    snap({ degrees, odd, connected:null, code:[4], u:start, queue:[...queue], visited:[...visited], qpush:start,
      narr:`Mark <code>visited[${start}]=true</code> and enqueue <code>${start}</code>.`,
      log:`  visit ${start}; enqueue. queue=[${queue.join(',')}]` });

    while(queue.length){
      const u=queue.shift();
      snap({ degrees, odd, connected:null, code:[5], u, queue:[...queue], visited:[...visited], tree:[...tree],
        narr:`Dequeue <code>${u}</code> &rarr; scan its neighbors <code>[${adj[u].join(', ')}]</code>.`,
        log:`dequeue ${u}; neighbors=[${adj[u].join(',')}]` });
      for(const v of adj[u]){
        if(!visited[v]){
          visited[v]=true; queue.push(v); tree.push(edgeKey(u,v));
          snap({ degrees, odd, connected:null, code:[6], u, v, activeEdge:[u,v], queue:[...queue], visited:[...visited], tree:[...tree], qpush:v,
            narr:`Neighbor <code>${v}</code> is <b style="color:var(--accent-green)">unvisited</b> &rarr; mark visited and enqueue it.`,
            log:`  neighbor ${v}: unvisited -> visit & enqueue. queue=[${queue.join(',')}]` });
        } else {
          snap({ degrees, odd, connected:null, code:[6], u, v, activeEdge:[u,v], queue:[...queue], visited:[...visited], tree:[...tree],
            narr:`Neighbor <code>${v}</code> already <b>visited</b> &rarr; skip.`,
            log:`  neighbor ${v}: already visited -> skip` });
        }
      }
    }

    let unreached=0; const missing=[];
    for(let i=0;i<V_count;i++){ if(degrees[i]>0 && !visited[i]){ connected=false; unreached++; missing.push(i); } }

    snap({ degrees, odd, connected, code:[7], visited:[...visited], tree:[...tree],
      narr: connected
        ? `BFS reached every non-isolated vertex &rarr; the edges form <b style="color:var(--accent-green)">one connected component</b>.`
        : `BFS missed <b style="color:var(--accent-red)">${unreached}</b> vertex with positive degree (<code>[${missing.join(', ')}]</code>) &rarr; the graph is <b style="color:var(--accent-red)">disconnected</b>.`,
      log: connected ? `connectivity: all deg>0 vertices reached -> connected` : `connectivity: unreached deg>0 = [${missing.join(',')}] -> disconnected` });
  }

  // PHASE 3 -- final verdict
  let result='Neither', resColor='var(--accent-red)';
  if(connected){ if(odd===0){ result='Eulerian Circuit'; resColor='var(--accent-green)'; }
                 else if(odd===2){ result='Eulerian Path'; resColor='var(--accent-orange)'; } }

  const fail = result==='Neither';
  const finalNarr = !connected
    ? `<b style="color:var(--accent-red)">Neither.</b> The graph is disconnected, so no single Euler trail can cover all edges.`
    : (odd===0
        ? `<b style="color:var(--accent-green)">Eulerian Circuit.</b> Connected and every vertex has even degree (0 odd) &rarr; a closed trail uses every edge once.`
        : `<b style="color:var(--accent-orange)">Eulerian Path.</b> Connected with exactly 2 odd-degree vertices &rarr; an open trail between them uses every edge once.`);

  snap({ degrees, odd, connected, code:[8], complete:true, fail, result, resColor,
    visited:start===-1?new Array(V_count).fill(false):visited.map((b,i)=>degrees[i]>0?true:b),
    narr: finalNarr,
    log:`verdict: connected=${connected}, odd=${odd} -> ${result}` });
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const onTree=new Set(step.tree||[]);

  for(let n=0;n<V_count;n++){ const g=gnodes[n]; if(!g) continue;
    g.classList.remove('visited','odd','activeu','activev');
    // show odd-degree ring once degrees exist (after phase 1 begins; here keyed by step.odd computed or post-init)
    const deg=step.degrees[n];
    if((step.odd!=null) && deg%2!==0 && deg>0) g.classList.add('odd');
    if(step.visited && step.visited[n]) g.classList.add('visited');
    if(step.u===n) g.classList.add('activeu');
    if(step.v===n){ g.classList.add('activev'); const c=g.querySelector('.nc'); if(c) Motion.pop(c); }
    // degree badge text + color
    const bd=document.getElementById('db'+n);
    if(bd){ bd.textContent=deg; bd.classList.remove('odd','even');
      if(deg>0) bd.classList.add(deg%2!==0?'odd':'even'); }
  }

  // edges: BFS tree edges glow green; the active edge animates purple; rest are plain
  const drawnLines=document.querySelectorAll('#graph .edge');
  drawnLines.forEach(ln=>ln.classList.remove('traversing','tree'));
  onTree.forEach(k=>{ const ln=document.getElementById('edge-'+k); if(ln) ln.classList.add('tree'); });
  if(step.activeEdge){ const k=edgeKey(step.activeEdge[0],step.activeEdge[1]); const ln=document.getElementById('edge-'+k);
    if(ln){ ln.classList.remove('tree'); ln.classList.add('traversing'); } }

  fillDegrees('d-tiles', step);
  fillQueue('q-tiles', step.queue);
  fillVerdict('r-tiles', step);

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done', !!step.complete && !step.fail);
  narr.classList.toggle('fail', !!step.fail);
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });

  document.getElementById('pill-odd').textContent = step.odd!=null?step.odd:'0';
  document.getElementById('pill-conn').innerHTML = step.connected==null?'&mdash;':(step.connected?'true':'false');
  document.getElementById('pill-vis').textContent = (step.visited||[]).filter(Boolean).length;
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete && !steps[k].fail) d.style.color='var(--accent-green)';
    if(steps[k].fail) d.style.color='var(--accent-red)'; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete && !step.fail){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fillDegrees(id, step){
  const c=document.getElementById(id); c.innerHTML='';
  step.degrees.forEach((val,i)=>{
    const w=document.createElement('div'); w.className='dwrap';
    const t=document.createElement('div'); t.textContent=val;
    let cls='tile d';
    if(step.odd!=null && val>0) cls = (val%2!==0)?'tile dodd':'tile deven';
    t.className=cls;
    if(step.bump && step.bump.includes(i)) Motion.pop(t);
    const idx=document.createElement('div'); idx.className='didx'; idx.textContent='['+i+']';
    w.appendChild(t); w.appendChild(idx); c.appendChild(w);
  });
}
function fillQueue(id, arr){
  const c=document.getElementById(id); c.innerHTML='';
  if(!arr || !arr.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; c.appendChild(e); return; }
  arr.forEach(v=>{ const t=document.createElement('div'); t.className='tile q'; t.textContent=v; c.appendChild(t); });
}
function fillVerdict(id, step){
  const c=document.getElementById(id); c.innerHTML='';
  if(!step.complete){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ pending }'; c.appendChild(e); return; }
  const t=document.createElement('div'); t.className='tile'; t.style.padding='0 12px';
  t.style.color=step.resColor; t.style.borderColor=step.resColor;
  t.style.background='color-mix(in srgb,'+step.resColor+' 14%, transparent)';
  t.textContent=step.result; Motion.pop(t); c.appendChild(t);
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
</body>
</html>
