<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Eulerian Graph - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 3; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 2; color: var(--accent-purple); }
        .node.visited { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .node.odd-deg { border-color: var(--accent-red); box-shadow: 0 0 10px rgba(248,81,73,0.3); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 350px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 44px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.deg-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.deg-odd { background: #3a0d0d; border-color: var(--accent-red); color: var(--accent-red); }
        .tile.deg-even { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile.q-tile { background: #1a150b; border-color: var(--accent-orange); color: var(--accent-orange); padding: 0 8px;}
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; filter: brightness(1.5);}
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes highlightFlash { 0% { transform: scale(1); } 50% { transform: scale(1.2); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); } }
        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop-green { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }
        .pop-orange { animation: popAnim 400ms ease; color: var(--accent-orange) !important; text-shadow: 0 0 15px var(--accent-orange); transform: scale(1.1); }
        .pop-red { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 15px var(--accent-red); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="5">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1],[1,2],[2,3],[3,4],[4,0]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(5, '[[0,1],[1,2],[2,3],[3,4],[4,0]]')">Circuit</button>
        <button onclick="loadExample(4, '[[0,1],[0,2],[1,2],[2,3]]')">Path</button>
        <button onclick="loadExample(4, '[[0,1],[0,2],[0,3]]')">Neither</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">Degrees Array:</div>
                <div class="tiles-wrapper" id="degree-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Eulerian checks depend on Odd/Even degrees.</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">BFS Queue (Connectivity):</div>
                <div class="tiles-wrapper" id="q-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Odd Degree Count</span>
            <span class="info-value" id="val-odds" style="color: var(--accent-red);">0</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Graph Connected?</span>
            <span class="info-value" id="val-conn" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Eulerian Condition</span>
            <span class="info-value" id="val-cond" style="color: var(--text-main); font-size:13px;">0 odd (Circuit) | 2 odd (Path)</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">graph type =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Evaluating Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Processing Edge</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Visited / Even Degree</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-red); border-width:2px;"></span> Odd Degree Node</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 5;
        let edgesList = [[0,1],[1,2],[2,3],[3,4],[4,0]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample(5, '[[0,1],[1,2],[2,3],[3,4],[4,0]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is an integer and edges is a valid 2D array.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 225;
            const cy = 200;
            const radius = 130;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let adj = Array.from({length: V_count}, () => []);
            let degrees = new Array(V_count).fill(0);
            
            for (let [u,v] of edgesList) {
                adj[u].push(v);
                adj[v].push(u); // Undirected graph
            }

            steps.push({
                type: 'init', degrees: [...degrees], oddCount: 0, connected: null, queue: [], visited: new Array(V_count).fill(false),
                u: null, v: null, activeEdge: null, poppedItem: null, pushedItem: null, updatedNode: null,
                panel: `<b>Check Eulerian Graph</b><br>An undirected graph has an Eulerian Path if exactly 0 or 2 vertices have an odd degree, AND all vertices with non-zero degree belong to a single connected component.<br>First, we calculate the degree of each node.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. V=${V_count}, E=${edgesList.length}.`
            });

            // Phase 1: Degree Calculation
            for (let i = 0; i < edgesList.length; i++) {
                let e = edgesList[i];
                let u = e[0];
                let v = e[1];

                degrees[u]++;
                degrees[v]++;

                steps.push({
                    type: 'deg_calc', degrees: [...degrees], oddCount: 0, connected: null, queue: [], visited: new Array(V_count).fill(false),
                    u: null, v: null, activeEdge: e, poppedItem: null, pushedItem: null, updatedNode: [u, v],
                    panel: `<b>Phase 1: Calculate Degrees</b><br>Process edge <b>(${u}, ${v})</b>. Increment the degree of both endpoint vertices.`,
                    statusText: `Updating degrees...`,
                    log: `Processed edge (${u}, ${v}). degree[${u}]=${degrees[u]}, degree[${v}]=${degrees[v]}.`
                });
            }

            let oddCount = 0;
            for (let d of degrees) if (d % 2 !== 0) oddCount++;

            steps.push({
                type: 'deg_eval', degrees: [...degrees], oddCount: oddCount, connected: null, queue: [], visited: new Array(V_count).fill(false),
                u: null, v: null, activeEdge: null, poppedItem: null, pushedItem: null, updatedNode: null,
                panel: `<b>Degrees Calculated</b><br>We count the number of vertices with an <b>Odd Degree</b>.<br>Total Odd Vertices = <b style="color:var(--accent-red)">${oddCount}</b>.`,
                statusText: `Degree calculation complete.`,
                log: `\nTotal Odd Degree Vertices: ${oddCount}.`
            });

            // Phase 2: Connectivity Check via BFS
            let startNode = -1;
            for (let i = 0; i < V_count; i++) {
                if (degrees[i] > 0) {
                    startNode = i;
                    break;
                }
            }

            let visited = new Array(V_count).fill(false);
            let connected = true;
            let queue = [];

            if (startNode !== -1) {
                steps.push({
                    type: 'bfs_start', degrees: [...degrees], oddCount: oddCount, connected: null, queue: [...queue], visited: [...visited],
                    u: startNode, v: null, activeEdge: null, poppedItem: null, pushedItem: null, updatedNode: null,
                    panel: `<b>Phase 2: Connectivity Check</b><br>We must ensure all edges belong to a single connected component.<br>Find the first node with a non-zero degree (Node <b>${startNode}</b>) and start a BFS/DFS traversal from it.`,
                    statusText: `Starting BFS from Node ${startNode}.`,
                    log: `\nStarting connectivity check from Node ${startNode}.`
                });

                queue.push(startNode);
                visited[startNode] = true;

                steps.push({
                    type: 'bfs_enqueue', degrees: [...degrees], oddCount: oddCount, connected: null, queue: [...queue], visited: [...visited],
                    u: startNode, v: null, activeEdge: null, poppedItem: null, pushedItem: startNode, updatedNode: startNode,
                    panel: `Mark Node <b>${startNode}</b> as Visited and Enqueue it.`,
                    statusText: `Enqueued Node ${startNode}.`,
                    log: `  -> visited[${startNode}]=True. Enqueue ${startNode}.`
                });

                while (queue.length > 0) {
                    let u = queue.shift();

                    steps.push({
                        type: 'bfs_dequeue', degrees: [...degrees], oddCount: oddCount, connected: null, queue: [...queue], visited: [...visited],
                        u: u, v: null, activeEdge: null, poppedItem: u, pushedItem: null, updatedNode: null,
                        panel: `<b>Dequeue:</b> Active Node is <b>${u}</b>.<br>Iterating through its neighbors...`,
                        statusText: `Processing Node ${u}...`,
                        log: `\nDequeue ${u}.`
                    });

                    let neighbors = adj[u] || [];
                    for (let v of neighbors) {
                        steps.push({
                            type: 'bfs_check', degrees: [...degrees], oddCount: oddCount, connected: null, queue: [...queue], visited: [...visited],
                            u: u, v: v, activeEdge: [u, v], poppedItem: null, pushedItem: null, updatedNode: null,
                            panel: `Checking neighbor <b>${v}</b> of Node <b>${u}</b>.<br>Is <code>${v}</code> visited?`,
                            statusText: `Evaluating edge ${u} — ${v}...`,
                            log: `  Evaluating neighbor ${v}...`
                        });

                        if (!visited[v]) {
                            visited[v] = true;
                            queue.push(v);

                            steps.push({
                                type: 'bfs_visit', degrees: [...degrees], oddCount: oddCount, connected: null, queue: [...queue], visited: [...visited],
                                u: u, v: v, activeEdge: [u, v], poppedItem: null, pushedItem: v, updatedNode: v,
                                panel: `Neighbor <b>${v}</b> is <b style="color:var(--accent-green)">unvisited</b>.<br>Mark <code>visited[${v}] = True</code> and Enqueue it.`,
                                statusText: `Discovered Node ${v}.`,
                                log: `    -> Unvisited. visited[${v}]=True. Enqueued.`
                            });
                        } else {
                            steps.push({
                                type: 'bfs_skip', degrees: [...degrees], oddCount: oddCount, connected: null, queue: [...queue], visited: [...visited],
                                u: u, v: v, activeEdge: [u, v], poppedItem: null, pushedItem: null, updatedNode: null,
                                panel: `Neighbor <b>${v}</b> is already visited. <b style="color:var(--text-dim)">Skip.</b>`,
                                statusText: `Skipping visited node ${v}.`,
                                log: `    -> Already visited. Skipped.`
                            });
                        }
                    }
                }

                // Check if all non-zero degree nodes are visited
                let unvisitedCount = 0;
                for (let i = 0; i < V_count; i++) {
                    if (degrees[i] > 0 && !visited[i]) {
                        connected = false;
                        unvisitedCount++;
                    }
                }

                steps.push({
                    type: 'conn_eval', degrees: [...degrees], oddCount: oddCount, connected: connected, queue: [...queue], visited: [...visited],
                    u: null, v: null, activeEdge: null, poppedItem: null, pushedItem: null, updatedNode: null,
                    panel: connected ? 
                        `<b>Connectivity Check Passed!</b><br>All nodes with a non-zero degree were visited during the traversal. The graph's edges form a single connected component.` :
                        `<b style="color:var(--accent-red); font-size:16px;">Graph Disconnected!</b><br>There are ${unvisitedCount} nodes with non-zero degrees that were NOT reached by the traversal.`,
                    statusText: connected ? `Graph is connected.` : `Graph is disconnected.`,
                    log: `\nConnectivity Check: ${connected ? 'Passed' : 'Failed'}.`,
                    logColor: connected ? 'var(--accent-green)' : 'var(--accent-red)'
                });

            } else {
                // No edges in the graph
                steps.push({
                    type: 'conn_eval', degrees: [...degrees], oddCount: oddCount, connected: true, queue: [...queue], visited: [...visited],
                    u: null, v: null, activeEdge: null, poppedItem: null, pushedItem: null, updatedNode: null,
                    panel: `The graph has no edges. It trivially satisfies connectivity constraints.`,
                    statusText: `Empty graph.`,
                    log: `\nNo edges found. Graph trivially connected.`
                });
            }

            // Phase 3: Final Conclusion
            let finalType = "Neither";
            let finalColor = 'var(--accent-red)';
            
            if (connected) {
                if (oddCount === 0) {
                    finalType = "Eulerian Circuit";
                    finalColor = 'var(--accent-green)';
                } else if (oddCount === 2) {
                    finalType = "Eulerian Path";
                    finalColor = 'var(--accent-orange)';
                }
            }

            steps.push({
                type: 'final', degrees: [...degrees], oddCount: oddCount, connected: connected, queue: [...queue], visited: [...visited],
                u: null, v: null, activeEdge: null, poppedItem: null, pushedItem: null, updatedNode: null,
                panel: `<b>Final Evaluation</b><br>` + 
                    (!connected ? `Because the graph is disconnected, it cannot be Eulerian.` :
                    (oddCount === 0 ? `Since the graph is connected and has exactly <b>0</b> vertices with an odd degree, it contains an <b>Eulerian Circuit</b>.` :
                    (oddCount === 2 ? `Since the graph is connected and has exactly <b>2</b> vertices with an odd degree, it contains an <b>Eulerian Path</b>.` :
                    `The graph is connected but has <b>${oddCount}</b> vertices with an odd degree (> 2). It is <b>Not Eulerian</b>.`))),
                complete: true, result: finalType, resultColor: finalColor,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Result: ${finalType}`,
                logColor: finalColor
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawn = new Set();

            edgesList.forEach(e => {
                const u = e[0];
                const v = e[1];
                
                let key = u < v ? `${u}-${v}` : `${v}-${u}`;
                if (drawn.has(key)) return;
                drawn.add(key);

                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isActive = step.activeEdge && ((step.activeEdge[0] === u && step.activeEdge[1] === v) || (step.activeEdge[0] === v && step.activeEdge[1] === u));

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrink = nodeRadius + 2; 
                
                line.setAttribute('x1', p1.x + (dx/len)*shrink); 
                line.setAttribute('y1', p1.y + (dy/len)*shrink);
                line.setAttribute('x2', p2.x - (dx/len)*shrink); 
                line.setAttribute('y2', p2.y - (dy/len)*shrink);

                if (isActive) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('stroke-dasharray', '8');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    svg.appendChild(line);
                }
            });
        }

        function renderQueue(step) {
            const container = document.getElementById('q-tiles');
            container.innerHTML = '';
            
            if (step.queue.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            if (step.poppedItem !== null && step.type === 'bfs_dequeue') {
                const popTile = document.createElement('div');
                popTile.className = `tile q-tile popping`;
                popTile.innerText = step.poppedItem;
                container.appendChild(popTile);
            }

            step.queue.forEach(val => {
                const tile = document.createElement('div');
                tile.className = `tile q-tile`;
                if (step.pushedItem === val) {
                    tile.classList.add('pushing');
                }
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderDegrees(step) {
            const container = document.getElementById('degree-tiles');
            container.innerHTML = '';
            
            step.degrees.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                
                if (step.type.startsWith('deg_') || step.type === 'init' || step.type === 'conn_eval' || step.complete) {
                    if (val % 2 !== 0 && val > 0) tile.className = 'tile deg-odd';
                    else if (val % 2 === 0 && val > 0) tile.className = 'tile deg-even';
                    else tile.className = 'tile deg-tile';
                } else {
                    tile.className = 'tile deg-tile';
                }
                
                if (step.updatedNode && step.updatedNode.includes(i)) {
                    tile.classList.add('highlight-update');
                }
                
                tile.innerText = val;
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (step.visited[i]) el.classList.add('visited');
                
                if (step.type.startsWith('deg_') || step.type === 'conn_eval' || step.complete) {
                     if (step.degrees[i] % 2 !== 0) el.classList.add('odd-deg');
                }
                
                if (step.u === i && !step.complete && step.type !== 'deg_calc') el.classList.add('active-u');
                if (step.v === i && !step.complete && step.type !== 'deg_calc') el.classList.add('active-v');
            }

            drawEdges(step);
            renderQueue(step);
            renderDegrees(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-odds').innerText = step.oddCount;
            let connStr = step.connected === null ? '—' : (step.connected ? 'True' : 'False');
            document.getElementById('val-conn').innerText = connStr;
            document.getElementById('val-conn').style.color = step.connected === false ? 'var(--accent-red)' : (step.connected === true ? 'var(--accent-green)' : 'var(--text-main)');

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.style.color = step.resultColor;
                if (step.result === 'Eulerian Circuit') resVal.className = 'pop-green';
                else if (step.result === 'Eulerian Path') resVal.className = 'pop-orange';
                else resVal.className = 'pop-error';
            } else {
                resVal.className = '';
                resVal.style.color = 'var(--text-dim)';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
