<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depth-First Search (DFS) Traversal - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 2;
        }
        
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 4; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 3; color: var(--accent-purple); }
        .node.visited { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 350px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 40px; height: 36px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.vis-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile.stack-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); padding: 0 8px; width: auto; font-size: 13px;}
        .tile.result-tile { background: #1a150b; border-color: var(--accent-orange); color: var(--accent-orange); }
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; filter: brightness(1.5);}
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes highlightFlash { 0% { transform: scale(1); } 50% { transform: scale(1.2); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); } }
        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 830px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 830px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-orange) !important; text-shadow: 0 0 15px var(--accent-orange); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 830px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="4">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1], [0,2], [1,3], [2,3]]">
        <label class="ui-label">start =</label>
        <input type="text" id="s-input" class="small-input" placeholder="0">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(4, '[[0,1], [0,2], [1,3], [2,3]]', 0)">Ex 1</button>
        <button onclick="loadExample(5, '[[0,1], [0,2], [1,3], [1,4]]', 0)">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-tree" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-green)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">Visited Array:</div>
                <div class="tiles-wrapper" id="vis-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">DFS Call Stack:</div>
                <div class="tiles-wrapper" id="stack-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Tracks recursive depth</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">Traversal Result:</div>
                <div class="tiles-wrapper" id="result-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Nodes in order of first visit</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Visited?</span>
            <span class="info-value" id="val-vis" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">final dfs traversal order =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Active Node (u)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Neighbor (v)</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Visited Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-green); border-width:3px;"></span> Tree Edge (DFS Path)</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 4;
        let edgesList = [[0,1], [0,2], [1,3], [2,3]];
        let startNode = 0;
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample(4, '[[0,1], [0,2], [1,3], [2,3]]', 0); }

        function loadExample(v, eStr, s) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            document.getElementById('s-input').value = s;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                startNode = parseInt(document.getElementById('s-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || isNaN(startNode) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V and start are integers, and edges is a valid 2D array.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 225;
            const cy = 200;
            const radius = 140;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let adj = Array.from({length: V_count}, () => []);
            for (let [u,v] of edgesList) {
                adj[u].push(v);
                adj[v].push(u); // Undirected
            }

            // Sort neighbors to ensure predictable traversal
            for(let i=0; i<V_count; i++) adj[i].sort((a,b) => a - b);

            let visited = new Array(V_count).fill(false);
            let result = [];
            let stack = [];
            let treeEdges = [];

            steps.push({
                type: 'init', visited: [...visited], result: [...result], stack: [...stack], treeEdges: [...treeEdges],
                u: null, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                panel: `<b>Depth-First Search (DFS) Traversal</b><br>DFS explores as far as possible along each branch before backtracking.<br>We begin the traversal at the specified Start Node: <b>${startNode}</b>.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. V=${V_count}, Start=${startNode}.`
            });

            function dfs(u, p, depth) {
                let pad = "  ".repeat(depth);
                
                visited[u] = true;
                result.push(u);
                stack.push(u);

                if (p !== -1) {
                    treeEdges.push([p, u]);
                }

                steps.push({
                    type: 'visit', visited: [...visited], result: [...result], stack: [...stack], treeEdges: [...treeEdges],
                    u: u, v: null, updatedNode: u, poppedItem: null, pushedItem: u,
                    panel: `<b>Visit Node ${u}:</b><br>Mark <code>visited[${u}] = True</code>.<br>Add <b>${u}</b> to the Traversal Result and push it onto the DFS Call Stack.`,
                    statusText: `Visiting Node ${u}...`,
                    log: `\n${pad}DFS(${u}): Marked visited. Added to result.`
                });

                let neighbors = adj[u] || [];
                if (neighbors.length === 0) {
                    steps.push({
                        type: 'no_neighbors', visited: [...visited], result: [...result], stack: [...stack], treeEdges: [...treeEdges],
                        u: u, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                        panel: `Node <b>${u}</b> has no neighbors to explore.`,
                        statusText: `No neighbors.`,
                        log: `${pad}  Node ${u} has no neighbors.`
                    });
                }

                for (let v of neighbors) {
                    steps.push({
                        type: 'check', visited: [...visited], result: [...result], stack: [...stack], treeEdges: [...treeEdges],
                        u: u, v: v, updatedNode: null, poppedItem: null, pushedItem: null,
                        panel: `Checking neighbor <b>${v}</b> of Node <b>${u}</b>.<br>Is <code>visited[${v}]</code> False?`,
                        statusText: `Evaluating edge ${u} — ${v}...`,
                        log: `${pad}  Evaluating neighbor ${v}...`
                    });

                    if (!visited[v]) {
                        steps.push({
                            type: 'recurse', visited: [...visited], result: [...result], stack: [...stack], treeEdges: [...treeEdges],
                            u: u, v: v, updatedNode: null, poppedItem: null, pushedItem: null,
                            panel: `<b style="color:var(--accent-green)">Yes.</b> Neighbor <b>${v}</b> is unvisited.<br>This forms a Tree Edge. We will recursively call <code>DFS(${v})</code>.`,
                            statusText: `Recursing into Node ${v}...`,
                            log: `${pad}    -> Unvisited. Recursing into DFS(${v}).`
                        });
                        
                        dfs(v, u, depth + 1);
                        
                        steps.push({
                            type: 'backtrack', visited: [...visited], result: [...result], stack: [...stack], treeEdges: [...treeEdges],
                            u: u, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                            panel: `Returned from <code>DFS(${v})</code> back to <b>${u}</b>.<br>Continuing to explore any remaining neighbors of <b>${u}</b>.`,
                            statusText: `Backtracked to Node ${u}.`,
                            log: `${pad}  <- Backtracked from ${v} to ${u}.`
                        });

                    } else {
                        steps.push({
                            type: 'skip', visited: [...visited], result: [...result], stack: [...stack], treeEdges: [...treeEdges],
                            u: u, v: v, updatedNode: null, poppedItem: null, pushedItem: null,
                            panel: `<b style="color:var(--accent-red)">No.</b> Neighbor <b>${v}</b> is already visited.<br>We do not visit it again. <b style="color:var(--text-dim)">Skip.</b>`,
                            statusText: `Skipping visited neighbor ${v}.`,
                            log: `${pad}    -> Already visited. Skipped.`
                        });
                    }
                }
                
                let popped = stack.pop();
                steps.push({
                    type: 'finish', visited: [...visited], result: [...result], stack: [...stack], treeEdges: [...treeEdges],
                    u: u, v: null, updatedNode: null, poppedItem: popped, pushedItem: null,
                    panel: `Finished exploring all neighbors of <b>${u}</b>.<br>Pop <b>${u}</b> from the DFS Call Stack and return to the caller.`,
                    statusText: `Finished Node ${u}.`,
                    log: `${pad}Finished DFS(${u}). Popped from stack.`
                });
            }

            // Start DFS from startNode
            if (startNode >= 0 && startNode < V_count) {
                dfs(startNode, -1, 0);
            }

            // Ensure all disconnected components are visited
            for (let i = 0; i < V_count; i++) {
                let node = (startNode + i) % V_count;
                if (!visited[node]) {
                    steps.push({
                        type: 'new_comp', visited: [...visited], result: [...result], stack: [...stack], treeEdges: [...treeEdges],
                        u: node, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                        panel: `Node <b>${node}</b> is still unvisited (disconnected component).<br>Starting a new DFS traversal from <b>${node}</b>.`,
                        statusText: `Starting DFS on disconnected Node ${node}.`,
                        log: `\nFound unvisited node ${node}. Starting new DFS component.`
                    });
                    dfs(node, -1, 0);
                }
            }

            steps.push({
                type: 'final', visited: [...visited], result: [...result], stack: [...stack], treeEdges: [...treeEdges],
                u: null, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                panel: `<b>Algorithm Complete!</b><br>All nodes in the graph have been fully explored.<br>The final DFS Traversal order is <b style="color:var(--accent-orange); font-size:16px;">[${result.join(', ')}]</b>.`,
                complete: true, result: `[${result.join(', ')}]`,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Traversal Result: [${result.join(', ')}]`,
                logColor: 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawn = new Set();

            edgesList.forEach(e => {
                const u = e[0];
                const v = e[1];
                
                let key = u < v ? `${u}-${v}` : `${v}-${u}`;
                if (drawn.has(key)) return;
                drawn.add(key);

                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.u !== null && step.v !== null && 
                                 ((step.u === u && step.v === v) || (step.u === v && step.v === u));

                let isTreeEdge = step.treeEdges.some(te => (te[0] === u && te[1] === v) || (te[0] === v && te[1] === u));

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrink = nodeRadius + 2; 
                
                const x1 = p1.x + (dx/len)*shrink; 
                const y1 = p1.y + (dy/len)*shrink;
                const x2 = p2.x - (dx/len)*shrink; 
                const y2 = p2.y - (dy/len)*shrink;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);

                if (isChecking) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('stroke-dasharray', '6');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else if (isTreeEdge) {
                    line.setAttribute('stroke', 'var(--accent-green)');
                    line.setAttribute('stroke-width', '3');
                    
                    let dirU = step.treeEdges.find(te => te[0] === u && te[1] === v) ? true : false;
                    if (dirU) {
                        line.setAttribute('marker-end', 'url(#arrow-tree)');
                    } else {
                        line.setAttribute('x1', x2); line.setAttribute('y1', y2);
                        line.setAttribute('x2', x1); line.setAttribute('y2', y1);
                        line.setAttribute('marker-end', 'url(#arrow-tree)');
                    }
                    svg.appendChild(line);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    svg.appendChild(line);
                }
            });
        }

        function renderStack(step) {
            const container = document.getElementById('stack-tiles');
            container.innerHTML = '';
            
            if (step.stack.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            step.stack.forEach((val, index) => {
                const tile = document.createElement('div');
                tile.className = `tile stack-tile`;
                if (step.pushedItem === val && index === step.stack.length - 1) {
                    tile.classList.add('pushing');
                }
                tile.innerText = val;
                
                container.appendChild(tile);
                
                if (index < step.stack.length - 1 || step.poppedItem !== null) {
                    const sep = document.createElement('span');
                    sep.innerText = '➔';
                    sep.style.color = 'var(--text-dim)';
                    sep.style.fontSize = '12px';
                    container.appendChild(sep);
                }
            });

            if (step.poppedItem !== null && step.type === 'finish') {
                const popTile = document.createElement('div');
                popTile.className = `tile stack-tile popping`;
                popTile.innerText = step.poppedItem;
                container.appendChild(popTile);
            }
        }

        function renderResult(step) {
            const container = document.getElementById('result-tiles');
            container.innerHTML = '';
            
            if (step.result.length === 0) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">[ ]</span>';
                return;
            }

            step.result.forEach((val, i) => {
                const tile = document.createElement('div');
                tile.className = `tile result-tile`;
                
                if (step.pushedItem === val && i === step.result.length - 1) {
                    tile.classList.add('pushing');
                }
                
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderArray(containerId, arr, tileClass, formatFn, stepData) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile ${tileClass}`;
                
                if (stepData.updatedNode === i && tileClass === 'vis-tile') {
                    tile.classList.add('highlight-update');
                }
                
                tile.innerText = formatFn(val);
                
                if (tileClass === 'vis-tile' && !val) {
                    tile.style.background = '#21262d';
                    tile.style.borderColor = 'var(--border-main)';
                    tile.style.color = 'var(--text-dim)';
                }
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (step.visited[i]) el.classList.add('visited');
                
                if (step.u === i && !step.complete) el.classList.add('active-u');
                if (step.v === i && !step.complete) el.classList.add('active-v');
            }

            drawEdges(step);
            renderStack(step);
            renderResult(step);
            
            renderArray('vis-tiles', step.visited, 'vis-tile', v => v ? 'T' : 'F', step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? `${step.u}` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `${step.v}` : '—';

            let visStr = '—';
            if (step.v !== null) {
                visStr = step.visited[step.v] ? 'True' : 'False';
            }
            document.getElementById('val-vis').innerText = visStr;
            document.getElementById('val-vis').style.color = visStr === 'True' ? 'var(--accent-red)' : (visStr === 'False' ? 'var(--accent-green)' : 'var(--text-main)');

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
