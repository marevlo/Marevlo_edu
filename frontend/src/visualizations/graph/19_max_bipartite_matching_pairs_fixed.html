<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Bipartite Matching (Backtracking) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 100px; text-align: center; font-family: monospace; }
        .med-input { width: 280px; font-family: monospace; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 400px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
        }

        .col-label {
            position: absolute;
            top: 10px;
            font-family: monospace;
            font-weight: bold;
            color: var(--text-dim);
            font-size: 14px;
        }
        .label-a { left: 85px; }
        .label-b { right: 85px; }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 15px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node-a { border-color: var(--accent-orange); color: var(--accent-orange); background: rgba(227, 179, 65, 0.05); }
        .node-b { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(56, 139, 253, 0.05); }
        
        .node.active-a { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); z-index: 3; }
        .node.active-b { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 12px var(--accent-purple); border-color: var(--accent-purple); color: var(--accent-purple); z-index: 2; }
        .node.matched { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile {
            padding: 0 10px; height: 36px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 14px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.curr-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.max-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 730px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 730px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; text-align: center; word-break: break-all; max-width: 700px;}
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 12px var(--accent-green); font-size: 24px !important;}

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 730px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">A =</label>
        <input type="text" id="a-input" class="small-input" placeholder="[1, 2]">
        <label class="ui-label">B =</label>
        <input type="text" id="b-input" class="small-input" placeholder="[3, 4]">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[1,3], [1,4], [2,3]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[1, 2]', '[3, 4]', '[[1,3], [1,4], [2,3]]')">Ex 1</button>
        <button onclick="loadExample('[1, 2, 3]', '[4, 5]', '[[1,4], [2,5], [3,4]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <div class="col-label label-a">Set A</div>
            <div class="col-label label-b">Set B</div>
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">Current Matching:</div>
                <div class="tiles-wrapper" id="curr-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">Max Matching Found:</div>
                <div class="tiles-wrapper" id="max-tiles"></div>
            </div>
            <div class="result-display">
                <span class="ui-label">Maximum Pairs =</span>
                <span id="res-val">—</span>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (Set A)</span>
            <span class="info-value" id="val-a" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Testing Node (Set B)</span>
            <span class="info-value" id="val-b" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">B Element Status</span>
            <span class="info-value" id="val-status" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Set A Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-blue); border-width:2px;"></span> Set B Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Pairing</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Matched Pair</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--border-main); border-width:2px;"></span> Valid Graph Edge</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let A_set = [1, 2];
        let B_set = [3, 4];
        let edgesList = [[1,3], [1,4], [2,3]];
        
        let nodeCoords = {};
        let edgeSet = new Set();
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];

        function init() { loadExample('[1, 2]', '[3, 4]', '[[1,3], [1,4], [2,3]]'); }

        function loadExample(aStr, bStr, eStr) {
            document.getElementById('a-input').value = aStr;
            document.getElementById('b-input').value = bStr;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                A_set = JSON.parse(document.getElementById('a-input').value);
                B_set = JSON.parse(document.getElementById('b-input').value);
                const eStr = document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']');
                edgesList = JSON.parse(eStr);
                
                if (!Array.isArray(A_set) || !Array.isArray(B_set) || !Array.isArray(edgesList)) {
                    throw "Arrays required";
                }

                edgeSet = new Set();
                for (let e of edgesList) {
                    edgeSet.add(`${e[0]}-${e[1]}`);
                }

                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure inputs are valid JSON arrays.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            let aX = 100, bX = 300;
            let startY = 80;

            let aSpacing = 320 / (A_set.length + 1);
            A_set.forEach((node, i) => {
                let y = startY + (i * aSpacing);
                nodeCoords[`A-${node}`] = {x: aX, y: y};

                const el = document.createElement('div');
                el.className = 'node node-a';
                el.id = `node-A-${node}`;
                el.style.left = `${aX}px`;
                el.style.top = `${y}px`;
                el.innerText = node;
                container.appendChild(el);
            });

            let bSpacing = 320 / (B_set.length + 1);
            B_set.forEach((node, i) => {
                let y = startY + (i * bSpacing);
                nodeCoords[`B-${node}`] = {x: bX, y: y};

                const el = document.createElement('div');
                el.className = 'node node-b';
                el.id = `node-B-${node}`;
                el.style.left = `${bX}px`;
                el.style.top = `${y}px`;
                el.innerText = node;
                container.appendChild(el);
            });
        }

        function cloneMatch(match) {
            return match.map(arr => [...arr]);
        }

        function generateSteps() {
            steps = [];
            
            let maxMatching = [];
            let currentMatching = [];
            let usedB = new Set();

            steps.push({
                type: 'init',
                currMatch: cloneMatch(currentMatching), maxMatch: cloneMatch(maxMatching), usedB: Array.from(usedB),
                activeA: null, activeB: null, activeEdge: null,
                panel: `<b>Brute Force Backtracking</b><br>Start with an empty matching. We will systematically explore all possible pairings from Set A to Set B.`,
                statusText: `Ready to search.`,
                log: `Initialized search. Set A: [${A_set}], Set B: [${B_set}]`
            });

            function backtrack(idxA, depth) {
                let pad = "  ".repeat(depth);

                if (idxA === A_set.length) {
                    let isNewMax = currentMatching.length > maxMatching.length;
                    if (isNewMax) maxMatching = cloneMatch(currentMatching);
                    
                    steps.push({
                        type: 'end_of_A',
                        currMatch: cloneMatch(currentMatching), maxMatch: cloneMatch(maxMatching), usedB: Array.from(usedB),
                        activeA: null, activeB: null, activeEdge: null,
                        panel: `Reached the end of Set A.<br>Current matching has <b>${currentMatching.length}</b> pairs. ` +
                               (isNewMax ? `<b style="color:var(--accent-green)">New Maximum Found!</b>` : `Not greater than current max (${maxMatching.length}).`),
                        statusText: isNewMax ? `New Max Matching recorded.` : `Checked complete configuration.`,
                        log: `${pad}End of Set A. Pairs: ${currentMatching.length}. Max is now ${maxMatching.length}.`,
                        logColor: isNewMax ? 'var(--accent-green)' : ''
                    });
                    return;
                }

                let a = A_set[idxA];
                steps.push({
                    type: 'visit_A',
                    currMatch: cloneMatch(currentMatching), maxMatch: cloneMatch(maxMatching), usedB: Array.from(usedB),
                    activeA: a, activeB: null, activeEdge: null,
                    panel: `Focusing on Set A node <b>${a}</b>.<br>Try to pair it sequentially with elements from Set B.`,
                    statusText: `Processing A[${idxA}] = ${a}...`,
                    log: `\n${pad}Processing A[${idxA}] = ${a}`
                });

                for (let b of B_set) {
                    steps.push({
                        type: 'try_B',
                        currMatch: cloneMatch(currentMatching), maxMatch: cloneMatch(maxMatching), usedB: Array.from(usedB),
                        activeA: a, activeB: b, activeEdge: [a, b],
                        panel: `Attempting to pair <b>${a}</b> with <b>${b}</b>...`,
                        statusText: `Evaluating pair (${a}, ${b})...`,
                        log: `${pad}  Try pairing ${a} with ${b}...`
                    });

                    if (usedB.has(b)) {
                        steps.push({
                            type: 'fail_used',
                            currMatch: cloneMatch(currentMatching), maxMatch: cloneMatch(maxMatching), usedB: Array.from(usedB),
                            activeA: a, activeB: b, activeEdge: [a, b],
                            panel: `Node <b>${b}</b> is <b style="color:var(--accent-red)">already used</b> in the current matching. We cannot pair them. Skip.`,
                            statusText: `Node ${b} is used.`,
                            log: `${pad}    -> Failed: ${b} is already used.`
                        });
                        continue;
                    }

                    if (!edgeSet.has(`${a}-${b}`)) {
                        steps.push({
                            type: 'fail_edge',
                            currMatch: cloneMatch(currentMatching), maxMatch: cloneMatch(maxMatching), usedB: Array.from(usedB),
                            activeA: a, activeB: b, activeEdge: [a, b],
                            panel: `There is <b style="color:var(--accent-red)">no valid edge</b> between <b>${a}</b> and <b>${b}</b> in the graph constraints. Skip.`,
                            statusText: `No edge (${a}, ${b}).`,
                            log: `${pad}    -> Failed: No valid edge exists.`
                        });
                        continue;
                    }

                    // Pair them
                    usedB.add(b);
                    currentMatching.push([a, b]);
                    
                    steps.push({
                        type: 'paired',
                        currMatch: cloneMatch(currentMatching), maxMatch: cloneMatch(maxMatching), usedB: Array.from(usedB),
                        activeA: a, activeB: b, activeEdge: [a, b], pushedPair: `(${a},${b})`,
                        panel: `<span style="color:var(--accent-green); font-size:16px; font-weight:bold;">Valid Pair!</span><br>Temporarily matched <b>(${a}, ${b})</b>. Recursively exploring next nodes...`,
                        statusText: `Paired (${a}, ${b}). Recursing...`,
                        log: `${pad}    -> Success! Matched (${a}, ${b}). Recursing...`
                    });

                    backtrack(idxA + 1, depth + 1);

                    // Unpair (Backtrack)
                    currentMatching.pop();
                    usedB.delete(b);
                    
                    steps.push({
                        type: 'backtrack',
                        currMatch: cloneMatch(currentMatching), maxMatch: cloneMatch(maxMatching), usedB: Array.from(usedB),
                        activeA: a, activeB: b, activeEdge: [a, b], poppedPair: `(${a},${b})`,
                        panel: `<b>Backtrack:</b> Undoing match <b>(${a}, ${b})</b> to explore other alternative combinations.`,
                        statusText: `Backtracking from (${a}, ${b}).`,
                        log: `${pad}  <- Backtracked pair (${a}, ${b}).`
                    });
                }

                // Skip pairing a
                steps.push({
                    type: 'skip_A',
                    currMatch: cloneMatch(currentMatching), maxMatch: cloneMatch(maxMatching), usedB: Array.from(usedB),
                    activeA: a, activeB: null, activeEdge: null,
                    panel: `Explored all B options for <b>${a}</b>.<br>Now evaluating the branch where <b>${a} remains unpaired</b>.`,
                    statusText: `Skipping node ${a}...`,
                    log: `${pad}  Try skipping ${a} (leave unpaired). Recursing...`
                });
                backtrack(idxA + 1, depth + 1);
            }

            backtrack(0, 0);

            let resStr = `${maxMatching.length} pairs: [${maxMatching.map(p => `(${p[0]},${p[1]})`).join(', ')}]`;

            steps.push({
                type: 'final',
                currMatch: [], maxMatch: cloneMatch(maxMatching), usedB: [],
                activeA: null, activeB: null, activeEdge: null,
                panel: `<b>Search Space Exhausted!</b><br>We explored all valid permutations. The Maximum Bipartite Matching found has <b style="color:var(--accent-green); font-size:16px;">${maxMatching.length}</b> pairs.`,
                complete: true, result: resStr,
                statusText: `Algorithm Complete.`,
                log: `\nAlgorithm Finished. ${resStr}`,
                logColor: 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 20;

            // Edges to display:
            // At the final step, only draw the max matching edges.
            // Otherwise, draw all edges, highlighting active/matched ones.

            let edgesToDraw = step.complete ? step.maxMatch.map(p => ({u: p[0], v: p[1]})) : edgesList.map(e => ({u: e[0], v: e[1]}));

            edgesToDraw.forEach(e => {
                const p1 = nodeCoords[`A-${e.u}`];
                const p2 = nodeCoords[`B-${e.v}`];
                if(!p1 || !p2) return;

                let isChecking = step.activeEdge && step.activeEdge[0] === e.u && step.activeEdge[1] === e.v;
                let isMatched = step.currMatch.some(m => m[0] === e.u && m[1] === e.v);
                if (step.complete && step.maxMatch.some(m => m[0] === e.u && m[1] === e.v)) isMatched = true;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrinkTarget = nodeRadius; 
                const shrinkSource = nodeRadius; 
                
                line.setAttribute('x1', p1.x + (dx/len)*shrinkSource); 
                line.setAttribute('y1', p1.y + (dy/len)*shrinkSource);
                line.setAttribute('x2', p2.x - (dx/len)*shrinkTarget); 
                line.setAttribute('y2', p2.y - (dy/len)*shrinkTarget);

                if (isMatched) {
                    line.setAttribute('stroke', 'var(--accent-green)');
                    line.setAttribute('stroke-width', '4');
                    svg.appendChild(line);
                } else if (isChecking) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('stroke-dasharray', '6');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    svg.appendChild(line);
                }
            });
        }

        function renderArray(containerId, arr, tileClass, stepData, isCurr) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            if (arr.length === 0 && !(isCurr && stepData.poppedPair)) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            arr.forEach(pair => {
                const tile = document.createElement('div');
                tile.className = `tile ${tileClass}`;
                let pairStr = `(${pair[0]},${pair[1]})`;
                tile.innerText = pairStr;
                
                if (isCurr && stepData.pushedPair === pairStr) {
                    tile.classList.add('pushing');
                }
                container.appendChild(tile);
            });

            if (isCurr && stepData.poppedPair) {
                const popTile = document.createElement('div');
                popTile.className = `tile ${tileClass} popping`;
                popTile.innerText = stepData.poppedPair;
                container.appendChild(popTile);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            A_set.forEach(a => {
                const el = document.getElementById(`node-A-${a}`);
                if(!el) return;
                
                el.className = 'node node-a';
                if (step.currMatch.some(m => m[0] === a)) el.classList.add('matched');
                if (step.complete && step.maxMatch.some(m => m[0] === a)) el.classList.add('matched');
                if (step.activeA === a && !step.complete) el.classList.add('active-a');
            });

            B_set.forEach(b => {
                const el = document.getElementById(`node-B-${b}`);
                if(!el) return;
                
                el.className = 'node node-b';
                if (step.usedB.includes(b)) el.classList.add('matched');
                if (step.complete && step.maxMatch.some(m => m[1] === b)) el.classList.add('matched');
                if (step.activeB === b && !step.complete) el.classList.add('active-b');
            });

            drawEdges(step);

            // Render Arrays
            renderArray('curr-tiles', step.currMatch, 'curr-tile', step, true);
            renderArray('max-tiles', step.maxMatch, 'max-tile', step, false);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-a').innerText = step.activeA !== null ? step.activeA : '—';
            document.getElementById('val-b').innerText = step.activeB !== null ? step.activeB : '—';
            
            let statusStr = '—';
            if (step.activeB !== null) {
                if (step.type === 'fail_used') statusStr = 'Already Used';
                else if (step.type === 'fail_edge') statusStr = 'No Graph Edge';
                else if (step.type === 'paired') statusStr = 'Matched!';
                else statusStr = 'Evaluating...';
            }
            document.getElementById('val-status').innerText = statusStr;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) resVal.classList.add('pop');
            else resVal.classList.remove('pop');

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
