<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topological Sort (DFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
            
            --state-0: #21262d; /* Unvisited */
            --state-1: #3a2a0d; /* Visiting (Orange tint) */
            --state-2: #0f2a1a; /* Processed (Green tint) */
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: var(--state-0); border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.state-1 { background: var(--state-1); border-color: var(--accent-orange); color: var(--accent-orange); box-shadow: 0 0 10px rgba(227,179,65,0.3); }
        .node.state-2 { background: var(--state-2); border-color: var(--accent-green); color: var(--accent-green); }
        
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); z-index: 3; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); color: var(--accent-purple); z-index: 2; }
        .node.cycle { background: #3a0d0d; border-color: var(--accent-red); color: var(--accent-red); animation: shake 0.4s infinite; }

        @keyframes shake {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-53%, -50%) rotate(-5deg); }
            50% { transform: translate(-50%, -50%) rotate(0deg); }
            75% { transform: translate(-47%, -50%) rotate(5deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        
        .stack-wrapper {
            display: flex; flex-direction: column-reverse; gap: 4px; align-items: center; 
            max-height: 150px; overflow-y: auto; padding: 4px; background: var(--bg-page); border: 1px inset var(--border-main); border-radius: 6px;
            min-height: 100px;
        }
        
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: var(--state-0); border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.state-1 { background: var(--state-1); border-color: var(--accent-orange); color: var(--accent-orange); }
        .tile.state-2 { background: var(--state-2); border-color: var(--accent-green); color: var(--accent-green); }
        
        .tile.stack-tile { width: 80%; min-height: 36px; background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.res-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.highlight { animation: highlightFlash 0.6s ease; }

        @keyframes pushAnim { 0%{transform:translateY(-15px); opacity:0;} 100%{transform:translateY(0); opacity:1;} }
        @keyframes highlightFlash { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.5); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); filter: brightness(1); } }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 12px var(--accent-green); transform: scale(1.1); }
        .pop-error { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 12px var(--accent-red); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="4">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1],[0,2],[1,3],[2,3]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(4, '[[0,1],[0,2],[1,3],[2,3]]')">Ex 1</button>
        <button onclick="loadExample(4, '[[0,1],[1,2],[2,3]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--text-main);">Visited States:</div>
                <div class="tiles-wrapper" id="visited-tiles"></div>
                <div style="font-size: 10px; color: var(--text-dim); margin-top: 4px;">0: Unvisited, 1: Visiting, 2: Processed</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue); text-align:center;">DFS Stack (LIFO):</div>
                <div class="stack-wrapper" id="stack-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Neighbor State</span>
            <span class="info-value" id="val-state" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">topological order (reversed stack) =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--state-0)"></span> Unvisited (0)</div>
        <div class="legend-item"><span class="dot" style="background:var(--state-1); border-color:var(--accent-orange)"></span> Visiting (1)</div>
        <div class="legend-item"><span class="dot" style="background:var(--state-2); border-color:var(--accent-green)"></span> Processed (2)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Edge</div>
        <div class="legend-item"><span class="dot" style="background:#3a0d0d; border-color:var(--accent-red)"></span> Cycle Detected</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 4;
        let edgesList = [[0,1],[0,2],[1,3],[2,3]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];

        function init() { loadExample(4, '[[0,1],[0,2],[1,3],[2,3]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                const eStr = document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']');
                edgesList = JSON.parse(eStr);
                
                if (isNaN(V_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is an integer and edges is a valid array of [u, v].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 225;
            const cy = 200;
            const radius = 130;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let adj = Array.from({length: V_count}, () => []);
            for (let [u,v] of edgesList) {
                adj[u].push(v);
            }

            let visited = new Array(V_count).fill(0); // 0: unvisited, 1: visiting, 2: processed
            let stack = [];
            let hasCycle = false;

            steps.push({
                type: 'init', visited: [...visited], stack: [...stack], result: null,
                u: null, v: null, cycleNode: null,
                panel: `<b>Topological Sort using DFS</b><br>Initialize a <code>visited</code> array with 0 (Unvisited).<br>We will perform DFS to traverse nodes, detect cycles, and push finished nodes to a Stack.`,
                statusText: `Initialization complete.`,
                log: `Initialized graph with ${V_count} vertices. Ready to start DFS.`
            });

            function dfs(u, depth) {
                let pad = "  ".repeat(depth);
                
                visited[u] = 1;
                steps.push({
                    type: 'visit', visited: [...visited], stack: [...stack], result: null,
                    u: u, v: null, cycleNode: null,
                    panel: `<code>dfs(${u})</code>: Mark Node <b>${u}</b> as <b style="color:var(--accent-orange)">1 (Visiting)</b>.<br>This means we are currently exploring its descendants.`,
                    statusText: `Exploring Node ${u}...`,
                    log: `${pad}dfs(${u}): marked state=1 (visiting).`
                });

                let neighbors = adj[u] || [];
                if (neighbors.length === 0) {
                    steps.push({
                        type: 'no_neighbors', visited: [...visited], stack: [...stack], result: null,
                        u: u, v: null, cycleNode: null,
                        panel: `Node <b>${u}</b> has no outgoing edges.`,
                        statusText: `No neighbors for Node ${u}.`,
                        log: `${pad}  Node ${u} has no neighbors.`
                    });
                }

                for (let v of neighbors) {
                    steps.push({
                        type: 'check', visited: [...visited], stack: [...stack], result: null,
                        u: u, v: v, cycleNode: null,
                        panel: `Checking neighbor <b>${v}</b> of Node <b>${u}</b>.<br>Current state of <b>${v}</b> is <b>${visited[v]}</b>.`,
                        statusText: `Evaluating edge ${u} ➔ ${v}...`,
                        log: `${pad}  Checking edge ${u}->${v}. state[${v}] = ${visited[v]}`
                    });

                    if (visited[v] === 1) {
                        hasCycle = true;
                        steps.push({
                            type: 'cycle', visited: [...visited], stack: [...stack], result: null,
                            u: u, v: v, cycleNode: v,
                            panel: `<b style="color:var(--accent-red); font-size:16px;">Cycle Detected!</b><br>Neighbor <b>${v}</b> is already in state <b>1 (Visiting)</b>!<br>This indicates a back-edge. Topological sort is impossible.`,
                            statusText: `Cycle detected! Algorithm halting.`,
                            log: `${pad}    -> ${v} is visiting! Cycle detected.`,
                            logColor: 'var(--accent-red)'
                        });
                        return false;
                    } else if (visited[v] === 0) {
                        steps.push({
                            type: 'recurse', visited: [...visited], stack: [...stack], result: null,
                            u: u, v: v, cycleNode: null,
                            panel: `Neighbor <b>${v}</b> is <b>0 (Unvisited)</b>.<br>Recursively calling <code>dfs(${v})</code>.`,
                            statusText: `Recursing into Node ${v}...`,
                            log: `${pad}    -> ${v} is unvisited. Recursing...`
                        });
                        if (!dfs(v, depth + 1)) return false;
                    } else {
                        // visited[v] === 2
                        steps.push({
                            type: 'skip', visited: [...visited], stack: [...stack], result: null,
                            u: u, v: v, cycleNode: null,
                            panel: `Neighbor <b>${v}</b> is <b>2 (Processed)</b>.<br>Its descendants are fully resolved. Skip.`,
                            statusText: `Skipping processed node ${v}.`,
                            log: `${pad}    -> ${v} is processed. Skip.`
                        });
                    }
                }

                visited[u] = 2;
                stack.push(u);
                
                steps.push({
                    type: 'finish', visited: [...visited], stack: [...stack], result: null,
                    u: u, v: null, cycleNode: null, pushed: u,
                    panel: `All descendants of Node <b>${u}</b> are resolved.<br>Mark <b>${u}</b> as <b style="color:var(--accent-green)">2 (Processed)</b> and <b>push it to the Stack</b>.`,
                    statusText: `Finished Node ${u}. Added to stack.`,
                    log: `${pad}Finished dfs(${u}). Marked state=2. Pushed to Stack.`,
                    logColor: 'var(--accent-green)'
                });

                return true;
            }

            for (let i = 0; i < V_count; i++) {
                if (visited[i] === 0) {
                    steps.push({
                        type: 'main_loop', visited: [...visited], stack: [...stack], result: null,
                        u: i, v: null, cycleNode: null,
                        panel: `<b>Main Loop:</b> Found unvisited Node <b>${i}</b>. Starting DFS from it.`,
                        statusText: `Main loop: Node ${i}.`,
                        log: `\nMain loop: found unvisited node ${i}.`
                    });
                    if (!dfs(i, 0)) break;
                }
            }

            if (hasCycle) {
                steps.push({
                    type: 'final', visited: [...visited], stack: [...stack], result: "Cycle Exists (No Order)",
                    u: null, v: null, cycleNode: null,
                    panel: `<b>Algorithm Aborted!</b><br>The graph contains a cycle. A valid topological ordering does not exist for cyclic graphs.`,
                    complete: true, isError: true,
                    statusText: `Failed: Cycle Detected.`,
                    log: `\nAlgorithm halted due to cycle.`,
                    logColor: 'var(--accent-red)'
                });
            } else {
                let resArr = [...stack].reverse();
                steps.push({
                    type: 'final', visited: [...visited], stack: [...stack], result: `[${resArr.join(', ')}]`,
                    u: null, v: null, cycleNode: null,
                    panel: `<b>Algorithm Complete!</b><br>All nodes successfully processed. Pop all nodes from the Stack (reverse it) to get the final Topological Order: <b style="color:var(--accent-green)">[${resArr.join(', ')}]</b>.`,
                    complete: true, isError: false,
                    statusText: `Algorithm Complete.`,
                    log: `\nDFS Finished. Topological Order (Reversed Stack): [${resArr.join(', ')}]`,
                    logColor: 'var(--accent-blue)'
                });
            }
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            edgesList.forEach(e => {
                const u = e[0], v = e[1];
                const p1 = nodeCoords[u], p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.u === u && step.v === v;
                let isCycle = isChecking && step.type === 'cycle';
                let isFinalCycle = step.isError && step.cycleNode === v && step.u === u; // Highlight the exact cycle edge at end

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrinkTarget = nodeRadius + 5; 
                const shrinkSource = nodeRadius + 2; 
                
                const x1 = p1.x + (dx/len)*shrinkSource; 
                const y1 = p1.y + (dy/len)*shrinkSource;
                const x2 = p2.x - (dx/len)*shrinkTarget; 
                const y2 = p2.y - (dy/len)*shrinkTarget;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);

                if (isCycle || isFinalCycle) {
                    line.setAttribute('stroke', 'var(--accent-red)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('marker-end', 'url(#arrow-active)');
                    line.setAttribute('stroke-dasharray', '6');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else if (isChecking) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('marker-end', 'url(#arrow-active)');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else {
                    line.setAttribute('stroke', 'var(--text-dim)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('marker-end', 'url(#arrow-normal)');
                    // Fade edge if both endpoints are fully processed
                    if (step.visited[u] === 2 && step.visited[v] === 2) {
                        line.setAttribute('opacity', '0.3');
                    }
                    svg.appendChild(line);
                }
            });
        }

        function renderVisitedArray(step) {
            const container = document.getElementById('visited-tiles');
            container.innerHTML = '';
            
            step.visited.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile state-${val}`;
                
                // Highlight if state just changed
                if ((step.type === 'visit' || step.type === 'finish') && step.u === i) {
                    tile.classList.add('highlight-update');
                }
                
                tile.innerText = val;
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStack(step) {
            const container = document.getElementById('stack-tiles');
            container.innerHTML = '';
            
            if (step.stack.length === 0) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:12px; margin-top:8px;">{ empty }</span>';
                return;
            }

            step.stack.forEach(val => {
                const tile = document.createElement('div');
                tile.className = 'tile stack-tile';
                if (step.pushed === val) tile.classList.add('pushing');
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = `node state-${step.visited[i]}`;
                
                if (step.u === i) el.classList.add('active-u');
                if (step.v === i) el.classList.add('active-v');
                if (step.cycleNode === i) el.classList.add('cycle');
            }

            drawEdges(step);
            renderVisitedArray(step);
            renderStack(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? step.u : '—';
            document.getElementById('val-v').innerText = step.v !== null ? step.v : '—';
            
            let stateStr = '—';
            if (step.v !== null) {
                let st = step.visited[step.v];
                if (st === 0) stateStr = '0 (Unvisited)';
                else if (st === 1) stateStr = '1 (Visiting)';
                else if (st === 2) stateStr = '2 (Processed)';
            }
            document.getElementById('val-state').innerText = stateStr;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.className = step.isError ? 'pop-error' : 'pop';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
