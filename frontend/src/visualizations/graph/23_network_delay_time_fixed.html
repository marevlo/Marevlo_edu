<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Delay Time &middot; Dijkstra</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:300px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration.fail{border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.06);}
.narration.fail::before{content:'\2717'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}
.narration .ok{color:#bbf7d0;} .narration .no{color:#fca5a5;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto;}
svg.graph{display:block; width:400px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.spt{stroke:var(--accent-green); stroke-width:3.2; filter:drop-shadow(0 0 5px rgba(34,197,94,.55));}
.edge.checking{stroke:var(--accent-purple); stroke-width:3.6; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.elabel-bg{fill:#0c1322; stroke:var(--border-main); stroke-width:1; transition:stroke .35s;}
.elabel{font-family:var(--mono); font-weight:800; font-size:12px; fill:var(--text-dim); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.edge.spt ~ .elabel{fill:#bbf7d0;}
.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode .nd{font-family:var(--mono); font-weight:700; font-size:11px; fill:#7dd3fc; text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode.source .nc{stroke:var(--accent-blue); fill:rgba(6,182,212,.08);}
.gnode.visited .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.12); filter:drop-shadow(0 0 6px rgba(34,197,94,.4));}
.gnode.visited .nl{fill:#bbf7d0;}
.gnode.activeu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.gnode.activeu .nl{fill:#ffd591;}
.gnode.activev .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 12px rgba(168,85,247,.6)); stroke-width:3;}
.gnode.activev .nl{fill:#e9d5ff;}

.side{display:flex; flex-direction:column; gap:12px; min-width:230px; flex:1 1 230px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel .cap .hint{color:var(--text-dim); font-weight:500; letter-spacing:0;}
.panel.d .cap{color:var(--accent-blue);} .panel.pq .cap{color:var(--accent-orange);}
.dist-row{display:flex; gap:7px; flex-wrap:wrap; align-content:flex-start;}
.dcell{display:flex; flex-direction:column; align-items:center; gap:4px;}
.dcell .di{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
.dval{min-width:38px; height:36px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px;
  border:1.5px solid rgba(6,182,212,.35); background:rgba(6,182,212,.10); color:#a5f3fc;
  transition:transform .3s cubic-bezier(.34,1.4,.64,1), border-color .3s, background .3s, color .3s;}
.dval.inf{border-color:var(--border-main); background:rgba(255,255,255,.04); color:var(--text-dim);}
.dval.fin{border-color:rgba(34,197,94,.45); background:rgba(34,197,94,.12); color:#bbf7d0;}
.dval.upd{border-color:rgba(34,197,94,.6); background:rgba(34,197,94,.16); color:#bbf7d0;}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:38px; align-content:flex-start;}
.tile{min-width:34px; height:36px; padding:0 9px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:13px; border:1.5px solid rgba(245,165,36,.45); background:rgba(245,165,36,.12); color:#ffd591;
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.tiles .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-orange);} .pill.n b{color:var(--accent-purple);} .pill.s b{color:var(--accent-green);} .pill.ans b{color:#a5f3fc;}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>n =</label>
  <input type="text" id="n-input" class="small-input" value="4">
  <label>k (src) =</label>
  <input type="text" id="k-input" class="small-input" value="2">
  <label>times =</label>
  <input type="text" id="t-input" class="large-input" value="[[2,1,1],[2,3,1],[3,4,1]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(4,2,'[[2,1,1],[2,3,1],[3,4,1]]')">Ex 1</button>
  <button onclick="loadExample(2,1,'[[1,2,1]]')">Ex 2</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Network Delay Time <span class="sub">&middot; Dijkstra shortest paths from source</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 400 360"></svg></div>
      <div class="side">
        <div class="panel d"><div class="cap">dist[] <span class="hint">&middot; shortest signal time</span></div><div class="dist-row" id="dist-row"></div></div>
        <div class="panel pq"><div class="cap">PRIORITY QUEUE <span class="hint">&middot; min-heap [time, node]</span></div><div class="tiles" id="pq-tiles"></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&#8592; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &#8594;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&#8592; &#8594;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">pop u = <b id="pill-u">&mdash;</b></span>
        <span class="pill n">relax v = <b id="pill-v">&mdash;</b></span>
        <span class="pill s">visited <b id="pill-cnt">0</b></span>
        <span class="pill ans">delay = <b id="pill-ans">&mdash;</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>popped u</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>relax v</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>finalized</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','dijkstra'],['src','(n, src, times):']],
  [['src','  dist = [INF]*n;  dist[src] = 0']],
  [['src','  pq = [(0, src)]']],
  [['kw','  while'],['src',' pq:']],
  [['src','    (d, u) = heappop(pq)']],
  [['kw','    if'],['src',' d > dist[u]: '],['kw','continue']],
  [['kw','    for'],['src',' (v, w) '],['kw','in'],['src',' adj[u]:']],
  [['kw','      if'],['src',' dist[u] + w < dist[v]:']],
  [['src','        dist[v] = dist[u] + w']],
  [['src','        heappush(pq, (dist[v], v))']],
  [['kw','  return'],['src',' max(dist) if all reached else -1']],
];

let N_count=4, sourceNode=2, edgesList=[[2,1,1],[2,3,1],[3,4,1]];
let coord={}, adj={};
let steps=[], stepIndex=0, timer=null;
const delays=[1900,1000,520];
const gnodes={};
let confettiArmed=true;
const INF=Infinity;
const fmt=v=>v===INF?'&#8734;':v;
const fmtLog=v=>v===INF?'INF':v;

function init(){ buildCode(); loadExample(4,2,'[[2,1,1],[2,3,1],[3,4,1]]'); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(n,k,eStr){ document.getElementById('n-input').value=n; document.getElementById('k-input').value=k; document.getElementById('t-input').value=eStr; parseAndGen(); }
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    N_count=parseInt(document.getElementById('n-input').value,10);
    sourceNode=parseInt(document.getElementById('k-input').value,10);
    edgesList=JSON.parse(document.getElementById('t-input').value);
    if(isNaN(N_count)||isNaN(sourceNode)||!Array.isArray(edgesList)) throw 'bad';
    adj={}; for(let i=1;i<=N_count;i++) adj[i]=[];
    for(const e of edgesList){ const u=e[0],v=e[1],w=e[2]; if(adj[u]) adj[u].push({v,w}); }
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid format. n and k must be integers; times a valid array of [u, v, w].'); }
}
function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; coord={}; for(const k in gnodes) delete gnodes[k];
  const cx=200, cy=180, R=Math.min(130, 56+N_count*11);
  for(let i=1;i<=N_count;i++){ const ang=(Math.PI*2*(i-1))/N_count - Math.PI/2; coord[i]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)}; }
  // arrowhead defs
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML=`
    <marker id="ah-n" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="${'#5a6685'}"/></marker>
    <marker id="ah-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#a855f7"/></marker>
    <marker id="ah-s" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#22c55e"/></marker>`;
  svg.appendChild(defs);
  // edges first (directed + weighted), persistent by id
  const nr=22;
  edgesList.forEach((e,i)=>{
    const u=e[0],v=e[1],w=e[2]; const p1=coord[u],p2=coord[v]; if(!p1||!p2) return;
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1;
    const x1=p1.x+(dx/len)*(nr+2), y1=p1.y+(dy/len)*(nr+2);
    const x2=p2.x-(dx/len)*(nr+8), y2=p2.y-(dy/len)*(nr+8);
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line'); ln.setAttribute('class','edge'); ln.id='e'+i;
    ln.setAttribute('x1',x1); ln.setAttribute('y1',y1); ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
    ln.setAttribute('marker-end','url(#ah-n)'); ln.dataset.u=u; ln.dataset.v=v; svg.appendChild(ln);
    // weight label with bg, offset perpendicular to reduce overlap on bidirectional edges
    const mx=(x1+x2)/2, my=(y1+y2)/2; const px=-dy/len, py=dx/len; const off=10;
    const lx=mx+px*off, ly=my+py*off;
    const bg=document.createElementNS('http://www.w3.org/2000/svg','rect'); bg.setAttribute('class','elabel-bg');
    bg.setAttribute('x',lx-11); bg.setAttribute('y',ly-9); bg.setAttribute('width',22); bg.setAttribute('height',18); bg.setAttribute('rx',4); bg.id='eb'+i;
    const tx=document.createElementNS('http://www.w3.org/2000/svg','text'); tx.setAttribute('class','elabel');
    tx.setAttribute('x',lx); tx.setAttribute('y',ly); tx.textContent=w; tx.id='et'+i;
    svg.appendChild(bg); svg.appendChild(tx);
  });
  // nodes on top
  for(let i=1;i<=N_count;i++){ const p=coord[i];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode'); g.id='gn'+i;
    if(i===sourceNode) g.classList.add('source');
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',20);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y-4); t.textContent=i;
    const dt=document.createElementNS('http://www.w3.org/2000/svg','text'); dt.setAttribute('class','nd'); dt.setAttribute('x',p.x); dt.setAttribute('y',p.y+11); dt.id='gd'+i; dt.textContent='∞';
    g.appendChild(c); g.appendChild(t); g.appendChild(dt); svg.appendChild(g); gnodes[i]=g; }
}

function generateSteps(){
  steps=[];
  let dist=new Array(N_count+1).fill(INF);
  let visited=new Array(N_count+1).fill(false);
  let parent=new Array(N_count+1).fill(-1);
  let pq=[]; let spt=new Set();
  function snap(o){ steps.push({
    dist:[...dist], visited:[...visited], pq:pq.map(it=>({...it})), spt:new Set(spt),
    u:o.u??null, v:o.v??null, w:o.w??null, upd:o.upd??null, pushed:o.pushed??null,
    code:o.code, narr:o.narr, log:o.log, complete:o.complete??false, fail:o.fail??false, ans:o.ans??null }); }

  if(!adj[sourceNode]){
    snap({code:[0], narr:`Source <code>${sourceNode}</code> is not a valid node in <code>1..${N_count}</code>. Result is <b class="no">&minus;1</b>.`,
      log:`invalid source ${sourceNode}`, complete:true, fail:true, ans:-1});
    return;
  }

  dist[sourceNode]=0; pq.push({d:0,u:sourceNode});
  snap({code:[1,2], pushed:sourceNode,
    narr:`<b>Dijkstra</b> from source <code>${sourceNode}</code>. Set <code>dist[${sourceNode}]=0</code>, all others <code>&#8734;</code>, and push <code>[0, ${sourceNode}]</code>.`,
    log:`init: dist[${sourceNode}]=0  pq=[[0,${sourceNode}]]`});

  while(pq.length){
    pq.sort((a,b)=>a.d-b.d || a.u-b.u);
    const cur=pq.shift(); const u=cur.u, d=cur.d;
    snap({code:[4], u,
      narr:`Pop the min entry <code>[${d}, ${u}]</code> from the heap &mdash; the smallest tentative time.`,
      log:`pop [${d}, ${u}]`});

    if(d>dist[u]){
      snap({code:[5], u,
        narr:`Stale entry: popped time <code>${d}</code> &gt; <code>dist[${u}]=${fmt(dist[u])}</code>. <span class="no">Skip.</span>`,
        log:`  stale (${d} > ${fmtLog(dist[u])}), skip`});
      continue;
    }

    visited[u]=true; if(parent[u]!==-1) spt.add(`${parent[u]}-${u}`);
    snap({code:[5], u,
      narr:`Signal finalizes at node <code>${u}</code> at time <b>${d}</b>. Mark it done; relax its outgoing edges.`,
      log:`  finalize node ${u} at time ${d}`});

    const nb=adj[u]||[];
    for(const {v,w} of nb){
      const nt=dist[u]+w;
      snap({code:[6,7], u, v, w,
        narr:`Edge <code>${u} &rarr; ${v}</code> (w=<b>${w}</b>): arrival <code>dist[${u}]+${w} = ${nt}</code>. Is <code>${nt} &lt; dist[${v}]=${fmt(dist[v])}</code>?`,
        log:`    relax ${u}->${v} (w=${w}): ${dist[u]}+${w} < ${fmtLog(dist[v])}?`});
      if(nt<dist[v]){
        dist[v]=nt; parent[v]=u; const it={d:nt,u:v}; pq.push(it);
        snap({code:[8,9], u, v, w, upd:v, pushed:v,
          narr:`<span class="ok">Yes &mdash; shorter.</span> Set <code>dist[${v}]=${nt}</code> and push <code>[${nt}, ${v}]</code>.`,
          log:`      update dist[${v}]=${nt}, push [${nt}, ${v}]`});
      } else {
        snap({code:[7], u, v, w,
          narr:`<span class="no">No.</span> Existing <code>dist[${v}]=${fmt(dist[v])}</code> is already &le; <code>${nt}</code>. Keep it.`,
          log:`      no update for ${v}`});
      }
    }
  }

  let mx=0, unreachable=false;
  for(let i=1;i<=N_count;i++){ if(dist[i]===INF) unreachable=true; else mx=Math.max(mx,dist[i]); }
  const finalAns=unreachable?-1:mx;
  if(unreachable){
    const miss=[]; for(let i=1;i<=N_count;i++) if(dist[i]===INF) miss.push(i);
    snap({code:[10],
      narr:`Heap empty. Node(s) <code>${miss.join(', ')}</code> never received the signal &rarr; return <b class="no">&minus;1</b>.`,
      log:`done. unreachable: [${miss.join(', ')}]  ->  -1`,
      complete:true, fail:true, ans:-1});
  } else {
    snap({code:[10],
      narr:`Heap empty &mdash; all nodes reached. Delay = <b>max</b> of <code>dist[] = [${dist.slice(1).map(fmtLog).join(', ')}]</code> = <b class="ok">${mx}</b>.`,
      log:`done. dist=[${dist.slice(1).map(fmtLog).join(', ')}]  ->  ${mx}`,
      complete:true, ans:mx});
  }
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const vis=step.visited;
  // nodes
  for(let i=1;i<=N_count;i++){ const g=gnodes[i]; if(!g) continue;
    g.classList.remove('visited','activeu','activev');
    if(vis[i]) g.classList.add('visited');
    if(step.u===i) g.classList.add('activeu');
    if(step.v===i) g.classList.add('activev');
    const dl=document.getElementById('gd'+i); if(dl){ dl.textContent = step.dist[i]===INF?'∞':String(step.dist[i]); }
    if(step.pushed===i){ const c=g.querySelector('.nc'); if(c) Motion.pop(c); }
  }
  // edges: re-derive highlight from step
  document.querySelectorAll('.edge').forEach(ln=>{ ln.classList.remove('spt','checking');
    const u=+ln.dataset.u, v=+ln.dataset.v;
    const checking = step.u!=null && step.v!=null && step.u===u && step.v===v;
    if(checking) { ln.classList.add('checking'); ln.setAttribute('marker-end','url(#ah-a)'); }
    else if(step.spt.has(`${u}-${v}`)) { ln.classList.add('spt'); ln.setAttribute('marker-end','url(#ah-s)'); }
    else ln.setAttribute('marker-end','url(#ah-n)');
  });

  fillDist(step); fillPQ(step);

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done', step.complete && !step.fail);
  narr.classList.toggle('fail', step.complete && step.fail);
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });
  document.getElementById('pill-u').textContent=step.u!=null?step.u:'—';
  document.getElementById('pill-v').textContent=step.v!=null?step.v:'—';
  let vc=0; for(let i=1;i<=N_count;i++) if(step.visited[i]) vc++;
  document.getElementById('pill-cnt').textContent=vc;
  document.getElementById('pill-ans').textContent = step.complete ? (step.ans===-1?'−1':step.ans) : '—';
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;
  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const dv=document.createElement('div'); dv.textContent=steps[k].log;
    if(steps[k].complete) dv.style.color = steps[k].fail ? 'var(--accent-red)' : 'var(--accent-green)'; log.appendChild(dv);} }
  log.scrollTop=log.scrollHeight;
  if(step.complete && !step.fail){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fillDist(step){
  const c=document.getElementById('dist-row'); c.innerHTML='';
  for(let i=1;i<=N_count;i++){
    const cell=document.createElement('div'); cell.className='dcell';
    const val=document.createElement('div'); val.className='dval';
    const d=step.dist[i];
    if(d===INF) val.classList.add('inf');
    else if(step.visited[i]) val.classList.add('fin');
    if(step.upd===i){ val.classList.add('upd'); }
    val.innerHTML=fmt(d);
    const lab=document.createElement('div'); lab.className='di'; lab.textContent='['+i+']';
    cell.appendChild(val); cell.appendChild(lab); c.appendChild(cell);
    if(step.upd===i) Motion.pop(val);
  }
}
function fillPQ(step){
  const c=document.getElementById('pq-tiles'); c.innerHTML='';
  const disp=[...step.pq].sort((a,b)=>a.d-b.d || a.u-b.u);
  if(!disp.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; c.appendChild(e); return; }
  disp.forEach(it=>{ const t=document.createElement('div'); t.className='tile'; t.textContent='['+it.d+', '+it.u+']';
    c.appendChild(t); if(step.pushed===it.u && step.pushed!=null && it.d===step.dist[it.u]) Motion.pop(t); });
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
