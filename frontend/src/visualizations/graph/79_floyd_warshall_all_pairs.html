<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floyd-Warshall Algorithm - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 400px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 420px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 2;
        }
        
        .node.active-k { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 5; color: var(--accent-orange); background: #332200; }
        .node.active-i { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-blue); border-color: var(--accent-blue); z-index: 4; color: var(--accent-blue); }
        .node.active-j { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 3; color: var(--accent-purple); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 320px; max-width: 400px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 16px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px; align-items: center;}
        
        .matrix {
            display: grid;
            gap: 4px;
        }
        
        .matrix-cell {
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 1px solid var(--border-main);
            border-radius: 4px; font-family: 'Courier New', monospace; font-size: 14px;
            color: var(--text-main); transition: all 0.3s;
        }

        .matrix-hdr {
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            background: transparent; border: none;
            color: var(--text-dim); font-family: monospace; font-size: 12px; font-weight: bold;
        }

        .matrix-cell.ik { border-color: var(--accent-blue); box-shadow: inset 0 0 8px rgba(56,139,253,0.5); color: var(--accent-blue); }
        .matrix-cell.kj { border-color: var(--accent-orange); box-shadow: inset 0 0 8px rgba(227,179,65,0.5); color: var(--accent-orange); }
        .matrix-cell.ij { border-color: var(--accent-purple); box-shadow: inset 0 0 8px rgba(163,113,247,0.5); color: var(--accent-purple); transform: scale(1.1); z-index: 10;}
        .matrix-cell.updated { background: rgba(63,185,80,0.2); border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); font-weight: bold;}

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 850px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 850px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 850px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        .edge-label { font-family: monospace; font-weight: bold; font-size: 11px; text-anchor: middle; dominant-baseline: central; fill: var(--text-main); }
        .edge-bg { fill: var(--bg-surface); stroke: var(--border-main); stroke-width: 1px; rx: 4px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="4">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1,1],[1,2,1],[2,3,1],[0,3,5]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(4, '[[0,1,1],[1,2,1],[2,3,1],[0,3,5]]')">Ex 1</button>
        <button onclick="loadExample(3, '[[0,1,2],[1,2,3],[0,2,10]]')">Ex 2</button>
        <button onclick="loadExample(4, '[[0,1,3],[1,2,1],[2,0,1],[2,3,2]]')">Ex 3</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-blue" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-blue)" />
                    </marker>
                    <marker id="arrow-orange" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-orange)" />
                    </marker>
                    <marker id="arrow-purple" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                    <marker id="arrow-green" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-green)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue); margin-bottom: 8px;">Distance Matrix (dist):</div>
                <div class="matrix" id="matrix-container"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Intermediate Node (k)</span>
            <span class="info-value" id="val-k" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Source Node (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Target Node (j)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Relaxation Condition</span>
            <span class="info-value" id="val-cond" style="color: var(--text-main); font-size:13px;">dist[i][k] + dist[k][j] < dist[i][j]</span>
        </div>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Interm. Node (k)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-blue); border-width:2px;"></span> Source Node (i)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Target Node (j)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-blue); border-style:dashed;"></span> Path i ➔ k</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-style:dashed;"></span> Path k ➔ j</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-green); border-style:dashed;"></span> Relaxed Path i ➔ j</div>
    </div>

    <script>
        let V_count = 4;
        let edgesList = [[0,1,1],[1,2,1],[2,3,1],[0,3,5]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];
        const INF = Infinity;

        function init() { loadExample(4, '[[0,1,1],[1,2,1],[2,3,1],[0,3,5]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                if (V_count > 6) {
                    alert("For visualization purposes, V should be <= 6.");
                    return;
                }

                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is an integer and edges is a valid array of [u, v, w].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 225;
            const cy = 210;
            const radius = 140;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function formatDist(val) { return val === INF ? '∞' : val; }
        function cloneMatrix(mat) { return mat.map(row => [...row]); }

        function generateSteps() {
            steps = [];
            
            let dist = Array.from({length: V_count}, () => new Array(V_count).fill(INF));
            for (let i=0; i<V_count; i++) dist[i][i] = 0;
            for (let [u, v, w] of edgesList) dist[u][v] = w; // Directed edges assumed

            steps.push({
                type: 'init', dist: cloneMatrix(dist), k: null, i: null, j: null,
                panel: `<b>Floyd-Warshall Algorithm (All-Pairs Shortest Path)</b><br>Initialize the distance matrix with direct edge weights.<br>Diagonal elements are 0. Non-existent edges are ∞.`,
                statusText: `Initialization complete.`
            });

            for (let k = 0; k < V_count; k++) {
                steps.push({
                    type: 'k_start', k: k, i: null, j: null, dist: cloneMatrix(dist),
                    panel: `<b>Phase k = ${k}</b><br>We will now consider node <b style="color:var(--accent-orange)">${k}</b> as an intermediate vertex.<br>We check if any path <code>i ➔ j</code> can be shortened by going through <code>${k}</code>.`,
                    statusText: `Starting Phase k=${k}.`
                });

                for (let i = 0; i < V_count; i++) {
                    for (let j = 0; j < V_count; j++) {
                        if (i === j || i === k || j === k) continue; // Skip trivial

                        let dik = dist[i][k];
                        let dkj = dist[k][j];
                        let dij = dist[i][j];

                        if (dik !== INF && dkj !== INF) {
                            let sum = dik + dkj;
                            
                            steps.push({
                                type: 'eval', k: k, i: i, j: j, dist: cloneMatrix(dist),
                                panel: `Evaluating path <b style="color:var(--accent-blue)">${i}</b> ➔ <b style="color:var(--accent-orange)">${k}</b> ➔ <b style="color:var(--accent-purple)">${j}</b>.<br>Is <code>dist[${i}][${k}] + dist[${k}][${j}] < dist[${i}][${j}]</code>?<br>(<code>${dik} + ${dkj} < ${formatDist(dij)}</code>)`,
                                statusText: `Evaluating path ${i}➔${k}➔${j}...`
                            });

                            if (sum < dij) {
                                dist[i][j] = sum;
                                steps.push({
                                    type: 'relax', k: k, i: i, j: j, dist: cloneMatrix(dist),
                                    panel: `<b style="color:var(--accent-green)">Yes! Shorter path found.</b><br>Update <code>dist[${i}][${j}] = ${sum}</code>.`,
                                    statusText: `Relaxed path ${i}➔${j}.`
                                });
                            }
                        }
                    }
                }
            }

            steps.push({
                type: 'final', dist: cloneMatrix(dist), k: null, i: null, j: null,
                panel: `<b>Algorithm Complete!</b><br>All intermediate vertices have been processed.<br>The matrix now contains the all-pairs shortest path distances.`,
                statusText: `Algorithm Finished.`,
                complete: true
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            // Draw original static edges faint
            edgesList.forEach(e => {
                const u = e[0], v = e[1], w = e[2];
                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrink = nodeRadius + 2; 

                const x1 = p1.x + (dx/len)*shrink; 
                const y1 = p1.y + (dy/len)*shrink;
                const x2 = p2.x - (dx/len)*shrink; 
                const y2 = p2.y - (dy/len)*shrink;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);
                line.setAttribute('stroke', 'var(--border-main)');
                line.setAttribute('stroke-width', '2');
                line.setAttribute('opacity', '0.3');
                svg.appendChild(line);
            });

            // Draw active evaluation paths using quadratic bezier curves for distinction
            if (step.k !== null && step.i !== null && step.j !== null) {
                
                function drawPath(u, v, color, dash, marker) {
                    const p1 = nodeCoords[u];
                    const p2 = nodeCoords[v];
                    if(!p1 || !p2) return;

                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const len = Math.hypot(dx, dy);
                    const shrinkTarget = nodeRadius + 6; 
                    const shrinkSource = nodeRadius + 2; 

                    // Offset curve based on nodes to avoid straight overlap
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const nx = -dy / len;
                    const ny = dx / len;
                    const curveOffset = 30; // Curve amount
                    const cx = midX + nx * curveOffset;
                    const cy = midY + ny * curveOffset;

                    const x1 = p1.x + (dx/len)*shrinkSource; 
                    const y1 = p1.y + (dy/len)*shrinkSource;
                    const x2 = p2.x - (dx/len)*shrinkTarget; 
                    const y2 = p2.y - (dy/len)*shrinkTarget;

                    const dStr = `M ${x1},${y1} Q ${cx},${cy} ${x2},${y2}`;

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', dStr);
                    path.setAttribute('fill', 'transparent');
                    path.setAttribute('stroke', color);
                    path.setAttribute('stroke-width', '4');
                    path.setAttribute('stroke-dasharray', dash);
                    path.setAttribute('marker-end', `url(#${marker})`);
                    
                    if (step.type === 'eval') {
                        path.classList.add('line-anim');
                    }

                    svg.appendChild(path);

                    // Add Weight Label
                    let w = step.dist[u][v];
                    if (w !== INF) {
                        const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        bg.setAttribute('x', cx - 14);
                        bg.setAttribute('y', cy - 9);
                        bg.setAttribute('width', 28);
                        bg.setAttribute('height', 18);
                        bg.setAttribute('fill', 'var(--bg-surface)');
                        bg.setAttribute('stroke', color);
                        bg.setAttribute('rx', '4');
                        
                        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        txt.setAttribute('x', cx);
                        txt.setAttribute('y', cy);
                        txt.setAttribute('fill', color);
                        txt.setAttribute('class', 'edge-label');
                        txt.textContent = w;

                        svg.appendChild(bg);
                        svg.appendChild(txt);
                    }
                }

                // Draw i->k and k->j
                drawPath(step.i, step.k, 'var(--accent-blue)', '6', 'arrow-blue');
                drawPath(step.k, step.j, 'var(--accent-orange)', '6', 'arrow-orange');
                
                // Draw i->j target
                if (step.type === 'relax') {
                    drawPath(step.i, step.j, 'var(--accent-green)', '8', 'arrow-green');
                } else if (step.type === 'eval') {
                    drawPath(step.i, step.j, 'var(--accent-purple)', '4', 'arrow-purple');
                }
            }
        }

        function renderMatrix(step) {
            const container = document.getElementById('matrix-container');
            container.innerHTML = '';
            container.style.gridTemplateColumns = `30px repeat(${V_count}, 44px)`;
            
            // Top Header
            let empty = document.createElement('div');
            container.appendChild(empty);
            for(let c=0; c<V_count; c++) {
                let hdr = document.createElement('div');
                hdr.className = 'matrix-hdr';
                hdr.innerText = c;
                container.appendChild(hdr);
            }

            for(let r=0; r<V_count; r++) {
                // Row Header
                let hdr = document.createElement('div');
                hdr.className = 'matrix-hdr';
                hdr.innerText = r;
                container.appendChild(hdr);

                for(let c=0; c<V_count; c++) {
                    let cell = document.createElement('div');
                    cell.className = 'matrix-cell';
                    cell.innerText = formatDist(step.dist[r][c]);

                    if (step.k !== null) {
                        if (step.type === 'eval' && r === step.i && c === step.k) cell.classList.add('ik');
                        if (step.type === 'eval' && r === step.k && c === step.j) cell.classList.add('kj');
                        
                        if (r === step.i && c === step.j) {
                            if (step.type === 'eval') cell.classList.add('ij');
                            if (step.type === 'relax') cell.classList.add('updated');
                        }
                    }
                    
                    container.appendChild(cell);
                }
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (step.k === i && !step.complete && step.type !== 'init') el.classList.add('active-k');
                else if (step.i === i && !step.complete) el.classList.add('active-i');
                else if (step.j === i && !step.complete) el.classList.add('active-j');
            }

            drawEdges(step);
            renderMatrix(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-k').innerText = step.k !== null ? `${step.k}` : '—';
            document.getElementById('val-i').innerText = step.i !== null ? `${step.i}` : '—';
            document.getElementById('val-j').innerText = step.j !== null ? `${step.j}` : '—';

            let eqStr = 'dist[i][k] + dist[k][j] < dist[i][j]';
            if (step.i !== null && step.k !== null && step.j !== null) {
                let dik = step.dist[step.i][step.k] === INF ? '∞' : step.dist[step.i][step.k];
                let dkj = step.dist[step.k][step.j] === INF ? '∞' : step.dist[step.k][step.j];
                
                // Need previous dij if it relaxed, but we overwrite in generateSteps.
                // We'll just show the condition conceptually.
                let dij = step.type === 'relax' ? '...' : (step.dist[step.i][step.j] === INF ? '∞' : step.dist[step.i][step.j]);
                eqStr = `${dik} + ${dkj} < ${dij}`;
            }
            document.getElementById('val-cond').innerText = eqStr;

            document.getElementById('status-text').innerText = step.statusText;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
