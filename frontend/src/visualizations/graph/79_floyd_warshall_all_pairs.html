<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floyd-Warshall All-Pairs Shortest Paths - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* intermediate k path k->j        */
            --accent-blue:   #06b6d4;   /* source i / path i->k            */
            --accent-green:  #22c55e;   /* improved / relaxed cell         */
            --accent-red:    #f85149;   /* (reserved)                      */
            --accent-purple: #a855f7;   /* target j / cell i,j             */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 130px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"].small-input { width: 54px; text-align: center; }
        input[type="text"].med-input { width: 290px; }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; flex-shrink: 0; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .grid-stage { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; padding: 26px 22px; display: flex; justify-content: center; align-items: center; gap: 34px; flex-wrap: wrap; }
        .grid-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .grid-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        /* -- graph area -- */
        .graph-area { position: relative; width: 360px; height: 340px; flex-shrink: 0; }
        #edges-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: visible; }
        .nodes-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .node {
            position: absolute; width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: 800; font-size: 16px; font-family: var(--mono);
            transform: translate(-50%, -50%); transition: all 0.3s ease; z-index: 2; will-change: transform;
        }
        .node.active-k { transform: translate(-50%, -50%) scale(1.18); box-shadow: 0 0 18px rgba(245,165,36,0.6); border-color: var(--accent-orange); z-index: 5; color: #2a1903; background: var(--accent-orange); }
        .node.active-i { transform: translate(-50%, -50%) scale(1.12); box-shadow: 0 0 14px rgba(6,182,212,0.55); border-color: var(--accent-blue); z-index: 4; color: #a5f3fc; background: rgba(6,182,212,0.18); }
        .node.active-j { transform: translate(-50%, -50%) scale(1.12); box-shadow: 0 0 14px rgba(168,85,247,0.55); border-color: var(--accent-purple); z-index: 3; color: #e9d5ff; background: rgba(168,85,247,0.18); }

        .edge-line { transition: opacity 0.3s, stroke 0.3s, stroke-width 0.3s; }
        .edge-weight { font-family: var(--mono); font-weight: 700; font-size: 11px; text-anchor: middle; dominant-baseline: central; }
        .relax-path { opacity: 0; transition: opacity 0.3s; }
        .relax-path.show { opacity: 1; }
        @keyframes dashflow { to { stroke-dashoffset: -16; } }
        .relax-path.flow { animation: dashflow 0.7s linear infinite; }

        /* -- distance matrix -- */
        .matrix-block { display: flex; flex-direction: column; gap: 10px; }
        .matrix-title { font-family: var(--mono); font-size: 11px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); text-align: center; }
        .matrix { display: grid; gap: 5px; }
        .matrix-hdr {
            width: 44px; height: 26px; display: flex; align-items: center; justify-content: center;
            background: transparent; border: none; color: var(--text-dim);
            font-family: var(--mono); font-size: 12px; font-weight: 800; transition: color 0.3s;
        }
        .matrix-hdr.lit-k { color: var(--accent-orange); }
        .matrix-hdr.corner { font-size: 10px; color: #4b5772; }
        .matrix-cell {
            position: relative; width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.04); border: 2px solid var(--border-main);
            border-radius: 9px; font-family: var(--mono); font-size: 16px; font-weight: 800;
            color: var(--text-main); will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .matrix-cell.diag { color: var(--text-dim); background: rgba(255,255,255,0.02); }
        .matrix-cell.inf { color: #4b5772; font-size: 18px; }
        .matrix-cell.krow { background: rgba(245,165,36,0.08); }
        .matrix-cell.kcol { background: rgba(245,165,36,0.08); }
        .matrix-cell.ik { border-color: var(--accent-blue); box-shadow: 0 0 12px rgba(6,182,212,0.4); color: #a5f3fc; }
        .matrix-cell.kj { border-color: var(--accent-orange); box-shadow: 0 0 12px rgba(245,165,36,0.4); color: #ffd591; }
        .matrix-cell.ij { border-color: var(--accent-purple); box-shadow: 0 0 14px rgba(168,85,247,0.5); color: #e9d5ff; transform: scale(1.08); z-index: 10; }
        .matrix-cell.updated { background: rgba(34,197,94,0.18); border-color: var(--accent-green); color: #86efac; transform: scale(1.12); z-index: 11; box-shadow: 0 0 18px rgba(34,197,94,0.5); }
        .matrix-cell.frozen { border-color: rgba(34,197,94,0.45); background: rgba(34,197,94,0.06); }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 18px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.k b { color: var(--accent-orange); } .pill.i b { color: var(--accent-blue); } .pill.j b { color: var(--accent-purple); } .pill.u b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 120px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        /* confetti */
        .confetti-piece { position: fixed; width: 9px; height: 14px; top: -20px; z-index: 999; pointer-events: none; border-radius: 2px; }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="4">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1,1],[1,2,1],[2,3,1],[0,3,5]]">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(4, '[[0,1,1],[1,2,1],[2,3,1],[0,3,5]]')">Ex 1</button>
        <button onclick="loadExample(3, '[[0,1,2],[1,2,3],[0,2,10]]')">Ex 2</button>
        <button onclick="loadExample(4, '[[0,1,3],[1,2,1],[2,0,1],[2,3,2]]')">Ex 3</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Floyd&minus;Warshall <span class="sub">&middot; all-pairs shortest paths &middot; relax dist[i][j] = min(dist[i][j], dist[i][k]+dist[k][j]) &middot; O(V&sup3;)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="grid-stage" id="grid-stage">
                    <div class="graph-area" id="graph-area">
                        <svg id="edges-svg">
                            <defs>
                                <marker id="arrow-faint" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.28)" /></marker>
                                <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4" /></marker>
                                <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f5a524" /></marker>
                                <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7" /></marker>
                                <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e" /></marker>
                            </defs>
                            <g id="static-edges"></g>
                            <g id="active-paths"></g>
                        </svg>
                        <div class="nodes-container" id="nodes-container"></div>
                    </div>
                    <div class="matrix-block">
                        <div class="matrix-title">Distance Matrix dist[i][j]</div>
                        <div class="matrix" id="matrix-container"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill k">k (via) <b id="st-k">&mdash;</b></span>
                            <span class="pill i">i (from) <b id="st-i">&mdash;</b></span>
                            <span class="pill j">j (to) <b id="st-j">&mdash;</b></span>
                            <span class="pill u">relaxations <b id="st-relax">0</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // --------- Motion engine (spring pop, zero deps) ---------
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.6 + 0.4 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // --------- State ---------
        let V_count = 4;
        let edgesList = [[0,1,1],[1,2,1],[2,3,1],[0,3,5]];
        let nodeCoords = {};
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        const delays = [2400, 1200, 600];
        const INF = Infinity;
        const cellEls = {};   // 'r,c' -> matrix cell element
        const nodeEls = {};   // i -> node element
        const colHdrEls = {}; // c -> column header
        const rowHdrEls = {}; // r -> row header

        // --------- Code panel (the real algorithm) ---------
        const CODE = [
            [['kw','def '],['fn','floyd_warshall'],['src','(dist):  # V x V']],
            [['kw','  for '],['src','k '],['kw','in '],['src','range(V):']],
            [['kw','    for '],['src','i '],['kw','in '],['src','range(V):']],
            [['kw','      for '],['src','j '],['kw','in '],['src','range(V):']],
            [['src','        new = dist[i][k] + dist[k][j]']],
            [['kw','        if '],['src','new < dist[i][j]:']],
            [['src','          dist[i][j] = new']],
            [['kw','  return '],['src','dist']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // --------- step generation (genuine Floyd-Warshall) ---------
        function cloneMatrix(mat) { return mat.map(row => row.slice()); }
        function fmt(val) { return val === INF ? '∞' : val; }

        function generateSteps() {
            steps = [];
            let relaxCount = 0;

            let dist = Array.from({length: V_count}, () => new Array(V_count).fill(INF));
            for (let i = 0; i < V_count; i++) dist[i][i] = 0;
            for (const [u, v, w] of edgesList) if (u < V_count && v < V_count) dist[u][v] = w;

            const snap = (extra) => Object.assign({
                dist: cloneMatrix(dist), k: null, i: null, j: null,
                dik: null, dkj: null, dij: null, newVal: null,
                code: [], relaxCount, complete: false,
            }, extra);

            steps.push(snap({
                code: [0],
                panel: `<b>Floyd&minus;Warshall.</b> Build the <b>${V_count}&times;${V_count}</b> distance matrix from direct edge weights. Diagonals are <code>0</code>; missing edges are <code>&infin;</code>. Then relax every pair through each intermediate vertex k.`,
                log: `init ${V_count}x${V_count} matrix from ${edgesList.length} directed edge${edgesList.length===1?'':'s'}`
            }));

            for (let k = 0; k < V_count; k++) {
                steps.push(snap({
                    code: [1], k,
                    panel: `<b>Phase k = ${k}.</b> Consider vertex <code>${k}</code> as an intermediate hop. For every pair <code>(i, j)</code> test whether routing through <code>${k}</code> is shorter: <code>dist[i][${k}]+dist[${k}][j]</code>.`,
                    log: `--- phase k = ${k} ---`
                }));

                for (let i = 0; i < V_count; i++) {
                    for (let j = 0; j < V_count; j++) {
                        if (i === j || i === k || j === k) continue;
                        const dik = dist[i][k], dkj = dist[k][j], dij = dist[i][j];
                        if (dik === INF || dkj === INF) continue; // path via k impossible; nothing to show
                        const sum = dik + dkj;

                        steps.push(snap({
                            code: [4, 5], k, i, j, dik, dkj, dij, newVal: sum,
                            panel: `Test <code>${i}&#8594;${k}&#8594;${j}</code>: is <code>dist[${i}][${k}]+dist[${k}][${j}] &lt; dist[${i}][${j}]</code>? &nbsp;<code>${dik}+${dkj} = ${sum}</code> vs <code>${fmt(dij)}</code>.`,
                            log: `eval ${i}->${k}->${j}: ${dik}+${dkj}=${sum} vs dist[${i}][${j}]=${fmt(dij)}`
                        }));

                        if (sum < dij) {
                            dist[i][j] = sum; relaxCount++;
                            steps.push(snap({
                                code: [6], k, i, j, dik, dkj, dij, newVal: sum, relaxed: true, relaxCount,
                                panel: `<b style="color:#86efac">Shorter!</b> <code>${sum} &lt; ${fmt(dij)}</code> &#8594; set <code>dist[${i}][${j}] = ${sum}</code>. The path <code>${i}&#8594;${j}</code> now goes via <code>${k}</code>.`,
                                log: `relax  dist[${i}][${j}] = ${sum}  (was ${fmt(dij)})`,
                                logColor: 'var(--accent-green)'
                            }));
                        }
                    }
                }
            }

            steps.push(snap({
                code: [7], complete: true,
                panel: `<b>Done.</b> Every pair has been relaxed through all <code>${V_count}</code> intermediate vertices. The matrix now holds the shortest distance between every ordered pair (<code>&infin;</code> = unreachable). Total relaxations: <b>${relaxCount}</b>.`,
                log: `complete: all-pairs shortest paths ready (${relaxCount} relaxations)`,
                logColor: 'var(--accent-orange)'
            }));
        }

        // --------- build persistent DOM (once per input-load) ---------
        function nodeRadius() { return 21; }

        function buildGraphDom() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            Object.keys(nodeEls).forEach(k => delete nodeEls[k]);
            nodeCoords = {};
            const cx = 180, cy = 165, radius = 128;
            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = { x, y };
                const node = document.createElement('div');
                node.className = 'node'; node.id = `node-${i}`;
                node.style.left = `${x}px`; node.style.top = `${y}px`;
                node.textContent = i;
                container.appendChild(node);
                nodeEls[i] = node;
            }
            buildStaticEdges();
        }

        function curvePoints(u, v) {
            const p1 = nodeCoords[u], p2 = nodeCoords[v];
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const len = Math.hypot(dx, dy) || 1;
            const r = nodeRadius() + 3;
            // curve if a reverse edge exists, else slight curve for clarity
            const hasReverse = edgesList.some(e => e[0] === v && e[1] === u);
            const off = hasReverse ? 26 : 0;
            const nx = -dy / len, ny = dx / len;
            const mx = (p1.x + p2.x) / 2 + nx * off;
            const my = (p1.y + p2.y) / 2 + ny * off;
            const x1 = p1.x + (dx / len) * r, y1 = p1.y + (dy / len) * r;
            const x2 = p2.x - (dx / len) * r, y2 = p2.y - (dy / len) * r;
            return { x1, y1, x2, y2, cx: mx, cy: my };
        }

        const SVGNS = 'http://www.w3.org/2000/svg';
        function buildStaticEdges() {
            const g = document.getElementById('static-edges'); g.innerHTML = '';
            edgesList.forEach((e, idx) => {
                const [u, v, w] = e;
                if (u >= V_count || v >= V_count) return;
                const cp = curvePoints(u, v);
                const path = document.createElementNS(SVGNS, 'path');
                path.setAttribute('d', `M ${cp.x1},${cp.y1} Q ${cp.cx},${cp.cy} ${cp.x2},${cp.y2}`);
                path.setAttribute('fill', 'transparent');
                path.setAttribute('stroke', 'rgba(255,255,255,0.22)');
                path.setAttribute('stroke-width', '2');
                path.setAttribute('class', 'edge-line');
                path.setAttribute('marker-end', 'url(#arrow-faint)');
                g.appendChild(path);
                // weight label background + text
                const bg = document.createElementNS(SVGNS, 'rect');
                bg.setAttribute('x', cp.cx - 11); bg.setAttribute('y', cp.cy - 9);
                bg.setAttribute('width', 22); bg.setAttribute('height', 18);
                bg.setAttribute('rx', 5);
                bg.setAttribute('fill', '#0b1120'); bg.setAttribute('stroke', 'rgba(255,255,255,0.14)');
                g.appendChild(bg);
                const txt = document.createElementNS(SVGNS, 'text');
                txt.setAttribute('x', cp.cx); txt.setAttribute('y', cp.cy);
                txt.setAttribute('class', 'edge-weight'); txt.setAttribute('fill', '#cfe9f5');
                txt.textContent = w;
                g.appendChild(txt);
            });
        }

        function buildMatrixDom() {
            const container = document.getElementById('matrix-container');
            container.innerHTML = '';
            Object.keys(cellEls).forEach(k => delete cellEls[k]);
            Object.keys(colHdrEls).forEach(k => delete colHdrEls[k]);
            Object.keys(rowHdrEls).forEach(k => delete rowHdrEls[k]);
            container.style.gridTemplateColumns = `30px repeat(${V_count}, 44px)`;

            const corner = document.createElement('div'); corner.className = 'matrix-hdr corner'; corner.textContent = 'i\\j';
            container.appendChild(corner);
            for (let c = 0; c < V_count; c++) {
                const h = document.createElement('div'); h.className = 'matrix-hdr'; h.id = `colh-${c}`; h.textContent = c;
                container.appendChild(h); colHdrEls[c] = h;
            }
            for (let r = 0; r < V_count; r++) {
                const rh = document.createElement('div'); rh.className = 'matrix-hdr'; rh.id = `rowh-${r}`; rh.textContent = r;
                container.appendChild(rh); rowHdrEls[r] = rh;
                for (let c = 0; c < V_count; c++) {
                    const cell = document.createElement('div'); cell.className = 'matrix-cell'; cell.id = `cell-${r}-${c}`;
                    cellEls[`${r},${c}`] = cell; container.appendChild(cell);
                }
            }
        }

        // --------- render active paths (rebuilt only inside #active-paths) ---------
        function clearActivePaths() { document.getElementById('active-paths').innerHTML = ''; }
        function drawActivePath(u, v, color, marker, width, flow) {
            const cp = curvePoints(u, v);
            const path = document.createElementNS(SVGNS, 'path');
            path.setAttribute('d', `M ${cp.x1},${cp.y1} Q ${cp.cx},${cp.cy} ${cp.x2},${cp.y2}`);
            path.setAttribute('fill', 'transparent');
            path.setAttribute('stroke', color);
            path.setAttribute('stroke-width', width);
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('marker-end', `url(#${marker})`);
            if (flow && !REDUCED) { path.setAttribute('stroke-dasharray', '7 5'); path.classList.add('relax-path', 'show', 'flow'); }
            else { path.classList.add('relax-path', 'show'); }
            document.getElementById('active-paths').appendChild(path);
        }

        function renderActivePaths(step) {
            clearActivePaths();
            if (step.i === null || step.k === null || step.j === null) return;
            // i -> k (blue) and k -> j (orange): the candidate two-hop route
            drawActivePath(step.i, step.k, '#06b6d4', 'arrow-blue', '3.5', true);
            drawActivePath(step.k, step.j, '#f5a524', 'arrow-orange', '3.5', true);
            // the direct i -> j edge being compared / relaxed
            if (step.relaxed) drawActivePath(step.i, step.j, '#22c55e', 'arrow-green', '4', true);
            else drawActivePath(step.i, step.j, '#a855f7', 'arrow-purple', '3', false);
        }

        // --------- renderStep (pure function of steps[idx]) ---------
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // nodes
            for (let i = 0; i < V_count; i++) {
                const el = nodeEls[i]; if (!el) continue;
                let cls = 'node';
                if (!step.complete) {
                    if (step.k === i) cls += ' active-k';
                    else if (step.i === i) cls += ' active-i';
                    else if (step.j === i) cls += ' active-j';
                }
                el.className = cls;
            }

            // matrix cells
            for (let r = 0; r < V_count; r++) {
                for (let c = 0; c < V_count; c++) {
                    const cell = cellEls[`${r},${c}`]; if (!cell) continue;
                    const v = step.dist[r][c];
                    const newTxt = fmt(v) + '';
                    const prev = cell.textContent;
                    cell.textContent = newTxt;

                    let cls = 'matrix-cell';
                    if (r === c) cls += ' diag';
                    if (v === INF) cls += ' inf';
                    if (step.complete) cls += ' frozen';
                    else if (step.k !== null) {
                        if (r === step.k) cls += ' krow';
                        if (c === step.k) cls += ' kcol';
                        if (step.i !== null) {
                            if (r === step.i && c === step.k) cls += ' ik';
                            if (r === step.k && c === step.j) cls += ' kj';
                            if (r === step.i && c === step.j) cls += step.relaxed ? ' updated' : ' ij';
                        }
                    }
                    cell.className = cls;
                    if (prev !== newTxt && prev !== '') Motion.pop(cell);
                }
            }

            // header lighting (k row/col)
            for (let c = 0; c < V_count; c++) colHdrEls[c].className = 'matrix-hdr' + (!step.complete && step.k === c ? ' lit-k' : '');
            for (let r = 0; r < V_count; r++) rowHdrEls[r].className = 'matrix-hdr' + (!step.complete && step.k === r ? ' lit-k' : '');

            renderActivePaths(step);

            // narration
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);

            highlightCode(step.code);

            // state pills
            document.getElementById('st-k').textContent = step.k !== null ? step.k : '—';
            document.getElementById('st-i').textContent = step.i !== null ? step.i : '—';
            document.getElementById('st-j').textContent = step.j !== null ? step.j : '—';
            document.getElementById('st-relax').textContent = step.relaxCount;

            // badge + progress
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            // log
            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s =>
                `<div style="margin:3px 0;white-space:pre-wrap;${s.logColor ? 'color:' + s.logColor + ';' : ''}">${s.log}</div>`
            ).join('');
            logEl.scrollTop = logEl.scrollHeight;

            if (step.complete) fireConfetti();
        }

        // --------- confetti ---------
        let confettiFired = -1;
        function fireConfetti() {
            if (REDUCED || confettiFired === stepIdx) return;
            confettiFired = stepIdx;
            const colors = ['#06b6d4', '#a855f7', '#f5a524', '#22c55e'];
            for (let n = 0; n < 70; n++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.background = colors[n % colors.length];
                document.body.appendChild(p);
                const dx = (Math.random() - 0.5) * 220;
                p.animate([
                    { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${dx}px, ${window.innerHeight + 60}px) rotate(${Math.random() * 720}deg)`, opacity: 0.9 }
                ], { duration: 1900 + Math.random() * 900, easing: 'cubic-bezier(0.3,0.7,0.5,1)' }).onfinish = () => p.remove();
            }
        }

        // --------- controls ---------
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); confettiFired = -1; renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) { confettiFired = -1; renderStep(0); }
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function loadGraph(v, edges) {
            pause(); confettiFired = -1;
            V_count = v; edgesList = edges;
            buildGraphDom(); buildMatrixDom(); generateSteps(); renderStep(0);
        }
        function loadCustom() {
            try {
                const v = parseInt(document.getElementById('v-input').value, 10);
                const edges = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                if (isNaN(v) || v < 1 || !Array.isArray(edges)) throw 0;
                if (v > 6) { alert('For visualization clarity, keep V <= 6.'); return; }
                for (const e of edges) {
                    if (!Array.isArray(e) || e.length !== 3) throw 0;
                    const [u, w, c] = e;
                    if (![u, w, c].every(x => typeof x === 'number' && isFinite(x))) throw 0;
                    if (u < 0 || u >= v || w < 0 || w >= v) throw 0;
                }
                loadGraph(v, edges);
            } catch (e) {
                alert('Invalid format. Expected V as an integer and edges as [[u, v, w], ...] with 0 <= u,v < V, e.g. [[0,1,1],[1,2,1]].');
            }
        }
        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            loadCustom();
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('v-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        document.getElementById('e-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => { if (steps.length) renderActivePaths(steps[stepIdx]); });

        buildCodePanel();
        window.onload = () => loadExample(4, '[[0,1,1],[1,2,1],[2,3,1],[0,3,5]]');
    </script>
</body>
</html>
