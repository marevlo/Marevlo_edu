<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longest Path in DAG (DFS + Memoization) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 2;
        }
        
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 4; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 3; color: var(--accent-purple); }
        .node.computed { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .node.in-path { box-shadow: 0 0 15px var(--accent-blue); border-color: var(--accent-blue); color: var(--accent-blue); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 40px; height: 36px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.dp-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.stack-tile { background: #1a150b; border-color: var(--accent-orange); color: var(--accent-orange); padding: 0 8px; width: auto; font-size: 13px;}
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; background: rgba(63,185,80,0.3); color: #fff; border-color: var(--accent-green);}
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes highlightFlash { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.5); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); filter: brightness(1); } }
        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="4">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1], [1,2], [1,3]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(3, '[[0,1], [0,2]]')">Ex 1</button>
        <button onclick="loadExample(4, '[[0,1], [1,2], [1,3]]')">Ex 2</button>
        <button onclick="loadExample(5, '[[0,1], [0,2], [1,3], [2,3], [3,4]]')">Ex 3</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                    <marker id="arrow-memo" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-green)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">Memoization Array (dp):</div>
                <div class="tiles-wrapper" id="dp-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Longest path starting from node</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">DFS Call Stack:</div>
                <div class="tiles-wrapper" id="stack-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current max_len for u</span>
            <span class="info-value" id="val-max" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">global longest path length =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Active Node (u)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Neighbor (v)</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> DP Computed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 4;
        let edgesList = [[0,1], [1,2], [1,3]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample(4, '[[0,1], [1,2], [1,3]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is an integer and edges is a valid array of [u, v].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 225;
            const cy = 200;
            const radius = 130;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let adj = Array.from({length: V_count}, () => []);
            for (let [u,v] of edgesList) {
                adj[u].push(v);
            }

            let dp = new Array(V_count).fill(-1);
            let stack = [];
            let globalMax = 0;

            steps.push({
                type: 'init', dp: [...dp], stack: [...stack], globalMax: globalMax,
                u: null, v: null, u_max: null, updatedNode: null, poppedItem: null, pushedItem: null, edgeState: null,
                panel: `<b>Longest Path in a DAG (DFS + Memoization)</b><br>To find the longest path, we compute the maximum depth from each node using DFS.<br>We cache (memoize) the results in a <code>dp</code> array to avoid redundant work. Initialize <code>dp</code> with -1.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. V=${V_count}. dp array filled with -1.`
            });

            function dfs(u, depth) {
                let pad = "  ".repeat(depth);
                
                stack.push(u);
                let current_max = 0;

                steps.push({
                    type: 'visit', dp: [...dp], stack: [...stack], globalMax: globalMax,
                    u: u, v: null, u_max: current_max, updatedNode: null, poppedItem: null, pushedItem: u, edgeState: null,
                    panel: `<b>Visit Node ${u}:</b><br>Start DFS for node <b>${u}</b>. Initialize its <code>max_len = 0</code>.<br>Added <b>${u}</b> to the DFS Call Stack.`,
                    statusText: `Visiting Node ${u}...`,
                    log: `\n${pad}DFS(${u}): Started. current_max = 0.`
                });

                let neighbors = adj[u] || [];
                if (neighbors.length === 0) {
                    steps.push({
                        type: 'no_neighbors', dp: [...dp], stack: [...stack], globalMax: globalMax,
                        u: u, v: null, u_max: current_max, updatedNode: null, poppedItem: null, pushedItem: null, edgeState: null,
                        panel: `Node <b>${u}</b> has no outgoing edges. Its longest path is 0.`,
                        statusText: `No neighbors.`,
                        log: `${pad}  Node ${u} has no neighbors.`
                    });
                }

                for (let v of neighbors) {
                    steps.push({
                        type: 'check', dp: [...dp], stack: [...stack], globalMax: globalMax,
                        u: u, v: v, u_max: current_max, updatedNode: null, poppedItem: null, pushedItem: null, edgeState: 'active',
                        panel: `Checking outgoing edge <b>${u} ➔ ${v}</b>.<br>Has <code>dp[${v}]</code> been computed?`,
                        statusText: `Evaluating edge ${u} ➔ ${v}...`,
                        log: `${pad}  Evaluating edge ${u}->${v}...`
                    });

                    if (dp[v] === -1) {
                        steps.push({
                            type: 'recurse', dp: [...dp], stack: [...stack], globalMax: globalMax,
                            u: u, v: v, u_max: current_max, updatedNode: null, poppedItem: null, pushedItem: null, edgeState: 'active',
                            panel: `<b style="color:var(--accent-orange)">No.</b> Node <b>${v}</b> is unvisited (<code>dp[${v}] == -1</code>).<br>Recursively calling <code>DFS(${v})</code> to compute its longest path.`,
                            statusText: `Recursing into Node ${v}...`,
                            log: `${pad}    -> Unvisited. Recursing into DFS(${v}).`
                        });
                        
                        dfs(v, depth + 1);
                        
                        steps.push({
                            type: 'backtrack', dp: [...dp], stack: [...stack], globalMax: globalMax,
                            u: u, v: v, u_max: current_max, updatedNode: null, poppedItem: null, pushedItem: null, edgeState: 'memo',
                            panel: `Returned from <code>DFS(${v})</code> back to <b>${u}</b>. We now know <code>dp[${v}] = ${dp[v]}</code>.<br>Evaluating path length via <b>${v}</b>.`,
                            statusText: `Backtracked to Node ${u}.`,
                            log: `${pad}  <- Backtracked from ${v} to ${u}.`
                        });
                    } else {
                        steps.push({
                            type: 'memo', dp: [...dp], stack: [...stack], globalMax: globalMax,
                            u: u, v: v, u_max: current_max, updatedNode: null, poppedItem: null, pushedItem: null, edgeState: 'memo',
                            panel: `<b style="color:var(--accent-green)">Yes!</b> Node <b>${v}</b> was already computed. <code>dp[${v}] = ${dp[v]}</code>.<br>We reuse this memoized value instead of traversing again.`,
                            statusText: `Using memoized value for ${v}.`,
                            log: `${pad}    -> Already computed. Using dp[${v}] = ${dp[v]}.`
                        });
                    }

                    let path_len = 1 + dp[v];
                    if (path_len > current_max) {
                        current_max = path_len;
                        steps.push({
                            type: 'update_max', dp: [...dp], stack: [...stack], globalMax: globalMax,
                            u: u, v: v, u_max: current_max, updatedNode: null, poppedItem: null, pushedItem: null, edgeState: 'active',
                            panel: `Path length via <b>${v}</b> is <code>1 + dp[${v}] = 1 + ${dp[v]} = ${path_len}</code>.<br>This is greater than current max. Update <code>max_len</code> for <b>${u}</b> to <b style="color:var(--accent-orange)">${current_max}</b>.`,
                            statusText: `Updated max length for ${u} to ${current_max}.`,
                            log: `    => Updated current_max for ${u} to ${current_max}.`
                        });
                    } else {
                        steps.push({
                            type: 'skip_max', dp: [...dp], stack: [...stack], globalMax: globalMax,
                            u: u, v: v, u_max: current_max, updatedNode: null, poppedItem: null, pushedItem: null, edgeState: 'active',
                            panel: `Path length via <b>${v}</b> is <code>1 + ${dp[v]} = ${path_len}</code>.<br>This is NOT greater than current max (<b>${current_max}</b>). Do not update.`,
                            statusText: `Path via ${v} is sub-optimal.`,
                            log: `    -> Path via ${v} (${path_len}) <= current_max (${current_max}). No update.`
                        });
                    }
                }
                
                dp[u] = current_max;
                globalMax = Math.max(globalMax, dp[u]);
                let popped = stack.pop();

                steps.push({
                    type: 'finish', dp: [...dp], stack: [...stack], globalMax: globalMax,
                    u: u, v: null, u_max: current_max, updatedNode: u, poppedItem: popped, pushedItem: null, edgeState: null,
                    panel: `Explored all neighbors of <b>${u}</b>.<br>Store the computed result: <code>dp[${u}] = ${current_max}</code>.<br>Pop <b>${u}</b> from the stack and backtrack.`,
                    statusText: `Finished Node ${u}. Stored dp[${u}]=${current_max}.`,
                    log: `${pad}Finished DFS(${u}). Stored dp[${u}] = ${current_max}.`
                });

                return dp[u];
            }

            for (let i = 0; i < V_count; i++) {
                if (dp[i] === -1) {
                    steps.push({
                        type: 'new_comp', dp: [...dp], stack: [...stack], globalMax: globalMax,
                        u: i, v: null, u_max: null, updatedNode: null, poppedItem: null, pushedItem: null, edgeState: null,
                        panel: `Node <b>${i}</b> has not been processed yet (<code>dp[${i}] == -1</code>).<br>Starting a new DFS traversal from <b>${i}</b>.`,
                        statusText: `Starting DFS on Node ${i}.`,
                        log: `\nNode ${i} is unprocessed. Starting DFS.`
                    });
                    dfs(i, 0);
                } else {
                    steps.push({
                        type: 'skip_comp', dp: [...dp], stack: [...stack], globalMax: globalMax,
                        u: i, v: null, u_max: null, updatedNode: null, poppedItem: null, pushedItem: null, edgeState: null,
                        panel: `Node <b>${i}</b> has already been processed (<code>dp[${i}] = ${dp[i]}</code>). Skip.`,
                        statusText: `Skipping already processed Node ${i}.`,
                        log: `Node ${i} already processed. Skip.`
                    });
                }
            }

            steps.push({
                type: 'final', dp: [...dp], stack: [...stack], globalMax: globalMax,
                u: null, v: null, u_max: null, updatedNode: null, poppedItem: null, pushedItem: null, edgeState: null,
                panel: `<b>Algorithm Complete!</b><br>All nodes have been processed.<br>The length of the longest path in the DAG is <b style="color:var(--accent-green); font-size:18px;">${globalMax}</b>.`,
                complete: true, result: globalMax,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Global Longest Path: ${globalMax}`,
                logColor: 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawn = new Set();

            edgesList.forEach(e => {
                const u = e[0];
                const v = e[1];
                
                let key = `${u}-${v}`;
                if (drawn.has(key)) return;
                drawn.add(key);

                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.u === u && step.v === v && step.edgeState === 'active';
                let isMemo = step.u === u && step.v === v && step.edgeState === 'memo';

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrink = nodeRadius + 2; 
                
                const x1 = p1.x + (dx/len)*shrink; 
                const y1 = p1.y + (dy/len)*shrink;
                const x2 = p2.x - (dx/len)*shrink; 
                const y2 = p2.y - (dy/len)*shrink;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);

                if (isChecking) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('stroke-dasharray', '6');
                    line.setAttribute('marker-end', 'url(#arrow-active)');
                    line.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(line), 0);
                } else if (isMemo) {
                    line.setAttribute('stroke', 'var(--accent-green)');
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('marker-end', 'url(#arrow-memo)');
                    setTimeout(() => svg.appendChild(line), 0);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(line);
                }
            });
        }

        function renderStack(step) {
            const container = document.getElementById('stack-tiles');
            container.innerHTML = '';
            
            if (step.stack.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            step.stack.forEach((val, index) => {
                const tile = document.createElement('div');
                tile.className = `tile stack-tile`;
                if (step.pushedItem === val && index === step.stack.length - 1) {
                    tile.classList.add('pushing');
                }
                tile.innerText = val;
                
                container.appendChild(tile);
                
                if (index < step.stack.length - 1 || step.poppedItem !== null) {
                    const sep = document.createElement('span');
                    sep.innerText = '➔';
                    sep.style.color = 'var(--text-dim)';
                    sep.style.fontSize = '12px';
                    container.appendChild(sep);
                }
            });

            if (step.poppedItem !== null && step.type === 'finish') {
                const popTile = document.createElement('div');
                popTile.className = `tile stack-tile popping`;
                popTile.innerText = step.poppedItem;
                container.appendChild(popTile);
            }
        }

        function renderArray(containerId, arr, tileClass, stepData) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile ${tileClass}`;
                
                if (stepData.updatedNode === i) {
                    tile.classList.add('highlight-update');
                }
                
                if (val === -1) {
                    tile.innerText = '—';
                    tile.style.background = '#21262d';
                    tile.style.borderColor = 'var(--border-main)';
                    tile.style.color = 'var(--text-dim)';
                } else {
                    tile.innerText = val;
                }
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (step.dp[i] !== -1) {
                    el.classList.add('computed');
                }
                
                if (step.u === i && !step.complete) el.classList.add('active-u');
                if (step.v === i && !step.complete) el.classList.add('active-v');
            }

            drawEdges(step);
            renderStack(step);
            renderArray('dp-tiles', step.dp, 'dp-tile', step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? `${step.u}` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `${step.v}` : '—';
            document.getElementById('val-max').innerText = step.u_max !== null ? `${step.u_max}` : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
