<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max Flow &middot; Dinic's Algorithm</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:320px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2714'; color:var(--accent-green);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto;}
svg.graph{display:block; width:460px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2; fill:none; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.level{stroke:rgba(6,182,212,.6); stroke-width:2.5;}
.edge.check{stroke:var(--accent-purple); stroke-width:3.5; stroke-dasharray:8; animation:dash 1s linear infinite; filter:drop-shadow(0 0 6px rgba(168,85,247,.6));}
.edge.path{stroke:var(--accent-green); stroke-width:4; filter:drop-shadow(0 0 6px rgba(34,197,94,.6));}
.edge.flowing{stroke:var(--accent-blue); stroke-width:3; filter:drop-shadow(0 0 5px rgba(6,182,212,.5));}
.ehead{fill:var(--border-main); transition:fill .35s;}
.ehead.level{fill:rgba(6,182,212,.6);} .ehead.check{fill:var(--accent-purple);} .ehead.path{fill:var(--accent-green);} .ehead.flowing{fill:var(--accent-blue);}
.elabel-bg{fill:#0b1322; stroke:var(--border-main); stroke-width:1; transition:stroke .35s;}
.elabel-bg.level{stroke:rgba(6,182,212,.6);} .elabel-bg.check{stroke:var(--accent-purple);} .elabel-bg.path{stroke:var(--accent-green);} .elabel-bg.flowing{stroke:var(--accent-blue);}
.elabel{font-family:var(--mono); font-weight:700; font-size:11px; fill:var(--text-dim); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.elabel.level{fill:#a5f3fc;} .elabel.check{fill:#e9d5ff;} .elabel.path{fill:#bbf7d0;} .elabel.flowing{fill:#a5f3fc;}
.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode .lvtag{font-family:var(--mono); font-weight:700; font-size:10px; fill:var(--accent-blue); text-anchor:middle; dominant-baseline:central; opacity:0; transition:opacity .35s;}
.gnode.haslv .lvtag{opacity:1;}
.gnode.src .nc{stroke:var(--accent-blue); fill:rgba(6,182,212,.12); filter:drop-shadow(0 0 6px rgba(6,182,212,.4));}
.gnode.src .nl{fill:#a5f3fc;}
.gnode.sink .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.14); filter:drop-shadow(0 0 6px rgba(245,165,36,.4));}
.gnode.sink .nl{fill:#ffd591;}
.gnode.activeu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.20); filter:drop-shadow(0 0 12px rgba(245,165,36,.7)); stroke-width:3;}
.gnode.activeu .nl{fill:#ffd591;}
.gnode.activev .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.18); filter:drop-shadow(0 0 11px rgba(168,85,247,.6)); stroke-width:3;}
.gnode.activev .nl{fill:#e9d5ff;}
.gnode.onpath .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.18); filter:drop-shadow(0 0 12px rgba(34,197,94,.6)); stroke-width:3;}
.gnode.onpath .nl{fill:#bbf7d0;}

.side{display:flex; flex-direction:column; gap:12px; min-width:230px; flex:1 1 230px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel.lvl .cap{color:var(--accent-blue);} .panel.flow .cap{color:var(--accent-green);}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:44px; align-content:flex-start;}
.tilecol{display:flex; flex-direction:column; align-items:center; gap:3px;}
.tile{min-width:34px; height:34px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-dim);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.tile.set{border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.1); color:#a5f3fc;}
.tile.bump{border-color:rgba(34,197,94,.5); background:rgba(34,197,94,.14); color:#bbf7d0;}
.tile-idx{font-family:var(--mono); font-size:10px; color:var(--text-dim);}
.flow-big{font-family:var(--mono); font-weight:800; font-size:34px; color:#bbf7d0; text-align:center; padding:4px 0; transition:color .3s;}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.ph b{color:var(--accent-blue);} .pill.uv b{color:var(--accent-orange);} .pill.fl b{color:var(--accent-green);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-16;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>V =</label>
  <input type="text" id="v-input" class="small-input" value="4">
  <label>edges =</label>
  <input type="text" id="e-input" class="large-input" value="[[0,1,3],[0,2,2],[1,2,5],[1,3,2],[2,3,3]]">
  <label>s =</label>
  <input type="text" id="s-input" class="small-input" value="0">
  <label>t =</label>
  <input type="text" id="t-input" class="small-input" value="3">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(4,'[[0,1,3],[0,2,2],[1,2,5],[1,3,2],[2,3,3]]',0,3)">Ex 1</button>
  <button onclick="loadExample(6,'[[0,1,10],[0,2,10],[1,2,2],[1,3,4],[1,4,8],[2,4,9],[3,5,10],[4,3,6],[4,5,10]]',0,5)">Ex 2</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Maximum Flow <span class="sub">&middot; Dinic&apos;s algorithm &middot; level graph + blocking flow</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 460 380"></svg></div>
      <div class="side">
        <div class="panel lvl">
          <div class="cap">LEVEL ARRAY &middot; BFS DIST FROM s</div>
          <div class="tiles" id="lv-tiles"></div>
        </div>
        <div class="panel flow">
          <div class="cap">TOTAL MAX FLOW</div>
          <div class="flow-big" id="flow-big">0</div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill ph">phase <b id="pill-phase">&mdash;</b></span>
        <span class="pill uv">u&rarr;v <b id="pill-uv">&mdash;</b></span>
        <span class="pill fl">max flow <b id="pill-flow">0</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>level edge</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>evaluating</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>augmenting path</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','dinic'],['src','(graph, s, t):']],
  [['kw','  while'],['src',' BFS builds level graph reaching t:']],
  [['src','    level[s]=0; BFS over edges with residual>0']],
  [['kw','    if'],['src',' level[t] == -1: '],['kw','break']],
  [['src','    while sendFlow(s, '],['kw','&#8734;'],['src',') > 0:  '],['kw','# '],['src','blocking flow']],
  [['src','      DFS only along level[v]==level[u]+1 edges']],
  [['src','      f = min(residual) along path to t']],
  [['src','      flow[u][v]+=f; flow[v][u]-=f']],
  [['src','      maxFlow += f']],
  [['kw','  return'],['src',' maxFlow']],
];

let V_count=4, sourceNode=0, sinkNode=3;
let edgesList=[[0,1,3],[0,2,2],[1,2,5],[1,3,2],[2,3,3]];
let nodeCoords={};
let edgeIndex={};       // "u->v" -> dom id index for the directed visual edge
let visualEdges=[];     // list of {u,v,cap} drawn once
let steps=[], stepIndex=0, timer=null;
const delays=[2400,1200,560];
const gnodes={};
let confettiArmed=true;

function init(){ buildCode(); loadExample(4,'[[0,1,3],[0,2,2],[1,2,5],[1,3,2],[2,3,3]]',0,3); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.innerHTML=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(v,eStr,s,t){
  document.getElementById('v-input').value=v; document.getElementById('e-input').value=eStr;
  document.getElementById('s-input').value=s; document.getElementById('t-input').value=t;
  parseAndGen();
}
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    V_count=parseInt(document.getElementById('v-input').value,10);
    sourceNode=parseInt(document.getElementById('s-input').value,10);
    sinkNode=parseInt(document.getElementById('t-input').value,10);
    edgesList=JSON.parse(document.getElementById('e-input').value.replace(/\(/g,'[').replace(/\)/g,']'));
    if(isNaN(V_count)||isNaN(sourceNode)||isNaN(sinkNode)||!Array.isArray(edgesList)) throw 'bad';
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid input. V, s, t must be integers and edges a list of [u, v, cap].'); }
}

function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; nodeCoords={};
  edgeIndex={}; visualEdges=[]; for(const k in gnodes) delete gnodes[k];
  const W=460,H=380;
  // hierarchical layout by BFS level from source over forward edges
  let levels=new Array(V_count).fill(-1); levels[sourceNode]=0;
  let q=[sourceNode]; let adj=Array.from({length:V_count},()=>[]);
  for(const e of edgesList) if(adj[e[0]]) adj[e[0]].push(e[1]);
  while(q.length){ const u=q.shift(); for(const v of adj[u]){ if(levels[v]===-1){ levels[v]=levels[u]+1; q.push(v); } } }
  let maxLvl=Math.max(0,...levels);
  for(let i=0;i<V_count;i++){ if(levels[i]===-1){ maxLvl++; levels[i]=maxLvl; } }
  if(levels[sinkNode]!==Math.max(...levels)) levels[sinkNode]=Math.max(...levels)+1;
  let groups={}; for(let i=0;i<V_count;i++){ (groups[levels[i]]=groups[levels[i]]||[]).push(i); }
  let maxL=Math.max(...Object.keys(groups).map(Number));
  let xSpacing=W/(maxL+2);
  for(const l in groups){
    const arr=groups[l]; const ySpacing=H/(arr.length+1);
    arr.forEach((nId,idx)=>{ nodeCoords[nId]={x:xSpacing*(parseInt(l,10)+1), y:ySpacing*(idx+1)}; });
  }
  // collect unique directed visual edges (merge parallel duplicates into one capacity)
  let seen={};
  for(const e of edgesList){
    const key=e[0]+'->'+e[1];
    if(seen[key]!==undefined){ visualEdges[seen[key]].cap+=e[2]; continue; }
    seen[key]=visualEdges.length; visualEdges.push({u:e[0],v:e[1],cap:e[2]});
  }
  // edges (path + arrowhead + flow/cap label) built ONCE, keyed by id; curve opposing pairs
  visualEdges.forEach((ve,i)=>{
    const u=ve.u, v=ve.v; const p1=nodeCoords[u], p2=nodeCoords[v]; if(!p1||!p2) return;
    edgeIndex[u+'->'+v]=i;
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1; const ux=dx/len, uy=dy/len;
    const r=22; const x1=p1.x+ux*(r+1), y1=p1.y+uy*(r+1);
    const hasReverse=visualEdges.some(o=>o.u===v && o.v===u);
    const px=-uy, py=ux; const curveOff=hasReverse?22:0;
    const mx=(p1.x+p2.x)/2 + px*curveOff, my=(p1.y+p2.y)/2 + py*curveOff;
    const x2=p2.x-ux*(r+9), y2=p2.y-uy*(r+9);
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','edge'); path.id='e'+i;
    const dStr= hasReverse ? `M ${x1},${y1} Q ${mx},${my} ${x2},${y2}` : `M ${x1},${y1} L ${x2},${y2}`;
    path.setAttribute('d',dStr); svg.appendChild(path);
    // arrowhead at target, tangent direction toward p2
    const tx=hasReverse? (p2.x-mx):(p2.x-p1.x), ty=hasReverse? (p2.y-my):(p2.y-p1.y);
    const tl=Math.hypot(tx,ty)||1; const tux=tx/tl, tuy=ty/tl; const tpx=-tuy, tpy=tux;
    const ax=p2.x-tux*(r+1), ay=p2.y-tuy*(r+1); const bl=8,bw=5;
    const head=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    head.setAttribute('class','ehead'); head.id='eh'+i;
    head.setAttribute('points',[
      `${ax},${ay}`,
      `${ax-tux*bl+tpx*bw},${ay-tuy*bl+tpy*bw}`,
      `${ax-tux*bl-tpx*bw},${ay-tuy*bl-tpy*bw}`
    ].join(' '));
    svg.appendChild(head);
    // label background + text at curve mid
    const lx=hasReverse? mx : (p1.x+p2.x)/2;
    const ly=hasReverse? my : (p1.y+p2.y)/2;
    const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
    bg.setAttribute('class','elabel-bg'); bg.id='elb'+i; bg.setAttribute('rx',4);
    bg.setAttribute('x',lx-20); bg.setAttribute('y',ly-9); bg.setAttribute('width',40); bg.setAttribute('height',18);
    svg.appendChild(bg);
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('class','elabel'); txt.id='el'+i; txt.setAttribute('x',lx); txt.setAttribute('y',ly);
    svg.appendChild(txt);
  });
  // nodes on top
  for(let id=0; id<V_count; id++){
    const p=nodeCoords[id]; if(!p) continue;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode'); g.id='gn'+id;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',20);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=id;
    const lt=document.createElementNS('http://www.w3.org/2000/svg','text'); lt.setAttribute('class','lvtag'); lt.id='lt'+id;
    lt.setAttribute('x',p.x); lt.setAttribute('y',p.y-30); lt.textContent='';
    g.appendChild(c); g.appendChild(t); g.appendChild(lt); svg.appendChild(g); gnodes[id]=g;
    if(id===sourceNode) g.classList.add('src'); if(id===sinkNode) g.classList.add('sink');
  }
}

function generateSteps(){
  steps=[];
  let cap=Array.from({length:V_count},()=>new Array(V_count).fill(0));
  let flow=Array.from({length:V_count},()=>new Array(V_count).fill(0));
  let adj=Array.from({length:V_count},()=>[]);
  for(const [u,v,c] of edgesList){
    cap[u][v]+=c;
    if(!adj[u].includes(v)) adj[u].push(v);
    if(!adj[v].includes(u)) adj[v].push(u);
  }
  let maxFlow=0; let level=new Array(V_count).fill(-1);
  const snapFlow=()=>flow.map(r=>[...r]);
  const push=o=>steps.push(o);

  push({ flow:snapFlow(), maxFlow, level:[...level], u:null, v:null, check:null, path:[], phase:'Init',
    code:[0], pill:'init',
    narr:`<b>Dinic&apos;s algorithm</b>: maximum flow from <code>s=${sourceNode}</code> to <code>t=${sinkNode}</code>. Repeatedly build a <b>BFS level graph</b>, then push a <b>blocking flow</b> along level-respecting paths. Labels show <code>flow/cap</code>.`,
    log:`init  V=${V_count}  s=${sourceNode}  t=${sinkNode}  maxFlow=0` });

  let phaseNo=0;
  while(true){
    phaseNo++;
    level.fill(-1); level[sourceNode]=0; let q=[sourceNode];
    push({ flow:snapFlow(), maxFlow, level:[...level], u:null, v:null, check:null, path:[], phase:'BFS',
      code:[1,2], pill:'bfs',
      narr:`<b>Phase ${phaseNo} &middot; BFS</b>: build the level graph from <code>s=${sourceNode}</code>, traversing only edges with positive residual capacity.`,
      log:`phase ${phaseNo}  build level graph (BFS)` });

    while(q.length){
      const u=q.shift();
      for(const v of adj[u]){
        const res=cap[u][v]-flow[u][v];
        push({ flow:snapFlow(), maxFlow, level:[...level], u, v, check:{u,v}, path:[], phase:'BFS',
          code:[2], pill:'bfs',
          narr:`BFS evaluates edge <code>${u} &rarr; ${v}</code>. Residual capacity is <b>${res}</b>. Is <code>level[${v}] = &minus;1</code> and <code>res &gt; 0</code>?`,
          log:`  bfs check ${u}->${v}  res=${res}` });
        if(level[v]===-1 && res>0){
          level[v]=level[u]+1; q.push(v);
          push({ flow:snapFlow(), maxFlow, level:[...level], u, v, check:null, path:[], phase:'BFS',
            code:[2], pill:'bfs', bumped:v,
            narr:`Valid. Set <code>level[${v}] = level[${u}] + 1 = ${level[v]}</code> and enqueue <b>${v}</b>.`,
            log:`    level[${v}]=${level[v]}  enqueued` });
        }
      }
    }

    if(level[sinkNode]===-1){
      push({ flow:snapFlow(), maxFlow, level:[...level], u:null, v:null, check:null, path:[], phase:'Done',
        code:[3,9], pill:'done',
        narr:`BFS cannot reach <code>t=${sinkNode}</code> in the residual graph &rarr; no augmenting path remains. <b>Maximum flow = ${maxFlow}.</b>`,
        log:`sink unreachable  -> terminate  maxFlow=${maxFlow}`,
        complete:true, result:maxFlow });
      break;
    }

    push({ flow:snapFlow(), maxFlow, level:[...level], u:null, v:null, check:null, path:[], phase:'DFS',
      code:[4,5], pill:'dfs',
      narr:`Level graph built; <code>t=${sinkNode}</code> sits at level <b>${level[sinkNode]}</b>. Now DFS pushes <b>blocking flow</b> along edges where <code>level[v] = level[u] + 1</code>.`,
      log:`phase ${phaseNo}  find blocking flow (DFS)` });

    let ptr=new Array(V_count).fill(0);
    function sendFlow(u, pushed, curPath){
      if(u===sinkNode){
        push({ flow:snapFlow(), maxFlow, level:[...level], u, v:null, check:null, path:[...curPath], phase:'DFS',
          code:[6], pill:'dfs',
          narr:`Reached sink <code>${sinkNode}</code>. The bottleneck (minimum residual) along this path is <b>${pushed}</b>.`,
          log:`  path to sink  bottleneck=${pushed}` });
        return pushed;
      }
      for(; ptr[u]<adj[u].length; ptr[u]++){
        const v=adj[u][ptr[u]]; const res=cap[u][v]-flow[u][v];
        push({ flow:snapFlow(), maxFlow, level:[...level], u, v, check:{u,v}, path:[...curPath], phase:'DFS',
          code:[5], pill:'dfs',
          narr:`DFS tries <code>${u} &rarr; ${v}</code> (res <b>${res}</b>). Does it advance one level: <code>level[${u}]+1 = level[${v}]</code>?`,
          log:`  dfs check ${u}->${v}  res=${res}  lvl ${level[u]}->${level[v]}` });
        if(level[u]+1!==level[v] || res===0){
          push({ flow:snapFlow(), maxFlow, level:[...level], u, v, check:null, path:[...curPath], phase:'DFS',
            code:[5], pill:'dfs',
            narr:`Skip <code>${u} &rarr; ${v}</code>: residual is 0 or it does not advance to the next level.`,
            log:`    skip ${u}->${v}` });
          continue;
        }
        const got=sendFlow(v, Math.min(pushed,res), [...curPath,{u,v}]);
        if(got===0){
          push({ flow:snapFlow(), maxFlow, level:[...level], u, v, check:null, path:[...curPath], phase:'DFS',
            code:[5], pill:'dfs',
            narr:`Dead end through <code>${v}</code>. Backtrack to <code>${u}</code> and try the next edge.`,
            log:`    dead end at ${v}  backtrack to ${u}` });
          continue;
        }
        flow[u][v]+=got; flow[v][u]-=got;
        if(u===sourceNode){
          maxFlow+=got;
          push({ flow:snapFlow(), maxFlow, level:[...level], u:null, v:null, check:null, path:[...curPath,{u,v}], phase:'DFS',
            code:[7,8], pill:'aug',
            narr:`<b>Augment</b>: pushed <b>${got}</b> along the path and updated residual capacities. Total max flow is now <b>${maxFlow}</b>.`,
            log:`=> augment +${got}  maxFlow=${maxFlow}` });
        }
        return got;
      }
      return 0;
    }
    let sent=0;
    do{ sent=sendFlow(sourceNode, Infinity, []); }while(sent>0);
  }
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const onPath=new Set();
  (step.path||[]).forEach(pe=>{ onPath.add(pe.u); onPath.add(pe.v); });

  // nodes: level tag + active u/v + path
  for(let n=0;n<V_count;n++){ const g=gnodes[n]; if(!g) continue;
    g.classList.remove('activeu','activev','onpath','haslv');
    const lv=step.level[n];
    const lt=document.getElementById('lt'+n);
    if(lv!==-1 && lv!==undefined){ g.classList.add('haslv'); if(lt) lt.textContent='L'+lv; }
    else if(lt) lt.textContent='';
    if(onPath.has(n)) g.classList.add('onpath');
    if(!step.complete){
      if(step.u===n) g.classList.add('activeu');
      if(step.v===n) g.classList.add('activev');
    }
  }

  // path edge set + level-graph membership
  const pathSet=new Set((step.path||[]).map(pe=>pe.u+'->'+pe.v));
  const chk = step.check ? step.check.u+'->'+step.check.v : null;
  visualEdges.forEach((ve,i)=>{
    const ln=document.getElementById('e'+i), head=document.getElementById('eh'+i);
    const bg=document.getElementById('elb'+i), tx=document.getElementById('el'+i);
    if(!ln) return;
    ['level','check','path','flowing'].forEach(c=>{ ln.classList.remove(c); head.classList.remove(c); bg.classList.remove(c); tx.classList.remove(c); });
    const key=ve.u+'->'+ve.v;
    const f=step.flow[ve.u][ve.v];
    let cls=null;
    if(pathSet.has(key)) cls='path';
    else if(chk===key) cls='check';
    else if(f>0) cls='flowing';
    else if(step.phase==='DFS' && step.level[ve.u]!==-1 && step.level[ve.v]===step.level[ve.u]+1 && (ve.cap-f)>0) cls='level';
    else if(step.phase==='BFS' && step.level[ve.u]!==-1 && step.level[ve.v]!==-1 && step.level[ve.v]===step.level[ve.u]+1) cls='level';
    if(cls){ ln.classList.add(cls); head.classList.add(cls); bg.classList.add(cls); tx.classList.add(cls); }
    tx.textContent = (f>0? f : 0)+'/'+ve.cap;
  });

  fillLevels(step);

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr; narr.classList.toggle('done',!!step.complete);
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });

  document.getElementById('flow-big').textContent=step.maxFlow;
  document.getElementById('pill-phase').textContent=step.phase;
  document.getElementById('pill-uv').innerHTML=(step.u!=null&&step.v!=null)?`${step.u}&rarr;${step.v}`:'&mdash;';
  document.getElementById('pill-flow').textContent=step.maxFlow;

  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color='var(--accent-green)';
    else if(steps[k].pill==='aug') d.style.color='var(--accent-blue)';
    log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fillLevels(step){
  const c=document.getElementById('lv-tiles'); c.innerHTML='';
  for(let i=0;i<V_count;i++){
    const col=document.createElement('div'); col.className='tilecol';
    const t=document.createElement('div'); const lv=step.level[i];
    t.className='tile'+(lv!==-1&&lv!==undefined?' set':'')+(step.bumped===i?' bump':'');
    t.textContent=(lv!==-1&&lv!==undefined)?lv:'-';
    const idx=document.createElement('div'); idx.className='tile-idx'; idx.textContent='['+i+']';
    col.appendChild(t); col.appendChild(idx); c.appendChild(col);
    if(step.bumped===i && !REDUCED) Motion.pop(t);
  }
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
