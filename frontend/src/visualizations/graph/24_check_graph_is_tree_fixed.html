<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Graph is Tree (DFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 3; color: var(--accent-orange); }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 2; color: var(--accent-purple); }
        .node.parent-node { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(56,139,253,0.4); color: var(--accent-blue); }
        .node.visited { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .node.cycle-node { background: #3a0d0d; border-color: var(--accent-red); color: var(--accent-red); animation: shake 0.4s infinite; z-index: 4;}

        @keyframes shake {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-53%, -50%) rotate(-5deg); }
            50% { transform: translate(-50%, -50%) rotate(0deg); }
            75% { transform: translate(-47%, -50%) rotate(5deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 100px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-dim);
        }
        
        .tile.visited-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile.parent-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; }

        @keyframes highlightFlash { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.5); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); filter: brightness(1); } }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 800px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 800px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center; word-break: break-all;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; text-shadow: 0 0 15px var(--accent-red); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1.1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 800px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="5">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1],[0,2],[0,3],[1,4]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(5, '[[0,1],[0,2],[0,3],[1,4]]')">Ex 1 (True)</button>
        <button onclick="loadExample(4, '[[0,1],[1,2],[2,3],[1,3]]')">Ex 2 (False)</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">Visited Array:</div>
                <div class="tiles-wrapper" id="visited-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Tracks visited nodes to detect cycles.</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">Parent Array:</div>
                <div class="tiles-wrapper" id="parent-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Avoids counting immediate back-edges as cycles.</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Parent of u</span>
            <span class="info-value" id="val-p" style="color: var(--accent-blue);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">is valid tree? =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Active Node (DFS)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Checking Neighbor</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-blue); border-width:2px;"></span> Parent Node</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Visited</div>
        <div class="legend-item"><span class="dot" style="background:#3a0d0d; border-color:var(--accent-red)"></span> Cycle Detected!</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 5;
        let edgesList = [[0,1],[0,2],[0,3],[1,4]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];

        function init() { loadExample(5, '[[0,1],[0,2],[0,3],[1,4]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is an integer and edges is a valid array of [u, v].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};

            const cx = 225;
            const cy = 200;
            const radius = 140;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let adj = Array.from({length: V_count}, () => []);
            for(let [u,v] of edgesList) {
                adj[u].push(v);
                adj[v].push(u);
            }

            let visited = new Array(V_count).fill(false);
            let parents = new Array(V_count).fill(-1);
            let hasCycle = false;
            let cycleEdge = null;

            steps.push({
                type: 'init', visited: [...visited], parents: [...parents],
                u: null, v: null, p: null, cycleNode: null, activeEdge: null,
                panel: `<b>Check Graph is Tree</b><br>A valid tree must have <b>no cycles</b> and be <b>fully connected</b>.<br>We will use DFS from Node 0, tracking the <code>parent</code> to avoid false cycle detection on back-edges.`,
                statusText: `Initialization complete.`,
                log: `Initialized. Starting DFS from Node 0.`
            });

            function dfs(u, p, depth) {
                let pad = "  ".repeat(depth);
                
                visited[u] = true;
                parents[u] = p;

                steps.push({
                    type: 'visit', visited: [...visited], parents: [...parents],
                    u: u, v: null, p: p, cycleNode: null, activeEdge: null,
                    panel: `<code>dfs(${u})</code>: Marked Node <b>${u}</b> as Visited.<br>Its parent is <b>${p === -1 ? 'None' : p}</b>. Processing its neighbors...`,
                    statusText: `Exploring Node ${u}...`,
                    log: `${pad}dfs(${u}, parent=${p}): marked visited.`
                });

                let neighbors = adj[u] || [];

                for (let v of neighbors) {
                    steps.push({
                        type: 'check', visited: [...visited], parents: [...parents],
                        u: u, v: v, p: p, cycleNode: null, activeEdge: [u, v],
                        panel: `Checking neighbor <b>${v}</b> of active Node <b>${u}</b>.`,
                        statusText: `Evaluating edge ${u} — ${v}...`,
                        log: `${pad}  Checking neighbor ${v}...`
                    });

                    if (v === p) {
                        steps.push({
                            type: 'skip_parent', visited: [...visited], parents: [...parents],
                            u: u, v: v, p: p, cycleNode: null, activeEdge: [u, v],
                            panel: `Neighbor <b>${v}</b> is the immediate parent of <b>${u}</b>.<br>This is a trivial undirected back-edge. <b style="color:var(--text-dim)">Skip.</b>`,
                            statusText: `Skipping parent edge.`,
                            log: `${pad}    -> ${v} is parent. Skipped.`
                        });
                        continue;
                    }

                    if (visited[v]) {
                        hasCycle = true;
                        cycleEdge = [u, v];
                        steps.push({
                            type: 'cycle', visited: [...visited], parents: [...parents],
                            u: u, v: v, p: p, cycleNode: v, activeEdge: [u, v],
                            panel: `<b style="color:var(--accent-red); font-size:16px;">Cycle Detected!</b><br>Neighbor <b>${v}</b> is already visited and is NOT the parent.<br>This means multiple paths exist to <b>${v}</b>. The graph is NOT a tree.`,
                            statusText: `Cycle detected! Algorithm halting.`,
                            log: `${pad}    -> ${v} is visited & not parent! Cycle detected.`,
                            logColor: 'var(--accent-red)'
                        });
                        return false;
                    }

                    steps.push({
                        type: 'recurse', visited: [...visited], parents: [...parents],
                        u: u, v: v, p: p, cycleNode: null, activeEdge: [u, v],
                        panel: `Neighbor <b>${v}</b> is unvisited.<br>Recursively calling <code>dfs(${v})</code> with parent <b>${u}</b>.`,
                        statusText: `Recursing to Node ${v}...`,
                        log: `${pad}    -> ${v} unvisited. Recursing...`
                    });

                    if (!dfs(v, u, depth + 1)) return false;
                }

                steps.push({
                    type: 'backtrack', visited: [...visited], parents: [...parents],
                    u: u, v: null, p: p, cycleNode: null, activeEdge: null,
                    panel: `Finished exploring all neighbors for Node <b>${u}</b>.<br>Backtracking to parent <b>${p === -1 ? 'None' : p}</b>.`,
                    statusText: `Backtracking from ${u}.`,
                    log: `${pad}Finished dfs(${u}). Backtracking.`
                });

                return true;
            }

            // Start DFS from 0
            if (V_count > 0) {
                dfs(0, -1, 0);
            }

            if (hasCycle) {
                steps.push({
                    type: 'final', visited: [...visited], parents: [...parents],
                    u: null, v: null, p: null, cycleNode: null, activeEdge: cycleEdge,
                    panel: `<b>Algorithm Complete.</b><br>Graph contains a cycle. <b style="color:var(--accent-red); font-size:18px;">Result: False</b> (Not a Tree).`,
                    complete: true, result: 'False', isTree: false,
                    statusText: `Finished: Cycle Found.`,
                    log: `\nAlgorithm halted due to cycle. Result: False.`,
                    logColor: 'var(--accent-red)'
                });
                return;
            }

            // Check if fully connected
            let allVisited = true;
            let unvisitedNodes = [];
            for (let i = 0; i < V_count; i++) {
                if (!visited[i]) {
                    allVisited = false;
                    unvisitedNodes.push(i);
                }
            }

            steps.push({
                type: 'check_conn', visited: [...visited], parents: [...parents],
                u: null, v: null, p: null, cycleNode: null, activeEdge: null,
                panel: `DFS completed without finding any cycles.<br>Now, verifying if the graph is fully connected (all nodes visited).`,
                statusText: `Checking connectivity...`,
                log: `\nDFS done. Checking if all nodes visited.`
            });

            if (!allVisited) {
                steps.push({
                    type: 'final', visited: [...visited], parents: [...parents],
                    u: null, v: null, p: null, cycleNode: null, activeEdge: null,
                    panel: `<b>Disconnected Graph!</b><br>Nodes [${unvisitedNodes.join(', ')}] were not reached from Node 0.<br><b style="color:var(--accent-red); font-size:18px;">Result: False</b> (Not a Tree).`,
                    complete: true, result: 'False', isTree: false,
                    statusText: `Finished: Graph disconnected.`,
                    log: `Disconnected nodes found. Result: False.`,
                    logColor: 'var(--accent-red)'
                });
            } else {
                steps.push({
                    type: 'final', visited: [...visited], parents: [...parents],
                    u: null, v: null, p: null, cycleNode: null, activeEdge: null,
                    panel: `<b>Success!</b><br>The graph has no cycles AND is fully connected.<br><b style="color:var(--accent-green); font-size:18px;">Result: True</b> (It is a valid Tree).`,
                    complete: true, result: 'True', isTree: true,
                    statusText: `Finished: Graph is a Tree.`,
                    log: `All nodes connected, no cycles. Result: True.`,
                    logColor: 'var(--accent-green)'
                });
            }
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawnEdges = new Set();

            edgesList.forEach(e => {
                const u = e[0];
                const v = e[1];
                let key = u < v ? `${u}-${v}` : `${v}-${u}`;
                if (drawnEdges.has(key)) return;
                drawnEdges.add(key);

                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.activeEdge && ((step.activeEdge[0] === u && step.activeEdge[1] === v) || (step.activeEdge[0] === v && step.activeEdge[1] === u));
                let isCycleEdge = isChecking && step.type === 'cycle';
                let isFinalCycleEdge = step.complete && !step.isTree && step.activeEdge && ((step.activeEdge[0] === u && step.activeEdge[1] === v) || (step.activeEdge[0] === v && step.activeEdge[1] === u));
                let isTreeEdge = step.parents[u] === v || step.parents[v] === u;

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrink = nodeRadius; 
                
                const x1 = p1.x + (dx/len)*shrink; 
                const y1 = p1.y + (dy/len)*shrink;
                const x2 = p2.x - (dx/len)*shrink; 
                const y2 = p2.y - (dy/len)*shrink;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);

                if (isCycleEdge || isFinalCycleEdge) {
                    line.setAttribute('stroke', 'var(--accent-red)');
                    line.setAttribute('stroke-width', '4');
                    line.classList.add('line-anim');
                    line.setAttribute('stroke-dasharray', '8');
                    setTimeout(() => svg.appendChild(line), 0);
                } else if (isChecking) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.classList.add('line-anim');
                    line.setAttribute('stroke-dasharray', '8');
                    setTimeout(() => svg.appendChild(line), 0);
                } else if (isTreeEdge) {
                    line.setAttribute('stroke', 'var(--accent-green)');
                    line.setAttribute('stroke-width', '3');
                    svg.appendChild(line);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    svg.appendChild(line);
                }
            });
        }

        function renderArray(containerId, arr, tileClass, highlightLogic) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile ${tileClass}`;
                
                if (highlightLogic(i)) {
                    tile.classList.add('highlight-update');
                }
                
                tile.innerText = val === -1 ? 'None' : (val === true ? 'T' : (val === false ? 'F' : val));
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (step.visited[i]) el.classList.add('visited');
                
                if (step.u === i) el.classList.add('active-u');
                if (step.v === i) el.classList.add('active-v');
                if (step.p === i && step.p !== -1) el.classList.add('parent-node');
                if (step.cycleNode === i) el.classList.add('cycle-node');
            }

            drawEdges(step);

            renderArray('visited-tiles', step.visited, 'visited-tile', (i) => {
                return (step.type === 'visit' && i === step.u);
            });
            renderArray('parent-tiles', step.parents, 'parent-tile', (i) => {
                return (step.type === 'visit' && i === step.u);
            });

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? step.u : '—';
            document.getElementById('val-v').innerText = step.v !== null ? step.v : '—';
            document.getElementById('val-p').innerText = step.p !== null ? (step.p === -1 ? 'None' : step.p) : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.className = step.isTree ? 'pop' : 'pop-false';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
