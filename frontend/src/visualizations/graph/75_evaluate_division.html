<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluate Division (Graph DFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .med-input { width: 300px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 420px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 2;
        }
        
        .node.source { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(56,139,253,0.4); color: var(--accent-blue); background: rgba(56,139,253,0.1); }
        .node.target { border-color: var(--accent-green); box-shadow: 0 0 10px rgba(63,185,80,0.4); color: var(--accent-green); background: rgba(63,185,80,0.1); }
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 4; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 3; color: var(--accent-purple); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 380px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 44px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main); padding: 0 8px;
        }
        
        .tile.path-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.res-tile { background: #1a150b; border-color: var(--accent-orange); color: var(--accent-orange); }
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; filter: brightness(1.5); background: rgba(63,185,80,0.3); color: #fff; border-color: var(--accent-green);}

        @keyframes highlightFlash { 0% { transform: scale(1); box-shadow: 0 0 0 transparent;} 50% { transform: scale(1.2); box-shadow: 0 0 10px var(--accent-green);} 100% { transform: scale(1); box-shadow: 0 0 0 transparent;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 850px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 850px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; letter-spacing: 1px;}
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 850px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 850px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }

        .edge-label { font-family: monospace; font-weight: bold; font-size: 11px; text-anchor: middle; dominant-baseline: central; fill: var(--text-main); }
        .edge-bg { fill: var(--bg-surface); stroke: var(--border-main); stroke-width: 1px; rx: 4px; }
        .edge-active .edge-bg { stroke: var(--accent-purple); }
        .edge-active .edge-label { fill: var(--accent-purple); }
        .edge-path .edge-bg { stroke: var(--accent-green); fill: #0f2a1a;}
        .edge-path .edge-label { fill: var(--accent-green); }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Eqs =</label>
        <input type="text" id="eq-input" class="med-input" placeholder='[["a","b"],["b","c"]]'>
        <label class="ui-label">Vals =</label>
        <input type="text" id="val-input" class="med-input" style="width: 120px;" placeholder="[2.0, 3.0]">
        <label class="ui-label">Queries =</label>
        <input type="text" id="q-input" class="med-input" placeholder='[["a","c"],["b","a"],["a","e"]]'>
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(0)">Ex 1</button>
        <button onclick="loadExample(1)">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                    <marker id="arrow-path" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-green)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">Current DFS Path:</div>
                <div class="tiles-wrapper" id="path-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Nodes visited in current traversal</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">Query Results:</div>
                <div class="tiles-wrapper" id="res-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Evaluated answers for each query</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Query</span>
            <span class="info-value" id="val-q" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Product</span>
            <span class="info-value" id="val-prod" style="color: var(--accent-green);">1.0</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">final results array =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:rgba(56,139,253,0.1); border-color:var(--accent-blue); border-width:2px;"></span> Query Source</div>
        <div class="legend-item"><span class="dot" style="background:rgba(63,185,80,0.1); border-color:var(--accent-green); border-width:2px;"></span> Query Target</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Active Node (u)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Edge</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-green); border-width:2px;"></span> Edge in Current Path</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        // Store examples in JS to avoid parsing issues with quotes in HTML attributes
        const presetExamples = [
            {
                eqs: '[["a","b"],["b","c"]]',
                vals: '[2.0, 3.0]',
                queries: '[["a","c"],["b","a"],["a","e"]]'
            },
            {
                eqs: '[["x","y"],["y","z"]]',
                vals: '[0.5, 4.0]',
                queries: '[["x","z"],["z","x"],["x","x"]]'
            }
        ];

        let equations = [];
        let values = [];
        let queries = [];
        
        let nodeCoords = {};
        let uniqueNodes = [];
        let edgesList = []; 
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [3000, 1500, 750];

        function init() { loadExample(0); }

        function loadExample(index) {
            const ex = presetExamples[index];
            document.getElementById('eq-input').value = ex.eqs;
            document.getElementById('val-input').value = ex.vals;
            document.getElementById('q-input').value = ex.queries;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function formatNum(num) {
            return Number(num.toPrecision(5));
        }

        function parseAndGenerate() {
            try {
                equations = JSON.parse(document.getElementById('eq-input').value);
                values = JSON.parse(document.getElementById('val-input').value);
                queries = JSON.parse(document.getElementById('q-input').value);
                
                if (!Array.isArray(equations) || !Array.isArray(values) || !Array.isArray(queries) || equations.length !== values.length) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure inputs are valid JSON arrays and equations/values lengths match.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            
            let nodesSet = new Set();
            edgesList = [];

            for (let i = 0; i < equations.length; i++) {
                let u = equations[i][0];
                let v = equations[i][1];
                let w = values[i];
                nodesSet.add(u);
                nodesSet.add(v);
                edgesList.push({u, v, w: formatNum(w)});
                edgesList.push({u: v, v: u, w: formatNum(1.0 / w)});
            }

            uniqueNodes = Array.from(nodesSet);
            let n = uniqueNodes.length;
            if (n === 0) return;

            const cx = 225;
            const cy = 210;
            const radius = 140;

            for (let i = 0; i < n; i++) {
                const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[uniqueNodes[i]] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${uniqueNodes[i]}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = uniqueNodes[i];
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let adj = {};
            for (let node of uniqueNodes) {
                adj[node] = [];
            }
            for (let e of edgesList) {
                adj[e.u].push({v: e.v, w: e.w});
            }

            let results = [];

            steps.push({
                type: 'init', results: [...results], path: [], query: null,
                u: null, v: null, w: null, prod: null, updatedIdx: null,
                panel: `<b>Evaluate Division (Graph Modeling)</b><br>Each equation <code>A / B = k</code> is modeled as a directed edge <b>A ➔ B</b> with weight <code>k</code>, and a reverse edge <b>B ➔ A</b> with weight <code>1/k</code>.<br>To evaluate a query <code>X / Y</code>, we find a path from X to Y and multiply the edge weights.`,
                statusText: `Graph initialized.`,
                log: `Initialized algorithm. Built adjacency list with ${uniqueNodes.length} variables.`
            });

            for (let qIdx = 0; qIdx < queries.length; qIdx++) {
                let src = queries[qIdx][0];
                let dst = queries[qIdx][1];
                let qStr = `${src}/${dst}`;

                steps.push({
                    type: 'query_start', results: [...results], path: [], query: [src, dst],
                    u: null, v: null, w: null, prod: null, updatedIdx: null,
                    panel: `<b>Processing Query ${qIdx + 1}: <code>${src} / ${dst}</code></b><br>We check if both variables exist in our graph.`,
                    statusText: `Starting query ${qStr}...`,
                    log: `\n--- Processing Query: ${qStr} ---`
                });

                if (!uniqueNodes.includes(src) || !uniqueNodes.includes(dst)) {
                    results.push(-1.0);
                    steps.push({
                        type: 'query_invalid', results: [...results], path: [], query: [src, dst],
                        u: null, v: null, w: null, prod: null, updatedIdx: results.length - 1,
                        panel: `One or both variables (<b>${src}</b>, <b>${dst}</b>) <b style="color:var(--accent-red)">do not exist</b> in the given equations.<br>Therefore, the result is undefined. Append <b>-1.0</b> to results.`,
                        statusText: `Variables not in graph. Result is -1.0.`,
                        log: `  -> Variables not found. Result = -1.0`,
                        logColor: 'var(--accent-red)'
                    });
                    continue;
                }

                if (src === dst) {
                    results.push(1.0);
                    steps.push({
                        type: 'query_trivial', results: [...results], path: [], query: [src, dst],
                        u: null, v: null, w: null, prod: null, updatedIdx: results.length - 1,
                        panel: `The source and target are the <b style="color:var(--accent-green)">same variable</b> (<b>${src}</b>).<br>Any variable divided by itself is 1. Append <b>1.0</b> to results.`,
                        statusText: `Trivial query. Result is 1.0.`,
                        log: `  -> Trivial query (same variable). Result = 1.0`,
                        logColor: 'var(--accent-green)'
                    });
                    continue;
                }

                let visited = new Set();
                let found = false;
                let finalRes = -1.0;

                function dfs(u, currentProduct, currentPath) {
                    visited.add(u);

                    steps.push({
                        type: 'dfs_visit', results: [...results], path: [...currentPath], query: [src, dst],
                        u: u, v: null, w: null, prod: currentProduct, updatedIdx: null,
                        panel: `<b>DFS at Node <code>${u}</code></b><br>Current accumulated product is <b>${currentProduct}</b>.<br>Checking if we reached the target <b>${dst}</b>...`,
                        statusText: `Visiting node ${u}...`,
                        log: `  DFS(${u}): Current product = ${currentProduct}`
                    });

                    if (u === dst) {
                        found = true;
                        finalRes = currentProduct;
                        steps.push({
                            type: 'dfs_found', results: [...results], path: [...currentPath], query: [src, dst],
                            u: u, v: null, w: null, prod: currentProduct, updatedIdx: null,
                            panel: `<b style="color:var(--accent-green)">Target Reached!</b><br>Path from <b>${src}</b> to <b>${dst}</b> is complete. Final product is <b>${currentProduct}</b>.`,
                            statusText: `Target ${dst} found!`,
                            log: `    => Reached target ${dst}. Final product = ${currentProduct}`,
                            logColor: 'var(--accent-green)'
                        });
                        return true;
                    }

                    for (let edge of adj[u]) {
                        let v = edge.v;
                        let w = edge.w;

                        steps.push({
                            type: 'dfs_check', results: [...results], path: [...currentPath], query: [src, dst],
                            u: u, v: v, w: w, prod: currentProduct, updatedIdx: null,
                            panel: `Evaluating adjacent edge <b>${u} ➔ ${v}</b> (weight: <b>${w}</b>).<br>Is <b>${v}</b> unvisited?`,
                            statusText: `Evaluating edge ${u}➔${v}...`,
                            log: `    Check edge ${u}->${v} (weight=${w}).`
                        });

                        if (!visited.has(v)) {
                            let newProd = formatNum(currentProduct * w);
                            steps.push({
                                type: 'dfs_recurse', results: [...results], path: [...currentPath], query: [src, dst],
                                u: u, v: v, w: w, prod: currentProduct, updatedIdx: null,
                                panel: `<b style="color:var(--accent-green)">Yes.</b> <b>${v}</b> is unvisited.<br>New product will be <code>${currentProduct} * ${w} = ${newProd}</code>.<br>Recursively search from <b>${v}</b>.`,
                                statusText: `Recursing into ${v}...`,
                                log: `      -> Unvisited. Recursing with new product = ${newProd}`
                            });

                            if (dfs(v, newProd, [...currentPath, v])) {
                                return true;
                            }

                            steps.push({
                                type: 'dfs_backtrack', results: [...results], path: [...currentPath], query: [src, dst],
                                u: u, v: v, w: w, prod: currentProduct, updatedIdx: null,
                                panel: `Returned from <b>${v}</b> without finding the target. Backtracking to <b>${u}</b>.`,
                                statusText: `Backtracked to ${u}.`,
                                log: `      <- Backtracked from ${v} to ${u}.`
                            });
                        } else {
                            steps.push({
                                type: 'dfs_skip', results: [...results], path: [...currentPath], query: [src, dst],
                                u: u, v: v, w: w, prod: currentProduct, updatedIdx: null,
                                panel: `<b style="color:var(--accent-red)">No.</b> Node <b>${v}</b> is already visited. Skip to prevent infinite loops.`,
                                statusText: `Skipping visited node ${v}.`,
                                log: `      -> Already visited. Skipped.`
                            });
                        }
                    }
                    return false;
                }

                dfs(src, 1.0, [src]);

                if (!found) {
                    results.push(-1.0);
                    steps.push({
                        type: 'query_not_found', results: [...results], path: [], query: [src, dst],
                        u: null, v: null, w: null, prod: null, updatedIdx: results.length - 1,
                        panel: `DFS finished, but target <b>${dst}</b> was never reached from <b>${src}</b>.<br>They exist in disconnected components. Result is <b>-1.0</b>.`,
                        statusText: `No path found. Result is -1.0.`,
                        log: `  -> No path found. Result = -1.0`,
                        logColor: 'var(--accent-red)'
                    });
                } else {
                    results.push(finalRes);
                    steps.push({
                        type: 'query_success', results: [...results], path: [], query: [src, dst],
                        u: null, v: null, w: null, prod: null, updatedIdx: results.length - 1,
                        panel: `Query evaluated successfully! Result is <b>${finalRes}</b>.`,
                        statusText: `Query resolved to ${finalRes}.`,
                        log: `  -> Query completed. Appended ${finalRes} to results.`
                    });
                }
            }

            let resultStr = `[${results.join(', ')}]`;

            steps.push({
                type: 'final', results: [...results], path: [], query: null,
                u: null, v: null, w: null, prod: null, updatedIdx: null,
                panel: `<b>Algorithm Complete!</b><br>All queries have been evaluated via DFS on the constructed graph.<br>The final results array is <b style="color:var(--accent-green); font-size:16px;">${resultStr}</b>.`,
                complete: true, result: resultStr,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Final Results = ${resultStr}`,
                logColor: 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawn = new Set();

            edgesList.forEach(e => {
                const u = e.u;
                const v = e.v;
                const w = e.w;
                
                let key = `${u}->${v}`;
                if (drawn.has(key)) return;
                drawn.add(key);

                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.u === u && step.v === v;
                
                // Is this edge part of the current path?
                let inPath = false;
                if (step.path && step.path.length > 1) {
                    for(let i=0; i<step.path.length-1; i++) {
                        if (step.path[i] === u && step.path[i+1] === v) {
                            inPath = true; break;
                        }
                    }
                }

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrinkTarget = nodeRadius + 6; 
                const shrinkSource = nodeRadius + 2; 

                // We always curve because every edge has a reverse
                let dStr = "";
                let cx, cy;

                const midX = (p1.x + p2.x) / 2;
                const midY = (p1.y + p2.y) / 2;
                const nx = -dy / len;
                const ny = dx / len;
                const curveOffset = 25; 
                cx = midX + nx * curveOffset;
                cy = midY + ny * curveOffset;
                
                const x1 = p1.x + (dx/len)*shrinkSource; 
                const y1 = p1.y + (dy/len)*shrinkSource;
                const x2 = p2.x - (dx/len)*shrinkTarget; 
                const y2 = p2.y - (dy/len)*shrinkTarget;
                dStr = `M ${x1},${y1} Q ${cx},${cy} ${x2},${y2}`;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', dStr);
                path.setAttribute('fill', 'transparent');

                if (isChecking) {
                    path.setAttribute('stroke', 'var(--accent-purple)');
                    path.setAttribute('stroke-width', '4');
                    path.setAttribute('marker-end', 'url(#arrow-active)');
                    path.classList.add('line-anim');
                    path.setAttribute('stroke-dasharray', '6');
                    setTimeout(() => svg.appendChild(path), 0);
                } else if (inPath) {
                    path.setAttribute('stroke', 'var(--accent-green)');
                    path.setAttribute('stroke-width', '3');
                    path.setAttribute('marker-end', 'url(#arrow-path)');
                    svg.appendChild(path);
                } else {
                    path.setAttribute('stroke', 'var(--border-main)');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(path);
                }

                // Add Weight Label
                const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                bg.setAttribute('x', cx - 18);
                bg.setAttribute('y', cy - 8);
                bg.setAttribute('width', 36);
                bg.setAttribute('height', 16);
                bg.setAttribute('class', isChecking ? 'edge-bg edge-active' : (inPath ? 'edge-bg edge-path' : 'edge-bg'));
                
                const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                txt.setAttribute('x', cx);
                txt.setAttribute('y', cy);
                txt.setAttribute('class', isChecking ? 'edge-label edge-active' : (inPath ? 'edge-label edge-path' : 'edge-label'));
                txt.textContent = w;

                if (isChecking) {
                    setTimeout(() => {
                        svg.appendChild(bg);
                        svg.appendChild(txt);
                    }, 0);
                } else {
                    svg.appendChild(bg);
                    svg.appendChild(txt);
                }
            });
        }

        function renderArray(containerId, arr, tileClass, stepData) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            if (!arr || arr.length === 0) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">[ empty ]</span>';
                return;
            }

            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile ${tileClass}`;
                
                if (stepData.updatedIdx === i) {
                    tile.classList.add('highlight-update');
                }
                
                tile.innerText = val;
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                if(tileClass === 'res-tile') wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
                
                if (tileClass === 'path-tile' && i < arr.length - 1) {
                    const sep = document.createElement('span');
                    sep.innerText = '➔';
                    sep.style.color = 'var(--text-dim)';
                    sep.style.fontSize = '12px';
                    sep.style.marginTop = '10px';
                    container.appendChild(sep);
                }
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let node of uniqueNodes) {
                const el = document.getElementById(`node-${node}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (step.query) {
                    if (node === step.query[0]) el.classList.add('source');
                    if (node === step.query[1]) el.classList.add('target');
                }
                
                if (step.u === node && !step.complete) el.classList.add('active-u');
                if (step.v === node && !step.complete) el.classList.add('active-v');
            }

            drawEdges(step);
            
            renderArray('path-tiles', step.path, 'path-tile', step);
            renderArray('res-tiles', step.results, 'res-tile', step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-q').innerText = step.query ? `${step.query[0]} / ${step.query[1]}` : '—';
            document.getElementById('val-u').innerText = step.u !== null ? `${step.u}` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `${step.v}` : '—';
            document.getElementById('val-prod').innerText = step.prod !== null ? `${step.prod}` : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
