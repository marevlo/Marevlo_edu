<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluate Division &middot; Weighted Graph</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:12px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.eq-input{width:200px;} .val-input{width:110px;} .q-input{width:230px;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration.fail{border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.06);}
.narration.fail::before{content:'\2715'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:360px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap; position:relative;}

.graph-wrap{flex:0 0 auto;}
svg.graph{display:block; width:430px; max-width:100%; height:auto;}
.edge{fill:transparent; stroke:var(--border-main); stroke-width:2; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.checking{stroke:var(--accent-purple); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.edge.path{stroke:var(--accent-green); stroke-width:3; filter:drop-shadow(0 0 5px rgba(34,197,94,.55));}
.elabel-bg{fill:#0c1322; stroke:var(--border-main); stroke-width:1; transition:stroke .35s, fill .35s;}
.elabel-tx{font-family:var(--mono); font-weight:700; font-size:10px; text-anchor:middle; dominant-baseline:central; fill:var(--text-dim); transition:fill .35s;}
.eg.checking .elabel-bg{stroke:var(--accent-purple); fill:rgba(168,85,247,.14);}
.eg.checking .elabel-tx{fill:#e9d5ff;}
.eg.path .elabel-bg{stroke:var(--accent-green); fill:rgba(34,197,94,.14);}
.eg.path .elabel-tx{fill:#bbf7d0;}

.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode.source .nc{stroke:var(--accent-blue); fill:rgba(6,182,212,.12); filter:drop-shadow(0 0 6px rgba(6,182,212,.4));}
.gnode.source .nl{fill:#a5f3fc;}
.gnode.target .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.12); filter:drop-shadow(0 0 6px rgba(34,197,94,.4));}
.gnode.target .nl{fill:#bbf7d0;}
.gnode.visited .nc{stroke:rgba(34,197,94,.5); fill:rgba(34,197,94,.07);}
.gnode.activeu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.gnode.activeu .nl{fill:#ffd591;}
.gnode.activev .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 12px rgba(168,85,247,.6)); stroke-width:3;}
.gnode.activev .nl{fill:#e9d5ff;}

.side{display:flex; flex-direction:column; gap:12px; min-width:230px; flex:1 1 230px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel.p .cap{color:var(--accent-blue);} .panel.r .cap{color:var(--accent-orange);} .panel.m .cap{color:var(--accent-green);}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start; align-items:center;}
.tile{min-width:34px; height:34px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:13px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.tile.p{border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.12); color:#a5f3fc;}
.tile.r{border-color:rgba(245,165,36,.45); background:rgba(245,165,36,.12); color:#ffd591;}
.tile.r.neg{border-color:rgba(248,81,73,.45); background:rgba(248,81,73,.12); color:#ffb3ae;}
.tiles .sep{font-family:var(--mono); font-size:13px; color:var(--text-dim);}
.tiles .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
.prodbox{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:20px; font-weight:800; color:#bbf7d0;}
.prodbox .lbl{font-size:12px; font-weight:600; color:var(--text-dim);}

#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.q b{color:var(--accent-blue);} .pill.u b{color:var(--accent-orange);} .pill.v b{color:var(--accent-purple);} .pill.s b{color:var(--accent-green);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>eqs =</label>
  <input type="text" id="eq-input" class="eq-input" value='[["a","b"],["b","c"]]'>
  <label>vals =</label>
  <input type="text" id="val-input" class="val-input" value="[2.0, 3.0]">
  <label>queries =</label>
  <input type="text" id="q-input" class="q-input" value='[["a","c"],["b","a"],["a","e"]]'>
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(0)">Ex 1</button>
  <button onclick="loadExample(1)">Ex 2</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Evaluate Division <span class="sub">&middot; weighted-graph DFS &middot; a&#8594;b carries a&#8725;b</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 430 420"></svg></div>
      <div class="side">
        <div class="panel m"><div class="cap">CURRENT PRODUCT</div><div class="prodbox"><span class="lbl">prod =</span><span id="prod-val">&mdash;</span></div></div>
        <div class="panel p"><div class="cap">DFS PATH (this query)</div><div class="tiles" id="path-tiles"></div></div>
        <div class="panel r"><div class="cap">QUERY RESULTS</div><div class="tiles" id="res-tiles"></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&#8592; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &#8594;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&#8592; &#8594;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill q">query = <b id="pill-q">&mdash;</b></span>
        <span class="pill u">u = <b id="pill-u">&mdash;</b></span>
        <span class="pill v">v = <b id="pill-v">&mdash;</b></span>
        <span class="pill s">prod = <b id="pill-prod">&mdash;</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>source</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>target</span>
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>active u</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>edge v</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','calcEquation'],['src','(eqs, vals, queries):']],
  [['src','  build graph: edge a'],['kw','->'],['src','b = a/b,  b'],['kw','->'],['src','a = 1/(a/b)']],
  [['kw','  for'],['src',' (src, dst) '],['kw','in'],['src',' queries:']],
  [['kw','    if'],['src',' src '],['kw','not in'],['src',' g '],['kw','or'],['src',' dst '],['kw','not in'],['src',' g: result = -1']],
  [['kw','    elif'],['src',' src == dst: result = 1.0']],
  [['kw','    else'],['src',': result = dfs(src, dst, 1.0, visited={})']],
  [['fn','  dfs'],['src','(u, dst, prod, visited):']],
  [['kw','    if'],['src',' u == dst:'],['kw',' return'],['src',' prod']],
  [['src','    visited.add(u)']],
  [['kw','    for'],['src',' (v, w) '],['kw','in'],['src',' g[u]:']],
  [['kw','      if'],['src',' v '],['kw','not in'],['src',' visited:']],
  [['src','        r = dfs(v, dst, prod*w, visited)']],
  [['kw','        if'],['src',' r != -1:'],['kw',' return'],['src',' r']],
  [['kw','    return'],['src',' -1']],
];

const presetExamples = [
  { eqs:'[["a","b"],["b","c"]]', vals:'[2.0, 3.0]', queries:'[["a","c"],["b","a"],["a","e"]]' },
  { eqs:'[["x","y"],["y","z"]]', vals:'[0.5, 4.0]', queries:'[["x","z"],["z","x"],["x","x"]]' }
];

let equations=[], values=[], queries=[];
let uniqueNodes=[], edgesList=[], nodeCoords={};
let steps=[], stepIndex=0, timer=null;
const delays=[2200,1100,520];
const gnodes={}, gedges={};
let confettiArmed=true;

function init(){ buildCode(); loadExample(0); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(index){
  const ex=presetExamples[index];
  document.getElementById('eq-input').value=ex.eqs;
  document.getElementById('val-input').value=ex.vals;
  document.getElementById('q-input').value=ex.queries;
  parseAndGenerate();
}
function loadCustom(){ parseAndGenerate(); }
function formatNum(num){ return Number(num.toPrecision(5)); }

function parseAndGenerate(){
  try{
    equations=JSON.parse(document.getElementById('eq-input').value);
    values=JSON.parse(document.getElementById('val-input').value);
    queries=JSON.parse(document.getElementById('q-input').value);
    if(!Array.isArray(equations)||!Array.isArray(values)||!Array.isArray(queries)||equations.length!==values.length) throw "bad";
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert("Invalid format. Ensure inputs are valid JSON arrays and equations/values lengths match."); }
}

function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; nodeCoords={};
  for(const k in gnodes) delete gnodes[k]; for(const k in gedges) delete gedges[k];

  let nodesSet=new Set(); edgesList=[];
  for(let i=0;i<equations.length;i++){
    const u=equations[i][0], v=equations[i][1], w=values[i];
    nodesSet.add(u); nodesSet.add(v);
    edgesList.push({u, v, w:formatNum(w)});
    edgesList.push({u:v, v:u, w:formatNum(1.0/w)});
  }
  uniqueNodes=Array.from(nodesSet);
  const n=uniqueNodes.length; if(n===0) return;
  const cx=215, cy=205, R=Math.min(155, 70+n*14);
  uniqueNodes.forEach((id,i)=>{ const ang=(Math.PI*2*i)/n - Math.PI/2; nodeCoords[id]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)}; });

  const NS='http://www.w3.org/2000/svg';
  // arrowhead markers
  const defs=document.createElementNS(NS,'defs');
  [['arrow-normal','rgba(255,255,255,.30)'],['arrow-active','#a855f7'],['arrow-path','#22c55e']].forEach(([id,col])=>{
    const m=document.createElementNS(NS,'marker');
    m.setAttribute('id',id); m.setAttribute('viewBox','0 0 10 10'); m.setAttribute('refX','9'); m.setAttribute('refY','5');
    m.setAttribute('markerWidth','6'); m.setAttribute('markerHeight','6'); m.setAttribute('orient','auto-start-reverse');
    const pth=document.createElementNS(NS,'path'); pth.setAttribute('d','M 0 0 L 10 5 L 0 10 z'); pth.setAttribute('fill',col);
    m.appendChild(pth); defs.appendChild(m);
  });
  svg.appendChild(defs);

  const nodeRadius=22, shrinkT=nodeRadius+9, shrinkS=nodeRadius+3, curveOffset=26;
  // edges (curved, directed, weighted) -- built ONCE keyed by id
  edgesList.forEach((e,i)=>{
    const p1=nodeCoords[e.u], p2=nodeCoords[e.v]; if(!p1||!p2) return;
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1;
    const nx=-dy/len, ny=dx/len;
    const mx=(p1.x+p2.x)/2 + nx*curveOffset, my=(p1.y+p2.y)/2 + ny*curveOffset;
    const x1=p1.x+(dx/len)*shrinkS, y1=p1.y+(dy/len)*shrinkS;
    const x2=p2.x-(dx/len)*shrinkT, y2=p2.y-(dy/len)*shrinkT;
    const d=`M ${x1.toFixed(1)},${y1.toFixed(1)} Q ${mx.toFixed(1)},${my.toFixed(1)} ${x2.toFixed(1)},${y2.toFixed(1)}`;

    const g=document.createElementNS(NS,'g'); g.setAttribute('class','eg'); g.id='eg'+i;
    const path=document.createElementNS(NS,'path'); path.setAttribute('class','edge'); path.setAttribute('d',d);
    path.setAttribute('marker-end','url(#arrow-normal)'); path.id='ep'+i;
    g.appendChild(path);
    // label, positioned along the curve (quadratic midpoint)
    const lx=0.25*x1+0.5*mx+0.25*x2, ly=0.25*y1+0.5*my+0.25*y2;
    const wstr=String(e.w); const halfW=Math.max(16, wstr.length*3.6+8);
    const bg=document.createElementNS(NS,'rect'); bg.setAttribute('class','elabel-bg');
    bg.setAttribute('x',(lx-halfW).toFixed(1)); bg.setAttribute('y',(ly-8).toFixed(1));
    bg.setAttribute('width',(halfW*2).toFixed(1)); bg.setAttribute('height','16'); bg.setAttribute('rx','4');
    const tx=document.createElementNS(NS,'text'); tx.setAttribute('class','elabel-tx');
    tx.setAttribute('x',lx.toFixed(1)); tx.setAttribute('y',ly.toFixed(1)); tx.textContent=wstr;
    g.appendChild(bg); g.appendChild(tx);
    svg.appendChild(g);
    gedges[i]={u:e.u, v:e.v, path, g, marker:path};
  });
  // nodes on top -- built ONCE keyed by id
  uniqueNodes.forEach(id=>{ const p=nodeCoords[id];
    const g=document.createElementNS(NS,'g'); g.setAttribute('class','gnode'); g.id='gn'+id;
    const c=document.createElementNS(NS,'circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',nodeRadius);
    const t=document.createElementNS(NS,'text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=id;
    g.appendChild(c); g.appendChild(t); svg.appendChild(g); gnodes[id]=g; });
}

function generateSteps(){
  steps=[];
  const adj={};
  for(const node of uniqueNodes) adj[node]=[];
  for(const e of edgesList) adj[e.u].push({v:e.v, w:e.w});
  let results=[];

  function snap(o){ steps.push({
    results:[...results], path:o.path?[...o.path]:[], query:o.query||null,
    u:o.u??null, v:o.v??null, prod:o.prod??null, updatedIdx:o.updatedIdx??null,
    pathEdges:o.pathEdges?[...o.pathEdges]:[], visited:o.visited?[...o.visited]:[],
    code:o.code, narr:o.narr, log:o.log, logColor:o.logColor||null,
    complete:o.complete||false, fail:o.fail||false }); }

  function pathEdgesOf(p){ const arr=[]; for(let i=0;i<p.length-1;i++) arr.push(p[i]+'->'+p[i+1]); return arr; }

  snap({code:[0,1], narr:`<b>Evaluate Division.</b> Each equation <code>a / b = k</code> becomes a directed edge <code>a&rarr;b</code> with weight <code>k</code> and a reverse edge <code>b&rarr;a</code> with weight <code>1/k</code>. A query <code>x/y</code> is the product of edge weights along a path from x to y.`,
    log:`build graph: ${uniqueNodes.length} variables, ${edgesList.length} directed edges`});

  for(let qIdx=0; qIdx<queries.length; qIdx++){
    const src=queries[qIdx][0], dst=queries[qIdx][1], qStr=`${src}/${dst}`;
    snap({code:[2], query:[src,dst], narr:`<b>Query ${qIdx+1}:</b> evaluate <code>${src} / ${dst}</code>. Both variables must exist in the graph.`,
      log:`\n--- query ${qStr} ---`});

    if(!uniqueNodes.includes(src) || !uniqueNodes.includes(dst)){
      results.push(-1);
      snap({code:[3], query:[src,dst], updatedIdx:results.length-1, fail:true,
        narr:`One of <code>${src}</code>, <code>${dst}</code> is <b>not</b> in the equations &rarr; undefined. Append <b>-1</b>.`,
        log:`  unknown variable, result = -1`, logColor:'var(--accent-red)'});
      continue;
    }
    if(src===dst){
      results.push(1);
      snap({code:[4], query:[src,dst], updatedIdx:results.length-1,
        narr:`Source equals target (<code>${src}</code>). Anything over itself is <b>1</b>. Append <b>1.0</b>.`,
        log:`  trivial x/x, result = 1.0`, logColor:'var(--accent-green)'});
      continue;
    }

    const visited=new Set();
    let found=false, finalRes=-1;

    function dfs(u, prod, path){
      visited.add(u);
      const pe=pathEdgesOf(path);
      snap({code:[5,6,8], query:[src,dst], u, prod, path, pathEdges:pe, visited:[...visited],
        narr:`<b>DFS at <code>${u}</code></b> &middot; accumulated product = <code>${prod}</code>. Reached target <code>${dst}</code>?`,
        log:`  dfs(${u})  prod=${prod}`});

      if(u===dst){
        found=true; finalRes=prod;
        snap({code:[7], query:[src,dst], u, prod, path, pathEdges:pe, visited:[...visited],
          narr:`<b>Target reached!</b> Path <code>${path.join(' &rarr; ')}</code>. Product <code>${src}/${dst} = ${prod}</code>.`,
          log:`    reached ${dst}: ${qStr} = ${prod}`, logColor:'var(--accent-green)'});
        return true;
      }
      for(const edge of adj[u]){
        const v=edge.v, w=edge.w;
        snap({code:[9], query:[src,dst], u, v, prod, path, pathEdges:pe, visited:[...visited],
          narr:`Edge <code>${u} &rarr; ${v}</code> carries weight <code>${w}</code>. Is <code>${v}</code> unvisited?`,
          log:`    edge ${u}->${v} (w=${w})`});
        if(!visited.has(v)){
          const newProd=formatNum(prod*w);
          snap({code:[10,11], query:[src,dst], u, v, prod, path, pathEdges:pe, visited:[...visited],
            narr:`<code>${v}</code> is <b>new</b> &rarr; recurse. New product <code>${prod} &times; ${w} = ${newProd}</code>.`,
            log:`      recurse ${v}, prod -> ${newProd}`});
          if(dfs(v, newProd, [...path, v])) return true;
          const pe2=pathEdgesOf(path);
          snap({code:[9], query:[src,dst], u, v, prod, path, pathEdges:pe2, visited:[...visited],
            narr:`Subtree of <code>${v}</code> had no path to <code>${dst}</code>. <b>Backtrack</b> to <code>${u}</code>.`,
            log:`      backtrack ${v} -> ${u}`});
        }else{
          snap({code:[10], query:[src,dst], u, v, prod, path, pathEdges:pe, visited:[...visited],
            narr:`<code>${v}</code> already visited &rarr; skip (prevents cycles).`,
            log:`      ${v} visited, skip`});
        }
      }
      return false;
    }
    dfs(src, 1.0, [src]);

    if(!found){
      results.push(-1);
      snap({code:[13], query:[src,dst], updatedIdx:results.length-1, fail:true,
        narr:`DFS exhausted &mdash; no path from <code>${src}</code> to <code>${dst}</code> (disconnected). Append <b>-1</b>.`,
        log:`  no path, result = -1`, logColor:'var(--accent-red)'});
    }else{
      results.push(finalRes);
      snap({code:[5], query:[src,dst], updatedIdx:results.length-1,
        narr:`Query <code>${qStr}</code> resolved to <b>${finalRes}</b>. Append to results.`,
        log:`  result[${results.length-1}] = ${finalRes}`, logColor:'var(--accent-green)'});
    }
  }

  const resultStr=`[${results.join(', ')}]`;
  snap({code:[2], complete:true,
    narr:`<b>Complete.</b> All queries evaluated. Final results <code>${resultStr}</code>.`,
    log:`\ndone. results = ${resultStr}`, logColor:'var(--accent-green)'});
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const vis=new Set(step.visited||[]);
  const peSet=new Set(step.pathEdges||[]);

  // nodes: toggle classes only
  uniqueNodes.forEach(n=>{ const g=gnodes[n]; if(!g) return;
    g.classList.remove('source','target','visited','activeu','activev');
    if(vis.has(n)) g.classList.add('visited');
    if(step.query){ if(n===step.query[0]) g.classList.add('source'); if(n===step.query[1]) g.classList.add('target'); }
    if(step.u===n && !step.complete) g.classList.add('activeu');
    if(step.v===n && !step.complete) g.classList.add('activev');
  });

  // edges: toggle classes + markers only (no rebuild)
  for(const i in gedges){ const ge=gedges[i];
    ge.g.classList.remove('checking','path');
    let mk='url(#arrow-normal)';
    const key=ge.u+'->'+ge.v;
    const checking = step.u!=null && step.v!=null && ge.u===step.u && ge.v===step.v && !step.complete;
    if(peSet.has(key)){ ge.g.classList.add('path'); mk='url(#arrow-path)'; }
    if(checking){ ge.g.classList.add('checking'); mk='url(#arrow-active)'; }
    ge.path.setAttribute('marker-end',mk);
  }

  // product
  document.getElementById('prod-val').innerHTML = step.prod!=null ? String(step.prod) : '&mdash;';
  // path tiles
  fillPath('path-tiles', step.path);
  // result tiles
  fillResults('res-tiles', step.results, step.updatedIdx);

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done', !!step.complete);
  narr.classList.toggle('fail', !!step.fail);

  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });
  document.getElementById('pill-q').textContent = step.query ? `${step.query[0]}/${step.query[1]}` : '—';
  document.getElementById('pill-u').textContent = step.u!=null ? step.u : '—';
  document.getElementById('pill-v').textContent = step.v!=null ? step.v : '—';
  document.getElementById('pill-prod').textContent = step.prod!=null ? step.prod : '—';

  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].logColor) d.style.color=steps[k].logColor; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fillPath(id, arr){
  const c=document.getElementById(id); c.innerHTML='';
  if(!arr||!arr.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; c.appendChild(e); return; }
  arr.forEach((v,i)=>{ const t=document.createElement('div'); t.className='tile p'; t.textContent=v; c.appendChild(t);
    if(i<arr.length-1){ const s=document.createElement('span'); s.className='sep'; s.innerHTML='&rarr;'; c.appendChild(s); } });
}
function fillResults(id, arr, updatedIdx){
  const c=document.getElementById(id); c.innerHTML='';
  if(!arr||!arr.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; c.appendChild(e); return; }
  arr.forEach((v,i)=>{ const t=document.createElement('div'); t.className='tile r'+(v===-1?' neg':''); t.textContent=v;
    if(i===updatedIdx){ const cc=t; Motion.pop(cc); } c.appendChild(t); });
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
