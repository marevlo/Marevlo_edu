<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nodes at Distance K (BFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .large-input { width: 350px; font-family: monospace; font-size: 12px; }
        .small-input { width: 60px; text-align: center; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .node.source-node { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(56,139,253,0.3); }
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 3; color: var(--accent-orange); }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 2; color: var(--accent-purple); }
        .node.visited { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .node.result-node { background: var(--accent-green); border-color: #fff; color: #000; box-shadow: 0 0 15px var(--accent-green); transform: translate(-50%, -50%) scale(1.1); z-index: 4;}

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 80px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile {
            min-width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; padding: 0 6px;
            border-radius: 6px; font-size: 14px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.queue-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); }
        .tile.dist-tile { background: #1a150b; border-color: #6e5518; color: var(--text-main); }
        .tile.res-tile { background: var(--accent-green); border-color: #fff; color: #000; }
        
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }
        .tile.highlight-update { animation: highlightFlash 0.6s ease; }

        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }
        @keyframes highlightFlash { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.1); filter: brightness(1.5); box-shadow: 0 0 10px var(--accent-green); } 100% { transform: scale(1); filter: brightness(1); } }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 730px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 730px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 12px var(--accent-green); font-size: 24px !important;}

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 730px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="large-input" placeholder="[[0,1],[0,2],[1,3],[1,4],[2,5]]">
        <label class="ui-label">source =</label>
        <input type="text" id="s-input" class="small-input" placeholder="0">
        <label class="ui-label">K =</label>
        <input type="text" id="k-input" class="small-input" placeholder="2">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[[0,1],[0,2],[1,3],[1,4],[2,5]]', 0, 2)">Ex 1</button>
        <button onclick="loadExample('[[0,1],[1,2],[2,3],[3,4]]', 0, 3)">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg"></svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue);">BFS Queue:</div>
                <div class="tiles-wrapper" id="queue-tiles"></div>
                <div style="font-size: 10px; color: var(--text-dim); margin-top: 4px;">Format: [node, distance]</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">Distances Map:</div>
                <div class="tiles-wrapper" id="dist-tiles"></div>
                <div style="font-size: 10px; color: var(--text-dim); margin-top: 4px;">Format: node ➔ dist</div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">Result (Dist = K):</div>
                <div class="tiles-wrapper" id="result-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (Dequeue)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Distance</span>
            <span class="info-value" id="val-dist" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">nodes at distance K =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-blue); border-width:2px;"></span> Source Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Popped / Active Node</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Neighbor</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border-color:var(--accent-green)"></span> Visited</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border-color:#fff"></span> Result Node (Dist = K)</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let edgesList = [[0,1],[0,2],[1,3],[1,4],[2,5]];
        let sourceNode = 0;
        let targetK = 2;
        let nodes = [];
        let nodeCoords = {};
        let adjList = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2400, 1200, 600];

        function init() { loadExample('[[0,1],[0,2],[1,3],[1,4],[2,5]]', 0, 2); }

        function loadExample(eStr, srcVal, kVal) {
            document.getElementById('e-input').value = eStr;
            document.getElementById('s-input').value = srcVal;
            document.getElementById('k-input').value = kVal;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                edgesList = JSON.parse(document.getElementById('e-input').value);
                sourceNode = parseInt(document.getElementById('s-input').value);
                targetK = parseInt(document.getElementById('k-input').value);
                
                if (!Array.isArray(edgesList) || isNaN(sourceNode) || isNaN(targetK)) {
                    throw "Invalid inputs";
                }

                let nodeSet = new Set();
                nodeSet.add(sourceNode);
                adjList = {};
                edgesList.forEach(e => {
                    nodeSet.add(e[0]);
                    nodeSet.add(e[1]);
                    if(!adjList[e[0]]) adjList[e[0]] = [];
                    if(!adjList[e[1]]) adjList[e[1]] = [];
                    adjList[e[0]].push(e[1]);
                    adjList[e[1]].push(e[0]); // undirected
                });
                
                nodes = Array.from(nodeSet).sort((a,b) => a-b);
                if (!adjList[sourceNode]) adjList[sourceNode] = []; // isolate case

                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure edges is a 2D array, source and K are integers.");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            const N = nodes.length;
            if (N === 0) return;

            const cx = 225;
            const cy = 200;
            const radius = 150;

            for (let i = 0; i < N; i++) {
                const nId = nodes[i];
                // Try to lay out naturally, but a circle is safest for arbitrary graphs
                const angle = (Math.PI * 2 * i) / N - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[nId] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${nId}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = nId;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let visited = new Set();
            let queue = [];
            let result = [];
            let distances = {};

            visited.add(sourceNode);
            queue.push({u: sourceNode, d: 0});
            distances[sourceNode] = 0;

            steps.push({
                type: 'init', queue: [...queue], visited: Array.from(visited), result: [...result], distances: {...distances},
                activeU: null, activeV: null, currDist: null, pushed: null, popped: null, updatedNode: null,
                panel: `<b>BFS from Source</b><br>Initialize queue with <code>(${sourceNode}, 0)</code>, mark <b>${sourceNode}</b> as visited, and set its distance to 0.`,
                statusText: `Ready to start BFS.`,
                log: `Starting BFS from node ${sourceNode} to find nodes at distance ${targetK}.\nQueue=[(${sourceNode},0)], Visited={${sourceNode}}`
            });

            while(queue.length > 0) {
                let curr = queue.shift();
                let u = curr.u;
                let d = curr.d;

                steps.push({
                    type: 'dequeue', queue: [...queue], visited: Array.from(visited), result: [...result], distances: {...distances},
                    activeU: u, activeV: null, currDist: d, pushed: null, popped: curr, updatedNode: null,
                    panel: `<b>Dequeue:</b> Node <b>${u}</b> at distance <b>${d}</b>.<br>Checking if distance equals K (${targetK}).`,
                    statusText: `Processing node ${u} at distance ${d}...`,
                    log: `\nDequeue (${u}, ${d}). Check if ${d} == ${targetK}.`
                });

                if (d === targetK) {
                    result.push(u);
                    steps.push({
                        type: 'match', queue: [...queue], visited: Array.from(visited), result: [...result], distances: {...distances},
                        activeU: u, activeV: null, currDist: d, pushed: null, popped: null, updatedNode: u,
                        panel: `Distance <b>${d} == ${targetK}</b>! <br><b style="color:var(--accent-green)">Match found.</b> Add Node <b>${u}</b> to the result array.`,
                        statusText: `Found match at Node ${u}!`,
                        log: `  -> Match! Distance is ${targetK}. Added ${u} to result.`,
                        logColor: 'var(--accent-green)'
                    });
                } else if (d > targetK) {
                    steps.push({
                        type: 'stop', queue: [...queue], visited: Array.from(visited), result: [...result], distances: {...distances},
                        activeU: u, activeV: null, currDist: d, pushed: null, popped: null, updatedNode: null,
                        panel: `Distance <b>${d} > ${targetK}</b>.<br>Since BFS guarantees increasing distance, we have passed the target layer and can safely stop exploring further from this node.`,
                        statusText: `Distance exceeded K. Stopping exploration.`,
                        log: `  -> Distance ${d} > ${targetK}. Skipping neighbors.`
                    });
                    continue; // Optional optimization: stop pushing neighbors
                }

                let neighbors = adjList[u] || [];
                
                if (neighbors.length === 0 && d < targetK) {
                    steps.push({
                        type: 'no_neighbors', queue: [...queue], visited: Array.from(visited), result: [...result], distances: {...distances},
                        activeU: u, activeV: null, currDist: d, pushed: null, popped: null, updatedNode: null,
                        panel: `Node <b>${u}</b> has no neighbors to explore.`,
                        statusText: `No neighbors for ${u}.`,
                        log: `  Node ${u} has no neighbors.`
                    });
                }

                for(let v of neighbors) {
                    steps.push({
                        type: 'check', queue: [...queue], visited: Array.from(visited), result: [...result], distances: {...distances},
                        activeU: u, activeV: v, currDist: d, pushed: null, popped: null, updatedNode: null,
                        panel: `Checking neighbor <b>${v}</b> of active node <b>${u}</b>.<br>Is <code>${v}</code> in the Visited Set?`,
                        statusText: `Evaluating neighbor ${v}...`,
                        log: `  Process neighbor ${v}:`
                    });

                    if (!visited.has(v)) {
                        visited.add(v);
                        let nextDist = d + 1;
                        distances[v] = nextDist;
                        let pushItem = {u: v, d: nextDist};
                        queue.push(pushItem);
                        
                        steps.push({
                            type: 'enqueue', queue: [...queue], visited: Array.from(visited), result: [...result], distances: {...distances},
                            activeU: u, activeV: v, currDist: d, pushed: pushItem, popped: null, updatedNode: v,
                            panel: `Neighbor <b>${v}</b> is <b style="color:var(--accent-green)">unvisited</b>.<br>Mark visited, set distance to <code>${d} + 1 = ${nextDist}</code>, and Enqueue <code>(${v}, ${nextDist})</code>.`,
                            statusText: `Enqueued (${v}, ${nextDist}).`,
                            log: `    -> Unvisited. Set dist=${nextDist} and Enqueue. Queue size: ${queue.length}`,
                            logColor: 'var(--accent-blue)'
                        });
                    } else {
                        steps.push({
                            type: 'skip', queue: [...queue], visited: Array.from(visited), result: [...result], distances: {...distances},
                            activeU: u, activeV: v, currDist: d, pushed: null, popped: null, updatedNode: null,
                            panel: `Neighbor <b>${v}</b> is <b style="color:var(--accent-red)">already visited</b>.<br>Skip it to avoid cycles and redundant paths.`,
                            statusText: `Skipped visited node ${v}.`,
                            log: `    -> Already visited. Skipped.`
                        });
                    }
                }
            }

            steps.push({
                type: 'final', queue: [...queue], visited: Array.from(visited), result: [...result], distances: {...distances},
                activeU: null, activeV: null, currDist: null, pushed: null, popped: null, updatedNode: null,
                panel: `<b>BFS Complete!</b><br>All nodes up to distance ${targetK} have been explored.<br>The nodes exactly at distance ${targetK} are: <b style="color:var(--accent-green); font-size:16px;">[${result.join(', ')}]</b>.`,
                complete: true, result: `[${result.join(', ')}]`,
                statusText: `Algorithm Complete.`,
                log: `\nQueue empty. BFS Complete.\nFinal Result: [${result.join(', ')}]`,
                logColor: 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawn = new Set();

            edgesList.forEach(e => {
                const u = e[0];
                const v = e[1];
                let key = u < v ? `${u}-${v}` : `${v}-${u}`;
                if (drawn.has(key)) return;
                drawn.add(key);

                const p1 = nodeCoords[u];
                const p2 = nodeCoords[v];
                if(!p1 || !p2) return;

                let isChecking = step.activeU !== null && step.activeV !== null && 
                                 ((step.activeU === u && step.activeV === v) || 
                                  (step.activeU === v && step.activeV === u));

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrink = nodeRadius + 2; 
                
                line.setAttribute('x1', p1.x + (dx/len)*shrink); 
                line.setAttribute('y1', p1.y + (dy/len)*shrink);
                line.setAttribute('x2', p2.x - (dx/len)*shrink); 
                line.setAttribute('y2', p2.y - (dy/len)*shrink);

                if (isChecking) {
                    line.setAttribute('stroke', 'var(--accent-purple)');
                    line.setAttribute('stroke-width', '4');
                    line.classList.add('line-anim');
                    line.setAttribute('stroke-dasharray', '6');
                    setTimeout(() => svg.appendChild(line), 0);
                } else {
                    line.setAttribute('stroke', 'var(--border-main)');
                    line.setAttribute('stroke-width', '2');
                    svg.appendChild(line);
                }
            });
        }

        function renderQueue(step) {
            const container = document.getElementById('queue-tiles');
            container.innerHTML = '';
            
            if (step.queue.length === 0 && !step.popped) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            if (step.popped && step.type === 'dequeue') {
                const popTile = document.createElement('div');
                popTile.className = `tile queue-tile popping`;
                popTile.innerText = `[${step.popped.u}, ${step.popped.d}]`;
                container.appendChild(popTile);
            }

            step.queue.forEach(item => {
                const tile = document.createElement('div');
                tile.className = `tile queue-tile`;
                if (step.pushed && step.pushed.u === item.u && step.pushed.d === item.d) {
                    tile.classList.add('pushing');
                }
                tile.innerText = `[${item.u}, ${item.d}]`;
                container.appendChild(tile);
            });
        }

        function renderDistances(step) {
            const container = document.getElementById('dist-tiles');
            container.innerHTML = '';
            
            const keys = Object.keys(step.distances);
            if (keys.length === 0) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            keys.forEach(k => {
                const val = step.distances[k];
                const tile = document.createElement('div');
                tile.className = `tile dist-tile`;
                if (step.updatedNode == k && step.type === 'enqueue') {
                    tile.classList.add('highlight-update');
                }
                tile.innerText = `${k}➔${val}`;
                container.appendChild(tile);
            });
        }

        function renderResult(step) {
            const container = document.getElementById('result-tiles');
            container.innerHTML = '';
            
            if (step.result.length === 0) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            step.result.forEach(val => {
                const tile = document.createElement('div');
                tile.className = `tile res-tile`;
                if (step.updatedNode == val && step.type === 'match') {
                    tile.classList.add('highlight-update');
                }
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            nodes.forEach(n => {
                const el = document.getElementById(`node-${n}`);
                if(!el) return;
                
                el.className = 'node';
                
                if (n === sourceNode) el.classList.add('source-node');
                
                if (step.visited.includes(n)) el.classList.add('visited');
                if (step.result.includes(n)) el.classList.add('result-node');
                
                if (step.activeU === n) el.classList.add('active-u');
                if (step.activeV === n) el.classList.add('active-v');
            });

            drawEdges(step);

            renderQueue(step);
            renderDistances(step);
            renderResult(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.activeU !== null ? step.activeU : '—';
            document.getElementById('val-dist').innerText = step.currDist !== null ? step.currDist : '—';
            document.getElementById('val-v').innerText = step.activeV !== null ? step.activeV : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
