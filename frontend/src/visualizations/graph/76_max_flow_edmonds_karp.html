<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximum Flow (Edmonds-Karp) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 450px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 500px;
            height: 480px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 2;
        }
        
        .node.source { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(56,139,253,0.5); color: var(--accent-blue); background: rgba(56,139,253,0.15); }
        .node.target { border-color: var(--accent-green); box-shadow: 0 0 15px rgba(63,185,80,0.5); color: var(--accent-green); background: rgba(63,185,80,0.15); }
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 4; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 3; color: var(--accent-purple); }
        .node.visited { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 320px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 44px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.q-tile { background: #1a150b; border-color: var(--accent-orange); color: var(--text-main); padding: 0 8px; width: auto; font-size: 14px;}
        .tile.vis-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        
        .tile.pushing { animation: pushAnim 0.3s ease; border-color: var(--accent-green); box-shadow: 0 0 8px var(--accent-green);}
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 850px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 850px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 32px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.1); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 850px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 850px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }

        .edge-label { font-family: monospace; font-weight: bold; font-size: 12px; text-anchor: middle; dominant-baseline: central; fill: var(--text-main); }
        .edge-bg { fill: var(--bg-surface); stroke: var(--border-main); stroke-width: 1px; rx: 4px; }
        .edge-active .edge-bg { stroke: var(--accent-purple); }
        .edge-active .edge-label { fill: var(--accent-purple); }
        .edge-path .edge-bg { stroke: var(--accent-green); }
        .edge-path .edge-label { fill: var(--accent-green); }
        .edge-back .edge-bg { stroke: var(--accent-orange); }
        .edge-back .edge-label { fill: var(--accent-orange); }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="4">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1,3],[0,2,2],[1,2,5],[1,3,2],[2,3,3]]">
        <label class="ui-label">s =</label>
        <input type="text" id="s-input" class="small-input" placeholder="0">
        <label class="ui-label">t =</label>
        <input type="text" id="t-input" class="small-input" placeholder="3">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(4, '[[0,1,3],[0,2,2],[1,2,5],[1,3,2],[2,3,3]]', 0, 3)">Ex 1</button>
        <button onclick="loadExample(6, '[[0,1,16],[0,2,13],[1,2,10],[1,3,12],[2,1,4],[2,4,14],[3,2,9],[3,5,20],[4,3,7],[4,5,4]]', 0, 5)">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                    <marker id="arrow-path" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-green)" />
                    </marker>
                    <marker id="arrow-back" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-orange)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">Visited Array (BFS):</div>
                <div class="tiles-wrapper" id="vis-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-orange);">BFS Queue:</div>
                <div class="tiles-wrapper" id="q-tiles"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Active Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Residual Capacity</span>
            <span class="info-value" id="val-res" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Total Max Flow</span>
            <span class="info-value" id="val-flow" style="color: var(--accent-green);">0</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">total max flow =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:rgba(56,139,253,0.15); border-color:var(--accent-blue); border-width:2px;"></span> Source (s)</div>
        <div class="legend-item"><span class="dot" style="background:rgba(63,185,80,0.15); border-color:var(--accent-green); border-width:2px;"></span> Sink (t)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Active Node (u)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Edge</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-green); border-width:2px;"></span> Augmenting Path</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px; border-style:dashed;"></span> Evaluating Back Edge</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 4;
        let edgesList = [[0,1,3], [0,2,2], [1,2,5], [1,3,2], [2,3,3]];
        let srcNode = 0;
        let sinkNode = 3;
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [3200, 1600, 800];

        function init() { loadExample(4, '[[0,1,3],[0,2,2],[1,2,5],[1,3,2],[2,3,3]]', 0, 3); }

        function loadExample(v, eStr, s, t) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            document.getElementById('s-input').value = s;
            document.getElementById('t-input').value = t;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                srcNode = parseInt(document.getElementById('s-input').value);
                sinkNode = parseInt(document.getElementById('t-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || isNaN(srcNode) || isNaN(sinkNode) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V, src, dst are integers and edges is a valid array of [u, v, cap].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 250;
            const cy = 240;
            const radius = 170;

            for (let i = 0; i < V_count; i++) {
                let x, y;
                if (i === srcNode) { x = 60; y = cy; }
                else if (i === sinkNode) { x = 440; y = cy; }
                else {
                    // Distribute remaining evenly
                    let rem = V_count - 2;
                    let idx = i > srcNode ? i - 1 : i;
                    if (i > sinkNode) idx--; // Adjust index among remaining
                    let angle = -Math.PI/2 + (idx * Math.PI) / (rem - 1 || 1); 
                    if (rem === 1) angle = -Math.PI/2;
                    if (rem > 2) {
                        angle = -Math.PI/2 + (idx * Math.PI*2) / rem;
                    }
                    x = cx + radius * 0.6 * Math.cos(angle);
                    y = cy + radius * 0.8 * Math.sin(angle);
                }

                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function cloneMatrix(mat) { return mat.map(row => [...row]); }

        function generateSteps() {
            steps = [];
            
            let cap = Array.from({length: V_count}, () => new Array(V_count).fill(0));
            let flow = Array.from({length: V_count}, () => new Array(V_count).fill(0));
            let adj = Array.from({length: V_count}, () => []);

            for (let [u, v, c] of edgesList) {
                cap[u][v] += c; 
                if (!adj[u].includes(v)) adj[u].push(v);
                if (!adj[v].includes(u)) adj[v].push(u); // Add reverse edge for residual graph
            }

            let maxFlow = 0;

            steps.push({
                type: 'init', flow: cloneMatrix(flow), maxFlow: maxFlow,
                queue: [], visited: new Array(V_count).fill(false),
                u: null, v: null, residual: null,
                activeEdge: null, pathEdges: [],
                pushedItem: null, poppedItem: null,
                panel: `<b>Edmonds-Karp Algorithm (Maximum Flow)</b><br>We repeatedly use BFS to find the shortest augmenting path from Source (<b>${srcNode}</b>) to Sink (<b>${sinkNode}</b>) in the residual graph.<br>Initial Flow = 0.`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. V=${V_count}, Source=${srcNode}, Sink=${sinkNode}.`
            });

            while (true) {
                let parent = new Array(V_count).fill(-1);
                let visited = new Array(V_count).fill(false);
                let queue = [srcNode];
                visited[srcNode] = true;

                steps.push({
                    type: 'bfs_start', flow: cloneMatrix(flow), maxFlow: maxFlow,
                    queue: [...queue], visited: [...visited],
                    u: null, v: null, residual: null,
                    activeEdge: null, pathEdges: [],
                    pushedItem: srcNode, poppedItem: null,
                    panel: `<b>Start BFS</b><br>Looking for an augmenting path with available residual capacity.<br>Initialize BFS queue with Source Node <b>${srcNode}</b>.`,
                    statusText: `Started new BFS iteration.`,
                    log: `\n--- Searching for augmenting path ---`
                });

                let reachedSink = false;

                while (queue.length > 0) {
                    let u = queue.shift();
                    
                    steps.push({
                        type: 'dequeue', flow: cloneMatrix(flow), maxFlow: maxFlow,
                        queue: [...queue], visited: [...visited],
                        u: u, v: null, residual: null,
                        activeEdge: null, pathEdges: [],
                        pushedItem: null, poppedItem: u,
                        panel: `<b>Dequeue:</b> Extract Node <b>${u}</b>.<br>Checking all adjacent nodes in the residual graph...`,
                        statusText: `Processing Node ${u}...`,
                        log: `Dequeued Node ${u}.`
                    });

                    for (let v of adj[u]) {
                        let residual = cap[u][v] - flow[u][v];
                        let isBack = cap[u][v] === 0 && flow[v][u] > 0;

                        steps.push({
                            type: 'check_edge', flow: cloneMatrix(flow), maxFlow: maxFlow,
                            queue: [...queue], visited: [...visited],
                            u: u, v: v, residual: residual,
                            activeEdge: {u, v, isBack}, pathEdges: [],
                            pushedItem: null, poppedItem: null,
                            panel: `Evaluating edge <b>${u} ➔ ${v}</b>.<br>Residual capacity: <code>Capacity (${cap[u][v]}) - Flow (${flow[u][v]}) = <b>${residual}</b></code>.<br>Is <code>residual > 0</code> AND <b>${v}</b> unvisited?`,
                            statusText: `Evaluating edge ${u}➔${v}...`,
                            log: `  Check edge ${u}->${v}. Residual = ${residual}.`
                        });

                        if (!visited[v] && residual > 0) {
                            visited[v] = true;
                            parent[v] = u;
                            queue.push(v);

                            steps.push({
                                type: 'enqueue', flow: cloneMatrix(flow), maxFlow: maxFlow,
                                queue: [...queue], visited: [...visited],
                                u: u, v: v, residual: residual,
                                activeEdge: {u, v, isBack}, pathEdges: [],
                                pushedItem: v, poppedItem: null,
                                panel: `<b style="color:var(--accent-green)">Yes!</b> We can push flow through this edge.<br>Mark <b>${v}</b> as visited and enqueue it.`,
                                statusText: `Enqueued Node ${v}.`,
                                log: `    -> Valid edge. Enqueued ${v}.`,
                                logColor: 'var(--accent-blue)'
                            });

                            if (v === sinkNode) {
                                reachedSink = true;
                                break;
                            }
                        } else {
                            steps.push({
                                type: 'skip_edge', flow: cloneMatrix(flow), maxFlow: maxFlow,
                                queue: [...queue], visited: [...visited],
                                u: u, v: v, residual: residual,
                                activeEdge: {u, v, isBack}, pathEdges: [],
                                pushedItem: null, poppedItem: null,
                                panel: `<b style="color:var(--accent-red)">No.</b> Either residual capacity is 0 or node is already visited. Skip.`,
                                statusText: `Edge skipped.`,
                                log: `    -> Skipped (visited or no residual capacity).`
                            });
                        }
                    }
                    if (reachedSink) break;
                }

                if (!reachedSink) {
                    steps.push({
                        type: 'no_path', flow: cloneMatrix(flow), maxFlow: maxFlow,
                        queue: [...queue], visited: [...visited],
                        u: null, v: null, residual: null,
                        activeEdge: null, pathEdges: [],
                        pushedItem: null, poppedItem: null,
                        panel: `<b>BFS Complete:</b> Target <b>${sinkNode}</b> could not be reached.<br>No more augmenting paths exist in the residual graph. The algorithm terminates.`,
                        statusText: `No augmenting path found. Terminating.`,
                        log: `\nTarget unreachable. No more augmenting paths.`,
                        logColor: 'var(--accent-orange)'
                    });
                    break;
                }

                // Trace back to find bottleneck
                let path = [];
                let curr = sinkNode;
                let bottleneck = Infinity;
                let pathEdges = [];

                while (curr !== srcNode) {
                    let p = parent[curr];
                    path.unshift([p, curr]);
                    pathEdges.push({u: p, v: curr});
                    bottleneck = Math.min(bottleneck, cap[p][curr] - flow[p][curr]);
                    curr = p;
                }

                steps.push({
                    type: 'bottleneck', flow: cloneMatrix(flow), maxFlow: maxFlow,
                    queue: [...queue], visited: [...visited],
                    u: null, v: null, residual: null,
                    activeEdge: null, pathEdges: pathEdges,
                    pushedItem: null, poppedItem: null,
                    panel: `<b style="color:var(--accent-green); font-size:16px;">Augmenting Path Found!</b><br>Path: <b>${path.map(e=>e[0]).join(' ➔ ')} ➔ ${sinkNode}</b>.<br>Bottleneck capacity (minimum residual on path) is <b style="color:var(--accent-orange)">${bottleneck}</b>.`,
                    statusText: `Path found! Bottleneck is ${bottleneck}.`,
                    log: `=> Path found! Bottleneck = ${bottleneck}.`,
                    logColor: 'var(--accent-green)'
                });

                // Augment flow
                for (let [u, v] of path) {
                    flow[u][v] += bottleneck;
                    flow[v][u] -= bottleneck;
                }
                maxFlow += bottleneck;

                steps.push({
                    type: 'augment', flow: cloneMatrix(flow), maxFlow: maxFlow,
                    queue: [...queue], visited: [...visited],
                    u: null, v: null, residual: null,
                    activeEdge: null, pathEdges: pathEdges,
                    pushedItem: null, poppedItem: null,
                    panel: `<b>Augment Flow</b><br>Add ${bottleneck} to forward edges and subtract ${bottleneck} from reverse edges along the path.<br>Total Max Flow is now <b style="color:var(--accent-green)">${maxFlow}</b>.`,
                    statusText: `Augmented flow by ${bottleneck}.`,
                    log: `=> Augmented flow. New Total Flow = ${maxFlow}.`,
                    logColor: 'var(--accent-blue)'
                });
            }

            steps.push({
                type: 'final', flow: cloneMatrix(flow), maxFlow: maxFlow,
                queue: [], visited: new Array(V_count).fill(false),
                u: null, v: null, residual: null,
                activeEdge: null, pathEdges: [],
                pushedItem: null, poppedItem: null,
                panel: `<b>Algorithm Complete!</b><br>No more augmenting paths exist.<br>The Maximum Flow from <b>${srcNode}</b> to <b>${sinkNode}</b> is <b style="color:var(--accent-green); font-size:18px;">${maxFlow}</b>.`,
                complete: true, result: maxFlow,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. Max Flow = ${maxFlow}`,
                logColor: 'var(--accent-green)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawn = new Set();
            let allVisualEdges = [];

            // Identify all edges to draw. We draw original edges (capacity > 0).
            for (let e of edgesList) {
                let u = e[0], v = e[1], c = e[2];
                let key = `${u}->${v}`;
                if (drawn.has(key)) continue;
                drawn.add(key);

                let isChecking = step.activeEdge && step.activeEdge.u === u && step.activeEdge.v === v && !step.activeEdge.isBack;
                let isCheckingBack = step.activeEdge && step.activeEdge.u === v && step.activeEdge.v === u && step.activeEdge.isBack;
                
                let inPath = step.pathEdges.some(pe => pe.u === u && pe.v === v);
                let inPathBack = step.pathEdges.some(pe => pe.u === v && pe.v === u);

                let flowVal = step.flow[u][v];
                
                allVisualEdges.push({u, v, c, flowVal, isChecking, isCheckingBack, inPath, inPathBack});
            }

            allVisualEdges.forEach(e => {
                const p1 = nodeCoords[e.u];
                const p2 = nodeCoords[e.v];
                if(!p1 || !p2) return;

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrinkTarget = nodeRadius + 6; 
                const shrinkSource = nodeRadius + 2; 

                // Check if reverse original edge exists to curve
                let hasReverse = edgesList.some(re => re[0]===e.v && re[1]===e.u);
                let dStr = "";
                let cx, cy;

                if (hasReverse) {
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const nx = -dy / len;
                    const ny = dx / len;
                    const curveOffset = 25; 
                    cx = midX + nx * curveOffset;
                    cy = midY + ny * curveOffset;
                    
                    const x1 = p1.x + (dx/len)*shrinkSource; 
                    const y1 = p1.y + (dy/len)*shrinkSource;
                    const x2 = p2.x - (dx/len)*shrinkTarget; 
                    const y2 = p2.y - (dy/len)*shrinkTarget;
                    dStr = `M ${x1},${y1} Q ${cx},${cy} ${x2},${y2}`;
                } else {
                    cx = (p1.x + p2.x) / 2;
                    cy = (p1.y + p2.y) / 2;
                    const x1 = p1.x + (dx/len)*shrinkSource; 
                    const y1 = p1.y + (dy/len)*shrinkSource;
                    const x2 = p2.x - (dx/len)*shrinkTarget; 
                    const y2 = p2.y - (dy/len)*shrinkTarget;
                    dStr = `M ${x1},${y1} L ${x2},${y2}`;
                }

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', dStr);
                path.setAttribute('fill', 'transparent');

                if (e.inPath) {
                    path.setAttribute('stroke', 'var(--accent-green)');
                    path.setAttribute('stroke-width', '4');
                    path.setAttribute('marker-end', 'url(#arrow-path)');
                    svg.appendChild(path);
                } else if (e.isChecking) {
                    path.setAttribute('stroke', 'var(--accent-purple)');
                    path.setAttribute('stroke-width', '4');
                    path.setAttribute('marker-end', 'url(#arrow-active)');
                    path.classList.add('line-anim');
                    path.setAttribute('stroke-dasharray', '8');
                    setTimeout(() => svg.appendChild(path), 0);
                } else if (e.isCheckingBack) {
                    path.setAttribute('stroke', 'var(--accent-orange)');
                    path.setAttribute('stroke-width', '4');
                    path.setAttribute('stroke-dasharray', '6');
                    path.classList.add('line-anim');
                    setTimeout(() => svg.appendChild(path), 0);
                } else if (e.inPathBack) {
                    path.setAttribute('stroke', 'var(--accent-orange)');
                    path.setAttribute('stroke-width', '4');
                    path.setAttribute('stroke-dasharray', '4');
                    svg.appendChild(path);
                } else {
                    path.setAttribute('stroke', 'var(--border-main)');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(path);
                }

                // Add Label Flow/Cap
                const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                bg.setAttribute('x', cx - 20);
                bg.setAttribute('y', cy - 10);
                bg.setAttribute('width', 40);
                bg.setAttribute('height', 20);
                
                let activeClass = '';
                if (e.isChecking) activeClass = 'edge-active';
                else if (e.isCheckingBack) activeClass = 'edge-back';
                else if (e.inPath) activeClass = 'edge-path';
                else if (e.inPathBack) activeClass = 'edge-back';

                bg.setAttribute('class', `edge-bg ${activeClass}`);
                
                const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                txt.setAttribute('x', cx);
                txt.setAttribute('y', cy);
                txt.setAttribute('class', `edge-label ${activeClass}`);
                txt.textContent = `${e.flowVal}/${e.c}`;

                if (e.isChecking || e.isCheckingBack) {
                    setTimeout(() => {
                        svg.appendChild(bg);
                        svg.appendChild(txt);
                    }, 0);
                } else {
                    svg.appendChild(bg);
                    svg.appendChild(txt);
                }
            });
        }

        function renderQueue(step) {
            const container = document.getElementById('q-tiles');
            container.innerHTML = '';
            
            if (step.queue.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            if (step.poppedItem !== null && step.type === 'dequeue') {
                const popTile = document.createElement('div');
                popTile.className = `tile q-tile popping`;
                popTile.innerText = step.poppedItem;
                container.appendChild(popTile);
            }

            step.queue.forEach(val => {
                const tile = document.createElement('div');
                tile.className = `tile q-tile`;
                if (step.pushedItem === val) {
                    tile.classList.add('pushing');
                }
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderArray(containerId, arr, tileClass, stepData) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile ${tileClass}`;
                
                if (stepData.updatedNode === i && tileClass === 'vis-tile') {
                    tile.classList.add('highlight-update');
                }
                
                tile.innerText = val ? 'T' : 'F';
                
                if (!val) {
                    tile.style.background = '#21262d';
                    tile.style.borderColor = 'var(--border-main)';
                    tile.style.color = 'var(--text-dim)';
                }
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                if (i === srcNode) el.classList.add('source');
                if (i === sinkNode) el.classList.add('target');
                
                if (step.visited[i] && i !== srcNode && i !== sinkNode) {
                    el.classList.add('visited');
                }
                
                if (step.u === i && !step.complete) el.classList.add('active-u');
                if (step.v === i && !step.complete) el.classList.add('active-v');
            }

            drawEdges(step);
            renderArray('vis-tiles', step.visited, 'vis-tile', step);
            renderQueue(step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-u').innerText = step.u !== null ? `${step.u}` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `${step.v}` : '—';
            document.getElementById('val-res').innerText = step.residual !== null ? `${step.residual}` : '—';
            document.getElementById('val-flow').innerText = step.maxFlow;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
</html>
