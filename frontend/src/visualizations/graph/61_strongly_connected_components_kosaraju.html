<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kosaraju SCC &middot; Graph</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
  --scc-0:#06b6d4; --scc-1:#a855f7; --scc-2:#f5a524; --scc-3:#22c55e; --scc-4:#f85149; --scc-5:#ff7b72; --scc-6:#d2a8ff;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:330px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'▸'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'✓'; color:var(--accent-green);}
.narration.t2{border-color:rgba(245,165,36,.3);}
.narration.t2::before{content:'▸'; color:var(--accent-orange);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px; position:relative;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.graph-wrap{flex:0 0 auto; position:relative;}
svg.graph{display:block; width:400px; max-width:100%; height:auto;}
.edge{fill:none; stroke:var(--border-main); stroke-width:2; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.checking{stroke:var(--accent-purple); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.edge.transposed{stroke:var(--accent-orange); opacity:.75;}
.gnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s;}
.gnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.gnode.visited .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.12); filter:drop-shadow(0 0 6px rgba(34,197,94,.4));}
.gnode.visited .nl{fill:#bbf7d0;}
.gnode.activeu .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.gnode.activeu .nl{fill:#ffd591;}
.gnode.activev .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 12px rgba(168,85,247,.6)); stroke-width:3;}
.gnode.activev .nl{fill:#e9d5ff;}
.gnode.scc0 .nc{stroke:var(--scc-0); fill:rgba(6,182,212,.16); filter:drop-shadow(0 0 8px rgba(6,182,212,.5));}.gnode.scc0 .nl{fill:#a5f3fc;}
.gnode.scc1 .nc{stroke:var(--scc-1); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 8px rgba(168,85,247,.5));}.gnode.scc1 .nl{fill:#e9d5ff;}
.gnode.scc2 .nc{stroke:var(--scc-2); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 8px rgba(245,165,36,.5));}.gnode.scc2 .nl{fill:#ffd591;}
.gnode.scc3 .nc{stroke:var(--scc-3); fill:rgba(34,197,94,.16); filter:drop-shadow(0 0 8px rgba(34,197,94,.5));}.gnode.scc3 .nl{fill:#bbf7d0;}
.gnode.scc4 .nc{stroke:var(--scc-4); fill:rgba(248,81,73,.16); filter:drop-shadow(0 0 8px rgba(248,81,73,.5));}.gnode.scc4 .nl{fill:#ffc4c0;}
.gnode.scc5 .nc{stroke:var(--scc-5); fill:rgba(255,123,114,.16);}.gnode.scc5 .nl{fill:#ffc4c0;}
.gnode.scc6 .nc{stroke:var(--scc-6); fill:rgba(210,168,255,.16);}.gnode.scc6 .nl{fill:#e9d5ff;}

.side{display:flex; flex-direction:column; gap:12px; min-width:230px; flex:1 1 230px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;}
.panel .cap .hint{font-weight:500; color:var(--text-dim); letter-spacing:0;}
.panel.v .cap{color:var(--accent-green);} .panel.s .cap{color:var(--accent-blue);} .panel.r .cap{color:var(--accent-orange);}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start;}
.tile{min-width:34px; height:34px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.tile.v{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.1); color:#bbf7d0;}
.tile.vf{border-color:var(--border-main); background:rgba(255,255,255,.04); color:var(--text-dim);}
.tile.s{border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.12); color:#a5f3fc;}
.tile.s.top{border-color:var(--accent-blue); box-shadow:0 0 10px rgba(6,182,212,.5);}
.tile-wrap{display:flex; flex-direction:column; align-items:center; gap:3px;}
.tile-idx{font-family:var(--mono); font-size:10px; color:var(--text-dim);}
.tiles .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
.scc-row{display:flex; gap:7px; flex-wrap:wrap;}
.scc-chip{font-family:var(--mono); font-weight:800; font-size:13px; border-radius:9px; padding:5px 10px; border:1.5px solid; background:rgba(255,255,255,.04);}
.scc-chip.c0{border-color:var(--scc-0); color:#a5f3fc; background:rgba(6,182,212,.1);}
.scc-chip.c1{border-color:var(--scc-1); color:#e9d5ff; background:rgba(168,85,247,.1);}
.scc-chip.c2{border-color:var(--scc-2); color:#ffd591; background:rgba(245,165,36,.1);}
.scc-chip.c3{border-color:var(--scc-3); color:#bbf7d0; background:rgba(34,197,94,.1);}
.scc-chip.c4{border-color:var(--scc-4); color:#ffc4c0; background:rgba(248,81,73,.1);}

#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;} .code-line .cm{color:#5f718e;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.p b{color:var(--accent-blue);} .pill.u b{color:var(--accent-orange);} .pill.n b{color:var(--accent-purple);} .pill.s b{color:var(--accent-green);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:130px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>V =</label>
  <input type="text" id="v-input" class="small-input" value="5">
  <label>edges =</label>
  <input type="text" id="e-input" class="large-input" value="[[0,1],[1,2],[2,0],[1,3],[3,4]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(5,'[[0,1],[1,2],[2,0],[1,3],[3,4]]')">Ex 1</button>
  <button onclick="loadExample(4,'[[0,1],[1,2],[2,3]]')">Ex 2</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Kosaraju SCC <span class="sub">&middot; strongly connected components</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="graph-wrap"><svg class="graph" id="graph" viewBox="0 0 400 400"></svg></div>
      <div class="side">
        <div class="panel v"><div class="cap"><span>VISITED ARRAY</span></div><div class="tiles" id="vis-tiles"></div></div>
        <div class="panel s"><div class="cap"><span>FINISH STACK</span><span class="hint">bottom &rarr; top</span></div><div class="tiles" id="stack-tiles"></div></div>
        <div class="panel r"><div class="cap"><span>SCCs FOUND</span></div><div class="scc-row" id="scc-tiles"></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill p">phase <b id="pill-phase">1</b></span>
        <span class="pill u">active u = <b id="pill-u">&minus;</b></span>
        <span class="pill n">neighbor v = <b id="pill-v">&minus;</b></span>
        <span class="pill s">SCCs <b id="pill-cnt">0</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>active u</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>neighbor v</span>
          <span class="li"><span class="dot" style="background:var(--border-main)"></span>edge</span>
          <span class="li"><span class="dot" style="background:var(--accent-orange);opacity:.75"></span>transposed</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>visited</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','kosaraju'],['src','(V, edges):']],
  [['cm','  # Pass 1: DFS on G, push by finish-time']],
  [['kw','  for'],['src',' u '],['kw','in'],['src',' range(V):']],
  [['kw','    if'],['src',' not visited[u]: dfs1(u)']],
  [['cm','  # build transpose G^T (reverse edges)']],
  [['src','  visited = [False]*V;  sccs = []']],
  [['cm','  # Pass 2: DFS on G^T, pop the stack']],
  [['kw','  while'],['src',' stack:']],
  [['src','    u = stack.pop()']],
  [['kw','    if'],['src',' not visited[u]:']],
  [['src','      comp = []; dfs2(u, comp); sccs.append(comp)']],
  [['kw','  return'],['src',' sccs']],
];

let V_count=5, edgesList=[[0,1],[1,2],[2,0],[1,3],[3,4]];
let coord={}, gnodes={}, edgeEls={};
let steps=[], stepIndex=0, timer=null;
const delays=[2400,1200,600];
let confettiArmed=true;

function init(){ buildCode(); loadExample(5,'[[0,1],[1,2],[2,0],[1,3],[3,4]]'); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(v,eStr){ document.getElementById('v-input').value=v; document.getElementById('e-input').value=eStr; parseAndGen(); }
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    V_count=parseInt(document.getElementById('v-input').value,10);
    edgesList=JSON.parse(document.getElementById('e-input').value.replace(/\(/g,'[').replace(/\)/g,']'));
    if(isNaN(V_count)||!Array.isArray(edgesList)) throw 'bad';
    setupGraph(); generateSteps(); reset();
  }catch(e){ alert('Invalid format. V must be an integer and edges a list of [u,v].'); }
}

function setupGraph(){
  const svg=document.getElementById('graph'); svg.innerHTML=''; coord={}; gnodes={}; edgeEls={};
  // arrowhead markers
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML=`
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="rgba(255,255,255,.30)"/></marker>
    <marker id="ah-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#a855f7"/></marker>
    <marker id="ah-t" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#f5a524"/></marker>`;
  svg.appendChild(defs);
  if(!V_count) return;
  const cx=200, cy=200, R=Math.min(150, 70+V_count*10);
  for(let i=0;i<V_count;i++){ const ang=(Math.PI*2*i)/V_count - Math.PI/2; coord[i]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)}; }
  // dedupe edges by direction, detect reciprocal for curving
  const seen=new Set();
  edgesList.forEach((e,i)=>{
    const u=e[0], v=e[1]; const key=u+'>'+v; if(seen.has(key)) return; seen.add(key);
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','edge'); path.id='e'+u+'_'+v; path.setAttribute('marker-end','url(#ah)');
    path.dataset.u=u; path.dataset.v=v;
    svg.appendChild(path); edgeEls[u+'_'+v]={el:path,u,v};
  });
  // nodes on top
  for(let i=0;i<V_count;i++){ const p=coord[i];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','gnode'); g.id='gn'+i;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',21);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=i;
    g.appendChild(c); g.appendChild(t); svg.appendChild(g); gnodes[i]=g; }
  positionEdges();
}
function positionEdges(){
  const NR=24;
  for(const k in edgeEls){ const {el,u,v}=edgeEls[k]; const p1=coord[u], p2=coord[v]; if(!p1||!p2) continue;
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1;
    const recip=!!edgeEls[v+'_'+u];
    const x1=p1.x+(dx/len)*NR, y1=p1.y+(dy/len)*NR;
    const x2=p2.x-(dx/len)*(NR+5), y2=p2.y-(dy/len)*(NR+5);
    if(recip){ const nx=-dy/len, ny=dx/len, off=22; const mx=(p1.x+p2.x)/2+nx*off, my=(p1.y+p2.y)/2+ny*off;
      el.setAttribute('d',`M ${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`);
    } else { el.setAttribute('d',`M ${x1} ${y1} L ${x2} ${y2}`); }
  }
}

function generateSteps(){
  steps=[];
  const adj=Array.from({length:V_count},()=>[]);
  const adjT=Array.from({length:V_count},()=>[]);
  for(const [u,v] of edgesList){ adj[u].push(v); adjT[v].push(u); }
  let visited=new Array(V_count).fill(false);
  const stack=[]; const sccMap=new Array(V_count).fill(-1); const sccList=[];

  function snap(o){ steps.push({
    phase:o.phase, transposed:!!o.transposed, visited:[...visited], stack:[...stack],
    sccMap:[...sccMap], sccList:sccList.map(s=>[...s]),
    u:o.u??null, v:o.v??null, pushed:o.pushed??null, popped:o.popped??null,
    code:o.code, narr:o.narr, log:o.log, logColor:o.logColor, complete:o.complete }); }

  snap({phase:1, code:[1,2,3], narr:`<b>Kosaraju's algorithm.</b> <b>Pass&nbsp;1:</b> run DFS on the original graph; when a node finishes exploring, push it onto the finish stack.`, log:`init  V=${V_count}  Pass 1: DFS on G`});

  function dfs1(u,depth){ const pad='  '.repeat(depth); visited[u]=true;
    snap({phase:1, u, pushed:null, code:[3,4], narr:`<b>DFS1 visit <code>${u}</code></b> &rarr; mark <code>visited[${u}]=true</code>, explore out-edges.`, log:`${pad}dfs1(${u}) visit`});
    for(const v of adj[u]){
      snap({phase:1, u, v, code:[4], narr:`Out-edge <code>${u}&rarr;${v}</code> &mdash; is <code>${v}</code> unvisited?`, log:`${pad}  edge ${u}->${v}`});
      if(!visited[v]){
        snap({phase:1, u, v, code:[4], narr:`<code>${v}</code> is new &rarr; recurse <code>dfs1(${v})</code>.`, log:`${pad}    recurse ${v}`});
        dfs1(v,depth+1);
        snap({phase:1, u, v, code:[4], narr:`Back at <code>${u}</code> from <code>${v}</code>; continue remaining out-edges.`, log:`${pad}  back to ${u}`});
      } else {
        snap({phase:1, u, v, code:[4], narr:`<code>${v}</code> already visited &rarr; skip.`, log:`${pad}    ${v} visited, skip`});
      }
    }
    stack.push(u);
    snap({phase:1, u, pushed:u, code:[3], narr:`<code>${u}</code> finished &rarr; <b>push onto finish stack</b>. Stack = <code>[${stack.join(', ')}]</code>.`, log:`${pad}finish ${u} -> push`});
  }
  for(let i=0;i<V_count;i++){ if(!visited[i]) dfs1(i,0); }

  snap({phase:2, transposed:true, code:[5], narr:`<b>Transpose G &rarr; G&#7488;:</b> reverse every edge (shown in orange). This isolates SCCs while keeping cycles intact.`, log:`Pass 2: transpose all edges`, logColor:'var(--accent-orange)'});

  visited=new Array(V_count).fill(false);
  snap({phase:2, transposed:true, code:[6,7], narr:`Reset <code>visited</code>. <b>Pass&nbsp;2:</b> pop the stack; each DFS on G&#7488; from an unvisited node is one SCC.`, log:`Pass 2: reset visited, pop stack`});

  let curr=[], sccIndex=0;
  function dfs2(u,depth){ const pad='  '.repeat(depth); visited[u]=true; curr.push(u); sccMap[u]=sccIndex;
    snap({phase:2, transposed:true, u, code:[10], narr:`<b>DFS2 visit <code>${u}</code></b> &rarr; add to current component (SCC #${sccIndex}).`, log:`${pad}dfs2(${u}) -> SCC ${sccIndex}`});
    for(const v of adjT[u]){
      snap({phase:2, transposed:true, u, v, code:[10], narr:`Transposed edge <code>${u}&rarr;${v}</code> &mdash; is <code>${v}</code> unvisited?`, log:`${pad}  edge^T ${u}->${v}`});
      if(!visited[v]){
        snap({phase:2, transposed:true, u, v, code:[10], narr:`<code>${v}</code> is new &rarr; recurse <code>dfs2(${v})</code> &mdash; grow this SCC.`, log:`${pad}    recurse ${v}`});
        dfs2(v,depth+1);
        snap({phase:2, transposed:true, u, v, code:[10], narr:`Back at <code>${u}</code> from <code>${v}</code>.`, log:`${pad}  back to ${u}`});
      } else {
        snap({phase:2, transposed:true, u, v, code:[10], narr:`<code>${v}</code> already in an SCC &rarr; skip.`, log:`${pad}    ${v} visited, skip`});
      }
    }
  }
  while(stack.length){
    const node=stack[stack.length-1];
    snap({phase:2, transposed:true, u:node, popped:node, code:[8,9], narr:`<b>Pop <code>${node}</code></b> off the finish stack &mdash; is it unvisited?`, log:`pop ${node}`});
    stack.pop();
    if(!visited[node]){
      curr=[];
      snap({phase:2, transposed:true, u:node, code:[9,10], narr:`<code>${node}</code> is unvisited &rarr; <b>start a new SCC</b> from it on G&#7488;.`, log:`  new SCC from ${node}`, logColor:'var(--accent-orange)'});
      dfs2(node,0);
      sccList.push([...curr]);
      snap({phase:2, transposed:true, code:[10], narr:`<b>SCC found:</b> <code>[${curr.join(', ')}]</code>. This DFS tree is one strongly connected component.`, log:`=> SCC ${sccIndex} = [${curr.join(',')}]`, logColor:'var(--accent-green)'});
      sccIndex++;
    } else {
      snap({phase:2, transposed:true, u:node, code:[9], narr:`<code>${node}</code> already belongs to a prior SCC &rarr; skip, pop next.`, log:`  ${node} done, skip`});
    }
  }
  const resultStr=`[${sccList.map(s=>`[${s.join(',')}]`).join(', ')}]`;
  snap({phase:2, transposed:true, code:[11], complete:true, narr:`<b>Complete.</b> Every node assigned. Strongly connected components = <code>${resultStr}</code> &mdash; <b>${sccList.length}</b> SCC(s).`, log:`done. SCCs = ${resultStr}`, logColor:'var(--accent-green)'});
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  // nodes
  for(let i=0;i<V_count;i++){ const g=gnodes[i]; if(!g) continue;
    g.classList.remove('visited','activeu','activev','scc0','scc1','scc2','scc3','scc4','scc5','scc6');
    if(step.transposed && step.sccMap[i]!==-1){ g.classList.add('scc'+(step.sccMap[i]%7)); }
    else if(!step.transposed && step.visited[i]){ g.classList.add('visited'); }
    if(step.u===i && !step.complete) g.classList.add('activeu');
    if(step.v===i && !step.complete) g.classList.add('activev');
    if(step.pushed===i){ const c=g.querySelector('.nc'); if(c) Motion.pop(c); }
  }
  // edges: orient + class for original vs transposed; highlight the checked edge
  for(const k in edgeEls){ const {el,u,v}=edgeEls[k]; el.classList.remove('transposed','checking');
    let su=u, sv=v;
    if(step.transposed){ // draw reversed
      el.classList.add('transposed'); el.setAttribute('marker-end','url(#ah-t)');
      su=v; sv=u;
    } else { el.setAttribute('marker-end','url(#ah)'); }
    if(step.u!=null && step.v!=null && su===step.u && sv===step.v){ el.classList.add('checking'); el.classList.remove('transposed'); el.setAttribute('marker-end','url(#ah-a)'); }
  }
  reorientEdges(step.transposed);

  // visited tiles (T/F with index)
  fillVisited('vis-tiles', step.visited, step);
  fillStack('stack-tiles', step.stack, step);
  fillScc('scc-tiles', step.sccList);

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done',!!step.complete);
  narr.classList.toggle('t2', !!step.transposed && !step.complete);
  // step.code holds 1-based line numbers; CODE index i renders as line (i+1)
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i+1)); });

  document.getElementById('pill-phase').textContent=step.phase;
  document.getElementById('pill-u').textContent=step.u!=null?step.u:'−';
  document.getElementById('pill-v').textContent=step.v!=null?step.v:'−';
  document.getElementById('pill-cnt').textContent=step.sccList.length;
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].logColor) d.style.color=steps[k].logColor; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function reorientEdges(transposed){
  // redraw path geometry reversed when transposed (arrow direction flips with marker; path endpoints reversed)
  const NR=24;
  for(const k in edgeEls){ const {el,u,v}=edgeEls[k];
    let a=transposed?v:u, b=transposed?u:v; const p1=coord[a], p2=coord[b]; if(!p1||!p2) continue;
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1;
    const recip=!!edgeEls[v+'_'+u];
    const x1=p1.x+(dx/len)*NR, y1=p1.y+(dy/len)*NR;
    const x2=p2.x-(dx/len)*(NR+5), y2=p2.y-(dy/len)*(NR+5);
    if(recip){ const nx=-dy/len, ny=dx/len, off=22; const mx=(p1.x+p2.x)/2+nx*off, my=(p1.y+p2.y)/2+ny*off;
      el.setAttribute('d',`M ${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`);
    } else { el.setAttribute('d',`M ${x1} ${y1} L ${x2} ${y2}`); }
  }
}

function fillVisited(id, arr, step){
  const c=document.getElementById(id); c.innerHTML='';
  arr.forEach((val,i)=>{ const w=document.createElement('div'); w.className='tile-wrap';
    const t=document.createElement('div'); t.className='tile '+(val?'v':'vf'); t.textContent=val?'T':'F';
    if(step.u===i){ t.style.borderColor='var(--accent-orange)'; }
    const ix=document.createElement('div'); ix.className='tile-idx'; ix.textContent='['+i+']';
    w.appendChild(t); w.appendChild(ix); c.appendChild(w); });
}
function fillStack(id, arr, step){
  const c=document.getElementById(id); c.innerHTML='';
  if(!arr.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ empty }'; c.appendChild(e); return; }
  arr.forEach((val,i)=>{ const t=document.createElement('div'); t.className='tile s'+(i===arr.length-1?' top':''); t.textContent=val;
    if(step.pushed===val && i===arr.length-1) Motion.pop(t);
    c.appendChild(t); });
}
function fillScc(id, sccList){
  const c=document.getElementById(id); c.innerHTML='';
  if(!sccList.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ none yet }'; c.appendChild(e); return; }
  sccList.forEach((s,i)=>{ const chip=document.createElement('div'); chip.className='scc-chip c'+(i%5); chip.textContent='{'+s.join(', ')+'}'; c.appendChild(chip); });
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
</body>
