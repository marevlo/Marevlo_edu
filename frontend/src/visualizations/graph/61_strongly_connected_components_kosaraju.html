<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strongly Connected Components (Kosaraju's Algorithm) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
            
            --scc-0: #e3b341;
            --scc-1: #388bfd;
            --scc-2: #3fb950;
            --scc-3: #f85149;
            --scc-4: #a371f7;
            --scc-5: #ff7b72;
            --scc-6: #d2a8ff;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .small-input { width: 50px; text-align: center; }
        .med-input { width: 350px; font-family: monospace; font-size: 12px;}

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRAPH AREA & ARRAYS */
        .visual-container { margin-top: 20px; display: flex; align-items: flex-start; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .graph-area {
            position: relative;
            width: 450px;
            height: 440px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            overflow: hidden;
        }

        #edges-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .nodes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .node {
            position: absolute;
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #21262d; border: 2px solid var(--border-main);
            color: var(--text-main); font-weight: bold; font-size: 16px;
            font-family: 'Courier New', monospace;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 2;
        }
        
        .node.active-u { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--accent-orange); border-color: var(--accent-orange); z-index: 4; color: var(--accent-orange); background: #332200; }
        .node.active-v { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 10px var(--accent-purple); border-color: var(--accent-purple); z-index: 3; color: var(--accent-purple); }
        .node.visited { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }

        .scc-node-0 { background: rgba(227, 179, 65, 0.15); border-color: var(--scc-0); color: var(--scc-0); box-shadow: 0 0 10px rgba(227,179,65,0.3);}
        .scc-node-1 { background: rgba(56, 139, 253, 0.15); border-color: var(--scc-1); color: var(--scc-1); box-shadow: 0 0 10px rgba(56,139,253,0.3);}
        .scc-node-2 { background: rgba(63, 185, 80, 0.15); border-color: var(--scc-2); color: var(--scc-2); box-shadow: 0 0 10px rgba(63,185,80,0.3);}
        .scc-node-3 { background: rgba(248, 81, 73, 0.15); border-color: var(--scc-3); color: var(--scc-3); box-shadow: 0 0 10px rgba(248,81,73,0.3);}
        .scc-node-4 { background: rgba(163, 113, 247, 0.15); border-color: var(--scc-4); color: var(--scc-4); box-shadow: 0 0 10px rgba(163,113,247,0.3);}

        .arrays-col { display: flex; flex-direction: column; gap: 16px; min-width: 250px; max-width: 350px; }
        .array-section { display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface); padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); min-height: 90px;}
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; align-content: flex-start;}
        
        .tile-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile {
            min-width: 40px; height: 36px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        
        .tile.vis-tile { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile.stack-tile { background: #0d213f; border-color: var(--accent-blue); color: var(--accent-blue); padding: 0 8px; width: auto; font-size: 14px;}
        
        .tile.highlight-update { animation: highlightFlash 0.6s ease; filter: brightness(1.5);}
        .tile.pushing { animation: pushAnim 0.3s ease; }
        .tile.popping { transform: scale(1.1); opacity: 0; }

        @keyframes highlightFlash { 0% { transform: scale(1); box-shadow: 0 0 0 transparent; } 50% { transform: scale(1.2); box-shadow: 0 0 10px currentColor; } 100% { transform: scale(1); box-shadow: 0 0 0 transparent; } }
        @keyframes pushAnim { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 850px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 850px;}
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px; flex: 1;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; margin-top: 4px; text-align: center; max-width: 800px; word-wrap: break-word;}
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; text-shadow: 0 0 15px var(--accent-green); transform: scale(1.05); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1.05)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 850px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; display: inline-block; border: 1px solid var(--border-main);}

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 850px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        .line-anim { stroke-dasharray: 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">V =</label>
        <input type="text" id="v-input" class="small-input" placeholder="5">
        <label class="ui-label">edges =</label>
        <input type="text" id="e-input" class="med-input" placeholder="[[0,1], [1,2], [2,0], [1,3], [3,4]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(5, '[[0,1], [1,2], [2,0], [1,3], [3,4]]')">Ex 1</button>
        <button onclick="loadExample(4, '[[0,1], [1,2], [2,3]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="graph-area" id="graph-area">
            <svg id="edges-svg">
                <defs>
                    <marker id="arrow-normal" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border-main)" />
                    </marker>
                    <marker id="arrow-active" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
                    </marker>
                    <marker id="arrow-transposed" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-orange)" />
                    </marker>
                </defs>
            </svg>
            <div class="nodes-container" id="nodes-container"></div>
        </div>
        <div class="arrays-col">
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-green);">Visited Array:</div>
                <div class="tiles-wrapper" id="vis-tiles"></div>
            </div>
            <div class="array-section">
                <div class="ui-label" style="color: var(--accent-blue); display:flex; justify-content:space-between;">
                    <span>Finish Stack:</span>
                    <span style="font-size:10px; color:var(--text-dim);">[Bottom ➔ Top]</span>
                </div>
                <div class="tiles-wrapper" id="stack-tiles"></div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Nodes ordered by finish time (Phase 1)</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Phase</span>
            <span class="info-value" id="val-phase" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Active Node (u)</span>
            <span class="info-value" id="val-u" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Evaluating Neighbor (v)</span>
            <span class="info-value" id="val-v" style="color: var(--accent-purple);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label">strongly connected components =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Active Node (u)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-purple); border-width:2px;"></span> Evaluating Neighbor (v)</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--border-main); border-width:2px;"></span> Original Edge</div>
        <div class="legend-item"><span class="dot" style="background:transparent; border-color:var(--accent-orange); border-width:2px;"></span> Transposed Edge</div>
        <div class="legend-item"><span class="dot" style="background:var(--scc-0); border-color:transparent;"></span> Discovered SCC</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let V_count = 5;
        let edgesList = [[0,1], [1,2], [2,0], [1,3], [3,4]];
        let nodeCoords = {};
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [2800, 1400, 700];

        function init() { loadExample(5, '[[0,1], [1,2], [2,0], [1,3], [3,4]]'); }

        function loadExample(v, eStr) {
            document.getElementById('v-input').value = v;
            document.getElementById('e-input').value = eStr;
            parseAndGenerate();
        }

        function loadCustom() {
            parseAndGenerate();
        }

        function parseAndGenerate() {
            try {
                V_count = parseInt(document.getElementById('v-input').value);
                edgesList = JSON.parse(document.getElementById('e-input').value.replace(/\(/g, '[').replace(/\)/g, ']'));
                
                if (isNaN(V_count) || !Array.isArray(edgesList)) {
                    throw "Invalid inputs";
                }
                
                setupGraph();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid format. Ensure V is an integer and edges is a valid array of [u, v].");
            }
        }

        function setupGraph() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            nodeCoords = {};
            if (V_count === 0) return;

            const cx = 225;
            const cy = 200;
            const radius = 130;

            for (let i = 0; i < V_count; i++) {
                const angle = (Math.PI * 2 * i) / V_count - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                nodeCoords[i] = {x, y};

                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i;
                container.appendChild(node);
            }
        }

        function generateSteps() {
            steps = [];
            
            let adj = Array.from({length: V_count}, () => []);
            let adjT = Array.from({length: V_count}, () => []);
            
            for (let [u,v] of edgesList) {
                adj[u].push(v);
                adjT[v].push(u); // Transposed graph
            }

            let visited = new Array(V_count).fill(false);
            let stack = [];
            let sccMap = new Array(V_count).fill(-1);
            let sccList = [];

            steps.push({
                type: 'init', phase: 'Phase 1: First DFS', isTransposed: false, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                u: null, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                panel: `<b>Kosaraju's Algorithm for SCCs</b><br><b>Phase 1:</b> Perform DFS on the original graph. When a node finishes exploring all its neighbors, push it to a stack.<br>This orders nodes by their "finish time".`,
                statusText: `Initialization complete.`,
                log: `Initialized algorithm. V=${V_count}. Phase 1: First DFS.`
            });

            // Phase 1: First DFS
            function dfs1(u, depth) {
                let pad = "  ".repeat(depth);
                visited[u] = true;

                steps.push({
                    type: 'dfs1_visit', phase: 'Phase 1: First DFS', isTransposed: false, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                    u: u, v: null, updatedNode: u, poppedItem: null, pushedItem: null,
                    panel: `<b>DFS1 Visit Node ${u}:</b><br>Mark <code>visited[${u}] = True</code>. Exploring its neighbors...`,
                    statusText: `Visiting Node ${u}...`,
                    log: `\n${pad}DFS1(${u}): Marked visited.`
                });

                let neighbors = adj[u] || [];
                if (neighbors.length === 0) {
                    steps.push({
                        type: 'dfs1_no_neighbors', phase: 'Phase 1: First DFS', isTransposed: false, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                        u: u, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                        panel: `Node <b>${u}</b> has no outgoing edges.`,
                        statusText: `No neighbors for Node ${u}.`,
                        log: `${pad}  Node ${u} has no neighbors.`
                    });
                }

                for (let v of neighbors) {
                    steps.push({
                        type: 'dfs1_check', phase: 'Phase 1: First DFS', isTransposed: false, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                        u: u, v: v, updatedNode: null, poppedItem: null, pushedItem: null,
                        panel: `Checking outgoing edge <b>${u} ➔ ${v}</b>.<br>Is <code>visited[${v}]</code> False?`,
                        statusText: `Evaluating edge ${u} ➔ ${v}...`,
                        log: `${pad}  Evaluating edge ${u}->${v}...`
                    });

                    if (!visited[v]) {
                        steps.push({
                            type: 'dfs1_recurse', phase: 'Phase 1: First DFS', isTransposed: false, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                            u: u, v: v, updatedNode: null, poppedItem: null, pushedItem: null,
                            panel: `<b style="color:var(--accent-green)">Yes.</b> Node <b>${v}</b> is unvisited.<br>Recursively call <code>DFS1(${v})</code>.`,
                            statusText: `Recursing into Node ${v}...`,
                            log: `${pad}    -> Unvisited. Recursing into DFS1(${v}).`
                        });
                        
                        dfs1(v, depth + 1);
                        
                        steps.push({
                            type: 'dfs1_backtrack', phase: 'Phase 1: First DFS', isTransposed: false, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                            u: u, v: v, updatedNode: null, poppedItem: null, pushedItem: null,
                            panel: `Returned from <code>DFS1(${v})</code> back to <b>${u}</b>.<br>Continuing to explore remaining neighbors.`,
                            statusText: `Backtracked to Node ${u}.`,
                            log: `${pad}  <- Backtracked from ${v} to ${u}.`
                        });
                    } else {
                        steps.push({
                            type: 'dfs1_skip', phase: 'Phase 1: First DFS', isTransposed: false, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                            u: u, v: v, updatedNode: null, poppedItem: null, pushedItem: null,
                            panel: `<b style="color:var(--accent-red)">No.</b> Node <b>${v}</b> is already visited. <b style="color:var(--text-dim)">Skip.</b>`,
                            statusText: `Skipping visited Node ${v}.`,
                            log: `${pad}    -> Already visited. Skipped.`
                        });
                    }
                }

                stack.push(u);
                steps.push({
                    type: 'dfs1_finish', phase: 'Phase 1: First DFS', isTransposed: false, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                    u: u, v: null, updatedNode: null, poppedItem: null, pushedItem: u,
                    panel: `Finished exploring all neighbors of <b>${u}</b>.<br>Push <b>${u}</b> onto the Finish Stack.`,
                    statusText: `Finished Node ${u}. Pushed to Stack.`,
                    log: `${pad}Finished DFS1(${u}). Pushed to stack.`
                });
            }

            for (let i = 0; i < V_count; i++) {
                if (!visited[i]) {
                    dfs1(i, 0);
                }
            }

            // Phase 2: Transpose Graph
            steps.push({
                type: 'transpose', phase: 'Phase 2: Transpose Graph', isTransposed: true, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                u: null, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                panel: `<b>Phase 2: Transpose Graph</b><br>Reverse the direction of all edges in the graph.<br>This isolates the SCCs from each other while keeping cycles intact.`,
                statusText: `Transposing graph edges...`,
                log: `\nPhase 2: Transposed all edges.`,
                logColor: 'var(--accent-orange)'
            });

            // Phase 3: Second DFS
            visited.fill(false);
            
            steps.push({
                type: 'dfs2_init', phase: 'Phase 3: Second DFS', isTransposed: true, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                u: null, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                panel: `<b>Phase 3: Second DFS</b><br>Reset the <code>visited</code> array to False.<br>We will now pop nodes from the stack and start a new DFS on the transposed graph. Each full DFS traversal forms one Strongly Connected Component (SCC).`,
                statusText: `Reset visited array. Starting Phase 3.`,
                log: `\nPhase 3: Reset visited array. Starting Second DFS.`
            });

            let currentSCC = [];
            let sccIndex = 0;

            function dfs2(u, depth) {
                let pad = "  ".repeat(depth);
                visited[u] = true;
                currentSCC.push(u);
                sccMap[u] = sccIndex;

                steps.push({
                    type: 'dfs2_visit', phase: 'Phase 3: Second DFS', isTransposed: true, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                    u: u, v: null, updatedNode: u, poppedItem: null, pushedItem: null,
                    panel: `<b>DFS2 Visit Node ${u}:</b><br>Mark <code>visited[${u}] = True</code> and add it to the current SCC.`,
                    statusText: `Visiting Node ${u} for SCC...`,
                    log: `\n${pad}DFS2(${u}): Marked visited. Added to current SCC.`
                });

                let neighbors = adjT[u] || [];
                
                for (let v of neighbors) {
                    steps.push({
                        type: 'dfs2_check', phase: 'Phase 3: Second DFS', isTransposed: true, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                        u: u, v: v, updatedNode: null, poppedItem: null, pushedItem: null,
                        panel: `Checking transposed edge <b>${u} ➔ ${v}</b>.<br>Is <code>visited[${v}]</code> False?`,
                        statusText: `Evaluating transposed edge ${u} ➔ ${v}...`,
                        log: `${pad}  Evaluating transposed edge ${u}->${v}...`
                    });

                    if (!visited[v]) {
                        steps.push({
                            type: 'dfs2_recurse', phase: 'Phase 3: Second DFS', isTransposed: true, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                            u: u, v: v, updatedNode: null, poppedItem: null, pushedItem: null,
                            panel: `<b style="color:var(--accent-green)">Yes.</b> Node <b>${v}</b> is unvisited.<br>Recursively call <code>DFS2(${v})</code> to expand the current SCC.`,
                            statusText: `Recursing into Node ${v}...`,
                            log: `${pad}    -> Unvisited. Recursing into DFS2(${v}).`
                        });
                        
                        dfs2(v, depth + 1);
                        
                        steps.push({
                            type: 'dfs2_backtrack', phase: 'Phase 3: Second DFS', isTransposed: true, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                            u: u, v: v, updatedNode: null, poppedItem: null, pushedItem: null,
                            panel: `Returned from <code>DFS2(${v})</code> back to <b>${u}</b>.`,
                            statusText: `Backtracked to Node ${u}.`,
                            log: `${pad}  <- Backtracked from ${v} to ${u}.`
                        });
                    } else {
                        steps.push({
                            type: 'dfs2_skip', phase: 'Phase 3: Second DFS', isTransposed: true, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                            u: u, v: v, updatedNode: null, poppedItem: null, pushedItem: null,
                            panel: `<b style="color:var(--accent-red)">No.</b> Node <b>${v}</b> is already visited (likely in this or a previous SCC). <b style="color:var(--text-dim)">Skip.</b>`,
                            statusText: `Skipping visited Node ${v}.`,
                            log: `${pad}    -> Already visited. Skipped.`
                        });
                    }
                }
            }

            while (stack.length > 0) {
                let node = stack.pop();

                steps.push({
                    type: 'dfs2_pop', phase: 'Phase 3: Second DFS', isTransposed: true, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                    u: node, v: null, updatedNode: null, poppedItem: node, pushedItem: null,
                    panel: `<b>Pop from Stack:</b> Extract Node <b>${node}</b>.<br>Is it unvisited?`,
                    statusText: `Popped Node ${node} from stack.`,
                    log: `\nPopped Node ${node} from stack.`
                });

                if (!visited[node]) {
                    currentSCC = [];
                    
                    steps.push({
                        type: 'dfs2_start', phase: 'Phase 3: Second DFS', isTransposed: true, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                        u: node, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                        panel: `<b style="color:var(--accent-green)">Yes!</b> Node <b>${node}</b> is unvisited.<br>Starting a new DFS traversal to find a new Strongly Connected Component.`,
                        statusText: `Starting new SCC from Node ${node}.`,
                        log: `  -> Unvisited. Starting new SCC traversal from ${node}.`
                    });

                    dfs2(node, 0);

                    sccList.push([...currentSCC]);
                    
                    steps.push({
                        type: 'scc_found', phase: 'Phase 3: Second DFS', isTransposed: true, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                        u: null, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                        panel: `<b>SCC Found!</b><br>DFS traversal from <b>${node}</b> is complete.<br>Nodes <b style="color:var(--accent-green)">[${currentSCC.join(', ')}]</b> form a Strongly Connected Component.`,
                        statusText: `SCC ${sccIndex} found: [${currentSCC.join(', ')}].`,
                        log: `=> SCC Found: [${currentSCC.join(', ')}].`,
                        logColor: 'var(--accent-orange)'
                    });

                    sccIndex++;
                } else {
                    steps.push({
                        type: 'dfs2_skip_node', phase: 'Phase 3: Second DFS', isTransposed: true, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                        u: node, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                        panel: `<b style="color:var(--accent-red)">No.</b> Node <b>${node}</b> is already visited (assigned to a previous SCC).<br>Skip and pop the next node.`,
                        statusText: `Node ${node} already in an SCC. Skipped.`,
                        log: `  -> Already visited. Skipped.`
                    });
                }
            }

            let resultStr = `[${sccList.map(scc => `[${scc.join(',')}]`).join(', ')}]`;

            steps.push({
                type: 'final', phase: 'Complete', isTransposed: true, visited: [...visited], stack: [...stack], sccMap: [...sccMap], sccList: [...sccList],
                u: null, v: null, updatedNode: null, poppedItem: null, pushedItem: null,
                panel: `<b>Algorithm Complete!</b><br>All nodes have been assigned to an SCC.<br>The Strongly Connected Components are <b style="color:var(--accent-green); font-size:16px;">${resultStr}</b>.`,
                complete: true, result: resultStr,
                statusText: `Algorithm Finished.`,
                log: `\nAlgorithm Complete. SCCs: ${resultStr}`,
                logColor: 'var(--accent-blue)'
            });
        }

        function drawEdges(step) {
            const svg = document.getElementById('edges-svg');
            svg.innerHTML = '';
            const nodeRadius = 22;

            let drawn = new Set();

            edgesList.forEach(e => {
                const origU = e[0];
                const origV = e[1];
                
                // For visualization, if transposed, the visual edge goes from V to U
                const drawU = step.isTransposed ? origV : origU;
                const drawV = step.isTransposed ? origU : origV;

                let key = `${drawU}-${drawV}`;
                if (drawn.has(key)) return;
                drawn.add(key);

                const p1 = nodeCoords[drawU];
                const p2 = nodeCoords[drawV];
                if(!p1 || !p2) return;

                let isChecking = step.u === drawU && step.v === drawV;

                // Handle bidirectional curving
                let hasReverse = step.isTransposed ? 
                    edgesList.some(re => re[0]===origU && re[1]===origV) : // reverse in original means reverse in transposed too
                    edgesList.some(re => re[0]===origV && re[1]===origU);
                
                let dStr = "";
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const shrinkTarget = nodeRadius + 6; 
                const shrinkSource = nodeRadius + 2; 

                if (hasReverse) {
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const nx = -dy / len;
                    const ny = dx / len;
                    const curveOffset = 20; 
                    const cx = midX + nx * curveOffset;
                    const cy = midY + ny * curveOffset;
                    
                    const x1 = p1.x + (dx/len)*shrinkSource; 
                    const y1 = p1.y + (dy/len)*shrinkSource;
                    const x2 = p2.x - (dx/len)*shrinkTarget; 
                    const y2 = p2.y - (dy/len)*shrinkTarget;
                    dStr = `M ${x1},${y1} Q ${cx},${cy} ${x2},${y2}`;
                } else {
                    const x1 = p1.x + (dx/len)*shrinkSource; 
                    const y1 = p1.y + (dy/len)*shrinkSource;
                    const x2 = p2.x - (dx/len)*shrinkTarget; 
                    const y2 = p2.y - (dy/len)*shrinkTarget;
                    dStr = `M ${x1},${y1} L ${x2},${y2}`;
                }

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', dStr);
                path.setAttribute('fill', 'transparent');

                if (isChecking) {
                    path.setAttribute('stroke', 'var(--accent-purple)');
                    path.setAttribute('stroke-width', '4');
                    path.setAttribute('marker-end', 'url(#arrow-active)');
                    path.classList.add('line-anim');
                    path.setAttribute('stroke-dasharray', '8');
                    setTimeout(() => svg.appendChild(path), 0);
                } else if (step.isTransposed) {
                    path.setAttribute('stroke', 'var(--accent-orange)');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('marker-end', 'url(#arrow-transposed)');
                    svg.appendChild(path);
                } else {
                    path.setAttribute('stroke', 'var(--border-main)');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('marker-end', 'url(#arrow-normal)');
                    svg.appendChild(path);
                }
            });
        }

        function renderStack(step) {
            const container = document.getElementById('stack-tiles');
            container.innerHTML = '';
            
            if (step.stack.length === 0 && !step.poppedItem) {
                container.innerHTML = '<span style="color:var(--text-dim); font-size:13px; font-family:monospace; margin-top:8px;">{ empty }</span>';
                return;
            }

            step.stack.forEach((val, index) => {
                const tile = document.createElement('div');
                tile.className = `tile stack-tile`;
                if (step.pushedItem === val && index === step.stack.length - 1) {
                    tile.classList.add('pushing');
                }
                tile.innerText = val;
                
                container.appendChild(tile);
            });

            if (step.poppedItem !== null && step.type === 'dfs2_pop') {
                const popTile = document.createElement('div');
                popTile.className = `tile stack-tile popping`;
                popTile.innerText = step.poppedItem;
                container.appendChild(popTile);
            }
        }

        function renderArray(containerId, arr, tileClass, stepData) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-container';
                
                const tile = document.createElement('div');
                tile.className = `tile ${tileClass}`;
                
                if (stepData.updatedNode === i) {
                    tile.classList.add('highlight-update');
                }
                
                if (tileClass === 'vis-tile') {
                    tile.innerText = val ? 'T' : 'F';
                    if (!val) {
                        tile.style.background = '#21262d';
                        tile.style.borderColor = 'var(--border-main)';
                        tile.style.color = 'var(--text-dim)';
                    }
                } else {
                    tile.innerText = val;
                }
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Nodes
            for(let i=0; i<V_count; i++) {
                const el = document.getElementById(`node-${i}`);
                if(!el) continue;
                
                el.className = 'node';
                
                if (!step.isTransposed && step.visited[i]) {
                    el.classList.add('visited');
                }
                
                // In Phase 3, color by SCC
                if (step.isTransposed && step.sccMap[i] !== -1) {
                    let cIdx = step.sccMap[i] % 7;
                    el.classList.add(`scc-node-${cIdx}`);
                }
                
                if (step.u === i && !step.complete) el.classList.add('active-u');
                if (step.v === i && !step.complete) el.classList.add('active-v');
            }

            drawEdges(step);
            renderStack(step);
            renderArray('vis-tiles', step.visited, 'vis-tile', step);

            // Update Info Panel
            document.getElementById('main-panel').innerHTML = step.panel;
            
            document.getElementById('val-phase').innerText = step.phase;
            document.getElementById('val-phase').style.color = step.isTransposed ? 'var(--accent-orange)' : 'var(--text-main)';
            
            document.getElementById('val-u').innerText = step.u !== null ? `${step.u}` : '—';
            document.getElementById('val-v').innerText = step.v !== null ? `${step.v}` : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            // Update Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = () => { setTimeout(init, 100); };
    </script>
</body>
