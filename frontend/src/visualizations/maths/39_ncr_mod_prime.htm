<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nCr mod Prime - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* final answer / best            */
            --accent-blue:   #06b6d4;    /* factorial table / chrome       */
            --accent-green:  #22c55e;    /* inverse / success              */
            --accent-red:    #f43f5e;    /* invalid / reset                */
            --accent-purple: #a855f7;    /* current factor being computed  */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 78px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="number"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.bad { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.bad::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .grid-stage { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; padding: 22px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .grid-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .grid-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        /* factorial table */
        .fact-block { display: flex; flex-direction: column; align-items: center; gap: 9px; }
        .block-label { font-family: var(--mono); font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--text-dim); }
        .fact-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        .fact-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .fact-cell {
            min-width: 46px; height: 46px; padding: 0 8px; display: flex; align-items: center; justify-content: center;
            border-radius: 9px; font-family: var(--mono); font-weight: 800; font-size: 16px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-dim); will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .fact-idx { font-family: var(--mono); font-size: 11px; color: #4b5772; }
        .fact-cell.pending { color: var(--text-dim); background: rgba(255,255,255,0.02); }
        .fact-cell.filled { color: #a5f3fc; border-color: var(--accent-blue); background: rgba(6,182,212,0.10); }
        .fact-cell.dep { border-color: var(--accent-blue); background: rgba(6,182,212,0.16); color: #a5f3fc; box-shadow: 0 0 12px rgba(6,182,212,0.3); }
        .fact-cell.current { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 20px rgba(168,85,247,0.55), inset 0 0 12px rgba(168,85,247,0.12); transform: scale(1.08); z-index: 2; }
        .fact-cell.usedN  { border-color: var(--accent-orange); background: rgba(245,165,36,0.18); color: #ffd591; box-shadow: 0 0 16px rgba(245,165,36,0.45); }
        .fact-cell.usedR  { border-color: var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0; box-shadow: 0 0 14px rgba(34,197,94,0.4); }
        .fact-cell.usedNR { border-color: var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0; box-shadow: 0 0 14px rgba(34,197,94,0.4); }
        .fact-idx.lit { color: var(--accent-purple); }

        /* equation / inverse stage */
        .eq-block { display: flex; flex-direction: column; align-items: center; gap: 12px; min-height: 84px; justify-content: center; }
        .eq-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .eq-term {
            display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 12px; min-width: 78px;
            border-radius: 11px; border: 2px solid var(--border-main); background: rgba(255,255,255,0.04);
            transition: background 0.35s, border-color 0.35s, box-shadow 0.35s, transform 0.3s, opacity 0.3s;
        }
        .eq-term .t-cap { font-family: var(--mono); font-size: 10.5px; color: var(--text-dim); letter-spacing: 0.3px; white-space: nowrap; }
        .eq-term .t-val { font-family: var(--mono); font-size: 20px; font-weight: 800; color: var(--text-main); }
        .eq-term.factn { border-color: var(--accent-orange); background: rgba(245,165,36,0.14); }
        .eq-term.factn .t-val { color: #ffd591; }
        .eq-term.inv { border-color: var(--accent-green); background: rgba(34,197,94,0.12); }
        .eq-term.inv .t-val { color: #bbf7d0; }
        .eq-term.active { box-shadow: 0 0 20px rgba(168,85,247,0.5); transform: scale(1.05); border-color: var(--accent-purple); }
        .eq-term.dim { opacity: 0.4; }
        .eq-op { font-family: var(--mono); font-size: 22px; font-weight: 800; color: var(--text-dim); }

        /* final answer tiles */
        .answer-track { display: flex; gap: 8px; align-items: center; min-height: 44px; }
        .ans-tile { min-width: 46px; padding: 0 12px; height: 50px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 24px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 16px rgba(245,165,36,0.4); }
        .ans-cap { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }

        .action-stage { position: relative; min-height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); } .pill.b b { color: var(--accent-orange); } .pill.g b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="number" id="n-input" value="5">
        <label class="ui-label">r =</label>
        <input type="number" id="r-input" value="2">
        <label class="ui-label">p =</label>
        <input type="number" id="p-input" value="7">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Ex 1 &middot; 5C2 mod 7</button>
        <button onclick="loadExample(1)">Ex 2 &middot; 4C4 mod 5</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>nCr mod Prime <span class="sub">&middot; Factorials + Modular Inverses &middot; nCr &equiv; n! &middot; inv(r!) &middot; inv((n&minus;r)!) (mod p) &middot; Fermat</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="grid-stage" id="grid-stage">
                    <div class="fact-block">
                        <div class="block-label">factorial table &nbsp;fact[i] = i! mod p</div>
                        <div class="fact-row" id="fact-row"></div>
                    </div>
                    <div class="eq-block" id="eq-block"></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill c">stage <b id="st-stage">&mdash;</b></span>
                            <span class="pill">fact[n] <b id="st-factn">&mdash;</b></span>
                            <span class="pill g">accum <b id="st-acc">&mdash;</b></span>
                            <span class="pill b">nCr mod p <b id="st-ans">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring pop, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.4 + 0.66 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // ───────── State ─────────
        let n = 5, r = 2, p = 7;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 720, 330];
        const factEls = {};   // 'i' -> fact cell element
        let factSkeletonKey = '';  // tracks which (n,p) the table skeleton was built for

        // ───────── code panel ─────────
        const CODE = [
            [['kw','def '],['fn','nCrModP'],['src','(n, r, p):']],
            [['kw','  if '],['src','r < 0 or r > n: '], ['kw','return '], ['src','0']],
            [['src','  fact = [1]*(n+1)']],
            [['kw','  for '],['src','i in 1..n:']],
            [['src','    fact[i] = fact[i-1] * i % p']],
            [['src','  invR  = pow(fact[r],   p-2, p)   # Fermat']],
            [['src','  invNR = pow(fact[n-r], p-2, p)   # Fermat']],
            [['kw','  return '],['src','fact[n] * invR % p * invNR % p']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── number theory ─────────
        function modPow(base, exp, mod) {
            let result = 1; base %= mod; if (base < 0) base += mod;
            while (exp > 0) {
                if (exp % 2 === 1) result = (result * base) % mod;
                base = (base * base) % mod;
                exp = Math.floor(exp / 2);
            }
            return result;
        }
        function modInv(a, mod) { return modPow(a, mod - 2, mod); }

        // ───────── step generation (immutable snapshots) ─────────
        function generateSteps() {
            steps = [];
            const invalid = (r < 0 || r > n);

            const snap = (extra) => Object.assign({
                n, r, p, invalid,
                fact: null, factUpto: -1,     // factorials computed so far
                currentI: null, depI: null,   // active fact cell + its dependency
                eq: null,                      // {factn, invR, invNR, partial, highlight}
                stageName: '—', accum: '—', factn: '—', answer: '—',
                complete: false, confetti: false, bad: false,
            }, extra);

            // ── invalid input branch ──
            if (invalid) {
                steps.push(snap({
                    code: [0, 1], bad: true, complete: true, answer: 0, accum: 0, stageName: 'invalid',
                    action: '✗ r out of range', actionColor: 'var(--accent-red)',
                    panel: `Guard: we need <code>0 &le; r &le; n</code>, but here <code>r=${r}</code> and <code>n=${n}</code>. There is no valid choice, so <code>C(${n},${r}) = <b>0</b></code>.`,
                    log: `r out of range (0..${n}) -> nCr = 0`
                }));
                return;
            }

            // ── intro ──
            steps.push(snap({
                code: [0], stageName: 'setup',
                action: 'GOAL', actionColor: 'var(--accent-blue)',
                panel: `Compute <code>C(${n}, ${r}) mod ${p}</code> where <code>p=${p}</code> is prime. Use <code>C(n,r) &equiv; n! &middot; inv(r!) &middot; inv((n&minus;r)!) (mod p)</code>, getting each inverse from Fermat: <code>inv(a) = a<sup>p&minus;2</sup> mod p</code>.`,
                log: `goal  C(${n},${r}) mod ${p}   (p prime)`
            }));

            // ── factorial table ──
            const fact = new Array(n + 1).fill(1);   // fact[0] = 1
            steps.push(snap({
                code: [2], fact: fact.slice(), factUpto: 0,
                stageName: 'fact[0]', factn: '—',
                action: 'fact[0] = 1', actionColor: 'var(--accent-blue)',
                panel: `Base case: <code>0! = 1</code>, so <code>fact[0] = 1</code>. Now fill the table left&#8594;right with <code>fact[i] = fact[i&minus;1] &middot; i mod ${p}</code>.`,
                log: `fact[0] = 1`
            }));

            for (let i = 1; i <= n; i++) {
                const prev = fact[i - 1];
                fact[i] = (prev * i) % p;
                steps.push(snap({
                    code: [3, 4], fact: fact.slice(), factUpto: i,
                    currentI: i, depI: i - 1,
                    stageName: `fact[${i}]`, factn: (i === n ? fact[n] : '—'),
                    action: `fact[${i}] = ${fact[i]}`, actionColor: 'var(--accent-purple)',
                    panel: `<code>fact[${i}] = fact[${i - 1}] &middot; ${i} mod ${p} = ${prev} &middot; ${i} mod ${p} = <b>${fact[i]}</b></code>.`,
                    log: `fact[${i}] = ${prev} * ${i} % ${p} = ${fact[i]}`
                }));
            }

            // values we need from the table
            const factN = fact[n], factR = fact[r], factNR = fact[n - r];

            // ── pick fact[n], fact[r], fact[n-r] ──
            steps.push(snap({
                code: [7], fact: fact.slice(), factUpto: n,
                stageName: 'select terms', factn: factN, accum: factN,
                eq: { factn: factN, invR: '?', invNR: '?', partial: factN, highlight: 'factn' },
                action: `fact[${n}] = ${factN}`, actionColor: 'var(--accent-orange)',
                panel: `The numerator is <code>n! = fact[${n}] = <b>${factN}</b></code>. The denominator needs <code>r! = fact[${r}] = ${factR}</code> and <code>(n&minus;r)! = fact[${n - r}] = ${factNR}</code> &mdash; but we cannot divide mod p, so we invert.`,
                log: `select  fact[${n}]=${factN}, fact[${r}]=${factR}, fact[${n - r}]=${factNR}`
            }));

            // ── inverse of r! ──
            const invR = modInv(factR, p);
            steps.push(snap({
                code: [5], fact: fact.slice(), factUpto: n,
                stageName: `inv(r!)`, factn: factN,
                eq: { factn: factN, invR: invR, invNR: '?', partial: factN, highlight: 'invR' },
                accum: factN,
                action: `inv(${factR}) = ${invR}`, actionColor: 'var(--accent-green)',
                panel: `Fermat: <code>inv(r!) = inv(${factR}) = ${factR}<sup>${p - 2}</sup> mod ${p} = <b>${invR}</b></code>. Check: <code>${factR} &middot; ${invR} mod ${p} = ${(factR * invR) % p}</code>.`,
                log: `inv(fact[${r}]) = ${factR}^${p - 2} % ${p} = ${invR}`
            }));

            // ── inverse of (n-r)! ──
            const invNR = modInv(factNR, p);
            steps.push(snap({
                code: [6], fact: fact.slice(), factUpto: n,
                stageName: `inv((n-r)!)`, factn: factN,
                eq: { factn: factN, invR: invR, invNR: invNR, partial: factN, highlight: 'invNR' },
                accum: factN,
                action: `inv(${factNR}) = ${invNR}`, actionColor: 'var(--accent-green)',
                panel: `Fermat again: <code>inv((n&minus;r)!) = inv(${factNR}) = ${factNR}<sup>${p - 2}</sup> mod ${p} = <b>${invNR}</b></code>. Check: <code>${factNR} &middot; ${invNR} mod ${p} = ${(factNR * invNR) % p}</code>.`,
                log: `inv(fact[${n - r}]) = ${factNR}^${p - 2} % ${p} = ${invNR}`
            }));

            // ── multiply it out ──
            const step1 = (factN * invR) % p;
            const result = (step1 * invNR) % p;

            steps.push(snap({
                code: [7], fact: fact.slice(), factUpto: n,
                stageName: 'multiply', factn: factN,
                eq: { factn: factN, invR: invR, invNR: invNR, partial: result, highlight: 'all' },
                accum: result,
                action: `${factN} · ${invR} · ${invNR} = ${result}`, actionColor: 'var(--accent-orange)',
                panel: `Multiply mod ${p}: <code>${factN} &middot; ${invR} mod ${p} = ${step1}</code>, then <code>${step1} &middot; ${invNR} mod ${p} = <b>${result}</b></code>.`,
                log: `${factN} * ${invR} % ${p} = ${step1};  ${step1} * ${invNR} % ${p} = ${result}`
            }));

            // ── final ──
            steps.push(snap({
                code: [7], fact: fact.slice(), factUpto: n,
                complete: true, confetti: true,
                stageName: 'done', factn: factN, accum: result, answer: result,
                eq: { factn: factN, invR: invR, invNR: invNR, partial: result, highlight: 'all' },
                action: `✓ C(${n},${r}) mod ${p} = ${result}`, actionColor: 'var(--accent-green)',
                panel: `Done. <code>C(${n}, ${r}) mod ${p} = <b>${result}</b></code>. (Exact <code>C(${n},${r}) = ${binomExact(n, r)}</code>, and <code>${binomExact(n, r)} mod ${p} = ${result}</code>.)`,
                log: `done  C(${n},${r}) mod ${p} = ${result}`
            }));
        }

        // exact binomial (BigInt-safe) for the verification line in the narration
        function binomExact(n, r) {
            r = Math.min(r, n - r);
            let num = 1n, den = 1n;
            for (let i = 0; i < r; i++) { num *= BigInt(n - i); den *= BigInt(i + 1); }
            return (num / den).toString();
        }

        // ───────── render (persistent DOM, reconciliation) ─────────
        function ensureFactSkeleton(step) {
            const key = step.n + '|' + step.p;
            if (key === factSkeletonKey) return;
            factSkeletonKey = key;
            const row = document.getElementById('fact-row');
            Object.keys(factEls).forEach(k => { factEls[k].unit.remove(); delete factEls[k]; });
            row.innerHTML = '';
            for (let i = 0; i <= step.n; i++) {
                const unit = document.createElement('div'); unit.className = 'fact-unit';
                const cell = document.createElement('div'); cell.className = 'fact-cell pending'; cell.textContent = '?';
                const idx = document.createElement('div'); idx.className = 'fact-idx'; idx.textContent = 'fact[' + i + ']';
                unit.appendChild(cell); unit.appendChild(idx); row.appendChild(unit);
                factEls[i] = { unit, cell, idx };
            }
        }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            ensureFactSkeleton(step);

            const nrIdx = step.n - step.r;

            // factorial cells
            for (let i = 0; i <= step.n; i++) {
                const e = factEls[i]; if (!e) continue;
                const computed = step.fact && i <= step.factUpto;
                const val = computed ? step.fact[i] : null;
                let cls = 'fact-cell';
                let txt = computed ? String(val) : '?';

                if (!computed) { cls += ' pending'; }
                else { cls += ' filled'; }

                // dependency + current during the build loop
                if (step.depI === i) cls = 'fact-cell dep';
                if (step.currentI === i) cls = 'fact-cell current';

                // once the table is fully built and we are in the algebra stage, mark used terms
                const tableDone = step.factUpto === step.n && step.currentI === null && step.eq;
                if (tableDone && computed) {
                    if (i === step.n) cls = 'fact-cell filled usedN';
                    if (i === step.r) cls = (i === step.n ? cls + ' usedR' : 'fact-cell filled usedR');
                    if (i === nrIdx)  cls = (i === step.n || i === step.r ? cls + ' usedNR' : 'fact-cell filled usedNR');
                }

                const wasPending = e.cell.classList.contains('pending') && txt !== '?';
                e.cell.className = cls;
                e.cell.textContent = txt;
                e.idx.classList.toggle('lit', step.currentI === i);
                if (wasPending && txt !== '?') Motion.pop(e.cell);
            }

            // equation / inverse stage
            const eqBlock = document.getElementById('eq-block');
            if (step.eq) {
                const e = step.eq;
                const hl = (which) => (e.highlight === which || e.highlight === 'all') ? ' active' : '';
                const dim = (cond) => cond ? ' dim' : '';
                eqBlock.innerHTML =
                    `<div class="eq-row">` +
                      `<div class="eq-term factn${hl('factn')}"><span class="t-cap">fact[${step.n}]</span><span class="t-val">${e.factn}</span></div>` +
                      `<div class="eq-op">&middot;</div>` +
                      `<div class="eq-term inv${hl('invR')}${dim(e.invR === '?')}"><span class="t-cap">inv(${step.r}!)</span><span class="t-val">${e.invR}</span></div>` +
                      `<div class="eq-op">&middot;</div>` +
                      `<div class="eq-term inv${hl('invNR')}${dim(e.invNR === '?')}"><span class="t-cap">inv(${nrIdx}!)</span><span class="t-val">${e.invNR}</span></div>` +
                      `<div class="eq-op">=</div>` +
                      `<div class="eq-term${e.highlight === 'all' ? ' active' : ''}"><span class="t-cap">mod ${step.p}</span><span class="t-val">${e.partial}</span></div>` +
                    `</div>`;
            } else {
                eqBlock.innerHTML = '';
            }

            // answer tiles
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.complete) {
                const cap = document.createElement('div'); cap.className = 'ans-cap';
                cap.textContent = `C(${step.n},${step.r}) mod ${step.p} =`;
                const tile = document.createElement('div'); tile.className = 'ans-tile'; tile.textContent = step.answer;
                at.appendChild(cap); at.appendChild(tile);
                if (!step.bad) Motion.pop(tile);
            }

            // narration
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete && !step.bad);
            mp.classList.toggle('bad', !!step.bad);

            const aw = document.getElementById('action-word');
            aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // state pills
            document.getElementById('st-stage').textContent = step.stageName;
            document.getElementById('st-factn').textContent = step.factn;
            document.getElementById('st-acc').textContent = step.accum;
            document.getElementById('st-ans').textContent = step.complete ? step.answer : '…';

            // badge + progress
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            // log
            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const piece = document.createElement('div'); piece.className = 'confetti-piece';
                piece.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                piece.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                piece.style.background = colors[i % colors.length];
                piece.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                piece.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(piece); setTimeout(() => piece.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(factEls).forEach(k => { factEls[k].unit.remove(); delete factEls[k]; });
            factSkeletonKey = '';
            document.getElementById('fact-row').innerHTML = '';
            document.getElementById('eq-block').innerHTML = '';
            confettiArmed = true;
        }
        function loadTriple(nn, rr, pp) { pause(); n = nn; r = rr; p = pp; clearDom(); generateSteps(); renderStep(0); }
        function loadCustom() {
            const vn = parseInt(document.getElementById('n-input').value, 10);
            const vr = parseInt(document.getElementById('r-input').value, 10);
            const vp = parseInt(document.getElementById('p-input').value, 10);
            if (!Number.isFinite(vn) || !Number.isFinite(vr) || !Number.isFinite(vp) || vp < 2 || vn < 0 || vn > 30) {
                alert('Enter n in 0..30, r an integer, and prime p >= 2.');
                return;
            }
            loadTriple(vn, vr, vp);
        }
        function loadExample(idx) {
            const ex = [[5, 2, 7], [4, 4, 5]][idx];
            document.getElementById('n-input').value = ex[0];
            document.getElementById('r-input').value = ex[1];
            document.getElementById('p-input').value = ex[2];
            loadTriple(ex[0], ex[1], ex[2]);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        ['n-input', 'r-input', 'p-input'].forEach(id => document.getElementById(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); }));
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
