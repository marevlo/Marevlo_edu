<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit DP (count by digit-sum mod m) - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* answer / running count          */
            --accent-blue:   #06b6d4;   /* dependency cells / chrome        */
            --accent-green:  #22c55e;   /* counted / valid                  */
            --accent-red:    #f43f5e;   /* the bound digit (cannot exceed)  */
            --accent-purple: #a855f7;   /* current cell being filled        */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 10px; font-size: 13px; font-family: var(--mono); width: 74px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="number"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .stage-inner { padding: 22px; display: flex; flex-direction: column; align-items: center; gap: 18px; }

        /* digits of the current bound */
        .bound-row { display: flex; flex-direction: column; align-items: center; gap: 7px; }
        .bound-caption { font-family: var(--mono); font-size: 12px; color: var(--text-dim); letter-spacing: 0.3px; }
        .digit-track { display: flex; gap: 8px; }
        .digit-tile {
            width: 40px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-weight: 800; font-size: 22px; border: 2px solid var(--border-main);
            background: rgba(255,255,255,0.04); color: var(--text-main); will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .digit-tile.done { border-color: rgba(34,197,94,0.45); background: rgba(34,197,94,0.08); color: #bbf7d0; }
        .digit-tile.current { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 20px rgba(244,63,94,0.45); transform: scale(1.08); }

        /* dp table */
        .grid-stage { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; display: flex; justify-content: center; }
        .grid-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .grid-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .dp-grid { display: grid; gap: 5px; }
        .cell {
            display: flex; align-items: center; justify-content: center;
            border-radius: 9px; font-family: var(--mono); font-weight: 800; font-size: 15px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            width: 52px; height: 40px; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .cell.head { border: none; background: transparent; color: var(--text-dim); font-size: 13px; font-weight: 800; box-shadow: none; }
        .cell.corner { background: transparent; border: none; box-shadow: none; color: var(--text-dim); font-size: 11px; }
        .cell.zero { color: var(--text-dim); background: rgba(255,255,255,0.02); }
        .cell.filled { color: #e8eefb; }
        .cell.dep { border-color: var(--accent-blue); background: rgba(6,182,212,0.12); color: #a5f3fc; box-shadow: 0 0 12px rgba(6,182,212,0.3); }
        .cell.current { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 20px rgba(168,85,247,0.55), inset 0 0 12px rgba(168,85,247,0.12); transform: scale(1.06); z-index: 2; }
        .cell.read { border-color: var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0; box-shadow: 0 0 16px rgba(34,197,94,0.4); }
        .cell.head.lit { color: var(--accent-purple); }
        .cell.head.lit2 { color: var(--accent-green); }

        /* accumulator row */
        .accum-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: center; min-height: 44px; }
        .accum-chip { display: inline-flex; align-items: baseline; gap: 7px; font-family: var(--mono); font-size: 13px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 10px; padding: 7px 13px; transition: border-color .3s, background .3s; }
        .accum-chip b { font-size: 17px; font-weight: 800; color: var(--text-main); }
        .accum-chip.lit { border-color: rgba(245,165,36,0.5); background: rgba(245,165,36,0.10); }
        .accum-chip.lit b { color: var(--accent-orange); }
        .accum-chip.grn { border-color: rgba(34,197,94,0.45); background: rgba(34,197,94,0.08); }
        .accum-chip.grn b { color: var(--accent-green); }

        .action-stage { position: relative; min-height: 84px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 6px; align-items: center; min-height: 40px; }
        .ans-tile { min-width: 34px; padding: 0 8px; height: 40px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 18px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 12px rgba(245,165,36,0.35); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); } .pill.b b { color: var(--accent-orange); } .pill.g b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">L =</label>
        <input type="number" id="l-input" value="10">
        <label class="ui-label">R =</label>
        <input type="number" id="r-input" value="20">
        <label class="ui-label">m =</label>
        <input type="number" id="m-input" value="3">
        <label class="ui-label">k =</label>
        <input type="number" id="k-input" value="1">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Ex 1 &middot; [10,20] m=3 k=1</button>
        <button onclick="loadExample(1)">Ex 2 &middot; [1,5] m=2 k=0</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Digit DP &mdash; count by digit-sum mod m <span class="sub">&middot; count x &isin; [L,R] with digitsum(x) &equiv; k (mod m) &middot; f(R) &minus; f(L&minus;1)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="stage-inner">
                    <div class="bound-row">
                        <div class="bound-caption" id="bound-caption">bound</div>
                        <div class="digit-track" id="digit-track"></div>
                    </div>
                    <div class="grid-stage">
                        <div class="dp-grid" id="dp-grid"></div>
                    </div>
                    <div class="accum-row" id="accum-row"></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill">bound <b id="st-bound">&mdash;</b></span>
                            <span class="pill c">cell free[i][r] <b id="st-cell">&mdash;</b></span>
                            <span class="pill b">f(bound) <b id="st-sub">0</b></span>
                            <span class="pill g">answer <b id="st-ans">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm &mdash; digit DP, f(N) = #{ x &le; N : digitsum(x) &equiv; k }</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring pop, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.4 + 0.66 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // ───────── State ─────────
        let L = 10, R = 20, M = 3, K = 1;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1350, 680, 300];
        const cellEls = {};     // 'r,c' -> dp cell element
        const digitEls = {};    // index -> digit tile element

        const CODE = [
            [['kw','def '],['fn','f'],['src','(N):              # count x in [0,N], digitsum % m == k']],
            [['kw','  if '],['src','N < 0: return 0']],
            [['src','  s = digits(N); L = len(s)']],
            [['src','  free = [[0]*m for _ in range(L+1)]; free[0][0] = 1']],
            [['kw','  for '],['src','i in 1..L:           # build free[][] bottom-up']],
            [['kw','    for '],['src','r in 0..m-1:']],
            [['src','      free[i][r] = sum(free[i-1][(r-d)%m] for d in 0..9)']],
            [['src','  cnt = 0; pref = 0']],
            [['kw','  for '],['src','p in 0..L-1:          # tight walk over digits of N']],
            [['kw','    for '],['src','d in 0..s[p]-1:     # d below the bound -> suffix free']],
            [['src','      need = (k - (pref+d)) % m']],
            [['src','      cnt += free[L-1-p][need]']],
            [['src','    pref = (pref + s[p]) % m']],
            [['kw','  if '],['src','digitsum(N) % m == k: cnt += 1   # N itself']],
            [['kw','  return '],['src','cnt']],
            [['kw','answer = '],['src','f(R) - f(L-1)']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── helpers ─────────
        function digitSum(n) { let s = 0; n = Math.abs(n); while (n > 0) { s += n % 10; n = Math.floor(n / 10); } return s; }
        function deepCopy(g) { return g.map(row => row.slice()); }
        function digitsOf(n) { return String(n).split('').map(Number); }

        // ───────── step generation (true digit-DP trace) ─────────
        // For a single bound N >= 0, emit steps that:
        //   (1) build the free[i][r] table bottom-up,
        //   (2) walk the digits of N, reading table cells and accumulating cnt,
        //   (3) add 1 for N itself if it qualifies, returning f(N).
        // Then the range answer is f(R) - f(L-1).

        function pushBoundSteps(N, M, K, boundLabel, accBase, snapMaker) {
            // boundLabel: 'R' or 'L-1' ; returns f(N)
            const s = digitsOf(N);
            const Ln = s.length;
            const free = Array.from({ length: Ln + 1 }, () => Array(M).fill(0));
            const out = [];

            // base of free table
            free[0][0] = 1;

            const snap = (extra) => snapMaker(Object.assign({
                bound: N, boundLabel, boundDigits: s.slice(),
                free: deepCopy(free), rows: Ln, cols: M,
                cur: null, deps: [], readCell: null,
                fill: { i: 0, r: -1 },         // free table filled up to (row i, col r)
                walkPos: -1, walkDigit: -1, cnt: 0, pref: 0, self: null, fval: null
            }, extra));

            out.push(snap({
                code: [2, 3],
                action: `f(${N}): build table`, actionColor: 'var(--accent-blue)',
                panel: `Compute <code>f(${N})</code> = count of <b>x &le; ${N}</b> with <code>digitsum(x) &equiv; ${K} (mod ${M})</code>. First fill the <b>free table</b> <code>free[i][r]</code> = # of <b>i</b>-digit suffixes (digits 0&ndash;9) whose digit-sum &equiv; <b>r</b> (mod ${M}). Base: <code>free[0][0]=1</code>.`,
                log: `f(${N}) [${boundLabel}]  digits=${s.join('')}  L=${Ln}, m=${M}, k=${K}`,
                fill: { i: 0, r: M - 1 }
            }));

            // build free table bottom-up
            for (let i = 1; i <= Ln; i++) {
                for (let r = 0; r < M; r++) {
                    let total = 0;
                    const deps = [];
                    for (let d = 0; d <= 9; d++) { const pr = ((r - d) % M + M) % M; total += free[i - 1][pr]; deps.push([i - 1, pr]); }
                    free[i][r] = total;
                    // unique dependency columns (collapse duplicates for clean highlight)
                    const depKeys = []; const seen = new Set();
                    deps.forEach(d => { const k = d[0] + ',' + d[1]; if (!seen.has(k)) { seen.add(k); depKeys.push(d); } });
                    out.push(snap({
                        cur: [i, r], deps: depKeys,
                        code: [4, 5, 6], action: `free[${i}][${r}] = ${total}`, actionColor: 'var(--accent-purple)',
                        panel: `<code>free[${i}][${r}]</code> = sum over digit <code>d=0&hellip;9</code> of <code>free[${i - 1}][(${r}&minus;d) mod ${M}]</code> &#8594; <b>${total}</b>. (each of the 10 digits lands in a row-${i - 1} bucket.)`,
                        log: `  free[${i}][${r}] = ${total}`,
                        fill: { i, r }
                    }));
                }
            }

            // tight walk over the digits of N
            let cnt = 0, pref = 0;
            out.push(snap({
                code: [7, 8], action: `walk digits of ${N}`, actionColor: 'var(--accent-blue)',
                panel: `Table ready. Now walk the digits of <code>${N}</code> left&#8594;right keeping <code>pref</code> = digit-sum of the chosen prefix (mod ${M}). At each position, every digit <b>below</b> the bound frees the remaining suffix &#8594; read a table cell.`,
                log: `  walk start  cnt=0 pref=0`,
                fill: { i: Ln, r: M - 1 }
            }));

            for (let p = 0; p < Ln; p++) {
                const suffixLen = Ln - 1 - p;
                const bd = s[p];
                if (bd === 0) {
                    out.push(snap({
                        cur: null, walkPos: p, walkDigit: bd, cnt, pref,
                        code: [8, 9, 12], action: `digit ${bd}: none below`, actionColor: 'var(--text-dim)',
                        panel: `Position <b>p=${p}</b>, bound digit is <code>${bd}</code>: there is <b>no</b> digit below 0, so nothing is added. Extend prefix: <code>pref = (${pref}+${bd}) mod ${M} = ${(pref + bd) % M}</code>.`,
                        log: `  p=${p} digit=${bd}: no d<${bd}`,
                        fill: { i: Ln, r: M - 1 }
                    }));
                }
                for (let d = 0; d < bd; d++) {
                    const need = (((K - (pref + d)) % M) + M) % M;
                    const cellVal = free[suffixLen][need];
                    cnt += cellVal;
                    out.push(snap({
                        walkPos: p, walkDigit: bd, cnt, pref,
                        readCell: [suffixLen, need],
                        code: [9, 10, 11], action: `+ free[${suffixLen}][${need}] = ${cellVal}`, actionColor: 'var(--accent-green)',
                        panel: `Pos <b>p=${p}</b>: try digit <code>d=${d}</code> (&lt; bound ${bd}). Suffix has <b>${suffixLen}</b> free digits; need remainder <code>(k&minus;(pref+d)) mod ${M} = (${K}&minus;(${pref}+${d})) mod ${M} = ${need}</code>. Read <code>free[${suffixLen}][${need}] = ${cellVal}</code> &#8594; <code>cnt = ${cnt}</code>.`,
                        log: `  p=${p} d=${d}: free[${suffixLen}][${need}]=${cellVal}  cnt=${cnt}`,
                        fill: { i: Ln, r: M - 1 }
                    }));
                }
                pref = (pref + bd) % M;
            }

            // N itself
            const ds = digitSum(N);
            const selfQ = (((ds % M) + M) % M) === (((K % M) + M) % M);
            if (selfQ) cnt += 1;
            const fval = cnt;
            out.push(snap({
                cur: null, walkPos: Ln, cnt, pref, self: selfQ ? 1 : 0, fval,
                code: selfQ ? [13, 14] : [14], action: `f(${N}) = ${fval}`, actionColor: 'var(--accent-orange)',
                panel: `Finally check <b>${N}</b> itself: <code>digitsum(${N}) = ${ds}</code>, <code>${ds} mod ${M} = ${((ds % M) + M) % M}</code> ${selfQ ? `&equiv; ${K} &#8594; <b>+1</b>` : `&ne; ${K} &#8594; +0`}. So <code>f(${N}) = <b>${fval}</b></code>.`,
                log: `  N=${N} itself: ${selfQ ? 'counts (+1)' : 'no'}  ->  f(${N}) = ${fval}`,
                fill: { i: Ln, r: M - 1 }
            }));

            steps.push(...out);
            return fval;
        }

        function generateSteps() {
            steps = [];
            const lowN = L - 1;

            // intro
            steps.push({
                bound: null, boundLabel: '', boundDigits: [], free: [], rows: 0, cols: M,
                cur: null, deps: [], readCell: null, fill: { i: 0, r: -1 },
                walkPos: -1, walkDigit: -1, cnt: 0, pref: 0, self: null, fval: null,
                fR: null, fLow: null, answer: null, phase: 'intro',
                code: [15], action: 'DIGIT DP', actionColor: 'var(--accent-blue)',
                panel: `Count integers <code>x</code> in <code>[${L}, ${R}]</code> whose <b>digit sum</b> is &equiv; <code>${K}</code> (mod <code>${M}</code>). Use the range trick: <code>answer = f(${R}) &minus; f(${L - 1})</code>, where <code>f(N)</code> counts qualifying <code>x</code> in <code>[0, N]</code>.`,
                log: `init  [${L},${R}]  m=${M} k=${K}\nanswer = f(${R}) - f(${L - 1})`
            });

            // shared snap maker: tag every per-bound snapshot with phase + carry fR/fLow/answer
            let fR = null, fLow = null;
            const makerR = (o) => Object.assign({ phase: 'R', fR: null, fLow: null, answer: null }, o);
            fR = pushBoundSteps(R, M, K, 'R', 0, makerR);

            const makerLow = (o) => Object.assign({ phase: 'low', fR: fR, fLow: null, answer: null }, o);
            // tag the already-pushed R steps with fR known? They show f(R) progressively; final fR set on last R step.
            fLow = pushBoundSteps(lowN, M, K, `L-1=${lowN}`, fR, makerLow);

            const answer = fR - fLow;

            steps.push({
                bound: null, boundLabel: '', boundDigits: [], free: [], rows: 0, cols: M,
                cur: null, deps: [], readCell: null, fill: { i: 0, r: -1 },
                walkPos: -1, walkDigit: -1, cnt: 0, pref: 0, self: null, fval: null,
                fR, fLow, answer, phase: 'final', complete: true, confetti: true,
                code: [15], action: `= ${answer}`, actionColor: 'var(--accent-green)',
                panel: `Done. <code>f(${R}) = <b>${fR}</b></code> and <code>f(${L - 1}) = <b>${fLow}</b></code>, so the count of <code>x &isin; [${L}, ${R}]</code> with <code>digitsum(x) &equiv; ${K} (mod ${M})</code> is <code>${fR} &minus; ${fLow} = <b>${answer}</b></code>.`,
                log: `done  f(${R})=${fR}  f(${L - 1})=${fLow}  ->  answer = ${answer}`
            });

            // backfill fR / fLow onto per-phase steps so the chips read correctly
            let seenR = null;
            steps.forEach(st => {
                if (st.phase === 'R' && st.fval != null) seenR = st.fval;
                if (st.phase === 'R') st.fRrun = seenR;          // running f(R) (null until known)
                if (st.phase === 'low') { st.fR = fR; }
            });
        }

        // ───────── render (persistent DOM) ─────────
        function freeIsFilled(step, i, r) {
            if (i === 0) return true;                 // base row given
            const f = step.fill; if (!f) return false;
            return i < f.i || (i === f.i && r <= f.r);
        }

        function renderDigitTrack(step) {
            const track = document.getElementById('digit-track');
            const cap = document.getElementById('bound-caption');
            const digs = step.boundDigits || [];
            // caption
            if (step.bound == null) cap.textContent = step.phase === 'final' ? 'result' : 'digit DP';
            else cap.textContent = `bound ${step.boundLabel} = ${step.bound}`;

            const used = new Set();
            for (let i = 0; i < digs.length; i++) {
                used.add(i);
                let el = digitEls[i];
                if (!el) { el = document.createElement('div'); el.className = 'digit-tile'; digitEls[i] = el; }
                let cls = 'digit-tile';
                if (step.walkPos != null && step.walkPos > i) cls += ' done';
                if (step.walkPos === i) cls += ' current';
                el.className = cls; el.textContent = digs[i];
                track.appendChild(el);
            }
            Object.keys(digitEls).forEach(k => { if (!used.has(+k)) { digitEls[k].remove(); delete digitEls[k]; } });
        }

        function renderGrid(step) {
            const grid = document.getElementById('dp-grid');
            const rows = (step.rows || 0) + 2;   // +1 header row (col indices), +1 nothing extra; row 1 = i=0
            const cols = (step.cols || 0) + 1;   // +1 header col (i index)
            if (!step.free || !step.free.length) { grid.style.gridTemplateColumns = ''; Object.keys(cellEls).forEach(k => { cellEls[k].remove(); delete cellEls[k]; }); return; }
            grid.style.gridTemplateColumns = `repeat(${cols}, 52px)`;

            const curKey = step.cur ? step.cur[0] + ',' + step.cur[1] : null;
            const readKey = step.readCell ? step.readCell[0] + ',' + step.readCell[1] : null;
            const depSet = new Set((step.deps || []).map(d => d[0] + ',' + d[1]));
            const used = new Set();

            for (let gr = 0; gr < rows; gr++) {
                for (let gc = 0; gc < cols; gc++) {
                    const key = gr + ',' + gc; used.add(key);
                    let el = cellEls[key];
                    if (!el) { el = document.createElement('div'); el.className = 'cell'; cellEls[key] = el; }
                    let cls = 'cell', txt = '', isDpCell = false;

                    if (gr === 0 && gc === 0) { cls += ' corner'; txt = 'i \\ r'; }
                    else if (gr === 0) {                    // column header = remainder r
                        cls += ' head'; const r = gc - 1; txt = String(r);
                        if (step.cur && step.cur[1] === r) cls += ' lit';
                        if (step.readCell && step.readCell[1] === r) cls += ' lit2';
                    } else if (gc === 0) {                  // row header = i (suffix length)
                        cls += ' head'; const i = gr - 1; txt = String(i);
                        if (step.cur && step.cur[0] === i) cls += ' lit';
                        if (step.readCell && step.readCell[0] === i) cls += ' lit2';
                    } else {
                        isDpCell = true;
                        const i = gr - 1, r = gc - 1, dpKey = i + ',' + r;
                        const filled = freeIsFilled(step, i, r);
                        const val = step.free[i][r];
                        if (filled) { cls += (val === 0 ? ' zero' : ' filled'); txt = String(val); }
                        else { txt = ''; }
                        if (depSet.has(dpKey)) cls += ' dep';
                        if (readKey === dpKey) cls += ' read';
                        if (curKey === dpKey) cls += ' current';
                    }

                    const wasEmpty = el.textContent === '';
                    el.className = cls; el.textContent = txt;
                    if (isDpCell && wasEmpty && txt !== '') Motion.pop(el);
                    grid.appendChild(el);
                }
            }
            Object.keys(cellEls).forEach(k => { if (!used.has(k)) { cellEls[k].remove(); delete cellEls[k]; } });
        }

        function renderAccum(step) {
            const row = document.getElementById('accum-row'); row.innerHTML = '';
            const chip = (label, val, klass) => {
                const c = document.createElement('div'); c.className = 'accum-chip' + (klass ? ' ' + klass : '');
                c.innerHTML = `${label} <b>${val}</b>`; row.appendChild(c);
            };
            if (step.phase === 'intro') {
                chip('count x &isin; [' + L + ',' + R + ']', '?', '');
                chip('answer = f(R) &minus; f(L&minus;1)', '', '');
            } else if (step.phase === 'final') {
                chip('f(' + R + ')', step.fR, 'grn');
                chip('f(' + (L - 1) + ')', step.fLow, '');
                chip('answer', step.answer, 'lit');
            } else {
                // per-bound: pref, cnt, and f(R) once known
                if (step.pref != null) chip('pref', step.pref, '');
                chip('cnt', step.cnt, 'lit');
                if (step.phase === 'low' && step.fR != null) chip('f(' + R + ')', step.fR, 'grn');
                if (step.fval != null) chip('f(' + step.bound + ')', step.fval, 'grn');
            }
        }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            renderDigitTrack(step);
            renderGrid(step);
            renderAccum(step);

            // answer tiles
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.complete && step.answer != null) {
                const t = document.createElement('div'); t.className = 'ans-tile'; t.textContent = step.answer; at.appendChild(t);
            }

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // state pills
            document.getElementById('st-bound').textContent = step.bound != null ? `${step.boundLabel} = ${step.bound}` : '—';
            document.getElementById('st-cell').textContent = step.cur ? `[${step.cur[0]}][${step.cur[1]}] = ${step.free[step.cur[0]][step.cur[1]]}` : (step.readCell ? `[${step.readCell[0]}][${step.readCell[1]}] read` : '—');
            document.getElementById('st-sub').textContent = step.fval != null ? step.fval : (step.phase === 'final' ? `${step.fR}−${step.fLow}` : step.cnt);
            document.getElementById('st-ans').textContent = step.phase === 'final' ? step.answer : (step.phase === 'low' ? '…' : '—');

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(cellEls).forEach(k => { cellEls[k].remove(); delete cellEls[k]; });
            Object.keys(digitEls).forEach(k => { digitEls[k].remove(); delete digitEls[k]; });
            confettiArmed = true;
        }
        function loadValues(l, r, m, k) {
            pause(); L = l; R = r; M = m; K = k; clearDom(); generateSteps(); renderStep(0);
        }
        function loadCustom() {
            const l = parseInt(document.getElementById('l-input').value, 10);
            const r = parseInt(document.getElementById('r-input').value, 10);
            const m = parseInt(document.getElementById('m-input').value, 10);
            const k = parseInt(document.getElementById('k-input').value, 10);
            if ([l, r, m, k].some(Number.isNaN)) return;
            if (m < 1 || r < l || l < 0 || k < 0 || k >= m || r > 100000) return;
            loadValues(l, r, m, k);
        }
        function loadExample(n) {
            const ex = [[10, 20, 3, 1], [1, 5, 2, 0]][n];
            document.getElementById('l-input').value = ex[0];
            document.getElementById('r-input').value = ex[1];
            document.getElementById('m-input').value = ex[2];
            document.getElementById('k-input').value = ex[3];
            loadValues(ex[0], ex[1], ex[2], ex[3]);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        ['l-input', 'r-input', 'm-input', 'k-input'].forEach(id => document.getElementById(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); }));
        window.addEventListener('resize', () => { if (steps.length) renderStep(stepIdx); });

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
