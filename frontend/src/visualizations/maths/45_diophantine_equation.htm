<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Diophantine Equation - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* bezout coefficients / particular soln */
            --accent-blue:   #06b6d4;    /* quotient column / chrome              */
            --accent-green:  #22c55e;    /* gcd / divides / success               */
            --accent-red:    #f43f5e;    /* does not divide / no solution         */
            --accent-purple: #a855f7;    /* active Euclid row                     */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 78px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="number"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.fail { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.fail::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .stage-inner { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; padding: 22px; display: flex; flex-direction: column; align-items: center; gap: 18px; }
        .stage-inner::-webkit-scrollbar { height: 8px; width: 8px; }
        .stage-inner::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        /* equation hero */
        .eq-hero {
            font-family: var(--mono); font-size: 26px; font-weight: 800; letter-spacing: 0.5px;
            padding: 10px 22px; border-radius: 12px; border: 1px solid rgba(6,182,212,0.28);
            background: rgba(6,182,212,0.08); color: #e8eefb; box-shadow: 0 0 22px rgba(6,182,212,0.12);
        }
        .eq-hero .va { color: var(--accent-purple); } .eq-hero .vb { color: var(--accent-blue); } .eq-hero .vc { color: var(--accent-orange); }

        /* Euclid extended table */
        .euclid-table { border-collapse: separate; border-spacing: 5px; font-family: var(--mono); }
        .euclid-table th { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text-dim); padding: 2px 6px; }
        .euclid-table th.c-q { color: var(--accent-blue); } .euclid-table th.c-s, .euclid-table th.c-t { color: var(--accent-orange); }
        .e-cell {
            display: flex; align-items: center; justify-content: center;
            min-width: 56px; height: 40px; padding: 0 8px; border-radius: 9px; font-weight: 800; font-size: 15px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            will-change: transform; transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .e-cell.dim { color: var(--text-dim); background: rgba(255,255,255,0.02); }
        .euclid-table tr.active .e-cell { border-color: var(--accent-purple); background: rgba(168,85,247,0.14); color: #e9d5ff; box-shadow: 0 0 16px rgba(168,85,247,0.4); }
        .euclid-table tr.gcd-row .e-cell.c-r { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.85), rgba(33,194,117,0.85)); color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.45); }
        .e-cell.c-q.shown { border-color: var(--accent-blue); background: rgba(6,182,212,0.12); color: #a5f3fc; }
        .e-cell.bezout { border-color: var(--accent-orange); background: rgba(245,165,36,0.18); color: #ffd591; box-shadow: 0 0 16px rgba(245,165,36,0.45); transform: scale(1.05); }

        /* check / result row */
        .check-line { font-family: var(--mono); font-size: 16px; font-weight: 700; min-height: 24px; text-align: center; transition: color 0.3s; }
        .soln-track { display: flex; gap: 10px; align-items: center; min-height: 46px; flex-wrap: wrap; justify-content: center; }
        .soln-tile {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            padding: 7px 16px; border-radius: 11px; font-family: var(--mono); font-weight: 800;
            border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591;
            box-shadow: 0 0 14px rgba(245,165,36,0.35); will-change: transform;
        }
        .soln-tile.win { border-color: var(--accent-green); background: rgba(34,197,94,0.16); color: #86efac; box-shadow: 0 0 16px rgba(34,197,94,0.45); }
        .soln-tile .lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.6px; color: var(--text-dim); }
        .soln-tile .v { font-size: 18px; }
        .gen-line { font-family: var(--mono); font-size: 13.5px; color: #cbd5e8; text-align: center; }
        .gen-line b { color: #fff; }

        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.p b { color: var(--accent-purple); } .pill.b b { color: var(--accent-orange); } .pill.g b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">a =</label>
        <input type="number" id="a-input" value="2">
        <label class="ui-label">b =</label>
        <input type="number" id="b-input" value="3">
        <label class="ui-label">c =</label>
        <input type="number" id="c-input" value="10">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Ex 1 (2x+3y=10)</button>
        <button onclick="loadExample(1)">Ex 2 (x+y=5)</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Linear Diophantine Equation <span class="sub">&middot; ax + by = c &middot; Extended Euclid &middot; solvable &hArr; gcd(a,b) | c</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="stage-inner" id="stage-inner">
                    <div class="eq-hero" id="eq-hero"></div>
                    <table class="euclid-table" id="euclid-table"></table>
                    <div class="check-line" id="check-line"></div>
                    <div class="soln-track" id="soln-track"></div>
                    <div class="gen-line" id="gen-line"></div>
                </div>
            </div>
        </div>

        <div class="action-stage" style="position:relative;min-height:8px;">
            <div id="confetti"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill p">gcd(a,b) <b id="st-gcd">&mdash;</b></span>
                            <span class="pill b">Bezout (s,t) <b id="st-bezout">&mdash;</b></span>
                            <span class="pill g">particular (x,y) <b id="st-xy">&mdash;</b></span>
                            <span class="pill">a&middot;x+b&middot;y <b id="st-verify">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring pop, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.4 + 0.66 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // ───────── State ─────────
        let A = 2, B = 3, C = 10;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 720, 330];
        // persistent-DOM registries keyed by stable id
        const rowEls = {};    // 'r{i}'      -> <tr>
        const cellEls = {};   // 'r{i}c{col}' -> <div.e-cell>

        const CODE = [
            [['kw','def '],['fn','solveDiophantine'],['src','(a, b, c):']],
            [['src','  # extended Euclid: find g,s,t with a*s+b*t = g']],
            [['src','  (old_r,r),(old_s,s),(old_t,t) = (a,b),(1,0),(0,1)']],
            [['kw','  while '],['src','r != 0:']],
            [['src','    q = old_r // r']],
            [['src','    old_r,r = r, old_r - q*r']],
            [['src','    old_s,s = s, old_s - q*s; old_t,t = t, old_t - q*t']],
            [['src','  g, s, t = old_r, old_s, old_t']],
            [['kw','  if '],['src','c % g != 0: return None  # gcd does not divide c']],
            [['src','  k = c // g']],
            [['kw','  return '],['src','x = s*k, y = t*k  # particular solution']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── extended Euclid (genuine simulation) ─────────
        // Builds the iterative tableau rows: each row holds (r, q, s, t) where the
        // top two rows seed the recurrence and every later row is r = r_{i-2} - q*r_{i-1}.
        function extendedEuclid(a, b) {
            // operate on |a|,|b|; sign folded back into bezout coefficients at the end
            const sa = a < 0 ? -1 : 1, sb = b < 0 ? -1 : 1;
            let r0 = Math.abs(a), r1 = Math.abs(b);
            const rows = []; // {r, q, s, t}  (q is the quotient used to PRODUCE this row's successor)
            let old_r = r0, r = r1, old_s = 1, s = 0, old_t = 0, t = 1;
            // seed rows (no quotient yet)
            rows.push({ r: old_r, q: null, s: old_s, t: old_t });
            rows.push({ r: r,     q: null, s: s,     t: t });
            while (r !== 0) {
                const q = Math.floor(old_r / r);
                const nr = old_r - q * r, ns = old_s - q * s, nt = old_t - q * t;
                // record the quotient on the row that was divided into (old_r row)
                rows[rows.length - 2].q = q;
                old_r = r; r = nr; old_s = s; s = ns; old_t = t; t = nt;
                rows.push({ r: r, q: null, s: s, t: t });
            }
            // last appended row has r=0; gcd & coefficients are the previous row
            const gIdx = rows.length - 2;
            const g = rows[gIdx].r;
            // fold the input signs back: bezout for original a,b
            const sCoeff = rows[gIdx].s * sa;
            const tCoeff = rows[gIdx].t * sb;
            return { rows, g, s: sCoeff, t: tCoeff, gcdRowIdx: gIdx };
        }

        // ───────── step generation (immutable snapshots) ─────────
        function generateSteps() {
            steps = [];
            const a = A, b = B, c = C;
            const eq = `${a}x + ${b}y = ${c}`;
            const { rows, g, s, t, gcdRowIdx } = extendedEuclid(a, b);

            // snapshot template — every field copied so renderStep is pure
            const snap = (extra) => Object.assign({
                rows, gcdRowIdx, g, s, t,
                activeRow: null,      // index into rows highlighted (Euclid pass)
                shownQ: -1,           // reveal quotients/s/t up to and including this row index
                gcdReveal: false,     // green-highlight the gcd row r-cell
                bezoutReveal: false,  // orange-highlight the (s,t) of the gcd row
                check: '',            // text under the table
                checkColor: 'var(--text-dim)',
                particular: null,     // [x,y]
                solnWin: false,
                general: '',
                complete: false, fail: false, confetti: false,
            }, extra);

            // Step 0 — intro
            steps.push(snap({
                code: [0, 1],
                check: '',
                panel: `Solve the linear Diophantine equation <code>${eq}</code> over the integers. A solution exists <b>iff</b> <code>gcd(a,b)</code> divides <code>c</code>. We use the <b>Extended Euclidean Algorithm</b> to get both the gcd and the Bezout coefficients.`,
                log: `equation  ${a}x + ${b}y = ${c}`
            }));

            // Step 1 — seed the tableau
            steps.push(snap({
                code: [2], activeRow: 1, shownQ: -1,
                check: `seed: (r, s, t) rows for a = ${Math.abs(a)} and b = ${Math.abs(b)}`,
                checkColor: 'var(--accent-purple)',
                panel: `Set up the tableau. The recurrence carries a triple <code>(r, s, t)</code> with <code>a&middot;s + b&middot;t = r</code>. Seed rows: <code>(${Math.abs(a)}, 1, 0)</code> and <code>(${Math.abs(b)}, 0, 1)</code>.`,
                log: `seed  (${Math.abs(a)},1,0) , (${Math.abs(b)},0,1)`
            }));

            // Euclid passes: one step per division (rows with a quotient, except seed handled implicitly)
            // The row at index i (for i from 0..gcdRowIdx-1) has q; it produces row i+2.
            for (let i = 0; i + 2 < rows.length; i++) {
                if (rows[i].q == null) continue;
                const q = rows[i].q;
                const ri = rows[i].r, ri1 = rows[i + 1].r, prod = rows[i + 2].r;
                steps.push(snap({
                    code: [3, 4, 5, 6], activeRow: i + 2, shownQ: i + 2,
                    check: `${ri} = ${q} &times; ${ri1} + ${prod}`,
                    checkColor: 'var(--accent-purple)',
                    panel: `Divide: <code>${ri} = ${q}&middot;${ri1} + ${prod}</code> &#8594; quotient <code>q = ${q}</code>, remainder <code>${prod}</code>. Propagate the same combination to <code>s</code> and <code>t</code>: <code>(s,t) = (s' &minus; q&middot;s, t' &minus; q&middot;t)</code>.`,
                    log: `div  ${ri} = ${q}*${ri1} + ${prod}  (s=${rows[i + 2].s}, t=${rows[i + 2].t})`
                }));
            }

            // Step — gcd found
            const grow = rows[gcdRowIdx];
            steps.push(snap({
                code: [7], activeRow: gcdRowIdx, shownQ: rows.length, gcdReveal: true,
                check: `remainder hit 0 &#8594; gcd(${a}, ${b}) = ${g}`,
                checkColor: 'var(--accent-green)',
                panel: `Remainder reached <code>0</code>. The previous remainder is the gcd: <code>gcd(${a}, ${b}) = ${g}</code>.`,
                log: `gcd  gcd(${a},${b}) = ${g}`
            }));

            // Step — Bezout coefficients
            steps.push(snap({
                code: [7], activeRow: gcdRowIdx, shownQ: rows.length, gcdReveal: true, bezoutReveal: true,
                check: `${a}&middot;(${s}) + ${b}&middot;(${t}) = ${a * s + b * t} = gcd`,
                checkColor: 'var(--accent-orange)',
                panel: `The gcd row carries the <b>Bezout coefficients</b>: <code>${a}&middot;(${s}) + ${b}&middot;(${t}) = ${g}</code>. So <code>(s, t) = (${s}, ${t})</code>.`,
                log: `bezout  s=${s}, t=${t}  ->  a*s+b*t = ${a * s + b * t}`
            }));

            const divides = (c % g === 0);

            if (!divides) {
                // divisibility check fails — no integer solution
                steps.push(snap({
                    code: [8], gcdReveal: true, bezoutReveal: true, fail: true, complete: true,
                    check: `${c} mod ${g} = ${((c % g) + g) % g} &ne; 0`,
                    checkColor: 'var(--accent-red)',
                    panel: `Divisibility test fails: <code>gcd = ${g}</code> does <b>not</b> divide <code>c = ${c}</code> (<code>${c} mod ${g} = ${((c % g) + g) % g}</code>). Therefore <b>no integer solution exists</b>.`,
                    log: `check  ${c} % ${g} = ${((c % g) + g) % g} != 0  ->  NO SOLUTION`
                }));
                return;
            }

            // divisibility check passes
            const k = c / g;
            steps.push(snap({
                code: [8, 9], gcdReveal: true, bezoutReveal: true,
                check: `${c} mod ${g} = 0  &#8594;  scale by k = ${c} / ${g} = ${k}`,
                checkColor: 'var(--accent-green)',
                panel: `Divisibility test passes: <code>gcd = ${g}</code> divides <code>c = ${c}</code>. Scale the Bezout identity by <code>k = c / gcd = ${k}</code> to hit <code>c</code>.`,
                log: `check  ${c} % ${g} = 0  ->  k = ${k}`
            }));

            const x0 = s * k, y0 = t * k;
            // general solution increments
            const dx = b / g, dy = a / g;
            const genStr = `x = ${x0} + ${dx}t,&nbsp; y = ${y0} &minus; ${dy}t&nbsp; (t &isin; &#8484;)`;

            // Step — particular solution
            steps.push(snap({
                code: [10], gcdReveal: true, bezoutReveal: true,
                particular: [x0, y0], solnWin: false,
                check: `x = s&middot;k = ${s}&middot;${k} = ${x0},&nbsp; y = t&middot;k = ${t}&middot;${k} = ${y0}`,
                checkColor: 'var(--accent-orange)',
                general: genStr,
                panel: `Multiply through by <code>k = ${k}</code>: a particular solution is <code>x&#8320; = s&middot;k = ${x0}</code>, <code>y&#8320; = t&middot;k = ${y0}</code>.`,
                log: `particular  x0 = ${s}*${k} = ${x0} , y0 = ${t}*${k} = ${y0}`
            }));

            // Step — verify + finish
            const lhs = a * x0 + b * y0;
            steps.push(snap({
                code: [10], gcdReveal: true, bezoutReveal: true, complete: true, confetti: true,
                particular: [x0, y0], solnWin: true,
                check: `${a}&middot;(${x0}) + ${b}&middot;(${y0}) = ${lhs} = c &#10003;`,
                checkColor: 'var(--accent-green)',
                general: genStr,
                panel: `Verify: <code>${a}&middot;(${x0}) + ${b}&middot;(${y0}) = ${lhs} = ${c}</code> &#10003;. The full family of solutions is <code>x = ${x0} + ${dx}t</code>, <code>y = ${y0} &minus; ${dy}t</code> for any integer <code>t</code>.`,
                log: `verify  ${a}*(${x0}) + ${b}*(${y0}) = ${lhs} = c  ->  SOLVED`
            }));
        }

        // ───────── render (persistent DOM reconciliation) ─────────
        // Rebuild the table skeleton ONCE per input-load, then only toggle classes/values per step.
        function buildEuclidSkeleton() {
            const table = document.getElementById('euclid-table');
            table.innerHTML = '';
            Object.keys(rowEls).forEach(k => delete rowEls[k]);
            Object.keys(cellEls).forEach(k => delete cellEls[k]);

            const s0 = steps[0]; if (!s0) return;
            const rows = s0.rows;

            // header
            const thead = document.createElement('tr');
            ['#', 'r', 'q', 's', 't'].forEach((h, ci) => {
                const th = document.createElement('th');
                th.textContent = h === '#' ? '' : h;
                if (h === 'q') th.className = 'c-q';
                if (h === 's') th.className = 'c-s';
                if (h === 't') th.className = 'c-t';
                thead.appendChild(th);
            });
            table.appendChild(thead);

            rows.forEach((row, i) => {
                const tr = document.createElement('tr'); tr.dataset.row = i; rowEls['r' + i] = tr;
                const cols = [
                    { col: 'idx', val: String(i), cls: 'dim' },
                    { col: 'r',   val: String(row.r), cls: 'c-r' },
                    { col: 'q',   val: '', cls: 'c-q' },
                    { col: 's',   val: '', cls: 'c-s' },
                    { col: 't',   val: '', cls: 'c-t' },
                ];
                cols.forEach(({ col, val, cls }) => {
                    const td = document.createElement('td');
                    const cell = document.createElement('div');
                    cell.className = 'e-cell ' + cls;
                    cell.textContent = val;
                    cellEls['r' + i + 'c' + col] = cell;
                    td.appendChild(cell); tr.appendChild(td);
                });
                table.appendChild(tr);
            });
        }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const rows = step.rows;

            // equation hero
            const eq = document.getElementById('eq-hero');
            eq.innerHTML = `<span class="va">${A}</span>x + <span class="vb">${B}</span>y = <span class="vc">${C}</span>`;

            // reconcile each table row/cell by stable id
            rows.forEach((row, i) => {
                const tr = rowEls['r' + i]; if (!tr) return;
                const reveal = i <= step.shownQ;
                const isActive = step.activeRow === i;
                const isGcd = step.gcdReveal && i === step.gcdRowIdx;

                tr.classList.toggle('active', isActive);
                tr.classList.toggle('gcd-row', isGcd);

                const qCell = cellEls['r' + i + 'cq'];
                const sCell = cellEls['r' + i + 'cs'];
                const tCell = cellEls['r' + i + 'ct'];

                // q is shown once that row has been processed (reveal) and it has a quotient
                const newQ = (reveal && row.q != null) ? String(row.q) : '';
                if (qCell.textContent !== newQ) { qCell.textContent = newQ; if (newQ !== '') Motion.pop(qCell); }
                qCell.classList.toggle('shown', newQ !== '');

                // s,t revealed progressively: once the tableau is seeded (shownQ >= 1) the two
                // seed rows show, and each derived row reveals its (s,t) when it is reached.
                const stReveal = (step.shownQ >= 1) && (i <= Math.max(1, step.shownQ));
                const newS = stReveal ? String(row.s) : '';
                const newT = stReveal ? String(row.t) : '';
                if (sCell.textContent !== newS) { sCell.textContent = newS; if (newS !== '') Motion.pop(sCell); }
                if (tCell.textContent !== newT) { tCell.textContent = newT; if (newT !== '') Motion.pop(tCell); }

                // bezout highlight on gcd row's s,t
                const bez = step.bezoutReveal && i === step.gcdRowIdx;
                sCell.classList.toggle('bezout', bez);
                tCell.classList.toggle('bezout', bez);
            });

            // check line
            const cl = document.getElementById('check-line');
            cl.innerHTML = step.check || '';
            cl.style.color = step.checkColor || 'var(--text-dim)';

            // solution tiles
            const track = document.getElementById('soln-track');
            const wantSoln = !!step.particular;
            const haveSoln = track.childElementCount === 2;
            if (wantSoln && !haveSoln) {
                track.innerHTML = '';
                ['x', 'y'].forEach(() => {
                    const tile = document.createElement('div'); tile.className = 'soln-tile';
                    const lbl = document.createElement('div'); lbl.className = 'lbl';
                    const v = document.createElement('div'); v.className = 'v';
                    tile.appendChild(lbl); tile.appendChild(v); track.appendChild(tile);
                });
            } else if (!wantSoln && haveSoln) {
                track.innerHTML = '';
            }
            if (wantSoln) {
                const [x0, y0] = step.particular;
                const tiles = track.children;
                const labels = ['x₀', 'y₀'], vals = [x0, y0];
                for (let i = 0; i < 2; i++) {
                    tiles[i].querySelector('.lbl').textContent = labels[i];
                    const vEl = tiles[i].querySelector('.v');
                    const nv = String(vals[i]);
                    if (vEl.textContent !== nv) { vEl.textContent = nv; Motion.pop(tiles[i]); }
                    tiles[i].classList.toggle('win', !!step.solnWin);
                }
            }

            // general solution line
            document.getElementById('gen-line').innerHTML = step.general || '';

            // narration
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete && !step.fail);
            mp.classList.toggle('fail', !!step.fail);

            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // state pills
            document.getElementById('st-gcd').textContent = step.shownQ >= 1 || step.gcdReveal ? step.g : '—';
            document.getElementById('st-bezout').textContent = step.bezoutReveal ? `(${step.s}, ${step.t})` : '—';
            if (step.particular) {
                document.getElementById('st-xy').textContent = `(${step.particular[0]}, ${step.particular[1]})`;
                const lhs = A * step.particular[0] + B * step.particular[1];
                document.getElementById('st-verify').textContent = `${lhs}`;
            } else {
                document.getElementById('st-xy').textContent = '—';
                document.getElementById('st-verify').textContent = '—';
            }

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            document.getElementById('soln-track').innerHTML = '';
            confettiArmed = true;
        }
        function loadTriple(a, b, c) {
            pause();
            A = a; B = b; C = c;
            clearDom();
            generateSteps();
            buildEuclidSkeleton();
            renderStep(0);
        }
        function loadCustom() {
            const na = parseInt(document.getElementById('a-input').value, 10);
            const nb = parseInt(document.getElementById('b-input').value, 10);
            const nc = parseInt(document.getElementById('c-input').value, 10);
            if (Number.isNaN(na) || Number.isNaN(nb) || Number.isNaN(nc)) return;
            if (na === 0 && nb === 0) return; // degenerate, gcd undefined for this lesson
            loadTriple(na, nb, nc);
        }
        function loadExample(n) {
            const ex = [[2, 3, 10], [1, 1, 5]][n];
            document.getElementById('a-input').value = ex[0];
            document.getElementById('b-input').value = ex[1];
            document.getElementById('c-input').value = ex[2];
            loadTriple(ex[0], ex[1], ex[2]);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        ['a-input', 'b-input', 'c-input'].forEach(id => document.getElementById(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); }));
        window.addEventListener('resize', () => { if (steps.length) renderStep(stepIdx); });

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
