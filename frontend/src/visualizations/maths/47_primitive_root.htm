<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primitive Root mod p &middot; Order Test</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="number"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; width:120px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration.fail{border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.06);}
.narration.fail::before{content:'\2717'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:300px; padding:26px 22px; display:flex; flex-direction:column; gap:22px; align-items:center;}

/* ---- header: p, phi=p-1 factored, smallest primitive root verdict ---- */
.numhead{display:flex; align-items:center; gap:16px; flex-wrap:wrap; justify-content:center;}
.numhead .ncard{display:flex; flex-direction:column; align-items:center; gap:4px;}
.numhead .ncard .lbl{font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:.05em;}
.numhead .nbox{min-width:74px; height:64px; display:flex; align-items:center; justify-content:center; padding:0 12px;
  border-radius:14px; font-family:var(--mono); font-weight:800; font-size:26px; border:2px solid var(--accent-blue);
  background:rgba(6,182,212,.12); color:#a5f3fc; box-shadow:0 0 18px rgba(6,182,212,.3);}
.numhead .phi{font-family:var(--mono); font-size:16px; color:#cfe9f5; min-width:170px; text-align:center; line-height:1.4;}
.numhead .phi b{color:#fff;} .numhead .phi .q{color:var(--accent-purple); font-weight:800;}
.verdict{min-width:96px; height:64px; display:flex; align-items:center; justify-content:center; padding:0 18px;
  border-radius:14px; font-family:var(--mono); font-weight:800; font-size:24px; border:2px solid var(--border-main);
  background:rgba(255,255,255,.04); color:var(--text-dim); transition:all .4s cubic-bezier(.34,1.3,.64,1);}
.verdict.win{border-color:var(--accent-green); background:rgba(34,197,94,.16); color:#bbf7d0; box-shadow:0 0 26px rgba(34,197,94,.45);}

/* ---- candidate row g = 2 .. p-1 ---- */
.scan-label{font-family:var(--mono); font-size:11px; color:var(--text-dim); letter-spacing:.05em; align-self:flex-start; margin-left:8px;}
.scan{display:flex; flex-wrap:wrap; gap:9px; justify-content:center; max-width:780px;}
.cell{position:relative; width:52px; height:52px; display:flex; align-items:center; justify-content:center;
  border-radius:12px; font-family:var(--mono); font-weight:800; font-size:17px;
  border:2px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:background .35s, border-color .35s, color .35s, box-shadow .35s, transform .35s cubic-bezier(.34,1.3,.64,1); will-change:transform;}
.cell .ix{position:absolute; bottom:-15px; left:0; right:0; text-align:center; font-size:9px; color:var(--text-dim); font-weight:600;}
.cell.current{border-color:var(--accent-orange); background:rgba(245,165,36,.16); color:#ffd591;
  box-shadow:0 0 22px rgba(245,165,36,.5); --glow:rgba(245,165,36,.6); animation:breathe 2s ease-in-out infinite; transform:scale(1.1);}
.cell.failed{border-color:var(--accent-red); background:rgba(248,81,73,.16); color:#ffc7c2; opacity:.7;}
.cell.win{border-color:var(--accent-green); background:rgba(34,197,94,.2); color:#bbf7d0;
  box-shadow:0 0 24px rgba(34,197,94,.5); transform:scale(1.12);}
.cell.skip{opacity:.3;}

/* ---- per-candidate order-test panel: one chip per prime q | (p-1) ---- */
.scan-label.tests{margin-top:4px;}
.tests-row{display:flex; flex-wrap:wrap; gap:12px; justify-content:center; min-height:84px; max-width:780px;}
.qchip{min-width:188px; display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 16px;
  border-radius:12px; font-family:var(--mono); border:2px solid var(--border-main); background:rgba(255,255,255,.04);
  color:var(--text-dim); transition:background .35s, border-color .35s, color .35s, box-shadow .35s, transform .35s cubic-bezier(.34,1.3,.64,1); will-change:transform;}
.qchip .qlbl{font-size:11px; color:var(--text-dim);}
.qchip .qexpr{font-size:15px; color:#cfe9f5;} .qchip .qexpr b{color:#fff;}
.qchip.current{border-color:var(--accent-orange); background:rgba(245,165,36,.14); box-shadow:0 0 18px rgba(245,165,36,.35);}
.qchip.pass{border-color:rgba(34,197,94,.55); background:rgba(34,197,94,.10); color:#bbf7d0;}
.qchip.pass .qexpr b{color:#bbf7d0;}
.qchip.fail{border-color:var(--accent-red); background:rgba(248,81,73,.16); color:#ffc7c2; box-shadow:0 0 20px rgba(248,81,73,.4);}
.qchip.fail .qexpr b{color:#ffc7c2;}
.qchip .res{font-size:12px; font-weight:700;}

#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.g b{color:var(--accent-orange);} .pill.q b{color:var(--accent-purple);} .pill.r b{color:var(--accent-blue);} .pill.n b{color:#fff;}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes breathe{0%,100%{box-shadow:0 0 16px var(--glow), inset 0 0 10px rgba(255,255,255,.04);}50%{box-shadow:0 0 30px var(--glow), inset 0 0 14px rgba(255,255,255,.08);}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>p =</label>
  <input type="number" id="p-input" value="7" min="2" max="97">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(7)">Ex 1 (p=7 &rarr; 3)</button>
  <button onclick="loadExample(11)">Ex 2 (p=11 &rarr; 2)</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Primitive Root mod p <span class="sub">&middot; multiplicative-order test</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="numhead">
        <div class="ncard"><span class="lbl">prime p</span><div class="nbox" id="nbox">7</div></div>
        <div class="phi" id="phi">&phi; = p&minus;1</div>
        <div class="ncard"><span class="lbl">smallest g</span><div class="verdict" id="verdict">&middot;</div></div>
      </div>
      <div class="scan-label">candidates g &isin; 2 &hellip; p&minus;1</div>
      <div class="scan" id="scan"></div>
      <div class="scan-label tests">order test &middot; need g<sup>(p&minus;1)/q</sup> &ne; 1 (mod p) for every prime q | (p&minus;1)</div>
      <div class="tests-row" id="tests"></div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill n">p = <b id="pill-p">&mdash;</b></span>
        <span class="pill g">g = <b id="pill-g">&mdash;</b></span>
        <span class="pill q">q = <b id="pill-q">&mdash;</b></span>
        <span class="pill r">g^((p&minus;1)/q) = <b id="pill-r">&mdash;</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>testing</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>primitive root</span>
          <span class="li"><span class="dot" style="background:var(--accent-red)"></span>order &lt; p&minus;1</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.7+0.4*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['kw','function'],['fn',' primitiveRoot'],['src','(p) {']],
  [['kw','  let'],['src',' phi = p - 1;']],
  [['kw','  let'],['src',' qs = primeFactors(phi);  ']],
  [['kw','  for'],['src',' (g = 2; g < p; g++) {']],
  [['kw','    let'],['src',' ok = true;']],
  [['kw','    for'],['src',' (q of qs)']],
  [['kw','      if'],['src',' (modPow(g, phi/q, p) == 1) ok = false;']],
  [['kw','    if'],['src',' (ok) '],['kw','return'],['src',' g;  ']],
  [['src','  }']],
  [['src','}']],
];

let p=7, steps=[], stepIndex=0, timer=null;
const delays=[1400,760,380];
const cells={};   // g -> tile element        (candidate row)
const qcells={};  // q -> chip element        (order-test row)
let confettiArmed=true;

function init(){ buildCode(); loadExample(7); }
function buildCode(){
  const panel=document.getElementById('code-panel'); panel.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    panel.appendChild(ln);
  });
}
function loadExample(np){ p=parseInt(np); document.getElementById('p-input').value=p; buildSkeleton(); generateSteps(); reset(); }
function loadCustom(){ const v=parseInt(document.getElementById('p-input').value);
  if(!isNaN(v)&&v>=2&&v<=97&&isPrime(v)) loadExample(v); else alert('Enter a prime p between 2 and 97.'); }

function isPrime(n){ if(n<2) return false; for(let i=2;i*i<=n;i++) if(n%i===0) return false; return true; }
function primeFactors(n){ const f=[]; let d=2; while(d*d<=n){ if(n%d===0){ f.push(d); while(n%d===0) n=Math.floor(n/d);} d++; } if(n>1) f.push(n); return f; }
function modPow(base,exp,mod){ let r=1; base%=mod; while(exp>0){ if(exp&1) r=(r*base)%mod; base=(base*base)%mod; exp=Math.floor(exp/2);} return r; }

const PHI=()=>p-1;

// Build the persistent stage skeleton ONCE per input load.
function buildSkeleton(){
  // candidate tiles g = 2 .. p-1
  const scan=document.getElementById('scan'); scan.innerHTML=''; for(const k in cells) delete cells[k];
  for(let g=2;g<p;g++){ const c=document.createElement('div'); c.className='cell'; c.id='g'+g;
    c.innerHTML=`${g}<span class="ix">g=${g}</span>`; scan.appendChild(c); cells[g]=c; }
  // order-test chips, one per prime q | (p-1)
  const tests=document.getElementById('tests'); tests.innerHTML=''; for(const k in qcells) delete qcells[k];
  primeFactors(PHI()).forEach(q=>{
    const chip=document.createElement('div'); chip.className='qchip'; chip.id='q'+q;
    chip.innerHTML=`<span class="qlbl">q = ${q}, exponent (p&minus;1)/q = ${PHI()/q}</span>`+
                   `<span class="qexpr" id="qe${q}">g<sup>${PHI()/q}</sup> mod ${p} = <b>&middot;</b></span>`+
                   `<span class="res" id="qr${q}">&middot;</span>`;
    tests.appendChild(chip); qcells[q]=chip;
  });
}

function generateSteps(){
  steps=[]; const phi=PHI(); const qs=primeFactors(phi);
  const qstr=qs.join(' &middot; ');
  function snap(o){ steps.push({
    g:o.g??'—', q:o.q??'—', exp:o.exp??null, val:o.val??'—',
    tested:o.tested??{},        // map g -> 'fail' | 'win'
    cur:o.cur??null,            // currently-tested g
    qstate:o.qstate??{},        // map q -> 'current'|'pass'|'fail'
    win:o.win??null,            // winning g (for header verdict + tile)
    code:o.code, narr:o.narr, log:o.log, complete:o.complete, fail:o.fail });
  }

  snap({ code:[0,1,2],
    narr:`Find the smallest primitive root <code>g</code> mod <code>${p}</code>. <code>g</code> is primitive iff its order is <code>p&minus;1 = ${phi}</code>; equivalently <code>g<sup>${phi}/q</sup> &ne; 1</code> for every prime <code>q | ${phi}</code>. Factor: <code>${phi} = ${qs.map(q=>{let c=0,m=phi;while(m%q===0){m=Math.floor(m/q);c++;}return c>1?q+'^'+c:q;}).join(' &times; ')}</code>, so primes <code>q &isin; {${qs.join(', ')}}</code>.`,
    log:`primitiveRoot(${p}):  phi = p-1 = ${phi}\nprime factors q | ${phi}: ${qs.join(', ')}` });

  const tested={}; let winner=-1;

  for(let g=2;g<p;g++){
    snap({ g, tested:{...tested}, cur:g, code:[3,4],
      narr:`Try candidate <code>g = ${g}</code>. Check <code>${g}<sup>${phi}/q</sup> mod ${p}</code> for each <code>q &isin; {${qs.join(', ')}}</code>; if none equals <code>1</code>, the order is <code>${phi}</code>.`,
      log:`\ncandidate g = ${g}` });

    let isPrim=true; const qstate={};
    for(const q of qs){
      const exp=phi/q; const val=modPow(g,exp,p);
      qstate[q]='current';
      snap({ g, q, exp, val, tested:{...tested}, cur:g, qstate:{...qstate}, code:[5,6],
        narr:`<code>q = ${q}</code>: <code>${g}<sup>${exp}</sup> mod ${p} = ${val}</code>${val===1?' &rarr; <b>= 1</b>, order divides '+exp+' &lt; '+phi+'.':' &ne; 1, passes this prime.'}`,
        log:`  q=${q}: ${g}^(${phi}/${q}=${exp}) mod ${p} = ${val}${val===1?'  <= 1, fails':'  ok'}` });
      if(val===1){ isPrim=false; qstate[q]='fail'; }
      else qstate[q]='pass';
      // re-snapshot with resolved color for this chip (so the chip settles pass/fail before moving on)
      snap({ g, q, exp, val, tested:{...tested}, cur:g, qstate:{...qstate}, code:[5,6],
        narr: val===1
          ? `<code>${g}<sup>${exp}</sup> &equiv; 1 (mod ${p})</code> &rarr; <code>g = ${g}</code> has order &le; <code>${exp} &lt; ${phi}</code>, so it is <b>not</b> a primitive root.`
          : `<code>${g}<sup>${exp}</sup> &equiv; ${val} &ne; 1</code> &rarr; <code>g = ${g}</code> survives prime <code>q = ${q}</code>.`,
        log: val===1 ? `  g=${g} fails at q=${q}` : null });
      if(val===1) break;
    }

    if(isPrim){
      tested[g]='win'; winner=g;
      snap({ g, tested:{...tested}, cur:null, qstate:{...qstate}, win:g, code:[7], complete:true,
        narr:`Every prime check passed for <code>g = ${g}</code>: order is exactly <code>${phi}</code>. <code>${g}</code> is the <b>smallest primitive root</b> mod <code>${p}</code>.`,
        log:`✓ g = ${g} is a primitive root (order = ${phi})  ->  return ${g}` });
      break;
    } else {
      tested[g]='fail';
      snap({ g, tested:{...tested}, cur:null, qstate:{...qstate}, fail:true, code:[6],
        narr:`<code>g = ${g}</code> is rejected (some <code>g<sup>(p&minus;1)/q</sup> = 1</code>). Advance to the next candidate.`,
        log:`✗ g = ${g} rejected` });
    }
  }

  // final
  snap({ tested:{...tested}, win:winner>0?winner:null, code:[9],
    complete: winner>0, fail: winner<0,
    narr: winner>0
      ? `<b>Answer:</b> the smallest primitive root mod <code>${p}</code> is <code>${winner}</code> (its powers generate every nonzero residue 1&hellip;${p-1}).`
      : `No primitive root found &mdash; <code>${p}</code> is not prime.`,
    log: winner>0 ? `Final result: smallest primitive root mod ${p} = ${winner}` : `Final result: none (p not prime)` });
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  document.getElementById('nbox').textContent=p;
  const phi=PHI(); const qs=primeFactors(phi);
  document.getElementById('phi').innerHTML=`<b>&phi; = p&minus;1 = ${phi}</b><br>primes q | ${phi}: <span class="q">${qs.join(', ')}</span>`;

  // candidate tiles
  for(let g=2;g<p;g++){
    const c=cells[g]; if(!c) continue;
    c.classList.remove('current','failed','win','skip');
    const st=step.tested[g];
    if(step.win===g && (st==='win' || step.complete)){ c.classList.add('win'); if(step.cur===null) Motion.pop(c); }
    else if(st==='win'){ c.classList.add('win'); }
    else if(st==='fail'){ c.classList.add('failed'); }
    else if(step.cur===g){ c.classList.add('current'); }
    else if(step.complete){ c.classList.add('skip'); }
  }

  // order-test chips
  for(const q of qs){
    const chip=qcells[q]; if(!chip) continue;
    chip.classList.remove('current','pass','fail');
    const exprB=chip.querySelector('b'); const res=document.getElementById('qr'+q);
    const qs2=step.qstate||{};
    if(step.cur!==null && qs2[q]){
      const stt=qs2[q]; chip.classList.add(stt);
      if(step.q===q && step.val!=='—'){
        exprB.textContent=step.val;
        if(stt==='current'){ res.textContent='computing…'; res.style.color='var(--accent-orange)'; }
        else if(stt==='pass'){ res.innerHTML='&ne; 1 &check;'; res.style.color='var(--accent-green)'; Motion.pop(chip); }
        else { res.innerHTML='= 1 &cross;'; res.style.color='var(--accent-red)'; Motion.pop(chip); }
      } else {
        // a chip resolved earlier in this same g: keep its settled state/value if we know it
        if(stt==='pass'){ res.innerHTML='&ne; 1 &check;'; res.style.color='var(--accent-green)'; }
        else if(stt==='fail'){ res.innerHTML='= 1 &cross;'; res.style.color='var(--accent-red)'; }
        else { res.textContent='…'; res.style.color='var(--accent-orange)'; }
      }
    } else {
      exprB.innerHTML='&middot;'; res.textContent='—'; res.style.color='var(--text-dim)';
    }
  }

  // header verdict
  const v=document.getElementById('verdict'); v.classList.remove('win');
  if(step.win){ v.textContent='g = '+step.win; v.classList.add('win'); }
  else v.textContent='·';

  // narration
  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done', !!step.complete && !step.fail);
  narr.classList.toggle('fail', !!step.fail);

  // code highlight
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });

  // pills
  document.getElementById('pill-p').textContent=p;
  document.getElementById('pill-g').textContent=step.g;
  document.getElementById('pill-q').textContent=step.q;
  document.getElementById('pill-r').textContent=step.val;

  // progress + badge
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  // log (accumulated)
  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color='var(--accent-green)'; else if(steps[k].fail) d.style.color='var(--accent-red)'; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete && step.win){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const piece=document.createElement('div'); piece.className='confetti-piece';
    piece.style.background=cols[i%cols.length]; piece.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    piece.style.setProperty('--rot',((i*47)%360)+'deg'); piece.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    piece.style.left=(40+((i*7)%30))+'%'; host.appendChild(piece); setTimeout(()=>piece.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=init;
</script>
