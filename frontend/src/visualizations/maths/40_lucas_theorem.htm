<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Theorem - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* value in motion / digit pair  */
            --accent-blue:   #06b6d4;   /* n digits / chrome             */
            --accent-green:  #22c55e;   /* settled / running product     */
            --accent-red:    #f43f5e;   /* zero collapse (r_i > n_i)      */
            --accent-purple: #a855f7;   /* r digits / current            */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 78px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="number"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .lucas-stage { position: relative; width: 100%; min-height: 300px; overflow-x: auto; overflow-y: hidden; scrollbar-width: thin; display: flex; align-items: center; justify-content: center; padding: 30px 18px 34px; }
        .lucas-stage::-webkit-scrollbar { height: 7px; }
        .lucas-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        /* layout: digit columns (one per base-p digit), each holds n_i, r_i, and C(n_i,r_i) tiles */
        .grid-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; margin: 0 auto; }
        .grid-head { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); }
        .grid-head .accN { color: var(--accent-blue); } .grid-head .accR { color: var(--accent-purple); }
        .col-rail { position: relative; display: flex; gap: 12px; align-items: flex-start; }

        .digit-col { display: flex; flex-direction: column; align-items: center; gap: 8px; will-change: transform; }
        .digit-col .place { font-size: 10.5px; color: var(--text-dim); font-family: var(--mono); margin-bottom: 1px; }

        .cell {
            min-width: 48px; height: 46px; padding: 0 6px; display: flex; align-items: center; justify-content: center;
            border-radius: 11px; font-size: 19px; font-weight: 800; font-family: var(--mono);
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.05); color: var(--text-main);
            transition: background 0.4s, border-color 0.4s, color 0.4s, box-shadow 0.4s, transform 0.4s cubic-bezier(.34,1.3,.64,1);
        }
        .cell.n-cell.lit { border-color: var(--accent-blue); background: rgba(6,182,212,0.14); color: #a5f3fc; box-shadow: 0 0 20px rgba(6,182,212,0.5), inset 0 0 12px rgba(6,182,212,0.12); }
        .cell.r-cell.lit { border-color: var(--accent-purple); background: rgba(168,85,247,0.14); color: #e9d5ff; box-shadow: 0 0 20px rgba(168,85,247,0.5), inset 0 0 12px rgba(168,85,247,0.12); }
        .cell.dim { opacity: 0.38; }

        /* the C(n_i, r_i) result tile per column */
        .ccell {
            min-width: 78px; height: 50px; padding: 0 8px; display: flex; align-items: center; justify-content: center;
            border-radius: 11px; font-size: 14px; font-weight: 800; font-family: var(--mono);
            border: 2px dashed rgba(255,255,255,0.16); background: rgba(255,255,255,0.03); color: var(--text-dim);
            transition: background 0.4s, border-color 0.4s, color 0.4s, box-shadow 0.4s, transform 0.4s cubic-bezier(.34,1.3,.64,1);
        }
        .ccell.active { border-style: solid; border-color: var(--accent-orange); background: rgba(245,165,36,0.14); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.45), inset 0 0 12px rgba(245,165,36,0.10); }
        .ccell.settled { border-style: solid; border-color: var(--accent-green); background: rgba(34,197,94,0.14); color: #bbf7d0; }
        .ccell.zero { border-style: solid; border-color: var(--accent-red); background: rgba(244,63,94,0.14); color: #fecdd3; box-shadow: 0 0 20px rgba(244,63,94,0.4); }

        .row-label { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--text-dim); align-self: center; }

        /* product strip below the grid */
        .product-strip { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 16px; font-weight: 800; flex-wrap: wrap; justify-content: center; min-height: 30px; }
        .product-strip .pterm { padding: 3px 10px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: var(--text-main); transition: all .35s; }
        .product-strip .pterm.lit { border-color: var(--accent-orange); background: rgba(245,165,36,0.14); color: #ffd591; }
        .product-strip .pterm.zero { border-color: var(--accent-red); background: rgba(244,63,94,0.14); color: #fecdd3; }
        .product-strip .pop { color: var(--text-dim); font-weight: 700; }
        .product-strip .eq { color: var(--accent-green); }
        .product-strip .acc { color: var(--accent-green); border-color: var(--accent-green); background: rgba(34,197,94,0.14); padding: 3px 12px; border-radius: 9px; border-width:1px;border-style:solid; }

        .action-stage { position: relative; min-height: 96px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .float-tile { min-width: 92px; padding: 0 14px; height: 56px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 18px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.5); opacity: 0; transform: scale(.5); transition: opacity .25s, transform .4s cubic-bezier(.34,1.5,.64,1); white-space: nowrap; }
        .float-tile.show { opacity: 1; transform: scale(1); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line .cm { color: #5b6b85; font-style: italic; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.n b { color: var(--accent-blue); } .pill.r b { color: var(--accent-purple); } .pill.p b { color: var(--accent-orange); } .pill.s b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="number" id="inp-n" value="5" min="0" max="999">
        <label class="ui-label">r =</label>
        <input type="number" id="inp-r" value="2" min="0" max="999">
        <label class="ui-label">p =</label>
        <input type="number" id="inp-p" value="7" min="2" max="97">
        <button onclick="loadCustom()">Compute</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Ex 1: n=5,r=2</button>
        <button onclick="loadExample(1)">Ex 2: n=10,r=5</button>
        <button onclick="loadExample(2)">Ex 3: n=16,r=9</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Lucas&rsquo; Theorem <span class="sub">&middot; nCr mod p via base-p digits &middot; C(n,r) &equiv; &prod; C(n&#8345;,r&#8345;) (mod p)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="lucas-stage" id="lucas-stage">
                    <div class="grid-wrap" id="grid-wrap">
                        <div class="grid-head" id="grid-head">&mdash;</div>
                        <div class="col-rail" id="col-rail"></div>
                        <div class="product-strip" id="product-strip"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="float-tile" id="float-tile"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill n">n <b id="st-n">&mdash;</b></span>
                            <span class="pill r">r <b id="st-r">&mdash;</b></span>
                            <span class="pill p">p <b id="st-p">&mdash;</b></span>
                            <span class="pill">n&#8323; <b id="st-ndig">&mdash;</b></span>
                            <span class="pill">r&#8323; <b id="st-rdig">&mdash;</b></span>
                            <span class="pill s">&prod; <b id="st-prod">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring + FLIP, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            flip(el, dx, dy) {
                if (REDUCED || (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5)) return;
                const kf = SPRING_POS.map(p => ({ transform: `translate(${(dx * (1 - p)).toFixed(2)}px, ${(dy * (1 - p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
            },
            pop(el) {
                if (REDUCED) { el.style.opacity = '1'; el.style.transform = 'scale(1)'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `scale(${(0.5 + 0.5 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'forwards' });
            },
        };

        // ───────── State ─────────
        let currentN = 5, currentR = 2, currentP = 7;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 760, 360];
        // persistent-DOM registries (keyed by stable id)
        const colEls = {};    // 'k' -> .digit-col element (one per base-p digit place)
        const termEls = {};   // 'k' -> .pterm element in product strip

        // ───────── exact algorithm primitives ─────────
        // C(a, b) for SMALL digits 0..p-1: exact integer binomial (no overflow for p<=97)
        function smallChoose(a, b) {
            if (b < 0 || b > a) return 0;
            b = Math.min(b, a - b);
            let num = 1, den = 1;
            for (let i = 0; i < b; i++) { num *= (a - i); den *= (i + 1); }
            return Math.round(num / den);
        }
        // base-p digits, least-significant first
        function baseDigits(x, p) {
            const d = [];
            if (x === 0) return [0];
            while (x > 0) { d.push(x % p); x = Math.floor(x / p); }
            return d;
        }

        // ───────── synced code panel (the REAL Lucas algorithm) ─────────
        const CODE = [
            [['kw','def '],['fn','lucas'],['src','(n, r, p):       ']],
            [['kw','  if '],['src','r == 0: '],['kw','return '],['src','1']],
            [['src','  ni, ri = n % p, r % p   '],['cm','# base-p digits']],
            [['kw','  if '],['src','ri > ni: '],['kw','return '],['src','0   '],['cm','# C(ni,ri)=0']],
            [['src','  c = C(ni, ri) % p       '],['cm','# small binomial']],
            [['kw','  return '],['src','c * '],['fn','lucas'],['src','(n//p, r//p, p) % p']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── step generation (genuine simulation) ─────────
        // Each step is an immutable snapshot. We model digit COLUMNS ordered most-significant first
        // (matching how the number is written). `cols[k]` = { ni, ri, c, place }.
        function generateSteps(N, R, P) {
            steps = [];
            const nDigLSB = baseDigits(N, P);
            const rDigLSB = baseDigits(R, P);
            const W = Math.max(nDigLSB.length, rDigLSB.length);
            // build column descriptors, MSB-first for display: index k=0 is highest place
            const cols = [];
            for (let place = W - 1; place >= 0; place--) {
                cols.push({ place, ni: nDigLSB[place] || 0, ri: rDigLSB[place] || 0 });
            }
            const nStr = cols.map(c => c.ni).join('');
            const rStr = cols.map(c => c.ri).join('');

            // colState per column: 'idle' | 'lit' | 'settled' | 'zero'
            const baseColStates = cols.map(() => 'idle');
            // computed c-values revealed progressively (null = not yet)
            const cVals = cols.map(() => null);

            const snap = (extra) => Object.assign({
                cols: cols.map(c => ({ ...c })),
                colStates: [...baseColStates],
                cVals: [...cVals],
                product: runningProduct(),
                N, R, P, nStr, rStr,
                head: `n = ${N} = (${nStr})<span class="accN">&#8323;</span>${P} &middot; r = ${R} = (${rStr})<span class="accR">&#8323;</span>${P}`,
                ndig: nStr, rdig: rStr,
            }, extra);

            // running product over already-decided cVals
            function runningProduct() {
                let prod = 1;
                for (let k = 0; k < cVals.length; k++) { if (cVals[k] == null) break; prod = (prod * cVals[k]) % P; }
                return prod;
            }

            // 0) intro
            steps.push(snap({
                code: [0], action: 'LUCAS', actionColor: 'var(--accent-blue)',
                panel: `<b>Lucas&rsquo; Theorem.</b> To find <code>C(${N}, ${R}) mod ${P}</code>, write both numbers in <b>base ${P}</b> and multiply <code>C(n&#8345;, r&#8345;) mod ${P}</code> across each digit place.`,
                log: `init  n=${N}, r=${R}, p=${P}`
            }));

            // 1) decomposition reveal (light up all n / r digit cells)
            const allLit = cols.map(() => 'lit');
            steps.push(snap({
                code: [2], action: 'DECOMPOSE', actionColor: 'var(--accent-purple)',
                colStates: allLit,
                panel: `Decompose in base ${P}: <code>n = (${nStr})&#8323;${P}</code> and <code>r = (${rStr})&#8323;${P}</code>. There ${cols.length === 1 ? 'is 1 digit place' : 'are ' + cols.length + ' digit places'} to combine.`,
                log: `digits  n=(${nStr})_${P}  r=(${rStr})_${P}`
            }));

            // 2) per-column: focus -> evaluate C(ni,ri) mod p -> fold into product
            let prod = 1;
            let collapsedToZero = false;
            for (let k = 0; k < cols.length; k++) {
                const { ni, ri, place } = cols[k];
                // focus this column
                const focusStates = cols.map((_, j) => j === k ? 'lit' : (j < k ? (cVals[j] === 0 ? 'zero' : 'settled') : 'idle'));
                steps.push(snap({
                    code: [2, 3], action: `digit place ${place}`, actionColor: 'var(--accent-orange)',
                    colStates: focusStates, focusCol: k,
                    tile: `n${sub(place)}=${ni} , r${sub(place)}=${ri}`,
                    panel: `Place <b>${place}</b>: combine <code>n${subH(place)}=${ni}</code> with <code>r${subH(place)}=${ri}</code>. ${ri > ni ? `Since <b>r${subH(place)} &gt; n${subH(place)}</b>, this term is <b>0</b>.` : `Compute <code>C(${ni}, ${ri}) mod ${P}</code>.`}`,
                    log: ri > ni ? `place ${place}: r${place}>n${place} -> C=0` : `place ${place}: C(${ni},${ri}) mod ${P}`
                }));

                // evaluate
                const c = (ri > ni) ? 0 : (smallChoose(ni, ri) % P);
                cVals[k] = c;
                prod = (prod * c) % P;
                const evalStates = cols.map((_, j) => j <= k ? (cVals[j] === 0 ? 'zero' : 'settled') : 'idle');
                const zeroNow = (c === 0);
                if (zeroNow) collapsedToZero = true;
                steps.push(snap({
                    code: [4, 5], action: zeroNow ? 'term = 0' : `term = ${c}`, actionColor: zeroNow ? 'var(--accent-red)' : 'var(--accent-green)',
                    colStates: evalStates, focusCol: k, miss: zeroNow,
                    tile: `C(${ni},${ri}) mod ${P} = ${c}`,
                    panel: zeroNow
                        ? `<code>C(${ni}, ${ri}) mod ${P} = <b>0</b></code>. One zero factor collapses the whole product &rarr; <b>0</b>.`
                        : `<code>C(${ni}, ${ri}) mod ${P} = <b>${c}</b></code>. Running product is now <code><b>${prod}</b></code>.`,
                    log: `place ${place}: C(${ni},${ri})%${P} = ${c}  (prod=${prod})`
                }));
            }

            // 3) final
            const trueResult = prod; // by Lucas, product over digits IS the answer mod p
            steps.push(snap({
                complete: true, confetti: true, code: [1, 5], action: `= ${trueResult}`, actionColor: 'var(--accent-green)',
                colStates: cols.map((_, j) => cVals[j] === 0 ? 'zero' : 'settled'),
                tile: `C(${N},${R}) mod ${P} = ${trueResult}`,
                panel: `<b>Done.</b> ${collapsedToZero ? 'A digit had <code>r&#8345; &gt; n&#8345;</code>, so ' : 'Multiplying every digit term, '}<code>C(${N}, ${R}) mod ${P} = <b>${trueResult}</b></code>.`,
                log: `done  C(${N},${R}) mod ${P} = ${trueResult}`,
                finalProduct: trueResult
            }));

            // subscript helpers for code/narration (HTML entity subscripts)
            function sub(d) { return '₀₁₂₃₄₅₆₇₈₉'[d] || ('_' + d); }
            function subH(d) {
                const map = ['&#8320;','&#8321;','&#8322;','&#8323;','&#8324;','&#8325;','&#8326;','&#8327;','&#8328;','&#8329;'];
                return map[d] || ('_' + d);
            }
        }

        // ───────── render (persistent DOM + FLIP) ─────────
        function colCenterX(k) {
            const el = colEls[k];
            if (!el) return 0;
            return el.offsetLeft + el.offsetWidth / 2;
        }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const rail = document.getElementById('col-rail');
            const W = step.cols.length;

            // FIRST: record current column positions (FLIP for any reflow)
            const firstRects = {};
            for (let k = 0; k < W; k++) { const el = colEls[k]; if (el && el.isConnected) firstRects[k] = el.getBoundingClientRect(); }

            // reconcile digit columns (keyed by index k, MSB-first)
            const used = new Set();
            for (let k = 0; k < W; k++) {
                used.add(String(k));
                let el = colEls[k];
                if (!el) {
                    el = document.createElement('div'); el.className = 'digit-col';
                    el.innerHTML =
                        `<div class="place"></div>` +
                        `<div class="cell n-cell"></div>` +
                        `<div class="cell r-cell"></div>` +
                        `<div class="ccell"></div>`;
                    colEls[k] = el;
                }
                const col = step.cols[k];
                const st = step.colStates[k] || 'idle';
                el.querySelector('.place').textContent = 'p^' + col.place;
                const nC = el.querySelector('.n-cell'); nC.textContent = col.ni;
                const rC = el.querySelector('.r-cell'); rC.textContent = col.ri;
                const cC = el.querySelector('.ccell');
                const cv = step.cVals[k];
                cC.textContent = cv == null ? 'C(' + col.ni + ',' + col.ri + ')' : ('C(' + col.ni + ',' + col.ri + ')=' + cv);

                // class application by column state
                nC.className = 'cell n-cell' + (st === 'idle' ? '' : ' lit');
                rC.className = 'cell r-cell' + (st === 'idle' ? '' : ' lit');
                if (st === 'idle') { nC.classList.add('dim'); rC.classList.add('dim'); }
                cC.className = 'ccell' +
                    (cv == null ? (st === 'lit' ? ' active' : '') :
                        (cv === 0 ? ' zero' : (st === 'lit' ? ' active' : ' settled')));

                rail.appendChild(el); // re-append in order
            }
            // reap extra columns (shorter base-p width)
            Object.keys(colEls).forEach(k => { if (!used.has(k)) { colEls[k].remove(); delete colEls[k]; } });

            // FLIP any column whose box moved
            for (let k = 0; k < W; k++) {
                const el = colEls[k]; if (!el) continue;
                const last = el.getBoundingClientRect();
                if (firstRects[k]) Motion.flip(el, firstRects[k].left - last.left, 0);
            }
            // pop the focused column's result tile when it just changed
            if (step.focusCol != null && colEls[step.focusCol]) {
                Motion.pop(colEls[step.focusCol].querySelector('.ccell'));
            }

            // grid head
            document.getElementById('grid-head').innerHTML = step.head;

            // ── product strip (reconcile pterm tiles by index) ──
            const strip = document.getElementById('product-strip');
            // decide which terms are revealed (cVals !== null)
            const revealed = [];
            for (let k = 0; k < W; k++) if (step.cVals[k] != null) revealed.push(k);
            const usedTerms = new Set();
            // clear non-term decorations and rebuild deterministically
            strip.innerHTML = '';
            Object.keys(termEls).forEach(k => delete termEls[k]);
            if (revealed.length === 0) {
                const ghost = document.createElement('span'); ghost.className = 'pterm'; ghost.style.opacity = '0.5';
                ghost.textContent = '∏ C(nₖ, rₖ) …'; strip.appendChild(ghost);
            } else {
                revealed.forEach((k, j) => {
                    const t = document.createElement('span');
                    const cv = step.cVals[k];
                    t.className = 'pterm' + (cv === 0 ? ' zero' : (step.focusCol === k && !step.complete ? ' lit' : ''));
                    t.textContent = String(cv);
                    termEls[k] = t; usedTerms.add(String(k));
                    strip.appendChild(t);
                    if (j < revealed.length - 1) { const x = document.createElement('span'); x.className = 'pop'; x.textContent = '×'; strip.appendChild(x); }
                });
                // = product (only when all terms in or complete)
                const eq = document.createElement('span'); eq.className = 'pop eq'; eq.textContent = '≡';
                strip.appendChild(eq);
                const acc = document.createElement('span'); acc.className = 'acc'; acc.textContent = step.product + ' (mod ' + step.P + ')';
                strip.appendChild(acc);
                if (step.focusCol != null && termEls[step.focusCol]) Motion.pop(termEls[step.focusCol]);
            }

            // floating tile (value in motion)
            const ft = document.getElementById('float-tile');
            if (step.tile != null) { ft.textContent = step.tile; ft.classList.add('show'); Motion.pop(ft); }
            else ft.classList.remove('show');

            // narration / action / chrome
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            mp.classList.toggle('miss', !!step.miss && !step.complete);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // state pills
            document.getElementById('st-n').textContent = step.N;
            document.getElementById('st-r').textContent = step.R;
            document.getElementById('st-p').textContent = step.P;
            document.getElementById('st-ndig').textContent = '(' + step.ndig + ')';
            document.getElementById('st-rdig').textContent = '(' + step.rdig + ')';
            document.getElementById('st-prod').textContent = step.product;

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(colEls).forEach(k => { colEls[k].remove(); delete colEls[k]; });
            Object.keys(termEls).forEach(k => { delete termEls[k]; });
            document.getElementById('product-strip').innerHTML = '';
            confettiArmed = true;
        }
        function loadValues(n, r, p) {
            pause(); currentN = n; currentR = r; currentP = p; clearDom();
            generateSteps(n, r, p); renderStep(0);
        }
        function isPrime(x) { if (x < 2) return false; for (let i = 2; i * i <= x; i++) if (x % i === 0) return false; return true; }
        function loadCustom() {
            let n = parseInt(document.getElementById('inp-n').value, 10);
            let r = parseInt(document.getElementById('inp-r').value, 10);
            let p = parseInt(document.getElementById('inp-p').value, 10);
            if (isNaN(n) || isNaN(r) || isNaN(p)) { return; }
            n = Math.max(0, Math.min(999, n)); r = Math.max(0, Math.min(999, r)); p = Math.max(2, Math.min(97, p));
            if (r > n) r = n;
            if (!isPrime(p)) { p = 7; document.getElementById('inp-p').value = 7; } // Lucas requires a prime modulus
            document.getElementById('inp-n').value = n; document.getElementById('inp-r').value = r;
            loadValues(n, r, p);
        }
        function loadExample(i) {
            const ex = [[5, 2, 7], [10, 5, 7], [16, 9, 7]][i];
            document.getElementById('inp-n').value = ex[0];
            document.getElementById('inp-r').value = ex[1];
            document.getElementById('inp-p').value = ex[2];
            loadValues(ex[0], ex[1], ex[2]);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        ['inp-n', 'inp-r', 'inp-p'].forEach(id => document.getElementById(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); }));
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
