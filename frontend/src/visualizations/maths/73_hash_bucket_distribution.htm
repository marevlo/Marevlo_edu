<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Bucket Distribution - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* key in flight              */
            --accent-blue:   #06b6d4;   /* bucket / chrome            */
            --accent-green:  #22c55e;   /* settled / done             */
            --accent-red:    #f43f5e;   /* collision (load > 1)       */
            --accent-purple: #a855f7;   /* current key / hash         */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"], input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"] { width: 200px; }
        input[type="number"] { width: 72px; }
        input[type="text"]:focus, input[type="number"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\26A0'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .hash-stage { position: relative; width: 100%; min-height: 340px; overflow-x: auto; overflow-y: hidden; scrollbar-width: thin; padding: 22px 18px 26px; }
        .hash-stage::-webkit-scrollbar { height: 7px; }
        .hash-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .stage-inner { position: relative; display: flex; flex-direction: column; gap: 30px; align-items: center; min-width: max-content; margin: 0 auto; }

        .lane-label { font-family: var(--mono); font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--text-dim); align-self: flex-start; margin-left: 2px; }

        /* keys lane */
        .keys-rail { position: relative; display: flex; gap: 12px; }
        .key { position: relative; display: flex; flex-direction: column; align-items: center; gap: 6px; will-change: transform; }
        .key .box {
            min-width: 56px; height: 56px; padding: 0 8px; display: flex; align-items: center; justify-content: center;
            border-radius: 13px; font-size: 21px; font-weight: 800; font-family: var(--mono);
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.05); color: var(--text-main);
            transition: background 0.4s, border-color 0.4s, color 0.4s, box-shadow 0.4s, transform 0.4s cubic-bezier(.34,1.3,.64,1);
        }
        .key .idx { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
        .key.current .box { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 20px rgba(168,85,247,0.5), inset 0 0 12px rgba(168,85,247,0.12); transform: translateY(-3px); }
        .key.placed .box { border-color: var(--accent-green); background: rgba(34,197,94,0.12); color: #bbf7d0; opacity: 0.5; }
        .key.dim .box { opacity: 0.32; }

        /* buckets lane */
        .buckets-rail { position: relative; display: flex; gap: 14px; align-items: flex-end; }
        .bucket { position: relative; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .bucket .bin {
            min-width: 64px; padding: 8px 8px 6px; display: flex; flex-direction: column-reverse; align-items: center; gap: 6px;
            min-height: 74px; border-radius: 13px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.035);
            transition: background 0.4s, border-color 0.4s, box-shadow 0.4s, transform 0.4s cubic-bezier(.34,1.3,.64,1);
        }
        .bucket .blabel { font-size: 11px; font-family: var(--mono); color: var(--text-dim); }
        .bucket .bcount { font-size: 11px; font-family: var(--mono); color: var(--text-dim); }
        .bucket.target .bin { border-color: var(--accent-blue); background: rgba(6,182,212,0.10); box-shadow: 0 0 22px rgba(6,182,212,0.4), inset 0 0 14px rgba(6,182,212,0.10); transform: translateY(-2px); }
        .bucket.target .blabel { color: #a5f3fc; }
        .bucket.collide .bin { border-color: var(--accent-red); background: rgba(244,63,94,0.10); box-shadow: 0 0 22px rgba(244,63,94,0.38); }
        .bucket.collide .blabel { color: #fda4af; }
        .bucket.full .bin { border-color: var(--accent-green); background: rgba(34,197,94,0.08); }

        /* a chip resting inside a bucket */
        .chip {
            min-width: 44px; height: 30px; padding: 0 8px; display: flex; align-items: center; justify-content: center;
            border-radius: 9px; font-size: 15px; font-weight: 800; font-family: var(--mono);
            border: 1.5px solid var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0;
            transition: background 0.3s, border-color 0.3s;
        }
        .bucket.collide .chip { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; }

        /* flying key (value in motion from key slot to bucket) */
        .flyer {
            position: absolute; left: 0; top: 0; z-index: 8; pointer-events: none; opacity: 0;
            min-width: 50px; height: 36px; padding: 0 8px; display: flex; align-items: center; justify-content: center;
            border-radius: 11px; font-size: 17px; font-weight: 800; font-family: var(--mono);
            border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.18); color: #ffd591;
            box-shadow: 0 0 22px rgba(245,165,36,0.5); will-change: transform, opacity;
        }

        /* hash formula badge floating mid-stage */
        .hash-badge { font-family: var(--mono); font-size: 14px; font-weight: 700; color: #e9d5ff; background: rgba(168,85,247,0.14); border: 1px solid rgba(168,85,247,0.4); padding: 6px 14px; border-radius: 10px; min-height: 18px; opacity: 0; transition: opacity 0.3s; }
        .hash-badge.show { opacity: 1; }
        .hash-badge b { color: #fff; }

        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; z-index: 9; }
        .confetti-piece { position: absolute; top: 30%; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.k b { color: var(--accent-purple); } .pill.b b { color: var(--accent-blue); } .pill.s b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 240px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">keys =</label>
        <input type="text" id="num-input" value="[5, 10, 15]" placeholder="[5, 10, 15]">
        <label class="ui-label">m =</label>
        <input type="number" id="m-input" value="3" min="1" max="9">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample('[1, 2, 3]', 2)">Ex 1</button>
        <button onclick="loadExample('[5, 10, 15]', 3)">Ex 2</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Hash Bucket Distribution <span class="sub">&middot; place each key in bucket (key mod m) &middot; O(n) time</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="hash-stage" id="hash-stage">
                    <div class="stage-inner" id="stage-inner">
                        <div class="lane-label">Keys</div>
                        <div class="keys-rail" id="keys-rail"></div>
                        <div class="hash-badge" id="hash-badge">&mdash;</div>
                        <div class="lane-label">Buckets (index = key mod m)</div>
                        <div class="buckets-rail" id="buckets-rail"></div>
                    </div>
                    <div id="flyer-host"></div>
                    <div id="confetti"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill k">key <b id="st-key">&mdash;</b></span>
                            <span class="pill b">bucket <b id="st-bucket">&mdash;</b></span>
                            <span class="pill s">placed <b id="st-placed">0</b></span>
                            <span class="pill">counts <b id="st-counts">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring + FLIP, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            // FLIP: el is already at its NEW spot; animate FROM (dx,dy) = old - new.
            flip(el, dx, dy) {
                if (REDUCED || (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5)) return;
                const kf = SPRING_POS.map(p => ({ transform: `translate(${(dx * (1 - p)).toFixed(2)}px, ${(dy * (1 - p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
            },
            // glide a flyer from (x0,y0) to (x1,y1) and fade out at the end.
            fly(el, x0, y0, x1, y1) {
                if (REDUCED) { el.style.opacity = '0'; return; }
                const dx = x1 - x0, dy = y1 - y0;
                const kf = SPRING_POS.map(p => ({
                    transform: `translate(${(x0 + dx * p).toFixed(2)}px, ${(y0 + dy * p).toFixed(2)}px)`,
                    opacity: (p < 0.06 ? p / 0.06 : (p > 0.9 ? (1 - p) / 0.1 : 1)).toFixed(3)
                }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear', fill: 'forwards' });
            },
            pop(el) {
                if (REDUCED) { el.style.opacity = '1'; el.style.transform = 'scale(1)'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `scale(${(0.5 + 0.5 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'forwards' });
            },
        };

        // ───────── State ─────────
        let keys = [5, 10, 15];
        let m = 3;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 760, 360];
        const keyEls = {};      // key index -> .key element
        const bucketEls = {};   // bucket index -> { wrap, bin } element
        let prevFlyKey = null;  // tracks which key we last animated flying

        const CODE = [
            [['kw','def '],['fn','distribute'],['src','(keys, m):']],
            [['src','  counts = [0] * m']],
            [['src','  buckets = [[] for _ in range(m)]']],
            [['kw','  for '],['src','key in keys:']],
            [['src','    b = key % m']],
            [['src','    buckets[b].append(key)']],
            [['src','    counts[b] += 1']],
            [['kw','  return '],['src','counts, buckets']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── step generation (genuine simulation) ─────────
        function generateSteps() {
            steps = [];
            const n = keys.length;
            const counts = new Array(m).fill(0);
            const buckets = Array.from({ length: m }, () => []);

            // snapshot helper: deep-copies the mutable arrays so every step is immutable.
            const snap = (extra) => Object.assign({
                counts: counts.slice(),
                buckets: buckets.map(b => b.slice()),
                keyStates: keys.map(() => 'idle'),
                placedCount: counts.reduce((s, c) => s + c, 0),
            }, extra);

            // INIT
            steps.push(snap({
                code: [0, 1, 2], curKey: null, curBucket: null,
                panel: `Distribute <code>[${keys.join(', ')}]</code> into <b>${m}</b> buckets. Each key <b>k</b> lands in bucket <code>k mod ${m}</code>. Start with all buckets empty.`,
                log: `init  keys=[${keys.join(', ')}]  m=${m}  counts=[${counts.join(', ')}]`
            }));

            for (let i = 0; i < n; i++) {
                const key = keys[i];
                const b = ((key % m) + m) % m;   // safe modulo

                // HASH: highlight the key, compute the bucket (key not yet placed)
                steps.push(snap({
                    code: [3, 4], curKey: i, curBucket: b, fly: false,
                    keyStates: keys.map((_, j) => j < i ? 'placed' : (j === i ? 'current' : 'dim')),
                    hash: `<b>${key}</b> mod ${m} &nbsp;=&nbsp; <b>${b}</b>`,
                    panel: `Key <code>keys[${i}] = ${key}</code>: compute <code>${key} mod ${m} = <b>${b}</b></code>. Send it to bucket <b>${b}</b>.`,
                    log: `key ${key}  ->  ${key} % ${m} = ${b}`
                }));

                // PLACE: append to bucket, bump count (this snapshot already reflects the placement)
                buckets[b].push(key);
                counts[b]++;
                const collided = counts[b] > 1;

                steps.push(snap({
                    code: [5, 6], curKey: i, curBucket: b, fly: true, flyKey: i, flyVal: key,
                    collide: collided,
                    keyStates: keys.map((_, j) => j <= i ? 'placed' : 'dim'),
                    hash: `bucket ${b}: ${collided ? 'load ' + counts[b] + ' (collision)' : 'load 1'}`,
                    panel: collided
                        ? `Bucket <b>${b}</b> already had keys &mdash; this is a <b>collision</b>. Load grows to <b>${counts[b]}</b>: <code>[${buckets[b].join(', ')}]</code>.`
                        : `Placed <b>${key}</b> in bucket <b>${b}</b>. Load is now <b>${counts[b]}</b>.`,
                    log: `  buckets[${b}] = [${buckets[b].join(', ')}]   counts[${b}] = ${counts[b]}`,
                    miss: collided
                }));
            }

            // collisions = number of placements that landed in a non-empty bucket
            const usedBuckets = counts.filter(c => c > 0).length;
            const collisions = n - usedBuckets;

            // FINAL
            steps.push(snap({
                complete: true, confetti: true, code: [7], curKey: null, curBucket: null,
                keyStates: keys.map(() => 'placed'),
                hash: `final load &equiv; counts = [${counts.join(', ')}]`,
                panel: `Done. Final distribution <code>counts = [${counts.join(', ')}]</code> across ${m} buckets (${collisions} collision${collisions === 1 ? '' : 's'}).`,
                log: `done  counts=[${counts.join(', ')}]  collisions=${collisions}`
            }));
        }

        // ───────── geometry helpers ─────────
        function centerOf(el, host) {
            const r = el.getBoundingClientRect();
            const h = host.getBoundingClientRect();
            return { x: r.left - h.left + r.width / 2, y: r.top - h.top + r.height / 2 };
        }

        // ───────── skeleton (rebuilt once per input-load) ─────────
        function buildSkeleton() {
            const keysRail = document.getElementById('keys-rail');
            const bucketsRail = document.getElementById('buckets-rail');
            keysRail.innerHTML = ''; bucketsRail.innerHTML = '';
            for (const k in keyEls) delete keyEls[k];
            for (const k in bucketEls) delete bucketEls[k];

            keys.forEach((val, i) => {
                const el = document.createElement('div'); el.className = 'key';
                el.innerHTML = `<div class="box">${val}</div><div class="idx">[${i}]</div>`;
                keysRail.appendChild(el); keyEls[i] = el;
            });
            for (let b = 0; b < m; b++) {
                const wrap = document.createElement('div'); wrap.className = 'bucket';
                wrap.innerHTML = `<div class="blabel">b ${b}</div><div class="bin"></div><div class="bcount">load 0</div>`;
                bucketsRail.appendChild(wrap);
                bucketEls[b] = { wrap, bin: wrap.querySelector('.bin'), count: wrap.querySelector('.bcount') };
            }
        }

        // ───────── render (pure fn of steps[idx], persistent DOM) ─────────
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // key tiles: just toggle state classes (skeleton already built)
            keys.forEach((_, i) => {
                const el = keyEls[i]; if (!el) return;
                el.className = 'key ' + (step.keyStates[i] || 'idle');
            });

            // buckets: reconcile chips to match this snapshot's bucket contents
            for (let b = 0; b < m; b++) {
                const ref = bucketEls[b]; if (!ref) continue;
                const want = step.buckets[b];
                const bin = ref.bin;
                // rebuild chips for this bucket to exactly mirror the snapshot
                while (bin.children.length > want.length) bin.removeChild(bin.lastChild);
                want.forEach((val, ci) => {
                    let chip = bin.children[ci];
                    const isNew = !chip;
                    if (!chip) { chip = document.createElement('div'); chip.className = 'chip'; bin.appendChild(chip); }
                    chip.textContent = val;
                    if (isNew && !step.fly) Motion.pop(chip);
                });
                ref.count.textContent = 'load ' + step.counts[b];
                let cls = 'bucket';
                if (b === step.curBucket) cls += step.collide ? ' collide' : ' target';
                else if (step.counts[b] > 0) cls += ' full';
                ref.wrap.className = cls;
            }

            // flyer: animate the current key from its slot into its bucket (value in motion)
            const host = document.getElementById('flyer-host');
            if (step.fly && step.flyKey != null && keyEls[step.flyKey] && bucketEls[step.curBucket]) {
                const fkey = step.flyKey;
                // only fire the flight animation when stepping forward onto a fresh placement
                if (prevFlyKey !== fkey || idx > (renderStep._last || 0)) {
                    const flyer = document.createElement('div'); flyer.className = 'flyer'; flyer.textContent = step.flyVal;
                    host.appendChild(flyer);
                    const from = centerOf(keyEls[fkey], host);
                    const to = centerOf(bucketEls[step.curBucket].bin, host);
                    flyer.style.opacity = '0';
                    // pop the just-placed chip after the flight lands
                    const bin = bucketEls[step.curBucket].bin;
                    const landed = bin.lastChild;
                    if (landed) { landed.style.opacity = '0'; }
                    Motion.fly(flyer, from.x - 25, from.y - 18, to.x - 25, to.y - 18);
                    const flyDur = durOf(SPRING_POS);
                    setTimeout(() => {
                        flyer.remove();
                        if (landed) { landed.style.opacity = ''; Motion.pop(landed); }
                    }, REDUCED ? 0 : flyDur * 0.82);
                }
                prevFlyKey = fkey;
            } else {
                prevFlyKey = null;
            }
            renderStep._last = idx;

            // hash badge
            const hb = document.getElementById('hash-badge');
            if (step.hash) { hb.innerHTML = step.hash; hb.classList.add('show'); }
            else hb.classList.remove('show');

            // narration / chrome
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            mp.classList.toggle('miss', !step.complete && !!step.miss);
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // state pills
            document.getElementById('st-key').textContent = step.curKey != null ? keys[step.curKey] : '—';
            document.getElementById('st-bucket').textContent = step.curBucket != null ? step.curBucket : '—';
            document.getElementById('st-placed').textContent = step.placedCount || 0;
            document.getElementById('st-counts').textContent = '[' + step.counts.join(', ') + ']';

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function parseKeys(str) {
            try {
                const v = JSON.parse(str.replace(/'/g, '"'));
                if (Array.isArray(v)) { const f = v.map(Number).filter(x => Number.isFinite(x)); if (f.length) return f.slice(0, 12); }
            } catch (e) { /* fall through */ }
            return [5, 10, 15];
        }

        function loadData(keyArr, mod) {
            pause();
            keys = keyArr; m = mod;
            prevFlyKey = null; renderStep._last = 0; confettiArmed = true;
            document.getElementById('flyer-host').innerHTML = '';
            buildSkeleton();
            generateSteps();
            renderStep(0);
        }
        function loadCustom() {
            const nStr = (document.getElementById('num-input').value || '').trim();
            let mod = parseInt(document.getElementById('m-input').value, 10);
            if (!Number.isFinite(mod) || mod < 1) mod = 1;
            if (mod > 9) mod = 9;
            document.getElementById('m-input').value = mod;
            loadData(parseKeys(nStr), mod);
        }
        function loadExample(numsStr, mod) {
            document.getElementById('num-input').value = numsStr;
            document.getElementById('m-input').value = mod;
            loadData(parseKeys(numsStr), mod);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('num-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        document.getElementById('m-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample('[5, 10, 15]', 3);
    </script>
</body>
</html>
