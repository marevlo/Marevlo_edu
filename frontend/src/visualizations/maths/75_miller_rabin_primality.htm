<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miller&minus;Rabin Primality Test &middot; Witness Squaring</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="number"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; width:120px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration.fail{border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.06);}
.narration.fail::before{content:'\2717'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:300px; padding:26px 22px; display:flex; flex-direction:column; gap:22px; align-items:center;}

.numhead{display:flex; align-items:center; gap:16px; flex-wrap:wrap; justify-content:center;}
.numhead .ncard{display:flex; flex-direction:column; align-items:center; gap:4px;}
.numhead .ncard .lbl{font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:.05em;}
.numhead .nbox{min-width:74px; height:64px; display:flex; align-items:center; justify-content:center; padding:0 12px;
  border-radius:14px; font-family:var(--mono); font-weight:800; font-size:26px; border:2px solid var(--accent-blue);
  background:rgba(6,182,212,.12); color:#a5f3fc; box-shadow:0 0 18px rgba(6,182,212,.3);}
.decomp{display:flex; flex-direction:column; align-items:center; gap:4px;}
.decomp .lbl{font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:.05em;}
.decomp .dbox{font-family:var(--mono); font-size:18px; color:#cfe9f5; padding:10px 16px; border-radius:12px;
  border:1px solid rgba(168,85,247,.35); background:rgba(168,85,247,.10); min-width:170px; text-align:center;
  transition:border-color .35s, background .35s, box-shadow .35s;}
.decomp .dbox b{color:#e9d5ff;} .decomp .dbox.set{box-shadow:0 0 18px rgba(168,85,247,.3);}
.decomp .dbox sup{font-size:11px;}

.verdict{min-width:140px; height:64px; display:flex; align-items:center; justify-content:center; padding:0 18px;
  border-radius:14px; font-family:var(--mono); font-weight:800; font-size:17px; border:2px solid var(--border-main);
  background:rgba(255,255,255,.04); color:var(--text-dim); transition:all .4s cubic-bezier(.34,1.3,.64,1); text-align:center; line-height:1.15;}
.verdict.prime{border-color:var(--accent-green); background:rgba(34,197,94,.16); color:#bbf7d0; box-shadow:0 0 26px rgba(34,197,94,.45);}
.verdict.composite{border-color:var(--accent-red); background:rgba(248,81,73,.16); color:#ffc7c2; box-shadow:0 0 26px rgba(248,81,73,.45);}

.witness-zone{display:flex; flex-direction:column; gap:14px; width:100%; max-width:780px;}
.scan-label{font-family:var(--mono); font-size:11px; color:var(--text-dim); letter-spacing:.05em; align-self:flex-start;}
.wrow{display:flex; align-items:center; gap:12px; flex-wrap:wrap; padding:12px 14px; border-radius:14px;
  border:1px solid rgba(255,255,255,.06); background:rgba(255,255,255,.025);
  transition:border-color .35s, background .35s, opacity .35s, box-shadow .35s;}
.wrow.active{border-color:var(--accent-orange); background:rgba(245,165,36,.06); box-shadow:0 0 22px rgba(245,165,36,.16);}
.wrow.pass{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.wrow.fail{border-color:rgba(248,81,73,.45); background:rgba(248,81,73,.08); box-shadow:0 0 22px rgba(248,81,73,.18);}
.wrow.pending{opacity:.4;}

.abox{min-width:60px; height:50px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 12px;
  border-radius:11px; font-family:var(--mono); font-weight:800; font-size:18px; border:2px solid var(--border-main);
  background:rgba(255,255,255,.05); color:var(--text-main); transition:all .35s cubic-bezier(.34,1.3,.64,1);}
.abox .albl{font-size:8px; font-weight:600; color:var(--text-dim); letter-spacing:.04em;}
.wrow.active .abox{border-color:var(--accent-orange); background:rgba(245,165,36,.16); color:#ffd591; box-shadow:0 0 16px rgba(245,165,36,.4);}
.arrow{font-family:var(--mono); color:var(--text-dim); font-size:16px;}

.seq{display:flex; align-items:flex-end; gap:9px; flex-wrap:wrap;}
.cell{position:relative; min-width:52px; height:52px; display:flex; align-items:center; justify-content:center; padding:0 8px;
  border-radius:12px; font-family:var(--mono); font-weight:800; font-size:16px;
  border:2px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:background .35s, border-color .35s, color .35s, box-shadow .35s, transform .35s cubic-bezier(.34,1.3,.64,1); will-change:transform;}
.cell .ix{position:absolute; bottom:-15px; left:0; right:0; text-align:center; font-size:9px; color:var(--text-dim); font-weight:600; white-space:nowrap;}
.cell.current{border-color:var(--accent-orange); background:rgba(245,165,36,.16); color:#ffd591;
  box-shadow:0 0 22px rgba(245,165,36,.5); --glow:rgba(245,165,36,.6); animation:breathe 2s ease-in-out infinite; transform:scale(1.1); z-index:2;}
.cell.seen{border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.08); color:#7dd3fc; opacity:.9;}
.cell.hit{border-color:var(--accent-green); background:rgba(34,197,94,.2); color:#bbf7d0; box-shadow:0 0 22px rgba(34,197,94,.5); transform:scale(1.12); z-index:2;}
.cell.bad{border-color:var(--accent-red); background:rgba(248,81,73,.2); color:#ffc7c2; box-shadow:0 0 22px rgba(248,81,73,.5); transform:scale(1.1); z-index:2;}
.cell.empty{opacity:.28;}
.target-note{font-family:var(--mono); font-size:11px; color:var(--text-dim); align-self:center; white-space:nowrap;}
.target-note b{color:#bbf7d0;}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.a b{color:var(--accent-orange);} .pill.sd b{color:var(--accent-purple);} .pill.x b{color:var(--accent-blue);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes breathe{0%,100%{box-shadow:0 0 16px var(--glow), inset 0 0 10px rgba(255,255,255,.04);}50%{box-shadow:0 0 30px var(--glow), inset 0 0 14px rgba(255,255,255,.08);}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>n =</label>
  <input type="number" id="num-input" value="29" min="2" max="100000">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(29)">Ex 1 (29 &middot; prime)</button>
  <button onclick="loadExample(15)">Ex 2 (15 &middot; composite)</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Miller&minus;Rabin Primality Test <span class="sub">&middot; witness squaring</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="numhead">
        <div class="ncard"><span class="lbl">n</span><div class="nbox" id="nbox">29</div></div>
        <div class="decomp"><span class="lbl">write n&minus;1 = d &middot; 2<sup>s</sup></span><div class="dbox" id="decomp">&minus;</div></div>
        <div class="ncard"><span class="lbl">verdict</span><div class="verdict" id="verdict">&middot;</div></div>
      </div>
      <div class="witness-zone">
        <div class="scan-label">witnesses a &mdash; compute a<sup>d</sup> mod n, then square s times seeking &equiv; &minus;1 (mod n)</div>
        <div id="witness-rows"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill a">witness a = <b id="pill-a">&minus;</b></span>
        <span class="pill sd">d&middot;2<sup>s</sup> = <b id="pill-sd">&minus;</b></span>
        <span class="pill x">x = <b id="pill-x">&minus;</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>active x</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>&equiv; &minus;1 (pass)</span>
          <span class="li"><span class="dot" style="background:var(--accent-red)"></span>composite</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.7+0.4*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['kw','function'],['fn',' millerRabin'],['src','(n, bases) {']],
  [['kw','  if'],['src',' (n < 2) '],['kw','return'],['src',' false;']],
  [['kw','  if'],['src',' (n == 2 || n == 3) '],['kw','return'],['src',' true;']],
  [['kw','  if'],['src',' (n % 2 == 0) '],['kw','return'],['src',' false;']],
  [['src','  s = 0; d = n - 1;']],
  [['kw','  while'],['src',' (d % 2 == 0) { d /= 2; s++; }']],
  [['kw','  for'],['src',' (a of bases) {']],
  [['src','    x = pow(a, d, n);']],
  [['kw','    if'],['src',' (x == 1 || x == n-1) '],['kw','continue'],['src',';']],
  [['kw','    for'],['src',' (r = 1; r < s; r++) {']],
  [['src','      x = (x * x) % n;']],
  [['kw','      if'],['src',' (x == n-1) '],['kw','break'],['src',';']],
  [['src','    }']],
  [['kw','    if'],['src',' (x != n-1) '],['kw','return'],['src',' false;  ']],
  [['src','  }']],
  [['kw','  return'],['src',' true;']],
  [['src','}']],
];

const BASES=[2,3,5];
let N=29, S=0, D=0, witList=[], steps=[], stepIndex=0, timer=null;
const delays=[1500,800,420];
// persistent-DOM registry: stable ids -> nodes
const els={};       // witness rows + a-boxes
const cells={};     // square-sequence cells, keyed "a:r" (r=0 is x=a^d, r=1..s-1 squarings)
let confettiArmed=true;

function init(){ buildCode(); loadExample(29); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}

function modpow(base, exp, mod){
  let r=1; base%=mod;
  while(exp>0){ if(exp&1) r=(r*base)%mod; base=(base*base)%mod; exp=Math.floor(exp/2); }
  return r;
}

function loadExample(n){ N=parseInt(n); document.getElementById('num-input').value=N; generateSteps(); buildStage(); reset(); }
function loadCustom(){ const v=parseInt(document.getElementById('num-input').value);
  if(!isNaN(v)&&v>=2&&v<=100000) loadExample(v); else alert('Enter an integer 2–100000.'); }

// Build the witness-row skeleton ONCE per input load; per step we only toggle classes/values.
function buildStage(){
  const host=document.getElementById('witness-rows'); host.innerHTML='';
  for(const k in els) delete els[k]; for(const k in cells) delete cells[k];
  document.getElementById('nbox').textContent=N;

  witList.forEach(w=>{
    const row=document.createElement('div'); row.className='wrow pending'; row.id='wr'+w.a; host.appendChild(row);
    els['row'+w.a]=row;

    const ab=document.createElement('div'); ab.className='abox';
    ab.innerHTML=`<span class="albl">a</span>${w.a}`; row.appendChild(ab); els['a'+w.a]=ab;

    const arr=document.createElement('div'); arr.className='arrow'; arr.innerHTML='&rarr;'; row.appendChild(arr);

    const seq=document.createElement('div'); seq.className='seq'; row.appendChild(seq);
    // r=0 cell holds x = a^d mod n; r=1..s-1 cells hold each repeated square
    for(let r=0;r<Math.max(1,S);r++){
      const c=document.createElement('div'); c.className='cell empty'; c.id='c'+w.a+'_'+r;
      const label = r===0 ? 'a<sup>d</sup>' : ('x&#178;&middot;'+r);
      c.innerHTML=`&middot;<span class="ix">${label}</span>`; seq.appendChild(c); cells[w.a+':'+r]=c;
    }
    const note=document.createElement('div'); note.className='target-note';
    note.innerHTML=`target <b>&equiv; ${N-1}</b>`; row.appendChild(note);
  });
}

// Genuine simulation -> immutable per-step snapshots.
function generateSteps(){
  steps=[]; witList=[]; const n=N;
  const snap=o=>steps.push({
    code:o.code, narr:o.narr, log:o.log, complete:o.complete||false, fail:o.fail||false,
    verdict:o.verdict===undefined?null:o.verdict,
    a:o.a===undefined?'−':o.a, sd:o.sd===undefined?'−':o.sd, x:o.x===undefined?'−':o.x,
    decomp:o.decomp||null, activeA:o.activeA===undefined?null:o.activeA,
    // cellStates: map "a:r" -> 'seen'|'current'|'hit'|'bad' ; rowStates: map a -> 'pass'|'fail'|'active'|'pending'|'idle'
    cellStates:o.cellStates||{}, rowStates:o.rowStates||{}, cellVals:o.cellVals||{}
  });

  snap({code:[0], narr:`Is <code>${n}</code> prime? Miller&minus;Rabin writes <code>n&minus;1 = d&middot;2<sup>s</sup></code> and, for each witness <code>a</code>, tests whether <code>a<sup>d</sup></code> reaches <code>&minus;1</code> by repeated squaring.`, log:`millerRabin(${n})`});

  if(n<2){ snap({code:[1], verdict:false, fail:true, complete:true, narr:`<code>${n} &lt; 2</code> &rarr; not prime by definition.`, log:`${n} < 2 -> COMPOSITE`}); return; }
  if(n===2||n===3){ snap({code:[2], verdict:true, complete:true, narr:`<code>${n}</code> is a small prime base case &rarr; <b>PRIME</b>.`, log:`${n} is 2 or 3 -> PRIME`}); return; }
  if(n%2===0){ snap({code:[3], verdict:false, fail:true, complete:true, narr:`<code>${n}</code> is even and <code>&gt; 2</code> &rarr; <b>COMPOSITE</b>.`, log:`${n} even -> COMPOSITE`}); return; }

  // decompose n-1 = d * 2^s
  let s=0, d=n-1;
  snap({code:[4], narr:`Start the factor-out-twos loop with <code>s = 0</code>, <code>d = n&minus;1 = ${n-1}</code>.`, log:`s=0, d=${n-1}`});
  while(d%2===0){ d=Math.floor(d/2); s++; }
  S=s; D=d;
  snap({code:[5], decomp:{s,d}, sd:`${d}&middot;2^${s}`,
    narr:`Factor out twos: <code>n&minus;1 = ${n-1} = <b>${d}&middot;2<sup>${s}</sup></b></code> with <code>d=${d}</code> odd, <code>s=${s}</code>.`,
    log:`n-1 = ${n-1} = ${d} * 2^${s}`});

  witList = BASES.filter(a => a < n-1).map(a=>({a}));

  // running visual state we mutate as we simulate, snapshotting copies
  const rowStates={}; const cellStates={}; const cellVals={};
  witList.forEach(w=>{ rowStates[w.a]='pending'; });
  const clone=o=>JSON.parse(JSON.stringify(o));

  let isPrime=true;
  for(const w of witList){
    const a=w.a;
    rowStates[a]='active';
    snap({code:[6], a, sd:`${d}&middot;2^${s}`, decomp:{s,d}, activeA:a,
      rowStates:clone(rowStates), cellStates:clone(cellStates), cellVals:clone(cellVals),
      narr:`Pick witness <code>a = ${a}</code>. We must reach <code>&minus;1 &equiv; ${n-1}</code> (mod ${n}).`, log:`-- witness a=${a} --`});

    const x0=modpow(a,d,n);
    cellVals[a+':0']=x0; cellStates[a+':0']='current';
    snap({code:[7], a, sd:`${d}&middot;2^${s}`, decomp:{s,d}, x:x0, activeA:a,
      rowStates:clone(rowStates), cellStates:clone(cellStates), cellVals:clone(cellVals),
      narr:`Compute <code>x = ${a}<sup>${d}</sup> mod ${n} = <b>${x0}</b></code>.`, log:`x = ${a}^${d} mod ${n} = ${x0}`});

    if(x0===1 || x0===n-1){
      cellStates[a+':0']='hit'; rowStates[a]='pass';
      snap({code:[8], a, sd:`${d}&middot;2^${s}`, decomp:{s,d}, x:x0, activeA:a,
        rowStates:clone(rowStates), cellStates:clone(cellStates), cellVals:clone(cellVals),
        narr:`<code>x = ${x0}</code> is <code>${x0===1?'1':'n&minus;1'}</code> &rarr; witness <code>${a}</code> <b>passes</b> immediately.`, log:`x in {1, n-1} -> a=${a} PASSES`});
      continue;
    }

    let passed=false, cur=x0;
    cellStates[a+':0']='seen';
    for(let r=1;r<s;r++){
      cur=(cur*cur)%n;
      cellVals[a+':'+r]=cur; cellStates[a+':'+r]='current';
      const hit = cur===n-1;
      snap({code:hit?[10,11]:[10], a, sd:`${d}&middot;2^${s}`, decomp:{s,d}, x:cur, activeA:a,
        rowStates:clone(rowStates), cellStates:clone(cellStates), cellVals:clone(cellVals),
        narr:`Square: <code>r=${r}</code>, <code>x &larr; x&#178; mod ${n} = <b>${cur}</b></code>${hit?` &rarr; equals <code>n&minus;1</code>!`:''}.`,
        log:`r=${r}: x^2 mod ${n} = ${cur}${hit?'  (== n-1)':''}`});
      if(hit){
        passed=true; cellStates[a+':'+r]='hit'; rowStates[a]='pass';
        snap({code:[11], a, sd:`${d}&middot;2^${s}`, decomp:{s,d}, x:cur, activeA:a,
          rowStates:clone(rowStates), cellStates:clone(cellStates), cellVals:clone(cellVals),
          narr:`Found <code>x &equiv; &minus;1</code> at <code>r=${r}</code> &rarr; witness <code>${a}</code> <b>passes</b>.`, log:`found x == n-1 -> a=${a} PASSES`});
        break;
      }
      cellStates[a+':'+r]='seen';
    }

    if(!passed){
      isPrime=false;
      // mark the last evaluated cell as bad
      let lastR = s-1; while(lastR>=0 && cellVals[a+':'+lastR]===undefined) lastR--;
      if(lastR<0) lastR=0;
      cellStates[a+':'+lastR]='bad'; rowStates[a]='fail';
      const why = s===1 ? `with <code>s=1</code> there are no squarings, and <code>x=${x0} &ne; 1, &ne; ${n-1}</code>` : `no square ever reached <code>&minus;1</code>`;
      snap({code:[13], a, sd:`${d}&middot;2^${s}`, decomp:{s,d}, x:cur, activeA:a, verdict:false, fail:true, complete:true,
        rowStates:clone(rowStates), cellStates:clone(cellStates), cellVals:clone(cellVals),
        narr:`Witness <code>${a}</code> is a <b>strong witness</b> to compositeness: ${why} &rarr; <code>${n}</code> is <b>COMPOSITE</b>.`,
        log:`a=${a} FAILS -> ${n} COMPOSITE`});
      // final verdict snapshot
      snap({code:[13], a:'−', sd:`${d}&middot;2^${s}`, decomp:{s,d}, verdict:false, fail:true, complete:true,
        rowStates:clone(rowStates), cellStates:clone(cellStates), cellVals:clone(cellVals),
        narr:`<code>${n}</code> failed witness <code>${a}</code> &rarr; definitely <b>COMPOSITE</b>.`, log:`VERDICT: ${n} is COMPOSITE`});
      return;
    }
  }

  snap({code:[15], a:'−', sd:`${d}&middot;2^${s}`, decomp:{s,d}, verdict:true, complete:true,
    rowStates:clone(rowStates), cellStates:clone(cellStates), cellVals:clone(cellVals),
    narr:`Every witness in <code>{${witList.map(w=>w.a).join(', ')}}</code> passed &rarr; <code>${n}</code> is <b>PROBABLY PRIME</b>.`,
    log:`VERDICT: ${n} is PROBABLY PRIME`});
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  document.getElementById('nbox').textContent=N;

  // decomposition box
  const dec=document.getElementById('decomp');
  if(step.decomp){ dec.innerHTML=`n&minus;1 = <b>${step.decomp.d}&middot;2<sup>${step.decomp.s}</sup></b>`; dec.classList.add('set'); }
  else { dec.innerHTML='&minus;'; dec.classList.remove('set'); }

  // witness rows + cells (persistent reconciliation by stable id)
  witList.forEach(w=>{
    const a=w.a; const row=els['row'+a]; const ab=els['a'+a];
    if(row){
      row.classList.remove('active','pass','fail','pending');
      const rs=step.rowStates[a];
      if(rs==='active') row.classList.add('active');
      else if(rs==='pass') row.classList.add('pass');
      else if(rs==='fail') row.classList.add('fail');
      else if(rs==='pending') row.classList.add('pending');
    }
    for(let r=0;r<Math.max(1,S);r++){
      const c=cells[a+':'+r]; if(!c) continue;
      const prev=c.dataset.state||'';
      const st=step.cellStates[a+':'+r]||'';
      const val=step.cellVals[a+':'+r];
      // update value text node only (keeps the .ix label span intact)
      c.firstChild.nodeValue = (val===undefined? '·' : String(val));
      c.classList.remove('empty','current','seen','hit','bad');
      if(st==='current'){ c.classList.add('current'); }
      else if(st==='seen'){ c.classList.add('seen'); }
      else if(st==='hit'){ c.classList.add('hit'); }
      else if(st==='bad'){ c.classList.add('bad'); }
      else { c.classList.add('empty'); }
      // spring-pop only when a cell newly becomes meaningful
      if(st && st!==prev && (st==='current'||st==='hit'||st==='bad')) Motion.pop(c);
      c.dataset.state=st;
    }
  });

  // verdict
  const v=document.getElementById('verdict'); v.classList.remove('prime','composite');
  if(step.verdict===true){ v.innerHTML='PROBABLY<br>PRIME'; v.classList.add('prime'); }
  else if(step.verdict===false){ v.textContent='COMPOSITE'; v.classList.add('composite'); }
  else v.textContent='·';

  // narration
  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done', !!step.complete && !step.fail);
  narr.classList.toggle('fail', !!step.fail);

  // code highlight
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });

  // pills
  document.getElementById('pill-a').textContent=step.a;
  document.getElementById('pill-sd').textContent=step.sd;
  document.getElementById('pill-x').textContent=step.x;

  // progress + badge
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  // log
  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const dd=document.createElement('div'); dd.textContent=steps[k].log;
    if(steps[k].complete) dd.style.color=steps[k].fail?'var(--accent-red)':'var(--accent-green)'; log.appendChild(dd);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete && step.verdict===true){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true;
  // clear cached cell states so spring-pop fires fresh
  for(const k in cells){ if(cells[k]) cells[k].dataset.state=''; }
  renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=init;
</script>
