<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number of Divisors d(n) &middot; Prime Factorization</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="number"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; width:120px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'▸'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'✓'; color:var(--accent-green);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:300px; padding:26px 22px; display:flex; flex-direction:column; gap:22px; align-items:center;}

.numhead{display:flex; align-items:center; gap:16px; flex-wrap:wrap; justify-content:center;}
.numhead .ncard{display:flex; flex-direction:column; align-items:center; gap:4px;}
.numhead .ncard .lbl{font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:.05em;}
.numhead .nbox{min-width:74px; height:64px; display:flex; align-items:center; justify-content:center; padding:0 12px;
  border-radius:14px; font-family:var(--mono); font-weight:800; font-size:26px; border:2px solid var(--accent-blue);
  background:rgba(6,182,212,.12); color:#a5f3fc; box-shadow:0 0 18px rgba(6,182,212,.3);}
.numhead .rem{font-family:var(--mono); font-size:18px; color:#cfe9f5; min-width:160px; text-align:center;}
.numhead .rem b{color:#fff;} .numhead .rem .z{color:var(--accent-green);} .numhead .rem .nz{color:var(--accent-orange);}
.numhead .dbox{min-width:74px; height:64px; display:flex; align-items:center; justify-content:center; padding:0 12px;
  border-radius:14px; font-family:var(--mono); font-weight:800; font-size:26px; border:2px solid var(--border-main);
  background:rgba(255,255,255,.04); color:var(--text-dim); transition:all .4s cubic-bezier(.34,1.3,.64,1);}
.numhead .dbox.done{border-color:var(--accent-green); background:rgba(34,197,94,.16); color:#bbf7d0; box-shadow:0 0 26px rgba(34,197,94,.45);}

.scan-label{font-family:var(--mono); font-size:11px; color:var(--text-dim); letter-spacing:.05em; align-self:flex-start; margin-left:8px;}
.scan{display:flex; flex-wrap:wrap; gap:9px 11px; justify-content:center; max-width:780px;}
.cell{position:relative; min-width:52px; height:52px; padding:0 10px; display:flex; align-items:center; justify-content:center;
  border-radius:12px; font-family:var(--mono); font-weight:800; font-size:16px;
  border:2px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:background .35s, border-color .35s, color .35s, box-shadow .35s, transform .35s cubic-bezier(.34,1.3,.64,1); will-change:transform;}
.cell .ix{position:absolute; bottom:-15px; left:0; right:0; text-align:center; font-size:9px; color:var(--text-dim); font-weight:600;}
.cell.current{border-color:var(--accent-orange); background:rgba(245,165,36,.16); color:#ffd591;
  box-shadow:0 0 22px rgba(245,165,36,.5); --glow:rgba(245,165,36,.6); animation:breathe 2s ease-in-out infinite; transform:scale(1.1);}
.cell.composite{border-color:rgba(168,85,247,.45); background:rgba(168,85,247,.12); color:#d8b4fe;}
.cell.prime{border-color:var(--accent-blue); background:rgba(6,182,212,.14); color:#7dd3fc; box-shadow:0 0 18px rgba(6,182,212,.3);}
.cell.reduced{opacity:.4; border-color:var(--border-main); background:rgba(255,255,255,.03); color:var(--text-dim);}

/* prime-power factor chips: p^e  ->  (e+1) */
.factors-label{font-family:var(--mono); font-size:11px; color:var(--text-dim); letter-spacing:.05em; align-self:flex-start; margin-left:8px;}
.factors{display:flex; flex-wrap:wrap; gap:14px; justify-content:center; align-items:flex-end; min-height:96px; max-width:780px;}
.fchip{display:flex; flex-direction:column; align-items:center; gap:7px;}
.fchip .pe{min-width:78px; height:58px; display:flex; align-items:center; justify-content:center; padding:0 12px;
  border-radius:13px; font-family:var(--mono); font-weight:800; font-size:20px;
  border:2px solid rgba(168,85,247,.4); background:rgba(168,85,247,.10); color:#d8b4fe;
  transition:background .35s, border-color .35s, color .35s, box-shadow .35s, transform .35s cubic-bezier(.34,1.3,.64,1); will-change:transform;}
.fchip .pe sup{font-size:13px;}
.fchip.active .pe{border-color:var(--accent-orange); background:rgba(245,165,36,.16); color:#ffd591; box-shadow:0 0 22px rgba(245,165,36,.5); transform:scale(1.06);}
.fchip.counted .pe{border-color:var(--accent-green); background:rgba(34,197,94,.12); color:#bbf7d0;}
.fchip .arrow{font-family:var(--mono); font-size:12px; color:var(--text-dim); line-height:1;}
.fchip .ep1{min-width:54px; height:42px; display:flex; align-items:center; justify-content:center; padding:0 10px;
  border-radius:11px; font-family:var(--mono); font-weight:800; font-size:18px;
  border:2px solid var(--border-main); background:rgba(255,255,255,.04); color:var(--text-dim);
  transition:background .35s, border-color .35s, color .35s, box-shadow .35s, transform .35s cubic-bezier(.34,1.3,.64,1); will-change:transform;}
.fchip.active .ep1{border-color:var(--accent-blue); background:rgba(6,182,212,.14); color:#7dd3fc; box-shadow:0 0 18px rgba(6,182,212,.3); transform:scale(1.08);}
.fchip.counted .ep1{border-color:var(--accent-green); background:rgba(34,197,94,.16); color:#bbf7d0; box-shadow:0 0 18px rgba(34,197,94,.35);}
.fchip.faint{opacity:.32;}

.product-row{font-family:var(--mono); font-size:20px; font-weight:800; color:#cfe9f5; display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center; min-height:30px;}
.product-row .lead{color:var(--text-dim); font-size:14px; font-weight:600;}
.product-row .term{color:#7dd3fc;} .product-row .eq{color:var(--text-dim);} .product-row .acc{color:#bbf7d0;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.i b{color:var(--accent-orange);} .pill.r b{color:var(--accent-purple);} .pill.n b{color:#fff;} .pill.d b{color:var(--accent-green);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes breathe{0%,100%{box-shadow:0 0 16px var(--glow), inset 0 0 10px rgba(255,255,255,.04);}50%{box-shadow:0 0 30px var(--glow), inset 0 0 14px rgba(255,255,255,.08);}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>n =</label>
  <input type="number" id="num-input" value="60" min="1" max="100000">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(60)">Ex 1 (60)</button>
  <button onclick="loadExample(72)">Ex 2 (72)</button>
  <button onclick="loadExample(12)">Ex 3 (12)</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Number of Divisors d(n) <span class="sub">&middot; via prime factorization</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div class="numhead">
        <div class="ncard"><span class="lbl">n</span><div class="nbox" id="nbox">60</div></div>
        <div class="rem" id="rem">factor n into primes</div>
        <div class="ncard"><span class="lbl">d(n)</span><div class="dbox" id="dbox">&middot;</div></div>
      </div>
      <div class="scan-label" id="scan-label">factorization scan &middot; trial divide remaining m</div>
      <div class="scan" id="scan"></div>
      <div class="factors-label">prime powers &middot; each contributes (exponent &plus; 1)</div>
      <div class="factors" id="factors"></div>
      <div class="product-row" id="product-row"></div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">↺ Reset</button>
    <button onclick="back()">← Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next →</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">← →</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">▾</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill n">n = <b id="pill-n">—</b></span>
        <span class="pill i">prime p = <b id="pill-i">—</b></span>
        <span class="pill r">exponent e = <b id="pill-r">—</b></span>
        <span class="pill d">d so far = <b id="pill-d">—</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>active prime</span>
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>(e+1) factor</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>counted</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.7+0.4*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['kw','function'],['fn',' countDivisors'],['src','(n) {']],
  [['kw','  let'],['src',' d = 1, m = n;']],
  [['kw','  for'],['src',' (p = 2; p*p <= m; p++) {']],
  [['kw','    if'],['src',' (m % p == 0) {']],
  [['kw','      let'],['src',' e = 0;']],
  [['kw','      while'],['src',' (m % p == 0) { m /= p; e++; }']],
  [['src','      d *= (e + 1);']],
  [['src','    }']],
  [['src','  }']],
  [['kw','  if'],['src',' (m > 1) d *= 2;']],
  [['kw','  return'],['src',' d;']],
  [['src','}']],
];

let N=60, steps=[], stepIndex=0, timer=null;
const delays=[1500,820,420];
// persistent DOM registries (rebuilt once per input load)
let scanCells={};   // m-value snapshot tiles keyed by stable id
let factChips={};   // prime-power chips keyed by prime
let factOrder=[];   // ordered list of primes for stable layout

function init(){ buildCode(); loadExample(60); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(n){ N=parseInt(n); document.getElementById('num-input').value=N; generateSteps(); buildStage(); reset(); }
function loadCustom(){ const v=parseInt(document.getElementById('num-input').value);
  if(!isNaN(v)&&v>=1&&v<=100000) loadExample(v); else alert('Enter an integer 1–100000.'); }

// ---- compute the true factorization (used to size the persistent stage skeleton) ----
function factorizeFull(n){
  const f=[]; let m=n;
  for(let p=2;p*p<=m;p++){ if(m%p===0){ let e=0; while(m%p===0){m/=p;e++;} f.push({p,e}); } }
  if(m>1) f.push({p:m,e:1});
  return f; // array of {p,e}; empty when n===1
}

// build the persistent stage skeleton ONCE per input (tiles + chips reused across steps)
function buildStage(){
  const scan=document.getElementById('scan'); scan.innerHTML=''; scanCells={};
  const factors=document.getElementById('factors'); factors.innerHTML=''; factChips={}; factOrder=[];

  // recompute the actual peel sequence so each snapshot tile gets a stable id == its position.
  // This MUST mirror the seq built in generateSteps() so mIdx lines up at render time.
  const seq=[N]; let m=N;
  for(let p=2;p*p<=m;p++){ if(m%p===0){ while(m%p===0){m/=p;} seq.push(m); } }
  if(m>1 && seq[seq.length-1]!==1){ seq.push(1); } // leftover prime reduces to 1
  seq.forEach((val,idx)=>{
    const c=document.createElement('div'); c.className='cell'; c.id='sc'+idx;
    c.innerHTML=`${val}<span class="ix">m</span>`; scan.appendChild(c); scanCells[idx]=c;
  });

  const facs=factorizeFull(N);
  facs.forEach(({p,e})=>{
    const chip=document.createElement('div'); chip.className='fchip'; chip.id='fc'+p;
    chip.innerHTML=`<div class="pe">${p}<sup>${e}</sup></div><div class="arrow">&#8595; e&plus;1</div><div class="ep1">${e+1}</div>`;
    factors.appendChild(chip); factChips[p]=chip; factOrder.push(p);
  });
  if(facs.length===0){ // n===1, no prime factors
    const ph=document.createElement('div'); ph.className='fchip'; ph.id='fc-none'; ph.style.opacity='.5';
    ph.innerHTML=`<div class="pe" style="border-color:var(--border-main);background:rgba(255,255,255,.04);color:var(--text-dim)">none</div>`;
    factors.appendChild(ph); factChips['none']=ph;
  }
}

// ---- genuinely simulate countDivisors(n), pushing an immutable snapshot per step ----
function generateSteps(){
  steps=[]; const n=N;
  function snap(o){ steps.push({
    p:o.p??'—', e:o.e??'—', m:o.m??n, mIdx:o.mIdx??0,
    activePrime:o.activePrime??null, countedPrimes:o.countedPrimes?[...o.countedPrimes]:[],
    d:o.d??'—', dFinal:o.dFinal??null,
    product:o.product??null, code:o.code, narr:o.narr, log:o.log, logColor:o.logColor, complete:o.complete
  }); }

  const seq=[n]; // m-snapshot positions, mirrors buildStage()
  const productTerms=[]; const counted=[];
  let d=1, m=n;

  snap({code:[0,1], m:n, mIdx:0, d:1,
    narr:`Count the positive divisors of <code>n = ${n}</code>. Write <code>n</code> as a product of prime powers <code>p&#8321;<sup>e&#8321;</sup> &middot; p&#8322;<sup>e&#8322;</sup> &hellip;</code> &mdash; then <b>d(n) = &prod; (e<sub>i</sub> &plus; 1)</b>.`,
    log:`countDivisors(${n}): start d=1, m=${n}`, logColor:'var(--text-dim)'});

  if(n===1){
    snap({code:[10], m:1, mIdx:0, d:1, dFinal:1, complete:true, product:`d(1) = 1`,
      narr:`<code>n = 1</code> has no prime factors, so the empty product gives <b>d(1) = 1</b> (only divisor is 1 itself).`,
      log:`n=1 -> d = 1`, logColor:'var(--accent-green)'});
    return;
  }

  for(let p=2;p*p<=m;p++){
    if(m%p===0){
      // peel out all factors of p
      let e=0; const before=m;
      while(m%p===0){ m/=p; e++; }
      seq.push(m);
      const mIdx=seq.length-1;
      // narrate the peel: p divides m, collect exponent
      snap({code:[3,4,5], p, e, m, mIdx, activePrime:p, countedPrimes:counted, d,
        narr:`<code>${p}</code> divides <code>${before}</code>. Peel out every factor of <code>${p}</code>: <code>${before} &rarr; ${m}</code>, exponent <code>e = ${e}</code>. So <code>${p}<sup>${e}</sup></code> is a prime power of <code>n</code>.`,
        log:`p=${p}: peel ${before} -> ${m}, exponent e=${e}`, logColor:'var(--accent-purple)'});
      // multiply (e+1) into d
      d*=(e+1); counted.push(p); productTerms.push(`(${e}+1)`);
      snap({code:[6], p, e, m, mIdx, activePrime:p, countedPrimes:counted, d,
        product:productLine(productTerms, d, false),
        narr:`Prime power <code>${p}<sup>${e}</sup></code> contributes <code>(e&plus;1) = (${e}&plus;1) = ${e+1}</code> choices for that prime's exponent. Multiply into the running product: <code>d = ${d}</code>.`,
        log:`  d *= (${e}+1)  ->  d = ${d}`, logColor:'var(--accent-green)'});
    }
  }
  // leftover m>1 is a prime larger than sqrt(original m)
  if(m>1){
    const e=1; const before=m;
    d*=2; counted.push(m); productTerms.push(`(1+1)`);
    if(seq[seq.length-1]!==1){ seq.push(1); }
    const mIdx=seq.length-1;
    snap({code:[9], p:before, e, m:1, mIdx, activePrime:before, countedPrimes:counted, d,
      product:productLine(productTerms, d, false),
      narr:`Leftover <code>m = ${before} &gt; 1</code> is itself a prime (exponent <code>1</code>). It contributes <code>(1&plus;1) = 2</code>. Multiply in: <code>d = ${d}</code>.`,
      log:`  leftover prime ${before}: d *= 2  ->  d = ${d}`, logColor:'var(--accent-green)'});
  }

  // final result
  const facStr=counted.map((p,k)=>{const e=expOf(productTerms[k]); return e===1?`${p}`:`${p}<sup>${e}</sup>`;}).join(' &middot; ');
  const epStr=productTerms.map(t=>`(${expOf(t)}&plus;1)`).join(' &times; ');   // e.g. (2+1) x (1+1) x (1+1)
  const valStr=productTerms.map(expPlus1).join(' &times; ');                    // e.g. 3 x 2 x 2
  snap({code:[10], m:1, mIdx:seq.length-1, countedPrimes:counted, d, dFinal:d, complete:true,
    product:productLine(productTerms, d, true),
    narr:`Done: <code>${n} = ${facStr}</code>, so <b>d(${n}) = ${epStr} = ${valStr} = ${d}</b>. <code>${n}</code> has <b>${d}</b> divisors.`,
    log:`return d = ${d}   (n=${n} has ${d} divisors)`, logColor:'var(--accent-green)'});
}

function expOf(term){ // "(e+1)" -> e
  const mm=term.match(/\((\d+)\+1\)/); return mm?parseInt(mm[1]):1;
}
function expPlus1(term){ return (expOf(term)+1).toString(); }
function productLine(terms, d, done){
  const t=terms.map(x=>'('+(expOf(x))+'&plus;1)').join(' &times; ');
  const v=terms.map(x=>expOf(x)+1).join(' &times; ');
  return {t, v, d, done};
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  document.getElementById('nbox').textContent=N;

  // --- factorization scan tiles (persistent, keyed by position) ---
  for(const k in scanCells){
    const c=scanCells[k]; const pos=parseInt(k);
    c.classList.remove('current','composite','prime','reduced');
    if(pos<step.mIdx){ c.classList.add('reduced'); }
    else if(pos===step.mIdx){
      const val=parseInt(c.textContent);
      if(step.complete || val===1){ c.classList.add('reduced'); }
      else if(step.activePrime!==null){ c.classList.add('current'); Motion.pop(c); }
      else c.classList.add('composite');
    } else {
      c.classList.add('composite');
    }
  }

  // --- prime-power chips (persistent, keyed by prime) ---
  for(const p in factChips){
    const chip=factChips[p]; if(p==='none') continue;
    chip.classList.remove('active','counted','faint');
    const pp=parseInt(p);
    if(step.countedPrimes.includes(pp)){ chip.classList.add('counted'); }
    else if(step.activePrime===pp){ chip.classList.add('active'); Motion.pop(chip.querySelector('.pe')); Motion.pop(chip.querySelector('.ep1')); }
    else { chip.classList.add('faint'); }
  }

  // --- header readout (rem) ---
  const rem=document.getElementById('rem');
  if(step.activePrime!==null && step.e!=='—'){
    rem.innerHTML=`<b>${step.activePrime}</b><sup>${step.e}</sup> &rarr; (e&plus;1)=<span class="z">${step.e+1}</span>`;
  } else if(step.complete){
    rem.innerHTML=`d(${N}) = <span class="z">${step.dFinal}</span>`;
  } else {
    rem.innerHTML='factor n into primes';
  }

  // --- d(n) box ---
  const dbox=document.getElementById('dbox'); dbox.classList.remove('done');
  if(step.dFinal!==null){ dbox.textContent=step.dFinal; dbox.classList.add('done'); Motion.pop(dbox); }
  else dbox.textContent='·';

  // --- product line ---
  const pr=document.getElementById('product-row');
  if(step.product){
    if(typeof step.product==='string'){ pr.innerHTML=`<span class="acc">${step.product}</span>`; }
    else {
      const {t,v,d,done}=step.product;
      pr.innerHTML=`<span class="lead">d(n) = &prod;(e&plus;1) =</span> <span class="term">${t}</span> <span class="eq">=</span> <span class="term">${v}</span> <span class="eq">=</span> <span class="acc">${d}</span>`;
    }
  } else { pr.innerHTML=''; }

  // --- narration ---
  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done', !!step.complete);

  // --- code highlight ---
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });

  // --- state pills ---
  document.getElementById('pill-n').textContent=N;
  document.getElementById('pill-i').textContent=step.activePrime!==null?step.activePrime:'—';
  document.getElementById('pill-r').textContent=step.e;
  document.getElementById('pill-d').textContent=step.d;

  // --- progress + badge ---
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  // --- log ---
  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const dline=document.createElement('div'); dline.textContent=steps[k].log;
    if(steps[k].logColor) dline.style.color=steps[k].logColor;
    if(steps[k].complete) dline.style.fontWeight='bold';
    log.appendChild(dline);} }
  log.scrollTop=log.scrollHeight;
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=init;
</script>
</body>
