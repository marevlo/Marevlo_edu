<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online GCD Queries &middot; Sparse Table - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* query span / answer            */
            --accent-blue:   #06b6d4;    /* dependency intervals / chrome  */
            --accent-green:  #22c55e;    /* final gcd / combine result     */
            --accent-red:    #f43f5e;    /* out of range                   */
            --accent-purple: #a855f7;    /* cell being computed            */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 150px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .grid-stage { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; padding: 22px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .grid-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .grid-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        .row-label { font-family: var(--mono); font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); align-self: flex-start; margin-left: 2px; }

        /* array row */
        .arr-row { display: flex; gap: 7px; }
        .arr-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .arr-cell {
            display: flex; align-items: center; justify-content: center;
            border-radius: 9px; font-family: var(--mono); font-weight: 800; font-size: 16px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            width: 48px; height: 46px; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .arr-idx { font-family: var(--mono); font-size: 10.5px; color: var(--text-dim); }
        .arr-cell.span  { border-color: var(--accent-orange); background: rgba(245,165,36,0.14); color: #ffd591; box-shadow: 0 0 12px rgba(245,165,36,0.3); }
        .arr-cell.partA { border-color: var(--accent-blue); background: rgba(6,182,212,0.16); color: #a5f3fc; box-shadow: 0 0 14px rgba(6,182,212,0.4); }
        .arr-cell.partB { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 14px rgba(168,85,247,0.4); }
        .arr-cell.overlap { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.55), rgba(33,194,117,0.45)); color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.45); }
        .arr-cell.dim { opacity: 0.4; }

        /* sparse table grid */
        .sparse-wrap { display: grid; gap: 5px; }
        .cell {
            display: flex; align-items: center; justify-content: center;
            border-radius: 9px; font-family: var(--mono); font-weight: 800; font-size: 15px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            width: 48px; height: 40px; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .cell.head { border: none; background: transparent; color: var(--text-dim); font-size: 13px; font-weight: 800; box-shadow: none; }
        .cell.corner { background: transparent; border: none; box-shadow: none; }
        .cell.empty { background: transparent; border: 2px dashed rgba(255,255,255,0.05); color: transparent; box-shadow: none; }
        .cell.blank { color: var(--text-dim); background: rgba(255,255,255,0.02); }
        .cell.filled { color: #e8eefb; }
        .cell.dep { border-color: var(--accent-blue); background: rgba(6,182,212,0.12); color: #a5f3fc; box-shadow: 0 0 12px rgba(6,182,212,0.3); }
        .cell.current { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 20px rgba(168,85,247,0.55), inset 0 0 12px rgba(168,85,247,0.12); transform: scale(1.07); z-index: 2; }
        .cell.partA { border-color: var(--accent-blue); background: rgba(6,182,212,0.18); color: #a5f3fc; box-shadow: 0 0 18px rgba(6,182,212,0.45); transform: scale(1.05); z-index: 2; }
        .cell.partB { border-color: var(--accent-purple); background: rgba(168,85,247,0.18); color: #e9d5ff; box-shadow: 0 0 18px rgba(168,85,247,0.45); transform: scale(1.05); z-index: 2; }
        .cell.answer { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.85), rgba(33,194,117,0.85)); color: #06251a; box-shadow: 0 0 18px rgba(34,197,94,0.5); }
        .cell.head.lit { color: var(--accent-purple); }
        .cell.head.litA { color: var(--accent-blue); }
        .cell.head.litB { color: var(--accent-purple); }

        .action-stage { position: relative; min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 8px; align-items: center; min-height: 44px; }
        .combine-piece { font-family: var(--mono); font-weight: 800; font-size: 18px; }
        .combine-piece.opA { color: #a5f3fc; }
        .combine-piece.opB { color: #e9d5ff; }
        .combine-piece.op  { color: var(--text-dim); font-size: 16px; }
        .combine-piece.eq  { color: var(--text-dim); font-size: 16px; }
        .ans-tile { min-width: 40px; height: 44px; padding: 0 8px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 20px; font-weight: 800; border: 2px solid var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0; box-shadow: 0 0 14px rgba(34,197,94,0.4); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); } .pill.b b { color: var(--accent-orange); } .pill.g b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Array =</label>
        <input type="text" id="arr-input" placeholder="[12,18,24,36]" value="[12, 18, 24, 36]">
        <label class="ui-label">Queries =</label>
        <input type="text" id="query-input" placeholder="[[0,2],[1,3]]" value="[[0,2],[1,3]]">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Ex 1: [12,18,24,36]</button>
        <button onclick="loadExample(1)">Ex 2: [7,14,21,28,35]</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Online GCD Queries <span class="sub">&middot; Sparse Table &middot; sp[j][i] = gcd of [i, i+2<sup>j</sup>&minus;1] &middot; query in O(1)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="grid-stage" id="grid-stage">
                    <div class="row-label">Array</div>
                    <div class="arr-row" id="arr-row"></div>
                    <div class="row-label">Sparse table &middot; row j holds gcd of every length-2<sup>j</sup> window</div>
                    <div class="sparse-wrap" id="sparse-grid"></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill c">cell sp[j][i] <b id="st-cell">&mdash;</b></span>
                            <span class="pill">range <b id="st-range">&mdash;</b></span>
                            <span class="pill g">gcd <b id="st-gcd">&mdash;</b></span>
                            <span class="pill b">answers <b id="st-ans">[]</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring pop, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.4 + 0.66 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // ───────── State ─────────
        let array = [12, 18, 24, 36];
        let queries = [[0, 2], [1, 3]];
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 720, 330];
        const arrEls = {};    // index -> array tile element
        const cellEls = {};   // 'j,i'  -> sparse cell element

        const examples = [
            { arr: [12, 18, 24, 36], queries: [[0, 2], [1, 3]] },
            { arr: [7, 14, 21, 28, 35], queries: [[0, 4], [2, 3]] }
        ];

        function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b !== 0) { const t = b; b = a % b; a = t; } return a; }
        function floorLog2(x) { let j = 0; while ((1 << (j + 1)) <= x) j++; return j; }

        // ───────── code panel ─────────
        const CODE = [
            [['kw','def '],['fn','build'],['src','(a):  # n = len(a)']],
            [['src','  K = floor(log2(n)) + 1']],
            [['src','  sp[0][i] = a[i]              # length 1']],
            [['kw','  for '],['src','j in 1..K-1:']],
            [['kw','    for '],['src','i where i+2^j <= n:']],
            [['src','      sp[j][i] = gcd(sp[j-1][i], sp[j-1][i+2^(j-1)])']],
            [['kw','def '],['fn','query'],['src','(l, r):']],
            [['src','  j = floor(log2(r - l + 1))']],
            [['kw','  return '],['src','gcd(sp[j][l], sp[j][r - 2^j + 1])']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── step generation (genuine simulation) ─────────
        // sparse table stored as sp[j][i] (number) or null when not yet computed / out of range.
        function deepCopy(sp) { return sp.map(row => row.slice()); }

        function generateSteps() {
            steps = [];
            const n = array.length;
            if (!n || !queries.length) return;
            const K = floorLog2(n) + 1;

            // sp[j][i]; null = empty cell
            const sp = Array.from({ length: K }, () => Array(n).fill(null));

            const snap = (extra) => Object.assign({
                sp: deepCopy(sp), n, K, results: results.slice(),
                arrSpan: null, arrParts: null,           // {l,r} highlight on array row
                current: null, deps: [], parts: null,    // sparse-grid highlights
                qIdx: -1, query: null, gcdVal: null, range: null,
                combine: null, answerCell: null
            }, extra);

            const results = [];

            steps.push(snap({
                code: [0, 1, 2], action: 'BUILD TABLE', actionColor: 'var(--accent-blue)',
                panel: `Answer GCD range queries on <code>[${array.join(', ')}]</code> with a <b>sparse table</b>: <code>sp[j][i]</code> = gcd of the window <code>[i, i+2<sup>${''}</sup>j&minus;1]</code> of length 2<sup>j</sup>. GCD is idempotent, so overlapping windows are safe.`,
                log: `init  array = [${array.join(', ')}]  n=${n}  K=${K}  queries=${JSON.stringify(queries)}`
            }));

            // row 0 = single elements
            for (let i = 0; i < n; i++) {
                sp[0][i] = array[i];
                steps.push(snap({
                    code: [2], current: [0, i],
                    arrParts: { a: { l: i, r: i } },
                    action: `sp[0][${i}] = ${array[i]}`, actionColor: 'var(--accent-purple)',
                    range: [i, i], gcdVal: array[i],
                    panel: `Base row <code>j=0</code>: each length-1 window is the element itself. <code>sp[0][${i}] = a[${i}] = ${array[i]}</code>.`,
                    log: `sp[0][${i}] = ${array[i]}   (window [${i},${i}])`
                }));
            }

            // rows j >= 1
            for (let j = 1; j < K; j++) {
                const len = 1 << j, half = 1 << (j - 1);
                for (let i = 0; i + len <= n; i++) {
                    const left = sp[j - 1][i], right = sp[j - 1][i + half];
                    const g = gcd(left, right);
                    steps.push(snap({
                        code: [3, 4, 5], current: [j, i], deps: [[j - 1, i], [j - 1, i + half]],
                        arrParts: { a: { l: i, r: i + half - 1 }, b: { l: i + half, r: i + len - 1 } },
                        action: `gcd(${left}, ${right}) = ${g}`, actionColor: 'var(--accent-purple)',
                        range: [i, i + len - 1], gcdVal: g,
                        panel: `<code>sp[${j}][${i}]</code> covers window <code>[${i}, ${i + len - 1}]</code> (length ${len}). Combine the two half-windows: <code>gcd(sp[${j - 1}][${i}]=${left}, sp[${j - 1}][${i + half}]=${right}) = ${g}</code>.`,
                        log: `sp[${j}][${i}] = gcd(${left}, ${right}) = ${g}   (window [${i},${i + len - 1}])`
                    }));
                    sp[j][i] = g;
                }
            }

            steps.push(snap({
                code: [6], action: 'TABLE READY', actionColor: 'var(--accent-blue)',
                panel: `Sparse table built in <b>O(n log n)</b>. Now every query <code>[l, r]</code> is answered in <b>O(1)</b> by covering it with two power-of-two windows.`,
                log: `build done. Answering ${queries.length} queries...`
            }));

            // answer queries
            queries.forEach((q, qIdx) => {
                const [l, r] = q;
                const len = r - l + 1;
                const j = floorLog2(len);
                const blk = 1 << j;
                const a2 = r - blk + 1;       // start of second covering window
                const g1 = sp[j][l], g2 = sp[j][a2];
                const ans = gcd(g1, g2);

                steps.push(snap({
                    code: [6, 7], qIdx, query: q,
                    arrSpan: { l, r },
                    range: [l, r], gcdVal: null,
                    action: `QUERY [${l}, ${r}]`, actionColor: 'var(--accent-orange)',
                    panel: `Query ${qIdx + 1}: gcd of <code>[${l}, ${r}]</code> (length ${len}). Largest power of two that fits is <code>2<sup>${j}</sup> = ${blk}</code>, so <code>j = ${j}</code>.`,
                    log: `\nquery[${qIdx + 1}] [${l},${r}] len=${len} -> j=floor(log2(${len}))=${j}`
                }));

                steps.push(snap({
                    code: [8], qIdx, query: q,
                    arrParts: { a: { l: l, r: l + blk - 1 }, b: { l: a2, r: a2 + blk - 1 } },
                    parts: { a: [j, l], b: [j, a2] },
                    range: [l, r], gcdVal: null,
                    action: `cover with sp[${j}][${l}] & sp[${j}][${a2}]`, actionColor: 'var(--accent-blue)',
                    panel: `Cover <code>[${l}, ${r}]</code> with two length-${blk} windows that <b>overlap</b>: <code>sp[${j}][${l}]</code> = <span style="color:#a5f3fc">[${l}, ${l + blk - 1}]</span> and <code>sp[${j}][${a2}]</code> = <span style="color:#e9d5ff">[${a2}, ${a2 + blk - 1}]</span>. Overlap is fine &mdash; gcd is idempotent.`,
                    log: `  windows: sp[${j}][${l}] covers [${l},${l + blk - 1}] = ${g1};  sp[${j}][${a2}] covers [${a2},${a2 + blk - 1}] = ${g2}`
                }));

                results.push(ans);

                steps.push(snap({
                    code: [8], qIdx, query: q, results: results.slice(),
                    arrParts: { a: { l: l, r: l + blk - 1 }, b: { l: a2, r: a2 + blk - 1 } },
                    parts: { a: [j, l], b: [j, a2] },
                    range: [l, r], gcdVal: ans,
                    combine: { g1, g2, ans, j, i1: l, i2: a2 },
                    action: `gcd(${g1}, ${g2}) = ${ans}`, actionColor: 'var(--accent-green)',
                    panel: `Combine the two windows: <code>gcd(${g1}, ${g2}) = <b>${ans}</b></code>. Query <code>[${l}, ${r}] &#8594; ${ans}</code>.`,
                    log: `  gcd(${g1}, ${g2}) = ${ans}\n  -> answer[${qIdx + 1}] = ${ans}`
                }));
            });

            steps.push(snap({
                complete: true, confetti: true, code: [8], results: results.slice(),
                action: `✓ [${results.join(', ')}]`, actionColor: 'var(--accent-green)',
                panel: `All ${queries.length} queries answered in O(1) each: <b>[${results.join(', ')}]</b>. The sparse table makes online GCD range queries instant after the one-time build.`,
                log: `\ndone  results = [${results.join(', ')}]`
            }));
        }

        // ───────── render (persistent DOM) ─────────
        function buildSkeleton() {
            // array row
            const arrRow = document.getElementById('arr-row'); arrRow.innerHTML = '';
            Object.keys(arrEls).forEach(k => delete arrEls[k]);
            array.forEach((v, i) => {
                const unit = document.createElement('div'); unit.className = 'arr-unit';
                const cell = document.createElement('div'); cell.className = 'arr-cell'; cell.textContent = v;
                const idx = document.createElement('div'); idx.className = 'arr-idx'; idx.textContent = '[' + i + ']';
                unit.append(cell, idx); arrRow.appendChild(unit);
                arrEls[i] = cell;
            });

            // sparse grid: K rows (j) x n columns (i), plus a header column for "j=.." label
            const grid = document.getElementById('sparse-grid'); grid.innerHTML = '';
            Object.keys(cellEls).forEach(k => delete cellEls[k]);
            const n = array.length, K = floorLog2(n) + 1;
            const cols = n + 1; // +1 for row label
            grid.style.gridTemplateColumns = `auto repeat(${n}, 48px)`;

            // top header: corner + column indices
            {
                const corner = document.createElement('div'); corner.className = 'cell corner'; grid.appendChild(corner);
                for (let i = 0; i < n; i++) {
                    const h = document.createElement('div'); h.className = 'cell head'; h.textContent = 'i=' + i;
                    h.dataset.col = i; grid.appendChild(h);
                }
            }
            for (let j = 0; j < K; j++) {
                const lbl = document.createElement('div'); lbl.className = 'cell head'; lbl.style.justifyContent = 'flex-end'; lbl.style.paddingRight = '6px';
                lbl.textContent = 'j=' + j + ' (' + (1 << j) + ')'; lbl.dataset.rowlabel = j; grid.appendChild(lbl);
                for (let i = 0; i < n; i++) {
                    const c = document.createElement('div'); c.className = 'cell empty';
                    c.dataset.j = j; c.dataset.i = i; grid.appendChild(c);
                    cellEls[j + ',' + i] = c;
                }
            }
        }

        function inSpan(i, span) { return span && i >= span.l && i <= span.r; }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const n = step.n, K = step.K;

            // ----- array row -----
            const span = step.arrSpan, parts = step.arrParts;
            for (let i = 0; i < n; i++) {
                const el = arrEls[i]; if (!el) continue;
                let cls = 'arr-cell';
                const inA = parts && parts.a && inSpan(i, parts.a);
                const inB = parts && parts.b && inSpan(i, parts.b);
                if (inA && inB) cls += ' overlap';
                else if (inA) cls += ' partA';
                else if (inB) cls += ' partB';
                else if (inSpan(i, span)) cls += ' span';
                else if (span || parts) cls += ' dim';
                el.className = cls;
            }

            // ----- sparse grid -----
            const curKey = step.current ? step.current[0] + ',' + step.current[1] : null;
            const depSet = new Set((step.deps || []).map(d => d[0] + ',' + d[1]));
            const pA = step.parts && step.parts.a ? step.parts.a[0] + ',' + step.parts.a[1] : null;
            const pB = step.parts && step.parts.b ? step.parts.b[0] + ',' + step.parts.b[1] : null;
            const ansKey = step.complete ? null : null;

            for (let j = 0; j < K; j++) {
                for (let i = 0; i < n; i++) {
                    const key = j + ',' + i; const el = cellEls[key]; if (!el) continue;
                    const v = step.sp[j][i];
                    let cls = 'cell', txt = '';
                    if (v === null || v === undefined) { cls += ' empty'; txt = ''; }
                    else { cls += ' filled'; txt = String(v); }
                    if (depSet.has(key)) cls += ' dep';
                    if (pA === key) cls += ' partA';
                    if (pB === key) cls += ' partB';
                    if (curKey === key) cls += ' current';
                    // answer cell: on the combine/complete steps, mark both covering cells green via partA/partB already.
                    const wasEmpty = el.textContent === '';
                    el.className = cls; el.textContent = txt;
                    if (wasEmpty && txt !== '') Motion.pop(el);
                }
            }
            // header lit
            document.querySelectorAll('#sparse-grid .head[data-col]').forEach(h => {
                h.classList.remove('lit', 'litA', 'litB');
                const ci = +h.dataset.col;
                if (step.current && step.current[1] === ci) h.classList.add('lit');
                if (step.parts) { if (step.parts.a && step.parts.a[1] === ci) h.classList.add('litA'); if (step.parts.b && step.parts.b[1] === ci) h.classList.add('litB'); }
            });
            document.querySelectorAll('#sparse-grid .head[data-rowlabel]').forEach(h => {
                h.classList.remove('lit');
                const rj = +h.dataset.rowlabel;
                if (step.current && step.current[0] === rj) h.classList.add('lit');
                if (step.parts && ((step.parts.a && step.parts.a[0] === rj) || (step.parts.b && step.parts.b[0] === rj))) h.classList.add('lit');
            });

            // ----- combine / answer strip -----
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.combine) {
                const c = step.combine;
                const mk = (cls, t) => { const s = document.createElement('span'); s.className = cls; s.textContent = t; return s; };
                at.append(
                    mk('combine-piece op', 'gcd('),
                    mk('combine-piece opA', c.g1),
                    mk('combine-piece op', ','),
                    mk('combine-piece opB', c.g2),
                    mk('combine-piece op', ') ='),
                );
                const tile = document.createElement('div'); tile.className = 'ans-tile'; tile.textContent = c.ans; at.appendChild(tile);
                if (!REDUCED) Motion.pop(tile);
            } else if (step.complete) {
                step.results.forEach(v => { const t = document.createElement('div'); t.className = 'ans-tile'; t.textContent = v; at.appendChild(t); });
            }

            // ----- narration / action -----
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // ----- state pills -----
            document.getElementById('st-cell').textContent = step.current ? `sp[${step.current[0]}][${step.current[1]}]` : '—';
            document.getElementById('st-range').textContent = step.range ? `[${step.range[0]}, ${step.range[1]}]` : '—';
            document.getElementById('st-gcd').textContent = step.gcdVal != null ? step.gcdVal : '—';
            document.getElementById('st-ans').textContent = `[${step.results.join(', ')}]`;

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function loadData(arr, qs) {
            pause();
            array = arr.slice(); queries = qs.map(q => q.slice());
            buildSkeleton(); generateSteps(); confettiArmed = true; renderStep(0);
        }
        function loadCustom() {
            try {
                const arr = JSON.parse(document.getElementById('arr-input').value);
                const qs = JSON.parse(document.getElementById('query-input').value);
                if (!Array.isArray(arr) || !arr.length || !arr.every(x => Number.isFinite(x))) throw 0;
                if (!Array.isArray(qs) || !qs.length || !qs.every(q => Array.isArray(q) && q.length === 2 && q[0] >= 0 && q[1] < arr.length && q[0] <= q[1])) throw 0;
                loadData(arr, qs);
            } catch (e) {
                alert('Invalid input. Use e.g. array [12,18,24,36] and queries [[0,2],[1,3]] with 0 <= l <= r < n.');
            }
        }
        function loadExample(n) {
            const ex = examples[n];
            document.getElementById('arr-input').value = JSON.stringify(ex.arr);
            document.getElementById('query-input').value = JSON.stringify(ex.queries);
            loadData(ex.arr, ex.queries);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        ['arr-input', 'query-input'].forEach(id => document.getElementById(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); }));
        let resizeRAF = null;
        window.addEventListener('resize', () => { cancelAnimationFrame(resizeRAF); resizeRAF = requestAnimationFrame(() => renderStep(stepIdx)); });

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
