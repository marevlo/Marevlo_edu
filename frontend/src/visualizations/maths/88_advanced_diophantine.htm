<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Diophantine - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* particular solution / answer   */
            --accent-blue:   #06b6d4;    /* euclid chrome / dependency      */
            --accent-green:  #22c55e;    /* gcd | c  -> solvable            */
            --accent-red:    #f43f5e;    /* gcd does not divide c           */
            --accent-purple: #a855f7;    /* current euclid row / quotient   */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 80px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.fail { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.fail::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .grid-stage { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; padding: 22px; display: flex; flex-direction: column; align-items: center; gap: 18px; }
        .grid-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .grid-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        /* equation header tiles */
        .eq-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .eq-tile {
            display: flex; align-items: center; justify-content: center; gap: 4px;
            border-radius: 10px; font-family: var(--mono); font-weight: 800; font-size: 17px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            padding: 8px 12px; min-height: 44px; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .eq-tile .lab { font-size: 11px; color: var(--text-dim); font-weight: 700; margin-left: 2px; }
        .eq-tile.a { border-color: var(--accent-blue); background: rgba(6,182,212,0.12); color: #a5f3fc; }
        .eq-tile.b { border-color: var(--accent-purple); background: rgba(168,85,247,0.14); color: #e9d5ff; }
        .eq-tile.c { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; }
        .eq-op { font-family: var(--mono); font-weight: 800; font-size: 18px; color: var(--text-dim); }

        /* euclid table */
        .euclid-grid { display: grid; gap: 5px; }
        .cell {
            display: flex; align-items: center; justify-content: center;
            border-radius: 9px; font-family: var(--mono); font-weight: 800; font-size: 15px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            min-width: 58px; height: 40px; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .cell.head { border: none; background: transparent; color: var(--text-dim); font-size: 12px; font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase; height: 28px; }
        .cell.idx { border: none; background: transparent; color: var(--text-dim); font-size: 13px; min-width: 30px; }
        .cell.hidden { opacity: 0; pointer-events: none; }
        .cell.r { color: #e8eefb; }
        .cell.q { border-color: var(--accent-purple); background: rgba(168,85,247,0.14); color: #e9d5ff; }
        .cell.s { border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.08); color: #a5f3fc; }
        .cell.t { border-color: rgba(168,85,247,0.35); background: rgba(168,85,247,0.07); color: #d8b4fe; }
        .cell.current { box-shadow: 0 0 20px rgba(168,85,247,0.55), inset 0 0 12px rgba(168,85,247,0.12); transform: scale(1.06); z-index: 2; border-color: var(--accent-purple); }
        .cell.gcd { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.85), rgba(33,194,117,0.85)); color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.45); }

        /* solution panels */
        .sol-wrap { display: flex; flex-direction: column; gap: 10px; align-items: center; min-height: 30px; width: 100%; }
        .sol-line { font-family: var(--mono); font-size: 15px; font-weight: 700; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; transition: opacity 0.3s; }
        .sol-line .tag { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; }
        .sol-chip { border-radius: 9px; padding: 5px 11px; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 12px rgba(245,165,36,0.30); }
        .sol-chip.gen { border-color: var(--accent-blue); background: rgba(6,182,212,0.12); color: #a5f3fc; box-shadow: none; }
        .sol-chip.muted { border-color: var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-dim); box-shadow: none; }

        /* parametric sample track */
        .param-track { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; min-height: 30px; }
        .param-pt { display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .param-pt .pair { font-family: var(--mono); font-weight: 800; font-size: 14px; border-radius: 9px; padding: 5px 9px; border: 2px solid var(--accent-green); background: rgba(34,197,94,0.12); color: #bbf7d0; }
        .param-pt .tt { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }

        .action-stage { position: relative; min-height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 8px; align-items: center; min-height: 40px; flex-wrap: wrap; justify-content: center; }
        .ans-tile { height: 40px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 16px; font-weight: 800; padding: 0 12px; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 12px rgba(245,165,36,0.35); }
        .ans-tile.fail { border-color: var(--accent-red); background: rgba(244,63,94,0.14); color: #fecdd3; box-shadow: 0 0 12px rgba(244,63,94,0.30); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); } .pill.b b { color: var(--accent-orange); } .pill.g b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">a =</label>
        <input type="text" id="a-input" value="2" maxlength="6">
        <label class="ui-label">b =</label>
        <input type="text" id="b-input" value="3" maxlength="6">
        <label class="ui-label">c =</label>
        <input type="text" id="c-input" value="7" maxlength="6">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Ex 1 (2x+3y=7)</button>
        <button onclick="loadExample(1)">Ex 2 (12x+8y=20)</button>
        <button onclick="loadExample(2)">Ex 3 (6x+9y=7)</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Advanced Diophantine <span class="sub">&middot; solve <code style="font-family:var(--mono)">ax + by = c</code> via extended Euclid &middot; solvable iff <code style="font-family:var(--mono)">gcd(a,b) | c</code></span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="grid-stage" id="grid-stage">
                    <div class="eq-row" id="eq-row"></div>
                    <div class="euclid-grid" id="euclid-grid"></div>
                    <div class="sol-wrap" id="sol-wrap">
                        <div class="sol-line" id="sol-particular"></div>
                        <div class="sol-line" id="sol-general"></div>
                        <div class="param-track" id="param-track"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill c">quotient q <b id="st-q">&mdash;</b></span>
                            <span class="pill g">gcd <b id="st-gcd">&mdash;</b></span>
                            <span class="pill b">particular (x&#8320;,y&#8320;) <b id="st-part">&mdash;</b></span>
                            <span class="pill">solvable <b id="st-ans">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring pop, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.4 + 0.66 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // ───────── State ─────────
        let A = 2, B = 3, C = 7;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 720, 330];
        const cellEls = {};   // 'r,c' -> element in euclid table
        const eqEls = {};     // id -> element in equation row

        const CODE = [
            [['kw','def '],['fn','solveDiophantine'],['src','(a, b, c):']],
            [['src','  r0,r1 = a,b;  s0,s1 = 1,0;  t0,t1 = 0,1']],
            [['kw','  while '],['src','r1 != 0:           # extended Euclid']],
            [['src','    q  = r0 // r1']],
            [['src','    r0,r1 = r1, r0 - q*r1']],
            [['src','    s0,s1 = s1, s0 - q*s1']],
            [['src','    t0,t1 = t1, t0 - q*t1']],
            [['kw','  g, '],['src','s, t = r0, s0, t0      # a*s + b*t = g']],
            [['kw','  if '],['src','c % g != 0: return "no solution"']],
            [['src','  x0,y0 = s*(c//g), t*(c//g)   # particular']],
            [['kw','  return '],['src','x0 + (b/g)*k,  y0 - (a/g)*k']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── step generation (genuine extended Euclid) ─────────
        function generateSteps() {
            steps = [];
            const a = A, b = B, c = C;

            // table rows hold the running (r, q, s, t). Row i is the state BEFORE the i-th division.
            // We push a row each iteration with the quotient used; the last (r1==0) gives g in r0.
            let r0 = a, r1 = b, s0 = 1, s1 = 0, t0 = 0, t1 = 1;
            const rows = [];                 // {r, s, t, q}  -- q is the quotient produced AT this row (last row q=null)

            const snap = (extra) => Object.assign({
                a, b, c,
                rows: rows.map(R => Object.assign({}, R)),
                current: null, gcdRow: null,
                particular: null, general: null, params: [],
                solvable: null, gcd: null
            }, extra);

            // intro
            steps.push(snap({
                code: [0, 1], action: 'SET UP', actionColor: 'var(--accent-blue)',
                panel: `Solve the linear Diophantine equation <code>${a}x + ${b}y = ${c}</code>. First run the <b>extended Euclidean algorithm</b> on <code>a=${a}</code> and <code>b=${b}</code> to get <code>gcd(a,b)</code> together with coefficients <code>s,t</code> where <code>a&middot;s + b&middot;t = gcd</code>.`,
                log: `init  ${a}x + ${b}y = ${c}   (a=${a}, b=${b}, c=${c})`
            }));

            // seed the first table row (r0, s0, t0)
            rows.push({ r: r0, s: s0, t: t0, q: null });
            rows.push({ r: r1, s: s1, t: t1, q: null });
            steps.push(snap({
                current: 1, code: [1], action: 'r0, r1 = a, b', actionColor: 'var(--accent-blue)',
                panel: `Seed the table. Top row is <code>(r=${a}, s=1, t=0)</code> and second row is <code>(r=${b}, s=0, t=1)</code>. Each later row is the previous two combined by the quotient.`,
                log: `seed  r0=${a} (s=1,t=0)   r1=${b} (s=0,t=1)`
            }));

            // extended Euclid loop
            while (r1 !== 0) {
                const q = Math.floor(r0 / r1);
                // record the quotient on the row that is being divided out (the current r1 row)
                rows[rows.length - 1].q = q;
                steps.push(snap({
                    current: rows.length - 1, code: [2, 3], action: `q = ${r0} / ${r1} = ${q}`, actionColor: 'var(--accent-purple)',
                    panel: `Divide: <code>${r0} = ${q} &times; ${r1} + ${r0 - q * r1}</code>, so the quotient is <code>q = ${q}</code>. Use it to combine the last two rows into the next one.`,
                    log: `div   ${r0} = ${q}*${r1} + ${r0 - q * r1}   (q=${q})`
                }));

                const nr = r0 - q * r1;
                const ns = s0 - q * s1;
                const nt = t0 - q * t1;
                r0 = r1; r1 = nr; s0 = s1; s1 = ns; t0 = t1; t1 = nt;

                if (r1 !== 0) {
                    rows.push({ r: r1, s: s1, t: t1, q: null });
                    steps.push(snap({
                        current: rows.length - 1, code: [4, 5, 6], action: `new row r=${r1}`, actionColor: 'var(--accent-blue)',
                        panel: `New row: <code>r=${r1}</code>, <code>s=${s1}</code>, <code>t=${t1}</code> &mdash; computed as <code>(prev2) &minus; q&middot;(prev1)</code> for r, s and t alike. Remainder is non-zero, so continue.`,
                        log: `row   r=${r1}  s=${s1}  t=${t1}`
                    }));
                }
            }

            // r0 now holds gcd, with coefficients s0, t0
            const g = r0, s = s0, t = t0;
            const gcdRowIdx = rows.length - 1;
            steps.push(snap({
                current: gcdRowIdx, gcdRow: gcdRowIdx, gcd: g,
                code: [2, 7], action: `gcd = ${g}`, actionColor: 'var(--accent-green)',
                panel: `Remainder hit <code>0</code>, so the algorithm stops. The last non-zero remainder is <code>gcd(${a},${b}) = ${g}</code>, with B&eacute;zout coefficients <code>s=${s}</code>, <code>t=${t}</code>: check <code>${a}&middot;(${s}) + ${b}&middot;(${t}) = ${a * s + b * t}</code>.`,
                log: `gcd   g=${g}   bezout s=${s} t=${t}   (${a}*${s}+${b}*${t}=${a * s + b * t})`
            }));

            // solvability test
            const solvable = (c % g === 0);
            steps.push(snap({
                gcdRow: gcdRowIdx, gcd: g, solvable,
                code: [8], action: solvable ? `${g} | ${c}  ✓` : `${g} ∤ ${c}  ✗`,
                actionColor: solvable ? 'var(--accent-green)' : 'var(--accent-red)',
                panel: solvable
                    ? `Solvability test: does <code>gcd = ${g}</code> divide <code>c = ${c}</code>? <code>${c} mod ${g} = ${c % g}</code> &#8594; <b>yes</b>. A solution exists.`
                    : `Solvability test: does <code>gcd = ${g}</code> divide <code>c = ${c}</code>? <code>${c} mod ${g} = ${c % g} &#8800; 0</code> &#8594; <b>no</b>. The equation has <b>no integer solutions</b>.`,
                log: solvable ? `test  ${c} mod ${g} = 0  -> solvable` : `test  ${c} mod ${g} = ${c % g} != 0  -> NO solution`
            }));

            if (!solvable) {
                steps.push(snap({
                    gcdRow: gcdRowIdx, gcd: g, solvable: false, complete: true, fail: true,
                    code: [8], action: 'NO SOLUTION', actionColor: 'var(--accent-red)',
                    panel: `Done. Since <code>${g} &#8224; ${c}</code>, the line <code>${a}x + ${b}y = ${c}</code> passes through <b>no lattice point</b> &#8594; <b>no integer solution</b>.`,
                    log: `done  no integer solution (gcd ${g} does not divide ${c})`,
                    answer: null
                }));
                return;
            }

            // particular solution
            const k = c / g;
            const x0 = s * k, y0 = t * k;
            steps.push(snap({
                gcdRow: gcdRowIdx, gcd: g, solvable: true,
                particular: { x0, y0 }, code: [9], action: `(x0,y0) = (${x0},${y0})`, actionColor: 'var(--accent-orange)',
                panel: `Scale the B&eacute;zout identity by <code>c/gcd = ${c}/${g} = ${k}</code>. A <b>particular solution</b> is <code>x&#8320; = ${s}&middot;${k} = ${x0}</code>, <code>y&#8320; = ${t}&middot;${k} = ${y0}</code>. Check: <code>${a}&middot;${x0} + ${b}&middot;${y0} = ${a * x0 + b * y0}</code>.`,
                log: `part  x0=${s}*${k}=${x0}  y0=${t}*${k}=${y0}  (check ${a}*${x0}+${b}*${y0}=${a * x0 + b * y0})`
            }));

            // general / parametric solution
            const dx = b / g, dy = a / g;     // x = x0 + (b/g)k ,  y = y0 - (a/g)k
            const params = [];
            for (let kk = -1; kk <= 2; kk++) params.push({ k: kk, x: x0 + dx * kk, y: y0 - dy * kk });
            steps.push(snap({
                gcdRow: gcdRowIdx, gcd: g, solvable: true,
                particular: { x0, y0 },
                general: { x0, y0, dx, dy }, params,
                code: [10], action: 'GENERAL SOLUTION', actionColor: 'var(--accent-blue)',
                panel: `All solutions: <code>x = ${x0} + ${dx}t</code>, <code>y = ${y0} &minus; ${dy}t</code> for every integer <code>t</code> &mdash; adding <code>b/gcd=${dx}</code> to x and subtracting <code>a/gcd=${dy}</code> from y keeps <code>ax+by</code> fixed. Sample points shown below.`,
                log: `gen   x = ${x0} + ${dx}t ,  y = ${y0} - ${dy}t`
            }));

            // final
            steps.push(snap({
                gcdRow: gcdRowIdx, gcd: g, solvable: true, complete: true, confetti: true,
                particular: { x0, y0 }, general: { x0, y0, dx, dy }, params,
                code: [10], action: `✓ x=${x0}+${dx}t, y=${y0}−${dy}t`, actionColor: 'var(--accent-green)',
                panel: `Done. <code>${a}x + ${b}y = ${c}</code> is solvable (<code>gcd ${g} | ${c}</code>); particular solution <code>(${x0}, ${y0})</code>, general solution <code>x = ${x0} + ${dx}t</code>, <code>y = ${y0} &minus; ${dy}t</code>.`,
                log: `done  general: x=${x0}+${dx}t, y=${y0}-${dy}t`,
                answer: { x0, y0, dx, dy }
            }));
        }

        // ───────── render (persistent DOM) ─────────
        const HEADERS = ['', 'r', 'q', 's', 't'];
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // ---- equation header tiles (rebuilt once per load implicitly via reuse-by-id) ----
            const eqRow = document.getElementById('eq-row');
            const eqSpec = [
                { id: 'ax', cls: 'a', val: step.a, lab: 'x' },
                { id: 'op1', op: '+' },
                { id: 'by', cls: 'b', val: step.b, lab: 'y' },
                { id: 'op2', op: '=' },
                { id: 'c', cls: 'c', val: step.c, lab: '' },
            ];
            const eqUsed = new Set();
            eqSpec.forEach(spec => {
                eqUsed.add(spec.id);
                let el = eqEls[spec.id];
                if (spec.op) {
                    if (!el) { el = document.createElement('div'); el.className = 'eq-op'; eqEls[spec.id] = el; }
                    el.textContent = spec.op;
                } else {
                    if (!el) { el = document.createElement('div'); eqEls[spec.id] = el; }
                    el.className = 'eq-tile ' + spec.cls;
                    el.innerHTML = `${spec.val}${spec.lab ? `<span class="lab">${spec.lab}</span>` : ''}`;
                }
                eqRow.appendChild(el);
            });
            Object.keys(eqEls).forEach(k => { if (!eqUsed.has(k)) { eqEls[k].remove(); delete eqEls[k]; } });

            // ---- euclid table (persistent cells keyed by row,col) ----
            const grid = document.getElementById('euclid-grid');
            const nRows = step.rows.length + 1;           // +1 header row
            const nCols = HEADERS.length;                 // idx, r, q, s, t
            grid.style.gridTemplateColumns = `36px repeat(${nCols - 1}, minmax(58px, auto))`;
            const used = new Set();

            for (let gr = 0; gr < nRows; gr++) {
                for (let gc = 0; gc < nCols; gc++) {
                    const key = gr + ',' + gc; used.add(key);
                    let el = cellEls[key];
                    if (!el) { el = document.createElement('div'); el.className = 'cell'; cellEls[key] = el; }
                    let cls = 'cell', txt = '', isData = false, isNew = false;

                    if (gr === 0) {                       // header row
                        cls += ' head';
                        txt = HEADERS[gc] === '' ? '' : HEADERS[gc];
                    } else {
                        const ri = gr - 1; const R = step.rows[ri];
                        if (gc === 0) { cls += ' idx'; txt = String(ri); }
                        else if (gc === 1) { cls += ' r'; txt = String(R.r); isData = true; }
                        else if (gc === 2) { cls += ' q'; if (R.q == null) { cls += ' hidden'; txt = ''; } else { txt = String(R.q); isData = true; } }
                        else if (gc === 3) { cls += ' s'; txt = String(R.s); isData = true; }
                        else if (gc === 4) { cls += ' t'; txt = String(R.t); isData = true; }

                        if (step.gcdRow === ri && gc === 1) cls += ' gcd';
                        if (step.current === ri && (gc === 1 || gc === 2)) cls += ' current';
                    }

                    const prev = el.textContent;
                    if (isData && prev === '' && txt !== '') isNew = true;
                    el.className = cls; el.textContent = txt;
                    if (isNew) Motion.pop(el);
                    grid.appendChild(el);
                }
            }
            Object.keys(cellEls).forEach(k => { if (!used.has(k)) { cellEls[k].remove(); delete cellEls[k]; } });

            // ---- particular / general / parametric panels ----
            const sp = document.getElementById('sol-particular');
            if (step.particular) {
                sp.innerHTML = `<span class="tag">particular</span>` +
                    `<span class="sol-chip">x&#8320; = ${step.particular.x0}</span>` +
                    `<span class="sol-chip">y&#8320; = ${step.particular.y0}</span>`;
            } else sp.innerHTML = '';

            const sg = document.getElementById('sol-general');
            if (step.general) {
                const G = step.general;
                sg.innerHTML = `<span class="tag">general</span>` +
                    `<span class="sol-chip gen">x = ${G.x0} + ${G.dx}t</span>` +
                    `<span class="sol-chip gen">y = ${G.y0} &minus; ${G.dy}t</span>`;
            } else sg.innerHTML = '';

            const pt = document.getElementById('param-track'); pt.innerHTML = '';
            (step.params || []).forEach(p => {
                const w = document.createElement('div'); w.className = 'param-pt';
                const pair = document.createElement('div'); pair.className = 'pair'; pair.textContent = `(${p.x}, ${p.y})`;
                const tt = document.createElement('div'); tt.className = 'tt'; tt.textContent = `t=${p.k}`;
                w.append(pair, tt); pt.appendChild(w);
            });

            // ---- answer track ----
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.complete) {
                if (step.fail) {
                    const t = document.createElement('div'); t.className = 'ans-tile fail'; t.textContent = 'no integer solution';
                    at.appendChild(t);
                } else if (step.answer) {
                    const a1 = document.createElement('div'); a1.className = 'ans-tile'; a1.textContent = `x = ${step.answer.x0} + ${step.answer.dx}t`;
                    const a2 = document.createElement('div'); a2.className = 'ans-tile'; a2.textContent = `y = ${step.answer.y0} - ${step.answer.dy}t`;
                    at.append(a1, a2);
                }
            }

            // ---- narration / action word ----
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!(step.complete && !step.fail));
            mp.classList.toggle('fail', !!step.fail);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // ---- state pills ----
            const curRow = step.current != null ? step.rows[step.current] : null;
            document.getElementById('st-q').textContent = curRow && curRow.q != null ? curRow.q : '—';
            document.getElementById('st-gcd').textContent = step.gcd != null ? step.gcd : '—';
            document.getElementById('st-part').textContent = step.particular ? `(${step.particular.x0}, ${step.particular.y0})` : '—';
            document.getElementById('st-ans').textContent = step.solvable == null ? '—' : (step.solvable ? 'yes' : 'no');

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(cellEls).forEach(k => { cellEls[k].remove(); delete cellEls[k]; });
            Object.keys(eqEls).forEach(k => { eqEls[k].remove(); delete eqEls[k]; });
            confettiArmed = true;
        }
        function loadTriple(a, b, c) {
            pause();
            A = a; B = b; C = c;
            clearDom(); generateSteps(); renderStep(0);
        }
        function parseInt0(id) { const v = parseInt((document.getElementById(id).value || '').trim(), 10); return Number.isFinite(v) ? v : NaN; }
        function loadCustom() {
            const a = parseInt0('a-input'), b = parseInt0('b-input'), c = parseInt0('c-input');
            if (!Number.isFinite(a) || !Number.isFinite(b) || !Number.isFinite(c)) { return; }
            if (a === 0 && b === 0) { return; }            // degenerate: 0x+0y=c
            loadTriple(a, b, c);
        }
        const EXAMPLES = [[2, 3, 7], [12, 8, 20], [6, 9, 7]];
        function loadExample(n) {
            const ex = EXAMPLES[n];
            document.getElementById('a-input').value = ex[0];
            document.getElementById('b-input').value = ex[1];
            document.getElementById('c-input').value = ex[2];
            loadTriple(ex[0], ex[1], ex[2]);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        ['a-input', 'b-input', 'c-input'].forEach(id => document.getElementById(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); }));
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
