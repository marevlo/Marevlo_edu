<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Inversions in Array - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
        }

        button:hover { background: var(--btn-hover); }

        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
        }

        .tile.idle { color: var(--text-dim); }
        .tile.candidate { 
            background: #2a1600; 
            border: 2px solid var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.12); 
        }
        .tile.inversion { 
            background: #0f2a1a; 
            border: 2px solid var(--accent-green); 
            color: var(--accent-green); 
            transform: scale(1.15); 
            box-shadow: 0 0 12px var(--accent-green);
        }
        .tile.past { opacity: 0.4; }

        .pointer-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            width: 520px;
            text-align: center;
            font-family: monospace;
        }

        .pointer-values {
            display: flex;
            justify-content: center;
            gap: 32px;
            font-size: 18px;
            font-weight: 700;
        }

        .action-text {
            margin-top: 12px;
            font-size: 14px;
            min-height: 24px;
            color: var(--accent-orange);
        }

        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #res-val { font-family: monospace; transition: all 0.2s; }
        .pop { animation: popAnim 400ms ease; font-size: 26px !important; color: var(--accent-green) !important; }

        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.28); }
            100% { transform: scale(1); }
        }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }

        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 620px;
            max-width: 90%;
            height: 130px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-line { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">nums =</label>
        <input type="text" id="nums-input" placeholder="3,1,2" style="width: 240px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([3,1,2])">Example 1</button>
        <button onclick="loadExample([5,4,3,2,1])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">nums =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="pointer-panel">
        <div class="pointer-values">
            <span>i = <span id="v-i" style="color:var(--accent-orange)">0</span></span>
            <span>j = <span id="v-j" style="color:var(--accent-blue)">1</span></span>
            <span>count = <span id="v-count" style="color:var(--accent-green)">0</span></span>
        </div>
        <div id="action-text" class="action-text">—</div>
    </div>

    <div class="info-panel">
        <div class="info-cell"><div class="info-label">current pair</div><div class="info-value" id="val-pair" style="color:var(--accent-orange)">3 > 1</div></div>
        <div class="info-cell"><div class="info-label">inversion?</div><div class="info-value" id="val-inv" style="color:var(--accent-green)">Yes</div></div>
    </div>

    <div class="result-display">
        <div class="info-label" style="font-size:12px;margin-bottom:4px;">total inversions =</div>
        <div id="res-val" style="font-size:16px;color:var(--text-dim)">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width:80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--accent-orange);"></div> Current pair</div>
        <div class="legend-item"><div class="dot" style="background:var(--accent-green);"></div> Inversion pair</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentNums = [3,1,2];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample([3,1,2]);
        }

        function loadExample(nums) {
            currentNums = nums.slice();
            document.getElementById('nums-input').value = currentNums.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('nums-input').value;
            const nums = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (nums.length > 0) {
                currentNums = nums;
                generateSteps();
                reset();
            }
        }

        function generateSteps() {
            steps = [];
            const nums = currentNums.slice();
            const n = nums.length;
            let count = 0;

            // Initial
            steps.push({
                type: 'init',
                i: 0,
                j: 0,
                count: 0,
                tileStates: Array(n).fill('idle'),
                status: `Start counting inversions (i < j and arr[i] > arr[j])`,
                log: `Initialize count = 0`,
                logColor: '#58a6ff',
                action: 'Initialize'
            });

            for (let i = 0; i < n - 1; i++) {
                for (let j = i + 1; j < n; j++) {
                    let tileStates = Array(n).fill('past');
                    tileStates[i] = 'candidate';
                    tileStates[j] = 'candidate';

                    let isInversion = nums[i] > nums[j];
                    if (isInversion) {
                        count++;
                        tileStates[i] = 'inversion';
                        tileStates[j] = 'inversion';
                    }

                    steps.push({
                        type: 'check_pair',
                        i: i,
                        j: j,
                        count: count,
                        tileStates: tileStates,
                        status: `Pair (i=${i}, j=${j}): ${nums[i]} > ${nums[j]} ? ${isInversion ? 'Yes' : 'No'}`,
                        log: `i=${i}, j=${j}: ${nums[i]} > ${nums[j]} → ${isInversion ? 'Inversion' : 'No'}, count=${count}`,
                        logColor: isInversion ? '#3fb950' : '#c9d1d9',
                        action: isInversion ? 'Inversion +1' : 'No inversion'
                    });
                }
            }

            // Final
            steps.push({
                type: 'final',
                i: n-1,
                j: n-1,
                count: count,
                tileStates: Array(n).fill('inversion'),
                status: `All pairs checked. Total inversions = ${count}`,
                log: `Final total inversions: ${count}`,
                logColor: '#3fb950',
                bold: true,
                action: '—',
                result: count
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            currentNums.forEach((val, pos) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[pos]}`;
                tile.innerText = val;
                const indexEl = document.createElement('div');
                indexEl.className = 'tile-index';
                indexEl.innerText = `[${pos}]`;
                wrapper.appendChild(tile);
                wrapper.appendChild(indexEl);
                container.appendChild(wrapper);
            });

            document.getElementById('v-i').innerText = step.i;
            document.getElementById('v-j').innerText = step.j;
            document.getElementById('v-count').innerText = step.count;

            document.getElementById('action-text').innerText = step.action || '—';
            document.getElementById('status-text').innerText = step.status;

            document.getElementById('val-pair').innerText = step.i < currentNums.length && step.j < currentNums.length ? `${currentNums[step.i]} > ${currentNums[step.j]}` : '—';
            document.getElementById('val-inv').innerText = '—';

            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    line.style.color = steps[k].logColor || '#c9d1d9';
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = () => { if (isPlaying) { pause(); play(); } };

        window.onload = init;
    </script>
</body>
</html>
