<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subarray Sum Equals K - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* answer / matched complement       */
            --accent-blue:   #06b6d4;   /* running prefix / chrome            */
            --accent-green:  #22c55e;   /* committed / done                   */
            --accent-red:    #f43f5e;   /* no match                           */
            --accent-purple: #a855f7;   /* current element being scanned      */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .arr-input { width: 200px; }
        .k-input { width: 70px; }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.bad { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .stage-grid { display: grid; grid-template-columns: 1fr 230px; gap: 16px; padding: 24px 22px; align-items: start; }
        @media (max-width: 760px) { .stage-grid { grid-template-columns: 1fr; } }

        .array-stage { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; display: flex; flex-direction: column; gap: 18px; }
        .array-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .array-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        .ps-board { position: relative; display: inline-flex; flex-direction: column; gap: 0; min-width: 0; }
        .row-label { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
        .cell-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .col { display: flex; flex-direction: column; align-items: center; }

        .cell {
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-family: var(--mono); font-weight: 800; font-size: 17px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            min-width: 50px; height: 50px; padding: 0 6px; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .idx-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 5px; transition: color 0.3s; }
        .idx-label.lit { color: var(--accent-purple); }

        /* arr (input) cells */
        .arr-cell.current  { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 20px rgba(168,85,247,0.55), inset 0 0 12px rgba(168,85,247,0.12); transform: scale(1.06); z-index: 2; }
        .arr-cell.window   { border-color: var(--accent-orange); background: rgba(245,165,36,0.18); color: #ffd591; box-shadow: 0 0 12px rgba(245,165,36,0.35); }
        .arr-cell.done     { border-color: rgba(34,197,94,0.35); color: #bbf7d0; background: rgba(34,197,94,0.07); }
        .arr-cell.dim      { opacity: 0.4; }

        /* prefix value tile (single big tile) */
        .prefix-tile {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            min-width: 70px; height: 54px; padding: 0 16px; border-radius: 12px; font-family: var(--mono); font-weight: 800; font-size: 22px;
            border: 2px solid var(--accent-blue); background: rgba(6,182,212,0.14); color: #a5f3fc; box-shadow: 0 0 16px rgba(6,182,212,0.3);
            transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s, transform 0.3s;
        }
        .prefix-tile.need { border-color: var(--accent-orange); }
        .formula { font-family: var(--mono); font-size: 13px; color: var(--text-dim); }
        .formula b { color: var(--text-main); }
        .formula .hit { color: var(--accent-green); }

        /* SEEN map side panel */
        .seen-panel { background: rgba(255,255,255,0.03); border: 1px solid var(--border-main); border-radius: 14px; padding: 12px 14px; min-height: 120px; }
        .seen-title { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; display: flex; align-items: center; gap: 7px; }
        .seen-title .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .seen-rows { display: flex; flex-direction: column; gap: 6px; }
        .seen-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-family: var(--mono); font-size: 13px; padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border-main); background: rgba(255,255,255,0.03); color: var(--text-dim); transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s; }
        .seen-row .key { color: var(--text-main); font-weight: 800; }
        .seen-row .cnt { color: var(--text-dim); }
        .seen-row.lookup { border-color: var(--accent-orange); background: rgba(245,165,36,0.14); color: #ffd591; box-shadow: 0 0 12px rgba(245,165,36,0.3); }
        .seen-row.lookup .key { color: #ffd591; }
        .seen-row.lookup .cnt { color: #ffd591; }
        .seen-row.fresh { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 14px rgba(168,85,247,0.4); }
        .seen-row.fresh .key, .seen-row.fresh .cnt { color: #e9d5ff; }
        .seen-empty { font-family: var(--mono); font-size: 12px; color: var(--text-dim); opacity: 0.6; }

        .action-stage { position: relative; min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 8px; align-items: center; min-height: 44px; flex-wrap: wrap; justify-content: center; }
        .ans-tile { min-width: 56px; height: 48px; padding: 0 14px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 22px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 12px rgba(245,165,36,0.35); }
        .ans-tile .ans-label { font-size: 12px; color: var(--text-dim); margin-right: 8px; font-weight: 600; }
        .ans-tile.fresh { border-color: var(--accent-purple); background: rgba(168,85,247,0.18); color: #e9d5ff; box-shadow: 0 0 16px rgba(168,85,247,0.5); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); } .pill.s b { color: var(--accent-blue); } .pill.r b { color: var(--accent-orange); } .pill.d b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">arr =</label>
        <input type="text" id="arr-input" class="arr-input" value="[1,1,1]" maxlength="48">
        <label class="ui-label">k =</label>
        <input type="text" id="k-input" class="k-input" value="2" maxlength="8">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Ex 1 &rarr; 2</button>
        <button onclick="loadExample(1)">Ex 2 &rarr; 2</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Subarray Sum Equals K <span class="sub">&middot; prefix sum + hashmap &middot; count subarrays where sum = k &middot; O(n) one pass</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="stage-grid">
                    <div class="array-stage" id="array-stage">
                        <div class="ps-board">
                            <div class="row-label">a[i] &middot; input array</div>
                            <div class="cell-row" id="arr-row"></div>
                        </div>
                        <div class="ps-board">
                            <div class="row-label">prefix &middot; running sum &middot; need = prefix &minus; k</div>
                            <div class="cell-row" style="align-items:center; gap:16px">
                                <div class="prefix-tile" id="prefix-tile">0</div>
                                <div class="formula" id="prefix-formula">prefix starts at <b>0</b></div>
                            </div>
                        </div>
                    </div>
                    <div class="seen-panel">
                        <div class="seen-title"><span class="pip"></span> seen map &middot; prefix &rarr; count</div>
                        <div class="seen-rows" id="seen-rows"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill c">i <b id="st-i">&mdash;</b></span>
                            <span class="pill s">prefix <b id="st-prefix">&mdash;</b></span>
                            <span class="pill r">need (prefix &minus; k) <b id="st-need">&mdash;</b></span>
                            <span class="pill d">count <b id="st-count">0</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // Motion engine (spring pop, zero deps)
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.4 + 0.66 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // State
        let arr = [1, 1, 1];
        let k = 2;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 720, 330];
        const arrEls = [];     // index -> arr cell element
        const arrIdxEls = [];  // index -> arr index label element

        const EXAMPLES = [
            { arr: [1, 1, 1], k: 2 },   // answer 2: [0,1] and [1,2]
            { arr: [1, 2, 3], k: 3 },   // answer 2: [2] (the 3) and [0,1] (1+2)
        ];

        const CODE = [
            [['kw','def '],['fn','subarray_sum'],['src','(a, k):']],
            [['src','  count = 0; prefix = 0']],
            [['src','  seen = {0: 1}']],
            [['kw','  for '],['src','i in 0..n-1:']],
            [['src','    prefix += a[i]']],
            [['kw','    if '],['src','(prefix - k) in seen:']],
            [['src','      count += seen[prefix - k]']],
            [['src','    seen[prefix] += 1']],
            [['kw','  return '],['src','count']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // serialize a Map<number,number> into ordered [ [key,count], ... ] by insertion order
        function seenSnapshot(map) {
            const out = [];
            map.forEach((cnt, key) => out.push([key, cnt]));
            return out;
        }

        // Step generation (immutable snapshots) -- REAL LeetCode 560 prefix-sum + hashmap
        function generateSteps() {
            steps = [];
            const n = arr.length;
            let prefix = 0;
            let count = 0;
            const seen = new Map();
            seen.set(0, 1);

            const baseArrStates = (upto) => arr.map((_, idx) => idx < upto ? 'done' : 'idle');

            if (n === 0) {
                steps.push({
                    i: '—', prefix: 0, need: '—', count: 0,
                    arrStates: [], prefixVal: '0', prefixNeed: false,
                    formula: 'empty array &#8594; no subarrays',
                    seen: seenSnapshot(seen), seenLookup: null, seenFresh: null,
                    code: [], complete: true, confetti: false, count_fresh: false,
                    action: 'EMPTY', actionColor: 'var(--text-dim)',
                    panel: `The array is empty &#8594; <b>count = 0</b>.`,
                    log: `init  arr = []  k = ${k}  ->  count = 0`
                });
                return;
            }

            // INIT
            steps.push({
                i: '—', prefix: 0, need: '—', count: 0,
                arrStates: arr.map(() => 'idle'), prefixVal: '0', prefixNeed: false,
                formula: 'prefix = <b>0</b>, count = <b>0</b>',
                seen: seenSnapshot(seen), seenLookup: null, seenFresh: 0,
                code: [1, 2], complete: false, confetti: false, count_fresh: false,
                action: 'SEED seen[0] = 1', actionColor: 'var(--accent-blue)',
                panel: `<b>Seed the map with</b> <code>seen[0] = 1</code>. An empty prefix has sum 0, so a subarray that starts at index 0 can be counted with one uniform rule. We scan left&#8594;right keeping a running <code>prefix</code> and at each i add how many earlier prefixes equal <code>prefix &minus; k</code>.`,
                log: `init  a = [${arr.join(',')}]  k = ${k}  (n=${n});  seen = {0:1}, prefix=0, count=0`
            });

            for (let i = 0; i < n; i++) {
                prefix += arr[i];
                const need = prefix - k;
                const hit = seen.has(need) ? seen.get(need) : 0;

                // STEP A: extend prefix and look up the complement
                steps.push({
                    i: i, prefix: prefix, need: need, count: count,
                    arrStates: arr.map((_, idx) => idx === i ? 'current' : (idx < i ? 'done' : 'idle')),
                    prefixVal: String(prefix), prefixNeed: true,
                    formula: `prefix += a[${i}] &#8594; <b>${prefix}</b> &middot; need = ${prefix} &minus; ${k} = <b>${need}</b>`,
                    seen: seenSnapshot(seen), seenLookup: need, seenFresh: null,
                    code: [4, 5], complete: false, confetti: false, count_fresh: false,
                    action: hit > 0 ? `seen[${need}] = ${hit}  &#8594; +${hit}` : `seen[${need}] absent  &#8594; +0`,
                    actionColor: hit > 0 ? 'var(--accent-orange)' : 'var(--accent-red)',
                    panel: `<b>i = ${i}.</b> Add <code>a[${i}] = ${arr[i]}</code> &#8594; <code>prefix = ${prefix}</code>. Look up the complement <code>prefix &minus; k = ${prefix} &minus; ${k} = ${need}</code> in the map: ${hit > 0 ? `found <code>seen[${need}] = ${hit}</code> &#8594; ${hit} subarray${hit === 1 ? '' : 's'} ending here sum to k.` : `<code>${need}</code> is not in the map &#8594; no new subarray ends here.`}`,
                    log: `i=${i}: prefix=${prefix}; need=${need}; seen[${need}]=${hit}`
                });

                if (hit > 0) count += hit;

                // STEP B: commit count + record this prefix
                const prevPrefixCount = seen.has(prefix) ? seen.get(prefix) : 0;
                seen.set(prefix, prevPrefixCount + 1);

                steps.push({
                    i: i, prefix: prefix, need: need, count: count,
                    arrStates: arr.map((_, idx) => idx <= i ? 'done' : 'idle'),
                    prefixVal: String(prefix), prefixNeed: false,
                    formula: hit > 0
                        ? `count += <span class="hit">${hit}</span> &#8594; <b>${count}</b> &middot; record seen[${prefix}]`
                        : `count unchanged = <b>${count}</b> &middot; record seen[${prefix}]`,
                    seen: seenSnapshot(seen), seenLookup: null, seenFresh: prefix,
                    code: hit > 0 ? [6, 7] : [7], complete: false, confetti: false, count_fresh: hit > 0,
                    action: hit > 0 ? `count = ${count}` : `record seen[${prefix}] = ${prevPrefixCount + 1}`,
                    actionColor: hit > 0 ? 'var(--accent-green)' : 'var(--accent-blue)',
                    panel: hit > 0
                        ? `<code>count += ${hit} = <b>${count}</b></code>. Then record the current prefix: <code>seen[${prefix}] = ${prevPrefixCount + 1}</code> so later indices can match it.`
                        : `No match, so count stays <b>${count}</b>. Record the current prefix in the map: <code>seen[${prefix}] = ${prevPrefixCount + 1}</code>.`,
                    log: `i=${i}: count=${count}; seen[${prefix}]=${prevPrefixCount + 1}`
                });
            }

            // FINAL
            steps.push({
                i: '—', prefix: prefix, need: '—', count: count,
                arrStates: arr.map(() => 'done'), prefixVal: String(prefix), prefixNeed: false,
                formula: `count = <b>${count}</b>`,
                seen: seenSnapshot(seen), seenLookup: null, seenFresh: null,
                code: [8], complete: true, confetti: true, count_fresh: false,
                action: `✓ count = ${count}`, actionColor: 'var(--accent-green)',
                panel: `Done in one O(n) pass. The number of subarrays of <code>[${arr.join(', ')}]</code> summing to <code>k = ${k}</code> is <b>${count}</b>.`,
                log: `done  count = ${count}`
            });
        }

        // Build persistent DOM skeleton (once per input load)
        function buildBoard() {
            const arrRow = document.getElementById('arr-row');
            arrRow.innerHTML = '';
            arrEls.length = 0; arrIdxEls.length = 0;

            arr.forEach((v, i) => {
                const col = document.createElement('div'); col.className = 'col';
                const cell = document.createElement('div'); cell.className = 'cell arr-cell'; cell.textContent = String(v);
                const lab = document.createElement('div'); lab.className = 'idx-label'; lab.textContent = i;
                col.appendChild(cell); col.appendChild(lab); arrRow.appendChild(col);
                arrEls.push(cell); arrIdxEls.push(lab);
            });
        }

        // Render (pure function of steps[idx], persistent DOM)
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // arr row
            for (let i = 0; i < arrEls.length; i++) {
                const st = step.arrStates[i] || 'idle';
                arrEls[i].className = 'cell arr-cell' + (st === 'idle' ? '' : ' ' + st);
                arrIdxEls[i].className = 'idx-label' + (st === 'current' ? ' lit' : '');
            }

            // prefix tile
            const pt = document.getElementById('prefix-tile');
            const prevPrefix = pt.textContent;
            pt.textContent = step.prefixVal;
            pt.className = 'prefix-tile' + (step.prefixNeed ? ' need' : '');
            if (prevPrefix !== step.prefixVal) Motion.pop(pt);
            document.getElementById('prefix-formula').innerHTML = step.formula || '';

            // SEEN map panel (rebuild rows each step; small + keyed by content)
            const seenHost = document.getElementById('seen-rows');
            seenHost.innerHTML = '';
            if (!step.seen || step.seen.length === 0) {
                const e = document.createElement('div'); e.className = 'seen-empty'; e.textContent = '(empty)';
                seenHost.appendChild(e);
            } else {
                step.seen.forEach(([key, cnt]) => {
                    const row = document.createElement('div');
                    let cls = 'seen-row';
                    if (step.seenLookup !== null && key === step.seenLookup) cls += ' lookup';
                    if (step.seenFresh !== null && key === step.seenFresh) cls += ' fresh';
                    row.className = cls;
                    const kEl = document.createElement('span'); kEl.className = 'key'; kEl.textContent = key;
                    const cEl = document.createElement('span'); cEl.className = 'cnt'; cEl.textContent = '× ' + cnt;
                    row.appendChild(kEl); row.appendChild(cEl);
                    seenHost.appendChild(row);
                    if (step.seenFresh !== null && key === step.seenFresh) Motion.pop(row);
                });
            }

            // answer track (single running count tile)
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            const tile = document.createElement('div');
            tile.className = 'ans-tile' + (step.count_fresh ? ' fresh' : '');
            const lbl = document.createElement('span'); lbl.className = 'ans-label'; lbl.textContent = 'count';
            const val = document.createElement('span'); val.textContent = step.count;
            tile.appendChild(lbl); tile.appendChild(val);
            at.appendChild(tile);
            if (step.count_fresh || step.complete) Motion.pop(tile);

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            mp.classList.toggle('bad', false);
            const aw = document.getElementById('action-word'); aw.innerHTML = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            document.getElementById('st-i').textContent = step.i;
            document.getElementById('st-prefix').textContent = step.prefix;
            document.getElementById('st-need').textContent = step.need;
            document.getElementById('st-count').textContent = step.count;

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // Controls
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function loadData(newArr, newK) {
            pause(); arr = newArr.slice(); k = newK; confettiArmed = true;
            buildBoard(); generateSteps(); renderStep(0);
        }
        function loadCustom() {
            let parsedArr;
            try { parsedArr = JSON.parse(document.getElementById('arr-input').value); }
            catch (e) {
                parsedArr = document.getElementById('arr-input').value.split(',').map(x => parseInt(x.trim(), 10)).filter(x => !isNaN(x));
            }
            if (!Array.isArray(parsedArr) || !parsedArr.every(x => typeof x === 'number' && isFinite(x)) || parsedArr.length === 0 || parsedArr.length > 12) return;
            const kv = parseInt(document.getElementById('k-input').value, 10);
            if (isNaN(kv)) return;
            loadData(parsedArr, kv);
        }
        function loadExample(n) {
            const ex = EXAMPLES[n];
            document.getElementById('arr-input').value = JSON.stringify(ex.arr);
            document.getElementById('k-input').value = ex.k;
            loadData(ex.arr, ex.k);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('arr-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        document.getElementById('k-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
