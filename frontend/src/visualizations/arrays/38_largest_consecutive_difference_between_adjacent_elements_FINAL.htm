<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest Consecutive Difference - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 280px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 16px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 10px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.12); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.8; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 600px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 100px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 18px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 700px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">array =</label>
        <input type="text" id="arr-input" placeholder="3, 6, 9, 1">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([3, 6, 9, 1])">Ex 1</button>
        <button onclick="loadExample([5, 5, 5, 5])">Ex 2</button>
        <button onclick="loadExample([10, 1, 20, 2, 30])">Ex 3</button>
    </div>

    <div class="array-container">
        <div class="ui-label" style="font-size: 12px; white-space: nowrap;">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Left (arr[i])</span>
            <span class="info-value" id="val-left" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Right (arr[i+1])</span>
            <span class="info-value" id="val-right" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">|Difference|</span>
            <span class="info-value" id="val-diff" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Max Diff</span>
            <span class="info-value" id="val-max" style="color: var(--accent-green);">0</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Largest Consecutive Difference =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Left Element (i)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Right Element (i+1)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); box-shadow: 0 0 6px var(--accent-green);"></span> New Max Found</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Past / Ignored</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [3, 6, 9, 1];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([3, 6, 9, 1]); }

        function loadExample(newArr) {
            arr = [...newArr];
            document.getElementById('arr-input').value = arr.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('arr-input').value;
            const parsedArr = valStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (parsedArr.length > 0) {
                // Limit length for visualization
                loadExample(parsedArr.slice(0, 15));
            }
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;

            if (n < 2) {
                steps.push({
                    type: 'final', left: '—', right: '—', diff: '—', maxDiff: 0,
                    tiles: arr.map((v) => ({val: v, state: 'idle'})),
                    panel: 'Array has fewer than 2 elements. No adjacent pairs exist.',
                    complete: true,
                    result: 0,
                    statusText: `Done. Need at least 2 elements.`,
                    log: `Array length is ${n}. Cannot compute adjacent difference.`,
                    logColor: 'var(--accent-red)', bold: true
                });
                return;
            }

            let maxDiff = 0;
            let bestI = -1;

            // STEP 0: INIT
            steps.push({
                type: 'init', left: '—', right: '—', diff: '—', maxDiff: 0,
                tiles: arr.map(v => ({val: v, state: 'idle'})),
                panel: 'Initialize max_diff = 0.',
                statusText: `array=[${arr.join(', ')}] n=${n}. Click Play to begin O(n) Single Pass Linear Scan.`,
                log: `n=${n}. Starting Single Pass Linear Scan (O(n)). Initialize max_diff = 0.`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 0; i < n - 1; i++) {
                let val1 = arr[i];
                let val2 = arr[i+1];
                let diff = Math.abs(val1 - val2);

                // STEP A: Compare Pair
                steps.push({
                    type: 'compare', left: val1, right: val2, diff: diff, maxDiff: maxDiff,
                    tiles: arr.map((v, idx) => ({
                        val: v,
                        state: idx === i ? 'candidate' : (idx === i+1 ? 'comparing' : 'idle')
                    })),
                    panel: `Comparing adjacent pair: |arr[${i}] - arr[${i+1}]| = |${val1} - ${val2}| = ${diff}`,
                    statusText: `Evaluating difference between index ${i} and ${i+1}.`,
                    log: `i=${i}: |${val1} - ${val2}| = ${diff}. Check if ${diff} > ${maxDiff}...`,
                    logColor: 'var(--text-main)'
                });

                if (diff > maxDiff) {
                    maxDiff = diff;
                    bestI = i;

                    // STEP B: Update Max
                    steps.push({
                        type: 'update', left: val1, right: val2, diff: diff, maxDiff: maxDiff,
                        tiles: arr.map((v, idx) => ({
                            val: v,
                            state: (idx === i || idx === i+1) ? 'winning' : 'idle'
                        })),
                        panel: `<span style="color:var(--accent-green)">${diff} > previous max. New maximum difference found!</span>`,
                        statusText: `Updated max_diff to ${maxDiff}.`,
                        log: `  ${diff} > previous max. Updated max_diff = ${maxDiff} ✓`,
                        logColor: 'var(--accent-green)'
                    });
                } else {
                    // STEP C: No Update
                    steps.push({
                        type: 'no-update', left: val1, right: val2, diff: diff, maxDiff: maxDiff,
                        tiles: arr.map((v, idx) => ({
                            val: v,
                            state: idx === i ? 'candidate' : (idx === i+1 ? 'comparing' : 'idle')
                        })),
                        panel: `<span style="color:var(--accent-red)">${diff} ≤ ${maxDiff}. Maximum difference remains unchanged.</span>`,
                        statusText: `Difference is not strictly greater than max_diff.`,
                        log: `  ${diff} ≤ ${maxDiff}. max_diff remains ${maxDiff}.`,
                        logColor: 'var(--text-dim)'
                    });
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final', left: '—', right: '—', diff: '—', maxDiff: maxDiff,
                tiles: arr.map((v, idx) => ({
                    val: v,
                    state: (idx === bestI || idx === bestI+1) ? 'winning' : 'past'
                })),
                panel: 'Linear scan complete.',
                complete: true,
                result: maxDiff,
                statusText: `Done. Largest consecutive difference is ${maxDiff}.`,
                log: `Final result: Largest adjacent difference = ${maxDiff}`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-left').innerText = step.left;
            document.getElementById('val-right').innerText = step.right;
            document.getElementById('val-diff').innerText = step.diff;
            document.getElementById('val-max').innerText = step.maxDiff;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
