<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Two Arrays - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 160px;
            font-size: 13px;
        }
        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .array-row { display: flex; align-items: center; gap: 12px; min-height: 44px; }
        .tiles-wrapper { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-start; max-width: 600px; min-height: 44px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.target { background: #1e1030; border: 2px solid var(--accent-purple); color: var(--accent-purple); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.06); box-shadow: 0 0 8px var(--accent-green); }
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.8; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 550px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; word-break: break-all; max-width: 600px; text-align: center; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 22px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 700px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">arr1 =</label>
        <input type="text" id="arr1-input" placeholder="1, 3, 5">
        <label class="ui-label">arr2 =</label>
        <input type="text" id="arr2-input" placeholder="2, 4, 6">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1, 3, 5], [2, 4, 6])">Ex 1</button>
        <button onclick="loadExample([10, 20], [5, 15, 25])">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="array-row">
            <div class="ui-label" style="width: 50px; text-align: right;">arr1</div>
            <div class="tiles-wrapper" id="arr1-tiles"></div>
        </div>
        <div class="array-row">
            <div class="ui-label" style="width: 50px; text-align: right;">arr2</div>
            <div class="tiles-wrapper" id="arr2-tiles"></div>
        </div>
        <div class="array-row" style="margin-top: 10px;">
            <div class="ui-label" style="width: 50px; text-align: right;">merged</div>
            <div class="tiles-wrapper" id="merged-tiles"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Action</span>
            <span class="info-value" id="val-action" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Element</span>
            <span class="info-value" id="val-elem" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Merged Length</span>
            <span class="info-value" id="val-len" style="color: var(--accent-blue);">0</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">final sorted array =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Copying arr1</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple)"></span> Copying arr2</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Sorting</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Sorted</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr1 = [1, 3, 5];
        let arr2 = [2, 4, 6];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([1, 3, 5], [2, 4, 6]); }

        function loadExample(newArr1, newArr2) {
            arr1 = [...newArr1];
            arr2 = [...newArr2];
            document.getElementById('arr1-input').value = arr1.join(', ');
            document.getElementById('arr2-input').value = arr2.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const v1 = document.getElementById('arr1-input').value;
            const v2 = document.getElementById('arr2-input').value;
            const parsed1 = v1.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const parsed2 = v2.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            
            // Allow empty arrays, but at least one must have items
            if (parsed1.length > 0 || parsed2.length > 0) {
                loadExample(parsed1.slice(0, 10), parsed2.slice(0, 10)); // limit length for visual clarity
            }
        }

        function generateSteps() {
            steps = [];
            let merged = [];
            const n = arr1.length;
            const m = arr2.length;

            // STEP 0: INIT
            steps.push({
                type: 'init', action: 'Initialize', elem: '—', len: 0,
                arr1States: arr1.map(() => 'idle'),
                arr2States: arr2.map(() => 'idle'),
                mergedTiles: [],
                panel: 'Create combined array = []',
                statusText: `arr1=[${arr1}], arr2=[${arr2}]. Click Play to begin.`,
                log: `Starting Brute Force Array Merge. Initializing empty combined array.`,
                logColor: 'var(--text-dim)'
            });

            // PHASE 1: Copy arr1
            for (let i = 0; i < n; i++) {
                merged.push(arr1[i]);
                steps.push({
                    type: 'copy1', action: 'Copy arr1', elem: arr1[i], len: merged.length,
                    arr1States: arr1.map((_, idx) => idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')),
                    arr2States: arr2.map(() => 'idle'),
                    mergedTiles: merged.map((v, idx) => ({
                        val: v,
                        state: idx === merged.length - 1 ? 'candidate' : 'past'
                    })),
                    panel: `Copying element ${arr1[i]} from arr1 to combined array`,
                    statusText: `Appending arr1[${i}] to combined array`,
                    log: `Copying arr1[${i}] = ${arr1[i]} → combined`,
                    logColor: 'var(--accent-orange)'
                });
            }

            // PHASE 2: Copy arr2
            for (let j = 0; j < m; j++) {
                merged.push(arr2[j]);
                steps.push({
                    type: 'copy2', action: 'Copy arr2', elem: arr2[j], len: merged.length,
                    arr1States: arr1.map(() => 'past'),
                    arr2States: arr2.map((_, idx) => idx === j ? 'target' : (idx < j ? 'past' : 'idle')),
                    mergedTiles: merged.map((v, idx) => ({
                        val: v,
                        state: idx === merged.length - 1 ? 'target' : 'past'
                    })),
                    panel: `Copying element ${arr2[j]} from arr2 to combined array`,
                    statusText: `Appending arr2[${j}] to combined array`,
                    log: `Copying arr2[${j}] = ${arr2[j]} → combined`,
                    logColor: 'var(--accent-purple)'
                });
            }

            // PHASE 3: Pre-Sort View
            steps.push({
                type: 'presort', action: 'Ready to Sort', elem: '—', len: merged.length,
                arr1States: arr1.map(() => 'past'),
                arr2States: arr2.map(() => 'past'),
                mergedTiles: merged.map(v => ({val: v, state: 'comparing'})),
                panel: `Combined array fully populated. Preparing to sort.`,
                statusText: `Combined array formed. Next step: Sort.`,
                log: `Combined array created: [${merged.join(', ')}]. Commencing sort.`,
                logColor: 'var(--accent-blue)'
            });

            // PHASE 4: Sorted
            let sortedMerged = [...merged].sort((a, b) => a - b);
            steps.push({
                type: 'sorted', action: 'Sorted', elem: '—', len: sortedMerged.length,
                arr1States: arr1.map(() => 'past'),
                arr2States: arr2.map(() => 'past'),
                mergedTiles: sortedMerged.map(v => ({val: v, state: 'winning'})),
                panel: `<span style="color:var(--accent-green)">✓ Array successfully sorted: O((n+m)log(n+m))</span>`,
                statusText: `Sorting complete.`,
                log: `Sorted combined array → [${sortedMerged.join(', ')}] ✓`,
                logColor: 'var(--accent-green)'
            });

            // FINAL STEP
            steps.push({
                type: 'final', action: 'Complete', elem: '—', len: sortedMerged.length,
                arr1States: arr1.map(() => 'past'),
                arr2States: arr2.map(() => 'past'),
                mergedTiles: sortedMerged.map(v => ({val: v, state: 'winning'})),
                panel: 'Merge and Sort Complete',
                complete: true,
                finalArr: sortedMerged,
                statusText: `Done. Final merged array length: ${sortedMerged.length}.`,
                log: `Final result: sorted array = [${sortedMerged.join(', ')}]`,
                logColor: 'var(--accent-green)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render arr1
            const c1 = document.getElementById('arr1-tiles');
            c1.innerHTML = '';
            arr1.forEach((val, i) => {
                const w = document.createElement('div');
                w.className = 'tile-unit';
                const t = document.createElement('div');
                t.className = `tile ${step.arr1States[i]}`;
                t.innerText = val;
                const l = document.createElement('div');
                l.className = 'tile-index';
                l.innerText = `[${i}]`;
                w.append(t, l);
                c1.appendChild(w);
            });

            // Render arr2
            const c2 = document.getElementById('arr2-tiles');
            c2.innerHTML = '';
            arr2.forEach((val, i) => {
                const w = document.createElement('div');
                w.className = 'tile-unit';
                const t = document.createElement('div');
                t.className = `tile ${step.arr2States[i]}`;
                t.innerText = val;
                const l = document.createElement('div');
                l.className = 'tile-index';
                l.innerText = `[${i}]`;
                w.append(t, l);
                c2.appendChild(w);
            });

            // Render merged
            const cm = document.getElementById('merged-tiles');
            cm.innerHTML = '';
            if (step.mergedTiles.length === 0) {
                const empty = document.createElement('div');
                empty.style.color = 'var(--text-dim)';
                empty.style.fontSize = '14px';
                empty.style.fontFamily = 'monospace';
                empty.style.padding = '10px 0';
                empty.innerText = '[]';
                cm.appendChild(empty);
            } else {
                step.mergedTiles.forEach((obj, i) => {
                    const w = document.createElement('div');
                    w.className = 'tile-unit';
                    const t = document.createElement('div');
                    t.className = `tile ${obj.state}`;
                    t.innerText = obj.val;
                    const l = document.createElement('div');
                    l.className = 'tile-index';
                    l.innerText = `[${i}]`;
                    w.append(t, l);
                    cm.appendChild(w);
                });
            }

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-action').innerText = step.action;
            document.getElementById('val-elem').innerText = step.elem;
            document.getElementById('val-len').innerText = step.len;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? `[${step.finalArr.join(', ')}]` : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
