<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Maximum Element - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        button {
            height: 32px; border-radius: 6px; padding: 0 16px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px;
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .array-area {
            background: var(--bg-surface);
            border: 2px solid var(--accent-blue);
            border-radius: 8px;
            padding: 20px;
            min-width: 420px;
        }

        .array-tiles {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .tile {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            background: #21262d;
            border: 2px solid var(--border-main);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tile.current {
            border-color: var(--accent-orange);
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--accent-orange);
        }

        .tile.max {
            border-color: var(--accent-green);
            background: #0f2a1a;
        }

        .info-panel {
            background: var(--bg-surface);
            border: 2px solid var(--accent-purple);
            border-radius: 8px;
            padding: 15px;
            width: 260px;
        }

        .action-panel {
            margin-top: 25px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 16px 22px;
            width: 860px;
            text-align: center;
            font-family: monospace;
            min-height: 90px;
            font-size: 15px;
            line-height: 1.5;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .log-panel {
            margin-top: 15px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 860px;
            height: 160px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13.5px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <button onclick="loadExample(0)">Example 1: [3,1,4,1,5,9]</button>
        <button onclick="loadExample(1)">Example 2: Negative Numbers</button>
        <button onclick="resetAll()">Reset</button>
    </div>

    <div class="visual-container">
        <!-- Array Visualization -->
        <div class="array-area">
            <div style="color:var(--accent-blue); font-weight:bold; margin-bottom:8px;">Array</div>
            <div id="array-tiles" class="array-tiles"></div>
        </div>

        <!-- Info -->
        <div class="info-panel">
            <h3 style="margin:0 0 12px 0; color:var(--accent-orange);">Current Max</h3>
            <div id="current-max" style="font-size:42px; font-weight:bold; text-align:center; color:var(--accent-green); min-height:70px;"></div>
            
            <div style="margin-top:20px;">
                <h3 style="margin:0 0 8px 0; color:var(--accent-purple);">Current Element</h3>
                <div id="current-element" style="font-size:32px; font-weight:bold; text-align:center;"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Click Play to start demonstration</div>

    <div class="controls">
        <button onclick="resetAll()">↺ Reset</button>
        <button onclick="backStep()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="nextStep()">Next →</button>
        <span style="margin-left:20px; font-size:13px;">Speed:</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log-container"></div>

    <script>
        let array = [];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1650, 950, 480];

        function init() {
            const _p = new URLSearchParams(window.location.search); loadExample(parseInt(_p.get('example') || '0'));
        }

        function loadExample(ex) {
            if (ex === 0) {
                array = [3, 1, 4, 1, 5, 9];
            } else {
                array = [-5, -2, -8, -1, -3];
            }
            steps = [];
            document.getElementById('log-container').innerHTML = '';

            addStep(`Array: <b>[${array.join(', ')}]</b>`, true);
            addStep("Initialize max = " + array[0]);

            let currentMax = array[0];

            for (let i = 1; i < array.length; i++) {
                addStep(`Check index ${i}: ${array[i]} vs current max ${currentMax}`);
                if (array[i] > currentMax) {
                    currentMax = array[i];
                    addStep(`New max updated to <b>${currentMax}</b>`);
                } else {
                    addStep(`No update`);
                }
            }

            addStep(`Final maximum element is <b>${currentMax}</b>`, true);

            stepIndex = 0;
            renderStep(0);
        }

        function addStep(text) {
            steps.push({
                panel: text,
                log: text
            });
        }

        function renderArray(currentIdx, maxVal) {
            const container = document.getElementById('array-tiles');
            container.innerHTML = '';
            array.forEach((val, idx) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.textContent = val;
                if (idx === currentIdx) tile.classList.add('current');
                if (val === maxVal) tile.classList.add('max');
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Extract current max and index from text for highlighting (simplified)
            let currentMax = array[0];
            let currentIdx = 0;
            
            // Rough parse for demo
            if (step.panel.includes("current max")) {
                const match = step.panel.match(/current max (\-?\d+)/);
                if (match) currentMax = parseInt(match[1]);
            }
            if (step.panel.includes("index")) {
                const idxMatch = step.panel.match(/index (\d+)/);
                if (idxMatch) currentIdx = parseInt(idxMatch[1]);
            }

            renderArray(currentIdx, currentMax);
            document.getElementById('current-max').innerText = currentMax;
            document.getElementById('current-element').innerText = currentIdx < array.length ? array[currentIdx] : "—";
            document.getElementById('main-panel').innerHTML = step.panel;

            const logDiv = document.getElementById('log-container');
            logDiv.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.margin = '4px 0';
                line.innerHTML = steps[i].log;
                logDiv.appendChild(line);
            }
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function nextStep() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function backStep() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function resetAll() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(nextStep, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
