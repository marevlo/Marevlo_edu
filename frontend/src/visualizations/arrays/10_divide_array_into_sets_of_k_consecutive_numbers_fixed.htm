<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divide Array in Sets of K Consecutive Numbers - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* smallest remaining anchor          */
            --accent-blue:   #06b6d4;   /* needed value / chrome              */
            --accent-green:  #22c55e;   /* formed group / success             */
            --accent-red:    #f43f5e;   /* missing value / failure            */
            --accent-purple: #a855f7;   /* run member highlight               */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 240px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input.k-input { width: 60px; }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.fail { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.fail::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .array-stage { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; padding: 30px 22px 24px; display: flex; justify-content: center; }
        .array-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .array-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        /* The frequency-count idiom: ONE row of distinct-value tiles with a live count badge */
        .scan-board { position: relative; display: inline-flex; flex-direction: column; gap: 0; }
        .row-label { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
        .cell-row { display: flex; gap: 12px; }
        .col { display: flex; flex-direction: column; align-items: center; }

        .cell {
            position: relative;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-family: var(--mono); font-weight: 800; font-size: 18px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            width: 52px; height: 52px; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s, opacity 0.35s;
        }
        .idx-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 6px; transition: color 0.3s; }
        .idx-label.lit { color: var(--accent-blue); }

        /* live remaining-count badge on each value tile */
        .count-badge {
            position: absolute; top: -9px; right: -9px; min-width: 20px; height: 20px; padding: 0 5px;
            border-radius: 999px; display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 11px; font-weight: 800;
            background: rgba(168,85,247,0.20); border: 1px solid rgba(168,85,247,0.5); color: #e9d5ff;
            transition: background 0.3s, border-color 0.3s, color 0.3s, transform 0.3s;
        }
        .num-cell.exhausted .count-badge { background: rgba(255,255,255,0.05); border-color: var(--border-main); color: var(--text-dim); }

        /* the smallest remaining anchor we are starting a run from */
        .num-cell.anchor  { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 20px rgba(245,165,36,0.5), inset 0 0 12px rgba(245,165,36,0.10); transform: scale(1.08); z-index: 2; }
        /* the value we currently need for the run */
        .num-cell.needed  { border-color: var(--accent-blue); background: rgba(6,182,212,0.14); color: #a5f3fc; box-shadow: 0 0 20px rgba(6,182,212,0.45); transform: scale(1.06); z-index: 2; }
        /* a value consumed into the run just formed */
        .num-cell.inrun   { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 14px rgba(168,85,247,0.35); }
        /* the needed value is missing -> failure flash */
        .num-cell.missing { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 22px rgba(244,63,94,0.55); transform: scale(1.08); z-index: 2; }
        /* fully exhausted (count == 0) */
        .num-cell.exhausted { opacity: 0.42; color: var(--text-dim); }
        /* final all-consumed success */
        .num-cell.done    { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.85), rgba(33,194,117,0.85)); color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.45); opacity: 1; }
        .num-cell.dim     { opacity: 0.4; color: var(--text-dim); }

        .scan-arrow { position: absolute; top: -34px; left: 50%; transform: translateX(-50%); color: var(--accent-orange); font-size: 14px; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
        .num-cell.anchor  .scan-arrow { opacity: 1; }
        .num-cell.needed  .scan-arrow { opacity: 1; color: var(--accent-blue); }
        .num-cell.missing .scan-arrow { opacity: 1; color: var(--accent-red); }

        .action-stage { position: relative; min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 6px; align-items: center; min-height: 40px; flex-wrap: wrap; justify-content: center; }
        .ans-tile { min-width: 40px; height: 44px; padding: 0 8px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 19px; font-weight: 800; border: 2px solid var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 12px rgba(168,85,247,0.30); }
        .ans-grp-sep { font-family: var(--mono); font-size: 18px; font-weight: 800; color: var(--text-dim); padding: 0 2px; }
        .ans-eq { font-family: var(--mono); font-size: 18px; font-weight: 800; color: var(--text-dim); }
        .ans-sum { min-width: 64px; height: 44px; padding: 0 14px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 20px; font-weight: 800; }
        .ans-sum.t { border: 2px solid var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0; box-shadow: 0 0 14px rgba(34,197,94,0.4); }
        .ans-sum.f { border: 2px solid var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 14px rgba(244,63,94,0.4); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-orange); } .pill.v b { color: var(--accent-blue); } .pill.s b { color: var(--accent-purple); } .pill.d b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="nums-input" value="[1,2,3,3,4,4,5,6]" maxlength="60">
        <label class="ui-label">k =</label>
        <input type="text" id="k-input" class="k-input" value="4" maxlength="3">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">[1,2,3,3,4,4,5,6] k=4 &rarr; true</button>
        <button onclick="loadExample(1)">[1,2,3,4] k=3 &rarr; false</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Divide Into Sets of K Consecutive <span class="sub">&middot; greedy + freq count &middot; take min, build run of k &middot; O(n log n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="array-stage" id="array-stage">
                    <div class="scan-board" id="scan-board">
                        <div class="row-label">distinct values &middot; remaining count badge</div>
                        <div class="cell-row" id="num-row"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill c">anchor (min) <b id="st-anchor">&mdash;</b></span>
                            <span class="pill v">need <b id="st-need">&mdash;</b></span>
                            <span class="pill s">groups <b id="st-groups">&mdash;</b></span>
                            <span class="pill d">answer <b id="st-ans">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // Motion engine (spring pop, zero deps)
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.55 + 0.55 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // State
        let nums = [1, 2, 3, 3, 4, 4, 5, 6];
        let k = 4;
        let distinct = [];          // sorted distinct values -> column order
        let valToCol = new Map();    // value -> column index in the tile row
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 720, 330];
        const numEls = [];   // column -> tile element
        const badgeEls = []; // column -> count-badge element
        const idxEls = [];   // column -> value-label element

        const CODE2 = [
            [['kw','def '],['fn','isPossibleDivide'],['src','(nums, k):']],
            [['kw','  if '],['src','len(nums) % k != 0: return False']],
            [['src','  cnt = Counter(nums)           # freq of each value']],
            [['kw','  for '],['src','x in sorted(cnt):          # smallest first']],
            [['kw','    if '],['src','cnt[x] == 0: continue      # already used']],
            [['src','    need = cnt[x]                # runs starting at x']],
            [['kw','    for '],['src','j in range(k):            # want x..x+k-1']],
            [['kw','      if '],['src','cnt.get(x+j,0) < need:']],
            [['kw','        return '],['src','False          # x+j missing']],
            [['src','      cnt[x + j] -= need']],
            [['kw','  return '],['src','True']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE2.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // step generation (immutable snapshots)
        function generateSteps() {
            steps = [];
            const n = nums.length;

            // base snapshot: counts map (value->remaining), highlight roles, side state
            const snap = (extra) => Object.assign({
                counts: null,         // {value: remaining} immutable copy
                anchor: null,         // current smallest-remaining value
                need: null,           // value currently required for the run
                groupsDone: 0,        // groups formed so far
                anchorVals: [],       // values flashed as anchor this step
                neededVals: [],       // values flashed as needed this step
                runVals: [],          // values just consumed into a run
                missingVal: null,     // value that was missing (failure)
                complete: false, success: null, answer: null
            }, extra);

            const countsOf = (m) => { const o = {}; distinct.forEach(v => o[v] = m.get(v) || 0); return o; };

            // build counter
            const cnt = new Map();
            nums.forEach(v => cnt.set(v, (cnt.get(v) || 0) + 1));

            steps.push(snap({
                counts: countsOf(cnt), code: [0, 2],
                action: 'GREEDY', actionColor: 'var(--accent-blue)',
                panel: `Goal: split <code>nums</code> into groups of <b>${k}</b> <b>consecutive</b> numbers. Count each value, then always start a run from the <b>smallest remaining</b> value.`,
                log: `init  nums=[${nums.join(',')}]  k=${k}  n=${n}`
            }));

            // divisibility gate
            if (n % k !== 0) {
                steps.push(snap({
                    counts: countsOf(cnt), code: [1], missingVal: null,
                    action: `n % k = ${n % k} ≠ 0`, actionColor: 'var(--accent-red)',
                    panel: `<code>n = ${n}</code> is not divisible by <code>k = ${k}</code> (<code>${n} % ${k} = ${n % k}</code>). The array cannot be split into equal groups of ${k}.`,
                    log: `gate  ${n} % ${k} = ${n % k} != 0  ->  False`
                }));
                steps.push(snap({
                    counts: countsOf(cnt), complete: true, success: false, answer: 'false', code: [8],
                    action: '✗ false', actionColor: 'var(--accent-red)',
                    panel: `Cannot divide: array length is not a multiple of <code>k</code>. Answer = <code><b>false</b></code>.`,
                    log: `done  answer = false`
                }));
                return;
            }

            steps.push(snap({
                counts: countsOf(cnt), code: [1],
                action: `n % k = 0 ✓`, actionColor: 'var(--accent-green)',
                panel: `<code>n = ${n}</code> is divisible by <code>k = ${k}</code> (<code>${n} / ${k} = ${n/k}</code> groups). Length check passes &#8594; proceed greedily.`,
                log: `gate  ${n} % ${k} = 0  ->  need ${n/k} groups`
            }));

            const sortedKeys = distinct.slice(); // distinct already sorted ascending
            let groupsDone = 0;

            for (const x of sortedKeys) {
                if ((cnt.get(x) || 0) === 0) {
                    // already fully consumed: skip (snapshot to show the skip)
                    steps.push(snap({
                        counts: countsOf(cnt), anchor: x, groupsDone, code: [3, 4],
                        anchorVals: [], neededVals: [],
                        action: `skip ${x}`, actionColor: 'var(--text-dim)',
                        panel: `Value <code>${x}</code> has count <code>0</code> &#8594; already used up by earlier runs. Skip it.`,
                        log: `skip  ${x}  (count 0)`
                    }));
                    continue;
                }

                const need = cnt.get(x);
                // STEP: pick anchor
                steps.push(snap({
                    counts: countsOf(cnt), anchor: x, need: x, groupsDone, code: [3, 5],
                    anchorVals: [x],
                    action: `anchor = ${x}`, actionColor: 'var(--accent-orange)',
                    panel: `Smallest remaining value is <code>${x}</code> with count <code>${need}</code>. We must open <b>${need}</b> run${need>1?'s':''} that each begin at <code>${x}</code>, so we need <code>${need}</code> of every value in <code>${x}..${x+k-1}</code>.`,
                    log: `anchor x=${x}  need=${need}  -> consume ${x}..${x+k-1}`
                }));

                let failed = false;
                const consumed = [];
                for (let j = 0; j < k; j++) {
                    const target = x + j;
                    const have = cnt.get(target) || 0;
                    // STEP: examine needed value
                    steps.push(snap({
                        counts: countsOf(cnt), anchor: x, need: target, groupsDone, code: [6, 7],
                        anchorVals: [x], neededVals: [target], runVals: consumed.slice(),
                        action: `need ${target} ×${need}`, actionColor: 'var(--accent-blue)',
                        panel: `Run position <code>j=${j}</code>: need value <code>${target}</code>, at least <code>${need}</code> of them. Have <code>cnt[${target}] = ${have}</code>.`,
                        log: `  need ${target} x${need}  (have ${have})`
                    }));

                    if (have < need) {
                        failed = true;
                        steps.push(snap({
                            counts: countsOf(cnt), anchor: x, need: target, groupsDone, code: [7, 8],
                            anchorVals: [x], missingVal: target, runVals: consumed.slice(),
                            action: `✗ missing ${target}`, actionColor: 'var(--accent-red)',
                            panel: `<code>cnt[${target}] = ${have} &lt; ${need}</code> &#8594; not enough <code>${target}</code> to complete the run starting at <code>${x}</code>. The greedy choice is forced and fails here.`,
                            log: `  cnt[${target}]=${have} < ${need}  ->  return False`
                        }));
                        steps.push(snap({
                            counts: countsOf(cnt), complete: true, success: false, answer: 'false', code: [8],
                            anchorVals: [], missingVal: target,
                            action: '✗ false', actionColor: 'var(--accent-red)',
                            panel: `Cannot form a consecutive run from <code>${x}</code>: value <code>${target}</code> is missing. Answer = <code><b>false</b></code>.`,
                            log: `done  answer = false  (missing ${target})`
                        }));
                        break;
                    }

                    // consume `need` copies of target
                    cnt.set(target, have - need);
                    consumed.push(target);
                    steps.push(snap({
                        counts: countsOf(cnt), anchor: x, need: target, groupsDone, code: [9],
                        anchorVals: [x], runVals: consumed.slice(),
                        action: `take ${target} ×${need}`, actionColor: 'var(--accent-purple)',
                        panel: `Take <code>${need}</code> copies of <code>${target}</code> &#8594; <code>cnt[${target}]</code> drops to <code>${have - need}</code>. Run progress: <code>[${consumed.join(', ')}]</code>.`,
                        log: `  take ${target} x${need}  cnt[${target}]->${have - need}`
                    }));
                }

                if (failed) return;

                groupsDone += need;
                // STEP: runs formed
                const runStr = Array.from({length: k}, (_, j) => x + j).join(', ');
                steps.push(snap({
                    counts: countsOf(cnt), anchor: x, groupsDone, code: [7],
                    runVals: consumed.slice(),
                    action: `✓ ${need} run${need>1?'s':''} [${runStr}]`, actionColor: 'var(--accent-green)',
                    panel: `Formed <b>${need}</b> consecutive run${need>1?'s':''} <code>[${runStr}]</code>. Total groups so far: <code>${groupsDone}</code> / <code>${n/k}</code>.`,
                    log: `formed ${need} run(s) [${runStr}]  groups=${groupsDone}`
                }));
            }

            // success
            steps.push(snap({
                counts: countsOf(cnt), complete: true, success: true, answer: 'true', code: [10],
                groupsDone,
                action: '✓ true', actionColor: 'var(--accent-green)',
                panel: `Every value reached count <code>0</code> and all <code>${n/k}</code> groups are valid consecutive runs of <code>${k}</code>. Answer = <code><b>true</b></code>.`,
                log: `done  answer = true  (${n/k} groups formed)`
            }));
        }

        // build persistent DOM skeleton (once per input load)
        function buildBoard() {
            const numRow = document.getElementById('num-row');
            numRow.innerHTML = '';
            numEls.length = 0; badgeEls.length = 0; idxEls.length = 0;

            distinct.forEach((v) => {
                const col = document.createElement('div'); col.className = 'col';
                const cell = document.createElement('div'); cell.className = 'cell num-cell';
                const arrow = document.createElement('span'); arrow.className = 'scan-arrow'; arrow.textContent = '▼';
                const valSpan = document.createElement('span'); valSpan.textContent = String(v);
                const badge = document.createElement('span'); badge.className = 'count-badge'; badge.textContent = '0';
                cell.appendChild(arrow); cell.appendChild(valSpan); cell.appendChild(badge);
                const lab = document.createElement('div'); lab.className = 'idx-label'; lab.textContent = 'v=' + v;
                col.appendChild(cell); col.appendChild(lab); numRow.appendChild(col);
                numEls.push(cell); badgeEls.push(badge); idxEls.push(lab);
            });
        }

        // render (pure function of steps[idx], persistent DOM)
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const finalMode = step.complete;

            for (let c = 0; c < distinct.length; c++) {
                const v = distinct[c];
                const remaining = step.counts ? step.counts[v] : 0;
                let cls = 'cell num-cell';
                const prevFlash = numEls[c].classList.contains('anchor') || numEls[c].classList.contains('needed') || numEls[c].classList.contains('missing');

                if (finalMode && step.success === true) {
                    cls += ' done';
                } else {
                    if (step.missingVal === v) cls += ' missing';
                    else if (step.neededVals.includes(v)) cls += ' needed';
                    else if (step.anchorVals.includes(v)) cls += ' anchor';
                    else if (step.runVals.includes(v)) cls += ' inrun';
                    if (remaining === 0 && !cls.includes('missing')) cls += ' exhausted';
                    if (finalMode && step.success === false) {
                        // leave missing flash if present, otherwise dim
                        if (step.missingVal !== v) cls += ' dim';
                    }
                }

                numEls[c].className = cls;
                badgeEls[c].textContent = String(remaining);
                idxEls[c].className = 'idx-label' + (step.need === v && !finalMode ? ' lit' : '');

                const nowFlash = numEls[c].classList.contains('anchor') || numEls[c].classList.contains('needed') || numEls[c].classList.contains('missing');
                if (nowFlash && !prevFlash) Motion.pop(numEls[c]);
                if (finalMode && step.success === true) Motion.pop(numEls[c]);
            }

            // answer track: on completion show groups (success) or the verdict
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (finalMode) {
                if (step.success === true) {
                    // render each value group x..x+k-1 derived from distinct (illustrative one of each)
                    // Show the canonical group templates that were formed.
                    const groups = buildGroupTemplates();
                    groups.forEach((g, gi) => {
                        if (gi > 0) { const sep = document.createElement('div'); sep.className = 'ans-grp-sep'; sep.textContent = '|'; at.appendChild(sep); }
                        g.forEach(val => { const t = document.createElement('div'); t.className = 'ans-tile'; t.textContent = val; at.appendChild(t); });
                    });
                    const eq = document.createElement('div'); eq.className = 'ans-eq'; eq.textContent = '→'; at.appendChild(eq);
                    const s = document.createElement('div'); s.className = 'ans-sum t'; s.textContent = 'true'; at.appendChild(s);
                } else {
                    const s = document.createElement('div'); s.className = 'ans-sum f'; s.textContent = 'false'; at.appendChild(s);
                }
            }

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete && step.success === true);
            mp.classList.toggle('fail', (!!step.complete && step.success === false) || step.missingVal != null);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.complete && step.success === true) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else if (!step.complete) confettiArmed = true;

            document.getElementById('st-anchor').textContent = step.anchor != null ? step.anchor : '—';
            document.getElementById('st-need').textContent = step.need != null ? step.need : '—';
            document.getElementById('st-groups').textContent = step.groupsDone != null ? step.groupsDone : '—';
            document.getElementById('st-ans').textContent = step.answer != null ? step.answer : '—';

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        // reconstruct the group templates actually formed (only used on success)
        function buildGroupTemplates() {
            const cnt = new Map();
            nums.forEach(v => cnt.set(v, (cnt.get(v) || 0) + 1));
            const groups = [];
            for (const x of distinct) {
                let need = cnt.get(x) || 0;
                while (need > 0) {
                    const g = [];
                    for (let j = 0; j < k; j++) { g.push(x + j); cnt.set(x + j, (cnt.get(x + j) || 0) - 1); }
                    groups.push(g);
                    need--;
                }
            }
            return groups.slice(0, 4); // cap display
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // controls
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function rebuildDistinct() {
            const set = Array.from(new Set(nums)).sort((a, b) => a - b);
            distinct = set;
            valToCol = new Map(); distinct.forEach((v, i) => valToCol.set(v, i));
        }

        function loadArr(arr, kk) {
            pause(); nums = arr.slice().sort((a, b) => a - b); k = kk; confettiArmed = true;
            rebuildDistinct(); buildBoard(); generateSteps(); renderStep(0);
        }
        function loadCustom() {
            const raw = document.getElementById('nums-input').value;
            const rawK = document.getElementById('k-input').value;
            let parsed;
            try { parsed = JSON.parse(raw); }
            catch (e) {
                parsed = raw.split(',').map(x => parseInt(x.trim(), 10)).filter(x => !isNaN(x));
            }
            const kk = parseInt(rawK, 10);
            if (Array.isArray(parsed) && parsed.length > 0 && parsed.every(x => typeof x === 'number' && isFinite(x)) && parsed.length <= 18 && Number.isFinite(kk) && kk >= 1) {
                loadArr(parsed, kk);
            }
        }
        function loadExample(n) {
            const ex = [[[1, 2, 3, 3, 4, 4, 5, 6], 4], [[1, 2, 3, 4], 3]][n];
            document.getElementById('nums-input').value = JSON.stringify(ex[0]);
            document.getElementById('k-input').value = ex[1];
            loadArr(ex[0], ex[1]);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('nums-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        document.getElementById('k-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
