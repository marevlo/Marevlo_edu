<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consecutive Numbers Division Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }
        label.array-label { font-family: 'Courier New', monospace; font-size: 14px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 220px;
            font-size: 14px;
        }
        .k-input { width: 50px !important; }
        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 1.5px solid var(--accent-green); color: var(--accent-green); transform: scale(1.06); }
        .tile.defeated { background: #2a0d0d; border: 1.5px solid var(--accent-red); color: var(--accent-red); opacity: 0.6; }
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }

        /* ROW 3: COMPARISON PANEL */
        .panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 500px; text-align: center; font-family: monospace; min-height: 52px;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        #res-val.complete-true { color: var(--accent-green); font-size: 26px; font-weight: 700; text-shadow: 0 0 16px var(--accent-green); animation: popAnim 400ms ease; }
        #res-val.complete-false { color: var(--accent-red); font-size: 26px; font-weight: 700; }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 600px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">arr =</label>
        <input type="text" id="array-input" placeholder="1,2,3,3,4,4,5,6">
        <label class="array-label">k =</label>
        <input type="text" id="k-input" class="k-input" placeholder="4">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,2,3,3,4,4,5,6], 4)">Example 1</button>
        <button onclick="loadExample([1,2,3,4], 3)">Example 2</button>
    </div>

    <div class="array-container">
        <div class="info-label" style="font-size: 12px; font-family: monospace;">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">i (group start)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">j (offset)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">current value</span>
            <span class="info-value" id="val-curr" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">group status</span>
            <span class="info-value" id="val-stat" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="info-label" style="margin-bottom: 4px;">result =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="info-label" style="margin-right:4px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Group Start</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Searching</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Found</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red)"></span> Missing</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Used</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [1, 2, 3, 3, 4, 4, 5, 6];
        let k = 4;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([1, 2, 3, 3, 4, 4, 5, 6], 4); }

        function loadExample(newArr, newK) {
            arr = [...newArr].sort((a, b) => a - b);
            k = newK;
            document.getElementById('array-input').value = newArr.join(',');
            document.getElementById('k-input').value = k;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valArr = document.getElementById('array-input').value;
            const valK = document.getElementById('k-input').value;
            const parsedArr = valArr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const parsedK = parseInt(valK);
            if (parsedArr.length > 0 && !isNaN(parsedK)) loadExample(parsedArr.slice(0, 10), parsedK);
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;
            const used = new Array(n).fill(false);
            
            // STEP 0: INIT
            steps.push({
                type: 'init', i: null, j: null, current: null, gStat: '—',
                tiles: arr.map(v => ({val: v, state: ''})),
                panel: '—',
                statusText: `array=[${arr}] k=${k}. Click Play to begin.`,
                log: `array=[${arr}] — n=${n}. Starting brute force division check.`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 0; i < n; i++) {
                if (!used[i]) {
                    const startVal = arr[i];
                    const currentGroupIndices = [];

                    // STEP A: Start new group
                    steps.push({
                        type: 'start', i, j: null, current: startVal, gStat: 'Starting',
                        tiles: arr.map((v, idx) => ({
                            val: v, 
                            state: idx === i ? 'candidate' : (used[idx] ? 'past' : '')
                        })),
                        panel: '—',
                        statusText: `Group: Starting from array[${i}]=${startVal}`,
                        log: `Group: Attempting to form group starting at ${startVal}`,
                        logColor: 'var(--accent-blue)'
                    });

                    let possible = true;
                    for (let j = 0; j < k; j++) {
                        const target = startVal + j;
                        
                        // STEP B: Search
                        steps.push({
                            type: 'search', i, j, current: startVal, gStat: 'Searching',
                            tiles: arr.map((v, idx) => ({
                                val: v, 
                                state: idx === i ? 'candidate' : (used[idx] ? 'past' : (currentGroupIndices.includes(idx) ? 'winning' : ''))
                            })),
                            panel: `Searching for value=${target}`,
                            statusText: `Group: j=${j}: Looking for ${target}`
                        });

                        let foundIdx = -1;
                        for (let s = 0; s < n; s++) {
                            if (!used[s] && !currentGroupIndices.includes(s) && arr[s] === target) {
                                foundIdx = s;
                                break;
                            }
                        }

                        if (foundIdx !== -1) {
                            currentGroupIndices.push(foundIdx);
                            // STEP C: Found
                            steps.push({
                                type: 'found', i, j, current: startVal, gStat: 'Progress',
                                tiles: arr.map((v, idx) => ({
                                    val: v, 
                                    state: idx === i ? 'candidate' : (used[idx] ? 'past' : (currentGroupIndices.includes(idx) ? 'winning' : ''))
                                })),
                                panel: `✓ Found ${target} at index ${foundIdx}`,
                                statusText: `Group: j=${j}: Found ${target} ✓`,
                                log: `Group: ${target} found at index ${foundIdx} ✓`,
                                logColor: 'var(--accent-green)'
                            });
                        } else {
                            possible = false;
                            // STEP C: Not Found
                            steps.push({
                                type: 'notfound', i, j, current: startVal, gStat: 'Failed',
                                tiles: arr.map((v, idx) => ({
                                    val: v, 
                                    state: idx === i ? 'defeated' : (used[idx] ? 'past' : '')
                                })),
                                panel: `✗ Missing ${target}`,
                                statusText: `Group: j=${j}: Cannot find ${target} ✗`,
                                log: `Group: ${target} NOT found → return False ✗`,
                                logColor: 'var(--accent-red)'
                            });

                            steps.push({
                                type: 'final', i: null, j: null, current: null, gStat: 'Failed',
                                tiles: arr.map(v => ({val: v, state: 'past'})),
                                panel: 'Division Failed',
                                result: 'False',
                                resClass: 'complete-false',
                                statusText: `Done. Cannot divide. Missing: ${target}. Result: False`,
                                log: `Final result: False (cannot form all groups)`,
                                logColor: 'var(--accent-red)', bold: true
                            });
                            return; // Stop generation
                        }
                    }

                    // STEP D: Group Complete
                    if (possible) {
                        const groupVals = currentGroupIndices.map(idx => arr[idx]);
                        currentGroupIndices.forEach(idx => used[idx] = true);

                        steps.push({
                            type: 'group_complete', i, j: k - 1, current: startVal, gStat: 'Complete',
                            tiles: arr.map((v, idx) => ({
                                val: v, 
                                state: used[idx] ? 'past' : ''
                            })),
                            panel: `Group of ${k} consecutive numbers formed ✓`,
                            statusText: `Group complete: [${groupVals.join(', ')}] ✓`,
                            log: `Group formed: [${groupVals.join(', ')}] ✓`,
                            logColor: 'var(--accent-green)'
                        });
                    }
                }
            }

            // FINAL STEP: Success
            steps.push({
                type: 'final', i: null, j: null, current: null, gStat: 'Success',
                tiles: arr.map(v => ({val: v, state: 'winning'})),
                panel: 'Division Successful',
                result: 'True',
                resClass: 'complete-true',
                statusText: `Done. Array can be divided into groups. Result: True`,
                log: `Final result: True (all groups formed)`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-curr').innerText = step.current !== null ? step.current : '—';
            document.getElementById('val-stat').innerText = step.gStat;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.result || '—';
            resVal.className = step.resClass || '';

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
