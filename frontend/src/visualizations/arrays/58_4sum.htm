<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4Sum - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
        }

        .tile.idle { color: var(--text-dim); }
        .tile.candidate { 
            background: #2a1600; 
            border: 2px solid var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.12); 
            z-index: 2; 
        }
        .tile.past { opacity: 0.3; }
        .tile.active { 
            background: #0f2a1a; 
            border: 2px solid var(--accent-green); 
            color: var(--accent-green); 
        }

        /* ROW 3: QUADRUPLET PANEL */
        .quad-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 18px;
            min-width: 460px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }

        .quad-sum { color: var(--accent-orange); font-weight: 700; }
        .target { color: var(--accent-blue); }

        /* ROW 4: INFO PANEL */
        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 90px;
            gap: 4px;
        }

        .info-label { font-size: 10px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        #res-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
        #res-val { 
            font-family: monospace; 
            font-size: 15px; 
            color: var(--accent-green); 
            white-space: pre-wrap;
            max-width: 600px;
        }
        .pop { 
            animation: popAnim 400ms ease; 
            font-size: 18px !important; 
        }

        @keyframes popAnim {
            0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)}
        }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        /* ROW 7: CONTROLS */
        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        /* ROW 8: LEGEND */
        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 680px;
            max-width: 90%;
            height: 140px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.4;
        }
        .log-line { margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">nums =</label>
        <input type="text" id="array-input" placeholder="1, 0, -1, 0, -2, 2" style="width: 260px;">
        <label class="array-label" style="margin-left: 12px;">target =</label>
        <input type="text" id="target-input" placeholder="0" style="width: 80px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,0,-1,0,-2,2], 0)">Example 1</button>
        <button onclick="loadExample([2,2,2,2,2], 8)">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">nums =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="quad-panel" id="quad-panel">
        —
    </div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">i</div>
            <div class="info-value" id="val-i" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">j</div>
            <div class="info-value" id="val-j" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">k</div>
            <div class="info-value" id="val-k" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">l</div>
            <div class="info-value" id="val-l" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">sum</div>
            <div class="info-value" id="val-sum" style="color: var(--accent-green);">—</div>
        </div>
    </div>

    <div class="result-display">
        <div id="res-label">unique quadruplets found</div>
        <div id="res-val">[]</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> Current quadruplet [i,j,k,l]</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> Valid quadruplet found</div>
        <div class="legend-item"><div class="dot" style="background: var(--text-dim);"></div> Skipped / past</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentArray = [1, 0, -1, 0, -2, 2];
        let currentTarget = 0;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample([1, 0, -1, 0, -2, 2], 0);
        }

        function loadExample(arr, target) {
            currentArray = arr.slice(0, 12);
            currentTarget = target;
            document.getElementById('array-input').value = currentArray.join(', ');
            document.getElementById('target-input').value = target;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const t = parseInt(document.getElementById('target-input').value.trim());
            if (arr.length > 0 && !isNaN(t)) {
                currentArray = arr;
                currentTarget = t;
                generateSteps();
                reset();
            }
        }

        function generateSteps() {
            steps = [];
            let nums = [...currentArray];
            const n = nums.length;
            const target = currentTarget;
            let result = [];

            // STEP 0: INIT
            steps.push({
                type: 'init',
                i: null, j: null, k: null, l: null,
                sum: null,
                tileStates: Array(n).fill('idle'),
                status: `nums=[${currentArray}] target=${target} n=${n}. Starting brute-force 4Sum (O(n⁴)).`,
                log: `Original array: [${currentArray}] target=${target} — Starting 4Sum brute force`
            });

            // Sort step
            nums.sort((a, b) => a - b);
            steps.push({
                type: 'sort',
                i: null, j: null, k: null, l: null,
                sum: null,
                tileStates: Array(n).fill('idle'),
                status: `Sorted array: [${nums}]`,
                log: `After sorting: [${nums}]`
            });

            for (let i = 0; i < n - 3; i++) {
                if (i > 0 && nums[i] === nums[i - 1]) continue; // skip duplicate i

                for (let j = i + 1; j < n - 2; j++) {
                    if (j > i + 1 && nums[j] === nums[j - 1]) continue; // skip duplicate j

                    for (let k = j + 1; k < n - 1; k++) {
                        if (k > j + 1 && nums[k] === nums[k - 1]) continue; // skip duplicate k

                        for (let l = k + 1; l < n; l++) {
                            if (l > k + 1 && nums[l] === nums[l - 1]) continue; // skip duplicate l

                            const currentSum = nums[i] + nums[j] + nums[k] + nums[l];

                            let tileStates = Array(n).fill('past');
                            tileStates[i] = 'candidate';
                            tileStates[j] = 'candidate';
                            tileStates[k] = 'candidate';
                            tileStates[l] = 'candidate';

                            steps.push({
                                type: 'check',
                                i: i, j: j, k: k, l: l,
                                sum: currentSum,
                                tileStates: tileStates,
                                status: `Checking [${nums[i]},${nums[j]},${nums[k]},${nums[l]}] = ${currentSum}`,
                                log: `i=${i} j=${j} k=${k} l=${l} → sum=${currentSum}`
                            });

                            if (currentSum === target) {
                                const quad = [nums[i], nums[j], nums[k], nums[l]];
                                result.push(quad);
                                steps.push({
                                    type: 'found',
                                    i: i, j: j, k: k, l: l,
                                    sum: currentSum,
                                    tileStates: tileStates,
                                    status: `✓ Found valid quadruplet [${quad}]`,
                                    log: `Found: [${quad}]`,
                                    logColor: 'var(--accent-green)'
                                });
                            }
                        }
                    }
                }
            }

            // FINAL
            steps.push({
                type: 'final',
                i: null, j: null, k: null, l: null,
                sum: null,
                tileStates: Array(n).fill('past'),
                status: `Complete. Found ${result.length} unique quadruplets.`,
                log: `Final result: ${JSON.stringify(result)}`,
                logColor: 'var(--accent-blue)',
                bold: true,
                result: result
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            currentArray.forEach((val, pos) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[pos] || 'idle'}`;
                tile.innerText = val;
                const indexEl = document.createElement('div');
                indexEl.className = 'tile-index';
                indexEl.innerText = `[${pos}]`;
                wrapper.appendChild(tile);
                wrapper.appendChild(indexEl);
                container.appendChild(wrapper);
            });

            // Quad Panel
            const quadPanel = document.getElementById('quad-panel');
            if (step.i !== null) {
                quadPanel.innerHTML = `
                    [${step.i},${step.j},${step.k},${step.l}] = 
                    <span class="quad-sum">${step.sum}</span> 
                    <span class="target">(target = ${currentTarget})</span>
                `;
            } else {
                quadPanel.innerHTML = '—';
            }

            // Info Panel
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-k').innerText = step.k !== null ? step.k : '—';
            document.getElementById('val-l').innerText = step.l !== null ? step.l : '—';
            document.getElementById('val-sum').innerText = step.sum !== null ? step.sum : '—';

            // Result
            const resVal = document.getElementById('res-val');
            if (step.result) {
                resVal.innerText = JSON.stringify(step.result, null, 2);
                resVal.classList.add('pop');
            } else {
                resVal.innerText = step.result === undefined ? '[]' : JSON.stringify(step.result || [], null, 2);
                resVal.classList.remove('pop');
            }

            // Status
            document.getElementById('status-text').innerText = step.status;

            // Log
            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        window.onload = init;
    </script>
</body>
</html>
