<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Intervals - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 320px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .array-row { display: flex; align-items: center; gap: 12px; min-height: 50px; justify-content: center; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-start; max-width: 800px; min-height: 50px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 60px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 14px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main); padding: 0 6px;
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.06); box-shadow: 0 0 8px var(--accent-green); z-index: 3;}
        .tile.absorbed { background: #2a0d0d; border: 2px solid var(--accent-red); color: var(--accent-red); opacity: 0.6; transform: scale(0.95); }
        .tile.past { opacity: 0.4; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 600px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 130px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; max-width: 800px; text-align: center; word-wrap: break-word; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 20px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 700px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">intervals =</label>
        <input type="text" id="arr-input" placeholder="[1,3], [2,6], [8,10], [15,18]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([[1,3],[2,6],[8,10],[15,18]])">Ex 1</button>
        <button onclick="loadExample([[1,4],[4,5]])">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="array-row">
            <div class="ui-label" style="width: 80px; text-align: right;">Sorted:</div>
            <div class="tiles-wrapper" id="sorted-tiles"></div>
        </div>
        <div class="array-row">
            <div class="ui-label" style="width: 80px; text-align: right;">Merged:</div>
            <div class="tiles-wrapper" id="merged-tiles"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Interval</span>
            <span class="info-value" id="val-curr" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Last Merged</span>
            <span class="info-value" id="val-last" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Overlap? (C.start ≤ L.end)</span>
            <span class="info-value" id="val-overlap" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Action</span>
            <span class="info-value" id="val-action" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">final merged intervals =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Current Interval</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Last Merged Interval</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Added / Expanded</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red)"></span> Absorbed (Skipped)</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let intervals = [[1, 3], [2, 6], [8, 10], [15, 18]];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([[1, 3], [2, 6], [8, 10], [15, 18]]); }

        function formatIntervals(arr) {
            return arr.map(i => `[${i[0]},${i[1]}]`).join(', ');
        }

        function loadExample(newArr) {
            intervals = newArr.map(x => [...x]);
            document.getElementById('arr-input').value = formatIntervals(intervals);
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('arr-input').value;
            try {
                // Parse intervals like [1,3], [2,6] from string safely
                let matches = valStr.match(/\[\s*-?\d+\s*,\s*-?\d+\s*\]/g);
                if (matches && matches.length > 0) {
                    let parsedArr = matches.map(m => JSON.parse(m));
                    loadExample(parsedArr);
                } else {
                    alert("Invalid format. Use [start, end], [start, end]");
                }
            } catch(e) {
                alert("Invalid format. Use [start, end], [start, end]");
            }
        }

        function generateSteps() {
            steps = [];
            const n = intervals.length;

            if (n === 0) {
                steps.push({
                    type: 'final', curr: '—', last: '—', overlap: '—', action: '—',
                    sortedTiles: [], mergedTiles: [],
                    panel: 'Array is empty.',
                    complete: true,
                    finalStr: '[]',
                    statusText: `Done. Array is empty.`,
                    log: `Final result: []`,
                    logColor: 'var(--accent-blue)', bold: true
                });
                return;
            }

            // Step 0: Init (Unsorted)
            steps.push({
                type: 'init', curr: '—', last: '—', overlap: '—', action: 'Initialize',
                sortedTiles: intervals.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'idle'})),
                mergedTiles: [],
                panel: 'Original Intervals',
                statusText: `n=${n}. Click Play to begin algorithm.`,
                log: `n=${n}. Starting Interval Merge algorithm.`,
                logColor: 'var(--text-dim)'
            });

            // Step 1: Sort
            let sortedArr = [...intervals].sort((a, b) => a[0] - b[0]);
            
            steps.push({
                type: 'sort', curr: '—', last: '—', overlap: '—', action: 'Sort',
                sortedTiles: sortedArr.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'idle'})),
                mergedTiles: [],
                panel: 'Sorted intervals based on start time (O(n log n))',
                statusText: `Intervals sorted by start time.`,
                log: `Sorted intervals: ${formatIntervals(sortedArr)}`,
                logColor: 'var(--accent-blue)'
            });

            let merged = [];
            
            // Step 2: Initialize merged array
            merged.push([...sortedArr[0]]);
            steps.push({
                type: 'first', curr: `[${sortedArr[0]}]`, last: '—', overlap: '—', action: 'Append First',
                sortedTiles: sortedArr.map((v, idx) => ({
                    val: `[${v[0]},${v[1]}]`, 
                    state: idx === 0 ? 'candidate' : 'idle'
                })),
                mergedTiles: merged.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'winning'})),
                panel: `Initialize merged list with the first interval [${sortedArr[0][0]},${sortedArr[0][1]}]`,
                statusText: `Added first interval to merged list.`,
                log: `Initialized merged list with [${sortedArr[0][0]},${sortedArr[0][1]}]`,
                logColor: 'var(--text-main)'
            });

            for (let i = 1; i < n; i++) {
                let current = sortedArr[i];
                let lastMerged = merged[merged.length - 1];

                // STEP 3: Compare
                steps.push({
                    type: 'compare', 
                    curr: `[${current[0]},${current[1]}]`, 
                    last: `[${lastMerged[0]},${lastMerged[1]}]`, 
                    overlap: 'Checking...', 
                    action: 'Compare',
                    sortedTiles: sortedArr.map((v, idx) => ({
                        val: `[${v[0]},${v[1]}]`,
                        state: idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')
                    })),
                    mergedTiles: merged.map((v, idx) => ({
                        val: `[${v[0]},${v[1]}]`,
                        state: idx === merged.length - 1 ? 'comparing' : 'idle'
                    })),
                    panel: `Comparing Current [${current[0]},${current[1]}] with Last Merged [${lastMerged[0]},${lastMerged[1]}]`,
                    statusText: `Checking for overlap: is ${current[0]} <= ${lastMerged[1]}?`,
                    log: `Checking overlap: Current [${current[0]},${current[1]}] vs Last Merged [${lastMerged[0]},${lastMerged[1]}]`,
                    logColor: 'var(--text-main)'
                });

                if (current[0] <= lastMerged[1]) {
                    // Overlap
                    let maxEnd = Math.max(lastMerged[1], current[1]);
                    let oldEnd = lastMerged[1];
                    merged[merged.length - 1][1] = maxEnd;

                    steps.push({
                        type: 'merge', 
                        curr: `[${current[0]},${current[1]}]`, 
                        last: `[${lastMerged[0]},${oldEnd}]`, 
                        overlap: `<span style="color:var(--accent-green)">Yes (${current[0]} <= ${oldEnd})</span>`, 
                        action: 'Merge (Expand)',
                        sortedTiles: sortedArr.map((v, idx) => ({
                            val: `[${v[0]},${v[1]}]`,
                            state: idx === i ? 'absorbed' : (idx <= i ? 'past' : 'idle')
                        })),
                        mergedTiles: merged.map((v, idx) => ({
                            val: `[${v[0]},${v[1]}]`,
                            state: idx === merged.length - 1 ? 'winning' : 'idle'
                        })),
                        panel: `<span style="color:var(--accent-green)">Overlap detected! Update end to max(${oldEnd}, ${current[1]}) = ${maxEnd}</span>`,
                        statusText: `Merged intervals. New interval: [${lastMerged[0]}, ${maxEnd}]`,
                        log: `  Overlap ✓ Merged into [${lastMerged[0]},${maxEnd}]`,
                        logColor: 'var(--accent-green)'
                    });
                } else {
                    // No overlap
                    merged.push([...current]);

                    steps.push({
                        type: 'append', 
                        curr: `[${current[0]},${current[1]}]`, 
                        last: `[${lastMerged[0]},${lastMerged[1]}]`, 
                        overlap: `<span style="color:var(--accent-red)">No (${current[0]} > ${lastMerged[1]})</span>`, 
                        action: 'Append',
                        sortedTiles: sortedArr.map((v, idx) => ({
                            val: `[${v[0]},${v[1]}]`,
                            state: idx === i ? 'candidate' : (idx <= i ? 'past' : 'idle')
                        })),
                        mergedTiles: merged.map((v, idx) => ({
                            val: `[${v[0]},${v[1]}]`,
                            state: idx === merged.length - 1 ? 'winning' : 'idle'
                        })),
                        panel: `<span style="color:var(--accent-orange)">No overlap. Appending [${current[0]},${current[1]}] to merged list.</span>`,
                        statusText: `No overlap. Appended current interval.`,
                        log: `  No overlap ✗ Appended [${current[0]},${current[1]}]`,
                        logColor: 'var(--accent-orange)'
                    });
                }
            }

            // FINAL STEP
            let finalStr = `[${merged.map(v => `[${v[0]},${v[1]}]`).join(', ')}]`;
            steps.push({
                type: 'final', curr: '—', last: '—', overlap: '—', action: 'Done',
                sortedTiles: sortedArr.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'past'})),
                mergedTiles: merged.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'winning'})),
                panel: 'Interval Traversal Complete',
                complete: true,
                finalStr: finalStr,
                statusText: `Done. Final merged intervals generated.`,
                log: `Final result: ${finalStr}`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Sorted Tiles
            const sContainer = document.getElementById('sorted-tiles');
            sContainer.innerHTML = '';
            step.sortedTiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                sContainer.appendChild(wrapper);
            });

            // Render Merged Tiles
            const mContainer = document.getElementById('merged-tiles');
            mContainer.innerHTML = '';
            if (step.mergedTiles.length === 0) {
                const empty = document.createElement('div');
                empty.style.color = 'var(--text-dim)';
                empty.style.fontFamily = 'monospace';
                empty.style.paddingTop = '12px';
                empty.innerText = '[]';
                mContainer.appendChild(empty);
            } else {
                step.mergedTiles.forEach((t, i) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'tile-unit';
                    const tile = document.createElement('div');
                    tile.className = `tile ${t.state}`;
                    tile.innerText = t.val;
                    const idxLabel = document.createElement('div');
                    idxLabel.className = 'tile-index';
                    idxLabel.innerText = `[${i}]`;
                    wrapper.append(tile, idxLabel);
                    mContainer.appendChild(wrapper);
                });
            }

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-curr').innerText = step.curr;
            document.getElementById('val-last').innerText = step.last;
            document.getElementById('val-overlap').innerHTML = step.overlap;
            document.getElementById('val-action').innerText = step.action;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.finalStr : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerHTML = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
