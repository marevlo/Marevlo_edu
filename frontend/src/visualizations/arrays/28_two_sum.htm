<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Sum - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"], input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .arr-input { width: 260px; }
        .target-input { width: 60px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.defeated { background: #2a0d0d; border: 2px solid var(--accent-red); color: var(--accent-red); opacity: 0.8; }
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.8; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 550px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 100px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 700px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="arr-input" class="arr-input" placeholder="2, 7, 11, 15">
        <label class="ui-label">target =</label>
        <input type="number" id="target-input" class="target-input" placeholder="9">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([2, 7, 11, 15], 9)">Ex 1</button>
        <button onclick="loadExample([3, 2, 4], 6)">Ex 2</button>
    </div>

    <div class="array-container">
        <div class="ui-label" style="font-size: 12px; white-space: nowrap;">nums =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Index i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Index j</span>
            <span class="info-value" id="val-j" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Sum</span>
            <span class="info-value" id="val-sum" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Target</span>
            <span class="info-value" id="val-target" style="color: var(--accent-purple);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Result Indices =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> First Element (i)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Second Element (j)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red)"></span> Sum != Target</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); box-shadow: 0 0 6px var(--accent-green);"></span> Match Found</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [2, 7, 11, 15];
        let target = 9;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([2, 7, 11, 15], 9); }

        function loadExample(newArr, newTarget) {
            arr = [...newArr];
            target = parseInt(newTarget);
            document.getElementById('arr-input').value = arr.join(', ');
            document.getElementById('target-input').value = target;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valArr = document.getElementById('arr-input').value;
            const parsedArr = valArr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const valTarget = parseInt(document.getElementById('target-input').value);
            
            if (parsedArr.length > 0 && !isNaN(valTarget)) {
                loadExample(parsedArr.slice(0, 15), valTarget); // Limit length for visualization
            }
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;
            let finalResult = "[]";
            let found = false;

            // STEP 0: INIT
            steps.push({
                type: 'init', i: '—', j: '—', sum: '—',
                tiles: arr.map(v => ({val: v, state: 'idle'})),
                panel: '—',
                statusText: `nums=[${arr.join(', ')}], target=${target}. Click Play to begin.`,
                log: `n=${n}, target=${target}. Starting Brute Force O(n²) nested loop search.`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 0; i < n - 1; i++) {
                
                // STEP A: Select i
                steps.push({
                    type: 'outer', i: i, j: '—', sum: '—',
                    tiles: arr.map((v, idx) => ({
                        val: v,
                        state: idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')
                    })),
                    panel: `Outer loop: Select first number nums[${i}] = ${arr[i]}`,
                    statusText: `Selected nums[${i}] = ${arr[i]}`,
                    log: `i=${i}: Selected first number ${arr[i]}. Checking subsequent elements.`,
                    logColor: 'var(--accent-orange)'
                });

                for (let j = i + 1; j < n; j++) {
                    let currentSum = arr[i] + arr[j];

                    // STEP B: Select j and Compare
                    steps.push({
                        type: 'inner', i: i, j: j, sum: currentSum,
                        tiles: arr.map((v, idx) => ({
                            val: v,
                            state: idx === i ? 'candidate' : 
                                   (idx === j ? 'comparing' : 
                                   (idx < i ? 'past' : 'idle'))
                        })),
                        panel: `Check pair: nums[${i}] + nums[${j}] = ${arr[i]} + ${arr[j]} = ${currentSum}`,
                        statusText: `Checking pair sum against target ${target}...`,
                        log: `  j=${j}: Check ${arr[i]} + ${arr[j]} = ${currentSum}`,
                        logColor: 'var(--text-main)'
                    });

                    if (currentSum === target) {
                        found = true;
                        finalResult = `[${i}, ${j}]`;
                        
                        // STEP C: Match Found
                        steps.push({
                            type: 'match', i: i, j: j, sum: currentSum,
                            tiles: arr.map((v, idx) => ({
                                val: v,
                                state: (idx === i || idx === j) ? 'winning' : 'past'
                            })),
                            panel: `<span style="color:var(--accent-green)">✓ Match! ${arr[i]} + ${arr[j]} == ${target}</span>`,
                            statusText: `Target reached! Returning indices [${i}, ${j}]`,
                            log: `  Sum ${currentSum} == ${target} ✓ Found pair at indices [${i}, ${j}].`,
                            logColor: 'var(--accent-green)'
                        });
                        break;
                    } else {
                        // STEP D: No Match
                        steps.push({
                            type: 'nomatch', i: i, j: j, sum: currentSum,
                            tiles: arr.map((v, idx) => ({
                                val: v,
                                state: idx === i ? 'candidate' : 
                                       (idx === j ? 'defeated' : 
                                       (idx < i ? 'past' : 'idle'))
                            })),
                            panel: `<span style="color:var(--accent-red)">✗ ${currentSum} != ${target}</span>`,
                            statusText: `Sum is ${currentSum}, not equal to target. Continuing.`,
                            log: `  Sum ${currentSum} != ${target} ✗`,
                            logColor: 'var(--accent-red)'
                        });
                    }
                }
                if (found) break;
            }

            if (!found) {
                steps.push({
                    type: 'not-found', i: '—', j: '—', sum: '—',
                    tiles: arr.map(v => ({val: v, state: 'past'})),
                    panel: `<span style="color:var(--accent-orange)">No pair found that sums to ${target}.</span>`,
                    statusText: `Search exhausted. No solution.`,
                    log: `Checked all pairs. No solution found.`,
                    logColor: 'var(--accent-orange)'
                });
            }

            // FINAL STEP
            steps.push({
                type: 'final', i: '—', j: '—', sum: '—',
                tiles: steps[steps.length-1].tiles,
                panel: 'Array Traversal Complete',
                complete: true,
                result: finalResult,
                statusText: found ? `Done. Pair found at indices ${finalResult}.` : `Done. No pair found.`,
                log: `Final result: indices ${finalResult}`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-i').innerText = step.i;
            document.getElementById('val-j').innerText = step.j;
            document.getElementById('val-sum').innerText = step.sum;
            document.getElementById('val-target').innerText = target;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
