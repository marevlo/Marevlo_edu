<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Sum (Hashmap) - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* complement / target               */
            --accent-blue:   #06b6d4;   /* scan pointer / chrome              */
            --accent-green:  #22c55e;   /* match / answer                     */
            --accent-red:    #f43f5e;   /* complement not found (miss)        */
            --accent-purple: #a855f7;   /* seen-map insert                    */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"], input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .arr-input { width: 230px; }
        .target-input { width: 70px; }
        input:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .stage-grid { display: flex; gap: 22px; padding: 28px 22px 24px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }

        /* The 1D array-scan idiom: ONE row of tiles + index labels */
        .scan-board { position: relative; display: inline-flex; flex-direction: column; gap: 0; overflow: auto; scrollbar-width: thin; }
        .scan-board::-webkit-scrollbar { height: 8px; }
        .scan-board::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .row-label { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
        .cell-row { display: flex; gap: 10px; }
        .col { display: flex; flex-direction: column; align-items: center; }

        .cell {
            position: relative;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-family: var(--mono); font-weight: 800; font-size: 18px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            width: 52px; height: 52px; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .idx-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 6px; transition: color 0.3s; }
        .idx-label.lit { color: var(--accent-blue); }

        /* the scan pointer (current index i) */
        .num-cell.current  { border-color: var(--accent-blue); background: rgba(6,182,212,0.16); color: #a5f3fc; box-shadow: 0 0 20px rgba(6,182,212,0.50), inset 0 0 12px rgba(6,182,212,0.12); transform: scale(1.08); z-index: 2; }
        /* miss flash: complement not in the map yet */
        .num-cell.miss     { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 22px rgba(244,63,94,0.50); transform: scale(1.08); z-index: 2; }
        /* already inserted into the seen-map */
        .num-cell.seen     { border-color: rgba(168,85,247,0.55); background: rgba(168,85,247,0.10); color: #e9d5ff; }
        /* the matched complement (partner of the answer) */
        .num-cell.partner  { border-color: var(--accent-orange); background: rgba(245,165,36,0.18); color: #ffd591; box-shadow: 0 0 18px rgba(245,165,36,0.45); z-index: 2; }
        /* the final answer pair */
        .num-cell.answer   { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.85), rgba(33,194,117,0.85)); color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.45); }
        .num-cell.dim      { opacity: 0.4; color: var(--text-dim); }

        /* a small pointer triangle that sits above the current tile */
        .scan-arrow { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); color: var(--accent-blue); font-size: 14px; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
        .num-cell.current .scan-arrow { opacity: 1; }
        .num-cell.miss    .scan-arrow { opacity: 1; color: var(--accent-red); }

        /* SEEN hashmap side panel */
        .seen-panel { min-width: 200px; display: inline-flex; flex-direction: column; }
        .seen-rows { display: flex; flex-direction: column; gap: 6px; min-height: 40px; }
        .seen-empty { font-family: var(--mono); font-size: 12px; color: var(--text-dim); padding: 8px 4px; font-style: italic; }
        .seen-entry { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 13px; padding: 6px 10px; border-radius: 9px; border: 1px solid var(--border-main); background: rgba(255,255,255,0.04); transition: border-color 0.3s, background 0.3s, box-shadow 0.3s; }
        .seen-entry .k { color: #e9d5ff; font-weight: 800; min-width: 26px; text-align: right; }
        .seen-entry .map-arrow { color: var(--text-dim); }
        .seen-entry .vi { color: var(--text-dim); }
        .seen-entry .vi b { color: var(--text-main); font-weight: 800; }
        .seen-entry.fresh { border-color: rgba(168,85,247,0.6); background: rgba(168,85,247,0.12); box-shadow: 0 0 14px rgba(168,85,247,0.30); }
        .seen-entry.hit   { border-color: var(--accent-green); background: rgba(34,197,94,0.14); box-shadow: 0 0 14px rgba(34,197,94,0.35); }
        .seen-entry.hit .k { color: #bbf7d0; }

        /* complement lookup chip */
        .lookup-box { font-family: var(--mono); font-size: 12.5px; color: var(--text-dim); margin-top: 12px; padding: 8px 12px; border-radius: 10px; border: 1px dashed var(--border-main); background: rgba(255,255,255,0.02); line-height: 1.6; min-height: 40px; }
        .lookup-box b { color: var(--accent-orange); }
        .lookup-box .ok { color: var(--accent-green); font-weight: 800; }
        .lookup-box .no { color: var(--accent-red); font-weight: 800; }

        .action-stage { position: relative; min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 6px; align-items: center; min-height: 40px; flex-wrap: wrap; justify-content: center; }
        .ans-tile { min-width: 40px; height: 44px; padding: 0 8px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 19px; font-weight: 800; border: 2px solid var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0; box-shadow: 0 0 12px rgba(34,197,94,0.35); }
        .ans-tile .ans-sub { font-size: 10px; color: var(--text-dim); margin-left: 4px; align-self: flex-end; margin-bottom: 4px; }
        .ans-eq { font-family: var(--mono); font-size: 18px; font-weight: 800; color: var(--text-dim); }
        .ans-sum { min-width: 64px; height: 44px; padding: 0 12px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 20px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.18); color: #ffd591; box-shadow: 0 0 14px rgba(245,165,36,0.4); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-blue); } .pill.v b { color: var(--accent-purple); } .pill.s b { color: var(--accent-orange); } .pill.d b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="arr-input" class="arr-input" value="[2,7,11,15]" maxlength="60">
        <label class="ui-label">target =</label>
        <input type="number" id="target-input" class="target-input" value="9">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">[2,7,11,15] t=9 &rarr; [0,1]</button>
        <button onclick="loadExample(1)">[3,2,4] t=6 &rarr; [1,2]</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Two Sum <span class="sub">&middot; Hashmap scan &middot; need = target &minus; nums[i] &middot; O(n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="stage-grid">
                    <div class="scan-board">
                        <div class="row-label">nums[i] &middot; scan left &rarr; right</div>
                        <div class="cell-row" id="num-row"></div>
                        <div class="lookup-box" id="lookup-box">Complement lookup appears here&hellip;</div>
                    </div>
                    <div class="seen-panel">
                        <div class="row-label">seen &middot; value &rarr; index</div>
                        <div class="seen-rows" id="seen-rows"><div class="seen-empty">empty</div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill c">index i <b id="st-i">&mdash;</b></span>
                            <span class="pill v">nums[i] <b id="st-v">&mdash;</b></span>
                            <span class="pill s">need <b id="st-need">&mdash;</b></span>
                            <span class="pill d">answer <b id="st-ans">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // Motion engine (spring pop, zero deps)
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED || !el) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.55 + 0.55 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // State
        let nums = [2, 7, 11, 15];
        let target = 9;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 720, 330];
        const numEls = [];   // index -> tile element
        const idxEls = [];   // index -> index-label element

        const CODE = [
            [['kw','def '],['fn','twoSum'],['src','(nums, target):']],
            [['src','  seen = {}                  # value -> index']],
            [['kw','  for '],['src','i in 0..n-1:']],
            [['src','    need = target - nums[i]']],
            [['kw','    if '],['src','need in seen:']],
            [['kw','      return '],['src','[seen[need], i]']],
            [['src','    seen[nums[i]] = i']],
            [['kw','  return '],['src','[]               # no pair']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // step generation (immutable snapshots)
        function generateSteps() {
            steps = [];
            const n = nums.length;

            // base snapshot shape: every step carries a full, immutable view of state
            const snap = (extra) => Object.assign({
                i: null, need: null,
                seen: [],            // [{val, idx}] entries currently in the map (insertion order)
                freshKey: null,      // value just inserted into the map (purple flash)
                hitKey: null,        // value matched in the map (green hit)
                miss: false,         // current i has no complement yet
                partnerIdx: null,    // matched complement's index in the array
                ansL: null, ansR: null,  // answer pair indices (final/match)
                complete: false, answer: null, confetti: false,
                code: null, action: null, actionColor: null, panel: '', lookup: '', log: ''
            }, extra);

            steps.push(snap({
                code: [0, 1], action: 'TWO SUM', actionColor: 'var(--accent-blue)',
                panel: `Find two indices whose values add to <code>target = ${target}</code>. <code>nums = [${nums.join(', ')}]</code>. Scan once, remembering each value in a <b>seen</b> map &#8594; <code>O(n)</code>.`,
                lookup: `seen = {} &middot; scanning for the first pair that sums to ${target}.`,
                log: `init  nums = [${nums.join(',')}]  target = ${target}  (n=${n})`
            }));

            const seenMap = new Map();   // value -> index (the real algorithm structure)
            const seenList = [];         // snapshot-friendly ordered copy
            let answer = null;

            for (let i = 0; i < n; i++) {
                const v = nums[i];
                const need = target - v;
                const has = seenMap.has(need);

                if (has) {
                    const partnerIdx = seenMap.get(need);
                    answer = [partnerIdx, i];
                    steps.push(snap({
                        i, need,
                        seen: seenList.slice(),
                        hitKey: need, partnerIdx,
                        ansL: partnerIdx, ansR: i,
                        code: [3, 4, 5],
                        action: `MATCH [${partnerIdx},${i}]`, actionColor: 'var(--accent-green)',
                        panel: `At <b>i=${i}</b> (value ${v}): need <code>${target} &minus; ${v} = ${need}</code>. <b style="color:#bbf7d0">Found ${need} in seen</b> at index <code>${partnerIdx}</code> &#8594; pair <code>[${partnerIdx}, ${i}]</code>.`,
                        lookup: `need = ${target} &minus; ${v} = <b>${need}</b> &middot; <span class="ok">seen[${need}] = ${partnerIdx} &#10003;</span>`,
                        log: `i=${i}   need=${need}  HIT seen[${need}]=${partnerIdx}  -> pair [${partnerIdx},${i}]`
                    }));
                    break;
                }

                // miss: complement not present -> record this value and continue
                seenMap.set(v, i);
                seenList.push({ val: v, idx: i });
                steps.push(snap({
                    i, need,
                    seen: seenList.slice(),
                    freshKey: v, miss: true,
                    code: [3, 4, 6],
                    action: `store ${v}@${i}`, actionColor: 'var(--accent-purple)',
                    panel: `At <b>i=${i}</b> (value ${v}): need <code>${target} &minus; ${v} = ${need}</code>. <code>${need}</code> is <b>not</b> in seen, so store <code>${v} &#8594; ${i}</code> and move on.`,
                    lookup: `need = ${target} &minus; ${v} = <b>${need}</b> &middot; <span class="no">${need} not in seen</span> &middot; store ${v} &rarr; ${i}`,
                    log: `i=${i}   need=${need}  miss  store seen[${v}]=${i}`
                }));
            }

            if (answer) {
                const [l, r] = answer;
                steps.push(snap({
                    complete: true, confetti: true, code: [5], answer,
                    seen: seenList.slice(),
                    ansL: l, ansR: r, partnerIdx: l,
                    action: `✓ [${l}, ${r}]`, actionColor: 'var(--accent-green)',
                    panel: `Done. <code>nums[${l}] + nums[${r}] = ${nums[l]} + ${nums[r]} = ${target}</code>. The answer is <code><b>[${l}, ${r}]</b></code>.`,
                    lookup: `nums[${l}] + nums[${r}] = ${nums[l]} + ${nums[r]} = <b style="color:var(--accent-green)">${target}</b>`,
                    log: `done  result = [${l},${r}]  (${nums[l]} + ${nums[r]} = ${target})`
                }));
            } else {
                steps.push(snap({
                    complete: true, confetti: false, code: [7], answer: null,
                    seen: seenList.slice(),
                    action: 'NO PAIR', actionColor: 'var(--accent-orange)',
                    panel: `Scanned the whole array. No two values sum to <code>${target}</code>. Result is <code><b>[]</b></code>.`,
                    lookup: `no pair sums to ${target} &middot; result = []`,
                    log: `done  no pair sums to ${target}  result = []`
                }));
            }
        }

        // build persistent DOM skeleton (once per input load)
        function buildBoard() {
            const numRow = document.getElementById('num-row');
            numRow.innerHTML = '';
            numEls.length = 0; idxEls.length = 0;

            nums.forEach((v, i) => {
                const col = document.createElement('div'); col.className = 'col';
                const cell = document.createElement('div'); cell.className = 'cell num-cell';
                const arrow = document.createElement('span'); arrow.className = 'scan-arrow'; arrow.textContent = '▼';
                const valSpan = document.createElement('span'); valSpan.textContent = String(v);
                cell.appendChild(arrow); cell.appendChild(valSpan);
                const lab = document.createElement('div'); lab.className = 'idx-label'; lab.textContent = i;
                col.appendChild(cell); col.appendChild(lab); numRow.appendChild(col);
                numEls.push(cell); idxEls.push(lab);
            });
        }

        // render (pure function of steps[idx], persistent DOM)
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            for (let i = 0; i < nums.length; i++) {
                let cls = 'cell num-cell';
                const prevHad = numEls[i].classList.contains('current') || numEls[i].classList.contains('miss');
                const inSeen = step.seen.some(e => e.idx === i);

                if (step.complete && step.ansL != null) {
                    if (i === step.ansL || i === step.ansR) cls += ' answer';
                    else cls += ' dim';
                } else if (step.ansL != null) {
                    // match step: highlight the pair, partner orange, current green-ish via answer
                    if (i === step.ansR) cls += ' answer';
                    else if (i === step.partnerIdx) cls += ' partner';
                    else if (inSeen) cls += ' seen';
                    else cls += ' dim';
                } else {
                    if (step.i === i && step.miss) cls += ' miss';
                    else if (step.i === i) cls += ' current';
                    else if (inSeen) cls += ' seen';
                    else if (step.i != null && i > step.i) cls += ' dim';
                }

                numEls[i].className = cls;
                idxEls[i].className = 'idx-label' + (step.i === i && !step.complete ? ' lit' : '');

                const nowCur = numEls[i].classList.contains('current') || numEls[i].classList.contains('miss');
                if (nowCur && !prevHad) Motion.pop(numEls[i]);
                if (step.complete && step.ansL != null && (i === step.ansL || i === step.ansR)) Motion.pop(numEls[i]);
            }

            // SEEN hashmap side panel
            const seenRows = document.getElementById('seen-rows');
            seenRows.innerHTML = '';
            if (!step.seen.length) {
                const e = document.createElement('div'); e.className = 'seen-empty'; e.textContent = 'empty'; seenRows.appendChild(e);
            } else {
                step.seen.forEach(entry => {
                    const row = document.createElement('div'); row.className = 'seen-entry';
                    if (step.freshKey === entry.val && entry.idx === step.i) row.className += ' fresh';
                    if (step.hitKey === entry.val) row.className += ' hit';
                    const k = document.createElement('span'); k.className = 'k'; k.textContent = entry.val;
                    const ar = document.createElement('span'); ar.className = 'map-arrow'; ar.textContent = '→';
                    const vi = document.createElement('span'); vi.className = 'vi'; vi.innerHTML = `index <b>${entry.idx}</b>`;
                    row.appendChild(k); row.appendChild(ar); row.appendChild(vi);
                    seenRows.appendChild(row);
                    if (step.freshKey === entry.val && entry.idx === step.i) Motion.pop(row);
                });
            }

            document.getElementById('lookup-box').innerHTML = step.lookup || '&mdash;';

            // answer track on completion (the pair + the target sum)
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.complete && step.ansL != null) {
                const mk = (val, sub) => { const t = document.createElement('div'); t.className = 'ans-tile'; t.innerHTML = `${val}<span class="ans-sub">[${sub}]</span>`; return t; };
                at.appendChild(mk(nums[step.ansL], step.ansL));
                const plus = document.createElement('div'); plus.className = 'ans-eq'; plus.textContent = '+'; at.appendChild(plus);
                at.appendChild(mk(nums[step.ansR], step.ansR));
                const eq = document.createElement('div'); eq.className = 'ans-eq'; eq.textContent = '='; at.appendChild(eq);
                const s = document.createElement('div'); s.className = 'ans-sum'; s.textContent = target; at.appendChild(s);
            }

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete && step.ansL != null);
            mp.classList.toggle('miss', !!step.miss && !step.complete);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            document.getElementById('st-i').textContent = step.i != null ? step.i : '—';
            document.getElementById('st-v').textContent = step.i != null ? nums[step.i] : '—';
            document.getElementById('st-need').textContent = step.need != null ? step.need : '—';
            document.getElementById('st-ans').textContent = (step.complete && step.answer) ? `[${step.answer[0]}, ${step.answer[1]}]` : (step.complete ? '[]' : '—');

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // controls
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function loadData(arr, t) {
            pause(); nums = arr.slice(); target = t; confettiArmed = true;
            buildBoard(); generateSteps(); renderStep(0);
        }
        function loadCustom() {
            const raw = document.getElementById('arr-input').value;
            let parsed;
            try { parsed = JSON.parse(raw); }
            catch (e) { parsed = raw.split(',').map(x => parseInt(x.trim(), 10)).filter(x => !isNaN(x)); }
            const t = parseInt(document.getElementById('target-input').value, 10);
            if (Array.isArray(parsed) && parsed.length >= 2 && parsed.every(x => typeof x === 'number' && isFinite(x)) && parsed.length <= 14 && !isNaN(t)) {
                loadData(parsed, t);
            }
        }
        const EXAMPLES = [
            { nums: [2, 7, 11, 15], target: 9 },
            { nums: [3, 2, 4], target: 6 }
        ];
        function loadExample(n) {
            const ex = EXAMPLES[n];
            document.getElementById('arr-input').value = JSON.stringify(ex.nums);
            document.getElementById('target-input').value = ex.target;
            loadData(ex.nums, ex.target);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('arr-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        document.getElementById('target-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
