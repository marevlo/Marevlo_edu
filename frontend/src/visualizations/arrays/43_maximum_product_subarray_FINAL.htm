<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximum Product Subarray - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 260px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 50px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 16px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main); padding: 0 6px;
        }
        .tile-index { font-size: 10px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.past { opacity: 0.4; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 680px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.4;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 18px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="arr-input" placeholder="2, 3, -2, 4">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([2, 3, -2, 4])">Ex 1</button>
        <button onclick="loadExample([-2, 0, -1])">Ex 2</button>
        <button onclick="loadExample([-2, 3, -4])">Ex 3</button>
    </div>

    <div class="array-container">
        <div class="ui-label" style="font-size: 12px;">Array:</div>
        <div class="tiles-wrapper" id="arr-tiles"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Index (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">nums[i]</span>
            <span class="info-value" id="val-val" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Max</span>
            <span class="info-value" id="val-cMax" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Min</span>
            <span class="info-value" id="val-cMin" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Global Max</span>
            <span class="info-value" id="val-gMax" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">max product =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Current Element</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); box-shadow: 0 0 6px var(--accent-green);"></span> Global Max Updated</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Past / Pending</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [2, 3, -2, 4];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([2, 3, -2, 4]); }

        function loadExample(newArr) {
            arr = [...newArr];
            document.getElementById('arr-input').value = arr.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('arr-input').value;
            const parsedArr = valStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (parsedArr.length > 0) {
                loadExample(parsedArr.slice(0, 15));
            }
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;

            if (n === 0) return;

            let currMax = arr[0];
            let currMin = arr[0];
            let globalMax = arr[0];

            // STEP 0: INIT
            steps.push({
                type: 'init', i: 0, val: arr[0], cMax: currMax, cMin: currMin, gMax: globalMax,
                tiles: arr.map((v, idx) => ({val: v, state: idx === 0 ? 'candidate' : 'idle'})),
                panel: `Initialize tracking variables with the first element: <br> <code>currMax = ${arr[0]}</code>, <code>currMin = ${arr[0]}</code>, <code>globalMax = ${arr[0]}</code>`,
                statusText: `array=[${arr.join(', ')}], n=${n}. Click Play to begin.`,
                log: `n=${n}. Initialize currMax=${currMax}, currMin=${currMin}, globalMax=${globalMax}`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 1; i < n; i++) {
                let val = arr[i];
                let prevMax = currMax;
                let prevMin = currMin;

                let opt1 = val;
                let opt2 = prevMax * val;
                let opt3 = prevMin * val;

                // EVALUATE
                steps.push({
                    type: 'eval', i: i, val: val, cMax: prevMax, cMin: prevMin, gMax: globalMax,
                    tiles: arr.map((v, idx) => ({val: v, state: idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')})),
                    panel: `Calculate options for index ${i} (value ${val}):<br>1. Restart at current: <code>${val}</code><br>2. Extend max: <code>${prevMax} * ${val} = ${opt2}</code><br>3. Extend min: <code>${prevMin} * ${val} = ${opt3}</code>`,
                    statusText: `Evaluating options for current element...`,
                    log: `i=${i}: Options -> restart=${opt1}, extend max=${opt2}, extend min=${opt3}`,
                    logColor: 'var(--text-main)'
                });

                currMax = Math.max(opt1, opt2, opt3);
                currMin = Math.min(opt1, opt2, opt3);

                // UPDATE CURRENT
                steps.push({
                    type: 'update_curr', i: i, val: val, cMax: currMax, cMin: currMin, gMax: globalMax,
                    tiles: arr.map((v, idx) => ({val: v, state: idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')})),
                    panel: `Update <b>currMax</b> = max(${opt1}, ${opt2}, ${opt3}) = <span style="color:var(--accent-blue)">${currMax}</span><br>Update <b>currMin</b> = min(${opt1}, ${opt2}, ${opt3}) = <span style="color:var(--accent-purple)">${currMin}</span>`,
                    statusText: `Current max and min updated.`,
                    log: `  -> currMax=${currMax}, currMin=${currMin}`,
                    logColor: 'var(--accent-blue)'
                });

                // UPDATE GLOBAL MAX
                if (currMax > globalMax) {
                    globalMax = currMax;
                    steps.push({
                        type: 'update_global', i: i, val: val, cMax: currMax, cMin: currMin, gMax: globalMax,
                        tiles: arr.map((v, idx) => ({val: v, state: idx === i ? 'winning' : (idx < i ? 'past' : 'idle')})),
                        panel: `<span style="color:var(--accent-green)">New Global Max found!</span> <code>globalMax</code> updated to ${globalMax}.`,
                        statusText: `Global max updated.`,
                        log: `  -> New globalMax = ${globalMax} ✓`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final', i: '—', val: '—', cMax: currMax, cMin: currMin, gMax: globalMax,
                tiles: arr.map((v) => ({val: v, state: 'past'})),
                panel: 'Array Traversal Complete.',
                complete: true,
                result: globalMax,
                statusText: `Done. Maximum Product Subarray is ${globalMax}.`,
                log: `Final result: max product = ${globalMax}`,
                logColor: 'var(--accent-green)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Array
            const arrContainer = document.getElementById('arr-tiles');
            arrContainer.innerHTML = '';
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                arrContainer.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-i').innerText = step.i;
            document.getElementById('val-val').innerText = step.val;
            document.getElementById('val-cMax').innerText = step.cMax;
            document.getElementById('val-cMin').innerText = step.cMin;
            document.getElementById('val-gMax').innerText = step.gMax;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerHTML = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
