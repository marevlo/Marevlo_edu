<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Missing Positive - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 280px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
        }

        .tile.idle { color: var(--text-dim); }
        .tile.candidate { 
            background: #2a1600; 
            border: 2px solid var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.12); 
            z-index: 2; 
        }
        .tile.past { opacity: 0.4; }
        .tile.matched { border: 3px solid var(--accent-green); }

        /* ROW 3: SCAN PANEL */
        .sum-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 18px;
            min-width: 460px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #res-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
        #res-val { font-family: monospace; font-size: 16px; color: var(--text-dim); }
        .pop { 
            animation: popAnim 400ms ease; 
            color: var(--accent-green) !important; 
            font-size: 26px !important; 
            font-weight: 700;
            text-shadow: 0 0 16px var(--accent-green);
        }

        @keyframes popAnim {
            0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)}
        }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        /* ROW 7: CONTROLS */
        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        /* ROW 8: LEGEND */
        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 680px;
            max-width: 90%;
            height: 130px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-line { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">nums =</label>
        <input type="text" id="array-input" placeholder="3, 4, -1, 1" style="width: 280px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([3,4,-1,1])">Example 1</button>
        <button onclick="loadExample([7,8,9,11,12])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">nums =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="sum-panel" id="sum-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">expected</div>
            <div class="info-value" id="val-expected" style="color: var(--accent-blue);">1</div>
        </div>
        <div class="info-cell">
            <div class="info-label">current num</div>
            <div class="info-value" id="val-current" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">status</div>
            <div class="info-value" id="val-status" style="color: var(--accent-green);">—</div>
        </div>
    </div>

    <div class="result-display">
        <div id="res-label">first missing positive =</div>
        <div id="res-val">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> Current number being checked</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> Matched / Expected</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-blue);"></div> Expected value</div>
        <div class="legend-item"><div class="dot" style="background: var(--text-dim);"></div> Skipped / Past</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentArray = [3, 4, -1, 1];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample([3, 4, -1, 1]);
        }

        function loadExample(arr) {
            currentArray = arr.slice(0, 12);
            document.getElementById('array-input').value = currentArray.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (arr.length > 0) {
                currentArray = arr;
                generateSteps();
                reset();
            }
        }

        function generateSteps() {
            steps = [];
            const n = currentArray.length;
            let nums = currentArray.slice();

            // INIT
            steps.push({
                type: 'init',
                nums: nums.slice(),
                expected: 1,
                tileStates: Array(n).fill('idle'),
                scanText: '—',
                status: `nums = [${nums}] — Starting brute force (sort + scan)`,
                log: `Starting First Missing Positive — Brute Force O(n log n)`
            });

            // SORT STEP
            let sortedNums = nums.slice().sort((a, b) => a - b);
            steps.push({
                type: 'sort',
                nums: sortedNums.slice(),
                expected: 1,
                tileStates: Array(n).fill('idle'),
                scanText: `Sorted array → [${sortedNums}]`,
                status: `Sorted: [${sortedNums}]`,
                log: `Sorted array: [${sortedNums.join(', ')}]`,
                logColor: '#8b949e'
            });

            // SCAN
            let expected = 1;
            for (let i = 0; i < n; i++) {
                const num = sortedNums[i];

                let tileStates = Array(n).fill('past');
                tileStates[i] = 'candidate';

                steps.push({
                    type: 'check',
                    nums: sortedNums.slice(),
                    expected: expected,
                    tileStates: tileStates,
                    scanText: `num = ${num}, expected = ${expected}`,
                    status: `Checking ${num} | expected = ${expected}`,
                    log: `num = ${num}, expected = ${expected}`
                });

                if (num <= 0) {
                    steps.push({
                        type: 'skip',
                        nums: sortedNums.slice(),
                        expected: expected,
                        tileStates: tileStates,
                        scanText: `${num} ≤ 0 → skip`,
                        status: `Skipped non-positive ${num}`,
                        log: `Skipped ≤0`
                    });
                    continue;
                }

                if (num === expected) {
                    expected++;
                    steps.push({
                        type: 'match',
                        nums: sortedNums.slice(),
                        expected: expected,
                        tileStates: tileStates,
                        scanText: `Matched! expected becomes ${expected}`,
                        status: `Matched ${num} → expected = ${expected}`,
                        log: `Matched → expected++`,
                        logColor: 'var(--accent-green)'
                    });
                } 
                else if (num > expected) {
                    steps.push({
                        type: 'found',
                        nums: sortedNums.slice(),
                        expected: expected,
                        tileStates: tileStates,
                        scanText: `Gap found! ${num} > ${expected}`,
                        status: `Found missing positive: ${expected}`,
                        log: `Gap detected → missing = ${expected}`,
                        logColor: 'var(--accent-green)',
                        result: expected
                    });
                    break;
                }
            }

            // If no gap found
            if (!steps[steps.length-1].result) {
                steps.push({
                    type: 'final',
                    nums: sortedNums.slice(),
                    expected: expected,
                    tileStates: Array(n).fill('past'),
                    scanText: `All numbers 1 to ${expected-1} present`,
                    status: `All present → first missing = ${expected}`,
                    log: `Final result: ${expected}`,
                    logColor: 'var(--accent-blue)',
                    bold: true,
                    result: expected
                });
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.nums.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[i]}`;
                tile.innerText = val;
                const index = document.createElement('div');
                index.className = 'tile-index';
                index.innerText = `[${i}]`;
                wrapper.appendChild(tile);
                wrapper.appendChild(index);
                container.appendChild(wrapper);
            });

            const scanPanel = document.getElementById('sum-panel');
            scanPanel.innerHTML = step.scanText;

            document.getElementById('val-expected').innerText = step.expected;
            document.getElementById('val-current').innerText = (step.nums && step.tileStates) ? 
                step.nums.find((v, i) => step.tileStates[i] === 'candidate') || '—' : '—';

            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.status;

            // Cumulative Log
            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) { pause(); play(); }
        };

        window.onload = init;
    </script>
</body>
</html>
