<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest Rectangle in Histogram - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 280px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            width: 44px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            border-radius: 4px 4px 0 0;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            color: var(--text-main);
            border: 1px solid var(--border-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
        }

        .tile.idle { background: #21262d; }
        .tile.current { background: var(--accent-orange); transform: scale(1.1); border-color: var(--accent-orange); }
        .tile.expanding { background: #3fb95033; border-color: var(--accent-green); }
        .tile.past { opacity: 0.4; }

        .sum-panel {
            margin-top: 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            min-width: 520px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }

        .info-panel {
            margin-top: 12px;
            display: flex;
            gap: 12px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            min-width: 120px;
            text-align: center;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 18px; font-weight: 700; }

        .result-display {
            margin-top: 12px;
            font-size: 18px;
        }
        #res-val { font-family: monospace; transition: all 0.3s; }
        .pop { animation: popAnim 500ms ease; color: var(--accent-green) !important; font-size: 32px; }

        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); min-height: 1.4em; }

        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend {
            margin-top: 16px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }

        .log-panel {
            margin-top: 16px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 700px;
            max-width: 90%;
            height: 140px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">heights =</label>
        <input type="text" id="array-input" placeholder="2,1,5,6,2,3" style="width: 280px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([2,1,5,6,2,3])">Example 1</button>
        <button onclick="loadExample([1,2,3,4,5])">Example 2</button>
    </div>

    <div class="array-container" id="tiles-container"></div>

    <div class="sum-panel" id="sum-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">Current Bar</div>
            <div class="info-value" id="val-i" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Height</div>
            <div class="info-value" id="val-height" style="color: var(--accent-green);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Width</div>
            <div class="info-value" id="val-width" style="color: var(--accent-blue);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Area</div>
            <div class="info-value" id="val-area" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Max Area</div>
            <div class="info-value" id="val-max" style="color: var(--accent-green);">0</div>
        </div>
    </div>

    <div class="result-display">
        <div id="res-label">Largest Rectangle Area =</div>
        <div id="res-val">—</div>
    </div>

    <div class="status-bar" id="status-text">Ready...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> Current Bar</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> Expanding Range</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-blue);"></div> Max Area</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentArray = [2,1,5,6,2,3];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1600, 800, 400];

        function init() {
            loadExample([2,1,5,6,2,3]);
        }

        function loadExample(arr) {
            currentArray = arr.slice(0, 12);
            document.getElementById('array-input').value = currentArray.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (arr.length > 0) {
                currentArray = arr;
                generateSteps();
                reset();
            }
        }

        function generateSteps() {
            steps = [];
            const n = currentArray.length;
            let maxArea = 0;
            let bestLeft = 0, bestRight = 0, bestBar = 0;

            steps.push({
                type: 'init',
                heights: currentArray.slice(),
                i: -1,
                left: -1,
                right: -1,
                area: 0,
                maxArea: 0,
                tileStates: Array(n).fill('idle'),
                scanText: `Histogram with ${n} bars. Starting brute force O(n²)`,
                status: `Starting Largest Rectangle in Histogram — Brute Force`,
                log: `Starting Brute Force: For each bar, expand left & right`
            });

            for (let i = 0; i < n; i++) {
                const h = currentArray[i];
                let left = i;
                let right = i;

                // Expand left
                while (left > 0 && currentArray[left-1] >= h) left--;

                // Expand right
                while (right < n-1 && currentArray[right+1] >= h) right++;

                const width = right - left + 1;
                const area = h * width;

                let tileStates = Array(n).fill('idle');
                for (let k = left; k <= right; k++) {
                    tileStates[k] = 'expanding';
                }
                tileStates[i] = 'current';

                steps.push({
                    type: 'expand',
                    heights: currentArray.slice(),
                    i: i,
                    left: left,
                    right: right,
                    area: area,
                    maxArea: Math.max(maxArea, area),
                    tileStates: tileStates,
                    scanText: `Bar ${i} (h=${h}) → left=${left}, right=${right}, width=${width}, area=${area}`,
                    status: `Bar ${i} height=${h} → width=${width} → area=${area}`,
                    log: `i=${i} h=${h} → [${left}..${right}] width=${width} area=${area}`
                });

                if (area > maxArea) {
                    maxArea = area;
                    bestLeft = left;
                    bestRight = right;
                    bestBar = i;
                    steps.push({
                        type: 'new_max',
                        heights: currentArray.slice(),
                        i: i,
                        left: left,
                        right: right,
                        area: area,
                        maxArea: maxArea,
                        tileStates: tileStates,
                        scanText: `New maximum area = ${area}`,
                        status: `New max area = ${area} (from bar ${i})`,
                        log: `New max area updated to ${area}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            steps.push({
                type: 'final',
                heights: currentArray.slice(),
                i: bestBar,
                left: bestLeft,
                right: bestRight,
                area: maxArea,
                maxArea: maxArea,
                tileStates: Array(n).fill('past'),
                scanText: `Final largest area = ${maxArea}`,
                status: `Completed. Largest rectangle area = ${maxArea}`,
                log: `Final Result: ${maxArea}`,
                logColor: 'var(--accent-blue)',
                bold: true,
                result: maxArea
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';

            const maxH = Math.max(...step.heights);
            step.heights.forEach((h, i) => {
                const unit = document.createElement('div');
                unit.className = 'tile-unit';

                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[i]}`;
                const heightPx = Math.max(30, (h / maxH) * 180);
                tile.style.height = `${heightPx}px`;
                tile.innerText = h;

                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;

                unit.appendChild(tile);
                unit.appendChild(idxLabel);
                container.appendChild(unit);
            });

            document.getElementById('sum-panel').innerHTML = step.scanText || '—';

            document.getElementById('val-i').innerText = step.i !== undefined ? step.i : '—';
            document.getElementById('val-height').innerText = step.i !== undefined && step.i >= 0 ? step.heights[step.i] : '—';
            document.getElementById('val-width').innerText = (step.left !== undefined && step.right !== undefined) ? (step.right - step.left + 1) : '—';
            document.getElementById('val-area').innerText = step.area || '—';
            document.getElementById('val-max').innerText = step.maxArea || 0;

            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.status || '';

            const logEl = document.getElementById('log');
            logEl.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logEl.appendChild(line);
                }
            }
            logEl.scrollTop = logEl.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) { pause(); play(); }
        };

        window.onload = init;
    </script>
</body>
</html>
