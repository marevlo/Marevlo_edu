<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Window Subsequence - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        button {
            height: 32px; border-radius: 6px; padding: 0 16px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px;
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1300px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .s-area, .t-area, .window-area {
            background: var(--bg-surface);
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 15px;
            width: 420px;
        }

        .s-area { border-color: var(--accent-blue); }
        .t-area { border-color: var(--accent-purple); }
        .window-area { border-color: var(--accent-green); }

        .tiles {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 15px 0;
            font-size: 18px;
        }

        .tile {
            min-width: 42px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background: #21262d;
            border: 2px solid var(--border-main);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tile.current {
            border-color: var(--accent-orange);
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--accent-orange);
        }

        .tile.matched {
            border-color: var(--accent-green);
            background: #0f2a1a;
        }

        .action-panel {
            margin-top: 25px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 16px 22px;
            width: 860px;
            text-align: center;
            font-family: monospace;
            min-height: 110px;
            font-size: 15px;
            line-height: 1.5;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .log-panel {
            margin-top: 15px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 860px;
            height: 180px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13.5px;
        }

        .result {
            font-size: 28px;
            font-weight: bold;
            color: var(--accent-green);
            margin: 12px 0;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <button onclick="loadExample(0)">Example 1: abcdebdde + bde</button>
        <button onclick="loadExample(1)">Example 2: ... + k</button>
        <button onclick="resetAll()">Reset</button>
    </div>

    <div class="visual-container">
        <!-- Main Sequence S -->
        <div class="s-area">
            <div style="color:var(--accent-blue); font-weight:bold; margin-bottom:8px;">Sequence S</div>
            <div id="s-tiles" class="tiles"></div>
        </div>

        <!-- Target T -->
        <div class="t-area">
            <div style="color:var(--accent-purple); font-weight:bold; margin-bottom:8px;">Target T</div>
            <div id="t-tiles" class="tiles"></div>
        </div>

        <!-- Current Window -->
        <div class="window-area">
            <div style="color:var(--accent-green); font-weight:bold; margin-bottom:8px;">Current Window</div>
            <div id="window-tiles" class="tiles"></div>
            <div class="result" id="result-display">Min Window: —</div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Click Play to start demonstration</div>

    <div class="controls">
        <button onclick="resetAll()">↺ Reset</button>
        <button onclick="backStep()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="nextStep()">Next →</button>
        <span style="margin-left:20px; font-size:13px;">Speed:</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log-container"></div>

    <script>
        let S = "";
        let T = "";
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1350, 780, 380];

        function init() {
            const _p = new URLSearchParams(window.location.search); loadExample(parseInt(_p.get('example') || '0'));
        }

        function loadExample(ex) {
            if (ex === 0) {
                S = "abcdebdde";
                T = "bde";
            } else {
                S = "jmeqksfrsdcmsiwvaovztaqenprpvnbstl";
                T = "k";
            }
            steps = [];
            document.getElementById('log-container').innerHTML = '';

            addStep(`S = "<b>${S}</b>", T = "<b>${T}</b>"`, true);
            addStep(`n = ${S.length}, m = ${T.length}, min_len = ∞`);

            let minLen = Infinity;
            let bestWindow = "";

            for (let i = 0; i < S.length; i++) {
                for (let j = i; j < S.length; j++) {
                    // Check if T is subsequence of S[i..j]
                    let tIdx = 0;
                    let matchProgress = [];
                    for (let k = i; k <= j; k++) {
                        if (tIdx < T.length && S[k] === T[tIdx]) {
                            tIdx++;
                            matchProgress.push(k);
                        }
                    }

                    const windowStr = S.substring(i, j + 1);
                    const len = j - i + 1;

                    addStep(`Window [${i}:${j}] = "<b>${windowStr}</b>" (len=${len}), t_progress=${tIdx}/${T.length}`);

                    if (tIdx === T.length) {
                        if (len < minLen) {
                            minLen = len;
                            bestWindow = windowStr;
                            addStep(`✅ New minimum window: "<b>${bestWindow}</b>" (len=${minLen})`, true);
                        }
                    }
                }
            }

            const finalResult = minLen === Infinity ? "" : bestWindow;
            addStep(`Final minimum window: "<b>${finalResult}</b>"`, true);

            stepIndex = 0;
            renderStep(0);
        }

        function addStep(text) {
            steps.push({
                panel: text,
                log: text
            });
        }

        function renderTiles(containerId, str, highlightStart = -1, highlightEnd = -1, matchPositions = []) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let idx = 0; idx < str.length; idx++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.textContent = str[idx];
                if (highlightStart !== -1 && idx >= highlightStart && idx <= highlightEnd) {
                    tile.classList.add('current');
                }
                if (matchPositions.includes(idx)) {
                    tile.classList.add('matched');
                }
                container.appendChild(tile);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            renderTiles('s-tiles', S);
            renderTiles('t-tiles', T);

            // Try to extract window from step text
            const windowMatch = step.panel.match(/Window \[(\d+):(\d+)\] = "([^"]+)"/);
            let currentI = -1, currentJ = -1;
            if (windowMatch) {
                currentI = parseInt(windowMatch[1]);
                currentJ = parseInt(windowMatch[2]);
                renderTiles('window-tiles', windowMatch[3], 0, windowMatch[3].length - 1);
            } else {
                renderTiles('window-tiles', "");
            }

            document.getElementById('main-panel').innerHTML = step.panel;

            const logDiv = document.getElementById('log-container');
            logDiv.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.margin = '4px 0';
                line.innerHTML = steps[i].log;
                logDiv.appendChild(line);
            }
            logDiv.scrollTop = logDiv.scrollHeight;

            // Update final result if available
            if (step.panel.includes('Final minimum window')) {
                document.getElementById('result-display').textContent = `Min Window: ${step.panel.match(/"([^"]+)"/)[1]}`;
            }
        }

        function nextStep() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function backStep() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function resetAll() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(nextStep, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
