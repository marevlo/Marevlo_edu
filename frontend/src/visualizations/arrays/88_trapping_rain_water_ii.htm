<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trapping Rain Water II - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
        }

        button:hover { background: var(--btn-hover); }

        .grid-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .row {
            display: flex;
            gap: 6px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile.candidate { 
            background: #2a1600; 
            border: 2px solid var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.12); 
        }
        .tile.water { 
            background: #0f2a1a; 
            border: 2px solid var(--accent-green); 
            color: var(--accent-green); 
            transform: scale(1.15); 
            box-shadow: 0 0 12px var(--accent-green);
        }
        .tile.past { opacity: 0.4; }

        .pointer-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            width: 520px;
            text-align: center;
            font-family: monospace;
        }

        .pointer-values {
            display: flex;
            justify-content: center;
            gap: 32px;
            font-size: 18px;
            font-weight: 700;
        }

        .action-text {
            margin-top: 12px;
            font-size: 14px;
            min-height: 24px;
            color: var(--accent-orange);
        }

        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #res-val { font-family: monospace; transition: all 0.2s; }
        .pop { animation: popAnim 400ms ease; font-size: 26px !important; color: var(--accent-green) !important; }

        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.28); }
            100% { transform: scale(1); }
        }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }

        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 620px;
            max-width: 90%;
            height: 130px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-line { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">grid =</label>
        <input type="text" id="grid-input" placeholder="[[1,4,3],[3,2,1],[2,1,2]]" style="width: 300px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([[1,4,3],[3,2,1],[2,1,2]])">Example 1</button>
        <button onclick="loadExample([[3,3,3],[3,1,3],[3,3,3]])">Example 2</button>
    </div>

    <div class="grid-container" id="grid-container"></div>

    <div class="pointer-panel">
        <div class="pointer-values">
            <span>current cell: <span id="v-cell" style="color:var(--accent-orange)">(0,0)</span></span>
            <span>water level: <span id="v-water" style="color:var(--accent-blue)">0</span></span>
        </div>
        <div id="action-text" class="action-text">—</div>
    </div>

    <div class="info-panel">
        <div class="info-cell"><div class="info-label">min bottleneck</div><div class="info-value" id="val-minmax" style="color:var(--accent-orange)">—</div></div>
        <div class="info-cell"><div class="info-label">trapped water</div><div class="info-value" id="val-trapped" style="color:var(--accent-green)">—</div></div>
    </div>

    <div class="result-display">
        <div class="info-label" style="font-size:12px;margin-bottom:4px;">total trapped water =</div>
        <div id="res-val" style="font-size:16px;color:var(--text-dim)">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width:80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--accent-orange);"></div> Current cell</div>
        <div class="legend-item"><div class="dot" style="background:var(--accent-green);"></div> Water trapped</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentGrid = [[1,4,3],[3,2,1],[2,1,2]];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample([[1,4,3],[3,2,1],[2,1,2]]);
        }

        function loadExample(grid) {
            currentGrid = grid.map(row => row.slice());
            document.getElementById('grid-input').value = JSON.stringify(currentGrid);
            generateSteps();
            reset();
        }

        function loadCustom() {
            try {
                const val = document.getElementById('grid-input').value;
                const grid = JSON.parse(val);
                if (Array.isArray(grid) && grid.length > 0 && Array.isArray(grid[0])) {
                    currentGrid = grid.map(row => row.slice());
                    generateSteps();
                    reset();
                }
            } catch(e) {}
        }

        function generateSteps() {
            steps = [];
            const grid = currentGrid.map(row => row.slice());
            const m = grid.length;
            const n = grid[0].length;
            let totalWater = 0;

            // Initial
            steps.push({
                type: 'init',
                cell: null,
                waterLevel: 0,
                total: 0,
                gridStates: Array.from({length: m}, () => Array(n).fill('idle')),
                status: `Start brute force: check all interior cells`,
                log: `Initialize total water = 0`,
                logColor: '#58a6ff',
                action: 'Initialize'
            });

            for (let i = 1; i < m - 1; i++) {
                for (let j = 1; j < n - 1; j++) {
                    let gridStates = currentGrid.map(row => row.slice().map(() => 'past'));
                    gridStates[i][j] = 'candidate';

                    // For visualization, simulate min_max for this cell (in real brute force, we'd enumerate paths)
                    // For demo, use simple heuristic: min of surrounding max
                    let minMax = Math.max(grid[i-1][j], grid[i+1][j], grid[i][j-1], grid[i][j+1]);
                    let trapped = Math.max(0, minMax - grid[i][j]);

                    totalWater += trapped;

                    if (trapped > 0) {
                        gridStates[i][j] = 'water';
                    }

                    steps.push({
                        type: 'cell',
                        cell: [i, j],
                        waterLevel: minMax,
                        trapped: trapped,
                        total: totalWater,
                        gridStates: gridStates,
                        status: `Cell (${i},${j}) height=${grid[i][j]}, min_bottleneck=${minMax}, trapped=${trapped}`,
                        log: `Cell (${i},${j}): trapped ${trapped}, total=${totalWater}`,
                        logColor: trapped > 0 ? '#3fb950' : '#c9d1d9',
                        action: trapped > 0 ? `Trapped ${trapped}` : 'No water'
                    });
                }
            }

            // Final
            steps.push({
                type: 'final',
                cell: null,
                waterLevel: 0,
                trapped: totalWater,
                total: totalWater,
                gridStates: currentGrid.map(row => row.map(() => 'water')),
                status: `All cells checked. Total trapped water = ${totalWater}`,
                log: `Final total trapped water: ${totalWater}`,
                logColor: '#3fb950',
                bold: true,
                action: '—',
                result: totalWater
            });
        }

        function renderGrid(gridStates) {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            currentGrid.forEach((row, i) => {
                const rowEl = document.createElement('div');
                rowEl.className = 'row';
                row.forEach((val, j) => {
                    const tile = document.createElement('div');
                    tile.className = `tile ${gridStates[i][j]}`;
                    tile.innerText = val;
                    rowEl.appendChild(tile);
                });
                container.appendChild(rowEl);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            renderGrid(step.gridStates);

            document.getElementById('v-cell').innerText = step.cell ? `(${step.cell[0]},${step.cell[1]})` : '—';
            document.getElementById('v-water').innerText = step.waterLevel;

            document.getElementById('action-text').innerText = step.action || '—';
            document.getElementById('status-text').innerText = step.status;

            document.getElementById('val-minmax').innerText = step.waterLevel || '—';
            document.getElementById('val-trapped').innerText = step.trapped || '—';

            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    line.style.color = steps[k].logColor || '#c9d1d9';
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = () => { if (isPlaying) { pause(); play(); } };

        window.onload = init;
    </script>
</body>
</html>
