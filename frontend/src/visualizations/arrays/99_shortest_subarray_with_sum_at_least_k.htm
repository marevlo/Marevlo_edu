<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortest Subarray with Sum at Least K - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        button {
            height: 32px; border-radius: 6px; padding: 0 16px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px;
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .original-area, .subarray-area {
            background: var(--bg-surface);
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 15px;
            width: 420px;
        }

        .original-area { border-color: var(--accent-blue); }
        .subarray-area { border-color: var(--accent-green); }

        .tiles {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 15px 0;
        }

        .tile {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            background: #21262d;
            border: 2px solid var(--border-main);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tile.current {
            border-color: var(--accent-orange);
            transform: scale(1.12);
            box-shadow: 0 0 18px var(--accent-orange);
        }

        .tile.in-subarray {
            border-color: var(--accent-green);
            background: #0f2a1a;
        }

        .info {
            margin-top: 12px;
            font-family: monospace;
            font-size: 14px;
            background: #000000;
            padding: 8px;
            border-radius: 4px;
        }

        .action-panel {
            margin-top: 25px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 16px 22px;
            width: 860px;
            text-align: center;
            font-family: monospace;
            min-height: 100px;
            font-size: 15px;
            line-height: 1.5;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .log-panel {
            margin-top: 15px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 860px;
            height: 180px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13.5px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <button onclick="loadExample(0)">Example 1: [2,-1,2] k=3</button>
        <button onclick="loadExample(1)">Example 2: [1,2,3,4,5] k=11</button>
        <button onclick="resetAll()">Reset</button>
    </div>

    <div class="visual-container">
        <!-- Original Array -->
        <div class="original-area">
            <div style="color:var(--accent-blue); font-weight:bold; margin-bottom:8px;">Original Array</div>
            <div id="original-tiles" class="tiles"></div>
        </div>

        <!-- Current Subarray -->
        <div class="subarray-area">
            <div style="color:var(--accent-green); font-weight:bold; margin-bottom:8px;">Current Subarray</div>
            <div id="subarray-tiles" class="tiles"></div>
            <div class="info" id="sum-info">Sum: 0 | Length: 0</div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Click Play to start demonstration</div>

    <div class="controls">
        <button onclick="resetAll()">↺ Reset</button>
        <button onclick="backStep()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="nextStep()">Next →</button>
        <span style="margin-left:20px; font-size:13px;">Speed:</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log-container"></div>

    <script>
        let nums = [];
        let k = 0;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1450, 850, 420];

        function init() {
            const _p = new URLSearchParams(window.location.search); loadExample(parseInt(_p.get('example') || '0'));
        }

        function loadExample(ex) {
            if (ex === 0) {
                nums = [2, -1, 2];
                k = 3;
            } else {
                nums = [1, 2, 3, 4, 5];
                k = 11;
            }
            steps = [];
            document.getElementById('log-container').innerHTML = '';

            addStep(`Array: <b>[${nums.join(', ')}]</b>, k = ${k}`, true);
            addStep(`min_len initialized to ${nums.length + 1}`);

            let minLen = nums.length + 1;

            for (let i = 0; i < nums.length; i++) {
                let currentSum = 0;
                addStep(`Start i = ${i}, current_sum = 0`);

                for (let j = i; j < nums.length; j++) {
                    currentSum += nums[j];
                    const len = j - i + 1;
                    addStep(`j = ${j}: current_sum = ${currentSum}, length = ${len}`);

                    if (currentSum >= k) {
                        if (len < minLen) {
                            minLen = len;
                            addStep(`Found valid subarray [${i}..${j}], update min_len = ${minLen}`, true);
                        } else {
                            addStep(`Valid but not shorter`);
                        }
                    }
                }
            }

            const final = minLen === nums.length + 1 ? -1 : minLen;
            addStep(`Final shortest length: <b>${final}</b>`, true);

            stepIndex = 0;
            renderStep(0);
        }

        function addStep(text, highlight = false) {
            steps.push({
                panel: text,
                log: highlight ? `<span style="color:#3fb950">${text}</span>` : text
            });
        }

        function renderTiles(containerId, values, start = -1, end = -1) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            values.forEach((val, idx) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.textContent = val;
                if (idx >= start && idx <= end && start !== -1) {
                    tile.classList.add('in-subarray');
                }
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            renderTiles('original-tiles', nums);

            // Try to parse current i,j from panel
            const iMatch = step.panel.match(/i\s*=\s*(\d+)/);
            const jMatch = step.panel.match(/j\s*=\s*(\d+)/);
            const currentI = iMatch ? parseInt(iMatch[1]) : -1;
            const currentJ = jMatch ? parseInt(jMatch[1]) : -1;

            renderTiles('subarray-tiles', nums, currentI, currentJ);

            const sumMatch = step.panel.match(/current_sum\s*=\s*(-?\d+)/);
            const sumInfo = document.getElementById('sum-info');
            if (sumMatch) {
                sumInfo.textContent = `Sum: ${sumMatch[1]} | Length: ${currentJ !== -1 && currentI !== -1 ? currentJ - currentI + 1 : 0}`;
            } else {
                sumInfo.textContent = `Sum: — | Length: —`;
            }

            document.getElementById('main-panel').innerHTML = step.panel;

            const logDiv = document.getElementById('log-container');
            logDiv.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.margin = '4px 0';
                line.innerHTML = steps[i].log;
                logDiv.appendChild(line);
            }
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function nextStep() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function backStep() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function resetAll() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(nextStep, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
