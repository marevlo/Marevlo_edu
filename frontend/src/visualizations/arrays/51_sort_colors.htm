<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sort Colors - Dutch National Flag Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 240px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
        }

        /* Value-based region colors (0 = green, 1 = neutral, 2 = red) */
        .tile.zero { background: #0f2a1a; border: 1px solid var(--accent-green); color: var(--accent-green); }
        .tile.one  { background: #21262d; border: 1px solid var(--border-main); color: var(--text-main); }
        .tile.two  { background: #2a0d0d; border: 1px solid var(--accent-red); color: var(--accent-red); }

        /* Pointer highlights */
        .tile.pointer-low  { border: 3px solid var(--accent-green); transform: scale(1.15); box-shadow: 0 0 14px var(--accent-green); z-index: 3; }
        .tile.pointer-mid  { border: 3px solid var(--accent-blue);  transform: scale(1.15); box-shadow: 0 0 14px var(--accent-blue);  z-index: 3; }
        .tile.pointer-high { border: 3px solid var(--accent-red);   transform: scale(1.15); box-shadow: 0 0 14px var(--accent-red);   z-index: 3; }

        /* ROW 3: POINTERS + ACTION PANEL */
        .pointer-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            width: 520px;
            text-align: center;
            font-family: monospace;
        }

        .pointer-label { font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
        .pointer-values {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            font-size: 18px;
            font-weight: 700;
        }
        .pointer-values span.low  { color: var(--accent-green); }
        .pointer-values span.mid  { color: var(--accent-blue); }
        .pointer-values span.high { color: var(--accent-red); }
        .action-text {
            margin-top: 12px;
            font-size: 14px;
            min-height: 24px;
            color: var(--text-main);
        }

        /* ROW 4: INFO PANEL */
        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #res-val { font-family: monospace; transition: all 0.2s; }
        .pop { animation: popAnim 400ms ease; box-shadow: 0 0 16px var(--accent-green); }

        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.28); }
            100% { transform: scale(1); }
        }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        /* ROW 7: CONTROLS */
        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        /* ROW 8: LEGEND */
        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 600px;
            max-width: 90%;
            height: 130px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-line { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">array =</label>
        <input type="text" id="array-input" placeholder="2, 0, 2, 1, 1, 0">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([2,0,2,1,1,0])">Example 1</button>
        <button onclick="loadExample([2,1,0])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <!-- POINTERS + ACTION PANEL -->
    <div class="pointer-panel" id="pointer-panel">
        <div class="pointer-label">Dutch National Flag Pointers</div>
        <div class="pointer-values" id="pointer-values">
            <span>low = <span id="v-low" class="low">0</span></span>
            <span>mid = <span id="v-mid" class="mid">0</span></span>
            <span>high = <span id="v-high" class="high">5</span></span>
        </div>
        <div id="action-text" class="action-text">—</div>
    </div>

    <div class="info-panel">
        <div class="info-cell"><div class="info-label">low (0s)</div><div class="info-value" id="val-low" style="color: var(--accent-green);">—</div></div>
        <div class="info-cell"><div class="info-label">mid</div><div class="info-value" id="val-mid" style="color: var(--accent-blue);">—</div></div>
        <div class="info-cell"><div class="info-label">high (2s)</div><div class="info-value" id="val-high" style="color: var(--accent-red);">—</div></div>
        <div class="info-cell"><div class="info-label">nums[mid]</div><div class="info-value" id="val-current" style="color: var(--accent-orange);">—</div></div>
    </div>

    <div class="result-display">
        <div class="info-label" style="font-size: 12px; margin-bottom: 4px;">sorted array =</div>
        <div id="res-val" style="font-size: 16px; color: var(--text-dim);">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> low pointer (0s region)</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-blue);"></div> mid pointer (current)</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-red);"></div> high pointer (2s region)</div>
        <div class="legend-item"><div class="dot" style="background: #3fb950;"></div> 0</div>
        <div class="legend-item"><div class="dot" style="background: #c9d1d9;"></div> 1</div>
        <div class="legend-item"><div class="dot" style="background: #f85149;"></div> 2</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentArray = [2, 0, 2, 1, 1, 0];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample(currentArray);
        }

        function loadExample(arr) {
            currentArray = arr.slice(0, 10);
            document.getElementById('array-input').value = currentArray.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (arr.length > 0) loadExample(arr);
        }

        function generateSteps() {
            steps = [];
            let nums = currentArray.slice();           // working copy (will be mutated)
            const n = nums.length;
            let low = 0;
            let mid = 0;
            let high = n - 1;

            // STEP 0: INIT
            steps.push({
                type: 'init',
                low: low,
                mid: mid,
                high: high,
                nums: nums.slice(),
                tileClasses: Array(n).fill(''),
                status: `array=[${nums}] — n=${n}. low=0, mid=0, high=${n-1}. Starting Dutch National Flag...`,
                log: `array=[${nums}] — Starting Dutch National Flag (one-pass in-place)`,
                logColor: '#8b949e',
                action: '—'
            });

            while (mid <= high) {
                const currentVal = nums[mid];

                // STEP A: Examine current element at mid
                let tileClasses = Array(n).fill('');
                tileClasses[low] = 'pointer-low';
                tileClasses[mid] = 'pointer-mid';
                tileClasses[high] = 'pointer-high';

                steps.push({
                    type: 'check',
                    low: low,
                    mid: mid,
                    high: high,
                    nums: nums.slice(),
                    tileClasses: tileClasses,
                    status: `mid=${mid}: nums[mid]=${currentVal}  (low=${low}, high=${high})`,
                    log: `Examining nums[${mid}] = ${currentVal}`,
                    logColor: '#58a6ff',
                    action: `Check nums[${mid}] = ${currentVal}`
                });

                if (currentVal === 0) {
                    // Swap low ↔ mid
                    [nums[low], nums[mid]] = [nums[mid], nums[low]];

                    tileClasses = Array(n).fill('');
                    tileClasses[low] = 'pointer-low';
                    tileClasses[mid] = 'pointer-mid';
                    tileClasses[high] = 'pointer-high';

                    steps.push({
                        type: 'swap0',
                        low: low,
                        mid: mid,
                        high: high,
                        nums: nums.slice(),
                        tileClasses: tileClasses,
                        status: `nums[${mid}]=0 → swap with low → 0 moves left`,
                        log: `Swap nums[${low}] ↔ nums[${mid}]  (0 moved to left region)`,
                        logColor: '#3fb950',
                        action: `Swap low(${low}) ↔ mid(${mid})`
                    });

                    low++;
                    mid++;
                } 
                else if (currentVal === 1) {
                    // Just move mid forward
                    steps.push({
                        type: 'skip1',
                        low: low,
                        mid: mid,
                        high: high,
                        nums: nums.slice(),
                        tileClasses: tileClasses,
                        status: `nums[${mid}]=1 → mid++ (1 stays in middle)`,
                        log: `1 found → increment mid only`,
                        logColor: '#8b949e',
                        action: `nums[${mid}]=1 → mid++`
                    });

                    mid++;
                } 
                else { // 2
                    // Swap mid ↔ high (mid stays the same)
                    [nums[mid], nums[high]] = [nums[high], nums[mid]];

                    tileClasses = Array(n).fill('');
                    tileClasses[low] = 'pointer-low';
                    tileClasses[mid] = 'pointer-mid';
                    tileClasses[high] = 'pointer-high';

                    steps.push({
                        type: 'swap2',
                        low: low,
                        mid: mid,
                        high: high,
                        nums: nums.slice(),
                        tileClasses: tileClasses,
                        status: `nums[${mid}]=2 → swap with high → 2 moves right`,
                        log: `Swap nums[${mid}] ↔ nums[${high}]  (2 moved to right region)`,
                        logColor: '#f85149',
                        action: `Swap mid(${mid}) ↔ high(${high})`
                    });

                    high--;
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final',
                low: low,
                mid: mid,
                high: high,
                nums: nums.slice(),
                tileClasses: Array(n).fill(''),
                status: `Done. Sorted array = [${nums}]`,
                log: `Final result: [${nums.join(', ')}]`,
                logColor: '#3fb950',
                bold: true,
                action: '—',
                result: nums.join(', ')
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';

            const displayArray = step.nums;
            displayArray.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';

                const tile = document.createElement('div');
                let classes = 'tile';
                const valClass = (val === 0) ? 'zero' : (val === 1) ? 'one' : 'two';
                classes += ' ' + valClass;

                if (step.tileClasses && step.tileClasses[i]) {
                    classes += ' ' + step.tileClasses[i];
                }
                tile.className = classes;
                tile.innerText = val;

                const index = document.createElement('div');
                index.className = 'tile-index';
                index.innerText = `[${i}]`;

                wrapper.appendChild(tile);
                wrapper.appendChild(index);
                container.appendChild(wrapper);
            });

            // Pointer values
            document.getElementById('v-low').innerText = step.low !== undefined ? step.low : '—';
            document.getElementById('v-mid').innerText = step.mid !== undefined ? step.mid : '—';
            document.getElementById('v-high').innerText = step.high !== undefined ? step.high : '—';

            // Info panel
            document.getElementById('val-low').innerText = step.low !== undefined ? step.low : '—';
            document.getElementById('val-mid').innerText = step.mid !== undefined ? step.mid : '—';
            document.getElementById('val-high').innerText = step.high !== undefined ? step.high : '—';
            document.getElementById('val-current').innerText = (step.mid !== undefined && step.nums) ? step.nums[step.mid] : '—';

            // Action text
            document.getElementById('action-text').innerText = step.action || '—';

            // Status
            document.getElementById('status-text').innerText = step.status;

            // Result
            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.style.color = 'var(--accent-green)';
                resVal.style.fontSize = '26px';
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.style.color = 'var(--text-dim)';
                resVal.style.fontSize = '16px';
                resVal.classList.remove('pop');
            }

            // Log (cumulative)
            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    line.style.color = steps[k].logColor || '#c9d1d9';
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) {
                pause();
                play();
            }
        };

        window.onload = init;
    </script>
</body>
</html>
