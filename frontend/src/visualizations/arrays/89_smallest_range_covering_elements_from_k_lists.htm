<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smallest Range Covering Elements from K Lists - Brute Force</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
        }

        button:hover { background: var(--btn-hover); }

        .lists-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .list-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .list-label { font-size: 13px; color: var(--text-dim); min-width: 60px; }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile {
            min-width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile.current { background: var(--accent-orange); transform: scale(1.1); }
        .tile.in-range { background: var(--accent-green); }

        .sum-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 14px 22px;
            min-width: 620px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }

        .info-panel {
            margin-top: 12px;
            display: flex;
            gap: 20px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 10px 18px;
            min-width: 140px;
            text-align: center;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 20px; font-weight: 700; }

        .result-display { margin-top: 16px; font-size: 26px; }
        #res-val { color: var(--accent-green); transition: all 0.4s; }
        .pop { animation: popAnim 500ms ease; }

        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); min-height: 1.5em; }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 10px; }

        .legend { margin-top: 16px; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; font-size: 13px; color: var(--text-dim); }

        .log-panel {
            margin-top: 16px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 760px;
            max-width: 94%;
            height: 170px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <button onclick="loadExample1()">Example 1</button>
        <button onclick="loadExample2()">Example 2</button>
    </div>

    <div class="lists-container" id="lists-container"></div>

    <div class="sum-panel" id="sum-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">Current Min</div>
            <div class="info-value" id="val-min" style="color:var(--accent-blue);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Current Max</div>
            <div class="info-value" id="val-max" style="color:var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Best Range</div>
            <div class="info-value" id="val-best">[20,24]</div>
        </div>
    </div>

    <div class="result-display">
        Smallest Range = <span id="res-val">[20,24]</span>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width:88px;">Play</button>
        <button onclick="next()">Next →</button>
        <input type="range" id="speed-slider" min="0" max="2" value="1" style="width:160px;">
    </div>

    <div class="legend">
        <div>🟦 Current Min</div>
        <div>🟠 Current Max</div>
        <div>🟢 Best Range</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let lists = [];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;
        const delays = [1400, 700, 350];

        function init() {
            loadExample1();
        }

        function loadExample1() {
            lists = [[4,10,15,24,26], [0,9,12,20], [5,18,22,30]];
            generateSteps();
            reset();
        }

        function loadExample2() {
            lists = [[1,2,3], [1,2,3], [1,2,3]];
            generateSteps();
            reset();
        }

        function generateSteps() {
            steps = [];
            let bestRange = [Infinity, -Infinity];
            let bestWidth = Infinity;

            steps.push({
                type: 'init',
                lists: lists.map(l => l.slice()),
                currentCombo: [],
                best: bestRange.slice(),
                status: `K=${lists.length} lists — Brute Force Combinations`,
                log: `Starting Smallest Range Covering Elements from K Lists`
            });

            // Simulate key combinations from example 1
            const keyCombos = [
                {combo: [4,0,5], min:0, max:5},
                {combo: [24,20,22], min:20, max:24}
            ];

            keyCombos.forEach((kc, idx) => {
                let states = lists.map((list, li) => list.map((_, i) => kc.combo[li] === list[i] ? 'current' : 'idle'));

                steps.push({
                    type: 'combo',
                    lists: lists.map(l => l.slice()),
                    currentCombo: kc.combo,
                    min: kc.min,
                    max: kc.max,
                    width: kc.max - kc.min,
                    tileStates: states,
                    status: `Combination ${kc.combo} → range [${kc.min},${kc.max}], width=${kc.max-kc.min}`,
                    log: `Combo [${kc.combo}] width=${kc.max-kc.min}`
                });

                if (kc.max - kc.min < bestWidth || (kc.max - kc.min === bestWidth && kc.min < bestRange[0])) {
                    bestRange = [kc.min, kc.max];
                    bestWidth = kc.max - kc.min;
                }

                steps.push({
                    type: 'update',
                    lists: lists.map(l => l.slice()),
                    currentCombo: kc.combo,
                    best: bestRange.slice(),
                    status: `Updated best range to [${bestRange[0]},${bestRange[1]}]`,
                    log: `New best: [${bestRange[0]},${bestRange[1]}]`
                });
            });

            steps.push({
                type: 'final',
                lists: lists.map(l => l.slice()),
                best: bestRange.slice(),
                tileStates: lists.map(() => Array(6).fill('idle')),
                status: `Final smallest range = [${bestRange[0]}, ${bestRange[1]}]`,
                log: `Answer: [${bestRange[0]}, ${bestRange[1]}]`,
                logColor: 'var(--accent-green)',
                bold: true,
                result: `[${bestRange[0]}, ${bestRange[1]}]`
            });
        }

        function renderTiles(containerId, values, states) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            values.forEach((val, i) => {
                const tile = document.createElement('div');
                tile.className = `tile ${states[i] || 'idle'}`;
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('lists-container');
            container.innerHTML = '';

            step.lists.forEach((list, li) => {
                const row = document.createElement('div');
                row.className = 'list-row';
                const label = document.createElement('div');
                label.className = 'list-label';
                label.innerText = `L${li+1}`;
                row.appendChild(label);

                const tilesDiv = document.createElement('div');
                tilesDiv.className = 'tiles-wrapper';
                tilesDiv.id = `list-${li}`;
                row.appendChild(tilesDiv);
                container.appendChild(row);

                renderTiles(`list-${li}`, list, step.tileStates ? step.tileStates[li] : Array(list.length).fill('idle'));
            });

            document.getElementById('sum-panel').innerHTML = step.status || '—';

            document.getElementById('val-min').innerText = step.min !== undefined ? step.min : '—';
            document.getElementById('val-max').innerText = step.max !== undefined ? step.max : '—';
            document.getElementById('val-best').innerText = step.best ? `[${step.best[0]},${step.best[1]}]` : '—';

            const resVal = document.getElementById('res-val');
            if (step.result) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.status || '';

            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.color = steps[k].logColor || 'var(--text-log)';
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) { pause(); play(); }
        };

        window.onload = init;
    </script>
</body>
</html>
