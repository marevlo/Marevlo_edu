<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product of Array Elements - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }
        label.array-label { font-family: 'Courier New', monospace; font-size: 14px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 240px;
            font-size: 14px;
        }
        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.idle { color: var(--text-dim); }
        .tile.candidate { 
            background: #2a1600; 
            border: 2px solid var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.12); 
            z-index: 2; 
        }
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }

        /* ROW 3: ACCUMULATION PANEL */
        .accumulation-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 450px; text-align: center; font-family: monospace; min-height: 48px;
        }
        .acc-old { color: var(--text-dim); }
        .acc-op { color: var(--text-main); margin: 0 8px; font-weight: bold; }
        .acc-elem { color: var(--accent-orange); font-weight: 700; }
        .acc-arrow { color: var(--text-log); margin: 0 10px; }
        .acc-new { color: var(--accent-green); font-weight: 700; font-size: 18px; }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        .res-label { font-size: 12px; color: var(--text-dim); font-family: monospace; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        #res-val.complete { color: var(--accent-green); font-size: 26px; font-weight: 700; text-shadow: 0 0 16px var(--accent-green); animation: popAnim 400ms ease; }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        .speed-control { display: flex; align-items: center; gap: 8px; margin-left: 12px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 600px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">array =</label>
        <input type="text" id="array-input" placeholder="2, 3, 4">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([2, 3, 4])">Example 1</button>
        <button onclick="loadExample([1, 2, 3, 4, 5])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="res-label">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="accumulation-panel" id="accum-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Index i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">array[i]</span>
            <span class="info-value" id="val-ai" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">product</span>
            <span class="info-value" id="val-total" style="color: var(--accent-green);">1</span>
        </div>
    </div>

    <div class="result-display">
        <span class="res-label">product =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="info-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Current element (i)</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim)"></span> Previous product</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> New product</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Running accumulator</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentArray = [2, 3, 4];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() {
            loadExample(currentArray);
        }

        function loadExample(arr) {
            currentArray = arr;
            document.getElementById('array-input').value = arr.join(',');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (arr.length > 0) loadExample(arr.slice(0, 8));
        }

        function generateSteps() {
            steps = [];
            const n = currentArray.length;
            let product = 1;

            // Step 0: INIT
            steps.push({
                type: 'init', i: null, ai: null, product: 1,
                tiles: Array(n).fill('idle'),
                accum: '—',
                status: `array=[${currentArray}] n=${n}. Click Play to begin.`,
                log: `array=[${currentArray}] — n=${n}. Starting product computation.`
            });

            for (let i = 0; i < n; i++) {
                let v = currentArray[i];
                let oldProduct = product;
                product *= v;

                // A: Start multiplying
                steps.push({
                    type: 'start', i: i, ai: v, product: oldProduct,
                    tiles: Array(n).fill(0).map((_, idx) => idx < i ? 'past' : (idx === i ? 'candidate' : 'idle')),
                    accum: '—',
                    status: `i=${i}: Multiplying array[${i}]=${v} to product`,
                    log: `i=${i}: array[${i}]=${v}, prepare to multiply`
                });

                // B: Perform multiplication
                steps.push({
                    type: 'multiply', i: i, ai: v, product: product,
                    tiles: Array(n).fill(0).map((_, idx) => idx < i ? 'past' : (idx === i ? 'candidate' : 'idle')),
                    accum: `<span class="acc-old">${oldProduct}</span><span class="acc-op">×</span><span class="acc-elem">${v}</span><span class="acc-arrow">→</span><span class="acc-new">${product}</span>`,
                    status: `Multiplying: ${oldProduct} * ${v} = ${product} ✓`,
                    log: `i=${i}: array[${i}]=${valStr(v)}, product = ${oldProduct} * ${valStr(v)} = ${product} ✓`,
                    logColor: '#3fb950'
                });

                // C: Mark past
                steps.push({
                    type: 'processed', i: i, ai: v, product: product,
                    tiles: Array(n).fill(0).map((_, idx) => idx <= i ? 'past' : 'idle'),
                    accum: '—',
                    status: `i=${i}: product updated. Moving to next element.`,
                    log: null
                });
            }

            // FINAL
            steps.push({
                type: 'final', i: null, ai: null, product: product,
                tiles: Array(n).fill('past'),
                accum: '—',
                complete: true,
                status: `Complete. Product = ${product}`,
                log: `Final result: product = ${product}`,
                logColor: '#388bfd', bold: true
            });
        }

        function valStr(v) { return v < 0 ? `(${v})` : v; }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Tiles
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            currentArray.forEach((v, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tiles[i]}`;
                tile.innerText = v;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            // Panels
            document.getElementById('accum-panel').innerHTML = step.accum;
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-ai').innerText = step.ai !== null ? step.ai : '—';
            document.getElementById('val-total').innerText = step.product;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.product : '—';
            resVal.className = step.complete ? 'complete' : '';

            document.getElementById('status-text').innerText = step.status;

            // Log Logic
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) {
                pause();
            } else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
```
