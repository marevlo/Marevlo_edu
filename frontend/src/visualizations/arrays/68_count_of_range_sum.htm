<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count of Range Sum - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
        }

        .tile.idle { color: var(--text-dim); }
        .tile.candidate { 
            background: #2a1600; 
            border: 2px solid var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.12); 
            z-index: 2; 
        }
        .tile.valid { 
            background: #0f2a1a; 
            border: 2px solid var(--accent-green); 
            color: var(--accent-green); 
            transform: scale(1.15); 
            box-shadow: 0 0 12px var(--accent-green);
        }
        .tile.past { opacity: 0.35; }

        /* ROW 3: SUM + ACTION PANEL */
        .sum-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            width: 520px;
            text-align: center;
            font-family: monospace;
        }

        .action-text {
            margin-top: 8px;
            font-size: 14px;
            min-height: 24px;
            color: var(--accent-orange);
        }

        /* ROW 4: INFO PANEL */
        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #res-val { 
            font-family: monospace; 
            transition: all 0.2s; 
        }
        .pop { 
            animation: popAnim 400ms ease; 
            font-size: 26px !important; 
            color: var(--accent-green) !important;
        }

        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.28); }
            100% { transform: scale(1); }
        }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        /* ROW 7: CONTROLS */
        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        /* ROW 8: LEGEND */
        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 620px;
            max-width: 90%;
            height: 130px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-line { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">nums =</label>
        <input type="text" id="nums-input" placeholder="-2,5,-1" style="width: 220px;">
        <label class="array-label" style="margin-left:12px;">lower =</label>
        <input type="text" id="lower-input" placeholder="-2" style="width: 70px;">
        <label class="array-label" style="margin-left:12px;">upper =</label>
        <input type="text" id="upper-input" placeholder="2" style="width: 70px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([-2,5,-1], -2, 2)">Example 1</button>
        <button onclick="loadExample([1,2,3], 3, 5)">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">nums =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="sum-panel" id="sum-panel">
        <div id="window-info" style="font-size:15px;margin-bottom:6px;">Subarray [— : —] — sum = —</div>
        <div id="action-text" class="action-text">—</div>
    </div>

    <div class="info-panel">
        <div class="info-cell"><div class="info-label">i (start)</div><div class="info-value" id="val-i" style="color:var(--accent-orange);">—</div></div>
        <div class="info-cell"><div class="info-label">j (end)</div><div class="info-value" id="val-j" style="color:var(--accent-orange);">—</div></div>
        <div class="info-cell"><div class="info-label">current_sum</div><div class="info-value" id="val-sum" style="color:var(--accent-green);">0</div></div>
        <div class="info-cell"><div class="info-label">valid count</div><div class="info-value" id="val-count" style="color:var(--accent-blue);">0</div></div>
    </div>

    <div class="result-display">
        <div class="info-label" style="font-size:12px;margin-bottom:4px;">total valid subarrays =</div>
        <div id="res-val" style="font-size:16px;color:var(--text-dim);">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width:80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--accent-orange);"></div> Current subarray [i..j]</div>
        <div class="legend-item"><div class="dot" style="background:var(--accent-green);"></div> Valid sum found</div>
        <div class="legend-item"><div class="dot" style="background:var(--text-dim);"></div> Past / idle</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentNums = [-2, 5, -1];
        let currentLower = -2;
        let currentUpper = 2;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample([-2, 5, -1], -2, 2);
        }

        function loadExample(arr, lower, upper) {
            currentNums = arr.slice();
            currentLower = lower;
            currentUpper = upper;
            document.getElementById('nums-input').value = currentNums.join(', ');
            document.getElementById('lower-input').value = lower;
            document.getElementById('upper-input').value = upper;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('nums-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const l = parseInt(document.getElementById('lower-input').value.trim());
            const u = parseInt(document.getElementById('upper-input').value.trim());
            if (arr.length > 0 && !isNaN(l) && !isNaN(u)) {
                currentNums = arr;
                currentLower = l;
                currentUpper = u;
                generateSteps();
                reset();
            }
        }

        function generateSteps() {
            steps = [];
            const nums = currentNums.slice();
            const n = nums.length;
            const lower = currentLower;
            const upper = currentUpper;
            let count = 0;

            // STEP 0: INIT
            steps.push({
                type: 'init',
                i: null,
                j: null,
                currentSum: 0,
                count: 0,
                tileStates: Array(n).fill('idle'),
                status: `nums=[${nums}] lower=${lower} upper=${upper} — Brute force O(n²)`,
                log: `Starting Count of Range Sum (brute force)`,
                logColor: '#8b949e',
                action: '—'
            });

            for (let i = 0; i < n; i++) {
                let curSum = 0;

                // New starting index i
                let tileStates = Array(n).fill('past');
                for (let j = i; j < n; j++) tileStates[j] = 'candidate';

                steps.push({
                    type: 'new_i',
                    i: i,
                    j: null,
                    currentSum: 0,
                    count: count,
                    tileStates: tileStates,
                    status: `i=${i} → new subarray start, reset sum=0`,
                    log: `Start new subarrays from index ${i}`,
                    logColor: '#58a6ff',
                    action: `i = ${i}`
                });

                for (let j = i; j < n; j++) {
                    curSum += nums[j];

                    let scanStates = Array(n).fill('past');
                    for (let p = i; p <= j; p++) {
                        scanStates[p] = 'candidate';
                    }

                    const isValid = (lower <= curSum && curSum <= upper);
                    if (isValid) count++;

                    steps.push({
                        type: 'extend_j',
                        i: i,
                        j: j,
                        currentSum: curSum,
                        count: count,
                        tileStates: scanStates,
                        status: `j=${j}: subarray [${i}..${j}] sum=${curSum} ${isValid ? '✓ valid' : ''}`,
                        log: `sum[${i}..${j}] = ${curSum} ${isValid ? '(valid)' : ''}`,
                        logColor: isValid ? '#3fb950' : '#8b949e',
                        action: `sum = ${curSum}`
                    });

                    // If valid, show a brief highlight step
                    if (isValid) {
                        let validStates = Array(n).fill('past');
                        for (let p = i; p <= j; p++) validStates[p] = 'valid';
                        steps.push({
                            type: 'valid',
                            i: i,
                            j: j,
                            currentSum: curSum,
                            count: count,
                            tileStates: validStates,
                            status: `✓ Valid subarray [${i}..${j}] sum=${curSum}`,
                            log: `Count increased to ${count}`,
                            logColor: '#3fb950',
                            action: `+1 (count = ${count})`
                        });
                    }
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final',
                i: null,
                j: null,
                currentSum: null,
                count: count,
                tileStates: Array(n).fill('past'),
                status: `Complete. Total valid subarrays = ${count}`,
                log: `Final result: ${count}`,
                logColor: '#3fb950',
                bold: true,
                action: '—',
                result: count
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render tiles
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            currentNums.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[i]}`;
                tile.innerText = val;
                const index = document.createElement('div');
                index.className = 'tile-index';
                index.innerText = `[${i}]`;
                wrapper.appendChild(tile);
                wrapper.appendChild(index);
                container.appendChild(wrapper);
            });

            // Sum panel
            const sumPanel = document.getElementById('sum-panel');
            if (step.i !== null && step.j !== null) {
                sumPanel.querySelector('#window-info').innerHTML = 
                    `Subarray [<span style="color:var(--accent-orange)">${step.i}</span>..${step.j}] — sum = <span style="color:var(--accent-green)">${step.currentSum}</span>`;
            } else {
                sumPanel.querySelector('#window-info').innerHTML = '—';
            }
            document.getElementById('action-text').innerText = step.action || '—';

            // Info panel
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-sum').innerText = step.currentSum !== null ? step.currentSum : '—';
            document.getElementById('val-count').innerText = step.count !== undefined ? step.count : '—';

            // Status
            document.getElementById('status-text').innerText = step.status;

            // Result
            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            // Cumulative log
            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) {
                pause();
                play();
            }
        };

        window.onload = init;
    </script>
</body>
</html>
