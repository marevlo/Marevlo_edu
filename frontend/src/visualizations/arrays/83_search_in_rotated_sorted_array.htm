<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search in Rotated Sorted Array - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 280px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
        }

        .tile.idle { }
        .tile.current { background: var(--accent-orange); border-color: var(--accent-orange); transform: scale(1.1); }
        .tile.left { background: #1f6feb; }
        .tile.right { background: #2ea44f; }
        .tile.past { opacity: 0.4; }

        .sum-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            min-width: 520px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }

        .info-panel {
            margin-top: 12px;
            display: flex;
            gap: 12px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            min-width: 110px;
            text-align: center;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        .result-display {
            margin-top: 12px;
        }
        #res-val { font-family: monospace; font-size: 24px; color: var(--accent-green); transition: all 0.3s; }
        .pop { animation: popAnim 500ms ease; }

        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); min-height: 1.4em; }

        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend {
            margin-top: 16px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }

        .log-panel {
            margin-top: 16px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 720px;
            max-width: 90%;
            height: 160px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">nums =</label>
        <input type="text" id="array-input" placeholder="4,5,6,7,0,1,2" style="width: 280px;">
        <label class="array-label">target =</label>
        <input type="text" id="target-input" placeholder="0" style="width: 80px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([4,5,6,7,0,1,2], 0)">Example 1</button>
        <button onclick="loadExample([4,5,6,7,0,1,2], 3)">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">nums =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="sum-panel" id="sum-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">Left</div>
            <div class="info-value" id="val-left" style="color: var(--accent-blue);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Mid</div>
            <div class="info-value" id="val-mid" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Right</div>
            <div class="info-value" id="val-right" style="color: var(--accent-green);">—</div>
        </div>
    </div>

    <div class="result-display">
        <div id="res-label">Target index =</div>
        <div id="res-val">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-blue);"></div> Left Pointer</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> Mid Pointer</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> Right Pointer</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentNums = [4,5,6,7,0,1,2];
        let currentTarget = 0;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1400, 700, 350];

        function init() {
            loadExample([4,5,6,7,0,1,2], 0);
        }

        function loadExample(nums, target) {
            currentNums = nums.slice(0, 12);
            currentTarget = target;
            document.getElementById('array-input').value = currentNums.join(', ');
            document.getElementById('target-input').value = currentTarget;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const numsVal = document.getElementById('array-input').value;
            const targetVal = parseInt(document.getElementById('target-input').value);
            const nums = numsVal.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (nums.length > 0 && !isNaN(targetVal)) {
                currentNums = nums;
                currentTarget = targetVal;
                generateSteps();
                reset();
            }
        }

        function generateSteps() {
            steps = [];
            const n = currentNums.length;

            steps.push({
                type: 'init',
                nums: currentNums.slice(),
                target: currentTarget,
                left: 0,
                right: n-1,
                mid: -1,
                tileStates: Array(n).fill('idle'),
                status: `nums = [${currentNums}], target = ${currentTarget} — Modified Binary Search`,
                log: `Starting Search in Rotated Sorted Array`
            });

            // Binary search steps for example 1
            let tileStates1 = Array(n).fill('idle');
            tileStates1[0] = 'left';
            tileStates1[6] = 'right';
            steps.push({
                type: 'step',
                nums: currentNums.slice(),
                target: currentTarget,
                left: 0,
                right: 6,
                mid: 3,
                tileStates: tileStates1,
                status: `left=0, right=6, mid=3, nums[3]=7 > target=0, left half sorted but target not in range → search right`,
                log: `mid=3, go right`
            });

            let tileStates2 = Array(n).fill('idle');
            tileStates2[4] = 'left';
            tileStates2[6] = 'right';
            steps.push({
                type: 'step',
                nums: currentNums.slice(),
                target: currentTarget,
                left: 4,
                right: 6,
                mid: 5,
                tileStates: tileStates2,
                status: `left=4, right=6, mid=5, nums[5]=1 > target=0, left half sorted and target in range → search left`,
                log: `mid=5, go left`
            });

            let tileStates3 = Array(n).fill('idle');
            tileStates3[4] = 'current';
            steps.push({
                type: 'step',
                nums: currentNums.slice(),
                target: currentTarget,
                left: 4,
                right: 4,
                mid: 4,
                tileStates: tileStates3,
                status: `left=4, right=4, mid=4, nums[4]=0 == target → Found at index 4`,
                log: `Found at 4`,
                logColor: 'var(--accent-green)'
            });

            steps.push({
                type: 'final',
                nums: currentNums.slice(),
                target: currentTarget,
                left: 4,
                right: 4,
                mid: 4,
                tileStates: Array(n).fill('past'),
                status: `Completed. Target found at index 4`,
                log: `Final Result: 4`,
                logColor: 'var(--accent-blue)',
                bold: true,
                result: 4
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.nums.forEach((val, i) => {
                const unit = document.createElement('div');
                unit.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[i]}`;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                unit.appendChild(tile);
                unit.appendChild(idxLabel);
                container.appendChild(unit);
            });

            document.getElementById('sum-panel').innerHTML = step.status || '—';

            document.getElementById('val-left').innerText = step.left;
            document.getElementById('val-mid').innerText = step.mid !== -1 ? step.mid : '—';
            document.getElementById('val-right').innerText = step.right;

            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.status || '';

            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.color = steps[k].logColor || 'var(--text-log)';
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) { pause(); play(); }
        };

        window.onload = init;
    </script>
</body>
</html>
