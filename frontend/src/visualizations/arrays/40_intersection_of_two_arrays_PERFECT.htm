<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intersection of Two Arrays - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 200px;
            font-size: 13px;
        }
        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%; }
        .array-row { display: flex; align-items: center; gap: 12px; min-height: 50px; justify-content: center; width: 100%; }
        .tiles-wrapper { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-start; max-width: 600px; min-height: 48px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.06); box-shadow: 0 0 8px var(--accent-green); z-index: 3;}
        .tile.defeated { background: #2a0d0d; border: 2px solid var(--accent-red); color: var(--accent-red); opacity: 0.8; }
        .tile.duplicate { background: #1e1030; border: 2px solid var(--accent-purple); color: var(--accent-purple); opacity: 0.8; }
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.8; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 600px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; max-width: 600px; word-break: break-all; text-align: center; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 22px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 700px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">arr1 =</label>
        <input type="text" id="arr1-input" placeholder="1, 2, 2, 1">
        <label class="ui-label">arr2 =</label>
        <input type="text" id="arr2-input" placeholder="2, 2">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1, 2, 2, 1], [2, 2])">Ex 1</button>
        <button onclick="loadExample([4, 9, 5], [9, 4, 9, 8, 4])">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="array-row">
            <div class="ui-label" style="width: 60px; text-align: right;">arr1:</div>
            <div class="tiles-wrapper" id="arr1-tiles"></div>
        </div>
        <div class="array-row">
            <div class="ui-label" style="width: 60px; text-align: right;">arr2:</div>
            <div class="tiles-wrapper" id="arr2-tiles"></div>
        </div>
        <div class="array-row">
            <div class="ui-label" style="width: 60px; text-align: right;">result:</div>
            <div class="tiles-wrapper" id="res-tiles"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Index (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Index (j)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">arr1[i]</span>
            <span class="info-value" id="val-arri" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">arr2[j]</span>
            <span class="info-value" id="val-arrj" style="color: var(--accent-blue);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">intersection =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Current arr1 (i)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Current arr2 (j)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Match Found</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red)"></span> No Match</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple)"></span> Skip Duplicate</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr1 = [1, 2, 2, 1];
        let arr2 = [2, 2];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([1, 2, 2, 1], [2, 2]); }

        function loadExample(newArr1, newArr2) {
            arr1 = [...newArr1];
            arr2 = [...newArr2];
            document.getElementById('arr1-input').value = arr1.join(', ');
            document.getElementById('arr2-input').value = arr2.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const v1 = document.getElementById('arr1-input').value;
            const v2 = document.getElementById('arr2-input').value;
            const parsed1 = v1.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const parsed2 = v2.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            
            if (parsed1.length > 0 && parsed2.length > 0) {
                loadExample(parsed1.slice(0, 10), parsed2.slice(0, 10)); // Limit length for visualization
            }
        }

        function generateSteps() {
            steps = [];
            let result = [];
            const n = arr1.length;
            const m = arr2.length;

            // STEP 0: INIT
            steps.push({
                type: 'init', i: '—', j: '—', valI: '—', valJ: '—',
                arr1States: arr1.map(() => 'idle'),
                arr2States: arr2.map(() => 'idle'),
                resVals: [...result],
                panel: 'Initialize result array = []',
                statusText: `arr1=[${arr1}], arr2=[${arr2}]. Click Play to begin Brute Force search.`,
                log: `Starting Intersection search. Initializing empty result array.`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 0; i < n; i++) {
                let val1 = arr1[i];
                let isDuplicate = result.includes(val1);

                // STEP A: Select from arr1
                steps.push({
                    type: 'outer', i: i, j: '—', valI: val1, valJ: '—',
                    arr1States: arr1.map((v, idx) => idx === i ? (isDuplicate ? 'duplicate' : 'candidate') : (idx < i ? 'past' : 'idle')),
                    arr2States: arr2.map(() => 'idle'),
                    resVals: [...result],
                    panel: `Take element from arr1: ${val1}. ${isDuplicate ? "It's already in result." : "Check if it exists in arr2."}`,
                    statusText: `Outer loop i=${i}: Selected ${val1}.`,
                    log: `i=${i}: Selected arr1[${i}] = ${val1}.`,
                    logColor: isDuplicate ? 'var(--accent-purple)' : 'var(--accent-orange)'
                });

                if (isDuplicate) {
                    steps.push({
                        type: 'skip', i: i, j: '—', valI: val1, valJ: '—',
                        arr1States: arr1.map((v, idx) => idx === i ? 'duplicate' : (idx < i ? 'past' : 'idle')),
                        arr2States: arr2.map(() => 'idle'),
                        resVals: [...result],
                        panel: `<span style="color:var(--accent-purple)">${val1} is already in the result array. Skipping to avoid duplicates.</span>`,
                        statusText: `Skipping duplicate element.`,
                        log: `  ${val1} already in result. Skip.`,
                        logColor: 'var(--accent-purple)'
                    });
                    continue;
                }

                let matchFound = false;

                for (let j = 0; j < m; j++) {
                    let val2 = arr2[j];

                    // STEP B: Compare
                    steps.push({
                        type: 'compare', i: i, j: j, valI: val1, valJ: val2,
                        arr1States: arr1.map((v, idx) => idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')),
                        arr2States: arr2.map((v, idx) => idx === j ? 'comparing' : (idx < j ? 'past' : 'idle')),
                        resVals: [...result],
                        panel: `Comparing arr1[${i}] (${val1}) with arr2[${j}] (${val2})`,
                        statusText: `Checking arr2 for a match...`,
                        log: `  j=${j}: Check if ${val1} == ${val2}`,
                        logColor: 'var(--text-main)'
                    });

                    if (val1 === val2) {
                        result.push(val1);
                        matchFound = true;

                        // STEP C: Match
                        steps.push({
                            type: 'match', i: i, j: j, valI: val1, valJ: val2,
                            arr1States: arr1.map((v, idx) => idx === i ? 'winning' : (idx < i ? 'past' : 'idle')),
                            arr2States: arr2.map((v, idx) => idx === j ? 'winning' : (idx < j ? 'past' : 'idle')),
                            resVals: [...result],
                            panel: `<span style="color:var(--accent-green)">✓ Match found! ${val1} == ${val2}. Added to result.</span>`,
                            statusText: `Match found. Breaking inner loop.`,
                            log: `  Match! ${val1} == ${val2}. Added to result. Break inner loop.`,
                            logColor: 'var(--accent-green)'
                        });
                        break;
                    } else {
                        // STEP D: No Match
                        steps.push({
                            type: 'nomatch', i: i, j: j, valI: val1, valJ: val2,
                            arr1States: arr1.map((v, idx) => idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')),
                            arr2States: arr2.map((v, idx) => idx === j ? 'defeated' : (idx < j ? 'past' : 'idle')),
                            resVals: [...result],
                            panel: `<span style="color:var(--accent-red)">✗ No match (${val1} != ${val2}). Continuing search.</span>`,
                            statusText: `Elements do not match. Moving to next in arr2.`,
                            log: `    ${val1} != ${val2} ✗`,
                            logColor: 'var(--text-dim)'
                        });
                    }
                }

                if (!matchFound) {
                    steps.push({
                        type: 'exhausted', i: i, j: '—', valI: val1, valJ: '—',
                        arr1States: arr1.map((v, idx) => idx === i ? 'defeated' : (idx <= i ? 'past' : 'idle')),
                        arr2States: arr2.map(() => 'past'),
                        resVals: [...result],
                        panel: `<span style="color:var(--accent-orange)">Finished checking arr2. Element ${val1} is not in arr2.</span>`,
                        statusText: `Element not found in arr2. Moving to next in arr1.`,
                        log: `  ${val1} not found in arr2.`,
                        logColor: 'var(--accent-orange)'
                    });
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final', i: '—', j: '—', valI: '—', valJ: '—',
                arr1States: arr1.map(() => 'past'),
                arr2States: arr2.map(() => 'past'),
                resVals: [...result],
                panel: 'Intersection Search Complete',
                complete: true,
                finalStr: `[${result.join(', ')}]`,
                statusText: `Done. Final intersection array length: ${result.length}.`,
                log: `Final result: intersection = [${result.join(', ')}]`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render arr1
            const c1 = document.getElementById('arr1-tiles');
            c1.innerHTML = '';
            arr1.forEach((val, i) => {
                const w = document.createElement('div');
                w.className = 'tile-unit';
                const t = document.createElement('div');
                t.className = `tile ${step.arr1States[i]}`;
                t.innerText = val;
                const l = document.createElement('div');
                l.className = 'tile-index';
                l.innerText = `[${i}]`;
                w.append(t, l);
                c1.appendChild(w);
            });

            // Render arr2
            const c2 = document.getElementById('arr2-tiles');
            c2.innerHTML = '';
            arr2.forEach((val, i) => {
                const w = document.createElement('div');
                w.className = 'tile-unit';
                const t = document.createElement('div');
                t.className = `tile ${step.arr2States[i]}`;
                t.innerText = val;
                const l = document.createElement('div');
                l.className = 'tile-index';
                l.innerText = `[${i}]`;
                w.append(t, l);
                c2.appendChild(w);
            });

            // Render result
            const cr = document.getElementById('res-tiles');
            cr.innerHTML = '';
            if (step.resVals.length === 0) {
                const empty = document.createElement('div');
                empty.style.color = 'var(--text-dim)';
                empty.style.fontSize = '14px';
                empty.style.fontFamily = 'monospace';
                empty.style.padding = '10px 0';
                empty.innerText = '[]';
                cr.appendChild(empty);
            } else {
                step.resVals.forEach((val, i) => {
                    const w = document.createElement('div');
                    w.className = 'tile-unit';
                    const t = document.createElement('div');
                    t.className = 'tile winning';
                    t.innerText = val;
                    const l = document.createElement('div');
                    l.className = 'tile-index';
                    l.innerText = `[${i}]`;
                    w.append(t, l);
                    cr.appendChild(w);
                });
            }

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-i').innerText = step.i;
            document.getElementById('val-j').innerText = step.j;
            document.getElementById('val-arri').innerText = step.valI;
            document.getElementById('val-arrj').innerText = step.valJ;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.finalStr : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerHTML = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
