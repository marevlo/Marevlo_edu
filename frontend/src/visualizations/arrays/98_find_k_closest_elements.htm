<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find K Closest Elements - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        button {
            height: 32px; border-radius: 6px; padding: 0 16px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px;
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1300px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .original-area, .pairs-area, .result-area {
            background: var(--bg-surface);
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 15px;
            width: 380px;
        }

        .original-area { border-color: var(--accent-blue); }
        .pairs-area { border-color: var(--accent-purple); }
        .result-area { border-color: var(--accent-green); }

        .tiles {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 15px 0;
        }

        .tile {
            min-width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            background: #21262d;
            border: 2px solid var(--border-main);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tile.current {
            border-color: var(--accent-orange);
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--accent-orange);
        }

        .tile.selected {
            border-color: var(--accent-green);
            background: #0f2a1a;
        }

        .action-panel {
            margin-top: 25px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 16px 22px;
            width: 860px;
            text-align: center;
            font-family: monospace;
            min-height: 90px;
            font-size: 15px;
            line-height: 1.5;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .log-panel {
            margin-top: 15px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 860px;
            height: 160px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13.5px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <button onclick="loadExample(0)">Example 1</button>
        <button onclick="loadExample(1)">Example 2</button>
        <button onclick="resetAll()">Reset</button>
    </div>

    <div class="visual-container">
        <!-- Original Array -->
        <div class="original-area">
            <div style="color:var(--accent-blue); font-weight:bold; margin-bottom:8px;">Original Array</div>
            <div id="original-tiles" class="tiles"></div>
        </div>

        <!-- Pairs (diff, value) -->
        <div class="pairs-area">
            <div style="color:var(--accent-purple); font-weight:bold; margin-bottom:8px;">Pairs (diff, value)</div>
            <div id="pairs-tiles" class="tiles" style="flex-direction:column; align-items:flex-start;"></div>
        </div>

        <!-- Selected K Elements -->
        <div class="result-area">
            <div style="color:var(--accent-green); font-weight:bold; margin-bottom:8px;">K Closest Elements</div>
            <div id="result-tiles" class="tiles"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Click Play to start demonstration</div>

    <div class="controls">
        <button onclick="resetAll()">↺ Reset</button>
        <button onclick="backStep()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="nextStep()">Next →</button>
        <span style="margin-left:20px; font-size:13px;">Speed:</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log-container"></div>

    <script>
        let arr = [];
        let k = 0;
        let target = 0;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1650, 950, 480];

        function init() {
            const _p = new URLSearchParams(window.location.search); loadExample(parseInt(_p.get('example') || '0'));
        }

        function loadExample(ex) {
            if (ex === 0) {
                arr = [1, 2, 3, 4, 5];
                k = 4;
                target = 3;
            } else {
                arr = [1, 1, 1, 10, 10, 10];
                k = 3;
                target = 9;
            }
            steps = [];
            document.getElementById('log-container').innerHTML = '';

            addStep(`Array: <b>[${arr.join(', ')}]</b>, k=${k}, target=${target}`, true);

            // Compute pairs
            let pairs = [];
            arr.forEach(val => {
                pairs.push([Math.abs(val - target), val]);
            });
            addStep(`Pairs (diff, value): <b>${pairs.map(p => `(${p[0]},${p[1]})`).join(', ')}</b>`);

            // Sort pairs
            pairs.sort((a, b) => {
                if (a[0] !== b[0]) return a[0] - b[0];
                return a[1] - b[1];
            });
            addStep(`Sorted pairs: <b>${pairs.map(p => `(${p[0]},${p[1]})`).join(', ')}</b>`);

            // Extract first k
            let selected = pairs.slice(0, k).map(p => p[1]);
            // Sort selected as per typical problem requirement
            selected.sort((a, b) => a - b);
            addStep(`Selected ${k} closest: <b>[${selected.join(', ')}]</b>`, true);

            stepIndex = 0;
            renderStep(0);
        }

        function addStep(text) {
            steps.push({
                panel: text,
                log: text
            });
        }

        function renderTiles(containerId, values, highlight = []) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            values.forEach((val, idx) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.textContent = val;
                if (highlight.includes(idx)) {
                    tile.classList.add('current');
                }
                container.appendChild(tile);
            });
        }

        function renderPairs(pairs) {
            const container = document.getElementById('pairs-tiles');
            container.innerHTML = '';
            pairs.forEach(([diff, val]) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.style.fontSize = '14px';
                tile.textContent = `(${diff}, ${val})`;
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            renderTiles('original-tiles', arr);

            // For pairs, we'll show them in the pairs area
            if (step.panel.includes('Pairs')) {
                // Try to parse pairs from log if possible, but simplify for demo
                renderPairs(arr.map(val => [Math.abs(val - target), val]));
            }

            // For result
            if (step.panel.includes('Selected')) {
                const selectedMatch = step.panel.match(/\[([0-9, ]+)\]/);
                if (selectedMatch) {
                    const selected = selectedMatch[1].split(',').map(Number);
                    renderTiles('result-tiles', selected);
                }
            }

            document.getElementById('main-panel').innerHTML = step.panel;

            const logDiv = document.getElementById('log-container');
            logDiv.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.margin = '4px 0';
                line.innerHTML = steps[i].log;
                logDiv.appendChild(line);
            }
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function nextStep() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function backStep() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function resetAll() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(nextStep, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
