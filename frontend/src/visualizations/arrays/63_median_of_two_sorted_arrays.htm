<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Median of Two Sorted Arrays - Brute Force Merge Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
        }

        button:hover { background: var(--btn-hover); }

        .arrays-section {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            width: 100%;
            max-width: 920px;
        }

        .array-row {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            justify-content: center;
        }

        .array-label {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--text-dim);
            min-width: 80px;
            text-align: right;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
        }

        .tile.pointer-i  { border: 3px solid var(--accent-green); transform: scale(1.15); box-shadow: 0 0 14px var(--accent-green); }
        .tile.pointer-j  { border: 3px solid var(--accent-red);   transform: scale(1.15); box-shadow: 0 0 14px var(--accent-red); }
        .tile.pointer-merge { border: 3px solid var(--accent-blue); transform: scale(1.15); box-shadow: 0 0 14px var(--accent-blue); }

        .pointer-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            width: 520px;
            text-align: center;
            font-family: monospace;
        }

        .pointer-values {
            display: flex;
            justify-content: center;
            gap: 32px;
            font-size: 18px;
            font-weight: 700;
        }

        .action-text {
            margin-top: 12px;
            font-size: 14px;
            min-height: 24px;
            color: var(--text-main);
        }

        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #res-val {
            font-family: monospace;
            transition: all 0.2s;
        }

        .pop {
            animation: popAnim 400ms ease;
            font-size: 26px !important;
            color: var(--accent-green) !important;
        }

        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.28); }
            100% { transform: scale(1); }
        }

        .status-bar { 
            margin-top: 8px; 
            font-size: 13px; 
            color: var(--text-dim); 
            height: 1.2em; 
            text-align: center; 
        }

        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }

        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .legend-item { 
            display: flex; 
            align-items: center; 
            font-size: 12px; 
            color: var(--text-dim); 
        }

        .dot { 
            width: 10px; 
            height: 10px; 
            border-radius: 50%; 
            margin-right: 6px; 
        }

        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 620px;
            max-width: 90%;
            height: 130px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">nums1 =</label>
        <input type="text" id="nums1-input" value="1,3">
        <label class="array-label">nums2 =</label>
        <input type="text" id="nums2-input" value="2">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,3], [2])">Example 1</button>
        <button onclick="loadExample([1,2], [3,4])">Example 2</button>
    </div>

    <div class="arrays-section">
        <div class="array-row">
            <div class="array-label">nums1 =</div>
            <div class="tiles-wrapper" id="tiles-nums1"></div>
        </div>
        <div class="array-row">
            <div class="array-label">nums2 =</div>
            <div class="tiles-wrapper" id="tiles-nums2"></div>
        </div>
        <div class="array-row">
            <div class="array-label">merged =</div>
            <div class="tiles-wrapper" id="tiles-merged"></div>
        </div>
    </div>

    <div class="pointer-panel">
        <div class="pointer-values">
            <span>i = <span id="v-i" class="i" style="color:var(--accent-green)">0</span></span>
            <span>j = <span id="v-j" class="j" style="color:var(--accent-red)">0</span></span>
        </div>
        <div id="action-text" class="action-text">—</div>
    </div>

    <div class="info-panel">
        <div class="info-cell"><div class="info-label">i</div><div class="info-value" id="val-i" style="color:var(--accent-green)">—</div></div>
        <div class="info-cell"><div class="info-label">j</div><div class="info-value" id="val-j" style="color:var(--accent-red)">—</div></div>
        <div class="info-cell"><div class="info-label">merged len</div><div class="info-value" id="val-len" style="color:var(--accent-blue)">0</div></div>
        <div class="info-cell"><div class="info-label">last</div><div class="info-value" id="val-last" style="color:var(--accent-orange)">—</div></div>
    </div>

    <div class="result-display">
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:4px;">median =</div>
        <div id="res-val" style="font-size:16px;color:var(--text-dim)">—</div>
    </div>

    <div class="status-bar" id="status-text">Ready...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--accent-green)"></div> i (nums1)</div>
        <div class="legend-item"><div class="dot" style="background:var(--accent-red)"></div> j (nums2)</div>
        <div class="legend-item"><div class="dot" style="background:var(--accent-blue)"></div> merged</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let nums1 = [1,3];
        let nums2 = [2];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;
        const delays = [1800, 900, 450];

        function init() {
            loadExample([1,3], [2]);
        }

        function loadExample(n1, n2) {
            nums1 = n1.slice();
            nums2 = n2.slice();
            document.getElementById('nums1-input').value = nums1.join(', ');
            document.getElementById('nums2-input').value = nums2.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const v1 = document.getElementById('nums1-input').value.split(',').map(x=>parseInt(x.trim())).filter(x=>!isNaN(x));
            const v2 = document.getElementById('nums2-input').value.split(',').map(x=>parseInt(x.trim())).filter(x=>!isNaN(x));
            if (v1.length >= 0 && v2.length >= 0) {
                nums1 = v1;
                nums2 = v2;
                generateSteps();
                reset();
            }
        }

        function generateSteps() {
            steps = [];
            let merged = [];
            let i = 0, j = 0;
            const m = nums1.length;
            const n = nums2.length;

            steps.push({
                type: 'init',
                i: 0, j: 0,
                nums1: nums1.slice(),
                nums2: nums2.slice(),
                merged: [],
                status: `nums1=[${nums1}] nums2=[${nums2}] — Starting merge`,
                log: `Starting brute force merge of two sorted arrays`,
                logColor: '#8b949e',
                action: 'Initialize i=0, j=0'
            });

            while (i < m || j < n) {
                let tileClasses1 = Array(m).fill('');
                let tileClasses2 = Array(n).fill('');
                if (i < m) tileClasses1[i] = 'pointer-i';
                if (j < n) tileClasses2[j] = 'pointer-j';

                steps.push({
                    type: 'compare',
                    i: i, j: j,
                    nums1: nums1.slice(),
                    nums2: nums2.slice(),
                    merged: merged.slice(),
                    tileClasses1: tileClasses1,
                    tileClasses2: tileClasses2,
                    status: `Compare nums1[${i}](${i<m?nums1[i]:'—'}) vs nums2[${j}](${j<n?nums2[j]:'—'})`,
                    log: `Compare nums1[${i}] and nums2[${j}]`,
                    logColor: '#58a6ff',
                    action: 'Compare'
                });

                let val, from;
                if (i < m && (j >= n || nums1[i] <= nums2[j])) {
                    val = nums1[i++];
                    from = 1;
                } else {
                    val = nums2[j++];
                    from = 2;
                }
                merged.push(val);

                let mergedClasses = Array(merged.length).fill('');
                mergedClasses[merged.length-1] = 'pointer-merge';

                steps.push({
                    type: 'append',
                    i: i, j: j,
                    nums1: nums1.slice(),
                    nums2: nums2.slice(),
                    merged: merged.slice(),
                    tileClasses1: Array(m).fill(''),
                    tileClasses2: Array(n).fill(''),
                    mergedClasses: mergedClasses,
                    status: `Appended ${val} from nums${from}`,
                    log: `Appended ${val} from nums${from}`,
                    logColor: from===1 ? '#3fb950' : '#f85149',
                    action: `Append ${val}`
                });
            }

            const total = merged.length;
            let median = total % 2 === 1 ? merged[total>>1] : (merged[total>>1 - 1] + merged[total>>1]) / 2;

            steps.push({
                type: 'final',
                nums1: nums1.slice(),
                nums2: nums2.slice(),
                merged: merged.slice(),
                status: `Merge complete. Median = ${median}`,
                log: `Final merged = [${merged}] → median = ${median}`,
                logColor: '#3fb950',
                bold: true,
                action: '—',
                result: median
            });
        }

        function renderTiles(id, values, classes) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            values.forEach((val, idx) => {
                const unit = document.createElement('div');
                unit.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${classes[idx] || ''}`;
                tile.textContent = val;
                const idxEl = document.createElement('div');
                idxEl.className = 'tile-index';
                idxEl.textContent = `[${idx}]`;
                unit.appendChild(tile);
                unit.appendChild(idxEl);
                container.appendChild(unit);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            renderTiles('tiles-nums1', step.nums1, step.tileClasses1 || []);
            renderTiles('tiles-nums2', step.nums2, step.tileClasses2 || []);
            renderTiles('tiles-merged', step.merged, step.mergedClasses || []);

            document.getElementById('v-i').textContent = step.i;
            document.getElementById('v-j').textContent = step.j;

            document.getElementById('val-i').textContent = step.i;
            document.getElementById('val-j').textContent = step.j;
            document.getElementById('val-len').textContent = step.merged.length;
            document.getElementById('val-last').textContent = step.merged.length ? step.merged[step.merged.length-1] : '—';

            document.getElementById('action-text').textContent = step.action || '—';
            document.getElementById('status-text').textContent = step.status;

            const res = document.getElementById('res-val');
            if (step.result !== undefined) {
                res.textContent = step.result;
                res.classList.add('pop');
            } else {
                res.textContent = '—';
                res.classList.remove('pop');
            }

            // Cumulative log
            const logEl = document.getElementById('log');
            logEl.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    line.style.color = steps[k].logColor || '#c9d1d9';
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.textContent = steps[k].log;
                    logEl.appendChild(line);
                }
            }
            logEl.scrollTop = logEl.scrollHeight;
        }

        function next() { if (stepIndex < steps.length-1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length-1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').textContent = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').textContent = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = () => { if (isPlaying) { pause(); play(); } };

        window.onload = init;
    </script>
</body>
</html>
