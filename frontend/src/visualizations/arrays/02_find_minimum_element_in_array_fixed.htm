```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Minimum - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 240px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
        }

        /* Tile States (Identical to Find Max) */
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 1.5px solid var(--accent-green); color: var(--accent-green); transform: scale(1.06); }
        .tile.defeated { background: #2a0d0d; border: 1.5px solid var(--accent-red); color: var(--accent-red); opacity: 0.6; }
        .tile.maximum { 
            background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); 
            transform: scale(1.15); box-shadow: 0 0 14px var(--accent-green); 
        }
        .tile.eliminated { opacity: 0.22; background: var(--bg-surface); }
        .tile.past { opacity: 0.3; }

        /* ROW 3: COMPARISON PANEL */
        .comparison-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 10px 18px;
            width: 400px;
            text-align: center;
            font-family: monospace;
        }

        .comp-val-j { color: var(--accent-blue); font-weight: 700; font-size: 18px; }
        .comp-val-i { color: var(--accent-orange); font-weight: 700; font-size: 18px; }
        .comp-op { font-size: 22px; font-weight: 700; margin: 0 12px; }
        .comp-text { margin-top: 4px; font-size: 13px; }

        /* ROW 4: INFO PANEL */
        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        .badge {
            border-radius: 14px;
            padding: 3px 10px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge.true { background: #0f2a1a; border: 1.5px solid var(--accent-green); color: var(--accent-green); }
        .badge.false { background: #2a0d0d; border: 1.5px solid var(--accent-red); color: var(--accent-red); }
        .badge.pending { background: #21262d; border: 1px solid var(--border-main); color: var(--text-dim); }

        /* ROW 5: RESULT DISPLAY */
        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #res-val { font-family: monospace; transition: all 0.2s; }
        .pop { animation: popAnim 400ms ease; box-shadow: 0 0 16px var(--accent-green); }

        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.28); }
            100% { transform: scale(1); }
        }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        /* ROW 7: CONTROLS */
        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        /* ROW 8: LEGEND */
        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 600px;
            max-width: 90%;
            height: 120px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-line { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">array =</label>
        <input type="text" id="array-input" placeholder="5, 3, 8, 1, 2">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([5, 3, 8, 1, 2])">Example 1</button>
        <button onclick="loadExample([-2, -5, -1, -8, -3])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="comparison-panel" id="comp-panel">
        <div id="comp-content" style="display: none;">
            <span class="comp-val-j" id="v-j">0</span>
            <span class="comp-op" id="v-op">&lt;</span>
            <span class="comp-val-i" id="v-i">0</span>
            <div class="comp-text" id="v-msg">...</div>
        </div>
        <div id="comp-placeholder" style="color: var(--text-dim);">—</div>
    </div>

    <div class="info-panel">
        <div class="info-cell"><div class="info-label">i (candidate)</div><div class="info-value" id="val-i" style="color: var(--accent-orange);">—</div></div>
        <div class="info-cell"><div class="info-label">j (comparing)</div><div class="info-value" id="val-j" style="color: var(--accent-blue);">—</div></div>
        <div class="info-cell"><div class="info-label">array[i]</div><div class="info-value" id="val-ai" style="color: var(--accent-orange);">—</div></div>
        <div class="info-cell"><div class="info-label">is_min</div><div id="val-ismin" class="badge pending">—</div></div>
    </div>

    <div class="result-display">
        <div class="info-label" style="font-size: 12px; margin-bottom: 4px;">min =</div>
        <div id="res-val" style="font-size: 16px; color: var(--text-dim);">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> Candidate (i)</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-blue);"></div> Comparing (j)</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> Survives comparison</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-red);"></div> Defeated</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green);"></div> Minimum found</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentArray = [5, 3, 8, 1, 2];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample(currentArray);
        }

        function loadExample(arr) {
            currentArray = arr.slice(0, 8);
            document.getElementById('array-input').value = currentArray.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (arr.length > 0) loadExample(arr);
        }

        function generateSteps() {
            steps = [];
            const n = currentArray.length;
            const eliminated = new Set();
            
            // Step 0: INIT
            steps.push({
                type: 'init',
                i: null, j: null, is_min: null,
                tileStates: Array(n).fill('idle'),
                status: `array=[${currentArray}] — n=${n}. Click Play to begin.`,
                log: `array=[${currentArray}] — n=${n}. Starting brute force min search.`,
                logColor: '#8b949e'
            });

            for (let i = 0; i < n; i++) {
                let candidateVal = currentArray[i];
                let isMin = true;
                
                // STEP A: Start candidate i
                steps.push({
                    type: 'candidate',
                    i: i, j: null, ai: candidateVal, is_min: 'pending',
                    tileStates: getTileStates(n, i, null, eliminated),
                    status: `i=${i}: testing candidate array[${i}]=${candidateVal}`,
                    log: `i=${i}: candidate=${candidateVal} — testing against all others`,
                    logColor: '#8b949e'
                });

                let pastJ = [];
                for (let j = 0; j < n; j++) {
                    if (i === j) continue;
                    let compareVal = currentArray[j];

                    // STEP B: Compare j against i
                    steps.push({
                        type: 'compare',
                        i: i, j: j, ai: candidateVal, aj: compareVal, is_min: true,
                        tileStates: getTileStates(n, i, j, eliminated, pastJ),
                        status: `j=${j}: array[${j}]=${compareVal} vs array[${i}]=${candidateVal}`,
                        log: null 
                    });

                    if (compareVal < candidateVal) {
                        isMin = false;
                        // STEP C: Defeated
                        steps.push({
                            type: 'defeated',
                            i: i, j: j, ai: candidateVal, aj: compareVal, is_min: false,
                            tileStates: getTileStates(n, i, j, eliminated, pastJ, true),
                            status: `j=${j}: array[${j}]=${compareVal} < array[${i}]=${candidateVal} → candidate DEFEATED ✗`,
                            log: `j=${j}: array[${j}]=${compareVal} < ${candidateVal} → candidate DEFEATED ✗ → break`,
                            logColor: '#f85149'
                        });
                        eliminated.add(i);
                        break; 
                    } else {
                        // STEP C: Survived
                        steps.push({
                            type: 'survived',
                            i: i, j: j, ai: candidateVal, aj: compareVal, is_min: true,
                            tileStates: getTileStates(n, i, j, eliminated, pastJ, false),
                            status: `array[${j}]=${compareVal} ≥ array[${i}]=${candidateVal} → candidate survives ✓`,
                            log: `j=${j}: array[${j}]=${compareVal} ≥ ${candidateVal} → survives ✓`,
                            logColor: '#3fb950'
                        });
                        pastJ.push(j);
                    }
                }

                if (isMin) {
                    // STEP D: Confirmed Minimum
                    steps.push({
                        type: 'minimum',
                        i: i, j: null, ai: candidateVal, is_min: true,
                        tileStates: getTileStates(n, -1, -1, eliminated, [], false, i),
                        status: `i=${i}: array[${i}]=${candidateVal} — ALL comparisons passed → MINIMUM ✓`,
                        log: `i=${i}: candidate=${candidateVal} — is_min=True → MINIMUM FOUND!`,
                        logColor: '#3fb950',
                        bold: true,
                        result: candidateVal
                    });
                    steps.push({
                        type: 'final',
                        i: i, ai: candidateVal,
                        tileStates: Array(n).fill(0).map((_, idx) => idx === i ? 'maximum' : 'eliminated'),
                        status: `Done. Minimum element = ${candidateVal}`,
                        log: `Result: min = ${candidateVal}`,
                        logColor: '#388bfd',
                        bold: true,
                        result: candidateVal
                    });
                    break;
                }
            }
        }

        function getTileStates(n, curI, curJ, eliminated, pastJ = [], isDefeated = false, minIdx = -1) {
            let states = Array(n).fill('idle');
            for (let idx of eliminated) states[idx] = 'eliminated';
            if (pastJ) for (let idx of pastJ) states[idx] = 'past';
            
            if (curI !== -1) states[curI] = isDefeated ? 'defeated' : 'candidate';
            if (curJ !== -1) states[curJ] = 'comparing';
            if (minIdx !== -1) states[minIdx] = 'maximum';
            
            return states;
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            currentArray.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[i]}`;
                tile.innerText = val;
                const index = document.createElement('div');
                index.className = 'tile-index';
                index.innerText = `[${i}]`;
                wrapper.appendChild(tile);
                wrapper.appendChild(index);
                container.appendChild(wrapper);
            });

            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-ai').innerText = step.ai !== undefined ? step.ai : '—';
            
            const badge = document.getElementById('val-ismin');
            badge.className = 'badge';
            if (step.is_min === true) { badge.innerText = 'True ✓'; badge.classList.add('true'); }
            else if (step.is_min === false) { badge.innerText = 'False ✗'; badge.classList.add('false'); }
            else { badge.innerText = '—'; badge.classList.add('pending'); }

            const compContent = document.getElementById('comp-content');
            const compPlaceholder = document.getElementById('comp-placeholder');
            if (step.type === 'compare' || step.type === 'defeated' || step.type === 'survived') {
                compContent.style.display = 'block';
                compPlaceholder.style.display = 'none';
                document.getElementById('v-j').innerText = step.aj;
                document.getElementById('v-i').innerText = step.ai;
                const op = document.getElementById('v-op');
                const msg = document.getElementById('v-msg');
                if (step.aj < step.ai) {
                    op.innerText = '<'; op.style.color = 'var(--accent-red)';
                    msg.innerText = `array[j] < array[i] → candidate DEFEATED ✗`;
                    msg.style.color = 'var(--accent-red)';
                } else {
                    op.innerText = '≥'; op.style.color = 'var(--accent-green)';
                    msg.innerText = `array[j] ≥ array[i] → candidate survives ✓`;
                    msg.style.color = 'var(--accent-green)';
                }
            } else {
                compContent.style.display = 'none';
                compPlaceholder.style.display = 'block';
            }

            document.getElementById('status-text').innerText = step.status;
            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.style.color = 'var(--accent-green)';
                resVal.style.fontSize = '26px';
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.style.color = 'var(--text-dim)';
                resVal.style.fontSize = '16px';
                resVal.classList.remove('pop');
            }

            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) {
                pause();
                play();
            }
        };

        window.onload = init;
    </script>
</body>
</html>
