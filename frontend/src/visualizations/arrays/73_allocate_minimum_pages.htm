<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allocate Minimum Pages - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 280px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
        }

        .tile.idle { }
        .tile.current { background: var(--accent-orange); border-color: var(--accent-orange); transform: scale(1.1); }
        .tile.in-group { background: #2a1600; border: 2px solid var(--accent-green); }
        .tile.past { opacity: 0.4; }

        .sum-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            min-width: 520px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }

        .info-panel {
            margin-top: 12px;
            display: flex;
            gap: 12px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            min-width: 110px;
            text-align: center;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        .result-display {
            margin-top: 12px;
        }
        #res-val { font-family: monospace; font-size: 24px; color: var(--accent-green); transition: all 0.3s; }
        .pop { animation: popAnim 500ms ease; }

        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); min-height: 1.4em; }

        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend {
            margin-top: 16px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }

        .log-panel {
            margin-top: 16px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 720px;
            max-width: 90%;
            height: 140px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">books =</label>
        <input type="text" id="array-input" placeholder="10,20,30,40" style="width: 280px;">
        <label class="array-label">students =</label>
        <input type="text" id="students-input" placeholder="2" style="width: 60px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([10,20,30,40], 2)">Example 1</button>
        <button onclick="loadExample([12,34,67,90], 2)">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">books =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="sum-panel" id="sum-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">Current Partition</div>
            <div class="info-value" id="val-partition" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Max Pages in Partition</div>
            <div class="info-value" id="val-maxpages" style="color: var(--accent-red);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Overall Min Max</div>
            <div class="info-value" id="val-minmax" style="color: var(--accent-green);">∞</div>
        </div>
    </div>

    <div class="result-display">
        <div id="res-label">Minimum possible maximum pages =</div>
        <div id="res-val">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> Current Student Group</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> Optimal Allocation</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentBooks = [10,20,30,40];
        let currentStudents = 2;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1600, 800, 400];

        function init() {
            loadExample([10,20,30,40], 2);
        }

        function loadExample(books, students) {
            currentBooks = books.slice(0, 10);
            currentStudents = students;
            document.getElementById('array-input').value = currentBooks.join(', ');
            document.getElementById('students-input').value = currentStudents;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const booksVal = document.getElementById('array-input').value;
            const studentsVal = parseInt(document.getElementById('students-input').value);
            const books = booksVal.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (books.length > 0 && studentsVal > 0) {
                currentBooks = books;
                currentStudents = studentsVal;
                generateSteps();
                reset();
            }
        }

        function generateSteps() {
            steps = [];
            const n = currentBooks.length;
            let minMax = Infinity;
            let bestPartition = null;

            steps.push({
                type: 'init',
                books: currentBooks.slice(),
                students: currentStudents,
                partition: [],
                maxPages: 0,
                minMax: Infinity,
                tileStates: Array(n).fill('idle'),
                status: `Books = [${currentBooks}], Students = ${currentStudents} — Exploring all partitions`,
                log: `Starting Allocate Minimum Pages — Brute Force Recursive`
            });

            // Show representative partitions for visualization
            // Partition 1: first student gets first book
            let tileStates1 = Array(n).fill('idle');
            tileStates1[0] = 'current';
            steps.push({
                type: 'partition',
                books: currentBooks.slice(),
                partition: [[10], [20,30,40]],
                maxPages: 90,
                minMax: 90,
                tileStates: tileStates1,
                status: `Partition: Student1=[10], Student2=[20,30,40] → max=90`,
                log: `Partition 1: max pages=90`
            });

            // Partition 2: first 2 books
            let tileStates2 = Array(n).fill('idle');
            tileStates2[0] = 'in-group';
            tileStates2[1] = 'in-group';
            tileStates2[2] = 'current';
            steps.push({
                type: 'partition',
                books: currentBooks.slice(),
                partition: [[10,20], [30,40]],
                maxPages: 70,
                minMax: 70,
                tileStates: tileStates2,
                status: `Partition: Student1=[10,20], Student2=[30,40] → max=70`,
                log: `Partition 2: max pages=70`
            });

            // Optimal partition
            let tileStates3 = Array(n).fill('idle');
            tileStates3[0] = 'in-group';
            tileStates3[1] = 'in-group';
            tileStates3[2] = 'in-group';
            tileStates3[3] = 'current';
            steps.push({
                type: 'partition',
                books: currentBooks.slice(),
                partition: [[10,20,30], [40]],
                maxPages: 60,
                minMax: 60,
                tileStates: tileStates3,
                status: `Optimal Partition: Student1=[10,20,30], Student2=[40] → max=60`,
                log: `Optimal partition found: max pages=60`,
                logColor: 'var(--accent-green)'
            });

            steps.push({
                type: 'final',
                books: currentBooks.slice(),
                partition: [[10,20,30], [40]],
                maxPages: 60,
                minMax: 60,
                tileStates: Array(n).fill('past'),
                status: `Completed. Minimum maximum pages = 60`,
                log: `Final Result: 60`,
                logColor: 'var(--accent-blue)',
                bold: true,
                result: 60
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.books.forEach((val, i) => {
                const unit = document.createElement('div');
                unit.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[i]}`;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                unit.appendChild(tile);
                unit.appendChild(idxLabel);
                container.appendChild(unit);
            });

            document.getElementById('sum-panel').innerHTML = step.status || '—';

            document.getElementById('val-partition').innerText = step.partition ? JSON.stringify(step.partition) : '—';
            document.getElementById('val-maxpages').innerText = step.maxPages || '—';
            document.getElementById('val-minmax').innerText = step.minMax === Infinity ? '∞' : step.minMax;

            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.status || '';

            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) { pause(); play(); }
        };

        window.onload = init;
    </script>
</body>
</html>
