<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Pairs - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 280px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
        }

        .tile.idle { }
        .tile.current-i { background: var(--accent-orange); border-color: var(--accent-orange); transform: scale(1.1); }
        .tile.current-j { background: var(--accent-blue); border-color: var(--accent-blue); transform: scale(1.1); }
        .tile.past { opacity: 0.4; }

        .sum-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            min-width: 460px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }

        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            min-width: 110px;
            text-align: center;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        .result-display {
            margin-top: 12px;
        }
        #res-val { font-family: monospace; font-size: 24px; color: var(--accent-green); transition: all 0.3s; }
        .pop { animation: popAnim 500ms ease; }

        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); min-height: 1.4em; }

        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        .legend {
            margin-top: 16px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }

        .log-panel {
            margin-top: 16px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 680px;
            max-width: 90%;
            height: 140px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">nums =</label>
        <input type="text" id="array-input" placeholder="1, 3, 2, 3, 1" style="width: 280px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,3,2,3,1])">Example 1</button>
        <button onclick="loadExample([2,4,3,5,1])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">nums =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="sum-panel" id="sum-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">i (left)</div>
            <div class="info-value" id="val-i" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">j (right)</div>
            <div class="info-value" id="val-j" style="color: var(--accent-blue);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Condition</div>
            <div class="info-value" id="val-cond" style="color: var(--accent-green);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Count</div>
            <div class="info-value" id="val-count" style="color: var(--accent-green);">0</div>
        </div>
    </div>

    <div class="result-display">
        <div id="res-label">Number of reverse pairs =</div>
        <div id="res-val">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> i (left element)</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-blue);"></div> j (right element)</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> Valid reverse pair</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentArray = [1, 3, 2, 3, 1];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1400, 700, 350];

        function init() {
            loadExample([1, 3, 2, 3, 1]);
        }

        function loadExample(arr) {
            currentArray = arr.slice(0, 12);
            document.getElementById('array-input').value = currentArray.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (arr.length > 0) {
                currentArray = arr;
                generateSteps();
                reset();
            }
        }

        function generateSteps() {
            steps = [];
            const n = currentArray.length;
            let count = 0;

            steps.push({
                type: 'init',
                nums: currentArray.slice(),
                i: -1,
                j: -1,
                count: 0,
                tileStates: Array(n).fill('idle'),
                status: `nums = [${currentArray}] — Brute force O(n²) counting reverse pairs`,
                log: `Starting Reverse Pairs — Brute Force (nested i < j loops)`
            });

            for (let i = 0; i < n; i++) {
                let tileStatesStart = Array(n).fill('idle');
                tileStatesStart[i] = 'current-i';
                steps.push({
                    type: 'start_i',
                    nums: currentArray.slice(),
                    i: i,
                    j: -1,
                    count: count,
                    tileStates: tileStatesStart,
                    status: `i=${i} (nums[${i}]=${currentArray[i]}) — checking j > ${i}`,
                    log: `i=${i}: starting inner loop for j > ${i}`
                });

                for (let j = i + 1; j < n; j++) {
                    const isValid = currentArray[i] > 2 * currentArray[j];

                    let tileStates = Array(n).fill('idle');
                    tileStates[i] = 'current-i';
                    tileStates[j] = 'current-j';

                    steps.push({
                        type: 'check_pair',
                        nums: currentArray.slice(),
                        i: i,
                        j: j,
                        count: count,
                        tileStates: tileStates,
                        status: `Checking pair (${i},${j}): ${currentArray[i]} > 2*${currentArray[j]} = ${2*currentArray[j]} ? ${isValid ? 'YES' : 'NO'}`,
                        log: `i=${i} j=${j}: ${currentArray[i]} > 2*${currentArray[j]} → ${isValid ? 'valid pair' : 'no'}`
                    });

                    if (isValid) {
                        count++;
                        steps.push({
                            type: 'valid',
                            nums: currentArray.slice(),
                            i: i,
                            j: j,
                            count: count,
                            tileStates: tileStates,
                            status: `✓ Valid reverse pair found! count = ${count}`,
                            log: `Valid pair → count = ${count}`,
                            logColor: 'var(--accent-green)'
                        });
                    }
                }
            }

            steps.push({
                type: 'final',
                nums: currentArray.slice(),
                i: -1,
                j: -1,
                count: count,
                tileStates: Array(n).fill('past'),
                status: `Complete. Total reverse pairs = ${count}`,
                log: `Final result: ${count}`,
                logColor: 'var(--accent-blue)',
                bold: true,
                result: count
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.nums.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[i]}`;
                tile.innerText = val;
                const index = document.createElement('div');
                index.className = 'tile-index';
                index.innerText = `[${i}]`;
                wrapper.appendChild(tile);
                wrapper.appendChild(index);
                container.appendChild(wrapper);
            });

            document.getElementById('sum-panel').innerHTML = step.status || '—';

            document.getElementById('val-i').innerText = step.i !== -1 ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== -1 ? step.j : '—';
            document.getElementById('val-cond').innerText = (step.i !== -1 && step.j !== -1) ? 
                `${step.nums[step.i]} > 2*${step.nums[step.j]} = ${2*step.nums[step.j]}` : '—';
            document.getElementById('val-count').innerText = step.count;

            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.status || '';

            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) { pause(); play(); }
        };

        window.onload = init;
    </script>
</body>
</html>
