<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Majority Element - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 260px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.candidate-comparing { background: linear-gradient(135deg, #2a1600 50%, #0d2244 50%); border: 2px solid var(--accent-blue); color: var(--text-main); transform: scale(1.12); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.06); }
        .tile.defeated { background: #2a0d0d; border: 2px solid var(--accent-red); color: var(--accent-red); }
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.7; }
        .tile.maximum { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); box-shadow: 0 0 12px var(--accent-green); transform: scale(1.15); z-index: 3;}

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 550px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 100px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }
        .pop-none { animation: popAnim 400ms ease; color: var(--accent-orange) !important; font-size: 26px !important; }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 700px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">array =</label>
        <input type="text" id="arr-input" placeholder="3, 2, 3">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([3, 2, 3])">Ex 1</button>
        <button onclick="loadExample([2, 2, 1, 1, 1, 2, 2])">Ex 2</button>
    </div>

    <div class="array-container">
        <div class="ui-label" style="font-size: 12px; white-space: nowrap;">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Candidate (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Comparing (j)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Count</span>
            <span class="info-value" id="val-count" style="color: var(--text-main);">0</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Threshold (n/2)</span>
            <span class="info-value" id="val-thresh" style="color: var(--accent-purple);">0</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Majority Element =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Candidate (i)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Comparing (j)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Match (count++)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red)"></span> No Match</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); box-shadow: 0 0 6px var(--accent-green);"></span> Majority Found</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [3, 2, 3];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([3, 2, 3]); }

        function loadExample(newArr) {
            arr = [...newArr];
            document.getElementById('arr-input').value = arr.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valArr = document.getElementById('arr-input').value;
            const parsedArr = valArr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (parsedArr.length > 0) {
                // To keep visualization clean, limit length
                loadExample(parsedArr.slice(0, 15));
            }
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;
            const threshold = Math.floor(n / 2);

            steps.push({
                type: 'init', i: '—', j: '—', count: 0, thresh: threshold,
                tiles: arr.map(v => ({val: v, state: 'idle'})),
                panel: '—',
                statusText: `array=[${arr.join(', ')}] n=${n}. Threshold = floor(${n}/2) = ${threshold}. Click Play to begin.`,
                log: `n=${n}, threshold=${threshold}. Starting Brute Force O(n²) search.`,
                logColor: 'var(--text-dim)'
            });

            let majorityElement = null;

            for (let i = 0; i < n; i++) {
                let candidate = arr[i];
                let count = 0;

                // STEP A: Select Candidate
                steps.push({
                    type: 'candidate', i: i, j: '—', count: count, thresh: threshold,
                    tiles: arr.map((v, idx) => ({
                        val: v,
                        state: idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')
                    })),
                    panel: `Candidate selected: arr[${i}] = ${candidate}`,
                    statusText: `Outer loop i=${i}: Testing candidate ${candidate}`,
                    log: `i=${i}: Candidate ${candidate} selected. Testing against all elements.`,
                    logColor: 'var(--accent-orange)'
                });

                for (let j = 0; j < n; j++) {
                    let isMatch = arr[j] === candidate;

                    // STEP B: Compare
                    steps.push({
                        type: 'compare', i: i, j: j, count: count, thresh: threshold,
                        tiles: arr.map((v, idx) => ({
                            val: v,
                            state: idx === j && idx === i ? 'candidate-comparing' : 
                                   (idx === j ? 'comparing' : 
                                   (idx === i ? 'candidate' : 
                                   (idx < i && idx !== j ? 'past' : 'idle')))
                        })),
                        panel: `Comparing arr[${j}] (${arr[j]}) == Candidate (${candidate}) ?`,
                        statusText: `Inner loop j=${j}: Comparing values`,
                        log: null, // Keep log clean, only log results
                        logColor: 'var(--text-main)'
                    });

                    if (isMatch) {
                        count++;
                        steps.push({
                            type: 'match', i: i, j: j, count: count, thresh: threshold,
                            tiles: arr.map((v, idx) => ({
                                val: v,
                                state: idx === j ? 'winning' : 
                                       (idx === i ? 'candidate' : 
                                       (idx < i ? 'past' : 'idle'))
                            })),
                            panel: `<span style="color:var(--accent-green)">Match! ${arr[j]} == ${candidate} → Count increments to ${count}</span>`,
                            statusText: `Match found. count=${count}`,
                            log: `  j=${j}: ${arr[j]} == ${candidate} ✓ → count=${count}`,
                            logColor: 'var(--accent-green)'
                        });
                    } else {
                        steps.push({
                            type: 'nomatch', i: i, j: j, count: count, thresh: threshold,
                            tiles: arr.map((v, idx) => ({
                                val: v,
                                state: idx === j ? 'defeated' : 
                                       (idx === i ? 'candidate' : 
                                       (idx < i ? 'past' : 'idle'))
                            })),
                            panel: `<span style="color:var(--accent-red)">No match. ${arr[j]} != ${candidate}</span>`,
                            statusText: `No match. Count remains ${count}`,
                            log: `  j=${j}: ${arr[j]} != ${candidate} ✗`,
                            logColor: 'var(--accent-red)'
                        });
                    }
                }

                // STEP C: Check Threshold
                if (count > threshold) {
                    majorityElement = candidate;
                    steps.push({
                        type: 'found', i: i, j: '—', count: count, thresh: threshold,
                        tiles: arr.map((v, idx) => ({
                            val: v,
                            state: v === candidate ? 'maximum' : 'past'
                        })),
                        panel: `<span style="color:var(--accent-green)">Majority Found! Count ${count} > Threshold ${threshold}</span>`,
                        statusText: `Candidate ${candidate} is the majority element!`,
                        log: `Count ${count} > ${threshold}. Majority element found: ${candidate} ✓`,
                        logColor: 'var(--accent-green)'
                    });
                    break;
                } else {
                    steps.push({
                        type: 'failed', i: i, j: '—', count: count, thresh: threshold,
                        tiles: arr.map((v, idx) => ({
                            val: v,
                            state: idx === i ? 'defeated' : (idx <= i ? 'past' : 'idle')
                        })),
                        panel: `<span style="color:var(--accent-orange)">Count ${count} <= Threshold ${threshold}. Candidate defeated.</span>`,
                        statusText: `Candidate ${candidate} does not appear more than n/2 times.`,
                        log: `Count ${count} ≤ ${threshold}. Candidate ${candidate} defeated ✗`,
                        logColor: 'var(--accent-orange)'
                    });
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final', i: '—', j: '—', count: '—', thresh: threshold,
                tiles: arr.map(v => ({
                    val: v,
                    state: v === majorityElement ? 'maximum' : 'past'
                })),
                panel: 'Array Traversal Complete',
                complete: true,
                isNone: majorityElement === null,
                result: majorityElement !== null ? majorityElement : 'None',
                statusText: majorityElement !== null ? `Done. Majority element is ${majorityElement}.` : `Done. No majority element exists.`,
                log: majorityElement !== null ? `Final result: Majority Element = ${majorityElement}` : `Final result: None (no majority element)`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-i').innerText = step.i;
            document.getElementById('val-j').innerText = step.j;
            document.getElementById('val-count').innerText = step.count;
            document.getElementById('val-thresh').innerText = step.thresh;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            
            if (step.complete) {
                resVal.className = step.isNone ? 'pop-none' : 'pop';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
