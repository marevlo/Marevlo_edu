<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contains Duplicate - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 260px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .array-row { display: flex; align-items: center; gap: 12px; min-height: 50px; justify-content: center; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-start; max-width: 800px; min-height: 50px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 16px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main); padding: 0 6px;
        }
        .tile-index { font-size: 10px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.added { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.past { opacity: 0.4; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 600px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 100px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 18px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-orange) !important; font-size: 26px !important; }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 700px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">array =</label>
        <input type="text" id="arr-input" placeholder="1, 2, 3, 1">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1, 2, 3, 1])">Ex 1</button>
        <button onclick="loadExample([1, 2, 3, 4])">Ex 2</button>
        <button onclick="loadExample([1, 1, 1, 3, 3, 4, 3, 2, 4, 2])">Ex 3</button>
    </div>

    <div class="visual-container">
        <div class="array-row">
            <div class="ui-label" style="width: 80px; text-align: right;">Array:</div>
            <div class="tiles-wrapper" id="arr-tiles"></div>
        </div>
        <div class="array-row">
            <div class="ui-label" style="width: 80px; text-align: right;">Hash Set:</div>
            <div class="tiles-wrapper" id="set-tiles"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Index (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">arr[i]</span>
            <span class="info-value" id="val-val" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Set Elements</span>
            <span class="info-value" id="val-set" style="color: var(--accent-blue);">{}</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">contains duplicate? =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Current Array Element</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Added to Set</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); box-shadow: 0 0 6px var(--accent-green);"></span> Duplicate Found (Match)</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Past / Ignored</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [1, 2, 3, 1];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([1, 2, 3, 1]); }

        function loadExample(newArr) {
            arr = [...newArr];
            document.getElementById('arr-input').value = arr.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('arr-input').value;
            const parsedArr = valStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (parsedArr.length > 0) {
                loadExample(parsedArr.slice(0, 15)); // Limit length for visualization
            }
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;
            let seen = new Set();
            let setArr = [];
            let found = false;

            // STEP 0: INIT
            steps.push({
                type: 'init', i: '—', val: '—', setStr: '{}',
                arrStates: arr.map(() => 'idle'),
                setVals: [], setStates: [],
                panel: 'Initialize an empty Hash Set to keep track of seen elements.',
                statusText: `array=[${arr.join(', ')}], n=${n}. Click Play to begin.`,
                log: `n=${n}. Starting Hash Set approach O(n) to find duplicates.`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 0; i < n; i++) {
                let val = arr[i];

                // STEP A: Select and Check
                steps.push({
                    type: 'select', i: i, val: val, setStr: `{${setArr.join(', ')}}`,
                    arrStates: arr.map((v, idx) => idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')),
                    setVals: [...setArr],
                    setStates: setArr.map(() => 'idle'),
                    panel: `Check if element <b>${val}</b> is already in the Hash Set.`,
                    statusText: `Evaluating element at index ${i}...`,
                    log: `i=${i}: arr[${i}] = ${val}. Check if ${val} exists in set.`,
                    logColor: 'var(--text-main)'
                });

                if (seen.has(val)) {
                    found = true;
                    let matchIdx = setArr.indexOf(val);

                    // STEP B: Duplicate Found
                    steps.push({
                        type: 'found', i: i, val: val, setStr: `{${setArr.join(', ')}}`,
                        arrStates: arr.map((v, idx) => idx === i ? 'winning' : (idx < i ? 'past' : 'idle')),
                        setVals: [...setArr],
                        setStates: setArr.map((v, idx) => idx === matchIdx ? 'winning' : 'idle'),
                        panel: `<span style="color:var(--accent-green)">✓ <b>${val}</b> is already in the set! Duplicate found.</span>`,
                        statusText: `Duplicate identified! Returning true.`,
                        log: `  ${val} is in the set. Duplicate found! Return true.`,
                        logColor: 'var(--accent-green)'
                    });
                    break;
                } else {
                    seen.add(val);
                    setArr.push(val);

                    // STEP C: Add to Set
                    steps.push({
                        type: 'add', i: i, val: val, setStr: `{${setArr.join(', ')}}`,
                        arrStates: arr.map((v, idx) => idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')),
                        setVals: [...setArr],
                        setStates: setArr.map((v, idx) => idx === setArr.length - 1 ? 'added' : 'idle'),
                        panel: `<span style="color:var(--accent-blue)">✗ <b>${val}</b> is not in the set. Adding ${val} to the set.</span>`,
                        statusText: `Element added to Hash Set. Continuing...`,
                        log: `  ${val} not found in set. Add to set.`,
                        logColor: 'var(--accent-blue)'
                    });
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final', i: '—', val: '—', setStr: `{${setArr.join(', ')}}`,
                arrStates: arr.map((v, idx) => 'past'),
                setVals: [...setArr],
                setStates: setArr.map(() => 'idle'),
                panel: found ? 'Search terminated early. Duplicate was found.' : 'Array traversed completely. No duplicates found.',
                complete: true,
                result: found ? 'True' : 'False',
                isTrue: found,
                statusText: found ? `Done. Array contains at least one duplicate.` : `Done. All elements are distinct.`,
                log: `Final result: Contains Duplicate = ${found}`,
                logColor: found ? 'var(--accent-green)' : 'var(--accent-orange)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Original Array
            const arrContainer = document.getElementById('arr-tiles');
            arrContainer.innerHTML = '';
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                
                // If it's the final step and a match was found, highlight the last element checked if we want,
                // but we set all to 'past' in final step for simplicity. We can override if needed.
                tile.className = `tile ${step.arrStates[i]}`;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                arrContainer.appendChild(wrapper);
            });

            // Render Hash Set
            const setContainer = document.getElementById('set-tiles');
            setContainer.innerHTML = '';
            if (step.setVals.length === 0) {
                const empty = document.createElement('div');
                empty.style.color = 'var(--text-dim)';
                empty.style.fontSize = '14px';
                empty.style.fontFamily = 'monospace';
                empty.style.padding = '10px 0';
                empty.innerText = 'Empty Set';
                setContainer.appendChild(empty);
            } else {
                step.setVals.forEach((val, i) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'tile-unit';
                    const tile = document.createElement('div');
                    tile.className = `tile ${step.setStates[i]}`;
                    tile.innerText = val;
                    wrapper.append(tile);
                    setContainer.appendChild(wrapper);
                });
            }

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-i').innerText = step.i;
            document.getElementById('val-val').innerText = step.val;
            document.getElementById('val-set').innerText = step.setStr;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            
            if (step.complete) {
                resVal.className = step.isTrue ? 'pop' : 'pop-false';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
