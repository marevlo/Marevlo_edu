<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotate Image - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 320px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .matrix-wrapper { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .matrix-row { display: flex; gap: 8px; justify-content: center; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 16px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.12); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.08); box-shadow: 0 0 8px var(--accent-green); z-index: 2;}
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.8; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 600px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; text-align: center; max-width: 600px; word-break: break-all; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 20px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 700px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">matrix =</label>
        <input type="text" id="arr-input" placeholder="[[1,2,3],[4,5,6],[7,8,9]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([[1,2,3],[4,5,6],[7,8,9]])">Ex 1 (3x3)</button>
        <button onclick="loadExample([[5,1,9,11],[2,4,8,10],[13,3,6,7],[15,14,12,16]])">Ex 2 (4x4)</button>
    </div>

    <div class="array-container">
        <div class="ui-label" style="font-size: 12px;">Matrix Grid:</div>
        <div class="matrix-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Phase</span>
            <span class="info-value" id="val-phase" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Cell A</span>
            <span class="info-value" id="val-cellA" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Cell B</span>
            <span class="info-value" id="val-cellB" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Action</span>
            <span class="info-value" id="val-action" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">rotated matrix =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Selection A</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Selection B</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); box-shadow: 0 0 6px var(--accent-green);"></span> Swapped Successfully</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Idle / Unchanged</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let matrix = [[1,2,3],[4,5,6],[7,8,9]];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([[1,2,3],[4,5,6],[7,8,9]]); }

        function loadExample(newMatrix) {
            matrix = newMatrix.map(row => [...row]);
            document.getElementById('arr-input').value = JSON.stringify(matrix);
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('arr-input').value;
            try {
                const parsedMatrix = JSON.parse(valStr);
                if (Array.isArray(parsedMatrix) && parsedMatrix.length > 0 && Array.isArray(parsedMatrix[0])) {
                    // Check if square
                    if (parsedMatrix.length === parsedMatrix[0].length) {
                        loadExample(parsedMatrix);
                    } else {
                        alert("Matrix must be square (N x N) for Rotate Image.");
                    }
                } else {
                    alert("Invalid matrix format. Use [[1,2],[3,4]]");
                }
            } catch (e) {
                alert("Invalid JSON format. Use [[1,2],[3,4]]");
            }
        }

        function generateSteps() {
            steps = [];
            const n = matrix.length;
            let currentMatrix = matrix.map(row => [...row]);

            // STEP 0: INIT
            steps.push({
                type: 'init', phase: 'Ready', cellA: '—', cellB: '—', action: 'Initialize',
                matrixState: currentMatrix.map(row => row.map(v => ({val: v, state: 'idle'}))),
                panel: '—',
                statusText: `Matrix size ${n}x${n}. Click Play to begin.`,
                log: `n=${n}. Starting Rotate Image (in-place). Approach: Transpose, then Reverse Rows.`,
                logColor: 'var(--text-dim)'
            });

            // PHASE 1: TRANSPOSE (Swap matrix[i][j] with matrix[j][i])
            for (let i = 0; i < n; i++) {
                for (let j = i + 1; j < n; j++) {
                    // Select
                    steps.push({
                        type: 'select_transpose', phase: '1. Transpose', 
                        cellA: `[${i},${j}]`, cellB: `[${j},${i}]`, action: 'Selecting',
                        matrixState: currentMatrix.map((row, rIdx) => row.map((v, cIdx) => {
                            if (rIdx === i && cIdx === j) return {val: v, state: 'candidate'};
                            if (rIdx === j && cIdx === i) return {val: v, state: 'comparing'};
                            return {val: v, state: 'past'};
                        })),
                        panel: `Phase 1: Transpose Matrix. Swap element at [${i},${j}] with [${j},${i}]`,
                        statusText: `Selecting elements across the main diagonal.`,
                        log: `Transpose: Preparing to swap ${currentMatrix[i][j]} and ${currentMatrix[j][i]}`,
                        logColor: 'var(--text-main)'
                    });

                    // Swap
                    let temp = currentMatrix[i][j];
                    currentMatrix[i][j] = currentMatrix[j][i];
                    currentMatrix[j][i] = temp;

                    // Apply Swap
                    steps.push({
                        type: 'swap_transpose', phase: '1. Transpose', 
                        cellA: `[${i},${j}]`, cellB: `[${j},${i}]`, action: 'Swapped',
                        matrixState: currentMatrix.map((row, rIdx) => row.map((v, cIdx) => {
                            if ((rIdx === i && cIdx === j) || (rIdx === j && cIdx === i)) return {val: v, state: 'winning'};
                            return {val: v, state: 'past'};
                        })),
                        panel: `<span style="color:var(--accent-green)">Swapped values!</span>`,
                        statusText: `Elements swapped successfully.`,
                        log: `  Swapped → matrix[${i}][${j}]=${currentMatrix[i][j]}, matrix[${j}][${i}]=${currentMatrix[j][i]}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            // Transition
            steps.push({
                type: 'transition', phase: 'Transition', cellA: '—', cellB: '—', action: 'Matrix Transposed',
                matrixState: currentMatrix.map(row => row.map(v => ({val: v, state: 'idle'}))),
                panel: 'Transpose Complete. Now reversing each row.',
                statusText: `Phase 1 done. Matrix is transposed.`,
                log: `Phase 1 (Transpose) complete. Beginning Phase 2 (Reverse Rows).`,
                logColor: 'var(--accent-purple)'
            });

            // PHASE 2: REVERSE ROWS (Swap matrix[i][j] with matrix[i][n - 1 - j])
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < Math.floor(n / 2); j++) {
                    let rightCol = n - 1 - j;

                    // Select
                    steps.push({
                        type: 'select_reverse', phase: '2. Reverse Rows', 
                        cellA: `[${i},${j}]`, cellB: `[${i},${rightCol}]`, action: 'Selecting',
                        matrixState: currentMatrix.map((row, rIdx) => row.map((v, cIdx) => {
                            if (rIdx === i && cIdx === j) return {val: v, state: 'candidate'};
                            if (rIdx === i && cIdx === rightCol) return {val: v, state: 'comparing'};
                            return {val: v, state: 'past'};
                        })),
                        panel: `Phase 2: Reverse Row ${i}. Swap element at column ${j} with column ${rightCol}`,
                        statusText: `Selecting symmetrical elements in row ${i}.`,
                        log: `Reverse Row ${i}: Preparing to swap ${currentMatrix[i][j]} and ${currentMatrix[i][rightCol]}`,
                        logColor: 'var(--text-main)'
                    });

                    // Swap
                    let temp = currentMatrix[i][j];
                    currentMatrix[i][j] = currentMatrix[i][rightCol];
                    currentMatrix[i][rightCol] = temp;

                    // Apply Swap
                    steps.push({
                        type: 'swap_reverse', phase: '2. Reverse Rows', 
                        cellA: `[${i},${j}]`, cellB: `[${i},${rightCol}]`, action: 'Swapped',
                        matrixState: currentMatrix.map((row, rIdx) => row.map((v, cIdx) => {
                            if (rIdx === i && (cIdx === j || cIdx === rightCol)) return {val: v, state: 'winning'};
                            return {val: v, state: 'past'};
                        })),
                        panel: `<span style="color:var(--accent-green)">Swapped values horizontally!</span>`,
                        statusText: `Elements swapped successfully.`,
                        log: `  Swapped → matrix[${i}][${j}]=${currentMatrix[i][j]}, matrix[${i}][${rightCol}]=${currentMatrix[i][rightCol]}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final', phase: 'Done', cellA: '—', cellB: '—', action: 'Rotation Complete',
                matrixState: currentMatrix.map(row => row.map(v => ({val: v, state: 'winning'}))),
                panel: 'Image successfully rotated 90 degrees clockwise.',
                complete: true,
                finalStr: JSON.stringify(currentMatrix),
                statusText: `Done. In-place rotation applied successfully.`,
                log: `Final result: ${JSON.stringify(currentMatrix)}`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            
            step.matrixState.forEach((row, i) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'matrix-row';
                row.forEach((t, j) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'tile-unit';
                    const tile = document.createElement('div');
                    tile.className = `tile ${t.state}`;
                    tile.innerText = t.val;
                    const idxLabel = document.createElement('div');
                    idxLabel.className = 'tile-index';
                    idxLabel.innerText = `[${i},${j}]`;
                    wrapper.append(tile, idxLabel);
                    rowDiv.appendChild(wrapper);
                });
                container.appendChild(rowDiv);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-phase').innerText = step.phase;
            document.getElementById('val-cellA').innerText = step.cellA;
            document.getElementById('val-cellB').innerText = step.cellB;
            document.getElementById('val-action').innerText = step.action;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.finalStr : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
