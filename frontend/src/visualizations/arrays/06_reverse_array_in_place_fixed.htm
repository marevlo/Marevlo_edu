<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Array In Place - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }
        label.array-label { font-family: 'Courier New', monospace; font-size: 14px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 240px;
            font-size: 14px;
        }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 1.5px solid var(--accent-green); color: var(--accent-green); }
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }

        /* ROW 3: ACCUMULATION PANEL */
        .accumulation-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 500px; text-align: center; font-family: monospace; min-height: 52px;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 130px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        #res-val.complete { color: var(--accent-green); font-size: 22px; font-weight: 700; text-shadow: 0 0 16px var(--accent-green); animation: popAnim 400ms ease; }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
        }
        button:hover { background: var(--btn-hover); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 600px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">array =</label>
        <input type="text" id="array-input" placeholder="1, 2, 3, 4, 5">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1, 2, 3, 4, 5])">Example 1</button>
        <button onclick="loadExample([10, 20, 30])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="info-label" style="font-size: 12px; font-family: monospace;">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="accumulation-panel" id="accum-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Index i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Source Val</span>
            <span class="info-value" id="val-source" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Dest Val</span>
            <span class="info-value" id="val-dest" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="info-label" style="margin-bottom: 4px;">array =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="info-label" style="margin-right:4px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Dest/Target (i)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Source (n-1-i)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Copy Success</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let originalArr = [1, 2, 3, 4, 5];
        let currentArr = [1, 2, 3, 4, 5];
        let tempArr = [];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([1, 2, 3, 4, 5]); }

        function loadExample(arr) {
            originalArr = [...arr];
            document.getElementById('array-input').value = arr.join(',');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (arr.length > 0) loadExample(arr.slice(0, 8));
        }

        function generateSteps() {
            steps = [];
            const n = originalArr.length;
            const liveArr = [...originalArr];
            const localTempArr = new Array(n).fill(null);

            // STEP 0: INIT
            steps.push({
                type: 'init', i: null, sourceVal: null, destVal: null,
                tiles: liveArr.map(v => ({val: v, state: 'idle'})),
                accum: '—',
                status: `array=[${originalArr}] n=${n}. Click Play to begin.`,
                log: `array=[${originalArr}] — n=${n}. Starting brute force reverse.`
            });

            // PHASE 1: Copy to Temp
            for (let i = 0; i < n; i++) {
                const sourceIdx = n - 1 - i;
                const val = liveArr[sourceIdx];
                localTempArr[i] = val;

                steps.push({
                    type: 'p1_start', i, sourceVal: val, destVal: null,
                    tiles: liveArr.map((v, idx) => ({
                        val: v, 
                        state: idx === sourceIdx ? 'comparing' : (idx < i ? 'past' : 'idle')
                    })),
                    accum: `Phase 1: Copy from array[n-1-i] to temp[i]`,
                    status: `i=${i}: Reading array[${sourceIdx}]=${val}, copying to temp[${i}]`,
                    log: `i=${i}: temp[${i}] = array[${sourceIdx}] = ${val}`
                });

                steps.push({
                    type: 'p1_success', i, sourceVal: val, destVal: val,
                    tiles: liveArr.map((v, idx) => ({
                        val: v, 
                        state: idx === sourceIdx ? 'comparing' : (idx === i ? 'winning' : (idx < i ? 'past' : 'idle'))
                    })),
                    accum: `<span style="color:var(--accent-green)">temp[${i}]=${val} — copied ✓</span>`,
                    status: `i=${i}: Element copied to temp[${i}] ✓`,
                    log: `i=${i}: temp[${i}] = ${val} → Phase 1 progress`,
                    logColor: 'var(--accent-green)'
                });

                steps.push({
                    type: 'p1_processed', i, sourceVal: val, destVal: val,
                    tiles: liveArr.map((v, idx) => ({
                        val: v, 
                        state: idx <= i ? 'past' : 'idle'
                    })),
                    accum: '—',
                    status: `i=${i}: Temp updated. Moving to next.`,
                    log: null
                });
            }

            // PHASE 2: Copy back to original
            for (let i = 0; i < n; i++) {
                const val = localTempArr[i];
                const oldVal = liveArr[i];
                liveArr[i] = val;

                if (i === 0) {
                    steps.push({
                        type: 'p2_init', i: null, sourceVal: null, destVal: null,
                        tiles: [...liveArr.map((v, idx) => ({val: (idx < i ? v : originalArr[idx]), state: idx < i ? 'past' : 'idle'}))],
                        accum: `Phase 2: Copy from temp[i] back to array[i]`,
                        status: `Phase 2 starting: Copy reversed elements back to array`,
                        log: `Phase 2: Copying temp array back to original array`
                    });
                }

                steps.push({
                    type: 'p2_copy', i, sourceVal: val, destVal: val,
                    tiles: liveArr.map((v, idx) => ({
                        val: idx <= i ? v : originalArr[idx], 
                        state: idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')
                    })),
                    accum: `<span style="color:var(--accent-green)">array[${i}]=${val} — copied from temp ✓</span>`,
                    status: `i=${i}: array[${i}] = temp[${i}] = ${val} ✓`,
                    log: `i=${i}: array[${i}] = ${val} → Final array updated`,
                    logColor: 'var(--accent-green)'
                });

                steps.push({
                    type: 'p2_processed', i, sourceVal: val, destVal: val,
                    tiles: liveArr.map((v, idx) => ({
                        val: idx <= i ? v : originalArr[idx], 
                        state: idx <= i ? 'past' : 'idle'
                    })),
                    accum: '—',
                    status: `i=${i}: Element marked as placed.`,
                    log: null
                });
            }

            // FINAL
            const finalStr = `[${liveArr.join(', ')}]`;
            steps.push({
                type: 'final', i: null, sourceVal: null, destVal: null,
                tiles: liveArr.map(v => ({val: v, state: 'winning'})),
                accum: '—',
                complete: true,
                result: finalStr,
                status: `Complete. Array reversed: ${finalStr}`,
                log: `Final result: array = ${finalStr}`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('accum-panel').innerHTML = step.accum;
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-source').innerText = step.sourceVal !== null ? step.sourceVal : '—';
            document.getElementById('val-dest').innerText = step.destVal !== null ? step.destVal : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.result || '—';
            resVal.className = step.complete ? 'complete' : '';

            document.getElementById('status-text').innerText = step.status;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
