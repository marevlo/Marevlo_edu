<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Replace Elements with Sum of Left and Right - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 280px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .array-row { display: flex; align-items: center; gap: 12px; min-height: 50px; justify-content: center; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-start; max-width: 800px; min-height: 50px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 16px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main); padding: 0 6px;
        }
        .tile-index { font-size: 10px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.left-part { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.05); z-index: 1; }
        .tile.right-part { background: #1e1030; border: 2px solid var(--accent-purple); color: var(--accent-purple); transform: scale(1.05); z-index: 1; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.06); box-shadow: 0 0 8px var(--accent-green); z-index: 3;}
        .tile.past { opacity: 0.4; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 650px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; max-width: 800px; text-align: center; word-wrap: break-word; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 20px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">array =</label>
        <input type="text" id="arr-input" placeholder="1, 2, 3, 4">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1, 2, 3, 4])">Ex 1</button>
        <button onclick="loadExample([5])">Ex 2</button>
        <button onclick="loadExample([10, 20, 30])">Ex 3</button>
    </div>

    <div class="visual-container">
        <div class="array-row">
            <div class="ui-label" style="width: 80px; text-align: right;">Original:</div>
            <div class="tiles-wrapper" id="orig-tiles"></div>
        </div>
        <div class="array-row">
            <div class="ui-label" style="width: 80px; text-align: right;">Result:</div>
            <div class="tiles-wrapper" id="res-tiles"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Index (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">arr[i]</span>
            <span class="info-value" id="val-val" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Left Sum</span>
            <span class="info-value" id="val-left" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Right Sum</span>
            <span class="info-value" id="val-right" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">New Value</span>
            <span class="info-value" id="val-new" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">final array =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Current Element (i)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Left Elements</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple)"></span> Right Elements</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Calculated Result</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Past / Empty</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [1, 2, 3, 4];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([1, 2, 3, 4]); }

        function loadExample(newArr) {
            arr = [...newArr];
            document.getElementById('arr-input').value = arr.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('arr-input').value;
            const parsedArr = valStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (parsedArr.length > 0) {
                loadExample(parsedArr.slice(0, 15)); // limit length for visual clarity
            }
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;
            let resArr = new Array(n).fill('—');

            if (n === 0) return;

            // STEP 0: INIT
            steps.push({
                type: 'init', i: '—', val: '—', leftSum: '—', rightSum: '—', newVal: '—',
                origStates: arr.map(() => 'idle'),
                resVals: [...resArr],
                resStates: resArr.map(() => 'idle'),
                panel: '—',
                statusText: `array=[${arr.join(', ')}], n=${n}. Click Play to begin.`,
                log: `n=${n}. Starting element replacement.`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 0; i < n; i++) {
                let leftSum = 0;
                let rightSum = 0;
                
                for(let j = 0; j < i; j++) leftSum += arr[j];
                for(let j = i + 1; j < n; j++) rightSum += arr[j];
                
                let newVal = leftSum + rightSum;

                // STEP A: Evaluate sums
                steps.push({
                    type: 'eval', i: i, val: arr[i], leftSum: leftSum, rightSum: rightSum, newVal: '?',
                    origStates: arr.map((v, idx) => {
                        if (idx < i) return 'left-part';
                        if (idx === i) return 'candidate';
                        return 'right-part';
                    }),
                    resVals: [...resArr],
                    resStates: resArr.map((v, idx) => idx < i ? 'winning' : 'idle'),
                    panel: `Calculating for index ${i}. <span style="color:var(--accent-blue)">Left Sum = ${leftSum}</span>, <span style="color:var(--accent-purple)">Right Sum = ${rightSum}</span>.`,
                    statusText: `Evaluating sums for element at index ${i}...`,
                    log: `i=${i}: arr[i]=${arr[i]}, left_sum=${leftSum}, right_sum=${rightSum}`,
                    logColor: 'var(--text-main)'
                });

                // STEP B: Update Result
                resArr[i] = newVal;
                steps.push({
                    type: 'update', i: i, val: arr[i], leftSum: leftSum, rightSum: rightSum, newVal: newVal,
                    origStates: arr.map((v, idx) => {
                        if (idx < i) return 'left-part';
                        if (idx === i) return 'candidate';
                        return 'right-part';
                    }),
                    resVals: [...resArr],
                    resStates: resArr.map((v, idx) => idx <= i ? 'winning' : 'idle'),
                    panel: `<span style="color:var(--accent-green)">Result[${i}] = Left Sum (${leftSum}) + Right Sum (${rightSum}) = ${newVal}</span>`,
                    statusText: `Updated result array at index ${i}.`,
                    log: `  result[${i}] = ${leftSum} + ${rightSum} = ${newVal} ✓`,
                    logColor: 'var(--accent-green)'
                });
            }

            // FINAL STEP
            steps.push({
                type: 'final', i: '—', val: '—', leftSum: '—', rightSum: '—', newVal: '—',
                origStates: arr.map(() => 'past'),
                resVals: [...resArr],
                resStates: resArr.map(() => 'winning'),
                panel: 'Array Replacement Complete',
                complete: true,
                finalStr: `[${resArr.join(', ')}]`,
                statusText: `Done. All elements successfully replaced.`,
                log: `Final result: [${resArr.join(', ')}]`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Original Tiles
            const origContainer = document.getElementById('orig-tiles');
            origContainer.innerHTML = '';
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.origStates[i]}`;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                origContainer.appendChild(wrapper);
            });

            // Render Result Tiles
            const resContainer = document.getElementById('res-tiles');
            resContainer.innerHTML = '';
            step.resVals.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.resStates[i]}`;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                resContainer.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-i').innerText = step.i;
            document.getElementById('val-val').innerText = step.val;
            document.getElementById('val-left').innerText = step.leftSum;
            document.getElementById('val-right').innerText = step.rightSum;
            document.getElementById('val-new').innerText = step.newVal;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.finalStr : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerHTML = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
