<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Array Largest Sum - Brute Force Recursive Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* Input Bar */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
        }

        button:hover { background: var(--btn-hover); }

        /* Array Tiles */
        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
        }

        .tile.idle { color: var(--text-dim); }
        .tile.candidate { 
            background: #2a1600; 
            border: 2px solid var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.12); 
            z-index: 2; 
        }
        .tile.split { 
            background: #0f2a1a; 
            border: 2px solid var(--accent-green); 
            color: var(--accent-green); 
            transform: scale(1.15); 
            box-shadow: 0 0 12px var(--accent-green);
        }
        .tile.past { opacity: 0.4; }

        /* Pointer + Action Panel */
        .pointer-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            width: 520px;
            text-align: center;
            font-family: monospace;
        }

        .pointer-values {
            display: flex;
            justify-content: center;
            gap: 32px;
            font-size: 18px;
            font-weight: 700;
        }

        .action-text {
            margin-top: 12px;
            font-size: 14px;
            min-height: 24px;
            color: var(--accent-orange);
        }

        /* Info Panel */
        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* Result */
        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #res-val { 
            font-family: monospace; 
            transition: all 0.2s; 
        }
        .pop { 
            animation: popAnim 400ms ease; 
            font-size: 26px !important; 
            color: var(--accent-green) !important;
        }

        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.28); }
            100% { transform: scale(1); }
        }

        .status-bar { 
            margin-top: 8px; 
            font-size: 13px; 
            color: var(--text-dim); 
            height: 1.2em; 
            text-align: center; 
        }

        /* Controls & Legend */
        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { 
            display: flex; 
            align-items: center; 
            font-size: 12px; 
            color: var(--text-dim); 
        }
        .dot { 
            width: 10px; 
            height: 10px; 
            border-radius: 50%; 
            margin-right: 6px; 
        }

        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 620px;
            max-width: 90%;
            height: 130px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-line { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">nums =</label>
        <input type="text" id="nums-input" placeholder="7,2,5,10,8" style="width: 240px;">
        <label class="array-label" style="margin-left:12px;">k =</label>
        <input type="text" id="k-input" placeholder="2" style="width: 60px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([7,2,5,10,8], 2)">Example 1</button>
        <button onclick="loadExample([1,2,3,4,5], 3)">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">nums =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="pointer-panel">
        <div class="pointer-values">
            <span>start = <span id="v-start" style="color:var(--accent-orange)">0</span></span>
            <span>remaining k = <span id="v-k" style="color:var(--accent-blue)">2</span></span>
        </div>
        <div id="action-text" class="action-text">—</div>
    </div>

    <div class="info-panel">
        <div class="info-cell"><div class="info-label">current split after</div><div class="info-value" id="val-split" style="color:var(--accent-orange)">—</div></div>
        <div class="info-cell"><div class="info-label">left sum</div><div class="info-value" id="val-left" style="color:var(--accent-green)">—</div></div>
        <div class="info-cell"><div class="info-label">right max</div><div class="info-value" id="val-right" style="color:var(--accent-green)">—</div></div>
        <div class="info-cell"><div class="info-label">global min max</div><div class="info-value" id="val-global" style="color:var(--accent-red)">∞</div></div>
    </div>

    <div class="result-display">
        <div class="info-label" style="font-size:12px;margin-bottom:4px;">minimum largest sum =</div>
        <div id="res-val" style="font-size:16px;color:var(--text-dim)">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width:80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--accent-orange);"></div> Current split position</div>
        <div class="legend-item"><div class="dot" style="background:var(--accent-green);"></div> Current subarray</div>
        <div class="legend-item"><div class="dot" style="background:var(--accent-red);"></div> Best result so far</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentNums = [7,2,5,10,8];
        let currentK = 2;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample([7,2,5,10,8], 2);
        }

        function loadExample(arr, k) {
            currentNums = arr.slice();
            currentK = k;
            document.getElementById('nums-input').value = currentNums.join(', ');
            document.getElementById('k-input').value = k;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('nums-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const kVal = parseInt(document.getElementById('k-input').value.trim());
            if (arr.length > 0 && !isNaN(kVal) && kVal > 0) {
                currentNums = arr;
                currentK = kVal;
                generateSteps();
                reset();
            }
        }

        function generateSteps() {
            steps = [];
            const nums = currentNums.slice();
            const n = nums.length;
            const k = currentK;
            let globalMin = Infinity;

            // We simulate the recursive exploration by generating steps for all possible splits
            // For visualization, we show the decision tree in a linear way with backtracking highlights

            function explore(start, remainingK, currentMax, path) {
                if (remainingK === 1) {
                    // Last group: sum from start to end
                    let groupSum = 0;
                    for (let i = start; i < n; i++) groupSum += nums[i];
                    const thisMax = Math.max(currentMax, groupSum);
                    globalMin = Math.min(globalMin, thisMax);

                    let tileStates = Array(n).fill('past');
                    for (let i = start; i < n; i++) tileStates[i] = 'split';

                    steps.push({
                        type: 'base',
                        start: start,
                        remainingK: 1,
                        currentMax: currentMax,
                        groupSum: groupSum,
                        thisMax: thisMax,
                        globalMin: globalMin,
                        tileStates: tileStates,
                        status: `Last group [${start}..${n-1}] sum=${groupSum}, max=${thisMax}, global min=${globalMin}`,
                        log: `Last group sum=${groupSum} → overall max=${thisMax}`,
                        logColor: '#3fb950',
                        action: `Final max = ${thisMax}`
                    });
                    return;
                }

                // Try all possible split positions for current group
                let tileStates = Array(n).fill('past');
                for (let i = start; i < n - (remainingK - 1); i++) {
                    let groupSum = 0;
                    for (let j = start; j <= i; j++) groupSum += nums[j];

                    tileStates = Array(n).fill('past');
                    for (let j = start; j <= i; j++) tileStates[j] = 'split';

                    steps.push({
                        type: 'try_split',
                        start: start,
                        splitAt: i,
                        remainingK: remainingK,
                        groupSum: groupSum,
                        currentMax: currentMax,
                        globalMin: globalMin,
                        tileStates: tileStates,
                        status: `Try split after index ${i} → left sum=${groupSum}, recurse with k=${remainingK-1}`,
                        log: `Split after ${i}, left sum=${groupSum}`,
                        logColor: '#58a6ff',
                        action: `Split @ ${i}`
                    });

                    // Recurse for right part
                    explore(i + 1, remainingK - 1, Math.max(currentMax, groupSum), path.concat(groupSum));
                }
            }

            // Initial call
            steps.push({
                type: 'init',
                start: 0,
                remainingK: k,
                currentMax: 0,
                globalMin: Infinity,
                tileStates: Array(n).fill('idle'),
                status: `Starting recursive exploration for k=${k}`,
                log: `Brute force recursion: try all split positions`,
                logColor: '#8b949e',
                action: 'Start recursion'
            });

            explore(0, k, 0, []);

            // Final result
            steps.push({
                type: 'final',
                start: null,
                remainingK: null,
                currentMax: null,
                globalMin: globalMin,
                tileStates: Array(n).fill('past'),
                status: `Done. Minimum largest sum = ${globalMin}`,
                log: `Final answer: ${globalMin}`,
                logColor: '#3fb950',
                bold: true,
                action: '—',
                result: globalMin
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render tiles
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            currentNums.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[i]}`;
                tile.innerText = val;
                const indexEl = document.createElement('div');
                indexEl.className = 'tile-index';
                indexEl.innerText = `[${i}]`;
                wrapper.appendChild(tile);
                wrapper.appendChild(indexEl);
                container.appendChild(wrapper);
            });

            // Pointer values
            document.getElementById('v-start').innerText = step.start !== null ? step.start : '—';
            document.getElementById('v-k').innerText = step.remainingK !== null ? step.remainingK : '—';

            // Info panel
            document.getElementById('val-split').innerText = step.splitAt !== undefined ? step.splitAt : '—';
            document.getElementById('val-left').innerText = step.groupSum !== undefined ? step.groupSum : '—';
            document.getElementById('val-right').innerText = step.currentMax !== undefined ? step.currentMax : '—';
            document.getElementById('val-global').innerText = step.globalMin !== undefined ? (step.globalMin === Infinity ? '∞' : step.globalMin) : '∞';

            document.getElementById('action-text').innerText = step.action || '—';
            document.getElementById('status-text').innerText = step.status;

            // Result
            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            // Cumulative log
            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    line.style.color = steps[k].logColor || '#c9d1d9';
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = () => { if (isPlaying) { pause(); play(); } };

        window.onload = init;
    </script>
</body>
</html>
