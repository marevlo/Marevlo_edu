<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Second Largest Element - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }
        label.array-label { font-family: 'Courier New', monospace; font-size: 14px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 240px;
            font-size: 14px;
        }
        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.maximum { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); box-shadow: 0 0 12px var(--accent-green); }
        .tile.winning { background: #0f2a1a; border: 1.5px solid var(--accent-green); color: var(--accent-green); }
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 500px; text-align: center; font-family: monospace; min-height: 52px;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 130px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        #res-val.complete { color: var(--accent-green); font-size: 26px; font-weight: 700; text-shadow: 0 0 16px var(--accent-green); animation: popAnim 400ms ease; }
        #res-val.none { color: var(--accent-orange); font-size: 22px; font-weight: 700; }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 600px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">array =</label>
        <input type="text" id="array-input" placeholder="3, 5, 1, 5, 2">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([3, 5, 1, 5, 2])">Example 1</button>
        <button onclick="loadExample([7, 7, 7, 7])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="info-label" style="font-size: 12px; font-family: monospace;">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="action-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Index i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">array[i]</span>
            <span class="info-value" id="val-ai" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">result</span>
            <span class="info-value" id="val-res" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="info-label" style="margin-bottom: 4px;">2nd largest =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="info-label" style="margin-right:4px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Current (i)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); box-shadow: 0 0 6px var(--accent-green);"></span> Largest (Max)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Found</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Past</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [3, 5, 1, 5, 2];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([3, 5, 1, 5, 2]); }

        function loadExample(newArr) {
            arr = [...newArr];
            document.getElementById('array-input').value = arr.join(',');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const parsedArr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (parsedArr.length > 0) loadExample(parsedArr.slice(0, 8));
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;
            const originalArr = [...arr];
            const sortedArr = [...arr].sort((a, b) => b - a);

            // STEP 0: INIT
            steps.push({
                type: 'init', i: null, ai: null, res: null,
                tiles: originalArr.map(v => ({val: v, state: ''})),
                panel: '—',
                status: `array=[${originalArr}] — n=${n}. Click Play to begin.`,
                log: `array=[${originalArr}] — n=${n}. Starting brute force second largest check.`,
                logColor: 'var(--text-dim)'
            });

            // PHASE 1: SORT
            steps.push({
                type: 'sort', i: null, ai: null, res: null,
                tiles: sortedArr.map(v => ({val: v, state: ''})),
                panel: 'Sorting array in descending order...',
                status: 'Phase 1: Sorting array',
                log: `Phase 1: Sorting array descending: [${sortedArr.join(', ')}]`,
                logColor: 'var(--accent-blue)'
            });

            const maxVal = sortedArr[0];
            let secondLargest = null;

            // PHASE 2: SEARCH
            for (let i = 1; i < n; i++) {
                const currentVal = sortedArr[i];
                
                // STEP B: Start checking index i
                steps.push({
                    type: 'check', i: i, ai: currentVal, res: null,
                    tiles: sortedArr.map((v, idx) => ({
                        val: v, 
                        state: idx === 0 ? 'maximum' : (idx === i ? 'candidate' : (idx < i ? 'past' : ''))
                    })),
                    panel: `${currentVal} < ${maxVal}?`,
                    status: `i=${i}: Checking if array[${i}] is second largest`,
                    log: `i=${i}: Comparing array[${i}]=${currentVal} with max=${maxVal}`
                });

                if (currentVal < maxVal) {
                    secondLargest = currentVal;
                    // STEP C: Found
                    steps.push({
                        type: 'found', i: i, ai: currentVal, res: secondLargest,
                        tiles: sortedArr.map((v, idx) => ({
                            val: v, 
                            state: idx === 0 ? 'maximum' : (idx === i ? 'winning' : (idx < i ? 'past' : ''))
                        })),
                        panel: `✓ Found second largest = ${secondLargest}`,
                        status: `Second largest found: ${secondLargest} ✓`,
                        log: `Second largest = ${secondLargest} ✓`,
                        logColor: 'var(--accent-green)'
                    });
                    break;
                } else {
                    // STEP C: Duplicate
                    steps.push({
                        type: 'duplicate', i: i, ai: currentVal, res: null,
                        tiles: sortedArr.map((v, idx) => ({
                            val: v, 
                            state: idx === 0 ? 'maximum' : (idx <= i ? 'past' : '')
                        })),
                        panel: `${currentVal} = ${maxVal}, skip (duplicate)`,
                        status: `i=${i}: Duplicate of max, continue searching`,
                        log: `i=${i}: array[${i}] = max, skip duplicate`,
                        logColor: 'var(--accent-orange)'
                    });
                }
            }

            // FINAL STEP
            if (secondLargest !== null) {
                steps.push({
                    type: 'final', i: null, ai: null, res: secondLargest,
                    tiles: sortedArr.map((v, idx) => ({
                        val: v, 
                        state: v === maxVal ? 'maximum' : (v === secondLargest ? 'winning' : 'past')
                    })),
                    panel: 'Search Complete',
                    complete: true,
                    result: secondLargest,
                    status: `Done. Second largest element = ${secondLargest}`,
                    log: `Final result: second largest = ${secondLargest}`,
                    logColor: 'var(--accent-blue)', bold: true
                });
            } else {
                steps.push({
                    type: 'final', i: null, ai: null, res: 'None',
                    tiles: sortedArr.map(() => ({val: sortedArr[0], state: 'past'})),
                    panel: 'Search Complete',
                    complete: false,
                    isNone: true,
                    result: 'None',
                    status: 'Done. No second largest (all elements equal)',
                    log: 'Final result: None (no distinct second largest)',
                    logColor: 'var(--accent-orange)', bold: true
                });
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('action-panel').innerText = step.panel;
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-ai').innerText = step.ai !== null ? step.ai : '—';
            document.getElementById('val-res').innerText = step.res || '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.result || '—';
            resVal.className = step.isNone ? 'none' : (step.complete ? 'complete' : '');

            document.getElementById('status-text').innerText = step.status;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>```
