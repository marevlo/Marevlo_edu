<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Number of Platforms - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label { font-family: 'Courier New', monospace; font-size: 14px; color: var(--text-dim); }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
        }

        button:hover { background: var(--btn-hover); }

        .array-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile {
            min-width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile.idle { }
        .tile.current { background: var(--accent-orange); transform: scale(1.08); }
        .tile.overlap { background: var(--accent-red); border: 2px solid var(--accent-red); }

        .label { font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }

        .sum-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            min-width: 620px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }

        .info-panel {
            margin-top: 12px;
            display: flex;
            gap: 16px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 10px 16px;
            min-width: 140px;
            text-align: center;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 18px; font-weight: 700; color: var(--accent-green); }

        .result-display { margin-top: 16px; font-size: 26px; }
        #res-val { color: var(--accent-green); transition: all 0.4s; }
        .pop { animation: popAnim 600ms ease; }

        @keyframes popAnim { 0% { transform: scale(1); } 50% { transform: scale(1.25); } 100% { transform: scale(1); } }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); min-height: 1.5em; }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 10px; }

        .legend { margin-top: 18px; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; font-size: 12px; color: var(--text-dim); }

        .log-panel {
            margin-top: 16px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 760px;
            max-width: 92%;
            height: 180px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">arr =</label>
        <input type="text" id="arr-input" value="900,940,950,1100,1500,1800" style="width:260px;">
        <label class="array-label">dep =</label>
        <input type="text" id="dep-input" value="910,1200,1120,1130,1900,2000" style="width:260px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample1()">Example 1</button>
        <button onclick="loadExample2()">Example 2</button>
    </div>

    <div class="array-container">
        <div><span class="label">Arrivals</span><div class="tiles-wrapper" id="arr-tiles"></div></div>
        <div><span class="label">Departures</span><div class="tiles-wrapper" id="dep-tiles"></div></div>
    </div>

    <div class="sum-panel" id="sum-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">Current Train</div>
            <div class="info-value" id="val-train">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Overlaps</div>
            <div class="info-value" id="val-count" style="color:var(--accent-red);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Max Platforms</div>
            <div class="info-value" id="val-max" style="color:var(--accent-green);">—</div>
        </div>
    </div>

    <div class="result-display">
        <span>Minimum Platforms Needed = </span><span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width:88px;">Play</button>
        <button onclick="next()">Next →</button>
        <input type="range" id="speed-slider" min="0" max="2" value="1" style="width:140px;">
    </div>

    <div class="legend">
        <div>🟠 Current Train</div>
        <div>🔴 Overlapping Trains</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arrivals = [900,940,950,1100,1500,1800];
        let departures = [910,1200,1120,1130,1900,2000];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;
        const delays = [1600, 800, 400];

        function init() {
            generateSteps();
            reset();
        }

        function loadExample1() {
            arrivals = [900,940,950,1100,1500,1800];
            departures = [910,1200,1120,1130,1900,2000];
            document.getElementById('arr-input').value = arrivals.join(',');
            document.getElementById('dep-input').value = departures.join(',');
            generateSteps();
            reset();
        }

        function loadExample2() {
            arrivals = [1000,1100,1200];
            departures = [1100,1200,1300];
            document.getElementById('arr-input').value = arrivals.join(',');
            document.getElementById('dep-input').value = departures.join(',');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const aStr = document.getElementById('arr-input').value;
            const dStr = document.getElementById('dep-input').value;
            arrivals = aStr.split(',').map(x=>parseInt(x.trim())).filter(x=>!isNaN(x));
            departures = dStr.split(',').map(x=>parseInt(x.trim())).filter(x=>!isNaN(x));
            if (arrivals.length === departures.length && arrivals.length > 0) {
                generateSteps();
                reset();
            }
        }

        function generateSteps() {
            steps = [];
            const n = arrivals.length;
            let maxPlat = 0;

            steps.push({
                type: 'init',
                arr: arrivals.slice(),
                dep: departures.slice(),
                i: -1, j: -1,
                tileStatesArr: Array(n).fill('idle'),
                tileStatesDep: Array(n).fill('idle'),
                status: `arr = [${arrivals}], dep = [${departures}] — Brute Force Overlap Count`,
                log: `Starting Minimum Platforms - Brute Force`
            });

            // First example trace
            for (let i = 0; i < n; i++) {
                let count = 1;
                let overlapList = [i];

                let statesA = Array(n).fill('idle');
                let statesD = Array(n).fill('idle');
                statesA[i] = 'current';
                statesD[i] = 'current';

                steps.push({
                    type: 'check',
                    arr: arrivals.slice(),
                    dep: departures.slice(),
                    i: i,
                    j: -1,
                    count: count,
                    tileStatesArr: statesA,
                    tileStatesDep: statesD,
                    status: `Checking train ${i} (arr=${arrivals[i]}, dep=${departures[i]})`,
                    log: `Train ${i}: count starts at 1`
                });

                for (let j = 0; j < n; j++) {
                    if (i === j) continue;
                    if (arrivals[j] < departures[i] && arrivals[i] < departures[j]) {
                        count++;
                        overlapList.push(j);
                        statesA = Array(n).fill('idle');
                        statesD = Array(n).fill('idle');
                        statesA[i] = 'current';
                        statesD[i] = 'current';
                        statesA[j] = 'overlap';
                        statesD[j] = 'overlap';

                        steps.push({
                            type: 'overlap',
                            arr: arrivals.slice(),
                            dep: departures.slice(),
                            i: i,
                            j: j,
                            count: count,
                            tileStatesArr: statesA,
                            tileStatesDep: statesD,
                            status: `Overlap with train ${j} → count = ${count}`,
                            log: `Overlap with ${j} (count=${count})`
                        });
                    }
                }

                if (count > maxPlat) maxPlat = count;

                steps.push({
                    type: 'maxupdate',
                    arr: arrivals.slice(),
                    dep: departures.slice(),
                    i: i,
                    count: count,
                    maxPlat: maxPlat,
                    tileStatesArr: Array(n).fill('past'),
                    tileStatesDep: Array(n).fill('past'),
                    status: `Train ${i} done. Current max platforms = ${maxPlat}`,
                    log: `Max so far: ${maxPlat}`
                });
            }

            steps.push({
                type: 'final',
                arr: arrivals.slice(),
                dep: departures.slice(),
                maxPlat: maxPlat,
                tileStatesArr: Array(n).fill('past'),
                tileStatesDep: Array(n).fill('past'),
                status: `Final Result: Minimum platforms needed = ${maxPlat}`,
                log: `Answer: ${maxPlat}`,
                logColor: 'var(--accent-green)',
                bold: true,
                result: maxPlat
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render arrivals
            renderTiles('arr-tiles', step.arr, step.tileStatesArr);
            // Render departures
            renderTiles('dep-tiles', step.dep, step.tileStatesDep);

            document.getElementById('sum-panel').innerHTML = step.status || '—';

            document.getElementById('val-train').innerText = step.i !== undefined && step.i >= 0 ? step.i : '—';
            document.getElementById('val-count').innerText = step.count !== undefined ? step.count : '—';
            document.getElementById('val-max').innerText = step.maxPlat !== undefined ? step.maxPlat : '—';

            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.status || '';

            // Log
            const logEl = document.getElementById('log');
            logEl.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.color = steps[k].logColor || 'var(--text-log)';
                    if (steps[k].bold) line.style.fontWeight = '700';
                    line.innerText = steps[k].log;
                    logEl.appendChild(line);
                }
            }
            logEl.scrollTop = logEl.scrollHeight;
        }

        function renderTiles(containerId, values, states) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            values.forEach((val, i) => {
                const tile = document.createElement('div');
                tile.className = `tile ${states[i] || 'idle'}`;
                tile.innerText = val;
                container.appendChild(tile);
            });
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = () => { if (isPlaying) { pause(); play(); } };

        window.onload = init;
    </script>
</body>
</html>
