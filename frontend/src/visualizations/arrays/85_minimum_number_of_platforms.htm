<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Number of Platforms - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* departure event / answer        */
            --accent-blue:   #06b6d4;    /* sweep pointer / chrome          */
            --accent-green:  #22c55e;    /* arrival event / finalized       */
            --accent-red:    #f43f5e;    /* peak / new platform             */
            --accent-purple: #a855f7;    /* current event                   */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 220px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); padding: 20px 22px; }

        /* event timeline: sorted, merged arrival/departure events */
        .track-label { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin: 2px 0 8px; }
        .events-row { display: flex; gap: 6px; overflow-x: auto; overflow-y: hidden; scrollbar-width: thin; padding: 4px 2px 10px; }
        .events-row::-webkit-scrollbar { height: 8px; }
        .events-row::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        .ev {
            position: relative; flex: 0 0 auto; min-width: 64px; height: 64px; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
            font-family: var(--mono); border: 2px solid var(--border-main); background: rgba(255,255,255,0.05);
            color: var(--text-main); transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s, opacity 0.3s, transform 0.3s;
            will-change: transform;
        }
        .ev .ev-kind { font-size: 9px; font-weight: 700; letter-spacing: 0.6px; color: var(--text-dim); text-transform: uppercase; }
        .ev .ev-time { font-size: 14px; font-weight: 800; }
        .ev .ev-delta { font-size: 10px; font-weight: 700; opacity: 0; transition: opacity 0.3s; }
        .ev.idle { opacity: 0.9; }
        .ev.past { opacity: 0.34; background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.08); color: var(--text-dim); }
        .ev.arr.current { border-color: var(--accent-green); background: rgba(34,197,94,0.18); color: #bbf7d0; box-shadow: 0 0 20px rgba(34,197,94,0.45); transform: translateY(-3px); z-index: 3; }
        .ev.dep.current { border-color: var(--accent-orange); background: rgba(245,165,36,0.18); color: #fde6b0; box-shadow: 0 0 20px rgba(245,165,36,0.45); transform: translateY(-3px); z-index: 3; }
        .ev.current .ev-delta { opacity: 1; }
        .ev.arr.current .ev-kind, .ev.arr.current .ev-delta { color: #86efac; }
        .ev.dep.current .ev-kind, .ev.dep.current .ev-delta { color: #fbbf24; }

        /* platform stack: bars representing concurrently-occupied platforms */
        .platform-zone { margin-top: 18px; display: flex; align-items: flex-end; gap: 8px; min-height: 96px; padding: 6px 2px 0; }
        .plat {
            flex: 0 0 auto; width: 46px; border-radius: 8px 8px 4px 4px;
            display: flex; align-items: flex-start; justify-content: center; padding-top: 6px;
            font-family: var(--mono); font-size: 12px; font-weight: 800; color: #06251a;
            background: linear-gradient(180deg, rgba(47,224,143,0.85), rgba(33,194,117,0.85));
            border: 2px solid rgba(34,197,94,0.7); box-shadow: 0 0 16px rgba(34,197,94,0.32);
            transition: height 0.4s cubic-bezier(0.34,1.1,0.64,1), opacity 0.3s, background 0.3s, border-color 0.3s, box-shadow 0.3s;
            will-change: transform, height;
        }
        .plat.peak { background: linear-gradient(180deg, rgba(244,63,94,0.85), rgba(225,29,72,0.85)); border-color: rgba(244,63,94,0.8); color: #fff; box-shadow: 0 0 22px rgba(244,63,94,0.5); }
        .platform-empty { font-family: var(--mono); font-size: 12px; color: var(--text-dim); align-self: center; }

        .action-stage { position: relative; min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; min-height: 40px; }
        .ans-tile { height: 40px; padding: 0 16px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 16px; font-weight: 800; border: 2px solid var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0; box-shadow: 0 0 12px rgba(34,197,94,0.35); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); } .pill.k b { color: var(--accent-blue); } .pill.o b { color: var(--accent-orange); } .pill.g b { color: var(--accent-green); } .pill.r b { color: var(--accent-red); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">arr =</label>
        <input type="text" id="arr-input" placeholder="900,940,950,1100,1500,1800" maxlength="120">
        <label class="ui-label">dep =</label>
        <input type="text" id="dep-input" placeholder="910,1200,1120,1130,1900,2000" maxlength="120">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Example 1 &rarr; 3</button>
        <button onclick="loadExample(1)">Example 2 &rarr; 2</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Minimum Number of Platforms <span class="sub">&middot; sort arr &amp; dep &middot; sweep events &middot; <code style="font-family:var(--mono)">arr &le; dep</code> &rarr; +1 platform &middot; O(n log n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="track-label">Merged event sweep <span style="color:var(--accent-green)">&#9650; arrival</span> &middot; <span style="color:var(--accent-orange)">&#9660; departure</span></div>
                <div class="events-row" id="events-row"></div>
                <div class="track-label" style="margin-top:14px">Occupied platforms (running count)</div>
                <div class="platform-zone" id="platform-zone"></div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill k">i (arr) <b id="st-i">&mdash;</b></span>
                            <span class="pill o">j (dep) <b id="st-j">&mdash;</b></span>
                            <span class="pill c">event <b id="st-event">&mdash;</b></span>
                            <span class="pill g">platforms <b id="st-plat">0</b></span>
                            <span class="pill r">peak <b id="st-peak">0</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring pop, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.7 + 0.3 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // ───────── State ─────────
        const EXAMPLES = [
            { arr: [900, 940, 950, 1100, 1500, 1800], dep: [910, 1200, 1120, 1130, 1900, 2000] }, // answer 3
            { arr: [1000, 1100, 1200],                dep: [1100, 1200, 1300] }                    // answer 2
        ];
        let arrivals = EXAMPLES[0].arr.slice();
        let departures = EXAMPLES[0].dep.slice();
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 760, 360];

        // persistent DOM caches (keyed by stable event id = position in merged event order)
        const evEls = {};       // id -> event tile element
        const platEls = [];     // platform bar elements (reused / hidden by height)
        const PLAT_UNIT = 22;   // px height per occupied platform unit
        const PLAT_BASE = 30;

        const CODE = [
            [['kw','def '],['fn','minPlatforms'],['src','(arr, dep):']],
            [['src','  arr.sort(); dep.sort()']],
            [['src','  i = j = plat = peak = 0']],
            [['kw','  while '],['src','i < n and j < n:']],
            [['kw','    if '],['src','arr[i] <= dep[j]:']],
            [['src','      plat += 1; i += 1']],
            [['src','      peak = max(peak, plat)']],
            [['kw','    else'],['src',':']],
            [['src','      plat -= 1; j += 1']],
            [['kw','  return '],['src','peak']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── merged event order (built once per input load) ─────────
        // Returns the sequence of {kind:'arr'|'dep', time} in the exact order the sweep visits them,
        // matching the two-pointer merge of sorted arrivals/departures with the arr<=dep tie rule.
        function buildEventOrder() {
            const a = [...arrivals].sort((x, y) => x - y);
            const d = [...departures].sort((x, y) => x - y);
            const order = [];
            let i = 0, j = 0;
            while (i < a.length && j < d.length) {
                if (a[i] <= d[j]) { order.push({ kind: 'arr', time: a[i] }); i++; }
                else { order.push({ kind: 'dep', time: d[j] }); j++; }
            }
            // the while loop ends once either pointer is exhausted; trailing events never change the peak
            while (i < a.length) { order.push({ kind: 'arr', time: a[i] }); i++; }
            while (j < d.length) { order.push({ kind: 'dep', time: d[j] }); j++; }
            return { a, d, order };
        }
        let eventMeta = null; // {a, d, order}

        function buildSkeleton() {
            eventMeta = buildEventOrder();
            // events row: one tile per merged event, keyed by id
            const row = document.getElementById('events-row'); row.innerHTML = '';
            Object.keys(evEls).forEach(k => delete evEls[k]);
            eventMeta.order.forEach((ev, id) => {
                const tile = document.createElement('div'); tile.className = `ev ${ev.kind} idle`;
                const kind = document.createElement('div'); kind.className = 'ev-kind';
                kind.textContent = ev.kind === 'arr' ? '▲ ARR' : '▼ DEP';
                const time = document.createElement('div'); time.className = 'ev-time'; time.textContent = ev.time;
                const delta = document.createElement('div'); delta.className = 'ev-delta';
                delta.textContent = ev.kind === 'arr' ? '+1' : '−1';
                tile.appendChild(kind); tile.appendChild(time); tile.appendChild(delta);
                row.appendChild(tile); evEls[id] = tile;
            });

            // platform bars: build a pool sized to the max possible peak (n), reused by height/visibility
            const zone = document.getElementById('platform-zone'); zone.innerHTML = ''; platEls.length = 0;
            const poolSize = Math.max(arrivals.length, 1);
            for (let k = 0; k < poolSize; k++) {
                const bar = document.createElement('div'); bar.className = 'plat';
                bar.style.height = '0px'; bar.style.opacity = '0';
                bar.textContent = (k + 1);
                zone.appendChild(bar); platEls.push(bar);
            }
            const empty = document.createElement('div'); empty.className = 'platform-empty'; empty.id = 'plat-empty';
            empty.textContent = '0 platforms occupied';
            zone.appendChild(empty);
        }

        // ───────── step generation (immutable snapshots) ─────────
        function generateSteps() {
            steps = [];
            const { a, d, order } = eventMeta;
            const n = arrivals.length;
            const fmtArr = (x) => '[' + x.join(', ') + ']';

            // evState: per-event-id class for the events row
            const evState = order.map(() => 'idle');

            const snap = (extra) => Object.assign({
                evStates: evState.slice(),
                plat: 0, peak: 0, i: 0, j: 0, event: null, peakHit: false,
                code: [], action: '', actionColor: 'var(--text-dim)', panel: '', log: ''
            }, extra);

            if (n === 0) {
                steps.push(snap({
                    complete: true, confetti: false, answer: 0, code: [9],
                    action: '✓ 0', actionColor: 'var(--accent-green)',
                    panel: 'No trains &rarr; <code>0</code> platforms needed.',
                    log: 'done  peak = 0'
                }));
                return;
            }

            // intro
            steps.push(snap({
                code: [0], action: 'INPUT', actionColor: 'var(--accent-blue)',
                panel: `Find the fewest platforms so no two trains share one. ` +
                       `<code>arr = ${fmtArr(arrivals)}</code>, <code>dep = ${fmtArr(departures)}</code> &middot; <b>${n}</b> trains.`,
                log: `init  n=${n}  arr=${fmtArr(arrivals)}  dep=${fmtArr(departures)}`
            }));

            // sort
            steps.push(snap({
                code: [1], action: 'SORT', actionColor: 'var(--accent-blue)',
                panel: `Sort both lists independently: <code>arr &rarr; ${fmtArr(a)}</code>, <code>dep &rarr; ${fmtArr(d)}</code>. ` +
                       `Now we can sweep events in chronological order.`,
                log: `sort  arr=${fmtArr(a)}  dep=${fmtArr(d)}`
            }));

            // seed pointers
            steps.push(snap({
                code: [2], action: 'i=0  j=0  plat=0', actionColor: 'var(--accent-purple)',
                panel: `Two pointers: <code>i</code> over sorted arrivals, <code>j</code> over sorted departures. ` +
                       `Running <code>plat = 0</code>, <code>peak = 0</code>.`,
                log: `seed  i=0 j=0 plat=0 peak=0`
            }));

            // sweep
            let plat = 0, peak = 0, i = 0, j = 0, evid = 0;
            while (i < n && j < n) {
                const isArr = a[i] <= d[j];
                if (isArr) {
                    // compare step
                    steps.push(snap({
                        i, j, plat, peak, event: order[evid],
                        evStates: markCurrent(evState, evid),
                        code: [3, 4], action: `arr[${i}]=${a[i]} ≤ dep[${j}]=${d[j]} ?`,
                        actionColor: 'var(--accent-blue)',
                        panel: `Compare <code>arr[i]=${a[i]}</code> with <code>dep[j]=${d[j]}</code>. ` +
                               `Since <code>${a[i]} &le; ${d[j]}</code>, the next event is an <b>arrival</b> &rarr; a train pulls in.`,
                        log: `cmp   arr[${i}]=${a[i]} <= dep[${j}]=${d[j]}  -> ARRIVAL`
                    }));
                    plat += 1; const before = peak; peak = Math.max(peak, plat); evState[evid] = 'past'; i++; evid++;
                    const peakHit = peak > before;
                    steps.push(snap({
                        i, j, plat, peak, event: order[evid - 1], peakHit,
                        code: peakHit ? [5, 6] : [5],
                        action: `+1 platform → ${plat}`, actionColor: 'var(--accent-green)',
                        panel: `Arrival at <code>${a[i - 1]}</code>: occupy a platform &rarr; <code>plat = ${plat}</code>. ` +
                               (peakHit ? `New <b>peak = ${peak}</b>.` : `Peak stays <b>${peak}</b>.`),
                        log: `  ARR @${a[i - 1]}  plat=${plat}` + (peakHit ? `  peak=${peak} ↑` : '')
                    }));
                } else {
                    steps.push(snap({
                        i, j, plat, peak, event: order[evid],
                        evStates: markCurrent(evState, evid),
                        code: [3, 4, 7], action: `arr[${i}]=${a[i]} > dep[${j}]=${d[j]}`,
                        actionColor: 'var(--accent-orange)',
                        panel: `Compare <code>arr[i]=${a[i]}</code> with <code>dep[j]=${d[j]}</code>. ` +
                               `Since <code>${a[i]} &gt; ${d[j]}</code>, the next event is a <b>departure</b> &rarr; a platform frees up.`,
                        log: `cmp   arr[${i}]=${a[i]} > dep[${j}]=${d[j]}  -> DEPARTURE`
                    }));
                    plat -= 1; evState[evid] = 'past'; j++; evid++;
                    steps.push(snap({
                        i, j, plat, peak, event: order[evid - 1],
                        code: [8], action: `−1 platform → ${plat}`, actionColor: 'var(--accent-orange)',
                        panel: `Departure at <code>${d[j - 1]}</code>: release a platform &rarr; <code>plat = ${plat}</code>. ` +
                               `Peak unchanged at <b>${peak}</b>.`,
                        log: `  DEP @${d[j - 1]}  plat=${plat}`
                    }));
                }
            }
            // mark any trailing (post-loop) events as past so the row reads cleanly
            while (evid < order.length) { evState[evid] = 'past'; evid++; }

            // final
            steps.push(snap({
                complete: true, confetti: true, answer: peak,
                i, j, plat, peak,
                code: [9], action: `✓ ${peak} platform${peak === 1 ? '' : 's'}`,
                actionColor: 'var(--accent-green)',
                panel: `Every relevant event swept. The peak concurrent occupancy was <b>${peak}</b> &rarr; ` +
                       `minimum platforms needed = <code>${peak}</code>.`,
                log: `done  peak = ${peak}  ->  answer = ${peak}`
            }));
        }

        function markCurrent(base, id) {
            const out = base.slice();
            if (id < out.length) out[id] = 'current';
            return out;
        }

        // ───────── render (persistent DOM, recolor / resize only) ─────────
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // events row
            step.evStates.forEach((cls, id) => {
                const el = evEls[id]; if (!el) return;
                const kind = el.classList.contains('arr') ? 'arr' : 'dep';
                const wasCurrent = el.classList.contains('current');
                el.className = `ev ${kind} ${cls}`;
                if (!REDUCED && cls === 'current' && !wasCurrent) Motion.pop(el);
            });

            // platform bars: show `plat` bars, the topmost flagged peak when plat === peak and at the apex
            const plat = step.plat, peak = step.peak;
            const emptyEl = document.getElementById('plat-empty');
            if (emptyEl) emptyEl.style.display = plat > 0 ? 'none' : 'block';
            platEls.forEach((bar, k) => {
                if (k < plat) {
                    const h = PLAT_BASE + (k + 1) * PLAT_UNIT;
                    const wasHidden = bar.style.opacity === '0';
                    bar.style.height = h + 'px';
                    bar.style.opacity = '1';
                    const isPeakBar = step.peakHit && plat === peak && k === plat - 1;
                    bar.classList.toggle('peak', isPeakBar);
                    if (!REDUCED && wasHidden) Motion.pop(bar);
                } else {
                    bar.style.height = '0px';
                    bar.style.opacity = '0';
                    bar.classList.remove('peak');
                }
            });

            // answer track
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.complete) {
                const t = document.createElement('div'); t.className = 'ans-tile';
                t.textContent = `${step.answer} platform${step.answer === 1 ? '' : 's'}`;
                at.appendChild(t);
            }

            // narration + action
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // state strip
            document.getElementById('st-i').textContent = step.i;
            document.getElementById('st-j').textContent = step.j;
            const evTxt = step.event ? `${step.event.kind === 'arr' ? '▲' : '▼'} ${step.event.time}` : '—';
            document.getElementById('st-event').textContent = evTxt;
            document.getElementById('st-plat').textContent = step.plat;
            document.getElementById('st-peak').textContent = step.peak;

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function loadData(arr, dep) {
            pause();
            arrivals = arr.slice();
            departures = dep.slice();
            confettiArmed = true;
            buildSkeleton();      // rebuild event tiles + platform pool once per input load
            generateSteps();
            renderStep(0);
        }
        function loadCustom() {
            const parse = (s) => (s || '').split(',').map(x => parseInt(x.trim(), 10)).filter(x => !isNaN(x));
            const arr = parse(document.getElementById('arr-input').value);
            const dep = parse(document.getElementById('dep-input').value);
            if (arr.length && arr.length === dep.length) { loadData(arr, dep); return; }
            alert('Enter equal-length comma-separated arrival and departure times.');
        }
        function loadExample(n) {
            const ex = EXAMPLES[n];
            document.getElementById('arr-input').value = ex.arr.join(',');
            document.getElementById('dep-input').value = ex.dep.join(',');
            loadData(ex.arr, ex.dep);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('arr-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        document.getElementById('dep-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
