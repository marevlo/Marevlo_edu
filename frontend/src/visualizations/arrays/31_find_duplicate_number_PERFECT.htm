<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Duplicate Number (Floyd's Algorithm) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 260px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.slow { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.fast { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.08); z-index: 2; }
        .tile.both { background: #1e1030; border: 2px solid var(--accent-purple); color: var(--accent-purple); transform: scale(1.12); z-index: 3; box-shadow: 0 0 8px var(--accent-purple); }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); z-index: 4;}
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.8; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 600px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 100px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 700px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">array =</label>
        <input type="text" id="arr-input" placeholder="1, 3, 4, 2, 2">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1, 3, 4, 2, 2])">Ex 1</button>
        <button onclick="loadExample([3, 1, 3, 4, 2])">Ex 2</button>
        <button onclick="loadExample([2, 5, 9, 6, 9, 3, 8, 9, 7, 1])">Ex 3</button>
    </div>

    <div class="array-container">
        <div class="ui-label" style="font-size: 12px; white-space: nowrap;">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell" style="min-width: 140px;">
            <span class="info-label">Phase</span>
            <span class="info-value" id="val-phase" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Slow (Index)</span>
            <span class="info-value" id="val-slow" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Fast (Index)</span>
            <span class="info-value" id="val-fast" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">arr[Slow]</span>
            <span class="info-value" id="val-arr-slow" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">arr[Fast]</span>
            <span class="info-value" id="val-arr-fast" style="color: var(--accent-orange);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">duplicate number =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Slow Pointer (Tortoise)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Fast Pointer (Hare)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple); box-shadow: 0 0 4px var(--accent-purple);"></span> Pointers Overlap</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); box-shadow: 0 0 6px var(--accent-green);"></span> Entrance Found (Duplicate)</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Unvisited</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [1, 3, 4, 2, 2];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([1, 3, 4, 2, 2]); }

        function loadExample(newArr) {
            arr = [...newArr];
            document.getElementById('arr-input').value = arr.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valArr = document.getElementById('arr-input').value;
            const parsedArr = valArr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (parsedArr.length > 0) {
                // To keep visualization clean, limit length
                loadExample(parsedArr.slice(0, 20));
            }
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;

            let slow = 0;
            let fast = 0;

            // STEP 0: INIT
            steps.push({
                type: 'init', phaseStr: '1: Detect Cycle', slow: slow, fast: fast,
                arrSlow: arr[slow], arrFast: arr[fast],
                tiles: arr.map((v, i) => ({val: v, state: i === 0 ? 'both' : 'idle'})),
                panel: 'Initialize Slow = 0, Fast = 0.',
                statusText: `O(N) Time, O(1) Space: Floyd's Tortoise and Hare. Click Play.`,
                log: `Initialize pointers: slow=0, fast=0.`,
                logColor: 'var(--text-dim)'
            });

            // PHASE 1: Find Intersection
            do {
                let pSlow = slow;
                let pFast = fast;

                slow = arr[slow];
                let midFast = arr[fast];
                fast = arr[midFast];

                let isIntersect = slow === fast;

                steps.push({
                    type: 'p1_move', phaseStr: '1: Detect Cycle', slow: slow, fast: fast,
                    arrSlow: arr[slow], arrFast: arr[fast],
                    tiles: arr.map((v, i) => ({
                        val: v,
                        state: (i === slow && i === fast) ? 'both' : 
                               (i === slow ? 'slow' : 
                               (i === fast ? 'fast' : 'idle'))
                    })),
                    panel: `Slow moves 1 step to index ${slow}. Fast moves 2 steps to index ${fast}.`,
                    statusText: `Phase 1: Searching for cycle intersection...`,
                    log: `Slow -> arr[${pSlow}] = ${slow} | Fast -> arr[arr[${pFast}]] = ${fast}`,
                    logColor: 'var(--text-main)'
                });

            } while (slow !== fast);

            steps.push({
                type: 'intersect', phaseStr: '1: Cycle Detected', slow: slow, fast: fast,
                arrSlow: arr[slow], arrFast: arr[fast],
                tiles: arr.map((v, i) => ({
                    val: v,
                    state: i === slow ? 'both' : 'idle'
                })),
                panel: `<span style="color:var(--accent-purple)">Intersection found at index ${slow}! Cycle guaranteed.</span>`,
                statusText: `Phase 1 complete. Proceeding to Phase 2.`,
                log: `Intersection detected at index ${slow} ✓`,
                logColor: 'var(--accent-purple)'
            });

            // PHASE 2: Find Entrance
            slow = 0;
            steps.push({
                type: 'p2_init', phaseStr: '2: Find Entrance', slow: slow, fast: fast,
                arrSlow: arr[slow], arrFast: arr[fast],
                tiles: arr.map((v, i) => ({
                    val: v,
                    state: (i === slow && i === fast) ? 'both' : 
                           (i === slow ? 'slow' : 
                           (i === fast ? 'fast' : 'idle'))
                })),
                panel: `Reset Slow to index 0. Fast remains at index ${fast}.`,
                statusText: `Phase 2: Move both pointers 1 step at a time.`,
                log: `Phase 2 begins: Reset Slow -> 0.`,
                logColor: 'var(--text-dim)'
            });

            while (slow !== fast) {
                let pSlow = slow;
                let pFast = fast;

                slow = arr[slow];
                fast = arr[fast];

                steps.push({
                    type: 'p2_move', phaseStr: '2: Find Entrance', slow: slow, fast: fast,
                    arrSlow: arr[slow], arrFast: arr[fast],
                    tiles: arr.map((v, i) => ({
                        val: v,
                        state: (i === slow && i === fast) ? 'winning' : 
                               (i === slow ? 'slow' : 
                               (i === fast ? 'fast' : 'idle'))
                    })),
                    panel: `Slow moves to index ${slow}. Fast moves to index ${fast}.`,
                    statusText: `Phase 2: Moving pointers at the same speed...`,
                    log: `Slow -> arr[${pSlow}] = ${slow} | Fast -> arr[${pFast}] = ${fast}`,
                    logColor: 'var(--text-main)'
                });
            }

            // FINAL STEP
            steps.push({
                type: 'final', phaseStr: 'Complete', slow: slow, fast: fast,
                arrSlow: arr[slow], arrFast: arr[fast],
                tiles: arr.map((v, i) => ({
                    val: v,
                    state: i === slow ? 'winning' : 'past'
                })),
                panel: `<span style="color:var(--accent-green)">Both pointers meet at index ${slow}! This is the cycle entrance.</span>`,
                complete: true,
                result: slow,
                statusText: `Done. The duplicate number is ${slow}.`,
                log: `Pointers met at ${slow}. Duplicate found!`,
                logColor: 'var(--accent-green)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-phase').innerText = step.phaseStr;
            document.getElementById('val-slow').innerText = step.slow;
            document.getElementById('val-fast').innerText = step.fast;
            document.getElementById('val-arr-slow').innerText = step.arrSlow !== undefined ? step.arrSlow : '—';
            document.getElementById('val-arr-fast').innerText = step.arrFast !== undefined ? step.arrFast : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
