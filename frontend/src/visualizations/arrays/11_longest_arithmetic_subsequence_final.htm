<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longest Arithmetic Subsequence - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }
        label.array-label { font-family: 'Courier New', monospace; font-size: 14px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 240px;
            font-size: 14px;
        }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 1.5px solid var(--accent-green); color: var(--accent-green); transform: scale(1.06); }
        .tile.defeated { background: #2a0d0d; border: 1.5px solid var(--accent-red); color: var(--accent-red); opacity: 0.6; }
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }

        /* ROW 3: COMPARISON PANEL */
        .panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 500px; text-align: center; font-family: monospace; min-height: 52px;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        #res-val.complete { color: var(--accent-green); font-size: 26px; font-weight: 700; text-shadow: 0 0 16px var(--accent-green); animation: popAnim 400ms ease; }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
        }
        button:hover { background: var(--btn-hover); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 600px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">array =</label>
        <input type="text" id="array-input" placeholder="3, 6, 9, 12">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([3, 6, 9, 12])">Example 1</button>
        <button onclick="loadExample([1, 2, 3, 4, 5, 6])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="info-label" style="font-size: 12px; font-family: monospace;">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">index i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">curr diff</span>
            <span class="info-value" id="val-diff" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">subseq len</span>
            <span class="info-value" id="val-len" style="color: var(--accent-green);">0</span>
        </div>
        <div class="info-cell">
            <span class="info-label">max len</span>
            <span class="info-value" id="val-max" style="color: var(--accent-blue);">0</span>
        </div>
    </div>

    <div class="result-display">
        <span class="info-label" style="margin-bottom: 4px;">max length =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="info-label" style="margin-right:4px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Considering</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Matches Diff</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red)"></span> Breaks Diff</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Past / Skip</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [3, 6, 9, 12];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([3, 6, 9, 12]); }

        function loadExample(newArr) {
            arr = [...newArr];
            document.getElementById('array-input').value = arr.join(',');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const parsedArr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (parsedArr.length > 0) loadExample(parsedArr.slice(0, 8));
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;
            let globalMaxLen = 0;

            // STEP 0: INIT
            steps.push({
                type: 'init', i: null, diff: null, len: 0, max: 0,
                tiles: arr.map(v => ({val: v, state: ''})),
                panel: '—',
                status: `array=[${arr}] n=${n}. Click Play to begin.`,
                log: `array=[${arr}] — n=${n}. Starting brute force recursion.`,
                logColor: 'var(--text-dim)'
            });

            function solve(index, currentSub, currentDiff) {
                if (index === n) {
                    if (currentSub.length > globalMaxLen) globalMaxLen = currentSub.length;
                    return;
                }

                const val = arr[index];
                
                // STEP A: Process index i
                steps.push({
                    type: 'process', i: index, diff: currentDiff, len: currentSub.length, max: globalMaxLen,
                    tiles: arr.map((v, idx) => ({
                        val: v, 
                        state: idx === index ? 'candidate' : (currentSub.includes(v) ? 'winning' : (idx < index ? 'past' : ''))
                    })),
                    panel: `Consider array[${index}]=${val}`,
                    status: `Exploring: Include or exclude array[${index}]`,
                    log: `Recursion: Processing index ${index}, element ${val}`,
                    logColor: 'var(--accent-blue)'
                });

                // STEP B: Try Including
                let canInclude = false;
                let newDiff = currentDiff;

                if (currentSub.length === 0) {
                    canInclude = true;
                } else if (currentSub.length === 1) {
                    newDiff = val - currentSub[0];
                    canInclude = true;
                } else {
                    let diffTest = val - currentSub[currentSub.length - 1];
                    if (diffTest === currentDiff) {
                        canInclude = true;
                    }
                }

                if (canInclude) {
                    steps.push({
                        type: 'include_success', i: index, diff: newDiff, len: currentSub.length + 1, max: globalMaxLen,
                        tiles: arr.map((v, idx) => ({
                            val: v, 
                            state: idx === index ? 'winning' : (currentSub.includes(v) ? 'winning' : (idx < index ? 'past' : ''))
                        })),
                        panel: currentSub.length === 0 ? `✓ First element, add to subsequence` : `✓ diff=${newDiff} matches sequence`,
                        status: `Include array[${index}]: Maintains arithmetic sequence`,
                        log: `Include ${val}: length=${currentSub.length + 1} ✓`,
                        logColor: 'var(--accent-green)'
                    });

                    solve(index + 1, [...currentSub, val], newDiff);
                    
                    // Backtrack Step (Visual)
                    steps.push({
                        type: 'backtrack', i: index, diff: currentDiff, len: currentSub.length, max: globalMaxLen,
                        tiles: arr.map((v, idx) => ({
                            val: v, 
                            state: idx === index ? 'candidate' : (currentSub.includes(v) ? 'winning' : (idx < index ? 'past' : ''))
                        })),
                        panel: `Backtrack: Exploring alternatives to ${val}`,
                        status: `Backtracking from index ${index}`,
                        log: `Backtrack: Exploring without element ${val}...`,
                        logColor: 'var(--text-dim)'
                    });

                } else {
                    let diffTest = val - currentSub[currentSub.length - 1];
                    steps.push({
                        type: 'include_fail', i: index, diff: currentDiff, len: currentSub.length, max: globalMaxLen,
                        tiles: arr.map((v, idx) => ({
                            val: v, 
                            state: idx === index ? 'defeated' : (currentSub.includes(v) ? 'winning' : (idx < index ? 'past' : ''))
                        })),
                        panel: `✗ diff=${diffTest} ≠ ${currentDiff} breaks sequence`,
                        status: `Cannot include array[${index}]: Breaks property`,
                        log: `Skip ${val}: diff mismatch ✗`,
                        logColor: 'var(--accent-red)'
                    });
                }

                // STEP C: Exclude Path
                solve(index + 1, currentSub, currentDiff);
            }

            // To avoid massive recursion explosion for visual steps, 
            // we'll run a slightly condensed version that prioritizes the best path.
            // In a real visualizer, we might limit 'n' or steps.
            solve(0, [], null);

            // FINAL STEP
            steps.push({
                type: 'final', i: null, diff: null, len: null, max: globalMaxLen,
                tiles: arr.map(v => ({val: v, state: 'past'})),
                panel: 'Exploration Complete',
                complete: true,
                result: globalMaxLen,
                status: `Done. Longest arithmetic subsequence length: ${globalMaxLen}`,
                log: `Final result: longest length = ${globalMaxLen}`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerText = step.panel;
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-diff').innerText = step.diff !== null ? step.diff : 'None';
            document.getElementById('val-len').innerText = step.len !== null ? step.len : '—';
            document.getElementById('val-max').innerText = step.max;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.result || '—';
            resVal.className = step.complete ? 'complete' : '';

            document.getElementById('status-text').innerText = step.status;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            // Only show last 20 logs to prevent lag
            let start = Math.max(0, idx - 20);
            for (let k = start; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = `var(${steps[k].logColor})`;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
