<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotate Array Left by K - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }
        label.array-label { font-family: 'Courier New', monospace; font-size: 14px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 200px;
            font-size: 14px;
        }
        .k-input { width: 60px !important; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 48px;}
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.highlight { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); }
        .tile.success { background: #0f2a1a; border: 1.5px solid var(--accent-green); color: var(--accent-green); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 500px; text-align: center; font-family: monospace; min-height: 52px;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 130px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        #res-val.complete { color: var(--accent-green); font-size: 20px; font-weight: 700; text-shadow: 0 0 16px var(--accent-green); animation: popAnim 400ms ease; }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 600px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">array =</label>
        <input type="text" id="array-input" placeholder="1, 2, 3, 4, 5">
        <label class="array-label">k =</label>
        <input type="text" id="k-input" class="k-input" placeholder="2">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1, 2, 3, 4, 5], 2)">Ex 1</button>
        <button onclick="loadExample([10, 20, 30], 4)">Ex 2</button>
    </div>

    <div class="array-container">
        <div class="info-label" style="font-size: 12px; font-family: monospace;">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="action-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Rotation</span>
            <span class="info-value" id="val-rot" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Stored Element</span>
            <span class="info-value" id="val-stored" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Status</span>
            <span class="info-value" id="val-status" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="info-label" style="margin-bottom: 4px;">array =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="info-label" style="margin-right:4px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Stored (First)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Shifting Left</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Complete</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [1, 2, 3, 4, 5];
        let k = 2;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([1, 2, 3, 4, 5], 2); }

        function loadExample(newArr, newK) {
            arr = [...newArr];
            k = newK;
            document.getElementById('array-input').value = arr.join(',');
            document.getElementById('k-input').value = k;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valArr = document.getElementById('array-input').value;
            const valK = document.getElementById('k-input').value;
            const parsedArr = valArr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const parsedK = parseInt(valK);
            if (parsedArr.length > 0 && !isNaN(parsedK)) loadExample(parsedArr.slice(0, 8), parsedK);
        }

        function generateSteps() {
            steps = [];
            let n = arr.length;
            let currentArr = [...arr];
            let effectiveK = k % n;

            // STEP 0: INIT
            steps.push({
                type: 'init', rot: 0, stored: null, status: 'Ready',
                tiles: currentArr.map(v => ({val: v, state: ''})),
                panel: '—',
                statusText: `array=[${arr}] k=${k} (effective=${effectiveK}). Click Play to begin.`,
                log: `array=[${arr}] — k=${k}. Starting brute force left rotation.`,
                logColor: 'var(--text-dim)'
            });

            for (let r = 1; r <= effectiveK; r++) {
                let firstVal = currentArr[0];

                // STEP A: Store First
                steps.push({
                    type: 'store', rot: r, stored: firstVal, status: 'Storing',
                    tiles: currentArr.map((v, i) => ({val: v, state: i === 0 ? 'candidate' : ''})),
                    panel: `Rotation ${r}: Moving first element to end`,
                    statusText: `Rotation ${r} of ${effectiveK}: Store first element = ${firstVal}`,
                    log: `Rotation ${r}: Starting left rotation. Stored ${firstVal}.`,
                    logColor: 'var(--accent-blue)'
                });

                // STEP B: Shift Left
                for (let i = 0; i < n - 1; i++) currentArr[i] = currentArr[i + 1];
                
                steps.push({
                    type: 'shift', rot: r, stored: firstVal, status: 'Shifting',
                    tiles: currentArr.map((v, i) => ({val: v, state: i < n-1 ? 'highlight' : ''})),
                    panel: `Shifting all elements left by 1 position`,
                    statusText: `Rotation ${r}: Shifting array elements left → [${currentArr.slice(0, n-1).join(', ')}, _]`,
                    log: `Rotation ${r}: Elements shifted.`,
                    logColor: 'var(--accent-green)'
                });

                // STEP C: Place End
                currentArr[n-1] = firstVal;
                steps.push({
                    type: 'place', rot: r, stored: firstVal, status: 'Placed',
                    tiles: currentArr.map((v, i) => ({val: v, state: i === n-1 ? 'success' : ''})),
                    panel: `First element placed at index ${n-1}`,
                    statusText: `Rotation ${r}: Array = [${currentArr.join(', ')}]`,
                    log: `Rotation ${r}: Complete → Array = [${currentArr.join(',')}]`,
                    logColor: 'var(--accent-green)'
                });
            }

            // FINAL STEP
            const finalStr = `[${currentArr.join(', ')}]`;
            steps.push({
                type: 'final', rot: effectiveK, stored: null, status: 'Done',
                tiles: currentArr.map(v => ({val: v, state: 'success'})),
                panel: 'Rotation Complete',
                complete: true,
                result: finalStr,
                statusText: `Complete. Array rotated left by ${k} steps: ${finalStr}`,
                log: `Final result: array = ${finalStr}`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('action-panel').innerText = step.panel;
            document.getElementById('val-rot').innerText = step.rot || '—';
            document.getElementById('val-stored').innerText = step.stored !== null ? step.stored : '—';
            document.getElementById('val-status').innerText = step.status || '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.result || '—';
            resVal.className = step.complete ? 'complete' : '';

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
