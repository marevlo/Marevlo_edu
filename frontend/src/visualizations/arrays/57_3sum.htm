<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Sum - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }

        #array-input { width: 320px; }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
        }

        /* Tile States */
        .tile.idle { color: var(--text-dim); }
        .tile.past { opacity: 0.3; }
        .tile.i { 
            background: #2a1600; 
            border: 2px solid var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.12); 
            z-index: 3; 
        }
        .tile.j { 
            background: #0d2244; 
            border: 2px solid var(--accent-blue); 
            color: var(--accent-blue); 
            transform: scale(1.08); 
            z-index: 2; 
        }
        .tile.k { 
            background: #1f2a16; 
            border: 2px solid #85e0a3; 
            color: #85e0a3; 
            transform: scale(1.05); 
        }
        .tile.valid { 
            background: #0f2a1a; 
            border: 2px solid var(--accent-green); 
            color: var(--accent-green); 
            transform: scale(1.18); 
            box-shadow: 0 0 14px var(--accent-green); 
        }

        /* ROW 3: TRIPLET PANEL */
        .triplet-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            min-width: 460px;
            text-align: center;
            font-family: monospace;
            font-size: 15px;
            min-height: 52px;
        }

        .triplet { 
            color: var(--accent-green); 
            font-weight: 700; 
            font-size: 18px; 
        }

        /* ROW 4: INFO PANEL */
        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #res-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
        #res-val { 
            font-family: monospace; 
            font-size: 16px; 
            color: var(--text-dim); 
            transition: all 0.3s;
            white-space: pre-wrap;
            text-align: center;
            max-width: 500px;
        }
        .pop { 
            animation: popAnim 400ms ease; 
            color: var(--accent-green) !important; 
            font-size: 22px !important; 
            font-weight: 700;
            text-shadow: 0 0 16px var(--accent-green);
        }

        @keyframes popAnim {
            0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)}
        }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        /* ROW 7: CONTROLS */
        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        /* ROW 8: LEGEND */
        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 680px;
            max-width: 90%;
            height: 160px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-line { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">nums =</label>
        <input type="text" id="array-input" placeholder="-1,0,1,2,-1,-4">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([-1,0,1,2,-1,-4])">Example 1</button>
        <button onclick="loadExample([0,0,0])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">nums =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="triplet-panel" id="triplet-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">i</div>
            <div class="info-value" id="val-i" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">j</div>
            <div class="info-value" id="val-j" style="color: var(--accent-blue);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">k</div>
            <div class="info-value" id="val-k" style="color: #85e0a3;">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">sum</div>
            <div class="info-value" id="val-sum" style="color: var(--accent-green);">0</div>
        </div>
    </div>

    <div class="result-display">
        <div id="res-label">Unique Triplets (sorted):</div>
        <div id="res-val">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> i (first)</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-blue);"></div> j (second)</div>
        <div class="legend-item"><div class="dot" style="background: #85e0a3;"></div> k (third)</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> Valid triplet (sum=0)</div>
        <div class="legend-item"><div class="dot" style="background: var(--text-dim);"></div> Past</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentArray = [-1, 0, 1, 2, -1, -4];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample(currentArray);
        }

        function loadExample(arr) {
            currentArray = arr.slice(0, 12);
            document.getElementById('array-input').value = currentArray.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (arr.length > 0) loadExample(arr);
        }

        function generateSteps() {
            steps = [];
            const n = currentArray.length;
            const resultSet = new Set();

            // STEP 0: INIT
            steps.push({
                type: 'init',
                i: null, j: null, k: null,
                sum: null,
                triplet: null,
                tileStates: Array(n).fill('idle'),
                status: `nums=[${currentArray}] — Brute force O(n³) search for all unique triplets summing to 0`,
                log: `nums = [${currentArray}] — Starting brute force 3Sum (O(n³))`
            });

            for (let i = 0; i < n - 2; i++) {
                // Start i
                steps.push({
                    type: 'start-i',
                    i: i, j: null, k: null,
                    sum: null,
                    triplet: null,
                    tileStates: Array(n).fill(0).map((_, idx) => idx < i ? 'past' : 'idle'),
                    status: `i=${i}: Fixing nums[${i}]=${currentArray[i]}`,
                    log: `i=${i} (value=${currentArray[i]})`
                });

                for (let j = i + 1; j < n - 1; j++) {
                    // Start j
                    let tileStates = Array(n).fill(0).map((_, idx) => {
                        if (idx < i) return 'past';
                        if (idx === i) return 'i';
                        if (idx < j) return 'past';
                        return 'idle';
                    });
                    tileStates[j] = 'j';

                    steps.push({
                        type: 'start-j',
                        i: i, j: j, k: null,
                        sum: null,
                        triplet: null,
                        tileStates: tileStates,
                        status: `j=${j}: Fixing nums[${j}]=${currentArray[j]}`,
                        log: `  j=${j} (value=${currentArray[j]})`
                    });

                    for (let k = j + 1; k < n; k++) {
                        const s = currentArray[i] + currentArray[j] + currentArray[k];
                        const triplet = [currentArray[i], currentArray[j], currentArray[k]].sort((a,b)=>a-b);
                        const tripletStr = triplet.join(',');

                        // Tile states
                        tileStates = Array(n).fill(0).map((_, idx) => {
                            if (idx < i) return 'past';
                            if (idx === i) return 'i';
                            if (idx < j) return 'past';
                            if (idx === j) return 'j';
                            if (idx < k) return 'past';
                            return 'idle';
                        });
                        tileStates[k] = 'k';
                        if (s === 0) tileStates[i] = tileStates[j] = tileStates[k] = 'valid';

                        const isNew = !resultSet.has(tripletStr);
                        if (s === 0 && isNew) resultSet.add(tripletStr);

                        steps.push({
                            type: s === 0 ? 'valid' : 'check',
                            i: i, j: j, k: k,
                            sum: s,
                            triplet: s === 0 ? triplet : null,
                            tileStates: tileStates,
                            status: `k=${k}: sum = ${currentArray[i]} + ${currentArray[j]} + ${currentArray[k]} = ${s} ${s===0 ? '→ VALID' : ''}`,
                            log: `    k=${k} → sum=${s} ${s===0 ? `→ triplet [${triplet}] ${isNew?'(new)': '(duplicate)'}` : ''}`,
                            logColor: s === 0 ? '#3fb950' : '#8b949e'
                        });
                    }
                }
            }

            // FINAL
            const resultList = Array.from(resultSet).map(t => `[${t}]`).join(', ');
            steps.push({
                type: 'final',
                i: null, j: null, k: null,
                sum: null,
                triplet: null,
                tileStates: Array(n).fill('past'),
                status: `Complete. Found ${resultSet.size} unique triplet(s): ${resultList || 'none'}`,
                log: `Result: ${resultList || '[]'}`,
                logColor: '#388bfd',
                bold: true,
                result: resultList || '[]'
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Tiles
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            currentArray.forEach((val, pos) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[pos]}`;
                tile.innerText = val;
                const indexEl = document.createElement('div');
                indexEl.className = 'tile-index';
                indexEl.innerText = `[${pos}]`;
                wrapper.appendChild(tile);
                wrapper.appendChild(indexEl);
                container.appendChild(wrapper);
            });

            // Triplet panel
            const tripletPanel = document.getElementById('triplet-panel');
            if (step.triplet) {
                tripletPanel.innerHTML = `<span class="triplet">[${step.triplet.join(', ')}]</span>`;
            } else {
                tripletPanel.innerHTML = step.type === 'final' ? '' : '—';
            }

            // Info panel
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-k').innerText = step.k !== null ? step.k : '—';
            document.getElementById('val-sum').innerText = step.sum !== null ? step.sum : '—';

            // Result
            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            // Status
            document.getElementById('status-text').innerText = step.status;

            // Log
            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) {
                pause();
                play();
            }
        };

        window.onload = init;
    </script>
</body>
</html>
