<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kth Largest Element in Array - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"], input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .arr-input { width: 280px; }
        .k-input { width: 60px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.8; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 600px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 100px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 700px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">array =</label>
        <input type="text" id="arr-input" class="arr-input" placeholder="3, 2, 1, 5, 6, 4">
        <label class="ui-label">k =</label>
        <input type="number" id="k-input" class="k-input" placeholder="2" min="1">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([3, 2, 1, 5, 6, 4], 2)">Ex 1</button>
        <button onclick="loadExample([3, 2, 3, 1, 2, 4, 5, 5, 6], 4)">Ex 2</button>
    </div>

    <div class="array-container">
        <div class="ui-label" style="font-size: 12px; white-space: nowrap;" id="array-label">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Target (k)</span>
            <span class="info-value" id="val-target" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Rank</span>
            <span class="info-value" id="val-rank" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Sorted Index (i)</span>
            <span class="info-value" id="val-i" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Value</span>
            <span class="info-value" id="val-val" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Kth Largest =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Checking Rank</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); box-shadow: 0 0 6px var(--accent-green);"></span> Target K Found</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Past / Ignored</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [3, 2, 1, 5, 6, 4];
        let targetK = 2;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([3, 2, 1, 5, 6, 4], 2); }

        function loadExample(newArr, newK) {
            arr = [...newArr];
            targetK = parseInt(newK);
            document.getElementById('arr-input').value = arr.join(', ');
            document.getElementById('k-input').value = targetK;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valArr = document.getElementById('arr-input').value;
            const parsedArr = valArr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const valK = parseInt(document.getElementById('k-input').value);
            
            if (parsedArr.length > 0 && !isNaN(valK)) {
                let k = Math.max(1, Math.min(valK, parsedArr.length));
                loadExample(parsedArr.slice(0, 15), k); // Limit length for visualization
            }
        }

        function getOrdinal(n) {
            if (n > 3 && n < 21) return 'th';
            switch (n % 10) {
                case 1:  return "st";
                case 2:  return "nd";
                case 3:  return "rd";
                default: return "th";
            }
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;
            let k = targetK;

            if (n === 0 || k > n || k <= 0) return;

            let originalArr = [...arr];
            let sortedArr = [...arr].sort((a, b) => b - a);

            // STEP 0: INIT
            steps.push({
                type: 'init', rank: '—', i: '—', val: '—', label: 'Unsorted Array:',
                tiles: originalArr.map(v => ({val: v, state: 'idle'})),
                panel: '—',
                statusText: `array=[${originalArr.join(', ')}], k=${k}. Click Play to begin.`,
                log: `n=${n}, k=${k}. Step 1: Sort array in descending order.`,
                logColor: 'var(--text-dim)'
            });

            // STEP 1: SORT
            steps.push({
                type: 'sort', rank: '—', i: '—', val: '—', label: 'Sorted Descending:',
                tiles: sortedArr.map(v => ({val: v, state: 'idle'})),
                panel: `Array sorted in descending order.`,
                statusText: `Array is now sorted. Ready to access index ${k-1}.`,
                log: `Sorted array (descending): [${sortedArr.join(', ')}]`,
                logColor: 'var(--accent-blue)'
            });

            let kthValue = null;

            // STEP 2: ITERATE TO K
            for (let i = 0; i < k; i++) {
                let currentRank = i + 1;
                let val = sortedArr[i];
                let ord = getOrdinal(currentRank);

                if (currentRank === k) {
                    kthValue = val;
                    steps.push({
                        type: 'found', rank: currentRank, i: i, val: val, label: 'Sorted Descending:',
                        tiles: sortedArr.map((v, idx) => ({
                            val: v,
                            state: idx === i ? 'winning' : (idx < i ? 'past' : 'idle')
                        })),
                        panel: `<span style="color:var(--accent-green)">✓ ${currentRank}${ord} largest element found at index ${i}: ${val}</span>`,
                        statusText: `Target rank ${k} reached!`,
                        log: `Rank ${currentRank} matches target k=${k}. Found ${val} ✓`,
                        logColor: 'var(--accent-green)'
                    });
                } else {
                    steps.push({
                        type: 'count', rank: currentRank, i: i, val: val, label: 'Sorted Descending:',
                        tiles: sortedArr.map((v, idx) => ({
                            val: v,
                            state: idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')
                        })),
                        panel: `Rank ${currentRank} is ${val} at index ${i}. Need rank ${k}.`,
                        statusText: `Traversing sorted array...`,
                        log: `Index ${i}: ${currentRank}${ord} largest is ${val}.`,
                        logColor: 'var(--accent-orange)'
                    });
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final', rank: k, i: k-1, val: kthValue, label: 'Sorted Descending:',
                tiles: sortedArr.map((v, idx) => ({
                    val: v,
                    state: idx === k-1 ? 'winning' : 'past'
                })),
                panel: 'Search Complete',
                complete: true,
                result: kthValue,
                statusText: `Done. The ${k}${getOrdinal(k)} largest element is ${kthValue}.`,
                log: `Final result: ${kthValue}`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            document.getElementById('array-label').innerText = step.label;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-target').innerText = targetK;
            document.getElementById('val-rank').innerText = step.rank;
            document.getElementById('val-i').innerText = step.i;
            document.getElementById('val-val').innerText = step.val;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
