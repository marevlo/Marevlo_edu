<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Missing Number - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        button {
            height: 32px; border-radius: 6px; padding: 0 16px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px;
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .array-area {
            background: var(--bg-surface);
            border: 2px solid var(--accent-blue);
            border-radius: 8px;
            padding: 20px;
            min-width: 480px;
        }

        .array-tiles {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .tile {
            width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            background: #21262d;
            border: 2px solid var(--border-main);
            border-radius: 10px;
            transition: all 0.4s ease;
        }

        .tile.current {
            border-color: var(--accent-orange);
            transform: scale(1.12);
            box-shadow: 0 0 20px var(--accent-orange);
        }

        .tile.found {
            border-color: var(--accent-green);
        }

        .candidate-info {
            background: var(--bg-surface);
            border: 2px solid var(--accent-purple);
            border-radius: 8px;
            padding: 20px;
            width: 280px;
            text-align: center;
        }

        .action-panel {
            margin-top: 25px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 16px 22px;
            width: 860px;
            text-align: center;
            font-family: monospace;
            min-height: 90px;
            font-size: 15px;
            line-height: 1.5;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .log-panel {
            margin-top: 15px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 860px;
            height: 160px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13.5px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <button onclick="loadExample(0)">Example 1 (n=3)</button>
        <button onclick="loadExample(1)">Example 2 (n=5)</button>
        <button onclick="resetAll()">Reset</button>
    </div>

    <div class="visual-container">
        <!-- Array Visualization -->
        <div class="array-area">
            <div style="color:var(--accent-blue); font-weight:bold; margin-bottom:8px;">Array</div>
            <div id="array-tiles" class="array-tiles"></div>
        </div>

        <!-- Candidate Info -->
        <div class="candidate-info">
            <h3 style="margin:0 0 12px 0; color:var(--accent-orange);">Current Candidate</h3>
            <div id="current-candidate" style="font-size:48px; font-weight:bold; min-height:70px; color:var(--accent-purple);"></div>
            
            <div style="margin-top:25px;">
                <h3 style="margin:0 0 8px 0; color:var(--accent-green);">Status</h3>
                <div id="status" style="font-size:22px; font-weight:bold;"></div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Click Play to start demonstration</div>

    <div class="controls">
        <button onclick="resetAll()">↺ Reset</button>
        <button onclick="backStep()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="nextStep()">Next →</button>
        <span style="margin-left:20px; font-size:13px;">Speed:</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log-container"></div>

    <script>
        let n = 0;
        let array = [];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1650, 950, 480];

        function init() {
            const _p = new URLSearchParams(window.location.search); loadExample(parseInt(_p.get('example') || '0'));
        }

        function loadExample(ex) {
            if (ex === 0) {
                n = 3;
                array = [0, 1, 3];
            } else {
                n = 5;
                array = [0, 1, 2, 3, 5];
            }
            steps = [];
            document.getElementById('log-container').innerHTML = '';

            addStep(`n = ${n}, arr = <b>[${array.join(', ')}]</b>`, true);
            addStep("Searching for missing number from 0 to n...");

            let missing = -1;

            for (let candidate = 0; candidate <= n; candidate++) {
                addStep(`Check candidate <b>${candidate}</b>`);
                
                let found = false;
                for (let i = 0; i < array.length; i++) {
                    if (array[i] === candidate) {
                        found = true;
                        addStep(`Found ${candidate} at index ${i}`);
                        break;
                    }
                }
                
                if (!found) {
                    missing = candidate;
                    addStep(`<b style="color:var(--accent-green)">Missing number found: ${candidate}</b>`, true);
                    break;
                }
            }

            stepIndex = 0;
            renderStep(0);
        }

        function addStep(text) {
            steps.push({
                panel: text,
                log: text
            });
        }

        function renderArray(currentCandidate, searchIndex) {
            const container = document.getElementById('array-tiles');
            container.innerHTML = '';
            array.forEach((val, idx) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.textContent = val;
                
                if (val === currentCandidate) {
                    tile.style.borderColor = 'var(--accent-green)';
                }
                if (idx === searchIndex) {
                    tile.classList.add('current');
                }
                
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            let currentCandidate = -1;
            let searchIndex = -1;

            const candMatch = step.panel.match(/candidate <b>(\d+)<\/b>/);
            if (candMatch) currentCandidate = parseInt(candMatch[1]);

            const foundMatch = step.panel.match(/at index (\d+)/);
            if (foundMatch) searchIndex = parseInt(foundMatch[1]);

            renderArray(currentCandidate, searchIndex);

            document.getElementById('current-candidate').innerText = currentCandidate !== -1 ? currentCandidate : "—";
            document.getElementById('main-panel').innerHTML = step.panel;

            const logDiv = document.getElementById('log-container');
            logDiv.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.margin = '4px 0';
                line.innerHTML = steps[i].log;
                logDiv.appendChild(line);
            }
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function nextStep() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function backStep() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function resetAll() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(nextStep, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
