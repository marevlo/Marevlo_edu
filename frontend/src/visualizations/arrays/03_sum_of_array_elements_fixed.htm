<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of Array Elements - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 240px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
        }

        .tile.idle { color: var(--text-dim); }
        .tile.candidate { 
            background: #2a1600; 
            border: 2px solid var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.12); 
            z-index: 2; 
        }
        .tile.past { opacity: 0.3; }

        /* ROW 3: ACCUMULATION PANEL */
        .accumulation-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 10px 18px;
            min-width: 400px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }

        .old-total { color: var(--text-dim); }
        .plus-sign { color: var(--text-main); margin: 0 8px; }
        .curr-elem { color: var(--accent-orange); font-weight: 700; }
        .arrow-sign { color: var(--text-log); margin: 0 10px; }
        .new-total { color: var(--accent-green); font-weight: 700; font-size: 18px; }

        /* ROW 4: INFO PANEL */
        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #res-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
        #res-val { font-family: monospace; font-size: 16px; color: var(--text-dim); }
        .pop { 
            animation: popAnim 400ms ease; 
            color: var(--accent-green) !important; 
            font-size: 26px !important; 
            font-weight: 700;
            text-shadow: 0 0 16px var(--accent-green);
        }

        @keyframes popAnim {
            0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)}
        }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        /* ROW 7: CONTROLS */
        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        /* ROW 8: LEGEND */
        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 600px;
            max-width: 90%;
            height: 120px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-line { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">array =</label>
        <input type="text" id="array-input" placeholder="1, 2, 3, 4, 5">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1, 2, 3, 4, 5])">Example 1</button>
        <button onclick="loadExample([-2, 0, 5, -3, 7])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="accumulation-panel" id="accum-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">Index i</div>
            <div class="info-value" id="val-i" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">array[i]</div>
            <div class="info-value" id="val-ai" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">total</div>
            <div class="info-value" id="val-total" style="color: var(--accent-green); font-size: 20px;">0</div>
        </div>
    </div>

    <div class="result-display">
        <div id="res-label">sum =</div>
        <div id="res-val">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> Current element (i)</div>
        <div class="legend-item"><div class="dot" style="background: var(--text-dim);"></div> Previous total</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> New total</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-blue);"></div> Running accumulator</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentArray = [1, 2, 3, 4, 5];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample(currentArray);
        }

        function loadExample(arr) {
            currentArray = arr.slice(0, 8);
            document.getElementById('array-input').value = currentArray.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (arr.length > 0) loadExample(arr);
        }

        function generateSteps() {
            steps = [];
            const n = currentArray.length;
            let currentTotal = 0;

            // STEP 0: INIT
            steps.push({
                type: 'init',
                i: null, ai: null, total: 0,
                tileStates: Array(n).fill('idle'),
                accum: '—',
                status: `array=[${currentArray}] n=${n}. Click Play to begin.`,
                log: `array=[${currentArray}] — n=${n}. Starting sum computation.`
            });

            for (let i = 0; i < n; i++) {
                let val = currentArray[i];
                let oldTotal = currentTotal;
                currentTotal += val;

                // STEP A: Start adding element i
                steps.push({
                    type: 'start',
                    i: i, ai: val, total: oldTotal,
                    tileStates: Array(n).fill(0).map((_, idx) => idx < i ? 'past' : (idx === i ? 'candidate' : 'idle')),
                    accum: '—',
                    status: `i=${i}: Adding array[${i}]=${val} to total`,
                    log: `i=${i}: array[${i}]=${val}, prepare to add`
                });

                // STEP B: Perform addition
                steps.push({
                    type: 'add',
                    i: i, ai: val, total: currentTotal,
                    tileStates: Array(n).fill(0).map((_, idx) => idx < i ? 'past' : (idx === i ? 'candidate' : 'idle')),
                    accum: `<span class="old-total">${oldTotal}</span> <span class="plus-sign">+</span> <span class="curr-elem">${val}</span> <span class="arrow-sign">→</span> <span class="new-total">${currentTotal}</span>`,
                    status: `Adding: ${oldTotal} + ${val} = ${currentTotal} ✓`,
                    log: `i=${i}: array[${i}]=${val}, total = ${oldTotal} + ${val} = ${currentTotal} ✓`,
                    logColor: 'var(--accent-green)'
                });

                // STEP C: Processed
                steps.push({
                    type: 'past',
                    i: i, ai: val, total: currentTotal,
                    tileStates: Array(n).fill(0).map((_, idx) => idx <= i ? 'past' : 'idle'),
                    accum: '—',
                    status: `i=${i}: total updated. Moving to next element.`,
                    log: null
                });
            }

            // FINAL STEP
            steps.push({
                type: 'final',
                i: null, ai: null, total: currentTotal,
                tileStates: Array(n).fill('past'),
                accum: '—',
                result: currentTotal,
                status: `Complete. Sum = ${currentTotal}`,
                log: `Final result: sum = ${currentTotal}`,
                logColor: 'var(--accent-blue)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Tiles
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            currentArray.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[i]}`;
                tile.innerText = val;
                const index = document.createElement('div');
                index.className = 'tile-index';
                index.innerText = `[${i}]`;
                wrapper.appendChild(tile);
                wrapper.appendChild(index);
                container.appendChild(wrapper);
            });

            // Accumulation Panel
            const accum = document.getElementById('accum-panel');
            accum.innerHTML = step.accum;
            accum.style.color = step.accum === '—' ? 'var(--text-dim)' : 'var(--text-main)';

            // Info Panel
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-ai').innerText = step.ai !== null ? step.ai : '—';
            document.getElementById('val-total').innerText = step.total;

            // Result
            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            // Status
            document.getElementById('status-text').innerText = step.status;

            // Log
            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        window.onload = init;
    </script>
</body>
</html>
