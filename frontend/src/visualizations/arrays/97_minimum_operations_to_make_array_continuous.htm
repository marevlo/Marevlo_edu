<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Operations to Make Array Continuous - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        button {
            height: 32px; border-radius: 6px; padding: 0 16px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px;
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .original-area, .unique-area, .window-area {
            background: var(--bg-surface);
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 15px;
            width: 320px;
        }

        .original-area { border-color: var(--accent-blue); }
        .unique-area { border-color: var(--accent-purple); }
        .window-area { border-color: var(--accent-green); }

        .tiles {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 15px 0;
        }

        .tile {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            background: #21262d;
            border: 2px solid var(--border-main);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tile.current {
            border-color: var(--accent-orange);
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--accent-orange);
        }

        .tile.in-window {
            border-color: var(--accent-green);
        }

        .action-panel {
            margin-top: 25px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 16px 22px;
            width: 860px;
            text-align: center;
            font-family: monospace;
            min-height: 90px;
            font-size: 15px;
            line-height: 1.5;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .log-panel {
            margin-top: 15px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 860px;
            height: 160px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13.5px;
        }

        .result {
            font-size: 32px;
            font-weight: bold;
            color: var(--accent-green);
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <button onclick="loadExample(0)">Example 1: [4,2,5,3]</button>
        <button onclick="loadExample(1)">Example 2: [1,2,3,5,6]</button>
        <button onclick="resetAll()">Reset</button>
    </div>

    <div class="visual-container">
        <!-- Original Array -->
        <div class="original-area">
            <div style="color:var(--accent-blue); font-weight:bold; margin-bottom:8px;">Original Array</div>
            <div id="original-tiles" class="tiles"></div>
        </div>

        <!-- Sorted Unique -->
        <div class="unique-area">
            <div style="color:var(--accent-purple); font-weight:bold; margin-bottom:8px;">Sorted Unique</div>
            <div id="unique-tiles" class="tiles"></div>
        </div>

        <!-- Current Window -->
        <div class="window-area">
            <div style="color:var(--accent-green); font-weight:bold; margin-bottom:8px;">Current Window</div>
            <div id="window-tiles" class="tiles" style="min-height:80px;"></div>
            <div class="result" id="result-display">Min Ops: —</div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Click Play to start demonstration</div>

    <div class="controls">
        <button onclick="resetAll()">↺ Reset</button>
        <button onclick="backStep()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="nextStep()">Next →</button>
        <span style="margin-left:20px; font-size:13px;">Speed:</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log-container"></div>

    <script>
        let array = [];
        let unique = [];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1650, 950, 480];

        function init() {
            const _p = new URLSearchParams(window.location.search); loadExample(parseInt(_p.get('example') || '0'));
        }

        function loadExample(ex) {
            if (ex === 0) {
                array = [4, 2, 5, 3];
            } else {
                array = [1, 2, 3, 5, 6];
            }
            unique = [...new Set(array)].sort((a, b) => a - b);
            steps = [];
            document.getElementById('log-container').innerHTML = '';

            addStep(`Original array: <b>[${array.join(', ')}]</b>`, true);
            addStep(`Sorted unique: <b>[${unique.join(', ')}]</b>`);

            let minOps = array.length;

            // Simulate sliding window steps
            let left = 0;
            for (let right = 0; right < unique.length; right++) {
                while (unique[right] - unique[left] >= array.length) {
                    left++;
                }
                let currentLen = right - left + 1;
                let ops = array.length - currentLen;
                minOps = Math.min(minOps, ops);
                addStep(`Window [${unique[left]}, ${unique[right]}] (length ${currentLen}), ops = ${ops}`);
            }

            addStep(`Minimum operations needed: <b>${minOps}</b>`, true);

            stepIndex = 0;
            renderStep(0);
        }

        function addStep(text) {
            steps.push({
                panel: text,
                log: text
            });
        }

        function renderTiles(containerId, values, leftIdx = -1, rightIdx = -1) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            values.forEach((val, idx) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.textContent = val;
                if (idx >= leftIdx && idx <= rightIdx && leftIdx !== -1) {
                    tile.style.borderColor = 'var(--accent-green)';
                }
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            renderTiles('original-tiles', array);
            renderTiles('unique-tiles', unique);

            // Try to parse current window for highlighting
            let left = -1, right = -1;
            const windowMatch = step.panel.match(/Window \[(\d+), (\d+)\]/);
            if (windowMatch) {
                left = unique.indexOf(parseInt(windowMatch[1]));
                right = unique.indexOf(parseInt(windowMatch[2]));
            }

            renderTiles('window-tiles', unique, left, right);

            document.getElementById('main-panel').innerHTML = step.panel;

            const logDiv = document.getElementById('log-container');
            logDiv.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.margin = '4px 0';
                line.innerHTML = steps[i].log;
                logDiv.appendChild(line);
            }
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function nextStep() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function backStep() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function resetAll() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(nextStep, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
