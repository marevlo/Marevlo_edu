<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search a 2D Matrix - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"], input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .matrix-input { width: 300px; }
        .target-input { width: 80px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .matrix-wrapper { display: flex; flex-direction: column; gap: 6px; align-items: center; }
        .matrix-row { display: flex; gap: 6px; justify-content: center; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 16px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 10px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.search-space { background: #0d2244; border: 1px solid var(--accent-blue); color: var(--text-main); }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.eliminated { opacity: 0.25; background: #161b22; color: var(--text-dim); border: 1px solid var(--border-main); }
        .tile.idle { opacity: 0.9; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 680px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.4;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 90px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 18px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; font-size: 26px !important; }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">matrix =</label>
        <input type="text" id="arr-input" class="matrix-input" placeholder="[[1,3,5,7],[10,11,16,20],[23,30,34,60]]">
        <label class="ui-label">target =</label>
        <input type="number" id="target-input" class="target-input" placeholder="3">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([[1,3,5,7],[10,11,16,20],[23,30,34,60]], 3)">Ex 1</button>
        <button onclick="loadExample([[1,3,5,7],[10,11,16,20],[23,30,34,60]], 13)">Ex 2</button>
    </div>

    <div class="visual-container">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div class="ui-label">Matrix (Treated as 1D Array):</div>
            <div class="matrix-wrapper" id="matrix-container"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Left (1D Index)</span>
            <span class="info-value" id="val-left" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Right (1D Index)</span>
            <span class="info-value" id="val-right" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Mid (1D Index)</span>
            <span class="info-value" id="val-mid" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Mapped 2D (r, c)</span>
            <span class="info-value" id="val-coord" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">matrix[r][c]</span>
            <span class="info-value" id="val-val" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Target</span>
            <span class="info-value" id="val-target" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">found target? =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Active Search Space</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Midpoint Evaluated</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Target Match</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Eliminated / Past</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let matrix = [[1, 3, 5, 7], [10, 11, 16, 20], [23, 30, 34, 60]];
        let target = 3;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([[1, 3, 5, 7], [10, 11, 16, 20], [23, 30, 34, 60]], 3); }

        function loadExample(newMat, newTarget) {
            matrix = newMat.map(row => [...row]);
            target = parseInt(newTarget);
            document.getElementById('arr-input').value = JSON.stringify(matrix);
            document.getElementById('target-input').value = target;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('arr-input').value;
            const tStr = document.getElementById('target-input').value;
            try {
                const parsed = JSON.parse(valStr);
                const t = parseInt(tStr);
                if (Array.isArray(parsed) && parsed.length > 0 && Array.isArray(parsed[0]) && !isNaN(t)) {
                    loadExample(parsed, t);
                } else {
                    alert("Invalid input format. Check matrix and target.");
                }
            } catch(e) {
                alert("Invalid JSON format for matrix. Use [[1,2],[3,4]]");
            }
        }

        function getMatrixState(m, n, left, right, midIdx, isFound) {
            let state = [];
            for (let r = 0; r < m; r++) {
                let row = [];
                for (let c = 0; c < n; c++) {
                    let idx1D = r * n + c;
                    let tileClass = "idle";
                    
                    if (idx1D >= left && idx1D <= right) {
                        tileClass = "search-space";
                    } else {
                        tileClass = "eliminated";
                    }

                    if (idx1D === midIdx) {
                        tileClass = isFound ? "winning" : "candidate";
                    }

                    row.push(tileClass);
                }
                state.push(row);
            }
            return state;
        }

        function generateSteps() {
            steps = [];
            const m = matrix.length;
            if (m === 0) return;
            const n = matrix[0].length;
            const totalElements = m * n;
            
            let left = 0;
            let right = totalElements - 1;
            let isFound = false;

            // STEP 0: INIT
            steps.push({
                type: 'init', left: left, right: right, mid: '—', coord: '—', val: '—', target: target,
                matrixState: getMatrixState(m, n, left, right, -1, false),
                panel: `Treat the ${m}x${n} matrix as a 1D sorted array of length ${totalElements}.<br>Initialize <code>left = 0</code>, <code>right = ${totalElements - 1}</code>.`,
                statusText: `Matrix flattened logically. Click Play to begin Binary Search.`,
                log: `m=${m}, n=${n}. Total elements N=${totalElements}. Starting Binary Search.`,
                logColor: 'var(--text-dim)'
            });

            while (left <= right) {
                let mid = Math.floor((left + right) / 2);
                let r = Math.floor(mid / n);
                let c = mid % n;
                let val = matrix[r][c];

                // EVALUATE MID
                steps.push({
                    type: 'eval', left: left, right: right, mid: mid, coord: `(${r}, ${c})`, val: val, target: target,
                    matrixState: getMatrixState(m, n, left, right, mid, false),
                    panel: `Calculate Midpoint:<br><code>mid = floor((${left} + ${right}) / 2) = ${mid}</code><br>Map to 2D: <code>row = ${mid} / ${n} = ${r}</code>, <code>col = ${mid} % ${n} = ${c}</code>`,
                    statusText: `Comparing matrix[${r}][${c}] (${val}) with target (${target})...`,
                    log: `Search Space: [${left}, ${right}]. Mid 1D index = ${mid}.`,
                    logColor: 'var(--text-main)'
                });

                if (val === target) {
                    isFound = true;
                    steps.push({
                        type: 'found', left: left, right: right, mid: mid, coord: `(${r}, ${c})`, val: val, target: target,
                        matrixState: getMatrixState(m, n, left, right, mid, true),
                        panel: `<span style="color:var(--accent-green)">Match Found! <code>${val} == ${target}</code></span>. The target exists in the matrix.`,
                        statusText: `Target found at 2D coordinate (${r}, ${c}).`,
                        log: `  matrix[${r}][${c}] == target. Match found! ✓`,
                        logColor: 'var(--accent-green)'
                    });
                    break;
                } else if (val < target) {
                    let oldLeft = left;
                    left = mid + 1;
                    steps.push({
                        type: 'update-left', left: left, right: right, mid: mid, coord: `(${r}, ${c})`, val: val, target: target,
                        matrixState: getMatrixState(m, n, left, right, -1, false),
                        panel: `<code>${val} < ${target}</code>. The target must be in the right half.<br>Update <code>left = mid + 1 = ${left}</code>.`,
                        statusText: `Eliminating left half of search space.`,
                        log: `  ${val} < ${target}. Target is to the right. left updated to ${left}.`,
                        logColor: 'var(--accent-blue)'
                    });
                } else {
                    let oldRight = right;
                    right = mid - 1;
                    steps.push({
                        type: 'update-right', left: left, right: right, mid: mid, coord: `(${r}, ${c})`, val: val, target: target,
                        matrixState: getMatrixState(m, n, left, right, -1, false),
                        panel: `<code>${val} > ${target}</code>. The target must be in the left half.<br>Update <code>right = mid - 1 = ${right}</code>.`,
                        statusText: `Eliminating right half of search space.`,
                        log: `  ${val} > ${target}. Target is to the left. right updated to ${right}.`,
                        logColor: 'var(--accent-blue)'
                    });
                }
            }

            if (!isFound) {
                steps.push({
                    type: 'not-found', left: left, right: right, mid: '—', coord: '—', val: '—', target: target,
                    matrixState: getMatrixState(m, n, -1, -1, -1, false),
                    panel: `<span style="color:var(--accent-red)">Search space exhausted (<code>left > right</code>).</span><br>The target ${target} does not exist in the matrix.`,
                    statusText: `Target not found in matrix.`,
                    log: `  left (${left}) > right (${right}). Search complete.`,
                    logColor: 'var(--accent-red)'
                });
            }

            // FINAL STEP
            steps.push({
                type: 'final', left: '—', right: '—', mid: '—', coord: '—', val: '—', target: target,
                matrixState: steps[steps.length - 1].matrixState,
                panel: isFound ? 'Binary Search complete. O(log(m*n)) time complexity achieved.' : 'Binary Search complete. Target is absent.',
                complete: true,
                result: isFound ? 'True' : 'False',
                isTrue: isFound,
                statusText: isFound ? `Done. Target exists.` : `Done. Target does not exist.`,
                log: `Final Result: ${isFound ? 'True' : 'False'}`,
                logColor: 'var(--accent-purple)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Matrix
            const matrixContainer = document.getElementById('matrix-container');
            matrixContainer.innerHTML = '';
            
            const n = matrix[0].length;

            step.matrixState.forEach((row, i) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'matrix-row';
                row.forEach((stateStr, j) => {
                    let idx1D = i * n + j;
                    const wrapper = document.createElement('div');
                    wrapper.className = 'tile-unit';
                    const tile = document.createElement('div');
                    tile.className = `tile ${stateStr}`;
                    tile.innerText = matrix[i][j];
                    const idxLabel = document.createElement('div');
                    idxLabel.className = 'tile-index';
                    idxLabel.innerText = `[${idx1D}]`;
                    wrapper.append(tile, idxLabel);
                    rowDiv.appendChild(wrapper);
                });
                matrixContainer.appendChild(rowDiv);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-left').innerText = step.left;
            document.getElementById('val-right').innerText = step.right;
            document.getElementById('val-mid').innerText = step.mid;
            document.getElementById('val-coord').innerText = step.coord;
            document.getElementById('val-val').innerText = step.val;
            document.getElementById('val-target').innerText = step.target;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            
            if (step.complete) {
                resVal.className = step.isTrue ? 'pop' : 'pop-false';
            } else {
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerHTML = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
