<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Restock Planning - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 14px; color: var(--text-dim); }
        input[type="text"], input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }
        .num-input { width: 60px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); }
        .tile.winning { background: #0f2a1a; border: 1.5px solid var(--accent-green); color: var(--accent-green); transform: scale(1.06); }
        .tile.defeated { background: #2a0d0d; border: 1.5px solid var(--accent-red); color: var(--accent-red); }
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }

        /* ROW 3: PANEL */
        .panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 500px; text-align: center; font-family: monospace; min-height: 52px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        #res-val.pop { animation: popAnim 400ms ease; color: var(--accent-green); font-weight: 700; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 600px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">demand =</label>
        <input type="text" id="demand-input" placeholder="2, 3, 1, 4" style="width: 150px;">
        <label class="ui-label">lead_time =</label>
        <input type="number" id="lead-input" class="num-input" value="2">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([2, 3, 1, 4], 2)">Ex 1</button>
        <button onclick="loadExample([1, 1, 1, 1], 1)">Ex 2</button>
    </div>

    <div class="array-container">
        <div class="ui-label" style="font-size: 12px;">daily demand =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Day</span>
            <span class="info-value" id="val-day" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Inventory</span>
            <span class="info-value" id="val-inv" style="color: var(--accent-green);">0</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Demand</span>
            <span class="info-value" id="val-dmd" style="color: var(--accent-orange);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">restock schedule =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Current Day</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Planning (Stockout)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Restock Success</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red)"></span> Stockout ✗</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let demand = [2, 3, 1, 4];
        let leadTime = 2;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([2, 3, 1, 4], 2); }

        function loadExample(arr, lt) {
            demand = [...arr];
            leadTime = parseInt(lt);
            document.getElementById('demand-input').value = arr.join(',');
            document.getElementById('lead-input').value = leadTime;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valArr = document.getElementById('demand-input').value;
            const parsedArr = valArr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const parsedLT = parseInt(document.getElementById('lead-input').value);
            if (parsedArr.length > 0) loadExample(parsedArr.slice(0, 10), parsedLT);
        }

        function generateSteps() {
            steps = [];
            let inventory = 0;
            let restockDays = [];
            let currentDay = 0;
            const n = demand.length;

            steps.push({
                type: 'init', day: null, inv: 0, dmd: null,
                tiles: demand.map(v => ({val: v, state: ''})),
                panel: '—',
                statusText: `demand=[${demand}] lead_time=${leadTime}. Click Play to begin.`,
                log: `demand=[${demand}] — Lead Time: ${leadTime}. Starting schedule planning.`,
                logColor: 'var(--text-dim)'
            });

            while (currentDay < n) {
                const d = demand[currentDay];
                
                // STEP A: Process Day
                steps.push({
                    type: 'check', day: currentDay, inv: inventory, dmd: d,
                    tiles: demand.map((v, idx) => ({val: v, state: idx === currentDay ? 'candidate' : (idx < currentDay ? 'past' : '')})),
                    panel: `Day ${currentDay}: inv=${inventory} vs demand=${d}`,
                    statusText: `Day ${currentDay}: Checking inventory sufficiency`,
                    log: `Day ${currentDay}: inventory=${inventory}, demand=${d}`
                });

                if (inventory >= d) {
                    inventory -= d;
                    steps.push({
                        type: 'success', day: currentDay, inv: inventory, dmd: d,
                        tiles: demand.map((v, idx) => ({val: v, state: idx === currentDay ? 'winning' : (idx < currentDay ? 'past' : '')})),
                        panel: `✓ Sufficient: new inv=${inventory}`,
                        statusText: `Day ${currentDay}: Sufficient inventory, proceed`,
                        log: `Day ${currentDay}: OK, inventory=${inventory} ✓`,
                        logColor: 'var(--accent-green)'
                    });
                    currentDay++;
                } else {
                    steps.push({
                        type: 'stockout', day: currentDay, inv: inventory, dmd: d,
                        tiles: demand.map((v, idx) => ({val: v, state: idx === currentDay ? 'defeated' : (idx < currentDay ? 'past' : '')})),
                        panel: `✗ Stockout at day ${currentDay}`,
                        statusText: `Day ${currentDay}: Stockout detected ✗`,
                        log: `Day ${currentDay}: Stockout ✗, planning restock`,
                        logColor: 'var(--accent-red)'
                    });

                    // STEP B: Look ahead
                    let cumDemand = 0;
                    let stockoutPoint = -1;
                    for (let f = currentDay; f < n; f++) {
                        cumDemand += demand[f];
                        
                        steps.push({
                            type: 'planning', day: currentDay, inv: inventory, dmd: d,
                            tiles: demand.map((v, idx) => {
                                let state = (idx < currentDay) ? 'past' : '';
                                if (idx === currentDay) state = 'defeated';
                                if (idx > currentDay && idx <= f) state = 'comparing';
                                return {val: v, state};
                            }),
                            panel: `Checking cumulative demand through day ${f}`,
                            statusText: `Cumulative demand: ${cumDemand}`
                        });

                        if (cumDemand > inventory) {
                            stockoutPoint = f;
                            steps.push({
                                type: 'found_point', day: currentDay, inv: inventory, dmd: d,
                                tiles: demand.map((v, idx) => {
                                    let state = (idx < currentDay) ? 'past' : '';
                                    if (idx === currentDay) state = 'defeated';
                                    if (idx > currentDay && idx < stockoutPoint) state = 'comparing';
                                    if (idx === stockoutPoint) state = 'comparing';
                                    return {val: v, state};
                                }),
                                panel: `Stockout point at day ${stockoutPoint}`,
                                statusText: `Demand exceeds inventory at day ${stockoutPoint}`,
                                log: `Stockout threshold reached at day ${stockoutPoint}`,
                                logColor: 'var(--accent-orange)'
                            });
                            break;
                        }
                    }

                    // STEP C: Schedule
                    let restockDay = Math.max(currentDay, stockoutPoint - leadTime);
                    // For brute force simplicity, we sum all remaining demand or just up to stockout
                    // Based on example 2 logic, we often take "all future demand" to avoid repeated steps
                    let quantity = 0;
                    for (let q = currentDay; q < n; q++) quantity += demand[q];
                    
                    inventory += quantity;
                    restockDays.push(restockDay);

                    steps.push({
                        type: 'schedule', day: currentDay, inv: inventory, dmd: d,
                        tiles: demand.map((v, idx) => {
                            let state = (idx < currentDay) ? 'past' : '';
                            if (idx === restockDay) state = 'winning';
                            return {val: v, state};
                        }),
                        panel: `Schedule restock at day ${restockDay}`,
                        statusText: `Restock scheduled: day ${restockDay}, qty=${quantity}`,
                        log: `Restock scheduled at day ${restockDay}: qty=${quantity} ✓`,
                        logColor: 'var(--accent-green)',
                        schedule: [...restockDays]
                    });
                }
            }

            steps.push({
                type: 'final', day: null, inv: inventory, dmd: null,
                tiles: demand.map(v => ({val: v, state: 'past'})),
                panel: 'Simulation Complete',
                complete: true,
                schedule: [...restockDays],
                statusText: `Done. Restock schedule: [${restockDays.join(', ')}]`,
                log: `Final result: restocks = [${restockDays.join(', ')}]`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-day').innerText = step.day !== null ? step.day : '—';
            document.getElementById('val-inv').innerText = step.inv;
            document.getElementById('val-dmd').innerText = step.dmd !== null ? step.dmd : '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.schedule ? `[${step.schedule.join(', ')}]` : '—';
            resVal.className = step.complete ? 'pop' : '';

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = `var(${steps[k].logColor}, ${steps[k].logColor})`;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
