<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Even and Odd Numbers - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 220px;
            font-size: 13px;
        }
        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.even { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.odd { background: #1e1030; border: 2px solid var(--accent-purple); color: var(--accent-purple); transform: scale(1.08); z-index: 2; }
        .tile.past-even { background: #0d2244; border: 1px solid var(--accent-blue); color: var(--accent-blue); opacity: 0.6; }
        .tile.past-odd { background: #1e1030; border: 1px solid var(--accent-purple); color: var(--accent-purple); opacity: 0.6; }
        .tile.idle { opacity: 0.5; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 550px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; display: flex; gap: 20px;}
        .pop { animation: popAnim 400ms ease; }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">array =</label>
        <input type="text" id="arr-input" placeholder="1, 2, 3, 4, 5">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1, 2, 3, 4, 5])">Ex 1</button>
        <button onclick="loadExample([-3, -2, -1, 0, 1, 2, 3])">Ex 2</button>
    </div>

    <div class="array-container">
        <div class="ui-label" style="font-size: 12px; white-space: nowrap;">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Index i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Value array[i]</span>
            <span class="info-value" id="val-arr" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Even Count</span>
            <span class="info-value" id="val-even" style="color: var(--accent-blue);">0</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Odd Count</span>
            <span class="info-value" id="val-odd" style="color: var(--accent-purple);">0</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">final result =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Current Element</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Even Number</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple)"></span> Odd Number</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.5"></span> Unprocessed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [1, 2, 3, 4, 5];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([1, 2, 3, 4, 5]); }

        function loadExample(newArr) {
            arr = [...newArr];
            document.getElementById('arr-input').value = arr.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valArr = document.getElementById('arr-input').value;
            const parsedArr = valArr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (parsedArr.length > 0) {
                loadExample(parsedArr);
            }
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;
            let evenCount = 0;
            let oddCount = 0;
            let tileStates = new Array(n).fill('idle');

            steps.push({
                type: 'init', i: '—', val: '—', even: 0, odd: 0,
                tiles: [...tileStates],
                panel: '—',
                statusText: `array=[${arr.join(', ')}] n=${n}. Click Play to begin.`,
                log: `n=${n}. Starting element evaluation.`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 0; i < n; i++) {
                let val = arr[i];
                
                // STEP A: Select Candidate
                let tempStates = [...tileStates];
                tempStates[i] = 'candidate';
                
                steps.push({
                    type: 'eval', i: i, val: val, even: evenCount, odd: oddCount,
                    tiles: [...tempStates],
                    panel: `Checking if array[${i}] = ${val} is even or odd...`,
                    statusText: `Evaluating element at index ${i}`,
                    log: `i=${i}: Processing element ${val}`,
                    logColor: 'var(--accent-orange)'
                });

                // STEP B: Determine Even or Odd
                let isEven = (Math.abs(val % 2) === 0);
                
                if (isEven) {
                    evenCount++;
                    tileStates[i] = 'past-even';
                    tempStates[i] = 'even';
                    
                    steps.push({
                        type: 'result_even', i: i, val: val, even: evenCount, odd: oddCount,
                        tiles: [...tempStates],
                        panel: `<span style="color:var(--accent-blue)">${val} % 2 == 0 → Even ✓</span>`,
                        statusText: `Element ${val} is Even. Incrementing even_count.`,
                        log: `i=${i}: ${val} % 2 = 0 → even_count = ${evenCount}`,
                        logColor: 'var(--accent-blue)'
                    });
                } else {
                    oddCount++;
                    tileStates[i] = 'past-odd';
                    tempStates[i] = 'odd';
                    
                    steps.push({
                        type: 'result_odd', i: i, val: val, even: evenCount, odd: oddCount,
                        tiles: [...tempStates],
                        panel: `<span style="color:var(--accent-purple)">${val} % 2 ≠ 0 → Odd ✓</span>`,
                        statusText: `Element ${val} is Odd. Incrementing odd_count.`,
                        log: `i=${i}: ${val} % 2 ≠ 0 → odd_count = ${oddCount}`,
                        logColor: 'var(--accent-purple)'
                    });
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final', i: '—', val: '—', even: evenCount, odd: oddCount,
                tiles: [...tileStates],
                panel: 'Array Traversal Complete',
                complete: true,
                statusText: `Done. Final counts - Even: ${evenCount}, Odd: ${oddCount}`,
                log: `Final result: Even = ${evenCount}, Odd = ${oddCount}`,
                logColor: 'var(--accent-green)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((state, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${state}`;
                tile.innerText = arr[i];
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-i').innerText = step.i;
            document.getElementById('val-arr').innerText = step.val;
            document.getElementById('val-even').innerText = step.even;
            document.getElementById('val-odd').innerText = step.odd;

            const resVal = document.getElementById('res-val');
            if (step.complete || idx > 0) {
                resVal.innerHTML = `<span style="color:var(--accent-blue)">Even: ${step.even}</span> <span style="color:var(--accent-purple)">Odd: ${step.odd}</span>`;
            } else {
                resVal.innerHTML = '—';
            }
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
