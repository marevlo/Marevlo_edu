<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find All Duplicates - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 300px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .array-row { display: flex; align-items: center; gap: 12px; min-height: 50px; justify-content: center; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-start; max-width: 800px; min-height: 50px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 16px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main); padding: 0 6px;
        }
        .tile-index { font-size: 10px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.target { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.marked { background: #09152b; border: 2px solid var(--text-dim); color: var(--text-main); }
        .tile.defeated { background: #2a0d0d; border: 2px solid var(--accent-red); color: var(--accent-red); transform: scale(1.08); box-shadow: 0 0 8px var(--accent-red); z-index: 3; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.12); box-shadow: 0 0 8px var(--accent-green); z-index: 3;}
        .tile.past { opacity: 0.4; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 650px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.4;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 100px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 18px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 22px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="arr-input" placeholder="4, 3, 2, 7, 8, 2, 3, 1">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([4, 3, 2, 7, 8, 2, 3, 1])">Ex 1</button>
        <button onclick="loadExample([1, 1, 2])">Ex 2</button>
        <button onclick="loadExample([1])">Ex 3</button>
    </div>

    <div class="visual-container">
        <div class="array-row">
            <div class="ui-label" style="width: 80px; text-align: right;">nums:</div>
            <div class="tiles-wrapper" id="arr-tiles"></div>
        </div>
        <div class="array-row">
            <div class="ui-label" style="width: 80px; text-align: right;">duplicates:</div>
            <div class="tiles-wrapper" id="res-tiles"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Index (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">v = |nums[i]|</span>
            <span class="info-value" id="val-val" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Target (v - 1)</span>
            <span class="info-value" id="val-idx" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">nums[Target]</span>
            <span class="info-value" id="val-target" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">all duplicates =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Current Element</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Target Index Check</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red)"></span> Already Negative (Duplicate!)</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim)"></span> Negated (Marked Visited)</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [4, 3, 2, 7, 8, 2, 3, 1];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([4, 3, 2, 7, 8, 2, 3, 1]); }

        function loadExample(newArr) {
            arr = [...newArr];
            document.getElementById('arr-input').value = arr.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('arr-input').value;
            const parsedArr = valStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (parsedArr.length > 0) {
                loadExample(parsedArr.slice(0, 15)); // Limit length for visualization
            }
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;
            let currentArr = [...arr];
            let res = [];

            // STEP 0: INIT
            steps.push({
                type: 'init', i: '—', val: '—', idx: '—', targetVal: '—',
                arrStates: currentArr.map(() => 'idle'),
                currentArr: [...currentArr],
                resVals: [...res],
                panel: 'Initialize result array = []. Since elements are 1 to n, we can use array values as indices to mark visited elements.',
                statusText: `array=[${currentArr.join(', ')}], n=${n}. Click Play to begin.`,
                log: `n=${n}. Starting In-Place Marking O(n) time, O(1) space.`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 0; i < n; i++) {
                let rawVal = currentArr[i];
                let val = Math.abs(rawVal);
                let idx = val - 1;

                if (idx < 0 || idx >= n) {
                    steps.push({
                        type: 'error', i: i, val: val, idx: idx, targetVal: '—',
                        arrStates: currentArr.map((v, k) => k === i ? 'defeated' : 'idle'),
                        currentArr: [...currentArr],
                        resVals: [...res],
                        panel: `<span style="color:var(--accent-red)">Value ${val} is out of bounds (1 to n). Cannot use in-place marking properly!</span>`,
                        statusText: `Error: Array values must be in [1, n].`,
                        log: `Value ${val} out of bounds. Skipping...`,
                        logColor: 'var(--accent-red)'
                    });
                    continue;
                }

                // STEP A: Select element
                steps.push({
                    type: 'eval', i: i, val: val, idx: idx, targetVal: currentArr[idx],
                    arrStates: currentArr.map((v, k) => k === i ? 'candidate' : (currentArr[k] < 0 ? 'marked' : 'idle')),
                    currentArr: [...currentArr],
                    resVals: [...res],
                    panel: `Current value is ${rawVal}.<br>Take absolute value <b>v = ${val}</b>.<br>Target index to check: <b>v - 1 = ${idx}</b>.`,
                    statusText: `Checking visitation state at target index ${idx}...`,
                    log: `i=${i}: v=|${rawVal}|=${val}. Check nums[${idx}].`,
                    logColor: 'var(--text-main)'
                });

                let targetVal = currentArr[idx];
                let isDuplicate = targetVal < 0;

                // STEP B: Look at target
                steps.push({
                    type: 'check', i: i, val: val, idx: idx, targetVal: targetVal,
                    arrStates: currentArr.map((v, k) => {
                        if (k === idx && isDuplicate) return 'defeated';
                        if (k === idx && !isDuplicate) return 'target';
                        if (k === i) return 'candidate';
                        return currentArr[k] < 0 ? 'marked' : 'idle';
                    }),
                    currentArr: [...currentArr],
                    resVals: [...res],
                    panel: `Value at <code>nums[${idx}]</code> is <b>${targetVal}</b>.<br>${isDuplicate ? '<span style="color:var(--accent-red)">It is negative! Value '+val+' has been seen before.</span>' : '<span style="color:var(--accent-blue)">It is positive. Value '+val+' is seen for the first time.</span>'}`,
                    statusText: isDuplicate ? `Duplicate detected!` : `First time seeing ${val}.`,
                    log: `  nums[${idx}] is ${targetVal} -> ${isDuplicate ? 'Duplicate' : 'New'}`,
                    logColor: isDuplicate ? 'var(--accent-red)' : 'var(--accent-blue)'
                });

                if (isDuplicate) {
                    res.push(val);
                    // STEP C: Add Duplicate
                    steps.push({
                        type: 'duplicate', i: i, val: val, idx: idx, targetVal: targetVal,
                        arrStates: currentArr.map((v, k) => {
                            if (k === i) return 'winning';
                            if (k === idx) return 'defeated';
                            return currentArr[k] < 0 ? 'marked' : 'idle';
                        }),
                        currentArr: [...currentArr],
                        resVals: [...res],
                        panel: `<span style="color:var(--accent-green)">Added <b>${val}</b> to result array.</span>`,
                        statusText: `Appended ${val} to results.`,
                        log: `  Added ${val} to result.`,
                        logColor: 'var(--accent-green)'
                    });
                } else {
                    currentArr[idx] = -currentArr[idx];
                    // STEP D: Mark as Seen
                    steps.push({
                        type: 'mark', i: i, val: val, idx: idx, targetVal: currentArr[idx],
                        arrStates: currentArr.map((v, k) => {
                            if (k === i) return 'candidate';
                            if (k === idx) return 'marked';
                            return currentArr[k] < 0 ? 'marked' : 'idle';
                        }),
                        currentArr: [...currentArr],
                        resVals: [...res],
                        panel: `Mark value ${val} as seen by negating the element at index ${idx}.<br><code>nums[${idx}] = ${currentArr[idx]}</code>`,
                        statusText: `Marked index ${idx} as visited.`,
                        log: `  Negated nums[${idx}] to ${currentArr[idx]}.`,
                        logColor: 'var(--text-dim)'
                    });
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final', i: '—', val: '—', idx: '—', targetVal: '—',
                arrStates: currentArr.map((v) => v < 0 ? 'marked' : 'idle'),
                currentArr: [...currentArr],
                resVals: [...res],
                panel: 'Array fully processed using O(1) space. All duplicates collected.',
                complete: true,
                finalStr: `[${res.join(', ')}]`,
                statusText: `Done. Found ${res.length} duplicate(s).`,
                log: `Final Result: [${res.join(', ')}]`,
                logColor: 'var(--accent-purple)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render nums Array
            const arrContainer = document.getElementById('arr-tiles');
            arrContainer.innerHTML = '';
            step.currentArr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.arrStates[i]}`;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                arrContainer.appendChild(wrapper);
            });

            // Render Result Array
            const resContainer = document.getElementById('res-tiles');
            resContainer.innerHTML = '';
            if (step.resVals.length === 0) {
                const empty = document.createElement('div');
                empty.style.color = 'var(--text-dim)';
                empty.style.fontSize = '14px';
                empty.style.fontFamily = 'monospace';
                empty.style.padding = '10px 0';
                empty.innerText = '[]';
                resContainer.appendChild(empty);
            } else {
                step.resVals.forEach((val, i) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'tile-unit';
                    const tile = document.createElement('div');
                    tile.className = `tile winning`;
                    tile.innerText = val;
                    const idxLabel = document.createElement('div');
                    idxLabel.className = 'tile-index';
                    idxLabel.innerText = `[${i}]`;
                    wrapper.append(tile, idxLabel);
                    resContainer.appendChild(wrapper);
                });
            }

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-i').innerText = step.i;
            document.getElementById('val-val').innerText = step.val;
            document.getElementById('val-idx').innerText = step.idx;
            document.getElementById('val-target').innerText = step.targetVal;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.finalStr : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerHTML = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
