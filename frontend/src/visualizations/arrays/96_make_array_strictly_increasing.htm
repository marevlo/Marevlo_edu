<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Array Strictly Increasing - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        button {
            height: 32px; border-radius: 6px; padding: 0 16px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px;
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1250px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .arr1-area, .arr2-area, .sequence-area {
            background: var(--bg-surface);
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 15px;
            width: 320px;
        }

        .arr1-area { border-color: var(--accent-blue); }
        .arr2-area { border-color: var(--accent-purple); }
        .sequence-area { border-color: var(--accent-green); }

        .tiles {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 15px 0;
        }

        .tile {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            background: #21262d;
            border: 2px solid var(--border-main);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tile.current {
            border-color: var(--accent-orange);
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--accent-orange);
        }

        .tile.replaced {
            border-color: var(--accent-red);
        }

        .tile.kept {
            border-color: var(--accent-green);
        }

        .action-panel {
            margin-top: 25px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 16px 22px;
            width: 860px;
            text-align: center;
            font-family: monospace;
            min-height: 90px;
            font-size: 15px;
            line-height: 1.5;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .log-panel {
            margin-top: 15px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 860px;
            height: 160px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13.5px;
        }

        .min-ops {
            font-size: 28px;
            font-weight: bold;
            color: var(--accent-green);
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <button onclick="loadExample(0)">Example 1</button>
        <button onclick="loadExample(1)">Example 2</button>
        <button onclick="resetAll()">Reset</button>
    </div>

    <div class="visual-container">
        <!-- arr1 -->
        <div class="arr1-area">
            <div style="color:var(--accent-blue); font-weight:bold;">arr1</div>
            <div id="arr1-tiles" class="tiles"></div>
        </div>

        <!-- arr2 -->
        <div class="arr2-area">
            <div style="color:var(--accent-purple); font-weight:bold;">arr2 (sorted)</div>
            <div id="arr2-tiles" class="tiles"></div>
        </div>

        <!-- Current Sequence -->
        <div class="sequence-area">
            <div style="color:var(--accent-green); font-weight:bold;">Current Sequence</div>
            <div id="current-seq" class="tiles" style="min-height:80px;"></div>
            <div class="min-ops" id="min-ops-display">Min Ops: —</div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Click Play to start demonstration</div>

    <div class="controls">
        <button onclick="resetAll()">↺ Reset</button>
        <button onclick="backStep()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="nextStep()">Next →</button>
        <span style="margin-left:20px; font-size:13px;">Speed:</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log-container"></div>

    <script>
        let arr1 = [];
        let arr2 = [];
        let currentSeq = [];
        let minOps = Infinity;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1650, 950, 480];

        function init() {
            const _p = new URLSearchParams(window.location.search); loadExample(parseInt(_p.get('example') || '0'));
        }

        function loadExample(ex) {
            if (ex === 0) {
                arr1 = [1,5,3,6,7];
                arr2 = [1,3,2,4];
            } else {
                arr1 = [5,4,3,2,1];
                arr2 = [1,2,3,4,5];
            }
            arr2 = [...new Set(arr2)].sort((a,b)=>a-b); // sorted unique
            steps = [];
            document.getElementById('log-container').innerHTML = '';
            minOps = Infinity;
            currentSeq = [];

            addStep(`arr1 = <b>[${arr1.join(', ')}]</b>, arr2 = <b>[${arr2.join(', ')}]</b> (sorted)`, true);
            addStep("Starting backtracking to find minimum replacements...");

            // Simulate one optimal path for visualization
            if (ex === 0) {
                addStep("Keep 1 (position 0)");
                currentSeq = [1];
                addStep("Replace 5 with 2 (position 1) → count=1");
                currentSeq = [1,2];
                addStep("Keep 3 (position 2, 3>2)");
                currentSeq = [1,2,3];
                addStep("Keep 6 (position 3, 6>3)");
                currentSeq = [1,2,3,6];
                addStep("Keep 7 (position 4, 7>6)");
                currentSeq = [1,2,3,6,7];
                addStep(`Valid sequence found with <b>1</b> replacement!`, true);
                minOps = 1;
            } else {
                addStep("Replace 5 with 1 (position 0) → count=1");
                currentSeq = [1];
                addStep("Replace 4 with 2 (position 1) → count=2");
                currentSeq = [1,2];
                addStep("Replace 3 with 3 (position 2) → count=3");
                currentSeq = [1,2,3];
                addStep("Replace 2 with 4 (position 3) → count=4");
                currentSeq = [1,2,3,4];
                addStep("Replace 1 with 5 (position 4) → count=5");
                currentSeq = [1,2,3,4,5];
                addStep(`Valid sequence found with <b>4</b> replacements (optimal path)`, true);
                minOps = 4;
            }

            stepIndex = 0;
            renderStep(0);
        }

        function addStep(text) {
            steps.push({
                panel: text,
                log: text,
                seq: [...currentSeq],
                minOps: minOps
            });
        }

        function renderTiles(containerId, values, highlightIndices = []) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            values.forEach((val, idx) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.textContent = val;
                if (highlightIndices.includes(idx)) {
                    tile.classList.add('current');
                }
                container.appendChild(tile);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            renderTiles('arr1-tiles', arr1, []);
            renderTiles('arr2-tiles', arr2, []);
            renderTiles('current-seq', step.seq || [], []);

            document.getElementById('min-ops-display').innerHTML = `Min Ops: <span style="color:var(--accent-green)">${step.minOps === Infinity ? '—' : step.minOps}</span>`;
            document.getElementById('main-panel').innerHTML = step.panel;

            const logDiv = document.getElementById('log-container');
            logDiv.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.margin = '4px 0';
                line.innerHTML = steps[i].log;
                logDiv.appendChild(line);
            }
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function nextStep() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function backStep() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function resetAll() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(nextStep, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
