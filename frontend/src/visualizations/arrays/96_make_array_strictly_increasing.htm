<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Array Strictly Increasing - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* current index / running prev value */
            --accent-blue:   #06b6d4;   /* arr1 / kept tile / chrome           */
            --accent-green:  #22c55e;   /* final answer / strictly increasing  */
            --accent-red:    #f43f5e;   /* replace op                          */
            --accent-purple: #a855f7;   /* arr2 replacement candidate          */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 150px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.replace { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.replace::before { content: '\21BA'; color: var(--accent-red); }
        .narration.fail { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.fail::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .array-stage { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; padding: 26px 22px 22px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .array-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .array-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        .scan-board { position: relative; display: inline-flex; flex-direction: column; gap: 6px; align-items: center; }
        .row-label { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; align-self: flex-start; }
        .row-label .tag { color: var(--accent-blue); }
        .row-label.r2 .tag { color: var(--accent-purple); }
        .cell-row { display: flex; gap: 10px; }
        .col { display: flex; flex-direction: column; align-items: center; }

        .cell {
            position: relative;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-family: var(--mono); font-weight: 800; font-size: 18px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            width: 50px; height: 50px; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .idx-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 6px; transition: color 0.3s; }
        .idx-label.lit { color: var(--accent-orange); }

        /* arr1 tiles already locked in (strictly increasing so far) */
        .num-cell.locked  { border-color: var(--accent-blue); background: rgba(6,182,212,0.10); color: #a5f3fc; }
        /* the kept original value at the current index */
        .num-cell.kept    { border-color: var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0; box-shadow: 0 0 16px rgba(34,197,94,0.40); transform: scale(1.08); z-index: 2; }
        /* the replaced value at the current index */
        .num-cell.replaced{ border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 18px rgba(244,63,94,0.50); transform: scale(1.08); z-index: 2; }
        /* the current index, decision pending */
        .num-cell.current { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 20px rgba(245,165,36,0.50); transform: scale(1.08); z-index: 2; }
        .num-cell.dim     { opacity: 0.4; color: var(--text-dim); }
        .num-cell.fail    { border-color: var(--accent-red); background: rgba(244,63,94,0.20); color: #fecdd3; box-shadow: 0 0 20px rgba(244,63,94,0.55); }

        /* arr2 candidate currently chosen for a replace */
        .a2-cell.cand     { border-color: var(--accent-purple); background: rgba(168,85,247,0.18); color: #e9d5ff; box-shadow: 0 0 20px rgba(168,85,247,0.55); transform: scale(1.08); z-index: 2; }
        /* arr2 elements <= prev (cannot be used) */
        .a2-cell.invalid  { opacity: 0.3; }

        .scan-arrow { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); color: var(--accent-orange); font-size: 14px; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
        .num-cell.current  .scan-arrow { opacity: 1; }
        .num-cell.kept     .scan-arrow { opacity: 1; color: var(--accent-green); }
        .num-cell.replaced .scan-arrow { opacity: 1; color: var(--accent-red); }
        .num-cell.fail     .scan-arrow { opacity: 1; color: var(--accent-red); }

        .action-stage { position: relative; min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 6px; align-items: center; min-height: 40px; flex-wrap: wrap; justify-content: center; }
        .ans-tile { min-width: 40px; height: 44px; padding: 0 8px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 19px; font-weight: 800; border: 2px solid var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0; box-shadow: 0 0 12px rgba(34,197,94,0.35); }
        .ans-tile.repl { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 12px rgba(244,63,94,0.35); }
        .ans-eq { font-family: var(--mono); font-size: 18px; font-weight: 800; color: var(--text-dim); }
        .ans-sum { min-width: 48px; height: 44px; padding: 0 12px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 22px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.18); color: #ffd591; box-shadow: 0 0 14px rgba(245,165,36,0.4); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-orange); } .pill.v b { color: var(--accent-blue); } .pill.s b { color: var(--accent-purple); } .pill.d b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">arr1 =</label>
        <input type="text" id="arr1-input" value="[1,5,3,6,7]" maxlength="44">
        <label class="ui-label">arr2 =</label>
        <input type="text" id="arr2-input" value="[1,3,2,4]" maxlength="44">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">[1,5,3,6,7] / [1,3,2,4] &rarr; 1</button>
        <button onclick="loadExample(1)">[5,4,3,2,1] / [1,2,3,4,5] &rarr; 4</button>
        <button onclick="loadExample(2)">[1,5,3,6,7] / [1,6,3,3] &rarr; &minus;1</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Make Array Strictly Increasing <span class="sub">&middot; LC&nbsp;1187 &middot; DP over (index, prev) &middot; keep or replace via binary search</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="array-stage" id="array-stage">
                    <div class="scan-board">
                        <div class="row-label"><span class="tag">arr1</span> &middot; scan left &rarr; right, keep or replace</div>
                        <div class="cell-row" id="num-row"></div>
                    </div>
                    <div class="scan-board">
                        <div class="row-label r2"><span class="tag">arr2</span> &middot; sorted replacements &middot; pick smallest &gt; prev</div>
                        <div class="cell-row" id="a2-row"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill c">index i <b id="st-i">&mdash;</b></span>
                            <span class="pill v">arr1[i] <b id="st-v">&mdash;</b></span>
                            <span class="pill s">prev <b id="st-prev">&mdash;</b></span>
                            <span class="pill d">ops <b id="st-ops">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring pop, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.55 + 0.55 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // ───────── State ─────────
        let arr1 = [1, 5, 3, 6, 7];
        let arr2 = [1, 3, 2, 4];      // raw; gets sorted+uniqued on load
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 720, 330];
        const numEls = [];   // arr1 index -> tile element
        const idxEls = [];   // arr1 index -> index-label element
        const a2Els = [];    // arr2 index -> tile element

        // The real algorithm shown in the code panel: DP over previous value.
        const CODE = [
            [['kw','def '],['fn','makeArrayIncreasing'],['src','(arr1, arr2):']],
            [['src','  arr2 = sorted(set(arr2))']],
            [['src','  dp = { -inf: 0 }          # prev_value -> min_ops']],
            [['kw','  for '],['src','x in arr1:']],
            [['src','    ndp = {}']],
            [['kw','    for '],['src','prev, ops in dp.items():']],
            [['kw','      if '],['src','x > prev: ndp[x] = min(ndp[x], ops)      # keep']],
            [['src','      j = bisect_right(arr2, prev)         # replace']],
            [['kw','      if '],['src','j < len(arr2): ndp[arr2[j]] = min(., ops+1)']],
            [['src','    dp = ndp']],
            [['kw','  return '],['src','min(dp.values()) if dp else -1']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // bisect_right: first index in arr2 whose value > prev
        function firstGreater(a, prev) {
            let lo = 0, hi = a.length;
            while (lo < hi) { const m = (lo + hi) >> 1; if (a[m] > prev) hi = m; else lo = m + 1; }
            return lo;
        }
        const fmtPrev = (p) => (p === -Infinity ? '&minus;&#8734;' : p);

        // ───────── step generation (immutable snapshots) ─────────
        // We run the REAL DP to get the correct min-ops answer, AND reconstruct one
        // optimal keep/replace path to animate the hero row tile-by-tile.
        function generateSteps() {
            steps = [];
            const n = arr1.length;

            // snapshot shape: full immutable view of what renderStep needs
            const snap = (extra) => Object.assign({
                i: null, prevVal: null, ops: null,
                tileState: null,        // 'current' | 'kept' | 'replaced' | 'fail'
                lockedUpTo: -1,         // arr1[0..lockedUpTo] already decided (locked)
                a2Cand: null,          // arr2 index chosen for a replace this step
                a2Invalid: -1,         // arr2[0..a2Invalid] are <= prev (greyed)
                seq: null,             // reconstructed values up to current decision
                seqKinds: null,        // 'keep' | 'repl' per seq slot
                complete: false, failed: false, answer: null
            }, extra);

            // ----- header step -----
            steps.push(snap({
                code: [0, 1], action: 'DP (index, prev)', actionColor: 'var(--accent-blue)',
                panel: `Make <code>arr1</code> strictly increasing using the fewest replacements; each replacement swaps an <code>arr1</code> element for any value from <code>arr2</code>. <code>arr1 = [${arr1.join(', ')}]</code>, sorted <code>arr2 = [${arr2.join(', ')}]</code>. DP keeps the min ops for each possible <b>prev</b> value &#8594; greedily pick the smallest valid replacement.`,
                log: `init  arr1=[${arr1.join(',')}]  arr2=[${arr2.join(',')}]  (sorted unique)`
            }));

            // ----- run the exact DP to compute the answer -----
            // dp: Map prevValue -> { ops, parentPrev, choice('keep'|'repl'), valUsed }
            let dp = new Map([[-Infinity, { ops: 0, parent: null, choice: null, val: null }]]);
            for (let i = 0; i < n; i++) {
                const x = arr1[i];
                const ndp = new Map();
                const relax = (key, ops, parent, choice, val) => {
                    const cur = ndp.get(key);
                    if (cur === undefined || ops < cur.ops) ndp.set(key, { ops, parent, choice, val });
                };
                for (const [prev, info] of dp) {
                    if (x > prev) relax(x, info.ops, prev, 'keep', x);          // keep arr1[i]
                    const j = firstGreater(arr2, prev);
                    if (j < arr2.length) relax(arr2[j], info.ops + 1, prev, 'repl', arr2[j]);  // replace
                }
                dp = ndp;
                if (dp.size === 0) break;   // dead end (no strictly-increasing extension)
            }

            // best final prev value (min ops) and reconstruct its path
            let answer = -1, bestKey = null;
            for (const [k, info] of dp) { if (answer === -1 || info.ops < answer) { answer = info.ops; bestKey = k; } }

            // reconstruct one optimal path (values + keep/repl kind, left->right)
            let path = null;
            if (answer !== -1) {
                // walk forward again recording the chosen-key chain via stored parents.
                // Rebuild dp layer-by-layer keeping back-pointers, then trace from bestKey.
                const layers = [];
                let d = new Map([[-Infinity, { ops: 0, parent: null, choice: null, val: null }]]);
                layers.push(d);
                for (let i = 0; i < n; i++) {
                    const x = arr1[i]; const nd = new Map();
                    const relax = (key, ops, parent, choice, val) => {
                        const cur = nd.get(key); if (cur === undefined || ops < cur.ops) nd.set(key, { ops, parent, choice, val });
                    };
                    for (const [prev, info] of d) {
                        if (x > prev) relax(x, info.ops, prev, 'keep', x);
                        const j = firstGreater(arr2, prev);
                        if (j < arr2.length) relax(arr2[j], info.ops + 1, prev, 'repl', arr2[j]);
                    }
                    d = nd; layers.push(d);
                }
                // trace back from bestKey through layers[n] .. layers[1]
                const vals = new Array(n), kinds = new Array(n);
                let key = bestKey;
                for (let i = n; i >= 1; i--) {
                    const info = layers[i].get(key);
                    vals[i - 1] = info.val; kinds[i - 1] = info.choice;
                    key = info.parent;
                }
                path = { vals, kinds };
            }

            if (answer === -1) {
                // Animate forward until the first index where no choice exists, then fail.
                let prev = -Infinity, ops = 0, lockedUpTo = -1;
                const seq = [], seqKinds = [];
                for (let i = 0; i < n; i++) {
                    const x = arr1[i];
                    const canKeep = x > prev;
                    const j = firstGreater(arr2, prev);
                    const canRepl = j < arr2.length;
                    if (!canKeep && !canRepl) {
                        steps.push(snap({
                            i, prevVal: prev, ops, tileState: 'fail', lockedUpTo, a2Invalid: arr2.length - 1,
                            seq: seq.slice(), seqKinds: seqKinds.slice(),
                            failed: true, complete: true, answer: -1,
                            code: [6, 7, 8], action: 'NO MOVE', actionColor: 'var(--accent-red)',
                            panel: `At <b>i=${i}</b>: keeping needs <code>arr1[${i}]=${x} &gt; prev=${fmtPrev(prev)}</code> &mdash; fails. Replacing needs some <code>arr2[j] &gt; ${fmtPrev(prev)}</code> &mdash; none left. No valid move, so the array <b>cannot</b> be made strictly increasing.`,
                            log: `i=${i}  x=${x}  prev=${prev === -Infinity ? '-inf' : prev}  NO valid move -> -1`
                        }));
                        break;
                    }
                    // prefer keep if possible, else smallest replacement (greedy demo of the dead path)
                    if (canKeep) { seq.push(x); seqKinds.push('keep'); prev = x; }
                    else { const v = arr2[j]; seq.push(v); seqKinds.push('repl'); prev = v; ops++; }
                    lockedUpTo = i;
                    steps.push(snap({
                        i, prevVal: i === 0 ? -Infinity : seq[i - 1], ops,
                        tileState: canKeep ? 'kept' : 'replaced', lockedUpTo,
                        a2Cand: canKeep ? null : j, a2Invalid: canKeep ? -1 : j - 1,
                        seq: seq.slice(), seqKinds: seqKinds.slice(),
                        code: canKeep ? [6] : [7, 8], action: canKeep ? 'KEEP ' + x : 'REPLACE -> ' + arr2[j],
                        actionColor: canKeep ? 'var(--accent-green)' : 'var(--accent-red)',
                        panel: `At <b>i=${i}</b>, prev = <code>${fmtPrev(i === 0 ? -Infinity : seq[i - 1])}</code>. (following one path before hitting the dead end&hellip;)`,
                        log: `i=${i}  ${canKeep ? 'keep ' + x : 'repl ' + arr2[j]}  prev->${prev}  ops=${ops}`
                    }));
                }
                return;
            }

            // ----- answer found: animate the reconstructed optimal path -----
            let prev = -Infinity, ops = 0;
            const seq = [], seqKinds = [];
            for (let i = 0; i < n; i++) {
                const x = arr1[i];
                const kind = path.kinds[i];
                const chosen = path.vals[i];
                if (kind === 'keep') {
                    seq.push(chosen); seqKinds.push('keep');
                    steps.push(snap({
                        i, prevVal: prev, ops, tileState: 'kept', lockedUpTo: i,
                        a2Invalid: firstGreater(arr2, prev) - 1,
                        seq: seq.slice(), seqKinds: seqKinds.slice(),
                        code: [5, 6], action: 'KEEP ' + x, actionColor: 'var(--accent-green)',
                        panel: `At <b>i=${i}</b>, prev = <code>${fmtPrev(prev)}</code>: original <code>arr1[${i}] = ${x}</code> is already <code>&gt; ${fmtPrev(prev)}</code>, so <b>keep</b> it. No operation spent. prev &#8594; <code>${x}</code>.`,
                        log: `i=${i}  keep ${x}   prev=${prev === -Infinity ? '-inf' : prev}->${x}  ops=${ops}`
                    }));
                    prev = chosen;
                } else {
                    const j = firstGreater(arr2, prev);
                    ops++;
                    seq.push(chosen); seqKinds.push('repl');
                    const reason = (x > prev)
                        ? `keeping <code>${x}</code> is legal but the DP path replaces here to keep <b>prev</b> small`
                        : `<code>arr1[${i}] = ${x}</code> is not <code>&gt; ${fmtPrev(prev)}</code>, so it must be replaced`;
                    steps.push(snap({
                        i, prevVal: prev, ops, tileState: 'replaced', lockedUpTo: i,
                        a2Cand: j, a2Invalid: j - 1,
                        seq: seq.slice(), seqKinds: seqKinds.slice(),
                        code: [5, 7, 8], action: 'REPLACE -> ' + chosen, actionColor: 'var(--accent-red)',
                        panel: `At <b>i=${i}</b>, prev = <code>${fmtPrev(prev)}</code>: ${reason}. Smallest <code>arr2</code> value <code>&gt; ${fmtPrev(prev)}</code> is <code>${chosen}</code> (index <code>${j}</code>). <b>Replace</b> &#8594; <code>ops = ${ops}</code>, prev &#8594; <code>${chosen}</code>.`,
                        log: `i=${i}  repl ${x}->${chosen}  prev=${prev === -Infinity ? '-inf' : prev}->${chosen}  ops=${ops}`
                    }));
                    prev = chosen;
                }
            }

            // ----- final / done step -----
            steps.push(snap({
                complete: true, answer, lockedUpTo: n - 1,
                seq: path.vals.slice(), seqKinds: path.kinds.slice(),
                code: [10], action: '✓ ' + answer + (answer === 1 ? ' op' : ' ops'),
                actionColor: 'var(--accent-green)',
                panel: `Done. The array is now strictly increasing: <code>[${path.vals.join(', ')}]</code>. Minimum operations = <code><b>${answer}</b></code>.`,
                log: `done  result = ${answer}  final=[${path.vals.join(',')}]`,
                confetti: true
            }));
        }

        // ───────── build persistent DOM skeleton (once per input load) ─────────
        function buildBoard() {
            const numRow = document.getElementById('num-row');
            numRow.innerHTML = ''; numEls.length = 0; idxEls.length = 0;
            arr1.forEach((v, i) => {
                const col = document.createElement('div'); col.className = 'col';
                const cell = document.createElement('div'); cell.className = 'cell num-cell';
                const arrow = document.createElement('span'); arrow.className = 'scan-arrow'; arrow.textContent = '▼';
                const valSpan = document.createElement('span'); valSpan.textContent = String(v);
                cell.appendChild(arrow); cell.appendChild(valSpan);
                const lab = document.createElement('div'); lab.className = 'idx-label'; lab.textContent = i;
                col.appendChild(cell); col.appendChild(lab); numRow.appendChild(col);
                numEls.push(cell); idxEls.push(lab);
            });

            const a2Row = document.getElementById('a2-row');
            a2Row.innerHTML = ''; a2Els.length = 0;
            arr2.forEach((v, i) => {
                const col = document.createElement('div'); col.className = 'col';
                const cell = document.createElement('div'); cell.className = 'cell a2-cell';
                cell.textContent = String(v);
                const lab = document.createElement('div'); lab.className = 'idx-label'; lab.textContent = i;
                col.appendChild(cell); col.appendChild(lab); a2Row.appendChild(col);
                a2Els.push(cell);
            });
        }

        // ───────── render (pure function of steps[idx], persistent DOM) ─────────
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // arr1 row
            for (let i = 0; i < arr1.length; i++) {
                let cls = 'cell num-cell';
                const prevHad = numEls[i].classList.contains('current') || numEls[i].classList.contains('kept') || numEls[i].classList.contains('replaced') || numEls[i].classList.contains('fail');
                const valSpan = numEls[i].querySelector('span:last-child');

                if (step.i === i && step.tileState) {
                    cls += ' ' + step.tileState;
                    // show replaced value on the tile when replacing
                    if (step.tileState === 'replaced' && step.seq && step.seq[i] != null) valSpan.textContent = String(step.seq[i]);
                    else valSpan.textContent = String(arr1[i]);
                } else if (i <= step.lockedUpTo) {
                    cls += ' locked';
                    if (step.seqKinds && step.seqKinds[i] === 'repl' && step.seq && step.seq[i] != null) valSpan.textContent = String(step.seq[i]);
                    else valSpan.textContent = String(arr1[i]);
                } else {
                    if (step.i != null && i > step.i) cls += ' dim';
                    valSpan.textContent = String(arr1[i]);
                }

                numEls[i].className = cls;
                idxEls[i].className = 'idx-label' + (step.i === i ? ' lit' : '');

                const nowHot = numEls[i].classList.contains('current') || numEls[i].classList.contains('kept') || numEls[i].classList.contains('replaced') || numEls[i].classList.contains('fail');
                if (nowHot && !prevHad) Motion.pop(numEls[i]);
            }

            // arr2 row
            for (let j = 0; j < arr2.length; j++) {
                let cls = 'cell a2-cell';
                const prevCand = a2Els[j].classList.contains('cand');
                if (step.a2Cand === j) cls += ' cand';
                else if (step.a2Invalid != null && j <= step.a2Invalid) cls += ' invalid';
                a2Els[j].className = cls;
                if (a2Els[j].classList.contains('cand') && !prevCand) Motion.pop(a2Els[j]);
            }

            // answer track: the reconstructed sequence so far (color-coded keep/repl)
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.seq && step.seq.length) {
                step.seq.forEach((val, k) => {
                    const t = document.createElement('div');
                    t.className = 'ans-tile' + (step.seqKinds && step.seqKinds[k] === 'repl' ? ' repl' : '');
                    t.textContent = val; at.appendChild(t);
                });
                if (step.complete && !step.failed) {
                    const eq = document.createElement('div'); eq.className = 'ans-eq'; eq.textContent = 'ops ='; at.appendChild(eq);
                    const s = document.createElement('div'); s.className = 'ans-sum'; s.textContent = step.answer; at.appendChild(s);
                }
            }
            if (step.failed) {
                const s = document.createElement('div'); s.className = 'ans-sum'; s.style.borderColor = 'var(--accent-red)'; s.style.background = 'rgba(244,63,94,0.18)'; s.style.color = '#fecdd3'; s.textContent = '-1'; at.appendChild(s);
            }

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete && !step.failed);
            mp.classList.toggle('fail', !!step.failed);
            mp.classList.toggle('replace', !step.complete && step.tileState === 'replaced');
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            document.getElementById('st-i').textContent = step.i != null ? step.i : '—';
            document.getElementById('st-v').textContent = step.i != null ? arr1[step.i] : '—';
            document.getElementById('st-prev').innerHTML = step.prevVal != null ? (step.prevVal === -Infinity ? '&minus;&#8734;' : step.prevVal) : '—';
            document.getElementById('st-ops').textContent = step.ops != null ? step.ops : (step.answer != null && step.answer >= 0 ? step.answer : '—');

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function loadArrs(a1, a2raw) {
            pause();
            arr1 = a1.slice();
            arr2 = [...new Set(a2raw)].sort((a, b) => a - b);   // sorted unique
            confettiArmed = true;
            buildBoard(); generateSteps(); renderStep(0);
        }
        function parseList(raw) {
            let parsed;
            try { parsed = JSON.parse(raw); }
            catch (e) { parsed = raw.replace(/[\[\]]/g, '').split(',').map(x => parseInt(x.trim(), 10)).filter(x => !isNaN(x)); }
            if (Array.isArray(parsed) && parsed.every(x => typeof x === 'number' && isFinite(x))) return parsed;
            return null;
        }
        function loadCustom() {
            const a1 = parseList(document.getElementById('arr1-input').value);
            const a2 = parseList(document.getElementById('arr2-input').value);
            if (a1 && a1.length > 0 && a1.length <= 12 && a2 && a2.length > 0 && a2.length <= 12) loadArrs(a1, a2);
        }
        const EXAMPLES = [
            { a1: [1, 5, 3, 6, 7], a2: [1, 3, 2, 4] },
            { a1: [5, 4, 3, 2, 1], a2: [1, 2, 3, 4, 5] },
            { a1: [1, 5, 3, 6, 7], a2: [1, 6, 3, 3] },
        ];
        function loadExample(n) {
            const ex = EXAMPLES[n];
            document.getElementById('arr1-input').value = JSON.stringify(ex.a1);
            document.getElementById('arr2-input').value = JSON.stringify(ex.a2);
            loadArrs(ex.a1, ex.a2);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('arr1-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        document.getElementById('arr2-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
