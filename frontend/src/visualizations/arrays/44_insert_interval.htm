<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insert Interval - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 260px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .array-row { display: flex; align-items: center; gap: 12px; min-height: 50px; justify-content: center; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-start; max-width: 800px; min-height: 50px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 64px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 14px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main); padding: 0 8px;
        }
        .tile-index { font-size: 10px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.08); z-index: 2; }
        .tile.new-interval { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.05); box-shadow: 0 0 8px var(--accent-green); z-index: 3;}
        .tile.merged { background: #1e1030; border: 2px solid var(--accent-purple); color: var(--accent-purple); transform: scale(1.1); box-shadow: 0 0 8px var(--accent-purple); z-index: 4; }
        .tile.absorbed { background: #2a0d0d; border: 2px solid var(--accent-red); color: var(--accent-red); opacity: 0.6; transform: scale(0.95); }
        .tile.past { opacity: 0.4; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 650px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.4;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 18px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; max-width: 800px; text-align: center; word-wrap: break-word; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 24px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">intervals =</label>
        <input type="text" id="arr-input" placeholder="[[1,3],[6,9]]">
        <label class="ui-label">newInterval =</label>
        <input type="text" id="new-input" placeholder="[2,5]" style="width: 100px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([[1,3],[6,9]], [2,5])">Ex 1</button>
        <button onclick="loadExample([[1,2],[3,5],[6,7],[8,10],[12,16]], [4,8])">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="array-row">
            <div class="ui-label" style="width: 90px; text-align: right;">Original:</div>
            <div class="tiles-wrapper" id="orig-tiles"></div>
        </div>
        <div class="array-row" style="margin-top: -10px; margin-bottom: -10px;">
            <div class="ui-label" style="width: 90px; text-align: right;">New Interval:</div>
            <div class="tiles-wrapper" id="new-tiles"></div>
        </div>
        <div class="array-row">
            <div class="ui-label" style="width: 90px; text-align: right;">Result:</div>
            <div class="tiles-wrapper" id="res-tiles"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Condition</span>
            <span class="info-value" id="val-cond" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Interval</span>
            <span class="info-value" id="val-curr" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Active NewInterval</span>
            <span class="info-value" id="val-newi" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Action</span>
            <span class="info-value" id="val-action" style="color: var(--accent-purple);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Final Intervals =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Current Interval</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Active NewInterval</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple); box-shadow: 0 0 4px var(--accent-purple)"></span> Merging (Overlap)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Appended to Result</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red)"></span> Absorbed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let intervals = [[1,3],[6,9]];
        let newInterval = [2,5];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([[1,3],[6,9]], [2,5]); }

        function formatIntervals(arr) {
            return `[${arr.map(i => `[${i[0]},${i[1]}]`).join(',')}]`;
        }

        function loadExample(newArr, newInt) {
            intervals = newArr.map(x => [...x]);
            newInterval = [...newInt];
            document.getElementById('arr-input').value = formatIntervals(intervals);
            document.getElementById('new-input').value = `[${newInterval[0]},${newInterval[1]}]`;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('arr-input').value;
            const newStr = document.getElementById('new-input').value;
            try {
                let matches = valStr.match(/\[\s*-?\d+\s*,\s*-?\d+\s*\]/g) || [];
                let parsedArr = matches.map(m => JSON.parse(m));
                
                let newMatch = newStr.match(/\[\s*-?\d+\s*,\s*-?\d+\s*\]/);
                let parsedNew = newMatch ? JSON.parse(newMatch[0]) : null;

                if (parsedNew) {
                    loadExample(parsedArr, parsedNew);
                } else {
                    alert("Invalid format for newInterval. Use [start, end]");
                }
            } catch(e) {
                alert("Invalid format. Use [[start, end], [start, end]]");
            }
        }

        function generateSteps() {
            steps = [];
            const n = intervals.length;
            let res = [];
            let inserted = false;
            let currNew = [...newInterval];

            // STEP 0: INIT
            steps.push({
                type: 'init', cond: '—', curr: '—', newi: `[${currNew[0]},${currNew[1]}]`, action: 'Initialize',
                origTiles: intervals.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'idle'})),
                newTile: {val: `[${currNew[0]},${currNew[1]}]`, state: 'new-interval'},
                resTiles: [],
                panel: 'Initialize result array and set Active NewInterval to the given newInterval.',
                statusText: `n=${n}. Click Play to begin sequential processing.`,
                log: `n=${n}. Starting Insert Interval. Active NewInterval: [${currNew[0]},${currNew[1]}]`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 0; i < n; i++) {
                let current = intervals[i];

                // STEP A: Select
                steps.push({
                    type: 'eval', cond: 'Evaluating', curr: `[${current[0]},${current[1]}]`, newi: `[${currNew[0]},${currNew[1]}]`, action: 'Compare',
                    origTiles: intervals.map((v, idx) => ({val: `[${v[0]},${v[1]}]`, state: idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')})),
                    newTile: {val: `[${currNew[0]},${currNew[1]}]`, state: inserted ? 'past' : 'new-interval'},
                    resTiles: res.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'winning'})),
                    panel: `Comparing Current Interval <b>[${current[0]},${current[1]}]</b> with Active NewInterval <b>[${currNew[0]},${currNew[1]}]</b>`,
                    statusText: `Checking overlap conditions...`,
                    log: `i=${i}: Checking [${current[0]},${current[1]}] against [${currNew[0]},${currNew[1]}]`,
                    logColor: 'var(--text-main)'
                });

                if (current[1] < currNew[0]) {
                    // Condition 1: Current is completely before NewInterval
                    res.push([...current]);
                    steps.push({
                        type: 'before', cond: 'Current END < New START', curr: `[${current[0]},${current[1]}]`, newi: `[${currNew[0]},${currNew[1]}]`, action: 'Append Current',
                        origTiles: intervals.map((v, idx) => ({val: `[${v[0]},${v[1]}]`, state: idx === i ? 'winning' : (idx <= i ? 'past' : 'idle')})),
                        newTile: {val: `[${currNew[0]},${currNew[1]}]`, state: inserted ? 'past' : 'new-interval'},
                        resTiles: res.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'winning'})),
                        panel: `<span style="color:var(--accent-green)">Current interval comes BEFORE new interval (${current[1]} < ${currNew[0]}). No overlap. Appending current to result.</span>`,
                        statusText: `Appended [${current[0]},${current[1]}] to result.`,
                        log: `  Condition 1: ${current[1]} < ${currNew[0]}. No overlap. Appending [${current[0]},${current[1]}].`,
                        logColor: 'var(--accent-green)'
                    });
                } 
                else if (current[0] > currNew[1]) {
                    // Condition 2: Current is completely after NewInterval
                    if (!inserted) {
                        res.push([...currNew]);
                        inserted = true;
                        
                        steps.push({
                            type: 'after_insert', cond: 'Current START > New END', curr: `[${current[0]},${current[1]}]`, newi: `[${currNew[0]},${currNew[1]}]`, action: 'Insert NewInterval',
                            origTiles: intervals.map((v, idx) => ({val: `[${v[0]},${v[1]}]`, state: idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')})),
                            newTile: {val: `[${currNew[0]},${currNew[1]}]`, state: 'winning'},
                            resTiles: res.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'winning'})),
                            panel: `<span style="color:var(--accent-blue)">Current interval comes AFTER new interval (${current[0]} > ${currNew[1]}). NewInterval is ready to be inserted. Appending NewInterval to result.</span>`,
                            statusText: `Inserted Active NewInterval into result.`,
                            log: `  Condition 2: ${current[0]} > ${currNew[1]}. Inserting NewInterval [${currNew[0]},${currNew[1]}].`,
                            logColor: 'var(--accent-blue)'
                        });
                    }

                    res.push([...current]);
                    steps.push({
                        type: 'after_append', cond: 'Current START > New END', curr: `[${current[0]},${current[1]}]`, newi: `[${currNew[0]},${currNew[1]}]`, action: 'Append Current',
                        origTiles: intervals.map((v, idx) => ({val: `[${v[0]},${v[1]}]`, state: idx === i ? 'winning' : (idx <= i ? 'past' : 'idle')})),
                        newTile: {val: `[${currNew[0]},${currNew[1]}]`, state: 'past'},
                        resTiles: res.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'winning'})),
                        panel: `<span style="color:var(--accent-green)">Appending Current interval [${current[0]},${current[1]}] to result.</span>`,
                        statusText: `Appended [${current[0]},${current[1]}] to result.`,
                        log: `  Appended current interval [${current[0]},${current[1]}].`,
                        logColor: 'var(--accent-green)'
                    });

                } 
                else {
                    // Condition 3: Overlap
                    let oldNew = [...currNew];
                    currNew[0] = Math.min(currNew[0], current[0]);
                    currNew[1] = Math.max(currNew[1], current[1]);

                    steps.push({
                        type: 'overlap', cond: 'Overlap Detected', curr: `[${current[0]},${current[1]}]`, newi: `[${currNew[0]},${currNew[1]}]`, action: 'Merge',
                        origTiles: intervals.map((v, idx) => ({val: `[${v[0]},${v[1]}]`, state: idx === i ? 'absorbed' : (idx <= i ? 'past' : 'idle')})),
                        newTile: {val: `[${currNew[0]},${currNew[1]}]`, state: 'merged'},
                        resTiles: res.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'winning'})),
                        panel: `<span style="color:var(--accent-purple)">Overlap! Merge intervals.<br>New START = min(${oldNew[0]}, ${current[0]}) = ${currNew[0]}<br>New END = max(${oldNew[1]}, ${current[1]}) = ${currNew[1]}</span>`,
                        statusText: `Merged current interval into Active NewInterval.`,
                        log: `  Condition 3: Overlap. Merged into [${currNew[0]},${currNew[1]}].`,
                        logColor: 'var(--accent-purple)'
                    });
                }
            }

            // Post-loop check
            if (!inserted) {
                res.push([...currNew]);
                inserted = true;
                steps.push({
                    type: 'final_insert', cond: 'End of Array', curr: '—', newi: `[${currNew[0]},${currNew[1]}]`, action: 'Insert NewInterval',
                    origTiles: intervals.map(() => ({val: '—', state: 'past'})),
                    newTile: {val: `[${currNew[0]},${currNew[1]}]`, state: 'winning'},
                    resTiles: res.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'winning'})),
                    panel: `Array traversal finished and NewInterval wasn't inserted yet. Appending NewInterval to the end.`,
                    statusText: `Inserted remaining Active NewInterval into result.`,
                    log: `  End of array reached. Inserting remaining NewInterval [${currNew[0]},${currNew[1]}].`,
                    logColor: 'var(--accent-blue)'
                });
            }

            // FINAL STEP
            steps.push({
                type: 'final', cond: 'Done', curr: '—', newi: '—', action: 'Complete',
                origTiles: intervals.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'past'})),
                newTile: {val: `[${currNew[0]},${currNew[1]}]`, state: 'past'},
                resTiles: res.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'winning'})),
                panel: 'Interval Insertion Complete.',
                complete: true,
                finalStr: formatIntervals(res),
                statusText: `Done. Final merged intervals generated in O(n) time.`,
                log: `Final result: ${formatIntervals(res)}`,
                logColor: 'var(--accent-green)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Original Tiles
            const oContainer = document.getElementById('orig-tiles');
            oContainer.innerHTML = '';
            if (intervals.length === 0) {
                 const empty = document.createElement('div');
                 empty.style.color = 'var(--text-dim)';
                 empty.innerText = '[]';
                 oContainer.appendChild(empty);
            } else {
                step.origTiles.forEach((t, i) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'tile-unit';
                    const tile = document.createElement('div');
                    tile.className = `tile ${t.state}`;
                    tile.innerText = t.val;
                    const idxLabel = document.createElement('div');
                    idxLabel.className = 'tile-index';
                    idxLabel.innerText = `[${i}]`;
                    wrapper.append(tile, idxLabel);
                    oContainer.appendChild(wrapper);
                });
            }

            // Render New Interval Tile
            const nContainer = document.getElementById('new-tiles');
            nContainer.innerHTML = '';
            const nWrapper = document.createElement('div');
            nWrapper.className = 'tile-unit';
            const nTile = document.createElement('div');
            nTile.className = `tile ${step.newTile.state}`;
            nTile.innerText = step.newTile.val;
            nWrapper.append(nTile);
            nContainer.appendChild(nWrapper);

            // Render Result Tiles
            const rContainer = document.getElementById('res-tiles');
            rContainer.innerHTML = '';
            if (step.resTiles.length === 0) {
                const empty = document.createElement('div');
                empty.style.color = 'var(--text-dim)';
                empty.style.fontFamily = 'monospace';
                empty.style.paddingTop = '12px';
                empty.innerText = '[]';
                rContainer.appendChild(empty);
            } else {
                step.resTiles.forEach((t, i) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'tile-unit';
                    const tile = document.createElement('div');
                    tile.className = `tile ${t.state}`;
                    tile.innerText = t.val;
                    const idxLabel = document.createElement('div');
                    idxLabel.className = 'tile-index';
                    idxLabel.innerText = `[${i}]`;
                    wrapper.append(tile, idxLabel);
                    rContainer.appendChild(wrapper);
                });
            }

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-cond').innerText = step.cond;
            document.getElementById('val-curr').innerText = step.curr;
            document.getElementById('val-newi').innerText = step.newi;
            document.getElementById('val-action').innerText = step.action;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.finalStr : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerHTML = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
