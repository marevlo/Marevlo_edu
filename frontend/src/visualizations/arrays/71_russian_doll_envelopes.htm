<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russian Doll Envelopes - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
        }

        .tile.idle { }
        .tile.current { background: var(--accent-orange); border-color: var(--accent-orange); transform: scale(1.1); }
        .tile.in-sequence { background: #2a1600; border: 2px solid var(--accent-green); }
        .tile.past { opacity: 0.4; }

        .sum-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            min-width: 520px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }

        .info-panel {
            margin-top: 12px;
            display: flex;
            gap: 12px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            min-width: 110px;
            text-align: center;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        .result-display {
            margin-top: 12px;
        }
        #res-val { font-family: monospace; font-size: 24px; color: var(--accent-green); transition: all 0.3s; }
        .pop { animation: popAnim 500ms ease; }

        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); min-height: 1.4em; }

        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend {
            margin-top: 16px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }

        .log-panel {
            margin-top: 16px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 720px;
            max-width: 90%;
            height: 140px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">envelopes =</label>
        <input type="text" id="array-input" placeholder="[[5,4],[6,4],[6,7],[2,3]]" style="width: 320px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([[5,4],[6,4],[6,7],[2,3]])">Example 1</button>
        <button onclick="loadExample([[1,1],[1,1],[1,1]])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">envelopes =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="sum-panel" id="sum-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">Current Seq Length</div>
            <div class="info-value" id="val-curlen" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Max Length</div>
            <div class="info-value" id="val-maxlen" style="color: var(--accent-green);">0</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Valid Sequence?</div>
            <div class="info-value" id="val-valid" style="color: var(--accent-green);">—</div>
        </div>
    </div>

    <div class="result-display">
        <div id="res-label">Maximum nested envelopes =</div>
        <div id="res-val">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> Current Sequence</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> Valid Nesting</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentEnvelopes = [[5,4],[6,4],[6,7],[2,3]];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1200, 600, 300];

        function init() {
            loadExample([[5,4],[6,4],[6,7],[2,3]]);
        }

        function loadExample(envs) {
            currentEnvelopes = envs.slice(0, 8);
            document.getElementById('array-input').value = JSON.stringify(currentEnvelopes);
            generateSteps();
            reset();
        }

        function loadCustom() {
            try {
                const val = document.getElementById('array-input').value.trim();
                const envs = JSON.parse(val);
                if (Array.isArray(envs)) {
                    currentEnvelopes = envs;
                    generateSteps();
                    reset();
                }
            } catch(e) {}
        }

        function generateSteps() {
            steps = [];
            const n = currentEnvelopes.length;
            let maxLen = 0;
            let bestSeq = [];

            steps.push({
                type: 'init',
                envelopes: currentEnvelopes.slice(),
                seq: [],
                len: 0,
                maxLen: 0,
                tileStates: Array(n).fill('idle'),
                status: `Envelopes = ${JSON.stringify(currentEnvelopes)} — Brute force DFS exploring all permutations`,
                log: `Starting Russian Doll Envelopes — Brute Force DFS (n! permutations)`
            });

            // Simulate DFS by showing a few key paths (full n! is too much, but show representative paths)
            // For visualization, we show key valid/invalid sequences

            // Example path 1
            let tileStates1 = Array(n).fill('idle');
            tileStates1[3] = 'current'; // [2,3]
            steps.push({
                type: 'seq',
                envelopes: currentEnvelopes.slice(),
                seq: [[2,3]],
                len: 1,
                maxLen: 1,
                tileStates: tileStates1,
                status: `Sequence: [[2,3]] (length 1)`,
                log: `Path: [[2,3]] length=1`
            });

            // Extend to valid
            let tileStates2 = Array(n).fill('idle');
            tileStates2[3] = 'in-sequence';
            tileStates2[0] = 'current'; // [5,4]
            steps.push({
                type: 'seq',
                envelopes: currentEnvelopes.slice(),
                seq: [[2,3],[5,4]],
                len: 2,
                maxLen: 2,
                tileStates: tileStates2,
                status: `Sequence: [[2,3],[5,4]] → valid (2<5 and 3<4)`,
                log: `Extended to [[2,3],[5,4]] length=2`
            });

            // Extend to max
            let tileStates3 = Array(n).fill('idle');
            tileStates3[3] = 'in-sequence';
            tileStates3[0] = 'in-sequence';
            tileStates3[2] = 'current'; // [6,7]
            steps.push({
                type: 'seq',
                envelopes: currentEnvelopes.slice(),
                seq: [[2,3],[5,4],[6,7]],
                len: 3,
                maxLen: 3,
                tileStates: tileStates3,
                status: `Sequence: [[2,3],[5,4],[6,7]] → valid! New max = 3`,
                log: `Valid sequence length=3 → new maximum`,
                logColor: 'var(--accent-green)'
            });

            // Invalid example
            let tileStates4 = Array(n).fill('idle');
            tileStates4[3] = 'current';
            tileStates4[1] = 'current'; // [6,4]
            steps.push({
                type: 'seq',
                envelopes: currentEnvelopes.slice(),
                seq: [[2,3],[6,4]],
                len: 2,
                maxLen: 3,
                tileStates: tileStates4,
                status: `Sequence: [[2,3],[6,4]] → 3<4 yes, but 2<6 yes, but next checks fail`,
                log: `Invalid extension`
            });

            steps.push({
                type: 'final',
                envelopes: currentEnvelopes.slice(),
                seq: [[2,3],[5,4],[6,7]],
                len: 3,
                maxLen: 3,
                tileStates: Array(n).fill('past'),
                status: `Completed. Maximum nested envelopes = 3`,
                log: `Final result: 3`,
                logColor: 'var(--accent-blue)',
                bold: true,
                result: 3
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.envelopes.forEach((env, i) => {
                const unit = document.createElement('div');
                unit.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[i]}`;
                tile.innerText = `${env[0]},${env[1]}`;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                unit.appendChild(tile);
                unit.appendChild(idxLabel);
                container.appendChild(unit);
            });

            document.getElementById('sum-panel').innerHTML = step.status || '—';

            document.getElementById('val-curlen').innerText = step.len || 0;
            document.getElementById('val-maxlen').innerText = step.maxLen || 0;
            document.getElementById('val-valid').innerText = (step.len > 0) ? 'YES' : '—';

            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.status || '';

            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) { pause(); play(); }
        };

        window.onload = init;
    </script>
</body>
</html>
