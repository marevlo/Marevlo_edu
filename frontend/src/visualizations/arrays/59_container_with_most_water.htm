<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container With Most Water - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }

        #array-input { width: 340px; }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES (with height bars) */
        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            height: 220px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .bar {
            width: 36px;
            background: #21262d;
            border: 1px solid var(--border-main);
            transition: all 0.25s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            color: var(--text-main);
            font-size: 13px;
            font-weight: 600;
            position: relative;
        }

        .bar.i { 
            background: #2a1600; 
            border: 2px solid var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.08); 
        }
        .bar.j { 
            background: #0d2244; 
            border: 2px solid var(--accent-blue); 
            color: var(--accent-blue); 
            transform: scale(1.08); 
        }
        .bar.valid { 
            background: #0f2a1a; 
            border: 2px solid var(--accent-green); 
            color: var(--accent-green); 
            box-shadow: 0 0 12px var(--accent-green); 
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
            margin-top: 4px;
        }

        /* ROW 3: AREA PANEL */
        .area-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            min-width: 460px;
            text-align: center;
            font-family: monospace;
            font-size: 15px;
        }

        .current-area { color: var(--accent-green); font-weight: 700; font-size: 19px; }

        /* ROW 4: INFO PANEL */
        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #res-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
        #res-val { 
            font-family: monospace; 
            font-size: 28px; 
            color: var(--accent-green); 
            transition: all 0.3s;
        }
        .pop { 
            animation: popAnim 400ms ease; 
            text-shadow: 0 0 16px var(--accent-green);
        }

        @keyframes popAnim {
            0%{transform:scale(1)} 50%{transform:scale(1.25)} 100%{transform:scale(1)}
        }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        /* ROW 7: CONTROLS */
        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        /* ROW 8: LEGEND */
        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 660px;
            max-width: 90%;
            height: 150px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-line { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">height =</label>
        <input type="text" id="array-input" placeholder="1,8,6,2,5,4,8,3,7">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,8,6,2,5,4,8,3,7])">Example 1</button>
        <button onclick="loadExample([1,1])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">height =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="area-panel" id="area-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">i (left)</div>
            <div class="info-value" id="val-i" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">j (right)</div>
            <div class="info-value" id="val-j" style="color: var(--accent-blue);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">min height</div>
            <div class="info-value" id="val-minh" style="color: var(--accent-green);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">width</div>
            <div class="info-value" id="val-width" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">area</div>
            <div class="info-value" id="val-area" style="color: var(--accent-green);">0</div>
        </div>
        <div class="info-cell">
            <div class="info-label">max_area</div>
            <div class="info-value" id="val-max" style="color: var(--accent-green);">0</div>
        </div>
    </div>

    <div class="result-display">
        <div id="res-label">Maximum area =</div>
        <div id="res-val">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> Left pointer i</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-blue);"></div> Right pointer j</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> Current max area</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentArray = [1,8,6,2,5,4,8,3,7];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample(currentArray);
        }

        function loadExample(arr) {
            currentArray = arr.slice(0, 12);
            document.getElementById('array-input').value = currentArray.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (arr.length > 0) loadExample(arr);
        }

        function generateSteps() {
            steps = [];
            const n = currentArray.length;
            let maxArea = 0;
            let bestPair = null;

            // STEP 0: INIT
            steps.push({
                type: 'init',
                i: null,
                j: null,
                area: 0,
                maxArea: 0,
                tileStates: Array(n).fill('idle'),
                areaDisplay: '—',
                status: `height = [${currentArray}] — Brute force O(n²) search for maximum container area`,
                log: `height = [${currentArray}] — Starting brute force Container With Most Water`
            });

            for (let i = 0; i < n - 1; i++) {
                // Start new i
                let tileStates = Array(n).fill(0).map((_, idx) => idx < i ? 'past' : 'idle');
                tileStates[i] = 'i';

                steps.push({
                    type: 'start-i',
                    i: i,
                    j: null,
                    area: 0,
                    maxArea: maxArea,
                    tileStates: tileStates,
                    areaDisplay: `<span style="color:var(--text-dim)">i=${i} (height=${currentArray[i]})</span>`,
                    status: `i=${i}: Fixing left line at index ${i} (height=${currentArray[i]})`,
                    log: `i=${i} (height=${currentArray[i]})`
                });

                for (let j = i + 1; j < n; j++) {
                    const h = Math.min(currentArray[i], currentArray[j]);
                    const w = j - i;
                    const currArea = h * w;

                    if (currArea > maxArea) {
                        maxArea = currArea;
                        bestPair = [i, j];
                    }

                    // Tile states
                    tileStates = Array(n).fill(0).map((_, idx) => {
                        if (idx < i) return 'past';
                        if (idx === i) return 'i';
                        if (idx < j) return 'past';
                        return 'idle';
                    });
                    tileStates[j] = 'j';
                    if (currArea === maxArea) {
                        tileStates[i] = tileStates[j] = 'valid';
                    }

                    steps.push({
                        type: currArea === maxArea ? 'new-max' : 'check',
                        i: i,
                        j: j,
                        area: currArea,
                        maxArea: maxArea,
                        tileStates: tileStates,
                        areaDisplay: `min(${currentArray[i]},${currentArray[j]}) * ${w} = <span class="current-area">${currArea}</span>`,
                        status: `j=${j}: area = ${currArea} ${currArea > maxArea - (currArea === maxArea ? 0 : 1) ? '→ NEW MAX' : ''}`,
                        log: `  j=${j} → area=${currArea} ${currArea === maxArea ? `→ max_area updated to ${maxArea}` : ''}`,
                        logColor: currArea === maxArea ? '#3fb950' : '#8b949e'
                    });
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final',
                i: bestPair ? bestPair[0] : null,
                j: bestPair ? bestPair[1] : null,
                area: maxArea,
                maxArea: maxArea,
                tileStates: Array(n).fill('past'),
                areaDisplay: `Maximum area = <span style="color:var(--accent-green);font-size:22px;">${maxArea}</span>`,
                status: `Complete. Maximum area = ${maxArea}`,
                log: `Final result: max area = ${maxArea}`,
                logColor: '#388bfd',
                bold: true,
                result: maxArea
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render bars (height visualization)
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            const maxH = Math.max(...currentArray, 1);
            currentArray.forEach((val, pos) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const bar = document.createElement('div');
                bar.className = `bar ${step.tileStates[pos]}`;
                const heightPercent = Math.max(20, Math.round((val / maxH) * 180));
                bar.style.height = `${heightPercent}px`;
                bar.innerText = val;
                const indexEl = document.createElement('div');
                indexEl.className = 'tile-index';
                indexEl.innerText = `[${pos}]`;
                wrapper.appendChild(bar);
                wrapper.appendChild(indexEl);
                container.appendChild(wrapper);
            });

            // Area panel
            const areaPanel = document.getElementById('area-panel');
            areaPanel.innerHTML = step.areaDisplay || '—';

            // Info panel
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-minh').innerText = step.i !== null && step.j !== null ? Math.min(currentArray[step.i], currentArray[step.j]) : '—';
            document.getElementById('val-width').innerText = step.i !== null && step.j !== null ? (step.j - step.i) : '—';
            document.getElementById('val-area').innerText = step.area;
            document.getElementById('val-max').innerText = step.maxArea;

            // Result
            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            // Status
            document.getElementById('status-text').innerText = step.status;

            // Log
            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) {
                pause();
                play();
            }
        };

        window.onload = init;
    </script>
</body>
</html>
