<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trapping Rain Water - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 280px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
        }

        .tile.idle { color: var(--text-dim); }
        .tile.candidate { 
            background: #2a1600; 
            border: 2px solid var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.12); 
            z-index: 2; 
        }
        .tile.past { opacity: 0.3; }
        .tile.left-max { 
            background: #0d2244; 
            border: 2px solid var(--accent-blue); 
            color: var(--accent-blue); 
        }
        .tile.right-max { 
            background: #0d2244; 
            border: 2px solid var(--accent-blue); 
            color: var(--accent-blue); 
        }
        .tile.active { 
            background: #0f2a1a; 
            border: 2px solid var(--accent-green); 
            color: var(--accent-green); 
        }

        /* ROW 3: WATER PANEL */
        .water-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 10px 18px;
            min-width: 420px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }

        .left-max-val { color: var(--accent-blue); }
        .right-max-val { color: var(--accent-blue); }
        .water-val { color: var(--accent-green); font-weight: 700; }

        /* ROW 4: INFO PANEL */
        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #res-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
        #res-val { font-family: monospace; font-size: 26px; color: var(--accent-green); font-weight: 700; }
        .pop { 
            animation: popAnim 400ms ease; 
            text-shadow: 0 0 16px var(--accent-green);
        }

        @keyframes popAnim {
            0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)}
        }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        /* ROW 7: CONTROLS */
        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        /* ROW 8: LEGEND */
        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 620px;
            max-width: 90%;
            height: 130px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-line { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">heights =</label>
        <input type="text" id="array-input" placeholder="0,1,0,2,1,0,1,3,2,1,2,1" style="width: 320px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([0,1,0,2,1,0,1,3,2,1,2,1])">Example 1</button>
        <button onclick="loadExample([4,2,0,3,2,5])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">heights =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="water-panel" id="water-panel">
        —
    </div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">i</div>
            <div class="info-value" id="val-i" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">height[i]</div>
            <div class="info-value" id="val-height" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">leftMax</div>
            <div class="info-value" id="val-left" style="color: var(--accent-blue);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">rightMax</div>
            <div class="info-value" id="val-right" style="color: var(--accent-blue);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">water</div>
            <div class="info-value" id="val-water" style="color: var(--accent-green);">0</div>
        </div>
        <div class="info-cell">
            <div class="info-label">total</div>
            <div class="info-value" id="val-total" style="color: var(--accent-green); font-size: 20px;">0</div>
        </div>
    </div>

    <div class="result-display">
        <div id="res-label">total trapped water =</div>
        <div id="res-val">0</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> Current bar i</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-blue);"></div> Left/Right Max positions</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> Water added</div>
        <div class="legend-item"><div class="dot" style="background: var(--text-dim);"></div> Past</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentArray = [0,1,0,2,1,0,1,3,2,1,2,1];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample([0,1,0,2,1,0,1,3,2,1,2,1]);
        }

        function loadExample(arr) {
            currentArray = arr.slice(0, 12);
            document.getElementById('array-input').value = currentArray.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (arr.length > 0) {
                currentArray = arr;
                generateSteps();
                reset();
            }
        }

        function generateSteps() {
            steps = [];
            const heights = [...currentArray];
            const n = heights.length;
            let totalWater = 0;

            // STEP 0: INIT
            steps.push({
                type: 'init',
                i: null,
                height: null,
                leftMax: 0,
                rightMax: 0,
                water: 0,
                total: 0,
                tileStates: Array(n).fill('idle'),
                status: `heights=[${currentArray}] n=${n}. Starting brute-force O(n²) trapping rain water.`,
                log: `Original heights: [${currentArray}] — Starting brute force`
            });

            for (let i = 0; i < n; i++) {
                let leftMax = 0;
                let rightMax = 0;

                // Scan left
                let leftStates = Array(n).fill('past');
                leftStates[i] = 'candidate';
                for (let j = 0; j < i; j++) {
                    leftMax = Math.max(leftMax, heights[j]);
                    leftStates[j] = 'left-max';
                }

                steps.push({
                    type: 'left_scan',
                    i: i,
                    height: heights[i],
                    leftMax: leftMax,
                    rightMax: 0,
                    water: 0,
                    total: totalWater,
                    tileStates: leftStates,
                    status: `i=${i}: Scanning left for max (leftMax=${leftMax})`,
                    log: `i=${i} (height=${heights[i]}): left scan → leftMax = ${leftMax}`
                });

                // Scan right
                let rightStates = Array(n).fill('past');
                rightStates[i] = 'candidate';
                for (let j = i + 1; j < n; j++) {
                    rightMax = Math.max(rightMax, heights[j]);
                    rightStates[j] = 'right-max';
                }

                steps.push({
                    type: 'right_scan',
                    i: i,
                    height: heights[i],
                    leftMax: leftMax,
                    rightMax: rightMax,
                    water: 0,
                    total: totalWater,
                    tileStates: rightStates,
                    status: `i=${i}: Scanning right for max (rightMax=${rightMax})`,
                    log: `i=${i}: right scan → rightMax = ${rightMax}`
                });

                // Calculate water
                let waterAtI = Math.min(leftMax, rightMax) - heights[i];
                waterAtI = Math.max(0, waterAtI);
                totalWater += waterAtI;

                let finalStates = Array(n).fill('past');
                finalStates[i] = 'active';

                steps.push({
                    type: 'calculate',
                    i: i,
                    height: heights[i],
                    leftMax: leftMax,
                    rightMax: rightMax,
                    water: waterAtI,
                    total: totalWater,
                    tileStates: finalStates,
                    status: `i=${i}: water = min(${leftMax},${rightMax}) - ${heights[i]} = ${waterAtI}`,
                    log: `i=${i}: water added = ${waterAtI}, total now = ${totalWater}`,
                    logColor: waterAtI > 0 ? 'var(--accent-green)' : 'var(--text-dim)'
                });
            }

            // FINAL
            steps.push({
                type: 'final',
                i: null,
                height: null,
                leftMax: null,
                rightMax: null,
                water: null,
                total: totalWater,
                tileStates: Array(n).fill('active'),
                status: `Complete. Total trapped water = ${totalWater}`,
                log: `Final result: ${totalWater}`,
                logColor: 'var(--accent-blue)',
                bold: true,
                result: totalWater
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            currentArray.forEach((val, pos) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[pos] || 'idle'}`;
                tile.innerText = val;
                const indexEl = document.createElement('div');
                indexEl.className = 'tile-index';
                indexEl.innerText = `[${pos}]`;
                wrapper.appendChild(tile);
                wrapper.appendChild(indexEl);
                container.appendChild(wrapper);
            });

            // Water Panel
            const waterPanel = document.getElementById('water-panel');
            if (step.i !== null) {
                waterPanel.innerHTML = `
                    i=<span style="color:var(--accent-orange)">${step.i}</span> 
                    height=<span style="color:var(--accent-orange)">${step.height}</span><br>
                    leftMax=<span class="left-max-val">${step.leftMax}</span> 
                    rightMax=<span class="right-max-val">${step.rightMax}</span><br>
                    water at i = <span class="water-val">${step.water}</span>
                `;
            } else {
                waterPanel.innerHTML = '—';
            }

            // Info Panel
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-height').innerText = step.height !== null ? step.height : '—';
            document.getElementById('val-left').innerText = step.leftMax !== null ? step.leftMax : '—';
            document.getElementById('val-right').innerText = step.rightMax !== null ? step.rightMax : '—';
            document.getElementById('val-water').innerText = step.water !== null ? step.water : '—';
            document.getElementById('val-total').innerText = step.total !== null ? step.total : '—';

            // Result
            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            // Status
            document.getElementById('status-text').innerText = step.status;

            // Log
            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        window.onload = init;
    </script>
</body>
</html>
