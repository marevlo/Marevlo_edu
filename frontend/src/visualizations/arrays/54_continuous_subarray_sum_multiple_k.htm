<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuous Subarray Sum Multiple of K - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }

        #array-input { width: 260px; }
        #k-input { width: 80px; }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
        }

        /* Tile States */
        .tile.idle { color: var(--text-dim); }
        .tile.past { opacity: 0.3; }
        .tile.start-i { 
            background: #2a1600; 
            border: 2px solid var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.12); 
            z-index: 2; 
        }
        .tile.adding { 
            background: #0d2244; 
            border: 2px solid var(--accent-blue); 
            color: var(--accent-blue); 
            transform: scale(1.08); 
            z-index: 2; 
        }
        .tile.in-sum { 
            background: #21262d; 
            border: 2px solid #e3b341; 
        }
        .tile.valid { 
            background: #0f2a1a; 
            border: 2px solid var(--accent-green); 
            color: var(--accent-green); 
            transform: scale(1.15); 
            box-shadow: 0 0 12px var(--accent-green); 
        }

        /* ROW 3: RUNNING SUM PANEL */
        .running-sum-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            min-width: 460px;
            text-align: center;
            font-family: monospace;
            font-size: 15px;
        }

        .old-total { color: var(--text-dim); }
        .plus-sign { color: var(--text-main); margin: 0 8px; }
        .curr-elem { color: var(--accent-blue); font-weight: 700; }
        .arrow-sign { color: var(--text-log); margin: 0 10px; }
        .new-total { color: var(--accent-green); font-weight: 700; font-size: 19px; }
        .mod-val { color: var(--accent-orange); font-weight: 700; }

        /* ROW 4: INFO PANEL */
        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #res-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
        #res-val { 
            font-family: monospace; 
            font-size: 16px; 
            color: var(--text-dim); 
            transition: all 0.3s;
        }
        .pop { 
            animation: popAnim 400ms ease; 
            color: var(--accent-green) !important; 
            font-size: 32px !important; 
            font-weight: 700;
            text-shadow: 0 0 16px var(--accent-green);
        }

        @keyframes popAnim {
            0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)}
        }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        /* ROW 7: CONTROLS */
        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        /* ROW 8: LEGEND */
        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 620px;
            max-width: 90%;
            height: 140px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-line { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">nums =</label>
        <input type="text" id="array-input" placeholder="23, 2, 4, 6, 7">
        <label class="array-label" style="margin-left: 12px;">k =</label>
        <input type="text" id="k-input" placeholder="6">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([23,2,4,6,7], 6)">Example 1</button>
        <button onclick="loadExample([1,2,3], 5)">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">nums =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="running-sum-panel" id="sum-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">i (start)</div>
            <div class="info-value" id="val-i" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">j (end)</div>
            <div class="info-value" id="val-j" style="color: var(--accent-blue);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">current_sum</div>
            <div class="info-value" id="val-sum" style="color: var(--accent-green);">0</div>
        </div>
        <div class="info-cell">
            <div class="info-label">sum % k</div>
            <div class="info-value" id="val-mod" style="color: var(--accent-orange);">—</div>
        </div>
    </div>

    <div class="result-display">
        <div id="res-label">Exists subarray with sum % k == 0 ?</div>
        <div id="res-val" style="font-size: 22px;">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> Start index i</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-blue);"></div> Current end j</div>
        <div class="legend-item"><div class="dot" style="background: #e3b341;"></div> Current subarray</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> Valid (sum % k == 0)</div>
        <div class="legend-item"><div class="dot" style="background: var(--text-dim);"></div> Past</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentArray = [23, 2, 4, 6, 7];
        let currentK = 6;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample(currentArray, currentK);
        }

        function loadExample(arr, k) {
            currentArray = arr.slice(0, 10);
            currentK = parseInt(k) || 1;
            document.getElementById('array-input').value = currentArray.join(', ');
            document.getElementById('k-input').value = currentK;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const arrVal = document.getElementById('array-input').value;
            const arr = arrVal.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const kVal = parseInt(document.getElementById('k-input').value);
            if (arr.length > 0 && !isNaN(kVal)) {
                loadExample(arr, kVal);
            }
        }

        function generateSteps() {
            steps = [];
            const n = currentArray.length;
            let found = false;

            // STEP 0: INIT
            steps.push({
                type: 'init',
                i: null,
                j: null,
                current_sum: 0,
                mod: null,
                tileStates: Array(n).fill('idle'),
                sumDisplay: '—',
                status: `nums=[${currentArray}], k=${currentK} — Brute force O(n²) check for any subarray whose sum is multiple of k`,
                log: `nums = [${currentArray}], k = ${currentK} — Starting brute force search for continuous subarray sum divisible by k`
            });

            for (let i = 0; i < n; i++) {
                let curSum = 0;

                // STEP A: Start new i
                steps.push({
                    type: 'start-i',
                    i: i,
                    j: null,
                    current_sum: 0,
                    mod: null,
                    tileStates: Array(n).fill(0).map((_, idx) => idx < i ? 'past' : 'idle'),
                    sumDisplay: `<span style="color:var(--text-dim)">current_sum = 0</span> <span style="color:var(--accent-orange)">(new start at i=${i})</span>`,
                    status: `i=${i}: Starting new subarray from index ${i}`,
                    log: `i=${i}: current_sum=0`
                });

                for (let j = i; j < n; j++) {
                    const val = currentArray[j];
                    const oldSum = curSum;
                    curSum += val;
                    let modVal = (currentK === 0) ? (curSum === 0 ? 0 : 1) : (curSum % currentK);
                    if (modVal < 0) modVal += currentK;   // safe handling
                    const isValid = (currentK === 0) ? (curSum === 0) : (modVal === 0);

                    if (isValid) found = true;

                    // Tile states
                    const tileStates = Array(n).fill(0).map((_, idx) => {
                        if (idx < i) return 'past';
                        if (idx >= i && idx <= j) return isValid ? 'valid' : 'in-sum';
                        return 'idle';
                    });
                    tileStates[i] = 'start-i';
                    tileStates[j] = 'adding';

                    steps.push({
                        type: isValid ? 'valid' : 'add',
                        i: i,
                        j: j,
                        current_sum: curSum,
                        mod: modVal,
                        tileStates: tileStates,
                        sumDisplay: `<span class="old-total">${oldSum}</span> <span class="plus-sign">+</span> <span class="curr-elem">${val}</span> <span class="arrow-sign">→</span> <span class="new-total">${curSum}</span> <span style="margin-left:15px;">(${curSum} % ${currentK} = ${modVal})</span>`,
                        status: `j=${j}: sum=${curSum}, ${curSum} % ${currentK} = ${modVal} ${isValid ? '→ VALID ✓' : ''}`,
                        log: `i=${i} j=${j}: sum=${curSum}, mod=${modVal} ${isValid ? '→ FOUND valid subarray!' : ''}`,
                        logColor: isValid ? '#3fb950' : '#8b949e'
                    });

                    if (isValid) break;  // early break for this starting i (as typical in brute force)
                }
            }

            // FINAL STEP
            const finalResult = found ? "true" : "false";
            steps.push({
                type: 'final',
                i: null,
                j: null,
                current_sum: null,
                mod: null,
                tileStates: Array(n).fill('past'),
                sumDisplay: '—',
                status: `Complete. Subarray with sum multiple of ${currentK} exists: ${finalResult}`,
                log: `Final result: ${finalResult}`,
                logColor: '#388bfd',
                bold: true,
                result: finalResult
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Tiles
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            currentArray.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[i]}`;
                tile.innerText = val;
                const indexEl = document.createElement('div');
                indexEl.className = 'tile-index';
                indexEl.innerText = `[${i}]`;
                wrapper.appendChild(tile);
                wrapper.appendChild(indexEl);
                container.appendChild(wrapper);
            });

            // Running sum panel
            const sumPanel = document.getElementById('sum-panel');
            sumPanel.innerHTML = step.sumDisplay || '—';

            // Info panel
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-sum').innerText = step.current_sum !== null ? step.current_sum : '—';
            document.getElementById('val-mod').innerText = step.mod !== null ? step.mod : '—';

            // Result
            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
                resVal.style.color = step.result === "true" ? "var(--accent-green)" : "var(--accent-red)";
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            // Status
            document.getElementById('status-text').innerText = step.status;

            // Log
            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) {
                pause();
                play();
            }
        };

        window.onload = init;
    </script>
</body>
</html>
