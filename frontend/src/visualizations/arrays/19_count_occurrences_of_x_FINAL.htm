<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Occurrences of X - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"], input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .arr-input { width: 220px; }
        .x-input { width: 60px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.08); z-index: 2; }
        .tile.defeated { background: #2a0d0d; border: 2px solid var(--accent-red); color: var(--accent-red); transform: scale(1.05); z-index: 2; }
        .tile.past-match { background: #0f2a1a; border: 1px solid var(--accent-green); color: var(--accent-green); opacity: 0.75; }
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.5; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 550px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">array =</label>
        <input type="text" id="arr-input" class="arr-input" placeholder="2, 3, 2, 4, 2, 5">
        <label class="ui-label">x =</label>
        <input type="number" id="x-input" class="x-input" placeholder="2">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([2, 3, 2, 4, 2, 5], 2)">Ex 1</button>
        <button onclick="loadExample([1, 2, 3, 4, 5], 6)">Ex 2</button>
    </div>

    <div class="array-container">
        <div class="ui-label" style="font-size: 12px; white-space: nowrap;">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Index i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">array[i]</span>
            <span class="info-value" id="val-arr" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Target (x)</span>
            <span class="info-value" id="val-x" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Count</span>
            <span class="info-value" id="val-count" style="color: var(--accent-green);">0</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">final count =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Current Element</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Match (== x)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red)"></span> No Match (!= x)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); opacity:0.6"></span> Past Match</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Past Miss</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [2, 3, 2, 4, 2, 5];
        let targetX = 2;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([2, 3, 2, 4, 2, 5], 2); }

        function loadExample(newArr, newX) {
            arr = [...newArr];
            targetX = parseInt(newX);
            document.getElementById('arr-input').value = arr.join(', ');
            document.getElementById('x-input').value = targetX;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valArr = document.getElementById('arr-input').value;
            const parsedArr = valArr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const parsedX = parseInt(document.getElementById('x-input').value);
            if (parsedArr.length > 0 && !isNaN(parsedX)) {
                loadExample(parsedArr, parsedX);
            }
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;
            let count = 0;
            let tileStates = new Array(n).fill('idle');

            steps.push({
                type: 'init', i: '—', val: '—', count: 0,
                tiles: [...tileStates],
                panel: '—',
                statusText: `array=[${arr.join(', ')}] x=${targetX}. Click Play to begin.`,
                log: `n=${n}, x=${targetX}. Starting occurrences count search.`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 0; i < n; i++) {
                let val = arr[i];
                
                // STEP A: Select Candidate
                let temp1 = [...tileStates];
                temp1[i] = 'candidate';
                
                steps.push({
                    type: 'eval', i: i, val: val, count: count,
                    tiles: [...temp1],
                    panel: `Checking if array[${i}] == ${targetX}`,
                    statusText: `Evaluating element at index ${i}: ${val}`,
                    log: `i=${i}: Processing element ${val}`,
                    logColor: 'var(--text-main)'
                });

                // STEP B: Compare
                let isMatch = (val === targetX);
                let temp2 = [...tileStates];
                
                if (isMatch) {
                    count++;
                    temp2[i] = 'winning';
                    tileStates[i] = 'past-match';
                    
                    steps.push({
                        type: 'match', i: i, val: val, count: count,
                        tiles: [...temp2],
                        panel: `<span style="color:var(--accent-green)">${val} == ${targetX} → Match! ✓</span>`,
                        statusText: `Match found! Incrementing count to ${count}.`,
                        log: `i=${i}: ${val} == ${targetX} → count = ${count} ✓`,
                        logColor: 'var(--accent-green)'
                    });
                } else {
                    temp2[i] = 'defeated';
                    tileStates[i] = 'past';
                    
                    steps.push({
                        type: 'nomatch', i: i, val: val, count: count,
                        tiles: [...temp2],
                        panel: `<span style="color:var(--accent-red)">${val} != ${targetX} → No match ✗</span>`,
                        statusText: `No match. Moving to next element.`,
                        log: `i=${i}: ${val} != ${targetX} ✗`,
                        logColor: 'var(--accent-red)'
                    });
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final', i: '—', val: '—', count: count,
                tiles: [...tileStates],
                panel: 'Array Traversal Complete',
                complete: true,
                statusText: `Done. Total occurrences of ${targetX} is ${count}.`,
                log: `Final result: count = ${count}`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((state, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${state}`;
                tile.innerText = arr[i];
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-i').innerText = step.i;
            document.getElementById('val-arr').innerText = step.val;
            document.getElementById('val-x').innerText = targetX;
            document.getElementById('val-count').innerText = step.count;

            const resVal = document.getElementById('res-val');
            resVal.innerText = (step.complete || idx > 0) ? step.count : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
