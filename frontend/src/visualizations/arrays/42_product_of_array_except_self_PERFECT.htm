<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product of Array Except Self - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 260px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .array-row { display: flex; align-items: center; gap: 12px; min-height: 50px; justify-content: center; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-start; max-width: 800px; min-height: 50px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 16px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main); padding: 0 6px;
        }
        .tile-index { font-size: 10px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 1; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.06); box-shadow: 0 0 8px var(--accent-green); z-index: 3;}
        .tile.past { opacity: 0.4; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 650px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.4;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; max-width: 800px; text-align: center; word-wrap: break-word; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 20px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="arr-input" placeholder="1, 2, 3, 4">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1, 2, 3, 4])">Ex 1</button>
        <button onclick="loadExample([-1, 1, 0, -3, 3])">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="array-row">
            <div class="ui-label" style="width: 60px; text-align: right;">nums:</div>
            <div class="tiles-wrapper" id="orig-tiles"></div>
        </div>
        <div class="array-row">
            <div class="ui-label" style="width: 60px; text-align: right;">result:</div>
            <div class="tiles-wrapper" id="res-tiles"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Phase</span>
            <span class="info-value" id="val-phase" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Index (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Running Prefix (p)</span>
            <span class="info-value" id="val-p" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Running Suffix (s)</span>
            <span class="info-value" id="val-s" style="color: var(--accent-purple);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">product of array except self =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Current Element</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Updating Element</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Computed Correctly</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Past / Pending</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [1, 2, 3, 4];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([1, 2, 3, 4]); }

        function loadExample(newArr) {
            arr = [...newArr];
            document.getElementById('arr-input').value = arr.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('arr-input').value;
            const parsedArr = valStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (parsedArr.length > 0) {
                loadExample(parsedArr.slice(0, 15));
            }
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;
            let res = new Array(n).fill('—');

            if (n === 0) return;

            // STEP 0: INIT
            steps.push({
                type: 'init', phase: '1. Prefix Pass', i: '—', p: 1, s: '—',
                origStates: arr.map(() => 'idle'),
                resVals: [...res],
                resStates: res.map(() => 'idle'),
                panel: 'Initialize result array and a running prefix product <code>p = 1</code>.',
                statusText: `array=[${arr.join(', ')}], n=${n}. Click Play to begin.`,
                log: `n=${n}. Starting Space-Optimized Prefix-Suffix approach (O(n) time, O(1) space).`,
                logColor: 'var(--text-dim)'
            });

            let p = 1;
            for (let i = 0; i < n; i++) {
                // Eval
                steps.push({
                    type: 'prefix-eval', phase: '1. Prefix Pass', i: i, p: p, s: '—',
                    origStates: arr.map((v, idx) => idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')),
                    resVals: [...res],
                    resStates: res.map((v, idx) => idx === i ? 'comparing' : (idx < i ? 'winning' : 'idle')),
                    panel: `Set <code>result[${i}] = p</code> (product of elements to the left).<br><code>result[${i}] = ${p}</code>`,
                    statusText: `Assigning running prefix product to result[${i}].`,
                    log: `i=${i}: result[${i}] = ${p}`,
                    logColor: 'var(--text-main)'
                });

                res[i] = p;

                // Update res
                steps.push({
                    type: 'prefix-update', phase: '1. Prefix Pass', i: i, p: p, s: '—',
                    origStates: arr.map((v, idx) => idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')),
                    resVals: [...res],
                    resStates: res.map((v, idx) => idx === i ? 'winning' : (idx < i ? 'winning' : 'idle')),
                    panel: `<span style="color:var(--accent-green)">Updated <code>result[${i}] = ${res[i]}</code></span>`,
                    statusText: `Result array updated.`,
                    log: `  result[${i}] updated to ${res[i]} ✓`,
                    logColor: 'var(--accent-green)'
                });

                // Update p
                let oldP = p;
                p = p * arr[i];
                steps.push({
                    type: 'prefix-p', phase: '1. Prefix Pass', i: i, p: p, s: '—',
                    origStates: arr.map((v, idx) => idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')),
                    resVals: [...res],
                    resStates: res.map((v, idx) => idx === i ? 'winning' : (idx < i ? 'winning' : 'idle')),
                    panel: `Update running prefix product <code>p = p * nums[${i}]</code><br><code>p = ${oldP} * ${arr[i]} = ${p}</code>`,
                    statusText: `Updating running prefix product for next iteration.`,
                    log: `  p updated to ${p}`,
                    logColor: 'var(--accent-blue)'
                });
            }

            steps.push({
                type: 'transition', phase: 'Transition', i: '—', p: p, s: '—',
                origStates: arr.map(() => 'idle'),
                resVals: [...res],
                resStates: res.map(() => 'winning'),
                panel: 'Prefix pass complete. <code>result</code> now contains the product of all elements to the left.',
                statusText: `Phase 1 done. Moving to suffix pass.`,
                log: `Prefix pass complete. Result: [${res.join(', ')}].`,
                logColor: 'var(--accent-purple)'
            });

            let s = 1;
            steps.push({
                type: 'suffix-init', phase: '2. Suffix Pass', i: '—', p: '—', s: s,
                origStates: arr.map(() => 'idle'),
                resVals: [...res],
                resStates: res.map(() => 'winning'),
                panel: 'Initialize a running suffix product <code>s = 1</code>.',
                statusText: `Starting Phase 2: Suffix Pass (Right to Left).`,
                log: `Phase 2: Initialize running suffix product s = 1.`,
                logColor: 'var(--text-dim)'
            });

            for (let i = n - 1; i >= 0; i--) {
                // Eval
                let currentRes = res[i];
                steps.push({
                    type: 'suffix-eval', phase: '2. Suffix Pass', i: i, p: '—', s: s,
                    origStates: arr.map((v, idx) => idx === i ? 'candidate' : (idx > i ? 'past' : 'idle')),
                    resVals: [...res],
                    resStates: res.map((v, idx) => idx === i ? 'comparing' : (idx > i ? 'winning' : 'idle')),
                    panel: `Multiply <code>result[${i}]</code> by suffix product <code>s</code>.<br><code>result[${i}] = ${currentRes} * ${s}</code>`,
                    statusText: `Incorporating suffix product into result[${i}].`,
                    log: `i=${i}: result[${i}] = ${currentRes} * ${s}`,
                    logColor: 'var(--text-main)'
                });

                res[i] = res[i] * s;

                // Update res
                steps.push({
                    type: 'suffix-update', phase: '2. Suffix Pass', i: i, p: '—', s: s,
                    origStates: arr.map((v, idx) => idx === i ? 'candidate' : (idx > i ? 'past' : 'idle')),
                    resVals: [...res],
                    resStates: res.map((v, idx) => idx === i ? 'winning' : (idx > i ? 'winning' : 'idle')),
                    panel: `<span style="color:var(--accent-green)">Updated <code>result[${i}] = ${res[i]}</code></span>`,
                    statusText: `Result array updated with full product.`,
                    log: `  result[${i}] updated to ${res[i]} ✓`,
                    logColor: 'var(--accent-green)'
                });

                // Update s
                let oldS = s;
                s = s * arr[i];
                steps.push({
                    type: 'suffix-s', phase: '2. Suffix Pass', i: i, p: '—', s: s,
                    origStates: arr.map((v, idx) => idx === i ? 'candidate' : (idx > i ? 'past' : 'idle')),
                    resVals: [...res],
                    resStates: res.map((v, idx) => idx === i ? 'winning' : (idx > i ? 'winning' : 'idle')),
                    panel: `Update running suffix product <code>s = s * nums[${i}]</code><br><code>s = ${oldS} * ${arr[i]} = ${s}</code>`,
                    statusText: `Updating running suffix product for next iteration.`,
                    log: `  s updated to ${s}`,
                    logColor: 'var(--accent-blue)'
                });
            }

            // FINAL STEP
            steps.push({
                type: 'final', phase: 'Done', i: '—', p: '—', s: '—',
                origStates: arr.map(() => 'past'),
                resVals: [...res],
                resStates: res.map(() => 'winning'),
                panel: 'Two-Pass Space-Optimized Array Traversal Complete.',
                complete: true,
                finalStr: `[${res.join(', ')}]`,
                statusText: `Done. Final result computed in O(n) time and O(1) extra space.`,
                log: `Final Result: [${res.join(', ')}]`,
                logColor: 'var(--accent-purple)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Original Array
            const origContainer = document.getElementById('orig-tiles');
            origContainer.innerHTML = '';
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.origStates[i]}`;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                origContainer.appendChild(wrapper);
            });

            // Render Result Array
            const resContainer = document.getElementById('res-tiles');
            resContainer.innerHTML = '';
            step.resVals.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.resStates[i]}`;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                resContainer.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-phase').innerText = step.phase;
            document.getElementById('val-i').innerText = step.i;
            document.getElementById('val-p').innerText = step.p;
            document.getElementById('val-s').innerText = step.s;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.finalStr : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerHTML = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
