<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Window Maximum - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* Input Bar */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        /* Array Tiles */
        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
        }

        .tile.idle { color: var(--text-dim); }
        .tile.candidate { 
            background: #2a1600; 
            border: 2px solid var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.12); 
            z-index: 2; 
        }
        .tile.max { 
            background: #0f2a1a; 
            border: 2px solid var(--accent-green); 
            color: var(--accent-green); 
            transform: scale(1.15); 
            box-shadow: 0 0 12px var(--accent-green);
        }
        .tile.past { opacity: 0.4; }

        /* Window Panel */
        .window-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            width: 560px;
            text-align: center;
            font-family: monospace;
        }

        .window-info {
            font-size: 15px;
            margin-bottom: 8px;
        }

        .action-text {
            margin-top: 10px;
            font-size: 14px;
            min-height: 24px;
            color: var(--accent-orange);
        }

        /* Info Panel */
        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* Result */
        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #res-val { 
            font-family: monospace; 
            font-size: 18px; 
            color: var(--accent-green); 
            transition: all 0.3s;
        }
        .pop { 
            animation: popAnim 400ms ease; 
            font-size: 26px !important;
        }

        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.28); }
            100% { transform: scale(1); }
        }

        .status-bar { 
            margin-top: 8px; 
            font-size: 13px; 
            color: var(--text-dim); 
            height: 1.2em; 
            text-align: center; 
        }

        /* Controls & Legend */
        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { 
            display: flex; 
            align-items: center; 
            font-size: 12px; 
            color: var(--text-dim); 
        }
        .dot { 
            width: 10px; 
            height: 10px; 
            border-radius: 50%; 
            margin-right: 6px; 
        }

        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 620px;
            max-width: 90%;
            height: 130px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-line { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">arr =</label>
        <input type="text" id="arr-input" placeholder="1,3,-1,-3,5,3,6,7" style="width: 280px;">
        <label class="array-label" style="margin-left: 12px;">k =</label>
        <input type="text" id="k-input" placeholder="3" style="width: 60px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,3,-1,-3,5,3,6,7], 3)">Example 1</button>
        <button onclick="loadExample([8,5,10,7,9,4,15,12,90,13], 4)">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">arr =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="window-panel" id="window-panel">
        <div class="window-info" id="window-info">Window [ — ] — Finding max...</div>
        <div id="action-text" class="action-text">—</div>
    </div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">start</div>
            <div class="info-value" id="val-start" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">end</div>
            <div class="info-value" id="val-end" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">current max</div>
            <div class="info-value" id="val-max" style="color: var(--accent-green);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">result so far</div>
            <div class="info-value" id="val-result" style="color: var(--accent-blue);">[]</div>
        </div>
    </div>

    <div class="result-display">
        <div class="info-label" style="font-size: 12px; margin-bottom: 4px;">final result =</div>
        <div id="res-val">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> Current window</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> Current maximum</div>
        <div class="legend-item"><div class="dot" style="background: var(--text-dim);"></div> Past elements</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentArr = [1,3,-1,-3,5,3,6,7];
        let currentK = 3;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample([1,3,-1,-3,5,3,6,7], 3);
        }

        function loadExample(arr, k) {
            currentArr = arr.slice();
            currentK = k;
            document.getElementById('arr-input').value = currentArr.join(', ');
            document.getElementById('k-input').value = k;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('arr-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const kVal = parseInt(document.getElementById('k-input').value.trim());
            if (arr.length > 0 && !isNaN(kVal) && kVal > 0) {
                currentArr = arr;
                currentK = kVal;
                generateSteps();
                reset();
            }
        }

        function generateSteps() {
            steps = [];
            const nums = currentArr.slice();
            const n = nums.length;
            const k = currentK;
            let result = [];

            // STEP 0: INIT
            steps.push({
                type: 'init',
                i: null,
                windowStart: null,
                windowEnd: null,
                currentMax: null,
                result: result.slice(),
                tileStates: Array(n).fill('idle'),
                status: `arr=[${nums}] k=${k} n=${n} — Starting brute force O(n×k)`,
                log: `Starting Sliding Window Maximum (brute force)`,
                logColor: '#8b949e',
                action: '—'
            });

            for (let i = 0; i <= n - k; i++) {
                let maxVal = nums[i];
                let maxIdx = i;

                // Start new window
                let tileStates = Array(n).fill('past');
                for (let j = i; j < i + k; j++) {
                    tileStates[j] = 'candidate';
                }

                steps.push({
                    type: 'new_window',
                    i: i,
                    windowStart: i,
                    windowEnd: i + k - 1,
                    currentMax: maxVal,
                    result: result.slice(),
                    tileStates: tileStates,
                    status: `Window [${i}..${i+k-1}] — scanning...`,
                    log: `New window starting at index ${i}`,
                    logColor: '#58a6ff',
                    action: `Window [${i} : ${i+k-1}]`
                });

                // Scan inside window
                for (let j = i + 1; j < i + k; j++) {
                    if (nums[j] > maxVal) {
                        maxVal = nums[j];
                        maxIdx = j;
                    }

                    let scanStates = Array(n).fill('past');
                    for (let p = i; p < i + k; p++) {
                        scanStates[p] = (p === maxIdx) ? 'max' : 'candidate';
                    }

                    steps.push({
                        type: 'scan',
                        i: i,
                        windowStart: i,
                        windowEnd: i + k - 1,
                        currentMax: maxVal,
                        result: result.slice(),
                        tileStates: scanStates,
                        status: `Checking index ${j}: nums[${j}]=${nums[j]}, current max = ${maxVal}`,
                        log: `nums[${j}]=${nums[j]} → max updated to ${maxVal}`,
                        logColor: nums[j] > maxVal ? '#3fb950' : '#8b949e',
                        action: `Compare ${nums[j]} with current max`
                    });
                }

                result.push(maxVal);

                steps.push({
                    type: 'update_result',
                    i: i,
                    windowStart: i,
                    windowEnd: i + k - 1,
                    currentMax: maxVal,
                    result: result.slice(),
                    tileStates: Array(n).fill('past'),
                    status: `✓ Window [${i}..${i+k-1}] max = ${maxVal}`,
                    log: `Added ${maxVal} to result`,
                    logColor: '#3fb950',
                    action: `Max = ${maxVal}`
                });
            }

            // FINAL
            steps.push({
                type: 'final',
                i: null,
                windowStart: null,
                windowEnd: null,
                currentMax: null,
                result: result.slice(),
                tileStates: Array(n).fill('past'),
                status: `Done. Result = [${result}]`,
                log: `Final result: [${result.join(', ')}]`,
                logColor: '#3fb950',
                bold: true,
                action: '—',
                finalResult: result
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render array tiles
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            currentArr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[i]}`;
                tile.innerText = val;
                const indexEl = document.createElement('div');
                indexEl.className = 'tile-index';
                indexEl.innerText = `[${i}]`;
                wrapper.appendChild(tile);
                wrapper.appendChild(indexEl);
                container.appendChild(wrapper);
            });

            // Window info
            const winInfo = document.getElementById('window-info');
            if (step.windowStart !== null) {
                winInfo.innerHTML = `Window [<span style="color:var(--accent-orange)">${step.windowStart}</span>..${step.windowEnd}]`;
            } else {
                winInfo.innerText = '—';
            }

            document.getElementById('action-text').innerText = step.action || '—';

            // Info panel
            document.getElementById('val-start').innerText = step.windowStart !== null ? step.windowStart : '—';
            document.getElementById('val-end').innerText = step.windowEnd !== null ? step.windowEnd : '—';
            document.getElementById('val-max').innerText = step.currentMax !== null ? step.currentMax : '—';
            document.getElementById('val-result').innerText = `[${step.result.join(', ')}]`;

            // Status
            document.getElementById('status-text').innerText = step.status;

            // Result
            const resVal = document.getElementById('res-val');
            if (step.finalResult) {
                resVal.innerText = `[${step.finalResult.join(', ')}]`;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            // Cumulative Log
            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    line.style.color = steps[k].logColor || '#c9d1d9';
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) {
                pause();
                play();
            }
        };

        window.onload = init;
    </script>
</body>
</html>
