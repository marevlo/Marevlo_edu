<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of Subarray Ranges - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }

        #array-input { width: 300px; }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
        }

        /* Tile States */
        .tile.idle { color: var(--text-dim); }
        .tile.past { opacity: 0.3; }
        .tile.start-i { 
            background: #2a1600; 
            border: 2px solid var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.12); 
            z-index: 2; 
        }
        .tile.in-sum { 
            background: #21262d; 
            border: 2px solid #e3b341; 
        }
        .tile.valid { 
            background: #0f2a1a; 
            border: 2px solid var(--accent-green); 
            color: var(--accent-green); 
            transform: scale(1.10); 
        }

        /* ROW 3: RANGE PANEL */
        .range-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            min-width: 480px;
            text-align: center;
            font-family: monospace;
            font-size: 15px;
        }

        .max-val { color: var(--accent-green); font-weight: 700; }
        .min-val { color: var(--accent-red); font-weight: 700; }
        .diff-val { color: var(--accent-orange); font-weight: 700; font-size: 18px; }

        /* ROW 4: INFO PANEL */
        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #res-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
        #res-val { 
            font-family: monospace; 
            font-size: 26px; 
            color: var(--accent-green); 
            transition: all 0.3s;
        }
        .pop { 
            animation: popAnim 400ms ease; 
            text-shadow: 0 0 16px var(--accent-green);
        }

        @keyframes popAnim {
            0%{transform:scale(1)} 50%{transform:scale(1.25)} 100%{transform:scale(1)}
        }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        /* ROW 7: CONTROLS */
        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        /* ROW 8: LEGEND */
        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 660px;
            max-width: 90%;
            height: 150px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-line { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">nums =</label>
        <input type="text" id="array-input" placeholder="1,2,3">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,2,3])">Example 1</button>
        <button onclick="loadExample([4,-2,-3,4,1])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">nums =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="range-panel" id="range-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">i (start)</div>
            <div class="info-value" id="val-i" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">j (end)</div>
            <div class="info-value" id="val-j" style="color: var(--accent-blue);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">current_max</div>
            <div class="info-value" id="val-max" style="color: var(--accent-green);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">current_min</div>
            <div class="info-value" id="val-min" style="color: var(--accent-red);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">diff</div>
            <div class="info-value" id="val-diff" style="color: var(--accent-orange);">0</div>
        </div>
        <div class="info-cell">
            <div class="info-label">total_sum</div>
            <div class="info-value" id="val-total" style="color: var(--accent-green);">0</div>
        </div>
    </div>

    <div class="result-display">
        <div id="res-label">Sum of all (max - min) =</div>
        <div id="res-val">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> Start i</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-blue);"></div> End j</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> Current max</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-red);"></div> Current min</div>
        <div class="legend-item"><div class="dot" style="background: var(--text-dim);"></div> Past</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentArray = [1, 2, 3];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample(currentArray);
        }

        function loadExample(arr) {
            currentArray = arr.slice(0, 10);
            document.getElementById('array-input').value = currentArray.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (arr.length > 0) loadExample(arr);
        }

        function generateSteps() {
            steps = [];
            const n = currentArray.length;
            let totalSum = 0;

            // STEP 0: INIT
            steps.push({
                type: 'init',
                i: null,
                j: null,
                current_max: null,
                current_min: null,
                diff: null,
                total: 0,
                tileStates: Array(n).fill('idle'),
                rangeDisplay: '—',
                status: `nums=[${currentArray}] — Brute force O(n³) sum of (max - min) for all subarrays`,
                log: `nums = [${currentArray}] — Starting brute force Sum of Subarray Ranges`
            });

            for (let i = 0; i < n; i++) {
                let curMax = currentArray[i];
                let curMin = currentArray[i];

                // STEP A: Start new start index i
                let tileStates = Array(n).fill(0).map((_, idx) => idx < i ? 'past' : 'idle');
                tileStates[i] = 'start-i';

                steps.push({
                    type: 'start-i',
                    i: i,
                    j: null,
                    current_max: curMax,
                    current_min: curMin,
                    diff: 0,
                    total: totalSum,
                    tileStates: tileStates,
                    rangeDisplay: `i=${i}: current_max=${curMax}, current_min=${curMin}`,
                    status: `i=${i}: Starting subarrays from index ${i}`,
                    log: `i=${i}: current_max=${curMax}, current_min=${curMin}`
                });

                for (let j = i; j < n; j++) {
                    // Update running max/min with current j
                    curMax = Math.max(curMax, currentArray[j]);
                    curMin = Math.min(curMin, currentArray[j]);
                    const diff = curMax - curMin;
                    totalSum += diff;

                    // Tile states for current subarray i to j
                    tileStates = Array(n).fill(0).map((_, idx) => {
                        if (idx < i) return 'past';
                        if (idx >= i && idx <= j) return 'in-sum';
                        return 'idle';
                    });
                    tileStates[i] = 'start-i';
                    tileStates[j] = 'valid';  // highlight end of current subarray

                    steps.push({
                        type: 'expand',
                        i: i,
                        j: j,
                        current_max: curMax,
                        current_min: curMin,
                        diff: diff,
                        total: totalSum,
                        tileStates: tileStates,
                        rangeDisplay: `max=${curMax}, min=${curMin}, diff=<span style="color:var(--accent-orange)">${diff}</span>`,
                        status: `j=${j}: subarray [${i}..${j}], range = ${diff}, total now = ${totalSum}`,
                        log: `  j=${j}: max=${curMax}, min=${curMin}, diff=${diff}, total_sum += ${diff} → ${totalSum}`,
                        logColor: '#3fb950'
                    });
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final',
                i: null,
                j: null,
                current_max: null,
                current_min: null,
                diff: null,
                total: totalSum,
                tileStates: Array(n).fill('past'),
                rangeDisplay: `Final sum of all (max - min) = <span style="color:var(--accent-green);font-size:22px;">${totalSum}</span>`,
                status: `Complete. Sum of subarray ranges = ${totalSum}`,
                log: `Final result: ${totalSum}`,
                logColor: '#388bfd',
                bold: true,
                result: totalSum
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Tiles
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            currentArray.forEach((val, pos) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[pos]}`;
                tile.innerText = val;
                const indexEl = document.createElement('div');
                indexEl.className = 'tile-index';
                indexEl.innerText = `[${pos}]`;
                wrapper.appendChild(tile);
                wrapper.appendChild(indexEl);
                container.appendChild(wrapper);
            });

            // Range panel
            const rangePanel = document.getElementById('range-panel');
            rangePanel.innerHTML = step.rangeDisplay || '—';

            // Info panel
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-max').innerText = step.current_max !== null ? step.current_max : '—';
            document.getElementById('val-min').innerText = step.current_min !== null ? step.current_min : '—';
            document.getElementById('val-diff').innerText = step.diff !== null ? step.diff : '—';
            document.getElementById('val-total').innerText = step.total;

            // Result
            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            // Status
            document.getElementById('status-text').innerText = step.status;

            // Log
            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) {
                pause();
                play();
            }
        };

        window.onload = init;
    </script>
</body>
</html>
