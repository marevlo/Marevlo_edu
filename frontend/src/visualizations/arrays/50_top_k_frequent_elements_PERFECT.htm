<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top K Frequent Elements - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"], input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .arr-input { width: 260px; }
        .k-input { width: 60px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%; }
        .array-row { display: flex; align-items: center; gap: 12px; min-height: 50px; justify-content: center; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-start; max-width: 800px; min-height: 50px; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main); padding: 0 6px;
        }
        .tile-index { font-size: 10px; color: var(--text-dim); font-family: monospace; }
        
        .freq-tile {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 13px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #161b22; border: 1px solid var(--border-main);
            color: var(--text-main); padding: 4px 8px; min-width: 50px;
        }
        .freq-key { color: var(--accent-blue); font-size: 14px; }
        .freq-val { color: var(--accent-orange); font-size: 12px; margin-top: 2px; }

        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.updated { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.08); box-shadow: 0 0 8px var(--accent-green); z-index: 3;}
        .tile.past { opacity: 0.4; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        .freq-tile.updated { background: #0d2244; border: 1px solid var(--accent-blue); transform: scale(1.08); box-shadow: 0 0 8px var(--accent-blue); }
        .freq-tile.sorted { background: #1e1030; border: 1px solid var(--accent-purple); }
        .freq-tile.winning { background: #0f2a1a; border: 1px solid var(--accent-green); transform: scale(1.05); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 680px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.4;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 100px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 18px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 24px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="arr-input" class="arr-input" placeholder="1, 1, 1, 2, 2, 3">
        <label class="ui-label">k =</label>
        <input type="number" id="k-input" class="k-input" placeholder="2" min="1">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1, 1, 1, 2, 2, 3], 2)">Ex 1</button>
        <button onclick="loadExample([7, 7, 8, 8, 8, 9], 1)">Ex 2</button>
        <button onclick="loadExample([4, 4, 4, 5, 5, 6, 6, 6, 6, 7], 2)">Ex 3</button>
    </div>

    <div class="visual-container">
        <div class="array-row">
            <div class="ui-label" style="width: 110px; text-align: right;">nums:</div>
            <div class="tiles-wrapper" id="orig-tiles"></div>
        </div>
        <div class="array-row">
            <div class="ui-label" style="width: 110px; text-align: right;">Freq Map:</div>
            <div class="tiles-wrapper" id="freq-tiles"></div>
        </div>
        <div class="array-row">
            <div class="ui-label" style="width: 110px; text-align: right;">Top K Result:</div>
            <div class="tiles-wrapper" id="res-tiles"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Phase</span>
            <span class="info-value" id="val-phase" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">nums[i]</span>
            <span class="info-value" id="val-val" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">k Target</span>
            <span class="info-value" id="val-k" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Top K Elements =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Reading Element</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Freq Map Updated</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple)"></span> Sorted by Freq</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Added to Top K</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [1, 1, 1, 2, 2, 3];
        let targetK = 2;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([1, 1, 1, 2, 2, 3], 2); }

        function loadExample(newArr, newK) {
            arr = [...newArr];
            targetK = parseInt(newK);
            document.getElementById('arr-input').value = arr.join(', ');
            document.getElementById('k-input').value = targetK;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('arr-input').value;
            const kStr = document.getElementById('k-input').value;
            const parsedArr = valStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const parsedK = parseInt(kStr);
            
            if (parsedArr.length > 0 && !isNaN(parsedK) && parsedK > 0) {
                // Limit length for visual clarity
                loadExample(parsedArr.slice(0, 15), Math.min(parsedK, parsedArr.length));
            } else {
                alert("Invalid input. Provide an array of numbers and a valid k > 0.");
            }
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;
            let k = targetK;

            if (n === 0) return;

            let freq = {};
            let freqMapHistory = []; // to track map state
            let res = [];

            // STEP 0: INIT
            steps.push({
                type: 'init', phase: '1. Count Frequencies', i: '—', val: '—',
                origStates: arr.map(() => 'idle'),
                freqState: [],
                resVals: [],
                resStates: [],
                panel: 'Initialize an empty Hash Map to count the frequencies of each element.',
                statusText: `array=[${arr.join(', ')}], k=${k}. Click Play to begin.`,
                log: `n=${n}, k=${k}. Starting Hash Map Frequency Count.`,
                logColor: 'var(--text-dim)'
            });

            // PHASE 1: COUNT
            for (let i = 0; i < n; i++) {
                let val = arr[i];
                
                // Select
                let currentMapState = Object.keys(freq).map(key => ({ k: key, v: freq[key], state: 'idle' }));
                steps.push({
                    type: 'count-eval', phase: '1. Count Frequencies', i: i, val: val,
                    origStates: arr.map((v, idx) => idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')),
                    freqState: currentMapState,
                    resVals: [...res],
                    resStates: res.map(() => 'idle'),
                    panel: `Reading element <b>${val}</b>. Check if it exists in the frequency map.`,
                    statusText: `Scanning array index ${i}...`,
                    log: `i=${i}: Read nums[${i}] = ${val}.`,
                    logColor: 'var(--text-main)'
                });

                freq[val] = (freq[val] || 0) + 1;

                // Update
                let updatedMapState = Object.keys(freq).map(key => {
                    return { k: key, v: freq[key], state: key == val ? 'updated' : 'idle' };
                });
                steps.push({
                    type: 'count-update', phase: '1. Count Frequencies', i: i, val: val,
                    origStates: arr.map((v, idx) => idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')),
                    freqState: updatedMapState,
                    resVals: [...res],
                    resStates: res.map(() => 'idle'),
                    panel: `Increment the frequency of <b>${val}</b> to <span style="color:var(--accent-orange)">${freq[val]}</span>.`,
                    statusText: `Frequency map updated.`,
                    log: `  freq[${val}] = ${freq[val]} ✓`,
                    logColor: 'var(--accent-blue)'
                });
            }

            // PHASE 2: SORT
            steps.push({
                type: 'transition', phase: '2. Sort by Frequency', i: '—', val: '—',
                origStates: arr.map(() => 'past'),
                freqState: Object.keys(freq).map(key => ({ k: key, v: freq[key], state: 'idle' })),
                resVals: [...res],
                resStates: res.map(() => 'idle'),
                panel: 'Frequency map built. Now, extract the unique elements and sort them by their frequencies in descending order.',
                statusText: `Sorting unique elements...`,
                log: `Frequency count complete. Sorting elements by frequency.`,
                logColor: 'var(--accent-purple)'
            });

            let unique = Object.keys(freq).map(Number);
            unique.sort((a, b) => freq[b] - freq[a]);

            let sortedMapState = unique.map(key => ({ k: key, v: freq[key], state: 'sorted' }));
            steps.push({
                type: 'sorted', phase: '2. Sort by Frequency', i: '—', val: '—',
                origStates: arr.map(() => 'past'),
                freqState: sortedMapState,
                resVals: [...res],
                resStates: res.map(() => 'idle'),
                panel: 'Elements are now sorted from highest frequency to lowest frequency.',
                statusText: `Elements sorted successfully.`,
                log: `Sorted unique elements: [${unique.join(', ')}]`,
                logColor: 'var(--accent-purple)'
            });

            // PHASE 3: EXTRACT TOP K
            let actualK = Math.min(k, unique.length);
            for (let i = 0; i < actualK; i++) {
                let topVal = unique[i];

                steps.push({
                    type: 'extract-eval', phase: '3. Extract Top K', i: i, val: topVal,
                    origStates: arr.map(() => 'past'),
                    freqState: unique.map((key, idx) => ({ k: key, v: freq[key], state: idx === i ? 'candidate' : (idx < i ? 'winning' : 'sorted') })),
                    resVals: [...res],
                    resStates: res.map(() => 'winning'),
                    panel: `Selecting the rank ${i+1} most frequent element: <b>${topVal}</b> (appears ${freq[topVal]} times).`,
                    statusText: `Extracting element ${i+1} of ${actualK}...`,
                    log: `Rank ${i+1}: Element ${topVal} with frequency ${freq[topVal]}.`,
                    logColor: 'var(--text-main)'
                });

                res.push(topVal);

                steps.push({
                    type: 'extract-add', phase: '3. Extract Top K', i: i, val: topVal,
                    origStates: arr.map(() => 'past'),
                    freqState: unique.map((key, idx) => ({ k: key, v: freq[key], state: idx <= i ? 'winning' : 'sorted' })),
                    resVals: [...res],
                    resStates: res.map((v, idx) => idx === res.length - 1 ? 'winning' : 'winning'),
                    panel: `<span style="color:var(--accent-green)">Added <b>${topVal}</b> to the Top K result array!</span>`,
                    statusText: `Element added to results.`,
                    log: `  Added ${topVal} to result ✓`,
                    logColor: 'var(--accent-green)'
                });
            }

            // FINAL STEP
            steps.push({
                type: 'final', phase: 'Done', i: '—', val: '—',
                origStates: arr.map(() => 'past'),
                freqState: unique.map((key, idx) => ({ k: key, v: freq[key], state: idx < actualK ? 'winning' : 'past' })),
                resVals: [...res],
                resStates: res.map(() => 'winning'),
                panel: 'Top K Extraction Complete.',
                complete: true,
                finalStr: `[${res.join(', ')}]`,
                statusText: `Done. Found the top ${actualK} most frequent elements.`,
                log: `Final Result: [${res.join(', ')}]`,
                logColor: 'var(--accent-green)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Original Array
            const origContainer = document.getElementById('orig-tiles');
            origContainer.innerHTML = '';
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.origStates[i]}`;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                origContainer.appendChild(wrapper);
            });

            // Render Freq Map
            const freqContainer = document.getElementById('freq-tiles');
            freqContainer.innerHTML = '';
            if (step.freqState.length === 0) {
                const empty = document.createElement('div');
                empty.style.color = 'var(--text-dim)';
                empty.style.fontSize = '14px';
                empty.style.fontFamily = 'monospace';
                empty.style.padding = '10px 0';
                empty.innerText = '{}';
                freqContainer.appendChild(empty);
            } else {
                step.freqState.forEach((item, i) => {
                    const tile = document.createElement('div');
                    tile.className = `freq-tile ${item.state}`;
                    
                    const keyDiv = document.createElement('div');
                    keyDiv.className = 'freq-key';
                    keyDiv.innerText = item.k;
                    
                    const valDiv = document.createElement('div');
                    valDiv.className = 'freq-val';
                    valDiv.innerText = `count: ${item.v}`;
                    
                    tile.appendChild(keyDiv);
                    tile.appendChild(valDiv);
                    freqContainer.appendChild(tile);
                });
            }

            // Render Result Array
            const resContainer = document.getElementById('res-tiles');
            resContainer.innerHTML = '';
            if (step.resVals.length === 0) {
                const empty = document.createElement('div');
                empty.style.color = 'var(--text-dim)';
                empty.style.fontSize = '14px';
                empty.style.fontFamily = 'monospace';
                empty.style.padding = '10px 0';
                empty.innerText = '[]';
                resContainer.appendChild(empty);
            } else {
                step.resVals.forEach((val, i) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'tile-unit';
                    const tile = document.createElement('div');
                    tile.className = `tile ${step.resStates[i]}`;
                    tile.innerText = val;
                    const idxLabel = document.createElement('div');
                    idxLabel.className = 'tile-index';
                    idxLabel.innerText = `rank ${i+1}`;
                    wrapper.append(tile, idxLabel);
                    resContainer.appendChild(wrapper);
                });
            }

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-phase').innerText = step.phase;
            document.getElementById('val-i').innerText = step.i;
            document.getElementById('val-val').innerText = step.val;
            document.getElementById('val-k').innerText = targetK;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.finalStr : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerHTML = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
