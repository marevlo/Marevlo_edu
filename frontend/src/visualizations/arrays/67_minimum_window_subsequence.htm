<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Window Subsequence - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--btn-hover); }

        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 4px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 38px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile-index {
            font-size: 9px;
            color: var(--text-dim);
        }

        .tile.idle { }
        .tile.current { background: var(--accent-orange); border-color: var(--accent-orange); transform: scale(1.08); }
        .tile.in-window { background: #2a1600; border: 2px solid var(--accent-orange); }
        .tile.matched { border: 3px solid var(--accent-green); }

        .sum-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            min-width: 520px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }

        .info-panel {
            margin-top: 12px;
            display: flex;
            gap: 12px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            min-width: 110px;
            text-align: center;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        .result-display {
            margin-top: 12px;
        }
        #res-val { font-family: monospace; font-size: 18px; color: var(--accent-green); transition: all 0.3s; }
        .pop { animation: popAnim 500ms ease; font-size: 28px; }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.25)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); min-height: 1.4em; }

        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend {
            margin-top: 16px;
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }

        .log-panel {
            margin-top: 16px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 720px;
            max-width: 90%;
            height: 140px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">s =</label>
        <input type="text" id="s-input" placeholder="abcdebdde" style="width: 260px;">
        <label class="array-label">t =</label>
        <input type="text" id="t-input" placeholder="bde" style="width: 80px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('abcdebdde', 'bde')">Example 1</button>
        <button onclick="loadExample('jmeqksfrsdcmsiwvaovztaqenprpvnbstl', 'k')">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size: 12px;">s =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="sum-panel" id="sum-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">Window [i..j]</div>
            <div class="info-value" id="val-window" style="color: var(--accent-orange);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Contains t?</div>
            <div class="info-value" id="val-contains" style="color: var(--accent-green);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Min Length</div>
            <div class="info-value" id="val-minlen" style="color: var(--accent-blue);">∞</div>
        </div>
    </div>

    <div class="result-display">
        <div id="res-label">Minimum Window = </div>
        <div id="res-val">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width: 80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-orange);"></div> Current Window</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-green);"></div> Valid Match</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-blue);"></div> Minimum Window</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentS = "abcdebdde";
        let currentT = "bde";
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1400, 700, 350];

        function init() {
            loadExample("abcdebdde", "bde");
        }

        function loadExample(s, t) {
            currentS = s;
            currentT = t;
            document.getElementById('s-input').value = currentS;
            document.getElementById('t-input').value = currentT;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const sVal = document.getElementById('s-input').value.trim();
            const tVal = document.getElementById('t-input').value.trim();
            if (sVal && tVal) {
                currentS = sVal;
                currentT = tVal;
                generateSteps();
                reset();
            }
        }

        function containsSubsequence(window, t) {
            let j = 0;
            for (let char of window) {
                if (j < t.length && char === t[j]) j++;
            }
            return j === t.length;
        }

        function generateSteps() {
            steps = [];
            const n = currentS.length;
            let minLen = Infinity;
            let minStart = -1;
            let bestWindow = "";

            steps.push({
                type: 'init',
                s: currentS,
                t: currentT,
                i: -1,
                j: -1,
                windowStr: "",
                contains: false,
                minLen: Infinity,
                minWindow: "",
                tileStates: Array(n).fill('idle'),
                status: `s = "${currentS}", t = "${currentT}" — Brute force checking all windows`,
                log: `Starting Minimum Window Subsequence — Brute Force O(n²·m)`
            });

            for (let i = 0; i < n; i++) {
                for (let j = i; j < n; j++) {
                    const windowStr = currentS.substring(i, j + 1);
                    const contains = containsSubsequence(windowStr, currentT);
                    const len = j - i + 1;

                    let tileStates = Array(n).fill('idle');
                    for (let k = i; k <= j; k++) tileStates[k] = 'in-window';
                    if (contains) tileStates[i] = 'current'; // highlight start

                    const isNewMin = contains && len < minLen;

                    steps.push({
                        type: 'check_window',
                        s: currentS,
                        t: currentT,
                        i: i,
                        j: j,
                        windowStr: windowStr,
                        contains: contains,
                        minLen: minLen,
                        minWindow: bestWindow,
                        tileStates: tileStates,
                        status: `Window [${i}..${j}] = "${windowStr}" → contains t? ${contains} (len=${len})`,
                        log: `i=${i} j=${j} "${windowStr}" → ${contains ? 'YES' : 'NO'}`
                    });

                    if (isNewMin) {
                        minLen = len;
                        minStart = i;
                        bestWindow = windowStr;
                        steps.push({
                            type: 'new_min',
                            s: currentS,
                            t: currentT,
                            i: i,
                            j: j,
                            windowStr: windowStr,
                            contains: true,
                            minLen: minLen,
                            minWindow: bestWindow,
                            tileStates: tileStates,
                            status: `New minimum window found: "${windowStr}" (length ${minLen})`,
                            log: `New min window "${windowStr}" length=${minLen}`,
                            logColor: 'var(--accent-green)'
                        });
                    }
                }
            }

            steps.push({
                type: 'final',
                s: currentS,
                t: currentT,
                i: minStart,
                j: minStart + minLen - 1,
                windowStr: bestWindow,
                contains: true,
                minLen: minLen,
                minWindow: bestWindow,
                tileStates: Array(n).fill('past'),
                status: `Done. Minimum window = "${bestWindow}"`,
                log: `Final Result: "${bestWindow}"`,
                logColor: 'var(--accent-blue)',
                bold: true,
                result: bestWindow
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.s.split('').forEach((char, i) => {
                const unit = document.createElement('div');
                unit.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[i]}`;
                tile.innerText = char;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                unit.appendChild(tile);
                unit.appendChild(idxLabel);
                container.appendChild(unit);
            });

            let scanHTML = `Window [${step.i}..${step.j}] = "${step.windowStr}"`;
            if (step.contains) scanHTML += ` <span style="color:var(--accent-green)">✓ contains "${step.t}"</span>`;
            document.getElementById('sum-panel').innerHTML = scanHTML;

            document.getElementById('val-window').innerText = step.windowStr || '—';
            document.getElementById('val-contains').innerText = step.contains ? 'YES' : 'NO';
            document.getElementById('val-minlen').innerText = step.minLen === Infinity ? '∞' : step.minLen;

            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = `"${step.result}"`;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.status;

            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) { pause(); play(); }
        };

        window.onload = init;
    </script>
</body>
</html>
