<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-th Smallest Pair Distance - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label { font-family: 'Courier New', monospace; font-size: 14px; color: var(--text-dim); }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 280px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
        }

        button:hover { background: var(--btn-hover); }

        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile {
            min-width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile.idle { }
        .tile.current { background: var(--accent-orange); transform: scale(1.12); }
        .tile.pair { background: var(--accent-red); }

        .diff-list {
            margin-top: 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 18px;
            min-width: 520px;
            font-family: monospace;
            font-size: 14px;
        }

        .sum-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 14px 22px;
            min-width: 560px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }

        .info-panel {
            margin-top: 12px;
            display: flex;
            gap: 20px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 10px 18px;
            min-width: 130px;
            text-align: center;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 20px; font-weight: 700; color: var(--accent-green); }

        .result-display { margin-top: 16px; font-size: 26px; }
        #res-val { color: var(--accent-green); transition: all 0.4s; }
        .pop { animation: popAnim 500ms ease; }

        @keyframes popAnim { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); min-height: 1.5em; }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 10px; }

        .legend { margin-top: 16px; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; font-size: 13px; color: var(--text-dim); }

        .log-panel {
            margin-top: 16px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 740px;
            max-width: 94%;
            height: 170px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">nums =</label>
        <input type="text" id="array-input" value="1,3,1" style="width: 220px;">
        <label class="array-label">k =</label>
        <input type="text" id="k-input" value="1" style="width: 60px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,3,1], 1)">Example 1</button>
        <button onclick="loadExample([1,6,2,5], 3)">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size:12px;">Array</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="diff-list" id="diff-list">Differences: [] (sorted later)</div>

    <div class="sum-panel" id="sum-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">Current Pair</div>
            <div class="info-value" id="val-pair">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Diff</div>
            <div class="info-value" id="val-diff" style="color:var(--accent-red);">—</div>
        </div>
        <div class="info-cell">
            <div class="info-label">k-th</div>
            <div class="info-value" id="val-kth" style="color:var(--accent-green);">—</div>
        </div>
    </div>

    <div class="result-display">
        K-th Smallest Distance = <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width:88px;">Play</button>
        <button onclick="next()">Next →</button>
        <input type="range" id="speed-slider" min="0" max="2" value="1" style="width:160px;">
    </div>

    <div class="legend">
        <div>🟠 Current Pair</div>
        <div>🔴 Difference</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentNums = [1,3,1];
        let currentK = 1;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;
        const delays = [1300, 650, 300];

        function init() {
            loadExample([1,3,1], 1);
        }

        function loadExample(nums, k) {
            currentNums = nums.slice();
            currentK = k;
            document.getElementById('array-input').value = currentNums.join(',');
            document.getElementById('k-input').value = currentK;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const kVal = parseInt(document.getElementById('k-input').value);
            const nums = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (nums.length > 1 && !isNaN(kVal)) {
                currentNums = nums;
                currentK = kVal;
                generateSteps();
                reset();
            }
        }

        function generateSteps() {
            steps = [];
            let arr = currentNums.slice();
            let n = arr.length;
            let diffs = [];

            steps.push({
                type: 'init',
                arr: arr.slice(),
                diffs: [],
                k: currentK,
                tileStates: Array(n).fill('idle'),
                status: `nums = [${arr}], k = ${currentK} — Generating all pair differences`,
                log: `Starting K-th Smallest Pair Distance (Brute Force)`
            });

            // Generate pairs step by step
            for (let i = 0; i < n; i++) {
                for (let j = i+1; j < n; j++) {
                    let diff = Math.abs(arr[i] - arr[j]);
                    diffs.push(diff);

                    let states = Array(n).fill('idle');
                    states[i] = 'pair';
                    states[j] = 'pair';

                    steps.push({
                        type: 'pair',
                        arr: arr.slice(),
                        diffs: diffs.slice(),
                        i: i, j: j,
                        diff: diff,
                        tileStates: states,
                        status: `Pair (${arr[i]}, ${arr[j]}) → diff = ${diff}`,
                        log: `Pair (${i},${j}) diff=${diff}`
                    });
                }
            }

            // Sort differences
            let sortedDiffs = diffs.slice().sort((a,b) => a - b);
            steps.push({
                type: 'sort',
                arr: arr.slice(),
                diffs: sortedDiffs,
                tileStates: Array(n).fill('idle'),
                status: `All differences: ${diffs} → Sorted: ${sortedDiffs}`,
                log: `Sorted differences: ${sortedDiffs}`
            });

            // Final result
            let result = sortedDiffs[currentK-1];
            steps.push({
                type: 'final',
                arr: arr.slice(),
                diffs: sortedDiffs,
                result: result,
                tileStates: Array(n).fill('idle'),
                status: `K-th smallest (k=${currentK}) = ${result}`,
                log: `Final Answer: ${result}`,
                logColor: 'var(--accent-green)',
                bold: true,
                result: result
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.arr.forEach((val, i) => {
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[i]}`;
                tile.innerText = val;
                container.appendChild(tile);
            });

            document.getElementById('sum-panel').innerHTML = step.status || '—';
            document.getElementById('diff-list').innerText = `Differences: ${step.diffs || []} (sorted when ready)`;

            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.status || '';

            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.color = steps[k].logColor || 'var(--text-log)';
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) { pause(); play(); }
        };

        window.onload = init;
    </script>
</body>
</html>
