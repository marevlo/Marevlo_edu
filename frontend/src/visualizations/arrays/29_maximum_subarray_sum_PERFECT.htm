<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximum Subarray Sum - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 280px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.candidate-comparing { background: linear-gradient(135deg, #2a1600 50%, #0d2244 50%); border: 2px solid var(--accent-blue); color: var(--text-main); transform: scale(1.12); z-index: 2; }
        .tile.window { background: #0d2244; border: 1px solid var(--accent-blue); color: var(--accent-blue); opacity: 0.8; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.06); z-index: 2; }
        .tile.maximum { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); box-shadow: 0 0 12px var(--accent-green); transform: scale(1.15); z-index: 3;}
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.8; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 550px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 100px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 700px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">array =</label>
        <input type="text" id="arr-input" placeholder="-2, 1, -3, 4, -1, 2, 1, -5, 4">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([-2, 1, -3, 4, -1, 2, 1, -5, 4])">Ex 1</button>
        <button onclick="loadExample([1, -1, 2])">Ex 2</button>
    </div>

    <div class="array-container">
        <div class="ui-label" style="font-size: 12px; white-space: nowrap;">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Start (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">End (j)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Sum</span>
            <span class="info-value" id="val-curr" style="color: var(--text-main);">0</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Max Sum</span>
            <span class="info-value" id="val-max" style="color: var(--accent-green);">-∞</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">maximum subarray sum =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Start (i)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> End (j)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); opacity:0.8; border: 1px solid var(--accent-blue);"></span> Current Subarray</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> New Maximum Found</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Outside Subarray</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [-2, 1, -3, 4, -1, 2, 1, -5, 4];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([-2, 1, -3, 4, -1, 2, 1, -5, 4]); }

        function loadExample(newArr) {
            arr = [...newArr];
            document.getElementById('arr-input').value = arr.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valArr = document.getElementById('arr-input').value;
            const parsedArr = valArr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (parsedArr.length > 0) {
                // To keep visualization clean, limit length
                loadExample(parsedArr.slice(0, 15));
            }
        }

        function getTileState(idx, i, j) {
            if (idx === i && i === j) return 'candidate-comparing';
            if (idx === i) return 'candidate';
            if (idx === j) return 'comparing';
            if (idx > i && idx < j) return 'window';
            return 'past';
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;
            let maxSum = -Infinity;
            let bestStart = -1;
            let bestEnd = -1;

            if (n === 0) return;

            // STEP 0: INIT
            steps.push({
                type: 'init', i: '—', j: '—', currentSum: 0, maxSum: '-∞',
                tiles: arr.map(v => ({val: v, state: 'idle'})),
                panel: '—',
                statusText: `array=[${arr.join(', ')}] n=${n}. Click Play to begin.`,
                log: `n=${n}. Starting Brute Force O(n²) maximum subarray sum search.`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 0; i < n; i++) {
                let currentSum = 0;

                steps.push({
                    type: 'outer', i: i, j: '—', currentSum: 0, maxSum: maxSum === -Infinity ? '-∞' : maxSum,
                    tiles: arr.map((v, idx) => ({
                        val: v,
                        state: idx === i ? 'candidate' : 'past'
                    })),
                    panel: `Start new subarray at index i=${i} (value: ${arr[i]})`,
                    statusText: `Outer loop i=${i}: Reset current_sum = 0`,
                    log: `i=${i}: Starting new subarray from index ${i}`,
                    logColor: 'var(--accent-orange)'
                });

                for (let j = i; j < n; j++) {
                    currentSum += arr[j];

                    // STEP A: Expand window to j
                    steps.push({
                        type: 'inner', i: i, j: j, currentSum: currentSum, maxSum: maxSum === -Infinity ? '-∞' : maxSum,
                        tiles: arr.map((v, idx) => ({
                            val: v,
                            state: getTileState(idx, i, j)
                        })),
                        panel: `Expanding subarray to j=${j}. Added ${arr[j]} → current_sum = ${currentSum}`,
                        statusText: `Inner loop j=${j}: Calculating sum of subarray [${i}..${j}]`,
                        log: `  j=${j}: Subarray [${i}..${j}] sum = ${currentSum}`,
                        logColor: 'var(--text-main)'
                    });

                    // STEP B: Check max
                    if (currentSum > maxSum) {
                        maxSum = currentSum;
                        bestStart = i;
                        bestEnd = j;

                        steps.push({
                            type: 'new_max', i: i, j: j, currentSum: currentSum, maxSum: maxSum,
                            tiles: arr.map((v, idx) => ({
                                val: v,
                                state: (idx >= i && idx <= j) ? 'winning' : 'past'
                            })),
                            panel: `<span style="color:var(--accent-green)">✓ New maximum sum found! ${currentSum} > previous max</span>`,
                            statusText: `Updated max_sum to ${maxSum}`,
                            log: `  New max_sum = ${maxSum} found at subarray [${i}..${j}] ✓`,
                            logColor: 'var(--accent-green)'
                        });
                    } else {
                        steps.push({
                            type: 'no_max', i: i, j: j, currentSum: currentSum, maxSum: maxSum,
                            tiles: arr.map((v, idx) => ({
                                val: v,
                                state: getTileState(idx, i, j)
                            })),
                            panel: `current_sum (${currentSum}) is not greater than max_sum (${maxSum === -Infinity ? '-∞' : maxSum})`,
                            statusText: `Continue expanding subarray...`,
                            log: null,
                            logColor: 'var(--text-dim)'
                        });
                    }
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final', i: '—', j: '—', currentSum: '—', maxSum: maxSum,
                tiles: arr.map((v, idx) => ({
                    val: v,
                    state: (idx >= bestStart && idx <= bestEnd) ? 'maximum' : 'past'
                })),
                panel: 'All Subarrays Traversed',
                complete: true,
                result: maxSum,
                statusText: `Done. The maximum subarray sum is ${maxSum} (from index ${bestStart} to ${bestEnd}).`,
                log: `Final result: max_sum = ${maxSum} on subarray [${bestStart}..${bestEnd}]`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-i').innerText = step.i;
            document.getElementById('val-j').innerText = step.j;
            document.getElementById('val-curr').innerText = step.currentSum;
            document.getElementById('val-max').innerText = step.maxSum;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
