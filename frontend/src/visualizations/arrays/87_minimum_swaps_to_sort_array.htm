<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Swaps to Sort Array - Bubble Sort Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label { font-family: 'Courier New', monospace; font-size: 14px; color: var(--text-dim); }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 320px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
        }

        button:hover { background: var(--btn-hover); }

        .array-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tiles-wrapper {
            display: flex;
            gap: 6px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile.idle { }
        .tile.current { background: var(--accent-orange); transform: scale(1.12); }
        .tile.swap { background: var(--accent-red); animation: swapAnim 400ms; }

        @keyframes swapAnim {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.3) rotate(8deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .tile-index { font-size: 10px; color: var(--text-dim); }

        .sum-panel {
            margin-top: 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 14px 24px;
            min-width: 560px;
            text-align: center;
            font-family: monospace;
            font-size: 15px;
        }

        .info-panel {
            margin-top: 14px;
            display: flex;
            gap: 20px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 10px 18px;
            min-width: 130px;
            text-align: center;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 22px; font-weight: 700; color: var(--accent-green); }

        .result-display { margin-top: 16px; font-size: 26px; font-weight: 600; }
        #res-val { color: var(--accent-green); transition: all 0.4s; }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); min-height: 1.6em; }

        .controls { margin-top: 26px; display: flex; align-items: center; gap: 10px; }

        .legend { margin-top: 18px; display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; font-size: 13px; color: var(--text-dim); }

        .log-panel {
            margin-top: 18px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 14px 18px;
            width: 740px;
            max-width: 94%;
            height: 170px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13.5px;
            line-height: 1.45;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">nums =</label>
        <input type="text" id="array-input" value="4,3,2,1" style="width: 280px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([4,3,2,1])">Example 1</button>
        <button onclick="loadExample([1,5,4,3,2])">Example 2</button>
    </div>

    <div class="array-container">
        <div class="array-label" style="font-size:12px;">Array</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="sum-panel" id="sum-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <div class="info-label">Swaps</div>
            <div class="info-value" id="val-swaps" style="color:var(--accent-red);">0</div>
        </div>
        <div class="info-cell">
            <div class="info-label">Pass</div>
            <div class="info-value" id="val-pass">—</div>
        </div>
    </div>

    <div class="result-display">
        Minimum swaps = <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text">Ready...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width:88px;">Play</button>
        <button onclick="next()">Next →</button>
        <input type="range" id="speed-slider" min="0" max="2" value="1" style="width:160px;">
    </div>

    <div class="legend">
        <div>🟠 Comparing</div>
        <div>🔴 Swapping</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentNums = [4,3,2,1];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;
        const delays = [1200, 600, 300];

        function init() {
            loadExample([4,3,2,1]);
        }

        function loadExample(nums) {
            currentNums = nums.slice();
            document.getElementById('array-input').value = currentNums.join(',');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('array-input').value;
            const nums = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (nums.length > 0) {
                currentNums = nums;
                generateSteps();
                reset();
            }
        }

        function generateSteps() {
            steps = [];
            let arr = currentNums.slice();
            let n = arr.length;
            let totalSwaps = 0;

            steps.push({
                type: 'init',
                arr: arr.slice(),
                swaps: 0,
                pass: 0,
                i: -1, j: -1,
                tileStates: Array(n).fill('idle'),
                status: `nums = [${arr}] — Bubble Sort Swap Counting`,
                log: `Starting Minimum Swaps to Sort Array (Bubble Sort)`
            });

            for (let i = 0; i < n-1; i++) {
                for (let j = 0; j < n-i-1; j++) {
                    let states = Array(n).fill('idle');
                    states[j] = 'current';
                    states[j+1] = 'current';

                    steps.push({
                        type: 'compare',
                        arr: arr.slice(),
                        swaps: totalSwaps,
                        pass: i+1,
                        i: i, j: j,
                        tileStates: states,
                        status: `Pass ${i+1}, comparing indices ${j} & ${j+1} (${arr[j]} > ${arr[j+1]}?)`,
                        log: `Compare ${arr[j]} > ${arr[j+1]}`
                    });

                    if (arr[j] > arr[j+1]) {
                        // Swap
                        [arr[j], arr[j+1]] = [arr[j+1], arr[j]];
                        totalSwaps++;

                        let swapStates = Array(n).fill('idle');
                        swapStates[j] = 'swap';
                        swapStates[j+1] = 'swap';

                        steps.push({
                            type: 'swap',
                            arr: arr.slice(),
                            swaps: totalSwaps,
                            pass: i+1,
                            i: i, j: j,
                            tileStates: swapStates,
                            status: `Swap performed → [${arr}]`,
                            log: `Swapped → swaps = ${totalSwaps}`
                        });
                    }
                }
            }

            steps.push({
                type: 'final',
                arr: arr.slice(),
                swaps: totalSwaps,
                pass: n-1,
                i: -1, j: -1,
                tileStates: Array(n).fill('idle'),
                status: `Array sorted! Minimum swaps = ${totalSwaps}`,
                log: `Final Result: ${totalSwaps}`,
                logColor: 'var(--accent-green)',
                bold: true,
                result: totalSwaps
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.arr.forEach((val, i) => {
                const unit = document.createElement('div');
                unit.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.tileStates[i]}`;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = i;
                unit.appendChild(tile);
                unit.appendChild(idxLabel);
                container.appendChild(unit);
            });

            document.getElementById('sum-panel').innerHTML = step.status || '—';
            document.getElementById('val-swaps').innerText = step.swaps;
            document.getElementById('val-pass').innerText = step.pass || '—';

            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result;
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.status || '';

            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.color = steps[k].logColor || 'var(--text-log)';
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = function() {
            if (isPlaying) { pause(); play(); }
        };

        window.onload = init;
    </script>
</body>
</html>
