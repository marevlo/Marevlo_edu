<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prefix Sums & Range Queries - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .arr-input { width: 220px; }
        .query-input { width: 260px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .array-row { display: flex; align-items: center; gap: 12px; min-height: 50px; justify-content: center; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-start; max-width: 800px; min-height: 50px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 16px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main); padding: 0 6px;
        }
        .tile-index { font-size: 10px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.08); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.12); box-shadow: 0 0 8px var(--accent-green); z-index: 3;}
        .tile.target { background: #1e1030; border: 2px solid var(--accent-purple); color: var(--accent-purple); transform: scale(1.12); z-index: 3; }
        .tile.defeated { background: #2a0d0d; border: 2px solid var(--accent-red); color: var(--accent-red); transform: scale(1.12); z-index: 3; box-shadow: 0 0 8px var(--accent-red);}
        .tile.past { opacity: 0.4; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 650px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.4;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 100px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 18px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; max-width: 800px; text-align: center; word-wrap: break-word; font-weight: bold;}
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 22px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 650px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">arr =</label>
        <input type="text" id="arr-input" class="arr-input" placeholder="1, 2, 3, 4, 5">
        <label class="ui-label">queries =</label>
        <input type="text" id="queries-input" class="query-input" placeholder="[0,2], [1,3]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1, 2, 3, 4, 5], '[[0, 2], [1, 3]]')">Ex 1</button>
        <button onclick="loadExample([10, -5, 7, 3], '[[0, 0], [0, 3], [2, 3]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="array-row">
            <div class="ui-label" style="width: 80px; text-align: right;">arr (i)</div>
            <div class="tiles-wrapper" id="orig-tiles"></div>
        </div>
        <div class="array-row">
            <div class="ui-label" style="width: 80px; text-align: right;">prefix (i)</div>
            <div class="tiles-wrapper" id="prefix-tiles"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Phase</span>
            <span class="info-value" id="val-phase" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Range [l, r]</span>
            <span class="info-value" id="val-range" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">prefix[r+1]</span>
            <span class="info-value" id="val-right" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">- prefix[l]</span>
            <span class="info-value" id="val-left" style="color: var(--accent-red);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Sum Result</span>
            <span class="info-value" id="val-ans" style="color: var(--accent-purple);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Query Results =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Current Array Value</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Subarray Range (Query)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); box-shadow: 0 0 4px var(--accent-green)"></span> Positive Cumulative (prefix[r+1])</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red); box-shadow: 0 0 4px var(--accent-red)"></span> Negative Cumulative (prefix[l])</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let arr = [1, 2, 3, 4, 5];
        let queriesInputStr = '[[0, 2], [1, 3]]';
        let queries = [[0, 2], [1, 3]];
        
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([1, 2, 3, 4, 5], '[[0, 2], [1, 3]]'); }

        function loadExample(newArr, newQueriesStr) {
            arr = [...newArr];
            queriesInputStr = newQueriesStr;
            document.getElementById('arr-input').value = arr.join(', ');
            document.getElementById('queries-input').value = queriesInputStr;
            parseAndGenerate();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('arr-input').value;
            const parsedArr = valStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const qStr = document.getElementById('queries-input').value;
            
            if (parsedArr.length > 0) {
                arr = parsedArr;
                queriesInputStr = qStr;
                parseAndGenerate();
                reset();
            }
        }

        function parseAndGenerate() {
            // Parse queries string safely
            const matches = queriesInputStr.match(/\[\s*(\d+)\s*,\s*(\d+)\s*\]/g);
            queries = [];
            if (matches) {
                queries = matches.map(m => {
                    const parts = m.match(/\d+/g);
                    return [parseInt(parts[0]), parseInt(parts[1])];
                });
            }
            generateSteps();
        }

        function generateSteps() {
            steps = [];
            const n = arr.length;
            let prefix = [0];
            let results = [];

            if (n === 0) return;

            // STEP 0: INIT
            steps.push({
                type: 'init', phase: '1. Build Prefix Array', range: '—', left: '—', right: '—', ans: '—',
                origStates: arr.map(() => 'idle'),
                prefixVals: [...prefix, ...Array(n).fill('—')],
                prefixStates: ['winning', ...Array(n).fill('idle')],
                panel: 'Phase 1: Build Prefix Array.<br>Initialize <code>prefix[0] = 0</code> to cleanly handle ranges starting at index 0.',
                statusText: `array=[${arr.join(', ')}], n=${n}. Click Play to begin.`,
                log: `n=${n}. Step 1: Building Prefix Sum Array of size ${n+1}.`,
                logColor: 'var(--text-dim)', resArray: []
            });

            // PHASE 1: BUILD
            for (let i = 0; i < n; i++) {
                // Eval
                steps.push({
                    type: 'build-eval', phase: '1. Build Prefix Array', range: '—', left: '—', right: '—', ans: '—',
                    origStates: arr.map((v, idx) => idx === i ? 'candidate' : (idx < i ? 'past' : 'idle')),
                    prefixVals: [...prefix, '?', ...Array(n - i - 1).fill('—')],
                    prefixStates: prefix.map((v, idx) => idx === i ? 'comparing' : 'winning').concat(['target'], Array(n - i - 1).fill('idle')),
                    panel: `Calculate cumulative sum up to index ${i}.<br><code>prefix[${i+1}] = prefix[${i}] + arr[${i}]</code><br>= ${prefix[i]} + ${arr[i]}`,
                    statusText: `Adding arr[${i}] to running sum.`,
                    log: `i=${i}: prefix[${i+1}] = ${prefix[i]} + ${arr[i]}`,
                    logColor: 'var(--text-main)', resArray: []
                });

                let nextSum = prefix[i] + arr[i];
                prefix.push(nextSum);

                // Update
                steps.push({
                    type: 'build-update', phase: '1. Build Prefix Array', range: '—', left: '—', right: '—', ans: '—',
                    origStates: arr.map((v, idx) => idx <= i ? 'past' : 'idle'),
                    prefixVals: [...prefix, ...Array(n - i - 1).fill('—')],
                    prefixStates: prefix.map((v, idx) => idx === i + 1 ? 'winning' : 'winning').concat(Array(n - i - 1).fill('idle')),
                    panel: `<code>prefix[${i+1}]</code> is now <span style="color:var(--accent-green)">${nextSum}</span>.`,
                    statusText: `Prefix array updated.`,
                    log: `  prefix[${i+1}] = ${nextSum} ✓`,
                    logColor: 'var(--accent-green)', resArray: []
                });
            }

            steps.push({
                type: 'transition', phase: 'Ready for Queries', range: '—', left: '—', right: '—', ans: '—',
                origStates: arr.map(() => 'idle'),
                prefixVals: [...prefix],
                prefixStates: prefix.map(() => 'winning'),
                panel: 'Prefix Array successfully built in O(n) time.<br>Now we can answer range queries in O(1) time.',
                statusText: `Phase 1 Complete. Moving to queries...`,
                log: `Prefix sum array built: [${prefix.join(', ')}]. Commencing queries.`,
                logColor: 'var(--accent-blue)', resArray: []
            });

            // PHASE 2: QUERIES
            for (let q = 0; q < queries.length; q++) {
                let l = queries[q][0];
                let r = queries[q][1];

                if (l < 0 || r >= n || l > r) {
                    steps.push({
                        type: 'query-invalid', phase: `2. Query ${q+1}: [${l}, ${r}]`, range: `[${l}, ${r}]`, left: '—', right: '—', ans: 'Invalid',
                        origStates: arr.map(() => 'past'),
                        prefixVals: [...prefix],
                        prefixStates: prefix.map(() => 'past'),
                        panel: `<span style="color:var(--accent-red)">Query [${l}, ${r}] is out of bounds or invalid.</span>`,
                        statusText: `Skipping invalid query.`,
                        log: `Query ${q+1} [${l}, ${r}] is invalid. Skipped.`,
                        logColor: 'var(--accent-red)', resArray: [...results]
                    });
                    continue;
                }

                let pRight = prefix[r+1];
                let pLeft = prefix[l];
                let ans = pRight - pLeft;

                // Query Highlight
                steps.push({
                    type: 'query-eval', phase: `2. Query ${q+1}`, range: `[${l}, ${r}]`, left: pLeft, right: pRight, ans: '?',
                    origStates: arr.map((v, idx) => (idx >= l && idx <= r) ? 'comparing' : 'past'),
                    prefixVals: [...prefix],
                    prefixStates: prefix.map((v, idx) => {
                        if (idx === r + 1) return 'winning'; // The total up to r
                        if (idx === l) return 'defeated'; // The total before l to subtract
                        return 'past';
                    }),
                    panel: `To find sum of <code>arr[${l}..${r}]</code>:<br>Subtract the prefix before <code>l</code> from the prefix up to <code>r</code>.<br><code>Sum = prefix[${r+1}] - prefix[${l}]</code>`,
                    statusText: `Querying range [${l}, ${r}]...`,
                    log: `Query ${q+1} [${l}, ${r}]: sum = prefix[${r+1}] - prefix[${l}] = ${pRight} - ${pLeft}`,
                    logColor: 'var(--text-main)', resArray: [...results]
                });

                results.push(ans);

                // Query Result
                steps.push({
                    type: 'query-res', phase: `2. Query ${q+1}`, range: `[${l}, ${r}]`, left: pLeft, right: pRight, ans: ans,
                    origStates: arr.map((v, idx) => (idx >= l && idx <= r) ? 'comparing' : 'past'),
                    prefixVals: [...prefix],
                    prefixStates: prefix.map((v, idx) => {
                        if (idx === r + 1) return 'winning'; 
                        if (idx === l) return 'defeated'; 
                        return 'past';
                    }),
                    panel: `<code>Sum = ${pRight} - ${pLeft} = <span style="color:var(--accent-purple)">${ans}</span></code><br>Result appended.`,
                    statusText: `Query resolved in O(1) time.`,
                    log: `  Result for Query ${q+1} = ${ans} ✓`,
                    logColor: 'var(--accent-purple)', resArray: [...results]
                });
            }

            // FINAL STEP
            steps.push({
                type: 'final', phase: 'Done', range: '—', left: '—', right: '—', ans: '—',
                origStates: arr.map(() => 'past'),
                prefixVals: [...prefix],
                prefixStates: prefix.map(() => 'winning'),
                panel: 'All queries processed successfully using Prefix Sums.',
                complete: true,
                finalStr: `[${results.join(', ')}]`,
                statusText: `Done. Final results output generated.`,
                log: `Final Results Array: [${results.join(', ')}]`,
                logColor: 'var(--accent-blue)', bold: true, resArray: [...results]
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render Original Array
            const origContainer = document.getElementById('orig-tiles');
            origContainer.innerHTML = '';
            arr.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.origStates[i]}`;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                origContainer.appendChild(wrapper);
            });

            // Render Prefix Array
            const prefixContainer = document.getElementById('prefix-tiles');
            prefixContainer.innerHTML = '';
            step.prefixVals.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.prefixStates[i]}`;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                prefixContainer.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-phase').innerText = step.phase;
            document.getElementById('val-range').innerText = step.range;
            document.getElementById('val-right').innerText = step.right;
            document.getElementById('val-left').innerText = step.left;
            document.getElementById('val-ans').innerText = step.ans;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.resArray.length > 0 ? `[${step.resArray.join(', ')}]` : '—';
            
            if (step.complete || (step.type === 'query-res')) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerHTML = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
