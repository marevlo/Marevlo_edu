<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burst Balloons - DP Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 220px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY & DP TABLE */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        .array-row { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .tiles-wrapper { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; max-width: 800px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.boundary { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }
        .tile.idle { opacity: 0.8; }
        .tile.virtual { border-style: dashed; color: var(--text-dim); }

        .dp-container { display: flex; flex-direction: column; gap: 4px; background: var(--bg-surface); padding: 16px; border-radius: 8px; border: 1px solid var(--border-main); }
        .dp-row { display: flex; gap: 4px; }
        .dp-cell {
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 4px; font-size: 13px; font-family: 'Courier New', monospace; font-weight: bold;
            background: #000000; border: 1px solid var(--border-main); color: var(--text-dim);
            transition: all 0.2s ease;
        }
        .dp-cell.header { background: transparent; border: none; color: var(--text-dim); font-size: 11px; }
        .dp-cell.filled { color: var(--text-main); background: #21262d; }
        .dp-cell.dependency { background: #1e1030; border: 2px solid var(--accent-purple); color: var(--accent-purple); transform: scale(1.08); z-index: 2; }
        .dp-cell.target { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.08); z-index: 2; }
        .dp-cell.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 10px var(--accent-green); z-index: 3; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 680px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.4;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 100px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center;}

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="arr-input" placeholder="3, 1, 5, 8">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([3, 1, 5, 8])">Ex 1</button>
        <button onclick="loadExample([1, 5])">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="array-row">
            <div class="ui-label" style="font-size: 12px;">Padded Array:</div>
            <div class="tiles-wrapper" id="tiles-container"></div>
        </div>
        <div class="array-row">
            <div class="ui-label" style="font-size: 12px;">DP Table [i][j]:</div>
            <div class="dp-container" id="dp-container"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Boundaries (i, j)</span>
            <span class="info-value" id="val-bounds" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Last Burst (k)</span>
            <span class="info-value" id="val-k" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Base Coins</span>
            <span class="info-value" id="val-base" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Subproblems</span>
            <span class="info-value" id="val-subs" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Total Coins</span>
            <span class="info-value" id="val-total" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">max coins =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Window Boundary (i, j)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Last Burst Balloon (k)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple)"></span> DP Dependencies</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); box-shadow: 0 0 6px var(--accent-green);"></span> New Maximum Update</div>
        <div class="legend-item"><span class="dot" style="border: 1px dashed var(--text-dim);"></span> Virtual Balloon (1)</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let originalArr = [3, 1, 5, 8];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([3, 1, 5, 8]); }

        function loadExample(newArr) {
            originalArr = [...newArr];
            document.getElementById('arr-input').value = originalArr.join(', ');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valArr = document.getElementById('arr-input').value;
            const parsedArr = valArr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (parsedArr.length > 0) {
                // Limit length for visual DP table size (N <= 6 ideally, up to 8 max)
                loadExample(parsedArr.slice(0, 6));
            }
        }

        function getDpStateMatrix(N, runningData, highlightI, highlightJ, highlightK, isUpdate, newMax) {
            let mat = Array(N).fill(null).map(() => Array(N).fill(null));
            for (let r = 0; r < N; r++) {
                for (let c = 0; c < N; c++) {
                    let state = 'idle';
                    let val = runningData[r][c];
                    
                    if (val > 0) state = 'filled';
                    
                    if (highlightK !== null) {
                        if ((r === highlightI && c === highlightK) || (r === highlightK && c === highlightJ)) {
                            state = 'dependency';
                        }
                    }
                    if (r === highlightI && c === highlightJ) {
                        state = isUpdate ? 'winning' : 'target';
                        if (isUpdate) val = newMax;
                    }
                    
                    mat[r][c] = { val: val, state: state };
                }
            }
            return mat;
        }

        function generateSteps() {
            steps = [];
            const n = originalArr.length;
            const padded = [1, ...originalArr, 1];
            const N = padded.length;
            
            let dpData = Array(N).fill(null).map(() => Array(N).fill(0));

            // STEP 0: INIT
            steps.push({
                type: 'init', bounds: '—', k: '—', base: '—', subs: '—', total: '—',
                paddedTiles: padded.map((v, idx) => ({
                    val: v, 
                    state: (idx === 0 || idx === N-1) ? 'idle virtual' : 'idle'
                })),
                dpMatrix: getDpStateMatrix(N, dpData, null, null, null, false, 0),
                panel: `Added virtual balloons (1s) at ends. Matrix initialized with zeros.`,
                statusText: `n=${n}, Padded length N=${N}. Click Play to begin DP Bottom-Up approach.`,
                log: `Initialize nums = [${padded.join(', ')}]. Create ${N}x${N} DP table.`,
                logColor: 'var(--text-dim)'
            });

            for (let len = 2; len < N; len++) {
                for (let i = 0; i < N - len; i++) {
                    let j = i + len;
                    let currentMax = 0;

                    for (let k = i + 1; k < j; k++) {
                        let baseCoins = padded[i] * padded[k] * padded[j];
                        let subCoins = dpData[i][k] + dpData[k][j];
                        let totalCoins = baseCoins + subCoins;

                        // EVAL STEP
                        steps.push({
                            type: 'eval', bounds: `(${i}, ${j})`, k: k, 
                            base: `${padded[i]}*${padded[k]}*${padded[j]} = ${baseCoins}`, 
                            subs: `dp[${i}][${k}] + dp[${k}][${j}] = ${subCoins}`, 
                            total: totalCoins,
                            paddedTiles: padded.map((v, idx) => ({
                                val: v,
                                state: (idx === i || idx === j) ? 'boundary' + ((idx === 0 || idx === N-1) ? ' virtual' : '') :
                                       (idx === k ? 'candidate' : 
                                       (idx > i && idx < j ? 'idle' : 'past' + ((idx === 0 || idx === N-1) ? ' virtual' : '')))
                            })),
                            dpMatrix: getDpStateMatrix(N, dpData, i, j, k, false, 0),
                            panel: `Window [${i}, ${j}]: Trying balloon <b>${padded[k]}</b> (index ${k}) as the <i>last</i> burst.<br>
                                    Coins = ${padded[i]}×${padded[k]}×${padded[j]} + dp[${i}][${k}] + dp[${k}][${j}]`,
                            statusText: `Evaluating k=${k} for window length ${len}.`,
                            log: `Window (${i}, ${j}): If k=${k} is last burst, coins = ${baseCoins} + ${subCoins} = ${totalCoins}`,
                            logColor: 'var(--text-main)'
                        });

                        if (totalCoins > currentMax) {
                            currentMax = totalCoins;
                            dpData[i][j] = currentMax;
                            
                            // UPDATE STEP
                            steps.push({
                                type: 'update', bounds: `(${i}, ${j})`, k: k, 
                                base: `${padded[i]}*${padded[k]}*${padded[j]} = ${baseCoins}`, 
                                subs: `dp[${i}][${k}] + dp[${k}][${j}] = ${subCoins}`, 
                                total: totalCoins,
                                paddedTiles: padded.map((v, idx) => ({
                                    val: v,
                                    state: (idx === i || idx === j) ? 'boundary' + ((idx === 0 || idx === N-1) ? ' virtual' : '') :
                                           (idx === k ? 'candidate' : 
                                           (idx > i && idx < j ? 'idle' : 'past' + ((idx === 0 || idx === N-1) ? ' virtual' : '')))
                                })),
                                dpMatrix: getDpStateMatrix(N, dpData, i, j, k, true, currentMax),
                                panel: `<span style="color:var(--accent-green)">New maximum for window [${i}, ${j}] found! dp[${i}][${j}] = ${currentMax}</span>`,
                                statusText: `Updated DP table.`,
                                log: `  dp[${i}][${j}] updated to ${currentMax} ✓`,
                                logColor: 'var(--accent-green)'
                            });
                        }
                    }
                }
            }

            const finalAns = dpData[0][N - 1];

            // FINAL STEP
            steps.push({
                type: 'final', bounds: '—', k: '—', base: '—', subs: '—', total: '—',
                paddedTiles: padded.map((v, idx) => ({
                    val: v,
                    state: (idx > 0 && idx < N-1) ? 'winning' : 'past virtual'
                })),
                dpMatrix: getDpStateMatrix(N, dpData, 0, N-1, null, true, finalAns),
                panel: `All subproblems solved. The maximum coins are found in dp[0][${N-1}].`,
                complete: true,
                result: finalAns,
                statusText: `Done. Optimal bursting strategy yields ${finalAns} coins.`,
                log: `Final result: dp[0][${N-1}] = ${finalAns}`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const N = step.paddedTiles.length;

            // Render Padded Array
            const tContainer = document.getElementById('tiles-container');
            tContainer.innerHTML = '';
            step.paddedTiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                tContainer.appendChild(wrapper);
            });

            // Render DP Matrix
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = '';
            
            // Header row
            const hRow = document.createElement('div');
            hRow.className = 'dp-row';
            const corner = document.createElement('div');
            corner.className = 'dp-cell header';
            corner.innerText = 'i\\j';
            hRow.appendChild(corner);
            for(let c=0; c<N; c++) {
                const hc = document.createElement('div');
                hc.className = 'dp-cell header';
                hc.innerText = c;
                hRow.appendChild(hc);
            }
            dpContainer.appendChild(hRow);

            step.dpMatrix.forEach((row, r) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'dp-row';
                const rh = document.createElement('div');
                rh.className = 'dp-cell header';
                rh.innerText = r;
                rowDiv.appendChild(rh);

                row.forEach((cell, c) => {
                    const cellDiv = document.createElement('div');
                    cellDiv.className = `dp-cell ${cell.state}`;
                    cellDiv.innerText = cell.val === 0 && cell.state === 'idle' ? '-' : cell.val;
                    rowDiv.appendChild(cellDiv);
                });
                dpContainer.appendChild(rowDiv);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-bounds').innerText = step.bounds;
            document.getElementById('val-k').innerText = step.k;
            document.getElementById('val-base').innerText = step.base;
            document.getElementById('val-subs').innerText = step.subs;
            document.getElementById('val-total').innerText = step.total;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
