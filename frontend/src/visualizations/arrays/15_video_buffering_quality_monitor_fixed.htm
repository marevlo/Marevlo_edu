
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Buffering Quality Monitor - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"], input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
        }
        .num-input { width: 45px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .array-row { display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 1.5px solid var(--accent-green); color: var(--accent-green); transform: scale(1.06); }
        .tile.defeated { background: #2a0d0d; border: 1.5px solid var(--accent-red); color: var(--accent-red); }
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }

        /* ROW 3: PANEL */
        .comparison-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 500px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }
        .metric-row { display: flex; justify-content: center; gap: 30px; }
        .metric { font-weight: bold; }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        #res-val.pop { animation: popAnim 400ms ease; color: var(--accent-green); font-size: 26px; font-weight: 700; text-shadow: 0 0 16px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 600px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">buffer =</label>
        <input type="text" id="buf-input" placeholder="5, 3, 7, 2, 6" style="width: 120px;">
        <label class="ui-label">bitrate =</label>
        <input type="text" id="bit-input" placeholder="4, 5, 3, 6, 5" style="width: 120px;">
        <label class="ui-label">BT =</label>
        <input type="number" id="bt-input" class="num-input" value="3">
        <label class="ui-label">RT =</label>
        <input type="number" id="rt-input" class="num-input" value="3">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([5,3,7,2,6], [4,5,3,6,5], 3, 3)">Ex 1</button>
        <button onclick="loadExample([1,2,3,4,5], [5,4,3,2,1], 2, 3)">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="array-row">
            <div class="ui-label" style="width: 60px;">buffer</div>
            <div class="tiles-wrapper" id="buf-tiles"></div>
        </div>
        <div class="array-row">
            <div class="ui-label" style="width: 60px;">bitrate</div>
            <div class="tiles-wrapper" id="bit-tiles"></div>
        </div>
    </div>

    <div class="comparison-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Start (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">End (j)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Buffer [j]</span>
            <span class="info-value" id="val-buf" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Bitrate [j]</span>
            <span class="info-value" id="val-bit" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">max length =</span>
        <span id="res-val">0</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Start (i)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Checking (j)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Valid</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red)"></span> Broken</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let buffer = [5, 3, 7, 2, 6];
        let bitrate = [4, 5, 3, 6, 5];
        let bufThresh = 3;
        let bitThresh = 3;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([5, 3, 7, 2, 6], [4, 5, 3, 6, 5], 3, 3); }

        function loadExample(bufArr, bitArr, bt, rt) {
            buffer = [...bufArr];
            bitrate = [...bitArr];
            bufThresh = parseInt(bt);
            bitThresh = parseInt(rt);
            document.getElementById('buf-input').value = bufArr.join(',');
            document.getElementById('bit-input').value = bitArr.join(',');
            document.getElementById('bt-input').value = bt;
            document.getElementById('rt-input').value = rt;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const bArr = document.getElementById('buf-input').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const rArr = document.getElementById('bit-input').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const bt = parseInt(document.getElementById('bt-input').value);
            const rt = parseInt(document.getElementById('rt-input').value);
            if (bArr.length > 0 && rArr.length === bArr.length) loadExample(bArr, rArr, bt, rt);
        }

        function generateSteps() {
            steps = [];
            const n = buffer.length;
            let maxLen = 0;

            steps.push({
                type: 'init', i: null, j: null, bVal: '—', rVal: '—', max: 0,
                bufStates: Array(n).fill(''),
                bitStates: Array(n).fill(''),
                panel: '—',
                status: 'Click Play to begin nested-loop analysis.',
                log: `Monitoring quality: thresholds [B≥${bufThresh}, R≥${bitThresh}]`
            });

            for (let i = 0; i < n; i++) {
                steps.push({
                    type: 'start', i: i, j: null, bVal: '—', rVal: '—', max: maxLen,
                    bufStates: buffer.map((_, idx) => idx === i ? 'candidate' : (idx < i ? 'past' : '')),
                    bitStates: bitrate.map((_, idx) => idx === i ? 'candidate' : (idx < i ? 'past' : '')),
                    panel: '—',
                    status: `Segment starting at i=${i}`,
                    log: `i=${i}: Starting new quality segment check`
                });

                for (let j = i; j < n; j++) {
                    const b = buffer[j];
                    const r = bitrate[j];
                    const bValid = b >= bufThresh;
                    const rValid = r >= bitThresh;
                    const curLen = j - i + 1;

                    steps.push({
                        type: 'check', i, j, bVal: b, rVal: r, max: maxLen,
                        bufStates: buffer.map((_, idx) => idx === i ? 'candidate' : (idx === j ? 'comparing' : (idx < i ? 'past' : (idx < j ? 'winning' : '')))),
                        bitStates: bitrate.map((_, idx) => idx === i ? 'candidate' : (idx === j ? 'comparing' : (idx < i ? 'past' : (idx < j ? 'winning' : '')))),
                        panel: `<div class="metric-row">
                                <span class="metric">B: ${b} vs ${bufThresh}</span>
                                <span class="metric">R: ${r} vs ${bitThresh}</span>
                                </div>`,
                        status: `Segment [${i},${j}]: Checking buffer and bitrate`
                    });

                    if (bValid && rValid) {
                        const oldMax = maxLen;
                        maxLen = Math.max(maxLen, curLen);
                        
                        steps.push({
                            type: 'valid', i, j, bVal: b, rVal: r, max: maxLen,
                            bufStates: buffer.map((_, idx) => idx === i ? 'candidate' : (idx === j ? 'winning' : (idx < i ? 'past' : (idx < j ? 'winning' : '')))),
                            bitStates: bitrate.map((_, idx) => idx === i ? 'candidate' : (idx === j ? 'winning' : (idx < i ? 'past' : (idx < j ? 'winning' : '')))),
                            panel: `<span style="color:var(--accent-green)">✓ Both conditions met</span>`,
                            status: `Segment [${i},${j}]: length=${curLen} ✓`,
                            log: `j=${j}: buffer=${b}✓ bitrate=${r}✓, len=${curLen}`,
                            logColor: 'var(--accent-green)'
                        });

                        if (maxLen > oldMax) {
                            steps.push({
                                type: 'update', i, j, bVal: b, rVal: r, max: maxLen,
                                bufStates: buffer.map((_, idx) => idx >= i && idx <= j ? 'winning' : 'past'),
                                bitStates: bitrate.map((_, idx) => idx >= i && idx <= j ? 'winning' : 'past'),
                                panel: `<span style="color:var(--accent-green)">New maximum length: ${maxLen}</span>`,
                                status: `Max length updated: ${maxLen}`,
                                log: `Update max_len = ${maxLen}`,
                                logColor: 'var(--accent-blue)'
                            });
                        }
                    } else {
                        const failMsg = !bValid ? `✗ Buffer ${b} < ${bufThresh}` : `✗ Bitrate ${r} < ${bitThresh}`;
                        steps.push({
                            type: 'broken', i, j, bVal: b, rVal: r, max: maxLen,
                            bufStates: buffer.map((_, idx) => idx === j ? 'defeated' : (idx >= i && idx < j ? 'winning' : (idx < i ? 'past' : ''))),
                            bitStates: bitrate.map((_, idx) => idx === j ? 'defeated' : (idx >= i && idx < j ? 'winning' : (idx < i ? 'past' : ''))),
                            panel: `<span style="color:var(--accent-red)">${failMsg}</span>`,
                            status: `Segment [${i},${j}]: Broken ✗`,
                            log: `j=${j}: Condition failed ✗, segment breaks`,
                            logColor: 'var(--accent-red)'
                        });
                        break;
                    }
                }
            }

            steps.push({
                type: 'final', i: null, j: null, bVal: '—', rVal: '—', max: maxLen,
                bufStates: Array(n).fill('past'),
                bitStates: Array(n).fill('past'),
                panel: 'Analysis Complete',
                complete: true,
                status: `Done. Longest quality segment: ${maxLen}`,
                log: `Final result: longest length = ${maxLen}`,
                logColor: 'var(--text-log)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const bContainer = document.getElementById('buf-tiles');
            const rContainer = document.getElementById('bit-tiles');
            bContainer.innerHTML = '';
            rContainer.innerHTML = '';

            buffer.forEach((v, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.bufStates[i]}`;
                tile.innerText = v;
                wrapper.append(tile);
                if (idx === 0) {
                    const indexLabel = document.createElement('div');
                    indexLabel.className = 'tile-index';
                    indexLabel.innerText = `[${i}]`;
                    wrapper.append(indexLabel);
                }
                bContainer.appendChild(wrapper);
            });

            bitrate.forEach((v, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.bitStates[i]}`;
                tile.innerText = v;
                wrapper.append(tile);
                rContainer.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-buf').innerText = step.bVal;
            document.getElementById('val-bit').innerText = step.rVal;
            document.getElementById('val-max').innerText = step.max;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.max;
            resVal.className = step.complete ? 'pop' : '';

            document.getElementById('status-text').innerText = step.status;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
```
