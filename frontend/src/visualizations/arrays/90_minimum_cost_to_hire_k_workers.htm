<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Cost to Hire K Workers - Brute Force Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }

        label.array-label {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }

        button {
            height: 32px;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
        }

        button:hover { background: var(--btn-hover); }

        .array-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .tiles-wrapper {
            display: flex;
            gap: 8px;
        }

        .tile-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tile {
            min-width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.25s ease;
            background: #21262d;
            border: 1px solid var(--border-main);
            color: var(--text-main);
        }

        .tile.candidate { 
            background: #2a1600; 
            border: 2px solid var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.12); 
        }
        .tile.selected { 
            background: #0f2a1a; 
            border: 2px solid var(--accent-green); 
            color: var(--accent-green); 
            transform: scale(1.15); 
            box-shadow: 0 0 12px var(--accent-green);
        }
        .tile.past { opacity: 0.4; }

        .pointer-panel {
            margin-top: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 20px;
            width: 520px;
            text-align: center;
            font-family: monospace;
        }

        .pointer-values {
            display: flex;
            justify-content: center;
            gap: 32px;
            font-size: 18px;
            font-weight: 700;
        }

        .action-text {
            margin-top: 12px;
            font-size: 14px;
            min-height: 24px;
            color: var(--accent-orange);
        }

        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 130px;
            gap: 4px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        .result-display {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #res-val { font-family: monospace; transition: all 0.2s; }
        .pop { animation: popAnim 400ms ease; font-size: 26px !important; color: var(--accent-green) !important; }

        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.28); }
            100% { transform: scale(1); }
        }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; }

        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }
        .speed-label { font-size: 11px; color: var(--text-dim); }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; }

        .legend {
            margin-top: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }

        .log-panel {
            margin-top: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 620px;
            max-width: 90%;
            height: 130px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-line { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">wages =</label>
        <input type="text" id="wages-input" placeholder="70,50,30,80" style="width: 180px;">
        <label class="array-label">qualities =</label>
        <input type="text" id="qualities-input" placeholder="10,20,5,15" style="width: 180px;">
        <label class="array-label">k =</label>
        <input type="text" id="k-input" placeholder="2" style="width: 60px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample()">Example 1</button>
        <button onclick="loadExample2()">Example 2</button>
    </div>

    <div class="array-container">
        <div style="display:flex; gap:20px;">
            <div>
                <div class="array-label">wages</div>
                <div class="tiles-wrapper" id="tiles-wages"></div>
            </div>
            <div>
                <div class="array-label">qualities</div>
                <div class="tiles-wrapper" id="tiles-qualities"></div>
            </div>
        </div>
    </div>

    <div class="pointer-panel">
        <div class="pointer-values">
            <span>current combo</span>
            <span>max ratio = <span id="v-ratio" style="color:var(--accent-orange)">—</span></span>
            <span>total cost = <span id="v-cost" style="color:var(--accent-green)">—</span></span>
        </div>
        <div id="action-text" class="action-text">—</div>
    </div>

    <div class="info-panel">
        <div class="info-cell"><div class="info-label">selected workers</div><div class="info-value" id="val-selected" style="color:var(--accent-blue)">—</div></div>
        <div class="info-cell"><div class="info-label">sum quality</div><div class="info-value" id="val-sumq" style="color:var(--accent-green)">—</div></div>
    </div>

    <div class="result-display">
        <div class="info-label" style="font-size:12px;margin-bottom:4px;">minimum cost =</div>
        <div id="res-val" style="font-size:16px;color:var(--text-dim)">—</div>
    </div>

    <div class="status-bar" id="status-text">...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn" style="min-width:80px;">Play</button>
        <button onclick="next()">Next →</button>
        <div class="speed-control">
            <span class="speed-label">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" step="1" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--accent-orange);"></div> Current combo</div>
        <div class="legend-item"><div class="dot" style="background:var(--accent-green);"></div> Selected worker</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentWages = [70,50,30,80];
        let currentQualities = [10,20,5,15];
        let currentK = 2;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let isPlaying = false;

        const delays = [1800, 900, 450];

        function init() {
            loadExample();
        }

        function loadExample() {
            currentWages = [70,50,30,80];
            currentQualities = [10,20,5,15];
            currentK = 2;
            document.getElementById('wages-input').value = currentWages.join(',');
            document.getElementById('qualities-input').value = currentQualities.join(',');
            document.getElementById('k-input').value = currentK;
            generateSteps();
            reset();
        }

        function loadExample2() {
            currentWages = [10,20,30];
            currentQualities = [1,2,3];
            currentK = 2;
            document.getElementById('wages-input').value = currentWages.join(',');
            document.getElementById('qualities-input').value = currentQualities.join(',');
            document.getElementById('k-input').value = currentK;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const wStr = document.getElementById('wages-input').value;
            const qStr = document.getElementById('qualities-input').value;
            const kVal = parseInt(document.getElementById('k-input').value);

            if (!isNaN(kVal) && kVal > 0) {
                currentWages = wStr.split(',').map(x => parseFloat(x.trim())).filter(x => !isNaN(x));
                currentQualities = qStr.split(',').map(x => parseFloat(x.trim())).filter(x => !isNaN(x));
                currentK = kVal;
                if (currentWages.length === currentQualities.length) {
                    generateSteps();
                    reset();
                }
            }
        }

        function generateSteps() {
            steps = [];
            const n = currentWages.length;
            let minCost = Infinity;
            let bestCombo = [];

            // Initial
            steps.push({
                type: 'init',
                combo: [],
                maxRatio: 0,
                sumQ: 0,
                cost: 0,
                minCost: Infinity,
                tileStatesW: Array(n).fill('idle'),
                tileStatesQ: Array(n).fill('idle'),
                status: `Start brute force: generate all combinations of ${currentK} workers`,
                log: `Initialize min cost = Infinity`,
                logColor: '#58a6ff',
                action: 'Initialize'
            });

            function backtrack(start, combo) {
                if (combo.length === currentK) {
                    let maxR = 0;
                    let sumQ = 0;
                    let tileStatesW = Array(n).fill('past');
                    let tileStatesQ = Array(n).fill('past');

                    for (let idx of combo) {
                        const r = currentWages[idx] / currentQualities[idx];
                        maxR = Math.max(maxR, r);
                        sumQ += currentQualities[idx];
                        tileStatesW[idx] = 'selected';
                        tileStatesQ[idx] = 'selected';
                    }
                    const cost = maxR * sumQ;

                    if (cost < minCost) minCost = cost;

                    steps.push({
                        type: 'combo',
                        combo: combo.slice(),
                        maxRatio: maxR,
                        sumQ: sumQ,
                        cost: cost,
                        minCost: minCost,
                        tileStatesW: tileStatesW,
                        tileStatesQ: tileStatesQ,
                        status: `Combo ${combo} | max ratio = ${maxR.toFixed(2)} | sumQ = ${sumQ} | cost = ${cost.toFixed(2)}`,
                        log: `Combo ${combo}: max ratio=${maxR.toFixed(2)}, sumQ=${sumQ}, cost=${cost.toFixed(2)}, current min=${minCost.toFixed(2)}`,
                        logColor: cost === minCost ? '#3fb950' : '#c9d1d9',
                        action: cost < minCost + 1e-9 ? 'New minimum!' : 'Checked'
                    });
                    return;
                }

                for (let i = start; i < n; i++) {
                    combo.push(i);
                    backtrack(i + 1, combo);
                    combo.pop();
                }
            }

            backtrack(0, []);

            // Final
            steps.push({
                type: 'final',
                combo: bestCombo,
                maxRatio: 0,
                sumQ: 0,
                cost: minCost,
                minCost: minCost,
                tileStatesW: Array(n).fill('selected'),
                tileStatesQ: Array(n).fill('selected'),
                status: `All combinations checked. Minimum cost = ${minCost.toFixed(2)}`,
                log: `Final minimum cost: ${minCost.toFixed(2)}`,
                logColor: '#3fb950',
                bold: true,
                action: '—',
                result: minCost
            });
        }

        function renderTiles(containerId, values, tileStates) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            values.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${tileStates[i]}`;
                tile.innerText = typeof val === 'number' ? val.toFixed ? val.toFixed(1) : val : val;
                const indexEl = document.createElement('div');
                indexEl.className = 'tile-index';
                indexEl.innerText = `[${i}]`;
                wrapper.appendChild(tile);
                wrapper.appendChild(indexEl);
                container.appendChild(wrapper);
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            renderTiles('tiles-wages', currentWages, step.tileStatesW);
            renderTiles('tiles-qualities', currentQualities, step.tileStatesQ);

            document.getElementById('v-ratio').innerText = step.maxRatio ? step.maxRatio.toFixed(2) : '—';
            document.getElementById('v-cost').innerText = step.cost ? step.cost.toFixed(2) : '—';

            document.getElementById('action-text').innerText = step.action || '—';
            document.getElementById('status-text').innerText = step.status;

            document.getElementById('val-selected').innerText = step.combo ? step.combo.join(',') : '—';
            document.getElementById('val-sumq').innerText = step.sumQ || '—';

            const resVal = document.getElementById('res-val');
            if (step.result !== undefined) {
                resVal.innerText = step.result.toFixed(2);
                resVal.classList.add('pop');
            } else {
                resVal.innerText = '—';
                resVal.classList.remove('pop');
            }

            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    line.style.color = steps[k].logColor || '#c9d1d9';
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (stepIndex >= steps.length - 1) stepIndex = 0;
            isPlaying = true;
            document.getElementById('play-btn').innerText = 'Pause';
            timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').innerText = 'Play';
            clearInterval(timer);
        }

        document.getElementById('speed-slider').oninput = () => { if (isPlaying) { pause(); play(); } };

        window.onload = init;
    </script>
</body>
</html>
