<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Click Fraud Spike Detection - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 14px; color: var(--text-dim); }
        input[type="text"], input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 14px;
        }
        .num-input { width: 50px; }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 1.5px solid var(--accent-green); color: var(--accent-green); transform: scale(1.06); }
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }

        /* ROW 3: PANEL */
        .panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 500px; text-align: center; font-family: monospace; min-height: 52px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        #res-val.pop { animation: popAnim 400ms ease; color: var(--accent-green); font-weight: 700; }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 600px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">clicks =</label>
        <input type="text" id="clicks-input" placeholder="10, 12, 15, 100, 20, 25" style="width: 180px;">
        <label class="ui-label">k =</label>
        <input type="number" id="k-input" class="num-input" value="3">
        <label class="ui-label">min =</label>
        <input type="number" id="min-input" class="num-input" value="2">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([10, 12, 15, 100, 20, 25], 3, 2)">Ex 1</button>
        <button onclick="loadExample([5, 5, 5, 50, 5, 5], 5, 1)">Ex 2</button>
    </div>

    <div class="array-container">
        <div class="ui-label" style="font-size: 12px;">clicks =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Endpoint (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Start (j)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Interval Avg</span>
            <span class="info-value" id="val-avg" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Baseline</span>
            <span class="info-value" id="val-base" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">detected intervals =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Endpoint (i)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> Start boundary (j)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Spike interval</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Past j</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let clicks = [10, 12, 15, 100, 20, 25];
        let kFactor = 3;
        let minWin = 2;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([10, 12, 15, 100, 20, 25], 3, 2); }

        function loadExample(arr, k, min) {
            clicks = [...arr];
            kFactor = k;
            minWin = min;
            document.getElementById('clicks-input').value = arr.join(',');
            document.getElementById('k-input').value = k;
            document.getElementById('min-input').value = min;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valArr = document.getElementById('clicks-input').value;
            const parsedArr = valArr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const parsedK = parseFloat(document.getElementById('k-input').value);
            const parsedMin = parseInt(document.getElementById('min-input').value);
            if (parsedArr.length > 0) loadExample(parsedArr.slice(0, 8), parsedK, parsedMin);
        }

        function generateSteps() {
            steps = [];
            const n = clicks.length;
            const detected = [];

            steps.push({
                type: 'init', i: null, j: null, avg: '—', base: '—',
                tiles: clicks.map(v => ({val: v, state: ''})),
                panel: '—',
                statusText: `clicks=[${clicks}] k=${kFactor} min=${minWin}. Click Play to begin.`,
                log: `clicks=[${clicks}] — Detecting fraud spikes.`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 1; i < n; i++) {
                steps.push({
                    type: 'outer', i, j: null, avg: '—', base: '—',
                    tiles: clicks.map((v, idx) => ({val: v, state: idx === i ? 'candidate' : ''})),
                    panel: '—',
                    statusText: `Checking endpoint i=${i} (value=${clicks[i]})`,
                    log: `Endpoint ${i}: Checking all possible intervals ending here`,
                    logColor: 'var(--text-log)'
                });

                for (let j = 0; j < i; j++) {
                    const intervalArr = clicks.slice(j, i + 1);
                    const baselineArr = clicks.slice(0, j);
                    
                    const intervalAvg = (intervalArr.reduce((a,b)=>a+b, 0) / intervalArr.length).toFixed(1);
                    const baselineVal = j >= minWin ? (baselineArr.reduce((a,b)=>a+b, 0) / baselineArr.length).toFixed(1) : 0;
                    const threshold = (baselineVal * kFactor).toFixed(1);
                    const isSpike = j >= minWin && parseFloat(intervalAvg) > parseFloat(threshold);

                    steps.push({
                        type: 'inner_check', i, j, avg: intervalAvg, base: baselineVal,
                        tiles: clicks.map((v, idx) => {
                            let state = '';
                            if (idx === i) state = 'candidate';
                            else if (idx === j) state = 'comparing';
                            else if (idx < j) state = 'past';
                            return {val: v, state};
                        }),
                        panel: `Interval [${j},${i}]: avg=${intervalAvg} vs baseline=${baselineVal}*${kFactor}`,
                        statusText: j < minWin ? `Interval [${j},${i}]: baseline has ${j} points < ${minWin} required` : `Checking interval [${j},${i}] condition`,
                        log: j < minWin ? `Skip j=${j}: baseline window too small` : null,
                        logColor: 'var(--accent-orange)'
                    });

                    if (j >= minWin) {
                        if (isSpike) {
                            detected.push(`(${j},${i})`);
                            steps.push({
                                type: 'spike', i, j, avg: intervalAvg, base: baselineVal,
                                tiles: clicks.map((v, idx) => ({
                                    val: v, 
                                    state: (idx >= j && idx <= i) ? 'winning' : (idx < j ? 'past' : '')
                                })),
                                panel: `<span style="color:var(--accent-green)">✓ SPIKE DETECTED: ${intervalAvg} > ${threshold}</span>`,
                                statusText: `Spike found: [${j},${i}] → recorded`,
                                log: `SPIKE [${j},${i}]: ${intervalAvg} > ${threshold} ✓`,
                                logColor: 'var(--accent-green)',
                                results: [...detected]
                            });
                        } else {
                            steps.push({
                                type: 'no_spike', i, j, avg: intervalAvg, base: baselineVal,
                                tiles: clicks.map((v, idx) => ({
                                    val: v, 
                                    state: idx === i ? 'candidate' : (idx === j ? 'comparing' : (idx < j ? 'past' : ''))
                                })),
                                panel: `✗ No spike: ${intervalAvg} ≤ ${threshold}`,
                                statusText: `No spike: [${j},${i}]`,
                                log: `No spike at [${j},${i}]: ${intervalAvg} ≤ ${threshold}`,
                                logColor: 'var(--accent-orange)'
                            });
                        }
                    }
                }
            }

            steps.push({
                type: 'final', i: null, j: null, avg: '—', base: '—',
                tiles: clicks.map(v => ({val: v, state: 'past'})),
                panel: 'Processing Complete',
                complete: true,
                results: [...detected],
                statusText: `Done. Fraud spikes detected: ${detected.length} intervals`,
                log: `Final result: detected intervals = [${detected.join(', ')}]`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-avg').innerText = step.avg;
            document.getElementById('val-base').innerText = step.base;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.results ? `[${step.results.join(', ')}]` : '—';
            resVal.className = step.complete ? 'pop' : '';

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = `var(${steps[k].logColor}, ${steps[k].logColor})`;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
