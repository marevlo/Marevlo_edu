<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Limiter Burst Analysis Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
        }
        label.array-label { font-family: 'Courier New', monospace; font-size: 14px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 200px;
            font-size: 14px;
        }
        .t-input { width: 60px !important; }
        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .array-container { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
        .tiles-wrapper { display: flex; gap: 6px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.25s ease; background: #21262d; border: 1px solid var(--border-main);
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.comparing { background: #0d2244; border: 2px solid var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 1.5px solid var(--accent-green); color: var(--accent-green); transform: scale(1.06); }
        .tile.defeated { background: #2a0d0d; border: 1.5px solid var(--accent-red); color: var(--accent-red); opacity: 0.6; }
        .tile.past { opacity: 0.3; background: #161b22; color: var(--text-dim); }
        .tile.maximum { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); box-shadow: 0 0 12px var(--accent-green); transform: scale(1.05); }

        /* ROW 3: PANEL */
        .panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 500px; text-align: center; font-family: monospace; min-height: 52px;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 16px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; }
        #res-val.complete { color: var(--accent-green); font-size: 26px; font-weight: 700; text-shadow: 0 0 16px var(--accent-green); animation: popAnim 400ms ease; }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 600px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="array-label">requests =</label>
        <input type="text" id="array-input" placeholder="1, 2, 3, 4, 5">
        <label class="array-label">T =</label>
        <input type="text" id="t-input" class="t-input" placeholder="8">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1, 2, 3, 4, 5], 8)">Ex 1</button>
        <button onclick="loadExample([10, 1, 1, 1, 1], 5)">Ex 2</button>
    </div>

    <div class="array-container">
        <div class="info-label" style="font-size: 12px; font-family: monospace;">array =</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">i (start)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">j (end)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">curr sum</span>
            <span class="info-value" id="val-sum" style="color: var(--text-main);">0</span>
        </div>
        <div class="info-cell">
            <span class="info-label">window len</span>
            <span class="info-value" id="val-len" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="info-label" style="margin-bottom: 4px;">min_window =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="info-label" style="margin-right:4px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Start (i)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue)"></span> End (j)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Threshold Exceeded</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Past</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let requests = [1, 2, 3, 4, 5];
        let T = 8;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([1, 2, 3, 4, 5], 8); }

        function loadExample(arr, threshold) {
            requests = [...arr];
            T = threshold;
            document.getElementById('array-input').value = arr.join(',');
            document.getElementById('t-input').value = T;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valArr = document.getElementById('array-input').value;
            const valT = document.getElementById('t-input').value;
            const parsedArr = valArr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const parsedT = parseInt(valT);
            if (parsedArr.length > 0 && !isNaN(parsedT)) loadExample(parsedArr.slice(0, 8), parsedT);
        }

        function generateSteps() {
            steps = [];
            const n = requests.length;
            let minWindow = n + 1;
            let bestRange = null;

            // STEP 0: INIT
            steps.push({
                type: 'init', i: null, j: null, sum: 0, winLen: null,
                tiles: requests.map(v => ({val: v, state: ''})),
                panel: '—',
                status: `requests=[${requests}] T=${T}. Click Play to begin.`,
                log: `requests=[${requests}] — T=${T}. Starting burst analysis.`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 0; i < n; i++) {
                let currentSum = 0;
                
                // STEP A: Start window
                steps.push({
                    type: 'start', i: i, j: null, sum: 0, winLen: null,
                    tiles: requests.map((v, idx) => ({val: v, state: idx === i ? 'candidate' : (idx < i ? 'past' : '')})),
                    panel: '—',
                    status: `Window start: requests[${i}]=${requests[i]}`,
                    log: `Window starting at index ${i}, value ${requests[i]}`,
                    logColor: 'var(--accent-blue)'
                });

                for (let j = i; j < n; j++) {
                    currentSum += requests[j];
                    const windowLen = j - i + 1;

                    // STEP B: Expand window
                    steps.push({
                        type: 'expand', i: i, j: j, sum: currentSum, winLen: null,
                        tiles: requests.map((v, idx) => ({
                            val: v, 
                            state: idx === i ? 'candidate' : (idx === j ? 'comparing' : (idx > i && idx < j ? 'maximum' : (idx < i ? 'past' : '')))
                        })),
                        panel: `Sum: ${currentSum} vs T=${T}`,
                        status: `Window [${i},${j}]: sum=${currentSum}`
                    });

                    if (currentSum > T) {
                        // STEP B result: Found
                        steps.push({
                            type: 'found', i: i, j: j, sum: currentSum, winLen: windowLen,
                            tiles: requests.map((v, idx) => ({
                                val: v, 
                                state: (idx >= i && idx <= j) ? 'winning' : (idx < i ? 'past' : '')
                            })),
                            panel: `<span style="color:var(--accent-green)">✓ Sum ${currentSum} > ${T}, window found</span>`,
                            status: `Window [${i},${j}]: ${currentSum} > ${T} → length=${windowLen} ✓`,
                            log: `Window [${i},${j}] sum=${currentSum} > ${T}, len=${windowLen} ✓`,
                            logColor: 'var(--accent-green)'
                        });

                        // STEP C: Update min
                        if (windowLen < minWindow) {
                            minWindow = windowLen;
                            bestRange = [i, j];
                            steps.push({
                                type: 'update', i: i, j: j, sum: currentSum, winLen: windowLen, min: minWindow,
                                tiles: requests.map((v, idx) => ({
                                    val: v, 
                                    state: (idx >= i && idx <= j) ? 'winning' : (idx < i ? 'past' : '')
                                })),
                                panel: `New minimum window length: ${windowLen}`,
                                status: `Min window updated: ${windowLen}`,
                                log: `Update min_window = ${windowLen}`,
                                logColor: 'var(--accent-green)'
                            });
                        }
                        break; // Inner loop break
                    } else {
                        // STEP B result: Continue
                        steps.push({
                            type: 'continue', i: i, j: j, sum: currentSum, winLen: null,
                            tiles: requests.map((v, idx) => ({
                                val: v, 
                                state: idx === i ? 'candidate' : (idx === j ? 'past' : (idx > i && idx < j ? 'maximum' : (idx < i ? 'past' : '')))
                            })),
                            status: `sum=${currentSum} ≤ ${T}, continue expanding`,
                            log: `j=${j}: sum=${currentSum} ≤ ${T}, keep expanding`,
                            logColor: 'var(--accent-orange)'
                        });
                    }
                }
            }

            // FINAL STEP
            const finalFound = minWindow <= n;
            steps.push({
                type: 'final', i: null, j: null, sum: 0, winLen: null,
                tiles: requests.map((v, idx) => ({
                    val: v, 
                    state: (finalFound && idx >= bestRange[0] && idx <= bestRange[1]) ? 'maximum' : 'past'
                })),
                panel: finalFound ? 'Analysis Complete' : 'No Burst Found',
                complete: true,
                result: finalFound ? minWindow : -1,
                status: finalFound ? `Done. Shortest burst window length: ${minWindow}` : `Done. No window exceeds threshold T=${T}. Result: -1`,
                log: finalFound ? `Final result: min_window = ${minWindow}` : `Final result: -1 (no burst detected)`,
                logColor: finalFound ? 'var(--accent-blue)' : 'var(--accent-orange)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-sum').innerText = step.sum;
            document.getElementById('val-len').innerText = step.winLen || '—';

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.result || step.min || (stepIndex === 0 ? '—' : (steps[stepIndex-1].min || '—'));
            resVal.className = step.complete ? 'complete' : '';

            document.getElementById('status-text').innerText = step.status;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = `var(${steps[k].logColor}, ${steps[k].logColor})`;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>```
