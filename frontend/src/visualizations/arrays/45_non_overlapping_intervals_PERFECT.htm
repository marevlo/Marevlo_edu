<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Non-overlapping Intervals - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* answer / removal count          */
            --accent-blue:   #06b6d4;   /* checking candidate / chrome     */
            --accent-green:  #22c55e;   /* kept interval                   */
            --accent-red:    #f43f5e;   /* removed interval                */
            --accent-purple: #a855f7;   /* current sweep interval          */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 280px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .timeline-stage { position: relative; width: 100%; overflow-x: auto; overflow-y: hidden; scrollbar-width: thin; padding: 24px 28px 18px; }
        .timeline-stage::-webkit-scrollbar { height: 8px; }
        .timeline-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        /* track labels + areas */
        .track-label { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin: 2px 0 6px; }
        .timeline-inner { position: relative; }

        /* the numeric axis */
        .axis { position: relative; height: 22px; margin-bottom: 8px; }
        .axis-line { position: absolute; left: 0; right: 0; top: 11px; height: 2px; background: rgba(255,255,255,0.10); }
        .tick { position: absolute; top: 0; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .tick .mark { width: 1px; height: 7px; background: rgba(255,255,255,0.18); }
        .tick .lbl { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }

        /* the last-kept-end guide line */
        .guide { position: absolute; top: 0; bottom: 18px; width: 0; border-left: 2px dashed rgba(6,182,212,0.55); opacity: 0; transition: left 0.45s cubic-bezier(0.34,1.1,0.64,1), opacity 0.3s; pointer-events: none; z-index: 1; }
        .guide.on { opacity: 1; }
        .guide .tag { position: absolute; top: -2px; left: 4px; font-family: var(--mono); font-size: 9.5px; font-weight: 700; color: #a5f3fc; white-space: nowrap; }

        /* interval rows hosting bars */
        .bars-area { position: relative; }
        .bar-row { position: relative; height: 34px; }

        .bar {
            position: absolute; height: 26px; top: 4px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 12px; font-weight: 800; letter-spacing: 0.3px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.06); color: var(--text-main);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
            white-space: nowrap; overflow: hidden; will-change: left, width;
            transition: left 0.45s cubic-bezier(0.34,1.1,0.64,1), width 0.45s cubic-bezier(0.34,1.1,0.64,1),
                        background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, opacity 0.35s, transform 0.3s;
        }
        .bar.idle    { opacity: 0.92; }
        .bar.pending { opacity: 0.45; background: rgba(255,255,255,0.03); color: var(--text-dim); border-color: rgba(255,255,255,0.08); }
        .bar.current { border-color: var(--accent-purple); background: rgba(168,85,247,0.18); color: #e9d5ff; box-shadow: 0 0 20px rgba(168,85,247,0.5), inset 0 0 12px rgba(168,85,247,0.12); transform: translateY(-1px); z-index: 4; }
        .bar.checking{ border-color: var(--accent-blue); background: rgba(6,182,212,0.18); color: #a5f3fc; box-shadow: 0 0 18px rgba(6,182,212,0.4); z-index: 3; }
        .bar.removed { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; opacity: 0.55; z-index: 2; }
        .bar.removed::after { content: ''; position: absolute; left: 6%; right: 6%; top: 50%; height: 2px; background: var(--accent-red); opacity: 0.7; }
        .bar.kept    { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.82), rgba(33,194,117,0.82)); color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.45); z-index: 3; }

        .empty-hint { font-family: var(--mono); font-size: 12px; color: var(--text-dim); padding: 6px 2px; }

        .action-stage { position: relative; min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; min-height: 40px; }
        .ans-tile { height: 44px; padding: 0 18px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: var(--mono); border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.14); color: #fde9c4; box-shadow: 0 0 14px rgba(245,165,36,0.35); }
        .ans-tile .big { font-size: 20px; font-weight: 800; color: #ffd98a; }
        .ans-tile .lbl { font-size: 9px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--accent-orange); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); } .pill.k b { color: var(--accent-blue); } .pill.o b { color: var(--accent-orange); } .pill.g b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">intervals =</label>
        <input type="text" id="arr-input" placeholder="[1,2],[2,3],[3,4],[1,3]" maxlength="120">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">[1,2],[2,3],[3,4],[1,3]</button>
        <button onclick="loadExample(1)">[1,2],[1,2],[1,2]</button>
        <button onclick="loadExample(2)">[1,2],[2,3]</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Non-overlapping Intervals <span class="sub">&middot; sort by end &middot; greedily keep when <code style="font-family:var(--mono)">start &ge; lastEnd</code> &middot; O(n log n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="timeline-stage" id="timeline-stage">
                    <div class="timeline-inner" id="timeline-inner">
                        <div class="axis" id="axis"></div>
                        <div class="guide" id="guide"><span class="tag" id="guide-tag">lastEnd</span></div>
                        <div class="track-label">Sweep (sorted by end)</div>
                        <div class="bars-area" id="bars-area"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill c">current <b id="st-curr">&mdash;</b></span>
                            <span class="pill k">lastEnd <b id="st-last">&mdash;</b></span>
                            <span class="pill g">kept <b id="st-kept">0</b></span>
                            <span class="pill o">removed <b id="st-removed">0</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring pop, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.7 + 0.3 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // ───────── State ─────────
        const EXAMPLES = [
            [[1, 2], [2, 3], [3, 4], [1, 3]],
            [[1, 2], [1, 2], [1, 2]],
            [[1, 2], [2, 3]]
        ];
        let intervals = EXAMPLES[0].map(x => x.slice());
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 760, 360];

        // persistent DOM caches (keyed by sorted-order index)
        const sweepBars = {};   // id -> bar element on the sweep track
        let axisMeta = null;    // {min, max, perUnit, width}

        const CODE = [
            [['kw','def '],['fn','eraseOverlap'],['src','(intervals):']],
            [['src','  intervals.sort(key=lambda x: x[1])']],
            [['src','  removed, lastEnd = 0, -inf']],
            [['kw','  for '],['src','s, e in intervals:']],
            [['kw','    if '],['src','s >= lastEnd:']],
            [['src','      lastEnd = e        # keep']],
            [['kw','    else'],['src',':']],
            [['src','      removed += 1       # drop']],
            [['kw','  return '],['src','removed']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── axis geometry (built once per input load) ─────────
        const PAD = 14;          // px padding at each end of the axis
        const MIN_BAR = 30;      // minimum bar width so zero-length stays visible
        function computeAxis() {
            let lo = Infinity, hi = -Infinity;
            for (const iv of intervals) { lo = Math.min(lo, iv[0]); hi = Math.max(hi, iv[1]); }
            if (!isFinite(lo)) { lo = 0; hi = 1; }
            if (lo === hi) hi = lo + 1;
            const span = hi - lo;
            const stage = document.getElementById('timeline-stage');
            const avail = Math.max((stage.clientWidth || 760) - 56, 360);
            const perUnit = Math.max(avail / span, 30);
            const width = span * perUnit + PAD * 2;
            axisMeta = { min: lo, max: hi, perUnit, width };
            return axisMeta;
        }
        function xOf(val) { return PAD + (val - axisMeta.min) * axisMeta.perUnit; }

        function chooseTicks(lo, hi) {
            const span = hi - lo;
            let step = 1;
            const targets = [1, 2, 5, 10, 20, 50, 100];
            for (const t of targets) { if (span / t <= 12) { step = t; break; } step = t; }
            const ticks = [];
            const start = Math.ceil(lo / step) * step;
            for (let v = start; v <= hi; v += step) ticks.push(v);
            if (ticks[0] !== lo) ticks.unshift(lo);
            if (ticks[ticks.length - 1] !== hi) ticks.push(hi);
            return ticks;
        }

        function sortedIntervals() {
            return [...intervals].sort((a, b) => a[1] - b[1] || a[0] - b[0]);
        }

        function buildTimelineSkeleton() {
            const inner = document.getElementById('timeline-inner');
            computeAxis();
            inner.style.width = axisMeta.width + 'px';

            // axis
            const axis = document.getElementById('axis'); axis.innerHTML = '';
            const line = document.createElement('div'); line.className = 'axis-line'; axis.appendChild(line);
            chooseTicks(axisMeta.min, axisMeta.max).forEach(v => {
                const t = document.createElement('div'); t.className = 'tick'; t.style.left = xOf(v) + 'px';
                const m = document.createElement('div'); m.className = 'mark';
                const l = document.createElement('div'); l.className = 'lbl'; l.textContent = v;
                t.appendChild(m); t.appendChild(l); axis.appendChild(t);
            });

            // sweep bars: one row per input interval (sorted by end), keyed by sorted index
            const barsArea = document.getElementById('bars-area'); barsArea.innerHTML = '';
            Object.keys(sweepBars).forEach(k => delete sweepBars[k]);

            const sorted = sortedIntervals();
            sorted.forEach((iv, idx) => {
                const row = document.createElement('div'); row.className = 'bar-row';
                const bar = document.createElement('div'); bar.className = 'bar idle';
                positionBar(bar, iv[0], iv[1]);
                bar.textContent = `[${iv[0]},${iv[1]}]`;
                row.appendChild(bar); barsArea.appendChild(row);
                sweepBars[idx] = bar;
            });
            if (sorted.length === 0) {
                const hint = document.createElement('div'); hint.className = 'empty-hint'; hint.textContent = 'no intervals';
                barsArea.appendChild(hint);
            }
        }

        function positionBar(bar, start, end) {
            const left = xOf(start);
            const w = Math.max((end - start) * axisMeta.perUnit, MIN_BAR);
            bar.style.left = left + 'px';
            bar.style.width = w + 'px';
        }

        // ───────── step generation (immutable snapshots) ─────────
        function generateSteps() {
            steps = [];
            const sorted = sortedIntervals();
            const n = sorted.length;
            const fmt = (iv) => `[${iv[0]},${iv[1]}]`;
            const fmtAll = (arr) => '[' + arr.map(fmt).join(', ') + ']';

            // bar classes per sorted index; snapshot copies it each step
            const cls = sorted.map(() => 'pending');

            const snap = (extra) => Object.assign({
                bars: cls.slice(),
                curr: null, last: null, kept: 0, removed: 0, guide: null,
                code: [], action: '', actionColor: 'var(--text-dim)', panel: '', log: ''
            }, extra);

            if (n === 0) {
                steps.push(snap({
                    complete: true, confetti: false, answer: 0,
                    code: [8], action: '✓ 0', actionColor: 'var(--accent-green)',
                    panel: 'No intervals &#8594; nothing to remove. Answer is <code>0</code>.',
                    log: 'done  removed = 0'
                }));
                return;
            }

            // INPUT step
            for (let i = 0; i < n; i++) cls[i] = 'idle';
            steps.push(snap({
                code: [0], action: 'INPUT', actionColor: 'var(--accent-blue)',
                panel: `Remove the fewest intervals so the rest are non-overlapping in <code>${fmtAll(intervals)}</code>. Each bar is drawn on a numeric timeline by its <code>[start,end]</code>.`,
                log: `init  intervals = ${fmtAll(intervals)} (n=${n})`
            }));

            // SORT step
            steps.push(snap({
                code: [1], action: 'SORT BY END', actionColor: 'var(--accent-blue)',
                panel: `Sort by <b>end</b> &#8594; <code>${fmtAll(sorted)}</code>. Keeping the interval that ends earliest leaves the most room for the rest.`,
                log: `sort  ${fmtAll(sorted)}`
            }));

            let removed = 0, kept = 0, lastEnd = -Infinity;
            const lastStr = () => (lastEnd === -Infinity ? '&minus;&infin;' : lastEnd);
            const lastStrLog = () => (lastEnd === -Infinity ? '-inf' : lastEnd);

            // SETUP step
            steps.push(snap({
                last: lastStr(), kept: 0, removed: 0,
                code: [2], action: 'INIT', actionColor: 'var(--accent-purple)',
                panel: `Start with <code>removed = 0</code> and <code>lastEnd = &minus;&infin;</code> (no interval kept yet).`,
                log: `init  removed=0  lastEnd=-inf`
            }));

            for (let i = 0; i < n; i++) {
                const iv = sorted[i];
                const overlap = iv[0] < lastEnd; // start < lastEnd => overlaps the last kept

                // CHECK step
                cls[i] = 'checking';
                steps.push(snap({
                    curr: fmt(iv), last: lastStr(), kept, removed,
                    guide: lastEnd === -Infinity ? null : lastEnd,
                    code: [3, 4], action: `${iv[0]} ${iv[0] >= lastEnd ? '≥' : '<'} ${lastEnd === -Infinity ? '-∞' : lastEnd} ?`,
                    actionColor: 'var(--accent-blue)',
                    panel: `Check <code>${fmt(iv)}</code>: does its start sit at or past <code>lastEnd</code>? Test <code>start &ge; lastEnd</code> &#8594; <code>${iv[0]} ${iv[0] >= lastEnd ? '&ge;' : '&lt;'} ${lastEnd === -Infinity ? '&minus;&infin;' : lastEnd}</code>.`,
                    log: `check ${fmt(iv)}  start=${iv[0]} vs lastEnd=${lastStrLog()}`
                }));

                if (!overlap) {
                    // keep
                    const prevLast = (lastEnd === -Infinity) ? '&minus;&infin;' : lastEnd;
                    lastEnd = iv[1];
                    kept++;
                    cls[i] = 'kept';
                    steps.push(snap({
                        curr: fmt(iv), last: lastStr(), kept, removed,
                        guide: lastEnd,
                        code: [4, 5], action: `KEEP → lastEnd = ${lastEnd}`, actionColor: 'var(--accent-green)',
                        panel: `No overlap (<code>${iv[0]} &ge; ${prevLast}</code>). <b>Keep</b> <code>${fmt(iv)}</code> and advance <code>lastEnd = ${lastEnd}</code>.`,
                        log: `  keep ${fmt(iv)}  lastEnd → ${lastEnd}  kept=${kept}`
                    }));
                } else {
                    // remove
                    removed++;
                    cls[i] = 'removed';
                    steps.push(snap({
                        curr: fmt(iv), last: lastStr(), kept, removed,
                        guide: lastEnd,
                        code: [6, 7], action: `REMOVE → removed = ${removed}`, actionColor: 'var(--accent-red)',
                        panel: `Overlap! <code>${iv[0]} &lt; ${lastEnd}</code>, so <code>${fmt(iv)}</code> collides with the last kept interval. <b>Remove</b> it &#8594; <code>removed = ${removed}</code>. (<code>lastEnd</code> stays ${lastEnd}.)`,
                        log: `  drop ${fmt(iv)}  overlaps  removed=${removed}`
                    }));
                }
            }

            // FINAL step
            steps.push(snap({
                complete: true, confetti: true, answer: removed,
                curr: '—', last: lastStr(), kept, removed,
                guide: lastEnd === -Infinity ? null : lastEnd,
                code: [8], action: `✓ remove ${removed}`, actionColor: 'var(--accent-green)',
                panel: `Sweep complete. <b>${kept}</b> interval${kept === 1 ? '' : 's'} kept, so the minimum to remove is <code>${removed}</code>.`,
                log: `done  removed = ${removed}  (kept ${kept})`
            }));
        }

        // ───────── render (persistent DOM, recolor only) ─────────
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // sweep bars
            step.bars.forEach((c, id) => {
                const el = sweepBars[id]; if (!el) return;
                const wasKept = el.classList.contains('kept');
                const wasRemoved = el.classList.contains('removed');
                el.className = 'bar ' + c;
                if (!REDUCED && ((c === 'kept' && !wasKept) || (c === 'removed' && !wasRemoved))) Motion.pop(el);
            });

            // last-kept-end guide line
            const guide = document.getElementById('guide');
            if (step.guide != null && axisMeta) {
                guide.style.left = xOf(step.guide) + 'px';
                document.getElementById('guide-tag').textContent = 'lastEnd=' + step.guide;
                guide.classList.add('on');
            } else {
                guide.classList.remove('on');
            }

            // answer track
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.complete) {
                const t = document.createElement('div'); t.className = 'ans-tile';
                const big = document.createElement('div'); big.className = 'big'; big.textContent = step.answer;
                const lbl = document.createElement('div'); lbl.className = 'lbl'; lbl.textContent = 'min removals';
                t.appendChild(big); t.appendChild(lbl); at.appendChild(t);
                if (!REDUCED) Motion.pop(t);
            }

            // narration + action
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // state strip
            document.getElementById('st-curr').textContent = step.curr || '—';
            document.getElementById('st-last').innerHTML = step.last == null ? '—' : step.last;
            document.getElementById('st-kept').textContent = step.kept;
            document.getElementById('st-removed').textContent = step.removed;

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function loadIntervals(arr) {
            pause();
            intervals = arr.map(x => x.slice());
            confettiArmed = true;
            buildTimelineSkeleton();   // rebuild bars once per input load
            generateSteps();
            renderStep(0);
        }
        function loadCustom() {
            const valStr = document.getElementById('arr-input').value || '';
            const matches = valStr.match(/\[\s*-?\d+\s*,\s*-?\d+\s*\]/g);
            if (matches && matches.length) {
                try {
                    const parsed = matches.map(m => JSON.parse(m)).filter(p => Array.isArray(p) && p.length === 2 && p[0] <= p[1]);
                    if (parsed.length) { loadIntervals(parsed); return; }
                } catch (e) { /* fallthrough */ }
            }
            alert('Invalid format. Use [start,end], [start,end] with start <= end.');
        }
        function loadExample(n) {
            const ex = EXAMPLES[n];
            document.getElementById('arr-input').value = ex.map(i => `[${i[0]},${i[1]}]`).join(', ');
            loadIntervals(ex);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('arr-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });

        // rebuild geometry on resize (bars reposition to the new axis without losing step state)
        let resizeRaf = null;
        window.addEventListener('resize', () => {
            if (resizeRaf) cancelAnimationFrame(resizeRaf);
            resizeRaf = requestAnimationFrame(() => {
                buildTimelineSkeleton();
                renderStep(stepIdx);
            });
        });

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
