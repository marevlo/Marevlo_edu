<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Non-overlapping Intervals - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 320px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .array-row { display: flex; align-items: center; gap: 12px; min-height: 50px; justify-content: center; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 50px; }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tile {
            min-width: 60px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 14px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; background: #21262d; border: 1px solid var(--border-main);
            color: var(--text-main); padding: 0 6px;
        }
        .tile-index { font-size: 9px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border: 2px solid var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); z-index: 2; }
        .tile.winning { background: #0f2a1a; border: 2px solid var(--accent-green); color: var(--accent-green); transform: scale(1.05); }
        .tile.defeated { background: #2a0d0d; border: 2px solid var(--accent-red); color: var(--accent-red); opacity: 0.6; transform: scale(0.95); }
        .tile.idle { opacity: 0.9; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 14px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 18px; width: 650px; text-align: center; font-family: monospace; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; font-size: 14px; line-height: 1.4;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 120px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 15px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 18px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 24px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">intervals =</label>
        <input type="text" id="arr-input" placeholder="[[1,2],[2,3],[3,4],[1,3]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([[1,2],[2,3],[3,4],[1,3]])">Ex 1</button>
        <button onclick="loadExample([[1,2],[1,2],[1,2]])">Ex 2</button>
        <button onclick="loadExample([[1,2],[2,3]])">Ex 3</button>
    </div>

    <div class="visual-container">
        <div class="array-row">
            <div class="ui-label" id="arr-label" style="width: 100px; text-align: right;">Intervals:</div>
            <div class="tiles-wrapper" id="orig-tiles"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Phase</span>
            <span class="info-value" id="val-phase" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Interval</span>
            <span class="info-value" id="val-curr" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Last Valid End</span>
            <span class="info-value" id="val-last" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Removed Count</span>
            <span class="info-value" id="val-removed" style="color: var(--accent-red);">0</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">minimum removals =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange)"></span> Current Interval</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green)"></span> Kept (No Overlap)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red)"></span> Removed (Overlap)</div>
        <div class="legend-item"><span class="dot" style="background:var(--text-dim); opacity:0.3"></span> Pending</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let intervals = [[1,2],[2,3],[3,4],[1,3]];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample([[1,2],[2,3],[3,4],[1,3]]); }

        function formatIntervals(arr) {
            return `[${arr.map(i => `[${i[0]},${i[1]}]`).join(',')}]`;
        }

        function loadExample(newArr) {
            intervals = newArr.map(x => [...x]);
            document.getElementById('arr-input').value = formatIntervals(intervals);
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('arr-input').value;
            try {
                let matches = valStr.match(/\[\s*-?\d+\s*,\s*-?\d+\s*\]/g) || [];
                let parsedArr = matches.map(m => JSON.parse(m));
                if (parsedArr.length > 0) {
                    loadExample(parsedArr);
                } else {
                    alert("Invalid format. Use [[start, end], [start, end]]");
                }
            } catch(e) {
                alert("Invalid format. Use [[start, end], [start, end]]");
            }
        }

        function generateSteps() {
            steps = [];
            const n = intervals.length;

            if (n === 0) {
                steps.push({
                    type: 'final', phase: 'Done', curr: '—', last: '—', removed: 0,
                    arrLabel: 'Intervals:',
                    tiles: [],
                    panel: 'Array is empty. Minimum removals = 0.',
                    complete: true,
                    result: 0,
                    statusText: `Done. Empty array.`,
                    log: `Final result: 0`,
                    logColor: 'var(--accent-blue)', bold: true
                });
                return;
            }

            // STEP 0: INIT
            steps.push({
                type: 'init', phase: 'Initialization', curr: '—', last: '—', removed: 0,
                arrLabel: 'Original Intervals:',
                tiles: intervals.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'idle'})),
                panel: 'Algorithm: Greedy Approach. First, we need to sort the intervals by their END times.',
                statusText: `n=${n}. Click Play to begin.`,
                log: `n=${n}. Starting Greedy approach for Non-overlapping Intervals.`,
                logColor: 'var(--text-dim)'
            });

            // STEP 1: SORT
            let sorted = [...intervals].sort((a, b) => a[1] - b[1] || a[0] - b[0]);
            
            steps.push({
                type: 'sort', phase: 'Sorting', curr: '—', last: '—', removed: 0,
                arrLabel: 'Sorted by End Time:',
                tiles: sorted.map(v => ({val: `[${v[0]},${v[1]}]`, state: 'idle'})),
                panel: 'Intervals sorted by END times to maximize capacity for subsequent intervals.',
                statusText: `Intervals sorted.`,
                log: `Sorted intervals: ${formatIntervals(sorted)}`,
                logColor: 'var(--accent-blue)'
            });

            let removedCount = 0;
            let lastEnd = -Infinity;
            let tileStates = sorted.map(() => 'idle');

            for (let i = 0; i < n; i++) {
                let current = sorted[i];

                tileStates[i] = 'candidate';
                
                // STEP A: Evaluate
                steps.push({
                    type: 'eval', phase: 'Evaluating', curr: `[${current[0]},${current[1]}]`, last: lastEnd === -Infinity ? '-∞' : lastEnd, removed: removedCount,
                    arrLabel: 'Processing:',
                    tiles: sorted.map((v, idx) => ({val: `[${v[0]},${v[1]}]`, state: tileStates[idx]})),
                    panel: `Evaluating <b>[${current[0]},${current[1]}]</b>.<br>Compare Start Time (<b>${current[0]}</b>) with Last Valid End Time (<b>${lastEnd === -Infinity ? '-∞' : lastEnd}</b>).`,
                    statusText: `Checking interval at index ${i}...`,
                    log: `i=${i}: Check [${current[0]},${current[1]}] against lastEnd=${lastEnd === -Infinity ? '-∞' : lastEnd}`,
                    logColor: 'var(--text-main)'
                });

                if (current[0] >= lastEnd) {
                    // No overlap, Keep
                    lastEnd = current[1];
                    tileStates[i] = 'winning';

                    steps.push({
                        type: 'keep', phase: 'No Overlap', curr: `[${current[0]},${current[1]}]`, last: lastEnd, removed: removedCount,
                        arrLabel: 'Processing:',
                        tiles: sorted.map((v, idx) => ({val: `[${v[0]},${v[1]}]`, state: tileStates[idx]})),
                        panel: `<span style="color:var(--accent-green)">Start Time (${current[0]}) >= Last End Time. No overlap!</span><br>Keep this interval and update Last End Time to <b>${lastEnd}</b>.`,
                        statusText: `Interval kept. Updating last valid end.`,
                        log: `  -> Kept. No overlap. New lastEnd = ${lastEnd}.`,
                        logColor: 'var(--accent-green)'
                    });
                } else {
                    // Overlap, Remove
                    removedCount++;
                    tileStates[i] = 'defeated';

                    steps.push({
                        type: 'remove', phase: 'Overlap Detected', curr: `[${current[0]},${current[1]}]`, last: lastEnd, removed: removedCount,
                        arrLabel: 'Processing:',
                        tiles: sorted.map((v, idx) => ({val: `[${v[0]},${v[1]}]`, state: tileStates[idx]})),
                        panel: `<span style="color:var(--accent-red)">Start Time (${current[0]}) < Last End Time (${lastEnd}). Overlap detected!</span><br>Remove this interval to minimize conflicts.`,
                        statusText: `Interval removed. Total removed: ${removedCount}.`,
                        log: `  -> Overlap! Removed [${current[0]},${current[1]}]. Total removed = ${removedCount}.`,
                        logColor: 'var(--accent-red)'
                    });
                }
            }

            // FINAL STEP
            steps.push({
                type: 'final', phase: 'Done', curr: '—', last: lastEnd, removed: removedCount,
                arrLabel: 'Final State:',
                tiles: sorted.map((v, idx) => ({val: `[${v[0]},${v[1]}]`, state: tileStates[idx]})),
                panel: 'Interval Traversal Complete. The optimal greedy strategy leaves the minimum number of removals.',
                complete: true,
                result: removedCount,
                statusText: `Done. Minimum intervals to remove is ${removedCount}.`,
                log: `Final result: ${removedCount} intervals removed.`,
                logColor: 'var(--accent-blue)', bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            document.getElementById('arr-label').innerText = step.arrLabel;

            const container = document.getElementById('orig-tiles');
            container.innerHTML = '';
            
            step.tiles.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${t.state}`;
                tile.innerText = t.val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('val-phase').innerText = step.phase;
            document.getElementById('val-curr').innerText = step.curr;
            document.getElementById('val-last').innerText = step.last;
            document.getElementById('val-removed').innerText = step.removed;

            const resVal = document.getElementById('res-val');
            resVal.innerText = step.complete ? step.result : '—';
            
            if (step.complete) {
                resVal.classList.add('pop');
            } else {
                resVal.classList.remove('pop');
            }

            document.getElementById('status-text').innerText = step.statusText;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerHTML = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
