<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Stack</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* value in motion / pushed     */
            --accent-blue:   #06b6d4;    /* TOP pointer / chrome          */
            --accent-green:  #22c55e;    /* settled / committed           */
            --accent-red:    #f43f5e;    /* popped / error                */
            --accent-purple: #a855f7;    /* current / peek / max          */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(6, 182, 212, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(6,182,212,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"], input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 90px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(6,182,212,0.18); background: rgba(6,182,212,0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }
        .op-btn { font-family: var(--mono); }
        .op-btn.push { border-color: rgba(245,165,36,0.4); color: #ffe2b0; }
        .op-btn.pop  { border-color: rgba(244,63,94,0.4); color: #fecdd3; }
        .op-btn.peek { border-color: rgba(168,85,247,0.4); color: #e9d5ff; }
        .op-btn.maxop { border-color: rgba(168,85,247,0.55); color: #e9d5ff; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .op-feed { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .op-chip { font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 8px; border: 1px solid var(--border-main); color: var(--text-dim); background: rgba(255,255,255,0.03); transition: all 0.3s; white-space: nowrap; }
        .op-chip.done { opacity: 0.45; }
        .op-chip.current { color: #fff; border-color: rgba(6,182,212,0.6); background: rgba(6,182,212,0.16); box-shadow: 0 0 12px rgba(6,182,212,0.3); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); padding: 26px 18px; }

        /* two parallel vertical columns: value stack + max stack (index 0 at bottom; top grows up) */
        .stack-wrap { display: flex; align-items: flex-end; justify-content: center; gap: 96px; min-height: 320px; }
        .col-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .col-title { font-family: var(--mono); font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .col-title.val { color: var(--accent-blue); }
        .col-title.maxc { color: var(--accent-purple); }
        .stack-col { display: flex; flex-direction: column-reverse; gap: 8px; position: relative; }
        .slot { width: 132px; height: 46px; border-radius: 11px; display: flex; align-items: center; justify-content: center; gap: 10px;
            font-family: var(--mono); font-weight: 800; font-size: 19px; position: relative; will-change: transform;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s; }
        .slot.empty { border-style: dashed; color: var(--text-dim); background: rgba(255,255,255,0.015); }
        .slot.filled { border-color: rgba(34,197,94,0.45); background: rgba(34,197,94,0.10); color: #d6ffe8; }
        .slot.maxfill { border-color: rgba(168,85,247,0.45); background: rgba(168,85,247,0.10); color: #efe1ff; }
        .slot.toptile { border-color: var(--accent-blue); background: rgba(6,182,212,0.14); color: #a5f3fc; box-shadow: 0 0 20px rgba(6,182,212,0.45); }
        .slot.maxtop { border-color: var(--accent-purple); background: rgba(168,85,247,0.18); color: #e9d5ff; box-shadow: 0 0 20px rgba(168,85,247,0.5); }
        .slot.pushing { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.55); }
        .slot.popping { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 22px rgba(244,63,94,0.5); }
        .slot.peeking { border-color: var(--accent-purple); background: rgba(168,85,247,0.20); color: #f3e8ff; box-shadow: 0 0 24px rgba(168,85,247,0.6); }
        .slot .si { position: absolute; left: -26px; font-size: 11px; color: var(--text-dim); font-weight: 700; width: 20px; text-align: right; }
        .base-line { width: 158px; height: 4px; border-radius: 3px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent); margin-top: 2px; }

        /* TOP pointer pill that glides vertically to the current top slot */
        .top-ptr { position: absolute; display: flex; align-items: center; gap: 6px; opacity: 0; will-change: transform;
            font-family: var(--mono); font-size: 12px; font-weight: 800; }
        .top-ptr .arrow { font-size: 16px; }
        .top-ptr .tag { padding: 3px 9px; border-radius: 8px; }
        .top-ptr.val .arrow { color: var(--accent-blue); }
        .top-ptr.val .tag { background: var(--accent-blue); color: #04222a; box-shadow: 0 0 14px rgba(6,182,212,0.6); }
        .top-ptr.maxc .arrow { color: var(--accent-purple); }
        .top-ptr.maxc .tag { background: var(--accent-purple); color: #220a3a; box-shadow: 0 0 14px rgba(168,85,247,0.6); }

        .action-stage { position: relative; min-height: 84px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .float-tile { width: 56px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 22px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.5); opacity: 0; transform: scale(.5); transition: opacity .25s, transform .4s cubic-bezier(.34,1.5,.64,1); }
        .float-tile.show { opacity: 1; transform: scale(1); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.t b { color: var(--accent-blue); } .pill.s b { color: var(--accent-green); } .pill.m b { color: var(--accent-purple); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <input type="number" id="val-input" placeholder="value" min="0" max="99">
        <button class="op-btn push" onclick="doOp('push')">Push</button>
        <button class="op-btn pop"  onclick="doOp('pop')">Pop</button>
        <button class="op-btn peek" onclick="doOp('top')">Top</button>
        <button class="op-btn maxop" onclick="doOp('peekMax')">PeekMax</button>
        <button class="op-btn maxop" onclick="doOp('popMax')">PopMax</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Example 1</button>
        <button onclick="loadExample(1)">Example 2</button>
        <button onclick="resetSim()">&#8634; Reset</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Max Stack <span class="sub">&middot; value stack + parallel max stack &middot; peekMax O(1) &middot; popMax O(n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="op-feed" id="op-feed"></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="stack-wrap">
                    <div class="col-group">
                        <div class="col-title val">value stack</div>
                        <div>
                            <div class="stack-col" id="val-col"></div>
                            <div class="base-line"></div>
                        </div>
                    </div>
                    <div class="col-group">
                        <div class="col-title maxc">max stack</div>
                        <div>
                            <div class="stack-col" id="max-col"></div>
                            <div class="base-line"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="float-tile" id="float-tile"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill t">top <b id="st-top">-1</b></span>
                            <span class="pill s">size <b id="st-size">0</b></span>
                            <span class="pill m">max <b id="st-max">&minus;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            glide(el, y) {
                const prev = el._y; el.style.opacity = '1';
                const commit = `translateY(${y.toFixed(2)}px)`;
                if (REDUCED || prev == null || Math.abs(y - prev) < 0.5) { el._y = y; el.style.transform = commit; return; }
                const dy = y - prev;
                const kf = SPRING_POS.map(p => ({ transform: `translateY(${(prev + dy * p).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._y = y; el.style.transform = commit;
            },
            pop(el, fromY) {
                if (REDUCED) { el.style.opacity = '1'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `translateY(${((fromY || -16) * (1 - p)).toFixed(2)}px) scale(${(0.4 + 0.6 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'backwards' });
            },
        };

        // ───────── State ─────────
        let ops = [];          // [{type:'push'|'pop'|'top'|'peekMax'|'popMax', value?}]
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 800, 380];
        const slotEls = { val: {}, max: {} };  // col -> index -> element

        const CODE = [
            [['kw','class '],['fn','MaxStack'],['src',':  # vals[], maxs[]']],
            [['src','  def '],['fn','push'],['src','(self, x):']],
            [['src','    m = x '],['kw','if not'],['src',' maxs '],['kw','else'],['src',' max(x, maxs[-1])']],
            [['src','    vals.append(x); maxs.append(m)']],
            [['src','  def '],['fn','pop'],['src','(self): maxs.pop(); '],['kw','return'],['src',' vals.pop()']],
            [['src','  def '],['fn','top'],['src','(self): '],['kw','return'],['src',' vals[-1]']],
            [['src','  def '],['fn','peekMax'],['src','(self): '],['kw','return'],['src',' maxs[-1]']],
            [['src','  def '],['fn','popMax'],['src','(self):']],
            [['src','    m = maxs[-1]; buf = []']],
            [['kw','    while '],['src','vals[-1] != m: buf.append(self.pop())']],
            [['src','    self.pop()  # remove the max']],
            [['kw','    for '],['src','v '],['kw','in'],['src',' reversed(buf): self.push(v)']],
            [['kw','    return'],['src',' m']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── step generation ─────────
        // We keep two parallel arrays: vals[] and maxs[] (running maximum).
        // maxs[i] = max(vals[0..i]). peekMax = maxs[-1]. popMax removes the
        // top-most occurrence of maxs[-1], temporarily popping values above it
        // into a buffer and pushing them back afterwards.
        function generateSteps() {
            steps = [];
            const vals = [];
            const maxs = [];
            const snap = (extra) => Object.assign({
                vals: [...vals], maxs: [...maxs], top: vals.length - 1, opIdx: null,
                vPush: -1, vPop: -1, vPeek: -1, mPush: -1, mPop: -1, mPeek: -1,
                tile: null, tileColor: 'var(--accent-orange)'
            }, extra);

            steps.push(snap({ code: [0], action: 'NEW MAX-STACK', actionColor: 'var(--accent-blue)',
                panel: `A <b>Max-Stack</b> is a stack that also answers <code>peekMax</code> / <code>popMax</code>. Keep a second parallel stack <code>maxs</code> where <code>maxs[i] = max(vals[0..i])</code> &mdash; the running maximum. Its top is always the current max.`,
                log: `init  vals = [], maxs = []` }));

            ops.forEach((op, oi) => {
                if (op.type === 'push') {
                    const x = op.value;
                    const m = maxs.length === 0 ? x : Math.max(x, maxs[maxs.length - 1]);
                    vals.push(x); maxs.push(m);
                    const grew = (maxs.length === 1) || (m !== maxs[maxs.length - 2]);
                    steps.push(snap({ opIdx: oi, code: [1, 2, 3], action: 'PUSH ' + x, actionColor: 'var(--accent-orange)',
                        vPush: vals.length - 1, mPush: maxs.length - 1, tile: x, tileColor: 'var(--accent-orange)',
                        panel: `<code>push(${x})</code> &#8594; append <b>${x}</b> to <code>vals</code>. New running max <code>m = max(${x}, ${maxs.length > 1 ? maxs[maxs.length - 2] : '&minus;&#8734;'}) = <b>${m}</b></code>, pushed onto <code>maxs</code>.${grew ? ' The max <b>grew</b>.' : ' Max unchanged &mdash; it carries forward.'}`,
                        log: `push(${x})  max -> ${m}` }));
                } else if (op.type === 'pop') {
                    if (vals.length === 0) {
                        steps.push(snap({ opIdx: oi, code: [4], action: 'EMPTY', actionColor: 'var(--accent-red)', miss: true,
                            panel: `<code>pop()</code> &#8594; <span style="color:var(--accent-red)">empty</span> &mdash; nothing to remove.`,
                            log: `pop() -> empty` }));
                    } else {
                        const v = vals[vals.length - 1];
                        steps.push(snap({ opIdx: oi, code: [4], action: 'POP ' + v, actionColor: 'var(--accent-red)',
                            vPop: vals.length - 1, mPop: maxs.length - 1, tile: v, tileColor: 'var(--accent-red)',
                            panel: `<code>pop()</code> &#8594; remove top <b>${v}</b> from <code>vals</code> and its paired entry from <code>maxs</code>. Both stacks shrink together, so the running max stays correct.`,
                            log: `pop() -> ${v}` }));
                        vals.pop(); maxs.pop();
                    }
                } else if (op.type === 'top') {
                    if (vals.length === 0) {
                        steps.push(snap({ opIdx: oi, code: [5], action: 'EMPTY', actionColor: 'var(--accent-red)', miss: true,
                            panel: `<code>top()</code> &#8594; <span style="color:var(--accent-red)">empty</span> &mdash; no top element.`,
                            log: `top() -> empty` }));
                    } else {
                        const v = vals[vals.length - 1];
                        steps.push(snap({ opIdx: oi, code: [5], action: 'TOP ' + v, actionColor: 'var(--accent-blue)',
                            vPeek: vals.length - 1, tile: v, tileColor: 'var(--accent-blue)',
                            panel: `<code>top()</code> &#8594; read <code>vals[-1] = <b>${v}</b></code> without removing it.`,
                            log: `top() -> ${v}` }));
                    }
                } else if (op.type === 'peekMax') {
                    if (maxs.length === 0) {
                        steps.push(snap({ opIdx: oi, code: [6], action: 'EMPTY', actionColor: 'var(--accent-red)', miss: true,
                            panel: `<code>peekMax()</code> &#8594; <span style="color:var(--accent-red)">empty</span> &mdash; no maximum.`,
                            log: `peekMax() -> empty` }));
                    } else {
                        const m = maxs[maxs.length - 1];
                        steps.push(snap({ opIdx: oi, code: [6], action: 'PEEKMAX ' + m, actionColor: 'var(--accent-purple)',
                            mPeek: maxs.length - 1, tile: m, tileColor: 'var(--accent-purple)',
                            panel: `<code>peekMax()</code> &#8594; just read the top of <code>maxs</code>: <code><b>${m}</b></code>. This is <b>O(1)</b> &mdash; the running max is always at the top.`,
                            log: `peekMax() -> ${m}` }));
                    }
                } else if (op.type === 'popMax') {
                    if (vals.length === 0) {
                        steps.push(snap({ opIdx: oi, code: [7], action: 'EMPTY', actionColor: 'var(--accent-red)', miss: true,
                            panel: `<code>popMax()</code> &#8594; <span style="color:var(--accent-red)">empty</span> &mdash; nothing to remove.`,
                            log: `popMax() -> empty` }));
                    } else {
                        const m = maxs[maxs.length - 1];
                        // locate top-most occurrence of m in vals
                        let idx = vals.length - 1;
                        while (idx >= 0 && vals[idx] !== m) idx--;
                        const aboveCount = vals.length - 1 - idx;

                        // 1) announce target
                        steps.push(snap({ opIdx: oi, code: [7, 8], action: 'POPMAX ' + m, actionColor: 'var(--accent-purple)',
                            mPeek: maxs.length - 1, vPeek: idx, tile: m, tileColor: 'var(--accent-purple)',
                            panel: `<code>popMax()</code> &#8594; target max is <code>maxs[-1] = <b>${m}</b></code>. Its top-most copy sits at <code>vals[${idx}]</code>${aboveCount ? `, with <b>${aboveCount}</b> value(s) above it.` : ' (already on top).'}`,
                            log: `popMax()  target = ${m} @ idx ${idx}` }));

                        // 2) peel values above the max into a temp buffer, one at a time
                        const buf = [];
                        for (let k = 0; k < aboveCount; k++) {
                            const v = vals[vals.length - 1];
                            steps.push(snap({ opIdx: oi, code: [9], action: 'BUFFER ' + v, actionColor: 'var(--accent-orange)',
                                vPop: vals.length - 1, mPop: maxs.length - 1, tile: v, tileColor: 'var(--accent-orange)',
                                panel: `<b>${v}</b> sits above the max &mdash; <code>pop()</code> it into a temp buffer <code>buf</code> so we can reach the max underneath. Buffer: <code>[${[...buf, v].join(', ')}]</code>.`,
                                log: `  buffer <- ${v}` }));
                            vals.pop(); maxs.pop(); buf.push(v);
                        }

                        // 3) remove the max itself (now on top)
                        const removed = vals[vals.length - 1];
                        steps.push(snap({ opIdx: oi, code: [10], action: 'REMOVE ' + removed, actionColor: 'var(--accent-red)',
                            vPop: vals.length - 1, mPop: maxs.length - 1, tile: removed, tileColor: 'var(--accent-red)',
                            panel: `The max <b>${removed}</b> is now on top &mdash; <code>pop()</code> it off both stacks. That is the value <code>popMax</code> returns.`,
                            log: `  remove max ${removed}` }));
                        vals.pop(); maxs.pop();

                        // 4) push the buffered values back (restores original order, recomputes maxs)
                        for (let k = buf.length - 1; k >= 0; k--) {
                            const v = buf[k];
                            const mm = maxs.length === 0 ? v : Math.max(v, maxs[maxs.length - 1]);
                            vals.push(v); maxs.push(mm);
                            steps.push(snap({ opIdx: oi, code: [11], action: 'RESTORE ' + v, actionColor: 'var(--accent-green)',
                                vPush: vals.length - 1, mPush: maxs.length - 1, tile: v, tileColor: 'var(--accent-green)',
                                panel: `Push the buffered <b>${v}</b> back on. Its running max is recomputed as <code>max(${v}, ${maxs.length > 1 ? maxs[maxs.length - 2] : '&minus;&#8734;'}) = <b>${mm}</b></code>. Remaining in buffer: <code>[${buf.slice(0, k).join(', ')}]</code>.`,
                                log: `  restore -> ${v} (max ${mm})` }));
                        }

                        // 5) settle
                        steps.push(snap({ opIdx: oi, code: [12], action: 'POPMAX = ' + removed, actionColor: 'var(--accent-purple)',
                            tile: removed, tileColor: 'var(--accent-purple)',
                            panel: `<code>popMax()</code> returns <b>${removed}</b>. Original order is restored and <code>maxs</code> is consistent again. New max is <code>${maxs.length ? maxs[maxs.length - 1] : '&minus;'}</code>.`,
                            log: `popMax() -> ${removed}` }));
                    }
                }
            });

            steps.push(snap({ complete: true, confetti: true, action: '✓ DONE', actionColor: 'var(--accent-green)',
                panel: `All operations done. Final <code>vals</code> (bottom &#8594; top): <code>[${vals.join(', ') || ' '}]</code>, current max = <b>${maxs.length ? maxs[maxs.length - 1] : '&minus;'}</b>.`,
                log: `done  vals = [${vals.join(', ')}]  max = ${maxs.length ? maxs[maxs.length - 1] : '-'}` }));
        }

        // ───────── render ─────────
        const SLOT_H = 46, SLOT_GAP = 8;
        const MAX_ROWS = 7;  // visual height budget for pointer math

        function renderColumn(colKey, colId, arr, step) {
            const col = document.getElementById(colId);
            const store = slotEls[colKey];
            const used = new Set();
            const rows = Math.max(arr.length, 1);

            const pushIdx = colKey === 'val' ? step.vPush : step.mPush;
            const popIdx  = colKey === 'val' ? step.vPop  : step.mPop;
            const peekIdx = colKey === 'val' ? step.vPeek : step.mPeek;
            const top = arr.length - 1;

            // render filled slots
            for (let i = 0; i < arr.length; i++) {
                used.add(String(i));
                let el = store[i];
                if (!el) {
                    el = document.createElement('div'); el.className = 'slot';
                    el.innerHTML = `<span class="si"></span><span class="sv"></span>`;
                    store[i] = el; col.appendChild(el);
                }
                el.querySelector('.si').textContent = i;
                el.querySelector('.sv').textContent = arr[i];
                let cls = 'slot';
                if (i === pushIdx) cls += ' pushing';
                else if (i === peekIdx) cls += ' peeking';
                else if (i === top) cls += (colKey === 'max' ? ' maxtop' : ' toptile');
                else cls += (colKey === 'max' ? ' maxfill' : ' filled');
                el.className = cls;
                if (i === pushIdx) Motion.pop(el, -18);
            }
            // the popping slot (one above the new top) flashes the removed value
            if (popIdx >= 0 && store[popIdx]) {
                const el = store[popIdx];
                el.className = 'slot popping';
            }
            Object.keys(store).forEach(k => { if (!used.has(k)) { store[k].remove(); delete store[k]; } });

            renderTopPtr(colKey, colId, top, arr.length);
            return rows;
        }

        function renderTopPtr(colKey, colId, top, count) {
            const col = document.getElementById(colId);
            const ptrId = 'top-ptr-' + colKey;
            let ptr = document.getElementById(ptrId);
            if (!ptr) {
                ptr = document.createElement('div'); ptr.id = ptrId;
                ptr.className = 'top-ptr ' + (colKey === 'max' ? 'maxc' : 'val');
                ptr.innerHTML = `<span class="tag">top</span><span class="arrow">&#8592;</span>`;
                col.parentElement.appendChild(ptr);
            }
            if (top < 0) { ptr.style.opacity = '0'; ptr._y = null; return; }
            const colH = MAX_ROWS * SLOT_H + (MAX_ROWS - 1) * SLOT_GAP;
            const fromBottom = top * (SLOT_H + SLOT_GAP) + SLOT_H / 2;
            const y = colH - fromBottom - 11;
            ptr.style.top = '0px';
            ptr.style.right = '-72px';
            Motion.glide(ptr, y);
        }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            renderColumn('val', 'val-col', step.vals, step);
            renderColumn('max', 'max-col', step.maxs, step);

            // floating tile (value in motion)
            const ft = document.getElementById('float-tile');
            if (step.tile != null) { ft.textContent = step.tile; ft.classList.add('show'); ft.style.borderColor = step.tileColor; }
            else ft.classList.remove('show');

            // narration / action / chrome
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            mp.classList.toggle('miss', !!step.miss);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            renderOpFeed(step.opIdx);
            document.getElementById('st-top').textContent = step.top;
            document.getElementById('st-size').textContent = step.vals.length;
            document.getElementById('st-max').textContent = step.maxs.length ? step.maxs[step.maxs.length - 1] : '−';
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function renderOpFeed(currentOpIdx) {
            const feed = document.getElementById('op-feed'); feed.innerHTML = '';
            ops.forEach((op, i) => {
                const chip = document.createElement('div');
                const label = op.type + (op.value != null ? '(' + op.value + ')' : '()');
                chip.className = 'op-chip' + (currentOpIdx === i ? ' current' : (currentOpIdx != null && i < currentOpIdx ? ' done' : ''));
                chip.textContent = label; feed.appendChild(chip);
            });
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            ['val', 'max'].forEach(k => { Object.keys(slotEls[k]).forEach(i => { slotEls[k][i].remove(); delete slotEls[k][i]; }); });
            ['top-ptr-val', 'top-ptr-max'].forEach(id => { const p = document.getElementById(id); if (p) p.remove(); });
            confettiArmed = true;
        }
        function loadOps(newOps) { pause(); ops = newOps; clearDom(); generateSteps(); renderStep(0); }
        function doOp(type) {
            const input = document.getElementById('val-input');
            let value;
            if (type === 'push') { value = parseInt(input.value, 10); if (isNaN(value)) { input.focus(); return; } }
            loadOps([...ops, type === 'push' ? { type, value } : { type }]);
            renderStep(steps.length - 1);
            input.value = '';
        }

        // parse a sequence like ["push(5)","peekMax()","popMax()"] into op objects
        function parseSeq(seq) {
            return seq.map(s => {
                const name = s.slice(0, s.indexOf('('));
                const m = s.match(/\((\d+)\)/);
                return m ? { type: name, value: parseInt(m[1], 10) } : { type: name };
            });
        }

        function loadExample(n) {
            const exs = [
                ["push(5)", "push(1)", "push(5)", "peekMax()", "popMax()", "pop()", "peekMax()"],
                ["push(3)", "push(2)", "push(4)", "push(1)", "popMax()", "popMax()", "peekMax()"],
            ];
            loadOps(parseSeq(exs[n]));
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('val-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') doOp('push'); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
