<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse a Queue (using a Stack)</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* value in motion / front           */
            --accent-blue:   #06b6d4;   /* stack / chrome                    */
            --accent-green:  #22c55e;   /* committed / reversed              */
            --accent-red:    #f43f5e;   /* dequeue / pop                     */
            --accent-purple: #a855f7;   /* stack top                         */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(6, 182, 212, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(6,182,212,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 180px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(6,182,212,0.18); background: rgba(6,182,212,0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .op-feed { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .op-chip { font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 8px; border: 1px solid var(--border-main); color: var(--text-dim); background: rgba(255,255,255,0.03); transition: all 0.3s; white-space: nowrap; }
        .op-chip.done { opacity: 0.45; }
        .op-chip.current { color: #fff; border-color: rgba(6,182,212,0.6); background: rgba(6,182,212,0.16); box-shadow: 0 0 12px rgba(6,182,212,0.3); }
        .op-chip.phase { background: rgba(168,85,247,0.14); border-color: rgba(168,85,247,0.4); color: #e9d5ff; }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; padding: 40px 24px 48px; border: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: center; gap: 56px; overflow-x: auto; }

        .struct { display: flex; flex-direction: column; align-items: center; gap: 14px; }
        .struct-label { font-family: var(--mono); font-size: 12px; font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase; }
        .struct-label.q { color: var(--accent-orange); }
        .struct-label.s { color: var(--accent-blue); }

        /* horizontal queue row */
        .queue-rail { position: relative; display: flex; gap: 10px; min-height: 60px; align-items: center; }
        .queue-rail .placeholder { font-family: var(--mono); font-size: 13px; color: var(--text-dim); padding: 18px 10px; }
        .cell { width: 56px; height: 56px; border-radius: 13px; display: flex; align-items: center; justify-content: center; position: relative;
            font-family: var(--mono); font-weight: 800; font-size: 21px; will-change: transform;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s; }
        .cell.filled { border-color: rgba(34,197,94,0.45); background: rgba(34,197,94,0.10); color: #d6ffe8; }
        .cell.front  { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.5); }
        .cell.hot    { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 22px rgba(244,63,94,0.5); }
        .cell.new    { border-color: var(--accent-green); background: rgba(34,197,94,0.20); color: #d6ffe8; box-shadow: 0 0 22px rgba(34,197,94,0.5); }

        /* front / rear gliding pointer pills under the queue */
        .qptr { position: absolute; left: 0; top: 100%; margin-top: 8px; display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; will-change: transform; z-index: 5; }
        .qptr .tag { font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 8px; white-space: nowrap; }
        .qptr .stalk { width: 2px; height: 16px; order: -1; }
        .qptr.front .tag { background: var(--accent-orange); color: #2a1900; box-shadow: 0 0 14px rgba(245,165,36,0.6); } .qptr.front .stalk { background: var(--accent-orange); }
        .qptr.rear  .tag { background: var(--accent-green);  color: #052012; box-shadow: 0 0 14px rgba(34,197,94,0.6); }  .qptr.rear .stalk { background: var(--accent-green); }

        /* vertical stack (top is visually highest) */
        .stack-rail { position: relative; display: flex; flex-direction: column-reverse; gap: 8px; width: 110px; min-height: 230px; padding: 12px; border-radius: 14px; border: 2px dashed rgba(6,182,212,0.28); background: rgba(6,182,212,0.04); justify-content: flex-start; }
        .stack-rail .placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 13px; color: var(--text-dim); }
        .frame { height: 44px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-weight: 800; font-size: 19px; will-change: transform;
            border: 2px solid rgba(6,182,212,0.4); background: rgba(6,182,212,0.10); color: #a5f3fc;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s; }
        .frame.top { border-color: var(--accent-purple); background: rgba(168,85,247,0.18); color: #e9d5ff; box-shadow: 0 0 22px rgba(168,85,247,0.5); }
        .frame.hot { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 22px rgba(244,63,94,0.5); }
        .stack-top-tag { position: absolute; right: 100%; margin-right: 8px; opacity: 0; pointer-events: none; will-change: transform; font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 8px; background: var(--accent-purple); color: #1a0533; box-shadow: 0 0 14px rgba(168,85,247,0.6); white-space: nowrap; z-index: 6; }

        .action-stage { position: relative; min-height: 84px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .float-tile { width: 56px; height: 56px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 23px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.5); opacity: 0; transform: scale(.5); transition: opacity .25s, transform .4s cubic-bezier(.34,1.5,.64,1); }
        .float-tile.show { opacity: 1; transform: scale(1); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.q b { color: var(--accent-orange); } .pill.s b { color: var(--accent-blue); } .pill.p b { color: var(--accent-purple); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">queue</label>
        <input type="text" id="vals-input" placeholder="e.g. 1,2,3,4,5">
        <button onclick="loadFromInput()">Build</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Example 1 [1,2,3,4,5]</button>
        <button onclick="loadExample(1)">Example 2 [10,20,30]</button>
        <button onclick="resetSim()">&#8634; Reset</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Reverse a Queue <span class="sub">&middot; drain into a stack &middot; pop back to flip order &middot; O(n) time &middot; O(n) space</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="op-feed" id="op-feed"></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="struct">
                    <div class="struct-label q">Queue &middot; FIFO &#8594;</div>
                    <div class="queue-rail" id="queue-rail"></div>
                </div>
                <div class="struct">
                    <div class="struct-label s">Stack &middot; LIFO &#8593;</div>
                    <div class="stack-rail" id="stack-rail"></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="float-tile" id="float-tile"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill p">phase <b id="st-phase">&mdash;</b></span>
                            <span class="pill q">queue <b id="st-qsize">0</b></span>
                            <span class="pill s">stack <b id="st-ssize">0</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            glide(el, x) {
                const prev = el._x; el.style.opacity = '1';
                const commit = `translateX(${x.toFixed(2)}px) translateX(-50%)`;
                if (REDUCED || prev == null || Math.abs(x - prev) < 0.5) { el._x = x; el.style.transform = commit; return; }
                const dx = x - prev;
                const kf = SPRING_POS.map(p => ({ transform: `translateX(${(prev + dx * p).toFixed(2)}px) translateX(-50%)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el.style.transform = commit;
            },
            pop(el) {
                if (REDUCED) { el.style.opacity = '1'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `translateY(${(-14 * (1 - p)).toFixed(2)}px) scale(${(0.4 + 0.6 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'backwards' });
            },
        };

        // ───────── State ─────────
        let initial = [];      // the starting queue values
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 800, 380];
        const cellEls = {};    // queue cells keyed by stable token id
        const frameEls = {};   // stack frames keyed by stable token id
        let topTagEl = null;

        const CODE = [
            [['src','  def '],['fn','reverse'],['src','(q):']],
            [['kw','    while '],['src','not q.empty():     # phase 1: drain queue']],
            [['src','      st.push(q.dequeue())  # front leaves, onto stack']],
            [['kw','    while '],['src','not st.empty():    # phase 2: refill queue']],
            [['src','      q.enqueue(st.pop())   # top leaves, back to queue']],
            [['kw','    return '],['src','q                 # now reversed']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── step generation ─────────
        // Each queue/stack entry carries a stable id so DOM nodes glide & persist
        // across steps rather than being innerHTML-wiped.
        function generateSteps() {
            steps = [];
            // build items with stable ids; queue holds front-most at index 0
            const queue = initial.map((v, i) => ({ id: 'v' + i, val: v }));
            const stack = [];
            const n = queue.length;

            const snap = (extra) => Object.assign({
                queue: queue.map(o => ({ ...o })),
                stack: stack.map(o => ({ ...o })),
                qsize: queue.length, ssize: stack.length,
                phase: '—', opIdx: -1, totalOps: 2 * n,
                hotQueue: null, hotStack: null, newQueue: null, tile: null, tileColor: 'enq',
            }, extra);

            steps.push(snap({ phase: 'setup', code: [0],
                action: 'START', actionColor: 'var(--accent-blue)',
                panel: `Goal: <b>reverse</b> the queue <code>[${initial.join(', ')}]</code>. A queue is FIFO, so we can only take from the front. Trick: <b>drain it onto a stack</b> (LIFO), then pour the stack back &mdash; two flips give a reversal.`,
                log: `init  queue = [${initial.join(', ')}]` }));

            // ── Phase 1: dequeue all from queue, push onto stack ──
            let opIdx = 0;
            for (let k = 0; k < n; k++) {
                const front = queue[0];
                // (a) highlight the front of the queue about to leave
                steps.push(snap({ phase: 'drain', code: [1, 2], opIdx,
                    hotQueue: front.id,
                    action: 'DEQUEUE ' + front.val, actionColor: 'var(--accent-red)',
                    tile: front.val, tileColor: 'deq',
                    panel: `Phase&nbsp;1 &middot; <code>dequeue()</code> takes <b>${front.val}</b> from the queue's front.`,
                    log: `dequeue() -> ${front.val}` }));
                // (b) commit: move it to the stack top
                queue.shift();
                stack.push(front);
                steps.push(snap({ phase: 'drain', code: [2], opIdx,
                    hotStack: front.id,
                    action: 'PUSH ' + front.val, actionColor: 'var(--accent-purple)',
                    tile: front.val, tileColor: 'enq',
                    panel: `<code>push(${front.val})</code> &#8594; it lands on top of the stack. Queue now holds <b>${queue.length}</b>, stack holds <b>${stack.length}</b>.`,
                    log: `push(${front.val})  stack top = ${front.val}` }));
                opIdx++;
            }

            // bridge: stack is full, holds reverse order, ready to pour back
            steps.push(snap({ phase: 'flip', code: [3], opIdx: n - 1,
                action: 'STACK FULL', actionColor: 'var(--accent-blue)',
                panel: `Queue is empty; the stack holds every value in <b>reverse</b> order (last in is on top). Phase&nbsp;2: <code>pop</code> each one and <code>enqueue</code> it back.`,
                log: `phase 2  stack = [${stack.map(o => o.val).join(', ')}]` }));

            // ── Phase 2: pop all from stack, enqueue back into queue ──
            for (let k = 0; k < n; k++) {
                const top = stack[stack.length - 1];
                // (a) highlight the stack top about to pop
                steps.push(snap({ phase: 'refill', code: [3, 4], opIdx,
                    hotStack: top.id,
                    action: 'POP ' + top.val, actionColor: 'var(--accent-red)',
                    tile: top.val, tileColor: 'deq',
                    panel: `Phase&nbsp;2 &middot; <code>pop()</code> removes <b>${top.val}</b> from the stack top.`,
                    log: `pop() -> ${top.val}` }));
                // (b) commit: enqueue at the rear of the queue
                stack.pop();
                queue.push(top);
                steps.push(snap({ phase: 'refill', code: [4], opIdx,
                    newQueue: top.id,
                    action: 'ENQUEUE ' + top.val, actionColor: 'var(--accent-green)',
                    tile: top.val, tileColor: 'enq',
                    panel: `<code>enqueue(${top.val})</code> &#8594; it joins the rear of the queue. Stack holds <b>${stack.length}</b>, queue holds <b>${queue.length}</b>.`,
                    log: `enqueue(${top.val})  queue rear = ${top.val}` }));
                opIdx++;
            }

            const finalVals = queue.map(o => o.val);
            steps.push(snap({ phase: 'done', complete: true, confetti: true, code: [5],
                action: '✓ REVERSED', actionColor: 'var(--accent-green)',
                panel: `Done. The queue is reversed: <code>[${initial.join(', ')}]</code> &#8594; <code>[${finalVals.join(', ')}]</code>. Two LIFO flips (queue&#8594;stack&#8594;queue) net to one reversal &mdash; O(n) time, O(n) space.`,
                log: `done  queue = [${finalVals.join(', ')}]` }));
        }

        // ───────── render (persistent-DOM reconciliation) ─────────
        function cellCenterX(rail, id) { const el = (rail === 'q' ? cellEls : frameEls)[id]; return el ? el.offsetLeft + el.offsetWidth / 2 : 0; }
        function frameCenterY(id) { const el = frameEls[id]; return el ? el.offsetTop + el.offsetHeight / 2 : 0; }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const qRail = document.getElementById('queue-rail');
            const sRail = document.getElementById('stack-rail');

            // ── queue cells (left = front) ──
            const usedQ = new Set();
            step.queue.forEach((item) => {
                usedQ.add(item.id);
                let el = cellEls[item.id];
                if (!el) {
                    el = document.createElement('div'); el.className = 'cell';
                    el.innerHTML = `<span class="cv"></span>`; cellEls[item.id] = el; qRail.appendChild(el);
                    Motion.pop(el);
                }
                el.querySelector('.cv').textContent = item.val;
            });
            // order queue cells front->rear (skip the qptr pill nodes)
            step.queue.forEach((item) => qRail.appendChild(cellEls[item.id]));
            step.queue.forEach((item, i) => {
                const el = cellEls[item.id];
                let cls = 'cell';
                if (item.id === step.hotQueue) cls += ' hot';
                else if (item.id === step.newQueue) { cls += ' new'; if (!el._popped) { Motion.pop(el); el._popped = true; } }
                else if (i === 0) cls += ' front';
                else cls += ' filled';
                el.className = cls;
                if (item.id !== step.newQueue) el._popped = false;
            });
            Object.keys(cellEls).forEach(id => { if (!usedQ.has(id)) { cellEls[id].remove(); delete cellEls[id]; } });

            // ── stack frames (column-reverse: first child = bottom) ──
            const usedS = new Set();
            step.stack.forEach((item, i) => {
                usedS.add(item.id);
                let el = frameEls[item.id];
                if (!el) {
                    el = document.createElement('div'); el.className = 'frame';
                    el.innerHTML = `<span class="cv"></span>`; frameEls[item.id] = el; sRail.appendChild(el);
                    Motion.pop(el);
                }
                el.querySelector('.cv').textContent = item.val;
                sRail.appendChild(el); // keep DOM order = stack order (bottom..top)
                const isTop = i === step.stack.length - 1;
                let cls = 'frame';
                if (item.id === step.hotStack) cls += ' hot';
                else if (isTop) cls += ' top';
                el.className = cls;
            });
            Object.keys(frameEls).forEach(id => { if (!usedS.has(id)) { frameEls[id].remove(); delete frameEls[id]; } });

            // placeholders
            ensurePlaceholder(qRail, step.queue.length === 0, 'queue empty', 'q');
            ensurePlaceholder(sRail, step.stack.length === 0, 'stack empty', 's');

            // ── front / rear pointer pills under the queue ──
            placeQPtr('front', step.queue.length > 0 ? step.queue[0].id : null);
            placeQPtr('rear',  step.queue.length > 0 ? step.queue[step.queue.length - 1].id : null);

            // ── stack top tag ──
            placeTopTag(step.stack.length > 0 ? step.stack[step.stack.length - 1].id : null);

            // ── floating tile ──
            const ft = document.getElementById('float-tile');
            if (step.tile != null) {
                ft.textContent = step.tile; ft.classList.add('show');
                const deq = step.tileColor === 'deq';
                ft.style.borderColor = deq ? 'var(--accent-red)' : 'var(--accent-green)';
                ft.style.color = deq ? '#fecdd3' : '#d6ffe8';
                ft.style.background = deq ? 'rgba(244,63,94,0.16)' : 'rgba(34,197,94,0.16)';
                ft.style.boxShadow = deq ? '0 0 22px rgba(244,63,94,0.5)' : '0 0 22px rgba(34,197,94,0.5)';
            } else ft.classList.remove('show');

            // ── narration + action word ──
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            renderOpFeed(step);
            document.getElementById('st-phase').textContent = step.phase;
            document.getElementById('st-qsize').textContent = step.qsize;
            document.getElementById('st-ssize').textContent = step.ssize;
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function ensurePlaceholder(rail, show, text, kind) {
            let ph = rail.querySelector('.placeholder');
            if (show) {
                if (!ph) { ph = document.createElement('div'); ph.className = 'placeholder'; rail.appendChild(ph); }
                ph.textContent = text;
            } else if (ph) ph.remove();
        }

        function placeQPtr(name, id) {
            let pill = (placeQPtr._els = placeQPtr._els || {})[name];
            if (!pill) {
                pill = document.createElement('div'); pill.className = 'qptr ' + name;
                pill.innerHTML = `<div class="stalk"></div><div class="tag">${name}</div>`;
                document.getElementById('queue-rail').appendChild(pill); placeQPtr._els[name] = pill;
            }
            if (id == null || !cellEls[id]) { pill.style.opacity = '0'; pill._x = null; return; }
            Motion.glide(pill, cellCenterX('q', id));
        }

        function placeTopTag(id) {
            if (!topTagEl) {
                topTagEl = document.createElement('div'); topTagEl.className = 'stack-top-tag'; topTagEl.textContent = 'top';
                document.getElementById('stack-rail').appendChild(topTagEl);
            }
            if (id == null || !frameEls[id]) { topTagEl.style.opacity = '0'; topTagEl._y = null; return; }
            const y = frameCenterY(id);
            topTagEl.style.opacity = '1';
            const commit = `translateY(${(y - topTagEl.offsetHeight / 2).toFixed(2)}px)`;
            if (REDUCED || topTagEl._y == null || Math.abs(y - topTagEl._y) < 0.5) { topTagEl._y = y; topTagEl.style.transform = commit; return; }
            const prev = topTagEl._y, dy = y - prev;
            const kf = SPRING_POS.map(p => ({ transform: `translateY(${(prev - topTagEl.offsetHeight / 2 + dy * p).toFixed(2)}px)` }));
            topTagEl.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
            topTagEl._y = y; topTagEl.style.transform = commit;
        }

        function renderOpFeed(step) {
            const feed = document.getElementById('op-feed'); feed.innerHTML = '';
            const n = initial.length;
            const mk = (label, cls) => { const c = document.createElement('div'); c.className = 'op-chip' + cls; c.textContent = label; feed.appendChild(c); };
            // two phase chips summarise the journey
            const inPhase2 = step.phase === 'refill' || step.phase === 'flip' || step.phase === 'done';
            mk('1 · queue → stack',
               step.phase === 'drain' ? ' phase current' : (inPhase2 ? ' phase done' : ' phase'));
            mk('2 · stack → queue',
               step.phase === 'refill' ? ' phase current' : (step.phase === 'done' ? ' phase done' : ' phase'));
            // per-op progress dots
            for (let i = 0; i < 2 * n; i++) {
                const isP1 = i < n;
                const label = isP1 ? 'd' + (i + 1) : 'e' + (i - n + 1);
                let cls = '';
                if (step.opIdx === i && step.phase !== 'flip' && step.phase !== 'done' && step.phase !== 'setup') cls = ' current';
                else if (i < (effectiveOp(step))) cls = ' done';
                mk(label, cls);
            }
        }
        // how many ops are fully complete by this step (for the feed dots)
        function effectiveOp(step) {
            const n = initial.length;
            if (step.phase === 'setup') return 0;
            if (step.phase === 'drain') return step.ssize; // pushed so far
            if (step.phase === 'flip') return n;
            if (step.phase === 'refill') return n + step.qsize; // refilled so far
            if (step.phase === 'done') return 2 * n;
            return 0;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(cellEls).forEach(k => { cellEls[k].remove(); delete cellEls[k]; });
            Object.keys(frameEls).forEach(k => { frameEls[k].remove(); delete frameEls[k]; });
            if (placeQPtr._els) { Object.keys(placeQPtr._els).forEach(k => { placeQPtr._els[k].remove(); }); placeQPtr._els = null; }
            if (topTagEl) { topTagEl.remove(); topTagEl = null; }
            document.querySelectorAll('.queue-rail .placeholder, .stack-rail .placeholder').forEach(n => n.remove());
            confettiArmed = true;
        }
        function loadQueue(vals) {
            pause();
            initial = vals.slice();
            clearDom(); generateSteps(); renderStep(0);
        }
        function loadFromInput() {
            const raw = document.getElementById('vals-input').value;
            const vals = raw.split(/[,\s]+/).map(s => s.trim()).filter(s => s.length).map(s => {
                const n = parseInt(s, 10); return isNaN(n) ? s : n;
            });
            if (!vals.length) { document.getElementById('vals-input').focus(); return; }
            loadQueue(vals.slice(0, 8));
        }
        function loadExample(n) {
            const exs = [ [1, 2, 3, 4, 5], [10, 20, 30] ];
            const ex = exs[n];
            document.getElementById('vals-input').value = ex.join(',');
            loadQueue(ex);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('vals-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadFromInput(); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
