<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Queue (Monotonic Deque)</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* enqueued / value in motion   */
            --accent-blue:   #06b6d4;   /* queue chrome / rear           */
            --accent-green:  #22c55e;   /* in-queue / max                */
            --accent-red:    #f43f5e;   /* dequeued / popped / error     */
            --accent-purple: #a855f7;   /* deque chrome / front          */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(6, 182, 212, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(6,182,212,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 440px; max-width: 60vw;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(6,182,212,0.18); background: rgba(6,182,212,0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }
        #load-btn { border-color: rgba(245,165,36,0.4); color: #ffe2b0; font-family: var(--mono); }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .op-feed { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .op-chip { font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 8px; border: 1px solid var(--border-main); color: var(--text-dim); background: rgba(255,255,255,0.03); transition: all 0.3s; white-space: nowrap; }
        .op-chip.done { opacity: 0.45; }
        .op-chip.current { color: #fff; border-color: rgba(6,182,212,0.6); background: rgba(6,182,212,0.16); box-shadow: 0 0 12px rgba(6,182,212,0.3); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 320px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; padding: 26px 24px 30px; border: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; gap: 40px; overflow-x: auto; }

        .lane { display: flex; flex-direction: column; gap: 0; }
        .lane-head { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 30px; }
        .lane-head .dot { width: 8px; height: 8px; border-radius: 50%; }
        .lane-head.q .dot { background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .lane-head.q { color: #7dd3fc; }
        .lane-head.d .dot { background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }
        .lane-head.d { color: #d8b4fe; }
        .lane-head .hint { color: var(--text-dim); font-weight: 500; text-transform: none; letter-spacing: 0; }

        .rail { position: relative; display: flex; gap: 10px; min-height: 60px; align-items: center; }
        .rail.empty-hint::after { content: 'empty'; font-family: var(--mono); font-size: 12px; color: var(--text-dim); font-style: italic; }

        .cell { width: 58px; height: 58px; border-radius: 13px; display: flex; align-items: center; justify-content: center; position: relative;
            font-family: var(--mono); font-weight: 800; font-size: 21px; will-change: transform;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, opacity 0.3s; }
        .cell.q { border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.09); color: #cdeefb; }
        .cell.d { border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.10); color: #ecd9ff; }
        .cell.enq { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.55); }
        .cell.deq { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 22px rgba(244,63,94,0.5); }
        .cell.popped { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 22px rgba(244,63,94,0.5); opacity: 0.65; }
        .cell.maxcell { border-color: var(--accent-green); background: rgba(34,197,94,0.16); color: #d6ffe8; box-shadow: 0 0 22px rgba(34,197,94,0.5); }
        .cell .ci { position: absolute; top: -22px; left: 0; right: 0; text-align: center; font-size: 11px; color: var(--text-dim); font-weight: 700; }

        /* gliding pointer pills under the queue (front / rear) */
        .qptr { position: absolute; left: 0; display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; will-change: transform; z-index: 5; }
        .qptr.front { top: 100%; margin-top: 8px; }
        .qptr.rear  { top: 100%; margin-top: 8px; }
        .qptr .tag { font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 8px; white-space: nowrap; }
        .qptr .stalk { width: 2px; height: 14px; order: -1; }
        .qptr.front .tag { background: var(--accent-purple); color: #1a0533; box-shadow: 0 0 14px rgba(168,85,247,0.6); } .qptr.front .stalk { background: var(--accent-purple); }
        .qptr.rear  .tag { background: var(--accent-blue);   color: #04222a; box-shadow: 0 0 14px rgba(6,182,212,0.6); }  .qptr.rear .stalk { background: var(--accent-blue); }

        /* deque max pointer (above the deque front) */
        .dptr { position: absolute; left: 0; bottom: 100%; margin-bottom: 8px; display: flex; flex-direction: column-reverse; align-items: center; opacity: 0; pointer-events: none; will-change: transform; z-index: 5; }
        .dptr .tag { font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 8px; white-space: nowrap; background: var(--accent-green); color: #052e16; box-shadow: 0 0 14px rgba(34,197,94,0.6); }
        .dptr .stalk { width: 2px; height: 14px; background: var(--accent-green); }

        .action-stage { position: relative; min-height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.q b { color: var(--accent-blue); } .pill.d b { color: var(--accent-purple); } .pill.m b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">ops</label>
        <input type="text" id="ops-input" value="enqueue(3), enqueue(1), enqueue(4), enqueue(2), getMax(), dequeue(), getMax()">
        <button id="load-btn" onclick="loadCustom()">Load</button>
        <button onclick="loadExample(0)">Example 1</button>
        <button onclick="loadExample(1)">Example 2</button>
        <button onclick="resetSim()">&#8634; Reset</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Max Queue <span class="sub">&middot; FIFO queue + monotonic deque &middot; enqueue / dequeue / getMax all O(1) amortized</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="op-feed" id="op-feed"></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="lane">
                    <div class="lane-head q"><span class="dot"></span> Queue <span class="hint">&middot; front &#8594; rear &middot; the real FIFO order</span></div>
                    <div class="rail" id="queue-rail"></div>
                </div>
                <div class="lane">
                    <div class="lane-head d"><span class="dot"></span> Monotonic Deque <span class="hint">&middot; decreasing &middot; front = current max</span></div>
                    <div class="rail" id="deque-rail"></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill q">queue <b id="st-qsize">0</b></span>
                            <span class="pill d">deque <b id="st-dsize">0</b></span>
                            <span class="pill m">max <b id="st-max">&middot;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            glide(el, x) {
                const prev = el._x; el.style.opacity = '1';
                const commit = `translateX(${x.toFixed(2)}px) translateX(-50%)`;
                if (REDUCED || prev == null || Math.abs(x - prev) < 0.5) { el._x = x; el.style.transform = commit; return; }
                const dx = x - prev;
                const kf = SPRING_POS.map(p => ({ transform: `translateX(${(prev + dx * p).toFixed(2)}px) translateX(-50%)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el.style.transform = commit;
            },
            pop(el) {
                if (REDUCED) { el.style.opacity = '1'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `translateY(${(-14 * (1 - p)).toFixed(2)}px) scale(${(0.4 + 0.6 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'backwards' });
            },
        };

        // ───────── State ─────────
        let ops = [];
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 800, 380];
        const qCellEls = {};   // queue cells keyed by stable seq id
        const dCellEls = {};   // deque cells keyed by stable seq id
        const ptrEls = {};

        const CODE = [
            [['kw','class '],['fn','MaxQueue'],['src',':  # FIFO + monotonic deque']],
            [['src','  def '],['fn','enqueue'],['src','(self, x):']],
            [['kw','    while '],['src','dq and dq[-1] < x:  # drop smaller tails']],
            [['src','      dq.pop()']],
            [['src','    dq.append(x); q.append(x)']],
            [['src','  def '],['fn','dequeue'],['src','(self):']],
            [['src','    x = q.popleft()']],
            [['kw','    if '],['src','dq and dq[0] == x: dq.popleft()']],
            [['kw','    return '],['src','x']],
            [['src','  def '],['fn','get_max'],['src','(self):']],
            [['kw','    return '],['src','dq[0]  # deque front']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── parse ops ─────────
        function parseOps(list) {
            const out = [];
            list.forEach(raw => {
                const s = raw.trim(); if (!s) return;
                const m = s.match(/(\w+)\s*\(\s*(-?\d+)?\s*\)/);
                if (!m) return;
                const cmd = m[1].toLowerCase();
                const arg = m[2] != null ? parseInt(m[2], 10) : null;
                if (cmd === 'enqueue' || cmd === 'push' || cmd === 'pushback' || cmd === 'push_back') {
                    if (arg != null) out.push({ type: 'enqueue', value: arg });
                } else if (cmd === 'dequeue' || cmd === 'pop' || cmd === 'popfront' || cmd === 'pop_front') {
                    out.push({ type: 'dequeue' });
                } else if (cmd === 'getmax' || cmd === 'max' || cmd === 'get_max') {
                    out.push({ type: 'getmax' });
                }
            });
            return out;
        }

        // ───────── step generation ─────────
        // Queue items carry a stable id so the same node glides; deque holds the same ids.
        function generateSteps() {
            steps = [];
            const q = [];   // [{id, v}] front at index 0
            const dq = [];  // [{id, v}] decreasing; front (index 0) is current max
            let seq = 0;

            const maxVal = () => (dq.length ? dq[0].v : null);
            const snap = (extra) => Object.assign({
                q: q.map(o => ({ id: o.id, v: o.v })),
                dq: dq.map(o => ({ id: o.id, v: o.v })),
                max: maxVal(), opIdx: null,
                enqId: null, deqId: null, poppedIds: [], maxId: null, queryMax: false,
            }, extra);

            steps.push(snap({ code: [0], action: 'NEW MAX-QUEUE', actionColor: 'var(--accent-blue)',
                panel: `A <b>max queue</b> is a normal FIFO queue plus an auxiliary <b>monotonic decreasing deque</b>. The deque's front is always the maximum of the live queue, so <code>get_max</code> is O(1).`,
                log: `init  queue=[], deque=[]` }));

            ops.forEach((op, oi) => {
                if (op.type === 'enqueue') {
                    const v = op.value;
                    // step A: announce, show value entering at rear of queue
                    const id = seq++;
                    q.push({ id, v });
                    steps.push(snap({ opIdx: oi, code: [1, 4], action: 'ENQUEUE ' + v, actionColor: 'var(--accent-orange)', enqId: id,
                        panel: `<code>enqueue(${v})</code> &#8594; append <b>${v}</b> at the rear of the queue. Now fix the deque so it stays decreasing.`,
                        log: `enqueue(${v})  queue rear` }));

                    // step B: pop smaller tails off the deque (one combined step, list them)
                    const dropped = [];
                    while (dq.length && dq[dq.length - 1].v < v) dropped.push(dq.pop());
                    if (dropped.length) {
                        const droppedIds = dropped.map(o => o.id);
                        const droppedVals = dropped.map(o => o.v).join(', ');
                        steps.push(snap({ opIdx: oi, code: [2, 3], action: 'POP DEQUE TAIL', actionColor: 'var(--accent-red)', poppedIds: droppedIds,
                            // show dropped nodes faded before they vanish next step
                            dqGhost: dropped.map(o => ({ id: o.id, v: o.v })),
                            panel: `Pop deque tails smaller than <b>${v}</b>: dropped <code>${droppedVals}</code>. They can never be the max while ${v} is queued, so they're useless.`,
                            log: `  pop deque tail: ${droppedVals}` }));
                    }

                    // step C: append v to deque tail
                    dq.push({ id, v });
                    steps.push(snap({ opIdx: oi, code: [4], action: 'PUSH DEQUE TAIL', actionColor: 'var(--accent-purple)', maxId: dq[0].id,
                        panel: `Append <b>${v}</b> to the deque tail. The deque stays decreasing; its front <code>${dq[0].v}</code> is the current <b>max</b>.`,
                        log: `  deque append ${v} -> front=${dq[0].v}` }));

                } else if (op.type === 'dequeue') {
                    if (q.length === 0) {
                        steps.push(snap({ opIdx: oi, code: [5, 6], action: 'EMPTY', actionColor: 'var(--accent-red)', miss: true,
                            panel: `<code>dequeue()</code> &#8594; <span style="color:var(--accent-red)">queue is empty</span>, nothing to remove.`,
                            log: `dequeue() -> EMPTY` }));
                        return;
                    }
                    const removed = q.shift();
                    const matchesFront = dq.length && dq[0].id === removed.id;
                    const poppedIds = matchesFront ? [dq[0].id] : [];
                    steps.push(snap({ opIdx: oi, code: matchesFront ? [5, 6, 7] : [5, 6, 8], action: 'DEQUEUE ' + removed.v, actionColor: 'var(--accent-red)',
                        deqId: removed.id, poppedIds,
                        qGhost: [{ id: removed.id, v: removed.v }],
                        dqGhost: matchesFront ? [{ id: removed.id, v: removed.v }] : [],
                        panel: matchesFront
                            ? `<code>dequeue()</code> removes <b>${removed.v}</b> from the queue front. It is also the deque front (the max), so pop the deque front too.`
                            : `<code>dequeue()</code> removes <b>${removed.v}</b> from the queue front. The deque front is <code>${dq.length ? dq[0].v : '-'}</code>, not ${removed.v}, so the deque is unchanged.`,
                        log: `dequeue() -> ${removed.v}${matchesFront ? '  (also pop deque front)' : ''}` }));
                    if (matchesFront) dq.shift();
                    // settle step: show new max after the dequeue
                    steps.push(snap({ opIdx: oi, code: [8], action: 'RETURN ' + removed.v, actionColor: 'var(--accent-green)', maxId: dq.length ? dq[0].id : null,
                        panel: `Returned <b>${removed.v}</b>. Current <b>max</b> is now <code>${dq.length ? dq[0].v : '-'}</code>.`,
                        log: `  max now ${dq.length ? dq[0].v : '-'}` }));

                } else if (op.type === 'getmax') {
                    const mv = maxVal();
                    steps.push(snap({ opIdx: oi, code: [9, 10], action: 'GET MAX', actionColor: 'var(--accent-green)', queryMax: true, maxId: dq.length ? dq[0].id : null,
                        panel: dq.length
                            ? `<code>get_max()</code> &#8594; read the deque front in O(1): max = <b>${mv}</b>.`
                            : `<code>get_max()</code> &#8594; deque is empty, queue has no elements.`,
                        log: `get_max() -> ${dq.length ? mv : '-'}` }));
                }
            });

            const liveQ = q.map(o => o.v);
            steps.push(snap({ complete: true, confetti: true, action: '✓ DONE', actionColor: 'var(--accent-green)', maxId: dq.length ? dq[0].id : null,
                panel: `All operations done. Queue (front &#8594; rear): <code>[${liveQ.join(', ') || ' '}]</code>; current <b>max</b> = <code>${dq.length ? dq[0].v : '-'}</code>.`,
                log: `done  queue=[${liveQ.join(', ')}], max=${dq.length ? dq[0].v : '-'}` }));
        }

        // ───────── render (persistent DOM, keyed by stable ids) ─────────
        function railCenterX(rail, el) { return el ? el.offsetLeft + el.offsetWidth / 2 : 0; }

        function reconcileRail(railId, cellMap, klass, items, ghosts, step) {
            const rail = document.getElementById(railId);
            const used = new Set();
            const all = items.map(o => ({ ...o, ghost: false }));
            // append ghost (just-removed) nodes so they linger one step, faded
            (ghosts || []).forEach(g => { if (!items.some(o => o.id === g.id)) all.push({ ...g, ghost: true }); });

            all.forEach(o => {
                const key = String(o.id); used.add(key);
                let el = cellMap[o.id];
                const fresh = !el;
                if (!el) {
                    el = document.createElement('div');
                    el.innerHTML = `<span class="cv"></span>`;
                    cellMap[o.id] = el; rail.appendChild(el);
                }
                // ensure DOM order matches logical order
                rail.appendChild(el);
                el.querySelector('.cv').textContent = o.v;

                let cls = 'cell ' + klass;
                if (o.ghost) {
                    cls += (klass === 'q') ? ' deq' : ' popped';
                } else if (o.id === step.enqId && klass === 'q') cls += ' enq';
                else if (o.id === step.deqId && klass === 'q') cls += ' deq';
                else if (klass === 'd' && step.poppedIds.includes(o.id)) cls += ' popped';
                else if (klass === 'd' && o.id === step.maxId) cls += ' maxcell';
                el.className = cls;
                if (fresh && !o.ghost) Motion.pop(el);
            });
            Object.keys(cellMap).forEach(k => { if (!used.has(k)) { cellMap[k].remove(); delete cellMap[k]; } });
            rail.classList.toggle('empty-hint', all.length === 0);
            return rail;
        }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            const qRail = reconcileRail('queue-rail', qCellEls, 'q', step.q, step.qGhost, step);
            const dRail = reconcileRail('deque-rail', dCellEls, 'd', step.dq, step.dqGhost, step);

            // pointer pills
            placeQPtr('front', qRail, step.q.length ? qCellEls[step.q[0].id] : null);
            placeQPtr('rear', qRail, step.q.length ? qCellEls[step.q[step.q.length - 1].id] : null);
            placeDPtr(dRail, (step.dq.length && step.maxId != null) ? dCellEls[step.maxId] : (step.dq.length ? dCellEls[step.dq[0].id] : null));

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            mp.classList.toggle('miss', !!step.miss);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            renderOpFeed(step.opIdx);
            document.getElementById('st-qsize').textContent = step.q.length;
            document.getElementById('st-dsize').textContent = step.dq.length;
            document.getElementById('st-max').textContent = step.max == null ? '·' : step.max;
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function placeQPtr(name, rail, targetCell) {
            let pill = ptrEls[name];
            if (!pill) {
                pill = document.createElement('div'); pill.className = 'qptr ' + name;
                pill.innerHTML = `<div class="tag">${name}</div><div class="stalk"></div>`;
                rail.appendChild(pill); ptrEls[name] = pill;
            }
            if (!targetCell) { pill.style.opacity = '0'; pill._x = null; return; }
            Motion.glide(pill, railCenterX(rail, targetCell));
        }
        function placeDPtr(rail, targetCell) {
            let pill = ptrEls['max'];
            if (!pill) {
                pill = document.createElement('div'); pill.className = 'dptr';
                pill.innerHTML = `<div class="tag">max</div><div class="stalk"></div>`;
                rail.appendChild(pill); ptrEls['max'] = pill;
            }
            if (!targetCell) { pill.style.opacity = '0'; pill._x = null; return; }
            Motion.glide(pill, railCenterX(rail, targetCell));
        }

        function renderOpFeed(currentOpIdx) {
            const feed = document.getElementById('op-feed'); feed.innerHTML = '';
            ops.forEach((op, i) => {
                const chip = document.createElement('div');
                const label = op.type === 'enqueue' ? 'enq ' + op.value : (op.type === 'dequeue' ? 'deq' : 'max?');
                chip.className = 'op-chip' + (currentOpIdx === i ? ' current' : (currentOpIdx != null && i < currentOpIdx ? ' done' : ''));
                chip.textContent = label; feed.appendChild(chip);
            });
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(qCellEls).forEach(k => { qCellEls[k].remove(); delete qCellEls[k]; });
            Object.keys(dCellEls).forEach(k => { dCellEls[k].remove(); delete dCellEls[k]; });
            Object.keys(ptrEls).forEach(k => { ptrEls[k].remove(); delete ptrEls[k]; });
            confettiArmed = true;
        }
        function loadOps(newOps) { pause(); ops = newOps; clearDom(); generateSteps(); renderStep(0); }

        function loadCustom() {
            const raw = document.getElementById('ops-input').value;
            const parsed = parseOps(raw.split(','));
            if (!parsed.length) return;
            loadOps(parsed);
        }
        function loadExample(n) {
            const exs = [
                'enqueue(3), enqueue(1), enqueue(4), enqueue(2), getMax(), dequeue(), getMax()',
                'enqueue(5), enqueue(2), dequeue(), enqueue(7), getMax(), dequeue(), getMax()',
            ];
            document.getElementById('ops-input').value = exs[n];
            loadOps(parseOps(exs[n].split(',')));
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('ops-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
