<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFU Cache</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* node in motion / put          */
            --accent-blue:   #06b6d4;    /* get / chrome                  */
            --accent-green:  #22c55e;    /* resident node / committed     */
            --accent-red:    #f43f5e;    /* evicted / miss                */
            --accent-purple: #a855f7;    /* minFreq marker                */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(6, 182, 212, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(6,182,212,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 70px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(6,182,212,0.18); background: rgba(6,182,212,0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }
        .op-btn.put { border-color: rgba(245,165,36,0.4); color: #ffe2b0; font-family: var(--mono); }
        .op-btn.get { border-color: rgba(6,182,212,0.4); color: #a5f3fc; font-family: var(--mono); }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .op-feed { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .op-chip { font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 8px; border: 1px solid var(--border-main); color: var(--text-dim); background: rgba(255,255,255,0.03); transition: all 0.3s; white-space: nowrap; }
        .op-chip.done { opacity: 0.45; }
        .op-chip.current { color: #fff; border-color: rgba(6,182,212,0.6); background: rgba(6,182,212,0.16); box-shadow: 0 0 12px rgba(6,182,212,0.3); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 320px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; padding: 30px 24px 34px; border: 1px solid rgba(255,255,255,0.06); overflow-x: auto; min-height: 280px; }

        /* frequency buckets stacked vertically; each bucket holds a horizontal LRU row */
        .bucket-stack { position: relative; display: flex; flex-direction: column; gap: 14px; min-width: max-content; }
        .bucket { display: flex; align-items: center; gap: 14px; opacity: 0; will-change: transform; }
        .bucket-tag { flex: 0 0 auto; width: 92px; font-family: var(--mono); font-weight: 800; font-size: 13px; color: var(--text-dim); display: flex; flex-direction: column; gap: 2px; align-items: flex-start; }
        .bucket-tag .ft { color: #cbd5f5; font-size: 13.5px; }
        .bucket-tag .fc { font-size: 10.5px; color: var(--text-dim); font-weight: 700; letter-spacing: 0.4px; }
        .bucket-tag.minf .ft { color: var(--accent-purple); }
        .bucket-row { position: relative; display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 13px; border: 1px dashed rgba(255,255,255,0.10); background: rgba(255,255,255,0.015); min-height: 78px; min-width: 84px; transition: border-color 0.35s, background 0.35s, box-shadow 0.35s; }
        .bucket-row.minf { border-color: rgba(168,85,247,0.45); background: rgba(168,85,247,0.06); box-shadow: 0 0 22px rgba(168,85,247,0.16); }
        .bucket-row .axis { position: absolute; bottom: -16px; left: 14px; right: 14px; display: flex; justify-content: space-between; font-family: var(--mono); font-size: 9.5px; color: var(--text-dim); font-weight: 700; letter-spacing: 0.4px; opacity: 0.75; }

        .node { width: 58px; height: 58px; border-radius: 13px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
            font-family: var(--mono); will-change: transform; flex: 0 0 auto;
            border: 2px solid rgba(34,197,94,0.45); background: rgba(34,197,94,0.10); color: #d6ffe8;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s; }
        .node .nk { font-size: 11px; color: var(--text-dim); font-weight: 700; line-height: 1; margin-bottom: 2px; }
        .node .nv { font-size: 20px; font-weight: 800; line-height: 1; }
        .node.put { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.55); }
        .node.put .nk { color: #ffd591; }
        .node.hit { border-color: var(--accent-blue); background: rgba(6,182,212,0.16); color: #a5f3fc; box-shadow: 0 0 22px rgba(6,182,212,0.5); }
        .node.hit .nk { color: #a5f3fc; }
        .node.evict { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 22px rgba(244,63,94,0.5); }
        .node.evict .nk { color: #fecdd3; }

        .empty-note { font-family: var(--mono); font-size: 13px; color: var(--text-dim); padding: 18px 6px; }

        .action-stage { position: relative; min-height: 84px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .float-tile { width: 56px; height: 56px; border-radius: 13px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: var(--mono); border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.5); opacity: 0; transform: scale(.5); transition: opacity .25s, transform .4s cubic-bezier(.34,1.5,.64,1); }
        .float-tile .ftk { font-size: 10px; color: var(--text-dim); font-weight: 700; }
        .float-tile .ftv { font-size: 21px; font-weight: 800; }
        .float-tile.show { opacity: 1; transform: scale(1); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.m b { color: var(--accent-purple); } .pill.s b { color: var(--accent-green); } .pill.c b { color: var(--accent-blue); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">key</label>
        <input type="number" id="key-input" placeholder="key" min="0" max="99" style="width:64px">
        <label class="ui-label">val</label>
        <input type="number" id="val-input" placeholder="val" min="0" max="999" style="width:64px">
        <button class="op-btn put" onclick="doOp('put')">put</button>
        <button class="op-btn get" onclick="doOp('get')">get</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <label class="ui-label">cap</label>
        <input type="number" id="capacity-input" value="2" min="1" max="5" style="width:56px">
        <button onclick="loadExample(0)">Example 1</button>
        <button onclick="loadExample(1)">Example 2</button>
        <button onclick="resetSim()">&#8634; Reset</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>LFU Cache <span class="sub">&middot; freq buckets &middot; evict least-frequently-used, ties broken by LRU &middot; get / put are O(1)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="op-feed" id="op-feed"></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="bucket-stack" id="bucket-stack"></div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="float-tile" id="float-tile"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill m">minFreq <b id="st-min">&ndash;</b></span>
                            <span class="pill s">size <b id="st-size">0</b></span>
                            <span class="pill c">capacity <b id="st-cap">2</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            // slide a node from a previous board position (dx,dy) into place
            slideFrom(el, dx, dy) {
                if (REDUCED || (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5)) return;
                const kf = SPRING_POS.map(p => ({ transform: `translate(${(dx * (1 - p)).toFixed(2)}px, ${(dy * (1 - p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
            },
            pop(el) {
                if (REDUCED) { el.style.opacity = '1'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `translateY(${(-14 * (1 - p)).toFixed(2)}px) scale(${(0.4 + 0.6 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'backwards' });
            },
            fade(el) {
                if (REDUCED) { el.style.opacity = '1'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 1.6).toFixed(3) }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'backwards' });
            },
        };

        // ───────── State ─────────
        let ops = [];
        let capacity = 2;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1600, 850, 400];
        const nodeEls = {};   // key -> node DOM element (persistent, stable id = cache key)
        const bucketEls = {}; // freq -> bucket DOM element
        const prevPos = {};   // key -> {x,y} board coords from the previous render (for FLIP slide)

        const CODE = [
            [['kw','def '],['fn','get'],['src','(key):']],
            [['kw','  if '],['src','key not in cache: '],['kw','return '],['src','-1']],
            [['fn','    bump'],['src','(key)            # freq += 1, move bucket']],
            [['kw','    return '],['src','cache[key].val']],
            [['kw','def '],['fn','put'],['src','(key, val):']],
            [['kw','  if '],['src','key in cache: val = val; '],['fn','bump'],['src','(key); '],['kw','return']],
            [['kw','  if '],['src','size == cap: '],['fn','evict'],['src','(buckets[minFreq].lru)']],
            [['src','  insert(key,val,freq=1); buckets[1].add; '],['kw','minFreq'],['src',' = 1']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── step generation (LFU: freq buckets, each an LRU list) ─────────
        // model: cache = Map key -> {key, val, freq}; order array per freq preserves
        // insertion/use order (oldest first = LRU end). minFreq = lowest occupied bucket.
        function generateSteps() {
            steps = [];
            const cache = new Map();          // key -> {key, val, freq}
            const buckets = new Map();        // freq -> [keys] in LRU order (front = LRU)
            let minFreq = 0;

            const bucketsToFreqOrder = () => [...buckets.keys()].filter(f => buckets.get(f).length).sort((a, b) => a - b);
            const snap = (extra) => {
                const view = bucketsToFreqOrder().map(f => ({ freq: f, keys: [...buckets.get(f)] }));
                const valOf = {}; cache.forEach((e, k) => { valOf[k] = e.val; });
                return Object.assign({
                    buckets: view, valOf, minFreq: cache.size ? minFreq : 0, size: cache.size, cap: capacity,
                    opIdx: null, hotKey: null, hotCls: null, slideKey: null, tile: null, popKey: null
                }, extra);
            };
            const removeFromBucket = (f, key) => { const a = buckets.get(f); const i = a.indexOf(key); if (i >= 0) a.splice(i, 1); };

            steps.push(snap({ code: [], action: 'NEW LFU CACHE', actionColor: 'var(--accent-blue)',
                panel: `An <b>LFU cache</b> keeps each key in a <b>frequency bucket</b>. Within a bucket, keys sit in <b>LRU order</b> (oldest on the left). On overflow we evict the LRU key from the smallest bucket &mdash; tracked by <code>minFreq</code>.`,
                log: `init  capacity = ${capacity}` }));

            ops.forEach((op, oi) => {
                if (op.type === 'put') {
                    if (cache.has(op.key)) {
                        // update value + bump freq (move to next bucket, append as MRU)
                        const e = cache.get(op.key); const oldF = e.freq;
                        e.val = op.val; e.freq++;
                        removeFromBucket(oldF, op.key);
                        if (!buckets.has(e.freq)) buckets.set(e.freq, []);
                        buckets.get(e.freq).push(op.key);
                        if (oldF === minFreq && buckets.get(oldF).length === 0) minFreq = e.freq;
                        steps.push(snap({ opIdx: oi, code: [4, 5], action: 'PUT ' + op.key + ' (update)', actionColor: 'var(--accent-orange)',
                            hotKey: op.key, hotCls: 'put', slideKey: op.key, tile: { k: op.key, v: op.val },
                            panel: `<code>put(${op.key}, ${op.val})</code> &#8594; key <b>${op.key}</b> already cached. Update value to <b>${op.val}</b> and bump freq <b>${oldF}</b>&#8594;<b>${e.freq}</b> (it slides to the freq=${e.freq} bucket).`,
                            log: `put(${op.key},${op.val})  update, freq ${oldF}->${e.freq}` }));
                    } else if (capacity <= 0) {
                        steps.push(snap({ opIdx: oi, code: [4], action: 'NO-OP', actionColor: 'var(--accent-red)', miss: true,
                            panel: `<code>put(${op.key}, ${op.val})</code> &#8594; capacity is 0, nothing can be stored.`,
                            log: `put(${op.key},${op.val})  cap=0, ignored` }));
                    } else {
                        let evicted = null;
                        if (cache.size >= capacity) {
                            // evict LRU (front) of minFreq bucket
                            const arr = buckets.get(minFreq);
                            const victim = arr[0];
                            evicted = { key: victim, val: cache.get(victim).val, freq: minFreq };
                            // show eviction as its own step (red), then insert in the next
                            steps.push(snap({ opIdx: oi, code: [4, 6], action: 'EVICT ' + victim, actionColor: 'var(--accent-red)', miss: true,
                                hotKey: victim, hotCls: 'evict',
                                panel: `<code>put(${op.key}, ${op.val})</code> &#8594; cache is full (size ${cache.size}/${capacity}). Evict the <b>LRU</b> key of the smallest bucket: key <b>${victim}</b> from <code>minFreq = ${minFreq}</code>.`,
                                log: `put(${op.key},${op.val})  evict key ${victim} (freq=${minFreq})` }));
                            arr.shift(); cache.delete(victim);
                        }
                        // insert new node at freq 1
                        cache.set(op.key, { key: op.key, val: op.val, freq: 1 });
                        if (!buckets.has(1)) buckets.set(1, []);
                        buckets.get(1).push(op.key);
                        minFreq = 1;
                        steps.push(snap({ opIdx: oi, code: [4, 7], action: 'PUT ' + op.key + ' (new)', actionColor: 'var(--accent-orange)',
                            hotKey: op.key, hotCls: 'put', popKey: op.key, tile: { k: op.key, v: op.val },
                            panel: `<code>put(${op.key}, ${op.val})</code> &#8594; insert new key <b>${op.key}</b> with <code>freq = 1</code> into the freq=1 bucket (MRU end). Set <code>minFreq = 1</code>.`,
                            log: `put(${op.key},${op.val})  insert freq=1` }));
                    }
                } else { // get
                    if (cache.has(op.key)) {
                        const e = cache.get(op.key); const oldF = e.freq;
                        e.freq++;
                        removeFromBucket(oldF, op.key);
                        if (!buckets.has(e.freq)) buckets.set(e.freq, []);
                        buckets.get(e.freq).push(op.key);
                        if (oldF === minFreq && buckets.get(oldF).length === 0) minFreq = e.freq;
                        steps.push(snap({ opIdx: oi, code: [0, 2, 3], action: 'GET ' + op.key + ' = ' + e.val, actionColor: 'var(--accent-blue)',
                            hotKey: op.key, hotCls: 'hit', slideKey: op.key, tile: { k: op.key, v: e.val },
                            panel: `<code>get(${op.key})</code> &#8594; hit, returns <b>${e.val}</b>. Bump freq <b>${oldF}</b>&#8594;<b>${e.freq}</b>; key <b>${op.key}</b> slides up to the freq=${e.freq} bucket (now MRU there).`,
                            log: `get(${op.key}) -> ${e.val}  freq ${oldF}->${e.freq}` }));
                    } else {
                        steps.push(snap({ opIdx: oi, code: [0, 1], action: 'GET ' + op.key + ' = -1', actionColor: 'var(--accent-red)', miss: true,
                            panel: `<code>get(${op.key})</code> &#8594; <span style="color:var(--accent-red)">miss</span>, key not in cache. Returns <b>-1</b>.`,
                            log: `get(${op.key}) -> -1  (miss)` }));
                    }
                }
            });

            const finalView = bucketsToFreqOrder().map(f => `f${f}:[${buckets.get(f).join(',')}]`).join('  ') || '(empty)';
            steps.push(snap({ complete: true, confetti: true, action: '✓ DONE', actionColor: 'var(--accent-green)',
                panel: `All operations done. Buckets (low &#8594; high freq): <code>${finalView}</code>. <code>minFreq = ${cache.size ? minFreq : '–'}</code>, size = <b>${cache.size}</b>/${capacity}.`,
                log: `done  ${finalView}` }));
        }

        // ───────── render (PERSISTENT DOM, keyed by cache key) ─────────
        function boardPos(el) { return { x: el.offsetLeft, y: el.offsetTop }; }
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const stack = document.getElementById('bucket-stack');

            // capture pre-layout positions of all existing nodes for FLIP slide
            const before = {};
            Object.keys(nodeEls).forEach(k => { before[k] = boardPos(nodeEls[k]); });

            const usedBuckets = new Set();
            const usedNodes = new Set();
            const isEmpty = step.buckets.length === 0;

            // empty-state note
            let note = stack.querySelector('.empty-note');
            if (isEmpty) {
                if (!note) { note = document.createElement('div'); note.className = 'empty-note'; note.textContent = 'cache is empty'; stack.appendChild(note); }
            } else if (note) { note.remove(); }

            // reconcile buckets top (highest freq) -> bottom? We show low freq at top so eyes
            // read "smallest bucket first". Order array is low->high; render in that order.
            step.buckets.forEach(b => {
                const f = b.freq; usedBuckets.add(String(f));
                let bk = bucketEls[f];
                if (!bk) {
                    bk = document.createElement('div'); bk.className = 'bucket';
                    bk.innerHTML = `<div class="bucket-tag"><span class="ft">freq ${f}</span><span class="fc"></span></div>`
                        + `<div class="bucket-row"><div class="axis"><span>LRU</span><span>MRU</span></div></div>`;
                    bucketEls[f] = bk;
                    Motion.fade(bk);
                }
                bk.style.opacity = '1';
                stack.appendChild(bk); // re-append keeps freq order (low first)
                const isMin = (f === step.minFreq) && step.size > 0;
                bk.querySelector('.bucket-tag').classList.toggle('minf', isMin);
                bk.querySelector('.fc').textContent = isMin ? 'minFreq' : (b.keys.length + (b.keys.length === 1 ? ' key' : ' keys'));
                const row = bk.querySelector('.bucket-row');
                row.classList.toggle('minf', isMin);

                // reconcile node cells inside this bucket, in LRU order
                b.keys.forEach(key => {
                    usedNodes.add(String(key));
                    let node = nodeEls[key];
                    const fresh = !node;
                    if (fresh) {
                        node = document.createElement('div'); node.className = 'node';
                        node.innerHTML = `<span class="nk"></span><span class="nv"></span>`;
                        nodeEls[key] = node;
                    }
                    node.querySelector('.nk').textContent = 'k' + key;
                    node.querySelector('.nv').textContent = step.valOf[key];
                    let cls = 'node';
                    if (key === step.hotKey) cls += ' ' + (step.hotCls || 'hit');
                    node.className = cls;
                    row.appendChild(node); // ordering: LRU first (left)
                    if (fresh && key === step.popKey) Motion.pop(node);
                });
            });

            // reap removed buckets + nodes
            Object.keys(bucketEls).forEach(f => { if (!usedBuckets.has(f)) { bucketEls[f].remove(); delete bucketEls[f]; } });
            Object.keys(nodeEls).forEach(k => { if (!usedNodes.has(k)) { nodeEls[k].remove(); delete nodeEls[k]; prevPos[k] = null; } });

            // FLIP: slide nodes from their previous board position to the new one
            Object.keys(nodeEls).forEach(k => {
                const after = boardPos(nodeEls[k]);
                const from = before[k];
                if (from && (Math.abs(from.x - after.x) > 0.5 || Math.abs(from.y - after.y) > 0.5)) {
                    Motion.slideFrom(nodeEls[k], from.x - after.x, from.y - after.y);
                }
            });

            // floating tile (key/value of the op subject)
            const ft = document.getElementById('float-tile');
            if (step.tile) {
                ft.querySelector('.ftk') || (ft.innerHTML = `<span class="ftk"></span><span class="ftv"></span>`);
                ft.querySelector('.ftk').textContent = 'k' + step.tile.k;
                ft.querySelector('.ftv').textContent = step.tile.v;
                ft.classList.add('show');
                const tone = step.hotCls === 'hit' ? 'var(--accent-blue)' : 'var(--accent-orange)';
                const ink = step.hotCls === 'hit' ? '#a5f3fc' : '#ffd591';
                ft.style.borderColor = tone; ft.style.color = ink;
                ft.style.boxShadow = `0 0 22px ${step.hotCls === 'hit' ? 'rgba(6,182,212,0.5)' : 'rgba(245,165,36,0.5)'}`;
            } else ft.classList.remove('show');

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            mp.classList.toggle('miss', !!step.miss);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            renderOpFeed(step.opIdx);
            document.getElementById('st-min').innerHTML = step.size ? step.minFreq : '&ndash;';
            document.getElementById('st-size').textContent = step.size;
            document.getElementById('st-cap').textContent = step.cap;
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function renderOpFeed(currentOpIdx) {
            const feed = document.getElementById('op-feed'); feed.innerHTML = '';
            ops.forEach((op, i) => {
                const chip = document.createElement('div');
                const label = op.type === 'put' ? `put ${op.key},${op.value}` : `get ${op.key}`;
                chip.className = 'op-chip' + (currentOpIdx === i ? ' current' : (currentOpIdx != null && i < currentOpIdx ? ' done' : ''));
                chip.textContent = label; feed.appendChild(chip);
            });
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(nodeEls).forEach(k => { nodeEls[k].remove(); delete nodeEls[k]; });
            Object.keys(bucketEls).forEach(k => { bucketEls[k].remove(); delete bucketEls[k]; });
            const note = document.querySelector('.empty-note'); if (note) note.remove();
            confettiArmed = true;
        }
        function loadOps(newOps, cap) { pause(); ops = newOps; if (cap != null) capacity = cap; clearDom(); generateSteps(); renderStep(0); }
        function doOp(type) {
            const keyEl = document.getElementById('key-input');
            const valEl = document.getElementById('val-input');
            const key = parseInt(keyEl.value, 10);
            if (isNaN(key)) { keyEl.focus(); return; }
            let op;
            if (type === 'put') {
                const value = parseInt(valEl.value, 10);
                if (isNaN(value)) { valEl.focus(); return; }
                op = { type, key, value };
            } else { op = { type, key }; }
            const cap = parseInt(document.getElementById('capacity-input').value, 10);
            loadOps([...ops, op], isNaN(cap) ? capacity : cap);
            renderStep(steps.length - 1);
            keyEl.value = ''; valEl.value = '';
        }
        function loadExample(n) {
            const exs = [
                { cap: 2, ops: [
                    {type:'put',key:1,value:10},{type:'put',key:2,value:20},{type:'get',key:1},
                    {type:'put',key:3,value:30},{type:'get',key:2},{type:'get',key:3} ] },
                { cap: 3, ops: [
                    {type:'put',key:1,value:100},{type:'put',key:2,value:200},{type:'get',key:1},
                    {type:'get',key:1},{type:'put',key:3,value:300},{type:'put',key:4,value:400},{type:'get',key:2} ] },
            ];
            const ex = exs[n]; document.getElementById('capacity-input').value = ex.cap;
            loadOps(ex.ops, ex.cap);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        ['key-input', 'val-input'].forEach(id => document.getElementById(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') doOp('put'); }));
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
