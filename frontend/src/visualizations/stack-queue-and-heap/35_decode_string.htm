<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decode String</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* scan cursor / value in motion  */
            --accent-blue:   #06b6d4;    /* count / chrome                 */
            --accent-green:  #22c55e;    /* settled / decoded output       */
            --accent-red:    #f43f5e;    /* pop / closing bracket          */
            --accent-purple: #a855f7;    /* current string being built     */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(6, 182, 212, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(6,182,212,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 220px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(6,182,212,0.18); background: rgba(6,182,212,0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }
        .op-btn { font-family: var(--mono); }
        .op-btn.load { border-color: rgba(6,182,212,0.4); color: #a5f3fc; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .op-feed { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .op-chip { font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 8px; border: 1px solid var(--border-main); color: var(--text-dim); background: rgba(255,255,255,0.03); transition: all 0.3s; white-space: nowrap; }
        .op-chip.done { opacity: 0.45; }
        .op-chip.current { color: #fff; border-color: rgba(245,165,36,0.6); background: rgba(245,165,36,0.16); box-shadow: 0 0 12px rgba(245,165,36,0.3); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); padding: 22px 18px; display: flex; flex-direction: column; gap: 20px; }

        /* ── input char-row with a gliding scan cursor above it ── */
        .scan-area { position: relative; padding-top: 30px; }
        .char-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; }
        .char {
            width: 36px; height: 42px; border-radius: 9px; display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-weight: 800; font-size: 18px; position: relative;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-dim);
            transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s, transform 0.3s;
        }
        .char.seen { color: var(--text-main); background: rgba(255,255,255,0.05); }
        .char.cursor { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 20px rgba(245,165,36,0.5); transform: translateY(2px); }
        .char.digit.cursor { border-color: var(--accent-blue); background: rgba(6,182,212,0.16); color: #a5f3fc; box-shadow: 0 0 20px rgba(6,182,212,0.5); }
        .char.open.cursor  { border-color: var(--accent-green); background: rgba(34,197,94,0.16); color: #d6ffe8; box-shadow: 0 0 20px rgba(34,197,94,0.5); }
        .char.close.cursor { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 20px rgba(244,63,94,0.5); }
        .scan-ptr { position: absolute; top: 0; left: 0; display: flex; flex-direction: column; align-items: center; opacity: 0; will-change: transform; }
        .scan-ptr .tag { font-family: var(--mono); font-size: 10.5px; font-weight: 800; background: var(--accent-orange); color: #2a1600; padding: 2px 8px; border-radius: 7px; box-shadow: 0 0 14px rgba(245,165,36,0.6); white-space: nowrap; }
        .scan-ptr .arrow { color: var(--accent-orange); font-size: 14px; line-height: 1; margin-top: 1px; }

        /* ── the vertical stack of saved frames (bottom = first pushed) ── */
        .mid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: end; }
        .lane { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .lane-title { font-family: var(--mono); font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); }
        .lane-title.stk { color: #a5f3fc; }
        .lane-title.cur { color: #e9d5ff; }

        .stack-wrap { display: flex; align-items: flex-end; justify-content: center; min-height: 224px; }
        .stack-col { display: flex; flex-direction: column-reverse; gap: 8px; position: relative; }
        .frame {
            width: 188px; min-height: 44px; border-radius: 11px; display: flex; align-items: center; justify-content: center; gap: 8px;
            font-family: var(--mono); font-weight: 700; font-size: 14px; position: relative; will-change: transform; padding: 6px 10px;
            border: 2px solid rgba(6,182,212,0.45); background: rgba(6,182,212,0.10); color: #cfe9f5;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .frame.top { box-shadow: 0 0 20px rgba(6,182,212,0.4); }
        .frame.pushing { border-color: var(--accent-green); background: rgba(34,197,94,0.16); color: #d6ffe8; box-shadow: 0 0 22px rgba(34,197,94,0.5); }
        .frame.popping { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 22px rgba(244,63,94,0.5); }
        .frame .cnt { background: rgba(245,165,36,0.18); color: #ffd591; border-radius: 6px; padding: 1px 7px; font-weight: 800; }
        .frame .pstr { color: #fff; }
        .frame .pstr .empty { color: var(--text-dim); font-style: italic; font-weight: 600; }
        .stack-empty { font-family: var(--mono); font-size: 12px; color: var(--text-dim); border: 1px dashed var(--border-main); border-radius: 10px; padding: 14px 20px; }
        .base-line { width: 210px; height: 4px; border-radius: 3px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent); margin-top: 2px; }

        /* ── current string being built ── */
        .cur-box {
            min-width: 188px; min-height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            padding: 10px 16px; font-family: var(--mono); font-weight: 800; font-size: 20px; letter-spacing: 1px;
            border: 2px solid rgba(168,85,247,0.45); background: rgba(168,85,247,0.10); color: #e9d5ff;
            transition: background 0.35s, border-color 0.35s, box-shadow 0.35s; box-shadow: 0 0 16px rgba(168,85,247,0.18);
            word-break: break-all; text-align: center;
        }
        .cur-box.grow { border-color: var(--accent-green); background: rgba(34,197,94,0.12); box-shadow: 0 0 22px rgba(34,197,94,0.4); }
        .cur-box .empty { color: var(--text-dim); font-style: italic; font-weight: 600; font-size: 14px; letter-spacing: 0; }

        /* ── decoded output row ── */
        .result-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .result-label { font-family: var(--mono); font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); }
        .result-box {
            min-width: 200px; min-height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            padding: 8px 18px; font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 1px;
            border: 2px dashed var(--border-main); background: rgba(255,255,255,0.03); color: var(--text-dim);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s; word-break: break-all; text-align: center;
        }
        .result-box.final { border-style: solid; border-color: var(--accent-green); background: rgba(34,197,94,0.12); color: #d6ffe8; box-shadow: 0 0 24px rgba(34,197,94,0.45); }

        .action-stage { position: relative; min-height: 84px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .float-tile { width: 56px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 22px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.5); opacity: 0; transform: scale(.5); transition: opacity .25s, transform .4s cubic-bezier(.34,1.5,.64,1); }
        .float-tile.show { opacity: 1; transform: scale(1); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-orange); } .pill.s b { color: var(--accent-blue); } .pill.u b { color: var(--accent-purple); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
        @media (max-width: 560px) { .mid-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Encoded</label>
        <input type="text" id="input-str" value="3[a2[c]]" spellcheck="false" autocomplete="off">
        <button class="op-btn load" onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Example 1</button>
        <button onclick="loadExample(1)">Example 2</button>
        <button onclick="resetSim()">&#8634; Reset</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Decode String <span class="sub">&middot; stack of (prevStr, count) frames &middot; <code style="font-family:var(--mono)">k[ ]</code> nesting</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="op-feed" id="op-feed"></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="scan-area">
                    <div class="char-row" id="char-row"></div>
                    <div class="scan-ptr" id="scan-ptr"><span class="tag">scan</span><span class="arrow">&#9660;</span></div>
                </div>

                <div class="mid-row">
                    <div class="lane">
                        <div class="lane-title stk">Stack &middot; (prevStr , count)</div>
                        <div class="stack-wrap">
                            <div>
                                <div class="stack-col" id="stack-col"></div>
                                <div class="base-line"></div>
                            </div>
                        </div>
                    </div>
                    <div class="lane">
                        <div class="lane-title cur">curStr (building)</div>
                        <div class="cur-box" id="cur-box"><span class="empty">empty</span></div>
                    </div>
                </div>

                <div class="result-row">
                    <span class="result-label">Decoded</span>
                    <div class="result-box" id="result-box">&mdash;</div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="float-tile" id="float-tile"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill c">count <b id="st-count">0</b></span>
                            <span class="pill u">curStr <b id="st-cur">""</b></span>
                            <span class="pill s">stack depth <b id="st-depth">0</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            glide(el, x) {
                const prev = el._x; el.style.opacity = '1';
                const commit = `translateX(${x.toFixed(2)}px)`;
                if (REDUCED || prev == null || Math.abs(x - prev) < 0.5) { el._x = x; el.style.transform = commit; return; }
                const dx = x - prev;
                const kf = SPRING_POS.map(p => ({ transform: `translateX(${(prev + dx * p).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el.style.transform = commit;
            },
            pop(el, fromY) {
                if (REDUCED) { el.style.opacity = '1'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `translateY(${((fromY || -16) * (1 - p)).toFixed(2)}px) scale(${(0.4 + 0.6 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'backwards' });
            },
        };

        // ───────── State ─────────
        let s = '';            // the encoded string
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 800, 380];
        const charEls = {};    // index -> element
        const frameEls = {};   // frame id -> element

        const CODE = [
            [['kw','def '],['fn','decodeString'],['src','(s):']],
            [['src','  stack = []; cur = ""; num = 0']],
            [['kw','  for '],['src','ch in s:']],
            [['kw','    if '],['src','ch.isdigit(): num = num*10 + int(ch)']],
            [['kw','    elif '],['src','ch == "[":']],
            [['src','      stack.append((cur, num)); cur=""; num=0']],
            [['kw','    elif '],['src','ch == "]":']],
            [['src','      prev, k = stack.pop()']],
            [['src','      cur = prev + cur * k']],
            [['kw','    else'],['src',': cur += ch']],
            [['kw','  return '],['src','cur']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const sp = document.createElement('span'); sp.className = cls; sp.textContent = txt; src.appendChild(sp); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── helpers ─────────
        const esc = (t) => String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const showStr = (t) => t === '' ? '<span class="empty">""</span>' : esc(t);
        const kind = (ch) => {
            if (ch >= '0' && ch <= '9') return 'digit';
            if (ch === '[') return 'open';
            if (ch === ']') return 'close';
            return 'letter';
        };
        let frameSeq = 0;

        // ───────── step generation ─────────
        function generateSteps() {
            steps = [];
            frameSeq = 0;
            const stack = [];      // [{id, prev, k}]
            let cur = '';
            let num = 0;
            let i = 0;

            const snap = (extra) => Object.assign({
                i: -1, stack: stack.map(f => ({ id: f.id, prev: f.prev, k: f.k })),
                cur, num, decoded: null, pushId: null, popId: null,
                charKind: null, miss: false, complete: false, confetti: false, tile: null,
            }, extra);

            steps.push(snap({ i: -1, code: [0, 1], action: 'START', actionColor: 'var(--accent-blue)',
                panel: `Decode <code>${esc(s)}</code>. Scan left&#8594;right keeping a running <code>num</code> and a <code>curStr</code>. On <code>[</code> we <b>push</b> the frame <code>(curStr, num)</code>; on <code>]</code> we <b>pop</b> and repeat. Stack handles the nesting.`,
                log: `init  s = "${s}", cur = "", num = 0` }));

            while (i < s.length) {
                const ch = s[i];
                const k = kind(ch);

                if (k === 'digit') {
                    const before = num;
                    num = num * 10 + (ch.charCodeAt(0) - 48);
                    steps.push(snap({ i, charKind: k, code: [3], action: 'DIGIT ' + ch, actionColor: 'var(--accent-blue)', tile: ch,
                        panel: `<code>${ch}</code> is a digit &#8594; extend the count: <code>num = ${before}&times;10 + ${ch} = ${num}</code>.`,
                        log: `i=${i} '${ch}'  num = ${num}` }));
                } else if (k === 'open') {
                    const id = ++frameSeq;
                    stack.push({ id, prev: cur, k: num });
                    const pushed = { prev: cur, k: num };
                    cur = ''; num = 0;
                    steps.push(snap({ i, charKind: k, code: [4, 5], pushId: id, action: 'PUSH', actionColor: 'var(--accent-green)', tile: '[',
                        panel: `<code>[</code> &#8594; <b>push</b> frame <code>(${showStr(pushed.prev)}, ${pushed.k})</code>, then reset <code>curStr=""</code> and <code>num=0</code> to build the inside group.`,
                        log: `i=${i} '['  push (prev="${pushed.prev}", k=${pushed.k})` }));
                } else if (k === 'close') {
                    const frame = stack[stack.length - 1];
                    const before = cur;
                    const repeated = frame.prev + before.repeat(frame.k);
                    // step A: show the frame being popped (still on stack visually)
                    steps.push(snap({ i, charKind: k, code: [6, 7], popId: frame.id, action: 'POP', actionColor: 'var(--accent-red)', tile: ']',
                        panel: `<code>]</code> &#8594; <b>pop</b> frame <code>(${showStr(frame.prev)}, ${frame.k})</code>. Repeat the inner <code>${showStr(before)}</code> &times; <b>${frame.k}</b> and prepend <code>${showStr(frame.prev)}</code>.`,
                        log: `i=${i} ']'  pop (prev="${frame.prev}", k=${frame.k})` }));
                    // commit the pop
                    stack.pop();
                    cur = repeated;
                    steps.push(snap({ i, charKind: k, code: [8], action: 'REPEAT &times;' + frame.k, actionColor: 'var(--accent-purple)',
                        panel: `<code>curStr = ${showStr(frame.prev)} + ${showStr(before)}&times;${frame.k}</code> &#8594; <code>${showStr(cur)}</code>.`,
                        log: `      cur = "${cur}"` }));
                } else {
                    const before = cur;
                    cur = cur + ch;
                    steps.push(snap({ i, charKind: k, code: [9], action: 'APPEND ' + ch, actionColor: 'var(--accent-purple)', tile: ch,
                        panel: `<code>${ch}</code> is a letter &#8594; append to curStr: <code>${showStr(before)} + ${ch} = ${showStr(cur)}</code>.`,
                        log: `i=${i} '${ch}'  cur = "${cur}"` }));
                }
                i++;
            }

            steps.push(snap({ i: -1, code: [10], complete: true, confetti: true, decoded: cur, action: '✓ DECODED', actionColor: 'var(--accent-green)',
                panel: `Scan complete &#8594; stack is empty and <code>curStr</code> holds the answer: <b>${showStr(cur)}</b>.`,
                log: `done  decoded = "${cur}"` }));
        }

        // ───────── render ─────────
        const CHAR_W = 36, CHAR_GAP = 6;
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // ── char row (persistent, keyed by index) ──
            const row = document.getElementById('char-row');
            const usedC = new Set();
            for (let j = 0; j < s.length; j++) {
                usedC.add(String(j));
                let el = charEls[j];
                if (!el) { el = document.createElement('div'); el.className = 'char'; charEls[j] = el; row.appendChild(el); }
                el.textContent = s[j];
                let cls = 'char ' + kind(s[j]);
                if (j === step.i) cls += ' cursor';
                else if (step.i === -1 ? step.complete : j < step.i) cls += ' seen';
                el.className = cls;
            }
            Object.keys(charEls).forEach(k => { if (!usedC.has(k)) { charEls[k].remove(); delete charEls[k]; } });
            renderScanPtr(step);

            // ── stack of frames (persistent, keyed by id) ──
            const col = document.getElementById('stack-col');
            const usedF = new Set();
            step.stack.forEach((f, depth) => {
                usedF.add(String(f.id));
                let el = frameEls[f.id];
                const fresh = !el;
                if (!el) {
                    el = document.createElement('div'); el.className = 'frame';
                    el.innerHTML = `<span class="pstr"></span><span class="cnt"></span>`;
                    frameEls[f.id] = el; col.appendChild(el);
                }
                el.querySelector('.pstr').innerHTML = `prev=${showStr(f.prev)}`;
                el.querySelector('.cnt').textContent = '×' + f.k;
                let cls = 'frame';
                if (f.id === step.pushId) cls += ' pushing';
                else if (f.id === step.popId) cls += ' popping';
                else if (depth === step.stack.length - 1) cls += ' top';
                el.className = cls;
                if (fresh && f.id === step.pushId) Motion.pop(el, -18);
            });
            Object.keys(frameEls).forEach(k => { if (!usedF.has(k)) { frameEls[k].remove(); delete frameEls[k]; } });

            // empty-stack hint
            let emptyHint = document.getElementById('stack-empty');
            if (step.stack.length === 0) {
                if (!emptyHint) { emptyHint = document.createElement('div'); emptyHint.id = 'stack-empty'; emptyHint.className = 'stack-empty'; emptyHint.textContent = 'stack empty'; col.appendChild(emptyHint); }
            } else if (emptyHint) { emptyHint.remove(); }

            // ── curStr box ──
            const curBox = document.getElementById('cur-box');
            curBox.innerHTML = step.cur === '' ? '<span class="empty">empty</span>' : esc(step.cur);
            curBox.classList.toggle('grow', step.charKind === 'letter' || step.charKind === 'close' || step.complete);

            // ── decoded result ──
            const resBox = document.getElementById('result-box');
            if (step.complete && step.decoded != null) { resBox.textContent = step.decoded === '' ? '(empty)' : step.decoded; resBox.classList.add('final'); }
            else { resBox.textContent = '—'; resBox.classList.remove('final'); }

            // ── floating tile ──
            const ft = document.getElementById('float-tile');
            if (step.tile != null) {
                ft.textContent = step.tile; ft.classList.add('show');
                ft.style.borderColor = step.charKind === 'digit' ? 'var(--accent-blue)'
                    : step.charKind === 'open' ? 'var(--accent-green)'
                    : step.charKind === 'close' ? 'var(--accent-red)' : 'var(--accent-purple)';
            } else ft.classList.remove('show');

            // ── narration / action / chrome ──
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            mp.classList.toggle('miss', !!step.miss);
            const aw = document.getElementById('action-word'); aw.innerHTML = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            renderOpFeed(step.i, step.complete);
            document.getElementById('st-count').textContent = step.num;
            document.getElementById('st-cur').textContent = step.cur === '' ? '""' : `"${step.cur}"`;
            document.getElementById('st-depth').textContent = step.stack.length;
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(st => `<div style="margin:3px 0;white-space:pre-wrap;">${esc(st.log)}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function renderScanPtr(step) {
            const ptr = document.getElementById('scan-ptr');
            const el = charEls[step.i];
            if (step.i < 0 || !el) { ptr.style.opacity = '0'; ptr._x = null; return; }
            const x = el.offsetLeft + el.offsetWidth / 2 - ptr.offsetWidth / 2;
            Motion.glide(ptr, x);
        }

        function renderOpFeed(curIdx, complete) {
            const feed = document.getElementById('op-feed'); feed.innerHTML = '';
            for (let j = 0; j < s.length; j++) {
                const chip = document.createElement('div');
                const k = kind(s[j]);
                const label = s[j] + (k === 'digit' ? ' #' : k === 'open' ? ' push' : k === 'close' ? ' pop' : ' +');
                let c = 'op-chip';
                if (j === curIdx) c += ' current';
                else if (complete || (curIdx >= 0 && j < curIdx)) c += ' done';
                chip.className = c; chip.textContent = label; feed.appendChild(chip);
            }
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(charEls).forEach(k => { charEls[k].remove(); delete charEls[k]; });
            Object.keys(frameEls).forEach(k => { frameEls[k].remove(); delete frameEls[k]; });
            const eh = document.getElementById('stack-empty'); if (eh) eh.remove();
            const ptr = document.getElementById('scan-ptr'); if (ptr) { ptr.style.opacity = '0'; ptr._x = null; }
            confettiArmed = true;
        }
        function loadString(str) { pause(); s = str; clearDom(); generateSteps(); renderStep(0); }
        function loadCustom() {
            const input = document.getElementById('input-str');
            const val = (input.value || '').trim();
            if (!val) { input.focus(); return; }
            loadString(val);
        }
        const examples = ['3[a2[c]]', '2[abc]3[cd]ef'];
        function loadExample(n) {
            document.getElementById('input-str').value = examples[n];
            loadString(examples[n]);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('input-str').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
