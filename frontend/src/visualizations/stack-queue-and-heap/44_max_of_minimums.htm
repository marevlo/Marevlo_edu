<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max of Minimums for Every Window Size</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* current element / candidate    */
            --accent-blue:   #06b6d4;   /* pointer / chrome               */
            --accent-green:  #22c55e;   /* settled / committed            */
            --accent-red:    #f43f5e;   /* popped / smaller boundary      */
            --accent-purple: #a855f7;   /* span / peek                    */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(6, 182, 212, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(6,182,212,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"], input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 180px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(6,182,212,0.18); background: rgba(6,182,212,0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }
        .op-btn { font-family: var(--mono); }
        .op-btn.run { border-color: rgba(245,165,36,0.4); color: #ffe2b0; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .op-feed { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .op-chip { font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 8px; border: 1px solid var(--border-main); color: var(--text-dim); background: rgba(255,255,255,0.03); transition: all 0.3s; white-space: nowrap; }
        .op-chip.done { opacity: 0.45; }
        .op-chip.current { color: #fff; border-color: rgba(6,182,212,0.6); background: rgba(6,182,212,0.16); box-shadow: 0 0 12px rgba(6,182,212,0.3); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); padding: 22px 18px; display: flex; flex-direction: column; gap: 18px; }

        .row-label { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .row-label .dot { width: 7px; height: 7px; border-radius: 50%; }

        /* input array row */
        .arr-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .cell { min-width: 52px; height: 56px; border-radius: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
            font-family: var(--mono); font-weight: 800; font-size: 19px; will-change: transform;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s; }
        .cell .ci { position: absolute; top: -17px; left: 0; right: 0; text-align: center; font-size: 10px; color: var(--text-dim); font-weight: 700; }
        .cell.cur { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 20px rgba(245,165,36,0.5); transform: translateY(-3px); }
        .cell.span { border-color: rgba(168,85,247,0.55); background: rgba(168,85,247,0.12); color: #e9d5ff; }
        .cell.bound { border-color: rgba(244,63,94,0.5); background: rgba(244,63,94,0.10); color: #fecdd3; }
        .cell.settled { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.08); color: #d6ffe8; }

        /* monotonic stack (horizontal, indices stored) */
        .stack-row { display: flex; gap: 8px; flex-wrap: wrap; min-height: 56px; align-items: center; }
        .sitem { min-width: 64px; height: 50px; border-radius: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: var(--mono); font-weight: 800; font-size: 16px; will-change: transform;
            border: 2px solid var(--accent-blue); background: rgba(6,182,212,0.12); color: #a5f3fc; box-shadow: 0 0 14px rgba(6,182,212,0.25);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s; }
        .sitem .sk { font-size: 9px; color: #7dd3fc; opacity: 0.8; }
        .sitem.top { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 18px rgba(168,85,247,0.45); }
        .sitem.popping { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 22px rgba(244,63,94,0.5); }
        .sitem.pushing { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.55); }
        .stack-empty { font-family: var(--mono); font-size: 13px; color: var(--text-dim); font-style: italic; }

        /* answer row: ans[k] for window size k = 1..n */
        .ans-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .acell { min-width: 56px; height: 56px; border-radius: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
            font-family: var(--mono); font-weight: 800; font-size: 18px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-dim);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s; }
        .acell .ak { position: absolute; top: -17px; left: 0; right: 0; text-align: center; font-size: 10px; color: var(--text-dim); font-weight: 700; }
        .acell.has { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.08); color: #d6ffe8; }
        .acell.hit { border-color: var(--accent-green); background: rgba(34,197,94,0.18); color: #d6ffe8; box-shadow: 0 0 20px rgba(34,197,94,0.45); transform: translateY(-3px); }
        .acell.prop { border-color: var(--accent-blue); background: rgba(6,182,212,0.16); color: #a5f3fc; box-shadow: 0 0 18px rgba(6,182,212,0.4); transform: translateY(-3px); }

        .action-stage { position: relative; min-height: 42px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.t b { color: var(--accent-blue); } .pill.s b { color: var(--accent-green); } .pill.p b { color: var(--accent-purple); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">array</label>
        <input type="text" id="arr-input" placeholder="3, 1, 2, 4">
        <button class="op-btn run" onclick="runArray()">Run</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Example 1</button>
        <button onclick="loadExample(1)">Example 2</button>
        <button onclick="resetSim()">&#8634; Reset</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Max of Minimums <span class="sub">&middot; every window size &middot; monotonic stack &middot; O(n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="op-feed" id="op-feed"></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div>
                    <div class="row-label"><span class="dot" style="background:var(--accent-orange);box-shadow:0 0 8px var(--accent-orange)"></span> input array &mdash; arr[i]</div>
                    <div class="arr-row" id="arr-row"></div>
                </div>
                <div>
                    <div class="row-label"><span class="dot" style="background:var(--accent-blue);box-shadow:0 0 8px var(--accent-blue)"></span> monotonic stack &mdash; indices, increasing values</div>
                    <div class="stack-row" id="stack-row"></div>
                </div>
                <div>
                    <div class="row-label"><span class="dot" style="background:var(--accent-green);box-shadow:0 0 8px var(--accent-green)"></span> answer &mdash; ans[k] = max-of-min over windows of size k</div>
                    <div class="ans-row" id="ans-row"></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill t">i <b id="st-i">-</b></span>
                            <span class="pill p">stack <b id="st-stack">[]</b></span>
                            <span class="pill s">phase <b id="st-phase">init</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el, fromY) {
                if (REDUCED) { el.style.opacity = '1'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `translateY(${((fromY || -16) * (1 - p)).toFixed(2)}px) scale(${(0.4 + 0.6 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'backwards' });
            },
            nudge(el) {
                if (REDUCED) return;
                const kf = SPRING_POS.map(p => ({ transform: `translateY(${(-6 * (1 - p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
            },
        };

        // ───────── State ─────────
        let arr = [];
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 800, 380];
        const cellEls = {};   // index -> input cell element
        const ansEls = {};    // k -> answer cell element
        const stackEls = {};  // stack position -> element

        const CODE = [
            [['src','def '],['fn','maxOfMins'],['src','(arr):']],
            [['src','  n = len(arr); ans = [0]*(n+1)']],
            [['kw','  for '],['src','i '],['kw','in '],['fn','range'],['src','(n):       '],['kw','# '],['src','grow each min span']],
            [['kw','    while '],['src','st and arr[st[-1]] >= arr[i]: pop']],
            [['src','    L = st[-1] '],['kw','if '],['src','st '],['kw','else '],['src','-1; st.push(i)']],
            [['src','  '],['kw','# '],['src','R from a symmetric right-to-left pass']],
            [['kw','    for '],['src','each i: len = R[i] - L[i] - 1']],
            [['src','    ans[len] = max(ans[len], arr[i])']],
            [['kw','  for '],['src','k '],['kw','in '],['src','range(n-1, 0, -1):    '],['kw','# '],['src','propagate']],
            [['src','    ans[k] = max(ans[k], ans[k+1])']],
            [['kw','  return '],['src','ans[1:]']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(a) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', a && a.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── step generation (true algorithm trace) ─────────
        // Each phase chip in the op-feed maps to a stage of the algorithm.
        const PHASES = ['boundaries L', 'boundaries R', 'fill ans', 'propagate', 'done'];

        function generateSteps() {
            steps = [];
            const n = arr.length;
            const left = new Array(n).fill(-1);
            const right = new Array(n).fill(n);

            // immutable snapshot helper
            const snap = (extra) => Object.assign({
                stack: [], cur: -1, popping: [], spanCells: [], boundCell: -1,
                ans: new Array(n).fill(null), ansHit: -1, ansProp: -1, settled: [],
                phaseIdx: 0, code: [], action: '', actionColor: 'var(--accent-blue)',
                panel: '', log: '', miss: false, complete: false, confetti: false,
            }, extra);

            steps.push(snap({
                code: [0, 1], action: 'SETUP', actionColor: 'var(--accent-blue)', phaseIdx: 0,
                panel: `Goal: for every window size <b>k</b>, find the maximum over all window minimums. For each element we find the <b>span</b> where it is the minimum &mdash; that span length is a window size it can win.`,
                log: `init  arr = [${arr.join(', ')}], ans = [0 &times; ${n}]`,
            }));

            // ── PASS 1: nearest smaller to the LEFT (build left[]) ──
            let st = [];
            for (let i = 0; i < n; i++) {
                // pop while top >= arr[i]
                while (st.length && arr[st[st.length - 1]] >= arr[i]) {
                    const popped = st[st.length - 1];
                    steps.push(snap({
                        stack: [...st], cur: i, popping: [popped], phaseIdx: 0, code: [2, 3],
                        action: 'POP ' + arr[popped], actionColor: 'var(--accent-red)',
                        panel: `<code>arr[${popped}] = ${arr[popped]}</code> &#8805; <code>arr[${i}] = ${arr[i]}</code> &#8594; pop it. It is not smaller than the new element, so it cannot be <b>${i}</b>'s left boundary.`,
                        log: `i=${i}  pop idx ${popped} (val ${arr[popped]})`,
                    }));
                    st.pop();
                }
                left[i] = st.length ? st[st.length - 1] : -1;
                st.push(i);
                steps.push(snap({
                    stack: [...st], cur: i, boundCell: left[i], phaseIdx: 0, code: [3, 4],
                    action: 'left[' + i + '] = ' + left[i], actionColor: 'var(--accent-orange)',
                    panel: left[i] === -1
                        ? `Stack is empty &#8594; nothing smaller on the left of <code>arr[${i}] = ${arr[i]}</code>, so <code>left[${i}] = -1</code>. Push index <b>${i}</b>.`
                        : `Top of stack is index <b>${left[i]}</b> (<code>arr[${left[i]}] = ${arr[left[i]]}</code> &lt; ${arr[i]}) &#8594; <code>left[${i}] = ${left[i]}</code>. Push index <b>${i}</b>.`,
                    log: `i=${i}  push idx ${i}  left[${i}] = ${left[i]}`,
                }));
            }

            // ── PASS 2: nearest smaller to the RIGHT (build right[]) ──
            st = [];
            for (let i = n - 1; i >= 0; i--) {
                while (st.length && arr[st[st.length - 1]] >= arr[i]) {
                    const popped = st[st.length - 1];
                    steps.push(snap({
                        stack: [...st], cur: i, popping: [popped], phaseIdx: 1, code: [5, 3],
                        action: 'POP ' + arr[popped], actionColor: 'var(--accent-red)',
                        panel: `Right pass (i goes high &#8594; low). <code>arr[${popped}] = ${arr[popped]}</code> &#8805; <code>arr[${i}] = ${arr[i]}</code> &#8594; pop it.`,
                        log: `R i=${i}  pop idx ${popped} (val ${arr[popped]})`,
                    }));
                    st.pop();
                }
                right[i] = st.length ? st[st.length - 1] : n;
                st.push(i);
                steps.push(snap({
                    stack: [...st], cur: i, boundCell: right[i] < n ? right[i] : -1, phaseIdx: 1, code: [5, 4],
                    action: 'right[' + i + '] = ' + right[i], actionColor: 'var(--accent-orange)',
                    panel: right[i] === n
                        ? `Nothing smaller on the right of <code>arr[${i}] = ${arr[i]}</code>, so <code>right[${i}] = n = ${n}</code>. Push index <b>${i}</b>.`
                        : `Nearest smaller on the right is index <b>${right[i]}</b> (<code>arr[${right[i]}] = ${arr[right[i]]}</code>) &#8594; <code>right[${i}] = ${right[i]}</code>. Push index <b>${i}</b>.`,
                    log: `R i=${i}  push idx ${i}  right[${i}] = ${right[i]}`,
                }));
            }

            // ── PASS 3: each element fills ans[windowSize] ──
            const ans = new Array(n + 1).fill(0);   // ans[1..n] are the real window sizes
            for (let i = 0; i < n; i++) {
                const len = right[i] - left[i] - 1;
                const before = ans[len];
                ans[len] = Math.max(ans[len], arr[i]);
                // visible ans array (1-indexed compressed to 0..n-1 for display)
                const ansVis = new Array(n).fill(null);
                for (let k = 1; k <= n; k++) if (ans[k] > 0) ansVis[k - 1] = ans[k];
                steps.push(snap({
                    cur: i, spanCells: rangeBetween(left[i], right[i]), phaseIdx: 2, code: [6, 7],
                    ans: ansVis, ansHit: len - 1,
                    action: 'win size ' + len, actionColor: 'var(--accent-purple)',
                    panel: `<code>arr[${i}] = ${arr[i]}</code> is the minimum across span <code>(${left[i]} , ${right[i]})</code> &#8594; window size <b>${len}</b>. ${arr[i] > before ? `It beats the old <code>ans[${len}] = ${before}</code>, so` : `<code>ans[${len}]</code> already holds ${before} &#8805; ${arr[i]}, so`} <code>ans[${len}] = ${ans[len]}</code>.`,
                    log: `fill  i=${i} len=${len}  ans[${len}] = ${ans[len]}`,
                }));
            }

            // ── PASS 4: propagate larger answers down to smaller window sizes ──
            for (let k = n - 1; k >= 1; k--) {
                const before = ans[k];
                ans[k] = Math.max(ans[k], ans[k + 1]);
                const ansVis = new Array(n).fill(null);
                for (let j = 1; j <= n; j++) ansVis[j - 1] = ans[j];
                steps.push(snap({
                    phaseIdx: 3, code: [8, 9], ans: ansVis, ansProp: k - 1,
                    action: 'ans[' + k + '] = ' + ans[k], actionColor: 'var(--accent-blue)',
                    panel: `Propagate: a window of size <b>${k + 1}</b> has min &#8804; any size-<b>${k}</b> window's max-of-min candidate? Take <code>max(ans[${k}] = ${before}, ans[${k + 1}] = ${ans[k + 1]}) = ${ans[k]}</code>.`,
                    log: `prop  ans[${k}] = max(${before}, ${ans[k + 1]}) = ${ans[k]}`,
                }));
            }

            const finalVis = new Array(n).fill(null);
            for (let j = 1; j <= n; j++) finalVis[j - 1] = ans[j];
            steps.push(snap({
                phaseIdx: 4, complete: true, confetti: true, code: [10],
                ans: finalVis, settled: Array.from({ length: n }, (_, k) => k),
                action: '✓ DONE', actionColor: 'var(--accent-green)',
                panel: `Finished. <code>ans[k]</code> for k = 1..${n} is <code>[${finalVis.join(', ')}]</code> &mdash; the maximum of every window's minimum, for each window size. O(n) total.`,
                log: `done  ans = [${finalVis.join(', ')}]`,
            }));
        }

        // indices strictly between l and r (exclusive), clamped to the array
        function rangeBetween(l, r) {
            const out = []; for (let k = l + 1; k < r; k++) out.push(k); return out;
        }

        // ───────── render (persistent DOM, keyed reconciliation) ─────────
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const n = arr.length;

            // input array row ----------------------------------------------------
            const arrRow = document.getElementById('arr-row');
            const usedC = new Set();
            arr.forEach((val, i) => {
                usedC.add(String(i));
                let el = cellEls[i];
                if (!el) {
                    el = document.createElement('div'); el.className = 'cell';
                    el.innerHTML = `<span class="ci"></span><span class="cv"></span>`;
                    cellEls[i] = el; arrRow.appendChild(el);
                }
                el.querySelector('.ci').textContent = i;
                el.querySelector('.cv').textContent = val;
                let cls = 'cell';
                if (i === step.cur) cls += ' cur';
                else if (step.spanCells.includes(i)) cls += ' span';
                else if (i === step.boundCell) cls += ' bound';
                else if (step.settled.includes(i)) cls += ' settled';
                el.className = cls;
            });
            Object.keys(cellEls).forEach(k => { if (!usedC.has(k)) { cellEls[k].remove(); delete cellEls[k]; } });

            // monotonic stack row ------------------------------------------------
            const stackRow = document.getElementById('stack-row');
            const stackList = step.stack || [];
            const usedS = new Set();
            // empty placeholder
            let emptyTag = document.getElementById('stack-empty');
            if (stackList.length === 0 && (step.popping || []).length === 0) {
                if (!emptyTag) { emptyTag = document.createElement('span'); emptyTag.id = 'stack-empty'; emptyTag.className = 'stack-empty'; emptyTag.textContent = 'stack empty'; stackRow.appendChild(emptyTag); }
            } else if (emptyTag) { emptyTag.remove(); }

            // display = stack contents plus any index currently being popped (shown at the end, red)
            const display = stackList.map(ix => ({ ix, popping: false }));
            (step.popping || []).forEach(ix => display.push({ ix, popping: true }));
            display.forEach((d, pos) => {
                usedS.add(String(pos));
                let el = stackEls[pos];
                if (!el) {
                    el = document.createElement('div'); el.className = 'sitem';
                    el.innerHTML = `<span class="sv"></span><span class="sk"></span>`;
                    stackEls[pos] = el; stackRow.appendChild(el);
                    Motion.pop(el, -14);
                }
                el.querySelector('.sv').textContent = arr[d.ix];
                el.querySelector('.sk').textContent = 'idx ' + d.ix;
                let cls = 'sitem';
                if (d.popping) cls += ' popping';
                else if (pos === stackList.length - 1) cls += ' top';
                el.className = cls;
            });
            Object.keys(stackEls).forEach(k => { if (!usedS.has(+k)) { stackEls[k].remove(); delete stackEls[k]; } });

            // answer row ---------------------------------------------------------
            const ansRow = document.getElementById('ans-row');
            const usedA = new Set();
            for (let k = 0; k < n; k++) {
                usedA.add(String(k));
                let el = ansEls[k];
                if (!el) {
                    el = document.createElement('div'); el.className = 'acell';
                    el.innerHTML = `<span class="ak"></span><span class="av"></span>`;
                    ansEls[k] = el; ansRow.appendChild(el);
                }
                el.querySelector('.ak').textContent = 'k=' + (k + 1);
                const v = step.ans[k];
                el.querySelector('.av').textContent = v == null ? '·' : v;
                let cls = 'acell';
                if (k === step.ansHit) { cls += ' hit'; Motion.nudge(el); }
                else if (k === step.ansProp) { cls += ' prop'; Motion.nudge(el); }
                else if (v != null) cls += ' has';
                el.className = cls;
            }
            Object.keys(ansEls).forEach(k => { if (!usedA.has(k)) { ansEls[k].remove(); delete ansEls[k]; } });

            // narration / action / chrome ---------------------------------------
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            mp.classList.toggle('miss', !!step.miss);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            renderOpFeed(step.phaseIdx);
            document.getElementById('st-i').textContent = step.cur >= 0 ? step.cur : '-';
            document.getElementById('st-stack').textContent = '[' + (step.stack || []).join(', ') + ']';
            document.getElementById('st-phase').textContent = PHASES[step.phaseIdx];
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function renderOpFeed(currentPhase) {
            const feed = document.getElementById('op-feed'); feed.innerHTML = '';
            PHASES.forEach((label, i) => {
                const chip = document.createElement('div');
                chip.className = 'op-chip' + (currentPhase === i ? ' current' : (i < currentPhase ? ' done' : ''));
                chip.textContent = label; feed.appendChild(chip);
            });
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(cellEls).forEach(k => { cellEls[k].remove(); delete cellEls[k]; });
            Object.keys(ansEls).forEach(k => { ansEls[k].remove(); delete ansEls[k]; });
            Object.keys(stackEls).forEach(k => { stackEls[k].remove(); delete stackEls[k]; });
            const e = document.getElementById('stack-empty'); if (e) e.remove();
            confettiArmed = true;
        }
        function loadArr(newArr) {
            pause(); arr = newArr.slice(); clearDom(); generateSteps(); renderStep(0);
        }
        function runArray() {
            const raw = document.getElementById('arr-input').value;
            const parsed = raw.split(/[\s,]+/).map(s => s.trim()).filter(s => s.length).map(Number).filter(v => !isNaN(v));
            if (parsed.length === 0) { document.getElementById('arr-input').focus(); return; }
            loadArr(parsed.slice(0, 9));
        }
        function loadExample(n) {
            const exs = [ [3, 1, 2, 4], [5, 3, 2, 6, 1] ];
            const ex = exs[n];
            document.getElementById('arr-input').value = ex.join(', ');
            loadArr(ex);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('arr-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') runArray(); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
