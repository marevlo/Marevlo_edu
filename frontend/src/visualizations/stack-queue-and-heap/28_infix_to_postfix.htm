<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infix &#8594; Postfix (Shunting-Yard)</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* current token / in motion      */
            --accent-blue:   #06b6d4;   /* TOP pointer / chrome           */
            --accent-green:  #22c55e;   /* operand / output / committed   */
            --accent-red:    #f43f5e;   /* operator popped to output      */
            --accent-purple: #a855f7;   /* operator on stack / parens     */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(6, 182, 212, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(6,182,212,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 14px; font-family: var(--mono); width: 240px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(6,182,212,0.18); background: rgba(6,182,212,0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }
        .load-btn { font-family: var(--mono); border-color: rgba(6,182,212,0.4); color: #a5f3fc; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .op-feed { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .op-chip { font-family: var(--mono); font-size: 13px; font-weight: 800; min-width: 26px; padding: 4px 9px; border-radius: 8px; border: 1px solid var(--border-main); color: var(--text-dim); background: rgba(255,255,255,0.03); transition: all 0.3s; white-space: nowrap; text-align: center; }
        .op-chip.done { opacity: 0.4; }
        .op-chip.current { color: #fff; border-color: rgba(245,165,36,0.7); background: rgba(245,165,36,0.16); box-shadow: 0 0 12px rgba(245,165,36,0.35); transform: translateY(-2px); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); padding: 22px 18px; display: flex; flex-direction: column; gap: 18px; }

        /* row label */
        .row-label { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 7px; display: flex; align-items: center; gap: 8px; }
        .row-label .dot { width: 7px; height: 7px; border-radius: 50%; }

        /* the horizontal infix token row */
        .infix-row { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; min-height: 50px; }
        .tk { width: 40px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-weight: 800; font-size: 20px; position: relative; will-change: transform;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s, opacity 0.35s; }
        .tk.operand  { border-color: rgba(34,197,94,0.40); color: #d6ffe8; }
        .tk.operator { border-color: rgba(168,85,247,0.40); color: #e9d5ff; }
        .tk.paren    { border-color: rgba(6,182,212,0.40); color: #a5f3fc; }
        .tk.scanned  { opacity: 0.34; }
        .tk.current  { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.55); transform: translateY(-3px); }

        /* the work area: vertical operator stack on the left, output row on the right */
        .work { display: flex; gap: 26px; align-items: stretch; flex-wrap: wrap; }
        .stack-zone { flex: 0 0 auto; }
        .out-zone { flex: 1 1 320px; min-width: 280px; display: flex; flex-direction: column; }

        .stack-wrap { display: flex; align-items: flex-end; gap: 18px; min-height: 240px; }
        .stack-col { display: flex; flex-direction: column-reverse; gap: 8px; position: relative; }
        .slot { width: 86px; height: 44px; border-radius: 11px; display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-weight: 800; font-size: 20px; position: relative; will-change: transform;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s; }
        .slot.empty   { border-style: dashed; color: var(--text-dim); background: rgba(255,255,255,0.015); }
        .slot.filled  { border-color: rgba(168,85,247,0.45); background: rgba(168,85,247,0.10); color: #e9d5ff; }
        .slot.paren   { border-color: rgba(6,182,212,0.5); background: rgba(6,182,212,0.12); color: #a5f3fc; }
        .slot.toptile { border-color: var(--accent-blue); background: rgba(6,182,212,0.14); color: #a5f3fc; box-shadow: 0 0 20px rgba(6,182,212,0.45); }
        .slot.pushing { border-color: var(--accent-purple); background: rgba(168,85,247,0.18); color: #f0e0ff; box-shadow: 0 0 22px rgba(168,85,247,0.55); }
        .slot.popping { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 22px rgba(244,63,94,0.5); }
        .base-line { width: 110px; height: 4px; border-radius: 3px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent); margin-top: 2px; }

        /* TOP pointer pill that glides vertically to the current top slot */
        .top-ptr { position: absolute; right: -78px; display: flex; align-items: center; gap: 6px; opacity: 0; will-change: transform;
            font-family: var(--mono); font-size: 12px; font-weight: 800; }
        .top-ptr .arrow { color: var(--accent-blue); font-size: 16px; }
        .top-ptr .tag { background: var(--accent-blue); color: #04222a; padding: 3px 10px; border-radius: 8px; box-shadow: 0 0 14px rgba(6,182,212,0.6); }

        /* output row (postfix building) */
        .out-row { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; align-content: flex-start; min-height: 56px;
            padding: 12px; border-radius: 12px; border: 1px dashed rgba(34,197,94,0.32); background: rgba(34,197,94,0.04); flex: 1 1 auto; }
        .out-tile { min-width: 38px; height: 44px; padding: 0 8px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-weight: 800; font-size: 20px; will-change: transform;
            border: 2px solid rgba(34,197,94,0.45); background: rgba(34,197,94,0.10); color: #d6ffe8; }
        .out-tile.operator { border-color: rgba(244,63,94,0.45); background: rgba(244,63,94,0.10); color: #fecdd3; }
        .out-empty { font-family: var(--mono); font-size: 13px; color: var(--text-dim); }

        .action-stage { position: relative; min-height: 84px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .float-tile { min-width: 56px; height: 50px; padding: 0 10px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 22px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.5); opacity: 0; transform: scale(.5); transition: opacity .25s, transform .4s cubic-bezier(.34,1.5,.64,1); }
        .float-tile.show { opacity: 1; transform: scale(1); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line .cm { color: #5a6680; font-style: italic; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.t b { color: var(--accent-orange); } .pill.s b { color: var(--accent-purple); } .pill.o b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 120px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Infix</label>
        <input type="text" id="expr-input" value="A+B*C" placeholder="e.g. A+B*C" autocomplete="off" spellcheck="false">
        <button class="load-btn" onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Example 1</button>
        <button onclick="loadExample(1)">Example 2</button>
        <button onclick="resetSim()">&#8634; Reset</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Infix &#8594; Postfix <span class="sub">&middot; Shunting-Yard &middot; operator stack &middot; precedence &amp; associativity</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="op-feed" id="op-feed"></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div>
                    <div class="row-label"><span class="dot" style="background:var(--accent-orange);box-shadow:0 0 8px var(--accent-orange)"></span> Infix &middot; scan left &#8594; right</div>
                    <div class="infix-row" id="infix-row"></div>
                </div>
                <div class="work">
                    <div class="stack-zone">
                        <div class="row-label"><span class="dot" style="background:var(--accent-purple);box-shadow:0 0 8px var(--accent-purple)"></span> Operator stack</div>
                        <div class="stack-wrap">
                            <div>
                                <div class="stack-col" id="stack-col"></div>
                                <div class="base-line"></div>
                            </div>
                        </div>
                    </div>
                    <div class="out-zone">
                        <div class="row-label"><span class="dot" style="background:var(--accent-green);box-shadow:0 0 8px var(--accent-green)"></span> Postfix output</div>
                        <div class="out-row" id="out-row"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="float-tile" id="float-tile"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill t">token <b id="st-token">&mdash;</b></span>
                            <span class="pill s">stack top <b id="st-top">&mdash;</b></span>
                            <span class="pill o">output <b id="st-out">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm &middot; Shunting-Yard</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            glide(el, y) {
                const prev = el._y; el.style.opacity = '1';
                const commit = `translateY(${y.toFixed(2)}px)`;
                if (REDUCED || prev == null || Math.abs(y - prev) < 0.5) { el._y = y; el.style.transform = commit; return; }
                const dy = y - prev;
                const kf = SPRING_POS.map(p => ({ transform: `translateY(${(prev + dy * p).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._y = y; el.style.transform = commit;
            },
            pop(el, fromY) {
                if (REDUCED) { el.style.opacity = '1'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `translateY(${((fromY || -16) * (1 - p)).toFixed(2)}px) scale(${(0.4 + 0.6 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', fill: 'backwards' });
            },
        };

        // ───────── State ─────────
        let expr = '';
        let tokens = [];      // [{ch, kind:'operand'|'operator'|'paren'}]
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 800, 380];
        const slotEls = {};   // stack-index -> element

        const isOperand  = (c) => /[A-Za-z0-9]/.test(c);
        const isOperator = (c) => '+-*/^'.includes(c);
        const prec = (op) => op === '^' ? 3 : ('*/'.includes(op) ? 2 : 1);
        const rightAssoc = (op) => op === '^';

        const CODE = [
            [['cm','# scan infix left to right']],                                      // 0
            [['kw','for '],['src','tok '],['kw','in '],['src','tokens:']],              // 1
            [['kw','  if '],['src','tok is operand: '],['fn','output'],['src','.append(tok)']], // 2
            [['kw','  elif '],['src',"tok == '(': "],['fn','stack'],['src','.push(tok)']], // 3
            [['kw','  elif '],['src',"tok == ')':"]],                                   // 4
            [['kw','    while '],['src',"top != '(': "],['fn','output'],['src','.append('],['fn','stack'],['src','.pop())']], // 5
            [['fn','    stack'],['src','.pop()  '],['cm','# discard (']],               // 6
            [['kw','  else'],['src',':  '],['cm','# operator']],                        // 7
            [['kw','    while '],['src','top is op and prec(top) '],['src','&#8805;'],['src',' prec(tok):']], // 8
            [['fn','      output'],['src','.append('],['fn','stack'],['src','.pop())']], // 9
            [['fn','    stack'],['src','.push(tok)']],                                  // 10
            [['cm','# drain remaining operators']],                                     // 11
            [['kw','while '],['src','stack: '],['fn','output'],['src','.append('],['fn','stack'],['src','.pop())']], // 12
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tks, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tks.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.innerHTML = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        const kindOf = (c) => isOperand(c) ? 'operand' : (c === '(' || c === ')') ? 'paren' : 'operator';

        // ───────── step generation (true Shunting-Yard trace) ─────────
        function generateSteps() {
            steps = [];
            const stack = [];      // operators / parens
            const output = [];     // postfix tokens
            // snapshot: scanIdx = index in `tokens` currently being read (-1 none, tokens.length = drain phase)
            const snap = (extra) => Object.assign({
                stack: [...stack], output: [...output], top: stack.length ? stack[stack.length - 1] : null,
                scanIdx: -1, scanned: extra && extra._scanned != null ? extra._scanned : (extra && extra.scanIdx != null ? extra.scanIdx : -1),
                pushIdx: -1, popIdx: -1, tile: null, tileKind: null, code: [], action: '', actionColor: 'var(--text-dim)',
            }, extra);

            steps.push(snap({
                code: [0], action: 'START', actionColor: 'var(--accent-blue)', scanIdx: -1, scanned: -1,
                panel: `<b>Shunting-Yard</b> converts infix <code>${expr}</code> to postfix. Scan tokens left&#8594;right: operands go straight to <b>output</b>; operators wait on a <b>stack</b> by <b>precedence</b>, then drain at the end.`,
                log: `start  infix = ${expr}`,
            }));

            tokens.forEach((tk, i) => {
                const c = tk.ch;
                // read the token (highlight it as current)
                steps.push(snap({
                    code: [1], scanIdx: i, scanned: i - 1, action: 'READ ' + c, actionColor: 'var(--accent-orange)', tile: c, tileKind: tk.kind,
                    panel: `Read token <code>${c}</code> &middot; it is ${tk.kind === 'operand' ? 'an <b>operand</b>' : c === '(' || c === ')' ? 'a <b>parenthesis</b>' : 'an <b>operator</b>'}.`,
                    log: `read ${c}`,
                }));

                if (tk.kind === 'operand') {
                    output.push(c);
                    steps.push(snap({
                        code: [2], scanIdx: i, scanned: i, action: 'OUTPUT ' + c, actionColor: 'var(--accent-green)', tile: c, tileKind: 'operand',
                        panel: `<code>${c}</code> is an operand &#8594; append straight to <b>output</b>. Postfix so far: <code>${output.join('') || ' '}</code>.`,
                        log: `  operand ${c} -> output  [${output.join('')}]`,
                    }));
                } else if (c === '(') {
                    stack.push(c);
                    steps.push(snap({
                        code: [3], scanIdx: i, scanned: i, action: 'PUSH (', actionColor: 'var(--accent-purple)', pushIdx: stack.length - 1, tile: '(', tileKind: 'paren',
                        panel: `<code>(</code> always goes on the stack &#8594; it marks where this sub-expression begins.`,
                        log: `  push (`,
                    }));
                } else if (c === ')') {
                    // pop until matching '('
                    while (stack.length && stack[stack.length - 1] !== '(') {
                        const t = stack[stack.length - 1];
                        const popped = stack.pop(); output.push(popped);
                        steps.push(snap({
                            code: [5], scanIdx: i, scanned: i, action: 'POP ' + popped, actionColor: 'var(--accent-red)', popIdx: stack.length, popValue: popped, tile: popped, tileKind: 'operator',
                            panel: `Hit <code>)</code> &#8594; pop operators to output until <code>(</code>. Pop <code>${popped}</code> &#8594; output <code>${output.join('')}</code>.`,
                            log: `  ) pop ${popped} -> output  [${output.join('')}]`,
                        }));
                    }
                    if (stack.length) {
                        stack.pop(); // discard '('
                        steps.push(snap({
                            code: [6], scanIdx: i, scanned: i, action: 'DISCARD ( )', actionColor: 'var(--accent-blue)', tile: '( )', tileKind: 'paren',
                            panel: `Matching <code>(</code> reached &#8594; discard the pair. The parentheses never appear in postfix.`,
                            log: `  discard ( )`,
                        }));
                    }
                } else {
                    // operator: pop while top is operator of higher precedence, or equal precedence & left-associative
                    while (stack.length && isOperator(stack[stack.length - 1]) &&
                           (prec(stack[stack.length - 1]) > prec(c) ||
                            (prec(stack[stack.length - 1]) === prec(c) && !rightAssoc(c)))) {
                        const top = stack[stack.length - 1];
                        const cmp = prec(top) > prec(c) ? `higher precedence (${prec(top)} &gt; ${prec(c)})`
                                                        : `equal precedence (${prec(top)}) and <code>${c}</code> is left-associative`;
                        const popped = stack.pop(); output.push(popped);
                        steps.push(snap({
                            code: [8, 9], scanIdx: i, scanned: i, action: 'POP ' + popped, actionColor: 'var(--accent-red)', popIdx: stack.length, popValue: popped, tile: popped, tileKind: 'operator',
                            panel: `Stack top <code>${top}</code> has ${cmp} &#8594; pop it to output before pushing <code>${c}</code>. Output <code>${output.join('')}</code>.`,
                            log: `  pop ${top} (prec) -> output  [${output.join('')}]`,
                        }));
                    }
                    // narrate why we stop (only if something is left or stack empty matters)
                    const topNow = stack.length ? stack[stack.length - 1] : null;
                    if (topNow == null || !isOperator(topNow)) {
                        // nothing to pop reason
                    }
                    stack.push(c);
                    const reason = topNow == null
                        ? `stack has no operator beneath it`
                        : !isOperator(topNow)
                            ? `top is <code>(</code> &#8594; stop popping`
                            : `top <code>${topNow}</code> has lower precedence`;
                    steps.push(snap({
                        code: [10], scanIdx: i, scanned: i, action: 'PUSH ' + c, actionColor: 'var(--accent-purple)', pushIdx: stack.length - 1, tile: c, tileKind: 'operator',
                        panel: `Push operator <code>${c}</code> &middot; prec <b>${prec(c)}</b>${rightAssoc(c) ? ', right-assoc' : ''} &mdash; ${reason}.`,
                        log: `  push ${c}  (prec ${prec(c)})`,
                    }));
                }
            });

            // drain remaining operators
            if (stack.length) {
                steps.push(snap({
                    code: [11, 12], scanIdx: tokens.length, scanned: tokens.length - 1, action: 'DRAIN', actionColor: 'var(--accent-blue)',
                    panel: `All tokens read &#8594; <b>drain</b> the remaining operators from the stack into output, top to bottom.`,
                    log: `drain stack  [${stack.join(', ')}]`,
                }));
                while (stack.length) {
                    const popped = stack.pop(); output.push(popped);
                    steps.push(snap({
                        code: [12], scanIdx: tokens.length, scanned: tokens.length - 1, action: 'POP ' + popped, actionColor: 'var(--accent-red)', popIdx: stack.length, popValue: popped, tile: popped, tileKind: 'operator',
                        panel: `Pop leftover <code>${popped}</code> &#8594; output <code>${output.join('')}</code>.`,
                        log: `  pop ${popped} -> output  [${output.join('')}]`,
                    }));
                }
            }

            steps.push(snap({
                complete: true, confetti: true, code: [], scanIdx: tokens.length, scanned: tokens.length - 1,
                action: '✓ DONE', actionColor: 'var(--accent-green)',
                panel: `Conversion complete. <code>${expr}</code> &#8594; postfix <b style="color:#86efac">${output.join('') || ' '}</b>.`,
                log: `done  postfix = ${output.join('')}`,
            }));
        }

        // ───────── render ─────────
        const SLOT_H = 44, SLOT_GAP = 8;
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // infix row
            renderInfix(step);

            // operator stack (vertical, index 0 bottom)
            const col = document.getElementById('stack-col');
            const used = new Set();
            const slen = step.stack.length;
            const visN = Math.max(slen, 1); // keep at least one ghost slot for shape
            const topIdx = slen - 1;
            for (let i = 0; i < visN; i++) {
                used.add(String(i));
                let el = slotEls[i];
                if (!el) {
                    el = document.createElement('div'); el.className = 'slot';
                    el.innerHTML = `<span class="sv"></span>`;
                    slotEls[i] = el; col.appendChild(el);
                }
                const has = i < slen;
                const v = has ? step.stack[i] : null;
                let cls = 'slot';
                if (!has) cls += ' empty';
                else if (i === step.pushIdx) cls += ' pushing';
                else if (v === '(') cls += ' paren';
                else if (i === topIdx) cls += ' toptile';
                else cls += ' filled';
                el.className = cls;
                el.querySelector('.sv').textContent = has ? v : '·';
                if (has && i === step.pushIdx) Motion.pop(el, -18);
            }
            // popping slot: briefly show the value leaving, in the slot just above the new top
            if (step.popIdx >= 0) {
                let el = slotEls[step.popIdx];
                if (!el) {
                    el = document.createElement('div'); el.className = 'slot';
                    el.innerHTML = `<span class="sv"></span>`;
                    slotEls[step.popIdx] = el; col.appendChild(el);
                }
                used.add(String(step.popIdx));
                el.className = 'slot popping';
                el.querySelector('.sv').textContent = step.popValue;
            }
            Object.keys(slotEls).forEach(k => { if (!used.has(k)) { slotEls[k].remove(); delete slotEls[k]; } });

            renderTopPtr(step);

            // output row
            renderOutput(step.output);

            // floating tile (value in motion)
            const ft = document.getElementById('float-tile');
            if (step.tile != null && !step.complete) {
                ft.textContent = step.tile; ft.classList.add('show');
                const k = step.tileKind;
                ft.style.borderColor = step.popIdx >= 0 ? 'var(--accent-red)'
                    : k === 'operand' ? 'var(--accent-green)'
                    : k === 'paren' ? 'var(--accent-blue)'
                    : step.pushIdx >= 0 ? 'var(--accent-purple)' : 'var(--accent-orange)';
            } else ft.classList.remove('show');

            // narration / action / chrome
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            mp.classList.toggle('miss', !!step.miss);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            renderOpFeed(step);

            document.getElementById('st-token').textContent = step.scanIdx >= 0 && step.scanIdx < tokens.length ? tokens[step.scanIdx].ch : '—';
            document.getElementById('st-top').textContent = step.top != null ? step.top : '—';
            document.getElementById('st-out').textContent = step.output.length ? step.output.join('') : '—';
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function renderInfix(step) {
            const row = document.getElementById('infix-row'); row.innerHTML = '';
            tokens.forEach((tk, i) => {
                const el = document.createElement('div');
                let cls = 'tk ' + tk.kind;
                if (i === step.scanIdx) cls += ' current';
                else if (i <= step.scanned) cls += ' scanned';
                el.className = cls; el.textContent = tk.ch;
                row.appendChild(el);
            });
        }

        function renderOutput(output) {
            const row = document.getElementById('out-row'); row.innerHTML = '';
            if (!output.length) { row.innerHTML = `<span class="out-empty">postfix builds here &#8230;</span>`; return; }
            output.forEach(ch => {
                const el = document.createElement('div');
                el.className = 'out-tile' + (isOperator(ch) ? ' operator' : '');
                el.textContent = ch; row.appendChild(el);
            });
        }

        function renderTopPtr(step) {
            const col = document.getElementById('stack-col');
            let ptr = document.getElementById('top-ptr');
            if (!ptr) { ptr = document.createElement('div'); ptr.id = 'top-ptr'; ptr.className = 'top-ptr'; ptr.innerHTML = `<span class="tag">top</span><span class="arrow">&#8592;</span>`; col.parentElement.appendChild(ptr); }
            const topIdx = step.stack.length - 1;
            if (topIdx < 0) { ptr.style.opacity = '0'; ptr._y = null; return; }
            const visN = Math.max(step.stack.length, 1);
            const fromBottom = topIdx * (SLOT_H + SLOT_GAP) + SLOT_H / 2;
            const colH = visN * SLOT_H + (visN - 1) * SLOT_GAP;
            const y = colH - fromBottom - 11;
            ptr.style.top = '0px';
            ptr.style.right = '-78px';
            Motion.glide(ptr, y);
        }

        function renderOpFeed(step) {
            const feed = document.getElementById('op-feed'); feed.innerHTML = '';
            tokens.forEach((tk, i) => {
                const chip = document.createElement('div');
                let cls = 'op-chip';
                if (i === step.scanIdx) cls += ' current';
                else if (i <= step.scanned) cls += ' done';
                chip.className = cls; chip.textContent = tk.ch; feed.appendChild(chip);
            });
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(slotEls).forEach(k => { slotEls[k].remove(); delete slotEls[k]; });
            const p = document.getElementById('top-ptr'); if (p) p.remove();
            confettiArmed = true;
        }

        function parseExpr(raw) {
            expr = (raw || '').replace(/\s+/g, '');
            tokens = expr.split('').map(c => ({ ch: c, kind: kindOf(c) }));
        }

        function loadExpr(raw) {
            pause();
            parseExpr(raw);
            clearDom();
            generateSteps();
            renderStep(0);
        }

        function loadCustom() {
            const v = document.getElementById('expr-input').value.trim();
            if (!v) { document.getElementById('expr-input').focus(); return; }
            loadExpr(v);
        }

        const EXAMPLES = ['A+B*C', '(A+B)*(C-D)'];
        function loadExample(n) {
            document.getElementById('expr-input').value = EXAMPLES[n];
            loadExpr(EXAMPLES[n]);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('expr-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
