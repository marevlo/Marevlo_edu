<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check if Binary Tree is Balanced - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* height value / answer  */
            --accent-blue:   #06b6d4;   /* descent / chrome       */
            --accent-green:  #22c55e;   /* balanced / done        */
            --accent-red:    #f43f5e;   /* violation / unbalanced */
            --accent-purple: #a855f7;   /* current recursion node */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 240px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.bad { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.bad::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); display: flex; flex-wrap: wrap; }

        .tree-stage { position: relative; flex: 1 1 460px; min-width: 320px; overflow: auto; scrollbar-width: thin; padding: 18px; }
        .tree-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .tree-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .tree-svg { width: 100%; display: block; }

        .side-stage { flex: 0 1 240px; min-width: 200px; border-left: 1px solid rgba(255,255,255,0.06); padding: 18px; display: flex; flex-direction: column; gap: 14px; }
        @media (max-width: 640px) { .side-stage { border-left: none; border-top: 1px solid rgba(255,255,255,0.06); flex-basis: 100%; } }

        .side-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
        .side-label .pip { width: 7px; height: 7px; border-radius: 50%; }
        .side-label.stack .pip { background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }
        .side-label.out .pip { background: var(--accent-orange); box-shadow: 0 0 8px var(--accent-orange); }

        .stack-box { display: flex; flex-direction: column-reverse; gap: 6px; min-height: 150px; border: 1px dashed rgba(255,255,255,0.12); border-radius: 10px; padding: 10px; background: rgba(255,255,255,0.02); }
        .stack-frame { padding: 7px 10px; border-radius: 8px; font-family: var(--mono); font-size: 12.5px; text-align: center; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); transition: background 0.3s, border-color 0.3s, color 0.3s, transform 0.3s, box-shadow 0.3s; }
        .stack-frame.active { background: rgba(168,85,247,0.16); border-color: var(--accent-purple); color: #e9d5ff; box-shadow: 0 0 16px rgba(168,85,247,0.4); transform: scale(1.04); }
        .stack-empty { color: #4b5772; font-family: var(--mono); font-size: 12px; text-align: center; padding: 14px 0; }

        .heights-box { display: flex; flex-direction: column; gap: 7px; min-height: 44px; }
        .height-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 7px 11px; border-radius: 9px; font-family: var(--mono); font-size: 12.5px; border: 1px solid var(--border-main); background: rgba(255,255,255,0.03); transition: background 0.3s, border-color 0.3s; }
        .height-row .hnode { color: var(--text-dim); }
        .height-row .hval { font-weight: 800; }
        .height-row.bal { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.08); }
        .height-row.bal .hnode { color: #bbf7d0; } .height-row.bal .hval { color: var(--accent-green); }
        .height-row.bad { border-color: rgba(244,63,94,0.45); background: rgba(244,63,94,0.1); }
        .height-row.bad .hnode { color: #fecdd3; } .height-row.bad .hval { color: var(--accent-red); }
        .out-empty { color: #4b5772; font-family: var(--mono); font-size: 12px; padding: 10px 0; }

        .action-stage { position: relative; min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 6px; align-items: center; min-height: 40px; flex-wrap: wrap; justify-content: center; }
        .ans-tile { min-width: 34px; height: 40px; padding: 0 14px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 18px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 12px rgba(245,165,36,0.35); }
        .ans-tile.yes { border-color: var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0; box-shadow: 0 0 12px rgba(34,197,94,0.35); }
        .ans-tile.no { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 12px rgba(244,63,94,0.35); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line .cm { color: #5b6b86; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); } .pill.b b { color: var(--accent-blue); } .pill.o b { color: var(--accent-orange); } .pill.g b { color: var(--accent-green); } .pill.r b { color: var(--accent-red); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        /* ---- SVG tree node states (persistent DOM, class-toggled per step) ---- */
        .edge { stroke: rgba(255,255,255,0.16); stroke-width: 3; transition: stroke 0.35s, stroke-width 0.35s; }
        .edge.descend { stroke: var(--accent-blue); stroke-width: 4; }
        .nc { fill: #0e1424; stroke: rgba(255,255,255,0.22); stroke-width: 3; transition: fill 0.35s, stroke 0.35s, stroke-width 0.35s; }
        .nl { fill: #cbd5e8; font-family: var(--mono); font-weight: 800; font-size: 15px; transition: fill 0.35s; }
        .node.current .nc { fill: rgba(168,85,247,0.20); stroke: var(--accent-purple); stroke-width: 5; }
        .node.current .nl { fill: #e9d5ff; }
        .node.balanced .nc { fill: rgba(34,197,94,0.16); stroke: var(--accent-green); stroke-width: 4; }
        .node.balanced .nl { fill: #bbf7d0; }
        .node.done .nc { fill: rgba(34,197,94,0.08); stroke: rgba(34,197,94,0.5); stroke-width: 3; }
        .node.done .nl { fill: #86efac; }
        .node.violation .nc { fill: rgba(244,63,94,0.2); stroke: var(--accent-red); stroke-width: 5; }
        .node.violation .nl { fill: #fecdd3; }
        /* height badge floating beside each node */
        .hbadge { opacity: 0; transition: opacity 0.35s; }
        .hbadge.show { opacity: 1; }
        .hbadge-bg { fill: rgba(245,165,36,0.18); stroke: var(--accent-orange); stroke-width: 1.5; }
        .hbadge-tx { fill: #ffd591; font-family: var(--mono); font-weight: 800; font-size: 11px; }
        .hbadge.violation .hbadge-bg { fill: rgba(244,63,94,0.22); stroke: var(--accent-red); }
        .hbadge.violation .hbadge-tx { fill: #fecdd3; }
        .pulse-ring { fill: none; stroke: var(--accent-purple); stroke-width: 2.5; opacity: 0; }
        .node.current .pulse-ring { animation: pulseRing 1.4s ease-out infinite; }

        @keyframes pulseRing { 0% { opacity: 0.7; r: 22; } 100% { opacity: 0; r: 34; } }
        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Tree (level order) =</label>
        <input type="text" id="tree-input" value="[1,2,3]" placeholder="[1,2,3]" maxlength="80">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">[1,2,3]</button>
        <button onclick="loadExample(1)">[1,2,2,3,null,null,3,4,null,null,4]</button>
        <button onclick="loadExample(2)">[]</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Balanced Binary Tree <span class="sub">&middot; Post-order DFS &middot; |h(L) &minus; h(R)| &le; 1 &middot; O(n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="tree-stage">
                    <svg id="tree-svg" class="tree-svg"></svg>
                </div>
                <div class="side-stage">
                    <div>
                        <div class="side-label stack"><span class="pip"></span> Recursion Stack</div>
                        <div class="stack-box" id="stack-box"></div>
                    </div>
                    <div>
                        <div class="side-label out"><span class="pip"></span> Subtree Heights</div>
                        <div class="heights-box" id="heights-box"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill c">current node <b id="st-node">&mdash;</b></span>
                            <span class="pill b">stack depth <b id="st-depth">0</b></span>
                            <span class="pill o">|diff| <b id="st-diff">&mdash;</b></span>
                            <span class="pill g">balanced <b id="st-bal">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ----- Motion engine (spring pop, zero deps) -----
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED || !el) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.4 + 0.66 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // ----- State -----
        let targetTree = null;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 720, 330];
        const nodeEls = {};   // node id -> <g> element

        // ----- Algorithm code panel -----
        const CODE = [
            [['kw','def '],['fn','dfs'],['src','(node):']],
            [['kw','  if '],['src','node is None:']],
            [['kw','    return '],['src','(True, 0)        '],['cm','# balanced, height 0']],
            [['fn','  lb'],['src',', lh = '],['fn','dfs'],['src','(node.left)    '],['cm','# left subtree']],
            [['fn','  rb'],['src',', rh = '],['fn','dfs'],['src','(node.right)   '],['cm','# right subtree']],
            [['src','  bal = lb '],['kw','and'],['src',' rb '],['kw','and'],['src',' abs(lh - rh) <= 1']],
            [['kw','  return '],['src','(bal, 1 + max(lh, rh))']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ----- Tree model -----
        class TreeNode {
            constructor(val, id) { this.val = val; this.left = null; this.right = null; this.id = id; }
        }
        function parseLevelOrder(str) {
            try {
                const arr = JSON.parse(str);
                if (!Array.isArray(arr) || arr.length === 0 || arr[0] === null) return null;
                const root = new TreeNode(arr[0], 'n0');
                let queue = [root], i = 1;
                while (queue.length && i < arr.length) {
                    const node = queue.shift();
                    if (i < arr.length && arr[i] !== null) { node.left = new TreeNode(arr[i], 'n' + i); queue.push(node.left); }
                    i++;
                    if (i < arr.length && arr[i] !== null) { node.right = new TreeNode(arr[i], 'n' + i); queue.push(node.right); }
                    i++;
                }
                return root;
            } catch (e) { return null; }
        }

        // ----- SVG tree, built ONCE per input-load -----
        const SVGNS = 'http://www.w3.org/2000/svg';
        const NODE_R = 21, V_GAP = 78;
        function buildTreeSVG(root) {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            Object.keys(nodeEls).forEach(k => delete nodeEls[k]);
            if (!root) {
                svg.setAttribute('viewBox', '0 0 200 120');
                svg.style.height = '120px';
                const t = document.createElementNS(SVGNS, 'text');
                t.setAttribute('x', 100); t.setAttribute('y', 64); t.setAttribute('text-anchor', 'middle');
                t.setAttribute('fill', '#4b5772'); t.setAttribute('font-family', 'monospace'); t.setAttribute('font-size', '13');
                t.textContent = '(empty tree)';
                svg.appendChild(t);
                return;
            }

            // recursive layout: left at x-dx, right at x+dx, shrink dx by 1.8 per depth
            const pos = {};
            let minX = Infinity, maxX = -Infinity, maxY = -Infinity;
            function assign(n, x, y, dx) {
                if (!n) return;
                pos[n.id] = { x, y };
                minX = Math.min(minX, x); maxX = Math.max(maxX, x); maxY = Math.max(maxY, y);
                assign(n.left, x - dx, y + V_GAP, dx / 1.8);
                assign(n.right, x + dx, y + V_GAP, dx / 1.8);
            }
            assign(root, 0, NODE_R + 8, 110);

            const pad = NODE_R + 22;
            const vbX = minX - pad, vbY = 0;
            const vbW = (maxX - minX) + pad * 2, vbH = maxY + NODE_R + pad;
            svg.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
            svg.style.height = Math.min(380, vbH) + 'px';
            svg.setAttribute('preserveAspectRatio', 'xMidYMin meet');

            // edges first (keyed by child id for descent highlight)
            function edges(n) {
                if (!n) return;
                const p = pos[n.id];
                [n.left, n.right].forEach(ch => {
                    if (!ch) return;
                    const cp = pos[ch.id];
                    const ln = document.createElementNS(SVGNS, 'line');
                    ln.setAttribute('class', 'edge'); ln.dataset.edge = ch.id;
                    ln.setAttribute('x1', p.x); ln.setAttribute('y1', p.y + NODE_R - 2);
                    ln.setAttribute('x2', cp.x); ln.setAttribute('y2', cp.y - NODE_R + 2);
                    svg.appendChild(ln);
                });
                edges(n.left); edges(n.right);
            }
            edges(root);

            // nodes as <g> with pulse-ring + circle + label + height badge
            function nodes(n) {
                if (!n) return;
                const p = pos[n.id];
                const g = document.createElementNS(SVGNS, 'g');
                g.setAttribute('class', 'node'); g.dataset.id = n.id;
                g.setAttribute('transform', `translate(${p.x} ${p.y})`);

                const ring = document.createElementNS(SVGNS, 'circle');
                ring.setAttribute('class', 'pulse-ring'); ring.setAttribute('r', NODE_R);
                g.appendChild(ring);

                const c = document.createElementNS(SVGNS, 'circle');
                c.setAttribute('class', 'nc'); c.setAttribute('r', NODE_R);
                g.appendChild(c);

                const t = document.createElementNS(SVGNS, 'text');
                t.setAttribute('class', 'nl'); t.setAttribute('text-anchor', 'middle');
                t.setAttribute('dy', '5.2'); t.textContent = n.val;
                g.appendChild(t);

                // height badge group (top-right of the node)
                const bg = document.createElementNS(SVGNS, 'g');
                bg.setAttribute('class', 'hbadge'); bg.dataset.badge = n.id;
                bg.setAttribute('transform', `translate(${NODE_R - 2} ${-NODE_R + 2})`);
                const br = document.createElementNS(SVGNS, 'rect');
                br.setAttribute('class', 'hbadge-bg'); br.setAttribute('x', -2); br.setAttribute('y', -10);
                br.setAttribute('width', 18); br.setAttribute('height', 16); br.setAttribute('rx', 5);
                bg.appendChild(br);
                const bt = document.createElementNS(SVGNS, 'text');
                bt.setAttribute('class', 'hbadge-tx'); bt.setAttribute('text-anchor', 'middle');
                bt.setAttribute('x', 7); bt.setAttribute('y', 2); bt.textContent = '';
                bg.appendChild(bt);
                g.appendChild(bg);

                svg.appendChild(g);
                nodeEls[n.id] = g;
                nodes(n.left); nodes(n.right);
            }
            nodes(root);
        }

        // ----- step generation (immutable snapshots) -----
        function generateSteps() {
            steps = [];
            const callStack = [];
            const heights = {};    // node id -> { h, bal } resolved so far
            let foundViolation = false;

            function label(node) { return node ? node.val : 'None'; }

            function snap(extra) {
                return Object.assign({
                    stack: callStack.slice(),
                    heights: JSON.parse(JSON.stringify(heights)),
                    currentId: null, descendEdge: null, violationId: null,
                    code: [], action: '', actionColor: 'var(--text-dim)',
                    diff: undefined, balanced: undefined
                }, extra);
            }

            steps.push(snap({
                code: [0],
                action: 'START', actionColor: 'var(--accent-blue)',
                panel: 'A tree is <b>height-balanced</b> when, for <i>every</i> node, <code>|height(left) &minus; height(right)| &le; 1</code>. We run a <b>post-order DFS</b> that returns each subtree height and bubbles it up.',
                log: 'init  dfs(root)  check |h(L) - h(R)| <= 1 everywhere'
            }));

            if (!targetTree) {
                steps.push(snap({
                    complete: true, confetti: true, code: [1, 2], answer: true,
                    action: '✓ balanced = true', actionColor: 'var(--accent-green)',
                    panel: 'The tree is <b>empty</b> (root is <code>None</code>). An empty tree is vacuously <b>balanced</b>.',
                    log: 'done  empty tree -> balanced = true'
                }));
                return;
            }

            function dfs(node, edgeId) {
                if (!node) {
                    steps.push(snap({
                        descendEdge: edgeId, code: [1, 2],
                        action: 'NULL → (true, 0)', actionColor: 'var(--accent-red)',
                        panel: 'Reached a <code>None</code> child &#8594; base case: return <code>(balanced=true, height=0)</code> to the caller.',
                        log: '  null child -> (true, 0)'
                    }));
                    return { b: true, h: 0 };
                }

                callStack.push('dfs(' + node.val + ')');
                steps.push(snap({
                    currentId: node.id, descendEdge: edgeId, code: [0],
                    action: 'ENTER ' + node.val, actionColor: 'var(--accent-purple)',
                    panel: 'Enter <code>dfs(' + node.val + ')</code>. Push its frame onto the recursion stack, then recurse into its <b>left</b> subtree first.',
                    log: 'call dfs(' + node.val + ')'
                }));

                steps.push(snap({
                    currentId: node.id, code: [3],
                    action: 'GO LEFT', actionColor: 'var(--accent-blue)',
                    panel: 'Recurse into the <b>left</b> child of <code>' + node.val + '</code> (' + label(node.left) + ') to measure its height.',
                    log: '  ' + node.val + ' -> recurse left'
                }));
                const left = dfs(node.left, node.left ? node.left.id : null);

                steps.push(snap({
                    currentId: node.id, code: [4],
                    action: 'GO RIGHT', actionColor: 'var(--accent-blue)',
                    panel: 'Left subtree of <code>' + node.val + '</code> has height <b>' + left.h + '</b>. Now recurse into its <b>right</b> child (' + label(node.right) + ').',
                    log: '  ' + node.val + ' -> recurse right  (lh=' + left.h + ')'
                }));
                const right = dfs(node.right, node.right ? node.right.id : null);

                const diff = Math.abs(left.h - right.h);
                const balanced = left.b && right.b && diff <= 1;
                const height = 1 + Math.max(left.h, right.h);
                heights[node.id] = { h: height, bal: balanced };
                const localViolation = (diff > 1) && left.b && right.b; // this node is the first offender
                if (!balanced && !foundViolation) foundViolation = true;

                steps.push(snap({
                    currentId: node.id, code: [5],
                    diff: diff, balanced: balanced,
                    violationId: localViolation ? node.id : null,
                    action: balanced ? ('|' + left.h + ' − ' + right.h + '| = ' + diff + ' ≤ 1 ✓')
                                     : ('|' + left.h + ' − ' + right.h + '| = ' + diff + (diff > 1 ? ' > 1 ✗' : ' ✗')),
                    actionColor: balanced ? 'var(--accent-green)' : 'var(--accent-red)',
                    panel: balanced
                        ? 'Compare children of <code>' + node.val + '</code>: <code>|' + left.h + ' &minus; ' + right.h + '| = ' + diff + '</code> &#8804; 1, and both subtrees are balanced &#8594; node <b>' + node.val + '</b> is <b style="color:var(--accent-green)">balanced</b>.'
                        : (localViolation
                            ? 'Compare children of <code>' + node.val + '</code>: <code>|' + left.h + ' &minus; ' + right.h + '| = ' + diff + '</code> &gt; 1 &#8594; node <b>' + node.val + '</b> <b style="color:var(--accent-red)">violates</b> the balance rule. The whole tree is <b>NOT balanced</b>.'
                            : 'A descendant of <code>' + node.val + '</code> was already unbalanced &#8594; <code>' + node.val + '</code> is <b style="color:var(--accent-red)">unbalanced</b> too; the false result propagates upward.'),
                    log: '  ' + node.val + ': |' + left.h + '-' + right.h + '|=' + diff + ' -> ' + (balanced ? 'balanced' : 'UNBALANCED')
                }));

                callStack.pop();
                steps.push(snap({
                    currentId: node.id, code: [6],
                    balanced: balanced, diff: diff,
                    violationId: localViolation ? node.id : null,
                    action: 'RETURN (' + balanced + ', ' + height + ')', actionColor: balanced ? 'var(--text-dim)' : 'var(--accent-red)',
                    panel: 'Pop <code>dfs(' + node.val + ')</code> and return <code>(' + balanced + ', height=' + height + ')</code> to its caller.',
                    log: '  return dfs(' + node.val + ') -> (' + balanced + ', ' + height + ')'
                }));

                return { b: balanced, h: height };
            }

            const res = dfs(targetTree, null);

            steps.push(snap({
                complete: true, confetti: res.b, code: [], answer: res.b,
                action: (res.b ? '✓ balanced = true' : '✗ balanced = false'),
                actionColor: res.b ? 'var(--accent-green)' : 'var(--accent-red)',
                panel: res.b
                    ? 'Every node satisfies <code>|h(L) &minus; h(R)| &le; 1</code> &#8594; the tree <b>is balanced</b>. Answer: <code>true</code>.'
                    : 'At least one node breaks <code>|h(L) &minus; h(R)| &le; 1</code> &#8594; the tree is <b>NOT balanced</b>. Answer: <code>false</code>.',
                log: 'done  isBalanced = ' + res.b
            }));
        }

        // ----- render (persistent DOM, pure fn of steps[idx]) -----
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            const heightIds = Object.keys(step.heights);
            const violationSet = new Set();
            // mark any node already known unbalanced as a violation tint once a violation has surfaced
            heightIds.forEach(id => { if (!step.heights[id].bal) violationSet.add(id); });

            // tree node + edge + badge classes (toggle only, never rebuild)
            Object.keys(nodeEls).forEach(id => {
                const g = nodeEls[id];
                const known = step.heights[id];
                const isCurrent = id === step.currentId;
                const isViolation = violationSet.has(id);

                g.classList.toggle('current', isCurrent && !isViolation);
                g.classList.toggle('violation', isViolation);
                // balanced highlight for the node just resolved as balanced
                g.classList.toggle('balanced', !!known && known.bal && isCurrent);
                // softer "done" green for previously-resolved balanced nodes
                g.classList.toggle('done', !!known && known.bal && !isCurrent);

                // height badge
                const badge = g.querySelector('.hbadge');
                if (badge) {
                    if (known) {
                        badge.classList.add('show');
                        badge.classList.toggle('violation', !known.bal);
                        badge.querySelector('.hbadge-tx').textContent = known.h;
                    } else {
                        badge.classList.remove('show', 'violation');
                    }
                }
            });
            document.querySelectorAll('.edge').forEach(e => e.classList.toggle('descend', e.dataset.edge === step.descendEdge));

            if (!REDUCED && step.currentId && nodeEls[step.currentId]) {
                const c = nodeEls[step.currentId].querySelector('.nc');
                if (c) Motion.pop(c);
            }

            // recursion stack
            const sb = document.getElementById('stack-box'); sb.innerHTML = '';
            if (step.stack.length === 0) {
                const e = document.createElement('div'); e.className = 'stack-empty'; e.textContent = '(empty)'; sb.appendChild(e);
            } else {
                step.stack.forEach((f, i) => {
                    const d = document.createElement('div');
                    d.className = 'stack-frame' + (i === step.stack.length - 1 ? ' active' : '');
                    d.textContent = f; sb.appendChild(d);
                });
            }

            // resolved subtree heights list
            const hb = document.getElementById('heights-box'); hb.innerHTML = '';
            if (heightIds.length === 0) {
                const e = document.createElement('div'); e.className = 'out-empty'; e.textContent = 'no subtree resolved yet'; hb.appendChild(e);
            } else {
                // show in resolution order (object insertion order is preserved)
                heightIds.forEach(id => {
                    const info = step.heights[id];
                    const lbl = nodeEls[id] ? nodeEls[id].querySelector('.nl').textContent : id;
                    const row = document.createElement('div');
                    row.className = 'height-row ' + (info.bal ? 'bal' : 'bad');
                    const a = document.createElement('span'); a.className = 'hnode'; a.textContent = 'node ' + lbl;
                    const b = document.createElement('span'); b.className = 'hval'; b.textContent = 'h=' + info.h + (info.bal ? '' : ' ✗');
                    row.appendChild(a); row.appendChild(b); hb.appendChild(row);
                });
            }

            // answer track + confetti (final)
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.complete && step.answer !== undefined) {
                const t = document.createElement('div');
                t.className = 'ans-tile ' + (step.answer ? 'yes' : 'no');
                t.textContent = step.answer ? 'balanced = true' : 'balanced = false';
                at.appendChild(t);
                Motion.pop(t);
            }

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete && step.answer === true);
            mp.classList.toggle('bad', !!step.complete && step.answer === false);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // state pills
            document.getElementById('st-node').textContent = step.currentId && nodeEls[step.currentId]
                ? nodeEls[step.currentId].querySelector('.nl').textContent : '—';
            document.getElementById('st-depth').textContent = step.stack.length;
            document.getElementById('st-diff').textContent = step.diff !== undefined ? step.diff : '—';
            document.getElementById('st-bal').textContent = step.balanced !== undefined ? String(step.balanced)
                : (step.complete ? String(step.answer) : '—');

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ----- controls -----
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function loadTree(str) {
            pause();
            const tree = parseLevelOrder(str);
            if (!tree && str.trim() !== '[]') { return false; }
            targetTree = tree;
            confettiArmed = true;
            buildTreeSVG(targetTree);
            generateSteps();
            renderStep(0);
            return true;
        }
        function loadCustom() {
            const str = (document.getElementById('tree-input').value || '').trim();
            if (!loadTree(str)) { /* keep current on invalid input */ }
        }
        const EXAMPLES = ['[1,2,3]', '[1,2,2,3,null,null,3,4,null,null,4]', '[]'];
        function loadExample(n) {
            document.getElementById('tree-input').value = EXAMPLES[n];
            loadTree(EXAMPLES[n]);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('tree-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });

        buildCodePanel();
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const exIdx = parseInt(params.get('example') || '0', 10);
            loadExample([0, 1, 2].includes(exIdx) ? exIdx : 0);
        };
    </script>
</body>
</html>
