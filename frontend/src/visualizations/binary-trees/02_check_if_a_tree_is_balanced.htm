<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check if Binary Tree is Balanced - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px;
            padding: 0 10px; width: 260px; font-size: 13px;
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px; display: flex; gap: 40px; flex-wrap: wrap;
            justify-content: center; max-width: 1150px; width: 100%;
        }

        .tree-container {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 20px; min-height: 380px; width: 520px;
        }
        .tree-svg { width: 100%; height: 340px; }

        .stack-container {
            display: flex; flex-direction: column-reverse; gap: 6px;
            width: 190px; height: 320px; border: 2px dashed var(--border-main);
            padding: 10px; background: rgba(22,27,34,0.5); overflow-y: auto;
            border-radius: 6px;
        }
        .stack-frame {
            width: 100%; padding: 9px 12px; background: var(--btn-bg);
            border: 1px solid var(--border-main); border-radius: 4px;
            font-family: monospace; font-size: 13px; text-align: center;
        }
        .stack-frame.active {
            background: #0d2244; border-color: var(--accent-blue);
            color: var(--accent-blue); transform: scale(1.05);
        }

        .info-area { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .height-box {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 12px 20px; width: 180px; text-align: center;
        }
        .result {
            font-size: 32px; font-weight: bold; font-family: monospace;
            padding: 12px 28px; border-radius: 8px; margin-top: 10px;
        }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 880px; min-height: 118px;
            font-family: monospace; font-size: 15px; line-height: 1.5;
        }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 10px; }
        .log-panel {
            margin-top: 15px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 880px; max-width: 90%;
            height: 135px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Tree:</label>
        <input type="text" id="tree-input" value="[1,2,3]" placeholder="[1,2,3]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(0)">Ex 1: Empty (root=None)</button>
        <button onclick="loadExample(1)">Ex 2: Balanced [1,2,3]</button>
        
    </div>

    <div class="visual-container">
        <div class="tree-area">
            <div class="ui-label" style="font-weight:bold;color:var(--accent-green)">Binary Tree</div>
            <div class="tree-container" id="tree-container">
                <svg id="tree-svg" class="tree-svg" viewBox="0 0 520 340"></svg>
            </div>
        </div>

        <div class="stack-area">
            <div class="ui-label" style="font-weight:bold;color:var(--accent-blue)">Recursion Stack</div>
            <div class="stack-container" id="stack-container"></div>
        </div>

        <div class="info-area">
            <div class="height-box"><div class="ui-label">Left Height</div><div id="left-height" style="font-size:26px;font-weight:bold;color:var(--accent-green)">—</div></div>
            <div class="height-box"><div class="ui-label">Right Height</div><div id="right-height" style="font-size:26px;font-weight:bold;color:var(--accent-green)">—</div></div>
            <div id="diff" style="font-size:19px;font-weight:bold;margin:10px 0;">Diff: —</div>
            <div id="result-box" class="result" style="background:#21262d;color:var(--text-dim)">—</div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Ready — Click <b>Play</b> or <b>Next</b></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <span class="ui-label" style="margin-left:10px">Speed</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let targetTree = null, steps = [], stepIndex = 0, timer = null;
        const delays = [1400, 700, 350];

        class TreeNode {
            constructor(val, id) { this.val = val; this.left = null; this.right = null; this.id = id; }
        }

        function parseLevelOrder(str) {
            try {
                const arr = JSON.parse(str.replace(/null/g, 'null'));
                if (!arr || arr.length === 0) return null;
                const root = new TreeNode(arr[0], 'n0');
                let q = [root], i = 1;
                while (q.length && i < arr.length) {
                    const node = q.shift();
                    if (i < arr.length && arr[i] !== null) { node.left = new TreeNode(arr[i], 'n'+i); q.push(node.left); }
                    i++;
                    if (i < arr.length && arr[i] !== null) { node.right = new TreeNode(arr[i], 'n'+i); q.push(node.right); }
                    i++;
                }
                return root;
            } catch(e) { return null; }
        }

        function buildTreeSVG(root) {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            if (!root) return;

            const pos = {};
            function assign(node, x, y, dx) {
                if (!node) return;
                pos[node.id] = {x, y};
                assign(node.left, x-dx, y+80, dx/1.8);
                assign(node.right, x+dx, y+80, dx/1.8);
            }
            assign(root, 260, 40, 110);

            // Edges + Nodes (same as before)
            function draw(node) {
                if (!node) return;
                const p = pos[node.id];

                if (node.left) {
                    const lp = pos[node.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y+21);
                    line.setAttribute("x2", lp.x); line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    draw(node.left);
                }
                if (node.right) {
                    const rp = pos[node.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y+21);
                    line.setAttribute("x2", rp.x); line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    draw(node.right);
                }

                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", p.x); c.setAttribute("cy", p.y+20); c.setAttribute("r", "21");
                c.setAttribute("fill", "#21262d"); c.setAttribute("stroke", "#555");
                c.setAttribute("stroke-width", "4"); c.setAttribute("id", node.id);
                g.appendChild(c);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", p.x); t.setAttribute("y", p.y+26);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", "#c9d1d9");
                t.setAttribute("font-size", "15"); t.setAttribute("font-weight", "bold");
                t.textContent = node.val;
                g.appendChild(t);
                svg.appendChild(g);

                draw(node.left); draw(node.right);
            }
            draw(root);
        }

        function highlightNode(id, status = 'active') {
            document.querySelectorAll('circle').forEach(c => {
                c.setAttribute('stroke', '#555'); c.setAttribute('stroke-width', '4');
            });
            const c = document.getElementById(id);
            if (c) {
                if (status === 'balanced') c.setAttribute('stroke', '#3fb950');
                else if (status === 'unbalanced') c.setAttribute('stroke', '#f85149');
                else c.setAttribute('stroke', '#58a6ff');
                c.setAttribute('stroke-width', '7');
            }
        }

        function generateSteps() {
            steps = []; let callStack = [];

            function add(type, panel, status, log, color, extra={}) {
                steps.push({type, stack:[...callStack], panel, statusText:status, log, logColor:color, ...extra});
            }

            function dfs(node) {
                if (!node) {
                    add('null', 'Null → <span style="color:var(--accent-green)">true, 0</span>', 'Base case', 'dfs(null) → true, 0', 'var(--accent-green)');
                    return {b:true, h:0};
                }

                callStack.push(`dfs(${node.id})`);
                add('call', `Entering <code>dfs(${node.id})</code>`, `Node ${node.id}`, `Call dfs(${node.id})`, 'var(--text-main)');

                const left = dfs(node.left);
                const right = dfs(node.right);

                const diff = Math.abs(left.h - right.h);
                const balanced = left.b && right.b && diff <= 1;

                add('check',
                    `Left: <b>${left.h}</b> | Right: <b>${right.h}</b><br>Diff = <b>${diff}</b> ${diff>1?'❌': '✅'}<br>${balanced?'<span style="color:var(--accent-green)">Balanced</span>':'<span style="color:var(--accent-red)">Unbalanced</span>'}`,
                    'Balance Check', `diff=${diff} → ${balanced}`, balanced?'var(--accent-green)':'var(--accent-red)',
                    {leftH:left.h, rightH:right.h, diff, balanced, nodeId:node.id});

                const height = 1 + Math.max(left.h, right.h);
                callStack.pop();
                add('return', `Return (balanced=${balanced}, height=${height})`, 'Returning', `Return ${balanced}, ${height}`, 'var(--text-dim)');

                return {b: balanced, h: height};
            }

            add('init', 'Starting Post-order DFS for Height-Balanced Check', 'Initialization', 'Starting...', 'var(--text-dim)');
            const res = dfs(targetTree);

            add('final',
                res.b ? '<span style="color:var(--accent-green);font-size:18px">✅ Tree is Balanced</span>' : '<span style="color:var(--accent-red);font-size:18px">❌ Tree is NOT Balanced</span>',
                'Final Result', `Final: ${res.b ? 'Balanced' : 'Unbalanced'}`, res.b ? 'var(--accent-green)' : 'var(--accent-red)',
                {complete:true, isBalanced: res.b});
        }

        function renderStep(idx) {
            const s = steps[idx];
            if (!s) return;

            // Stack
            const sc = document.getElementById('stack-container');
            sc.innerHTML = '';
            s.stack.forEach((f,i) => {
                const d = document.createElement('div');
                d.className = `stack-frame ${i===s.stack.length-1 ? 'active' : ''}`;
                d.textContent = f;
                sc.appendChild(d);
            });

            if (s.nodeId) highlightNode(s.nodeId, s.balanced ? 'balanced' : 'unbalanced');

            document.getElementById('left-height').textContent = s.leftH !== undefined ? s.leftH : '—';
            document.getElementById('right-height').textContent = s.rightH !== undefined ? s.rightH : '—';
            document.getElementById('diff').innerHTML = s.diff !== undefined ? `Diff: <b>${s.diff}</b>` : 'Diff: —';

            const rb = document.getElementById('result-box');
            if (s.complete) {
                rb.style.background = s.isBalanced ? '#0f2a1a' : '#3a1f1f';
                rb.style.color = s.isBalanced ? '#3fb950' : '#f85149';
                rb.textContent = s.isBalanced ? "BALANCED" : "UNBALANCED";
            } else if (s.balanced !== undefined) {
                rb.style.background = s.balanced ? '#0f2a1a' : '#3a1f1f';
                rb.style.color = s.balanced ? '#3fb950' : '#f85149';
                rb.textContent = s.balanced ? "BALANCED" : "UNBALANCED";
            } else rb.textContent = '—';

            document.getElementById('main-panel').innerHTML = s.panel;

            // Log
            const log = document.getElementById('log');
            log.innerHTML = '';
            for (let i=0; i<=idx; i++) {
                if (steps[i].log) {
                    const line = document.createElement('div');
                    line.style.color = steps[i].logColor || 'var(--text-main)';
                    line.textContent = steps[i].log;
                    log.appendChild(line);
                }
            }
            log.scrollTop = log.scrollHeight;
        }

        function next() { if (stepIndex < steps.length-1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex=0; renderStep(0); }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length-1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }
        function pause() {
            clearInterval(timer); timer = null;
            document.getElementById('play-btn').textContent = 'Play';
        }

        function loadExample(n) {
            const ex = ["[]", "[1,2,3]", "[1,2,2,3,null,null,3,4,null,null,4]"];
            document.getElementById('tree-input').value = ex[n];
            loadCustom();
        }

        function loadCustom() {
            targetTree = parseLevelOrder(document.getElementById('tree-input').value.trim());
            buildTreeSVG(targetTree);
            generateSteps();
            reset();
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
