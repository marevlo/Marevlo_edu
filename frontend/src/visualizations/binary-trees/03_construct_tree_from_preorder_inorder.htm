<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construct Binary Tree from Preorder & Inorder - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px;
            padding: 0 10px; width: 220px; font-size: 13px;
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px; display: flex; gap: 40px; flex-wrap: wrap;
            justify-content: center; max-width: 1200px; width: 100%;
        }

        .tree-container {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 20px; min-height: 380px; width: 520px;
        }
        .tree-svg { width: 100%; height: 340px; }

        .stack-container {
            display: flex; flex-direction: column-reverse; gap: 6px;
            width: 200px; height: 320px; border: 2px dashed var(--border-main);
            padding: 10px; background: rgba(22,27,34,0.5); overflow-y: auto;
            border-radius: 6px;
        }
        .stack-frame {
            width: 100%; padding: 8px 12px; background: var(--btn-bg);
            border: 1px solid var(--border-main); border-radius: 4px;
            font-family: monospace; font-size: 13px; text-align: center;
        }
        .stack-frame.active {
            background: #0d2244; border-color: var(--accent-blue);
            color: var(--accent-blue); transform: scale(1.05);
        }

        .info-panel {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 15px; width: 260px;
        }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 16px 22px; width: 900px; min-height: 110px;
            font-family: monospace; font-size: 15px; line-height: 1.5;
        }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 10px; }
        .log-panel {
            margin-top: 15px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 900px; max-width: 90%;
            height: 140px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Preorder:</label>
        <input type="text" id="pre-input" value="[3,9,20,15,7]">
        <label class="ui-label">Inorder:</label>
        <input type="text" id="in-input" value="[9,3,15,20,7]">
        <button onclick="loadCustom()">Build Tree</button>
        <button onclick="loadExample(0)">Ex 1: Standard</button>
        <button onclick="loadExample(1)">Ex 2: Single</button>
        <button onclick="loadExample(2)">Ex 3: Left Skewed</button>
    </div>

    <div class="visual-container">
        <!-- Tree -->
        <div>
            <div class="ui-label" style="font-weight:bold;color:var(--accent-green)">Constructed Binary Tree</div>
            <div class="tree-container" id="tree-container">
                <svg id="tree-svg" class="tree-svg" viewBox="0 0 520 340"></svg>
            </div>
        </div>

        <!-- Stack -->
        <div>
            <div class="ui-label" style="font-weight:bold;color:var(--accent-blue)">Recursion Stack</div>
            <div class="stack-container" id="stack-container"></div>
        </div>

        <!-- Info -->
        <div class="info-panel">
            <div><strong>Current Root:</strong> <span id="curr-root" style="color:var(--accent-orange)">—</span></div>
            <div><strong>Inorder Index:</strong> <span id="in-idx" style="color:var(--accent-purple)">—</span></div>
            <div><strong>Left Range:</strong> <span id="left-range" style="color:var(--accent-green)">—</span></div>
            <div><strong>Right Range:</strong> <span id="right-range" style="color:var(--accent-green)">—</span></div>
            <hr style="border-color:#30363d">
            <div style="margin-top:10px"><strong>Final Output:</strong></div>
            <div id="final-output" style="font-family:monospace; color:var(--accent-green); word-break:break-all"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Click <b>Build Tree</b> or <b>Play</b> to visualize recursive construction using Preorder + Inorder with HashMap.</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <span class="ui-label">Speed</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let targetPre = [], targetIn = [], inorderMap = {}, steps = [], stepIndex = 0, timer = null;
        let rootNode = null;
        const delays = [1600, 800, 400];

        class TreeNode {
            constructor(val, id) {
                this.val = val;
                this.left = null;
                this.right = null;
                this.id = id;
            }
        }

        function buildInorderMap(inorder) {
            inorderMap = {};
            for (let i = 0; i < inorder.length; i++) {
                inorderMap[inorder[i]] = i;
            }
        }

        function buildTreeSVG(node) {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            if (!node) return;

            const positions = {};
            function assign(n, x, y, dx) {
                if (!n) return;
                positions[n.id] = {x, y};
                assign(n.left, x - dx, y + 80, dx / 1.8);
                assign(n.right, x + dx, y + 80, dx / 1.8);
            }
            assign(node, 260, 40, 110);

            function drawEdges(n) {
                if (!n) return;
                const p = positions[n.id];
                if (n.left) {
                    const lp = positions[n.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y+21);
                    line.setAttribute("x2", lp.x); line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(n.left);
                }
                if (n.right) {
                    const rp = positions[n.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y+21);
                    line.setAttribute("x2", rp.x); line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(n.right);
                }
            }
            drawEdges(node);

            function drawNodes(n) {
                if (!n) return;
                const p = positions[n.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", p.x); c.setAttribute("cy", p.y+20); c.setAttribute("r", "22");
                c.setAttribute("fill", "#21262d"); c.setAttribute("stroke", "#555");
                c.setAttribute("stroke-width", "4"); c.setAttribute("id", n.id);
                g.appendChild(c);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", p.x); t.setAttribute("y", p.y+26);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", "#c9d1d9");
                t.setAttribute("font-size", "16"); t.setAttribute("font-weight", "bold");
                t.textContent = n.val;
                g.appendChild(t);

                svg.appendChild(g);
                drawNodes(n.left);
                drawNodes(n.right);
            }
            drawNodes(node);
        }

        function highlightNode(id) {
            document.querySelectorAll('circle').forEach(c => c.setAttribute('stroke', '#555'));
            const c = document.getElementById(id);
            if (c) {
                c.setAttribute('stroke', '#58a6ff');
                c.setAttribute('stroke-width', '7');
            }
        }

        function generateSteps() {
            steps = [];
            let preIndex = 0;
            let callStack = [];

            function addStep(type, panel, status, log, color, extra = {}) {
                steps.push({type, stack: [...callStack], panel, statusText: status, log, logColor: color, ...extra});
            }

            function build(preStart, preEnd, inStart, inEnd) {
                if (preStart > preEnd || inStart > inEnd) {
                    addStep('base', 'Empty range → return null', 'Base case', 'Return null', 'var(--accent-red)');
                    return null;
                }

                const rootVal = targetPre[preStart];
                const root = new TreeNode(rootVal, 'n' + preStart);
                const inIdx = inorderMap[rootVal];

                callStack.push(`build(${preStart},${preEnd},${inStart},${inEnd})`);
                addStep('call', `Root = ${rootVal} (pre[${preStart}])<br>Inorder index = ${inIdx}`, 
                       `Creating root ${rootVal}`, `Root = ${rootVal}, idx=${inIdx}`, 'var(--accent-orange)', {nodeId: root.id});

                // Left subtree
                addStep('left', `Left subtree: pre[${preStart+1}..${preStart + (inIdx - inStart)}]`, 
                       'Building left', `Left range`, 'var(--accent-green)');
                root.left = build(preStart + 1, preStart + (inIdx - inStart), inStart, inIdx - 1);

                // Right subtree
                addStep('right', `Right subtree: pre[${preStart + (inIdx - inStart) + 1}..${preEnd}]`, 
                       'Building right', `Right range`, 'var(--accent-green)');
                root.right = build(preStart + (inIdx - inStart) + 1, preEnd, inIdx + 1, inEnd);

                callStack.pop();
                addStep('return', `Subtree rooted at ${rootVal} complete`, 'Returning subtree', `Return node ${rootVal}`, 'var(--text-dim)');
                return root;
            }

            addStep('init', 'Starting recursive construction using Preorder + Inorder with HashMap', 
                   'Initialization', 'Building inorder map...', 'var(--text-dim)');

            rootNode = build(0, targetPre.length - 1, 0, targetIn.length - 1);

            addStep('final', `<span style="color:var(--accent-green)">Tree constructed successfully!</span><br>Level-order: ${levelOrder(rootNode)}`, 
                   'Complete', 'Final Tree', 'var(--accent-green)', {complete: true});
        }

        function levelOrder(root) {
            if (!root) return [];
            const res = [];
            const q = [root];
            while (q.length) {
                const node = q.shift();
                res.push(node.val);
                if (node.left) q.push(node.left);
                else if (q.length || node.right) res.push(null);
                if (node.right) q.push(node.right);
                else if (q.length) res.push(null);
            }
            // Clean trailing nulls
            while (res[res.length-1] === null) res.pop();
            return res;
        }

        function renderStep(idx) {
            const s = steps[idx];
            if (!s) return;

            // Stack
            const sc = document.getElementById('stack-container');
            sc.innerHTML = '';
            s.stack.forEach((f,i) => {
                const d = document.createElement('div');
                d.className = `stack-frame ${i === s.stack.length-1 ? 'active' : ''}`;
                d.textContent = f;
                sc.appendChild(d);
            });

            if (s.nodeId) highlightNode(s.nodeId);

            document.getElementById('curr-root').textContent = s.panel.includes('Root') ? 
                s.panel.match(/Root = (\d+)/)?.[1] || '—' : '—';
            document.getElementById('in-idx').textContent = s.panel.includes('index') ? 
                s.panel.match(/index = (\d+)/)?.[1] || '—' : '—';

            document.getElementById('main-panel').innerHTML = s.panel;

            // Log
            const logEl = document.getElementById('log');
            logEl.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                if (steps[i].log) {
                    const line = document.createElement('div');
                    line.style.color = steps[i].logColor || 'var(--text-main)';
                    line.textContent = steps[i].log;
                    logEl.appendChild(line);
                }
            }
            logEl.scrollTop = logEl.scrollHeight;

            if (s.complete) {
                document.getElementById('final-output').textContent = JSON.stringify(levelOrder(rootNode));
                buildTreeSVG(rootNode);
            }
        }

        function next() { if (stepIndex < steps.length-1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length-1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }
        function pause() {
            clearInterval(timer); timer = null;
            document.getElementById('play-btn').textContent = 'Play';
        }

        function loadExample(n) {
            const examples = [
                {pre: [3,9,20,15,7], in: [9,3,15,20,7]},
                {pre: [1], in: [1]},
                {pre: [1,2,3], in: [3,2,1]}
            ];
            document.getElementById('pre-input').value = JSON.stringify(examples[n].pre);
            document.getElementById('in-input').value = JSON.stringify(examples[n].in);
            loadCustom();
        }

        function loadCustom() {
            try {
                targetPre = JSON.parse(document.getElementById('pre-input').value);
                targetIn = JSON.parse(document.getElementById('in-input').value);
            } catch(e) {
                alert("Invalid array format");
                return;
            }
            buildInorderMap(targetIn);
            generateSteps();
            reset();
            buildTreeSVG(null);
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
