<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Level Order Traversal (BFS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px;
            padding: 0 10px; width: 280px; font-size: 13px;
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px; display: flex; gap: 40px; flex-wrap: wrap;
            justify-content: center; max-width: 1300px; width: 100%;
        }

        .tree-container {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 20px; min-height: 380px; width: 520px;
        }
        .tree-svg { width: 100%; height: 340px; }

        .queue-container {
            display: flex; gap: 8px; align-items: center;
            width: 420px; height: 120px; border: 2px dashed var(--border-main);
            padding: 12px; background: rgba(22,27,34,0.6); overflow-x: auto;
            border-radius: 8px;
        }
        .queue-node {
            min-width: 52px; height: 52px; background: #21262d;
            border: 2px solid #555; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
            font-size: 18px; color: var(--accent-blue);
        }
        .queue-node.active { border-color: var(--accent-green); transform: scale(1.15); }

        .output-container {
            display: flex; flex-wrap: wrap; gap: 8px; padding: 12px;
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; min-height: 80px; align-items: center; width: 380px;
        }
        .tile {
            background: var(--accent-orange); color: #000000;
            padding: 6px 14px; border-radius: 6px; font-weight: bold;
            font-size: 15px; min-width: 32px; text-align: center;
        }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 16px 22px; width: 900px; min-height: 110px;
            font-family: monospace; font-size: 15px; line-height: 1.5;
        }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 10px; }
        .log-panel {
            margin-top: 15px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 900px; max-width: 90%;
            height: 160px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label>Tree (Level Order):</label>
        <input type="text" id="tree-input" value="[1,2,3,4,5,null,7]">
        <button onclick="loadCustom()">Load Tree</button>
        <button onclick="loadExample(0)">Ex 1</button>
        <button onclick="loadExample(1)">Ex 2</button>
    </div>

    <div class="visual-container">
        <div>
            <div style="font-weight:bold;color:var(--accent-green)">Binary Tree</div>
            <div class="tree-container" id="tree-container">
                <svg id="tree-svg" class="tree-svg" viewBox="0 0 520 340"></svg>
            </div>
        </div>

        <div>
            <div style="font-weight:bold;color:var(--accent-blue)">BFS Queue</div>
            <div class="queue-container" id="queue-container"></div>
        </div>

        <div>
            <div style="font-weight:bold;color:var(--accent-orange)">Level Order Output</div>
            <div class="output-container" id="output-container"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Click Load then Play to visualize BFS Level Order Traversal using Queue</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <span>Speed</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let targetTree = null;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1550, 780, 380];
        let outputSequence = [];

        class TreeNode {
            constructor(val, id) {
                this.val = val;
                this.left = null;
                this.right = null;
                this.id = id;
            }
        }

        function parseLevelOrder(str) {
            try {
                let arr = JSON.parse(str.replace(/null/g, 'null'));
                if (!arr || arr.length === 0) return null;
                const root = new TreeNode(arr[0], 'n0');
                let queue = [root], i = 1;
                while (queue.length && i < arr.length) {
                    const node = queue.shift();
                    if (i < arr.length && arr[i] !== null) {
                        node.left = new TreeNode(arr[i], 'n' + i);
                        queue.push(node.left);
                    }
                    i++;
                    if (i < arr.length && arr[i] !== null) {
                        node.right = new TreeNode(arr[i], 'n' + i);
                        queue.push(node.right);
                    }
                    i++;
                }
                return root;
            } catch(e) { return null; }
        }

        function buildTreeSVG(root) {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            if (!root) return;

            const pos = {};
            function assign(n, x, y, dx) {
                if (!n) return;
                pos[n.id] = {x, y};
                assign(n.left, x - dx, y + 78, dx / 1.75);
                assign(n.right, x + dx, y + 78, dx / 1.75);
            }
            assign(root, 260, 40, 110);

            function drawEdges(n) {
                if (!n) return;
                const p = pos[n.id];
                if (n.left) {
                    const lp = pos[n.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 21);
                    line.setAttribute("x2", lp.x); line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(n.left);
                }
                if (n.right) {
                    const rp = pos[n.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 21);
                    line.setAttribute("x2", rp.x); line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(n.right);
                }
            }
            drawEdges(root);

            function drawNodes(n) {
                if (!n) return;
                const p = pos[n.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", p.x); c.setAttribute("cy", p.y + 20);
                c.setAttribute("r", "22"); c.setAttribute("fill", "#21262d");
                c.setAttribute("stroke", "#555"); c.setAttribute("stroke-width", "4");
                c.setAttribute("id", n.id);
                g.appendChild(c);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", p.x); t.setAttribute("y", p.y + 26);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", "#c9d1d9");
                t.setAttribute("font-size", "16"); t.setAttribute("font-weight", "bold");
                t.textContent = n.val;
                g.appendChild(t);
                svg.appendChild(g);
                drawNodes(n.left);
                drawNodes(n.right);
            }
            drawNodes(root);
        }

        function highlightNode(id) {
            document.querySelectorAll('circle').forEach(c => c.setAttribute('stroke', '#555'));
            const c = document.getElementById(id);
            if (c) {
                c.setAttribute('stroke', '#58a6ff');
                c.setAttribute('stroke-width', '7');
            }
        }

        function generateSteps() {
            steps = [];
            outputSequence = [];
            let queue = [];

            function addStep(type, panel, status, log, color, extra = {}) {
                steps.push({type, queue: [...queue], panel, statusText: status, log, logColor: color, ...extra});
            }

            if (!targetTree) {
                addStep('final', 'Empty tree', 'Done', 'No nodes', 'var(--accent-red)', {complete: true});
                return;
            }

            addStep('init', 'Starting BFS Level Order Traversal with Queue', 'Start', 'Queue initialized', 'var(--text-dim)');

            queue = [targetTree];
            addStep('enqueue', `Enqueued root <b>${targetTree.val}</b>`, 'Enqueue root', `Queue: [${targetTree.val}]`, 'var(--accent-blue)', {nodeId: targetTree.id});

            while (queue.length > 0) {
                const node = queue.shift();
                outputSequence.push(node.val);
                addStep('dequeue', `Dequeued <b>${node.val}</b>`, 'Dequeue & Process', `Processed ${node.val}`, 'var(--accent-green)', {nodeId: node.id});

                if (node.left) {
                    queue.push(node.left);
                    addStep('enqueue', `Enqueued left child <b>${node.left.val}</b>`, 'Enqueue left', `Enqueued ${node.left.val}`, 'var(--accent-orange)', {nodeId: node.left.id});
                }
                if (node.right) {
                    queue.push(node.right);
                    addStep('enqueue', `Enqueued right child <b>${node.right.val}</b>`, 'Enqueue right', `Enqueued ${node.right.val}`, 'var(--accent-orange)', {nodeId: node.right.id});
                }
            }

            addStep('final', `<span style="color:var(--accent-green);font-size:18px">✅ Level Order Complete: [${outputSequence.join(', ')}]</span>`, 
                   'Done', `Final sequence: [${outputSequence.join(', ')}]`, 'var(--accent-green)', {complete: true});
        }

        function renderStep(idx) {
            const s = steps[idx];
            if (!s) return;

            // Queue visualization
            const qc = document.getElementById('queue-container');
            qc.innerHTML = '';
            s.queue.forEach((node, i) => {
                const d = document.createElement('div');
                d.className = `queue-node ${i === 0 ? 'active' : ''}`;
                d.textContent = node.val;
                qc.appendChild(d);
            });

            if (s.nodeId) highlightNode(s.nodeId);

            // Output tiles
            const outContainer = document.getElementById('output-container');
            outContainer.innerHTML = '';
            outputSequence.forEach(val => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.textContent = val;
                outContainer.appendChild(tile);
            });

            document.getElementById('main-panel').innerHTML = s.panel;

            const logEl = document.getElementById('log');
            logEl.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                if (steps[i].log) {
                    const line = document.createElement('div');
                    line.style.color = steps[i].logColor || 'var(--text-main)';
                    line.textContent = steps[i].log;
                    logEl.appendChild(line);
                }
            }
            logEl.scrollTop = logEl.scrollHeight;
        }

        function next() { if (stepIndex < steps.length-1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length-1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }
        function pause() {
            clearInterval(timer); timer = null;
            document.getElementById('play-btn').textContent = 'Play';
        }

        function loadExample(n) {
            const examples = [
                "[1,2,3,4,5,null,7]",
                "[10,5,15,2,7,12,20]"
            ];
            document.getElementById('tree-input').value = examples[n];
            loadCustom();
        }

        function loadCustom() {
            targetTree = parseLevelOrder(document.getElementById('tree-input').value);
            buildTreeSVG(targetTree);
            generateSteps();
            reset();
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
