<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fault Propagation Tree - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-blue: #58a6ff;
            --accent-purple: #a371f7;
            --accent-orange: #e3b341;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px;
            padding: 0 10px; width: 280px; font-size: 13px;
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px; display: flex; gap: 50px; flex-wrap: wrap;
            justify-content: center; max-width: 1200px; width: 100%;
        }

        .tree-container {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 20px; min-height: 380px; width: 520px;
        }
        .tree-svg { width: 100%; height: 340px; background: #0a0e14; }

        .stack-area {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .stack-container {
            display: flex; flex-direction: column-reverse; gap: 6px;
            width: 210px; height: 320px; border: 2px dashed var(--border-main);
            padding: 10px; background: rgba(22,27,34,0.6); overflow-y: auto;
            border-radius: 6px;
        }
        .stack-frame {
            width: 100%; padding: 8px 12px; background: var(--btn-bg);
            border: 1px solid var(--border-main); border-radius: 4px;
            font-family: monospace; font-size: 13px; text-align: center;
        }
        .stack-frame.active {
            background: #0d2244; border-color: var(--accent-blue);
            color: var(--accent-blue); transform: scale(1.05);
        }

        .info-panel {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 16px; width: 260px;
        }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 16px 24px; width: 900px; min-height: 130px;
            font-family: monospace; font-size: 15px; line-height: 1.5;
        }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .log-panel {
            margin-top: 15px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 900px; max-width: 90%;
            height: 160px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label>Tree Edges (e.g. [[0,1,2],[0,2,3],[1,3,1]]):</label>
        <input type="text" id="edges-input" value="[[0,1,2],[0,2,3],[1,3,1]]" style="width:320px">
        <label>Root:</label>
        <input type="number" id="root-input" value="0" style="width:80px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(0)">Ex 1</button>
        <button onclick="loadExample(1)">Ex 2</button>
    </div>

    <div class="visual-container">
        <div>
            <div style="font-weight:bold;color:var(--accent-green);margin-bottom:8px">Fault Propagation Tree</div>
            <div class="tree-container">
                <svg id="tree-svg" class="tree-svg" viewBox="0 0 520 340"></svg>
            </div>
        </div>

        <div class="stack-area">
            <div style="font-weight:bold;color:var(--accent-blue);margin-bottom:8px">BFS Queue</div>
            <div class="stack-container" id="stack-container"></div>
        </div>

        <div class="info-panel">
            <div><strong>Current Time:</strong> <span id="curr-time" style="color:var(--accent-red);font-size:26px">0</span></div>
            <div><strong>Processing:</strong> <span id="curr-node" style="color:var(--accent-orange)">—</span></div>
            <div><strong>Max Time:</strong> <span id="max-time" style="color:var(--accent-purple)">—</span></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">BFS from root: Propagating fault times with delays</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="next()">Next →</button>
        <span class="ui-label">Speed</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let rootNode = null;
        let adj = {};
        let delays = {};
        let result = [];
        let steps = [], stepIndex = 0, timer = null;
        const delaysArr = [1300, 650, 300];
        let nodeMap = {};

        class TreeNode {
            constructor(val, id) {
                this.val = val;
                this.id = id;
                this.children = [];
            }
        }

        function buildTree(n, edgesList, root) {
            adj = {};
            delays = {};
            for (let i = 0; i < n; i++) adj[i] = [];
            edgesList.forEach(([u, v, d]) => {
                adj[u].push(v);
                delays[[u,v]] = d;
            });
            rootNode = new TreeNode(root, root);
            nodeMap = {};
            nodeMap[root] = rootNode;

            const queue = [rootNode];
            while (queue.length) {
                const node = queue.shift();
                for (let childVal of adj[node.val] || []) {
                    if (!nodeMap[childVal]) {
                        const child = new TreeNode(childVal, childVal);
                        node.children.push(child);
                        nodeMap[childVal] = child;
                        queue.push(child);
                    }
                }
            }
        }

        function buildTreeSVG() {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            if (!rootNode) return;

            const positions = {};
            function assign(node, x, y, dx) {
                if (!node) return;
                positions[node.id] = {x, y};
                const childCount = node.children.length;
                let startX = x - (dx * (childCount - 1)) / 2;
                for (let i = 0; i < childCount; i++) {
                    assign(node.children[i], startX + i * dx, y + 85, dx * 0.75);
                }
            }
            assign(rootNode, 260, 40, 110);

            function drawEdges(node) {
                if (!node) return;
                const p = positions[node.id];
                node.children.forEach(child => {
                    const cp = positions[child.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 22);
                    line.setAttribute("x2", cp.x); line.setAttribute("y2", cp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3.5");
                    line.setAttribute("id", `e${node.id}-${child.id}`);
                    svg.appendChild(line);
                    drawEdges(child);
                });
            }
            drawEdges(rootNode);

            function drawNodes(node) {
                if (!node) return;
                const p = positions[node.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", p.x); c.setAttribute("cy", p.y + 20);
                c.setAttribute("r", "23"); c.setAttribute("fill", "#21262d");
                c.setAttribute("stroke", "#555"); c.setAttribute("stroke-width", "4");
                c.setAttribute("id", `n${node.id}`);
                g.appendChild(c);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", p.x); t.setAttribute("y", p.y + 26);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", "#c9d1d9");
                t.setAttribute("font-size", "15"); t.setAttribute("font-weight", "bold");
                t.textContent = node.val;
                g.appendChild(t);
                svg.appendChild(g);

                node.children.forEach(drawNodes);
            }
            drawNodes(rootNode);
        }

        function highlightNode(id, color) {
            const c = document.getElementById(`n${id}`);
            if (c) {
                c.setAttribute('stroke', color);
                c.setAttribute('stroke-width', '8');
            }
        }

        function generateSteps() {
            steps = [];
            result = new Array(Object.keys(adj).length).fill(0);
            let queue = [{node: 0, time: 0}];
            let visited = new Set([0]);

            function addStep(panel, log, color, extra={}) {
                steps.push({panel, log, logColor: color, ...extra});
            }

            addStep(`Start BFS from root <b>${0}</b>`, `Root time = 0`, 'var(--accent-orange)');

            let idx = 0;
            while (queue.length) {
                const front = queue.shift();
                const curr = front.node;
                const currTime = front.time;
                result[curr] = currTime;

                addStep(`Process node <b>${curr}</b> at time <b>${currTime}</b>`, 
                       `Affected time for ${curr} = ${currTime}`, 'var(--accent-blue)', 
                       {node: curr, time: currTime, queueState: [...queue]});

                highlightNode(curr, '#3fb950');

                for (let child of adj[curr] || []) {
                    if (!visited.has(child)) {
                        const d = delays[[curr, child]] || 0;
                        const childTime = currTime + d;
                        queue.push({node: child, time: childTime});
                        visited.add(child);
                        addStep(`Propagate to child <b>${child}</b>`, 
                               `Delay ${d} → time ${childTime}`, 'var(--accent-purple)', 
                               {node: child, time: childTime});
                    }
                }
            }

            addStep(`<span style="color:var(--accent-green);font-size:18px">✅ Final Affected Times: [${result.join(', ')}]</span>`, 
                   `Completed in ${visited.size} steps`, 'var(--accent-green)', {complete: true});
        }

        function renderStep(idx) {
            const s = steps[idx];
            if (!s) return;

            buildTreeSVG();
            if (s.node !== undefined) highlightNode(s.node, '#f85149');

            document.getElementById('curr-time').textContent = s.time !== undefined ? s.time : 0;
            document.getElementById('main-panel').innerHTML = s.panel;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.color = steps[i].logColor || 'var(--text-main)';
                line.textContent = steps[i].log;
                logPanel.appendChild(line);
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() { if (stepIndex < steps.length-1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = '⏸ Pause';
                if (stepIndex >= steps.length-1) stepIndex = 0;
                timer = setInterval(() => {
                    if (stepIndex < steps.length-1) next();
                    else pause();
                }, delaysArr[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            if (timer) clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = '▶ Play';
        }

        function loadExample(n) {
            const examples = [
                {edges: "[[0,1,2],[0,2,3],[1,3,1]]", root: 0},
                {edges: "[[0,1,1],[0,2,2],[1,3,3],[2,4,1]]", root: 0}
            ];
            document.getElementById('edges-input').value = examples[n].edges;
            document.getElementById('root-input').value = examples[n].root;
            loadCustom();
        }

        function loadCustom() {
            try {
                const edgesStr = document.getElementById('edges-input').value;
                const edges = JSON.parse(edgesStr);
                const root = parseInt(document.getElementById('root-input').value);
                const n = Math.max(...edges.flat()) + 1;

                buildTree(n, edges, root);
                buildTreeSVG();
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid input. Use format like [[0,1,2],[0,2,3]]");
            }
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
