<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lowest Common Ancestor (LCA) in Binary Tree - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px;
            padding: 0 10px; width: 220px; font-size: 13px;
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px; display: flex; gap: 40px; flex-wrap: wrap;
            justify-content: center; max-width: 1300px; width: 100%;
        }

        .tree-container {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 20px; min-height: 380px; width: 520px;
        }
        .tree-svg { width: 100%; height: 340px; }

        .stack-container {
            display: flex; flex-direction: column-reverse; gap: 6px;
            width: 220px; height: 320px; border: 2px dashed var(--border-main);
            padding: 10px; background: rgba(22,27,34,0.5); overflow-y: auto;
            border-radius: 6px;
        }
        .stack-frame {
            width: 100%; padding: 8px 12px; background: var(--btn-bg);
            border: 1px solid var(--border-main); border-radius: 4px;
            font-family: monospace; font-size: 13px; text-align: center;
        }
        .stack-frame.active {
            background: #0d2244; border-color: var(--accent-blue);
            color: var(--accent-blue); transform: scale(1.05);
        }

        .info-panel {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 15px; width: 300px;
        }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 16px 22px; width: 900px; min-height: 130px;
            font-family: monospace; font-size: 15px; line-height: 1.5;
        }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 10px; }
        .log-panel {
            margin-top: 15px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 900px; max-width: 90%;
            height: 160px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label>Tree (Level Order):</label>
        <input type="text" id="tree-input" value="[3,5,1,6,2,0,8,null,null,7,4]">
        <label>p:</label>
        <input type="text" id="p-input" value="5" style="width:80px">
        <label>q:</label>
        <input type="text" id="q-input" value="1" style="width:80px">
        <button onclick="loadCustom()">Build &amp; Find LCA</button>
        <button onclick="loadExample(0)">Ex 1: p=5, q=1</button>
        <button onclick="loadExample(1)">Ex 2: p=5, q=4</button>
    </div>

    <div class="visual-container">
        <div>
            <div style="font-weight:bold;color:var(--accent-green)">Binary Tree</div>
            <div class="tree-container" id="tree-container">
                <svg id="tree-svg" class="tree-svg" viewBox="0 0 520 340"></svg>
            </div>
        </div>

        <div>
            <div style="font-weight:bold;color:var(--accent-blue)">Recursion Stack</div>
            <div class="stack-container" id="stack-container"></div>
        </div>

        <div class="info-panel">
            <div><strong>Current Node:</strong> <span id="curr-node" style="color:var(--accent-orange)">—</span></div>
            <div><strong>Left Result:</strong> <span id="left-res" style="color:var(--accent-purple)">—</span></div>
            <div><strong>Right Result:</strong> <span id="right-res" style="color:var(--accent-purple)">—</span></div>
            <hr style="border-color:#30363d">
            <div><strong>LCA Found:</strong> <span id="lca-result" style="font-size:22px;color:var(--accent-green);font-weight:bold">—</span></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Click Build then Play to visualize Recursive Post-Order LCA (O(n))</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <span class="ui-label">Speed</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let targetTree = null, pNode = null, qNode = null;
        let steps = [], stepIndex = 0, timer = null;
        const delays = [1600, 850, 420];
        let rootNode = null;

        class TreeNode {
            constructor(val, id) {
                this.val = val;
                this.left = null;
                this.right = null;
                this.id = id;
            }
        }

        function parseLevelOrder(str) {
            try {
                let arr = JSON.parse(str.replace(/null/g, 'null'));
                if (!arr || arr.length === 0) return null;
                const root = new TreeNode(arr[0], 'n0');
                let queue = [root], i = 1;
                while (queue.length && i < arr.length) {
                    const node = queue.shift();
                    if (i < arr.length && arr[i] !== null) {
                        node.left = new TreeNode(arr[i], 'n'+i);
                        queue.push(node.left);
                    }
                    i++;
                    if (i < arr.length && arr[i] !== null) {
                        node.right = new TreeNode(arr[i], 'n'+i);
                        queue.push(node.right);
                    }
                    i++;
                }
                return root;
            } catch(e) { return null; }
        }

        function buildTreeSVG(root) {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            if (!root) return;

            const pos = {};
            function assign(n, x, y, dx) {
                if (!n) return;
                pos[n.id] = {x, y};
                assign(n.left, x - dx, y + 78, dx / 1.75);
                assign(n.right, x + dx, y + 78, dx / 1.75);
            }
            assign(root, 260, 40, 110);

            function drawEdges(n) {
                if (!n) return;
                const p = pos[n.id];
                if (n.left) {
                    const lp = pos[n.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 21);
                    line.setAttribute("x2", lp.x); line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(n.left);
                }
                if (n.right) {
                    const rp = pos[n.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 21);
                    line.setAttribute("x2", rp.x); line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(n.right);
                }
            }
            drawEdges(root);

            function drawNodes(n) {
                if (!n) return;
                const p = pos[n.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", p.x); c.setAttribute("cy", p.y + 20);
                c.setAttribute("r", "22"); c.setAttribute("fill", "#21262d");
                c.setAttribute("stroke", "#555"); c.setAttribute("stroke-width", "4");
                c.setAttribute("id", n.id);
                g.appendChild(c);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", p.x); t.setAttribute("y", p.y + 26);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", "#c9d1d9");
                t.setAttribute("font-size", "16"); t.setAttribute("font-weight", "bold");
                t.textContent = n.val;
                g.appendChild(t);
                svg.appendChild(g);
                drawNodes(n.left);
                drawNodes(n.right);
            }
            drawNodes(root);
        }

        function highlightNode(id, color = '#58a6ff') {
            document.querySelectorAll('circle').forEach(c => c.setAttribute('stroke', '#555'));
            const c = document.getElementById(id);
            if (c) {
                c.setAttribute('stroke', color);
                c.setAttribute('stroke-width', '8');
            }
        }

        function generateSteps() {
            steps = [];
            let callStack = [];

            function addStep(type, panel, status, log, color, extra = {}) {
                steps.push({type, stack: [...callStack], panel, statusText: status, log, logColor: color, ...extra});
            }

            function lca(node, p, q) {
                if (!node) {
                    addStep('base', 'Null node → return null', 'Base', 'Return null', 'var(--accent-red)');
                    return null;
                }

                callStack.push(`lca(${node.val})`);
                addStep('call', `At node <b>${node.val}</b>`, `Visiting`, `lca(${node.val})`, 'var(--text-main)', {nodeId: node.id});

                const left = lca(node.left, p, q);
                const right = lca(node.right, p, q);

                if (node === p || node === q) {
                    addStep('found', `Node <b>${node.val}</b> matches one of targets`, 'Match', `Found ${node.val}`, 'var(--accent-green)', {nodeId: node.id});
                    if (left && right) {
                        addStep('lca', `Both subtrees contain targets → <b>${node.val}</b> is LCA`, 'LCA Found', `LCA = ${node.val}`, 'var(--accent-purple)', {nodeId: node.id, isLCA: true});
                        callStack.pop();
                        return node;
                    }
                    callStack.pop();
                    return node;
                }

                if (left && right) {
                    addStep('lca', `Left and Right both non-null → <b>${node.val}</b> is LCA`, 'LCA Found', `LCA = ${node.val}`, 'var(--accent-purple)', {nodeId: node.id, isLCA: true});
                    callStack.pop();
                    return node;
                }

                callStack.pop();
                return left || right;
            }

            addStep('init', 'Starting Recursive Post-Order LCA Search', 'Start', 'DFS begins...', 'var(--text-dim)');

            const result = lca(targetTree, pNode, qNode);

            addStep('final', `<span style="color:var(--accent-green);font-size:20px">✅ LCA is <b>${result ? result.val : 'null'}</b></span>`, 
                   'Complete', `Lowest Common Ancestor: ${result ? result.val : 'null'}`, 'var(--accent-green)', {complete: true, lcaNode: result});
        }

        function renderStep(idx) {
            const s = steps[idx];
            if (!s) return;

            const sc = document.getElementById('stack-container');
            sc.innerHTML = '';
            s.stack.forEach((f,i) => {
                const d = document.createElement('div');
                d.className = `stack-frame ${i === s.stack.length-1 ? 'active' : ''}`;
                d.textContent = f;
                sc.appendChild(d);
            });

            if (s.nodeId) highlightNode(s.nodeId, s.isLCA ? '#ff9f1c' : '#58a6ff');

            document.getElementById('curr-node').textContent = s.nodeId ? targetTree.val : '—'; // simplified
            document.getElementById('main-panel').innerHTML = s.panel;

            const logEl = document.getElementById('log');
            logEl.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                if (steps[i].log) {
                    const line = document.createElement('div');
                    line.style.color = steps[i].logColor || 'var(--text-main)';
                    line.textContent = steps[i].log;
                    logEl.appendChild(line);
                }
            }
            logEl.scrollTop = logEl.scrollHeight;

            if (s.complete) {
                const lcaVal = s.lcaNode ? s.lcaNode.val : 'null';
                document.getElementById('lca-result').textContent = lcaVal;
                highlightNode(s.lcaNode ? s.lcaNode.id : '', '#ff9f1c');
            }
        }

        function next() { if (stepIndex < steps.length-1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length-1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }
        function pause() {
            clearInterval(timer); timer = null;
            document.getElementById('play-btn').textContent = 'Play';
        }

        function findNode(root, val) {
            if (!root) return null;
            if (root.val === val) return root;
            return findNode(root.left, val) || findNode(root.right, val);
        }

        function loadExample(n) {
            const examples = [
                {tree: [3,5,1,6,2,0,8,null,null,7,4], p:5, q:1},
                {tree: [3,5,1,6,2,0,8,null,null,7,4], p:5, q:4}
            ];
            document.getElementById('tree-input').value = JSON.stringify(examples[n].tree);
            document.getElementById('p-input').value = examples[n].p;
            document.getElementById('q-input').value = examples[n].q;
            loadCustom();
        }

        function loadCustom() {
            targetTree = parseLevelOrder(document.getElementById('tree-input').value);
            const pVal = parseInt(document.getElementById('p-input').value);
            const qVal = parseInt(document.getElementById('q-input').value);
            pNode = findNode(targetTree, pVal);
            qNode = findNode(targetTree, qVal);

            buildTreeSVG(targetTree);
            generateSteps();
            reset();
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
