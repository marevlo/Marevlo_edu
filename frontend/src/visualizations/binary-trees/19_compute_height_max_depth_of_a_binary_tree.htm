<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compute Height / Max Depth - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }
        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px;
            padding: 0 10px; width: 280px; font-size: 13px;
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px; display: flex; gap: 40px; flex-wrap: wrap;
            justify-content: center; max-width: 1350px; width: 100%;
        }
        .tree-container {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 20px; min-height: 380px; width: 520px;
        }
        .tree-svg { width: 100%; height: 340px; }

        .stack-container {
            display: flex; flex-direction: column; gap: 6px;
            width: 240px; height: 340px; border: 2px dashed var(--border-main);
            padding: 12px; background: rgba(22,27,34,0.6); overflow-y: auto;
            border-radius: 6px; font-family: monospace;
        }
        .stack-frame {
            padding: 8px 12px; background: var(--btn-bg);
            border: 1px solid var(--border-main); border-radius: 4px;
            font-size: 13px;
        }
        .stack-frame.active { background: #0d2244; border-color: var(--accent-blue); color: var(--accent-blue); }

        .info-panel {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 16px; width: 320px; min-height: 160px;
        }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 16px 22px; width: 920px; min-height: 110px;
            font-family: monospace; font-size: 15px;
        }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 12px; }
        .log-panel {
            margin-top: 15px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 920px; max-width: 90%;
            height: 160px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label>Tree (Level Order):</label>
        <input type="text" id="tree-input" value="[1,2,3]">
        <button onclick="loadCustom()">Load Tree</button>
        <button onclick="loadExample(0)">Ex 1 (Height 2)</button>
        <button onclick="loadExample(1)">Ex 2 (Height 3)</button>
    </div>

    <div class="visual-container">
        <div>
            <div style="font-weight:bold;color:var(--accent-green);margin-bottom:8px">Binary Tree</div>
            <div class="tree-container">
                <svg id="tree-svg" class="tree-svg" viewBox="0 0 520 340"></svg>
            </div>
        </div>

        <div>
            <div style="font-weight:bold;color:var(--accent-blue);margin-bottom:8px">Recursion Stack (with return values)</div>
            <div class="stack-container" id="stack-container"></div>
        </div>

        <div class="info-panel">
            <div style="font-weight:bold;color:var(--accent-purple);margin-bottom:8px">Result</div>
            <div id="result" style="font-size:42px;font-weight:bold;color:var(--accent-green);text-align:center;margin:20px 0;">—</div>
            <div id="height-desc" style="font-size:14px;color:var(--text-dim);text-align:center"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Load a tree and click Play to see recursive height computation</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="next()">Next →</button>
        <label>Speed <input type="range" id="speed-slider" min="0" max="2" value="1"></label>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let rootNode = null;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 750, 350];

        class TreeNode {
            constructor(val, id) {
                this.val = val;
                this.left = null;
                this.right = null;
                this.id = id;
            }
        }

        function parseLevelOrder(str) {
            try {
                let tokens = str.replace(/\s/g,'').replace(/null/g,'null');
                let arr = JSON.parse(tokens);
                if (!arr || arr.length === 0) return null;
                const root = new TreeNode(arr[0], 'n0');
                let q = [root], idx = 1;
                while (q.length && idx < arr.length) {
                    const curr = q.shift();
                    if (idx < arr.length && arr[idx] !== null) {
                        curr.left = new TreeNode(arr[idx], 'n'+idx);
                        q.push(curr.left);
                    }
                    idx++;
                    if (idx < arr.length && arr[idx] !== null) {
                        curr.right = new TreeNode(arr[idx], 'n'+idx);
                        q.push(curr.right);
                    }
                    idx++;
                }
                return root;
            } catch(e) { console.error(e); return null; }
        }

        function buildTreeSVG(root) {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            if (!root) return;

            const positions = {};
            function assignPos(node, x, y, dx) {
                if (!node) return;
                positions[node.id] = {x, y};
                assignPos(node.left, x - dx, y + 78, dx * 0.62);
                assignPos(node.right, x + dx, y + 78, dx * 0.62);
            }
            assignPos(root, 260, 35, 115);

            function drawEdge(n) {
                if (!n) return;
                const p = positions[n.id];
                if (n.left) {
                    const lp = positions[n.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 22);
                    line.setAttribute("x2", lp.x); line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3.5");
                    svg.appendChild(line);
                    drawEdge(n.left);
                }
                if (n.right) {
                    const rp = positions[n.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 22);
                    line.setAttribute("x2", rp.x); line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3.5");
                    svg.appendChild(line);
                    drawEdge(n.right);
                }
            }
            drawEdge(root);

            function drawNode(n) {
                if (!n) return;
                const p = positions[n.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", p.x); circle.setAttribute("cy", p.y + 20);
                circle.setAttribute("r", "23"); circle.setAttribute("fill", "#21262d");
                circle.setAttribute("stroke", "#555"); circle.setAttribute("stroke-width", "4");
                circle.setAttribute("id", n.id);
                g.appendChild(circle);

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", p.x); text.setAttribute("y", p.y + 26);
                text.setAttribute("text-anchor", "middle"); text.setAttribute("fill", "#c9d1d9");
                text.setAttribute("font-size", "15"); text.setAttribute("font-weight", "700");
                text.textContent = n.val;
                g.appendChild(text);

                svg.appendChild(g);
                drawNode(n.left);
                drawNode(n.right);
            }
            drawNode(root);
        }

        function highlightNode(id, color = '#58a6ff', width = 7) {
            document.querySelectorAll('circle').forEach(c => {
                c.setAttribute('stroke', '#555');
                c.setAttribute('stroke-width', '4');
            });
            const c = document.getElementById(id);
            if (c) {
                c.setAttribute('stroke', color);
                c.setAttribute('stroke-width', width);
            }
        }

        function generateSteps() {
            steps = [];
            let callId = 0;

            function addStep(type, nodeId, currentHeight, panelHTML, logText, color) {
                steps.push({
                    type, nodeId, height: currentHeight, panel: panelHTML,
                    log: logText, logColor: color || 'var(--text-main)'
                });
            }

            function computeHeight(node, depth = 0) {
                if (!node) {
                    addStep('base', null, 0,
                        `Base case: <b>null</b> → height = <b>0</b>`,
                        `null → return 0`, 'var(--accent-red)');
                    return 0;
                }

                const thisId = node.id;
                callId++;
                addStep('call', thisId, null,
                    `Calling height(<b>${node.val}</b>)`,
                    `Enter node ${node.val}`, 'var(--accent-orange)');

                const leftH = computeHeight(node.left, depth + 1);
                const rightH = computeHeight(node.right, depth + 1);

                const myHeight = 1 + Math.max(leftH, rightH);

                addStep('return', thisId, myHeight,
                    `Node <b>${node.val}</b>: left=${leftH}, right=${rightH} → <b>${myHeight}</b>`,
                    `Return ${myHeight} from ${node.val}`, 'var(--accent-green)');

                return myHeight;
            }

            addStep('init', null, null, `Starting recursive height computation on root`, 'Begin DFS', 'var(--text-dim)');

            const finalHeight = computeHeight(rootNode);

            addStep('final', null, finalHeight,
                `<span style="font-size:28px;color:var(--accent-green)">✅ Tree Height = <b>${finalHeight}</b></span>`,
                `Final Height: ${finalHeight}`, 'var(--accent-green)');
        }

        function renderStep(idx) {
            if (idx < 0 || idx >= steps.length) return;
            const s = steps[idx];

            // Stack visualization
            const stackDiv = document.getElementById('stack-container');
            stackDiv.innerHTML = '';
            // Show active path by scanning previous steps
            let currentPath = [];
            for (let i = 0; i <= idx; i++) {
                if (steps[i].type === 'call' && steps[i].nodeId) currentPath.push(steps[i]);
                if (steps[i].type === 'return' && steps[i].nodeId) currentPath.pop();
            }
            currentPath.forEach((callStep, i) => {
                const frame = document.createElement('div');
                frame.className = `stack-frame ${i === currentPath.length-1 ? 'active' : ''}`;
                frame.innerHTML = `<b>${callStep.nodeId ? document.getElementById(callStep.nodeId).parentNode.querySelector('text').textContent : ''}</b>`;
                stackDiv.appendChild(frame);
            });

            if (s.nodeId) highlightNode(s.nodeId, s.type === 'return' ? '#3fb950' : '#58a6ff');

            document.getElementById('main-panel').innerHTML = s.panel;

            // Log
            const logContainer = document.getElementById('log');
            logContainer.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.color = steps[i].logColor;
                line.textContent = `▶ ${steps[i].log}`;
                logContainer.appendChild(line);
            }
            logContainer.scrollTop = logContainer.scrollHeight;

            // Final result
            if (s.type === 'final') {
                document.getElementById('result').textContent = s.height;
                document.getElementById('height-desc').textContent = `Maximum depth from root to deepest leaf`;
            }
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }
        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }
        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) {
                pause();
            } else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }
        function pause() {
            if (timer) clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = '▶ Play';
        }

        function loadExample(n) {
            const ex = [
                {tree: "[1,2,3]", desc: "Height = 2"},
                {tree: "[1,2,3,4,null,null,null]", desc: "Height = 3"}
            ];
            document.getElementById('tree-input').value = ex[n].tree;
            loadCustom();
        }

        function loadCustom() {
            rootNode = parseLevelOrder(document.getElementById('tree-input').value);
            if (!rootNode) return alert("Invalid tree input");
            buildTreeSVG(rootNode);
            generateSteps();
            stepIndex = 0;
            renderStep(0);
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
