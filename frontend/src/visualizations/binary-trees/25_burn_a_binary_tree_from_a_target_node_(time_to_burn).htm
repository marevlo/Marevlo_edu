<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burn Binary Tree from Target Node - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px;
            padding: 0 10px; width: 280px; font-size: 13px;
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px; display: flex; gap: 50px; flex-wrap: wrap;
            justify-content: center; max-width: 1200px; width: 100%;
        }

        .tree-container {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 20px; min-height: 380px; width: 520px;
        }
        .tree-svg { width: 100%; height: 340px; }

        .stack-area {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .stack-container {
            display: flex; flex-direction: column-reverse; gap: 6px;
            width: 200px; height: 320px; border: 2px dashed var(--border-main);
            padding: 10px; background: rgba(22,27,34,0.5); overflow-y: auto;
            border-radius: 6px;
        }
        .stack-frame {
            width: 100%; padding: 8px 12px; background: var(--btn-bg);
            border: 1px solid var(--border-main); border-radius: 4px;
            font-family: monospace; font-size: 13px; text-align: center;
        }
        .stack-frame.active {
            background: #0d2244; border-color: var(--accent-blue);
            color: var(--accent-blue); transform: scale(1.05);
        }

        .info-panel {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 16px; width: 260px;
        }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 16px 24px; width: 900px; min-height: 120px;
            font-family: monospace; font-size: 15px; line-height: 1.5;
        }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 12px; }
        .log-panel {
            margin-top: 15px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 900px; max-width: 90%;
            height: 150px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Tree:</label>
        <input type="text" id="tree-input" value="[1,2,null,3,null,null,null,4]" style="width:280px">
        <label class="ui-label">Target:</label>
        <input type="number" id="target-input" value="4">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(0)">Ex 1</button>
        <button onclick="loadExample(1)">Ex 2 (Skewed)</button>
        <button onclick="loadExample(2)">Ex 3</button>
    </div>

    <div class="visual-container">
        <div>
            <div class="ui-label" style="font-weight:bold;color:var(--accent-green)">Binary Tree</div>
            <div class="tree-container" id="tree-container">
                <svg id="tree-svg" class="tree-svg" viewBox="0 0 520 340"></svg>
            </div>
        </div>

        <div class="stack-area">
            <div class="ui-label" style="font-weight:bold;color:var(--accent-blue)">BFS Burning Queue</div>
            <div class="stack-container" id="stack-container"></div>
        </div>

        <div class="info-panel">
            <div><strong>Time:</strong> <span id="curr-time" style="color:var(--accent-red);font-size:28px">0</span></div>
            <div><strong>Target:</strong> <span id="target-val" style="color:var(--accent-orange)">—</span></div>
            <div><strong>Burning:</strong> <span id="burning-count" style="color:var(--accent-red)">0</span></div>
            <div style="margin-top:15px"><strong>Max Time:</strong> <span id="max-time" style="color:var(--accent-purple)">—</span></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">BFS from target: Fire spreads to left, right, and parent each second</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="next()">Next →</button>
        <span class="ui-label">Speed</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let targetTree = null, targetVal = 4;
        let steps = [], stepIndex = 0, timer = null;
        const delays = [1400, 700, 350];

        class TreeNode {
            constructor(val, id) {
                this.val = val;
                this.left = null;
                this.right = null;
                this.id = id;
                this.parent = null;
            }
        }

        function parseLevelOrder(str) {
            try {
                const arr = JSON.parse(str.replace(/null/g, 'null'));
                if (!arr || arr.length === 0) return null;
                
                const root = new TreeNode(arr[0], 'n0');
                let queue = [root], i = 1;
                
                while (queue.length && i < arr.length) {
                    const node = queue.shift();
                    if (i < arr.length && arr[i] !== null) {
                        node.left = new TreeNode(arr[i], 'n'+i);
                        node.left.parent = node;
                        queue.push(node.left);
                    }
                    i++;
                    if (i < arr.length && arr[i] !== null) {
                        node.right = new TreeNode(arr[i], 'n'+i);
                        node.right.parent = node;
                        queue.push(node.right);
                    }
                    i++;
                }
                return root;
            } catch(e) { 
                console.error(e);
                return null; 
            }
        }

        function buildTreeSVG(root) {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            if (!root) return;

            const positions = {};
            function assign(node, x, y, dx) {
                if (!node) return;
                positions[node.id] = {x, y};
                assign(node.left, x - dx, y + 80, dx / 1.8);
                assign(node.right, x + dx, y + 80, dx / 1.8);
            }
            assign(root, 260, 40, 110);

            function drawEdges(node) {
                if (!node) return;
                const p = positions[node.id];
                if (node.left) {
                    const lp = positions[node.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y+21);
                    line.setAttribute("x2", lp.x); line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(node.left);
                }
                if (node.right) {
                    const rp = positions[node.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y+21);
                    line.setAttribute("x2", rp.x); line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(node.right);
                }
            }
            drawEdges(root);

            function drawNodes(node) {
                if (!node) return;
                const p = positions[node.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", p.x); c.setAttribute("cy", p.y+20); c.setAttribute("r", "22");
                c.setAttribute("fill", "#21262d"); c.setAttribute("stroke", "#555");
                c.setAttribute("stroke-width", "4"); c.setAttribute("id", node.id);
                g.appendChild(c);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", p.x); t.setAttribute("y", p.y+26);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", "#c9d1d9");
                t.setAttribute("font-size", "15"); t.setAttribute("font-weight", "bold");
                t.textContent = node.val;
                g.appendChild(t);
                svg.appendChild(g);
                drawNodes(node.left);
                drawNodes(node.right);
            }
            drawNodes(root);
        }

        function findTarget(root, target) {
            if (!root) return null;
            if (root.val === target) return root;
            return findTarget(root.left, target) || findTarget(root.right, target);
        }

        function generateSteps(target) {
            steps = [];
            let burning = new Set();

            function addStep(type, panel, status, log, color, extra={}) {
                steps.push({type, panel, statusText:status, log, logColor:color, ...extra});
            }

            const targetNode = findTarget(targetTree, target);
            if (!targetNode) {
                addStep('final', `Target ${target} not found`, 'Error', 'Target not found', 'var(--accent-red)', {complete:true});
                return;
            }

            addStep('init', `Burning starts at target <b>${target}</b>`, 'Start', 'BFS from target', 'var(--accent-orange)');

            const queue = [{node: targetNode, time: 0}];
            burning.add(targetNode.id);
            let maxTime = 0;

            while (queue.length) {
                const front = queue.shift();
                const currNode = front.node;
                const currTime = front.time;
                maxTime = Math.max(maxTime, currTime);

                addStep('burn', `Time <b>${currTime}</b>: Burning <b>${currNode.val}</b>`, 
                       `Burning`, `Burn ${currNode.val} (t=${currTime})`, 'var(--accent-red)', 
                       {time: currTime, burning: new Set(burning), maxTime});

                const neighbors = [];
                if (currNode.left) neighbors.push(currNode.left);
                if (currNode.right) neighbors.push(currNode.right);
                if (currNode.parent) neighbors.push(currNode.parent);

                neighbors.forEach(nei => {
                    if (!burning.has(nei.id)) {
                        burning.add(nei.id);
                        queue.push({node: nei, time: currTime + 1});
                    }
                });
            }

            addStep('final', `<span style="color:var(--accent-green);font-size:18px">✅ Tree fully burned in <b>${maxTime}</b> seconds</span>`, 
                   'Complete', `Max Time = ${maxTime}`, 'var(--accent-green)', {complete:true, finalTime: maxTime});
        }

        function renderStep(idx) {
            const s = steps[idx];
            if (!s) return;

            buildTreeSVG(targetTree);
            if (s.burning) {
                document.querySelectorAll('circle').forEach(c => {
                    c.setAttribute('stroke', '#555');
                    c.setAttribute('fill', '#21262d');
                });
                s.burning.forEach(id => {
                    const c = document.getElementById(id);
                    if (c) {
                        c.setAttribute('stroke', '#f85149');
                        c.setAttribute('stroke-width', '8');
                        c.setAttribute('fill', '#3a1f1f');
                    }
                });
            }

            document.getElementById('curr-time').textContent = s.time !== undefined ? s.time : '—';
            document.getElementById('max-time').textContent = s.maxTime !== undefined ? s.maxTime : '—';
            document.getElementById('main-panel').innerHTML = s.panel;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                if (steps[i].log) {
                    const line = document.createElement('div');
                    line.style.color = steps[i].logColor || 'var(--text-main)';
                    line.textContent = steps[i].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) {
                pause();
            } else {
                btn.textContent = '⏸ Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(() => {
                    if (stepIndex < steps.length - 1) {
                        next();
                    } else {
                        pause();
                    }
                }, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            if (timer) clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = '▶ Play';
        }

        function loadExample(n) {
            const examples = [
                {tree: "[1,2,3,4,5,6,7]", target: 4},
                {tree: "[1,2,null,3,null,null,null,4]", target: 4},
                {tree: "[1,null,2,null,3]", target: 3}
            ];
            document.getElementById('tree-input').value = examples[n].tree;
            document.getElementById('target-input').value = examples[n].target;
            loadCustom();
        }

        function loadCustom() {
            targetTree = parseLevelOrder(document.getElementById('tree-input').value);
            targetVal = parseInt(document.getElementById('target-input').value);
            buildTreeSVG(targetTree);
            generateSteps(targetVal);
            reset();
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
