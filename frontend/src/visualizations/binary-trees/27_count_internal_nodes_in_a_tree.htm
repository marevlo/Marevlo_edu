<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Internal Nodes in Binary Tree - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-blue: #58a6ff;
            --accent-purple: #a371f7;
            --accent-orange: #e3b341;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px;
            padding: 0 10px; width: 280px; font-size: 13px;
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px; display: flex; gap: 50px; flex-wrap: wrap;
            justify-content: center; max-width: 1200px; width: 100%;
        }

        .tree-container {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 20px; min-height: 380px; width: 520px;
        }
        .tree-svg { width: 100%; height: 340px; }

        .info-panel {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 16px; width: 260px;
        }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 16px 24px; width: 900px; min-height: 120px;
            font-family: monospace; font-size: 15px; line-height: 1.5;
        }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 12px; }
        .log-panel {
            margin-top: 15px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 900px; max-width: 90%;
            height: 160px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label>Tree (level order):</label>
        <input type="text" id="tree-input" value="[1,2,3,4,null,null,5]" style="width:280px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(0)">Ex 1 (JSON)</button>
        <button onclick="loadExample(1)">Ex 2</button>
    </div>

    <div class="visual-container">
        <div>
            <div style="font-weight:bold;color:var(--accent-green);margin-bottom:8px">Binary Tree</div>
            <div class="tree-container" id="tree-container">
                <svg id="tree-svg" class="tree-svg" viewBox="0 0 520 340"></svg>
            </div>
        </div>

        <div class="info-panel">
            <div><strong>Internal Nodes:</strong> <span id="count" style="color:var(--accent-purple);font-size:28px">0</span></div>
            <div><strong>Current Node:</strong> <span id="curr-node" style="color:var(--accent-orange)">—</span></div>
            <div><strong>Status:</strong> <span id="status" style="color:var(--accent-green)">—</span></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Recursive DFS: Check if node has children → count internal nodes (post-order traversal)</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="next()">Next →</button>
        <span>Speed</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let root = null;
        let steps = [], stepIndex = 0, timer = null;
        const delays = [1400, 700, 350];
        let nodeMap = {};

        class TreeNode {
            constructor(val, id) {
                this.val = val;
                this.left = null;
                this.right = null;
                this.id = id;
            }
        }

        function parseLevelOrder(str) {
            try {
                const arr = JSON.parse(str.replace(/null/g, 'null'));
                if (!arr || arr.length === 0) return null;
                root = new TreeNode(arr[0], 'n0');
                nodeMap = {'n0': root};
                let queue = [root], i = 1;
                while (queue.length && i < arr.length) {
                    const node = queue.shift();
                    if (i < arr.length && arr[i] !== null) {
                        node.left = new TreeNode(arr[i], 'n'+i);
                        nodeMap['n'+i] = node.left;
                        queue.push(node.left);
                    }
                    i++;
                    if (i < arr.length && arr[i] !== null) {
                        node.right = new TreeNode(arr[i], 'n'+i);
                        nodeMap['n'+i] = node.right;
                        queue.push(node.right);
                    }
                    i++;
                }
                return root;
            } catch(e) { return null; }
        }

        function buildTreeSVG() {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            if (!root) return;

            const positions = {};
            function assign(node, x, y, dx) {
                if (!node) return;
                positions[node.id] = {x, y};
                assign(node.left, x - dx, y + 80, dx / 1.8);
                assign(node.right, x + dx, y + 80, dx / 1.8);
            }
            assign(root, 260, 40, 110);

            function drawEdges(node) {
                if (!node) return;
                const p = positions[node.id];
                if (node.left) {
                    const lp = positions[node.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y+21);
                    line.setAttribute("x2", lp.x); line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(node.left);
                }
                if (node.right) {
                    const rp = positions[node.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y+21);
                    line.setAttribute("x2", rp.x); line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(node.right);
                }
            }
            drawEdges(root);

            function drawNodes(node) {
                if (!node) return;
                const p = positions[node.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", p.x); c.setAttribute("cy", p.y+20); c.setAttribute("r", "22");
                c.setAttribute("fill", "#21262d"); c.setAttribute("stroke", "#555");
                c.setAttribute("stroke-width", "4"); c.setAttribute("id", node.id);
                g.appendChild(c);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", p.x); t.setAttribute("y", p.y+26);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", "#c9d1d9");
                t.setAttribute("font-size", "15"); t.setAttribute("font-weight", "bold");
                t.textContent = node.val;
                g.appendChild(t);
                svg.appendChild(g);
                drawNodes(node.left);
                drawNodes(node.right);
            }
            drawNodes(root);
        }

        function highlightNode(id, isInternal) {
            const c = document.getElementById(id);
            if (c) {
                c.setAttribute('stroke', isInternal ? '#3fb950' : '#f85149');
                c.setAttribute('stroke-width', '7');
            }
        }

        function generateSteps() {
            steps = [];
            let totalCount = 0;

            function addStep(panel, log, color, extra = {}) {
                steps.push({panel, log, logColor: color, ...extra});
            }

            function countInternal(node) {
                if (!node) {
                    addStep('Null node → return 0', 'Base case: null', 'var(--accent-red)');
                    return 0;
                }

                addStep(`Visiting node <b>${node.val}</b>`, `Call on node ${node.val}`, 'var(--accent-blue)', {id: node.id, val: node.val});

                const leftCount = countInternal(node.left);
                addStep(`Left subtree internal nodes: <b>${leftCount}</b>`, `Left count = ${leftCount}`, 'var(--accent-green)', {id: node.id});

                const rightCount = countInternal(node.right);
                addStep(`Right subtree internal nodes: <b>${rightCount}</b>`, `Right count = ${rightCount}`, 'var(--accent-green)', {id: node.id});

                const isInternal = (node.left !== null || node.right !== null);
                const current = isInternal ? 1 : 0;
                totalCount += current;

                addStep(`Node <b>${node.val}</b> is ${isInternal ? '<span style="color:var(--accent-green)">INTERNAL</span>' : '<span style="color:var(--accent-red)">LEAF</span>'} → +${current}`, 
                       `${node.val} → ${isInternal ? 'INTERNAL (+1)' : 'LEAF (+0)'}`, isInternal ? 'var(--accent-green)' : 'var(--accent-red)', 
                       {id: node.id, isInternal, count: totalCount});

                return leftCount + rightCount + current;
            }

            addStep('Starting recursive count of internal nodes...', 'Begin DFS from root', 'var(--accent-orange)');
            countInternal(root);
            addStep(`<span style="color:var(--accent-green);font-size:18px">✅ Total Internal Nodes = <b>${totalCount}</b></span>`, 
                   `Final Count: ${totalCount}`, 'var(--accent-green)', {complete: true});
        }

        function renderStep(idx) {
            const s = steps[idx];
            if (!s) return;

            buildTreeSVG();
            if (s.id) highlightNode(s.id, s.isInternal);

            document.getElementById('count').textContent = s.count !== undefined ? s.count : '—';
            document.getElementById('curr-node').textContent = s.val !== undefined ? s.val : '—';
            document.getElementById('status').textContent = s.isInternal !== undefined ? (s.isInternal ? 'INTERNAL' : 'LEAF') : '—';
            document.getElementById('main-panel').innerHTML = s.panel;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.color = steps[i].logColor || 'var(--text-main)';
                line.textContent = steps[i].log;
                logPanel.appendChild(line);
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() { if (stepIndex < steps.length-1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = '⏸ Pause';
                if (stepIndex >= steps.length-1) stepIndex = 0;
                timer = setInterval(() => {
                    if (stepIndex < steps.length-1) next();
                    else pause();
                }, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            if (timer) clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = '▶ Play';
        }

        function loadExample(n) {
            const examples = [
                {tree: "[1,2,3,4,null,null,5]"},
                {tree: "[10]"}
            ];
            document.getElementById('tree-input').value = examples[n].tree;
            loadCustom();
        }

        function loadCustom() {
            root = parseLevelOrder(document.getElementById('tree-input').value);
            buildTreeSVG();
            generateSteps();
            reset();
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
