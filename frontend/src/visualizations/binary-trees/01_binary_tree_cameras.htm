<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Tree Cameras - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 220px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px;
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Tree Visualization */
        .tree-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .tree-container {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 8px;
            padding: 20px;
            min-height: 380px;
            width: 520px;
            position: relative;
        }
        .tree-svg { width: 100%; height: 340px; }

        /* Stack & Info */
        .stack-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .stack-container {
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            gap: 6px;
            width: 180px;
            height: 300px;
            border: 2px dashed var(--border-main);
            padding: 10px;
            background: rgba(22, 27, 34, 0.5);
            overflow-y: auto;
            border-radius: 6px;
        }
        .stack-frame {
            width: 100%;
            padding: 8px 12px;
            background: var(--btn-bg);
            border: 1px solid var(--border-main);
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            text-align: center;
        }
        .stack-frame.active {
            background: #0d2244;
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            transform: scale(1.05);
        }

        /* Camera Output */
        .cameras-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .camera-count {
            font-size: 28px;
            font-weight: bold;
            color: var(--accent-purple);
            font-family: monospace;
        }

        .action-panel {
            margin-top: 20px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 14px 20px;
            width: 860px;
            min-height: 110px;
            font-family: monospace;
            font-size: 15px;
            line-height: 1.5;
        }

        .info-panel {
            margin-top: 10px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .info-cell {
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 10px 16px;
            min-width: 140px;
            text-align: center;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 18px; font-weight: 700; }

        .controls {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; }

        .legend {
            margin-top: 15px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 13px;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }

        .log-panel {
            margin-top: 15px;
            background: var(--bg-page);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            padding: 12px 16px;
            width: 860px;
            max-width: 90%;
            height: 130px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .node {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 15px;
            border: 3px solid #555;
            transition: all 0.3s ease;
            position: absolute;
        }
        .node.leaf { border-color: var(--accent-orange); }
        .node.camera { border-color: var(--accent-purple); background: rgba(163, 113, 247, 0.3); }
        .node.covered { border-color: var(--accent-green); }
        .node.active { transform: scale(1.25); box-shadow: 0 0 15px var(--accent-blue); }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Tree (level order):</label>
        <input type="text" id="tree-input" value="[0,0,null,0,0]" placeholder="[0,0,null,0,0]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(0)">Ex 1: [0,0,null,0,0]</button>
        <button onclick="loadExample(1)">Ex 2: Long Chain</button>
    </div>

    <div class="visual-container">
        <!-- Tree -->
        <div class="tree-area">
            <div class="ui-label" style="font-weight: bold; color: var(--accent-green);">Binary Tree</div>
            <div class="tree-container" id="tree-container">
                <svg id="tree-svg" class="tree-svg" viewBox="0 0 520 340"></svg>
            </div>
        </div>

        <!-- Stack -->
        <div class="stack-area">
            <div class="ui-label" style="font-weight: bold; color: var(--accent-blue);">Recursion Stack</div>
            <div class="stack-container" id="stack-container"></div>
        </div>

        <!-- Cameras -->
        <div class="cameras-area">
            <div class="ui-label" style="font-weight: bold; color: var(--accent-purple);">Cameras Placed</div>
            <div id="camera-count" class="camera-count">0</div>
            <div class="ui-label" style="margin-top: 20px; font-weight: bold; color: var(--accent-orange);">Current Node State</div>
            <div id="current-state" style="font-size: 22px; font-family: monospace; font-weight: bold;">—</div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">State Legend</span>
            <span class="info-value" style="color:var(--accent-red)">0 = Not Covered</span>
            <span class="info-value" style="color:var(--accent-purple)">1 = Has Camera</span>
            <span class="info-value" style="color:var(--accent-green)">2 = Covered</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Total Cameras</span>
            <span id="total-cameras" class="info-value" style="color:var(--accent-purple)">0</span>
        </div>
    </div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div>
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span style="color:var(--accent-blue)">●</span> Active Node</div>
        <div class="legend-item"><span style="color:var(--accent-purple)">●</span> Camera Placed</div>
        <div class="legend-item"><span style="color:var(--accent-green)">●</span> Covered</div>
        <div class="legend-item"><span style="color:var(--accent-orange)">●</span> Leaf</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let targetTree = null;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 400];

        // Tree Node class
        class TreeNode {
            constructor(val) {
                this.val = val;
                this.left = null;
                this.right = null;
                this.id = null; // for visualization
            }
        }

        function parseLevelOrder(arrStr) {
            const arr = JSON.parse(arrStr.replace(/null/g, 'null'));
            if (!arr || arr.length === 0) return null;
            
            const root = new TreeNode(arr[0]);
            root.id = 'n0';
            let queue = [root];
            let i = 1;
            
            while (queue.length && i < arr.length) {
                const node = queue.shift();
                if (arr[i] !== null) {
                    node.left = new TreeNode(arr[i]);
                    node.left.id = 'n' + i;
                    queue.push(node.left);
                }
                i++;
                if (i < arr.length && arr[i] !== null) {
                    node.right = new TreeNode(arr[i]);
                    node.right.id = 'n' + i;
                    queue.push(node.right);
                }
                i++;
            }
            return root;
        }

        function buildTreeSVG(root) {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            
            if (!root) return;
            
            const positions = {};
            function assignPositions(node, x, y, dx) {
                if (!node) return;
                positions[node.id] = {x, y};
                assignPositions(node.left, x - dx, y + 80, dx / 1.8);
                assignPositions(node.right, x + dx, y + 80, dx / 1.8);
            }
            assignPositions(root, 260, 40, 110);

            // Draw edges
            function drawEdges(node) {
                if (!node) return;
                const p = positions[node.id];
                if (node.left) {
                    const lp = positions[node.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x);
                    line.setAttribute("y1", p.y + 20);
                    line.setAttribute("x2", lp.x);
                    line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555");
                    line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(node.left);
                }
                if (node.right) {
                    const rp = positions[node.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x);
                    line.setAttribute("y1", p.y + 20);
                    line.setAttribute("x2", rp.x);
                    line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555");
                    line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(node.right);
                }
            }
            drawEdges(root);

            // Draw nodes
            function drawNodes(node) {
                if (!node) return;
                const pos = positions[node.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", pos.x);
                circle.setAttribute("cy", pos.y + 20);
                circle.setAttribute("r", "22");
                circle.setAttribute("fill", "#21262d");
                circle.setAttribute("stroke", "#555");
                circle.setAttribute("stroke-width", "4");
                circle.setAttribute("id", node.id);
                g.appendChild(circle);

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", pos.x);
                text.setAttribute("y", pos.y + 26);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("fill", "#c9d1d9");
                text.setAttribute("font-size", "16");
                text.setAttribute("font-weight", "bold");
                text.textContent = node.val;
                g.appendChild(text);

                svg.appendChild(g);
                drawNodes(node.left);
                drawNodes(node.right);
            }
            drawNodes(root);
        }

        function highlightNode(id, type = 'active') {
            document.querySelectorAll('circle').forEach(c => {
                c.setAttribute('stroke', '#555');
                c.setAttribute('stroke-width', '4');
            });
            const circle = document.getElementById(id);
            if (circle) {
                if (type === 'camera') {
                    circle.setAttribute('stroke', '#a371f7');
                    circle.setAttribute('stroke-width', '6');
                } else if (type === 'covered') {
                    circle.setAttribute('stroke', '#3fb950');
                    circle.setAttribute('stroke-width', '5');
                } else {
                    circle.setAttribute('stroke', '#58a6ff');
                    circle.setAttribute('stroke-width', '7');
                }
            }
        }

        function generateSteps() {
            steps = [];
            let cameras = 0;
            let callStack = [];
            let currentOutputLog = [];

            // Helper to create step
            function addStep(type, panelText, statusText, logText, logColor, extra = {}) {
                steps.push({
                    type,
                    stack: [...callStack],
                    cameras,
                    panel: panelText,
                    statusText,
                    log: logText,
                    logColor,
                    ...extra
                });
            }

            function dfs(node) {
                if (!node) {
                    addStep('null', 
                        `<span style="color:var(--accent-green)">Null node → state = 2 (covered by default)</span>`,
                        `Null child - treated as covered (state 2)`,
                        `  dfs(null) → 2`,
                        'var(--accent-green)');
                    return 2;
                }

                callStack.push(`dfs(${node.id})`);
                addStep('call', 
                    `Called <code>dfs(${node.id})</code><br>Post-order: processing left and right first.`,
                    `Entering node ${node.id}`,
                    `Call dfs(${node.id})`,
                    'var(--text-main)');

                // Left
                addStep('recurse-left', 
                    `Recursing on left child of ${node.id}`,
                    `Left subtree...`,
                    `  → Left child`,
                    'var(--accent-blue)');
                const leftState = dfs(node.left);

                // Right
                addStep('recurse-right', 
                    `Recursing on right child of ${node.id}`,
                    `Right subtree...`,
                    `  → Right child`,
                    'var(--accent-blue)');
                const rightState = dfs(node.right);

                // Process current node
                addStep('process', 
                    `Both children processed.<br>Left: <b>${leftState}</b>, Right: <b>${rightState}</b>`,
                    `Evaluating states for ${node.id}`,
                    `  States: L=${leftState}, R=${rightState}`,
                    'var(--accent-orange)');

                let state;
                if (leftState === 0 || rightState === 0) {
                    cameras++;
                    state = 1;
                    addStep('place', 
                        `<span style="color:var(--accent-purple)">Place camera here!</span> State = 1`,
                        `Camera placed at ${node.id}`,
                        `  Camera++ → ${cameras}`,
                        'var(--accent-purple)', {highlight: node.id, highlightType: 'camera'});
                } else if (leftState === 1 || rightState === 1) {
                    state = 2;
                    addStep('covered', 
                        `Covered by child's camera. State = 2`,
                        `${node.id} is covered`,
                        `  State = 2 (covered)`,
                        'var(--accent-green)', {highlight: node.id, highlightType: 'covered'});
                } else {
                    state = 0;
                    addStep('uncovered', 
                        `Not covered yet. State = 0 (needs parent coverage)`,
                        `${node.id} needs parent`,
                        `  State = 0`,
                        'var(--accent-red)', {highlight: node.id});
                }

                callStack.pop();
                addStep('return', 
                    `Returning state <b>${state}</b> from ${node.id}`,
                    `Returning from ${node.id}`,
                    `Return ${state}`,
                    'var(--text-dim)');
                
                return state;
            }

            // Initial step
            addStep('init', 
                `Starting Greedy Postorder for Minimum Cameras.<br>States: 0=needs coverage, 1=has camera, 2=covered.`,
                `Building tree and starting DFS`,
                `N = ${targetTree ? 'Tree loaded' : '—'}`,
                'var(--text-dim)');

            const rootState = dfs(targetTree);

            // Root special case
            if (rootState === 0) {
                cameras++;
                addStep('root-camera', 
                    `<span style="color:var(--accent-purple)">Root needs camera!</span>`,
                    `Placing camera at root`,
                    `Root camera placed`,
                    'var(--accent-purple)');
            }

            // Final
            addStep('final', 
                `All nodes processed.<br><b>Minimum cameras required: ${cameras}</b>`,
                `Solution complete`,
                `Final Cameras: ${cameras}`,
                'var(--accent-green)', {complete: true, finalCameras: cameras});
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Stack
            const stackContainer = document.getElementById('stack-container');
            stackContainer.innerHTML = '';
            step.stack.forEach(frame => {
                const div = document.createElement('div');
                div.className = `stack-frame ${frame === step.stack[step.stack.length-1] ? 'active' : ''}`;
                div.textContent = frame;
                stackContainer.appendChild(div);
            });

            // Tree highlight
            if (step.highlight) {
                highlightNode(step.highlight, step.highlightType || 'active');
            }

            // Camera count
            document.getElementById('camera-count').textContent = step.cameras;
            document.getElementById('total-cameras').textContent = step.cameras || 0;

            // State
            if (step.type === 'place') document.getElementById('current-state').innerHTML = `<span style="color:var(--accent-purple)">1</span>`;
            else if (step.type === 'covered') document.getElementById('current-state').innerHTML = `<span style="color:var(--accent-green)">2</span>`;
            else if (step.type === 'uncovered') document.getElementById('current-state').innerHTML = `<span style="color:var(--accent-red)">0</span>`;
            else document.getElementById('current-state').textContent = '—';

            // Panel & status
            document.getElementById('main-panel').innerHTML = step.panel;
            document.getElementById('status-text') ? document.getElementById('status-text').textContent = step.statusText : null;

            // Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                if (steps[i].log) {
                    const line = document.createElement('div');
                    line.style.color = steps[i].logColor || 'var(--text-main)';
                    line.style.marginBottom = '3px';
                    line.textContent = steps[i].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;

            if (step.complete) {
                const finalDiv = document.createElement('div');
                finalDiv.style.color = 'var(--accent-green)';
                finalDiv.style.fontWeight = 'bold';
                finalDiv.style.marginTop = '10px';
                finalDiv.textContent = `✅ Minimum Cameras = ${step.finalCameras}`;
                logPanel.appendChild(finalDiv);
            }
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) {
                pause();
            } else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = 'Play';
        }

        function loadExample(exIdx) {
            let arrStr = '';
            if (exIdx === 0) {
                arrStr = '[0,0,null,0,0]';
            } else if (exIdx === 1) {
                arrStr = '[0,0,null,0,null,0,null,null,0]';
            }
            document.getElementById('tree-input').value = arrStr;
            loadCustom();
        }

        function loadCustom() {
            const input = document.getElementById('tree-input').value.trim();
            targetTree = parseLevelOrder(input);
            
            if (!targetTree) {
                alert("Invalid tree input");
                return;
            }

            buildTreeSVG(targetTree);
            generateSteps();
            reset();
        }

        // Init — read ?example=N from URL so clicking "Visualization" on
        // Example 1 auto-loads example 0, Example 2 auto-loads example 1, etc.
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const exIdx = parseInt(params.get('example') || '0');
            loadExample(exIdx);
        };
    </script>
</body>
</html>
