<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert Binary Tree to DLL (Inorder) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-blue: #58a6ff;
            --accent-purple: #a371f7;
            --accent-orange: #e3b341;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        input[type="text"] { 
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px; 
            padding: 0 10px; width: 280px; font-size: 13px; 
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .viz-container { 
            margin-top: 30px; display: flex; gap: 40px; flex-wrap: wrap; 
            justify-content: center; max-width: 1300px; width: 100%; 
        }

        .panel {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 15px; width: 480px;
        }
        .title { font-weight: bold; color: var(--accent-green); margin-bottom: 8px; text-align: center; }

        .tree-svg { width: 100%; height: 300px; background: #0a0e14; }

        .dll-container {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    padding: 40px 20px 20px 70px;
    overflow-x: auto;
}
        .dll-node {
            background: #21262d; border: 3px solid #555; border-radius: 12px;
            padding: 16px 24px; text-align: center; min-width: 72px;
            font-size: 22px; font-weight: bold; transition: all 0.4s;
        }
        .dll-node.head {
            border-color: var(--accent-green);
            background: #1f2a1f;
            transform: scale(1.18);
            box-shadow: 0 0 25px var(--accent-green);
            font-size: 26px;
        }
        .arrow { font-size: 32px; color: var(--accent-purple); font-weight: bold; }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 16px 24px; width: 920px; min-height: 140px;
            font-family: monospace; font-size: 15px; line-height: 1.5;
        }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .log-panel {
            margin-top: 15px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 920px; max-width: 90%;
            height: 160px; overflow-y: auto; font-family: monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label>Tree (level order):</label>
        <input type="text" id="tree-input" value="[10,12,15,25,30,36]" style="width:280px">
        <button onclick="loadCustom()">Load Tree</button>
        <button onclick="loadExample(0)">Ex 1</button>
        <button onclick="loadExample(1)">Ex 2</button>
        <button onclick="loadExample(2)">Ex 3</button>
    </div>

    <div class="viz-container">
        <div class="panel">
            <div class="title">Original Binary Tree</div>
            <svg id="tree-svg" class="tree-svg" viewBox="0 0 460 300"></svg>
        </div>

        <div class="panel">
            <div class="title">Doubly Linked List (Inorder)</div>
            <div id="dll-container" class="dll-container"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Starting Recursive Inorder Conversion...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="next()">Next →</button>
        <span>Speed</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1" style="width:180px">
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let root = null;
        let head = null;
        let prev = null;
        let steps = [], stepIndex = 0, timer = null;
        const delays = [1250, 650, 320];

        class TreeNode {
            constructor(val, id) {
                this.val = val;
                this.left = null;
                this.right = null;
                this.id = id;
                this.dllNext = null;
                this.dllPrev = null;
            }
        }

        function parseLevelOrder(str) {
            try {
                let arrStr = str.trim();
                if (!arrStr.startsWith('[')) arrStr = '[' + arrStr + ']';
                const arr = JSON.parse(arrStr.replace(/null/g, 'null'));
                if (!arr || arr.length === 0) return null;

                root = new TreeNode(arr[0], 'n0');
                let queue = [root], i = 1;

                while (queue.length && i < arr.length) {
                    const node = queue.shift();
                    if (i < arr.length) {
                        if (arr[i] !== null) {
                            node.left = new TreeNode(arr[i], 'n'+i);
                            queue.push(node.left);
                        }
                        i++;
                    }
                    if (i < arr.length) {
                        if (arr[i] !== null) {
                            node.right = new TreeNode(arr[i], 'n'+i);
                            queue.push(node.right);
                        }
                        i++;
                    }
                }
                return root;
            } catch(e) { console.error(e); return null; }
        }

        function buildTreeSVG() {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            if (!root) return;

            const positions = {};
            function assign(node, x, y, dx) {
                if (!node) return;
                positions[node.id] = {x, y};
                assign(node.left, x - dx, y + 78, dx * 0.72);
                assign(node.right, x + dx, y + 78, dx * 0.72);
            }
            assign(root, 230, 40, 110);

            function drawEdges(node) {
                if (!node) return;
                const p = positions[node.id];
                if (node.left) {
                    const lp = positions[node.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 23);
                    line.setAttribute("x2", lp.x); line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3.5");
                    svg.appendChild(line);
                    drawEdges(node.left);
                }
                if (node.right) {
                    const rp = positions[node.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 23);
                    line.setAttribute("x2", rp.x); line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3.5");
                    svg.appendChild(line);
                    drawEdges(node.right);
                }
            }
            drawEdges(root);

            function drawNodes(node) {
                if (!node) return;
                const p = positions[node.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", p.x); c.setAttribute("cy", p.y + 20);
                c.setAttribute("r", "23"); c.setAttribute("fill", "#21262d");
                c.setAttribute("stroke", "#555"); c.setAttribute("stroke-width", "4");
                c.setAttribute("id", node.id);
                g.appendChild(c);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", p.x); t.setAttribute("y", p.y + 26);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", "#c9d1d9");
                t.setAttribute("font-size", "15"); t.setAttribute("font-weight", "bold");
                t.textContent = node.val;
                g.appendChild(t);
                svg.appendChild(g);

                drawNodes(node.left);
                drawNodes(node.right);
            }
            drawNodes(root);
        }

        function highlightNode(id, color) {
            const c = document.getElementById(id);
            if (c) {
                c.setAttribute('stroke', color);
                c.setAttribute('stroke-width', '9');
            }
        }

        function renderDLL() {
            const container = document.getElementById('dll-container');
            container.innerHTML = '';
            if (!head) return;

            let curr = head;
            while (curr) {
                const nodeEl = document.createElement('div');
                nodeEl.className = 'dll-node';
                if (curr === head) nodeEl.classList.add('head');
                nodeEl.textContent = curr.val;
                container.appendChild(nodeEl);

                if (curr.dllNext) {
                    const arrow = document.createElement('div');
                    arrow.className = 'arrow';
                    arrow.textContent = '→';
                    container.appendChild(arrow);
                }
                curr = curr.dllNext;
            }
        }

        function generateSteps() {
            steps = [];
            head = null;
            prev = null;

            function addStep(panel, log, color, extra = {}) {
                steps.push({panel, log, logColor: color, ...extra});
            }

            function inorder(node, depth = 0) {
                if (!node) return;

                inorder(node.left, depth + 1);

                if (!prev) {
                    head = node;
                    addStep(`<b>${node.val}</b> is HEAD`, 'Leftmost node becomes head of DLL', 'var(--accent-green)', {id: node.id, isHead: true});
                } else {
                    prev.dllNext = node;
                    node.dllPrev = prev;
                    addStep(`Link <b>${prev.val} ↔ ${node.val}</b>`, '', 'var(--accent-purple)', {id: node.id});
                }
                prev = node;

                inorder(node.right, depth + 1);
            }

            addStep('Starting Recursive Inorder → DLL Conversion', 'Left → Link → Right', 'var(--accent-orange)');
            inorder(root);
            addStep(`<span style="color:var(--accent-green);font-size:18px">✅ DLL Created Successfully</span>`, 
                   `Head = ${head ? head.val : 'null'}`, 'var(--accent-green)', {complete: true});
        }

        function renderStep(idx) {
            const s = steps[idx];
            if (!s) return;

            buildTreeSVG();
            if (s.id) highlightNode(s.id, s.isHead ? '#3fb950' : '#e3b341');

            document.getElementById('main-panel').innerHTML = s.panel;
            renderDLL();

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.color = steps[i].logColor || 'var(--text-main)';
                line.textContent = steps[i].log;
                logPanel.appendChild(line);
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() { if (stepIndex < steps.length-1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = '⏸ Pause';
                if (stepIndex >= steps.length-1) stepIndex = 0;
                timer = setInterval(() => {
                    if (stepIndex < steps.length-1) next();
                    else pause();
                }, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            if (timer) clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = '▶ Play';
        }

        function loadExample(n) {
            const examples = ["[10,12,15,25,30,36]", "[4,2,5,1,3]", "[1,null,2]"];
            document.getElementById('tree-input').value = examples[n];
            loadCustom();
        }

        function loadCustom() {
            root = parseLevelOrder(document.getElementById('tree-input').value);
            buildTreeSVG();
            generateSteps();
            reset();
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
