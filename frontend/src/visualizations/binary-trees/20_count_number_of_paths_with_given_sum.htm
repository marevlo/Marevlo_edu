<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Paths with Given Sum - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }
        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px;
            padding: 0 10px; width: 280px; font-size: 13px;
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px; display: flex; gap: 30px; flex-wrap: wrap;
            justify-content: center; max-width: 1400px; width: 100%;
        }
        .tree-container {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 20px; min-height: 380px; width: 520px;
        }
        .tree-svg { width: 100%; height: 340px; }

        .stack-container, .map-container {
            display: flex; flex-direction: column; gap: 6px;
            width: 240px; height: 340px; border: 2px dashed var(--border-main);
            padding: 12px; background: rgba(22,27,34,0.6); overflow-y: auto;
            border-radius: 6px; font-family: monospace; font-size: 13px;
        }
        .stack-frame, .map-entry {
            padding: 8px 12px; background: var(--btn-bg);
            border: 1px solid var(--border-main); border-radius: 4px;
        }
        .stack-frame.active { background: #0d2244; border-color: var(--accent-blue); color: var(--accent-blue); }

        .info-panel {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 16px; width: 300px; min-height: 160px;
        }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 16px 22px; width: 920px; min-height: 120px;
            font-family: monospace; font-size: 15px; line-height: 1.5;
        }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 12px; }
        .log-panel {
            margin-top: 15px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 920px; max-width: 90%;
            height: 160px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label>Tree (Level Order):</label>
        <input type="text" id="tree-input" value="[10,5,-3,3,2,null,11,3,-2,null,1]">
        <label>Target:</label>
        <input type="text" id="target-input" value="8" style="width:90px">
        <button onclick="loadCustom()">Load &amp; Start</button>
        <button onclick="loadExample(0)">Ex 1 (3 paths)</button>
        <button onclick="loadExample(1)">Ex 2 (2 paths)</button>
    </div>

    <div class="visual-container">
        <div>
            <div style="font-weight:bold;color:var(--accent-green)">Binary Tree</div>
            <div class="tree-container">
                <svg id="tree-svg" class="tree-svg" viewBox="0 0 520 340"></svg>
            </div>
        </div>

        <div>
            <div style="font-weight:bold;color:var(--accent-blue)">Current Path (Prefix)</div>
            <div class="stack-container" id="stack-container"></div>
        </div>

        <div>
            <div style="font-weight:bold;color:var(--accent-purple)">Prefix Sum Map</div>
            <div class="map-container" id="map-container"></div>
        </div>

        <div class="info-panel">
            <div style="font-weight:bold;color:var(--accent-green);margin-bottom:10px">Paths Found</div>
            <div id="count-display" style="font-size:52px;font-weight:bold;color:var(--accent-green);text-align:center">0</div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Click Load then Play to visualize Prefix Sum + HashMap DFS</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="next()">Next →</button>
        <label>Speed <input type="range" id="speed-slider" min="0" max="2" value="1"></label>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let rootNode = null;
        let targetVal = 8;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1350, 720, 380];

        class TreeNode {
            constructor(val, id) {
                this.val = val;
                this.left = null;
                this.right = null;
                this.id = id;
            }
        }

        function parseLevelOrder(str) {
            try {
                let arr = JSON.parse(str.replace(/null/g, 'null'));
                if (!arr || arr.length === 0) return null;
                const root = new TreeNode(arr[0], 'n0');
                let queue = [root], i = 1;
                while (queue.length && i < arr.length) {
                    const node = queue.shift();
                    if (i < arr.length && arr[i] !== null) {
                        node.left = new TreeNode(arr[i], 'n' + i);
                        queue.push(node.left);
                    }
                    i++;
                    if (i < arr.length && arr[i] !== null) {
                        node.right = new TreeNode(arr[i], 'n' + i);
                        queue.push(node.right);
                    }
                    i++;
                }
                return root;
            } catch(e) { return null; }
        }

        function buildTreeSVG(root) {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            if (!root) return;

            const pos = {};
            function assign(n, x, y, dx) {
                if (!n) return;
                pos[n.id] = {x, y};
                assign(n.left, x - dx, y + 78, dx * 0.65);
                assign(n.right, x + dx, y + 78, dx * 0.65);
            }
            assign(root, 260, 40, 110);

            function drawEdges(n) {
                if (!n) return;
                const p = pos[n.id];
                if (n.left) {
                    const lp = pos[n.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 22);
                    line.setAttribute("x2", lp.x); line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(n.left);
                }
                if (n.right) {
                    const rp = pos[n.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 22);
                    line.setAttribute("x2", rp.x); line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(n.right);
                }
            }
            drawEdges(root);

            function drawNodes(n) {
                if (!n) return;
                const p = pos[n.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", p.x); c.setAttribute("cy", p.y + 20);
                c.setAttribute("r", "22"); c.setAttribute("fill", "#21262d");
                c.setAttribute("stroke", "#555"); c.setAttribute("stroke-width", "4");
                c.setAttribute("id", n.id);
                g.appendChild(c);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", p.x); t.setAttribute("y", p.y + 26);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", "#c9d1d9");
                t.setAttribute("font-size", "15"); t.setAttribute("font-weight", "bold");
                t.textContent = n.val;
                g.appendChild(t);
                svg.appendChild(g);
                drawNodes(n.left);
                drawNodes(n.right);
            }
            drawNodes(root);
        }

        function highlightNode(id, color = '#58a6ff') {
            document.querySelectorAll('circle').forEach(c => c.setAttribute('stroke', '#555'));
            const c = document.getElementById(id);
            if (c) c.setAttribute('stroke', color);
        }

        function generateSteps() {
            steps = [];
            let path = [];
            let prefixMap = new Map();
            let totalCount = 0;
            let stepCounter = 0;

            function addStep(type, nodeId, prefix, panel, log, color) {
                steps.push({type, nodeId, prefix, panel, log, color, mapState: new Map(prefixMap), count: totalCount});
            }

            function dfs(node) {
                if (!node) {
                    addStep('base', null, null, 'Null node → return', 'Base case (null)', 'var(--accent-red)');
                    return;
                }

                const currPrefix = (path.length ? path[path.length-1].prefix : 0) + node.val;
                path.push({val: node.val, prefix: currPrefix, id: node.id});

                addStep('enter', node.id, currPrefix,
                    `Enter node <b>${node.val}</b> (prefix = ${currPrefix})`,
                    `Node ${node.val}, prefix=${currPrefix}`, 'var(--accent-orange)');

                // Check for paths ending here
                const needed = currPrefix - targetVal;
                const found = prefixMap.get(needed) || 0;
                if (found > 0) {
                    totalCount += found;
                    addStep('found', node.id, currPrefix,
                        `✅ Found <b>${found}</b> path(s) ending here!`,
                        `Added ${found} paths (needed ${needed})`, 'var(--accent-green)');
                }

                // Add current prefix to map
                prefixMap.set(currPrefix, (prefixMap.get(currPrefix) || 0) + 1);
                addStep('addmap', node.id, currPrefix,
                    `Add prefix <b>${currPrefix}</b> to map`,
                    `Map[${currPrefix}] = ${prefixMap.get(currPrefix)}`, 'var(--accent-blue)');

                dfs(node.left);
                dfs(node.right);

                // Backtrack
                path.pop();
                const freq = prefixMap.get(currPrefix);
                if (freq === 1) prefixMap.delete(currPrefix);
                else prefixMap.set(currPrefix, freq - 1);

                addStep('backtrack', node.id, currPrefix,
                    `Backtrack from <b>${node.val}</b>`,
                    `Removed prefix ${currPrefix}`, 'var(--text-dim)');
            }

            addStep('init', null, 0, `Start DFS with map {0:1}, target = <b>${targetVal}</b>`, 'Initialize', 'var(--text-dim)');
            prefixMap.set(0, 1);

            dfs(rootNode);

            addStep('final', null, null,
                `<span style="font-size:26px;color:var(--accent-green)">✅ Total Paths Found: <b>${totalCount}</b></span>`,
                `Final count: ${totalCount}`, 'var(--accent-green)');
        }

        function renderStep(idx) {
            const s = steps[idx];
            if (!s) return;

            // Tree highlight
            if (s.nodeId) highlightNode(s.nodeId);

            // Current path stack
            const stackEl = document.getElementById('stack-container');
            stackEl.innerHTML = '';
            for (let p of s.mapState ? [] : []) {} // not used
            // Show path
            for (let entry of pathSimulation(idx)) {
                const d = document.createElement('div');
                d.className = 'stack-frame';
                d.innerHTML = `${entry.val} <span style="color:#8b949e">(prefix=${entry.prefix})</span>`;
                stackEl.appendChild(d);
            }

            // Prefix Map
            const mapEl = document.getElementById('map-container');
            mapEl.innerHTML = '';
            for (let [k, v] of s.mapState.entries()) {
                const e = document.createElement('div');
                e.className = 'map-entry';
                e.innerHTML = `<b>${k}</b> : ${v}`;
                mapEl.appendChild(e);
            }

            document.getElementById('main-panel').innerHTML = s.panel;
            document.getElementById('count-display').textContent = s.count;

            // Log
            const logEl = document.getElementById('log');
            logEl.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.color = steps[i].color || 'var(--text-main)';
                line.textContent = steps[i].log;
                logEl.appendChild(line);
            }
            logEl.scrollTop = logEl.scrollHeight;
        }

        function pathSimulation(idx) {
            let path = [];
            for (let i = 0; i <= idx; i++) {
                if (steps[i].type === 'enter') path.push({val: steps[i].nodeId ? '..' : '', prefix: steps[i].prefix});
                if (steps[i].type === 'backtrack') path.pop();
            }
            return path;
        }

        function next() { if (stepIndex < steps.length-1) { stepIndex++; renderStep(stepIndex); } }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) {
                pause();
            } else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length-1) stepIndex = 0;
                timer = setInterval(() => {
                    if (stepIndex < steps.length-1) next();
                    else pause();
                }, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }
        function pause() {
            clearInterval(timer); timer = null;
            document.getElementById('play-btn').textContent = '▶ Play';
        }

        function loadExample(n) {
            const exs = [
                {tree: "[10,5,-3,3,2,null,11,3,-2,null,1]", target: 8},
                {tree: "[1,2,3]", target: 3}
            ];
            document.getElementById('tree-input').value = exs[n].tree;
            document.getElementById('target-input').value = exs[n].target;
            loadCustom();
        }

        function loadCustom() {
            rootNode = parseLevelOrder(document.getElementById('tree-input').value);
            targetVal = parseInt(document.getElementById('target-input').value) || 0;
            if (!rootNode) return;
            buildTreeSVG(rootNode);
            generateSteps();
            stepIndex = 0;
            renderStep(0);
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
