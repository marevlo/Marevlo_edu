<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Largest BST Subtree - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-blue: #58a6ff;
            --accent-purple: #a371f7;
            --accent-orange: #e3b341;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px;
            padding: 0 10px; width: 280px; font-size: 13px;
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .viz-container {
            margin-top: 30px; display: flex; gap: 40px; flex-wrap: wrap;
            justify-content: center; max-width: 1300px; width: 100%;
        }

        .panel {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 15px; width: 480px;
        }
        .title { font-weight: bold; color: var(--accent-green); margin-bottom: 8px; text-align: center; }

        .tree-svg { width: 100%; height: 300px; background: #0a0e14; }

        .info-box {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 16px; width: 280px; margin-top: 20px;
        }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 16px 24px; width: 920px; min-height: 140px;
            font-family: monospace; font-size: 15px; line-height: 1.5;
        }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .log-panel {
            margin-top: 15px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 920px; max-width: 90%;
            height: 180px; overflow-y: auto; font-family: monospace; font-size: 13px;
        }

        .result {
            font-size: 26px; font-weight: bold; color: var(--accent-green); margin: 15px 0;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label>Tree (level order):</label>
        <input type="text" id="tree-input" value="[10,5,15,1,8,null,7]" style="width:280px">
        <button onclick="loadCustom()">Load Tree</button>
        <button onclick="loadExample(0)">Ex 1</button>
        <button onclick="loadExample(1)">Ex 2</button>
        <button onclick="loadExample(2)">Ex 3</button>
    </div>

    <div class="viz-container">
        <div class="panel">
            <div class="title">Binary Tree</div>
            <svg id="tree-svg" class="tree-svg" viewBox="0 0 460 300"></svg>
        </div>

        <div class="panel">
            <div class="title">Current Info</div>
            <div class="info-box" id="info-box">
                Largest BST Size: <span id="max-size" style="color:var(--accent-green);font-size:24px">0</span><br>
                Current Subtree: <span id="curr-node-info">-</span>
            </div>
        </div>
    </div>

    <div class="result" id="result">Largest BST Subtree Size: —</div>

    <div class="action-panel" id="main-panel">Starting Bottom-Up BST Check...</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="next()">Next →</button>
        <span>Speed</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1" style="width:180px">
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let root = null;
        let steps = [], stepIndex = 0, timer = null;
        const delays = [1350, 680, 340];
        let globalMax = 0;

        class TreeNode {
            constructor(val, id) {
                this.val = val;
                this.left = null;
                this.right = null;
                this.id = id;
            }
        }

        function parseLevelOrder(str) {
            try {
                let arrStr = str.trim();
                if (!arrStr.startsWith('[')) arrStr = '[' + arrStr + ']';
                const arr = JSON.parse(arrStr.replace(/null/g, 'null'));
                if (!arr || arr.length === 0) return null;

                root = new TreeNode(arr[0], 'n0');
                let queue = [root], i = 1;

                while (queue.length && i < arr.length) {
                    const node = queue.shift();
                    if (i < arr.length) {
                        if (arr[i] !== null) {
                            node.left = new TreeNode(arr[i], 'n'+i);
                            queue.push(node.left);
                        }
                        i++;
                    }
                    if (i < arr.length) {
                        if (arr[i] !== null) {
                            node.right = new TreeNode(arr[i], 'n'+i);
                            queue.push(node.right);
                        }
                        i++;
                    }
                }
                return root;
            } catch(e) { console.error(e); return null; }
        }

        function buildTreeSVG() {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            if (!root) return;

            const positions = {};
            function assign(node, x, y, dx) {
                if (!node) return;
                positions[node.id] = {x, y};
                assign(node.left, x - dx, y + 78, dx * 0.72);
                assign(node.right, x + dx, y + 78, dx * 0.72);
            }
            assign(root, 230, 40, 110);

            function drawEdges(node) {
                if (!node) return;
                const p = positions[node.id];
                if (node.left) {
                    const lp = positions[node.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 23);
                    line.setAttribute("x2", lp.x); line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3.5");
                    svg.appendChild(line);
                    drawEdges(node.left);
                }
                if (node.right) {
                    const rp = positions[node.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 23);
                    line.setAttribute("x2", rp.x); line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3.5");
                    svg.appendChild(line);
                    drawEdges(node.right);
                }
            }
            drawEdges(root);

            function drawNodes(node) {
                if (!node) return;
                const p = positions[node.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", p.x); c.setAttribute("cy", p.y + 20);
                c.setAttribute("r", "23"); c.setAttribute("fill", "#21262d");
                c.setAttribute("stroke", "#555"); c.setAttribute("stroke-width", "4");
                c.setAttribute("id", node.id);
                g.appendChild(c);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", p.x); t.setAttribute("y", p.y + 26);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", "#c9d1d9");
                t.setAttribute("font-size", "15"); t.setAttribute("font-weight", "bold");
                t.textContent = node.val;
                g.appendChild(t);
                svg.appendChild(g);

                drawNodes(node.left);
                drawNodes(node.right);
            }
            drawNodes(root);
        }

        function highlightNode(id, color) {
            const c = document.getElementById(id);
            if (c) {
                c.setAttribute('stroke', color);
                c.setAttribute('stroke-width', '8');
            }
        }

        function generateSteps() {
            steps = [];
            globalMax = 0;

            function addStep(panel, log, color, extra = {}) {
                steps.push({panel, log, logColor: color, ...extra});
            }

            function largestBST(node, depth = 0) {
                if (!node) {
                    addStep(`Depth ${depth}: null`, 'Return {isBST: true, size: 0, min: ∞, max: -∞}', 'var(--accent-green)');
                    return {isBST: true, size: 0, min: Infinity, max: -Infinity};
                }

                addStep(`Visiting node <b>${node.val}</b>`, `Depth ${depth}`, 'var(--accent-blue)', {id: node.id});

                const left = largestBST(node.left, depth + 1);
                const right = largestBST(node.right, depth + 1);

                let isBST = left.isBST && right.isBST && 
                           (left.size === 0 || node.val > left.max) && 
                           (right.size === 0 || node.val < right.min);

                let size = isBST ? left.size + right.size + 1 : 0;
                let minVal = Math.min(node.val, left.min, right.min);
                let maxVal = Math.max(node.val, left.max, right.max);

                if (isBST) {
                    globalMax = Math.max(globalMax, size);
                    addStep(`<b>${node.val}</b> forms BST of size ${size}`, 
                           `Global Max = ${globalMax}`, 'var(--accent-green)', {id: node.id, isBST: true});
                } else {
                    size = Math.max(left.size, right.size);
                    addStep(`<b>${node.val}</b> is NOT BST`, 
                           `Taking max from children = ${size}`, 'var(--accent-red)', {id: node.id});
                }

                return {isBST, size, min: minVal, max: maxVal};
            }

            addStep('Starting Bottom-Up Largest BST Search', 'Return {isBST, size, min, max} per subtree', 'var(--accent-orange)');
            largestBST(root);
            addStep(`<span style="color:var(--accent-green);font-size:20px">✅ Largest BST Size: ${globalMax}</span>`, 
                   `Final Answer`, 'var(--accent-green)', {complete: true});
        }

        function renderStep(idx) {
            const s = steps[idx];
            if (!s) return;

            buildTreeSVG();
            if (s.id) highlightNode(s.id, s.isBST ? '#3fb950' : '#e3b341');

            document.getElementById('main-panel').innerHTML = s.panel;
            document.getElementById('max-size').textContent = globalMax;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.color = steps[i].logColor || 'var(--text-main)';
                line.textContent = steps[i].log;
                logPanel.appendChild(line);
            }
            logPanel.scrollTop = logPanel.scrollHeight;

            document.getElementById('result').textContent = `Largest BST Subtree Size: ${globalMax}`;
        }

        function next() { if (stepIndex < steps.length-1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = '⏸ Pause';
                if (stepIndex >= steps.length-1) stepIndex = 0;
                timer = setInterval(() => {
                    if (stepIndex < steps.length-1) next();
                    else pause();
                }, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            if (timer) clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = '▶ Play';
        }

        function loadExample(n) {
            const examples = [
                "[10,5,15,1,8,null,7]",
                "[5,3,6,2,4,null,7]",
                "[1,2,3]"
            ];
            document.getElementById('tree-input').value = examples[n];
            loadCustom();
        }

        function loadCustom() {
            root = parseLevelOrder(document.getElementById('tree-input').value);
            buildTreeSVG();
            generateSteps();
            reset();
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
