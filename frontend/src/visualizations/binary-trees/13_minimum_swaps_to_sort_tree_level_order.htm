<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Swaps to Sort Tree Level Order - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* element being placed / active   */
            --accent-blue:   #06b6d4;   /* current cycle / chrome          */
            --accent-green:  #22c55e;   /* fixed / sorted / done           */
            --accent-red:    #f43f5e;   /* error / empty                   */
            --accent-purple: #a855f7;   /* cycle accent                    */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 230px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); padding: 18px; display: flex; flex-direction: column; gap: 16px; }

        /* -- tree svg -- */
        .tree-wrap { width: 100%; overflow: auto; scrollbar-width: thin; display: flex; justify-content: center; }
        .tree-wrap::-webkit-scrollbar { height: 8px; width: 8px; }
        .tree-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .tree-svg { display: block; max-width: 100%; height: auto; }
        .tree-svg line.edge { stroke: rgba(255,255,255,0.16); stroke-width: 2.5; transition: stroke 0.35s; }
        .tree-svg line.edge.lit { stroke: rgba(6,182,212,0.55); }
        .nc { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.22); stroke-width: 2.5; transition: fill 0.35s, stroke 0.35s, stroke-width 0.2s; }
        .nl { fill: var(--text-dim); font-family: var(--mono); font-weight: 800; font-size: 16px; transition: fill 0.35s; pointer-events: none; }
        .ni { fill: #4b5772; font-family: var(--mono); font-weight: 700; font-size: 9.5px; pointer-events: none; }
        g.node.incycle .nc { fill: rgba(168,85,247,0.16); stroke: var(--accent-purple); stroke-width: 3.5; filter: drop-shadow(0 0 6px rgba(168,85,247,0.5)); }
        g.node.incycle .nl { fill: #e9d5ff; }
        g.node.active .nc { fill: rgba(245,165,36,0.22); stroke: var(--accent-orange); stroke-width: 4; filter: drop-shadow(0 0 9px rgba(245,165,36,0.65)); }
        g.node.active .nl { fill: #ffd591; }
        g.node.done .nc { fill: rgba(34,197,94,0.18); stroke: var(--accent-green); stroke-width: 3; }
        g.node.done .nl { fill: #b9f6ca; }

        /* -- side panels -- */
        .panels { display: grid; grid-template-columns: 1fr; gap: 14px; }
        @media (min-width: 720px) { .panels { grid-template-columns: 1fr 1fr; } }
        .mini { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 10px 12px; min-height: 96px; }
        .mini-head { font-family: var(--mono); font-size: 10.5px; font-weight: 700; letter-spacing: 1.1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; display: flex; align-items: center; gap: 7px; }
        .mini-head .dot { width: 7px; height: 7px; border-radius: 50%; }
        .mini-head.q .dot { background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .mini-head.o .dot { background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }

        /* level-order array as index/value tiles */
        .arr-row { display: flex; gap: 7px; align-items: flex-start; flex-wrap: nowrap; overflow-x: auto; padding: 4px 2px 6px; scrollbar-width: thin; }
        .arr-row::-webkit-scrollbar { height: 6px; }
        .arr-row::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 6px; }
        .a-cell { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .a-idx { font-family: var(--mono); font-size: 9.5px; color: var(--text-dim); }
        .a-tile { min-width: 38px; height: 40px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-weight: 800; font-size: 16px; border: 2px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.04); color: var(--text-main); transition: border-color 0.3s, background 0.3s, color 0.3s; will-change: transform; }
        .a-tile.target { border-color: rgba(255,255,255,0.16); }
        .a-tile.incycle { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 12px rgba(168,85,247,0.4); }
        .a-tile.active { border-color: var(--accent-orange); background: rgba(245,165,36,0.18); color: #ffd591; box-shadow: 0 0 14px rgba(245,165,36,0.45); transform: translateY(-2px); }
        .a-tile.fixed { border-color: var(--accent-green); background: rgba(34,197,94,0.14); color: #b9f6ca; }
        .a-arrow { font-family: var(--mono); font-size: 11px; color: var(--text-dim); height: 12px; }

        .cyc-list { display: flex; flex-direction: column; gap: 7px; }
        .cyc-item { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; font-family: var(--mono); font-size: 13px; }
        .cyc-tag { font-size: 10.5px; color: var(--text-dim); min-width: 36px; }
        .cyc-chip { padding: 2px 9px; border-radius: 7px; border: 2px solid rgba(34,197,94,0.45); background: rgba(34,197,94,0.12); color: #b9f6ca; font-weight: 800; will-change: transform; }
        .cyc-chip.cur { border-color: var(--accent-purple); background: rgba(168,85,247,0.18); color: #e9d5ff; box-shadow: 0 0 12px rgba(168,85,247,0.4); }
        .cyc-empty { font-family: var(--mono); font-size: 12.5px; color: var(--text-dim); padding: 10px 2px; }

        .action-stage { position: relative; min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: center; min-height: 40px; }
        .ans-tile { min-width: 34px; height: 46px; padding: 0 14px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 22px; font-weight: 800; border: 2px solid var(--accent-green); background: rgba(34,197,94,0.16); color: #b9f6ca; box-shadow: 0 0 12px rgba(34,197,94,0.35); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); } .pill.b b { color: var(--accent-orange); } .pill.g b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Tree =</label>
        <input type="text" id="tree-input" placeholder="[1,3,2,4,5,6]" value="[1,3,2,4,5,6]">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">[1,3,2,4,5,6]</button>
        <button onclick="loadExample(1)">[7,6,5,4,3,2,1]</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Minimum Swaps to Sort Tree Level Order <span class="sub">&middot; cycle decomposition &middot; swaps = n &minus; cycles &middot; O(n log n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="tree-wrap">
                    <svg id="tree-svg" class="tree-svg" viewBox="0 0 520 340"></svg>
                </div>
                <div class="panels">
                    <div class="mini">
                        <div class="mini-head q"><span class="dot"></span> Level-order array &middot; index &amp; value</div>
                        <div class="arr-row" id="arr-row"></div>
                    </div>
                    <div class="mini">
                        <div class="mini-head o"><span class="dot"></span> Cycles found</div>
                        <div class="cyc-list" id="cyc-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill">n <b id="st-n">0</b></span>
                            <span class="pill c">cycles <b id="st-cycles">0</b></span>
                            <span class="pill b">cycle length <b id="st-clen">&mdash;</b></span>
                            <span class="pill g">swaps so far <b id="st-swaps">0</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // --- Motion engine (spring pop, zero deps) ---
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED || !el) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.4 + 0.66 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // --- State ---
        let targetTree = null;
        let levelOrder = [];      // the level-order value array (no nulls)
        let nodeIds = [];         // stable id per array slot, parallel to levelOrder
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 720, 330];
        const nodeEls = {};       // id -> <g> element (persistent registry)
        const SVGNS = "http://www.w3.org/2000/svg";

        // --- Algorithm code panel ---
        const CODE = [
            [['kw','def '],['fn','minSwaps'],['src','(arr):']],
            [['src','  n = len(arr)']],
            [['src','  target = sorted(arr)']],
            [['src','  pos = {v:i for i,v in enumerate(target)}']],
            [['src','  perm = [pos[v] for v in arr]']],
            [['src','  seen = [False]*n']],
            [['src','  cycles = 0']],
            [['kw','  for '],['src','i in range(n):']],
            [['kw','    if '],['src','seen[i]: continue']],
            [['src','    cycles += 1; j = i']],
            [['kw','    while not '],['src','seen[j]:']],
            [['src','      seen[j] = True; j = perm[j]']],
            [['kw','  return '],['src','n - cycles']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // --- tree model ---
        class TreeNode {
            constructor(val, id) { this.val = val; this.left = null; this.right = null; this.id = id; }
        }
        // parse and ALSO produce the flat level-order array (skipping nulls), keyed by stable id
        function parseLevelOrder(str) {
            let arr;
            try { arr = JSON.parse(str); } catch (e) { return null; }
            if (!Array.isArray(arr) || arr.length === 0 || arr[0] === null) return null;
            const root = new TreeNode(arr[0], 'n0');
            let queue = [root], i = 1;
            while (queue.length && i < arr.length) {
                const node = queue.shift();
                if (i < arr.length && arr[i] !== null) { node.left = new TreeNode(arr[i], 'n' + i); queue.push(node.left); }
                i++;
                if (i < arr.length && arr[i] !== null) { node.right = new TreeNode(arr[i], 'n' + i); queue.push(node.right); }
                i++;
            }
            return root;
        }
        // BFS the built tree to get the level-order sequence of (val,id), index === array slot
        function bfsLevelOrder(root) {
            const vals = [], ids = [];
            if (!root) return { vals, ids };
            const q = [root];
            while (q.length) {
                const n = q.shift();
                vals.push(n.val); ids.push(n.id);
                if (n.left) q.push(n.left);
                if (n.right) q.push(n.right);
            }
            return { vals, ids };
        }

        // --- tree SVG (built ONCE per load; steps only toggle classes) ---
        function buildTreeSVG(root) {
            const svg = document.getElementById('tree-svg'); svg.innerHTML = '';
            Object.keys(nodeEls).forEach(k => delete nodeEls[k]);
            if (!root) { svg.setAttribute('viewBox', '0 0 520 160'); return; }

            // recursive layout: left at x-dx, right at x+dx, dx shrinks ~1.8 per depth
            const pos = {};
            function assign(n, x, y, dx, d) {
                if (!n) return;
                pos[n.id] = { x, y };
                assign(n.left,  x - dx, y + 78, dx / 1.8, d + 1);
                assign(n.right, x + dx, y + 78, dx / 1.8, d + 1);
            }
            assign(root, 0, 0, 130, 0);

            const xs = Object.values(pos).map(p => p.x), ys = Object.values(pos).map(p => p.y);
            const pad = 38;
            const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + pad;
            const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + pad;
            const w = maxX - minX, h = maxY - minY;
            svg.setAttribute('viewBox', `${minX} ${minY} ${w} ${h}`);
            svg.style.maxHeight = Math.min(360, h * 1.1) + 'px';

            // edges first (under nodes)
            (function edges(n) {
                if (!n) return;
                [n.left, n.right].forEach(c => {
                    if (!c) return;
                    const a = pos[n.id], b = pos[c.id];
                    const ln = document.createElementNS(SVGNS, 'line');
                    ln.setAttribute('class', 'edge'); ln.dataset.child = c.id;
                    ln.setAttribute('x1', a.x); ln.setAttribute('y1', a.y);
                    ln.setAttribute('x2', b.x); ln.setAttribute('y2', b.y);
                    svg.appendChild(ln); edges(c);
                });
            })(root);

            // map id -> array slot index for the small subscript label
            const idxOf = {}; nodeIds.forEach((id, i) => idxOf[id] = i);

            // nodes: each a <g class="node"> with <circle class="nc"> + <text class="nl"> + index sub-label
            (function nodes(n) {
                if (!n) return;
                const p = pos[n.id];
                const g = document.createElementNS(SVGNS, 'g'); g.setAttribute('class', 'node'); g.dataset.id = n.id;
                g.dataset.val = n.val;
                g.style.transformOrigin = `${p.x}px ${p.y}px`;
                const c = document.createElementNS(SVGNS, 'circle');
                c.setAttribute('class', 'nc'); c.setAttribute('cx', p.x); c.setAttribute('cy', p.y); c.setAttribute('r', 20);
                const t = document.createElementNS(SVGNS, 'text');
                t.setAttribute('class', 'nl'); t.setAttribute('x', p.x); t.setAttribute('y', p.y + 5.5); t.setAttribute('text-anchor', 'middle');
                t.textContent = n.val;
                const sub = document.createElementNS(SVGNS, 'text');
                sub.setAttribute('class', 'ni'); sub.setAttribute('x', p.x + 17); sub.setAttribute('y', p.y - 14); sub.setAttribute('text-anchor', 'middle');
                sub.textContent = 'i' + (idxOf[n.id] != null ? idxOf[n.id] : '');
                g.appendChild(c); g.appendChild(t); g.appendChild(sub); svg.appendChild(g);
                nodeEls[n.id] = g;
                nodes(n.left); nodes(n.right);
            })(root);
        }

        // --- step generation (immutable snapshots) ---
        function generateSteps() {
            steps = [];
            const base = {
                arr: levelOrder.slice(),
                target: [],
                perm: [],
                arrState: {},        // index -> 'incycle' | 'active' | 'fixed'
                activeIds: [],       // tree node ids highlighted active (orange)
                cycleIds: [],        // tree node ids in current cycle (purple)
                doneIds: [],         // tree node ids resolved (green)
                cycles: [],          // [{nodes:[idx...], cur:bool}]
                curCycleIdx: null,
                cyclesCount: 0,
                clen: null,
                swaps: 0,
            };
            const snap = (extra) => Object.assign({}, base, extra,
                extra && extra.arrState ? {} : { arrState: {} });

            if (!targetTree || levelOrder.length === 0) {
                steps.push(Object.assign({}, base, {
                    code: [1], action: '✕ empty', actionColor: 'var(--accent-red)', complete: true,
                    panel: `The input describes an <b>empty tree</b>. There is nothing to sort, so the minimum number of swaps is <b>0</b>.`,
                    answer: 0, log: 'init  empty tree -> 0 swaps'
                }));
                return;
            }

            const n = levelOrder.length;
            const arr = levelOrder.slice();
            const ids = nodeIds.slice();

            // target = sorted copy; perm[i] = index where arr[i] must end up
            const target = arr.slice().sort((a, b) => a - b);
            // handle duplicates deterministically via a per-value queue of target indices
            const slots = {};
            target.forEach((v, i) => { (slots[v] = slots[v] || []).push(i); });
            const perm = arr.map(v => slots[v].shift());
            // rebuild slots untouched (we consumed them); recompute target tiles unchanged

            steps.push(Object.assign({}, base, {
                target: target.slice(), perm: perm.slice(),
                code: [0, 1], action: 'READ ARRAY', actionColor: 'var(--accent-blue)',
                panel: `Read the tree in <b>level order</b>: <code>[${arr.join(', ')}]</code> (BFS, ignoring empty slots). The goal: sort this array into ascending order using the fewest <b>swaps of any two positions</b>.`,
                log: `init  level-order = [${arr.join(', ')}]`
            }));

            steps.push(Object.assign({}, base, {
                target: target.slice(), perm: perm.slice(),
                code: [2], action: 'TARGET = sorted', actionColor: 'var(--accent-blue)',
                panel: `The sorted target is <code>[${target.join(', ')}]</code>. Each value must move from its current index to its index in this sorted array.`,
                log: `target = [${target.join(', ')}]`
            }));

            steps.push(Object.assign({}, base, {
                target: target.slice(), perm: perm.slice(),
                code: [3, 4], action: 'PERM = mapping', actionColor: 'var(--accent-purple)',
                panel: `Build the permutation <code>perm[i]</code> = the index where <code>arr[i]</code> belongs. Here <code>perm = [${perm.join(', ')}]</code>. Sorting decomposes into independent <b>cycles</b>; a cycle of length <code>L</code> costs <code>L &minus; 1</code> swaps.`,
                log: `perm = [${perm.join(', ')}]`
            }));

            // cycle decomposition
            const seen = new Array(n).fill(false);
            const cyclesDone = [];   // accumulates {nodes:[idx]} as we close each
            let cyclesCount = 0;
            let swaps = 0;
            const doneIds = [];

            for (let i = 0; i < n; i++) {
                if (seen[i]) continue;

                // walk the cycle starting at i
                const cyc = [];
                let j = i;
                while (!seen[j]) { seen[j] = true; cyc.push(j); j = perm[j]; }
                cyclesCount++;
                const isFixed = cyc.length === 1;
                const cost = cyc.length - 1;
                swaps += cost;

                // snapshot: highlight this cycle (purple), with array states
                const arrState = {};
                cyclesDone.forEach(c => c.nodes.forEach(k => { arrState[k] = 'fixed'; }));
                cyc.forEach(k => { arrState[k] = 'incycle'; });

                const cyclesSnap = cyclesDone.map(c => ({ nodes: c.nodes.slice(), cur: false }))
                    .concat([{ nodes: cyc.slice(), cur: true }]);

                steps.push(Object.assign({}, base, {
                    target: target.slice(), perm: perm.slice(),
                    arrState,
                    cycleIds: cyc.map(k => ids[k]),
                    activeIds: [ids[i]],
                    doneIds: doneIds.slice(),
                    cycles: cyclesSnap,
                    curCycleIdx: cyclesCount - 1,
                    cyclesCount, clen: cyc.length, swaps,
                    code: [7, 8, 9, 10, 11],
                    action: isFixed ? `(${arr[cyc[0]]}) already placed` : `cycle (${cyc.map(k => arr[k]).join(' → ')})`,
                    actionColor: isFixed ? 'var(--accent-green)' : 'var(--accent-purple)',
                    panel: isFixed
                        ? `Start at index <code>${i}</code> (value <code>${arr[i]}</code>). <code>perm[${i}] = ${perm[i]}</code>, a <b>fixed point</b> &mdash; a cycle of length&nbsp;1. It is already in place, costing <b>0</b> swaps.`
                        : `Walk the cycle from index <code>${i}</code>: <code>${cyc.map(k => k).join(' → ')} → ${i}</code>. By value that is <code>(${cyc.map(k => arr[k]).join(' → ')})</code>, a cycle of length <b>${cyc.length}</b>, costing <code>${cyc.length} &minus; 1 = ${cost}</code> swap${cost === 1 ? '' : 's'}.`,
                    log: isFixed
                        ? `cycle #${cyclesCount}: (${arr[cyc[0]]})  len 1  +0 swaps`
                        : `cycle #${cyclesCount}: (${cyc.map(k => arr[k]).join(' ')})  len ${cyc.length}  +${cost} swaps  total ${swaps}`
                }));

                // close cycle -> its nodes become done (green)
                cyc.forEach(k => doneIds.push(ids[k]));
                cyclesDone.push({ nodes: cyc.slice() });
            }

            // final answer
            const finalArrState = {};
            cyclesDone.forEach(c => c.nodes.forEach(k => finalArrState[k] = 'fixed'));
            const finalCycles = cyclesDone.map(c => ({ nodes: c.nodes.slice(), cur: false }));
            steps.push(Object.assign({}, base, {
                target: target.slice(), perm: perm.slice(),
                arrState: finalArrState,
                doneIds: ids.slice(),
                cycles: finalCycles,
                cyclesCount, clen: null, swaps,
                complete: true, confetti: true,
                code: [12], action: `✓ ${swaps} swap${swaps === 1 ? '' : 's'}`, actionColor: 'var(--accent-green)',
                answer: swaps,
                panel: `Done. The ${n} elements split into <b>${cyclesCount}</b> cycle${cyclesCount === 1 ? '' : 's'}, so the minimum number of swaps is <code>n &minus; cycles = ${n} &minus; ${cyclesCount} = <b>${swaps}</b></code>.`,
                log: `done  n - cycles = ${n} - ${cyclesCount} = ${swaps} swaps`
            }));
        }

        // --- render (pure; persistent DOM keyed by stable ids) ---
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // 1) tree node classes (toggle only)
            for (const id in nodeEls) nodeEls[id].classList.remove('incycle', 'active', 'done');
            (step.doneIds || []).forEach(id => { if (nodeEls[id]) nodeEls[id].classList.add('done'); });
            (step.cycleIds || []).forEach(id => { if (nodeEls[id]) { nodeEls[id].classList.remove('done'); nodeEls[id].classList.add('incycle'); } });
            (step.activeIds || []).forEach(id => { if (nodeEls[id]) { nodeEls[id].classList.remove('done', 'incycle'); nodeEls[id].classList.add('active'); Motion.pop(nodeEls[id]); } });
            // light edges into highlighted (cycle/active) nodes
            const litSet = new Set([...(step.cycleIds || []), ...(step.activeIds || [])]);
            document.querySelectorAll('#tree-svg line.edge').forEach(ln => {
                ln.classList.toggle('lit', litSet.has(ln.dataset.child));
            });

            // 2) level-order array tiles (value over target index)
            const arrRow = document.getElementById('arr-row'); arrRow.innerHTML = '';
            (step.arr || []).forEach((v, i) => {
                const cell = document.createElement('div'); cell.className = 'a-cell';
                const idxL = document.createElement('div'); idxL.className = 'a-idx'; idxL.textContent = 'i' + i; cell.appendChild(idxL);
                const tile = document.createElement('div'); tile.className = 'a-tile';
                const stt = step.arrState ? step.arrState[i] : null;
                if (stt) tile.classList.add(stt);
                tile.textContent = v; cell.appendChild(tile);
                const arrow = document.createElement('div'); arrow.className = 'a-arrow';
                arrow.textContent = step.perm && step.perm.length ? ('→' + step.perm[i]) : '';
                cell.appendChild(arrow);
                arrRow.appendChild(cell);
                if (stt === 'incycle' || stt === 'active') Motion.pop(tile);
            });

            // 3) cycles list
            const cl = document.getElementById('cyc-list'); cl.innerHTML = '';
            if (!step.cycles || step.cycles.length === 0) {
                const e = document.createElement('div'); e.className = 'cyc-empty'; e.textContent = 'no cycles closed yet';
                cl.appendChild(e);
            } else {
                step.cycles.forEach((c, ci) => {
                    const item = document.createElement('div'); item.className = 'cyc-item';
                    const tag = document.createElement('span'); tag.className = 'cyc-tag'; tag.textContent = '#' + (ci + 1); item.appendChild(tag);
                    const chip = document.createElement('span'); chip.className = 'cyc-chip' + (c.cur ? ' cur' : '');
                    const vals = c.nodes.map(k => step.arr[k]);
                    chip.textContent = '(' + vals.join(' → ') + ')';
                    item.appendChild(chip);
                    const cost = document.createElement('span'); cost.className = 'cyc-tag';
                    cost.textContent = (c.nodes.length - 1) + ' swap' + (c.nodes.length - 1 === 1 ? '' : 's');
                    item.appendChild(cost);
                    cl.appendChild(item);
                    if (c.cur) Motion.pop(chip);
                });
            }

            // 4) final answer track + confetti
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.complete && step.answer != null) {
                const t = document.createElement('div'); t.className = 'ans-tile';
                t.textContent = step.answer + ' swap' + (step.answer === 1 ? '' : 's'); at.appendChild(t);
            }

            // 5) narration / action / code
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // 6) state pills
            document.getElementById('st-n').textContent = (step.arr || []).length;
            document.getElementById('st-cycles').textContent = step.cyclesCount || 0;
            document.getElementById('st-clen').textContent = step.clen != null ? step.clen : '—';
            document.getElementById('st-swaps').textContent = step.swaps || 0;

            // 7) chrome
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // --- controls ---
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function loadTree(str) {
            pause();
            targetTree = parseLevelOrder(str);
            const bfs = bfsLevelOrder(targetTree);
            levelOrder = bfs.vals;
            nodeIds = bfs.ids;
            buildTreeSVG(targetTree);
            generateSteps();
            confettiArmed = true;
            renderStep(0);
        }
        function loadCustom() {
            const v = (document.getElementById('tree-input').value || '').trim();
            if (v.length) loadTree(v);
        }
        function loadExample(n) {
            const ex = ['[1,3,2,4,5,6]', '[7,6,5,4,3,2,1]'][n];
            document.getElementById('tree-input').value = ex;
            loadTree(ex);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('tree-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });

        buildCodePanel();
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const exIdx = parseInt(params.get('example') || '0', 10);
            loadExample(exIdx === 1 ? 1 : 0);
        };
    </script>
</body>
</html>
