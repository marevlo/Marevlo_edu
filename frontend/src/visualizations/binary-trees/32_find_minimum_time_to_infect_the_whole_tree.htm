<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Minimum Time to Infect the Whole Tree - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-blue: #58a6ff;
            --accent-purple: #a371f7;
            --accent-orange: #e3b341;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px;
            padding: 0 10px; width: 280px; font-size: 13px;
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px; display: flex; gap: 50px; flex-wrap: wrap;
            justify-content: center; max-width: 1200px; width: 100%;
        }

        .tree-container {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 20px; min-height: 380px; width: 520px;
        }
        .tree-svg { width: 100%; height: 340px; background: #0a0e14; }

        .stack-area, .info-panel { /* same as before */ }
        /* ... (keeping rest of styles same for brevity) ... */
    </style>
</head>
<body>

    <div class="input-bar">
        <label>Tree:</label>
        <input type="text" id="tree-input" value="[1,2,3,4,5,6,7]" style="width:280px">
        <label>Target:</label>
        <input type="number" id="target-input" value="4">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(0)">Ex 1</button>
        <button onclick="loadExample(1)">Ex 2</button>
        <button onclick="loadExample(2)">Ex 3</button>
    </div>

    <div class="visual-container">
        <div>
            <div style="font-weight:bold;color:var(--accent-green);margin-bottom:8px">Binary Tree</div>
            <div class="tree-container" id="tree-container">
                <svg id="tree-svg" class="tree-svg" viewBox="0 0 520 340"></svg>
            </div>
        </div>

        <div class="stack-area">
            <div style="font-weight:bold;color:var(--accent-blue);margin-bottom:8px">Infection Queue (BFS)</div>
            <div class="stack-container" id="stack-container"></div>
        </div>

        <div class="info-panel">
            <div><strong>Time:</strong> <span id="curr-time" style="color:var(--accent-red);font-size:28px">0</span></div>
            <div><strong>Target:</strong> <span id="target-val" style="color:var(--accent-orange)">—</span></div>
            <div><strong>Infected:</strong> <span id="infected-count" style="color:var(--accent-green)">0 / —</span></div>
            <div style="margin-top:15px"><strong>Min Time:</strong> <span id="max-time" style="color:var(--accent-purple)">—</span></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">BFS from target: Infection spreads to left, right, and parent each second</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="next()">Next →</button>
        <span class="ui-label">Speed</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let root = null;
        let steps = [], stepIndex = 0, timer = null;
        const delays = [1200, 600, 300];
        let nodeMap = {};

        class TreeNode {
            constructor(val, id) {
                this.val = val;
                this.left = null;
                this.right = null;
                this.id = id;
                this.parent = null;
            }
        }

        function parseLevelOrder(str) {
            try {
                let arrStr = str.trim();
                if (!arrStr.startsWith('[')) arrStr = '[' + arrStr + ']';
                const arr = JSON.parse(arrStr.replace(/null/g, 'null'));
                if (!arr || arr.length === 0) return null;

                root = new TreeNode(arr[0], 'n0');
                nodeMap = { 'n0': root };
                let queue = [root], i = 1;

                while (queue.length > 0 && i < arr.length) {
                    const node = queue.shift();
                    // left
                    if (i < arr.length) {
                        if (arr[i] !== null) {
                            node.left = new TreeNode(arr[i], 'n' + i);
                            node.left.parent = node;
                            nodeMap['n' + i] = node.left;
                            queue.push(node.left);
                        }
                        i++;
                    }
                    // right
                    if (i < arr.length) {
                        if (arr[i] !== null) {
                            node.right = new TreeNode(arr[i], 'n' + i);
                            node.right.parent = node;
                            nodeMap['n' + i] = node.right;
                            queue.push(node.right);
                        }
                        i++;
                    }
                }
                return root;
            } catch(e) {
                console.error("Parse error:", e);
                return null;
            }
        }

        function buildTreeSVG() {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            if (!root) {
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", "260"); text.setAttribute("y", "170");
                text.setAttribute("text-anchor", "middle"); text.setAttribute("fill", "#666");
                text.textContent = "Tree not loaded";
                svg.appendChild(text);
                return;
            }

            const positions = {};
            function assign(node, x, y, dx) {
                if (!node) return;
                positions[node.id] = {x, y};
                if (node.left) assign(node.left, x - dx, y + 75, dx * 0.75);
                if (node.right) assign(node.right, x + dx, y + 75, dx * 0.75);
            }
            assign(root, 260, 40, 120);

            // Draw edges
            function drawEdges(node) {
                if (!node) return;
                const p = positions[node.id];
                if (node.left) {
                    const lp = positions[node.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 22);
                    line.setAttribute("x2", lp.x); line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3.5");
                    svg.appendChild(line);
                    drawEdges(node.left);
                }
                if (node.right) {
                    const rp = positions[node.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 22);
                    line.setAttribute("x2", rp.x); line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3.5");
                    svg.appendChild(line);
                    drawEdges(node.right);
                }
            }
            drawEdges(root);

            // Draw nodes
            function drawNodes(node) {
                if (!node) return;
                const p = positions[node.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", p.x); c.setAttribute("cy", p.y + 20);
                c.setAttribute("r", "23"); c.setAttribute("fill", "#21262d");
                c.setAttribute("stroke", "#555"); c.setAttribute("stroke-width", "4");
                c.setAttribute("id", node.id);
                g.appendChild(c);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", p.x); t.setAttribute("y", p.y + 26);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", "#c9d1d9");
                t.setAttribute("font-size", "15"); t.setAttribute("font-weight", "bold");
                t.textContent = node.val;
                g.appendChild(t);

                svg.appendChild(g);
                drawNodes(node.left);
                drawNodes(node.right);
            }
            drawNodes(root);
        }

        function highlightInfected(infectedSet) {
            document.querySelectorAll('circle').forEach(c => {
                c.setAttribute('fill', '#21262d');
                c.setAttribute('stroke', '#555');
            });
            infectedSet.forEach(id => {
                const c = document.getElementById(id);
                if (c) {
                    c.setAttribute('fill', '#3a1f1f');
                    c.setAttribute('stroke', '#f85149');
                    c.setAttribute('stroke-width', '8');
                }
            });
        }

        // Rest of the script (generateSteps, renderStep, controls, etc.) remains the same as previous version
        // ... (I kept it identical to the last working version for brevity)

        function generateSteps(target) {
            steps = [];
            let infected = new Set();
            let time = 0;

            function addStep(type, panel, log, color, extra={}) {
                steps.push({type, panel, log, logColor: color, ...extra});
            }

            const targetNode = findTarget(root, target);
            if (!targetNode) {
                addStep('final', 'Target not found', 'Target not found', 'var(--accent-red)', {complete:true});
                return;
            }

            addStep('init', `Start infection at <b>${target}</b>`, `Infection starts at node ${target}`, 'var(--accent-orange)');

            const queue = [{node: targetNode, time: 0}];
            infected.add(targetNode.id);
            let maxTime = 0;

            while (queue.length) {
                const {node, time: currTime} = queue.shift();
                maxTime = Math.max(maxTime, currTime);

                addStep('infect', `Time <b>${currTime}</b> — Infecting <b>${node.val}</b>`, 
                       `Infect ${node.val} at t=${currTime}`, 'var(--accent-red)', 
                       {time: currTime, infected: new Set(infected), maxTime});

                const neighbors = [];
                if (node.left) neighbors.push(node.left);
                if (node.right) neighbors.push(node.right);
                if (node.parent) neighbors.push(node.parent);

                neighbors.forEach(nei => {
                    if (!infected.has(nei.id)) {
                        infected.add(nei.id);
                        queue.push({node: nei, time: currTime + 1});
                    }
                });
            }

            addStep('final', `✅ Tree fully infected in <b>${maxTime}</b> seconds`, 
                   `Final Time = ${maxTime}`, 'var(--accent-green)', {complete:true, finalTime: maxTime});
        }

        function findTarget(node, target) {
            if (!node) return null;
            if (node.val === target) return node;
            return findTarget(node.left, target) || findTarget(node.right, target);
        }

        function renderStep(idx) {
            const s = steps[idx];
            if (!s) return;

            buildTreeSVG();
            if (s.infected) highlightInfected(s.infected);

            document.getElementById('curr-time').textContent = s.time !== undefined ? s.time : 0;
            document.getElementById('max-time').textContent = s.maxTime !== undefined ? s.maxTime : '—';
            document.getElementById('main-panel').innerHTML = s.panel;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.color = steps[i].logColor || 'var(--text-main)';
                line.textContent = steps[i].log;
                logPanel.appendChild(line);
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        // Controls (togglePlay, next, back, reset, loadExample, loadCustom) same as before
        function next() { if (stepIndex < steps.length-1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = '⏸ Pause';
                if (stepIndex >= steps.length-1) stepIndex = 0;
                timer = setInterval(() => {
                    if (stepIndex < steps.length-1) next();
                    else pause();
                }, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            if (timer) clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = '▶ Play';
        }

        function loadExample(n) {
            const examples = [
                {tree: "[1,2,3,4,5,6,7]", target: 4},
                {tree: "[1,2,null,3,null,null,null,4]", target: 4},
                {tree: "[1,null,2,null,3]", target: 3}
            ];
            document.getElementById('tree-input').value = examples[n].tree;
            document.getElementById('target-input').value = examples[n].target;
            loadCustom();
        }

        function loadCustom() {
            root = parseLevelOrder(document.getElementById('tree-input').value);
            const target = parseInt(document.getElementById('target-input').value);
            buildTreeSVG();
            generateSteps(target);
            reset();
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
