<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Time to Infect the Whole Tree - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* start node / dequeued frontier   */
            --accent-blue:   #06b6d4;   /* queued node / chrome             */
            --accent-green:  #22c55e;   /* settled / done                   */
            --accent-red:    #f43f5e;   /* infection wavefront / error      */
            --accent-purple: #a855f7;   /* minute accent                    */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(244,63,94,0.20), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"], input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"] { width: 230px; }
        input[type="number"] { width: 64px; }
        input[type="text"]:focus, input[type="number"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); padding: 18px; display: flex; flex-direction: column; gap: 16px; }

        /* -- tree svg -- */
        .tree-wrap { width: 100%; overflow: auto; scrollbar-width: thin; display: flex; justify-content: center; }
        .tree-wrap::-webkit-scrollbar { height: 8px; width: 8px; }
        .tree-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .tree-svg { display: block; max-width: 100%; height: auto; }
        .tree-svg line.edge { stroke: rgba(255,255,255,0.16); stroke-width: 2.5; transition: stroke 0.35s; }
        .tree-svg line.edge.lit { stroke: rgba(244,63,94,0.55); }
        .nc { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.22); stroke-width: 2.5; transition: fill 0.35s, stroke 0.35s, stroke-width 0.2s; }
        .nl { fill: var(--text-dim); font-family: var(--mono); font-weight: 800; font-size: 16px; transition: fill 0.35s; pointer-events: none; }
        .nm { fill: var(--accent-purple); font-family: var(--mono); font-weight: 800; font-size: 11px; opacity: 0; transition: opacity 0.35s; pointer-events: none; }
        g.node.minlabel .nm { opacity: 1; }
        /* start node (orange) */
        g.node.start .nc { fill: rgba(245,165,36,0.22); stroke: var(--accent-orange); stroke-width: 4; filter: drop-shadow(0 0 9px rgba(245,165,36,0.65)); }
        g.node.start .nl { fill: #ffd591; }
        /* queued (blue): discovered, waiting to spread */
        g.node.inqueue .nc { fill: rgba(6,182,212,0.16); stroke: var(--accent-blue); stroke-width: 3.5; filter: drop-shadow(0 0 6px rgba(6,182,212,0.5)); }
        g.node.inqueue .nl { fill: #a5f3fc; }
        /* active (red): infection wavefront being processed now */
        g.node.active .nc { fill: rgba(244,63,94,0.24); stroke: var(--accent-red); stroke-width: 4.5; filter: drop-shadow(0 0 10px rgba(244,63,94,0.7)); }
        g.node.active .nl { fill: #fecdd3; }
        /* infected/settled (green): already spread from */
        g.node.done .nc { fill: rgba(34,197,94,0.18); stroke: var(--accent-green); stroke-width: 3; }
        g.node.done .nl { fill: #b9f6ca; }

        /* -- side panels (queue + per-minute) -- */
        .panels { display: grid; grid-template-columns: 1fr; gap: 14px; }
        @media (min-width: 720px) { .panels { grid-template-columns: 1fr 1fr; } }
        .mini { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 10px 12px; min-height: 96px; }
        .mini-head { font-family: var(--mono); font-size: 10.5px; font-weight: 700; letter-spacing: 1.1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; display: flex; align-items: center; gap: 7px; }
        .mini-head .dot { width: 7px; height: 7px; border-radius: 50%; }
        .mini-head.q .dot { background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .mini-head.o .dot { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); }

        .queue-row { display: flex; gap: 7px; align-items: center; flex-wrap: nowrap; overflow-x: auto; padding: 4px 2px 6px; scrollbar-width: thin; }
        .queue-row::-webkit-scrollbar { height: 6px; }
        .queue-row::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 6px; }
        .q-tile { flex: 0 0 auto; min-width: 38px; height: 40px; border-radius: 9px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: var(--mono); font-weight: 800; font-size: 16px; border: 2px solid rgba(6,182,212,0.45); background: rgba(6,182,212,0.10); color: #a5f3fc; will-change: transform; }
        .q-tile .qt-min { font-size: 8.5px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.5px; }
        .q-tile.front { border-color: var(--accent-red); background: rgba(244,63,94,0.18); color: #fecdd3; box-shadow: 0 0 14px rgba(244,63,94,0.45); transform: translateY(-2px); }
        .q-tile.front .qt-min { color: #fecdd3; }
        .q-empty { font-family: var(--mono); font-size: 12.5px; color: var(--text-dim); padding: 10px 2px; }

        .out-levels { display: flex; flex-direction: column; gap: 7px; }
        .lv-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
        .lv-tag { font-family: var(--mono); font-size: 10.5px; color: var(--text-dim); min-width: 46px; }
        .o-tile { min-width: 32px; height: 34px; padding: 0 8px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-weight: 800; font-size: 15px; border: 2px solid rgba(34,197,94,0.45); background: rgba(34,197,94,0.12); color: #b9f6ca; will-change: transform; }
        .o-tile.fresh { border-color: var(--accent-red); background: rgba(244,63,94,0.18); color: #fecdd3; box-shadow: 0 0 12px rgba(244,63,94,0.4); }
        .o-empty { font-family: var(--mono); font-size: 12.5px; color: var(--text-dim); padding: 10px 2px; }

        .action-stage { position: relative; min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: center; min-height: 40px; }
        .ans-tile { min-width: 34px; height: 40px; padding: 0 12px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 18px; font-weight: 800; border: 2px solid var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 12px rgba(168,85,247,0.35); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); } .pill.b b { color: var(--accent-orange); } .pill.g b { color: var(--accent-green); } .pill.r b { color: var(--accent-red); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Tree =</label>
        <input type="text" id="tree-input" placeholder="[1,2,3,4,5,6,7]" value="[1,2,3,4,5,6,7]">
        <label class="ui-label">start =</label>
        <input type="number" id="target-input" value="4">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">[1,2,3,4,5,6,7] @4 &rarr; 4</button>
        <button onclick="loadExample(1)">chain @4 &rarr; 3</button>
        <button onclick="loadExample(2)">spine @3 &rarr; 2</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Minimum Time to Infect the Whole Tree <span class="sub">&middot; BFS from start, spread to children &amp; parent &middot; answer = max minute &middot; O(n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="tree-wrap">
                    <svg id="tree-svg" class="tree-svg" viewBox="0 0 520 340"></svg>
                </div>
                <div class="panels">
                    <div class="mini">
                        <div class="mini-head q"><span class="dot"></span> BFS Queue (front &#8594; back, with minute)</div>
                        <div class="queue-row" id="queue-row"></div>
                    </div>
                    <div class="mini">
                        <div class="mini-head o"><span class="dot"></span> Infected grouped by minute</div>
                        <div class="out-levels" id="out-levels"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill">queue size <b id="st-qsize">0</b></span>
                            <span class="pill r">current minute <b id="st-min">&mdash;</b></span>
                            <span class="pill b">start node <b id="st-start">&mdash;</b></span>
                            <span class="pill g">infected <b id="st-count">0</b></span>
                            <span class="pill c">answer <b id="st-ans">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // --- Motion engine (spring pop, zero deps) ---
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED || !el) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.4 + 0.66 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // --- State ---
        let targetTree = null;
        let startVal = null;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 720, 330];
        const nodeEls = {};   // id -> <g> element (persistent registry)
        const SVGNS = "http://www.w3.org/2000/svg";

        // --- Algorithm code panel (real BFS) ---
        const CODE = [
            [['kw','def '],['fn','minTime'],['src','(root, start):']],
            [['src','  par = {}; index parents via DFS']],
            [['src','  s = findNode(start)']],
            [['src','  q = deque([(s, 0)]); seen = {s}']],
            [['src','  ans = 0']],
            [['kw','  while '],['src','q:']],
            [['src','    node, t = q.popleft()']],
            [['src','    ans = max(ans, t)']],
            [['kw','    for '],['src','nb in (left, right, parent):']],
            [['kw','      if '],['src','nb and nb not in seen:']],
            [['src','        seen.add(nb)']],
            [['src','        q.append((nb, t + 1))']],
            [['kw','  return '],['src','ans']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // --- tree model ---
        class TreeNode {
            constructor(val, id) { this.val = val; this.left = null; this.right = null; this.parent = null; this.id = id; }
        }
        function parseLevelOrder(str) {
            let arr;
            try {
                let s = (str || '').trim();
                if (!s.startsWith('[')) s = '[' + s + ']';
                arr = JSON.parse(s);
            } catch (e) { return null; }
            if (!Array.isArray(arr) || arr.length === 0 || arr[0] === null) return null;
            const root = new TreeNode(arr[0], 'n0');
            let queue = [root], i = 1;
            while (queue.length && i < arr.length) {
                const node = queue.shift();
                if (i < arr.length) {
                    if (arr[i] !== null) { node.left = new TreeNode(arr[i], 'n' + i); node.left.parent = node; queue.push(node.left); }
                    i++;
                }
                if (i < arr.length) {
                    if (arr[i] !== null) { node.right = new TreeNode(arr[i], 'n' + i); node.right.parent = node; queue.push(node.right); }
                    i++;
                }
            }
            return root;
        }
        function findNode(n, val) {
            if (!n) return null;
            if (n.val === val) return n;
            return findNode(n.left, val) || findNode(n.right, val);
        }

        // --- tree SVG (built ONCE per load; steps only toggle classes) ---
        function buildTreeSVG(root) {
            const svg = document.getElementById('tree-svg'); svg.innerHTML = '';
            Object.keys(nodeEls).forEach(k => delete nodeEls[k]);
            if (!root) { svg.setAttribute('viewBox', '0 0 520 160'); return; }

            // recursive layout: left at x-dx, right at x+dx, dx shrinks ~1.8 per depth
            const pos = {};
            function assign(n, x, y, dx, d) {
                if (!n) return;
                pos[n.id] = { x, y };
                assign(n.left,  x - dx, y + 78, dx / 1.8, d + 1);
                assign(n.right, x + dx, y + 78, dx / 1.8, d + 1);
            }
            assign(root, 0, 0, 130, 0);

            // fit viewBox to the tree
            const xs = Object.values(pos).map(p => p.x), ys = Object.values(pos).map(p => p.y);
            const pad = 38;
            const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + pad;
            const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + pad;
            const w = maxX - minX, h = maxY - minY;
            svg.setAttribute('viewBox', `${minX} ${minY} ${w} ${h}`);
            svg.style.maxHeight = Math.min(360, h * 1.1) + 'px';

            // edges first (under nodes)
            (function edges(n) {
                if (!n) return;
                [n.left, n.right].forEach(c => {
                    if (!c) return;
                    const a = pos[n.id], b = pos[c.id];
                    const ln = document.createElementNS(SVGNS, 'line');
                    ln.setAttribute('class', 'edge'); ln.dataset.child = c.id; ln.dataset.parent = n.id;
                    ln.setAttribute('x1', a.x); ln.setAttribute('y1', a.y);
                    ln.setAttribute('x2', b.x); ln.setAttribute('y2', b.y);
                    svg.appendChild(ln); edges(c);
                });
            })(root);

            // nodes: each a <g class="node"> with <circle class="nc"> + <text class="nl"> + <text class="nm">
            (function nodes(n) {
                if (!n) return;
                const p = pos[n.id];
                const g = document.createElementNS(SVGNS, 'g'); g.setAttribute('class', 'node'); g.dataset.id = n.id; g.dataset.val = n.val;
                g.style.transformOrigin = `${p.x}px ${p.y}px`;
                const c = document.createElementNS(SVGNS, 'circle');
                c.setAttribute('class', 'nc'); c.setAttribute('cx', p.x); c.setAttribute('cy', p.y); c.setAttribute('r', 20);
                const t = document.createElementNS(SVGNS, 'text');
                t.setAttribute('class', 'nl'); t.setAttribute('x', p.x); t.setAttribute('y', p.y + 5.5); t.setAttribute('text-anchor', 'middle');
                t.textContent = n.val;
                const m = document.createElementNS(SVGNS, 'text');
                m.setAttribute('class', 'nm'); m.setAttribute('x', p.x + 24); m.setAttribute('y', p.y - 16); m.setAttribute('text-anchor', 'middle');
                g.appendChild(c); g.appendChild(t); g.appendChild(m); svg.appendChild(g);
                nodeEls[n.id] = g;
                nodes(n.left); nodes(n.right);
            })(root);
        }

        // --- step generation (immutable snapshots) ---
        function generateSteps() {
            steps = [];
            const snap = (extra) => Object.assign({
                queue: [], minuteGroups: [], curMin: null, activeId: null,
                doneIds: [], queuedIds: [], startId: null, minLabels: {}, freshId: null, answer: null
            }, extra);

            if (!targetTree) {
                steps.push(snap({
                    code: [0], action: '✕ empty tree', actionColor: 'var(--accent-red)', complete: true,
                    panel: `The input describes an <b>empty tree</b>, so there is nothing to infect &mdash; the minimum time is <code>0</code>.`,
                    log: 'init  empty tree -> 0', answer: 0
                }));
                return;
            }

            const startNode = findNode(targetTree, startVal);
            if (!startNode) {
                steps.push(snap({
                    code: [2], action: '✕ start not found', actionColor: 'var(--accent-red)', complete: true,
                    panel: `No node in the tree has value <code>${startVal}</code>, so the infection cannot start. Pick a start value that exists in the tree.`,
                    log: `init  start ${startVal} not in tree`, answer: null
                }));
                return;
            }

            // working state
            const seen = new Set([startNode.id]);
            const doneIds = [];                  // ids already dequeued (settled)
            const minLabels = {};                // id -> minute it was infected
            minLabels[startNode.id] = 0;
            const minuteGroups = [];             // minuteGroups[m] = [vals]
            const pushGroup = (m, val) => { while (minuteGroups.length <= m) minuteGroups.push([]); minuteGroups[m].push(val); };
            pushGroup(0, startNode.val);

            let queue = [{ id: startNode.id, val: startNode.val, t: 0 }];
            const byId = {};
            (function index(n) { if (!n) return; byId[n.id] = n; index(n.left); index(n.right); })(targetTree);

            const qsnap = () => queue.map(q => ({ id: q.id, val: q.val, t: q.t }));
            const gsnap = () => minuteGroups.map(r => r.slice());
            const labsnap = () => Object.assign({}, minLabels);

            steps.push(snap({
                code: [1, 2, 3, 4], action: `START at ${startNode.val}`, actionColor: 'var(--accent-orange)',
                startId: startNode.id, queue: qsnap(), queuedIds: [startNode.id], minuteGroups: gsnap(),
                minLabels: labsnap(), curMin: 0, freshId: startNode.id,
                panel: `Build <b>parent links</b>, then run BFS outward from the start node <code>${startNode.val}</code>. Each node can spread to its <b>left child, right child, and parent</b>. The infection of node <code>${startNode.val}</code> happens at minute <b>0</b>.`,
                log: `init  start = ${startNode.val} at minute 0`
            }));

            let ans = 0;
            while (queue.length > 0) {
                const cur = queue.shift();
                const node = byId[cur.id];
                ans = Math.max(ans, cur.t);
                doneIds.push(cur.id);

                steps.push(snap({
                    code: [5, 6, 7], action: `t=${cur.t}: spread from ${cur.val}`, actionColor: 'var(--accent-red)',
                    startId: startNode.id, activeId: cur.id, doneIds: doneIds.slice(),
                    queue: qsnap(), queuedIds: queue.map(q => q.id), minuteGroups: gsnap(),
                    minLabels: labsnap(), curMin: cur.t, answer: ans,
                    panel: `Dequeue the front of the wavefront: node <code>${cur.val}</code>, infected at minute <b>${cur.t}</b>. Update <code>ans = max(ans, ${cur.t}) = ${ans}</code>, then push its un-infected neighbours.`,
                    log: `  pop ${cur.val} @ t=${cur.t}  (ans=${ans})`
                }));

                const neighbors = [];
                if (node.left)   neighbors.push(node.left);
                if (node.right)  neighbors.push(node.right);
                if (node.parent) neighbors.push(node.parent);

                const newly = [];
                neighbors.forEach(nb => {
                    if (!seen.has(nb.id)) {
                        seen.add(nb.id);
                        minLabels[nb.id] = cur.t + 1;
                        pushGroup(cur.t + 1, nb.val);
                        queue.push({ id: nb.id, val: nb.val, t: cur.t + 1 });
                        newly.push(nb);
                    }
                });

                if (newly.length) {
                    const names = newly.map(c => `<code>${c.val}</code>`).join(' and ');
                    steps.push(snap({
                        code: [8, 9, 10, 11], action: `infect ${newly.map(c => c.val).join(', ')} @ t=${cur.t + 1}`, actionColor: 'var(--accent-blue)',
                        startId: startNode.id, doneIds: doneIds.slice(),
                        queue: qsnap(), queuedIds: queue.map(q => q.id), minuteGroups: gsnap(),
                        minLabels: labsnap(), curMin: cur.t, answer: ans, freshIds: newly.map(c => c.id),
                        panel: `Node <code>${cur.val}</code> infects ${newly.length === 1 ? 'neighbour' : 'neighbours'} ${names} at minute <b>${cur.t + 1}</b>. ${newly.length === 1 ? 'It is' : 'They are'} added to the back of the queue.`,
                        log: `    infect ${newly.map(c => c.val).join(', ')} @ t=${cur.t + 1}`
                    }));
                } else {
                    steps.push(snap({
                        code: [8, 9], action: `${cur.val}: all neighbours infected`, actionColor: 'var(--accent-green)',
                        startId: startNode.id, doneIds: doneIds.slice(),
                        queue: qsnap(), queuedIds: queue.map(q => q.id), minuteGroups: gsnap(),
                        minLabels: labsnap(), curMin: cur.t, answer: ans,
                        panel: `Every neighbour of <code>${cur.val}</code> is already infected &mdash; nothing new to enqueue. The wavefront moves on.`,
                        log: `    ${cur.val}: no new neighbours`
                    }));
                }
            }

            const total = Object.keys(minLabels).length;
            steps.push(snap({
                code: [12], action: `✓ ${ans} minute${ans === 1 ? '' : 's'}`, actionColor: 'var(--accent-green)',
                complete: true, confetti: true, startId: startNode.id, doneIds: doneIds.slice(),
                queue: [], queuedIds: [], minuteGroups: gsnap(), minLabels: labsnap(),
                curMin: ans, answer: ans, showAllMin: true,
                panel: `Queue empty &mdash; all <b>${total}</b> node${total === 1 ? '' : 's'} are infected. The last infection happened at minute <b>${ans}</b>, so the minimum time to infect the whole tree is <b>${ans}</b>.`,
                log: `done  whole tree infected in ${ans} minute${ans === 1 ? '' : 's'}`
            }));
        }

        // --- render (pure; persistent DOM keyed by stable ids) ---
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // 1) tree node classes (toggle only — never rebuild the SVG)
            const queuedSet = new Set(step.queuedIds || []);
            for (const id in nodeEls) nodeEls[id].classList.remove('inqueue', 'active', 'done', 'start', 'minlabel');
            // done (green): already spread from
            (step.doneIds || []).forEach(id => { if (nodeEls[id]) nodeEls[id].classList.add('done'); });
            // queued (blue): discovered, waiting in queue
            queuedSet.forEach(id => { if (nodeEls[id]) { nodeEls[id].classList.remove('done'); nodeEls[id].classList.add('inqueue'); } });
            // start node (orange) — only highlighted as start while still queued (not yet processed)
            if (step.startId && nodeEls[step.startId] && queuedSet.has(step.startId)) {
                nodeEls[step.startId].classList.remove('inqueue', 'done');
                nodeEls[step.startId].classList.add('start');
            }
            // active (red) wins: the wavefront node being processed now
            if (step.activeId && nodeEls[step.activeId]) {
                nodeEls[step.activeId].classList.remove('inqueue', 'done', 'start');
                nodeEls[step.activeId].classList.add('active');
            }
            // minute labels above infected nodes
            const labels = step.minLabels || {};
            for (const id in labels) {
                const g = nodeEls[id]; if (!g) continue;
                const m = g.querySelector('.nm'); if (m) m.textContent = 't' + labels[id];
                g.classList.add('minlabel');
            }
            if (step.freshId && nodeEls[step.freshId]) Motion.pop(nodeEls[step.freshId]);
            (step.freshIds || []).forEach(id => { if (nodeEls[id]) Motion.pop(nodeEls[id]); });
            // light edges between infected nodes
            const infectedSet = new Set(Object.keys(labels));
            document.querySelectorAll('#tree-svg line.edge').forEach(ln => {
                ln.classList.toggle('lit', infectedSet.has(ln.dataset.child) && infectedSet.has(ln.dataset.parent));
            });

            // 2) queue panel (front highlighted) — each tile shows val + minute
            const qrow = document.getElementById('queue-row'); qrow.innerHTML = '';
            if (!step.queue || step.queue.length === 0) {
                const e = document.createElement('div'); e.className = 'q-empty';
                e.textContent = step.complete ? 'queue empty — whole tree infected' : 'queue empty';
                qrow.appendChild(e);
            } else {
                step.queue.forEach((q, i) => {
                    const t = document.createElement('div');
                    t.className = 'q-tile' + (i === 0 ? ' front' : '');
                    t.dataset.id = q.id;
                    const v = document.createElement('div'); v.textContent = q.val;
                    const mm = document.createElement('div'); mm.className = 'qt-min'; mm.textContent = 't' + q.t;
                    t.appendChild(v); t.appendChild(mm);
                    qrow.appendChild(t);
                    if (step.freshId === q.id || (step.freshIds || []).includes(q.id)) Motion.pop(t);
                });
            }

            // 3) infected grouped by minute
            const ol = document.getElementById('out-levels'); ol.innerHTML = '';
            if (!step.minuteGroups || step.minuteGroups.length === 0) {
                const e = document.createElement('div'); e.className = 'o-empty'; e.textContent = 'no infection yet';
                ol.appendChild(e);
            } else {
                step.minuteGroups.forEach((row, mi) => {
                    if (!row.length) return;
                    const r = document.createElement('div'); r.className = 'lv-row';
                    const tag = document.createElement('span'); tag.className = 'lv-tag'; tag.textContent = 'min ' + mi; r.appendChild(tag);
                    row.forEach((v) => {
                        const t = document.createElement('div'); t.className = 'o-tile';
                        const isFresh = (step.freshIds || []).some(id => nodeEls[id] && nodeEls[id].dataset.val == v && minutesAt(step, id) === mi);
                        if (isFresh) t.classList.add('fresh');
                        t.textContent = v; r.appendChild(t);
                        if (isFresh) Motion.pop(t);
                    });
                    ol.appendChild(r);
                });
            }

            // 4) final answer track + confetti
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.complete && step.answer != null) {
                const t = document.createElement('div'); t.className = 'ans-tile';
                t.textContent = step.answer + (step.answer === 1 ? ' min' : ' min');
                at.appendChild(t);
            }

            // 5) narration / action / code
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // 6) state pills
            document.getElementById('st-qsize').textContent = step.queue ? step.queue.length : 0;
            document.getElementById('st-min').textContent = step.curMin != null ? step.curMin : '—';
            document.getElementById('st-start').textContent = startVal != null ? startVal : '—';
            document.getElementById('st-count').textContent = step.minLabels ? Object.keys(step.minLabels).length : 0;
            document.getElementById('st-ans').textContent = step.answer != null ? step.answer : '—';

            // 7) chrome
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        // helper: minute a given node id was infected in this step's labels
        function minutesAt(step, id) { return step.minLabels ? step.minLabels[id] : undefined; }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // --- controls ---
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function loadTree(str, start) {
            pause();
            targetTree = parseLevelOrder(str);
            startVal = (start === '' || start == null || isNaN(start)) ? null : Number(start);
            buildTreeSVG(targetTree);
            generateSteps();
            confettiArmed = true;
            renderStep(0);
        }
        function loadCustom() {
            const v = (document.getElementById('tree-input').value || '').trim();
            const s = document.getElementById('target-input').value;
            if (v.length) loadTree(v, s);
        }
        const EXAMPLES = [
            { tree: '[1,2,3,4,5,6,7]', start: 4 },        // answer 4
            { tree: '[1,2,null,3,null,4]', start: 4 },     // left chain 1-2-3-4, answer 3
            { tree: '[1,null,2,null,3]', start: 3 }        // right spine 1-2-3, answer 2
        ];
        function loadExample(n) {
            const ex = EXAMPLES[n] || EXAMPLES[0];
            document.getElementById('tree-input').value = ex.tree;
            document.getElementById('target-input').value = ex.start;
            loadTree(ex.tree, ex.start);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('tree-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        document.getElementById('target-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });

        buildCodePanel();
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            let exIdx = parseInt(params.get('example') || '0', 10);
            if (!(exIdx >= 0 && exIdx <= 2)) exIdx = 0;
            loadExample(exIdx);
        };
    </script>
</body>
</html>
