<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Tree Queries with Updates - Visualization</title>
    <style>
        :root {
            --bg-page: #000000; --bg-surface: #161b22; --bg-input: #000000;
            --border-main: #30363d; --btn-bg: #21262d; --btn-hover: #2d333b;
            --text-main: #c9d1d9; --text-dim: #8b949e;
            --accent-orange: #e3b341; --accent-blue: #388bfd;
            --accent-green: #3fb950; --accent-red: #f85149; --accent-purple: #a371f7;
        }
        * { box-sizing: border-box; }
        body { background: var(--bg-page); color: var(--text-main); font-family: system-ui, sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 40px; }
        .input-bar { width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; }
        label.ui-label { font-family: monospace; font-size: 13px; color: var(--text-dim); }
        button { height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px; }
        button:hover { background: var(--btn-hover); }
        .visual-container { margin-top: 28px; display: flex; gap: 32px; flex-wrap: wrap;
            justify-content: center; max-width: 1200px; width: 100%; }
        .panel-box { background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 16px; }
        .panel-title { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; font-family: monospace; text-transform: uppercase; }
        svg { display: block; }
        .seg-row { display: flex; gap: 4px; justify-content: center; margin-bottom: 6px; }
        .seg-cell { min-width: 42px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-family: monospace; font-size: 13px; font-weight: bold;
            border: 2px solid var(--border-main); background: var(--btn-bg); transition: all 0.3s; }
        .seg-cell.active { background: #0d2244; border-color: var(--accent-blue); color: var(--accent-blue); }
        .seg-cell.queried { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .seg-cell.updated { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); }
        .euler-row { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
        .euler-cell { min-width: 38px; height: 38px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 6px;
            border: 2px solid var(--border-main); background: var(--btn-bg); font-family: monospace; font-size: 12px; }
        .euler-cell.highlight { background: #1a0d2a; border-color: var(--accent-purple); color: var(--accent-purple); }
        .euler-cell .idx { font-size: 9px; color: var(--text-dim); }
        .action-panel { margin-top: 18px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 900px; max-width: 96%; min-height: 90px;
            font-family: monospace; font-size: 14px; line-height: 1.6; }
        .controls { margin-top: 20px; display: flex; align-items: center; gap: 10px; }
        .log-panel { margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 900px; max-width: 96%;
            height: 130px; overflow-y: auto; font-family: monospace; font-size: 13px; }
        .query-results { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .qr-card { background: var(--btn-bg); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; font-family: monospace; font-size: 13px; }
        .qr-card.done { border-color: var(--accent-green); color: var(--accent-green); }
    </style>
</head>
<body>
<div class="input-bar">
    <label class="ui-label">Example:</label>
    <button onclick="loadExample(0)">Ex 1: 5-node tree</button>
    <button onclick="loadExample(1)">Ex 2: 3-node tree</button>
</div>

<div class="visual-container">
    <div class="panel-box">
        <div class="panel-title" style="color:var(--accent-green)">Tree (Euler Tour timestamps)</div>
        <svg id="tree-svg" width="420" height="280"></svg>
    </div>
    <div>
        <div class="panel-box" style="min-width:340px">
            <div class="panel-title" style="color:var(--accent-purple)">Euler Array A[ in[u] ] = value[u]</div>
            <div id="euler-row" class="euler-row"></div>
        </div>
        <div class="panel-box" style="margin-top:14px; min-width:340px">
            <div class="panel-title" style="color:var(--accent-blue)">Segment Tree (range sum)</div>
            <div id="seg-tree"></div>
        </div>
        <div class="panel-box" style="margin-top:14px; min-width:340px">
            <div class="panel-title" style="color:var(--accent-orange)">Query Results</div>
            <div id="query-results" class="query-results"></div>
        </div>
    </div>
</div>

<div class="action-panel" id="main-panel">Click <b>Play</b> or <b>Next</b> to start.</div>
<div class="controls">
    <button onclick="reset()">↺ Reset</button>
    <button onclick="back()">← Back</button>
    <button onclick="togglePlay()" id="play-btn">▶ Play</button>
    <button onclick="next()">Next →</button>
    <span class="ui-label">Speed</span>
    <input type="range" id="speed-slider" min="0" max="2" value="1">
</div>
<div class="log-panel" id="log"></div>

<script>
    const EXAMPLES = [
        { nodes:[1,2,3,4,5], edges:[[1,2],[1,3],[2,4],[2,5]], values:[10,20,30,40,50],
          queries:[{t:'subtree',u:2},{t:'path',u:4},{t:'update',u:3,val:100},{t:'subtree',u:1}] },
        { nodes:[1,2,3], edges:[[1,2],[1,3]], values:[5,10,15],
          queries:[{t:'path',u:3},{t:'update',u:2,val:20},{t:'subtree',u:1}] }
    ];

    let steps=[], stepIdx=0, timer=null;
    const delays=[1400,700,350];
    let curEx=null;

    function buildChildren(ex) {
        const ch={};
        ex.nodes.forEach(n=>ch[n]=[]);
        ex.edges.forEach(([a,b])=>{ ch[a].push(b); ch[b].push(a); });
        return ch;
    }

    function eulerTour(root, ch) {
        const inT={}, outT={};
        let t=0;
        function dfs(u, par) {
            inT[u]=t++;
            (ch[u]||[]).forEach(v=>{ if(v!==par) dfs(v,u); });
            outT[u]=t-1;
        }
        dfs(root, -1);
        return {inT, outT};
    }

    function buildSegTree(arr) {
        const n=arr.length, seg=new Array(4*n).fill(0);
        function build(node,s,e) {
            if(s===e){seg[node]=arr[s];return;}
            const m=(s+e)>>1;
            build(2*node,s,m); build(2*node+1,m+1,e);
            seg[node]=seg[2*node]+seg[2*node+1];
        }
        build(1,0,n-1);
        return seg;
    }

    function queryRange(seg,n,ql,qr,node=1,s=0,e=null) {
        if(e===null) e=n-1;
        if(ql>e||qr<s) return 0;
        if(ql<=s&&e<=qr) return seg[node];
        const m=(s+e)>>1;
        return queryRange(seg,n,ql,qr,2*node,s,m)+queryRange(seg,n,ql,qr,2*node+1,m+1,e);
    }

    function pointUpdate(seg,n,pos,val,node=1,s=0,e=null) {
        if(e===null) e=n-1;
        if(s===e){seg[node]=val;return;}
        const m=(s+e)>>1;
        if(pos<=m) pointUpdate(seg,n,pos,val,2*node,s,m);
        else pointUpdate(seg,n,pos,val,2*node+1,m+1,e);
        seg[node]=seg[2*node]+seg[2*node+1];
    }

    function generateSteps(ex) {
        steps=[];
        const add=(panel,log,logColor,extra={})=>steps.push({panel,log,logColor,...extra});
        const ch=buildChildren(ex);
        const {inT,outT}=eulerTour(1,ch);
        const n=ex.nodes.length;
        const A=new Array(n).fill(0);
        ex.nodes.forEach((u,i)=>{ A[inT[u]]=ex.values[i]; });
        const seg=buildSegTree([...A]);

        add('Building Euler Tour with DFS from root=1.<br>Each node gets <b>in[u]</b> (entry time) and <b>out[u]</b> (exit time).',
            'Building Euler Tour...','var(--text-dim)',{euler:[...A],seg:[...seg],n,highlight:[]});

        const timestamps=ex.nodes.map(u=>`node ${u}: in=${inT[u]}, out=${outT[u]}, A[${inT[u]}]=${ex.values[ex.nodes.indexOf(u)]}`);
        add(`Euler Tour complete.<br>${timestamps.join(' | ')}<br>Array A = [${A.join(', ')}]`,
            `Euler array: [${A.join(',')}]`,'var(--accent-purple)',{euler:[...A],seg:[...seg],n,highlight:[]});

        add(`Segment Tree built on A=[${A.join(',')}].<br>Supports range sum queries and point updates in O(log n).`,
            'Segment tree ready.','var(--accent-blue)',{euler:[...A],seg:[...seg],n,highlight:[]});

        const results=[];
        ex.queries.forEach(q=>{
            if(q.t==='subtree'){
                const [l,r]=[inT[q.u],outT[q.u]];
                const ans=queryRange([...seg],n,l,r);
                results.push({label:`subtree_sum(${q.u})`,val:ans,done:true});
                add(`<b>subtree_sum(${q.u})</b>: Query range [in[${q.u}]=${l}, out[${q.u}]=${r}] in A.<br>Sum = ${ans}`,
                    `subtree_sum(${q.u}) = ${ans}`,'var(--accent-green)',
                    {euler:[...A],seg:[...seg],n,highlight:{l,r},results:[...results]});
            } else if(q.t==='path'){
                const [l,r]=[0,inT[q.u]];
                const ans=queryRange([...seg],n,l,r);
                results.push({label:`path_sum(${q.u})`,val:ans,done:true});
                add(`<b>path_sum(${q.u})</b>: Root-to-node path. Query prefix [0, in[${q.u}]=${inT[q.u]}] in A.<br>Sum = ${ans}`,
                    `path_sum(${q.u}) = ${ans}`,'var(--accent-green)',
                    {euler:[...A],seg:[...seg],n,highlight:{l:0,r:inT[q.u]},results:[...results]});
            } else if(q.t==='update'){
                const idx=inT[q.u];
                const oldVal=A[idx];
                A[idx]=q.val;
                pointUpdate(seg,n,idx,q.val);
                results.push({label:`update(${q.u}, ${q.val})`,val:'✓',done:true});
                add(`<b>update(${q.u}, ${q.val})</b>: Node ${q.u} value ${oldVal} → ${q.val}.<br>Update A[in[${q.u}]=${idx}] = ${q.val}. Segment tree updated in O(log n).`,
                    `update(${q.u}) A[${idx}]=${q.val}`,'var(--accent-orange)',
                    {euler:[...A],seg:[...seg],n,highlight:{point:idx},results:[...results]});
            }
        });

        add(`<span style="color:var(--accent-green)">✅ All queries complete!</span><br>Used Euler Tour for O(n) preprocessing and O(log n) per query/update via Segment Tree.`,
            'Done!','var(--accent-green)',{euler:[...A],seg:[...seg],n,highlight:{},results:[...results],done:true});
    }

    // Tree layout
    function drawTree(ex,inT,outT) {
        const svg=document.getElementById('tree-svg');
        svg.innerHTML='';
        const ch=buildChildren(ex);
        const pos={};
        function assign(u,par,x,y,dx) {
            pos[u]={x,y};
            let kids=(ch[u]||[]).filter(v=>v!==par);
            kids.forEach((v,i)=>assign(v,u,x+(i-(kids.length-1)/2)*dx,y+75,Math.max(dx*0.6,40)));
        }
        assign(1,-1,210,30,130);
        ex.edges.forEach(([a,b])=>{
            const [pa,pb]=[pos[a],pos[b]];
            const line=document.createElementNS('http://www.w3.org/2000/svg','line');
            line.setAttribute('x1',pa.x); line.setAttribute('y1',pa.y+20);
            line.setAttribute('x2',pb.x); line.setAttribute('y2',pb.y+20);
            line.setAttribute('stroke','#555'); line.setAttribute('stroke-width','2');
            svg.appendChild(line);
        });
        ex.nodes.forEach((u,i)=>{
            const p=pos[u];
            const g=document.createElementNS('http://www.w3.org/2000/svg','g');
            const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
            c.setAttribute('cx',p.x); c.setAttribute('cy',p.y+20); c.setAttribute('r','20');
            c.setAttribute('fill','#21262d'); c.setAttribute('stroke','#555'); c.setAttribute('stroke-width','3');
            c.setAttribute('id','tn'+u);
            g.appendChild(c);
            const val=document.createElementNS('http://www.w3.org/2000/svg','text');
            val.setAttribute('x',p.x); val.setAttribute('y',p.y+16);
            val.setAttribute('text-anchor','middle'); val.setAttribute('fill','#c9d1d9');
            val.setAttribute('font-size','12'); val.setAttribute('font-weight','bold');
            val.textContent=ex.values[i];
            g.appendChild(val);
            const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
            lbl.setAttribute('x',p.x); lbl.setAttribute('y',p.y+27);
            lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('fill','#8b949e');
            lbl.setAttribute('font-size','9');
            lbl.textContent=`n${u} i:${inT[u]} o:${outT[u]}`;
            g.appendChild(lbl);
            svg.appendChild(g);
        });
    }

    function renderEuler(A, highlight) {
        const row=document.getElementById('euler-row');
        row.innerHTML='';
        A.forEach((v,i)=>{
            const cell=document.createElement('div');
            cell.className='euler-cell';
            if(highlight && highlight.l!==undefined && i>=highlight.l && i<=highlight.r) cell.classList.add('highlight');
            if(highlight && highlight.point===i) { cell.style.borderColor='var(--accent-orange)'; cell.style.color='var(--accent-orange)'; }
            cell.innerHTML=`<span>${v}</span><span class="idx">A[${i}]</span>`;
            row.appendChild(cell);
        });
    }

    function renderSegTree(seg,n,highlight) {
        const container=document.getElementById('seg-tree');
        container.innerHTML='';
        // Show first 3 levels only
        const levels=[[1],[2,3],[4,5,6,7]];
        levels.forEach(lvl=>{
            const row=document.createElement('div');
            row.className='seg-row';
            lvl.forEach(i=>{
                if(i>=4*n) return;
                const cell=document.createElement('div');
                cell.className='seg-cell';
                cell.textContent=seg[i]||0;
                if(highlight && highlight.active===i) cell.classList.add('active');
                row.appendChild(cell);
            });
            container.appendChild(row);
        });
    }

    function renderResults(results) {
        const el=document.getElementById('query-results');
        el.innerHTML='';
        (results||[]).forEach(r=>{
            const card=document.createElement('div');
            card.className='qr-card'+(r.done?' done':'');
            card.textContent=`${r.label} = ${r.val}`;
            el.appendChild(card);
        });
    }

    function renderStep(idx) {
        const s=steps[idx];
        if(!s) return;
        renderEuler(s.euler, s.highlight);
        renderSegTree(s.seg, s.n, s.highlight);
        renderResults(s.results||[]);
        document.getElementById('main-panel').innerHTML=s.panel;
        const log=document.getElementById('log');
        log.innerHTML='';
        for(let i=0;i<=idx;i++) {
            if(!steps[i].log) continue;
            const line=document.createElement('div');
            line.style.color=steps[i].logColor||'var(--text-main)';
            line.textContent=steps[i].log;
            log.appendChild(line);
        }
        log.scrollTop=log.scrollHeight;
    }

    function next(){ if(stepIdx<steps.length-1){stepIdx++;renderStep(stepIdx);}else pause(); }
    function back(){ if(stepIdx>0){stepIdx--;renderStep(stepIdx);} }
    function reset(){ pause(); stepIdx=0; renderStep(0); }
    function togglePlay(){
        const btn=document.getElementById('play-btn');
        if(timer) pause();
        else {
            btn.textContent='⏸ Pause';
            if(stepIdx>=steps.length-1) stepIdx=0;
            timer=setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
        }
    }
    function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='▶ Play'; }

    function loadExample(n) {
        curEx=EXAMPLES[n];
        const ch=buildChildren(curEx);
        const {inT,outT}=eulerTour(1,ch);
        drawTree(curEx,inT,outT);
        generateSteps(curEx);
        reset();
    }

    window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
</script>
</body>
</html>
