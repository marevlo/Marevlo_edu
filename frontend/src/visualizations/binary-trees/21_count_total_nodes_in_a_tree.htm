<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Total Nodes in Binary Tree - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }
        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px;
            padding: 0 10px; width: 320px; font-size: 13px;
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px; display: flex; gap: 40px; flex-wrap: wrap;
            justify-content: center; max-width: 1350px; width: 100%;
        }
        .tree-container {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 20px; min-height: 380px; width: 520px;
        }
        .tree-svg { width: 100%; height: 340px; }

        .stack-container {
            display: flex; flex-direction: column; gap: 6px;
            width: 240px; height: 340px; border: 2px dashed var(--border-main);
            padding: 12px; background: rgba(22,27,34,0.6); overflow-y: auto;
            border-radius: 6px; font-family: monospace;
        }
        .stack-frame {
            padding: 8px 12px; background: var(--btn-bg);
            border: 1px solid var(--border-main); border-radius: 4px;
            font-size: 13px;
        }
        .stack-frame.active { background: #0d2244; border-color: var(--accent-blue); color: var(--accent-blue); }

        .info-panel {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 16px; width: 300px; min-height: 180px;
        }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 16px 22px; width: 920px; min-height: 110px;
            font-family: monospace; font-size: 15px;
        }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 12px; }
        .log-panel {
            margin-top: 15px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 920px; max-width: 90%;
            height: 160px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label>Tree (Level Order, -1/null for empty):</label>
        <input type="text" id="tree-input" value="[1,2,3]">
        <button onclick="loadCustom()">Load Tree</button>
        <button onclick="loadExample(0)">Ex 1 ([1,2,3])</button>
        <button onclick="loadExample(1)">Ex 2 (Balanced)</button>
    </div>

    <div class="visual-container">
        <div>
            <div style="font-weight:bold;color:var(--accent-green)">Binary Tree</div>
            <div class="tree-container">
                <svg id="tree-svg" class="tree-svg" viewBox="0 0 520 340"></svg>
            </div>
        </div>

        <div>
            <div style="font-weight:bold;color:var(--accent-blue)">Recursion Stack (with subtree counts)</div>
            <div class="stack-container" id="stack-container"></div>
        </div>

        <div class="info-panel">
            <div style="font-weight:bold;color:var(--accent-purple);margin-bottom:8px">Total Nodes</div>
            <div id="count-display" style="font-size:58px;font-weight:bold;color:var(--accent-green);text-align:center">0</div>
            <div id="status" style="text-align:center;margin-top:12px;color:var(--text-dim)"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Load a tree and click Play to watch recursive node counting</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="next()">Next →</button>
        <label>Speed <input type="range" id="speed-slider" min="0" max="2" value="1"></label>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let rootNode = null;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1250, 650, 320];

        class TreeNode {
            constructor(val, id) {
                this.val = val;
                this.left = null;
                this.right = null;
                this.id = id;
            }
        }

        function parseLevelOrder(str) {
            try {
                let cleaned = str.replace(/null/g, '-1').replace(/\s/g, '');
                let arr = JSON.parse(cleaned);
                if (!arr || arr.length === 0) return null;
                const root = new TreeNode(arr[0], 'n0');
                let queue = [root], i = 1;
                while (queue.length && i < arr.length) {
                    const node = queue.shift();
                    if (i < arr.length && arr[i] !== -1) {
                        node.left = new TreeNode(arr[i], 'n' + i);
                        queue.push(node.left);
                    }
                    i++;
                    if (i < arr.length && arr[i] !== -1) {
                        node.right = new TreeNode(arr[i], 'n' + i);
                        queue.push(node.right);
                    }
                    i++;
                }
                return root;
            } catch(e) { return null; }
        }

        function buildTreeSVG(root) {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            if (!root) return;

            const pos = {};
            function assign(n, x, y, dx) {
                if (!n) return;
                pos[n.id] = {x, y};
                assign(n.left, x - dx, y + 78, dx * 0.65);
                assign(n.right, x + dx, y + 78, dx * 0.65);
            }
            assign(root, 260, 40, 110);

            function drawEdges(n) {
                if (!n) return;
                const p = pos[n.id];
                if (n.left) {
                    const lp = pos[n.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 22);
                    line.setAttribute("x2", lp.x); line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(n.left);
                }
                if (n.right) {
                    const rp = pos[n.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 22);
                    line.setAttribute("x2", rp.x); line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(n.right);
                }
            }
            drawEdges(root);

            function drawNodes(n) {
                if (!n) return;
                const p = pos[n.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", p.x); c.setAttribute("cy", p.y + 20);
                c.setAttribute("r", "22"); c.setAttribute("fill", "#21262d");
                c.setAttribute("stroke", "#555"); c.setAttribute("stroke-width", "4");
                c.setAttribute("id", n.id);
                g.appendChild(c);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", p.x); t.setAttribute("y", p.y + 26);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", "#c9d1d9");
                t.setAttribute("font-size", "15"); t.setAttribute("font-weight", "bold");
                t.textContent = n.val;
                g.appendChild(t);
                svg.appendChild(g);
                drawNodes(n.left);
                drawNodes(n.right);
            }
            drawNodes(root);
        }

        function highlightNode(id, color = '#58a6ff') {
            document.querySelectorAll('circle').forEach(c => c.setAttribute('stroke', '#555'));
            const c = document.getElementById(id);
            if (c) c.setAttribute('stroke', color);
        }

        function generateSteps() {
            steps = [];
            function countNodes(node) {
                if (!node) {
                    steps.push({
                        type: 'base',
                        nodeId: null,
                        count: 0,
                        panel: 'Base: <b>null</b> → return <b>0</b>',
                        log: 'Null node → 0',
                        color: 'var(--accent-red)'
                    });
                    return 0;
                }

                steps.push({
                    type: 'call',
                    nodeId: node.id,
                    count: null,
                    panel: `Visit <b>${node.val}</b>`,
                    log: `Enter node ${node.val}`,
                    color: 'var(--accent-orange)'
                });

                const leftCount = countNodes(node.left);
                const rightCount = countNodes(node.right);

                const total = 1 + leftCount + rightCount;

                steps.push({
                    type: 'return',
                    nodeId: node.id,
                    count: total,
                    panel: `<b>${node.val}</b>: 1 + ${leftCount} + ${rightCount} = <b>${total}</b>`,
                    log: `Return ${total} from ${node.val}`,
                    color: 'var(--accent-green)'
                });

                return total;
            }

            steps.push({
                type: 'init',
                nodeId: null,
                count: null,
                panel: 'Starting recursive node count...',
                log: 'Begin DFS',
                color: 'var(--text-dim)'
            });

            const finalCount = countNodes(rootNode);

            steps.push({
                type: 'final',
                nodeId: null,
                count: finalCount,
                panel: `<span style="font-size:28px;color:var(--accent-green)">✅ Total Nodes: <b>${finalCount}</b></span>`,
                log: `Final total: ${finalCount}`,
                color: 'var(--accent-green)'
            });
        }

        function renderStep(idx) {
            const s = steps[idx];
            if (!s) return;

            if (s.nodeId) highlightNode(s.nodeId, s.type === 'return' ? '#3fb950' : '#58a6ff');

            // Stack
            const stackEl = document.getElementById('stack-container');
            stackEl.innerHTML = '';
            let activePath = [];
            for (let i = 0; i <= idx; i++) {
                if (steps[i].type === 'call') activePath.push(steps[i]);
                if (steps[i].type === 'return') activePath.pop();
            }
            activePath.forEach(call => {
                const frame = document.createElement('div');
                frame.className = `stack-frame ${call === activePath[activePath.length-1] ? 'active' : ''}`;
                frame.textContent = call.nodeId ? `Node ${call.nodeId}` : '';
                stackEl.appendChild(frame);
            });

            document.getElementById('main-panel').innerHTML = s.panel;
            document.getElementById('count-display').textContent = s.count || '—';
            document.getElementById('status').textContent = s.type === 'final' ? 'Complete' : 'Counting...';

            // Log
            const logEl = document.getElementById('log');
            logEl.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.color = steps[i].color || 'var(--text-main)';
                line.textContent = `▶ ${steps[i].log}`;
                logEl.appendChild(line);
            }
            logEl.scrollTop = logEl.scrollHeight;
        }

        function next() { if (stepIndex < steps.length-1) { stepIndex++; renderStep(stepIndex); } }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) {
                pause();
            } else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length-1) stepIndex = 0;
                timer = setInterval(() => {
                    if (stepIndex < steps.length-1) next();
                    else pause();
                }, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }
        function pause() {
            clearInterval(timer); timer = null;
            document.getElementById('play-btn').textContent = '▶ Play';
        }

        function loadExample(n) {
            const examples = [
                "[1,2,3]",
                "[4,2,6,1,3,5,7]"
            ];
            document.getElementById('tree-input').value = examples[n];
            loadCustom();
        }

        function loadCustom() {
            rootNode = parseLevelOrder(document.getElementById('tree-input').value);
            if (!rootNode) return alert("Invalid tree");
            buildTreeSVG(rootNode);
            generateSteps();
            stepIndex = 0;
            renderStep(0);
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
