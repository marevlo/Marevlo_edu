<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximum Sum (Distance > 2) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }
        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px;
            padding: 0 10px; width: 300px; font-size: 13px;
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container {
            margin-top: 30px; display: flex; gap: 35px; flex-wrap: wrap;
            justify-content: center; max-width: 1380px; width: 100%;
        }
        .tree-container {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 20px; min-height: 380px; width: 520px;
        }
        .tree-svg { width: 100%; height: 340px; }

        .stack-container {
            display: flex; flex-direction: column; gap: 6px;
            width: 260px; height: 340px; border: 2px dashed var(--border-main);
            padding: 12px; background: rgba(22,27,34,0.6); overflow-y: auto;
            border-radius: 6px; font-family: monospace; font-size: 13px;
        }
        .stack-frame {
            padding: 8px 12px; background: var(--btn-bg);
            border: 1px solid var(--border-main); border-radius: 4px;
        }
        .stack-frame.active { background: #0d2244; border-color: var(--accent-blue); color: var(--accent-blue); }

        .info-panel {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 16px; width: 320px; min-height: 200px;
        }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 16px 22px; width: 920px; min-height: 130px;
            font-family: monospace; font-size: 15px; line-height: 1.5;
        }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 12px; }
        .log-panel {
            margin-top: 15px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 920px; max-width: 90%;
            height: 160px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label>Tree (Level Order):</label>
        <input type="text" id="tree-input" value="[1,2,3]">
        <button onclick="loadCustom()">Load Tree</button>
        <button onclick="loadExample(0)">Ex 1 (Max=3)</button>
        <button onclick="loadExample(1)">Ex 2 (Max=10)</button>
    </div>

    <div class="visual-container">
        <div>
            <div style="font-weight:bold;color:var(--accent-green)">Binary Tree</div>
            <div class="tree-container">
                <svg id="tree-svg" class="tree-svg" viewBox="0 0 520 340"></svg>
            </div>
        </div>

        <div>
            <div style="font-weight:bold;color:var(--accent-blue)">Recursion Stack + Decision</div>
            <div class="stack-container" id="stack-container"></div>
        </div>

        <div class="info-panel">
            <div style="font-weight:bold;color:var(--accent-purple)">Max Sum (dist &gt; 2)</div>
            <div id="max-display" style="font-size:52px;font-weight:bold;color:var(--accent-green);text-align:center;margin:20px 0">0</div>
            <div id="current-state" style="font-size:14px;color:var(--text-dim);text-align:center"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">Load tree and Play to see DP recursion (include/exclude with distance &gt;2 constraint)</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="next()">Next →</button>
        <label>Speed <input type="range" id="speed-slider" min="0" max="2" value="1"></label>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let rootNode = null;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1450, 780, 420];

        class TreeNode {
            constructor(val, id) {
                this.val = val;
                this.left = null;
                this.right = null;
                this.id = id;
            }
        }

        function parseLevelOrder(str) {
            try {
                let arr = JSON.parse(str.replace(/null/g, 'null'));
                if (!arr || arr.length === 0) return null;
                const root = new TreeNode(arr[0], 'n0');
                let queue = [root], i = 1;
                while (queue.length && i < arr.length) {
                    const node = queue.shift();
                    if (i < arr.length && arr[i] !== null) {
                        node.left = new TreeNode(arr[i], 'n'+i);
                        queue.push(node.left);
                    }
                    i++;
                    if (i < arr.length && arr[i] !== null) {
                        node.right = new TreeNode(arr[i], 'n'+i);
                        queue.push(node.right);
                    }
                    i++;
                }
                return root;
            } catch(e) { return null; }
        }

        function buildTreeSVG(root) {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            if (!root) return;

            const pos = {};
            function assign(n, x, y, dx) {
                if (!n) return;
                pos[n.id] = {x, y};
                assign(n.left, x - dx, y + 78, dx * 0.65);
                assign(n.right, x + dx, y + 78, dx * 0.65);
            }
            assign(root, 260, 40, 110);

            function drawEdges(n) {
                if (!n) return;
                const p = pos[n.id];
                if (n.left) {
                    const lp = pos[n.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 22);
                    line.setAttribute("x2", lp.x); line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(n.left);
                }
                if (n.right) {
                    const rp = pos[n.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 22);
                    line.setAttribute("x2", rp.x); line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(n.right);
                }
            }
            drawEdges(root);

            function drawNodes(n) {
                if (!n) return;
                const p = pos[n.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", p.x); c.setAttribute("cy", p.y + 20);
                c.setAttribute("r", "22"); c.setAttribute("fill", "#21262d");
                c.setAttribute("stroke", "#555"); c.setAttribute("stroke-width", "4");
                c.setAttribute("id", n.id);
                g.appendChild(c);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", p.x); t.setAttribute("y", p.y + 26);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", "#c9d1d9");
                t.setAttribute("font-size", "15"); t.setAttribute("font-weight", "bold");
                t.textContent = n.val;
                g.appendChild(t);
                svg.appendChild(g);
                drawNodes(n.left);
                drawNodes(n.right);
            }
            drawNodes(root);
        }

        function highlightNode(id, color = '#58a6ff') {
            document.querySelectorAll('circle').forEach(c => c.setAttribute('stroke', '#555'));
            const c = document.getElementById(id);
            if (c) c.setAttribute('stroke', color);
        }

        function generateSteps() {
            steps = [];
            let globalMax = 0;

            function dp(node) {
                if (!node) {
                    steps.push({type:'base', nodeId:null, inc:0, exc:0, panel:'null → (inc=0, exc=0)', log:'Base null', color:'var(--accent-red)'});
                    return {inc: 0, exc: 0};
                }

                steps.push({type:'call', nodeId:node.id, inc:null, exc:null, panel:`Enter node <b>${node.val}</b>`, log:`Visit ${node.val}`, color:'var(--accent-orange)'});

                const left = dp(node.left);
                const right = dp(node.right);

                // Include current node: cannot take any node within distance 2 (children + grandchildren)
                // So only the node itself
                const includeThis = node.val;

                // Exclude current: best from left or right subtree (cannot take from both because siblings are distance=2)
                const excludeThis = Math.max(
                    Math.max(left.inc, left.exc),
                    Math.max(right.inc, right.exc)
                );

                const localMax = Math.max(includeThis, excludeThis);
                globalMax = Math.max(globalMax, localMax);

                steps.push({
                    type: 'compute',
                    nodeId: node.id,
                    inc: includeThis,
                    exc: excludeThis,
                    panel: `<b>${node.val}</b>: include = ${includeThis}, exclude = ${excludeThis}`,
                    log: `inc=${includeThis} | exc=${excludeThis}`,
                    color: 'var(--accent-green)'
                });

                return {inc: includeThis, exc: excludeThis};
            }

            steps.push({type:'init', nodeId:null, inc:null, exc:null, panel:'Start DP recursion (no two nodes distance ≤2)', log:'Initialize DP', color:'var(--text-dim)'});

            dp(rootNode);

            steps.push({
                type: 'final',
                nodeId: null,
                inc: globalMax,
                exc: null,
                panel: `<span style="font-size:28px;color:var(--accent-green)">✅ Maximum Sum = <b>${globalMax}</b></span>`,
                log: `Global Maximum: ${globalMax}`,
                color: 'var(--accent-green)'
            });
        }

        function renderStep(idx) {
            const s = steps[idx];
            if (!s) return;

            if (s.nodeId) highlightNode(s.nodeId);

            const stackEl = document.getElementById('stack-container');
            stackEl.innerHTML = '';
            let path = [];
            for (let i = 0; i <= idx; i++) {
                if (steps[i].type === 'call') path.push(steps[i]);
                if (steps[i].type === 'compute') path.pop();
            }
            path.forEach(p => {
                const d = document.createElement('div');
                d.className = `stack-frame ${p === path[path.length-1] ? 'active' : ''}`;
                d.textContent = p.nodeId ? `Node ${p.nodeId}` : '';
                stackEl.appendChild(d);
            });

            document.getElementById('main-panel').innerHTML = s.panel;
            document.getElementById('max-display').textContent = s.inc !== null && s.inc !== undefined ? s.inc : '—';
            document.getElementById('current-state').textContent = s.type === 'final' ? 'Complete' : 'Exploring include/exclude...';

            const logEl = document.getElementById('log');
            logEl.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.color = steps[i].color || 'var(--text-main)';
                line.textContent = steps[i].log;
                logEl.appendChild(line);
            }
            logEl.scrollTop = logEl.scrollHeight;
        }

        function next() { if (stepIndex < steps.length-1) { stepIndex++; renderStep(stepIndex); } }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length-1) stepIndex = 0;
                timer = setInterval(() => {
                    if (stepIndex < steps.length-1) next();
                    else pause();
                }, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }
        function pause() {
            clearInterval(timer); timer = null;
            document.getElementById('play-btn').textContent = '▶ Play';
        }

        function loadExample(n) {
            const ex = [
                "[1,2,3]",
                "[10,1,1,1,1,1,1]"
            ];
            document.getElementById('tree-input').value = ex[n];
            loadCustom();
        }

        function loadCustom() {
            rootNode = parseLevelOrder(document.getElementById('tree-input').value);
            if (!rootNode) return alert("Invalid tree input");
            buildTreeSVG(rootNode);
            generateSteps();
            stepIndex = 0;
            renderStep(0);
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
