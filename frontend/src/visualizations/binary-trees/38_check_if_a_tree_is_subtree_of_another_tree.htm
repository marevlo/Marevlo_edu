<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check if Tree is Subtree of Another Tree - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-blue: #58a6ff;
            --accent-purple: #a371f7;
            --accent-orange: #e3b341;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px;
            padding: 0 10px; width: 240px; font-size: 13px;
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .trees-container {
            margin-top: 30px; display: flex; gap: 40px; flex-wrap: wrap;
            justify-content: center; max-width: 1200px; width: 100%;
        }

        .tree-box {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 15px; width: 420px;
        }
        .tree-title { font-weight: bold; color: var(--accent-green); margin-bottom: 8px; text-align: center; }
        .tree-svg { width: 100%; height: 280px; background: #0a0e14; }

        .stack-area {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .stack-container {
            display: flex; flex-direction: column-reverse; gap: 6px;
            width: 210px; height: 320px; border: 2px dashed var(--border-main);
            padding: 10px; background: rgba(22,27,34,0.6); overflow-y: auto;
            border-radius: 6px;
        }
        .stack-frame {
            width: 100%; padding: 8px 12px; background: var(--btn-bg);
            border: 1px solid var(--border-main); border-radius: 4px;
            font-family: monospace; font-size: 13px; text-align: center;
        }
        .stack-frame.active {
            background: #0d2244; border-color: var(--accent-blue);
            color: var(--accent-blue); transform: scale(1.05);
        }

        .info-panel {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 16px; width: 260px;
        }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 16px 24px; width: 900px; min-height: 130px;
            font-family: monospace; font-size: 15px; line-height: 1.5;
        }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .log-panel {
            margin-top: 15px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 900px; max-width: 90%;
            height: 160px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label>Main Tree:</label>
        <input type="text" id="main-input" value="[3,4,5,1,2]" style="width:240px">
        <label>Sub Tree:</label>
        <input type="text" id="sub-input" value="[4,1,2]" style="width:180px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(0)">Ex 1</button>
        <button onclick="loadExample(1)">Ex 2</button>
    </div>

    <div class="trees-container">
        <div class="tree-box">
            <div class="tree-title">Main Tree</div>
            <svg id="main-svg" class="tree-svg" viewBox="0 0 420 280"></svg>
        </div>
        <div class="tree-box">
            <div class="tree-title">Sub Tree</div>
            <svg id="sub-svg" class="tree-svg" viewBox="0 0 420 280"></svg>
        </div>
    </div>

    <div class="stack-area">
        <div style="font-weight:bold;color:var(--accent-blue);margin-bottom:8px">Recursion Stack</div>
        <div class="stack-container" id="stack-container"></div>
    </div>

    <div class="info-panel">
        <div><strong>Status:</strong> <span id="status" style="color:var(--accent-orange)">Checking...</span></div>
        <div><strong>Current Match:</strong> <span id="match-info" style="color:var(--accent-purple)">—</span></div>
    </div>

    <div class="action-panel" id="main-panel">Recursive DFS: Check identical or search in left/right</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="next()">Next →</button>
        <span class="ui-label">Speed</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let mainRoot = null, subRoot = null;
        let steps = [], stepIndex = 0, timer = null;
        const delays = [1400, 700, 350];
        let nodeMapMain = {}, nodeMapSub = {};

        class TreeNode {
            constructor(val, id, isMain) {
                this.val = val;
                this.left = null;
                this.right = null;
                this.id = id;
                this.isMain = isMain;
            }
        }

        function parseLevelOrder(str, isMain) {
            try {
                let arrStr = str.trim();
                if (!arrStr.startsWith('[')) arrStr = '[' + arrStr + ']';
                const arr = JSON.parse(arrStr.replace(/null/g, 'null'));
                if (!arr || arr.length === 0) return null;

                const root = new TreeNode(arr[0], (isMain ? 'm' : 's') + '0', isMain);
                const nodeMap = isMain ? nodeMapMain : nodeMapSub;
                nodeMap[(isMain ? 'm' : 's') + '0'] = root;
                let queue = [root], i = 1;

                while (queue.length && i < arr.length) {
                    const node = queue.shift();
                    if (i < arr.length) {
                        if (arr[i] !== null) {
                            node.left = new TreeNode(arr[i], (isMain ? 'm' : 's') + i, isMain);
                            nodeMap[node.left.id] = node.left;
                            queue.push(node.left);
                        }
                        i++;
                    }
                    if (i < arr.length) {
                        if (arr[i] !== null) {
                            node.right = new TreeNode(arr[i], (isMain ? 'm' : 's') + i, isMain);
                            nodeMap[node.right.id] = node.right;
                            queue.push(node.right);
                        }
                        i++;
                    }
                }
                return root;
            } catch(e) { console.error(e); return null; }
        }

        function buildTreeSVG(svgId, rootNode, isMain) {
            const svg = document.getElementById(svgId);
            svg.innerHTML = '';
            if (!rootNode) return;

            const positions = {};
            function assign(node, x, y, dx) {
                if (!node) return;
                positions[node.id] = {x, y};
                assign(node.left, x - dx, y + 75, dx * 0.75);
                assign(node.right, x + dx, y + 75, dx * 0.75);
            }
            assign(rootNode, 210, 40, 90);

            function drawEdges(node) {
                if (!node) return;
                const p = positions[node.id];
                if (node.left) {
                    const lp = positions[node.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 22);
                    line.setAttribute("x2", lp.x); line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(node.left);
                }
                if (node.right) {
                    const rp = positions[node.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 22);
                    line.setAttribute("x2", rp.x); line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                    drawEdges(node.right);
                }
            }
            drawEdges(rootNode);

            function drawNodes(node) {
                if (!node) return;
                const p = positions[node.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", p.x); c.setAttribute("cy", p.y + 20);
                c.setAttribute("r", "21"); c.setAttribute("fill", "#21262d");
                c.setAttribute("stroke", "#555"); c.setAttribute("stroke-width", "4");
                c.setAttribute("id", node.id);
                g.appendChild(c);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", p.x); t.setAttribute("y", p.y + 26);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", "#c9d1d9");
                t.setAttribute("font-size", "14"); t.setAttribute("font-weight", "bold");
                t.textContent = node.val;
                g.appendChild(t);
                svg.appendChild(g);

                drawNodes(node.left);
                drawNodes(node.right);
            }
            drawNodes(rootNode);
        }

        function highlightNode(svgId, id, color) {
            const c = document.getElementById(id);
            if (c) {
                c.setAttribute('stroke', color);
                c.setAttribute('stroke-width', '7');
            }
        }

        function generateSteps() {
            steps = [];

            function addStep(panel, log, color, extra = {}) {
                steps.push({panel, log, logColor: color, ...extra});
            }

            function isIdentical(node1, node2, depth = 0) {
                if (!node1 && !node2) {
                    addStep(`Depth ${depth}: both null`, 'Identical', 'var(--accent-green)');
                    return true;
                }
                if (!node1 || !node2) {
                    addStep(`Depth ${depth}: one null`, 'Not identical', 'var(--accent-red)');
                    return false;
                }
                if (node1.val !== node2.val) {
                    addStep(`Depth ${depth}: values differ ${node1.val} != ${node2.val}`, 'Not identical', 'var(--accent-red)');
                    return false;
                }

                addStep(`Depth ${depth}: values match ${node1.val}`, 'Checking children', 'var(--accent-blue)');

                const leftMatch = isIdentical(node1.left, node2.left, depth + 1);
                const rightMatch = isIdentical(node1.right, node2.right, depth + 1);

                return leftMatch && rightMatch;
            }

            function isSubtree(mainNode, subNode) {
                if (!mainNode) {
                    addStep('Main null, sub not', 'No match', 'var(--accent-red)');
                    return false;
                }
                if (!subNode) return true;

                addStep(`Check main node <b>${mainNode.val}</b> vs sub <b>${subNode.val}</b>`, 'Trying match', 'var(--accent-purple)');

                if (isIdentical(mainNode, subNode)) {
                    addStep(`Match found at node <b>${mainNode.val}</b>`, '✅ Subtree found', 'var(--accent-green)');
                    return true;
                }

                const leftMatch = isSubtree(mainNode.left, subNode);
                if (leftMatch) return true;

                const rightMatch = isSubtree(mainNode.right, subNode);
                return rightMatch;
            }

            addStep('Starting subtree check...', 'DFS on main tree', 'var(--accent-orange)');
            const result = isSubtree(mainRoot, subRoot);
            addStep(`<span style="color:${result ? 'var(--accent-green)' : 'var(--accent-red)'};font-size:18px">Final Result: ${result ? '✅ IS SUBTREE' : '❌ NOT A SUBTREE'}</span>`, 
                   `Overall: ${result}`, result ? 'var(--accent-green)' : 'var(--accent-red)', {complete: true});
        }

        function renderStep(idx) {
            const s = steps[idx];
            if (!s) return;

            buildTreeSVG('main-svg', mainRoot, true);
            buildTreeSVG('sub-svg', subRoot, false);

            if (s.id) {
                highlightNode('main-svg', s.id, '#f85149');
            }

            document.getElementById('main-panel').innerHTML = s.panel;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.color = steps[i].logColor || 'var(--text-main)';
                line.textContent = steps[i].log;
                logPanel.appendChild(line);
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() { if (stepIndex < steps.length-1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = '⏸ Pause';
                if (stepIndex >= steps.length-1) stepIndex = 0;
                timer = setInterval(() => {
                    if (stepIndex < steps.length-1) next();
                    else pause();
                }, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            if (timer) clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = '▶ Play';
        }

        function loadExample(n) {
            const examples = [
                {main: "[3,4,5,1,2]", sub: "[4,1,2]"},
                {main: "[3,4,5,1,2,null,null,null,null,0]", sub: "[4,1,2]"}
            ];
            document.getElementById('main-input').value = examples[n].main;
            document.getElementById('sub-input').value = examples[n].sub;
            loadCustom();
        }

        function loadCustom() {
            nodeMapMain = {};
            nodeMapSub = {};
            mainRoot = parseLevelOrder(document.getElementById('main-input').value, true);
            subRoot = parseLevelOrder(document.getElementById('sub-input').value, false);
            buildTreeSVG('main-svg', mainRoot, true);
            buildTreeSVG('sub-svg', subRoot, false);
            generateSteps();
            reset();
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
