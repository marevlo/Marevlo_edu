<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compute Mirror of Binary Tree - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-blue: #58a6ff;
            --accent-purple: #a371f7;
            --accent-orange: #e3b341;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-bar {
            width: 100%; background: var(--bg-surface); padding: 12px 16px;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap;
        }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main);
            color: var(--text-main); height: 32px; border-radius: 6px;
            padding: 0 10px; width: 280px; font-size: 13px;
        }
        button {
            height: 32px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: var(--btn-hover); }

        .trees-container {
            margin-top: 30px; display: flex; gap: 40px; flex-wrap: wrap;
            justify-content: center; max-width: 1200px; width: 100%;
        }

        .tree-box {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 15px; width: 460px;
        }
        .tree-title { font-weight: bold; color: var(--accent-green); margin-bottom: 8px; text-align: center; }
        .tree-svg { width: 100%; height: 300px; background: #0a0e14; }

        .stack-area {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .stack-container {
            display: flex; flex-direction: column-reverse; gap: 6px;
            width: 210px; height: 320px; border: 2px dashed var(--border-main);
            padding: 10px; background: rgba(22,27,34,0.6); overflow-y: auto;
            border-radius: 6px;
        }
        .stack-frame {
            width: 100%; padding: 8px 12px; background: var(--btn-bg);
            border: 1px solid var(--border-main); border-radius: 4px;
            font-family: monospace; font-size: 13px; text-align: center;
        }
        .stack-frame.active {
            background: #0d2244; border-color: var(--accent-blue);
            color: var(--accent-blue); transform: scale(1.05);
        }

        .info-panel {
            background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 8px; padding: 16px; width: 260px;
        }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 16px 24px; width: 900px; min-height: 130px;
            font-family: monospace; font-size: 15px; line-height: 1.5;
        }

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .log-panel {
            margin-top: 15px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 900px; max-width: 90%;
            height: 160px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label>Tree (level order):</label>
        <input type="text" id="tree-input" value="[1,2,3,null,5,null,4]" style="width:280px">
        <button onclick="loadCustom()">Load Tree</button>
        <button onclick="loadExample(0)">Ex 1</button>
        <button onclick="loadExample(1)">Ex 2</button>
    </div>

    <div class="trees-container">
        <div class="tree-box">
            <div class="tree-title">Original Tree</div>
            <svg id="original-svg" class="tree-svg" viewBox="0 0 460 300"></svg>
        </div>
        <div class="tree-box">
            <div class="tree-title">Mirrored Tree</div>
            <svg id="mirror-svg" class="tree-svg" viewBox="0 0 460 300"></svg>
        </div>
    </div>

    <div class="stack-area">
        <div style="font-weight:bold;color:var(--accent-blue);margin-bottom:8px">Recursion Stack</div>
        <div class="stack-container" id="stack-container"></div>
    </div>

    <div class="info-panel">
        <div><strong>Current Node:</strong> <span id="curr-node" style="color:var(--accent-orange)">—</span></div>
        <div><strong>Action:</strong> <span id="action" style="color:var(--accent-purple)">Swapping children</span></div>
    </div>

    <div class="action-panel" id="main-panel">Recursive Post-Order: Mirror left → Mirror right → Swap children</div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="next()">Next →</button>
        <span class="ui-label">Speed</span>
        <input type="range" id="speed-slider" min="0" max="2" value="1">
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let originalRoot = null;
        let mirrorRoot = null;
        let steps = [], stepIndex = 0, timer = null;
        const delays = [1350, 680, 340];
        let nodeMapOriginal = {};
        let nodeMapMirror = {};

        class TreeNode {
            constructor(val, id) {
                this.val = val;
                this.left = null;
                this.right = null;
                this.id = id;
            }
        }

        function parseLevelOrder(str) {
            try {
                let arrStr = str.trim();
                if (!arrStr.startsWith('[')) arrStr = '[' + arrStr + ']';
                const arr = JSON.parse(arrStr.replace(/null/g, 'null'));
                if (!arr || arr.length === 0) return null;

                const root = new TreeNode(arr[0], 'n0');
                let queue = [root], i = 1;

                while (queue.length && i < arr.length) {
                    const node = queue.shift();
                    if (i < arr.length) {
                        if (arr[i] !== null) {
                            node.left = new TreeNode(arr[i], 'n'+i);
                            queue.push(node.left);
                        }
                        i++;
                    }
                    if (i < arr.length) {
                        if (arr[i] !== null) {
                            node.right = new TreeNode(arr[i], 'n'+i);
                            queue.push(node.right);
                        }
                        i++;
                    }
                }
                return root;
            } catch(e) { console.error(e); return null; }
        }

        function deepClone(node, idPrefix = 'm') {
            if (!node) return null;
            const clone = new TreeNode(node.val, idPrefix + node.id.slice(1));
            clone.left = deepClone(node.left, idPrefix);
            clone.right = deepClone(node.right, idPrefix);
            return clone;
        }

        function buildTreeSVG(svgId, rootNode, isMirror = false) {
            const svg = document.getElementById(svgId);
            svg.innerHTML = '';
            if (!rootNode) return;

            const positions = {};
            function assign(node, x, y, dx) {
                if (!node) return;
                positions[node.id] = {x, y};
                assign(node.left, x - dx, y + 78, dx * 0.72);
                assign(node.right, x + dx, y + 78, dx * 0.72);
            }
            assign(rootNode, 230, 40, 110);

            function drawEdges(node) {
                if (!node) return;
                const p = positions[node.id];
                if (node.left) {
                    const lp = positions[node.left.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 23);
                    line.setAttribute("x2", lp.x); line.setAttribute("y2", lp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3.5");
                    svg.appendChild(line);
                    drawEdges(node.left);
                }
                if (node.right) {
                    const rp = positions[node.right.id];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y + 23);
                    line.setAttribute("x2", rp.x); line.setAttribute("y2", rp.y);
                    line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3.5");
                    svg.appendChild(line);
                    drawEdges(node.right);
                }
            }
            drawEdges(rootNode);

            function drawNodes(node) {
                if (!node) return;
                const p = positions[node.id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", p.x); c.setAttribute("cy", p.y + 20);
                c.setAttribute("r", "23"); c.setAttribute("fill", "#21262d");
                c.setAttribute("stroke", isMirror ? "#a371f7" : "#555"); 
                c.setAttribute("stroke-width", "4");
                c.setAttribute("id", node.id);
                g.appendChild(c);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", p.x); t.setAttribute("y", p.y + 26);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", "#c9d1d9");
                t.setAttribute("font-size", "15"); t.setAttribute("font-weight", "bold");
                t.textContent = node.val;
                g.appendChild(t);
                svg.appendChild(g);

                drawNodes(node.left);
                drawNodes(node.right);
            }
            drawNodes(rootNode);
        }

        function highlightNode(svgId, id, color) {
            const c = document.getElementById(id);
            if (c) {
                c.setAttribute('stroke', color);
                c.setAttribute('stroke-width', '8');
            }
        }

        function generateSteps() {
            steps = [];

            function addStep(panel, log, color, extra = {}) {
                steps.push({panel, log, logColor: color, ...extra});
            }

            function mirror(node, depth = 0) {
                if (!node) {
                    addStep(`Depth ${depth}: null`, 'Base case', 'var(--accent-green)');
                    return;
                }

                addStep(`Visiting <b>${node.val}</b>`, `Depth ${depth}`, 'var(--accent-blue)', {id: node.id, depth});

                mirror(node.left, depth + 1);
                mirror(node.right, depth + 1);

                // Swap
                const temp = node.left;
                node.left = node.right;
                node.right = temp;

                addStep(`Swapped at <b>${node.val}</b>`, `Left ↔ Right`, 'var(--accent-purple)', {id: node.id, swapped: true});
            }

            addStep('Starting Recursive Mirror', 'Post-order: left → right → swap', 'var(--accent-orange)');
            mirror(mirrorRoot);
            addStep(`<span style="color:var(--accent-green);font-size:18px">✅ Mirror Complete</span>`, 
                   'Original tree unchanged', 'var(--accent-green)', {complete: true});
        }

        function renderStep(idx) {
            const s = steps[idx];
            if (!s) return;

            buildTreeSVG('original-svg', originalRoot, false);
            buildTreeSVG('mirror-svg', mirrorRoot, true);

            if (s.id) {
                highlightNode('original-svg', s.id, '#e3b341');
                highlightNode('mirror-svg', s.id, s.swapped ? '#3fb950' : '#e3b341');
            }

            document.getElementById('main-panel').innerHTML = s.panel;

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let i = 0; i <= idx; i++) {
                const line = document.createElement('div');
                line.style.color = steps[i].logColor || 'var(--text-main)';
                line.textContent = steps[i].log;
                logPanel.appendChild(line);
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() { if (stepIndex < steps.length-1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = '⏸ Pause';
                if (stepIndex >= steps.length-1) stepIndex = 0;
                timer = setInterval(() => {
                    if (stepIndex < steps.length-1) next();
                    else pause();
                }, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            if (timer) clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').textContent = '▶ Play';
        }

        function loadExample(n) {
            const examples = [
                {tree: "[1,2,3]"},
                {tree: "[1,2,3,null,5,null,4]"}
            ];
            document.getElementById('tree-input').value = examples[n].tree;
            loadCustom();
        }

        function loadCustom() {
            originalRoot = parseLevelOrder(document.getElementById('tree-input').value);
            mirrorRoot = JSON.parse(JSON.stringify(originalRoot)); // Deep clone
            // Rebuild mirrorRoot as TreeNode instances
            mirrorRoot = deepClone(originalRoot);
            buildTreeSVG('original-svg', originalRoot, false);
            buildTreeSVG('mirror-svg', mirrorRoot, true);
            generateSteps();
            reset();
        }

        function deepClone(node) {
            if (!node) return null;
            const clone = new TreeNode(node.val, node.id + 'm');
            clone.left = deepClone(node.left);
            clone.right = deepClone(node.right);
            return clone;
        }

        window.onload = () => { const params = new URLSearchParams(window.location.search); const exIdx = parseInt(params.get('example') || '0'); loadExample(exIdx); };
    </script>
</body>
</html>
