<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Queens (Backtracking) - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* queen being tried (current)     */
            --accent-blue:   #06b6d4;    /* current row / chrome           */
            --accent-green:  #22c55e;    /* safe placement / solution      */
            --accent-red:    #f43f5e;    /* conflict / backtrack           */
            --accent-purple: #a855f7;    /* placed queens / attack path    */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"], input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .n-input { width: 80px; }
        input:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.bad { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.bad::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .grid-stage { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; padding: 26px 22px; display: flex; justify-content: center; align-items: center; gap: 30px; flex-wrap: wrap; }
        .grid-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .grid-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        .board-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .board-tag { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); }

        .board { display: grid; gap: 6px; padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); }
        .sq {
            position: relative; display: flex; align-items: center; justify-content: center;
            border-radius: 9px; font-family: var(--mono); font-weight: 800; font-size: 22px;
            border: 2px solid var(--border-main); color: var(--text-dim);
            width: 50px; height: 50px; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s, opacity 0.35s;
        }
        .sq.light { background: rgba(255,255,255,0.05); }
        .sq.dark  { background: rgba(255,255,255,0.018); }
        .sq.activeRow { box-shadow: inset 0 0 0 2px rgba(6,182,212,0.35); }
        .sq.attack { border-color: rgba(244,63,94,0.45); background: rgba(244,63,94,0.10); }
        /* a placed, settled queen */
        .sq.queen { border-color: var(--accent-purple); background: rgba(168,85,247,0.18); color: #e9d5ff; box-shadow: 0 0 16px rgba(168,85,247,0.45), inset 0 0 10px rgba(168,85,247,0.12); }
        /* the queen we are currently trying at this square */
        .sq.trying { border-color: var(--accent-orange); background: rgba(245,165,36,0.18); color: #ffd591; box-shadow: 0 0 20px rgba(245,165,36,0.55); transform: scale(1.07); z-index: 2; }
        /* rejected square (conflict) */
        .sq.reject { border-color: var(--accent-red); background: rgba(244,63,94,0.20); color: #ffc2cd; box-shadow: 0 0 18px rgba(244,63,94,0.5); transform: scale(1.05); z-index: 2; }
        /* the attacking queen that caused the conflict */
        .sq.attacker { border-color: var(--accent-red); background: rgba(244,63,94,0.28); color: #ffc2cd; box-shadow: 0 0 22px rgba(244,63,94,0.6); z-index: 2; }
        /* a queen just confirmed safe / part of a found solution */
        .sq.placed { border-color: var(--accent-green); background: rgba(34,197,94,0.18); color: #b9f6d0; box-shadow: 0 0 18px rgba(34,197,94,0.45); transform: scale(1.06); z-index: 2; }
        .sq.solution { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.85), rgba(33,194,117,0.85)); color: #06251a; box-shadow: 0 0 20px rgba(34,197,94,0.5); }
        .sq .glyph { line-height: 1; pointer-events: none; }
        .sq .tag { position: absolute; top: -9px; right: -7px; font-size: 12px; font-weight: 900; color: #fff; text-shadow: 0 0 6px rgba(0,0,0,0.75); pointer-events: none; }

        .answer-track { display: flex; flex-direction: column; gap: 10px; min-width: 180px; }
        .answer-head { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); }
        .sol-card { font-family: var(--mono); font-size: 12px; line-height: 1.5; padding: 8px 12px; border-radius: 10px; border: 2px solid var(--accent-green); background: rgba(34,197,94,0.12); color: #b9f6d0; white-space: pre; box-shadow: 0 0 12px rgba(34,197,94,0.22); }
        .sol-empty { font-family: var(--mono); font-size: 12px; color: var(--text-dim); padding: 8px 4px; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 20px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line .cm { color: #5c6b88; font-style: italic; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.r b { color: var(--accent-blue); } .pill.c b { color: var(--accent-orange); } .pill.q b { color: var(--accent-purple); } .pill.s b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">N =</label>
        <input type="number" id="n-input" class="n-input" min="1" max="8" placeholder="4">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(4)">N = 4</button>
        <button onclick="loadExample(1)">N = 1</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>N-Queens <span class="sub">&middot; backtracking &middot; one queen per row &middot; reject column &amp; diagonal attacks &middot; record every solution</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="grid-stage" id="grid-stage">
                    <div class="board-wrap">
                        <div class="board-tag" id="board-tag">Board</div>
                        <div class="board" id="board"></div>
                    </div>
                    <div class="answer-track">
                        <div class="answer-head">Solutions</div>
                        <div id="sol-list"><div class="sol-empty">none yet&hellip;</div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill r">row <b id="st-row">&mdash;</b></span>
                            <span class="pill c">col <b id="st-col">&mdash;</b></span>
                            <span class="pill q">queens placed <b id="st-q">&mdash;</b></span>
                            <span class="pill s">solutions <b id="st-s">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // --------- Motion engine (spring pop, zero deps) ---------
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.55 + 0.55 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // --------- State ---------
        let N = 4;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        const delays = [1300, 650, 320];
        const sqEls = {};          // 'r,c' -> square element (persistent DOM)
        let builtForN = -1;        // board skeleton is rebuilt only when N changes

        // --------- Algorithm source (synced code panel) ---------
        const CODE = [
            [['kw','def '],['fn','solve'],['src','(row):']],
            [['kw','  if '],['src','row == N:']],
            [['src','    record(board)        '],['cm','# all N queens placed']],
            [['kw','    return']],
            [['kw','  for '],['src','col in range(N):']],
            [['kw','    if '],['fn','is_safe'],['src','(row, col):']],
            [['src','      board[row][col] = "Q"']],
            [['src','      '],['fn','solve'],['src','(row + 1)     '],['cm','# recurse']],
            [['src','      board[row][col] = "."  '],['cm','# backtrack']],
            [['kw','def '],['fn','is_safe'],['src','(row, col):']],
            [['kw','  return '],['src','no queen in column, '],['cm','# upper col']],
            [['src','         upper-left &  '],['cm','# left diagonal']],
            [['src','         upper-right diagonal  '],['cm','# right diagonal']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // --------- step generation (genuine backtracking simulation) ---------
        // Each step is an immutable snapshot; renderStep(idx) is a pure function of it.
        function generateSteps() {
            steps = [];
            const board = Array.from({ length: N }, () => Array(N).fill('.'));
            const solutions = [];      // array of array-of-row-strings, in discovery order
            let placed = 0;

            const cloneBoard = () => board.map(r => r.slice());
            const cloneSols = () => solutions.map(s => s.slice());

            const snap = (extra) => Object.assign({
                N, board: cloneBoard(), solutions: cloneSols(),
                row: null, col: null, placed,
                trying: null, queen: null, reject: null, attacker: null, attackPath: [],
                solutionCells: null, complete: false, verdict: null
            }, extra);

            // returns {ok:true} or {ok:false, type, at:[r,c]} with the FIRST attacker found,
            // in the same scan order the real check uses (column, then left-diag, then right-diag).
            function safeReason(row, col) {
                for (let i = 0; i < row; i++) if (board[i][col] === 'Q') return { ok: false, type: 'column', at: [i, col] };
                for (let i = row - 1, j = col - 1; i >= 0 && j >= 0; i--, j--) if (board[i][j] === 'Q') return { ok: false, type: 'left diagonal', at: [i, j] };
                for (let i = row - 1, j = col + 1; i >= 0 && j < N; i--, j++) if (board[i][j] === 'Q') return { ok: false, type: 'right diagonal', at: [i, j] };
                return { ok: true };
            }

            steps.push(snap({
                code: [0], row: 0, col: -1,
                panel: `Solve the <b>${N}-Queens</b> puzzle by backtracking. Place exactly one queen on each row 0&hellip;${N - 1} so that no two queens share a column or diagonal. Begin at row <b>0</b>.`,
                log: `start  N = ${N}, place one queen per row`
            }));

            function solve(row) {
                if (row === N) {
                    const rows = board.map(r => r.join(''));
                    solutions.push(rows);
                    steps.push(snap({
                        code: [1, 2, 3], row, col: -1, verdict: 'good',
                        solutionCells: board.map(r => r.indexOf('Q')),
                        panel: `Row ${N} reached &#8594; all <b>${N}</b> queens are safely placed. <b>Record solution #${solutions.length}</b>.`,
                        log: `record  solution #${solutions.length}: [${board.map(r => r.indexOf('Q')).join(', ')}]`
                    }));
                    return;
                }
                for (let col = 0; col < N; col++) {
                    const res = safeReason(row, col);
                    if (res.ok) {
                        steps.push(snap({
                            code: [4, 5], row, col, trying: [row, col], verdict: 'try',
                            panel: `Row ${row}: try column <b>${col}</b>. <code>is_safe(${row}, ${col})</code> &#8594; no column or diagonal attack &#8594; <b>safe</b>.`,
                            log: `try    (${row}, ${col})  safe`
                        }));
                        board[row][col] = 'Q'; placed++;
                        steps.push(snap({
                            code: [6, 7], row, col, queen: [row, col], verdict: 'good',
                            panel: `Place a queen at <code>(${row}, ${col})</code>, then recurse into row <b>${row + 1}</b>.`,
                            log: `place  Q at (${row}, ${col})  -> recurse row ${row + 1}`
                        }));

                        solve(row + 1);

                        board[row][col] = '.'; placed--;
                        steps.push(snap({
                            code: [8], row, col, reject: [row, col], verdict: 'back',
                            panel: `Exhausted every choice below <code>(${row}, ${col})</code>. <b>Backtrack</b>: remove this queen and try the next column in row ${row}.`,
                            log: `back   remove Q (${row}, ${col})  backtrack`
                        }));
                    } else {
                        steps.push(snap({
                            code: [4, 5, 9, 10, 11, 12], row, col, trying: [row, col],
                            reject: [row, col], attacker: res.at, attackPath: [res.at], verdict: 'bad',
                            panel: `Row ${row}: try column <b>${col}</b>. <code>is_safe(${row}, ${col})</code> fails &#8594; queen at <code>(${res.at[0]}, ${res.at[1]})</code> attacks via the <b>${res.type}</b> &#8594; <b>reject</b>.`,
                            log: `reject (${row}, ${col})  ${res.type} attack from (${res.at[0]}, ${res.at[1]})`
                        }));
                    }
                }
            }

            solve(0);

            const total = solutions.length;
            steps.push(snap({
                code: [0, 1, 3], row: N, col: -1, complete: true,
                verdict: total > 0 ? 'good' : 'bad',
                solutions: cloneSols(),
                panel: `Search complete. Every row and column has been explored &#8594; <code>N = ${N}</code> has <b>${total}</b> distinct solution${total === 1 ? '' : 's'}.`,
                log: `done   ${total} solution${total === 1 ? '' : 's'} for N = ${N}`
            }));
        }

        // --------- board skeleton (built once per N) ---------
        function buildBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            Object.keys(sqEls).forEach(k => delete sqEls[k]);
            boardEl.style.gridTemplateColumns = `repeat(${N}, 50px)`;
            for (let r = 0; r < N; r++) {
                for (let c = 0; c < N; c++) {
                    const sq = document.createElement('div');
                    sq.className = 'sq ' + (((r + c) % 2 === 0) ? 'light' : 'dark');
                    sq.dataset.rc = r + ',' + c;
                    const glyph = document.createElement('span'); glyph.className = 'glyph';
                    const tag = document.createElement('span'); tag.className = 'tag';
                    sq.appendChild(glyph); sq.appendChild(tag);
                    boardEl.appendChild(sq);
                    sqEls[r + ',' + c] = sq;
                }
            }
            builtForN = N;
            document.getElementById('board-tag').textContent = `Board ${N}×${N}`;
        }

        // --------- render (persistent DOM, pure function of steps[idx]) ---------
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            if (builtForN !== step.N) buildBoard();

            const eq = (a, p) => a && p && a[0] === p[0] && a[1] === p[1];
            const inPath = (r, c) => step.attackPath && step.attackPath.some(p => p[0] === r && p[1] === c);
            const solIdx = step.solutionCells;   // array: per-row queen column, when recording a solution

            for (let r = 0; r < step.N; r++) {
                for (let c = 0; c < step.N; c++) {
                    const sq = sqEls[r + ',' + c]; if (!sq) continue;
                    const base = 'sq ' + (((r + c) % 2 === 0) ? 'light' : 'dark');
                    const cls = [base];
                    const hasQueen = step.board[r][c] === 'Q';
                    const wasQueen = sq.dataset.queen === '1';

                    if (step.row === r) cls.push('activeRow');
                    if (inPath(r, c)) cls.push('attack');

                    let glyph = '';
                    if (solIdx && solIdx[r] === c) { cls.push('solution'); glyph = '♛'; }
                    else if (eq(step.attacker, [r, c])) { cls.push('attacker'); glyph = '♛'; }
                    else if (eq(step.queen, [r, c])) { cls.push('placed'); glyph = '♛'; }
                    else if (eq(step.reject, [r, c]) && eq(step.trying, [r, c])) { cls.push('reject'); glyph = '✗'; }
                    else if (eq(step.reject, [r, c])) { cls.push('reject'); glyph = '✗'; }
                    else if (eq(step.trying, [r, c])) { cls.push('trying'); glyph = '♛'; }
                    else if (hasQueen) { cls.push('queen'); glyph = '♛'; }
                    else { glyph = '·'; }

                    sq.className = cls.join(' ');
                    const g = sq.querySelector('.glyph'); if (g.textContent !== glyph) g.textContent = glyph;
                    const tag = sq.querySelector('.tag');
                    tag.textContent = eq(step.attacker, [r, c]) ? '!' : '';

                    // spring-pop a queen the moment it newly appears on a square
                    const nowQ = hasQueen || (solIdx && solIdx[r] === c) || eq(step.queen, [r, c]);
                    if (nowQ && !wasQueen) Motion.pop(sq);
                    sq.dataset.queen = nowQ ? '1' : '0';
                }
            }

            // solutions list
            const solList = document.getElementById('sol-list'); solList.innerHTML = '';
            const sols = step.solutions || [];
            if (!sols.length) {
                const e = document.createElement('div'); e.className = 'sol-empty'; e.textContent = 'none yet…'; solList.appendChild(e);
            } else {
                sols.forEach((rows, i) => {
                    const card = document.createElement('div'); card.className = 'sol-card';
                    card.textContent = '#' + (i + 1) + '\n' + rows.join('\n');
                    solList.appendChild(card);
                });
            }

            // narration
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete && step.verdict === 'good');
            mp.classList.toggle('bad', (!!step.complete && step.verdict === 'bad') || (!step.complete && step.verdict === 'bad'));
            highlightCode(step.code);

            // state pills
            document.getElementById('st-row').textContent = step.row != null && step.row >= 0 ? step.row : '—';
            document.getElementById('st-col').textContent = step.col != null && step.col >= 0 ? step.col : '—';
            document.getElementById('st-q').textContent = step.placed;
            document.getElementById('st-s').textContent = sols.length;

            // badge + progress
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            // log (cumulative)
            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => {
                let col = 'var(--text-dim)';
                if (s.verdict === 'good') col = 'var(--accent-green)';
                else if (s.verdict === 'bad') col = 'var(--accent-red)';
                else if (s.verdict === 'back') col = 'var(--accent-orange)';
                else if (s.verdict === 'try') col = '#7dd3fc';
                return `<div style="margin:3px 0;white-space:pre-wrap;color:${col};">${s.log}</div>`;
            }).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        // --------- controls ---------
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function loadData(n) {
            pause(); N = n; builtForN = -1;
            generateSteps(); renderStep(0);
        }
        function loadExample(n) {
            document.getElementById('n-input').value = n;
            loadData(n);
        }
        function loadCustom() {
            const v = parseInt(document.getElementById('n-input').value, 10);
            if (!isNaN(v) && v >= 1 && v <= 8) loadData(v);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('n-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => { if (steps.length) renderStep(stepIdx); });

        buildCodePanel();
        window.onload = () => loadExample(4);
    </script>
</body>
</html>
