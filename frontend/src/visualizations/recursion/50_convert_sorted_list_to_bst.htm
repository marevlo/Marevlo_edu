<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert Sorted List to BST</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* list pointer / mid in motion   */
            --accent-blue:   #06b6d4;    /* edges / chrome / left subtree  */
            --accent-green:  #22c55e;    /* placed root / settled          */
            --accent-red:    #f43f5e;    /* base case / empty              */
            --accent-purple: #a855f7;    /* current call / root            */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 940px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.12), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 260px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168,85,247,0.18); background: rgba(168,85,247,0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(168, 85, 247, 0.5); box-shadow: 0 0 18px rgba(168, 85, 247, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(168,85,247,0.22), rgba(168,85,247,0.10)); border-color: rgba(168, 85, 247, 0.45); color: #e9d5ff; min-width: 80px; }
        .op-btn.load { border-color: rgba(245,165,36,0.4); color: #ffe2b0; font-family: var(--mono); }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #e9d5ff; background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); box-shadow: 0 0 12px rgba(168,85,247,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(168,85,247,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #ede9fe; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-purple); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(168,85,247,0.14); color: #d8b4fe; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(168,85,247,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }

        /* sorted-list rail */
        .array-zone { padding: 16px 16px 6px; }
        .array-label { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); text-align: center; margin-bottom: 10px; }
        .array-rail { display: flex; gap: 7px; justify-content: center; flex-wrap: wrap; }
        .acell { min-width: 44px; height: 44px; padding: 0 6px; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative;
            font-family: var(--mono); font-weight: 800; font-size: 16px; border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, opacity 0.35s; }
        .acell.range { border-color: var(--accent-blue); background: rgba(6,182,212,0.10); color: #a5f3fc; }
        .acell.mid { border-color: var(--accent-green); background: rgba(34,197,94,0.18); color: #bbf7d0; box-shadow: 0 0 16px rgba(34,197,94,0.5); }
        .acell.placed { opacity: 0.4; }
        .acell .ai { position: absolute; bottom: -16px; left: 0; right: 0; text-align: center; font-size: 10px; color: var(--text-dim); font-weight: 700; }

        /* tree */
        .tree-stage { position: relative; width: 100%; height: 290px; overflow: auto; scrollbar-width: thin; }
        .tree-stage::-webkit-scrollbar { height: 7px; width: 7px; }
        .tree-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .tree-canvas { position: relative; margin: 0 auto; }
        #edges { position: absolute; left: 0; top: 0; overflow: visible; pointer-events: none; z-index: 1; }
        .edge-ln { stroke: var(--accent-blue); stroke-width: 2.2; fill: none; opacity: 0; transition: stroke 0.35s, opacity 0.35s; }
        .edge-ln.shown { opacity: 0.5; }
        .edge-ln.active { stroke: var(--accent-orange); opacity: 1; filter: drop-shadow(0 0 6px rgba(245,165,36,0.6)); }

        .hnode { position: absolute; width: 46px; height: 46px; margin: -23px 0 0 -23px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-family: var(--mono); font-weight: 800; font-size: 17px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.06); color: var(--text-main);
            z-index: 2; will-change: transform; transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s; }
        .hnode.root { border-color: var(--accent-purple); }
        .hnode.cur { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 20px rgba(168,85,247,0.55); }
        .hnode.new { border-color: var(--accent-green); background: rgba(34,197,94,0.18); color: #bbf7d0; box-shadow: 0 0 22px rgba(34,197,94,0.55); }
        .hnode .tag { position: absolute; top: -9px; right: -10px; min-width: 16px; height: 15px; padding: 0 4px; border-radius: 8px; background: rgba(10,15,28,0.9); color: var(--text-dim); font-size: 9px; font-weight: 800; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-main); }
        .hnode.lchild .tag { color: #a5f3fc; border-color: rgba(6,182,212,0.5); }
        .hnode.rchild .tag { color: #bbf7d0; border-color: rgba(34,197,94,0.5); }

        .empty-note { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-family: var(--mono); font-size: 13px; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-purple); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }
        .panel-head .pills { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }
        .spill { font-family: var(--mono); font-size: 10.5px; font-weight: 700; letter-spacing: 0; text-transform: none; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--border-main); color: var(--text-dim); background: rgba(255,255,255,0.03); }
        .spill b { color: var(--text-main); }
        .spill.mid { border-color: rgba(34,197,94,0.4); color: #bbf7d0; }
        .spill.left { border-color: rgba(6,182,212,0.4); color: #a5f3fc; }
        .spill.right { border-color: rgba(245,165,36,0.4); color: #ffd591; }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(168,85,247,0.12); border-left-color: var(--accent-purple); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 120px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">sorted list =</label>
        <input type="text" id="list-input" value="-10,-3,0,5,9">
        <button class="op-btn load" onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Ex 1</button>
        <button onclick="loadExample(1)">Ex 2</button>
        <button onclick="resetSim()">&#8634; Reset</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Convert Sorted List to BST <span class="sub">&middot; divide &amp; conquer &middot; middle element becomes the root &middot; balanced left / right subtrees</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="array-zone">
                    <div class="array-label">sorted list &middot; mid = &#8970;(lo+hi)/2&#8971; becomes the subtree root</div>
                    <div class="array-rail" id="array-rail"></div>
                </div>
                <div class="tree-stage" id="tree-stage">
                    <div class="tree-canvas" id="tree-canvas">
                        <svg id="edges"></svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm
                                <span class="pills" id="state-pills"></span>
                            </div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            move(el, x, y) {
                const px = el._x, py = el._y;
                const commit = `translate(${x.toFixed(1)}px, ${y.toFixed(1)}px)`;
                if (REDUCED || px == null || (Math.abs(x - px) < 0.5 && Math.abs(y - py) < 0.5)) { el._x = x; el._y = y; el.style.transform = commit; return; }
                const dx = x - px, dy = y - py;
                const kf = SPRING_POS.map(p => ({ transform: `translate(${(px + dx * p).toFixed(1)}px, ${(py + dy * p).toFixed(1)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el._y = y; el.style.transform = commit;
            },
            pop(el) {
                if (REDUCED) { el.style.opacity = '1'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `translate(${el._x.toFixed(1)}px, ${el._y.toFixed(1)}px) scale(${(0.3 + 0.7 * p).toFixed(3)})` }));
                const a = el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
                a.onfinish = () => { el.style.transform = `translate(${el._x.toFixed(1)}px, ${el._y.toFixed(1)}px)`; };
            },
        };

        // ───────── State ─────────
        let listStr = "-10,-3,0,5,9";
        let vals = [];
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        const delays = [1400, 760, 380];
        const nodeEls = {};   // keyed by node id
        const edgeEls = {};   // keyed by child node id
        const acellEls = {};  // keyed by list index

        // ───────── Code panel ─────────
        const CODE = [
            [['kw','def '],['fn','sortedListToBST'],['src','(vals):']],
            [['src','  return '],['fn','build'],['src','(0, len(vals) - 1)']],
            [['src','']],
            [['kw','  def '],['fn','build'],['src','(lo, hi):']],
            [['kw','    if '],['src','lo > hi:'],['kw',' return '],['src','None']],
            [['src','    mid = (lo + hi) // 2']],
            [['src','    root = TreeNode(vals[mid])']],
            [['src','    root.left  = '],['fn','build'],['src','(lo, mid - 1)']],
            [['src','    root.right = '],['fn','build'],['src','(mid + 1, hi)']],
            [['kw','    return '],['src','root']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code & log' : 'Show code & log';
        }

        // ───────── step generation (genuine recursion trace) ─────────
        // Each tree node: { id, val, idx, depth, side, parentId, lo, hi }
        function generateSteps() {
            steps = [];
            vals = listStr.split(',').map(x => parseInt(x.trim(), 10)).filter(x => !isNaN(x));

            const nodes = {};        // id -> node (the BST being built, accumulates across steps)
            let nextId = 0;

            // snapshot helper: deep-copy the partial tree + highlight info
            const snap = (extra) => Object.assign({
                tree: Object.values(nodes).map(n => Object.assign({}, n)),
                lo: -1, hi: -1, mid: -1, curId: null, newId: null,
                placedIdx: [], code: [], action: ''
            }, extra);

            steps.push(snap({
                code: [0, 1],
                panel: `Goal: turn a <b>sorted</b> list into a <b>height-balanced BST</b>. Input <code>[${vals.join(', ')}]</code>. Strategy: pick the <b>middle</b> as the root so the halves are balanced, then recurse on each half.`,
                log: `sortedListToBST([${vals.join(', ')}])`
            }));

            function build(lo, hi, depth, side, parentId) {
                if (lo > hi) {
                    steps.push(snap({
                        code: [4], lo, hi, action: 'base case',
                        panel: `<code>build(${lo}, ${hi})</code>: range is empty (<code>lo &gt; hi</code>) &#8594; return <b>None</b>. This becomes a missing child &#8594; backtrack.`,
                        log: `  build(${lo}, ${hi}) -> None (empty)`
                    }));
                    return null;
                }
                const mid = (lo + hi) >> 1;

                // step: highlight the active range and the chosen mid
                steps.push(snap({
                    code: [3, 5], lo, hi, mid, action: 'pick mid',
                    panel: `<code>build(${lo}, ${hi})</code>: <code>mid = (${lo}+${hi})//2 = ${mid}</code> &#8594; choose <b>${vals[mid]}</b> as the root of this subtree.`,
                    log: `  build(${lo}, ${hi}) -> mid=${mid} (val ${vals[mid]})`
                }));

                // create the node and attach it to the growing tree
                const id = nextId++;
                nodes[id] = { id, val: vals[mid], idx: mid, depth, side, parentId, lo, hi };

                steps.push(snap({
                    code: [6], lo, hi, mid, curId: id, newId: id, action: 'place root',
                    panel: `Create node <b>${vals[mid]}</b>${parentId === null ? ' as the <b>tree root</b>' : (side === 'L' ? ' as the <b>left</b> child of <b>' + nodes[parentId].val + '</b>' : ' as the <b>right</b> child of <b>' + nodes[parentId].val + '</b>')}. Now recurse on the two halves.`,
                    log: `    node(${vals[mid]}) ${parentId === null ? '= root' : (side === 'L' ? 'left of ' + nodes[parentId].val : 'right of ' + nodes[parentId].val)}`
                }));

                // recurse left then right (correct order)
                steps.push(snap({
                    code: [7], lo, hi, mid, curId: id, action: 'recurse left',
                    panel: `Build the <b>left</b> subtree of <b>${vals[mid]}</b> from range <code>[${lo}..${mid - 1}]</code> &#8594; <code>build(${lo}, ${mid - 1})</code>.`,
                    log: `    ${vals[mid]}.left = build(${lo}, ${mid - 1})`
                }));
                build(lo, mid - 1, depth + 1, 'L', id);

                steps.push(snap({
                    code: [8], lo, hi, mid, curId: id, action: 'recurse right',
                    panel: `Build the <b>right</b> subtree of <b>${vals[mid]}</b> from range <code>[${mid + 1}..${hi}]</code> &#8594; <code>build(${mid + 1}, ${hi})</code>.`,
                    log: `    ${vals[mid]}.right = build(${mid + 1}, ${hi})`
                }));
                build(mid + 1, hi, depth + 1, 'R', id);

                steps.push(snap({
                    code: [9], lo, hi, mid, curId: id, action: 'return',
                    panel: `Subtree rooted at <b>${vals[mid]}</b> is complete &#8594; return it to the caller.`,
                    log: `    return node(${vals[mid]})`
                }));
                return id;
            }

            build(0, vals.length - 1, 0, null, null);

            // honest level-order of the final tree
            const lvl = levelOrder(nodes);

            steps.push(snap({
                complete: true, code: [9], action: 'done',
                levelOrder: lvl,
                panel: `Construction complete. Height-balanced BST, level order: <code>[${lvl.join(', ')}]</code>. Each subtree is rooted at the median of its range, so heights differ by at most 1.`,
                log: `done  level-order = [${lvl.join(', ')}]`
            }));

            return lvl;
        }

        // build level-order (BFS) array with nulls for missing children, trimming trailing nulls
        function levelOrder(nodes) {
            const list = Object.values(nodes);
            if (!list.length) return [];
            const root = list.find(n => n.parentId === null);
            const childMap = {};
            list.forEach(n => { if (n.parentId !== null) { (childMap[n.parentId] = childMap[n.parentId] || {})[n.side] = n; } });
            const out = [];
            let q = [root];
            while (q.some(n => n)) {
                const nq = [];
                q.forEach(n => {
                    if (!n) { out.push('null'); nq.push(null, null); return; }
                    out.push(n.val);
                    const kids = childMap[n.id] || {};
                    nq.push(kids.L || null, kids.R || null);
                });
                q = nq;
            }
            while (out.length && out[out.length - 1] === 'null') out.pop();
            return out;
        }

        // ───────── tree layout by depth + horizontal slot ─────────
        const ROW = 64, PADY = 30;
        function treeLayout(tree) {
            if (!tree.length) return { pos: {}, width: 320, height: 120 };
            const maxDepth = Math.max(...tree.map(n => n.depth));
            const wide = Math.pow(2, maxDepth);
            const slot = 60;
            const width = Math.max(wide * slot, 320);
            // assign a stable column index per node via in-order position within its depth using lo/hi midpoint
            // Use the list index (idx) to place x: median index maps to horizontal position. Balanced & stable.
            const n = vals.length || 1;
            const pos = {};
            tree.forEach(node => {
                const x = ((node.idx + 0.5) / n) * width;
                const y = node.depth * ROW + PADY;
                pos[node.id] = { x, y };
            });
            const height = maxDepth * ROW + PADY * 2;
            return { pos, width, height };
        }

        // ───────── render (pure function of steps[idx]) ─────────
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // ---- sorted-list rail ----
            const rail = document.getElementById('array-rail'); const usedA = new Set();
            const placed = new Set(step.placedIdx || []);
            // mark which indices already became roots (any node in tree)
            step.tree.forEach(nd => placed.add(nd.idx));
            for (let i = 0; i < vals.length; i++) {
                usedA.add('a:' + i);
                let el = acellEls['a:' + i];
                if (!el) { el = document.createElement('div'); el.className = 'acell'; el.innerHTML = `<span class="av"></span><span class="ai"></span>`; rail.appendChild(el); acellEls['a:' + i] = el; }
                el.querySelector('.av').textContent = vals[i];
                el.querySelector('.ai').textContent = i;
                let cls = 'acell';
                const inRange = step.lo >= 0 && i >= step.lo && i <= step.hi;
                if (i === step.mid && step.mid >= 0) cls += ' mid';
                else if (inRange) cls += ' range';
                else if (placed.has(i) && !step.complete) cls += ' placed';
                el.className = cls;
            }
            Object.keys(acellEls).forEach(k => { if (!usedA.has(k)) { acellEls[k].remove(); delete acellEls[k]; } });

            // ---- tree ----
            const { pos, width, height } = treeLayout(step.tree);
            const canvas = document.getElementById('tree-canvas');
            const svg = document.getElementById('edges');
            canvas.style.width = width + 'px'; canvas.style.height = Math.max(height, 120) + 'px';
            svg.setAttribute('width', width); svg.setAttribute('height', Math.max(height, 120));

            const treeById = {}; step.tree.forEach(n => treeById[n.id] = n);

            // empty-note when no nodes yet
            let note = canvas.querySelector('.empty-note');
            if (!step.tree.length) { if (!note) { note = document.createElement('div'); note.className = 'empty-note'; note.textContent = 'BST grows here as the recursion picks each middle element'; canvas.appendChild(note); } }
            else if (note) note.remove();

            // nodes
            const usedN = new Set();
            step.tree.forEach(node => {
                const key = 'n:' + node.id; usedN.add(key);
                let el = nodeEls[key]; const fresh = !el;
                if (!el) { el = document.createElement('div'); el.className = 'hnode'; el.innerHTML = `<span class="hv"></span><span class="tag"></span>`; canvas.appendChild(el); nodeEls[key] = el; }
                el.querySelector('.hv').textContent = node.val;
                el.querySelector('.tag').textContent = node.parentId === null ? 'root' : (node.side === 'L' ? 'L' : 'R');
                let cls = 'hnode' + (node.parentId === null ? ' root' : (node.side === 'L' ? ' lchild' : ' rchild'));
                if (node.id === step.newId) cls += ' new';
                else if (node.id === step.curId) cls += ' cur';
                el.className = cls;
                const p = pos[node.id];
                if (fresh) { el._x = p.x; el._y = p.y; el.style.transform = `translate(${p.x}px, ${p.y}px)`; el.style.opacity = '0'; Motion.pop(el); }
                else Motion.move(el, p.x, p.y);
            });
            Object.keys(nodeEls).forEach(k => { if (!usedN.has(k)) { nodeEls[k].remove(); delete nodeEls[k]; } });

            // edges (parent -> child), keyed by child id
            const usedE = new Set();
            step.tree.forEach(node => {
                if (node.parentId === null) return;
                const key = 'e:' + node.id; usedE.add(key);
                let ln = edgeEls[key];
                if (!ln) { ln = document.createElementNS('http://www.w3.org/2000/svg', 'line'); svg.appendChild(ln); edgeEls[key] = ln; }
                const pp = pos[node.parentId], cp = pos[node.id];
                ln.setAttribute('x1', pp.x); ln.setAttribute('y1', pp.y); ln.setAttribute('x2', cp.x); ln.setAttribute('y2', cp.y);
                const onPath = node.id === step.newId || node.parentId === step.curId && node.id === step.newId;
                ln.setAttribute('class', 'edge-ln shown' + (onPath ? ' active' : ''));
            });
            Object.keys(edgeEls).forEach(k => { if (!usedE.has(k)) { edgeEls[k].remove(); delete edgeEls[k]; } });

            // ---- narration / chrome ----
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            highlightCode(step.code);
            renderStatePills(step);

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function renderStatePills(step) {
            const host = document.getElementById('state-pills'); host.innerHTML = '';
            const add = (cls, html) => { const s = document.createElement('span'); s.className = 'spill ' + cls; s.innerHTML = html; host.appendChild(s); };
            if (step.complete) { add('mid', `BST = <b>[${(step.levelOrder || []).join(', ')}]</b>`); return; }
            if (step.lo >= 0) {
                add('left', `range <b>[${step.lo}..${step.hi}]</b>`);
                if (step.mid >= 0) add('mid', `mid <b>${step.mid}</b> = <b>${vals[step.mid]}</b>`);
            } else {
                add('', `<b>${step.action || 'init'}</b>`);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(nodeEls).forEach(k => { nodeEls[k].remove(); delete nodeEls[k]; });
            Object.keys(edgeEls).forEach(k => { edgeEls[k].remove(); delete edgeEls[k]; });
            Object.keys(acellEls).forEach(k => { acellEls[k].remove(); delete acellEls[k]; });
            document.getElementById('array-rail').innerHTML = '';
            const note = document.querySelector('.empty-note'); if (note) note.remove();
        }
        function loadList(str) { pause(); listStr = str; clearDom(); generateSteps(); renderStep(0); }
        function loadCustom() {
            const v = document.getElementById('list-input').value.trim();
            if (!v) { document.getElementById('list-input').focus(); return; }
            loadList(v);
        }
        function loadExample(n) {
            const exs = ["-10,-3,0,5,9", "1,2,3,4,5,6,7"];
            document.getElementById('list-input').value = exs[n];
            loadList(exs[n]);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('list-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
