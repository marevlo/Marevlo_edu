<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scramble String &middot; Recursion Tree</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; width:150px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration.fail{border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.06);}
.narration.fail::before{content:'\2717'; color:var(--accent-red);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:360px; overflow-x:auto; overflow-y:hidden; position:relative;}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

svg.tree{display:block; margin:0 auto;}
.edge{stroke:var(--border-main); stroke-width:2; fill:none; transition:stroke .4s, opacity .4s; opacity:.32;}
.edge.lit{stroke:var(--accent-blue); opacity:.9; filter:drop-shadow(0 0 4px rgba(6,182,212,.5));}
.edge.swap{stroke:var(--accent-purple);}
.edge.ret-t{stroke:var(--accent-green); opacity:.95; filter:drop-shadow(0 0 5px rgba(34,197,94,.55));}
.edge.ret-f{stroke:var(--accent-red); opacity:.8; filter:drop-shadow(0 0 4px rgba(248,81,73,.4));}
.edge-lbl{font-family:var(--mono); font-weight:700; font-size:10.5px; fill:var(--text-dim); text-anchor:middle; dominant-baseline:central; opacity:.32; transition:opacity .4s, fill .4s;}
.edge-lbl.lit{opacity:.95; fill:#7dd3fc;}
.edge-lbl.swap{fill:#d8b4fe;}

.node-g{cursor:default;}
.node-c{fill:rgba(255,255,255,.04); stroke:var(--border-main); stroke-width:2; transition:fill .4s, stroke .4s, opacity .35s;}
.node-s1{font-family:var(--mono); font-weight:800; font-size:12.5px; fill:var(--accent-orange); text-anchor:middle; dominant-baseline:central; transition:opacity .35s;}
.node-sep{stroke:var(--border-main); stroke-width:1; opacity:.5;}
.node-s2{font-family:var(--mono); font-weight:800; font-size:12.5px; fill:#7dd3fc; text-anchor:middle; dominant-baseline:central; transition:opacity .35s;}
.node-ret{font-family:var(--mono); font-weight:800; font-size:11px; text-anchor:middle; dominant-baseline:central; opacity:0; transition:opacity .35s;}
.node-g.pending .node-c{opacity:.28;} .node-g.pending .node-s1,.node-g.pending .node-s2{opacity:.28;}
.node-g.active .node-c{fill:rgba(6,182,212,.16); stroke:var(--accent-blue); filter:drop-shadow(0 0 12px rgba(6,182,212,.55));}
.node-g.base .node-c{fill:rgba(245,165,36,.14); stroke:var(--accent-orange); filter:drop-shadow(0 0 9px rgba(245,165,36,.45));}
.node-g.true .node-c{fill:rgba(34,197,94,.12); stroke:var(--accent-green);}
.node-g.true .node-ret{fill:var(--accent-green); opacity:1;}
.node-g.false .node-c{fill:rgba(248,81,73,.10); stroke:var(--accent-red);}
.node-g.false .node-ret{fill:var(--accent-red); opacity:1;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;} .code-line .cm{color:#5c6b85;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.c b{color:var(--accent-blue);} .pill.r b{color:var(--accent-green);} .pill.d b{color:var(--accent-orange);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 240px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>s1 =</label>
  <input type="text" id="s1-input" placeholder="great">
  <label>s2 =</label>
  <input type="text" id="s2-input" placeholder="rgeat">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(0)">Ex 1 (great, rgeat)</button>
  <button onclick="loadExample(1)">Ex 2 (abcde, caebd)</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Scramble String <span class="sub">&middot; recursion tree</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen" id="screen">
      <div id="confetti"></div>
      <svg class="tree" id="tree"></svg>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&#8592; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &#8594;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&#8592; &#8594;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill c">testing <b id="pill-n">&mdash;</b></span>
        <span class="pill r">returns <b id="pill-ret">&mdash;</b></span>
        <span class="pill d">calls <b id="pill-calls">0</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>active</span>
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>base</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>swap</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>true</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const CODE=[
  [['kw','function'],['fn',' isScramble'],['src','(a, b) {']],
  [['src','  '],['kw','if'],['src',' (a === b) '],['kw','return'],['src',' true;']],
  [['src','  '],['kw','if'],['src',' (a.length === 1) '],['kw','return'],['src',' false;']],
  [['src','  '],['kw','if'],['src',' (sorted(a) !== sorted(b)) '],['kw','return'],['src',' false;']],
  [['src','  '],['kw','for'],['src',' (k = 1; k < n; k++) {']],
  [['src','    '],['cm','// no-swap split']],
  [['src','    '],['kw','if'],['src',' (S(a[..k],b[..k]) && S(a[k..],b[k..])) '],['kw','return'],['src',' true;']],
  [['src','    '],['cm','// swap split']],
  [['src','    '],['kw','if'],['src',' (S(a[..k],b[n-k..]) && S(a[k..],b[..n-k])) '],['kw','return'],['src',' true;']],
  [['src','  }']],
  [['src','  '],['kw','return'],['src',' false;']],
  [['src','}']],
];

let s1="great", s2="rgeat", steps=[], stepIndex=0, timer=null;
const delays=[1500,780,400];
let confettiArmed=true;
// layout / tree model (built per input-load by simulating the algorithm)
let NODES=[];           // {id, a, b, parent, edge:{k,swap,side}|null, depth, children:[], ret, x, y}
const NW=92, NH=46;     // node box
const LAYER_H=92, GAP=18;

function init(){ buildCode(); loadExample(0); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(ex){
  if(ex===0){ s1="great"; s2="rgeat"; } else { s1="abcde"; s2="caebd"; }
  document.getElementById('s1-input').value=s1; document.getElementById('s2-input').value=s2;
  build(); reset();
}
function loadCustom(){
  const a=document.getElementById('s1-input').value.trim();
  const b=document.getElementById('s2-input').value.trim();
  if(!a||!b){ alert('Please enter both s1 and s2.'); return; }
  if(a.length!==b.length){ alert('Strings must have the same length.'); return; }
  if(a.length>7){ alert('Keep strings to 7 characters or fewer — the tree grows fast!'); return; }
  s1=a; s2=b; build(); reset();
}

function sorted(s){ return s.split('').sort().join(''); }

// ── Pass 1: simulate the algorithm to build the EXACT ordered call tree.
// Records every call that actually happens (short-circuit aware), with parent,
// the split k + swap flag that produced it, and its real return value.
function buildTree(){
  NODES=[];
  function rec(a,b,parent,edge,depth){
    const id=NODES.length;
    const node={id,a,b,parent,edge,depth,children:[],ret:null,x:0,y:depth*LAYER_H+34};
    NODES.push(node);
    if(parent>=0) NODES[parent].children.push(id);
    if(a===b){ node.ret=true; return id; }
    if(a.length===1){ node.ret=false; return id; }
    if(sorted(a)!==sorted(b)){ node.ret=false; return id; }
    const n=a.length;
    for(let k=1;k<n;k++){
      // no-swap split
      const l1=rec(a.slice(0,k), b.slice(0,k), id, {k,swap:false,side:'L'}, depth+1);
      if(NODES[l1].ret){
        const r1=rec(a.slice(k), b.slice(k), id, {k,swap:false,side:'R'}, depth+1);
        if(NODES[r1].ret){ node.ret=true; return id; }
      }
      // swap split
      const l2=rec(a.slice(0,k), b.slice(n-k), id, {k,swap:true,side:'L'}, depth+1);
      if(NODES[l2].ret){
        const r2=rec(a.slice(k), b.slice(0,n-k), id, {k,swap:true,side:'R'}, depth+1);
        if(NODES[r2].ret){ node.ret=true; return id; }
      }
    }
    node.ret=false; return id;
  }
  rec(s1,s2,-1,null,0);
}

// ── Layout: leaf-based x (left-to-right), parents = midpoint of children.
function layout(){
  let leafX=0;
  function place(id){ const nd=NODES[id];
    if(nd.children.length===0){ nd.x=leafX*(NW+GAP)+NW/2+26; leafX++; }
    else{ nd.children.forEach(place); nd.x=(NODES[nd.children[0]].x+NODES[nd.children[nd.children.length-1]].x)/2; }
  }
  place(0);
  const W=Math.max(leafX*(NW+GAP)+52, 620);
  const maxDepth=Math.max(...NODES.map(n=>n.depth));
  const H=(maxDepth+1)*LAYER_H+46;
  return {W,H};
}

// ── Build the static SVG skeleton ONCE per input-load.
function buildSkeleton(){
  const {W,H}=layout();
  const svg=document.getElementById('tree');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`); svg.setAttribute('width',W); svg.setAttribute('height',H);
  const NS='http://www.w3.org/2000/svg';
  svg.innerHTML='';
  // edges first
  NODES.forEach(nd=>{ if(nd.parent>=0){ const p=NODES[nd.parent];
    const e=document.createElementNS(NS,'path'); e.setAttribute('class','edge'); e.id='e'+nd.id;
    e.setAttribute('d',`M ${p.x} ${p.y+NH/2} C ${p.x} ${(p.y+nd.y)/2}, ${nd.x} ${(p.y+nd.y)/2}, ${nd.x} ${nd.y-NH/2}`);
    svg.appendChild(e);
    // edge label: the split being tested (k value, swap marker, L/R)
    const lbl=document.createElementNS(NS,'text'); lbl.setAttribute('class','edge-lbl'); lbl.id='el'+nd.id;
    lbl.setAttribute('x',(p.x+nd.x)/2 + (nd.edge.side==='L'?-2:2));
    lbl.setAttribute('y',(p.y+NH/2 + nd.y-NH/2)/2 - 4);
    lbl.textContent=(nd.edge.swap?'⇄ ':'')+'k'+nd.edge.k+' '+nd.edge.side;
    svg.appendChild(lbl);
  }});
  // nodes
  NODES.forEach(nd=>{
    const g=document.createElementNS(NS,'g'); g.setAttribute('class','node-g pending'); g.id='n'+nd.id;
    const r=document.createElementNS(NS,'rect'); r.setAttribute('class','node-c');
    r.setAttribute('x',nd.x-NW/2); r.setAttribute('y',nd.y-NH/2); r.setAttribute('width',NW); r.setAttribute('height',NH); r.setAttribute('rx',11);
    const t1=document.createElementNS(NS,'text'); t1.setAttribute('class','node-s1'); t1.setAttribute('x',nd.x); t1.setAttribute('y',nd.y-9); t1.textContent='"'+nd.a+'"';
    const sep=document.createElementNS(NS,'line'); sep.setAttribute('class','node-sep');
    sep.setAttribute('x1',nd.x-NW/2+10); sep.setAttribute('x2',nd.x+NW/2-10); sep.setAttribute('y1',nd.y); sep.setAttribute('y2',nd.y);
    const t2=document.createElementNS(NS,'text'); t2.setAttribute('class','node-s2'); t2.setAttribute('x',nd.x); t2.setAttribute('y',nd.y+10); t2.textContent='"'+nd.b+'"';
    const rv=document.createElementNS(NS,'text'); rv.setAttribute('class','node-ret'); rv.setAttribute('x',nd.x); rv.setAttribute('y',nd.y+NH/2+11); rv.id='rv'+nd.id;
    g.appendChild(r); g.appendChild(t1); g.appendChild(sep); g.appendChild(t2); g.appendChild(rv);
    svg.appendChild(g);
  });
}

// ── Pass 2: walk the recorded tree to generate immutable per-step snapshots.
function generateSteps(){
  steps=[]; const state={}; NODES.forEach(nd=>state[nd.id]='pending'); const retv={}; let calls=0;
  function snap(o){
    steps.push({state:{...state}, ret:{...retv}, litEdge:o.litEdge??null, retEdge:o.retEdge??null,
      n:o.n??'—', retShow:o.retShow??'—', calls, code:o.code, narr:o.narr, log:o.log,
      complete:o.complete, fail:o.fail});
  }
  steps.push({state:{...state}, ret:{}, litEdge:null, retEdge:null, n:'—', retShow:'—', calls:0, code:[0],
    narr:`Is <code>"${s2}"</code> a scrambled version of <code>"${s1}"</code>? Recurse on every split point, trying both the matched and swapped halves.`,
    log:`isScramble("${s1}", "${s2}")`});

  function walk(id){
    const nd=NODES[id]; calls++; state[id]='active';
    snap({n:`"${nd.a}" / "${nd.b}"`, code:[0,1], litEdge:nd.parent>=0?id:null,
      narr:`Call <code>isScramble("${nd.a}", "${nd.b}")</code>. First check: are the substrings already equal?`,
      log:`${'  '.repeat(nd.depth)}call("${nd.a}","${nd.b}")`});

    // base: equal
    if(nd.a===nd.b){
      state[id]='base'; retv[id]='T';
      snap({n:`"${nd.a}" / "${nd.b}"`, code:[1], retShow:'true',
        narr:`<b>Base case:</b> <code>"${nd.a}" === "${nd.b}"</code> &rarr; return <b>true</b>.`,
        log:`${'  '.repeat(nd.depth)}→ true (equal)`});
      state[id]='true'; return true;
    }
    // base: length 1, chars differ
    if(nd.a.length===1){
      state[id]='base'; retv[id]='F';
      snap({n:`"${nd.a}" / "${nd.b}"`, code:[2], retShow:'false', fail:true,
        narr:`<b>Base case:</b> length 1 and <code>"${nd.a}" ≠ "${nd.b}"</code> &rarr; return <b>false</b>.`,
        log:`${'  '.repeat(nd.depth)}→ false (len 1)`});
      state[id]='false'; return false;
    }
    // pruning: sorted chars differ
    if(sorted(nd.a)!==sorted(nd.b)){
      state[id]='base'; retv[id]='F';
      snap({n:`"${nd.a}" / "${nd.b}"`, code:[3], retShow:'false', fail:true,
        narr:`<b>Prune:</b> sorted chars differ (<code>${sorted(nd.a)} ≠ ${sorted(nd.b)}</code>) &rarr; return <b>false</b>.`,
        log:`${'  '.repeat(nd.depth)}→ false (sorted differ)`});
      state[id]='false'; return false;
    }
    // recurse over the children recorded in pass 1 (already in true execution order)
    let ci=0; const n=nd.a.length;
    for(let k=1;k<n;k++){
      // no-swap: left child must exist as next child with this k/L/no-swap
      const cl1=nd.children[ci];
      snap({n:`"${nd.a}" / "${nd.b}"`, code:[4,5,6], litEdge:cl1,
        narr:`Split at <code>k=${k}</code> (no swap): test left <code>"${nd.a.slice(0,k)}"</code> vs <code>"${nd.b.slice(0,k)}"</code>.`,
        log:`${'  '.repeat(nd.depth)}k=${k} no-swap`});
      const L1=walk(cl1); ci++;
      if(L1){
        const cr1=nd.children[ci];
        snap({n:`"${nd.a}" / "${nd.b}"`, code:[6], litEdge:cr1,
          narr:`Left matched. Now test right <code>"${nd.a.slice(k)}"</code> vs <code>"${nd.b.slice(k)}"</code>.`,
          log:`${'  '.repeat(nd.depth)}k=${k} no-swap right`});
        const R1=walk(cr1); ci++;
        if(R1){
          retv[id]='T'; state[id]='true';
          snap({n:`"${nd.a}" / "${nd.b}"`, code:[6], retShow:'true', retEdge:nd.parent>=0?id:null,
            narr:`Both halves matched at <code>k=${k}</code> (no swap) &rarr; <code>"${nd.a}"/"${nd.b}"</code> returns <b>true</b>.`,
            log:`${'  '.repeat(nd.depth)}→ true (k=${k} no-swap)`});
          return true;
        }
      }
      // swap: left child
      const cl2=nd.children[ci];
      snap({n:`"${nd.a}" / "${nd.b}"`, code:[4,7,8], litEdge:cl2,
        narr:`Split at <code>k=${k}</code> (⇄ swap): test left <code>"${nd.a.slice(0,k)}"</code> vs swapped tail <code>"${nd.b.slice(n-k)}"</code>.`,
        log:`${'  '.repeat(nd.depth)}k=${k} swap`});
      const L2=walk(cl2); ci++;
      if(L2){
        const cr2=nd.children[ci];
        snap({n:`"${nd.a}" / "${nd.b}"`, code:[8], litEdge:cr2,
          narr:`Swapped left matched. Now test right <code>"${nd.a.slice(k)}"</code> vs <code>"${nd.b.slice(0,n-k)}"</code>.`,
          log:`${'  '.repeat(nd.depth)}k=${k} swap right`});
        const R2=walk(cr2); ci++;
        if(R2){
          retv[id]='T'; state[id]='true';
          snap({n:`"${nd.a}" / "${nd.b}"`, code:[8], retShow:'true', retEdge:nd.parent>=0?id:null,
            narr:`Both halves matched at <code>k=${k}</code> (⇄ swap) &rarr; <code>"${nd.a}"/"${nd.b}"</code> returns <b>true</b>.`,
            log:`${'  '.repeat(nd.depth)}→ true (k=${k} swap)`});
          return true;
        }
      }
    }
    // no split worked
    retv[id]='F'; state[id]='false';
    snap({n:`"${nd.a}" / "${nd.b}"`, code:[10], retShow:'false', fail:true, retEdge:nd.parent>=0?id:null,
      narr:`No split (matched or swapped) worked for <code>"${nd.a}"/"${nd.b}"</code> &rarr; return <b>false</b>.`,
      log:`${'  '.repeat(nd.depth)}→ false (no split)`});
    return false;
  }
  const ans=walk(0);
  steps.push({state:{...state}, ret:{...retv}, litEdge:null, retEdge:null, n:'—', retShow:ans?'true':'false', calls,
    code:[], complete:ans?true:undefined, fail:!ans,
    narr:`Done &mdash; <code>"${s2}"</code> ${ans?'<b>is</b>':'<b>is NOT</b>'} a scramble of <code>"${s1}"</code>. Result <b>${ans}</b> (computed with <b>${calls}</b> calls).`,
    log:`Result: ${ans}  ·  ${calls} calls`});
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  NODES.forEach(nd=>{
    const g=document.getElementById('n'+nd.id); if(!g) return;
    g.classList.remove('pending','active','base','true','false');
    g.classList.add(step.state[nd.id]||'pending');
    const rv=document.getElementById('rv'+nd.id);
    if(rv){ const v=step.ret&&step.ret[nd.id]; rv.textContent = v==='T' ? 'true' : (v==='F' ? 'false' : ''); }
    const e=document.getElementById('e'+nd.id); const el=document.getElementById('el'+nd.id);
    if(e){ e.classList.remove('lit','swap','ret-t','ret-f');
      if(el) el.classList.remove('lit','swap');
      const st=step.state[nd.id];
      if(step.retEdge===nd.id){ e.classList.add(step.ret[nd.id]==='T'?'ret-t':'ret-f'); }
      else if(st==='true'){ e.classList.add('ret-t'); }
      else if(st==='false'){ e.classList.add('ret-f'); }
      else if(step.litEdge===nd.id || st==='active' || st==='base'){
        e.classList.add('lit'); if(el) el.classList.add('lit');
        if(nd.edge&&nd.edge.swap){ e.classList.add('swap'); if(el) el.classList.add('swap'); }
      }
    }
  });
  // scroll active node into view
  const ag=NODES.find(nd=>step.state[nd.id]==='active'||step.state[nd.id]==='base');
  if(ag){ const sc=document.getElementById('screen'); const svg=document.getElementById('tree');
    const vb=parseFloat((svg.getAttribute('viewBox')||'0 0 1 1').split(' ')[2])||1;
    const ratio=svg.clientWidth/vb; const cx=ag.x*ratio; const target=cx-sc.clientWidth/2;
    sc.scrollTo({left:Math.max(0,target), behavior:REDUCED?'auto':'smooth'}); }

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done',!!step.complete);
  narr.classList.toggle('fail',!!step.fail && !step.complete);
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', (step.code||[]).includes(i)); });
  document.getElementById('pill-n').textContent=step.n;
  document.getElementById('pill-ret').textContent=step.retShow;
  document.getElementById('pill-calls').textContent=step.calls;
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;
  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color='var(--accent-green)';
    else if(steps[k].fail) d.style.color='var(--accent-red)';
    log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;
  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function build(){ buildTree(); buildSkeleton(); generateSteps(); }

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=init;
</script>
</body>
</html>
