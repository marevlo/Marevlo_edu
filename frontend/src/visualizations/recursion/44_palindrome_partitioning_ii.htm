<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Partitioning II - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* answer / min cut tile          */
            --accent-blue:   #06b6d4;    /* dependency / chrome            */
            --accent-green:  #22c55e;    /* palindrome = true / improved   */
            --accent-red:    #f43f5e;    /* not a palindrome               */
            --accent-purple: #a855f7;    /* current cell being filled      */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 180px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); padding: 22px; }

        /* ── string ribbon ── */
        .ribbon-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-bottom: 20px; }
        .ribbon-label { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); }
        .ribbon { display: flex; gap: 6px; }
        .ch-tile {
            width: 38px; height: 44px; border-radius: 9px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: var(--mono); font-weight: 800; font-size: 18px; border: 2px solid var(--border-main);
            background: rgba(255,255,255,0.04); color: var(--text-main); position: relative; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .ch-tile .ix { position: absolute; top: -15px; font-size: 10px; color: var(--text-dim); font-weight: 700; }
        .ch-tile.span { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 16px rgba(168,85,247,0.4); }
        .ch-tile.pal { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.85), rgba(33,194,117,0.85)); color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.45); }
        .ch-tile.bad { border-color: var(--accent-red); background: rgba(244,63,94,0.14); color: #fecdd3; }
        .ch-tile.endpt { border-color: var(--accent-blue); box-shadow: 0 0 14px rgba(6,182,212,0.35); }

        /* ── two-column: grid + cuts ── */
        .stage-cols { display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
        .col-title { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; text-align: center; }

        .grid-stage { overflow: auto; scrollbar-width: thin; }
        .grid-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .grid-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .dp-grid { display: grid; gap: 4px; }
        .cell {
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-family: var(--mono); font-weight: 800; font-size: 14px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            width: 34px; height: 34px; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .cell.head { border: none; background: transparent; color: var(--text-dim); font-size: 14px; font-weight: 800; box-shadow: none; }
        .cell.corner { background: transparent; border: none; box-shadow: none; }
        .cell.head.lit { color: var(--accent-purple); }
        .cell.head.lit2 { color: var(--accent-blue); }
        .cell.na { background: transparent; border-color: transparent; color: transparent; }
        .cell.empty { color: var(--text-dim); background: rgba(255,255,255,0.02); }
        .cell.tru { border-color: var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0; }
        .cell.fls { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.08); color: #fda4af; }
        .cell.dep { border-color: var(--accent-blue); background: rgba(6,182,212,0.12); color: #a5f3fc; box-shadow: 0 0 10px rgba(6,182,212,0.3); }
        .cell.current { border-color: var(--accent-purple); background: rgba(168,85,247,0.18); color: #e9d5ff; box-shadow: 0 0 18px rgba(168,85,247,0.55), inset 0 0 10px rgba(168,85,247,0.12); transform: scale(1.1); z-index: 2; }

        /* ── cuts array ── */
        .cuts-row { display: flex; gap: 6px; align-items: flex-end; }
        .cut-col { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .cut-ix { font-family: var(--mono); font-size: 10px; color: var(--text-dim); font-weight: 700; }
        .cut-tile {
            width: 42px; height: 44px; border-radius: 9px; display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-weight: 800; font-size: 17px; border: 2px solid var(--border-main);
            background: rgba(255,255,255,0.04); color: var(--text-main); will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .cut-tile.base { color: var(--text-dim); }
        .cut-tile.dep { border-color: var(--accent-blue); background: rgba(6,182,212,0.12); color: #a5f3fc; box-shadow: 0 0 12px rgba(6,182,212,0.3); }
        .cut-tile.current { border-color: var(--accent-purple); background: rgba(168,85,247,0.18); color: #e9d5ff; box-shadow: 0 0 18px rgba(168,85,247,0.5); transform: scale(1.08); }
        .cut-tile.answer { border-color: var(--accent-orange); background: rgba(245,165,36,0.20); color: #ffd591; box-shadow: 0 0 20px rgba(245,165,36,0.55); }

        .action-stage { position: relative; min-height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 8px; align-items: center; min-height: 40px; }
        .ans-tile { min-width: 40px; height: 46px; padding: 0 10px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 22px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 14px rgba(245,165,36,0.35); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 17px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-wrap { display: flex; flex-direction: column; }
        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); } .pill.b b { color: var(--accent-orange); } .pill.g b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">string =</label>
        <input type="text" id="str-input" value="aab" maxlength="9">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Ex 1 ("aab")</button>
        <button onclick="loadExample(1)">Ex 2 ("abc")</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Palindrome Partitioning II <span class="sub">&middot; DP &middot; isPal[i][j] &amp; cuts[i] = min(cuts[j]+1) &middot; O(n&sup2;)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="ribbon-wrap">
                    <div class="ribbon-label">input string</div>
                    <div class="ribbon" id="ribbon"></div>
                </div>
                <div class="stage-cols">
                    <div>
                        <div class="col-title">isPalindrome[i][j] &nbsp;(rows = i &middot; cols = j)</div>
                        <div class="grid-stage"><div class="dp-grid" id="dp-grid"></div></div>
                    </div>
                    <div>
                        <div class="col-title">cuts[ ] &nbsp;(min cuts for prefix len)</div>
                        <div class="cuts-row" id="cuts-row"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill c">span [j,i) <b id="st-span">&mdash;</b></span>
                            <span class="pill g">isPalindrome <b id="st-pal">&mdash;</b></span>
                            <span class="pill b">cuts[len] <b id="st-cut">&mdash;</b></span>
                            <span class="pill">answer <b id="st-ans">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring pop, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.4 + 0.66 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // ───────── State ─────────
        let s = "aab";
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 720, 330];
        const cellEls = {};   // 'gr,gc' -> grid element
        const cutEls = {};    // 'k'     -> cut tile element
        const chEls = {};     // 'k'     -> ribbon tile element

        const CODE = [
            [['kw','def '],['fn','minCut'],['src','(s):  n = len(s)']],
            [['src','  isPal = [[False]*n for _ in range(n)]']],
            [['src','  cuts = [i-1 for i in range(n+1)]   # cuts[0]=-1']],
            [['kw','  for '],['src','i in 1..n:           # prefix s[0:i]']],
            [['kw','    for '],['src','j in 0..i-1:        # last piece s[j:i]']],
            [['kw','      if '],['src','s[j]==s[i-1] and (i-1-j<2 or isPal[j+1][i-2]):']],
            [['src','        isPal[j][i-1] = True']],
            [['kw','        if '],['src','isPal[j][i-1]:']],
            [['src','          cuts[i] = min(cuts[i], cuts[j] + 1)']],
            [['kw','  return '],['src','cuts[n]']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const sp = document.createElement('span'); sp.className = cls; sp.textContent = txt; src.appendChild(sp); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── step generation (genuine DP trace) ─────────
        function deepCopy(g) { return g.map(row => row.slice()); }
        function generateSteps() {
            steps = [];
            const n = s.length;
            // isPal[j][i-1]: is s[j..i-1] a palindrome
            const isPal = Array.from({ length: Math.max(n, 1) }, () => Array(Math.max(n, 1)).fill(false));
            const cuts = Array.from({ length: n + 1 }, (_, i) => i - 1);   // cuts[0] = -1

            const snap = (extra) => Object.assign({
                s, n, isPal: deepCopy(isPal), cuts: cuts.slice(),
                span: null, deps: [], gridCur: null, gridTrue: null, gridFalse: null,
                cutCur: null, cutDep: null, answer: null
            }, extra);

            steps.push(snap({
                code: [0, 1, 2], action: 'BUILD TABLES', actionColor: 'var(--accent-blue)',
                panel: `Minimum cuts to split <code>"${s}"</code> into palindromes. Fill <code>isPal[j][i]</code> (is <code>s[j..i]</code> a palindrome) and <code>cuts[i]</code> = fewest cuts for the prefix of length <code>i</code>. Init <code>cuts[i]=i-1</code> (worst case: cut every char).`,
                log: `init  s="${s}" (n=${n})  cuts=[${cuts.join(',')}]`
            }));

            for (let i = 1; i <= n; i++) {            // prefix s[0..i-1], length i
                for (let j = 0; j < i; j++) {         // last piece s[j..i-1]
                    const a = j, b = i - 1;           // grid coords (row j, col i-1)
                    const inner = (b - a < 2) || isPal[a + 1][b - 1];
                    const charsEq = s[a] === s[b];
                    const pal = charsEq && inner;
                    const dep = (b - a >= 2) ? [[a + 1, b - 1]] : [];

                    // Step 1: evaluate the span / isPalindrome
                    steps.push(snap({
                        span: [a, b], gridCur: [a, b], deps: dep,
                        code: pal ? [5, 6] : [5],
                        action: charsEq
                            ? (pal ? `s[${a}]=s[${b}]='${s[a]}'  &amp; inner OK  &rarr; palindrome` : `'${s[a]}'='${s[b]}' but inner not pal`)
                            : `s[${a}]='${s[a]}' &ne; s[${b}]='${s[b]}'  &rarr; not pal`,
                        actionColor: pal ? 'var(--accent-green)' : 'var(--accent-red)',
                        panel: pal
                            ? `<code>s[${a}..${b}]="${s.slice(a, b + 1)}"</code> is a <b>palindrome</b>: ends match${b - a >= 2 ? ` and inner <code>isPal[${a + 1}][${b - 1}]</code> is true` : ''} &#8594; set <code>isPal[${a}][${b}] = true</code>.`
                            : `<code>s[${a}..${b}]="${s.slice(a, b + 1)}"</code> is <b>not</b> a palindrome (${charsEq ? 'ends match but inner fails' : `ends '${s[a]}'&#8800;'${s[b]}'`}).`,
                        log: `(j=${a},i=${i}) "${s.slice(a, b + 1)}" ${pal ? '✓ palindrome' : '✗ not pal'}`
                    }));

                    isPal[a][b] = pal;

                    // Step 2: if palindrome, relax cuts[i] from cuts[j]
                    if (pal) {
                        const before = cuts[i];
                        const cand = cuts[j] + 1;
                        const improved = cand < before;
                        cuts[i] = Math.min(before, cand);
                        steps.push(snap({
                            span: [a, b], gridCur: [a, b], gridTrue: [a, b],
                            cutCur: i, cutDep: j,
                            code: [7, 8],
                            action: improved ? `cuts[${i}] = cuts[${j}]+1 = ${cuts[i]}  (improved)` : `cuts[${i}] stays ${cuts[i]}`,
                            actionColor: improved ? 'var(--accent-green)' : 'var(--accent-blue)',
                            panel: improved
                                ? `Palindrome piece <code>s[${a}..${b}]</code> lets us extend the best split of the prefix of length <code>${j}</code>: <code>cuts[${i}] = cuts[${j}]+1 = ${cuts[i]}</code>.`
                                : `Using <code>s[${a}..${b}]</code> gives <code>cuts[${j}]+1 = ${cand}</code>, not better than current <code>cuts[${i}]=${cuts[i]}</code>.`,
                            log: `      cuts[${i}] = min(${before}, ${cand}) = ${cuts[i]}`
                        }));
                    }
                }
            }

            const answer = n > 0 ? cuts[n] : 0;
            steps.push(snap({
                complete: true, confetti: true, code: [9],
                cutCur: n, answer,
                action: `✓ minimum cuts = ${answer}`, actionColor: 'var(--accent-green)',
                panel: `Done. <code>cuts[${n}]</code> holds the answer: <b>${answer}</b> cut${answer === 1 ? '' : 's'} split <code>"${s}"</code> into palindromes.`,
                log: `done  minimum cuts = ${answer}`
            }));
        }

        // ───────── render (persistent DOM) ─────────
        function renderRibbon(step) {
            const host = document.getElementById('ribbon'); const used = new Set();
            const a = step.span ? step.span[0] : -1, b = step.span ? step.span[1] : -1;
            const isTrueSpan = step.gridTrue && step.span;
            for (let k = 0; k < step.n; k++) {
                used.add('' + k);
                let el = chEls[k];
                if (!el) {
                    el = document.createElement('div'); el.className = 'ch-tile';
                    el.innerHTML = `<span class="ix"></span><span class="cc"></span>`;
                    chEls[k] = el;
                }
                el.querySelector('.ix').textContent = k;
                el.querySelector('.cc').textContent = step.s[k];
                let cls = 'ch-tile';
                if (k >= a && k <= b && a >= 0) cls += isTrueSpan ? ' pal' : ' span';
                if ((k === a || k === b) && a >= 0) cls += ' endpt';
                el.className = cls;
                host.appendChild(el);
            }
            Object.keys(chEls).forEach(k => { if (!used.has(k)) { chEls[k].remove(); delete chEls[k]; } });
        }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            renderRibbon(step);

            // ── isPalindrome grid (rows j = 0..n-1, cols i = 0..n-1); +1 header row/col ──
            const grid = document.getElementById('dp-grid');
            const rows = step.n + 1, cols = step.n + 1;
            grid.style.gridTemplateColumns = `repeat(${cols}, 34px)`;
            const depSet = new Set((step.deps || []).map(d => d[0] + ',' + d[1]));
            const curKey = step.gridCur ? step.gridCur[0] + ',' + step.gridCur[1] : null;
            const used = new Set();

            for (let gr = 0; gr < rows; gr++) {
                for (let gc = 0; gc < cols; gc++) {
                    const key = gr + ',' + gc; used.add(key);
                    let el = cellEls[key];
                    if (!el) { el = document.createElement('div'); el.className = 'cell'; cellEls[key] = el; }
                    let cls = 'cell', txt = '', isData = false;

                    if (gr === 0 && gc === 0) { cls += ' corner'; }
                    else if (gr === 0) {                 // column header = i (col index)
                        cls += ' head'; txt = step.s[gc - 1];
                        if (step.span && step.span[1] === gc - 1) cls += ' lit2';
                    } else if (gc === 0) {               // row header = j (row index)
                        cls += ' head'; txt = step.s[gr - 1];
                        if (step.span && step.span[0] === gr - 1) cls += ' lit';
                    } else {
                        isData = true;
                        const j = gr - 1, ic = gc - 1, dk = j + ',' + ic;
                        if (j > ic) { cls += ' na'; txt = ''; }   // lower triangle unused
                        else {
                            const v = step.isPal[j][ic];
                            // a cell is "shown" once the trace has reached/passed its (j,i) evaluation
                            const shown = isCellShown(step, j, ic);
                            if (!shown) { cls += ' empty'; txt = ''; }
                            else { cls += v ? ' tru' : ' fls'; txt = v ? 'T' : 'F'; }
                            if (depSet.has(dk)) cls += ' dep';
                            if (curKey === dk) cls += ' current';
                        }
                    }
                    const wasEmpty = el.textContent === '';
                    el.className = cls; el.textContent = txt;
                    if (isData && wasEmpty && (txt === 'T' || txt === 'F')) Motion.pop(el);
                    grid.appendChild(el);
                }
            }
            Object.keys(cellEls).forEach(k => { if (!used.has(k)) { cellEls[k].remove(); delete cellEls[k]; } });

            // ── cuts[] array ──
            const cutsRow = document.getElementById('cuts-row'); const cused = new Set();
            for (let k = 0; k <= step.n; k++) {
                cused.add('' + k);
                let col = cutEls[k];
                if (!col) {
                    col = document.createElement('div'); col.className = 'cut-col';
                    col.innerHTML = `<div class="cut-tile"></div><div class="cut-ix"></div>`;
                    cutEls[k] = col;
                }
                const tile = col.querySelector('.cut-tile');
                col.querySelector('.cut-ix').textContent = k;
                let cls = 'cut-tile';
                if (k === 0) cls += ' base';
                if (step.cutDep === k) cls += ' dep';
                if (step.answer != null && k === step.n) cls += ' answer';
                else if (step.cutCur === k) cls += ' current';
                const prev = tile.textContent;
                const val = String(step.cuts[k]);
                tile.className = cls; tile.textContent = val;
                if (prev !== val && prev !== '') Motion.pop(tile);
                cutsRow.appendChild(col);
            }
            Object.keys(cutEls).forEach(k => { if (!cused.has(k)) { cutEls[k].remove(); delete cutEls[k]; } });

            // ── answer + action ──
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.complete && step.answer != null) {
                const t = document.createElement('div'); t.className = 'ans-tile'; t.textContent = step.answer; at.appendChild(t);
            }
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.innerHTML = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // ── state pills ──
            document.getElementById('st-span').textContent = step.span ? `[${step.span[0]},${step.span[1] + 1})` : '—';
            document.getElementById('st-pal').textContent = step.span ? (step.isPal[step.span[0]][step.span[1]] ? 'true' : 'false') : '—';
            document.getElementById('st-cut').textContent = step.cutCur != null ? step.cuts[step.cutCur] : '—';
            document.getElementById('st-ans').textContent = step.answer != null ? step.answer : '…';

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(st => `<div style="margin:3px 0;white-space:pre-wrap;">${st.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        // A grid cell (j, ic) is revealed once the trace has reached or passed its evaluation.
        // Fill order: outer i = 1..n (column ic = i-1), inner j = 0..i-1 ascending.
        // So order is by column ic first, then row j ascending within a column.
        function isCellShown(step, j, ic) {
            if (!step.span) return step.complete === true && j <= ic; // init shows none, final shows all
            const curJ = step.span[0], curI = step.span[1];          // current (j, ic)
            if (ic < curI) return true;
            if (ic === curI) return j <= curJ;
            return false;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(cellEls).forEach(k => { cellEls[k].remove(); delete cellEls[k]; });
            Object.keys(cutEls).forEach(k => { cutEls[k].remove(); delete cutEls[k]; });
            Object.keys(chEls).forEach(k => { chEls[k].remove(); delete chEls[k]; });
            confettiArmed = true;
        }
        function loadString(str) { pause(); s = str || ''; clearDom(); generateSteps(); renderStep(0); }
        function loadCustom() {
            const v = (document.getElementById('str-input').value || '').trim().slice(0, 9);
            if (v.length) loadString(v);
        }
        function loadExample(n) {
            const ex = ['aab', 'abc'][n];
            document.getElementById('str-input').value = ex;
            loadString(ex);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('str-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
