<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Linked List (Recursive) - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* curr / active frame */
            --accent-blue:   #06b6d4;   /* recursion / pointers */
            --accent-green:  #22c55e;   /* reversed / settled  */
            --accent-red:    #f85149;   /* rewire flip         */
            --accent-purple: #a855f7;
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 880px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(6, 182, 212, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(6,182,212,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"], input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.18); background: rgba(6, 182, 212, 0.06); }
        .head-input { width: 240px; }

        button {
            height: 34px; border-radius: 9px; padding: 0 16px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 94%; margin: 28px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.12); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { margin: 14px; border-radius: 14px; background: radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .list-wrapper { display: flex; align-items: center; justify-content: flex-start; min-height: 184px; position: relative; overflow-x: auto; overflow-y: visible; padding: 50px 18px 54px; scrollbar-width: thin; }
        .list-wrapper::-webkit-scrollbar { height: 7px; }
        .list-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .list-rail { display: flex; align-items: center; gap: 8px; margin: 0 auto; }

        .node-unit { display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; flex: 0 0 auto; will-change: transform; }
        .node {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 14px; font-size: 20px; font-weight: 800; font-family: var(--mono);
            transition: background 0.4s ease, border-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease, outline-color 0.3s ease;
            border: 2px solid var(--border-main); background: rgba(255, 255, 255, 0.05); color: var(--text-main);
            position: relative; outline: 2px solid transparent; outline-offset: 3px;
        }
        /* settled = a node whose link is already reversed (green) */
        .node.settled { background: linear-gradient(180deg, #2fe08f, #21c275); border-color: #34d399; color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.35); }
        /* curr = the node whose call frame is unwinding right now (orange) */
        .node.curr { background: linear-gradient(180deg, #fbbf3b, #f5a524); border-color: var(--accent-orange); color: #3a2400; box-shadow: 0 0 22px rgba(245,165,36,0.55); animation: breathe 2s ease-in-out infinite; --glow: rgba(245,165,36,0.6); }
        /* dimmed = node still waiting deeper in the recursion */
        .node.pending { opacity: 0.55; }
        /* cyan ring marks the node the recursion has descended to */
        .node.head-ring { outline-color: var(--accent-blue); }
        .node-index { font-size: 11px; color: var(--text-dim); font-family: var(--mono); height: 14px; font-weight: 600; }

        .arrow { flex: 0 0 auto; display: flex; align-items: center; height: 58px; filter: drop-shadow(0 0 6px rgba(6,182,212,0.45)); }
        .arrow svg { display: block; overflow: visible; transition: transform 0.45s cubic-bezier(0.34,1.1,0.64,1); }
        .arrow .ln { stroke: var(--accent-blue); stroke-width: 2.5; }
        .arrow .hd { fill: var(--accent-blue); }
        .arrow.to-null { filter: drop-shadow(0 0 4px rgba(139,152,179,0.25)); }
        .arrow.to-null .ln { stroke: var(--text-dim); }
        .arrow.to-null .hd { fill: var(--text-dim); }
        /* reversed = the link has been flipped to point backwards (green, mirrored) */
        .arrow.reversed { filter: drop-shadow(0 0 9px rgba(34,197,94,0.65)); }
        .arrow.reversed .ln { stroke: var(--accent-green); }
        .arrow.reversed .hd { fill: var(--accent-green); }
        .arrow.reversed svg { transform: scaleX(-1); }
        /* flipping = the link being rewired this very step (red flash) */
        .arrow.flipping { filter: drop-shadow(0 0 12px rgba(248,81,73,0.8)); }
        .arrow.flipping .ln { stroke: var(--accent-red); stroke-dasharray: 36; stroke-dashoffset: 36; animation: drawLine 0.7s ease forwards; }
        .arrow.flipping .hd { fill: var(--accent-red); }

        .nullterm { flex: 0 0 auto; min-width: 52px; height: 58px; display: flex; align-items: center; justify-content: center; border-radius: 14px; border: 2px dashed var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 13px; font-weight: 700; background: rgba(255,255,255,0.02); }

        /* pointer tags as pills on stalks — position driven by JS spring */
        .ptr { position: absolute; left: 0; display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; z-index: 4; transition: opacity 0.3s ease; will-change: transform; }
        .ptr.above { top: 8px; }
        .ptr.below { bottom: 12px; }
        .ptr .tag { font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 8px; white-space: nowrap; }
        .ptr .stalk { width: 2px; height: 16px; }
        .ptr.newhead .tag { background: var(--accent-green); color: #06251a; box-shadow: 0 0 14px rgba(34,197,94,0.6); }
        .ptr.newhead .stalk { background: var(--accent-green); }
        .ptr.currptr .tag { background: var(--accent-orange); color: #3a2400; box-shadow: 0 0 14px rgba(245,165,36,0.6); }
        .ptr.currptr .stalk { background: var(--accent-orange); }

        /* call-stack centerpiece: recursion frames stack up as we descend */
        .action-stage { position: relative; min-height: 104px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .frame-rail { display: flex; align-items: flex-end; gap: 8px; min-height: 56px; flex-wrap: wrap; justify-content: center; }
        .frame { padding: 7px 13px; border-radius: 10px; font-family: var(--mono); font-size: 13px; font-weight: 700; border: 1.5px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-dim); white-space: nowrap; will-change: transform; }
        .frame.top { background: rgba(6,182,212,0.16); border-color: var(--accent-blue); color: #a5f3fc; box-shadow: 0 0 14px rgba(6,182,212,0.4); }
        .frame.unwinding { background: rgba(245,165,36,0.16); border-color: var(--accent-orange); color: #ffd591; box-shadow: 0 0 14px rgba(245,165,36,0.4); }
        .frame.base { background: rgba(168,85,247,0.16); border-color: var(--accent-purple); color: #e9d5ff; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s ease; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }

        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 4px 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-orange); }
        .pill.n b { color: var(--accent-blue); }
        .pill.h b { color: var(--accent-green); }
        .legend-inline { margin-left: auto; display: flex; gap: 14px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; font-size: 11px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; display: inline-block; }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes drawLine { to { stroke-dashoffset: 0; } }
        @keyframes breathe { 0%,100%{ box-shadow: 0 0 16px var(--glow), inset 0 0 10px rgba(255,255,255,0.06); } 50%{ box-shadow: 0 0 30px var(--glow), inset 0 0 14px rgba(255,255,255,0.12); } }
        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 190px) rotate(var(--rot)); } }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">List =</label>
        <input type="text" id="head-input" class="head-input" placeholder="1 -> 2 -> 3 -> null">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('1 -> 2 -> 3 -> null')">Ex 1: 1&#8594;2&#8594;3</button>
        <button onclick="loadExample('5 -> null')">Ex 2: 5</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Reverse Linked List <span class="sub">&middot; Recursion &middot; O(n) time &middot; O(n) stack</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="list-wrapper" id="list-wrapper">
                    <div class="list-rail" id="list-container"></div>
                    <div class="ptr above newhead" id="ptr-newhead"><div class="tag">new_head</div><div class="stalk"></div></div>
                    <div class="ptr below currptr" id="ptr-curr"><div class="stalk"></div><div class="tag">head</div></div>
                </div>
            </div>
        </div>

        <!-- recursion centerpiece: call-stack frames + big action word + confetti -->
        <div class="action-stage">
            <div id="confetti"></div>
            <div class="frame-rail" id="frame-rail"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="reset()">&#8634; Reset</button>
            <button onclick="back()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="next()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>

                        <div class="state-strip">
                            <span class="pill n">depth <b id="val-depth">&mdash;</b></span>
                            <span class="pill c">node <b id="val-curr">&mdash;</b></span>
                            <span class="pill h">new_head <b id="val-newhead">&mdash;</b></span>
                            <span class="pill">reversed <b id="val-reversed">&mdash;</b></span>
                            <span class="legend-inline">
                                <span class="legend-item"><span class="dot" style="background:rgba(6,182,212,0.15); border:2px solid var(--accent-blue)"></span>descending</span>
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,#fbbf3b,#f5a524); border:2px solid var(--accent-orange)"></span>unwinding</span>
                                <span class="legend-item"><span class="dot" style="background:var(--accent-red)"></span>rewire</span>
                                <span class="legend-item"><span class="dot" style="background:linear-gradient(180deg,#2fe08f,#21c275); border:2px solid #34d399"></span>reversed</span>
                            </span>
                        </div>

                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────────────────────── Motion engine (Framer-Motion-style, zero deps) ─────────────
        // Springs are sampled into keyframes (exactly how Motion drives WAAPI under the hood),
        // so we get real spring physics + FLIP with no library and full prefers-reduced-motion support.
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;

        // Sample a damped spring's progress 0 -> 1 (with natural overshoot) via semi-implicit Euler.
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) {
                const a = (-stiffness * x - damping * v) / mass;
                v += a * dt; x += v * dt;
                out.push(1 - x);
                if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break;
            }
            out.push(1);
            return out;
        }
        const SPRING_POS = sampleSpring(340, 30, 1);   // smooth glide, tiny overshoot (FLIP / pointers)
        const SPRING_POP = sampleSpring(540, 17, 1);   // bouncy overshoot (entrances / frames)
        const durOf = (arr) => arr.length * FRAME;

        const Motion = {
            // FLIP: element is already at its NEW layout spot; animate it FROM the old offset.
            flip(el, dx, dy) {
                if (REDUCED || (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5)) return;
                const kf = SPRING_POS.map(p => ({ transform: `translate(${(dx * (1 - p)).toFixed(2)}px, ${(dy * (1 - p)).toFixed(2)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
            },
            // Spring entrance: drop + scale up with overshoot.
            enter(el, delay = 0) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({
                    opacity: Math.min(1, p * 1.6).toFixed(3),
                    transform: `translateY(${(-18 * (1 - p)).toFixed(2)}px) scale(${(0.45 + 0.55 * p).toFixed(3)})`
                }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', delay, fill: 'backwards' });
            },
            // Spring pop for a frame tile (fills forward so it stays visible).
            pop(el, delay = 0) {
                if (REDUCED) { el.style.opacity = '1'; el.style.transform = 'scale(1)'; return; }
                const kf = SPRING_POP.map(p => ({
                    opacity: Math.min(1, p * 2).toFixed(3),
                    transform: `scale(${(0.5 + 0.5 * p).toFixed(3)}) translateY(${(10 * (1 - p)).toFixed(2)}px)`
                }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear', delay, fill: 'backwards' });
            },
            // Spring glide a pointer along X (keeps the constant -50% centering offset).
            glide(el, x) {
                const prev = el._x;
                el.style.opacity = '1';
                const commit = `translateX(${x}px) translateX(-50%)`;
                if (REDUCED || prev == null || Math.abs(x - prev) < 0.5) { el._x = x; el.style.transform = commit; return; }
                const dx = x - prev;
                const kf = SPRING_POS.map(p => ({ transform: `translateX(${(prev + dx * p).toFixed(2)}px) translateX(-50%)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el.style.transform = commit;
            },
        };

        // ───────────────────────── State ─────────────────────────
        let targetList = '1 -> 2 -> 3 -> null';
        let values = [];          // node values, head-first  e.g. [1,2,3]
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1600, 800, 400];

        let els = {};   // persistent DOM registry: stable-key -> element

        // Real recursive algorithm shown in the synced code panel.
        const CODE = [
            [['kw','def '],['fn','reverse'],['src','(node):']],
            [['kw','    if '],['src','node is None or node.next is None:']],
            [['kw','        return '],['src','node']],
            [['src','    new_head = '],['fn','reverse'],['src','(node.next)']],
            [['src','    node.next.next = node']],
            [['src','    node.next = None']],
            [['kw','    return '],['src','new_head']],
        ];

        const ARR = '→';
        const CHK = '✓';

        function buildCodePanel() {
            const panel = document.getElementById('code-panel');
            panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div');
                line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span');
                lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(lineArr) {
            document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', lineArr && lineArr.includes(+el.dataset.line)));
        }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap');
            const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        function init() { buildCodePanel(); loadExample('1 -> 2 -> 3 -> null'); }

        function parseList(str) {
            const out = [];
            String(str).split('->').forEach(p => {
                const t = p.trim();
                if (t === '' || t.toLowerCase() === 'null' || t.toLowerCase() === 'none') return;
                const n = parseInt(t, 10);
                if (!isNaN(n)) out.push(n);
            });
            return out.slice(0, 7);
        }

        function loadExample(example) {
            targetList = example;
            values = parseList(example);
            document.getElementById('head-input').value = values.length ? values.join(' -> ') + ' -> null' : 'null';
            resetDom();
            generateSteps();
            reset();
        }

        function loadCustom() {
            const raw = document.getElementById('head-input').value.trim();
            if (!raw) { alert('Please enter a list, e.g. 1 -> 2 -> 3 -> null'); return; }
            const parsed = parseList(raw);
            loadExample(parsed.length ? parsed.join(' -> ') + ' -> null' : 'null');
        }

        // ───────────────────────── Step generation ─────────────────────────
        // Genuinely simulate the recursion. Each node has a stable key 'n<originalIndex>'.
        // `links` maps key -> key|null  (the CURRENT .next of every node, mutated as the algo runs).
        // We render the list by following `links` from the current head key so flipped arrows show up.
        function generateSteps() {
            steps = [];
            const n = values.length;
            const keys = values.map((_, i) => 'n' + i);                 // n0..n(n-1)  (original order)
            const valOf = {}; keys.forEach((k, i) => valOf[k] = values[i]);
            // initial forward links: n0->n1->...->null
            const links = {}; keys.forEach((k, i) => links[k] = i < n - 1 ? keys[i + 1] : null);

            // Build the rendered node order by walking links from a given head key.
            function chainFrom(headKey) {
                const order = []; let k = headKey; const seen = new Set();
                while (k != null && !seen.has(k)) { seen.add(k); order.push(k); k = links[k]; }
                return order;
            }
            const snapNodes = (headKey, opts) => chainFrom(headKey).map(k => ({
                key: k, val: valOf[k],
                settled: opts.settled.has(k),
                curr: opts.curr === k,
                pending: opts.pending.has(k),
                headRing: opts.headRing === k,
            }));
            const stackLabels = (stack) => stack.map(k => `reverse(${valOf[k]})`);

            // empty-list guard
            if (n === 0) {
                steps.push({
                    codeLine: [0,1,2], headKey: null, nodes: [],
                    frames: [], frameKind: 'base',
                    currKey: null, newHeadKey: null, depth: 0, reversedStr: 'null',
                    action: 'base case ' + ARR + ' return None', actionColor: 'var(--accent-purple)',
                    ptrCurr: null, ptrNewHead: null,
                    panel: `Empty list. <code>reverse(None)</code> hits the base case immediately and returns <b>None</b>.`,
                    log: 'reverse(null) -> base case -> return null', logColor: 'var(--text-dim)',
                    complete: true,
                });
                return;
            }

            // INIT
            steps.push({
                codeLine: [0], headKey: keys[0],
                nodes: snapNodes(keys[0], { settled: new Set(), curr: null, pending: new Set(), headRing: keys[0] }),
                frames: [], frameKind: 'top',
                currKey: keys[0], newHeadKey: null, depth: 0, reversedStr: '—',
                action: 'call reverse(' + values[0] + ')', actionColor: '#7dd3fc',
                ptrCurr: keys[0], ptrNewHead: null,
                panel: `Recursively reverse <code>${values.join(' &#8594; ')} &#8594; null</code>. We descend until the tail, then flip each link on the way back.`,
                log: `reverse(${values[0]})  // head call`, logColor: 'var(--text-dim)',
            });

            // DESCEND — push a frame per call until base case (node.next is None at the tail).
            const stack = [];
            for (let i = 0; i < n; i++) {
                stack.push(keys[i]);
                const isBase = (i === n - 1);
                const pendingSet = new Set(keys.slice(i)); // current node + everything deeper is still "pending"
                steps.push({
                    codeLine: isBase ? [0,1,2] : [0,1,3],
                    headKey: keys[0],
                    nodes: snapNodes(keys[0], { settled: new Set(), curr: null, pending: pendingSet, headRing: keys[i] }),
                    frames: stackLabels(stack), frameKind: isBase ? 'base' : 'top',
                    currKey: keys[i], newHeadKey: isBase ? keys[i] : null, depth: i + 1,
                    reversedStr: '—',
                    action: isBase ? ('base case ' + ARR + ' new_head = ' + values[i]) : ('recurse into ' + values[i + 1]),
                    actionColor: isBase ? 'var(--accent-purple)' : '#7dd3fc',
                    ptrCurr: keys[i], ptrNewHead: isBase ? keys[i] : null,
                    panel: isBase
                        ? `Tail reached: <code>reverse(${values[i]})</code> &#8594; <code>node.next is None</code>. Base case returns <b>${values[i]}</b> as the <b>new head</b>.`
                        : `<code>reverse(${values[i]})</code> &#8594; <code>node.next</code> is <b>${values[i + 1]}</b>, so recurse deeper into <code>reverse(${values[i + 1]})</code>.`,
                    log: isBase
                        ? `reverse(${values[i]}) -> base case, new_head = ${values[i]}`
                        : `reverse(${values[i]}) -> recurse(${values[i + 1]})`,
                    logColor: isBase ? 'var(--accent-purple)' : 'var(--accent-blue)',
                });
            }

            // UNWIND — pop frames from the tail back to the head, flipping links.
            const newHeadKey = keys[n - 1];           // tail becomes the new head
            const settled = new Set([newHeadKey]);    // tail's place is already final
            // remove the base frame from the stack (it returned)
            stack.pop();
            for (let i = n - 2; i >= 0; i--) {
                const cur = keys[i];          // node whose frame is unwinding
                const nxt = keys[i + 1];      // node.next (currently points forward to nxt)
                // FLIP step: node.next.next = node  =>  links[nxt] = cur ; then node.next = None => links[cur] = null
                links[nxt] = cur;
                links[cur] = null;
                settled.add(cur);
                const pendingSet = new Set(); // nothing pending during unwind
                steps.push({
                    codeLine: [4,5,6],
                    headKey: newHeadKey,
                    nodes: snapNodes(newHeadKey, { settled, curr: cur, pending: pendingSet, headRing: null }),
                    frames: stackLabels(stack), frameKind: 'unwinding',
                    currKey: cur, newHeadKey, depth: i + 1,
                    reversedStr: chainFrom(newHeadKey).map(k => valOf[k]).join(' &#8594; ') + ' &#8594; null',
                    flipPair: { from: nxt, to: cur },   // the arrow nxt->cur was just rewired
                    action: 'rewire ' + values[i + 1] + '.next = ' + values[i],
                    actionColor: 'var(--accent-red)',
                    ptrCurr: cur, ptrNewHead: newHeadKey,
                    panel: `Unwind <code>reverse(${values[i]})</code>: set <code>node.next.next = node</code> so <b>${values[i + 1]}.next = ${values[i]}</b>, then <code>node.next = None</code>. The arrow flips.`,
                    log: `${values[i + 1]}.next = ${values[i]} ; ${values[i]}.next = null  (return new_head=${values[n - 1]})`,
                    logColor: 'var(--accent-green)',
                });
                stack.pop();
            }

            // FINAL
            const reversedVals = chainFrom(newHeadKey).map(k => valOf[k]);
            steps.push({
                codeLine: [6],
                headKey: newHeadKey,
                nodes: snapNodes(newHeadKey, { settled: new Set(keys), curr: null, pending: new Set(), headRing: newHeadKey }),
                frames: [], frameKind: 'base',
                currKey: null, newHeadKey, depth: 0,
                reversedStr: reversedVals.join(' &#8594; ') + ' &#8594; null',
                action: CHK + ' reversed in O(n)', actionColor: 'var(--accent-green)',
                ptrCurr: null, ptrNewHead: newHeadKey,
                panel: `Done. The recursion fully unwound. New head is <b>${reversedVals[0]}</b> &mdash; reversed list <code>${reversedVals.join(' &#8594; ')} &#8594; null</code>.`,
                log: `Final reversed: ${reversedVals.join(' -> ')} -> null`, logColor: 'var(--accent-green)',
                complete: true, bold: true, confetti: true,
            });
        }

        function resetDom() { els = {}; document.getElementById('list-container').innerHTML = ''; document.getElementById('frame-rail').innerHTML = ''; confettiArmed = true; }

        function arrowSVG() {
            return `<svg viewBox="0 0 40 24" width="40" height="24">
                <line class="ln" x1="2" y1="12" x2="28" y2="12" stroke-linecap="round"/>
                <polygon class="hd" points="27,6 39,12 27,18"/></svg>`;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti');
            if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f85149'];
            for (let i = 0; i < 42; i++) {
                const p = document.createElement('div');
                p.className = 'confetti-piece';
                const x = (Math.random() * 2 - 1) * 230;
                const rot = (Math.random() * 720 - 360) + 'deg';
                const dur = 0.9 + Math.random() * 0.8;
                const delay = Math.random() * 0.15;
                p.style.setProperty('--x', x + 'px');
                p.style.setProperty('--rot', rot);
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = dur + 's';
                p.style.animationDelay = delay + 's';
                host.appendChild(p);
                setTimeout(() => p.remove(), (dur + delay) * 1000 + 250);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;
            const container = document.getElementById('list-container');
            const nodesArr = step.nodes;

            // FLIP step 1 — record FIRST positions of every node-unit already on screen.
            const firstRects = {};
            Object.keys(els).forEach(k => {
                if (k.startsWith('k:') && els[k].isConnected) firstRects[k] = els[k].getBoundingClientRect();
            });

            const ordered = [];
            const freshNodes = [];   // {nodeEl, idx} created this render → spring entrance

            for (let i = 0; i < nodesArr.length; i++) {
                const nd = nodesArr[i];
                const nkey = 'k:' + nd.key;
                let unit = els[nkey];
                let isFresh = false;
                if (!unit) {
                    isFresh = true;
                    unit = document.createElement('div');
                    unit.className = 'node-unit';
                    unit.innerHTML = `<div class="node"></div><div class="node-index"></div>`;
                    els[nkey] = unit;
                }
                const nodeEl = unit.firstChild;
                nodeEl.textContent = nd.val;
                unit.lastChild.textContent = i;
                nodeEl.classList.toggle('settled', !!nd.settled && !nd.curr);
                nodeEl.classList.toggle('curr', !!nd.curr);
                nodeEl.classList.toggle('pending', !!nd.pending && !nd.curr);
                nodeEl.classList.toggle('head-ring', !!nd.headRing);
                if (isFresh) freshNodes.push({ nodeEl, idx: i });
                ordered.push(unit);

                if (i < nodesArr.length - 1) {
                    const akey = 'r:' + nd.key;
                    let arr = els[akey];
                    if (!arr) { arr = document.createElement('div'); arr.className = 'arrow'; arr.innerHTML = arrowSVG(); els[akey] = arr; }
                    arr.classList.remove('to-null');
                    // After unwinding begins the rendered order is tail->head, so every drawn link is a reversed link.
                    const isReversed = !!step.newHeadKey;
                    arr.classList.toggle('reversed', isReversed);
                    const flips = step.flipPair && step.flipPair.from === nd.key && step.flipPair.to === nodesArr[i + 1].key;
                    arr.classList.toggle('flipping', !!flips);
                    ordered.push(arr);
                }
            }

            // terminal arrow to null
            if (nodesArr.length > 0) {
                const lastKey = nodesArr[nodesArr.length - 1].key;
                const tkey = 'r:' + lastKey;
                let tarr = els[tkey];
                if (!tarr) { tarr = document.createElement('div'); tarr.className = 'arrow'; tarr.innerHTML = arrowSVG(); els[tkey] = tarr; }
                tarr.classList.add('to-null');
                tarr.classList.remove('reversed', 'flipping');
                ordered.push(tarr);
            }
            let nul = els['nullterm'];
            if (!nul) { nul = document.createElement('div'); nul.className = 'nullterm'; nul.textContent = 'null'; els['nullterm'] = nul; }
            ordered.push(nul);

            const used = new Set(ordered);
            Array.from(container.children).forEach(ch => { if (!used.has(ch)) container.removeChild(ch); });
            Object.keys(els).forEach(k => { if (!used.has(els[k]) && k !== 'nullterm') { /* keep registry tidy */ if (els[k].parentNode === container) {} } });
            // prune registry entries that are no longer used (except persistent nullterm)
            Object.keys(els).forEach(k => { if (k !== 'nullterm' && !used.has(els[k])) delete els[k]; });
            ordered.forEach(el => container.appendChild(el));

            // FLIP step 2 — existing units spring from old→new; fresh nodes spring-enter (staggered).
            Object.keys(firstRects).forEach(k => {
                const el = els[k];
                if (!el || !el.isConnected) return;
                const last = el.getBoundingClientRect();
                Motion.flip(el, firstRects[k].left - last.left, firstRects[k].top - last.top);
            });
            const stagger = freshNodes.length > 1;   // first load → cascade
            freshNodes.forEach(({ nodeEl, idx: i }) => Motion.enter(nodeEl, stagger ? i * 55 : 0));

            // narration
            const mainPanel = document.getElementById('main-panel');
            mainPanel.innerHTML = step.panel || '&mdash;';
            mainPanel.classList.toggle('done', !!step.complete);

            // call-stack frames (persistent reconcile by index, spring-pop fresh ones)
            renderFrames(step);

            // action word
            const aw = document.getElementById('action-word');
            aw.textContent = step.action || '';
            aw.style.color = step.actionColor || 'var(--text-dim)';

            // confetti on completion (re-arms when leaving the final step)
            if (step.complete && step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } }
            else { confettiArmed = true; }

            // state pills
            document.getElementById('val-depth').textContent = step.depth != null ? step.depth : '—';
            document.getElementById('val-curr').textContent = step.currKey != null ? valFromNodes(step, step.currKey) : '—';
            document.getElementById('val-newhead').textContent = step.newHeadKey != null ? valFromNodes(step, step.newHeadKey) : '—';
            const rv = document.getElementById('val-reversed'); rv.innerHTML = step.reversedStr || '—';
            highlightCode(step.codeLine);

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = steps.length > 1 ? `${(idx / (steps.length - 1)) * 100}%` : '100%';

            positionPointer('ptr-curr', step.ptrCurr);
            positionPointer('ptr-newhead', step.ptrNewHead);

            // log (cumulative)
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px'; line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.textContent = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        // helper: look up a node's value via the values array keyed by stable id
        function valFromNodes(step, key) {
            const m = step.nodes.find(nd => nd.key === key);
            if (m) return m.val;
            // key may not be in current rendered chain (e.g. mid-descend); derive from index
            const i = parseInt(String(key).slice(1), 10);
            return isNaN(i) ? '—' : values[i];
        }

        let frameEls = [];
        function renderFrames(step) {
            const rail = document.getElementById('frame-rail');
            const labels = step.frames || [];
            // reconcile by index
            while (frameEls.length > labels.length) { const e = frameEls.pop(); if (e.parentNode) e.parentNode.removeChild(e); }
            labels.forEach((lab, i) => {
                let f = frameEls[i];
                let fresh = false;
                if (!f) { f = document.createElement('div'); rail.appendChild(f); frameEls[i] = f; fresh = true; }
                f.textContent = lab;
                f.className = 'frame';
                const isTopMost = (i === labels.length - 1);
                if (isTopMost) f.classList.add(step.frameKind === 'unwinding' ? 'unwinding' : step.frameKind === 'base' ? 'base' : 'top');
                if (fresh) Motion.pop(f);
            });
        }

        function positionPointer(id, key) {
            const ptr = document.getElementById(id);
            if (!key || !els['k:' + key]) { ptr.style.opacity = '0'; ptr._x = null; return; }
            const unit = els['k:' + key];
            Motion.glide(ptr, unit.offsetLeft + unit.offsetWidth / 2);
        }

        function next() { if (stepIndex < steps.length - 1) { stepIndex++; renderStep(stepIndex); } else pause(); }
        function back() { if (stepIndex > 0) { stepIndex--; renderStep(stepIndex); } }
        function reset() { pause(); stepIndex = 0; renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.textContent = 'Pause';
                if (stepIndex >= steps.length - 1) { stepIndex = 0; renderStep(0); }
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase();
            if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); next(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); back(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });

        // keep pointers aligned on resize (recompute without animating)
        let rT;
        window.addEventListener('resize', () => { clearTimeout(rT); rT = setTimeout(() => { ['ptr-curr','ptr-newhead'].forEach(id => { document.getElementById(id)._x = null; }); renderStep(stepIndex); }, 120); });
        window.onload = init;
    </script>
</body>
</html>
