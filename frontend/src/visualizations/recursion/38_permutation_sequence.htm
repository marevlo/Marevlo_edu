<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permutation Sequence</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* available pool / current block */
            --accent-blue:   #06b6d4;   /* k value / division             */
            --accent-green:  #22c55e;   /* selected digit / built perm    */
            --accent-red:    #f43f5e;   /* discarded blocks               */
            --accent-purple: #a855f7;   /* factorial block / focus        */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 980px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.12), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 64px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(168, 85, 247, 0.5); box-shadow: 0 0 18px rgba(168, 85, 247, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(168,85,247,0.22), rgba(168,85,247,0.10)); border-color: rgba(168, 85, 247, 0.45); color: #e9d5ff; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #e9d5ff; background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); box-shadow: 0 0 12px rgba(168,85,247,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(168,85,247,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #ede9fe; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-purple); font-size: 13px; flex-shrink: 0; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(168,85,247,0.14); color: #d8b4fe; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }
        .narration .g { color: #86efac; }
        .narration .o { color: #fcd34d; }
        .narration .bl { color: #67e8f9; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(168,85,247,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); padding: 24px 22px; min-height: 430px; display: flex; flex-direction: column; gap: 22px; }

        .stage-label { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1.1px; text-transform: uppercase; color: var(--text-dim); display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .stage-label .pip { width: 7px; height: 7px; border-radius: 50%; }

        /* k register */
        .k-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
        .k-reg { display: flex; align-items: baseline; gap: 10px; font-family: var(--mono); padding: 10px 16px; border-radius: 12px; border: 1px solid rgba(6,182,212,0.32); background: rgba(6,182,212,0.08); }
        .k-reg .lab { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .8px; }
        .k-reg .num { font-size: 26px; font-weight: 800; color: #67e8f9; transition: color .3s; }
        .blk-reg { display: flex; align-items: baseline; gap: 10px; font-family: var(--mono); padding: 10px 16px; border-radius: 12px; border: 1px solid rgba(168,85,247,0.32); background: rgba(168,85,247,0.08); }
        .blk-reg .lab { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .8px; }
        .blk-reg .num { font-size: 22px; font-weight: 800; color: #d8b4fe; }

        /* available digit pool */
        .pool { display: flex; gap: 12px; flex-wrap: wrap; min-height: 64px; align-items: center; }
        .pool.empty-note { font-family: var(--mono); color: var(--text-dim); font-size: 13px; }
        .digit {
            position: relative; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-family: var(--mono); font-weight: 800; font-size: 22px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.05); color: var(--text-main);
            will-change: transform, opacity;
            transition: background .35s, border-color .35s, color .35s, box-shadow .35s, opacity .35s, transform .35s;
        }
        .digit .blk-tag { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: 700; color: var(--text-dim); white-space: nowrap; letter-spacing: .3px; transition: color .3s; }
        .digit.inblock { border-color: rgba(168,85,247,0.55); background: linear-gradient(180deg, rgba(168,85,247,0.22), rgba(168,85,247,0.08)); color: #e9d5ff; }
        .digit.inblock .blk-tag { color: #c4b5fd; }
        .digit.chosen { border-color: var(--accent-green); background: linear-gradient(180deg, #2fe08f, #21c275); color: #06251a; box-shadow: 0 0 20px rgba(34,197,94,0.5); transform: translateY(-4px); }
        .digit.chosen .blk-tag { color: var(--accent-green); }
        .digit.faded { opacity: 0.30; }

        /* built permutation slots */
        .slots { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; min-height: 60px; }
        .slot {
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            border-radius: 11px; font-family: var(--mono); font-weight: 800; font-size: 22px;
            border: 2px dashed var(--border-main); color: var(--text-dim); background: rgba(255,255,255,0.02);
            will-change: transform, opacity;
            transition: background .35s, border-color .35s, color .35s, box-shadow .35s;
        }
        .slot.filled { border-style: solid; border-color: var(--accent-green); background: rgba(34,197,94,0.12); color: #bbf7d0; box-shadow: 0 0 14px rgba(34,197,94,0.30); }
        .slot.just { box-shadow: 0 0 22px rgba(34,197,94,0.55); }
        .slot-arrow { color: var(--text-dim); font-family: var(--mono); font-size: 18px; }

        /* factorial cheatsheet */
        .fact-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .fact-chip { font-family: var(--mono); font-size: 12px; padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border-main); color: var(--text-dim); background: rgba(255,255,255,0.03); transition: border-color .3s, color .3s, background .3s; }
        .fact-chip.active { border-color: rgba(168,85,247,0.5); color: #d8b4fe; background: rgba(168,85,247,0.10); }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-purple); width: 110px; cursor: pointer; }
        #confetti { position: fixed; left: 0; right: 0; top: 30%; height: 0; overflow: visible; pointer-events: none; z-index: 60; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }

        /* state pills */
        .pill-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; }
        .pill { font-family: var(--mono); font-size: 12px; padding: 5px 11px; border-radius: 8px; border: 1px solid var(--border-main); background: rgba(255,255,255,0.03); color: var(--text-dim); }
        .pill b { color: var(--text-main); font-weight: 700; }

        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(168,85,247,0.12); border-left-color: var(--accent-purple); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 120px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 240px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="text" id="n-input" value="3" maxlength="1">
        <label class="ui-label">k =</label>
        <input type="text" id="k-input" value="3" maxlength="6">
        <button onclick="loadCustom()">Build</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Ex 1 (n=3, k=3)</button>
        <button onclick="loadExample(1)">Ex 2 (n=4, k=9)</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Permutation Sequence <span class="sub">&middot; factorial number system &middot; pick digit via idx = k &divide; (m&minus;1)!</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div>
                    <div class="stage-label"><span class="pip" style="background:var(--accent-blue);box-shadow:0 0 8px var(--accent-blue)"></span> Factorial division &middot; 0-based k</div>
                    <div class="k-row">
                        <div class="k-reg"><span class="lab">k (0-based)</span><span class="num" id="k-num">&mdash;</span></div>
                        <div class="blk-reg"><span class="lab">block = (m&minus;1)!</span><span class="num" id="blk-num">&mdash;</span></div>
                        <div class="fact-row" id="fact-row"></div>
                    </div>
                </div>

                <div>
                    <div class="stage-label"><span class="pip" style="background:var(--accent-orange);box-shadow:0 0 8px var(--accent-orange)"></span> Available digits &middot; chosen index = k &divide; block</div>
                    <div class="pool" id="pool"></div>
                </div>

                <div>
                    <div class="stage-label"><span class="pip" style="background:var(--accent-green);box-shadow:0 0 8px var(--accent-green)"></span> Building sequence</div>
                    <div class="slots" id="slots"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                            <div class="pill-row" id="pill-row"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="confetti"></div>

    <script>
        'use strict';

        // ───────── Motion engine ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) { el.style.opacity = '1'; return; }
                const base = el.style.transform.replace(/ scale\([^)]*\)/, '');
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `${base} scale(${(0.3 + 0.7 * p).toFixed(3)})` }));
                const a = el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
                a.onfinish = () => { el.style.transform = base; el.style.opacity = '1'; };
            },
        };

        // ───────── State ─────────
        let N = 3, K = 3;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        let finalAnswer = '';
        const delays = [1400, 700, 350];
        const digitEls = {};   // persistent pool digit nodes, keyed 'd:<value>'
        const slotEls = {};    // persistent built-slot nodes, keyed 's:<position>'

        // ───────── synced code panel ─────────
        const CODE = [
            [['kw','def '],['fn','getPermutation'],['src','(n, k):']],
            [['src','  fact = [1]*(n+1)']],
            [['kw','  for '],['src','i in range(1, n+1): fact[i] = fact[i-1]*i']],
            [['src','  avail = [1..n];  k -= 1;  res = []']],
            [['kw','  for '],['src','m in range(n, 0, -1):']],
            [['src','    block = fact[m-1]']],
            [['src','    idx   = k // block']],
            [['src','    res.append(avail.pop(idx))']],
            [['src','    k     = k % block']],
            [['kw','  return '],['src','"".join(res)']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code & log' : 'Show code & log';
        }

        // ───────── factorial cheatsheet (rebuilt per input load) ─────────
        let factTable = [];
        function buildFactRow() {
            const row = document.getElementById('fact-row'); row.innerHTML = '';
            for (let i = 0; i <= N; i++) {
                const c = document.createElement('span'); c.className = 'fact-chip'; c.dataset.fact = i;
                c.textContent = `${i}!=${factTable[i]}`; row.appendChild(c);
            }
        }

        // ───────── genuinely simulate the algorithm into immutable snapshots ─────────
        function generateSteps() {
            steps = [];
            const avail = Array.from({ length: N }, (_, i) => i + 1);
            factTable = new Array(N + 1).fill(1);
            for (let i = 1; i <= N; i++) factTable[i] = factTable[i - 1] * i;

            let curK = K - 1;            // convert to 0-based
            const res = [];
            const totalPerms = factTable[N];

            // step 0 — intro
            steps.push({
                avail: [...avail], res: [], curK, block: null, idx: null, chosen: null,
                blockStart: null, blockEnd: null, factHi: N,
                code: [3], done: false,
                panel: `Find the <b>${K}</b><sup>th</sup> permutation of <code>1..${N}</code>. There are <b>${totalPerms}</b> total. Convert to 0-based: <span class="bl">k = ${K} &minus; 1 = ${curK}</span>. Pool = <code>[${avail.join(', ')}]</code>.`,
                log: `getPermutation(n=${N}, k=${K})  ->  k0=${curK}, total=${totalPerms}`
            });

            let pos = 0;
            for (let m = N; m >= 1; m--) {
                const block = factTable[m - 1];
                const idx = Math.floor(curK / block);
                const chosen = avail[idx];
                const blockStart = idx * block;
                const blockEnd = blockStart + block - 1;

                // step A — divide: compute block + idx, highlight chosen
                steps.push({
                    avail: [...avail], res: [...res], curK, block, idx, chosen,
                    blockStart, blockEnd, factHi: m - 1,
                    code: [4, 5, 6], done: false,
                    panel: `<b>${m}</b> digit${m !== 1 ? 's' : ''} left &rarr; each leading digit owns a block of <span class="o">block = (${m}&minus;1)! = ${block}</span> permutations. <span class="bl">idx = k &divide; block = ${curK} &divide; ${block} = ${idx}</span>, so pick pool index <b>${idx}</b> &rarr; digit <span class="g">${chosen}</span>.`,
                    log: `m=${m}: block=(${m}-1)!=${block}, idx=${curK}//${block}=${idx}  ->  pick ${chosen}`
                });

                // commit: append + remove from pool + reduce k
                res.push(chosen);
                avail.splice(idx, 1);
                const newK = curK % block;

                // step B — commit: append digit, drop block from k
                steps.push({
                    avail: [...avail], res: [...res], curK: newK, block, idx: null, chosen,
                    blockStart: null, blockEnd: null, factHi: m - 2, justFilled: pos,
                    code: [7, 8], done: false,
                    panel: `Append <span class="g">${chosen}</span> &rarr; built = <code>${res.join('')}</code>. Remove it from the pool, then keep only the offset inside its block: <span class="bl">k = ${curK} mod ${block} = ${newK}</span>. Pool = <code>[${avail.length ? avail.join(', ') : '∅'}]</code>.`,
                    log: `   append ${chosen}; k=${curK}%${block}=${newK}; pool=[${avail.join(', ')}]`
                });

                curK = newK;
                pos++;
            }

            finalAnswer = res.join('');
            // final step
            steps.push({
                avail: [], res: [...res], curK: 0, block: null, idx: null, chosen: null,
                blockStart: null, blockEnd: null, factHi: -1, done: true, confetti: true,
                code: [9],
                panel: `Pool empty &mdash; all ${N} positions filled. The <b>${K}</b><sup>th</sup> permutation of <code>1..${N}</code> is <span class="g"><b>${finalAnswer}</b></span>.`,
                log: `return "${finalAnswer}"`
            });
        }

        // ───────── render (persistent-DOM reconciliation) ─────────
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // k + block registers
            document.getElementById('k-num').textContent = step.curK != null ? step.curK : '—';
            document.getElementById('blk-num').textContent = step.block != null ? step.block : '—';

            // factorial cheatsheet: mark the relevant (m-1)! chip
            document.querySelectorAll('.fact-chip').forEach(c => c.classList.toggle('active', +c.dataset.fact === step.factHi));

            // ── available pool (reconcile by digit value) ──
            const pool = document.getElementById('pool');
            pool.classList.toggle('empty-note', step.avail.length === 0);
            if (step.avail.length === 0) {
                Object.keys(digitEls).forEach(k => { digitEls[k].remove(); delete digitEls[k]; });
                if (!pool.querySelector('.empty-msg')) {
                    pool.innerHTML = '<span class="empty-msg">all digits consumed &middot; pool is empty</span>';
                }
            } else {
                const em = pool.querySelector('.empty-msg'); if (em) em.remove();
                const used = new Set();
                step.avail.forEach((val, i) => {
                    const key = 'd:' + val; used.add(key);
                    let el = digitEls[key]; const fresh = !el;
                    if (!el) {
                        el = document.createElement('div'); el.className = 'digit';
                        const num = document.createElement('span'); num.className = 'num'; num.textContent = val;
                        const tag = document.createElement('span'); tag.className = 'blk-tag';
                        el.appendChild(num); el.appendChild(tag);
                        pool.appendChild(el); digitEls[key] = el;
                    }
                    // keep DOM order matching pool order
                    pool.appendChild(el);
                    // block annotation: which permutation-range this leading digit covers
                    const tag = el.querySelector('.blk-tag');
                    if (step.block != null) {
                        const s = i * step.block, e = s + step.block - 1;
                        tag.textContent = step.block === 1 ? `k=${s}` : `k∈${s}..${e}`;
                    } else { tag.textContent = ''; }
                    const inBlock = step.idx != null && i === step.idx;
                    const isChosen = step.chosen != null && val === step.chosen && step.idx != null && i === step.idx;
                    el.className = 'digit'
                        + (isChosen ? ' chosen' : '')
                        + (!isChosen && inBlock ? ' inblock' : '')
                        + (step.idx != null && i !== step.idx ? ' faded' : '');
                    if (fresh && !REDUCED) { el.style.opacity = '0'; Motion.pop(el); }
                });
                Object.keys(digitEls).forEach(k => { if (!used.has(k)) { digitEls[k].remove(); delete digitEls[k]; } });
            }

            // ── built sequence slots (reconcile by position) ──
            const slots = document.getElementById('slots');
            const targetLen = N;
            const usedS = new Set();
            for (let p = 0; p < targetLen; p++) {
                const key = 's:' + p; usedS.add(key);
                let el = slotEls[key]; const fresh = !el;
                if (!el) { el = document.createElement('div'); el.className = 'slot'; slots.appendChild(el); slotEls[key] = el; }
                slots.appendChild(el);
                const filled = p < step.res.length;
                el.textContent = filled ? step.res[p] : (p + 1);
                el.style.opacity = filled ? '1' : '0.5';
                if (!filled) el.textContent = '·';
                el.className = 'slot'
                    + (filled ? ' filled' : '')
                    + (step.justFilled === p ? ' just' : '');
                if (fresh && !REDUCED) { el.style.opacity = '0'; Motion.pop(el); }
            }
            Object.keys(slotEls).forEach(k => { if (!usedS.has(k)) { slotEls[k].remove(); delete slotEls[k]; } });

            // narration
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.done);

            // code + pills
            highlightCode(step.code);
            renderPills(step);

            // confetti on completion
            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // badge + progress
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            // log
            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function renderPills(step) {
            const row = document.getElementById('pill-row');
            const built = step.res.length ? step.res.join('') : '∅';
            const cells = [
                `<span class="pill">n = <b>${N}</b></span>`,
                `<span class="pill">k = <b>${K}</b> (1-based)</span>`,
                `<span class="pill">k0 = <b>${step.curK != null ? step.curK : '—'}</b></span>`,
                `<span class="pill">block = <b>${step.block != null ? step.block : '—'}</b></span>`,
                `<span class="pill">idx = <b>${step.idx != null ? step.idx : '—'}</b></span>`,
                `<span class="pill">built = <b>${built}</b></span>`,
            ];
            row.innerHTML = cells.join('');
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 36; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 260) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(digitEls).forEach(k => { digitEls[k].remove(); delete digitEls[k]; });
            Object.keys(slotEls).forEach(k => { slotEls[k].remove(); delete slotEls[k]; });
            document.getElementById('pool').innerHTML = '';
            document.getElementById('slots').innerHTML = '';
            confettiArmed = true;
        }
        function load(nv, kv) {
            pause();
            N = Math.max(1, Math.min(9, nv | 0));
            const maxK = (() => { let f = 1; for (let i = 1; i <= N; i++) f *= i; return f; })();
            K = Math.max(1, Math.min(maxK, kv | 0));
            document.getElementById('n-input').value = N;
            document.getElementById('k-input').value = K;
            clearDom();
            buildFactRow();
            generateSteps();
            renderStep(0);
        }
        function loadCustom() {
            const nv = parseInt(document.getElementById('n-input').value, 10);
            const kv = parseInt(document.getElementById('k-input').value, 10);
            if (isNaN(nv) || nv < 1 || nv > 9) { alert('n must be between 1 and 9'); return; }
            if (isNaN(kv) || kv < 1) { alert('k must be at least 1'); return; }
            load(nv, kv);
        }
        function loadExample(ex) { if (ex === 0) load(3, 3); else load(4, 9); }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        function onEnter(e) { if (e.key === 'Enter') loadCustom(); }
        document.getElementById('n-input').addEventListener('keydown', onEnter);
        document.getElementById('k-input').addEventListener('keydown', onEnter);
        let _rsT; window.addEventListener('resize', () => { clearTimeout(_rsT); _rsT = setTimeout(() => renderStep(stepIdx), 120); });

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
