<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print Numbers from N to 1 &middot; Recursion Call Stack</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f85149;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="number"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; width:90px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'▸'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'✓'; color:var(--accent-green);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:340px; padding:22px; display:flex; gap:26px; justify-content:center; align-items:flex-start;}

/* call-stack column */
.stack-wrap{display:flex; flex-direction:column; align-items:center; gap:10px; min-width:300px;}
.stack-label{font-family:var(--mono); font-size:11px; font-weight:700; color:var(--accent-blue); letter-spacing:.08em; text-transform:uppercase;}
.stack{position:relative; display:flex; flex-direction:column; gap:8px; width:300px; padding:12px;
  border-radius:12px; border:1px solid rgba(255,255,255,.07);
  background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
  min-height:280px;}
.frame{position:relative; display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:11px 14px; border-radius:11px; font-family:var(--mono); font-weight:700; font-size:15px;
  border:2px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:background .35s, border-color .35s, color .35s, box-shadow .35s; will-change:transform;}
.frame .call{display:flex; align-items:center; gap:8px;}
.frame .depth{font-size:10px; color:var(--text-dim); font-weight:600;}
.frame .val{font-family:var(--mono); font-size:13px; font-weight:800; color:var(--text-dim); opacity:.5; transition:color .35s, opacity .35s;}
.frame.active{border-color:var(--accent-purple); background:rgba(168,85,247,.14); color:#e9d5ff;
  box-shadow:0 0 22px rgba(168,85,247,.45), inset 0 0 12px rgba(168,85,247,.12); --glow:rgba(168,85,247,.55); animation:breathe 2s ease-in-out infinite;}
.frame.printed{border-color:var(--accent-green); background:rgba(34,197,94,.13); color:#bbf7d0;
  box-shadow:0 0 22px rgba(34,197,94,.4); --glow:rgba(34,197,94,.5); animation:breathe 2s ease-in-out infinite;}
.frame.printed .val{color:#86efac; opacity:1;}
.frame.base{border-color:var(--accent-red); background:rgba(248,81,73,.14); color:#ffc7c2; --glow:rgba(248,81,73,.5);}
.frame.base .val{color:#ffc7c2; opacity:1;}
.frame.suspended{border-color:var(--border-main); background:rgba(255,255,255,.04); color:var(--text-dim);}
.frame.returning{border-color:var(--accent-green); background:rgba(34,197,94,.18);
  box-shadow:0 0 26px rgba(34,197,94,.5); --glow:rgba(34,197,94,.6); animation:breathe 1.4s ease-in-out infinite;}
.frame.returning .val{color:#86efac; opacity:1;}
.stack-base{width:300px; height:5px; border-radius:4px; background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);}

/* output side */
.result-side{display:flex; flex-direction:column; align-items:center; gap:14px; min-width:200px; padding-top:18px;}
.result-side .cap{font-family:var(--mono); font-size:11px; color:var(--text-dim); letter-spacing:.05em;}
.tiles-wrap{position:relative; display:flex; flex-wrap:wrap; gap:8px; justify-content:center; align-content:flex-start;
  width:200px; min-height:130px; padding:14px; border-radius:14px;
  border:1px dashed rgba(255,255,255,.10); background:linear-gradient(180deg, rgba(34,197,94,.05), rgba(255,255,255,.01));}
.tiles-wrap.empty::after{content:'(nothing printed yet)'; font-family:var(--mono); font-size:11px; color:var(--text-dim); opacity:.6;
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center; padding:0 10px;}
.tile{min-width:42px; height:42px; display:flex; align-items:center; justify-content:center;
  border-radius:11px; font-family:var(--mono); font-size:19px; font-weight:800;
  border:2px solid var(--accent-green); background:rgba(34,197,94,.14); color:#bbf7d0;
  box-shadow:0 0 18px rgba(34,197,94,.3); will-change:transform;}
.tile.newest{box-shadow:0 0 26px rgba(34,197,94,.5);}
.result-line{font-family:var(--mono); font-size:14px; color:#cfe9f5; min-height:22px; text-align:center; letter-spacing:.04em;}
.result-line b{color:#bbf7d0; font-weight:800;}
.result-line.final b{color:#a5f3fc;}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;} .code-line .nm{color:#f78c6c;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.c b{color:var(--accent-purple);} .pill.r b{color:var(--accent-green);} .pill.d b{color:var(--accent-blue);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes breathe{0%,100%{box-shadow:0 0 16px var(--glow), inset 0 0 10px rgba(255,255,255,.04);}50%{box-shadow:0 0 30px var(--glow), inset 0 0 14px rgba(255,255,255,.08);}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>N =</label>
  <input type="number" id="num-input" placeholder="5" min="0" max="9">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(5)">Ex 1 (N=5)</button>
  <button onclick="loadExample(3)">Ex 2 (N=3)</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Print Numbers from N to 1 <span class="sub">&middot; recursion call stack</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div class="stack-wrap">
        <div class="stack-label">Call Stack</div>
        <div class="stack" id="stack"></div>
        <div class="stack-base"></div>
      </div>
      <div class="result-side">
        <div id="confetti"></div>
        <div class="cap">printed output (top &rarr; down)</div>
        <div class="tiles-wrap empty" id="tiles"></div>
        <div class="result-line" id="result-line"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">↺ Reset</button>
    <button onclick="back()">← Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next →</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">← →</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">▾</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill c">n = <b id="pill-n">—</b></span>
        <span class="pill d">depth = <b id="pill-depth">0</b></span>
        <span class="pill r">printed <b id="pill-ret">—</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>active</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>printed</span>
          <span class="li"><span class="dot" style="background:var(--accent-red)"></span>base case</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME = 1000/60;
function sampleSpring(stiffness,damping,mass){
  const dt=1/60; let x=1,v=0; const out=[];
  for(let i=0;i<240;i++){const a=(-stiffness*x-damping*v)/mass; v+=a*dt; x+=v*dt; out.push(1-x); if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015) break;}
  out.push(1); return out;
}
const SPRING_POS=sampleSpring(340,30,1), SPRING_POP=sampleSpring(540,17,1);
const durOf=a=>a.length*FRAME;
const Motion={
  flip(el,dx,dy){ if(REDUCED||(Math.abs(dx)<0.5&&Math.abs(dy)<0.5))return;
    el.animate(SPRING_POS.map(p=>({transform:`translate(${(dx*(1-p)).toFixed(2)}px,${(dy*(1-p)).toFixed(2)}px)`})),{duration:durOf(SPRING_POS),easing:'linear'});},
  enter(el,delay=0){ if(REDUCED)return;
    el.animate(SPRING_POP.map(p=>({opacity:Math.min(1,p*1.6).toFixed(3),transform:`translateY(${(-16*(1-p)).toFixed(2)}px) scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear',delay,fill:'backwards'});},
  pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED){el.style.transform='scale(1)';return;}
    el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.6+0.4*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear',fill:'forwards'});},
};

const CODE=[
  [['kw','function'],['fn',' printNto1'],['src','(n) {']],
  [['src','  '],['kw','if'],['src',' (n === 0) ']],
  [['src','    '],['kw','return'],['src',';            ']],
  [['src','  '],['fn','print'],['src','(n);          ']],
  [['src','  '],['fn','printNto1'],['src','(n - 1);']],
  [['src','}']],
];

let targetN=5, steps=[], stepIndex=0, timer=null;
const delays=[1500,820,420];
const els={};
let confettiArmed=true;

function init(){ buildCode(); loadExample(5); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(n){ targetN=parseInt(n); document.getElementById('num-input').value=targetN; generateSteps(); reset(); }
function loadCustom(){ const v=parseInt(document.getElementById('num-input').value);
  if(!isNaN(v)&&v>=0&&v<=9) loadExample(v); else alert('Enter an integer 0–9.'); }

function generateSteps(){
  steps=[]; const stack=[]; const printed=[];   // each frame: {n, state}
  const fmt=arr=>arr.length? arr.join(' ') : '(empty)';

  steps.push({stack:[], printed:[], n:'—', depth:0, ret:0, code:[0],
    narr:`Print numbers from <code>${targetN}</code> down to <code>1</code> by recursion. The print happens <b>before</b> the recursive call &mdash; so numbers come out in descending order. Base case: <code>n === 0 &rarr; return</code>.`,
    log:`start printNto1(${targetN})`});

  function rec(n){
    stack.push({n, state:'active'});
    snap({code:[0,1], n, depth:stack.length,
      narr:`Call <code>printNto1(${n})</code> &mdash; pushed onto the stack. Check base case <code>${n} === 0</code>?`,
      log:`call printNto1(${n})`});
    if(n===0){
      top().state='base';
      snap({code:[1,2], n, depth:stack.length, baseFlash:true,
        narr:`<b>Base case:</b> <code>${n} === 0</code> &rarr; <code>return</code> without printing. Nothing is added; start unwinding.`,
        log:`  base case printNto1(0): return (no print)`});
      markReturning(); stack.pop();
      return;
    }
    // print n BEFORE recursing (pre-order / descending)
    top().state='printed';
    printed.push(n);
    snap({code:[3], n, depth:stack.length, printFlash:n,
      narr:`<code>${n} !== 0</code> &rarr; <b>print ${n}</b> now, before recursing. Output so far: <code>${fmt(printed)}</code>.`,
      log:`  print ${n}`});
    snap({code:[4], n, depth:stack.length,
      narr:`Recurse deeper: call <code>printNto1(${n-1})</code>. The frame for <code>${n}</code> waits (suspended) until it returns.`,
      log:`  recurse printNto1(${n-1})`});
    if(top()) top().state='suspended';
    rec(n-1);
    snap({code:[5], n, depth:stack.length,
      narr:`<code>printNto1(${n})</code> resumes after the deeper call returned &mdash; reaches end of function, returns and pops. Nothing left to do.`,
      log:`  return printNto1(${n}) (pop)`});
    markReturning(); stack.pop();
  }
  function top(){ return stack[stack.length-1]; }
  function markReturning(){ if(top()) top().state='returning'; }
  function snap(o){
    steps.push({
      stack: stack.map(f=>({n:f.n, state:f.state})),
      printed: printed.slice(),
      n:o.n, depth:o.depth, ret:printed.length,
      printFlash:o.printFlash!=null?o.printFlash:null, baseFlash:!!o.baseFlash,
      code:o.code, narr:o.narr, log:o.log
    });
  }

  rec(targetN);
  const finalStr = printed.length? printed.join(' ') : '(nothing printed)';
  steps.push({stack:[], printed:printed.slice(), n:'—', depth:0, ret:printed.length, code:[],
    narr:`Stack empty &mdash; recursion complete. Printed <b>${printed.length}</b> number(s) in descending order: <code><b>${finalStr}</b></code>.`,
    log:`done. output: ${finalStr}`, complete:true, finalStr});
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  // FIRST rects for FLIP
  const firstRects={};
  Object.keys(els).forEach(k=>{ if(els[k]&&els[k].isConnected) firstRects[k]=els[k].getBoundingClientRect(); });

  const stackEl=document.getElementById('stack');
  const present=new Set(step.stack.map(f=>'f'+f.n));
  // reap removed frames
  Object.keys(els).forEach(k=>{ if(k[0]==='f' && !present.has(k)){ if(els[k].isConnected) els[k].remove(); delete els[k]; }});
  const fresh=[];
  const ordered=step.stack.map(f=>{
    const key='f'+f.n;
    let el=els[key];
    if(!el){
      el=document.createElement('div'); el.className='frame'; els[key]=el; fresh.push(el);
      el.innerHTML=`<span class="call"><span>printNto1(${f.n})</span></span><span class="val"></span>`;
    }
    el.classList.remove('active','printed','base','suspended','returning');
    if(f.state) el.classList.add(f.state);
    const v=el.querySelector('.val');
    if(f.state==='printed'||f.state==='returning') v.textContent='✓ '+f.n;
    else if(f.state==='base') v.textContent='∅';
    else v.textContent='';
    return el;
  });
  ordered.forEach(el=>stackEl.appendChild(el));
  // FLIP existing, enter fresh
  Object.keys(firstRects).forEach(k=>{ const el=els[k]; if(!el||!el.isConnected) return;
    const last=el.getBoundingClientRect(); Motion.flip(el, firstRects[k].left-last.left, firstRects[k].top-last.top); });
  fresh.forEach(el=>Motion.enter(el,0));

  // printed-output tiles (persistent-DOM, keyed by value)
  const tilesEl=document.getElementById('tiles');
  const presentT=new Set(step.printed.map(v=>'t'+v));
  Object.keys(els).forEach(k=>{ if(k[0]==='t' && !presentT.has(k)){ if(els[k].isConnected) els[k].remove(); delete els[k]; }});
  const freshT=[];
  const orderedT=step.printed.map(v=>{
    const key='t'+v; let el=els[key];
    if(!el){ el=document.createElement('div'); el.className='tile'; el.textContent=v; els[key]=el; freshT.push(el); }
    el.classList.toggle('newest', step.printFlash===v);
    return el;
  });
  orderedT.forEach(el=>tilesEl.appendChild(el));
  tilesEl.classList.toggle('empty', step.printed.length===0);
  freshT.forEach(el=>Motion.pop(el));

  // result line
  const rl=document.getElementById('result-line');
  rl.classList.toggle('final', !!step.complete);
  if(step.complete){ rl.innerHTML=`final output = <b>${step.finalStr}</b>`; }
  else if(step.printed.length){ rl.innerHTML=`output so far: <b>${step.printed.join(' ')}</b>`; }
  else { rl.innerHTML=''; }

  // narration
  const narr=document.getElementById('narration'); narr.innerHTML=step.narr;
  narr.classList.toggle('done', !!step.complete);
  // code
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });
  // pills
  document.getElementById('pill-n').textContent=step.n;
  document.getElementById('pill-depth').textContent=step.depth;
  document.getElementById('pill-ret').textContent=step.ret;
  // progress + badge
  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;
  // log
  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color='var(--accent-green)'; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;
  // confetti
  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1600); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; for(const k in els){ if(els[k].isConnected) els[k].remove(); delete els[k]; } confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; reset(); } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=init;
</script>
</body>
</html>
