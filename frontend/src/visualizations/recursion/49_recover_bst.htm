<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Binary Search Tree</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* in-order pointer / current node */
            --accent-blue:   #06b6d4;   /* prev pointer / edges / chrome   */
            --accent-green:  #22c55e;   /* settled / corrected BST         */
            --accent-red:    #f43f5e;   /* violation / swapped nodes       */
            --accent-purple: #a855f7;   /* root / step chrome              */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 940px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.12), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 280px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168,85,247,0.18); background: rgba(168,85,247,0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(168, 85, 247, 0.5); box-shadow: 0 0 18px rgba(168, 85, 247, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(168,85,247,0.22), rgba(168,85,247,0.10)); border-color: rgba(168, 85, 247, 0.45); color: #e9d5ff; min-width: 80px; }
        .op-btn.load { border-color: rgba(6,182,212,0.4); color: #a5f3fc; font-family: var(--mono); }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #e9d5ff; background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); box-shadow: 0 0 12px rgba(168,85,247,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(168,85,247,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #ede9fe; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-purple); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.bad { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.07); }
        .narration.bad::before { content: '\26A0'; color: var(--accent-red); }
        .narration code { background: rgba(168,85,247,0.14); color: #d8b4fe; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(168,85,247,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }

        .tree-stage { position: relative; width: 100%; height: 300px; overflow: auto; scrollbar-width: thin; }
        .tree-stage::-webkit-scrollbar { height: 7px; width: 7px; }
        .tree-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .tree-canvas { position: relative; margin: 0 auto; }
        #edges { position: absolute; left: 0; top: 0; overflow: visible; pointer-events: none; z-index: 1; }
        .edge-ln { stroke: var(--accent-blue); stroke-width: 2.2; fill: none; opacity: 0.45; transition: stroke 0.3s, opacity 0.3s; }
        .edge-ln.active { stroke: var(--accent-orange); opacity: 1; filter: drop-shadow(0 0 6px rgba(245,165,36,0.6)); }

        .tnode { position: absolute; width: 46px; height: 46px; margin: -23px 0 0 -23px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-family: var(--mono); font-weight: 800; font-size: 17px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.06); color: var(--text-main);
            z-index: 2; will-change: transform; transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s; }
        .tnode.root { border-color: var(--accent-purple); }
        .tnode.cur { border-color: var(--accent-orange); background: rgba(245,165,36,0.18); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.6); }
        .tnode.prev { border-color: var(--accent-blue); background: rgba(6,182,212,0.16); color: #a5f3fc; box-shadow: 0 0 20px rgba(6,182,212,0.5); }
        .tnode.visited { border-color: rgba(34,197,94,0.45); }
        .tnode.bad { border-color: var(--accent-red); background: rgba(244,63,94,0.18); color: #fecdd3; box-shadow: 0 0 22px rgba(244,63,94,0.6); }
        .tnode.fixed { border-color: var(--accent-green); background: rgba(34,197,94,0.18); color: #bbf7d0; box-shadow: 0 0 22px rgba(34,197,94,0.55); }

        .seq-zone { padding: 4px 16px 16px; }
        .seq-label { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); text-align: center; margin-bottom: 8px; }
        .seq-rail { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; min-height: 44px; align-items: center; }
        .scell { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative;
            font-family: var(--mono); font-weight: 800; font-size: 16px; border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s; }
        .scell.cur { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 14px rgba(245,165,36,0.45); }
        .scell.prev { border-color: var(--accent-blue); background: rgba(6,182,212,0.14); color: #a5f3fc; }
        .scell.bad { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 14px rgba(244,63,94,0.45); }
        .scell.fixed { border-color: var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0; box-shadow: 0 0 14px rgba(34,197,94,0.45); }
        .seq-empty { color: var(--text-dim); font-family: var(--mono); font-size: 13px; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-purple); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .state-pill { font-family: var(--mono); font-size: 11.5px; font-weight: 700; padding: 5px 11px; border-radius: 9px; border: 1px solid var(--border-main); background: rgba(255,255,255,0.03); color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
        .state-pill b { color: var(--text-main); font-weight: 800; }
        .state-pill .pl { color: var(--text-dim); font-weight: 600; }
        .state-pill.cur b { color: #ffd591; }
        .state-pill.prev b { color: #a5f3fc; }
        .state-pill.bad b { color: #fecdd3; }
        .state-pill.fixed b { color: #bbf7d0; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line .cm { color: #5b6a86; }
        .code-line.active { background: rgba(168,85,247,0.12); border-left-color: var(--accent-purple); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">tree (level-order) =</label>
        <input type="text" id="tree-input" value="3,1,4,null,null,2">
        <button class="op-btn load" onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Ex 1</button>
        <button onclick="loadExample(1)">Ex 2</button>
        <button onclick="resetSim()">&#8634; Reset</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Recover BST <span class="sub">&middot; exactly two nodes are swapped &middot; in-order walk finds them &middot; swap values back &middot; O(n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="tree-stage" id="tree-stage">
                    <div class="tree-canvas" id="tree-canvas">
                        <svg id="edges"></svg>
                    </div>
                </div>
                <div class="seq-zone">
                    <div class="seq-label">in-order sequence &middot; a valid BST yields ascending values</div>
                    <div class="seq-rail" id="seq-rail"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="pill-row" id="pill-row"></div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            move(el, x, y) {
                const px = el._x, py = el._y;
                const commit = `translate(${x.toFixed(1)}px, ${y.toFixed(1)}px)`;
                if (REDUCED || px == null || (Math.abs(x - px) < 0.5 && Math.abs(y - py) < 0.5)) { el._x = x; el._y = y; el.style.transform = commit; return; }
                const dx = x - px, dy = y - py;
                const kf = SPRING_POS.map(p => ({ transform: `translate(${(px + dx * p).toFixed(1)}px, ${(py + dy * p).toFixed(1)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el._y = y; el.style.transform = commit;
            },
            pop(el) {
                if (REDUCED) { el.style.opacity = '1'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `translate(${el._x.toFixed(1)}px, ${el._y.toFixed(1)}px) scale(${(0.3 + 0.7 * p).toFixed(3)})` }));
                const a = el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
                a.onfinish = () => { el.style.transform = `translate(${el._x.toFixed(1)}px, ${el._y.toFixed(1)}px)`; };
            },
        };

        // ───────── State ─────────
        let treeInput = "3,1,4,null,null,2";
        let nodes = [];        // flat node list: {id, val, depth, x, y, leftId, rightId}
        let rootId = -1;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        const delays = [1500, 820, 400];
        const nodeEls = {};
        const edgeEls = {};
        const cellEls = {};

        // ───────── Algorithm source (rendered once) ─────────
        const CODE = [
            [['kw','def '],['fn','recoverTree'],['src','(root):']],
            [['src','    first = second = prev = None']],
            [['src','    def '],['fn','inorder'],['src','(node):']],
            [['kw','        nonlocal '],['src','first, second, prev']],
            [['kw','        if '],['src','node is None: '],['kw','return']],
            [['fn','        inorder'],['src','(node.left)']],
            [['kw','        if '],['src','prev and prev.val > node.val:']],
            [['kw','            if '],['src','first is None: first = prev']],
            [['src','            second = node     '],['cm','# keep last violation']],
            [['src','        prev = node']],
            [['fn','        inorder'],['src','(node.right)']],
            [['fn','    inorder'],['src','(root)']],
            [['src','    first.val, second.val = second.val, first.val']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code & log' : 'Show code & log';
        }

        // ───────── parse level-order -> node graph + BST layout ─────────
        const ROW = 70, PADY = 34, SLOT = 60;
        function parseTree(str) {
            const toks = str.split(',').map(t => t.trim());
            if (!toks.length || toks[0] === '' || toks[0] === 'null') return { nodes: [], rootId: -1 };
            const list = [];
            const make = (val) => { const id = list.length; list.push({ id, val, depth: 0, x: 0, y: 0, inX: 0, leftId: -1, rightId: -1 }); return id; };
            const rId = make(parseInt(toks[0], 10));
            const queue = [rId];
            let i = 1;
            while (queue.length && i < toks.length) {
                const cur = queue.shift();
                // left
                if (i < toks.length) { const t = toks[i++]; if (t !== 'null' && t !== '') { const c = make(parseInt(t, 10)); list[cur].leftId = c; queue.push(c); } }
                // right
                if (i < toks.length) { const t = toks[i++]; if (t !== 'null' && t !== '') { const c = make(parseInt(t, 10)); list[cur].rightId = c; queue.push(c); } }
            }
            // assign depth + in-order index for x positioning
            let order = 0;
            (function assign(id, depth) {
                if (id < 0) return;
                assign(list[id].leftId, depth + 1);
                list[id].depth = depth; list[id].inX = order++;
                assign(list[id].rightId, depth + 1);
            })(rId, 0);
            const total = order;
            const width = Math.max(total * SLOT, 320);
            list.forEach(nd => {
                nd.x = ((nd.inX + 0.5) / total) * width;
                nd.y = nd.depth * ROW + PADY;
            });
            return { nodes: list, rootId: rId, width, maxDepth: Math.max(...list.map(n => n.depth)) };
        }

        // immutable in-order list of node ids (algorithm visiting order)
        function inorderIds(list, id, acc) {
            if (id < 0) return;
            inorderIds(list, list[id].leftId, acc);
            acc.push(id);
            inorderIds(list, list[id].rightId, acc);
        }

        // ───────── step generation (genuine simulation) ─────────
        function snapBase(extra) {
            return Object.assign({
                vals: {},          // id -> current value (so swap is reflected)
                visited: [],       // ids already fully placed into sequence
                seq: [],           // [{id, val}] running in-order sequence
                cur: -1, prev: -1, // pointer ids
                badA: -1, badB: -1,// first / second violating node ids
                fixed: false,
                code: [], panel: '', log: '', narr: '',
            }, extra);
        }

        function generateSteps() {
            const parsed = parseTree(treeInput);
            nodes = parsed.nodes; rootId = parsed.rootId;
            steps = [];

            // working value map (mutated only at the final swap, snapshots are deep-copied)
            const vals = {}; nodes.forEach(n => vals[n.id] = n.val);
            const order = []; inorderIds(nodes, rootId, order);

            // step 0: intro
            steps.push(snapBase({
                vals: { ...vals }, code: [0, 1],
                panel: `A valid <b>BST</b> read <b>in&#8209;order</b> (left &#8594; node &#8594; right) gives values in <b>ascending</b> order. Here exactly two nodes were swapped &#8212; we walk in&#8209;order, track <code>prev</code>, and flag any place where <code>prev.val &gt; node.val</code>.`,
                log: `recoverTree("${treeInput}")`,
            }));

            // walk in-order, building the sequence and detecting violations
            let prev = -1, first = -1, second = -1;
            const seq = [];
            const visited = [];
            for (let k = 0; k < order.length; k++) {
                const id = order[k];
                // visit step
                seq.push({ id, val: vals[id] });
                visited.push(id);
                const cmpTxt = prev < 0
                    ? `First value visited &#8212; nothing to compare yet. Set <code>prev = ${vals[id]}</code>.`
                    : (vals[prev] > vals[id]
                        ? `Compare <code>prev = ${vals[prev]}</code> with current <code>${vals[id]}</code> &#8594; <span style="color:var(--accent-red)"><b>${vals[prev]} &gt; ${vals[id]}</b>, violation!</span>`
                        : `Compare <code>prev = ${vals[prev]}</code> with current <code>${vals[id]}</code> &#8594; <span style="color:var(--accent-green)">${vals[prev]} &#8804; ${vals[id]}, in order.</span>`);

                const isViol = prev >= 0 && vals[prev] > vals[id];
                if (isViol) {
                    if (first < 0) first = prev;
                    second = id;
                }

                steps.push(snapBase({
                    vals: { ...vals }, visited: [...visited], seq: seq.map(s => ({ ...s })),
                    cur: id, prev, badA: isViol ? first : (first >= 0 ? first : -1), badB: isViol ? second : (second >= 0 ? second : -1),
                    code: isViol ? [4, 5, 6, 7, 8] : [4, 5, 6, 9, 10],
                    panel: `Visit node <code>${vals[id]}</code>. ${cmpTxt}`,
                    log: prev < 0 ? `visit ${vals[id]}  (prev=none)` : `visit ${vals[id]}  prev=${vals[prev]}` + (isViol ? `  VIOLATION` : `  ok`),
                }));

                prev = id;
            }

            // detection summary
            const adjacent = order.indexOf(first) >= 0 && order.indexOf(second) === order.indexOf(first) + 1;
            steps.push(snapBase({
                vals: { ...vals }, visited: [...visited], seq: seq.map(s => ({ ...s })),
                badA: first, badB: second, prev: -1, cur: -1, code: [11],
                panel: `Walk complete. The two mis&#8209;ordered nodes are <code>first = ${vals[first]}</code> and <code>second = ${vals[second]}</code> ` +
                    (adjacent ? `(an <b>adjacent</b> inversion).` : `(a <b>non&#8209;adjacent</b> pair &#8212; <code>first</code> from the earliest violation, <code>second</code> from the latest).`),
                log: `swapped nodes: ${vals[first]} & ${vals[second]}`,
            }));

            // perform the swap (mutate working vals so corrected tree shows)
            const fa = vals[first], fb = vals[second];
            vals[first] = fb; vals[second] = fa;

            steps.push(snapBase({
                vals: { ...vals }, visited: [...visited], seq: seq.map(s => ({ ...s })),
                badA: first, badB: second, prev: -1, cur: -1, fixed: true, code: [12],
                panel: `Swap their values: <code>${fa} &#8596; ${fb}</code>. Node positions stay put &#8212; only the values move.`,
                log: `swap values: ${fa} <-> ${fb}`,
            }));

            // final: corrected in-order sequence
            const finalSeq = order.map(id => ({ id, val: vals[id] }));
            const finalLevel = levelOrderString(nodes, rootId, vals);
            steps.push(snapBase({
                vals: { ...vals }, visited: order.slice(), seq: finalSeq, complete: true,
                code: [12], fixed: true,
                panel: `<b>BST recovered.</b> In&#8209;order is now ascending: <code>[${finalSeq.map(s => s.val).join(', ')}]</code>. Recovered tree (level&#8209;order): <code>${finalLevel}</code>.`,
                log: `done  recovered = ${finalLevel}`,
                finalLevel,
            }));
        }

        function levelOrderString(list, rId, vals) {
            if (rId < 0) return '';
            const out = []; const q = [rId];
            while (q.length) {
                const id = q.shift();
                if (id < 0) { out.push('null'); continue; }
                out.push(String(vals[id]));
                // push both child slots (canonical level-order serialization)
                q.push(list[id].leftId); q.push(list[id].rightId);
            }
            // trim trailing nulls
            while (out.length && out[out.length - 1] === 'null') out.pop();
            return out.join(',');
        }

        // ───────── render (persistent-DOM reconciliation) ─────────
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const total = nodes.length ? (Math.max(...nodes.map(n => n.inX)) + 1) : 1;
            const width = Math.max(total * SLOT, 320);
            const maxDepth = nodes.length ? Math.max(...nodes.map(n => n.depth)) : 0;
            const height = maxDepth * ROW + PADY * 2;

            const canvas = document.getElementById('tree-canvas');
            const svg = document.getElementById('edges');
            canvas.style.width = width + 'px'; canvas.style.height = Math.max(height, 120) + 'px';
            svg.setAttribute('width', width); svg.setAttribute('height', Math.max(height, 120));

            // ----- nodes -----
            const used = new Set();
            nodes.forEach(nd => {
                const key = 'n:' + nd.id; used.add(key);
                let el = nodeEls[key]; const fresh = !el;
                if (!el) { el = document.createElement('div'); el.className = 'tnode'; el.innerHTML = `<span class="tv"></span>`; canvas.appendChild(el); nodeEls[key] = el; }
                el.querySelector('.tv').textContent = step.vals[nd.id];
                let cls = 'tnode' + (nd.id === rootId ? ' root' : '');
                if (step.fixed && (nd.id === step.badA || nd.id === step.badB)) cls += ' fixed';
                else if (nd.id === step.badA || nd.id === step.badB) cls += ' bad';
                else if (nd.id === step.cur) cls += ' cur';
                else if (nd.id === step.prev) cls += ' prev';
                else if (step.visited && step.visited.includes(nd.id)) cls += ' visited';
                el.className = cls;
                if (fresh) { el._x = nd.x; el._y = nd.y; el.style.transform = `translate(${nd.x}px, ${nd.y}px)`; el.style.opacity = '0'; Motion.pop(el); }
                else Motion.move(el, nd.x, nd.y);
            });
            Object.keys(nodeEls).forEach(k => { if (!used.has(k)) { nodeEls[k].remove(); delete nodeEls[k]; } });

            // ----- edges -----
            const usedE = new Set();
            const badPair = (a, b) => (a === step.badA && b === step.badB) || (a === step.badB && b === step.badA);
            nodes.forEach(nd => {
                [['L', nd.leftId], ['R', nd.rightId]].forEach(([side, childId]) => {
                    if (childId < 0) return;
                    const key = 'e:' + nd.id + side; usedE.add(key);
                    let ln = edgeEls[key];
                    if (!ln) { ln = document.createElementNS('http://www.w3.org/2000/svg', 'line'); svg.appendChild(ln); edgeEls[key] = ln; }
                    ln.setAttribute('x1', nd.x); ln.setAttribute('y1', nd.y); ln.setAttribute('x2', nodes[childId].x); ln.setAttribute('y2', nodes[childId].y);
                    const onPath = (nd.id === step.cur || nd.id === step.prev) && (childId === step.cur || childId === step.prev);
                    ln.setAttribute('class', 'edge-ln' + (onPath ? ' active' : ''));
                });
            });
            Object.keys(edgeEls).forEach(k => { if (!usedE.has(k)) { edgeEls[k].remove(); delete edgeEls[k]; } });

            // ----- in-order sequence rail -----
            const rail = document.getElementById('seq-rail'); const usedC = new Set();
            if (!step.seq || step.seq.length === 0) {
                Object.keys(cellEls).forEach(k => { cellEls[k].remove(); delete cellEls[k]; });
                if (!rail.querySelector('.seq-empty')) rail.innerHTML = '<span class="seq-empty">in-order sequence builds as we walk &hellip;</span>';
            } else {
                const note = rail.querySelector('.seq-empty'); if (note) note.remove();
                step.seq.forEach((item, pos) => {
                    const key = 'c:' + pos; usedC.add(key);
                    let el = cellEls[key];
                    if (!el) { el = document.createElement('div'); el.className = 'scell'; el.innerHTML = `<span class="cv"></span>`; rail.appendChild(el); cellEls[key] = el; }
                    el.querySelector('.cv').textContent = item.val;
                    let cls = 'scell';
                    if (step.fixed && (item.id === step.badA || item.id === step.badB)) cls += ' fixed';
                    else if (item.id === step.badA || item.id === step.badB) cls += ' bad';
                    else if (item.id === step.cur) cls += ' cur';
                    else if (item.id === step.prev) cls += ' prev';
                    el.className = cls;
                });
                Object.keys(cellEls).forEach(k => { if (!usedC.has(k)) { cellEls[k].remove(); delete cellEls[k]; } });
            }

            // ----- narration / chrome -----
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const isBad = (step.badA >= 0 || step.badB >= 0) && !step.fixed && !step.complete;
            mp.classList.toggle('bad', isBad);
            highlightCode(step.code);

            // ----- state pills -----
            renderPills(step);

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function renderPills(step) {
            const row = document.getElementById('pill-row');
            const dash = '—';
            const curV = step.cur >= 0 ? step.vals[step.cur] : dash;
            const prevV = step.prev >= 0 ? step.vals[step.prev] : dash;
            const firstV = step.badA >= 0 ? detectedVal(step, step.badA) : dash;
            const secondV = step.badB >= 0 ? detectedVal(step, step.badB) : dash;
            row.innerHTML =
                `<span class="state-pill cur"><span class="pl">cur</span> <b>${curV}</b></span>` +
                `<span class="state-pill prev"><span class="pl">prev</span> <b>${prevV}</b></span>` +
                `<span class="state-pill bad"><span class="pl">first</span> <b>${firstV}</b></span>` +
                `<span class="state-pill bad"><span class="pl">second</span> <b>${secondV}</b></span>` +
                (step.fixed ? `<span class="state-pill fixed"><span class="pl">status</span> <b>recovered</b></span>` : '');
        }
        // value a node held at detection time (before the final swap)
        function detectedVal(step, id) {
            if (!step.fixed) return step.vals[id];
            // after the swap the detected pair's displayed values are swapped; report the detected value
            if (id === step.badA) return step.vals[step.badB];
            if (id === step.badB) return step.vals[step.badA];
            return step.vals[id];
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(nodeEls).forEach(k => { nodeEls[k].remove(); delete nodeEls[k]; });
            Object.keys(edgeEls).forEach(k => { edgeEls[k].remove(); delete edgeEls[k]; });
            Object.keys(cellEls).forEach(k => { cellEls[k].remove(); delete cellEls[k]; });
            document.getElementById('seq-rail').innerHTML = '';
        }
        function loadTree(str) {
            pause(); treeInput = str; document.getElementById('tree-input').value = str;
            clearDom(); generateSteps(); renderStep(0);
        }
        function loadCustom() {
            const v = document.getElementById('tree-input').value.trim();
            if (!v) { document.getElementById('tree-input').focus(); return; }
            loadTree(v);
        }
        function loadExample(n) {
            const exs = ["3,1,4,null,null,2", "1,3,null,null,2"];
            loadTree(exs[n]);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('tree-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
