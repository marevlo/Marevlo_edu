<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combination Sum II</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* DFS path / cursor          */
            --accent-blue:   #06b6d4;   /* edges / links              */
            --accent-green:  #22c55e;   /* complete valid leaf        */
            --accent-red:    #f43f5e;   /* dead end / pruned / skip   */
            --accent-purple: #a855f7;   /* root / current node        */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 980px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.12), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        #candidates-input { width: 220px; }
        #target-input { width: 64px; }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(168, 85, 247, 0.5); box-shadow: 0 0 18px rgba(168, 85, 247, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(168,85,247,0.22), rgba(168,85,247,0.10)); border-color: rgba(168, 85, 247, 0.45); color: #e9d5ff; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #e9d5ff; background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); box-shadow: 0 0 12px rgba(168,85,247,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .res-feed { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; min-height: 26px; }
        .res-chip { font-family: var(--mono); font-size: 12px; font-weight: 800; padding: 4px 10px; border-radius: 8px; border: 1px solid rgba(34,197,94,0.4); color: #bbf7d0; background: rgba(34,197,94,0.12); opacity: 0; transform: scale(.6); transition: opacity .3s, transform .3s cubic-bezier(.34,1.5,.64,1); }
        .res-chip.show { opacity: 1; transform: scale(1); }
        .res-label { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(168,85,247,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #ede9fe; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-purple); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(168,85,247,0.14); color: #d8b4fe; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(168,85,247,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .tree-stage { position: relative; width: 100%; height: 430px; overflow: auto; scrollbar-width: thin; cursor: grab; }
        .tree-stage.grabbing { cursor: grabbing; }
        .tree-stage::-webkit-scrollbar { height: 7px; width: 7px; }
        .tree-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .tree-canvas { position: relative; }
        .tree-inner { position: absolute; left: 0; top: 0; transform-origin: 0 0; }
        .zoom-bar { position: absolute; right: 14px; bottom: 12px; display: flex; gap: 6px; z-index: 12; }
        .zoom-bar button { height: 30px; min-width: 30px; padding: 0 9px; border-radius: 8px; font-size: 15px; font-weight: 700; background: rgba(10,15,28,0.7); backdrop-filter: blur(6px); }
        .zoom-bar .fit { font-size: 12px; }
        #edges { position: absolute; left: 0; top: 0; overflow: visible; pointer-events: none; z-index: 1; }
        .edge-ln { stroke: var(--accent-blue); stroke-width: 2.2; fill: none; opacity: 0.5; transition: stroke 0.35s, opacity 0.35s; }
        .edge-ln.on-path { stroke: var(--accent-orange); opacity: 1; filter: drop-shadow(0 0 6px rgba(245,165,36,0.6)); }
        .edge-lbl { font-family: var(--mono); font-size: 13px; font-weight: 800; fill: var(--text-dim); }
        .edge-lbl.on-path { fill: var(--accent-orange); }

        .tnode { position: absolute; min-width: 46px; height: 38px; padding: 0 9px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 10px; font-family: var(--mono); font-weight: 800; font-size: 12.5px; line-height: 1.05; transform: translate(-50%, 0);
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.06); color: var(--text-main); white-space: nowrap;
            z-index: 2; will-change: transform, left, top; transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s; }
        .tnode .nrem { font-size: 10px; font-weight: 600; color: var(--text-dim); margin-top: 1px; }
        .tnode.current .nrem, .tnode.on-path .nrem { color: rgba(255,255,255,0.75); }
        .tnode.root { border-color: var(--accent-purple); background: linear-gradient(180deg, rgba(168,85,247,0.30), rgba(168,85,247,0.12)); color: #e9d5ff; }
        .tnode.on-path { border-color: var(--accent-orange); box-shadow: 0 0 16px rgba(245,165,36,0.45); color: #fff; }
        .tnode.current { border-color: var(--accent-purple); box-shadow: 0 0 22px rgba(168,85,247,0.6); color: #fff; }
        .tnode.complete { border-color: var(--accent-green); background: linear-gradient(180deg, #2fe08f, #21c275); color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.45); }
        .tnode.complete .nrem { color: #064e3b; }
        .tnode.pruned { border-color: var(--accent-red); background: linear-gradient(180deg, rgba(244,63,94,0.24), rgba(244,63,94,0.10)); color: #fecdd3; }
        .tnode.pruned .nrem { color: rgba(254,205,211,0.8); }
        .tnode.dim { opacity: 0.34; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-purple); width: 110px; cursor: pointer; }
        #confetti { position: fixed; left: 0; right: 0; top: 30%; height: 0; overflow: visible; pointer-events: none; z-index: 60; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }
        .state-pills { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; }
        .pill { font-family: var(--mono); font-size: 12px; padding: 5px 11px; border-radius: 999px; border: 1px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-dim); }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.idx b { color: var(--accent-orange); }
        .pill.cand b { color: var(--accent-blue); }
        .pill.rem b { color: var(--accent-green); }
        .pill.found b { color: var(--accent-green); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(168,85,247,0.12); border-left-color: var(--accent-purple); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 240px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">candidates =</label>
        <input type="text" id="candidates-input" placeholder="10,1,2,7,6,1,5">
        <label class="ui-label">target =</label>
        <input type="text" id="target-input" placeholder="8" maxlength="4">
        <button onclick="loadCustom()">Build</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Ex 1</button>
        <button onclick="loadExample(1)">Ex 2</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Combination Sum II <span class="sub">&middot; backtracking &middot; sort, use each once, skip duplicates per level</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="res-feed"><span class="res-label">combinations:</span><span id="res-feed"></span></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="tree-stage" id="tree-stage">
                    <div class="tree-canvas" id="tree-canvas">
                        <div class="tree-inner" id="tree-inner">
                            <svg id="edges"></svg>
                        </div>
                    </div>
                </div>
                <div class="zoom-bar">
                    <button onclick="zoomBy(0.8)" title="Zoom out">&#8722;</button>
                    <button class="fit" onclick="fitView()" title="Fit whole tree">Fit</button>
                    <button onclick="zoomBy(1.25)" title="Zoom in">+</button>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> State</div>
                            <div class="state-pills" id="state-pills"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="confetti"></div>

    <script>
        'use strict';

        // ───────── Motion engine ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) { el.style.opacity = '1'; return; }
                const base = el.style.transform.replace(/ scale\([^)]*\)/, '');
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `${base} scale(${(0.3 + 0.7 * p).toFixed(3)})` }));
                const a = el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
                a.onfinish = () => { el.style.transform = base; el.style.opacity = '1'; };
            },
        };

        // ───────── State ─────────
        let candidates = [];       // sorted candidate values
        let target = 8;
        let nodes = [];            // full recursion tree: {key, parent, edgeLabel, combo, start, remaining, status, complete, pruned}
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1300, 700, 320];
        const nodeEls = {};
        const edgeEls = {};
        let viewScale = 1, autoFit = true, contentW = 0, contentH = 0;

        const EXAMPLES = [
            { candidates: [10, 1, 2, 7, 6, 1, 5], target: 8 },
            { candidates: [2, 5, 2, 1, 2],        target: 5 },
        ];

        const CODE = [
            [['kw','def '],['fn','combinationSum2'],['src','(cands, target):']],
            [['src','  cands.sort()']],
            [['kw','  def '],['fn','backtrack'],['src','(start, remaining, combo):']],
            [['kw','    if '],['src','remaining == 0:']],
            [['src','      results.append(combo[:]); '],['kw','return']],
            [['kw','    for '],['src','i in range(start, len(cands)):']],
            [['kw','      if '],['src','i > start and cands[i] == cands[i-1]: '],['kw','continue']],
            [['kw','      if '],['src','cands[i] > remaining: '],['kw','break']],
            [['src','      combo.append(cands[i])']],
            [['src','      backtrack(i+1, remaining - cands[i], combo)']],
            [['src','      combo.pop()']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code & log' : 'Show code & log';
        }

        const cset = (a) => '[' + a.join(',') + ']';

        // ───────── build the full recursion tree + DFS preorder steps ─────────
        function generateSteps() {
            nodes = []; steps = [];
            candidates = candidates.slice().sort((a, b) => a - b);
            const byKey = new Map();
            let uid = 0;

            function addNode(parentKey, edgeLabel, combo, start, remaining) {
                const key = 'n' + (uid++);
                const node = { key, parent: parentKey, edgeLabel, combo: combo.slice(), start, remaining, status: 'internal', complete: false, pruned: false };
                nodes.push(node); byKey.set(key, node); return node;
            }

            const root = addNode(null, null, [], 0, target);
            const order = [];          // sequence of {node, kind, detail} describing what the algorithm does
            const results = [];

            // genuinely simulate the algorithm; record one event per meaningful action
            (function backtrack(node) {
                order.push({ node, kind: 'call' });
                if (node.remaining === 0) {
                    node.status = 'complete'; node.complete = true;
                    results.push(node.combo.slice());
                    order.push({ node, kind: 'valid' });
                    return;
                }
                let advanced = false;
                for (let i = node.start; i < candidates.length; i++) {
                    if (i > node.start && candidates[i] === candidates[i - 1]) {
                        order.push({ node, kind: 'skip', i, val: candidates[i] });
                        continue;
                    }
                    if (candidates[i] > node.remaining) {
                        order.push({ node, kind: 'break', i, val: candidates[i] });
                        break;
                    }
                    advanced = true;
                    const child = addNode(node.key, String(candidates[i]), node.combo.concat(candidates[i]), i + 1, node.remaining - candidates[i]);
                    order.push({ node, kind: 'include', i, val: candidates[i], child });
                    backtrack(child);
                    order.push({ node, kind: 'backtrack', i, val: candidates[i], child });
                }
                if (!advanced && node.remaining > 0 && !node.complete) {
                    node.pruned = true; node.status = 'pruned';
                }
            })(root);

            const totalResults = results.length;
            let found = 0;

            // step 0: intro (only root present)
            steps.push({
                visible: new Set([root.key]), current: root.key, path: new Set([root.key]), found: 0,
                idx: '-', cand: '-', remaining: target,
                code: [0, 1, 2], panel: `Backtracking for <b>target = ${target}</b>. Sort candidates &#8594; <code>${cset(candidates)}</code>. Each value may be used <b>once</b>; skip duplicate values on the same level so combinations stay unique. Each node holds the partial combo and the remaining target.`,
                log: `combinationSum2(${cset(candidates)}, target=${target})`
            });

            const visible = new Set([root.key]);

            function pathTo(node) {
                const path = new Set(); let cur = node;
                while (cur) { path.add(cur.key); cur = cur.parent != null ? byKey.get(cur.parent) : null; }
                return path;
            }

            order.forEach((ev, k) => {
                const node = ev.node;
                if (ev.kind === 'call') {
                    if (k === 0) return; // root call already shown by intro
                    const path = pathTo(node);
                    steps.push({
                        visible: new Set(visible), current: node.key, path, found,
                        idx: node.start, cand: '-', remaining: node.remaining,
                        code: [2, 3],
                        panel: `Enter <code>backtrack(start=${node.start}, remaining=${node.remaining})</code> with combo <code>${cset(node.combo)}</code>. Scan candidates from index ${node.start}.`,
                        log: `  backtrack(start=${node.start}, remaining=${node.remaining}) combo=${cset(node.combo)}`
                    });
                } else if (ev.kind === 'valid') {
                    found++;
                    const path = pathTo(node);
                    steps.push({
                        visible: new Set(visible), current: node.key, path, found, complete: true, confetti: true,
                        idx: node.start, cand: '-', remaining: 0,
                        code: [3, 4],
                        panel: `<code>remaining == 0</code> &#8594; <b>valid combination</b> <code>${cset(node.combo)}</code>. Record it (${found}/${totalResults}) and backtrack.`,
                        log: `    valid -> ${cset(node.combo)}  (${found}/${totalResults})`
                    });
                } else if (ev.kind === 'skip') {
                    const path = pathTo(node);
                    steps.push({
                        visible: new Set(visible), current: node.key, path, found, miss: true,
                        idx: ev.i, cand: ev.val, remaining: node.remaining,
                        code: [5, 6],
                        panel: `At index ${ev.i}, <code>${ev.val}</code> equals the value just tried on this level &#8594; <b>skip duplicate</b> to avoid repeating a combination.`,
                        log: `    skip dup cands[${ev.i}]=${ev.val} (same level)`
                    });
                } else if (ev.kind === 'break') {
                    const path = pathTo(node);
                    steps.push({
                        visible: new Set(visible), current: node.key, path, found, miss: true,
                        idx: ev.i, cand: ev.val, remaining: node.remaining,
                        code: [5, 7],
                        panel: `<code>${ev.val} &gt; remaining ${node.remaining}</code>. Since candidates are sorted, every later value is larger too &#8594; <b>break</b> (prune this branch).`,
                        log: `    break cands[${ev.i}]=${ev.val} > remaining ${node.remaining}`
                    });
                } else if (ev.kind === 'include') {
                    visible.add(ev.child.key);
                    const path = pathTo(ev.child);
                    steps.push({
                        visible: new Set(visible), current: ev.child.key, path, found,
                        idx: ev.i, cand: ev.val, remaining: ev.child.remaining,
                        code: [8, 9],
                        panel: `Include <code>${ev.val}</code> (index ${ev.i}) &#8594; combo <code>${cset(ev.child.combo)}</code>, remaining <code>${node.remaining} &minus; ${ev.val} = ${ev.child.remaining}</code>. Recurse from index ${ev.i + 1}.`,
                        log: `    include cands[${ev.i}]=${ev.val} -> combo=${cset(ev.child.combo)} remaining=${ev.child.remaining}`
                    });
                } else if (ev.kind === 'backtrack') {
                    const path = pathTo(node);
                    steps.push({
                        visible: new Set(visible), current: node.key, path, found, miss: true,
                        idx: ev.i, cand: ev.val, remaining: node.remaining,
                        code: [10],
                        panel: `Done exploring <code>${ev.val}</code>. <b>Pop</b> it and restore remaining to ${node.remaining}, then try the next candidate on this level.`,
                        log: `    pop ${ev.val} -> back to remaining ${node.remaining}`
                    });
                }
            });

            // final summary
            steps.push({
                visible: new Set(nodes.map(n => n.key)), current: null, path: new Set(), found: totalResults, complete: true, confetti: true, done: true,
                idx: '-', cand: '-', remaining: '-',
                code: [], results: results.map(r => cset(r)),
                panel: `Search complete &#8594; <b>${totalResults}</b> unique combination${totalResults !== 1 ? 's' : ''} summing to ${target}: ${results.map(r => '<code>' + cset(r) + '</code>').join(', ') || '<code>none</code>'}.`,
                log: `done  ${totalResults} unique combination(s)`
            });
        }

        // ───────── layout (tidy top-down tree, leaf-packed) ─────────
        const PADX = 56, PADY = 26, ROW = 70;
        function layout() {
            const byKey = new Map(); nodes.forEach(n => byKey.set(n.key, Object.assign({}, n, { kids: [], depth: n.combo.length })));
            byKey.forEach(n => { if (n.parent != null && byKey.has(n.parent)) byKey.get(n.parent).kids.push(n); });
            const cnt = nodes.length;
            const COL = cnt > 36 ? 60 : cnt > 18 ? 74 : 92;
            let nextX = 0;
            const root = nodes[0];
            (function place(n) {
                n.y = n.depth * ROW + PADY;
                if (n.kids.length === 0) { n.x = nextX * COL + PADX; nextX++; }
                else { n.kids.forEach(place); n.x = (n.kids[0].x + n.kids[n.kids.length - 1].x) / 2; }
            })(byKey.get(root.key));
            const width = Math.max(nextX, 1) * COL + PADX * 2 - COL;
            let maxDepth = 0; byKey.forEach(n => { if (n.depth > maxDepth) maxDepth = n.depth; });
            const height = maxDepth * ROW + PADY * 2 + 38;
            return { byKey, width, height };
        }

        // ───────── render ─────────
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const { byKey, width, height } = layout();
            contentW = width; contentH = height;
            const inner = document.getElementById('tree-inner');
            const svg = document.getElementById('edges');
            inner.style.width = width + 'px'; inner.style.height = height + 'px';
            svg.setAttribute('width', width); svg.setAttribute('height', height);

            const used = new Set();
            byKey.forEach((n, key) => {
                if (!step.visible.has(key)) return;
                const elKey = 'n:' + key; used.add(elKey);
                let el = nodeEls[elKey]; const fresh = !el;
                if (!el) {
                    el = document.createElement('div'); el.className = 'tnode';
                    const lbl = document.createElement('span'); lbl.className = 'nlbl';
                    const rem = document.createElement('span'); rem.className = 'nrem';
                    el.appendChild(lbl); el.appendChild(rem);
                    inner.appendChild(el); nodeEls[elKey] = el;
                }
                el.querySelector('.nlbl').textContent = n.combo.length ? cset(n.combo) : '[ ]';
                el.querySelector('.nrem').textContent = 'r=' + n.remaining;
                const onPath = step.path.has(key);
                const isCur = step.current === key;
                const isRoot = n.parent == null;
                el.className = 'tnode'
                    + (isRoot ? ' root' : '')
                    + (n.complete ? ' complete' : '')
                    + (n.pruned ? ' pruned' : '')
                    + (onPath && !isCur ? ' on-path' : '')
                    + (isCur ? ' current' : '')
                    + (!onPath && !n.complete && step.current ? ' dim' : '');
                el.style.left = n.x + 'px'; el.style.top = n.y + 'px';
                el.style.transform = 'translate(-50%, 0)';
                if (fresh) { el.style.opacity = '0'; Motion.pop(el); }
            });

            const usedE = new Set();
            byKey.forEach((n, key) => {
                if (n.parent == null || !step.visible.has(key)) return;
                const par = byKey.get(n.parent); if (!par || !step.visible.has(n.parent)) return;
                const eKey = 'e:' + key; usedE.add(eKey);
                let rec = edgeEls[eKey];
                if (!rec) {
                    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    lbl.setAttribute('text-anchor', 'middle');
                    svg.appendChild(ln); svg.appendChild(lbl); rec = { ln, lbl }; edgeEls[eKey] = rec;
                }
                const x1 = par.x, y1 = par.y + 38, x2 = n.x, y2 = n.y;
                const my = (y1 + y2) / 2;
                rec.ln.setAttribute('d', `M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}`);
                const on = step.path.has(key) && step.path.has(n.parent);
                rec.ln.setAttribute('class', 'edge-ln' + (on ? ' on-path' : ''));
                rec.lbl.textContent = '+' + n.edgeLabel;
                rec.lbl.setAttribute('x', (x1 + x2) / 2 + (x2 <= x1 ? -12 : 12)); rec.lbl.setAttribute('y', my - 1);
                rec.lbl.setAttribute('class', 'edge-lbl' + (on ? ' on-path' : ''));
            });

            Object.keys(nodeEls).forEach(k => { if (!used.has(k)) { nodeEls[k].remove(); delete nodeEls[k]; } });
            Object.keys(edgeEls).forEach(k => { if (!usedE.has(k)) { edgeEls[k].ln.remove(); edgeEls[k].lbl.remove(); delete edgeEls[k]; } });

            renderResFeed(step.found);

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete && !step.miss);
            mp.classList.toggle('miss', !!step.miss && !step.complete);
            highlightCode(step.code);
            renderStatePills(step);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;

            if (autoFit) fitView(); else applyView();
        }

        function renderStatePills(step) {
            const host = document.getElementById('state-pills');
            host.innerHTML =
                `<span class="pill idx">index <b>${step.idx}</b></span>` +
                `<span class="pill cand">candidate <b>${step.cand}</b></span>` +
                `<span class="pill rem">remaining <b>${step.remaining}</b></span>` +
                `<span class="pill found">found <b>${step.found}</b></span>`;
        }

        // gather all complete-combination strings discovered up to and including this step
        function renderResFeed(found) {
            const feed = document.getElementById('res-feed');
            const all = nodes.filter(n => n.complete).map(n => cset(n.combo));
            feed.innerHTML = '';
            all.forEach((r, i) => {
                const chip = document.createElement('span'); chip.className = 'res-chip' + (i < found ? ' show' : '');
                chip.textContent = r; feed.appendChild(chip);
            });
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 36; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 260) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── view: fit / zoom / pan ─────────
        function applyView() {
            const inner = document.getElementById('tree-inner'), canvas = document.getElementById('tree-canvas'), stage = document.getElementById('tree-stage');
            if (!inner || !canvas || !stage) return;
            inner.style.transform = 'scale(' + viewScale + ')';
            const sw = contentW * viewScale, sh = contentH * viewScale;
            canvas.style.width = sw + 'px'; canvas.style.height = sh + 'px';
            canvas.style.marginLeft = Math.max(0, (stage.clientWidth - sw) / 2) + 'px';
            canvas.style.marginTop = Math.max(0, (stage.clientHeight - sh) / 2) + 'px';
        }
        function fitView() {
            autoFit = true;
            const stage = document.getElementById('tree-stage');
            if (!stage || !contentW || !contentH) { viewScale = 1; applyView(); return; }
            const s = Math.min((stage.clientWidth - 18) / contentW, (stage.clientHeight - 18) / contentH, 1.3);
            viewScale = Math.max(0.12, s); applyView();
        }
        function zoomBy(f) { autoFit = false; viewScale = Math.max(0.12, Math.min(2.6, viewScale * f)); applyView(); }
        (function setupPanZoom() {
            const stage = document.getElementById('tree-stage'); if (!stage) return;
            stage.addEventListener('wheel', (e) => { e.preventDefault(); zoomBy(e.deltaY < 0 ? 1.12 : 0.9); }, { passive: false });
            let drag = false, sx = 0, sy = 0, sl = 0, st = 0;
            stage.addEventListener('mousedown', (e) => { drag = true; stage.classList.add('grabbing'); sx = e.clientX; sy = e.clientY; sl = stage.scrollLeft; st = stage.scrollTop; });
            window.addEventListener('mousemove', (e) => { if (!drag) return; stage.scrollLeft = sl - (e.clientX - sx); stage.scrollTop = st - (e.clientY - sy); });
            window.addEventListener('mouseup', () => { drag = false; stage.classList.remove('grabbing'); });
        })();
        let _rsT; window.addEventListener('resize', () => { clearTimeout(_rsT); _rsT = setTimeout(() => { if (autoFit) fitView(); else applyView(); }, 120); });

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() { Object.keys(nodeEls).forEach(k => { nodeEls[k].remove(); delete nodeEls[k]; }); Object.keys(edgeEls).forEach(k => { edgeEls[k].ln.remove(); edgeEls[k].lbl.remove(); delete edgeEls[k]; }); confettiArmed = true; }

        function loadData(cands, tgt) {
            pause();
            candidates = cands.slice();
            target = tgt;
            clearDom(); generateSteps(); renderStep(0);
        }
        function loadCustom() {
            const raw = document.getElementById('candidates-input').value.trim();
            const list = raw.split(',').map(s => parseInt(s.trim(), 10)).filter(v => Number.isFinite(v));
            const tgt = parseInt(document.getElementById('target-input').value, 10);
            if (!list.length || !Number.isFinite(tgt)) return;
            const capped = list.slice(0, 9); // keep the tree legible
            document.getElementById('candidates-input').value = capped.join(',');
            document.getElementById('target-input').value = tgt;
            loadData(capped, tgt);
        }
        function loadExample(ex) {
            const e = EXAMPLES[ex] || EXAMPLES[0];
            document.getElementById('candidates-input').value = e.candidates.join(',');
            document.getElementById('target-input').value = e.target;
            loadData(e.candidates, e.target);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('candidates-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        document.getElementById('target-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
