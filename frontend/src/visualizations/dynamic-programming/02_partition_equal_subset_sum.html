<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partition Equal Subset Sum - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 220px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: VISUALIZATION TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 110px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 54px; height: 54px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 20px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.added { background: #0d2244; border-color: var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.failed { background: #2a0d0d; border-color: var(--accent-red); color: var(--accent-red); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-red); z-index: 3;}
        .tile.past { opacity: 0.35; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }
        .tile.dp-true { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile.dp-false { background: #21262d; border-color: var(--border-main); color: var(--text-dim); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 720px; text-align: center; font-family: monospace; min-height: 85px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 12px var(--accent-green); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; font-size: 30px !important; text-shadow: 0 0 12px var(--accent-red); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="num-input" placeholder="[1,5,11,5]" value="[1,5,11,5]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,5,11,5])">Ex 1 ([1,5,11,5])</button>
        <button onclick="loadExample([1,2,5])">Ex 2 ([1,2,5])</button>
        <button onclick="loadExample([3,1,1,2,2,1])">Ex 3 ([3,1,1,2,2,1])</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Input Array:</div>
        <div class="tiles-wrapper" id="array-tiles"></div>
        
        <div class="ui-label" style="margin-top:20px;">Achievable Sums (1D DP):</div>
        <div class="tiles-wrapper" id="dp-tiles" style="margin-top:0;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Number</span>
            <span class="info-value" id="val-num" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Total Sum</span>
            <span class="info-value" id="val-total" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Target (half)</span>
            <span class="info-value" id="val-target" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Sum Index</span>
            <span class="info-value" id="val-s" style="color: var(--accent-blue);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">can partition? =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current num</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Achievable sum</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-blue)"></span> Being updated</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red); border:1px solid var(--accent-red)"></span> Impossible</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputNums = [1,5,11,5];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];

        function init() { loadExample([1,5,11,5]); }

        function parseArray(str) {
            try {
                return JSON.parse(str);
            } catch(e) {
                return null;
            }
        }

        function loadExample(newNums) {
            inputNums = newNums;
            document.getElementById('num-input').value = JSON.stringify(newNums);
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('num-input').value.trim();
            const parsed = parseArray(valStr);
            if (parsed && Array.isArray(parsed) && parsed.every(n => Number.isInteger(n) && n >= 0)) {
                loadExample(parsed);
            } else {
                alert("Please enter a valid array of non-negative integers, e.g. [1,5,11,5]");
            }
        }

        function generateSteps() {
            steps = [];
            const nums = [...inputNums];
            const n = nums.length;
            let total = nums.reduce((a,b)=>a+b, 0);
            let target = total / 2;

            // STEP 0: INIT
            steps.push({
                type: 'init',
                nums: nums,
                dp: Array(target + 1).fill(false),
                currNum: null,
                currS: null,
                panel: `Total sum = <b>${total}</b>.<br>Target = <b>${target}</b> (half).<br>We use 1D DP: dp[s] = true if sum <b>s</b> is achievable.`,
                statusText: `Checking if partition is possible (total = ${total})`,
                log: `nums = [${nums.join(', ')}]\nTotal = ${total}\nTarget = ${target}\nInitialize dp[0] = true`,
                logColor: 'var(--text-dim)'
            });

            if (total % 2 !== 0) {
                steps.push({
                    type: 'final',
                    nums: nums,
                    dp: [],
                    currNum: null,
                    currS: null,
                    panel: `Total sum <b>${total}</b> is odd → impossible to partition into two equal subsets.`,
                    statusText: `Odd total → false`,
                    log: `Total ${total} is odd → cannot partition equally.\nReturn false.`,
                    logColor: 'var(--accent-red)',
                    complete: true,
                    isTrue: false
                });
                return;
            }

            let dp = new Array(target + 1).fill(false);
            dp[0] = true;

            steps.push({
                type: 'base',
                nums: nums,
                dp: [...dp],
                currNum: null,
                currS: null,
                panel: `Initialize DP: dp[0] = <b>true</b> (empty subset sums to 0).<br>All other dp[s] = false.`,
                statusText: `DP initialized`,
                log: `dp[0] = true`,
                logColor: 'var(--accent-green)'
            });

            for (let i = 0; i < n; i++) {
                const num = nums[i];

                // Select current number
                steps.push({
                    type: 'select',
                    nums: nums,
                    dp: [...dp],
                    currNum: num,
                    currS: null,
                    panel: `Process number <b>${num}</b> (index ${i})`,
                    statusText: `Processing nums[${i}] = ${num}`,
                    log: `\n--- Processing ${num} ---`,
                    logColor: 'var(--accent-orange)'
                });

                // Backward update steps (one per relevant s)
                for (let s = target; s >= num; s--) {
                    const prev = dp[s];
                    const fromPrev = (s >= num) ? dp[s - num] : false;
                    const newVal = prev || fromPrev;

                    steps.push({
                        type: 'update',
                        nums: nums,
                        dp: [...dp],
                        currNum: num,
                        currS: s,
                        panel: `Backward update for sum <b>${s}</b>:<br>dp[${s}] = dp[${s}] <span style="color:var(--accent-blue)">||</span> dp[${s}-${num}] = <b>${prev}</b> || <b>${fromPrev}</b> = <span style="color:var(--accent-green)">${newVal}</span>`,
                        statusText: `Updating dp[${s}] for ${num}`,
                        log: `  s=${s}: dp[${s}] = ${prev} || dp[${s-num}] = ${fromPrev} → ${newVal}`,
                        logColor: 'var(--accent-blue)'
                    });

                    dp[s] = newVal;
                }
            }

            const finalResult = dp[target];

            // FINAL STEP
            steps.push({
                type: 'final',
                nums: nums,
                dp: dp,
                currNum: null,
                currS: target,
                panel: `Processing complete.<br>dp[<b>${target}</b>] = <b>${finalResult}</b><br>${finalResult ? 'A subset summing to target exists → can partition!' : 'No subset sums to target → cannot partition.'}`,
                complete: true,
                isTrue: finalResult,
                statusText: finalResult ? `Success! Partition possible.` : `No partition possible.`,
                log: `\nFinal check: dp[${target}] = ${finalResult}\n${finalResult ? 'True' : 'False'}`,
                logColor: finalResult ? 'var(--accent-green)' : 'var(--accent-red)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render array tiles (fixed, highlight current)
            const arrayContainer = document.getElementById('array-tiles');
            arrayContainer.innerHTML = '';
            step.nums.forEach((num, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.currNum === num && step.type === 'select' ? 'candidate' : (step.type === 'final' ? 'past' : 'idle')}`;
                tile.innerText = num;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                arrayContainer.appendChild(wrapper);
            });

            // Render DP tiles (0 to target)
            const dpContainer = document.getElementById('dp-tiles');
            dpContainer.innerHTML = '';
            const currentDP = step.dp || [];
            const target = currentDP.length - 1 || 0;

            for (let s = 0; s <= target; s++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${(s === step.currS && step.type === 'update') ? 'added' : (currentDP[s] === true ? 'dp-true' : 'dp-false')}`;
                tile.innerText = currentDP[s] === true ? '✓' : '✗';
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = s;
                wrapper.append(tile, idxLabel);
                dpContainer.appendChild(wrapper);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-num').innerText = step.currNum !== null ? step.currNum : '—';
            document.getElementById('val-total').innerText = step.nums.reduce((a,b)=>a+b,0);
            document.getElementById('val-target').innerText = step.dp ? step.dp.length - 1 : '—';
            document.getElementById('val-s').innerText = step.currS !== null ? step.currS : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.isTrue ? "True" : "False";
                resVal.className = step.isTrue ? 'pop' : 'pop-false';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            // Log panel
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
