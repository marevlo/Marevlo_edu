<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounded Knapsack (binary splitting) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 260px;
            font-size: 13px;
        }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 100px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 62px; height: 62px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main); text-align: center; line-height: 1.1;
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.failed { background: #2a0d0d; border-color: var(--accent-red); color: var(--accent-red); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-red); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* Pointers */
        .ptr-container { display: flex; flex-direction: column; align-items: center; position: absolute; bottom: -50px; gap: 2px; font-size: 12px; font-family: monospace; font-weight: bold; transition: all 0.3s; width: 100%; text-align: center; }
        .ptr-idx { color: var(--accent-orange); }
        .ptr-arrow { font-size: 16px; line-height: 10px; margin-bottom: 2px; color: var(--text-dim); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 40px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">capacity =</label>
        <input type="number" id="capacity-input" placeholder="7" value="7">
        <label class="ui-label" style="margin-left:8px">items =</label>
        <input type="text" id="items-input" placeholder="[[1,2,2],[2,3,1]]" value="[[1,2,2],[2,3,1]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(7,'[[1,2,2],[2,3,1]]')">Ex 1 (cap=7)</button>
        <button onclick="loadExample(5,'[[3,4,2]]')">Ex 2 (cap=5)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label" id="arr-label">Pseudo-items after binary splitting:</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Item idx</span>
            <span class="info-value" id="val-idx" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Remaining Capacity</span>
            <span class="info-value" id="val-cap" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Max Value</span>
            <span class="info-value" id="val-val" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Action</span>
            <span class="info-value" id="val-action" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Maximum value =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current pseudo-item</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Include</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red); border:1px solid var(--accent-red)"></span> Exclude</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputCapacity = 7;
        let inputItems = [[1,2,2],[2,3,1]]; // [[value, weight, copies], ...]
        let pseudoItems = []; // [{v, w}, ...] after splitting
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample(7, "[[1,2,2],[2,3,1]]"); }

        function loadExample(cap, itemsStr) {
            inputCapacity = parseInt(cap);
            inputItems = JSON.parse(itemsStr);
            document.getElementById('capacity-input').value = inputCapacity;
            document.getElementById('items-input').value = JSON.stringify(inputItems);
            generateSteps();
            reset();
        }

        function loadCustom() {
            const capVal = parseInt(document.getElementById('capacity-input').value);
            const itemsStr = document.getElementById('items-input').value.trim();
            if (!isNaN(capVal) && capVal >= 0 && itemsStr) {
                try {
                    const parsedItems = JSON.parse(itemsStr);
                    if (Array.isArray(parsedItems)) {
                        inputCapacity = capVal;
                        inputItems = parsedItems;
                        generateSteps();
                        reset();
                    } else {
                        alert("Please enter valid items array (e.g. [[1,2,2],[2,3,1]])");
                    }
                } catch(e) {
                    alert("Invalid items format.");
                }
            } else {
                alert("Please enter valid capacity and items.");
            }
        }

        function binarySplit(items) {
            let pseudo = [];
            for (let [v, w, cnt] of items) {
                let k = 1;
                while (cnt > 0) {
                    let take = Math.min(k, cnt);
                    pseudo.push({v: take * v, w: take * w});
                    cnt -= take;
                    k *= 2;
                }
            }
            return pseudo;
        }

        function generateSteps() {
            steps = [];
            pseudoItems = binarySplit(inputItems);

            function getStates(currIdx) {
                return pseudoItems.map((_, idx) => {
                    if (idx === currIdx) return 'candidate';
                    if (idx < currIdx) return 'done';
                    return 'idle';
                });
            }

            function simulate(idx, remCap, pathValue = 0, path = []) {
                const pathStr = path.length > 0 ? path.map(p => `(${p.v},${p.w})`).join('+') : '—';

                steps.push({
                    type: 'call',
                    idx: idx,
                    remCap: remCap,
                    pathValue: pathValue,
                    path: pathStr,
                    digitsStates: getStates(idx),
                    panel: `Call <code>knapsack(${idx}, ${remCap})</code><br>Current path value: <b>${pathValue}</b><br>Remaining: <b>${remCap}</b>`,
                    statusText: `idx=${idx}, remCap=${remCap}`,
                    log: `Call knapsack(${idx}, ${remCap})`,
                    logColor: 'var(--text-dim)'
                });

                if (idx === pseudoItems.length || remCap <= 0) {
                    steps.push({
                        type: 'base',
                        idx: idx,
                        remCap: remCap,
                        pathValue: pathValue,
                        path: pathStr,
                        digitsStates: getStates(idx),
                        panel: `<span style="color:var(--accent-green)">Base case → return <b>${pathValue}</b></span>`,
                        statusText: `Return ${pathValue}`,
                        log: `  Base → ${pathValue}`,
                        logColor: 'var(--accent-green)'
                    });
                    return pathValue;
                }

                const item = pseudoItems[idx];
                let maxVal = 0;

                // Exclude
                steps.push({
                    type: 'exclude',
                    idx: idx,
                    remCap: remCap,
                    pathValue: pathValue,
                    path: pathStr,
                    digitsStates: getStates(idx),
                    panel: `<span style="color:var(--accent-blue)">Exclude item <b>(${item.v},${item.w})</b></span>`,
                    statusText: `Exclude`,
                    log: `    Exclude`,
                    logColor: 'var(--accent-blue)'
                });

                const excludeVal = simulate(idx + 1, remCap, pathValue, path);

                // Include if possible
                let includeVal = 0;
                if (item.w <= remCap) {
                    steps.push({
                        type: 'include',
                        idx: idx,
                        remCap: remCap,
                        pathValue: pathValue,
                        path: pathStr,
                        digitsStates: getStates(idx),
                        panel: `<span style="color:var(--accent-green)">Include item <b>(${item.v},${item.w})</b> → newCap=${remCap - item.w}</span>`,
                        statusText: `Include`,
                        log: `    Include`,
                        logColor: 'var(--accent-green)'
                    });

                    includeVal = simulate(idx + 1, remCap - item.w, pathValue + item.v, [...path, item]);
                } else {
                    steps.push({
                        type: 'skip',
                        idx: idx,
                        remCap: remCap,
                        pathValue: pathValue,
                        path: pathStr,
                        digitsStates: getStates(idx),
                        panel: `<span style="color:var(--accent-red)">Cannot include (w=${item.w} > cap=${remCap})</span>`,
                        statusText: `Cannot include`,
                        log: `    Skip (too heavy)`,
                        logColor: 'var(--accent-red)'
                    });
                }

                maxVal = Math.max(excludeVal, includeVal);

                steps.push({
                    type: 'return',
                    idx: idx,
                    remCap: remCap,
                    pathValue: pathValue,
                    path: pathStr,
                    digitsStates: getStates(idx),
                    panel: `Max of include(${includeVal}) and exclude(${excludeVal}) = <b>${maxVal}</b>`,
                    statusText: `Return ${maxVal}`,
                    log: `  Return ${maxVal}`,
                    logColor: 'var(--accent-purple)'
                });

                return maxVal;
            }

            const finalMax = simulate(0, inputCapacity);

            steps.push({
                type: 'final',
                idx: pseudoItems.length,
                remCap: 0,
                pathValue: finalMax,
                path: '—',
                digitsStates: pseudoItems.map(() => 'winning'),
                panel: `All decisions explored.<br><b>Maximum value = ${finalMax}</b>`,
                complete: true,
                result: finalMax,
                statusText: `Done. Max value = ${finalMax}`,
                log: `\nFinal max value: ${finalMax}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            
            step.digitsStates.forEach((state, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                
                const item = pseudoItems[i];
                const tile = document.createElement('div');
                tile.className = `tile ${state}`;
                tile.innerHTML = `${item.v}<br><small>w=${item.w}</small>`;
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                
                wrapper.append(tile, idxLabel);

                if (step.idx === i) {
                    const ptrContainer = document.createElement('div');
                    ptrContainer.className = 'ptr-container';
                    ptrContainer.innerHTML = `<div class="ptr-arrow">↑</div><div class="ptr-idx">ITEM</div>`;
                    wrapper.appendChild(ptrContainer);
                }

                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-idx').innerText = step.idx !== undefined ? step.idx : '—';
            document.getElementById('val-cap').innerText = step.remCap !== undefined ? step.remCap : '—';
            document.getElementById('val-val').innerText = step.pathValue !== undefined ? step.pathValue : '—';
            document.getElementById('val-action').innerText = step.action !== undefined ? step.action : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
