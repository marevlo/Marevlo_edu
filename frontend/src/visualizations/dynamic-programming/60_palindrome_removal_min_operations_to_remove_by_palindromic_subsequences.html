<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Removal - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 320px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: STRING TILES + DP TABLE */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 17px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* DP TABLE */
        .dp-wrapper { margin-top: 20px; border: 2px solid var(--border-main); border-radius: 8px; padding: 12px; background: var(--bg-surface); width: 680px; }
        .dp-table { display: grid; gap: 4px; font-family: monospace; font-size: 13px; }
        .dp-cell {
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-main); background: #21262d; border-radius: 4px; transition: all 0.3s ease;
        }
        .dp-cell.header { background: #000000; font-weight: bold; color: var(--accent-blue); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">String =</label>
        <input type="text" id="str-input" placeholder="ababa" value="ababa">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('ababa')">Ex 1 (1)</button>
        <button onclick="loadExample('abb')">Ex 2 (2)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">String characters:</div>
        <div class="tiles-wrapper" id="string-container"></div>
        
        <div class="ui-label" style="margin-top: 30px;">DP Table (min ops for substring [i..j]):</div>
        <div class="dp-wrapper">
            <div class="dp-table" id="dp-table"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Interval [i,j]</span>
            <span class="info-value" id="val-interval" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Ends match?</span>
            <span class="info-value" id="val-match" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Split / Option</span>
            <span class="info-value" id="val-option" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">dp[i][j]</span>
            <span class="info-value" id="val-dp" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">Minimum operations =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange);"></span> Current interval</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green);"></span> Updated dp value</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let s = "ababa";
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 350];
        let n = 0;
        let dp = [];

        function generateSteps() {
            steps = [];
            n = s.length;
            if (n === 0) return;

            // dp[i][j] = min ops to remove s[i..j]
            dp = Array.from({ length: n }, () => Array(n).fill(0));

            // Base: length 0 and 1
            for (let i = 0; i < n; i++) {
                dp[i][i] = 1; // single char
            }

            steps.push({
                type: 'init',
                panel: `Base cases: dp[i][i] = 1 for all i (single character)`,
                statusText: `Base cases set`,
                log: `dp[i][i]=1`,
                logColor: 'var(--accent-blue)'
            });

            for (let len = 2; len <= n; len++) {
                for (let i = 0; i <= n - len; i++) {
                    const j = i + len - 1;
                    let minOps = Infinity;

                    // Option 1: remove s[i] alone
                    if (i + 1 <= j) {
                        minOps = Math.min(minOps, 1 + dp[i + 1][j]);
                    } else {
                        minOps = 1;
                    }

                    // If ends match
                    if (s[i] === s[j]) {
                        if (i + 1 > j - 1) {
                            minOps = Math.min(minOps, 1); // length 2 equal chars
                        } else {
                            minOps = Math.min(minOps, dp[i + 1][j - 1]);
                        }
                    }

                    // All splits
                    for (let k = i; k < j; k++) {
                        minOps = Math.min(minOps, dp[i][k] + dp[k + 1][j]);
                    }

                    dp[i][j] = minOps;

                    steps.push({
                        type: 'fill',
                        i: i,
                        j: j,
                        len: len,
                        dp: JSON.parse(JSON.stringify(dp)),
                        panel: `Interval [${i}..${j}] (len=${len})<br>Ends ${s[i]}==${s[j]} ? ${s[i]===s[j]}<br>Min ops = <b>${minOps}</b>`,
                        statusText: `dp[${i}][${j}] = ${minOps}`,
                        log: `dp[${i}][${j}] = ${minOps}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            steps.push({
                type: 'final',
                complete: true,
                result: dp[0][n-1],
                panel: `DP filled.<br><b>Minimum operations = ${dp[0][n-1]}</b>`,
                statusText: `Done. Min ops = ${dp[0][n-1]}`,
                log: `\nFinal min ops: ${dp[0][n-1]}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // String tiles
            const stringContainer = document.getElementById('string-container');
            stringContainer.innerHTML = '';
            for (let k = 0; k < s.length; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.i !== undefined && k >= step.i && k <= step.j ? 'candidate' : 'done'}`;
                tile.innerText = s[k];
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${k}]`;
                wrapper.append(tile, idxLabel);
                stringContainer.appendChild(wrapper);
            }

            // DP table
            const dpTable = document.getElementById('dp-table');
            dpTable.style.gridTemplateColumns = `repeat(${n + 1}, 48px)`;
            dpTable.innerHTML = '';

            // Header
            const emptyHeader = document.createElement('div');
            emptyHeader.className = 'dp-cell header';
            emptyHeader.innerText = '';
            dpTable.appendChild(emptyHeader);
            for (let c = 0; c < n; c++) {
                const h = document.createElement('div');
                h.className = 'dp-cell header';
                h.innerText = c;
                dpTable.appendChild(h);
            }

            for (let r = 0; r < n; r++) {
                const rowHeader = document.createElement('div');
                rowHeader.className = 'dp-cell header';
                rowHeader.innerText = r;
                dpTable.appendChild(rowHeader);

                for (let c = 0; c < n; c++) {
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${r === step.i && c === step.j ? 'candidate' : ''}`;
                    if (r > c) cell.innerText = '—';
                    else {
                        const val = step.dp && step.dp[r] && step.dp[r][c] !== undefined ? step.dp[r][c] : '—';
                        cell.innerText = val;
                    }
                    dpTable.appendChild(cell);
                }
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-interval').innerText = step.i !== undefined && step.j !== undefined ? `[${step.i}..${step.j}]` : '—';
            document.getElementById('val-match').innerText = step.i !== undefined && step.j !== undefined && s[step.i] === s[step.j] ? 'Yes' : 'No';
            document.getElementById('val-option').innerText = step.len !== undefined ? `len=${step.len}` : '—';
            document.getElementById('val-dp').innerText = step.dp && step.i !== undefined && step.j !== undefined && step.dp[step.i] && step.dp[step.i][step.j] !== undefined ? step.dp[step.i][step.j] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        function loadCustom() {
            const str = document.getElementById('str-input').value.trim();
            if (str.length > 0) {
                s = str;
                generateSteps();
                reset();
            }
        }

        function loadExample(str) {
            s = str;
            document.getElementById('str-input').value = str;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
