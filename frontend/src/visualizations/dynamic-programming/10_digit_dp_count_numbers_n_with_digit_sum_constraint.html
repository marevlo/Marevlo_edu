<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit DP: Count Numbers ≤ N with Digit Sum ≤ S - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="number"], input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 120px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 20px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.failed { background: #2a0d0d; border-color: var(--accent-red); color: var(--accent-red); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-red); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* Pointers */
        .ptr-container { display: flex; flex-direction: column; align-items: center; position: absolute; bottom: -50px; gap: 2px; font-size: 12px; font-family: monospace; font-weight: bold; transition: all 0.3s; width: 100%; text-align: center; }
        .ptr-pos { color: var(--accent-orange); }
        .ptr-arrow { font-size: 16px; line-height: 10px; margin-bottom: 2px; color: var(--text-dim); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 40px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">N =</label>
        <input type="number" id="n-input" placeholder="20" value="20">
        <label class="ui-label" style="margin-left:8px">S =</label>
        <input type="number" id="s-input" placeholder="5" value="5">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(20,5)">Ex 1 (N=20, S=5)</button>
        <button onclick="loadExample(100,10)">Ex 2 (N=100, S=10)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label" id="arr-label">Digits of N (MSB → LSB):</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Position (pos)</span>
            <span class="info-value" id="val-pos" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Sum</span>
            <span class="info-value" id="val-sum" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Tight</span>
            <span class="info-value" id="val-tight" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Digit Limit</span>
            <span class="info-value" id="val-limit" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Digit</span>
            <span class="info-value" id="val-digit" style="color: var(--accent-orange);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Count (≤ N, digit sum ≤ S) =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current Position</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Valid Path</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red); border:1px solid var(--accent-red)"></span> Pruned / Invalid</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputN = 20;
        let inputS = 5;
        let digitsArr = [];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample(20, 5); }

        function loadExample(nVal, sVal) {
            inputN = parseInt(nVal);
            inputS = parseInt(sVal);
            document.getElementById('n-input').value = inputN;
            document.getElementById('s-input').value = inputS;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const nVal = parseInt(document.getElementById('n-input').value);
            const sVal = parseInt(document.getElementById('s-input').value);
            if (!isNaN(nVal) && !isNaN(sVal) && nVal >= 0 && sVal >= 0) {
                loadExample(nVal, sVal);
            } else {
                alert("Please enter valid non-negative integers for N and S.");
            }
        }

        function generateSteps() {
            steps = [];
            const nStr = inputN.toString();
            digitsArr = nStr.split('');
            const d = digitsArr.length;

            function getStates(pos, highlightIdx = -1) {
                return digitsArr.map((_, idx) => {
                    if (idx === highlightIdx) return 'candidate';
                    if (pos > idx) return 'done';
                    return 'idle';
                });
            }

            // Recursive digit DP simulation (exactly matches the recursive calls in JSON examples)
            function simulate(pos, currSum, tight, path = "") {
                // STEP: Enter recursive call
                const limit = tight ? parseInt(digitsArr[pos] || '0') : 9;
                const tightStr = tight ? "true" : "false";

                steps.push({
                    type: 'call',
                    pos: pos,
                    currSum: currSum,
                    tight: tight,
                    digit: '—',
                    limit: limit,
                    digitsStates: getStates(pos, pos),
                    panel: `Calling <code>f(${pos}, ${currSum}, ${tightStr})</code><br>Building prefix: <b>${path}</b>`,
                    statusText: `pos=${pos}, sum=${currSum}, tight=${tightStr}`,
                    log: `Call f(${pos}, ${currSum}, ${tightStr})`,
                    logColor: 'var(--text-dim)'
                });

                if (pos === d) {
                    const valid = currSum <= inputS ? 1 : 0;
                    steps.push({
                        type: 'base',
                        pos: pos,
                        currSum: currSum,
                        tight: tight,
                        digit: '—',
                        limit: limit,
                        digitsStates: getStates(pos),
                        panel: `<span style="color:${valid ? 'var(--accent-green)' : 'var(--accent-red)'}">Base case: pos == d<br>${valid ? 'Valid number (sum ≤ S)' : 'Invalid (sum > S)'}</span><br>Return <b>${valid}</b>`,
                        statusText: `Return ${valid}`,
                        log: `  pos == d → return ${valid}`,
                        logColor: valid ? 'var(--accent-green)' : 'var(--accent-red)'
                    });
                    return valid;
                }

                let total = 0;

                // STEP: Determine limit and iterate digits
                steps.push({
                    type: 'decide',
                    pos: pos,
                    currSum: currSum,
                    tight: tight,
                    digit: '—',
                    limit: limit,
                    digitsStates: getStates(pos, pos),
                    panel: `At position <b>${pos}</b> (digit limit = ${limit})<br>Iterate possible digits 0 → ${limit}`,
                    statusText: `Trying digits 0..${limit}`,
                    log: `  limit = ${limit} (tight=${tightStr})`,
                    logColor: 'var(--accent-blue)'
                });

                for (let dig = 0; dig <= limit; dig++) {
                    const newSum = currSum + dig;
                    if (newSum > inputS) {
                        steps.push({
                            type: 'prune',
                            pos: pos,
                            currSum: currSum,
                            tight: tight,
                            digit: dig,
                            limit: limit,
                            digitsStates: getStates(pos),
                            panel: `<span style="color:var(--accent-red)">Pruned: new_sum = ${newSum} > S = ${inputS}</span>`,
                            statusText: `Prune digit ${dig}`,
                            log: `    digit=${dig} → sum=${newSum} > ${inputS} → prune`,
                            logColor: 'var(--accent-red)'
                        });
                        break; // since digits are increasing
                    }

                    const newTight = tight && (dig === limit);
                    const newPath = path + dig;

                    steps.push({
                        type: 'choose',
                        pos: pos,
                        currSum: currSum,
                        tight: tight,
                        digit: dig,
                        limit: limit,
                        digitsStates: getStates(pos, pos),
                        panel: `Choose digit <b>${dig}</b> at pos ${pos}<br>New sum = ${newSum}, new tight = ${newTight}`,
                        statusText: `Trying digit ${dig}`,
                        log: `    digit=${dig} → new_sum=${newSum}, new_tight=${newTight}`,
                        logColor: 'var(--accent-orange)'
                    });

                    const sub = simulate(pos + 1, newSum, newTight, newPath);
                    total += sub;
                }

                steps.push({
                    type: 'return',
                    pos: pos,
                    currSum: currSum,
                    tight: tight,
                    digit: '—',
                    limit: limit,
                    digitsStates: getStates(pos),
                    panel: `All digits tried at pos ${pos}<br><span style="color:var(--accent-green)">Return total = <b>${total}</b></span>`,
                    statusText: `Return ${total}`,
                    log: `  Return ${total}`,
                    logColor: 'var(--accent-green)'
                });

                return total;
            }

            // Start recursion
            const finalCount = simulate(0, 0, true);

            // FINAL RESULT STEP
            steps.push({
                type: 'final',
                pos: d,
                currSum: 0,
                tight: false,
                digit: '—',
                limit: 0,
                digitsStates: digitsArr.map(() => 'winning'),
                panel: `All recursive calls completed.<br><b>Final count = ${finalCount}</b><br>(Numbers ≤ ${inputN} with digit sum ≤ ${inputS})`,
                complete: true,
                result: finalCount,
                statusText: `Done. Count = ${finalCount}`,
                log: `\nFinal Result: ${finalCount}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            
            step.digitsStates.forEach((state, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                
                const tile = document.createElement('div');
                tile.className = `tile ${state}`;
                tile.innerText = digitsArr[i];
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                
                wrapper.append(tile, idxLabel);

                // Position pointer
                if ((step.type === 'call' || step.type === 'decide' || step.type === 'choose') && step.pos === i) {
                    const ptrContainer = document.createElement('div');
                    ptrContainer.className = 'ptr-container';
                    ptrContainer.innerHTML = `<div class="ptr-arrow">↑</div><div class="ptr-pos">POS</div>`;
                    wrapper.appendChild(ptrContainer);
                }

                container.appendChild(wrapper);
            });

            if (step.pos !== undefined && step.pos < digitsArr.length) {
                container.style.marginBottom = "45px";
            } else {
                container.style.marginBottom = "0px";
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-pos').innerText = step.pos !== undefined ? step.pos : '—';
            document.getElementById('val-sum').innerText = step.currSum !== undefined ? step.currSum : '—';
            document.getElementById('val-tight').innerText = step.tight !== undefined ? (step.tight ? 'YES' : 'NO') : '—';
            document.getElementById('val-limit').innerText = step.limit !== undefined ? step.limit : '—';
            document.getElementById('val-digit').innerText = step.digit !== undefined && step.digit !== '—' ? step.digit : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            // Log accumulation
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
