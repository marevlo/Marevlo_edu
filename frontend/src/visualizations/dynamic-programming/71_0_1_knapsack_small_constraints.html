<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0/1 Knapsack (small constraints) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 280px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        /* ARRAY TILES */
        .array-container {
            display: flex;
            gap: 8px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .array-tile {
            min-width: 58px;
            height: 58px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--text-main);
            transition: all 0.3s ease;
            border-radius: 8px;
            text-align: center;
        }
        .array-tile.current { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); }

        /* DP GRID */
        .dp-container { 
            margin-top: 20px;
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
            width: 920px;
            overflow-x: auto;
        }
        .dp-grid {
            display: grid;
            gap: 4px;
            font-family: monospace;
        }
        .dp-cell {
            width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); }
        .dp-cell.header { background: var(--bg-surface); color: var(--text-dim); font-size: 11px; height: 24px; }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 110px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">weights =</label>
        <input type="text" id="weights-input" value="1,3,4,5" style="width:280px">
        <label class="ui-label">values =</label>
        <input type="text" id="values-input" value="1,4,5,7" style="width:280px">
        <label class="ui-label">capacity =</label>
        <input type="number" id="capacity-input" value="7" min="1" style="width:80px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,3,4,5],[1,4,5,7],7)">Ex 1 → 9</button>
        <button onclick="loadExample([2,1,3],[10,20,30],4)">Ex 2 → 50</button>
        <button onclick="loadExample([1,2,3],[6,10,12],5)">Ex 3 → 22</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Items tiles (weight / value) — orange = current item</div>
        <div id="array-container" class="array-container"></div>

        <div class="ui-label" style="margin-top:25px;">2D DP Table — dp[i][w] = max value with first i items & capacity w</div>
        <div class="dp-container" id="dp-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current item i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current capacity w</span>
            <span class="info-value" id="val-w" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Take option</span>
            <span class="info-value" id="val-take" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Skip option</span>
            <span class="info-value" id="val-skip" style="color: var(--accent-blue);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Max value =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current item</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentWeights = [1,3,4,5];
        let currentValues = [1,4,5,7];
        let currentCapacity = 7;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];
        let dp = [];
        let n = 0;
        let W = 0;

        function init() {
            loadExample([1,3,4,5], [1,4,5,7], 7);
        }

        function loadExample(weights, values, capacity) {
            currentWeights = weights;
            currentValues = values;
            currentCapacity = capacity;
            document.getElementById('weights-input').value = weights.join(',');
            document.getElementById('values-input').value = values.join(',');
            document.getElementById('capacity-input').value = capacity;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const wStr = document.getElementById('weights-input').value.trim();
            const vStr = document.getElementById('values-input').value.trim();
            const cap = parseInt(document.getElementById('capacity-input').value);
            if (!wStr || !vStr || isNaN(cap)) {
                alert("Please enter valid weights, values, and capacity");
                return;
            }
            const weights = wStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const values = vStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (weights.length !== values.length) {
                alert("Weights and values must have same length");
                return;
            }
            loadExample(weights, values, cap);
        }

        function generateSteps() {
            steps = [];
            const weights = currentWeights;
            const values = currentValues;
            n = weights.length;
            W = currentCapacity;

            // Initialize dp[i][w]
            dp = Array.from({length: n + 1}, () => Array(W + 1).fill(0));

            steps.push({
                type: 'init',
                i: 0,
                w: 0,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `0/1 Knapsack — Tabulation DP<br>weights = [${weights.join(', ')}]<br>values = [${values.join(', ')}]<br>capacity W = ${W}`,
                statusText: `Initialize dp table (all 0)`,
                log: `dp[0..${n}][0..${W}] = 0`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 1; i <= n; i++) {
                const wt = weights[i - 1];
                const val = values[i - 1];
                steps.push({
                    type: 'start-item',
                    i: i,
                    w: -1,
                    dpSnapshot: JSON.parse(JSON.stringify(dp)),
                    panel: `Processing item ${i} (weight=${wt}, value=${val})`,
                    statusText: `item ${i}`,
                    log: `\n--- Item ${i} (w=${wt}, v=${val}) ---`,
                    logColor: 'var(--accent-orange)'
                });

                for (let w = 0; w <= W; w++) {
                    const before = dp[i][w];
                    let newVal;
                    if (w < wt) {
                        newVal = dp[i - 1][w];
                    } else {
                        newVal = Math.max(dp[i - 1][w], dp[i - 1][w - wt] + val);
                    }
                    dp[i][w] = newVal;

                    steps.push({
                        type: 'update-cell',
                        i: i,
                        w: w,
                        dpSnapshot: JSON.parse(JSON.stringify(dp)),
                        panel: `i=${i}, w=${w}<br>weight=${wt} ${w >= wt ? '≤' : '>'} w<br>skip = dp[${i-1}][${w}] = ${dp[i-1][w]}<br>include = ${w >= wt ? val + ' + dp[' + (i-1) + '][' + (w-wt) + '] = ' + (dp[i-1][w-wt] + val) : 'not possible'}<br>max = ${newVal}`,
                        statusText: `i=${i}, w=${w}`,
                        log: `i=${i}, w=${w}: max(${before}, ${newVal}) → ${newVal}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            const result = dp[n][W];
            steps.push({
                type: 'final',
                i: n,
                w: W,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `All items processed.<br>Maximum value = <span style="color:var(--accent-green)"><b>${result}</b></span>`,
                statusText: `Final answer = ${result}`,
                log: `\nFinal dp[${n}][${W}] = ${result}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: result
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render array tiles
            const arrayContainer = document.getElementById('array-container');
            arrayContainer.innerHTML = '';
            const weights = currentWeights;
            const values = currentValues;
            for (let i = 0; i < n; i++) {
                const tile = document.createElement('div');
                tile.className = `array-tile ${step.i === i + 1 ? 'current' : ''}`;
                tile.innerHTML = `<div>${weights[i]}</div><div style="font-size:10px;color:var(--text-dim)">${values[i]}</div>`;
                arrayContainer.appendChild(tile);
            }

            // Render DP grid
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-grid" style="grid-template-columns: repeat(${W + 1}, 58px);"></div>`;
            const grid = dpContainer.querySelector('.dp-grid');

            // Header row: capacities
            const headerRow = document.createElement('div');
            headerRow.style.display = 'grid';
            headerRow.style.gridTemplateColumns = `repeat(${W + 1}, 58px)`;
            headerRow.style.gap = '4px';
            const emptyHeader = document.createElement('div');
            emptyHeader.className = 'dp-cell header';
            headerRow.appendChild(emptyHeader);
            for (let w = 0; w <= W; w++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.textContent = w;
                headerRow.appendChild(cell);
            }
            grid.appendChild(headerRow);

            // DP rows
            const currentDP = step.dpSnapshot || dp;
            for (let i = 0; i <= n; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.style.display = 'grid';
                rowDiv.style.gridTemplateColumns = `repeat(${W + 1}, 58px)`;
                rowDiv.style.gap = '4px';
                // i header
                const iHeader = document.createElement('div');
                iHeader.className = 'dp-cell header';
                iHeader.textContent = i;
                rowDiv.appendChild(iHeader);
                for (let w = 0; w <= W; w++) {
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${step.i === i && step.w === w ? 'current' : ''}`;
                    cell.innerHTML = `<div>${currentDP[i][w]}</div>`;
                    rowDiv.appendChild(cell);
                }
                grid.appendChild(rowDiv);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-w').innerText = step.w !== null ? step.w : '—';
            document.getElementById('val-take').innerText = step.w !== null && step.i !== null ? (currentWeights[step.i - 1] <= step.w ? currentValues[step.i - 1] + currentDP[step.i - 1][step.w - currentWeights[step.i - 1]] : '-') : '—';
            document.getElementById('val-skip').innerText = step.w !== null && step.i !== null ? currentDP[step.i - 1][step.w] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
