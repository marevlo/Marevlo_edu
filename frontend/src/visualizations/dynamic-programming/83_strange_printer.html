<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strange Printer - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 280px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        /* STRING TILES */
        .string-container {
            display: flex;
            gap: 8px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .string-tile {
            min-width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--text-main);
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        .string-tile.current { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); }

        /* DP GRID */
        .dp-container { 
            margin-top: 20px;
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
            width: 920px;
            overflow-x: auto;
        }
        .dp-grid {
            display: grid;
            gap: 4px;
            font-family: monospace;
        }
        .dp-cell {
            width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); }
        .dp-cell.header { background: var(--bg-surface); color: var(--text-dim); font-size: 11px; height: 24px; }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 110px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">target string =</label>
        <input type="text" id="s-input" value="aaabbb" style="width:280px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('aaabbb')">Ex 1 → 2</button>
        <button onclick="loadExample('aba')">Ex 2 → 2</button>
        <button onclick="loadExample('abc')">Ex 3 → 3</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">String tiles (orange = current interval [i,j])</div>
        <div id="string-container" class="string-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP Table — dp[i][j] = min turns for substring s[i..j]</div>
        <div class="dp-container" id="dp-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current i (start)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current j (end)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current k (split)</span>
            <span class="info-value" id="val-k" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current min cost</span>
            <span class="info-value" id="val-cost" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Minimum turns =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current interval [i,j]</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentS = "aaabbb";
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];
        let dp = [];
        let n = 0;

        function init() {
            loadExample("aaabbb");
        }

        function loadExample(str) {
            currentS = str;
            document.getElementById('s-input').value = str;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const str = document.getElementById('s-input').value.trim();
            if (str.length === 0) {
                alert("Please enter a non-empty string");
                return;
            }
            loadExample(str);
        }

        function generateSteps() {
            steps = [];
            const s = currentS;
            n = s.length;
            if (n === 0) return;

            const INF = 999999;
            dp = Array.from({length: n}, () => Array(n).fill(INF));

            // Base cases: length 1
            for (let i = 0; i < n; i++) {
                dp[i][i] = 1;
            }

            steps.push({
                type: 'init',
                i: -1,
                j: -1,
                k: -1,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `Strange Printer — Bottom-Up Interval DP<br>s = "${s}" (n=${n})`,
                statusText: `Base cases: dp[i][i] = 1 for all i`,
                log: `Initialized dp[i][i] = 1`,
                logColor: 'var(--text-dim)'
            });

            // Fill by increasing length
            for (let len = 2; len <= n; len++) {
                steps.push({
                    type: 'start-length',
                    i: -1,
                    j: -1,
                    k: -1,
                    dpSnapshot: JSON.parse(JSON.stringify(dp)),
                    panel: `Processing length = ${len}`,
                    statusText: `Length ${len}`,
                    log: `\n--- Length ${len} ---`,
                    logColor: 'var(--accent-purple)'
                });

                for (let i = 0; i <= n - len; i++) {
                    const j = i + len - 1;
                    let minCost = INF;

                    // Greedy case if endpoints match
                    if (s[i] === s[j]) {
                        minCost = dp[i][j - 1];
                    }

                    steps.push({
                        type: 'start-interval',
                        i: i,
                        j: j,
                        k: -1,
                        dpSnapshot: JSON.parse(JSON.stringify(dp)),
                        panel: `Computing dp[${i}][${j}] for "${s.substring(i, j+1)}"`,
                        statusText: `[${i},${j}]`,
                        log: `Interval [${i},${j}]`,
                        logColor: 'var(--accent-orange)'
                    });

                    // Try all splits
                    for (let k = i; k < j; k++) {
                        const candidate = dp[i][k] + dp[k + 1][j];
                        if (candidate < minCost) {
                            minCost = candidate;
                        }

                        steps.push({
                            type: 'try-split',
                            i: i,
                            j: j,
                            k: k,
                            dpSnapshot: JSON.parse(JSON.stringify(dp)),
                            panel: `Try split at k=${k}: dp[${i}][${k}] + dp[${k+1}][${j}] = ${dp[i][k]} + ${dp[k+1][j]} = ${candidate}`,
                            statusText: `k=${k}`,
                            log: `k=${k}: ${candidate}`,
                            logColor: 'var(--accent-green)'
                        });
                    }

                    dp[i][j] = minCost;

                    steps.push({
                        type: 'update-dp',
                        i: i,
                        j: j,
                        k: -1,
                        dpSnapshot: JSON.parse(JSON.stringify(dp)),
                        panel: `dp[${i}][${j}] = ${minCost}`,
                        statusText: `dp[${i}][${j}] = ${minCost}`,
                        log: `dp[${i}][${j}] ← ${minCost}`,
                        logColor: 'var(--accent-blue)'
                    });
                }
            }

            const result = dp[0][n-1];
            steps.push({
                type: 'final',
                i: 0,
                j: n-1,
                k: -1,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `DP table complete.<br>Minimum turns = <span style="color:var(--accent-green)"><b>${result}</b></span>`,
                statusText: `Final answer = ${result}`,
                log: `\nFinal dp[0][${n-1}] = ${result}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: result
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render string tiles
            const stringContainer = document.getElementById('string-container');
            stringContainer.innerHTML = '';
            const s = currentS;
            for (let p = 0; p < n; p++) {
                const tile = document.createElement('div');
                tile.className = `string-tile ${(step.i !== -1 && p >= step.i && p <= step.j) ? 'current' : ''}`;
                tile.innerText = s[p];
                stringContainer.appendChild(tile);
            }

            // Render DP grid
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-grid" style="grid-template-columns: repeat(${n + 1}, 58px);"></div>`;
            const grid = dpContainer.querySelector('.dp-grid');

            // Header row
            const headerRow = document.createElement('div');
            headerRow.style.display = 'grid';
            headerRow.style.gridTemplateColumns = `repeat(${n + 1}, 58px)`;
            headerRow.style.gap = '4px';
            const emptyH = document.createElement('div');
            emptyH.className = 'dp-cell header';
            headerRow.appendChild(emptyH);
            for (let j = 0; j < n; j++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.textContent = j;
                headerRow.appendChild(cell);
            }
            grid.appendChild(headerRow);

            // DP rows
            const currentDP = step.dpSnapshot || dp;
            for (let i = 0; i < n; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.style.display = 'grid';
                rowDiv.style.gridTemplateColumns = `repeat(${n + 1}, 58px)`;
                rowDiv.style.gap = '4px';
                // i header
                const iHeader = document.createElement('div');
                iHeader.className = 'dp-cell header';
                iHeader.textContent = i;
                rowDiv.appendChild(iHeader);
                for (let j = 0; j < n; j++) {
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${step.i === i && step.j === j ? 'current' : ''}`;
                    const val = (i > j) ? '—' : (currentDP[i][j] >= 999999 ? '∞' : currentDP[i][j]);
                    cell.innerHTML = `<div>${val}</div>`;
                    rowDiv.appendChild(cell);
                }
                grid.appendChild(rowDiv);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-i').innerText = step.i !== -1 ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== -1 ? step.j : '—';
            document.getElementById('val-k').innerText = step.k !== -1 ? step.k : '—';
            document.getElementById('val-cost').innerText = step.k !== -1 ? (currentDP[step.i][step.k] + currentDP[step.k+1][step.j]) : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
