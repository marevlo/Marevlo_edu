<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decode Ways (digits to letters) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 240px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: VISUAL TILES - Digits */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 54px; height: 54px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* DP TABLE */
        .dp-wrapper { margin-top: 20px; border: 2px solid var(--border-main); border-radius: 8px; padding: 12px; background: var(--bg-surface); width: 680px; }
        .dp-table { display: grid; gap: 4px; font-family: monospace; font-size: 13px; grid-template-columns: repeat(auto-fit, 48px); }
        .dp-cell {
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-main); background: #21262d; border-radius: 4px; transition: all 0.3s ease;
        }
        .dp-cell.header { background: #000000; font-weight: bold; color: var(--accent-blue); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">digits =</label>
        <input type="text" id="arr-input" placeholder="12" value="12">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('12')">Ex 1 (12)</button>
        <button onclick="loadExample('226')">Ex 2 (226)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label" id="arr-label">Digits string:</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
        
        <div class="ui-label" style="margin-top: 30px;">DP ways[] (number of decodings for prefix):</div>
        <div class="dp-wrapper">
            <div class="dp-table" id="dp-table"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current index i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Single digit</span>
            <span class="info-value" id="val-single" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Two digits</span>
            <span class="info-value" id="val-two" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">dp[i]</span>
            <span class="info-value" id="val-dp" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">Total decode ways =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:2px solid var(--accent-orange)"></span> Current position</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:2px solid var(--accent-green)"></span> Ways accumulated</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border:2px solid var(--accent-blue)"></span> Single digit</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple); border:2px solid var(--accent-purple)"></span> Two digits</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputS = "12";
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 350];

        function init() { loadExample("12"); }

        function loadExample(example) {
            inputS = example;
            document.getElementById('arr-input').value = example;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('arr-input').value.trim();
            if (val) {
                inputS = val;
                generateSteps();
                reset();
            } else {
                alert("Please enter a valid digit string.");
            }
        }

        function generateSteps() {
            steps = [];
            const s = inputS;
            const n = s.length;
            if (n === 0) return;

            let dp = new Array(n + 1).fill(0);
            dp[0] = 1;

            steps.push({
                type: 'init',
                i: 0,
                dp: [...dp],
                panel: `Initialize dp[0] = 1 (empty string has 1 way)`,
                statusText: `dp[0] = 1`,
                log: `dp[0] = 1`,
                logColor: 'var(--text-dim)'
            });

            // i=1
            if (s[0] !== '0') {
                dp[1] = 1;
            }
            steps.push({
                type: 'i1',
                i: 1,
                dp: [...dp],
                panel: `i=1, s[0]='${s[0]}'${s[0] !== '0' ? ' valid single → dp[1] = 1' : ' invalid (0) → dp[1] = 0'}`,
                statusText: `dp[1] = ${dp[1]}`,
                log: `dp[1] = ${dp[1]}`,
                logColor: 'var(--accent-blue)'
            });

            for (let i = 2; i <= n; i++) {
                let ways = 0;
                const singleChar = s[i - 1];
                if (singleChar !== '0') {
                    ways += dp[i - 1];
                }

                const twoDigitStr = s.substring(i - 2, i);
                const twoDigit = parseInt(twoDigitStr);
                if (twoDigit >= 10 && twoDigit <= 26) {
                    ways += dp[i - 2];
                }

                dp[i] = ways;

                steps.push({
                    type: 'compute',
                    i: i,
                    dp: [...dp],
                    single: singleChar !== '0',
                    two: twoDigit >= 10 && twoDigit <= 26,
                    panel: `i=${i}, s[${i-2}:${i}]='${twoDigitStr}'<br>Single: ${singleChar} → ${singleChar !== '0' ? 'add dp[i-1]' : 'invalid'}<br>Two: ${twoDigit} → ${twoDigit >= 10 && twoDigit <= 26 ? 'add dp[i-2]' : 'invalid'}<br>dp[${i}] = <b>${ways}</b>`,
                    statusText: `dp[${i}] = ${ways}`,
                    log: `i=${i}: dp[${i}] = ${ways}`,
                    logColor: 'var(--accent-purple)'
                });
            }

            steps.push({
                type: 'final',
                i: n + 1,
                dp: [...dp],
                complete: true,
                result: dp[n],
                panel: `All positions processed.<br><b>Total decode ways = ${dp[n]}</b>`,
                statusText: `Done. Ways = ${dp[n]}`,
                log: `\nFinal number of decode ways: ${dp[n]}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Tiles for digits
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            for (let k = 0; k < inputS.length; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${k < step.i - 1 ? 'done' : (k === step.i - 1 ? 'candidate' : 'idle')}`;
                tile.innerText = inputS[k];
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${k}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            }

            // DP table
            const table = document.getElementById('dp-table');
            table.innerHTML = '';
            table.style.gridTemplateColumns = `repeat(${inputS.length + 1}, 48px)`;

            // Header
            const emptyHeader = document.createElement('div');
            emptyHeader.className = 'dp-cell header';
            emptyHeader.innerText = '';
            table.appendChild(emptyHeader);
            for (let i = 0; i <= inputS.length; i++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.innerText = i;
                table.appendChild(cell);
            }

            // DP row
            const rowHeader = document.createElement('div');
            rowHeader.className = 'dp-cell header';
            rowHeader.innerText = 'dp';
            table.appendChild(rowHeader);
            for (let i = 0; i <= inputS.length; i++) {
                const cell = document.createElement('div');
                cell.className = `dp-cell ${i === step.i ? 'candidate' : ''}`;
                cell.innerText = step.dp[i] !== undefined ? step.dp[i] : '—';
                table.appendChild(cell);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-i').innerText = step.i !== undefined ? step.i : '—';
            document.getElementById('val-single').innerText = step.single !== undefined ? (step.single ? 'valid' : 'invalid') : '—';
            document.getElementById('val-two').innerText = step.two !== undefined ? (step.two ? 'valid' : 'invalid') : '—';
            document.getElementById('val-dp').innerText = step.dp && step.dp[step.i] !== undefined ? step.dp[step.i] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
