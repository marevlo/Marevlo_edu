<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Ways to Tile 2&times;N (Domino Tiling) - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* answer / final                 */
            --accent-blue:   #06b6d4;    /* dep dp[i-1] / chrome           */
            --accent-green:  #22c55e;    /* base case / vertical domino    */
            --accent-red:    #f43f5e;    /* unused                         */
            --accent-purple: #a855f7;    /* current cell / dep dp[i-2]     */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 90px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="number"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(245,165,36,0.4); background: rgba(245,165,36,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-orange); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .array-stage { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; padding: 26px 22px 22px; display: flex; flex-direction: column; align-items: center; gap: 22px; }
        .array-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .array-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        /* tiling-diagram hero: the 2xN board with painted dominoes */
        .tile-hero { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .tile-board { display: flex; gap: 4px; padding: 8px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); }
        .tile-col { display: flex; flex-direction: column; gap: 4px; }
        .tile-cell {
            width: 34px; height: 34px; border-radius: 6px;
            border: 1.5px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.03);
            transition: background 0.35s, border-color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .tile-cell.vert { background: linear-gradient(180deg, rgba(34,197,94,0.85), rgba(22,163,74,0.85)); border-color: var(--accent-green); box-shadow: 0 0 12px rgba(34,197,94,0.4); }
        .tile-cell.horiz { background: linear-gradient(90deg, rgba(168,85,247,0.85), rgba(147,51,234,0.85)); border-color: var(--accent-purple); box-shadow: 0 0 12px rgba(168,85,247,0.4); }
        .tile-cell.add { background: linear-gradient(135deg, rgba(245,165,36,0.85), rgba(217,119,6,0.85)); border-color: var(--accent-orange); box-shadow: 0 0 12px rgba(245,165,36,0.45); }
        .tile-caption { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
        .tile-caption b { color: var(--text-main); }

        /* The signature 1D-DP idiom: dp row + SVG dependency arrows */
        .dp-board { position: relative; display: inline-flex; flex-direction: column; gap: 0; }
        .row-label { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 26px; text-align: center; }
        .cell-row { display: flex; gap: 12px; }
        .col { display: flex; flex-direction: column; align-items: center; }

        .cell {
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-family: var(--mono); font-weight: 800; font-size: 18px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            width: 52px; height: 52px; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .idx-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 5px; transition: color 0.3s; }
        .idx-label.lit { color: var(--accent-purple); }

        /* dp cells */
        .dp-cell.empty   { color: var(--text-dim); background: rgba(255,255,255,0.02); border-style: dashed; }
        .dp-cell.filled  { color: #cfe9f5; }
        .dp-cell.base    { border-color: rgba(34,197,94,0.45); color: #bbf7d0; background: rgba(34,197,94,0.08); }
        .dp-cell.dep1    { border-color: var(--accent-blue); background: rgba(6,182,212,0.12); color: #a5f3fc; box-shadow: 0 0 12px rgba(6,182,212,0.3); }
        .dp-cell.dep2    { border-color: var(--accent-purple); background: rgba(168,85,247,0.14); color: #e9d5ff; box-shadow: 0 0 12px rgba(168,85,247,0.3); }
        .dp-cell.current { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 20px rgba(168,85,247,0.55), inset 0 0 12px rgba(168,85,247,0.12); transform: scale(1.06); z-index: 2; }
        .dp-cell.best    { border-color: var(--accent-orange); background: rgba(245,165,36,0.20); color: #ffd591; box-shadow: 0 0 18px rgba(245,165,36,0.5); }

        /* SVG arrow layer sits above the dp row */
        .arrow-layer { position: absolute; inset: 0; pointer-events: none; overflow: visible; z-index: 1; }
        .arrow-path { fill: none; stroke-width: 2.2; opacity: 0; transition: opacity 0.3s; }
        .arrow-path.show { opacity: 1; }
        .arrow-d1 { stroke: var(--accent-blue); filter: drop-shadow(0 0 4px rgba(6,182,212,0.55)); }
        .arrow-d2 { stroke: var(--accent-purple); filter: drop-shadow(0 0 4px rgba(168,85,247,0.55)); }

        .action-stage { position: relative; min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 6px; align-items: center; min-height: 40px; }
        .ans-tile { min-width: 44px; height: 44px; padding: 0 10px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 20px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 12px rgba(245,165,36,0.35); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); } .pill.s b { color: var(--accent-blue); } .pill.r b { color: var(--accent-purple); } .pill.d b { color: var(--accent-orange); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">N =</label>
        <input type="number" id="n-input" value="3" min="0" max="14">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">N=3 &rarr; 3</button>
        <button onclick="loadExample(1)">N=4 &rarr; 5</button>
        <button onclick="loadExample(2)">N=6 &rarr; 13</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Count Ways to Tile 2&times;N <span class="sub">&middot; 1-D DP &middot; dp[i] = dp[i&minus;1] + dp[i&minus;2] &middot; O(n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="array-stage" id="array-stage">
                    <div class="tile-hero">
                        <div class="tile-board" id="tile-board"></div>
                        <div class="tile-caption" id="tile-caption">&nbsp;</div>
                    </div>
                    <div class="dp-board" id="dp-board">
                        <div class="row-label">dp[i] &middot; ways to tile a 2&times;i board</div>
                        <svg class="arrow-layer" id="arrow-layer"></svg>
                        <div class="cell-row" id="dp-row"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill c">current i <b id="st-i">&mdash;</b></span>
                            <span class="pill s">dp[i&minus;1] (vertical) <b id="st-d1">&mdash;</b></span>
                            <span class="pill r">dp[i&minus;2] (2 horiz.) <b id="st-d2">&mdash;</b></span>
                            <span class="pill d">dp[i] <b id="st-dp">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // Motion engine (spring pop, zero deps)
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.4 + 0.66 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // State
        let N = 3;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 720, 330];
        const dpEls = [];    // index 0..N -> dp cell element
        const idxEls = [];   // index 0..N -> dp index label element

        const CODE = [
            [['kw','def '],['fn','countTilings'],['src','(n):']],
            [['kw','  if '],['src','n == 0: return 1']],
            [['src','  dp = [0] * (n + 1)']],
            [['src','  dp[0] = 1   # empty board']],
            [['src','  dp[1] = 1   # one vertical domino']],
            [['kw','  for '],['src','i in 2..n:']],
            [['src','    vert = dp[i-1]   # 1 vertical at col i']],
            [['src','    horiz = dp[i-2]  # 2 horizontal in cols i-1,i']],
            [['src','    dp[i] = vert + horiz']],
            [['kw','  return '],['src','dp[n]']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // step generation (immutable snapshots)
        function generateSteps() {
            steps = [];
            const dp = new Array(N + 1).fill(null);

            const snap = (extra) => Object.assign({
                dp: dp.slice(), N,
                current: null, dep1: null, dep2: null,
                base: null, best: null, complete: false,
                tileMode: null   // {cols, kind} for the hero diagram
            }, extra);

            steps.push(snap({
                code: [0, 2], action: 'BUILD DP', actionColor: 'var(--accent-blue)',
                tileMode: { cols: N, kind: 'empty' },
                panel: `Count the tilings of a <b>2&times;${N}</b> board using 2&times;1 dominoes. Define <code>dp[i]</code> = number of ways to fully tile a <b>2&times;i</b> board.`,
                log: `init  board = 2x${N}   dp has indices 0..${N}`
            }));

            if (N === 0) {
                dp[0] = 1;
                steps.push(snap({
                    current: 0, base: 0, code: [1, 3], action: 'dp[0] = 1', actionColor: 'var(--accent-green)',
                    tileMode: { cols: 0, kind: 'empty' },
                    panel: `Base case: a <b>2&times;0</b> board is already empty &#8594; exactly <b>1</b> way (place nothing). <code>dp[0] = 1</code>.`,
                    log: `base  dp[0] = 1 (empty board)`
                }));
                steps.push(snap({
                    complete: true, confetti: true, code: [9], answer: 1, best: 0, current: 0,
                    tileMode: { cols: 0, kind: 'empty' },
                    action: '✓ 1', actionColor: 'var(--accent-orange)',
                    panel: `Done. A <b>2&times;0</b> board has <code>dp[0] = <b>1</b></code> tiling.`,
                    log: `done  result = dp[0] = 1`
                }));
                return;
            }

            // Base case dp[0]
            dp[0] = 1;
            steps.push(snap({
                current: 0, base: 0, code: [3], action: 'dp[0] = 1', actionColor: 'var(--accent-green)',
                tileMode: { cols: 0, kind: 'empty' },
                panel: `Base case: a <b>2&times;0</b> board is already empty &#8594; exactly <b>1</b> way. <code>dp[0] = 1</code>.`,
                log: `base  dp[0] = 1 (empty board)`
            }));

            // Base case dp[1]
            dp[1] = 1;
            steps.push(snap({
                current: 1, base: 1, code: [4], action: 'dp[1] = 1', actionColor: 'var(--accent-green)',
                tileMode: { cols: 1, kind: 'vert', vertCols: [0] },
                panel: `Base case: a <b>2&times;1</b> board fits exactly one <b>vertical</b> domino &#8594; <b>1</b> way. <code>dp[1] = 1</code>.`,
                log: `base  dp[1] = 1 (one vertical domino)`
            }));

            if (N === 1) {
                const ans = dp[1];
                steps.push(snap({
                    complete: true, confetti: true, code: [9], answer: ans, best: 1, current: 1,
                    tileMode: { cols: 1, kind: 'vert', vertCols: [0] },
                    action: `✓ ${ans}`, actionColor: 'var(--accent-orange)',
                    panel: `Done. A <b>2&times;1</b> board has <code>dp[1] = <b>${ans}</b></code> tiling.`,
                    log: `done  result = dp[1] = ${ans}`
                }));
                return;
            }

            // Recurrence
            for (let i = 2; i <= N; i++) {
                const vert = dp[i - 1];
                const horiz = dp[i - 2];
                const val = vert + horiz;
                dp[i] = val;

                steps.push(snap({
                    current: i, dep1: i - 1, dep2: i - 2,
                    code: [5, 6, 7, 8], action: `dp[${i}] = ${val}`, actionColor: 'var(--accent-purple)',
                    d1: vert, d2: horiz,
                    tileMode: { cols: i, kind: 'recur', vertCol: i - 1, horizCols: [i - 2, i - 1] },
                    panel: `Fill <b>dp[${i}]</b>: either place one <span style="color:#86efac">vertical</span> domino in the last column (leaving a 2&times;${i - 1} board, <code>dp[${i - 1}] = ${vert}</code>) or two <span style="color:#d8b4fe">horizontal</span> dominoes in the last two columns (leaving a 2&times;${i - 2} board, <code>dp[${i - 2}] = ${horiz}</code>). So <code>dp[${i}] = ${vert} + ${horiz} = ${val}</code>.`,
                    log: `i=${i}  dp[${i}] = dp[${i - 1}] + dp[${i - 2}] = ${vert} + ${horiz} = ${val}`
                }));
            }

            const answer = dp[N];
            steps.push(snap({
                complete: true, confetti: true, code: [9], answer, best: N, current: N,
                tileMode: { cols: N, kind: 'empty' },
                action: `✓ ${answer}`, actionColor: 'var(--accent-orange)',
                panel: `Done. The number of ways to tile a <b>2&times;${N}</b> board is <code>dp[${N}] = <b>${answer}</b></code>.`,
                log: `done  result = dp[${N}] = ${answer}`
            }));
        }

        // build persistent DOM skeleton (once per input load)
        function buildBoard() {
            const dpRow = document.getElementById('dp-row');
            dpRow.innerHTML = '';
            dpEls.length = 0; idxEls.length = 0;

            for (let i = 0; i <= N; i++) {
                const dCol = document.createElement('div'); dCol.className = 'col';
                const dCell = document.createElement('div'); dCell.className = 'cell dp-cell'; dCell.textContent = '';
                const lab = document.createElement('div'); lab.className = 'idx-label'; lab.textContent = i;
                dCol.appendChild(dCell); dCol.appendChild(lab); dpRow.appendChild(dCol);
                dpEls.push(dCell); idxEls.push(lab);
            }
            requestAnimationFrame(drawArrowsForCurrent);
        }

        // tiling-diagram hero: paint a 2-row board, color dominoes per step
        function buildTileHero(step) {
            const host = document.getElementById('tile-board');
            const cap = document.getElementById('tile-caption');
            host.innerHTML = '';
            const m = step.tileMode;
            const cols = m ? m.cols : N;

            if (cols === 0) {
                const slot = document.createElement('div');
                slot.style.cssText = 'font-family:var(--mono);font-size:12px;color:var(--text-dim);padding:10px 18px;';
                slot.textContent = '(empty board)';
                host.appendChild(slot);
            } else {
                for (let c = 0; c < cols; c++) {
                    const col = document.createElement('div'); col.className = 'tile-col';
                    const top = document.createElement('div'); top.className = 'tile-cell';
                    const bot = document.createElement('div'); bot.className = 'tile-cell';
                    if (m) {
                        if (m.kind === 'vert' && m.vertCols && m.vertCols.includes(c)) { top.classList.add('vert'); bot.classList.add('vert'); }
                        if (m.kind === 'recur') {
                            if (c === m.vertCol) { top.classList.add('add'); bot.classList.add('add'); }
                            else if (m.horizCols && m.horizCols.includes(c)) { top.classList.add('horiz'); bot.classList.add('horiz'); }
                        }
                    }
                    col.appendChild(top); col.appendChild(bot); host.appendChild(col);
                }
            }

            if (!m) { cap.innerHTML = '&nbsp;'; return; }
            if (m.kind === 'empty') cap.innerHTML = `2&times;${cols} board`;
            else if (m.kind === 'vert') cap.innerHTML = `<b>1</b> vertical domino fills the 2&times;1 board`;
            else if (m.kind === 'recur') cap.innerHTML = `last column shows the <span style="color:#fbbf24">choice</span>: 1 vertical (use dp[i&minus;1]) <b>or</b> 2 horizontal (use dp[i&minus;2])`;
            else cap.innerHTML = '&nbsp;';
        }

        // curved SVG dependency arrows (above the dp row, arcing into dp[i])
        function buildArrowPath(svg, fromEl, toEl, cls) {
            const board = document.getElementById('dp-board');
            const bRect = board.getBoundingClientRect();
            const fr = fromEl.getBoundingClientRect();
            const tr = toEl.getBoundingClientRect();
            const x1 = fr.left + fr.width / 2 - bRect.left;
            const y1 = fr.top - bRect.top;
            const x2 = tr.left + tr.width / 2 - bRect.left;
            const y2 = tr.top - bRect.top;
            const lift = 30 + Math.abs(x2 - x1) * 0.12;   // higher arc for farther deps
            const cx = (x1 + x2) / 2;
            const cy = Math.min(y1, y2) - lift;
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`);
            path.setAttribute('class', `arrow-path ${cls}`);
            path.setAttribute('marker-end', cls === 'arrow-d2' ? 'url(#head-d2)' : 'url(#head-d1)');
            svg.appendChild(path);
            requestAnimationFrame(() => path.classList.add('show'));
            return path;
        }
        function ensureMarkers(svg) {
            if (svg.querySelector('defs')) return;
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            [['head-d1', 'var(--accent-blue)'], ['head-d2', 'var(--accent-purple)']].forEach(([id, color]) => {
                const m = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
                m.setAttribute('id', id); m.setAttribute('viewBox', '0 0 10 10');
                m.setAttribute('refX', '8'); m.setAttribute('refY', '5');
                m.setAttribute('markerWidth', '6'); m.setAttribute('markerHeight', '6');
                m.setAttribute('orient', 'auto-start-reverse');
                const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                p.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z'); p.setAttribute('fill', color);
                m.appendChild(p); defs.appendChild(m);
            });
            svg.appendChild(defs);
        }
        function drawArrowsForCurrent() {
            const svg = document.getElementById('arrow-layer');
            [...svg.querySelectorAll('path.arrow-path')].forEach(p => p.remove());
            ensureMarkers(svg);
            const step = steps[stepIdx]; if (!step) return;
            if (step.dep1 != null && dpEls[step.dep1] && dpEls[step.current])
                buildArrowPath(svg, dpEls[step.dep1], dpEls[step.current], 'arrow-d1');
            if (step.dep2 != null && dpEls[step.dep2] && dpEls[step.current])
                buildArrowPath(svg, dpEls[step.dep2], dpEls[step.current], 'arrow-d2');
        }

        // render (pure function of steps[idx], persistent DOM)
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            for (let i = 0; i <= N; i++) {
                const v = step.dp[i];
                let dcls = 'cell dp-cell';
                let txt = '';
                if (v == null) { dcls += ' empty'; txt = ''; }
                else { txt = String(v); dcls += ' filled'; }
                if (step.base === i) dcls += ' base';
                if (step.dep1 === i) dcls += ' dep1';
                if (step.dep2 === i) dcls += ' dep2';
                if (step.best === i && step.complete) dcls += ' best';
                if (step.current === i) dcls += ' current';
                const dEl = dpEls[i];
                const wasEmpty = dEl.textContent === '';
                dEl.className = dcls; dEl.textContent = txt;
                if (wasEmpty && txt !== '') Motion.pop(dEl);

                idxEls[i].className = 'idx-label' + (step.current === i ? ' lit' : '');
            }

            buildTileHero(step);
            requestAnimationFrame(drawArrowsForCurrent);

            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.complete && step.answer != null) {
                const t = document.createElement('div'); t.className = 'ans-tile'; t.textContent = step.answer; at.appendChild(t);
            }

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            document.getElementById('st-i').textContent = step.current != null ? step.current : '—';
            document.getElementById('st-d1').textContent = step.d1 != null ? step.d1 : '—';
            document.getElementById('st-d2').textContent = step.d2 != null ? step.d2 : '—';
            document.getElementById('st-dp').textContent = (step.current != null && step.dp[step.current] != null) ? step.dp[step.current] : '—';

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // controls
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function loadN(n) {
            pause(); N = n; confettiArmed = true;
            buildBoard(); generateSteps(); renderStep(0);
        }
        function loadCustom() {
            const raw = parseInt(document.getElementById('n-input').value, 10);
            if (isNaN(raw) || raw < 0) return;
            const n = Math.min(raw, 14);
            document.getElementById('n-input').value = n;
            loadN(n);
        }
        function loadExample(k) {
            const ex = [3, 4, 6][k];
            document.getElementById('n-input').value = ex;
            loadN(ex);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('n-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => requestAnimationFrame(drawArrowsForCurrent));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
