<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Time to Buy & Sell Stock IV (at most k transactions) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 240px;
        }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 80px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .prices-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 110px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile.current { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        /* DP STATES */
        .dp-container { 
            margin-top: 20px;
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
            width: 920px;
            overflow-x: auto;
        }
        .dp-states {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .state-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .state-label { font-size: 11px; color: var(--text-dim); width: 60px; text-align: right; font-family: monospace; }
        .state-tiles {
            display: flex;
            gap: 8px;
        }
        .state-tile {
            min-width: 110px;
            padding: 10px 12px;
            text-align: center;
            border: 2px solid var(--border-main);
            background: #21262d;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .state-tile.current { border-color: var(--accent-green); background: #0f2a1a; box-shadow: 0 0 12px var(--accent-green); }
        .state-value { font-size: 18px; font-weight: 700; font-family: monospace; color: var(--accent-blue); }
        .state-sub { font-size: 10px; color: var(--text-dim); }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 110px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">prices =</label>
        <input type="text" id="prices-input" value="[3,2,6,5,0,3]" style="width:240px">
        <label class="ui-label">k =</label>
        <input type="number" id="k-input" value="2" min="0" style="width:80px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([3,2,6,5,0,3], 2)">Ex 1 (k=2 → 7)</button>
        <button onclick="loadExample([1,2], 1)">Ex 2 (k=1 → 1)</button>
        <button onclick="loadExample([2,4,1], 2)">Ex 3 (k=2 → 2)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Prices array (current day highlighted)</div>
        <div class="prices-wrapper" id="prices-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP States — buy[j] / sell[j] for j = 0 to k</div>
        <div id="dp-container" style="overflow-x:auto; max-width:920px;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Day / Price</span>
            <span class="info-value" id="val-day" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Transaction j</span>
            <span class="info-value" id="val-j" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">buy[j]</span>
            <span class="info-value" id="val-buy" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">sell[j]</span>
            <span class="info-value" id="val-sell" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Maximum profit =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Current state update</div>
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current day</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputPrices = [3,2,6,5,0,3];
        let inputK = 2;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];
        let n = 0;
        let buy = [];
        let sell = [];

        function init() {
            loadExample([3,2,6,5,0,3], 2);
        }

        function loadExample(prices, k) {
            inputPrices = prices;
            inputK = k;
            document.getElementById('prices-input').value = JSON.stringify(prices);
            document.getElementById('k-input').value = k;
            n = prices.length;
            generateSteps();
            reset();
        }

        function loadCustom() {
            let prices;
            try {
                prices = JSON.parse(document.getElementById('prices-input').value);
            } catch(e) {
                alert("Invalid prices array, e.g. [3,2,6,5,0,3]");
                return;
            }
            const k = parseInt(document.getElementById('k-input').value);
            if (!Array.isArray(prices) || isNaN(k) || k < 0) {
                alert("Invalid input");
                return;
            }
            loadExample(prices, k);
        }

        function generateSteps() {
            steps = [];
            const n = inputPrices.length;
            if (n === 0) {
                steps.push({type: 'final', panel: 'Empty prices → 0', result: 0, complete: true});
                return;
            }

            buy = Array(inputK + 1).fill(-Infinity);
            sell = Array(inputK + 1).fill(0);

            steps.push({
                type: 'init',
                day: -1,
                j: null,
                buySnapshot: [...buy],
                sellSnapshot: [...sell],
                panel: `Best Time to Buy & Sell Stock IV — Space-Optimized DP<br>prices = [${inputPrices}], k = ${inputK}`,
                statusText: `Initializing buy/sell arrays`,
                log: `buy = [-∞, ..., -∞]\nsell = [0, ..., 0]`,
                logColor: 'var(--text-dim)'
            });

            // Process each day
            for (let day = 0; day < n; day++) {
                const price = inputPrices[day];
                steps.push({
                    type: 'start-day',
                    day: day,
                    j: null,
                    buySnapshot: [...buy],
                    sellSnapshot: [...sell],
                    panel: `Day ${day} — price = ${price}`,
                    statusText: `Day ${day} ($${price})`,
                    log: `\n--- Day ${day} (price = ${price}) ---`,
                    logColor: 'var(--accent-orange)'
                });

                // Update from highest j to 0 (descending)
                for (let j = inputK; j >= 0; j--) {
                    const oldBuy = buy[j];
                    const oldSell = sell[j];

                    // Update buy[j]
                    let newBuy = oldBuy;
                    if (j > 0) {
                        const prevSell = sell[j - 1] !== -Infinity ? sell[j - 1] : 0;
                        newBuy = Math.max(oldBuy, prevSell - price);
                    } else {
                        newBuy = Math.max(oldBuy, -price);
                    }

                    // Update sell[j] using possibly updated buy[j]
                    let newSell = Math.max(oldSell, newBuy + price);

                    buy[j] = newBuy;
                    sell[j] = newSell;

                    steps.push({
                        type: 'update',
                        day: day,
                        j: j,
                        buySnapshot: [...buy],
                        sellSnapshot: [...sell],
                        panel: `j = ${j}<br>buy[j] = max(${oldBuy}, ${j > 0 ? 'sell[' + (j-1) + '] - ' + price : '-' + price}) = ${newBuy}<br>sell[j] = max(${oldSell}, buy[j] + ${price}) = ${newSell}`,
                        statusText: `j=${j}`,
                        log: `j=${j}: buy → ${newBuy} | sell → ${newSell}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            // FINAL
            const maxProfit = Math.max(...sell);
            steps.push({
                type: 'final',
                day: n,
                j: null,
                buySnapshot: [...buy],
                sellSnapshot: [...sell],
                panel: `All days processed.<br>Maximum profit = <span style="color:var(--accent-green)"><b>${maxProfit}</b></span>`,
                statusText: `Final max profit = ${maxProfit}`,
                log: `\nFinal max(sell) = ${maxProfit}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: maxProfit
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render prices
            const container = document.getElementById('prices-container');
            container.innerHTML = '';
            inputPrices.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                let cls = 'tile';
                if (step.day === i) cls += ' current';
                tile.className = cls;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = i;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            // Render DP states (buy and sell rows)
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-states"></div>`;
            const statesDiv = dpContainer.querySelector('.dp-states');

            // Buy row
            const buyRow = document.createElement('div');
            buyRow.className = 'state-row';
            const buyLabel = document.createElement('div');
            buyLabel.className = 'state-label';
            buyLabel.innerText = 'buy[j]';
            buyRow.appendChild(buyLabel);
            const buyTiles = document.createElement('div');
            buyTiles.className = 'state-tiles';
            const currentBuy = step.buySnapshot || buy;
            for (let j = 0; j <= inputK; j++) {
                const tile = document.createElement('div');
                tile.className = `state-tile ${(step.j === j) ? 'current' : ''}`;
                const val = currentBuy[j] === -Infinity ? '-∞' : currentBuy[j];
                tile.innerHTML = `<div class="state-value">${val}</div>`;
                buyTiles.appendChild(tile);
            }
            buyRow.appendChild(buyTiles);
            statesDiv.appendChild(buyRow);

            // Sell row
            const sellRow = document.createElement('div');
            sellRow.className = 'state-row';
            const sellLabel = document.createElement('div');
            sellLabel.className = 'state-label';
            sellLabel.innerText = 'sell[j]';
            sellRow.appendChild(sellLabel);
            const sellTiles = document.createElement('div');
            sellTiles.className = 'state-tiles';
            const currentSell = step.sellSnapshot || sell;
            for (let j = 0; j <= inputK; j++) {
                const tile = document.createElement('div');
                tile.className = `state-tile ${(step.j === j) ? 'current' : ''}`;
                tile.innerHTML = `<div class="state-value">${currentSell[j]}</div>`;
                sellTiles.appendChild(tile);
            }
            sellRow.appendChild(sellTiles);
            statesDiv.appendChild(sellRow);

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-day').innerText = step.day !== null && step.day >= 0 ? `${step.day} ($${inputPrices[step.day]})` : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-buy').innerText = step.j !== null ? (step.buySnapshot ? step.buySnapshot[step.j] : '-') : '—';
            document.getElementById('val-sell').innerText = step.j !== null ? (step.sellSnapshot ? step.sellSnapshot[step.j] : '-') : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
