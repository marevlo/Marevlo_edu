<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can I Win (DP bitmask game) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"], input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 140px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: NUMBERS TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .array-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 920px; }

        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 17px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile.used { background: #161b22; border-color: var(--border-main); color: var(--text-dim); opacity: 0.5; }
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227,179,65,0.4); }
        .tile.available { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }

        /* ROW 3: BITMASK DISPLAY */
        .bitmask-wrapper {
            margin-top: 12px; border: 2px solid var(--border-main); border-radius: 8px;
            padding: 12px; background: var(--bg-surface); width: 720px;
        }
        .bitmask-container { display: flex; gap: 4px; justify-content: center; font-family: monospace; font-size: 16px; }
        .bit { width: 24px; height: 32px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-main); background: #21262d; }
        .bit.set { background: var(--accent-purple); color: white; }

        /* DP MEMO TABLE */
        .memo-wrapper {
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 12px;
            background: var(--bg-surface);
            width: 720px;
        }
        .memo-table {
            display: grid;
            gap: 4px;
            font-family: monospace;
            font-size: 13px;
        }
        .memo-cell {
            width: 64px; height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid var(--border-main); background: #21262d; border-radius: 4px; transition: all 0.3s ease;
            font-size: 11px; text-align: center;
        }
        .memo-cell.win { background: #0f2a1a; color: var(--accent-green); }
        .memo-cell.lose { background: #2a1600; color: var(--accent-red); }

        /* ROW 4: ACTION PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 720px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 5: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 6: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 7: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 8: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 9: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 10: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 100%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">maxChoosableInteger =</label>
        <input type="number" id="max-input" value="3" style="width:80px">
        <label class="ui-label">desiredTotal =</label>
        <input type="number" id="total-input" value="5" style="width:80px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(3,5)">Ex 1 (true)</button>
        <button onclick="loadExample(4,8)">Ex 2 (false)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Available numbers (1 to maxChoosableInteger):</div>
        <div class="array-wrapper" id="numbers-container"></div>

        <div class="ui-label" style="margin-top:24px">Current bitmask (used numbers):</div>
        <div class="bitmask-wrapper">
            <div class="bitmask-container" id="bitmask-container"></div>
        </div>

        <div class="ui-label" style="margin-top:24px">Memo cache (mask → win/lose):</div>
        <div class="memo-wrapper">
            <div class="memo-table" id="memo-table"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current mask (decimal)</span>
            <span class="info-value" id="val-mask" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Remaining total</span>
            <span class="info-value" id="val-remaining" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current player can win?</span>
            <span class="info-value" id="val-win" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Final result</span>
            <span class="info-value" id="val-final" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">First player can force win?</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-green);"></span> Available</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red);"></span> Used</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple);"></span> Current move</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let maxChoosableInteger = 3;
        let desiredTotal = 5;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 350];

        // Global dp memo for simulation
        let dp = {};

        function generateSteps() {
            steps = [];
            dp = {}; // reset memo

            // Base case check
            const totalSum = (maxChoosableInteger * (maxChoosableInteger + 1)) / 2;
            if (desiredTotal <= 0) {
                steps.push({
                    type: 'final',
                    complete: true,
                    result: true,
                    panel: `desiredTotal ≤ 0 → First player wins immediately`,
                    statusText: `Base case: true`,
                    log: `desiredTotal ≤ 0 → true`,
                    logColor: 'var(--accent-green)',
                    bold: true
                });
                return;
            }
            if (totalSum < desiredTotal) {
                steps.push({
                    type: 'final',
                    complete: true,
                    result: false,
                    panel: `Sum of all numbers < desiredTotal → Impossible, first player loses`,
                    statusText: `Base case: false`,
                    log: `totalSum < desiredTotal → false`,
                    logColor: 'var(--accent-red)',
                    bold: true
                });
                return;
            }

            steps.push({
                type: 'init',
                mask: 0,
                remaining: desiredTotal,
                panel: `Initial state: mask=0 (binary 0), remaining=${desiredTotal}`,
                statusText: `Start DFS`,
                log: `dfs(0, ${desiredTotal})`,
                logColor: 'var(--accent-blue)'
            });

            // Simulate the recursive DFS with memo
            function dfs(mask, remaining, depth = 0) {
                const stateKey = `${mask}-${remaining}`;
                if (stateKey in dp) {
                    steps.push({
                        type: 'memo-hit',
                        mask: mask,
                        remaining: remaining,
                        result: dp[stateKey],
                        panel: `Memo hit for mask=${mask} (binary ${mask.toString(2)}), remaining=${remaining}<br>Return cached: ${dp[stateKey]}`,
                        statusText: `Memo hit → ${dp[stateKey]}`,
                        log: `Memo hit: ${dp[stateKey]}`,
                        logColor: 'var(--accent-purple)'
                    });
                    return dp[stateKey];
                }

                if (remaining <= 0) {
                    dp[stateKey] = false;
                    steps.push({
                        type: 'base',
                        mask: mask,
                        remaining: remaining,
                        result: false,
                        panel: `Base case: remaining ≤ 0 → Current player loses`,
                        statusText: `Base case: false`,
                        log: `remaining ≤ 0 → false`,
                        logColor: 'var(--accent-red)'
                    });
                    return false;
                }

                let canWinState = false;

                steps.push({
                    type: 'explore',
                    mask: mask,
                    remaining: remaining,
                    panel: `Exploring moves from mask=${mask} (binary ${mask.toString(2)}), remaining=${remaining}`,
                    statusText: `Exploring...`,
                    log: `explore mask=${mask}`,
                    logColor: 'var(--accent-orange)'
                });

                for (let i = 0; i < maxChoosableInteger; i++) {
                    if ((mask & (1 << i)) === 0) { // number i+1 unused
                        const num = i + 1;
                        const newMask = mask | (1 << i);
                        const newRemaining = remaining - num;

                        steps.push({
                            type: 'try-move',
                            mask: mask,
                            remaining: remaining,
                            chosen: num,
                            panel: `Try number ${num} (bit ${i})<br>New mask = ${newMask} (binary ${newMask.toString(2)}), remaining = ${newRemaining}`,
                            statusText: `Try ${num}`,
                            log: `try ${num}`,
                            logColor: 'var(--accent-purple)'
                        });

                        if (newRemaining <= 0 || !dfs(newMask, newRemaining, depth + 1)) {
                            canWinState = true;
                            steps.push({
                                type: 'win-move',
                                mask: mask,
                                remaining: remaining,
                                chosen: num,
                                panel: `Found winning move: number ${num} forces opponent lose`,
                                statusText: `Winning move found`,
                                log: `winning move ${num}`,
                                logColor: 'var(--accent-green)'
                            });
                            break;
                        }
                    }
                }

                dp[stateKey] = canWinState;
                steps.push({
                    type: 'result',
                    mask: mask,
                    remaining: remaining,
                    result: canWinState,
                    panel: `All moves explored.<br>Current player can win = ${canWinState}`,
                    statusText: `Result: ${canWinState}`,
                    log: `result = ${canWinState}`,
                    logColor: canWinState ? 'var(--accent-green)' : 'var(--accent-red)'
                });

                return canWinState;
            }

            const result = dfs(0, desiredTotal);

            steps.push({
                type: 'final',
                complete: true,
                result: result,
                panel: `Full exploration complete.<br><b>First player can force win = ${result}</b>`,
                statusText: `Final result: ${result}`,
                log: `\nFinal result: ${result}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderNumbers(currentStep) {
            const container = document.getElementById('numbers-container');
            container.innerHTML = '';
            for (let i = 1; i <= maxChoosableInteger; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                const bitIndex = i - 1;
                const isUsed = currentStep.mask !== undefined && (currentStep.mask & (1 << bitIndex)) !== 0;
                tile.className = `tile ${isUsed ? 'used' : 'available'}`;
                if (currentStep.chosen === i) tile.classList.add('candidate');
                tile.innerText = i;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            }
        }

        function renderBitmask(currentStep) {
            const container = document.getElementById('bitmask-container');
            container.innerHTML = '';
            if (currentStep.mask === undefined) return;
            const binaryStr = currentStep.mask.toString(2).padStart(maxChoosableInteger, '0');
            for (let i = maxChoosableInteger - 1; i >= 0; i--) {
                const bit = document.createElement('div');
                bit.className = `bit ${binaryStr[i] === '1' ? 'set' : ''}`;
                bit.innerText = binaryStr[i];
                container.appendChild(bit);
            }
            // Show decimal too
            const decimal = document.createElement('div');
            decimal.style.marginLeft = '20px';
            decimal.style.fontSize = '14px';
            decimal.innerText = `decimal ${currentStep.mask}`;
            container.appendChild(decimal);
        }

        function renderMemo(currentStep) {
            const container = document.getElementById('memo-table');
            container.innerHTML = '';
            // Render some cached states (simplified to show recent ones)
            const keys = Object.keys(dp);
            if (keys.length === 0) return;
            for (let key of keys) {
                const [maskStr, remStr] = key.split('-');
                const mask = parseInt(maskStr);
                const rem = parseInt(remStr);
                const res = dp[key];
                const cell = document.createElement('div');
                cell.className = `memo-cell ${res ? 'win' : 'lose'}`;
                cell.innerHTML = `<span style="font-size:10px">mask=${mask}</span><br><span style="font-size:10px">rem=${rem}</span><br><span>${res ? 'WIN' : 'LOSE'}</span>`;
                container.appendChild(cell);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            renderNumbers(step);
            renderBitmask(step);
            renderMemo(step);

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-mask').innerText = step.mask !== undefined ? step.mask : '—';
            document.getElementById('val-remaining').innerText = step.remaining !== undefined ? step.remaining : '—';
            document.getElementById('val-win').innerText = step.result !== undefined ? (step.result ? 'YES' : 'NO') : '—';
            document.getElementById('val-final').innerText = step.result !== undefined ? (step.result ? 'YES' : 'NO') : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result ? 'YES' : 'NO';
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        function loadCustom() {
            const maxVal = parseInt(document.getElementById('max-input').value);
            const totalVal = parseInt(document.getElementById('total-input').value);
            if (!isNaN(maxVal) && !isNaN(totalVal)) {
                maxChoosableInteger = maxVal;
                desiredTotal = totalVal;
                generateSteps();
                reset();
            }
        }

        function loadExample(maxVal, totalVal) {
            maxChoosableInteger = maxVal;
            desiredTotal = totalVal;
            document.getElementById('max-input').value = maxVal;
            document.getElementById('total-input').value = totalVal;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
