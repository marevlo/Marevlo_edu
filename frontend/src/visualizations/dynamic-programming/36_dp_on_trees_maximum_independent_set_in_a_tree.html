<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximum Independent Set in Tree (DP on trees) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 240px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tree-container {
            position: relative;
            width: 920px;
            height: 400px;
            border: 1px solid var(--border-main);
            border-radius: 8px;
            background: var(--bg-surface);
            margin-bottom: 20px;
        }
        .node {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            font-family: monospace;
            background: #21262d;
            border: 3px solid var(--accent-blue);
            color: var(--text-main);
            transition: all 0.3s ease;
            box-shadow: 0 0 8px rgba(56, 139, 253, 0.3);
        }
        .node.include { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .node.exclude { background: #21262d; border-color: var(--accent-red); color: var(--text-dim); opacity: 0.7; }
        .node.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); }
        .edge {
            position: absolute;
            height: 3px;
            background: var(--accent-orange);
            transform-origin: left center;
        }
        .edge-label {
            position: absolute;
            font-size: 11px;
            color: var(--accent-orange);
            font-family: monospace;
        }

        /* DP STATES */
        .dp-container { 
            margin-top: 20px;
            overflow-x: auto;
            max-width: 920px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .dp-states {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .state-tile {
            min-width: 110px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            border-radius: 8px;
            text-align: center;
        }
        .state-tile.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.08); box-shadow: 0 0 12px var(--accent-green); }
        .state-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Edges =</label>
        <input type="text" id="edges-input" value="[[0,1],[1,2]]" style="width:240px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([[0,1],[1,2]])">Ex 1 (2)</button>
        <button onclick="loadExample([[0,1],[0,2],[1,3]])">Ex 2 (2)</button>
        <button onclick="loadExample([[0,1],[1,2],[2,3]])">Ex 3 (2)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Tree (green = included in optimal independent set)</div>
        <div class="tree-container" id="tree-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP States (include / exclude per node)</div>
        <div id="dp-container" style="overflow-x:auto; max-width:920px;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Node</span>
            <span class="info-value" id="val-node" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Include (dp_inc)</span>
            <span class="info-value" id="val-inc" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Exclude (dp_exc)</span>
            <span class="info-value" id="val-exc" style="color: var(--accent-purple);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Maximum independent set size =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Included</div>
        <div class="legend-item"><span class="dot" style="background:#21262d; border:1px solid var(--accent-red)"></span> Excluded</div>
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current node</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputEdges = [[0,1],[1,2]];
        let adj = [];
        let n = 0;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 400];
        let dpInc = [];
        let dpExc = [];

        function init() { loadExample([[0,1],[1,2]]); }

        function loadExample(edges) {
            inputEdges = edges;
            document.getElementById('edges-input').value = JSON.stringify(edges);
            buildAdj();
            generateSteps();
            reset();
        }

        function loadCustom() {
            let edges;
            try {
                edges = JSON.parse(document.getElementById('edges-input').value);
            } catch(e) {
                alert("Please enter a valid edges array, e.g. [[0,1],[1,2]]");
                return;
            }
            if (Array.isArray(edges)) {
                loadExample(edges);
            } else {
                alert("Invalid input.");
            }
        }

        function buildAdj() {
            n = 0;
            for (let edge of inputEdges) {
                n = Math.max(n, edge[0] + 1, edge[1] + 1);
            }
            adj = Array.from({length: n}, () => []);
            for (let [u,v] of inputEdges) {
                adj[u].push(v);
                adj[v].push(u);
            }
        }

        function generateSteps() {
            steps = [];
            dpInc = Array(n).fill(0);
            dpExc = Array(n).fill(0);

            // STEP 0: INIT
            steps.push({
                type: 'init',
                node: null,
                dpInc: [...dpInc],
                dpExc: [...dpExc],
                panel: `Maximum Independent Set in Tree — DP Postorder<br>edges = [${inputEdges}]`,
                statusText: `Building tree and initializing DP`,
                log: `Tree built with n=${n} nodes\nadj = ${JSON.stringify(adj)}`,
                logColor: 'var(--text-dim)'
            });

            // Simulate postorder DFS
            const dfs = (node, parent) => {
                steps.push({
                    type: 'visit',
                    node: node,
                    dpInc: [...dpInc],
                    dpExc: [...dpExc],
                    panel: `Visiting node ${node} (children first)`,
                    statusText: `node = ${node}`,
                    log: `Enter node ${node}`,
                    logColor: 'var(--accent-orange)'
                });

                let inc = 1;
                let exc = 0;

                // Process children
                for (let child of adj[node]) {
                    if (child === parent) continue;

                    dfs(child, node);

                    inc += dpExc[child];
                    exc += Math.max(dpInc[child], dpExc[child]);
                }

                dpInc[node] = inc;
                dpExc[node] = exc;

                steps.push({
                    type: 'compute',
                    node: node,
                    dpInc: [...dpInc],
                    dpExc: [...dpExc],
                    panel: `Computed for node ${node}<br>include = 1 + sum(exclude children) = ${inc}<br>exclude = sum(max(include,exclude) children) = ${exc}`,
                    statusText: `node ${node}: inc=${inc}, exc=${exc}`,
                    log: `Node ${node}: inc=${inc}, exc=${exc}`,
                    logColor: 'var(--accent-green)'
                });
            };

            dfs(0, -1);

            // FINAL
            const maxSize = Math.max(dpInc[0], dpExc[0]);
            steps.push({
                type: 'final',
                node: null,
                dpInc: [...dpInc],
                dpExc: [...dpExc],
                panel: `Postorder traversal complete.<br>Maximum independent set size = <span style="color:var(--accent-green)"><b>${maxSize}</b></span>`,
                statusText: `Final max size = ${maxSize}`,
                log: `\nFinal answer = max(${dpInc[0]}, ${dpExc[0]}) = ${maxSize}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: maxSize
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render tree
            const treeContainer = document.getElementById('tree-container');
            treeContainer.innerHTML = `<svg width="920" height="400" id="tree-svg"></svg>`;
            const svg = document.getElementById('tree-svg');

            // Simple tree layout (assume small n, hardcode positions for demo, or basic positioning)
            // For generality, use a vertical layout with root at top
            const nodePositions = {};
            let xOffset = 100;
            const drawNode = (node, parentX, parentY, level) => {
                const x = parentX + (level * 120);
                const y = 80 + (node * 60);
                nodePositions[node] = {x, y};

                // Draw node
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", x);
                circle.setAttribute("cy", y);
                circle.setAttribute("r", "25");
                circle.setAttribute("fill", step.node === node ? "#2a1600" : "#21262d");
                circle.setAttribute("stroke", step.node === node ? "#e3b341" : (dpInc[node] > 0 ? "#3fb950" : "#388bfd"));
                circle.setAttribute("stroke-width", "4");
                svg.appendChild(circle);

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", x);
                text.setAttribute("y", y + 5);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("fill", step.node === node ? "#e3b341" : "#c9d1d9");
                text.setAttribute("font-size", "18");
                text.setAttribute("font-family", "monospace");
                text.textContent = node;
                svg.appendChild(text);

                if (parentX !== null) {
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", parentX);
                    line.setAttribute("y1", parentY);
                    line.setAttribute("x2", x);
                    line.setAttribute("y2", y);
                    line.setAttribute("stroke", "#e3b341");
                    line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                }
            };

            // Recursive draw
            const drawTree = (node, parentX, parentY, level) => {
                drawNode(node, parentX, parentY, level);
                let childLevel = level + 1;
                let childX = nodePositions[node].x + 60;
                for (let child of adj[node]) {
                    if (child !== (parentX !== null ? 0 : -1)) { // simple
                        drawTree(child, childX, nodePositions[node].y, childLevel);
                        childX += 120;
                    }
                }
            };

            drawTree(0, null, null, 0);

            // Render DP states
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-states"></div>`;
            const statesDiv = dpContainer.querySelector('.dp-states');
            for (let i = 0; i < n; i++) {
                const tile = document.createElement('div');
                tile.className = `state-tile ${(step.node === i) ? 'current' : ''}`;
                tile.innerHTML = `<span class="state-label">Node ${i}</span><span style="color:var(--accent-green)">inc: ${dpInc[i]}</span><span style="color:var(--accent-purple)">exc: ${dpExc[i]}</span>`;
                statesDiv.appendChild(tile);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-node').innerText = step.node !== null ? step.node : '—';
            document.getElementById('val-inc').innerText = step.node !== null ? dpInc[step.node] : '—';
            document.getElementById('val-exc').innerText = step.node !== null ? dpExc[step.node] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
