<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max Independent Set in a Tree &middot; DP on Trees</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f43f5e;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:900px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:240px;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:340px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.tree-wrap{flex:0 0 auto;}
svg.tree{display:block; width:430px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2.5; transition:stroke .35s, stroke-width .35s;}
.edge.active{stroke:var(--accent-orange); stroke-width:3.5; filter:drop-shadow(0 0 5px rgba(245,165,36,.5));}
.tnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2.5; transition:fill .35s, stroke .35s, filter .35s;}
.tnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.tnode .pair{font-family:var(--mono); font-weight:700; font-size:11px; text-anchor:middle; fill:var(--text-dim); transition:fill .35s, opacity .35s; opacity:0;}
.tnode.done .pair{opacity:1;}
.tnode.done .nc{stroke:rgba(6,182,212,.5); fill:rgba(6,182,212,.08);}
.tnode.child .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.14); filter:drop-shadow(0 0 7px rgba(168,85,247,.5)); stroke-width:3;}
.tnode.child .nl{fill:#e9d5ff;}
.tnode.current .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3.5;}
.tnode.current .nl{fill:#ffd591;}
.tnode.chosen .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.16); filter:drop-shadow(0 0 10px rgba(34,197,94,.5)); stroke-width:3.5;}
.tnode.chosen .nl{fill:#bbf7d0;}

.side{display:flex; flex-direction:column; gap:12px; min-width:240px; flex:1 1 240px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px; color:var(--accent-orange);}
.dp-rows{display:flex; flex-direction:column; gap:6px;}
.dp-row{display:grid; grid-template-columns:46px 1fr 1fr; gap:6px; align-items:center;}
.dp-row .nk{font-family:var(--mono); font-weight:800; font-size:13px; color:var(--text-dim); text-align:center;}
.dp-cell{display:flex; flex-direction:column; align-items:center; gap:1px; border-radius:9px; padding:5px 4px;
  border:1.5px solid var(--border-main); background:rgba(255,255,255,.04); transition:transform .3s cubic-bezier(.34,1.4,.64,1), border-color .3s, background .3s;}
.dp-cell .dl{font-family:var(--mono); font-size:9px; color:var(--text-dim); letter-spacing:.03em;}
.dp-cell .dv{font-family:var(--mono); font-weight:800; font-size:15px;}
.dp-cell.inc .dv{color:#bbf7d0;} .dp-cell.exc .dv{color:#e9d5ff;}
.dp-cell.dim .dv{color:var(--text-dim);}
.dp-cell.dep{border-color:rgba(168,85,247,.5); background:rgba(168,85,247,.12);}
.dp-cell.cur{border-color:rgba(245,165,36,.55); background:rgba(245,165,36,.12);}
.dp-cell.cur .dv{color:#ffd591;}

#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.action-stage{display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:6px;}
.answer-track{display:flex; align-items:center; gap:10px; font-family:var(--mono); font-size:14px; color:var(--text-dim);}
.answer-track .av{font-size:26px; font-weight:800; color:var(--text-dim); transition:color .3s, font-size .3s, text-shadow .3s;}
.answer-track .av.pop{color:var(--accent-green); font-size:34px; text-shadow:0 0 14px rgba(34,197,94,.6);}
.action-word{font-family:var(--mono); font-size:12px; color:var(--text-dim); min-height:1.2em;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;} .code-line .cm{color:#5b6680;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-orange);} .pill.i b{color:var(--accent-green);} .pill.e b{color:var(--accent-purple);} .pill.s b{color:#a5f3fc;}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>edges =</label>
  <input type="text" id="edges-input" class="large-input" value="[[0,1],[1,2]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample([[0,1],[1,2]])">Ex 1 &middot; ans 2</button>
  <button onclick="loadExample([[0,1],[0,2],[1,3]])">Ex 2 &middot; ans 2</button>
  <button onclick="loadExample([[0,1],[1,2],[2,3]])">Ex 3 &middot; ans 2</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Max Independent Set in a Tree <span class="sub">&middot; DP on trees &middot; post-order</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="tree-wrap"><svg class="tree" id="tree" viewBox="0 0 430 360"></svg></div>
      <div class="side">
        <div class="panel"><div class="cap">DP TABLE &middot; (incl, excl) PER NODE</div><div class="dp-rows" id="dp-rows"></div></div>
        <div class="action-stage">
          <div class="answer-track">answer = max(incl[root], excl[root]) = <span class="av" id="answer-val">&middot;</span></div>
          <div class="action-word" id="action-word"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">node u = <b id="pill-u">&middot;</b></span>
        <span class="pill i">incl[u] = <b id="pill-i">&middot;</b></span>
        <span class="pill e">excl[u] = <b id="pill-e">&middot;</b></span>
        <span class="pill s">best = <b id="pill-best">&middot;</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>current u</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>child dep</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>in optimal set</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ if(!el) return; el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.55+0.45*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','dfs'],['src','(u, parent):']],
  [['src','  incl = 1   '],['cm','# pick u: 1 + sum(excl[child])']],
  [['src','  excl = 0   '],['cm','# skip u: sum(max(incl,excl))']],
  [['kw','  for'],['src',' c '],['kw','in'],['src',' children(u):']],
  [['src','    dfs(c, u)']],
  [['src','    incl += excl[c]']],
  [['src','    excl += max(incl[c], excl[c])']],
  [['src','  store incl[u], excl[u]']],
  [['kw','answer = '],['fn','max'],['src','(incl[root], excl[root])']],
];

let inputEdges=[[0,1],[1,2]];
let adj=[], n=0, root=0, parentOf=[], childrenOf=[], coord={};
let steps=[], stepIndex=0, timer=null;
const delays=[1700,900,460];
const tnodes={}, edgeEls={};
let confettiArmed=true;

function init(){ buildCode(); loadExample([[0,1],[1,2]]); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(edges){ inputEdges=edges; document.getElementById('edges-input').value=JSON.stringify(edges); buildTree(); generateSteps(); reset(); }
function loadCustom(){
  let edges;
  try{ edges=JSON.parse(document.getElementById('edges-input').value); }
  catch(e){ alert('Please enter a valid edges array, e.g. [[0,1],[1,2]]'); return; }
  if(!Array.isArray(edges)){ alert('Invalid input.'); return; }
  loadExample(edges);
}

function buildTree(){
  n=0;
  for(const e of inputEdges){ n=Math.max(n, e[0]+1, e[1]+1); }
  if(n===0) n=1;
  adj=Array.from({length:n},()=>[]);
  for(const [u,v] of inputEdges){ adj[u].push(v); adj[v].push(u); }
  root=0;
  parentOf=Array(n).fill(-1); childrenOf=Array.from({length:n},()=>[]);
  // BFS to root the tree at 0, establish parent/child + depth ordering
  const seen=Array(n).fill(false); const order=[]; const depth=Array(n).fill(0);
  const q=[root]; seen[root]=true;
  while(q.length){ const u=q.shift(); order.push(u);
    for(const v of adj[u]){ if(!seen[v]){ seen[v]=true; parentOf[v]=u; childrenOf[u].push(v); depth[v]=depth[u]+1; q.push(v); } } }
  layout(order, depth);
}

function layout(order, depth){
  coord={};
  // assign an x-slot to each node via leaf ordering (in-order over the rooted tree)
  let leafX=0; const xpos=Array(n).fill(0);
  const assign=(u)=>{
    if(childrenOf[u].length===0){ xpos[u]=leafX++; return; }
    let s=0; for(const c of childrenOf[u]){ assign(c); s+=xpos[c]; }
    xpos[u]=s/childrenOf[u].length;
  };
  assign(root);
  const maxDepth=Math.max(...depth, 0);
  const maxX=Math.max(leafX-1, 0);
  const W=430, H=360, padX=40, padY=46;
  const usableW=W-2*padX, usableH=H-2*padY;
  for(let u=0;u<n;u++){
    const fx = maxX>0 ? xpos[u]/maxX : 0.5;
    const fy = maxDepth>0 ? depth[u]/maxDepth : 0;
    coord[u]={ x: padX + (maxX>0?fx*usableW:usableW/2), y: padY + fy*usableH };
  }
  setupSvg();
}

function setupSvg(){
  const svg=document.getElementById('tree'); svg.innerHTML='';
  for(const k in tnodes) delete tnodes[k];
  for(const k in edgeEls) delete edgeEls[k];
  // edges first
  for(let v=0;v<n;v++){ const u=parentOf[v]; if(u<0) continue;
    const p1=coord[u], p2=coord[v];
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line'); ln.setAttribute('class','edge'); ln.id='ed'+v;
    ln.setAttribute('x1',p1.x); ln.setAttribute('y1',p1.y); ln.setAttribute('x2',p2.x); ln.setAttribute('y2',p2.y);
    svg.appendChild(ln); edgeEls[v]=ln; }
  // nodes on top
  for(let u=0;u<n;u++){ const p=coord[u];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','tnode'); g.id='tn'+u;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',19);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=u;
    const pr=document.createElementNS('http://www.w3.org/2000/svg','text'); pr.setAttribute('class','pair'); pr.setAttribute('x',p.x); pr.setAttribute('y',p.y+31); pr.textContent='';
    g.appendChild(c); g.appendChild(t); g.appendChild(pr); svg.appendChild(g); tnodes[u]=g; }
}

function generateSteps(){
  steps=[];
  const incl=Array(n).fill(null), excl=Array(n).fill(null), doneSet=new Set();
  const snap=o=>{ steps.push({
    incl:[...incl], excl:[...excl], done:[...doneSet],
    u:o.u??null, child:o.child??null, code:o.code, narr:o.narr, log:o.log,
    action:o.action??'', best:o.best??null, chosen:o.chosen??null, complete:o.complete });
  };

  snap({code:[], narr:`Tree rooted at <code>${root}</code>. We compute two values per node in <b>post-order</b>: <code>incl</code> (node in set) and <code>excl</code> (node not in set).`,
    log:`build tree: n=${n} nodes, root=${root}`, action:'rooting tree'});

  function dfs(u){
    snap({u, code:[0,1,2], narr:`Enter node <code>${u}</code>. Start <code>incl=1</code> (count <code>${u}</code> itself), <code>excl=0</code>.`,
      log:`enter ${u}  -> incl=1, excl=0`, action:`visit ${u}`});
    let inc=1, exc=0;
    for(const c of childrenOf[u]){
      dfs(c);
      snap({u, child:c, code:[5,6], narr:`Combine child <code>${c}</code>: <code>incl += excl[${c}]=${excl[c]}</code> &middot; <code>excl += max(${incl[c]},${excl[c]})=${Math.max(incl[c],excl[c])}</code>.`,
        log:`  ${u} += child ${c}: incl+=${excl[c]}, excl+=max(${incl[c]},${excl[c]})=${Math.max(incl[c],excl[c])}`,
        action:`fold child ${c}`});
      inc+=excl[c]; exc+=Math.max(incl[c],excl[c]);
    }
    incl[u]=inc; excl[u]=exc; doneSet.add(u);
    snap({u, code:[7], narr:`Done node <code>${u}</code> &rarr; <code>incl[${u}]=${inc}</code>, <code>excl[${u}]=${exc}</code>. Store and return to parent.`,
      log:`store ${u}: incl=${inc}, excl=${exc}`, action:`store ${u}`});
  }
  dfs(root);

  // backtrack to mark which nodes are actually chosen in an optimal set
  const chosen=new Set();
  const mark=(u, mustExclude)=>{
    let take;
    if(mustExclude){ take=false; }
    else { take = incl[u] >= excl[u]; }
    if(take){ chosen.add(u); for(const c of childrenOf[u]) mark(c,true); }
    else { for(const c of childrenOf[u]) mark(c,false); }
  };
  mark(root,false);
  const best=Math.max(incl[root],excl[root]);
  snap({code:[8], best, chosen:[...chosen], done:[...doneSet],
    narr:`Root <code>${root}</code>: <code>max(incl=${incl[root]}, excl=${excl[root]})</code>. Maximum independent set size = <b>${best}</b>.`,
    log:`answer = max(incl[${root}]=${incl[root]}, excl[${root}]=${excl[root]}) = ${best}\noptimal set = {${[...chosen].sort((a,b)=>a-b).join(', ')}}`,
    action:'answer', complete:true});

  // patch chosen onto final step incl/excl already present
  steps[steps.length-1].incl=[...incl]; steps[steps.length-1].excl=[...excl];
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const doneS=new Set(step.done);
  const chosenS=new Set(step.chosen||[]);

  for(let u=0;u<n;u++){ const g=tnodes[u]; if(!g) continue;
    g.classList.remove('done','current','child','chosen');
    if(doneS.has(u)) g.classList.add('done');
    if(step.child===u) g.classList.add('child');
    if(step.u===u && !step.complete) g.classList.add('current');
    if(chosenS.has(u)) g.classList.add('chosen');
    const pr=g.querySelector('.pair');
    if(pr){ if(step.incl[u]!=null){ pr.textContent='('+step.incl[u]+','+step.excl[u]+')'; } else { pr.textContent=''; } }
  }
  // edge highlight: edge from current u down to the child being folded
  for(let v=0;v<n;v++){ const ln=edgeEls[v]; if(!ln) continue; ln.classList.remove('active');
    if(step.child===v) ln.classList.add('active'); }
  // animate the node that just finished
  if(step.u!=null && step.code && step.code.includes(7)){ const g=tnodes[step.u]; if(g) Motion.pop(g.querySelector('.nc')); }

  // DP table rows (persistent skeleton rebuilt only when n changes)
  buildDpRows();
  for(let u=0;u<n;u++){
    const incCell=document.getElementById('dpc-inc-'+u);
    const excCell=document.getElementById('dpc-exc-'+u);
    const incV=document.getElementById('dpv-inc-'+u);
    const excV=document.getElementById('dpv-exc-'+u);
    if(!incCell) continue;
    const hasV = step.incl[u]!=null;
    incV.textContent = hasV ? step.incl[u] : '—';
    excV.textContent = hasV ? step.excl[u] : '—';
    incCell.classList.toggle('dim', !hasV);
    excCell.classList.toggle('dim', !hasV);
    incCell.classList.toggle('cur', step.u===u && !step.complete);
    excCell.classList.toggle('cur', step.u===u && !step.complete);
    incCell.classList.toggle('dep', step.child===u);
    excCell.classList.toggle('dep', step.child===u);
    if((step.u===u||step.child===u)) { Motion.pop(incCell); Motion.pop(excCell); }
  }

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr; narr.classList.toggle('done',!!step.complete);
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code&&step.code.includes(i)); });

  document.getElementById('pill-u').textContent = step.u!=null ? step.u : '—';
  document.getElementById('pill-i').textContent = (step.u!=null && step.incl[step.u]!=null) ? step.incl[step.u] : '—';
  document.getElementById('pill-e').textContent = (step.u!=null && step.excl[step.u]!=null) ? step.excl[step.u] : '—';
  document.getElementById('pill-best').textContent = step.best!=null ? step.best : '—';

  document.getElementById('action-word').textContent = step.action || '';
  const av=document.getElementById('answer-val');
  if(step.complete){ av.textContent=step.best; av.classList.add('pop'); }
  else { av.textContent='—'; av.classList.remove('pop'); }

  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color='var(--accent-green)'; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

let dpRowsBuiltFor=-1;
function buildDpRows(){
  if(dpRowsBuiltFor===n) return;
  const host=document.getElementById('dp-rows'); host.innerHTML='';
  for(let u=0;u<n;u++){
    const row=document.createElement('div'); row.className='dp-row';
    const nk=document.createElement('div'); nk.className='nk'; nk.textContent='v'+u; row.appendChild(nk);
    const inc=document.createElement('div'); inc.className='dp-cell inc dim'; inc.id='dpc-inc-'+u;
    inc.innerHTML='<span class="dl">incl</span><span class="dv" id="dpv-inc-'+u+'">—</span>'; row.appendChild(inc);
    const exc=document.createElement('div'); exc.className='dp-cell exc dim'; exc.id='dpc-exc-'+u;
    exc.innerHTML='<span class="dl">excl</span><span class="dv" id="dpv-exc-'+u+'">—</span>'; row.appendChild(exc);
    host.appendChild(row);
  }
  dpRowsBuiltFor=n;
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; dpRowsBuiltFor=-1; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
