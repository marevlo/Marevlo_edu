<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Permutations with K Inversions - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 80px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        /* DP TABLE */
        .dp-container { 
            margin-top: 20px;
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
            width: 920px;
            overflow-x: auto;
        }
        .dp-grid {
            display: grid;
            gap: 4px;
        }
        .dp-cell {
            min-width: 62px;
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            position: relative;
        }
        .dp-cell.header { background: var(--bg-surface); font-size: 11px; color: var(--text-dim); font-weight: normal; }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.08); box-shadow: 0 0 12px var(--accent-green); }
        .dp-cell.true { background: #0f2a1a; border-color: var(--accent-green); }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 110px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="number" id="n-input" value="3" min="1" style="width:80px">
        <label class="ui-label">K =</label>
        <input type="number" id="k-input" value="1" min="0" style="width:80px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(3,1)">Ex 1 (n=3,K=1 → 2)</button>
        <button onclick="loadExample(2,0)">Ex 2 (n=2,K=0 → 1)</button>
        <button onclick="loadExample(4,2)">Ex 3 (n=4,K=2 → 5)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">DP Table dp[i][j] — permutations of size i with exactly j inversions</div>
        <div id="dp-container" style="overflow-x:auto; max-width:920px;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current size i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current j</span>
            <span class="info-value" id="val-j" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Sum range (new inversions)</span>
            <span class="info-value" id="val-range" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Number of permutations with K inversions =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Current dp[i][j] being updated</div>
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current j in row i</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentN = 3;
        let currentK = 1;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];
        let dp = [];

        function init() {
            loadExample(3, 1);
        }

        function loadExample(n, K) {
            currentN = n;
            currentK = K;
            document.getElementById('n-input').value = n;
            document.getElementById('k-input').value = K;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const n = parseInt(document.getElementById('n-input').value);
            const K = parseInt(document.getElementById('k-input').value);
            if (isNaN(n) || isNaN(K) || n < 1 || K < 0 || n > 10) {
                alert("n between 1 and 10, K >= 0");
                return;
            }
            loadExample(n, K);
        }

        function generateSteps() {
            steps = [];
            const maxJ = currentK;
            dp = Array.from({ length: currentN + 1 }, () => Array(maxJ + 1).fill(0));

            // INIT
            steps.push({
                type: 'init',
                i: 0,
                j: null,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `Count Permutations with K Inversions — DP<br>n = ${currentN}, K = ${currentK}`,
                statusText: `Initializing DP table`,
                log: `dp[0][0] = 1 (empty permutation)`,
                logColor: 'var(--text-dim)'
            });

            dp[0][0] = 1;

            steps.push({
                type: 'base',
                i: 0,
                j: 0,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `Base case: dp[0][0] = 1`,
                statusText: `dp[0][0] = 1`,
                log: `dp[0][0] = 1`,
                logColor: 'var(--accent-green)'
            });

            for (let i = 1; i <= currentN; i++) {
                steps.push({
                    type: 'start-i',
                    i: i,
                    j: null,
                    dpSnapshot: JSON.parse(JSON.stringify(dp)),
                    panel: `Processing size i = ${i}`,
                    statusText: `i = ${i}`,
                    log: `\n--- Processing i = ${i} (adding number ${i}) ---`,
                    logColor: 'var(--accent-orange)'
                });

                for (let j = 0; j <= currentK; j++) {
                    let sum = 0;
                    const maxP = Math.min(j, i - 1);
                    for (let p = 0; p <= maxP; p++) {
                        sum += dp[i - 1][j - p];
                    }
                    dp[i][j] = sum;

                    steps.push({
                        type: 'update-j',
                        i: i,
                        j: j,
                        dpSnapshot: JSON.parse(JSON.stringify(dp)),
                        panel: `j = ${j}<br>dp[${i}][${j}] = sum_{p=0 to ${maxP}} dp[${i-1}][${j}-p] = ${sum}`,
                        statusText: `j = ${j}`,
                        log: `j=${j}: sum = ${sum}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            // FINAL
            const result = dp[currentN][currentK];
            steps.push({
                type: 'final',
                i: currentN,
                j: currentK,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `All sizes processed.<br>Number of permutations of size ${currentN} with exactly ${currentK} inversions = <span style="color:var(--accent-green)"><b>${result}</b></span>`,
                statusText: `Final count = ${result}`,
                log: `\nFinal answer dp[${currentN}][${currentK}] = ${result}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: result
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render DP grid
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-grid" style="grid-template-columns: repeat(${currentK + 2}, 68px);"></div>`;
            const grid = dpContainer.querySelector('.dp-grid');

            // Header row
            const headerRow = document.createElement('div');
            headerRow.style.display = 'contents';
            const emptyHeader = document.createElement('div');
            emptyHeader.className = 'dp-cell header';
            emptyHeader.textContent = 'i\\j';
            headerRow.appendChild(emptyHeader);
            for (let j = 0; j <= currentK; j++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.textContent = j;
                headerRow.appendChild(cell);
            }
            grid.appendChild(headerRow);

            // Rows
            const currentDP = step.dpSnapshot;
            for (let i = 0; i <= currentN; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.style.display = 'contents';
                const rowHeader = document.createElement('div');
                rowHeader.className = 'dp-cell header';
                rowHeader.textContent = i;
                rowDiv.appendChild(rowHeader);

                for (let j = 0; j <= currentK; j++) {
                    const val = currentDP[i][j];
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${step.i === i && step.j === j ? 'current' : ''}`;
                    cell.textContent = val;
                    rowDiv.appendChild(cell);
                }
                grid.appendChild(rowDiv);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-range').innerText = step.j !== null && step.i !== null ? `0 to min(${step.j}, ${step.i-1})` : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
