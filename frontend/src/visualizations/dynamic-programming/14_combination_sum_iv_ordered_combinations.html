<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combination Sum IV (ordered combinations) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 180px;
            font-size: 13px;
        }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 100px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 20px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.failed { background: #2a0d0d; border-color: var(--accent-red); color: var(--accent-red); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-red); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* Pointers */
        .ptr-container { display: flex; flex-direction: column; align-items: center; position: absolute; bottom: -50px; gap: 2px; font-size: 12px; font-family: monospace; font-weight: bold; transition: all 0.3s; width: 100%; text-align: center; }
        .ptr-num { color: var(--accent-orange); }
        .ptr-arrow { font-size: 16px; line-height: 10px; margin-bottom: 2px; color: var(--text-dim); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 40px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-red); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="nums-input" placeholder="[1,2,3]" value="[1,2,3]">
        <label class="ui-label" style="margin-left:8px">target =</label>
        <input type="number" id="target-input" placeholder="4" value="4">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[1,2,3]',4)">Ex 1 ([1,2,3],4)</button>
        <button onclick="loadExample('[2]',3)">Ex 2 ([2],3)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label" id="arr-label">Numbers array:</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Remaining</span>
            <span class="info-value" id="val-remaining" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Num</span>
            <span class="info-value" id="val-num" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Path</span>
            <span class="info-value" id="val-path" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Ways so far</span>
            <span class="info-value" id="val-ways" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">ordered combinations =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Trying this num</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Valid path (reached 0)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red); border:1px solid var(--accent-red)"></span> Invalid (negative)</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputNums = [1,2,3];
        let inputTarget = 4;
        let numsArr = [];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample("[1,2,3]", 4); }

        function loadExample(numsStr, tgt) {
            inputNums = JSON.parse(numsStr);
            inputTarget = parseInt(tgt);
            document.getElementById('nums-input').value = JSON.stringify(inputNums);
            document.getElementById('target-input').value = inputTarget;
            generateSteps();
            reset();
        }

        function loadCustom() {
            try {
                const numsStr = document.getElementById('nums-input').value.trim();
                const numsParsed = JSON.parse(numsStr);
                const tgt = parseInt(document.getElementById('target-input').value);
                if (Array.isArray(numsParsed) && numsParsed.length > 0 && !isNaN(tgt) && tgt >= 0) {
                    inputNums = numsParsed;
                    inputTarget = tgt;
                    generateSteps();
                    reset();
                } else {
                    alert("Please enter valid nums array (e.g. [1,2,3]) and non-negative target.");
                }
            } catch(e) {
                alert("Invalid nums format. Use JSON array like [1,2,3]");
            }
        }

        function generateSteps() {
            steps = [];
            numsArr = inputNums;
            const n = numsArr.length;

            function getStates(currIdx) {
                return numsArr.map((_, idx) => {
                    if (idx === currIdx) return 'candidate';
                    return 'idle';
                });
            }

            function simulate(remaining, path = []) {
                const pathStr = path.length > 0 ? path.join('+') : '—';

                steps.push({
                    type: 'call',
                    remaining: remaining,
                    idx: -1,
                    num: '—',
                    path: pathStr,
                    digitsStates: getStates(-1),
                    panel: `Call <code>dfs(${remaining})</code><br>Remaining: <b>${remaining}</b><br>Path so far: <b>${pathStr}</b>`,
                    statusText: `remaining=${remaining}`,
                    log: `Call dfs(${remaining})`,
                    logColor: 'var(--text-dim)'
                });

                if (remaining === 0) {
                    steps.push({
                        type: 'base-zero',
                        remaining: remaining,
                        idx: -1,
                        num: '—',
                        path: pathStr,
                        digitsStates: getStates(-1),
                        panel: `<span style="color:var(--accent-green)">Base case: remaining == 0 → return <b>1</b></span>`,
                        statusText: `Return 1`,
                        log: `  remaining == 0 → return 1`,
                        logColor: 'var(--accent-green)'
                    });
                    return 1;
                }

                if (remaining < 0) {
                    steps.push({
                        type: 'base-negative',
                        remaining: remaining,
                        idx: -1,
                        num: '—',
                        path: pathStr,
                        digitsStates: getStates(-1),
                        panel: `<span style="color:var(--accent-red)">Base case: remaining &lt; 0 → return <b>0</b></span>`,
                        statusText: `Return 0`,
                        log: `  remaining &lt; 0 → return 0`,
                        logColor: 'var(--accent-red)'
                    });
                    return 0;
                }

                let total = 0;

                steps.push({
                    type: 'explore',
                    remaining: remaining,
                    idx: -1,
                    num: '—',
                    path: pathStr,
                    digitsStates: getStates(-1),
                    panel: `Try each number in nums for remaining <b>${remaining}</b>`,
                    statusText: `Trying all numbers`,
                    log: `  Try all nums`,
                    logColor: 'var(--accent-blue)'
                });

                for (let i = 0; i < n; i++) {
                    const num = numsArr[i];

                    steps.push({
                        type: 'choose',
                        remaining: remaining,
                        idx: i,
                        num: num,
                        path: pathStr,
                        digitsStates: getStates(i),
                        panel: `Choose <b>${num}</b> → recurse with <b>${remaining - num}</b>`,
                        statusText: `Trying ${num}`,
                        log: `    Choose ${num} → dfs(${remaining - num})`,
                        logColor: 'var(--accent-orange)'
                    });

                    const sub = simulate(remaining - num, [...path, num]);
                    total += sub;
                }

                steps.push({
                    type: 'return',
                    remaining: remaining,
                    idx: -1,
                    num: '—',
                    path: pathStr,
                    digitsStates: getStates(-1),
                    panel: `All choices tried.<br><span style="color:var(--accent-purple)">Total ways = <b>${total}</b></span>`,
                    statusText: `Return ${total}`,
                    log: `  Return ${total}`,
                    logColor: 'var(--accent-purple)'
                });

                return total;
            }

            const finalCount = simulate(inputTarget);

            steps.push({
                type: 'final',
                remaining: 0,
                idx: -1,
                num: '—',
                path: '—',
                digitsStates: numsArr.map(() => 'winning'),
                panel: `All recursive paths explored.<br><b>Number of ordered combinations = ${finalCount}</b>`,
                complete: true,
                result: finalCount,
                statusText: `Done. Combinations = ${finalCount}`,
                log: `\nFinal Result: ${finalCount}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            
            step.digitsStates.forEach((state, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                
                const tile = document.createElement('div');
                tile.className = `tile ${state}`;
                tile.innerText = numsArr[i];
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                
                wrapper.append(tile, idxLabel);

                if ((step.type === 'choose' || step.type === 'call') && step.idx === i) {
                    const ptrContainer = document.createElement('div');
                    ptrContainer.className = 'ptr-container';
                    ptrContainer.innerHTML = '<div class="ptr-arrow">↑</div><div class="ptr-num">NUM</div>';
                    wrapper.appendChild(ptrContainer);
                }

                container.appendChild(wrapper);
            });

            if ((step.type === 'choose' || step.type === 'call') && step.idx >= 0) {
                container.style.marginBottom = "45px";
            } else {
                container.style.marginBottom = "0px";
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-remaining').innerText = step.remaining !== undefined ? step.remaining : '—';
            document.getElementById('val-num').innerText = step.num !== undefined ? step.num : '—';
            document.getElementById('val-path').innerText = step.path !== undefined ? step.path : '—';
            document.getElementById('val-ways').innerText = step.total !== undefined ? step.total : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
