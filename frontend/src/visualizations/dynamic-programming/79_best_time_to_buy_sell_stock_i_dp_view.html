<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Time to Buy & Sell Stock I (DP view) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 280px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        /* ARRAY TILES */
        .array-container {
            display: flex;
            gap: 8px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .array-tile {
            min-width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--text-main);
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        .array-tile.current { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); }

        /* DP BAR */
        .dp-container { 
            margin-top: 20px;
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
            width: 920px;
            overflow-x: auto;
        }
        .dp-bar {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .dp-cell {
            min-width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); }
        .dp-cell.header { background: var(--bg-surface); color: var(--text-dim); font-size: 11px; height: 24px; }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 110px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">prices =</label>
        <input type="text" id="prices-input" value="7,1,5,3,6,4" style="width:280px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([7,1,5,3,6,4])">Ex 1 → 5</button>
        <button onclick="loadExample([7,6,4,3,1])">Ex 2 → 0</button>
        <button onclick="loadExample([1,2,3,4,5])">Ex 3 → 4</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Prices tiles (orange = current day)</div>
        <div id="array-container" class="array-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP / State bar — min_price so far | current profit | max_profit</div>
        <div class="dp-container" id="dp-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current day i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current price</span>
            <span class="info-value" id="val-price" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Min price so far</span>
            <span class="info-value" id="val-minprice" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current profit</span>
            <span class="info-value" id="val-profit" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Max profit</span>
            <span class="info-value" id="val-maxprofit" style="color: var(--accent-orange);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Maximum profit =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current day</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentPrices = [7,1,5,3,6,4];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];
        let minPriceHistory = [];
        let profitHistory = [];
        let maxProfitHistory = [];

        function init() {
            loadExample([7,1,5,3,6,4]);
        }

        function loadExample(prices) {
            currentPrices = prices;
            document.getElementById('prices-input').value = prices.join(',');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const pricesStr = document.getElementById('prices-input').value.trim();
            const prices = pricesStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (prices.length === 0) {
                alert("Please enter a valid prices array");
                return;
            }
            loadExample(prices);
        }

        function generateSteps() {
            steps = [];
            const prices = currentPrices;
            const n = prices.length;

            let minPrice = Infinity;
            let maxProfit = 0;
            minPriceHistory = [];
            profitHistory = [];
            maxProfitHistory = [];

            steps.push({
                type: 'init',
                i: -1,
                dpSnapshot: { minPrice: Infinity, maxProfit: 0 },
                panel: `Best Time to Buy & Sell Stock I — Greedy Single Pass O(n)<br>prices = [${prices.join(', ')}]`,
                statusText: `Initialize min_price = ∞, max_profit = 0`,
                log: `min_price = ∞, max_profit = 0`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 0; i < n; i++) {
                const price = prices[i];
                const oldMin = minPrice;
                minPrice = Math.min(minPrice, price);
                const profit = price - oldMin; // use previous min
                const oldMax = maxProfit;
                maxProfit = Math.max(maxProfit, Math.max(0, profit)); // profit can't be negative

                minPriceHistory.push(minPrice);
                profitHistory.push(profit);
                maxProfitHistory.push(maxProfit);

                steps.push({
                    type: 'update-day',
                    i: i,
                    dpSnapshot: { minPrice: minPrice, maxProfit: maxProfit, price: price, profit: profit },
                    panel: `Day ${i} price = ${price}<br>min_price = min(${oldMin}, ${price}) = ${minPrice}<br>profit = ${price} - ${oldMin} = ${profit}<br>max_profit = max(${oldMax}, ${profit}) = ${maxProfit}`,
                    statusText: `Day ${i}`,
                    log: `Day ${i}: price=${price}, min_price=${minPrice}, profit=${profit}, max_profit=${maxProfit}`,
                    logColor: 'var(--accent-green)'
                });
            }

            steps.push({
                type: 'final',
                i: n - 1,
                dpSnapshot: { minPrice: minPrice, maxProfit: maxProfit },
                panel: `All days processed.<br>Maximum profit = <span style="color:var(--accent-green)"><b>${maxProfit}</b></span>`,
                statusText: `Final answer = ${maxProfit}`,
                log: `\nFinal maximum profit = ${maxProfit}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: maxProfit
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render prices tiles
            const arrayContainer = document.getElementById('array-container');
            arrayContainer.innerHTML = '';
            const prices = currentPrices;
            for (let i = 0; i < prices.length; i++) {
                const tile = document.createElement('div');
                tile.className = `array-tile ${step.i === i ? 'current' : ''}`;
                tile.innerText = prices[i];
                arrayContainer.appendChild(tile);
            }

            // Render DP bar (min_price | max_profit)
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-bar"></div>`;
            const bar = dpContainer.querySelector('.dp-bar');

            // Header for min and max
            const header = document.createElement('div');
            header.style.display = 'flex';
            header.style.gap = '8px';
            const minHeader = document.createElement('div');
            minHeader.className = 'dp-cell header';
            minHeader.style.height = '24px';
            minHeader.textContent = 'min_price';
            header.appendChild(minHeader);
            const maxHeader = document.createElement('div');
            maxHeader.className = 'dp-cell header';
            maxHeader.style.height = '24px';
            maxHeader.textContent = 'max_profit';
            header.appendChild(maxHeader);
            bar.appendChild(header);

            // Current state row
            const row = document.createElement('div');
            row.style.display = 'flex';
            row.style.gap = '8px';
            const currentState = step.dpSnapshot || { minPrice: Infinity, maxProfit: 0 };
            const minCell = document.createElement('div');
            minCell.className = `dp-cell ${step.i !== -1 ? 'current' : ''}`;
            minCell.innerHTML = `<div>${currentState.minPrice === Infinity ? '∞' : currentState.minPrice}</div>`;
            row.appendChild(minCell);
            const maxCell = document.createElement('div');
            maxCell.className = `dp-cell ${step.i !== -1 ? 'current' : ''}`;
            maxCell.innerHTML = `<div>${currentState.maxProfit}</div>`;
            row.appendChild(maxCell);
            bar.appendChild(row);

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-price').innerText = step.i !== null ? currentPrices[step.i] : '—';
            document.getElementById('val-minprice').innerText = currentState.minPrice === Infinity ? '∞' : currentState.minPrice;
            document.getElementById('val-profit').innerText = step.i !== null ? currentState.profit : '—';
            document.getElementById('val-maxprofit').innerText = currentState.maxProfit;

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
