<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Robber I - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 240px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .houses-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 110px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile.rob { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.12); box-shadow: 0 0 12px var(--accent-green); }
        .tile.skip { background: #21262d; border-color: var(--accent-red); color: var(--text-dim); opacity: 0.6; }
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); transform: scale(1.15); }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        /* DP BAR */
        .dp-container { 
            margin-top: 20px;
            overflow-x: auto;
            max-width: 920px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .dp-bar {
            display: flex;
            gap: 4px;
            align-items: flex-end;
        }
        .dp-tile {
            min-width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            position: relative;
        }
        .dp-tile.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.08); box-shadow: 0 0 12px var(--accent-green); }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="nums-input" value="[1,2,3,1]" style="width:240px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,2,3,1])">Ex 1 (4)</button>
        <button onclick="loadExample([2,7,9,3,1])">Ex 2 (12)</button>
        <button onclick="loadExample([2,1,1,2])">Ex 3 (4)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Houses (green = robbed in optimal path, red = skipped)</div>
        <div class="houses-wrapper" id="houses-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP array dp[i] = max loot up to house i</div>
        <div id="dp-container" style="overflow-x:auto; max-width:920px;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current House i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Skip (dp[i-1])</span>
            <span class="info-value" id="val-skip" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Rob (nums[i] + dp[i-2])</span>
            <span class="info-value" id="val-rob" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">New dp[i]</span>
            <span class="info-value" id="val-dp" style="color: var(--accent-purple);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Maximum loot =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Robbed</div>
        <div class="legend-item"><span class="dot" style="background:#21262d; border:1px solid var(--accent-red)"></span> Skipped</div>
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current decision</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Past</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputNums = [1,2,3,1];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 400];

        function init() { loadExample([1,2,3,1]); }

        function loadExample(newNums) {
            inputNums = newNums;
            document.getElementById('nums-input').value = JSON.stringify(newNums);
            generateSteps();
            reset();
        }

        function loadCustom() {
            let nums;
            try {
                nums = JSON.parse(document.getElementById('nums-input').value);
            } catch(e) {
                alert("Please enter a valid array for nums, e.g. [1,2,3,1]");
                return;
            }
            if (Array.isArray(nums)) {
                loadExample(nums);
            } else {
                alert("Invalid input.");
            }
        }

        function generateSteps() {
            steps = [];
            const n = inputNums.length;
            let dp = new Array(n).fill(0);

            // STEP 0: INIT
            steps.push({
                type: 'init',
                i: null,
                dp: JSON.parse(JSON.stringify(dp)),
                panel: `House Robber I — Bottom-Up DP<br>nums = [${inputNums}]`,
                statusText: `Initializing DP table`,
                log: `dp[0..${n-1}] initialized to 0`,
                logColor: 'var(--text-dim)'
            });

            if (n === 0) {
                steps.push({
                    type: 'final',
                    i: null,
                    dp: dp,
                    panel: `No houses → Maximum loot = 0`,
                    statusText: `Final max = 0`,
                    log: `Empty array, return 0`,
                    logColor: 'var(--accent-green)',
                    complete: true,
                    result: 0
                });
                return;
            }

            // Base case i=0
            dp[0] = inputNums[0];
            steps.push({
                type: 'base',
                i: 0,
                dp: JSON.parse(JSON.stringify(dp)),
                panel: `Base: dp[0] = nums[0] = <span style="color:var(--accent-green)">${dp[0]}</span>`,
                statusText: `dp[0] = ${dp[0]}`,
                log: `dp[0] = ${dp[0]}`,
                logColor: 'var(--accent-green)'
            });

            if (n === 1) {
                steps.push({
                    type: 'final',
                    i: null,
                    dp: dp,
                    panel: `Only 1 house → Maximum loot = ${dp[0]}`,
                    statusText: `Final max = ${dp[0]}`,
                    log: `Single house, return ${dp[0]}`,
                    logColor: 'var(--accent-green)',
                    complete: true,
                    result: dp[0]
                });
                return;
            }

            // Base case i=1
            dp[1] = Math.max(inputNums[0], inputNums[1]);
            steps.push({
                type: 'base',
                i: 1,
                dp: JSON.parse(JSON.stringify(dp)),
                panel: `Base: dp[1] = max(nums[0], nums[1]) = <span style="color:var(--accent-green)">${dp[1]}</span>`,
                statusText: `dp[1] = ${dp[1]}`,
                log: `dp[1] = ${dp[1]}`,
                logColor: 'var(--accent-green)'
            });

            // Iterative updates
            for (let i = 2; i < n; i++) {
                const rob = inputNums[i] + dp[i-2];
                const skip = dp[i-1];
                const maxVal = Math.max(rob, skip);

                steps.push({
                    type: 'update',
                    i: i,
                    dp: JSON.parse(JSON.stringify(dp)),
                    panel: `House ${i} (value ${inputNums[i]})<br>Rob option: ${inputNums[i]} + dp[${i-2}] = ${rob}<br>Skip option: dp[${i-1}] = ${skip}<br><span style="color:var(--accent-green)">dp[${i}] = max(${rob}, ${skip}) = ${maxVal}</span>`,
                    statusText: `i=${i}`,
                    log: `i=${i}: max(${rob}, ${skip}) = ${maxVal}`,
                    logColor: 'var(--accent-green)'
                });

                dp[i] = maxVal;
            }

            // FINAL
            steps.push({
                type: 'final',
                i: null,
                dp: JSON.parse(JSON.stringify(dp)),
                panel: `All houses processed.<br>Maximum loot = <span style="color:var(--accent-green)"><b>${dp[n-1]}</b></span>`,
                statusText: `Final max loot = ${dp[n-1]}`,
                log: `\nFinal dp[${n-1}] = ${dp[n-1]}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: dp[n-1]
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render houses
            const housesContainer = document.getElementById('houses-container');
            housesContainer.innerHTML = '';
            inputNums.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                let cls = 'tile';
                if (step.i !== null && i === step.i) cls += ' candidate';
                else if (step.i !== null && i < step.i) cls += ' skip'; // approximate
                tile.className = cls;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = i;
                wrapper.append(tile, idxLabel);
                housesContainer.appendChild(wrapper);
            });

            // Render DP bar
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-bar"></div>`;
            const bar = dpContainer.querySelector('.dp-bar');
            const currentDP = step.dp;
            for (let i = 0; i < currentDP.length; i++) {
                const tile = document.createElement('div');
                tile.className = `dp-tile ${(step.i === i) ? 'current' : ''}`;
                tile.textContent = currentDP[i];
                bar.appendChild(tile);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-skip').innerText = step.i !== null && step.i >= 1 ? currentDP[step.i-1] : '—';
            document.getElementById('val-rob').innerText = step.i !== null && step.i >= 2 ? (inputNums[step.i] + currentDP[step.i-2]) : '—';
            document.getElementById('val-dp').innerText = step.i !== null ? currentDP[step.i] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
