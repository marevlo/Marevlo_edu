<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longest Common Subsequence (LCS) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 220px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: STRING TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 24px; width: 100%; max-width: 920px; }
        .string-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tile {
            min-width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile.current { border-color: var(--accent-orange); box-shadow: 0 0 12px rgba(227,179,65,0.4); transform: scale(1.12); }

        /* ROW 3: DP TABLE */
        .dp-wrapper {
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 16px;
            background: var(--bg-surface);
            width: 920px;
            overflow-x: auto;
        }
        .dp-table {
            display: grid;
            gap: 3px;
            font-family: monospace;
            font-size: 13px;
            border: 1px solid var(--border-main);
        }
        .dp-cell {
            width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-main); background: #21262d; border-radius: 4px; transition: all 0.3s ease;
            font-weight: 600;
        }
        .dp-cell.header { background: #000000; color: var(--accent-blue); font-size: 11px; height: 28px; }
        .dp-cell.current { background: #2a1600; border-color: var(--accent-orange); transform: scale(1.08); box-shadow: 0 0 12px rgba(227,179,65,0.5); }
        .dp-cell.match { background: #0f2a1a; color: var(--accent-green); }
        .dp-cell.value { color: var(--accent-green); }

        /* ROW 4: ACTION PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 720px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 5: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 6: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 7: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 8: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 9: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 10: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 100%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">s1 =</label>
        <input type="text" id="s1-input" value="ABCBDAB" style="width:210px">
        <label class="ui-label">s2 =</label>
        <input type="text" id="s2-input" value="BDCABA" style="width:210px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('ABCBDAB','BDCABA')">Ex 1 (4)</button>
        <button onclick="loadExample('ABC','AC')">Ex 2 (2)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">String 1:</div>
        <div class="string-row" id="s1-row"></div>
        
        <div class="ui-label" style="margin-top:18px">String 2:</div>
        <div class="string-row" id="s2-row"></div>

        <div class="ui-label" style="margin-top:30px">DP Table (LCS lengths for prefixes):</div>
        <div class="dp-wrapper">
            <div class="dp-table" id="dp-table"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">i (s1 prefix)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">j (s2 prefix)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">s1[i-1]</span>
            <span class="info-value" id="val-char1" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">s2[j-1]</span>
            <span class="info-value" id="val-char2" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">LCS length</span>
            <span class="info-value" id="val-lcs" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">LCS Length =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-green);"></span> Match (diagonal +1)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red);"></span> No match (max left/above)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange);"></span> Current cell</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let s1 = "ABCBDAB";
        let s2 = "BDCABA";
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 350];
        let dp = [];

        function generateSteps() {
            steps = [];
            const m = s1.length;
            const n = s2.length;
            
            // Initialize DP table
            dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));

            steps.push({
                type: 'init',
                i: 0,
                j: 0,
                panel: `Initialize DP table (m+1 = ${m+1} rows, n+1 = ${n+1} columns)<br>All values start at 0 (base case for empty prefixes)`,
                statusText: `DP table initialized`,
                log: `dp[0..${m}][0..${n}] = 0`,
                logColor: 'var(--accent-blue)',
                dpSnapshot: dp.map(row => [...row]),
                currentI: -1,
                currentJ: -1
            });

            // Fill first row and first column (already 0, but show explicitly)
            steps.push({
                type: 'base',
                i: 0,
                j: 0,
                panel: `Base cases: First row and first column are all 0<br>(empty prefix of any string has LCS length 0)`,
                statusText: `Base cases set`,
                log: `row 0 and col 0 = 0`,
                logColor: 'var(--accent-purple)',
                dpSnapshot: dp.map(row => [...row]),
                currentI: 0,
                currentJ: 0
            });

            // Fill the table
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    const char1 = s1[i-1];
                    const char2 = s2[j-1];
                    let newVal;

                    if (char1 === char2) {
                        newVal = dp[i-1][j-1] + 1;
                        steps.push({
                            type: 'match',
                            i: i,
                            j: j,
                            char1: char1,
                            char2: char2,
                            panel: `s1[${i-1}]='${char1}' == s2[${j-1}]='${char2}' → MATCH<br>dp[${i}][${j}] = dp[${i-1}][${j-1}] + 1 = ${dp[i-1][j-1]} + 1 = ${newVal}`,
                            statusText: `MATCH → ${newVal}`,
                            log: `match dp[${i}][${j}] = ${newVal}`,
                            logColor: 'var(--accent-green)',
                            dpSnapshot: dp.map(row => [...row]),
                            currentI: i,
                            currentJ: j
                        });
                    } else {
                        newVal = Math.max(dp[i-1][j], dp[i][j-1]);
                        steps.push({
                            type: 'no-match',
                            i: i,
                            j: j,
                            char1: char1,
                            char2: char2,
                            panel: `s1[${i-1}]='${char1}' != s2[${j-1}]='${char2}' → NO MATCH<br>dp[${i}][${j}] = max(dp[${i-1}][${j}], dp[${i}][${j-1}]) = max(${dp[i-1][j]}, ${dp[i][j-1]}) = ${newVal}`,
                            statusText: `NO MATCH → ${newVal}`,
                            log: `no-match dp[${i}][${j}] = ${newVal}`,
                            logColor: 'var(--accent-red)',
                            dpSnapshot: dp.map(row => [...row]),
                            currentI: i,
                            currentJ: j
                        });
                    }

                    // Update table
                    dp[i][j] = newVal;
                }
            }

            steps.push({
                type: 'final',
                complete: true,
                result: dp[m][n],
                panel: `Full DP table completed.<br><b>Longest Common Subsequence length = ${dp[m][n]}</b>`,
                statusText: `Done. LCS = ${dp[m][n]}`,
                log: `\nFinal LCS length: ${dp[m][n]}`,
                logColor: 'var(--accent-green)',
                bold: true,
                dpSnapshot: dp.map(row => [...row]),
                currentI: m,
                currentJ: n
            });
        }

        function renderStrings() {
            // Render s1 row
            const s1Container = document.getElementById('s1-row');
            s1Container.innerHTML = '';
            for (let i = 0; i < s1.length; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = s1[i];
                s1Container.appendChild(tile);
            }

            // Render s2 row
            const s2Container = document.getElementById('s2-row');
            s2Container.innerHTML = '';
            for (let j = 0; j < s2.length; j++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = s2[j];
                s2Container.appendChild(tile);
            }
        }

        function renderDPTable(currentStep) {
            const container = document.getElementById('dp-table');
            container.innerHTML = '';
            const rows = currentStep.dpSnapshot.length;
            const cols = currentStep.dpSnapshot[0].length;

            // Header row for s2
            const headerRow = document.createElement('div');
            headerRow.style.display = 'grid';
            headerRow.style.gridTemplateColumns = `repeat(${cols}, 52px)`;
            headerRow.style.gap = '3px';
            
            // Empty top-left cell
            let cell = document.createElement('div');
            cell.className = 'dp-cell header';
            cell.innerText = '';
            headerRow.appendChild(cell);
            
            // s2 characters header
            for (let j = 0; j < s2.length; j++) {
                cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.innerText = s2[j];
                headerRow.appendChild(cell);
            }
            container.appendChild(headerRow);

            // Data rows
            for (let i = 0; i < rows; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.style.display = 'grid';
                rowDiv.style.gridTemplateColumns = `repeat(${cols}, 52px)`;
                rowDiv.style.gap = '3px';
                
                // s1 character header for this row
                cell = document.createElement('div');
                cell.className = 'dp-cell header';
                if (i > 0) cell.innerText = s1[i-1];
                else cell.innerText = '';
                rowDiv.appendChild(cell);
                
                // Data cells
                for (let j = 0; j < cols; j++) {
                    cell = document.createElement('div');
                    cell.className = `dp-cell value ${currentStep.currentI === i && currentStep.currentJ === j ? 'current' : ''}`;
                    cell.innerText = currentStep.dpSnapshot[i][j];
                    rowDiv.appendChild(cell);
                }
                container.appendChild(rowDiv);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            renderStrings();
            renderDPTable(step);

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-i').innerText = step.currentI !== undefined && step.currentI >= 0 ? step.currentI : '—';
            document.getElementById('val-j').innerText = step.currentJ !== undefined && step.currentJ >= 0 ? step.currentJ : '—';
            document.getElementById('val-char1').innerText = step.char1 || '—';
            document.getElementById('val-char2').innerText = step.char2 || '—';
            document.getElementById('val-lcs').innerText = step.dpSnapshot && step.currentI !== undefined && step.currentJ !== undefined ? 
                step.dpSnapshot[step.currentI][step.currentJ] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        function loadCustom() {
            const s1Val = document.getElementById('s1-input').value.trim();
            const s2Val = document.getElementById('s2-input').value.trim();
            if (s1Val && s2Val) {
                s1 = s1Val;
                s2 = s2Val;
                generateSteps();
                reset();
            }
        }

        function loadExample(s1Val, s2Val) {
            s1 = s1Val;
            s2 = s2Val;
            document.getElementById('s1-input').value = s1Val;
            document.getElementById('s2-input').value = s2Val;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
