<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Different Palindromic Subsequences - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 240px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .string-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 110px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); }
        .tile.past { opacity: 0.35; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* DP GRID */
        .dp-container { 
            margin-top: 20px;
            overflow-x: auto;
            max-width: 920px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .dp-grid {
            display: grid;
            gap: 4px;
        }
        .dp-cell {
            min-width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            position: relative;
        }
        .dp-cell.header { background: var(--bg-surface); font-size: 12px; color: var(--text-dim); font-weight: normal; }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.08); box-shadow: 0 0 12px var(--accent-green); }

        /* PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">s =</label>
        <input type="text" id="s-input" value="aab" style="width:240px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('aab')">Ex 1 ("aab" → 4)</button>
        <button onclick="loadExample('aba')">Ex 2 ("aba" → 5)</button>
        <button onclick="loadExample('bccb')">Ex 3 ("bccb" → 6)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">String characters:</div>
        <div class="string-wrapper" id="string-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP Table dp[i][j] = distinct palindromic subsequences in s[i..j]</div>
        <div id="dp-container" style="overflow-x:auto; max-width:920px;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">i (start)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">j (end)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">s[i] == s[j]?</span>
            <span class="info-value" id="val-equal" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Count</span>
            <span class="info-value" id="val-count" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Total distinct palindromic subsequences =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current substring</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Updated cell</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border:1px solid var(--accent-blue)"></span> Matching endpoints</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Completed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputS = "aab";
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 400];

        function init() { loadExample("aab"); }

        function loadExample(newS) {
            inputS = newS;
            document.getElementById('s-input').value = newS;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = document.getElementById('s-input').value.trim();
            if (val.length > 0 && val.length <= 12) {
                loadExample(val);
            } else {
                alert("Please enter a string of length 1-12 for visualization (e.g. aab, aba, bccb)");
            }
        }

        function generateSteps() {
            steps = [];
            const s = inputS;
            const n = s.length;
            if (n === 0) return;

            const dp = Array.from({length: n}, () => Array(n).fill(0));

            // Precompute next and prev for each char
            const ALPH = 26;
            const nextOcc = Array.from({length: n + 1}, () => Array(ALPH).fill(n));
            const prevOcc = Array.from({length: n}, () => Array(ALPH).fill(-1));

            for (let i = n - 1; i >= 0; i--) {
                for (let c = 0; c < ALPH; c++) {
                    nextOcc[i][c] = nextOcc[i + 1][c];
                }
                const charIdx = s.charCodeAt(i) - 97;
                if (charIdx >= 0 && charIdx < ALPH) {
                    nextOcc[i][charIdx] = i;
                }
            }

            for (let i = 0; i < n; i++) {
                for (let c = 0; c < ALPH; c++) {
                    if (i > 0) prevOcc[i][c] = prevOcc[i - 1][c];
                }
                const charIdx = s.charCodeAt(i) - 97;
                if (charIdx >= 0 && charIdx < ALPH) {
                    prevOcc[i][charIdx] = i;
                }
            }

            // STEP 0: INIT
            steps.push({
                type: 'init',
                i: null,
                j: null,
                dp: JSON.parse(JSON.stringify(dp)),
                panel: `Count Distinct Palindromic Subsequences<br>s = "<b>${s}</b>", n = ${n}`,
                statusText: `Initializing DP table`,
                log: `s = "${s}"\nInitialize dp[i][i] = 1 for single characters`,
                logColor: 'var(--text-dim)'
            });

            // Base case single characters
            for (let i = 0; i < n; i++) {
                dp[i][i] = 1;
                steps.push({
                    type: 'base',
                    i: i,
                    j: i,
                    dp: JSON.parse(JSON.stringify(dp)),
                    panel: `Base case: dp[${i}][${i}] = 1 (single character "${s[i]}")`,
                    statusText: `dp[${i}][${i}] = 1`,
                    log: `dp[${i}][${i}] = 1`,
                    logColor: 'var(--accent-green)'
                });
            }

            // Fill by increasing length
            for (let len = 2; len <= n; len++) {
                for (let i = 0; i <= n - len; i++) {
                    const j = i + len - 1;

                    // Before computation step
                    steps.push({
                        type: 'before',
                        i: i,
                        j: j,
                        dp: JSON.parse(JSON.stringify(dp)),
                        panel: `Substring s[${i}..${j}] = "<b>${s.substring(i, j+1)}</b>"<br>s[i]="${s[i]}", s[j]="${s[j]}"`,
                        statusText: `Processing substring [${i},${j}]`,
                        log: `\n--- Length ${len}: i=${i}, j=${j} (${s.substring(i,j+1)}) ---`,
                        logColor: 'var(--accent-orange)'
                    });

                    let val;
                    if (s[i] === s[j]) {
                        const charIdx = s.charCodeAt(i) - 97;
                        let low = nextOcc[i + 1][charIdx];
                        let high = prevOcc[j - 1][charIdx];
                        const inner = (i + 1 <= j - 1) ? dp[i + 1][j - 1] : 0;

                        if (low > j || high < i) {
                            // No inner same char
                            val = (2 * inner + 2);
                        } else if (low === high) {
                            // Exactly one inner same char
                            val = (2 * inner + 1);
                        } else {
                            // Multiple inner
                            const subtract = (low + 1 <= high - 1) ? dp[low + 1][high - 1] : 0;
                            val = (2 * inner - subtract);
                        }
                    } else {
                        const left = (i + 1 <= j) ? dp[i + 1][j] : 0;
                        const right = (i <= j - 1) ? dp[i][j - 1] : 0;
                        const inter = (i + 1 <= j - 1) ? dp[i + 1][j - 1] : 0;
                        val = left + right - inter;
                    }

                    dp[i][j] = Math.max(0, val); // ensure non-negative

                    // After computation step
                    steps.push({
                        type: 'update',
                        i: i,
                        j: j,
                        dp: JSON.parse(JSON.stringify(dp)),
                        panel: `Computed dp[${i}][${j}] = <span style="color:var(--accent-green)"><b>${dp[i][j]}</b></span>`,
                        statusText: `dp[${i}][${j}] updated`,
                        log: `dp[${i}][${j}] = ${dp[i][j]}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            // FINAL
            steps.push({
                type: 'final',
                i: 0,
                j: n - 1,
                dp: JSON.parse(JSON.stringify(dp)),
                panel: `Complete.<br>Total distinct palindromic subsequences = <span style="color:var(--accent-green)"><b>${dp[0][n-1]}</b></span>`,
                statusText: `Final answer = ${dp[0][n-1]}`,
                log: `\nFinal dp[0][${n-1}] = ${dp[0][n-1]}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: dp[0][n-1]
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render string tiles
            const stringContainer = document.getElementById('string-container');
            stringContainer.innerHTML = '';
            inputS.split('').forEach((ch, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.i === i || step.j === i ? 'candidate' : (step.i !== null && i < step.i ? 'past' : 'idle')}`;
                tile.innerText = ch;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = i;
                wrapper.append(tile, idxLabel);
                stringContainer.appendChild(wrapper);
            });

            // Render DP table
            const n = inputS.length;
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-grid" style="grid-template-columns: repeat(${n + 1}, 62px);"></div>`;
            const grid = dpContainer.querySelector('.dp-grid');

            // Header row
            const headerRow = document.createElement('div');
            headerRow.style.display = 'contents';
            const empty = document.createElement('div');
            empty.className = 'dp-cell header';
            empty.textContent = '';
            headerRow.appendChild(empty);
            for (let j = 0; j < n; j++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.textContent = j;
                headerRow.appendChild(cell);
            }
            grid.appendChild(headerRow);

            // DP rows
            const currentDP = step.dp;
            for (let i = 0; i < n; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.style.display = 'contents';
                const rowHeader = document.createElement('div');
                rowHeader.className = 'dp-cell header';
                rowHeader.textContent = i;
                rowDiv.appendChild(rowHeader);

                for (let j = 0; j < n; j++) {
                    const cellVal = currentDP[i][j];
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${(step.i === i && step.j === j) ? 'current' : ''}`;
                    cell.textContent = cellVal;
                    if (i > j) cell.style.opacity = '0.3';
                    rowDiv.appendChild(cell);
                }
                grid.appendChild(rowDiv);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            if (step.i !== null && step.j !== null) {
                const eq = inputS[step.i] === inputS[step.j] ? 'Yes' : 'No';
                document.getElementById('val-equal').innerText = eq;
            } else {
                document.getElementById('val-equal').innerText = '—';
            }
            document.getElementById('val-count').innerText = step.i !== null && step.j !== null ? step.dp[step.i][step.j] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
