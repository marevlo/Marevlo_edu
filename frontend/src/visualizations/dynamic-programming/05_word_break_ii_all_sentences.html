<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Break II (all sentences) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 180px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: VISUALIZATION TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 900px; min-height: 80px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 20px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.word { background: #0d2244; border-color: var(--accent-blue); color: var(--accent-blue); transform: scale(1.1); }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); z-index: 3; }
        .tile.past { opacity: 0.35; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* Current path display */
        .path-display {
            margin-top: 10px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 10px 16px; min-height: 48px; font-family: monospace;
            font-size: 15px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; width: 720px; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; line-height: 1.5; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }

        /* Path list */
        .path-list {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            font-family: monospace;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">s =</label>
        <input type="text" id="s-input" value="catsanddog" style="width: 220px;">
        <label class="ui-label">wordDict =</label>
        <input type="text" id="dict-input" value='["cat","cats","and","sand","dog"]' style="width: 320px;">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('catsanddog', ['cat','cats','and','sand','dog'])">Ex 1</button>
        <button onclick="loadExample('pineapplepenapple', ['apple','pen','applepen','pine','pineapple'])">Ex 2</button>
        <button onclick="loadExample('abcd', ['a','ab','cd','abc'])">Ex 3</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">String s:</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
        
        <div class="ui-label" style="margin-top: 25px;">Current Path (words):</div>
        <div class="path-display" id="current-path">—</div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Start</span>
            <span class="info-value" id="val-start" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current End</span>
            <span class="info-value" id="val-end" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Word</span>
            <span class="info-value" id="val-word" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Valid Word?</span>
            <span class="info-value" id="val-valid" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Sentences Found</span>
            <span class="info-value" id="val-count" style="color: var(--accent-green);">0</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">All valid sentences:</span>
        <div id="res-val" style="font-size: 18px; line-height: 1.6; text-align: left; max-height: 160px; overflow-y: auto; width: 100%; background: var(--bg-surface); padding: 12px; border-radius: 6px; font-family: monospace;"></div>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current start</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border:1px solid var(--accent-blue)"></span> Checking prefix</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Valid word added</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputS = "catsanddog";
        let inputDict = ["cat","cats","and","sand","dog"];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];

        function init() { loadExample("catsanddog", ["cat","cats","and","sand","dog"]); }

        function loadExample(newS, newDict) {
            inputS = newS;
            inputDict = newDict;
            document.getElementById('s-input').value = inputS;
            document.getElementById('dict-input').value = JSON.stringify(inputDict);
            generateSteps();
            reset();
        }

        function loadCustom() {
            const sVal = document.getElementById('s-input').value.trim();
            let dictVal;
            try {
                dictVal = JSON.parse(document.getElementById('dict-input').value.trim());
            } catch(e) {
                dictVal = null;
            }
            if (sVal && Array.isArray(dictVal)) {
                loadExample(sVal, dictVal);
            } else {
                alert("Please enter valid s and wordDict array.");
            }
        }

        function generateSteps() {
            steps = [];
            const s = inputS;
            const wordDict = new Set(inputDict);
            const n = s.length;
            let results = [];

            // STEP 0: INIT
            steps.push({
                type: 'init',
                start: 0,
                end: 0,
                currentWord: '',
                path: [],
                results: [],
                panel: `Word Break II - Find <b>all</b> sentences by breaking "<b>${s}</b>" into dictionary words.<br>wordDict = <b>${JSON.stringify(inputDict)}</b>`,
                statusText: `Starting backtracking from index 0`,
                log: `s = "${s}"\nwordDict = ${JSON.stringify(inputDict)}\nStart backtracking at index 0`,
                logColor: 'var(--text-dim)'
            });

            function backtrack(start, path, stepCollector) {
                if (start === n) {
                    const sentence = path.join(' ');
                    results.push(sentence);
                    stepCollector.push({
                        type: 'complete',
                        start: start,
                        end: start,
                        currentWord: '',
                        path: [...path],
                        results: [...results],
                        panel: `Reached end of string!<br>Complete sentence found: <b>${sentence}</b>`,
                        statusText: `Found sentence: ${sentence}`,
                        log: `  ✓ Reached end → sentence: "${sentence}"`,
                        logColor: 'var(--accent-green)'
                    });
                    return;
                }

                stepCollector.push({
                    type: 'explore',
                    start: start,
                    end: start,
                    currentWord: '',
                    path: [...path],
                    results: [...results],
                    panel: `Backtracking at start = <b>${start}</b> (remaining: <b>${s.substring(start)}</b>)<br>Current path: <b>${path.join(' ')}</b>`,
                    statusText: `Exploring from index ${start}`,
                    log: `\n--- At start=${start} ---`,
                    logColor: 'var(--accent-orange)'
                });

                for (let end = start + 1; end <= n; end++) {
                    const word = s.substring(start, end);
                    stepCollector.push({
                        type: 'check',
                        start: start,
                        end: end,
                        currentWord: word,
                        path: [...path],
                        results: [...results],
                        panel: `Checking prefix <b>"${word}"</b> (indices ${start}:${end})`,
                        statusText: `Testing "${word}"`,
                        log: `  Checking s[${start}:${end}] = "${word}"`,
                        logColor: 'var(--accent-blue)'
                    });

                    if (wordDict.has(word)) {
                        path.push(word);
                        stepCollector.push({
                            type: 'add',
                            start: start,
                            end: end,
                            currentWord: word,
                            path: [...path],
                            results: [...results],
                            panel: `Valid word <b>"${word}"</b> found!<br>Added to path → <b>${path.join(' ')}</b><br>Recurse to index <b>${end}</b>`,
                            statusText: `Valid word "${word}"`,
                            log: `    ✓ Valid! Add "${word}" and recurse to ${end}`,
                            logColor: 'var(--accent-green)'
                        });
                        backtrack(end, path, stepCollector);
                        path.pop();
                        stepCollector.push({
                            type: 'backtrack',
                            start: start,
                            end: end,
                            currentWord: word,
                            path: [...path],
                            results: [...results],
                            panel: `Backtracked from word <b>"${word}"</b><br>Path restored: <b>${path.join(' ')}</b>`,
                            statusText: `Backtrack`,
                            log: `    ← Backtrack (removed "${word}")`,
                            logColor: 'var(--accent-red)'
                        });
                    }
                }
            }

            // Run the backtracking and capture all steps
            const stepCollector = [];
            backtrack(0, [], stepCollector);

            // Add the final result step
            stepCollector.push({
                type: 'final',
                start: n,
                end: n,
                currentWord: '',
                path: [],
                results: [...results],
                panel: `All possible sentences found!<br><b>${results.length}</b> sentences:<br>${results.map(r => `<b>${r}</b>`).join('<br>')}`,
                statusText: `Done. Found ${results.length} sentences`,
                log: `\nFinal results:\n${results.map(r => `  "${r}"`).join('\n')}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: results
            });

            steps = steps.concat(stepCollector);
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render string tiles
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            const s = inputS;
            for (let k = 0; k < s.length; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.start !== undefined && k >= step.start && k < step.end ? 'candidate' : (step.path && step.path.some(w => s.indexOf(w) === k) ? 'word' : 'idle')}`;
                tile.innerText = s[k];
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = k;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            }

            // Current path display
            const pathDisplay = document.getElementById('current-path');
            if (step.path && step.path.length > 0) {
                pathDisplay.innerHTML = `<span style="color:var(--accent-green)">Current path:</span> <span class="path-list">${step.path.map(w => `<span style="background:#0d2244;padding:2px 8px;border-radius:4px;">${w}</span>`).join(' ')}</span>`;
            } else {
                pathDisplay.innerHTML = '—';
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-start').innerText = step.start !== undefined ? step.start : '—';
            document.getElementById('val-end').innerText = step.end !== undefined ? step.end : '—';
            document.getElementById('val-word').innerText = step.currentWord || '—';
            document.getElementById('val-valid').innerHTML = step.type === 'add' || step.type === 'complete' ? '<span style="color:var(--accent-green)">YES</span>' : (step.type === 'check' ? 'checking...' : '—');
            document.getElementById('val-count').innerText = step.results ? step.results.length : 0;

            // Result display: list of sentences
            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerHTML = step.results.map(r => `<div style="margin-bottom:4px;">${r}</div>`).join('');
                resVal.className = 'pop';
            } else {
                resVal.innerHTML = step.results && step.results.length > 0 
                    ? `<span style="color:var(--text-dim)">Found so far:</span><br>${step.results.map(r => `<div>${r}</div>`).join('')}` 
                    : '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            // Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
