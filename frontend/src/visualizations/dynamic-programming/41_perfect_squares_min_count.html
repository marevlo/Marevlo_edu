<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Squares (min count) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 120px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: VISUAL TILES - DP Array */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 17px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* Squares List */
        .squares-list {
            margin-top: 10px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 8px 16px; width: 680px; display: flex; gap: 8px; flex-wrap: wrap;
        }
        .square-item {
            background: #21262d; border: 1px solid var(--border-main); border-radius: 4px;
            padding: 4px 10px; font-size: 13px; font-family: monospace;
        }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="number" id="n-input" placeholder="12" value="12">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(12)">Ex 1 (12)</button>
        <button onclick="loadExample(13)">Ex 2 (13)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label" id="arr-label">DP array (min squares for 0 to n):</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
        
        <div class="ui-label" style="margin-top: 20px;">Perfect squares ≤ n:</div>
        <div class="squares-list" id="squares-list"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Squares tried</span>
            <span class="info-value" id="val-squares" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Min found for i</span>
            <span class="info-value" id="val-min" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">Minimum number of perfect squares =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:2px solid var(--accent-orange)"></span> Current i</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:2px solid var(--accent-green)"></span> Updated min</div>
        <div class="legend-item"><span class="dot" style="background:#21262d;border:2px solid var(--border-main);opacity:0.5"></span> Previous</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputN = 12;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1500, 750, 350];

        function init() { loadExample(12); }

        function loadExample(nVal) {
            inputN = nVal;
            document.getElementById('n-input').value = nVal;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = parseInt(document.getElementById('n-input').value);
            if (!isNaN(val) && val >= 0) {
                inputN = val;
                generateSteps();
                reset();
            } else {
                alert("Please enter a valid non-negative integer for n.");
            }
        }

        function generateSteps() {
            steps = [];
            const n = inputN;
            let dp = new Array(n + 1).fill(Infinity);
            dp[0] = 0;

            steps.push({
                type: 'init',
                i: 0,
                dp: [...dp],
                panel: `Initialize dp[0] = 0<br>dp[1..${n}] = ∞`,
                statusText: `Start dp[0]=0`,
                log: `dp[0] = 0`,
                logColor: 'var(--text-dim)'
            });

            // Precompute squares
            let squares = [];
            let sq = 1;
            while (sq * sq <= n) {
                squares.push(sq * sq);
                sq++;
            }
            steps.push({
                type: 'squares',
                i: -1,
                dp: [...dp],
                squares: [...squares],
                panel: `Perfect squares ≤ ${n}: <b>${squares.join(', ')}</b>`,
                statusText: `Squares: ${squares.join(', ')}`,
                log: `Squares: ${squares.join(', ')}`,
                logColor: 'var(--accent-purple)'
            });

            for (let i = 1; i <= n; i++) {
                let minVal = Infinity;
                let bestSquare = -1;

                for (let sq of squares) {
                    if (sq > i) break;
                    const candidate = dp[i - sq] + 1;
                    if (candidate < minVal) {
                        minVal = candidate;
                        bestSquare = sq;
                    }
                }

                dp[i] = minVal;

                steps.push({
                    type: 'update',
                    i: i,
                    dp: [...dp],
                    bestSquare: bestSquare,
                    panel: `i = <b>${i}</b><br>Tried squares ≤ ${i}: ${squares.filter(s => s <= i).join(', ')}<br>Best: ${bestSquare} → dp[${i}] = <b>${minVal}</b>`,
                    statusText: `dp[${i}] = ${minVal}`,
                    log: `i=${i} → dp[${i}] = ${minVal}`,
                    logColor: 'var(--accent-green)'
                });
            }

            steps.push({
                type: 'final',
                i: n + 1,
                dp: [...dp],
                complete: true,
                result: dp[n],
                panel: `DP filled.<br><b>Minimum number of perfect squares = ${dp[n]}</b>`,
                statusText: `Done. Min = ${dp[n]}`,
                log: `\nFinal minimum: ${dp[n]}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // DP tiles
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            for (let k = 0; k <= inputN; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                const val = step.dp[k];
                tile.className = `tile ${k === step.i ? 'candidate' : (val !== Infinity ? 'done' : 'idle')}`;
                tile.innerText = val === Infinity ? '∞' : val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${k}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            }

            // Squares list
            const squaresList = document.getElementById('squares-list');
            squaresList.innerHTML = '';
            if (step.squares) {
                for (let sq of step.squares) {
                    const item = document.createElement('div');
                    item.className = 'square-item';
                    item.innerText = sq;
                    squaresList.appendChild(item);
                }
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-i').innerText = step.i !== undefined && step.i >= 0 ? step.i : '—';
            document.getElementById('val-squares').innerText = step.bestSquare ? `${step.bestSquare}` : '—';
            document.getElementById('val-min').innerText = step.dp && step.i >= 0 && step.dp[step.i] !== undefined ? step.dp[step.i] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
