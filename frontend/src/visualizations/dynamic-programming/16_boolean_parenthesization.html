<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boolean Parenthesization - Interval DP - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* running best / answer            */
            --accent-blue:   #06b6d4;   /* dependency sub-intervals / chrome*/
            --accent-green:  #22c55e;   /* committed dp value               */
            --accent-red:    #f43f5e;   /* invalid / lower triangle         */
            --accent-purple: #a855f7;   /* current cell dp[i][j]            */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 170px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; flex-shrink: 0; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }
        .narration .o { color: var(--accent-orange); font-weight: 700; }
        .narration .p { color: #d8b4fe; font-weight: 700; }
        .narration .g { color: #86efac; font-weight: 700; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); padding: 4px; }

        /* expression token row */
        .expr-stage { padding: 18px 22px 6px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .expr-cap { font-family: var(--mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.4px; }
        .expr-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .tok-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tok {
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-family: var(--mono); font-weight: 800; font-size: 18px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s, transform 0.3s, opacity 0.3s;
        }
        .tok.op { border-radius: 50%; color: var(--text-dim); font-size: 16px; }
        .tok.span { border-color: var(--accent-orange); background: rgba(245,165,36,0.14); color: #ffd591; box-shadow: 0 0 12px rgba(245,165,36,0.3); }
        .tok.bound { border-color: var(--accent-blue); background: rgba(6,182,212,0.14); color: #a5f3fc; box-shadow: 0 0 12px rgba(6,182,212,0.3); }
        .tok.kpop { border-color: var(--accent-purple); background: rgba(168,85,247,0.18); color: #e9d5ff; box-shadow: 0 0 18px rgba(168,85,247,0.55); transform: translateY(-4px) scale(1.08); }
        .tok-idx { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }

        .grid-stage { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; padding: 14px 22px 22px; display: flex; justify-content: center; }
        .grid-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .grid-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        .dp-grid { display: grid; gap: 5px; }
        .cell {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 9px; font-family: var(--mono); font-weight: 800; font-size: 13px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            width: 54px; height: 54px; will-change: transform; line-height: 1.15;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s, opacity 0.3s;
        }
        .cell .tf-t { color: #86efac; }
        .cell .tf-f { color: #fda4af; }
        .cell.head { border: none; background: transparent; color: var(--text-dim); font-size: 14px; font-weight: 800; box-shadow: none; }
        .cell.head.lit { color: var(--accent-purple); }
        .cell.head.lit2 { color: var(--accent-blue); }
        .cell.corner { background: transparent; border: none; box-shadow: none; color: var(--text-dim); font-size: 11px; font-weight: 600; }
        .cell.invalid { background: rgba(244,63,94,0.04); border-color: rgba(244,63,94,0.10); color: #4b5772; opacity: 0.45; }
        .cell.empty { color: var(--text-dim); background: rgba(255,255,255,0.02); }
        .cell.filled { background: rgba(34,197,94,0.07); border-color: rgba(34,197,94,0.22); }
        .cell.diag { box-shadow: inset 0 0 0 2px rgba(245,165,36,0.55); }
        .cell.dep { border-color: var(--accent-blue); background: rgba(6,182,212,0.14); box-shadow: 0 0 12px rgba(6,182,212,0.35); }
        .cell.best { border-color: var(--accent-orange); background: rgba(245,165,36,0.20); box-shadow: 0 0 18px rgba(245,165,36,0.5); }
        .cell.current { border-color: var(--accent-purple); background: rgba(168,85,247,0.18); box-shadow: 0 0 20px rgba(168,85,247,0.55), inset 0 0 12px rgba(168,85,247,0.12); transform: scale(1.06); z-index: 2; }
        .cell.answer { border-color: var(--accent-orange); background: linear-gradient(180deg, rgba(245,165,36,0.32), rgba(245,165,36,0.16)); box-shadow: 0 0 22px rgba(245,165,36,0.6); transform: scale(1.06); z-index: 2; }

        .action-stage { position: relative; min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 6px; align-items: center; min-height: 40px; }
        .ans-tile { min-width: 50px; height: 44px; padding: 0 10px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 22px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 14px rgba(245,165,36,0.4); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.len b { color: var(--accent-orange); } .pill.c b { color: var(--accent-purple); } .pill.k b { color: var(--accent-blue); } .pill.g b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">expr =</label>
        <input type="text" id="expr-input" value="T|F&amp;T" maxlength="31">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">T|F&amp;T &rarr; 2</button>
        <button onclick="loadExample(1)">T^F &rarr; 1</button>
        <button onclick="loadExample(2)">T|T&amp;F^T &rarr; 4</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Boolean Parenthesization <span class="sub">&middot; Interval DP &middot; T[i][j] = &sum;<sub>k</sub> combine<sub>op<sub>k</sub></sub>( L , R ) &middot; O(n&sup3;)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="expr-stage">
                    <div class="expr-cap">symbols at even indices &middot; operators at odd indices &middot; <code style="color:#d8b4fe">k</code> = split operator joining left &amp; right</div>
                    <div class="expr-row" id="expr-row"></div>
                </div>
                <div class="grid-stage" id="grid-stage">
                    <div class="dp-grid" id="dp-grid"></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill len">len <b id="st-len">&mdash;</b></span>
                            <span class="pill c">i <b id="st-i">&mdash;</b></span>
                            <span class="pill c">j <b id="st-j">&mdash;</b></span>
                            <span class="pill k">split k <b id="st-k">&mdash;</b></span>
                            <span class="pill g">T[i][j] <b id="st-best">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm &middot; interval DP (len &rarr; i &rarr; k)</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // --------- Motion engine (spring pop, zero deps) ---------
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.4 + 0.66 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // --------- State ---------
        // We work over SYMBOL positions s (s = 0,1,...,m-1), where symbol s lives
        // at character index 2*s, and operator between symbol s and s+1 at index 2*s+1.
        // dp cell (i,j) over symbols holds (T,F) = #parenthesizations evaluating to True/False.
        // Fill by interval length (j - i), shortest first (diagonal sweep).
        // Recurrence: split at operator op between symbols k and k+1 (i <= k < j):
        //   combine L=(T[i][k],F[i][k]) with R=(T[k+1][j],F[k+1][j]) by op, sum over k.
        // Answer = T[0][m-1].
        let inputExpr = "T|F&T";
        let chars = ['T','|','F','&','T'];   // raw character tokens
        let syms = ['T','F','T'];            // symbol values
        let ops = ['|','&'];                 // operator between sym s and s+1
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 720, 330];
        const cellEls = {};   // 'gr,gc' -> element
        const EXAMPLES = ["T|F&T", "T^F", "T|T&F^T"];

        const CODE = [
            [['kw','def '],['fn','count'],['src','(syms, ops):']],
            [['src','  m = len(syms)']],
            [['src','  for s: T[s][s], F[s][s] = (1,0) if syms[s]=="T" else (0,1)']],
            [['kw','  for '],['src','length in 1..m-1:        # interval gap, diagonal sweep']],
            [['kw','    for '],['src','i in 0..m-1-length:']],
            [['src','      j = i + length;  T[i][j]=F[i][j]=0']],
            [['kw','      for '],['src','k in i..j-1:           # split operator ops[k]']],
            [['src','        L=(T[i][k],F[i][k]); R=(T[k+1][j],F[k+1][j])']],
            [['src','        t,f = combine(ops[k], L, R)']],
            [['src','        T[i][j]+=t;  F[i][j]+=f']],
            [['kw','  return '],['src','T[0][m-1]']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // combine left (lt,lf) with right (rt,rf) via op -> (true, false)
        function combine(op, lt, lf, rt, rf) {
            if (op === '&') return [lt * rt, lt * rf + lf * rt + lf * rf];
            if (op === '|') return [lt * rt + lt * rf + lf * rt, lf * rf];
            // '^'
            return [lt * rf + lf * rt, lt * rt + lf * rf];
        }

        // char index of symbol s
        const symCharIdx = (s) => 2 * s;
        // char index of operator ops[k] (between symbol k and k+1)
        const opCharIdx = (k) => 2 * k + 1;

        // --------- step generation (immutable snapshots) ---------
        function deepCopy(g) { return g.map(row => row.slice()); }
        function generateSteps() {
            steps = [];
            chars = inputExpr.split('');
            syms = []; ops = [];
            for (let c = 0; c < chars.length; c++) {
                if (c % 2 === 0) syms.push(chars[c]); else ops.push(chars[c]);
            }
            const m = syms.length;
            const T = Array.from({ length: m }, () => Array(m).fill(0));
            const F = Array.from({ length: m }, () => Array(m).fill(0));

            const snap = (extra) => Object.assign({
                T: deepCopy(T), F: deepCopy(F), m,
                len: null, i: null, j: null, k: null,
                current: null, deps: [], bestCell: null, best: null,
                diag: [], filled: [], kpop: null, answer: null, complete: false
            }, extra);

            const committed = [];                 // (i,j) symbol-intervals with value set
            const recordFilled = () => committed.slice();

            // base case: single symbols (diagonal)
            const baseCells = [];
            for (let s = 0; s < m; s++) {
                const isT = syms[s] === 'T';
                T[s][s] = isT ? 1 : 0; F[s][s] = isT ? 0 : 1;
                committed.push([s, s]); baseCells.push([s, s]);
            }
            steps.push(snap({
                len: 0, code: [0, 1, 2], action: 'BASE CASE', actionColor: 'var(--accent-blue)',
                panel: `Boolean Parenthesization on <code>${inputExpr}</code>. Each interval <code>(i,j)</code> over symbols stores <code>(<span class="g">T</span>,<span class="o">F</span>)</code> = ways it parenthesizes to True / False. Base diagonal: <code>T</code>&#8594;<code>(1,0)</code>, <code>F</code>&#8594;<code>(0,1)</code>. Answer = <code>T[0][${m - 1}]</code>.`,
                log: `init  ${m} symbols: [${syms.join(',')}]   ops: [${ops.join(',')}]\nbase  single symbols: T->(1,0), F->(0,1)`,
                diag: baseCells, filled: recordFilled()
            }));

            // diagonal sweep by interval LENGTH
            for (let length = 1; length <= m - 1; length++) {
                const diagCells = [];
                for (let i = 0; i + length <= m - 1; i++) diagCells.push([i, i + length]);

                steps.push(snap({
                    len: length, code: [3], action: `DIAGONAL len = ${length}`, actionColor: 'var(--accent-orange)',
                    panel: `Sweep interval length <span class="o">${length}</span> &#8212; the diagonal where <code>j &minus; i = ${length}</code>. Shortest intervals are solved first, so every sub&middot;interval is ready before a longer one needs it.`,
                    log: `\n===== length ${length}  (diagonal j-i=${length}) =====`,
                    diag: diagCells, filled: recordFilled()
                }));

                for (let i = 0; i + length <= m - 1; i++) {
                    const j = i + length;

                    steps.push(snap({
                        len: length, i, j, code: [4, 5], action: `interval (${i}, ${j})`, actionColor: 'var(--accent-purple)',
                        panel: `Fill <code>(<span class="p">${i}</span>,<span class="p">${j}</span>)</code> = symbols <code>${syms.slice(i, j + 1).join('')}</code>. Reset <code>(T,F)=(0,0)</code>, then sum every split operator <code>k</code> joining a left and right sub&middot;interval.`,
                        log: `--- (${i},${j}) = "${syms.slice(i, j + 1).join('')}" ---`,
                        current: [i, j], diag: diagCells, filled: recordFilled()
                    }));

                    let accT = 0, accF = 0, bestK = null, bestKContribT = -1;
                    for (let k = i; k < j; k++) {
                        const op = ops[k];
                        const lt = T[i][k], lf = F[i][k];
                        const rt = T[k + 1][j], rf = F[k + 1][j];
                        const [ct, cf] = combine(op, lt, lf, rt, rf);
                        accT += ct; accF += cf;
                        const improved = ct > bestKContribT;
                        if (improved) { bestKContribT = ct; bestK = k; }

                        steps.push(snap({
                            len: length, i, j, k, best: accT,
                            code: [6, 7, 8, 9], action: `split k=${k} '${op}' &rarr; +${ct}T`,
                            actionColor: 'var(--accent-blue)',
                            panel: `Split at operator <code>'${op}'</code> (between symbols <span class="p">${k}</span> and <span class="p">${k + 1}</span>). Left <code>(${i},${k})=(<span class="g">${lt}</span>,<span class="o">${lf}</span>)</code>, Right <code>(${k + 1},${j})=(<span class="g">${rt}</span>,<span class="o">${rf}</span>)</code> &#8594; combine&#8202;<code>'${op}'</code> = <code>(<span class="g">${ct}</span>,<span class="o">${cf}</span>)</code>. Running total <code>(T,F)=(<b>${accT}</b>,${accF})</code>.`,
                            log: `  k=${k} '${op}': L(${lt},${lf}) R(${rt},${rf}) -> (${ct},${cf})   acc=(${accT},${accF})`,
                            current: [i, j], deps: [[i, k], [k + 1, j]], kpop: opCharIdx(k),
                            bestCell: [i, j], diag: diagCells, filled: recordFilled()
                        }));
                    }

                    T[i][j] = accT; F[i][j] = accF;
                    committed.push([i, j]);

                    steps.push(snap({
                        len: length, i, j, k: bestK, best: accT,
                        code: [9], action: `(${i},${j}) = (${accT}T, ${accF}F)`, actionColor: 'var(--accent-green)',
                        panel: `Commit <code>(<span class="p">${i}</span>,<span class="p">${j}</span>) = (<span class="g">${accT}</span>,<span class="o">${accF}</span>)</code> &#8212; <b>${accT}</b> parenthesizations of <code>${syms.slice(i, j + 1).join('')}</code> evaluate True. Solved block for longer intervals.`,
                        log: `(${i},${j}) = (T=${accT}, F=${accF})`,
                        current: [i, j], bestCell: [i, j], diag: diagCells, filled: recordFilled()
                    }));
                }
            }

            const result = m > 0 ? T[0][m - 1] : 0;
            steps.push(snap({
                complete: true, confetti: true, code: [10], answer: result, best: result,
                action: `✓ ${result} true ways`, actionColor: 'var(--accent-green)',
                len: m - 1, i: 0, j: m - 1, bestCell: [0, m - 1],
                panel: `Done. The full interval <code>T[0][${m - 1}]</code> counts every way to parenthesize <code>${inputExpr}</code> to True &#8594; <b>${result}</b>.`,
                log: `\ndone  T[0][${m - 1}] = ${result}`,
                filled: recordFilled()
            }));
        }

        // --------- render (persistent DOM) ---------
        function buildSkeleton() {
            const erow = document.getElementById('expr-row'); erow.innerHTML = '';
            chars.forEach((ch, c) => {
                const unit = document.createElement('div'); unit.className = 'tok-unit';
                const t = document.createElement('div'); t.className = 'tok'; t.dataset.ci = c; t.textContent = ch;
                const lab = document.createElement('div'); lab.className = 'tok-idx';
                if (c % 2 === 0) { lab.textContent = 's' + (c / 2); }
                else { t.classList.add('op'); lab.textContent = 'op' + ((c - 1) / 2); }
                unit.append(t, lab); erow.appendChild(unit);
            });
        }
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const m = step.m;
            const grid = document.getElementById('dp-grid');
            const rows = m + 1, cols = m + 1;     // +1 header row/col
            grid.style.gridTemplateColumns = `repeat(${cols}, 54px)`;

            const depSet = new Set((step.deps || []).map(d => d[0] + ',' + d[1]));
            const diagSet = new Set((step.diag || []).map(d => d[0] + ',' + d[1]));
            const filledSet = new Set((step.filled || []).map(d => d[0] + ',' + d[1]));
            const curKey = step.current ? step.current[0] + ',' + step.current[1] : null;
            const bestKey = step.bestCell ? step.bestCell[0] + ',' + step.bestCell[1] : null;
            const answerKey = '0,' + (m - 1);
            const used = new Set();

            for (let gr = 0; gr < rows; gr++) {
                for (let gc = 0; gc < cols; gc++) {
                    const key = gr + ',' + gc; used.add(key);
                    let el = cellEls[key];
                    if (!el) { el = document.createElement('div'); el.className = 'cell'; cellEls[key] = el; grid.appendChild(el); }
                    let cls = 'cell', html = '', isDpCell = false, popable = false;

                    if (gr === 0 && gc === 0) { cls += ' corner'; html = 'i\\j'; }
                    else if (gc === 0) {
                        cls += ' head'; html = String(gr - 1);
                        if (step.i === gr - 1) cls += ' lit';
                    } else if (gr === 0) {
                        cls += ' head'; html = String(gc - 1);
                        if (step.j === gc - 1) cls += ' lit2';
                    } else {
                        isDpCell = true;
                        const dr = gr - 1, dc = gc - 1, dpKey = dr + ',' + dc;
                        const valid = dc >= dr;
                        const isFilled = filledSet.has(dpKey);
                        if (!valid) { cls += ' invalid'; html = ''; }
                        else if (isFilled) {
                            cls += ' filled';
                            html = `<span class="tf-t">${step.T[dr][dc]}</span><span class="tf-f">${step.F[dr][dc]}</span>`;
                            popable = true;
                        } else { cls += ' empty'; html = '&middot;'; }

                        if (diagSet.has(dpKey)) cls += ' diag';
                        if (depSet.has(dpKey)) cls += ' dep';
                        if (bestKey === dpKey && !step.complete) cls += ' best';
                        if (curKey === dpKey) cls += ' current';
                        if (step.complete && dpKey === answerKey) cls += ' answer';
                    }

                    const prev = el.dataset.val || '';
                    el.className = cls;
                    el.innerHTML = html;
                    el.dataset.val = html;
                    if (isDpCell && popable && prev !== html) Motion.pop(el);
                }
            }
            Object.keys(cellEls).forEach(k => { if (!used.has(k)) { cellEls[k].remove(); delete cellEls[k]; } });

            // expression highlight: bound = symbols i and j, span = symbols between, kpop = split operator char
            document.querySelectorAll('.tok').forEach(t => {
                const ci = +t.dataset.ci;
                t.classList.remove('span', 'bound', 'kpop');
                if (step.i !== null && ci % 2 === 0) {
                    const s = ci / 2;
                    if (s === step.i || s === step.j) t.classList.add('bound');
                    else if (s > step.i && s < step.j) t.classList.add('span');
                }
                if (step.kpop != null && ci === step.kpop) t.classList.add('kpop');
            });

            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.complete && step.answer != null) {
                const t = document.createElement('div'); t.className = 'ans-tile'; t.textContent = step.answer; at.appendChild(t);
            }

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.innerHTML = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            document.getElementById('st-len').textContent = step.len != null ? step.len : '—';
            document.getElementById('st-i').textContent = step.i != null ? step.i : '—';
            document.getElementById('st-j').textContent = step.j != null ? step.j : '—';
            document.getElementById('st-k').textContent = step.k != null ? step.k : '—';
            document.getElementById('st-best').textContent = step.best != null ? step.best : '—';

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // --------- controls ---------
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() { Object.keys(cellEls).forEach(k => { cellEls[k].remove(); delete cellEls[k]; }); confettiArmed = true; }
        function loadExpr(expr) {
            pause(); inputExpr = expr; clearDom(); generateSteps(); buildSkeleton(); renderStep(0);
        }
        // validate: alternating symbol(T/F) operator(& | ^), odd length, >=1 symbol
        function validExpr(s) {
            if (!s || s.length === 0 || s.length % 2 === 0) return false;
            for (let c = 0; c < s.length; c++) {
                if (c % 2 === 0) { if (s[c] !== 'T' && s[c] !== 'F') return false; }
                else { if (s[c] !== '&' && s[c] !== '|' && s[c] !== '^') return false; }
            }
            return ((s.length + 1) / 2) <= 7;   // up to 7 symbols
        }
        function loadCustom() {
            const raw = document.getElementById('expr-input').value.replace(/\s+/g, '').toUpperCase();
            if (validExpr(raw)) { document.getElementById('expr-input').value = raw; loadExpr(raw); }
            else document.getElementById('main-panel').innerHTML = 'Enter an expression of T/F symbols joined by <code>&amp; | ^</code>, e.g. <code>T|F&amp;T</code> (up to 7 symbols).';
        }
        function loadExample(n) {
            const ex = EXAMPLES[n];
            document.getElementById('expr-input').value = ex;
            loadExpr(ex);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('expr-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
