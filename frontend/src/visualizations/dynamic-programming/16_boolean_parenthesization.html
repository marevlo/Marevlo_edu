<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boolean Parenthesization - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 200px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 20px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.failed { background: #2a0d0d; border-color: var(--accent-red); color: var(--accent-red); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-red); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* Pointers */
        .ptr-container { display: flex; flex-direction: column; align-items: center; position: absolute; bottom: -50px; gap: 2px; font-size: 12px; font-family: monospace; font-weight: bold; transition: all 0.3s; width: 100%; text-align: center; }
        .ptr-left { color: var(--accent-orange); }
        .ptr-right { color: var(--accent-blue); }
        .ptr-arrow { font-size: 16px; line-height: 10px; margin-bottom: 2px; color: var(--text-dim); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 40px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-red); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">expr =</label>
        <input type="text" id="expr-input" placeholder="T|F&T" value="T|F&T">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('T|F&T')">Ex 1 (T|F&T)</button>
        <button onclick="loadExample('T^F')">Ex 2 (T^F)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label" id="arr-label">Boolean Expression:</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Left True</span>
            <span class="info-value" id="val-left-true" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Left False</span>
            <span class="info-value" id="val-left-false" style="color: var(--accent-red);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Right True</span>
            <span class="info-value" id="val-right-true" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Right False</span>
            <span class="info-value" id="val-right-false" style="color: var(--accent-red);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Operator</span>
            <span class="info-value" id="val-op" style="color: var(--accent-blue);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">true ways =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current Split</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> True Count</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red); border:1px solid var(--accent-red)"></span> False Count</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputExpr = "T|F&T";
        let charsArr = [];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample("T|F&T"); }

        function loadExample(newExpr) {
            inputExpr = newExpr;
            document.getElementById('expr-input').value = inputExpr;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('expr-input').value.trim();
            if (valStr.length > 0) {
                loadExample(valStr);
            } else {
                alert("Please enter a valid boolean expression.");
            }
        }

        function generateSteps() {
            steps = [];
            charsArr = inputExpr.split('');

            function getStates(start, end, highlightK = -1) {
                return charsArr.map((_, idx) => {
                    if (idx >= start && idx <= end) {
                        if (idx === highlightK) return 'candidate';
                        return 'candidate';
                    }
                    return 'done';
                });
            }

            function simulate(start, end) {
                const subExpr = inputExpr.substring(start, end + 1);
                steps.push({
                    type: 'call',
                    start: start,
                    end: end,
                    digitsStates: getStates(start, end),
                    panel: `Call <code>count(${start}, ${end})</code> → <b>${subExpr}</b>`,
                    statusText: `Subexpr: ${subExpr}`,
                    log: `Call count(${start}, ${end})`,
                    logColor: 'var(--text-dim)'
                });

                if (start === end) {
                    const isTrue = charsArr[start] === 'T';
                    steps.push({
                        type: 'base',
                        start: start,
                        end: end,
                        digitsStates: getStates(start, end),
                        panel: `<span style="color:${isTrue ? 'var(--accent-green)' : 'var(--accent-red)'}">Base case: single symbol <b>${charsArr[start]}</b> → ${isTrue ? 'true=1, false=0' : 'true=0, false=1'}</span>`,
                        statusText: isTrue ? "Return true=1" : "Return false=1",
                        log: `  Base: ${charsArr[start]} → ${isTrue ? '(1,0)' : '(0,1)'}`,
                        logColor: isTrue ? 'var(--accent-green)' : 'var(--accent-red)'
                    });
                    return isTrue ? [1, 0] : [0, 1];
                }

                let totalTrue = 0;
                let totalFalse = 0;

                // Find all operators
                for (let k = start + 1; k < end; k += 2) {
                    const op = charsArr[k];
                    const left = simulate(start, k - 1);
                    const right = simulate(k + 1, end);

                    const leftTrue = left[0];
                    const leftFalse = left[1];
                    const rightTrue = right[0];
                    const rightFalse = right[1];

                    steps.push({
                        type: 'split',
                        start: start,
                        end: end,
                        k: k,
                        digitsStates: getStates(start, end, k),
                        panel: `Split at operator <b>${op}</b> (pos ${k})<br>Left: ${inputExpr.substring(start, k)} (${leftTrue}T, ${leftFalse}F)<br>Right: ${inputExpr.substring(k+1, end+1)} (${rightTrue}T, ${rightFalse}F)`,
                        statusText: `Split at ${op}`,
                        log: `  Split at ${op} (k=${k})`,
                        logColor: 'var(--accent-orange)'
                    });

                    let combTrue = 0;
                    let combFalse = 0;

                    if (op === '&') {
                        combTrue = leftTrue * rightTrue;
                        combFalse = leftTrue * rightFalse + leftFalse * rightTrue + leftFalse * rightFalse;
                    } else if (op === '|') {
                        combTrue = leftTrue * rightTrue + leftTrue * rightFalse + leftFalse * rightTrue;
                        combFalse = leftFalse * rightFalse;
                    } else if (op === '^') {
                        combTrue = leftTrue * rightFalse + leftFalse * rightTrue;
                        combFalse = leftTrue * rightTrue + leftFalse * rightFalse;
                    }

                    totalTrue += combTrue;
                    totalFalse += combFalse;

                    steps.push({
                        type: 'combine',
                        start: start,
                        end: end,
                        k: k,
                        digitsStates: getStates(start, end, k),
                        panel: `<span style="color:var(--accent-purple)">Operator <b>${op}</b> → true = ${combTrue}, false = ${combFalse}</span>`,
                        statusText: `Combine ${op}`,
                        log: `    ${op} → true=${combTrue}, false=${combFalse}`,
                        logColor: 'var(--accent-purple)'
                    });
                }

                steps.push({
                    type: 'return',
                    start: start,
                    end: end,
                    digitsStates: getStates(start, end),
                    panel: `All splits done.<br><span style="color:var(--accent-green)">Total true = <b>${totalTrue}</b>, false = ${totalFalse}</span>`,
                    statusText: `Return true=${totalTrue}`,
                    log: `  Return (${totalTrue}, ${totalFalse})`,
                    logColor: 'var(--accent-green)'
                });

                return [totalTrue, totalFalse];
            }

            const finalCounts = simulate(0, charsArr.length - 1);
            const finalTrue = finalCounts[0];

            steps.push({
                type: 'final',
                start: 0,
                end: charsArr.length - 1,
                digitsStates: charsArr.map(() => 'winning'),
                panel: `All parenthesizations evaluated.<br><b>True ways = ${finalTrue}</b>`,
                complete: true,
                result: finalTrue,
                statusText: `Done. True evaluations = ${finalTrue}`,
                log: `\nFinal Result: ${finalTrue}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            
            step.digitsStates.forEach((state, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                
                const tile = document.createElement('div');
                tile.className = `tile ${state}`;
                tile.innerText = charsArr[i];
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                
                wrapper.append(tile, idxLabel);

                if (step.k !== undefined && step.k === i) {
                    const ptrContainer = document.createElement('div');
                    ptrContainer.className = 'ptr-container';
                    ptrContainer.innerHTML = '<div class="ptr-arrow">↑</div><div class="ptr-left">OP</div>';
                    wrapper.appendChild(ptrContainer);
                }

                container.appendChild(wrapper);
            });

            if (step.start !== undefined && step.end !== undefined) {
                container.style.marginBottom = "45px";
            } else {
                container.style.marginBottom = "0px";
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-left-true').innerText = step.leftTrue !== undefined ? step.leftTrue : '—';
            document.getElementById('val-left-false').innerText = step.leftFalse !== undefined ? step.leftFalse : '—';
            document.getElementById('val-right-true').innerText = step.rightTrue !== undefined ? step.rightTrue : '—';
            document.getElementById('val-right-false').innerText = step.rightFalse !== undefined ? step.rightFalse : '—';
            document.getElementById('val-op').innerText = step.op !== undefined ? step.op : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
