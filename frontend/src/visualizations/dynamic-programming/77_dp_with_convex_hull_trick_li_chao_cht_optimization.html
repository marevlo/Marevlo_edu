<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP with Convex Hull Trick / Li Chao - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* answer / best                  */
            --accent-blue:   #06b6d4;   /* dependency / chrome            */
            --accent-green:  #22c55e;   /* winning line / chosen          */
            --accent-red:    #f43f5e;   /* discarded                      */
            --accent-purple: #a855f7;   /* current cell being filled      */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 960px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 110px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); padding: 22px; }

        .stage-grid { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 22px; align-items: start; }
        @media (max-width: 760px) { .stage-grid { grid-template-columns: 1fr; } }

        .row-label { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }

        /* dp array row */
        .dp-board { display: flex; flex-direction: column; }
        .cell-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .col { display: flex; flex-direction: column; align-items: center; }
        .cell {
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-family: var(--mono); font-weight: 800; font-size: 17px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            width: 50px; height: 50px; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s;
        }
        .idx-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 5px; transition: color 0.3s; }
        .idx-label.lit { color: var(--accent-purple); }
        .dp-cell.empty   { color: var(--text-dim); background: rgba(255,255,255,0.02); border-style: dashed; }
        .dp-cell.filled  { color: #cfe9f5; }
        .dp-cell.base    { border-color: rgba(34,197,94,0.45); color: #bbf7d0; background: rgba(34,197,94,0.08); }
        .dp-cell.current { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 20px rgba(168,85,247,0.55), inset 0 0 12px rgba(168,85,247,0.12); transform: scale(1.06); z-index: 2; }
        .dp-cell.best    { border-color: var(--accent-orange); background: rgba(245,165,36,0.20); color: #ffd591; box-shadow: 0 0 18px rgba(245,165,36,0.5); }

        /* envelope plot */
        .plot-wrap { position: relative; }
        .plot-svg { width: 100%; height: 260px; display: block; border-radius: 10px; background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.05); }
        .grid-line { stroke: rgba(255,255,255,0.06); stroke-width: 1; }
        .axis-line { stroke: rgba(255,255,255,0.18); stroke-width: 1.2; }
        .axis-label { fill: var(--text-dim); font-family: var(--mono); font-size: 10px; }
        .env-line { fill: none; stroke-width: 2; opacity: 0.32; transition: opacity 0.3s, stroke-width 0.3s; }
        .env-line.active { opacity: 1; stroke-width: 3; filter: drop-shadow(0 0 5px rgba(34,197,94,0.6)); }
        .env-line.dimmed { opacity: 0.14; }
        .query-x { stroke: var(--accent-purple); stroke-width: 1.5; stroke-dasharray: 4 4; opacity: 0; transition: opacity 0.3s; }
        .query-x.show { opacity: 0.8; }
        .query-dot { fill: var(--accent-green); stroke: #06251a; stroke-width: 1.5; opacity: 0; transition: opacity 0.3s; }
        .query-dot.show { opacity: 1; filter: drop-shadow(0 0 6px rgba(34,197,94,0.7)); }

        /* line list (candidate lines / envelope) */
        .line-list { display: flex; flex-direction: column; gap: 7px; margin-top: 14px; }
        .line-chip {
            display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 12.5px;
            border: 1px solid var(--border-main); border-radius: 9px; padding: 7px 11px; background: rgba(255,255,255,0.03);
            color: var(--text-dim); transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s, transform 0.2s;
        }
        .line-chip .swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
        .line-chip .eq { color: #cfe9f5; }
        .line-chip .val { margin-left: auto; font-weight: 800; }
        .line-chip.cand   { border-color: var(--accent-purple); background: rgba(168,85,247,0.10); color: #e9d5ff; }
        .line-chip.winner { border-color: var(--accent-green); background: rgba(34,197,94,0.12); color: #bbf7d0; box-shadow: 0 0 14px rgba(34,197,94,0.3); transform: translateX(3px); }
        .line-chip.added  { border-color: var(--accent-blue); background: rgba(6,182,212,0.10); color: #a5f3fc; }
        .line-chip .val.win { color: var(--accent-green); }

        .action-stage { position: relative; min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 6px; align-items: center; min-height: 40px; flex-wrap: wrap; justify-content: center; }
        .ans-tile { min-width: 40px; height: 44px; padding: 0 8px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 18px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 12px rgba(245,165,36,0.35); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); } .pill.s b { color: var(--accent-blue); } .pill.r b { color: var(--accent-green); } .pill.d b { color: var(--accent-orange); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">m =</label>
        <input type="text" id="m-input" value="2,3,1" maxlength="40">
        <label class="ui-label">c =</label>
        <input type="text" id="c-input" value="1,2,3" maxlength="40">
        <label class="ui-label">x =</label>
        <input type="text" id="x-input" value="1,2,3" maxlength="40">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">[0,5,7]</button>
        <button onclick="loadExample(1)">[0,2,3,4]</button>
        <button onclick="loadExample(2)">[0,3]</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Convex Hull Trick / Li Chao <span class="sub">&middot; dp[i] = min<sub>j</sub>(m[j]&middot;x[i] + c[j]) &middot; lower envelope of lines</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="stage-grid">
                    <div>
                        <div class="row-label">Lower envelope &middot; query x[i] for the minimum line</div>
                        <div class="plot-wrap">
                            <svg class="plot-svg" id="plot-svg" viewBox="0 0 400 260" preserveAspectRatio="none"></svg>
                        </div>
                        <div class="line-list" id="line-list"></div>
                    </div>
                    <div>
                        <div class="row-label">dp[i] &middot; optimized result</div>
                        <div class="dp-board">
                            <div class="cell-row" id="dp-row"></div>
                        </div>
                        <div class="row-label" style="margin-top:18px">x[i] &middot; query points</div>
                        <div class="cell-row" id="x-row"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill c">current i <b id="st-i">&mdash;</b></span>
                            <span class="pill s">query x[i] <b id="st-x">&mdash;</b></span>
                            <span class="pill r">best line j <b id="st-j">&mdash;</b></span>
                            <span class="pill d">dp[i] <b id="st-dp">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ---------- Motion engine (spring pop, zero deps) ----------
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.4 + 0.66 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // line colors keyed by line index j (stable per input)
        const LINE_COLORS = ['#06b6d4', '#a855f7', '#f5a524', '#22c55e', '#f43f5e', '#38bdf8', '#e879f9', '#fbbf24'];
        const colorOf = (j) => LINE_COLORS[j % LINE_COLORS.length];

        // ---------- State ----------
        const EXAMPLES = [
            { m: [2, 3, 1], c: [1, 2, 3], x: [1, 2, 3] },
            { m: [1, 2, 3, 4], c: [0, 0, 0, 0], x: [1, 2, 3, 4] },
            { m: [1, 2], c: [1, 1], x: [1, 2] },
        ];
        let M = [2, 3, 1], C = [1, 2, 3], X = [1, 2, 3];
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1450, 720, 330];
        const dpEls = [];   // index -> dp cell element
        const idxEls = [];  // index -> dp index label element
        const xEls = [];    // index -> x cell element

        const CODE = [
            [['kw','def '],['fn','solve'],['src','(m, c, x):']],
            [['src','  n = len(x);  dp = [0]*n']],
            [['src','  hull = []      # lower envelope of lines']],
            [['src','  add_line(hull, m[0], c[0])']],
            [['kw','  for '],['src','i in 1..n-1:']],
            [['src','    # query envelope at X = x[i]']],
            [['src','    dp[i] = query(hull, x[i])']],
            [['src','    # insert line y = m[i]*X + c[i]']],
            [['src','    add_line(hull, m[i], c[i])']],
            [['kw','  return '],['src','dp']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ---------- step generation (immutable snapshots) ----------
        // Real DP transition optimized via Convex Hull Trick: dp[i] = min over
        // inserted lines j of ( m[j]*x[i] + c[j] ). We maintain the set of lines
        // and, per i, query the lower envelope (the minimum line at X = x[i]).
        function generateSteps() {
            steps = [];
            const n = X.length;
            const dp = new Array(n).fill(null);
            // "hull" = set of line indices currently inserted into the envelope
            const hull = [];

            const snap = (extra) => Object.assign({
                dp: dp.slice(), hull: hull.slice(), n,
                current: null, queryX: null, bestJ: null, candJ: null,
                addedJ: null, best: null, complete: false,
                queryY: null
            }, extra);

            steps.push(snap({
                code: [0, 1, 2], action: 'BUILD', actionColor: 'var(--accent-blue)',
                panel: `Each candidate <code>j</code> contributes a line <code>y = m[j]&middot;X + c[j]</code>. A transition <code>dp[i] = min<sub>j</sub>(m[j]&middot;x[i] + c[j])</code> is just the <b>lower envelope</b> of those lines queried at <code>X = x[i]</code>. m=[${M.join(', ')}], c=[${C.join(', ')}], x=[${X.join(', ')}].`,
                log: `init  n=${n}  hull = {}`
            }));

            // base case dp[0] = 0, seed the hull with line 0
            dp[0] = 0;
            hull.push(0);
            steps.push(snap({
                current: 0, code: [1, 3], action: `dp[0] = 0`, actionColor: 'var(--accent-green)',
                addedJ: 0, base: 0,
                panel: `Base case: <code>dp[0] = 0</code>. Insert the first line <code>L0: y = ${M[0]}&middot;X + ${C[0]}</code> into the lower envelope.`,
                log: `base  dp[0]=0   add L0 (m=${M[0]}, c=${C[0]})`
            }));

            for (let i = 1; i < n; i++) {
                const xi = X[i];
                // QUERY: find the minimizing line in the current hull at X = xi
                let bestVal = Infinity, bestJ = -1;
                for (const j of hull) {
                    const v = M[j] * xi + C[j];
                    // step: probing candidate j
                    steps.push(snap({
                        current: i, queryX: xi, candJ: j, code: [4, 5, 6],
                        action: `L${j} = ${v}`, actionColor: 'var(--accent-purple)',
                        queryY: bestVal === Infinity ? v : Math.min(bestVal, v),
                        panel: `Querying <code>x[${i}] = ${xi}</code>: line <code>L${j}: ${M[j]}&middot;${xi} + ${C[j]} = ${v}</code>.`,
                        log: `i=${i}  query x=${xi}  L${j} = ${M[j]}*${xi}+${C[j]} = ${v}`
                    }));
                    if (v < bestVal) { bestVal = v; bestJ = j; }
                }

                dp[i] = bestVal;
                steps.push(snap({
                    current: i, queryX: xi, bestJ, code: [6], action: `dp[${i}] = ${bestVal}`,
                    actionColor: 'var(--accent-green)', queryY: bestVal,
                    panel: `Lower envelope at <code>x[${i}] = ${xi}</code> is line <code>L${bestJ}</code> &#8594; <code>dp[${i}] = ${bestVal}</code>.`,
                    log: `i=${i}  min over hull -> L${bestJ}  dp[${i}] = ${bestVal}`
                }));

                // INSERT line i into the hull
                hull.push(i);
                steps.push(snap({
                    current: i, addedJ: i, code: [7, 8], action: `+ L${i}`, actionColor: 'var(--accent-blue)',
                    queryX: xi, queryY: bestVal,
                    panel: `Insert line <code>L${i}: y = ${M[i]}&middot;X + ${C[i]}</code> into the envelope for future queries.`,
                    log: `i=${i}  add L${i} (m=${M[i]}, c=${C[i]})  hull={${hull.join(',')}}`
                }));
            }

            const result = dp.slice();
            steps.push(snap({
                complete: true, confetti: true, code: [9], answer: result, best: n - 1,
                action: `✓ [${result.join(', ')}]`, actionColor: 'var(--accent-green)',
                panel: `Done. Optimized DP array is <code><b>[${result.join(', ')}]</b></code>. Every transition was answered in <code>O(log n)</code> by the lower envelope instead of <code>O(n)</code> brute force.`,
                log: `done  dp = [${result.join(',')}]`
            }));
        }

        // ---------- build persistent DOM skeleton (once per input load) ----------
        function buildBoard() {
            const dpRow = document.getElementById('dp-row');
            const xRow = document.getElementById('x-row');
            dpRow.innerHTML = ''; xRow.innerHTML = '';
            dpEls.length = 0; idxEls.length = 0; xEls.length = 0;

            X.forEach((v, i) => {
                const dCol = document.createElement('div'); dCol.className = 'col';
                const dCell = document.createElement('div'); dCell.className = 'cell dp-cell'; dCell.textContent = '';
                const lab = document.createElement('div'); lab.className = 'idx-label'; lab.textContent = i;
                dCol.appendChild(dCell); dCol.appendChild(lab); dpRow.appendChild(dCol);
                dpEls.push(dCell); idxEls.push(lab);

                const xCol = document.createElement('div'); xCol.className = 'col';
                const xCell = document.createElement('div'); xCell.className = 'cell'; xCell.textContent = String(v);
                xCol.appendChild(xCell); xRow.appendChild(xCol);
                xEls.push(xCell);
            });
        }

        // ---------- envelope plot geometry ----------
        const PLOT = { w: 400, h: 260, padL: 34, padR: 14, padT: 14, padB: 26 };
        function plotBounds() {
            // X range across all query points (and 0)
            const xs = X.slice();
            let xMin = Math.min(0, ...xs), xMax = Math.max(...xs, 1);
            if (xMax === xMin) xMax = xMin + 1;
            // Y range across all lines evaluated over [xMin, xMax]
            let yMin = Infinity, yMax = -Infinity;
            for (let j = 0; j < M.length; j++) {
                for (const xv of [xMin, xMax]) {
                    const y = M[j] * xv + C[j];
                    if (y < yMin) yMin = y; if (y > yMax) yMax = y;
                }
            }
            if (yMax === yMin) yMax = yMin + 1;
            const padY = (yMax - yMin) * 0.12 || 1;
            return { xMin, xMax, yMin: yMin - padY, yMax: yMax + padY };
        }
        function buildPlot() {
            const svg = document.getElementById('plot-svg');
            svg.innerHTML = '';
            const b = plotBounds();
            const SX = (xv) => PLOT.padL + (xv - b.xMin) / (b.xMax - b.xMin) * (PLOT.w - PLOT.padL - PLOT.padR);
            const SY = (yv) => PLOT.padT + (b.yMax - yv) / (b.yMax - b.yMin) * (PLOT.h - PLOT.padT - PLOT.padB);
            const ns = 'http://www.w3.org/2000/svg';

            // grid + axes
            for (let g = 0; g <= 4; g++) {
                const gx = PLOT.padL + g / 4 * (PLOT.w - PLOT.padL - PLOT.padR);
                const gl = document.createElementNS(ns, 'line');
                gl.setAttribute('x1', gx); gl.setAttribute('x2', gx);
                gl.setAttribute('y1', PLOT.padT); gl.setAttribute('y2', PLOT.h - PLOT.padB);
                gl.setAttribute('class', 'grid-line'); svg.appendChild(gl);
            }
            const xaxis = document.createElementNS(ns, 'line');
            xaxis.setAttribute('x1', PLOT.padL); xaxis.setAttribute('x2', PLOT.w - PLOT.padR);
            xaxis.setAttribute('y1', PLOT.h - PLOT.padB); xaxis.setAttribute('y2', PLOT.h - PLOT.padB);
            xaxis.setAttribute('class', 'axis-line'); svg.appendChild(xaxis);
            const yaxis = document.createElementNS(ns, 'line');
            yaxis.setAttribute('x1', PLOT.padL); yaxis.setAttribute('x2', PLOT.padL);
            yaxis.setAttribute('y1', PLOT.padT); yaxis.setAttribute('y2', PLOT.h - PLOT.padB);
            yaxis.setAttribute('class', 'axis-line'); svg.appendChild(yaxis);
            const xlab = document.createElementNS(ns, 'text');
            xlab.setAttribute('x', PLOT.w - PLOT.padR - 4); xlab.setAttribute('y', PLOT.h - PLOT.padB - 5);
            xlab.setAttribute('text-anchor', 'end'); xlab.setAttribute('class', 'axis-label'); xlab.textContent = 'X'; svg.appendChild(xlab);
            const ylab = document.createElementNS(ns, 'text');
            ylab.setAttribute('x', PLOT.padL + 4); ylab.setAttribute('y', PLOT.padT + 9);
            ylab.setAttribute('class', 'axis-label'); ylab.textContent = 'y'; svg.appendChild(ylab);

            // one full-width segment per line, keyed by data-line
            envLineEls.length = 0;
            for (let j = 0; j < M.length; j++) {
                const ln = document.createElementNS(ns, 'line');
                ln.setAttribute('x1', SX(b.xMin)); ln.setAttribute('y1', SY(M[j] * b.xMin + C[j]));
                ln.setAttribute('x2', SX(b.xMax)); ln.setAttribute('y2', SY(M[j] * b.xMax + C[j]));
                ln.setAttribute('class', 'env-line'); ln.setAttribute('stroke', colorOf(j));
                ln.dataset.line = j; svg.appendChild(ln);
                envLineEls.push(ln);
            }
            // query guide line + dot (hidden until used)
            const qline = document.createElementNS(ns, 'line');
            qline.setAttribute('class', 'query-x'); qline.id = 'q-line'; svg.appendChild(qline);
            const qdot = document.createElementNS(ns, 'circle');
            qdot.setAttribute('r', 4.5); qdot.setAttribute('class', 'query-dot'); qdot.id = 'q-dot'; svg.appendChild(qdot);

            plotScale = { SX, SY, b };
        }
        const envLineEls = [];
        let plotScale = null;

        // ---------- line list (chips) ----------
        function renderLineList(step) {
            const host = document.getElementById('line-list'); host.innerHTML = '';
            // show all lines that have been inserted into the hull at this step,
            // plus a line currently being added (addedJ)
            const present = new Set(step.hull);
            if (step.addedJ != null) present.add(step.addedJ);
            const ordered = [...present].sort((a, b) => a - b);
            ordered.forEach((j) => {
                const chip = document.createElement('div'); chip.className = 'line-chip';
                if (step.bestJ === j) chip.classList.add('winner');
                else if (step.candJ === j) chip.classList.add('cand');
                else if (step.addedJ === j) chip.classList.add('added');
                const sw = document.createElement('span'); sw.className = 'swatch'; sw.style.background = colorOf(j); chip.appendChild(sw);
                const eq = document.createElement('span'); eq.className = 'eq';
                eq.innerHTML = `L${j}: y = ${M[j]}&middot;X + ${C[j]}`; chip.appendChild(eq);
                if (step.queryX != null && (step.candJ === j || step.bestJ === j)) {
                    const val = document.createElement('span');
                    val.className = 'val' + (step.bestJ === j ? ' win' : '');
                    val.textContent = (M[j] * step.queryX + C[j]);
                    chip.appendChild(val);
                }
                host.appendChild(chip);
            });
        }

        // ---------- render (pure function of steps[idx], persistent DOM) ----------
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // dp + x cells
            for (let i = 0; i < X.length; i++) {
                const v = step.dp[i];
                let dcls = 'cell dp-cell';
                let txt = '';
                if (v == null) { dcls += ' empty'; }
                else { txt = String(v); dcls += ' filled'; }
                if (step.base === i) dcls += ' base';
                if (step.best === i && step.complete) dcls += ' best';
                if (step.current === i) dcls += ' current';
                const dEl = dpEls[i];
                const wasEmpty = dEl.textContent === '';
                dEl.className = dcls; dEl.textContent = txt;
                if (wasEmpty && txt !== '') Motion.pop(dEl);
                idxEls[i].className = 'idx-label' + (step.current === i ? ' lit' : '');

                xEls[i].className = 'cell' + (step.current === i ? ' dp-cell current' : '');
            }
            // keep x cell as plain value (current handled above via class)
            for (let i = 0; i < X.length; i++) {
                xEls[i].textContent = String(X[i]);
                xEls[i].className = 'cell' + (step.queryX != null && step.current === i ? ' dp-cell current' : '');
            }

            // plot: highlight lines in hull, dim absent, mark winner
            const inHull = new Set(step.hull);
            if (step.addedJ != null) inHull.add(step.addedJ);
            envLineEls.forEach((ln) => {
                const j = +ln.dataset.line;
                ln.classList.remove('active', 'dimmed');
                if (!inHull.has(j)) { ln.classList.add('dimmed'); }
                if (step.bestJ === j || step.candJ === j) ln.classList.add('active');
            });
            const qline = document.getElementById('q-line');
            const qdot = document.getElementById('q-dot');
            if (step.queryX != null && plotScale) {
                const px = plotScale.SX(step.queryX);
                qline.setAttribute('x1', px); qline.setAttribute('x2', px);
                qline.setAttribute('y1', PLOT.padT); qline.setAttribute('y2', PLOT.h - PLOT.padB);
                qline.classList.add('show');
                if (step.queryY != null) {
                    qdot.setAttribute('cx', px); qdot.setAttribute('cy', plotScale.SY(step.queryY));
                    qdot.classList.add('show');
                } else qdot.classList.remove('show');
            } else { qline.classList.remove('show'); qdot.classList.remove('show'); }

            renderLineList(step);

            // answer track
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.complete && step.answer != null) {
                step.answer.forEach(v => {
                    const t = document.createElement('div'); t.className = 'ans-tile'; t.textContent = v; at.appendChild(t);
                });
            }

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            document.getElementById('st-i').textContent = step.current != null ? step.current : '—';
            document.getElementById('st-x').textContent = step.queryX != null ? step.queryX : '—';
            document.getElementById('st-j').textContent = step.bestJ != null ? ('L' + step.bestJ) : '—';
            document.getElementById('st-dp').textContent = (step.current != null && step.dp[step.current] != null) ? step.dp[step.current] : '—';

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ---------- controls ----------
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function loadArr(m, c, x) {
            pause(); M = m.slice(); C = c.slice(); X = x.slice(); confettiArmed = true;
            buildBoard(); buildPlot(); generateSteps(); renderStep(0);
        }
        function loadCustom() {
            const parse = (id) => document.getElementById(id).value.split(',').map(s => parseInt(s.trim(), 10)).filter(v => !isNaN(v));
            const m = parse('m-input'), c = parse('c-input'), x = parse('x-input');
            if (m.length === 0 || m.length !== c.length || m.length !== x.length || m.length > 9) return;
            loadArr(m, c, x);
        }
        function loadExample(n) {
            const ex = EXAMPLES[n];
            document.getElementById('m-input').value = ex.m.join(',');
            document.getElementById('c-input').value = ex.c.join(',');
            document.getElementById('x-input').value = ex.x.join(',');
            loadArr(ex.m, ex.c, ex.x);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        ['m-input', 'c-input', 'x-input'].forEach(id =>
            document.getElementById(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); }));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
