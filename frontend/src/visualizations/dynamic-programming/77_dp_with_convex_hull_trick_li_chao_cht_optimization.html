<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP with Convex Hull Trick - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 280px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        /* ARRAY TILES */
        .array-container {
            display: flex;
            gap: 8px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .array-tile {
            min-width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--text-main);
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        .array-tile.current { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); }

        /* DP BAR */
        .dp-container { 
            margin-top: 20px;
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
            width: 920px;
            overflow-x: auto;
        }
        .dp-bar {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .dp-cell {
            min-width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); }
        .dp-cell.header { background: var(--bg-surface); color: var(--text-dim); font-size: 11px; height: 24px; }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 110px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">m =</label>
        <input type="text" id="m-input" value="2,3,1" style="width:280px">
        <label class="ui-label">c =</label>
        <input type="text" id="c-input" value="1,2,3" style="width:280px">
        <label class="ui-label">x =</label>
        <input type="text" id="x-input" value="1,2,3" style="width:280px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([2,3,1],[1,2,3],[1,2,3])">Ex 1 → [0,5,7]</button>
        <button onclick="loadExample([1,2,3,4],[0,0,0,0],[1,2,3,4])">Ex 2 → [0,2,3,4]</button>
        <button onclick="loadExample([1,2],[1,1],[1,2])">Ex 3 → [0,3]</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">m / c / x tiles (orange = current i)</div>
        <div id="array-container" class="array-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP bar — dp[i] = min over j of m[j]*x[i] + c[j]</div>
        <div class="dp-container" id="dp-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current j</span>
            <span class="info-value" id="val-j" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Line value</span>
            <span class="info-value" id="val-lineval" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current min</span>
            <span class="info-value" id="val-min" style="color: var(--accent-blue);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Final DP array</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current i</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentM = [2,3,1];
        let currentC = [1,2,3];
        let currentX = [1,2,3];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];
        let dp = [];

        function init() {
            loadExample([2,3,1], [1,2,3], [1,2,3]);
        }

        function loadExample(m, c, x) {
            currentM = m;
            currentC = c;
            currentX = x;
            document.getElementById('m-input').value = m.join(',');
            document.getElementById('c-input').value = c.join(',');
            document.getElementById('x-input').value = x.join(',');
            generateSteps();
            reset();
        }

        function loadCustom() {
            const mStr = document.getElementById('m-input').value.trim();
            const cStr = document.getElementById('c-input').value.trim();
            const xStr = document.getElementById('x-input').value.trim();
            const m = mStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const c = cStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const x = xStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (m.length === 0 || m.length !== c.length || m.length !== x.length) {
                alert("Please enter valid m, c, x arrays of same length");
                return;
            }
            loadExample(m, c, x);
        }

        function generateSteps() {
            steps = [];
            const m = currentM;
            const c = currentC;
            const x = currentX;
            const n = x.length;

            dp = new Array(n).fill(0);
            dp[0] = 0; // base case

            steps.push({
                type: 'init',
                i: -1,
                j: -1,
                dpSnapshot: [...dp],
                panel: `DP with Convex Hull Trick — Naive DP O(n²)<br>m = [${m.join(', ')}]<br>c = [${c.join(', ')}]<br>x = [${x.join(', ')}]`,
                statusText: `Initialize dp[0] = 0`,
                log: `dp[0] = 0`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 1; i < n; i++) {
                let minVal = Infinity;
                steps.push({
                    type: 'start-i',
                    i: i,
                    j: -1,
                    dpSnapshot: [...dp],
                    panel: `Computing dp[${i}] for x[${i}] = ${x[i]}`,
                    statusText: `i = ${i}`,
                    log: `\n--- i = ${i} (x=${x[i]}) ---`,
                    logColor: 'var(--accent-orange)'
                });

                for (let j = 0; j < i; j++) {
                    const lineVal = m[j] * x[i] + c[j];
                    minVal = Math.min(minVal, lineVal);
                    steps.push({
                        type: 'compute-j',
                        i: i,
                        j: j,
                        dpSnapshot: [...dp],
                        panel: `j=${j}: m[${j}]*x[${i}] + c[${j}] = ${m[j]}*${x[i]} + ${c[j]} = ${lineVal}`,
                        statusText: `j=${j}`,
                        log: `j=${j}: ${lineVal}`,
                        logColor: 'var(--accent-green)'
                    });
                }

                dp[i] = minVal;

                steps.push({
                    type: 'update-i',
                    i: i,
                    j: -1,
                    dpSnapshot: [...dp],
                    panel: `dp[${i}] = ${minVal}`,
                    statusText: `dp[${i}] = ${minVal}`,
                    log: `dp[${i}] ← ${minVal}`,
                    logColor: 'var(--accent-blue)'
                });
            }

            const result = dp.join(',');
            steps.push({
                type: 'final',
                i: n - 1,
                j: -1,
                dpSnapshot: [...dp],
                panel: `DP computation complete.<br>Final DP = <span style="color:var(--accent-green)"><b>[${result}]</b></span>`,
                statusText: `Final DP = [${result}]`,
                log: `\nFinal DP = [${result}]`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: result
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render m, c, x tiles
            const arrayContainer = document.getElementById('array-container');
            arrayContainer.innerHTML = '';
            const m = currentM;
            const c = currentC;
            const x = currentX;
            for (let i = 0; i < m.length; i++) {
                const tile = document.createElement('div');
                tile.className = `array-tile ${step.i === i ? 'current' : ''}`;
                tile.innerHTML = `<div>m=${m[i]}</div><div>c=${c[i]}</div><div>x=${x[i]}</div>`;
                arrayContainer.appendChild(tile);
            }

            // Render DP bar
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-bar"></div>`;
            const bar = dpContainer.querySelector('.dp-bar');

            // Header
            const header = document.createElement('div');
            header.style.display = 'flex';
            header.style.gap = '8px';
            for (let i = 0; i < x.length; i++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.style.height = '24px';
                cell.textContent = i;
                header.appendChild(cell);
            }
            bar.appendChild(header);

            // DP row
            const row = document.createElement('div');
            row.style.display = 'flex';
            row.style.gap = '8px';
            const currentDP = step.dpSnapshot || dp;
            for (let i = 0; i < currentDP.length; i++) {
                const cell = document.createElement('div');
                cell.className = `dp-cell ${step.i === i ? 'current' : ''}`;
                cell.innerHTML = `<div>${currentDP[i]}</div>`;
                row.appendChild(cell);
            }
            bar.appendChild(row);

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-lineval').innerText = step.j !== null ? (currentM[step.j] * currentX[step.i] + currentC[step.j]) : '—';
            document.getElementById('val-min').innerText = step.i !== null ? currentDP[step.i] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = `[${step.result}]`;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
