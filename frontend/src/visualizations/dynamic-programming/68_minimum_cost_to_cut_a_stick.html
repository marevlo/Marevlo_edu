<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Cost to Cut a Stick - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 320px;
            font-size: 13px;
        }
        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* STICK VISUALIZATION */
        .visual-container { margin-top: 30px; width: 100%; max-width: 920px; display: flex; flex-direction: column; align-items: center; gap: 24px; }
        .stick-wrapper {
            position: relative;
            width: 100%;
            max-width: 720px;
            height: 120px;
            background: #161b22;
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .stick-line {
            height: 8px;
            background: linear-gradient(to right, #21262d, #58a6ff);
            border-radius: 9999px;
            position: relative;
            margin-bottom: 12px;
        }
        .cut-marker {
            position: absolute;
            top: -18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--accent-orange);
            font-size: 11px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .cut-marker .dot {
            width: 14px; height: 14px;
            background: var(--accent-orange);
            border-radius: 50%;
            border: 2px solid var(--bg-surface);
            margin-bottom: 2px;
        }
        .segment-label {
            position: absolute;
            top: 22px;
            font-size: 13px;
            color: var(--accent-purple);
            font-family: monospace;
        }

        /* DP TABLE */
        .dp-wrapper {
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 12px;
            background: var(--bg-surface);
            width: 720px;
        }
        .dp-table {
            display: grid;
            gap: 3px;
            font-family: monospace;
            font-size: 13px;
            max-width: 100%;
            overflow-x: auto;
        }
        .dp-cell {
            width: 52px; height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #21262d;
            border: 1px solid var(--border-main);
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .dp-cell.header { background: #000000; font-weight: bold; color: var(--accent-blue); }

        /* PANEL & INFO */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 20px; width: 720px; text-align: center; font-family: monospace; min-height: 92px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--accent-green); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }

        /* CONTROLS & STATUS */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 620px; }
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 120px; }

        /* LEGEND & LOG */
        .legend { margin-top: 12px; display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; }
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 100%; height: 140px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">stick_length =</label>
        <input type="number" id="length-input" value="7" style="width:80px">
        <label class="ui-label">cuts =</label>
        <input type="text" id="cuts-input" value="[1,3,4,5]" style="width:260px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(7, '[1,3,4,5]')">Ex 1 (16)</button>
        <button onclick="loadExample(10, '[2,4,7]')">Ex 2 (20)</button>
    </div>

    <div class="visual-container">
        <!-- STICK -->
        <div class="ui-label">Stick (0 → length) with cuts:</div>
        <div class="stick-wrapper" id="stick-container"></div>

        <!-- DP TABLE -->
        <div class="ui-label" style="margin-top:20px">DP Table (min cost for interval i→j):</div>
        <div class="dp-wrapper">
            <div class="dp-table" id="dp-table"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current interval</span>
            <span class="info-value" id="val-interval" style="color:var(--accent-orange)">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Trying cut at</span>
            <span class="info-value" id="val-cut" style="color:var(--accent-purple)">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Segment cost</span>
            <span class="info-value" id="val-cost" style="color:var(--accent-blue)">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">dp[i][j]</span>
            <span class="info-value" id="val-dpval" style="color:var(--accent-green)">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom:6px">Minimum total cost =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex;align-items:center;gap:6px">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#e3b341"></span> Current interval</div>
        <div class="legend-item"><span class="dot" style="background:#3fb950"></span> Optimal cut</div>
        <div class="legend-item"><span class="dot" style="background:#a371f7"></span> Tried cut</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let stickLength = 7;
        let cutsInput = [1,3,4,5];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 350];

        // Prepare sorted cuts with 0 and stickLength
        function prepareCuts() {
            let c = [0, ...cutsInput.sort((a,b)=>a-b), stickLength];
            return c;
        }

        function generateSteps() {
            steps = [];
            const cuts = prepareCuts();
            const m = cuts.length;
            let dp = Array.from({length: m}, () => Array(m).fill(0));

            // Base case: no cost for single point intervals
            for (let i = 0; i < m; i++) {
                dp[i][i] = 0;
            }

            steps.push({
                type: 'init',
                dp: JSON.parse(JSON.stringify(dp)),
                panel: `DP table initialized (0 cost on diagonal)`,
                statusText: `Base cases set`,
                log: `dp[i][i] = 0`,
                logColor: 'var(--accent-blue)'
            });

            // Fill by increasing interval length
            for (let len = 2; len < m; len++) {
                for (let i = 0; i < m - len; i++) {
                    const j = i + len;
                    let minCost = Infinity;
                    let bestK = -1;

                    steps.push({
                        type: 'interval-start',
                        i: i,
                        j: j,
                        len: len,
                        dp: JSON.parse(JSON.stringify(dp)),
                        panel: `Interval [${cuts[i]}, ${cuts[j]}] (length = ${cuts[j]-cuts[i]})`,
                        statusText: `Interval i=${i} j=${j}`,
                        log: `Interval [${cuts[i]}→${cuts[j]}]`,
                        logColor: 'var(--accent-orange)'
                    });

                    // Try every possible cut k between i and j
                    for (let k = i + 1; k < j; k++) {
                        const left = dp[i][k];
                        const right = dp[k][j];
                        const cost = (cuts[j] - cuts[i]) + left + right;

                        steps.push({
                            type: 'try-cut',
                            i: i,
                            j: j,
                            k: k,
                            cost: cost,
                            left: left,
                            right: right,
                            dp: JSON.parse(JSON.stringify(dp)),
                            panel: `Try k=${k} (cut at ${cuts[k]})<br>cost = ${cuts[j]-cuts[i]} + dp[${i}][${k}](${left}) + dp[${k}][${j}](${right}) = ${cost}`,
                            statusText: `k=${k} cost=${cost}`,
                            log: `k=${k} → ${cost}`,
                            logColor: 'var(--accent-purple)'
                        });

                        if (cost < minCost) {
                            minCost = cost;
                            bestK = k;
                        }
                    }

                    dp[i][j] = minCost;

                    steps.push({
                        type: 'update',
                        i: i,
                        j: j,
                        k: bestK,
                        minCost: minCost,
                        dp: JSON.parse(JSON.stringify(dp)),
                        panel: `Best cut at ${bestK} (${cuts[bestK]})<br>dp[${i}][${j}] = ${minCost}`,
                        statusText: `dp[${i}][${j}] ← ${minCost}`,
                        log: `dp[${i}][${j}] = ${minCost}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            const result = dp[0][m-1];

            steps.push({
                type: 'final',
                complete: true,
                result: result,
                panel: `All intervals filled.<br><b>Minimum cost = ${result}</b>`,
                statusText: `Done. Min cost = ${result}`,
                log: `\nFinal minimum cost: ${result}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStick(currentStep) {
            const container = document.getElementById('stick-container');
            container.innerHTML = `
                <div class="stick-line" id="stick-line"></div>
            `;
            const line = document.getElementById('stick-line');
            const cuts = prepareCuts();

            // Draw cut markers
            cuts.forEach((pos, idx) => {
                if (idx === 0 || idx === cuts.length - 1) return; // skip endpoints
                const percent = (pos / stickLength) * 100;
                const marker = document.createElement('div');
                marker.className = 'cut-marker';
                marker.style.left = `${percent}%`;
                marker.innerHTML = `
                    <div class="dot"></div>
                    <span>${pos}</span>
                `;
                container.appendChild(marker);
            });

            // Current interval highlight
            if (currentStep && currentStep.i !== undefined && currentStep.j !== undefined) {
                const cutsSorted = prepareCuts();
                const leftPos = cutsSorted[currentStep.i];
                const rightPos = cutsSorted[currentStep.j];
                const leftPercent = (leftPos / stickLength) * 100;
                const widthPercent = ((rightPos - leftPos) / stickLength) * 100;

                const highlight = document.createElement('div');
                highlight.style.position = 'absolute';
                highlight.style.left = `${leftPercent}%`;
                highlight.style.width = `${widthPercent}%`;
                highlight.style.height = '8px';
                highlight.style.background = 'rgba(227, 179, 65, 0.3)';
                highlight.style.border = '2px dashed var(--accent-orange)';
                highlight.style.top = '20px';
                highlight.style.borderRadius = '4px';
                container.appendChild(highlight);
            }
        }

        function renderDPTable(step) {
            const container = document.getElementById('dp-table');
            const cuts = prepareCuts();
            const m = cuts.length;
            container.style.gridTemplateColumns = `repeat(${m}, 52px)`;

            container.innerHTML = '';

            // Header row
            const empty = document.createElement('div');
            empty.className = 'dp-cell header';
            container.appendChild(empty);
            for (let c = 0; c < m; c++) {
                const h = document.createElement('div');
                h.className = 'dp-cell header';
                h.innerText = cuts[c];
                container.appendChild(h);
            }

            for (let r = 0; r < m; r++) {
                const rowHeader = document.createElement('div');
                rowHeader.className = 'dp-cell header';
                rowHeader.innerText = cuts[r];
                container.appendChild(rowHeader);

                for (let c = 0; c < m; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'dp-cell';
                    if (r === c) {
                        cell.style.background = '#0f2a1a';
                        cell.style.color = 'var(--accent-green)';
                    }
                    if (step && step.i === r && step.j === c) {
                        cell.style.border = '3px solid var(--accent-orange)';
                        cell.style.transform = 'scale(1.1)';
                    }
                    if (step && step.dp && step.dp[r] && step.dp[r][c] !== undefined) {
                        cell.innerText = step.dp[r][c];
                    } else if (r < c) {
                        cell.innerText = '—';
                    } else {
                        cell.innerText = '0';
                    }
                    container.appendChild(cell);
                }
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            renderStick(step);
            renderDPTable(step);

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-interval').innerText = step.i !== undefined ? `[${prepareCuts()[step.i]} → ${prepareCuts()[step.j]}]` : '—';
            document.getElementById('val-cut').innerText = step.k !== undefined ? prepareCuts()[step.k] : '—';
            document.getElementById('val-cost').innerText = step.cost !== undefined ? step.cost : '—';
            document.getElementById('val-dpval').innerText = step.minCost !== undefined ? step.minCost : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) {
                pause();
            } else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = '▶ Play';
        }

        function loadCustom() {
            const len = parseInt(document.getElementById('length-input').value);
            const cutsStr = document.getElementById('cuts-input').value.trim();
            if (!isNaN(len)) {
                try {
                    stickLength = len;
                    cutsInput = JSON.parse(cutsStr);
                    generateSteps();
                    reset();
                } catch(e) {
                    alert("Invalid cuts format. Example: [1,3,4,5]");
                }
            }
        }

        function loadExample(length, cutsStr) {
            stickLength = length;
            cutsInput = JSON.parse(cutsStr);
            document.getElementById('length-input').value = length;
            document.getElementById('cuts-input').value = cutsStr;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
