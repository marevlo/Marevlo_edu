<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Paths (grid without obstacles) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 80px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        /* GRID */
        .grid-container {
            display: grid;
            gap: 4px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .grid-cell {
            min-width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--text-main);
            transition: all 0.3s ease;
            border-radius: 6px;
        }
        .grid-cell.start { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .grid-cell.end { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .grid-cell.current { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); }

        /* DP TABLE */
        .dp-container { 
            margin-top: 20px;
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
            width: 920px;
            overflow-x: auto;
        }
        .dp-grid {
            display: grid;
            gap: 4px;
        }
        .dp-cell {
            min-width: 62px;
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
        }
        .dp-cell.header { background: var(--bg-surface); font-size: 11px; color: var(--text-dim); font-weight: normal; }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.08); box-shadow: 0 0 12px var(--accent-green); }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 110px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Rows (m) =</label>
        <input type="number" id="m-input" value="3" min="1" style="width:80px">
        <label class="ui-label">Columns (n) =</label>
        <input type="number" id="n-input" value="2" min="1" style="width:80px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(3,2)">Ex 1 (3×2 → 3)</button>
        <button onclick="loadExample(1,4)">Ex 2 (1×4 → 1)</button>
        <button onclick="loadExample(3,3)">Ex 3 (3×3 → 6)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Grid (green = destination, orange = current cell being filled)</div>
        <div id="grid-container" class="grid-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP Table — number of unique paths to reach each cell</div>
        <div id="dp-container" style="overflow-x:auto; max-width:920px;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current cell (i,j)</span>
            <span class="info-value" id="val-cell" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Paths from left</span>
            <span class="info-value" id="val-left" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Paths from above</span>
            <span class="info-value" id="val-above" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Total paths to cell</span>
            <span class="info-value" id="val-total" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Unique paths to bottom-right =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Destination</div>
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current cell</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentM = 3;
        let currentN = 2;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];
        let dp = [];

        function init() {
            loadExample(3, 2);
        }

        function loadExample(m, n) {
            currentM = m;
            currentN = n;
            document.getElementById('m-input').value = m;
            document.getElementById('n-input').value = n;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const m = parseInt(document.getElementById('m-input').value);
            const n = parseInt(document.getElementById('n-input').value);
            if (isNaN(m) || isNaN(n) || m < 1 || n < 1) {
                alert("m and n must be positive integers");
                return;
            }
            loadExample(m, n);
        }

        function generateSteps() {
            steps = [];
            const m = currentM;
            const n = currentN;
            dp = Array.from({length: m}, () => Array(n).fill(0));

            // INIT
            steps.push({
                type: 'init',
                i: -1,
                j: -1,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `Unique Paths in ${m}×${n} Grid — Bottom-Up DP`,
                statusText: `Initializing DP table`,
                log: `dp table ${m}×${n} initialized to zeros`,
                logColor: 'var(--text-dim)'
            });

            // Set first row and first column
            for (let j = 0; j < n; j++) {
                dp[0][j] = 1;
                steps.push({
                    type: 'base-row',
                    i: 0,
                    j: j,
                    dpSnapshot: JSON.parse(JSON.stringify(dp)),
                    panel: `Base case first row: dp[0][${j}] = 1`,
                    statusText: `First row dp[0][${j}] = 1`,
                    log: `Set dp[0][${j}] = 1 (only one path along top row)`,
                    logColor: 'var(--accent-green)'
                });
            }
            for (let i = 1; i < m; i++) {
                dp[i][0] = 1;
                steps.push({
                    type: 'base-col',
                    i: i,
                    j: 0,
                    dpSnapshot: JSON.parse(JSON.stringify(dp)),
                    panel: `Base case first column: dp[${i}][0] = 1`,
                    statusText: `First column dp[${i}][0] = 1`,
                    log: `Set dp[${i}][0] = 1 (only one path along left column)`,
                    logColor: 'var(--accent-green)'
                });
            }

            // Fill the rest
            for (let i = 1; i < m; i++) {
                for (let j = 1; j < n; j++) {
                    const fromAbove = dp[i-1][j];
                    const fromLeft = dp[i][j-1];
                    dp[i][j] = fromAbove + fromLeft;

                    steps.push({
                        type: 'update',
                        i: i,
                        j: j,
                        dpSnapshot: JSON.parse(JSON.stringify(dp)),
                        panel: `Cell (${i},${j})<br>paths = dp[${i-1}][${j}] + dp[${i}][${j-1}] = ${fromAbove} + ${fromLeft} = ${dp[i][j]}`,
                        statusText: `Cell (${i},${j})`,
                        log: `dp[${i}][${j}] = ${fromAbove} + ${fromLeft} = ${dp[i][j]}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            // FINAL
            const result = dp[m-1][n-1];
            steps.push({
                type: 'final',
                i: m-1,
                j: n-1,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `All cells filled.<br>Unique paths = <span style="color:var(--accent-green)"><b>${result}</b></span>`,
                statusText: `Final paths = ${result}`,
                log: `\nFinal answer dp[${m-1}][${n-1}] = ${result}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: result
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render grid
            const gridContainer = document.getElementById('grid-container');
            gridContainer.innerHTML = '';
            gridContainer.style.gridTemplateColumns = `repeat(${currentN}, 62px)`;
            for (let i = 0; i < currentM; i++) {
                for (let j = 0; j < currentN; j++) {
                    const cell = document.createElement('div');
                    cell.className = `grid-cell ${i === step.i && j === step.j ? 'current' : ''} ${i === currentM-1 && j === currentN-1 ? 'end' : ''} ${i === 0 && j === 0 ? 'start' : ''}`;
                    const currentDP = step.dpSnapshot || dp;
                    cell.innerText = currentDP[i][j];
                    gridContainer.appendChild(cell);
                }
            }

            // Render DP grid
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-grid" style="grid-template-columns: repeat(${currentN + 1}, 68px);"></div>`;
            const grid = dpContainer.querySelector('.dp-grid');

            // Header
            const header = document.createElement('div');
            header.style.display = 'contents';
            const emptyHeader = document.createElement('div');
            emptyHeader.className = 'dp-cell header';
            emptyHeader.textContent = 'i\\j';
            header.appendChild(emptyHeader);
            for (let j = 0; j < currentN; j++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.textContent = j;
                header.appendChild(cell);
            }
            grid.appendChild(header);

            // Rows
            const currentDP = step.dpSnapshot || dp;
            for (let i = 0; i < currentM; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.style.display = 'contents';
                const rowHeader = document.createElement('div');
                rowHeader.className = 'dp-cell header';
                rowHeader.textContent = i;
                rowDiv.appendChild(rowHeader);

                for (let j = 0; j < currentN; j++) {
                    const val = currentDP[i][j];
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${step.i === i && step.j === j ? 'current' : ''}`;
                    cell.textContent = val;
                    rowDiv.appendChild(cell);
                }
                grid.appendChild(rowDiv);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-cell').innerText = step.i !== null ? `(${step.i},${step.j})` : '—';
            document.getElementById('val-left').innerText = step.j !== null && step.i !== null && step.j > 0 ? dp[step.i][step.j - 1] : '—';
            document.getElementById('val-above').innerText = step.j !== null && step.i !== null && step.i > 0 ? dp[step.i - 1][step.j] : '—';
            document.getElementById('val-total').innerText = step.j !== null && step.i !== null ? dp[step.i][step.j] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
