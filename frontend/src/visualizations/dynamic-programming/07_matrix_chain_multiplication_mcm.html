<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Chain Multiplication (MCM) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 220px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 110px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 14px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main); line-height: 1.1;
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        .dp-grid {
            display: grid;
            gap: 4px;
            margin-top: 20px;
            max-width: 920px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }

        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); }
        .tile.past { opacity: 0.35; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        .dp-cell {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 16px; font-weight: 700; font-family: monospace;
            border: 2px solid var(--border-main); background: #21262d;
            color: var(--accent-blue); transition: all 0.3s ease; position: relative;
        }
        .dp-cell.header { background: var(--bg-surface); font-size: 13px; color: var(--text-dim); font-weight: normal; }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.08); box-shadow: 0 0 12px var(--accent-green); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">p =</label>
        <input type="text" id="p-input" value="[10,30,5,60]" style="width:220px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([10,30,5,60])">Ex 1 ([10,30,5,60])</button>
        <button onclick="loadExample([40,20,30,10,30])">Ex 2 ([40,20,30,10,30])</button>
        <button onclick="loadExample([1,2,3,4])">Ex 3 ([1,2,3,4])</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Matrix Dimensions (p array):</div>
        <div class="tiles-wrapper" id="p-tiles"></div>

        <div class="ui-label" style="margin-top:25px;">DP Table (min cost for matrices i to j):</div>
        <div id="dp-container" style="overflow-x:auto; max-width:920px;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Subchain Length</span>
            <span class="info-value" id="val-l" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">i (start)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">j (end)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Split k</span>
            <span class="info-value" id="val-k" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Min Cost</span>
            <span class="info-value" id="val-cost" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Minimum Multiplication Cost =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current subchain</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Best cost</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border:1px solid var(--accent-blue)"></span> Current split k</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Completed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputP = [10, 30, 5, 60];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 400];

        function init() { loadExample([10, 30, 5, 60]); }

        function parseArray(str) {
            try {
                return JSON.parse(str);
            } catch(e) {
                return null;
            }
        }

        function loadExample(newP) {
            inputP = newP;
            document.getElementById('p-input').value = JSON.stringify(newP);
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('p-input').value.trim();
            const parsed = parseArray(valStr);
            if (parsed && Array.isArray(parsed) && parsed.every(n => Number.isInteger(n) && n > 0)) {
                loadExample(parsed);
            } else {
                alert("Please enter a valid array of positive integers, e.g. [10,30,5,60]");
            }
        }

        function generateSteps() {
            steps = [];
            const p = [...inputP];
            const n = p.length - 1; // number of matrices

            // STEP 0: INIT
            steps.push({
                type: 'init',
                L: 1,
                i: null,
                j: null,
                k: null,
                currentCost: null,
                dp: Array(n+1).fill(0).map(() => Array(n+1).fill(0)),
                panel: `Matrix Chain Multiplication.<br>p = <b>${JSON.stringify(p)}</b><br>${n} matrices: A₁(${p[0]}×${p[1]}), A₂(${p[1]}×${p[2]}), ...`,
                statusText: `Initializing DP table for ${n} matrices`,
                log: `p = ${JSON.stringify(p)}\nInitialize dp[1..${n}][1..${n}]`,
                logColor: 'var(--text-dim)'
            });

            let dp = Array(n+1).fill(0).map(() => Array(n+1).fill(0));

            // Fill for length 1 (base case already 0)

            for (let L = 2; L <= n; L++) {
                for (let i = 1; i <= n - L + 1; i++) {
                    let j = i + L - 1;
                    let minCost = Infinity;
                    let bestK = -1;

                    steps.push({
                        type: 'start-subchain',
                        L: L,
                        i: i,
                        j: j,
                        k: null,
                        currentCost: null,
                        dp: dp.map(row => [...row]),
                        panel: `Processing subchain of length <b>${L}</b>: matrices <b>${i}</b> to <b>${j}</b>`,
                        statusText: `L=${L}, i=${i}, j=${j}`,
                        log: `\n--- Length ${L}: i=${i}, j=${j} ---`,
                        logColor: 'var(--accent-orange)'
                    });

                    for (let k = i; k < j; k++) {
                        let leftCost = dp[i][k];
                        let rightCost = dp[k+1][j];
                        let multiplyCost = p[i-1] * p[k] * p[j];
                        let totalCost = leftCost + rightCost + multiplyCost;

                        steps.push({
                            type: 'try-split',
                            L: L,
                            i: i,
                            j: j,
                            k: k,
                            currentCost: totalCost,
                            dp: dp.map(row => [...row]),
                            panel: `Try split at k=<b>${k}</b><br>Left (i..k): <b>${leftCost}</b><br>Right (k+1..j): <b>${rightCost}</b><br>Multiply: <b>${p[i-1]}×${p[k]}×${p[j]}</b> = <b>${multiplyCost}</b><br>Total: <b>${totalCost}</b>`,
                            statusText: `k=${k}, cost=${totalCost}`,
                            log: `  k=${k}: ${leftCost} + ${rightCost} + ${multiplyCost} = ${totalCost}`,
                            logColor: 'var(--accent-blue)'
                        });

                        if (totalCost < minCost) {
                            minCost = totalCost;
                            bestK = k;
                        }
                    }

                    dp[i][j] = minCost;

                    steps.push({
                        type: 'set-min',
                        L: L,
                        i: i,
                        j: j,
                        k: bestK,
                        currentCost: minCost,
                        dp: dp.map(row => [...row]),
                        panel: `Minimum cost for matrices <b>${i}</b> to <b>${j}</b> is <span style="color:var(--accent-green)"><b>${minCost}</b></span> (at k=<b>${bestK}</b>)`,
                        statusText: `dp[${i}][${j}] = ${minCost}`,
                        log: `  → min cost = ${minCost} (best k=${bestK})`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            // FINAL
            steps.push({
                type: 'final',
                L: n,
                i: 1,
                j: n,
                k: null,
                currentCost: dp[1][n],
                dp: dp.map(row => [...row]),
                panel: `Full chain complete.<br>Minimum multiplication cost = <span style="color:var(--accent-green)"><b>${dp[1][n]}</b></span>`,
                statusText: `Done. Min cost = ${dp[1][n]}`,
                log: `\nFinal minimum cost = ${dp[1][n]}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: dp[1][n]
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render p tiles
            const pContainer = document.getElementById('p-tiles');
            pContainer.innerHTML = '';
            const p = inputP;
            for (let i = 0; i < p.length; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.L && step.i && i >= step.i-1 && i <= step.j ? 'candidate' : 'idle'}`;
                tile.innerHTML = i === 0 ? `<span>p<sub>0</sub></span><br>${p[i]}` : `<span>p<sub>${i}</sub></span><br>${p[i]}`;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = i;
                wrapper.append(tile, idxLabel);
                pContainer.appendChild(wrapper);
            }

            // Render DP table
            const n = p.length - 1;
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-grid" style="grid-template-columns: repeat(${n+1}, 58px);"></div>`;
            const grid = dpContainer.querySelector('.dp-grid');

            // Header row
            const headerRow = document.createElement('div');
            headerRow.style.display = 'contents';
            const emptyCell = document.createElement('div');
            emptyCell.className = 'dp-cell header';
            emptyCell.textContent = '';
            headerRow.appendChild(emptyCell);
            for (let j = 1; j <= n; j++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.textContent = j;
                headerRow.appendChild(cell);
            }
            grid.appendChild(headerRow);

            // DP rows
            const currentDP = step.dp;
            for (let i = 1; i <= n; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.style.display = 'contents';
                const rowHeader = document.createElement('div');
                rowHeader.className = 'dp-cell header';
                rowHeader.textContent = i;
                rowDiv.appendChild(rowHeader);

                for (let j = 1; j <= n; j++) {
                    const cellVal = currentDP[i][j] || 0;
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${step.i === i && step.j === j ? 'current' : (cellVal > 0 ? 'winning' : '')}`;
                    cell.textContent = cellVal === 0 && i !== j ? '' : cellVal;
                    if (i > j) cell.style.opacity = '0.3';
                    rowDiv.appendChild(cell);
                }
                grid.appendChild(rowDiv);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-l').innerText = step.L || '—';
            document.getElementById('val-i').innerText = step.i || '—';
            document.getElementById('val-j').innerText = step.j || '—';
            document.getElementById('val-k').innerText = step.k !== null ? step.k : '—';
            document.getElementById('val-cost').innerText = step.currentCost !== null ? step.currentCost : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
