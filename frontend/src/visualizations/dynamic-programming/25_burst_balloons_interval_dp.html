<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burst Balloons (interval DP) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 240px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .balloons-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 110px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); }
        .tile.past { opacity: 0.35; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* DP GRID */
        .dp-container { 
            margin-top: 20px;
            overflow-x: auto;
            max-width: 920px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .dp-grid {
            display: grid;
            gap: 4px;
        }
        .dp-cell {
            min-width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            position: relative;
        }
        .dp-cell.header { background: var(--bg-surface); font-size: 12px; color: var(--text-dim); font-weight: normal; }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.08); box-shadow: 0 0 12px var(--accent-green); }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="nums-input" value="[3,1,5,8]" style="width:240px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([3,1,5,8])">Ex 1 (167)</button>
        <button onclick="loadExample([1,5])">Ex 2 (10)</button>
        <button onclick="loadExample([2,3,4])">Ex 3 (40)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Balloons (with virtual 1s at boundaries):</div>
        <div class="balloons-wrapper" id="balloons-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP Table dp[i][j] = max coins from bursting balloons i to j</div>
        <div id="dp-container" style="overflow-x:auto; max-width:920px;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Interval Length</span>
            <span class="info-value" id="val-len" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">i (start)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">j (end)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Last burst k</span>
            <span class="info-value" id="val-k" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Coins from k</span>
            <span class="info-value" id="val-coins" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Maximum coins =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current interval</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Updated max</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border:1px solid var(--accent-blue)"></span> Last burst k</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Completed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputNums = [3,1,5,8];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 400];

        function init() { loadExample([3,1,5,8]); }

        function loadExample(newNums) {
            inputNums = newNums;
            document.getElementById('nums-input').value = JSON.stringify(newNums);
            generateSteps();
            reset();
        }

        function loadCustom() {
            let nums;
            try {
                nums = JSON.parse(document.getElementById('nums-input').value);
            } catch(e) {
                alert("Please enter a valid array for nums, e.g. [3,1,5,8]");
                return;
            }
            if (Array.isArray(nums) && nums.length > 0) {
                loadExample(nums);
            } else {
                alert("Invalid input.");
            }
        }

        function generateSteps() {
            steps = [];
            let nums = [1, ...inputNums, 1]; // virtual balloons
            const n = inputNums.length; // original n
            const N = nums.length - 2; // original

            let dp = Array.from({length: nums.length}, () => Array(nums.length).fill(0));

            // STEP 0: INIT
            steps.push({
                type: 'init',
                i: null,
                j: null,
                k: null,
                dp: JSON.parse(JSON.stringify(dp)),
                panel: `Burst Balloons — Interval DP<br>nums = [${inputNums}]<br>Virtual: [1, ${inputNums}, 1]`,
                statusText: `Initializing DP table with virtual balloons`,
                log: `nums with virtual: [${nums}]\nInitialize dp[][] = 0`,
                logColor: 'var(--text-dim)'
            });

            // Length 1 base cases
            for (let i = 1; i <= n; i++) {
                dp[i][i] = nums[i-1] * nums[i] * nums[i+1];
                steps.push({
                    type: 'base',
                    i: i,
                    j: i,
                    k: i,
                    dp: JSON.parse(JSON.stringify(dp)),
                    panel: `Base case length=1: dp[${i}][${i}] = ${nums[i-1]} * ${nums[i]} * ${nums[i+1]} = <span style="color:var(--accent-green)">${dp[i][i]}</span>`,
                    statusText: `dp[${i}][${i}] = ${dp[i][i]}`,
                    log: `dp[${i}][${i}] = ${dp[i][i]}`,
                    logColor: 'var(--accent-green)'
                });
            }

            // For increasing length
            for (let len = 2; len <= n; len++) {
                for (let i = 1; i <= n - len + 1; i++) {
                    const j = i + len - 1;

                    steps.push({
                        type: 'start-interval',
                        i: i,
                        j: j,
                        k: null,
                        dp: JSON.parse(JSON.stringify(dp)),
                        panel: `Processing interval [${i},${j}] (length ${len})`,
                        statusText: `Interval [${i},${j}]`,
                        log: `\n--- Length ${len}: i=${i}, j=${j} ---`,
                        logColor: 'var(--accent-orange)'
                    });

                    let maxForInterval = 0;

                    for (let k = i; k <= j; k++) {
                        const left = dp[i][k-1] || 0;
                        const right = dp[k+1][j] || 0;
                        const coins = nums[i-1] * nums[k] * nums[j+1];
                        const val = left + coins + right;

                        if (val > maxForInterval) maxForInterval = val;

                        steps.push({
                            type: 'try-k',
                            i: i,
                            j: j,
                            k: k,
                            dp: JSON.parse(JSON.stringify(dp)),
                            panel: `Try k=${k} as last burst<br>Coins from k = ${nums[i-1]} * ${nums[k]} * ${nums[j+1]} = <span style="color:var(--accent-orange)">${coins}</span><br>Left sub = dp[${i}][${k-1}] = ${left}<br>Right sub = dp[${k+1}][${j}] = ${right}<br>Total = <span style="color:var(--accent-green)">${val}</span>`,
                            statusText: `k = ${k}`,
                            log: `  k=${k}: ${left} + ${coins} + ${right} = ${val}`,
                            logColor: 'var(--accent-blue)'
                        });
                    }

                    dp[i][j] = maxForInterval;

                    steps.push({
                        type: 'update',
                        i: i,
                        j: j,
                        k: null,
                        dp: JSON.parse(JSON.stringify(dp)),
                        panel: `dp[${i}][${j}] updated to <span style="color:var(--accent-green)"><b>${dp[i][j]}</b></span>`,
                        statusText: `dp[${i}][${j}] = ${dp[i][j]}`,
                        log: `dp[${i}][${j}] = ${dp[i][j]}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            // FINAL
            steps.push({
                type: 'final',
                i: 1,
                j: n,
                k: null,
                dp: JSON.parse(JSON.stringify(dp)),
                panel: `All intervals processed.<br>Maximum coins = <span style="color:var(--accent-green)"><b>${dp[1][n]}</b></span>`,
                statusText: `Final max coins = ${dp[1][n]}`,
                log: `\nFinal dp[1][${n}] = ${dp[1][n]}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: dp[1][n]
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render balloons with virtual
            const balloonsContainer = document.getElementById('balloons-container');
            balloonsContainer.innerHTML = '';
            let displayNums = [1, ...inputNums, 1];
            displayNums.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.i !== null && i >= step.i && i <= step.j ? 'candidate' : (step.i !== null && i < step.i || i > step.j ? 'past' : 'idle')}`;
                if (i === 0 || i === displayNums.length - 1) tile.style.opacity = '0.6';
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = i === 0 || i === displayNums.length-1 ? 'virtual' : (i-1);
                wrapper.append(tile, idxLabel);
                balloonsContainer.appendChild(wrapper);
            });

            // Render DP grid
            const n = inputNums.length;
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-grid" style="grid-template-columns: repeat(${n+2}, 62px);"></div>`;
            const grid = dpContainer.querySelector('.dp-grid');

            // Header row
            const headerRow = document.createElement('div');
            headerRow.style.display = 'contents';
            const empty = document.createElement('div');
            empty.className = 'dp-cell header';
            empty.textContent = '';
            headerRow.appendChild(empty);
            for (let c = 0; c <= n+1; c++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.textContent = c;
                headerRow.appendChild(cell);
            }
            grid.appendChild(headerRow);

            // DP rows
            const currentDP = step.dp;
            for (let i = 0; i <= n+1; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.style.display = 'contents';
                const rowHeader = document.createElement('div');
                rowHeader.className = 'dp-cell header';
                rowHeader.textContent = i;
                rowDiv.appendChild(rowHeader);

                for (let j = 0; j <= n+1; j++) {
                    const cellVal = currentDP[i][j] || 0;
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${(step.i === i && step.j === j) ? 'current' : ''}`;
                    cell.textContent = cellVal;
                    if (i > j) cell.style.opacity = '0.3';
                    rowDiv.appendChild(cell);
                }
                grid.appendChild(rowDiv);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-len').innerText = step.i !== null ? (step.j - step.i + 1) : '—';
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-k').innerText = step.k !== null ? step.k : '—';
            document.getElementById('val-coins').innerText = step.k !== null && step.i !== null ? (nums[step.i-1] * nums[step.k] * nums[step.j+1]) : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
