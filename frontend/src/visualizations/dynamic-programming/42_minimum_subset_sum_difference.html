<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Subset Sum Difference - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 260px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .nums-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 110px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile.current { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); }
        .tile.index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        /* DP TABLE */
        .dp-container { 
            margin-top: 20px;
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
            width: 920px;
            overflow-x: auto;
        }
        .dp-bar {
            display: flex;
            gap: 4px;
            justify-content: flex-start;
        }
        .dp-cell {
            min-width: 52px;
            height: 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            border-radius: 6px;
            text-align: center;
        }
        .dp-cell.true { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .dp-cell.current { border-color: var(--accent-orange); transform: scale(1.08); box-shadow: 0 0 12px var(--accent-orange); }
        .dp-cell.label { background: var(--bg-surface); color: var(--text-dim); font-size: 11px; height: auto; }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 110px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="nums-input" value="[1,6,11,5]" style="width:260px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,6,11,5])">Ex 1 (diff 1)</button>
        <button onclick="loadExample([3,1,4,2,2,1])">Ex 2 (diff 1)</button>
        <button onclick="loadExample([1,2,3,9])">Ex 3 (diff 3)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Array (current element highlighted)</div>
        <div class="nums-wrapper" id="nums-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP — Achievable subset sums (0 to total/2)</div>
        <div id="dp-container" style="overflow-x:auto; max-width:920px;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current element</span>
            <span class="info-value" id="val-num" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Total sum</span>
            <span class="info-value" id="val-total" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Half</span>
            <span class="info-value" id="val-half" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Closest sum</span>
            <span class="info-value" id="val-closest" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Minimum difference =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Achievable sum</div>
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current update</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputNums = [1,6,11,5];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];
        let totalSum = 0;
        let dp = [];
        let half = 0;

        function init() {
            loadExample([1,6,11,5]);
        }

        function loadExample(newNums) {
            inputNums = newNums;
            document.getElementById('nums-input').value = JSON.stringify(newNums);
            generateSteps();
            reset();
        }

        function loadCustom() {
            let nums;
            try {
                nums = JSON.parse(document.getElementById('nums-input').value);
            } catch(e) {
                alert("Invalid array, e.g. [1,6,11,5]");
                return;
            }
            if (Array.isArray(nums)) {
                loadExample(nums);
            } else {
                alert("Invalid input.");
            }
        }

        function generateSteps() {
            steps = [];
            const n = inputNums.length;
            totalSum = inputNums.reduce((a,b) => a + b, 0);
            half = Math.floor(totalSum / 2);

            // Initialize dp
            dp = new Array(half + 1).fill(false);
            dp[0] = true;

            steps.push({
                type: 'init',
                numIndex: -1,
                dpSnapshot: [...dp],
                panel: `Minimum Subset Sum Difference — 1D DP Subset Sum<br>nums = [${inputNums}]<br>Total sum = ${totalSum}, target half = ${half}`,
                statusText: `Initializing DP[0..${half}]`,
                log: `DP[0] = true (empty subset)\nTotal sum = ${totalSum}`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 0; i < n; i++) {
                const num = inputNums[i];
                steps.push({
                    type: 'start-num',
                    numIndex: i,
                    dpSnapshot: [...dp],
                    panel: `Processing element nums[${i}] = ${num}`,
                    statusText: `Current element = ${num}`,
                    log: `\n--- Processing nums[${i}] = ${num} ---`,
                    logColor: 'var(--accent-orange)'
                });

                // Backward iteration for this num
                for (let s = half; s >= num; s--) {
                    const wasTrue = dp[s];
                    const canAchieve = dp[s - num];
                    dp[s] = dp[s] || canAchieve;

                    steps.push({
                        type: 'update',
                        numIndex: i,
                        s: s,
                        dpSnapshot: [...dp],
                        panel: `s = ${s}<br>dp[${s}] = dp[${s}] OR dp[${s - num}] = ${wasTrue} OR ${canAchieve} → ${dp[s]}`,
                        statusText: `Updating s=${s}`,
                        log: `s=${s}: ${wasTrue} || ${canAchieve} → ${dp[s]}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            // Find closest achievable sum to half
            let closest = 0;
            for (let s = half; s >= 0; s--) {
                if (dp[s]) {
                    closest = s;
                    break;
                }
            }
            const minDiff = totalSum - 2 * closest;

            steps.push({
                type: 'final',
                numIndex: null,
                dpSnapshot: [...dp],
                panel: `All elements processed.<br>Largest achievable sum ≤ ${half} = ${closest}<br>Minimum difference = ${totalSum} - 2*${closest} = <span style="color:var(--accent-green)"><b>${minDiff}</b></span>`,
                statusText: `Final diff = ${minDiff}`,
                log: `\nClosest sum ≤ half = ${closest}\nMin difference = ${minDiff}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: minDiff
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render nums tiles
            const numsContainer = document.getElementById('nums-container');
            numsContainer.innerHTML = '';
            inputNums.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                let cls = 'tile';
                if (step.numIndex === i) cls += ' current';
                tile.className = cls;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = i;
                wrapper.append(tile, idxLabel);
                numsContainer.appendChild(wrapper);
            });

            // Render DP bar
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-bar"></div>`;
            const bar = dpContainer.querySelector('.dp-bar');

            // Header for sums
            const header = document.createElement('div');
            header.style.display = 'flex';
            header.style.gap = '4px';
            for (let s = 0; s <= half; s++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell label';
                cell.style.height = '20px';
                cell.style.fontSize = '10px';
                cell.textContent = s;
                header.appendChild(cell);
            }
            bar.appendChild(header);

            const currentDP = step.dpSnapshot || dp;
            const row = document.createElement('div');
            row.style.display = 'flex';
            row.style.gap = '4px';
            for (let s = 0; s <= half; s++) {
                const cell = document.createElement('div');
                cell.className = `dp-cell ${currentDP[s] ? 'true' : ''}`;
                cell.innerHTML = `<div>${currentDP[s] ? '✓' : '✗'}</div>`;
                if (step.type === 'update' && step.s === s) cell.classList.add('current');
                row.appendChild(cell);
            }
            bar.appendChild(row);

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-num').innerText = step.numIndex !== null && step.numIndex >= 0 ? inputNums[step.numIndex] : '—';
            document.getElementById('val-total').innerText = totalSum;
            document.getElementById('val-half').innerText = half;
            document.getElementById('val-closest').innerText = step.result !== undefined ? (totalSum - step.result) / 2 : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
