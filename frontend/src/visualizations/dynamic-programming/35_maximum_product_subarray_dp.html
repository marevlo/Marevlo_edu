<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximum Product Subarray (DP) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 320px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: VISUAL TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* STATE DISPLAY */
        .state-panel {
            margin-top: 10px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; background: var(--bg-surface);
            border: 1px solid var(--border-main); border-radius: 8px; padding: 16px; width: 680px;
        }
        .state-item { text-align: center; min-width: 110px; }
        .state-label { font-size: 11px; color: var(--text-dim); }
        .state-value { font-size: 22px; font-weight: 700; font-family: monospace; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 10px 16px; display: flex; flex-direction: column; align-items: center; min-width: 130px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 18px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 16px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 28px; display: flex; align-items: center; gap: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 120px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 14px; display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 3px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 16px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 18px; width: 700px; max-width: 92%; height: 138px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="arr-input" placeholder="[2, 3, -2, 4]" value="[2, 3, -2, 4]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[2,3,-2,4]')">Ex 1</button>
        <button onclick="loadExample('[-2,0,-1]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="ui-label" id="arr-label">Array nums:</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="state-panel" id="state-display">
        <div class="state-item">
            <div class="state-label">max_ending_here</div>
            <div class="state-value" id="max-ending" style="color: var(--accent-green);">—</div>
        </div>
        <div class="state-item">
            <div class="state-label">min_ending_here</div>
            <div class="state-value" id="min-ending" style="color: var(--accent-red);">—</div>
        </div>
        <div class="state-item">
            <div class="state-label">global_max</div>
            <div class="state-value" id="global-max" style="color: var(--accent-green);">—</div>
        </div>
        <div class="state-item">
            <div class="state-label">current num</div>
            <div class="state-value" id="curr-num" style="color: var(--accent-orange);">—</div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Index i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Candidates</span>
            <span class="info-value" id="val-cand" style="color: var(--accent-purple);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">Maximum product subarray =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#21262d;border:2px solid var(--accent-orange)"></span> Current element</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green);border:2px solid var(--accent-green)"></span> Max ending</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red);border:2px solid var(--accent-red)"></span> Min ending</div>
        <div class="legend-item"><span class="dot" style="background:#161b22;border:2px solid var(--border-main);opacity:0.5"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let nums = [2, 3, -2, 4];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 350];

        function generateSteps() {
            steps = [];
            const n = nums.length;
            if (n === 0) return;

            let globalMax = nums[0];
            let maxEnding = nums[0];
            let minEnding = nums[0];

            steps.push({
                type: 'init',
                i: 0,
                maxEnding: nums[0],
                minEnding: nums[0],
                globalMax: nums[0],
                currNum: nums[0],
                digitsStates: Array(n).fill('idle'),
                panel: `Initialize:<br>global_max = nums[0] = <b>${nums[0]}</b><br>max_ending = <b>${nums[0]}</b><br>min_ending = <b>${nums[0]}</b>`,
                statusText: `i=0, start with ${nums[0]}`,
                log: `Initialize with nums[0] = ${nums[0]}`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 1; i < n; i++) {
                const curr = nums[i];
                const cand1 = curr;
                const cand2 = maxEnding * curr;
                const cand3 = minEnding * curr;

                const newMax = Math.max(cand1, cand2, cand3);
                const newMin = Math.min(cand1, cand2, cand3);

                steps.push({
                    type: 'compute',
                    i: i,
                    maxEnding: maxEnding,
                    minEnding: minEnding,
                    globalMax: globalMax,
                    currNum: curr,
                    candidates: [cand1, cand2, cand3],
                    newMax: newMax,
                    newMin: newMin,
                    digitsStates: Array(n).fill('idle'),
                    panel: `i = <b>${i}</b> (num = <b>${curr}</b>)<br>candidates:<br>num = ${cand1}<br>max_prev * num = ${cand2}<br>min_prev * num = ${cand3}<br>→ new max_ending = <b>${newMax}</b><br>→ new min_ending = <b>${newMin}</b>`,
                    statusText: `i=${i}, max=${newMax}, min=${newMin}`,
                    log: `i=${i} num=${curr} → max=${newMax} min=${newMin}`,
                    logColor: 'var(--accent-purple)'
                });

                maxEnding = newMax;
                minEnding = newMin;
                globalMax = Math.max(globalMax, newMax);
            }

            steps.push({
                type: 'final',
                i: n,
                maxEnding: maxEnding,
                minEnding: minEnding,
                globalMax: globalMax,
                digitsStates: Array(n).fill('winning'),
                panel: `All indices processed.<br><b>Maximum product = ${globalMax}</b>`,
                complete: true,
                result: globalMax,
                statusText: `Done. Max = ${globalMax}`,
                log: `\nFinal maximum product: ${globalMax}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render array tiles
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            for (let k = 0; k < nums.length; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.digitsStates[k]}`;
                tile.innerText = nums[k];
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${k}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            }

            // Update state panel
            document.getElementById('max-ending').innerText = step.maxEnding !== undefined ? step.maxEnding : '—';
            document.getElementById('min-ending').innerText = step.minEnding !== undefined ? step.minEnding : '—';
            document.getElementById('global-max').innerText = step.globalMax !== undefined ? step.globalMax : '—';
            document.getElementById('curr-num').innerText = step.currNum !== undefined ? step.currNum : '—';

            // Action panel
            document.getElementById('main-panel').innerHTML = step.panel || '—';

            // Info panel
            document.getElementById('val-i').innerText = step.i !== undefined ? step.i : '—';
            const candStr = step.candidates ? step.candidates.join(', ') : '—';
            document.getElementById('val-cand').innerText = candStr;

            // Result
            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            // Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) {
                pause();
            } else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            if (timer) clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        function loadCustom() {
            const input = document.getElementById('arr-input').value.trim();
            try {
                const parsed = JSON.parse(input);
                if (Array.isArray(parsed)) {
                    nums = parsed;
                    generateSteps();
                    reset();
                }
            } catch(e) {
                alert("Invalid array format. Example: [2,3,-2,4]");
            }
        }

        function loadExample(example) {
            nums = JSON.parse(example);
            document.getElementById('arr-input').value = example;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
