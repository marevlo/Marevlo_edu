<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longest Common Substring - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 180px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 900px; min-height: 70px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); }
        .tile.match { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.12); box-shadow: 0 0 12px var(--accent-green); }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.18); box-shadow: 0 0 16px var(--accent-green); }
        .tile.past { opacity: 0.4; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        .dp-grid {
            display: grid;
            gap: 4px;
            margin-top: 10px;
            max-width: 900px;
        }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">s1 =</label>
        <input type="text" id="s1-input" value="ABCD">
        <label class="ui-label">s2 =</label>
        <input type="text" id="s2-input" value="ABCDE">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('ABCD', 'ABCDE')">Ex 1 (ABCD, ABCDE)</button>
        <button onclick="loadExample('XYZ', 'ABC')">Ex 2 (XYZ, ABC)</button>
        <button onclick="loadExample('hello', 'help')">Ex 3 (hello, help)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">String 1:</div>
        <div class="tiles-wrapper" id="s1-tiles"></div>
        
        <div class="ui-label" style="margin-top:20px;">String 2:</div>
        <div class="tiles-wrapper" id="s2-tiles"></div>

        <div class="ui-label" style="margin-top:25px;">DP Table (length of LCS ending at i,j):</div>
        <div id="dp-container" style="overflow-x:auto; max-width:920px;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">i (s1)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">j (s2)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Length</span>
            <span class="info-value" id="val-currlen" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Max Length</span>
            <span class="info-value" id="val-maxlen" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">LCS Found</span>
            <span class="info-value" id="val-lcs" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Longest Common Substring =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current chars</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Match (extend)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border:1px solid var(--accent-blue)"></span> Current DP cell</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Previous</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let s1 = "ABCD";
        let s2 = "ABCDE";
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 400];

        function init() { loadExample("ABCD", "ABCDE"); }

        function loadExample(newS1, newS2) {
            s1 = newS1;
            s2 = newS2;
            document.getElementById('s1-input').value = s1;
            document.getElementById('s2-input').value = s2;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val1 = document.getElementById('s1-input').value.trim();
            const val2 = document.getElementById('s2-input').value.trim();
            if (val1 && val2) {
                loadExample(val1, val2);
            } else {
                alert("Please enter both strings.");
            }
        }

        function generateSteps() {
            steps = [];
            const m = s1.length;
            const n = s2.length;

            // STEP 0: INIT
            steps.push({
                type: 'init',
                i: 0,
                j: 0,
                currLen: 0,
                maxLen: 0,
                dp: Array(m+1).fill(0).map(() => Array(n+1).fill(0)),
                s1Chars: s1.split(''),
                s2Chars: s2.split(''),
                panel: `Longest Common Substring (contiguous).<br>s1 = <b>${s1}</b> (m=${m})<br>s2 = <b>${s2}</b> (n=${n})<br>DP table: dp[i][j] = length of LCS ending at s1[i-1], s2[j-1]`,
                statusText: `Initializing DP table`,
                log: `s1 = "${s1}"\ns2 = "${s2}"\nInitialize dp[(m+1)x(n+1)] = 0\nmaxLen = 0`,
                logColor: 'var(--text-dim)'
            });

            let dp = Array(m+1).fill(0).map(() => Array(n+1).fill(0));
            let maxLen = 0;
            let bestI = 0;
            let bestJ = 0;

            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    const char1 = s1[i-1];
                    const char2 = s2[j-1];

                    // Compare step
                    steps.push({
                        type: 'compare',
                        i: i,
                        j: j,
                        currLen: dp[i-1][j-1],
                        maxLen: maxLen,
                        dp: dp.map(row => [...row]),
                        s1Chars: s1.split(''),
                        s2Chars: s2.split(''),
                        panel: `Compare <b>s1[${i-1}]</b> = <span style="color:var(--accent-orange)">${char1}</span> and <b>s2[${j-1}]</b> = <span style="color:var(--accent-purple)">${char2}</span>`,
                        statusText: `i=${i}, j=${j}`,
                        log: `\ni=${i}, j=${j}: compare '${char1}' and '${char2}'`,
                        logColor: 'var(--accent-orange)'
                    });

                    if (char1 === char2) {
                        dp[i][j] = dp[i-1][j-1] + 1;
                        if (dp[i][j] > maxLen) {
                            maxLen = dp[i][j];
                            bestI = i;
                            bestJ = j;
                        }
                        steps.push({
                            type: 'match',
                            i: i,
                            j: j,
                            currLen: dp[i][j],
                            maxLen: maxLen,
                            dp: dp.map(row => [...row]),
                            s1Chars: s1.split(''),
                            s2Chars: s2.split(''),
                            panel: `Match! <b>${char1}</b> == <b>${char2}</b><br>dp[${i}][${j}] = dp[${i-1}][${j-1}] + 1 = <span style="color:var(--accent-green)">${dp[i][j]}</span>`,
                            statusText: `+1 to length`,
                            log: `  MATCH → dp[${i}][${j}] = ${dp[i][j]}`,
                            logColor: 'var(--accent-green)'
                        });
                    } else {
                        dp[i][j] = 0;
                        steps.push({
                            type: 'mismatch',
                            i: i,
                            j: j,
                            currLen: 0,
                            maxLen: maxLen,
                            dp: dp.map(row => [...row]),
                            s1Chars: s1.split(''),
                            s2Chars: s2.split(''),
                            panel: `Mismatch. Reset dp[${i}][${j}] = <b>0</b>`,
                            statusText: `Reset length`,
                            log: `  MISMATCH → dp[${i}][${j}] = 0`,
                            logColor: 'var(--accent-red)'
                        });
                    }
                }
            }

            // Extract the actual substring
            const lcs = maxLen > 0 ? s1.substring(bestI - maxLen, bestI) : "";

            // FINAL
            steps.push({
                type: 'final',
                i: m,
                j: n,
                currLen: 0,
                maxLen: maxLen,
                dp: dp,
                s1Chars: s1.split(''),
                s2Chars: s2.split(''),
                panel: `Processing complete.<br>Longest Common Substring = <b>${lcs}</b> (length <b>${maxLen}</b>)`,
                statusText: `Done. LCS length = ${maxLen}`,
                log: `\nFinal LCS = "${lcs}" (length ${maxLen})`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: lcs,
                resultLen: maxLen
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render s1 tiles
            const s1Container = document.getElementById('s1-tiles');
            s1Container.innerHTML = '';
            step.s1Chars.forEach((ch, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.i === i+1 ? 'candidate' : (step.i > i+1 ? 'past' : 'idle')}`;
                tile.innerText = ch;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = i;
                wrapper.append(tile, idxLabel);
                s1Container.appendChild(wrapper);
            });

            // Render s2 tiles
            const s2Container = document.getElementById('s2-tiles');
            s2Container.innerHTML = '';
            step.s2Chars.forEach((ch, j) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.j === j+1 ? 'candidate' : (step.j > j+1 ? 'past' : 'idle')}`;
                tile.innerText = ch;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = j;
                wrapper.append(tile, idxLabel);
                s2Container.appendChild(wrapper);
            });

            // Render DP grid (only last few rows for visibility)
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = '<div class="dp-grid" style="grid-template-columns: repeat(' + (step.s2Chars.length + 1) + ', 38px);"></div>';
            const grid = dpContainer.querySelector('.dp-grid');

            // Header row for s2
            const headerRow = document.createElement('div');
            headerRow.style.display = 'contents';
            const emptyHeader = document.createElement('div');
            emptyHeader.style.width = '38px';
            emptyHeader.style.height = '38px';
            headerRow.appendChild(emptyHeader);
            step.s2Chars.forEach(ch => {
                const cell = document.createElement('div');
                cell.style.width = '38px';
                cell.style.height = '38px';
                cell.style.display = 'flex';
                cell.style.alignItems = 'center';
                cell.style.justifyContent = 'center';
                cell.style.fontSize = '13px';
                cell.style.fontFamily = 'monospace';
                cell.style.border = '1px solid var(--border-main)';
                cell.textContent = ch;
                headerRow.appendChild(cell);
            });
            grid.appendChild(headerRow);

            // DP rows
            const currentDP = step.dp;
            for (let row = 0; row < currentDP.length; row++) {
                const rowDiv = document.createElement('div');
                rowDiv.style.display = 'contents';

                // Row header (s1 char or empty)
                const headerCell = document.createElement('div');
                headerCell.style.width = '38px';
                headerCell.style.height = '38px';
                headerCell.style.display = 'flex';
                headerCell.style.alignItems = 'center';
                headerCell.style.justifyContent = 'center';
                headerCell.style.fontSize = '13px';
                headerCell.style.fontFamily = 'monospace';
                headerCell.style.border = '1px solid var(--border-main)';
                headerCell.textContent = row === 0 ? '' : step.s1Chars[row-1];
                rowDiv.appendChild(headerCell);

                for (let col = 0; col < currentDP[row].length; col++) {
                    const cellVal = currentDP[row][col];
                    const cell = document.createElement('div');
                    cell.style.width = '38px';
                    cell.style.height = '38px';
                    cell.style.display = 'flex';
                    cell.style.alignItems = 'center';
                    cell.style.justifyContent = 'center';
                    cell.style.fontSize = '15px';
                    cell.style.fontWeight = '600';
                    cell.style.fontFamily = 'monospace';
                    cell.style.border = '1px solid var(--border-main)';
                    cell.style.background = cellVal > 0 ? '#0f2a1a' : '#21262d';
                    cell.style.color = cellVal > 0 ? 'var(--accent-green)' : 'var(--text-dim)';
                    cell.textContent = cellVal;
                    if (row === step.i && col === step.j) {
                        cell.style.borderColor = 'var(--accent-blue)';
                        cell.style.boxShadow = '0 0 8px var(--accent-blue)';
                    }
                    rowDiv.appendChild(cell);
                }
                grid.appendChild(rowDiv);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-i').innerText = step.i || '—';
            document.getElementById('val-j').innerText = step.j || '—';
            document.getElementById('val-currlen').innerText = step.currLen || '—';
            document.getElementById('val-maxlen').innerText = step.maxLen || '—';
            document.getElementById('val-lcs').innerText = step.result || '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerHTML = `<b>${step.result}</b> <span style="font-size:14px;color:var(--text-dim)">(${step.resultLen})</span>`;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            // Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
