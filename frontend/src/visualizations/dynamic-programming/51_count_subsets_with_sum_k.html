<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Subsets with Sum = K - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"], input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 180px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        /* ARRAY TILES */
        .array-container {
            display: flex;
            gap: 8px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .array-tile {
            min-width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--text-main);
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        .array-tile.current { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); }

        /* DP BAR */
        .dp-container { 
            margin-top: 20px;
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
            width: 920px;
            overflow-x: auto;
        }
        .dp-bar {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .dp-cell {
            min-width: 58px;
            height: 58px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); }
        .dp-cell.header { background: var(--bg-surface); color: var(--text-dim); font-size: 11px; height: 24px; }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 110px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Array =</label>
        <input type="text" id="arr-input" value="1,2,3" style="width:180px">
        <label class="ui-label">K =</label>
        <input type="number" id="k-input" value="3" min="0" style="width:80px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,2,3], 3)">Ex 1 ([1,2,3] K=3 → 2)</button>
        <button onclick="loadExample([2,4,6], 6)">Ex 2 ([2,4,6] K=6 → 2)</button>
        <button onclick="loadExample([1,2,3,4,5], 7)">Ex 3 ([1,2,3,4,5] K=7 → 3)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Array tiles (orange = current element being processed)</div>
        <div id="array-container" class="array-container"></div>

        <div class="ui-label" style="margin-top:25px;">1D DP Array — dp[j] = number of subsets with sum j</div>
        <div class="dp-container" id="dp-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current element</span>
            <span class="info-value" id="val-x" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current j</span>
            <span class="info-value" id="val-j" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Before update</span>
            <span class="info-value" id="val-before" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Add from dp[j-x]</span>
            <span class="info-value" id="val-add" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Number of subsets with sum = K =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current element</div>
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Current dp[j] being updated</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentArr = [1, 2, 3];
        let currentK = 3;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];
        let dp = [];

        function init() {
            loadExample([1, 2, 3], 3);
        }

        function loadExample(arr, K) {
            currentArr = arr;
            currentK = K;
            document.getElementById('arr-input').value = arr.join(',');
            document.getElementById('k-input').value = K;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const arrStr = document.getElementById('arr-input').value.trim();
            const arr = arrStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const K = parseInt(document.getElementById('k-input').value);
            if (arr.length === 0 || isNaN(K) || K < 0) {
                alert("Valid array and K >= 0 required");
                return;
            }
            loadExample(arr, K);
        }

        function generateSteps() {
            steps = [];
            const arr = currentArr;
            const K = currentK;
            dp = new Array(K + 1).fill(0);
            dp[0] = 1;

            steps.push({
                type: 'init',
                i: -1,
                j: null,
                dpSnapshot: [...dp],
                panel: `Count Subsets with Sum = K — 1D DP Space Optimized<br>arr = [${arr.join(', ')}], K = ${K}`,
                statusText: `Initializing dp[0] = 1 (empty subset)`,
                log: `dp[0] = 1`,
                logColor: 'var(--text-dim)'
            });

            for (let idx = 0; idx < arr.length; idx++) {
                const x = arr[idx];
                steps.push({
                    type: 'start-x',
                    i: idx,
                    j: null,
                    dpSnapshot: [...dp],
                    panel: `Processing element arr[${idx}] = ${x}`,
                    statusText: `Element = ${x}`,
                    log: `\n--- Processing x = ${x} ---`,
                    logColor: 'var(--accent-orange)'
                });

                for (let j = K; j >= x; j--) {
                    const before = dp[j];
                    const add = dp[j - x];
                    dp[j] += add;

                    steps.push({
                        type: 'update-j',
                        i: idx,
                        j: j,
                        dpSnapshot: [...dp],
                        panel: `j = ${j}<br>dp[j] += dp[j - ${x}]<br>before: ${before}<br>add: ${add}<br>after: ${dp[j]}`,
                        statusText: `j = ${j}`,
                        log: `j=${j}: ${before} + ${add} = ${dp[j]}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            // FINAL
            const result = dp[K];
            steps.push({
                type: 'final',
                i: arr.length - 1,
                j: K,
                dpSnapshot: [...dp],
                panel: `All elements processed.<br>Number of subsets with sum = ${K} = <span style="color:var(--accent-green)"><b>${result}</b></span>`,
                statusText: `Final count = ${result}`,
                log: `\nFinal answer dp[${K}] = ${result}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: result
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render array tiles
            const arrayContainer = document.getElementById('array-container');
            arrayContainer.innerHTML = '';
            const arr = currentArr;
            for (let i = 0; i < arr.length; i++) {
                const tile = document.createElement('div');
                tile.className = `array-tile ${step.i === i ? 'current' : ''}`;
                tile.innerText = arr[i];
                arrayContainer.appendChild(tile);
            }

            // Render DP bar
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-bar"></div>`;
            const bar = dpContainer.querySelector('.dp-bar');

            // Header
            const header = document.createElement('div');
            header.style.display = 'flex';
            header.style.gap = '8px';
            for (let j = 0; j <= currentK; j++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.style.height = '24px';
                cell.textContent = j;
                header.appendChild(cell);
            }
            bar.appendChild(header);

            // DP row
            const currentDP = step.dpSnapshot || dp;
            const row = document.createElement('div');
            row.style.display = 'flex';
            row.style.gap = '8px';
            for (let j = 0; j <= currentK; j++) {
                const cell = document.createElement('div');
                cell.className = `dp-cell ${step.j === j ? 'current' : ''}`;
                cell.innerHTML = `<div>${currentDP[j]}</div>`;
                row.appendChild(cell);
            }
            bar.appendChild(row);

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-x').innerText = step.i !== null ? currentArr[step.i] : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-before').innerText = step.j !== null && step.dpSnapshot ? step.dpSnapshot[step.j] : '—';
            document.getElementById('val-add').innerText = step.j !== null && step.i !== null && currentArr[step.i] !== undefined ? step.dpSnapshot[step.j - currentArr[step.i]] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
