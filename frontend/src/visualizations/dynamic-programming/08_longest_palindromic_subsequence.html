<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longest Palindromic Subsequence - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 200px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 20px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.failed { background: #2a0d0d; border-color: var(--accent-red); color: var(--accent-red); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-red); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* Pointers */
        .ptr-container { display: flex; flex-direction: column; align-items: center; position: absolute; bottom: -50px; gap: 2px; font-size: 12px; font-family: monospace; font-weight: bold; transition: all 0.3s; width: 100%; text-align: center; }
        .ptr-left { color: var(--accent-orange); }
        .ptr-right { color: var(--accent-blue); }
        .ptr-arrow { font-size: 16px; line-height: 10px; margin-bottom: 2px; color: var(--text-dim); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 40px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">s =</label>
        <input type="text" id="str-input" placeholder="bbbab">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('bbbab')">Ex 1 (bbbab)</button>
        <button onclick="loadExample('cbbd')">Ex 2 (cbbd)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label" id="arr-label">Characters of s:</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">left (i)</span>
            <span class="info-value" id="val-left" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">right (j)</span>
            <span class="info-value" id="val-right" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">s[left]</span>
            <span class="info-value" id="val-valL" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">s[right]</span>
            <span class="info-value" id="val-valR" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">current LPS</span>
            <span class="info-value" id="val-lps" style="color: var(--accent-purple);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">LPS length =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Comparing ends</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Match (include both)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red); border:1px solid var(--accent-red)"></span> Mismatch (branch)</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputString = "bbbab";
        let charsArr = [];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample("bbbab"); }

        function loadExample(newStr) {
            inputString = newStr;
            document.getElementById('str-input').value = inputString;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('str-input').value.trim();
            if (valStr.length > 0) {
                loadExample(valStr);
            } else {
                alert("Please enter a valid string.");
            }
        }

        function generateSteps() {
            steps = [];
            charsArr = inputString.split('');
            const n = charsArr.length;

            const getStates = (currI, currJ, highlightType = null) => {
                return charsArr.map((_, idx) => {
                    if (idx === currI || idx === currJ) {
                        return highlightType || 'candidate';
                    }
                    if (currI >= 0 && currJ >= 0 && (idx < currI || idx > currJ)) return 'done';
                    return 'idle';
                });
            };

            // Recursive simulation that records every step in DFS order (exactly matches JSON trace)
            function simulateLPS(i, j) {
                // STEP: Enter recursive call
                steps.push({
                    type: 'call',
                    i: i,
                    j: j,
                    valL: i <= j && i < charsArr.length ? charsArr[i] : '—',
                    valR: i <= j && j < charsArr.length ? charsArr[j] : '—',
                    digitsStates: getStates(i, j),
                    panel: `Calling <code>lps(${i}, ${j})</code> — substring <code>"${inputString.slice(i, j + 1)}"</code>`,
                    statusText: `lps(${i}, ${j})`,
                    log: `Call lps(${i}, ${j})`,
                    logColor: 'var(--text-dim)'
                });

                if (i > j) {
                    // Base case: empty
                    steps.push({
                        type: 'base-empty',
                        i: i,
                        j: j,
                        valL: '—',
                        valR: '—',
                        digitsStates: getStates(i, j),
                        panel: `<span style="color:var(--accent-blue)">Base case: i &gt; j → empty substring → return <b>0</b></span>`,
                        statusText: `Return 0 (empty)`,
                        log: `  i > j → return 0`,
                        logColor: 'var(--accent-blue)'
                    });
                    return 0;
                }

                if (i === j) {
                    // Base case: single character
                    steps.push({
                        type: 'base-single',
                        i: i,
                        j: j,
                        valL: charsArr[i],
                        valR: charsArr[i],
                        digitsStates: getStates(i, j, 'winning'),
                        panel: `<span style="color:var(--accent-green)">Base case: i == j → single character '${charsArr[i]}' → return <b>1</b></span>`,
                        statusText: `Return 1 (single char)`,
                        log: `  i == j → return 1`,
                        logColor: 'var(--accent-green)'
                    });
                    return 1;
                }

                const charL = charsArr[i];
                const charR = charsArr[j];

                // STEP: Compare
                steps.push({
                    type: 'compare',
                    i: i,
                    j: j,
                    valL: charL,
                    valR: charR,
                    digitsStates: getStates(i, j, 'candidate'),
                    panel: `Compare <code>s[${i}]</code> = <b>${charL}</b> and <code>s[${j}]</code> = <b>${charR}</b>`,
                    statusText: `Comparing s[${i}] and s[${j}]`,
                    log: `  Compare '${charL}' == '${charR}'?`,
                    logColor: 'var(--text-main)'
                });

                let res;
                if (charL === charR) {
                    // Match branch
                    steps.push({
                        type: 'match',
                        i: i,
                        j: j,
                        valL: charL,
                        valR: charR,
                        digitsStates: getStates(i, j, 'winning'),
                        panel: `<span style="color:var(--accent-green)">Match! '${charL}' == '${charR}'</span><br>Return 2 + lps(${i + 1}, ${j - 1})`,
                        statusText: `Match → recurse inward`,
                        log: `  Match! Return 2 + lps(${i + 1}, ${j - 1})`,
                        logColor: 'var(--accent-green)'
                    });

                    const inner = simulateLPS(i + 1, j - 1);
                    res = 2 + inner;

                    steps.push({
                        type: 'return-match',
                        i: i,
                        j: j,
                        valL: charL,
                        valR: charR,
                        digitsStates: getStates(i, j),
                        panel: `Inner returned <b>${inner}</b><br><span style="color:var(--accent-green)">Final for this call: 2 + ${inner} = <b>${res}</b></span>`,
                        statusText: `Return ${res}`,
                        log: `  Return ${res} (2 + ${inner})`,
                        logColor: 'var(--accent-green)'
                    });
                } else {
                    // Mismatch branch
                    steps.push({
                        type: 'mismatch',
                        i: i,
                        j: j,
                        valL: charL,
                        valR: charR,
                        digitsStates: getStates(i, j, 'failed'),
                        panel: `<span style="color:var(--accent-red)">Mismatch! '${charL}' != '${charR}'</span><br>Return max(lps(${i + 1}, ${j}), lps(${i}, ${j - 1}))`,
                        statusText: `Mismatch → explore both branches`,
                        log: `  No match. Return max(lps(${i + 1}, ${j}), lps(${i}, ${j - 1}))`,
                        logColor: 'var(--accent-red)'
                    });

                    const left = simulateLPS(i + 1, j);
                    const right = simulateLPS(i, j - 1);
                    res = Math.max(left, right);

                    steps.push({
                        type: 'return-mismatch',
                        i: i,
                        j: j,
                        valL: charL,
                        valR: charR,
                        digitsStates: getStates(i, j),
                        panel: `Left branch = ${left}<br>Right branch = ${right}<br><span style="color:var(--accent-blue)">Max = <b>${res}</b></span>`,
                        statusText: `Return ${res}`,
                        log: `  Return ${res} = max(${left}, ${right})`,
                        logColor: 'var(--accent-blue)'
                    });
                }
                return res;
            }

            // Start recursion from full string
            const finalLength = simulateLPS(0, n - 1);

            // FINAL RESULT STEP
            steps.push({
                type: 'final',
                i: 0,
                j: n - 1,
                valL: '—',
                valR: '—',
                digitsStates: charsArr.map(() => 'winning'),
                panel: `All recursive calls completed.<br>The length of the longest palindromic subsequence is <b>${finalLength}</b>.<br>Example: ${finalLength === 4 ? '"bbbb"' : finalLength === 2 ? '"bb"' : 'one of the palindromic subsequences'}`,
                complete: true,
                isTrue: true,
                statusText: `Done. LPS length = ${finalLength}`,
                log: `\nFinal Result: ${finalLength}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            
            step.digitsStates.forEach((state, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                
                const tile = document.createElement('div');
                tile.className = `tile ${state}`;
                tile.innerText = charsArr[i];
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                
                wrapper.append(tile, idxLabel);

                // Pointers (only show on active compare/match/mismatch steps)
                if ((step.type === 'compare' || step.type === 'match' || step.type === 'mismatch' || step.type === 'call') && step.i >= 0 && step.j >= 0) {
                    const ptrs = [];
                    if (step.i === i) ptrs.push('<div class="ptr-left">L</div>');
                    if (step.j === i) ptrs.push('<div class="ptr-right">R</div>');
                    if (ptrs.length > 0) {
                        const ptrContainer = document.createElement('div');
                        ptrContainer.className = 'ptr-container';
                        ptrContainer.innerHTML = '<div class="ptr-arrow">↑</div>' + ptrs.join('');
                        wrapper.appendChild(ptrContainer);
                    }
                }

                container.appendChild(wrapper);
            });

            if ((step.type === 'compare' || step.type === 'match' || step.type === 'mismatch' || step.type === 'call') && step.i >= 0 && step.j >= 0) {
                container.style.marginBottom = "45px";
            } else {
                container.style.marginBottom = "0px";
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-left').innerText = step.i !== undefined ? step.i : '—';
            document.getElementById('val-right').innerText = step.j !== undefined ? step.j : '—';
            document.getElementById('val-valL').innerText = step.valL || '—';
            document.getElementById('val-valR').innerText = step.valR || '—';
            document.getElementById('val-lps').innerText = step.result !== undefined ? step.result : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result !== undefined ? step.result : '—';
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            // Accumulate log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
