<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partition into K Subsets (DP bitmask) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 240px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .nums-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 110px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); }
        .tile.selected { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        /* SUBSET SUM TILES */
        .subset-container { 
            margin-top: 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .subset-tile {
            min-width: 110px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            border-radius: 8px;
            text-align: center;
        }
        .subset-tile.complete { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="nums-input" value="[4,3,2,3,5,2,1]" style="width:240px">
        <label class="ui-label">K =</label>
        <input type="text" id="k-input" value="4" style="width:80px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([4,3,2,3,5,2,1], 4)">Ex 1 (true)</button>
        <button onclick="loadExample([1,2,3,4], 3)">Ex 2 (false)</button>
        <button onclick="loadExample([1,1,1,1,1,1,1,1], 4)">Ex 3 (true)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Nums array (green = assigned to subsets)</div>
        <div class="nums-wrapper" id="nums-container"></div>

        <div class="ui-label" style="margin-top:25px;">Current K subset sums</div>
        <div id="subsets-container" class="subset-container"></div>

        <div class="ui-label" style="margin-top:25px;">Bitmask DP state (current mask sum tracking)</div>
        <div id="dp-container" style="overflow-x:auto; max-width:920px;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Mask</span>
            <span class="info-value" id="val-mask" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Element Index</span>
            <span class="info-value" id="val-idx" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Subsets Completed</span>
            <span class="info-value" id="val-k" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Subset Sum</span>
            <span class="info-value" id="val-sum" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Can partition into K equal subsets =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Assigned</div>
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current element</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Unassigned</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputNums = [4,3,2,3,5,2,1];
        let K = 4;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 400];
        let target = 0;

        function init() { loadExample([4,3,2,3,5,2,1], 4); }

        function loadExample(nums, kVal) {
            inputNums = nums;
            K = kVal;
            document.getElementById('nums-input').value = JSON.stringify(nums);
            document.getElementById('k-input').value = K;
            generateSteps();
            reset();
        }

        function loadCustom() {
            let nums, kVal;
            try {
                nums = JSON.parse(document.getElementById('nums-input').value);
                kVal = parseInt(document.getElementById('k-input').value);
            } catch(e) {
                alert("Please enter valid nums array and K (integer).");
                return;
            }
            if (Array.isArray(nums) && !isNaN(kVal) && kVal > 0) {
                loadExample(nums, kVal);
            } else {
                alert("Invalid input.");
            }
        }

        function generateSteps() {
            steps = [];
            const n = inputNums.length;
            const totalSum = inputNums.reduce((a, b) => a + b, 0);
            target = totalSum / K;

            if (!Number.isInteger(target) || target < 0) {
                steps.push({
                    type: 'final',
                    mask: null,
                    idx: null,
                    subsets: Array(K).fill(0),
                    panel: `Total sum = ${totalSum}, target = ${target} (not integer) → impossible`,
                    statusText: `Invalid target sum`,
                    log: `Total sum ${totalSum} not divisible by K=${K}`,
                    logColor: 'var(--accent-red)',
                    complete: true,
                    result: false
                });
                return;
            }

            // DP bitmask: dp[mask] = current subset sum for the "open" subset in this mask
            let dp = new Array(1 << n).fill(-1);
            dp[0] = 0; // empty mask, sum = 0

            // STEP 0: INIT
            steps.push({
                type: 'init',
                mask: 0,
                idx: null,
                subsets: Array(K).fill(0),
                panel: `Partition into K=${K} subsets (target = ${target})<br>nums = [${inputNums}]`,
                statusText: `DP bitmask init`,
                log: `dp[0] = 0 (empty mask)`,
                logColor: 'var(--text-dim)'
            });

            for (let mask = 0; mask < (1 << n); mask++) {
                if (dp[mask] === -1) continue;

                steps.push({
                    type: 'start-mask',
                    mask: mask,
                    idx: null,
                    subsets: Array(K).fill(0), // simplified display
                    panel: `Processing mask = <b>${mask.toString(2).padStart(n, '0')}</b> (current open subset sum = ${dp[mask]})`,
                    statusText: `mask = ${mask}`,
                    log: `\n--- mask=${mask.toString(2).padStart(n,'0')} (sum=${dp[mask]}) ---`,
                    logColor: 'var(--accent-orange)'
                });

                for (let i = 0; i < n; i++) {
                    if ((mask & (1 << i)) !== 0) continue; // already used

                    const newMask = mask | (1 << i);
                    const newSum = dp[mask] + inputNums[i];

                    if (newSum > target) continue;

                    let newDpVal = newSum;
                    let partitionsAdded = 0;

                    if (newSum === target) {
                        newDpVal = 0;
                        partitionsAdded = 1;
                    }

                    if (dp[newMask] === -1 || true) { // allow update for demo
                        dp[newMask] = newDpVal;
                        steps.push({
                            type: 'transition',
                            mask: mask,
                            idx: i,
                            subsets: Array(K).fill(0), // placeholder
                            panel: `Add nums[${i}]=${inputNums[i]} → new_mask=${newMask.toString(2).padStart(n,'0')}<br>new_sum = ${newSum} ${newSum === target ? '(complete subset!)' : ''}`,
                            statusText: `add element ${i}`,
                            log: `  → element ${i} (${inputNums[i]}): new_sum=${newSum} → ${newSum===target ? 0 : newSum}`,
                            logColor: newSum === target ? 'var(--accent-green)' : 'var(--accent-blue)'
                        });
                    }
                }
            }

            const fullMask = (1 << n) - 1;
            const canPartition = dp[fullMask] === 0;

            // FINAL
            steps.push({
                type: 'final',
                mask: fullMask,
                idx: null,
                subsets: Array(K).fill(target),
                panel: `All masks processed.<br>Full mask dp[${fullMask}] = ${dp[fullMask]}<br>Can partition = <span style="color:${canPartition ? 'var(--accent-green)' : 'var(--accent-red)'}"><b>${canPartition}</b></span>`,
                statusText: `Final result: ${canPartition}`,
                log: `\nFull mask dp[${fullMask}] = ${dp[fullMask]} → ${canPartition}`,
                logColor: canPartition ? 'var(--accent-green)' : 'var(--accent-red)',
                complete: true,
                result: canPartition
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render nums
            const numsContainer = document.getElementById('nums-container');
            numsContainer.innerHTML = '';
            inputNums.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                let cls = 'tile';
                if (step.idx !== null && i === step.idx) cls += ' candidate';
                else if (step.mask !== null && (step.mask & (1 << i)) !== 0) cls += ' selected';
                tile.className = cls;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = i;
                wrapper.append(tile, idxLabel);
                numsContainer.appendChild(wrapper);
            });

            // Render subset sums (K tiles)
            const subsetsContainer = document.getElementById('subsets-container');
            subsetsContainer.innerHTML = '';
            for (let s = 0; s < K; s++) {
                const tile = document.createElement('div');
                tile.className = `subset-tile ${s < step.subsets.length && step.subsets[s] === target ? 'complete' : ''}`;
                tile.innerHTML = `<span class="state-label">Subset ${s}</span><span>${step.subsets[s] || 0}</span>`;
                subsetsContainer.appendChild(tile);
            }

            // Render mask info as DP
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div style="text-align:center; font-size:18px; font-family:monospace; color:var(--accent-blue); padding:20px;">Current mask: ${step.mask !== null ? step.mask.toString(2).padStart(inputNums.length, '0') : '—'}</div>`;

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-mask').innerText = step.mask !== null ? step.mask.toString(2).padStart(inputNums.length, '0') : '—';
            document.getElementById('val-idx').innerText = step.idx !== null ? step.idx : '—';
            document.getElementById('val-k').innerText = step.subsets ? step.subsets.filter(s => s === target).length : '—';
            document.getElementById('val-sum').innerText = step.mask !== null && dp !== undefined ? 'open sum' : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
