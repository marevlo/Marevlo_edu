<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixtures / Minimum smoke (SPOJ) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 320px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: VISUAL TILES - Array and DP */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 17px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* DP TABLE */
        .dp-wrapper { margin-top: 20px; border: 2px solid var(--border-main); border-radius: 8px; padding: 12px; background: var(--bg-surface); width: 680px; }
        .dp-table { display: grid; gap: 4px; font-family: monospace; font-size: 13px; }
        .dp-cell {
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-main); background: #21262d; border-radius: 4px; transition: all 0.3s ease;
        }
        .dp-cell.header { background: #000000; font-weight: bold; color: var(--accent-blue); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Mixtures =</label>
        <input type="text" id="arr-input" placeholder="[40,60,20]" value="[40,60,20]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[40,60,20]')">Ex 1</button>
        <button onclick="loadExample('[50,50]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Mixtures (colors):</div>
        <div class="tiles-wrapper" id="array-container"></div>
        
        <div class="ui-label" style="margin-top: 30px;">DP Table (min smoke for subarrays i..j):</div>
        <div class="dp-wrapper">
            <div class="dp-table" id="dp-table"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Subarray i..j</span>
            <span class="info-value" id="val-range" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Split at k</span>
            <span class="info-value" id="val-k" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Left smoke</span>
            <span class="info-value" id="val-left" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Right smoke</span>
            <span class="info-value" id="val-right" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Smoke from mix</span>
            <span class="info-value" id="val-mix" style="color: var(--accent-red);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Min smoke dp[i][j]</span>
            <span class="info-value" id="val-min" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">Minimum total smoke =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:2px solid var(--accent-orange)"></span> Current subarray</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:2px solid var(--accent-green)"></span> Updated dp[i][j]</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple); border:2px solid var(--accent-purple)"></span> Split k</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let nums = [40, 60, 20];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function generateSteps() {
            steps = [];
            const n = nums.length;
            if (n === 0) return;

            // dp[i][j] = min smoke for i to j
            let dp = Array.from({ length: n }, () => Array(n).fill(0));
            let color = Array.from({ length: n }, () => Array(n).fill(0));

            // Base cases
            for (let i = 0; i < n; i++) {
                dp[i][i] = 0;
                color[i][i] = nums[i];
            }

            steps.push({
                type: 'init',
                i: -1,
                j: -1,
                dp: JSON.parse(JSON.stringify(dp)),
                panel: `Base cases: dp[i][i] = 0, color[i][i] = ${nums.map((v, idx) => `color[${idx}]=${v}`).join(', ')}`,
                statusText: `Base cases initialized`,
                log: `dp and color base set`,
                logColor: 'var(--text-dim)'
            });

            // Fill for length 2 to n
            for (let L = 2; L <= n; L++) {
                for (let i = 0; i <= n - L; i++) {
                    const j = i + L - 1;
                    let minSmoke = Infinity;
                    let bestK = -1;
                    let bestColor = 0;

                    for (let k = i; k < j; k++) {
                        const leftSmoke = dp[i][k];
                        const rightSmoke = dp[k + 1][j];
                        const mixSmoke = color[i][k] * color[k + 1][j];
                        const totalSmoke = leftSmoke + rightSmoke + mixSmoke;
                        const newColor = (color[i][k] + color[k + 1][j]) % 100;

                        steps.push({
                            type: 'split',
                            i: i,
                            j: j,
                            k: k,
                            dp: JSON.parse(JSON.stringify(dp)),
                            smoke: totalSmoke,
                            panel: `Subarray [${i}..${j}], trying split k=${k}<br>Left smoke=${leftSmoke}, Right smoke=${rightSmoke}<br>Mix smoke = ${color[i][k]} * ${color[k+1][j]} = ${mixSmoke}<br>Total = ${totalSmoke}`,
                            statusText: `Split k=${k} → smoke ${totalSmoke}`,
                            log: `k=${k} smoke=${totalSmoke}`,
                            logColor: 'var(--accent-purple)'
                        });

                        if (totalSmoke < minSmoke) {
                            minSmoke = totalSmoke;
                            bestK = k;
                            bestColor = newColor;
                        }
                    }

                    dp[i][j] = minSmoke;
                    color[i][j] = bestColor;

                    steps.push({
                        type: 'update',
                        i: i,
                        j: j,
                        dp: JSON.parse(JSON.stringify(dp)),
                        bestK: bestK,
                        panel: `Updated dp[${i}][${j}] = <b>${minSmoke}</b> (best k=${bestK}), color=${bestColor}`,
                        statusText: `dp[${i}][${j}] = ${minSmoke}`,
                        log: `dp[${i}][${j}] = ${minSmoke}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            steps.push({
                type: 'final',
                i: 0,
                j: n - 1,
                dp: JSON.parse(JSON.stringify(dp)),
                complete: true,
                result: dp[0][n-1],
                panel: `DP filled.<br><b>Minimum total smoke = ${dp[0][n-1]}</b>`,
                statusText: `Done. Min smoke = ${dp[0][n-1]}`,
                log: `\nFinal minimum smoke: ${dp[0][n-1]}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Array tiles
            const arrayContainer = document.getElementById('array-container');
            arrayContainer.innerHTML = '';
            for (let k = 0; k < nums.length; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.i !== undefined && k >= step.i && k <= step.j ? 'candidate' : 'done'}`;
                tile.innerText = nums[k];
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${k}]`;
                wrapper.append(tile, idxLabel);
                arrayContainer.appendChild(wrapper);
            }

            // DP table
            const table = document.getElementById('dp-table');
            table.innerHTML = '';
            table.style.gridTemplateColumns = `repeat(${nums.length + 1}, 48px)`;

            // Header row
            const emptyHeader = document.createElement('div');
            emptyHeader.className = 'dp-cell header';
            emptyHeader.innerText = '';
            table.appendChild(emptyHeader);
            for (let c = 0; c < nums.length; c++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.innerText = c;
                table.appendChild(cell);
            }

            for (let r = 0; r < nums.length; r++) {
                const rowHeader = document.createElement('div');
                rowHeader.className = 'dp-cell header';
                rowHeader.innerText = r;
                table.appendChild(rowHeader);

                for (let c = 0; c < nums.length; c++) {
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${(r === step.i && c === step.j) ? 'candidate' : ''}`;
                    if (r > c) cell.innerText = '—';
                    else cell.innerText = step.dp && step.dp[r] && step.dp[r][c] !== undefined ? step.dp[r][c] : '—';
                    table.appendChild(cell);
                }
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-range').innerText = step.i !== undefined && step.j !== undefined ? `[${step.i}..${step.j}]` : '—';
            document.getElementById('val-k').innerText = step.bestK !== undefined ? step.bestK : (step.k !== undefined ? step.k : '—');
            document.getElementById('val-left').innerText = step.leftSmoke !== undefined ? step.leftSmoke : '—';
            document.getElementById('val-right').innerText = step.rightSmoke !== undefined ? step.rightSmoke : '—';
            document.getElementById('val-mix').innerText = step.mixSmoke !== undefined ? step.mixSmoke : '—';
            document.getElementById('val-min').innerText = step.dp && step.i !== undefined && step.j !== undefined && step.dp[step.i] && step.dp[step.i][step.j] !== undefined ? step.dp[step.i][step.j] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        function loadCustom() {
            const arrStr = document.getElementById('arr-input').value.trim();
            try {
                const parsed = JSON.parse(arrStr);
                if (Array.isArray(parsed)) {
                    nums = parsed;
                    generateSteps();
                    reset();
                }
            } catch(e) {
                alert("Invalid array format. Example: [40,60,20]");
            }
        }

        function loadExample(arrStr) {
            nums = JSON.parse(arrStr);
            document.getElementById('arr-input').value = arrStr;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
