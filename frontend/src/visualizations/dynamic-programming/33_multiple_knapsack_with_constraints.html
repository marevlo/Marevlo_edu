<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Knapsack with Constraints - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 240px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: VISUAL TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .items-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 68px; height: 68px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main); text-align: center; line-height: 1.1;
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* Knapsacks display */
        .knapsacks-wrapper { display: flex; gap: 20px; justify-content: center; }
        .knapsack {
            width: 120px; padding: 12px; border: 3px solid var(--border-main); border-radius: 8px;
            background: #21262d; text-align: center;
        }
        .knapsack-header { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
        .knapsack-bar {
            height: 20px; background: #30363d; border-radius: 4px; position: relative; overflow: hidden;
        }
        .knapsack-fill {
            height: 100%; background: var(--accent-blue); transition: width 0.3s ease;
        }
        .knapsack-label { font-size: 11px; margin-top: 4px; color: var(--text-dim); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 40px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">values =</label>
        <input type="text" id="values-input" placeholder="[1,2,3]" value="[1,2,3]">
        <label class="ui-label" style="margin-left:8px">weights =</label>
        <input type="text" id="weights-input" placeholder="[4,5,6]" value="[4,5,6]">
        <label class="ui-label" style="margin-left:8px">capacities =</label>
        <input type="text" id="caps-input" placeholder="[7,8]" value="[7,8]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[1,2,3]','[4,5,6]','[7,8]')">Ex 1</button>
        <button onclick="loadExample('[10,20,30]','[1,2,3]','[4,4]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="ui-label" id="arr-label">Items (value, weight):</div>
        <div class="items-wrapper" id="items-container"></div>
        
        <div class="ui-label" style="margin-top: 30px;">Knapsacks (current weight / capacity):</div>
        <div class="knapsacks-wrapper" id="knapsacks-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Item idx</span>
            <span class="info-value" id="val-idx" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Value</span>
            <span class="info-value" id="val-val" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Max Value Found</span>
            <span class="info-value" id="val-max" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Action</span>
            <span class="info-value" id="val-action" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Maximum value =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current item</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Assign to knapsack</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border:1px solid var(--accent-blue)"></span> Skip item</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red); border:1px solid var(--accent-red)"></span> Cannot fit</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputValues = [1,2,3];
        let inputWeights = [4,5,6];
        let inputCaps = [7,8];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample("[1,2,3]", "[4,5,6]", "[7,8]"); }

        function loadExample(valsStr, wtsStr, capsStr) {
            inputValues = JSON.parse(valsStr);
            inputWeights = JSON.parse(wtsStr);
            inputCaps = JSON.parse(capsStr);
            document.getElementById('values-input').value = valsStr;
            document.getElementById('weights-input').value = wtsStr;
            document.getElementById('caps-input').value = capsStr;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valsStr = document.getElementById('values-input').value.trim();
            const wtsStr = document.getElementById('weights-input').value.trim();
            const capsStr = document.getElementById('caps-input').value.trim();
            if (valsStr && wtsStr && capsStr) {
                try {
                    const vals = JSON.parse(valsStr);
                    const wts = JSON.parse(wtsStr);
                    const caps = JSON.parse(capsStr);
                    if (Array.isArray(vals) && Array.isArray(wts) && Array.isArray(caps) && vals.length === wts.length) {
                        inputValues = vals;
                        inputWeights = wts;
                        inputCaps = caps;
                        generateSteps();
                        reset();
                    } else {
                        alert("Values and weights must have same length. Capacities can be any length.");
                    }
                } catch(e) {
                    alert("Invalid JSON format.");
                }
            } else {
                alert("Please enter valid values, weights, and capacities.");
            }
        }

        function generateSteps() {
            steps = [];
            const n = inputValues.length;
            const m = inputCaps.length;
            let maxValue = 0;

            function simulate(index, currWeights, currVal, path = []) {
                const weightsStr = JSON.stringify(currWeights);
                const pathStr = path.length > 0 ? path.map(p => `item${p.idx}→knap${p.k}(${p.v})`).join(' + ') : '—';

                steps.push({
                    type: 'call',
                    index: index,
                    weights: [...currWeights],
                    val: currVal,
                    path: pathStr,
                    digitsStates: Array(n).fill(index === -1 ? 'done' : (k => k < index ? 'done' : (k === index ? 'candidate' : 'idle'))),
                    panel: `Call <code>dfs(${index}, weights=${weightsStr}, value=${currVal})</code><br>Path: <b>${pathStr}</b>`,
                    statusText: `item ${index}, val=${currVal}`,
                    log: `dfs(${index}, ${weightsStr}, ${currVal})`,
                    logColor: 'var(--text-dim)'
                });

                if (index === n) {
                    maxValue = Math.max(maxValue, currVal);
                    steps.push({
                        type: 'base',
                        index: index,
                        weights: [...currWeights],
                        val: currVal,
                        path: pathStr,
                        digitsStates: Array(n).fill('done'),
                        panel: `<span style="color:var(--accent-green)">Base case → update max to <b>${maxValue}</b></span>`,
                        statusText: `Base, max=${maxValue}`,
                        log: `  Base → max=${maxValue}`,
                        logColor: 'var(--accent-green)'
                    });
                    return;
                }

                // Skip item
                steps.push({
                    type: 'skip',
                    index: index,
                    weights: [...currWeights],
                    val: currVal,
                    path: pathStr,
                    digitsStates: Array(n).fill(index === -1 ? 'done' : (k => k < index ? 'done' : (k === index ? 'candidate' : 'idle'))),
                    panel: `<span style="color:var(--accent-blue)">Skip item ${index}</span>`,
                    statusText: `Skip`,
                    log: `    Skip`,
                    logColor: 'var(--accent-blue)'
                });
                simulate(index + 1, [...currWeights], currVal, [...path]);

                // Try assign to each knapsack
                for (let k = 0; k < m; k++) {
                    if (currWeights[k] + inputWeights[index] <= inputCaps[k]) {
                        const newWeights = [...currWeights];
                        newWeights[k] += inputWeights[index];
                        const newPath = [...path, {idx: index, k: k, v: inputValues[index]}];
                        
                        steps.push({
                            type: 'assign',
                            index: index,
                            weights: newWeights,
                            val: currVal + inputValues[index],
                            path: pathStr,
                            digitsStates: Array(n).fill(index === -1 ? 'done' : (k => k < index ? 'done' : (k === index ? 'candidate' : 'idle'))),
                            panel: `<span style="color:var(--accent-green)">Assign item ${index} to knapsack ${k} (+${inputValues[index]})</span>`,
                            statusText: `Assign to knap ${k}`,
                            log: `    Assign to ${k}`,
                            logColor: 'var(--accent-green)'
                        });
                        
                        simulate(index + 1, newWeights, currVal + inputValues[index], newPath);
                    } else {
                        steps.push({
                            type: 'fail-assign',
                            index: index,
                            weights: [...currWeights],
                            val: currVal,
                            path: pathStr,
                            digitsStates: Array(n).fill(index === -1 ? 'done' : (k => k < index ? 'done' : (k === index ? 'candidate' : 'idle'))),
                            panel: `<span style="color:var(--accent-red)">Cannot assign item ${index} to knapsack ${k} (exceeds capacity)</span>`,
                            statusText: `Cannot fit knap ${k}`,
                            log: `    Cannot fit knap ${k}`,
                            logColor: 'var(--accent-red)'
                        });
                    }
                }
            }

            simulate(0, new Array(m).fill(0), 0);

            steps.push({
                type: 'final',
                index: n,
                weights: new Array(m).fill(0),
                val: maxValue,
                path: '—',
                digitsStates: Array(n).fill('winning'),
                panel: `All assignments explored.<br><b>Maximum value = ${maxValue}</b>`,
                complete: true,
                result: maxValue,
                statusText: `Done. Max value = ${maxValue}`,
                log: `\nFinal max value: ${maxValue}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Items
            const itemsContainer = document.getElementById('items-container');
            itemsContainer.innerHTML = '';
            for (let k = 0; k < inputValues.length; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.digitsStates[k]}`;
                tile.innerHTML = `${inputValues[k]}<br><small>w=${inputWeights[k]}</small>`;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${k}]`;
                wrapper.append(tile, idxLabel);
                itemsContainer.appendChild(wrapper);
            }

            // Knapsacks
            const knapsacksContainer = document.getElementById('knapsacks-container');
            knapsacksContainer.innerHTML = '';
            for (let k = 0; k < inputCaps.length; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'knapsack';
                const header = document.createElement('div');
                header.className = 'knapsack-header';
                header.innerText = `K${k} (cap ${inputCaps[k]})`;
                const barContainer = document.createElement('div');
                barContainer.className = 'knapsack-bar';
                const fill = document.createElement('div');
                fill.className = 'knapsack-fill';
                const perc = Math.min(100, Math.max(0, (step.weights[k] / inputCaps[k]) * 100));
                fill.style.width = `${perc}%`;
                barContainer.appendChild(fill);
                const label = document.createElement('div');
                label.className = 'knapsack-label';
                label.innerText = `${step.weights[k]} / ${inputCaps[k]}`;
                wrapper.append(header, barContainer, label);
                knapsacksContainer.appendChild(wrapper);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-idx').innerText = step.index !== undefined ? step.index : '—';
            document.getElementById('val-val').innerText = step.val !== undefined ? step.val : '—';
            document.getElementById('val-max').innerText = step.maxValue !== undefined ? step.maxValue : '—';
            document.getElementById('val-action').innerText = step.type || '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
