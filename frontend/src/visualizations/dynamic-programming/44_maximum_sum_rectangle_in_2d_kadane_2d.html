<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximum Sum Rectangle in 2D Matrix (Kadane 2D) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 260px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        /* MATRIX GRID */
        .matrix-container {
            display: grid;
            gap: 4px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .matrix-cell {
            min-width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--text-main);
            transition: all 0.3s ease;
            border-radius: 6px;
        }
        .matrix-cell.current-row { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); }
        .matrix-cell.highlight { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }

        /* TEMP 1D BAR (column sums) */
        .temp-container { 
            margin-top: 20px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
            width: 920px;
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .temp-cell {
            min-width: 58px;
            height: 58px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        .temp-cell.current { border-color: var(--accent-green); background: #0f2a1a; box-shadow: 0 0 12px var(--accent-green); }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 110px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">matrix =</label>
        <input type="text" id="matrix-input" value="[[1,2,-1],[-3,4,2],[5,-2,3]]" style="width:260px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([[1,2,-1],[-3,4,2],[5,-2,3]])">Ex 1 (11)</button>
        <button onclick="loadExample([[-1,-2],[-3,-4]])">Ex 2 (-1)</button>
        <button onclick="loadExample([[1,2],[3,4]])">Ex 3 (10)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">2D Matrix (highlighted rows = current top to bottom)</div>
        <div id="matrix-container" class="matrix-container" style="grid-template-columns: repeat(3, 62px);"></div>

        <div class="ui-label" style="margin-top:25px;">Temp column sums (current top to bottom)</div>
        <div class="temp-container" id="temp-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Top row</span>
            <span class="info-value" id="val-top" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Bottom row</span>
            <span class="info-value" id="val-bottom" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Kadane max</span>
            <span class="info-value" id="val-kadane" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Global max sum</span>
            <span class="info-value" id="val-global" style="color: var(--accent-blue);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Maximum rectangle sum =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Current row range</div>
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current column in temp</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputMatrix = [[1,2,-1],[-3,4,2],[5,-2,3]];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];
        let n = 0;
        let m = 0;
        let maxSum = -Infinity;

        function init() {
            loadExample([[1,2,-1],[-3,4,2],[5,-2,3]]);
        }

        function loadExample(newMatrix) {
            inputMatrix = newMatrix;
            document.getElementById('matrix-input').value = JSON.stringify(newMatrix);
            generateSteps();
            reset();
        }

        function loadCustom() {
            let matrix;
            try {
                matrix = JSON.parse(document.getElementById('matrix-input').value);
            } catch(e) {
                alert("Invalid matrix, e.g. [[1,2,-1],[-3,4,2],[5,-2,3]]");
                return;
            }
            if (Array.isArray(matrix) && matrix.length > 0 && Array.isArray(matrix[0])) {
                loadExample(matrix);
            } else {
                alert("Invalid input.");
            }
        }

        function generateSteps() {
            steps = [];
            n = inputMatrix.length;
            m = inputMatrix[0].length;
            maxSum = -Infinity;

            // INIT
            steps.push({
                type: 'init',
                top: -1,
                bottom: -1,
                temp: null,
                kadaneCurrent: null,
                panel: `Maximum Sum Rectangle in 2D Matrix — Kadane 2D<br>matrix = [${inputMatrix}]`,
                statusText: `Initializing matrix (${n}x${m})`,
                log: `Matrix has ${n} rows and ${m} columns\nGlobal max sum starts at -∞`,
                logColor: 'var(--text-dim)'
            });

            for (let top = 0; top < n; top++) {
                let temp = new Array(m).fill(0);

                steps.push({
                    type: 'new-top',
                    top: top,
                    bottom: top - 1,
                    temp: [...temp],
                    kadaneCurrent: null,
                    panel: `Fix top row = ${top}`,
                    statusText: `Top = ${top}`,
                    log: `\n--- New top row = ${top} ---`,
                    logColor: 'var(--accent-orange)'
                });

                for (let bottom = top; bottom < n; bottom++) {
                    // Add current bottom row to temp
                    for (let j = 0; j < m; j++) {
                        temp[j] += inputMatrix[bottom][j];
                    }

                    steps.push({
                        type: 'add-bottom',
                        top: top,
                        bottom: bottom,
                        temp: [...temp],
                        kadaneCurrent: null,
                        panel: `Add bottom row = ${bottom} → temp = [${temp}]`,
                        statusText: `Bottom = ${bottom}`,
                        log: `Bottom = ${bottom}, temp = [${temp}]`,
                        logColor: 'var(--accent-purple)'
                    });

                    // Apply Kadane on temp and record max
                    let kadaneMax = kadaneOnTemp(temp);

                    if (kadaneMax > maxSum) maxSum = kadaneMax;

                    steps.push({
                        type: 'kadane',
                        top: top,
                        bottom: bottom,
                        temp: [...temp],
                        kadaneCurrent: kadaneMax,
                        panel: `Kadane on temp gives ${kadaneMax}<br>Global max updated to ${maxSum}`,
                        statusText: `Kadane max = ${kadaneMax}`,
                        log: `Kadane result = ${kadaneMax} (global max = ${maxSum})`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            // FINAL
            steps.push({
                type: 'final',
                top: null,
                bottom: null,
                temp: null,
                kadaneCurrent: maxSum,
                panel: `All possible rectangles processed.<br>Maximum rectangle sum = <span style="color:var(--accent-green)"><b>${maxSum}</b></span>`,
                statusText: `Final maximum sum = ${maxSum}`,
                log: `\nFinal maximum sum rectangle = ${maxSum}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: maxSum
            });
        }

        function kadaneOnTemp(temp) {
            let maxEndingHere = 0;
            let maxSoFar = -Infinity;
            for (let val of temp) {
                maxEndingHere = Math.max(val, maxEndingHere + val);
                maxSoFar = Math.max(maxSoFar, maxEndingHere);
            }
            return maxSoFar;
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render matrix grid
            const matrixContainer = document.getElementById('matrix-container');
            matrixContainer.innerHTML = '';
            matrixContainer.style.gridTemplateColumns = `repeat(${m}, 62px)`;
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < m; j++) {
                    const cell = document.createElement('div');
                    cell.className = `matrix-cell ${(step.top !== null && i >= step.top && i <= step.bottom) ? 'current-row' : ''}`;
                    cell.innerText = inputMatrix[i][j];
                    matrixContainer.appendChild(cell);
                }
            }

            // Render temp bar
            const tempContainer = document.getElementById('temp-container');
            tempContainer.innerHTML = '';
            if (step.temp && step.temp.length > 0) {
                step.temp.forEach((val, j) => {
                    const cell = document.createElement('div');
                    cell.className = `temp-cell ${step.kadaneCurrent !== null ? 'current' : ''}`;
                    cell.innerHTML = `<div class="state-label">col ${j}</div><div class="state-value">${val}</div>`;
                    tempContainer.appendChild(cell);
                });
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-top').innerText = step.top !== null ? step.top : '—';
            document.getElementById('val-bottom').innerText = step.bottom !== null ? step.bottom : '—';
            document.getElementById('val-kadane').innerText = step.kadaneCurrent !== null ? step.kadaneCurrent : '—';
            document.getElementById('val-global').innerText = maxSum;

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
