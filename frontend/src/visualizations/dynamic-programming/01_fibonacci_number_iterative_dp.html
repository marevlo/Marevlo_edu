<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci (Iterative DP) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 120px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { 
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; 
            max-width: 900px; min-height: 90px; position: relative;
        }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 20px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.12); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); }
        .tile.computing { background: #1e1030; border-color: var(--accent-purple); color: var(--accent-purple); transform: scale(1.15); }
        .tile.added { background: #0d2244; border-color: var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); }
        .tile.past { opacity: 0.35; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }

        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="number" id="num-input" placeholder="10" value="10">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(5)">Ex 1 (5)</button>
        <button onclick="loadExample(8)">Ex 2 (8)</button>
        <button onclick="loadExample(0)">n=0</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Fibonacci Sequence Built Iteratively:</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">prev2 (F(i-2))</span>
            <span class="info-value" id="val-prev2" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">prev1 (F(i-1))</span>
            <span class="info-value" id="val-prev1" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">curr = prev2 + prev1</span>
            <span class="info-value" id="val-curr" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Target n</span>
            <span class="info-value" id="val-n" style="color: var(--text-main);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">fib(n) =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current i</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-purple)"></span> prev2</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-blue)"></span> prev1</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Newly Computed</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Previous</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputN = 10;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 400];

        function init() { loadExample(10); }

        function loadExample(newN) {
            inputN = parseInt(newN);
            document.getElementById('num-input').value = inputN;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const val = parseInt(document.getElementById('num-input').value);
            if (!isNaN(val) && val >= 0) {
                loadExample(val);
            } else {
                alert("Please enter a valid non-negative integer.");
            }
        }

        function generateSteps() {
            steps = [];
            const n = inputN;

            // STEP 0: INIT
            steps.push({
                type: 'init',
                i: 0,
                prev2: null,
                prev1: null,
                curr: null,
                fibValues: [],
                panel: `Compute <b>Fib(${n})</b> using Iterative Bottom-Up DP.<br>F(0) = 0, F(1) = 1, F(i) = F(i-1) + F(i-2) for i ≥ 2.`,
                statusText: `Initializing for n = ${n}`,
                log: `Starting Iterative DP for Fib(${n})\nBase cases: F(0)=0, F(1)=1`,
                logColor: 'var(--text-dim)'
            });

            let fibValues = new Array(n+1).fill(null);

            if (n === 0) {
                steps.push({
                    type: 'final',
                    i: 0,
                    prev2: null,
                    prev1: null,
                    curr: 0,
                    fibValues: [0],
                    panel: `n = 0 → Base case. Return <b>0</b>`,
                    statusText: `Base case n=0`,
                    log: `n==0 → return 0`,
                    logColor: 'var(--accent-green)',
                    complete: true,
                    result: 0
                });
                return;
            }

            // Handle n=1
            fibValues[0] = 0;
            fibValues[1] = 1;

            steps.push({
                type: 'base1',
                i: 1,
                prev2: 0,
                prev1: 1,
                curr: 1,
                fibValues: [0, 1],
                panel: `Set base cases:<br>F[0] = <b>0</b><br>F[1] = <b>1</b>`,
                statusText: `Base cases set`,
                log: `F[0] = 0\nF[1] = 1`,
                logColor: 'var(--accent-green)'
            });

            if (n === 1) {
                steps.push({
                    type: 'final',
                    i: 1,
                    prev2: 0,
                    prev1: 1,
                    curr: 1,
                    fibValues: [0, 1],
                    panel: `n = 1 → Return <b>1</b>`,
                    statusText: `Done. fib(1) = 1`,
                    log: `n==1 → return 1`,
                    logColor: 'var(--accent-green)',
                    complete: true,
                    result: 1
                });
                return;
            }

            let prev2 = 0;
            let prev1 = 1;

            for (let i = 2; i <= n; i++) {
                let curr = prev2 + prev1;

                // Select / prepare step
                steps.push({
                    type: 'compute',
                    i: i,
                    prev2: prev2,
                    prev1: prev1,
                    curr: curr,
                    fibValues: [...fibValues],
                    panel: `i = <b>${i}</b><br>Compute curr = prev2 + prev1 = <b>${prev2}</b> + <b>${prev1}</b> = <span style="color:var(--accent-green)">${curr}</span>`,
                    statusText: `Computing F(${i})...`,
                    log: `i=${i}: curr = ${prev2} + ${prev1} = ${curr}`,
                    logColor: 'var(--accent-orange)'
                });

                fibValues[i] = curr;

                // Update step
                steps.push({
                    type: 'update',
                    i: i,
                    prev2: prev1,
                    prev1: curr,
                    curr: curr,
                    fibValues: [...fibValues],
                    panel: `Update variables:<br>prev2 ← prev1 (<b>${prev1}</b>)<br>prev1 ← curr (<b>${curr}</b>)`,
                    statusText: `Updated for next iteration`,
                    log: `   prev2 = ${prev1}, prev1 = ${curr}`,
                    logColor: 'var(--accent-blue)'
                });

                prev2 = prev1;
                prev1 = curr;
            }

            // FINAL
            steps.push({
                type: 'final',
                i: n,
                prev2: prev2,
                prev1: prev1,
                curr: prev1,
                fibValues: fibValues,
                panel: `Loop complete.<br><b>Fib(${n}) = ${prev1}</b>`,
                statusText: `Done. fib(${n}) = ${prev1}`,
                log: `\nFinal Result → fib(${n}) = ${prev1}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: prev1
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';

            const maxDisplay = Math.max(10, inputN + 1);
            const displayValues = step.fibValues.length > 0 ? step.fibValues : new Array(maxDisplay).fill(null);

            for (let i = 0; i <= Math.max(inputN, 8); i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';

                const tile = document.createElement('div');
                tile.className = 'tile';

                if (displayValues[i] !== null && displayValues[i] !== undefined) {
                    tile.innerText = displayValues[i];
                } else {
                    tile.innerText = '?';
                    tile.style.opacity = '0.3';
                }

                // Highlight logic
                if (step.type === 'compute' && step.i === i) {
                    tile.classList.add('computing');
                } else if (step.i === i) {
                    tile.classList.add('candidate');
                } else if (i < step.i) {
                    tile.classList.add('past');
                } else if (displayValues[i] !== null) {
                    tile.classList.add('added');
                }

                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `F(${i})`;

                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-prev2').innerText = step.prev2 !== null ? step.prev2 : '—';
            document.getElementById('val-prev1').innerText = step.prev1 !== null ? step.prev1 : '—';
            document.getElementById('val-curr').innerText = step.curr !== null ? step.curr : '—';
            document.getElementById('val-n').innerText = inputN;

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            // Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else {
                pause();
            }
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) {
                pause();
            } else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
