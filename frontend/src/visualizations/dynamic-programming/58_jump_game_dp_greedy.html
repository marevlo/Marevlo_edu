<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jump Game (DP / Greedy) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 320px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES + GREEDY STATE */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 17px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* TARGET INDICATOR */
        .target-bar {
            margin-top: 20px;
            height: 40px;
            width: 680px;
            background: #21262d;
            border: 2px solid var(--border-main);
            border-radius: 6px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            color: var(--accent-green);
            font-size: 15px;
        }
        .target-pointer {
            position: absolute;
            bottom: -8px;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 12px solid var(--accent-green);
            transition: left 0.4s ease;
        }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="arr-input" placeholder="[2,3,1,1,4]" value="[2,3,1,1,4]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[2,3,1,1,4]')">Ex 1 (true)</button>
        <button onclick="loadExample('[3,2,1,0,4]')">Ex 2 (false)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Array (nums):</div>
        <div class="tiles-wrapper" id="array-container"></div>

        <div class="target-bar" id="target-bar">
            <span id="target-text">Target = last index</span>
            <div class="target-pointer" id="target-pointer" style="left: 50%;"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current i</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">nums[i]</span>
            <span class="info-value" id="val-jump" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">max reach</span>
            <span class="info-value" id="val-reach" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Can reach target?</span>
            <span class="info-value" id="val-can" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">Can reach last index?</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange);"></span> Current i (backward)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green);"></span> Updated target</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let nums = [2, 3, 1, 1, 4];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 350];

        function generateSteps() {
            steps = [];
            const n = nums.length;
            if (n === 0) return;

            let target = n - 1;
            let dpLike = new Array(n).fill(false); // for visual only
            dpLike[n-1] = true;

            steps.push({
                type: 'init',
                i: -1,
                target: target,
                nums: [...nums],
                panel: `Initialize target = ${n-1} (last index)<br>dp-like last index = true`,
                statusText: `Backward scan started`,
                log: `target = ${target}`,
                logColor: 'var(--text-dim)'
            });

            for (let i = n - 2; i >= 0; i--) {
                const maxReachFromI = i + nums[i];
                const canReach = maxReachFromI >= target;

                steps.push({
                    type: 'check',
                    i: i,
                    target: target,
                    maxReach: maxReachFromI,
                    canReach: canReach,
                    nums: [...nums],
                    panel: `At i=${i} (nums[i]=${nums[i]})<br>max reach = ${maxReachFromI}<br>Can reach current target ${target}? <b>${canReach}</b>`,
                    statusText: `i=${i} → canReach=${canReach}`,
                    log: `i=${i} reach=${maxReachFromI} ${canReach ? '✅' : '❌'}`,
                    logColor: canReach ? 'var(--accent-green)' : 'var(--accent-red)'
                });

                if (canReach) {
                    target = i;
                    steps.push({
                        type: 'update',
                        i: i,
                        target: target,
                        nums: [...nums],
                        panel: `✅ Updated target to <b>${i}</b> (new reachable position)`,
                        statusText: `target ← ${i}`,
                        log: `target updated to ${i}`,
                        logColor: 'var(--accent-purple)'
                    });
                }
            }

            const result = target === 0;

            steps.push({
                type: 'final',
                i: 0,
                target: target,
                result: result,
                complete: true,
                panel: `Backward scan complete.<br>Final target = ${target}<br><b>Can reach last index? ${result}</b>`,
                statusText: `Done. Result = ${result}`,
                log: `\nFinal: ${result}`,
                logColor: result ? 'var(--accent-green)' : 'var(--accent-red)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Array tiles
            const container = document.getElementById('array-container');
            container.innerHTML = '';
            for (let k = 0; k < nums.length; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.i === k ? 'candidate' : (step.target === k ? 'winning' : 'done')}`;
                tile.innerText = nums[k];
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${k}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            }

            // Target bar
            const targetBar = document.getElementById('target-bar');
            const percent = (step.target !== undefined) ? (step.target / (nums.length - 1)) * 100 : 100;
            document.getElementById('target-pointer').style.left = `${percent}%`;
            document.getElementById('target-text').innerHTML = `Target = <b>${step.target !== undefined ? step.target : nums.length-1}</b>`;

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-i').innerText = step.i !== undefined && step.i >= 0 ? step.i : '—';
            document.getElementById('val-jump').innerText = step.i !== undefined && step.i >= 0 ? nums[step.i] : '—';
            document.getElementById('val-reach').innerText = step.maxReach !== undefined ? step.maxReach : '—';
            document.getElementById('val-can').innerText = step.canReach !== undefined ? (step.canReach ? 'Yes ✅' : 'No ❌') : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result ? '✅ true' : '❌ false';
                resVal.style.color = step.result ? 'var(--accent-green)' : 'var(--accent-red)';
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
                resVal.style.color = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        function loadCustom() {
            const arrStr = document.getElementById('arr-input').value.trim();
            try {
                const parsed = JSON.parse(arrStr);
                if (Array.isArray(parsed)) {
                    nums = parsed;
                    generateSteps();
                    reset();
                }
            } catch(e) {
                alert("Invalid array format. Example: [2,3,1,1,4]");
            }
        }

        function loadExample(arrStr) {
            nums = JSON.parse(arrStr);
            document.getElementById('arr-input').value = arrStr;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
