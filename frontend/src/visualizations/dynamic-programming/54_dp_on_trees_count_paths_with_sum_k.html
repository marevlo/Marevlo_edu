<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP on Trees: Count Paths with Sum K - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 380px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* TREE VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tree-container {
            position: relative;
            width: 680px;
            height: 420px;
            background: #161b22;
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 20px;
        }
        .node {
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
            font-family: monospace;
            background: #21262d;
            border: 3px solid var(--border-main);
            color: var(--text-main);
            transition: all 0.3s ease;
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }
        .node.candidate { 
            background: #2a1600; 
            border-color: var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.2); 
            box-shadow: 0 0 15px rgba(227,179,65,0.6); 
        }
        .node.path { 
            background: #0f2a1a; 
            border-color: var(--accent-green); 
            color: var(--accent-green); 
            box-shadow: 0 0 15px var(--accent-green); 
        }
        .node-label { 
            position: absolute; 
            font-size: 10px; 
            color: var(--text-dim); 
            top: -18px; 
            left: 50%; 
            transform: translateX(-50%); 
            white-space: nowrap; 
        }
        .edge {
            position: absolute;
            height: 3px;
            background: var(--border-main);
            transform-origin: left center;
        }

        /* HASHMAP VISUAL */
        .hashmap-panel {
            margin-top: 20px;
            background: var(--bg-surface);
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 12px;
            width: 680px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .hashmap-title { font-size: 13px; color: var(--text-dim); font-family: monospace; }
        .hashmap-entry {
            display: flex;
            background: #21262d;
            border-radius: 4px;
            padding: 6px 12px;
            font-family: monospace;
            gap: 20px;
        }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Tree (LeetCode format) =</label>
        <input type="text" id="tree-input" placeholder="[5,4,8,11,null,13,4,7,2,null,null,5,1]" value="[5,4,8,11,null,13,4,7,2,null,null,5,1]">
        <label class="ui-label">K =</label>
        <input type="number" id="k-input" placeholder="22" value="22" style="width:100px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[1,2,3]', 3)">Ex 1</button>
        <button onclick="loadExample('[5,4,8,11,null,13,4,7,2,null,null,5,1]', 22)">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Binary Tree:</div>
        <div class="tree-container" id="tree-container"></div>
        
        <div class="hashmap-panel">
            <div class="hashmap-title">Prefix Sum HashMap (current path from root)</div>
            <div id="hashmap-entries"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current node</span>
            <span class="info-value" id="val-node" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current prefix sum</span>
            <span class="info-value" id="val-sum" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Complement (sum - K)</span>
            <span class="info-value" id="val-complement" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Paths found this step</span>
            <span class="info-value" id="val-count" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Total paths</span>
            <span class="info-value" id="val-total" style="color: var(--accent-red);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">Number of paths with sum K =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange);"></span> Current node</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green);"></span> Path in current DFS</div>
        <div class="legend-item"><span class="dot" style="background:#21262d;border:3px solid var(--accent-purple)"></span> Prefix sum hit</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        // Simple Tree Node class for parsing LeetCode format
        class TreeNode {
            constructor(val) {
                this.val = val;
                this.left = null;
                this.right = null;
            }
        }

        // Parse LeetCode tree array to TreeNode
        function buildTree(arr) {
            if (!arr || arr.length === 0 || arr[0] === null) return null;
            const root = new TreeNode(arr[0]);
            const queue = [root];
            let i = 1;
            while (i < arr.length) {
                const node = queue.shift();
                if (i < arr.length && arr[i] !== null) {
                    node.left = new TreeNode(arr[i]);
                    queue.push(node.left);
                }
                i++;
                if (i < arr.length && arr[i] !== null) {
                    node.right = new TreeNode(arr[i]);
                    queue.push(node.right);
                }
                i++;
            }
            return root;
        }

        let root = null;
        let K = 22;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 400];

        // Global variables for visualization state
        let currentPath = [];
        let currentSum = 0;
        let hashmap = new Map();
        let totalCount = 0;

        // Generate steps for the DFS with HashMap approach
        function generateSteps() {
            steps = [];
            if (!root) return;

            hashmap = new Map();
            hashmap.set(0, 1); // Initialize for paths starting at root
            currentPath = [];
            currentSum = 0;
            totalCount = 0;

            steps.push({
                type: 'init',
                node: null,
                panel: `Initialize hashmap with {0: 1}<br>Start DFS from root with sum=0`,
                statusText: `DFS started`,
                log: `hashmap = {0: 1}`,
                logColor: 'var(--text-dim)'
            });

            function dfs(node, sum) {
                if (!node) return;

                // Add current node to path
                currentPath.push(node.val);
                const newSum = sum + node.val;

                steps.push({
                    type: 'visit',
                    node: node.val,
                    sum: newSum,
                    path: [...currentPath],
                    panel: `Visiting node <b>${node.val}</b><br>Current path sum = <b>${newSum}</b>`,
                    statusText: `Node ${node.val}, sum=${newSum}`,
                    log: `visit ${node.val} | sum=${newSum}`,
                    logColor: 'var(--accent-orange)'
                });

                // Check for paths ending here
                const complement = newSum - K;
                let foundCount = 0;
                if (hashmap.has(complement)) {
                    foundCount = hashmap.get(complement);
                    totalCount += foundCount;
                }

                if (foundCount > 0) {
                    steps.push({
                        type: 'found',
                        node: node.val,
                        sum: newSum,
                        complement: complement,
                        count: foundCount,
                        panel: `Found <b>${foundCount}</b> paths ending at <b>${node.val}</b>!<br>Complement ${complement} found in hashmap`,
                        statusText: `Found ${foundCount} paths`,
                        log: `FOUND ${foundCount} paths! complement=${complement}`,
                        logColor: 'var(--accent-green)'
                    });
                }

                // Add current prefix sum to hashmap
                const oldCount = hashmap.get(newSum) || 0;
                hashmap.set(newSum, oldCount + 1);

                steps.push({
                    type: 'add',
                    node: node.val,
                    sum: newSum,
                    panel: `Add prefix sum <b>${newSum}</b> to hashmap`,
                    statusText: `hashmap[${newSum}] += 1`,
                    log: `hashmap[${newSum}] = ${oldCount + 1}`,
                    logColor: 'var(--accent-purple)'
                });

                // Recurse left
                dfs(node.left, newSum);

                // Recurse right
                dfs(node.right, newSum);

                // Backtrack: remove current prefix sum
                const currCount = hashmap.get(newSum);
                if (currCount === 1) {
                    hashmap.delete(newSum);
                } else {
                    hashmap.set(newSum, currCount - 1);
                }

                steps.push({
                    type: 'backtrack',
                    node: node.val,
                    sum: newSum,
                    panel: `Backtrack: remove prefix sum <b>${newSum}</b> from hashmap`,
                    statusText: `hashmap[${newSum}] -= 1`,
                    log: `backtrack hashmap[${newSum}]`,
                    logColor: 'var(--accent-red)'
                });

                currentPath.pop();
            }

            dfs(root, 0);

            steps.push({
                type: 'final',
                node: null,
                complete: true,
                result: totalCount,
                panel: `DFS complete.<br><b>Total paths with sum ${K} = ${totalCount}</b>`,
                statusText: `Done. Paths found = ${totalCount}`,
                log: `\nFinal count: ${totalCount}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        // Render tree using simple SVG
        function renderTree(node, container, x = 340, y = 40, level = 0) {
            container.innerHTML = '';
            if (!node) return;

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("width", "680");
            svg.setAttribute("height", "420");
            container.appendChild(svg);

            // Recursive function to draw nodes and edges
            function drawNode(node, x, y, parentX = null, parentY = null) {
                if (!node) return;

                // Draw edge from parent
                if (parentX !== null) {
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", parentX);
                    line.setAttribute("y1", parentY);
                    line.setAttribute("x2", x);
                    line.setAttribute("y2", y);
                    line.setAttribute("stroke", "#30363d");
                    line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                }

                // Draw node
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", x);
                circle.setAttribute("cy", y);
                circle.setAttribute("r", "24");
                circle.setAttribute("fill", "#21262d");
                circle.setAttribute("stroke", "#30363d");
                circle.setAttribute("stroke-width", "4");
                svg.appendChild(circle);

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", x);
                text.setAttribute("y", y + 7);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("fill", "#c9d1d9");
                text.setAttribute("font-size", "16");
                text.setAttribute("font-family", "monospace");
                text.setAttribute("font-weight", "600");
                text.textContent = node.val;
                svg.appendChild(text);

                // Left child
                if (node.left) {
                    const leftX = x - 80 / (level + 1) - 30;
                    const leftY = y + 90;
                    drawNode(node.left, leftX, leftY, x, y);
                }

                // Right child
                if (node.right) {
                    const rightX = x + 80 / (level + 1) + 30;
                    const rightY = y + 90;
                    drawNode(node.right, rightX, rightY, x, y);
                }
            }

            drawNode(node, x, y);
        }

        function renderHashmap() {
            const container = document.getElementById('hashmap-entries');
            container.innerHTML = '';
            if (hashmap.size === 0) {
                const empty = document.createElement('div');
                empty.style.color = 'var(--text-dim)';
                empty.textContent = 'Empty hashmap';
                container.appendChild(empty);
                return;
            }
            for (let [key, value] of hashmap) {
                const entry = document.createElement('div');
                entry.className = 'hashmap-entry';
                entry.innerHTML = `<span style="color:var(--accent-blue)">${key}</span> : <span style="color:var(--accent-green)">${value}</span>`;
                container.appendChild(entry);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Tree container
            const treeContainer = document.getElementById('tree-container');
            renderTree(root, treeContainer);

            // Highlight current node if applicable
            if (step.node !== null && step.node !== undefined) {
                // Note: Simple tree drawing doesn't support dynamic highlighting easily
                // For now, just update hashmap and panels
            }

            renderHashmap();

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-node').innerText = step.node !== null && step.node !== undefined ? step.node : '—';
            document.getElementById('val-sum').innerText = step.sum !== undefined ? step.sum : '—';
            document.getElementById('val-complement').innerText = step.complement !== undefined ? step.complement : '—';
            document.getElementById('val-count').innerText = step.count !== undefined ? step.count : '—';
            document.getElementById('val-total').innerText = totalCount || '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        function loadCustom() {
            const treeStr = document.getElementById('tree-input').value.trim();
            const kVal = parseInt(document.getElementById('k-input').value);
            if (!isNaN(kVal)) {
                try {
                    const arr = JSON.parse(treeStr);
                    root = buildTree(arr);
                    K = kVal;
                    generateSteps();
                    reset();
                } catch(e) {
                    alert("Invalid tree format. Use LeetCode array format e.g. [5,4,8,11,null,13,4,7,2,null,null,5,1]");
                }
            }
        }

        function loadExample(treeStr, kVal) {
            const arr = JSON.parse(treeStr);
            root = buildTree(arr);
            K = kVal;
            document.getElementById('tree-input').value = treeStr;
            document.getElementById('k-input').value = kVal;
            generateSteps();
            reset();
        }

        window.onload = function() {
            // Load default example
            const arr = [5,4,8,11,null,13,4,7,2,null,null,5,1];
            root = buildTree(arr);
            K = 22;
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
