<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Count Paths With Sum K &middot; DP on Trees</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f43f5e;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"],input[type="number"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:330px;} .small-input{width:64px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}
.narration .hit{color:#86efac;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.tree-wrap{flex:0 0 auto; position:relative;}
svg.tree{display:block; width:430px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2.5; transition:stroke .35s, stroke-width .35s; fill:none;}
.edge.onpath{stroke:var(--accent-green); stroke-width:3.5; filter:drop-shadow(0 0 5px rgba(34,197,94,.5));}
.tnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2.5; transition:fill .35s, stroke .35s, filter .35s;}
.tnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.tnode .ps{font-family:var(--mono); font-weight:700; font-size:11px; fill:var(--accent-blue); text-anchor:middle; opacity:0; transition:opacity .3s;}
.tnode.onpath .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.10); filter:drop-shadow(0 0 5px rgba(34,197,94,.35));}
.tnode.onpath .nl{fill:#bbf7d0;}
.tnode.onpath .ps{opacity:1;}
.tnode.current .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.18); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3.5;}
.tnode.current .nl{fill:#ffd591;}
.tnode.current .ps{fill:var(--accent-orange); opacity:1;}
.tnode.hit .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.22); filter:drop-shadow(0 0 14px rgba(34,197,94,.7)); stroke-width:3.5;}

.side{display:flex; flex-direction:column; gap:12px; min-width:240px; flex:1 1 240px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel.m .cap{color:var(--accent-blue);} .panel.p .cap{color:var(--accent-green);} .panel.a .cap{color:var(--accent-orange);}
.map-rows{display:flex; flex-direction:column; gap:5px; min-height:34px;}
.map-row{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:13px;
  background:rgba(255,255,255,.04); border:1.5px solid var(--border-main); border-radius:8px; padding:4px 10px;
  transition:border-color .3s, background .3s, transform .3s cubic-bezier(.34,1.4,.64,1);}
.map-row .mk{color:#a5f3fc; font-weight:800; min-width:42px;}
.map-row .mv{color:var(--text-dim);}
.map-row .mv b{color:var(--accent-green); font-weight:800;}
.map-row.target{border-color:rgba(168,85,247,.55); background:rgba(168,85,247,.12);}
.map-row.target .mk{color:#e9d5ff;}
.map-row.justadded{border-color:rgba(34,197,94,.5); background:rgba(34,197,94,.10);}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start;}
.tile{min-width:34px; height:34px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.tile.p{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.1); color:#bbf7d0;}
.tiles .empty,.map-rows .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
.answer-box{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.answer-box .av{font-family:var(--mono); font-size:26px; font-weight:800; color:var(--accent-orange);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1), color .3s;}
.answer-box.win .av{color:var(--accent-green);}

#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-orange);} .pill.s b{color:var(--accent-blue);} .pill.c b{color:var(--accent-purple);} .pill.a b{color:var(--accent-green);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>tree =</label>
  <input type="text" id="tree-input" class="large-input" value="[5,4,8,11,null,13,4,7,2,null,null,5,1]">
  <label>k =</label>
  <input type="number" id="k-input" class="small-input" value="22">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample('[1,2,3]',3)">Ex 1 (=2)</button>
  <button onclick="loadExample('[5,4,8,11,null,13,4,7,2,null,null,5,1]',22)">Ex 2 (=3)</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Count Paths With Sum K <span class="sub">&middot; DP on trees &middot; prefix-sum map</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="tree-wrap"><svg class="tree" id="tree" viewBox="0 0 430 360"></svg></div>
      <div class="side">
        <div class="panel m"><div class="cap">PREFIX-SUM MAP { sum &rarr; count }</div><div class="map-rows" id="map-rows"></div></div>
        <div class="panel p"><div class="cap">CURRENT ROOT &rarr; NODE PATH</div><div class="tiles" id="path-tiles"></div></div>
        <div class="panel a"><div class="cap">PATHS WITH SUM = K</div>
          <div class="answer-box" id="answer-box"><span class="av" id="answer-val">0</span>
            <span style="font-family:var(--mono);font-size:11px;color:var(--text-dim)">k = <b id="k-show" style="color:var(--accent-purple)">22</b></span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8634; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">node = <b id="pill-node">&minus;</b></span>
        <span class="pill s">prefix = <b id="pill-sum">&minus;</b></span>
        <span class="pill c">need (sum&minus;k) = <b id="pill-comp">&minus;</b></span>
        <span class="pill a">count = <b id="pill-cnt">0</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>current node</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>active path</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>complement in map</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ if(!el) return; el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.6+0.4*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

// Algorithm code panel: downward path count via prefix-sum map (LeetCode 437, tree DP).
const CODE=[
  [['fn','countPaths'],['src','(root, k):']],
  [['src','  prefix = {0: 1};  count = 0']],
  [['kw','  def'],['fn',' dfs'],['src','(node, sum):']],
  [['kw','    if'],['src',' node is None: '],['kw','return']],
  [['src','    sum += node.val']],
  [['src','    count += prefix.get(sum '],['kw','-'],['src',' k, 0)']],
  [['src','    prefix[sum] += 1']],
  [['src','    dfs(node.left, sum);  dfs(node.right, sum)']],
  [['src','    prefix[sum] '],['kw','-'],['src','= 1   '],['kw','# backtrack']],
  [['fn','  dfs'],['src','(root, 0);  '],['kw','return'],['src',' count']],
];

let treeArr=[5,4,8,11,null,13,4,7,2,null,null,5,1], K=22;
let root=null, nodeList=[], pos={};
let steps=[], stepIndex=0, timer=null;
const delays=[1700,900,460];
const tnodes={};
let confettiArmed=true;

class TreeNode{ constructor(val,id){ this.val=val; this.id=id; this.left=null; this.right=null; } }
function buildTree(arr){
  if(!arr||!arr.length||arr[0]===null) return null;
  let idc=0; const root=new TreeNode(arr[0],idc++); const q=[root]; let i=1;
  while(i<arr.length){ const n=q.shift();
    if(i<arr.length&&arr[i]!==null){ n.left=new TreeNode(arr[i],idc++); q.push(n.left); } i++;
    if(i<arr.length&&arr[i]!==null){ n.right=new TreeNode(arr[i],idc++); q.push(n.right); } i++;
  }
  return root;
}

function init(){ buildCode(); loadExample('[5,4,8,11,null,13,4,7,2,null,null,5,1]',22); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(treeStr,kVal){ document.getElementById('tree-input').value=treeStr; document.getElementById('k-input').value=kVal; parseAndGen(); }
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    treeArr=JSON.parse(document.getElementById('tree-input').value);
    const kv=parseInt(document.getElementById('k-input').value,10);
    if(isNaN(kv)) throw new Error('bad k');
    K=kv;
    root=buildTree(treeArr);
    if(!root) throw new Error('empty tree');
    layoutTree(); setupTree(); generateSteps(); reset();
  }catch(e){ alert('Invalid input. Use LeetCode array form e.g. [5,4,8,11,null,13,4,7,2,null,null,5,1] and an integer k.'); }
}

// Tidy in-order x layout: assign x by in-order rank, y by depth. Avoids overlap for any tree.
function layoutTree(){
  nodeList=[]; pos={}; let order=0; let maxDepth=0;
  (function assign(n,depth){ if(!n) return; assign(n.left,depth+1); n._x=order++; n._d=depth; maxDepth=Math.max(maxDepth,depth); nodeList.push(n); assign(n.right,depth+1); })(root,0);
  const W=430,H=360, padX=34, padY=44;
  const cols=Math.max(1,order-1);
  nodeList.forEach(n=>{
    const x= cols===0 ? W/2 : padX + (n._x/cols)*(W-2*padX);
    const y= maxDepth===0 ? H/2 : padY + (n._d/maxDepth)*(H-2*padY);
    pos[n.id]={x,y};
  });
}

function setupTree(){
  const svg=document.getElementById('tree'); svg.innerHTML=''; for(const k in tnodes) delete tnodes[k];
  document.getElementById('k-show').textContent=K;
  // edges first
  (function edges(n){ if(!n) return;
    [n.left,n.right].forEach(c=>{ if(!c) return;
      const p1=pos[n.id], p2=pos[c.id];
      const ln=document.createElementNS('http://www.w3.org/2000/svg','line'); ln.setAttribute('class','edge'); ln.id='e'+c.id;
      ln.setAttribute('x1',p1.x); ln.setAttribute('y1',p1.y); ln.setAttribute('x2',p2.x); ln.setAttribute('y2',p2.y);
      ln.dataset.child=c.id; svg.appendChild(ln); edges(c);
    });
  })(root);
  // nodes on top, keyed by stable id
  nodeList.forEach(n=>{ const p=pos[n.id];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','tnode'); g.id='tn'+n.id;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',18);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.textContent=n.val;
    const ps=document.createElementNS('http://www.w3.org/2000/svg','text'); ps.setAttribute('class','ps'); ps.setAttribute('x',p.x); ps.setAttribute('y',p.y-26); ps.id='ps'+n.id; ps.textContent='';
    g.appendChild(c); g.appendChild(t); g.appendChild(ps); svg.appendChild(g); tnodes[n.id]=g;
  });
}

function mapEntries(map){ return [...map.entries()].map(([k,v])=>[k,v]); }

function generateSteps(){
  steps=[];
  const prefix=new Map(); prefix.set(0,1);
  const path=[];      // array of {id,val}
  let count=0;
  function snap(o){
    steps.push({
      map:mapEntries(prefix), path:path.map(p=>({id:p.id,val:p.val,run:p.run})),
      curId:o.curId??null, sum:o.sum, comp:o.comp, hit:!!o.hit, target:o.target,
      justAdded:o.justAdded, count, code:o.code, narr:o.narr, log:o.log, logColor:o.logColor, complete:o.complete
    });
  }
  snap({code:[0,1], sum:undefined, narr:`Initialize <code>prefix = {0:1}</code> and <b>count = 0</b>. One empty prefix means a path can start at the root. DFS each root-to-node downward path, tracking the running sum.`, log:`init prefix={0:1}  count=0`, logColor:'var(--text-dim)'});

  function dfs(node,sum){
    if(!node){ return; }
    const newSum=sum+node.val;
    path.push({id:node.id,val:node.val,run:newSum});
    snap({code:[3,4], curId:node.id, sum:newSum,
      narr:`Enter node <code>${node.val}</code>. Running prefix sum down this path = <b>${newSum}</b>.`,
      log:`visit ${node.val}  sum=${newSum}`, logColor:'var(--accent-orange)'});

    const comp=newSum-K;
    const found=prefix.has(comp)?prefix.get(comp):0;
    if(found>0){
      count+=found;
      snap({code:[5], curId:node.id, sum:newSum, comp, hit:true, target:comp, count,
        narr:`Need <code>sum &minus; k = ${newSum} &minus; ${K} = ${comp}</code>. Map holds it <span class="hit">${found}&times;</span> &rarr; <b>+${found}</b> path${found>1?'s':''} end here. <b>count = ${count}</b>.`,
        log:`  need ${comp}  ->  +${found}  count=${count}`, logColor:'var(--accent-green)'});
    } else {
      snap({code:[5], curId:node.id, sum:newSum, comp, hit:false, target:comp, count,
        narr:`Need <code>sum &minus; k = ${newSum} &minus; ${K} = ${comp}</code>. Not in the map &rarr; no path ends at <code>${node.val}</code>.`,
        log:`  need ${comp}  ->  not found`, logColor:'var(--text-dim)'});
    }

    const old=prefix.get(newSum)||0; prefix.set(newSum,old+1);
    snap({code:[6], curId:node.id, sum:newSum, justAdded:newSum, count,
      narr:`Record this prefix: <code>prefix[${newSum}] = ${old+1}</code>, then recurse into children.`,
      log:`  prefix[${newSum}]=${old+1}`, logColor:'var(--accent-blue)'});

    dfs(node.left,newSum);
    dfs(node.right,newSum);

    const cur=prefix.get(newSum);
    if(cur===1) prefix.delete(newSum); else prefix.set(newSum,cur-1);
    snap({code:[8], curId:node.id, sum:newSum, count,
      narr:`Leaving <code>${node.val}</code>: backtrack <code>prefix[${newSum}] &minus;= 1</code> so sibling paths stay independent.`,
      log:`  backtrack prefix[${newSum}]`, logColor:'var(--accent-red)'});
    path.pop();
  }

  dfs(root,0);

  snap({code:[9], sum:undefined, count, complete:true,
    narr:`DFS done. Number of downward paths summing to <code>k = ${K}</code> is <b>${count}</b>.`,
    log:`done. paths with sum ${K} = ${count}`, logColor:'var(--accent-green)'});
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const pathIds=new Set(step.path.map(p=>p.id));
  // nodes
  nodeList.forEach(n=>{ const g=tnodes[n.id]; if(!g) return;
    g.classList.remove('onpath','current','hit');
    const psEl=document.getElementById('ps'+n.id);
    if(pathIds.has(n.id)){ g.classList.add('onpath'); const pe=step.path.find(p=>p.id===n.id); if(psEl) psEl.textContent='Σ'+pe.run; }
    else if(psEl){ psEl.textContent=''; }
    if(step.curId===n.id){ g.classList.add('current'); if(step.hit) g.classList.add('hit'); }
  });
  if(step.curId!=null){ const c=tnodes[step.curId]?.querySelector('.nc'); Motion.pop(c); }
  // edges: highlight those whose child is on the path
  document.querySelectorAll('.edge').forEach(ln=>{ ln.classList.toggle('onpath', pathIds.has(parseInt(ln.dataset.child,10))); });

  // prefix map panel
  const mr=document.getElementById('map-rows'); mr.innerHTML='';
  if(!step.map.length){ const e=document.createElement('div'); e.className='empty'; e.textContent='{ empty }'; mr.appendChild(e); }
  else step.map.forEach(([k,v])=>{
    const row=document.createElement('div'); row.className='map-row';
    if(step.hit && step.target!=null && k===step.target) row.classList.add('target');
    if(step.justAdded!=null && k===step.justAdded){ row.classList.add('justadded'); }
    row.innerHTML=`<span class="mk">${k}</span><span class="mv">count = <b>${v}</b></span>`;
    mr.appendChild(row);
    if(step.justAdded!=null && k===step.justAdded) Motion.pop(row);
  });

  // path tiles
  const pt=document.getElementById('path-tiles'); pt.innerHTML='';
  if(!step.path.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='{ root }'; pt.appendChild(e); }
  else step.path.forEach(p=>{ const t=document.createElement('div'); t.className='tile p'; t.textContent=p.val; pt.appendChild(t); });

  // answer
  const av=document.getElementById('answer-val'); av.textContent=step.count;
  const ab=document.getElementById('answer-box'); ab.classList.toggle('win',!!step.complete);
  if(step.complete) Motion.pop(av);

  // narration
  const narr=document.getElementById('narration'); narr.innerHTML=step.narr; narr.classList.toggle('done',!!step.complete);

  // code
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });

  // pills
  document.getElementById('pill-node').textContent=step.curId!=null ? step.path.find(p=>p.id===step.curId)?.val ?? '−' : '−';
  document.getElementById('pill-sum').textContent=step.sum!=null ? step.sum : '−';
  document.getElementById('pill-comp').textContent=step.comp!=null ? step.comp : '−';
  document.getElementById('pill-cnt').textContent=step.count;

  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].logColor) d.style.color=steps[k].logColor; if(steps[k].complete) d.style.fontWeight='bold'; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
