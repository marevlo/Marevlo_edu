<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimal BST (minimum search cost) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 240px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: KEYS & FREQ TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 68px; height: 68px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main); text-align: center; line-height: 1.1;
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        /* DP TABLE */
        .dp-wrapper { margin-top: 20px; border: 2px solid var(--border-main); border-radius: 8px; padding: 12px; background: var(--bg-surface); width: 680px; }
        .dp-table { display: grid; gap: 4px; font-family: monospace; font-size: 13px; }
        .dp-cell {
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-main); background: #21262d; border-radius: 4px; transition: all 0.3s ease;
        }
        .dp-cell.header { background: #000000; font-weight: bold; color: var(--accent-blue); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">keys =</label>
        <input type="text" id="keys-input" placeholder="[10,12,20]" value="[10,12,20]">
        <label class="ui-label" style="margin-left:8px">freq =</label>
        <input type="text" id="freq-input" placeholder="[34,8,50]" value="[34,8,50]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[10,12,20]','[34,8,50]')">Ex 1</button>
        <button onclick="loadExample('[1,2,3]','[25,10,20]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Keys:</div>
        <div class="tiles-wrapper" id="keys-container"></div>
        
        <div class="ui-label" style="margin-top: 20px;">Frequencies:</div>
        <div class="tiles-wrapper" id="freq-container"></div>
        
        <div class="ui-label" style="margin-top: 30px;">DP Table dp[i][j] (min cost for keys i to j):</div>
        <div class="dp-wrapper">
            <div class="dp-table" id="dp-table"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Range i..j</span>
            <span class="info-value" id="val-range" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current root r</span>
            <span class="info-value" id="val-root" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Subtree sum freq</span>
            <span class="info-value" id="val-sum" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Min cost dp[i][j]</span>
            <span class="info-value" id="val-cost" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">Minimum search cost =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:2px solid var(--accent-orange)"></span> Current range</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:2px solid var(--accent-green)"></span> Optimal cost</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple); border:2px solid var(--accent-purple)"></span> Root tried</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let keys = [10, 12, 20];
        let freq = [34, 8, 50];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function generateSteps() {
            steps = [];
            const n = keys.length;
            if (n === 0) return;

            // Prefix sums (1-based)
            let prefix = new Array(n + 1).fill(0);
            for (let i = 1; i <= n; i++) {
                prefix[i] = prefix[i - 1] + freq[i - 1];
            }

            // dp[i][j] for keys i to j (1-based)
            let dp = Array.from({ length: n + 1 }, () => Array(n + 1).fill(0));

            steps.push({
                type: 'init',
                i: -1,
                j: -1,
                dp: JSON.parse(JSON.stringify(dp)),
                panel: `Initialize dp table (n=${n})<br>prefix sums: ${prefix}`,
                statusText: `Start with prefix sums`,
                log: `prefix = ${prefix}`,
                logColor: 'var(--text-dim)'
            });

            // Length 1: single keys
            for (let i = 1; i <= n; i++) {
                dp[i][i] = freq[i - 1];
                steps.push({
                    type: 'length1',
                    i: i,
                    j: i,
                    dp: JSON.parse(JSON.stringify(dp)),
                    panel: `Length=1, i=${i}, j=${i}<br>dp[${i}][${i}] = freq[${i-1}] = <b>${freq[i-1]}</b>`,
                    statusText: `dp[${i}][${i}] = ${freq[i-1]}`,
                    log: `dp[${i}][${i}] = ${freq[i-1]}`,
                    logColor: 'var(--accent-blue)'
                });
            }

            // For length = 2 to n
            for (let L = 2; L <= n; L++) {
                for (let i = 1; i <= n - L + 1; i++) {
                    const j = i + L - 1;
                    let minCost = Infinity;
                    let bestR = -1;

                    const sumFreq = prefix[j] - prefix[i - 1];

                    for (let r = i; r <= j; r++) {
                        const leftCost = (r > i) ? dp[i][r - 1] : 0;
                        const rightCost = (r < j) ? dp[r + 1][j] : 0;
                        const cost = leftCost + rightCost + sumFreq;

                        if (cost < minCost) {
                            minCost = cost;
                            bestR = r;
                        }

                        steps.push({
                            type: 'root-try',
                            i: i,
                            j: j,
                            r: r,
                            dp: JSON.parse(JSON.stringify(dp)),
                            tempCost: cost,
                            panel: `L=${L}, range [${i},${j}], trying root r=${r} (key=${keys[r-1]})<br>left=[${i},${r-1}] cost=${leftCost}<br>right=[${r+1},${j}] cost=${rightCost}<br>sum_freq=${sumFreq}<br>cost = ${cost}`,
                            statusText: `Trying root ${r} cost=${cost}`,
                            log: `range[${i},${j}] r=${r} cost=${cost}`,
                            logColor: 'var(--accent-purple)'
                        });
                    }

                    dp[i][j] = minCost;

                    steps.push({
                        type: 'update',
                        i: i,
                        j: j,
                        dp: JSON.parse(JSON.stringify(dp)),
                        bestR: bestR,
                        panel: `Updated dp[${i}][${j}] = <b>${minCost}</b> (best root r=${bestR})`,
                        statusText: `dp[${i}][${j}] = ${minCost}`,
                        log: `dp[${i}][${j}] = ${minCost}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            steps.push({
                type: 'final',
                i: 1,
                j: n,
                dp: JSON.parse(JSON.stringify(dp)),
                complete: true,
                result: dp[1][n],
                panel: `DP table filled.<br><b>Minimum search cost = ${dp[1][n]}</b>`,
                statusText: `Done. Min cost = ${dp[1][n]}`,
                log: `\nFinal minimum cost: ${dp[1][n]}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Keys tiles
            const keysContainer = document.getElementById('keys-container');
            keysContainer.innerHTML = '';
            for (let k = 0; k < keys.length; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${k < step.i-1 || k > step.j-1 ? 'done' : (step.i-1 <= k && k <= step.j-1 ? 'candidate' : 'idle')}`;
                tile.innerText = keys[k];
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${k}]`;
                wrapper.append(tile, idxLabel);
                keysContainer.appendChild(wrapper);
            }

            // Freq tiles
            const freqContainer = document.getElementById('freq-container');
            freqContainer.innerHTML = '';
            for (let k = 0; k < freq.length; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${k < step.i-1 || k > step.j-1 ? 'done' : (step.i-1 <= k && k <= step.j-1 ? 'candidate' : 'idle')}`;
                tile.innerText = freq[k];
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${k}]`;
                wrapper.append(tile, idxLabel);
                freqContainer.appendChild(wrapper);
            }

            // DP table
            const table = document.getElementById('dp-table');
            table.innerHTML = '';
            table.style.gridTemplateColumns = `repeat(${keys.length + 1}, 48px)`;

            // Header row
            const emptyHeader = document.createElement('div');
            emptyHeader.className = 'dp-cell header';
            emptyHeader.innerText = '';
            table.appendChild(emptyHeader);
            for (let c = 1; c <= keys.length; c++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.innerText = c;
                table.appendChild(cell);
            }

            // Rows
            for (let r = 1; r <= keys.length; r++) {
                const rowHeader = document.createElement('div');
                rowHeader.className = 'dp-cell header';
                rowHeader.innerText = r;
                table.appendChild(rowHeader);

                for (let c = 1; c <= keys.length; c++) {
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${(r === step.i && c === step.j) ? 'candidate' : ''}`;
                    if (r > c) cell.innerText = '—';
                    else cell.innerText = step.dp[r] && step.dp[r][c] !== undefined ? step.dp[r][c] : '—';
                    table.appendChild(cell);
                }
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-range').innerText = step.i !== undefined && step.j !== undefined ? `[${step.i},${step.j}]` : '—';
            document.getElementById('val-root').innerText = step.bestR !== undefined ? step.bestR : (step.r !== undefined ? step.r : '—');
            document.getElementById('val-sum').innerText = step.sumFreq !== undefined ? step.sumFreq : '—';
            document.getElementById('val-cost').innerText = step.dp && step.i !== undefined && step.j !== undefined && step.dp[step.i] && step.dp[step.i][step.j] !== undefined ? step.dp[step.i][step.j] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        function loadCustom() {
            const keysStr = document.getElementById('keys-input').value.trim();
            const freqStr = document.getElementById('freq-input').value.trim();
            try {
                const k = JSON.parse(keysStr);
                const f = JSON.parse(freqStr);
                if (Array.isArray(k) && Array.isArray(f) && k.length === f.length) {
                    keys = k;
                    freq = f;
                    generateSteps();
                    reset();
                } else {
                    alert("Keys and freq must be arrays of equal length.");
                }
            } catch(e) {
                alert("Invalid JSON format.");
            }
        }

        function loadExample(keysStr, freqStr) {
            keys = JSON.parse(keysStr);
            freq = JSON.parse(freqStr);
            document.getElementById('keys-input').value = keysStr;
            document.getElementById('freq-input').value = freqStr;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
