<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Coins with Limited Supply - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 220px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        /* COINS TILES */
        .coins-container {
            display: flex;
            gap: 8px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .coin-tile {
            min-width: 68px;
            height: 68px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--text-main);
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        .coin-tile.current { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); }

        /* DP BAR */
        .dp-container { 
            margin-top: 20px;
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
            width: 920px;
            overflow-x: auto;
        }
        .dp-bar {
            display: flex;
            gap: 4px;
            justify-content: center;
        }
        .dp-cell {
            min-width: 48px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            border-radius: 6px;
        }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.12); box-shadow: 0 0 10px var(--accent-green); }
        .dp-cell.header { background: var(--bg-surface); color: var(--text-dim); font-size: 10px; height: 24px; }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 110px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">coins =</label>
        <input type="text" id="coins-input" value="1,2,5" style="width:220px">
        <label class="ui-label">counts =</label>
        <input type="text" id="counts-input" value="3,2,1" style="width:220px">
        <label class="ui-label">amount =</label>
        <input type="number" id="amount-input" value="11" min="0" style="width:80px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,2,5],[3,2,1],11)">Ex 1 → 5</button>
        <button onclick="loadExample([2,3],[2,2],7)">Ex 2 → 3</button>
        <button onclick="loadExample([1,5],[2,1],6)">Ex 3 → 2</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Coins tiles (value + remaining count, orange = current coin)</div>
        <div id="coins-container" class="coins-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP array — dp[amount] = min coins needed (bounded by counts)</div>
        <div class="dp-container" id="dp-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current coin</span>
            <span class="info-value" id="val-coin" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Remaining count</span>
            <span class="info-value" id="val-count" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current amount</span>
            <span class="info-value" id="val-amt" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Candidate coins</span>
            <span class="info-value" id="val-candidate" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Best so far</span>
            <span class="info-value" id="val-best" style="color: var(--accent-orange);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Minimum coins needed =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current coin</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentCoins = [1,2,5];
        let currentCounts = [3,2,1];
        let currentAmount = 11;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];
        let dp = [];
        let usagePerCoin = []; // for visualization per coin

        function init() {
            loadExample([1,2,5], [3,2,1], 11);
        }

        function loadExample(coins, counts, amount) {
            currentCoins = coins;
            currentCounts = counts;
            currentAmount = amount;
            document.getElementById('coins-input').value = coins.join(',');
            document.getElementById('counts-input').value = counts.join(',');
            document.getElementById('amount-input').value = amount;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const coinsStr = document.getElementById('coins-input').value.trim();
            const countsStr = document.getElementById('counts-input').value.trim();
            const amt = parseInt(document.getElementById('amount-input').value);
            if (isNaN(amt) || amt < 0) {
                alert("Please enter a valid amount (>=0)");
                return;
            }
            const coins = coinsStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            const counts = countsStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (coins.length === 0 || coins.length !== counts.length) {
                alert("Please enter valid coins and counts arrays of same length");
                return;
            }
            loadExample(coins, counts, amt);
        }

        function generateSteps() {
            steps = [];
            const coins = currentCoins;
            const counts = [...currentCounts]; // original counts for reference
            const target = currentAmount;
            const n = coins.length;

            // Initialize dp
            const INF = target + 1;
            dp = new Array(target + 1).fill(INF);
            dp[0] = 0;

            steps.push({
                type: 'init',
                coinIdx: -1,
                amt: -1,
                dpSnapshot: [...dp],
                panel: `Minimum Coins with Limited Supply — Bounded DP<br>coins = [${coins.join(', ')}]<br>counts = [${counts.join(', ')}]<br>amount = ${target}`,
                statusText: `Initialize dp[0] = 0, others = INF`,
                log: `dp[0] = 0, others = ${INF}`,
                logColor: 'var(--text-dim)'
            });

            // Process each coin
            for (let i = 0; i < n; i++) {
                const v = coins[i];
                const maxUse = counts[i];
                if (v === 0) continue;

                steps.push({
                    type: 'start-coin',
                    coinIdx: i,
                    amt: -1,
                    dpSnapshot: [...dp],
                    panel: `Processing coin ${v} (max use = ${maxUse})`,
                    statusText: `Coin ${v}`,
                    log: `\n--- Coin ${v} (max ${maxUse}) ---`,
                    logColor: 'var(--accent-orange)'
                });

                // For bounded, we use descending loop for each possible use (but for viz we simulate one by one)
                // To keep steps reasonable, we loop k=1 to maxUse and do reverse update for each k
                for (let k = 1; k <= maxUse; k++) {
                    steps.push({
                        type: 'start-k',
                        coinIdx: i,
                        amt: -1,
                        dpSnapshot: [...dp],
                        panel: `Using ${k} of coin ${v}`,
                        statusText: `k=${k}`,
                        log: `Using k=${k} of coin ${v}`,
                        logColor: 'var(--accent-purple)'
                    });

                    for (let a = target; a >= v; a--) {
                        if (dp[a - v] !== INF) {
                            const candidate = dp[a - v] + 1;
                            if (candidate < dp[a]) {
                                const old = dp[a];
                                dp[a] = candidate;
                                steps.push({
                                    type: 'update-amt',
                                    coinIdx: i,
                                    amt: a,
                                    dpSnapshot: [...dp],
                                    panel: `amt=${a}: dp[${a}] = min(${old}, dp[${a-v}] + 1) = ${candidate}`,
                                    statusText: `amt=${a}`,
                                    log: `amt=${a}: ${candidate}`,
                                    logColor: 'var(--accent-green)'
                                });
                            }
                        }
                    }
                }
            }

            const result = dp[target] === INF ? -1 : dp[target];
            steps.push({
                type: 'final',
                coinIdx: -1,
                amt: target,
                dpSnapshot: [...dp],
                panel: `DP complete.<br>Minimum coins needed = <span style="color:var(--accent-green)"><b>${result}</b></span>`,
                statusText: `Final answer = ${result}`,
                log: `\nFinal dp[${target}] = ${result}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: result
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render coins tiles with remaining counts (simplified, use original for display)
            const coinsContainer = document.getElementById('coins-container');
            coinsContainer.innerHTML = '';
            const coins = currentCoins;
            const counts = currentCounts;
            for (let i = 0; i < coins.length; i++) {
                const tile = document.createElement('div');
                tile.className = `coin-tile ${step.coinIdx === i ? 'current' : ''}`;
                tile.innerHTML = `<div>${coins[i]}</div><div style="font-size:11px">(${counts[i]})</div>`;
                coinsContainer.appendChild(tile);
            }

            // Render DP bar
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-bar"></div>`;
            const bar = dpContainer.querySelector('.dp-bar');

            // Header row
            const header = document.createElement('div');
            header.style.display = 'flex';
            header.style.gap = '4px';
            const emptyHeader = document.createElement('div');
            emptyHeader.className = 'dp-cell header';
            header.appendChild(emptyHeader);
            for (let a = 0; a <= currentAmount; a++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.style.height = '24px';
                cell.textContent = a;
                header.appendChild(cell);
            }
            bar.appendChild(header);

            // DP row
            const row = document.createElement('div');
            row.style.display = 'flex';
            row.style.gap = '4px';
            const currentDP = step.dpSnapshot || dp;
            for (let a = 0; a <= currentAmount; a++) {
                const cell = document.createElement('div');
                cell.className = `dp-cell ${step.amt === a ? 'current' : ''}`;
                const val = currentDP[a] === (currentAmount + 1) ? '∞' : currentDP[a];
                cell.innerHTML = `<div>${val}</div>`;
                row.appendChild(cell);
            }
            bar.appendChild(row);

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-coin').innerText = step.coinIdx !== -1 ? currentCoins[step.coinIdx] : '—';
            document.getElementById('val-count').innerText = step.coinIdx !== -1 ? currentCounts[step.coinIdx] : '—';
            document.getElementById('val-amt').innerText = step.amt !== -1 ? step.amt : '—';
            document.getElementById('val-candidate').innerText = step.amt !== -1 && currentDP[step.amt] !== (currentAmount + 1) ? currentDP[step.amt] : '—';
            document.getElementById('val-best').innerText = '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
