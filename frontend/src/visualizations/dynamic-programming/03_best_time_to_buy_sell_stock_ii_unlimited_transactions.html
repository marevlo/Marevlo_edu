<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Time to Buy & Sell Stock II - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 220px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: VISUALIZATION TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 110px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 54px; height: 54px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 20px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.added { background: #0d2244; border-color: var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.past { opacity: 0.35; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 720px; text-align: center; font-family: monospace; min-height: 85px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">prices =</label>
        <input type="text" id="num-input" placeholder="[7,1,5,3,6,4]" value="[7,1,5,3,6,4]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([7,1,5,3,6,4])">Ex 1 ([7,1,5,3,6,4])</button>
        <button onclick="loadExample([1,2,3,4,5])">Ex 2 ([1,2,3,4,5])</button>
        <button onclick="loadExample([7,6,4,3,1])">Ex 3 ([7,6,4,3,1])</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Daily Stock Prices:</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Day (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">prices[i-1]</span>
            <span class="info-value" id="val-prev" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">prices[i]</span>
            <span class="info-value" id="val-curr" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Diff</span>
            <span class="info-value" id="val-diff" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Total Profit</span>
            <span class="info-value" id="val-profit" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">max profit =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current pair (i-1, i)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Price increase (+profit)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border:1px solid var(--accent-blue)"></span> Being compared</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputPrices = [7,1,5,3,6,4];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];

        function init() { loadExample([7,1,5,3,6,4]); }

        function parseArray(str) {
            try {
                return JSON.parse(str);
            } catch(e) {
                return null;
            }
        }

        function loadExample(newPrices) {
            inputPrices = newPrices;
            document.getElementById('num-input').value = JSON.stringify(newPrices);
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('num-input').value.trim();
            const parsed = parseArray(valStr);
            if (parsed && Array.isArray(parsed) && parsed.every(n => Number.isInteger(n) && n >= 0)) {
                loadExample(parsed);
            } else {
                alert("Please enter a valid array of non-negative integers, e.g. [7,1,5,3,6,4]");
            }
        }

        function generateSteps() {
            steps = [];
            const prices = [...inputPrices];
            const n = prices.length;

            // STEP 0: INIT
            steps.push({
                type: 'init',
                i: null,
                prev: null,
                curr: null,
                diff: null,
                profit: 0,
                prices: prices,
                panel: `Maximum profit with unlimited transactions.<br>We can buy and sell on any day.<br>Optimal greedy insight: add up <b>every positive daily difference</b>.`,
                statusText: `prices = [${prices.join(', ')}]`,
                log: `prices = [${prices.join(', ')}]\nStart greedy one-pass\nprofit = 0`,
                logColor: 'var(--text-dim)'
            });

            let totalProfit = 0;

            if (n < 2) {
                steps.push({
                    type: 'final',
                    i: null,
                    prev: null,
                    curr: null,
                    diff: null,
                    profit: 0,
                    prices: prices,
                    panel: `Array too short (n = ${n}) → no transaction possible.<br>Max profit = <b>0</b>`,
                    statusText: `Done. Max profit = 0`,
                    log: `\nFinal profit = 0`,
                    logColor: 'var(--accent-green)',
                    complete: true,
                    result: 0
                });
                return;
            }

            for (let i = 1; i < n; i++) {
                const prevPrice = prices[i-1];
                const currPrice = prices[i];
                const diff = currPrice - prevPrice;

                // Select current pair
                steps.push({
                    type: 'compare',
                    i: i,
                    prev: prevPrice,
                    curr: currPrice,
                    diff: diff,
                    profit: totalProfit,
                    prices: prices,
                    panel: `Day <b>${i}</b>: Compare prices[<b>${i-1}</b>] = <b>${prevPrice}</b> and prices[<b>${i}</b>] = <b>${currPrice}</b><br>diff = <span style="color:var(--accent-blue)">${diff}</span>`,
                    statusText: `Comparing day ${i-1} → day ${i}`,
                    log: `\ni=${i}: prices[${i-1}]=${prevPrice}, prices[${i}]=${currPrice}, diff=${diff}`,
                    logColor: 'var(--accent-orange)'
                });

                if (diff > 0) {
                    totalProfit += diff;
                    steps.push({
                        type: 'profit',
                        i: i,
                        prev: prevPrice,
                        curr: currPrice,
                        diff: diff,
                        profit: totalProfit,
                        prices: prices,
                        panel: `Price increased by <b>${diff}</b>!<br>Add to total profit → <span style="color:var(--accent-green)">${totalProfit}</span>`,
                        statusText: `+${diff} profit added`,
                        log: `  ↑ Price rose → profit += ${diff} → total = ${totalProfit}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            // FINAL
            steps.push({
                type: 'final',
                i: null,
                prev: null,
                curr: null,
                diff: null,
                profit: totalProfit,
                prices: prices,
                panel: `One-pass complete.<br><b>Maximum profit = ${totalProfit}</b><br>(Sum of all positive daily increases)`,
                statusText: `Done. Max profit = ${totalProfit}`,
                log: `\nFinal profit = ${totalProfit}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: totalProfit
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';

            step.prices.forEach((price, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';

                const tile = document.createElement('div');
                tile.className = `tile ${step.i === i || step.i === i+1 ? 'candidate' : (step.i !== null && i < step.i ? 'past' : 'idle')}`;
                tile.innerText = price;

                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `day ${i}`;

                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-i').innerText = step.i !== null ? step.i : '—';
            document.getElementById('val-prev').innerText = step.prev !== null ? step.prev : '—';
            document.getElementById('val-curr').innerText = step.curr !== null ? step.curr : '—';
            document.getElementById('val-diff').innerText = step.diff !== null ? (step.diff > 0 ? `+${step.diff}` : step.diff) : '—';
            document.getElementById('val-profit').innerText = step.profit;

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            // Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
