<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Change II (number of ways) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 180px;
        }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 100px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .coins-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 110px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 14px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main); line-height: 1.1;
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); }
        .tile.added { background: #0d2244; border-color: var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); }
        .tile.past { opacity: 0.35; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* DP BAR */
        .dp-bar {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            max-width: 920px;
            overflow-x: auto;
            padding: 8px;
            background: var(--bg-surface);
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .dp-tile {
            min-width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 18px; font-weight: 700; font-family: monospace;
            border: 2px solid var(--border-main); background: #21262d;
            color: var(--accent-blue); transition: all 0.3s ease;
        }
        .dp-tile.updated { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.12); box-shadow: 0 0 12px var(--accent-green); }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">coins =</label>
        <input type="text" id="coins-input" value="[1,2,5]" style="width:180px">
        <label class="ui-label">amount =</label>
        <input type="number" id="amount-input" value="5" style="width:80px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,2,5],5)">Ex 1 (4 ways)</button>
        <button onclick="loadExample([2],3)">Ex 2 (0 ways)</button>
        <button onclick="loadExample([1,2,3],4)">Ex 3 (4 ways)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Coins (unlimited supply):</div>
        <div class="coins-wrapper" id="coins-container"></div>
        
        <div class="ui-label" style="margin-top:25px;">DP Array (ways to make amount j):</div>
        <div class="dp-bar" id="dp-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Coin</span>
            <span class="info-value" id="val-coin" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Amount j</span>
            <span class="info-value" id="val-j" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Ways before</span>
            <span class="info-value" id="val-before" style="color: var(--text-dim);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">New ways</span>
            <span class="info-value" id="val-new" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Number of ways =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current coin</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Updated ways</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border:1px solid var(--accent-blue)"></span> Amount being updated</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Previous</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputCoins = [1,2,5];
        let inputAmount = 5;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];

        function init() { loadExample([1,2,5], 5); }

        function loadExample(coins, amount) {
            inputCoins = coins;
            inputAmount = amount;
            document.getElementById('coins-input').value = JSON.stringify(coins);
            document.getElementById('amount-input').value = amount;
            generateSteps();
            reset();
        }

        function loadCustom() {
            let coins;
            try {
                coins = JSON.parse(document.getElementById('coins-input').value);
            } catch(e) {
                alert("Please enter a valid array for coins, e.g. [1,2,5]");
                return;
            }
            const amount = parseInt(document.getElementById('amount-input').value);
            if (Array.isArray(coins) && !isNaN(amount) && amount >= 0) {
                loadExample(coins, amount);
            } else {
                alert("Invalid input.");
            }
        }

        function generateSteps() {
            steps = [];
            const coins = [...inputCoins];
            const n = coins.length;
            const amount = inputAmount;

            // STEP 0: INIT
            let dp = Array(amount + 1).fill(0);
            dp[0] = 1;
            steps.push({
                type: 'init',
                coinIdx: null,
                j: null,
                dp: [...dp],
                panel: `Coin Change II — Number of ways<br>coins = [${coins}]<br>amount = ${amount}`,
                statusText: `dp[0] = 1 (one way to make amount 0)`,
                log: `Initialize dp = [1, 0, 0, ..., 0]`,
                logColor: 'var(--text-dim)'
            });

            // For each coin
            for (let i = 0; i < n; i++) {
                const coin = coins[i];
                steps.push({
                    type: 'start-coin',
                    coinIdx: i,
                    j: null,
                    dp: [...dp],
                    panel: `Processing coin <b>${coin}</b> (index ${i})`,
                    statusText: `coin = ${coin}`,
                    log: `\n--- Coin ${coin} ---`,
                    logColor: 'var(--accent-orange)'
                });

                // Update dp from left to right (unlimited usage)
                for (let j = coin; j <= amount; j++) {
                    const before = dp[j];
                    const add = dp[j - coin];
                    dp[j] += add;

                    steps.push({
                        type: 'update',
                        coinIdx: i,
                        j: j,
                        dp: [...dp],
                        panel: `j = <b>${j}</b><br>Before: ${before}<br>Add dp[${j}-${coin}] = ${add}<br>New dp[${j}] = <span style="color:var(--accent-green)">${dp[j]}</span>`,
                        statusText: `Update dp[${j}]`,
                        log: `  dp[${j}] += dp[${j-coin}] → ${dp[j]}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            // FINAL
            steps.push({
                type: 'final',
                coinIdx: n,
                j: amount,
                dp: [...dp],
                panel: `All coins processed.<br>Number of ways to make amount <b>${amount}</b> = <span style="color:var(--accent-green)"><b>${dp[amount]}</b></span>`,
                statusText: `Done. Ways = ${dp[amount]}`,
                log: `\nFinal dp[${amount}] = ${dp[amount]}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: dp[amount]
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render coins
            const coinsContainer = document.getElementById('coins-container');
            coinsContainer.innerHTML = '';
            inputCoins.forEach((c, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.coinIdx === i ? 'candidate' : (step.coinIdx !== null && i < step.coinIdx ? 'past' : 'idle')}`;
                tile.innerHTML = `<span>coin</span><br><b>${c}</b>`;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `coin ${i}`;
                wrapper.append(tile, idxLabel);
                coinsContainer.appendChild(wrapper);
            });

            // Render DP bar
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = '';
            step.dp.forEach((val, j) => {
                const tile = document.createElement('div');
                tile.className = `dp-tile ${step.j === j ? 'updated' : ''}`;
                tile.innerText = val;
                const idx = document.createElement('div');
                idx.style.fontSize = '10px';
                idx.style.color = 'var(--text-dim)';
                idx.innerText = j;
                const unit = document.createElement('div');
                unit.style.textAlign = 'center';
                unit.append(tile, idx);
                dpContainer.appendChild(unit);
            });

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-coin').innerText = step.coinIdx !== null ? inputCoins[step.coinIdx] : '—';
            document.getElementById('val-j').innerText = step.j !== null ? step.j : '—';
            document.getElementById('val-before').innerText = step.j !== null && step.dp.length > step.j ? (step.dp[step.j] - (step.type === 'update' ? inputCoins[step.coinIdx] : 0)) : '—';
            document.getElementById('val-new').innerText = step.j !== null ? step.dp[step.j] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
