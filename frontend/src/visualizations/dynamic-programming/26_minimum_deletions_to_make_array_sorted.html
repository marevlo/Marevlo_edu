<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Deletions to Make Array Sorted - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 240px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 54px; height: 54px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 20px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 40px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">array =</label>
        <input type="text" id="arr-input" placeholder="[3,2,1]" value="[3,2,1]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[3,2,1]')">Ex 1 ([3,2,1])</button>
        <button onclick="loadExample('[1,2,3,4]')">Ex 2 ([1,2,3,4])</button>
    </div>

    <div class="visual-container">
        <div class="ui-label" id="arr-label">Array:</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Index (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Last Value</span>
            <span class="info-value" id="val-last" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Curr Length</span>
            <span class="info-value" id="val-clen" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Max Length</span>
            <span class="info-value" id="val-maxlen" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Minimum deletions =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current position</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Include (valid)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red); border:1px solid var(--accent-red)"></span> Cannot include</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let nums = [3,2,1];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample("[3,2,1]"); }

        function loadExample(arrStr) {
            nums = JSON.parse(arrStr);
            document.getElementById('arr-input').value = JSON.stringify(nums);
            generateSteps();
            reset();
        }

        function loadCustom() {
            const valStr = document.getElementById('arr-input').value.trim();
            if (valStr) {
                try {
                    const parsed = JSON.parse(valStr);
                    if (Array.isArray(parsed)) {
                        nums = parsed;
                        generateSteps();
                        reset();
                    } else {
                        alert("Please enter a valid array (e.g. [3,2,1])");
                    }
                } catch(e) {
                    alert("Invalid array format.");
                }
            }
        }

        function generateSteps() {
            steps = [];
            let maxLenGlobal = 0;

            function simulate(i, last, currLen) {
                const states = nums.map((_, idx) => (idx === i ? 'candidate' : (idx < i ? 'done' : 'idle')));

                steps.push({
                    type: 'call',
                    i: i,
                    last: last,
                    currLen: currLen,
                    digitsStates: states,
                    panel: `Call <code>lis(${i}, last=${last}, len=${currLen})</code>`,
                    statusText: `i=${i}, last=${last}, len=${currLen}`,
                    log: `Call lis(${i}, ${last}, ${currLen})`,
                    logColor: 'var(--text-dim)'
                });

                if (i === nums.length) {
                    maxLenGlobal = Math.max(maxLenGlobal, currLen);
                    steps.push({
                        type: 'base',
                        i: i,
                        last: last,
                        currLen: currLen,
                        digitsStates: states,
                        panel: `<span style="color:var(--accent-green)">Base case (end of array) → max_len updated to <b>${maxLenGlobal}</b></span>`,
                        statusText: `Base, max_len=${maxLenGlobal}`,
                        log: `  Base: max_len=${maxLenGlobal}`,
                        logColor: 'var(--accent-green)'
                    });
                    return currLen;
                }

                // Exclude
                steps.push({
                    type: 'exclude',
                    i: i,
                    last: last,
                    currLen: currLen,
                    digitsStates: states,
                    panel: `<span style="color:var(--accent-blue)">Exclude nums[${i}] = ${nums[i]}</span>`,
                    statusText: `Exclude`,
                    log: `    Exclude`,
                    logColor: 'var(--accent-blue)'
                });
                const excludeVal = simulate(i + 1, last, currLen);

                // Include if possible
                let includeVal = currLen;
                if (nums[i] >= last) {
                    steps.push({
                        type: 'include',
                        i: i,
                        last: last,
                        currLen: currLen,
                        digitsStates: states,
                        panel: `<span style="color:var(--accent-green)">Include nums[${i}] = ${nums[i]} (≥ ${last})</span>`,
                        statusText: `Include`,
                        log: `    Include → len=${currLen + 1}`,
                        logColor: 'var(--accent-green)'
                    });
                    includeVal = simulate(i + 1, nums[i], currLen + 1);
                } else {
                    steps.push({
                        type: 'skip',
                        i: i,
                        last: last,
                        currLen: currLen,
                        digitsStates: states,
                        panel: `<span style="color:var(--accent-red)">Cannot include ( ${nums[i]} < ${last} )</span>`,
                        statusText: `Cannot include`,
                        log: `    Cannot include`,
                        logColor: 'var(--accent-red)'
                    });
                }

                const res = Math.max(excludeVal, includeVal);
                steps.push({
                    type: 'return',
                    i: i,
                    last: last,
                    currLen: currLen,
                    digitsStates: states,
                    panel: `Return max(exclude=${excludeVal}, include=${includeVal}) = <b>${res}</b>`,
                    statusText: `Return ${res}`,
                    log: `  Return ${res}`,
                    logColor: 'var(--accent-purple)'
                });

                return res;
            }

            simulate(0, Number.NEGATIVE_INFINITY, 0);

            const n = nums.length;
            const minDeletions = n - maxLenGlobal;

            steps.push({
                type: 'final',
                i: nums.length,
                last: Number.NEGATIVE_INFINITY,
                currLen: maxLenGlobal,
                digitsStates: nums.map(() => 'winning'),
                panel: `All paths explored.<br>LIS length = <b>${maxLenGlobal}</b><br>Min deletions = <b>${n} - ${maxLenGlobal} = ${minDeletions}</b>`,
                complete: true,
                result: minDeletions,
                statusText: `Done. Min deletions = ${minDeletions}`,
                log: `\nFinal LIS length = ${maxLenGlobal}\nMin deletions = ${minDeletions}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            
            step.digitsStates.forEach((state, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                
                const tile = document.createElement('div');
                tile.className = `tile ${state}`;
                tile.innerText = nums[i];
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-i').innerText = step.i !== undefined ? step.i : '—';
            document.getElementById('val-last').innerText = step.last !== undefined ? (step.last === Number.NEGATIVE_INFINITY ? '-∞' : step.last) : '—';
            document.getElementById('val-clen').innerText = step.currLen !== undefined ? step.currLen : '—';
            document.getElementById('val-maxlen').innerText = step.maxLen !== undefined ? step.maxLen : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
