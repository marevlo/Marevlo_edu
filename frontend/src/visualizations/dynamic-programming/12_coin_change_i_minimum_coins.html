<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Change I (minimum coins) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 180px;
            font-size: 13px;
        }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 100px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: ARRAY TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 20px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.failed { background: #2a0d0d; border-color: var(--accent-red); color: var(--accent-red); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-red); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* Pointers */
        .ptr-container { display: flex; flex-direction: column; align-items: center; position: absolute; bottom: -50px; gap: 2px; font-size: 12px; font-family: monospace; font-weight: bold; transition: all 0.3s; width: 100%; text-align: center; }
        .ptr-idx { color: var(--accent-orange); }
        .ptr-arrow { font-size: 16px; line-height: 10px; margin-bottom: 2px; color: var(--text-dim); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 40px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }
        .pop-false { animation: popAnim 400ms ease; color: var(--accent-red) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-red); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">coins =</label>
        <input type="text" id="coins-input" placeholder="[1,2,5]" value="[1,2,5]">
        <label class="ui-label" style="margin-left:8px">amount =</label>
        <input type="number" id="amount-input" placeholder="11" value="11">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[1,2,5]',11)">Ex 1 ([1,2,5],11)</button>
        <button onclick="loadExample('[2]',3)">Ex 2 ([2],3)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label" id="arr-label">Coins array:</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Remaining Amount</span>
            <span class="info-value" id="val-amount" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Coin idx</span>
            <span class="info-value" id="val-idx" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Coin</span>
            <span class="info-value" id="val-coin" style="color: var(--text-main);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Path Coins</span>
            <span class="info-value" id="val-path" style="color: var(--accent-purple);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">min coins =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current Coin</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Include Coin</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red); border:1px solid var(--accent-red)"></span> Exclude Coin</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputCoins = [1,2,5];
        let inputAmount = 11;
        let coinsArr = [];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample("[1,2,5]", 11); }

        function loadExample(coinsStr, amt) {
            inputCoins = JSON.parse(coinsStr);
            inputAmount = parseInt(amt);
            document.getElementById('coins-input').value = JSON.stringify(inputCoins);
            document.getElementById('amount-input').value = inputAmount;
            generateSteps();
            reset();
        }

        function loadCustom() {
            try {
                const coinsStr = document.getElementById('coins-input').value.trim();
                const coinsParsed = JSON.parse(coinsStr);
                const amt = parseInt(document.getElementById('amount-input').value);
                if (Array.isArray(coinsParsed) && coinsParsed.length > 0 && !isNaN(amt) && amt >= 0) {
                    inputCoins = coinsParsed;
                    inputAmount = amt;
                    generateSteps();
                    reset();
                } else {
                    alert("Please enter valid coins array (e.g. [1,2,5]) and non-negative amount.");
                }
            } catch(e) {
                alert("Invalid coins format. Use JSON array like [1,2,5]");
            }
        }

        function generateSteps() {
            steps = [];
            coinsArr = inputCoins;
            const n = coinsArr.length;

            function getStates(currIdx) {
                return coinsArr.map((_, idx) => {
                    if (idx === currIdx) return 'candidate';
                    if (idx < currIdx) return 'done';
                    return 'idle';
                });
            }

            function simulate(amount, idx, path = []) {
                const pathStr = path.length > 0 ? path.join('+') : '—';

                steps.push({
                    type: 'call',
                    amount: amount,
                    idx: idx,
                    coin: idx < n ? coinsArr[idx] : '—',
                    path: pathStr,
                    digitsStates: getStates(idx),
                    panel: `Call <code>minCoins(${amount}, ${idx})</code><br>Remaining: <b>${amount}</b> | Path: <b>${pathStr}</b>`,
                    statusText: `amount=${amount}, idx=${idx}`,
                    log: `Call minCoins(${amount}, ${idx})`,
                    logColor: 'var(--text-dim)'
                });

                if (amount === 0) {
                    steps.push({
                        type: 'base-zero',
                        amount: amount,
                        idx: idx,
                        coin: '—',
                        path: pathStr,
                        digitsStates: getStates(idx),
                        panel: `<span style="color:var(--accent-green)">Base case: amount == 0 → return <b>0</b></span>`,
                        statusText: `Return 0`,
                        log: `  amount == 0 → return 0`,
                        logColor: 'var(--accent-green)'
                    });
                    return 0;
                }

                if (amount < 0 || idx >= n) {
                    steps.push({
                        type: 'base-invalid',
                        amount: amount,
                        idx: idx,
                        coin: '—',
                        path: pathStr,
                        digitsStates: getStates(idx),
                        panel: `<span style="color:var(--accent-red)">Base case: invalid → return <b>∞</b></span>`,
                        statusText: `Return ∞`,
                        log: `  ${amount < 0 ? 'amount < 0' : 'idx >= n'} → return ∞`,
                        logColor: 'var(--accent-red)'
                    });
                    return Infinity;
                }

                const coinVal = coinsArr[idx];

                // Include
                steps.push({
                    type: 'include',
                    amount: amount,
                    idx: idx,
                    coin: coinVal,
                    path: pathStr,
                    digitsStates: getStates(idx),
                    panel: `<span style="color:var(--accent-green)">Include coin <b>${coinVal}</b></span><br>Recurse with amount = ${amount - coinVal}`,
                    statusText: `Include ${coinVal}`,
                    log: `  Include ${coinVal} → minCoins(${amount - coinVal}, ${idx})`,
                    logColor: 'var(--accent-green)'
                });

                const includeRes = simulate(amount - coinVal, idx, [...path, coinVal]);

                // Exclude
                steps.push({
                    type: 'exclude',
                    amount: amount,
                    idx: idx,
                    coin: coinVal,
                    path: pathStr,
                    digitsStates: getStates(idx),
                    panel: `<span style="color:var(--accent-blue)">Exclude coin <b>${coinVal}</b></span><br>Recurse with next coin idx = ${idx + 1}`,
                    statusText: `Exclude ${coinVal}`,
                    log: `  Exclude ${coinVal} → minCoins(${amount}, ${idx + 1})`,
                    logColor: 'var(--accent-blue)'
                });

                const excludeRes = simulate(amount, idx + 1, path);

                const result = Math.min(includeRes, excludeRes);

                steps.push({
                    type: 'return',
                    amount: amount,
                    idx: idx,
                    coin: coinVal,
                    path: pathStr,
                    digitsStates: getStates(idx),
                    panel: `Include result = ${includeRes}<br>Exclude result = ${excludeRes}<br><span style="color:var(--accent-purple)">Min = <b>${result === Infinity ? '∞' : result}</b></span>`,
                    statusText: `Return ${result === Infinity ? '∞' : result}`,
                    log: `  Return ${result === Infinity ? '∞' : result}`,
                    logColor: result === Infinity ? 'var(--accent-red)' : 'var(--accent-purple)'
                });

                return result;
            }

            const finalRes = simulate(inputAmount, 0);

            steps.push({
                type: 'final',
                amount: 0,
                idx: n,
                coin: '—',
                path: '—',
                digitsStates: coinsArr.map(() => 'winning'),
                panel: `All recursive paths explored.<br>Minimum coins needed: <b>${finalRes === Infinity ? -1 : finalRes}</b>`,
                complete: true,
                result: finalRes === Infinity ? -1 : finalRes,
                statusText: `Done. Minimum coins = ${finalRes === Infinity ? -1 : finalRes}`,
                log: `\nFinal Result: ${finalRes === Infinity ? -1 : finalRes}`,
                logColor: finalRes === Infinity ? 'var(--accent-red)' : 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            
            step.digitsStates.forEach((state, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                
                const tile = document.createElement('div');
                tile.className = `tile ${state}`;
                tile.innerText = coinsArr[i];
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                
                wrapper.append(tile, idxLabel);

                if ((step.type === 'call' || step.type === 'include' || step.type === 'exclude') && step.idx === i) {
                    const ptrContainer = document.createElement('div');
                    ptrContainer.className = 'ptr-container';
                    ptrContainer.innerHTML = '<div class="ptr-arrow">↑</div><div class="ptr-idx">IDX</div>';
                    wrapper.appendChild(ptrContainer);
                }

                container.appendChild(wrapper);
            });

            if ((step.type === 'call' || step.type === 'include' || step.type === 'exclude') && step.idx < coinsArr.length) {
                container.style.marginBottom = "45px";
            } else {
                container.style.marginBottom = "0px";
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-amount').innerText = step.amount !== undefined ? step.amount : '—';
            document.getElementById('val-idx').innerText = step.idx !== undefined ? step.idx : '—';
            document.getElementById('val-coin').innerText = step.coin !== undefined ? step.coin : '—';
            document.getElementById('val-path').innerText = step.path !== undefined ? step.path : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = step.result === -1 ? 'pop-false' : 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
