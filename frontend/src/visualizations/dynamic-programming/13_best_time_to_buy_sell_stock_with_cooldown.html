<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Time to Buy & Sell Stock with Cooldown - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 340px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .prices-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 110px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); }
        .tile.past { opacity: 0.35; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* DP STATES */
        .dp-states {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
            max-width: 920px;
        }
        .dp-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 120px;
        }
        .dp-label {
            font-size: 12px;
            color: var(--text-dim);
            font-family: monospace;
        }
        .dp-value {
            min-width: 92px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
        }
        .dp-value.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.12); box-shadow: 0 0 12px var(--accent-green); }

        /* PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">prices =</label>
        <input type="text" id="prices-input" value="[1,2,3,0,2]" style="width:340px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,2,3,0,2])">Ex 1 ([1,2,3,0,2])</button>
        <button onclick="loadExample([1])">Ex 2 ([1])</button>
        <button onclick="loadExample([7,1,5,3,6,4])">Ex 3 ([7,1,5,3,6,4])</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Stock Prices (days 0 to n-1):</div>
        <div class="prices-wrapper" id="prices-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP States (hold / sold / rest)</div>
        <div class="dp-states" id="dp-states"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Day</span>
            <span class="info-value" id="val-day" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Hold</span>
            <span class="info-value" id="val-hold" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Sold</span>
            <span class="info-value" id="val-sold" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Rest</span>
            <span class="info-value" id="val-rest" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Maximum Profit =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current day</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Updated state</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border:1px solid var(--accent-blue)"></span> Hold / Sold</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Past</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputPrices = [1,2,3,0,2];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];

        function init() { loadExample([1,2,3,0,2]); }

        function loadExample(newPrices) {
            inputPrices = newPrices;
            document.getElementById('prices-input').value = JSON.stringify(newPrices);
            generateSteps();
            reset();
        }

        function loadCustom() {
            let p;
            try {
                p = JSON.parse(document.getElementById('prices-input').value);
            } catch(e) {
                alert("Please enter a valid array of integers, e.g. [1,2,3,0,2]");
                return;
            }
            if (Array.isArray(p) && p.every(x => Number.isInteger(x))) {
                loadExample(p);
            } else {
                alert("Invalid prices array");
            }
        }

        function generateSteps() {
            steps = [];
            const prices = [...inputPrices];
            const n = prices.length;
            const INF = 9999999;

            // STEP 0: INIT
            let hold = -prices[0];
            let sold = -INF;
            let rest = 0;

            steps.push({
                type: 'init',
                day: 0,
                hold: hold,
                sold: sold,
                rest: rest,
                prices: prices,
                panel: `Stock with Cooldown DP - 3 States<br>prices = <b>${JSON.stringify(prices)}</b><br>hold = max profit when holding stock<br>sold = max profit when just sold (cooldown next)<br>rest = max profit when free (no cooldown)`,
                statusText: `Day 0: buy or do nothing`,
                log: `prices = ${JSON.stringify(prices)}\nInitialize:\nhold = -${prices[0]} (buy day 0)\nsold = -inf\nrest = 0`,
                logColor: 'var(--text-dim)'
            });

            // For each day i = 1 to n-1
            for (let i = 1; i < n; i++) {
                const p = prices[i];

                const new_hold = Math.max(hold, rest - p);
                const new_sold = hold + p;
                const new_rest = Math.max(rest, sold);

                steps.push({
                    type: 'update',
                    day: i,
                    hold: new_hold,
                    sold: new_sold,
                    rest: new_rest,
                    prices: prices,
                    panel: `Day <b>${i}</b> price = <b>${p}</b><br>hold = max(hold = <b>${hold}</b>, rest - p = <b>${rest} - ${p}</b>) = <b>${new_hold}</b><br>sold = hold + p = <b>${hold} + ${p}</b> = <b>${new_sold}</b><br>rest = max(rest = <b>${rest}</b>, sold = <b>${sold}</b>) = <b>${new_rest}</b>`,
                    statusText: `Day ${i}`,
                    log: `Day ${i} (price ${p}):\nnew_hold = max(${hold}, ${rest} - ${p}) = ${new_hold}\nnew_sold = ${hold} + ${p} = ${new_sold}\nnew_rest = max(${rest}, ${sold}) = ${new_rest}`,
                    logColor: 'var(--accent-blue)'
                });

                hold = new_hold;
                sold = new_sold;
                rest = new_rest;
            }

            // FINAL
            const finalProfit = Math.max(sold, rest);
            steps.push({
                type: 'final',
                day: n,
                hold: hold,
                sold: sold,
                rest: rest,
                prices: prices,
                panel: `All days processed!<br>Maximum profit = <span style="color:var(--accent-green)"><b>${finalProfit}</b></span>`,
                statusText: `Final profit = ${finalProfit}`,
                log: `\nFinal: hold=${hold}, sold=${sold}, rest=${rest}\nAnswer = max(sold, rest) = ${finalProfit}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: finalProfit
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render prices tiles
            const pricesContainer = document.getElementById('prices-container');
            pricesContainer.innerHTML = '';
            step.prices.forEach((p, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.day === i ? 'candidate' : (step.day > i ? 'past' : 'idle')}`;
                tile.innerText = p;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `day ${i}`;
                wrapper.append(tile, idxLabel);
                pricesContainer.appendChild(wrapper);
            });

            // Render DP states
            const dpStates = document.getElementById('dp-states');
            dpStates.innerHTML = `
                <div class="dp-group">
                    <div class="dp-label">HOLD</div>
                    <div class="dp-value ${step.day >= 0 && Math.abs(step.hold) === Math.max(Math.abs(step.hold), Math.abs(step.sold), Math.abs(step.rest)) ? 'current' : ''}">${step.hold}</div>
                </div>
                <div class="dp-group">
                    <div class="dp-label">SOLD</div>
                    <div class="dp-value ${step.day >= 0 && step.sold === Math.max(step.hold, step.sold, step.rest) ? 'current' : ''}">${step.sold === 9999999 || step.sold === -9999999 ? '−∞' : step.sold}</div>
                </div>
                <div class="dp-group">
                    <div class="dp-label">REST</div>
                    <div class="dp-value ${step.day >= 0 && step.rest === Math.max(step.hold, step.sold, step.rest) ? 'current' : ''}">${step.rest}</div>
                </div>
            `;

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-day').innerText = step.day !== undefined ? step.day : '—';
            document.getElementById('val-hold').innerText = step.hold;
            document.getElementById('val-sold').innerText = step.sold === 9999999 || step.sold === -9999999 ? '−∞' : step.sold;
            document.getElementById('val-rest').innerText = step.rest;

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            // Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
