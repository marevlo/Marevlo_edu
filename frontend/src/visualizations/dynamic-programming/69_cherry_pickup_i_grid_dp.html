<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cherry Pickup I - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 320px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        /* GRID */
        .grid-container {
            display: grid;
            gap: 4px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .grid-cell {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--text-main);
            transition: all 0.3s ease;
            border-radius: 6px;
            position: relative;
        }
        .grid-cell.cherry { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .grid-cell.thorn { background: #2a1600; border-color: var(--accent-red); color: var(--accent-red); }
        .grid-cell.robot1 { box-shadow: 0 0 0 4px var(--accent-blue); }
        .grid-cell.robot2 { box-shadow: 0 0 0 4px var(--accent-purple); }
        .grid-cell.current { transform: scale(1.15); }

        /* DP BAR */
        .dp-container { 
            margin-top: 20px;
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
            width: 920px;
            overflow-x: auto;
        }
        .dp-bar {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .dp-cell {
            min-width: 58px;
            height: 58px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); }
        .dp-cell.header { background: var(--bg-surface); color: var(--text-dim); font-size: 11px; height: 24px; }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 110px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">grid =</label>
        <input type="text" id="grid-input" value="[[0,1,-1],[1,0,-1],[1,1,1]]" style="width:320px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([[0,1,-1],[1,0,-1],[1,1,1]])">Ex 1 → 5</button>
        <button onclick="loadExample([[1,1,1],[1,1,1],[1,1,1]])">Ex 2 → 8</button>
        <button onclick="loadExample([[1,1],[1,1]])">Ex 3 → 4</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Grid (green=cherry, red=thorn, blue=robot1, purple=robot2)</div>
        <div id="grid-container" class="grid-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP Table — max cherries for state (r1,c1,r2)</div>
        <div class="dp-container" id="dp-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Robot1 (r1,c1)</span>
            <span class="info-value" id="val-r1" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Robot2 (r2,c2)</span>
            <span class="info-value" id="val-r2" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Cherries this step</span>
            <span class="info-value" id="val-cherries" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Total max</span>
            <span class="info-value" id="val-max" style="color: var(--accent-orange);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Max cherries =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Cherry (1)</div>
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-red)"></span> Thorn (-1)</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentGrid = [[0,1,-1],[1,0,-1],[1,1,1]];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];
        let n = 0;
        let dp = [];
        let maxCherries = 0;

        function init() {
            loadExample([[0,1,-1],[1,0,-1],[1,1,1]]);
        }

        function loadExample(grid) {
            currentGrid = grid;
            document.getElementById('grid-input').value = JSON.stringify(grid);
            generateSteps();
            reset();
        }

        function loadCustom() {
            try {
                const inputStr = document.getElementById('grid-input').value.trim();
                const grid = JSON.parse(inputStr);
                if (!Array.isArray(grid) || grid.length === 0) throw new Error();
                loadExample(grid);
            } catch(e) {
                alert("Invalid grid format. Use e.g. [[0,1,-1],[1,0,-1],[1,1,1]]");
            }
        }

        function generateSteps() {
            steps = [];
            const grid = currentGrid;
            n = grid.length;
            if (n === 0) return;

            // Initialize dp as 3D array dp[r1][c1][r2]
            dp = Array.from({length: n}, () => Array.from({length: n}, () => Array(n).fill(-Infinity)));
            if (grid[0][0] === -1) {
                steps.push({
                    type: 'invalid',
                    panel: `Start cell is thorn`,
                    statusText: `Impossible`,
                    log: `grid[0][0] = -1 → 0`,
                    logColor: 'var(--accent-red)',
                    complete: true,
                    result: 0
                });
                return;
            }
            dp[0][0][0] = grid[0][0];

            steps.push({
                type: 'init',
                r1: 0,
                c1: 0,
                r2: 0,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `Cherry Pickup I — Simultaneous 2-Robots DP<br>grid ${n}×${n}`,
                statusText: `Initialize dp[0][0][0] = ${grid[0][0]}`,
                log: `dp[0][0][0] = ${grid[0][0]}`,
                logColor: 'var(--text-dim)'
            });

            // Fill DP table in order of increasing steps
            for (let stepsTaken = 1; stepsTaken <= 2 * n - 2; stepsTaken++) {
                for (let r1 = 0; r1 < n; r1++) {
                    for (let c1 = 0; c1 < n; c1++) {
                        let r2 = stepsTaken - r1 - c1;
                        if (r2 < 0 || r2 >= n) continue;
                        let c2 = stepsTaken - r2;
                        if (c2 < 0 || c2 >= n) continue;

                        if (grid[r1][c1] === -1 || grid[r2][c2] === -1) continue;

                        let maxPrev = -Infinity;

                        // 4 possible previous moves
                        const dirs = [[0,0], [0,-1], [-1,0], [-1,-1]]; // previous deltas for robot1 and robot2
                        for (let d1 = 0; d1 < 2; d1++) {
                            for (let d2 = 0; d2 < 2; d2++) {
                                let pr1 = r1 - d1;
                                let pc1 = c1 - (1 - d1); // if d1=0 down prev, d1=1 right prev
                                let pr2 = r2 - d2;
                                let pc2 = c2 - (1 - d2);
                                if (pr1 >= 0 && pr1 < n && pc1 >= 0 && pc1 < n && pr2 >= 0 && pr2 < n && pc2 >= 0 && pc2 < n) {
                                    maxPrev = Math.max(maxPrev, dp[pr1][pc1][pr2]);
                                }
                            }
                        }

                        if (maxPrev === -Infinity) continue;

                        let cherries = grid[r1][c1];
                        if (r1 !== r2 || c1 !== c2) cherries += grid[r2][c2];

                        dp[r1][c1][r2] = maxPrev + cherries;

                        steps.push({
                            type: 'update',
                            r1: r1,
                            c1: c1,
                            r2: r2,
                            dpSnapshot: JSON.parse(JSON.stringify(dp)),
                            panel: `State (r1=${r1},c1=${c1},r2=${r2},c2=${c2})<br>prev_max=${maxPrev}, cherries=${cherries}<br>dp[${r1}][${c1}][${r2}]=${dp[r1][c1][r2]}`,
                            statusText: `State (${r1},${c1},${r2})`,
                            log: `dp[${r1}][${c1}][${r2}] = ${maxPrev} + ${cherries} = ${dp[r1][c1][r2]}`,
                            logColor: 'var(--accent-green)'
                        });
                    }
                }
            }

            const result = Math.max(0, dp[n-1][n-1][n-1]);
            steps.push({
                type: 'final',
                r1: n-1,
                c1: n-1,
                r2: n-1,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `All states computed.<br>Max cherries = <span style="color:var(--accent-green)"><b>${result}</b></span>`,
                statusText: `Final answer = ${result}`,
                log: `\nFinal dp[${n-1}][${n-1}][${n-1}] = ${result}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: result
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render grid
            const gridContainer = document.getElementById('grid-container');
            gridContainer.innerHTML = '';
            gridContainer.style.gridTemplateColumns = `repeat(${n}, 48px)`;
            const grid = currentGrid;
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    const cell = document.createElement('div');
                    cell.className = `grid-cell ${grid[i][j] === 1 ? 'cherry' : ''} ${grid[i][j] === -1 ? 'thorn' : ''}`;
                    if (step.r1 === i && step.c1 === j) cell.classList.add('robot1');
                    if (step.r2 === i && step.c2 === j) cell.classList.add('robot2');
                    if (step.r1 === i && step.c1 === j && step.r2 === i && step.c2 === j) cell.classList.add('current');
                    cell.innerText = grid[i][j] === -1 ? '✕' : grid[i][j];
                    gridContainer.appendChild(cell);
                }
            }

            // Render DP table (slice for simplicity, showing dp[r1][c1][r2] for fixed r1 or simplified)
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-bar"></div>`;
            const bar = dpContainer.querySelector('.dp-bar');

            // Simplified DP view: show dp for current step
            const header = document.createElement('div');
            header.style.display = 'flex';
            header.style.gap = '8px';
            for (let j = 0; j < n; j++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.style.height = '24px';
                cell.textContent = j;
                header.appendChild(cell);
            }
            bar.appendChild(header);

            const row = document.createElement('div');
            row.style.display = 'flex';
            row.style.gap = '8px';
            const currentDP = step.dpSnapshot || dp;
            for (let j = 0; j < n; j++) {
                const cell = document.createElement('div');
                cell.className = `dp-cell ${step.r1 === 0 && step.c1 === j ? 'current' : ''}`; // Simplified to show row 0 or something
                cell.innerHTML = `<div>${currentDP[step.r1 || 0][j][step.r2 || 0] || '-'}</div>`;
                row.appendChild(cell);
            }
            bar.appendChild(row);

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-r1').innerText = step.r1 !== null ? `(${step.r1},${step.c1})` : '—';
            document.getElementById('val-r2').innerText = step.r2 !== null ? `(${step.r2},${step.c2 || '?'})` : '—';
            document.getElementById('val-cherries').innerText = step.r1 !== null ? 'see log' : '—';
            document.getElementById('val-max').innerText = step.r1 !== null ? step.dpSnapshot[step.r1][step.c1][step.r2] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
