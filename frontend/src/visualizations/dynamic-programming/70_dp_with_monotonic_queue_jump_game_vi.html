<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP with Monotonic Queue: Jump Game VI - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 320px;
            font-size: 13px;
        }
        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUAL CONTAINER */
        .visual-container { margin-top: 30px; width: 100%; max-width: 920px; display: flex; flex-direction: column; align-items: center; gap: 24px; }

        /* ARRAY TILES */
        .array-wrapper {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 920px;
            position: relative;
        }
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 17px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227,179,65,0.4); }
        .tile.reachable { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); }
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }

        /* MONOTONIC QUEUE */
        .queue-wrapper {
            margin-top: 12px;
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 12px;
            background: var(--bg-surface);
            width: 720px;
        }
        .queue-label { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; font-family: monospace; }
        .queue-container {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .queue-tile {
            min-width: 52px; height: 52px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: monospace;
            border: 2px solid var(--accent-purple);
            background: #21262d;
            color: var(--accent-purple);
        }
        .queue-tile .q-val { font-size: 18px; }
        .queue-tile .q-idx { font-size: 10px; color: var(--text-dim); }

        /* DP VALUES */
        .dp-wrapper {
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 12px;
            background: var(--bg-surface);
            width: 720px;
        }
        .dp-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .dp-tile {
            min-width: 52px; height: 52px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 15px; font-weight: 600; font-family: monospace;
            border: 2px solid var(--accent-blue);
            background: #21262d;
            color: var(--accent-blue);
        }

        /* PANEL, INFO, CONTROLS */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 20px; width: 720px; text-align: center; font-family: monospace; min-height: 92px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 26px; color: var(--accent-green); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; }
        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 620px; }
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 120px; }
        .legend { margin-top: 12px; display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; }
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 100%; height: 140px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="nums-input" value="[1,-1,-2,4,-7,3]" style="width:260px">
        <label class="ui-label">k =</label>
        <input type="number" id="k-input" value="2" style="width:70px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[1,-1,-2,4,-7,3]', 2)">Ex 1 (7)</button>
        <button onclick="loadExample('[10,-5,-2,4,0,3]', 3)">Ex 2 (17)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Array (nums):</div>
        <div class="array-wrapper" id="array-container"></div>

        <div class="ui-label" style="margin-top:24px">Monotonic Queue (decreasing dp values):</div>
        <div class="queue-wrapper">
            <div class="queue-container" id="queue-container"></div>
        </div>

        <div class="ui-label" style="margin-top:24px">DP values:</div>
        <div class="dp-wrapper">
            <div class="dp-row" id="dp-row"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current i</span>
            <span class="info-value" id="val-i" style="color:var(--accent-orange)">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Window max</span>
            <span class="info-value" id="val-max" style="color:var(--accent-purple)">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">dp[i]</span>
            <span class="info-value" id="val-dp" style="color:var(--accent-green)">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Final answer</span>
            <span class="info-value" id="val-final" style="color:var(--accent-green)">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom:6px">Maximum score =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">▶ Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex;align-items:center;gap:6px">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#e3b341"></span>Current i</div>
        <div class="legend-item"><span class="dot" style="background:#3fb950"></span>Valid window</div>
        <div class="legend-item"><span class="dot" style="background:#a371f7"></span>Queue entry</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let nums = [1, -1, -2, 4, -7, 3];
        let k = 2;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 350];

        function generateSteps() {
            steps = [];
            const n = nums.length;
            if (n === 0) return;

            let dp = new Array(n).fill(0);
            let deque = []; // stores indices, maintaining decreasing dp order

            dp[0] = nums[0];
            deque.push(0);

            steps.push({
                type: 'init',
                i: 0,
                dp: [...dp],
                deque: [...deque],
                panel: `dp[0] = nums[0] = ${nums[0]}<br>Queue: [0]`,
                statusText: `Initialization`,
                log: `dp[0]=${nums[0]} | queue=[0]`,
                logColor: 'var(--accent-blue)'
            });

            for (let i = 1; i < n; i++) {
                // Remove outdated indices from front
                while (deque.length > 0 && deque[0] < i - k) {
                    steps.push({
                        type: 'remove-front',
                        i: i,
                        dp: [...dp],
                        deque: [...deque],
                        panel: `Remove outdated front index ${deque[0]} (out of window [${i-k}, ${i-1}])`,
                        statusText: `Clean front`,
                        log: `pop front ${deque[0]}`,
                        logColor: 'var(--accent-red)'
                    });
                    deque.shift();
                }

                // Get max from front
                const maxPrev = dp[deque[0]];

                dp[i] = nums[i] + maxPrev;

                steps.push({
                    type: 'compute',
                    i: i,
                    maxPrev: maxPrev,
                    dp: [...dp],
                    deque: [...deque],
                    panel: `i=${i}<br>Window max = dp[${deque[0]}] = ${maxPrev}<br>dp[${i}] = ${nums[i]} + ${maxPrev} = ${dp[i]}`,
                    statusText: `dp[${i}] ← ${dp[i]}`,
                    log: `i=${i} dp=${dp[i]}`,
                    logColor: 'var(--accent-green)'
                });

                // Remove smaller or equal from back
                while (deque.length > 0 && dp[deque[deque.length - 1]] <= dp[i]) {
                    steps.push({
                        type: 'remove-back',
                        i: i,
                        dp: [...dp],
                        deque: [...deque],
                        panel: `Remove back index ${deque[deque.length - 1]} (smaller or equal to dp[${i}])`,
                        statusText: `Clean back`,
                        log: `pop back ${deque[deque.length - 1]}`,
                        logColor: 'var(--accent-red)'
                    });
                    deque.pop();
                }

                // Add current index
                deque.push(i);

                steps.push({
                    type: 'push',
                    i: i,
                    dp: [...dp],
                    deque: [...deque],
                    panel: `Push index ${i} to queue`,
                    statusText: `queue ← ${i}`,
                    log: `push ${i}`,
                    logColor: 'var(--accent-purple)'
                });
            }

            const result = dp[n - 1];

            steps.push({
                type: 'final',
                complete: true,
                result: result,
                panel: `All positions processed.<br><b>Maximum score = ${result}</b>`,
                statusText: `Done. Max score = ${result}`,
                log: `\nFinal max score: ${result}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderArray(currentStep) {
            const container = document.getElementById('array-container');
            container.innerHTML = '';
            for (let idx = 0; idx < nums.length; idx++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                let cls = 'tile';
                if (currentStep.i === idx) cls += ' candidate';
                else if (currentStep.deque && currentStep.deque.includes(idx)) cls += ' reachable';
                tile.className = cls;
                tile.innerText = nums[idx];
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${idx}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            }
        }

        function renderQueue(currentStep) {
            const container = document.getElementById('queue-container');
            container.innerHTML = '';
            if (!currentStep.deque) return;
            for (let idx of currentStep.deque) {
                const tile = document.createElement('div');
                tile.className = 'queue-tile';
                tile.innerHTML = `<span class="q-val">${dpDisplay[idx]}</span><span class="q-idx">[${idx}]</span>`;
                container.appendChild(tile);
            }
        }

        let dpDisplay = [];

        function renderDPRow(currentStep) {
            const container = document.getElementById('dp-row');
            container.innerHTML = '';
            dpDisplay = currentStep.dp || [];
            for (let idx = 0; idx < nums.length; idx++) {
                const tile = document.createElement('div');
                tile.className = 'dp-tile';
                if (currentStep.i === idx) tile.style.borderColor = 'var(--accent-orange)';
                tile.innerHTML = `<span>${dpDisplay[idx]}</span><span style="font-size:10px;color:var(--text-dim)">[${idx}]</span>`;
                container.appendChild(tile);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            dpDisplay = step.dp || [];
            renderArray(step);
            renderQueue(step);
            renderDPRow(step);

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-i').innerText = step.i !== undefined ? step.i : '—';
            document.getElementById('val-max').innerText = step.maxPrev !== undefined ? step.maxPrev : '—';
            document.getElementById('val-dp').innerText = step.dp && step.i !== undefined ? step.dp[step.i] : '—';
            document.getElementById('val-final').innerText = step.result !== undefined ? step.result : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = '▶ Play';
        }

        function loadCustom() {
            const numsStr = document.getElementById('nums-input').value.trim();
            const kVal = parseInt(document.getElementById('k-input').value);
            try {
                nums = JSON.parse(numsStr);
                k = kVal;
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid input. nums must be array, k must be integer.");
            }
        }

        function loadExample(numsStr, kVal) {
            nums = JSON.parse(numsStr);
            k = kVal;
            document.getElementById('nums-input').value = numsStr;
            document.getElementById('k-input').value = kVal;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
