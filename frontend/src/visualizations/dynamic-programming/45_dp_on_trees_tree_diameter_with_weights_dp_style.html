<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP on Trees: Tree Diameter with Weights (DP style) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 320px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: NODE TILES + TREE EDGES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 17px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* Tree Edges Info */
        .tree-edges {
            margin-top: 10px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 8px 16px; width: 680px; display: flex; gap: 8px; flex-wrap: wrap; font-size: 13px;
        }
        .edge-item {
            background: #21262d; border: 1px solid var(--border-main); border-radius: 4px;
            padding: 4px 10px; font-family: monospace;
        }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="text" id="n-input" placeholder="4" value="4" style="width:80px">
        <label class="ui-label" style="margin-left:12px">edges =</label>
        <input type="text" id="edges-input" placeholder="[[0,1,2],[1,2,3],[1,3,1]]" value="[[0,1,2],[1,2,3],[1,3,1]]" style="width:380px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(4, '[[0,1,2],[1,2,3],[1,3,1]]')">Ex 1</button>
        <button onclick="loadExample(3, '[[0,1,5],[1,2,10]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Nodes (0 to n-1):</div>
        <div class="tiles-wrapper" id="nodes-container"></div>
        
        <div class="ui-label" style="margin-top: 20px;">Tree Edges (weighted):</div>
        <div class="tree-edges" id="edges-list"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current node</span>
            <span class="info-value" id="val-node" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Child depths</span>
            <span class="info-value" id="val-depths" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Top-2 depths</span>
            <span class="info-value" id="val-top2" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Candidate diameter</span>
            <span class="info-value" id="val-candidate" style="color: var(--accent-red);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Global max diameter</span>
            <span class="info-value" id="val-global" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">Tree diameter (longest weighted path) =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:2px solid var(--accent-orange)"></span> Current DFS node</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:2px solid var(--accent-green)"></span> Diameter update</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple); border:2px solid var(--accent-purple)"></span> Top-2 depths</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let n = 4;
        let edges = [[0,1,2],[1,2,3],[1,3,1]];
        let adj = [];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 400];
        let globalDiameter = 0;

        function buildAdj() {
            adj = Array.from({length: n}, () => []);
            for (let [u, v, w] of edges) {
                adj[u].push([v, w]);
                adj[v].push([u, w]);
            }
        }

        function generateSteps() {
            steps = [];
            globalDiameter = 0;
            buildAdj();

            steps.push({
                type: 'init',
                node: -1,
                panel: `Tree built with n=${n} nodes.<br>Adjacency list ready for DFS.<br>Global diameter = 0`,
                statusText: `Initialization complete`,
                log: `adj = ${JSON.stringify(adj)}`,
                logColor: 'var(--text-dim)'
            });

            // The DP DFS will be simulated recursively but recorded as steps
            let memo = {}; // not used for depths, but for simulation
            function dfs(node, parent, stepCollector) {
                let maxDepth = 0;
                let topTwo = [0, 0];
                let childDepths = [];

                steps.push({
                    type: 'enter',
                    node: node,
                    parent: parent,
                    panel: `DFS enter node <b>${node}</b> (parent ${parent})`,
                    statusText: `Entering node ${node}`,
                    log: `DFS(${node}, ${parent})`,
                    logColor: 'var(--accent-orange)'
                });

                for (let [child, weight] of adj[node]) {
                    if (child === parent) continue;
                    const childDepth = dfs(child, node, stepCollector) + weight;
                    childDepths.push(childDepth);
                    maxDepth = Math.max(maxDepth, childDepth);
                    if (childDepth > topTwo[0]) {
                        topTwo[1] = topTwo[0];
                        topTwo[0] = childDepth;
                    } else if (childDepth > topTwo[1]) {
                        topTwo[1] = childDepth;
                    }
                }

                const candidate = topTwo[0] + topTwo[1];
                globalDiameter = Math.max(globalDiameter, candidate);

                steps.push({
                    type: 'compute',
                    node: node,
                    childDepths: [...childDepths],
                    topTwo: [...topTwo],
                    candidate: candidate,
                    panel: `At node <b>${node}</b><br>Child depths: ${childDepths.join(', ')}<br>Top-2: ${topTwo[0]}, ${topTwo[1]}<br>Candidate diameter = <b>${candidate}</b>`,
                    statusText: `Node ${node} → candidate ${candidate}`,
                    log: `node ${node} → candidate ${candidate} (global=${globalDiameter})`,
                    logColor: 'var(--accent-green)'
                });

                steps.push({
                    type: 'return',
                    node: node,
                    maxDepth: maxDepth,
                    panel: `Return maxDepth = <b>${maxDepth}</b> to parent`,
                    statusText: `Return ${maxDepth}`,
                    log: `← return ${maxDepth}`,
                    logColor: 'var(--accent-blue)'
                });

                return maxDepth;
            }

            dfs(0, -1, steps);

            steps.push({
                type: 'final',
                node: -1,
                complete: true,
                result: globalDiameter,
                panel: `DFS complete.<br><b>Tree diameter = ${globalDiameter}</b>`,
                statusText: `Done. Diameter = ${globalDiameter}`,
                log: `\nFinal diameter: ${globalDiameter}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Nodes tiles
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            for (let k = 0; k < n; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.node === k ? 'candidate' : 'done'}`;
                tile.innerText = k;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${k}]`;
                wrapper.append(tile, idxLabel);
                container.appendChild(wrapper);
            }

            // Edges list
            const edgesList = document.getElementById('edges-list');
            edgesList.innerHTML = '';
            for (let e of edges) {
                const item = document.createElement('div');
                item.className = 'edge-item';
                item.innerText = `${e[0]}—${e[1]}(${e[2]})`;
                edgesList.appendChild(item);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-node').innerText = step.node !== undefined ? step.node : '—';
            document.getElementById('val-depths').innerText = step.childDepths ? step.childDepths.join(', ') : '—';
            document.getElementById('val-top2').innerText = step.topTwo ? `${step.topTwo[0]}, ${step.topTwo[1]}` : '—';
            document.getElementById('val-candidate').innerText = step.candidate !== undefined ? step.candidate : '—';
            document.getElementById('val-global').innerText = globalDiameter || '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        function loadCustom() {
            const nVal = parseInt(document.getElementById('n-input').value);
            const edgesStr = document.getElementById('edges-input').value.trim();
            if (!isNaN(nVal) && nVal > 0) {
                try {
                    const parsedEdges = JSON.parse(edgesStr);
                    if (Array.isArray(parsedEdges)) {
                        n = nVal;
                        edges = parsedEdges;
                        generateSteps();
                        reset();
                    }
                } catch(e) {
                    alert("Invalid edges JSON format. Example: [[0,1,2],[1,2,3]]");
                }
            }
        }

        function loadExample(nVal, edgesStr) {
            n = nVal;
            edges = JSON.parse(edgesStr);
            document.getElementById('n-input').value = nVal;
            document.getElementById('edges-input').value = edgesStr;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
