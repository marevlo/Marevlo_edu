<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree Diameter (Weighted) &middot; DP on Trees</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f43f5e;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:300px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:330px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.tree-wrap{flex:0 0 auto; position:relative;}
svg.tree{display:block; width:400px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2.5; transition:stroke .35s, stroke-width .35s, opacity .35s; stroke-linecap:round;}
.edge.checking{stroke:var(--accent-purple); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.edge.diameter{stroke:var(--accent-green); stroke-width:4.5; filter:drop-shadow(0 0 7px rgba(34,197,94,.6));}
.ew{font-family:var(--mono); font-weight:700; font-size:12px; fill:var(--text-dim); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.ew.diameter{fill:#bbf7d0;}
.tnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2; transition:fill .35s, stroke .35s, filter .35s, stroke-width .35s;}
.tnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.tnode .nbd{font-family:var(--mono); font-weight:700; font-size:11px; fill:var(--accent-blue); text-anchor:middle; dominant-baseline:central; opacity:0; transition:opacity .35s, fill .35s;}
.tnode.hasbd .nbd{opacity:1;}
.tnode.done .nc{stroke:rgba(34,197,94,.45); fill:rgba(34,197,94,.06);}
.tnode.current .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3;}
.tnode.current .nl{fill:#ffd591;}
.tnode.onpath .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.14); filter:drop-shadow(0 0 10px rgba(34,197,94,.5)); stroke-width:3;}
.tnode.onpath .nl{fill:#bbf7d0;}

.side{display:flex; flex-direction:column; gap:12px; min-width:230px; flex:1 1 230px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel.c .cap{color:var(--accent-orange);} .panel.d .cap{color:var(--accent-blue);} .panel.g .cap{color:var(--accent-green);}
.tiles{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start;}
.tile{min-width:34px; height:34px; padding:0 8px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.tile.c{border-color:rgba(245,165,36,.45); background:rgba(245,165,36,.12); color:#ffd591;}
.tile.d{border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.12); color:#a5f3fc;}
.tile.t2{border-color:rgba(168,85,247,.45); background:rgba(168,85,247,.14); color:#e9d5ff;}
.tiles .empty{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
.bignum{font-family:var(--mono); font-weight:800; font-size:30px; color:var(--accent-green); text-align:center; padding:4px 0;}
.bignum.idle{color:var(--text-dim); font-size:22px;}
#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-orange);} .pill.n b{color:var(--accent-purple);} .pill.r b{color:var(--accent-red);} .pill.s b{color:var(--accent-green);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>n =</label>
  <input type="text" id="n-input" class="small-input" value="4">
  <label>edges =</label>
  <input type="text" id="edges-input" class="large-input" value="[[0,1,2],[1,2,3],[1,3,1]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick="loadExample(4,'[[0,1,2],[1,2,3],[1,3,1]]')">Ex 1 &middot; 5</button>
  <button onclick="loadExample(3,'[[0,1,5],[1,2,10]]')">Ex 2 &middot; 15</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Tree Diameter <span class="sub">&middot; weighted DP on trees (DFS)</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="tree-wrap"><svg class="tree" id="tree" viewBox="0 0 400 360"></svg></div>
      <div class="side">
        <div class="panel c"><div class="cap">CHILD DOWN-PATHS (childBest + w)</div><div class="tiles" id="d-tiles"></div></div>
        <div class="panel d"><div class="cap">TOP-2 AT NODE (best two)</div><div class="tiles" id="t-tiles"></div></div>
        <div class="panel g"><div class="cap">BEST DIAMETER SO FAR</div><div class="bignum idle" id="g-num">0</div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&#8592; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &#8594;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&#8592; &#8594;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">node u = <b id="pill-u">&mdash;</b></span>
        <span class="pill n">best down = <b id="pill-bd">&mdash;</b></span>
        <span class="pill r">candidate = <b id="pill-cand">&mdash;</b></span>
        <span class="pill s">diameter <b id="pill-g">0</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>current node</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>top-2 child</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>diameter path</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

const CODE=[
  [['fn','dfs'],['src','(u, parent):']],
  [['src','  best1 = best2 = 0      # top two child down-paths']],
  [['kw','  for'],['src',' (v, w) '],['kw','in'],['src',' adj[u]:']],
  [['kw','    if'],['src',' v == parent: '],['kw','continue']],
  [['src','    down = dfs(v, u) + w  # child best-down + edge w']],
  [['kw','    if'],['src',' down > best1: best2, best1 = best1, down']],
  [['kw','    elif'],['src',' down > best2: best2 = down']],
  [['src','  diameter = max(diameter, best1 + best2)']],
  [['kw','  return'],['src',' best1            # longest path going down']],
];

let n=4, edges=[[0,1,2],[1,2,3],[1,3,1]], adj=[];
let coord={}, parentOf={}, edgeKeyOf={};
let steps=[], stepIndex=0, timer=null;
const delays=[1600,820,400];
const tnodes={}, edgeEls={}, ewEls={};
let confettiArmed=true;

function init(){ buildCode(); loadExample(4,'[[0,1,2],[1,2,3],[1,3,1]]'); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}

function loadExample(nv,es){ document.getElementById('n-input').value=nv; document.getElementById('edges-input').value=es; parseAndGen(); }
function loadCustom(){ parseAndGen(); }
function parseAndGen(){
  try{
    const nv=parseInt(document.getElementById('n-input').value,10);
    const es=JSON.parse(document.getElementById('edges-input').value);
    if(!(nv>0)||!Array.isArray(es)) throw 0;
    n=nv; edges=es;
    buildAdj(); layoutTree(); setupTree(); generateSteps(); reset();
  }catch(e){ alert('Invalid input. n must be > 0 and edges like [[0,1,2],[1,2,3]].'); }
}
function buildAdj(){ adj=Array.from({length:n},()=>[]); for(const [u,v,w] of edges){ adj[u].push([v,w]); adj[v].push([u,w]); } }

// Layout the tree rooted at 0 with a simple level/subtree-width placement.
function layoutTree(){
  coord={}; parentOf={};
  const W=400, topY=46, levelGap=84;
  const order=[]; const seen=new Array(n).fill(false);
  let nextLeaf=0;
  const xpos=new Array(n).fill(0), ypos=new Array(n).fill(0);
  function place(u,p,depth){
    seen[u]=true; parentOf[u]=p; ypos[u]=topY+depth*levelGap;
    const kids=adj[u].map(([v])=>v).filter(v=>v!==p&&!seen[v]);
    if(kids.length===0){ xpos[u]=nextLeaf++; }
    else{ let sum=0; for(const v of kids){ place(v,u,depth+1); sum+=xpos[v]; } xpos[u]=sum/kids.length; }
    order.push(u);
  }
  if(n>0) place(0,-1,0);
  // handle any disconnected nodes (defensive)
  for(let u=0;u<n;u++){ if(!seen[u]){ place(u,-1,0); } }
  const maxLeaf=Math.max(1,nextLeaf-1);
  for(let u=0;u<n;u++){
    const x = maxLeaf>0 ? 40+(xpos[u]/maxLeaf)*(W-80) : W/2;
    coord[u]={x:nextLeaf<=1?W/2:x, y:ypos[u]};
  }
}

function setupTree(){
  const svg=document.getElementById('tree'); svg.innerHTML='';
  for(const k in tnodes) delete tnodes[k]; for(const k in edgeEls) delete edgeEls[k]; for(const k in ewEls) delete ewEls[k]; edgeKeyOf={};
  // edges first
  edges.forEach((e,i)=>{ const [u,v,w]=e; const p1=coord[u], p2=coord[v]; if(!p1||!p2) return;
    const key=[u,v].sort((a,b)=>a-b).join('~'); edgeKeyOf[i]=key;
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line'); ln.setAttribute('class','edge'); ln.id='te'+i;
    ln.setAttribute('x1',p1.x); ln.setAttribute('y1',p1.y); ln.setAttribute('x2',p2.x); ln.setAttribute('y2',p2.y);
    svg.appendChild(ln); edgeEls[key]=ln;
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
    const tw=document.createElementNS('http://www.w3.org/2000/svg','text'); tw.setAttribute('class','ew');
    tw.setAttribute('x',mx+9); tw.setAttribute('y',my); tw.textContent=w; svg.appendChild(tw); ewEls[key]=tw;
  });
  // nodes on top
  for(let u=0;u<n;u++){ const p=coord[u]; if(!p) continue;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','tnode'); g.id='tn'+u;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('class','nc'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',19);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','nl'); t.setAttribute('x',p.x); t.setAttribute('y',p.y-2); t.textContent=u;
    const bd=document.createElementNS('http://www.w3.org/2000/svg','text'); bd.setAttribute('class','nbd'); bd.setAttribute('x',p.x); bd.setAttribute('y',p.y+10); bd.textContent='';
    g.appendChild(c); g.appendChild(t); g.appendChild(bd); svg.appendChild(g); tnodes[u]=g;
  }
}

function generateSteps(){
  steps=[];
  let diameter=0;
  const bestDown=new Array(n).fill(null);   // best-down per node, fills as DFS returns
  let diamA=-1, diamB=-1;                    // endpoints (top-2 children) of the node that owns current best diameter
  let diamOwner=-1;
  const snap=o=>steps.push({
    bestDown:[...bestDown], diameter, u:o.u??null, code:o.code,
    childList:o.childList?[...o.childList]:null, top2:o.top2?[...o.top2]:null,
    candidate:o.candidate??null, bestDownVal:o.bestDownVal??null, parent:o.parent??null,
    pathNodes:o.pathNodes?[...o.pathNodes]:null, pathEdges:o.pathEdges?[...o.pathEdges]:null,
    pop:o.pop??null, narr:o.narr, log:o.log, logColor:o.logColor, complete:o.complete
  });

  snap({code:[0], narr:`Root the tree at <code>0</code> and run a post-order <b>DFS</b>. Each node returns its longest weighted path going <b>downward</b>; the diameter through a node is its <b>top-two</b> child down-paths combined.`, log:`build adj, diameter = 0`, logColor:'var(--text-dim)'});

  function dfs(u,parent){
    let best1=0,best2=0, b1child=-1,b2child=-1;
    const childList=[];
    for(const [v,w] of adj[u]){
      if(v===parent) continue;
      const cd=dfs(v,parent===undefined?-1:u)+w; // childBest + edge weight
      childList.push({v,w,down:cd});
      if(cd>best1){ best2=best1; b2child=b1child; best1=cd; b1child=v; }
      else if(cd>best2){ best2=cd; b2child=v; }
    }
    const candidate=best1+best2;
    bestDown[u]=best1;

    // build path nodes/edges for this node's candidate (for hero highlight)
    const pn=[u], pe=[];
    if(b1child!==-1){ pn.unshift(b1child); pe.push([u,b1child].sort((a,b)=>a-b).join('~')); }
    if(b2child!==-1){ pn.push(b2child); pe.push([u,b2child].sort((a,b)=>a-b).join('~')); }

    const childStr = childList.length? childList.map(c=>`${c.v}:${c.down}`).join('  ') : '(leaf)';
    snap({
      code: childList.length? [1,2,4,5,7,8] : [1,7,8],
      u, parent: parent===undefined?-1:parent,
      childList: childList.map(c=>c.down), top2:[best1,best2], candidate, bestDownVal:best1,
      narr: childList.length
        ? `Node <code>${u}</code>: child down-paths are <b>[${childList.map(c=>c.down).join(', ')}]</b>. Top-two are <b>${best1}</b> &amp; <b>${best2}</b>, so the path bending at <code>${u}</code> has length <b>${candidate}</b>.`
        : `Leaf <code>${u}</code>: no children, so best-down = <b>0</b> and its candidate diameter = <b>0</b>.`,
      pathNodes: candidate>0? pn : [u], pathEdges: candidate>0? pe : [],
      log:`node ${u}: top2=[${best1},${best2}]  candidate=${candidate}`, logColor:'var(--accent-orange)'
    });

    if(candidate>diameter){
      diameter=candidate; diamOwner=u; diamA=b1child; diamB=b2child;
      snap({
        code:[7], u, candidate, top2:[best1,best2], diameter,
        pathNodes: pn, pathEdges: pe,
        narr:`<b>${candidate}</b> beats the old best &rarr; update <b>diameter = ${candidate}</b> (path bends at node <code>${u}</code>).`,
        log:`  diameter <- ${candidate}  (owner ${u})`, logColor:'var(--accent-green)', pop:true
      });
    }

    snap({
      code:[8], u, bestDownVal:best1,
      narr:`Return best-down = <b>${best1}</b> from node <code>${u}</code> up to its parent ${parent===undefined||parent===-1?'(root)':`<code>${parent}</code>`}.`,
      log:`  return best-down ${best1} from ${u}`, logColor:'var(--accent-blue)'
    });
    return best1;
  }
  dfs(0,undefined);

  // recompute final diameter path for the winning owner
  let finalPN=[], finalPE=[];
  if(diamOwner!==-1){
    finalPN=[diamOwner];
    if(diamA!==-1){ finalPN.unshift(diamA); finalPE.push([diamOwner,diamA].sort((a,b)=>a-b).join('~')); }
    if(diamB!==-1){ finalPN.push(diamB); finalPE.push([diamOwner,diamB].sort((a,b)=>a-b).join('~')); }
  }
  // Extend endpoints down the longest chains so the full diameter path is shown.
  function extendDown(from,via,collectNodes,collectEdges){
    // walk greedily picking the child with max (down) along bestDown reconstruction
    let cur=via, par=from;
    while(true){
      let pick=-1,pw=0,pbest=-1;
      for(const [v,w] of adj[cur]){ if(v===par) continue;
        if(bestDown[v]+w>pbest){ pbest=bestDown[v]+w; pick=v; pw=w; } }
      if(pick===-1||pbest<=0) break;
      if(bestDown[cur]!==pbest) { /* keep consistent with chosen best-down */ }
      collectNodes.push(pick); collectEdges.push([cur,pick].sort((a,b)=>a-b).join('~'));
      par=cur; cur=pick;
      if(bestDown[par]===0) break;
    }
  }
  // Rebuild a clean full path: from diamA-side leaf, through owner, to diamB-side leaf
  if(diamOwner!==-1){
    const leftNodes=[], leftEdges=[];
    if(diamA!==-1){ leftNodes.push(diamA); leftEdges.push([diamOwner,diamA].sort((a,b)=>a-b).join('~')); extendDown(diamOwner,diamA,leftNodes,leftEdges); }
    const rightNodes=[], rightEdges=[];
    if(diamB!==-1){ rightNodes.push(diamB); rightEdges.push([diamOwner,diamB].sort((a,b)=>a-b).join('~')); extendDown(diamOwner,diamB,rightNodes,rightEdges); }
    finalPN=[...leftNodes.reverse(), diamOwner, ...rightNodes];
    finalPE=[...leftEdges, ...rightEdges];
  }

  snap({
    code:[8], complete:true, diameter,
    pathNodes: finalPN, pathEdges: finalPE,
    narr:`DFS complete. The weighted tree diameter is <b>${diameter}</b> &mdash; the longest path is highlighted.`,
    log:`\nFinal weighted diameter = ${diameter}`, logColor:'var(--accent-green)'
  });
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  const pathNodeSet=new Set(step.pathNodes||[]);
  const pathEdgeSet=new Set(step.pathEdges||[]);

  // nodes
  for(let u=0;u<n;u++){ const g=tnodes[u]; if(!g) continue;
    g.classList.remove('current','onpath','done','hasbd');
    if(step.bestDown[u]!=null){ g.classList.add('done','hasbd'); g.querySelector('.nbd').textContent='b='+step.bestDown[u]; }
    else { g.querySelector('.nbd').textContent=''; }
    if(pathNodeSet.has(u)) g.classList.add('onpath');
    if(step.u===u){ g.classList.add('current'); const c=g.querySelector('.nc'); if(step.pop) Motion.pop(c); }
  }
  // edges
  edges.forEach((e,i)=>{ const key=edgeKeyOf[i]; const ln=edgeEls[key]; const tw=ewEls[key]; if(!ln) return;
    ln.classList.remove('checking','diameter'); if(tw) tw.classList.remove('diameter');
    if(pathEdgeSet.has(key)){ ln.classList.add('diameter'); if(tw) tw.classList.add('diameter'); }
  });

  // side panels
  fillTiles('d-tiles', step.childList, 'd', '{ leaf / none }');
  fillTiles('t-tiles', step.top2, 't2', '{ none }');
  const gn=document.getElementById('g-num'); gn.textContent=step.diameter; gn.classList.toggle('idle', step.diameter===0 && !step.complete);

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr; narr.classList.toggle('done',!!step.complete);
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });

  document.getElementById('pill-u').textContent=step.u!=null?step.u:'—';
  document.getElementById('pill-bd').textContent=step.bestDownVal!=null?step.bestDownVal:'—';
  document.getElementById('pill-cand').textContent=step.candidate!=null?step.candidate:'—';
  document.getElementById('pill-g').textContent=step.diameter;

  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].logColor) d.style.color=steps[k].logColor; if(steps[k].complete) d.style.fontWeight='bold'; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fillTiles(id, arr, cls, emptyText){
  const c=document.getElementById(id); c.innerHTML='';
  if(!arr || !arr.length){ const e=document.createElement('span'); e.className='empty'; e.textContent=emptyText; c.appendChild(e); return; }
  arr.forEach(v=>{ const t=document.createElement('div'); t.className='tile '+cls; t.textContent=v; c.appendChild(t); });
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
