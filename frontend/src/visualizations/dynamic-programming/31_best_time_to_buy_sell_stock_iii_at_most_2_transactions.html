<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Time to Buy &amp; Sell Stock III (at most 2 transactions) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 240px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .prices-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 110px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        /* DP STATES */
        .dp-container { 
            margin-top: 20px;
            overflow-x: auto;
            max-width: 920px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .dp-states {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .state-tile {
            min-width: 110px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            border-radius: 8px;
            text-align: center;
        }
        .state-tile.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.08); box-shadow: 0 0 12px var(--accent-green); }
        .state-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">prices =</label>
        <input type="text" id="prices-input" value="[3,3,5,0,0,3,1,4]" style="width:240px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([3,3,5,0,0,3,1,4])">Ex 1 (6)</button>
        <button onclick="loadExample([1,2,3,4,5])">Ex 2 (4)</button>
        <button onclick="loadExample([7,6,4,3,1])">Ex 3 (0)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Prices over days</div>
        <div class="prices-wrapper" id="prices-container"></div>

        <div class="ui-label" style="margin-top:25px;">State machine DP (buy1/sell1/buy2/sell2)</div>
        <div id="dp-container" style="overflow-x:auto; max-width:920px;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Day / Price</span>
            <span class="info-value" id="val-day" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">buy1</span>
            <span class="info-value" id="val-buy1" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">sell1</span>
            <span class="info-value" id="val-sell1" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">buy2</span>
            <span class="info-value" id="val-buy2" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">sell2</span>
            <span class="info-value" id="val-sell2" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Maximum profit =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Updated state</div>
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current price</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Previous</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputPrices = [3,3,5,0,0,3,1,4];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 400];
        const INF = 99999999;

        function init() { loadExample([3,3,5,0,0,3,1,4]); }

        function loadExample(newPrices) {
            inputPrices = newPrices;
            document.getElementById('prices-input').value = JSON.stringify(newPrices);
            generateSteps();
            reset();
        }

        function loadCustom() {
            let prices;
            try {
                prices = JSON.parse(document.getElementById('prices-input').value);
            } catch(e) {
                alert("Please enter a valid array for prices, e.g. [3,3,5,0,0,3,1,4]");
                return;
            }
            if (Array.isArray(prices)) {
                loadExample(prices);
            } else {
                alert("Invalid input.");
            }
        }

        function generateSteps() {
            steps = [];
            const n = inputPrices.length;

            // States for visualization: buy1, sell1, buy2, sell2
            let buy1 = -INF;
            let sell1 = 0;
            let buy2 = -INF;
            let sell2 = 0;

            // STEP 0: INIT
            steps.push({
                type: 'init',
                day: null,
                buy1: buy1,
                sell1: sell1,
                buy2: buy2,
                sell2: sell2,
                panel: `Best Time to Buy &amp; Sell Stock III (at most 2 transactions)<br>prices = [${inputPrices}]`,
                statusText: `Initialize state machine`,
                log: `buy1 = -∞, sell1 = 0, buy2 = -∞, sell2 = 0`,
                logColor: 'var(--text-dim)'
            });

            for (let day = 0; day < n; day++) {
                const price = inputPrices[day];

                const prev_buy1 = buy1;
                const prev_sell1 = sell1;
                const prev_buy2 = buy2;
                const prev_sell2 = sell2;

                // Update states
                buy1 = Math.max(buy1, -price);
                sell1 = Math.max(sell1, buy1 + price);
                buy2 = Math.max(buy2, sell1 - price);
                sell2 = Math.max(sell2, buy2 + price);

                steps.push({
                    type: 'update',
                    day: day,
                    buy1: buy1,
                    sell1: sell1,
                    buy2: buy2,
                    sell2: sell2,
                    prev_buy1: prev_buy1,
                    prev_sell1: prev_sell1,
                    prev_buy2: prev_buy2,
                    prev_sell2: prev_sell2,
                    panel: `Day ${day} (price = ${price})<br>buy1 = max(${prev_buy1}, -${price}) = <span style="color:var(--accent-purple)">${buy1}</span><br>sell1 = max(${prev_sell1}, buy1 + ${price}) = <span style="color:var(--accent-green)">${sell1}</span><br>buy2 = max(${prev_buy2}, sell1 - ${price}) = <span style="color:var(--accent-purple)">${buy2}</span><br>sell2 = max(${prev_sell2}, buy2 + ${price}) = <span style="color:var(--accent-green)">${sell2}</span>`,
                    statusText: `price = ${price}`,
                    log: `price=${price} → buy1=${buy1} sell1=${sell1} buy2=${buy2} sell2=${sell2}`,
                    logColor: 'var(--accent-orange)'
                });
            }

            // FINAL
            const maxProfit = Math.max(0, sell1, sell2);
            steps.push({
                type: 'final',
                day: null,
                buy1: buy1,
                sell1: sell1,
                buy2: buy2,
                sell2: sell2,
                panel: `All days processed.<br>Maximum profit = <span style="color:var(--accent-green)"><b>${maxProfit}</b></span>`,
                statusText: `Final max profit = ${maxProfit}`,
                log: `\nFinal sell2 = ${sell2}, sell1 = ${sell1} → max profit = ${maxProfit}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: maxProfit
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render prices tiles
            const pricesContainer = document.getElementById('prices-container');
            pricesContainer.innerHTML = '';
            inputPrices.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                let cls = 'tile';
                if (step.day !== null && i === step.day) cls += ' candidate';
                else if (step.day !== null && i < step.day) cls += ' skip';
                tile.className = cls;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = i;
                wrapper.append(tile, idxLabel);
                pricesContainer.appendChild(wrapper);
            });

            // Render DP states
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-states"></div>`;
            const statesDiv = dpContainer.querySelector('.dp-states');

            const states = [
                { label: 'buy1', value: step.buy1 === -INF ? '-∞' : step.buy1, color: 'var(--accent-purple)' },
                { label: 'sell1', value: step.sell1, color: 'var(--accent-green)' },
                { label: 'buy2', value: step.buy2 === -INF ? '-∞' : step.buy2, color: 'var(--accent-purple)' },
                { label: 'sell2', value: step.sell2, color: 'var(--accent-green)' }
            ];

            states.forEach((s, idx) => {
                const tile = document.createElement('div');
                tile.className = `state-tile ${step.day !== null && idx % 2 === 0 ? 'current' : ''}`;
                tile.innerHTML = `<span class="state-label">${s.label}</span><span style="color:${s.color}">${s.value}</span>`;
                statesDiv.appendChild(tile);
            });

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-day').innerText = step.day !== null ? step.day : '—';
            document.getElementById('val-buy1').innerText = step.buy1 === -INF ? '-∞' : step.buy1;
            document.getElementById('val-sell1').innerText = step.sell1;
            document.getElementById('val-buy2').innerText = step.buy2 === -INF ? '-∞' : step.buy2;
            document.getElementById('val-sell2').innerText = step.sell2;

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
