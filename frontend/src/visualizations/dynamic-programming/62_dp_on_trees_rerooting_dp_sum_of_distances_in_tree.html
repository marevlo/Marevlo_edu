<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP on Trees: Rerooting DP (Sum of Distances in Tree) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 380px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* TREE VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tree-container {
            position: relative;
            width: 680px;
            height: 420px;
            background: #161b22;
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 20px;
        }
        .node {
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
            font-family: monospace;
            background: #21262d;
            border: 3px solid var(--border-main);
            color: var(--text-main);
            transition: all 0.3s ease;
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }
        .node.candidate { 
            background: #2a1600; 
            border-color: var(--accent-orange); 
            color: var(--accent-orange); 
            transform: scale(1.2); 
            box-shadow: 0 0 15px rgba(227,179,65,0.6); 
        }
        .node.path { 
            background: #0f2a1a; 
            border-color: var(--accent-green); 
            color: var(--accent-green); 
            box-shadow: 0 0 15px var(--accent-green); 
        }
        .node-label { 
            position: absolute; 
            font-size: 10px; 
            color: var(--text-dim); 
            top: -18px; 
            left: 50%; 
            transform: translateX(-50%); 
            white-space: nowrap; 
        }
        .edge {
            position: absolute;
            height: 3px;
            background: var(--border-main);
            transform-origin: left center;
        }

        /* ANS ARRAY */
        .ans-wrapper { margin-top: 20px; border: 2px solid var(--border-main); border-radius: 8px; padding: 12px; background: var(--bg-surface); width: 680px; }
        .ans-tiles { display: flex; gap: 8px; justify-content: center; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="number" id="n-input" placeholder="4" value="4" style="width:80px">
        <label class="ui-label">edges =</label>
        <input type="text" id="edges-input" placeholder="[[0,1],[1,2],[1,3]]" value="[[0,1],[1,2],[1,3]]" style="width:320px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(3, '[[0,1],[1,2]]')">Ex 1</button>
        <button onclick="loadExample(4, '[[0,1],[1,2],[1,3]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Tree:</div>
        <div class="tree-container" id="tree-container"></div>
        
        <div class="ui-label" style="margin-top: 30px;">Answer array (sum of distances for each node):</div>
        <div class="ans-wrapper">
            <div class="ans-tiles" id="ans-tiles"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current node (root)</span>
            <span class="info-value" id="val-root" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Subtree size</span>
            <span class="info-value" id="val-size" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Subtree sum dist</span>
            <span class="info-value" id="val-subsum" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current ans[node]</span>
            <span class="info-value" id="val-ans" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">Final answer array:</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange);"></span> Current root / node</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green);"></span> Updated ans value</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let n = 4;
        let edges = [[0,1],[1,2],[1,3]];
        let adj = [];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 350];

        // Build adjacency list
        function buildAdj() {
            adj = Array.from({ length: n }, () => []);
            for (let [u, v] of edges) {
                adj[u].push(v);
                adj[v].push(u);
            }
        }

        function generateSteps() {
            steps = [];
            buildAdj();
            if (n === 0) return;

            let ans = new Array(n).fill(0);
            let subtreeSize = new Array(n).fill(0);
            let subtreeSum = new Array(n).fill(0);

            // First DFS: compute subtreeSize and subtreeSum from root 0
            function dfs1(node, parent) {
                subtreeSize[node] = 1;
                subtreeSum[node] = 0;
                steps.push({
                    type: 'dfs1-enter',
                    node: node,
                    parent: parent,
                    panel: `DFS1 enter node ${node} (parent ${parent})`,
                    statusText: `DFS1: node ${node}`,
                    log: `DFS1 enter ${node}`,
                    logColor: 'var(--accent-orange)'
                });

                for (let child of adj[node]) {
                    if (child !== parent) {
                        dfs1(child, node);
                        subtreeSize[node] += subtreeSize[child];
                        subtreeSum[node] += subtreeSum[child] + subtreeSize[child]; // distance to child subtree increases by subtreeSize[child]
                    }
                }

                steps.push({
                    type: 'dfs1-update',
                    node: node,
                    size: subtreeSize[node],
                    sum: subtreeSum[node],
                    panel: `DFS1 update node ${node}: size=${subtreeSize[node]}, subtreeSum=${subtreeSum[node]}`,
                    statusText: `size=${subtreeSize[node]}, sum=${subtreeSum[node]}`,
                    log: `node ${node} size=${subtreeSize[node]} sum=${subtreeSum[node]}`,
                    logColor: 'var(--accent-green)'
                });
            }

            dfs1(0, -1);

            // Set ans[0] = subtreeSum[0]
            ans[0] = subtreeSum[0];

            steps.push({
                type: 'root-ans',
                node: 0,
                ans0: ans[0],
                panel: `Root (0) ans[0] = subtreeSum[0] = ${ans[0]}`,
                statusText: `ans[0] = ${ans[0]}`,
                log: `ans[0] = ${ans[0]}`,
                logColor: 'var(--accent-purple)'
            });

            // Second DFS: rerooting
            function dfs2(node, parent) {
                steps.push({
                    type: 'dfs2-enter',
                    node: node,
                    parent: parent,
                    panel: `DFS2 reroot at node ${node} (parent ${parent})`,
                    statusText: `DFS2: node ${node}`,
                    log: `DFS2 enter ${node}`,
                    logColor: 'var(--accent-orange)'
                });

                for (let child of adj[node]) {
                    if (child !== parent) {
                        // Reroot formula: ans[child] = ans[node] - subtreeSize[child] + (n - subtreeSize[child])
                        ans[child] = ans[node] - subtreeSize[child] + (n - subtreeSize[child]);

                        steps.push({
                            type: 'reroot',
                            node: child,
                            parent: node,
                            ansChild: ans[child],
                            panel: `Reroot from ${node} to ${child}<br>ans[${child}] = ${ans[child]}`,
                            statusText: `reroot ${child} = ${ans[child]}`,
                            log: `ans[${child}] = ${ans[child]}`,
                            logColor: 'var(--accent-green)'
                        });

                        dfs2(child, node);
                    }
                }
            }

            dfs2(0, -1);

            steps.push({
                type: 'final',
                complete: true,
                ans: [...ans],
                panel: `Rerooting complete.<br><b>Final answer array = [${ans.join(', ')}]</b>`,
                statusText: `Done. Answer = [${ans.join(', ')}]`,
                log: `\nFinal ans: [${ans.join(', ')}]`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderTree() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("width", "680");
            svg.setAttribute("height", "420");
            container.appendChild(svg);

            const positions = {};
            // Simple tree layout for small n (assume small trees for viz)
            const rootX = 340;
            const rootY = 60;
            // For simplicity, use fixed positions for common examples or basic tree
            // To make general, we would need a tree layout algorithm, but for viz we'll use a simple recursive layout
            function placeNode(node, x, y, parentX = null, parentY = null, level = 0) {
                positions[node] = {x, y};
                // Draw edge
                if (parentX !== null) {
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", parentX);
                    line.setAttribute("y1", parentY);
                    line.setAttribute("x2", x);
                    line.setAttribute("y2", y);
                    line.setAttribute("stroke", "#30363d");
                    line.setAttribute("stroke-width", "3");
                    svg.appendChild(line);
                }
                // Draw node
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", x);
                circle.setAttribute("cy", y);
                circle.setAttribute("r", "24");
                circle.setAttribute("fill", "#21262d");
                circle.setAttribute("stroke", "#30363d");
                circle.setAttribute("stroke-width", "4");
                svg.appendChild(circle);
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", x);
                text.setAttribute("y", y + 7);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("fill", "#c9d1d9");
                text.setAttribute("font-size", "16");
                text.setAttribute("font-family", "monospace");
                text.textContent = node;
                svg.appendChild(text);

                // Place children
                const children = adj[node].filter(c => c !== parentX ? true : false); // simplistic
                const spacing = 120 / Math.max(1, children.length);
                let childX = x - (children.length - 1) * spacing / 2;
                for (let child of children) {
                    placeNode(child, childX, y + 90, x, y, level + 1);
                    childX += spacing;
                }
            }
            placeNode(0, rootX, rootY);
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Tree
            renderTree();

            // Ans tiles
            const ansContainer = document.getElementById('ans-tiles');
            ansContainer.innerHTML = '';
            for (let k = 0; k < n; k++) {
                const tile = document.createElement('div');
                tile.className = `tile ${step.node !== undefined && step.node === k ? 'candidate' : ''}`;
                tile.innerText = step.ans && step.ans[k] !== undefined ? step.ans[k] : (step.type === 'final' ? step.ans[k] : '—');
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${k}]`;
                const wrapper = document.createElement('div');
                wrapper.style.display = 'flex';
                wrapper.style.flexDirection = 'column';
                wrapper.style.alignItems = 'center';
                wrapper.append(tile, idxLabel);
                ansContainer.appendChild(wrapper);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-root').innerText = step.node !== undefined ? step.node : '—';
            document.getElementById('val-size').innerText = step.size !== undefined ? step.size : '—';
            document.getElementById('val-subsum').innerText = step.sum !== undefined ? step.sum : '—';
            document.getElementById('val-ans').innerText = step.ans && step.node !== undefined ? step.ans[step.node] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = '[' + step.ans.join(', ') + ']';
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        function loadCustom() {
            const nVal = parseInt(document.getElementById('n-input').value);
            const edgesStr = document.getElementById('edges-input').value.trim();
            if (!isNaN(nVal)) {
                try {
                    n = nVal;
                    edges = JSON.parse(edgesStr);
                    generateSteps();
                    reset();
                } catch(e) {
                    alert("Invalid edges format. Example: [[0,1],[1,2],[1,3]]");
                }
            }
        }

        function loadExample(nVal, edgesStr) {
            n = nVal;
            edges = JSON.parse(edgesStr);
            document.getElementById('n-input').value = nVal;
            document.getElementById('edges-input').value = edgesStr;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
