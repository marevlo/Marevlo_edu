<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sum of Distances in Tree &middot; Rerooting DP</title>
<style>
:root{
  --bg-page:#070b14; --bg-surface:rgba(255,255,255,.045); --bg-input:rgba(255,255,255,.04);
  --border-main:rgba(255,255,255,.10); --btn-bg:rgba(255,255,255,.05); --btn-hover:rgba(255,255,255,.10);
  --text-main:#e8eefb; --text-dim:#8b98b3;
  --accent-blue:#06b6d4; --accent-purple:#a855f7; --accent-orange:#f5a524; --accent-green:#22c55e; --accent-red:#f43f5e;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --shell:880px;
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(900px 600px at 100% 10%, rgba(168,85,247,.10), transparent 55%),
    linear-gradient(160deg,#070b14 0%,#0b1120 55%,#0a0f1c 100%);
  background-attachment:fixed; color:var(--text-main); font-family:var(--sans); margin:0;
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:48px; -webkit-font-smoothing:antialiased;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:.45;}
body::before{width:380px;height:380px;top:8%;left:-120px;background:radial-gradient(circle,rgba(6,182,212,.30),transparent 70%);}
body::after{width:420px;height:420px;bottom:4%;right:-140px;background:radial-gradient(circle,rgba(168,85,247,.22),transparent 70%);}
body>*{position:relative;z-index:1;}

.input-bar{
  width:100%; background:rgba(10,15,28,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  padding:14px 16px; display:flex; justify-content:center; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-main); flex-wrap:wrap; position:sticky; top:0; z-index:50;
}
.input-bar label{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
input[type="text"]{
  background:var(--bg-input); border:1px solid var(--border-main); color:var(--text-main);
  height:34px; border-radius:9px; padding:0 12px; font-size:13px; font-family:var(--mono);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.large-input{width:300px;} .small-input{width:54px; text-align:center;}
input:focus{outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(6,182,212,.18); background:rgba(6,182,212,.06);}
button{
  height:34px; border-radius:9px; padding:0 16px; background:var(--btn-bg);
  border:1px solid var(--border-main); color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer;
  transition:transform .15s, background .2s, border-color .2s, box-shadow .2s;
}
button:hover{background:var(--btn-hover); border-color:rgba(6,182,212,.5); box-shadow:0 0 18px rgba(6,182,212,.18); transform:translateY(-1px);}
#play-btn{background:linear-gradient(135deg,rgba(6,182,212,.22),rgba(6,182,212,.10)); border-color:rgba(6,182,212,.45); color:#a5f3fc; min-width:80px;}

.shell{width:var(--shell); max-width:94%; margin:28px auto 0; display:flex; flex-direction:column; gap:16px;}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.title-row h1{font-size:18px; font-weight:800; margin:0;}
.title-row .sub{color:var(--text-dim); font-weight:500; font-size:13px;}
.step-badge{font-family:var(--mono); font-size:12px; font-weight:700; color:#a5f3fc;
  background:rgba(6,182,212,.12); border:1px solid rgba(6,182,212,.3); padding:4px 10px; border-radius:999px; white-space:nowrap;}
.progress-track{height:4px; width:100%; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; margin-top:-6px;}
.progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple)); box-shadow:0 0 12px rgba(6,182,212,.5); transition:width .45s ease;}

.narration{
  background:var(--bg-surface); border:1px solid rgba(6,182,212,.22); border-radius:12px;
  padding:12px 18px; font-family:var(--mono); font-size:14px; line-height:1.5; color:#cfe9f5;
  min-height:48px; display:flex; align-items:center; gap:10px; transition:border-color .3s, background .3s;
}
.narration::before{content:'\25B8'; color:var(--accent-blue);}
.narration.done{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.06);}
.narration.done::before{content:'\2713'; color:var(--accent-green);}
.narration code{background:rgba(6,182,212,.12); color:#7dd3fc; padding:1px 6px; border-radius:5px;}
.narration b{color:#fff;}

.stage-card{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:18px;
  backdrop-filter:blur(10px); box-shadow:0 12px 38px rgba(0,0,0,.4); overflow:hidden;}
.stage-screen{margin:14px; border-radius:14px; position:relative;
  background:radial-gradient(700px 240px at 50% -10%, rgba(6,182,212,.08), transparent 70%), #090d18;
  border:1px solid rgba(255,255,255,.06); min-height:360px; padding:18px; display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}

.tree-wrap{flex:0 0 auto;}
svg.tree{display:block; width:430px; max-width:100%; height:auto;}
.edge{stroke:var(--border-main); stroke-width:2.5; transition:stroke .35s, stroke-width .35s, opacity .35s;}
.edge.active{stroke:var(--accent-purple); stroke-width:3.5; filter:drop-shadow(0 0 6px rgba(168,85,247,.6)); stroke-dasharray:7; animation:dash 1s linear infinite;}
.tnode .nc{fill:rgba(255,255,255,.05); stroke:var(--border-main); stroke-width:2.5; transition:fill .35s, stroke .35s, filter .35s;}
.tnode .nl{font-family:var(--mono); font-weight:800; font-size:15px; fill:var(--text-main); text-anchor:middle; dominant-baseline:central; transition:fill .35s;}
.tnode .nval{font-family:var(--mono); font-weight:700; font-size:11px; fill:var(--text-dim); text-anchor:middle; transition:fill .35s, opacity .3s;}
.tnode.computed .nc{stroke:var(--accent-blue); fill:rgba(6,182,212,.10); filter:drop-shadow(0 0 5px rgba(6,182,212,.35));}
.tnode.computed .nval{fill:#7dd3fc;}
.tnode.settled .nc{stroke:var(--accent-green); fill:rgba(34,197,94,.12); filter:drop-shadow(0 0 6px rgba(34,197,94,.4));}
.tnode.settled .nl{fill:#bbf7d0;}
.tnode.settled .nval{fill:#86efac;}
.tnode.curr .nc{stroke:var(--accent-orange); fill:rgba(245,165,36,.16); filter:drop-shadow(0 0 12px rgba(245,165,36,.6)); stroke-width:3.5;}
.tnode.curr .nl{fill:#ffd591;}
.tnode.dep .nc{stroke:var(--accent-purple); fill:rgba(168,85,247,.16); filter:drop-shadow(0 0 11px rgba(168,85,247,.55)); stroke-width:3;}
.tnode.dep .nl{fill:#e9d5ff;}

.side{display:flex; flex-direction:column; gap:12px; min-width:230px; flex:1 1 230px;}
.panel{background:rgba(255,255,255,.03); border:1px solid var(--border-main); border-radius:12px; padding:11px 13px;}
.panel .cap{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; margin-bottom:8px;}
.panel.sz .cap{color:var(--accent-blue);} .panel.an .cap{color:var(--accent-green);}
.arr{display:flex; gap:7px; flex-wrap:wrap; min-height:36px; align-content:flex-start;}
.cell{position:relative; min-width:40px; height:40px; padding:0 7px; display:flex; align-items:center; justify-content:center;
  border-radius:9px; font-family:var(--mono); font-weight:800; font-size:14px; border:1.5px solid var(--border-main); background:rgba(255,255,255,.05); color:var(--text-main);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1), border-color .3s, background .3s, color .3s;}
.cell .ci{position:absolute; top:-15px; left:50%; transform:translateX(-50%); font-size:9px; color:var(--text-dim); font-weight:600;}
.cell.sz{border-color:rgba(6,182,212,.45); background:rgba(6,182,212,.12); color:#a5f3fc;}
.cell.an{border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.1); color:#bbf7d0;}
.cell.current{border-color:var(--accent-orange); background:rgba(245,165,36,.16); color:#ffd591; box-shadow:0 0 14px rgba(245,165,36,.5);}
.cell.dep{border-color:var(--accent-purple); background:rgba(168,85,247,.16); color:#e9d5ff;}
.cell.blank{color:var(--text-dim); font-weight:500;}

.answer-track{display:flex; flex-direction:column; gap:6px; padding-top:4px;}
.answer-track .alabel{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
.action-stage{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
.action-word{font-family:var(--mono); font-weight:800; font-size:18px; color:var(--text-dim);}
.action-word.live{color:#ffd591;}
.action-word.done{color:#86efac;}

#confetti{position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:5;}
.confetti-piece{position:absolute; top:30px; left:50%; width:8px; height:13px; border-radius:2px; opacity:0; animation:confettiFall ease-out forwards;}

.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
.controls .sp{display:flex; align-items:center; gap:6px;}
.controls .sp span{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
input[type="range"]{accent-color:var(--accent-blue); width:110px; cursor:pointer;}
.kbd{background:rgba(255,255,255,.07); border:1px solid var(--border-main); border-radius:5px; padding:1px 6px; font-size:10px; font-family:var(--mono); color:var(--text-dim);}

.details-wrap{display:flex; flex-direction:column;}
.details-toggle{align-self:center; height:32px; padding:0 16px; border-radius:999px; cursor:pointer;
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); color:var(--text-dim);
  font-family:var(--mono); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:color .2s, border-color .2s, background .2s;}
.details-toggle:hover{color:var(--text-main); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06);}
.details-toggle .chev{transition:transform .3s;}
.details-wrap.open .details-toggle .chev{transform:rotate(180deg);}
.details-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s ease;}
.details-wrap.open .details-body{grid-template-rows:1fr;}
.details-inner{overflow:hidden; min-height:0;}
.details-grid{display:flex; flex-direction:column; gap:14px; padding-top:14px;}

.code-panel{background:var(--bg-surface); border:1px solid var(--border-main); border-radius:14px; padding:12px 0; font-family:var(--mono); font-size:12.5px;}
.code-line{display:flex; gap:12px; padding:1px 16px; border-left:2px solid transparent; white-space:pre; transition:background .3s, border-color .3s;}
.code-line .lno{color:#4b5772; width:18px; text-align:right; user-select:none;}
.code-line .kw{color:#c792ea;} .code-line .fn{color:#82aaff;} .code-line .src{color:#c4cee0;} .code-line .cm{color:#5a6783;}
.code-line.active{background:rgba(6,182,212,.12); border-left-color:var(--accent-blue);}
.code-line.active .src,.code-line.active .lno{color:#e8eefb;}

.state-strip{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);
  background:rgba(255,255,255,.04); border:1px solid var(--border-main); border-radius:999px; padding:4px 11px;}
.pill b{color:var(--text-main); font-weight:800;}
.pill.u b{color:var(--accent-orange);} .pill.d b{color:var(--accent-purple);} .pill.v b{color:var(--accent-green);} .pill.s b{color:var(--accent-blue);}
.legend-inline{margin-left:auto; display:flex; gap:14px; flex-wrap:wrap;}
.legend-inline .li{display:flex; align-items:center; font-size:11px; color:var(--text-dim);}
.dot{width:10px; height:10px; border-radius:3px; margin-right:6px; display:inline-block;}

.log-panel{border-radius:14px; padding:12px 16px; height:120px; overflow-y:auto;
  font-family:var(--mono); font-size:12.5px; line-height:1.5; background:var(--bg-surface); border:1px solid var(--border-main);}
.log-panel div{margin-bottom:2px; white-space:pre-wrap;}
.log-panel::-webkit-scrollbar{width:8px;}
.log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}

@keyframes dash{to{stroke-dashoffset:-14;}}
@keyframes confettiFall{0%{opacity:1; transform:translate(-50%,0) rotate(0)}100%{opacity:0; transform:translate(calc(-50% + var(--x)), 220px) rotate(var(--rot))}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}}
</style>
</head>
<body>
<div class="input-bar">
  <label>n =</label>
  <input type="text" id="n-input" class="small-input" value="4">
  <label>edges =</label>
  <input type="text" id="edges-input" class="large-input" value="[[0,1],[1,2],[1,3]]">
  <button onclick="loadCustom()">Load</button>
  <button onclick='loadExample(3,"[[0,1],[1,2]]")'>Ex 1</button>
  <button onclick='loadExample(4,"[[0,1],[1,2],[1,3]]")'>Ex 2</button>
  <button onclick='loadExample(6,"[[0,1],[0,2],[2,3],[2,4],[2,5]]")'>Ex 3</button>
</div>

<div class="shell">
  <div class="title-row">
    <div><h1>Sum of Distances in Tree <span class="sub">&middot; rerooting DP (LeetCode 834)</span></h1></div>
    <div class="step-badge" id="step-badge">Step 0 / 0</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="narration" id="narration">Initializing&hellip;</div>

  <div class="stage-card">
    <div class="stage-screen">
      <div id="confetti"></div>
      <div class="tree-wrap"><svg class="tree" id="tree" viewBox="0 0 430 380"></svg></div>
      <div class="side">
        <div class="panel sz"><div class="cap">SUBTREE SIZE &middot; size[]</div><div class="arr" id="size-arr"></div></div>
        <div class="panel an"><div class="cap">ANSWER &middot; ans[] = &sum; dist(i,j)</div><div class="arr" id="ans-arr"></div></div>
        <div class="answer-track">
          <span class="alabel">current relation</span>
          <div class="action-stage">
            <span class="action-word" id="action-word">&minus;</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="reset()">&#8635; Reset</button>
    <button onclick="back()">&larr; Back</button>
    <button onclick="togglePlay()" id="play-btn">Play</button>
    <button onclick="next()">Next &rarr;</button>
    <div class="sp"><span>Speed</span><input type="range" id="speed-slider" min="0" max="2" value="1"></div>
    <span class="kbd">&larr; &rarr;</span><span class="kbd">space</span>
  </div>

  <div class="details-wrap" id="details-wrap">
    <button class="details-toggle" onclick="document.getElementById('details-wrap').classList.toggle('open')">
      <span>Show code, state &amp; log</span><span class="chev">&#9662;</span>
    </button>
    <div class="details-body"><div class="details-inner"><div class="details-grid">
      <div class="code-panel" id="code-panel"></div>
      <div class="state-strip">
        <span class="pill u">node = <b id="pill-u">&minus;</b></span>
        <span class="pill s">size = <b id="pill-size">&minus;</b></span>
        <span class="pill d">parent ans = <b id="pill-dep">&minus;</b></span>
        <span class="pill v">ans[node] = <b id="pill-val">&minus;</b></span>
        <div class="legend-inline">
          <span class="li"><span class="dot" style="background:var(--accent-orange)"></span>current</span>
          <span class="li"><span class="dot" style="background:var(--accent-purple)"></span>dependency</span>
          <span class="li"><span class="dot" style="background:var(--accent-blue)"></span>size known</span>
          <span class="li"><span class="dot" style="background:var(--accent-green)"></span>ans settled</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div></div></div>
  </div>
</div>

<script>
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const FRAME=1000/60;
function sampleSpring(s,d,m){const dt=1/60;let x=1,v=0;const o=[];for(let i=0;i<240;i++){const a=(-s*x-d*v)/m;v+=a*dt;x+=v*dt;o.push(1-x);if(Math.abs(x)<0.0015&&Math.abs(v)<0.0015)break;}o.push(1);return o;}
const SPRING_POP=sampleSpring(540,17,1); const durOf=a=>a.length*FRAME;
const Motion={ pop(el){ el.getAnimations().forEach(a=>a.cancel()); if(REDUCED) return;
  el.animate(SPRING_POP.map(p=>({transform:`scale(${(0.5+0.5*p).toFixed(3)})`})),{duration:durOf(SPRING_POP),easing:'linear'});}};

// Real algorithm reference (LeetCode 834). Two DFS passes from root 0.
const CODE=[
  [['fn','sumOfDistances'],['src','(n, edges):']],
  [['cm','  // DFS1: subtree sizes + root sum-of-distances']],
  [['fn','  dfs1'],['src','(u, p):  size[u]=1']],
  [['kw','    for'],['src',' c in adj[u] if c!=p:']],
  [['src','      dfs1(c, u);  size[u] += size[c]']],
  [['src','      ans[0]     += ans[0]_acc + dist contribution']],
  [['cm','  // DFS2: reroot ans from parent to each child']],
  [['fn','  dfs2'],['src','(u, p):']],
  [['kw','    for'],['src',' c in adj[u] if c!=p:']],
  [['src','      ans[c] = ans[u] + (n - 2*size[c])']],
  [['src','      dfs2(c, u)']],
  [['kw','  return'],['src',' ans']],
];

let n=4, edges=[[0,1],[1,2],[1,3]], adj=[];
let coord=[], steps=[], stepIndex=0, timer=null;
const delays=[1700,900,460];
const tnodes=[];
let confettiArmed=true;

function init(){ buildCode(); loadExample(4,"[[0,1],[1,2],[1,3]]"); }
function buildCode(){
  const p=document.getElementById('code-panel'); p.innerHTML='';
  CODE.forEach((toks,i)=>{
    const ln=document.createElement('div'); ln.className='code-line'; ln.id='cl'+i;
    const no=document.createElement('span'); no.className='lno'; no.textContent=i+1; ln.appendChild(no);
    toks.forEach(([c,t])=>{const s=document.createElement('span'); s.className=c; s.textContent=t; ln.appendChild(s);});
    p.appendChild(ln);
  });
}
function loadExample(nv,es){ document.getElementById('n-input').value=nv; document.getElementById('edges-input').value=es; parseAndGen(); }
function loadCustom(){ parseAndGen(); }

function buildAdj(){
  adj=Array.from({length:n},()=>[]);
  for(const [u,v] of edges){ adj[u].push(v); adj[v].push(u); }
}

// Tidy-ish layout: BFS from root 0, x by in-order leaf slot, y by depth.
function layout(){
  coord=new Array(n);
  const par=new Array(n).fill(-1), depth=new Array(n).fill(0), order=[];
  const seen=new Array(n).fill(false);
  // children lists in a rooted orientation
  const kids=Array.from({length:n},()=>[]);
  (function dfs(u,p,d){ seen[u]=true; par[u]=p; depth[u]=d; order.push(u);
    for(const c of adj[u]) if(c!==p && !seen[c]){ kids[u].push(c); dfs(c,u,d+1); } })(0,-1,0);
  let maxDepth=0; for(let i=0;i<n;i++) maxDepth=Math.max(maxDepth,depth[i]);
  // assign x by leaf counting (in-order)
  let leafSlot=0; const xUnit=new Array(n).fill(0);
  (function place(u){
    if(kids[u].length===0){ xUnit[u]=leafSlot++; return; }
    let s=0; for(const c of kids[u]){ place(c); s+=xUnit[c]; } xUnit[u]=s/kids[u].length;
  })(0);
  const totalLeaves=Math.max(1,leafSlot);
  const W=430, H=380, padX=42, padTop=46, padBot=46;
  const usableW=W-2*padX, usableH=H-padTop-padBot;
  for(let i=0;i<n;i++){
    const x = totalLeaves<=1 ? W/2 : padX + (usableW*xUnit[i])/(totalLeaves-1);
    const y = maxDepth===0 ? H/2 : padTop + (usableH*depth[i])/maxDepth;
    coord[i]={x,y,par:par[i]};
  }
}

function setupTree(){
  layout();
  const svg=document.getElementById('tree'); svg.innerHTML=''; tnodes.length=0;
  // edges first
  for(let i=0;i<n;i++){ const p=coord[i].par; if(p<0) continue;
    const a=coord[i], b=coord[p];
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('class','edge'); ln.id='edge'+i;
    ln.setAttribute('x1',a.x); ln.setAttribute('y1',a.y); ln.setAttribute('x2',b.x); ln.setAttribute('y2',b.y);
    ln.dataset.a=i; ln.dataset.b=p; svg.appendChild(ln);
  }
  // nodes on top
  for(let i=0;i<n;i++){ const c=coord[i];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','tnode'); g.id='tn'+i;
    const circ=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circ.setAttribute('class','nc'); circ.setAttribute('cx',c.x); circ.setAttribute('cy',c.y); circ.setAttribute('r',20);
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('class','nl'); lbl.setAttribute('x',c.x); lbl.setAttribute('y',c.y); lbl.textContent=i;
    const val=document.createElementNS('http://www.w3.org/2000/svg','text');
    val.setAttribute('class','nval'); val.setAttribute('x',c.x); val.setAttribute('y',c.y+33); val.textContent='';
    g.appendChild(circ); g.appendChild(lbl); g.appendChild(val); svg.appendChild(g); tnodes[i]=g;
  }
}

function generateSteps(){
  steps=[]; buildAdj();
  const size=new Array(n).fill(0), ans=new Array(n).fill(0);

  function snap(o){
    steps.push({
      size:[...size], ans:[...ans],
      sizeKnown:[...o.sizeKnown], ansKnown:[...o.ansKnown],
      curr:o.curr??null, dep:o.dep??null, edge:o.edge??null,
      code:o.code, narr:o.narr, log:o.log, action:o.action||'', actionState:o.actionState||'',
      pillU:o.pillU??null, pillSize:o.pillSize??null, pillDep:o.pillDep??null, pillVal:o.pillVal??null,
      complete:o.complete||false, pop:o.pop??null
    });
  }
  const sizeKnown=new Array(n).fill(false);
  const ansKnown=new Array(n).fill(false);

  // ---- DFS1: post-order compute size[] and accumulate root sum of distances into ans[0] ----
  function dfs1(u,p){
    size[u]=1;
    let acc=0; // sum of distances within subtree(u), rooted at u
    for(const c of adj[u]) if(c!==p){
      dfs1(c,u);
      size[u]+=size[c];
      acc+=ans[c]+size[c]; // every node in subtree(c) is one edge further from u than from c
    }
    ans[u]=acc; // temporary: subtree-local sum of distances (only ans[0] is globally meaningful here)
    sizeKnown[u]=true;
    snap({code:[2,3,4], curr:u, sizeKnown, ansKnown,
      pillU:u, pillSize:size[u], pillDep:null, pillVal:null,
      action:`size[${u}] = ${size[u]}`, actionState:'live',
      narr:`<b>DFS1</b> post-order at node <code>${u}</code>: <code>size[${u}] = ${size[u]}</code>, subtree sum-of-distances = <code>${acc}</code>.`,
      log:`dfs1 ${u}: size=${size[u]} subtreeSum=${acc}`, pop:u});
  }
  dfs1(0,-1);

  // ans[0] now holds the true sum of distances for the root.
  for(let i=0;i<n;i++) ansKnown[i]=false;
  ansKnown[0]=true;
  snap({code:[5], curr:0, sizeKnown, ansKnown,
    pillU:0, pillSize:size[0], pillDep:null, pillVal:ans[0],
    action:`ans[0] = ${ans[0]}`, actionState:'live',
    narr:`Root done: <code>ans[0] = ${ans[0]}</code> is the true sum of distances from node <code>0</code>. Now <b>reroot</b> outward.`,
    log:`root ans[0] = ${ans[0]}`, pop:0});

  // ---- DFS2: pre-order reroot ans[child] = ans[parent] + (n - 2*size[child]) ----
  function dfs2(u,p){
    for(const c of adj[u]) if(c!==p){
      const prev=ans[c];
      ans[c]=ans[u]+(n-2*size[c]);
      ansKnown[c]=true;
      snap({code:[8,9], curr:c, dep:u, edge:c, sizeKnown, ansKnown,
        pillU:c, pillSize:size[c], pillDep:ans[u], pillVal:ans[c],
        action:`ans[${c}] = ${ans[u]} + (${n} - 2&middot;${size[c]}) = ${ans[c]}`, actionState:'live',
        narr:`Reroot <code>${u}</code>&rarr;<code>${c}</code>: <code>ans[${c}] = ans[${u}] + (n &minus; 2&middot;size[${c}])</code> = <code>${ans[u]} + (${n} &minus; ${2*size[c]})</code> = <b>${ans[c]}</b>.`,
        log:`reroot ${u}->${c}: ans[${c}] = ${ans[u]} + (${n} - ${2*size[c]}) = ${ans[c]}`, pop:c});
      dfs2(c,u);
    }
  }
  dfs2(0,-1);

  const allKnown=new Array(n).fill(true);
  snap({code:[11], sizeKnown, ansKnown:allKnown,
    pillU:null, pillSize:null, pillDep:null, pillVal:null,
    action:`ans = [${ans.join(', ')}]`, actionState:'done',
    narr:`<b>Done.</b> Sum of distances per node: <code>ans = [${ans.join(', ')}]</code>.`,
    log:`done. ans = [${ans.join(', ')}]`, complete:true});
}

function renderStep(idx){
  const step=steps[idx]; if(!step) return;
  // tree nodes
  for(let i=0;i<n;i++){ const g=tnodes[i]; if(!g) continue;
    g.classList.remove('computed','settled','curr','dep');
    const val=g.querySelector('.nval');
    if(step.ansKnown[i]){ g.classList.add('settled'); val.textContent='a='+step.ans[i]; val.style.opacity=1; }
    else if(step.sizeKnown[i]){ g.classList.add('computed'); val.textContent='s='+step.size[i]; val.style.opacity=1; }
    else { val.textContent=''; val.style.opacity=0; }
    if(step.dep===i){ g.classList.add('dep'); }
    if(step.curr===i){ g.classList.remove('dep'); g.classList.add('curr'); }
    if(step.pop===i){ const c=g.querySelector('.nc'); if(c) Motion.pop(c); }
  }
  // edges
  document.querySelectorAll('.edge').forEach(ln=>{ ln.classList.remove('active');
    if(step.edge!=null){ const a=+ln.dataset.a, b=+ln.dataset.b;
      if((a===step.curr&&b===step.dep)||(a===step.dep&&b===step.curr)) ln.classList.add('active'); }
  });

  fillSize(step);
  fillAns(step);

  const aw=document.getElementById('action-word'); aw.innerHTML=step.action||'&minus;';
  aw.classList.remove('live','done'); if(step.actionState) aw.classList.add(step.actionState);

  const narr=document.getElementById('narration'); narr.innerHTML=step.narr; narr.classList.toggle('done',!!step.complete);
  CODE.forEach((_,i)=>{ const ln=document.getElementById('cl'+i); if(ln) ln.classList.toggle('active', step.code.includes(i)); });

  document.getElementById('pill-u').innerHTML=step.pillU!=null?step.pillU:'&minus;';
  document.getElementById('pill-size').innerHTML=step.pillSize!=null?step.pillSize:'&minus;';
  document.getElementById('pill-dep').innerHTML=step.pillDep!=null?step.pillDep:'&minus;';
  document.getElementById('pill-val').innerHTML=step.pillVal!=null?step.pillVal:'&minus;';

  document.getElementById('progress-fill').style.width=(steps.length>1?(idx/(steps.length-1))*100:0)+'%';
  document.getElementById('step-badge').textContent='Step '+(idx+1)+' / '+steps.length;

  const log=document.getElementById('log'); log.innerHTML='';
  for(let k=0;k<=idx;k++){ if(steps[k].log){ const d=document.createElement('div'); d.textContent=steps[k].log;
    if(steps[k].complete) d.style.color='var(--accent-green)'; log.appendChild(d);} }
  log.scrollTop=log.scrollHeight;

  if(step.complete){ if(confettiArmed){ fireConfetti(); confettiArmed=false; } } else confettiArmed=true;
}

function fillSize(step){
  const c=document.getElementById('size-arr'); c.innerHTML='';
  for(let i=0;i<n;i++){
    const cell=document.createElement('div');
    const known=step.sizeKnown[i];
    cell.className='cell '+(known?'sz':'blank')+(step.curr===i?' current':'');
    cell.textContent=known?step.size[i]:'?';
    const ci=document.createElement('div'); ci.className='ci'; ci.textContent='['+i+']'; cell.appendChild(ci);
    c.appendChild(cell);
  }
}
function fillAns(step){
  const c=document.getElementById('ans-arr'); c.innerHTML='';
  for(let i=0;i<n;i++){
    const cell=document.createElement('div');
    const known=step.ansKnown[i];
    let cls='cell '+(known?'an':'blank');
    if(step.dep===i) cls+=' dep'; if(step.curr===i) cls+=' current';
    cell.className=cls;
    cell.textContent=known?step.ans[i]:'?';
    const ci=document.createElement('div'); ci.className='ci'; ci.textContent='['+i+']'; cell.appendChild(ci);
    c.appendChild(cell);
  }
}

function fireConfetti(){
  const host=document.getElementById('confetti'); if(!host||REDUCED) return;
  const cols=['#06b6d4','#a855f7','#f5a524','#22c55e'];
  for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='confetti-piece';
    p.style.background=cols[i%cols.length]; p.style.setProperty('--x',(Math.floor(((i*53)%200))-100)+'px');
    p.style.setProperty('--rot',((i*47)%360)+'deg'); p.style.animationDuration=(0.9+((i%5)*0.12))+'s';
    p.style.left=(40+((i*7)%30))+'%'; host.appendChild(p); setTimeout(()=>p.remove(),1700); }
}

function parseAndGen(){
  try{
    const nv=parseInt(document.getElementById('n-input').value,10);
    const es=JSON.parse(document.getElementById('edges-input').value);
    if(!Number.isInteger(nv)||nv<1) throw new Error('n');
    if(!Array.isArray(es)) throw new Error('edges');
    for(const e of es){ if(!Array.isArray(e)||e.length!==2) throw new Error('edge');
      if(e[0]<0||e[0]>=nv||e[1]<0||e[1]>=nv) throw new Error('range'); }
    if(es.length!==nv-1) throw new Error('count');
    n=nv; edges=es;
    setupTree(); generateSteps(); reset();
  }catch(err){ alert('Invalid input. Need integer n and a tree as edges, e.g. n=4, edges=[[0,1],[1,2],[1,3]] (exactly n-1 edges, ids 0..n-1).'); }
}

function next(){ if(stepIndex<steps.length-1){ stepIndex++; renderStep(stepIndex);} else pause(); }
function back(){ if(stepIndex>0){ stepIndex--; renderStep(stepIndex);} }
function reset(){ pause(); stepIndex=0; confettiArmed=true; renderStep(0); }
function togglePlay(){ const b=document.getElementById('play-btn'); if(timer) pause();
  else{ b.textContent='Pause'; if(stepIndex>=steps.length-1){ stepIndex=0; } timer=setInterval(next,delays[document.getElementById('speed-slider').value]); } }
function pause(){ clearInterval(timer); timer=null; document.getElementById('play-btn').textContent='Play'; }

document.addEventListener('keydown',e=>{ const t=(e.target.tagName||'').toLowerCase(); if(t==='input'||t==='textarea') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); pause(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); pause(); back(); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); } });
window.addEventListener('resize',()=>renderStep(stepIndex));
window.onload=()=>setTimeout(init,60);
</script>
