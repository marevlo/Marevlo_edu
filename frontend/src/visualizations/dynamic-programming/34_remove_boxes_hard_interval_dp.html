<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove Boxes (hard interval DP) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 240px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .boxes-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 110px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        /* DP TABLE */
        .dp-container { 
            margin-top: 20px;
            overflow-x: auto;
            max-width: 920px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .dp-grid {
            display: grid;
            gap: 4px;
        }
        .dp-cell {
            min-width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            position: relative;
        }
        .dp-cell.header { background: var(--bg-surface); font-size: 12px; color: var(--text-dim); font-weight: normal; }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.08); box-shadow: 0 0 12px var(--accent-green); }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">boxes =</label>
        <input type="text" id="boxes-input" value="[1,3,2,2,2,3,4,3,1]" style="width:240px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([1,3,2,2,2,3,4,3,1])">Ex 1 (23)</button>
        <button onclick="loadExample([1,2,1])">Ex 2 (5)</button>
        <button onclick="loadExample([1,1,1])">Ex 3 (9)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Boxes array (highlighted interval [l,r])</div>
        <div class="boxes-wrapper" id="boxes-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP Table dp[l][r] (max points for interval [l,r])</div>
        <div id="dp-container" style="overflow-x:auto; max-width:920px;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Interval [l,r]</span>
            <span class="info-value" id="val-interval" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Attached k</span>
            <span class="info-value" id="val-k" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Option 1 (remove now)</span>
            <span class="info-value" id="val-opt1" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Option 2 (max over m)</span>
            <span class="info-value" id="val-opt2" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Maximum points =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Current interval</div>
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Matching m</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Past</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputBoxes = [1,3,2,2,2,3,4,3,1];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 400];
        let n = 0;
        let dp = [];

        function init() { loadExample([1,3,2,2,2,3,4,3,1]); }

        function loadExample(newBoxes) {
            inputBoxes = newBoxes;
            n = newBoxes.length;
            document.getElementById('boxes-input').value = JSON.stringify(newBoxes);
            generateSteps();
            reset();
        }

        function loadCustom() {
            let boxes;
            try {
                boxes = JSON.parse(document.getElementById('boxes-input').value);
            } catch(e) {
                alert("Please enter a valid array for boxes, e.g. [1,3,2,2,2,3,4,3,1]");
                return;
            }
            if (Array.isArray(boxes) && boxes.length > 0) {
                loadExample(boxes);
            } else {
                alert("Invalid input.");
            }
        }

        function generateSteps() {
            steps = [];
            dp = Array.from({length: n}, () => Array.from({length: n}, () => Array(n).fill(0)));

            // STEP 0: INIT base cases
            steps.push({
                type: 'init',
                l: null,
                r: null,
                k: null,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `Remove Boxes — Enhanced Interval DP<br>boxes = [${inputBoxes}]`,
                statusText: `Initializing DP table`,
                log: `dp[l][r][k] initialized to 0\nBase cases: dp[i][i][0] = 1 for all i`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 0; i < n; i++) {
                dp[i][i][0] = 1;
                steps.push({
                    type: 'base',
                    l: i,
                    r: i,
                    k: 0,
                    dpSnapshot: JSON.parse(JSON.stringify(dp)),
                    panel: `Base case: dp[${i}][${i}][0] = 1 (single box)`,
                    statusText: `dp[${i}][${i}][0] = 1`,
                    log: `dp[${i}][${i}][0] = 1`,
                    logColor: 'var(--accent-green)'
                });
            }

            // Fill by increasing length
            for (let length = 2; length <= n; length++) {
                for (let l = 0; l <= n - length; l++) {
                    let r = l + length - 1;

                    steps.push({
                        type: 'start-interval',
                        l: l,
                        r: r,
                        k: 0,
                        dpSnapshot: JSON.parse(JSON.stringify(dp)),
                        panel: `Processing interval [${l},${r}] (length ${length})`,
                        statusText: `Interval [${l},${r}]`,
                        log: `\n--- Length ${length}: interval [${l},${r}] ---`,
                        logColor: 'var(--accent-orange)'
                    });

                    // For each k (0 to n-r-1)
                    for (let k = 0; k < n - r; k++) {
                        let maxPoints = 0;

                        // Option 1: Remove boxes[r] + k attached boxes
                        let opt1 = (k + 1) * (k + 1) + (l <= r - 1 ? dp[l][r - 1][0] : 0);
                        maxPoints = Math.max(maxPoints, opt1);

                        steps.push({
                            type: 'option1',
                            l: l,
                            r: r,
                            k: k,
                            dpSnapshot: JSON.parse(JSON.stringify(dp)),
                            panel: `Option 1: Remove boxes[${r}] + ${k} attached boxes<br>Points = (${k+1})^2 = ${opt1} + dp[${l}][${r-1}][0]`,
                            statusText: `Option 1 for k=${k}`,
                            log: `  Option1 (k=${k}): ${opt1}`,
                            logColor: 'var(--accent-blue)'
                        });

                        // Option 2: Partition at m where boxes[m] == boxes[r]
                        let opt2 = 0;
                        for (let m = l; m < r; m++) {
                            if (inputBoxes[m] === inputBoxes[r]) {
                                let sub = (l <= m ? dp[l][m][k + 1] : 0) + (m + 1 <= r - 1 ? dp[m + 1][r - 1][0] : 0);
                                opt2 = Math.max(opt2, sub);
                            }
                        }
                        maxPoints = Math.max(maxPoints, opt2);

                        steps.push({
                            type: 'option2',
                            l: l,
                            r: r,
                            k: k,
                            dpSnapshot: JSON.parse(JSON.stringify(dp)),
                            panel: `Option 2: Max over m where boxes[m]==boxes[${r}]<br>Points = ${opt2}`,
                            statusText: `Option 2 for k=${k}`,
                            log: `  Option2 (k=${k}): ${opt2}`,
                            logColor: 'var(--accent-green)'
                        });

                        dp[l][r][k] = maxPoints;
                    }
                }
            }

            // FINAL
            const finalPoints = dp[0][n - 1][0];
            steps.push({
                type: 'final',
                l: 0,
                r: n - 1,
                k: 0,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `All intervals processed.<br>Maximum points = <span style="color:var(--accent-green)"><b>${finalPoints}</b></span>`,
                statusText: `Final max points = ${finalPoints}`,
                log: `\nFinal dp[0][${n-1}][0] = ${finalPoints}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: finalPoints
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render boxes
            const boxesContainer = document.getElementById('boxes-container');
            boxesContainer.innerHTML = '';
            inputBoxes.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                let cls = 'tile';
                if (step.l !== null && i >= step.l && i <= step.r) cls += ' candidate';
                tile.className = cls;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = i;
                wrapper.append(tile, idxLabel);
                boxesContainer.appendChild(wrapper);
            });

            // Render DP grid (2D projection for l,r with max over k)
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-grid" style="grid-template-columns: repeat(${n}, 62px);"></div>`;
            const grid = dpContainer.querySelector('.dp-grid');

            // Header
            const headerRow = document.createElement('div');
            headerRow.style.display = 'contents';
            const empty = document.createElement('div');
            empty.className = 'dp-cell header';
            empty.textContent = '';
            headerRow.appendChild(empty);
            for (let c = 0; c < n; c++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.textContent = c;
                headerRow.appendChild(cell);
            }
            grid.appendChild(headerRow);

            // Rows
            const currentDP = step.dpSnapshot || dp;
            for (let l = 0; l < n; l++) {
                const rowDiv = document.createElement('div');
                rowDiv.style.display = 'contents';
                const rowHeader = document.createElement('div');
                rowHeader.className = 'dp-cell header';
                rowHeader.textContent = l;
                rowDiv.appendChild(rowHeader);

                for (let r = 0; r < n; r++) {
                    const cellVal = l <= r ? currentDP[l][r][0] : 0; // show k=0 projection
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${(step.l === l && step.r === r) ? 'current' : ''}`;
                    cell.textContent = cellVal;
                    if (l > r) cell.style.opacity = '0.3';
                    rowDiv.appendChild(cell);
                }
                grid.appendChild(rowDiv);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-interval').innerText = step.l !== null ? `[${step.l},${step.r}]` : '—';
            document.getElementById('val-k').innerText = step.k !== null ? step.k : '—';
            document.getElementById('val-opt1').innerText = step.opt1 || '—';
            document.getElementById('val-opt2').innerText = step.opt2 || '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
