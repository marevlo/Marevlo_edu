<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Path Visiting All Nodes (graph state DP) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 240px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        .graph-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        .nodes {
            display: flex;
            gap: 30px;
            position: relative;
        }
        .node {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            font-family: monospace;
            background: #21262d;
            border: 3px solid var(--accent-blue);
            color: var(--text-main);
            position: relative;
            transition: all 0.3s ease;
        }
        .node.visited {
            background: #0f2a1a;
            border-color: var(--accent-green);
            color: var(--accent-green);
        }
        .edge {
            position: absolute;
            height: 3px;
            background: var(--accent-orange);
            transform-origin: left center;
        }
        .edge-label {
            position: absolute;
            font-size: 12px;
            color: var(--accent-orange);
            background: var(--bg-surface);
            padding: 2px 4px;
            border-radius: 3px;
        }

        /* DP TABLE */
        .dp-container { 
            margin-top: 20px;
            overflow-x: auto;
            max-width: 920px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .dp-grid {
            display: grid;
            gap: 4px;
        }
        .dp-cell {
            min-width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            position: relative;
        }
        .dp-cell.header { background: var(--bg-surface); font-size: 12px; color: var(--text-dim); font-weight: normal; }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.08); box-shadow: 0 0 12px var(--accent-green); }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">Graph (adj matrix):</label>
        <input type="text" id="graph-input" value="[[0,1,10],[1,0,2],[10,2,0]]" style="width:240px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([[0,1,10],[1,0,2],[10,2,0]])">Ex 1 (cost 3)</button>
        <button onclick="loadExample([[0,INF,5],[INF,0,INF],[5,INF,0]])">Ex 2 (INF)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Graph nodes and edges:</div>
        <div class="graph-container" id="graph-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP Table dp[mask][node] = min cost to visit mask ending at node</div>
        <div id="dp-container" style="overflow-x:auto; max-width:920px;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Mask</span>
            <span class="info-value" id="val-mask" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Node</span>
            <span class="info-value" id="val-node" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Next Node</span>
            <span class="info-value" id="val-next" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Cost Added</span>
            <span class="info-value" id="val-cost" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Minimum path cost =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current mask</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Updated DP cell</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border:1px solid var(--accent-blue)"></span> Transition node</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Completed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputGraph = [[0,1,10],[1,0,2],[10,2,0]];
        let n = 3;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 400];
        let INF = 999999;

        function init() { loadExample([[0,1,10],[1,0,2],[10,2,0]]); }

        function loadExample(graph) {
            inputGraph = graph;
            n = graph.length;
            document.getElementById('graph-input').value = JSON.stringify(graph);
            generateSteps();
            reset();
        }

        function loadCustom() {
            let graph;
            try {
                graph = JSON.parse(document.getElementById('graph-input').value);
            } catch(e) {
                alert("Please enter a valid adjacency matrix, e.g. [[0,1,10],[1,0,2],[10,2,0]]");
                return;
            }
            if (Array.isArray(graph) && graph.length > 0 && graph.length <= 5) {
                loadExample(graph);
            } else {
                alert("Graph must be square matrix with n <= 5 for visualization");
            }
        }

        function generateSteps() {
            steps = [];
            // Precompute Floyd-Warshall for dist
            let dist = JSON.parse(JSON.stringify(inputGraph));
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    if (i !== j && dist[i][j] === 0) dist[i][j] = INF;
                }
                dist[i][i] = 0;
            }
            for (let k = 0; k < n; k++) {
                for (let i = 0; i < n; i++) {
                    for (let j = 0; j < n; j++) {
                        if (dist[i][k] !== INF && dist[k][j] !== INF) {
                            dist[i][j] = Math.min(dist[i][j], dist[i][k] + dist[k][j]);
                        }
                    }
                }
            }

            // STEP 0: INIT
            let dp = Array.from({length: 1 << n}, () => Array(n).fill(INF));
            steps.push({
                type: 'init',
                mask: null,
                node: null,
                next: null,
                dp: JSON.parse(JSON.stringify(dp)),
                panel: `Minimum Path Visiting All Nodes — Bitmask DP<br>Graph size n = ${n}`,
                statusText: `Precomputed all-pairs distances`,
                log: `dist matrix after Floyd-Warshall:\n${dist.map(row => row.map(v => v === INF ? 'INF' : v).join(', ')).join('\n')}`,
                logColor: 'var(--text-dim)'
            });

            // Initialize starting states
            for (let i = 0; i < n; i++) {
                dp[1 << i][i] = 0;
                steps.push({
                    type: 'base',
                    mask: 1 << i,
                    node: i,
                    next: null,
                    dp: JSON.parse(JSON.stringify(dp)),
                    panel: `Base case: dp[${1<<i}][${i}] = 0 (start at node ${i})`,
                    statusText: `Start at ${i}`,
                    log: `dp[${1<<i}][${i}] = 0`,
                    logColor: 'var(--accent-green)'
                });
            }

            // Fill DP for increasing mask size
            for (let mask = 0; mask < (1 << n); mask++) {
                for (let i = 0; i < n; i++) {
                    if (dp[mask][i] === INF) continue;

                    steps.push({
                        type: 'start-state',
                        mask: mask,
                        node: i,
                        next: null,
                        dp: JSON.parse(JSON.stringify(dp)),
                        panel: `Processing state: mask = <b>${mask.toString(2).padStart(n, '0')}</b> (visited nodes), ending at node <b>${i}</b>`,
                        statusText: `mask=${mask}, node=${i}`,
                        log: `\n--- State mask=${mask} (${mask.toString(2).padStart(n, '0')}), node=${i}, cost=${dp[mask][i]} ---`,
                        logColor: 'var(--accent-orange)'
                    });

                    for (let next = 0; next < n; next++) {
                        if ((mask & (1 << next)) !== 0) continue; // already visited

                        const cost = dist[i][next];
                        if (cost === INF) continue;

                        const newMask = mask | (1 << next);
                        const newCost = dp[mask][i] + cost;

                        if (newCost < dp[newMask][next]) {
                            steps.push({
                                type: 'transition',
                                mask: mask,
                                node: i,
                                next: next,
                                dp: JSON.parse(JSON.stringify(dp)),
                                panel: `Try next node <b>${next}</b><br>dist[${i}][${next}] = ${cost}<br>New cost = ${dp[mask][i]} + ${cost} = <span style="color:var(--accent-green)">${newCost}</span>`,
                                statusText: `to node ${next}`,
                                log: `  → next=${next}, new_mask=${newMask}, cost=${newCost}`,
                                logColor: 'var(--accent-blue)'
                            });
                            dp[newMask][next] = newCost;
                        }
                    }
                }
            }

            // FINAL
            let minCost = INF;
            let bestEnd = -1;
            for (let i = 0; i < n; i++) {
                if (dp[(1 << n) - 1][i] < minCost) {
                    minCost = dp[(1 << n) - 1][i];
                    bestEnd = i;
                }
            }
            steps.push({
                type: 'final',
                mask: (1 << n) - 1,
                node: bestEnd,
                next: null,
                dp: JSON.parse(JSON.stringify(dp)),
                panel: `All states processed.<br>Minimum path cost = <span style="color:var(--accent-green)"><b>${minCost === INF ? 'INF' : minCost}</b></span>`,
                statusText: `Final min cost = ${minCost}`,
                log: `\nFinal min over dp[(1<<${n})-1][i] = ${minCost}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: minCost === INF ? 'INF' : minCost
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render graph
            const graphContainer = document.getElementById('graph-container');
            graphContainer.innerHTML = `<div style="display:flex; gap:40px; position:relative; margin:20px 0;">
                ${Array.from({length: n}, (_, i) => {
                    const isVisited = step.mask !== null && (step.mask & (1 << i)) !== 0;
                    return `<div class="node ${isVisited ? 'visited' : ''}">${i}</div>`;
                }).join('')}
            </div>`;

            // Render DP grid (only for small n)
            const dpContainer = document.getElementById('dp-container');
            const gridSize = Math.min(n + 1, 4); // limit display
            dpContainer.innerHTML = `<div class="dp-grid" style="grid-template-columns: repeat(${n + 1}, 62px);"></div>`;
            const grid = dpContainer.querySelector('.dp-grid');

            // Header row (nodes)
            const headerRow = document.createElement('div');
            headerRow.style.display = 'contents';
            const empty = document.createElement('div');
            empty.className = 'dp-cell header';
            empty.textContent = 'mask\\node';
            headerRow.appendChild(empty);
            for (let c = 0; c < n; c++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.textContent = c;
                headerRow.appendChild(cell);
            }
            grid.appendChild(headerRow);

            // DP rows (only first few masks for visualization)
            const currentDP = step.dp;
            const maxRows = Math.min(8, 1 << n);
            for (let m = 0; m < maxRows; m++) {
                const rowDiv = document.createElement('div');
                rowDiv.style.display = 'contents';
                const rowHeader = document.createElement('div');
                rowHeader.className = 'dp-cell header';
                rowHeader.textContent = m.toString(2).padStart(n, '0');
                rowDiv.appendChild(rowHeader);

                for (let node = 0; node < n; node++) {
                    const cellVal = currentDP[m][node] === INF ? '∞' : currentDP[m][node];
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${(step.mask === m && step.node === node) ? 'current' : ''}`;
                    cell.textContent = cellVal;
                    rowDiv.appendChild(cell);
                }
                grid.appendChild(rowDiv);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-mask').innerText = step.mask !== null ? step.mask.toString(2).padStart(n, '0') : '—';
            document.getElementById('val-node').innerText = step.node !== null ? step.node : '—';
            document.getElementById('val-next').innerText = step.next !== null ? step.next : '—';
            document.getElementById('val-cost').innerText = step.next !== null ? (inputGraph[step.node][step.next] || step.cost || '—') : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
