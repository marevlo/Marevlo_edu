<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traveling Salesman Problem (TSP) - DP Bitmask Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 320px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .cities-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 600px; min-height: 80px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); }
        .tile.visited { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile.past { opacity: 0.4; }

        /* DP TABLE */
        .dp-container { 
            margin-top: 20px;
            overflow-x: auto;
            max-width: 920px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .dp-grid {
            display: grid;
            gap: 3px;
        }
        .dp-cell {
            min-width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            font-family: monospace;
            border: 1px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            position: relative;
        }
        .dp-cell.header { background: var(--bg-surface); font-size: 11px; color: var(--text-dim); }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .dp-cell.inf { color: var(--accent-red); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="number" id="n-input" value="4" style="width:80px">
        <label class="ui-label">dist =</label>
        <input type="text" id="dist-input" value='[[0,10,15,20],[10,0,35,25],[15,35,0,30],[20,25,30,0]]' style="width:380px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(3, [[0,1,2],[1,0,3],[2,3,0]])">Ex 1 (n=3)</button>
        <button onclick="loadExample(4, [[0,10,15,20],[10,0,35,25],[15,35,0,30],[20,25,30,0]])">Ex 2 (n=4)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Cities (0 to n-1):</div>
        <div class="cities-wrapper" id="cities-container"></div>

        <div class="ui-label" style="margin-top:25px;">DP Table: dp[mask][end] = min cost to visit mask ending at city</div>
        <div id="dp-container" style="overflow-x:auto; max-width:920px;"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Mask</span>
            <span class="info-value" id="val-mask" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">End City</span>
            <span class="info-value" id="val-end" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Prev City</span>
            <span class="info-value" id="val-prev" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Cost</span>
            <span class="info-value" id="val-cost" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Min Cost Found</span>
            <span class="info-value" id="val-best" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Minimum Tour Cost =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current state</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Best / updated</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border:1px solid var(--accent-blue)"></span> Active transition</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Completed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let n = 4;
        let dist = [[0,10,15,20],[10,0,35,25],[15,35,0,30],[20,25,30,0]];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1200, 600, 300];

        function init() { loadExample(4, [[0,10,15,20],[10,0,35,25],[15,35,0,30],[20,25,30,0]]); }

        function loadExample(newN, newDist) {
            n = newN;
            dist = newDist;
            document.getElementById('n-input').value = n;
            document.getElementById('dist-input').value = JSON.stringify(dist);
            generateSteps();
            reset();
        }

        function loadCustom() {
            const nVal = parseInt(document.getElementById('n-input').value);
            let dVal;
            try {
                dVal = JSON.parse(document.getElementById('dist-input').value);
            } catch(e) {
                alert("Invalid distance matrix");
                return;
            }
            if (Number.isInteger(nVal) && nVal >= 1 && nVal <= 8 && Array.isArray(dVal) && dVal.length === nVal && dVal.every(row => Array.isArray(row) && row.length === nVal)) {
                loadExample(nVal, dVal);
            } else {
                alert("n must be between 1 and 8. Distance matrix must be n x n.");
            }
        }

        function generateSteps() {
            steps = [];
            const N = n;
            const INF = 9999999;
            let dp = Array(1 << N).fill().map(() => Array(N).fill(INF));
            let best = INF;

            // STEP 0: INIT
            steps.push({
                type: 'init',
                mask: 0,
                end: -1,
                cost: 0,
                dp: dp.map(row => [...row]),
                panel: `TSP DP Bitmask<br>n = <b>${N}</b> cities, start at city 0<br>dp[mask][i] = min cost to visit mask ending at i`,
                statusText: `Initializing dp table`,
                log: `n = ${N}\ndist =\n${dist.map(r => JSON.stringify(r)).join('\n')}\nInitialize dp to INF`,
                logColor: 'var(--text-dim)'
            });

            // Base case
            dp[1 << 0][0] = 0;

            steps.push({
                type: 'base',
                mask: 1 << 0,
                end: 0,
                cost: 0,
                dp: dp.map(row => [...row]),
                panel: `Base case: dp[1 (binary <b>0001</b>)][0] = <b>0</b> (start at city 0)`,
                statusText: `Set base case`,
                log: `  dp[1<<0][0] = 0`,
                logColor: 'var(--accent-green)'
            });

            // Fill DP in order of increasing mask size
            for (let mask = 0; mask < (1 << N); mask++) {
                for (let i = 0; i < N; i++) {
                    if ((mask & (1 << i)) === 0) continue;
                    if (dp[mask][i] === INF) continue;

                    for (let j = 0; j < N; j++) {
                        if (mask & (1 << j)) continue; // already visited

                        let newMask = mask | (1 << j);
                        let newCost = dp[mask][i] + dist[i][j];

                        if (newCost < dp[newMask][j]) {
                            dp[newMask][j] = newCost;

                            steps.push({
                                type: 'update',
                                mask: newMask,
                                end: j,
                                cost: newCost,
                                dp: dp.map(row => [...row]),
                                panel: `From mask <b>${mask.toString(2).padStart(N,'0')}</b> ending at <b>${i}</b> (cost <b>${dp[mask][i]}</b>)<br>→ to city <b>${j}</b> (cost + <b>${dist[i][j]}</b>)<br>New state: mask <b>${newMask.toString(2).padStart(N,'0')}</b>, end <b>${j}</b>, cost <b>${newCost}</b>`,
                                statusText: `Update dp[${newMask}][${j}]`,
                                log: `  dp[${newMask.toString(2).padStart(N,'0')}][${j}] = min(..., ${dp[mask][i]} + ${dist[i][j]}) = ${newCost}`,
                                logColor: 'var(--accent-blue)'
                            });
                        }
                    }
                }
            }

            // Final answer
            let finalMin = INF;
            let bestPathEnd = -1;
            const fullMask = (1 << N) - 1;
            for (let i = 0; i < N; i++) {
                if (dp[fullMask][i] !== INF) {
                    const total = dp[fullMask][i] + dist[i][0];
                    if (total < finalMin) {
                        finalMin = total;
                        bestPathEnd = i;
                    }
                }
            }

            steps.push({
                type: 'final',
                mask: fullMask,
                end: bestPathEnd,
                cost: finalMin,
                dp: dp.map(row => [...row]),
                panel: `Complete tour found!<br>Full mask <b>${fullMask.toString(2).padStart(N,'0')}</b><br>Min cost to return to 0 = <span style="color:var(--accent-green)"><b>${finalMin}</b></span>`,
                statusText: `Final answer = ${finalMin}`,
                log: `\nFinal answer: min over i (dp[${fullMask}][i] + dist[i][0]) = ${finalMin}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: finalMin
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render cities
            const citiesContainer = document.getElementById('cities-container');
            citiesContainer.innerHTML = '';
            for (let i = 0; i < n; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.mask !== undefined && (step.mask & (1 << i)) ? 'visited' : 'idle'}`;
                tile.innerText = i;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `city ${i}`;
                wrapper.append(tile, idxLabel);
                citiesContainer.appendChild(wrapper);
            }

            // Render DP grid
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-grid" style="grid-template-columns: repeat(${n + 1}, 58px);"></div>`;
            const grid = dpContainer.querySelector('.dp-grid');

            // Header row: mask binary | end cities
            const headerRow = document.createElement('div');
            headerRow.style.display = 'contents';
            const maskHeader = document.createElement('div');
            maskHeader.className = 'dp-cell header';
            maskHeader.textContent = 'mask';
            headerRow.appendChild(maskHeader);
            for (let j = 0; j < n; j++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.textContent = j;
                headerRow.appendChild(cell);
            }
            grid.appendChild(headerRow);

            // Rows for each mask
            const currentDP = step.dp;
            for (let mask = 0; mask < (1 << n); mask++) {
                const rowDiv = document.createElement('div');
                rowDiv.style.display = 'contents';
                // Mask header
                const maskCell = document.createElement('div');
                maskCell.className = 'dp-cell header';
                maskCell.textContent = mask.toString(2).padStart(n, '0');
                rowDiv.appendChild(maskCell);

                for (let j = 0; j < n; j++) {
                    let cellVal = currentDP[mask][j];
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${step.mask === mask && step.end === j ? 'current' : ''}`;
                    if (cellVal === 9999999) {
                        cell.textContent = '∞';
                        cell.classList.add('inf');
                    } else {
                        cell.textContent = cellVal;
                    }
                    rowDiv.appendChild(cell);
                }
                grid.appendChild(rowDiv);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-mask').innerText = step.mask !== undefined ? step.mask.toString(2).padStart(n, '0') : '—';
            document.getElementById('val-end').innerText = step.end !== undefined ? step.end : '—';
            document.getElementById('val-prev').innerText = '—';
            document.getElementById('val-cost').innerText = step.cost !== undefined ? step.cost : '—';
            document.getElementById('val-best').innerText = step.cost !== undefined ? step.cost : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
