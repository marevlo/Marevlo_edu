<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum ASCII Delete Sum for Two Strings - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 240px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: VISUAL TILES - s1 and s2 */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 70px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* DP TABLE */
        .dp-wrapper { margin-top: 20px; border: 2px solid var(--border-main); border-radius: 8px; padding: 12px; background: var(--bg-surface); }
        .dp-table { display: grid; gap: 4px; font-family: monospace; font-size: 13px; }
        .dp-cell {
            width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-main); background: #21262d; border-radius: 4px;
            transition: all 0.3s ease;
        }
        .dp-cell.header { background: #000000; font-weight: bold; color: var(--accent-blue); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">s1 =</label>
        <input type="text" id="s1-input" placeholder="sea" value="sea">
        <label class="ui-label" style="margin-left:8px">s2 =</label>
        <input type="text" id="s2-input" placeholder="eat" value="eat">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('sea','eat')">Ex 1</button>
        <button onclick="loadExample('delete','leet')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">s1:</div>
        <div class="tiles-wrapper" id="s1-container"></div>
        
        <div class="ui-label" style="margin-top: 20px;">s2:</div>
        <div class="tiles-wrapper" id="s2-container"></div>
        
        <div class="ui-label" style="margin-top: 30px;">DP Table (min delete sum for prefixes):</div>
        <div class="dp-wrapper" id="dp-wrapper">
            <div class="dp-table" id="dp-table" style="grid-template-columns: repeat(5, 42px);"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">i (s1 prefix)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">j (s2 prefix)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current chars</span>
            <span class="info-value" id="val-chars" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Min cost dp[i][j]</span>
            <span class="info-value" id="val-cost" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">Minimum ASCII delete sum =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:2px solid var(--accent-orange)"></span> s1[i-1]</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:2px solid var(--accent-blue)"></span> s2[j-1]</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:2px solid var(--accent-green)"></span> Match (no cost)</div>
        <div class="legend-item"><span class="dot" style="background:#21262d;border:2px solid var(--border-main);opacity:0.5"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let s1 = "sea";
        let s2 = "eat";
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];

        function generateSteps() {
            steps = [];
            const n = s1.length;
            const m = s2.length;
            let dp = Array.from({ length: n + 1 }, () => Array(m + 1).fill(0));

            // Base cases
            for (let i = 1; i <= n; i++) {
                dp[i][0] = dp[i - 1][0] + s1.charCodeAt(i - 1);
                steps.push({
                    type: 'base-row',
                    i: i,
                    j: 0,
                    dp: dp.map(row => [...row]),
                    panel: `Base case row: dp[${i}][0] = dp[${i-1}][0] + ord('${s1[i-1]}') = ${dp[i][0]}`,
                    statusText: `Base s1 prefix ${i}`,
                    log: `dp[${i}][0] = ${dp[i][0]}`,
                    logColor: 'var(--accent-blue)'
                });
            }
            for (let j = 1; j <= m; j++) {
                dp[0][j] = dp[0][j - 1] + s2.charCodeAt(j - 1);
                steps.push({
                    type: 'base-col',
                    i: 0,
                    j: j,
                    dp: dp.map(row => [...row]),
                    panel: `Base case column: dp[0][${j}] = dp[0][${j-1}] + ord('${s2[j-1]}') = ${dp[0][j]}`,
                    statusText: `Base s2 prefix ${j}`,
                    log: `dp[0][${j}] = ${dp[0][j]}`,
                    logColor: 'var(--accent-blue)'
                });
            }

            // Fill DP table
            for (let i = 1; i <= n; i++) {
                for (let j = 1; j <= m; j++) {
                    let cost = 0;
                    let match = s1[i - 1] === s2[j - 1];
                    if (match) {
                        cost = dp[i - 1][j - 1];
                    } else {
                        cost = Math.min(dp[i - 1][j] + s1.charCodeAt(i - 1), dp[i][j - 1] + s2.charCodeAt(j - 1));
                    }
                    dp[i][j] = cost;

                    steps.push({
                        type: match ? 'match' : 'delete',
                        i: i,
                        j: j,
                        dp: dp.map(row => [...row]),
                        panel: `i=${i} ('${s1[i-1]}'), j=${j} ('${s2[j-1]}')<br>${match ? 'MATCH → no delete' : 'MISMATCH → delete min cost'}<br>dp[${i}][${j}] = <b>${cost}</b>`,
                        statusText: `${match ? 'MATCH' : 'DELETE'} at (${i},${j})`,
                        log: `${match ? 'MATCH' : 'DELETE'} dp[${i}][${j}] = ${cost}`,
                        logColor: match ? 'var(--accent-green)' : 'var(--accent-red)'
                    });
                }
            }

            steps.push({
                type: 'final',
                i: n + 1,
                j: m + 1,
                dp: dp.map(row => [...row]),
                complete: true,
                result: dp[n][m],
                panel: `DP table filled.<br><b>Minimum ASCII delete sum = ${dp[n][m]}</b>`,
                statusText: `Done. Min cost = ${dp[n][m]}`,
                log: `\nFinal result: ${dp[n][m]}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // s1 tiles
            const s1Container = document.getElementById('s1-container');
            s1Container.innerHTML = '';
            for (let k = 0; k < s1.length; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${k < step.i ? 'done' : (k === step.i - 1 ? 'candidate' : 'idle')}`;
                tile.innerText = s1[k];
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${k}]`;
                wrapper.append(tile, idxLabel);
                s1Container.appendChild(wrapper);
            }

            // s2 tiles
            const s2Container = document.getElementById('s2-container');
            s2Container.innerHTML = '';
            for (let k = 0; k < s2.length; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${k < step.j ? 'done' : (k === step.j - 1 ? 'candidate' : 'idle')}`;
                tile.innerText = s2[k];
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${k}]`;
                wrapper.append(tile, idxLabel);
                s2Container.appendChild(wrapper);
            }

            // DP table
            const dpWrapper = document.getElementById('dp-wrapper');
            const table = document.getElementById('dp-table');
            table.innerHTML = '';
            table.style.gridTemplateColumns = `repeat(${s2.length + 1}, 42px)`;

            // Header row
            const headerEmpty = document.createElement('div');
            headerEmpty.className = 'dp-cell header';
            headerEmpty.innerText = '';
            table.appendChild(headerEmpty);
            for (let j = 0; j <= s2.length; j++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.innerText = j === 0 ? '' : s2[j - 1];
                table.appendChild(cell);
            }

            // Rows
            for (let i = 0; i <= s1.length; i++) {
                // Row header
                const rowHeader = document.createElement('div');
                rowHeader.className = 'dp-cell header';
                rowHeader.innerText = i === 0 ? '' : s1[i - 1];
                table.appendChild(rowHeader);

                for (let j = 0; j <= s2.length; j++) {
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${i === step.i && j === step.j ? 'candidate' : ''}`;
                    cell.innerText = step.dp && step.dp[i] ? step.dp[i][j] : '—';
                    if (i === 0 && j === 0) cell.innerText = '0';
                    table.appendChild(cell);
                }
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-i').innerText = step.i !== undefined ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== undefined ? step.j : '—';
            const charInfo = step.i && step.j ? `${s1[step.i-1] || ''} vs ${s2[step.j-1] || ''}` : '—';
            document.getElementById('val-chars').innerText = charInfo;
            document.getElementById('val-cost').innerText = step.dp && step.dp[step.i] ? step.dp[step.i][step.j] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        function loadCustom() {
            const s1Val = document.getElementById('s1-input').value.trim();
            const s2Val = document.getElementById('s2-input').value.trim();
            if (s1Val && s2Val) {
                s1 = s1Val;
                s2 = s2Val;
                generateSteps();
                reset();
            } else {
                alert("Please enter valid strings for s1 and s2.");
            }
        }

        function loadExample(s1Ex, s2Ex) {
            s1 = s1Ex;
            s2 = s2Ex;
            document.getElementById('s1-input').value = s1Ex;
            document.getElementById('s2-input').value = s2Ex;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
