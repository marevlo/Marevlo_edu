<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg Dropping optimized (binary search / monotonicity) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 110px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: DP TABLE */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 24px; width: 100%; max-width: 920px; }
        .dp-wrapper {
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 16px;
            background: var(--bg-surface);
            width: 920px;
            overflow-x: auto;
        }
        .dp-table {
            display: grid;
            gap: 3px;
            font-family: monospace;
            font-size: 13px;
        }
        .dp-cell {
            width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-main); background: #21262d; border-radius: 4px; transition: all 0.3s ease;
            font-weight: 600;
        }
        .dp-cell.header { background: #000000; color: var(--accent-blue); font-size: 11px; height: 28px; }
        .dp-cell.current { background: #2a1600; border-color: var(--accent-orange); transform: scale(1.08); box-shadow: 0 0 12px rgba(227,179,65,0.5); }
        .dp-cell.value { color: var(--accent-green); }

        /* ROW 3: ACTION PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 720px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 100%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">k eggs =</label>
        <input type="number" id="k-input" value="2" style="width:90px">
        <label class="ui-label">n floors =</label>
        <input type="number" id="n-input" value="10" style="width:90px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(2,10)">Ex 1 (4)</button>
        <button onclick="loadExample(3,14)">Ex 2 (4)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">DP table (eggs × floors): min moves needed</div>
        <div class="dp-wrapper">
            <div class="dp-table" id="dp-table"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Eggs (i)</span>
            <span class="info-value" id="val-eggs" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Floors (j)</span>
            <span class="info-value" id="val-floors" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Trial floor (x)</span>
            <span class="info-value" id="val-x" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Moves (worst case)</span>
            <span class="info-value" id="val-moves" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">Minimum moves needed =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-green);"></span> Computed min moves</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange);"></span> Current cell</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple);"></span> Trial floor x</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let k = 2;
        let n = 10;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 350];
        let dp = [];

        function generateSteps() {
            steps = [];
            dp = Array.from({ length: k + 1 }, () => Array(n + 1).fill(Infinity));
            
            // Base cases
            for (let i = 0; i <= k; i++) dp[i][0] = 0;
            for (let j = 0; j <= n; j++) dp[0][j] = Infinity;
            for (let j = 1; j <= n; j++) dp[1][j] = j;

            steps.push({
                type: 'init',
                eggs: 0,
                floors: 0,
                panel: `Initialize DP table (eggs 0-${k}, floors 0-${n})<br>Base cases: dp[i][0]=0, dp[0][j]=∞, dp[1][j]=j`,
                statusText: `DP initialized`,
                log: `dp base cases set`,
                logColor: 'var(--accent-blue)',
                dpSnapshot: dp.map(row => [...row]),
                currentEggs: 0,
                currentFloors: 0,
                currentX: -1
            });

            // Fill table
            for (let i = 2; i <= k; i++) {
                for (let j = 1; j <= n; j++) {
                    steps.push({
                        type: 'start-j',
                        eggs: i,
                        floors: j,
                        panel: `Computing dp[${i}][${j}]`,
                        statusText: `Fill dp[${i}][${j}]`,
                        log: `dp[${i}][${j}]`,
                        logColor: 'var(--accent-orange)',
                        dpSnapshot: dp.map(row => [...row]),
                        currentEggs: i,
                        currentFloors: j,
                        currentX: -1
                    });

                    let minMoves = Infinity;
                    for (let x = 1; x <= j; x++) {
                        const broken = dp[i - 1][x - 1];
                        const notBroken = dp[i][j - x];
                        const moves = 1 + Math.max(broken, notBroken);
                        minMoves = Math.min(minMoves, moves);

                        steps.push({
                            type: 'try-x',
                            eggs: i,
                            floors: j,
                            x: x,
                            broken: broken,
                            notBroken: notBroken,
                            moves: moves,
                            panel: `Trial x=${x}: moves = 1 + max(dp[${i-1}][${x-1}]=${broken}, dp[${i}][${j-x}]=${notBroken}) = ${moves}`,
                            statusText: `x=${x} → ${moves}`,
                            log: `x=${x} → ${moves}`,
                            logColor: 'var(--accent-purple)',
                            dpSnapshot: dp.map(row => [...row]),
                            currentEggs: i,
                            currentFloors: j,
                            currentX: x
                        });
                    }

                    dp[i][j] = minMoves;
                    steps.push({
                        type: 'update',
                        eggs: i,
                        floors: j,
                        minMoves: minMoves,
                        panel: `dp[${i}][${j}] = min over x = ${minMoves}`,
                        statusText: `dp[${i}][${j}] ← ${minMoves}`,
                        log: `dp[${i}][${j}] = ${minMoves}`,
                        logColor: 'var(--accent-green)',
                        dpSnapshot: dp.map(row => [...row]),
                        currentEggs: i,
                        currentFloors: j,
                        currentX: -1
                    });
                }
            }

            steps.push({
                type: 'final',
                complete: true,
                result: dp[k][n],
                panel: `Full DP table completed.<br><b>Minimum moves with ${k} eggs & ${n} floors = ${dp[k][n]}</b>`,
                statusText: `Done. Moves = ${dp[k][n]}`,
                log: `\nFinal result: ${dp[k][n]}`,
                logColor: 'var(--accent-green)',
                bold: true,
                dpSnapshot: dp.map(row => [...row]),
                currentEggs: k,
                currentFloors: n,
                currentX: -1
            });
        }

        function renderDPTable(currentStep) {
            const container = document.getElementById('dp-table');
            container.innerHTML = '';
            const rows = currentStep.dpSnapshot.length;
            const cols = currentStep.dpSnapshot[0].length;

            // Header row for floors
            const headerRow = document.createElement('div');
            headerRow.style.display = 'grid';
            headerRow.style.gridTemplateColumns = `repeat(${cols}, 52px)`;
            headerRow.style.gap = '3px';
            
            let cell = document.createElement('div');
            cell.className = 'dp-cell header';
            cell.innerText = 'eggs\\floors';
            headerRow.appendChild(cell);
            
            for (let j = 0; j <= n; j++) {
                cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.innerText = j;
                headerRow.appendChild(cell);
            }
            container.appendChild(headerRow);

            // Data rows
            for (let i = 0; i < rows; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.style.display = 'grid';
                rowDiv.style.gridTemplateColumns = `repeat(${cols}, 52px)`;
                rowDiv.style.gap = '3px';
                
                cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.innerText = i;
                rowDiv.appendChild(cell);
                
                for (let j = 0; j < cols; j++) {
                    cell = document.createElement('div');
                    const val = currentStep.dpSnapshot[i][j];
                    cell.className = `dp-cell value ${val === Infinity ? 'false' : ''} ${currentStep.currentEggs === i && currentStep.currentFloors === j ? 'current' : ''}`;
                    cell.innerText = val === Infinity ? '∞' : val;
                    rowDiv.appendChild(cell);
                }
                container.appendChild(rowDiv);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            renderDPTable(step);

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-eggs').innerText = step.currentEggs !== undefined ? step.currentEggs : '—';
            document.getElementById('val-floors').innerText = step.currentFloors !== undefined ? step.currentFloors : '—';
            document.getElementById('val-x').innerText = step.currentX !== undefined && step.currentX > 0 ? step.currentX : '—';
            document.getElementById('val-moves').innerText = step.minMoves !== undefined ? step.minMoves : (step.result !== undefined ? step.result : '—');

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        function loadCustom() {
            const kVal = parseInt(document.getElementById('k-input').value);
            const nVal = parseInt(document.getElementById('n-input').value);
            if (!isNaN(kVal) && !isNaN(nVal) && kVal > 0 && nVal >= 0) {
                k = kVal;
                n = nVal;
                generateSteps();
                reset();
            }
        }

        function loadExample(kVal, nVal) {
            k = kVal;
            n = nVal;
            document.getElementById('k-input').value = kVal;
            document.getElementById('n-input').value = nVal;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
