<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangle Minimum Path Sum - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 380px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUAL CONTAINER */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 24px; width: 100%; max-width: 920px; }

        /* TRIANGLE PYRAMID */
        .triangle-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            margin-bottom: 30px;
        }
        .triangle-row {
            display: flex;
            gap: 6px;
        }
        .tile {
            min-width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 17px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227,179,65,0.4); }
        .tile.done { background: #161b22; border-color: var(--border-main); color: var(--text-dim); opacity: 0.85; }

        /* DP TABLE */
        .dp-wrapper {
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 12px;
            background: var(--bg-surface);
            width: 720px;
        }
        .dp-table {
            display: grid;
            gap: 4px;
            font-family: monospace;
            font-size: 13px;
        }
        .dp-cell {
            width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-main); background: #21262d; border-radius: 4px; transition: all 0.3s ease;
        }
        .dp-cell.header { background: #000000; font-weight: bold; color: var(--accent-blue); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 720px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 100%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">triangle =</label>
        <input type="text" id="triangle-input" placeholder="[[2],[3,4],[6,5,7],[4,1,8,3]]" value="[[2],[3,4],[6,5,7],[4,1,8,3]]" style="width:380px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[[2],[3,4],[6,5,7],[4,1,8,3]]')">Ex 1 (11)</button>
        <button onclick="loadExample('[[-1],[2,3],[1,-1,-3]]')">Ex 2 (-1)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Triangle (top to bottom):</div>
        <div class="triangle-wrapper" id="triangle-container"></div>

        <div class="ui-label" style="margin-top: 30px;">DP Table (min path sum from each cell):</div>
        <div class="dp-wrapper">
            <div class="dp-table" id="dp-table"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current cell (i,j)</span>
            <span class="info-value" id="val-cell" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Left child</span>
            <span class="info-value" id="val-left" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Right child</span>
            <span class="info-value" id="val-right" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">dp[i][j]</span>
            <span class="info-value" id="val-dp" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">Minimum path sum =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange);"></span> Current cell</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green);"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let triangle = [[2],[3,4],[6,5,7],[4,1,8,3]];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 350];

        function generateSteps() {
            steps = [];
            const n = triangle.length;
            if (n === 0) return;

            // Create DP copy of triangle (we will modify in-place for visualization)
            let dp = triangle.map(row => [...row]);

            // Base case: last row is already the values
            steps.push({
                type: 'init',
                dp: dp.map(row => [...row]),
                panel: `Base case: bottom row copied to DP table`,
                statusText: `Bottom row initialized`,
                log: `dp[last] = triangle[last]`,
                logColor: 'var(--accent-blue)'
            });

            // Bottom-up from second-last row to top
            for (let i = n - 2; i >= 0; i--) {
                for (let j = 0; j <= i; j++) {
                    const left = dp[i + 1][j];
                    const right = dp[i + 1][j + 1];
                    const minChild = Math.min(left, right);
                    const prev = dp[i][j];
                    dp[i][j] += minChild;

                    steps.push({
                        type: 'update',
                        i: i,
                        j: j,
                        left: left,
                        right: right,
                        dp: dp.map(row => [...row]),
                        panel: `Cell (${i},${j}) = ${prev}<br>Left = ${left}, Right = ${right}<br>dp[${i}][${j}] = ${prev} + min(${left},${right}) = ${dp[i][j]}`,
                        statusText: `(${i},${j}) ← ${dp[i][j]}`,
                        log: `(${i},${j}) = ${dp[i][j]}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            const result = dp[0][0];

            steps.push({
                type: 'final',
                complete: true,
                result: result,
                panel: `All rows processed.<br><b>Minimum path sum = ${result}</b>`,
                statusText: `Done. Min sum = ${result}`,
                log: `\nFinal min sum: ${result}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderTriangle(currentStep) {
            const container = document.getElementById('triangle-container');
            container.innerHTML = '';
            for (let i = 0; i < triangle.length; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'triangle-row';
                for (let j = 0; j <= i; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    if (currentStep.i === i && currentStep.j === j) {
                        tile.classList.add('candidate');
                    }
                    tile.innerText = triangle[i][j];
                    rowDiv.appendChild(tile);
                }
                container.appendChild(rowDiv);
            }
        }

        function renderDPTable(currentStep) {
            const container = document.getElementById('dp-table');
            container.innerHTML = '';
            const n = triangle.length;
            container.style.gridTemplateColumns = `repeat(${n}, 52px)`;

            // Header row for columns
            const emptyHeader = document.createElement('div');
            emptyHeader.className = 'dp-cell header';
            container.appendChild(emptyHeader);
            for (let c = 0; c < n; c++) {
                const h = document.createElement('div');
                h.className = 'dp-cell header';
                h.innerText = c;
                container.appendChild(h);
            }

            for (let r = 0; r < n; r++) {
                const rowHeader = document.createElement('div');
                rowHeader.className = 'dp-cell header';
                rowHeader.innerText = r;
                container.appendChild(rowHeader);

                for (let c = 0; c <= r; c++) {
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${(currentStep.i === r && currentStep.j === c) ? 'candidate' : ''}`;
                    if (currentStep.dp && currentStep.dp[r] && currentStep.dp[r][c] !== undefined) {
                        cell.innerText = currentStep.dp[r][c];
                    } else {
                        cell.innerText = '—';
                    }
                    container.appendChild(cell);
                }
                // Fill empty cells for rectangular grid
                for (let c = r + 1; c < n; c++) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'dp-cell';
                    emptyCell.style.opacity = '0.2';
                    emptyCell.innerText = '—';
                    container.appendChild(emptyCell);
                }
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            renderTriangle(step);
            renderDPTable(step);

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-cell').innerText = step.i !== undefined ? `(${step.i},${step.j})` : '—';
            document.getElementById('val-left').innerText = step.left !== undefined ? step.left : '—';
            document.getElementById('val-right').innerText = step.right !== undefined ? step.right : '—';
            document.getElementById('val-dp').innerText = step.dp && step.i !== undefined && step.j !== undefined ? step.dp[step.i][step.j] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        function loadCustom() {
            const triStr = document.getElementById('triangle-input').value.trim();
            try {
                const parsed = JSON.parse(triStr);
                triangle = parsed;
                generateSteps();
                reset();
            } catch(e) {
                alert("Invalid triangle format. Example: [[2],[3,4],[6,5,7],[4,1,8,3]]");
            }
        }

        function loadExample(triStr) {
            triangle = JSON.parse(triStr);
            document.getElementById('triangle-input').value = triStr;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
