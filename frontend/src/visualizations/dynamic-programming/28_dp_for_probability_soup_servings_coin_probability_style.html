<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP for probability: Soup Servings - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 120px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: STATE TILES (A and B remaining) */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .state-wrapper { display: flex; gap: 40px; justify-content: center; }
        .state-tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .state-label { font-size: 14px; color: var(--text-dim); font-family: monospace; }
        .soup-tile {
            min-width: 110px; height: 110px; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-size: 32px; font-weight: 700; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 4px solid var(--border-main); background: #21262d;
            color: var(--text-main); text-align: center; line-height: 1.1;
        }
        .soup-tile.candidate { border-color: var(--accent-orange); transform: scale(1.12); box-shadow: 0 0 20px rgba(227, 179, 65, 0.5); }
        .soup-tile.winning { border-color: var(--accent-green); box-shadow: 0 0 20px var(--accent-green); }
        .soup-tile.done { opacity: 0.4; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 40px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="number" id="n-input" placeholder="50" value="50">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(50)">Ex 1 (n=50)</button>
        <button onclick="loadExample(100)">Ex 2 (n=100)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label" id="arr-label">Remaining Soup (A / B):</div>
        <div class="state-wrapper">
            <div class="state-tile">
                <div class="state-label">Soup A</div>
                <div class="soup-tile" id="soup-a">—</div>
            </div>
            <div class="state-tile">
                <div class="state-label">Soup B</div>
                <div class="soup-tile" id="soup-b">—</div>
            </div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current State (a,b)</span>
            <span class="info-value" id="val-state" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Probability</span>
            <span class="info-value" id="val-prob" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Operation</span>
            <span class="info-value" id="val-op" style="color: var(--accent-purple);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Probability A empties first =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current state (a,b)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Base case / favorable</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border:1px solid var(--accent-blue)"></span> Branch (operation)</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-red); border:1px solid var(--accent-red)"></span> B empties first</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let n = 50;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample(50); }

        function loadExample(newN) {
            n = parseInt(newN);
            document.getElementById('n-input').value = n;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const nVal = parseInt(document.getElementById('n-input').value);
            if (!isNaN(nVal) && nVal >= 0) {
                n = nVal;
                generateSteps();
                reset();
            } else {
                alert("Please enter valid n (>=0).");
            }
        }

        function generateSteps() {
            steps = [];
            let memo = {};

            function dfs(a, b) {
                const key = `${a},${b}`;
                if (key in memo) {
                    steps.push({
                        type: 'memo-hit',
                        a: a,
                        b: b,
                        prob: memo[key],
                        digitsStates: ['done', 'done'],
                        panel: `<span style="color:var(--accent-purple)">Memo hit: P(${a},${b}) = <b>${memo[key].toFixed(4)}</b></span>`,
                        statusText: `Memo P(${a},${b})`,
                        log: `  Memo hit P(${a},${b}) = ${memo[key].toFixed(4)}`,
                        logColor: 'var(--accent-purple)'
                    });
                    return memo[key];
                }

                const states = ['candidate', 'candidate'];

                steps.push({
                    type: 'call',
                    a: a,
                    b: b,
                    prob: null,
                    digitsStates: states,
                    panel: `Call <code>dfs(${a}, ${b})</code>`,
                    statusText: `dfs(${a}, ${b})`,
                    log: `Call dfs(${a}, ${b})`,
                    logColor: 'var(--text-dim)'
                });

                if (a <= 0 && b <= 0) {
                    const p = 0.5;
                    memo[key] = p;
                    steps.push({
                        type: 'base',
                        a: a,
                        b: b,
                        prob: p,
                        digitsStates: states,
                        panel: `<span style="color:var(--accent-green)">Base: both ≤0 → <b>0.5</b></span>`,
                        statusText: `Base both empty = 0.5`,
                        log: `  Base both = 0.5`,
                        logColor: 'var(--accent-green)'
                    });
                    return p;
                }
                if (a <= 0) {
                    const p = 1;
                    memo[key] = p;
                    steps.push({
                        type: 'base',
                        a: a,
                        b: b,
                        prob: p,
                        digitsStates: states,
                        panel: `<span style="color:var(--accent-green)">Base: A ≤0 → <b>1.0</b></span>`,
                        statusText: `Base A empty = 1.0`,
                        log: `  Base A empty = 1.0`,
                        logColor: 'var(--accent-green)'
                    });
                    return p;
                }
                if (b <= 0) {
                    const p = 0;
                    memo[key] = p;
                    steps.push({
                        type: 'base',
                        a: a,
                        b: b,
                        prob: p,
                        digitsStates: states,
                        panel: `<span style="color:var(--accent-red)">Base: B ≤0 → <b>0.0</b></span>`,
                        statusText: `Base B empty = 0.0`,
                        log: `  Base B empty = 0.0`,
                        logColor: 'var(--accent-red)'
                    });
                    return p;
                }

                // 4 operations
                const ops = [[100,0], [75,25], [50,50], [25,75]];
                let total = 0;

                for (let k = 0; k < 4; k++) {
                    const [da, db] = ops[k];
                    const na = a - da;
                    const nb = b - db;

                    steps.push({
                        type: 'branch',
                        a: a,
                        b: b,
                        op: k,
                        prob: null,
                        digitsStates: states,
                        panel: `Operation ${k+1}: (${da},${db}) → (${na},${nb})`,
                        statusText: `Op ${k+1} (${da},${db})`,
                        log: `  Op ${k+1} → (${na},${nb})`,
                        logColor: 'var(--accent-blue)'
                    });

                    const sub = dfs(na, nb);
                    total += sub;
                }

                const res = total / 4;
                memo[key] = res;

                steps.push({
                    type: 'return',
                    a: a,
                    b: b,
                    prob: res,
                    digitsStates: states,
                    panel: `Average of 4 branches = <b>${res.toFixed(5)}</b>`,
                    statusText: `Return ${res.toFixed(5)}`,
                    log: `  Return ${res.toFixed(5)}`,
                    logColor: 'var(--accent-purple)'
                });

                return res;
            }

            const finalProb = dfs(n, n);

            steps.push({
                type: 'final',
                a: 0,
                b: 0,
                prob: finalProb,
                digitsStates: ['winning', 'winning'],
                panel: `All paths explored.<br><b>Probability A empties first = ${finalProb.toFixed(5)}</b>`,
                complete: true,
                result: finalProb,
                statusText: `Done. Probability = ${finalProb.toFixed(5)}`,
                log: `\nFinal probability = ${finalProb.toFixed(5)}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Soup A tile
            const aTile = document.getElementById('soup-a');
            const bTile = document.getElementById('soup-b');
            aTile.className = `soup-tile ${step.digitsStates[0]}`;
            bTile.className = `soup-tile ${step.digitsStates[1]}`;
            aTile.innerText = step.a;
            bTile.innerText = step.b;

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-state').innerText = `(${step.a}, ${step.b})`;
            document.getElementById('val-prob').innerText = step.prob !== null ? step.prob.toFixed(5) : '—';
            document.getElementById('val-op').innerText = step.op !== undefined ? `Op ${step.op + 1}` : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result.toFixed(5);
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
