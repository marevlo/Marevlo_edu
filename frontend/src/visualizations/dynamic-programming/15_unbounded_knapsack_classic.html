<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unbounded Knapsack (classic) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 220px;
        }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 100px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .items-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 110px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 14px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main); line-height: 1.1;
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); }
        .tile.added { background: #0d2244; border-color: var(--accent-blue); color: var(--accent-blue); transform: scale(1.08); }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); }
        .tile.past { opacity: 0.35; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* DP BAR */
        .dp-bar {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            max-width: 920px;
            overflow-x: auto;
            padding: 8px;
            background: var(--bg-surface);
            border-radius: 8px;
            border: 1px solid var(--border-main);
        }
        .dp-tile {
            min-width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 18px; font-weight: 700; font-family: monospace;
            border: 2px solid var(--border-main); background: #21262d;
            color: var(--accent-blue); transition: all 0.3s ease;
        }
        .dp-tile.updated { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.12); box-shadow: 0 0 12px var(--accent-green); }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 85px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">weights =</label>
        <input type="text" id="weights-input" value="[2,3]" style="width:180px">
        <label class="ui-label">values =</label>
        <input type="text" id="values-input" value="[10,20]" style="width:180px">
        <label class="ui-label">capacity =</label>
        <input type="number" id="capacity-input" value="5" style="width:80px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([2,3],[10,20],5)">Ex 1 (30)</button>
        <button onclick="loadExample([1,2],[1,5],4)">Ex 2 (10)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Items (weight / value):</div>
        <div class="items-wrapper" id="items-container"></div>
        
        <div class="ui-label" style="margin-top:25px;">DP Array (max value for capacity w):</div>
        <div class="dp-bar" id="dp-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current w</span>
            <span class="info-value" id="val-w" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Item</span>
            <span class="info-value" id="val-item" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Include?</span>
            <span class="info-value" id="val-include" style="color: var(--accent-green);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">New Value</span>
            <span class="info-value" id="val-new" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Maximum Value =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current w</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Updated dp[w]</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border:1px solid var(--accent-blue)"></span> Being considered</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Previous</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputWeights = [2,3];
        let inputValues = [10,20];
        let inputCapacity = 5;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];

        function init() { loadExample([2,3], [10,20], 5); }

        function loadExample(w, v, cap) {
            inputWeights = w;
            inputValues = v;
            inputCapacity = cap;
            document.getElementById('weights-input').value = JSON.stringify(w);
            document.getElementById('values-input').value = JSON.stringify(v);
            document.getElementById('capacity-input').value = cap;
            generateSteps();
            reset();
        }

        function loadCustom() {
            let w, v;
            try {
                w = JSON.parse(document.getElementById('weights-input').value);
                v = JSON.parse(document.getElementById('values-input').value);
            } catch(e) {
                alert("Please enter valid arrays for weights and values.");
                return;
            }
            const cap = parseInt(document.getElementById('capacity-input').value);
            if (Array.isArray(w) && Array.isArray(v) && !isNaN(cap) && cap >= 0) {
                loadExample(w, v, cap);
            } else {
                alert("Invalid input.");
            }
        }

        function generateSteps() {
            steps = [];
            const weights = [...inputWeights];
            const values = [...inputValues];
            const n = weights.length;
            const W = inputCapacity;

            // STEP 0: INIT
            let dp = Array(W + 1).fill(0);
            steps.push({
                type: 'init',
                w: null,
                itemIdx: null,
                dp: [...dp],
                panel: `Unbounded Knapsack DP<br>n = ${n} items, W = ${W}<br>dp[w] = max value for capacity w (unlimited items)`,
                statusText: `Initializing dp[0..${W}] = [0, 0, ..., 0]`,
                log: `weights = [${weights}]\nvalues = [${values}]\nW = ${W}\nInitialize dp = [0]*(W+1)`,
                logColor: 'var(--text-dim)'
            });

            // For each capacity w from 1 to W
            for (let w = 1; w <= W; w++) {
                steps.push({
                    type: 'start-w',
                    w: w,
                    itemIdx: null,
                    dp: [...dp],
                    panel: `Processing capacity <b>${w}</b>`,
                    statusText: `w = ${w}`,
                    log: `\n--- Capacity w = ${w} ---`,
                    logColor: 'var(--accent-orange)'
                });

                for (let idx = 0; idx < n; idx++) {
                    const wi = weights[idx];
                    const vi = values[idx];

                    if (wi > w) {
                        steps.push({
                            type: 'skip',
                            w: w,
                            itemIdx: idx,
                            dp: [...dp],
                            panel: `Item <b>${idx}</b> (w=${wi}, v=${vi}): weight > capacity, skip`,
                            statusText: `Skip item ${idx}`,
                            log: `  Item ${idx}: ${wi} > ${w}, skip`,
                            logColor: 'var(--text-dim)'
                        });
                        continue;
                    }

                    const prev = dp[w];
                    const includeVal = vi + dp[w - wi];
                    const newVal = Math.max(prev, includeVal);

                    steps.push({
                        type: 'update',
                        w: w,
                        itemIdx: idx,
                        dp: [...dp],
                        panel: `Item <b>${idx}</b> (w=${wi}, v=${vi})<br>Current dp[${w}] = <b>${prev}</b><br>Include: <b>${vi}</b> + dp[${w}-${wi}] = <b>${dp[w-wi]}</b> = <b>${includeVal}</b><br>New dp[${w}] = <span style="color:var(--accent-green)">${newVal}</span>`,
                        statusText: `Update w=${w} with item ${idx}`,
                        log: `  Item ${idx}: max(${prev}, ${dp[w-wi]} + ${vi}) = ${newVal}`,
                        logColor: 'var(--accent-blue)'
                    });

                    dp[w] = newVal;
                }
            }

            // FINAL
            steps.push({
                type: 'final',
                w: W,
                itemIdx: n,
                dp: [...dp],
                panel: `All capacities processed.<br>Maximum value for capacity <b>${W}</b> = <span style="color:var(--accent-green)"><b>${dp[W]}</b></span>`,
                statusText: `Done. Max value = ${dp[W]}`,
                log: `\nFinal dp[${W}] = ${dp[W]}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: dp[W]
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render items
            const itemsContainer = document.getElementById('items-container');
            itemsContainer.innerHTML = '';
            inputWeights.forEach((w, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.itemIdx === i ? 'candidate' : (step.w !== null && i < step.itemIdx ? 'past' : 'idle')}`;
                tile.innerHTML = `<span style="font-size:13px">item ${i}</span><br>w=<b>${w}</b><br>v=<b>${inputValues[i]}</b>`;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `item ${i}`;
                wrapper.append(tile, idxLabel);
                itemsContainer.appendChild(wrapper);
            });

            // Render DP bar
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = '';
            step.dp.forEach((val, w) => {
                const tile = document.createElement('div');
                tile.className = `dp-tile ${step.w === w ? 'updated' : ''}`;
                tile.innerText = val;
                const idx = document.createElement('div');
                idx.style.fontSize = '10px';
                idx.style.color = 'var(--text-dim)';
                idx.innerText = w;
                const unit = document.createElement('div');
                unit.style.textAlign = 'center';
                unit.append(tile, idx);
                dpContainer.appendChild(unit);
            });

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-w').innerText = step.w !== null ? step.w : '—';
            document.getElementById('val-item').innerText = step.itemIdx !== null ? step.itemIdx : '—';
            document.getElementById('val-include').innerText = step.type === 'update' ? 'updating...' : '—';
            document.getElementById('val-new').innerText = step.w !== null ? step.dp[step.w] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
