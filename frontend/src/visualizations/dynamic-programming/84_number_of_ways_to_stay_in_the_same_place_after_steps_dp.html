<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number of ways to stay in the same place after steps (DP) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 110px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: POSITIONS TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 24px; width: 100%; max-width: 920px; }
        .positions-wrapper {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tile {
            min-width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 17px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile.current { border-color: var(--accent-orange); box-shadow: 0 0 12px rgba(227,179,65,0.4); transform: scale(1.15); }

        /* ROW 3: DP ROW (current step ways) */
        .dp-wrapper {
            border: 2px solid var(--border-main);
            border-radius: 8px;
            padding: 12px;
            background: var(--bg-surface);
            width: 720px;
        }
        .dp-row {
            display: flex;
            gap: 4px;
            justify-content: center;
        }
        .dp-tile {
            min-width: 42px; height: 42px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 4px; font-size: 13px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .dp-tile.true { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .dp-tile.header { background: #000000; font-size: 10px; height: 24px; }

        /* ROW 4: ACTION PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 720px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 5: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 6: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 7: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 8: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 9: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 10: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 100%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">steps =</label>
        <input type="number" id="steps-input" value="3" style="width:80px">
        <label class="ui-label">arrLen =</label>
        <input type="number" id="arrlen-input" value="2" style="width:80px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(2,3)">Ex 1 (4)</button>
        <button onclick="loadExample(3,2)">Ex 2 (4)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Positions (0 to limit-1):</div>
        <div class="positions-wrapper" id="positions-container"></div>

        <div class="ui-label" style="margin-top:24px">Ways to be at each position after current step:</div>
        <div class="dp-wrapper">
            <div class="dp-row" id="dp-row"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current step</span>
            <span class="info-value" id="val-step" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Position</span>
            <span class="info-value" id="val-pos" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Ways added from stay/left/right</span>
            <span class="info-value" id="val-ways" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">Ways to stay at index 0 =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-green);"></span> Ways at position</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange);"></span> Current position</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let stepsInput = 3;
        let arrLenInput = 2;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1600, 800, 350];
        let limit = 0;
        let dp = [];
        let MOD = 1000000007;

        function generateSteps() {
            steps = [];
            limit = Math.min(stepsInput, arrLenInput);

            // Initialize dp for step 0
            dp = new Array(limit).fill(0);
            dp[0] = 1;

            steps.push({
                type: 'init',
                step: 0,
                panel: `Initial state (step 0): 1 way at position 0<br>limit = min(steps=${stepsInput}, arrLen=${arrLenInput}) = ${limit}`,
                statusText: `Step 0 initialized`,
                log: `dp = [1, 0, ..., 0]`,
                logColor: 'var(--accent-blue)',
                dpSnapshot: [...dp]
            });

            for (let s = 1; s <= stepsInput; s++) {
                const newDp = new Array(limit).fill(0);
                steps.push({
                    type: 'new-step',
                    step: s,
                    panel: `Starting step ${s}`,
                    statusText: `Processing step ${s}`,
                    log: `step ${s}`,
                    logColor: 'var(--accent-orange)',
                    dpSnapshot: [...dp]
                });

                for (let pos = 0; pos < limit; pos++) {
                    let val = dp[pos]; // stay
                    if (pos > 0) val = (val + dp[pos - 1]) % MOD; // from left
                    if (pos + 1 < limit) val = (val + dp[pos + 1]) % MOD; // from right

                    newDp[pos] = val;

                    steps.push({
                        type: 'update-pos',
                        step: s,
                        pos: pos,
                        val: val,
                        panel: `Position ${pos}: stay(${dp[pos]}) + left(${pos>0 ? dp[pos-1] : 0}) + right(${pos+1<limit ? dp[pos+1] : 0}) = ${val}`,
                        statusText: `pos ${pos} → ${val}`,
                        log: `pos ${pos} = ${val}`,
                        logColor: 'var(--accent-green)',
                        dpSnapshot: [...newDp]
                    });
                }

                dp = newDp;
                steps.push({
                    type: 'step-complete',
                    step: s,
                    panel: `Completed step ${s}<br>dp = [${dp.join(', ')}]`,
                    statusText: `Step ${s} complete`,
                    log: `step ${s} done`,
                    logColor: 'var(--accent-purple)',
                    dpSnapshot: [...dp]
                });
            }

            steps.push({
                type: 'final',
                complete: true,
                result: dp[0],
                panel: `All steps completed.<br><b>Ways to stay at index 0 = ${dp[0]}</b>`,
                statusText: `Final result: ${dp[0]}`,
                log: `\nFinal ways at 0: ${dp[0]}`,
                logColor: 'var(--accent-green)',
                bold: true,
                dpSnapshot: [...dp]
            });
        }

        function renderPositions(currentStep) {
            const container = document.getElementById('positions-container');
            container.innerHTML = '';
            for (let p = 0; p < limit; p++) {
                const tile = document.createElement('div');
                tile.className = `tile ${currentStep.dpSnapshot && currentStep.dpSnapshot[p] > 0 ? 'current' : ''}`;
                tile.innerText = p;
                container.appendChild(tile);
            }
        }

        function renderDPRow(currentStep) {
            const container = document.getElementById('dp-row');
            container.innerHTML = '';
            // Header
            let header = document.createElement('div');
            header.className = 'dp-tile header';
            header.innerText = 'POS';
            container.appendChild(header);
            for (let p = 0; p < limit; p++) {
                let tile = document.createElement('div');
                tile.className = 'dp-tile header';
                tile.innerText = p;
                container.appendChild(tile);
            }
            // Data row
            for (let p = 0; p < limit; p++) {
                let tile = document.createElement('div');
                tile.className = `dp-tile ${currentStep.dpSnapshot && currentStep.dpSnapshot[p] > 0 ? 'true' : 'false'}`;
                tile.innerText = currentStep.dpSnapshot ? currentStep.dpSnapshot[p] : '0';
                container.appendChild(tile);
            }
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            renderPositions(step);
            renderDPRow(step);

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        function loadCustom() {
            const stepsVal = parseInt(document.getElementById('steps-input').value);
            const arrLenVal = parseInt(document.getElementById('arrlen-input').value);
            if (!isNaN(stepsVal) && !isNaN(arrLenVal) && stepsVal >= 0 && arrLenVal >= 1) {
                stepsInput = stepsVal;
                arrLenInput = arrLenVal;
                generateSteps();
                reset();
            }
        }

        function loadExample(stepsVal, arrLenVal) {
            stepsInput = stepsVal;
            arrLenInput = arrLenVal;
            document.getElementById('steps-input').value = stepsVal;
            document.getElementById('arrlen-input').value = arrLenVal;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
