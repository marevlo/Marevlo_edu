<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortest Hamiltonian Path DP - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 320px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: VERTICES TILES */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 54px; height: 54px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 22px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 40px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="number" id="n-input" placeholder="3" value="3">
        <label class="ui-label" style="margin-left:8px">dist =</label>
        <input type="text" id="dist-input" placeholder="[[0,1,3],[1,0,2],[3,2,0]]" value="[[0,1,3],[1,0,2],[3,2,0]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(3,'[[0,1,3],[1,0,2],[3,2,0]]')">Ex 1 (n=3)</button>
        <button onclick="loadExample(4,'[[0,2,9,10],[2,0,6,4],[9,6,0,8],[10,4,8,0]]')">Ex 2 (n=4)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label" id="arr-label">Vertices (0 to n-1):</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Mask</span>
            <span class="info-value" id="val-mask" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">End Vertex (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Next Vertex (j)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">New Cost</span>
            <span class="info-value" id="val-cost" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Shortest path cost =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Visited in mask</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Current end vertex</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-purple); border:1px solid var(--accent-purple)"></span> Next vertex j</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let n = 3;
        let dist = [[0,1,3],[1,0,2],[3,2,0]];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];
        let INF = 999999;

        function init() { loadExample(3, "[[0,1,3],[1,0,2],[3,2,0]]"); }

        function loadExample(newN, distStr) {
            n = parseInt(newN);
            dist = JSON.parse(distStr);
            document.getElementById('n-input').value = n;
            document.getElementById('dist-input').value = JSON.stringify(dist);
            generateSteps();
            reset();
        }

        function loadCustom() {
            const nVal = parseInt(document.getElementById('n-input').value);
            const distStr = document.getElementById('dist-input').value.trim();
            if (!isNaN(nVal) && nVal > 0 && distStr) {
                try {
                    const parsedDist = JSON.parse(distStr);
                    if (Array.isArray(parsedDist) && parsedDist.length === nVal && parsedDist.every(row => Array.isArray(row) && row.length === nVal)) {
                        n = nVal;
                        dist = parsedDist;
                        generateSteps();
                        reset();
                    } else {
                        alert("Dist matrix must be n x n square array.");
                    }
                } catch(e) {
                    alert("Invalid dist matrix JSON.");
                }
            } else {
                alert("Please enter valid n and dist matrix.");
            }
        }

        function generateSteps() {
            steps = [];

            // DP[mask][i] = min cost to reach mask ending at i
            let DP = Array.from({ length: 1 << n }, () => Array(n).fill(INF));
            for (let i = 0; i < n; i++) {
                DP[1 << i][i] = 0;
            }

            // Record initialization
            steps.push({
                type: 'init',
                mask: 0,
                i: -1,
                j: -1,
                cost: 0,
                digitsStates: Array(n).fill('idle'),
                panel: `Initialize DP table.<br>DP[1<<i][i] = 0 for each starting vertex i.`,
                statusText: `DP initialization`,
                log: `Initialize single-vertex masks`,
                logColor: 'var(--text-dim)'
            });

            // Process masks in order
            for (let mask = 0; mask < (1 << n); mask++) {
                for (let i = 0; i < n; i++) {
                    if ((mask & (1 << i)) === 0) continue;
                    if (DP[mask][i] === INF) continue;

                    steps.push({
                        type: 'process',
                        mask: mask,
                        i: i,
                        j: -1,
                        cost: DP[mask][i],
                        digitsStates: Array.from({ length: n }, (_, idx) => ((mask & (1 << idx)) ? 'done' : 'idle')),
                        panel: `Processing mask <b>${mask.toString(2).padStart(n,'0')}</b> ending at vertex <b>${i}</b> (cost = ${DP[mask][i]})`,
                        statusText: `mask=${mask.toString(2).padStart(n,'0')}, i=${i}`,
                        log: `Process mask=${mask.toString(2).padStart(n,'0')} ending at ${i}`,
                        logColor: 'var(--accent-blue)'
                    });

                    for (let j = 0; j < n; j++) {
                        if ((mask & (1 << j)) !== 0) continue;
                        const newMask = mask | (1 << j);
                        const newCost = DP[mask][i] + dist[i][j];

                        if (newCost < DP[newMask][j]) {
                            const prev = DP[newMask][j];
                            DP[newMask][j] = newCost;

                            steps.push({
                                type: 'update',
                                mask: newMask,
                                i: i,
                                j: j,
                                cost: newCost,
                                digitsStates: Array.from({ length: n }, (_, idx) => ((newMask & (1 << idx)) ? 'done' : 'idle')),
                                panel: `Extend path: from <b>${i}</b> to <b>${j}</b><br>Cost = ${DP[mask][i]} + dist[${i}][${j}] = ${newCost}`,
                                statusText: `Update DP[${newMask.toString(2).padStart(n,'0')}][${j}] = ${newCost}`,
                                log: `  Update mask=${newMask.toString(2).padStart(n,'0')} ending ${j}: ${prev} → ${newCost}`,
                                logColor: 'var(--accent-green)'
                            });
                        }
                    }
                }
            }

            // Find minimum
            let minCost = INF;
            let bestEnd = -1;
            for (let i = 0; i < n; i++) {
                if (DP[(1 << n) - 1][i] < minCost) {
                    minCost = DP[(1 << n) - 1][i];
                    bestEnd = i;
                }
            }
            if (minCost === INF) minCost = -1; // though examples are connected

            steps.push({
                type: 'final',
                mask: (1 << n) - 1,
                i: bestEnd,
                j: -1,
                cost: minCost,
                digitsStates: Array(n).fill('winning'),
                panel: `All subsets processed.<br>Minimum path cost = <b>${minCost}</b>`,
                complete: true,
                result: minCost,
                statusText: `Done. Shortest path = ${minCost}`,
                log: `\nFinal min cost: ${minCost}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            
            step.digitsStates.forEach((state, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                
                const tile = document.createElement('div');
                tile.className = `tile ${state}`;
                tile.innerText = i;
                
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${i}]`;
                
                wrapper.append(tile, idxLabel);

                // Highlight current i and j
                if (step.i === i) {
                    tile.classList.add('candidate');
                }
                if (step.j === i) {
                    tile.classList.add('winning');
                }

                container.appendChild(wrapper);
            });

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-mask').innerText = step.mask !== undefined ? step.mask.toString(2).padStart(n, '0') : '—';
            document.getElementById('val-i').innerText = step.i !== undefined ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== undefined ? step.j : '—';
            document.getElementById('val-cost').innerText = step.cost !== undefined ? step.cost : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
