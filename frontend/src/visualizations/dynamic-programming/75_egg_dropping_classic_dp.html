<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg Dropping (classic DP) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 80px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        
        /* DP GRID */
        .dp-container { 
            margin-top: 20px;
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
            width: 920px;
            overflow-x: auto;
        }
        .dp-grid {
            display: grid;
            gap: 4px;
            font-family: monospace;
        }
        .dp-cell {
            width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            border: 2px solid var(--border-main);
            background: #21262d;
            color: var(--accent-blue);
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        .dp-cell.current { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-green); }
        .dp-cell.header { background: var(--bg-surface); color: var(--text-dim); font-size: 11px; height: 24px; }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 110px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">eggs (k) =</label>
        <input type="number" id="k-input" value="2" min="1" style="width:80px">
        <label class="ui-label">floors (n) =</label>
        <input type="number" id="n-input" value="10" min="1" style="width:80px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(2,10)">Ex 1 → 4</button>
        <button onclick="loadExample(1,5)">Ex 2 → 5</button>
        <button onclick="loadExample(3,14)">Ex 3 → 4</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">DP Table — dp[eggs][floors] = min worst-case attempts</div>
        <div class="dp-container" id="dp-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current eggs (e)</span>
            <span class="info-value" id="val-e" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current floors (f)</span>
            <span class="info-value" id="val-f" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current drop floor (x)</span>
            <span class="info-value" id="val-x" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Min attempts</span>
            <span class="info-value" id="val-attempts" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Minimum worst-case attempts =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Current cell</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let currentK = 2;
        let currentN = 10;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];
        let dp = [];

        function init() {
            loadExample(2, 10);
        }

        function loadExample(k, n) {
            currentK = k;
            currentN = n;
            document.getElementById('k-input').value = k;
            document.getElementById('n-input').value = n;
            generateSteps();
            reset();
        }

        function loadCustom() {
            const k = parseInt(document.getElementById('k-input').value);
            const n = parseInt(document.getElementById('n-input').value);
            if (isNaN(k) || isNaN(n) || k < 1 || n < 0) {
                alert("Please enter valid k (>=1) and n (>=0)");
                return;
            }
            loadExample(k, n);
        }

        function generateSteps() {
            steps = [];
            const k = currentK;
            const n = currentN;

            // Initialize dp[e+1][n+1]
            dp = Array.from({length: k + 1}, () => Array(n + 1).fill(0));

            steps.push({
                type: 'init',
                e: -1,
                f: -1,
                x: -1,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `Egg Dropping Classic DP — Tabulation<br>k = ${k} eggs, n = ${n} floors`,
                statusText: `Initialize dp table`,
                log: `Base cases: dp[*][0]=0, dp[1][*]=floors, dp[*][1]=1`,
                logColor: 'var(--text-dim)'
            });

            // Base cases
            for (let e = 0; e <= k; e++) {
                dp[e][0] = 0;
            }
            for (let f = 0; f <= n; f++) {
                dp[1][f] = f;
            }
            for (let e = 2; e <= k; e++) {
                dp[e][1] = 1;
            }

            steps.push({
                type: 'base-cases',
                e: -1,
                f: -1,
                x: -1,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `Base cases set: dp[1][f] = f, dp[e][0] = 0, dp[e][1] = 1`,
                statusText: `Base cases initialized`,
                log: `dp table base cases filled`,
                logColor: 'var(--accent-green)'
            });

            // Fill the table
            for (let e = 2; e <= k; e++) {
                for (let f = 2; f <= n; f++) {
                    let minAttempts = Infinity;
                    steps.push({
                        type: 'start-cell',
                        e: e,
                        f: f,
                        x: -1,
                        dpSnapshot: JSON.parse(JSON.stringify(dp)),
                        panel: `Computing dp[${e}][${f}]`,
                        statusText: `e=${e}, f=${f}`,
                        log: `\n--- dp[${e}][${f}] ---`,
                        logColor: 'var(--accent-orange)'
                    });

                    for (let x = 1; x <= f; x++) {
                        let breaks = dp[e - 1][x - 1];
                        let noBreak = dp[e][f - x];
                        let worst = 1 + Math.max(breaks, noBreak);

                        steps.push({
                            type: 'try-x',
                            e: e,
                            f: f,
                            x: x,
                            dpSnapshot: JSON.parse(JSON.stringify(dp)),
                            panel: `Drop at floor x=${x}<br>if breaks: dp[${e-1}][${x-1}] = ${breaks}<br>if not: dp[${e}][${f-x}] = ${noBreak}<br>worst = 1 + max(${breaks}, ${noBreak}) = ${worst}`,
                            statusText: `x=${x}`,
                            log: `x=${x}: max(${breaks}, ${noBreak}) +1 = ${worst}`,
                            logColor: 'var(--accent-green)'
                        });

                        if (worst < minAttempts) {
                            minAttempts = worst;
                        }
                    }

                    dp[e][f] = minAttempts;

                    steps.push({
                        type: 'update-cell',
                        e: e,
                        f: f,
                        x: -1,
                        dpSnapshot: JSON.parse(JSON.stringify(dp)),
                        panel: `dp[${e}][${f}] = ${minAttempts}`,
                        statusText: `dp[${e}][${f}] updated`,
                        log: `Final min for dp[${e}][${f}] = ${minAttempts}`,
                        logColor: 'var(--accent-blue)'
                    });
                }
            }

            const result = dp[k][n];
            steps.push({
                type: 'final',
                e: k,
                f: n,
                x: -1,
                dpSnapshot: JSON.parse(JSON.stringify(dp)),
                panel: `DP table complete.<br>Minimum worst-case attempts = <span style="color:var(--accent-green)"><b>${result}</b></span>`,
                statusText: `Final answer = ${result}`,
                log: `\nFinal dp[${k}][${n}] = ${result}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: result
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render DP grid
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = `<div class="dp-grid" style="grid-template-columns: repeat(${currentN + 1}, 58px);"></div>`;
            const grid = dpContainer.querySelector('.dp-grid');

            // Header row: floors
            const headerRow = document.createElement('div');
            headerRow.style.display = 'grid';
            headerRow.style.gridTemplateColumns = `repeat(${currentN + 1}, 58px)`;
            headerRow.style.gap = '4px';
            const emptyHeader = document.createElement('div');
            emptyHeader.className = 'dp-cell header';
            headerRow.appendChild(emptyHeader);
            for (let f = 0; f <= currentN; f++) {
                const cell = document.createElement('div');
                cell.className = 'dp-cell header';
                cell.textContent = f;
                headerRow.appendChild(cell);
            }
            grid.appendChild(headerRow);

            // DP rows for eggs 0 to k
            const currentDP = step.dpSnapshot || dp;
            for (let e = 0; e <= currentK; e++) {
                const rowDiv = document.createElement('div');
                rowDiv.style.display = 'grid';
                rowDiv.style.gridTemplateColumns = `repeat(${currentN + 1}, 58px)`;
                rowDiv.style.gap = '4px';
                // eggs header
                const eHeader = document.createElement('div');
                eHeader.className = 'dp-cell header';
                eHeader.textContent = e;
                rowDiv.appendChild(eHeader);
                for (let f = 0; f <= currentN; f++) {
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${step.e === e && step.f === f ? 'current' : ''}`;
                    cell.innerHTML = `<div>${currentDP[e][f]}</div>`;
                    rowDiv.appendChild(cell);
                }
                grid.appendChild(rowDiv);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-e').innerText = step.e !== -1 ? step.e : '—';
            document.getElementById('val-f').innerText = step.f !== -1 ? step.f : '—';
            document.getElementById('val-x').innerText = step.x !== -1 ? step.x : '—';
            document.getElementById('val-attempts').innerText = step.e !== -1 && step.f !== -1 ? currentDP[step.e][step.f] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
