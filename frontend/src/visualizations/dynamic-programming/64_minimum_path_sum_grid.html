<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Path Sum (grid) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 380px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: GRID + DP TABLE */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .grid-wrapper, .dp-wrapper { 
            border: 2px solid var(--border-main); 
            border-radius: 8px; 
            padding: 12px; 
            background: var(--bg-surface); 
            width: 680px; 
        }
        .grid, .dp-table { 
            display: grid; 
            gap: 4px; 
            font-family: monospace; 
            font-size: 13px; 
        }
        .cell {
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-main); background: #21262d; border-radius: 4px; transition: all 0.3s ease;
            font-weight: 600;
        }
        .cell.start { background: #3fb950; color: white; }
        .cell.candidate { background: #e3b341; color: #161b22; transform: scale(1.1); }
        .cell.done { opacity: 0.8; }

        /* DP TABLE */
        .dp-table { display: grid; gap: 4px; font-family: monospace; font-size: 13px; }
        .dp-cell {
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-main); background: #21262d; border-radius: 4px; transition: all 0.3s ease;
        }
        .dp-cell.header { background: #000000; font-weight: bold; color: var(--accent-blue); }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 30px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 12px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 22px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 30px !important; text-shadow: 0 0 15px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.3em; text-align: center; width: 620px; }

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">grid =</label>
        <input type="text" id="grid-input" placeholder="[[1,3,1],[1,5,1],[4,2,1]]" value="[[1,3,1],[1,5,1],[4,2,1]]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample('[[1,3,1],[1,5,1],[4,2,1]]')">Ex 1</button>
        <button onclick="loadExample('[[1,2,3],[4,5,6]]')">Ex 2</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Grid:</div>
        <div class="grid-wrapper">
            <div class="grid" id="grid" style="grid-template-columns: repeat(3, 48px);"></div>
        </div>
        
        <div class="ui-label" style="margin-top: 30px;">DP Table (min path sum to each cell):</div>
        <div class="dp-wrapper">
            <div class="dp-table" id="dp-table"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current cell (i,j)</span>
            <span class="info-value" id="val-cell" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">From above</span>
            <span class="info-value" id="val-above" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">From left</span>
            <span class="info-value" id="val-left" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">dp[i][j]</span>
            <span class="info-value" id="val-dp" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 6px;">Minimum path sum =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px;">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--accent-orange);"></span> Current cell</div>
        <div class="legend-item"><span class="dot" style="background:#3fb950;"></span> Start</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let grid = [[1,3,1],[1,5,1],[4,2,1]];
        let m = 0;
        let n = 0;
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];

        function generateSteps() {
            steps = [];
            m = grid.length;
            n = grid[0].length;
            if (m === 0 || n === 0) return;

            let dp = Array.from({ length: m }, () => Array(n).fill(0));

            // Base case
            dp[0][0] = grid[0][0];

            steps.push({
                type: 'init',
                dp: JSON.parse(JSON.stringify(dp)),
                panel: `dp[0][0] = grid[0][0] = ${grid[0][0]}`,
                statusText: `Base case set`,
                log: `dp[0][0]=${grid[0][0]}`,
                logColor: 'var(--accent-blue)'
            });

            // Fill first row
            for (let j = 1; j < n; j++) {
                dp[0][j] = dp[0][j-1] + grid[0][j];
                steps.push({
                    type: 'first-row',
                    i: 0,
                    j: j,
                    dp: JSON.parse(JSON.stringify(dp)),
                    panel: `First row: dp[0][${j}] = dp[0][${j-1}] + grid[0][${j}] = ${dp[0][j]}`,
                    statusText: `First row dp[0][${j}]`,
                    log: `row0 col${j} = ${dp[0][j]}`,
                    logColor: 'var(--accent-purple)'
                });
            }

            // Fill first column
            for (let i = 1; i < m; i++) {
                dp[i][0] = dp[i-1][0] + grid[i][0];
                steps.push({
                    type: 'first-col',
                    i: i,
                    j: 0,
                    dp: JSON.parse(JSON.stringify(dp)),
                    panel: `First column: dp[${i}][0] = dp[${i-1}][0] + grid[${i}][0] = ${dp[i][0]}`,
                    statusText: `First col dp[${i}][0]`,
                    log: `col0 row${i} = ${dp[i][0]}`,
                    logColor: 'var(--accent-purple)'
                });
            }

            // Fill the rest
            for (let i = 1; i < m; i++) {
                for (let j = 1; j < n; j++) {
                    const above = dp[i-1][j];
                    const left = dp[i][j-1];
                    dp[i][j] = grid[i][j] + Math.min(above, left);
                    steps.push({
                        type: 'fill',
                        i: i,
                        j: j,
                        dp: JSON.parse(JSON.stringify(dp)),
                        panel: `Cell (${i},${j})<br>Above = ${above}, Left = ${left}<br>dp[${i}][${j}] = ${grid[i][j]} + min(${above},${left}) = ${dp[i][j]}`,
                        statusText: `dp[${i}][${j}] = ${dp[i][j]}`,
                        log: `(${i},${j}) = ${dp[i][j]}`,
                        logColor: 'var(--accent-green)'
                    });
                }
            }

            const result = dp[m-1][n-1];

            steps.push({
                type: 'final',
                complete: true,
                result: result,
                panel: `DP table filled.<br><b>Minimum path sum = ${result}</b>`,
                statusText: `Done. Min sum = ${result}`,
                log: `\nFinal min sum: ${result}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render grid
            const gridContainer = document.getElementById('grid');
            gridContainer.style.gridTemplateColumns = `repeat(${n}, 48px)`;
            gridContainer.innerHTML = '';
            for (let i = 0; i < m; i++) {
                for (let j = 0; j < n; j++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${i === 0 && j === 0 ? 'start' : ''}`;
                    if (step.i !== undefined && step.i === i && step.j !== undefined && step.j === j) {
                        cell.classList.add('candidate');
                    }
                    cell.innerText = grid[i][j];
                    gridContainer.appendChild(cell);
                }
            }

            // Render DP table
            const dpTable = document.getElementById('dp-table');
            dpTable.style.gridTemplateColumns = `repeat(${n + 1}, 48px)`;
            dpTable.innerHTML = '';

            // Header row
            const emptyHeader = document.createElement('div');
            emptyHeader.className = 'dp-cell header';
            emptyHeader.innerText = '';
            dpTable.appendChild(emptyHeader);
            for (let c = 0; c < n; c++) {
                const h = document.createElement('div');
                h.className = 'dp-cell header';
                h.innerText = c;
                dpTable.appendChild(h);
            }

            for (let r = 0; r < m; r++) {
                const rowHeader = document.createElement('div');
                rowHeader.className = 'dp-cell header';
                rowHeader.innerText = r;
                dpTable.appendChild(rowHeader);

                for (let c = 0; c < n; c++) {
                    const cell = document.createElement('div');
                    cell.className = `dp-cell ${(step.i === r && step.j === c) ? 'candidate' : ''}`;
                    if (r > c) cell.innerText = '—';
                    else {
                        const val = step.dp && step.dp[r] && step.dp[r][c] !== undefined ? step.dp[r][c] : '—';
                        cell.innerText = val;
                    }
                    dpTable.appendChild(cell);
                }
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';

            document.getElementById('val-cell').innerText = step.i !== undefined ? `(${step.i},${step.j})` : '—';
            document.getElementById('val-above').innerText = step.above !== undefined ? step.above : '—';
            document.getElementById('val-left').innerText = step.left !== undefined ? step.left : '—';
            document.getElementById('val-dp').innerText = step.dp && step.i !== undefined && step.j !== undefined && step.dp[step.i] && step.dp[step.i][step.j] !== undefined ? step.dp[step.i][step.j] : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '3px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        function loadCustom() {
            const gridStr = document.getElementById('grid-input').value.trim();
            try {
                const parsed = JSON.parse(gridStr);
                if (Array.isArray(parsed) && parsed.length > 0 && Array.isArray(parsed[0])) {
                    grid = parsed;
                    generateSteps();
                    reset();
                }
            } catch(e) {
                alert("Invalid grid format. Example: [[1,3,1],[1,5,1],[4,2,1]]");
            }
        }

        function loadExample(gridStr) {
            grid = JSON.parse(gridStr);
            document.getElementById('grid-input').value = gridStr;
            generateSteps();
            reset();
        }

        window.onload = function() {
            generateSteps();
            renderStep(0);
        };
    </script>
</body>
</html>
