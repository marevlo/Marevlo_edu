<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rod Cutting (maximize revenue) - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --text-log: #58a6ff;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ROW 1: INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 240px;
            font-size: 13px;
        }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            width: 80px;
            font-size: 13px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* ROW 2: VISUAL TILES - PRICES + DP */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .tiles-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 800px; min-height: 80px; position: relative;}
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 54px; height: 54px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        
        /* Highlight States */
        .tile.candidate { background: #2a1600; border-color: var(--accent-orange); color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px rgba(227, 179, 65, 0.4); z-index: 2; }
        .tile.winning { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); transform: scale(1.1); box-shadow: 0 0 12px var(--accent-green); z-index: 3;}
        .tile.done { opacity: 0.5; background: #161b22; border-color: var(--border-main); color: var(--text-dim); }
        .tile.idle { opacity: 0.9; }

        /* ROW 3: PANEL */
        .action-panel {
            margin-top: 40px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 20px; width: 680px; text-align: center; font-family: monospace; min-height: 70px;
            display: flex; flex-direction: column; justify-content: center; font-size: 15px; line-height: 1.5;
        }

        /* ROW 4: INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 16px; font-weight: 700; text-align: center; }

        /* ROW 5: RESULT DISPLAY */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 20px; color: var(--text-dim); font-family: monospace; transition: all 0.3s; font-weight: bold; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 26px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        /* ROW 6: STATUS BAR */
        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.2em; text-align: center; width: 600px;}

        /* ROW 7: CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 100px; cursor: pointer; }

        /* ROW 8: LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* ROW 9: LOG PANEL */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 700px; max-width: 90%; height: 120px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">n =</label>
        <input type="number" id="n-input" placeholder="4" value="4">
        <label class="ui-label" style="margin-left:8px">prices =</label>
        <input type="text" id="prices-input" placeholder="[1,5,8,9]" value="[1,5,8,9]">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample(4,'[1,5,8,9]')">Ex 1 (n=4)</button>
        <button onclick="loadExample(5,'[3,5,8,9,10]')">Ex 2 (n=5)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label" id="arr-label">Prices (length 1 to n):</div>
        <div class="tiles-wrapper" id="tiles-container"></div>
        <div class="ui-label" style="margin-top: 30px;">DP Table (max revenue for length 0 to n):</div>
        <div class="tiles-wrapper" id="dp-container"></div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Current Length (i)</span>
            <span class="info-value" id="val-i" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Cut Length (j)</span>
            <span class="info-value" id="val-j" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Candidate Revenue</span>
            <span class="info-value" id="val-cand" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current Max for i</span>
            <span class="info-value" id="val-max" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Maximum revenue for length n =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div class="controls" style="margin-top:0">
            <span class="ui-label" style="margin-right:4px; font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--accent-orange)"></span> Current length i</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-green); border:1px solid var(--accent-green)"></span> Best revenue</div>
        <div class="legend-item"><span class="dot" style="background:var(--accent-blue); border:1px solid var(--accent-blue)"></span> Current cut j</div>
        <div class="legend-item"><span class="dot" style="background:var(--bg-surface); border:1px solid var(--border-main); opacity:0.5"></span> Processed</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputN = 4;
        let inputPrices = [1,5,8,9]; // 1-indexed prices[1..n]
        let pricesArr = [];
        let dp = [];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1800, 900, 450];

        function init() { loadExample(4, "[1,5,8,9]"); }

        function loadExample(newN, pricesStr) {
            inputN = parseInt(newN);
            inputPrices = JSON.parse(pricesStr);
            document.getElementById('n-input').value = inputN;
            document.getElementById('prices-input').value = JSON.stringify(inputPrices);
            generateSteps();
            reset();
        }

        function loadCustom() {
            const nVal = parseInt(document.getElementById('n-input').value);
            const pricesStr = document.getElementById('prices-input').value.trim();
            if (!isNaN(nVal) && nVal > 0 && pricesStr) {
                try {
                    const parsedPrices = JSON.parse(pricesStr);
                    if (Array.isArray(parsedPrices) && parsedPrices.length === nVal) {
                        inputN = nVal;
                        inputPrices = parsedPrices;
                        generateSteps();
                        reset();
                    } else {
                        alert("Prices array must have exactly n elements.");
                    }
                } catch(e) {
                    alert("Invalid prices array JSON.");
                }
            } else {
                alert("Please enter valid n and prices array.");
            }
        }

        function generateSteps() {
            steps = [];
            pricesArr = [0, ...inputPrices]; // make 1-indexed
            const n = inputN;
            dp = new Array(n + 1).fill(0);

            steps.push({
                type: 'init',
                i: 0,
                j: -1,
                candidate: 0,
                currentMax: 0,
                digitsStates: Array(n + 1).fill('idle'),
                dpStates: dp.slice(),
                panel: `Initialize DP table.<br>dp[0] = 0 (base case for length 0)`,
                statusText: `dp[0] = 0`,
                log: `Initialize dp[0] = 0`,
                logColor: 'var(--text-dim)'
            });

            for (let i = 1; i <= n; i++) {
                let currentMax = pricesArr[i]; // uncut option

                // Record before inner loop
                steps.push({
                    type: 'i-start',
                    i: i,
                    j: -1,
                    candidate: 0,
                    currentMax: currentMax,
                    digitsStates: Array(n + 1).fill('idle'),
                    dpStates: dp.slice(),
                    panel: `Compute dp[${i}] for length <b>${i}</b><br>Start with uncut revenue = prices[${i}] = <b>${pricesArr[i]}</b>`,
                    statusText: `i=${i}, start max=${currentMax}`,
                    log: `Start dp[${i}], uncut = ${pricesArr[i]}`,
                    logColor: 'var(--accent-orange)'
                });

                for (let j = 1; j < i; j++) {
                    const candidate = pricesArr[j] + dp[i - j];

                    steps.push({
                        type: 'j-loop',
                        i: i,
                        j: j,
                        candidate: candidate,
                        currentMax: currentMax,
                        digitsStates: Array(n + 1).fill('idle'),
                        dpStates: dp.slice(),
                        panel: `Check cut at <b>${j}</b>: revenue = prices[${j}] + dp[${i-j}] = ${pricesArr[j]} + ${dp[i-j]} = <b>${candidate}</b>`,
                        statusText: `j=${j}, candidate=${candidate}`,
                        log: `  j=${j}: candidate = ${candidate}`,
                        logColor: 'var(--accent-blue)'
                    });

                    if (candidate > currentMax) {
                        currentMax = candidate;
                    }
                }

                dp[i] = currentMax;

                steps.push({
                    type: 'i-update',
                    i: i,
                    j: -1,
                    candidate: 0,
                    currentMax: currentMax,
                    digitsStates: Array(n + 1).fill('idle'),
                    dpStates: dp.slice(),
                    panel: `Finished inner loop for length ${i}<br>dp[${i}] = <b>${currentMax}</b>`,
                    statusText: `dp[${i}] = ${currentMax}`,
                    log: `dp[${i}] = ${currentMax}`,
                    logColor: 'var(--accent-green)'
                });
            }

            steps.push({
                type: 'final',
                i: n + 1,
                j: -1,
                candidate: 0,
                currentMax: dp[n],
                digitsStates: Array(n + 1).fill('winning'),
                dpStates: dp.slice(),
                panel: `All lengths computed.<br><b>Maximum revenue = dp[${n}] = ${dp[n]}</b>`,
                complete: true,
                result: dp[n],
                statusText: `Done. Max revenue = ${dp[n]}`,
                log: `\nFinal max revenue: ${dp[n]}`,
                logColor: 'var(--accent-green)',
                bold: true
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Prices tiles
            const priceContainer = document.getElementById('tiles-container');
            priceContainer.innerHTML = '';
            for (let k = 1; k <= inputN; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.digitsStates[k]}`;
                tile.innerText = pricesArr[k];
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${k}]`;
                wrapper.append(tile, idxLabel);
                priceContainer.appendChild(wrapper);
            }

            // DP tiles
            const dpContainer = document.getElementById('dp-container');
            dpContainer.innerHTML = '';
            for (let k = 0; k <= inputN; k++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                tile.className = `tile ${step.digitsStates[k] || (k === step.i ? 'candidate' : 'idle')}`;
                tile.innerText = step.dpStates[k];
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = `[${k}]`;
                wrapper.append(tile, idxLabel);
                dpContainer.appendChild(wrapper);
            }

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-i').innerText = step.i !== undefined ? step.i : '—';
            document.getElementById('val-j').innerText = step.j !== undefined ? step.j : '—';
            document.getElementById('val-cand').innerText = step.candidate !== undefined ? step.candidate : '—';
            document.getElementById('val-max').innerText = step.currentMax !== undefined ? step.currentMax : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '2px';
                    line.style.whiteSpace = 'pre-wrap';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    if (steps[k].bold) line.style.fontWeight = 'bold';
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) pause();
            else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[document.getElementById('speed-slider').value]);
            }
        }

        function pause() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
