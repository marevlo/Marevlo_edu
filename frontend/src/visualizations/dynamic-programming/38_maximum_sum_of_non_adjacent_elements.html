<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximum Sum of Non-Adjacent Elements - Visualization</title>
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #161b22;
            --bg-input: #000000;
            --border-main: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #2d333b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent-orange: #e3b341;
            --accent-blue: #388bfd;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* INPUT BAR */
        .input-bar {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-main);
            flex-wrap: wrap;
        }
        label.ui-label { font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-dim); }
        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            height: 32px;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            width: 260px;
        }

        button {
            height: 32px; border-radius: 6px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--btn-hover); }

        /* VISUALIZATION */
        .visual-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .nums-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 920px; min-height: 110px; position: relative; }
        
        .tile-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tile {
            min-width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 18px; font-weight: 600; font-family: 'Courier New', monospace;
            transition: all 0.3s ease; border: 2px solid var(--border-main); background: #21262d;
            color: var(--text-main);
        }
        .tile.current { background: #2a1600; border-color: var(--accent-orange); transform: scale(1.15); box-shadow: 0 0 12px var(--accent-orange); }
        .tile.included { background: #0f2a1a; border-color: var(--accent-green); color: var(--accent-green); }
        .tile-index { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        /* STATE MACHINE */
        .states-container { 
            margin-top: 20px;
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-main);
            width: 920px;
        }
        .states-bar {
            display: flex;
            gap: 12px;
            justify-content: space-around;
        }
        .state-tile {
            min-width: 140px;
            padding: 12px 12px;
            text-align: center;
            border: 2px solid var(--border-main);
            background: #21262d;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .state-tile.current { 
            border-color: var(--accent-green); 
            background: #0f2a1a; 
            box-shadow: 0 0 12px var(--accent-green);
        }
        .state-label { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        .state-value { font-size: 22px; font-weight: 700; font-family: monospace; color: var(--accent-blue); }

        /* ACTION PANEL */
        .action-panel {
            margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 14px 22px; width: 720px; text-align: center; 
            font-family: monospace; min-height: 110px; font-size: 15px; line-height: 1.5;
        }

        /* INFO PANEL */
        .info-panel { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .info-cell {
            background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 6px;
            padding: 8px 14px; display: flex; flex-direction: column; align-items: center; min-width: 110px; gap: 4px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); }
        .info-value { font-family: monospace; font-size: 17px; font-weight: 700; }

        /* RESULT */
        .result-display { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #res-val { font-size: 24px; color: var(--text-dim); font-family: monospace; font-weight: bold; transition: all 0.3s; }
        .pop { animation: popAnim 400ms ease; color: var(--accent-green) !important; font-size: 32px !important; text-shadow: 0 0 12px var(--accent-green); }

        @keyframes popAnim { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

        .status-bar { margin-top: 8px; font-size: 13px; color: var(--text-dim); height: 1.4em; text-align: center; width: 700px;}

        /* CONTROLS */
        .controls { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        input[type="range"] { accent-color: var(--accent-blue); width: 140px; cursor: pointer; }

        /* LEGEND */
        .legend { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .legend-item { display: flex; align-items: center; font-size: 12px; color: var(--text-dim); }
        .dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; display: inline-block; }

        /* LOG */
        .log-panel {
            margin-top: 12px; background: var(--bg-page); border: 1px solid var(--border-main);
            border-radius: 6px; padding: 12px 16px; width: 720px; max-width: 90%; height: 130px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">nums =</label>
        <input type="text" id="nums-input" value="[3,2,5,10,7]" style="width:260px">
        <button onclick="loadCustom()">Load</button>
        <button onclick="loadExample([3,2,5,10,7])">Ex 1 (15)</button>
        <button onclick="loadExample([5,1,2,6])">Ex 2 (11)</button>
        <button onclick="loadExample([2,1,4,9])">Ex 3 (11)</button>
        <button onclick="loadExample([1,2,3,1])">Ex 4 (4)</button>
    </div>

    <div class="visual-container">
        <div class="ui-label">Array (orange = current index, green = included in optimal path)</div>
        <div class="nums-wrapper" id="nums-container"></div>

        <div class="ui-label" style="margin-top:25px;">Space-Optimized DP States (prev2, prev1, current)</div>
        <div id="states-container" class="states-container">
            <div class="states-bar" id="states-bar"></div>
        </div>
    </div>

    <div class="action-panel" id="main-panel">—</div>

    <div class="info-panel">
        <div class="info-cell">
            <span class="info-label">Index / Value</span>
            <span class="info-value" id="val-index" style="color: var(--accent-orange);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">prev2</span>
            <span class="info-value" id="val-prev2" style="color: var(--accent-purple);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">prev1</span>
            <span class="info-value" id="val-prev1" style="color: var(--accent-blue);">—</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Current = max(prev1, nums[i] + prev2)</span>
            <span class="info-value" id="val-current" style="color: var(--accent-green);">—</span>
        </div>
    </div>

    <div class="result-display">
        <span class="ui-label" style="margin-bottom: 4px;">Maximum sum =</span>
        <span id="res-val">—</span>
    </div>

    <div class="status-bar" id="status-text"></div>

    <div class="controls">
        <button onclick="reset()">↺ Reset</button>
        <button onclick="back()">← Back</button>
        <button onclick="togglePlay()" id="play-btn">Play</button>
        <button onclick="next()">Next →</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="ui-label" style="font-size:11px">Speed</span>
            <input type="range" id="speed-slider" min="0" max="2" value="1">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#0f2a1a; border:1px solid var(--accent-green)"></span> Included in optimal</div>
        <div class="legend-item"><span class="dot" style="background:#2a1600; border:1px solid var(--accent-orange)"></span> Current index</div>
    </div>

    <div class="log-panel" id="log"></div>

    <script>
        let inputNums = [3,2,5,10,7];
        let steps = [];
        let stepIndex = 0;
        let timer = null;
        const delays = [1400, 700, 350];

        function init() {
            loadExample([3,2,5,10,7]);
        }

        function loadExample(newNums) {
            inputNums = newNums;
            document.getElementById('nums-input').value = JSON.stringify(newNums);
            generateSteps();
            reset();
        }

        function loadCustom() {
            let nums;
            try {
                nums = JSON.parse(document.getElementById('nums-input').value);
            } catch(e) {
                alert("Invalid array, e.g. [3,2,5,10,7]");
                return;
            }
            if (Array.isArray(nums)) {
                loadExample(nums);
            } else {
                alert("Invalid input.");
            }
        }

        function generateSteps() {
            steps = [];
            const n = inputNums.length;

            // INIT
            steps.push({
                type: 'init',
                i: -1,
                prev2: 0,
                prev1: 0,
                current: null,
                panel: `Maximum Sum of Non-Adjacent Elements — Space-Optimized DP<br>nums = [${inputNums}]`,
                statusText: `Initializing prev2 = 0, prev1 = 0`,
                log: `Space-optimized DP (O(1) space)\nprev2 = 0, prev1 = 0`,
                logColor: 'var(--text-dim)'
            });

            if (n === 0) {
                steps.push({
                    type: 'final',
                    i: null,
                    prev2: 0,
                    prev1: 0,
                    current: 0,
                    panel: `Empty array → maximum sum = 0`,
                    statusText: `Final sum = 0`,
                    log: `Empty array → 0`,
                    logColor: 'var(--accent-green)',
                    complete: true,
                    result: 0
                });
                return;
            }

            let prev2 = 0;
            let prev1 = inputNums[0];

            steps.push({
                type: 'base',
                i: 0,
                prev2: prev2,
                prev1: prev1,
                current: null,
                panel: `Base case: prev2 = 0, prev1 = nums[0] = ${inputNums[0]}`,
                statusText: `i = 0`,
                log: `prev1 = ${inputNums[0]}`,
                logColor: 'var(--accent-green)'
            });

            for (let i = 1; i < n; i++) {
                const current = Math.max(prev1, inputNums[i] + prev2);

                steps.push({
                    type: 'update',
                    i: i,
                    prev2: prev2,
                    prev1: prev1,
                    current: current,
                    panel: `Index ${i} (value = ${inputNums[i]})<br>current = max(prev1 = ${prev1}, nums[${i}] + prev2 = ${inputNums[i]} + ${prev2}) = ${current}`,
                    statusText: `i = ${i} ($${inputNums[i]})`,
                    log: `i=${i}: max(${prev1}, ${inputNums[i]} + ${prev2}) = ${current}`,
                    logColor: 'var(--accent-green)'
                });

                prev2 = prev1;
                prev1 = current;
            }

            // FINAL
            const finalSum = n === 1 ? inputNums[0] : prev1;
            steps.push({
                type: 'final',
                i: null,
                prev2: prev2,
                prev1: prev1,
                current: finalSum,
                panel: `All elements processed.<br>Maximum sum = <span style="color:var(--accent-green)"><b>${finalSum}</b></span>`,
                statusText: `Final sum = ${finalSum}`,
                log: `\nFinal maximum sum = ${finalSum}`,
                logColor: 'var(--accent-green)',
                complete: true,
                result: finalSum
            });
        }

        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Render nums tiles
            const numsContainer = document.getElementById('nums-container');
            numsContainer.innerHTML = '';
            inputNums.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-unit';
                const tile = document.createElement('div');
                let cls = 'tile';
                if (step.i === i) cls += ' current';
                tile.className = cls;
                tile.innerText = val;
                const idxLabel = document.createElement('div');
                idxLabel.className = 'tile-index';
                idxLabel.innerText = i;
                wrapper.append(tile, idxLabel);
                numsContainer.appendChild(wrapper);
            });

            // Render states
            const statesBar = document.getElementById('states-bar');
            statesBar.innerHTML = '';
            const states = [
                { label: 'prev2', value: step.prev2 || 0 },
                { label: 'prev1', value: step.prev1 || 0 },
                { label: 'current', value: step.current !== null ? step.current : '—' }
            ];
            states.forEach(st => {
                const tile = document.createElement('div');
                tile.className = `state-tile ${step.i !== null && st.label === 'current' ? 'current' : ''}`;
                tile.innerHTML = `
                    <div class="state-label">${st.label}</div>
                    <div class="state-value">${st.value}</div>
                `;
                statesBar.appendChild(tile);
            });

            document.getElementById('main-panel').innerHTML = step.panel || '—';
            document.getElementById('val-index').innerText = step.i !== null ? `${step.i} (${inputNums[step.i] || '-'})` : '—';
            document.getElementById('val-prev2').innerText = step.prev2 !== undefined ? step.prev2 : '—';
            document.getElementById('val-prev1').innerText = step.prev1 !== undefined ? step.prev1 : '—';
            document.getElementById('val-current').innerText = step.current !== null ? step.current : '—';

            const resVal = document.getElementById('res-val');
            if (step.complete) {
                resVal.innerText = step.result;
                resVal.className = 'pop';
            } else {
                resVal.innerText = '—';
                resVal.className = '';
            }

            document.getElementById('status-text').innerText = step.statusText || '';

            // Log
            const logPanel = document.getElementById('log');
            logPanel.innerHTML = '';
            for (let k = 0; k <= idx; k++) {
                if (steps[k].log) {
                    const line = document.createElement('div');
                    line.style.marginBottom = '4px';
                    if (steps[k].logColor) line.style.color = steps[k].logColor;
                    line.innerText = steps[k].log;
                    logPanel.appendChild(line);
                }
            }
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function next() {
            if (stepIndex < steps.length - 1) {
                stepIndex++;
                renderStep(stepIndex);
            } else pause();
        }

        function back() {
            if (stepIndex > 0) {
                stepIndex--;
                renderStep(stepIndex);
            }
        }

        function reset() {
            pause();
            stepIndex = 0;
            renderStep(0);
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) {
                pause();
            } else {
                btn.innerText = 'Pause';
                if (stepIndex >= steps.length - 1) stepIndex = 0;
                timer = setInterval(next, delays[parseInt(document.getElementById('speed-slider').value)]);
            }
        }

        function pause() {
            if (timer) clearInterval(timer);
            timer = null;
            document.getElementById('play-btn').innerText = 'Play';
        }

        window.onload = init;
    </script>
</body>
</html>
