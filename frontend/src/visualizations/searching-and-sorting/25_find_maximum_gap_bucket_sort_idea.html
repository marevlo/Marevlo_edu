<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximum Gap &middot; Bucket-Sort Idea</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* candidate / current gap       */
            --accent-blue:   #06b6d4;    /* buckets / chrome              */
            --accent-green:  #22c55e;    /* max gap / done                */
            --accent-red:    #f43f5e;    /* error                         */
            --accent-purple: #a855f7;    /* current element / current     */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 240px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168,85,247,0.18); background: rgba(168,85,247,0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(168, 85, 247, 0.5); box-shadow: 0 0 18px rgba(168, 85, 247, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(168,85,247,0.22), rgba(168,85,247,0.10)); border-color: rgba(168, 85, 247, 0.45); color: #e9d5ff; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #e9d5ff; background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); box-shadow: 0 0 12px rgba(168,85,247,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(168,85,247,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #ede9fe; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-purple); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(168,85,247,0.14); color: #d8b4fe; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(168,85,247,0.08), transparent 70%), #090d18; padding: 54px 24px 50px; border: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; align-items: center; gap: 30px; overflow-x: auto; min-height: 240px; }

        /* ── array rail ───────────────────────────────────────── */
        .stage-block { display: flex; flex-direction: column; align-items: center; gap: 7px; }
        .stage-label { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); }
        .arr-rail { position: relative; display: flex; gap: 8px; }
        .cell { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative;
            font-family: var(--mono); font-weight: 800; font-size: 18px; will-change: transform;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.05); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s; }
        .cell.dim { opacity: 0.42; }
        .cell.cur { box-shadow: 0 0 22px rgba(168,85,247,0.55); border-color: var(--accent-purple); background: rgba(168,85,247,0.14); color: #e9d5ff; transform: translateY(-3px) scale(1.06); z-index: 3; }
        .cell.minmax { border-color: rgba(6,182,212,0.55); background: rgba(6,182,212,0.12); color: #a5f3fc; }
        .cell .ci { position: absolute; top: -21px; left: 0; right: 0; text-align: center; font-size: 11px; color: var(--text-dim); font-weight: 700; }

        /* element pointer pill (rides the array during placement) */
        .sptr { position: absolute; left: 0; display: flex; flex-direction: column-reverse; align-items: center; bottom: 100%; margin-bottom: 7px; opacity: 0; pointer-events: none; will-change: transform; z-index: 6; }
        .sptr .tag { font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 8px; white-space: nowrap; background: var(--accent-purple); color: #1a0533; box-shadow: 0 0 14px rgba(168,85,247,0.6); }
        .sptr .stalk { width: 2px; height: 14px; background: var(--accent-purple); }

        /* ── buckets ──────────────────────────────────────────── */
        .bucket-rail { position: relative; display: flex; gap: 10px; align-items: flex-end; }
        .bucket { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 58px; position: relative; transition: transform 0.3s; }
        .bk-box { width: 58px; min-height: 56px; border-radius: 12px; border: 2px dashed var(--border-main); background: rgba(255,255,255,0.03);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 6px 4px;
            transition: border-color 0.35s, background 0.35s, box-shadow 0.35s, transform 0.3s; }
        .bk-box.filled { border-style: solid; border-color: rgba(6,182,212,0.5); background: rgba(6,182,212,0.10); }
        .bk-box.empty { opacity: 0.5; }
        .bk-box.cur { border-color: var(--accent-purple); box-shadow: 0 0 22px rgba(168,85,247,0.5); transform: translateY(-4px); }
        .bk-box.gapL { border-color: var(--accent-orange); background: rgba(245,165,36,0.12); box-shadow: 0 0 18px rgba(245,165,36,0.4); }
        .bk-box.gapR { border-color: var(--accent-orange); background: rgba(245,165,36,0.12); box-shadow: 0 0 18px rgba(245,165,36,0.4); }
        .bk-box.winL, .bk-box.winR { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(34,197,94,0.18), rgba(34,197,94,0.08)); box-shadow: 0 0 20px rgba(34,197,94,0.45); }
        .bk-mm { font-family: var(--mono); font-size: 12.5px; font-weight: 800; line-height: 1.25; text-align: center; }
        .bk-mm .mn { color: #a5f3fc; } .bk-mm .mx { color: #ffd591; }
        .bk-box.empty .bk-mm { color: var(--text-dim); }
        .bk-idx { font-family: var(--mono); font-size: 10.5px; color: var(--text-dim); font-weight: 700; }

        /* gap connector between two consecutive non-empty buckets */
        .gap-link { position: absolute; height: 0; border-top: 2px dashed var(--accent-orange); opacity: 0; transition: opacity 0.3s; z-index: 5; }
        .gap-link.win { border-top-color: var(--accent-green); }
        .gap-link .badge { position: absolute; top: -11px; left: 50%; transform: translateX(-50%); font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 1px 8px; border-radius: 999px; white-space: nowrap; background: rgba(245,165,36,0.18); color: #ffd591; border: 1px solid rgba(245,165,36,0.5); }
        .gap-link.win .badge { background: rgba(34,197,94,0.16); color: #bbf7d0; border-color: rgba(34,197,94,0.5); }

        .action-stage { position: relative; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-purple); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(168,85,247,0.12); border-left-color: var(--accent-purple); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.mn b { color: var(--accent-blue); } .pill.mx b { color: var(--accent-orange); } .pill.sz b { color: var(--accent-purple); } .pill.gp b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">arr =</label>
        <input type="text" id="arr-input" placeholder="3, 6, 9, 1">
        <button onclick="loadCustom()">Run</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">3 6 9 1</button>
        <button onclick="loadExample(1)">10</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Maximum Gap <span class="sub">&middot; bucket-sort idea &middot; gap lives across buckets &middot; O(n)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="stage-block">
                    <div class="stage-label" id="arr-label">array</div>
                    <div class="arr-rail" id="arr-rail"></div>
                </div>
                <div class="stage-block">
                    <div class="stage-label" id="bucket-label">buckets</div>
                    <div class="bucket-rail" id="bucket-rail"></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill mn">min <b id="st-min">&mdash;</b></span>
                            <span class="pill mx">max <b id="st-max">&mdash;</b></span>
                            <span class="pill sz">bucket size <b id="st-size">&mdash;</b></span>
                            <span class="pill gp">max gap <b id="st-gap">0</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            glide(el, x) {
                const prev = el._x; el.style.opacity = '1';
                const commit = `translateX(${x.toFixed(2)}px) translateX(-50%)`;
                if (REDUCED || prev == null || Math.abs(x - prev) < 0.5) { el._x = x; el.style.transform = commit; return; }
                const dx = x - prev;
                const kf = SPRING_POS.map(p => ({ transform: `translateX(${(prev + dx * p).toFixed(2)}px) translateX(-50%)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el.style.transform = commit;
            },
        };

        // ───────── State ─────────
        let arr = [3, 6, 9, 1];
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 820, 400];
        const cellEls = {};
        const bucketEls = {};
        const ptrEls = {};
        let gapLink = null;

        // ───────── synced code ─────────
        const CODE = [
            [['kw','def '],['fn','maxGap'],['src','(a):']],
            [['kw','  if '],['src','len(a) < 2: return 0']],
            [['src','  lo, hi = min(a), max(a)']],
            [['kw','  if '],['src','lo == hi: return 0']],
            [['src','  n = len(a)']],
            [['src','  size = max(1, (hi-lo)//(n-1))']],
            [['src','  cnt = (hi-lo)//size + 1']],
            [['kw','  for '],['src','x in a:']],
            [['src','    b = (x-lo)//size']],
            [['src','    bMin[b]=min(.,x); bMax[b]=max(.,x)']],
            [['src','  prev = bMax[0]; gap = 0']],
            [['kw','  for '],['src','each non-empty bucket k:']],
            [['src','    gap = max(gap, bMin[k]-prev)']],
            [['src','    prev = bMax[k]']],
            [['kw','  return '],['src','gap']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(a) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', a && a.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── step generation (Maximum Gap via bucket-sort idea) ─────────
        function generateSteps() {
            steps = [];
            const a = [...arr], n = a.length;

            // base snapshot: arrStates per index, buckets[] = {min,max,empty}, pointers/markers
            const base = (extra) => Object.assign({
                arr: a, n,
                lo: null, hi: null, size: null, count: null, gap: 0,
                buckets: null,         // array of {min,max} or null
                cur: -1,               // current array index being placed
                ptrBucket: null,       // bucket index pointer rides to
                curBucket: -1,         // highlighted bucket
                gapPair: null,         // [leftBucket, rightBucket] orange gap link
                winPair: null,         // [leftBucket, rightBucket] green max gap
                dimArr: false,
                done: false,
            }, extra);

            // ---- guard: n < 2 ----
            if (n < 2) {
                steps.push(base({ code: [0, 1], action: 'n < 2', actionColor: 'var(--accent-purple)',
                    panel: `Array <code>[${a.join(', ')}]</code> has fewer than two elements, so there is no pair to measure. Maximum gap is <b>0</b>.`,
                    log: `n=${n} &lt; 2  &#8594; gap = 0` }));
                steps.push(base({ code: [1], done: true, complete: true, confetti: true, gap: 0, action: '✓ gap = 0', actionColor: 'var(--accent-green)',
                    panel: `Done. With only ${n} element${n===1?'':'s'} the maximum gap is <b>0</b>.`,
                    log: `return 0` }));
                return;
            }

            const lo = Math.min(...a), hi = Math.max(...a);

            steps.push(base({ code: [0, 2], cur: -1, action: 'SCAN min / max', actionColor: 'var(--accent-blue)',
                panel: `Find the range of the data: <code>lo = min(a) = ${lo}</code>, <code>hi = max(a) = ${hi}</code>. The answer can never exceed this span.`,
                log: `lo=${lo}  hi=${hi}` , lo: null, hi: null }));

            // mark min & max cells
            steps.push(base({ code: [2], lo, hi, action: 'range found', actionColor: 'var(--accent-blue)',
                markMinMax: true,
                panel: `Range spans <code>${hi} &minus; ${lo} = ${hi - lo}</code>. Highlighted: the smallest and largest values.`,
                log: `range = ${hi} - ${lo} = ${hi - lo}` }));

            // ---- guard: all equal ----
            if (lo === hi) {
                steps.push(base({ code: [3], lo, hi, done: true, complete: true, confetti: true, gap: 0, markMinMax: true,
                    action: '✓ gap = 0', actionColor: 'var(--accent-green)',
                    panel: `Every element equals <b>${lo}</b>, so <code>lo == hi</code>. There is no gap &#8594; maximum gap is <b>0</b>.`,
                    log: `lo == hi  &#8594; return 0` }));
                return;
            }

            // ---- bucket sizing ----
            const size = Math.max(1, Math.floor((hi - lo) / (n - 1)));
            const count = Math.floor((hi - lo) / size) + 1;

            steps.push(base({ code: [4, 5], lo, hi, size, count, markMinMax: true,
                action: 'pick bucket size', actionColor: 'var(--accent-purple)',
                panel: `Choose bucket width <code>size = max(1, &lfloor;(${hi}&minus;${lo}) / (${n}&minus;1)&rfloor;) = ${size}</code>. By pigeonhole, the largest gap must straddle two buckets, never live inside one.`,
                log: `size = max(1, (${hi-lo})/(${n-1})) = ${size}` }));

            // empty buckets
            const empty = Array.from({ length: count }, () => null);
            steps.push(base({ code: [6], lo, hi, size, count, markMinMax: true,
                buckets: empty.map(b => b),
                action: `${count} bucket${count===1?'':'s'}`, actionColor: 'var(--accent-purple)',
                panel: `Create <code>count = &lfloor;(${hi}&minus;${lo}) / ${size}&rfloor; + 1 = ${count}</code> empty buckets. Each bucket keeps only its running <span style="color:#a5f3fc">min</span> and <span style="color:#ffd591">max</span>.`,
                log: `count = ${count} buckets created` }));

            // ---- place each element ----
            const buckets = empty.slice();
            for (let i = 0; i < n; i++) {
                const x = a[i];
                const b = Math.floor((x - lo) / size);
                // snapshot BEFORE updating: highlight target bucket, element travelling
                buckets[b] = buckets[b] == null ? { min: x, max: x } : { min: Math.min(buckets[b].min, x), max: Math.max(buckets[b].max, x) };
                steps.push(base({ code: [7, 8, 9], lo, hi, size, count, markMinMax: false,
                    buckets: buckets.map(bb => bb && { ...bb }),
                    cur: i, curBucket: b, ptrBucket: b,
                    action: `${x} → bucket ${b}`, actionColor: 'var(--accent-purple)',
                    panel: `Element <code>a[${i}] = ${x}</code> falls into bucket <code>(${x}&minus;${lo}) / ${size} = ${b}</code>. Update that bucket's min &amp; max.`,
                    log: `place ${x}  &#8594; bucket ${b}  [min ${buckets[b].min}, max ${buckets[b].max}]` }));
            }

            // all placed
            steps.push(base({ code: [9], lo, hi, size, count, dimArr: true,
                buckets: buckets.map(bb => bb && { ...bb }),
                action: 'all placed', actionColor: 'var(--accent-blue)',
                panel: `Every element is bucketed. Now walk the buckets left to right; the answer is the biggest jump from one non-empty bucket's max to the next non-empty bucket's min.`,
                log: `all ${n} elements placed; scanning buckets` }));

            // ---- scan consecutive non-empty buckets ----
            let gap = 0, winPair = null;
            // find first non-empty
            let prevIdx = -1;
            for (let k = 0; k < count; k++) { if (buckets[k]) { prevIdx = k; break; } }

            for (let k = prevIdx + 1; k < count; k++) {
                if (!buckets[k]) continue;
                const d = buckets[k].min - buckets[prevIdx].max;
                const isNew = d > gap;
                if (isNew) { gap = d; winPair = [prevIdx, k]; }
                steps.push(base({ code: [11, 12, 13], lo, hi, size, count, dimArr: true,
                    buckets: buckets.map(bb => bb && { ...bb }),
                    curBucket: k, gapPair: [prevIdx, k], gap, winPair: winPair ? [...winPair] : null,
                    action: isNew ? `new max gap ${gap}` : `gap ${d}`, actionColor: isNew ? 'var(--accent-green)' : 'var(--accent-orange)',
                    panel: `Across buckets ${prevIdx} &#8594; ${k}: <code>${buckets[k].min} &minus; ${buckets[prevIdx].max} = ${d}</code>.` + (isNew ? ` <b style="color:var(--accent-green)">New maximum gap = ${gap}.</b>` : ` Not larger than the current max <b>${gap}</b>.`),
                    log: `bucket ${prevIdx}.max=${buckets[prevIdx].max}  bucket ${k}.min=${buckets[k].min}  gap=${d}${isNew ? '  *NEW MAX*' : ''}` }));
                prevIdx = k;
            }

            // final
            steps.push(base({ code: [14], lo, hi, size, count, dimArr: true, done: true, complete: true, confetti: true,
                buckets: buckets.map(bb => bb && { ...bb }),
                gap, winPair: winPair ? [...winPair] : null,
                action: `✓ max gap = ${gap}`, actionColor: 'var(--accent-green)',
                panel: `Scan complete. The maximum gap is <b>${gap}</b>` + (winPair ? `, between bucket ${winPair[0]} (max ${buckets[winPair[0]].max}) and bucket ${winPair[1]} (min ${buckets[winPair[1]].min}).` : `.`),
                log: `done  maximum gap = ${gap}` }));
        }

        // ───────── render ─────────
        function cellCenterX(i) { const el = cellEls[i]; return el ? el.offsetLeft + el.offsetWidth / 2 : 0; }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const arrRail = document.getElementById('arr-rail');
            const bucketRail = document.getElementById('bucket-rail');

            // ----- array cells -----
            const usedC = new Set();
            const lo = step.lo, hi = step.hi;
            for (let i = 0; i < step.arr.length; i++) {
                usedC.add(String(i));
                let el = cellEls[i];
                if (!el) { el = document.createElement('div'); el.className = 'cell'; el.innerHTML = `<span class="ci"></span><span class="cv"></span>`; cellEls[i] = el; arrRail.appendChild(el); }
                el.querySelector('.ci').textContent = i;
                el.querySelector('.cv').textContent = step.arr[i];
                let cls = 'cell';
                if (step.dimArr && i !== step.cur) cls += ' dim';
                if (step.markMinMax && lo != null && (step.arr[i] === lo || step.arr[i] === hi)) cls += ' minmax';
                if (i === step.cur && !step.done) cls += ' cur';
                el.className = cls;
            }
            Object.keys(cellEls).forEach(k => { if (!usedC.has(k)) { cellEls[k].remove(); delete cellEls[k]; } });

            // element pointer pill (rides the array to current element)
            placePtr('el', (!step.done && step.cur >= 0) ? step.cur : null, step.cur >= 0 ? String(step.arr[step.cur]) : '');

            // ----- buckets -----
            const arrLabel = document.getElementById('arr-label');
            arrLabel.textContent = step.dimArr ? 'array (placed)' : 'array';
            const bucketLabel = document.getElementById('bucket-label');

            if (!step.buckets) {
                // hide bucket row entirely (reap)
                Object.keys(bucketEls).forEach(k => { bucketEls[k].remove(); delete bucketEls[k]; });
                if (gapLink) { gapLink.style.opacity = '0'; }
                bucketLabel.style.opacity = '0';
            } else {
                bucketLabel.style.opacity = '1';
                bucketLabel.textContent = step.size != null ? `buckets (size ${step.size})` : 'buckets';
                const usedB = new Set();
                step.buckets.forEach((b, k) => {
                    usedB.add(String(k));
                    let bk = bucketEls[k];
                    if (!bk) {
                        bk = document.createElement('div'); bk.className = 'bucket';
                        bk.innerHTML = `<div class="bk-box"><div class="bk-mm"></div></div><div class="bk-idx"></div>`;
                        bucketEls[k] = bk; bucketRail.appendChild(bk);
                    }
                    bk.querySelector('.bk-idx').textContent = `b${k}`;
                    const box = bk.querySelector('.bk-box');
                    const mm = bk.querySelector('.bk-mm');
                    let bcls = 'bk-box';
                    if (b) { bcls += ' filled'; mm.innerHTML = `<span class="mn">${b.min}</span><span class="mx">${b.max}</span>`; }
                    else { bcls += ' empty'; mm.innerHTML = `<span style="opacity:.7">&middot;</span>`; }
                    if (k === step.curBucket && !step.done) bcls += ' cur';
                    if (step.winPair && (k === step.winPair[0] || k === step.winPair[1])) bcls += (k === step.winPair[0] ? ' winL' : ' winR');
                    else if (step.gapPair && (k === step.gapPair[0] || k === step.gapPair[1])) bcls += (k === step.gapPair[0] ? ' gapL' : ' gapR');
                    box.className = bcls;
                });
                Object.keys(bucketEls).forEach(k => { if (!usedB.has(k)) { bucketEls[k].remove(); delete bucketEls[k]; } });

                // gap connector
                drawGapLink(step);
            }

            // ----- narration / action / code -----
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // ----- state pills -----
            document.getElementById('st-min').innerHTML = step.lo != null ? step.lo : '&mdash;';
            document.getElementById('st-max').innerHTML = step.hi != null ? step.hi : '&mdash;';
            document.getElementById('st-size').innerHTML = step.size != null ? step.size : '&mdash;';
            document.getElementById('st-gap').textContent = step.gap;
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        // draw / position the dashed connector between the two gap buckets
        function drawGapLink(step) {
            const bucketRail = document.getElementById('bucket-rail');
            if (!gapLink) {
                gapLink = document.createElement('div'); gapLink.className = 'gap-link';
                gapLink.innerHTML = `<div class="badge"></div>`;
                bucketRail.appendChild(gapLink);
            } else if (gapLink.parentElement !== bucketRail) {
                bucketRail.appendChild(gapLink);
            }
            const pair = step.gapPair || step.winPair;
            if (!pair) { gapLink.style.opacity = '0'; return; }
            const [L, R] = pair;
            const bl = bucketEls[L], br = bucketEls[R];
            if (!bl || !br) { gapLink.style.opacity = '0'; return; }
            const boxL = bl.querySelector('.bk-box'), boxR = br.querySelector('.bk-box');
            const x1 = bl.offsetLeft + boxL.offsetLeft + boxL.offsetWidth / 2;
            const x2 = br.offsetLeft + boxR.offsetLeft + boxR.offsetWidth / 2;
            const yTop = bl.offsetTop + boxL.offsetTop;
            gapLink.style.left = x1 + 'px';
            gapLink.style.width = Math.max(0, x2 - x1) + 'px';
            gapLink.style.top = (yTop - 14) + 'px';
            const isWin = step.winPair && pair[0] === step.winPair[0] && pair[1] === step.winPair[1];
            gapLink.classList.toggle('win', !!isWin);
            const d = step.buckets[R] && step.buckets[L] ? (step.buckets[R].min - step.buckets[L].max) : 0;
            gapLink.querySelector('.badge').textContent = `gap ${d}`;
            gapLink.style.opacity = '1';
        }

        function placePtr(name, i, label) {
            let pill = ptrEls[name];
            if (!pill) {
                pill = document.createElement('div'); pill.className = 'sptr ' + name;
                pill.innerHTML = `<div class="tag"></div><div class="stalk"></div>`;
                document.getElementById('arr-rail').appendChild(pill); ptrEls[name] = pill;
            }
            if (i == null || !cellEls[i]) { pill.style.opacity = '0'; pill._x = null; return; }
            pill.querySelector('.tag').textContent = label || 'x';
            Motion.glide(pill, cellCenterX(i));
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(cellEls).forEach(k => { cellEls[k].remove(); delete cellEls[k]; });
            Object.keys(bucketEls).forEach(k => { bucketEls[k].remove(); delete bucketEls[k]; });
            Object.keys(ptrEls).forEach(k => { ptrEls[k].remove(); delete ptrEls[k]; });
            if (gapLink) { gapLink.remove(); gapLink = null; }
            confettiArmed = true;
        }
        function loadArr(a) { pause(); arr = a; clearDom(); generateSteps(); renderStep(0); }
        function loadCustom() {
            const raw = (document.getElementById('arr-input').value || '').split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n));
            if (raw.length) loadArr(raw.slice(0, 14));
        }
        function loadExample(n) {
            const ex = [[3, 6, 9, 1], [10]][n];
            document.getElementById('arr-input').value = ex.join(', ');
            loadArr(ex);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('arr-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
