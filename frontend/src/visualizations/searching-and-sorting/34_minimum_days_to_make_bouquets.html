<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum Days to Make m Bouquets</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* mid probe                    */
            --accent-blue:   #06b6d4;    /* hi bound / chrome             */
            --accent-green:  #22c55e;    /* found / feasible              */
            --accent-red:    #f43f5e;    /* eliminated / not found        */
            --accent-purple: #a855f7;    /* lo bound                      */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(6, 182, 212, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(168, 85, 247, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(6,182,212,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"], input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .arr-input { width: 230px; } .val-input { width: 64px; }
        input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(6,182,212,0.18); background: rgba(6,182,212,0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.miss { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.miss::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; padding: 56px 24px 30px; border: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; align-items: center; gap: 30px; overflow-x: auto; min-height: 260px; }

        .stage-label { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--text-dim); align-self: flex-start; margin-left: 4px; }

        /* ── answer range: candidate days line ── */
        .range-block { width: 100%; display: flex; flex-direction: column; gap: 4px; }
        .day-rail { position: relative; display: flex; gap: 7px; justify-content: center; flex-wrap: nowrap; padding: 30px 0 34px; }
        .day-cell { min-width: 40px; height: 40px; padding: 0 4px; border-radius: 11px; display: flex; align-items: center; justify-content: center; position: relative;
            font-family: var(--mono); font-weight: 800; font-size: 15px; will-change: transform;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.05); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s, opacity 0.35s; }
        .day-cell.range { border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .day-cell.mid { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.55); transform: translateY(-3px) scale(1.06); z-index: 3; }
        .day-cell.found { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.92), rgba(33,194,117,0.92)); color: #06251a; box-shadow: 0 0 20px rgba(34,197,94,0.5); transform: translateY(-3px) scale(1.06); z-index: 4; }
        .day-cell.out { opacity: 0.28; }
        .day-cell.eliminated { border-color: rgba(244,63,94,0.3); opacity: 0.22; }

        /* lo / hi (above) and mid (below) gliding pointer pills */
        .bptr { position: absolute; left: 0; display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; will-change: transform; z-index: 6; }
        .bptr.lo, .bptr.hi { bottom: 100%; margin-bottom: 5px; flex-direction: column-reverse; }
        .bptr.mid { top: 100%; margin-top: 5px; }
        .bptr .tag { font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 8px; white-space: nowrap; }
        .bptr .stalk { width: 2px; height: 13px; }
        .bptr.lo  .tag { background: var(--accent-purple); color: #1a0533; box-shadow: 0 0 14px rgba(168,85,247,0.6); } .bptr.lo .stalk { background: var(--accent-purple); }
        .bptr.hi  .tag { background: var(--accent-blue);   color: #04222a; box-shadow: 0 0 14px rgba(6,182,212,0.6); }  .bptr.hi .stalk { background: var(--accent-blue); }
        .bptr.mid .tag { background: var(--accent-orange); color: #3a2400; box-shadow: 0 0 14px rgba(245,165,36,0.6); } .bptr.mid .stalk { background: var(--accent-orange); }

        /* ── garden: bloom-day flowers ── */
        .garden-block { width: 100%; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .garden-rail { position: relative; display: flex; gap: 9px; justify-content: center; flex-wrap: wrap; }
        .flower { width: 52px; height: 60px; border-radius: 13px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; position: relative;
            font-family: var(--mono); will-change: transform;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.05); color: var(--text-dim);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s, opacity 0.35s; }
        .flower .fd { font-weight: 800; font-size: 16px; }
        .flower .fi { position: absolute; top: -20px; left: 0; right: 0; text-align: center; font-size: 10px; color: var(--text-dim); font-weight: 700; }
        .flower .fc { font-size: 14px; line-height: 1; }
        .flower.bloomed { border-color: rgba(34,197,94,0.5); background: rgba(34,197,94,0.10); color: #d6f5e3; }
        .flower.bloomed .fd { color: #6ee7a3; }
        .flower.bud { border-color: rgba(244,63,94,0.28); background: rgba(244,63,94,0.05); color: var(--text-dim); }
        .flower.run { border-color: var(--accent-blue); background: rgba(6,182,212,0.12); box-shadow: 0 0 16px rgba(6,182,212,0.35); }
        .flower.picked { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.30), rgba(33,194,117,0.18)); box-shadow: 0 0 18px rgba(34,197,94,0.5); transform: translateY(-3px) scale(1.04); color: #eafff3; }
        .flower.picked .fd { color: #b6ffd4; }

        .action-stage { position: relative; min-height: 84px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.lo b { color: var(--accent-purple); } .pill.hi b { color: var(--accent-blue); } .pill.mid b { color: var(--accent-orange); }
        .pill.ok b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">bloomDay =</label>
        <input type="text" id="arr-input" class="arr-input" placeholder="1, 10, 3, 10, 2">
        <label class="ui-label">m =</label>
        <input type="number" id="m-input" class="val-input" placeholder="3">
        <label class="ui-label">k =</label>
        <input type="number" id="k-input" class="val-input" placeholder="1">
        <button onclick="loadCustom()">Run</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Ex 1</button>
        <button onclick="loadExample(1)">Ex 2</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Min Days for m Bouquets <span class="sub">&middot; binary search on the answer (days) &middot; feasibility scan &middot; O(n log D)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="range-block">
                    <div class="stage-label">Answer range &middot; candidate days</div>
                    <div class="day-rail" id="day-rail"></div>
                </div>
                <div class="garden-block">
                    <div class="stage-label" id="garden-label">Garden &middot; bloom day of each flower</div>
                    <div class="garden-rail" id="garden-rail"></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill lo">lo <b id="st-lo">&mdash;</b></span>
                            <span class="pill mid">mid <b id="st-mid">&mdash;</b></span>
                            <span class="pill hi">hi <b id="st-hi">&mdash;</b></span>
                            <span class="pill ok">bouquets <b id="st-bq">&mdash;</b></span>
                            <span class="pill">need m <b id="st-m">&mdash;</b></span>
                            <span class="pill">k <b id="st-k">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            glide(el, x) {
                const prev = el._x; el.style.opacity = '1';
                const commit = `translateX(${x.toFixed(2)}px) translateX(-50%)`;
                if (REDUCED || prev == null || Math.abs(x - prev) < 0.5) { el._x = x; el.style.transform = commit; return; }
                const dx = x - prev;
                const kf = SPRING_POS.map(p => ({ transform: `translateX(${(prev + dx * p).toFixed(2)}px) translateX(-50%)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el.style.transform = commit;
            },
        };

        // ───────── State ─────────
        let bloom = [1, 10, 3, 10, 2];
        let mVal = 3;
        let kVal = 1;
        let days = [];            // candidate-day axis: lo..hi (the answer range)
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 800, 380];
        const dayEls = {};        // keyed by day value
        const ptrEls = {};
        const flowerEls = {};     // keyed by flower index

        const EXAMPLES = [
            { a: [1, 10, 3, 10, 2], m: 3, k: 1 },
            { a: [7, 7, 7, 7, 12, 7, 7], m: 2, k: 3 },
        ];

        const CODE = [
            [['kw','def '],['fn','minDays'],['src','(bloom, m, k):']],
            [['kw','  if '],['src','m * k > len(bloom): return -1']],
            [['src','  lo, hi = min(bloom), max(bloom)']],
            [['kw','  while '],['src','lo < hi:']],
            [['src','    mid = (lo + hi) // 2']],
            [['src','    if feasible(mid): hi = mid']],
            [['kw','    else'],['src',': lo = mid + 1']],
            [['kw','  return '],['src','lo']],
            [['kw','  def '],['fn','feasible'],['src','(day):  # runs of k bloomed']],
            [['src','    bouq, run = 0, 0']],
            [['kw','    for '],['src','d in bloom:']],
            [['kw','      if '],['src','d <= day: run += 1']],
            [['kw','      else'],['src',': run = 0']],
            [['kw','      if '],['src','run == k: bouq += 1; run = 0']],
            [['kw','    return '],['src','bouq >= m']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(a) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', a && a.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── feasibility (pure, with per-flower state trace) ─────────
        // returns { ok, bouquets, states } where states[i] in {bloomed, bud, picked}
        function feasibility(day) {
            const states = bloom.map(d => d <= day ? 'bloomed' : 'bud');
            let bouq = 0, run = 0;
            const picked = new Array(bloom.length).fill(false);
            let groupStart = 0;
            for (let i = 0; i < bloom.length; i++) {
                if (bloom[i] <= day) {
                    if (run === 0) groupStart = i;
                    run++;
                    if (run === kVal) {
                        bouq++;
                        for (let j = groupStart; j <= i; j++) picked[j] = true;
                        run = 0;
                    }
                } else {
                    run = 0;
                }
            }
            for (let i = 0; i < bloom.length; i++) if (picked[i]) states[i] = 'picked';
            return { ok: bouq >= mVal, bouquets: bouq, states };
        }

        // ───────── step generation ─────────
        function generateSteps() {
            steps = [];
            const n = bloom.length;
            const loD = Math.min(...bloom), hiD = Math.max(...bloom);
            days = []; for (let d = loD; d <= hiD; d++) days.push(d);

            const base = () => ({
                days: [...days], lo: loD, hi: hiD, mid: null, answer: null,
                garden: bloom.map(() => 'idle'), bouquets: null, gardenLabel: 'Garden &middot; bloom day of each flower',
                eliminated: [], found: false, miss: false, confetti: false,
            });
            const snap = (extra) => Object.assign(base(), extra);

            // impossible case: m*k > n
            if (mVal * kVal > n) {
                steps.push(snap({ lo: loD, hi: hiD, code: [0, 1], miss: true,
                    action: '&#10007; IMPOSSIBLE', actionColor: 'var(--accent-red)',
                    panel: `We need <b>${mVal}</b> bouquets of <b>${kVal}</b> adjacent flowers &#8594; <code>m&times;k = ${mVal*kVal}</code> flowers, but the garden only has <code>${n}</code>. Return <code>-1</code>.`,
                    log: `m*k = ${mVal*kVal} > n = ${n}  ->  -1` }));
                return;
            }

            let lo = loD, hi = hiD;
            const elim = [];
            steps.push(snap({ lo, hi, code: [0, 2], action: 'START', actionColor: 'var(--accent-blue)',
                panel: `Want <b>${mVal}</b> bouquets of <b>${kVal}</b> adjacent bloomed flowers. The answer is some day in <code>[${loD} &#8230; ${hiD}]</code> = <code>[min(bloom) &#8230; max(bloom)]</code>. Binary-search this range: <code>lo=${lo}</code>, <code>hi=${hi}</code>.`,
                log: `init  lo=${lo} hi=${hi}  (answer in [min..max])` }));

            while (lo < hi) {
                const mid = (lo + hi) >> 1;
                steps.push(snap({ lo, hi, mid, eliminated: [...elim], code: [3, 4],
                    action: `probe day = ${mid}`, actionColor: 'var(--accent-orange)',
                    panel: `<code>mid = (lo+hi)/2 = ${mid}</code>. Ask: by day <b>${mid}</b>, can we make <code>&#8805; ${mVal}</code> bouquets?`,
                    log: `mid = ${mid}  -> feasible(${mid})?` }));

                const f = feasibility(mid);
                steps.push(snap({ lo, hi, mid, eliminated: [...elim], code: [8, 9, 10, 11, 12, 13],
                    garden: f.states, bouquets: f.bouquets,
                    gardenLabel: `Scan &middot; flowers with <code>bloom &#8804; ${mid}</code> are open; count runs of <b>${kVal}</b>`,
                    action: `${f.bouquets} bouquet${f.bouquets === 1 ? '' : 's'} made`, actionColor: f.ok ? 'var(--accent-green)' : 'var(--accent-red)',
                    panel: `By day <b>${mid}</b>, bloomed flowers form runs of adjacent open cells. Each run of <code>${kVal}</code> yields one bouquet &#8594; <b>${f.bouquets}</b> bouquet${f.bouquets === 1 ? '' : 's'} (need <code>&#8805; ${mVal}</code>).`,
                    log: `scan day=${mid}: ${f.bouquets} bouquets (need ${mVal})` }));

                if (f.ok) {
                    for (let d = mid + 1; d <= hi; d++) elim.push(d);
                    hi = mid;
                    steps.push(snap({ lo, hi, mid: null, eliminated: [...elim], code: [5],
                        garden: f.states, bouquets: f.bouquets,
                        action: 'FEASIBLE &#8594; go LEFT', actionColor: 'var(--accent-green)',
                        panel: `<code>${f.bouquets} &#8805; ${mVal}</code> &#8594; day <b>${mid}</b> <span style="color:var(--accent-green)">works</span>. Maybe earlier days work too &#8594; keep <code>${mid}</code>, set <code>hi = ${hi}</code>.`,
                        log: `feasible -> hi = ${hi}  (keep ${mid} as candidate)` }));
                } else {
                    for (let d = lo; d <= mid; d++) elim.push(d);
                    lo = mid + 1;
                    steps.push(snap({ lo, hi, mid: null, eliminated: [...elim], code: [6],
                        garden: f.states, bouquets: f.bouquets,
                        action: 'NOT FEASIBLE &#8594; go RIGHT', actionColor: 'var(--accent-red)',
                        panel: `<code>${f.bouquets} &lt; ${mVal}</code> &#8594; day <b>${mid}</b> is <span style="color:var(--accent-red)">too early</span>. Need more bloom &#8594; set <code>lo = ${lo}</code>.`,
                        log: `not feasible -> lo = ${lo}` }));
                }
            }

            // lo == hi : converged. Confirm answer with a final feasibility view.
            const fin = feasibility(lo);
            steps.push(snap({ lo, hi: lo, mid: null, answer: lo, found: true, confetti: true, code: [7],
                garden: fin.states, bouquets: fin.bouquets, eliminated: days.filter(d => d !== lo),
                gardenLabel: `Day <b>${lo}</b> &#8594; <b>${fin.bouquets}</b> bouquet${fin.bouquets === 1 ? '' : 's'} of ${kVal}`,
                action: '&#10003; ANSWER = ' + lo, actionColor: 'var(--accent-green)',
                panel: `<code>lo == hi</code> &#8594; converged. The minimum day to make <b>${mVal}</b> bouquets is <b>${lo}</b>.`,
                log: `lo == hi  ANSWER = ${lo}` }));
        }

        // ───────── render ─────────
        function dayCenterX(d) { const el = dayEls[d]; return el ? el.offsetLeft + el.offsetWidth / 2 : 0; }
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // ---- answer-range day axis (persistent, keyed by day value) ----
            const rail = document.getElementById('day-rail');
            const elimSet = new Set(step.eliminated || []);
            const used = new Set();
            (step.days || []).forEach(d => {
                used.add(String(d));
                let el = dayEls[d];
                if (!el) { el = document.createElement('div'); el.className = 'day-cell'; dayEls[d] = el; rail.appendChild(el); }
                el.textContent = d;
                const inRange = d >= step.lo && d <= step.hi;
                let cls = 'day-cell';
                if (step.found && d === step.answer) cls += ' found';
                else if (step.mid != null && d === step.mid) cls += ' mid';
                else if (elimSet.has(d)) cls += ' eliminated';
                else if (!inRange) cls += ' out';
                else cls += ' range';
                el.className = cls;
            });
            Object.keys(dayEls).forEach(k => { if (!used.has(k)) { dayEls[k].remove(); delete dayEls[k]; } });

            // pointers ride the day axis
            placePtr('lo', step.lo != null ? step.lo : null);
            placePtr('hi', step.hi != null ? step.hi : null);
            placePtr('mid', step.mid != null ? step.mid : null);

            // ---- garden flowers (persistent, keyed by index) ----
            const garden = document.getElementById('garden-rail');
            const gUsed = new Set();
            for (let i = 0; i < bloom.length; i++) {
                gUsed.add(String(i));
                let fl = flowerEls[i];
                if (!fl) {
                    fl = document.createElement('div'); fl.className = 'flower';
                    fl.innerHTML = `<span class="fi"></span><span class="fc"></span><span class="fd"></span>`;
                    flowerEls[i] = fl; garden.appendChild(fl);
                }
                fl.querySelector('.fi').textContent = i;
                fl.querySelector('.fd').textContent = bloom[i];
                const st = (step.garden && step.garden[i]) || 'idle';
                let cls = 'flower';
                let icon = '';
                if (st === 'picked') { cls += ' picked'; icon = '❀'; }       // florette
                else if (st === 'bloomed') { cls += ' bloomed'; icon = '✿'; } // black florette
                else if (st === 'bud') { cls += ' bud'; icon = '•'; }         // bud dot
                else { icon = '·'; }
                fl.querySelector('.fc').textContent = icon;
                fl.className = cls;
            }
            Object.keys(flowerEls).forEach(k => { if (!gUsed.has(k)) { flowerEls[k].remove(); delete flowerEls[k]; } });
            document.getElementById('garden-label').innerHTML = step.gardenLabel || 'Garden &middot; bloom day of each flower';

            // ---- narration / action ----
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.found);
            mp.classList.toggle('miss', !!step.miss);
            const aw = document.getElementById('action-word'); aw.innerHTML = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // ---- state pills ----
            document.getElementById('st-lo').textContent = step.lo != null ? step.lo : '—';
            document.getElementById('st-hi').textContent = step.hi != null ? step.hi : '—';
            document.getElementById('st-mid').textContent = step.mid != null ? step.mid : '—';
            document.getElementById('st-bq').textContent = step.bouquets != null ? step.bouquets : '—';
            document.getElementById('st-m').textContent = mVal;
            document.getElementById('st-k').textContent = kVal;
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function placePtr(name, d) {
            let pill = ptrEls[name];
            if (!pill) {
                pill = document.createElement('div'); pill.className = 'bptr ' + name;
                pill.innerHTML = (name === 'mid') ? `<div class="stalk"></div><div class="tag">mid</div>` : `<div class="tag">${name}</div><div class="stalk"></div>`;
                document.getElementById('day-rail').appendChild(pill); ptrEls[name] = pill;
            }
            if (d == null || !dayEls[d]) { pill.style.opacity = '0'; pill._x = null; return; }
            Motion.glide(pill, dayCenterX(d));
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(dayEls).forEach(k => { dayEls[k].remove(); delete dayEls[k]; });
            Object.keys(flowerEls).forEach(k => { flowerEls[k].remove(); delete flowerEls[k]; });
            Object.keys(ptrEls).forEach(k => { ptrEls[k].remove(); delete ptrEls[k]; });
            confettiArmed = true;
        }
        function loadData(a, m, k) { pause(); bloom = a; mVal = m; kVal = k; clearDom(); generateSteps(); renderStep(0); }
        function loadCustom() {
            const raw = (document.getElementById('arr-input').value || '').split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n) && n >= 1);
            const a = raw.slice(0, 16);
            const m = parseInt(document.getElementById('m-input').value, 10);
            const k = parseInt(document.getElementById('k-input').value, 10);
            if (a.length && !isNaN(m) && m >= 1 && !isNaN(k) && k >= 1) loadData(a, m, k);
        }
        function loadExample(n) {
            const ex = EXAMPLES[n];
            document.getElementById('arr-input').value = ex.a.join(', ');
            document.getElementById('m-input').value = ex.m;
            document.getElementById('k-input').value = ex.k;
            loadData([...ex.a], ex.m, ex.k);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        ['arr-input', 'm-input', 'k-input'].forEach(id => document.getElementById(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); }));
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
