<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stable vs Unstable Sort</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* value in motion / compare      */
            --accent-blue:   #06b6d4;   /* sorted prefix / chrome         */
            --accent-green:  #22c55e;   /* settled / order preserved      */
            --accent-red:    #f43f5e;   /* order broken                   */
            --accent-purple: #a855f7;   /* current key / cursor           */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 220px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168,85,247,0.18); background: rgba(168,85,247,0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(168, 85, 247, 0.5); box-shadow: 0 0 18px rgba(168, 85, 247, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button.mode-active { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.08)); border-color: rgba(6,182,212,0.5); color: #a5f3fc; }
        #play-btn { background: linear-gradient(135deg, rgba(168,85,247,0.22), rgba(168,85,247,0.10)); border-color: rgba(168, 85, 247, 0.45); color: #e9d5ff; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #e9d5ff; background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); box-shadow: 0 0 12px rgba(168,85,247,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(168,85,247,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #ede9fe; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-purple); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration.broken { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.06); }
        .narration.broken::before { content: '\2717'; color: var(--accent-red); }
        .narration code { background: rgba(168,85,247,0.14); color: #d8b4fe; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(168,85,247,0.08), transparent 70%), #090d18; padding: 64px 24px 60px; border: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: center; overflow-x: auto; min-height: 230px; }

        .arr-rail { position: relative; display: flex; gap: 12px; }
        /* a record card: big KEY in the middle, original-index badge top-right */
        .cell { width: 58px; height: 64px; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative;
            font-family: var(--mono); font-weight: 800; font-size: 22px; will-change: transform;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.05); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s; }
        .cell.sorted { border-color: rgba(6,182,212,0.5); background: rgba(6,182,212,0.10); color: #a5f3fc; }   /* sorted prefix */
        .cell.cur  { box-shadow: 0 0 22px rgba(168,85,247,0.55); border-color: var(--accent-purple); transform: translateY(-3px) scale(1.05); z-index: 3; }
        .cell.cmp  { box-shadow: 0 0 22px rgba(245,165,36,0.55); border-color: var(--accent-orange); color: #ffd591; z-index: 3; }
        .cell.swap { box-shadow: 0 0 22px rgba(245,165,36,0.6); border-color: var(--accent-orange); z-index: 3; }
        .cell.settled { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.85), rgba(33,194,117,0.85)); color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.4); }
        .cell.preserved { border-color: var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0; box-shadow: 0 0 18px rgba(34,197,94,0.45); }
        .cell.brokenord { border-color: var(--accent-red); background: rgba(244,63,94,0.16); color: #fecdd3; box-shadow: 0 0 18px rgba(244,63,94,0.5); }
        /* index label above (current physical slot), origin badge inside */
        .cell .ci { position: absolute; top: -24px; left: 0; right: 0; text-align: center; font-size: 11px; color: var(--text-dim); font-weight: 700; }
        .cell .orig { position: absolute; bottom: -22px; left: 0; right: 0; text-align: center; font-size: 11px; font-weight: 800; color: var(--accent-blue); font-family: var(--mono); }
        .cell.settled .orig, .cell.preserved .orig, .cell.brokenord .orig { color: inherit; }

        .fly { position: absolute; width: 58px; height: 64px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-weight: 800; font-size: 22px; pointer-events: none; z-index: 8; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.2); color: #ffd591; box-shadow: 0 0 18px rgba(245,165,36,0.55); }

        /* pointer pills: i (above, current key) / j (below, scan/compare) */
        .sptr { position: absolute; left: 0; display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; will-change: transform; z-index: 6; }
        .sptr.i { bottom: 100%; margin-bottom: 26px; flex-direction: column-reverse; }
        .sptr.j { bottom: 100%; margin-bottom: 26px; flex-direction: column-reverse; }
        .sptr .tag { font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 8px; white-space: nowrap; }
        .sptr .stalk { width: 2px; height: 14px; }
        .sptr.i .tag { background: var(--accent-purple); color: #1a0533; box-shadow: 0 0 14px rgba(168,85,247,0.6); } .sptr.i .stalk { background: var(--accent-purple); }
        .sptr.j .tag { background: var(--accent-orange); color: #3a2400; box-shadow: 0 0 14px rgba(245,165,36,0.6); } .sptr.j .stalk { background: var(--accent-orange); }

        .action-stage { position: relative; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-purple); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }
        .panel-head .pip.blue { background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line .cm { color: #5c6b85; font-style: italic; }
        .code-line.active { background: rgba(168,85,247,0.12); border-left-color: var(--accent-purple); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.i b { color: var(--accent-purple); } .pill.j b { color: var(--accent-orange); } .pill.mode b { color: var(--accent-blue); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">keys =</label>
        <input type="text" id="arr-input" placeholder="2, 1, 2, 1">
        <button onclick="loadCustom()">Sort</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button id="mode-stable"   class="mode-active" onclick="setMode('stable')">Stable (insertion)</button>
        <button id="mode-unstable" onclick="setMode('unstable')">Unstable (selection)</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">2 1 2 1</button>
        <button onclick="loadExample(1)">4 2 4 2 1</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Stable vs Unstable Sort <span class="sub" id="subtitle">&middot; sort records by key &middot; do equal keys keep their original order?</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="arr-rail" id="arr-rail"></div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill mode">sort <b id="st-mode">stable</b></span>
                            <span class="pill i">i <b id="st-i">0</b></span>
                            <span class="pill j">j <b id="st-j">0</b></span>
                            <span class="pill">swaps <b id="st-swaps">0</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip" id="code-pip"></span> <span id="code-title">Algorithm</span></div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring + FLIP cross-swap) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            glide(el, x) {
                const prev = el._x; el.style.opacity = '1';
                const commit = `translateX(${x.toFixed(2)}px) translateX(-50%)`;
                if (REDUCED || prev == null || Math.abs(x - prev) < 0.5) { el._x = x; el.style.transform = commit; return; }
                const dx = x - prev;
                const kf = SPRING_POS.map(p => ({ transform: `translateX(${(prev + dx * p).toFixed(2)}px) translateX(-50%)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el.style.transform = commit;
            },
        };

        // ───────── State ─────────
        // keys = the sort key. each record carries a stable id "tag" = its ORIGINAL index (a,b,c..) shown as a badge.
        let keys = [2, 1, 2, 1];
        let mode = 'stable';            // 'stable' = insertion sort | 'unstable' = selection sort
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 820, 400];
        const cellEls = {};             // keyed by record id (stable origin index)
        const ptrEls = {};

        // Each line: array of [class, text] tokens. Two code listings, one per mode.
        const CODE_STABLE = [
            [['kw','def '],['fn','insertion_sort'],['src','(a):       ']],
            [['kw','  for '],['src','i in range(1, len(a)):']],
            [['src','    key = a[i];  j = i - 1']],
            [['kw','    while '],['src','j >= 0 '],['kw','and '],['src','a[j].k > key.k:']],
            [['src','      a[j+1] = a[j];  j -= 1   '],['cm','# shift only on >']],
            [['src','    a[j+1] = key            '],['cm','# equals never jump']],
        ];
        const CODE_UNSTABLE = [
            [['kw','def '],['fn','selection_sort'],['src','(a):    ']],
            [['kw','  for '],['src','i in range(len(a)):']],
            [['src','    m = i']],
            [['kw','    for '],['src','j in range(i+1, len(a)):']],
            [['kw','      if '],['src','a[j].k < a[m].k: m = j  '],['cm','# strict <']],
            [['src','    swap(a[i], a[m])      '],['cm','# long-range swap reorders ties']],
        ];
        function activeCode() { return mode === 'stable' ? CODE_STABLE : CODE_UNSTABLE; }

        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            activeCode().forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
            document.getElementById('code-title').textContent = mode === 'stable' ? 'Insertion sort (stable)' : 'Selection sort (unstable)';
            document.getElementById('code-pip').className = 'pip' + (mode === 'unstable' ? ' blue' : '');
        }
        function highlightCode(a) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', a && a.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── helpers ─────────
        // a record = { k:key, id:originalIndex }. id is the stable DOM key + the badge text.
        function buildRecords() { return keys.map((k, i) => ({ k, id: i })); }
        // detect, for the FINAL ordering, which equal-key groups stayed in original order.
        // returns a Set of record ids that are "out of original order" within their key group.
        function brokenSet(records) {
            const broken = new Set();
            const byKey = {};
            records.forEach((r, pos) => { (byKey[r.k] = byKey[r.k] || []).push({ id: r.id, pos }); });
            Object.values(byKey).forEach(group => {
                // group is in final-position order already; flag any whose ids are not ascending
                for (let x = 1; x < group.length; x++) {
                    if (group[x].id < group[x - 1].id) { broken.add(group[x].id); broken.add(group[x - 1].id); }
                }
            });
            return broken;
        }
        const badge = (id) => String.fromCharCode(97 + id); // 0->a, 1->b ...

        // ───────── step generation ─────────
        function generateSteps() {
            return mode === 'stable' ? genInsertion() : genSelection();
        }

        // snapshot factory — `order` is array of record ids in current physical order
        function snapBase(order, recById) {
            return (extra) => Object.assign({
                order: [...order], recById, i: 0, j: 0, swaps: 0,
                cur: -1, cmp: -1, swap: null, sortedTo: -1, done: false
            }, extra);
        }

        // ---------- STABLE: insertion sort ----------
        function genInsertion() {
            steps = [];
            const recs = buildRecords();
            const recById = {}; recs.forEach(r => recById[r.id] = r);
            let order = recs.map(r => r.id);       // physical order by id
            let swaps = 0;
            const n = order.length;
            const keyOf = (id) => recById[id].k;
            const mk = () => snapBase(order, recById);

            steps.push(mk()({ code: [0, 1], swaps, sortedTo: 0, action: 'START', actionColor: 'var(--accent-purple)',
                panel: `<b>Insertion sort</b> is <b>stable</b>. We sort records by their <code>key</code> (top number); the letter badge below is each record&#39;s <b>original index</b>. Watch whether equal keys keep their original a&#8594;b&#8594;c order.`,
                log: `mode=stable  keys=[${keys.join(', ')}]` }));

            for (let i = 1; i < n; i++) {
                const keyId = order[i];
                const keyK = keyOf(keyId);
                let j = i - 1;

                steps.push(mk()({ code: [2], swaps, i, j, cur: keyId, sortedTo: i - 1, action: `pick key = ${keyK}${badge(keyId)}`, actionColor: 'var(--accent-purple)',
                    panel: `Take <code>key = a[${i}]</code> &mdash; key <b>${keyK}</b><sub>${badge(keyId)}</sub>. The prefix <code>[0..${i - 1}]</code> is already sorted. Scan left while it is <b>strictly greater</b>.`,
                    log: `i=${i}  key=${keyK}${badge(keyId)}` }));

                while (j >= 0 && keyOf(order[j]) > keyK) {
                    const cmpId = order[j];
                    steps.push(mk()({ code: [3, 4], swaps, i, j, cur: keyId, cmp: cmpId, sortedTo: i - 1,
                        action: `${keyOf(cmpId)} > ${keyK} → shift`, actionColor: 'var(--accent-orange)',
                        panel: `<code>a[${j}]</code> = <b>${keyOf(cmpId)}</b><sub>${badge(cmpId)}</sub> &gt; key <b>${keyK}</b> &#8594; shift it one slot right, then keep scanning.`,
                        log: `  a[${j}]=${keyOf(cmpId)}${badge(cmpId)} > ${keyK}  shift`, swap: [order[j], keyId, 'shift'] }));
                    // shift the key one slot left by swapping the adjacent ids
                    [order[j], order[j + 1]] = [order[j + 1], order[j]];
                    swaps++;
                    j--;
                }

                // place key (stop): equals stop the loop, so a tie never jumps past an earlier equal
                steps.push(mk()({ code: [5], swaps, i, j, cur: keyId, cmp: (j >= 0 ? order[j] : -1), sortedTo: i,
                    action: `place ${keyK}${badge(keyId)} at index ${j + 1}`, actionColor: 'var(--accent-green)',
                    panel: j >= 0 && keyOf(order[j]) === keyK
                        ? `Stopped: <code>a[${j}]</code> = <b>${keyOf(order[j])}</b><sub>${badge(order[j])}</sub> is <b>equal</b>, not greater. Key <b>${keyK}</b><sub>${badge(keyId)}</sub> settles <b>right after</b> it &mdash; original order is kept.`
                        : `Inserted key <b>${keyK}</b><sub>${badge(keyId)}</sub> at index <code>${j + 1}</code>. Prefix <code>[0..${i}]</code> is sorted.`,
                    log: `  place ${keyK}${badge(keyId)} @ ${j + 1}` }));
            }

            finishStep(recById, order, swaps,
                `Every swap was <b>adjacent</b> and only on <code>&gt;</code>, so equal keys never crossed each other. The relative order of every tie is <b>preserved</b>.`);
            return steps;
        }

        // ---------- UNSTABLE: selection sort ----------
        function genSelection() {
            steps = [];
            const recs = buildRecords();
            const recById = {}; recs.forEach(r => recById[r.id] = r);
            let order = recs.map(r => r.id);
            let swaps = 0;
            const n = order.length;
            const keyOf = (id) => recById[id].k;
            const mk = () => snapBase(order, recById);

            steps.push(mk()({ code: [0, 1], swaps, sortedTo: 0, action: 'START', actionColor: 'var(--accent-purple)',
                panel: `<b>Selection sort</b> is <b>unstable</b>. Each round it finds the minimum key in the rest and <b>swaps it long-range</b> into place. A long swap can hop a record <b>over its equal-key twin</b>, flipping their order.`,
                log: `mode=unstable  keys=[${keys.join(', ')}]` }));

            for (let i = 0; i < n - 1; i++) {
                let m = i;
                steps.push(mk()({ code: [2], swaps, i, j: i, cur: order[i], cmp: order[m], sortedTo: i - 1,
                    action: `round ${i}: assume min = a[${i}]`, actionColor: 'var(--accent-purple)',
                    panel: `Round <code>i=${i}</code>. Assume the minimum is <code>a[${i}]</code> = <b>${keyOf(order[i])}</b><sub>${badge(order[i])}</sub>. Scan the rest for anything <b>strictly smaller</b>.`,
                    log: `i=${i}  min?=${keyOf(order[i])}${badge(order[i])}` }));

                for (let j = i + 1; j < n; j++) {
                    const isNew = keyOf(order[j]) < keyOf(order[m]);
                    steps.push(mk()({ code: [3, 4], swaps, i, j, cur: order[i], cmp: order[m], scan: order[j], sortedTo: i - 1,
                        action: isNew ? `${keyOf(order[j])} < ${keyOf(order[m])} → new min` : `${keyOf(order[j])} ≥ ${keyOf(order[m])} → keep`, actionColor: 'var(--accent-orange)',
                        panel: isNew
                            ? `<code>a[${j}]</code> = <b>${keyOf(order[j])}</b><sub>${badge(order[j])}</sub> &lt; current min <b>${keyOf(order[m])}</b> &#8594; new minimum.`
                            : `<code>a[${j}]</code> = <b>${keyOf(order[j])}</b><sub>${badge(order[j])}</sub> is not smaller (uses strict <code>&lt;</code>) &#8594; keep current min.`,
                        log: `  j=${j} ${keyOf(order[j])}${badge(order[j])} ${isNew ? '< new min' : '>= keep'}` }));
                    if (isNew) m = j;
                }

                if (m !== i) {
                    const aId = order[i], bId = order[m];
                    steps.push(mk()({ code: [5], swaps, i, j: m, cur: aId, cmp: bId, sortedTo: i - 1,
                        action: `swap a[${i}] ↔ a[${m}]`, actionColor: 'var(--accent-orange)',
                        panel: `Swap min <b>${keyOf(bId)}</b><sub>${badge(bId)}</sub> into index <code>${i}</code> (a <b>long-range</b> swap with <b>${keyOf(aId)}</b><sub>${badge(aId)}</sub>). This jump can reorder equal keys.`,
                        log: `  swap a[${i}]<->a[${m}]`, swap: [aId, bId, 'cross'] }));
                    [order[i], order[m]] = [order[m], order[i]]; swaps++;
                    steps.push(mk()({ code: [5], swaps, i, sortedTo: i, action: `index ${i} locked`, actionColor: 'var(--accent-green)',
                        panel: `Index <code>${i}</code> now holds the minimum. Prefix <code>[0..${i}]</code> is sorted.`,
                        log: `  locked index ${i} = ${keyOf(order[i])}${badge(order[i])}` }));
                } else {
                    steps.push(mk()({ code: [5], swaps, i, sortedTo: i, action: `a[${i}] already min`, actionColor: 'var(--accent-green)',
                        panel: `<code>a[${i}]</code> = <b>${keyOf(order[i])}</b><sub>${badge(order[i])}</sub> is already the minimum &mdash; no swap. Index <code>${i}</code> locked.`,
                        log: `  no swap, index ${i} locked` }));
                }
            }

            finishStep(recById, order, swaps,
                `A long-range swap can lift a record over an equal-key twin, so ties may end up in a <b>different</b> relative order than they started.`);
            return steps;
        }

        // shared completion step — colors equal-key groups green (preserved) or red (broken)
        function finishStep(recById, order, swaps, why) {
            const finalRecs = order.map(id => recById[id]);
            const broken = brokenSet(finalRecs);
            const stable = broken.size === 0;
            const keyStr = finalRecs.map(r => r.k).join(', ');
            const ordStr = finalRecs.map(r => r.k + badge(r.id)).join(' ');
            steps.push(Object.assign(snapBase(order, recById)(), {
                code: [], swaps, sortedTo: order.length, done: true, complete: true, confetti: stable, broken,
                action: stable ? '✓ ORDER PRESERVED' : '✗ ORDER BROKEN',
                actionColor: stable ? 'var(--accent-green)' : 'var(--accent-red)',
                panel: `Sorted by key: <code>[${keyStr}]</code>. ${why} ${stable
                    ? `Equal keys are still in <b>a&#8594;b&#8594;c</b> original order &#8594; this sort is <b>stable</b>.`
                    : `Highlighted ties (red) flipped their original order &#8594; this sort is <b>unstable</b>.`}`,
                log: `done  [${ordStr}]  swaps=${swaps}  ${stable ? 'STABLE' : 'UNSTABLE'}`
            }));
        }

        // ───────── render ─────────
        function cellCenterX(id) { const el = cellEls[id]; return el ? el.offsetLeft + el.offsetWidth / 2 : 0; }
        function physIndexOf(step, id) { return step.order.indexOf(id); }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const rail = document.getElementById('arr-rail');
            const recById = step.recById;

            const used = new Set();
            // place each record at its physical slot; cells are keyed by stable record id
            step.order.forEach((id, pos) => {
                used.add(String(id));
                let el = cellEls[id];
                if (!el) {
                    el = document.createElement('div'); el.className = 'cell';
                    el.innerHTML = `<span class="ci"></span><span class="cv"></span><span class="orig"></span>`;
                    cellEls[id] = el; rail.appendChild(el);
                }
                el.querySelector('.ci').textContent = pos;
                el.querySelector('.cv').textContent = recById[id].k;
                el.querySelector('.orig').textContent = badge(id);
                // order the DOM children so flex layout matches physical order
                if (rail.children[pos] !== el) rail.insertBefore(el, rail.children[pos] || null);

                let cls = 'cell';
                if (step.done) {
                    cls += step.broken && step.broken.has(id) ? ' brokenord' : ' preserved';
                } else {
                    if (pos <= step.sortedTo) cls += ' sorted';
                    if (step.swap && (id === step.swap[0] || id === step.swap[1])) cls += ' swap';
                    else if (id === step.cur) cls += ' cur';
                    else if (id === step.cmp || id === step.scan) cls += ' cmp';
                }
                el.className = cls;
            });
            // reap removed nodes (never happens here, but keep idiom)
            Object.keys(cellEls).forEach(k => { if (!used.has(k)) { cellEls[k].remove(); delete cellEls[k]; } });

            // pointers: i (current key / round) and j (scan / compare)
            const iId = (!step.done && step.cur >= 0) ? step.cur : null;
            const jId = (!step.done && typeof step.scan !== 'undefined' && step.scan >= 0) ? step.scan
                       : (!step.done && step.cmp >= 0 && step.cmp !== step.cur ? step.cmp : null);
            placePtr('i', iId);
            placePtr('j', jId);

            // cross-swap fly animation
            if (step.swap) playSwap(step.swap[0], step.swap[1], step.swap[2]);

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete && (!step.broken || step.broken.size === 0));
            mp.classList.toggle('broken', !!step.complete && step.broken && step.broken.size > 0);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            document.getElementById('st-mode').textContent = mode;
            document.getElementById('st-i').textContent = step.i;
            document.getElementById('st-j').textContent = step.j;
            document.getElementById('st-swaps').textContent = step.swaps;
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        // animate two clone tiles crossing between two record ids (shows the swap/shift)
        function playSwap(idA, idB, kind) {
            if (REDUCED) return;
            const ca = cellEls[idA], cb = cellEls[idB], rail = document.getElementById('arr-rail');
            if (!ca || !cb) return;
            const xa = ca.offsetLeft, xb = cb.offsetLeft, y = ca.offsetTop;
            const va = ca.querySelector('.cv').textContent + (ca.querySelector('.orig').textContent || '');
            const vb = cb.querySelector('.cv').textContent + (cb.querySelector('.orig').textContent || '');
            mkFly(vb, xb, xa, y, rail);
            mkFly(va, xa, xb, y, rail);
        }
        function mkFly(val, fromX, toX, y, rail) {
            const f = document.createElement('div'); f.className = 'fly'; f.textContent = val;
            f.style.top = y + 'px';
            rail.appendChild(f);
            const kf = SPRING_POS.map(p => ({ transform: `translateX(${(fromX + (toX - fromX) * p).toFixed(1)}px) translateY(${(-24 * Math.sin(Math.PI * p)).toFixed(1)}px)`, opacity: (p < 0.08 ? p / 0.08 : p > 0.9 ? (1 - p) / 0.1 : 1).toFixed(2) }));
            const an = f.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
            an.onfinish = () => f.remove();
        }

        function placePtr(name, id) {
            let pill = ptrEls[name];
            if (!pill) {
                pill = document.createElement('div'); pill.className = 'sptr ' + name;
                pill.innerHTML = `<div class="tag">${name}</div><div class="stalk"></div>`;
                document.getElementById('arr-rail').appendChild(pill); ptrEls[name] = pill;
            }
            if (id == null || !cellEls[id]) { pill.style.opacity = '0'; pill._x = null; return; }
            Motion.glide(pill, cellCenterX(id));
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(cellEls).forEach(k => { cellEls[k].remove(); delete cellEls[k]; });
            Object.keys(ptrEls).forEach(k => { ptrEls[k].remove(); delete ptrEls[k]; });
            document.querySelectorAll('.fly').forEach(f => f.remove());
            confettiArmed = true;
        }
        function rebuild() { pause(); clearDom(); buildCodePanel(); generateSteps(); renderStep(0); }
        function loadKeys(a) { keys = a; rebuild(); }
        function setMode(m) {
            mode = m;
            document.getElementById('mode-stable').classList.toggle('mode-active', m === 'stable');
            document.getElementById('mode-unstable').classList.toggle('mode-active', m === 'unstable');
            document.getElementById('subtitle').innerHTML = m === 'stable'
                ? '&middot; insertion sort &middot; equal keys never jump &#8594; stable'
                : '&middot; selection sort &middot; long swaps can reorder ties &#8594; unstable';
            rebuild();
        }
        function loadCustom() {
            const raw = (document.getElementById('arr-input').value || '').split(',').map(s => parseInt(s.trim(), 10)).filter(n => Number.isFinite(n));
            if (raw.length) loadKeys(raw.slice(0, 9));
        }
        function loadExample(n) {
            const ex = [[2, 1, 2, 1], [4, 2, 4, 2, 1]][n];
            document.getElementById('arr-input').value = ex.join(', ');
            loadKeys(ex);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('arr-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
