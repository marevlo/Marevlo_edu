<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sort a k-Sorted (Nearly Sorted) Array</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* incoming value / push path      */
            --accent-blue:   #06b6d4;    /* child / edges / chrome          */
            --accent-green:  #22c55e;    /* settled / extracted result      */
            --accent-red:    #f43f5e;    /* removed                         */
            --accent-purple: #a855f7;    /* current node / root             */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 940px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.12), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"], input[type="number"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .arr-input { width: 280px; }
        .k-input { width: 64px; }
        input:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168,85,247,0.18); background: rgba(168,85,247,0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(168, 85, 247, 0.5); box-shadow: 0 0 18px rgba(168, 85, 247, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(168,85,247,0.22), rgba(168,85,247,0.10)); border-color: rgba(168, 85, 247, 0.45); color: #e9d5ff; min-width: 80px; }
        .op-btn.load { border-color: rgba(245,165,36,0.4); color: #ffe2b0; font-family: var(--mono); }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #e9d5ff; background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); box-shadow: 0 0 12px rgba(168,85,247,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(168,85,247,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #ede9fe; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-purple); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(168,85,247,0.14); color: #d8b4fe; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(168,85,247,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }

        /* INPUT ROW */
        .row-zone { padding: 14px 16px 6px; }
        .row-label { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); text-align: center; margin-bottom: 8px; }
        .row-rail { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; min-height: 44px; }
        .icell { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative;
            font-family: var(--mono); font-weight: 800; font-size: 15px; border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, opacity 0.35s; }
        .icell.pushed { opacity: 0.32; border-style: dashed; color: var(--text-dim); }
        .icell.next { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 16px rgba(245,165,36,0.5); transform: translateY(-2px); }
        .icell .ii { position: absolute; bottom: -16px; left: 0; right: 0; text-align: center; font-size: 10px; color: var(--text-dim); font-weight: 700; }

        /* HEAP TREE */
        .tree-stage { position: relative; width: 100%; height: 220px; overflow: auto; scrollbar-width: thin; }
        .tree-stage::-webkit-scrollbar { height: 7px; width: 7px; }
        .tree-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .tree-canvas { position: relative; margin: 0 auto; }
        #edges { position: absolute; left: 0; top: 0; overflow: visible; pointer-events: none; z-index: 1; }
        .edge-ln { stroke: var(--accent-blue); stroke-width: 2.2; fill: none; opacity: 0.45; transition: stroke 0.3s, opacity 0.3s; }
        .edge-ln.active { stroke: var(--accent-orange); opacity: 1; filter: drop-shadow(0 0 6px rgba(245,165,36,0.6)); }

        .hnode { position: absolute; width: 44px; height: 44px; margin: -22px 0 0 -22px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-family: var(--mono); font-weight: 800; font-size: 16px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.06); color: var(--text-main);
            z-index: 2; will-change: transform; transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s; }
        .hnode.root { border-color: var(--accent-purple); }
        .hnode.cur { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 20px rgba(168,85,247,0.55); }
        .hnode.cmp { border-color: var(--accent-blue); background: rgba(6,182,212,0.16); color: #a5f3fc; box-shadow: 0 0 20px rgba(6,182,212,0.5); }
        .hnode.swap { border-color: var(--accent-orange); background: rgba(245,165,36,0.18); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.6); }
        .hnode.new { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 22px rgba(245,165,36,0.55); }
        .hnode.out { border-color: var(--accent-green); background: rgba(34,197,94,0.16); color: #bbf7d0; box-shadow: 0 0 22px rgba(34,197,94,0.55); }
        .hnode .idx { position: absolute; top: -8px; right: -8px; min-width: 15px; height: 15px; padding: 0 3px; border-radius: 8px; background: rgba(10,15,28,0.85); color: var(--text-dim); font-size: 9px; font-weight: 800; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-main); }

        .empty-note { color: var(--text-dim); font-family: var(--mono); font-size: 13px; }

        /* BACKING ARRAY */
        .array-zone { padding: 4px 16px 14px; }
        .array-label { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); text-align: center; margin-bottom: 8px; }
        .array-rail { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; min-height: 44px; }
        .acell { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative;
            font-family: var(--mono); font-weight: 800; font-size: 15px; border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s; }
        .acell.cur { border-color: var(--accent-purple); background: rgba(168,85,247,0.16); color: #e9d5ff; box-shadow: 0 0 14px rgba(168,85,247,0.45); }
        .acell.cmp { border-color: var(--accent-blue); background: rgba(6,182,212,0.14); color: #a5f3fc; }
        .acell.swap { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; }
        .acell .ai { position: absolute; bottom: -16px; left: 0; right: 0; text-align: center; font-size: 10px; color: var(--text-dim); font-weight: 700; }

        /* SORTED OUTPUT */
        .action-stage { position: relative; min-height: 78px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .extracted-track { display: flex; gap: 6px; align-items: center; min-height: 34px; flex-wrap: wrap; justify-content: center; }
        .ex-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
        .ex-tile { min-width: 34px; height: 34px; padding: 0 6px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 16px; font-weight: 800; border: 2px solid var(--accent-green); background: rgba(34,197,94,0.14); color: #bbf7d0; }
        .ex-tile.fresh { border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 16px rgba(245,165,36,0.5); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-purple); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(168,85,247,0.12); border-left-color: var(--accent-purple); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .pill-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; }
        .pill { font-family: var(--mono); font-size: 12px; padding: 6px 12px; border-radius: 9px; border: 1px solid var(--border-main); background: rgba(255,255,255,0.03); display: flex; gap: 7px; align-items: center; }
        .pill .pk { color: var(--text-dim); }
        .pill .pv { color: var(--text-main); font-weight: 700; }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">arr =</label>
        <input type="text" id="arr-input" class="arr-input" placeholder="6, 5, 3, 2, 8, 10, 9">
        <label class="ui-label">k =</label>
        <input type="number" id="k-input" class="k-input" placeholder="3" min="0" max="12">
        <button class="op-btn load" onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Example 1</button>
        <button onclick="loadExample(1)">Example 2</button>
        <button onclick="resetSim()">&#8634; Reset</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Sort a k-Sorted Array <span class="sub">&middot; min-heap of size <code>k+1</code> &middot; each element is &#8804; k slots from its sorted spot &middot; O(n&middot;log k)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="row-zone">
                    <div class="row-label">input stream &middot; consume left &#8594; right</div>
                    <div class="row-rail" id="input-rail"></div>
                </div>
                <div class="tree-stage" id="tree-stage">
                    <div class="tree-canvas" id="tree-canvas">
                        <svg id="edges"></svg>
                    </div>
                </div>
                <div class="array-zone">
                    <div class="array-label">min-heap (size &#8804; k+1) &middot; backing array &middot; root = current minimum</div>
                    <div class="array-rail" id="array-rail"></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="extracted-track"><span class="ex-label" id="ex-label" style="display:none">sorted output:</span><span id="extracted" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center"></span></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> State</div>
                            <div class="pill-row" id="pill-row"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            move(el, x, y) {
                const px = el._x, py = el._y;
                const commit = `translate(${x.toFixed(1)}px, ${y.toFixed(1)}px)`;
                if (REDUCED || px == null || (Math.abs(x - px) < 0.5 && Math.abs(y - py) < 0.5)) { el._x = x; el._y = y; el.style.transform = commit; return; }
                const dx = x - px, dy = y - py;
                const kf = SPRING_POS.map(p => ({ transform: `translate(${(px + dx * p).toFixed(1)}px, ${(py + dy * p).toFixed(1)}px)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el._y = y; el.style.transform = commit;
            },
            pop(el) {
                if (REDUCED) { el.style.opacity = '1'; return; }
                const kf = SPRING_POP.map(p => ({ opacity: Math.min(1, p * 2).toFixed(3), transform: `translate(${el._x.toFixed(1)}px, ${el._y.toFixed(1)}px) scale(${(0.3 + 0.7 * p).toFixed(3)})` }));
                const a = el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
                a.onfinish = () => { el.style.transform = `translate(${el._x.toFixed(1)}px, ${el._y.toFixed(1)}px)`; };
            },
        };

        // ───────── State ─────────
        let arr = [6, 5, 3, 2, 8, 10, 9];
        let kVal = 3;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 820, 400];
        const nodeEls = {};
        const edgeEls = {};
        const acellEls = {};
        const icellEls = {};

        const CODE = [
            [['src','  size = k + 1']],
            [['kw','  for '],['src','x in arr[0:size]:    # fill the window']],
            [['src','    heap.push(x)               # sift up']],
            [['kw','  for '],['src','i in range(size, n):']],
            [['src','    out.append(heap.pop())     # extract-min']],
            [['src','    heap.push(arr[i])          # add next']],
            [['kw','  while '],['src','heap:                 # drain rest']],
            [['src','    out.append(heap.pop())']],
            [['kw','  return '],['src','out']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arrL) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arrL && arrL.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code & log' : 'Show code & log';
        }

        // ───────── step generation ─────────
        function generateSteps() {
            steps = [];
            const n = arr.length;
            const k = kVal;
            const size = Math.min(k + 1, n);          // heap window size
            const h = [];                              // backing array of the min-heap
            const out = [];                            // sorted output
            const par = (i) => (i - 1) >> 1;

            // snapshot: heap, out, which input indices are already pushed, next pointer, highlights
            const snap = (extra) => Object.assign({
                heap: [...h], out: [...out], pushedCount: 0, nextIdx: -1,
                cur: -1, cmp: -1, swap: null, newIdx: -1, outIdx: -1, freshOut: false, phase: ''
            }, extra);

            // local push (sift-up) that emits steps; emitFirst tags the entry step
            let pushed = 0;   // how many input elements have entered the heap so far
            function pushVal(x, optext, srcIdx, baseCode) {
                h.push(x); let i = h.length - 1;
                steps.push(snap({
                    pushedCount: pushed, nextIdx: srcIdx, code: baseCode, action: 'PUSH ' + x, actionColor: 'var(--accent-orange)',
                    newIdx: i, cur: i, phase: optext,
                    panel: `${optext} Push <code>${x}</code> into the heap at index <b>${i}</b>, then <b>sift up</b> while it is smaller than its parent.`,
                    log: `  push(${x}) at heap[${i}]`
                }));
                while (i > 0) {
                    const p = par(i);
                    const yes = h[i] < h[p];
                    steps.push(snap({
                        pushedCount: pushed, nextIdx: srcIdx, code: [2], action: `${h[i]} < ${h[p]} ?`, actionColor: 'var(--accent-blue)', cur: i, cmp: p, phase: optext,
                        panel: `Sift up: is <code>heap[${i}]=${h[i]}</code> &lt; <code>heap[${p}]=${h[p]}</code>? ${yes ? '<span style="color:var(--accent-orange)">yes &#8594; swap.</span>' : '<span style="color:var(--accent-green)">no &#8594; stop, heap valid.</span>'}`,
                        log: `    cmp heap[${i}]=${h[i]} vs parent[${p}]=${h[p]}`
                    }));
                    if (yes) {
                        [h[i], h[p]] = [h[p], h[i]];
                        steps.push(snap({
                            pushedCount: pushed, nextIdx: srcIdx, code: [2], action: 'SWAP UP', actionColor: 'var(--accent-orange)', swap: [i, p], cur: p, phase: optext,
                            panel: `Swap up: <code>heap[${i}]</code> &#8596; <code>heap[${p}]</code>. Continue from index <b>${p}</b>.`,
                            log: `    swap heap[${i}] <-> heap[${p}]`
                        }));
                        i = p;
                    } else break;
                }
            }

            // local pop (extract-min + sift-down) that emits steps
            function popMin(optext, baseCode) {
                const root = h[0];
                const last = h.pop();
                steps.push(snap({
                    pushedCount: pushed, code: baseCode, action: 'POP ' + root, actionColor: 'var(--accent-green)', cur: 0, phase: optext,
                    panel: `${optext} Extract the root <b>${root}</b> &#8594; the current minimum, send it to the sorted output. Move last element <code>${last}</code> to the root, then <b>sift down</b>.`,
                    log: `  pop() -> ${root}`
                }));
                if (h.length > 0) {
                    h[0] = last;
                    let i = 0;
                    while (true) {
                        const l = 2 * i + 1, r = 2 * i + 2; let s = i;
                        if (l < h.length && h[l] < h[s]) s = l;
                        if (r < h.length && h[r] < h[s]) s = r;
                        const kids = []; if (l < h.length) kids.push(l + '(' + h[l] + ')'); if (r < h.length) kids.push(r + '(' + h[r] + ')');
                        steps.push(snap({
                            pushedCount: pushed, code: baseCode, action: s === i ? 'settled' : `min child = ${h[s]}`, actionColor: s === i ? 'var(--accent-green)' : 'var(--accent-blue)', cur: i, cmp: s === i ? -1 : s, phase: optext,
                            panel: kids.length ? `Sift down at <b>${i}</b> (${h[i]}). Smallest of node &amp; children {${kids.join(', ')}} is index <b>${s}</b> (${h[s]}). ${s === i ? '<span style="color:var(--accent-green)">Already &#8804; children &#8594; stop.</span>' : 'Swap down.'}` : `Node <b>${i}</b> is a leaf &#8594; stop.`,
                            log: `    sift heap[${i}]=${h[i]} smallest=${s}`
                        }));
                        if (s === i) break;
                        [h[i], h[s]] = [h[s], h[i]];
                        steps.push(snap({
                            pushedCount: pushed, code: baseCode, action: 'SWAP DOWN', actionColor: 'var(--accent-orange)', swap: [i, s], cur: s, phase: optext,
                            panel: `Swap down: <code>heap[${i}]</code> &#8596; <code>heap[${s}]</code>. Continue from index <b>${s}</b>.`,
                            log: `    swap heap[${i}] <-> heap[${s}]`
                        }));
                        i = s;
                    }
                }
                out.push(root);
                steps.push(snap({
                    pushedCount: pushed, code: [4], action: '&#8594; OUTPUT ' + root, actionColor: 'var(--accent-green)', outIdx: out.length - 1, freshOut: true, phase: optext,
                    panel: `<code>${root}</code> is appended to the sorted output. Output so far: <code>[${out.join(', ')}]</code>.`,
                    log: `  output[${out.length - 1}] = ${root}`
                }));
                return root;
            }

            // ── intro ──
            steps.push(snap({
                code: [0], action: 'k-SORTED ARRAY', actionColor: 'var(--accent-purple)',
                panel: `In a <b>k-sorted</b> array every element is at most <b>${k}</b> slots from its final position. So the smallest of any <code>k+1</code> consecutive elements is the next sorted value. Maintain a <b>min-heap of size ${size}</b> (= min(k+1, n)) and repeatedly pop its root.`,
                log: `n=${n}, k=${k}  ->  heap window size = ${size}`
            }));

            // ── phase 1: fill the heap with the first (k+1) elements ──
            for (let idx = 0; idx < size; idx++) {
                pushVal(arr[idx], `Fill: heap window not full yet (${idx + 1}/${size}).`, idx, [1, 2]);
                pushed = idx + 1;
            }

            steps.push(snap({
                pushedCount: pushed, code: [1, 2], action: 'WINDOW FULL', actionColor: 'var(--accent-blue)',
                panel: `The heap now holds the first <b>${size}</b> elements. Its root <code>${h[0]}</code> is guaranteed to be the overall minimum, so it is the first sorted value.`,
                log: `window filled: heap = [${h.join(', ')}]`
            }));

            // ── phase 2: for each remaining input, pop the min then push the next ──
            for (let idx = size; idx < n; idx++) {
                popMin(`Step ${idx - size + 1}: pop the min, then admit arr[${idx}].`, [4]);
                pushVal(arr[idx], `Now push the next input <code>arr[${idx}]</code>.`, idx, [5, 2]);
                pushed = idx + 1;
            }

            // ── phase 3: drain whatever remains in the heap ──
            if (n > size) {
                steps.push(snap({
                    pushedCount: pushed, code: [6], action: 'DRAIN HEAP', actionColor: 'var(--accent-purple)',
                    panel: `All inputs consumed. Drain the remaining <b>${h.length}</b> heap elements in order &#8594; each pop yields the next sorted value.`,
                    log: `inputs done, draining ${h.length} remaining`
                }));
            }
            while (h.length > 0) {
                popMin(`Drain: pop the next minimum.`, [6, 7]);
            }

            // ── done ──
            steps.push(snap({
                pushedCount: pushed, complete: true, confetti: true, code: [8], action: '&#10003; SORTED', actionColor: 'var(--accent-green)',
                panel: `Done. Every value passed through a heap of size &#8804; ${size}, so each push/pop cost O(log k). Sorted output: <code>[${out.join(', ')}]</code>. Total time O(n&middot;log k).`,
                log: `sorted = [${out.join(', ')}]`
            }));
        }

        // ───────── layout (complete binary tree by heap index) ─────────
        const ROW = 60, PADY = 28;
        function layout(n) {
            if (n === 0) return { pos: [], width: 360, height: 120, maxLevel: 0 };
            const maxLevel = Math.floor(Math.log2(n));
            const wide = Math.pow(2, maxLevel);
            const slot = 64;
            const width = Math.max(wide * slot, 320);
            const pos = [];
            for (let i = 0; i < n; i++) {
                const L = Math.floor(Math.log2(i + 1));
                const levelStart = Math.pow(2, L) - 1;
                const posInLevel = i - levelStart;
                const countInLevel = Math.pow(2, L);
                const x = (posInLevel + 0.5) / countInLevel * width;
                const y = L * ROW + PADY;
                pos.push({ x, y });
            }
            const height = maxLevel * ROW + PADY * 2;
            return { pos, width, height, maxLevel };
        }

        // ───────── render ─────────
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;

            // ── input stream row ──
            const inRail = document.getElementById('input-rail'); const usedI = new Set();
            for (let i = 0; i < arr.length; i++) {
                usedI.add('i:' + i);
                let el = icellEls['i:' + i];
                if (!el) { el = document.createElement('div'); el.className = 'icell'; el.innerHTML = `<span class="iv"></span><span class="ii"></span>`; inRail.appendChild(el); icellEls['i:' + i] = el; }
                el.querySelector('.iv').textContent = arr[i];
                el.querySelector('.ii').textContent = i;
                let cls = 'icell';
                if (i < step.pushedCount) cls += ' pushed';
                if (i === step.nextIdx) cls += ' next';
                el.className = cls;
            }
            Object.keys(icellEls).forEach(kk => { if (!usedI.has(kk)) { icellEls[kk].remove(); delete icellEls[kk]; } });

            // ── heap tree ──
            const n = step.heap.length;
            const { pos, width, height } = layout(n);
            const canvas = document.getElementById('tree-canvas');
            const svg = document.getElementById('edges');
            canvas.style.width = width + 'px'; canvas.style.height = Math.max(height, 120) + 'px';
            svg.setAttribute('width', width); svg.setAttribute('height', Math.max(height, 120));

            const swapSet = new Set(step.swap || []);
            const used = new Set();
            for (let i = 0; i < n; i++) {
                used.add('n:' + i);
                let el = nodeEls['n:' + i]; const fresh = !el;
                if (!el) { el = document.createElement('div'); el.className = 'hnode'; el.innerHTML = `<span class="hv"></span><span class="idx"></span>`; canvas.appendChild(el); nodeEls['n:' + i] = el; }
                el.querySelector('.hv').textContent = step.heap[i];
                el.querySelector('.idx').textContent = i;
                let cls = 'hnode' + (i === 0 ? ' root' : '');
                if (swapSet.has(i)) cls += ' swap';
                else if (i === step.cur) cls += ' cur';
                else if (i === step.cmp) cls += ' cmp';
                if (i === step.newIdx) cls += ' new';
                el.className = cls;
                if (fresh) { el._x = pos[i].x; el._y = pos[i].y; el.style.transform = `translate(${pos[i].x}px, ${pos[i].y}px)`; el.style.opacity = '0'; Motion.pop(el); }
                else Motion.move(el, pos[i].x, pos[i].y);
            }
            Object.keys(nodeEls).forEach(kk => { if (!used.has(kk)) { nodeEls[kk].remove(); delete nodeEls[kk]; } });

            // ── edges ──
            const usedE = new Set();
            for (let i = 1; i < n; i++) {
                const p = (i - 1) >> 1; const key = 'e:' + i; usedE.add(key);
                let ln = edgeEls[key];
                if (!ln) { ln = document.createElementNS('http://www.w3.org/2000/svg', 'line'); svg.appendChild(ln); edgeEls[key] = ln; }
                ln.setAttribute('x1', pos[p].x); ln.setAttribute('y1', pos[p].y); ln.setAttribute('x2', pos[i].x); ln.setAttribute('y2', pos[i].y);
                const onPath = (swapSet.has(i) && swapSet.has(p)) || ((i === step.cur || i === step.cmp) && (p === step.cur || p === step.cmp));
                ln.setAttribute('class', 'edge-ln' + (onPath ? ' active' : ''));
            }
            Object.keys(edgeEls).forEach(kk => { if (!usedE.has(kk)) { edgeEls[kk].remove(); delete edgeEls[kk]; } });
            if (n === 0) { const ts = document.getElementById('tree-stage'); if (!ts.querySelector('.empty-note')) { const en = document.createElement('div'); en.className = 'empty-note'; en.style.cssText = 'position:absolute;top:90px;left:0;right:0;text-align:center'; en.textContent = 'heap is empty'; canvas.appendChild(en); } }
            else { const en = canvas.querySelector('.empty-note'); if (en) en.remove(); }

            // ── backing array ──
            const rail = document.getElementById('array-rail'); const usedA = new Set();
            for (let i = 0; i < n; i++) {
                usedA.add('a:' + i);
                let el = acellEls['a:' + i];
                if (!el) { el = document.createElement('div'); el.className = 'acell'; el.innerHTML = `<span class="av"></span><span class="ai"></span>`; rail.appendChild(el); acellEls['a:' + i] = el; }
                el.querySelector('.av').textContent = step.heap[i];
                el.querySelector('.ai').textContent = i;
                let cls = 'acell';
                if (swapSet.has(i)) cls += ' swap'; else if (i === step.cur) cls += ' cur'; else if (i === step.cmp) cls += ' cmp';
                el.className = cls;
            }
            Object.keys(acellEls).forEach(kk => { if (!usedA.has(kk)) { acellEls[kk].remove(); delete acellEls[kk]; } });
            if (n === 0) { if (!rail.querySelector('.empty-note')) { rail.innerHTML = '<span class="empty-note">empty</span>'; } }
            else { const en = rail.querySelector('.empty-note'); if (en) en.remove(); }

            // ── sorted output track ──
            const exWrap = document.getElementById('extracted'); const exLabel = document.getElementById('ex-label');
            exWrap.innerHTML = '';
            if (step.out.length) {
                exLabel.style.display = 'inline';
                step.out.forEach((v, i) => { const t = document.createElement('div'); t.className = 'ex-tile' + (step.freshOut && i === step.outIdx ? ' fresh' : ''); t.textContent = v; exWrap.appendChild(t); });
            } else exLabel.style.display = 'none';

            // ── narration / chrome ──
            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.innerHTML = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            // ── state pills ──
            const pr = document.getElementById('pill-row');
            const nextLabel = step.nextIdx >= 0 ? `arr[${step.nextIdx}]=${arr[step.nextIdx]}` : '&mdash;';
            pr.innerHTML =
                `<span class="pill"><span class="pk">k</span><span class="pv">${kVal}</span></span>` +
                `<span class="pill"><span class="pk">window</span><span class="pv">${Math.min(kVal + 1, arr.length)}</span></span>` +
                `<span class="pill"><span class="pk">heap.size</span><span class="pv">${n}</span></span>` +
                `<span class="pill"><span class="pk">root(min)</span><span class="pv">${n ? step.heap[0] : '&mdash;'}</span></span>` +
                `<span class="pill"><span class="pk">next in</span><span class="pv">${nextLabel}</span></span>` +
                `<span class="pill"><span class="pk">sorted</span><span class="pv">${step.out.length}/${arr.length}</span></span>`;

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(nodeEls).forEach(kk => { nodeEls[kk].remove(); delete nodeEls[kk]; });
            Object.keys(edgeEls).forEach(kk => { edgeEls[kk].remove(); delete edgeEls[kk]; });
            Object.keys(acellEls).forEach(kk => { acellEls[kk].remove(); delete acellEls[kk]; });
            Object.keys(icellEls).forEach(kk => { icellEls[kk].remove(); delete icellEls[kk]; });
            document.getElementById('array-rail').innerHTML = '';
            document.getElementById('input-rail').innerHTML = '';
            const en = document.getElementById('tree-canvas').querySelector('.empty-note'); if (en) en.remove();
            confettiArmed = true;
        }

        function loadData(newArr, newK) {
            pause();
            arr = newArr; kVal = newK;
            document.getElementById('arr-input').value = arr.join(', ');
            document.getElementById('k-input').value = kVal;
            clearDom(); generateSteps(); renderStep(0);
        }

        const EXAMPLES = [
            { arr: [6, 5, 3, 2, 8, 10, 9], k: 3 },
            { arr: [10, 9, 8, 7, 4, 70, 60, 50], k: 4 },
        ];
        function loadExample(n) { const e = EXAMPLES[n]; loadData([...e.arr], e.k); }

        function loadCustom() {
            const valStr = document.getElementById('arr-input').value;
            const kStr = document.getElementById('k-input').value;
            const parsedArr = valStr.split(',').map(x => parseInt(x.trim(), 10)).filter(x => !isNaN(x));
            const parsedK = parseInt(kStr, 10);
            if (parsedArr.length > 0 && !isNaN(parsedK) && parsedK >= 0) {
                loadData(parsedArr.slice(0, 14), Math.min(parsedK, parsedArr.length - 1));
            } else {
                document.getElementById('arr-input').focus();
            }
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('arr-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        document.getElementById('k-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
