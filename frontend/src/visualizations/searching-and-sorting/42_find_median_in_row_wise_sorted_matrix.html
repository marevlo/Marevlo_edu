<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Median in Row-wise Sorted Matrix - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* mid value / answer            */
            --accent-blue:   #06b6d4;   /* search space / chrome         */
            --accent-green:  #22c55e;   /* counted (<= mid) / median      */
            --accent-red:    #f43f5e;   /* greater than mid               */
            --accent-purple: #a855f7;   /* upper_bound boundary / current */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono); width: 300px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }
        .grid-stage { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; padding: 22px; display: flex; flex-direction: column; align-items: center; gap: 18px; }
        .grid-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .grid-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        /* value-range number line */
        .range-bar { width: 100%; max-width: 560px; }
        .range-line { position: relative; height: 6px; border-radius: 999px; background: rgba(255,255,255,0.08); margin: 26px 4px 30px; }
        .range-active { position: absolute; top: 0; height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.45); transition: left 0.4s cubic-bezier(0.34,1.1,0.64,1), width 0.4s cubic-bezier(0.34,1.1,0.64,1); }
        .marker { position: absolute; top: 50%; transform: translate(-50%, -50%); transition: left 0.4s cubic-bezier(0.34,1.1,0.64,1); }
        .marker .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid; background: #090d18; }
        .marker .tag { position: absolute; left: 50%; transform: translateX(-50%); font-family: var(--mono); font-size: 11px; font-weight: 700; white-space: nowrap; }
        .marker.lo .dot { border-color: var(--accent-purple); box-shadow: 0 0 10px rgba(168,85,247,0.55); }
        .marker.hi .dot { border-color: var(--accent-orange); box-shadow: 0 0 10px rgba(245,165,36,0.55); }
        .marker.mid .dot { border-color: var(--accent-blue); background: var(--accent-blue); box-shadow: 0 0 14px rgba(6,182,212,0.7); width: 16px; height: 16px; }
        .marker.lo .tag { color: #d8b4fe; bottom: 16px; }
        .marker.hi .tag { color: #ffd591; bottom: 16px; }
        .marker.mid .tag { color: #a5f3fc; top: 18px; }

        .dp-grid { display: grid; gap: 6px; }
        .row-wrap { display: contents; }
        .cell {
            display: flex; align-items: center; justify-content: center;
            border-radius: 9px; font-family: var(--mono); font-weight: 800; font-size: 16px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            width: 50px; height: 46px; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s, opacity 0.35s;
        }
        .cell.head { border: none; background: transparent; color: var(--text-dim); font-size: 13px; font-weight: 700; box-shadow: none; }
        .cell.rowlabel { width: 86px; justify-content: flex-end; padding-right: 8px; }
        .cell.search { border-color: rgba(6,182,212,0.45); background: rgba(6,182,212,0.08); color: #a5f3fc; }
        .cell.counted { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.80), rgba(33,194,117,0.80)); color: #06251a; box-shadow: 0 0 14px rgba(34,197,94,0.4); }
        .cell.over { border-color: rgba(244,63,94,0.45); background: rgba(244,63,94,0.08); color: #fda4af; opacity: 0.55; }
        .cell.boundary { border-color: var(--accent-purple); box-shadow: 0 0 18px rgba(168,85,247,0.5), inset 0 0 10px rgba(168,85,247,0.12); transform: scale(1.06); z-index: 2; }
        .cell.median { border-color: var(--accent-orange); background: rgba(245,165,36,0.22); color: #ffd591; box-shadow: 0 0 18px rgba(245,165,36,0.55); transform: scale(1.06); }
        .cell.rowcount { width: 60px; font-size: 13px; font-weight: 800; border-style: dashed; border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.03); color: var(--text-dim); }
        .cell.rowcount.lit { border-color: var(--accent-green); background: rgba(34,197,94,0.12); color: #86efac; box-shadow: 0 0 12px rgba(34,197,94,0.3); }

        .action-stage { position: relative; min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 6px; align-items: center; min-height: 40px; }
        .ans-tile { min-width: 38px; height: 44px; padding: 0 8px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 22px; font-weight: 800; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; box-shadow: 0 0 12px rgba(245,165,36,0.35); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.c b { color: var(--accent-purple); } .pill.b b { color: var(--accent-orange); } .pill.g b { color: var(--accent-green); } .pill.m b { color: var(--accent-blue); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">matrix =</label>
        <input type="text" id="matrix-input" placeholder="[[1,3,5],[2,6,9],[3,6,9]]">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">3&times;3</button>
        <button onclick="loadExample(1)">2&times;2</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Median in Row-wise Sorted Matrix <span class="sub">&middot; binary search on value range &middot; count &#8804; mid via upper&#95;bound &middot; O(32&middot;r&middot;log c)</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="grid-stage" id="grid-stage">
                    <div class="range-bar">
                        <div class="range-line" id="range-line">
                            <div class="range-active" id="range-active"></div>
                            <div class="marker lo" id="mk-lo"><span class="tag" id="tag-lo">lo</span><span class="dot"></span></div>
                            <div class="marker mid" id="mk-mid"><span class="tag" id="tag-mid">mid</span><span class="dot"></span></div>
                            <div class="marker hi" id="mk-hi"><span class="tag" id="tag-hi">hi</span><span class="dot"></span></div>
                        </div>
                    </div>
                    <div class="dp-grid" id="dp-grid"></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill c">lo <b id="st-lo">&mdash;</b></span>
                            <span class="pill m">mid <b id="st-mid">&mdash;</b></span>
                            <span class="pill b">hi <b id="st-hi">&mdash;</b></span>
                            <span class="pill g">count &#8804; mid <b id="st-cnt">&mdash;</b></span>
                            <span class="pill">need &gt; <b id="st-half">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ===== Motion engine (spring pop, zero deps) =====
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.6 + 0.5 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // ===== State =====
        const EXAMPLES = [
            [[1,3,5],[2,6,9],[3,6,9]],
            [[1,2],[3,4]],
        ];
        let matrix = EXAMPLES[0].map(r => r.slice());
        let rows = 0, cols = 0;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 760, 360];
        const cellEls = {};   // stable key -> element

        const CODE = [
            [['kw','def '],['fn','matrixMedian'],['src','(M):']],
            [['src','  r, c = len(M), len(M[0])']],
            [['src','  lo, hi = min(col0), max(colLast)']],
            [['src','  need = (r*c) // 2']],
            [['kw','  while '],['src','lo < hi:']],
            [['src','    mid = (lo + hi) // 2']],
            [['src','    cnt = 0']],
            [['kw','    for '],['src','row in M:']],
            [['src','      cnt += upper_bound(row, mid)']],
            [['kw','    if '],['src','cnt <= need:']],
            [['src','      lo = mid + 1']],
            [['kw','    else'],['src',':']],
            [['src','      hi = mid']],
            [['kw','  return '],['src','lo']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // upper_bound: number of elements in sorted row that are <= mid
        function upperBound(row, mid) {
            let lo = 0, hi = row.length;
            while (lo < hi) { const m = (lo + hi) >> 1; if (row[m] <= mid) lo = m + 1; else hi = m; }
            return lo;  // index = count of elements <= mid
        }

        // ===== step generation =====
        function makeStateGrid(fill) { return Array.from({ length: rows }, () => Array(cols).fill(fill)); }

        function generateSteps() {
            steps = [];
            rows = matrix.length;
            cols = rows > 0 ? matrix[0].length : 0;

            // base snapshot template
            const snap = (extra) => Object.assign({
                cells: makeStateGrid('search'),     // per-cell class: search | counted | over | boundary | median
                rowCounts: Array(rows).fill(null),  // per-row upper_bound count to show
                rowLit: Array(rows).fill(false),    // which row's count chip is highlighted
                lo: null, hi: null, mid: null, count: null, half: null, loEnd: false,
                complete: false, confetti: false, answer: null,
                code: [], action: '', actionColor: 'var(--text-dim)', panel: '', log: ''
            }, extra);

            if (rows === 0 || cols === 0) {
                steps.push(snap({ panel: 'Empty matrix &#8594; no median.', complete: true, answer: 'N/A', code: [0], action: 'EMPTY', actionColor: 'var(--accent-red)', log: 'empty matrix' }));
                return;
            }

            let minV = Infinity, maxV = -Infinity;
            for (let r = 0; r < rows; r++) {
                minV = Math.min(minV, matrix[r][0]);
                maxV = Math.max(maxV, matrix[r][cols - 1]);
            }
            const N = rows * cols;
            const need = Math.floor(N / 2);   // median = smallest value with count > N/2  (i.e. count > need)
            let lo = minV, hi = maxV;

            steps.push(snap({
                lo, hi, half: need, code: [1, 2, 3],
                action: 'INIT RANGE', actionColor: 'var(--accent-blue)',
                panel: `Matrix is <b>${rows}&times;${cols}</b> &#8594; <b>${N}</b> elements. The median is the smallest value whose count of &#8804;-elements exceeds <code>N/2 = ${need}</code>. Binary-search the <b>value range</b> <code>[lo=${lo}, hi=${hi}]</code> (smallest first-col, largest last-col).`,
                log: `init  range [${lo}, ${hi}]  N=${N}  need count > ${need}`
            }));

            let guard = 0;
            while (lo < hi && guard++ < 200) {
                const mid = Math.floor((lo + hi) / 2);

                steps.push(snap({
                    lo, hi, mid, half: need, code: [4, 5, 6],
                    action: `mid = (${lo}+${hi})/2 = ${mid}`, actionColor: 'var(--accent-blue)',
                    panel: `Pick the middle value <code>mid = (${lo}+${hi})/2 = ${mid}</code>. Now count how many matrix elements are <code>&#8804; ${mid}</code> using <code>upper&#95;bound</code> on each sorted row.`,
                    log: `mid = ${mid}  (lo=${lo}, hi=${hi})  counting <= ${mid}`
                }));

                // count <= mid, row by row, showing each row's upper_bound
                let count = 0;
                const cellsAcc = makeStateGrid('over');
                const rowCountsAcc = Array(rows).fill(null);
                for (let r = 0; r < rows; r++) {
                    const ub = upperBound(matrix[r], mid);   // # of elements <= mid in this row
                    count += ub;
                    for (let cc = 0; cc < cols; cc++) cellsAcc[r][cc] = cc < ub ? 'counted' : 'over';
                    rowCountsAcc[r] = ub;
                    // mark boundary cell (last counted) in this row
                    if (ub > 0 && ub - 1 < cols) cellsAcc[r][ub - 1] = 'boundary';

                    const litRows = Array(rows).fill(false); litRows[r] = true;
                    steps.push(snap({
                        lo, hi, mid, half: need, count,
                        cells: cellsAcc.map(rw => rw.slice()),
                        rowCounts: rowCountsAcc.slice(),
                        rowLit: litRows,
                        code: [7, 8],
                        action: `row ${r}: upper&#95;bound = ${ub}`, actionColor: 'var(--accent-green)',
                        panel: `Row ${r} <code>[${matrix[r].join(', ')}]</code>: <code>upper&#95;bound(${mid}) = ${ub}</code> element${ub === 1 ? '' : 's'} are &#8804; <code>${mid}</code>. Running count = <b>${count}</b>.`,
                        log: `  row ${r}: ub(${mid}) = ${ub}  running count = ${count}`
                    }));
                    // un-boundary so next steps show plain counted
                    if (ub > 0 && ub - 1 < cols) cellsAcc[r][ub - 1] = 'counted';
                }

                const feasible = count > need;   // count exceeds half -> mid could be the median (or higher)
                steps.push(snap({
                    lo, hi, mid, half: need, count,
                    cells: cellsAcc.map(rw => rw.slice()),
                    rowCounts: rowCountsAcc.slice(),
                    rowLit: Array(rows).fill(true),
                    code: feasible ? [9, 11, 12] : [9, 10],
                    action: feasible ? `count ${count} > ${need} &#8594; hi = ${mid}` : `count ${count} &#8804; ${need} &#8594; lo = ${mid + 1}`,
                    actionColor: feasible ? 'var(--accent-green)' : 'var(--accent-red)',
                    panel: feasible
                        ? `Total <code>count = ${count}</code> is <b>&gt; ${need}</b> &#8594; there are enough small elements, so the median is <code>&#8804; ${mid}</code>. Shrink the upper bound: <code>hi = ${mid}</code>.`
                        : `Total <code>count = ${count}</code> is <b>&#8804; ${need}</b> &#8594; too few small elements, so the median is <code>&gt; ${mid}</code>. Raise the lower bound: <code>lo = ${mid + 1}</code>.`,
                    log: feasible ? `  count ${count} > ${need}  ->  hi = ${mid}` : `  count ${count} <= ${need}  ->  lo = ${mid + 1}`
                }));

                if (feasible) hi = mid; else lo = mid + 1;
            }

            // converged: lo == hi == median value
            const medianVal = lo;
            // locate median cells (every occurrence of medianVal) for the green highlight
            const finalCells = makeStateGrid('search');
            const finalRowCounts = Array(rows).fill(null);
            for (let r = 0; r < rows; r++) {
                const ub = upperBound(matrix[r], medianVal);
                finalRowCounts[r] = ub;
                for (let cc = 0; cc < cols; cc++) {
                    if (matrix[r][cc] === medianVal) finalCells[r][cc] = 'median';
                    else if (matrix[r][cc] < medianVal) finalCells[r][cc] = 'counted';
                    else finalCells[r][cc] = 'over';
                }
            }
            steps.push(snap({
                lo: medianVal, hi: medianVal, mid: medianVal, half: need,
                count: finalRowCounts.reduce((a, b) => a + b, 0),
                cells: finalCells, rowCounts: finalRowCounts, rowLit: Array(rows).fill(false),
                complete: true, confetti: true, answer: String(medianVal),
                code: [13], action: `&#10003; median = ${medianVal}`, actionColor: 'var(--accent-green)',
                panel: `Converged: <code>lo == hi == ${medianVal}</code>. That is the smallest value with count <b>&gt; ${need}</b> &#8594; the <b>median is ${medianVal}</b> (highlighted in green).`,
                log: `done  lo == hi == ${medianVal}  =>  median = ${medianVal}`
            }));
        }

        // ===== render (persistent DOM) =====
        function valueToPct(v) {
            const step0 = steps[0]; if (!step0) return 0;
            const lo0 = step0.lo, hi0 = step0.hi;
            if (hi0 === lo0) return 50;
            return ((v - lo0) / (hi0 - lo0)) * 100;
        }

        function renderRange(step) {
            const aEl = document.getElementById('range-active');
            const lo = step.lo, hi = step.hi, mid = step.mid;
            if (lo == null || hi == null) {
                aEl.style.left = '0%'; aEl.style.width = '0%';
                document.getElementById('mk-lo').style.opacity = '0';
                document.getElementById('mk-hi').style.opacity = '0';
                document.getElementById('mk-mid').style.opacity = '0';
                return;
            }
            const loP = valueToPct(lo), hiP = valueToPct(hi);
            aEl.style.left = Math.min(loP, hiP) + '%';
            aEl.style.width = Math.abs(hiP - loP) + '%';
            const mkLo = document.getElementById('mk-lo'), mkHi = document.getElementById('mk-hi'), mkMid = document.getElementById('mk-mid');
            mkLo.style.opacity = '1'; mkLo.style.left = loP + '%'; document.getElementById('tag-lo').textContent = 'lo ' + lo;
            mkHi.style.opacity = '1'; mkHi.style.left = hiP + '%'; document.getElementById('tag-hi').textContent = 'hi ' + hi;
            if (mid != null && !step.complete) { mkMid.style.opacity = '1'; mkMid.style.left = valueToPct(mid) + '%'; document.getElementById('tag-mid').textContent = 'mid ' + mid; }
            else { mkMid.style.opacity = '0'; }
        }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const grid = document.getElementById('dp-grid');
            // columns: [row label] + cols data cells + [count chip]
            grid.style.gridTemplateColumns = `86px repeat(${cols}, 50px) 60px`;

            const used = new Set();
            for (let r = 0; r < rows; r++) {
                // row label
                {
                    const key = `lbl,${r}`; used.add(key);
                    let el = cellEls[key];
                    if (!el) { el = document.createElement('div'); cellEls[key] = el; }
                    el.className = 'cell head rowlabel';
                    el.textContent = `row ${r} →`;
                    grid.appendChild(el);
                }
                // data cells
                for (let c = 0; c < cols; c++) {
                    const key = `${r},${c}`; used.add(key);
                    let el = cellEls[key];
                    if (!el) { el = document.createElement('div'); cellEls[key] = el; }
                    const state = step.cells[r][c];
                    const prevCls = el.className;
                    el.className = 'cell ' + state;
                    el.textContent = String(matrix[r][c]);
                    // pop when a cell newly becomes counted/boundary/median
                    const becameHot = (state === 'counted' || state === 'boundary' || state === 'median');
                    const wasHot = /counted|boundary|median/.test(prevCls);
                    if (becameHot && !wasHot) Motion.pop(el);
                    grid.appendChild(el);
                }
                // row count chip
                {
                    const key = `cnt,${r}`; used.add(key);
                    let el = cellEls[key];
                    if (!el) { el = document.createElement('div'); cellEls[key] = el; }
                    const rc = step.rowCounts[r];
                    el.className = 'cell rowcount' + (step.rowLit[r] ? ' lit' : '');
                    el.textContent = rc == null ? '≤mid' : ('+' + rc);
                    grid.appendChild(el);
                }
            }
            Object.keys(cellEls).forEach(k => { if (!used.has(k)) { cellEls[k].remove(); delete cellEls[k]; } });

            renderRange(step);

            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.complete && step.answer != null) {
                const t = document.createElement('div'); t.className = 'ans-tile'; t.textContent = step.answer; at.appendChild(t);
            }

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.innerHTML = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            document.getElementById('st-lo').textContent  = step.lo  != null ? step.lo  : '—';
            document.getElementById('st-mid').textContent = step.mid != null ? step.mid : '—';
            document.getElementById('st-hi').textContent  = step.hi  != null ? step.hi  : '—';
            document.getElementById('st-cnt').textContent = step.count != null ? step.count : '—';
            document.getElementById('st-half').textContent = step.half != null ? step.half : '—';

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ===== controls =====
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() { Object.keys(cellEls).forEach(k => { cellEls[k].remove(); delete cellEls[k]; }); confettiArmed = true; }

        function sanitizeMatrix(m) {
            if (!Array.isArray(m) || m.length === 0 || !Array.isArray(m[0])) return null;
            const c = m[0].length;
            if (c === 0) return null;
            const clean = [];
            for (const row of m) {
                if (!Array.isArray(row) || row.length !== c) return null;
                const r2 = row.map(Number);
                if (r2.some(x => !Number.isFinite(x))) return null;
                r2.sort((a, b) => a - b);   // ensure each row is sorted (algorithm precondition)
                clean.push(r2);
            }
            return clean;
        }

        function loadMatrix(m) {
            const clean = sanitizeMatrix(m);
            if (!clean) return;
            pause(); matrix = clean; clearDom(); generateSteps(); renderStep(0);
            document.getElementById('matrix-input').value = JSON.stringify(matrix);
        }
        function loadCustom() {
            try {
                const m = JSON.parse(document.getElementById('matrix-input').value);
                loadMatrix(m);
            } catch (e) { /* ignore malformed input */ }
        }
        function loadExample(n) {
            const ex = EXAMPLES[n] || EXAMPLES[0];
            loadMatrix(ex.map(r => r.slice()));
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('matrix-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
