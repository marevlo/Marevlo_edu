<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quickselect &mdash; Kth Smallest</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* pivot                         */
            --accent-blue:   #06b6d4;    /* j scanner / high              */
            --accent-green:  #22c55e;    /* settled / answer              */
            --accent-red:    #f43f5e;    /* error                         */
            --accent-purple: #a855f7;    /* i boundary / current          */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input.arr-in { width: 240px; }
        input.k-in { width: 56px; text-align: center; }
        input:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168,85,247,0.18); background: rgba(168,85,247,0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(168, 85, 247, 0.5); box-shadow: 0 0 18px rgba(168, 85, 247, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(168,85,247,0.22), rgba(168,85,247,0.10)); border-color: rgba(168, 85, 247, 0.45); color: #e9d5ff; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #e9d5ff; background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); box-shadow: 0 0 12px rgba(168,85,247,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(168,85,247,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #ede9fe; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-purple); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(168,85,247,0.14); color: #d8b4fe; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(168,85,247,0.08), transparent 70%), #090d18; padding: 64px 24px 58px; border: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: center; overflow-x: auto; min-height: 220px; }

        .arr-rail { position: relative; display: flex; gap: 8px; }
        .cell { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative;
            font-family: var(--mono); font-weight: 800; font-size: 19px; will-change: transform;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.05); color: var(--text-main);
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s, opacity 0.35s; }
        .cell.active { border-color: rgba(6,182,212,0.45); background: rgba(6,182,212,0.10); color: #d4f5fb; }   /* current search range */
        .cell.lt { border-color: rgba(168,85,247,0.5); background: rgba(168,85,247,0.12); color: #e3ccff; }       /* known <= pivot, in i-region */
        .cell.eliminated { opacity: 0.28; border-style: dashed; color: var(--text-dim); }                          /* outside the recursion range */
        .cell.pivot { box-shadow: 0 0 22px rgba(245,165,36,0.6); border-color: var(--accent-orange); background: rgba(245,165,36,0.16); color: #ffd591; z-index: 3; }
        .cell.cur { box-shadow: 0 0 22px rgba(6,182,212,0.55); border-color: var(--accent-blue); transform: translateY(-3px) scale(1.05); z-index: 3; }
        .cell.swap { box-shadow: 0 0 22px rgba(245,165,36,0.6); border-color: var(--accent-orange); z-index: 3; }
        .cell.settled { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.85), rgba(33,194,117,0.85)); color: #06251a; box-shadow: 0 0 16px rgba(34,197,94,0.4); }
        .cell.answer { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.95), rgba(33,194,117,0.95)); color: #06251a; box-shadow: 0 0 26px rgba(34,197,94,0.65); transform: translateY(-3px) scale(1.08); z-index: 4; }
        .cell .ci { position: absolute; top: -22px; left: 0; right: 0; text-align: center; font-size: 11px; color: var(--text-dim); font-weight: 700; }
        .fly { position: absolute; width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-weight: 800; font-size: 19px; pointer-events: none; z-index: 8; border: 2px solid var(--accent-orange); background: rgba(245,165,36,0.2); color: #ffd591; box-shadow: 0 0 18px rgba(245,165,36,0.55); }

        /* i (below) / j (above) / pivot (above) pointer pills */
        .sptr { position: absolute; left: 0; display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; will-change: transform; z-index: 6; }
        .sptr.pivot, .sptr.j { bottom: 100%; margin-bottom: 7px; flex-direction: column-reverse; }
        .sptr.i { top: 100%; margin-top: 7px; }
        .sptr .tag { font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 8px; white-space: nowrap; }
        .sptr .stalk { width: 2px; height: 15px; }
        .sptr.i  .tag { background: var(--accent-purple); color: #1a0533; box-shadow: 0 0 14px rgba(168,85,247,0.6); } .sptr.i .stalk { background: var(--accent-purple); }
        .sptr.j  .tag { background: var(--accent-blue);   color: #04222a; box-shadow: 0 0 14px rgba(6,182,212,0.6); }  .sptr.j .stalk { background: var(--accent-blue); }
        .sptr.pivot .tag { background: var(--accent-orange); color: #3a2400; box-shadow: 0 0 14px rgba(245,165,36,0.6); } .sptr.pivot .stalk { background: var(--accent-orange); }

        /* k target marker (always below, gentle) */
        .kmark { position: absolute; left: 0; bottom: 100%; margin-bottom: 30px; display: flex; flex-direction: column-reverse; align-items: center; opacity: 0; pointer-events: none; will-change: transform; z-index: 5; }
        .kmark .tag { font-family: var(--mono); font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 8px; white-space: nowrap; background: rgba(34,197,94,0.85); color: #06251a; box-shadow: 0 0 14px rgba(34,197,94,0.5); }
        .kmark .stalk { width: 2px; height: 13px; background: var(--accent-green); }

        .action-stage { position: relative; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-purple); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 8px var(--accent-purple); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(168,85,247,0.12); border-left-color: var(--accent-purple); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.lo b { color: var(--accent-purple); } .pill.hi b { color: var(--accent-blue); } .pill.pv b { color: var(--accent-orange); } .pill.kk b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">arr =</label>
        <input type="text" id="arr-input" class="arr-in" placeholder="3, 1, 4, 1, 5, 9">
        <label class="ui-label">k =</label>
        <input type="text" id="k-input" class="k-in" placeholder="3">
        <button onclick="loadCustom()">Find</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">[3,1,4,1,5,9] k=3</button>
        <button onclick="loadExample(1)">[7,10,4,3,20,15] k=4</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Quickselect &mdash; k<sup>th</sup> Smallest <span class="sub">&middot; Lomuto partition &middot; recurse one side &middot; O(n) average</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="arr-rail" id="arr-rail"></div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill lo">left <b id="st-left">0</b></span>
                            <span class="pill hi">right <b id="st-right">0</b></span>
                            <span class="pill pv">pivot idx <b id="st-pivot">&mdash;</b></span>
                            <span class="pill kk">target k&#8722;1 <b id="st-k">0</b></span>
                            <span class="pill">swaps <b id="st-swaps">0</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring + FLIP cross-swap) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POS = sampleSpring(320, 30, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            glide(el, x) {
                const prev = el._x; el.style.opacity = '1';
                const commit = `translateX(${x.toFixed(2)}px) translateX(-50%)`;
                if (REDUCED || prev == null || Math.abs(x - prev) < 0.5) { el._x = x; el.style.transform = commit; return; }
                const dx = x - prev;
                const kf = SPRING_POS.map(p => ({ transform: `translateX(${(prev + dx * p).toFixed(2)}px) translateX(-50%)` }));
                el.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
                el._x = x; el.style.transform = commit;
            },
        };

        // ───────── State ─────────
        const EXAMPLES = [ { arr: [3, 1, 4, 1, 5, 9], k: 3 }, { arr: [7, 10, 4, 3, 20, 15], k: 4 } ];
        let arr = [3, 1, 4, 1, 5, 9];
        let kVal = 3;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 820, 400];
        const cellEls = {};
        const ptrEls = {};

        const CODE = [
            [['kw','def '],['fn','quickselect'],['src','(a, lo, hi, k):  # find a[k] in sorted order']],
            [['kw','  if '],['src','lo == hi: ']],[['kw','    return '],['src','a[lo]']],
            [['src','  pivot = a[hi]']],
            [['src','  i = lo']],
            [['kw','  for '],['src','j in range(lo, hi):']],
            [['kw','    if '],['src','a[j] <= pivot: swap(i, j); i++']],
            [['src','  swap(i, hi)        # pivot lands at i']],
            [['kw','  if '],['src','k == i: ']],[['kw','    return '],['src','a[i]']],
            [['kw','  if '],['src','k < i:  ']],[['kw','    return '],['src','quickselect(a, lo, i-1, k)']],
            [['kw','  else: '],['src','     return quickselect(a, i+1, hi, k)']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(a) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', a && a.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── step generation (Quickselect, Lomuto partition) ─────────
        // zones[i]: 'elim' (outside current recursion range), 'active' (in range, unscanned),
        //           'lt' (scanned, <= pivot, in i-region), 'gt' (scanned, > pivot), 'pivot', 'settled', 'answer'
        function generateSteps() {
            steps = [];
            const a = [...arr], n = a.length;
            const target = kVal - 1; // 0-indexed rank we want
            let swaps = 0;
            const settled = new Array(n).fill(false); // positions whose final value is locked

            const baseZones = () => {
                const z = new Array(n).fill('elim');
                for (let i = 0; i < n; i++) if (settled[i]) z[i] = 'settled';
                return z;
            };
            const snap = (extra) => Object.assign({
                arr: [...a], left: extra.left, right: extra.right, pivot: -1,
                i: null, j: null, swap: null, done: false,
                target, swaps, code: [], zones: baseZones()
            }, extra);

            steps.push(snap({
                left: 0, right: n - 1, code: [0],
                action: 'START', actionColor: 'var(--accent-purple)',
                zones: (() => { const z = baseZones(); for (let i = 0; i < n; i++) z[i] = 'active'; return z; })(),
                panel: `Find the <b>${kVal}<sup>${ord(kVal)}</sup> smallest</b> of <code>[${a.join(', ')}]</code> &mdash; that is, the value at sorted index <code>k&#8722;1 = ${target}</code>. Quickselect partitions, then recurses into <b>only one side</b>.`,
                log: `quickselect lo=0 hi=${n - 1} target=${target}`
            }));

            function solve(lo, hi, k) {
                // zones for "in range" view
                const rangeZones = (extra) => {
                    const z = baseZones();
                    for (let x = lo; x <= hi; x++) if (z[x] === 'elim') z[x] = 'active';
                    return Object.assign(z, extra || {});
                };

                if (lo === hi) {
                    settled[lo] = true;
                    const z = baseZones(); z[lo] = 'answer';
                    steps.push(snap({ left: lo, right: hi, pivot: lo, code: [1, 2], zones: z, done: true, complete: true, confetti: true,
                        action: '✓ FOUND', actionColor: 'var(--accent-green)',
                        panel: `Range collapsed to a single cell <code>[${lo}]</code>. The <b>${kVal}<sup>${ord(kVal)}</sup> smallest</b> is <b>${a[lo]}</b>.`,
                        log: `lo==hi -> answer a[${lo}] = ${a[lo]}` }));
                    return;
                }

                // choose pivot = last element of range
                const pivotIdx = hi, pivotVal = a[hi];
                const zp = rangeZones(); zp[pivotIdx] = 'pivot';
                steps.push(snap({ left: lo, right: hi, pivot: pivotIdx, code: [3], zones: zp, pivotPtr: pivotIdx, iPtr: lo,
                    action: 'PICK PIVOT', actionColor: 'var(--accent-orange)',
                    panel: `Recurse on range <code>[${lo}&#8230;${hi}]</code>. Pick the last element as pivot: <code>a[${hi}] = ${pivotVal}</code>. We will push everything &#8804; ${pivotVal} to the left.`,
                    log: `partition [${lo}..${hi}] pivot=a[${hi}]=${pivotVal}` }));

                // Lomuto scan: i is the boundary; everything in [lo..i-1] is <= pivot
                let i = lo;
                const zStart = rangeZones(); zStart[pivotIdx] = 'pivot';
                steps.push(snap({ left: lo, right: hi, pivot: pivotIdx, code: [4], zones: zStart, iPtr: lo, pivotPtr: pivotIdx,
                    action: 'SCAN', actionColor: 'var(--accent-purple)',
                    panel: `Set boundary <code>i = ${lo}</code>. Scan <code>j</code> across <code>[${lo}&#8230;${hi - 1}]</code>; each time <code>a[j] &#8804; ${pivotVal}</code>, swap it to position <code>i</code> and grow the small region.`,
                    log: `i=${lo} begin scan` }));

                for (let j = lo; j < hi; j++) {
                    // build zones reflecting progress: [lo..i-1] lt, [i..j-1] gt, j current
                    const mkZones = () => {
                        const z = baseZones();
                        for (let x = lo; x <= hi; x++) if (z[x] === 'elim') z[x] = 'active';
                        for (let x = lo; x < i; x++) z[x] = 'lt';
                        for (let x = i; x < j; x++) z[x] = 'gt';
                        z[pivotIdx] = 'pivot';
                        return z;
                    };
                    const cmp = a[j] <= pivotVal;
                    const zc = mkZones();
                    steps.push(snap({ left: lo, right: hi, pivot: pivotIdx, code: [5, 6], zones: zc, iPtr: i, jPtr: j, pivotPtr: pivotIdx, cur: j,
                        action: cmp ? `a[${j}]=${a[j]} ≤ ${pivotVal}` : `a[${j}]=${a[j]} > ${pivotVal}`,
                        actionColor: cmp ? 'var(--accent-purple)' : 'var(--accent-blue)',
                        panel: cmp
                            ? `<code>a[${j}] = ${a[j]} &#8804; ${pivotVal}</code> &#8594; it belongs left. Swap into boundary <code>(i=${i}, j=${j})</code>${i === j ? ' (same spot, no move)' : ''}, then <code>i++</code>.`
                            : `<code>a[${j}] = ${a[j]} &gt; ${pivotVal}</code> &#8594; it belongs right of the pivot. Leave it; only advance <code>j</code>.`,
                        log: cmp ? `a[${j}]=${a[j]} <= ${pivotVal}  swap(${i},${j}) i->${i + 1}` : `a[${j}]=${a[j]} > ${pivotVal}  skip`,
                        swap: (cmp && i !== j) ? [i, j] : null }));
                    if (cmp) {
                        if (i !== j) { [a[i], a[j]] = [a[j], a[i]]; swaps++; }
                        i++;
                    }
                }

                // place pivot at i
                const beforePivotSwap = (i !== hi);
                if (i !== hi) { [a[i], a[hi]] = [a[hi], a[i]]; swaps++; }
                const zPlace = baseZones();
                for (let x = lo; x <= hi; x++) if (zPlace[x] === 'elim') zPlace[x] = 'active';
                for (let x = lo; x < i; x++) zPlace[x] = 'lt';
                for (let x = i + 1; x <= hi; x++) zPlace[x] = 'gt';
                zPlace[i] = 'pivot';
                steps.push(snap({ left: lo, right: hi, pivot: i, code: [7], zones: zPlace, pivotPtr: i, iPtr: i,
                    action: `PIVOT → index ${i}`, actionColor: 'var(--accent-orange)',
                    panel: `Scan done. Swap the pivot into the boundary <code>(i=${i}, hi=${hi})</code>${beforePivotSwap ? '' : ' (already in place)'}. Now <b>everything left of ${i} is &#8804; ${pivotVal}</b>, everything right is &gt;. Pivot value <b>${a[i]}</b> is in its final sorted slot.`,
                    log: `swap(${i},${hi}) -> pivot a[${i}]=${a[i]} is final`,
                    swap: beforePivotSwap ? [i, hi] : null }));

                // compare pivot index to target
                if (k === i) {
                    settled[i] = true;
                    const za = baseZones(); za[i] = 'answer';
                    steps.push(snap({ left: lo, right: hi, pivot: i, code: [8, 9], zones: za, done: true, complete: true, confetti: true,
                        action: '✓ FOUND', actionColor: 'var(--accent-green)',
                        panel: `Pivot index <code>${i}</code> equals target <code>k&#8722;1 = ${target}</code>. The <b>${kVal}<sup>${ord(kVal)}</sup> smallest</b> is <b>${a[i]}</b>.`,
                        log: `pivot idx ${i} == target ${target} -> answer ${a[i]}` }));
                    return;
                } else if (k < i) {
                    settled[i] = true; // pivot final; right side dropped
                    const z = baseZones();
                    for (let x = lo; x <= i - 1; x++) z[x] = 'active';
                    z[i] = 'settled';
                    steps.push(snap({ left: lo, right: i - 1, pivot: i, code: [10, 11], zones: z,
                        action: 'GO LEFT', actionColor: 'var(--accent-purple)',
                        panel: `Target <code>${target} &lt; ${i}</code> &#8594; the answer sits <b>left</b> of the pivot. Discard the right side and recurse on <code>[${lo}&#8230;${i - 1}]</code>.`,
                        log: `target ${target} < ${i}  recurse left [${lo}..${i - 1}]` }));
                    solve(lo, i - 1, k);
                } else {
                    settled[i] = true; // pivot final; left side dropped
                    const z = baseZones();
                    for (let x = i + 1; x <= hi; x++) z[x] = 'active';
                    z[i] = 'settled';
                    steps.push(snap({ left: i + 1, right: hi, pivot: i, code: [12], zones: z,
                        action: 'GO RIGHT', actionColor: 'var(--accent-blue)',
                        panel: `Target <code>${target} &gt; ${i}</code> &#8594; the answer sits <b>right</b> of the pivot. Discard the left side and recurse on <code>[${i + 1}&#8230;${hi}]</code>.`,
                        log: `target ${target} > ${i}  recurse right [${i + 1}..${hi}]` }));
                    solve(i + 1, hi, k);
                }
            }

            solve(0, n - 1, target);
        }

        function ord(k) { const s = ['th', 'st', 'nd', 'rd'], v = k % 100; return (s[(v - 20) % 10] || s[v] || s[0]); }

        // ───────── render ─────────
        function cellCenterX(i) { const el = cellEls[i]; return el ? el.offsetLeft + el.offsetWidth / 2 : 0; }

        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const rail = document.getElementById('arr-rail');

            const used = new Set();
            for (let i = 0; i < step.arr.length; i++) {
                used.add(String(i));
                let el = cellEls[i];
                if (!el) { el = document.createElement('div'); el.className = 'cell'; el.innerHTML = `<span class="ci"></span><span class="cv"></span>`; cellEls[i] = el; rail.appendChild(el); }
                el.querySelector('.ci').textContent = i;
                el.querySelector('.cv').textContent = step.arr[i];
                let cls = 'cell';
                const z = step.zones[i];
                if (z === 'answer') cls += ' answer';
                else if (z === 'settled') cls += ' settled';
                else if (z === 'pivot') cls += ' pivot';
                else if (z === 'lt') cls += ' lt';
                else if (z === 'active') cls += ' active';
                else if (z === 'gt') cls += ' active';      // scanned > pivot still inside active range
                else cls += ' eliminated';
                if (step.swap && (i === step.swap[0] || i === step.swap[1])) cls += ' swap';
                else if (i === step.cur && !step.done) cls += ' cur';
                el.className = cls;
            }
            Object.keys(cellEls).forEach(k => { if (!used.has(k)) { cellEls[k].remove(); delete cellEls[k]; } });

            placePtr('pivot', step.done ? null : (step.pivotPtr != null ? step.pivotPtr : null));
            placePtr('i', step.done ? null : (step.iPtr != null ? step.iPtr : null));
            placePtr('j', step.done ? null : (step.jPtr != null ? step.jPtr : null));
            placeKMark(step.done ? null : step.target);

            if (step.swap) playSwap(step.swap[0], step.swap[1]);

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.textContent = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            document.getElementById('st-left').textContent = step.left;
            document.getElementById('st-right').textContent = step.right;
            document.getElementById('st-pivot').textContent = (step.pivot != null && step.pivot >= 0) ? step.pivot : '—';
            document.getElementById('st-k').textContent = step.target;
            document.getElementById('st-swaps').textContent = step.swaps;
            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        // animate two clone tiles crossing between positions i and j (shows the swap)
        function playSwap(i, j) {
            if (REDUCED) return;
            const ci = cellEls[i], cj = cellEls[j], rail = document.getElementById('arr-rail');
            if (!ci || !cj) return;
            const xi = ci.offsetLeft, xj = cj.offsetLeft, y = ci.offsetTop;
            const vi = ci.querySelector('.cv').textContent, vj = cj.querySelector('.cv').textContent;
            mkFly(vj, xi, xj, y, rail); // value now at i came from j
            mkFly(vi, xj, xi, y, rail);
        }
        function mkFly(val, fromX, toX, y, rail) {
            const f = document.createElement('div'); f.className = 'fly'; f.textContent = val;
            f.style.top = y + 'px';
            rail.appendChild(f);
            const kf = SPRING_POS.map(p => ({ transform: `translateX(${(fromX + (toX - fromX) * p).toFixed(1)}px) translateY(${(-22 * Math.sin(Math.PI * p)).toFixed(1)}px)`, opacity: (p < 0.08 ? p / 0.08 : p > 0.9 ? (1 - p) / 0.1 : 1).toFixed(2) }));
            const an = f.animate(kf, { duration: durOf(SPRING_POS), easing: 'linear' });
            an.onfinish = () => f.remove();
        }

        function placePtr(name, i) {
            let pill = ptrEls[name];
            if (!pill) {
                pill = document.createElement('div'); pill.className = 'sptr ' + name;
                pill.innerHTML = (name === 'i') ? `<div class="stalk"></div><div class="tag">i</div>` : `<div class="tag">${name}</div><div class="stalk"></div>`;
                document.getElementById('arr-rail').appendChild(pill); ptrEls[name] = pill;
            }
            if (i == null || !cellEls[i]) { pill.style.opacity = '0'; pill._x = null; return; }
            Motion.glide(pill, cellCenterX(i));
        }
        function placeKMark(i) {
            let pill = ptrEls['kmark'];
            if (!pill) {
                pill = document.createElement('div'); pill.className = 'kmark';
                pill.innerHTML = `<div class="tag">k&#8722;1</div><div class="stalk"></div>`;
                document.getElementById('arr-rail').appendChild(pill); ptrEls['kmark'] = pill;
            }
            if (i == null || !cellEls[i]) { pill.style.opacity = '0'; pill._x = null; return; }
            Motion.glide(pill, cellCenterX(i));
        }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() {
            Object.keys(cellEls).forEach(k => { cellEls[k].remove(); delete cellEls[k]; });
            Object.keys(ptrEls).forEach(k => { ptrEls[k].remove(); delete ptrEls[k]; });
            document.querySelectorAll('.fly').forEach(f => f.remove());
            confettiArmed = true;
        }
        function loadData(a, k) { pause(); arr = a; kVal = k; clearDom(); generateSteps(); renderStep(0); }
        function loadCustom() {
            const raw = (document.getElementById('arr-input').value || '')
                .replace(/[\[\]]/g, '').split(',').map(s => parseInt(s.trim(), 10)).filter(n => Number.isFinite(n));
            let k = parseInt(document.getElementById('k-input').value, 10);
            const a = raw.slice(0, 16);
            if (!a.length) return;
            if (!Number.isFinite(k) || k < 1) k = 1;
            if (k > a.length) k = a.length;
            document.getElementById('k-input').value = k;
            loadData(a, k);
        }
        function loadExample(n) {
            const ex = EXAMPLES[n];
            document.getElementById('arr-input').value = ex.arr.join(', ');
            document.getElementById('k-input').value = ex.k;
            loadData(ex.arr.slice(), ex.k);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        document.getElementById('arr-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        document.getElementById('k-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); });
        window.addEventListener('resize', () => renderStep(stepIdx));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
