<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kth Smallest in a Sorted Matrix - Visualization</title>
    <style>
        :root {
            --bg-page: #070b14;
            --bg-surface: rgba(255, 255, 255, 0.045);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border-main: rgba(255, 255, 255, 0.10);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.10);
            --text-main: #e8eefb;
            --text-dim: #8b98b3;
            --accent-orange: #f5a524;   /* mid value / range hi          */
            --accent-blue:   #06b6d4;   /* search space / staircase path  */
            --accent-green:  #22c55e;   /* counted (<= mid) / answer      */
            --accent-red:    #f43f5e;   /* greater than mid / eliminated  */
            --accent-purple: #a855f7;   /* staircase pointer / range lo   */
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --shell: 900px;
        }

        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        body {
            background:
                radial-gradient(1100px 600px at 15% -10%, rgba(168, 85, 247, 0.10), transparent 60%),
                radial-gradient(900px 600px at 100% 10%, rgba(6, 182, 212, 0.10), transparent 55%),
                linear-gradient(160deg, #070b14 0%, #0b1120 55%, #0a0f1c 100%);
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--sans); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 48px; -webkit-font-smoothing: antialiased;
        }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.45; }
        body::before { width: 380px; height: 380px; top: 8%; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); }
        body::after  { width: 420px; height: 420px; bottom: 4%; right: -140px; background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 70%); }
        body > * { position: relative; z-index: 1; }

        .input-bar {
            width: 100%; background: rgba(10, 15, 28, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 14px 16px; display: flex; justify-content: center; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-main); flex-wrap: wrap; position: sticky; top: 0; z-index: 50;
        }
        label.ui-label, .ui-label { font-family: var(--mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; }
        input[type="text"] {
            background: var(--bg-input); border: 1px solid var(--border-main); color: var(--text-main);
            height: 34px; border-radius: 9px; padding: 0 12px; font-size: 13px; font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input.matrix-input { width: 320px; }
        input.k-input { width: 70px; }
        input[type="text"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18); background: rgba(168, 85, 247, 0.06); }

        button {
            height: 34px; border-radius: 9px; padding: 0 14px; background: var(--btn-bg);
            border: 1px solid var(--border-main); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { background: var(--btn-hover); border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 18px rgba(6, 182, 212, 0.18); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #play-btn { background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.10)); border-color: rgba(6, 182, 212, 0.45); color: #a5f3fc; min-width: 80px; }

        .shell { width: var(--shell); max-width: 95%; margin: 24px auto 0; display: flex; flex-direction: column; gap: 16px; }

        .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .title-row h1 { font-size: 18px; font-weight: 800; margin: 0; letter-spacing: 0.2px; }
        .title-row .sub { color: var(--text-dim); font-weight: 500; font-size: 13px; }
        .step-badge { font-family: var(--mono); font-size: 12px; font-weight: 700; color: #a5f3fc; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
        .progress-track { height: 4px; width: 100%; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-top: -6px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); box-shadow: 0 0 12px rgba(6,182,212,0.5); transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1); }

        .narration { background: var(--bg-surface); border: 1px solid rgba(6,182,212,0.22); border-radius: 12px; padding: 12px 18px; font-family: var(--mono); font-size: 14px; line-height: 1.5; color: #cfe9f5; min-height: 48px; display: flex; align-items: center; gap: 10px; transition: border-color 0.3s, background 0.3s; }
        .narration::before { content: '\25B8'; color: var(--accent-blue); font-size: 13px; }
        .narration.done { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
        .narration.done::before { content: '\2713'; color: var(--accent-green); }
        .narration code { background: rgba(6,182,212,0.14); color: #7dd3fc; padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
        .narration b { color: #fff; }

        .stage-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 38px rgba(0,0,0,0.4); overflow: hidden; }
        .stage-screen { position: relative; margin: 14px; border-radius: 14px; background: radial-gradient(700px 300px at 50% -10%, rgba(6,182,212,0.08), transparent 70%), #090d18; border: 1px solid rgba(255,255,255,0.06); }

        .range-bar { display: flex; align-items: center; justify-content: center; gap: 14px; padding: 16px 22px 4px; flex-wrap: wrap; }
        .range-chip { display: inline-flex; flex-direction: column; align-items: center; gap: 3px; min-width: 78px; padding: 7px 14px; border-radius: 11px; border: 1px solid var(--border-main); background: rgba(255,255,255,0.03); transition: border-color 0.35s, box-shadow 0.35s, background 0.35s; }
        .range-chip .rk { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-dim); }
        .range-chip .rv { font-family: var(--mono); font-size: 19px; font-weight: 800; color: var(--text-main); }
        .range-chip.lo { border-color: rgba(168,85,247,0.45); box-shadow: 0 0 16px rgba(168,85,247,0.22); }
        .range-chip.lo .rv { color: #e9d5ff; }
        .range-chip.mid { border-color: rgba(6,182,212,0.5); box-shadow: 0 0 16px rgba(6,182,212,0.3); }
        .range-chip.mid .rv { color: #a5f3fc; }
        .range-chip.hi { border-color: rgba(245,165,36,0.5); box-shadow: 0 0 16px rgba(245,165,36,0.25); }
        .range-chip.hi .rv { color: #ffd591; }
        .range-arrow { color: var(--text-dim); font-family: var(--mono); font-size: 14px; }

        .grid-stage { position: relative; width: 100%; overflow: auto; scrollbar-width: thin; padding: 14px 22px 24px; display: flex; justify-content: center; }
        .grid-stage::-webkit-scrollbar { height: 8px; width: 8px; }
        .grid-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        .dp-grid { display: grid; gap: 6px; }
        .cell {
            position: relative;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-family: var(--mono); font-weight: 800; font-size: 16px;
            border: 2px solid var(--border-main); background: rgba(255,255,255,0.04); color: var(--text-main);
            width: 50px; height: 50px; will-change: transform;
            transition: background 0.35s, border-color 0.35s, color 0.35s, box-shadow 0.35s, transform 0.3s, opacity 0.35s;
        }
        .cell.head { border: none; background: transparent; color: var(--text-dim); font-size: 13px; font-weight: 700; box-shadow: none; }
        .cell.corner { background: transparent; border: none; box-shadow: none; }
        .cell.space { border-color: rgba(6,182,212,0.32); background: rgba(6,182,212,0.07); }
        .cell.counted { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.80), rgba(33,194,117,0.80)); color: #06251a; box-shadow: 0 0 14px rgba(34,197,94,0.40); }
        .cell.over { border-color: var(--accent-red); background: rgba(244,63,94,0.10); color: #fca5b4; opacity: 0.6; }
        .cell.pointer { border-color: var(--accent-purple); box-shadow: 0 0 20px rgba(168,85,247,0.55), inset 0 0 12px rgba(168,85,247,0.12); transform: scale(1.08); z-index: 3; }
        .cell.answer { border-color: var(--accent-green); background: linear-gradient(180deg, rgba(47,224,143,0.92), rgba(33,194,117,0.92)); color: #06251a; box-shadow: 0 0 22px rgba(34,197,94,0.65); transform: scale(1.1); z-index: 4; }
        .cell .tag { position: absolute; top: -9px; right: -7px; font-family: var(--mono); font-size: 9.5px; font-weight: 800; padding: 1px 5px; border-radius: 7px; background: var(--accent-purple); color: #1a0a2e; box-shadow: 0 0 10px rgba(168,85,247,0.6); white-space: nowrap; }
        .cell .badge { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); font-family: var(--mono); font-size: 9px; font-weight: 800; padding: 0px 5px; border-radius: 6px; background: rgba(34,197,94,0.9); color: #06251a; white-space: nowrap; }

        .action-stage { position: relative; min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .answer-track { display: flex; gap: 6px; align-items: center; min-height: 40px; }
        .ans-tile { min-width: 40px; padding: 0 8px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 20px; font-weight: 800; border: 2px solid var(--accent-green); background: rgba(34,197,94,0.16); color: #86efac; box-shadow: 0 0 14px rgba(34,197,94,0.4); }
        .action-word { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: 0.4px; min-height: 22px; text-align: center; transition: color 0.3s; }
        #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
        .confetti-piece { position: absolute; top: 0; left: 50%; width: 8px; height: 13px; border-radius: 2px; opacity: 0; animation: confettiFall ease-out forwards; }

        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .controls .kbd-hint { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: 4px; }
        .kbd { background: rgba(255,255,255,0.07); border: 1px solid var(--border-main); border-radius: 5px; padding: 1px 6px; font-size: 10px; }
        input[type="range"] { accent-color: var(--accent-blue); width: 110px; cursor: pointer; }

        .details-toggle { align-self: center; height: 32px; padding: 0 16px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .details-toggle:hover { color: var(--text-main); border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.06); }
        .details-toggle .chev { transition: transform 0.3s ease; }
        .details-wrap.open .details-toggle .chev { transform: rotate(180deg); }
        .details-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; }
        .details-wrap.open .details-body { grid-template-rows: 1fr; }
        .details-inner { overflow: hidden; min-height: 0; }
        .details-grid { display: flex; flex-direction: column; gap: 14px; padding-top: 14px; }

        .panel-card { background: var(--bg-surface); border: 1px solid var(--border-main); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
        .panel-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--border-main); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); }
        .panel-head .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .code-body { padding: 12px 6px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; }
        .code-line { display: flex; gap: 12px; padding: 1px 16px; border-left: 2px solid transparent; transition: background 0.3s, border-color 0.3s; white-space: pre; }
        .code-line .lno { color: #4b5772; width: 16px; text-align: right; user-select: none; }
        .code-line .src { color: #c4cee0; }
        .code-line .kw { color: #c792ea; }
        .code-line .fn { color: #82aaff; }
        .code-line.active { background: rgba(6,182,212,0.12); border-left-color: var(--accent-blue); }
        .code-line.active .src, .code-line.active .lno { color: #e8eefb; }

        .state-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 0 2px; }
        .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-main); border-radius: 999px; padding: 4px 11px; }
        .pill b { color: var(--text-main); font-weight: 800; }
        .pill.lo b { color: var(--accent-purple); } .pill.mid b { color: var(--accent-blue); } .pill.hi b { color: var(--accent-orange); } .pill.cnt b { color: var(--accent-green); }

        .log-panel { border-radius: 14px; padding: 12px 16px; height: 110px; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--bg-surface); border: 1px solid var(--border-main); }
        .log-panel::-webkit-scrollbar { width: 8px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }

        @keyframes confettiFall { 0%{ opacity:1; transform: translate(-50%, 0) rotate(0deg); } 100%{ opacity:0; transform: translate(calc(-50% + var(--x)), 220px) rotate(var(--rot)); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; } }
    </style>
</head>
<body>

    <div class="input-bar">
        <label class="ui-label">matrix =</label>
        <input type="text" id="matrix-input" class="matrix-input" placeholder="[[1,5,9],[10,11,13],[12,13,15]]">
        <label class="ui-label">k =</label>
        <input type="text" id="k-input" class="k-input" placeholder="8">
        <button onclick="loadCustom()">Load</button>
        <span class="ui-label" style="opacity:.5">|</span>
        <button onclick="loadExample(0)">Ex 1</button>
        <button onclick="loadExample(1)">Ex 2</button>
    </div>

    <div class="shell">
        <div class="title-row">
            <h1>Kth Smallest in a Sorted Matrix <span class="sub">&middot; binary search on the value range &middot; staircase count &le; mid &middot; O(n&middot;log(max&minus;min))</span></h1>
            <span class="step-badge" id="step-badge">Step 1 / 1</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="narration" id="main-panel">&mdash;</div>

        <div class="stage-card">
            <div class="stage-screen">
                <div class="range-bar" id="range-bar">
                    <div class="range-chip lo"><span class="rk">lo</span><span class="rv" id="rng-lo">&mdash;</span></div>
                    <span class="range-arrow">&#8804;</span>
                    <div class="range-chip mid"><span class="rk">mid</span><span class="rv" id="rng-mid">&mdash;</span></div>
                    <span class="range-arrow">&#8804;</span>
                    <div class="range-chip hi"><span class="rk">hi</span><span class="rv" id="rng-hi">&mdash;</span></div>
                </div>
                <div class="grid-stage" id="grid-stage">
                    <div class="dp-grid" id="dp-grid"></div>
                </div>
            </div>
        </div>

        <div class="action-stage">
            <div id="confetti"></div>
            <div class="answer-track" id="answer-track"></div>
            <div class="action-word" id="action-word"></div>
        </div>

        <div class="controls">
            <button onclick="resetSim()">&#8634; Reset</button>
            <button onclick="prevStep()">&#8592; Back</button>
            <button onclick="togglePlay()" id="play-btn">Play</button>
            <button onclick="nextStep()">Next &#8594;</button>
            <span class="ui-label" style="margin-left:6px; font-size:11px">Speed</span>
            <input type="range" id="speed" min="0" max="2" value="1">
            <span class="kbd-hint"><span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> step &middot; <span class="kbd">space</span> play</span>
        </div>

        <div class="details-wrap" id="details-wrap">
            <button class="details-toggle" onclick="toggleDetails()" aria-expanded="false">
                <span id="details-label">Show code, state &amp; log</span> <span class="chev">&#9662;</span>
            </button>
            <div class="details-body">
                <div class="details-inner">
                    <div class="details-grid">
                        <div class="state-strip">
                            <span class="pill lo">lo <b id="st-lo">&mdash;</b></span>
                            <span class="pill mid">mid <b id="st-mid">&mdash;</b></span>
                            <span class="pill hi">hi <b id="st-hi">&mdash;</b></span>
                            <span class="pill cnt">count &le; mid <b id="st-cnt">&mdash;</b></span>
                            <span class="pill">k <b id="st-k">&mdash;</b></span>
                        </div>
                        <div class="panel-card">
                            <div class="panel-head"><span class="pip"></span> Algorithm</div>
                            <div class="code-body" id="code-panel"></div>
                        </div>
                        <div class="log-panel" id="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ───────── Motion engine (spring pop, zero deps) ─────────
        const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const FRAME = 1000 / 60;
        function sampleSpring(stiffness, damping, mass) {
            const dt = 1 / 60; let x = 1, v = 0; const out = [];
            for (let i = 0; i < 240; i++) { const a = (-stiffness * x - damping * v) / mass; v += a * dt; x += v * dt; out.push(1 - x); if (Math.abs(x) < 0.0015 && Math.abs(v) < 0.0015) break; }
            out.push(1); return out;
        }
        const SPRING_POP = sampleSpring(520, 17, 1);
        const durOf = (a) => a.length * FRAME;
        const Motion = {
            pop(el) {
                if (REDUCED) return;
                const kf = SPRING_POP.map(p => ({ transform: `scale(${(0.6 + 0.46 * p).toFixed(3)})` }));
                el.animate(kf, { duration: durOf(SPRING_POP), easing: 'linear' });
            },
        };

        // ───────── State ─────────
        const EXAMPLES = [
            { matrix: [[1,5,9],[10,11,13],[12,13,15]], k: 8 },
            { matrix: [[-5]], k: 1 }
        ];
        let matrix = EXAMPLES[0].matrix.map(r => r.slice());
        let kVal = EXAMPLES[0].k;
        let steps = [];
        let stepIdx = 0;
        let timer = null;
        let confettiArmed = true;
        const delays = [1500, 760, 360];
        const cellEls = {};   // 'r,c' -> element

        const CODE = [
            [['kw','def '],['fn','kthSmallest'],['src','(M, k):']],
            [['src','  lo, hi = M[0][0], M[n-1][n-1]']],
            [['kw','  while '],['src','lo < hi:']],
            [['src','    mid = (lo + hi) // 2']],
            [['src','    count, c = 0, n - 1']],
            [['kw','    for '],['src','r in 0..n-1:']],
            [['kw','      while '],['src','c >= 0 and M[r][c] > mid: c -= 1']],
            [['src','      count += c + 1']],
            [['kw','    if '],['src','count < k: lo = mid + 1']],
            [['kw','    else'],['src',': hi = mid']],
            [['kw','  return '],['src','lo']],
        ];
        function buildCodePanel() {
            const panel = document.getElementById('code-panel'); panel.innerHTML = '';
            CODE.forEach((tokens, i) => {
                const line = document.createElement('div'); line.className = 'code-line'; line.dataset.line = i;
                const lno = document.createElement('span'); lno.className = 'lno'; lno.textContent = i + 1; line.appendChild(lno);
                const src = document.createElement('span');
                tokens.forEach(([cls, txt]) => { const s = document.createElement('span'); s.className = cls; s.textContent = txt; src.appendChild(s); });
                line.appendChild(src); panel.appendChild(line);
            });
        }
        function highlightCode(arr) { document.querySelectorAll('.code-line').forEach(el => el.classList.toggle('active', arr && arr.includes(+el.dataset.line))); }
        function toggleDetails() {
            const wrap = document.getElementById('details-wrap'); const open = wrap.classList.toggle('open');
            wrap.querySelector('.details-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            document.getElementById('details-label').textContent = open ? 'Hide code, state & log' : 'Show code, state & log';
        }

        // ───────── step generation ─────────
        // Each step carries an immutable snapshot. The grid is described by per-cell
        // "state" strings ('' | 'space' | 'counted' | 'over'), an optional pointer cell,
        // an optional answer cell, and an optional row-count badge map.
        function blankGrid(rows, cols, fill) { return Array.from({ length: rows }, () => Array(cols).fill(fill)); }

        function generateSteps() {
            steps = [];
            const n = matrix.length;
            const m = n > 0 ? matrix[0].length : 0;
            const total = n * m;

            const base = (extra) => Object.assign({
                n, m, k: kVal,
                grid: blankGrid(n, m, ''),    // cell-state matrix
                pointer: null,                 // [r,c]
                answerCell: null,              // [r,c]
                badges: {},                    // 'r' -> running count text on rightmost counted cell
                lo: null, mid: null, hi: null, count: null,
                code: [], action: '', actionColor: 'var(--text-dim)',
                panel: '', log: '', complete: false, confetti: false, answer: null
            }, extra);

            if (n === 0 || m === 0 || kVal < 1 || kVal > total) {
                steps.push(base({
                    complete: true, code: [0], action: 'invalid input', actionColor: 'var(--accent-red)',
                    panel: `Need a non-empty matrix and <code>1 &le; k &le; n&times;m</code>. Got <code>k=${kVal}</code> for a ${n}&times;${m} matrix.`,
                    log: `invalid: k=${kVal}, cells=${total}`
                }));
                return;
            }

            let lo = matrix[0][0];
            let hi = matrix[n - 1][m - 1];

            // INTRO
            steps.push(base({
                lo, hi, code: [0, 1],
                grid: blankGrid(n, m, 'space'),
                action: 'BINARY SEARCH ON VALUE',
                actionColor: 'var(--accent-blue)',
                panel: `Find the <b>${ordinal(kVal)}</b> smallest value in this ${n}&times;${m} row+column sorted matrix. The answer lies in <code>[lo, hi] = [${lo}, ${hi}]</code>. We binary&#8209;search the <b>value</b>, not an index.`,
                log: `init  ${n}x${m} matrix, k=${kVal}, range [${lo}, ${hi}]`
            }));

            let iter = 0;
            while (lo < hi) {
                iter++;
                const mid = lo + Math.floor((hi - lo) / 2);

                // STEP: pick mid
                steps.push(base({
                    lo, hi, mid, count: 0, code: [2, 3],
                    grid: blankGrid(n, m, 'space'),
                    action: `mid = (${lo}+${hi})/2 = ${mid}`,
                    actionColor: 'var(--accent-blue)',
                    panel: `Iteration ${iter}: with <code>lo=${lo}</code>, <code>hi=${hi}</code>, guess <code>mid = &#8970;(lo+hi)/2&#8971; = ${mid}</code>. Now count how many entries are <code>&le; ${mid}</code>.`,
                    log: `iter ${iter}: lo=${lo} hi=${hi} mid=${mid}`
                }));

                // STAIRCASE COUNT from bottom-left, walking up rows.
                // We process rows from bottom (r = n-1) to top, but the classic walk
                // starts bottom-left and moves: right increases count, up decreases column.
                // Simpler & faithful: per row, slide column pointer left while M[r][c] > mid.
                const grid = blankGrid(n, m, 'space');
                const badges = {};
                let count = 0;
                // walk top-to-bottom for a clear reading order; pointer 'c' is monotonic per row.
                for (let r = 0; r < n; r++) {
                    let c = m - 1;
                    while (c >= 0 && matrix[r][c] > mid) {
                        grid[r][c] = 'over';
                        c--;
                    }
                    for (let j = 0; j <= c; j++) grid[r][j] = 'counted';
                    const rowCount = c + 1;
                    count += rowCount;

                    // snapshot AFTER finishing this row's scan
                    const pointer = c >= 0 ? [r, c] : (m > 0 ? [r, 0] : null);
                    if (c >= 0) badges[r] = '+' + rowCount;
                    steps.push(base({
                        lo, hi, mid, count, code: [4, 5, 6, 7],
                        grid: cloneGrid(grid), badges: Object.assign({}, badges),
                        pointer: c >= 0 ? [r, c] : null,
                        action: `row ${r}: ${rowCount} &le; ${mid}  (total ${count})`,
                        actionColor: rowCount > 0 ? 'var(--accent-green)' : 'var(--accent-red)',
                        panel: rowCount > 0
                            ? `Row ${r}: slide left from the right edge &#8594; cells <code>[0..${c}]</code> are <code>&le; ${mid}</code>. That adds <b>${rowCount}</b>, running count = <b>${count}</b>.`
                            : `Row ${r}: even the first entry <code>${matrix[r][0]} &gt; ${mid}</code>, so this row contributes <b>0</b>. Running count = <b>${count}</b>.`,
                        log: `  row ${r}: +${rowCount}  (count=${count})`
                    }));
                }

                // DECISION
                const feasible = count >= kVal;
                steps.push(base({
                    lo, hi, mid, count, code: feasible ? [8, 9] : [8],
                    grid: cloneGrid(grid), badges: Object.assign({}, badges),
                    action: feasible ? `count ${count} &ge; ${kVal}` : `count ${count} &lt; ${kVal}`,
                    actionColor: feasible ? 'var(--accent-green)' : 'var(--accent-red)',
                    panel: feasible
                        ? `<code>count = ${count} &ge; k = ${kVal}</code>, so the answer is <code>&le; ${mid}</code>. Tighten the upper bound: <code>hi = mid = ${mid}</code>.`
                        : `<code>count = ${count} &lt; k = ${kVal}</code>, so the answer is <code>&gt; ${mid}</code>. Raise the lower bound: <code>lo = mid + 1 = ${mid + 1}</code>.`,
                    log: feasible ? `  count ${count} >= ${kVal} -> hi=${mid}` : `  count ${count} < ${kVal} -> lo=${mid + 1}`
                }));

                if (feasible) hi = mid; else lo = mid + 1;
            }

            // CONVERGED: lo == hi == answer. Find the cell holding that value to mark it.
            const answer = lo;
            let ansCell = null;
            for (let r = 0; r < n && !ansCell; r++)
                for (let c = 0; c < m; c++)
                    if (matrix[r][c] === answer) { ansCell = [r, c]; break; }

            // Build a final grid: everything <= answer counted, the answer cell highlighted.
            const finalGrid = blankGrid(n, m, '');
            for (let r = 0; r < n; r++)
                for (let c = 0; c < m; c++)
                    finalGrid[r][c] = matrix[r][c] <= answer ? 'counted' : 'over';

            steps.push(base({
                lo: answer, hi: answer, mid: answer, count: kVal, code: [2, 10],
                grid: finalGrid, answerCell: ansCell,
                complete: true, confetti: true, answer,
                action: `&#10003; ${answer}`, actionColor: 'var(--accent-green)',
                panel: `<code>lo == hi == ${answer}</code> &#8594; the loop ends. The <b>${ordinal(kVal)}</b> smallest value in the matrix is <b>${answer}</b>.`,
                log: `done  ${ordinal(kVal)} smallest = ${answer}`
            }));
        }

        function cloneGrid(g) { return g.map(r => r.slice()); }
        function ordinal(k) {
            const s = ['th', 'st', 'nd', 'rd'], v = k % 100;
            return k + (s[(v - 20) % 10] || s[v] || s[0]);
        }

        // ───────── render (persistent DOM) ─────────
        function renderStep(idx) {
            stepIdx = idx; const step = steps[idx]; if (!step) return;
            const grid = document.getElementById('dp-grid');
            const n = step.n, m = step.m;
            // +1 header row and +1 header column to label indices
            grid.style.gridTemplateColumns = `repeat(${m + 1}, 50px)`;

            const ptrKey = step.pointer ? step.pointer[0] + ',' + step.pointer[1] : null;
            const ansKey = step.answerCell ? step.answerCell[0] + ',' + step.answerCell[1] : null;
            const used = new Set();

            for (let gr = 0; gr < n + 1; gr++) {
                for (let gc = 0; gc < m + 1; gc++) {
                    const key = gr + ',' + gc; used.add(key);
                    let el = cellEls[key];
                    if (!el) { el = document.createElement('div'); el.className = 'cell'; cellEls[key] = el; }
                    let cls = 'cell', txt = '', tag = '', badge = '', isData = false;

                    if (gr === 0 && gc === 0) { cls += ' corner'; }
                    else if (gr === 0) { cls += ' head'; txt = 'c' + (gc - 1); }      // column index header
                    else if (gc === 0) { cls += ' head'; txt = 'r' + (gr - 1); }      // row index header
                    else {
                        isData = true;
                        const r = gr - 1, c = gc - 1, dk = r + ',' + c;
                        txt = String(matrix[r][c]);
                        const state = step.grid[r] ? step.grid[r][c] : '';
                        if (state) cls += ' ' + state;
                        if (ptrKey === dk) { cls += ' pointer'; tag = 'c'; }
                        if (ansKey === dk) { cls += ' answer'; }
                        if (step.badges && step.badges[r] !== undefined && c === firstCountedFromRight(step, r)) {
                            // place badge on rightmost counted cell of the row
                        }
                    }

                    const prevCls = el.className;
                    el.className = cls;
                    el.textContent = txt;

                    // tag chip (pointer)
                    let tagEl = el.querySelector('.tag');
                    if (tag) { if (!tagEl) { tagEl = document.createElement('span'); tagEl.className = 'tag'; el.appendChild(tagEl); } tagEl.textContent = tag; }
                    else if (tagEl) tagEl.remove();

                    // running-count badge on the row's rightmost counted cell
                    let badgeEl = el.querySelector('.badge');
                    if (isData) {
                        const r = gr - 1, c = gc - 1;
                        const rc = rightmostCounted(step, r);
                        if (step.badges && step.badges[r] !== undefined && rc === c) badge = step.badges[r];
                    }
                    if (badge) { if (!badgeEl) { badgeEl = document.createElement('span'); badgeEl.className = 'badge'; el.appendChild(badgeEl); } badgeEl.textContent = badge; }
                    else if (badgeEl) badgeEl.remove();

                    // spring pop when a data cell newly becomes counted or the answer
                    if (isData && prevCls !== cls && (cls.includes('counted') || cls.includes('answer')) && !prevCls.includes('counted') && !prevCls.includes('answer')) {
                        Motion.pop(el);
                    }
                    grid.appendChild(el);
                }
            }
            Object.keys(cellEls).forEach(k => { if (!used.has(k)) { cellEls[k].remove(); delete cellEls[k]; } });

            // range bar
            document.getElementById('rng-lo').textContent  = step.lo  != null ? step.lo  : '—';
            document.getElementById('rng-mid').textContent = step.mid != null ? step.mid : '—';
            document.getElementById('rng-hi').textContent  = step.hi  != null ? step.hi  : '—';

            // answer track
            const at = document.getElementById('answer-track'); at.innerHTML = '';
            if (step.complete && step.answer != null) {
                const t = document.createElement('div'); t.className = 'ans-tile'; t.textContent = step.answer; at.appendChild(t);
            }

            const mp = document.getElementById('main-panel');
            mp.innerHTML = step.panel || '&mdash;';
            mp.classList.toggle('done', !!step.complete);
            const aw = document.getElementById('action-word'); aw.innerHTML = step.action || ''; aw.style.color = step.actionColor || 'var(--text-dim)';
            highlightCode(step.code);

            if (step.confetti) { if (confettiArmed) { fireConfetti(); confettiArmed = false; } } else confettiArmed = true;

            document.getElementById('st-lo').textContent  = step.lo  != null ? step.lo  : '—';
            document.getElementById('st-mid').textContent = step.mid != null ? step.mid : '—';
            document.getElementById('st-hi').textContent  = step.hi  != null ? step.hi  : '—';
            document.getElementById('st-cnt').textContent = step.count != null ? step.count : '—';
            document.getElementById('st-k').textContent   = step.k;

            document.getElementById('step-badge').textContent = `Step ${idx + 1} / ${steps.length}`;
            document.getElementById('progress-fill').style.width = `${(idx / Math.max(1, steps.length - 1)) * 100}%`;

            const logEl = document.getElementById('log');
            logEl.innerHTML = steps.slice(0, idx + 1).map(s => `<div style="margin:3px 0;white-space:pre-wrap;">${s.log}</div>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        // rightmost 'counted' column index in a row of the step grid, or -1
        function rightmostCounted(step, r) {
            const row = step.grid[r]; if (!row) return -1;
            for (let c = row.length - 1; c >= 0; c--) if (row[c] === 'counted') return c;
            return -1;
        }
        function firstCountedFromRight(step, r) { return rightmostCounted(step, r); }

        function fireConfetti() {
            const host = document.getElementById('confetti'); if (!host || REDUCED) return;
            const colors = ['#22c55e', '#06b6d4', '#a855f7', '#f5a524', '#f43f5e'];
            for (let i = 0; i < 38; i++) {
                const p = document.createElement('div'); p.className = 'confetti-piece';
                p.style.setProperty('--x', ((Math.random() * 2 - 1) * 220) + 'px');
                p.style.setProperty('--rot', ((Math.random() * 720 - 360)) + 'deg');
                p.style.background = colors[i % colors.length];
                p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                p.style.animationDelay = (Math.random() * 0.15) + 's';
                host.appendChild(p); setTimeout(() => p.remove(), 1900);
            }
        }

        // ───────── controls ─────────
        function nextStep() { if (stepIdx < steps.length - 1) renderStep(stepIdx + 1); else pause(); }
        function prevStep() { if (stepIdx > 0) renderStep(stepIdx - 1); }
        function resetSim() { pause(); renderStep(0); }
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (timer) { pause(); return; }
            btn.textContent = 'Pause';
            if (stepIdx >= steps.length - 1) renderStep(0);
            timer = setInterval(() => { if (stepIdx < steps.length - 1) nextStep(); else pause(); }, delays[document.getElementById('speed').value]);
        }
        function pause() { clearInterval(timer); timer = null; document.getElementById('play-btn').textContent = 'Play'; }

        function clearDom() { Object.keys(cellEls).forEach(k => { cellEls[k].remove(); delete cellEls[k]; }); confettiArmed = true; }

        function parseMatrix(str) {
            const v = JSON.parse(str);
            if (!Array.isArray(v) || v.length === 0 || !Array.isArray(v[0])) throw new Error('bad');
            const w = v[0].length;
            for (const row of v) { if (!Array.isArray(row) || row.length !== w) throw new Error('jagged'); for (const x of row) if (typeof x !== 'number') throw new Error('nan'); }
            return v;
        }
        function loadMatrix(mat, k) {
            pause(); matrix = mat.map(r => r.slice()); kVal = k; clearDom(); generateSteps(); renderStep(0);
        }
        function loadCustom() {
            let mat;
            try { mat = parseMatrix(document.getElementById('matrix-input').value); }
            catch (e) { return; }
            const k = parseInt(document.getElementById('k-input').value, 10);
            if (!Number.isFinite(k)) return;
            loadMatrix(mat, k);
        }
        function loadExample(n) {
            const ex = EXAMPLES[n];
            document.getElementById('matrix-input').value = JSON.stringify(ex.matrix);
            document.getElementById('k-input').value = ex.k;
            loadMatrix(ex.matrix, ex.k);
        }

        document.addEventListener('keydown', (e) => {
            const tag = (e.target.tagName || '').toLowerCase(); if (tag === 'input' || tag === 'textarea') return;
            if (e.key === 'ArrowRight') { e.preventDefault(); pause(); nextStep(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); pause(); prevStep(); }
            else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
        ['matrix-input', 'k-input'].forEach(id => document.getElementById(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') loadCustom(); }));

        buildCodePanel();
        window.onload = () => loadExample(0);
    </script>
</body>
</html>
