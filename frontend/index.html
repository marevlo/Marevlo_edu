<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo/logo%20marevlo.svg" />
    <link rel="apple-touch-icon" href="/logo/logo%20marevlo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Research papers load KaTeX from jsDelivr inside an iframe — warm the
         connection early so the first paper renders faster. -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marevlo — Learn DSA, Solve Problems, Actually Understand It</title>
    <meta name="description" content="Marevlo is an all-in-one platform to master data structures & algorithms — interactive courses, live visualizations, 1,000+ problems, and an in-browser IDE." />
    <meta name="theme-color" content="#6366f1" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Marevlo" />
    <meta property="og:title" content="Marevlo — Learn DSA, Solve Problems, Actually Understand It" />
    <meta property="og:description" content="Interactive courses, live algorithm visualizations, 1,000+ problems, and an in-browser IDE. Go from beginner to confident problem solver." />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Marevlo — Learn DSA, Solve Problems, Actually Understand It" />
    <meta name="twitter:description" content="Interactive courses, live algorithm visualizations, 1,000+ problems, and an in-browser IDE." />
    <meta name="twitter:image" content="/og-image.svg" />
    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        const theme = localStorage.getItem('marevlo-theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <style>
      /* Critical CSS to prevent flash */
      html.dark { background-color: #0a0b0f; color: #e6e8eb; }
      html:not(.dark) { background-color: #ffffff; color: #000000; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
