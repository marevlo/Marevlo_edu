<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="0%" r="90%">
      <stop offset="0" stop-color="#15162b"/>
      <stop offset="100" stop-color="#0a0a0f"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#94a3b8" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#vignette)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Eyebrow -->
  <g transform="translate(90, 150)">
    <rect x="0" y="-26" width="372" height="40" rx="20" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-opacity="0.3"/>
    <text x="24" y="1" fill="#a5b4fc" font-size="17" font-weight="700" letter-spacing="3">DSA · COURSES · VISUALIZE · AI TUTOR</text>
  </g>

  <!-- Headline -->
  <text x="88" y="290" fill="#f8fafc" font-size="86" font-weight="800" letter-spacing="-3">Learn. Solve.</text>
  <text x="88" y="392" fill="url(#accent)" font-size="86" font-weight="800" letter-spacing="-3">Actually understand it.</text>

  <!-- Subtext -->
  <text x="90" y="470" fill="#94a3b8" font-size="28" font-weight="500">From complete beginner to confident problem solver — one concept at a time.</text>

  <!-- Feature pills -->
  <g transform="translate(90, 520)" font-size="19" font-weight="700">
    <g>
      <rect width="232" height="46" rx="23" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-opacity="0.3"/>
      <circle cx="26" cy="23" r="4" fill="#818cf8"/>
      <text x="44" y="30" fill="#c7d2fe">1,000+ Problems</text>
    </g>
    <g transform="translate(252, 0)">
      <rect width="240" height="46" rx="23" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-opacity="0.3"/>
      <circle cx="26" cy="23" r="4" fill="#22d3ee"/>
      <text x="44" y="30" fill="#a5f3fc">Live Visualizers</text>
    </g>
    <g transform="translate(524, 0)">
      <rect width="200" height="46" rx="23" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.3"/>
      <circle cx="26" cy="23" r="4" fill="#a78bfa"/>
      <text x="44" y="30" fill="#ddd6fe">MIRA AI Tutor</text>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="1110" y="92" text-anchor="end" fill="#f8fafc" font-size="34" font-weight="800" letter-spacing="-1">marevlo</text>
  <rect x="1052" y="64" width="34" height="34" rx="9" fill="url(#accent)"/>
</svg>
