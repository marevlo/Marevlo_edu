# ─────────────────────────────────────────────────────────────────────
# Marevlo backend orchestrator.
#
# `docker compose up` brings up everything except the frontend
# (the frontend runs locally with `npm run dev` from frontend/).
#
# Services:
#   postgres            5432  primary store
#   redis               6379  refresh tokens, rate limit, ws pubsub, idempotency
#   api                 8000  FastAPI backend (Backend/)
#   runner              4002  code execution — INTERNAL ONLY (no host port)
#   jupyterhub          8001  per-user notebook spawner
#   notebook-user-image       build-only sidecar; produces marevlo-notebook-user:latest
#
# Copy .env.example -> .env and edit before `docker compose up`.
# ─────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks: [marevlo]


  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}", "--save", "60", "1", "--maxmemory", "96mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks: [marevlo]

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENV: ${ENV:-prod}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      # Inter-service URL (compose DNS) — runner is NOT exposed to the host
      IDE_RUNNER_URL: http://runner:4002
      # Public-facing JupyterHub URL the backend embeds in /notebook/launch responses
      NOTEBOOK_BASE_URL: ${NOTEBOOK_BASE_URL}
      # Firebase admin credentials (mounted file)
      FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase-credentials.json
      # SMTP
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      # Compliance gates — see Backend/app/core/config.py
      # REQUIRE_EMAIL_VERIFICATION blocks password login for unverified emails;
      # enable only after SMTP/SES is live or new users will be locked out.
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      REQUIRE_TOS_ACCEPT: ${REQUIRE_TOS_ACCEPT:-true}
      TOS_VERSION: ${TOS_VERSION:-1.0}
      # Trust local proxy (Caddy/Vercel)
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-127.0.0.1/32}
      # ── MIRA (AI tutor) — read directly via os.environ in app/mira/* ──────
      # Without these the engine runs in mock mode (MIRA_REAL != "1").
      MIRA_REAL: ${MIRA_REAL:-0}
      EMBED_BACKEND: ${EMBED_BACKEND:-local}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_ENDPOINT: ${QWEN_ENDPOINT:-}
      QWEN_MODEL: ${QWEN_MODEL:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_ENDPOINT: ${MINIMAX_ENDPOINT:-}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GPT_MODEL: ${GPT_MODEL:-}
    volumes:
      - ./secrets:/run/secrets:ro
      - ./frontend/src/assets:/app/frontend_problems
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    # Single-string command in array form so YAML never folds it.
    # `exec` replaces the shell with gunicorn so signals (Ctrl-C / SIGTERM)
    # reach gunicorn directly and shutdown is graceful.
    command:
      - sh
      - -c
      - "alembic upgrade head && exec gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 2 --bind 0.0.0.0:8000 --access-logfile - --error-logfile -"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
    networks: [marevlo, runner_isolated]

  runner:
    build:
      context: ./runner
      dockerfile: Dockerfile
    environment:
      PORT: 4002
      PYTHON_POOL_SIZE: 4
      MAX_CONCURRENT: 20
      COMPILE_CACHE_DIR: /cache/compile
    volumes:
      - compile_cache:/cache
    # No `ports:` — runner is reachable only by the api on the ISOLATED net.
    # It is deliberately NOT on `marevlo`, so user-submitted code executing
    # inside the runner cannot reach postgres / redis / the api at all.
    expose:
      - "4002"
    # Cap total processes to defeat fork bombs (worker also sets RLIMIT + killpg).
    pids_limit: 256
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          pids: 256
    networks: [runner_isolated]

  # JupyterHub: in-container hub binds 8000, mapped to host 8001 to avoid
  # colliding with the FastAPI api service.
  jupyterhub:
    build:
      context: ./jupyterhub
      dockerfile: Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      HUB_CONNECT_IP: jupyterhub
      DOCKER_NETWORK_NAME: marevlo_net
      NOTEBOOK_USER_IMAGE: marevlo-notebook-user:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - jupyterhub_data:/srv/jupyterhub/data
    ports:
      - "${JUPYTERHUB_PORT:-8001}:8000"
    depends_on:
      - notebook-user-image
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks: [marevlo]

  # Build-only sidecar: produces the image DockerSpawner launches per user.
  # The container exits immediately; the image (`marevlo-notebook-user:latest`)
  # is what JupyterHub references.
  notebook-user-image:
    build:
      context: ./notebook_project/Frontend
      dockerfile: Dockerfile
    image: marevlo-notebook-user:latest
    command: ["true"]
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  compile_cache:
  jupyterhub_data:

networks:
  marevlo:
    name: marevlo_net
    driver: bridge
  # Carries ONLY api <-> runner traffic. No data stores are attached, so
  # untrusted code in the runner has nothing on-network to reach.
  runner_isolated:
    name: marevlo_runner_isolated
    driver: bridge
