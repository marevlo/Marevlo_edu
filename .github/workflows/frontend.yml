name: deploy-frontend
on:
  push:
    branches: [main]
    paths: ["frontend/**"]
  workflow_dispatch:

permissions:
  id-token: write   # for AWS OIDC
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: frontend/package-lock.json }

      - name: Build SPA
        working-directory: frontend
        env:
          VITE_API_URL: /api            # same-origin via CloudFront; no CORS
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          npm ci
          npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Sync to S3 + invalidate CloudFront
        env:
          BUCKET: ${{ secrets.SPA_BUCKET }}            # from terraform output spa_bucket
          DIST_ID: ${{ secrets.CLOUDFRONT_DIST_ID }}   # from terraform output cloudfront_distribution_id
        run: |
          # hashed assets: long cache. index.html: never cache (so deploys show up).
          aws s3 sync frontend/dist "s3://$BUCKET" --delete \
            --cache-control "public,max-age=31536000,immutable" --exclude index.html
          aws s3 cp frontend/dist/index.html "s3://$BUCKET/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/index.html" "/"
